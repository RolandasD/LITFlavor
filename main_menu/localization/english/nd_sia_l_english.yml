l_english:
 STATIC_MODIFIER_NAME_nd_sia_warrior_kings: "Legacy of the Warrior Kings"
 STATIC_MODIFIER_DESC_nd_sia_warrior_kings: "From Ramkhamhaeng's conquests to Naresuan's liberation, Siam's kings have always led from the front. The founding of this kingdom carries forward a martial tradition forged in centuries of war against Burma, Cambodia, and the Malay states."
 STATIC_MODIFIER_NAME_nd_sia_venice_of_the_east: "Venice of the East"
 STATIC_MODIFIER_DESC_nd_sia_venice_of_the_east: "Ayutthaya's floating markets, foreign quarters, and royal trading houses drew merchants from China, Japan, Persia, and Europe. The kingdom's wealth flowed through its rivers, and its tolerance of foreign faiths and customs made it the commercial crossroads of Southeast Asia."
 nd_sia.1.t: "The Unification of Siam"
 nd_sia.1.d: "The Thai lands are united under one crown. From the rice paddies of the Chao Phraya to the highland valleys of the north, the Siamese kingdom commands a realm of immense strategic importance — astride the trade routes linking China to India, blessed with fertile river plains, and defended by mountain passes and monsoon-fed rivers.\n\nBut what manner of kingdom shall this be? The warrior traditions of Sukhothai and the martial glory of Naresuan's elephant-back duel against Burma beckon toward military supremacy. Yet the cosmopolitan legacy of Ayutthaya — where Japanese samurai served alongside Persian merchants and Portuguese traders — points toward a different destiny: Siam as the great entrepot of the East.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_sia.1.a: "We shall be kings of war, as Naresuan was."
 nd_sia.1.b: "We shall be kings of trade, as Ayutthaya was."
 STATIC_MODIFIER_NAME_nd_sia_naresuan_military: "Naresuan's Military Reforms"
 STATIC_MODIFIER_DESC_nd_sia_naresuan_military: "Following the example of King Naresuan, the army is reorganized around professional soldiers and standing forces rather than seasonal corvee levies."
 STATIC_MODIFIER_NAME_nd_sia_naresuan_commerce: "Naresuan's Trading Legacy"
 STATIC_MODIFIER_DESC_nd_sia_naresuan_commerce: "The peace won by Naresuan's victories opens the kingdom to expanded trade, with Ayutthaya becoming one of the greatest commercial centers in Asia."
 nd_sia.2.t: "The Elephant Duel of Nong Sarai"
 nd_sia.2.d: "In the sweltering heat of the battlefield at Nong Sarai, a moment has arrived that will define Siam for centuries. The Burmese crown prince Mingyi Swa, mounted atop his war elephant, has challenged the Siamese king to single combat — a duel of honor between sovereigns in the ancient tradition.\n\nThe Siamese champion accepts. In a thundering clash of war elephants, the Burmese prince falls. With his death, Burma's hold over Siam shatters. The kingdom is liberated, and the name of Naresuan becomes immortal. But how shall this victory be used? Naresuan himself turned to military reform, creating standing forces that could strike deep into enemy territory. Others would use the breathing space to expand Ayutthaya's trading networks across Asia."
 nd_sia.2.a: "Reform the armies — Siam shall never be conquered again."
 nd_sia.2.b: "Expand the trading houses — let victory bring prosperity."
 STATIC_MODIFIER_NAME_nd_sia_chakri_centralization: "Chakri Centralization"
 STATIC_MODIFIER_DESC_nd_sia_chakri_centralization: "The Chakri kings consolidate royal authority, bringing provincial lords and distant tributaries firmly under the control of Bangkok."
 STATIC_MODIFIER_NAME_nd_sia_chakri_openness: "Chakri Openness"
 STATIC_MODIFIER_DESC_nd_sia_chakri_openness: "The Chakri court engages with European science, technology, and diplomacy, positioning Siam as a modern state capable of holding its own against colonial powers."
 nd_sia.3.t: "The Founding of the Chakri Dynasty"
 nd_sia.3.d: "The ashes of Ayutthaya have settled, but from them rises a new order. General Chakri, the brilliant commander who helped reunify the kingdom, has established a new dynasty and moved the capital across the river to Rattanakosin — the site that will become Bangkok.\n\nRama I, as the new king styles himself, faces the task of rebuilding not just a city but a civilization. The Burmese destruction of Ayutthaya obliterated centuries of legal codes, religious texts, and administrative records. The new king commissions a complete revision of the Tripitaka, codifies the laws anew, and constructs the magnificent Temple of the Emerald Buddha.\n\nShall the Chakri dynasty centralize power in the new capital, creating a stronger and more unified state? Or shall it open Siam to the world, embracing the foreign knowledge and trade that will be needed to survive in an age of European expansion?"
 nd_sia.3.a: "Centralize the kingdom under the Chakri throne."
 nd_sia.3.b: "Open the doors — Siam must learn from the world."
 nd_sia_sangha_tradition: "Sangha Tradition"
 nd_sia_sangha_tradition_desc: "The Buddhist Sangha forms the spiritual backbone of Siamese society. Royal patronage of monasteries and the ordination of monks maintains social harmony and religious devotion across the kingdom."
 nd_sia_phrai_corvee: "Phrai Corvee System"
 nd_sia_phrai_corvee_desc: "The Phrai system conscripts common men for six months of annual service to the crown — as soldiers, laborers, or craftsmen. Each man bears a tattoo marking his department and obligation."
 nd_sia_rice_granary_system: "Royal Rice Granaries"
 nd_sia_rice_granary_system_desc: "Centralized granaries collect and redistribute the kingdom's rice harvests, ensuring food security and enabling the mobilization of armies without starving the provinces."
 nd_sia_sakdina_hierarchy: "Sakdina Hierarchy"
 nd_sia_sakdina_hierarchy_desc: "The Sakdina system assigns every person a numerical rank measured in rice-field units, from the king to the lowest commoner. This hierarchy determines corvee obligations, legal standing, and access to royal favor."
 nd_sia_khlong_engineering: "Khlong Canal Engineering"
 nd_sia_khlong_engineering_desc: "Networks of canals — khlongs — crisscross the Chao Phraya delta, irrigating rice paddies, transporting goods, and connecting communities. These waterways are the arteries of Siamese civilization."
 nd_sia_thai_silk_tradition: "Thai Silk Tradition"
 nd_sia_thai_silk_tradition_desc: "Siamese silk weaving produces fabrics of distinctive quality and pattern, prized throughout Asia. The combination of local mulberry cultivation and skilled artisans creates a luxury export of enduring value."
 nd_sia_royal_fleet: "Royal War Barges"
 nd_sia_royal_fleet_desc: "The Siamese royal fleet of war barges patrols the Chao Phraya and the Gulf of Siam, projecting royal authority along the kingdom's waterways and coastal trade routes."
 nd_sia_phraklang_system: "Phraklang Trading Houses"
 nd_sia_phraklang_system_desc: "The Phraklang — Minister of the Royal Treasury — oversees all foreign trade through specialized bureaus: one for Western merchants, another for Eastern. This royal monopoly channels enormous wealth into the crown's coffers."
 nd_sia_cosmopolitan_court: "Cosmopolitan Court"
 nd_sia_cosmopolitan_court_desc: "The Siamese court welcomes merchants, adventurers, and scholars from across the known world. Japanese samurai serve as royal guards, Chinese merchants dominate river trade, Persian diplomats conduct affairs of state, and European missionaries preach freely."
 nd_sia_devaraja_tradition: "Devaraja Divine Kingship"
 nd_sia_devaraja_tradition_desc: "Drawing from Khmer traditions, the Siamese king is consecrated as a divine being on earth through the Hindu Rajabhisekha ceremony. The Devaraja concept elevates the monarch above all earthly authority."
 nd_sia_artisan_guilds: "Royal Artisan Guilds"
 nd_sia_artisan_guilds_desc: "The royal court patronizes guilds of skilled craftsmen producing lacquerware, gold leaf, and ornamental metalwork. These luxury goods serve both as diplomatic gifts and trade commodities."
 nd_sia_palatine_law: "Palatine Law Codification"
 nd_sia_palatine_law_desc: "The Three Seals Law Code establishes a comprehensive legal framework governing inheritance, property, criminal justice, and the obligations of the Phrai system. Written on palm-leaf manuscripts and stamped with royal seals, it brings order to the kingdom."
 nd_sia_krom_asa_guards: "Krom Asa Royal Guards"
 nd_sia_krom_asa_guards_desc: "The Krom Asa are the king's professional soldiers — not seasonal corvee levies but full-time warriors maintained at royal expense. They form the elite core of the Siamese army, trained in close combat and personal loyalty to the throne."
 nd_sia_junk_fleet: "Siamese Junk Fleet"
 nd_sia_junk_fleet_desc: "Chinese-style junks, built in Siamese shipyards under Chinese supervision, carry Siamese trade goods across the South China Sea. Fast, maneuverable, and well-armed for their size, they are equally effective as merchants and raiders."
 nd_sia_liberation_wars: "Wars of Liberation"
 nd_sia_liberation_wars_desc: "Centuries of Burmese domination end with Siamese kings who refuse to submit. The wars of liberation — from Naresuan's elephant duel to the defense of Ayutthaya — forge a national identity defined by resistance and sovereignty."
 nd_sia_pom_fortification: "Pom Border Fortifications"
 nd_sia_pom_fortification_desc: "Siamese fortresses — pom — guard the western passes against Burmese invasion and the southern approaches against Malay raids. Built of brick and earth, they anchor defensive lines along rivers and mountain gaps."
 nd_sia_foreign_quarters: "Foreign Quarter Administration"
 nd_sia_foreign_quarters_desc: "Designated quarters for Japanese, Chinese, Portuguese, Dutch, and other foreign communities allow Ayutthaya to manage its cosmopolitan population. Each community is governed by its own headman but subject to Siamese royal authority."
 nd_sia_royal_monopoly: "Royal Trade Monopoly"
 nd_sia_royal_monopoly_desc: "The Siamese crown claims exclusive right to trade in key commodities — tin, teak, deerskins, and aromatic woods. Foreign merchants must deal through royal agents, ensuring the king remains the kingdom's wealthiest merchant."
 nd_sia_golden_age: "Ayutthaya's Golden Age"
 nd_sia_golden_age_desc: "At its height, Ayutthaya rivals any city in the world for wealth and splendor. Its temple spires pierce the sky, its canals teem with commerce, and its court dazzles foreign ambassadors with elaborate ceremonies and diplomatic sophistication."
 nd_sia_rice_export: "Rice Export Economy"
 nd_sia_rice_export_desc: "The fertile Chao Phraya delta produces rice surpluses that feed not only Siam but neighboring kingdoms and trading partners. Rice becomes the foundation of the Siamese export economy, exchanged for luxury goods from across Asia."
 nd_sia_thahan_suea_tradition: "Thahan Suea Tradition"
 nd_sia_thahan_suea_tradition_desc: "The Tiger Soldiers — Thahan Suea — represent the modernization of the Siamese military. Moving beyond elephant warfare and corvee levies, these professional regulars train with firearms and European-style discipline."
 nd_sia_taksin_reconquest: "Taksin's Reconquest"
 nd_sia_taksin_reconquest_desc: "After the catastrophic fall of Ayutthaya to Burma in 1767, General Taksin rallies scattered Thai forces and within a single decade reconquers all lost territory, reunifying the kingdom from his new capital at Thonburi."
 nd_sia_chakri_founding: "Founding of the Chakri Dynasty"
 nd_sia_chakri_founding_desc: "General Chakri founds a new dynasty and moves the capital to Rattanakosin — Bangkok — positioning it for defense behind river and canal barriers. The grand palace and Temple of the Emerald Buddha become symbols of renewed Thai civilization."
 nd_sia_tripitaka_revision: "Tripitaka Scriptural Revival"
 nd_sia_tripitaka_revision_desc: "Rama I commissions a complete revision and recopying of the Buddhist Tripitaka, gathering monks from across the kingdom to reconstruct the sacred texts destroyed when Ayutthaya fell. This monumental scholarly effort preserves Theravada learning for future generations."
 nd_sia_bowring_treaty: "Bowring Treaty"
 nd_sia_bowring_treaty_desc: "The 1855 treaty with Britain abolishes the royal trade monopoly and opens Siam to free trade. While it limits Siamese sovereignty over tariffs, it also modernizes the economy, transforming Siam from a semi-closed kingdom into a participant in the global market."
 nd_sia_diplomatic_balance: "Diplomatic Balance"
 nd_sia_diplomatic_balance_desc: "Siam's survival in the age of colonialism depends on playing the British against the French, the Dutch against the Americans. Skilled diplomats navigate these treacherous waters, ceding peripheral territories to preserve the kingdom's independence."
 nd_sia_modernization_reforms: "Modernization Reforms"
 nd_sia_modernization_reforms_desc: "The Chakri kings undertake sweeping reforms: a modern bureaucracy replaces feudal offices, salaried officials replace corvee administrators, and Western legal codes are adopted alongside traditional law. Siam transforms itself from the inside to avoid being transformed by outsiders."
 nd_sia_uncolonized_sovereignty: "Unconquered Sovereignty"
 nd_sia_uncolonized_sovereignty_desc: "Alone among Southeast Asian states, Siam is never colonized. Through diplomatic cunning, military deterrence, and timely modernization, the Siamese kingdom preserves its sovereignty while all its neighbors fall to European empires."
 a_nd_sia_phrai_luang: "Phrai Luang"
 a_nd_sia_phrai_luang_desc: "Corvee conscripts drawn from the common population under the Phrai system. Each bears a tattoo marking his assigned department and obligated service to the crown."
 n_nd_sia_royal_war_barge: "Royal War Barge"
 n_nd_sia_royal_war_barge_desc: "Ornate but deadly war barges of the Siamese royal fleet, designed for river combat and coastal patrols along the Chao Phraya and the Gulf of Siam."
 a_nd_sia_krom_asa: "Krom Asa"
 a_nd_sia_krom_asa_desc: "Professional royal guardsmen maintained at the king's personal expense. Unlike corvee levies, the Krom Asa serve year-round, forming the elite core of the Siamese army."
 n_nd_sia_trade_junk: "Siamese Trade Junk"
 n_nd_sia_trade_junk_desc: "Chinese-style trading junks built in Siamese shipyards, equally capable as merchant vessels and light warships. Fast and weatherly, they carry Siamese goods across the South China Sea."
 a_nd_sia_thahan_suea: "Thahan Suea"
 a_nd_sia_thahan_suea_desc: "Tiger Soldiers — modernized Siamese regulars trained with firearms and disciplined formations, representing the transition from traditional to modern warfare."
 nd_sia_wat: "Wat"
 nd_sia_wat_desc: "A Theravada Buddhist temple complex serving as the spiritual, educational, and social center of Siamese communities. Royal patronage of the Sangha maintains the wat system across the kingdom."
 nd_sia_khlong: "Khlong Canal"
 nd_sia_khlong_desc: "An engineered canal linking waterways across the Chao Phraya delta, serving as irrigation channel, transportation route, and flood control infrastructure."
 nd_sia_phraklang: "Phraklang Trading House"
 nd_sia_phraklang_desc: "A royal trade administration office where foreign merchants must register, pay duties, and negotiate through the Phraklang minister's agents for access to Siamese markets."
 nd_sia_pom: "Pom Fortress"
 nd_sia_pom_desc: "A Siamese border fortification of brick, earth, and timber, guarding river crossings and mountain passes against invasion."
 nd_sia_rong_si: "Rong Si"
 nd_sia_rong_si_desc: "A royal rice granary where the kingdom's harvests are collected, stored, and redistributed — ensuring food security and enabling military mobilization."
 nd_sia_wat_maintenance: "Wat Upkeep"
 nd_sia_wat_maintenance_desc: "The maintenance of temple buildings, Buddhist statues, and ceremonial grounds using local timber, pottery, beeswax for sacred lamps, and incense for ritual offerings."
 nd_sia_khlong_maintenance: "Khlong Maintenance"
 nd_sia_khlong_maintenance_desc: "The ongoing dredging, repair, and expansion of canal networks to maintain water flow and navigability, consuming lumber for sluice gates, stone for embankments, and tools for laborers."
 nd_sia_phraklang_maintenance: "Phraklang Administration"
 nd_sia_phraklang_maintenance_desc: "The administrative costs of operating royal trading houses, including record-keeping in paper, dyeing of official documents, salt duties inspection, and fine cloth as ceremonial gifts for foreign merchants."
 nd_sia_pom_maintenance: "Pom Garrison"
 nd_sia_pom_maintenance_desc: "The upkeep of fortress walls and garrison supplies: stone for repairs, weaponry and firearms for the soldiers, and tools for continuous maintenance of the defenses."
 nd_sia_rong_si_maintenance: "Granary Operations"
 nd_sia_rong_si_maintenance_desc: "The costs of collecting, storing, and distributing rice from the royal granaries, requiring lumber for structural upkeep, tools for laborers, and pottery jars for grain storage."
 nd_sia_silk_weaving: "Thai Silk Weaving"
 nd_sia_silk_weaving_desc: "Traditional Siamese silk production using imported silk thread and dyes, woven on looms maintained with specialist tools, producing fabrics prized throughout the courts of Asia."
 nd_sia_lacquerware: "Thai Lacquerware"
 nd_sia_lacquerware_desc: "The art of applying layers of lacquer to wooden objects, shaped and finished with specialist tools, creating durable and beautiful decorative items prized throughout the courts of Asia."
 levy_nd_sia_phrai_luang: "Phrai Luang Levy"
 levy_nd_sia_phrai_luang_desc: "Corvee conscripts serving their mandatory service to the crown under the Phrai system."
 nd_sia_formed_tt: "Siam has been formed"
 nd_sia_path_a_tt: "Chose Legacy of the Warrior Kings"
 nd_sia_path_b_tt: "Chose Venice of the East"
 nd_sia_destiny: "Destiny of Siam"
 nd_sia_destiny_desc: "The kingdom is founded and stable. The Siamese crown must now decide the path that will define its legacy among the nations of Asia."
 nd_sia_dest_khorat: "Conquest of the Khorat Plateau"
 nd_sia_dest_khorat_desc: "The vast Khorat Plateau beyond the Dong Phaya Yen mountains is the gateway to Indochina. Seize Phimai and Champasak to establish dominion over the Mekong lands and build an army worthy of conquest."
 nd_sia_dest_angkor: "Fall of the Khmer Empire"
 nd_sia_dest_angkor_desc: "The ancient temples of Angkor represent the last great rival civilization in mainland Southeast Asia. Take Angkor and Battambang to end Khmer independence and absorb their empire into Siam."
 nd_sia_dest_pegu: "Conquest of Pegu"
 nd_sia_dest_pegu_desc: "The final test of Siamese arms: conquer Pegu, Martaban, and the Tenasserim coast. Only by breaking Burmese power at its heartland can Siam claim supremacy over all of Indochina."
 nd_sia_dest_banking: "Rise of the Trading Kingdom"
 nd_sia_dest_banking_desc: "Siam's rivers and ports are arteries of commerce. Embrace the new financial institutions, ensure silk flows through the capital markets, and accumulate the wealth needed to build a great trading state."
 nd_sia_dest_thammarat: "The Southern Trade Route"
 nd_sia_dest_thammarat_desc: "Nakhon Si Thammarat has been the gateway between the Gulf of Siam and the Indian Ocean for centuries. Control this vital southern port, develop the kingdom's economy, and expand Siam's commercial reach."
 nd_sia_dest_entrepot: "Entrepot of the East"
 nd_sia_dest_entrepot_desc: "Seize Malacca, the keystone of Asian maritime trade. With gems flowing through Siamese markets and a treasury overflowing with gold, Siam becomes the commercial capital of the eastern world."
 nd_sia.4.t: "The Destiny of the Kingdom"
 nd_sia.4.d: "The Siamese kingdom stands upon solid foundations. Our temples bring harmony, our fields bring plenty, and our borders hold firm. Now the question turns from survival to greatness.\n\nWhat manner of kingdom shall we build? The path ahead is ours to choose, and the consequences will echo through the ages."
 nd_sia.4.a: "Our destiny awaits."
 nd_sia.5.t: "The Khorat Plateau Secured"
 nd_sia.5.d: "The Siamese army has crossed the Dong Phaya Yen mountains and planted the royal standard over the Khorat Plateau. Phimai, with its ancient Khmer temple ruins, and the Mekong river town of Champasak now answer to the Siamese crown.\n\nThe road to empire lies open. To the east, the crumbling remnants of the Khmer realm. To the north, the fractious Lao muangs along the Mekong. Siam's warrior kings have proven that the old martial traditions endure."
 nd_sia.5.a: "Let the conquest continue."
 nd_sia.6.t: "The Merchant Crown"
 nd_sia.6.d: "The kingdom's coffers overflow. Siamese silk commands premium prices across Asian markets, and the adoption of modern banking has transformed the royal treasury into a commercial engine.\n\nForeign merchants who once passed through on their way to China now linger in Siamese ports, drawn by favorable terms and profitable opportunities. The Venice of the East is no mere title -- it is becoming reality."
 nd_sia.6.a: "Let commerce be our strength."
 nd_sia.7.t: "The Temples of Angkor"
 nd_sia.7.d: "Siamese soldiers stand among the towers of Angkor Wat, the greatest temple complex ever built by human hands. The Khmer empire, which once ruled all of mainland Southeast Asia, has fallen to Siamese arms.\n\nBattambang's rice fields and Angkor's ancient prestige are now ours. But governing these conquered peoples requires a choice. Shall we absorb them into the Siamese nation, teaching them our language and customs? Or shall we rule as overlords, collecting tribute while leaving local rulers in place?"
 nd_sia.7.a: "They shall become Siamese in tongue and custom."
 nd_sia.7.b: "Let local lords rule in our name."
 nd_sia.8.t: "Gateway to the Indian Ocean"
 nd_sia.8.d: "Nakhon Si Thammarat, the ancient port city that straddles the land bridge between the Gulf of Siam and the Andaman Sea, is ours. From here, Siamese merchants can tap the riches of both the South China Sea and the Indian Ocean trade routes.\n\nThe kingdom's economy is flourishing, and the question now is how to channel this wealth. Shall the crown build great warehouses and infrastructure to direct trade? Or shall we open our ports freely, inviting the world's merchants to come and enriching ourselves through sheer volume?"
 nd_sia.8.a: "Build royal warehouses to control the flow."
 nd_sia.8.b: "Open the ports and let trade flow freely."
 nd_sia.9.t: "The Fall of Pegu"
 nd_sia.9.d: "The ancient Burmese capital of Pegu has fallen. Martaban, the great Mon trading port, flies the Siamese flag. The Tenasserim coast, gateway to the Indian Ocean, is secured. For the first time in history, a single Tai kingdom commands the entire span of mainland Southeast Asia from the Mekong to the Irrawaddy.\n\nThis is the culmination of centuries of warfare between Siam and Burma. The warrior kings' dream is fulfilled. But how shall this vast empire be governed? Through military garrisons and direct control? Or through a network of river-linked provinces bound by commerce and shared administration?"
 nd_sia.9.a: "Rule through the strength of our garrisons."
 nd_sia.9.b: "Bind the empire through its great rivers."
 nd_sia.10.t: "The Strait of Malacca"
 nd_sia.10.d: "Malacca, the great entrepot through which half the world's trade must pass, answers to the Siamese crown. Gems and spices, silk and porcelain flow through markets that now fly our flag. The treasury is vast beyond imagining.\n\nSiam has achieved what Ayutthaya's merchants could only dream of: not just a prosperous trading kingdom, but command of the maritime chokepoint that connects East and West. The question now is how to wield this power. Shall we dominate the strait through naval supremacy, controlling who may pass? Or shall we use our position to project diplomatic influence and commercial reach across the known world?"
 nd_sia.10.a: "Command the strait with our warships."
 nd_sia.10.b: "Let our commerce reach every shore."
 STATIC_MODIFIER_NAME_nd_sia_dest_khmer_assimilation: "Khmer Assimilation"
 STATIC_MODIFIER_DESC_nd_sia_dest_khmer_assimilation: "The conquered Khmer populations are being absorbed into the Siamese state, learning Thai language and customs under crown-appointed governors."
 STATIC_MODIFIER_NAME_nd_sia_dest_khmer_tributaries: "Khmer Tributary System"
 STATIC_MODIFIER_DESC_nd_sia_dest_khmer_tributaries: "Local Khmer lords govern their provinces as Siamese tributaries, maintaining order while their lands recover from the conquest."
 STATIC_MODIFIER_NAME_nd_sia_dest_royal_warehouses: "Royal Warehouses"
 STATIC_MODIFIER_DESC_nd_sia_dest_royal_warehouses: "Crown-controlled warehouses and construction projects channel trade and development through royal institutions, building the kingdom's commercial infrastructure."
 STATIC_MODIFIER_NAME_nd_sia_dest_free_trade_ports: "Free Trade Ports"
 STATIC_MODIFIER_DESC_nd_sia_dest_free_trade_ports: "Open ports attract foreign merchants and sailors, swelling the kingdom's maritime capacity, though they make offensive wars more costly to justify."
 STATIC_MODIFIER_NAME_nd_sia_dest_siamese_hegemony: "Siamese Hegemony"
 STATIC_MODIFIER_DESC_nd_sia_dest_siamese_hegemony: "Military garrisons across the empire project Siamese power, with arsenals producing weapons at speed, though the navy is neglected in favor of land forces."
 STATIC_MODIFIER_NAME_nd_sia_dest_five_rivers: "Empire of the Five Rivers"
 STATIC_MODIFIER_DESC_nd_sia_dest_five_rivers: "The great rivers -- Chao Phraya, Mekong, Salween, Irrawaddy, and their tributaries -- bind the empire together, allowing rapid reinforcement and reduced attrition across vast distances."
 STATIC_MODIFIER_NAME_nd_sia_dest_strait_masters: "Masters of the Strait"
 STATIC_MODIFIER_DESC_nd_sia_dest_strait_masters: "Siamese warships patrol the Strait of Malacca, projecting naval power across the trade routes. A sophisticated intelligence network guards against rivals seeking to undermine Siamese dominance."
 STATIC_MODIFIER_NAME_nd_sia_dest_siam_enthroned: "Siam Enthroned"
 STATIC_MODIFIER_DESC_nd_sia_dest_siam_enthroned: "Siam's diplomatic prestige and commercial networks extend across the known world, from the spice islands to the courts of distant kingdoms. Siamese merchants and envoys are welcomed everywhere."
 nd_sia_khlang_supha: "Khlang Supha"
 nd_sia_khlang_supha_desc: "A royal arsenal and munitions manufactory where weapons, firearms, and military equipment are produced and stored for the Siamese imperial army."
 nd_sia_khlang_supha_maintenance: "Arsenal Operations"
 nd_sia_khlang_supha_maintenance_desc: "The continuous production and maintenance of weapons and military equipment, consuming iron for weaponry, gunpowder for firearms, stone for fortification, and tools for craftsmen."
 nd_sia_talat_yai: "Talat Yai"
 nd_sia_talat_yai_desc: "A grand bazaar and commercial exchange where merchants from across Asia gather to trade luxury goods, negotiate contracts, and settle accounts under the watchful eye of the Phraklang."
 nd_sia_talat_yai_maintenance: "Bazaar Operations"
 nd_sia_talat_yai_maintenance_desc: "The administrative costs of operating the great bazaar, including fine cloth for merchant displays, paper for trade contracts, salt duties inspection, and imported pepper as sample goods."
