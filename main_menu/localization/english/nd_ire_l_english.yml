l_english:
 STATIC_MODIFIER_NAME_nd_ire_gaelic_resurgence: "Gaelic Resurgence"
 STATIC_MODIFIER_DESC_nd_ire_gaelic_resurgence: "The High King has restored the ancient laws and customs of the Gaelic order. Brehon judges settle disputes, the filí preserve the genealogies, and the clans rally to a sovereign Ireland free from foreign interference."
 STATIC_MODIFIER_NAME_nd_ire_atlantic_kingdom: "Atlantic Kingdom"
 STATIC_MODIFIER_DESC_nd_ire_atlantic_kingdom: "Ireland's position at the edge of the Atlantic makes it a natural gateway between Europe and the wider world. The new kingdom builds ships, courts foreign merchants, and looks westward to the open ocean."
 nd_ire.1.t: "The High Kingship of Ireland"
 nd_ire.1.d: "The clans have united and the Lordship of Ireland is no more. For the first time in centuries, a single High King speaks for all of Erin. But the character of this new kingdom remains to be determined. The Brehon judges still remember the old laws, the filí still sing of ancient glories, and the people still live by the rhythms of the clan system. Yet the Atlantic stretches wide beyond our western shores, and the ports of Galway, Waterford, and Dublin hum with trade from across the sea.\n\nWill we look inward to rebuild the Gaelic order that sustained our ancestors, or outward to the ocean that connects us to the world?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ire.1.a: "Restore the Brehon Laws"
 nd_ire.1.b: "Build an Atlantic Kingdom"
 nd_ire.2.t: "The Revival of Brehon Law"
 nd_ire.2.d: "The Brehon legal tradition, which governed Irish society for over a thousand years, stands at a crossroads. These laws -- composed by the breithemh judges and transmitted through generations of legal scholars -- regulated everything from land tenure to marriage, from the price of honor to the treatment of the sick. Under English pressure, Brehon law retreated beyond the Pale, but it never died.\n\nNow the question arises: should we formalize and strengthen these native courts, or gradually adopt the common law practices that dominate our neighbors and facilitate international commerce?"
 nd_ire.2.a: "Strengthen the Brehon Courts"
 nd_ire.2.b: "Adopt Common Law Practices"
 nd_ire.3.t: "The Nine Years' War"
 nd_ire.3.d: "The great Gaelic lords Hugh O'Neill, Earl of Tyrone, and Red Hugh O'Donnell have waged a bitter struggle against English encroachment. At the Battle of the Yellow Ford in 1598, O'Neill's forces destroyed an English army, proving that Irish troops could match their opponents in open battle through discipline, use of firearms, and tactical innovation. O'Neill trained his kern in the use of pike and musket, creating the first modern Irish army.\n\nThough the historical campaign ended in defeat at Kinsale, the military lessons endure. Irish warfare will never be the same."
 nd_ire.3.a: "The lessons of the Yellow Ford endure"
 nd_ire.4.t: "The Flight of the Wild Geese"
 nd_ire.4.d: "Following the upheavals of war, thousands of Irish soldiers have departed for the continent, entering service in the armies of France, Spain, Austria, and beyond. These 'Wild Geese' carry Irish martial traditions to every corner of Europe. The Irish Brigade in French service will earn renown at Fontenoy, while the Ultonia and Hibernia regiments serve Spain from Flanders to the Americas.\n\nThis diaspora represents both a loss and an opportunity. The soldiers who return bring continental military expertise, while those who remain abroad forge connections that benefit Irish trade and diplomacy."
 nd_ire.4.a: "Welcome our veterans home"
 nd_ire.4.b: "Cultivate our diaspora connections"
 STATIC_MODIFIER_NAME_nd_ire_brehon_courts: "Brehon Courts Restored"
 STATIC_MODIFIER_DESC_nd_ire_brehon_courts: "The ancient Brehon courts have been restored to formal authority, settling disputes through native Irish legal tradition."
 STATIC_MODIFIER_NAME_nd_ire_common_law_adoption: "Common Law Adoption"
 STATIC_MODIFIER_DESC_nd_ire_common_law_adoption: "English common law practices have been adopted alongside native tradition, facilitating international relations and standardizing governance."
 STATIC_MODIFIER_NAME_nd_ire_continental_veterans: "Continental Veterans"
 STATIC_MODIFIER_DESC_nd_ire_continental_veterans: "Soldiers returning from continental service bring the military discipline and tactical knowledge of Europe's finest armies."
 STATIC_MODIFIER_NAME_nd_ire_diaspora_bonds: "Diaspora Bonds"
 STATIC_MODIFIER_DESC_nd_ire_diaspora_bonds: "The Irish abroad maintain close ties with their homeland, channeling trade connections and diplomatic influence back to Ireland."
 nd_ire_tower_house_tradition: "Tower House Tradition"
 nd_ire_tower_house_tradition_desc: "Ireland's landscape is dotted with thousands of tower houses -- fortified stone residences that served as both clan seats and defensive strongholds."
 nd_ire_brehon_law: "Brehon Law"
 nd_ire_brehon_law_desc: "The ancient legal code of Gaelic Ireland, administered by the breithemh judges, regulating land, marriage, honor, and social obligation."
 nd_ire_cattle_lords: "Cattle Lords"
 nd_ire_cattle_lords_desc: "Cattle are the foundation of Irish wealth. Lords measured their status in herds, and cattle raids were both economic and political acts."
 nd_ire_tanistry: "Tanistry"
 nd_ire_tanistry_desc: "The Gaelic system of elective succession, in which a tanist is chosen from among eligible kinsmen to succeed the chief."
 nd_ire_bardic_tradition: "Bardic Schools"
 nd_ire_bardic_tradition_desc: "The bardic schools of Ireland train the filí -- poet-scholars who preserve genealogy, law, and history through rigorous oral and literary tradition."
 nd_ire_tower_house_defense: "Tower House Defenses"
 nd_ire_tower_house_defense_desc: "The tower houses of Ireland are improved with machicolations, murder holes, and thicker walls, creating a network of formidable strongpoints."
 nd_ire_gaelic_confederation: "Gaelic Confederation"
 nd_ire_gaelic_confederation_desc: "The great Gaelic lords form a confederation under the High King, balancing clan autonomy with collective defense."
 nd_ire_monastic_schools: "Monastic Schools"
 nd_ire_monastic_schools_desc: "Ireland's monastic tradition, which once earned it the title Island of Saints and Scholars, continues to nurture learning and literacy."
 nd_ire_redshank_tradition: "Redshank Tradition"
 nd_ire_redshank_tradition_desc: "Scottish mercenaries known as redshanks have long supplemented Irish armies. Their fierce reputation and cross-sea mobility make them valued allies."
 nd_ire_atlantic_fisheries: "Atlantic Fisheries"
 nd_ire_atlantic_fisheries_desc: "Ireland's western coast offers rich fishing grounds that sustain coastal communities and train a hardy population of seafarers."
 nd_ire_manuscript_tradition: "Manuscript Tradition"
 nd_ire_manuscript_tradition_desc: "The tradition of illuminated manuscripts and scholarly copying, born in monasteries like Kells and Clonmacnoise, continues in Ireland's bardic schools."
 nd_ire_gaelic_lordship: "Gaelic Lordship"
 nd_ire_gaelic_lordship_desc: "The consolidation of Gaelic lordships under royal authority reduces internal conflict and strengthens the kingdom against external threats."
 nd_ire_atlantic_raiders: "Atlantic Raiders"
 nd_ire_atlantic_raiders_desc: "Irish privateers prey on enemy commerce along the Atlantic shipping lanes, turning Ireland's coastal position into a strategic advantage."
 nd_ire_nine_years_war: "Nine Years' War Reforms"
 nd_ire_nine_years_war_desc: "The military innovations of Hugh O'Neill -- training kern in pike and musket, adopting European tactics -- transform Irish warfare."
 nd_ire_wool_trade: "Irish Wool Trade"
 nd_ire_wool_trade_desc: "Ireland's sheep produce excellent wool, and the export trade grows steadily as English and continental merchants seek Irish fleeces."
 nd_ire_hedge_schools: "Hedge Schools"
 nd_ire_hedge_schools_desc: "When formal education is suppressed, the Irish establish clandestine outdoor schools where scholars teach Latin, Irish, mathematics, and catechism."
 nd_ire_wild_geese: "Wild Geese"
 nd_ire_wild_geese_desc: "Irish soldiers serving in continental armies form elite regiments renowned for their courage. The Irish Brigade becomes a legend across European battlefields."
 nd_ire_linen_industry: "Linen Industry"
 nd_ire_linen_industry_desc: "Linen production transforms the Irish economy. Flax cultivation and bleaching expand rapidly, making Irish linen famous across Europe."
 nd_ire_provision_trade: "Provision Trade"
 nd_ire_provision_trade_desc: "Ireland's exports of salted beef, butter, and pork supply the Atlantic world, from the navies of Europe to the plantations of the Caribbean."
 nd_ire_penal_resistance: "Penal Resistance"
 nd_ire_penal_resistance_desc: "Despite restrictive laws, Irish institutions endure through underground networks of clergy, scholars, and community leaders."
 nd_ire_whiskey_tradition: "Whiskey Distilling"
 nd_ire_whiskey_tradition_desc: "Irish whiskey, distilled from barley and aged in oak, becomes one of Ireland's most celebrated exports and a symbol of national identity."
 nd_ire_parliamentary_tradition: "Parliamentary Tradition"
 nd_ire_parliamentary_tradition_desc: "The Irish Parliament, inspired by Grattan and the Volunteers, asserts legislative independence and the right to self-governance."
 nd_ire_diaspora_networks: "Diaspora Networks"
 nd_ire_diaspora_networks_desc: "The Irish diaspora spans the Atlantic world, creating networks of trade, influence, and solidarity that connect Ireland to every major port."
 nd_ire_revolutionary_spirit: "Revolutionary Spirit"
 nd_ire_revolutionary_spirit_desc: "The tradition of Wolfe Tone and the United Irishmen inspires a generation willing to fight for liberty, equality, and national sovereignty."
 nd_ire_tower_house: "Tower House"
 nd_ire_tower_house_desc: "A fortified stone tower, typically four or more stories tall, serving as a clan chief's residence and strongpoint. Ireland built more of these than anywhere else in the British Isles."
 nd_ire_tower_house_maintenance: "Tower House Upkeep"
 nd_ire_tower_house_maintenance_desc: "Maintaining the stone walls, defensive works, and garrison of a tower house."
 nd_ire_garrison_muster: "Garrison Muster"
 nd_ire_garrison_muster_desc: "Equipping and maintaining a mounted garrison force to defend the tower house and its surrounding lands."
 nd_ire_bardic_school: "Bardic School"
 nd_ire_bardic_school_desc: "A school for the filí, the hereditary poet-scholars of Gaelic Ireland, where students spend years mastering the intricacies of verse, genealogy, and law."
 nd_ire_bardic_upkeep: "Bardic Patronage"
 nd_ire_bardic_upkeep_desc: "Supporting the resident filí with writing materials, candles, and the incense that accompanies their recitations."
 nd_ire_manuscript_production: "Manuscript Illumination"
 nd_ire_manuscript_production_desc: "The painstaking craft of producing illuminated manuscripts in the tradition of the Book of Kells."
 nd_ire_bleach_green: "Linen Bleach Green"
 nd_ire_bleach_green_desc: "An open-air facility where woven linen cloth is spread on grass and bleached by sun and water, producing the famously white Irish linen."
 nd_ire_bleach_green_maintenance: "Bleach Green Upkeep"
 nd_ire_bleach_green_maintenance_desc: "Maintaining the drying frames, washing troughs, and storage facilities of the bleach green."
 nd_ire_linen_processing: "Linen Weaving"
 nd_ire_linen_processing_desc: "Processing flax fibers into fine linen cloth using traditional Irish weaving techniques."
 nd_ire_distillery: "Whiskey Distillery"
 nd_ire_distillery_desc: "A pot-still distillery producing uisce beatha, the water of life. Copper pot stills transform malted barley into smooth Irish whiskey."
 nd_ire_distillery_maintenance: "Distillery Upkeep"
 nd_ire_distillery_maintenance_desc: "Maintaining the copper stills, oak casks, and malt kilns that produce fine Irish whiskey."
 nd_ire_whiskey_production: "Whiskey Distilling"
 nd_ire_whiskey_production_desc: "Distilling grain and water into smooth Irish whiskey through the traditional pot-still method."
 nd_ire_wool_cottage: "Wool Cottage"
 nd_ire_wool_cottage_desc: "A rural cottage where Irish families spin, comb, and process wool into cloth. The cottage industry sustains many farming households."
 nd_ire_wool_cottage_maintenance: "Wool Cottage Upkeep"
 nd_ire_wool_cottage_maintenance_desc: "Maintaining the spinning wheels, looms, and storage for the cottage wool industry."
 nd_ire_wool_processing: "Wool Processing"
 nd_ire_wool_processing_desc: "Combing, spinning, and weaving Irish wool into cloth for domestic use and export."
 a_nd_ire_redshanks: "Redshanks"
 a_nd_ire_redshanks_desc: "Scottish-Irish mercenary infantry known for their distinctive untanned deer-leather leggings. Fast, aggressive fighters experienced in the rough terrain of the Highlands and Irish bogs."
 levy_nd_ire_redshanks: "Redshanks"
 levy_nd_ire_redshanks_desc: "A levy of Scottish-Irish redshank mercenaries, fierce light infantry at home in rough terrain."
 a_nd_ire_irish_pike: "Irish Pike"
 a_nd_ire_irish_pike_desc: "Disciplined formation infantry trained in the manner of Hugh O'Neill's reformed army. Combining traditional Irish ferocity with continental pike-and-shot tactics."
 levy_nd_ire_irish_pike: "Irish Pike"
 levy_nd_ire_irish_pike_desc: "A levy of Irish pikemen trained in O'Neill's reformed continental tactics, disciplined and steadfast in formation."
 a_nd_ire_wild_geese: "Wild Geese"
 a_nd_ire_wild_geese_desc: "Irish soldiers who served in continental European armies and returned with the discipline and tactical sophistication of professional warfare. Their experience in French, Spanish, and Austrian service makes them formidable veterans."
 n_nd_ire_privateer: "Irish Privateer"
 n_nd_ire_privateer_desc: "A fast, nimble raiding vessel built for Atlantic commerce warfare. Irish privateers exploit the island's position astride major shipping lanes to prey on enemy trade."
 nd_ire_formed_tt: "Ireland has been #bold formed#!"
 nd_ire_path_a_tt: "Chose the #bold Gaelic Empire#! destiny"
 nd_ire_path_b_tt: "Chose the #bold Atlantic Dominion#! destiny"
 nd_ire_destiny: "The Irish Destiny"
 nd_ire_destiny_desc: "Ireland stands unified under a single High King. The destiny of Erin -- whether it shall rebuild the Gaelic world or forge an Atlantic empire -- awaits."
 nd_ire_dest_ri_na_ngael: "Ri na nGael"
 nd_ire_dest_ri_na_ngael_desc: "Seize the Isle of Man and the Inner Hebrides to unite all Gaelic peoples under the High King. The Gaelic world stretches beyond Ireland's shores."
 nd_ire_dest_gaelic_reconquest: "Gaelic Reconquest"
 nd_ire_dest_gaelic_reconquest_desc: "Reclaim the Gaelic heartlands of Scotland. Take Argyll and Edinburgh to forge a pan-Gaelic kingdom spanning both islands."
 nd_ire_dest_imperium: "Imperium Scottorum"
 nd_ire_dest_imperium_desc: "Conquer London and unite these islands under Gaelic rule. Become the supreme power of the British Isles with an empire worthy of Brian Boru's legacy."
 nd_ire_dest_galway_merchants: "Merchant Princes of Galway"
 nd_ire_dest_galway_merchants_desc: "Establish Ireland as an Atlantic trading power. Build up gold reserves, develop the wool trade, and make Galway the equal of any European port."
 nd_ire_dest_western_passage: "The Western Passage"
 nd_ire_dest_western_passage_desc: "Reach across the Atlantic to the Azores and beyond. Secure banking institutions and build the ships needed for oceanic trade."
 nd_ire_dest_emerald_dominion: "The Emerald Dominion"
 nd_ire_dest_emerald_dominion_desc: "Build a transatlantic commercial empire. Hold Bermuda, accumulate vast wealth, and develop Ireland into a prosperous maritime power."
 nd_ire.5.t: "The Irish Destiny"
 nd_ire.5.d: "The High Kingship is restored and Ireland speaks with one voice for the first time in centuries. The clans that once fought each other now look outward, united under a sovereign who commands the loyalty of all Erin.\n\nThe question is not whether Ireland shall be great, but what form that greatness will take. The Gaelic world extends beyond these shores -- to the Hebrides, to Man, to the highlands of Scotland where our kinsmen still speak our tongue. Or perhaps our destiny lies not in the lands of our ancestors but upon the Atlantic itself, where Irish ships can carry Irish goods to every port in the known world."
 nd_ire.5.a: "Erin go bragh."
 nd_ire.6.t: "King of the Gaels"
 nd_ire.6.d: "The Isle of Man and the Inner Hebrides have fallen under the High King's authority. For the first time since the Norse invasions, the Gaelic-speaking world of the Irish Sea is united under a single ruler. The fishermen of Man, the warriors of Islay, and the clans of Ireland all acknowledge one sovereign.\n\nThis is the first step toward a greater vision -- the reunification of all Gaelic peoples, from the bogs of Kerry to the highlands of Scotland, under one crown."
 nd_ire.6.a: "The Irish Sea is a Gaelic lake."
 nd_ire.7.t: "The Gaelic Reconquest"
 nd_ire.7.d: "Edinburgh has fallen. The Gaelic High King now rules from Dublin to the Lothians, commanding a realm that encompasses the ancient Gaelic heartlands of both Ireland and Scotland. The clans of Argyll, the islanders of the Hebrides, and the Highland chieftains have rallied to a banner that promises the restoration of Gaelic civilization across both islands.\n\nBut this reconquest can take different forms. A military alliance with the Highland clans would create an unbreakable martial tradition, channeling the fierce independence of the Gaelic warrior into a disciplined fighting force. Alternatively, the union of Irish and Scottish learning could spark a Gaelic cultural renaissance, reviving the scholarly traditions that once made the Gaelic world the light of Western Christendom."
 nd_ire.7.a: "Forge a Highland alliance."
 nd_ire.7.b: "Kindle a Gaelic renaissance."
 nd_ire.8.t: "The Empire of the Gaels"
 nd_ire.8.d: "London itself is in Irish hands. The High King of Ireland now commands the greatest empire these islands have ever known -- not built by Norman lords or Saxon kings, but by the Gaelic peoples who were here before them all. From the bogs of Connacht to the banks of the Thames, the writ of the Ard Ri runs unchallenged.\n\nThis is a moment of supreme triumph, but also of choice. The sword that won this empire can keep it -- channeling the spirit of Brian Boru into a warrior dynasty that holds its conquests through martial supremacy. Or the High King can look to Ireland's older tradition, the monastic learning that once earned it the title Island of Saints and Scholars, building an empire of the mind that outlasts any empire of the sword."
 nd_ire.8.a: "Let the sword of Brian Boru defend us."
 nd_ire.8.b: "We shall be saints and scholars once more."
 nd_ire.9.t: "The Merchant Princes of Galway"
 nd_ire.9.d: "The Fourteen Tribes of Galway -- the great merchant families who have dominated the city's trade for generations -- now operate under the patronage of the High King. Galway's harbor, facing the open Atlantic, has become the commercial heart of Ireland. Wool, hides, and fish flow outward; wine, spices, and luxury goods flow in from Iberia, France, and the Mediterranean.\n\nWith royal backing and stable governance, the merchant princes are building something unprecedented: an Irish commercial network that can compete with the great trading cities of Europe."
 nd_ire.9.a: "Galway shall be our jewel."
 nd_ire.10.t: "The Western Passage"
 nd_ire.10.d: "Irish ships have reached the Azores, planting the green banner on Atlantic islands that serve as stepping stones to the wider world. Banking institutions have been embraced, giving Ireland the financial sophistication to fund oceanic ventures. The Atlantic, once a barrier, is becoming an Irish highway.\n\nThis is a pivotal moment. The navigators who charted these routes can be honored as a new tradition -- training the next generation of Irish seafarers to explore further and fight harder on the open ocean. Alternatively, the commercial possibilities of the Azores route can be developed through factor houses -- permanent Irish trading posts that gather intelligence, cultivate contacts, and channel goods back to Ireland."
 nd_ire.10.a: "Honor the navigator tradition."
 nd_ire.10.b: "Establish factor houses abroad."
 nd_ire.11.t: "The Emerald Dominion"
 nd_ire.11.d: "From Galway to Bermuda, from the Azores to the fishing banks of the Atlantic, Ireland has built a commercial empire that spans an ocean. Irish merchants trade in every major port, Irish ships carry goods across thousands of miles of open water, and Irish gold fills the coffers of a kingdom that was once dismissed as a backwater.\n\nThe Emerald Dominion can take one of two final forms. A provision fleet -- the organized export of Irish beef, butter, and agricultural surplus -- can supply the navies and colonies of the Atlantic world, making Ireland the indispensable victualler of maritime civilization. Or Ireland can declare its ports open to all comers, creating free ports that attract merchants from every nation, making the island a neutral hub of global trade."
 nd_ire.11.a: "We shall feed the Atlantic world."
 nd_ire.11.b: "Declare our ports open to all nations."
 STATIC_MODIFIER_NAME_nd_ire_dest_highland_alliance: "Highland Alliance"
 STATIC_MODIFIER_DESC_nd_ire_dest_highland_alliance: "The Gaelic clans of Ireland and Scotland are bound by military alliance, their combined raiding tradition empowering siege warfare and plunder, though the cost of maintaining such alliances strains the treasury."
 STATIC_MODIFIER_NAME_nd_ire_dest_gaelic_renaissance: "Gaelic Renaissance"
 STATIC_MODIFIER_DESC_nd_ire_dest_gaelic_renaissance: "The union of Irish and Scottish learning sparks a revival of Gaelic scholarship, spreading institutions and prosperity while accelerating the construction of a new civilization."
 STATIC_MODIFIER_NAME_nd_ire_dest_sword_of_brian: "Sword of Brian Boru"
 STATIC_MODIFIER_DESC_nd_ire_dest_sword_of_brian: "The martial tradition of Brian Boru lives on. Irish armies move swiftly and assault fortifications with terrifying ferocity, though such aggressive warfare leaves little time for the niceties of court prestige."
 STATIC_MODIFIER_NAME_nd_ire_dest_saints_and_scholars: "Island of Saints and Scholars"
 STATIC_MODIFIER_DESC_nd_ire_dest_saints_and_scholars: "Ireland's monastic and scholarly traditions are reborn on an imperial scale, nurturing population growth and reducing the cost of construction, though the peaceful character of the court means higher military upkeep."
 STATIC_MODIFIER_NAME_nd_ire_dest_navigator_tradition: "Navigator Tradition"
 STATIC_MODIFIER_DESC_nd_ire_dest_navigator_tradition: "Irish seafarers are trained in the traditions of Atlantic navigation, exploring further and fighting harder on the open ocean, though the maritime focus draws men away from land service."
 STATIC_MODIFIER_NAME_nd_ire_dest_factor_houses: "Factor Houses"
 STATIC_MODIFIER_DESC_nd_ire_dest_factor_houses: "Permanent Irish trading posts abroad expand diplomatic reach and gather intelligence, though the comfortable profits breed a certain complacency at court."
 STATIC_MODIFIER_NAME_nd_ire_dest_provision_fleet: "Provision Fleet"
 STATIC_MODIFIER_DESC_nd_ire_dest_provision_fleet: "Ireland's agricultural bounty feeds the navies and colonies of the Atlantic world. Raw materials flow freely and naval costs are reduced, though the kingdom's dependence on peaceful commerce makes war a costlier proposition."
 STATIC_MODIFIER_NAME_nd_ire_dest_free_port: "Free Port of Ireland"
 STATIC_MODIFIER_DESC_nd_ire_dest_free_port: "Irish ports are declared open to all nations, improving foreign relations and binding subjects closer to the crown, though the open character of the kingdom means armies suffer greater attrition abroad."
 nd_ire_high_cross: "High Cross Monastery"
 nd_ire_high_cross_desc: "A great monastic complex centered on an ornate stone high cross, serving as a beacon of Gaelic learning, faith, and cultural authority in the tradition of Clonmacnoise and Glendalough."
 nd_ire_high_cross_maintenance: "Monastic Upkeep"
 nd_ire_high_cross_maintenance_desc: "Maintaining the scriptoria, reliquaries, and stone carvings of the monastic community."
 nd_ire_atlantic_exchange: "Atlantic Exchange"
 nd_ire_atlantic_exchange_desc: "A purpose-built commercial exchange where Irish, Iberian, and Atlantic merchants conduct the business of transatlantic trade, rivaling any bourse in Europe."
 nd_ire_exchange_maintenance: "Exchange Operations"
 nd_ire_exchange_maintenance_desc: "Clerks, ledgers, and runners keep the exchange functioning as goods flow between Atlantic and European markets."
