l_english:
 STATIC_MODIFIER_NAME_nd_children_of_inti: "Children of Inti"
 STATIC_MODIFIER_DESC_nd_children_of_inti: "The Sapa Inca stands as the living son of the Sun, and his warriors march beneath the golden banner of Inti with unshakeable devotion. The empire's divine mandate inspires total commitment to the defense and expansion of Tawantinsuyu."
 STATIC_MODIFIER_NAME_nd_lords_of_the_four_quarters: "Lords of the Four Quarters"
 STATIC_MODIFIER_DESC_nd_lords_of_the_four_quarters: "The genius of Tawantinsuyu lies not in conquest alone, but in the administration that follows. Through the mita labor system, the qullqa storehouses, and the quipu record-keepers, the Inca govern the largest empire in the Americas with remarkable efficiency."
 nd_inc.1.t: "The Rise of Tawantinsuyu"
 nd_inc.1.d: "The four quarters of the world now bend to the will of a single Sapa Inca. From the frigid heights of the Altiplano to the steaming jungles of the Anti Suyu, from the arid coasts of the Kunti Suyu to the vast plains of the Qulla Suyu, the realm of the four parts stands united.\n\nThe transformation from a small kingdom in the Cusco valley into a continental empire demands a choice. Shall the Sapa Inca rule as the divine son of Inti, binding his people through religious fervor and military strength? Or shall he prove his mandate through masterful administration, weaving the disparate peoples of the Andes into a single prosperous state?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_inc.1.a: "We are the Children of the Sun!"
 nd_inc.1.b: "The Four Quarters shall prosper as one."
 nd_inc.2.t: "The Reforms of Pachacuti"
 nd_inc.2.d: "The great Sapa Inca Pachacuti — the Earthshaker, the World-Transformer — has remade the state from its foundations. What was once a modest kingdom centered on the Cusco valley has been reorganized into the vast Tawantinsuyu, the realm of the four quarters.\n\nPachacuti rebuilt Cusco in the shape of a puma, established the system of four suyus each governed by an apu, reformed the mita labor service into a tool of imperial construction, and codified the laws that bind a hundred conquered peoples into one empire. His military campaigns crushed the Chancas and extended Inca dominion across the Andes.\n\nBut will his legacy be remembered primarily as a conqueror who forged an empire through martial prowess, or as a builder whose administrative genius created the most organized state in the pre-Columbian Americas?"
 nd_inc.2.a: "He shook the earth with his armies."
 nd_inc.2.b: "He raised Cusco into a wonder of the world."
 STATIC_MODIFIER_NAME_nd_inc_earthshaker_legacy: "Legacy of the Earthshaker"
 STATIC_MODIFIER_DESC_nd_inc_earthshaker_legacy: "The military genius of Pachacuti inspires our commanders. His tactics of coordinated assault and psychological warfare echo through the ranks of Tawantinsuyu's armies."
 STATIC_MODIFIER_NAME_nd_inc_builder_of_cusco: "Builder of Cusco"
 STATIC_MODIFIER_DESC_nd_inc_builder_of_cusco: "Pachacuti's vision of a rebuilt Cusco — planned, ordered, magnificent — drives our architects and administrators to construct an empire worthy of the Sapa Inca."
 nd_inc.3.t: "The Retreat to Vilcabamba"
 nd_inc.3.d: "When foreign invaders seized Cusco and shattered the old order, the sons of the Sapa Inca did not surrender. Manco Inca retreated into the cloud forests of Vilcabamba, founding a Neo-Inca state that would resist for nearly forty years. From this remote mountain stronghold, the last Incas launched raids against the occupiers, maintained the old ceremonies, and kept the flame of Tawantinsuyu alive.\n\nThe spirit of Vilcabamba teaches two lessons. One is that mountains and jungle can shield a people from any invader, that guerrilla resistance can bleed an empire. The other is that survival sometimes demands adaptation — learning the enemy's language, adopting their useful tools, and finding allies among those who also resist."
 nd_inc.3.a: "The mountains are our fortress."
 nd_inc.3.b: "We must learn from all who come."
 STATIC_MODIFIER_NAME_nd_inc_spirit_of_vilcabamba: "Spirit of Vilcabamba"
 STATIC_MODIFIER_DESC_nd_inc_spirit_of_vilcabamba: "The defiance of the Neo-Inca state at Vilcabamba lives on. Our warriors know that the mountains themselves fight alongside them, and that no invader can hold what the Andes choose to reclaim."
 STATIC_MODIFIER_NAME_nd_inc_diplomatic_adaptation: "Diplomatic Adaptation"
 STATIC_MODIFIER_DESC_nd_inc_diplomatic_adaptation: "The pragmatism of the Neo-Inca leaders — their willingness to learn foreign tongues, adopt useful technologies, and forge unexpected alliances — strengthens Tawantinsuyu's ability to navigate a changing world."
 nd_inc.4.t: "The Legacy of Tupac Amaru"
 nd_inc.4.d: "The name Tupac Amaru has become a rallying cry across the Andes. Whether it is the last Inca emperor executed by foreign conquerors in 1572, or the mestizo descendant who raised hundreds of thousands in revolt two centuries later, the name embodies the refusal of Andean peoples to accept subjugation.\n\nTupac Amaru II's rebellion of 1780 mobilized indigenous communities across Peru and Bolivia, shaking colonial rule to its foundations. His vision was of an Andean state free from foreign domination, where the old social structures would be restored and the dignity of the indigenous peoples upheld.\n\nThis legacy offers two paths: the fire of armed rebellion that would sweep away all foreign influence, or the patient work of building solidarity among all Andean peoples to create a state that draws strength from their shared heritage."
 nd_inc.4.a: "Let the fire of rebellion burn!"
 nd_inc.4.b: "Our strength lies in our unity."
 STATIC_MODIFIER_NAME_nd_inc_fire_of_rebellion: "Fire of Rebellion"
 STATIC_MODIFIER_DESC_nd_inc_fire_of_rebellion: "The revolutionary spirit of Tupac Amaru courses through our armies. Every soldier knows that they fight not merely for a king, but for the liberation of an entire people."
 STATIC_MODIFIER_NAME_nd_inc_andean_solidarity: "Andean Solidarity"
 STATIC_MODIFIER_DESC_nd_inc_andean_solidarity: "The bonds between Andean communities — Quechua, Aymara, and all the peoples of the mountains — form the foundation of a state that draws its legitimacy from the shared heritage of a continent."
 nd_inc_qhapaq_nan: "Qhapaq Nan"
 nd_inc_qhapaq_nan_desc: "The Great Inca Road, spanning over 30,000 kilometers across the Andes, enables rapid movement of armies, administrators, and trade goods throughout the empire."
 nd_inc_ayllu_reciprocity: "Ayllu Reciprocity"
 nd_inc_ayllu_reciprocity_desc: "The ayllu system of communal labor and mutual obligation forms the social bedrock of the Inca state, ensuring that no family faces hardship alone and that the state's demands are met through collective effort."
 nd_inc_sapa_inca_divinity: "Sapa Inca Divinity"
 nd_inc_sapa_inca_divinity_desc: "The Sapa Inca's status as the living son of Inti grants the empire's ruler unquestioned religious authority, reinforced through the construction of temples and the performance of sacred rituals."
 nd_inc_qullqa_logistics: "Qullqa Logistics"
 nd_inc_qullqa_logistics_desc: "The vast network of state storehouses along the Inca roads ensures that armies never go hungry, that provinces struck by disaster receive relief, and that the empire's surplus is distributed where it is needed most."
 nd_inc_andean_metallurgy: "Andean Metallurgy"
 nd_inc_andean_metallurgy_desc: "Andean peoples mastered the working of copper, tin, and their alloy bronze centuries before European contact. Inca metalworkers produced weapons, tools, and ceremonial objects of remarkable quality."
 nd_inc_waru_waru: "Waru Waru"
 nd_inc_waru_waru_desc: "The raised field farming technique of waru waru creates elevated planting surfaces surrounded by water channels, protecting crops from frost, improving drainage, and dramatically increasing yields in the challenging highland environment."
 nd_inc_pachacuti_reforms: "Pachacuti Reforms"
 nd_inc_pachacuti_reforms_desc: "The sweeping reorganization of the Inca state under Pachacuti — dividing the empire into four suyus, establishing the mita system, rebuilding Cusco, and codifying imperial law — transformed a regional kingdom into the greatest empire of the pre-Columbian Americas."
 nd_inc_anti_suyu_expansion: "Anti Suyu Expansion"
 nd_inc_anti_suyu_expansion_desc: "The Inca conquest of the eastern jungle lowlands — the Anti Suyu — required developing entirely new military tactics. Lightweight infantry trained in jungle warfare became essential for operations in the dense tropical forests east of the Andes."
 nd_inc_mit_a_imperial: "Imperial Mita"
 nd_inc_mit_a_imperial_desc: "The expansion of the mita labor tax into a comprehensive system of state-directed labor enables the construction of roads, terraces, storehouses, and fortresses across the empire, turning every citizen into a builder of Tawantinsuyu."
 nd_inc_capacocha_ritual: "Capacocha Ritual"
 nd_inc_capacocha_ritual_desc: "The capacocha ceremony — the most sacred ritual of the Inca state — consecrates the empire's most important moments: the accession of a new Sapa Inca, great military victories, or times of crisis. Children from across the four suyus are brought to Cusco before returning to their home provinces, binding the periphery to the center through shared sacred experience."
 nd_inc_yanacona_service: "Yanacona Service"
 nd_inc_yanacona_service_desc: "The yanacona — servants of the state freed from ayllu obligations — form a dedicated class of administrators, artisans, and road-maintainers who serve the Sapa Inca directly, providing the empire with a loyal cadre of skilled professionals."
 nd_inc_vilcabamba_resistance: "Vilcabamba Resistance"
 nd_inc_vilcabamba_resistance_desc: "The Neo-Inca state at Vilcabamba survived for nearly four decades in the cloud forests, proving that Andean peoples could resist even the most powerful invaders by exploiting their knowledge of mountain terrain and guerrilla tactics."
 nd_inc_highland_gunpowder: "Highland Gunpowder"
 nd_inc_highland_gunpowder_desc: "The adaptation of firearms to highland warfare demands different tactics than lowland combat. At altitude, sound carries further, powder burns differently, and the thin air affects both range and accuracy. Inca musketeers master these challenges through rigorous training in mountain conditions."
 nd_inc_tocricuc_administration: "Tocricuc Administration"
 nd_inc_tocricuc_administration_desc: "The tocricuc — provincial governors appointed by the Sapa Inca — serve as the eyes, ears, and hands of the central government in each corner of the empire. Their authority ensures that imperial decrees are carried out and local compliance is maintained."
 nd_inc_silver_mountain: "Silver Mountain"
 nd_inc_silver_mountain_desc: "The Andes contain some of the richest silver and precious metal deposits on earth. The development of advanced mining and smelting techniques transforms these mountain riches into the economic foundation of an imperial treasury."
 nd_inc_inca_road_renewal: "Inca Road Renewal"
 nd_inc_inca_road_renewal_desc: "The restoration and expansion of the ancient Qhapaq Nan road network ensures rapid communication and troop movement across the vast Andean terrain, binding the four quarters together as they were in the empire's golden age."
 nd_inc_neo_inca_reform: "Neo-Inca Reform"
 nd_inc_neo_inca_reform_desc: "Drawing on both ancient Inca traditions and modern military science, the reformed Tawantinsuyu creates disciplined standing forces capable of defending the highlands against any invader."
 nd_inc_andean_textile_trade: "Andean Textile Trade"
 nd_inc_andean_textile_trade_desc: "Highland wool and cotton, woven in the obrajes of the Andes, become sought-after trade goods. The quality of Andean textiles — inheriting a tradition stretching back thousands of years — rivals the finest cloth of any civilization."
 nd_inc_tupac_amaru_legacy: "Tupac Amaru Legacy"
 nd_inc_tupac_amaru_legacy_desc: "The name Tupac Amaru echoes across the centuries — from the last emperor beheaded in Cusco's plaza to the great rebellion of 1780 that shook colonial rule to its foundations. This legacy of resistance inspires a new generation of Andean warriors."
 nd_inc_andean_terrace_renewal: "Andean Terrace Renewal"
 nd_inc_andean_terrace_renewal_desc: "Ancient terrace systems are restored and expanded with modern agricultural knowledge, dramatically increasing food production across the highland regions and feeding a growing population."
 nd_inc_mountain_artillery: "Mountain Artillery"
 nd_inc_mountain_artillery_desc: "The placement of artillery in mountain passes and high-ground fortifications creates nearly impregnable defensive positions. No army can assault an Andean fortress without paying a terrible price in blood."
 nd_inc_apu_governance: "Apu Governance"
 nd_inc_apu_governance_desc: "The sacred apus — mountain spirits revered across the Andes — are invoked in the governance of each suyu. Provincial administrators draw legitimacy from their connection to these sacred peaks, blending spiritual authority with practical governance."
 nd_inc_tawantinsuyu_restored: "Tawantinsuyu Restored"
 nd_inc_tawantinsuyu_restored_desc: "The realm of the four quarters rises again with a modern army worthy of its ancient ambitions. Disciplined regiments trained in both highland and lowland warfare carry the banner of Tawantinsuyu into a new era."
 nd_inc_andean_enlightenment: "Andean Enlightenment"
 nd_inc_andean_enlightenment_desc: "The yachay wasi — houses of learning — spread literacy and knowledge throughout the Andes, producing a new generation of educated administrators, scientists, and philosophers who draw on both indigenous wisdom and the learning of the wider world."
 nd_inc_industrial_andes: "Industrial Andes"
 nd_inc_industrial_andes_desc: "The rich mineral resources of the Andes — copper, tin, silver, gold — are processed with modern smelting techniques, transforming the mountains into the industrial heartland of a resurgent Tawantinsuyu."
 nd_inc_inti_raymi_revival: "Inti Raymi Revival"
 nd_inc_inti_raymi_revival_desc: "The great Festival of the Sun — the Inti Raymi — is revived as the supreme cultural celebration of Tawantinsuyu, drawing pilgrims from across the four quarters to Cusco for nine days of ceremony, feasting, and renewal of the empire's divine mandate."
 nd_inc_modern_chasqui: "Modern Chasqui"
 nd_inc_modern_chasqui_desc: "The ancient relay runner system that once carried messages across the Andes at remarkable speed is modernized with postal stations, signal towers, and organized courier networks, ensuring that the Sapa Inca's word reaches every corner of the realm without delay."
 nd_inc_sovereign_andes: "Sovereign Andes"
 nd_inc_sovereign_andes_desc: "The Andes stand as a sovereign power, its armies disciplined, its people united, its mountains unconquered. The children of the Sun have reclaimed their destiny and forged a state that no foreign power can subjugate."
 a_nd_inc_runa_infantry: "Runa Infantry"
 a_nd_inc_runa_infantry_desc: "Conscripted through the mita labor system, runa infantry form the backbone of the Inca army. These common soldiers bring mountain-hardened endurance and unwavering loyalty to the service of the Sapa Inca."
 a_nd_inc_slinger: "Inca Slingers"
 a_nd_inc_slinger_desc: "Trained from childhood in the highland villages, Inca slingers can hurl stones with devastating accuracy at speeds exceeding 100 kilometers per hour. Their ranged volleys soften enemy formations before the main assault begins."
 a_nd_inc_anti_suyu_warrior: "Anti Suyu Warriors"
 a_nd_inc_anti_suyu_warrior_desc: "Specialists in jungle warfare, these light infantry are recruited from the eastern frontier of the empire. They excel at ambushes, rapid movement through dense vegetation, and fighting in terrain where heavy formations cannot operate."
 a_nd_inc_highland_musketeer: "Highland Musketeers"
 a_nd_inc_highland_musketeer_desc: "Trained to handle firearms at altitude where powder burns differently and thin air affects ballistics, highland musketeers combine the accuracy demanded by mountain warfare with the devastating firepower of gunpowder weapons."
 a_nd_inc_mountain_guard: "Mountain Guard"
 a_nd_inc_mountain_guard_desc: "Elite defenders of the Andean passes, the Mountain Guard are trained to hold positions against overwhelming odds. Their knowledge of highland terrain, combined with modern equipment and iron discipline, makes them formidable in defensive engagements."
 a_nd_inc_tawantinsuyu_regiment: "Tawantinsuyu Regiment"
 a_nd_inc_tawantinsuyu_regiment_desc: "The premier fighting force of the restored Inca Empire, these regiments combine ancient Andean martial traditions with modern military science. They fight with equal proficiency in mountain passes and open plains."
 nd_inc_coricancha: "Coricancha"
 nd_inc_coricancha_desc: "The Temple of the Sun — its walls once sheathed in gold — serves as the spiritual heart of Tawantinsuyu. Within its precincts, the Willaq Umu and his priests maintain the sacred fires and perform the rituals that bind the empire to its divine patron."
 nd_inc_imperial_qullqa: "Imperial Qullqa"
 nd_inc_imperial_qullqa_desc: "State storehouses filled with dried potatoes, maize, quinoa, and military supplies. The qullqa network ensures that no province faces famine and that armies can be fed during any campaign, embodying the redistributive genius of the Inca economy."
 nd_inc_mita_workshop: "Mita Workshop"
 nd_inc_mita_workshop_desc: "A state-organized workshop where mita laborers produce goods under imperial direction. Metalwork, masonry, and weaving are carried out with the efficiency of organized labor, transforming raw materials into the tools of empire."
 nd_inc_silver_foundry: "Silver Foundry"
 nd_inc_silver_foundry_desc: "An advanced smelting facility for processing the rich silver and copper ores of the Andes. Using traditional huayra wind furnaces enhanced with modern techniques, these foundries turn mountain wealth into imperial treasure."
 nd_inc_textile_obraje: "Andean Obraje"
 nd_inc_textile_obraje_desc: "A highland textile workshop producing fine cloth from llama and alpaca wool. Andean weaving traditions, stretching back thousands of years, produce textiles of extraordinary quality that command premium prices in markets across the known world."
 nd_inc_yachay_wasi: "Yachay Wasi"
 nd_inc_yachay_wasi_desc: "A house of learning where the knowledge of the Andes — astronomy, agriculture, medicine, engineering, and governance — is taught alongside the learning of the wider world. The yachay wasi preserves and transmits the intellectual heritage of Tawantinsuyu."
 nd_inc_coricancha_maintenance: "Temple Offerings"
 nd_inc_coricancha_maintenance_desc: "Silver, dyes, and incense are offered to maintain the sacred precincts of the Coricancha and honor Inti."
 nd_inc_qullqa_maintenance: "Storehouse Provisions"
 nd_inc_qullqa_maintenance_desc: "A steady supply of potatoes, maize, and tools fills the imperial qullqa, ready for redistribution across the empire."
 nd_inc_mita_workshop_maintenance: "Workshop Materials"
 nd_inc_mita_workshop_maintenance_desc: "Mita laborers work copper and wool into tools and implements for the state."
 nd_inc_silver_foundry_maintenance: "Smelting Fuel"
 nd_inc_silver_foundry_maintenance_desc: "The huayra wind furnaces smelt Andean ores into refined silver using charcoal and copper flux."
 nd_inc_obraje_maintenance: "Weaving Materials"
 nd_inc_obraje_maintenance_desc: "Highland wool and natural dyes are woven into fine Andean textiles of extraordinary quality."
 nd_inc_yachay_wasi_maintenance: "Academic Supplies"
 nd_inc_yachay_wasi_maintenance_desc: "Paper, dyes, and books are consumed by students and scholars studying at the yachay wasi."
 nd_inc_road_maintenance: "Qhapaq Nan Upkeep"
 nd_inc_road_maintenance_desc: "Stone, fiber cordage, and tools for the continuous repair and maintenance of the great Inca road network."
 nd_inc_terrace_intensification: "Terrace Cultivation"
 nd_inc_terrace_intensification_desc: "Potatoes, maize, and tools sustain the intensive cultivation and maintenance of the Andean terrace system."
 nd_inc_andean_smelting: "Andean Smelting"
 nd_inc_andean_smelting_desc: "Highland smelters process copper ore with charcoal fuel into tools and metalwork."
 levy_nd_inc_runa_infantry: "Runa Levy"
 levy_nd_inc_runa_infantry_desc: "Peasant conscripts raised through the mita labor obligation, forming the mass infantry of the Inca armies."
 nd_inc_formed_tt: "Inca has been formed"
 nd_inc_path_a_tt: "Chose Children of Inti"
 nd_inc_path_b_tt: "Chose Lords of the Four Quarters"
 nd_inc_destiny: "Destiny of Tawantinsuyu"
 nd_inc_destiny_desc: "The Inca Empire stands restored. With the four quarters united under a single Sapa Inca, the time has come to fulfill the greater destiny of Tawantinsuyu — whether through divine conquest or masterful administration."
 nd_inc_dest_coast: "Masters of the Coast"
 nd_inc_dest_coast_desc: "The great coastal kingdoms of Chan Chan and Arequipa must submit to the will of the Sapa Inca. Conquer these ancient centers and prove the divine mandate of Inti's children through force of arms."
 nd_inc_dest_quarters: "The Four Quarters Extended"
 nd_inc_dest_quarters_desc: "Press the borders of Tawantinsuyu to their natural limits. The northern frontier must reach Quito, and the southern Altiplano centered on sacred Tiwanaku must acknowledge the Sapa Inca's dominion."
 nd_inc_dest_tawantin: "Empire of the Sun"
 nd_inc_dest_tawantin_desc: "The supreme achievement of Inti's children: a continental empire stretching from Tumbes on the Pacific coast to the Atacama frontier at Arica, with Chuqiyapu secured in the heartland. No force on earth can challenge Tawantinsuyu."
 nd_inc_dest_quipu: "The Quipu Economy"
 nd_inc_dest_quipu_desc: "The genius of Inca administration was its ability to manage a vast economy without currency or writing. Now, embrace modern financial institutions while maintaining the redistributive spirit of the quipu system. Ensure silver flows through the capital markets."
 nd_inc_dest_tampu: "The Tampu Network"
 nd_inc_dest_tampu_desc: "Expand the network of state waystations and storehouses into a comprehensive economic infrastructure. Develop the realm's resources and embrace professional military organization to protect this prosperity."
 nd_inc_dest_suyu: "Heart of the Four Suyus"
 nd_inc_dest_suyu_desc: "The culmination of Tawantinsuyu's administrative genius: a state so prosperous and well-governed that it becomes the economic heart of the continent. Embrace the scientific revolution, accumulate wealth, and ensure gold flows through the empire's markets."
 nd_inc.5.t: "The Destiny of Tawantinsuyu"
 nd_inc.5.d: "The four quarters stand united once more, and the Sapa Inca's gaze turns toward the horizon. What began as a restoration of ancient glory now demands a greater vision — a destiny worthy of Inti's chosen people. The path forward will define whether Tawantinsuyu is remembered as the mightiest empire of the Americas, or as the most brilliantly administered state the world has ever seen."
 nd_inc.5.a: "Our destiny awaits."
 nd_inc.6.t: "The Coastal Kingdoms Submit"
 nd_inc.6.d: "The great adobe cities of the coast — Chan Chan of the Chimu, the terraced settlements of Arequipa — now fly the banner of Tawantinsuyu. Where once independent kingdoms controlled the rich fishing grounds and irrigated valleys of the Pacific shore, now the Sapa Inca's authority extends from the mountain peaks to the ocean itself.\n\nThe conquest of the coast gives Tawantinsuyu access to resources that the highlands alone could never provide: marine wealth, irrigated cotton fields, and the strategic depth of a two-front empire."
 nd_inc.6.a: "The coast bends to the will of Inti."
 nd_inc.7.t: "Expansion of the Four Quarters"
 nd_inc.7.d: "With Quito secured in the north and sacred Tiwanaku brought under the eagle banner in the south, Tawantinsuyu has grown beyond the wildest dreams of the earliest Sapa Incas. The empire now spans climatic zones from equatorial heat to the frigid Altiplano.\n\nThis vast expansion demands a choice in how the empire sustains its military power. Shall the Sapa Inca prioritize rapid mobilization of new armies from the conquered territories, or develop an intelligence network to anticipate threats before they materialize?"
 nd_inc.7.a: "Mobilize the conquered peoples."
 nd_inc.7.b: "Knowledge is the sharpest weapon."
 nd_inc.8.t: "Empire of the Sun Ascendant"
 nd_inc.8.d: "From Tumbes in the tropical north to the arid frontier at Arica, from the highland capital at Qusqu to the Altiplano stronghold of Chuqiyapu, Tawantinsuyu has achieved what no other American state has accomplished: continental dominion under a single divine ruler.\n\nThis supreme achievement demands a doctrine for maintaining eternal supremacy. Shall the empire adopt a posture of perpetual readiness for total war, crushing any threat before it can grow? Or shall it fortify its mountain strongholds into an impregnable defensive network, making any invasion of the Andes suicidal?"
 nd_inc.8.a: "We shall crush all who defy us."
 nd_inc.8.b: "The mountains are our eternal shield."
 nd_inc.9.t: "The Quipu Counts True"
 nd_inc.9.d: "The quipucamayocs — the keepers of the knotted cords — have long managed the most complex economy in the pre-Columbian Americas without written language or minted currency. Now, as modern financial institutions take root in the Andes, the administrative genius of the quipu system merges with banking and market economics.\n\nSilver from the mountain mines flows through the capital markets, and the redistributive tradition of the Inca state adapts to the demands of a monetized economy. The result is something unprecedented: an empire that combines the social safety net of communal redistribution with the dynamism of market exchange."
 nd_inc.9.a: "The quipu and the coin serve one master."
 nd_inc.10.t: "The Tampu Network Completed"
 nd_inc.10.d: "The network of state waystations — the tampu — now stretches across every corner of Tawantinsuyu, forming a commercial and logistical spine that binds the four quarters into a single economic unit. Each tampu is simultaneously a storehouse, a marketplace, a rest station for travelers, and an administrative outpost.\n\nThis infrastructure can serve different purposes. It may become the foundation for an integrated Andean market system that attracts merchants from across the continent, or it may serve primarily as a tool of diplomacy, extending the reach of Tawantinsuyu's influence far beyond its borders."
 nd_inc.10.a: "Let the markets flourish at every tampu."
 nd_inc.10.b: "Our roads carry influence as well as goods."
 nd_inc.11.t: "Heart of the Four Suyus"
 nd_inc.11.d: "Tawantinsuyu has achieved what the Sapa Inca Pachacuti could only have dreamed: an empire so wealthy, so efficiently governed, and so deeply rooted in the knowledge of both ancient Andean traditions and modern science that it stands as the economic heart of an entire continent.\n\nGold and silver flow through the empire's markets. The quipucamayocs now work alongside trained administrators. The scientific revolution has taken root in the yachay wasi academies. Two visions of the future present themselves: continental hegemony through diplomatic and economic dominance, or a perfected redistributive state that becomes a model for all civilizations."
 nd_inc.11.a: "We shall lead the continent."
 nd_inc.11.b: "The state shall provide for all."
 STATIC_MODIFIER_NAME_nd_inc_dest_rapid_mobilization: "Rapid Mobilization"
 STATIC_MODIFIER_DESC_nd_inc_dest_rapid_mobilization: "The mita labor system is adapted into a military draft that can raise armies across the four quarters with extraordinary speed, though the diversion of labor from trade weakens merchant networks."
 STATIC_MODIFIER_NAME_nd_inc_dest_imperial_scouts: "Imperial Scouts"
 STATIC_MODIFIER_DESC_nd_inc_dest_imperial_scouts: "The chasqui relay runner network is repurposed as an intelligence apparatus, carrying reports of enemy movements and foreign intrigues across the Andes at remarkable speed."
 STATIC_MODIFIER_NAME_nd_inc_dest_total_war: "Total War Doctrine"
 STATIC_MODIFIER_DESC_nd_inc_dest_total_war: "The empire adopts a doctrine of permanent readiness for war, maintaining mercenary reserves and accelerating campaigns at the cost of increased borrowing to sustain the war economy."
 STATIC_MODIFIER_NAME_nd_inc_dest_mountain_fortress: "Mountain Fortress Doctrine"
 STATIC_MODIFIER_DESC_nd_inc_dest_mountain_fortress: "The Andes themselves become a weapon. Mountain passes are fortified, garrison networks expanded, and intelligence operations hardened, making any invasion of Tawantinsuyu prohibitively costly."
 STATIC_MODIFIER_NAME_nd_inc_dest_andean_markets: "Andean Market Integration"
 STATIC_MODIFIER_DESC_nd_inc_dest_andean_markets: "The tampu network becomes the backbone of a continent-spanning market system. Merchant capacity expands, inflation stabilizes, and even the smallest ayllu benefits from guaranteed minimum trade revenue."
 STATIC_MODIFIER_NAME_nd_inc_dest_road_diplomacy: "Road Diplomacy"
 STATIC_MODIFIER_DESC_nd_inc_dest_road_diplomacy: "The Qhapaq Nan road network extends Tawantinsuyu's diplomatic reach far beyond its borders, enabling embassies and trade missions to distant lands, though the outward focus leaves garrison forces stretched thin."
 STATIC_MODIFIER_NAME_nd_inc_dest_continental_hegemon: "Continental Hegemon"
 STATIC_MODIFIER_DESC_nd_inc_dest_continental_hegemon: "Tawantinsuyu stands as the unchallenged economic and diplomatic power of the continent, its prestige attracting vassals and its administrators skilled at incorporating conquered peoples."
 STATIC_MODIFIER_NAME_nd_inc_dest_redistributive_state: "The Redistributive State"
 STATIC_MODIFIER_DESC_nd_inc_dest_redistributive_state: "The ancient Inca principle of redistribution is perfected: taxes are collected fairly, cities grow organically, and every citizen advances through merit. The state provides, and the people prosper."
 nd_inc_inti_huasi_wamani: "Inti Huasi Wamani"
 nd_inc_inti_huasi_wamani_desc: "The House of the Sun's War — a sacred military complex where warriors receive the blessing of Inti before marching to battle. Within its walls, commanders plan campaigns under golden sun discs, and soldiers train among altars where offerings ensure divine victory."
 nd_inc_imperial_tampu: "Imperial Tampu"
 nd_inc_imperial_tampu_desc: "A grand state waystation on the Qhapaq Nan that serves simultaneously as storehouse, marketplace, administrative center, and diplomatic reception hall. The tampu embodies the organizational genius of Tawantinsuyu — everything the state needs, concentrated in one efficient complex."
 nd_inc_inti_huasi_maintenance: "War Temple Offerings"
 nd_inc_inti_huasi_maintenance_desc: "Weaponry, cloth, and beeswax sustain the sacred rituals and martial preparations of the Inti Huasi Wamani."
 nd_inc_tampu_maintenance: "Waystation Provisions"
 nd_inc_tampu_maintenance_desc: "Salt, tools, and wool supply the Imperial Tampu's storehouse, trade operations, and administrative functions."
