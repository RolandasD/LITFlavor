l_english:
 STATIC_MODIFIER_NAME_nd_thunder_of_sango: "Thunder of Sango"
 STATIC_MODIFIER_DESC_nd_thunder_of_sango: "The deified Alaafin Sango, lord of thunder and lightning, watches over our horsemen. In his name, the cavalry charges that shook the savanna shall echo once more."
 STATIC_MODIFIER_NAME_nd_voice_of_the_oyo_mesi: "Voice of the Oyo Mesi"
 STATIC_MODIFIER_DESC_nd_voice_of_the_oyo_mesi: "The seven councilors speak for the people. Through the wisdom of the Bashorun and the balance of the Ogboni, no tyrant shall reign unchecked in Oyo."
 nd_oye.1.t: "The Oyo Empire Rises"
 nd_oye.1.d: "The scattered Yoruba kingdoms have been united under a single Alaafin. From the sacred city of Ile-Ife to the frontier marches, the Oyo Empire now commands the allegiance of millions. But what kind of empire shall this be? The memory of Sango — the third Alaafin, deified as the god of thunder — calls for military glory and cavalry supremacy. Yet the Oyo Mesi, the council of seven, reminds us that Oyo's true strength lies not in the charge of horsemen alone but in the constitutional balance that prevents any single hand from holding too much power. The Bashorun awaits our answer. The Ogboni elders watch. The decision we make now will echo through the ages.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_oye.1.a: "Let the thunder speak! Sango rides with our cavalry."
 nd_oye.1.b: "The Oyo Mesi shall guide us. No king rules alone."
 nd_oye.2.t: "The Eso of Ikoyi"
 nd_oye.2.d: "At the barracks of Ikoyi, seventy junior war chiefs have been formally invested as the Eso — the empire's elite cavalry corps. Nominated by the Oyo Mesi and confirmed by the Alaafin, these warriors live by a code comparable to the chivalric orders of distant lands. The Eso will form the backbone of our armies, but a question arises: should they remain a distinct elite corps answerable only to the Alaafin, or should they be distributed among the provincial armies to strengthen the whole?"
 nd_oye.2.a: "The Eso are the Alaafin's own — a sword apart."
 nd_oye.2.b: "Spread them wide. Every army shall benefit from their skill."
 STATIC_MODIFIER_NAME_nd_oye_eso_spirit: "Spirit of the Eso"
 STATIC_MODIFIER_DESC_nd_oye_eso_spirit: "The seventy war chiefs of Ikoyi ride as one, an elite cavalry corps whose dedication inspires awe."
 STATIC_MODIFIER_NAME_nd_oye_cavalry_integration: "Cavalry Integration"
 STATIC_MODIFIER_DESC_nd_oye_cavalry_integration: "The Eso's expertise has been distributed throughout the army, raising the quality of every formation."
 nd_oye.3.t: "The Bashorun Ascendant"
 nd_oye.3.d: "The Bashorun, head of the Oyo Mesi, has grown in authority. As prime minister of the empire, the Bashorun now commands influence that rivals the Alaafin himself. In the most extreme cases, tradition grants the Bashorun the terrible power of the calabash — the right to present the Alaafin with parrot eggs, compelling ritual abdication if his reign has descended into tyranny. This is the constitutional genius of Oyo: power checked by power, authority balanced by accountability. But which way shall the balance tip?"
 nd_oye.3.a: "The Bashorun speaks for the people. Strengthen the council."
 nd_oye.3.b: "The Alaafin is sovereign. Reassert royal authority."
 STATIC_MODIFIER_NAME_nd_oye_bashorun_power: "Bashorun Ascendancy"
 STATIC_MODIFIER_DESC_nd_oye_bashorun_power: "The Bashorun and Oyo Mesi exercise strong oversight, ensuring accountable governance at the cost of decisive royal action."
 STATIC_MODIFIER_NAME_nd_oye_alaafin_reassertion: "Alaafin Resurgent"
 STATIC_MODIFIER_DESC_nd_oye_alaafin_reassertion: "The Alaafin has reasserted the divine mandate of the throne, concentrating authority for swift and decisive rule."
 nd_oye.4.t: "Dahomey Subjugated"
 nd_oye.4.d: "After years of campaign, the Kingdom of Dahomey has been forced to accept Oyo suzerainty. Annual tribute in cowrie shells, cloth, and slaves shall flow northward to the Alaafin's court. More importantly, Oyo now controls the routes to the coastal ports — Ajase, Badagry, and the lagoon towns — opening the empire to Atlantic commerce. The Fon kings may chafe under our yoke, but for now the cavalry of the Eso has spoken, and Dahomey has listened."
 nd_oye.4.a: "Let the tribute flow. Oyo's reach extends to the sea."
 nd_oye.5.t: "The Aare-Ona-Kakanfo"
 nd_oye.5.d: "A new institution has been established: the Aare-Ona-Kakanfo, supreme commander of all Oyo's armies in the field. By tradition, the Aare-Ona-Kakanfo must reside in a frontier province — keeping the empire's greatest warrior far from the capital and any temptation to seize the throne. He personally commands every campaign, and his authority on the battlefield is absolute. This is Oyo's answer to the eternal dilemma of military states: how to maintain a powerful army without letting its commander become a threat to the state."
 nd_oye.5.a: "The frontier shall never be unguarded."
 nd_oye_sacred_origins: "Ile-Ife Sacred Origins"
 nd_oye_sacred_origins_desc: "The spiritual legacy of Ile-Ife, cradle of the Yoruba people, infuses our empire with divine purpose and cultural depth."
 nd_oye_mounted_traditions: "Mounted Traditions"
 nd_oye_mounted_traditions_desc: "Contact with the Nupe and Saharan peoples taught the Yoruba the art of mounted warfare, beginning a cavalry tradition that would define Oyo's military identity."
 nd_oye_ogboni_authority: "Ogboni Authority"
 nd_oye_ogboni_authority_desc: "The Ogboni secret society, composed of elder freemen, serves as a judicial check on both the Alaafin and the Oyo Mesi."
 nd_oye_yoruba_guilds: "Yoruba Craft Guilds"
 nd_oye_yoruba_guilds_desc: "Specialized artisan guilds produce cloth, ironwork, beads, and pottery of remarkable quality for both local use and export."
 nd_oye_walled_towns: "Walled Towns"
 nd_oye_walled_towns_desc: "Massive earthen fortifications — the odi — surround Yoruba towns, providing formidable defense against raiders and rival kingdoms."
 nd_oye_yam_cultivation: "Yam Cultivation"
 nd_oye_yam_cultivation_desc: "Intensive farming of yams and grains sustains the dense populations of Yoruba towns and cities."
 nd_oye_oyo_mesi: "Oyo Mesi Council"
 nd_oye_oyo_mesi_desc: "The seven principal councilors of the empire serve as both electoral college and legislative body, representing the voice of the nation."
 nd_oye_eso_training: "Eso Cavalry Training"
 nd_oye_eso_training_desc: "At the barracks of Ikoyi, the seventy Eso war chiefs train the empire's elite cavalry in the art of mounted combat."
 nd_oye_afin_tradition: "Afin Palace Tradition"
 nd_oye_afin_tradition_desc: "The Afin, the Alaafin's palace complex, serves as the ceremonial and administrative heart of the Oyo Empire."
 nd_oye_sango_cult: "Sango Cult"
 nd_oye_sango_cult_desc: "The worship of Sango, the deified third Alaafin and lord of thunder, reinforces royal legitimacy and inspires devotion."
 nd_oye_horse_trade: "Trans-Saharan Horse Trade"
 nd_oye_horse_trade_desc: "Oyo's cavalry depends on a steady supply of horses imported across the Sahara, exchanged for kola nuts, textiles, and other goods."
 nd_oye_textile_expansion: "Textile Industry"
 nd_oye_textile_expansion_desc: "Yoruba weavers produce the celebrated aso-oke cloth, a luxury textile traded across West Africa and beyond."
 nd_oye_bashorun_system: "Bashorun Institution"
 nd_oye_bashorun_system_desc: "The Bashorun, head of the Oyo Mesi, serves as prime minister with the authority to check even the Alaafin himself."
 nd_oye_tributary_system: "Tributary System"
 nd_oye_tributary_system_desc: "Through military pressure and diplomatic craft, Oyo has established a network of tributary states, including the powerful Kingdom of Dahomey."
 nd_oye_market_networks: "Royal Market Networks"
 nd_oye_market_networks_desc: "The Oja Oba — royal markets regulated under the Alaafin's authority — serve as the empire's commercial arteries."
 nd_oye_ifa_divination: "Ifa Divination"
 nd_oye_ifa_divination_desc: "The Ifa oracle, administered by the priests of Orunmila, preserves a vast corpus of sacred verses encoding Yoruba knowledge and wisdom."
 nd_oye_mounted_archer_corps: "Mounted Archer Corps"
 nd_oye_mounted_archer_corps_desc: "Light cavalry scouts trained in archery extend the empire's reach across the savanna, screening the heavy cavalry and raiding enemy supply lines."
 nd_oye_ajase_trade: "Ajase Atlantic Trade"
 nd_oye_ajase_trade_desc: "Through the coastal port of Ajase, Oyo connects to the Atlantic trading world, exchanging goods with European and American merchants."
 nd_oye_egungun_tradition: "Egungun Tradition"
 nd_oye_egungun_tradition_desc: "The Egungun masquerade cult honors departed ancestors, reinforcing social bonds and cultural identity across the empire."
 nd_oye_aare_ona_kakanfo: "Aare-Ona-Kakanfo"
 nd_oye_aare_ona_kakanfo_desc: "The supreme military commander, required to live on the frontier, embodies Oyo's ingenious solution to the problem of military power threatening political stability."
 nd_oye_vassal_administration: "Vassal Administration"
 nd_oye_vassal_administration_desc: "Oyo's sophisticated tributary system extracts wealth and loyalty from subject kingdoms while allowing them significant autonomy."
 nd_oye_kola_dominance: "Kola Nut Dominance"
 nd_oye_kola_dominance_desc: "Control over the kola nut trade — the stimulant prized across the Sahel and beyond — gives Oyo enormous economic leverage."
 nd_oye_constitutional_balance: "Constitutional Balance"
 nd_oye_constitutional_balance_desc: "The tripartite balance of Alaafin, Oyo Mesi, and Ogboni ensures that no single institution can dominate Oyo's governance."
 nd_oye_ogun_smithing: "Ogun Metalworking"
 nd_oye_ogun_smithing_desc: "Under the patronage of Ogun, deity of iron and war, Yoruba smiths forge weapons and tools of exceptional quality."
 nd_oye_yoruba_urbanization: "Yoruba Urbanization"
 nd_oye_yoruba_urbanization_desc: "The dense, prosperous cities of Yorubaland are among the largest in West Africa, centers of craft, trade, and cultural life."
 nd_oye_indigo_trade: "Indigo Dyeing Trade"
 nd_oye_indigo_trade_desc: "Yoruba dyers master the art of indigo, producing richly colored textiles that command premium prices in regional markets."
 nd_oye_balogun_system: "Balogun System"
 nd_oye_balogun_system_desc: "Provincial war chiefs — the Balogun — command professional armies, providing a disciplined military hierarchy beneath the Aare-Ona-Kakanfo."
 nd_oye_diplomatic_craft: "Diplomatic Craft"
 nd_oye_diplomatic_craft_desc: "Oyo's diplomats navigate complex relationships with European traders, neighboring kingdoms, and tributary states with sophistication."
 nd_oye_agricultural_reform: "Agricultural Reform"
 nd_oye_agricultural_reform_desc: "Improved farming techniques and land management sustain the empire's growing population and urban centers."
 nd_oye_firearms_adoption: "Firearms Adoption"
 nd_oye_firearms_adoption_desc: "European firearms are integrated into Oyo's military alongside the traditional cavalry, creating a versatile combined-arms force."
 nd_oye_atlantic_commerce: "Atlantic Commerce"
 nd_oye_atlantic_commerce_desc: "The port of Ajase flourishes as Oyo's gateway to the Atlantic world, channeling wealth from intercontinental trade."
 nd_oye_royal_jurisprudence: "Royal Jurisprudence"
 nd_oye_royal_jurisprudence_desc: "The codification of Yoruba customary law strengthens the empire's legal framework and extends royal authority."
 nd_oye_political_resilience: "Political Resilience"
 nd_oye_political_resilience_desc: "Oyo's constitutional traditions prove their worth in times of crisis, enabling the empire to survive internal upheaval."
 nd_oye_military_adaptation: "Military Adaptation"
 nd_oye_military_adaptation_desc: "The empire adapts its military traditions to the changing nature of warfare, blending cavalry prowess with modern tactics."
 nd_oye_cultural_renaissance: "Yoruba Cultural Renaissance"
 nd_oye_cultural_renaissance_desc: "A flowering of Yoruba arts, literature, and philosophy reinforces cultural identity in an era of global transformation."
 nd_oye_market_modernization: "Market Modernization"
 nd_oye_market_modernization_desc: "Traditional Yoruba markets evolve into sophisticated commercial centers, integrating new goods and trading methods."
 nd_oye_confederal_reform: "Confederal Reform"
 nd_oye_confederal_reform_desc: "Decentralized governance allows diverse peoples to maintain their identities while contributing to the empire's strength."
 nd_oye_diaspora_traditions: "Diaspora Traditions"
 nd_oye_diaspora_traditions_desc: "Yoruba cultural influence spreads far beyond the empire's borders, carried by traders, scholars, and the currents of history."
 a_nd_oye_ilari: "Ilari Royal Guard"
 a_nd_oye_ilari_desc: "The Ilari are the Alaafin's personal bodyguard, identifiable by their half-shaved heads. Drawn from the palace household, they serve as both guards and messengers of royal authority."
 a_nd_oye_heavy_cavalry: "Oyo Heavy Cavalry"
 a_nd_oye_heavy_cavalry_desc: "Armored horsemen mounted on large horses imported from across the Sahara. These heavy cavalry deliver devastating shock charges that shatter enemy formations."
 a_nd_oye_heavy_cavalry_levy: "Oyo Heavy Cavalry"
 a_nd_oye_heavy_cavalry_levy_desc: "Noble cavalrymen raised through the levy system, fighting in the heavy cavalry tradition of the Oyo Empire."
 a_nd_oye_balogun_guard: "Balogun Guard"
 a_nd_oye_balogun_guard_desc: "Professional infantry serving under provincial war chiefs. The Balogun Guard represents the evolution of Oyo's military from cavalry dominance to combined-arms warfare."
 a_nd_oye_mounted_archers: "Oyo Mounted Archers"
 a_nd_oye_mounted_archers_desc: "Swift light cavalry armed with bows, specializing in scouting, flanking, and harassing enemy forces across the open savanna."
 nd_oye_afin: "Afin"
 nd_oye_afin_desc: "The Alaafin's palace complex, a sprawling compound of courtyards, audience halls, and ritual spaces that serves as the political and ceremonial heart of the empire."
 nd_oye_oja_oba: "Oja Oba"
 nd_oye_oja_oba_desc: "A royal market regulated under the Alaafin's authority, where merchants from across West Africa trade in kola nuts, textiles, livestock, and luxury goods."
 nd_oye_oko_oba: "Oko Oba"
 nd_oye_oko_oba_desc: "A royal farmstead for organized yam cultivation. Yams were the dietary foundation of Oyo's population and the agricultural surplus that sustained its imperial ambitions."
 nd_oye_farm_upkeep: "Farm Operations"
 nd_oye_farm_upkeep_desc: "Timber and tools for hoe handles, storage barns, and fencing around the royal yam fields."
 nd_oye_ogboni_lodge: "Ogboni Lodge"
 nd_oye_ogboni_lodge_desc: "The meeting place of the Ogboni secret society, where elder freemen deliberate on matters of justice, religion, and the proper limits of royal power."
 nd_oye_ile_ikoyi: "Ile Ikoyi"
 nd_oye_ile_ikoyi_desc: "The barracks and training grounds of the Eso cavalry corps at Ikoyi, where the seventy junior war chiefs hone their skills in mounted combat."
 nd_oye_sango_shrine: "Sango Shrine"
 nd_oye_sango_shrine_desc: "A temple dedicated to Sango, the deified Alaafin and lord of thunder, where devotees honor the deity with bata drums and ritual offerings."
 nd_oye_ile_ise: "Ile Ise"
 nd_oye_ile_ise_desc: "A Yoruba artisan workshop where skilled craftspeople produce cloth, metalwork, beadwork, and pottery in the guild tradition."
 nd_oye_odi: "Odi"
 nd_oye_odi_desc: "A massive earthen fortification wall surrounding a Yoruba town, built from packed earth and reinforced with timber. These walls could reach heights of twenty feet."
 nd_oye_ile_bata: "Ile Bata"
 nd_oye_ile_bata_desc: "A drum house where master drummers craft and play the sacred bata drums, used in Sango worship and as a long-distance communication system across the empire."
 nd_oye_aso_oke_weaving: "Aso-Oke Weaving"
 nd_oye_aso_oke_weaving_desc: "The traditional Yoruba art of weaving aso-oke cloth from locally produced cotton and imported dyes."
 nd_oye_kola_processing: "Kola Processing"
 nd_oye_kola_processing_desc: "Processing kola nuts into medicinal stimulants, packaged in pottery vessels for the trans-Saharan caravan trade."
 nd_oye_indigo_dyeing: "Indigo Dyeing"
 nd_oye_indigo_dyeing_desc: "The Yoruba mastery of indigo extraction and cloth dyeing, producing deeply colored textiles prized across West Africa."
 nd_oye_horse_breeding: "Horse Breeding"
 nd_oye_horse_breeding_desc: "Maintaining and breeding cavalry mounts from stock imported across the Sahara, requiring livestock, existing horses, and grain for fodder."
 nd_oye_ogun_ironwork: "Ogun Ironworking"
 nd_oye_ogun_ironwork_desc: "Sacred metalworking under the patronage of Ogun, deity of iron, consuming iron ore, charcoal lumber, and finished weapons in the forge."
 nd_oye_yam_farming: "Yam Farming"
 nd_oye_yam_farming_desc: "Intensive cultivation of yams and grain, the staple foods of Yorubaland, producing surplus for the empire's growing cities."
 nd_oye_ajase_port_ops: "Ajase Port Operations"
 nd_oye_ajase_port_ops_desc: "Coastal trade logistics at the port of Ajase, handling goods bound for Atlantic markets."
 nd_oye_ifa_consultation: "Ifa Consultation"
 nd_oye_ifa_consultation_desc: "The sacred art of Ifa divination, preserving and transmitting Yoruba knowledge through an oral corpus of hundreds of verses."
 nd_oye_modern_manufacturing: "Yoruba Manufacturing"
 nd_oye_modern_manufacturing_desc: "Modern production methods applied to traditional Yoruba industries, combining ancestral skill with new techniques."
 nd_oye_afin_maintenance: "Palace Upkeep"
 nd_oye_afin_maintenance_desc: "The cloth, dyes, paper, furniture, and fine cloth consumed in maintaining the splendor of the Alaafin's palace and its administrative functions."
 nd_oye_market_maintenance: "Market Operations"
 nd_oye_market_maintenance_desc: "The livestock and cloth consumed in operating and stocking the royal market."
 nd_oye_ogboni_maintenance: "Lodge Upkeep"
 nd_oye_ogboni_maintenance_desc: "The ritual materials consumed in Ogboni ceremonies and lodge maintenance."
 nd_oye_ikoyi_maintenance: "Barracks Upkeep"
 nd_oye_ikoyi_maintenance_desc: "The horses, weapons, and leather consumed in maintaining the Eso cavalry barracks and equipping its warriors."
 nd_oye_shrine_maintenance: "Shrine Offerings"
 nd_oye_shrine_maintenance_desc: "The livestock and ritual materials consumed in honoring Sango at his shrine."
 nd_oye_craft_maintenance: "Cloth Production"
 nd_oye_craft_maintenance_desc: "Yoruba artisans weave dyed wool into cloth of remarkable quality in the guild workshop tradition."
 nd_oye_odi_maintenance: "Wall Maintenance"
 nd_oye_odi_maintenance_desc: "The timber, stone, and tools consumed in maintaining the earthen fortification walls of Yoruba towns."
 nd_oye_drum_maintenance: "Drum Materials"
 nd_oye_drum_maintenance_desc: "The wood and leather consumed in crafting and maintaining the sacred bata drums."
 levy_nd_oye_ilari: "Ilari Royal Guard"
 levy_nd_oye_ilari_desc: "The Alaafin's personal bodyguard, raised from the soldier class of the palace household."
 levy_nd_oye_heavy_cavalry: "Oyo Heavy Cavalry"
 levy_nd_oye_heavy_cavalry_desc: "Noble-born cavalry raised through the levy system, fighting in Oyo's tradition of armored mounted warfare."
 nd_oye_formed_tt: "Oyo Empire has been formed"
 nd_oye_path_a_tt: "Chose Thunder of Sango"
 nd_oye_path_b_tt: "Chose Voice of the Oyo Mesi"
 nd_oye_destiny: "Destiny of the Oyo Empire"
 nd_oye_destiny_desc: "The Oyo Empire has been proclaimed. A stable foundation must be laid before the empire can pursue its greater ambitions."
 nd_oye_dest_nupe_conquest: "Subjugation of Nupe"
 nd_oye_dest_nupe_conquest_desc: "The Nupe kingdom has long rivaled Oyo for control of the Middle Niger. Conquer Bida and Lokoja to secure the empire's northern flank and open the road to the Sahel."
 nd_oye_dest_hausa_campaign: "The Hausa Campaign"
 nd_oye_dest_hausa_campaign_desc: "With Nupe broken, the wealthy Hausa city-states of Kano and Katsina beckon. Their markets, dye pits, and leather works represent the richest prizes in the western Sudan."
 nd_oye_dest_lord_of_sahel: "Lord of the Sahel"
 nd_oye_dest_lord_of_sahel_desc: "From the forests of Yorubaland to the sands of the Sahel, the Oyo Empire shall eclipse the old empires of Mali and Songhai. Timbuktu and Gao must acknowledge Sango's thunder."
 nd_oye_dest_coastal_access: "Coastal Reach"
 nd_oye_dest_coastal_access_desc: "The Oyo Mesi's vision demands control of the coast. Secure Ajase and Accra to establish the empire's maritime commerce and connect Yoruba markets to the Atlantic world."
 nd_oye_dest_trade_ascendancy: "Trade Ascendancy"
 nd_oye_dest_trade_ascendancy_desc: "With coastal ports secured, the empire must develop sophisticated financial institutions and ensure ivory flows through our markets. Embrace banking and dominate the ivory trade."
 nd_oye_dest_merchant_empire: "The Merchant Empire"
 nd_oye_dest_merchant_empire_desc: "The constitutional genius of the Oyo Mesi has built an empire of commerce. Extend our trade networks to Kumasi and Djenne, the great market cities of West Africa."
 nd_oye.6.t: "The Oyo Destiny"
 nd_oye.6.d: "The Alaafin sits upon the throne of a stable empire. From the sacred groves of Ile-Ife to the frontier towns, the Oyo people look to their sovereign with expectation. What began as a union of Yoruba kingdoms now stands ready to become something greater. The question is not whether Oyo shall rise, but how high."
 nd_oye.6.a: "The destiny of Oyo is written in the stars."
 nd_oye.7.t: "The Nupe Subjugated"
 nd_oye.7.d: "The cavalry of the Eso have thundered across the Niger and broken the power of the Nupe kingdom. Bida, their ancient capital, now flies the banner of the Alaafin. The Middle Niger, long contested, is ours. Control of Lokoja at the confluence of the Niger and Benue rivers gives us command of the great waterways. The road to the Sahel lies open."
 nd_oye.7.a: "The Nupe shall learn to serve the Alaafin."
 nd_oye.8.t: "The Fall of Kano"
 nd_oye.8.d: "The great walls of Kano have fallen to Oyo's cavalry. The Hausa city-states, famed for their wealth, their indigo dye pits, and their role in the trans-Saharan trade, are now subject to the Alaafin's authority. This is a conquest without precedent in Yoruba history. But how shall we govern these distant, wealthy cities? The generals debate: press the advantage with relentless speed, or consolidate our supply lines for the long campaign ahead?"
 nd_oye.8.a: "Strike while the iron is hot. Speed is our weapon."
 nd_oye.8.b: "Secure our supply lines. The savanna is vast."
 nd_oye.9.t: "Lord of the Sahel"
 nd_oye.9.d: "From the forests of Yorubaland to the bend of the Niger, from Timbuktu's libraries to Gao's river port, the Oyo Empire now commands a domain that dwarfs the old empires of Mali and Songhai. The Alaafin's name is spoken with awe from the Atlantic coast to the edge of the Sahara. Sango's thunder echoes across the western Sudan. Shall we rule this vast domain through divine authority, or through the pragmatic administration of a settled hegemony?"
 nd_oye.9.a: "Sango's thunder commands obedience."
 nd_oye.9.b: "A lasting empire requires lasting institutions."
 nd_oye.10.t: "The Ports of the Atlantic"
 nd_oye.10.d: "The Oyo Mesi's strategy bears fruit. Ajase and the coastal towns of the Gold Coast now answer to the Alaafin's merchants. Canoes laden with cloth, kola nuts, and ivory journey down the lagoons to meet European and American traders at the coast. The Yoruba interior, long isolated from the sea, now commands a window onto the Atlantic world. The constitutional architects of the Oyo Mesi have proven that wealth flows more readily to those who trade than to those who merely conquer."
 nd_oye.10.a: "The sea shall carry Oyo's wealth to the world."
 nd_oye.11.t: "The Ivory Markets"
 nd_oye.11.d: "Oyo's markets have become the crossroads of West African commerce. Ivory from the interior, cloth from Yoruba looms, kola nuts from the forests, and European goods from the coast all pass through our regulated markets under the watchful eye of the Oyo Mesi. Banking institutions have taken root, and the empire's financial sophistication rivals that of distant trading powers. But how shall we deploy this commercial might? Shall we build grand market cities, or invest in the roads and relationships that sustain trade?"
 nd_oye.11.a: "Build the markets. Let traders come to us."
 nd_oye.11.b: "Invest in the roads. Trade follows the path."
 nd_oye.12.t: "The Merchant Empire"
 nd_oye.12.d: "From Kumasi in the west to Djenne on the Niger, Oyo's merchants dominate the trade of West Africa. The Oyo Mesi's constitutional vision has created something unprecedented: an empire built not on cavalry charges but on contract law, regulated markets, and diplomatic finesse. The Alaafin reigns but does not rule alone; the council governs but cannot overreach. This balance, refined over generations, has produced an empire of remarkable stability and prosperity. What shall be its ultimate expression?"
 nd_oye.12.a: "The council's wisdom is the empire's strength."
 nd_oye.12.b: "Open the gates. Oyo trades with all the world."
 STATIC_MODIFIER_NAME_nd_oye_dest_cavalry_supremacy: "Cavalry Supremacy"
 STATIC_MODIFIER_DESC_nd_oye_dest_cavalry_supremacy: "The Eso cavalry strikes with devastating speed, overwhelming defenders before they can organize a response."
 STATIC_MODIFIER_NAME_nd_oye_dest_scorched_savanna: "Scorched Savanna"
 STATIC_MODIFIER_DESC_nd_oye_dest_scorched_savanna: "Oyo's logistical mastery of the savanna ensures our armies are fed while the enemy starves, though the cost of maintaining distant supply lines strains the treasury."
 STATIC_MODIFIER_NAME_nd_oye_dest_sango_dominion: "Sango's Dominion"
 STATIC_MODIFIER_DESC_nd_oye_dest_sango_dominion: "The divine authority of Sango commands swift obedience. Conquered peoples submit to the thunder god's chosen, and new warriors flock to the Alaafin's banner."
 STATIC_MODIFIER_NAME_nd_oye_dest_sahel_hegemony: "Sahel Hegemony"
 STATIC_MODIFIER_DESC_nd_oye_dest_sahel_hegemony: "The vast Sahel has been pacified and integrated into a stable imperial administration, with fortified towns securing the peace."
 STATIC_MODIFIER_NAME_nd_oye_dest_market_mastery: "Market Mastery"
 STATIC_MODIFIER_DESC_nd_oye_dest_market_mastery: "Oyo's regulated markets have become the commercial engine of West Africa, though the expanding bureaucracy demands its share."
 STATIC_MODIFIER_NAME_nd_oye_dest_ivory_roads: "Ivory Roads"
 STATIC_MODIFIER_DESC_nd_oye_dest_ivory_roads: "Trade routes radiating from Oyo carry ivory, cloth, and kola nuts to distant markets, binding diverse peoples into a shared commercial culture."
 STATIC_MODIFIER_NAME_nd_oye_dest_oyo_mesi_ascendant: "Oyo Mesi Ascendant"
 STATIC_MODIFIER_DESC_nd_oye_dest_oyo_mesi_ascendant: "The constitutional mastery of the Oyo Mesi has produced an empire of laws, roads, and diplomatic sophistication unmatched in West Africa."
 STATIC_MODIFIER_NAME_nd_oye_dest_atlantic_gateway: "Atlantic Gateway"
 STATIC_MODIFIER_DESC_nd_oye_dest_atlantic_gateway: "Oyo's coastal ports connect the interior to the Atlantic world, channeling wealth from intercontinental commerce into the empire's heartland."
 nd_oye_ile_ogun: "Ile Ogun"
 nd_oye_ile_ogun_desc: "A sacred war shrine dedicated to Ogun, deity of iron and warfare, serving as both arsenal and spiritual center for the empire's military campaigns."
 nd_oye_ogun_arsenal_maintenance: "Arsenal Operations"
 nd_oye_ogun_arsenal_maintenance_desc: "The weapons, iron, leather, and horses consumed in maintaining the sacred arsenal of Ogun and equipping the empire's armies."
 nd_oye_ile_owu: "Ile Owu"
 nd_oye_ile_owu_desc: "A grand merchant guild house where Yoruba traders, governed by the Oyo Mesi's commercial regulations, coordinate the empire's far-reaching trade networks."
 nd_oye_owu_maintenance: "Guild Operations"
 nd_oye_owu_maintenance_desc: "The cloth, ivory, paper, and pottery consumed in operating the merchant guild house and maintaining its commercial records."
