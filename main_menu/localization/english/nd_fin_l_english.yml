l_english:
 STATIC_MODIFIER_NAME_nd_fin_thousand_lakes: "Land of a Thousand Lakes"
 STATIC_MODIFIER_DESC_nd_fin_thousand_lakes: "Finland's identity is forged in its vast wilderness — dense forests, frozen lakes, and unyielding terrain that has shaped a people of extraordinary resilience. The Finnish frontier is a shield against any invader, where every forest trail becomes an ambush and every frozen lake a barrier."
 STATIC_MODIFIER_NAME_nd_fin_northern_trade: "Northern Trade Ways"
 STATIC_MODIFIER_DESC_nd_fin_northern_trade: "From the tar kilns of Ostrobothnia to the fur markets of the interior, Finland's wealth flows through its forests and waterways. Finnish tar seals the hulls of Europe's navies, Finnish furs warm the courts of the continent, and Finnish timber builds the cities of the Baltic."
 STATIC_MODIFIER_NAME_nd_fin_agricola_legacy: "Agricola's Legacy"
 STATIC_MODIFIER_DESC_nd_fin_agricola_legacy: "The work of Mikael Agricola lives on — a written Finnish language, a literate congregation, and a people who can read the word of God in their own tongue. This foundation of literacy and learning will serve Finland for centuries to come."
 STATIC_MODIFIER_NAME_nd_fin_great_wrath_survival: "Survivors of the Great Wrath"
 STATIC_MODIFIER_DESC_nd_fin_great_wrath_survival: "The years of Russian occupation tested Finland to its limits — villages burned, populations deported, an entire generation scarred. But the Finnish people endured, and from the ashes of the Great Wrath emerged a nation hardened by suffering and determined to rebuild."
 nd_fin.1.t: "The Birth of Finland"
 nd_fin.1.d: "The Finnish lands have been united under a single banner for the first time. For centuries, these territories at the edge of the known world served as a frontier between East and West — a land of endless forests, countless lakes, and a people hardened by the harshest winters in Europe. Now the question falls to us: what shall Finland become? Shall we embrace the character of our land — the impenetrable wilderness, the frozen lakes that swallow armies, the sisu that lets our people endure what others cannot? Or shall we look outward to the trade routes that connect us to the wider world — the tar that every navy needs, the furs that every court desires, the timber that builds the ships of nations?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_fin.1.a: "We are the land itself — let invaders break upon our forests."
 nd_fin.1.b: "Our wealth flows through our rivers and forests to the world."
 nd_fin.2.t: "The Father of Finnish Letters"
 nd_fin.2.d: "Mikael Agricola, Bishop of Turku and student of Martin Luther himself, has completed his life's work — the translation of the New Testament into Finnish. For the first time, the Finnish language exists in written form. His Abckiria taught our people their letters, his Rucouskiria gave them prayers in their own tongue, and now Se Wsi Testamenti brings the word of God to every Finnish-speaking congregation. This is more than a religious achievement — it is the birth of Finnish literacy, the foundation upon which all future learning will be built. Agricola has given the Finnish people a voice that can endure across the centuries."
 nd_fin.2.a: "Let Agricola's work illuminate the minds of all Finns."
 nd_fin.2.b: "A written language forges a people's identity."
 nd_fin.3.t: "After the Great Wrath"
 nd_fin.3.d: "The years of Russian occupation — the Isoviha, the Great Wrath — have finally ended. The toll has been catastrophic: thousands deported to build St. Petersburg, villages across Finland put to the torch, women and children taken as captives. In Ostrobothnia alone, half the population perished or fled. But Finland survives. The burned farmsteads can be rebuilt, the forests replanted, the population slowly recovered. The question is how we face this recovery. Do we harden ourselves against future invasion, building our military strength so that such devastation never occurs again? Or do we focus on rebuilding what was lost — restoring stability, growing our population, and healing the wounds of occupation?"
 nd_fin.3.a: "Never again — we must be strong enough to resist any invader."
 nd_fin.3.b: "We shall never be conquered so easily again."
 nd_fin.4.t: "The Finnish National Awakening"
 nd_fin.4.d: "A new spirit stirs across Finland. Scholars, poets, and patriots have begun to articulate what it means to be Finnish — not as subjects of a greater power, but as a people with their own language, their own traditions, their own destiny. The Kalevala, compiled from ancient oral poetry, has given the Finnish people an epic to rival Homer. The Finnish language, once dismissed as a peasant tongue, is finding its voice in literature, science, and governance. Newspapers in Finnish spread ideas of national consciousness to every corner of the land. This awakening is not born of revolution but of culture — the quiet conviction that a people who share a language, a landscape, and a history deserve to shape their own future."
 nd_fin.4.a: "Finland shall find its voice."
 nd_fin_rajakartano: "Rajakartano"
 nd_fin_rajakartano_desc: "Fortified border manors serving as military outposts and administrative centers along the Finnish frontier, their garrisons providing the first line of defense against eastern raiders."
 nd_fin_rajasotilaat: "Border Soldiers"
 nd_fin_rajasotilaat_desc: "The eastern frontier bred a distinctive warrior tradition. Finnish border soldiers learned to fight in dense forests and frozen terrain, developing defensive tactics that exploited the landscape against numerically superior foes."
 nd_fin_kaskiviljely: "Kaskiviljely"
 nd_fin_kaskiviljely_desc: "The Finnish technique of slash-and-burn agriculture transformed dense pine and spruce forests into fertile cropland. Though the fields lasted only a few years, the yields were extraordinary — up to a hundred-fold return on seed."
 nd_fin_turkiskauppa: "Turkiskauppa"
 nd_fin_turkiskauppa_desc: "Finland's vast forests teemed with fur-bearing animals, and the fur trade connected even the most remote Finnish settlements to the markets of Europe. The Finnish word 'raha' — meaning money — originally meant 'fur pelt.'"
 nd_fin_frontier_resilience: "Frontier Resilience"
 nd_fin_frontier_resilience_desc: "Life on the eastern frontier forged a unique Finnish character — the capacity to endure hardship, adapt to adversity, and fight tenaciously in defense of home and hearth."
 nd_fin_savusauna: "Savusauna Tradition"
 nd_fin_savusauna_desc: "The smoke sauna is the heart of Finnish community life. More than mere bathing, the sauna served as birthplace, healing house, and sacred space — the cleanest room in any Finnish settlement."
 nd_fin_erametsastajat: "Erämetsästäjät"
 nd_fin_erametsastajat_desc: "Finnish wilderness hunters roamed the vast interior forests, tracking game and guarding against intruders. Their intimate knowledge of the terrain made them invaluable as scouts and skirmishers."
 nd_fin_kirkkotraditio: "Finnish Church Tradition"
 nd_fin_kirkkotraditio_desc: "The Finnish church developed its own character within the wider Christian world, with parish churches serving as centers of both spiritual life and communal governance in the scattered Finnish settlements."
 nd_fin_kauppakonttori: "Kauppakonttori Tradition"
 nd_fin_kauppakonttori_desc: "Finnish trading posts connected the resources of the interior — furs, tar, timber — to the Hanseatic trade networks of the Baltic, bringing European goods and ideas to even the most remote Finnish towns."
 nd_fin_linnarakennus: "Castle-Building Tradition"
 nd_fin_linnarakennus_desc: "The great castles of Turku and Häme anchored Swedish-Finnish control over the region, serving as administrative centers and military strongholds that projected authority across the Finnish wilderness."
 nd_fin_tervanpolttaja: "Tervanpolttaja Tradition"
 nd_fin_tervanpolttaja_desc: "Finnish tar kilns transformed the pine forests of Ostrobothnia into the naval stores that sealed the hulls of European fleets. By the 17th century, Finland produced over 80% of all Swedish tar exports."
 nd_fin_tervakauppa: "Tervakauppa"
 nd_fin_tervakauppa_desc: "The tar trade connected Finnish producers to the great shipbuilding centers of Europe. The Netherlands alone consumed three-quarters of Finnish tar output, and the trade brought unprecedented wealth to the coastal towns of Oulu and Kokkola."
 nd_fin_agricola: "Mikael Agricola's Work"
 nd_fin_agricola_desc: "Mikael Agricola, Bishop of Turku, created the written Finnish language and translated the New Testament into Finnish in 1548 — laying the foundation for Finnish literacy and cultural identity."
 nd_fin_olavinlinna: "Olavinlinna Tradition"
 nd_fin_olavinlinna_desc: "The fortress of Olavinlinna — St. Olaf's Castle — stands as the northernmost medieval stone fortress in the world, built to guard the contested frontier between Sweden-Finland and Novgorod."
 nd_fin_rajapuolustus: "Rajapuolustus"
 nd_fin_rajapuolustus_desc: "The organized defense of the Finnish border evolved from scattered manor garrisons into a systematic frontier defense, with disciplined troops trained to exploit the forests and waterways of the borderlands."
 nd_fin_talvisoturi: "Talvisoturi"
 nd_fin_talvisoturi_desc: "The harsh Finnish winters breed warriors unlike any in Europe. Winter soldiers move on skis through deep snow, fight in conditions that paralyze conventional armies, and use the frozen landscape itself as a weapon."
 nd_fin_uskonpuhdistus: "Finnish Reformation"
 nd_fin_uskonpuhdistus_desc: "The Reformation reached Finland through Mikael Agricola and other students of Luther. Unlike many European countries, Finland's Reformation was peaceful — a gradual transformation that brought literacy, education, and religious renewal."
 nd_fin_talonpoikaisarmeija: "Talonpoikaisarmeija"
 nd_fin_talonpoikaisarmeija_desc: "Finnish peasant warriors have fought in every conflict on the eastern frontier. Hardened by farming in the harshest conditions in Europe, they bring the same stubborn endurance to the battlefield."
 nd_fin_pohjanmaan_kauppa: "Ostrobothnian Trade Network"
 nd_fin_pohjanmaan_kauppa_desc: "The merchants of Ostrobothnia built a trade network that connected Finnish tar, timber, and furs to the markets of Europe, making the coastal towns of Oulu, Kokkola, and Vaasa prosperous trading centers."
 nd_fin_sahalaitos: "Sahalaitos Tradition"
 nd_fin_sahalaitos_desc: "The development of water-powered sawmills transformed Finland's timber industry. Sawn lumber could be exported in far greater quantities than raw logs, turning the endless Finnish forests into a source of industrial wealth."
 nd_fin_merilinnoitus: "Merilinnoitus Tradition"
 nd_fin_merilinnoitus_desc: "The great sea fortress guarding Helsinki harbor — built on a chain of islands at the entrance to the port — represents the apex of Finnish coastal defense, combining naval power with impregnable fortification."
 nd_fin_isonvihan_toipuminen: "Recovery from the Great Wrath"
 nd_fin_isonvihan_toipuminen_desc: "The catastrophic Russian occupation of 1714-1721 devastated Finland — whole provinces were depopulated, thousands deported to build St. Petersburg. The recovery took decades but forged a people of extraordinary resilience."
 nd_fin_rajahallinnan_uudistus: "Frontier Administration Reform"
 nd_fin_rajahallinnan_uudistus_desc: "The modernization of Finnish frontier administration brought effective governance to even the most remote districts, replacing ad hoc border defense with systematic provincial management."
 nd_fin_puutavaravienti: "Puutavaravienti"
 nd_fin_puutavaravienti_desc: "Finnish lumber exports grew dramatically in the 18th century as the sawmill industry expanded. Processed timber, naval stores, and tar flowed from Finnish ports to the shipyards and construction sites of Europe."
 nd_fin_jaakarit: "Jääkärit"
 nd_fin_jaakarit_desc: "Finnish Jaegers — light infantry specialists trained in independent skirmish tactics, expert marksmen who fight in small units across difficult terrain. Their mastery of forest warfare makes them elite troops."
 nd_fin_kansallisheratys: "Finnish National Awakening"
 nd_fin_kansallisheratys_desc: "The compilation of the Kalevala from ancient oral poetry, the rise of Finnish-language literature, and the spread of national consciousness through newspapers and education transformed Finnish identity from a regional dialect into a national culture."
 nd_fin_ruukki: "Ruukki Tradition"
 nd_fin_ruukki_desc: "Finnish ironworks — ruukit — combined the country's rich iron ore deposits with abundant charcoal from the forests to produce high-quality iron. These early industrial establishments laid the groundwork for Finnish manufacturing."
 nd_fin_sisu: "Sisu"
 nd_fin_sisu_desc: "Sisu — the Finnish concept of extraordinary determination, courage, and resilience in the face of overwhelming adversity. It is not mere stubbornness but a profound national character forged by centuries of frontier hardship."
 a_nd_fin_rajasotilaat: "Rajasotilaat"
 a_nd_fin_rajasotilaat_desc: "Finnish border soldiers — hardy frontier infantry trained to defend the eastern borderlands through ambush, fortification, and stubborn resistance in the forests and marshes."
 a_nd_fin_erametsastajat: "Erämetsästäjät"
 a_nd_fin_erametsastajat_desc: "Finnish wilderness hunters — woodsmen-scouts who know every trail, lake, and hiding place in the vast interior forests. They move fast, strike from concealment, and vanish into the trees."
 a_nd_fin_rajapuolustaja: "Rajapuolustajat"
 a_nd_fin_rajapuolustaja_desc: "Finnish border defenders — organized frontier garrison troops who combine pike discipline with the defensive instincts bred by generations of border warfare."
 a_nd_fin_talvisoturi: "Talvisoturit"
 a_nd_fin_talvisoturi_desc: "Elite Finnish winter warriors — infantry adapted to fight in the harshest conditions, exploiting snow, ice, and frozen terrain to neutralize numerical superiority."
 a_nd_fin_talonpoikaissoturi: "Talonpoikaissoturit"
 a_nd_fin_talonpoikaissoturi_desc: "Finnish peasant warriors — farmers who take up arms when the frontier is threatened, bringing the same unyielding endurance to battle that sustains them through the northern winters."
 a_nd_fin_jaakari: "Jääkärit"
 a_nd_fin_jaakari_desc: "Finnish Jaegers — elite light infantry trained in independent skirmish tactics. Expert marksmen fighting in small detachments, they excel in forest warfare and irregular combat."
 nd_fin_fur_trading: "Finnish Fur Trading"
 nd_fin_fur_trading_desc: "The organized trade in beaver, fox, and sable pelts from Finland's vast forests to the markets of Europe."
 nd_fin_tar_processing: "Finnish Tar Processing"
 nd_fin_tar_processing_desc: "Processing Finnish pine tar and timber into naval stores — rope-sealed barrels, caulking pitch, and rigging supplies for the shipyards of Europe."
 nd_fin_lumber_export: "Finnish Lumber Export"
 nd_fin_lumber_export_desc: "The export of processed Finnish timber and naval stores to European markets, feeding the insatiable demand for construction materials and shipbuilding supplies."
 nd_fin_rajakartano_upkeep: "Border Manor Upkeep"
 nd_fin_rajakartano_upkeep_desc: "Maintaining a fortified border manor's garrison, armory, and defensive works — lumber for repairs, stone for fortifications, weaponry for the garrison."
 nd_fin_savusauna_upkeep: "Sauna Upkeep"
 nd_fin_savusauna_upkeep_desc: "Keeping the traditional smoke sauna operational — timber for fuel and clay to maintain the kiuas stove that stones are heated on."
 nd_fin_kauppakonttori_upkeep: "Trading Post Upkeep"
 nd_fin_kauppakonttori_upkeep_desc: "Operating a Finnish trading post, managing fur and goods inventories."
 nd_fin_tervanpolttaja_upkeep: "Tar Kiln Operations"
 nd_fin_tervanpolttaja_upkeep_desc: "Burning pine heartwood in earthen kilns to produce tar — Finland's most valuable forest product."
 nd_fin_sahalaitos_upkeep: "Sawmill Operations"
 nd_fin_sahalaitos_upkeep_desc: "Cutting Finnish timber into planks, masts, and ship-grade lumber for export to European shipyards."
 nd_fin_merilinnoitus_upkeep: "Sea Fortress Upkeep"
 nd_fin_merilinnoitus_upkeep_desc: "Maintaining the massive stone fortifications, gun emplacements, and harbor defenses of a coastal fortress."
 nd_fin_ruukki_upkeep: "Ironworks Operations"
 nd_fin_ruukki_upkeep_desc: "Smelting iron with charcoal to forge tools, nails, and farm implements at Finnish ironworks."
 STATIC_MODIFIER_NAME_nd_fin_nation_building: "Nation Building"
 STATIC_MODIFIER_DESC_nd_fin_nation_building: "A written language is the foundation of a nation. Agricola's work creates a Finnish identity that transcends regional dialects and tribal boundaries, forging a people."
 STATIC_MODIFIER_NAME_nd_fin_national_resolve: "National Resolve"
 STATIC_MODIFIER_DESC_nd_fin_national_resolve: "The trauma of the Great Wrath has hardened Finland's resolve. The people who endured occupation, deportation, and devastation emerge with a determination that no future invader shall find them unprepared."
 nd_fin_formed_tt: "Finland has been formed"
 nd_fin_path_a_tt: "Chose Land of a Thousand Lakes"
 nd_fin_path_b_tt: "Chose Northern Trade Ways"
 nd_fin_destiny: "Finnish Destiny"
 nd_fin_destiny_desc: "Finland has risen as a sovereign nation. The path ahead will be shaped by the choices we make — whether we forge an impregnable northern fortress or a prosperous Baltic trading power."
 nd_fin_dest_karelian_march: "The Karelian March"
 nd_fin_dest_karelian_march_desc: "Secure the ancient fortress of Korela and establish Finnish control over the Karelian borderlands. Build an army worthy of defending the eastern frontier."
 nd_fin_dest_shield_of_north: "Shield of the North"
 nd_fin_dest_shield_of_north_desc: "Push deeper into Karelia, securing Olonets and the Aunus lands. Professionalize the army and develop the conquered territories into a defensive bulwark."
 nd_fin_dest_unconquerable: "Unconquerable Finland"
 nd_fin_dest_unconquerable_desc: "Control the Neva River and the fortress of Narva, sealing Finland's dominance over the eastern Baltic approaches. No army shall pass through Finnish lands without our leave."
 nd_fin_dest_ostrobothnian_wealth: "Ostrobothnian Wealth"
 nd_fin_dest_ostrobothnian_wealth_desc: "Establish tar as the foundation of Finnish commerce. Fill the treasury through the export of Finland's forest wealth to the markets of Europe."
 nd_fin_dest_baltic_tar_kings: "Baltic Tar Kings"
 nd_fin_dest_baltic_tar_kings_desc: "Seize Uleaborg and dominate the northern Baltic tar trade. Develop banking institutions to finance the expansion of Finnish commercial networks."
 nd_fin_dest_northern_empire: "Northern Commercial Empire"
 nd_fin_dest_northern_empire_desc: "Take Tallinn and command the Baltic trade routes. Embrace global trade and build Finland into the mercantile heart of the northern seas."
 nd_fin.5.t: "The Finnish Destiny"
 nd_fin.5.d: "Finland stands united and stable — a nation of forests, lakes, and iron determination. The question of what we shall become is no longer abstract. Our choices will shape the north for centuries."
 nd_fin.5.a: "Our destiny is in our hands."
 nd_fin.6.t: "The Karelian March"
 nd_fin.6.d: "The fortress of Korela has fallen under Finnish control. For centuries this ancient stronghold guarded the border between East and West — now it guards Finland. Our soldiers patrol the Karelian forests, and the eastern frontier is ours to defend. The march into Karelia has begun."
 nd_fin.6.a: "Karelia is Finland's shield."
 nd_fin.7.t: "Shield of the North"
 nd_fin.7.d: "Finnish arms have pushed deep into Karelia. The lands of Aunus, once beyond our reach, now fly the Finnish banner. Our professional army patrols a frontier that stretches from the frozen north to the shores of Lake Ladoga. The question now is how we consolidate these gains. Do we fortify every pass and ford, turning Karelia into an impenetrable defensive zone? Or do we focus on integrating the Karelian peoples, making them Finnish in heart as well as in law?"
 nd_fin.7.a: "Fortify every approach — let no army pass."
 nd_fin.7.b: "These Karelians are our kin — let them be Finns."
 nd_fin.8.t: "Unconquerable Finland"
 nd_fin.8.d: "The Neva River and the fortress of Narva are in Finnish hands. No power can approach Finland from the east without passing through territory we command, and no Baltic fleet can operate without Finnish acquiescence. Finland has achieved what few believed possible — a northern nation, born of forests and lakes, now stands as an impregnable power that no invader can subdue. How shall we wield this strength? Through the perfection of winter warfare, making our armies the most feared in the north? Or through the quiet authority of a nation that cannot be conquered, projecting power through the sheer impossibility of our defeat?"
 nd_fin.8.a: "Our winters shall be our weapon."
 nd_fin.8.b: "Let the world know — Finland cannot be broken."
 nd_fin.9.t: "Ostrobothnian Wealth"
 nd_fin.9.d: "Finnish tar flows through the markets of Europe. From the kilns of Ostrobothnia to the shipyards of Amsterdam and London, our forest wealth has become indispensable. The treasury swells with the profits of this trade, and Finnish merchants speak with growing authority in the counting houses of the Baltic."
 nd_fin.9.a: "Our forests are our fortune."
 nd_fin.10.t: "Baltic Tar Kings"
 nd_fin.10.d: "Uleaborg is ours, and with it the heart of the northern tar trade. Finnish bankers finance the expansion of our commercial networks, and no ship sails the Baltic without Finnish tar in its hull. We have become the tar kings of the north. The question is how to build on this dominance. Shall we expand our trade fleet, projecting Finnish commercial power across the seas? Or shall we invest in developing the Finnish interior, turning raw wealth into lasting prosperity?"
 nd_fin.10.a: "Build ships — let the Finnish flag fly in every port."
 nd_fin.10.b: "Invest in our land — true wealth grows from within."
 nd_fin.11.t: "Northern Commercial Empire"
 nd_fin.11.d: "Tallinn has fallen into Finnish hands, and with it command of the Baltic trade routes. Finnish merchants dominate the commerce of the north — tar, timber, furs, and iron flow through our markets to every corner of Europe. From a frontier at the edge of civilization, Finland has become the mercantile heart of the northern seas. Shall we use this power to build diplomatic influence, making Finland the indispensable partner of every trading nation? Or shall we turn inward, using our commercial wealth to pioneer industrial development and modernize our nation?"
 nd_fin.11.a: "Finland shall be the merchant of the north."
 nd_fin.11.b: "Commerce funds the future — invest in industry."
 STATIC_MODIFIER_NAME_nd_fin_dest_fortify_frontier: "Fortified Frontier"
 STATIC_MODIFIER_DESC_nd_fin_dest_fortify_frontier: "Every pass, ford, and forest trail in Karelia has been mapped, fortified, and garrisoned. The eastern frontier is an impenetrable defensive zone, though the focus on military preparation has drawn resources from commerce."
 STATIC_MODIFIER_NAME_nd_fin_dest_karelian_integration: "Karelian Integration"
 STATIC_MODIFIER_DESC_nd_fin_dest_karelian_integration: "The Karelian peoples are being welcomed as fellow Finns — shared language, shared faith, shared destiny. Finnish administrators bring order and opportunity to the new provinces."
 STATIC_MODIFIER_NAME_nd_fin_dest_winter_doctrine: "Winter Warfare Doctrine"
 STATIC_MODIFIER_DESC_nd_fin_dest_winter_doctrine: "Finnish armies have perfected the art of winter warfare — rapid reinforcement through frozen terrain, relentless endurance in conditions that break other armies, and a fighting spirit forged in the harshest winters in Europe. Naval readiness suffers as resources flow to the land forces."
 STATIC_MODIFIER_NAME_nd_fin_dest_invincible_frontier: "Invincible Frontier"
 STATIC_MODIFIER_DESC_nd_fin_dest_invincible_frontier: "Finland's reputation as an unconquerable nation projects power without a sword being drawn. The crown's authority is strengthened by national pride, and Finland's diplomatic position grows ever stronger."
 STATIC_MODIFIER_NAME_nd_fin_dest_trade_fleet: "Finnish Trade Fleet"
 STATIC_MODIFIER_DESC_nd_fin_dest_trade_fleet: "A growing fleet of Finnish merchantmen carries tar, timber, and furs to every port in the Baltic. Sailors flock to the coastal towns, though the cavalry traditions of the interior have been neglected."
 STATIC_MODIFIER_NAME_nd_fin_dest_develop_interior: "Interior Development"
 STATIC_MODIFIER_DESC_nd_fin_dest_develop_interior: "Investment flows into the Finnish interior — new roads, reformed administration, and banking institutions that channel commercial wealth into lasting development. Rapid growth brings some inflationary pressure."
 STATIC_MODIFIER_NAME_nd_fin_dest_mercantile_dominion: "Mercantile Dominion"
 STATIC_MODIFIER_DESC_nd_fin_dest_mercantile_dominion: "Finland's commercial network spans the Baltic and beyond. Finnish merchants are welcome in every port, Finnish intelligence networks map every market, and Finnish ships enforce favorable trading conditions."
 STATIC_MODIFIER_NAME_nd_fin_dest_industrial_pioneer: "Industrial Pioneer"
 STATIC_MODIFIER_DESC_nd_fin_dest_industrial_pioneer: "Commercial wealth funds a program of modernization and industrialization. Finland's diverse peoples are united by prosperity, and the legitimacy of Finnish rule grows with every new enterprise."
 nd_fin_talvitukikohta: "Talvitukikohta"
 nd_fin_talvitukikohta_desc: "A fortified winter warfare base designed to sustain military operations deep in the Finnish interior. Thick log walls, heated barracks, and concealed supply depots allow Finnish armies to operate in conditions that paralyze any invader."
 nd_fin_talvitukikohta_upkeep: "Winter Stronghold Upkeep"
 nd_fin_talvitukikohta_upkeep_desc: "Maintaining a winter stronghold's heated barracks, defensive works, and concealed supply caches — lumber for construction and heating, stone for fortifications, weaponry for the garrison."
 nd_fin_pohjolan_kauppahalli: "Pohjolan Kauppahalli"
 nd_fin_pohjolan_kauppahalli_desc: "A grand northern trading hall where Finnish merchants conduct business with traders from across Europe. Warehouses for tar and timber, counting rooms for bankers, and halls where commercial agreements shape the economy of the Baltic."
 nd_fin_pohjolan_kauppahalli_upkeep: "Trading Hall Upkeep"
 nd_fin_pohjolan_kauppahalli_upkeep_desc: "Operating a grand trading hall — cloth for furnishings, paper for ledgers and contracts, furniture for the counting rooms and meeting halls."
