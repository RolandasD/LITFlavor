l_english:
 STATIC_MODIFIER_NAME_nd_rjp_sword_of_rajputana: "Sword of Rajputana"
 STATIC_MODIFIER_DESC_nd_rjp_sword_of_rajputana: "The Rajput clans have been forged into a single blade. Under the banner of united Rajputana, the warrior aristocracy rides to war as one, their ancestral valor channeled into an instrument of conquest and defense that rivals any army on the subcontinent."
 STATIC_MODIFIER_NAME_nd_rjp_desert_throne: "Desert Throne"
 STATIC_MODIFIER_DESC_nd_rjp_desert_throne: "From the arid heart of Rajasthan rises a kingdom of splendor. The Rajput courts blend Hindu devotion with artistic patronage and architectural ambition, transforming fortress-palaces into centers of culture that draw merchants, scholars, and artisans from across the subcontinent."
 STATIC_MODIFIER_NAME_nd_rjp_sanga_united_clans: "United Clans of Sangram"
 STATIC_MODIFIER_DESC_nd_rjp_sanga_united_clans: "Under Rana Sanga, the warring Rajput clans have set aside their feuds to form a mighty confederacy. Together they command armies that no single sultan can match."
 STATIC_MODIFIER_NAME_nd_rjp_sanga_mewar_defiance: "Mewar's Defiance"
 STATIC_MODIFIER_DESC_nd_rjp_sanga_mewar_defiance: "Mewar stands alone against all comers. Where others bend the knee, the Sisodia bloodline fights on — the hills and deserts of Rajputana are their shield, and honor their fortress that no siege can breach."
 nd_rjp.1.t: "The Rise of Rajputana"
 nd_rjp.1.d: "The great Rajput clans have been united under a single banner. For centuries, the Chauhans, Rathores, Sisodias, and Kachhwahas have each defended their own kingdoms — Mewar with its impregnable Chittorgarh, Marwar with its desert horsemen, Amber with its diplomatic cunning. Now these proud warrior houses stand together as one realm: Rajputana.\n\nThe question before us is what manner of kingdom this confederation shall become. The sword-arms of a hundred clans hunger for glory, their cavalry feared across Hindustan. But the courts of Rajasthan also overflow with poets, painters, and architects whose work rivals any in the world. Shall we let the blade define us, or the throne?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_rjp.1.a: "Our swords shall carve the boundaries of Rajputana."
 nd_rjp.1.b: "Our palaces shall be the envy of kings."
 nd_rjp.2.t: "Rana Sanga's Confederacy"
 nd_rjp.2.d: "Maharana Sangram Singh I of Mewar — Rana Sanga — has achieved what was thought impossible: the unification of the Rajput clans into a fighting confederacy capable of challenging the mightiest powers of northern India. By 1521, his domain stretches from Mandu in the south to Agra in the northeast and the Indus in the west. He has won eighteen pitched battles against the Sultans of Delhi, Malwa, and Gujarat, earning a reputation as the greatest warrior-king of his age.\n\nHis body bears the marks of his campaigns — eighty wounds, the loss of an arm and an eye — yet his spirit remains unbroken. The Rajput clans rally to his banner not through coercion but through the magnetism of his valor. The question is whether this confederacy should press outward as a united force, or channel its strength into making Mewar an impregnable bastion of Rajput independence."
 nd_rjp.2.a: "Let the clans ride together under one banner."
 nd_rjp.2.b: "Mewar shall never bend — our hills are our throne."
 nd_rjp.3.t: "The Lion of Mewar"
 nd_rjp.3.d: "At Haldighati in 1576, Maharana Pratap Singh of Mewar faced the full might of the Mughal Empire with barely half their numbers. Though the battle itself was inconclusive, what followed defined Mewar's character for generations. Rather than submit as other Rajput houses had done, Pratap retreated into the Aravalli hills and waged a guerrilla war that kept Mewar's independence alive. He abandoned his palaces, lived in the wilderness, and rebuilt his forces one village at a time.\n\nBy the time of his death in 1597, Pratap had recovered nearly all of Mewar's lost territories through sheer persistence. His legend — the king who chose exile over surrender, who ate bread made from grass seeds rather than bow to an emperor — became the defining story of Rajput honor. No wealth, no comfort, no imperial favor was worth the price of freedom."
 nd_rjp.3.a: "His sacrifice shall never be forgotten."
 nd_rjp.4.t: "The Pink City"
 nd_rjp.4.d: "In 1727, Maharaja Sawai Jai Singh II of Amber founded a new capital city on the plains below his hilltop fortress. Unlike the organic sprawl of most Indian cities, Jaipur was planned from the ground up according to the principles of Vastu Shastra and the Shilpa Shastra, incorporating a precise grid layout with wide boulevards, standardized building heights, and zoned districts for different trades.\n\nJai Singh was no mere builder — he was also one of the foremost astronomers of his age. His Jantar Mantar observatory, constructed with massive stone instruments of his own design, produced astronomical tables more accurate than those of contemporary European observatories. The city he built would become the jewel of Rajputana: a monument to the idea that Rajput civilization could rival any in the world in both learning and beauty."
 nd_rjp.4.a: "A city worthy of our ambitions."
 nd_rjp.5.t: "The Jodhpur Lancers"
 nd_rjp.5.d: "The Sardar Risala of Marwar — better known as the Jodhpur Lancers — traces its lineage to 1212, when Raja Rao Shinajee formed a personal bodyguard of mounted warriors. Over seven centuries, this unit evolved from feudal retinue to one of the finest cavalry formations in India. Armed with lance, saber, and an unshakeable belief in the Rathore martial tradition, the Jodhpur Lancers carried the warrior spirit of Rajputana into the modern age.\n\nTheir horsemanship remains legendary — bred on the hardy Marwari horses of the Thar Desert, these cavalrymen fight with a ferocity and skill that has earned respect from every army they have faced."
 nd_rjp.5.a: "The Rathore lance never falters."
 nd_rjp_clan_oaths: "Rajput Clan Oaths"
 nd_rjp_clan_oaths_desc: "The feudal bonds between Rajput clans, sealed by blood oaths and marriage alliances, form the backbone of Rajputana's military strength. Each clan provides its thakur with mounted warriors bound by honor."
 nd_rjp_hill_fort_tradition: "Hill Fort Tradition"
 nd_rjp_hill_fort_tradition_desc: "The Rajputs became masters of defensive fortification, constructing hilltop strongholds that used the natural terrain of the Aravallis and Thar to create virtually impregnable positions."
 nd_rjp_stepwell_engineering: "Stepwell Engineering"
 nd_rjp_stepwell_engineering_desc: "In the arid landscape of Rajasthan, the construction of baolis — elaborate stepped wells descending many stories underground — provided reliable water storage and became architectural marvels in their own right."
 nd_rjp_kshatriya_dharma: "Kshatriya Dharma"
 nd_rjp_kshatriya_dharma_desc: "The Rajput warrior code, rooted in the Kshatriya traditions of Hindu scripture, demanded martial valor, protection of the weak, devotion to one's lord, and a willingness to fight and die rather than accept dishonor."
 nd_rjp_desert_caravans: "Desert Caravans"
 nd_rjp_desert_caravans_desc: "Commerce flowed through the Thar Desert along ancient caravan routes connecting Gujarat's ports to the Gangetic plain. Rajput kingdoms grew wealthy taxing and protecting these vital trade corridors."
 nd_rjp_temple_architecture: "Temple Architecture"
 nd_rjp_temple_architecture_desc: "The Rajput kingdoms of Rajasthan produced extraordinary Hindu and Jain temples, with intricately carved sandstone and marble structures at sites like Ranakpur and Dilwara demonstrating mastery of sculptural art."
 nd_rjp_chittorgarh_resistance: "Chittorgarh Resistance"
 nd_rjp_chittorgarh_resistance_desc: "Three times besieged by Muslim rulers, three times the garrison of Chittorgarh chose death over surrender. The fortress became the symbol of Rajput defiance, its defenders the standard by which courage was measured."
 nd_rjp_court_poetry: "Court Poetry Tradition"
 nd_rjp_court_poetry_desc: "The Rajput courts maintained elaborate bardic traditions. Court poets — charans and bhats — composed heroic ballads celebrating clan valor, documenting dynastic history through verse that served as both chronicle and inspiration."
 nd_rjp_jauhar_tradition: "Jauhar-Saka Tradition"
 nd_rjp_jauhar_tradition_desc: "The Rajput custom of jauhar — mass self-sacrifice by the women of a besieged fortress — combined with saka — the final death-charge of the men — represented the ultimate refusal to submit. This tradition made Rajput resistance terrifyingly absolute."
 nd_rjp_marwari_merchants: "Marwari Merchant Networks"
 nd_rjp_marwari_merchants_desc: "From the desert towns of Shekhawati and Marwar, Rajasthani merchants built commercial networks stretching across India. Their reputation for financial acumen and trustworthiness made the Marwari trader a fixture of Indian commerce."
 nd_rjp_kumbhalgarh_wall: "Kumbhalgarh Wall"
 nd_rjp_kumbhalgarh_wall_desc: "Rana Kumbha's great fortress featured walls extending 36 kilometers — among the longest continuous fortification walls in the world. This vast defensive perimeter sheltered temples, farms, and settlements within its circuit."
 nd_rjp_akhara_martial_schools: "Akhara Martial Schools"
 nd_rjp_akhara_martial_schools_desc: "Rajput warriors trained from childhood in akharas — combat gymnasiums where they mastered swordsmanship, wrestling, archery, and mounted combat. These institutions produced generation after generation of skilled fighters."
 nd_rjp_marwari_horse_tradition: "Marwari Horse Tradition"
 nd_rjp_marwari_horse_tradition_desc: "The Rathore dynasty bred the Marwari horse specifically for desert warfare: hardy, intelligent, and loyal, with distinctive inward-curving ears. These horses could survive long desert marches with minimal water and fought with exceptional bravery."
 nd_rjp_sanga_confederacy: "Sanga's Confederacy"
 nd_rjp_sanga_confederacy_desc: "Rana Sanga united the Rajput clans into a formidable military confederacy, winning eighteen pitched battles against the Sultans of Delhi, Malwa, and Gujarat. His realm at its zenith stretched from Mandu to the Indus."
 nd_rjp_marwari_merchant_houses: "Marwari Merchant Houses"
 nd_rjp_marwari_merchant_houses_desc: "The Havelis of Shekhawati — ornate merchant mansions decorated with frescoes, mirror work, and gold leaf — displayed the vast wealth accumulated by Marwari traders. These mansions became centers of commerce and culture."
 nd_rjp_mughal_alliance: "Rajput-Mughal Alliance"
 nd_rjp_mughal_alliance_desc: "Beginning with Raja Man Singh of Amber, several Rajput houses entered into marriage alliances and military partnerships with the Mughal Empire. Rajput generals became some of the most trusted and capable commanders in the Mughal army."
 nd_rjp_miniature_painting: "Rajasthani Miniature Painting"
 nd_rjp_miniature_painting_desc: "The Rajput courts of Mewar, Bundi, Kishangarh, and Jaipur developed distinctive schools of miniature painting. These works depicted religious themes, court scenes, and romantic poetry in vivid colors on prepared paper and cloth."
 nd_rjp_prataps_resistance: "Pratap's Guerrilla Resistance"
 nd_rjp_prataps_resistance_desc: "After Haldighati, Maharana Pratap abandoned his palaces and waged a guerrilla campaign from the Aravalli hills, recovering nearly all of Mewar's lost territory through persistence and intimate knowledge of the terrain."
 nd_rjp_camel_corps: "Camel Risala"
 nd_rjp_camel_corps_desc: "The camel-mounted cavalry corps of Marwar and Bikaner were uniquely suited to the vast desert expanses of western Rajputana. From the 15th century onward, these units provided mobility across terrain where conventional cavalry struggled."
 nd_rjp_aurangzeb_resistance: "Aurangzeb Resistance"
 nd_rjp_aurangzeb_resistance_desc: "When Emperor Aurangzeb's religious intolerance threatened Rajput autonomy and Hindu traditions, the Rajput kingdoms rose in rebellion. The ensuing wars drained Mughal resources and hastened the empire's decline."
 nd_rjp_jaipur_founding: "Founding of Jaipur"
 nd_rjp_jaipur_founding_desc: "Maharaja Sawai Jai Singh II founded the planned city of Jaipur in 1727, incorporating principles of Vastu Shastra alongside his own astronomical observations. The Pink City became a model of urban planning in India."
 nd_rjp_opium_trade_advance: "Rajasthani Opium Trade"
 nd_rjp_opium_trade_advance_desc: "The poppy fields of Malwa and Rajputana produced opium that became one of the most lucrative trade commodities of the era. Rajput kingdoms derived substantial revenue from controlling the cultivation and export of this valuable product."
 nd_rjp_jagirdari_system: "Jagirdari System"
 nd_rjp_jagirdari_system_desc: "The Rajput feudal system of jagirs — land grants to warrior nobles in exchange for military service — created a decentralized but effective military mobilization structure. Each jagirdar maintained a retinue proportional to his holding."
 nd_rjp_jantar_mantar: "Jantar Mantar Observatories"
 nd_rjp_jantar_mantar_desc: "Maharaja Sawai Jai Singh II constructed five astronomical observatories across India, the largest in Jaipur. Using massive masonry instruments of his own design, he produced star catalogs of remarkable accuracy."
 nd_rjp_royal_karkhanas: "Royal Karkhanas"
 nd_rjp_royal_karkhanas_desc: "The Rajput courts maintained state-run workshops — karkhanas — producing textiles, arms, jewelry, and other luxury goods. These workshops combined traditional craft techniques with artistic standards set by royal patronage."
 nd_rjp_musketeer_tradition: "Rajput Musketeer Tradition"
 nd_rjp_musketeer_tradition_desc: "The Rajput warrior aristocracy, long wedded to sword and lance, gradually adopted firearms without abandoning their martial ethos. Rajput musketeers combined the discipline of modern infantry with the personal valor of the Kshatriya tradition."
 nd_rjp_marwari_banking: "Marwari Banking Houses"
 nd_rjp_marwari_banking_desc: "From their desert origins, Marwari financiers established banking and moneylending operations across India. Their hundis — bills of exchange — facilitated long-distance trade and earned them a reputation as the bankers of the subcontinent."
 nd_rjp_autonomy_treaties: "Autonomy Treaties"
 nd_rjp_autonomy_treaties_desc: "As Mughal power waned, the Rajput kingdoms negotiated treaties securing their internal autonomy. These agreements preserved the authority of the Rajput rulers over their domains while acknowledging nominal suzerainty."
 nd_rjp_textile_renaissance: "Rajasthani Textile Renaissance"
 nd_rjp_textile_renaissance_desc: "The block-printing and tie-dyeing traditions of Rajasthan — particularly the famed bandhani and ajrakh techniques — produced textiles prized across India and beyond. Cities like Jaipur and Sanganer became centers of the textile trade."
 nd_rjp_court_patronage: "Rajput Court Patronage"
 nd_rjp_court_patronage_desc: "The later Rajput courts became renowned patrons of music, dance, painting, and literature. The artistic traditions nurtured in palaces from Udaipur to Jaipur produced some of the finest expressions of Indian culture."
 nd_rjp_jodhpur_lancers: "Jodhpur Lancers"
 nd_rjp_jodhpur_lancers_desc: "The Sardar Risala of Marwar — the Jodhpur Lancers — traced their lineage from 1212 to the modern age. Armed with lance and saber on Marwari horses, they embodied seven centuries of Rathore martial tradition."
 nd_rjp_princely_reforms: "Princely State Reforms"
 nd_rjp_princely_reforms_desc: "The more progressive Rajput rulers introduced administrative reforms, establishing modern courts, educational institutions, and revenue systems while preserving the traditional authority of the ruling houses."
 nd_rjp_marwari_industrialists: "Marwari Industrialists"
 nd_rjp_marwari_industrialists_desc: "The Marwari merchant families, having accumulated vast wealth through trade and banking, transitioned into industrial enterprise. Their investments in textiles, mining, and manufacturing laid the foundations of modern Indian industry."
 nd_rjp_martial_legacy: "Rajput Martial Legacy"
 nd_rjp_martial_legacy_desc: "The warrior traditions of the Rajput clans — centuries of cavalry combat, fortress defense, and a code of honor that prioritized valor above all — endured into the modern era, providing the foundation for distinguished military service."
 nd_rjp_heritage_architecture: "Heritage Architecture"
 nd_rjp_heritage_architecture_desc: "The palaces, forts, and temples of Rajasthan represent centuries of architectural achievement. From the lake palaces of Udaipur to the sandstone citadel of Jaisalmer, these structures stand as monuments to Rajput civilization."
 nd_rjp_desert_irrigation: "Desert Irrigation"
 nd_rjp_desert_irrigation_desc: "Modern dam and canal systems transformed the arid landscape of Rajasthan, bringing water to regions that had depended on seasonal rains and stepwells for centuries. This infrastructure enabled agricultural expansion in the Thar margins."
 a_nd_rjp_rajput_sowar: "Rajput Sowar"
 a_nd_rjp_rajput_sowar_desc: "Feudal cavalry of the Rajput clans, mounted warriors bound by clan oaths to fight for their thakur. Armed with lance and tulwar sword, they charge with the fury born of generations of martial tradition."
 a_nd_rjp_marwari_lancer: "Marwari Lancer"
 a_nd_rjp_marwari_lancer_desc: "Elite cavalry mounted on the distinctive Marwari horses of the Thar Desert. Bred for endurance and bravery, these horses and their riders excel at swift raids across the arid plains of Rajputana."
 a_nd_rjp_chela_swordsman: "Chela Swordsman"
 a_nd_rjp_chela_swordsman_desc: "Garrison infantry trained in the akharas of Rajput fortress-cities. These swordsmen serve as the last line of defense when the walls are breached, fighting with a fanatical determination rooted in the jauhar tradition."
 a_nd_rjp_camel_risala: "Camel Risala"
 a_nd_rjp_camel_risala_desc: "Desert cavalry mounted on camels, uniquely adapted to operations in the vast Thar Desert. Where conventional cavalry falters in the sand, the risala maintains mobility, carrying supplies across waterless wastes."
 a_nd_rjp_rajput_musketeer: "Rajput Musketeer"
 a_nd_rjp_rajput_musketeer_desc: "Modernized Rajput infantry armed with matchlock and later flintlock muskets. These warriors combine the personal courage of the Kshatriya tradition with the disciplined volley fire of modern infantry doctrine."
 a_nd_rjp_jodhpur_lancer: "Jodhpur Lancer"
 a_nd_rjp_jodhpur_lancer_desc: "The legendary cavalry of the Rathore clan, heirs to seven centuries of mounted warfare in the deserts of Marwar. Armed with steel-tipped lance and curved saber, they are the pride of Rajputana's military tradition."
 nd_rjp_durg: "Rajput Durg"
 nd_rjp_durg_desc: "A hilltop fortress constructed in the Rajput architectural tradition, using the natural defensibility of the Aravalli range and Thar margins to create a stronghold virtually impervious to assault."
 nd_rjp_durg_maintenance: "Durg Garrison"
 nd_rjp_durg_maintenance_desc: "Maintaining the stone walls and armaments of a Rajput hilltop fortress."
 nd_rjp_baoli: "Baoli Stepwell"
 nd_rjp_baoli_desc: "An elaborate stepped well descending deep underground, providing reliable water storage in the arid climate of Rajasthan. These engineering marvels also serve as cool gathering places for the community."
 nd_rjp_baoli_maintenance: "Stepwell Maintenance"
 nd_rjp_baoli_maintenance_desc: "Maintaining the stone staircases and water channels of a Rajasthani stepwell."
 nd_rjp_haveli: "Marwari Haveli"
 nd_rjp_haveli_desc: "An ornate merchant mansion decorated with frescoes, mirror work, and carved sandstone facades. These havelis serve as both residence and counting house for the wealthy Marwari trading families."
 nd_rjp_haveli_maintenance: "Haveli Upkeep"
 nd_rjp_haveli_maintenance_desc: "Maintaining the elaborate decorative elements and commercial operations of a Marwari merchant mansion."
 nd_rjp_akhara: "Rajput Akhara"
 nd_rjp_akhara_desc: "A traditional warrior training ground where young Rajputs learn swordsmanship, wrestling, archery, and mounted combat from experienced veterans. These institutions are the foundation of Rajput martial culture."
 nd_rjp_akhara_maintenance: "Akhara Training Supplies"
 nd_rjp_akhara_maintenance_desc: "Providing weapons, horses, and provisions for the warriors training at a Rajput akhara."
 nd_rjp_karkhana: "Rajasthani Karkhana"
 nd_rjp_karkhana_desc: "A royal workshop producing fine textiles, metalwork, jewelry, and arms under court patronage. These state-run enterprises combine traditional Rajasthani craftsmanship with the resources of princely treasuries."
 nd_rjp_karkhana_maintenance: "Karkhana Textile Production"
 nd_rjp_karkhana_maintenance_desc: "Court artisans transform cloth and dyes into fine textiles, with copper thread embroidery adding distinctive Rajasthani ornamentation."
 nd_rjp_marwari_breeding: "Marwari Horse Breeding"
 nd_rjp_marwari_breeding_desc: "The selective breeding of Marwari horses, prized for their endurance, intelligence, and distinctive inward-curving ears. These desert-hardy warhorses are the mount of choice for Rajput cavalry."
 nd_rjp_bandhani_dyeing: "Bandhani Tie-Dyeing"
 nd_rjp_bandhani_dyeing_desc: "The traditional Rajasthani art of bandhani — intricate patterns created by tying and dyeing cloth — produces textiles of remarkable beauty prized across India and beyond."
 nd_rjp_desert_caravan_trade: "Desert Caravan Trade"
 nd_rjp_desert_caravan_trade_desc: "Commerce conducted along the ancient caravan routes crossing the Thar Desert, connecting the ports of Gujarat to the markets of northern India."
 nd_rjp_opium_trade: "Opium Cultivation"
 nd_rjp_opium_trade_desc: "The cultivation and processing of opium poppies in the fields of Malwa and Rajputana, consuming wheat and fiber crops to sustain the poppy harvest and producing one of the most lucrative trade commodities of the era."
 levy_nd_rjp_rajput_sowar: "Rajput Sowar Levy"
 levy_nd_rjp_rajput_sowar_desc: "Feudal cavalry levied from the Rajput noble clans."
 levy_nd_rjp_chela_swordsman: "Chela Swordsman Levy"
 levy_nd_rjp_chela_swordsman_desc: "Garrison infantry levied from the fortress towns of Rajputana."
 levy_nd_rjp_jodhpur_lancer: "Jodhpur Lancer Levy"
 levy_nd_rjp_jodhpur_lancer_desc: "Elite cavalry levied from the Rathore nobility of Marwar."
 nd_rjp_temple_offerings: "Temple Offerings"
 nd_rjp_temple_offerings_desc: "Livestock and beeswax offerings sustain the Hindu temples of Rajasthan, supporting the priestly class and maintaining the spiritual center of Rajput communities."
 nd_rjp_miniature_pigments: "Miniature Paint Preparation"
 nd_rjp_miniature_pigments_desc: "The preparation of pigments and fine paper for the celebrated miniature painting schools of Mewar, Bundi, and Kishangarh."
 nd_rjp_astronomical_records: "Astronomical Records"
 nd_rjp_astronomical_records_desc: "The systematic recording of celestial observations at Jai Singh's observatories, consuming paper for catalogs, glass for lenses, and tools for the great stone instruments, producing star catalogs and planetary tables of remarkable precision."
 nd_rjp_court_arts: "Court Arts Patronage"
 nd_rjp_court_arts_desc: "The patronage of music, dance, and decorative arts at the Rajput courts, sustaining traditions of extraordinary refinement and beauty."
 nd_rjp_formed_tt: "Rajputana has been formed"
 nd_rjp_path_a_tt: "Chose Sword of Rajputana"
 nd_rjp_path_b_tt: "Chose Desert Throne"
 nd_rjp_destiny: "Destiny of Rajputana"
 nd_rjp_destiny_desc: "The clans are united, the kingdom proclaimed. Now Rajputana must choose its course: will the sword or the throne define this age? Achieve stability across the realm to begin the path."
 nd_rjp_dest_iron_throne: "The Iron Throne of Delhi"
 nd_rjp_dest_iron_throne_desc: "No Rajput kingdom can claim supremacy over Hindustan without holding Delhi, the seat of sultans and emperors. March north, seize the capital, and prove that Rajput arms are the masters of India."
 nd_rjp_dest_malwa_campaign: "The Malwa Campaign"
 nd_rjp_dest_malwa_campaign_desc: "With Delhi secured, the Rajput confederacy must break the power of the Malwa Sultanate and project force deep into the Gangetic heartland. Take Ujjain and the holy city of Varanasi to establish Rajput dominion over central India."
 nd_rjp_dest_rajput_imperium: "The Rajput Imperium"
 nd_rjp_dest_rajput_imperium_desc: "The capstone of Rajput military power: an empire stretching from the Indus to the Ganges. Seize Lahore and Lucknow, command the largest army in India, and make the Rajput warrior-king the undisputed ruler of the subcontinent."
 nd_rjp_dest_marwari_ascendancy: "The Marwari Ascendancy"
 nd_rjp_dest_marwari_ascendancy_desc: "The Marwari merchant networks must expand beyond the Thar. Draw silk into the markets of Rajputana and build a treasury worthy of the desert throne. Wealth, not war, will define this kingdom."
 nd_rjp_dest_jewel_of_india: "Jewel of India"
 nd_rjp_dest_jewel_of_india_desc: "Rajputana must become the cultural and intellectual heart of India. Embrace modern banking, develop the land to its fullest potential, and earn the prestige that comes from civilization, not just conquest."
 nd_rjp_dest_eternal_rajputana: "Eternal Rajputana"
 nd_rjp_dest_eternal_rajputana_desc: "The final flowering: a civilization that endures through the ages. Master the printing press, develop a prosperous and literate kingdom with marble palaces that rival any in the world, and build a Rajputana that history will never forget."
 nd_rjp.6.t: "The Destiny of Rajputana"
 nd_rjp.6.d: "Rajputana stands united at last. The desert winds carry the promise of greatness — whether through the clash of steel or the splendor of marble palaces, this kingdom shall leave its mark upon the age."
 nd_rjp.6.a: "Our destiny awaits."
 nd_rjp.7.t: "The Iron Throne of Delhi"
 nd_rjp.7.d: "The Rajput banner flies over Delhi. For generations, the sultans ruled from this city while Rajput kings defended their desert strongholds. Now the tables are turned. A Rajput lord sits where the Sultan of Delhi once held court, and the warrior-clans who once fought merely to survive now command the greatest prize in northern India.\n\nThe seizure of Delhi sends a message that reverberates across the subcontinent: the age of the Sultanate is over. The age of Rajputana has begun."
 nd_rjp.7.a: "The desert warriors hold the throne of kings."
 nd_rjp.8.t: "The Malwa Campaign"
 nd_rjp.8.d: "The rich lands of Malwa and the Gangetic plain have fallen before Rajput arms. Ujjain, the ancient city sacred to Shiva, now shelters a Rajput garrison. The holy ghats of Varanasi, where pilgrims have bathed since time immemorial, lie within our borders.\n\nThis is more than a military campaign — it is the assertion of Rajput civilizational authority over the heartland of India. The question is how to consolidate these vast conquests."
 nd_rjp.8.a: "Let the victors take what the sword has won."
 nd_rjp.8.b: "Establish Rajput authority through law and order."
 nd_rjp.9.t: "The Rajput Imperium"
 nd_rjp.9.d: "From Lahore to Lucknow, from the Thar Desert to the banks of the Ganga, the Rajput empire now encompasses the greatest extent of any kingdom ruled by the warrior-clans. What began as a confederation of desert fortress-states has become the dominant power of the subcontinent.\n\nThe Kshatriya dharma has been fulfilled beyond the dreams of any ancestor. The question is what form this empire shall take in the centuries to come."
 nd_rjp.9.a: "Build a standing imperial army to hold the realm."
 nd_rjp.9.b: "Maintain the confederate tradition of the clans."
 nd_rjp.10.t: "The Marwari Ascendancy"
 nd_rjp.10.d: "The merchant houses of Shekhawati and Marwar have extended their commercial networks far beyond the desert. Silk from distant lands flows through the markets of Rajputana, and the treasuries of the kingdom swell with the wealth of trade. The Marwari reputation for financial acumen has made Rajputana a center of Indian commerce."
 nd_rjp.10.a: "Wealth flows to those who know its worth."
 nd_rjp.11.t: "Jewel of India"
 nd_rjp.11.d: "Rajputana has become a beacon of civilization. The planned cities, the observatories, the miniature painting schools, the textile workshops — together they represent a flowering of culture that rivals any in the world. Scholars and artisans flock to the courts of the Rajput kings, drawn by patronage and the refinement of a kingdom that has chosen beauty over bloodshed.\n\nThe question is whether to invest further in the cultural splendor that defines Rajputana, or to empower the merchant houses that fund it all."
 nd_rjp.11.a: "Let the Pink City shine as a beacon of culture."
 nd_rjp.11.b: "The merchant princes have earned their place at court."
 nd_rjp.12.t: "Eternal Rajputana"
 nd_rjp.12.d: "The marble palaces stand eternal against the desert wind. Rajputana has become more than a kingdom — it is a civilization, a living testament to what the Rajput spirit can achieve when directed toward creation rather than destruction. The Jal Mahal rises from the waters of Man Sagar, its white marble shimmering in the desert sun, a palace that seems to float between earth and sky.\n\nThis is the legacy of the Desert Throne: a kingdom that endures not through fear of its armies, but through the admiration of the world."
 nd_rjp.12.a: "Preserve our heritage for all time."
 nd_rjp.12.b: "Invest in the knowledge that builds the future."
 STATIC_MODIFIER_NAME_nd_rjp_dest_victors_march: "Victor's March"
 STATIC_MODIFIER_DESC_nd_rjp_dest_victors_march: "The Rajput army sweeps through conquered territories, reinforcing quickly and claiming the spoils of war. Fortress maintenance suffers as resources flow to the campaign."
 STATIC_MODIFIER_NAME_nd_rjp_dest_rajput_hegemony: "Rajput Hegemony"
 STATIC_MODIFIER_DESC_nd_rjp_dest_rajput_hegemony: "The authority of the Rajput throne is established over the conquered lands, securing favorable peace terms and the loyalty of subject rulers."
 STATIC_MODIFIER_NAME_nd_rjp_dest_kshatriya_empire: "Kshatriya Empire"
 STATIC_MODIFIER_DESC_nd_rjp_dest_kshatriya_empire: "A standing imperial army befitting a subcontinent-spanning empire, though the bureaucracy grows complacent under the weight of Rajput supremacy."
 STATIC_MODIFIER_NAME_nd_rjp_dest_confederate_sword: "Confederate Sword"
 STATIC_MODIFIER_DESC_nd_rjp_dest_confederate_sword: "The old confederate tradition of the Rajput clans — a flexible military built on low-cost professional soldiers, supplemented by mercenaries and intelligence networks."
 STATIC_MODIFIER_NAME_nd_rjp_dest_pink_city_glory: "Pink City Glory"
 STATIC_MODIFIER_DESC_nd_rjp_dest_pink_city_glory: "The cultural influence of Rajputana's planned cities and artistic traditions radiates across India, though maintaining such splendor demands ever more lavish court spending."
 STATIC_MODIFIER_NAME_nd_rjp_dest_merchant_princes: "Merchant Princes of Rajputana"
 STATIC_MODIFIER_DESC_nd_rjp_dest_merchant_princes: "The Marwari merchant houses wield influence rivaling that of the warrior-nobility, their financial networks enabling diplomatic flexibility and rapid recovery."
 STATIC_MODIFIER_NAME_nd_rjp_dest_living_heritage: "Living Heritage"
 STATIC_MODIFIER_DESC_nd_rjp_dest_living_heritage: "The palaces, temples, and fortresses of Rajputana are preserved and expanded as living monuments to Rajput civilization, drawing populations into the cultural orbit of the kingdom."
 STATIC_MODIFIER_NAME_nd_rjp_dest_desert_renaissance: "Desert Renaissance"
 STATIC_MODIFIER_DESC_nd_rjp_dest_desert_renaissance: "Agricultural modernization and road-building transform the arid margins of Rajasthan, while military innovations born of desert warfare sharpen the kingdom's edge."
 nd_rjp_rajput_citadel: "Rajput Citadel"
 nd_rjp_rajput_citadel_desc: "The supreme expression of Rajput military architecture: a massive hilltop fortress complex with concentric walls, underground armories, and positions designed to dominate the surrounding landscape. A citadel from which a Rajput emperor commands his domain."
 nd_rjp_citadel_maintenance: "Citadel Garrison"
 nd_rjp_citadel_maintenance_desc: "Maintaining the stone walls, armories, and garrison of a Rajput imperial citadel."
 nd_rjp_jal_mahal: "Jal Mahal"
 nd_rjp_jal_mahal_desc: "A palace built upon the waters of an artificial lake, its marble walls and sandstone pavilions rising from the surface like a mirage made real. The Jal Mahal is the ultimate expression of Rajput architectural ambition — beauty, engineering, and royal splendor united."
 nd_rjp_jal_mahal_maintenance: "Palace Upkeep"
 nd_rjp_jal_mahal_maintenance_desc: "Maintaining the marble facades, painted pavilions, and landscaped gardens of the water palace."
