l_english:
 STATIC_MODIFIER_NAME_nd_northern_dominion: "The Northern Dominion"
 STATIC_MODIFIER_DESC_nd_northern_dominion: "From sea to sea, the vast northern wilderness is ours to tame. Our settlers push ever westward, carving civilization from the boreal forests and prairies, sustained by the iron will of a frontier people who have learned to endure what no other nation could."
 STATIC_MODIFIER_NAME_nd_great_trading_nation: "The Great Trading Nation"
 STATIC_MODIFIER_DESC_nd_great_trading_nation: "The rivers and portage routes that crisscross this continent are arteries of commerce, and we command them all. From the fur posts of the interior to the fishing fleets of the Grand Banks, our merchants have built a trading empire that bridges two cultures and spans a continent."
 nd_can.1.t: "The Birth of Canada"
 nd_can.1.d: "A new nation stirs in the northern reaches of the Americas. Where once stood scattered colonies of rival European powers, a unified Canadian identity has begun to take shape — forged in the shared experience of harsh winters, vast distances, and the endless bounty of a wilderness that demands both cooperation and resilience. The question that now confronts us is fundamental: what manner of nation shall Canada become? Shall we be a dominion of settlers and soldiers, pushing our borders ever outward across the prairies and mountains? Or shall we follow the rivers and trade routes that first brought Europeans to these shores, building a commercial empire rooted in the tolerance and pragmatism that has always defined life on the frontier?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_can.1.a: "We shall master this northern land."
 nd_can.1.b: "Our wealth flows through the waterways."
 STATIC_MODIFIER_NAME_nd_can_chartered_monopoly: "Chartered Monopoly"
 STATIC_MODIFIER_DESC_nd_can_chartered_monopoly: "The great chartered companies — the Hudson's Bay Company paramount among them — have been granted exclusive rights over vast territories. Their trading posts and factors command the commerce of entire river systems, extracting furs from the interior with ruthless efficiency."
 STATIC_MODIFIER_NAME_nd_can_free_enterprise: "Free Enterprise"
 STATIC_MODIFIER_DESC_nd_can_free_enterprise: "The age of monopoly has given way to open competition. Independent traders, free merchants, and rival companies now vie for the riches of the Canadian interior, and the resulting energy has unleashed a wave of commercial innovation across the colony."
 nd_can.2.t: "The Hudson's Bay Company"
 nd_can.2.d: "In 1670, King Charles II granted a royal charter to the Governor and Company of Adventurers of England Trading into Hudson's Bay — a document that effectively handed sovereignty over Rupert's Land, the entire drainage basin of Hudson Bay, to a private corporation. The Company's trading posts, from York Factory on the frozen shores of the Bay to the distant interior, form a network of commerce and governance unlike anything else in the colonial world. The Company's factors and servants are judge, merchant, and governor rolled into one, administering territories that dwarf most European kingdoms. Now the question arises: do we embrace this monopoly model, channeling trade through chartered companies for maximum control? Or do we open the frontier to free enterprise, allowing the energy of independent traders to drive growth?"
 nd_can.2.a: "Grant them their monopoly."
 nd_can.2.b: "Let free enterprise prevail."
 STATIC_MODIFIER_NAME_nd_can_light_infantry_legacy: "Light Infantry Legacy"
 STATIC_MODIFIER_DESC_nd_can_light_infantry_legacy: "The tradition of the Canadian Voltigeurs and their successors has instilled in our armies a mastery of irregular warfare. Our light infantry excel at skirmishing, ambush, and fighting in difficult terrain — skills born from the endless forests and harsh winters of the Canadian frontier."
 STATIC_MODIFIER_NAME_nd_can_garrison_defense: "Garrison Defense Tradition"
 STATIC_MODIFIER_DESC_nd_can_garrison_defense: "The lessons of defending a vast frontier against a numerically superior neighbor have been absorbed into our military doctrine. Our garrisons are built to endure, our fortifications to resist, and our terrain itself serves as our greatest ally."
 nd_can.3.t: "The Canadian Voltigeurs"
 nd_can.3.d: "In April 1812, Lieutenant-Colonel Charles-Michel de Salaberry raised a corps of light infantry in Lower Canada — the Voltigeurs Canadiens. Recruited from the militia, trained to regular standards, and expert in the frontier warfare that has defined Canadian military experience since the days of New France, the Voltigeurs represent something unprecedented: a distinctly Canadian military tradition. At the Battle of Chateauguay in October 1813, Salaberry and his Voltigeurs, alongside Mohawk and Abenaki allies, turned back an American force of four thousand with fewer than five hundred defenders. It was not numbers but knowledge of terrain, winter discipline, and the courage born of defending one's own soil that carried the day. How shall this tradition shape our military going forward?"
 nd_can.3.a: "Train more light infantry."
 nd_can.3.b: "Strengthen our garrison defenses."
 STATIC_MODIFIER_NAME_nd_can_dominion_unity: "Dominion Unity"
 STATIC_MODIFIER_DESC_nd_can_dominion_unity: "The great project of Confederation has bound together provinces and peoples who once stood apart. Through federal compromise and constitutional ingenuity, a framework has been created that accommodates linguistic, religious, and regional diversity within a single transcontinental state."
 STATIC_MODIFIER_NAME_nd_can_sovereign_destiny: "Sovereign Destiny"
 STATIC_MODIFIER_DESC_nd_can_sovereign_destiny: "Canada has stepped onto the world stage as a sovereign nation in its own right. No longer merely a collection of colonial dependencies, the Dominion commands international respect and the institutions to chart its own course among the nations of the world."
 nd_can.4.t: "Confederation"
 nd_can.4.d: "On the first of July 1867, the British North America Act brought into being the Dominion of Canada — a federation of provinces stretching from the Atlantic seaboard to the Great Lakes, with the promise of expansion to the Pacific and beyond. Confederation was no romantic act of revolution but a hard-headed political bargain, driven by the fear of American expansion, the collapse of reciprocal trade with the United States, and the staggering cost of defending thousands of miles of border. Yet in that pragmatism lies something remarkable: a nation built not on blood and soil, but on negotiation, compromise, and the shared conviction that diverse peoples can be governed together under one constitutional framework. The question now is whether we consolidate this union through internal bonds of loyalty and governance, or assert our new sovereignty boldly upon the international stage."
 nd_can.4.a: "Unity through compromise."
 nd_can.4.b: "A sovereign destiny awaits."
 nd_can_fur_trade_foundations: "Fur Trade Foundations"
 nd_can_fur_trade_foundations_desc: "The beaver pelt is the currency of the Canadian wilderness. The fur trade network — linking Indigenous trappers, French coureurs des bois, and metropolitan merchants — has created the economic infrastructure upon which all of colonial Canada depends."
 nd_can_coureurs_tradition: "Coureurs des Bois"
 nd_can_coureurs_tradition_desc: "These unlicensed wilderness traders venture deep into the interior, living among Indigenous peoples, learning their languages and survival skills, and returning with canoe-loads of premium furs. They are the scouts, translators, and advance agents of Canadian expansion."
 nd_can_grand_banks: "Grand Banks Fisheries"
 nd_can_grand_banks_desc: "The shallow waters of the Grand Banks teem with cod in quantities that seem inexhaustible. European fishermen have crossed the Atlantic for these fishing grounds since the late 15th century, and the dried and salted cod they produce feeds half of Catholic Europe."
 nd_can_canot_du_maitre: "Canot du Maitre"
 nd_can_canot_du_maitre_desc: "The great Montreal canoes — thirty-six feet long, built of birchbark over cedar frames — can carry four tons of trade goods from the St. Lawrence to the interior posts. They are the lifeblood of the fur trade, and the voyageurs who paddle them are the most storied rivermen in the Americas."
 nd_can_seigneurial_system: "Seigneurial System"
 nd_can_seigneurial_system_desc: "The seigneurial system divides the St. Lawrence Valley into long, narrow strips of farmland running perpendicular to the river. Each seigneur owes feudal obligations to the Crown; each habitant owes rent, labor, and grain to the seigneur. It is not efficient, but it settles the land."
 nd_can_fortress_new_france: "Fortress New France"
 nd_can_fortress_new_france_desc: "A chain of fortifications from Louisbourg on the Atlantic to Fort Frontenac on Lake Ontario guards the approaches to the St. Lawrence heartland. These stone and earthwork defenses are the military backbone of New France."
 nd_can_hudsons_bay: "Hudson's Bay Company"
 nd_can_hudsons_bay_desc: "The oldest incorporated joint-stock merchandising company in the English-speaking world. Granted a royal charter in 1670, the Company's writ runs over Rupert's Land — an area of 1.5 million square miles drained by rivers flowing into Hudson Bay."
 nd_can_compagnies_franches: "Compagnies Franches de la Marine"
 nd_can_compagnies_franches_desc: "Colonial regulars recruited in New France and trained in both European drill and Indigenous woodland warfare. The Compagnies Franches combine the discipline of professional soldiers with the frontier skills of men born in the Canadian wilderness."
 nd_can_milice_tradition: "Milice Canadienne"
 nd_can_milice_tradition_desc: "Every male inhabitant of New France between sixteen and sixty is subject to militia service. These citizen-soldiers defend the seigneuries, patrol the frontiers, and form the mass of colonial military strength when the regulars cannot be everywhere at once."
 nd_can_jesuit_missions: "Jesuit Missions"
 nd_can_jesuit_missions_desc: "The Society of Jesus has sent its most zealous members into the Canadian wilderness to convert the Indigenous peoples. The Jesuit Relations — their published letters home — have become the primary source of knowledge about the interior of North America."
 nd_can_timber_beginnings: "Timber Trade Beginnings"
 nd_can_timber_beginnings_desc: "The vast forests of Canada produce naval stores — masts, spars, tar, and potash — that the Royal Navy and the shipyards of Europe desperately need. What was once a byproduct of land-clearing is becoming an industry in its own right."
 nd_can_treaty_of_utrecht: "Treaty of Utrecht Legacy"
 nd_can_treaty_of_utrecht_desc: "The Treaty of Utrecht in 1713 redrew the map of North America, ceding Acadia, Newfoundland, and the Hudson Bay territory to Britain. This settlement established the framework of Franco-British coexistence that would define Canadian politics for centuries."
 nd_can_battle_of_quebec: "Battle of Quebec Legacy"
 nd_can_battle_of_quebec_desc: "The fall of Quebec in 1759 ended French dominion over Canada but did not end the French-Canadian people. The Quebec Act of 1774 guaranteed their language, religion, and civil law — a precedent for the accommodation of cultural difference that would become Canada's defining characteristic."
 nd_can_voltigeur_tradition: "Canadian Voltigeur Tradition"
 nd_can_voltigeur_tradition_desc: "The Voltigeurs Canadiens, raised by Charles-Michel de Salaberry in 1812, proved that Canadian soldiers could match any army in the world when fighting on their own soil. Their victory at Chateauguay with a force vastly outnumbered entered national legend."
 nd_can_war_of_1812: "War of 1812"
 nd_can_war_of_1812_desc: "The American invasion of Canada in 1812-1814 was repelled by a coalition of British regulars, Canadian militia, and Indigenous allies. The war forged a distinct Canadian identity — separate from both Britain and the United States — and proved that the northern colonies could defend themselves."
 nd_can_timber_barons: "Timber Barons"
 nd_can_timber_barons_desc: "Napoleon's Continental Blockade cut Britain off from Baltic timber, and Canada filled the gap. By the 1830s, lumber was Canada's leading export. The timber barons who controlled the great river drives — floating millions of board feet of lumber down the Ottawa and St. Lawrence — became the colony's wealthiest men."
 nd_can_provincial_marine: "Provincial Marine"
 nd_can_provincial_marine_desc: "The Provincial Marine is the naval force of the Great Lakes — a fleet of sloops, schooners, and armed vessels that patrols the inland seas separating British and American territory. Control of the lakes means control of the border."
 nd_can_rideau_canals: "Rideau Canals"
 nd_can_rideau_canals_desc: "The Rideau Canal, completed in 1832, links Ottawa to Kingston on Lake Ontario via a chain of locks, dams, and canals. Built as a secure military supply route bypassing the vulnerable St. Lawrence frontier, it has become a commercial artery connecting the interior to the sea."
 nd_can_constitutional_act: "Constitutional Act"
 nd_can_constitutional_act_desc: "The Constitutional Act of 1791 divided Canada into Upper and Lower provinces, each with its own elected assembly. It was imperfect — the assemblies lacked true power — but it planted the seed of representative government that would eventually grow into responsible self-rule."
 nd_can_confederation: "Confederation"
 nd_can_confederation_desc: "The British North America Act of 1867 united the provinces of Canada, Nova Scotia, and New Brunswick into the Dominion of Canada. A federal system was designed to balance the interests of English and French, Protestant and Catholic, maritime and continental."
 nd_can_responsible_government: "Responsible Government"
 nd_can_responsible_government_desc: "The achievement of responsible government — where the executive answers to the elected assembly rather than to a distant imperial authority — was won not by revolution but by persistent political agitation. Lord Durham's Report of 1839 and the reforms that followed established the principle that Canadians would govern themselves."
 nd_can_national_policy: "National Policy"
 nd_can_national_policy_desc: "Sir John A. Macdonald's National Policy of 1879 imposed protective tariffs to nurture Canadian manufacturing, built the transcontinental railway to bind the provinces together, and promoted immigration to settle the western prairies. It was nation-building by economic design."
 nd_can_pacific_railway: "Canadian Pacific Railway"
 nd_can_pacific_railway_desc: "On November 7, 1885, Donald Smith drove the last spike at Craigellachie, completing the Canadian Pacific Railway — a ribbon of steel stretching from Montreal to the Pacific coast. The railway fulfilled the promise made to British Columbia upon Confederation and transformed the western prairies from empty wilderness to settled farmland."
 nd_can_mounted_police_tradition: "Northwest Mounted Police"
 nd_can_mounted_police_tradition_desc: "The North-West Mounted Police, established in 1873, brought law and order to the vast western territories. Mounted on horseback, dressed in their distinctive scarlet tunics, the Mounties became the symbol of Canadian sovereignty on the frontier — a policing force unique in the world."
 nd_can_wheat_boom: "Prairie Wheat Boom"
 nd_can_wheat_boom_desc: "The completion of the railroad and the arrival of hundreds of thousands of immigrants transformed the Canadian prairies into one of the world's great breadbaskets. Marquis wheat, bred to ripen in the short northern growing season, made large-scale prairie agriculture viable."
 nd_can_bicultural_compromise: "Bicultural Compromise"
 nd_can_bicultural_compromise_desc: "Canada's defining political achievement is the accommodation of its two founding cultures — French and English — within a single constitutional framework. This was never easy, always contested, but the commitment to bicultural coexistence produced a society more tolerant of diversity than most."
 a_nd_can_coureurs_des_bois: "Coureurs des Bois"
 a_nd_can_coureurs_des_bois_desc: "Unlicensed French-Canadian woodsmen who venture deep into the wilderness to trade with Indigenous peoples. Expert scouts, canoeists, and survivalists who know the rivers and portages of the interior better than any map."
 a_nd_can_compagnies_franches: "Compagnies Franches"
 a_nd_can_compagnies_franches_desc: "Colonial regular infantry raised in New France, trained in both European line tactics and Indigenous woodland warfare. They fight like professionals in the forest — a combination no European army can match on this continent."
 a_nd_can_milice: "Milice Canadienne"
 a_nd_can_milice_desc: "Seigneurial militia drawn from the habitants of New France. Every man between sixteen and sixty owes service. They know their home terrain intimately and fight with the desperate courage of men defending their own farms and families."
 a_nd_can_voltigeurs: "Canadian Voltigeurs"
 a_nd_can_voltigeurs_desc: "Elite light infantry trained by Charles-Michel de Salaberry in the tradition of frontier warfare. Expert skirmishers, marksmen, and scouts who proved at Chateauguay that Canadian soldiers could defeat an army ten times their number."
 a_nd_can_mounted_police: "Northwest Mounted Police"
 a_nd_can_mounted_police_desc: "The scarlet-clad horsemen of the Northwest Mounted Police patrol the vast western territories, enforcing law, mediating disputes, and representing Canadian sovereignty in lands that no other institution can reach."
 n_nd_can_canot_du_maitre: "Canot du Maitre"
 n_nd_can_canot_du_maitre_desc: "The great Montreal canoe — thirty-six feet of birchbark and cedar, paddled by a crew of voyageurs. These vessels carry four tons of trade goods over thousands of miles of river and portage, connecting the St. Lawrence settlements to the fur posts of the interior."
 n_nd_can_provincial_sloop: "Provincial Marine Sloop"
 n_nd_can_provincial_sloop_desc: "A fast, shallow-draft sloop designed for patrol duty on the Great Lakes. Armed with light guns and crewed by lake sailors, these vessels enforce Canadian control over the inland seas that form the border."
 nd_can_trading_post: "Fur Trading Post"
 nd_can_trading_post_desc: "A frontier outpost where European goods are exchanged for Indigenous furs. The trading post is warehouse, marketplace, and diplomatic meeting ground all in one — the fundamental institution of the Canadian fur trade."
 nd_can_timber_slide: "Timber Slide"
 nd_can_timber_slide_desc: "An engineered channel that allows squared timber to bypass rapids and waterfalls during the great river drives. These structures are essential to the lumber industry, enabling the transport of millions of board feet from the interior forests to the sawmills and export wharves downstream."
 nd_can_canal_lock: "Canal Lock"
 nd_can_canal_lock_desc: "A lock chamber that raises or lowers vessels between different water levels, enabling navigation through the Canadian interior. The canal system connects the Great Lakes to the St. Lawrence, creating an unbroken commercial waterway from the heartland to the sea."
 nd_can_pelt_processing: "Pelt Processing"
 nd_can_pelt_processing_desc: "The preparation, grading, and baling of beaver and other furs for export to European markets. Quality pelt processing commands premium prices in the fashion houses of London and Paris."
 nd_can_log_driving: "Log Driving"
 nd_can_log_driving_desc: "The dangerous art of floating squared timber down Canadian rivers to the sawmills and export docks. River drivers — the raftsmen and log-runners of the Ottawa and St. Lawrence — risk their lives guiding millions of board feet through rapids and jams."
 nd_can_canal_tolls: "Canal Tolls"
 nd_can_canal_tolls_desc: "Revenue collected from commercial vessels passing through the canal lock system. The tolls fund maintenance of the waterways while the canal itself stimulates trade by connecting interior markets to coastal ports."
 nd_can_cod_curing: "Cod Curing"
 nd_can_cod_curing_desc: "The salting and drying of Atlantic cod from the Grand Banks fisheries. Cured cod is a durable, protein-rich staple that feeds Catholic Europe during Lent and sustains colonial populations through long winters."
 nd_can_potash_production: "Potash Production"
 nd_can_potash_production_desc: "The production of potash from the ashes of hardwood trees cleared for farmland. This valuable industrial chemical is used in soap-making, glass production, and fertilizer — turning the waste of land-clearing into an export commodity."
 nd_can_maple_sugar: "Maple Sugar Processing"
 nd_can_maple_sugar_desc: "The collection of maple sap in spring and its boiling-down into sugar and syrup. Learned from Indigenous peoples, maple sugaring provides a locally produced sweetener that reduces dependence on imported cane sugar from the Caribbean."
 levy_nd_can_milice: "Milice Canadienne"
 levy_nd_can_milice_desc: "Seigneurial militia levy drawn from the farming inhabitants of the St. Lawrence settlements. These frontier defenders know their homeland and fight tenaciously when called to service."
 nd_can_formed_tt: "Canada has been formed"
 nd_can_path_a_tt: "Chose The Northern Dominion"
 nd_can_path_b_tt: "Chose The Great Trading Nation"
 nd_can_destiny: "The Canadian Destiny"
 nd_can_destiny_desc: "Canada has been formed, and a new destiny awaits. The vast northern wilderness stretches from the Atlantic to the Pacific, a land of infinite possibility. Stabilize the young nation and prepare for the great endeavor ahead."
 nd_can_dest_pacific: "Pacific Reach"
 nd_can_dest_pacific_desc: "The Pacific coast beckons. Extend Canadian sovereignty to the western shore by securing Nootka Sound on Vancouver Island, proving that the northern dominion spans the continent from sea to sea."
 nd_can_dest_klondike: "The Klondike"
 nd_can_dest_klondike_desc: "The northern frontier holds untold riches. Push into the Yukon and stake Canada's claim to the gold fields of the Klondike, transforming the wild north into a source of national wealth and prestige."
 nd_can_dest_dominion: "Continental Dominion"
 nd_can_dest_dominion_desc: "Canada's manifest destiny is continental supremacy. Command the continent from the Hudson to the Gulf by securing New York and the Mississippi delta, making the northern dominion the paramount power in the Americas."
 nd_can_dest_atlantic: "North Atlantic Trade"
 nd_can_dest_atlantic_desc: "The North Atlantic is Canada's natural commercial domain. Extend the trading network southward by securing the whaling grounds of Nantucket, establishing Canadian dominance over the richest fisheries in the world."
 nd_can_dest_caribbean: "Caribbean Commerce"
 nd_can_dest_caribbean_desc: "The sugar islands and trade entrepots of the Caribbean offer wealth beyond what the northern fur trade can provide. Secure Havana to anchor a southern trading network and embrace modern financial institutions."
 nd_can_dest_emporium: "Global Trade Empire"
 nd_can_dest_emporium_desc: "The rivers of Canada once carried only furs. Now they must carry the goods of the world. Build a commercial empire so vast that even silk from the Orient flows through Canadian markets, making the northern nation a hub of global trade."
 nd_can.5.t: "The Canadian Destiny"
 nd_can.5.d: "A nation has been born in the northern wilderness. From the fishing villages of the Atlantic coast to the fur posts of the interior, Canada has achieved the stability needed to pursue a grander ambition. The question is no longer whether this country can survive, but what it will become. The path forward demands courage, vision, and the willingness to build something that has never existed before — a transcontinental nation carved from the world's second-largest landmass."
 nd_can.5.a: "Our destiny awaits."
 nd_can.6.t: "The Pacific Shore"
 nd_can.6.d: "Canadian sovereignty now extends to the Pacific. At Nootka Sound, where Spanish and British navigators once contested the coast, the Canadian flag flies over a land that completes the vision of a transcontinental nation. The forests of Vancouver Island yield timber of unmatched quality, and the sheltered harbors of the Pacific Northwest open routes to the markets of Asia. From sea to sea, the northern dominion is a reality."
 nd_can.6.a: "From sea to shining sea."
 nd_can.7.t: "Masters of the North Atlantic"
 nd_can.7.d: "The whaling grounds and cod fisheries of the North Atlantic are now firmly within the Canadian commercial sphere. From the Grand Banks to Nantucket, Canadian ships and merchants command the richest maritime resources in the world. The wealth of the sea has always sustained this northern nation, and now that dominance is absolute."
 nd_can.7.a: "The ocean provides."
 nd_can.8.t: "Gold in the Klondike"
 nd_can.8.d: "The discovery of gold in the Yukon has triggered a stampede of prospectors, adventurers, and fortune-seekers into the Canadian north. The Klondike gold fields are the richest placer deposits ever found, and the question now is how Canada will manage this windfall. One approach is to let the rush run its course — the frenzy of extraction will fill the treasury even as it brings inflation and chaos. The other is to impose order on the frontier, integrating the new territories methodically into the Canadian state, building institutions that will last long after the gold runs out."
 nd_can.8.a: "Let the gold rush run wild."
 nd_can.8.b: "Impose order on the frontier."
 nd_can.9.t: "Caribbean Connections"
 nd_can.9.d: "With Havana under Canadian influence, the trade networks of the Caribbean are open to exploitation. Sugar, tobacco, and tropical goods flow northward while Canadian lumber, fish, and manufactured goods head south. This is a new kind of Canadian commerce — not the fur trade of the wilderness but the triangular trade of empires. Canada can build a naval commercial fleet to dominate these routes by force, or it can establish free ports and diplomatic agreements that attract trade through openness rather than coercion."
 nd_can.9.a: "Build the triangle trade."
 nd_can.9.b: "Establish free ports."
 nd_can.10.t: "Continental Supremacy"
 nd_can.10.d: "From the Arctic to the Gulf of Mexico, from the Atlantic to the Pacific, Canadian power casts its shadow across the entire continent. The great cities of the eastern seaboard and the plantation lands of the Mississippi delta acknowledge Canadian supremacy. This is the apex of the northern dominion — a continental empire built by a nation that began as a handful of fur trading posts along the St. Lawrence. The question now is whether to maintain this empire through military might, fielding armies that can project power anywhere on the continent, or to consolidate through governance and diplomacy, building a continental peace."
 nd_can.10.a: "The army of the dominion marches."
 nd_can.10.b: "A Canadian peace for the continent."
 nd_can.11.t: "The World's Emporium"
 nd_can.11.d: "Silk in Canadian markets. The very idea would have seemed absurd to the coureurs des bois who paddled their birchbark canoes through the wilderness in search of beaver pelts. Yet here we are — a trading nation so vast and so connected that the luxury goods of the Orient flow through our commercial networks alongside the furs, fish, and timber that built this country. Canada has become what geography always promised: a bridge between the Atlantic and Pacific worlds, a commercial crossroads where every commodity finds its buyer and every merchant finds opportunity."
 nd_can.11.a: "Command the markets."
 nd_can.11.b: "Diplomacy opens all doors."
 STATIC_MODIFIER_NAME_nd_can_dest_gold_rush: "Gold Rush Frenzy"
 STATIC_MODIFIER_DESC_nd_can_dest_gold_rush: "The Klondike gold rush has unleashed a torrent of wealth and ambition. Prospectors pour into the Yukon by the tens of thousands, and gold dust flows south to fill the national coffers — but the frenzy brings inflation as gold cheapens the currency."
 STATIC_MODIFIER_NAME_nd_can_dest_orderly_frontier: "Orderly Frontier"
 STATIC_MODIFIER_DESC_nd_can_dest_orderly_frontier: "The Canadian approach to the northern frontier is methodical and institutional. Where other nations might let prospectors run wild, Canada sends the Mounted Police first, then the surveyors, then the settlers. Order precedes profit."
 STATIC_MODIFIER_NAME_nd_can_dest_army_dominion: "Army of the Dominion"
 STATIC_MODIFIER_DESC_nd_can_dest_army_dominion: "The Canadian army has become a continental force, capable of projecting power across the vast distances of North America. Assault divisions, rapid mobilization, and aggressive strategic doctrine mark this as a military power of the first order — though the cost of maintaining such an army strains the nation's finances."
 STATIC_MODIFIER_NAME_nd_can_dest_pax_canadiana: "Pax Canadiana"
 STATIC_MODIFIER_DESC_nd_can_dest_pax_canadiana: "Canada has achieved continental dominion not through unending conquest but through the construction of a durable peace. Strong institutions, satisfied estates, and a governance structure that accommodates diversity ensure that what was won by the sword is kept by the pen."
 STATIC_MODIFIER_NAME_nd_can_dest_sugar_triangle: "Sugar Triangle"
 STATIC_MODIFIER_DESC_nd_can_dest_sugar_triangle: "Canadian merchants have built a triangular trade connecting the Caribbean sugar islands, the northern fisheries, and the markets of Europe. The Royal Canadian Navy protects these sea lanes with growing confidence and skill."
 STATIC_MODIFIER_NAME_nd_can_dest_free_port: "Free Port Diplomacy"
 STATIC_MODIFIER_DESC_nd_can_dest_free_port: "Rather than dominating Caribbean commerce through naval force, Canada has established free ports and cultivated diplomatic relationships that attract trade through openness. The approach costs less and builds more enduring commercial partnerships."
 STATIC_MODIFIER_NAME_nd_can_dest_commercial_hegemony: "Commercial Hegemony"
 STATIC_MODIFIER_DESC_nd_can_dest_commercial_hegemony: "The Canadian commercial empire commands global markets. Heavy merchant vessels flying the Canadian flag trade in every ocean, and the prestige of the northern trading nation has never been greater — though success breeds complacency in government."
 STATIC_MODIFIER_NAME_nd_can_dest_diplomatic_ascendancy: "Diplomatic Ascendancy"
 STATIC_MODIFIER_DESC_nd_can_dest_diplomatic_ascendancy: "Canada's commercial success has been matched by diplomatic mastery. The trading nation's envoys are welcomed in every court, its good offices sought in every dispute, and its annexation terms are generous enough to win willing submission."
 nd_can_frontier_garrison: "Frontier Garrison"
 nd_can_frontier_garrison_desc: "A fortified military post designed to project Canadian sovereignty across the vast frontier. These garrisons anchor the northern dominion's territorial control, housing soldiers trained for both conventional defense and frontier warfare."
 nd_can_garrison_supply: "Garrison Supply"
 nd_can_garrison_supply_desc: "The supply chain that keeps frontier garrisons operational — weaponry for the soldiers, stone for fortification repairs, and tools for the endless work of maintaining a military outpost in the wilderness."
 nd_can_commercial_exchange: "Commercial Exchange"
 nd_can_commercial_exchange_desc: "A purpose-built trading hall where merchants from across the globe conduct business under Canadian law. The exchange concentrates commercial activity, standardizes contracts, and makes the Canadian market the most efficient and trusted in the hemisphere."
 nd_can_exchange_operations: "Exchange Operations"
 nd_can_exchange_operations_desc: "The daily operations of the commercial exchange — paper for contracts and ledgers, cloth for trade samples, and tools for weighing and measuring goods to the exacting standards of Canadian commerce."
