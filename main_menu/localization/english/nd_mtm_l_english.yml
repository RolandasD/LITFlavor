l_english:
 # === Advances ===
 # Age 1
 nd_mtm_sawah_agriculture: "Sawah Wet-Rice Cultivation"
 nd_mtm_sawah_agriculture_desc: "The fertile volcanic soils of Central Java sustain an intensive wet-rice cultivation system. Terraced paddies channel mountain water through elaborate irrigation networks, producing abundant harvests that feed a growing population."
 nd_mtm_majapahit_heritage: "Majapahit Court Heritage"
 nd_mtm_majapahit_heritage_desc: "Mataram inherits the cultural legacy of the great Majapahit empire — its courtly protocols, literary traditions, and concepts of sacred kingship that underpin Javanese political authority."
 nd_mtm_empu_smithing: "Empu Keris Smithing"
 nd_mtm_empu_smithing_desc: "The empu are master smiths who forge the keris — Java's sacred asymmetrical dagger. Combining iron, nickel, and meteoric metal through hundreds of folds, they create blades believed to possess spiritual power."
 nd_mtm_javanese_islam: "Javanese Islamic Synthesis"
 nd_mtm_javanese_islam_desc: "Islam arrives in Java not as a replacement for existing traditions, but as an overlay upon them. The Wali Songo — nine Islamic saints — spread the faith by incorporating it into Javanese dance, puppet theater, and courtly ritual."
 nd_mtm_keris_militia: "Keris-Armed Militia"
 nd_mtm_keris_militia_desc: "Every Javanese man of standing carries a keris. In times of war, village communities raise militia armed with these sacred daggers and bamboo spears, fighting with the spiritual conviction that their blades protect them."
 nd_mtm_inland_trade: "Inland Trade Routes"
 nd_mtm_inland_trade_desc: "Central Java's interior markets connect rice-growing plains with highland producers of spices, metals, and forest products. Overland trade sustains the agrarian economy that Mataram's sultans prize above maritime commerce."
 # Age 2
 nd_mtm_kraton_tradition: "Kraton Palace Tradition"
 nd_mtm_kraton_tradition_desc: "The kraton is more than a palace — it is the cosmological center of the Javanese kingdom, where the ruler mediates between heaven and earth. Its concentric walls reflect the cosmic order that legitimizes royal authority."
 nd_mtm_batik_codification: "Batik Textile Codification"
 nd_mtm_batik_codification_desc: "Under court patronage, the wax-resist dyeing technique of batik is elevated from craft to high art. Master artisans develop complex geometric and naturalistic patterns, each carrying symbolic meaning within Javanese cosmology."
 nd_mtm_court_arts: "Gamelan and Wayang Kulit"
 nd_mtm_court_arts_desc: "The bronze percussion orchestras of gamelan and the leather shadow puppetry of wayang kulit reach their classical forms under Mataram patronage. These arts transmit the Ramayana and Mahabharata epics, embedding Hindu mythology within an Islamic court."
 nd_mtm_tumenggung_system: "Tumenggung Administration"
 nd_mtm_tumenggung_system_desc: "The sultan governs through appointed tumenggung — regional lords who administer territories, collect taxes, and raise troops on behalf of the throne. Their loyalty is secured through the distribution of appanage lands."
 nd_mtm_priyayi_class: "Priyayi Bureaucratic Class"
 nd_mtm_priyayi_class_desc: "A new class of educated officials, the priyayi, emerges to serve the Mataram court. Raised to aristocratic status by royal appointment rather than birth, they form the administrative backbone of the expanding sultanate."
 nd_mtm_port_suppression: "Port Revenue Consolidation"
 nd_mtm_port_suppression_desc: "Wary of the independent wealth that maritime trade brings to coastal lords, Mataram's rulers redirect economic activity inland. Port revenues are channeled through the court, strengthening central authority at the expense of maritime power."
 nd_mtm_pesantren_network: "Pesantren Network"
 nd_mtm_pesantren_network_desc: "Rural Islamic boarding schools — pesantren — spread across Java, educating youth in Quranic recitation, Arabic calligraphy, and Javanese letters. They create a literate class loyal to both faith and sultan."
 # Age 3
 nd_mtm_agung_conquests: "Sultan Agung's Conquests"
 nd_mtm_agung_conquests_desc: "Sultan Agung's relentless military campaigns unite nearly all of Java under Mataram's banner. The five-year siege of Surabaya and the subjugation of eastern Java's coastal kingdoms mark the zenith of Javanese military power."
 nd_mtm_siege_tradition: "Javanese Siege Tradition"
 nd_mtm_siege_tradition_desc: "The conquest of Surabaya demonstrated Mataram's mastery of protracted siege warfare. By damming the Brantas River and poisoning water supplies, Sultan Agung's forces starved fortified cities into submission without direct assault."
 nd_mtm_calendar_reform: "Javanese Calendar Reform"
 nd_mtm_calendar_reform_desc: "In 1633, Sultan Agung institutes a revolutionary calendar that fuses the Hindu Saka solar system with Islamic lunar reckoning. This synthesis reflects Mataram's broader project of harmonizing Java's Hindu past with its Islamic present."
 nd_mtm_tax_reform: "Administrative Tax Reform"
 nd_mtm_tax_reform_desc: "Sultan Agung restructures the tax code across conquered territories, replacing ad hoc tribute with a rationalized system of land assessments. Courts and judicial proceedings are brought into closer alignment with Quranic precepts."
 nd_mtm_batavia_campaign: "Batavia Campaign"
 nd_mtm_batavia_campaign_desc: "In 1628-1629, Sultan Agung dispatches some 14,000 troops to besiege the Dutch VOC fortress at Batavia. Though the sieges fail due to supply line difficulties and disease, they demonstrate Mataram's willingness to challenge European interlopers."
 nd_mtm_irrigation_expansion: "Irrigation Expansion"
 nd_mtm_irrigation_expansion_desc: "The growing population and military ambitions of Mataram demand ever-greater rice harvests. New sawah terraces are carved from forest and hillside, extending the irrigation network that feeds the sultanate's armies and courts."
 nd_mtm_judicial_reform: "Quranic Judicial Reform"
 nd_mtm_judicial_reform_desc: "Sultan Agung aligns the sultanate's courts with Islamic jurisprudence, introducing sharia-influenced legal codes that complement traditional Javanese adat law. This dual system strengthens both religious legitimacy and administrative control."
 # Age 4
 nd_mtm_trunajaya_aftermath: "Trunajaya Rebellion Legacy"
 nd_mtm_trunajaya_aftermath_desc: "The devastating Trunajaya rebellion of the 1670s nearly destroys Mataram. Madurese rebels seize the capital at Plered, forcing the sultan to seek VOC assistance — a fateful bargain that preserves the throne but concedes sovereignty."
 nd_mtm_kraton_guard: "Kraton Palace Guard"
 nd_mtm_kraton_guard_desc: "After the trauma of Trunajaya's rebellion, the sultans invest in a permanent palace guard corps — elite soldiers drawn from the priyayi and soldier classes, armed and trained to defend the kraton against future usurpers."
 nd_mtm_batik_larangan: "Batik Larangan"
 nd_mtm_batik_larangan_desc: "The sultans codify batik larangan — forbidden patterns reserved exclusively for royal use. The parang rusak motif becomes the supreme symbol of kingship, with its wearing by commoners punishable as an affront to cosmic order."
 nd_mtm_pesantren_expansion: "Pesantren Scholarly Expansion"
 nd_mtm_pesantren_expansion_desc: "The pesantren network deepens its scholarly mission, producing a class of kyai — Islamic teachers who command both religious authority and community loyalty throughout the Javanese countryside."
 nd_mtm_voc_diplomacy: "VOC Diplomatic Engagement"
 nd_mtm_voc_diplomacy_desc: "Mataram's sultans navigate an increasingly complex relationship with the Dutch East India Company — trading concessions for military support, playing VOC factions against each other, and maintaining a facade of sovereignty over diminishing domains."
 nd_mtm_granary_system: "Lumbung Granary System"
 nd_mtm_granary_system_desc: "A network of royal granaries — lumbung — stockpiles rice from the wet season harvests. These reserves sustain armies on campaign, buffer against famine, and give the sultan economic leverage over his subjects and rivals."
 nd_mtm_road_network: "Central Java Road Network"
 nd_mtm_road_network_desc: "Major routes connecting the kraton to provincial capitals are maintained and expanded, enabling faster troop movement and tax collection across Mataram's inland territories."
 # Age 5
 nd_mtm_succession_reforms: "Succession Reforms"
 nd_mtm_succession_reforms_desc: "Three devastating wars of succession teach Mataram's court hard lessons about orderly transfer of power. New protocols attempt to regularize succession, though the reality of Javanese court politics remains treacherous."
 nd_mtm_wayang_wong: "Wayang Wong Dance-Drama"
 nd_mtm_wayang_wong_desc: "Court culture reaches its golden age with wayang wong — live dance-drama where human performers enact the same epics as the shadow puppets. The pendopo audience hall becomes the stage for an art form unique to Central Java."
 nd_mtm_modern_prajurit: "Modernized Prajurit"
 nd_mtm_modern_prajurit_desc: "Mataram's traditional infantry regiments incorporate European firearms and drill techniques learned through decades of contact with VOC forces. These modernized prajurit combine Javanese martial spirit with new tactical discipline."
 nd_mtm_cultural_rivalry: "Surakarta-Yogyakarta Rivalry"
 nd_mtm_cultural_rivalry_desc: "The 1755 division of Mataram into rival courts at Surakarta and Yogyakarta sparks an extraordinary cultural competition. Each court patronizes its own styles of gamelan, dance, batik, and literature, doubling the creative output of Javanese civilization."
 nd_mtm_batik_manufacturing: "Advanced Batik Manufacturing"
 nd_mtm_batik_manufacturing_desc: "New dyeing techniques and the refinement of the canting wax-pen allow the creation of increasingly intricate batik patterns. The cloth becomes a major export commodity, prized from the Malay world to Europe."
 nd_mtm_teak_exploitation: "Teak Forest Exploitation"
 nd_mtm_teak_exploitation_desc: "Java's vast teak forests provide timber for construction, shipbuilding, and export. Systematic exploitation under royal monopoly generates revenue while supplying the materials needed for palaces, forts, and trading vessels."
 # Age 6
 nd_mtm_serat_tradition: "Serat Literary Renaissance"
 nd_mtm_serat_tradition_desc: "Javanese court poets produce a flowering of literature — the serat — weaving together historical chronicle, moral philosophy, and mystical poetry. These works preserve Javanese identity and wisdom in an era of European colonial encroachment."
 nd_mtm_anti_colonial: "Anti-Colonial Resistance"
 nd_mtm_anti_colonial_desc: "From Diponegoro's Java War of 1825-1830 onward, Mataram's legacy inspires armed resistance against Dutch colonial rule. These movements draw on Javanese martial traditions and Islamic zeal to challenge European domination."
 nd_mtm_modern_administration: "Modern Administrative State"
 nd_mtm_modern_administration_desc: "Javanese administrators adapt modern bureaucratic methods while preserving the priyayi tradition. The result is an administrative system that blends indigenous hierarchy with rational governance suited to the modern era."
 nd_mtm_plantation_economy: "Plantation Economy"
 nd_mtm_plantation_economy_desc: "Java's fertile volcanic soils prove ideal for sugar, tobacco, and coffee cultivation on an industrial scale. Plantation agriculture transforms the island into one of the most productive colonial economies in the world."
 nd_mtm_national_awakening: "Javanese National Awakening"
 nd_mtm_national_awakening_desc: "A new generation of educated Javanese rediscovers pride in their cultural heritage. The legacy of Mataram's courts — their batik, gamelan, and literature — becomes the foundation for a nascent national identity."
 nd_mtm_batik_export: "Batik Export Economy"
 nd_mtm_batik_export_desc: "Industrial production methods allow batik to be produced at scale for global markets while maintaining the artistic quality that makes Javanese textiles prized worldwide."
 # === Units ===
 a_nd_mtm_keris_prajurit: "Keris Prajurit"
 a_nd_mtm_keris_prajurit_desc: "Village militia armed with sacred keris daggers and bamboo spears. What they lack in formal training, they compensate for with spiritual conviction that their blades make them invulnerable."
 a_nd_mtm_agung_prajurit: "Agung's Prajurit"
 a_nd_mtm_agung_prajurit_desc: "The conquering infantry of Sultan Agung's campaigns — disciplined soldiers who reduced Surabaya through siege and carried Mataram's banner across Java."
 a_nd_mtm_sentana_cavalry: "Sentana Cavalry"
 a_nd_mtm_sentana_cavalry_desc: "Royal kinsmen and nobles mounted on Javanese ponies, serving as the sultan's mobile strike force. Their swift raids disrupt enemy supply lines and communication."
 a_nd_mtm_kraton_guard: "Kraton Guard"
 a_nd_mtm_kraton_guard_desc: "Elite palace infantry sworn to defend the kraton. Armed with keris and pike, they stand as the last line between the sultan and those who would seize the throne."
 a_nd_mtm_modern_prajurit: "Modern Prajurit"
 a_nd_mtm_modern_prajurit_desc: "Javanese infantry trained in European firearms and tactical formation. They blend the traditional martial courage of the prajurit with the musket volleys and disciplined drill of the modern era."
 a_nd_mtm_pemberontak: "Pemberontak"
 a_nd_mtm_pemberontak_desc: "Anti-colonial resistance fighters schooled in guerrilla tactics. Using Java's dense jungle and rice-paddy terrain to their advantage, they strike at colonial forces and melt back into the countryside."
 # === Buildings ===
 nd_mtm_sawah_terrace: "Sawah Terrace"
 nd_mtm_sawah_terrace_desc: "Carefully engineered wet-rice paddies that channel volcanic spring water through stone-lined channels to flood terraced fields. Java's sawah system supports one of the densest agricultural populations in the world."
 nd_mtm_empu_forge: "Empu Forge"
 nd_mtm_empu_forge_desc: "The workshop of an empu master smith, where the sacred keris is forged through ritual metalworking. Each blade requires hundreds of hammer-folds and spiritual preparation, producing weapons that embody Javanese cultural identity."
 nd_mtm_kraton_palace: "Kraton Palace"
 nd_mtm_kraton_palace_desc: "The fortified palace complex that serves as the cosmological and political center of the Javanese kingdom. Its concentric walls mirror the structure of the universe, with the sultan at the divine center."
 nd_mtm_batik_workshop: "Batik Workshop"
 nd_mtm_batik_workshop_desc: "A specialized workshop where artisans apply molten wax in intricate patterns before dyeing cloth in natural indigo and soga brown. The resulting batik textiles are both everyday wear and courtly regalia."
 nd_mtm_pesantren: "Pesantren"
 nd_mtm_pesantren_desc: "An Islamic boarding school where students live under the guidance of a kyai teacher, studying the Quran alongside Javanese literature and letters. The pesantren is the foundation of rural education across Java."
 nd_mtm_benteng_fort: "Benteng Fort"
 nd_mtm_benteng_fort_desc: "A Javanese inland fortification of packed earth and stone, built to control river crossings and mountain passes. Mataram's siege expertise is reflected in defenses designed to withstand the very tactics its own armies employed."
 nd_mtm_lumbung_granary: "Lumbung Granary"
 nd_mtm_lumbung_granary_desc: "A distinctive raised wooden storehouse with a curved ridgepole, designed to keep rice dry through the wet monsoon. Royal granaries form a strategic reserve that sustains armies and buffers against famine."
 nd_mtm_pendopo_hall: "Pendopo Hall"
 nd_mtm_pendopo_hall_desc: "An open-sided audience hall with a soaring joglo roof supported by massive teak pillars. The pendopo is where the sultan holds court, gamelan orchestras perform, and wayang wong dances bring the epics to life."
 nd_mtm_plantation_complex: "Plantation Complex"
 nd_mtm_plantation_complex_desc: "An industrial-scale agricultural estate combining sugar mills, drying sheds, and processing facilities. Java's volcanic soil and tropical climate make it ideal for cash crop cultivation."
 # === Production Methods ===
 nd_mtm_sawah_maintenance: "Sawah Irrigation"
 nd_mtm_sawah_maintenance_desc: "Maintaining the elaborate system of channels, weirs, and terraces that make wet-rice cultivation possible requires constant investment in timber and stone."
 nd_mtm_keris_forging: "Keris Forging"
 nd_mtm_keris_forging_desc: "Forges sacred keris daggers from iron and copper alloys through ritual metalworking, producing distinctive Javanese weaponry."
 nd_mtm_palace_upkeep: "Palace Maintenance"
 nd_mtm_palace_upkeep_desc: "The kraton demands constant upkeep — timber for its teak pavilions, stone for its walls, and fine cloth for its ceremonial furnishings."
 nd_mtm_batik_dyeing: "Batik Dyeing"
 nd_mtm_batik_dyeing_desc: "Transforms plain cloth into patterned batik textiles through the traditional wax-resist dyeing process, producing fine cloth prized across Southeast Asia."
 nd_mtm_pesantren_upkeep: "Pesantren Operation"
 nd_mtm_pesantren_upkeep_desc: "Islamic boarding schools require paper for manuscripts, rice to feed resident students, and the devotion of kyai teachers."
 nd_mtm_benteng_upkeep: "Fort Maintenance"
 nd_mtm_benteng_upkeep_desc: "Maintaining the benteng's stone walls and garrison requires steady supplies of stone, timber, and weaponry."
 nd_mtm_granary_maintenance: "Granary Maintenance"
 nd_mtm_granary_maintenance_desc: "Keeping the lumbung storehouses in good repair and their rice reserves fresh requires ongoing investment in timber and grain rotation."
 nd_mtm_pendopo_upkeep: "Pendopo Maintenance"
 nd_mtm_pendopo_upkeep_desc: "The grand audience hall requires replacement of its teak timbers and ceremonial cloth hangings to remain a fitting venue for court culture."
 nd_mtm_sugar_processing: "Sugar Processing"
 nd_mtm_sugar_processing_desc: "Crushes sugarcane and boils syrup in timber-fired mills, producing raw sugar for domestic consumption and export."
 nd_mtm_kyai_instruction: "Kyai Instruction"
 nd_mtm_kyai_instruction_desc: "Advanced scholarly instruction under learned kyai teachers, requiring additional paper for manuscripts and rice to support the expanded student body."
 nd_mtm_expanded_irrigation: "Expanded Irrigation"
 nd_mtm_expanded_irrigation_desc: "New sawah terraces carved from hillsides and forest clearings extend the wet-rice cultivation network across Central Java."
 nd_mtm_royal_batik: "Royal Batik Production"
 nd_mtm_royal_batik_desc: "Court artisans produce batik larangan from silk and rare dyes — restricted motifs including the sacred parang rusak pattern, yielding the finest textiles in Java."
 nd_mtm_fine_batik: "Fine Batik Manufacture"
 nd_mtm_fine_batik_desc: "Advanced canting wax-pen techniques produce batik of extraordinary intricacy from cloth and dyes, yielding fine textiles for export to the courts of Southeast Asia."
 nd_mtm_industrial_batik: "Industrial Batik Production"
 nd_mtm_industrial_batik_desc: "Copper-stamp printing and mass dyeing techniques produce fine batik textiles at industrial scale, combining traditional aesthetics with modern efficiency."
 # === Levies ===
 levy_nd_mtm_kraton_guard: "Kraton Guard Levy"
 levy_nd_mtm_kraton_guard_desc: "Elite palace defenders raised from the soldier and noble classes to protect the sultan's kraton."
 levy_nd_mtm_keris_prajurit: "Keris Prajurit Levy"
 levy_nd_mtm_keris_prajurit_desc: "Village militia armed with sacred keris daggers, raised from the peasant and soldier populations."
 # === Static Modifiers ===
 STATIC_MODIFIER_NAME_nd_mtm_agung_military_legacy: "Legacy of Agung's Sword"
 STATIC_MODIFIER_DESC_nd_mtm_agung_military_legacy: "Sultan Agung united Java through military conquest. His legacy inspires our armies to press on — to seize what the sultan's sword demands."
 STATIC_MODIFIER_NAME_nd_mtm_agung_administrative_legacy: "Legacy of Agung's Law"
 STATIC_MODIFIER_DESC_nd_mtm_agung_administrative_legacy: "Sultan Agung's greatest achievement was not conquest but the administrative system that held his conquests together. His reforms guide our governance."
 STATIC_MODIFIER_NAME_nd_mtm_batavia_resolve: "Resolve of Batavia"
 STATIC_MODIFIER_DESC_nd_mtm_batavia_resolve: "The siege of Batavia proved that Java will not submit meekly to foreign interlopers. Though the walls held, the willingness to fight burns brighter than ever."
 STATIC_MODIFIER_NAME_nd_mtm_batavia_lessons: "Lessons of Batavia"
 STATIC_MODIFIER_DESC_nd_mtm_batavia_lessons: "The failed siege taught hard lessons about logistics and supply. Future campaigns will be better provisioned and more carefully planned."
 STATIC_MODIFIER_NAME_nd_mtm_internal_vigilance: "Internal Vigilance"
 STATIC_MODIFIER_DESC_nd_mtm_internal_vigilance: "The trauma of Trunajaya's rebellion demands eternal watchfulness. The throne must detect and neutralize threats before they grow into open revolt."
 STATIC_MODIFIER_NAME_nd_mtm_reconsolidation: "Reconsolidation of Authority"
 STATIC_MODIFIER_DESC_nd_mtm_reconsolidation: "With the rebellion crushed, the sultan moves to rebuild the foundations of royal authority — reaffirming loyalty oaths, restoring order, and reasserting the divine right of the throne."
 # === Events ===
 nd_mtm.1.t: "The Conquests of Sultan Agung"
 nd_mtm.1.d: "Sultan Agung of Mataram — the greatest of Java's Islamic rulers — has spent two decades bringing the island under his dominion. From the fertile rice lands of Central Java, his armies marched east to reduce proud Surabaya through a five-year siege, damming the Brantas River and starving the city into submission. West of the kraton, the coastal kingdoms of the Pasisir have bowed before his banner.\n\nNow Mataram stands as the undisputed master of Java. But the sultan faces a choice that will define his legacy. Shall the energy that conquered Java be turned outward in further military campaigns, or channeled inward to build the administrative foundations that can hold this vast realm together?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mtm.1.a: "The sword that forged Java shall keep it."
 nd_mtm.1.b: "Law and order are greater than conquest."
 nd_mtm.2.t: "The New Javanese Calendar"
 nd_mtm.2.d: "In a bold act of cultural synthesis, Sultan Agung announces a revolutionary new calendar for all of Java. The old Hindu Saka solar calendar, counting years from 78 CE, will henceforth follow the Islamic lunar cycle while retaining its Saka year numbering. The traditional Javanese five-day pasaran market cycle is preserved alongside the seven-day Islamic week, creating a thirty-five-day wetonan cycle unique in the world.\n\nThis is more than timekeeping — it is a statement that Javanese Islam need not abandon its Hindu-Buddhist past, but can weave it into something entirely new. The scholars of the kraton record the change, and the farmers of the sawah adjust their planting cycles to the new reckoning."
 nd_mtm.2.a: "A calendar for a civilization between worlds."
 nd_mtm.3.t: "The Siege of Batavia"
 nd_mtm.3.d: "In 1628, Sultan Agung dispatches an army of thousands westward to the Dutch fortress of Batavia. The campaign is the most ambitious in Javanese history — an attempt to expel the European interlopers who have established themselves on Java's northwest coast. The first assault fails, and a second army arrives in 1629, totaling some 14,000 soldiers under Dipati Ukur and Adipati Juminah.\n\nThe Mataram forces besiege the city and poison the Ciliwung River, causing a cholera plague that kills the Dutch Governor-General Jan Pieterszoon Coen himself. Yet Mataram's supply lines stretch too far, disease ravages the Javanese camp, and the siege ultimately fails.\n\nThe defeat forces a reckoning. How shall Mataram respond to this setback against a technologically advanced foe?"
 nd_mtm.3.a: "We shall return with greater force."
 nd_mtm.3.b: "We must learn to fight differently."
 nd_mtm.4.t: "The Trunajaya Rebellion"
 nd_mtm.4.d: "The Madurese prince Trunajaya has launched a devastating rebellion that nearly destroys the Mataram sultanate. Exploiting widespread anger at the excesses of Sultan Amangkurat I — whose purges claimed thousands of lives and whose corvee demands ground the peasantry — Trunajaya's forces defeat the royal army at Gegodog in 1676, capture the northern coast, and seize the capital at Plered in 1677.\n\nAmangkurat II makes the fateful decision to request VOC military assistance, promising financial concessions and territorial cessions. With Dutch help, Mataram reconquers its lost territories and captures Trunajaya at his stronghold of Kediri in 1678.\n\nThe throne is saved, but at what cost? The sultan must now decide how to rebuild — by strengthening internal security, or by reconsolidating the institutions of royal authority."
 nd_mtm.4.a: "Never again shall we be caught unprepared."
 nd_mtm.4.b: "Restore the foundations of royal power."
 nd_mtm_formed_tt: "Mataram has been formed"
 nd_mtm_path_a_tt: "Chose Legacy of Agung's Sword"
 nd_mtm_path_b_tt: "Chose Legacy of Agung's Law"
