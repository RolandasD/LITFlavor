l_english:
 ## Advance Names and Descriptions ##
 nd_hre_reichshofkanzlei: "Reichshofkanzlei"
 nd_hre_reichshofkanzlei_desc: "The Reichshofkanzlei served as the central administrative organ through which the Emperor governed the vast and fragmented territories of the Holy Roman Empire. Staffed by trained jurists and clerics, the chancellery processed imperial correspondence, issued edicts, and maintained the legal framework that bound hundreds of semi-autonomous territories into a single polity."
 nd_hre_imperial_knights: "Imperial Knighthood"
 nd_hre_imperial_knights_desc: "The Reichsritter, or Imperial Knights, owed allegiance directly to the Emperor rather than to any intermediate prince. These mounted warriors formed the backbone of the Empire's feudal military tradition, maintaining the martial customs of heavy cavalry that had defined Central European warfare since the age of Charlemagne."
 nd_hre_feudal_hierarchy: "Imperial Feudal Hierarchy"
 nd_hre_feudal_hierarchy_desc: "The elaborate hierarchy of electors, princes, counts, and knights that constituted the Imperial estates created a complex web of loyalty, obligation, and privilege. Though often unwieldy, this structure provided the Emperor with a framework for governance that no other European monarchy could match in its diversity."
 nd_hre_reichstag_origins: "Origins of the Reichstag"
 nd_hre_reichstag_origins_desc: "The Imperial Diet, or Reichstag, evolved from informal assemblies of the Empire's princes into a structured legislative body. By the late fifteenth century, it had developed distinct councils of electors, princes, and imperial cities, each with the power to deliberate on matters of taxation, warfare, and imperial reform."
 nd_hre_bergregal: "Imperial Mining Rights"
 nd_hre_bergregal_desc: "The Bergregal established the Emperor's sovereign right over mineral wealth throughout the Empire. First codified under Barbarossa's Roncaglian Constitution of 1158, these mining prerogatives enabled the systematic exploitation of Central Europe's rich silver and copper deposits, particularly in Saxony, Bohemia, and the Tyrol."
 nd_hre_landfrieden: "Tradition of the Landfriede"
 nd_hre_landfrieden_desc: "The medieval Landfriede proclamations sought to limit private warfare and maintain public order across the fragmented territories of the Empire. Though often honored more in the breach than the observance, these peace declarations established the principle that the Emperor bore responsibility for maintaining order throughout the realm."
 nd_hre_messeplatz: "Messeplatz"
 nd_hre_messeplatz_desc: "The great trade fairs of Frankfurt and Leipzig drew merchants from across Europe and beyond. These periodic markets, sanctioned by imperial privilege, served as crucial nodes in the continental trading network, where goods, credit, and information flowed freely across political boundaries."
 nd_hre_bergakademie: "Bergakademie"
 nd_hre_bergakademie_desc: "The Bergakademie represented the institutionalization of mining knowledge that had accumulated over centuries of Central European mineral extraction. These academies trained engineers and overseers in geology, metallurgy, and mine management, transforming artisanal mining into a systematic science."
 nd_hre_maximilian_court: "Maximilian's Renaissance Court"
 nd_hre_maximilian_court_desc: "Emperor Maximilian I transformed the Imperial court into a center of Renaissance learning and artistic patronage. His court at Innsbruck attracted scholars, artists, and musicians, while his passion for tournaments, genealogy, and self-promotion through art helped define the ideal of the Renaissance prince."
 nd_hre_reichspost: "Imperial Postal System"
 nd_hre_reichspost_desc: "The Reichspost, entrusted to the Thurn und Taxis family from 1490, created Europe's first systematic postal network spanning the Holy Roman Empire. Regular mounted couriers connected major cities across thousands of miles, transforming communication, commerce, and imperial governance."
 nd_hre_handelsmesse: "Messe Trade Network"
 nd_hre_handelsmesse_desc: "The formalized system of imperial trade fairs created a network of periodic markets that connected producers, merchants, and consumers across the Empire. From the cloth dealers of Leipzig to the booksellers of Frankfurt, these fairs facilitated the exchange of both goods and ideas."
 nd_hre_reichsmatrikel: "Imperial Army Register"
 nd_hre_reichsmatrikel_desc: "The Reichsmatrikel established the military obligations of each Imperial estate, specifying the number of troops and financial contributions each territory must provide for common defense. This system of shared military burden transformed the Empire's feudal levies into a more predictable, if still decentralized, military force."
 nd_hre_reichskammergericht: "Reichskammergericht"
 nd_hre_reichskammergericht_desc: "Founded at the Diet of Worms in 1495, the Reichskammergericht served as the supreme judicial institution of the Empire. Staffed by trained Roman lawyers, it adjudicated disputes between Imperial estates, enforced the Ewiger Landfriede, and provided a peaceful alternative to the vendetta and private warfare that had plagued the Empire for centuries."
 nd_hre_ewiger_landfriede: "Perpetual Public Peace"
 nd_hre_ewiger_landfriede_desc: "The Ewiger Landfriede of 1495 constituted the definitive and perpetual ban on the medieval right of vendetta within the Holy Roman Empire. Proclaimed at the Diet of Worms under Maximilian I, it established that all disputes must henceforth be settled through the courts rather than by force of arms."
 nd_hre_reichskreise: "Imperial Circles"
 nd_hre_reichskreise_desc: "The ten Reichskreise, established between 1500 and 1512, organized the Empire's territories into regional administrative groupings. Each Circle was responsible for collecting imperial taxes, maintaining public peace, enforcing court decisions, and mobilizing military contingents — creating a federal structure unique in European governance."
 nd_hre_druckkunst: "Legacy of the Printing Press"
 nd_hre_druckkunst_desc: "Gutenberg's invention of movable type in Mainz around 1440 transformed the Holy Roman Empire into the intellectual forge of Europe. German printing workshops spread rapidly to Strasbourg, Nuremberg, and Augsburg, disseminating humanist scholarship, religious debate, and practical knowledge at a pace the manuscript culture could never have achieved."
 nd_hre_imperial_pikeman: "Imperial Pike Regiments"
 nd_hre_imperial_pikeman_desc: "The reformed infantry of the post-Reichsreform era combined the disciplined pike formations that had proven devastating in Swiss warfare with the organizational structure demanded by the new Imperial military system. These professionally trained pikemen represented the Empire's answer to the military revolution of the sixteenth century."
 nd_hre_universitaeten: "Imperial University Tradition"
 nd_hre_universitaeten_desc: "The Holy Roman Empire boasted the densest network of universities in Christendom, from ancient foundations at Prague, Vienna, and Heidelberg to newer establishments across the German lands. These institutions trained the jurists, theologians, and administrators who maintained the Empire's complex constitutional machinery."
 nd_hre_augsburger_religionsfriede: "Peace of Augsburg"
 nd_hre_augsburger_religionsfriede_desc: "The Religious Peace of Augsburg in 1555 established the principle of cuius regio, eius religio — whose realm, his religion. This revolutionary settlement granted Lutheran princes the legal right to determine the confession of their territories, ending decades of religious warfare within the Empire and establishing a framework for confessional coexistence."
 nd_hre_reichsheer: "Imperial Army Contingents"
 nd_hre_reichsheer_desc: "The Reichsheer formalized the system by which Imperial Circles raised and equipped military contingents according to the Reichsmatrikel. Though never a standing army, these regional forces could be mobilized for common defense, representing the collective military capacity of the Empire's hundreds of constituent territories."
 nd_hre_zeughaus: "Zeughaus"
 nd_hre_zeughaus_desc: "The Zeughaus served as both armory and manufacturing center for Imperial military equipment. From the great arsenals of Berlin, Vienna, and Augsburg, the Empire maintained stockpiles of weapons, armor, and gunpowder that could equip the Reichsarmee on short notice."
 nd_hre_reichshandelsordnung: "Imperial Trade Governance"
 nd_hre_reichshandelsordnung_desc: "Imperial commercial regulations sought to standardize weights, measures, and trading practices across the Empire's fragmented economic landscape. While enforcement remained uneven, these ordinances provided a common framework that facilitated long-distance trade between the Empire's hundreds of markets and fairs."
 nd_hre_konfessionspolitik: "Confessional Diplomacy"
 nd_hre_konfessionspolitik_desc: "The religious division of the Empire into Catholic and Protestant camps created a distinctive form of confessional politics. Imperial statesmen learned to navigate between religious blocs, using diplomatic skill, legal precedent, and the Empire's constitutional machinery to maintain a fragile balance between confessions."
 nd_hre_metallverarbeitung: "Imperial Metalworks"
 nd_hre_metallverarbeitung_desc: "The Empire's rich deposits of iron, copper, and silver supported a vast metalworking industry centered in Saxony, the Harz Mountains, and the Styrian Alps. Imperial metallurgists developed advanced smelting and forging techniques that made Central European ironwork and armaments renowned across the continent."
 nd_hre_westfaelischer_friede: "Peace of Westphalia"
 nd_hre_westfaelischer_friede_desc: "The Peace of Westphalia in 1648 ended the catastrophic Thirty Years' War and reshaped the constitutional order of the Empire. Calvinism was recognized alongside Catholicism and Lutheranism, Imperial estates gained greater sovereignty, and the principle of religious toleration was embedded in the fundamental law of the Empire."
 nd_hre_kaiserliche_kurassiere: "Imperial Cuirassiers"
 nd_hre_kaiserliche_kurassiere_desc: "The Kaiserliche Kurassiere represented the apex of heavy cavalry in the post-Westphalian Empire. Equipped with breastplate and helmet, armed with sword and pistol, these elite horsemen delivered devastating charges that could shatter infantry formations. The great cavalry academies of the Empire trained generations of officers in the art of mounted warfare."
 nd_hre_reichsarmee: "Standing Reichsarmee"
 nd_hre_reichsarmee_desc: "The formalization of the Reichsarmee into a more permanent institution gave the Empire a military force capable of defending its borders and projecting power. Though still drawn from the contingents of individual states, improved coordination through the Imperial Circles created a force greater than the sum of its parts."
 nd_hre_barockkultur: "Imperial Baroque Culture"
 nd_hre_barockkultur_desc: "The baroque era transformed the courts and cities of the Empire into showcases of artistic magnificence. From the grand palaces of Vienna and Dresden to the pilgrimage churches of Bavaria, the baroque style expressed both the power of the Imperial tradition and the cultural vitality of the German lands."
 nd_hre_rathaus: "Rathaus"
 nd_hre_rathaus_desc: "The grand Rathaeuser of the Imperial cities embodied civic pride and urban self-governance within the constitutional framework of the Empire. These imposing structures served as centers of municipal administration, justice, and commerce, housing the councils that governed some of the wealthiest cities in Europe."
 nd_hre_postwesen: "Imperial Postal Network"
 nd_hre_postwesen_desc: "The expansion of the Thurn und Taxis postal system into a comprehensive network spanning the Empire's territories created the most efficient communications infrastructure in early modern Europe. Regular postal routes connected even provincial towns to the great centers of commerce and government."
 nd_hre_aufklaerung: "German Enlightenment"
 nd_hre_aufklaerung_desc: "The Aufklarung brought the ideals of reason, tolerance, and systematic knowledge to the institutions of the Empire. German philosophers from Leibniz to Kant transformed European thought, while enlightened administrators in Prussia, Austria, and the smaller German states modernized governance, education, and justice."
 nd_hre_imperial_fusilier: "Imperial Fusiliers"
 nd_hre_imperial_fusilier_desc: "The Imperial Fusiliers represented the professionalization of infantry warfare in the late Empire. Trained in Enlightenment-era drill and tactics, equipped with standardized muskets and bayonets, these soldiers embodied the rationalized approach to warfare that characterized the eighteenth-century military revolution."
 nd_hre_manufaktur: "Imperial Manufactories"
 nd_hre_manufaktur_desc: "The spread of centralized manufacturing throughout the Empire transformed traditional craft production into proto-industrial enterprise. State-sponsored manufactories in porcelain, textiles, and metalwork combined German technical skill with Enlightenment principles of rational organization."
 nd_hre_polizeiwissenschaft: "Science of Governance"
 nd_hre_polizeiwissenschaft_desc: "Polizeiwissenschaft, the German science of governance and public administration, sought to systematize every aspect of state management. Drawing on centuries of Imperial constitutional experience, German cameralists developed comprehensive theories of fiscal policy, population management, and public welfare that influenced administrative practice across Europe."
 nd_hre_reichsverfassung: "Imperial Constitutional Tradition"
 nd_hre_reichsverfassung_desc: "The accumulated constitutional law of the Empire — from the Golden Bull to the Peace of Westphalia and beyond — created a body of precedent and principle unique in European governance. This constitutional tradition balanced imperial authority against princely liberty, providing a framework for federal governance that influenced later constitutional thought."
 nd_hre_kavallerieschule: "Kavallerieschule"
 nd_hre_kavallerieschule_desc: "Training academies for the Empire's officer corps, teaching horsemanship, cavalry tactics, and military science. Institutions like the Spanish Riding School in Vienna preserved and refined centuries of equestrian tradition, producing the skilled cavalry officers who led the Empire's mounted forces."
 ## Unit Names and Descriptions ##
 a_nd_hre_imperial_reiter: "Imperial Reiter"
 a_nd_hre_imperial_reiter_desc: "Mounted knights owing direct allegiance to the Emperor, the Imperial Reiter upheld the feudal military tradition that had defined Central European warfare for centuries. Equipped with lance, sword, and heavy armor, they represented the martial elite of the Empire."
 a_nd_hre_imperial_pikeman: "Imperial Pikeman"
 a_nd_hre_imperial_pikeman_desc: "Disciplined pike infantry trained in the reformed Imperial military system. Organized into dense formations with eighteen-foot pikes, these soldiers held the line against cavalry charges and anchored the Empire's battle formations."
 a_nd_hre_reichsheer_infantry: "Reichsheer Infantry"
 a_nd_hre_reichsheer_infantry_desc: "Infantry contingents raised through the Imperial military system, drawn from across the territories of the Empire. Though lacking the professional cohesion of standing armies, the Reichsheer's sheer numbers and regional diversity made it a formidable defensive force."
 a_nd_hre_kaiserliche_kurassiere: "Kaiserliche Kurassiere"
 a_nd_hre_kaiserliche_kurassiere_desc: "The elite heavy cavalry of the Empire, equipped with cuirass and armed with sword and pistol. The Kaiserliche Kurassiere were trained to deliver devastating shock charges that could break enemy formations, carrying forward the martial traditions of the Imperial knighthood into the age of gunpowder."
 a_nd_hre_imperial_fusilier: "Imperial Fusilier"
 a_nd_hre_imperial_fusilier_desc: "Professional line infantry of the late Empire, trained in Enlightenment-era drill and equipped with standardized flintlock muskets. The Imperial Fusiliers embodied the rationalized military reforms that sought to create a modern standing army from the Empire's ancient military traditions."
 ## Building Descriptions (unique buildings not sharing advance keys) ##
 nd_hre_universitas: "Universitas"
 nd_hre_universitas_desc: "An Imperial university drawing scholars from across the German lands, training the jurists, theologians, physicians, and administrators upon whom the Empire's governance depended."
 nd_hre_barockpalast: "Barockpalast"
 nd_hre_barockpalast_desc: "A grand baroque palace built in the magnificent style that defined the courts of the late Empire, serving as a center of aristocratic culture, artistic patronage, and political display."
 ## Production Method Names ##
 nd_hre_imperial_mining: "Imperial Mining Operations"
 nd_hre_imperial_mining_desc: "Systematic extraction of silver and copper under the Bergregal, the Emperor's sovereign right over mineral wealth."
 nd_hre_fair_trade: "Trade Fair Commerce"
 nd_hre_fair_trade_desc: "The regulated commerce of the great imperial trade fairs, drawing cloth, dyes, and luxury goods from across Europe."
 nd_hre_metalworks: "Imperial Metalworks"
 nd_hre_metalworks_desc: "Advanced smelting and forging operations transforming Central Europe's iron deposits into the armaments and tools that sustained the Empire."
 nd_hre_manufaktur_pm: "Centralized Manufactories"
 nd_hre_manufaktur_pm_desc: "Proto-industrial manufacturing combining German technical expertise with Enlightenment principles of rational organization."
 ## Timed Modifier Names and Descriptions ##
 STATIC_MODIFIER_NAME_nd_hre_pax_imperii: "Pax Imperii"
 STATIC_MODIFIER_DESC_nd_hre_pax_imperii: "The Perpetual Public Peace has been proclaimed throughout the Empire. The medieval right of vendetta is abolished, and all disputes must henceforth be settled through the courts."
 STATIC_MODIFIER_NAME_nd_hre_imperial_justice: "Imperial Justice"
 STATIC_MODIFIER_DESC_nd_hre_imperial_justice: "The Imperial Chamber Court has been established, providing a supreme judicial institution where the disputes of princes and the grievances of subjects can be adjudicated according to Roman law."
 STATIC_MODIFIER_NAME_nd_hre_cuius_regio: "Cuius Regio, Eius Religio"
 STATIC_MODIFIER_DESC_nd_hre_cuius_regio: "The principle that each ruler may determine the religion of their territory has brought an end to open religious warfare within the Empire, establishing a framework for confessional coexistence."
 STATIC_MODIFIER_NAME_nd_hre_westphalian_order: "Westphalian Order"
 STATIC_MODIFIER_DESC_nd_hre_westphalian_order: "The Peace of Westphalia has recast the constitutional foundations of the Empire. Religious toleration is enshrined in law, sovereign rights are clarified, and a new era of diplomatic order begins."
 ## Levy Names ##
 levy_nd_hre_imperial_reiter: "Imperial Reiter Levy"
 levy_nd_hre_imperial_reiter_desc: "Feudal mounted knights raised from the Empire's noble estates."
 levy_nd_hre_reichsheer: "Reichsheer Levy"
 levy_nd_hre_reichsheer_desc: "Infantry contingents raised through the Imperial military contribution system."
 ## Event Localization ##
 nd_hre.2.t: "The Perpetual Public Peace"
 nd_hre.2.d: "At the Diet of Worms, the assembled estates of the Empire have proclaimed the Ewiger Landfriede — the Perpetual Public Peace. This solemn declaration abolishes forever the ancient right of vendetta that has plagued our realm for centuries. Henceforth, no prince, knight, or city may take up arms to settle private disputes. All grievances must be brought before the Imperial courts.\n\nThe Landfriede represents more than a mere prohibition of private warfare. It is a declaration that the Empire is a community of law, bound together not by the sword alone but by shared institutions and the pursuit of justice. The newly established Reichskammergericht stands ready to adjudicate the disputes that once would have been settled on the battlefield.\n\nShall we embrace this new order as the foundation of imperial governance, or accept it as a welcome respite from disorder?"
 nd_hre.2.a: "This peace shall be the foundation of our realm."
 nd_hre.2.b: "Peace must be defended with strength."
 nd_hre.3.t: "The Imperial Chamber Court"
 nd_hre.3.d: "The Reichskammergericht has been established as the supreme judicial institution of the Holy Roman Empire. Unlike the Emperor's personal Aulic Council, this court derives its authority from the Imperial Diet itself, staffed by learned jurists trained in Roman law and nominated by the Imperial estates.\n\nIts jurisdiction encompasses all disputes between the territories of the Empire — breaches of the public peace, violations of Imperial decrees, property conflicts between princes, and the grievances of subjects against their overlords. For the first time, the Empire possesses a permanent judicial institution capable of resolving the conflicts that have destabilized the realm for generations.\n\nThe establishment of this court marks a transformation in how the Empire governs itself. No longer must justice depend solely on the will and presence of the Emperor — it now resides in institutions of law."
 nd_hre.3.a: "Let justice be the pillar of Imperial authority."
 nd_hre.3.b: "Let the court extend our influence across the Empire."
 nd_hre.4.t: "The Religious Peace of Augsburg"
 nd_hre.4.d: "After decades of confessional strife that threatened to tear the Empire apart, the assembled estates have reached a settlement of extraordinary consequence. The Peace of Augsburg establishes the principle of cuius regio, eius religio — each ruler may determine whether Catholicism or Lutheranism shall be the official confession of their territory.\n\nThis is no declaration of individual religious freedom, but rather a pragmatic accommodation between sovereign princes. Subjects who cannot accept their ruler's chosen confession may sell their property and emigrate to a territory of their preferred faith. The ecclesiastical reservation protects Church properties, while the Declaratio Ferdinandei permits existing Lutheran practice in certain ecclesiastical territories.\n\nThe peace is imperfect — Calvinism remains unrecognized, and the competing claims of confessional truth have merely been managed, not resolved. Yet it offers the Empire what it needs most: an end to open religious warfare and a framework for coexistence."
 nd_hre.4.a: "Let each prince govern according to his conscience."
 nd_hre.4.b: "One faith, one Empire — there can be no compromise."
 nd_hre.5.t: "The Peace of Westphalia"
 nd_hre.5.d: "After thirty years of war that killed eight million souls and devastated the heart of Europe, the great powers have concluded the Peace of Westphalia in the twin cities of Muenster and Osnabrueck. The settlement reshapes the constitutional order of the Holy Roman Empire itself.\n\nCalvinism is now recognized alongside Catholicism and Lutheranism. The sovereignty of the Imperial estates is confirmed and expanded — they may conduct their own foreign policy, so long as they do not act against the Emperor or the Empire. The Imperial Diet gains new powers, and the constitutional balance between Emperor and estates is codified in ways that will endure for generations.\n\nFor the wider world, Westphalia establishes principles that will define the emerging international order: the equality of sovereign states, the inviolability of territorial boundaries, and the obligation of non-interference in the internal affairs of other polities. The Empire emerges diminished in some respects but with a constitutional framework more sophisticated than any other in Europe."
 nd_hre.5.a: "A new order for the Empire and for Europe."
 nd_hre.5.b: "Let us rebuild what war has destroyed."
 nd_hre.6.t: "The German Enlightenment"
 nd_hre.6.d: "The Aufklarung has swept through the universities, courts, and salons of the Empire. From Leibniz's rational philosophy to Wolff's systematic metaphysics, German thinkers are reshaping European intellectual life. The dense network of Imperial universities, free cities with their printing presses, and princely courts competing for cultural distinction has created a uniquely fertile environment for the spread of Enlightenment ideals.\n\nEnlightened administrators across the Empire are applying rational principles to governance — reforming legal codes, establishing public education, promoting religious toleration, and modernizing state administration. The cameralist tradition, born of centuries of Imperial constitutional practice, is evolving into a comprehensive science of governance that other European states study and emulate.\n\nThe German Enlightenment is not merely an intellectual movement. It is transforming the institutions, laws, and administration of the Empire from within."
 nd_hre.6.a: "Reason shall be our guide."
 nd_hre_chancellery_maintenance: "Chancellery Upkeep"
 nd_hre_chancellery_maintenance_desc: "Maintaining the administrative records, legal books, and correspondence of an Imperial chancellery."
 nd_hre_fair_maintenance: "Fair Grounds Upkeep"
 nd_hre_fair_maintenance_desc: "Preparing and maintaining the grounds, stalls, and facilities for Imperial trade fairs."
 nd_hre_mining_operations: "Mining Operations"
 nd_hre_mining_operations_desc: "Supplying timber supports and iron tools for mining academy operations."
 nd_hre_court_maintenance: "Court Upkeep"
 nd_hre_court_maintenance_desc: "Maintaining the records, seals, law books, and legal correspondence of an Imperial court of law."
 nd_hre_university_maintenance: "University Upkeep"
 nd_hre_university_maintenance_desc: "Providing books, paper, and scholarly materials to an Imperial university."
 nd_hre_arsenal_maintenance: "Arsenal Upkeep"
 nd_hre_arsenal_maintenance_desc: "Manufacturing and storing arms and equipment at an Imperial arsenal."
 nd_hre_palace_maintenance: "Palace Upkeep"
 nd_hre_palace_maintenance_desc: "Maintaining the stonework and glass of a grand baroque palace."
 nd_hre_rathaus_maintenance: "Rathaus Upkeep"
 nd_hre_rathaus_maintenance_desc: "Maintaining the civic buildings and administrative operations of an Imperial town hall."
 nd_hre_academy_maintenance: "Academy Upkeep"
 nd_hre_academy_maintenance_desc: "Providing horses, equipment, and instructors for a cavalry training academy."
 STATIC_MODIFIER_NAME_nd_hre_armed_peace: "Armed Peace"
 STATIC_MODIFIER_DESC_nd_hre_armed_peace: "The Perpetual Public Peace is maintained not by law alone but by the military readiness of the Imperial estates. Peace is preserved because all know the cost of breaking it."
 STATIC_MODIFIER_NAME_nd_hre_imperial_diplomacy: "Imperial Diplomacy"
 STATIC_MODIFIER_DESC_nd_hre_imperial_diplomacy: "The Imperial Chamber Court extends the Empire's diplomatic influence, as its legal authority resolves disputes that once would have required ambassadors and armies."
 STATIC_MODIFIER_NAME_nd_hre_religious_conformity: "Religious Conformity"
 STATIC_MODIFIER_DESC_nd_hre_religious_conformity: "One faith, one Empire. The insistence on religious uniformity strengthens state authority and social cohesion, even at the cost of tolerating no dissent."
 STATIC_MODIFIER_NAME_nd_hre_postwar_recovery: "Postwar Recovery"
 STATIC_MODIFIER_DESC_nd_hre_postwar_recovery: "The devastation of war gives way to reconstruction. Trade resumes, fields are replanted, and the economy slowly recovers from the catastrophe."
