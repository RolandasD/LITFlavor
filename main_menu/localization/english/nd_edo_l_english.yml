l_english:
 STATIC_MODIFIER_NAME_nd_obas_divine_authority: "Oba's Divine Authority"
 STATIC_MODIFIER_DESC_nd_obas_divine_authority: "The Oba rules as the divine embodiment of the Edo state, his word law, his palace the center of all power. The hereditary chiefs serve at his pleasure and the warrior guilds march at his command."
 STATIC_MODIFIER_NAME_nd_city_of_guilds: "City of Guilds"
 STATIC_MODIFIER_DESC_nd_city_of_guilds: "Benin City thrives as a metropolis of organized artisan guilds, each mastering a hereditary craft under royal patronage. The brass-casters, ivory-carvers, leather-workers, and weavers form the economic and cultural backbone of the kingdom."
 nd_edo.1.t: "The Kingdom of Benin"
 nd_edo.1.d: "The Edo people have united under a single banner. Benin City, with its massive earthwork fortifications and broad avenues lined with guild workshops, stands as one of the great cities of West Africa. The Oba's palace dominates the skyline, its walls decorated with bronze plaques depicting the kingdom's history.\n\nBut the character of this new kingdom remains to be determined. Will the Oba assert absolute divine authority, concentrating all military and political power in the palace? Or will the kingdom's strength flow from its extraordinary guild system — the brass-casters of Igun Street, the ivory carvers, the blacksmiths — whose hereditary crafts have made Benin famous across the known world?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_edo.1.a: "The Oba is the kingdom — all power flows from the palace."
 nd_edo.1.b: "The guilds are the kingdom — their craft is our strength."
 STATIC_MODIFIER_NAME_nd_edo_ewuare_conqueror: "Ewuare the Conqueror"
 STATIC_MODIFIER_DESC_nd_edo_ewuare_conqueror: "Following the model of Oba Ewuare, the kingdom pursues aggressive expansion, subjugating neighboring peoples and demanding tribute in captives and resources."
 STATIC_MODIFIER_NAME_nd_edo_ewuare_builder: "Ewuare the Builder"
 STATIC_MODIFIER_DESC_nd_edo_ewuare_builder: "Following the model of Oba Ewuare, the kingdom invests in rebuilding the capital, expanding the earthworks, and patronizing the arts and festivals that define Edo identity."
 nd_edo.2.t: "The Legacy of Ewuare"
 nd_edo.2.d: "Oba Ewuare the Great transformed the Edo kingdom from a collection of loosely affiliated communities into an imperial state. He renamed the kingdom, rebuilt Benin City with broad streets radiating from the palace, reformed the political hierarchy by appointing the crown prince Edaiken as the seventh member of the Uzama council, and led military expeditions eastward against the Igala kingdom at Idah and westward to subdue the Yoruba towns of Owo and Idanre.\n\nHis campaigns expanded Benin's territory to over 5,000 square miles, creating a network of tributary relationships that fueled the kingdom's economy with levies of manpower and resources. But Ewuare was also a patron of arts and festivals, introducing the Igue ceremony and the guild of costume and bead workers.\n\nWill we follow the path of Ewuare the conqueror, or Ewuare the builder?"
 nd_edo.2.a: "His sword carved out our dominion."
 nd_edo.2.b: "His vision built our capital."
 STATIC_MODIFIER_NAME_nd_edo_portuguese_arms: "Portuguese Arms Trade"
 STATIC_MODIFIER_DESC_nd_edo_portuguese_arms: "European firearms and military supplies flow through Benin's ports, strengthening the kingdom's armed forces and enabling rapid military modernization."
 STATIC_MODIFIER_NAME_nd_edo_portuguese_trade: "Portuguese Commercial Alliance"
 STATIC_MODIFIER_DESC_nd_edo_portuguese_trade: "Commercial ties with Portuguese merchants have opened new markets for Benin's pepper, ivory, and palm oil, enriching the kingdom's treasury and expanding its trade networks."
 nd_edo.3.t: "Arrival of the Portuguese"
 nd_edo.3.d: "Portuguese sailors have appeared on the coast near Benin City, bearing strange goods and stranger customs. Their delegations assiduously seek commercial treaties with the Oba, recognizing Benin as the most powerful polity in the region.\n\nThe Oba's position is strong. He has prohibited the sale of male slaves — he needs them for his own army — and imposed strict controls on all trade through royal monopoly. The Portuguese offer firearms, brass ingots for the bronze-casters, and access to distant markets. In return they seek pepper, ivory, cloth, and beads.\n\nThe question is not whether to trade, but what to prioritize. Shall we focus on acquiring European arms to strengthen our military, or on building lasting commercial relationships that will enrich the kingdom for generations?"
 nd_edo.3.a: "Their weapons will make our warriors invincible."
 nd_edo.3.b: "Their markets will make our merchants wealthy."
 nd_edo.4.t: "Masters of the Lost-Wax"
 nd_edo.4.d: "The Igun Eronmwon, the guild of brass-casters on Igun Street, have reached an extraordinary level of mastery. Using the ancient lost-wax technique — where molten metal is poured into precisely carved wax and clay moulds — they produce portrait heads, commemorative plaques, and ceremonial objects of astonishing naturalism and detail.\n\nTheir work serves a political purpose as much as an artistic one. The bronze plaques that line the palace walls depict the history of the kingdom, the deeds of past Obas, and the proper order of the world. Every plaque is a statement of power, legitimacy, and cultural identity. The guild's hereditary membership ensures their secrets are preserved across generations, and their status as the highest-ranking artisan guild in Benin reflects the kingdom's understanding that artistic excellence is inseparable from political authority."
 nd_edo.4.a: "Their art immortalizes our kingdom."
 nd_edo.5.t: "The Queen Mother's Court"
 nd_edo.5.d: "The institution of the Iyoba — the Queen Mother — has become a formidable pillar of Benin's political structure. The Iyoba commands her own palace, her own court, and most remarkably, her own military regiment. This is no mere ceremonial honor.\n\nThe Iyoba's regiment provides the Oba with a loyal military force separate from the warrior guilds and noble retinues, a counterbalance to any faction that might threaten royal authority. Her political influence extends through her own network of advisors and agents, giving the monarchy a second center of power that strengthens the whole structure.\n\nThe establishment of this institution represents a sophisticated understanding of governance — that concentrated power is less stable than distributed loyalty."
 nd_edo.5.a: "The Iyoba strengthens us all."
 nd_edo_ogiso_legacy: "Ogiso Legacy"
 nd_edo_ogiso_legacy_desc: "The traditions of the ancient Ogiso dynasty, the 'rulers of the sky,' form the spiritual foundation of Edo identity and ancestor worship."
 nd_edo_iya_fortifications: "Iya Fortifications"
 nd_edo_iya_fortifications_desc: "The massive earthwork moat-and-rampart system surrounding Benin City, begun under Oba Oguola, reaching heights of 18 meters and encircling the entire capital."
 nd_edo_early_guilds: "Early Guild Organization"
 nd_edo_early_guilds_desc: "The first organization of Benin's artisan guilds under royal patronage, establishing the hereditary craft traditions that would define the kingdom's economy."
 nd_edo_warrior_guilds: "Warrior Guild Tradition"
 nd_edo_warrior_guilds_desc: "The organized warrior guilds of Benin, equipped with swords, spears, and shields of elephant or crocodile skin, famed for their discipline across the Guinea coast."
 nd_edo_oral_histories: "Oral Histories of the Edo"
 nd_edo_oral_histories_desc: "The rich oral traditions preserving the genealogy of the Obas, the deeds of ancestors, and the legal customs of the Edo people across generations."
 nd_edo_ewuare_reforms: "Ewuare's Reforms"
 nd_edo_ewuare_reforms_desc: "The sweeping political reforms of Oba Ewuare the Great, who centralized royal authority, reorganized the Uzama council, and transformed Benin into an imperial state."
 nd_edo_eben_tradition: "Eben Sword Tradition"
 nd_edo_eben_tradition_desc: "The mastery of the eben, the traditional Edo short sword wielded by the warrior guilds in disciplined formations that foreign observers compared favorably to any in Guinea."
 nd_edo_uzama_reform: "Uzama Reform"
 nd_edo_uzama_reform_desc: "The reformation of the Uzama hereditary nobility, bringing the traditional kingmakers under firmer royal control and reducing their independent power."
 nd_edo_regional_trade: "Regional Trade Networks"
 nd_edo_regional_trade_desc: "Benin's role as a middle-trader between West African kingdoms, exchanging fish, salt, yams, cotton, and semi-precious stone beads across the Lower Niger region."
 nd_edo_expanded_earthworks: "Expanded Earthworks"
 nd_edo_expanded_earthworks_desc: "The extension of Benin's defensive earthworks into the outer city, creating an interconnecting system of moats and ramparts covering thousands of square kilometers."
 nd_edo_court_arts: "Court Arts Patronage"
 nd_edo_court_arts_desc: "The Oba's patronage of the hereditary artisan guilds, producing ivory carvings, bronze sculptures, coral bead work, and elaborately decorated textiles for the royal court."
 nd_edo_portuguese_contact: "Portuguese Contact"
 nd_edo_portuguese_contact_desc: "The arrival of Portuguese traders around 1486, opening Benin to Atlantic commerce and bringing new goods, technologies, and diplomatic relationships."
 nd_edo_igun_eronmwon: "Igun Eronmwon Mastery"
 nd_edo_igun_eronmwon_desc: "The brass-casters of Igun Street achieve mastery of the lost-wax technique, producing the bronze plaques, portrait heads, and ceremonial objects that define Benin's artistic legacy."
 nd_edo_guild_warrior_tradition: "Guild Warrior Tradition"
 nd_edo_guild_warrior_tradition_desc: "The maturation of Benin's organized warrior guilds into a disciplined military force, equipped with swords, spears, and poisoned arrows, capable of mobilizing 20,000 soldiers in a single day."
 nd_edo_royal_monopoly: "Royal Trade Monopoly"
 nd_edo_royal_monopoly_desc: "The Oba's strict control over all foreign trade, creating royal monopolies on pepper, ivory, and palm oil that gave Benin a strong bargaining position with European merchants."
 nd_edo_pepper_trade: "Pepper Export Trade"
 nd_edo_pepper_trade_desc: "The systematic export of pepper and ivory to European markets, with the Oba controlling prices and quantities to maximize the kingdom's profit."
 nd_edo_lower_niger_control: "Lower Niger Administration"
 nd_edo_lower_niger_control_desc: "The extension of Benin's administrative reach across the Lower Niger, establishing tributary relationships with neighboring polities through a combination of military force and diplomacy."
 nd_edo_iyoba_institution: "Iyoba Institution"
 nd_edo_iyoba_institution_desc: "The establishment of the Iyoba, the Queen Mother, as a political institution with her own palace, court, and military regiment — a counterbalance to noble factions."
 nd_edo_palace_societies: "Palace Societies"
 nd_edo_palace_societies_desc: "The Iwebo, Iweguae, and Ibiwe palace societies that managed the Oba's wardrobe, regalia, and household respectively, forming a professional bureaucracy within the royal court."
 nd_edo_ivory_exports: "Ivory Export Mastery"
 nd_edo_ivory_exports_desc: "The height of Benin's ivory trade, with skilled carvers producing elaborate tusks, armlets, and decorative objects for both domestic use and European markets."
 nd_edo_firearms_adoption: "Firearms Adoption"
 nd_edo_firearms_adoption_desc: "The integration of European firearms into Benin's military, initially through Portuguese trade and later through Dutch and British merchants."
 nd_edo_benin_city_planning: "Benin City Planning"
 nd_edo_benin_city_planning_desc: "The sophisticated urban organization of Benin City, with broad streets radiating from the Oba's palace, specialized guild quarters, and planned residential districts."
 nd_edo_isekpokin_guild: "Isekpokin Guild"
 nd_edo_isekpokin_guild_desc: "The Isekpokin guild of shield and leather-workers, producing the distinctive elephant and crocodile skin shields carried by Benin's warriors into battle."
 nd_edo_absolute_monarchy: "Absolute Monarchy"
 nd_edo_absolute_monarchy_desc: "The zenith of the Oba's absolute authority, with all aspects of political, economic, military, and religious life centered on the royal palace."
 nd_edo_musketeer_regiments: "Edo Musketeer Regiments"
 nd_edo_musketeer_regiments_desc: "The reorganization of Benin's blacksmith guilds to manufacture light firearms locally, reducing dependence on European imports for military hardware."
 nd_edo_palm_oil_trade: "Palm Oil Trade"
 nd_edo_palm_oil_trade_desc: "The expansion of palm oil exports as a major trade commodity, complementing the declining pepper and ivory trades in the later period."
 nd_edo_european_diplomacy: "European Diplomacy"
 nd_edo_european_diplomacy_desc: "Benin's sophisticated diplomatic maneuvering between competing European powers — Portuguese, Dutch, and British — playing rivals against each other to maintain independence."
 nd_edo_defensive_warfare: "Defensive Warfare Doctrine"
 nd_edo_defensive_warfare_desc: "The kingdom's shift toward defensive military strategy, leveraging the massive earthwork fortifications and knowledge of local terrain against foreign incursions."
 nd_edo_military_manpower: "Military Manpower Reserve"
 nd_edo_military_manpower_desc: "The Oba's prohibition on selling male slaves, preserving the kingdom's manpower for its own military needs and ensuring a large reserve of warriors."
 nd_edo_guild_codification: "Guild Codification"
 nd_edo_guild_codification_desc: "The formal codification of guild traditions, techniques, and hereditary rights, preserving centuries of accumulated knowledge in brass-casting, ivory-carving, and textile production."
 nd_edo_local_firearms: "Local Firearms Manufacture"
 nd_edo_local_firearms_desc: "The development of indigenous firearms production by reorganized blacksmith guilds, achieving partial independence from European arms imports."
 nd_edo_sovereignty_defense: "Sovereignty Defense"
 nd_edo_sovereignty_defense_desc: "The kingdom's determined resistance to European colonial encroachment, drawing on centuries of military tradition and the natural advantages of the earthwork fortifications."
 nd_edo_trade_diversification: "Trade Diversification"
 nd_edo_trade_diversification_desc: "The diversification of Benin's export economy beyond the traditional pepper, ivory, and palm oil trade to include manufactured goods and processed materials."
 nd_edo_cultural_resilience: "Cultural Resilience"
 nd_edo_cultural_resilience_desc: "The enduring strength of Edo cultural identity — the guild traditions, the Oba's rituals, the bronze-casting legacy — persisting through centuries of external pressure and change."
 a_nd_edo_eben_warriors: "Eben Warriors"
 a_nd_edo_eben_warriors_desc: "Disciplined Edo sword infantry wielding the traditional eben short sword and shields of elephant skin. Foreign observers noted their organization surpassed any other force on the Guinea coast."
 a_nd_edo_guild_warriors: "Guild Warriors"
 a_nd_edo_guild_warriors_desc: "The organized warrior guilds of Benin, equipped with swords, spears, and poisoned arrows. Capable of being mobilized twenty thousand strong in a single day at the Oba's command."
 a_nd_edo_iyoba_guard: "Iyoba Guard"
 a_nd_edo_iyoba_guard_desc: "The Queen Mother's own regiment, a loyal military force personally commanded by the Iyoba. They serve as a counterbalance to the noble retinues and warrior guild factions."
 a_nd_edo_musketeers: "Edo Musketeers"
 a_nd_edo_musketeers_desc: "Benin's locally-armed musketeer regiments, equipped with firearms manufactured by the kingdom's reorganized blacksmith guilds, reducing dependence on European arms imports."
 nd_edo_igun_workshop: "Igun Street Workshop"
 nd_edo_igun_workshop_desc: "The workshops of the Igun Eronmwon guild on Igun Street, where hereditary brass-casters produce the famous Benin Bronzes using the ancient lost-wax technique."
 nd_edo_market_house: "Oba's Market House"
 nd_edo_market_house_desc: "A royal trade house where all foreign commerce passes under the Oba's monopoly. Pepper, ivory, and palm oil are weighed, taxed, and allocated by royal agents."
 nd_edo_iya_earthwork: "Iya Earthwork"
 nd_edo_iya_earthwork_desc: "A section of the massive moat-and-rampart system that once encircled Benin City and its surrounding territories, reaching heights of 18 meters with interconnecting circles of ditches and dump ramparts."
 nd_edo_warrior_barracks: "Warrior Guild Barracks"
 nd_edo_warrior_barracks_desc: "Training grounds and armories for the organized warrior guilds, where soldiers drill in the use of the eben sword, spear, and bow under the direction of hereditary war chiefs."
 nd_edo_ogiso_shrine: "Ogiso Ancestral Shrine"
 nd_edo_ogiso_shrine_desc: "A shrine dedicated to the ancient Ogiso dynasty, the 'rulers of the sky' who preceded the Oba dynasty and whose spiritual legacy underpins Edo religious practice and cultural identity."
 nd_edo_storyteller_hall: "Storyteller's Hall"
 nd_edo_storyteller_hall_desc: "A gathering place where griots and oral historians preserve and transmit the genealogies, laws, and epic narratives of the Edo people through the art of storytelling."
 nd_edo_admin_hall: "Oba's Administrative Hall"
 nd_edo_admin_hall_desc: "A hall of governance where the Oba's appointed officials manage tribute collection, territorial administration, and the complex hierarchy of hereditary and appointed chiefs."
 nd_edo_palace_hall: "Palace Society Hall"
 nd_edo_palace_hall_desc: "The headquarters of the Iwebo, Iweguae, and Ibiwe palace societies — professional organizations managing the royal household's wardrobe, regalia, and ceremonial functions."
 nd_edo_obas_court: "Oba's Court"
 nd_edo_obas_court_desc: "The magnificent royal court of the Oba, center of political authority, cultural patronage, and diplomatic reception for the entire kingdom."
 nd_edo_brass_casting: "Brass Casting"
 nd_edo_brass_casting_desc: "The Igun Eronmwon guild's lost-wax casting process, shaping copper ingots and dyes into the bronze plaques, portrait heads, and ceremonial objects that adorn the Oba's palace."
 nd_edo_pepper_trade_pm: "Pepper and Ivory Trade"
 nd_edo_pepper_trade_pm_desc: "The royal monopoly trade in pepper and ivory, managed by the Oba's agents who control prices, quantities, and access to European merchants."
 nd_edo_earthwork_maintenance: "Earthwork Maintenance"
 nd_edo_earthwork_maintenance_desc: "The constant upkeep of the moat-and-rampart system requires lumber for revetting, stone for reinforcement, and organized labor gangs directed by the Oba's officials."
 nd_edo_guild_training: "Guild Military Training"
 nd_edo_guild_training_desc: "The warrior guilds maintain their readiness through regular training in sword, spear, and bow combat, consuming weapons and provisions to keep their ranks battle-ready."
 nd_edo_ancestral_rites: "Ancestral Rites"
 nd_edo_ancestral_rites_desc: "The regular ceremonies honoring the Ogiso ancestors require livestock for sacrifice and beeswax for ceremonial candles, maintaining the spiritual foundation of Edo society."
 nd_edo_lost_wax_casting: "Lost-Wax Casting"
 nd_edo_lost_wax_casting_desc: "Molten brass is poured into precisely carved wax and clay moulds, producing sculptures and ornamental works of extraordinary naturalism."
 nd_edo_ivory_carving: "Ivory Carving"
 nd_edo_ivory_carving_desc: "Skilled carvers shape ivory into elaborately decorated tusks, armlets, and ornamental objects for the royal court and foreign trade."
 nd_edo_coral_beadwork: "Coral Bead Work"
 nd_edo_coral_beadwork_desc: "Court artisans fashion dyed coral beads and cloth into elaborate regalia and ornamental jewelry for the Oba and his chiefs."
 nd_edo_guild_processing: "Guild Workshop Processing"
 nd_edo_guild_processing_desc: "The early artisan guilds process raw copper and lumber into tools and utilitarian metalwork under royal patronage."
 nd_edo_codified_methods: "Codified Guild Methods"
 nd_edo_codified_methods_desc: "The formally standardized techniques of the brass-casting, ivory-carving, and textile guilds, ensuring quality and preserving centuries of accumulated craft knowledge."
 nd_edo_storytelling: "Storytelling Tradition"
 nd_edo_storytelling_desc: "The oral historians who preserve Edo heritage require paper for records and dyes for illustrated histories, maintaining the living memory of the kingdom."
 nd_edo_court_administration: "Court Administration"
 nd_edo_court_administration_desc: "The bureaucratic machinery of the Oba's government requires paper for records and cloth for official vestments, maintaining the elaborate hierarchy of appointed chiefs."
 nd_edo_palace_upkeep: "Palace Society Upkeep"
 nd_edo_palace_upkeep_desc: "The three palace societies maintain the Oba's wardrobe and regalia, requiring fine cloth and dyes for the elaborate ceremonial garments worn at court."
 nd_edo_royal_upkeep: "Royal Court Upkeep"
 nd_edo_royal_upkeep_desc: "The magnificent court of the Oba requires fine cloth and dyes for the royal wardrobe, diplomatic gifts, and the elaborate ceremonies that project royal authority."
 levy_nd_edo_iyoba_guard: "Iyoba Guard"
 levy_nd_edo_iyoba_guard_desc: "The Queen Mother's personal regiment, raised from soldiers and peasants loyal to the Iyoba's household."
 nd_edo_formed_tt: "Kingdom of Benin has been formed"
 nd_edo_path_a_tt: "Chose Oba's Divine Authority"
 nd_edo_path_b_tt: "Chose City of Guilds"
 nd_edo_destiny: "Destiny of Benin"
 nd_edo_destiny_desc: "The Kingdom of Benin has been forged. Now the Oba must decide the path forward — will this kingdom become a military empire or a guild-powered economic powerhouse?"
 nd_edo_dest_western_wars: "Western Wars"
 nd_edo_dest_western_wars_desc: "Subjugate the Yoruba heartland at Oyo-Ile and seize the trading port of Calabar to establish the Oba's military dominion over the Lower Niger and beyond."
 nd_edo_dest_northern_reach: "Northern Reach"
 nd_edo_dest_northern_reach_desc: "Extend the Oba's power into the Hausa states by conquering Kano and the Bornu capital of Ngazargamu, bringing the great trading cities of the Sahel under Benin's authority."
 nd_edo_dest_imperial_dominion: "Imperial Dominion"
 nd_edo_dest_imperial_dominion_desc: "The Oba's armies must reach the gold fields of Kumasi and the legendary city of Timbuktu, establishing Benin as the supreme power of West Africa."
 nd_edo_dest_guild_wealth: "Guild Wealth"
 nd_edo_dest_guild_wealth_desc: "The guild system must generate enough surplus to fill the Oba's treasury, embracing banking institutions to formalize the kingdom's growing economic sophistication."
 nd_edo_dest_artisan_power: "Artisan Power"
 nd_edo_dest_artisan_power_desc: "The guild workshops must drive development across the kingdom while ivory — worked by the kingdom's master carvers — flows through the capital's markets to distant lands."
 nd_edo_dest_guild_imperium: "Guild Imperium"
 nd_edo_dest_guild_imperium_desc: "Benin's guild system must reach its apex: a wealthy, developed kingdom controlling the sacred city of Ife, where the brass-casting tradition originated in the art of the Yoruba ancestors."
 nd_edo.6.t: "Destiny of the Kingdom"
 nd_edo.6.d: "The Kingdom of Benin stands at a crossroads. The Oba's palace rises above a city of broad avenues and guild workshops, its walls adorned with bronze plaques depicting the deeds of past rulers. The earthwork fortifications stretch for miles in every direction.\n\nBut a stable kingdom is merely a beginning. The path chosen at the kingdom's founding now beckons — whether through the sword or through the workshop, Benin's destiny awaits."
 nd_edo.6.a: "Our destiny is written in bronze."
 nd_edo.7.t: "The Western Campaigns"
 nd_edo.7.d: "The Oba's warriors have marched west and east, bringing the ancient city of Oyo-Ile and the trading port of Calabar under Benin's authority. The Yoruba and the peoples of the Cross River now acknowledge the Oba's supremacy.\n\nThese conquests echo the campaigns of Oba Ewuare himself, who first extended Benin's power beyond its heartland. The warrior guilds have proven their worth, and the kingdom's borders now encompass a vast territory of diverse peoples and resources."
 nd_edo.7.a: "The Oba's sword reaches far."
 nd_edo.8.t: "Dominion Over the North"
 nd_edo.8.d: "The great walled cities of the Hausa — Kano with its dye pits and leather markets, and Ngazargamu, capital of the Bornu empire — now fly the banner of Benin. The Oba's armies have crossed the vast savanna to bring these wealthy trading centers under his authority.\n\nThis is an empire of unprecedented scope for a kingdom born in the forests of the Lower Niger. The question now is how to consolidate these conquests. Shall the Oba forge his warriors into an even more fearsome fighting force, or establish a system of tributaries that enriches the kingdom while pacifying the conquered?"
 nd_edo.8.a: "Our warriors are the finest in West Africa."
 nd_edo.8.b: "Let the tributaries fill our coffers."
 nd_edo.9.t: "The Empire of the Oba"
 nd_edo.9.d: "From the gold fields of Kumasi to the legendary libraries of Timbuktu, the Oba's dominion stretches across the breadth of West Africa. No ruler in the region's history has commanded such vast territory — a military achievement that would astonish the Portuguese traders who first came seeking pepper and ivory.\n\nThe bronze plaques in the palace must be extended to record these triumphs. But the nature of this empire's military strength remains to be decided. Shall the Oba invest in a professional imperial army drawing on all the conquered peoples, or pursue a grand strategy of diplomatic intimidation backed by overwhelming force?"
 nd_edo.9.a: "Build the greatest army West Africa has seen."
 nd_edo.9.b: "Let our reputation precede our armies."
 nd_edo.10.t: "The Treasury of the Guilds"
 nd_edo.10.d: "The guild system has generated extraordinary wealth. The brass-casters, ivory-carvers, cloth-weavers, and leather-workers produce goods that command premium prices in markets near and far. The Oba's treasury overflows with the proceeds of royal monopoly trade, and the kingdom's adoption of formal banking practices has given it financial sophistication unprecedented in the region.\n\nBenin City thrives as a metropolis of organized industry, where every street belongs to a guild and every craft is perfected across generations."
 nd_edo.10.a: "The guilds are the wealth of the kingdom."
 nd_edo.11.t: "Masters of Their Craft"
 nd_edo.11.d: "The guild workshops have become engines of development, driving growth across the kingdom. Ivory carved by Benin's master artisans flows through the capital's markets to buyers across the known world. The kingdom's development has outpaced its neighbors, built on the foundation of hereditary craft knowledge refined over centuries.\n\nThe guilds now stand at a crossroads of their own. Some guild masters push for ever-greater artistic refinement — literacy, education, the preservation of techniques in writing rather than memory alone. Others see the future in commerce — expanding diplomatic ties, opening new markets, leveraging the guild system's wealth to project influence abroad."
 nd_edo.11.a: "Mastery of craft demands mastery of knowledge."
 nd_edo.11.b: "Our merchants shall carry guild wares to every port."
 nd_edo.12.t: "The Guild Imperium"
 nd_edo.12.d: "Benin has achieved what no other West African kingdom has managed — an empire built not primarily on conquest but on the productive power of its guild system. The kingdom's wealth, its cultural influence, its diplomatic connections all flow from the workshops of Igun Street and their counterparts across the realm.\n\nThe sacred city of Ife, where the artistic tradition of bronze-casting first took root among the Yoruba, now acknowledges Benin's cultural supremacy. The circle is complete — from Ife the art came, and to Ife's masters Benin now stands as proof of what that art can build.\n\nHow shall this imperium express its power in the years ahead?"
 nd_edo.12.a: "Build a city that rivals any in the world."
 nd_edo.12.b: "Let our culture reach every shore."
 STATIC_MODIFIER_NAME_nd_edo_dest_warriors_of_oba: "Warriors of the Oba"
 STATIC_MODIFIER_DESC_nd_edo_dest_warriors_of_oba: "The Oba's warrior guilds have been forged into the most fearsome fighting force in West Africa, their morale unbreakable and their tactics refined through campaigns across the savanna."
 STATIC_MODIFIER_NAME_nd_edo_dest_tributaries_of_oba: "Tributaries of the Oba"
 STATIC_MODIFIER_DESC_nd_edo_dest_tributaries_of_oba: "A vast network of tributary states sustains the Oba's military machine, reducing the cost of maintaining armies while mercenary companies supplement the warrior guilds."
 STATIC_MODIFIER_NAME_nd_edo_dest_imperial_army: "The Oba's Imperial Army"
 STATIC_MODIFIER_DESC_nd_edo_dest_imperial_army: "A professional imperial army drawing cavalry and artillery from across the conquered territories, unified under the Oba's supreme command into a force of devastating speed and power."
 STATIC_MODIFIER_NAME_nd_edo_dest_grand_strategy: "Grand Strategy of Benin"
 STATIC_MODIFIER_DESC_nd_edo_dest_grand_strategy: "The Oba's reputation for overwhelming military force precedes his armies, enabling rapid annexation of rivals while an extensive spy network protects the empire from internal threats."
 STATIC_MODIFIER_NAME_nd_edo_dest_master_craftsmen: "Master Craftsmen"
 STATIC_MODIFIER_DESC_nd_edo_dest_master_craftsmen: "The guild masters have elevated their hereditary crafts to the level of high art, driving cultural influence and literacy across the kingdom — though the focus on workshop over warfield makes campaigning costlier."
 STATIC_MODIFIER_NAME_nd_edo_dest_merchant_princes: "Merchant Princes"
 STATIC_MODIFIER_DESC_nd_edo_dest_merchant_princes: "A new class of wealthy guild traders has emerged, wielding diplomatic influence and financial acumen that opens markets and forges alliances across the trading world."
 STATIC_MODIFIER_NAME_nd_edo_dest_artisan_metropolis: "Artisan Metropolis"
 STATIC_MODIFIER_DESC_nd_edo_dest_artisan_metropolis: "Benin City has grown into a true metropolis of organized industry, where efficient urban planning and powerful trade centers draw commerce from distant lands."
 STATIC_MODIFIER_NAME_nd_edo_dest_cultural_renaissance: "Cultural Renaissance"
 STATIC_MODIFIER_DESC_nd_edo_dest_cultural_renaissance: "The guild system's wealth has funded a maritime expansion, building ships and training sailors to carry Benin's famous artisan goods to ports along the entire West African coast and beyond."
 nd_edo_war_palace: "Oba's War Palace"
 nd_edo_war_palace_desc: "The fortified command center of the Oba's imperial army, combining the traditional palace architecture of Benin with military barracks, armories, and war councils drawn from the conquered territories."
 nd_edo_guild_masters_hall: "Guild Masters' Hall"
 nd_edo_guild_masters_hall_desc: "The grand assembly hall of Benin's guild masters, where the heads of every hereditary craft guild meet to coordinate production, set quality standards, and manage the vast trade networks that sustain the kingdom's wealth."
 nd_edo_war_palace_maintenance: "War Palace Upkeep"
 nd_edo_war_palace_maintenance_desc: "The imperial war palace requires a constant supply of weapons, building materials, and provisions to maintain its garrison and the Oba's military command structure."
 nd_edo_guild_masters_maintenance: "Guild Hall Upkeep"
 nd_edo_guild_masters_maintenance_desc: "The guild masters' hall requires copper for demonstrations, ivory for display works, cloth for ceremonial occasions, and paper for the records of guild standards and trade agreements."
