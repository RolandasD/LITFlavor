l_english:
 STATIC_MODIFIER_NAME_nd_hanoverian_succession: "The Hanoverian Succession"
 STATIC_MODIFIER_DESC_nd_hanoverian_succession: "The Act of Settlement binds our dynasty to the British crown, opening channels of trade, subsidy, and shared military obligation across the North Sea."
 STATIC_MODIFIER_NAME_nd_welf_renaissance: "The Welf Renaissance"
 STATIC_MODIFIER_DESC_nd_welf_renaissance: "The House of Welf charts its own course — investing in universities, scientific inquiry, and the arts to build a beacon of Enlightenment thought in northern Germany."
 nd_han_formed_tt: "Hanover has been formed"
 nd_han_path_a_tt: "Chose the Hanoverian Succession"
 nd_han_path_b_tt: "Chose the Welf Renaissance"
 nd_han.1.t: "The Consolidation of Hanover"
 nd_han.1.d: "The scattered Brunswick-Luneburg principalities are united under a single Welf banner. The question before us is not merely one of governance, but of orientation. To the west lies Britain, where our dynasty may one day wear a second crown — an alliance that would bring naval power, trade wealth, and military subsidies, but also entanglement in wars far from our borders. To the south lies the Empire, where Gottingen's scholars are forging new ideas and the Harz mines still yield silver — a path of self-reliance, intellectual ambition, and German identity.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_han.1.a: "Look to the sea — our dynasty's future lies with Britain"
 nd_han.1.b: "Look to Gottingen — we shall be a light of learning"
 nd_han.2.t: "The Electoral Dignity"
 nd_han.2.d: "Emperor Leopold has elevated the Duke of Brunswick-Luneburg to the College of Electors, recognizing our military service against the Ottoman Turks at Vienna and our contributions to the war against France. The ninth electorate is ours — a seat among the princes who choose the Emperor himself. We may use this new prestige to amplify our diplomatic standing among the courts of Europe, or we may double down on the military service that earned us this honor, cementing our reputation as indispensable defenders of the Empire."
 nd_han.2.a: "Our voice shall carry weight in every court"
 nd_han.2.b: "The Empire needs our swords more than our words"
 nd_han.3.t: "The Georgia Augusta"
 nd_han.3.d: "In 1734, Elector George Augustus — who also reigns as George II of Great Britain — commands his Hanoverian minister Gerlach Adolph von Munchhausen to establish a university at Gottingen. The Georgia Augusta breaks with tradition: its curriculum emphasizes secular learning, modern languages, and empirical investigation over theological orthodoxy. The library is made open to all scholars. Within a generation, it will attract luminaries in law, history, and the natural sciences, making Gottingen the intellectual capital of the German-speaking world."
 nd_han.3.a: "Let knowledge flourish in the halls of Gottingen"
 nd_han.4.t: "The Miracle at Minden"
 nd_han.4.d: "On the morning of August 1, 1759, six British and two Hanoverian infantry battalions advance in line formation across an open plain against massed French cavalry near the town of Minden. Against all doctrine and expectation, their disciplined volley fire shatters charge after charge. By afternoon, Marshal Contades's army is in retreat. The Battle of Minden proves that well-drilled infantry, holding their nerve and their formation, can defeat the most fearsome cavalry in Europe. The Hanoverian soldiers who stood at Minden have etched their courage into military history."
 nd_han.4.a: "Press the advantage — carry the fight to the enemy"
 nd_han.4.b: "Hold the line — our strength is in our steadfastness"
 nd_han.5.t: "The King's German Legion"
 nd_han.5.d: "When Napoleon dissolves the Electorate in 1803, the flower of the Hanoverian officer corps refuses to serve France. Crossing the sea to Britain, they form the King's German Legion — a combined arms force of infantry, cavalry, hussars, and artillery that will fight in every major theatre of the Napoleonic Wars. At Waterloo, the KGL's defense of La Haye Sainte becomes one of the most celebrated stands in military history. Approximately 28,000 men will serve in the Legion over its thirteen-year existence, earning it the distinction of being the only German force to fight continuously against Napoleon."
 nd_han.5.a: "Their sacrifice shall never be forgotten"
 STATIC_MODIFIER_NAME_nd_han_electoral_prestige: "Electoral Prestige"
 STATIC_MODIFIER_DESC_nd_han_electoral_prestige: "The ninth electorate commands respect in every court of the Empire."
 STATIC_MODIFIER_NAME_nd_han_imperial_service: "Imperial Service"
 STATIC_MODIFIER_DESC_nd_han_imperial_service: "Our troops are the shield of the Empire — the Emperor rewards those who answer his call."
 STATIC_MODIFIER_NAME_nd_han_gottingen_enlightenment: "The Gottingen Enlightenment"
 STATIC_MODIFIER_DESC_nd_han_gottingen_enlightenment: "Gottingen's open library and secular curriculum draw scholars from across Europe, making it a crucible of modern thought."
 STATIC_MODIFIER_NAME_nd_han_minden_discipline: "Minden Discipline"
 STATIC_MODIFIER_DESC_nd_han_minden_discipline: "The lesson of Minden: disciplined fire wins battles. Press the advantage while the enemy reels."
 STATIC_MODIFIER_NAME_nd_han_minden_steadfastness: "Minden Steadfastness"
 STATIC_MODIFIER_DESC_nd_han_minden_steadfastness: "The lesson of Minden: hold your ground and let the enemy break upon your line."
 STATIC_MODIFIER_NAME_nd_han_kgl_pride: "Pride of the Legion"
 STATIC_MODIFIER_DESC_nd_han_kgl_pride: "The King's German Legion has earned a reputation as the finest German troops in Europe."
 nd_han_welf_dynasty: "Welf Dynasty"
 nd_han_welf_dynasty_desc: "The House of Welf is among the oldest princely dynasties in Europe, tracing its lineage through centuries of imperial politics."
 nd_han_harz_mining: "Harz Silver Mining"
 nd_han_harz_mining_desc: "The silver mines of the Harz Mountains have enriched the Welf dukes for generations, funding their courts and armies."
 nd_han_sachsenspiegel: "Sachsenspiegel Tradition"
 nd_han_sachsenspiegel_desc: "The Sachsenspiegel, composed around 1220, codified Saxon customary law and became the foundation of legal practice across northern Germany."
 nd_han_trade_routes: "Lower Saxon Trade"
 nd_han_trade_routes_desc: "The market towns of Hildesheim, Braunschweig, and Hanover sit at the crossroads of north German trade routes linking the Hanse cities to the interior."
 nd_han_celle_stud: "Celle State Stud"
 nd_han_celle_stud_desc: "George II founded the Landgestut Celle in 1735 to breed cavalry mounts and agricultural horses, creating one of Europe's most renowned equine breeding programs."
 nd_han_calenberg_rise: "Calenberg Ascendancy"
 nd_han_calenberg_rise_desc: "The Principality of Calenberg consolidates power among the competing Brunswick branches, centralizing administration under a single Welf ruler."
 nd_han_herrenhausen_tradition: "Herrenhausen Tradition"
 nd_han_herrenhausen_tradition_desc: "Sophia of Hanover transforms Herrenhausen into one of Europe's finest baroque gardens, a stage for intellectual gatherings with figures like Leibniz."
 nd_han_wasserregal: "Oberharzer Wasserregal"
 nd_han_wasserregal_desc: "An engineering marvel of 107 dams, 310 km of ditches, and dozens of water wheels — the Wasserregal powers the Harz mines through ingenious hydraulic management."
 nd_han_leibniz_court: "Leibniz at Court"
 nd_han_leibniz_court_desc: "Gottfried Wilhelm Leibniz serves the Welf court for four decades, developing calculus, designing calculating machines, and cataloguing the dynasty's genealogy."
 nd_han_electoral_dignity: "Electoral Dignity"
 nd_han_electoral_dignity_desc: "In 1692, Emperor Leopold I elevates the Duke of Brunswick-Luneburg to prince-elector — the ninth seat in the College that chooses the Emperor."
 nd_han_garde_du_corps_tradition: "Garde du Corps Tradition"
 nd_han_garde_du_corps_tradition_desc: "The Celle breeding program produces superb warhorses for the Hanoverian Garde du Corps, the electorate's premier heavy cavalry regiment."
 nd_han_circle_director: "Lower Saxon Circle Director"
 nd_han_circle_director_desc: "As director of the Lower Saxon Imperial Circle, Hanover bears responsibility for mustering the Circle's defense levies and protecting the region against external threats."
 nd_han_act_of_settlement: "Act of Settlement"
 nd_han_act_of_settlement_desc: "The English Parliament's Act of Settlement of 1701 names Sophia of Hanover as heir to the British throne, binding the two crowns in personal union."
 nd_han_subsidy_troops: "Subsidy Troops"
 nd_han_subsidy_troops_desc: "The Welf dukes hire out their well-trained soldiers to Venice, France, Spain, England, and the Emperor, turning military manpower into diplomatic currency."
 nd_han_bremen_verden: "Bremen and Verden"
 nd_han_bremen_verden_desc: "The acquisition of Bremen and Verden from Sweden in 1719 gives Hanover control of the Weser and Elbe estuaries, opening direct access to North Sea maritime trade."
 nd_han_gottingen_university: "Gottingen University"
 nd_han_gottingen_university_desc: "The Georgia Augusta, founded in 1734, becomes the intellectual capital of the German world — its open library and secular curriculum attract scholars from across Europe."
 nd_han_military_reform: "Hanoverian Military Reform"
 nd_han_military_reform_desc: "The Hanoverian army is reorganized into a professional standing force, trained to the standards demanded by its commitments to both the Empire and the British crown."
 nd_han_minden_legacy: "Legacy of Minden"
 nd_han_minden_legacy_desc: "At Minden in 1759, Hanoverian infantry advanced in open formation against French cavalry and broke them with disciplined volley fire — a triumph of training over tradition."
 nd_han_kings_german_legion: "King's German Legion"
 nd_han_kings_german_legion_desc: "When Napoleon dissolved Hanover in 1803, its finest officers crossed to Britain and formed the KGL — the only German force to fight continuously through the Napoleonic Wars."
 nd_han_gottingen_school: "Gottingen School"
 nd_han_gottingen_school_desc: "Schlozer and his colleagues at Gottingen pioneer modern historiography, statistical analysis, and comparative politics, transforming how Europeans understand their own past."
 nd_han_british_subsidies: "British Subsidies"
 nd_han_british_subsidies_desc: "Britain subsidizes the defense of Hanover with hundreds of thousands of pounds annually, funding fortifications, garrisons, and the army that guards the electorate."
 nd_han_jager_tradition: "Hanoverian Jager"
 nd_han_jager_tradition_desc: "Recruited from the foresters and gamekeepers of Lower Saxony, Hanoverian Jager fight as light infantry — expert marksmen trained to exploit wooded and broken terrain."
 nd_han_kingdom_elevation: "Kingdom of Hanover"
 nd_han_kingdom_elevation_desc: "The Congress of Vienna elevates Hanover from electorate to kingdom in 1814, recognizing its loyalty and sacrifice during the Napoleonic Wars."
 nd_han_constitutional_reform: "Hanoverian Constitution"
 nd_han_constitutional_reform_desc: "The Staatsgrundgesetz of 1833 establishes a constitutional framework for the Kingdom of Hanover, balancing royal prerogative with representative government."
 nd_han_clausthal_academy: "Clausthal Mining Academy"
 nd_han_clausthal_academy_desc: "The mining school at Clausthal applies modern science and engineering to the ancient Harz mines, pioneering industrial techniques that spread across German mining districts."
 a_nd_han_subsidientruppen: "Subsidientruppen"
 a_nd_han_subsidientruppen_desc: "Professional Hanoverian soldiers hired out to allied powers — well-drilled and dependable regulars who fight wherever their duke's treaties require."
 a_nd_han_garde_du_corps: "Garde du Corps"
 a_nd_han_garde_du_corps_desc: "The Garde du Corps are Hanover's elite heavy cavalry, mounted on warhorses bred at the Celle state stud — shock troops for decisive moments on the battlefield."
 a_nd_han_kgl_infantry: "King's German Legion"
 a_nd_han_kgl_infantry_desc: "The finest German regulars of the Napoleonic era, trained to British standards and tempered in campaigns from the Peninsula to Waterloo."
 a_nd_han_jager: "Hanoverian Jager"
 a_nd_han_jager_desc: "Forest-bred riflemen from the woods of Lower Saxony, skilled in skirmishing, ambush, and making every shot count in broken terrain."
 levy_nd_han_subsidientruppen: "Subsidientruppen"
 levy_nd_han_subsidientruppen_desc: "Professional Hanoverian subsidy infantry raised from the peasantry and trained soldiers, hired out to serve allied powers."
 levy_nd_han_garde_du_corps: "Garde du Corps"
 levy_nd_han_garde_du_corps_desc: "Elite Hanoverian heavy cavalry raised from the soldiery, mounted on warhorses bred at the Celle state stud."
 levy_nd_han_jager: "Hanoverian Jager"
 levy_nd_han_jager_desc: "Forest-trained light infantry raised from the foresters and gamekeepers of Lower Saxony."
 nd_han_oberharzer_bergwerk: "Oberharzer Bergwerk"
 nd_han_oberharzer_bergwerk_desc: "A Harz Mountain silver mine equipped with the ingenious Wasserregal water management system — dams, ditches, and water wheels that power deep-shaft extraction."
 nd_han_sachsenspiegel_gericht: "Sachsenspiegel Gericht"
 nd_han_sachsenspiegel_gericht_desc: "A law court administering justice according to the Sachsenspiegel — the foundational code of Saxon customary law that shaped legal practice across northern Germany."
 nd_han_landgestut: "Landgestut Celle"
 nd_han_landgestut_desc: "The state horse stud at Celle breeds superb warhorses and agricultural draft animals, supplying the Hanoverian cavalry and enriching the rural economy."
 nd_han_georgia_augusta: "Georgia Augusta"
 nd_han_georgia_augusta_desc: "A university modeled on Gottingen's Enlightenment principles — secular curriculum, open library, and empirical inquiry that draws scholars from across Europe."
 nd_han_herrenhausen: "Herrenhausen Palace"
 nd_han_herrenhausen_desc: "A baroque garden palace in the French style, where the Welf court hosts intellectual salons and cultivates the arts under the gaze of Europe."
 nd_han_pm_harz_silver: "Harz Silver Extraction"
 nd_han_pm_harz_silver_desc: "Traditional shaft mining of the Harz silver veins, using iron tools and charcoal smelting to extract silver ore for the Welf treasury."
 nd_han_pm_harz_deep_shaft: "Deep Shaft Mining"
 nd_han_pm_harz_deep_shaft_desc: "The Wasserregal's hydraulic power enables deeper shaft mining, reaching richer silver veins below the water table with iron reinforcements and coal-fired smelting."
 nd_han_pm_industrial_mining: "Industrial Mining"
 nd_han_pm_industrial_mining_desc: "Steam-powered pumps and iron-reinforced shafts bring modern industrial methods to the ancient Harz mines, burning coal to power the engines of extraction."
 nd_han_pm_bergwerk_maintenance: "Mine Upkeep"
 nd_han_pm_bergwerk_maintenance_desc: "Timber for shaft supports, stone for walls, and iron for tools keep the mines operational."
 nd_han_pm_horse_breeding: "Celle Horse Breeding"
 nd_han_pm_horse_breeding_desc: "Selective breeding of Hanoverian warmblood horses using grain-fed stock, supplying cavalry mounts and agricultural draft animals."
 nd_han_pm_stud_maintenance: "Stud Farm Upkeep"
 nd_han_pm_stud_maintenance_desc: "Hay, grain, and livestock care sustain the breeding program at the Landgestut."
 nd_han_pm_university_press: "University Press"
 nd_han_pm_university_press_desc: "Gottingen's printing workshops produce scholarly works, legal commentaries, and scientific treatises for distribution across the German world."
 nd_han_pm_scholarly_press: "Scholarly Press"
 nd_han_pm_scholarly_press_desc: "An expanded university press producing Gottingen's influential historical and scientific publications at larger scale."
 nd_han_pm_university_maintenance: "University Upkeep"
 nd_han_pm_university_maintenance_desc: "Books, paper, and furnishings maintain the lecture halls and library."
 nd_han_pm_herrenhausen_maintenance: "Palace Grounds"
 nd_han_pm_herrenhausen_maintenance_desc: "Marble, glass, fine furniture, and imported dyes maintain the baroque splendor of Herrenhausen."
 nd_han_pm_gericht_maintenance: "Court Upkeep"
 nd_han_pm_gericht_maintenance_desc: "Paper, furniture, and legal references maintain the Sachsenspiegel law courts."
 nd_han_pm_leibniz_salon: "Leibniz Salon"
 nd_han_pm_leibniz_salon_desc: "Intellectual salons at Herrenhausen where scholars, diplomats, and the Welf court gather to discuss philosophy, mathematics, and natural science in the tradition of Leibniz."
 nd_han_destiny: "Destiny of the Welfs"
 nd_han_destiny_desc: "The Brunswick-Luneburg lands are united under a single Welf banner. Whether we look westward across the sea or inward to the libraries of the Empire, our destiny awaits."
 nd_han_dest_north_sea_coast: "North Sea Coast"
 nd_han_dest_north_sea_coast_desc: "Secure control of Bremen and Oldenburg to command the Weser and Ems estuaries, giving Hanover direct access to the North Sea trade routes."
 nd_han_dest_british_crown: "The British Crown"
 nd_han_dest_british_crown_desc: "The Act of Settlement opens the path to London. Bring the British crown under Welf rule and unite the two kingdoms across the North Sea."
 nd_han_dest_north_sea_imperium: "North Sea Imperium"
 nd_han_dest_north_sea_imperium_desc: "From Edinburgh to Amsterdam, the North Sea is a Hanoverian lake. Command its shores, its fleets, and its commerce."
 nd_han_dest_university_network: "University Network"
 nd_han_dest_university_network_desc: "Expand the Gottingen model to Erfurt and beyond. Embrace modern banking to fund a network of universities that will make Hanover the scholarly capital of the Empire."
 nd_han_dest_aufklarung: "The Aufklarung"
 nd_han_dest_aufklarung_desc: "The printing press carries Gottingen's ideas across Germany. Develop our lands, produce books for the scholarly market, and lead the German Enlightenment."
 nd_han_dest_beacon_of_reason: "Beacon of Reason"
 nd_han_dest_beacon_of_reason_desc: "Hanover stands as the intellectual beacon of Europe. Embrace the Enlightenment, secure Leipzig's book trade, and build a society where reason and tolerance flourish."
 nd_han.6.t: "Destiny of the Welfs"
 nd_han.6.d: "The consolidation of Hanover marks a beginning, not an end. The House of Welf stands at a crossroads. To the west, the tides of the North Sea beckon — the British succession, maritime trade, and the power of a dual crown. To the south, the lecture halls of Gottingen and the libraries of the Empire offer a different kind of greatness — one built not on warships but on ideas. The path we choose now will define what Hanover becomes."
 nd_han.6.a: "Our destiny awaits"
 nd_han.7.t: "The Weser and the Ems"
 nd_han.7.d: "With Bremen and Oldenburg under our control, Hanover commands the estuaries of the Weser and the Ems. North Sea trade flows through our ports. The shipyards of Bremen build vessels that carry Hanoverian goods to Britain, the Netherlands, and beyond. This is the foundation upon which a maritime Hanover shall be built."
 nd_han.7.a: "The North Sea is our highway"
 nd_han.8.t: "A Crown Across the Sea"
 nd_han.8.d: "The Welf dynasty wears the British crown. London — the greatest city in the world — acknowledges a Hanoverian monarch. The personal union brings immense opportunities: we may leverage the diplomatic weight of ruling two kingdoms to reshape the balance of power, or we may exploit the commercial networks of the North Sea to fill our treasury with trade revenue."
 nd_han.8.a: "Two crowns, one dynasty — our diplomacy is supreme"
 nd_han.8.b: "Two ports, one sea — our merchants shall prosper"
 nd_han.9.t: "Lords of the North Sea"
 nd_han.9.d: "From the harbors of Edinburgh to the counting houses of Amsterdam, the North Sea answers to Hanover. Our fleets patrol its waters, our merchants dominate its trade, our dynasty rules its greatest kingdoms. We may press our advantage at sea, building a true thalassocracy that challenges the old naval powers, or we may use our maritime wealth to anchor an unassailable position on the continent."
 nd_han.9.a: "Command the waves — our navy shall rule the sea"
 nd_han.9.b: "Anchor the continent — our wealth secures our borders"
 nd_han.10.t: "The Scholarly Network"
 nd_han.10.d: "With Erfurt's venerable university brought into the Hanoverian orbit and modern banking financing our academic ambitions, the Gottingen model spreads. Our universities attract scholars from across the Empire — theologians, jurists, historians, and natural philosophers who debate freely in the tradition of Leibniz. Hanover is becoming synonymous with learning."
 nd_han.10.a: "Knowledge is our true wealth"
 nd_han.11.t: "Light of the Aufklarung"
 nd_han.11.d: "The printing presses of Gottingen and Hanover pour forth books, pamphlets, and scholarly journals that reshape how Germans think about law, governance, and the natural world. Our universities are the intellectual engine of the Empire. We may push further toward secular scholarship, embracing religious tolerance and cosmopolitan learning, or we may channel this intellectual energy into systematic cameralist administration — making Hanover a model of rational governance."
 nd_han.11.a: "Let reason triumph over dogma"
 nd_han.11.b: "Let method triumph over custom"
 nd_han.12.t: "Beacon of Reason"
 nd_han.12.d: "Hanover stands as proof that a small German state can rival the great powers — not through conquest alone, but through the power of ideas. Our universities produce the finest scholars in Europe, our tolerance draws talent from every confession, our book trade carries the Aufklarung to every corner of the continent. We may build upon this intellectual network to project soft power and diplomatic influence, or we may harness the practical fruits of Enlightenment thought to build an industrialized, modern military state."
 nd_han.12.a: "The pen is mightier — our ideas reshape Europe"
 nd_han.12.b: "Knowledge applied — science serves the state"
 STATIC_MODIFIER_NAME_nd_han_dest_personal_union: "Royal Union"
 STATIC_MODIFIER_DESC_nd_han_dest_personal_union: "The personal union of Hanover and Britain gives our diplomats unrivaled leverage in every court of Europe."
 STATIC_MODIFIER_NAME_nd_han_dest_north_sea_trade: "North Sea Commerce"
 STATIC_MODIFIER_DESC_nd_han_dest_north_sea_trade: "The merchant fleets of two kingdoms fill our harbors with the wealth of the North Sea trade."
 STATIC_MODIFIER_NAME_nd_han_dest_thalassocracy: "Hanoverian Thalassocracy"
 STATIC_MODIFIER_DESC_nd_han_dest_thalassocracy: "Our warships command the North Sea, though the army suffers from neglect as resources flow to the dockyards."
 STATIC_MODIFIER_NAME_nd_han_dest_continental_anchor: "Continental Bastion"
 STATIC_MODIFIER_DESC_nd_han_dest_continental_anchor: "Maritime wealth funds a mobile, well-supplied army that secures Hanover's position as the anchor of any continental coalition."
 STATIC_MODIFIER_NAME_nd_han_dest_secular_learning: "Secular Scholarship"
 STATIC_MODIFIER_DESC_nd_han_dest_secular_learning: "Our universities teach freely, unconstrained by confessional orthodoxy — though the religious establishment chafes at this tolerance."
 STATIC_MODIFIER_NAME_nd_han_dest_cameralist_state: "Cameralist State"
 STATIC_MODIFIER_DESC_nd_han_dest_cameralist_state: "Systematic administration and fiscal discipline make Hanover a model of rational governance, though bureaucratic caution slows the path to war."
 STATIC_MODIFIER_NAME_nd_han_dest_republic_of_letters: "Republic of Letters"
 STATIC_MODIFIER_DESC_nd_han_dest_republic_of_letters: "Hanover's scholarly network spans the continent, giving our diplomats and statesmen an intellectual authority that few can match."
 STATIC_MODIFIER_NAME_nd_han_dest_industrial_enlightenment: "Industrial Enlightenment"
 STATIC_MODIFIER_DESC_nd_han_dest_industrial_enlightenment: "The practical fruits of Aufklarung scholarship — chemistry, metallurgy, engineering — are channeled into building a modern, well-equipped military."
 nd_han_admiralitat: "Hanoverian Admiralty"
 nd_han_admiralitat_desc: "A naval headquarters coordinating the combined maritime forces of Hanover's North Sea dominions, overseeing fleet construction, port defense, and trade convoy protection."
 nd_han_pm_admiralitat_maintenance: "Admiralty Upkeep"
 nd_han_pm_admiralitat_maintenance_desc: "Timber, naval supplies, and administrative paperwork keep the Admiralty operational."
 nd_han_akademie: "Akademie der Wissenschaften"
 nd_han_akademie_desc: "A royal academy of sciences in the tradition of Leibniz, uniting natural philosophy, mathematics, and applied engineering under a single institution devoted to advancing human knowledge."
 nd_han_pm_akademie_maintenance: "Academy Upkeep"
 nd_han_pm_akademie_maintenance_desc: "Books, paper, glass instruments, and scholarly materials sustain the Academy's research."
