l_english:
 STATIC_MODIFIER_NAME_nd_blut_und_eisen: "Blood and Iron"
 STATIC_MODIFIER_DESC_nd_blut_und_eisen: "The German nation was forged not through speeches and majority votes, but through iron and blood. Our armies march with unshakeable discipline, and our forges burn day and night to arm the mightiest military force in Europe."
 STATIC_MODIFIER_NAME_nd_zollverein_legacy: "Legacy of the Zollverein"
 STATIC_MODIFIER_DESC_nd_zollverein_legacy: "Before there was a German state, there was a German market. The customs union that bound the German lands economically now fuels an empire of industry, scholarship, and diplomatic influence that shapes the continent."
 nd_ger.1.t: "The Unification of Germany"
 nd_ger.1.d: "The dream of centuries has been realized. From the fractured mosaic of principalities, free cities, and kingdoms, a single German state has emerged — an empire that speaks with one voice and commands the respect of all Europe. The question now is not whether Germany will be great, but what kind of greatness it will pursue. Will this new empire be built on the strength of its armies, its drill fields echoing with the cadence that once shook the continent? Or will it be the triumph of industry and commerce, the Zollverein's vision fulfilled — a nation bound by rail, trade, and the relentless march of progress?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ger.1.a: "Through blood and iron shall Germany endure."
 nd_ger.1.b: "Commerce and industry shall be our foundation."
 nd_ger.2.t: "The Reformation"
 nd_ger.2.d: "The nailing of ninety-five theses to a church door in Wittenberg has shaken the foundations of Christendom. Martin Luther's challenge to papal authority, amplified by the printing presses that are themselves a German invention, has ignited a confessional revolution that divides the German lands between old faith and new. Princes choose sides not merely out of conviction but calculation — the Reformation offers freedom from Roman taxation and the assertion of territorial sovereignty. How shall Germany navigate this upheaval?"
 nd_ger.2.a: "Stand firm in our confession — one faith, one people."
 nd_ger.2.b: "Cuius regio, eius religio — pragmatism preserves the peace."
 nd_ger.3.t: "The Peace of Westphalia"
 nd_ger.3.d: "After thirty years of the most devastating war Europe has ever known — a war that killed perhaps a third of the German population — the exhausted powers have gathered at Osnabruck and Munster to forge a new order. The treaties of Westphalia establish principles that will reshape the world: the sovereignty of states, the right of rulers to determine the religion of their territory, and the balance of power as the foundation of international relations. Germany emerges scarred but with a new framework for coexistence."
 nd_ger.3.a: "Sovereignty is sacred — no power shall dictate to another."
 nd_ger.3.b: "Balance and diplomacy shall prevent the next catastrophe."
 nd_ger.4.t: "The Gutenberg Revolution"
 nd_ger.4.d: "Johannes Gutenberg's invention of the movable-type printing press in Mainz around 1440 has unleashed a revolution more profound than any battle. What once took a monk years to copy by hand can now be produced in hundreds of copies within weeks. Ideas spread like wildfire across the German lands and beyond — scholarly works, religious texts, political pamphlets, and scientific treatises pour from the presses of Mainz, Strasbourg, Nuremberg, and Augsburg. The monopoly on knowledge held by the Church and the elite is broken forever. Germany stands at the center of this transformation, its printers shaping the intellectual life of an entire continent."
 nd_ger.4.a: "The press shall be the sword of the mind."
 nd_ger.5.t: "The Zollverein"
 nd_ger.5.d: "The German Customs Union, the Zollverein, has achieved through commerce what diplomacy and war could not — the practical unification of the German lands. Beginning with Prussia's customs reforms and gradually absorbing state after state, the Zollverein has demolished hundreds of internal tariff barriers, created a unified market of millions, and laid the iron rails that bind the German economy into a single engine of production. Factories rise along the Rhine and Ruhr, merchants trade freely from Hamburg to Munich, and the old mosaic of petty toll stations gives way to the modern economy."
 nd_ger.5.a: "Integration through trade — let the customs union deepen."
 nd_ger.5.b: "Invest in industry — the factories shall be our strength."
 STATIC_MODIFIER_NAME_nd_ger_confessional_conviction: "Confessional Conviction"
 STATIC_MODIFIER_DESC_nd_ger_confessional_conviction: "Germany stands united in faith, drawing strength from its religious identity to build a more cohesive society."
 STATIC_MODIFIER_NAME_nd_ger_cuius_regio: "Cuius Regio, Eius Religio"
 STATIC_MODIFIER_DESC_nd_ger_cuius_regio: "The pragmatic acceptance of confessional diversity has brought stability to the German lands, allowing commerce and diplomacy to flourish where religious war once threatened."
 STATIC_MODIFIER_NAME_nd_ger_westphalian_sovereignty: "Westphalian Sovereignty"
 STATIC_MODIFIER_DESC_nd_ger_westphalian_sovereignty: "The principle of state sovereignty, born from the ashes of the Thirty Years' War, grants Germany diplomatic authority and internal cohesion that its rivals envy."
 STATIC_MODIFIER_NAME_nd_ger_westphalian_balance: "Westphalian Balance"
 STATIC_MODIFIER_DESC_nd_ger_westphalian_balance: "Germany has embraced the role of arbiter in European affairs, leveraging its central position and diplomatic expertise to maintain the balance of power."
 STATIC_MODIFIER_NAME_nd_ger_customs_integration: "Customs Integration"
 STATIC_MODIFIER_DESC_nd_ger_customs_integration: "The dismantling of internal tariff barriers has created a vast unified market, spurring trade and prosperity across the German lands."
 STATIC_MODIFIER_NAME_nd_ger_industrial_investment: "Industrial Investment"
 STATIC_MODIFIER_DESC_nd_ger_industrial_investment: "Massive investment in factories, railways, and infrastructure has transformed Germany into an industrial powerhouse."
 nd_ger_guild_heritage: "Guild Heritage"
 nd_ger_guild_heritage_desc: "The elaborate system of craft guilds that governed German towns established standards of quality, protected artisans, and created the civic institutions that would define German urban life for centuries."
 nd_ger_mining_tradition: "Mining Tradition"
 nd_ger_mining_tradition_desc: "The silver mines of the Harz Mountains and the Erzgebirge fueled German commerce and attracted miners, engineers, and metallurgists whose expertise transformed the region into Europe's mining heartland."
 nd_ger_reichstag_tradition: "Reichstag Tradition"
 nd_ger_reichstag_tradition_desc: "The Imperial Diet, gathering princes, bishops, and free city representatives, established a tradition of negotiation and compromise that shaped German political culture."
 nd_ger_hanseatic_roots: "Hanseatic Roots"
 nd_ger_hanseatic_roots_desc: "The Hanseatic League connected German merchants from Lubeck to Novgorod, establishing trading posts and commercial networks that dominated Northern European trade for centuries."
 nd_ger_minnesang: "Minnesang Tradition"
 nd_ger_minnesang_desc: "The courtly love poetry of the Minnesanger — Walther von der Vogelweide, Wolfram von Eschenbach, and their peers — established a German literary tradition that rivaled the troubadours of France."
 nd_ger_gutenberg_press: "Gutenberg Press"
 nd_ger_gutenberg_press_desc: "Johannes Gutenberg's movable-type printing press, developed in Mainz around 1440, launched a revolution in the dissemination of knowledge that reshaped European civilization."
 nd_ger_universitat_tradition: "University Tradition"
 nd_ger_universitat_tradition_desc: "The founding of universities at Heidelberg, Leipzig, Cologne, and Erfurt created centers of learning that attracted scholars from across Europe and laid the groundwork for German intellectual leadership."
 nd_ger_imperial_banking: "Imperial Banking"
 nd_ger_imperial_banking_desc: "The Fugger and Welser banking houses of Augsburg financed emperors, popes, and colonial ventures, making southern Germany the financial capital of Europe in the Renaissance era."
 nd_ger_civic_tradition: "Civic Autonomy"
 nd_ger_civic_tradition_desc: "The tradition of self-governing free imperial cities — Nuremberg, Augsburg, Hamburg, Frankfurt — created spaces of burgher independence, commercial innovation, and civic pride unique to the German political landscape."
 nd_ger_meistersinger: "Meistersinger Guilds"
 nd_ger_meistersinger_desc: "The Meistersinger guilds of Nuremberg, Augsburg, and other German cities organized the art of song into a disciplined craft, preserving and advancing German cultural traditions through competitive composition."
 nd_ger_reformation_crucible: "Reformation Crucible"
 nd_ger_reformation_crucible_desc: "The Protestant Reformation, ignited by Martin Luther's challenge to papal authority in 1517, was born on German soil and forever transformed the relationship between faith, politics, and individual conscience in the Western world."
 nd_ger_arms_manufacture: "Arms Manufacture"
 nd_ger_arms_manufacture_desc: "German armorers and weaponsmiths, particularly in centers like Nuremberg, Augsburg, and Solingen, produced some of the finest weapons and armor in Europe, supplying armies and princes across the continent."
 nd_ger_schwarze_reiter_tradition: "Schwarze Reiter Tradition"
 nd_ger_schwarze_reiter_tradition_desc: "The Black Riders revolutionized cavalry warfare by making the pistol their primary weapon, employing the caracole formation to deliver devastating volleys before charging home with sword in hand."
 nd_ger_silver_rush: "German Silver Rush"
 nd_ger_silver_rush_desc: "The exploitation of rich silver deposits in the Erzgebirge and Harz Mountains created a torrent of precious metal that funded German princes, powered the mint cities, and attracted mining expertise from across Europe."
 nd_ger_territorial_admin: "Territorial Administration"
 nd_ger_territorial_admin_desc: "The development of professional territorial bureaucracies in the German states — with trained officials, systematic record-keeping, and codified law — created some of the most effective administrations in early modern Europe."
 nd_ger_westphalian_order: "Westphalian Order"
 nd_ger_westphalian_order_desc: "The Peace of Westphalia in 1648 ended the Thirty Years' War and established the foundational principles of modern international relations: state sovereignty, non-interference, and the balance of power."
 nd_ger_confessional_state: "Confessional State"
 nd_ger_confessional_state_desc: "The integration of religious authority into state governance, whether Protestant or Catholic, created a distinctive German model of confessional politics that shaped society, education, and culture for centuries."
 nd_ger_drill_tradition: "Military Drill Tradition"
 nd_ger_drill_tradition_desc: "The systematic drill innovations pioneered by Leopold of Anhalt-Dessau — the iron ramrod, the lockstep march, and standardized loading procedures — transformed German infantry into the most disciplined soldiers in Europe."
 nd_ger_solingen_forges: "Solingen Forges"
 nd_ger_solingen_forges_desc: "The blade-smiths of Solingen and the gunsmiths of Suhl produced weapons of legendary quality, making Germany the armory of Europe and establishing an industrial tradition that endures to this day."
 nd_ger_cameralism: "Cameralist Administration"
 nd_ger_cameralism_desc: "Cameralism, the German science of state finance and administration, trained generations of officials in systematic revenue collection, economic management, and the rational organization of the state."
 nd_ger_jaeger_corps: "Jager Corps"
 nd_ger_jaeger_corps_desc: "Recruited from foresters and huntsmen, the Jager served as elite light infantry — expert marksmen who fought as skirmishers, scouts, and sharpshooters in the forests and hills of Central Europe."
 nd_ger_feldartillerie_advance: "Deutsche Feldartillerie"
 nd_ger_feldartillerie_advance_desc: "German artillery schools, building on centuries of metallurgical expertise, produced field guns of exceptional range and accuracy that would prove decisive on the battlefields of Europe."
 nd_ger_aufklarung: "Aufklarung"
 nd_ger_aufklarung_desc: "The German Enlightenment — the Aufklarung — produced Kant, Lessing, and Goethe, and championed reason, education, and the reform of governance. Its impact on German universities, administration, and culture was transformative."
 nd_ger_prussian_bureaucracy: "Prussian Bureaucratic Model"
 nd_ger_prussian_bureaucracy_desc: "The Prussian civil service, with its rigorous examinations, systematic training, and incorruptible efficiency, became the model for modern bureaucracy that states across Europe sought to emulate."
 nd_ger_standing_army: "Standing Army Doctrine"
 nd_ger_standing_army_desc: "The transition from unreliable mercenary bands to permanent, professionally trained standing armies gave German states the military foundation for sustained campaigns and effective defense."
 nd_ger_landwehr_system: "Landwehr System"
 nd_ger_landwehr_system_desc: "The Landwehr, established during the Wars of Liberation against Napoleon, created a citizen-militia that combined patriotic fervor with military training, vastly expanding the available manpower of the German state."
 nd_ger_zollverein: "Zollverein"
 nd_ger_zollverein_desc: "The German Customs Union, the Zollverein, eliminated hundreds of internal tariff barriers and created a unified economic space that made German unification not just conceivable but inevitable."
 nd_ger_industrialization: "German Industrialization"
 nd_ger_industrialization_desc: "The transformation of the Rhineland, Ruhr, and Silesia into industrial powerhouses — with coal mines, steel mills, and railway networks — propelled Germany from an agricultural patchwork into a modern industrial economy."
 nd_ger_humboldtian_education: "Humboldtian Education"
 nd_ger_humboldtian_education_desc: "Wilhelm von Humboldt's university reform — uniting research and teaching, emphasizing academic freedom, and valuing Bildung over mere vocational training — created the modern research university model adopted worldwide."
 nd_ger_realpolitik: "Realpolitik"
 nd_ger_realpolitik_desc: "The pragmatic, interest-driven approach to foreign policy associated with Bismarck — where diplomacy served power, alliances were tools, and idealism yielded to calculated advantage — reshaped European politics."
 a_nd_ger_schwarze_reiter: "Schwarze Reiter"
 a_nd_ger_schwarze_reiter_desc: "The Black Riders are heavily armored pistol cavalry who employ the caracole formation — riding forward in ranks to deliver pistol volleys before wheeling away to reload. Their blackened armor and thunderous volleys terrorize enemy formations."
 a_nd_ger_jaeger: "Jager"
 a_nd_ger_jaeger_desc: "Recruited from foresters and gamekeepers, Jager are elite light infantry armed with rifles. They fight as skirmishers and sharpshooters, using terrain expertly to harass enemy formations from concealment."
 a_nd_ger_landwehr: "Landwehr"
 a_nd_ger_landwehr_desc: "The Landwehr are citizen-soldiers drawn from the general population, trained in basic military drill and armed by the state. What they lack in professional polish they make up for in numbers and patriotic determination."
 a_nd_ger_feldartillerie: "Deutsche Feldartillerie"
 a_nd_ger_feldartillerie_desc: "German field artillery batteries, benefiting from centuries of metallurgical expertise and systematic gunnery training, deliver devastating bombardments with exceptional accuracy and range."
 nd_ger_bergwerk: "Bergwerk"
 nd_ger_bergwerk_desc: "A German mining complex exploiting the rich mineral deposits of Central Europe. Skilled miners and engineers extract silver, copper, and iron using advanced techniques developed in the Harz and Erzgebirge."
 nd_ger_rathaus: "Rathaus"
 nd_ger_rathaus_desc: "The civic town hall, seat of burgher self-governance and symbol of German civic pride. Here the city council meets, justice is administered, and the commercial life of the town is regulated."
 nd_ger_druckerei: "Druckerei"
 nd_ger_druckerei_desc: "A printing house following the tradition of Gutenberg, producing books, pamphlets, and scholarly works that spread knowledge and literacy across the German lands and beyond."
 nd_ger_waffenschmiede: "Waffenschmiede"
 nd_ger_waffenschmiede_desc: "A German arms foundry where master smiths forge weapons, armor, and firearms of renowned quality. The tradition of Solingen blades and Suhl muskets supplies armies across Europe."
 nd_ger_universitat: "Universitat"
 nd_ger_universitat_desc: "A German research university in the tradition of Heidelberg and Leipzig, where scholars advance knowledge through systematic inquiry and students receive a Bildung that shapes the mind as much as it fills it."
 nd_ger_bergwerk_maintenance: "Iron Extraction"
 nd_ger_bergwerk_maintenance_desc: "Miners extract iron ore from the deep shafts of the German mineral districts, using timber supports and specialized tools to work the rich veins of the Harz and Erzgebirge."
 nd_ger_rathaus_maintenance: "Civic Administration"
 nd_ger_rathaus_maintenance_desc: "The stone, paper, and furnished council chambers required to maintain the administrative and civic functions of a German town hall."
 nd_ger_druckerei_maintenance: "Printing Operations"
 nd_ger_druckerei_maintenance_desc: "Paper and ink are transformed into printed books, pamphlets, and scholarly works by skilled typesetters working the presses of the German printing houses."
 nd_ger_waffenschmiede_maintenance: "Arms Production"
 nd_ger_waffenschmiede_maintenance_desc: "Iron is smelted and forged into weapons using charcoal-fired furnaces, producing blades and armor of solid German craftsmanship."
 nd_ger_universitat_maintenance: "Academic Operations"
 nd_ger_universitat_maintenance_desc: "The paper, books, and glass instruments required to sustain a German university's research and teaching mission."
 nd_ger_silver_processing: "Silver Processing"
 nd_ger_silver_processing_desc: "Silver ore is extracted from the rock matrix and refined into tradeable bullion, using techniques perfected in the mining districts of Saxony and the Harz."
 nd_ger_arms_forging: "Arms Forging"
 nd_ger_arms_forging_desc: "Master armorsmiths forge iron and copper into weapons of exceptional quality — the blades of Solingen and musket barrels of Suhl that arm Europe's finest armies."
 nd_ger_brewing: "German Brewing"
 nd_ger_brewing_desc: "Wheat is brewed into beer according to strict guild standards, a cornerstone of German civic life and burgher culture since the medieval period."
 levy_nd_ger_landwehr: "Landwehr Militia"
 levy_nd_ger_landwehr_desc: "Citizen-soldiers of the Landwehr, called up from the general population to defend the fatherland in times of need."
 nd_ger_formed_tt: "Germany has been formed"
 nd_ger_path_a_tt: "Chose the #bold Blood and Iron#! destiny"
 nd_ger_path_b_tt: "Chose the #bold Legacy of the Zollverein#! destiny"
 nd_ger_destiny: "The German Question"
 nd_ger_destiny_desc: "Germany has been unified, but the question of what Germany shall become remains unanswered. Will this new empire pursue military hegemony over the continent, or will it build an economic colossus that reshapes European commerce?"
 nd_ger.6.t: "The German Question"
 nd_ger.6.d: "The unification of Germany has settled one question but raised a greater one. A nation of such strength, population, and central position cannot simply exist — it must choose a direction. The armies that forged this state stand ready, and the factories that armed them hum with potential. What shall Germany become?"
 nd_ger.6.a: "Germany shall find its destiny."
 nd_ger.7.t: "The Wars of Unification"
 nd_ger.7.d: "The cannons have spoken and the maps redrawn. German armies have marched east to the Vistula and west to the Moselle, seizing the fortresses and ports that secure the Reich's frontiers. The officer corps returns triumphant, forged in the fire of campaign into the finest military instrument in Europe. The great powers take notice — and begin to fear."
 nd_ger.7.a: "Our armies have proven their worth."
 nd_ger.8.t: "Elsass-Lothringen"
 nd_ger.8.d: "The annexation of Lorraine and the consolidation of Prussia's Baltic territories marks Germany as the undisputed military power of Central Europe. Our fortresses bristle with artillery, our supply lines stretch from the North Sea to the Carpathians. The question now is doctrine — shall we perfect the art of siege warfare, reducing enemy strongholds with methodical precision? Or shall we embrace the war of movement, striking deep before the enemy can react?"
 nd_ger.8.a: "Reduce their fortresses to rubble."
 nd_ger.8.b: "Strike fast, before they know we are coming."
 nd_ger.9.t: "Mitteleuropa"
 nd_ger.9.d: "German eagles fly over Warsaw and Krakow. The dream of Mitteleuropa — a continent organized under German leadership — has become reality. From the industrial Rhineland to the grain fields of Poland, from the Baltic ports to the Alpine passes, an empire of unprecedented power stretches across the heart of Europe. How shall this colossus comport itself among the nations?"
 nd_ger.9.a: "Our strength will guarantee the peace."
 nd_ger.9.b: "The state exists to wage war."
 nd_ger.10.t: "Handelsherrschaft"
 nd_ger.10.d: "The Zollverein's vision has been realized. German banks extend credit from Frankfurt to Vienna, coal from the Ruhr powers factories across the customs union, and merchants who once haggled over petty tolls now command markets that span the German lands. The dismantling of internal barriers has created a unified economic space unlike anything Europe has seen — and the foundation for something greater."
 nd_ger.10.a: "The customs union is only the beginning."
 nd_ger.11.t: "Industriemacht"
 nd_ger.11.d: "The transformation is staggering. Where once there were scattered workshops and artisan guilds, now vast factory complexes line the rivers and railways of the German lands. Steel pours from the Ruhr furnaces, chemicals from the laboratories of the Rhine, machinery from the workshops of Saxony. German development has surged past its rivals. But how shall this industrial colossus organize its economy — through open competition or state direction?"
 nd_ger.11.a: "Let the market decide — free trade enriches all."
 nd_ger.11.b: "The state must direct the economy's course."
 nd_ger.12.t: "Welthandel"
 nd_ger.12.d: "German industry and German capital have reshaped the economy of a continent. From the counting houses of Hamburg to the bourses of Frankfurt, from the coal fields of the Ruhr to the laboratories of Berlin, Germany has become the workshop of Europe and the envy of the world. The sciences flourish in German universities, and German goods command premium prices in every market. The question is whether Germany's future lies on the waves of global commerce or in the factories that have already remade society."
 nd_ger.12.a: "Germany must command the seas of commerce."
 nd_ger.12.b: "The factory shall remake the world."
 nd_ger_krupp_stahlwerk: "Krupp Stahlwerk"
 nd_ger_krupp_stahlwerk_desc: "A massive steel works and armaments factory in the tradition of the Krupp dynasty. Here, mountains of Ruhr coal and iron are transmuted into the finest cannons and armor plate in the world, powering Germany's military-industrial dominance."
 nd_ger_krupp_maintenance: "Arms Production"
 nd_ger_krupp_maintenance_desc: "Iron, coal, and steel are fed into the furnaces of the Stahlwerk, emerging as cannon barrels, shell casings, and armor plate of unmatched quality."
 nd_ger_handelskammer: "Handelskammer"
 nd_ger_handelskammer_desc: "A German chamber of commerce where merchants, bankers, and industrialists coordinate the economic affairs of the Reich. Trade agreements, market intelligence, and commercial disputes are managed with Prussian efficiency."
 nd_ger_handelskammer_maintenance: "Commercial Operations"
 nd_ger_handelskammer_maintenance_desc: "Paper, glass, and fine furnishings sustain the administrative operations of the chamber of commerce."
 nd_ger_dest_einigung: "Wars of Unification"
 nd_ger_dest_einigung_desc: "Secure the frontiers of the new German state by seizing the Baltic port of Danzig and the Lorraine fortress of Metz. Both are strategic linchpins — one commands the Vistula and access to the Baltic, the other guards the approaches from France."
 nd_ger_dest_elsass: "Elsass-Lothringen"
 nd_ger_dest_elsass_desc: "Consolidate German military supremacy by securing Konigsberg in the east and building a professional army that is the envy of Europe. The great powers must learn to respect German strength."
 nd_ger_dest_mitteleuropa: "Mitteleuropa"
 nd_ger_dest_mitteleuropa_desc: "Realize the dream of a German-led Central Europe by extending power over Warsaw and Krakow. Build the mightiest army on the continent and earn the prestige befitting a great empire. Unlocks the Krupp Stahlwerk."
 nd_ger_dest_zollverein: "Zollverein Expansion"
 nd_ger_dest_zollverein_desc: "Build the financial infrastructure and resource base to power German industry. Embrace modern banking, fill the treasury, and ensure coal flows through the markets that fuel the factories of the future."
 nd_ger_dest_industrie: "Industriemacht"
 nd_ger_dest_industrie_desc: "Transform Germany into an industrial powerhouse. Embrace industrialization, develop the German lands to their full potential, and ensure steel production feeds the factories of the Ruhr and Rhine."
 nd_ger_dest_welthandel: "Welthandel"
 nd_ger_dest_welthandel_desc: "Achieve economic supremacy over Europe. Amass vast wealth, earn worldwide prestige, embrace the scientific revolution, and develop the German lands into the most productive economy on the continent. Unlocks the Handelskammer."
 STATIC_MODIFIER_NAME_nd_ger_dest_siege_mastery: "Siege Mastery"
 STATIC_MODIFIER_DESC_nd_ger_dest_siege_mastery: "German artillery and siege engineers have perfected the systematic reduction of enemy fortifications, though the expense of prolonged siege operations strains the treasury."
 STATIC_MODIFIER_NAME_nd_ger_dest_bewegungskrieg: "Bewegungskrieg"
 STATIC_MODIFIER_DESC_nd_ger_dest_bewegungskrieg: "German doctrine emphasizes rapid decisive operations — strike before the enemy can concentrate, shatter their will, and dictate terms. Swift victories breed confidence, perhaps too much."
 STATIC_MODIFIER_NAME_nd_ger_dest_armed_peace: "Armed Peace"
 STATIC_MODIFIER_DESC_nd_ger_dest_armed_peace: "Germany's overwhelming military strength guarantees European order. No power dares challenge the Reich, and German prestige reaches its zenith as the arbiter of continental affairs."
 STATIC_MODIFIER_NAME_nd_ger_dest_total_war: "Total War"
 STATIC_MODIFIER_DESC_nd_ger_dest_total_war: "The state is an instrument of war, and war is the instrument of the state. Germany's military machine mobilizes every resource for conquest, though the navy suffers from neglect."
 STATIC_MODIFIER_NAME_nd_ger_dest_open_market: "Open Market"
 STATIC_MODIFIER_DESC_nd_ger_dest_open_market: "Germany's open economic policies attract talent and capital from across Europe, integrating diverse peoples into a flourishing commercial union — though central authority loosens in the process."
 STATIC_MODIFIER_NAME_nd_ger_dest_directed_economy: "Directed Economy"
 STATIC_MODIFIER_DESC_nd_ger_dest_directed_economy: "The state directs industrial development with Prussian efficiency, assimilating peoples and streamlining governance — though naval construction suffers as resources flow to factories."
 STATIC_MODIFIER_NAME_nd_ger_dest_handelsmacht: "Handelsmacht"
 STATIC_MODIFIER_DESC_nd_ger_dest_handelsmacht: "Germany projects commercial power across the seas, building a maritime presence that rivals the old trading empires. The navy commands the shipping lanes, though land forces receive less attention."
 STATIC_MODIFIER_NAME_nd_ger_dest_industriekaiser: "Industriekaiser"
 STATIC_MODIFIER_DESC_nd_ger_dest_industriekaiser: "German industry and innovation reshape European society. The Reich's factories, laboratories, and universities lead the world, and all estates prosper under the engine of progress."
