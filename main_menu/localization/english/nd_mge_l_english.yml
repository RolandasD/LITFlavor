l_english:
 STATIC_MODIFIER_NAME_nd_way_of_the_eternal_blue_sky: "Way of the Eternal Blue Sky"
 STATIC_MODIFIER_DESC_nd_way_of_the_eternal_blue_sky: "Under the banner of the Eternal Blue Sky, the Mongol hordes ride as one. Every horizon is a frontier, every steppe a highway for the horsemen of the Khan. The world trembles before warriors who sleep in the saddle and loose arrows at the gallop."
 STATIC_MODIFIER_NAME_nd_crown_of_the_world: "Crown of the World"
 STATIC_MODIFIER_DESC_nd_crown_of_the_world: "The Mongol Empire is more than conquest — it is a bridge between civilizations. From the Pacific to the Mediterranean, merchants travel under the protection of the Khan, scholars exchange knowledge across continents, and a hundred tongues speak in the markets of Karakorum."
 nd_mge.1.t: "Restoration of the Mongol Empire"
 nd_mge.1.d: "The dream of Genghis Khan lives again. From the ruins of fragmented khanates, a single ruler has united the steppe peoples and claimed dominion over the lands between the four seas. The kurultai has spoken, and the world's largest empire is reborn.\n\nBut the question remains: what kind of empire shall this be? Will we follow the path of eternal war, riding as our ancestors did beneath the Eternal Blue Sky, bringing all nations under the hooves of our cavalry? Or shall we build an empire of law and commerce, where the Silk Road flourishes under Mongol peace, and every culture finds a place in the Khan's court?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mge.1.a: "We ride beneath the Eternal Blue Sky!"
 nd_mge.1.b: "We shall wear the Crown of the World."
 STATIC_MODIFIER_NAME_nd_mge_yasa_proclaimed: "The Great Yasa Proclaimed"
 STATIC_MODIFIER_DESC_nd_mge_yasa_proclaimed: "The Khan has proclaimed the Great Yasa across all lands, establishing a universal code that binds noble and commoner, Mongol and foreigner alike."
 nd_mge.2.t: "The Great Yasa"
 nd_mge.2.d: "The Khan has decreed that the Great Yasa — the supreme law code first proclaimed by Genghis Khan himself — shall be enforced across all territories of the empire. This code, which prescribes absolute loyalty to the Khan, severe punishment for theft and adultery, religious tolerance, and the inviolability of ambassadors, forms the legal backbone of Mongol rule.\n\nUnder the Yasa, there is no distinction between the law that governs a Mongol noble and that which governs a Persian merchant or a Chinese scholar. All subjects are equal before the Khan's justice. This radical universalism has earned both admiration and fear — for the penalties are harsh, but the order they bring is undeniable."
 nd_mge.2.a: "Let the Yasa bring order to all lands."
 nd_mge.2.b: "The Yasa shall be enforced by the sword."
 STATIC_MODIFIER_NAME_nd_mge_pax_mongolica_flourishing: "Pax Mongolica Flourishing"
 STATIC_MODIFIER_DESC_nd_mge_pax_mongolica_flourishing: "Under the peace enforced by Mongol cavalry, the greatest trade network in history stretches from Beijing to Baghdad. Merchants travel in safety, and goods flow freely along the Silk Road."
 nd_mge.3.t: "The Peace of the Mongols"
 nd_mge.3.d: "For the first time in history, a single power controls the entire length of the Silk Road. Caravans laden with silk, spices, porcelain, and precious metals travel from the China Sea to the shores of the Mediterranean without changing hands or paying rival tolls. Genoese merchants deal directly with Chinese traders, Persian astronomers correspond with Mongol princes, and technologies flow in every direction.\n\nThe ortaq merchant partnerships — financed by Mongol princes and staffed by Muslim and Uighur traders — have created a commercial network of unprecedented scale. Paper money circulates alongside silver, and the Yam postal system carries not only official dispatches but mercantile correspondence across the vast reaches of the empire."
 nd_mge.3.a: "The roads of the Khan bring prosperity to all."
 nd_mge.3.b: "Let the caravans pay tribute for safe passage."
 nd_mge.4.t: "The Keshig — Sword of the Khan"
 nd_mge.4.d: "The Keshig — the Khan's imperial guard — represents the finest warriors of the Mongol Empire. Originally numbering just seventy day-guards and eighty night-guards under Genghis Khan, the Keshig has grown into a force of ten thousand elite soldiers, each handpicked from the sons of generals and tribal chiefs.\n\nA member of the Keshig outranks every other military officer in the empire, save only the Khan himself. They serve as the Khan's personal bodyguard, his household servants, his administrative core, and his shock troops in battle. To serve in the Keshig is the highest honor a warrior can achieve — and to fail in that service means death."
 nd_mge.4.a: "The Keshig guard shall never falter."
 STATIC_MODIFIER_NAME_nd_mge_thunder_of_the_khan: "Thunder of the Khan"
 STATIC_MODIFIER_DESC_nd_mge_thunder_of_the_khan: "Mongol engineers have mastered gunpowder weapons, adapting Chinese and Muslim technologies into a devastating arsenal that combines the mobility of the steppe with the destructive power of cannon fire."
 nd_mge.5.t: "Thunder on the Steppe"
 nd_mge.5.d: "The Mongol Empire has always excelled at absorbing the military technologies of conquered peoples. Chinese engineers built our first siege weapons; Muslim artisans perfected our trebuchets. Now the empire turns its attention to the newest revolution in warfare: gunpowder firearms.\n\nMongol smiths and captured engineers have developed handheld firearms suited to steppe warfare — lighter than European muskets, carried by mounted infantry who can dismount to deliver devastating volleys before remounting and withdrawing. The thunder of the Khan's guns echoes across the plains, heralding a new age of Mongol military power."
 nd_mge.5.a: "Let the thunder of our guns shake the earth!"
 nd_mge.5.b: "Share this knowledge for the prosperity of the realm."
 nd_mge_steppe_horsemanship: "Steppe Horsemanship"
 nd_mge_steppe_horsemanship_desc: "The Mongol warrior is born in the saddle. Children learn to ride before they can walk, and every herder is a potential cavalryman."
 nd_mge_composite_bow_craft: "Composite Bow Craft"
 nd_mge_composite_bow_craft_desc: "The Mongol composite bow — fashioned from horn, sinew, and wood — can deliver lethal force at distances exceeding 400 meters, giving mounted archers a decisive advantage."
 nd_mge_great_yasa: "The Great Yasa"
 nd_mge_great_yasa_desc: "Genghis Khan's supreme law code binds all subjects equally, establishing universal order across the vast territories of the empire."
 nd_mge_noyan_command: "Noyan Command"
 nd_mge_noyan_command_desc: "The Noyan — commanders of thousands — form the officer corps of the Mongol military, directing tumens with discipline that transcends tribal loyalties."
 nd_mge_felt_ger_encampments: "Felt Ger Encampments"
 nd_mge_felt_ger_encampments_desc: "Mobile felt tents — the ger — allow Mongol armies to establish and relocate camps with remarkable speed, ensuring troops remain supplied even deep in enemy territory."
 nd_mge_wolf_hunt_tactics: "Wolf Hunt Tactics"
 nd_mge_wolf_hunt_tactics_desc: "The nerge — the great hunt — trains Mongol warriors in the art of encirclement and coordinated pursuit, tactics that translate directly to the battlefield."
 nd_mge_ortaq_partnerships: "Ortaq Partnerships"
 nd_mge_ortaq_partnerships_desc: "Mongol princes invest capital in merchant partnerships with Muslim and Uighur traders, creating a commercial network that spans the empire."
 nd_mge_tumen_discipline: "Tumen Discipline"
 nd_mge_tumen_discipline_desc: "The tumen — a unit of ten thousand — operates with coordinated precision, each subdivision responding instantly to signal flags and drumbeats across the battlefield."
 nd_mge_mongol_siege_corps: "Mongol Siege Corps"
 nd_mge_mongol_siege_corps_desc: "Mongol commanders recruit Chinese and Muslim engineers to build trebuchets, battering rams, and other siege engines, turning a cavalry army into a force that can reduce any fortification."
 nd_mge_darughachi_governors: "Darughachi Governors"
 nd_mge_darughachi_governors_desc: "The darughachi — Mongol-appointed governors — administer conquered territories, conducting censuses, collecting taxes, and maintaining the Khan's authority across diverse populations."
 nd_mge_silk_road_protection: "Silk Road Protection"
 nd_mge_silk_road_protection_desc: "Mongol cavalry patrols ensure the safety of Silk Road caravans, and toll stations collect revenue while guaranteeing merchants safe passage through the empire's vast territories."
 nd_mge_kurultai_assembly: "Kurultai Assembly"
 nd_mge_kurultai_assembly_desc: "The Kurultai — the great assembly of Mongol chiefs and generals — deliberates on matters of succession, war, and law, providing legitimacy to the Khan's rule."
 nd_mge_pax_mongolica_trade: "Pax Mongolica Trade"
 nd_mge_pax_mongolica_trade_desc: "Under Mongol peace, the Silk Road reaches its apex. Goods, technologies, and ideas flow freely between East and West across the largest contiguous land empire in history."
 nd_mge_religious_tolerance: "Religious Tolerance"
 nd_mge_religious_tolerance_desc: "The Mongol Empire grants freedom of worship to all subjects. Buddhist, Muslim, Christian, and Tengrist communities coexist under the Khan's protection."
 nd_mge_counterweight_trebuchet: "Counterweight Trebuchet"
 nd_mge_counterweight_trebuchet_desc: "Persian engineers Ismail and Al-aud-Din construct counterweight trebuchets capable of hurling 300-kilogram projectiles over 500 meters, revolutionizing Mongol siege warfare."
 nd_mge_paper_currency: "Paper Currency"
 nd_mge_paper_currency_desc: "The Mongol Empire issues paper banknotes backed by imperial authority, facilitating commerce across territories where silver and gold are scarce."
 nd_mge_horse_relay_posts: "Horse Relay Posts"
 nd_mge_horse_relay_posts_desc: "The Ortoo relay stations — spaced every thirty miles across the empire — allow messages to traverse the entire length of the Silk Road in a matter of days."
 nd_mge_keshig_guard: "Keshig Guard"
 nd_mge_keshig_guard_desc: "The Keshig — ten thousand elite warriors chosen from the sons of generals and chiefs — serve as the Khan's personal guard, household, and most trusted military force."
 nd_mge_mangudai_tactics: "Mangudai Tactics"
 nd_mge_mangudai_tactics_desc: "The mangudai — specialized light cavalry skirmishers — feign retreat to lure enemies into ambush, then wheel and deliver devastating arrow barrages at close range."
 nd_mge_silk_road_caravanserai: "Silk Road Caravanserai"
 nd_mge_silk_road_caravanserai_desc: "Grand roadside inns offer shelter, food, and stabling for merchants traveling the Silk Road, supporting the vast commercial network of the empire."
 nd_mge_imperial_armory: "Imperial Armory"
 nd_mge_imperial_armory_desc: "Centralized weapon workshops mass-produce standardized arms and armor for the Mongol military, ensuring every warrior is equipped to the Khan's specifications."
 nd_mge_gunpowder_adaptation: "Gunpowder Adaptation"
 nd_mge_gunpowder_adaptation_desc: "Mongol engineers adapt Chinese gunpowder weapons for steppe warfare, developing lighter firearms suited to the mobility of horse-mounted infantry."
 nd_mge_universal_chronicle: "Universal Chronicle"
 nd_mge_universal_chronicle_desc: "Imperial historians compile comprehensive chronicles of every conquered people, preserving knowledge from China to Persia in the tradition of Rashid al-Din's Compendium of Chronicles."
 nd_mge_eternal_empire: "Eternal Empire"
 nd_mge_eternal_empire_desc: "The Mongol Empire preserves and transmits the cultural achievements of all its subject peoples, creating a legacy that transcends any single civilization."
 nd_mge_steppe_modernization: "Steppe Modernization"
 nd_mge_steppe_modernization_desc: "The empire adapts modern production techniques to the vast scale of its territories, combining industrial capacity with the logistical traditions of the steppe."
 nd_mge_legacy_of_conquest: "Legacy of Conquest"
 nd_mge_legacy_of_conquest_desc: "The martial traditions of Genghis Khan endure into the modern age. Mongol cavalry, though changed by centuries of evolution, remains a formidable force on any battlefield."
 a_nd_mge_steppe_horse_archer: "Steppe Horse Archer"
 a_nd_mge_steppe_horse_archer_desc: "Mounted archers raised from the Mongol steppe, trained from childhood in the saddle. They rain arrows on enemies while remaining frustratingly out of reach."
 a_nd_mge_wolf_raider: "Wolf Raider"
 a_nd_mge_wolf_raider_desc: "Light cavalry trained in the nerge — the great hunt — specializing in encirclement and pursuit. They strike with the coordinated ferocity of a wolf pack."
 a_nd_mge_tumen_cavalry: "Tumen Heavy Cavalry"
 a_nd_mge_tumen_cavalry_desc: "The armored heart of a Mongol tumen — heavy cavalry equipped with lances, sabers, and lamellar armor, capable of delivering devastating shock charges."
 a_nd_mge_siege_engineer: "Mongol Siege Engineer"
 a_nd_mge_siege_engineer_desc: "Chinese and Muslim engineers recruited into Mongol service, operating trebuchets and other siege engines that reduce even the mightiest fortifications to rubble."
 a_nd_mge_counterweight_trebuchet: "Counterweight Trebuchet"
 a_nd_mge_counterweight_trebuchet_desc: "A hinged counterweight trebuchet designed by Persian engineers, capable of hurling massive projectiles with devastating accuracy over great distances."
 a_nd_mge_keshig: "Keshig Guard"
 a_nd_mge_keshig_desc: "The Khan's elite imperial guard — ten thousand warriors of proven loyalty, trained in every form of combat, who serve as both personal bodyguard and shock troops."
 a_nd_mge_mangudai: "Mangudai Skirmisher"
 a_nd_mge_mangudai_desc: "Light cavalry masters of the feigned retreat. They lure enemies into pursuit, then wheel to deliver punishing arrow volleys before melting away across the steppe."
 a_nd_mge_handgunner: "Mongol Handgunner"
 a_nd_mge_handgunner_desc: "Mongol infantry armed with adapted gunpowder weapons, combining the devastating firepower of firearms with the mobile tactics of steppe warfare."
 a_nd_mge_legacy_cavalry: "Legacy Steppe Cavalry"
 a_nd_mge_legacy_cavalry_desc: "The direct descendants of Genghis Khan's horsemen, carrying forward centuries of cavalry tradition into the modern age with characteristic Mongol mobility."
 nd_mge_bow_workshop: "Composite Bow Workshop"
 nd_mge_bow_workshop_desc: "A specialized workshop where master bowyers craft the legendary Mongol composite bow from layers of horn, sinew, and birch wood."
 nd_mge_ger_encampment: "Ger Encampment"
 nd_mge_ger_encampment_desc: "A permanent base of felt ger tents that serves as a staging point and supply depot for Mongol armies operating deep in the field."
 nd_mge_ortaq_house: "Ortaq Trading House"
 nd_mge_ortaq_house_desc: "A partnership office where Mongol princes and Muslim merchants coordinate the vast commercial enterprises that span the empire's trade routes."
 nd_mge_kurultai_hall: "Kurultai Hall"
 nd_mge_kurultai_hall_desc: "A grand assembly hall where Mongol chiefs, generals, and nobles gather to deliberate on matters of war, succession, and the governance of the empire."
 nd_mge_imperial_mint: "Imperial Mint"
 nd_mge_imperial_mint_desc: "A facility for printing paper currency backed by the full authority of the Khan, facilitating commerce across the empire's vast territories."
 nd_mge_ortoo_station: "Ortoo Relay Station"
 nd_mge_ortoo_station_desc: "A horse relay station in the Yam postal network, where messengers exchange mounts to carry dispatches across the empire at remarkable speed."
 nd_mge_caravanserai: "Caravanserai"
 nd_mge_caravanserai_desc: "A large roadside inn offering food, lodging, and stabling to Silk Road merchants, serving as a hub for trade and information along the empire's highways."
 nd_mge_khans_archive: "Khan's Archive"
 nd_mge_khans_archive_desc: "A repository of knowledge gathered from every corner of the empire — Chinese scrolls, Persian manuscripts, and Mongol oral histories preserved for future generations."
 nd_mge_bow_making: "Mongol Bow Making"
 nd_mge_bow_making_desc: "Master bowyers craft composite bows from birch wood and animal horn and sinew, producing weapons of lethal range and power."
 nd_mge_ger_maintenance: "Ger Camp Maintenance"
 nd_mge_ger_maintenance_desc: "Maintaining the felt coverings and wooden frames of the mobile ger encampments."
 nd_mge_ortaq_operations: "Ortaq Trade Operations"
 nd_mge_ortaq_operations_desc: "Managing the merchant partnerships and trade goods flowing through the ortaq commercial network."
 nd_mge_kurultai_provisions: "Kurultai Provisions"
 nd_mge_kurultai_provisions_desc: "Feeding and housing the assembled chiefs and nobles during great kurultai deliberations."
 nd_mge_paper_note_printing: "Paper Note Printing"
 nd_mge_paper_note_printing_desc: "The production of paper banknotes for imperial commerce."
 nd_mge_ortoo_upkeep: "Ortoo Station Upkeep"
 nd_mge_ortoo_upkeep_desc: "Maintaining the horse herds and provisions that keep the Yam relay network operating."
 nd_mge_caravanserai_hospitality: "Caravanserai Hospitality"
 nd_mge_caravanserai_hospitality_desc: "Providing food, shelter, and stabling for merchants traveling the Silk Road."
 nd_mge_archive_upkeep: "Archive Upkeep"
 nd_mge_archive_upkeep_desc: "Preserving manuscripts and scrolls from across the empire in the Khan's great repository."
 nd_mge_caravan_tolls: "Caravan Toll Collection"
 nd_mge_caravan_tolls_desc: "Collecting transit fees from merchants traveling under the Khan's protection along the Silk Road."
 nd_mge_silk_road_exchange: "Silk Road Exchange"
 nd_mge_silk_road_exchange_desc: "Facilitating the exchange of luxury goods between the civilizations of East and West."
 nd_mge_imperial_forging: "Imperial Weapon Forging"
 nd_mge_imperial_forging_desc: "Mass production of standardized weapons and armor in the Khan's centralized armories."
 levy_nd_mge_noyan_retinue: "Noyan Retinue"
 levy_nd_mge_noyan_retinue_desc: "Cavalry retainers raised by the Noyan commanders from among their own households and tribal kinsmen."
 levy_nd_mge_legacy_cavalry: "Legacy Steppe Cavalry"
 levy_nd_mge_legacy_cavalry_desc: "Cavalrymen raised in the ancient tradition of the Mongol steppe, preserving the martial heritage of Genghis Khan's horsemen."
 STATIC_MODIFIER_NAME_nd_mge_yasa_enforcement: "Yasa Enforcement"
 STATIC_MODIFIER_DESC_nd_mge_yasa_enforcement: "The Great Yasa is enforced with iron discipline across all territories of the empire. Where the law is obeyed, order prevails — and those who defy it meet swift justice."
 STATIC_MODIFIER_NAME_nd_mge_silk_road_taxation: "Silk Road Taxation"
 STATIC_MODIFIER_DESC_nd_mge_silk_road_taxation: "Mongol toll stations along the Silk Road extract tribute from every caravan that travels under the Khan's protection, turning the peace of the empire into a steady stream of revenue."
 STATIC_MODIFIER_NAME_nd_mge_gunpowder_prosperity: "Gunpowder Prosperity"
 STATIC_MODIFIER_DESC_nd_mge_gunpowder_prosperity: "The knowledge of gunpowder weapons is shared across the empire, spurring innovation in production, construction, and trade as the new technology transforms civilian life alongside the military."
 nd_mge_formed_tt: "Mongol Empire has been formed"
 nd_mge_path_a_tt: "Chose Way of the Eternal Blue Sky"
 nd_mge_path_b_tt: "Chose Crown of the World"
 nd_mge_destiny: "Destiny of the Mongol Empire"
 nd_mge_destiny_desc: "The Mongol Empire has risen again. Maintain stability as the Khan charts the empire's course through history."
 nd_mge_dest_western_ride: "The Western Ride"
 nd_mge_dest_western_ride_desc: "Complete the work of Hulagu Khan. Bring Baghdad and Damascus under Mongol dominion, extending the empire's reach into the heart of the Islamic world."
 nd_mge_dest_southern_campaign: "The Southern Campaign"
 nd_mge_dest_southern_campaign_desc: "Turn the conquering gaze southward. The riches of India have long tempted Mongol khans -- seize Delhi and Lahore to bring the subcontinent into the empire."
 nd_mge_dest_four_seas: "Empire of the Four Seas"
 nd_mge_dest_four_seas_desc: "The ultimate vision of Genghis Khan: an empire stretching from sea to sea. Take Constantinople, Cairo, and Buda to prove Mongol supremacy across three continents."
 nd_mge_dest_silk_renewed: "The Silk Road Renewed"
 nd_mge_dest_silk_renewed_desc: "Under Mongol peace, the Silk Road flourishes once more. Ensure silk flows through the capital market, fill the imperial treasury, and embrace modern banking."
 nd_mge_dest_exchange_civs: "Exchange of Civilizations"
 nd_mge_dest_exchange_civs_desc: "The empire bridges East and West, facilitating the greatest exchange of knowledge in history. Develop the realm and embrace the printing press to spread learning."
 nd_mge_dest_universal_dominion: "Universal Dominion"
 nd_mge_dest_universal_dominion_desc: "The Mongol Empire aspires to become the seat of universal civilization. Achieve supreme development, fill the treasury, and ensure gems adorn the capital market."
 nd_mge.6.t: "The Empire Restored"
 nd_mge.6.d: "The Mongol Empire stands reborn, a colossus spanning the breadth of Asia. The kurultai has affirmed the Khan's authority, and the people look to their ruler to guide this vast dominion toward its destiny. Whether through the thunder of hooves or the quiet hum of commerce, the empire's path forward will be written in the annals of history."
 nd_mge.6.a: "The world awaits the Khan's will."
 nd_mge.7.t: "The Western Ride Begins"
 nd_mge.7.d: "Mongol banners fly over Baghdad and Damascus -- cities that once defied the horde now bow before the Khan. The Abbasid caliphate's former seat of power is Mongol ground, and the ancient crossroads of the Levant carry the thunder of steppe cavalry. The western frontier of the empire has been pushed beyond what even Hulagu achieved."
 nd_mge.7.a: "From the Tigris to the Euphrates, all is ours."
 nd_mge.8.t: "The Gates of India"
 nd_mge.8.d: "Delhi has fallen. The subcontinent's riches -- its elephants, its spices, its teeming millions -- now flow into the Mongol sphere. What the Chagatai khans attempted and failed, the restored empire has achieved. The Khyber Pass echoes with the hooves of the Khan's cavalry, and the sultans of Hindustan kneel before a power greater than any they have known.\n\nHow shall the Khan consolidate these southern conquests?"
 nd_mge.8.a: "Establish swift cavalry supply lines."
 nd_mge.8.b: "Let our name strike terror in their hearts."
 nd_mge.9.t: "Lord of the Four Seas"
 nd_mge.9.d: "Constantinople, Cairo, Buda -- three cities that represent three continents, three civilizations, three millennia of history -- all fly the banner of the Khan. The Mongol Empire now stretches from the Pacific to the Mediterranean, from the Arctic tundra to the Nile Delta. No empire in history has matched this scale.\n\nThe Khan stands at the pinnacle of earthly power. How shall this supreme achievement be commemorated?"
 nd_mge.9.a: "The conquest shall never end."
 nd_mge.9.b: "Bring peace through the sword's authority."
 nd_mge.10.t: "The Silk Road Lives Again"
 nd_mge.10.d: "Silk caravans wind through the empire's heartland once more, protected by Mongol cavalry and taxed by Mongol governors. The capital's markets overflow with fine cloth from China, gemstones from Persia, and spices from every corner of the known world. The imperial treasury grows fat with the tolls of a thousand caravan routes."
 nd_mge.10.a: "The merchants prosper under the Khan's peace."
 nd_mge.11.t: "The Great Exchange"
 nd_mge.11.d: "Under Mongol rule, an unprecedented exchange of knowledge spans the continent. Chinese astronomers correspond with Persian mathematicians, Uighur scribes translate Greek philosophy, and printing presses disseminate learning in a dozen languages. The empire has become not merely a political entity but a conduit for civilization itself.\n\nHow shall the Khan direct this flowering of knowledge?"
 nd_mge.11.a: "Found schools to spread learning across the realm."
 nd_mge.11.b: "Empower merchants as patrons of knowledge."
 nd_mge.12.t: "The Crown of All Nations"
 nd_mge.12.d: "The Mongol Empire has achieved what no other power in history has accomplished: a true universal state where every culture contributes, every tradition is preserved, and every people finds their place under the protection of the Khan. The empire's development rivals the greatest civilizations of any age, and its treasury overflows with the wealth of a continent.\n\nWhat legacy shall the Khan leave to the ages?"
 nd_mge.12.a: "Build the eternal road of prosperity."
 nd_mge.12.b: "Become the Khan of all peoples."
 STATIC_MODIFIER_NAME_nd_mge_dest_swift_cavalry: "Swift Cavalry Doctrine"
 STATIC_MODIFIER_DESC_nd_mge_dest_swift_cavalry: "The Khan's cavalry supply lines stretch from the Indus to the Ganges, with relay stations ensuring rapid reinforcement and resupply across the conquered territories."
 STATIC_MODIFIER_NAME_nd_mge_dest_terror_steppe: "Terror of the Steppe"
 STATIC_MODIFIER_DESC_nd_mge_dest_terror_steppe: "The mere approach of Mongol banners causes cities to surrender without a fight. The Khan's reputation precedes his armies, though the constant warfare leaves little time for scholarly pursuits."
 STATIC_MODIFIER_NAME_nd_mge_dest_world_conqueror: "World Conqueror"
 STATIC_MODIFIER_DESC_nd_mge_dest_world_conqueror: "The Khan commands the greatest military machine in history. Armies are maintained at reduced cost, and noble levies swell with warriors eager to serve the conqueror of the known world."
 STATIC_MODIFIER_NAME_nd_mge_dest_pax_sword: "Pax by the Sword"
 STATIC_MODIFIER_DESC_nd_mge_dest_pax_sword: "The Khan imposes order on conquered lands through firm but fair governance. Conquered peoples are integrated into the empire, and the estates find satisfaction under Mongol rule."
 STATIC_MODIFIER_NAME_nd_mge_dest_schools_east: "Schools of the East"
 STATIC_MODIFIER_DESC_nd_mge_dest_schools_east: "The empire's schools and observatories drive institutional progress and social advancement, though the scholarly focus draws attention away from military tradition."
 STATIC_MODIFIER_NAME_nd_mge_dest_merchant_princes: "Merchant Princes"
 STATIC_MODIFIER_DESC_nd_mge_dest_merchant_princes: "Empowered merchant houses dominate the empire's trade centers, driving prosperity and commercial activity across the vast Silk Road network."
 STATIC_MODIFIER_NAME_nd_mge_dest_eternal_road: "The Eternal Road"
 STATIC_MODIFIER_DESC_nd_mge_dest_eternal_road: "The Silk Road has become more than a trade route -- it is the artery of civilization itself. Raw materials flow freely, populations grow, and religious harmony prevails across the empire."
 STATIC_MODIFIER_NAME_nd_mge_dest_khan_peoples: "Khan of All Peoples"
 STATIC_MODIFIER_DESC_nd_mge_dest_khan_peoples: "The Khan rules as sovereign of every nation within the empire, expanding diplomatic reach and fostering universal literacy, though the openness of the realm complicates intelligence operations."
 nd_mge_war_camp: "Mongol War Camp"
 nd_mge_war_camp_desc: "A permanent military staging point in the tradition of Genghis Khan's great encampments, equipped to raise, supply, and launch armies across the empire's vast frontiers."
 nd_mge_house_of_wisdom: "House of Wisdom"
 nd_mge_house_of_wisdom_desc: "A grand center of learning inspired by the legendary Bayt al-Hikma of Baghdad, rebuilt under Mongol patronage as a repository for the knowledge of every civilization under the Khan's rule."
 nd_mge_war_camp_maintenance: "War Camp Provisioning"
 nd_mge_war_camp_maintenance_desc: "Maintaining the weapons, mounts, and supplies of the Khan's permanent military staging grounds."
 nd_mge_house_wisdom_maintenance: "House of Wisdom Upkeep"
 nd_mge_house_wisdom_maintenance_desc: "Maintaining the scholars, scribes, and materials of the empire's greatest center of learning."
