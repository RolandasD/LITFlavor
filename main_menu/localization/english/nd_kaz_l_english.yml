l_english:
 STATIC_MODIFIER_NAME_nd_kaz_legacy_of_kasym: "Legacy of Kasym Khan"
 STATIC_MODIFIER_DESC_nd_kaz_legacy_of_kasym: "Under Kasym Khan, the Kazakh Khanate reached its zenith, fielding two hundred thousand cavalry and commanding the entire Desht-i Kipchak from the Irtysh to the Ural. His centralized authority, backed by the Chinggisid mandate, forged scattered clans into a single terrifying force."
 STATIC_MODIFIER_NAME_nd_kaz_three_zhuz_confederacy: "Confederacy of the Three Zhuz"
 STATIC_MODIFIER_DESC_nd_kaz_three_zhuz_confederacy: "The genius of Kazakh governance lies not in the power of a single khan but in the balance of three zhuz — the Great, Middle, and Junior hordes. Each maintains its pastures, its biys, its traditions. Unity arises from consensus, not command, and the steppe endures because no single defeat can shatter the whole."
 nd_kaz.1.t: "The Kazakh Khanate"
 nd_kaz.1.d: "When Janibek and Kerei led their followers away from the crumbling authority of Abu'l-Khayr's Uzbek confederation, they did not merely rebel — they founded a nation. Two hundred thousand nomads chose freedom on the open steppe over submission, and from that exodus the Kazakh people were born.\n\nNow the khanate stands at a crossroads that will define its character for generations. The Chinggisid tradition demands a strong khan who can unite the clans under a single banner, marshaling the full strength of the steppe against any foe. But the reality of the vast Desht-i Kipchak favors a different wisdom: the confederal division of the three zhuz, where each horde governs its own pastures and the khan rules by consensus with the biys and sultans.\n\nWhich path shall define the Kazakh nation?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_kaz.1.a: "One khan, one nation — as Kasym commanded"
 nd_kaz.1.b: "Three zhuz, one people — strength through balance"
 nd_kaz.2.t: "The Jeti Zhargy"
 nd_kaz.2.d: "In the twilight years of the seventeenth century, Khan Tauke assembled the three greatest biys of the Kazakh nation: Tole Bi of the Great Zhuz, Kazybek Bi of the Middle Zhuz, and Aiteke Bi of the Junior Zhuz. Together they codified the customary law of the steppe into the Jeti Zhargy — the Seven Codes.\n\nThese laws regulated everything from inheritance and marriage to livestock disputes and the punishment of crimes. They established the authority of the biy courts as the arbiters of justice across the vast steppe, binding diverse clans under a common legal framework without imposing centralized tyranny.\n\nThe Jeti Zhargy represents a choice: shall the law serve to strengthen the khan's authority over all disputes, or shall it enshrine the biys as the true pillars of governance?"
 nd_kaz.2.a: "The law strengthens the khan's hand"
 nd_kaz.2.b: "The biys are the true voice of the steppe"
 nd_kaz.3.t: "Triumph at Anyrakay"
 nd_kaz.3.d: "For years the Dzungar Khanate had pressed westward, and the catastrophe of 1723 — the Aktaban Shubyryndy, the Great Retreat — had nearly broken the Kazakh nation. Families scattered, herds were lost, and despair gripped the steppe.\n\nBut in the spring of 1730, the tide turned. Khan Abulkhair rallied thirty thousand warriors from all three zhuz — an unprecedented feat of unity. At Anyrakay, over forty days of fighting across two hundred kilometers of steppe, the legendary batyrs Bogenbai, Kabanbai, and Nauryzbai shattered the Dzungar advance. The invaders were expelled from Zhetysu, and the Kazakh people proved that the steppe could not be conquered.\n\nThis victory demands a decision: shall we press our advantage and pursue the Dzungars to their ruin, or consolidate what we have won and rebuild the solidarity of the three zhuz?"
 nd_kaz.3.a: "Pursue the retreating enemy — the steppe is ours"
 nd_kaz.3.b: "Rebuild and reunite — the zhuz must stand together"
 nd_kaz.4.t: "The Horse-Silk Exchange"
 nd_kaz.4.d: "Between 1759 and 1796, the Qing emperor issued special decrees governing the horse trade with the Kazakh Khanate. The Kazakhs possessed what China needed most — hardy steppe horses by the tens of thousands — and China offered what the steppe desired: bolts of silk, tea, and manufactured goods.\n\nThis was no mere barter. The horse-silk exchange became a pillar of diplomacy, a regulated system of trade and tribute that enriched both empires. Kazakh bais grew wealthy beyond imagination — the legendary Aldan owned twenty-four thousand horses, while the nation's total herds numbered in the millions. The steppe had found a way to convert its boundless grasslands into enduring wealth."
 nd_kaz.4.a: "The wealth of the steppe flows east and west"
 STATIC_MODIFIER_NAME_nd_kaz_code_of_the_steppe: "Code of the Steppe"
 STATIC_MODIFIER_DESC_nd_kaz_code_of_the_steppe: "The Jeti Zhargy has codified the customary law of the nomadic clans into a unified legal code, strengthening the khan's authority over disputes across the vast steppe."
 STATIC_MODIFIER_NAME_nd_kaz_biy_councils: "Authority of the Biys"
 STATIC_MODIFIER_DESC_nd_kaz_biy_councils: "The Jeti Zhargy has enshrined the biy courts as the foundation of Kazakh justice, creating a decentralized system of governance that respects the autonomy of each zhuz while binding them under common law."
 STATIC_MODIFIER_NAME_nd_kaz_steppe_resurgent: "The Steppe Resurgent"
 STATIC_MODIFIER_DESC_nd_kaz_steppe_resurgent: "The triumph at Anyrakay has unleashed the martial fury of the Kazakh nation. Emboldened by victory, our cavalry rides with renewed purpose, and the memory of our greatest batyrs inspires every warrior."
 STATIC_MODIFIER_NAME_nd_kaz_zhuz_solidarity: "Solidarity of the Zhuz"
 STATIC_MODIFIER_DESC_nd_kaz_zhuz_solidarity: "The unprecedented unity of all three zhuz at Anyrakay has demonstrated that the Kazakh nation is strongest when it stands together. The bonds forged in common struggle now sustain a deeper mobilization."
 STATIC_MODIFIER_NAME_nd_kaz_silk_road_wealth: "Silk Road Wealth"
 STATIC_MODIFIER_DESC_nd_kaz_silk_road_wealth: "The regulated horse-silk exchange has transformed the boundless grasslands of the steppe into a source of enduring commercial wealth."
 nd_kaz_horse_archer_tradition: "Horse Archer Tradition"
 nd_kaz_horse_archer_tradition_desc: "The composite bow and the steppe pony are the twin pillars of Kazakh warfare. From childhood, every nomad learns to shoot from horseback at full gallop — the famous Kazakh Shot, a rearward volley while retreating, that has broken many a pursuing army."
 nd_kaz_horse_breeding_mastery: "Horse Breeding Mastery"
 nd_kaz_horse_breeding_mastery_desc: "The Kazakhs breed some of the hardiest horses in the world — compact, enduring animals that can survive on steppe grass alone. Wealthy bais own herds numbering in the tens of thousands, and the nation's equine wealth is the foundation of both its military power and its trade."
 nd_kaz_aul_organization: "Aul Organization"
 nd_kaz_aul_organization_desc: "The aul — the nomadic camp — is the basic unit of Kazakh society. Each aul moves with the seasons, following ancient migration routes between winter shelters and summer pastures. Their felt yurts can be raised in an hour and dismantled in less."
 nd_kaz_quriltay_tradition: "Quriltay Tradition"
 nd_kaz_quriltay_tradition_desc: "In the Chinggisid tradition, the quriltay assembly gathers the clan elders, sultans, and military leaders to elect a khan, plan the year's migration, and allocate winter pastureland. It is the beating heart of steppe governance."
 nd_kaz_yasa_legacy: "Legacy of the Yasa"
 nd_kaz_yasa_legacy_desc: "The Yasa of Genghis Khan — codified in 1206 — remains the foundational legal tradition of the steppe. Its principles of collective responsibility, hierarchical command, and pastoral rights govern the relationship between khan and clan."
 nd_kaz_ru_bonds: "Bonds of the Ru"
 nd_kaz_ru_bonds_desc: "Every Kazakh knows their ru — their patrilineal clan — tracing seven generations of ancestors. These genealogical bonds transcend zhuz boundaries, binding the nation together through shared blood and obligation."
 nd_kaz_guard_cavalry: "Quriltay Guard"
 nd_kaz_guard_cavalry_desc: "The khan's personal retinue, chosen from the finest horsemen of every clan at the quriltay assembly. These mounted warriors serve as both bodyguard and shock cavalry, the sharp edge of the khan's authority."
 nd_kaz_silk_road_waystations: "Silk Road Waystations"
 nd_kaz_silk_road_waystations_desc: "Along the caravan routes that cross the steppe, Kazakh waystations provide shelter, fresh horses, and provisions to traveling merchants. These posts connect the cities of Transoxiana to the markets of China and beyond."
 nd_kaz_kasym_khan_era: "Era of Kasym Khan"
 nd_kaz_kasym_khan_era_desc: "Under Kasym Khan (r. 1509-1518), the Kazakh Khanate reached its peak, reportedly able to field two hundred thousand cavalry. His authority extended from the Irtysh to the Ural, and all neighboring powers feared the Kazakh horsemen."
 nd_kaz_horse_trade_mastery: "Steppe Horse Trade"
 nd_kaz_horse_trade_mastery_desc: "Kazakh horses are prized across Central Asia for their endurance, sure-footedness, and ability to thrive on sparse steppe forage. The trade in these animals is the khanate's most valuable commercial asset."
 nd_kaz_barymta_raids: "Barymta Tradition"
 nd_kaz_barymta_raids_desc: "Barymta — the ritualized livestock raid — serves as both economic redistribution and martial training. Young warriors prove themselves by seizing horses from rival clans, and the practice maintains the edge of nomadic cavalry skills between wars."
 nd_kaz_seasonal_migration: "Seasonal Migration"
 nd_kaz_seasonal_migration_desc: "The annual migration between zhailau (summer pastures) and kystau (winter camps) is the rhythm of nomadic life. This cycle maintains the grasslands, feeds the herds, and keeps the population spread across the territory, making the khanate remarkably resilient to invasion."
 nd_kaz_tore_cavalry: "Tore Lancers"
 nd_kaz_tore_cavalry_desc: "The Tore — the Chinggisid aristocracy — provide the heavy shock cavalry of the Kazakh army. These noble lancers, clad in mail and wielding long spears, lead the decisive charge that breaks enemy formations after the horse archers have softened them."
 nd_kaz_jeti_zhargy: "Jeti Zhargy"
 nd_kaz_jeti_zhargy_desc: "The Seven Codes of Khan Tauke, assembled by the three great biys Tole, Kazybek, and Aiteke, codified the customary law of the Kazakh nation into a comprehensive legal framework governing inheritance, marriage, criminal justice, and pastoral rights."
 nd_kaz_kumis_tradition: "Kumis Tradition"
 nd_kaz_kumis_tradition_desc: "Kumis — fermented mare's milk — is the sacred drink of the steppe, served at every gathering from humble aul feasts to the quriltay itself. Its production is both a culinary art and an economic activity sustaining nomadic communities."
 nd_kaz_zhuz_system: "Three Zhuz Division"
 nd_kaz_zhuz_system_desc: "The division of the Kazakh nation into the Great, Middle, and Junior Zhuz — each with its own territory, sultans, and traditions — is both the khanate's greatest vulnerability and its greatest strength. No single defeat can destroy a nation distributed across three autonomous hordes."
 nd_kaz_composite_bow_mastery: "Composite Bow Mastery"
 nd_kaz_composite_bow_mastery_desc: "The Kazakh composite recurve bow — layered from horn, sinew, and wood — delivers devastating power from horseback. Generations of refinement have made it lighter, more responsive, and more accurate, allowing the famous rearward Kazakh Shot at full gallop."
 nd_kaz_caravan_tolls: "Caravan Tolls"
 nd_kaz_caravan_tolls_desc: "Control of the steppe caravan routes allows the Kazakhs to levy tolls on Silk Road traffic passing through their territory. Merchants pay for safe passage, fresh mounts, and protection from bandits."
 nd_kaz_dzungar_mobilization: "Dzungar Mobilization"
 nd_kaz_dzungar_mobilization_desc: "The existential threat of the Dzungar invasion forced an unprecedented mobilization of the entire Kazakh nation. The zhasaq — tribal militia — was assembled by khan's decree, drawing every able-bodied man from the three zhuz to defend the homeland."
 nd_kaz_batyr_tradition: "Batyr Tradition"
 nd_kaz_batyr_tradition_desc: "The batyr — the warrior champion — is the highest honor in Kazakh martial culture. Men like Bogenbai, Kabanbai, and Nauryzbai earned their title through feats of individual valor in battle, and their names echo through the centuries in epic poetry."
 nd_kaz_togan_defenses: "Togan Guard Posts"
 nd_kaz_togan_defenses_desc: "Unlike sedentary peoples who build walls, the Kazakhs defend their territory through mobile guard posts and watch stations along the frontier. These togan provide early warning of invasion and serve as rally points for the militia."
 nd_kaz_anyrakay_triumph: "Triumph at Anyrakay"
 nd_kaz_anyrakay_triumph_desc: "The forty-day battle at Anyrakay in 1730, where Abulkhair Khan's united Kazakh force shattered the Dzungar advance across two hundred kilometers of steppe, proved that nomadic cavalry coordinated across three zhuz could defeat any foe."
 nd_kaz_horse_silk_exchange: "Horse-Silk Exchange"
 nd_kaz_horse_silk_exchange_desc: "The regulated trade between the Kazakh Khanate and the Qing Dynasty, exchanging hardy steppe horses for silk, tea, and manufactured goods. This became a pillar of diplomacy and a source of immense wealth for the Kazakh bais."
 nd_kaz_abulkhair_diplomacy: "Abulkhair's Diplomacy"
 nd_kaz_abulkhair_diplomacy_desc: "Khan Abulkhair of the Junior Zhuz navigated a perilous diplomatic landscape, seeking alliances with Russia against the Dzungars while attempting to preserve Kazakh sovereignty. His pragmatic statecraft set the template for steppe diplomacy in an age of great empires."
 nd_kaz_batyr_champions: "Batyr Champions"
 nd_kaz_batyr_champions_desc: "The ultimate expression of Kazakh martial tradition: legendary warriors who combine mastery of the composite bow, the lance, and horseback combat into a single devastating package. Their feats of arms inspire entire armies."
 nd_kaz_ablai_khan_reforms: "Ablai Khan's Reforms"
 nd_kaz_ablai_khan_reforms_desc: "Khan Ablai (r. 1771-1781) was the last khan to exercise real authority over all three zhuz. His diplomatic maneuvering between Russia and China, combined with centralizing internal reforms, represented the final flowering of the Kazakh Khanate as an independent power."
 nd_kaz_pastoral_wealth: "Pastoral Wealth"
 nd_kaz_pastoral_wealth_desc: "At its peak, the Kazakh nation counted millions of horses, cattle, sheep, and camels. This livestock wealth, when properly managed and traded, rivals the silver mines and plantations of sedentary empires."
 nd_kaz_nomadic_logistics: "Nomadic Logistics"
 nd_kaz_nomadic_logistics_desc: "Centuries of seasonal migration have given the Kazakhs an unmatched understanding of steppe logistics — the location of water sources, the carrying capacity of pastures, and the fastest routes across seemingly trackless grassland."
 nd_kaz_warrior_code: "Kazakh Warrior Code"
 nd_kaz_warrior_code_desc: "The codification of nomadic martial traditions — from the training of horse archers to the protocols of steppe warfare — preserves the fighting skills that have sustained the Kazakh nation through centuries of conflict."
 nd_kaz_alash_identity: "Alash Identity"
 nd_kaz_alash_identity_desc: "Alash — the legendary ancestor of the Kazakh people — gives his name to the enduring sense of shared identity that binds the three zhuz together despite political fragmentation. In an age of encroaching empires, this cultural consciousness is the nation's ultimate defense."
 nd_kaz_steppe_resistance: "Steppe Resistance"
 nd_kaz_steppe_resistance_desc: "The boundless steppe cannot be conquered by fortresses or supply lines. Every invading army that marches into the grasslands finds itself stretched thin, harried by mobile cavalry, and slowly consumed by the vastness itself."
 nd_kaz_zhyrau_poets: "Zhyrau Poets"
 nd_kaz_zhyrau_poets_desc: "The zhyrau — wandering poet-sages who compose epic verse on the deeds of batyrs, the wisdom of biys, and the beauty of the steppe — are the keepers of Kazakh memory. Their oral tradition preserves the nation's history more faithfully than any archive."
 nd_kaz_livestock_modernization: "Livestock Modernization"
 nd_kaz_livestock_modernization_desc: "The application of new breeding techniques and veterinary knowledge to the vast Kazakh herds increases both the quality and quantity of livestock output, transforming pastoral nomadism into a more productive economic system."
 nd_kaz_zhuz_unity: "Zhuz Unity"
 nd_kaz_zhuz_unity_desc: "The growing awareness of shared Kazakh identity transcending zhuz boundaries lays the groundwork for a pan-Kazakh national consciousness, strengthening the bonds that hold the nation together against external pressures."
 a_nd_kaz_horse_archers: "Kazakh Horse Archers"
 a_nd_kaz_horse_archers_desc: "The backbone of nomadic warfare: swift cavalry armed with composite recurve bows, masters of the feigned retreat and the devastating rearward volley."
 a_nd_kaz_quriltay_guard: "Quriltay Guard"
 a_nd_kaz_quriltay_guard_desc: "The khan's elite mounted retinue, chosen from the finest horsemen of every clan at the annual quriltay assembly."
 a_nd_kaz_tore_lancers: "Tore Lancers"
 a_nd_kaz_tore_lancers_desc: "Chinggisid noble cavalry wielding long lances, these heavy shock troops deliver the decisive charge that shatters enemy formations."
 a_nd_kaz_zhasaq_militia: "Zhasaq Militia"
 a_nd_kaz_zhasaq_militia_desc: "Tribal infantry mobilized by the khan's decree during times of existential threat, drawn from every able-bodied man across the three zhuz."
 a_nd_kaz_batyr_champions: "Batyr Champions"
 a_nd_kaz_batyr_champions_desc: "Legendary warrior champions who combine mastery of bow, lance, and horsemanship into an unmatched fusion of mobile striking power."
 nd_kaz_horse_stud: "Steppe Horse Stud"
 nd_kaz_horse_stud_desc: "Breeding grounds where the hardiest steppe horses are raised — compact, enduring animals that survive on grass alone and form the foundation of both Kazakh military power and trade wealth."
 nd_kaz_quriltay_ground: "Quriltay Ground"
 nd_kaz_quriltay_ground_desc: "A permanent assembly site where clan elders, sultans, and military leaders gather to elect khans, plan migrations, and settle disputes according to Chinggisid tradition."
 nd_kaz_caravan_waystation: "Caravan Waystation"
 nd_kaz_caravan_waystation_desc: "A Silk Road trading post providing shelter, fresh mounts, and provisions to merchants crossing the steppe, connecting the markets of Transoxiana to China."
 nd_kaz_aul_encampment: "Aul Encampment"
 nd_kaz_aul_encampment_desc: "The organized nomadic camp — the basic unit of Kazakh society — where felt yurts are raised along seasonal migration routes between zhailau and kystau."
 nd_kaz_kumis_brewery: "Kumis Brewery"
 nd_kaz_kumis_brewery_desc: "Facilities for the production of kumis — fermented mare's milk — the sacred drink of the steppe served at feasts, assemblies, and celebrations across the Kazakh nation."
 nd_kaz_batyr_training_ground: "Batyr Training Ground"
 nd_kaz_batyr_training_ground_desc: "A martial academy of the steppe where young warriors train in the arts of mounted archery, lance combat, and the feigned retreat under the guidance of veteran batyrs."
 nd_kaz_biy_court: "Biy Court"
 nd_kaz_biy_court_desc: "A judicial institution where biys — hereditary judges — settle disputes according to the Jeti Zhargy, the codified customary law of the Kazakh nation."
 nd_kaz_frontier_watchtower: "Frontier Watchtower"
 nd_kaz_frontier_watchtower_desc: "Guard posts along the steppe frontier providing early warning of invasion, serving as rally points for the militia, and imposing attrition on any invading force."
 nd_kaz_khans_chancellery: "Khan's Chancellery"
 nd_kaz_khans_chancellery_desc: "The administrative center of the khan's authority, where decrees are drafted, tribute is collected, and the affairs of the three zhuz are coordinated."
 nd_kaz_livestock_market: "Livestock Market"
 nd_kaz_livestock_market_desc: "A central trading hub where the vast herds of the Kazakh steppe are bought and sold, connecting pastoral producers with Silk Road merchants."
 nd_kaz_steppe_arsenal: "Steppe Arsenal"
 nd_kaz_steppe_arsenal_desc: "A weapons depot maintaining stockpiles of bows, lances, sabers, and increasingly firearms for the defense of the Kazakh homeland."
 nd_kaz_shezhire_archive: "Shezhire Archive"
 nd_kaz_shezhire_archive_desc: "An institution dedicated to preserving the shezhire — the genealogical records and oral histories that form the backbone of Kazakh identity — through the work of zhyrau poet-sages."
 nd_kaz_horse_rearing: "Horse Rearing"
 nd_kaz_horse_rearing_desc: "Breeding hardy steppe horses from pastoral herds for military service and trade."
 nd_kaz_council_provisions: "Council Provisions"
 nd_kaz_council_provisions_desc: "Livestock and textiles provided to support the quriltay assemblies."
 nd_kaz_caravan_supply: "Caravan Supply"
 nd_kaz_caravan_supply_desc: "Provisions and replacement mounts supplied to Silk Road caravans."
 nd_kaz_felt_production: "Felt Production"
 nd_kaz_felt_production_desc: "The processing of sheep wool into felt for yurt coverings, clothing, and trade goods."
 nd_kaz_kumis_brewing: "Kumis Brewing"
 nd_kaz_kumis_brewing_desc: "Fermenting mare's milk into kumis, the traditional drink of the steppe nomads."
 nd_kaz_arms_maintenance: "Arms Maintenance"
 nd_kaz_arms_maintenance_desc: "Weapons and horses maintained for the training of batyr champions."
 nd_kaz_court_expenses: "Court Expenses"
 nd_kaz_court_expenses_desc: "Administrative materials for the biy courts and legal proceedings."
 nd_kaz_watch_upkeep: "Watch Upkeep"
 nd_kaz_watch_upkeep_desc: "Weapons and provisions for the frontier watchtower garrison."
 nd_kaz_chancellery_upkeep: "Chancellery Upkeep"
 nd_kaz_chancellery_upkeep_desc: "Administrative materials for the khan's chancellery operations."
 nd_kaz_livestock_trade: "Livestock Trade"
 nd_kaz_livestock_trade_desc: "The organized sale and exchange of livestock at the central market."
 nd_kaz_arms_stockpile: "Arms Stockpile"
 nd_kaz_arms_stockpile_desc: "Weapons and firearms maintained in the steppe arsenal for national defense."
 nd_kaz_oral_tradition: "Oral Tradition"
 nd_kaz_oral_tradition_desc: "The preservation and transmission of Kazakh genealogies and epic poetry by the zhyrau poet-sages."
 nd_kaz_formed_tt: "Kazakh has been formed"
 nd_kaz_path_a_tt: "Chose Legacy of Kasym Khan"
 nd_kaz_path_b_tt: "Chose Confederacy of the Three Zhuz"
 nd_kaz_destiny: "Destiny of the Kazakh Khanate"
 nd_kaz_destiny_desc: "The Kazakh Khanate has risen from the ashes of the Uzbek confederation. Now the nation must choose its path — will it forge an empire of conquest or build enduring wealth across the boundless steppe?"
 nd_kaz_dest_syr_darya: "Cities of the Syr Darya"
 nd_kaz_dest_syr_darya_desc: "Reclaim the ancient Syr Darya cities of Sighnaq and Otrar — the first capitals of the Kazakh Khanate — and prove that the steppe's rightful rulers have returned."
 nd_kaz_dest_transoxiana: "Conquest of Transoxiana"
 nd_kaz_dest_transoxiana_desc: "March south to seize the legendary cities of Samarkand and Bukhara, the jewels of the Timurid legacy. The Kazakh horsemen shall ride where Genghis and Timur once ruled."
 nd_kaz_dest_kipchak_empire: "Empire of the Desht-i Kipchak"
 nd_kaz_dest_kipchak_empire_desc: "Unite the entire Kipchak steppe from the Volga to the Irtysh under Kazakh rule. Seize Astrakhan and the ruins of the Golden Horde capital at Sarai, and restore the empire of Jochi Khan."
 nd_kaz_dest_silk_road: "Silk Road Dominion"
 nd_kaz_dest_silk_road_desc: "Control the city of Turkestan — the spiritual heart of the Kipchak steppe — and ensure that horses flow through Kazakh markets. Build the foundation of a pastoral trading empire."
 nd_kaz_dest_pastoral_mastery: "Pastoral Mastery"
 nd_kaz_dest_pastoral_mastery_desc: "Secure Isfijab and develop the steppe economy through banking institutions and sustained growth. The wealth of millions of livestock shall rival any sedentary kingdom."
 nd_kaz_dest_boundless_steppe: "The Boundless Steppe"
 nd_kaz_dest_boundless_steppe_desc: "Seize Chach, the gateway to Transoxiana's silk markets, and transform the Kazakh economy into a center of continental trade. The steppe shall know no limits."
 nd_kaz.5.t: "Destiny of the Kazakh Khanate"
 nd_kaz.5.d: "The Kazakh Khanate stands at the threshold of greatness. From the rolling grasslands of the Desht-i Kipchak to the snow-capped peaks of the Tian Shan, the descendants of Janibek and Kerei have built a nation. But a nation is not yet an empire, and the choices made now will determine whether the Kazakhs are remembered as conquerors or as the wisest stewards the steppe has ever known.\n\nThe path forward is ours to choose."
 nd_kaz.5.a: "The steppe awaits our destiny"
 nd_kaz.6.t: "Cities of the Syr Darya"
 nd_kaz.6.d: "Sighnaq and Otrar — the ancient cities along the Syr Darya — have fallen under Kazakh dominion once more. These were the first seats of Kazakh power, where Janibek Khan held court and where the caravans of the Silk Road crossed paths with the nomadic hordes. Their reconquest marks the beginning of a greater ambition.\n\nThe walls of sedentary cities now shelter the khan's banners, and the world takes notice."
 nd_kaz.6.a: "The first step on a long road"
 nd_kaz.7.t: "Conquest of Transoxiana"
 nd_kaz.7.d: "The unthinkable has been achieved. Kazakh cavalry rides through the streets of Samarkand, past the Registan and the turquoise domes of Timur's legacy. Bukhara, the Noble City, has opened its gates. The great oasis cities that once looked down upon the nomads of the steppe now pay tribute to a Kazakh khan.\n\nThis conquest demands a decision: shall we rule these cities with an iron fist, or harness their wealth through a more subtle arrangement?"
 nd_kaz.7.a: "The cities kneel before the steppe"
 nd_kaz.7.b: "Let them pay tribute and keep their ways"
 nd_kaz.8.t: "Empire of the Desht-i Kipchak"
 nd_kaz.8.d: "From the banks of the Volga to the shores of Lake Balkhash, from Astrakhan to the ruins of Sarai where the Golden Horde once ruled — the entire Desht-i Kipchak now answers to a single khan. The Kazakh nation has achieved what no successor state of the Jochid Ulus managed since its collapse: the reunification of the western and eastern steppe under one banner.\n\nThis is more than conquest. This is the restoration of an empire that shook the world."
 nd_kaz.8.a: "We are the heirs of Jochi Khan"
 nd_kaz.8.b: "We forge our own legacy upon the steppe"
 nd_kaz.9.t: "Silk Road Dominion"
 nd_kaz.9.d: "The sacred city of Turkestan, home to the shrine of Khoja Ahmed Yasawi, stands firmly within Kazakh hands. More importantly, the trade routes that crisscross the steppe now flow through Kazakh-controlled markets where horses — the true currency of the nomad — are traded in their tens of thousands.\n\nThe foundations of a pastoral commercial empire have been laid."
 nd_kaz.9.a: "The wealth of the steppe flows through our hands"
 nd_kaz.10.t: "Pastoral Mastery"
 nd_kaz.10.d: "The Kazakh steppe economy has matured beyond simple pastoralism. Banking institutions now facilitate the trade in livestock and horses that once relied on barter alone. The city of Isfijab serves as a hub where nomadic wealth meets sedentary commerce, and the development of the vast grasslands proceeds at a pace that would astonish the khans of old.\n\nTwo paths of prosperity present themselves: shall we double down on the pastoral wealth that makes the steppe unique, or leverage our position as the indispensable link in the continental caravan trade?"
 nd_kaz.10.a: "The horse lords shall grow richer still"
 nd_kaz.10.b: "The caravan routes are our true wealth"
 nd_kaz.11.t: "The Boundless Steppe"
 nd_kaz.11.d: "Chach — the gateway between the steppe and the silk-producing heartland of Central Asia — has been secured, and with it a flood of silk, tea, and precious goods pours into Kazakh markets. The nation has achieved what seemed impossible for a pastoral people: an economy that rivals any sedentary empire, built not on mines or plantations but on the boundless grasslands and the animals that sustain them.\n\nThe steppe has no walls, and neither does Kazakh ambition. A final choice remains: shall we concentrate this wealth into great cities, or spread it across the eternal pastures?"
 nd_kaz.11.a: "Build a metropolis worthy of the steppe"
 nd_kaz.11.b: "The eternal pastures sustain all"
 STATIC_MODIFIER_NAME_nd_kaz_dest_timurids_humbled: "Timurids Humbled"
 STATIC_MODIFIER_DESC_nd_kaz_dest_timurids_humbled: "The conquest of Transoxiana demonstrates the supremacy of steppe cavalry over the garrison troops of sedentary cities. Mercenary companies flock to the khan's banner."
 STATIC_MODIFIER_NAME_nd_kaz_dest_oasis_tributaries: "Oasis Tributaries"
 STATIC_MODIFIER_DESC_nd_kaz_dest_oasis_tributaries: "Rather than destroying the wealth of the conquered cities, the khan extracts tribute through vassalage, accelerating the incorporation of new territories."
 STATIC_MODIFIER_NAME_nd_kaz_dest_successor_of_jochi: "Successor of Jochi"
 STATIC_MODIFIER_DESC_nd_kaz_dest_successor_of_jochi: "By claiming the legacy of Jochi Khan and the Golden Horde, the Kazakh Khanate commands the respect of all Turkic peoples and negotiates from a position of unassailable prestige."
 STATIC_MODIFIER_NAME_nd_kaz_dest_steppe_imperium: "Steppe Imperium"
 STATIC_MODIFIER_DESC_nd_kaz_dest_steppe_imperium: "A new empire rises on the steppe — not a restoration but something original. Conquered peoples are absorbed rapidly, and the khan's authority to wage war is recognized across the continent."
 STATIC_MODIFIER_NAME_nd_kaz_dest_horse_lords: "Horse Lords"
 STATIC_MODIFIER_DESC_nd_kaz_dest_horse_lords: "The Kazakh bais control herds numbering in the millions. This pastoral wealth drives institutional development, though the reliance on livestock makes formal banking more costly."
 STATIC_MODIFIER_NAME_nd_kaz_dest_caravan_kings: "Caravan Kings"
 STATIC_MODIFIER_DESC_nd_kaz_dest_caravan_kings: "Kazakh control of the continental caravan routes creates a web of diplomatic connections and rapid recovery from disruption, though the focus on trade comes at the cost of military readiness."
 STATIC_MODIFIER_NAME_nd_kaz_dest_nomad_metropolis: "Nomad Metropolis"
 STATIC_MODIFIER_DESC_nd_kaz_dest_nomad_metropolis: "A great city rises on the steppe — a commercial and diplomatic hub where nomadic wealth is transformed into urban splendor, drawing merchants and envoys from across the continent."
 STATIC_MODIFIER_NAME_nd_kaz_dest_eternal_pastures: "Eternal Pastures"
 STATIC_MODIFIER_DESC_nd_kaz_dest_eternal_pastures: "Rather than concentrating wealth in cities, the Kazakhs spread prosperity across the vast grasslands. Every estate thrives, the levy grows strong, and the steppe itself becomes the monument to Kazakh greatness."
 nd_kaz_khans_war_camp: "Khan's War Camp"
 nd_kaz_khans_war_camp_desc: "The mobile command center of the Kazakh khan during major campaigns — a sprawling complex of yurts, supply wagons, and corrals that serves as the nerve center of steppe warfare."
 nd_kaz_great_bazaar: "Great Bazaar"
 nd_kaz_great_bazaar_desc: "A vast permanent marketplace where the pastoral wealth of the steppe is traded alongside silk, spices, and manufactured goods from the sedentary world — the commercial heart of the Kazakh trading empire."
 nd_kaz_war_camp_upkeep: "War Camp Upkeep"
 nd_kaz_war_camp_upkeep_desc: "Weapons, horses, leather, and provisions for the khan's mobile command center."
 nd_kaz_bazaar_operations: "Bazaar Operations"
 nd_kaz_bazaar_operations_desc: "Cloth, livestock, salt, and tools needed to maintain the great bazaar's trading operations."
