l_english:
 # ===== ADVANCES — Age 1 =====
 nd_bah_sultanate_foundations: "Sultanate Foundations"
 nd_bah_sultanate_foundations_desc: "The Bahmani Sultanate, born from rebellion against Delhi's distant rule, established the first independent Muslim state on the Deccan Plateau. Under Ala-ud-Din Hasan Bahman Shah, the new dynasty claimed legitimacy and centralized authority across its vast domains."
 nd_bah_gulbarga_fortress: "Gulbarga Fortifications"
 nd_bah_gulbarga_fortress_desc: "The great fortress at Gulbarga, ringed by a double moat and fifteen towers, served as the impregnable heart of the early Bahmani state. Its walls sheltered the first capital and projected Sultanate power across the western Deccan."
 nd_bah_persianate_darbar: "Persianate Court"
 nd_bah_persianate_darbar_desc: "The Bahmani court consciously modeled itself on Persian traditions, importing scholars, poets, and administrators from Iran and Central Asia. The darbar hall became a center of refined culture where Persian etiquette governed affairs of state."
 nd_bah_deccani_horsemen: "Deccani Horsemen"
 nd_bah_deccani_horsemen_desc: "The Bahmani sultans invested heavily in cavalry, importing Arabian and Persian horses through the western ports. Mounted sowars formed the striking arm of the Sultanate's armies across the Deccan plateau."
 nd_bah_arabian_horse_trade: "Arabian Horse Trade"
 nd_bah_arabian_horse_trade_desc: "Control of the western coast ports like Chaul and later Goa gave the Bahmanis direct access to the Arabian horse trade. These imports sustained the Sultanate's cavalry superiority over their Vijayanagara rivals."
 nd_bah_bahmani_legal_code: "Bahmani Legal Code"
 nd_bah_bahmani_legal_code_desc: "The early Bahmani sultans established a systematic legal framework drawing on Islamic jurisprudence and Persian administrative tradition, bringing order to the governance of their diverse domains."
 nd_bah_deccan_plateau_farming: "Deccan Plateau Agriculture"
 nd_bah_deccan_plateau_farming_desc: "The black soil of the Deccan Plateau, enriched by seasonal monsoons, supported extensive agriculture. Cotton, millet, and pulses fed the Sultanate's growing population and fueled its economy."
 # ===== ADVANCES — Age 2 =====
 nd_bah_gawan_reforms: "Gawan's Administrative Reforms"
 nd_bah_gawan_reforms_desc: "The great vizier Mahmud Gawan reorganized the Bahmani state into eight provinces, each under a tarafdar with fixed responsibilities. His reforms curtailed noble power and strengthened central authority over tax collection and military affairs."
 nd_bah_gawan_madrasa: "Mahmud Gawan Madrasa"
 nd_bah_gawan_madrasa_desc: "The magnificent madrasa at Bidar, built by Mahmud Gawan in 1472, stood three stories tall with a library of three thousand manuscripts. It became a beacon of Islamic scholarship, drawing students and scholars from across the Muslim world."
 nd_bah_bidriware_craft: "Bidriware Metalwork"
 nd_bah_bidriware_craft_desc: "Under Bahmani patronage, artisans in Bidar perfected a unique metalworking technique — casting zinc-copper alloy vessels, then inlaying them with silver in intricate arabesque patterns. Blackened with a soil paste mixed with ammonium chloride, the finished pieces became prized across the Indian Ocean world."
 nd_bah_early_gunpowder: "Deccan Gunpowder"
 nd_bah_early_gunpowder_desc: "The Bahmani Sultanate was likely the first Indian state to employ gunpowder artillery. By the 1460s, the fortress of Kalyana had gun ports built into its walls, and topchi gunners served in every major campaign."
 nd_bah_dabhol_trade: "Port of Dabhol"
 nd_bah_dabhol_trade_desc: "The capture of Dabhol and later Goa gave the Bahmanis direct access to maritime trade with Persia, Arabia, and East Africa. These ports became conduits for horse imports, luxury goods, and Persian cultural influence."
 nd_bah_persian_literary_tradition: "Persian Literary Court"
 nd_bah_persian_literary_tradition_desc: "The Bahmani court cultivated Persian as the language of administration and high culture. Poets, historians, and scholars from Iran found patronage at Gulbarga and Bidar, creating a vibrant Persianate literary tradition on Indian soil."
 nd_bah_caravanserai_network: "Caravanserai Network"
 nd_bah_caravanserai_network_desc: "A network of caravanserais along major trade routes provided secure lodging, water, and protection for merchants crossing the Deccan. These rest houses facilitated overland commerce and helped bind the Sultanate's far-flung provinces."
 # ===== ADVANCES — Age 3 =====
 nd_bah_vijayanagara_wars: "Wars Against Vijayanagara"
 nd_bah_vijayanagara_wars_desc: "The struggle between the Bahmani Sultanate and the Vijayanagara Empire defined a century of Deccani history. Control of the Raichur Doab, the fertile land between the Krishna and Tungabhadra rivers, was the perpetual prize worth fighting for."
 nd_bah_siege_artillery: "Siege Artillery Corps"
 nd_bah_siege_artillery_desc: "Under Mahmud Gawan's command, the Bahmanis developed specialized siege techniques including mining and directed cannon fire. During the siege of Belgaum in 1472, dedicated fire-workers breached fortifications using methods never before seen on the Deccan."
 nd_bah_afaqi_deccani_balance: "Afaqi-Deccani Balance"
 nd_bah_afaqi_deccani_balance_desc: "The Sultanate was perpetually divided between Afaqi nobles — foreign-born Persians, Turks, and Arabs who held court influence — and Deccanis, locally born Muslims and Habshi freedmen who controlled the provinces. Managing this balance was the central challenge of Bahmani statecraft."
 nd_bah_deccan_textiles: "Deccan Textile Trade"
 nd_bah_deccan_textiles_desc: "The Deccan's cotton weaving traditions produced fine textiles sought after across the Indian Ocean world. The Sultanate's control of both the production centers and the western coastal ports made textiles a cornerstone of Bahmani prosperity."
 nd_bah_polygon_bastions: "Polygon Bastions"
 nd_bah_polygon_bastions_desc: "Adapting to the gunpowder age, Bahmani military engineers designed fortifications with angular bastions capable of mounting cannons in overlapping fields of fire. By the 1460s, these innovations had transformed the Deccan's defensive landscape."
 nd_bah_sultanate_diplomacy: "Sultanate Diplomacy"
 nd_bah_sultanate_diplomacy_desc: "The Bahmani sultans maintained diplomatic connections across the Islamic world, exchanging ambassadors with the Mamluks, Timurids, and Ottoman Empire. These relationships provided military recruits, cultural exchange, and political legitimacy."
 # ===== ADVANCES — Age 4 =====
 nd_bah_successor_state_legacy: "Successor State Legacy"
 nd_bah_successor_state_legacy_desc: "Though the Bahmani state fragmented after 1518, its administrative traditions, military innovations, and cultural achievements lived on in the successor sultanates. The institutions Mahmud Gawan built proved more durable than the dynasty itself."
 nd_bah_tofangchi_musketeers: "Tofangchi Musketeers"
 nd_bah_tofangchi_musketeers_desc: "Trained matchlock infantry became a staple of Deccani armies. These tofangchi, many recruited from Persian and Central Asian immigrants, brought disciplined firearm tactics to the battlefield."
 nd_bah_diamond_mines: "Diamond Mining"
 nd_bah_diamond_mines_desc: "The Deccan Plateau held some of the world's most productive diamond deposits. The Golconda mines yielded stones of legendary quality, including what would later become known as the Hope Diamond and the Koh-i-Noor."
 nd_bah_deccani_miniatures: "Deccani Miniature Painting"
 nd_bah_deccani_miniatures_desc: "A distinctive school of miniature painting flourished in the Deccan sultanates, blending Persian, Indian, and even European influences into a uniquely Deccani aesthetic marked by bold colors and fantastical imagery."
 nd_bah_revenue_taraf_system: "Revenue Taraf System"
 nd_bah_revenue_taraf_system_desc: "The Bahmani provincial revenue system divided the realm into tarafs, each with systematized tax collection overseen by centrally appointed officials. This framework, refined across generations, ensured a steady flow of revenue to the Sultanate treasury."
 nd_bah_deccani_syncretism: "Deccani Syncretism"
 nd_bah_deccani_syncretism_desc: "Centuries of Muslim and Hindu coexistence on the Deccan produced a distinctive syncretic culture. Sufi saints attracted Hindu devotees, temple dancers performed in Muslim courts, and shared festivals blurred the boundaries between communities."
 # ===== ADVANCES — Age 5 =====
 nd_bah_nizam_administration: "Nizam Administration"
 nd_bah_nizam_administration_desc: "The administrative traditions of the Bahmani state found their fullest expression in the Nizam-ul-Mulk's governance. Systematic bureaucracy, regular revenue assessment, and provincial organization maintained order across the Deccan."
 nd_bah_european_military_contact: "European Military Contact"
 nd_bah_european_military_contact_desc: "Contact with European military advisors and merchants introduced new techniques in drill, fortification design, and artillery deployment. Deccani rulers selectively adopted these innovations to modernize their armed forces."
 nd_bah_deccani_water_works: "Deccani Water Works"
 nd_bah_deccani_water_works_desc: "Elaborate stepped wells, aqueducts, and irrigation channels engineered across the Deccan brought water to arid regions and sustained agricultural expansion. These public works represented significant state investment in infrastructure."
 nd_bah_reformed_sipahi: "Reformed Sipahi"
 nd_bah_reformed_sipahi_desc: "Adapting to the changing nature of warfare, Deccani heavy cavalry underwent reform. The reformed sipahi combined traditional shock tactics with pistol-armed tactics suited to the gunpowder battlefield."
 nd_bah_deccani_trade_maturity: "Deccani Trade Maturity"
 nd_bah_deccani_trade_maturity_desc: "By the age of absolutism, the Deccan's commercial networks had matured into a sophisticated system of overland and maritime trade routes connecting the interior plateau to the coasts and beyond."
 # ===== ADVANCES — Age 6 =====
 nd_bah_modern_administration: "Modern Administration"
 nd_bah_modern_administration_desc: "Enlightenment-era administrative reforms brought systematized record-keeping, regularized taxation, and rationalized provincial governance to the successor states of the Bahmani tradition."
 nd_bah_deccani_cultural_legacy: "Deccani Cultural Legacy"
 nd_bah_deccani_cultural_legacy_desc: "The cultural achievements of the Bahmani era — Bidri ware, Deccani miniature painting, Persian-influenced architecture, and the Dakhani literary tradition — endured as a lasting legacy of Deccani civilization."
 nd_bah_cultural_synthesis: "Cultural Synthesis"
 nd_bah_cultural_synthesis_desc: "The long coexistence of Muslim, Hindu, and other traditions on the Deccan produced a cultural synthesis unique in the subcontinent, enriching music, cuisine, language, and the arts with hybrid forms."
 nd_bah_industrial_workshops: "Industrial Workshops"
 nd_bah_industrial_workshops_desc: "The Deccan's traditional textile crafts and metalworking traditions provided a foundation for early industrial workshops, as mechanized cotton processing and metal fabrication emerged."
 nd_bah_modern_field_guns: "Modern Field Guns"
 nd_bah_modern_field_guns_desc: "Building on centuries of gunpowder expertise, Deccani arsenals produced modern field artillery incorporating European design principles with local manufacturing capability."
 # ===== UNITS =====
 a_nd_bah_deccani_sowar: "Deccani Sowar"
 a_nd_bah_deccani_sowar_desc: "Mounted cavalry on imported Arabian horses, the Deccani sowars were the striking arm of the Bahmani armies. Fast, disciplined, and bred for the open plateau, they dominated the battlefield."
 a_nd_bah_topchi: "Topchi"
 a_nd_bah_topchi_desc: "The earliest gunpowder artillery corps in the Indian subcontinent. Bahmani topchi gunners manned cannons imported from or inspired by Ottoman and Persian designs, bringing devastating firepower to siege and field."
 a_nd_bah_siege_topchi: "Siege Topchi"
 a_nd_bah_siege_topchi_desc: "Specialized siege artillery teams who combined cannon fire with mining operations. Under Mahmud Gawan's command, these engineers breached fortifications using techniques never before employed on the Deccan."
 a_nd_bah_tofangchi: "Tofangchi"
 a_nd_bah_tofangchi_desc: "Trained matchlock infantry, many recruited from Persian and Central Asian immigrants. The tofangchi brought disciplined volley fire to the Deccani battlefield, supplementing the Sultanate's traditional cavalry arm."
 a_nd_bah_reformed_sipahi: "Reformed Sipahi"
 a_nd_bah_reformed_sipahi_desc: "Heavy cavalry reformed for the gunpowder era, combining the shock charge tradition with pistol-armed tactics. These elite horsemen served as the decisive arm in the later Deccani wars."
 a_nd_bah_field_gun: "Deccani Field Gun"
 a_nd_bah_field_gun_desc: "Modern field artillery drawing on centuries of Deccani gunpowder expertise. Lighter and more mobile than siege pieces, these guns provided devastating battlefield firepower."
 # ===== BUILDINGS =====
 nd_bah_qila: "Qila"
 nd_bah_qila_desc: "A Deccan hilltop fortress in the Bahmani tradition, built from local basalt and designed to withstand prolonged siege. Its towers and walls command the surrounding plateau."
 nd_bah_darbar_hall: "Darbar Hall"
 nd_bah_darbar_hall_desc: "A court hall built in the Persian tradition, where the Sultan holds audience and affairs of state are conducted according to the refined etiquette of the Persianate court."
 nd_bah_taraf_office: "Taraf Office"
 nd_bah_taraf_office_desc: "A provincial administrative center implementing Mahmud Gawan's reforms, where appointed officials manage tax collection, military levies, and correspondence with the central court."
 nd_bah_madrasa: "Madrasa"
 nd_bah_madrasa_desc: "An Islamic center of learning modeled on Mahmud Gawan's magnificent madrasa at Bidar. Students study theology, law, mathematics, and astronomy under scholars drawn from across the Islamic world."
 nd_bah_bidri_workshop: "Bidri Workshop"
 nd_bah_bidri_workshop_desc: "A specialized metalworking atelier where artisans practice the Bidriware technique — casting zinc-copper alloy vessels, engraving intricate designs, and inlaying them with pure silver before blackening the surface."
 nd_bah_bandargah: "Bandargah"
 nd_bah_bandargah_desc: "A coastal trading port in the Bahmani tradition, facilitating maritime commerce with Persia, Arabia, and East Africa. Warehouses, customs offices, and merchant quarters line the waterfront."
 nd_bah_bastion: "Polygon Bastion"
 nd_bah_bastion_desc: "An angular fortification designed for the gunpowder age, with bastions that provide overlapping fields of cannon fire. These Deccani innovations preceded similar European developments."
 nd_bah_revenue_office: "Revenue Office"
 nd_bah_revenue_office_desc: "A provincial revenue collection center where officials assess taxes, maintain land records, and remit revenue to the central treasury according to the taraf system."
 nd_bah_baoli: "Baoli"
 nd_bah_baoli_desc: "A stepped well engineered to access the Deccan's deep water table. These monumental structures serve as public water sources, cool retreats, and gathering places."
 # ===== PRODUCTION METHODS =====
 nd_bah_horse_import_pm: "Arabian Horse Import"
 nd_bah_horse_import_pm_desc: "The systematic import of Arabian and Persian horses through western coastal ports, sustaining the Sultanate's cavalry arm."
 nd_bah_bidriware_pm: "Bidriware Production"
 nd_bah_bidriware_pm_desc: "The casting, engraving, and silver inlay of zinc-copper alloy vessels in the distinctive Bidriware technique."
 nd_bah_caravan_pm: "Caravan Trade"
 nd_bah_caravan_pm_desc: "Overland trade through the Sultanate's caravanserai network, moving goods across the Deccan Plateau."
 nd_bah_textile_pm: "Deccan Textile Weaving"
 nd_bah_textile_pm_desc: "The weaving of fine cotton textiles prized across the Indian Ocean trade network."
 nd_bah_diamond_pm: "Diamond Mining"
 nd_bah_diamond_pm_desc: "Extraction and cutting of diamonds from the legendary Deccan deposits, using iron and tools to work the mines."
 nd_bah_cotton_mill_pm: "Cotton Milling"
 nd_bah_cotton_mill_pm_desc: "Mechanized processing of raw cotton into finished cloth using industrial techniques."
 # ===== BUILDING PMs (inline) =====
 nd_bah_qila_maintenance: "Fortress Garrison"
 nd_bah_qila_maintenance_desc: "Stone and weapons for the fortress garrison."
 nd_bah_darbar_upkeep: "Court Upkeep"
 nd_bah_darbar_upkeep_desc: "Silk and dyes for the Persianate court."
 nd_bah_taraf_upkeep: "Administrative Costs"
 nd_bah_taraf_upkeep_desc: "Paper and cloth for the taraf officials managing provincial administration."
 nd_bah_madrasa_upkeep: "Scholarly Materials"
 nd_bah_madrasa_upkeep_desc: "Paper and books for the madrasa's scholars and its growing library of manuscripts."
 nd_bah_bidri_inputs: "Bidriware Crafting"
 nd_bah_bidri_inputs_desc: "Artisans cast copper-zinc alloy vessels and inlay them with silver in intricate arabesque patterns, producing prized decorative pieces."
 nd_bah_port_upkeep: "Port Maintenance"
 nd_bah_port_upkeep_desc: "Lumber and naval supplies for the coastal port."
 nd_bah_bastion_upkeep: "Bastion Garrison"
 nd_bah_bastion_upkeep_desc: "Stone and weaponry for the bastion fortress."
 nd_bah_revenue_upkeep: "Revenue Administration"
 nd_bah_revenue_upkeep_desc: "Paper for records and cloth for the officials of the provincial revenue office."
 nd_bah_baoli_upkeep: "Well Maintenance"
 nd_bah_baoli_upkeep_desc: "Stone and tools for maintaining the stepped well and its water channels."
 # ===== LEVIES =====
 levy_nd_bah_deccani_sowar: "Deccani Sowar Levy"
 levy_nd_bah_deccani_sowar_desc: "Mounted cavalry levied from the noble and soldier estates, riding imported Arabian horses."
 # ===== STATIC MODIFIERS (timed, from advance events) =====
 STATIC_MODIFIER_NAME_nd_bah_gawan_centralization: "Gawan's Centralization"
 STATIC_MODIFIER_DESC_nd_bah_gawan_centralization: "The great vizier's reforms have strengthened central authority, curtailing provincial autonomy and systematizing revenue collection across the tarafs."
 STATIC_MODIFIER_NAME_nd_bah_gawan_tolerance: "Gawan's Cosmopolitan Vision"
 STATIC_MODIFIER_DESC_nd_bah_gawan_tolerance: "Mahmud Gawan's policy of tolerance and his patronage of scholars from diverse backgrounds has enriched the court and broadened the Sultanate's diplomatic horizons."
 STATIC_MODIFIER_NAME_nd_bah_deccan_sword: "Sword of the Deccan"
 STATIC_MODIFIER_DESC_nd_bah_deccan_sword: "Victory on the battlefield has steeled the Sultanate's resolve. Our armies are battle-hardened, our artillery feared, and our siege craft proven against the mightiest fortresses."
 STATIC_MODIFIER_NAME_nd_bah_deccan_fortifier: "Shield of the Plateau"
 STATIC_MODIFIER_DESC_nd_bah_deccan_fortifier: "The lessons of perpetual warfare have been turned to defense. Our fortresses bristle with cannon, our garrisons are disciplined, and our frontier positions are impregnable."
 STATIC_MODIFIER_NAME_nd_bah_afaqi_ascendancy: "Afaqi Ascendancy"
 STATIC_MODIFIER_DESC_nd_bah_afaqi_ascendancy: "The foreign-born nobles have prevailed, bringing their Persian connections, commercial networks, and cosmopolitan worldview to the forefront of Sultanate affairs."
 STATIC_MODIFIER_NAME_nd_bah_deccani_roots: "Deccani Roots"
 STATIC_MODIFIER_DESC_nd_bah_deccani_roots: "The locally-born nobility has secured its position, rooting the Sultanate firmly in the soil of the Deccan. Their deep ties to the land ensure stability and plentiful levies."
 # ===== EVENTS =====
 nd_bah.1.t: "The Reforms of Mahmud Gawan"
 nd_bah.1.d: "Mahmud Gawan, the brilliant Persian-born vizier who has served the Sultanate for decades, has implemented sweeping administrative reforms. The kingdom's four provinces have been reorganized into eight tarafs, each under a centrally appointed tarafdar. Noble estates have been curtailed, revenues systematized, and the Sultanate's magnificent madrasa at Bidar stands as a monument to his vision.\n\nYet these reforms have deepened the fault line at the heart of the Bahmani state. The Afaqi nobles — Persians, Turks, and Arabs who followed Gawan to power — now hold sway at court. The Deccani nobles, born of this soil, seethe at their displacement. The Sultan must choose which faction's path to follow.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_bah.1.a: "Strengthen central authority — the tarafs shall answer to the throne."
 nd_bah.1.b: "Embrace Gawan's cosmopolitan vision — let the world come to our court."
 nd_bah.2.t: "The Wars Against Vijayanagara"
 nd_bah.2.d: "The struggle between the Sultanate and the great Hindu empire of Vijayanagara has defined a generation. The fertile Raichur Doab — the land between the Krishna and Tungabhadra rivers — is the perpetual prize, changing hands with the fortunes of war. Our topchi gunners have proven their worth against Vijayanagara's mighty cavalry, and the siege of Belgaum demonstrated that no fortress can long withstand the Bahmani's fire-workers.\n\nThe question now is how to consolidate our gains. Do we press the advantage with offensive power, or fortify the frontier against inevitable counterattack?"
 nd_bah.2.a: "Press the attack — the sword of the Deccan shall not rest."
 nd_bah.2.b: "Fortify the frontier — no enemy shall breach our bastions."
 nd_bah.3.t: "The Afaqi-Deccani Crisis"
 nd_bah.3.d: "The tension that has simmered at the heart of the Sultanate for generations has reached a critical juncture. The Afaqis — foreign-born nobles from Persia, Turkey, and Arabia — control the court, the treasury, and the diplomatic service. They speak Persian, correspond with the courts of Isfahan and Constantinople, and maintain the commercial networks that bring horses, luxury goods, and recruits to the Sultanate.\n\nThe Deccanis — locally born Muslims, converts, and Habshi freedmen from Abyssinia — control the provinces, command the garrisons, and draw their strength from the land itself. They speak Dakhani, know the terrain, and command the loyalty of the common soldier.\n\nBoth factions have served the Sultanate, but both cannot rule it. The Sultan must decide which faction's vision will shape the Bahmani future."
 nd_bah.3.a: "The Afaqis — their Persian connections enrich us all."
 nd_bah.3.b: "The Deccanis — our strength lies in the soil we stand on."
 nd_bah.4.t: "The Art of Bidri"
 nd_bah.4.d: "Under the patronage of the Sultanate, artisans in Bidar have perfected a metalworking technique of extraordinary beauty and skill. Vessels are cast from an alloy of zinc and copper, then engraved with intricate designs — arabesques, calligraphy, flowers, and geometric patterns. Pure silver wire is hammered into the grooves, and the surface is treated with a paste of soil and ammonium chloride unique to the soil of Bidar itself.\n\nThe result is striking: blackened metal adorned with gleaming silver, pieces that are both functional vessels and works of art. Already, Bidriware is prized by collectors and merchants from Persia to Southeast Asia. It is a craft that could only have been born here, on the Deccan, where Persian metalworking traditions met Indian artistry and Bidar's unique soil."
 nd_bah.4.a: "A treasure of the Deccan that shall endure for centuries."
 nd_bah.5.t: "Thunder on the Deccan"
 nd_bah.5.d: "The fortress of Kalyana stands as proof of the Sultanate's military revolution. Gun ports have been built directly into its walls — the first such design anywhere on the Deccan Plateau. The sound of cannon fire, once alien to this land, now echoes across the plateau as our topchi gunners drill with their fearsome weapons.\n\nThe Bahmani Sultanate has become the first Indian state to systematically employ gunpowder artillery. Our fire-workers can breach any wall, our cannons can break any charge. The military balance of the Deccan has shifted forever. Where once the outcome of battle depended on the weight of cavalry, now it depends on the thunder of guns — and our guns speak loudest of all."
 nd_bah.5.a: "Let the thunder of our guns proclaim Bahmani supremacy."
 nd_bah_formed_tt: "Bahmani Sultanate has been formed"
 nd_bah_path_a_tt: "Chose Gawan's Centralization"
 nd_bah_path_b_tt: "Chose Gawan's Cosmopolitan Vision"
