l_english:
 STATIC_MODIFIER_NAME_nd_padshah_e_hind: "Padshah-e-Hind"
 STATIC_MODIFIER_DESC_nd_padshah_e_hind: "The Emperor of India commands the mightiest armies of the East. From war elephants to massed cavalry to disciplined musketeers, the martial traditions of a continent answer to a single throne."
 STATIC_MODIFIER_NAME_nd_daulat_e_hindustan: "Daulat-e-Hindustan"
 STATIC_MODIFIER_DESC_nd_daulat_e_hindustan: "The Wealth of India flows from its looms and fields. Bengali muslin, Gujarati calico, and the spices of Malabar pour into the treasuries of a unified subcontinent, drawing merchants from every corner of the world."
 STATIC_MODIFIER_NAME_nd_chakravarti_samrat: "Chakravarti Samrat"
 STATIC_MODIFIER_DESC_nd_chakravarti_samrat: "The Universal Emperor rules through divine mandate and the consent of a hundred vassal courts. Like Ashoka before him, the Chakravarti binds the subcontinent not through force alone, but through the legitimacy of righteous governance."
 nd_hin.1.t: "The Unification of Hindustan"
 nd_hin.1.d: "The dream of centuries is realized. From the snowy passes of the Hindu Kush to the tropical shores of Cape Comorin, from the salt marshes of Kutch to the river deltas of Bengal — the subcontinent answers to one sovereign. This is not merely the conquest of territory, but the forging of a civilization-state. The legacy of Ashoka, the ambition of Alauddin Khalji, the vision of Akbar — all converge in this moment. But what shape will this new Hindustan take? Will it be an empire of the sword, imposing order through military supremacy? A land of merchants and artisans, whose wealth draws the envy of the world? Or a sovereign guided by the ancient ideal of the Chakravarti, the wheel-turning monarch who rules through righteousness?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_hin.1.a: "We are the Padshah-e-Hind — the Emperor of all India"
 nd_hin.1.b: "We are the Daulat-e-Hindustan — the Wealth of India"
 nd_hin.1.c: "We are the Chakravarti Samrat — the Universal Emperor"
 nd_hin.2.t: "The Mansabdari System"
 nd_hin.2.d: "The administration of a subcontinent demands more than raw power — it requires system. The mansabdari ranks, first codified by Akbar in 1571, assign every noble a numerical grade that determines both their personal allowance and their obligation to maintain cavalry. A mansabdar of 5,000 zat and 5,000 sawar must maintain five thousand horsemen at his own expense, funded through temporary revenue assignments called jagirs. The system is brilliantly flexible: a mansabdar can be promoted, demoted, or transferred at the emperor's will. No hereditary fiefdom takes root. No regional warlord becomes entrenched. The entire imperial apparatus — military, fiscal, administrative — operates as an extension of the sovereign's person. But which aspect of this system shall we emphasize? The bureaucratic merit that makes the mansabdari a machine of governance, or the military obligation that makes it an instrument of war?"
 nd_hin.2.a: "Promote by merit — reward competence, not birth"
 nd_hin.2.b: "Strengthen the cavalry obligation — our horsemen are our strength"
 nd_hin.3.t: "The Imperial Karkhanas"
 nd_hin.3.d: "The karkhanas are the pride of the imperial household — vast workshops where hundreds of artisans labor under imperial patronage to produce goods of unrivaled quality. In the karkhana-yi-shahi at Agra and Fatehpur Sikri, weavers create cloth-of-gold and fine muslin so sheer that a bolt of twenty yards can pass through a finger ring. Painters illuminate manuscripts in the Persian miniature style, while armorers forge Damascus steel into weapons of exquisite craftsmanship. The karkhanas serve dual purposes: they supply the court with the finest luxuries, demonstrating imperial magnificence to visiting embassies and merchants, while also providing the army with standardized weapons, armor, and equipment. Shall we direct the karkhanas toward enriching the treasury through textile exports, or toward equipping the most formidable army in Asia?"
 nd_hin.3.a: "The looms shall clothe the world — Hindustan's fabrics are our gold"
 nd_hin.3.b: "The forges shall arm the empire — our weapons must be peerless"
 nd_hin.4.t: "Sulh-i-Kul: Universal Peace"
 nd_hin.4.d: "In a subcontinent of Hindus and Muslims, Jains and Buddhists, Sikhs and Christians, Zoroastrians and Jews, the question of religious coexistence is not academic — it is existential. The doctrine of Sulh-i-Kul, universal peace among all religions, represents the boldest answer. First articulated in the Ibadat Khana, the House of Worship at Fatehpur Sikri where Akbar invited scholars of every faith to debate, Sulh-i-Kul holds that no single faith possesses the complete truth. The jizya tax on non-Muslims is abolished. Hindu festivals are celebrated at court. Sufi mystics and Brahmin scholars advise the emperor in equal measure. The Ibadat Khana becomes a living symbol of a civilization confident enough to contain multitudes."
 nd_hin.4.a: "Let all faiths flourish under our protection"
 nd_hin.5.t: "The Grand Trunk Road"
 nd_hin.5.d: "The Sadak-e-Azam, the Great Road, is the arterial highway of the subcontinent. Originally laid out in the Mauryan era, it was transformed by Sher Shah Suri into a marvel of imperial infrastructure. Over two thousand miles of paved road stretch from Bengal to the northwest frontier, lined every two kos with sarais where travelers find rest, fodder, and protection. Shade trees are planted along its length; wells are dug at regular intervals; soldiers patrol against bandits. The road carries not merely goods but governance itself — imperial dispatches travel its length in days, connecting the Mughal court to its most distant provinces. What once took months now takes weeks."
 nd_hin.5.a: "The road binds the empire as surely as any army"
 STATIC_MODIFIER_NAME_nd_hin_mansabdar_merit: "Mansabdari Meritocracy"
 STATIC_MODIFIER_DESC_nd_hin_mansabdar_merit: "The mansabdari system rewards talent above birth, drawing the ablest administrators from across the subcontinent into imperial service."
 STATIC_MODIFIER_NAME_nd_hin_mansabdar_military: "Mansabdari Horsemen"
 STATIC_MODIFIER_DESC_nd_hin_mansabdar_military: "The mansabdari obligation ensures that every noble maintains cavalry proportional to his rank, creating a vast reserve of trained horsemen."
 STATIC_MODIFIER_NAME_nd_hin_karkhana_textiles: "Karkhana Textile Exports"
 STATIC_MODIFIER_DESC_nd_hin_karkhana_textiles: "The imperial workshops produce muslin, calico, and cloth-of-gold for export to markets across the known world."
 STATIC_MODIFIER_NAME_nd_hin_karkhana_weapons: "Karkhana Arms Production"
 STATIC_MODIFIER_DESC_nd_hin_karkhana_weapons: "The imperial forges standardize weapons production, equipping Hindustan's armies with matchlocks, cannon, and Damascus steel blades."
 nd_hin_elephant_warfare: "Elephant Warfare"
 nd_hin_elephant_warfare_desc: "The war elephant has dominated Indian battlefields since antiquity. Armored and crewed with archers, these living fortresses can break any formation."
 nd_hin_temple_architecture: "Temple Architecture"
 nd_hin_temple_architecture_desc: "The towering shikhara temples of India, with their intricate stone carvings and soaring spires, stand as monuments to devotion and artistic mastery."
 nd_hin_varna_governance: "Varna Governance"
 nd_hin_varna_governance_desc: "The complex social hierarchy of the jati system provides a framework for governance, with each community fulfilling specialized roles within the imperial order."
 nd_hin_spice_trade: "Spice Trade"
 nd_hin_spice_trade_desc: "India's monopoly on pepper, cardamom, cinnamon, and cloves has drawn traders from Rome to China for millennia."
 nd_hin_sarai_networks: "Sarai Networks"
 nd_hin_sarai_networks_desc: "The system of imperial sarais provides lodging, stabling, and security for merchants and travelers along the great trade routes of India."
 nd_hin_jagirdari_system: "Jagirdari System"
 nd_hin_jagirdari_system_desc: "Jagir land grants support a military aristocracy obligated to maintain cavalry and infantry in the emperor's service."
 nd_hin_sultanate_court: "Sultanate Court"
 nd_hin_sultanate_court_desc: "The courts of the Delhi Sultanate fused Persian literary culture with Indian artistic traditions, producing a cosmopolitan courtly civilization."
 nd_hin_sowar_tradition: "Sowar Tradition"
 nd_hin_sowar_tradition_desc: "The sowar, heavily armored horsemen equipped with lance, sword, and composite bow, form the elite cavalry of the sultanate military tradition."
 nd_hin_grand_trunk_road: "Grand Trunk Road"
 nd_hin_grand_trunk_road_desc: "The Sadak-e-Azam stretches over two thousand miles from Bengal to the northwest frontier, the greatest highway in Asia."
 nd_hin_textile_mastery: "Textile Mastery"
 nd_hin_textile_mastery_desc: "Indian textiles — Bengali muslin, Gujarati calico, Kashmiri shawls — are prized across the world for their fineness and artistry."
 nd_hin_mansabdari_system: "Mansabdari System"
 nd_hin_mansabdari_system_desc: "The mansabdari system assigns every noble a numerical rank determining their salary, cavalry obligations, and administrative responsibilities."
 nd_hin_barqandaz_tradition: "Barqandaz Tradition"
 nd_hin_barqandaz_tradition_desc: "The barqandaz, matchlock-armed infantry, bring gunpowder warfare to the Indian battlefield with disciplined volley fire."
 nd_hin_sulh_i_kul: "Sulh-i-Kul"
 nd_hin_sulh_i_kul_desc: "The doctrine of universal peace among religions holds that no single faith possesses the complete truth, and all may flourish under the emperor's protection."
 nd_hin_imperial_karkhanas: "Imperial Karkhanas"
 nd_hin_imperial_karkhanas_desc: "The royal karkhanas are vast imperial workshops where artisans produce textiles, weapons, jewelry, and manuscripts under direct state patronage."
 nd_hin_silahdar_guards: "Silahdar Guards"
 nd_hin_silahdar_guards_desc: "The Silahdar are the emperor's personal cavalry bodyguard, equipped with the finest armor and weapons from the imperial karkhanas."
 nd_hin_maktab_system: "Maktab System"
 nd_hin_maktab_system_desc: "The network of maktab primary schools provides basic literacy and Quranic education, extending learning beyond the court and madrasas."
 nd_hin_zabt_revenue: "Zabt Revenue System"
 nd_hin_zabt_revenue_desc: "Akbar's zabt system standardizes land measurement and tax assessment, replacing arbitrary exactions with measured, predictable revenue collection."
 nd_hin_rocket_corps: "Rocket Corps"
 nd_hin_rocket_corps_desc: "Iron-cased rockets, pioneered in Mysore by Hyder Ali and refined by Tipu Sultan, represent a revolutionary advance in artillery technology."
 nd_hin_princely_diplomacy: "Princely Diplomacy"
 nd_hin_princely_diplomacy_desc: "The intricate network of treaties, tributes, and marriage alliances binding hundreds of princely states to the imperial center."
 nd_hin_bengal_textiles: "Bengal Textiles"
 nd_hin_bengal_textiles_desc: "Bengal produces the finest muslin in the world — cloth so sheer it was called 'woven air.' These fabrics command extraordinary prices in European and Asian markets."
 a_nd_hin_war_elephant: "War Elephant"
 a_nd_hin_war_elephant_desc: "Armored elephants carrying howdahs filled with archers and javelin throwers. Their charge can shatter enemy formations and induce panic in horses."
 a_nd_hin_sowar: "Sowar"
 a_nd_hin_sowar_desc: "Heavily armored cavalrymen of the sultanate tradition, equipped with lance, tulwar sword, and composite bow."
 a_nd_hin_barqandaz: "Barqandaz"
 a_nd_hin_barqandaz_desc: "Disciplined matchlock musketeers who deliver devastating volley fire from prepared positions."
 a_nd_hin_barqandaz_levy: "Barqandaz Levies"
 a_nd_hin_barqandaz_levy_desc: "Provincial matchlock infantry raised through the levy system, providing the gunpowder backbone of Indian field armies."
 a_nd_hin_silahdar: "Silahdar"
 a_nd_hin_silahdar_desc: "The emperor's elite household cavalry, clad in the finest armor and wielding weapons forged in the imperial karkhanas."
 a_nd_hin_rocket_corps: "Rocket Corps"
 a_nd_hin_rocket_corps_desc: "Specialist artillery troops equipped with iron-cased rockets that can be fired in rapid salvos to devastate enemy formations from distance."
 nd_hin_sarai: "Sarai"
 nd_hin_sarai_desc: "An imperial roadside inn providing lodging, stabling, and market facilities for merchants and travelers along the trade routes."
 nd_hin_sarai_upkeep: "Sarai Provisions"
 nd_hin_sarai_upkeep_desc: "Maintaining a sarai requires grain for travelers and fodder for their animals."
 nd_hin_karkhana: "Karkhana"
 nd_hin_karkhana_desc: "An imperial workshop where skilled artisans produce textiles, metalwork, and luxury goods under state patronage."
 nd_hin_karkhana_operation: "Karkhana Operations"
 nd_hin_karkhana_operation_desc: "Imperial artisans dye and weave raw cloth into fine textiles of unrivaled quality."
 nd_hin_ibadat_khana: "Ibadat Khana"
 nd_hin_ibadat_khana_desc: "A house of worship where scholars of every faith gather to debate theology, embodying the ideal of religious coexistence."
 nd_hin_ibadat_khana_upkeep: "Scholarly Maintenance"
 nd_hin_ibadat_khana_upkeep_desc: "Supporting the scholars and scribes who staff the Ibadat Khana requires paper for their writings, cloth for furnishings, and incense for religious ceremonies."
 nd_hin_maktab: "Maktab"
 nd_hin_maktab_desc: "A primary school providing literacy education and religious instruction, extending learning beyond the elite."
 nd_hin_maktab_upkeep: "Maktab Supplies"
 nd_hin_maktab_upkeep_desc: "Paper and writing materials for the students and teachers of the maktab, supplemented by books and beeswax candles for evening study."
 nd_hin_jagir: "Jagir Estate"
 nd_hin_jagir_desc: "A landed military estate whose holder is obligated to maintain cavalry and soldiers for imperial service."
 nd_hin_jagir_upkeep: "Jagir Maintenance"
 nd_hin_jagir_upkeep_desc: "Horses, weapons, and leather for harnesses and armor maintained by the jagirdar's cavalry obligation."
 nd_hin_shikhara_temple: "Shikhara Temple"
 nd_hin_shikhara_temple_desc: "A towering Hindu temple with intricately carved stone spires, a center of devotion, pilgrimage, and cultural life."
 nd_hin_temple_upkeep: "Temple Maintenance"
 nd_hin_temple_upkeep_desc: "Stone for the ongoing maintenance and expansion of the temple complex, along with incense and beeswax for daily ritual."
 nd_hin_textile_dyeing_pm: "Textile Dyeing"
 nd_hin_textile_dyeing_pm_desc: "The art of dyeing Indian cotton and muslin with vibrant, colorfast pigments prized across the world."
 nd_hin_spice_processing_pm: "Spice Processing"
 nd_hin_spice_processing_pm_desc: "Grinding, sorting, and salt-preserving of pepper and other spices in preparation for long-distance trade."
 levy_nd_hin_war_elephant: "War Elephant Levy"
 levy_nd_hin_war_elephant_desc: "Elephants raised from the noble estates and provincial garrisons for imperial service."
 levy_nd_hin_barqandaz: "Barqandaz Levy"
 levy_nd_hin_barqandaz_desc: "Matchlock infantry raised through the provincial levy system."
 nd_hin_formed_tt: "Hindustan has been formed"
 nd_hin_path_a_tt: "Chose Padshah-e-Hind"
 nd_hin_path_b_tt: "Chose Daulat-e-Hindustan"
 nd_hin_path_c_tt: "Chose Chakravarti Samrat"
 nd_hin_destiny: "Destiny of Hindustan"
 nd_hin_destiny_desc: "The subcontinent is united, but unity is only the beginning. The destiny of Hindustan remains to be written -- will India look outward to conquer, or inward to prosper?"
 nd_hin_dest_frontier: "The Northwest Frontier"
 nd_hin_dest_frontier_desc: "Secure Kabul and Kandahar -- the mountain passes that control access to the subcontinent. No emperor of India is safe while these gates remain in foreign hands."
 nd_hin_dest_persia: "The Conquest of Persia"
 nd_hin_dest_persia_desc: "Follow in the footsteps of the Ghaznavids and Timurids. Take Isfahan and Herat, bringing the ancient Persian heartland under Hindustani dominion."
 nd_hin_dest_imperium: "Universal Imperium"
 nd_hin_dest_imperium_desc: "The ultimate expression of Hindustani power: Baghdad, seat of the Abbasid caliphs, and Mecca, the holy city of Islam, both under the Padshah's rule. This is the empire that Alexander dreamed of."
 nd_hin_dest_ports: "The Western Ports"
 nd_hin_dest_ports_desc: "Surat and Goa command the western coast of India, where European merchants arrive hungry for spices and textiles. Control these ports and control the wealth they generate."
 nd_hin_dest_prosperity: "The Prosperity of India"
 nd_hin_dest_prosperity_desc: "Embrace modern banking institutions and develop the silk trade. India's wealth is legendary -- make that legend a reality that transforms the economy."
 nd_hin_dest_ocean: "Master of the Indian Ocean"
 nd_hin_dest_ocean_desc: "Control Hormuz and Aden -- the chokepoints that command all trade between East and West. Every ship carrying spices, silk, or cotton must pass through Hindustani waters."
 nd_hin.6.t: "The Destiny of Hindustan"
 nd_hin.6.d: "India stands unified. The great subcontinent, home to hundreds of millions, answers to a single sovereign. But what comes next? The Padshah's armies have proven themselves against every challenger on the subcontinent. Do they now look beyond its borders? Or does the true strength of Hindustan lie not in conquest but in the unimaginable wealth that flows through its markets and ports?"
 nd_hin.6.a: "Our destiny awaits"
 nd_hin.7.t: "The Northwest Frontier"
 nd_hin.7.d: "The passes of the Hindu Kush have been the invasion route of every conqueror who ever threatened India -- from Alexander of Macedon to the Ghaznavids to Timur himself. Now, for the first time, an Emperor of India holds these mountain gates. Kabul and Kandahar are ours, and with them the certainty that no army will ever again descend through the Khyber to ravage the plains of Hindustan. The frontier is secured. But for the Padshah, it is not an endpoint -- it is a springboard."
 nd_hin.7.a: "The gates of India are in our hands"
 nd_hin.8.t: "The Conquest of Persia"
 nd_hin.8.d: "Isfahan has fallen. Herat has fallen. The ancient heartland of Persian civilization, home to poets and philosophers, astronomers and architects, now belongs to the Padshah of Hindustan. This is no mere border raid -- it is the reversal of centuries of history, when Persian kings and Turkic conquerors swept down through the passes to plunder India. Now India has reached back. The question is how to govern these vast new territories. Shall we absorb their people into our empire, blending Persian and Indian civilization? Or shall we extract their wealth to fuel further conquests?"
 nd_hin.8.a: "Integrate Persia into our empire"
 nd_hin.8.b: "Strip their treasuries and arm our legions"
 nd_hin.9.t: "Universal Imperium"
 nd_hin.9.d: "Baghdad and Mecca bow to the Padshah. The seat of the Abbasid caliphate and the holiest city of Islam both lie within Hindustani domains. No sovereign since the early caliphs has held such a combination of temporal power and religious authority. The empire stretches from the Ganges to the Tigris, from the holy cities of Arabia to the silk roads of Central Asia. This is the universal monarchy that Timur and Alexander both sought but neither achieved. How shall history remember this achievement?"
 nd_hin.9.a: "As the Ghazi Emperor, defender of the faith"
 nd_hin.9.b: "As the heir of Alexander, ruler of all Asia"
 nd_hin.10.t: "The Western Ports"
 nd_hin.10.d: "Surat and Goa are ours. The great harbors of India's western coast, where ships from Arabia, Persia, East Africa, and Europe converge, now fly the banner of Hindustan. Portuguese carracks and Arab dhows alike must negotiate with Hindustani port authorities. The customs revenues alone are staggering -- but the true value is strategic. Whoever controls these ports controls the flow of goods between East and West."
 nd_hin.10.a: "The wealth of the world passes through our hands"
 nd_hin.11.t: "The Prosperity of India"
 nd_hin.11.d: "India's economy has reached a new level of sophistication. Banking houses modeled on the shroffs and hundis of Gujarat facilitate trade across vast distances. Silk flows through our markets, connecting India to the luxury trade networks of China and Persia. The institutional foundations of a modern economy are taking shape. But how shall we direct this prosperity? Toward the textile exports that have already made India the workshop of the world? Or toward the banking institutions that promise to transform how wealth itself is created and managed?"
 nd_hin.11.a: "The looms of India shall clothe the world"
 nd_hin.11.b: "Our banking houses shall rival the Medicis"
 nd_hin.12.t: "Master of the Indian Ocean"
 nd_hin.12.d: "Hormuz and Aden are ours. The two great chokepoints of the Indian Ocean -- the Strait of Hormuz commanding the Persian Gulf, and Aden commanding the Red Sea -- are now under Hindustani control. Every bale of silk, every sack of pepper, every chest of cotton that moves between East and West must pass through waters we command. The Portuguese dreamed of controlling this trade from their scattered factories; we have achieved it through the sheer weight of continental empire projected onto the seas. Shall we enforce an iron monopoly over these routes, or cultivate them as cosmopolitan trading hubs that draw merchants from every nation?"
 nd_hin.12.a: "Enforce our maritime monopoly"
 nd_hin.12.b: "Let all nations trade under our protection"
 STATIC_MODIFIER_NAME_nd_hin_dest_persian_integration: "Persian Integration"
 STATIC_MODIFIER_DESC_nd_hin_dest_persian_integration: "Persian administrators, poets, and scholars are absorbed into the imperial system, enriching Hindustani culture with the ancient traditions of Iran."
 STATIC_MODIFIER_NAME_nd_hin_dest_persian_plunder: "Plunder of Persia"
 STATIC_MODIFIER_DESC_nd_hin_dest_persian_plunder: "The wealth of Persia fuels rapid military expansion, funding new regiments and fortifications across the empire."
 STATIC_MODIFIER_NAME_nd_hin_dest_ghazi_emperor: "Ghazi Emperor"
 STATIC_MODIFIER_DESC_nd_hin_dest_ghazi_emperor: "The Padshah is recognized as the supreme warrior of the faith, whose conquests from India to Arabia have united the Islamic world under a single sovereign."
 STATIC_MODIFIER_NAME_nd_hin_dest_alexander_heir: "Heir of Alexander"
 STATIC_MODIFIER_DESC_nd_hin_dest_alexander_heir: "The Padshah's empire spans from the Ganges to the Tigris, surpassing even Alexander's domain. Subject peoples are integrated into a universal monarchy."
 STATIC_MODIFIER_NAME_nd_hin_dest_textile_empire: "Textile Empire"
 STATIC_MODIFIER_DESC_nd_hin_dest_textile_empire: "India's cotton, muslin, and silk exports dominate global markets, making Hindustan the workshop of the world."
 STATIC_MODIFIER_NAME_nd_hin_dest_banking_houses: "Banking Houses"
 STATIC_MODIFIER_DESC_nd_hin_dest_banking_houses: "Sophisticated financial institutions -- the shroffs, hundis, and mahajans -- facilitate trade and investment across the subcontinent."
 STATIC_MODIFIER_NAME_nd_hin_dest_maritime_monopoly: "Maritime Monopoly"
 STATIC_MODIFIER_DESC_nd_hin_dest_maritime_monopoly: "Hindustan enforces exclusive control over the Indian Ocean trade routes, taxing every cargo that passes through its chokepoints."
 STATIC_MODIFIER_NAME_nd_hin_dest_cosmopolitan_ports: "Cosmopolitan Ports"
 STATIC_MODIFIER_DESC_nd_hin_dest_cosmopolitan_ports: "The great ports of Hindustan welcome merchants from every nation, becoming vibrant cosmopolitan hubs where cultures and goods converge."
 nd_hin_diwan_i_am: "Diwan-i-Am"
 nd_hin_diwan_i_am_desc: "The Hall of Public Audience, where the Padshah dispenses justice and receives tribute from his vast domains."
 nd_hin_diwan_upkeep: "Court Maintenance"
 nd_hin_diwan_upkeep_desc: "Fine cloth for the courtiers, paper for the scribes, and furniture for the grand hall of audience."
 nd_hin_bandar: "Bandar"
 nd_hin_bandar_desc: "An imperial port authority governing the great trading harbors of the Indian Ocean coast."
 nd_hin_bandar_upkeep: "Port Maintenance"
 nd_hin_bandar_upkeep_desc: "Lumber, tar, and tools for maintaining the docks, warehouses, and harbor facilities of the imperial port."
