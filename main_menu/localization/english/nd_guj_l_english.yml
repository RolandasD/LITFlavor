l_english:
 STATIC_MODIFIER_NAME_nd_sultan_al_barr_wa_al_bahr: "Sultan of Land and Sea"
 STATIC_MODIFIER_DESC_nd_sultan_al_barr_wa_al_bahr: "Following the example of Mahmud Begada, who styled himself Sultan al-Barr wa al-Bahr, Gujarat projects power across both its hinterland and the Arabian Sea."
 STATIC_MODIFIER_NAME_nd_gateway_of_the_ocean: "Gateway of the Indian Ocean"
 STATIC_MODIFIER_DESC_nd_gateway_of_the_ocean: "Gujarat's ports stand at the crossroads of the world's richest trade routes, and its merchants have made themselves indispensable partners from East Africa to Southeast Asia."
 STATIC_MODIFIER_NAME_nd_fortress_conqueror: "Conqueror of Fortresses"
 STATIC_MODIFIER_DESC_nd_fortress_conqueror: "In the tradition of Mahmud Begada, who reduced the impregnable citadels of Champaner and Junagadh, Gujarat's armies specialize in the patient reduction of enemy strongholds."
 STATIC_MODIFIER_NAME_nd_lord_of_diu: "Lord of Diu"
 STATIC_MODIFIER_DESC_nd_lord_of_diu: "Following Mahmud Begada's development of a powerful fleet off the coast of Diu, Gujarat commands the Arabian Sea approaches to the Indian subcontinent."
 STATIC_MODIFIER_NAME_nd_coastal_bulwark: "Coastal Bulwark"
 STATIC_MODIFIER_DESC_nd_coastal_bulwark: "Stung by the arrival of European interlopers, Gujarat has invested heavily in coastal fortifications and naval readiness to defend its shores."
 STATIC_MODIFIER_NAME_nd_adopted_cannonry: "Adopted Cannonry"
 STATIC_MODIFIER_DESC_nd_adopted_cannonry: "Rather than retreating from the European challenge, Gujarat has embraced gunpowder technology and modern shipbuilding to match its rivals at sea."
 nd_guj.1.t: "The Gujarat Sultanate"
 nd_guj.1.d: "The banner of Gujarat flies over the lands between the Rann of Kutch and the Gulf of Khambat. For generations, the merchants of Cambay and Surat have enriched these shores with the wealth of the Indian Ocean, while the sultans have carved a kingdom from the contested borderlands of western India.\n\nNow, as Gujarat stands united under a single crown, its ruler must decide what the sultanate shall become. Will it follow the path of Mahmud Begada — the Sultan of Land and Sea — building a military state that projects power across both its hinterland and the Arabian Sea? Or shall it embrace its destiny as the gateway of the Indian Ocean, a mercantile empire where trade and diplomacy are the instruments of greatness?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_guj.1.a: "We shall be the Sultan of Land and Sea!"
 nd_guj.1.b: "Gujarat shall be the Gateway of the Indian Ocean."
 nd_guj.2.t: "The Conquests of Mahmud Begada"
 nd_guj.2.d: "Sultan Mahmud Begada has earned his name — 'Lord of Two Forts' — through the conquest of the seemingly impregnable fortresses of Champaner and Junagadh. The Rajput stronghold of Champaner, perched atop its rocky plateau, fell only after a prolonged and determined siege. Junagadh, seat of the Chudasama dynasty at the foot of sacred Mount Girnar, was brought to heel soon after.\n\nThese victories have transformed Gujarat from a coastal sultanate into a major power of western India. Yet Mahmud's ambitions extend beyond land. He has appointed Malik Ayyaz, a trusted commander of humble origin, as governor of Diu, where a formidable fleet is being assembled to secure Gujarat's maritime interests.\n\nWill the Sultan continue to expand through conquest on land, or turn his gaze toward the sea?"
 nd_guj.2.a: "The fortresses of India shall fall before us."
 nd_guj.2.b: "Our destiny lies upon the waves."
 nd_guj.3.t: "The Battle of Diu"
 nd_guj.3.d: "The waters off Diu have run red with blood. A great fleet assembled by the Mamluk Sultanate of Egypt, supported by Gujarat's own warships and ships from Calicut, has clashed with the Portuguese Estado da India. The outcome has demonstrated the terrible power of European heavy cannon at sea.\n\nThe Portuguese victory at Diu in 1509 has shaken the established order of Indian Ocean trade. For centuries, Gujarat's merchants sailed these waters freely, their dhows carrying cotton and spices to every port from Zanzibar to Malacca. Now, European interlopers demand passes and tribute from Gujarati vessels in their own waters.\n\nGujarat must respond. Shall the sultanate fortify its coastline and prepare to resist these foreign aggressors, or study their methods and adopt their technology to compete on equal terms?"
 nd_guj.3.a: "Fortify every port — they shall not land unopposed."
 nd_guj.3.b: "Learn their methods. Build their ships. Beat them at their own game."
 nd_guj.4.t: "The Glory of Champaner-Pavagadh"
 nd_guj.4.d: "Following the conquest of Champaner, Sultan Mahmud Begada has transformed the ancient hill fortress into a magnificent new capital. Where once stood only Rajput battlements, a city of mosques, palaces, and gardens is rising. The Jama Masjid of Champaner, with its soaring minarets and 172 intricately carved pillars, represents the pinnacle of Indo-Islamic architecture — a synthesis of Hindu structural traditions and Islamic decorative arts found nowhere else in India.\n\nThe Kevada Masjid, the Nagina Masjid, and the Shahar ki Masjid each display a different facet of this unique architectural tradition. The Mandvi customs house speaks to Gujarat's continuing commercial vitality, while the Citadel Jahanpanah proclaims the sultanate's military strength.\n\nChampaner-Pavagadh stands as a monument to Gujarat's golden age."
 nd_guj.4.a: "A testament to our civilization."
 nd_guj.5.t: "The Gujarati Merchant Diaspora"
 nd_guj.5.d: "Gujarati merchants have established permanent trading communities across the entire Indian Ocean world. In the ports of Aden and Hormuz, in the bazaars of Malacca and the Malabar Coast, Gujarati traders are recognized by their distinctive dress and their legendary commercial acumen.\n\nThese merchants carry more than goods — they carry Gujarat's culture, language, and religious traditions to distant shores. Jain and Hindu merchants from Saurashtra and Kutch have built temples in East Africa. Muslim traders from Cambay have established mosques in Southeast Asia. The Gujarati diaspora has created a commercial network that spans half the globe, connected by family ties, shared language, and mutual trust.\n\nThis network gives Gujarat an intelligence advantage and commercial reach that no army could achieve."
 nd_guj.5.a: "Our merchants are our greatest ambassadors."
 nd_guj_stepwell_engineering: "Stepwell Engineering"
 nd_guj_stepwell_engineering_desc: "The vav stepwells of Gujarat are among the most sophisticated water management structures in the medieval world, combining engineering prowess with sacred architecture."
 nd_guj_muzaffarid_court: "Muzaffarid Court"
 nd_guj_muzaffarid_court_desc: "The administrative traditions established by the Muzaffarid dynasty after independence from Delhi provide Gujarat with an efficient and stable governance system."
 nd_guj_dhow_tradition: "Dhow Building Tradition"
 nd_guj_dhow_tradition_desc: "Gujarat's shipwrights have perfected the construction of dhows — swift, lateen-rigged vessels ideally suited to the monsoon winds of the Indian Ocean."
 nd_guj_cambay_trade: "Cambay Trade Network"
 nd_guj_cambay_trade_desc: "The port of Cambay has been a hub of international commerce for centuries, connecting Gujarat to the Persian Gulf, the Red Sea, and East Africa."
 nd_guj_early_tolerance: "Sultanate Tolerance"
 nd_guj_early_tolerance_desc: "The Gujarat Sultanate governs a diverse population of Muslims, Hindus, and Jains, maintaining social stability through pragmatic religious accommodation."
 nd_guj_ghulam_tradition: "Ghulam Military Tradition"
 nd_guj_ghulam_tradition_desc: "The ghulam system provides Gujarat's sultans with a corps of slave-soldier cavalry whose loyalty lies entirely with the throne rather than with any local nobleman."
 nd_guj_habshi_guards: "Habshi Palace Guard"
 nd_guj_habshi_guards_desc: "Abyssinian warriors — the Habshis — serve as elite palace guards and military commanders in the Gujarat Sultanate, prized for their martial skill and personal loyalty."
 nd_guj_begada_conquests: "Begada's Conquests"
 nd_guj_begada_conquests_desc: "Sultan Mahmud Begada earned his name — Lord of Two Forts — by conquering the seemingly impregnable strongholds of Champaner and Junagadh."
 nd_guj_patola_weaving: "Patola Silk Weaving"
 nd_guj_patola_weaving_desc: "The double-ikat Patola silk of Patan represents the most technically demanding textile art in India, producing fabrics treasured by royalty across the subcontinent."
 nd_guj_champaner_capital: "Champaner-Pavagadh"
 nd_guj_champaner_capital_desc: "The transformation of conquered Champaner into a magnificent capital city represents the golden age of Indo-Islamic architecture in western India."
 nd_guj_bandhani_craft: "Bandhani Craft"
 nd_guj_bandhani_craft_desc: "The ancient Gujarati art of Bandhani — resist tie-dyeing — produces brilliantly colored textiles prized across the Indian Ocean world."
 nd_guj_battle_of_diu: "Battle of Diu"
 nd_guj_battle_of_diu_desc: "The clash between Gujarat's fleet and Portuguese warships off Diu in 1509 marked a turning point in Indian Ocean naval warfare and European expansion."
 nd_guj_ghurab_warfare: "Ghurab Warfare"
 nd_guj_ghurab_warfare_desc: "The ghurab — an oared warship armed with cannon — represents Gujarat's adaptation of Arabian naval traditions to the gunpowder age."
 nd_guj_bahadur_shah_legacy: "Bahadur Shah's Legacy"
 nd_guj_bahadur_shah_legacy_desc: "Sultan Bahadur Shah's defiant resistance against both the Mughal Empire and the Portuguese demonstrated Gujarat's determination to maintain its independence."
 nd_guj_indigo_industry: "Indigo Dye Industry"
 nd_guj_indigo_industry_desc: "Gujarat's indigo processing industry produces vast quantities of blue dye for both domestic textile production and export to markets across the Indian Ocean."
 nd_guj_merchant_diaspora: "Gujarati Merchant Diaspora"
 nd_guj_merchant_diaspora_desc: "Gujarati merchants have established permanent trading communities from Aden to Malacca, creating a commercial network that spans the entire Indian Ocean."
 nd_guj_mercantile_law: "Mercantile Law"
 nd_guj_mercantile_law_desc: "Gujarat's legal traditions for resolving commercial disputes draw on both Islamic jurisprudence and local mercantile custom, providing a stable framework for international trade."
 nd_guj_reformed_cavalry: "Reformed Cavalry"
 nd_guj_reformed_cavalry_desc: "Gujarat's cavalry has evolved from the ghulam tradition into a professional provincial force equipped with firearms and trained in modern tactics."
 nd_guj_surat_shipbuilding: "Surat Shipyards"
 nd_guj_surat_shipbuilding_desc: "The dockyards of Surat have become one of the premier shipbuilding centers in the Indian Ocean, producing vessels for both domestic and foreign clients."
 nd_guj_surat_entrepot: "Surat Entrepot"
 nd_guj_surat_entrepot_desc: "Surat has eclipsed Cambay as Gujarat's premier port, becoming an international entrepot where European, Arab, Persian, and Indian merchants meet and trade."
 nd_guj_communal_harmony: "Communal Harmony"
 nd_guj_communal_harmony_desc: "Gujarat's tradition of multi-confessional governance, accommodating Jain, Hindu, and Muslim communities side by side, creates a stable and prosperous society."
 nd_guj_european_gunnery: "European Gunnery"
 nd_guj_european_gunnery_desc: "Surat's shipyards have incorporated European naval gunnery techniques, producing warships that combine Indian craftsmanship with European firepower."
 nd_guj_mughal_textile_hub: "Mughal Textile Hub"
 nd_guj_mughal_textile_hub_desc: "Under Mughal administration, Gujarat's textile industry has expanded enormously, supplying cotton cloth and silk to markets from Ottoman Turkey to Ming China."
 nd_guj_surat_presidency: "Surat Presidency"
 nd_guj_surat_presidency_desc: "Surat has become the foremost port of the Mughal Empire, a cosmopolitan city where the wealth of India meets the trade networks of the world."
 nd_guj_hundi_networks: "Hundi Banking Networks"
 nd_guj_hundi_networks_desc: "Gujarati bankers and moneylenders have developed the hundi system — a sophisticated network of bills of exchange that facilitates trade across the entire Indian Ocean."
 nd_guj_fortified_cities: "Fortified Cities"
 nd_guj_fortified_cities_desc: "Gujarat's major cities are protected by formidable walls and fortifications, a legacy of centuries of conflict between sultanate, Mughal, Maratha, and European powers."
 nd_guj_revenue_reform: "Revenue Reform"
 nd_guj_revenue_reform_desc: "Centralized tax collection and standardized administrative procedures have streamlined Gujarat's revenue system, increasing the crown's share of the region's immense wealth."
 nd_guj_cotton_mechanization: "Cotton Mechanization"
 nd_guj_cotton_mechanization_desc: "Early mechanization of cotton processing — ginning, carding, and spinning — has begun to transform Gujarat's textile industry from artisanal craft to proto-industrial production."
 nd_guj_industrial_textiles: "Industrial Textiles"
 nd_guj_industrial_textiles_desc: "Gujarat's textile industry has fully industrialized, with mechanized mills producing vast quantities of cotton cloth and fine fabrics for global markets."
 nd_guj_naval_modernization: "Naval Modernization"
 nd_guj_naval_modernization_desc: "Gujarat's navy has been rebuilt with modern steamships and iron-hulled vessels, reasserting the region's traditional command of the Arabian Sea."
 nd_guj_cultural_revival: "Cultural Revival"
 nd_guj_cultural_revival_desc: "A renewed appreciation for Gujarat's unique architectural heritage and textile traditions drives a cultural renaissance that attracts scholars and artists from across the subcontinent."
 nd_guj_global_diaspora: "Global Diaspora"
 nd_guj_global_diaspora_desc: "The Gujarati diaspora has expanded beyond the Indian Ocean to encompass the entire globe, with merchant communities in London, Zanzibar, Singapore, and beyond."
 a_nd_guj_habshi_guard: "Habshi Guard"
 a_nd_guj_habshi_guard_desc: "Abyssinian elite palace guards, prized for their martial prowess and unwavering loyalty to the sultan."
 a_nd_guj_ghulam_cavalry: "Ghulam Cavalry"
 a_nd_guj_ghulam_cavalry_desc: "Slave-soldier heavy cavalry whose loyalty lies entirely with the throne, forming the sultanate's mobile striking force."
 n_nd_guj_dhow: "Gujarati Dhow"
 n_nd_guj_dhow_desc: "A swift lateen-rigged trading vessel, built by Gujarat's master shipwrights for the monsoon winds of the Indian Ocean."
 n_nd_guj_ghurab: "Ghurab War Galley"
 n_nd_guj_ghurab_desc: "An oared warship armed with cannon, designed for Arabian Sea patrol and coastal warfare."
 a_nd_guj_sipahi: "Sipahi-e-Gujarat"
 a_nd_guj_sipahi_desc: "Reformed provincial cavalry equipped with firearms and trained in the combined-arms tactics of the gunpowder era."
 n_nd_guj_surat_frigate: "Surat Frigate"
 n_nd_guj_surat_frigate_desc: "A European-influenced warship built at the Surat dockyards, combining Indian craftsmanship with modern gunnery."
 n_nd_guj_merchant_cruiser: "Surat Merchant Cruiser"
 n_nd_guj_merchant_cruiser_desc: "A large armed merchantman built at the Surat dockyards, designed to protect Gujarat's far-flung trade convoys across the Indian Ocean."
 nd_guj_vav: "Vav Stepwell"
 nd_guj_vav_desc: "Monumental stepped water wells combining sacred architecture with practical water management, a hallmark of Gujarati engineering."
 nd_guj_karkhana: "Karkhana Workshop"
 nd_guj_karkhana_desc: "A royal textile manufactory producing fine cloth, silk, and dyed fabrics for both domestic consumption and export."
 nd_guj_emporium: "Cambay Emporium"
 nd_guj_emporium_desc: "A grand trading house at the crossroads of Indian Ocean commerce, where Arab, Persian, and Indian merchants exchange the wealth of three continents."
 nd_guj_jama_masjid: "Jama Masjid"
 nd_guj_jama_masjid_desc: "A magnificent congregational mosque in the Indo-Islamic style, serving as both a center of worship and a hub of religious learning."
 nd_guj_mandvi: "Mandvi Customs House"
 nd_guj_mandvi_desc: "A port administration building that collects tariffs and oversees maritime commerce, ensuring orderly trade and naval recruitment."
 nd_guj_dye_works: "Rangrez Dye Works"
 nd_guj_dye_works_desc: "An industrial facility for processing indigo, turmeric, and other dyes used in Gujarat's famous textile industry."
 nd_guj_hundi_house: "Hundi Banking House"
 nd_guj_hundi_house_desc: "A financial institution specializing in bills of exchange and maritime insurance, connecting Gujarat's merchants to banking networks across the Indian Ocean."
 nd_guj_cotton_mill: "Gujarat Cotton Mill"
 nd_guj_cotton_mill_desc: "A proto-industrial textile factory where mechanized ginning, carding, and spinning transform raw cotton into cloth at unprecedented scale."
 nd_guj_vav_upkeep: "Stepwell Maintenance"
 nd_guj_vav_upkeep_desc: "Stone and tools to maintain the elaborate carved galleries and water channels of the stepwell."
 nd_guj_karkhana_operations: "Karkhana Supplies"
 nd_guj_karkhana_operations_desc: "Dyes and raw silk processed into fine fabrics by the royal textile workshops."
 nd_guj_emporium_costs: "Emporium Operating Costs"
 nd_guj_emporium_costs_desc: "Construction materials and goods to maintain the trading warehouses and counting houses."
 nd_guj_masjid_upkeep: "Mosque Upkeep"
 nd_guj_masjid_upkeep_desc: "Stone, cloth, and incense for the ongoing maintenance, prayer ceremonies, and beautification of the congregational mosque."
 nd_guj_mandvi_operations: "Customs House Operations"
 nd_guj_mandvi_operations_desc: "Timber for dock repairs, paper for the customs records and shipping manifests, and tools for port maintenance."
 nd_guj_dye_processing: "Dye Processing"
 nd_guj_dye_processing_desc: "Indigo plants and other raw materials processed into vibrant textile dyes."
 nd_guj_hundi_operations: "Banking Operations"
 nd_guj_hundi_operations_desc: "Paper and fine cloth for the bills of exchange, ledgers, and formal correspondence that sustain the hundi network."
 nd_guj_mill_operations: "Mill Operations"
 nd_guj_mill_operations_desc: "Raw cotton ginned and spun into cloth using timber-fueled machinery."
 nd_guj_bandhani_dyeing: "Bandhani Tie-Dyeing"
 nd_guj_bandhani_dyeing_desc: "The traditional Gujarati art of resist tie-dyeing, producing brilliantly patterned textiles using dyes and base cloth."
 nd_guj_patola_double_ikat: "Patola Double-Ikat"
 nd_guj_patola_double_ikat_desc: "The most technically demanding textile technique in India, requiring months to produce a single silk fabric with perfectly aligned patterns on both sides."
 nd_guj_mechanized_cotton: "Mechanized Cotton Processing"
 nd_guj_mechanized_cotton_desc: "Water-powered machinery transforms raw cotton into cloth at unprecedented scale."
 levy_nd_guj_ghulam: "Ghulam Cavalry Levy"
 levy_nd_guj_ghulam_desc: "Slave-soldier horsemen raised from the sultanate's military households."
 nd_guj_formed_tt: "Gujarat has been formed"
 nd_guj_path_a_tt: "Chose Sultan of Land and Sea"
 nd_guj_path_b_tt: "Chose Gateway of the Indian Ocean"
 nd_guj_destiny: "Gujarat United"
 nd_guj_destiny_desc: "With Gujarat formed and stability restored, the sultanate stands ready to pursue its national destiny. Whether by conquest or commerce, Gujarat's future shall be written in the annals of history."
 nd_guj_dest_malwa_campaign: "Campaign into Malwa"
 nd_guj_dest_malwa_campaign_desc: "The fertile plateau of Malwa, with its ancient cities of Mandu and Ujjain, beckons Gujarat's armies. Controlling this hinterland will secure the sultanate's eastern flank and provide the agricultural wealth needed to sustain further conquests."
 nd_guj_dest_konkan_conquest: "Conquest of the Konkan"
 nd_guj_dest_konkan_conquest_desc: "The Konkan coast, stretching south from Gujarat to Goa, is dotted with wealthy ports that have fallen under foreign or rival control. Seizing Chaul and Goa will give the sultanate command of the western Indian coastline and deny these harbors to European interlopers."
 nd_guj_dest_sultan_supreme: "Sultan Supreme"
 nd_guj_dest_sultan_supreme_desc: "From the Indus to the Ganges, from Sindh to Delhi itself, the Sultan of Gujarat claims dominion over the heartland of the subcontinent. Only by holding these ancient seats of power can Gujarat's ruler truly call himself supreme."
 nd_guj_dest_cambay_revival: "Revival of Cambay"
 nd_guj_dest_cambay_revival_desc: "Before Gujarat can command the Indian Ocean, it must first revive the legendary prosperity of Cambay. Ensure cotton flows through the capital market, fill the treasury, and develop the homeland into a worthy foundation for commercial greatness."
 nd_guj_dest_hormuz_gateway: "Gateway to Hormuz"
 nd_guj_dest_hormuz_gateway_desc: "The island fortress of Hormuz controls the entrance to the Persian Gulf, the richest trade route in the Indian Ocean. Gujarat's merchants have long traded there; now the sultanate must seize it outright and establish direct control over this vital chokepoint."
 nd_guj_dest_ocean_empire: "Empire of the Indian Ocean"
 nd_guj_dest_ocean_empire_desc: "From Kilwa on the African coast to Malacca at the gateway to the South China Sea, Gujarat's commercial empire spans the entire Indian Ocean. Control of these distant ports crowns the sultanate as the undisputed master of oceanic trade."
 nd_guj.6.t: "Gujarat United"
 nd_guj.6.d: "The lands of Gujarat are united under a single banner. From the salt flats of Kutch to the teak forests of the southern hills, from the ancient port of Cambay to the rising docks of Surat, this sultanate commands both the wealth of the land and the trade of the sea.\n\nThe path ahead is ours to choose. Let us build upon this foundation and forge a destiny worthy of our people."
 nd_guj.6.a: "Our destiny begins now."
 nd_guj.7.t: "The Fall of Malwa"
 nd_guj.7.d: "Our armies have marched through the Vindhya passes and planted Gujarat's banner over the ancient cities of Malwa. The fortress-capital of Mandu, perched on its great plateau, and the sacred city of Ujjain, seat of astronomers and scholars, now answer to the sultanate.\n\nThe fertile black-soil plains of Malwa will feed our armies, while its strategic position opens the road to central India. The Sultan of Land and Sea advances."
 nd_guj.7.a: "Malwa is ours. The campaign continues."
 nd_guj.8.t: "The Konkan Secured"
 nd_guj.8.d: "The fall of Chaul and Goa has given Gujarat unbroken command of the western Indian coastline. Portuguese factories and Deccani garrisons alike have been swept aside. Our fleets now patrol from the Gulf of Kutch to the Malabar approaches without challenge.\n\nWith the Konkan coast secured, the sultan must decide how best to consolidate these gains. Shall we train our engineers in the systematic reduction of fortresses, turning Gujarat's army into the premier siege force of the subcontinent? Or shall we invest in heavy warships to project naval power across the Arabian Sea?"
 nd_guj.8.a: "Train siege engineers to crack any fortress."
 nd_guj.8.b: "Build a fleet to command the Arabian Sea."
 nd_guj.9.t: "Sultan Supreme"
 nd_guj.9.d: "From Thatta on the Indus to Delhi on the Yamuna, the Sultan of Gujarat now rules over lands that once belonged to the great empires of the subcontinent. The ancient Sultanate of Delhi, the Sindhi ports of the Indus delta, the rich plains of Hindustan -- all now acknowledge Gujarat's supremacy.\n\nThis is the apex of Gujarati power. The sultan must now decide how to govern this vast empire. Shall we establish a magnificent imperial court in the tradition of the great Sultanates, overawing our subjects with the splendor of our administration? Or shall we rule through a network of intelligence and intrigue, ensuring no rebellion can take root undetected?"
 nd_guj.9.a: "Establish an imperial court of unmatched splendor."
 nd_guj.9.b: "Rule through intelligence and subtle control."
 nd_guj.10.t: "The Revival of Cambay"
 nd_guj.10.d: "The port of Cambay -- Khambhat -- has been restored to its legendary prosperity. Cotton bales fill the warehouses, merchants crowd the bazaars, and the sound of hammers rings from the shipyards. Gujarat's treasury overflows with the profits of commerce, and the land itself has been developed to support the growing trade.\n\nThis is only the beginning. The Indian Ocean awaits."
 nd_guj.10.a: "Our merchants shall carry Gujarat's banner to every port."
 nd_guj.11.t: "The Pearl of the Gulf"
 nd_guj.11.d: "The fortress-island of Hormuz, commanding the narrow strait that connects the Persian Gulf to the Indian Ocean, now flies Gujarat's banner. Every ship carrying the silks of Persia, the dates of Arabia, and the horses of the Gulf must pass under our guns.\n\nWith Hormuz secured, Gujarat controls the richest chokepoint in the Indian Ocean trade system. The sultan must decide how to leverage this position. Shall we invest in infrastructure, building new ports and warehouses to handle the flood of commerce? Or shall we empower our merchant communities abroad, turning the Gujarati diaspora into a network of commercial princes who dominate distant markets?"
 nd_guj.11.a: "Build ports worthy of our new dominion."
 nd_guj.11.b: "Empower our merchants to rule distant markets."
 nd_guj.12.t: "Empire of the Indian Ocean"
 nd_guj.12.d: "From Kilwa on the Swahili Coast to Malacca at the gateway to the South China Sea, Gujarat's commercial empire now spans the entire Indian Ocean. Gujarati merchants sit in the counting houses of every major port. Gujarati ships dominate every sea lane. Gujarati cloth, dyes, and spices fill the markets of three continents.\n\nNo other power has achieved such commercial dominion over the world's richest ocean. The sultan must decide the character of this unprecedented empire. Shall Gujarat rule the waves as a sovereign maritime power, projecting political authority across the ocean? Or shall we perfect our role as the world's great textile producer, clothing the nations of the earth in Gujarati cotton and silk?"
 nd_guj.12.a: "We shall be sovereign of the Indian Ocean."
 nd_guj.12.b: "The world shall wear Gujarat's cloth."
 STATIC_MODIFIER_NAME_nd_guj_dest_siege_masters: "Siege Masters"
 STATIC_MODIFIER_DESC_nd_guj_dest_siege_masters: "Gujarat's military engineers have mastered the art of fortress reduction, training specialized sappers and deploying devastating mining techniques against enemy walls."
 STATIC_MODIFIER_NAME_nd_guj_dest_arabian_sea_command: "Arabian Sea Command"
 STATIC_MODIFIER_DESC_nd_guj_dest_arabian_sea_command: "Gujarat's fleet dominates the Arabian Sea, heavy warships patrolling the trade lanes and extracting tribute from passing merchantmen."
 STATIC_MODIFIER_NAME_nd_guj_dest_imperial_court: "Imperial Court of Gujarat"
 STATIC_MODIFIER_DESC_nd_guj_dest_imperial_court: "A magnificent imperial administration centered on the darbar, where the sultan receives tribute from vassal kings and dispenses justice across a vast domain."
 STATIC_MODIFIER_NAME_nd_guj_dest_spymaster_sultan: "Spymaster Sultan"
 STATIC_MODIFIER_DESC_nd_guj_dest_spymaster_sultan: "The sultan rules through an extensive intelligence network, with agents embedded in every province and court, ensuring no threat goes undetected."
 STATIC_MODIFIER_NAME_nd_guj_dest_builder_of_ports: "Builder of Ports"
 STATIC_MODIFIER_DESC_nd_guj_dest_builder_of_ports: "Massive investment in port infrastructure across the trade network creates a web of Gujarati-built harbors that dominate Indian Ocean commerce."
 STATIC_MODIFIER_NAME_nd_guj_dest_merchant_princes: "Merchant Princes"
 STATIC_MODIFIER_DESC_nd_guj_dest_merchant_princes: "Gujarat's merchant diaspora has evolved from trading communities into political powers, with Gujarati commercial princes controlling markets from Aden to Malacca."
 STATIC_MODIFIER_NAME_nd_guj_dest_ocean_sovereign: "Ocean Sovereign"
 STATIC_MODIFIER_DESC_nd_guj_dest_ocean_sovereign: "Gujarat commands the Indian Ocean not merely as a trading power but as a political sovereign, with vassal ports and tributary states acknowledging the sultanate's maritime supremacy."
 STATIC_MODIFIER_NAME_nd_guj_dest_cloth_of_gold: "Cloth of Gold"
 STATIC_MODIFIER_DESC_nd_guj_dest_cloth_of_gold: "Gujarat's textile industry has achieved global dominance, with Gujarati silk and fine cloth adorning the elites of every civilization from Europe to China."
 nd_guj_darbar_i_khas: "Darbar-i-Khas"
 nd_guj_darbar_i_khas_desc: "A magnificent imperial audience hall where the Sultan Supreme receives tribute from vassal kings and dispenses justice, symbol of Gujarat's dominion over the subcontinent."
 nd_guj_bandar_bozorg: "Bandar-e-Bozorg"
 nd_guj_bandar_bozorg_desc: "A great port complex serving as the central hub of Gujarat's Indian Ocean trade empire, with vast warehouses, shipyards, and counting houses handling the commerce of three continents."
 nd_guj_darbar_upkeep: "Darbar Maintenance"
 nd_guj_darbar_upkeep_desc: "Fine cloth, furniture, and paper for the ceremonies, records, and furnishings of the imperial audience hall."
 nd_guj_bandar_operations: "Great Port Operations"
 nd_guj_bandar_operations_desc: "Timber, tar, paper, and tools for the ongoing maintenance of docks, warehouses, and the naval facilities of the great port."
