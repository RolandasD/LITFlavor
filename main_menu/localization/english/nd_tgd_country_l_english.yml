l_english:
 TGD: "Great Tang"
 TGD_ADJ: "Tang"
 TGD_f: "Great Tang"
 TGD_f_desc: "The Tang dynasty was China's cosmopolitan golden age, when the Silk Road flowed through Chang'an and Chinese power projected deep into Central Asia. Though the dynasty fell in 907, its memory endured as the aspirational ideal of Chinese empire — a realm defined not by walls but by roads, where Buddhist monks, Sogdian merchants, and Turkic generals all served beneath the dragon banner. Restoring the Great Tang means reuniting the Chinese heartland with the western corridor and reclaiming mastery of the Silk Road."
