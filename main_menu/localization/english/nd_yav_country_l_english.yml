l_english:
 YAV: "Yavana Empire"
 YAV_ADJ: "Yavana"
 YAV_f: "Yavana Empire"
 YAV_f_desc: "The Yavana Empire represents a revival of the ancient Indo-Greek kingdoms that once flourished in the lands of Sindh and Gandhara. 'Yavana,' the term used in Indian sources for Greeks and their descendants, evokes the extraordinary Greco-Buddhist synthesis that produced some of the subcontinent's greatest art and philosophy. Under a Sammitiya Buddhist ruler of Sindhi origin, this restoration fuses Hellenistic political traditions with the dharmic culture of the Indus valley, reclaiming the legacy of Menander and Demetrius."
