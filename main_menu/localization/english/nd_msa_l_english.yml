l_english:
 STATIC_MODIFIER_NAME_nd_msa_thalassocratic_emporium: "Thalassocratic Emporium"
 STATIC_MODIFIER_DESC_nd_msa_thalassocratic_emporium: "The Straits of Malacca are the crossroads of the known world, and we are their gatekeepers. Every vessel bearing silk from China, spices from the Moluccas, or cloth from India must pass through our waters. We shall build the greatest entrepot the world has ever seen."
 STATIC_MODIFIER_NAME_nd_msa_sultanate_of_the_faithful: "Sultanate of the Faithful"
 STATIC_MODIFIER_DESC_nd_msa_sultanate_of_the_faithful: "From the Hukum Kanun Melaka to the madrasas that dot our cities, the Malay sultanate is a beacon of Islamic civilization in the eastern seas. Our legal codes govern trade and justice, our scholars illuminate the faith, and our Sultan rules as the shadow of God on earth."
 STATIC_MODIFIER_NAME_nd_msa_maritime_law_enforced: "Maritime Law Enforced"
 STATIC_MODIFIER_DESC_nd_msa_maritime_law_enforced: "The Undang-Undang Laut Melaka is enforced with an iron hand. Pirates are hunted, tolls are collected, and every vessel in our waters answers to the Laksamana."
 STATIC_MODIFIER_NAME_nd_msa_maritime_law_liberal: "Maritime Law Liberalized"
 STATIC_MODIFIER_DESC_nd_msa_maritime_law_liberal: "The Undang-Undang Laut Melaka encourages free passage and fair dealing. Merchants from every nation know that the Straits are open to honest trade."
 STATIC_MODIFIER_NAME_nd_msa_johor_resistance: "Johor Resistance"
 STATIC_MODIFIER_DESC_nd_msa_johor_resistance: "The fall of Malacca steeled our resolve. From Johor, the heirs of the sultanate wage a tireless campaign to reclaim what was lost, drawing strength from the jungle and the loyalty of the Malay people."
 nd_msa.1.t: "The Birth of Malaya"
 nd_msa.1.d: "The Malay Peninsula stands united under a single sultanate for the first time since the great days of Malacca. The Straits stretch before us — the richest sea lane in all the world, where the riches of China, India, and the Spice Islands converge. Our court draws scholars and merchants from across the Islamic world, and the Hukum Kanun Melaka provides a legal framework admired from Gujarat to Guangzhou.\n\nBut what kind of state shall this new Malaya be? Shall we build upon our command of the Straits, turning every port into a warehouse of the world's trade — or shall we look inward to the strength of our faith and law, making the sultanate a model of Islamic governance that lesser rulers will emulate?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_msa.1.a: "We are the gatekeepers of the Straits."
 nd_msa.1.b: "We are the servants of God and the law."
 nd_msa.2.t: "The Undang-Undang Laut Melaka"
 nd_msa.2.d: "The sea captains of the sultanate have gathered at the court of the Sultan to codify the maritime laws that govern our waters. The Undang-Undang Laut Melaka — the Maritime Laws of Malacca — will regulate everything from the duties of a ship's captain to the rights of passengers, from the division of salvage to the punishment of mutiny.\n\nCompiled under the authority of the Laksamana, these laws draw on centuries of Malay seafaring wisdom and Islamic jurisprudence. They will define how trade is conducted across the Straits. The question is whether these laws should prioritize strict enforcement of tolls and anti-piracy patrols, or whether a more liberal approach — encouraging free passage and attracting merchants through fair dealing — would better serve the sultanate's interests."
 nd_msa.2.a: "The Laksamana shall enforce order upon these waters."
 nd_msa.2.b: "Let merchants know the Straits are open to all who deal fairly."
 nd_msa.3.t: "The Fall of Malacca and the Johor Successor"
 nd_msa.3.d: "Malacca, the jewel of the Straits, has been seized by a foreign power. Sultan Mahmud Shah, the last ruler of old Malacca, retreated south with his court and warriors to establish a new base at Johor. His sons would found the successor sultanates of Johor and Perak, each carrying forward the traditions and legitimacy of Malacca.\n\nThe Johor Sultanate, backed by the loyalty of the Orang Laut sea nomads and the memory of Malacca's greatness, wages a guerrilla campaign to deny the invaders control of the Straits. The jungle hinterland provides refuge, while Malay knowledge of coastal waters gives the sultans an advantage that no foreign fleet can easily overcome. The spirit of resistance burns bright."
 nd_msa.3.a: "Malacca may have fallen, but Malaya endures."
 nd_msa.4.t: "The Tin of Perak"
 nd_msa.4.d: "Rich deposits of tin have been discovered in the river valleys of Perak. The metal, essential for pewter, bronze, and increasingly for industrial applications, flows from Perak's mines to the ports of the peninsula and from there to the world. The Malay tin trade transforms Perak from a quiet riverside sultanate into one of the wealthiest states in Southeast Asia.\n\nChinese miners flock to the diggings, Bugis traders handle the export, and the Sultan of Perak grows rich from the taxes levied on every ingot that leaves his territory. Tin joins spices and pepper as the pillars of the Malay economy."
 nd_msa.4.a: "Let the tin flow, and the wealth shall follow."
 nd_msa_orang_laut_alliance: "Orang Laut Alliance"
 nd_msa_orang_laut_alliance_desc: "The Orang Laut — the sea people — are the eyes and arms of the sultanate upon the water. These seafaring nomads patrol the straits, repel pirates, and guide merchant vessels to our ports in exchange for royal patronage and titles."
 nd_msa_hulubalang_tradition: "Hulubalang Tradition"
 nd_msa_hulubalang_tradition_desc: "The Hulubalang are the elite warriors of the Malay court, sworn to the Sultan's service. Armed with the kris, the wavy-bladed dagger sacred to Malay martial culture, they serve as both palace guards and shock troops in battle."
 nd_msa_entrepot_system: "Entrepot System"
 nd_msa_entrepot_system_desc: "Malacca's genius was never production but redistribution. Goods from China, India, Arabia, and the Spice Islands converge in Malay warehouses before being reshipped across the known world."
 nd_msa_adat_governance: "Adat Governance"
 nd_msa_adat_governance_desc: "Before Islam and before the sultanate, the Malay world was governed by adat — customary law. These ancient traditions of consensus, reciprocity, and local authority form the foundation upon which the sultanate builds its administration."
 nd_msa_istana_tradition: "Istana Tradition"
 nd_msa_istana_tradition_desc: "The Istana — the royal palace — is the heart of Malay political life. Elaborate court ceremonies, strict protocol, and the ritual display of regalia reinforce the Sultan's divine mandate and the hierarchy of the realm."
 nd_msa_bendahara_laksamana: "Bendahara-Laksamana System"
 nd_msa_bendahara_laksamana_desc: "The Malay sultanate divides governance between the Bendahara, who administers domestic affairs and diplomacy, and the Laksamana, who commands the fleet and enforces maritime law. This dualistic system prevents any single official from accumulating too much power."
 nd_msa_islamic_learning: "Islamic Learning Centers"
 nd_msa_islamic_learning_desc: "Malacca is not merely a trading port — it is a center of Islamic scholarship where ulama from Arabia, India, and Java gather to teach and debate. The madrasas of the sultanate train scholars, jurists, and administrators who carry the faith across the archipelago."
 nd_msa_undang_undang_laut: "Undang-Undang Laut Melaka"
 nd_msa_undang_undang_laut_desc: "The Maritime Laws of Malacca regulate every aspect of seafaring life, from the authority of a ship's captain to the treatment of passengers and cargo. Compiled under royal authority, they represent the most sophisticated body of maritime law in Southeast Asia."
 nd_msa_cosmopolitan_port: "Cosmopolitan Port"
 nd_msa_cosmopolitan_port_desc: "Gujarati Muslims, Tamil Hindus, Chinese Buddhists, and Javanese merchants mingle freely in Malacca's markets. This tolerance of all faiths and cultures is not mere idealism — it is the secret to the port's commercial success."
 nd_msa_penjajap_warships: "Penjajap Warships"
 nd_msa_penjajap_warships_desc: "The penjajap is a long, narrow war galley designed for the shallow waters of the Straits. Fast under both sail and oar, these vessels excel at raiding, pursuit, and coastal warfare where deep-keeled European ships cannot follow."
 nd_msa_lancaran_tradition: "Lancaran Tradition"
 nd_msa_lancaran_tradition_desc: "The lancaran is a medium-sized Malay warship, faster than a jong but more heavily armed than a raiding perahu. Purpose-built for trade escort and anti-piracy operations, lancarans are the workhorses of the Malay fleet."
 nd_msa_strait_defense: "Strait Defense Network"
 nd_msa_strait_defense_desc: "Watchtowers and signal stations along the Straits allow the sultanate to monitor all maritime traffic and respond swiftly to threats. This network turns the narrow waters into a defensive asset rather than a vulnerability."
 nd_msa_johor_successor: "Johor Successor State"
 nd_msa_johor_successor_desc: "When Malacca fell, its heirs did not perish. The sultans of Johor carried forward the legitimacy and traditions of old Malacca, waging guerrilla warfare against foreign occupiers and maintaining the Malay claim to the Straits."
 nd_msa_spice_redistribution: "Spice Redistribution"
 nd_msa_spice_redistribution_desc: "Cloves from the Moluccas, pepper from Sumatra, cinnamon from Lanka — the spices of the East converge in Malay entrepots, where they are graded, repackaged, and shipped onward to the markets of India, Arabia, and beyond."
 nd_msa_perak_tin_boom: "Perak Tin Boom"
 nd_msa_perak_tin_boom_desc: "The alluvial tin deposits of Perak's river valleys are among the richest in the world. Chinese miners, Bugis middlemen, and Malay sultans all profit from the tin trade, which transforms the peninsula's economy."
 nd_msa_hukum_kanun: "Hukum Kanun Melaka"
 nd_msa_hukum_kanun_desc: "The Hukum Kanun Melaka is a comprehensive legal code blending Islamic sharia with Malay customary law. It covers constitutional, criminal, commercial, and family law, providing the legal foundation for the sultanate's administration."
 nd_msa_ghali_besar_tradition: "Ghali Besar Tradition"
 nd_msa_ghali_besar_tradition_desc: "The Ghali Besar — the great galley — is the largest warship in the Malay fleet. Propelled by hundreds of oarsmen and bristling with swivel guns, these vessels defend the Straits against all comers."
 nd_msa_rivalry_modernization: "Rivalry Modernization"
 nd_msa_rivalry_modernization_desc: "Competition between the Malay sultanates — Johor against Aceh, Perak against Selangor — drives military innovation. Gunpowder weapons, professional soldiers, and European-influenced fortifications gradually replace older methods of war."
 nd_msa_pelabuhan_tradition: "Pelabuhan Tradition"
 nd_msa_pelabuhan_tradition_desc: "The pelabuhan — the great harbor — is more than a dock. It is a self-contained commercial district with warehouses, shipyards, customs houses, and quarters for merchants of every nation. Building a pelabuhan declares a port open to the world."
 nd_msa_bugis_alliance: "Bugis Alliance"
 nd_msa_bugis_alliance_desc: "The Bugis of Sulawesi are renowned as both fierce warriors and shrewd merchants. Their alliance with the Malay sultanates brings mercenary swords, trading expertise, and connections to the maritime networks of the eastern archipelago."
 nd_msa_court_patronage: "Sultanate Court Patronage"
 nd_msa_court_patronage_desc: "The Malay court nurtures a rich literary and artistic tradition. The Hikayat Hang Tuah, the Sejarah Melayu, and countless other works of poetry and history are composed under royal patronage, establishing the Malay language as the lingua franca of maritime Southeast Asia."
 nd_msa_global_pepper: "Global Pepper Trade"
 nd_msa_global_pepper_desc: "Pepper from the interior of the Malay Peninsula and from Sumatran tributary states enters world markets through our ports. The demand from Europe, India, and China ensures that pepper remains one of the most valuable commodities in the Malay economy."
 nd_msa_diaspora_network: "Malay Diaspora Network"
 nd_msa_diaspora_network_desc: "Malay merchants and settlers are found from the coasts of India to the Philippines, from Siam to the Moluccas. This far-flung diaspora provides intelligence, commercial connections, and diplomatic leverage across maritime Asia."
 nd_msa_modern_lancaran: "Modern Lancaran Fleet"
 nd_msa_modern_lancaran_desc: "The lancaran tradition evolves with the times. Modern patrol vessels combine European rigging with Malay hull design, creating fast, versatile ships ideally suited for the shallow, island-studded waters of the Straits."
 nd_msa_centralized_sultanate: "Centralized Sultanate"
 nd_msa_centralized_sultanate_desc: "The Sultan tightens his grip on the reins of power, subordinating the Bendahara and Temenggung to direct royal authority. Provincial chiefs are replaced with appointed governors, and tax collection is systematized."
 nd_msa_tin_industry: "Tin Smelting Industry"
 nd_msa_tin_industry_desc: "Advanced smelting techniques transform raw tin ore into high-quality ingots for export. The tin industry employs thousands and generates enormous revenue for the sultanate's treasury."
 nd_msa_blockade_mastery: "Blockade Mastery"
 nd_msa_blockade_mastery_desc: "Centuries of controlling the narrowest sea lane in Asia have given the Malay fleet an unmatched understanding of blockade warfare. No ship passes through the Straits without the Sultan's knowledge and consent."
 nd_msa_silat_tradition: "Silat Tradition"
 nd_msa_silat_tradition_desc: "Silat, the Malay martial art, is codified from its many regional variants into a formal discipline taught in royal courts and military schools. The graceful but deadly art emphasizes speed, leverage, and the lethal use of the kris."
 nd_msa_literary_renaissance: "Nusantara Literary Renaissance"
 nd_msa_literary_renaissance_desc: "The Malay language achieves its full flowering as the literary lingua franca of the archipelago. From the royal chronicles of the Sejarah Melayu to the romantic epics of the Hikayat tradition, Malay literature defines the cultural identity of the region."
 nd_msa_modern_harbor: "Modern Harbor Infrastructure"
 nd_msa_modern_harbor_desc: "Steam-powered cranes, deep-water berths, and warehouses built to European specifications transform Malay ports into modern commercial facilities capable of handling the massive volume of world trade that passes through the Straits."
 nd_msa_national_awakening: "Malay National Awakening"
 nd_msa_national_awakening_desc: "A new generation of Malay intellectuals, educated in both Islamic and Western traditions, articulates a vision of Malay national identity that transcends individual sultanates. The idea of a unified Malay nation takes root."
 nd_msa_plantation_economy: "Plantation Economy"
 nd_msa_plantation_economy_desc: "Rubber, palm oil, and other plantation crops diversify the Malay economy beyond tin and spices. The fertile soils and tropical climate of the peninsula prove ideal for large-scale commercial agriculture."
 nd_msa_naval_modernization: "Naval Modernization"
 nd_msa_naval_modernization_desc: "Steam-powered warships and modern artillery replace the galleys and lancarans of old. The Malay fleet adapts to the new era of naval warfare while retaining its mastery of the strait waters."
 nd_msa_constitutional_sultanate: "Constitutional Sultanate"
 nd_msa_constitutional_sultanate_desc: "The absolute power of the Sultan gives way to a constitutional framework that balances royal authority with the rights of the people. A modern bureaucracy administers the state, while the Sultan retains his role as symbol and religious guardian."
 nd_msa_straits_integration: "Straits Settlements Integration"
 nd_msa_straits_integration_desc: "The great ports of the peninsula — Malacca, Penang, Singapore — are bound together into an integrated economic zone. Unified customs, standardized weights, and coordinated shipping schedules turn the Straits into a single commercial entity."
 n_nd_msa_orang_laut_raider: "Orang Laut Raider"
 n_nd_msa_orang_laut_raider_desc: "The Orang Laut — the sea people — serve the Sultan as naval irregulars, using their intimate knowledge of coastal waters to patrol the straits, hunt pirates, and harry enemy shipping."
 a_nd_msa_hulubalang: "Hulubalang"
 a_nd_msa_hulubalang_desc: "The Hulubalang are the elite warriors of the Malay court. Armed with the sacred kris and trained in silat, they serve as both palace guards and shock infantry, their fanatical loyalty matched only by their skill in close combat."
 n_nd_msa_penjajap: "Penjajap"
 n_nd_msa_penjajap_desc: "A long, narrow war galley designed for the shallow waters of the Straits. The penjajap excels at fast raiding and coastal warfare, darting through channels where heavier vessels cannot follow."
 n_nd_msa_lancaran: "Lancaran"
 n_nd_msa_lancaran_desc: "A medium-sized Malay warship combining sail and oar power. The lancaran serves as the primary trade escort and anti-piracy vessel, fast enough to chase down raiders and well-armed enough to deter them."
 n_nd_msa_ghali_besar: "Ghali Besar"
 n_nd_msa_ghali_besar_desc: "The great galley of the Malay fleet, propelled by hundreds of oarsmen and armed with swivel guns. The Ghali Besar is the Sultan's instrument of naval authority over the Straits."
 n_nd_msa_modern_lancaran: "Modern Lancaran"
 n_nd_msa_modern_lancaran_desc: "An updated patrol vessel blending Malay shallow-draft design with modern rigging and armament. The modern lancaran maintains the traditional Malay advantage in strait and archipelagic waters."
 nd_msa_entrepot_warehouse: "Entrepot Warehouse"
 nd_msa_entrepot_warehouse_desc: "A massive warehouse complex where goods from across the known world are stored, graded, and reshipped. The entrepot warehouse is the physical infrastructure of the Malay middleman economy."
 nd_msa_istana: "Istana"
 nd_msa_istana_desc: "The Istana is the royal palace of a Malay sultanate, a center of political authority, ceremonial display, and cultural patronage. Its elaborate architecture and court rituals embody the majesty of the Malay ruling tradition."
 nd_msa_tin_smeltery: "Tin Smeltery"
 nd_msa_tin_smeltery_desc: "A processing facility where raw tin ore from the river diggings is smelted into pure ingots for export. The smeltery represents the industrial heart of Perak's booming tin economy."
 nd_msa_madrasa: "Malay Madrasa"
 nd_msa_madrasa_desc: "An Islamic school where scholars study the Quran, jurisprudence, and the sciences. The madrasas of the Malay sultanate train the jurists, administrators, and religious leaders who govern the realm and spread the faith."
 nd_msa_strait_watchtower: "Strait Watchtower"
 nd_msa_strait_watchtower_desc: "A fortified observation post along the Straits of Malacca, enabling the sultanate to monitor maritime traffic, detect pirates, and coordinate naval patrols across its territorial waters."
 nd_msa_pelabuhan: "Pelabuhan"
 nd_msa_pelabuhan_desc: "A great harbor complex with deep-water berths, warehouses, shipyards, and customs facilities. The pelabuhan is the commercial gateway of the sultanate, open to merchants of every nation."
 nd_msa_pm_spice_redistribution: "Spice Redistribution"
 nd_msa_pm_spice_redistribution_desc: "The grading and repackaging of spices from the eastern archipelago for onward shipment to India, Arabia, and China."
 nd_msa_court_ceremony: "Court Ceremony"
 nd_msa_court_ceremony_desc: "The elaborate rituals and protocol of the Malay royal court, consuming fine silks and cloths in the display of majesty."
 nd_msa_tin_smelting: "Tin Smelting"
 nd_msa_tin_smelting_desc: "Raw tin ore is smelted into refined ingots using charcoal furnaces, producing tin for export across the known world."
 nd_msa_manuscript_copying: "Manuscript Copying"
 nd_msa_manuscript_copying_desc: "The transcription of religious texts, legal codes, and literary works by madrasa scholars."
 nd_msa_watchtower_upkeep: "Watchtower Upkeep"
 nd_msa_watchtower_upkeep_desc: "Maintenance of the watchtower garrison with weapons and building materials."
 nd_msa_harbor_operations: "Harbor Operations"
 nd_msa_harbor_operations_desc: "The ongoing maintenance and supply requirements of a major commercial harbor."
 levy_nd_msa_hulubalang: "Hulubalang Levy"
 levy_nd_msa_hulubalang_desc: "Elite kris-wielding warriors raised from the soldiers and nobles of the sultanate."
 levy_nd_msa_penjajap: "Penjajap Levy"
 levy_nd_msa_penjajap_desc: "War galleys crewed by the maritime communities of the Straits."
 levy_nd_msa_orang_laut: "Orang Laut Levy"
 levy_nd_msa_orang_laut_desc: "Sea nomad raiders who patrol the sultanate's coastal waters."
 a_nd_msa_bugis_warrior: "Bugis Warrior"
 a_nd_msa_bugis_warrior_desc: "Fierce warrior-merchants from Sulawesi, the Bugis serve the Malay sultanates as both mercenary soldiers and trade intermediaries. Their skill at flanking and aggressive combat makes them invaluable in battle."
 a_nd_msa_pendekar: "Pendekar"
 a_nd_msa_pendekar_desc: "Master practitioners of silat, the Malay martial art. The Pendekar are elite warriors whose speed, technique, and lethal proficiency with the kris make them devastating shock infantry."
 n_nd_msa_modern_corvette: "Modern Corvette"
 n_nd_msa_modern_corvette_desc: "A steam-age patrol warship adapted to the shallow, island-studded waters of the Straits. Fast and agile, the modern corvette maintains the Malay tradition of maritime dominance into the industrial era."
 nd_msa_plantation_estate: "Plantation Estate"
 nd_msa_plantation_estate_desc: "A large-scale agricultural estate producing rubber, palm oil, or other tropical cash crops. The plantation economy diversifies Malaya's wealth beyond tin and spices."
 nd_msa_plantation_processing: "Plantation Processing"
 nd_msa_plantation_processing_desc: "Pepper vines and other spice crops are cultivated, harvested, and prepared for the lucrative export trade."
 levy_nd_msa_pendekar: "Pendekar Levy"
 levy_nd_msa_pendekar_desc: "Elite silat masters raised from the soldiers of the sultanate."
 nd_msa_formed_tt: "Malaya has been formed"
 nd_msa_path_a_tt: "Chose Thalassocratic Emporium"
 nd_msa_path_b_tt: "Chose Sultanate of the Faithful"
 nd_msa_destiny: "Destiny of Malaya"
 nd_msa_destiny_desc: "The Malay Peninsula is united once more. Now the question is what this new Malaya shall become — a maritime empire spanning the seas, or a beacon of Islamic civilization illuminating the East. Stabilize the realm and set your course."
 nd_msa_dest_straits_gateway: "The Straits Gateway"
 nd_msa_dest_straits_gateway_desc: "Control both ends of the Straits of Malacca by seizing Palembang on Sumatra and Aceh at the western approach. With these great ports in our hands, no ship enters or leaves the Straits without Malay consent."
 nd_msa_dest_spice_monopoly: "The Spice Monopoly"
 nd_msa_dest_spice_monopoly_desc: "The fabulous wealth of the Spice Islands must flow through Malay hands alone. Seize Banda and Ternate, the twin hearts of the clove and nutmeg trade, and make our entrepots the sole gateway between East and West."
 nd_msa_dest_nusantara_thalassocracy: "Nusantara Thalassocracy"
 nd_msa_dest_nusantara_thalassocracy_desc: "From Makassar to Canton, every major port of the Eastern seas must answer to the Sultan of Malaya. Build the Emporium Agung — the Great Market — and prove that the age of the Malay thalassocracy has returned."
 nd_msa_dest_hukum_proclaimed: "The Hukum Kanun Proclaimed"
 nd_msa_dest_hukum_proclaimed_desc: "Proclaim the Hukum Kanun Melaka as the universal legal code of the sultanate, blending Islamic sharia with Malay customary law. Embrace the institution of banking to formalize commercial law, and let the world see that Malay justice is second to none."
 nd_msa_dest_eastern_light: "Light of the Eastern Seas"
 nd_msa_dest_eastern_light_desc: "Make the sultanate the foremost center of Islamic learning east of Baghdad. Embrace the printing press to spread the Quran and legal scholarship. Ensure paper is traded in your capital's market — the ink of scholars is the lifeblood of civilization."
 nd_msa_dest_dar_al_islam: "Dar al-Islam of the Archipelago"
 nd_msa_dest_dar_al_islam_desc: "The Malay sultanate stands as the undisputed heart of Islamic civilization in the eastern world. Embrace the scientific revolution, develop your realm to greatness, and complete the pilgrimage by bringing Mecca itself under your protection."
 nd_msa.5.t: "The Destiny of Malaya"
 nd_msa.5.d: "The peninsula is united, the straits secured. But this is merely the beginning. A greater destiny awaits — one that will be shaped by the choices we make in the years ahead. The traditions of our ancestors light the way forward."
 nd_msa.5.a: "Our destiny unfolds before us."
 nd_msa.6.t: "The Straits Gateway Secured"
 nd_msa.6.d: "From Aceh in the west to Palembang in the south, the approaches to the Straits of Malacca are now under Malay control. Every merchant vessel bearing silk, spices, or porcelain must pass through waters where the Sultan's writ runs. The great entrepot system can now function at its full potential — no rival power can divert trade around us."
 nd_msa.6.a: "The Straits are ours."
 nd_msa.7.t: "Masters of the Spice Trade"
 nd_msa.7.d: "Banda and Ternate, the fabled Spice Islands, now answer to the Sultan of Malaya. The cloves, nutmeg, and mace that the world craves pass through our warehouses before reaching any foreign port. This monopoly grants us enormous power — but how shall we wield it?\n\nWe could build upon our diplomatic relationships, using trade to bind allies and subjects to us through prosperity. Or we could arm our merchant fleet, ensuring that any nation that dares challenge our monopoly will face the full force of Malay naval power."
 nd_msa.7.a: "Trade binds the world to us."
 nd_msa.7.b: "Our merchants sail with cannons loaded."
 nd_msa.8.t: "The Nusantara Thalassocracy"
 nd_msa.8.d: "From the pepper gardens of Sumatra to the porcelain kilns of Guangzhou, from the tin mines of Perak to the clove groves of Ternate, the Malay thalassocracy spans the eastern seas. The Emporium Agung rises in our greatest port — a market of unimaginable scale where the wealth of three continents converges.\n\nShall we consolidate this empire through commerce and centralized administration, making our burghers the richest in the world? Or shall we assert ourselves as the unchallenged maritime hegemon, ensuring that our naval supremacy is beyond question?"
 nd_msa.8.a: "Let the Emporium Agung stand as our monument."
 nd_msa.8.b: "The seas bow to Malaya."
 nd_msa.9.t: "The Hukum Kanun Proclaimed"
 nd_msa.9.d: "In a great ceremony at the court of the Sultan, the Hukum Kanun Melaka is proclaimed as the universal legal code of the realm. Islamic sharia and Malay adat are woven together into a comprehensive system of law that governs commerce, family, criminal justice, and constitutional matters. Merchants from across the Indian Ocean recognize the fairness and sophistication of Malay courts."
 nd_msa.9.a: "Let justice reign in our lands."
 nd_msa.10.t: "The Light of the Eastern Seas"
 nd_msa.10.d: "Scholars from Arabia, Persia, India, and Java flock to the madrasas of the sultanate. The printing of the Quran and legal commentaries in Jawi script spreads Islamic learning to every corner of the archipelago. Our courts are renowned for their learning and our judges for their wisdom.\n\nShall we formalize the sharia court system, bringing Islamic jurisprudence to bear on every aspect of governance? Or shall we invest in expanding the madrasa network, making the sultanate the intellectual capital of the Islamic East?"
 nd_msa.10.a: "The law shall be our foundation."
 nd_msa.10.b: "Knowledge is the truest form of worship."
 nd_msa.11.t: "Dar al-Islam of the Archipelago"
 nd_msa.11.d: "The sultanate has achieved what no other Muslim state east of Delhi has accomplished — the creation of a true Dar al-Islam spanning the seas from the Malay Peninsula to the holy cities of Arabia. The Darul Hukum rises as the ultimate expression of our commitment to Islamic governance.\n\nShall we use this position to centralize authority under the Sultan as Commander of the Faithful, subordinating the nobility to the divine law? Or shall we become a beacon of faith that lifts all our people through education, culture, and communal solidarity?"
 nd_msa.11.a: "The Sultan is the shadow of God."
 nd_msa.11.b: "The faith belongs to all believers."
 STATIC_MODIFIER_NAME_nd_msa_dest_entrepot_dominance: "Entrepot Dominance"
 STATIC_MODIFIER_DESC_nd_msa_dest_entrepot_dominance: "Our trade network binds nations to us through mutual prosperity. Every court in Asia knows that Malay friendship means access to the richest markets in the world."
 STATIC_MODIFIER_NAME_nd_msa_dest_armed_trade: "Armed Trade"
 STATIC_MODIFIER_DESC_nd_msa_dest_armed_trade: "Our merchant vessels sail with guns loaded and crews battle-ready. The Malay trade monopoly is enforced not just by commercial superiority but by overwhelming naval force."
 STATIC_MODIFIER_NAME_nd_msa_dest_world_emporium: "World Emporium"
 STATIC_MODIFIER_DESC_nd_msa_dest_world_emporium: "The Emporium Agung stands as the greatest marketplace in the eastern world, a monument to Malay commercial genius where the burghers of a dozen nations trade under Malay law."
 STATIC_MODIFIER_NAME_nd_msa_dest_maritime_hegemon: "Maritime Hegemon"
 STATIC_MODIFIER_DESC_nd_msa_dest_maritime_hegemon: "No fleet dares challenge Malay supremacy on the eastern seas. From the Straits of Malacca to the South China Sea, the Sultan's navy is the final arbiter of all maritime disputes."
 STATIC_MODIFIER_NAME_nd_msa_dest_sharia_courts: "Sharia Courts"
 STATIC_MODIFIER_DESC_nd_msa_dest_sharia_courts: "Formal sharia courts administer Islamic law across the sultanate, providing justice and stability while regulating commercial activity under divine guidance."
 STATIC_MODIFIER_NAME_nd_msa_dest_madrasa_network: "Madrasa Network"
 STATIC_MODIFIER_DESC_nd_msa_dest_madrasa_network: "An extensive network of madrasas educates the people of the sultanate in both religious scholarship and worldly sciences, pushing the frontiers of knowledge in the Islamic East."
 STATIC_MODIFIER_NAME_nd_msa_dest_ummah_united: "Ummah United"
 STATIC_MODIFIER_DESC_nd_msa_dest_ummah_united: "The Sultan rules as Commander of the Faithful, subordinating the old aristocratic order to the divine law. Spiritual authority flows from the crown, binding the ummah under a single righteous sovereign."
 STATIC_MODIFIER_NAME_nd_msa_dest_beacon_of_faith: "Beacon of Faith"
 STATIC_MODIFIER_DESC_nd_msa_dest_beacon_of_faith: "The sultanate shines as a beacon of Islamic civilization, where communal solidarity and scholarly excellence lift all believers toward a more enlightened future."
 nd_msa_emporium_agung: "Emporium Agung"
 nd_msa_emporium_agung_desc: "The Great Market — a colossal trading complex where the goods of three continents converge. Silk from China, spices from the Moluccas, cloth from India, and silver from Japan change hands under a single roof governed by Malay commercial law."
 nd_msa_emporium_operations: "Emporium Operations"
 nd_msa_emporium_operations_desc: "The daily operations of the Emporium Agung require vast quantities of materials to maintain its warehouses, docks, and administrative offices."
 nd_msa_darul_hukum: "Darul Hukum"
 nd_msa_darul_hukum_desc: "The House of Law — a grand complex combining a supreme sharia court, a royal library, and a madrasa of the highest order. It is the institutional heart of Malay Islamic governance, where jurisprudence and scholarship serve the faith."
 nd_msa_darul_hukum_operations: "Court of Jurisprudence"
 nd_msa_darul_hukum_operations_desc: "The ongoing operation of the Darul Hukum requires scholarly materials, religious supplies, and administrative goods."
