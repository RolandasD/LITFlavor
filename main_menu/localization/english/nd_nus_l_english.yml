l_english:
 STATIC_MODIFIER_NAME_nd_nus_mandala_thalassocracy: "Mandala Thalassocracy"
 STATIC_MODIFIER_DESC_nd_nus_mandala_thalassocracy: "Nusantara rules as a maritime mandala — concentric rings of sovereignty extending outward from sacred Java across ten thousand islands, each vassal bound by trade and tribute to the center."
 STATIC_MODIFIER_NAME_nd_nus_spice_archipelago: "Spice Archipelago"
 STATIC_MODIFIER_DESC_nd_nus_spice_archipelago: "The cloves of Ternate, the nutmeg of Banda, the pepper of Banten — Nusantara controls the sources of the world's most coveted goods, and every merchant vessel that passes through these waters enriches the archipelago."
 nd_nus.1.t: "The Unification of Nusantara"
 nd_nus.1.d: "The dream of Gajah Mada is realized anew. From the rice paddies of Java to the spice groves of the Moluccas, from the trading ports of Sumatra to the shores of Sulawesi, the scattered islands of the archipelago answer to a single authority. The concept of Nusantara — the entirety of the island realm between the seas — is no longer a poet's vision but a political reality.\n\nBut what kind of realm shall this be? The archipelago's power can be projected outward through fleets that command every strait and sea lane, binding vassals through maritime supremacy as Srivijaya once did. Or it can be turned inward, cultivating the extraordinary wealth that flows from controlling the source of the world's most precious spices — making Nusantara not a conqueror of seas, but an indispensable marketplace that the whole world must court.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_nus.1.a: "Our fleets shall command every strait"
 nd_nus.1.b: "The world will come to us for spice"
 nd_nus.2.t: "The Majapahit Golden Age"
 nd_nus.2.d: "In the year 1365, the court poet Prapanca composed the Nagarakretagama, describing a realm that stretched from Sumatra to Papua, from Borneo to Bali. At its center sat King Hayam Wuruk in the capital of Trowulan — a city of canals and temples, of red brick candi rising above the rice plains of eastern Java.\n\nBut the true architect of this empire was the Mahapatih Gajah Mada, who swore the legendary Palapa Oath: he would not taste spice until the entire archipelago was united under Majapahit's banner. Through a combination of military campaigns, diplomatic marriages, and trade alliances, he made good on his word. The question now is whether to follow his path of conquest outward, or to perfect the civilization he built at home."
 nd_nus.2.a: "We honor Gajah Mada's oath — the archipelago is ours by right"
 nd_nus.2.b: "Trowulan shall outshine every capital in the world"
 STATIC_MODIFIER_NAME_nd_nus_oath_of_gajah_mada: "Oath of Gajah Mada"
 STATIC_MODIFIER_DESC_nd_nus_oath_of_gajah_mada: "As Gajah Mada once swore to unite all Nusantara under a single banner, so too does the realm now pursue the completion of his vision through military strength and righteous conquest."
 STATIC_MODIFIER_NAME_nd_nus_trowulan_splendor: "Splendor of Trowulan"
 STATIC_MODIFIER_DESC_nd_nus_trowulan_splendor: "The capital blazes with the red brick grandeur of a hundred candi temples. Poets, architects, and scholars gather at a court that rivals any in the known world."
 nd_nus.3.t: "Sultan Agung's Siege of Batavia"
 nd_nus.3.d: "In 1628, Sultan Agung of Mataram assembled the largest Javanese army in living memory and marched on Batavia — the fortified trading post of the VOC that had planted itself uninvited on the north coast of Java. His forces numbered in the tens of thousands, supported by war elephants and bronze cetbang cannon. The siege was a titanic clash between Javanese sovereignty and European commercial imperialism.\n\nThough the first siege failed due to supply difficulties and Dutch naval superiority, Agung launched a second attempt in 1629, this time attempting to establish rice granaries along the route. The campaigns revealed both the military potential and the logistical challenges of resisting a naval power from a land base. Agung's legacy endures — he proved that Nusantara would not submit without a fight."
 nd_nus.3.a: "We shall learn from Agung's campaigns and strike harder"
 nd_nus.3.b: "Agung was wise to fortify — let no invader hold our soil"
 STATIC_MODIFIER_NAME_nd_nus_agung_military_reform: "Agung's Military Reform"
 STATIC_MODIFIER_DESC_nd_nus_agung_military_reform: "Sultan Agung's campaigns against Batavia demonstrated that the defense of Nusantara demands offensive capability — the ability to project force, sustain sieges, and drive foreign interlopers from the archipelago."
 STATIC_MODIFIER_NAME_nd_nus_agung_consolidation: "Agung's Consolidation"
 STATIC_MODIFIER_DESC_nd_nus_agung_consolidation: "The lesson of Batavia is not that the siege failed, but that no foreign fortress should have been permitted to rise in the first place. Every coast must be watched, every approach defended, every invader bled by attrition."
 nd_nus.4.t: "Masters of the Spice Trade"
 nd_nus.4.d: "For centuries, the tiny volcanic islands of the Moluccas produced the only cloves and nutmeg in the world. The Banda Islands, barely visible specks in the vast ocean, supplied every grain of mace and nutmeg consumed from China to Venice. And it was the merchants and sultans of Nusantara who controlled the first and most profitable links in this chain — buying from growers, storing in great gudang warehouses, and selling to Arab, Indian, and Chinese traders at enormous markup.\n\nNow this monopoly has been consolidated under a single political authority. Where once a dozen competing sultanates undercut each other, Nusantara speaks with one voice and sets one price. The world has no choice but to pay it."
 nd_nus.4.a: "The spice must flow — through our hands alone"
 nd_nus.5.t: "The Nusantara Awakening"
 nd_nus.5.d: "From Aceh to Papua, from the mountains of Sumatra to the spice groves of Ternate, a new idea takes hold: that the archipelago is not merely a collection of kingdoms and sultanates, but a single civilization bound by shared seas, interwoven trade, and centuries of cultural exchange. Javanese, Sundanese, Malay, Bugis, Balinese, Moluccan — the peoples of the islands are many, but the ocean that connects them is one.\n\nThis is the awakening of Nusantara consciousness — the realization that unity does not require uniformity, that a thousand islands can share a single destiny without abandoning their distinct identities. Gotong royong, the ancient tradition of communal labor and mutual aid, becomes the philosophical foundation of a modern state."
 nd_nus.5.a: "Bhinneka Tunggal Ika — unity in diversity"
 nd_nus_srivijaya_legacy: "Srivijaya Maritime Legacy"
 nd_nus_srivijaya_legacy_desc: "The traditions of Srivijaya, the archipelago's first great thalassocratic empire, live on in the seamanship and maritime commerce of Nusantara."
 nd_nus_sawah_irrigation: "Sawah Irrigation"
 nd_nus_sawah_irrigation_desc: "The subak water temple system manages the intricate terraced rice paddies that feed the dense populations of Java and Bali."
 nd_nus_spice_knowledge: "Ancient Spice Knowledge"
 nd_nus_spice_knowledge_desc: "Generations of cultivation and trade in cloves, nutmeg, and pepper give Nusantara unmatched expertise in the world's most valuable commodities."
 nd_nus_silat_tradition: "Silat Martial Tradition"
 nd_nus_silat_tradition_desc: "Pencak silat, the indigenous martial art of the archipelago, trains warriors in fluid close-combat techniques developed through centuries of inter-island warfare."
 nd_nus_mandala_statecraft: "Mandala Statecraft"
 nd_nus_mandala_statecraft_desc: "The mandala model of governance binds vassals through concentric rings of influence radiating from a sacred center, allowing the archipelago to be governed without rigid borders."
 nd_nus_majapahit_golden_age: "Majapahit Golden Age"
 nd_nus_majapahit_golden_age_desc: "Under Hayam Wuruk and Gajah Mada, Majapahit united the archipelago from its capital at Trowulan, creating the model for Nusantara's political unity."
 nd_nus_kris_tradition: "Kris Warrior Tradition"
 nd_nus_kris_tradition_desc: "The kris — the asymmetrical wavy-bladed dagger of Java — is both sacred heirloom and weapon of war, wielded by elite warriors trained in the art of silat."
 nd_nus_candi_tradition: "Candi Temple Tradition"
 nd_nus_candi_tradition_desc: "The red brick candi temples of eastern Java represent centuries of Hindu-Buddhist architectural mastery, centers of learning and devotion."
 nd_nus_pasar_tradition: "Pasar Trading Tradition"
 nd_nus_pasar_tradition_desc: "The great pasar marketplaces of Nusantara are where the products of a thousand islands converge — spices from the east, textiles from the west, rice from Java's heartland."
 nd_nus_archipelagic_navigation: "Archipelagic Navigation"
 nd_nus_archipelagic_navigation_desc: "Navigating ten thousand islands requires mastery of currents, monsoon winds, and star paths passed down through generations of seafaring peoples."
 nd_nus_prahu_raiders: "Prahu Raider Fleet"
 nd_nus_prahu_raiders_desc: "The double-outrigger prahu is the fastest vessel in island waters — ideal for raiding, coastal patrol, and the pursuit of enemy shipping through narrow straits."
 nd_nus_islamic_scholarship: "Islamic Scholarship"
 nd_nus_islamic_scholarship_desc: "Islam spread peacefully through the archipelago via Sufi traders and scholars. The pesantren boarding schools became centers of both religious learning and Javanese intellectual life."
 nd_nus_spice_monopoly: "Spice Monopoly"
 nd_nus_spice_monopoly_desc: "Control of the Moluccan spice sources — the world's only supply of cloves and nutmeg — gives Nusantara unparalleled leverage in global trade."
 nd_nus_cetbang_foundries: "Cetbang Bronze Foundries"
 nd_nus_cetbang_foundries_desc: "The Javanese cetbang cannon, cast in bronze, demonstrates an indigenous gunpowder tradition that predates European contact in the archipelago."
 nd_nus_shipbuilding_mastery: "Shipbuilding Mastery"
 nd_nus_shipbuilding_mastery_desc: "The galangan kapal royal shipyards produce jong, prahu, and kora-kora in quantities that make Nusantara a naval power to be reckoned with."
 nd_nus_sultanate_governance: "Sultanate Governance"
 nd_nus_sultanate_governance_desc: "The Islamic sultanates formalize archipelagic governance through syariah courts, harbor masters, and a bureaucracy adapted to the realities of island rule."
 nd_nus_kora_kora_fleet: "Kora-Kora War Fleet"
 nd_nus_kora_kora_fleet_desc: "The kora-kora is a massive Moluccan war galley crewed by hundreds of warriors, designed for the boarding actions and close-quarters naval combat of island warfare."
 nd_nus_pepper_exports: "Pepper and Spice Exports"
 nd_nus_pepper_exports_desc: "Banten, Aceh, and a dozen other ports funnel the archipelago's pepper, cloves, and nutmeg into the arteries of global commerce."
 nd_nus_wayang_arts: "Wayang Court Arts"
 nd_nus_wayang_arts_desc: "The shadow puppet theater of wayang kulit transmits the epic stories of the Ramayana and Mahabharata, binding diverse peoples through shared cultural heritage."
 nd_nus_fortress_resistance: "Fortress of Resistance"
 nd_nus_fortress_resistance_desc: "Coastal and inland benteng fortifications arise to defend Nusantara against European colonial incursions and assert sovereignty over the archipelago."
 nd_nus_sultan_agung_campaigns: "Sultan Agung's Campaigns"
 nd_nus_sultan_agung_campaigns_desc: "Sultan Agung of Mataram's sieges of Batavia in 1628-1629 demonstrated both the military potential and the fierce determination of Javanese resistance to colonialism."
 nd_nus_phinisi_tradition: "Phinisi Sailing Tradition"
 nd_nus_phinisi_tradition_desc: "The phinisi, a two-masted sailing vessel of Bugis-Makassar design, represents the pinnacle of Indonesian shipbuilding — fast, seaworthy, and built for long voyages."
 nd_nus_bugis_diaspora: "Bugis Diaspora"
 nd_nus_bugis_diaspora_desc: "The Bugis and Makassar peoples of Sulawesi are the archipelago's greatest seafarers — traders, mercenaries, and colonists who establish communities from Borneo to the Malay Peninsula."
 nd_nus_mataram_statecraft: "Mataram Statecraft"
 nd_nus_mataram_statecraft_desc: "The Sultanate of Mataram centralizes Javanese political authority, combining Islamic governance with pre-existing Javanese administrative traditions."
 nd_nus_anti_colonial_resistance: "Anti-Colonial Resistance"
 nd_nus_anti_colonial_resistance_desc: "From Aceh to Ternate, from Banten to Mataram, the peoples of Nusantara organize sustained resistance against European colonial encroachment."
 nd_nus_archipelagic_awakening: "Nusantara Awakening"
 nd_nus_archipelagic_awakening_desc: "A new consciousness emerges: the archipelago is not merely a collection of kingdoms but a single civilization united by shared seas and intertwined destinies."
 nd_nus_spice_industrialization: "Spice Industrialization"
 nd_nus_spice_industrialization_desc: "Modern processing, packaging, and export methods transform the archipelago's ancient spice trade into an industrial enterprise of global scale."
 nd_nus_maritime_sovereignty: "Maritime Sovereignty"
 nd_nus_maritime_sovereignty_desc: "Nusantara asserts sovereign control over the waters between its islands — the sea is not a border but the connective tissue of the nation."
 nd_nus_gotong_royong: "Gotong Royong"
 nd_nus_gotong_royong_desc: "The ancient Indonesian tradition of communal mutual aid becomes a governing philosophy — the state thrives when all its peoples labor together for the common good."
 nd_nus_pancasila_foundations: "Pancasila Foundations"
 nd_nus_pancasila_foundations_desc: "Unity in diversity — the philosophical principle that a nation of hundreds of cultures, languages, and faiths can coexist under a shared commitment to tolerance and mutual respect."
 a_nd_nus_kris_warriors: "Kris Warriors"
 a_nd_nus_kris_warriors_desc: "Elite Javanese infantry wielding the sacred kris dagger, trained in the ancient martial art of pencak silat. Their fighting style emphasizes sudden, devastating close-quarters strikes."
 a_nd_nus_kris_levy: "Kris Levy Warriors"
 a_nd_nus_kris_levy_desc: "Levy troops armed with the traditional kris, drawn from the villages and rice paddies of Java."
 a_nd_nus_cetbang: "Cetbang Artillery"
 a_nd_nus_cetbang_desc: "Bronze cannons cast in the Javanese tradition, predating European gunpowder weapons in the archipelago. The cetbang fires stone or iron projectiles with deadly accuracy."
 n_nd_nus_prahu: "Prahu Raider"
 n_nd_nus_prahu_desc: "A swift double-outrigger vessel built for speed and maneuverability in the shallow waters and narrow straits of the archipelago. Ideal for coastal raiding and pursuit."
 n_nd_nus_kora_kora: "Kora-Kora War Galley"
 n_nd_nus_kora_kora_desc: "A massive Moluccan war galley designed for boarding actions and close-quarters naval combat, crewed by hundreds of warriors from the spice islands."
 n_nd_nus_kora_kora_levy: "Kora-Kora Levy Galley"
 n_nd_nus_kora_kora_levy_desc: "War galleys crewed by levied islanders from the coastal communities of Nusantara."
 n_nd_nus_phinisi: "Phinisi"
 n_nd_nus_phinisi_desc: "The celebrated two-masted sailing vessel of Bugis-Makassar design, built for long ocean voyages. Fast and seaworthy, the phinisi dominates late-era Indonesian maritime trade and warfare."
 nd_nus_candi: "Candi Temple"
 nd_nus_candi_desc: "A red brick Hindu-Buddhist temple complex in the east Javanese tradition, serving as a center of religious devotion, cultural learning, and artistic patronage."
 nd_nus_pasar_agung: "Pasar Agung"
 nd_nus_pasar_agung_desc: "The Great Marketplace — a central bazaar where the products of ten thousand islands converge. Spices, textiles, precious metals, and ceramics flow through its stalls."
 nd_nus_galangan_kapal: "Galangan Kapal"
 nd_nus_galangan_kapal_desc: "A royal shipyard in the Javanese and Bugis tradition, producing jong, prahu, kora-kora, and phinisi for Nusantara's merchant and war fleets."
 nd_nus_benteng: "Benteng Perlawanan"
 nd_nus_benteng_desc: "A fortress of resistance — coastal and inland fortifications built to repel colonial invaders and assert Nusantara's sovereignty over its territory."
 nd_nus_pesantren: "Pesantren"
 nd_nus_pesantren_desc: "An Islamic boarding school in the Javanese tradition, where students study the Quran alongside Javanese literature, mathematics, and natural philosophy."
 nd_nus_sawah: "Sawah Terasering"
 nd_nus_sawah_desc: "Irrigated rice terraces managed by the subak water temple system — a marvel of agricultural engineering that sustains Java's dense population."
 nd_nus_padepokan: "Padepokan Silat"
 nd_nus_padepokan_desc: "A training ground for the ancient martial art of pencak silat, where warriors master the fluid combat techniques of the archipelago."
 nd_nus_gudang_rempah: "Gudang Rempah"
 nd_nus_gudang_rempah_desc: "A spice warehouse where cloves, nutmeg, pepper, and other precious trade goods are stored, graded, and prepared for export to the world's markets."
 nd_nus_pendopo_wayang: "Pendopo Wayang"
 nd_nus_pendopo_wayang_desc: "An open-air performance hall where the dalang puppeteer performs wayang kulit — shadow puppet theater that transmits the great epics and unifies the cultures of the archipelago."
 nd_nus_pelabuhan: "Pelabuhan Niaga"
 nd_nus_pelabuhan_desc: "A great trading port in the Srivijaya tradition, serving as an entrepot where goods from across the Indian Ocean and the South China Sea change hands."
 nd_nus_candi_maintenance: "Temple Upkeep"
 nd_nus_candi_maintenance_desc: "Stone and lumber for maintaining the candi temple's sacred precincts."
 nd_nus_spice_bazaar: "Spice Bazaar Operations"
 nd_nus_spice_bazaar_desc: "Pottery vessels and dyes for the great marketplace's operations."
 nd_nus_shipyard_operations: "Shipyard Operations"
 nd_nus_shipyard_operations_desc: "Lumber, naval supplies, tools, and tar consumed by the royal shipyard building and maintaining jong and prahu."
 nd_nus_benteng_upkeep: "Fortress Upkeep"
 nd_nus_benteng_upkeep_desc: "Stone for walls, weaponry and leather for the garrison's arms, and wheat to feed the soldiers of the benteng."
 nd_nus_pesantren_upkeep: "School Upkeep"
 nd_nus_pesantren_upkeep_desc: "Paper, writing materials, and cloth for the pesantren's religious scholars and students."
 nd_nus_irrigation_upkeep: "Sawah Rice Cultivation"
 nd_nus_irrigation_upkeep_desc: "The subak-managed terraces yield abundant rice harvests, sustained by bamboo and timber irrigation channels."
 nd_nus_padepokan_upkeep: "Training Ground Upkeep"
 nd_nus_padepokan_upkeep_desc: "Weapons, leather padding, and cloth for the silat warriors' training equipment and uniforms."
 nd_nus_spice_storage: "Spice Storage"
 nd_nus_spice_storage_desc: "Pottery vessels and pepper stocks held in the great spice warehouse."
 nd_nus_wayang_performances: "Wayang Performances"
 nd_nus_wayang_performances_desc: "Dyes for painted leather puppets, lumber for the performance stage, and cloth for the costumes of court performers."
 nd_nus_port_operations: "Port Operations"
 nd_nus_port_operations_desc: "Naval supplies, lumber, and salt consumed by the trading port's daily operations and provisioning of vessels."
 levy_nd_nus_kris_warriors: "Kris Warrior Levy"
 levy_nd_nus_kris_warriors_desc: "Levied kris-armed infantry from the villages of Java."
 levy_nd_nus_kora_kora: "Kora-Kora Levy"
 levy_nd_nus_kora_kora_desc: "Levied war galleys crewed by the islanders of Nusantara."
 nd_nus_formed_tt: "Nusantara has been formed"
 nd_nus_path_a_tt: "Chose Mandala Thalassocracy"
 nd_nus_path_b_tt: "Chose Spice Archipelago"
 nd_nus_destiny: "The Nusantara Mandate"
 nd_nus_destiny_desc: "With the archipelago unified under a single banner, the mandate of heaven falls upon Nusantara. Stability must be maintained as the foundation for greater ambitions."
 nd_nus_dest_strait_masters: "Masters of the Strait"
 nd_nus_dest_strait_masters_desc: "Seize control of the Strait of Malacca — the narrow passage through which all trade between the Indian Ocean and the South China Sea must flow. The Malay Peninsula must bend to Nusantara's will."
 nd_nus_dest_champa_seas: "Dominion Over the Champa Seas"
 nd_nus_dest_champa_seas_desc: "With Malacca secured, project Nusantara's maritime power northward into the waters of Champa and the Gulf of Siam. Establish naval supremacy over the entire South China Sea."
 nd_nus_dest_samudra_raja: "Samudra Raja"
 nd_nus_dest_samudra_raja_desc: "Lord of the Seas. Plant Nusantara's banner on the mainland itself — from the Mekong Delta to the Chao Phraya, the maritime empire extends its reach beyond the archipelago. Build the Benteng Laut coastal command to anchor this dominion."
 nd_nus_dest_spice_sources: "Command the Spice Sources"
 nd_nus_dest_spice_sources_desc: "The clove trees of Ternate and the nutmeg groves of Banda produce the world's most valuable commodities. Bring these distant Moluccan sultanates firmly under Nusantara's control."
 nd_nus_dest_emporium: "The Greatest Emporium"
 nd_nus_dest_emporium_desc: "Transform Nusantara from a spice producer into the world's greatest trading emporium. Develop the economy, embrace modern banking, and build infrastructure worthy of a global marketplace."
 nd_nus_dest_bumi_rempah: "Bumi Rempah"
 nd_nus_dest_bumi_rempah_desc: "The Land of Spices. Every merchant vessel on earth, from Lisbon to Canton, depends on the commodities that grow only in these islands. Build the Pasar Dunia — the World Market — and let all nations come to Nusantara with gold in hand."
 nd_nus.6.t: "The Nusantara Mandate"
 nd_nus.6.d: "The scattered kingdoms and sultanates of the archipelago have been gathered under one crown. From the volcanic peaks of Java to the coral atolls of the eastern seas, Nusantara stands as a unified realm for the first time since the golden age of Majapahit.\n\nBut unity alone is not destiny. The mandate to rule ten thousand islands demands more than military conquest — it demands stability, legitimacy, and a vision for what this unprecedented archipelagic state can become. The foundations have been laid. Now the real work begins."
 nd_nus.6.a: "The mandate of the archipelago is ours"
 nd_nus.7.t: "Masters of the Strait"
 nd_nus.7.d: "The flags of Nusantara now fly over Malacca and Kedah — the chokepoints of the world's busiest maritime trade route. Every Chinese junk carrying silk to the west, every Arab dhow laden with frankincense, every Indian vessel bearing textiles and gemstones — all must pass through waters that Nusantara commands.\n\nSrivijaya understood this power seven centuries ago. The Malacca Sultanate built an empire upon it. Now Nusantara inherits their legacy and surpasses it, for no previous maritime power controlled both sides of the strait simultaneously while also commanding the vast archipelago to the south and east."
 nd_nus.7.a: "All who sail these waters sail by our leave"
 nd_nus.8.t: "The South China Sea Campaign"
 nd_nus.8.d: "Nusantara's war fleets now patrol waters that stretch from the Mekong Delta to the Gulf of Siam. The old kingdom of Champa, the Malay coastal cities, and the trading ports of the mainland all acknowledge the supremacy of the archipelago's navy.\n\nThe question is how to consolidate this far-flung maritime dominion. Some admirals advocate for aggressive forward deployment — maintaining battle fleets in distant waters, ready to project power at a moment's notice. Others counsel a subtler approach — using the strait chokepoints as leverage for diplomatic hegemony, binding mainland states through trade dependence rather than occupation."
 nd_nus.8.a: "Our war fleets will patrol every sea lane"
 nd_nus.8.b: "Let the straits do our work for us"
 nd_nus.9.t: "Samudra Raja — Lord of the Seas"
 nd_nus.9.d: "From the rice plains of the Chao Phraya to the spice groves of the Moluccas, from the Strait of Malacca to the Timor Sea, Nusantara's writ runs over the greatest maritime domain the world has ever seen. No naval power — not the Portuguese, not the Dutch, not the Chinese treasure fleets — can challenge our supremacy in these waters.\n\nThe Samudra Raja — the Lord of the Seas — faces a final choice. The empire can be secured through overwhelming naval and military force, modernizing the armed forces to crush any challenger. Or it can be anchored in permanent institutions — garrisons at every strait, fortresses at every harbor, a network of naval bases that will outlast any individual ruler."
 nd_nus.9.a: "Modernize and overwhelm all challengers"
 nd_nus.9.b: "Build the permanent institutions of empire"
 nd_nus.10.t: "The Spice Islands Under One Crown"
 nd_nus.10.d: "Ternate and Banda — for centuries, these tiny volcanic islands in the eastern seas were the only source of cloves and nutmeg on earth. Local sultans grew fabulously wealthy, playing Portuguese, Spanish, and Dutch traders against each other while the price of a single sack of cloves could buy a ship in Venice.\n\nNow these legendary spice islands answer to Nusantara. The middlemen have been eliminated. The growers, the warehouses, the ships, and the ports are all under a single authority. For the first time, the entire spice supply chain — from tree to ship — is controlled by one power."
 nd_nus.10.a: "The spice flows through our hands alone"
 nd_nus.11.t: "The Emporium of the East"
 nd_nus.11.d: "The ports of Nusantara have become the crossroads of the world. Chinese merchants bring porcelain and silk, Indian traders carry textiles and gemstones, Arab voyagers offer frankincense and horses, and European ships arrive laden with silver. All come to buy what only these islands produce — and all leave paying Nusantara's price.\n\nTwo philosophies compete at court. The monopolists argue for a tight cartel — control supply, fix prices, punish smugglers, and extract maximum profit from every grain of spice. The free traders counter that an open emporium attracts more merchants, more goods, more ideas, and ultimately more wealth than any monopoly could squeeze from a restricted market."
 nd_nus.11.a: "Control supply and fix the price"
 nd_nus.11.b: "Welcome all merchants to our open ports"
 nd_nus.12.t: "Bumi Rempah — The Land of Spices"
 nd_nus.12.d: "Nusantara is not merely a country that trades in spices — it IS spice. The economy of the entire known world depends on commodities that grow only in these islands. No European colonial venture, no Chinese tribute mission, no Arab trading fleet can function without what Nusantara produces. The Land of Spices has become the indispensable nation.\n\nThis supreme economic position can be leveraged in different ways. Some counsel building the world's greatest marketplace — a permanent institution where all nations must come to trade, enriching the archipelago through the sheer volume of commerce. Others advocate for cultural and political hegemony — using economic leverage to project Nusantara's civilization outward, integrating diverse peoples into an ever-expanding sphere of influence."
 nd_nus.12.a: "Build the world's greatest marketplace"
 nd_nus.12.b: "Our wealth shall project our civilization"
 STATIC_MODIFIER_NAME_nd_nus_dest_fleet_projection: "Fleet Projection Doctrine"
 STATIC_MODIFIER_DESC_nd_nus_dest_fleet_projection: "Nusantara's war fleets maintain permanent stations in distant waters, ready to project power at a moment's notice. War is cheap and decisive for those who control the sea."
 STATIC_MODIFIER_NAME_nd_nus_dest_strait_hegemony: "Strait Hegemony"
 STATIC_MODIFIER_DESC_nd_nus_dest_strait_hegemony: "Rather than patrolling every sea lane by force, Nusantara uses its chokepoint control as diplomatic leverage — binding mainland states through intelligence networks and trade dependence."
 STATIC_MODIFIER_NAME_nd_nus_dest_naval_supremacy: "Naval Supremacy Doctrine"
 STATIC_MODIFIER_DESC_nd_nus_dest_naval_supremacy: "The modernization of Nusantara's military ensures tactical superiority over any rival, though the cost of maintaining such forces strains the treasury."
 STATIC_MODIFIER_NAME_nd_nus_dest_samudra_imperium: "Institutions of the Samudra"
 STATIC_MODIFIER_DESC_nd_nus_dest_samudra_imperium: "A permanent network of garrisons and naval bases anchors Nusantara's maritime empire, though the costs of empire drive up the price of borrowing."
 STATIC_MODIFIER_NAME_nd_nus_dest_spice_cartel: "Spice Cartel"
 STATIC_MODIFIER_DESC_nd_nus_dest_spice_cartel: "Nusantara enforces a tight monopoly on the global spice trade — controlling supply, fixing prices, and extending its commercial reach to distant markets."
 STATIC_MODIFIER_NAME_nd_nus_dest_open_emporium: "Open Emporium"
 STATIC_MODIFIER_DESC_nd_nus_dest_open_emporium: "The ports of Nusantara welcome merchants from every nation, attracting a cosmopolitan population of traders, settlers, and mercenaries — though the military grows soft in this atmosphere of commerce."
 STATIC_MODIFIER_NAME_nd_nus_dest_world_market: "World Marketplace"
 STATIC_MODIFIER_DESC_nd_nus_dest_world_market: "The Pasar Dunia is an institution without parallel — a permanent marketplace where all nations come to trade. The archipelago feeds itself with ease, though maintaining the fortifications to protect this wealth is costly."
 STATIC_MODIFIER_NAME_nd_nus_dest_spice_empire: "Spice Empire"
 STATIC_MODIFIER_DESC_nd_nus_dest_spice_empire: "Economic supremacy becomes cultural hegemony. Nusantara's wealth funds an expansion of civilizational influence, integrating diverse peoples and projecting the archipelago's culture across the region."
 nd_nus_benteng_laut: "Benteng Laut"
 nd_nus_benteng_laut_desc: "A coastal naval command fortress — combining harbor defense, fleet anchorage, and garrison quarters to project Nusantara's maritime power over distant seas and straits."
 nd_nus_benteng_laut_maintenance: "Naval Fortress Upkeep"
 nd_nus_benteng_laut_maintenance_desc: "Weaponry, stone, and naval supplies for maintaining the coastal command's defenses, docks, and garrison."
 nd_nus_pasar_dunia: "Pasar Dunia"
 nd_nus_pasar_dunia_desc: "The World Market — a vast permanent trading complex where merchants from every nation converge to buy and sell the world's most coveted goods. The ultimate expression of Nusantara's economic supremacy."
 nd_nus_pasar_dunia_maintenance: "World Market Operations"
 nd_nus_pasar_dunia_maintenance_desc: "Paper for contracts and ledgers, pottery for storage vessels, and fine cloth for merchant displays at the great world marketplace."
