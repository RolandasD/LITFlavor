l_english:
 STATIC_MODIFIER_NAME_nd_sword_of_babur: "Sword of Babur"
 STATIC_MODIFIER_DESC_nd_sword_of_babur: "The Mughal Empire was born from conquest. Babur rode down from the Afghan highlands with a hardened army and a will to carve a dynasty from Hindustan's plains. That spirit of relentless military expansion now infuses our armies, driving them to conquer what lesser empires could only covet."
 STATIC_MODIFIER_NAME_nd_light_of_akbar: "Light of Akbar"
 STATIC_MODIFIER_DESC_nd_light_of_akbar: "Where others rule by the sword alone, Akbar understood that an empire spanning a hundred peoples must be built on something deeper than fear. His policy of sulh-i-kul — universal peace — wove Hindu, Muslim, Jain, and Zoroastrian into a single imperial tapestry. That tradition of synthesis now guides our realm toward wisdom and prosperity."
 nd_mug.1.t: "The Mughal Throne"
 nd_mug.1.d: "The Peacock Throne stands assembled, its gemstones catching the light of a subcontinent united under our banner. From the snowy passes of the Hindu Kush to the sweltering plains of the Ganges, our writ now runs. But what manner of empire shall this be? Babur conquered with thunder and horsemen — his legacy demands we press ever onward, subjugating all who resist the Mughal standard. Yet Akbar showed another path: a realm where Hindu and Muslim serve side by side, where the Ibadat Khana echoes with debate rather than dogma. The choice before us will define not just our reign, but the soul of the empire itself.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mug.1.a: "We shall conquer as Babur conquered!"
 nd_mug.1.b: "We shall enlighten as Akbar enlightened."
 nd_mug.2.t: "The Thunder of Panipat"
 nd_mug.2.d: "When Babur's small army faced the vast host of Ibrahim Lodi at Panipat in 1526, he deployed a weapon Hindustan had never seen used so decisively: massed field artillery behind a barricade of carts. The Lodi elephants and cavalry crashed against the wagons while Mughal cannons tore through their ranks. In a single morning, the Delhi Sultanate was shattered. Our military scholars now study Babur's tactics with renewed intensity. Shall we master the firepower that won us India, or perfect the cavalry charge that broke Lodi's flanks?"
 nd_mug.2.a: "Let our cannons shake the earth."
 nd_mug.2.b: "Let our horsemen sweep the field."
 nd_mug.3.t: "Sulh-i-Kul — Universal Peace"
 nd_mug.3.d: "In 1575, Emperor Akbar established the Ibadat Khana at Fatehpur Sikri — a House of Worship where Sunni ulama debated alongside Hindu Brahmins, Jain monks, Jesuit missionaries, and Zoroastrian priests. From these discussions emerged sulh-i-kul, Akbar's doctrine of universal peace. He abolished the jizya, appointed Hindus to the highest mansabs, and declared that no man should be molested on account of his faith. The empire's scholars now wrestle with the implications. Shall we embrace this radical tolerance as our governing philosophy, or channel the energy of reform into strengthening the sinews of the state?"
 nd_mug.3.a: "All faiths shall find shelter under our canopy."
 nd_mug.3.b: "Reform shall strengthen the hand of the Padshah."
 nd_mug.4.t: "The Grand Trunk Road"
 nd_mug.4.d: "Stretching over two thousand miles from Chittagong on the Bay of Bengal to Kabul in the Afghan highlands, the Grand Trunk Road is the spine of the Mughal Empire. Originally built by Sher Shah Suri and expanded under Mughal rule, it connects the empire's greatest cities — Delhi, Agra, Lahore, Peshawar — through a network of sarais, caravanserais, and toll stations. Merchants travel its length carrying muslin from Dhaka, spices from Gujarat, horses from Central Asia, and silver from Bengal. Our engineers have now completed major improvements to the road system, establishing imperial waystation networks that accelerate both trade and the movement of imperial decrees."
 nd_mug.4.a: "The road binds the empire together."
 STATIC_MODIFIER_NAME_nd_mug_panipat_gunpowder: "Legacy of Panipat: Firepower"
 STATIC_MODIFIER_DESC_nd_mug_panipat_gunpowder: "Our artillery corps carries forward the devastating innovation that won the Battle of Panipat."
 STATIC_MODIFIER_NAME_nd_mug_panipat_cavalry: "Legacy of Panipat: Horsemen"
 STATIC_MODIFIER_DESC_nd_mug_panipat_cavalry: "Our cavalry embodies the swift, encircling tactics that shattered the Lodi host at Panipat."
 STATIC_MODIFIER_NAME_nd_mug_sulh_i_kul_peace: "Sulh-i-Kul: Peace with All"
 STATIC_MODIFIER_DESC_nd_mug_sulh_i_kul_peace: "Akbar's doctrine of universal tolerance attracts the loyalty of diverse peoples across the subcontinent."
 STATIC_MODIFIER_NAME_nd_mug_sulh_i_kul_reform: "Sulh-i-Kul: Imperial Reform"
 STATIC_MODIFIER_DESC_nd_mug_sulh_i_kul_reform: "The energy of Akbar's reforms has been channeled into strengthening imperial administration and crown authority."
 nd_mug_timurid_legacy: "Timurid Legacy"
 nd_mug_timurid_legacy_desc: "The Mughals trace their lineage to Timur and Genghis Khan — a heritage of mounted conquest and imperial ambition that shaped their approach to ruling Hindustan."
 nd_mug_chagatai_court: "Chagatai Court Culture"
 nd_mug_chagatai_court_desc: "The Mughals brought the refined Persian literary tradition of the Chagatai courts to India, establishing a cosmopolitan culture of poetry, calligraphy, and courtly etiquette."
 nd_mug_central_asian_horsemanship: "Central Asian Horsemanship"
 nd_mug_central_asian_horsemanship_desc: "The steppe traditions of horse breeding and mounted warfare that the Mughals carried from Central Asia gave them an enduring advantage on the plains of Hindustan."
 nd_mug_persian_admin: "Persian Administrative Heritage"
 nd_mug_persian_admin_desc: "Mughal bureaucracy drew heavily on Persian models of governance — the diwan system, land revenue records, and a professional class of administrators writing in Persian script."
 nd_mug_sufi_devotion: "Sufi Devotional Tradition"
 nd_mug_sufi_devotion_desc: "Sufi saints and their khanqahs served as bridges between Islam and India's diverse spiritual landscape, winning converts through devotion and poetry rather than force."
 nd_mug_gunpowder_revolution: "Babur's Gunpowder Revolution"
 nd_mug_gunpowder_revolution_desc: "Babur's decisive deployment of Ottoman-style field artillery at Panipat in 1526 introduced a new era of gunpowder warfare to the Indian subcontinent."
 nd_mug_karkhana_tradition: "Karkhana Tradition"
 nd_mug_karkhana_tradition_desc: "The Mughal karkhanas were imperial workshops producing everything from brocade textiles and jewelry to weapons and saddles, all under the supervision of the Mir Saman."
 nd_mug_mansabdari_origins: "Mansabdari System"
 nd_mug_mansabdari_origins_desc: "Akbar's mansabdari system assigned numerical ranks (mansabs) to military and civil officials, determining their pay, troop obligations, and status within the imperial hierarchy."
 nd_mug_patronage_of_learning: "Patronage of Learning"
 nd_mug_patronage_of_learning_desc: "The Mughal court attracted scholars, historians, and scientists from across the Islamic world, funding translations of Sanskrit texts into Persian and advancing astronomy, mathematics, and medicine."
 nd_mug_miniature_painting: "Mughal Miniature Painting"
 nd_mug_miniature_painting_desc: "The Mughal school of miniature painting blended Persian precision with Indian vivacity, producing masterworks under the patronage of emperors from Humayun to Shah Jahan."
 nd_mug_urban_planning: "Mughal Urban Planning"
 nd_mug_urban_planning_desc: "The Mughals built planned cities — Fatehpur Sikri, Shahjahanabad — with symmetrical gardens, public fountains, hammams, and sophisticated water management systems."
 nd_mug_barqandaz_corps: "Barqandaz Corps"
 nd_mug_barqandaz_corps_desc: "The barqandaz were professional matchlock musketeers, often recruited from specific clans and communities, who formed the backbone of Mughal infantry firepower."
 nd_mug_topkhana_corps: "Topkhana Corps"
 nd_mug_topkhana_corps_desc: "The topkhana was the centralized imperial artillery command, unique among Mughal military branches for being directly under the emperor's control rather than distributed among mansabdars."
 nd_mug_revenue_reforms: "Revenue Reforms"
 nd_mug_revenue_reforms_desc: "Akbar's finance minister Todar Mal introduced the zabt system — a standardized land revenue assessment based on measured acreage and average yields, replacing arbitrary tribute with predictable taxation."
 nd_mug_sulh_i_kul: "Sulh-i-Kul"
 nd_mug_sulh_i_kul_desc: "Akbar's principle of sulh-i-kul — peace with all — abolished the jizya tax on non-Muslims, appointed Hindus to high office, and established the Ibadat Khana for interfaith dialogue."
 nd_mug_grand_trunk_road: "Grand Trunk Road"
 nd_mug_grand_trunk_road_desc: "The Grand Trunk Road stretched over 2,500 kilometers from Chittagong to Kabul, connecting the empire's markets through a chain of sarais, toll stations, and caravanserais."
 nd_mug_dhaka_muslin: "Dhaka Muslin"
 nd_mug_dhaka_muslin_desc: "The muslins of Dhaka were so fine they were called 'woven wind' — a single bolt could be drawn through a finger ring. European traders paid fortunes for this fabric that no loom in the West could replicate."
 nd_mug_ahadi_guard: "Ahadi Guard"
 nd_mug_ahadi_guard_desc: "The Ahadi were elite gentleman troopers who served as the emperor's personal guard, handpicked for their skill at arms and personal loyalty, answering to no mansabdar but the Padshah himself."
 nd_mug_mughal_engineering: "Mughal Engineering"
 nd_mug_mughal_engineering_desc: "From the massive red sandstone walls of Agra Fort to the intricate water channels of Shalimar Gardens, Mughal engineers mastered both military fortification and hydraulic engineering."
 nd_mug_jharokha_darshan: "Jharokha-i-Darshan"
 nd_mug_jharokha_darshan_desc: "Each morning, the Mughal emperor appeared at the jharokha window to receive the assembled populace — a ritual that reinforced the sacred bond between ruler and subject across religious lines."
 nd_mug_banduqchi_reforms: "Banduqchi Reforms"
 nd_mug_banduqchi_reforms_desc: "As European military organization penetrated India, later Mughal commanders adopted more disciplined musketeer formations — the banduqchi — drilled in volley fire and coordinated maneuver."
 nd_mug_textile_empire: "Mughal Textile Empire"
 nd_mug_textile_empire_desc: "By the 18th century, Indian textiles accounted for roughly a quarter of world manufacturing output. Mughal workshops produced silk brocades, fine muslin, chintz, and calico that clothed Europe, Africa, and Southeast Asia."
 nd_mug_provincial_autonomy: "Provincial Governance"
 nd_mug_provincial_autonomy_desc: "The nawabs, nizams, and subadars who governed Mughal provinces developed increasingly sophisticated local administrations — a double-edged sword that maintained order while enabling eventual autonomy."
 nd_mug_renaissance_of_letters: "Renaissance of Letters"
 nd_mug_renaissance_of_letters_desc: "Even as the empire's military power waned, its literary and scholarly traditions flourished — Urdu poetry, Persian histories, and Arabic theological works continued to emerge from Mughal courts and madrasas."
 nd_mug_indigo_opium_trade: "Indigo and Opium Trade"
 nd_mug_indigo_opium_trade_desc: "Mughal India's indigo plantations and opium production became major export industries, feeding European textile dyes and the expanding Asian opium market through the ports of Surat and Calcutta."
 a_nd_mug_barqandaz: "Barqandaz"
 a_nd_mug_barqandaz_desc: "Professional matchlock musketeers recruited from specialist communities, the barqandaz formed the firepower core of Mughal infantry. Their steady volleys covered the advance of imperial cavalry."
 a_nd_mug_barqandaz_levy: "Barqandaz Levy"
 a_nd_mug_barqandaz_levy_desc: "Levied matchlock infantry drawn from the empire's musketeer traditions."
 a_nd_mug_topkhana: "Topkhana"
 a_nd_mug_topkhana_desc: "The imperial Topkhana was the Mughal artillery corps — heavy bronze and iron cannons manned by specialized gunners under direct imperial command, devastating in siege and field alike."
 a_nd_mug_ahadi: "Ahadi Guard"
 a_nd_mug_ahadi_desc: "Elite household cavalry sworn to the emperor personally, the Ahadi were gentleman troopers selected for martial skill and loyalty, serving as shock cavalry in battle and as the emperor's mounted bodyguard."
 a_nd_mug_ahadi_levy: "Ahadi Levy"
 a_nd_mug_ahadi_levy_desc: "Levied imperial guard cavalry from the Ahadi tradition."
 a_nd_mug_banduqchi: "Banduqchi"
 a_nd_mug_banduqchi_desc: "Reformed musketeer infantry trained in European-style volley fire and linear tactics, the banduqchi represented the Mughal military's adaptation to the changing nature of warfare in the 18th century."
 nd_mug_karkhana: "Imperial Karkhana"
 nd_mug_karkhana_desc: "A state-run workshop producing luxury textiles, metalwork, and armaments under imperial supervision. The karkhana system centralized artisan production for the court and military."
 nd_mug_karkhana_maintenance: "Karkhana Operations"
 nd_mug_karkhana_maintenance_desc: "The imperial workshop weaves silk, dyes, and cloth into exquisite fine textiles for the court and export."
 nd_mug_sarai: "Imperial Sarai"
 nd_mug_sarai_desc: "A fortified waystation along the imperial road network, providing shelter, fresh horses, and market access to merchants and official couriers traveling the Grand Trunk Road."
 nd_mug_sarai_maintenance: "Sarai Upkeep"
 nd_mug_sarai_maintenance_desc: "Provisioning travelers with livestock, grain, and salt, and maintaining the waystation along the imperial road."
 nd_mug_maktab: "Maktab"
 nd_mug_maktab_desc: "An elementary Islamic school where children learn to read the Quran, study Persian grammar, and receive basic instruction in arithmetic and calligraphy — the foundation of Mughal literacy."
 nd_mug_maktab_maintenance: "Maktab Operations"
 nd_mug_maktab_maintenance_desc: "Providing paper, books, and beeswax candles to sustain study in the school."
 nd_mug_hammam: "Imperial Hammam"
 nd_mug_hammam_desc: "A public bathhouse in the Persian tradition, serving as both a place of hygiene and a social institution where all classes mingled — a hallmark of Mughal urban civilization."
 nd_mug_hammam_maintenance: "Hammam Operations"
 nd_mug_hammam_maintenance_desc: "Heating the bathhouse with timber fuel, scrubbing with salt, and supplying pottery vessels for bathing."
 nd_mug_topkhana_arsenal: "Topkhana Arsenal"
 nd_mug_topkhana_arsenal_desc: "A centralized facility for casting cannons, manufacturing firearms, and storing gunpowder — the logistical backbone of the Mughal empire's formidable artillery arm."
 nd_mug_topkhana_arsenal_maintenance: "Arsenal Operations"
 nd_mug_topkhana_arsenal_maintenance_desc: "The ongoing production and storage of imperial artillery pieces and ammunition."
 nd_mug_muslin_weaving: "Muslin Weaving"
 nd_mug_muslin_weaving_desc: "The legendary fine textile production of Mughal India, producing cloth so delicate it was called 'woven wind.'"
 nd_mug_parchin_kari: "Parchin Kari"
 nd_mug_parchin_kari_desc: "The Mughal art of semi-precious stone inlay into marble — the technique behind the stunning decorative panels of the Taj Mahal and other imperial monuments."
 nd_mug_zarb_khana: "Imperial Zarb-khana"
 nd_mug_zarb_khana_desc: "The imperial mint, where standardized Mughal coinage was struck in gold, silver, and copper — the backbone of a monetary system that facilitated trade across the subcontinent."
 nd_mug_zarb_khana_maintenance: "Minting Operations"
 nd_mug_zarb_khana_maintenance_desc: "Processing silver and copper with striking tools to produce standardized imperial currency."
 nd_mug_silk_brocade: "Silk Brocade Weaving"
 nd_mug_silk_brocade_desc: "The luxury production of silk brocades interwoven with gold and silver thread, using specialist tools and dyes — a hallmark of Mughal court fashion and a prized export commodity."
 levy_nd_mug_ahadi: "Ahadi Guard Levy"
 levy_nd_mug_ahadi_desc: "Elite household cavalry levied from the Ahadi tradition — gentleman troopers sworn directly to the emperor, serving as both bodyguard and shock cavalry."
 levy_nd_mug_barqandaz: "Barqandaz Levy"
 levy_nd_mug_barqandaz_desc: "Matchlock musketeers levied from the empire's barqandaz communities — the steady infantry firepower that anchored Mughal battle lines."
 nd_mug_formed_tt: "Mughal Empire has been formed"
 nd_mug_path_a_tt: "Chose Sword of Babur"
 nd_mug_path_b_tt: "Chose Light of Akbar"
 nd_mug_destiny: "Destiny of the Mughals"
 nd_mug_destiny_desc: "The Mughal Empire has been proclaimed. Whether we pursue the path of conquest or enlightenment, the stability of the realm must first be secured before we can shape its destiny."
 nd_mug_dest_deccan: "Subjugate the Deccan"
 nd_mug_dest_deccan_desc: "The Deccan sultanates of Golconda and Bijapur stand as independent powers on our southern frontier. To fulfill Babur's legacy of conquest, we must bring them under the Mughal standard and secure the wealth of the south."
 nd_mug_dest_bengal: "Conquer Bengal"
 nd_mug_dest_bengal_desc: "The rich delta of Bengal — Sonargaon, Chittagong — controls access to the Bay of Bengal and produces the finest textiles in the world. A conquering empire must seize this wealth."
 nd_mug_dest_timur: "Reclaim the Timurid Heartland"
 nd_mug_dest_timur_desc: "Babur wept for Samarkand, the jewel his family lost. The ultimate ambition of the Mughal dynasty is to reclaim the ancestral Timurid capitals — Samarkand, Herat, and Kandahar — and unite the empire of Timur with the empire of Hindustan."
 nd_mug_dest_gujarat: "The Jewel of Gujarat"
 nd_mug_dest_gujarat_desc: "Gujarat and its great port of Surat are the gateway to the Indian Ocean trade. Securing this region and establishing silk in our markets will lay the commercial foundation for a prosperous empire."
 nd_mug_dest_workshop: "Workshop of the World"
 nd_mug_dest_workshop_desc: "India produces a quarter of the world's manufactured goods. To realize this potential, the empire must embrace modern financial institutions and develop its vast territories beyond mere extraction."
 nd_mug_dest_padshah: "Padshah-i-Hind"
 nd_mug_dest_padshah_desc: "The title Padshah-i-Hind — Emperor of All India — remains aspirational until the Mughal writ runs from the Malabar Coast to the tip of the subcontinent. Madurai and Kozhikode must acknowledge our supremacy."
 nd_mug.5.t: "The Destiny of the Mughals"
 nd_mug.5.d: "The Mughal throne is secure, the realm at peace. From Delhi to Lahore, from Agra to the mountain passes, our word is law. But a great empire does not stand still — it grows or it withers. The question now is not whether we shall act, but in what direction our ambition shall carry us."
 nd_mug.5.a: "Our destiny awaits."
 nd_mug.6.t: "The Deccan Brought to Heel"
 nd_mug.6.d: "The Deccan sultanates, those proud remnants of the Bahmani kingdom, have at last been brought under Mughal authority. Golconda with its diamond mines and Bijapur with its fertile fields now pay tribute to the Peacock Throne. Our armies have proven that the mountain barriers of central India are no defense against Mughal resolve."
 nd_mug.6.a: "The south bends the knee."
 nd_mug.7.t: "The Conquest of Bengal"
 nd_mug.7.d: "Bengal has fallen to Mughal arms. The great river delta — source of the finest muslin, the richest rice harvests, and access to the eastern seas — is ours. Our generals now debate how best to consolidate these conquests. Some advocate an iron fist: aggressive expansion fueled by the spoils of war. Others counsel building the military roads and supply chains that will sustain further campaigns across the empire's vast distances."
 nd_mug.7.a: "Let the sword speak for the empire."
 nd_mug.7.b: "Build the roads that feed the armies."
 nd_mug.8.t: "The Return to Samarkand"
 nd_mug.8.d: "At last, a Mughal emperor stands in the Registan of Samarkand, fulfilling the dream that Babur carried to his grave. The ancestral lands of Timur — from Herat's minarets to Kandahar's fortress — fly the Mughal standard once more. This is the apex of empire, the union of two worlds: the refined civilization of Hindustan joined to the martial heritage of Central Asia. How shall we wield this unprecedented power?"
 nd_mug.8.a: "We are the conquerors of the world."
 nd_mug.8.b: "We are the emperors of an age."
 nd_mug.9.t: "Gujarat Secured"
 nd_mug.9.d: "The port of Surat now flies the Mughal standard, and with it the commerce of the Arabian Sea flows into our treasury. Gujarat's merchant communities — Hindu banias, Muslim bohras, Parsi traders — bring the goods of the world to our doorstep. Silk, spices, and silver change hands in bustling markets that generate wealth beyond what conquest alone could ever yield."
 nd_mug.9.a: "The wealth of the world passes through our hands."
 nd_mug.10.t: "The Workshop Ascendant"
 nd_mug.10.d: "India's artisans and merchants have made the Mughal Empire the manufacturing center of the known world. Our textiles clothe Europe and Africa, our indigo dyes color their fabrics, and our spices season their tables. The question is how best to nurture this economic miracle. Shall we pursue cultural synthesis — drawing the best minds of every tradition into our service? Or shall we empower our artisan guilds and open our markets to the world?"
 nd_mug.10.a: "Synthesis of all traditions under our roof."
 nd_mug.10.b: "Let our artisans trade freely with the world."
 nd_mug.11.t: "Padshah-i-Hind"
 nd_mug.11.d: "From the snow-capped passes of Kashmir to the palm-fringed coast of Malabar, from the bazaars of Surat to the temples of Madurai — the entire Indian subcontinent acknowledges the Mughal emperor as Padshah-i-Hind, Emperor of All India. No realm in the world commands such wealth, such diversity of peoples, or such depth of civilization. The Mughal court now debates how to consecrate this achievement. Shall we build an empire of spiritual harmony where all faiths flourish under our protection? Or shall we become the great marketplace of the world, where all nations come to trade?"
 nd_mug.11.a: "An empire of harmony under heaven."
 nd_mug.11.b: "The marketplace of all nations."
 STATIC_MODIFIER_NAME_nd_mug_dest_iron_fist: "The Iron Fist"
 STATIC_MODIFIER_DESC_nd_mug_dest_iron_fist: "The momentum of conquest drives us forward. Wars are declared swiftly, and the exhaustion of campaigns weighs less heavily on a people accustomed to victory."
 STATIC_MODIFIER_NAME_nd_mug_dest_iron_road: "The Iron Road"
 STATIC_MODIFIER_DESC_nd_mug_dest_iron_road: "Military roads and supply depots sustain our armies across vast distances, though the focus on logistics leaves less room for diplomatic niceties."
 STATIC_MODIFIER_NAME_nd_mug_dest_conqueror: "Conqueror of the World"
 STATIC_MODIFIER_DESC_nd_mug_dest_conqueror: "The Mughal military machine operates with devastating efficiency — storming fortresses, pressing advantages, and bringing battles to swift conclusion."
 STATIC_MODIFIER_NAME_nd_mug_dest_emperor: "Emperor of an Age"
 STATIC_MODIFIER_DESC_nd_mug_dest_emperor: "The empire's sheer scale and administrative reach allow it to field vast armies while minimizing the wastage of campaigning across diverse terrain."
 STATIC_MODIFIER_NAME_nd_mug_dest_synthesis: "Imperial Synthesis"
 STATIC_MODIFIER_DESC_nd_mug_dest_synthesis: "The Mughal court draws scholars, artists, and mystics from every tradition, radiating cultural influence across the region — though maintaining this cosmopolitan court does not come cheaply."
 STATIC_MODIFIER_NAME_nd_mug_dest_artisans: "Artisan Freedom"
 STATIC_MODIFIER_DESC_nd_mug_dest_artisans: "Freed from restrictive guild monopolies, Mughal artisans innovate and trade openly, driving recovery and growth across the empire's markets."
 STATIC_MODIFIER_NAME_nd_mug_dest_golden_age: "Golden Age of Harmony"
 STATIC_MODIFIER_DESC_nd_mug_dest_golden_age: "The Mughal Empire stands as a beacon of interfaith harmony. Under the emperor's protection, mosques, temples, and churches flourish side by side, drawing converts through persuasion rather than coercion."
 STATIC_MODIFIER_NAME_nd_mug_dest_world_market: "World Market"
 STATIC_MODIFIER_DESC_nd_mug_dest_world_market: "The Mughal Empire has become the hub of global commerce, managing vast trade networks that require sophisticated financial instruments — and the costs that come with them."
 nd_mug_elephant_battery: "War Elephant Battery"
 nd_mug_elephant_battery_desc: "A combined-arms facility where war elephants are trained alongside artillery crews, creating the devastating elephant-mounted cannon platforms that were a hallmark of Mughal military innovation."
 nd_mug_elephant_battery_maintenance: "Elephant Battery Upkeep"
 nd_mug_elephant_battery_maintenance_desc: "Maintaining war elephants, their armored howdahs, the cannons they carry, and the leather harnesses that bind it all together."
 nd_mug_diwan_i_am: "Diwan-i-Am"
 nd_mug_diwan_i_am_desc: "The Hall of Public Audience — a grand pavilion where the emperor sits on an elevated throne to dispense justice, receive petitions, and display the magnificence of Mughal sovereignty to all who come before the Peacock Throne."
 nd_mug_diwan_i_am_maintenance: "Audience Hall Operations"
 nd_mug_diwan_i_am_maintenance_desc: "Maintaining the splendor of the imperial audience hall with fine textiles, administrative records, carved furniture, and fragrant incense."
