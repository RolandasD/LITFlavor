l_english:
 STATIC_MODIFIER_NAME_nd_cso_maritime_supremacy: "Treasure of the Southern Seas"
 STATIC_MODIFIER_DESC_nd_cso_maritime_supremacy: "With Hangzhou as its glittering capital, the restored Song commands the greatest maritime trade network in the known world, its harbors teeming with junks bearing silk, porcelain, and tea to every shore."
 STATIC_MODIFIER_NAME_nd_cso_confucian_meritocracy: "Mandate of the Brush"
 STATIC_MODIFIER_DESC_nd_cso_confucian_meritocracy: "The Song restoration places scholarship above all else. Through rigorous civil examinations and the wisdom of Neo-Confucian philosophy, the realm is governed by the learned rather than the powerful."
 STATIC_MODIFIER_NAME_nd_cso_paper_money_expansion: "Currency Proliferation"
 STATIC_MODIFIER_DESC_nd_cso_paper_money_expansion: "Paper money flows freely through Song markets, lubricating commerce and enriching merchants across the Yangtze."
 STATIC_MODIFIER_NAME_nd_cso_paper_money_regulation: "Fiscal Discipline"
 STATIC_MODIFIER_DESC_nd_cso_paper_money_regulation: "Careful regulation of paper currency prevents inflation and strengthens the treasury's reserves."
 STATIC_MODIFIER_NAME_nd_cso_yangtze_offensive: "River Dragons Unleashed"
 STATIC_MODIFIER_DESC_nd_cso_yangtze_offensive: "The Song fleet strikes from the Yangtze, paddle-wheels churning and thundercrash bombs falling upon the enemy like hail."
 STATIC_MODIFIER_NAME_nd_cso_yangtze_consolidation: "The River Wall"
 STATIC_MODIFIER_DESC_nd_cso_yangtze_consolidation: "The Yangtze becomes an impassable barrier, fortified positions and patrol fleets denying any crossing to northern invaders."
 STATIC_MODIFIER_NAME_nd_cso_zhuxi_orthodoxy: "The Four Books Ascendant"
 STATIC_MODIFIER_DESC_nd_cso_zhuxi_orthodoxy: "Zhu Xi's commentaries become the foundation of all learning, unifying the realm under a single moral philosophy."
 STATIC_MODIFIER_NAME_nd_cso_zhuxi_pragmatism: "The Investigation of Things"
 STATIC_MODIFIER_DESC_nd_cso_zhuxi_pragmatism: "The Neo-Confucian emphasis on gewu — the investigation of things — drives practical scholarship and administrative efficiency."
 nd_cso.1.t: "Restoration of the Song"
 nd_cso.1.d: "The banners of the Song fly once more over Hangzhou. Where the dynasty once retreated south before the Jurchen onslaught, it now commands the wealthiest and most sophisticated realm in the world. The Yangtze valley teems with commerce, its cities dwarf any in Europe, and its innovations in paper money, gunpowder, and printing have no equal.\n\nBut the Song faces a choice that has defined it since its founding: what kind of power shall it be? The empire's strength has always lain not in its armies but in its merchants and scholars. Will the restored dynasty build upon its unrivaled maritime commerce, or turn inward to perfect the Neo-Confucian bureaucracy that makes governance itself an art?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_cso.1.a: "Our ships shall carry Song wealth to every sea."
 nd_cso.1.b: "The examination hall is the foundation of empire."
 nd_cso.2.t: "The Paper Money Revolution"
 nd_cso.2.d: "In the markets of Hangzhou and Chengdu, merchants exchange slips of paper backed by the Song treasury — the world's first government-issued paper currency, the jiaozi. What began as private merchant drafts has become a revolution in finance. The printing bureaus at Huizhou and Hangzhou employ over a thousand workers each, producing the currency that lubricates a commercial economy of unprecedented scale.\n\nYet paper money is a double-edged sword. Too much in circulation breeds inflation and erodes trust. Too little starves commerce of the liquidity it needs to thrive. The court must decide: expand the money supply to fuel trade, or impose strict regulation to preserve fiscal stability?"
 nd_cso.2.a: "Print more currency — commerce must flow freely."
 nd_cso.2.b: "Regulate the supply — stability above all."
 nd_cso.3.t: "Thunder on the Yangtze"
 nd_cso.3.d: "At the Battle of Caishi in 1161, Song paddle-wheel warships ambushed a far larger Jin transport fleet on the Yangtze. Thundercrash bombs launched from deck-mounted trebuchets shattered the enemy vessels while Song oarsmen drove their paddle-wheeled craft through the wreckage at speeds no conventional galley could match. The Jin force was annihilated, and the Yangtze line held.\n\nThis victory proves that innovation trumps numbers. Our naval engineers have mastered the paddle-wheel mechanism, producing vessels that can navigate upriver against the current, maneuver in narrow channels, and close rapidly on enemy ships. The question now is how to exploit this advantage."
 nd_cso.3.a: "Build an offensive fleet to carry the war north."
 nd_cso.3.b: "Fortify the Yangtze — make our heartland invulnerable."
 nd_cso.4.t: "The Synthesis of Master Zhu"
 nd_cso.4.d: "The philosopher Zhu Xi has completed his monumental commentaries on the Four Books of the Confucian tradition — the Analects, the Mencius, the Great Learning, and the Doctrine of the Mean. His synthesis of earlier Neo-Confucian thought into a coherent philosophical system emphasizes li (principle) as the ordering force of the cosmos, and gewu (investigation of things) as the path to understanding.\n\nZhu Xi's work will reshape Chinese intellectual life for centuries. His commentaries can become the orthodox foundation of the examination system, producing officials steeped in moral philosophy — or his emphasis on investigation can be channeled toward practical governance and empirical inquiry."
 nd_cso.4.a: "Make the Four Books the sole foundation of learning."
 nd_cso.4.b: "Encourage the investigation of things in all domains."
 nd_cso.5.t: "The Fire Lance Takes Shape"
 nd_cso.5.d: "Song alchemists and military engineers have perfected the fire lance — a bamboo or metal tube packed with gunpowder and projectiles, mounted on a spear shaft. In battle, the operator ignites the charge, sending a gout of flame and metal fragments into the enemy ranks before engaging with the spear. It is terrifying, devastating, and unlike anything the world has seen.\n\nThe Wujing Zongyao, our comprehensive military manual, records the formulas for gunpowder mixtures of varying strength. Fire lances are now being issued to infantry units stationed along the Yangtze defenses, giving Song soldiers a decisive advantage in close combat against superior northern cavalry."
 nd_cso.5.a: "The fire lance shall become our signature weapon."
 nd_cso.6.t: "Movable Type and the Printed Word"
 nd_cso.6.d: "The artisan Bi Sheng has devised a method of printing using individual ceramic characters arranged on an iron plate, coated in a mixture of pine resin and wax. When heated, the characters set firm; when cooled, they can be rearranged for the next page. Though woodblock printing remains dominant for large runs, Bi Sheng's movable type opens the possibility of printing any text without the expense of carving entire blocks.\n\nAlready the printing houses of Hangzhou produce more books in a single year than most kingdoms possess in their entire libraries. This technology, combined with Song paper-making expertise, is creating the most literate society the world has ever known."
 nd_cso.6.a: "Knowledge shall be the foundation of Song power."
 nd_cso_paddle_wheel_fleet: "Paddle-Wheel Tradition"
 nd_cso_paddle_wheel_fleet_desc: "The Song navy pioneered paddle-wheel warships driven by treadmills, capable of remarkable speed and maneuverability on rivers and coastal waters."
 nd_cso_jiaozi_system: "Jiaozi Currency System"
 nd_cso_jiaozi_system_desc: "The world's first government-issued paper money, enabling a commercial economy of unprecedented scale."
 nd_cso_iron_smelting: "Song Iron Industry"
 nd_cso_iron_smelting_desc: "By 1078, Song China produced 125,000 tons of iron annually — a sixfold increase using coal-fired blast furnaces."
 nd_cso_civilian_supremacy: "Civilian Supremacy"
 nd_cso_civilian_supremacy_desc: "The Song principle of wen over wu — civilian authority over military — creating the most sophisticated bureaucratic state of its era."
 nd_cso_river_navy_levy: "River Navy Levies"
 nd_cso_river_navy_levy_desc: "The Song maintained a permanent river navy from 1132, the first standing navy in Chinese history, crewed by conscripted rivermen."
 nd_cso_yangtze_defense: "Yangtze Defense Line"
 nd_cso_yangtze_defense_desc: "The great river served as the Southern Song's primary defensive barrier, fortified with garrisons, signal beacons, and patrol fleets."
 nd_cso_fire_lance_corps: "Fire Lance Corps"
 nd_cso_fire_lance_corps_desc: "Song soldiers wielding fire lances — gunpowder-charged spears that projected flame and shrapnel — represented the world's first gunpowder infantry."
 nd_cso_fire_lance_levies: "Fire Lance Levies"
 nd_cso_fire_lance_levies_desc: "Conscripted fire lance troops drawn from the general population, bringing early gunpowder weapons to the Song levy system."
 nd_cso_movable_type: "Movable Type Printing"
 nd_cso_movable_type_desc: "Bi Sheng's invention of ceramic movable type around 1040 revolutionized book production and made Song China the most literate society on earth."
 nd_cso_zhuxi_synthesis: "Neo-Confucian Synthesis"
 nd_cso_zhuxi_synthesis_desc: "Zhu Xi's commentaries on the Four Books unified Neo-Confucian philosophy and became the intellectual foundation of Chinese governance for seven centuries."
 nd_cso_commercial_revolution: "Commercial Revolution"
 nd_cso_commercial_revolution_desc: "The Song economic transformation — from agricultural tribute state to commercial powerhouse — driven by urbanization, paper money, and maritime trade."
 nd_cso_tea_trade: "Tea Trade Networks"
 nd_cso_tea_trade_desc: "Tea became the Song dynasty's most important commercial commodity, with government-licensed tea houses serving as hubs for trade and cultural exchange."
 nd_cso_tower_ships: "Tower Ship Construction"
 nd_cso_tower_ships_desc: "Multi-decked armored warships carrying hundreds of soldiers and deck-mounted trebuchets, dominating both river and coastal warfare."
 nd_cso_thundercrash_weapons: "Thundercrash Weapons"
 nd_cso_thundercrash_weapons_desc: "Iron-cased gunpowder bombs launched from trebuchets, named for the terrifying sound they produced — an early form of explosive artillery."
 nd_cso_compass_navigation: "Compass Navigation"
 nd_cso_compass_navigation_desc: "Song mariners pioneered the use of the magnetic compass for maritime navigation, enabling reliable ocean voyages to Southeast Asia and beyond."
 nd_cso_porcelain_mastery: "Porcelain Export Mastery"
 nd_cso_porcelain_mastery_desc: "Song celadon and white porcelain became the most sought-after luxury goods across Asia and the Indian Ocean world."
 nd_cso_legal_codification: "Legal Codification"
 nd_cso_legal_codification_desc: "Systematic revision and compilation of Song legal codes, creating one of the most comprehensive legal systems of the medieval world."
 nd_cso_maritime_silk_route: "Maritime Silk Route"
 nd_cso_maritime_silk_route_desc: "With overland routes cut off by hostile steppe powers, Song merchants established maritime trade routes carrying silk, porcelain, and tea across the Indian Ocean."
 nd_cso_ironclad_vessels: "Ironclad Paddle-Wheels"
 nd_cso_ironclad_vessels_desc: "By 1203, Song engineers were armoring paddle-wheel warships with iron plates, creating the world's first ironclad vessels."
 nd_cso_trade_junk_fleet: "Hangzhou Trade Junk Fleet"
 nd_cso_trade_junk_fleet_desc: "Fast, seaworthy junks based in Hangzhou, combining merchant cargo capacity with defensive armament for long-range ocean trade."
 nd_cso_iron_bombs: "Iron-Cased Bombs"
 nd_cso_iron_bombs_desc: "The transition from soft-shelled to iron-cased gunpowder bombs dramatically increased their lethality and blast radius."
 nd_cso_waterway_mastery: "Waterway Mastery"
 nd_cso_waterway_mastery_desc: "The Song mastery of canals, locks, and river transport created an internal trade network unmatched anywhere in the world."
 nd_cso_examination_reform: "Examination Reform"
 nd_cso_examination_reform_desc: "Expansion and refinement of the civil service examination system, widening access to government service based purely on merit."
 nd_cso_rice_intensification: "Rice Paddy Intensification"
 nd_cso_rice_intensification_desc: "Introduction of early-ripening Champa rice varieties and double-cropping techniques dramatically increased food production in the Yangtze valley."
 nd_cso_naval_supremacy: "Song Naval Supremacy"
 nd_cso_naval_supremacy_desc: "The culmination of centuries of naval innovation — paddle-wheels, gunpowder armaments, iron cladding — establishing unchallenged dominance on water."
 nd_cso_monetary_policy: "Advanced Monetary Policy"
 nd_cso_monetary_policy_desc: "Sophisticated management of paper currency supply, interest rates, and government reserves, pioneering modern fiscal practices."
 nd_cso_industrial_iron: "Industrial Ironworks"
 nd_cso_industrial_iron_desc: "Expansion of coal-fired blast furnaces to industrial scale, producing steel for weapons, tools, and infrastructure across the realm."
 nd_cso_literary_tradition: "Literary Compilations"
 nd_cso_literary_tradition_desc: "The Song tradition of encyclopedic compilations, preserving and systematizing knowledge across every domain from astronomy to agriculture."
 nd_cso_coastal_defense: "Coastal Defense Modernization"
 nd_cso_coastal_defense_desc: "Fortification of the southern coastline with batteries, watchtowers, and patrol fleets to protect Song maritime commerce."
 nd_cso_industrial_modernization: "Industrial Modernization"
 nd_cso_industrial_modernization_desc: "Application of Song engineering traditions to modern industrial production, mechanizing workshops and expanding output."
 nd_cso_maritime_modernization: "Maritime Modernization"
 nd_cso_maritime_modernization_desc: "Modernization of the Song merchant and naval fleet, incorporating advances in shipbuilding and navigation technology."
 nd_cso_constitutional_reform: "Constitutional Reform"
 nd_cso_constitutional_reform_desc: "Formalization of the Song meritocratic tradition into constitutional principles of governance and rule of law."
 nd_cso_modern_education: "Modern Education System"
 nd_cso_modern_education_desc: "Transformation of the Neo-Confucian academy system into a modern educational network, maintaining the Song tradition of universal literacy."
 nd_cso_delta_industry: "Yangtze Delta Industry"
 nd_cso_delta_industry_desc: "The Yangtze delta, already the most productive region on earth, becomes the engine of a modern industrial economy."
 n_nd_cso_paddle_warship: "Paddle-Wheel Warship"
 n_nd_cso_paddle_warship_desc: "A treadmill-driven vessel of remarkable speed, armed with deck-mounted trebuchets for hurling gunpowder bombs. Song paddle-wheelers could outmaneuver any contemporary galley."
 n_nd_cso_paddle_warship_levy: "Paddle-Wheel Warship"
 n_nd_cso_paddle_warship_levy_desc: "A conscripted paddle-wheel vessel from the Song river fleet."
 a_nd_cso_fire_lance: "Fire Lance Infantry"
 a_nd_cso_fire_lance_desc: "Elite soldiers wielding fire lances — gunpowder-packed tubes mounted on spear shafts that project flame and shrapnel before the wielder closes to melee. A terrifying weapon unique to Song warfare."
 a_nd_cso_fire_lance_levy: "Fire Lance Militia"
 a_nd_cso_fire_lance_levy_desc: "Conscripted infantry equipped with fire lances, bringing gunpowder weapons to the Song levy system."
 n_nd_cso_tower_ship: "Tower Ship"
 n_nd_cso_tower_ship_desc: "A multi-decked armored warship carrying hundreds of soldiers and deck-mounted trebuchets. Tower ships dominated river and coastal combat through sheer size and firepower."
 a_nd_cso_thundercrash: "Thundercrash Bombard"
 a_nd_cso_thundercrash_desc: "Early gunpowder artillery hurling iron-cased explosive bombs with devastating effect. Named for the terrifying crash of their detonation."
 n_nd_cso_ironclad_galley: "Ironclad Galley"
 n_nd_cso_ironclad_galley_desc: "A paddle-wheel warship armored with riveted iron plates, combining the speed of a galley with unprecedented protection against enemy fire."
 n_nd_cso_trade_junk: "Hangzhou Trade Junk"
 n_nd_cso_trade_junk_desc: "A fast, seaworthy merchant vessel from Hangzhou, armed for self-defense on the maritime silk route. These junks carried Song goods as far as East Africa."
 nd_cso_iron_foundry: "Song Iron Foundry"
 nd_cso_iron_foundry_desc: "A coal-fired blast furnace complex producing iron and steel at industrial scale. By 1078, Song foundries produced more iron than England would manage seven centuries later."
 nd_cso_currency_bureau: "Paper Currency Bureau"
 nd_cso_currency_bureau_desc: "A government printing office producing jiaozi paper currency, employing over a thousand workers to mint the world's first fiat money."
 nd_cso_naval_shipyard: "Song Naval Shipyard"
 nd_cso_naval_shipyard_desc: "A specialized facility for constructing paddle-wheel warships, with treadmill-testing yards and iron-fitting workshops."
 nd_cso_printing_house: "Song Printing House"
 nd_cso_printing_house_desc: "A publishing facility producing books using both woodblock and movable type techniques, supplying the most literate society on earth."
 nd_cso_gunpowder_arsenal: "Gunpowder Arsenal"
 nd_cso_gunpowder_arsenal_desc: "A weapons research and manufacturing center producing fire lances, thundercrash bombs, and gunpowder mixtures according to the Wujing Zongyao formulas."
 nd_cso_tea_house: "Song Tea House"
 nd_cso_tea_house_desc: "A licensed commercial and cultural establishment where merchants negotiate deals over elaborate tea ceremonies, serving as a hub for both trade and literati culture."
 nd_cso_riverine_fort: "Yangtze River Fort"
 nd_cso_riverine_fort_desc: "A fortified garrison commanding a strategic point on the Yangtze, part of the Southern Song's river defense network that held the line against northern invasion for over a century."
 nd_cso_academy: "Academy of Learning"
 nd_cso_academy_desc: "A Neo-Confucian study center dedicated to the teachings of Zhu Xi, where scholar-officials pursue the investigation of things and the cultivation of moral character."
 nd_cso_blast_furnace: "Coal-Fired Blast Furnace"
 nd_cso_blast_furnace_desc: "Industrial iron smelting using coal fuel and water-powered bellows, producing steel at unprecedented scale."
 nd_cso_advanced_smelting: "Advanced Steel Production"
 nd_cso_advanced_smelting_desc: "Refined smelting techniques using copper alloys and higher-grade coal, producing superior steel for weapons and tools."
 nd_cso_currency_printing: "Currency Printing"
 nd_cso_currency_printing_desc: "Specialized printing of paper money using multi-color ink, silk fiber paper, and complex designs to prevent counterfeiting."
 nd_cso_shipyard_upkeep: "Shipyard Operations"
 nd_cso_shipyard_upkeep_desc: "Maintenance of paddle-wheel construction facilities, including timber yards, iron workshops, and treadmill assembly areas."
 nd_cso_book_printing: "Book Printing"
 nd_cso_book_printing_desc: "Mass production of books using woodblock and movable type techniques, spreading literacy and knowledge throughout the realm."
 nd_cso_arsenal_upkeep: "Arsenal Operations"
 nd_cso_arsenal_upkeep_desc: "Production and storage of gunpowder weapons, including the mixing of saltpeter, sulfur, and charcoal according to classified formulas."
 nd_cso_tea_service: "Tea Service"
 nd_cso_tea_service_desc: "The elaborate preparation and service of tea using fine pottery and beeswax-sealed containers, central to Song commercial and cultural life."
 nd_cso_fort_garrison: "Fort Garrison"
 nd_cso_fort_garrison_desc: "Provisioning and arming of Yangtze river fortifications with weapons, stone for repairs, and rice for the garrison."
 nd_cso_academy_upkeep: "Academy Maintenance"
 nd_cso_academy_upkeep_desc: "Supply of paper, books, and lamp oil for Neo-Confucian academies where scholars study the classics and prepare for examinations."
 levy_nd_cso_fire_lance: "Fire Lance Levy"
 levy_nd_cso_fire_lance_desc: "Conscripted fire lance infantry from Song garrison towns."
 levy_nd_cso_paddle_warship: "Paddle-Wheel Levy"
 levy_nd_cso_paddle_warship_desc: "Conscripted paddle-wheel vessels from Song river towns, crewed by rivermen and fishermen."
 nd_cso_silk_workshop: "Song Silk Workshop"
 nd_cso_silk_workshop_desc: "A specialized weaving facility producing the finest silk textiles in the world. Song silk workshops combined traditional techniques with new loom designs to create fabrics traded as far as the Mediterranean."
 nd_cso_porcelain_kiln: "Song Porcelain Kiln"
 nd_cso_porcelain_kiln_desc: "A celadon firing facility producing the distinctive jade-green porcelain that became the most sought-after luxury commodity across Asia and the Indian Ocean world."
 nd_cso_silk_weaving: "Silk Weaving"
 nd_cso_silk_weaving_desc: "Transformation of raw silk into fine cloth using advanced loom techniques and natural dyes, producing textiles of unmatched quality."
 nd_cso_celadon_production: "Celadon Production"
 nd_cso_celadon_production_desc: "Firing of refined clay with coal to produce Song celadon porcelain, prized for its translucent jade-green glaze."
 nd_cso_formed_tt: "Southern Song has been formed"
 nd_cso_path_a_tt: "Chose Maritime Prosperity"
 nd_cso_path_b_tt: "Chose Imperial Examinations"
 nd_cso_destiny: "Destiny of the Song"
 nd_cso_destiny_desc: "The Song dynasty has risen again. Now the restored empire must chart its future -- will it look outward across the seas, or inward to perfect the art of governance?"
 nd_cso_dest_fujian_ports: "The Fujian Entrepots"
 nd_cso_dest_fujian_ports_desc: "Quanzhou and Zhangzhou are the greatest ports in the world. Secure them, fill the treasury, and the oceans shall open before us."
 nd_cso_dest_nanyang_trade: "Lords of the Nanyang"
 nd_cso_dest_nanyang_trade_desc: "The spice islands and the Strait of Malacca are the chokepoints of maritime Asia. Song treasure fleets must command these waters."
 nd_cso_dest_ocean_hegemony: "Masters of Every Sea"
 nd_cso_dest_ocean_hegemony_desc: "From the Malabar Coast to the Persian Gulf, Song merchants shall trade in every port. No sea shall be closed to our fleets."
 nd_cso_dest_southern_order: "Order of the Southern Realm"
 nd_cso_dest_southern_order_desc: "Before the Song can look north, it must perfect governance in the south. Establish modern banking, develop the land, and forge a bureaucracy without equal."
 nd_cso_dest_northern_recovery: "Reclaiming the Central Plains"
 nd_cso_dest_northern_recovery_desc: "Kaifeng and Luoyang, the old Song capitals, must be returned to the dynasty. The northern frontier must be secured by force of arms."
 nd_cso_dest_mandate_perfected: "The Mandate Perfected"
 nd_cso_dest_mandate_perfected_desc: "With the old capitals restored and Dadu itself under Song control, the dynasty must achieve a level of development and prestige that proves the Mandate of Heaven is truly theirs."
 nd_cso.7.t: "The Song Endures"
 nd_cso.7.d: "Against all odds, the Song dynasty has survived its crises and emerged stronger than before. The scholars of the Academy speak of a renewed Mandate -- a dynasty that has proven itself through perseverance and good governance. Whether the future lies upon the waves or within the examination halls, the Song shall write the next chapter of its long history."
 nd_cso.7.a: "The Song shall endure for ten thousand years."
 nd_cso.8.t: "The Ports of Fujian"
 nd_cso.8.d: "The great harbor of Quanzhou -- known to Arab merchants as Zayton -- and the bustling entrepot of Zhangzhou are now firmly under Song control. Together with the workshops of Hangzhou, they form a commercial triangle of unmatched wealth. Foreign merchants from Arabia, India, and the Spice Islands crowd the wharves, trading pepper and incense for Song silk and porcelain.\n\nThe Superintendent of Maritime Trade reports customs revenues beyond anything the treasury has seen. The oceans themselves seem to beckon."
 nd_cso.8.a: "Let the Song banner fly above every mast."
 nd_cso.9.t: "Mastery of the Nanyang"
 nd_cso.9.d: "Song influence now stretches across the South China Sea to the Strait of Malacca. Our merchants dominate the trade in spices, camphor, and tropical hardwoods that flows through these waters. The great entrepots of Palembang and Malacca, once independent kingdoms, now operate under Song commercial supervision.\n\nThis achievement has no precedent in Chinese history. The dynasty that was mocked for retreating south has built something no northern empire ever possessed -- a maritime sphere of influence spanning thousands of li."
 nd_cso.9.a: "Monopolize the spice trade at its source."
 nd_cso.9.b: "Bind these kingdoms to the Song as tributaries."
 nd_cso.10.t: "The Song Oceans"
 nd_cso.10.d: "Song treasure fleets now anchor in the harbors of India and the Persian Gulf. The compass-guided junks of Hangzhou carry porcelain and silk to markets that once seemed impossibly distant. At Calicut, Song merchants negotiate alongside Arab traders. At Hormuz, the gateway to the Mediterranean trade, Song goods command premium prices.\n\nThis is a commercial empire without parallel -- built not on conquest alone, but on the superiority of Song navigation, shipbuilding, and the sheer volume of luxury goods our workshops produce."
 nd_cso.10.a: "Continue Zheng He's vision of peaceful exploration."
 nd_cso.10.b: "Assert the Song Mandate over these waters."
 nd_cso.11.t: "A Well-Ordered Realm"
 nd_cso.11.d: "The southern provinces have been transformed. Where once there was frontier wilderness and restive minorities, there are now thriving cities connected by canals, governed by examination-selected magistrates, and linked to the capital through an efficient postal system. The banking houses of Hangzhou finance development across the realm.\n\nThe scholars say that this is what the ancient sages envisioned -- governance through moral example and bureaucratic competence, not through force. The south is ready to serve as the foundation for greater things."
 nd_cso.11.a: "The south is well-ordered. What comes next?"
 nd_cso.12.t: "The Return to the North"
 nd_cso.12.d: "Song banners fly once more over Kaifeng and Luoyang -- the ancient capitals where the dynasty was born. The restoration of the northern heartland has been the dream of every Song patriot since the Jurchen invasion drove the court south. The old Imperial Way in Kaifeng is being rebuilt, its marketplaces and pleasure quarters restored to their former glory.\n\nBut the north has changed in the centuries of foreign rule. Its people have adopted different customs, its fields lie partially fallow, and its cities have shrunk. The question is whether to reconquer aggressively or integrate patiently."
 nd_cso.12.a: "Press the reconquest -- the north must be freed."
 nd_cso.12.b: "Integrate the north gradually into Song order."
 nd_cso.13.t: "The Perfect Dynasty"
 nd_cso.13.d: "From Hangzhou in the south to Dadu in the north, the Song dynasty now governs the most developed, most literate, and most prosperous realm the world has ever known. The civil examination system selects the best minds regardless of birth. The imperial library preserves the accumulated wisdom of three millennia. The land produces more rice, iron, silk, and porcelain than any other civilization.\n\nScholars speak of a new golden age -- one that surpasses even the legendary era of the Three Sovereigns. The Song has not merely restored the Mandate of Heaven; it has perfected it."
 nd_cso.13.a: "Build an eternal bureaucracy to outlast any dynasty."
 nd_cso.13.b: "Patronize a renaissance of arts and learning."
 STATIC_MODIFIER_NAME_nd_cso_dest_spice_monopoly: "Spice Trade Monopoly"
 STATIC_MODIFIER_DESC_nd_cso_dest_spice_monopoly: "Song control of the Nanyang trade routes has created a near-monopoly on the flow of spices to East Asian markets."
 STATIC_MODIFIER_NAME_nd_cso_dest_tributary_network: "Nanyang Tributary Network"
 STATIC_MODIFIER_DESC_nd_cso_dest_tributary_network: "The maritime kingdoms of Southeast Asia acknowledge Song suzerainty, sending tribute missions and receiving trade privileges in return."
 STATIC_MODIFIER_NAME_nd_cso_dest_zheng_he_legacy: "Legacy of the Treasure Fleets"
 STATIC_MODIFIER_DESC_nd_cso_dest_zheng_he_legacy: "Song treasure fleets range across the Indian Ocean, projecting maritime power and commercial influence to every shore."
 STATIC_MODIFIER_NAME_nd_cso_dest_maritime_mandate: "Maritime Mandate"
 STATIC_MODIFIER_DESC_nd_cso_dest_maritime_mandate: "The Song claim sovereignty over the seas themselves, enforcing trading standards and collecting tolls at every chokepoint."
 STATIC_MODIFIER_NAME_nd_cso_dest_reconquest_fervor: "Reconquest Fervor"
 STATIC_MODIFIER_DESC_nd_cso_dest_reconquest_fervor: "The liberation of the old capitals has ignited patriotic fervor across the realm. Song armies march north with the zeal of a righteous cause."
 STATIC_MODIFIER_NAME_nd_cso_dest_northern_integration: "Northern Integration"
 STATIC_MODIFIER_DESC_nd_cso_dest_northern_integration: "Patient administration and cultural outreach gradually restore Song identity in the long-alienated northern provinces."
 STATIC_MODIFIER_NAME_nd_cso_dest_eternal_bureaucracy: "The Eternal Bureaucracy"
 STATIC_MODIFIER_DESC_nd_cso_dest_eternal_bureaucracy: "A perfected examination system and comprehensive legal code create a bureaucracy that can govern effectively regardless of who sits upon the throne."
 STATIC_MODIFIER_NAME_nd_cso_dest_renaissance_court: "Song Renaissance"
 STATIC_MODIFIER_DESC_nd_cso_dest_renaissance_court: "The Song court becomes the patron of a new golden age of arts, letters, and natural philosophy, attracting scholars from across the known world."
 nd_cso_treasure_fleet_harbor: "Treasure Fleet Harbor"
 nd_cso_treasure_fleet_harbor_desc: "A massive purpose-built harbor facility capable of constructing, outfitting, and supplying the enormous treasure fleet junks that project Song power across every ocean."
 nd_cso_treasure_fleet_maintenance: "Treasure Fleet Maintenance"
 nd_cso_treasure_fleet_maintenance_desc: "Provisioning and upkeep of the great treasure fleet harbor, consuming vast quantities of lumber, naval stores, and iron fittings."
 nd_cso_imperial_library: "Imperial Library"
 nd_cso_imperial_library_desc: "The greatest repository of knowledge in the world, housing millions of volumes covering every branch of learning. The Imperial Library preserves and systematizes the accumulated wisdom of Chinese civilization."
 nd_cso_imperial_library_maintenance: "Library Maintenance"
 nd_cso_imperial_library_maintenance_desc: "Maintaining the vast collections of the Imperial Library requires constant supplies of paper, ink, and expert care to preserve ancient texts."
