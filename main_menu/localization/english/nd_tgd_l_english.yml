l_english:
 STATIC_MODIFIER_NAME_nd_tgd_restore_protectorates: "Restore the Protectorates"
 STATIC_MODIFIER_DESC_nd_tgd_restore_protectorates: "The glory of Tang lies in its reach beyond the mountains. From the Jade Gate to the shores of the Caspian, the Protectorates General secured an empire spanning steppe, desert, and oasis. Through military might and diplomatic cunning, the Tang brought order to the Western Regions and controlled the arteries of continental trade."
 STATIC_MODIFIER_NAME_nd_tgd_golden_age_of_letters: "Golden Age of Letters"
 STATIC_MODIFIER_DESC_nd_tgd_golden_age_of_letters: "Under Tang patronage, every faith found welcome in Chang'an. Li Bai raised his cup to the moon, Du Fu mourned the suffering of the common people, and Wang Wei painted landscapes that dissolved the boundary between poetry and painting. Buddhist monks from India, Nestorian priests from Persia, and Manichaean missionaries from Central Asia debated freely in the shadow of the Daming Palace."
 STATIC_MODIFIER_NAME_nd_tgd_protectorate_restored: "Protectorate Restored"
 STATIC_MODIFIER_DESC_nd_tgd_protectorate_restored: "The Protectorate General to Pacify the West has been reestablished, extending military authority across the Tarim Basin and the Tianshan passes. Garrisons secure the trade routes while mobile cavalry forces project power deep into the steppe."
 STATIC_MODIFIER_NAME_nd_tgd_examination_perfected: "Examination Perfected"
 STATIC_MODIFIER_DESC_nd_tgd_examination_perfected: "The jinshi examination system has been refined to its highest form. Any man of talent, regardless of birth, may rise to serve the Son of Heaven through literary excellence and administrative skill."
 nd_tgd.1.t: "The Tang Restoration"
 nd_tgd.1.d: "Chang'an blazes with new glory. The ancient capital of the Tang, where once two million souls from every corner of the known world gathered beneath crimson palace gates, lives again. From Jingzhao to Kashgar, from the Yellow River to the Tianshan, an empire that once defined civilization itself stirs from centuries of slumber.\n\nThe Tang at its zenith was not merely a Chinese dynasty — it was a cosmopolitan world-empire where Turkic generals led Chinese armies, Persian merchants thronged the Western Market, and Buddhist sutras sat alongside Nestorian gospels and Manichaean hymns. Now the question falls to you: what shall define this restoration?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_tgd.1.a: "March west! Restore the Protectorates beyond the Jade Gate."
 nd_tgd.1.b: "Let the Brush conquer what the Sword cannot."
 nd_tgd.2.t: "The Anxi Protectorate Restored"
 nd_tgd.2.d: "In the year 640, Emperor Taizong established the Protectorate General to Pacify the West at Xizhou, later moving its seat to Kucha. At its height, the Anxi Protectorate commanded four major garrisons — at Kucha, Khotan, Kashgar, and Karashahr — securing the entire Tarim Basin and projecting Tang authority deep into Transoxiana.\n\nThe An Lushan Rebellion of 755 forced the withdrawal of Anxi's garrisons to defend the heartland, and the Protectorate was gradually lost to the Tibetan Empire and Turkic powers. Now, with our banners flying once more over the Western Regions, the Anxi Protectorate is restored — its relay stations, garrison towns, and caravan guards ensuring safe passage for merchants, monks, and diplomats alike."
 nd_tgd.2.a: "The Western Regions are secure once more."
 nd_tgd.2.b: "A triumph, but the work continues."
 nd_tgd.3.t: "The Imperial Examination Perfected"
 nd_tgd.3.d: "The keju examination, first systematized under the Sui, reached its golden form under the Tang. The jinshi degree — Presented Scholar — became the highest achievement a man could aspire to, tested not merely in rote memorization but in literary composition, policy analysis, and moral philosophy.\n\nUnder Empress Wu Zetian, the system was thrown open wider than ever before, breaking the grip of aristocratic families on government positions. The examination halls of Chang'an saw candidates from every province compete on merit alone. This meritocratic revolution produced statesmen like Zhang Jiuling, whose governance earned him the title of model chancellor for all dynasties to follow."
 nd_tgd.3.a: "Let merit alone determine who serves the throne."
 nd_tgd.3.b: "The examination is a tool, not a religion."
 nd_tgd.4.t: "The Nestorian Stele"
 nd_tgd.4.d: "In 781, a limestone stele was erected in Chang'an recording the arrival of Nestorian Christianity in China a century and a half earlier. The inscription — written in both Chinese and Syriac — tells how the Persian monk Aluoben arrived at the Tang court in 635 and was received by Emperor Taizong, who examined his scriptures and declared: 'The Way has no unchanging name, sages have no unchanging method. Teaching is established to suit the land, and secretly help all living things.'\n\nThis spirit of religious tolerance defined the Tang cosmopolis. Buddhist monasteries, Daoist temples, Zoroastrian fire altars, Manichaean light-houses, Islamic mosques, and Nestorian churches stood within the same city walls, each contributing to a civilization that measured greatness not by uniformity but by the breadth of its embrace."
 nd_tgd.4.a: "All paths lead to truth under Tang heaven."
 nd_tgd.5.t: "The Modao Infantry"
 nd_tgd.5.d: "The modao — a fearsome two-handed sword nearly seven feet in length — was the signature weapon of Tang heavy infantry. Wielded in dense formations by select troops, the modao created a wall of steel that could stop a cavalry charge dead. At the Battle of the Mohe River in 732, the modao infantry of the Tang general Zhang Shougui broke wave after wave of Khitan cavalry, leaving the steppe warriors stunned by the discipline and killing power of these foot soldiers.\n\nThe modao required years of training and exceptional strength. Units equipped with these weapons were drawn from the most experienced soldiers of the frontier garrisons, men who had spent their lives fighting nomadic raiders and understood how to use terrain and formation to neutralize the mobility advantage of mounted enemies."
 nd_tgd.5.a: "The modao speaks louder than any argument."
 nd_tgd.6.t: "The Silk Road Renaissance"
 nd_tgd.6.d: "The Silk Road under Tang management was not merely a trade route — it was the nervous system of Eurasian civilization. From Chang'an's bustling Western Market, caravans departed carrying silk, porcelain, tea, and paper westward through the Hexi Corridor and the Jade Gate, crossing the Taklamakan's northern and southern rim roads to reach Kashgar, Samarkand, Baghdad, and ultimately Constantinople.\n\nIn return came Arabian horses, Persian glass, Indian spices, Roman gold coins, and Central Asian music that transformed Tang court entertainment. Sogdian merchants — the 'FedEx of the ancient world' — ran networks of trading houses from Chang'an to the Mediterranean. The Tang government maintained relay stations, regulated merchants, and garrisoned oasis towns, creating the safest and most profitable trade corridor the world had ever known."
 nd_tgd.6.a: "The Road connects all peoples under heaven."
 nd_tgd_fubing_system: "Fubing Militia System"
 nd_tgd_fubing_system_desc: "The fubing system assigns land to farmer-soldiers who serve in rotation at the capital or frontier garrisons, providing a vast reserve of trained militia at minimal cost to the state."
 nd_tgd_equal_field_system: "Equal-Field System"
 nd_tgd_equal_field_system_desc: "The juntian system distributes state land equally among adult males, ensuring tax revenue while preventing dangerous concentrations of wealth in aristocratic hands."
 nd_tgd_post_road_system: "Imperial Post Roads"
 nd_tgd_post_road_system_desc: "A network of relay stations spaced every thirty li connects the capital to the furthest frontier provinces, enabling rapid communication, troop movement, and administrative control."
 nd_tgd_modao_tradition: "Modao Heavy Infantry"
 nd_tgd_modao_tradition_desc: "The modao — a devastating two-handed long blade — allows elite infantry to form impenetrable walls of steel against cavalry charges, a tradition born on Tang frontiers."
 nd_tgd_jiedushi_system: "Jiedushi Military Governorships"
 nd_tgd_jiedushi_system_desc: "Regional military commissioners exercise combined civil and military authority over frontier circuits, maintaining professional garrison armies to defend against nomadic incursions."
 nd_tgd_buddhist_patronage: "Buddhist State Patronage"
 nd_tgd_buddhist_patronage_desc: "Imperial sponsorship of Buddhist monasteries, translation projects, and pilgrim networks creates a vast religious infrastructure that enhances literacy, cultural exchange, and social stability."
 nd_tgd_xuanjia_tradition: "Xuanjia Heavy Cavalry"
 nd_tgd_xuanjia_tradition_desc: "The xuanjia — 'black armor' cataphracts — represent Tang heavy cavalry at its finest: fully armored riders on barded horses, capable of delivering devastating shock charges."
 nd_tgd_silk_road_mastery: "Silk Road Mastery"
 nd_tgd_silk_road_mastery_desc: "Tang control of the major Silk Road arteries transforms overland trade from a dangerous gamble into a regulated, profitable, and secure enterprise connecting East and West."
 nd_tgd_sancai_ceramics: "Sancai Ceramic Tradition"
 nd_tgd_sancai_ceramics_desc: "The distinctive three-color glazed pottery of the Tang — featuring amber, green, and cream tones — becomes both a cultural icon and a valuable export commodity."
 nd_tgd_nestorian_stele: "Nestorian Stele"
 nd_tgd_nestorian_stele_desc: "The erection of the Nestorian Stele in Chang'an symbolizes Tang religious pluralism, where Christianity, Islam, Manichaeism, Zoroastrianism, Buddhism, and Daoism coexist under imperial protection."
 nd_tgd_hanlin_scholars: "Hanlin Academy"
 nd_tgd_hanlin_scholars_desc: "The Hanlin Academy gathers the most brilliant scholars in the empire to draft imperial edicts, compose state documents, and advise on policy — a reservoir of administrative excellence."
 nd_tgd_frontier_horse_archers: "Frontier Horse Archers"
 nd_tgd_frontier_horse_archers_desc: "Recruited from the mixed populations of the frontier — Turkic, Sogdian, and Chinese — these fast-moving mounted archers serve as scouts, raiders, and flanking forces."
 nd_tgd_grotto_devotion: "Grotto Temple Devotion"
 nd_tgd_grotto_devotion_desc: "The great cave temple complexes at Dunhuang, Longmen, and Yungang represent centuries of devotional carving, painting, and sculpture — repositories of Buddhist art and scholarship."
 nd_tgd_anxi_protectorate: "Anxi Protectorate"
 nd_tgd_anxi_protectorate_desc: "The Protectorate General to Pacify the West controls the Tarim Basin through four garrisons at Kucha, Khotan, Kashgar, and Karashahr, securing the western approaches to the empire."
 nd_tgd_imperial_silk: "Imperial Silk Production"
 nd_tgd_imperial_silk_desc: "State-controlled silk workshops produce the finest textiles in the world, from brocades woven with gold thread to gossamer-thin gauzes prized from Japan to Byzantium."
 nd_tgd_poetry_golden_age: "Poetry Golden Age"
 nd_tgd_poetry_golden_age_desc: "The Tang produces over 48,000 surviving poems by more than 2,200 authors. Li Bai, Du Fu, Wang Wei, and Bai Juyi establish the literary canon that will define Chinese civilization."
 nd_tgd_jinshi_perfected: "Jinshi Examination Perfected"
 nd_tgd_jinshi_perfected_desc: "The jinshi degree — testing literary composition, policy analysis, and moral philosophy — becomes the supreme pathway to government service, breaking aristocratic monopolies on power."
 nd_tgd_shencea_tradition: "Shencea Imperial Guards"
 nd_tgd_shencea_tradition_desc: "The Shencea Army — originally the Emperor's bodyguard — grows into the most powerful military force of the late Tang, numbering 150,000 professional soldiers."
 nd_tgd_sogdian_networks: "Sogdian Merchant Networks"
 nd_tgd_sogdian_networks_desc: "Sogdian merchants from Samarkand and Bukhara operate vast trading networks stretching from Chang'an to Constantinople, serving as the commercial backbone of the Silk Road."
 nd_tgd_tea_horse_trade: "Tea-Horse Trade"
 nd_tgd_tea_horse_trade_desc: "The strategic exchange of Chinese tea for nomadic horses creates a mutually dependent border economy that stabilizes frontier relations and provides the empire with superior cavalry mounts."
 nd_tgd_confessional_tolerance: "Confessional Tolerance"
 nd_tgd_confessional_tolerance_desc: "The Tang tradition of religious pluralism is extended and formalized, ensuring that communities of every faith contribute peacefully to the prosperity of the empire."
 nd_tgd_silk_road_renaissance: "Silk Road Renaissance"
 nd_tgd_silk_road_renaissance_desc: "A renewed wave of Silk Road commerce brings unprecedented wealth and cultural exchange, as improved infrastructure and diplomatic relationships open new trade corridors."
 nd_tgd_frontier_modernization: "Frontier Military Reform"
 nd_tgd_frontier_modernization_desc: "The frontier army is modernized with standardized equipment, professional training, and reformed command structures, creating a mobile and disciplined force."
 nd_tgd_grand_canal_trade: "Grand Canal Integration"
 nd_tgd_grand_canal_trade_desc: "The Grand Canal links the Yangtze rice surplus to the northern heartland, enabling massive internal trade and supporting the population of the capital region."
 nd_tgd_imperial_consolidation: "Imperial Consolidation"
 nd_tgd_imperial_consolidation_desc: "Imperial authority is extended and solidified through administrative reform, cultural integration, and the suppression of regional separatism."
 nd_tgd_woodblock_printing: "Woodblock Printing"
 nd_tgd_woodblock_printing_desc: "Woodblock printing enables the mass reproduction of texts — Buddhist sutras, Confucian classics, and government decrees — spreading literacy and institutional knowledge across the empire."
 nd_tgd_gunpowder_alchemy: "Gunpowder Alchemy"
 nd_tgd_gunpowder_alchemy_desc: "Tang alchemists seeking the elixir of immortality stumble upon a more immediate discovery: gunpowder. Fire arrows, incendiary bombs, and proto-rockets transform siege warfare."
 nd_tgd_centralized_bureaucracy: "Centralized Bureaucracy"
 nd_tgd_centralized_bureaucracy_desc: "The examination-based bureaucratic system reaches full maturity, producing a governing class selected entirely on merit and loyalty to the central court."
 nd_tgd_maritime_silk_road: "Maritime Silk Road"
 nd_tgd_maritime_silk_road_desc: "As overland routes face disruption, maritime trade through Guangzhou, Quanzhou, and the South China Sea grows to rival and eventually exceed the continental Silk Road in volume."
 nd_tgd_porcelain_mastery: "Porcelain Export Mastery"
 nd_tgd_porcelain_mastery_desc: "Chinese porcelain — 'white gold' — becomes the most sought-after commodity in world trade. Ship after ship carries blue-and-white wares to markets from Zanzibar to Lisbon."
 nd_tgd_standing_frontier_army: "Standing Frontier Army"
 nd_tgd_standing_frontier_army_desc: "The frontier garrison system evolves into a permanent standing army, with professional soldiers serving year-round in well-supplied fortified positions along the border."
 nd_tgd_cosmopolitan_court: "Cosmopolitan Court"
 nd_tgd_cosmopolitan_court_desc: "The imperial court welcomes talent from every nation and culture, integrating foreign administrators, generals, artists, and merchants into the fabric of governance."
 nd_tgd_tea_culture: "Formalized Tea Culture"
 nd_tgd_tea_culture_desc: "Lu Yu's Classic of Tea established the philosophy and practice of tea preparation as high art. Tea houses become centers of social life, diplomacy, and literary exchange."
 nd_tgd_border_management: "Strategic Border Management"
 nd_tgd_border_management_desc: "A comprehensive system of walls, passes, garrison towns, and diplomatic protocols creates a layered defense-in-depth along the northern and western frontiers."
 nd_tgd_industrial_silk: "Industrial Silk Production"
 nd_tgd_industrial_silk_desc: "Mechanized looms and organized factory production transform silk manufacture from artisanal craft to industrial enterprise, vastly increasing output and export capacity."
 nd_tgd_modern_academy: "Modern Academy System"
 nd_tgd_modern_academy_desc: "The traditional examination system evolves to incorporate modern subjects — science, engineering, foreign languages — while retaining its meritocratic foundations."
 nd_tgd_continental_rail: "Continental Rail Network"
 nd_tgd_continental_rail_desc: "Iron rails trace the ancient Silk Road corridors, connecting Chang'an to the western frontier and beyond with speed and reliability the camel caravans could never match."
 nd_tgd_modern_army: "Modern Army Reform"
 nd_tgd_modern_army_desc: "The frontier garrison tradition is transformed into a modern professional army with standardized training, equipment, and tactical doctrine drawn from global military science."
 nd_tgd_cultural_renaissance: "Cultural Renaissance"
 nd_tgd_cultural_renaissance_desc: "A new generation of artists, poets, and thinkers draws on the Tang literary canon to create a cultural renaissance that celebrates both heritage and innovation."
 nd_tgd_silk_road_revival: "Silk Road Revival"
 nd_tgd_silk_road_revival_desc: "Modern infrastructure, diplomatic agreements, and commercial treaties revive the ancient Silk Road as a thriving corridor of trade, connecting East Asian markets to Central Asia and beyond."
 a_nd_tgd_modao_infantry: "Modao Infantry"
 a_nd_tgd_modao_infantry_desc: "Elite heavy infantry wielding the fearsome modao — a seven-foot two-handed blade capable of cutting through horse and rider alike. These anti-cavalry specialists form impenetrable walls of steel."
 a_nd_tgd_xuanjia_cavalry: "Xuanjia Heavy Cavalry"
 a_nd_tgd_xuanjia_cavalry_desc: "The 'Black Armor' cataphracts of the Tang — fully armored riders on barded horses, delivering devastating shock charges that shatter enemy formations."
 a_nd_tgd_frontier_horse_archer: "Frontier Horse Archers"
 a_nd_tgd_frontier_horse_archer_desc: "Light cavalry recruited from the frontier's mixed populations — Turkic, Sogdian, and Chinese. Fast, agile raiders expert at scouting, flanking, and harassing enemy supply lines."
 a_nd_tgd_shencea_guards: "Shencea Imperial Guards"
 a_nd_tgd_shencea_guards_desc: "The elite Shencea Army, originally the Emperor's personal bodyguard, evolved into the most powerful military formation of the late Tang — professional, disciplined, and fiercely loyal."
 a_nd_tgd_fubing_militia: "Fubing Militia"
 a_nd_tgd_fubing_militia_desc: "Farmer-soldiers serving in rotation under the fubing system, providing a vast reserve of trained infantry at minimal cost to the state."
 a_nd_tgd_frontier_levy_cavalry: "Frontier Levy Cavalry"
 a_nd_tgd_frontier_levy_cavalry_desc: "Mixed Turkic and Chinese steppe riders raised from the frontier garrisons, combining nomadic riding skill with Tang military discipline."
 nd_tgd_caravanserai: "Silk Road Caravanserai"
 nd_tgd_caravanserai_desc: "A fortified waystation along the Silk Road providing shelter, food, fodder, and a secure marketplace for merchant caravans traversing the western trade routes."
 nd_tgd_sancai_kiln: "Sancai Ceramic Kiln"
 nd_tgd_sancai_kiln_desc: "Specialized kilns producing the famous Tang sancai — tri-color glazed pottery in amber, green, and cream — prized as luxury goods and diplomatic gifts across Eurasia."
 nd_tgd_frontier_garrison: "Frontier Garrison"
 nd_tgd_frontier_garrison_desc: "A jiedushi military command post on the frontier, maintaining a permanent professional garrison to defend against nomadic incursions and project imperial authority."
 nd_tgd_grotto_temple: "Buddhist Grotto Temple"
 nd_tgd_grotto_temple_desc: "A cave temple complex carved into cliffsides, decorated with painted murals and carved Buddhas. Centers of devotion, scholarship, and artistic achievement in the Tang Buddhist tradition."
 nd_tgd_hanlin_academy: "Hanlin Imperial Academy"
 nd_tgd_hanlin_academy_desc: "The highest scholarly institution of the empire, where the most brilliant jinshi graduates draft imperial edicts, compile histories, and advise the Son of Heaven on matters of state."
 nd_tgd_silk_workshop: "Imperial Silk Workshop"
 nd_tgd_silk_workshop_desc: "State-supervised silk weaving workshops producing the finest textiles in the world — brocades, gauzes, and damasks destined for markets from Nara to Baghdad."
 nd_tgd_relay_station: "Imperial Relay Station"
 nd_tgd_relay_station_desc: "A post road station maintaining fresh horses and provisions for imperial couriers, enabling messages to travel from the capital to the frontier in days rather than weeks."
 nd_tgd_caravan_upkeep: "Caravan Station Maintenance"
 nd_tgd_caravan_upkeep_desc: "Upkeep of the caravanserai including fodder for pack animals, cloth for trade goods wrapping, and timber for structural repairs."
 nd_tgd_sancai_production: "Sancai Pottery Firing"
 nd_tgd_sancai_production_desc: "The production of tri-color glazed ceramics using local clay, lead-based glazes, and carefully controlled kiln temperatures."
 nd_tgd_garrison_upkeep: "Garrison Provisioning"
 nd_tgd_garrison_upkeep_desc: "Military supplies for the frontier garrison including weapons, horse equipment, uniforms, and livestock for rations."
 nd_tgd_grotto_maintenance: "Grotto Temple Upkeep"
 nd_tgd_grotto_maintenance_desc: "Maintenance of the cave temple complex including stone carving, dye pigments for mural restoration, beeswax for devotional candles, and incense for worship."
 nd_tgd_academy_upkeep: "Academy Maintenance"
 nd_tgd_academy_upkeep_desc: "Scholarly supplies for the Imperial Academy including paper for examinations, books for the library, and silk for official documents."
 nd_tgd_silk_weaving: "Imperial Silk Weaving"
 nd_tgd_silk_weaving_desc: "The production of luxury fine cloth from raw silk and dyes, using traditional Tang weaving techniques perfected over centuries."
 nd_tgd_relay_upkeep: "Relay Station Upkeep"
 nd_tgd_relay_upkeep_desc: "Provisioning of the relay station with fresh horses, grain for riders and mounts, and timber for structural maintenance."
 levy_nd_tgd_frontier_cavalry: "Frontier Cavalry Levy"
 levy_nd_tgd_frontier_cavalry_desc: "Steppe cavalry raised from the frontier garrisons, combining Turkic riding traditions with Tang military organization."
 levy_nd_tgd_fubing: "Fubing Militia Levy"
 levy_nd_tgd_fubing_desc: "Farmer-soldiers called to arms under the fubing rotational service system, providing trained infantry reserves at minimal cost."
 nd_tgd_tea_house: "Tea Processing House"
 nd_tgd_tea_house_desc: "A workshop for processing raw tea leaves into prepared tea for trade, combining drying, roasting, and fermentation techniques perfected over centuries."
 nd_tgd_tea_processing: "Tea Leaf Processing"
 nd_tgd_tea_processing_desc: "The production of prepared tea and tea-based liquors from raw leaves using traditional Tang processing methods."
 nd_tgd_gunpowder_foundry: "Gunpowder Foundry"
 nd_tgd_gunpowder_foundry_desc: "A military workshop producing fire arrows, incendiary bombs, and proto-rockets from saltpeter, iron, and other materials — the practical application of Tang alchemical discoveries."
 nd_tgd_fire_arrow_production: "Fire Arrow Production"
 nd_tgd_fire_arrow_production_desc: "The manufacture of fire arrows and incendiary weapons using gunpowder mixtures — devastating siege and anti-cavalry weapons."
 nd_tgd_canal_warehouse: "Grand Canal Warehouse"
 nd_tgd_canal_warehouse_desc: "A major storage and distribution hub along the Grand Canal, facilitating the flow of grain, silk, and manufactured goods between north and south China."
 nd_tgd_canal_operations: "Canal Operations"
 nd_tgd_canal_operations_desc: "Maintenance and operation of the Grand Canal warehouse complex, including dock repairs, storage facilities, and cargo handling."
 nd_tgd_sogdian_merchant_quarter: "Sogdian Merchant Quarter"
 nd_tgd_sogdian_merchant_quarter_desc: "A dedicated quarter within the caravanserai where Sogdian merchants operate, trading in silk, incense, and horses along the great overland routes between East and West."
 nd_tgd_export_ceramics: "Export Ceramics"
 nd_tgd_export_ceramics_desc: "Mass production of decorated porcelain wares for export markets across Eurasia, using refined glazing techniques and standardized designs."
 nd_tgd_printing_workshop: "Woodblock Printing Workshop"
 nd_tgd_printing_workshop_desc: "An in-house printing operation at the Hanlin Academy, using woodblock techniques to reproduce imperial edicts, examination texts, and scholarly works for distribution across the empire."
 nd_tgd_examination_hall: "Confucian Examination Hall"
 nd_tgd_examination_hall_desc: "A provincial examination hall where jinshi candidates are tested on literary composition, policy analysis, and moral philosophy — the meritocratic gateway to imperial service."
 nd_tgd_examination_upkeep: "Examination Maintenance"
 nd_tgd_examination_upkeep_desc: "Supplies for the examination system including paper for test booklets, reference texts for examiners, and cloth for candidate identification."
 nd_tgd_border_watchtower: "Border Watchtower"
 nd_tgd_border_watchtower_desc: "A signal tower on the frontier providing early warning of nomadic incursions through beacon fires visible across vast distances of steppe and desert."
 nd_tgd_watchtower_upkeep: "Watchtower Maintenance"
 nd_tgd_watchtower_upkeep_desc: "Upkeep of the border watchtower including weapons for the garrison, timber for structural repairs, and stone for fortification."
 nd_tgd_formed_tt: "Tang Dynasty has been formed"
 nd_tgd_path_a_tt: "Chose Western Restoration"
 nd_tgd_path_b_tt: "Chose Cultural Ascendancy"
 nd_tgd_destiny: "Destiny of the Tang"
 nd_tgd_destiny_desc: "The Tang Dynasty has been restored. With stability secured, the Son of Heaven must now choose a path for the empire's future: westward conquest to reclaim the Protectorates, or inward cultivation of the arts and learning that defined Tang civilization at its peak."
 nd_tgd_dest_silk_road_command: "Silk Road Command"
 nd_tgd_dest_silk_road_command_desc: "Secure the great Silk Road cities of Samarkand and Bukhara. Control of these ancient crossroads means dominion over the richest trade arteries connecting East and West."
 nd_tgd_dest_steppe_hegemony: "Steppe Hegemony"
 nd_tgd_dest_steppe_hegemony_desc: "Extend Tang authority over the Mongol heartland at Karakorum and the Bactrian gateway at Balkh. The steppe must bow to the Dragon Throne before the march can continue."
 nd_tgd_dest_tianxia_restored: "Tianxia Restored"
 nd_tgd_dest_tianxia_restored_desc: "Complete the restoration of All Under Heaven by planting Tang banners in Delhi and Baghdad. These two ancient capitals mark the furthest horizon of Tang ambition — a universal empire stretching from the Yellow River to the Euphrates."
 nd_tgd_dest_literary_canon: "The Literary Canon"
 nd_tgd_dest_literary_canon_desc: "Cultivate a literary and institutional renaissance that surpasses even the original Tang golden age. Embrace banking and develop the empire's vast territory to support a new flourishing of the arts."
 nd_tgd_dest_universal_learning: "Universal Learning"
 nd_tgd_dest_universal_learning_desc: "Make the Tang capital the center of world commerce and scholarship. Ensure silk flows through your markets and fill your treasury to fund the greatest academy system the world has ever seen."
 nd_tgd_dest_celestial_mandate: "The Celestial Mandate"
 nd_tgd_dest_celestial_mandate_desc: "Achieve the ultimate synthesis of knowledge and civilization. Embrace the scientific revolution, develop the full breadth of your territory, and demonstrate that Tang learning encompasses all fields of human inquiry."
 nd_tgd.7.t: "The Mandate Endures"
 nd_tgd.7.d: "The empire stands stable. From the terraces of the Daming Palace, the restored Tang surveys a realm at peace — a realm that awaits the direction its new master will give it. The question before the Son of Heaven is not whether the Tang will endure, but what form its endurance will take.\n\nThe ancestors built an empire that straddled the known world. They also built a civilization that illuminated it. Both paths lie open."
 nd_tgd.7.a: "The mandate endures."
 nd_tgd.8.t: "The Four Garrisons Secured"
 nd_tgd.8.d: "When General Guo Xiaoke captured Kucha in 648, he established the pattern for all Tang operations in the Western Regions: swift cavalry strikes followed by permanent garrison towns connected by relay stations. Now Samarkand and Bukhara — cities that even Emperor Taizong only reached through diplomacy — fly our banner.\n\nSogdian merchants who once traded under Turkic protection now acknowledge Tang suzerainty. The great bazaars of Transoxiana funnel their wealth eastward along roads patrolled by our cavalry. What Taizong dreamed, we have accomplished."
 nd_tgd.8.a: "The Silk Road answers to the Dragon Throne."
 nd_tgd.9.t: "The Steppe Bows"
 nd_tgd.9.d: "Karakorum, seat of Genghis Khan's empire, now acknowledges Tang authority. Balkh — the 'Mother of Cities' that Alexander the Great once conquered — falls under our protection. The steppe peoples who for centuries threatened the northern frontier have been brought within the imperial order.\n\nThis achievement surpasses anything the original Tang accomplished. Even at its zenith, the Tang's control of the steppe was contested and temporary. We have made it permanent. The question now is how best to govern these vast conquests."
 nd_tgd.9.a: "Extract tribute to fund imperial expansion."
 nd_tgd.9.b: "Adopt nomadic mobility for our armies."
 nd_tgd.10.t: "All Under Heaven"
 nd_tgd.10.d: "Delhi and Baghdad — twin poles of world civilization — now acknowledge the supremacy of the Dragon Throne. No empire in history has achieved what we have accomplished: a single sovereign authority stretching from the rice paddies of the Yangtze to the bazaars of Mesopotamia, from the steppes of Mongolia to the Gangetic plain.\n\nThe Tang at its original height was one great power among several. The Tang restored is something else entirely — a universal empire that has absorbed or subordinated every major civilization on the Eurasian mainland. The concept of Tianxia, 'All Under Heaven,' is no longer a philosophical ideal. It is a geopolitical reality."
 nd_tgd.10.a: "Establish the Pax Sinica across all lands."
 nd_tgd.10.b: "The mandate demands eternal expansion."
 nd_tgd.11.t: "The New Literary Canon"
 nd_tgd.11.d: "Li Bai wrote of moonlight and wine. Du Fu mourned the suffering of the common people. Wang Wei painted landscapes that dissolved the boundary between word and image. For centuries, their works defined the summit of human literary achievement.\n\nNow a new generation of poets, essayists, and philosophers has emerged — heirs to the Tang tradition who have absorbed and transcended it. Banks fund scholarly expeditions. New printing techniques spread knowledge faster than ever before. The empire's vast population, more literate than ever, hungers for texts of every kind."
 nd_tgd.11.a: "A new golden age of letters begins."
 nd_tgd.12.t: "The Academy of All Nations"
 nd_tgd.12.d: "The original Hanlin Academy gathered China's finest minds in a single institution. What we have built dwarfs it in every dimension. Our academies attract scholars from every nation — Persian astronomers, Indian mathematicians, Turkic linguists, Korean historians. Silk revenue funds endowed chairs and research programs.\n\nThe capital's markets overflow with the products of this intellectual ferment: astronomical instruments, medical treatises, geographical atlases, and engineering manuals. Where Tang scholars once translated Buddhist sutras from Sanskrit, our academics synthesize knowledge from every tradition into a unified corpus."
 nd_tgd.12.a: "Found academies across the empire."
 nd_tgd.12.b: "Let merchants and scholars enrich each other."
 nd_tgd.13.t: "The Celestial Library"
 nd_tgd.13.d: "The Siku Quanshu — the Complete Library of the Four Treasuries — was a dream of total knowledge: every book worth preserving, copied, catalogued, and stored for eternity. We have surpassed even that ambition.\n\nOur Imperial Library contains not merely Chinese texts but the accumulated wisdom of every civilization our scholars have encountered. Greek philosophy sits beside Buddhist metaphysics. Arab algebra illuminates Confucian cosmology. Indian medicine complements Chinese pharmacology. This is not merely a collection of books — it is the complete intellectual heritage of humanity, gathered under one roof and synthesized into a coherent whole."
 nd_tgd.13.a: "Harmony of all learning under heaven."
 nd_tgd.13.b: "Let a hundred schools of thought contend."
 STATIC_MODIFIER_NAME_nd_tgd_dest_iron_tribute: "Iron Tribute"
 STATIC_MODIFIER_DESC_nd_tgd_dest_iron_tribute: "Conquered steppe peoples pay tribute in horses, livestock, and silver, enriching the imperial treasury and funding further campaigns of expansion."
 STATIC_MODIFIER_NAME_nd_tgd_dest_steppe_logistics: "Steppe Logistics"
 STATIC_MODIFIER_DESC_nd_tgd_dest_steppe_logistics: "Nomadic riding techniques and the vast horse herds of the conquered steppe peoples have been integrated into Tang military doctrine, enhancing army speed and recovery."
 STATIC_MODIFIER_NAME_nd_tgd_dest_pax_sinica: "Pax Sinica"
 STATIC_MODIFIER_DESC_nd_tgd_dest_pax_sinica: "With all major civilizations under Tang authority, a universal peace descends. Trade flourishes, devastation heals, and peoples of every origin assimilate into the cosmopolitan Tang order."
 STATIC_MODIFIER_NAME_nd_tgd_dest_mandate_of_conquest: "Mandate of Conquest"
 STATIC_MODIFIER_DESC_nd_tgd_dest_mandate_of_conquest: "The Son of Heaven's mandate demands that all lands acknowledge his sovereignty. Each new victory amplifies Tang prestige and reduces the cost of further campaigns."
 STATIC_MODIFIER_NAME_nd_tgd_dest_academy_network: "Academy Network"
 STATIC_MODIFIER_DESC_nd_tgd_dest_academy_network: "A network of imperial academies across the provinces raises literacy and food production through the application of scholarly knowledge to agriculture and governance."
 STATIC_MODIFIER_NAME_nd_tgd_dest_merchant_scholars: "Merchant Scholars"
 STATIC_MODIFIER_DESC_nd_tgd_dest_merchant_scholars: "The fusion of commercial wealth and scholarly ambition produces a class of merchant-scholars who extend Tang cultural influence through trade routes reaching every corner of the known world."
 STATIC_MODIFIER_NAME_nd_tgd_dest_confucian_synthesis: "Confucian Synthesis"
 STATIC_MODIFIER_DESC_nd_tgd_dest_confucian_synthesis: "A grand synthesis of Confucian, Buddhist, and Daoist thought produces a unified philosophical framework that reduces the cost of institutional adoption and strengthens administrative control."
 STATIC_MODIFIER_NAME_nd_tgd_dest_hundred_schools: "Hundred Schools Reborn"
 STATIC_MODIFIER_DESC_nd_tgd_dest_hundred_schools: "Intellectual pluralism flourishes as competing schools of thought — Legalist, Mohist, Daoist, Confucian, and foreign traditions — drive innovation in every field of human knowledge."
 nd_tgd_protectorate_command: "Protectorate Command"
 nd_tgd_protectorate_command_desc: "The supreme military headquarters for all Tang operations in the western territories, combining garrison command, intelligence gathering, and diplomatic coordination under a single authority."
 nd_tgd_protectorate_upkeep: "Command Provisioning"
 nd_tgd_protectorate_upkeep_desc: "Military supplies for the Protectorate Command including weapons, cavalry mounts, leather equipment, and stone for fortification."
 nd_tgd_imperial_library: "Imperial Library"
 nd_tgd_imperial_library_desc: "The greatest repository of knowledge in human history, housing texts from every civilization and synthesizing them into a unified corpus of learning that advances all fields of human inquiry."
 nd_tgd_library_upkeep: "Library Maintenance"
 nd_tgd_library_upkeep_desc: "Maintenance of the Imperial Library including paper for copying texts, books for acquisitions, silk for binding, and incense to preserve manuscripts from pests."
