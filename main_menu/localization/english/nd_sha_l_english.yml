l_english:
 STATIC_MODIFIER_NAME_nd_confederation_of_the_sword: "Confederation of the Sword"
 STATIC_MODIFIER_DESC_nd_confederation_of_the_sword: "The united Shan mong have rallied behind a single war banner. From the highlands to the Irrawaddy valley, the sawbwas march as one, their cavalry thundering across mountain passes as their ancestors did when they broke the kingdoms of Sagaing and Pinya."
 STATIC_MODIFIER_NAME_nd_crossroads_of_the_plateau: "Crossroads of the Plateau"
 STATIC_MODIFIER_DESC_nd_crossroads_of_the_plateau: "The Shan highlands stand at the meeting point of civilizations. Caravans from Yunnan carry tea and silk southward, while Siamese traders bring goods from the coast. The sawbwas preside over a flourishing network of trade that enriches every mong it touches."
 STATIC_MODIFIER_NAME_nd_heirs_of_mong_mao: "Heirs of Mong Mao"
 STATIC_MODIFIER_DESC_nd_heirs_of_mong_mao: "The martial spirit of the ancient Tai confederation lives on. The Shan cavalry rides with the memory of Mong Mao's conquests burning in their hearts."
 STATIC_MODIFIER_NAME_nd_council_of_sawbwas: "Council of Sawbwas"
 STATIC_MODIFIER_DESC_nd_council_of_sawbwas: "Rather than rule through force alone, the Shan princes have chosen to govern through consensus. The council of sawbwas deliberates on matters of state, balancing the ambitions of each mong for the good of all."
 STATIC_MODIFIER_NAME_nd_caravan_prosperity: "Caravan Prosperity"
 STATIC_MODIFIER_DESC_nd_caravan_prosperity: "The trade routes through Kengtung hum with activity. Eight thousand mules laden with Chinese goods pass through each year, and the Shan towns along the route grow fat on the commerce."
 nd_sha.1.t: "The Shan States United"
 nd_sha.1.d: "The highland principalities of the Shan have at last come together under a single banner. For centuries, the sawbwas — the princes of the mong — have ruled their domains independently, sometimes warring among themselves, sometimes uniting against outside threats. Now, from the misty valleys of Kengtung to the fortress-towns of Hsenwi, the Shan people stand as one.\n\nBut unity is only the beginning. The question that echoes through every sawbwa's court is this: what shall the united Shan States become? A military confederation that dominates the highlands through strength of arms, as Mong Mao once did when it shattered the kingdoms of the Irrawaddy? Or a great crossroads of trade, leveraging the Shan Plateau's position between China and Siam to build wealth and influence that no army could match?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_sha.1.a: "We are the heirs of Mong Mao — let our enemies tremble."
 nd_sha.1.b: "Our plateau connects empires — let trade be our strength."
 nd_sha.2.t: "The Confederation Rises"
 nd_sha.2.d: "The spirit of the great Shan confederation stirs once more. It was in 1527 that Sawlon, scion of Mong Mao's royal line, led a coalition of Shan mong against the weakened kingdom of Ava. The bickering Burmese court, riven by internal rivalries, could not withstand the united highland cavalry. Ava fell, and for nearly three decades the Shan confederation ruled Upper Burma from the very throne of their former overlords.\n\nNow the Shan confederation faces a choice that echoes through the centuries. Shall we honor the military traditions that carried our ancestors to Ava's gates, maintaining the cavalry hosts and warrior culture that made the Shan feared across the Irrawaddy valley? Or shall we build upon the political wisdom of the sawbwa council system, governing through consensus and diplomacy as our ancestors did in their mountain domains?"
 nd_sha.2.a: "Sharpen the dha and saddle the horses — we ride as our ancestors did."
 nd_sha.2.b: "The council of sawbwas shall deliberate — strength comes from unity."
 nd_sha.3.t: "The Caravans of Kengtung"
 nd_sha.3.d: "Kengtung has become one of the great commercial crossroads of mainland Southeast Asia. Each year, some eight thousand mules laden with goods from southern China traverse the highland passes — carrying camphor, dates, silk, tea, and walnuts southward toward Siam. They return northward laden with cotton, lacquerware, precious metals, and tobacco.\n\nThe Yunnanese merchants who lead these caravans have become familiar figures in every Shan market town. Some enjoy such close relationships with the local sawbwas that they stay in the palace itself during their visits. Chinese traders have settled permanently in Shan towns, and the Panthay Muslims among them have become a distinctive part of the highland's multi-ethnic tapestry. The wealth flowing through these routes enriches every mong they touch."
 nd_sha.3.a: "The highland roads are the arteries of our prosperity."
 nd_sha.4.t: "Shan National Awakening"
 nd_sha.4.d: "A new consciousness stirs among the Shan people. For generations, the sawbwas ruled their individual mong with little thought to a shared Shan identity beyond the bonds of language and faith. But as the modern world presses in — with its nation-states and its demands for centralized authority — the Shan have begun to see themselves not merely as subjects of this or that sawbwa, but as a people with a common heritage, a shared Buddhist faith, and a right to determine their own destiny.\n\nScholars collect the old chronicles. Poets compose in the Shan script. In the monasteries, monks teach not just the dharma but the history of the great Mong Mao confederation and the glory days when the Shan ruled from Ava itself. This awakening is more than nostalgia — it is a declaration that the Shan people intend to remain masters of their own highland home."
 nd_sha.4.a: "The Shan spirit will endure upon these mountains."
 nd_sha_tai_highland_warfare: "Tai Highland Warfare"
 nd_sha_tai_highland_warfare_desc: "The Tai peoples who settled the Shan highlands brought with them traditions of mounted warfare adapted to mountainous terrain. Unlike the lowland cavalry that relied on speed across open plains, Shan horsemen learned to navigate steep passes and narrow valleys."
 nd_sha_highland_irrigation: "Highland Irrigation"
 nd_sha_highland_irrigation_desc: "The Shan carved rice terraces into the highland slopes, channeling mountain streams through ingenious irrigation systems to sustain their valley settlements."
 nd_sha_mong_system: "The Mong System"
 nd_sha_mong_system_desc: "The political unit of the Shan world is the mong — a principality centered on a valley and its surrounding highlands, ruled by a sawbwa. This decentralized system allowed the Shan to govern diverse populations across difficult terrain."
 nd_sha_theravada_foundations: "Theravada Foundations"
 nd_sha_theravada_foundations_desc: "Theravada Buddhism took deep root among the Shan people, blending with older animist traditions of spirit worship. Monasteries became centers of learning and community life in every mong."
 nd_sha_mong_mao_legacy: "Mong Mao Legacy"
 nd_sha_mong_mao_legacy_desc: "The memory of Mong Mao — the great Tai federation that shattered the kingdoms of Sagaing and Pinya in 1364 — remains the defining martial tradition of the Shan highlands."
 nd_sha_silver_craft: "Shan Silver Craft"
 nd_sha_silver_craft_desc: "Shan silversmiths are renowned throughout mainland Southeast Asia for their intricate designs. Silver bowls, jewelry, and ceremonial objects adorned with Buddhist motifs are produced in workshops across the highlands."
 nd_sha_dha_warriors_tradition: "Dha Warriors"
 nd_sha_dha_warriors_tradition_desc: "The dha — the single-edged sword of the Shan — is both tool and weapon. Dha warriors, trained from youth in the highland fighting arts, formed the backbone of sawbwa armies during the great confederate campaigns."
 nd_sha_sawbwa_courts: "Sawbwa Courts"
 nd_sha_sawbwa_courts_desc: "The haw, or palace of a sawbwa, is the political and cultural heart of each mong. Here the prince holds court, dispenses justice, and receives tribute from his subjects and visiting merchants alike."
 nd_sha_shan_monasticism: "Shan Monasticism"
 nd_sha_shan_monasticism_desc: "Shan Buddhist monasteries — kyaung — serve as schools, community centers, and repositories of learning. The distinctive Shan monastic architecture reflects both Burmese and Lan Na Thai influences."
 nd_sha_caravan_crossroads: "Caravan Crossroads"
 nd_sha_caravan_crossroads_desc: "The Shan highlands sit astride the ancient trade routes connecting Yunnan to Siam. Caravan halts and market towns sprang up along these routes, transforming the mong into commercial hubs."
 nd_sha_multi_ethnic_governance: "Multi-Ethnic Governance"
 nd_sha_multi_ethnic_governance_desc: "The Shan mong were never ethnically homogeneous. Palaung, Pa-O, Kachin, Wa, Lisu, and many other peoples lived under the sawbwa's authority. Governing this mosaic required a tolerance and pragmatism that became a hallmark of Shan statecraft."
 nd_sha_shan_confederation: "The Shan Confederation"
 nd_sha_shan_confederation_desc: "In 1527, Sawlon led a coalition of Shan mong that captured the kingdom of Ava. For nearly three decades, the Confederation of Shan States ruled Upper Burma, the most powerful political force in the Irrawaddy valley."
 nd_sha_sawbwa_patronage: "Sawbwa Patronage"
 nd_sha_sawbwa_patronage_desc: "The wealthier sawbwas became great patrons of Buddhist art and architecture, commissioning elegant monasteries and the distinctive Shan-style Buddha images characterized by their tall, slim grace."
 nd_sha_elephant_warfare: "Elephant Warfare"
 nd_sha_elephant_warfare_desc: "The Shan sawbwas maintained war elephants as symbols of royal power and instruments of war. Armored elephant guards formed the heavy shock element of Shan armies, terrifying opponents in the narrow highland valleys."
 nd_sha_textile_mastery: "Shan Textile Mastery"
 nd_sha_textile_mastery_desc: "Shan weavers produced textiles renowned throughout Southeast Asia for their vibrant colors and intricate patterns. The craft reached its zenith with the development of lotus silk — an extraordinarily labor-intensive fabric woven from the fibers of lotus plant stems."
 nd_sha_plateau_mining: "Plateau Mining"
 nd_sha_plateau_mining_desc: "The Shan Plateau held vast mineral wealth — rubies and sapphires in the north, silver and lead in the earth beneath. Mining operations, though small in scale, produced precious stones and metals that enriched the sawbwa courts."
 nd_sha_mong_cavalry_tradition: "Mong Cavalry Tradition"
 nd_sha_mong_cavalry_tradition_desc: "The heavy cavalry of the confederated mong represented the elite striking force of Shan armies. Drawn from the noble families of each principality, these horsemen combined the mobility of steppe traditions with knowledge of highland terrain."
 nd_sha_kengtung_crossroads: "Kengtung Crossroads"
 nd_sha_kengtung_crossroads_desc: "Kengtung became the first destination within Shan territory for caravans originating in southern China. From there, routes branched southward toward Siam. Eight thousand mules passed through annually, carrying the trade of empires."
 nd_sha_shan_buddhist_art: "Shan Buddhist Art"
 nd_sha_shan_buddhist_art_desc: "The Shan developed a distinctive school of Buddhist art. Their Buddha images — tall, slim, and graceful with elongated lines and a sense of weightlessness — reflected both Mon-Burmese traditions and Lan Na Thai aesthetics."
 nd_sha_highland_defense: "Highland Defense Doctrine"
 nd_sha_highland_defense_desc: "The mountainous terrain of the Shan highlands provided natural defenses that generations of sawbwas learned to exploit. Invading armies found their supply lines stretched thin across difficult mountain passes."
 nd_sha_highland_autonomy: "Highland Autonomy"
 nd_sha_highland_autonomy_desc: "Even under Burmese suzerainty, the Shan sawbwas maintained remarkable autonomy. The remoteness and difficulty of highland terrain made direct rule impractical, preserving the mong system through centuries of nominal subordination."
 nd_sha_lacquerware_tradition: "Shan Lacquerware"
 nd_sha_lacquerware_tradition_desc: "The Shan lacquerware tradition produced functional and decorative objects of great beauty. Artisans applied multiple layers of lacquer to bamboo or wood foundations, creating vessels and containers prized across the region."
 nd_sha_gemstone_commerce: "Gemstone Commerce"
 nd_sha_gemstone_commerce_desc: "The rubies and sapphires of the Shan Plateau entered the expanding global trade networks. Gemstones mined in the highlands found their way to courts and markets from India to China."
 nd_sha_religious_scholarship: "Religious Scholarship"
 nd_sha_religious_scholarship_desc: "Shan monasteries became centers of Theravada Buddhist scholarship. Monks preserved and studied the Pali canon, while also maintaining chronicles of Shan history and the genealogies of the sawbwa lineages."
 nd_sha_border_diplomacy: "Border Diplomacy"
 nd_sha_border_diplomacy_desc: "Positioned between the great powers of Burma, China, and Siam, the Shan sawbwas became masters of border diplomacy — paying tribute simultaneously to multiple overlords, playing rivals against each other."
 nd_sha_shan_law_codification: "Shan Law Codification"
 nd_sha_shan_law_codification_desc: "The customary laws governing life in the mong were collected and codified, establishing standardized legal principles across the Shan highlands. These laws governed inheritance, land tenure, and the obligations between sawbwa and subject."
 nd_sha_plateau_musketeers: "Plateau Musketeers"
 nd_sha_plateau_musketeers_desc: "Firearms reached the Shan highlands through the caravan routes from China and through contact with European traders. Shan warriors adapted muskets to mountain warfare, using the terrain for cover and ambush."
 nd_sha_reformed_administration: "Reformed Administration"
 nd_sha_reformed_administration_desc: "As the world modernized, forward-thinking sawbwas began reforming the administration of their mong. Written records replaced oral tradition, and more systematic taxation and governance structures emerged."
 nd_sha_renewed_independence: "Renewed Independence"
 nd_sha_renewed_independence_desc: "In periods when central Burmese authority weakened, the Shan mong seized the opportunity to reassert their independence. The highlands had always been easier to hold than to conquer."
 nd_sha_shan_court_culture: "Shan Court Culture"
 nd_sha_shan_court_culture_desc: "The courts of the wealthier sawbwas became centers of refined culture. Music, dance, poetry, and the visual arts flourished under princely patronage, blending Shan, Burmese, and Thai influences."
 nd_sha_highland_fortifications: "Highland Fortifications"
 nd_sha_highland_fortifications_desc: "The Shan strengthened their natural mountain defenses with constructed fortifications. Stockades, watchtowers, and fortified passes transformed the highlands into a formidable defensive network."
 nd_sha_tea_trade: "Highland Tea Trade"
 nd_sha_tea_trade_desc: "The cool, misty highlands proved ideal for tea cultivation. Shan tea, processed using traditional methods and traded through the caravan networks, became a significant source of revenue."
 nd_sha_federal_assembly: "Federal Assembly"
 nd_sha_federal_assembly_desc: "Building on centuries of the sawbwa council tradition, the Shan moved toward a more formal federal assembly. Representatives from each mong met to deliberate on matters affecting all the Shan States."
 nd_sha_modernized_mining: "Modernized Mining"
 nd_sha_modernized_mining_desc: "New techniques and tools transformed the ancient mines of the Shan Plateau. The Bawdwin mine in particular became one of the world's major sources of silver and lead."
 nd_sha_shan_printing: "Shan Printing"
 nd_sha_shan_printing_desc: "The introduction of printing technology allowed the wider dissemination of Buddhist texts, chronicles, and legal codes in the Shan script. Literacy spread beyond the monasteries into the broader population."
 nd_sha_commercial_modernization: "Commercial Modernization"
 nd_sha_commercial_modernization_desc: "The ancient caravan routes were augmented by modern commercial infrastructure. Market towns expanded, new goods entered the trade networks, and the Shan economy began its transformation."
 nd_sha_highland_defense_reform: "Highland Defense Reform"
 nd_sha_highland_defense_reform_desc: "Military reforms modernized the Shan armed forces while preserving their expertise in mountain warfare. Disciplined infantry trained in modern tactics complemented the traditional cavalry."
 nd_sha_national_awakening: "National Awakening"
 nd_sha_national_awakening_desc: "A shared Shan identity crystallized across the mong. Scholars, monks, and poets articulated a vision of the Shan people as a nation with a common heritage, Buddhist faith, and right to self-determination."
 a_nd_sha_highland_cavalry: "Shan Highland Cavalry"
 a_nd_sha_highland_cavalry_desc: "Mountain horsemen trained in the highland passes of the Shan Plateau, these riders can navigate terrain that would halt lowland cavalry."
 a_nd_sha_dha_warriors: "Dha Warriors"
 a_nd_sha_dha_warriors_desc: "Elite swordsmen wielding the traditional Shan dha — a single-edged blade — in close combat. Their ferocious charges broke the defenders of Ava."
 a_nd_sha_elephant_guard: "Sawbwa's Elephant Guard"
 a_nd_sha_elephant_guard_desc: "War elephants maintained by the sawbwa courts as symbols of royal power and instruments of war. Their charge in the narrow highland valleys was devastating."
 a_nd_sha_mong_cavalry: "Mong Cavalry"
 a_nd_sha_mong_cavalry_desc: "Heavy cavalry drawn from the noble families of the confederated mong. These horsemen formed the decisive striking force of the united Shan armies."
 a_nd_sha_plateau_musketeers: "Plateau Musketeers"
 a_nd_sha_plateau_musketeers_desc: "Shan warriors trained in the use of firearms acquired through the China-Siam trade routes. They adapted muskets to mountain warfare, using highland terrain for cover and ambush."
 nd_sha_haw: "Haw"
 nd_sha_haw_desc: "The palace of a Shan sawbwa, serving as the political and cultural heart of the mong. Here the prince holds court, dispenses justice, and manages the affairs of his principality."
 nd_sha_kyaung: "Shan Kyaung"
 nd_sha_kyaung_desc: "A Buddhist monastery in the distinctive Shan architectural style, blending Mon-Burmese and Lan Na Thai influences. Serves as a center of learning, worship, and community life."
 nd_sha_caravan_halt: "Caravan Halt"
 nd_sha_caravan_halt_desc: "A rest stop and trading post along the highland caravan routes connecting China and Siam. Merchants find shelter, provisions, and a market for their goods."
 nd_sha_silverworks: "Shan Silverworks"
 nd_sha_silverworks_desc: "A workshop where Shan silversmiths produce the intricate silver bowls, jewelry, and ceremonial objects for which the highlands are renowned."
 nd_sha_terrace_fields: "Terrace Fields"
 nd_sha_terrace_fields_desc: "Irrigated rice terraces carved into the highland slopes, channeling mountain streams to sustain agriculture in the rugged terrain of the Shan Plateau."
 nd_sha_weaving_workshop: "Shan Weaving Workshop"
 nd_sha_weaving_workshop_desc: "A workshop producing the vibrant textiles and rare lotus silk for which Shan weavers are celebrated throughout Southeast Asia."
 nd_sha_gemstone_mine: "Gemstone Mine"
 nd_sha_gemstone_mine_desc: "A mining operation extracting the rubies, sapphires, and other precious stones found in the mineral-rich earth of the Shan Plateau."
 nd_sha_haw_upkeep: "Palace Upkeep"
 nd_sha_haw_upkeep_desc: "The silk hangings, porcelain vessels, and other furnishings that maintain the dignity of the sawbwa's court."
 nd_sha_kyaung_upkeep: "Monastic Upkeep"
 nd_sha_kyaung_upkeep_desc: "Paper for Buddhist texts and beeswax for votive candles sustain the monastery's religious functions."
 nd_sha_caravan_halt_upkeep: "Halt Maintenance"
 nd_sha_caravan_halt_upkeep_desc: "Feed for pack animals and timber for repairs keep the caravan halt operational."
 nd_sha_silverworks_upkeep: "Silversmithing"
 nd_sha_silverworks_upkeep_desc: "Shan silversmiths work silver and copper into intricate jewelry, bowls, and ceremonial objects renowned throughout Southeast Asia."
 nd_sha_terrace_upkeep: "Rice Cultivation"
 nd_sha_terrace_upkeep_desc: "Irrigated terraces carved into the highland slopes produce rice, sustained by timber-framed channels that direct mountain streams to the paddies."
 nd_sha_weaving_upkeep: "Silk Weaving"
 nd_sha_weaving_upkeep_desc: "Shan weavers transform silk thread and vibrant dyes into fine cloth celebrated throughout Southeast Asia for its intricate patterns."
 nd_sha_mine_upkeep: "Gemstone Extraction"
 nd_sha_mine_upkeep_desc: "Miners extract rubies and sapphires from the mineral-rich earth, using timber shoring and tools to work the highland deposits."
 nd_sha_lacquerware_pm: "Shan Lacquerware"
 nd_sha_lacquerware_pm_desc: "Production of lacquered bamboo and wood objects using traditional Shan techniques. Multiple layers of lacquer create durable, beautiful wares."
 nd_sha_tea_processing_pm: "Highland Tea Processing"
 nd_sha_tea_processing_pm_desc: "Tea bushes cultivated in the cool Shan highlands are harvested and processed using traditional methods, producing finished tea for export through the caravan networks."
 levy_nd_sha_mong_cavalry: "Mong Cavalry Levy"
 levy_nd_sha_mong_cavalry_desc: "Heavy cavalry drawn from the noble families of the confederated mong, answering the sawbwa's call to arms."
 levy_nd_sha_highland_cavalry: "Highland Cavalry Levy"
 levy_nd_sha_highland_cavalry_desc: "Mountain horsemen from the Shan highland communities, skilled in navigating difficult terrain."
 nd_sha_highland_stockade: "Highland Stockade"
 nd_sha_highland_stockade_desc: "A wooden fortification protecting key mountain passes in the Shan highlands. Watchtowers and palisades channeled invaders into killing grounds."
 nd_sha_stockade_upkeep: "Stockade Maintenance"
 nd_sha_stockade_upkeep_desc: "Timber and stone for repairing and reinforcing the palisades and earthworks of the highland stockade."
 nd_sha_diplomatic_gifts_pm: "Diplomatic Gift Exchange"
 nd_sha_diplomatic_gifts_pm_desc: "The tradition of exchanging tributary gifts of silk and silver with neighboring powers to maintain the delicate balance of highland diplomacy."
 nd_sha_court_entertainments_pm: "Court Entertainments"
 nd_sha_court_entertainments_pm_desc: "Music, dance, and theatrical performances that grace the courts of the wealthier sawbwas, blending Shan, Burmese, and Thai artistic traditions."
 nd_sha_modern_commerce_pm: "Modern Commerce"
 nd_sha_modern_commerce_pm_desc: "Upgraded trade infrastructure and accounting methods that transform the ancient caravan routes into efficient commercial networks."
 nd_sha_fortification_pm: "Fortification Maintenance"
 nd_sha_fortification_pm_desc: "Timber and weapons for maintaining the highland defense network of stockades, watchtowers, and fortified passes."
 nd_sha_legal_admin_pm: "Legal Administration"
 nd_sha_legal_admin_pm_desc: "Scribes and court officials who maintain the codified Shan customary law, recording judgments and precedents."
 nd_sha_river_trade: "River Trade Routes"
 nd_sha_river_trade_desc: "The rivers flowing through the Shan highlands served as early trade arteries, connecting highland communities to the lowland markets of the Irrawaddy valley."
 nd_sha_formed_tt: "Shan States has been formed"
 nd_sha_path_a_tt: "Chose Confederation of the Sword"
 nd_sha_path_b_tt: "Chose Crossroads of the Plateau"
 nd_sha_destiny: "Destiny of the Shan States"
 nd_sha_destiny_desc: "The Shan principalities have united at last. Stability in the highlands marks the beginning of a greater ambition -- but the path forward depends on choices already made."
 nd_sha_dest_seize_pinya: "Seize Pinya"
 nd_sha_dest_seize_pinya_desc: "The kingdom of Pinya fell to the Shan confederation in 1527 when Sawlon's cavalry swept down from the highlands. To follow in his footsteps, conquer both Pinya and Sagaing -- the twin capitals of Upper Burma."
 nd_sha_dest_march_on_pagan: "March on Pagan"
 nd_sha_dest_march_on_pagan_desc: "Pagan, seat of ancient Burmese glory, must acknowledge Shan supremacy. March south to claim the Irrawaddy heartland and demonstrate that the highland confederation is the dominant power of mainland Southeast Asia."
 nd_sha_dest_lord_irrawaddy: "Lord of the Irrawaddy"
 nd_sha_dest_lord_irrawaddy_desc: "The ultimate ambition of the Shan confederation: dominion over all Burma from the highland frontier to the coastal ports. Seize Pegu, Martaban, and Toungoo to control the entire Irrawaddy valley and the trade routes that flow through it."
 nd_sha_dest_highland_commerce: "Highland Commerce"
 nd_sha_dest_highland_commerce_desc: "The Shan Plateau sits at the crossroads of civilizations. Develop the highland tea trade and accumulate the wealth needed to transform the mong from isolated principalities into a prosperous commercial network."
 nd_sha_dest_lanna_link: "The Lan Na Link"
 nd_sha_dest_lanna_link_desc: "Chiang Mai, heart of the Lan Na kingdom, is the natural southern terminus of the highland caravan routes. Bring it into the Shan sphere and embrace modern banking to finance the expansion of commerce across the plateau."
 nd_sha_dest_jewel_highlands: "Jewel of the Highlands"
 nd_sha_dest_jewel_highlands_desc: "The Shan Plateau produces the finest rubies and sapphires in Asia, and its position between China and Siam gives it access to silk from both empires. Build a commercial realm of such wealth and development that the highland mong become the envy of the mainland."
 nd_sha.5.t: "A Destiny Begins"
 nd_sha.5.d: "The scattered mong of the Shan Plateau have found their unity at last. Where once each sawbwa looked only to his own valley and his own interests, now all stand together beneath a single banner. The question is no longer whether the Shan can unite, but what they will do with their newfound strength.\n\nThe highlands stretch before us -- a realm of misty valleys, jade rivers, and mountain passes that connect the great civilizations of the world. What we build upon this plateau will be remembered for generations."
 nd_sha.5.a: "The Shan States shall endure."
 nd_sha.6.t: "The Fall of Pinya"
 nd_sha.6.d: "The ancient walls of Pinya have fallen to Shan arms. Just as Sawlon's cavalry swept down from the highlands in 1527 to shatter the bickering Burmese court, so too have our forces proven that the highland confederation is the true master of Upper Burma. The twin capitals of Pinya and Sagaing now fly the banner of the united Shan States.\n\nThe Burmese nobles who once looked upon the highland peoples with contempt now bend the knee to our sawbwa. The Irrawaddy valley lies open before us."
 nd_sha.6.a: "As Sawlon conquered, so do we."
 nd_sha.7.t: "Pagan Under Shan Rule"
 nd_sha.7.d: "The ancient temples of Pagan stand in the shadow of Shan banners. This city, once the heart of the great Burmese empire, now answers to the highland confederation. Our armies have marched where only the mightiest conquerors have tread.\n\nBut ruling Pagan is not the same as conquering it. The question now is how we hold what we have taken. Shall we garrison this ancient city and rebuild what war has broken, establishing permanent Shan authority over the Irrawaddy heartland? Or shall we take what wealth Pagan offers and press onward, using the momentum of victory to fuel further conquest?"
 nd_sha.7.a: "Garrison the city and restore order."
 nd_sha.7.b: "Take the spoils and march onward."
 nd_sha.8.t: "Lord of the Irrawaddy"
 nd_sha.8.d: "From the misty highland passes to the tropical coast, the Irrawaddy valley bows to Shan authority. Pegu, Martaban, Toungoo -- the great cities of Lower Burma have all been brought under the confederation's banner. What the ancient Shan of Mong Mao could only dream, we have achieved.\n\nNow comes the question that shapes empires: how shall we govern this vast domain? A centralized highland imperium ruled from a single throne, with the sawbwas serving as provincial governors under royal command? Or a federation of mong, each retaining its autonomy but bound by treaty and common purpose to the greater Shan state?"
 nd_sha.8.a: "One throne, one realm -- the Shan imperium rises."
 nd_sha.8.b: "A federation of free mong, stronger together."
 nd_sha.9.t: "The Caravans Arrive"
 nd_sha.9.d: "The first great caravan of the season has arrived in the highland markets. Mules laden with Chinese tea and silk descend through the mountain passes, while merchants from the southern lowlands bring cotton, salt, and metalwork in exchange. The wealth of empires flows through our valleys.\n\nThe sawbwas have invested wisely in market infrastructure, caravan halts, and trade agreements. The tea gardens of the highland slopes now produce enough to supply merchants who carry Shan goods as far as the courts of Ayutthaya. Commerce is the lifeblood of the plateau."
 nd_sha.9.a: "The trade routes are our treasure."
 nd_sha.10.t: "The Chiang Mai Connection"
 nd_sha.10.d: "Chiang Mai, jewel of the Lan Na kingdom, is now linked to the Shan commercial network. The caravan routes that once ended at the highland frontier now extend deep into the Tai lowlands, connecting Chinese goods to Siamese markets through the Shan Plateau. Banking houses have opened in the major mong towns, and the volume of trade has surged.\n\nBut how should this expanded network be governed? Some sawbwas argue for royal monopoly -- controlling the flow of goods to maximize the treasury's share. Others advocate opening the markets freely, trusting that the resulting boom in trade will enrich everyone."
 nd_sha.10.a: "The crown shall control the caravans."
 nd_sha.10.b: "Let all merchants trade freely."
 nd_sha.11.t: "Jewel of the Highlands"
 nd_sha.11.d: "The Shan Plateau has become one of the great commercial centers of Asia. Rubies and sapphires mined from the highland earth draw buyers from India, China, and beyond. Silk from two empires passes through our markets, enriched and re-exported at a premium. The development of the mong towns rivals that of the lowland capitals.\n\nThe wealth of the highlands has attracted the attention of the world. Shall we embrace our role as the gem kings of Asia, investing our mineral wealth in cultural prestige and the security that comes with it? Or shall we build the plateau into a great emporium -- a commercial hub where the goods of all nations meet?"
 nd_sha.11.a: "We are the gem kings of Asia."
 nd_sha.11.b: "The plateau shall be the emporium of nations."
 STATIC_MODIFIER_NAME_nd_sha_dest_pagan_garrison: "Garrison of Pagan"
 STATIC_MODIFIER_DESC_nd_sha_dest_pagan_garrison: "Shan soldiers maintain order in the ancient Burmese capital, rebuilding what war has broken while establishing permanent highland authority."
 STATIC_MODIFIER_NAME_nd_sha_dest_pagan_plunder: "Spoils of Pagan"
 STATIC_MODIFIER_DESC_nd_sha_dest_pagan_plunder: "The wealth of ancient Pagan fuels the war machine of the Shan confederation, as treasure flows north to equip new armies for further conquest."
 STATIC_MODIFIER_NAME_nd_sha_dest_highland_imperium: "Highland Imperium"
 STATIC_MODIFIER_DESC_nd_sha_dest_highland_imperium: "A centralized Shan empire rules from a single throne, with the sawbwas serving as loyal provincial governors under the supreme authority of the highland court."
 STATIC_MODIFIER_NAME_nd_sha_dest_federation_of_mong: "Federation of Mong"
 STATIC_MODIFIER_DESC_nd_sha_dest_federation_of_mong: "A decentralized confederation of free mong, each retaining its autonomy while bound by treaty and common purpose. Diplomacy and intelligence, not brute force, hold the federation together."
 STATIC_MODIFIER_NAME_nd_sha_dest_caravan_monopoly: "Caravan Monopoly"
 STATIC_MODIFIER_DESC_nd_sha_dest_caravan_monopoly: "The crown controls the highland caravan routes, extracting maximum revenue from every mule train that passes through Shan territory."
 STATIC_MODIFIER_NAME_nd_sha_dest_open_markets: "Open Markets"
 STATIC_MODIFIER_DESC_nd_sha_dest_open_markets: "The Shan markets are open to all comers. Merchants from China, Siam, India, and beyond mingle freely, and the resulting boom in trade enriches every mong."
 STATIC_MODIFIER_NAME_nd_sha_dest_gem_kings: "Gem Kings of Asia"
 STATIC_MODIFIER_DESC_nd_sha_dest_gem_kings: "The mineral wealth of the Shan Plateau has made the highland sawbwas the richest princes in mainland Southeast Asia. Rubies, sapphires, and silver flow from Shan mines to the courts of the world."
 STATIC_MODIFIER_NAME_nd_sha_dest_plateau_emporium: "Plateau Emporium"
 STATIC_MODIFIER_DESC_nd_sha_dest_plateau_emporium: "The Shan Plateau has become the great meeting place of Asian commerce. Goods from China, India, and Siam converge in highland markets that rival the coastal entrepots."
 nd_sha_war_pavilion: "War Pavilion"
 nd_sha_war_pavilion_desc: "A highland command center from which the sawbwa directs his confederate armies. Watchtowers survey the mountain passes while armories and barracks stand ready for the next campaign."
 nd_sha_war_pavilion_upkeep: "Pavilion Upkeep"
 nd_sha_war_pavilion_upkeep_desc: "Weapons, timber, and leather for maintaining the highland war pavilion and its garrison of Shan soldiers."
 nd_sha_gem_exchange: "Gem Exchange"
 nd_sha_gem_exchange_desc: "A formalized trading house where rubies, sapphires, and other precious stones from the Shan mines are graded, valued, and sold to merchants from across Asia."
 nd_sha_gem_exchange_upkeep: "Exchange Operations"
 nd_sha_gem_exchange_upkeep_desc: "Paper for ledgers, gems for display stock, and silver for transactions sustain the operations of the highland gem exchange."
