l_english:
 STATIC_MODIFIER_NAME_nd_dec_sword_of_the_deccan: "Sword of the Deccan"
 STATIC_MODIFIER_DESC_nd_dec_sword_of_the_deccan: "The Deccan Sultanate draws upon its diverse military traditions — Habshi warriors, Deccani sipahi, Turkic horsemen, and Maratha irregulars serve together under the green banner. This multi-ethnic army is the sultanate's greatest weapon."
 STATIC_MODIFIER_NAME_nd_dec_golconda_splendor: "Golconda Splendor"
 STATIC_MODIFIER_DESC_nd_dec_golconda_splendor: "The wealth of the Deccan flows from Golconda's legendary diamond mines and the region's famed textile workshops. Under enlightened patronage, the court attracts scholars, poets, and artisans from across the Islamic world and beyond."
 STATIC_MODIFIER_NAME_nd_dec_talikota_triumphant: "Triumph at Talikota"
 STATIC_MODIFIER_DESC_nd_dec_talikota_triumphant: "The allied sultanates have shattered the power of Vijayanagara on the field of battle. The martial reputation of the Deccan is burnished for a generation."
 STATIC_MODIFIER_NAME_nd_dec_vijayanagara_spoils: "Spoils of Vijayanagara"
 STATIC_MODIFIER_DESC_nd_dec_vijayanagara_spoils: "The conquered territories of the fallen Hindu empire swell the treasury and expand the sultanate's domains. Careful administration will transform these new lands into pillars of the state."
 STATIC_MODIFIER_NAME_nd_dec_gawan_centralization: "Gawan's Centralizing Vision"
 STATIC_MODIFIER_DESC_nd_dec_gawan_centralization: "Mahmud Gawan's reforms have curtailed the power of provincial governors and brought the tarafs firmly under central authority. The sultanate's administration is more efficient than ever before."
 STATIC_MODIFIER_NAME_nd_dec_gawan_commerce: "Gawan's Commercial Networks"
 STATIC_MODIFIER_DESC_nd_dec_gawan_commerce: "The trade networks established by Mahmud Gawan connect the Deccan to the Persian Gulf, the Arabian Sea, and the markets of Southeast Asia. Merchants flock to the sultanate's thriving ports."
 nd_dec.1.t: "The Deccan Sultanate"
 nd_dec.1.d: "The banner of the Deccan Sultanate rises over the plateau. From the Krishna River to the Vindhya Range, the lands of the Deccan have been unified under a single Islamic authority. The question that now faces the sultanate is one of identity: shall this be a realm forged in the traditions of the sword, drawing upon the diverse martial cultures that have long defined the Deccan — the Habshi bodyguards, the Turkic horsemen, the Deccani sipahi — or shall it be a realm that looks to the wealth beneath its soil and the brilliance of its courts, where the diamonds of Golconda and the poetry of Dakhani illuminate a new age of prosperity?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_dec.1.a: "The sword unites what diplomacy cannot."
 nd_dec.1.b: "Let Golconda's light shine upon the world."
 nd_dec.2.t: "The Battle of Talikota"
 nd_dec.2.d: "On the 23rd of January, 1565, the allied armies of the Deccan sultanates — Bijapur, Ahmadnagar, Golconda, and Bidar — met the forces of the Vijayanagara Empire at the village of Rakkasa-Tangadi near Talikota. The battle proved decisive. Rama Raya, the aging regent of Vijayanagara, was captured and beheaded on the field. His army broke, and the capital city of Vijayanagara was sacked and destroyed over the following months, never to be reoccupied. The destruction of Vijayanagara permanently reconfigured the political landscape of southern India. The question now is what the Deccan shall do with its victory."
 nd_dec.2.a: "Our arms have proven supreme — let the world take note."
 nd_dec.2.b: "We shall absorb these territories and grow stronger still."
 nd_dec.3.t: "The Reforms of Mahmud Gawan"
 nd_dec.3.d: "Mahmud Gawan, the brilliant Persian-born prime minister, has transformed the administration of the sultanate. Born in Gilan and drawn to the Deccan's intellectual vibrancy, Gawan divided the kingdom into eight tarafs, standardized the payment of nobles, limited provincial governors to a single fort each, and conducted accurate land surveys to ensure fair taxation. His famous madrasa at Bidar — with its three stories, elaborate tilework, and library of three thousand manuscripts — stands as a monument to learning. But Gawan's centralizing vision threatens the established nobility. The question is whether to press his reforms forward or to channel his energy toward commercial expansion instead."
 nd_dec.3.a: "Press the reforms — the state must be paramount."
 nd_dec.3.b: "Expand the trade networks — commerce enriches all."
 nd_dec.4.t: "The Diamonds of Golconda"
 nd_dec.4.d: "The mines around Golconda have yielded diamonds of extraordinary size and quality — stones that will one day be known as the Koh-i-Noor, the Hope Diamond, and the Regent Diamond all trace their origins to these alluvial deposits along the Krishna River. The French traveler Jean-Baptiste Tavernier will report seeing sixty thousand men, women, and children working the mines at Kollur alone. The diamond trade has made Golconda synonymous with wealth itself, attracting merchants from Persia, Arabia, the Dutch Republic, France, and Portugal. The revenue from these mines funds the sultanate's armies, its architecture, and its cultural patronage."
 nd_dec.4.a: "The wealth of the earth is ours to command."
 nd_dec.5.t: "The Flowering of Dakhani"
 nd_dec.5.d: "A literary language unique to the Deccan has come into its own. Dakhani — born from the fusion of Persian, Arabic, Marathi, Kannada, and Telugu — has produced masterworks that rival the great Persian poets. The epic Kadam Rao Padam Rao, composed at the Bahmani court in Bidar, tells its tale in a tongue that belongs to no single people but to all who call the Deccan home. Sufi saints preach in Dakhani to reach the common people; sultans compose verse in it to demonstrate their rootedness in this land. Ibrahim Adil Shah II of Bijapur writes his Kitab-e-Navras — the Book of Nine Rasas — blending Islamic devotion with Hindu aesthetic theory in a synthesis that could only emerge from the Deccan."
 nd_dec.5.a: "This language is the soul of our civilization."
 nd_dec_bahmani_foundations: "Bahmani Foundations"
 nd_dec_bahmani_foundations_desc: "The Bahmani Sultanate, established in 1347 by Alauddin Bahman Shah, laid the foundations of Islamic governance on the Deccan Plateau."
 nd_dec_persianate_court: "Persianate Court Traditions"
 nd_dec_persianate_court_desc: "Persian language, customs, and administrative practices shape the governance of the Deccan, attracting scholars and officials from Iran and Central Asia."
 nd_dec_habshi_warriors: "Habshi Warriors"
 nd_dec_habshi_warriors_desc: "African-origin soldiers — the Habshis — serve as elite guards and trusted military commanders, their loyalty uncorrupted by local factional politics."
 nd_dec_deccan_plateau_agriculture: "Deccan Plateau Agriculture"
 nd_dec_deccan_plateau_agriculture_desc: "The black cotton soils of the Deccan support distinctive agricultural practices adapted to the plateau's semi-arid climate."
 nd_dec_dakhani_origins: "Dakhani Origins"
 nd_dec_dakhani_origins_desc: "A new lingua franca is emerging in the Deccan — Dakhani blends Hindustani with local Marathi, Kannada, and Telugu vocabulary."
 nd_dec_plateau_fortification: "Plateau Fortifications"
 nd_dec_plateau_fortification_desc: "The flat-topped hills of the Deccan provide natural defensive positions, fortified with massive walls and sophisticated water systems."
 nd_dec_deccan_horse_trade: "Deccan Horse Trade"
 nd_dec_deccan_horse_trade_desc: "Arabian and Persian warhorses arrive at Deccan ports, sustaining the sultanate's cavalry traditions that are central to its military power."
 nd_dec_gawan_reforms: "Gawan's Administrative Reforms"
 nd_dec_gawan_reforms_desc: "Mahmud Gawan's sweeping reforms restructure the Bahmani state, dividing it into standardized provinces and curtailing noble autonomy."
 nd_dec_deccani_cavalry_tradition: "Deccani Cavalry Tradition"
 nd_dec_deccani_cavalry_tradition_desc: "Light cavalry raiders — the bargis — strike swiftly from the plateau, harassing supply lines and terrorizing the flanks of larger armies."
 nd_dec_deccan_trade_web: "Deccan Trade Networks"
 nd_dec_deccan_trade_web_desc: "Caravanserais link the inland plateau to the coastal ports, carrying cotton, diamonds, spices, and metalwork across the breadth of the Deccan."
 nd_dec_bidriware_craft: "Bidriware Craft"
 nd_dec_bidriware_craft_desc: "The city of Bidar gives its name to bidriware — exquisite metalwork of zinc alloy inlaid with silver wire, a craft tradition unique to the Deccan."
 nd_dec_cosmopolitan_court: "Cosmopolitan Court"
 nd_dec_cosmopolitan_court_desc: "The Deccan courts embrace a remarkable diversity. Hindu administrators, Persian scholars, African commanders, and Turkic warriors serve side by side."
 nd_dec_deccani_architecture: "Deccani Architectural Tradition"
 nd_dec_deccani_architecture_desc: "A unique architectural style emerges in the Deccan, blending Persian domes, Indian decorative arts, and ingenious hydraulic engineering."
 nd_dec_sultanate_artillery: "Sultanate Artillery Tradition"
 nd_dec_sultanate_artillery_desc: "The Deccan sultanates invest heavily in gunpowder weapons, maintaining corps of skilled artillerists who cast their own cannons."
 nd_dec_sultanate_alliance: "Sultanate Alliance"
 nd_dec_sultanate_alliance_desc: "The rival Deccan sultanates discover that their shared interests outweigh their differences when facing a common enemy."
 nd_dec_golconda_diamonds: "Golconda Diamond Mines"
 nd_dec_golconda_diamonds_desc: "The alluvial diamond deposits near Golconda are the world's only known source of diamonds, producing stones of legendary quality."
 nd_dec_topchi_gunners: "Topchi Gunners"
 nd_dec_topchi_gunners_desc: "Specialized artillery units — the topchi — master the art of siege warfare with heavy cannons imported from the Ottoman Empire and cast locally."
 nd_dec_dakhani_literature: "Dakhani Literary Flowering"
 nd_dec_dakhani_literature_desc: "Dakhani Urdu matures into a sophisticated literary language, producing poetry, prose, and devotional works that bridge Islamic and Hindu traditions."
 nd_dec_textile_industry: "Deccan Textile Industry"
 nd_dec_textile_industry_desc: "Cotton and silk textiles from the Deccan are prized across the Indian Ocean world, from East Africa to Southeast Asia."
 nd_dec_deccani_miniature_painting: "Deccani Miniature Painting"
 nd_dec_deccani_miniature_painting_desc: "The courts of Bijapur and Golconda develop a distinctive school of miniature painting, blending Persian, Turkish, and local Indian artistic traditions."
 nd_dec_western_coast_trade: "Western Coast Trade"
 nd_dec_western_coast_trade_desc: "Bijapur's control of western coastal ports provides access to the Arabian Sea trade, connecting the Deccan to markets in the Persian Gulf and beyond."
 nd_dec_malik_ambar_legacy: "Malik Ambar's Legacy"
 nd_dec_malik_ambar_legacy_desc: "Malik Ambar, the Ethiopian-born regent of Ahmadnagar, pioneered guerrilla warfare against the Mughals with a multiethnic army of ten thousand Habshis and forty thousand Deccanis."
 nd_dec_sipahi_cavalry: "Deccani Sipahi"
 nd_dec_sipahi_cavalry_desc: "The heavy cavalry sipahi form the armored core of the sultanate's battle line, charging with lance and sword to break enemy formations."
 nd_dec_adil_shahi_patronage: "Adil Shahi Patronage"
 nd_dec_adil_shahi_patronage_desc: "Ibrahim Adil Shah II of Bijapur earned the title 'Jagadguru' — teacher of the world — for his patronage of music, poetry, and religious harmony between faiths."
 nd_dec_qutb_shahi_governance: "Qutb Shahi Governance"
 nd_dec_qutb_shahi_governance_desc: "The Qutb Shahi rulers of Golconda build an efficient administrative apparatus to manage the wealth generated by the diamond trade."
 nd_dec_diamond_trade_boom: "Diamond Trade Boom"
 nd_dec_diamond_trade_boom_desc: "European demand for Golconda diamonds has skyrocketed, drawing Dutch, French, and Portuguese merchants to the sultanate's markets."
 nd_dec_mughal_resistance: "Resistance to the Mughals"
 nd_dec_mughal_resistance_desc: "The Deccan sultanates wage a generations-long struggle against Mughal expansion, using terrain, guerrilla tactics, and diplomacy to preserve their independence."
 nd_dec_nizam_shahi_revenue: "Nizam Shahi Revenue System"
 nd_dec_nizam_shahi_revenue_desc: "Malik Ambar's revenue settlement establishes systematic land measurement and fair taxation, forming the basis for Deccan administration for generations."
 nd_dec_tofangchi_infantry: "Tofangchi Musketeers"
 nd_dec_tofangchi_infantry_desc: "Trained matchlock musketeers — the tofangchi — provide disciplined firepower on the battlefield, complementing the sultanate's cavalry and artillery."
 nd_dec_hyderabad_administration: "Hyderabad Administration"
 nd_dec_hyderabad_administration_desc: "The Nizam of Hyderabad builds a sophisticated state apparatus, balancing traditional Deccani governance with modern bureaucratic methods."
 nd_dec_european_military_techniques: "European Military Techniques"
 nd_dec_european_military_techniques_desc: "Contact with European military advisors introduces new drill methods, fortification design, and artillery tactics to the Deccan armies."
 nd_dec_deccani_water_engineering: "Deccani Water Engineering"
 nd_dec_deccani_water_engineering_desc: "Persian and local hydraulic engineers develop sophisticated water supply systems — aqueducts, tanks, and underground channels — that sustain cities on the arid plateau."
 nd_dec_nizam_diplomacy: "Nizam's Diplomatic Craft"
 nd_dec_nizam_diplomacy_desc: "The Nizams of Hyderabad navigate between the declining Mughals, the rising Marathas, and the encroaching European powers with consummate diplomatic skill."
 nd_dec_deccani_trade_maturity: "Deccani Trade Maturity"
 nd_dec_deccani_trade_maturity_desc: "Centuries of commercial development have produced a mature trading infrastructure connecting the Deccan to global markets."
 nd_dec_nizam_modernization: "Nizam's Modernization"
 nd_dec_nizam_modernization_desc: "The later Nizams invest in education, printing, and institutional reform, laying the groundwork for Hyderabad's emergence as a center of modern learning."
 nd_dec_deccani_industrial_dawn: "Deccani Industrial Dawn"
 nd_dec_deccani_industrial_dawn_desc: "Early industrial enterprises emerge in the Deccan, processing cotton, metalwork, and armaments with increasing mechanization."
 nd_dec_hyderabad_state_reform: "Hyderabad State Reform"
 nd_dec_hyderabad_state_reform_desc: "The Nizam's government undergoes systematic reform, establishing modern ministries, law courts, and revenue departments."
 nd_dec_cultural_synthesis: "Ganga-Jamuni Tehzeeb"
 nd_dec_cultural_synthesis_desc: "The Deccan achieves a remarkable cultural synthesis — the Ganga-Jamuni Tehzeeb — where Hindu and Muslim traditions intermingle in art, architecture, language, and daily life."
 nd_dec_deccani_legacy: "Deccani Legacy"
 nd_dec_deccani_legacy_desc: "The cultural achievements of the Deccan sultanates endure — in architecture, in language, in the memory of a civilization that bridged worlds."
 nd_dec_modern_artillery_reform: "Modern Artillery Reform"
 nd_dec_modern_artillery_reform_desc: "The Nizam's army adopts modern artillery methods, establishing foundries and training schools for gunners."
 a_nd_dec_habshi_guard: "Habshi Guard"
 a_nd_dec_habshi_guard_desc: "Elite soldiers of African origin who serve as the sultan's personal guard and most trusted military commanders. Their loyalty is beyond question."
 a_nd_dec_bargi: "Deccani Bargi"
 a_nd_dec_bargi_desc: "Light cavalry raiders who strike swiftly from the plateau, harassing supply lines and exploiting gaps in enemy formations."
 a_nd_dec_topchi: "Sultanate Topchi"
 a_nd_dec_topchi_desc: "Specialized artillery units trained in the casting and employment of heavy siege guns, drawing on Ottoman and Persian expertise."
 a_nd_dec_sipahi: "Deccani Sipahi"
 a_nd_dec_sipahi_desc: "Armored heavy cavalry forming the shock core of the sultanate's army, charging with lance and sword to shatter enemy lines."
 a_nd_dec_ambar_guerrilla: "Ambar's Guerrillas"
 a_nd_dec_ambar_guerrilla_desc: "Irregular fighters in the tradition of Malik Ambar, masters of ambush and terrain who harass larger armies with hit-and-run tactics."
 a_nd_dec_tofangchi: "Deccani Tofangchi"
 a_nd_dec_tofangchi_desc: "Trained matchlock musketeers who provide disciplined ranged firepower, forming the infantry backbone of the modernized sultanate army."
 nd_dec_madrasa: "Bidar Madrasa"
 nd_dec_madrasa_desc: "A center of Islamic learning modeled on the great madrasa of Mahmud Gawan, with its three-story library and renowned faculty."
 nd_dec_madrasa_upkeep: "Scholarly Materials"
 nd_dec_madrasa_upkeep_desc: "Paper, ink, and equipment required to maintain the madrasa's library and teaching facilities."
 nd_dec_darbar: "Deccani Darbar"
 nd_dec_darbar_desc: "A grand audience hall where the sultan holds court, receiving nobles, foreign ambassadors, and petitioners from all communities."
 nd_dec_darbar_upkeep: "Court Maintenance"
 nd_dec_darbar_upkeep_desc: "Silk furnishings, dyes, and fine cloth required to maintain the dignity of the royal court."
 nd_dec_caravanserai: "Deccani Caravanserai"
 nd_dec_caravanserai_desc: "A fortified waystation on the Deccan trade routes, providing lodging, storage, and market facilities for merchants and their caravans."
 nd_dec_caravanserai_upkeep: "Caravan Provisioning"
 nd_dec_caravanserai_upkeep_desc: "Livestock and wheat required to feed and stable the animals and travelers passing through the caravanserai."
 nd_dec_diamond_workshop: "Diamond Cutting Workshop"
 nd_dec_diamond_workshop_desc: "A specialized workshop where master lapidaries cut and polish raw diamonds from the Golconda mines for sale to international merchants."
 nd_dec_diamond_cutting: "Diamond Lapidary"
 nd_dec_diamond_cutting_desc: "Master lapidaries cut and polish raw diamonds from the Golconda mines into exquisite gems for the international jewelry trade."
 nd_dec_qila: "Deccani Qila"
 nd_dec_qila_desc: "A massive plateau fortress with thick stone walls, sophisticated water systems, and commanding views of the surrounding terrain."
 nd_dec_qila_upkeep: "Fortress Maintenance"
 nd_dec_qila_upkeep_desc: "Stone, weaponry, and tools required to maintain the fortress walls, defenses, and garrison equipment."
 nd_dec_rauza: "Ibrahim Rauza"
 nd_dec_rauza_desc: "A monumental tomb-mosque complex in the Deccani architectural style, featuring elegant domes, intricate calligraphy, and formal gardens."
 nd_dec_rauza_upkeep: "Monument Maintenance"
 nd_dec_rauza_upkeep_desc: "Stone, dyes, and marble required to maintain the splendor of the monument's carved surfaces and decorative inlays."
 nd_dec_textile_weaving_pm: "Deccani Textile Weaving"
 nd_dec_textile_weaving_pm_desc: "The traditional weaving of fine cotton and silk textiles, dyed with local and imported pigments."
 nd_dec_bidriware_pm: "Bidriware Metalwork"
 nd_dec_bidriware_pm_desc: "The distinctive craft of Bidar — zinc alloy vessels inlaid with delicate silver wire patterns."
 nd_dec_horse_trade_pm: "Arabian Horse Trade"
 nd_dec_horse_trade_pm_desc: "The import and breeding of warhorses from Arabia and Persia — horses and grain for fodder sustain the cavalry herds essential to the sultanate's military."
 nd_dec_armory_pm: "Sultanate Armory"
 nd_dec_armory_pm_desc: "Iron and finished weaponry supply the caravanserai's armory, equipping the escorts and garrisons protecting the trade routes."
 levy_nd_dec_ambar_guerrilla: "Ambar's Guerrilla Levy"
 levy_nd_dec_ambar_guerrilla_desc: "Irregular fighters raised from the countryside in the tradition of Malik Ambar's guerrilla campaigns."
 levy_nd_dec_bargi: "Bargi Cavalry Levy"
 levy_nd_dec_bargi_desc: "Light cavalry raiders levied from the Deccani Muslim and Hindu noble households."
 a_nd_dec_nizam_field_gun: "Nizam Field Gun"
 a_nd_dec_nizam_field_gun_desc: "Modern artillery pieces cast in the Nizam's foundries, crewed by trained gunners employing European firing techniques."
 nd_dec_baoli: "Deccani Baoli"
 nd_dec_baoli_desc: "A stepped well with elaborate stone architecture providing reliable water supply to settlements on the arid Deccan Plateau."
 nd_dec_baoli_upkeep: "Well Maintenance"
 nd_dec_baoli_upkeep_desc: "Stone, tools, and timber required to maintain the baoli's steps, channels, and water distribution systems."
 nd_dec_revenue_office: "Nizam Revenue Office"
 nd_dec_revenue_office_desc: "A government office responsible for land surveying, tax assessment, and revenue collection, following the methods established by Malik Ambar."
 nd_dec_revenue_office_upkeep: "Administrative Supplies"
 nd_dec_revenue_office_upkeep_desc: "Paper, beeswax for seals, and writing materials for the records, ledgers, and official correspondence of the revenue administration."
 nd_dec_painting_atelier_pm: "Deccani Painting Atelier"
 nd_dec_painting_atelier_pm_desc: "An art workshop producing miniature paintings in the distinctive Deccani style, blending Persian, Turkish, and Indian artistic traditions."
 nd_dec_cotton_milling_pm: "Deccani Cotton Milling"
 nd_dec_cotton_milling_pm_desc: "Mechanized cotton processing facilities using cloth stocks and tools to prepare and finish textiles for the Deccan's renowned export trade."
 nd_dec_formed_tt: "Deccan has been formed"
 nd_dec_path_a_tt: "Chose Sword of the Deccan"
 nd_dec_path_b_tt: "Chose Golconda Splendor"
 nd_dec_destiny: "Deccan Ascendant"
 nd_dec_destiny_desc: "The Deccan Sultanate has been proclaimed. Consolidate the realm and choose the path that will define the nation's destiny."
 nd_dec_dest_khandesh: "The Khandesh Campaign"
 nd_dec_dest_khandesh_desc: "Seize the strategic passes of Khandesh and the rich lands of Vidarbha. Burhanpur and Amravati command the routes into central India."
 nd_dec_dest_malwa: "Conquest of Malwa"
 nd_dec_dest_malwa_desc: "Press north into the heart of India. Ujjain, ancient capital of Malwa, and Surat, jewel of the Gujarat coast, will anchor the sultanate's dominion over the subcontinent's interior."
 nd_dec_dest_delhi: "The March on Delhi"
 nd_dec_dest_delhi_desc: "The ultimate prize: Delhi and Agra, the twin seats of Hindustani power. Only a truly mighty Deccan can claim the north and unite the subcontinent under the green banner."
 nd_dec_dest_trade_reach: "The Diamond Road"
 nd_dec_dest_trade_reach_desc: "Extend the sultanate's commercial networks into Gujarat. Champaner guards the northern trade routes, and the gem markets must be firmly under Deccani control."
 nd_dec_dest_cambay: "The Cambay Entrepot"
 nd_dec_dest_cambay_desc: "Khambat — Cambay to the Europeans — is the gateway to the Arabian Sea. With banking institutions established and the port secured, the Deccan can dominate Indian Ocean commerce."
 nd_dec_dest_indian_ocean: "Master of the Indian Ocean"
 nd_dec_dest_indian_ocean_desc: "Seize Hormuz, the chokepoint of Persian Gulf trade. With global trade institutions embraced and Golconda's diamonds funding the endeavor, the Deccan will command the richest sea lanes in the world."
 nd_dec.6.t: "The Deccan Ascendant"
 nd_dec.6.d: "The Deccan Sultanate stands as a unified power upon the great plateau. From the Western Ghats to the Coromandel coast, the realm stretches across some of the most fertile and wealthy lands in all of India. The question of what to do with this power now falls to us. The path ahead is long, but the foundation is solid."
 nd_dec.6.a: "The Deccan shall endure."
 nd_dec.7.t: "The Khandesh Campaign"
 nd_dec.7.d: "Our armies have punched through the Satpura passes and seized the fortified cities of Khandesh and Vidarbha. Burhanpur, with its massive fortress of Asirgarh guarding the approach, has fallen to our siege engineers. Amravati and the rich cotton lands of Berar are ours. The road to central India lies open before us — the sultanates of Malwa and Gujarat now look upon our banners with trepidation."
 nd_dec.7.a: "The passes are ours. Central India awaits."
 nd_dec.8.t: "The Conquest of Malwa"
 nd_dec.8.d: "Ujjain, the ancient city that has served as capital to empires since the time of Ashoka, flies our banner. Surat, the greatest port of western India, funnels the wealth of the Arabian Sea trade into our treasury. The sultanate has grown from a plateau kingdom into a continental power. How shall we consolidate these conquests? Some counsel that we must integrate these diverse lands into a unified administration, while others urge us to press our military advantage while our armies are at their peak."
 nd_dec.8.a: "Integrate the conquered lands into our state."
 nd_dec.8.b: "Our armies have tasted victory — press onward."
 nd_dec.9.t: "The March on Delhi"
 nd_dec.9.d: "Delhi has fallen. The city that has been the seat of every great North Indian empire — the Sultanate, the Mughals, the very idea of Hindustani sovereignty — now answers to the Deccan. Agra, too, with its massive red fort and the wealth of the Doab, is ours. No Deccani sultan has ever achieved what we have achieved. The question now is profound: do we claim the mantle of all-India sovereignty, styling ourselves Sultan of Hindustan and absorbing the northern traditions, or do we rule the north as a distinctly Deccani empire, imposing our own traditions upon the conquered?"
 nd_dec.9.a: "We are the Sultan of Hindustan now."
 nd_dec.9.b: "The Deccan rules the north on its own terms."
 nd_dec.10.t: "The Diamond Road"
 nd_dec.10.d: "The Deccani merchant networks now stretch from the Golconda diamond mines through the Gujarat trade corridors to the markets of the wider world. Champaner, commanding the routes into northern Gujarat, has been secured. Gems from our mines flow through markets we control, and the wealth they generate is reshaping our economy. European traders arrive in increasing numbers, eager to purchase stones that will adorn the crowns of kings from Lisbon to Moscow."
 nd_dec.10.a: "The diamond road is ours to command."
 nd_dec.11.t: "The Cambay Entrepot"
 nd_dec.11.d: "Khambat — known to the Europeans as Cambay — has been the greatest emporium of western India for centuries. Now it is ours. The city's harbor receives ships from Aden, Hormuz, Malacca, and the Swahili coast. With modern banking institutions established, our merchants can finance ventures that would have been unimaginable a generation ago. The question is how to exploit this windfall: do we tighten our grip on the diamond trade, creating a monopoly that maximizes our revenues, or do we develop Cambay itself as an open entrepot that attracts traders from all nations?"
 nd_dec.11.a: "Control the diamonds — monopoly is power."
 nd_dec.11.b: "Build Cambay into the world's marketplace."
 nd_dec.12.t: "Master of the Indian Ocean"
 nd_dec.12.d: "Hormuz is ours. The tiny island that commands the entrance to the Persian Gulf — through which flows the wealth of Persia, Mesopotamia, and the Silk Road — now flies the Deccani banner. With Golconda's diamonds, Cambay's merchants, and Hormuz's strategic chokepoint, the Deccan commands a commercial empire stretching from the mines of the plateau to the markets of the Persian Gulf. No Indian power has ever held such a position. The question is whether to use this wealth to elevate the Deccan to the pinnacle of cultural achievement, or to project naval power across the ocean itself."
 nd_dec.12.a: "Let Golconda's light outshine the world."
 nd_dec.12.b: "The ocean itself shall be our domain."
 STATIC_MODIFIER_NAME_nd_dec_dest_heartland_conqueror: "Heartland Conqueror"
 STATIC_MODIFIER_DESC_nd_dec_dest_heartland_conqueror: "The administrative machinery of the Deccan absorbs the conquered heartlands of central India, suppressing separatism and integrating diverse populations -- though the focus on consolidation makes new wars costlier to justify."
 STATIC_MODIFIER_NAME_nd_dec_dest_plateau_warlord: "Plateau Warlord"
 STATIC_MODIFIER_DESC_nd_dec_dest_plateau_warlord: "Victory breeds victory. The army that conquered Malwa and Gujarat marches with the confidence of proven veterans -- though the ravaged lands behind them recover slowly."
 STATIC_MODIFIER_NAME_nd_dec_dest_sultan_of_hindustan: "Sultan of Hindustan"
 STATIC_MODIFIER_DESC_nd_dec_dest_sultan_of_hindustan: "The Deccan claims the mantle of all-India sovereignty, demanding the submission of northern lords and binding subjects to the green banner through legitimacy rather than force."
 STATIC_MODIFIER_NAME_nd_dec_dest_deccani_imperium: "Deccani Imperium"
 STATIC_MODIFIER_DESC_nd_dec_dest_deccani_imperium: "The Deccan rules the north as a military empire, reinforcing its garrisons, sustaining its armies in the field, and ensuring that morale never falters across the vast domain."
 STATIC_MODIFIER_NAME_nd_dec_dest_diamond_monopoly: "Diamond Monopoly"
 STATIC_MODIFIER_DESC_nd_dec_dest_diamond_monopoly: "The sultanate's grip on the diamond trade is absolute. Every stone from Golconda passes through Deccani hands, and the revenues fund cultural conversion and trade expansion -- though maintaining the monopoly strains the military budget."
 STATIC_MODIFIER_NAME_nd_dec_dest_cambay_entrepot: "Cambay Entrepot"
 STATIC_MODIFIER_DESC_nd_dec_dest_cambay_entrepot: "Cambay thrives as an open marketplace, its harbors bustling with ships from across the Indian Ocean. Maritime enterprises flourish, attracting sailors and shipwrights to the sultanate's ports."
 STATIC_MODIFIER_NAME_nd_dec_dest_golconda_zenith: "Golconda Zenith"
 STATIC_MODIFIER_DESC_nd_dec_dest_golconda_zenith: "The Deccan has reached the apex of its power. Vassal states are absorbed swiftly, trade routes stretch to distant shores, and the sultanate's fleets protect its commercial interests from pirates and rivals alike."
 STATIC_MODIFIER_NAME_nd_dec_dest_ocean_sovereign: "Ocean Sovereign"
 STATIC_MODIFIER_DESC_nd_dec_dest_ocean_sovereign: "The Deccan projects naval power across the Indian Ocean, its warships dealing devastating blows to rivals, blockading enemy ports, and its light squadrons commanding the sea lanes from Hormuz to the Malabar coast."
 nd_dec_sultani_arsenal: "Sultani Arsenal"
 nd_dec_sultani_arsenal_desc: "A massive military complex housing foundries, armories, and barracks, producing the weapons and training the soldiers that sustain the Deccani war machine."
 nd_dec_sultani_arsenal_upkeep: "Arsenal Provisioning"
 nd_dec_sultani_arsenal_upkeep_desc: "Iron, weaponry, and saltpeter fuel the arsenal's foundries and magazine stores."
 nd_dec_hira_mahal: "Hira Mahal"
 nd_dec_hira_mahal_desc: "The Diamond Palace — a monument to Golconda's wealth, its walls set with precious stones and its gardens rivaling those of Isfahan and Constantinople."
 nd_dec_hira_mahal_upkeep: "Palace Maintenance"
 nd_dec_hira_mahal_upkeep_desc: "Gems, marble, and glass maintain the Diamond Palace's legendary splendor."
