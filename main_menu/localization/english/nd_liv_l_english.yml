l_english:
 STATIC_MODIFIER_NAME_nd_sword_and_cross: "Sword and Cross"
 STATIC_MODIFIER_DESC_nd_sword_and_cross: "The Livonian state was born from the clash of steel and the fervor of faith. German crusaders carved a Christian realm from pagan wilderness, raising the cross above every castle and cathedral from Riga to Reval. The Order's mounted knights and fanatical devotion to the conversion of the Baltic peoples define our national purpose."
 STATIC_MODIFIER_NAME_nd_baltic_emporium: "Baltic Emporium"
 STATIC_MODIFIER_DESC_nd_baltic_emporium: "Riga, Dorpat, and Reval are not merely fortresses — they are the great warehouses of the northern world. Amber, timber, furs, and grain flow down the Daugava and Dvina to our harbors, where Hanseatic merchants weigh them against cloth, salt, and silver from the west. The wealth of the Baltic flows through Livonian hands."
 STATIC_MODIFIER_NAME_nd_livonian_reformation: "Livonian Reformation"
 STATIC_MODIFIER_DESC_nd_livonian_reformation: "Livonia was among the first lands outside the Empire to embrace the teachings of Luther. The old religious order dissolves as new ideas take root in Riga's printing houses and lecture halls."
 STATIC_MODIFIER_NAME_nd_riga_iconoclasm: "Riga Iconoclasm"
 STATIC_MODIFIER_DESC_nd_riga_iconoclasm: "The reformers have swept through the churches of Riga with hammer and torch, smashing icons, closing monasteries, and confiscating ecclesiastical property. The old order is destroyed root and branch — a violent purification that leaves no room for the past."
 STATIC_MODIFIER_NAME_nd_courland_ambition: "Courland's Ambition"
 STATIC_MODIFIER_DESC_nd_courland_ambition: "From the shipyards of Windau and Libau, a fleet rises that will carry the Courlandish flag to distant shores. Fort Jacob on the Gambia and New Courland on Tobago await — the smallest state in Europe dares to build a colonial empire."
 STATIC_MODIFIER_NAME_nd_courland_caution: "Courland's Prudence"
 STATIC_MODIFIER_DESC_nd_courland_caution: "The Duchy's fleet is better employed protecting our Baltic trade routes and enriching our harbors than chasing distant colonial dreams. Let others waste their treasure on tropical fever — we shall grow wealthy at home."
 nd_liv.1.t: "The Birth of Livonia"
 nd_liv.1.d: "The crusaders have raised their banner over the Baltic. From the stone walls of Riga to the forest castles of Dorpat, a new Christian realm takes shape on the eastern shore of the Mare Balticum. But two visions compete for the soul of this young nation. The knights of the Order see Livonia as a bastion of militant Christianity — a frontier where the sword serves the cross, where every conquered acre brings another pagan soul to Christ. The merchants of Riga and the Hanseatic cities see something different: a gateway to the riches of the East, where amber, timber, and furs flow westward and silver flows back. Which vision shall prevail?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_liv.1.a: "By sword and cross, we shall hold this land."
 nd_liv.1.b: "The counting house serves God as well as the chapel."
 nd_liv.2.t: "The Reformation Reaches Livonia"
 nd_liv.2.d: "In 1521, Andreas Knopken returned from Germany bearing Luther's teachings to the churches of Riga. Within three years, the Reformation swept through every major city in Livonia — Riga, Reval, Dorpat. Melchior Hoffmann preaches fiery sermons in Wolmar, and crowds gather to hear the new gospel. The Riga City Council has banned services in the cathedral, confiscated church property, and closed the monasteries. Some reformers call for measured adoption of the new faith; others demand the destruction of every icon and altar that recalls the old order. In November 1524, iconoclastic mobs stormed the churches — shall we channel this fury or contain it?"
 nd_liv.2.a: "Let reform proceed through reason and law."
 nd_liv.2.b: "Tear down the idols — purify the faith by fire."
 nd_liv.3.t: "The Landtag of Walk"
 nd_liv.3.d: "On the 4th of December 1435, the assembled estates of Livonia gathered in the town of Walk to sign the Livonian Confederation agreement. The Archbishop of Riga, the bishops of Courland, Dorpat, and Ösel-Wiek, the representatives of the Livonian Order, and the vassals of the land have all set their seals to this document. The Livonian Diet — the Landtag — provides a forum where the competing interests of the Order, the Church, and the cities can be reconciled without bloodshed. It is an imperfect compromise, but it binds this fractious confederation into something resembling a state."
 nd_liv.3.a: "May the Landtag preserve our unity."
 nd_liv.4.t: "Courland's Colonial Ambition"
 nd_liv.4.d: "Duke Jacob Kettler has transformed the sleepy Duchy of Courland into a maritime power. From the shipyards of Windau, a fleet of over forty warships has been launched, mounting more than fourteen hundred cannons. In 1651, Courlandish forces built Fort Jacob on the Gambia River. In 1654, the double-decker warship Wappen der Herzogin sailed to Tobago with 124 soldiers and eighty colonist families, establishing New Courland. This tiny duchy — barely fifty thousand souls — now flies its flag on two continents. But the dream is fragile. Sweden threatens war, and the colonial ventures drain the treasury. Shall we press forward or consolidate what we have?"
 nd_liv.4.a: "The seas shall carry the Courlandish flag to every shore."
 nd_liv.4.b: "Our wealth lies in the Baltic, not in tropical fevers."
 nd_liv.5.t: "The Battle of Saule"
 nd_liv.5.d: "In 1236, the Livonian Brothers of the Sword marched south against the Samogitians and Semigallians. At Saule, the pagan warriors ambushed the crusader column in difficult terrain. The defeat was catastrophic — the Master of the Order and fifty knights fell. The Pope dissolved the Brothers of the Sword, and the survivors merged with the Teutonic Order to form the Livonian branch. From this disaster, a harder and more disciplined military order emerged — one that would hold the Baltic frontier for three more centuries."
 nd_liv.5.a: "From defeat, we forge a stronger blade."
 nd_liv_battle_of_saule: "Schwertbrüder"
 nd_liv_battle_of_saule_desc: "The Livonian Brothers of the Sword — the Schwertbrüder — were the original crusading order of the Baltic, founded in 1202. Their defeat at Saule in 1236 led to their absorption into the Teutonic Order, but their fanatical spirit lives on in Livonian military tradition."
 nd_liv_ordensburg_tradition: "Ordensburg Tradition"
 nd_liv_ordensburg_tradition_desc: "The Livonian Order built over 150 stone castles across the Baltic — massive Ordensburgen that served as military bases, administrative centers, and symbols of German dominion over the conquered lands."
 nd_liv_amber_trade: "Baltic Amber"
 nd_liv_amber_trade_desc: "The shores of the eastern Baltic yield Europe's finest amber — fossilized tree resin prized since antiquity for jewelry, medicine, and trade. Livonian merchants control the processing and export of this golden treasure."
 nd_liv_terra_mariana: "Terra Mariana"
 nd_liv_terra_mariana_desc: "The Land of the Virgin Mary — the name given by Pope Innocent III to the crusader territories in Livonia. The religious mission to convert the Baltic pagans is the moral foundation of the Livonian state."
 nd_liv_wax_trade: "Livonian Wax Trade"
 nd_liv_wax_trade_desc: "Beeswax from the vast forests of Livonia is indispensable for the churches and courts of western Europe. Livonian merchants ship thousands of tons annually — the candles of Christendom burn with Baltic fire."
 nd_liv_hanseatic_kontor: "Hanseatic Kontore"
 nd_liv_hanseatic_kontor_desc: "Riga joined the Hanseatic League in 1282, establishing trading posts — Kontore — that linked the Baltic to the great commercial networks of northern Europe. These warehouses and merchant houses are the engines of Livonian prosperity."
 nd_liv_domschule_tradition: "Cathedral Schools"
 nd_liv_domschule_tradition_desc: "The bishops of Livonia founded cathedral schools in Riga, Dorpat, and Reval — the first institutions of higher learning in the Baltic. German scholarship, Latin letters, and theological training flowed from these schools into the wider society."
 nd_liv_landtag: "Landtag of Walk"
 nd_liv_landtag_desc: "The Livonian Diet, signed into being at Walk in 1435, created a governing assembly for the fractious confederation. Representatives of the Order, the bishops, the cities, and the vassals meet to resolve disputes and coordinate defense."
 nd_liv_baltic_timber: "Baltic Timber Trade"
 nd_liv_baltic_timber_desc: "The vast pine and oak forests of Livonia produce timber, tar, and pitch for the shipyards of Europe. Rafts of logs float down the Daugava to Riga, where they are processed and shipped to England, Holland, and beyond."
 nd_liv_flax_industry: "Livonian Flax"
 nd_liv_flax_industry_desc: "Livonian flax is spun into linen of exceptional quality, exported through Riga and Reval to markets across northern Europe. The flax fields of Latvia and Estonia sustain a thriving textile industry."
 nd_liv_riga_stadtrecht: "Riga Stadtrecht"
 nd_liv_riga_stadtrecht_desc: "The Hamburg city law adopted by Riga governs commerce, property, and civic life. Under this legal framework, Riga's burghers enjoy privileges that attract merchants and artisans from across the German-speaking world."
 nd_liv_reformation: "The Livonian Reformation"
 nd_liv_reformation_desc: "Livonia was the first territory outside the Holy Roman Empire to adopt the Reformation. From 1521, Luther's ideas spread rapidly through Riga, Reval, and Dorpat, transforming the religious landscape of the Baltic."
 nd_liv_landknechte_tradition: "Livonian Landknechte"
 nd_liv_landknechte_tradition_desc: "German pike-and-shot infantry adapted to Baltic warfare — trained to fight in the forests and marshes of the eastern frontier, where heavy cavalry cannot operate."
 nd_liv_grain_exports: "Baltic Grain Trade"
 nd_liv_grain_exports_desc: "Livonian grain — rye, wheat, and barley — feeds the growing cities of western Europe. Riga's granaries are the breadbasket of the Baltic, funneling harvests from the hinterland to hungry markets abroad."
 nd_liv_buffer_state: "Between Three Crowns"
 nd_liv_buffer_state_desc: "Livonia sits at the crossroads of Russian, Polish-Lithuanian, and Swedish ambitions. Survival demands diplomatic agility — playing each power against the others, buying time with treaties, and maintaining a precarious independence."
 nd_liv_castle_network: "Stone Castle Network"
 nd_liv_castle_network_desc: "Over 150 stone castles and fortified manors dot the Livonian landscape — from the massive Ordensburgen of the knights to the episcopal palaces of the bishops. This fortress network is the backbone of Baltic defense."
 nd_liv_fur_trade: "Livonian Fur Trade"
 nd_liv_fur_trade_desc: "The forests of Livonia yield beaver, marten, fox, and squirrel pelts prized in the courts and markets of Europe. Livonian merchants dominate the fur trade from the interior to the harbors of Riga and Reval."
 nd_liv_hakenschutzen_tradition: "Hakenschützen"
 nd_liv_hakenschutzen_tradition_desc: "The hook gun — the Hakenbüchse — is a staple of Livonian fortress defense. Resting the heavy barrel on a wall hook, these gunners deliver accurate fire from castle ramparts and field fortifications."
 nd_liv_reiter_tradition: "Livonian Reiters"
 nd_liv_reiter_tradition_desc: "The mounted pistoleer tradition descends from the Order's heavy cavalry. Armed with wheel-lock pistols and trained in the caracole, these Reiters combine Livonian horsemanship with modern firepower."
 nd_liv_secularization: "Secularization"
 nd_liv_secularization_desc: "The transformation from crusading military order to secular duchy — the end of monastic rule and the beginning of princely government. Under Gotthard Kettler, the last Master became the first Duke."
 nd_liv_grain_staple: "Riga Grain Staple"
 nd_liv_grain_staple_desc: "Riga's staple right requires that all grain passing through the city be offered for sale in its market before export. This monopoly enriches the city's burghers and fills the ducal coffers."
 nd_liv_privilegium: "Livonian Privilegium"
 nd_liv_privilegium_desc: "The rights and privileges of the Baltic German nobility — the Ritterschaften — are the foundation of Livonian governance. In exchange for military service and administrative loyalty, the nobles enjoy wide autonomy over their estates."
 nd_liv_urban_fortification: "Modern Fortifications"
 nd_liv_urban_fortification_desc: "The arrival of gunpowder warfare demands new defensive architecture. Bastioned walls, angled ravelins, and earthwork ramparts replace the medieval towers — transforming Livonian cities into modern fortresses."
 nd_liv_courland_navy: "Courland Fleet"
 nd_liv_courland_navy_desc: "Duke Jacob Kettler built a navy of over forty warships from the shipyards of Windau and Libau. This remarkable fleet — mounting over 1,400 cannons — carried the Courlandish flag to colonies on the Gambia River and Tobago."
 nd_liv_kettler_manufactures: "Kettler's Manufactures"
 nd_liv_kettler_manufactures_desc: "Under Duke Jacob Kettler, Courland became an industrial center. Ironworks, sawmills, tar distilleries, and rope walks sprang up across the duchy — a proto-industrial revolution on the Baltic shore."
 nd_liv_colonial_ventures: "Colonial Ventures"
 nd_liv_colonial_ventures_desc: "The tiny Duchy of Courland — barely fifty thousand souls — dared to build a colonial empire. Fort Jacob on the Gambia and New Courland on Tobago were improbable outposts of Baltic ambition in the tropics."
 nd_liv_amber_route: "Amber Road"
 nd_liv_amber_route_desc: "The ancient amber trade route, stretching from the Baltic coast to the Mediterranean, has been a source of wealth for millennia. Under Courland's stewardship, the processing and export of Baltic amber reaches its zenith."
 nd_liv_ritterschaften: "Ritterschaften"
 nd_liv_ritterschaften_desc: "The Baltic German noble corporations — the Ritterschaften of Livonia, Estonia, Courland, and Ösel — govern the provinces through their Landtage. This corporate nobility shapes law, taxation, and administration across the Baltic."
 nd_liv_courland_gunnery: "Courland Naval Gunnery"
 nd_liv_courland_gunnery_desc: "Courland's fleet punched far above its weight thanks to the quality of its naval gunnery. Duke Jacob personally oversaw cannon founding at Courland's ironworks, producing some of the finest naval guns in the Baltic."
 nd_liv_baltic_enlightenment: "Baltic Enlightenment"
 nd_liv_baltic_enlightenment_desc: "Johann Gottfried Herder — philosopher, theologian, and pioneer of romantic nationalism — spent five formative years teaching at Riga's cathedral school. His ideas on folk culture and national identity would transform European thought."
 nd_liv_agrarian_reform: "Agrarian Reform"
 nd_liv_agrarian_reform_desc: "The gradual emancipation of the Baltic peasantry and the modernization of agriculture — from feudal corvée labor to free tenancy. New crop rotations, drainage projects, and scientific farming increase yields and population."
 nd_liv_port_expansion: "Port of Riga"
 nd_liv_port_expansion_desc: "Riga's harbor, commanding the mouth of the Daugava, expands to accommodate the growing volume of Baltic commerce. New wharves, warehouses, and customs houses transform the medieval port into a modern commercial hub."
 nd_liv_national_awakening: "Baltic German Identity"
 nd_liv_national_awakening_desc: "The Baltic Germans — descendants of the crusaders, merchants, and clerics who built Livonia — develop a distinct cultural identity. Neither purely German nor purely Baltic, they are a unique civilization forged by seven centuries on the frontier."
 nd_liv_modern_military: "Livonian Jäger"
 nd_liv_modern_military_desc: "Professional light infantry for the modern age — fast-moving riflemen who combine the frontier traditions of the Baltic with the discipline of European line tactics."
 nd_liv_industrial_timber: "Industrial Timber"
 nd_liv_industrial_timber_desc: "Steam-powered sawmills transform the Baltic timber industry. Where once logs were laboriously shaped by hand, mechanical saws now produce standardized lumber for export — feeding the construction boom of industrial Europe."
 a_nd_liv_schwertbruder: "Schwertbrüder"
 a_nd_liv_schwertbruder_desc: "The Sword Brothers — fanatical crusading infantry of the Livonian Order. These German warriors fight with the zealous fury of men who believe every battle is fought for the salvation of their souls."
 a_nd_liv_hakenschutzen: "Hakenschützen"
 a_nd_liv_hakenschutzen_desc: "Hook gunners — infantry armed with heavy arquebus-type weapons fired from wall hooks or portable rests. Devastating in siege defense and fortified positions, they embody Livonia's tradition of fortress warfare."
 n_nd_liv_courland_frigate: "Courland Frigate"
 n_nd_liv_courland_frigate_desc: "A fast, well-armed warship from the shipyards of Windau. Built under Duke Jacob Kettler's personal supervision, these frigates combine speed with firepower — designed for commerce raiding and colonial expeditions."
 a_nd_liv_reiter: "Livonian Reiter"
 a_nd_liv_reiter_desc: "Mounted pistoleers descended from the Order's cavalry tradition. Armed with wheel-lock pistols and trained in the caracole tactic, these riders harass enemy formations before closing for the charge."
 a_nd_liv_jager: "Livonian Jäger"
 a_nd_liv_jager_desc: "Professional light infantry trained in the forests of the Baltic — fast-moving riflemen who use terrain, ambush tactics, and marksmanship to outfight opponents. The culmination of Livonia's long frontier military tradition."
 nd_liv_ordensburg: "Ordensburg"
 nd_liv_ordensburg_desc: "A crusader castle of the Livonian Order — a massive stone fortification combining military garrison, administrative center, and chapel. These castles dominated the Baltic landscape for three centuries."
 nd_liv_kontor: "Hanseatic Kontor"
 nd_liv_kontor_desc: "A trading post of the Hanseatic League — warehouse, counting house, and merchant residence in one. Through these Kontore, the wealth of the Baltic hinterland flows to the markets of northern Europe."
 nd_liv_domschule: "Domschule"
 nd_liv_domschule_desc: "A cathedral school where German clerics teach Latin, theology, and the liberal arts. These schools are the intellectual foundations of Livonian civilization, producing the administrators and clergy who govern the Baltic."
 nd_liv_windau_werft: "Windau Shipyard"
 nd_liv_windau_werft_desc: "The ducal shipyard at Windau (Ventspils), where Duke Jacob Kettler's fleet was constructed. At its peak, this yard launched warships that carried the Courlandish flag to Africa and the Caribbean."
 nd_liv_bernsteinkammer: "Bernsteinkammer"
 nd_liv_bernsteinkammer_desc: "An amber processing workshop where raw Baltic amber is sorted, polished, and carved into jewelry, devotional objects, and luxury goods for export to the courts and markets of Europe."
 nd_liv_vasallenburg: "Vasallenburg"
 nd_liv_vasallenburg_desc: "A fortified manor house of the Baltic German vassals — part residence, part garrison, part administrative center for the surrounding countryside. The backbone of rural defense and noble authority across Livonia."
 nd_liv_getreidelager: "Getreidelager"
 nd_liv_getreidelager_desc: "A grain warehouse on the Riga waterfront — storing, weighing, and grading the vast quantities of rye, wheat, and barley that flow from the Livonian hinterland to feed the cities of western Europe."
 nd_liv_dampfsagewerk: "Dampfsägewerk"
 nd_liv_dampfsagewerk_desc: "A steam-powered sawmill that mechanizes the Baltic timber industry. Iron blades driven by steam engines cut through pine and oak logs with unprecedented speed, producing standardized lumber for export."
 nd_liv_ordensburg_upkeep: "Castle Maintenance"
 nd_liv_ordensburg_upkeep_desc: "The stone walls and iron gates of the Ordensburg require constant upkeep — mortar, timber, and weapons to keep the fortress in fighting condition."
 nd_liv_kontor_maintenance: "Kontor Operations"
 nd_liv_kontor_maintenance_desc: "The daily operation of a Hanseatic trading post — record-keeping, warehousing, and the steady flow of goods between the Baltic hinterland and western markets."
 nd_liv_domschule_upkeep: "School Provisioning"
 nd_liv_domschule_upkeep_desc: "Paper for manuscripts, beeswax for candles and seals — the modest material requirements of a cathedral school that punches far above its weight in intellectual output."
 nd_liv_werft_maintenance: "Shipyard Operations"
 nd_liv_werft_maintenance_desc: "The voracious appetite of a working shipyard — seasoned timber, rope, tar, and naval stores consumed in the endless process of building and repairing warships."
 nd_liv_amber_processing: "Amber Processing"
 nd_liv_amber_processing_desc: "Raw Baltic amber is sorted, cut, and polished into jewelry and devotional objects — a specialized craft passed down through generations of Baltic artisans."
 nd_liv_vasallenburg_upkeep: "Manor Upkeep"
 nd_liv_vasallenburg_upkeep_desc: "The stone and iron needed to maintain a fortified manor house — keeping walls solid, gates operable, and the local garrison equipped."
 nd_liv_getreidelager_upkeep: "Warehouse Operations"
 nd_liv_getreidelager_upkeep_desc: "The routine maintenance and operation of a grain warehouse — scales, storage bins, and the constant labor of loading and unloading barges on the Daugava."
 nd_liv_dampfsagewerk_upkeep: "Sawmill Operations"
 nd_liv_dampfsagewerk_upkeep_desc: "Coal fires the boiler and saw blades cut through pine and oak logs at speed — producing standardized lumber for Baltic and European markets."
 nd_liv_wax_processing: "Wax Processing"
 nd_liv_wax_processing_desc: "The rendering and purification of beeswax from Livonian apiaries — producing the refined wax that lights the cathedrals and seals the documents of Christendom."
 nd_liv_timber_trade: "Timber Trade"
 nd_liv_timber_trade_desc: "The processing and export of Baltic pine and oak — from raw logs floated down the Daugava to finished lumber, tar, and pitch shipped to the shipyards of western Europe."
 nd_liv_flax_processing: "Flax Processing"
 nd_liv_flax_processing_desc: "The spinning and weaving of Livonian flax into fine linen cloth — a major Baltic export prized for its quality and durability."
 nd_liv_fur_processing: "Fur Processing"
 nd_liv_fur_processing_desc: "The sorting, grading, and baling of beaver, marten, and fox pelts from the Livonian interior — preparing the highest-quality furs for export to the courts and markets of Europe."
 nd_liv_colonial_trade: "Colonial Trade"
 nd_liv_colonial_trade_desc: "The management of distant colonial trade routes — provisioning ships, coordinating factor agents, and ensuring the flow of exotic goods from tropical outposts back to Baltic harbors."
 levy_nd_liv_schwertbruder: "Schwertbrüder Levy"
 levy_nd_liv_schwertbruder_desc: "Zealous crusading infantry raised from the soldiers and peasants of Livonia — fighting in the tradition of the original Sword Brothers."
 levy_nd_liv_reiter: "Reiter Levy"
 levy_nd_liv_reiter_desc: "Mounted pistoleers raised from the nobility and soldiers of Livonia — the heirs of the Order's cavalry tradition, armed with modern firearms."
 nd_liv_formed_tt: "Livonia has been formed"
 nd_liv_path_a_tt: "Chose Sword and Cross"
 nd_liv_path_b_tt: "Chose Baltic Emporium"
 nd_liv_destiny: "Livonian Destiny"
 nd_liv_destiny_desc: "The state of Livonia stands at the crossroads of the Baltic world. Whether by sword or by silver, our destiny awaits — but first, we must prove that this young nation can endure."
 nd_liv_dest_crusade: "The Northern Crusade"
 nd_liv_dest_crusade_desc: "The crusader spirit demands expansion. Conquer the pagan stronghold of Samogitia and the Teutonic capital of Konigsberg to forge a unified crusader state across the eastern Baltic."
 nd_liv_dest_drang: "Drang nach Osten"
 nd_liv_dest_drang_desc: "The drive to the east continues. Take Pskov and Polotsk — the gateway cities to the vast Russian hinterland — and build an army worthy of a Baltic empire."
 nd_liv_dest_dominium: "Dominium Maris Baltici"
 nd_liv_dest_dominium_desc: "Seize Novgorod, the ancient seat of Russian trade, and Vilnius, capital of Lithuania. With these conquests, Livonia becomes the undisputed master of the eastern Baltic — a crusader empire stretching from the Gulf of Finland to the Niemen."
 nd_liv_dest_hansa: "Hanseatic Gateway"
 nd_liv_dest_hansa_desc: "Bring Danzig — the greatest port on the southern Baltic — under Livonian control and amass the capital to fund a commercial empire. Riga and Danzig together command the flow of grain, timber, and amber across the northern seas."
 nd_liv_dest_warehouse: "Baltic Warehouse"
 nd_liv_dest_warehouse_desc: "Establish Livonia as the central warehouse of the Baltic. Embrace modern banking, ensure amber flows through our capital market, and accumulate the wealth that transforms a trading post into an emporium."
 nd_liv_dest_emporium: "Supreme Emporium"
 nd_liv_dest_emporium_desc: "Conquer Lubeck itself — the queen of the Hanse — and make Livonia the supreme commercial power of northern Europe. Develop the realm to its fullest potential and fill the treasury to overflowing."
 nd_liv.6.t: "The Destiny of Livonia"
 nd_liv.6.d: "Livonia has been forged from the scattered territories of the Baltic — a realm where German knights, Hanseatic merchants, and Baltic peoples coexist under a single banner. But the mere act of formation is not enough. The question that now confronts us is fundamental: what kind of state shall Livonia become? The path forward will define not just our borders, but our very identity as a nation."
 nd_liv.6.a: "Our destiny awaits."
 nd_liv.7.t: "The Northern Crusade Renewed"
 nd_liv.7.d: "The knights have ridden south into Samogitia and east into Prussia. Where once the pagans held sway, the cross now rises above every fortress and village. Konigsberg, the ancient seat of the Teutonic Order, flies our banner. The crusader state is reborn — not as a scattered confederation of bishops and knights, but as a unified realm with the strength to expand further still."
 nd_liv.7.a: "The sword serves the cross."
 nd_liv.8.t: "The Drive to the East"
 nd_liv.8.d: "Pskov has fallen. Polotsk is ours. The ancient trading cities of the Russian frontier now answer to Livonian authority. Our armies stand deep in territory that was once the domain of Orthodox princes and Slavic boyars. But how shall we govern these new conquests? Some urge the zeal of the crusade — forced conversion, German settlement, the complete transformation of the conquered lands. Others counsel patience — the establishment of order through military discipline and administrative efficiency, allowing the new subjects to be gradually absorbed."
 nd_liv.8.a: "Fill the east with German settlers and churches."
 nd_liv.8.b: "Establish military order on the frontier."
 nd_liv.9.t: "Dominium Maris Baltici"
 nd_liv.9.d: "Novgorod, the legendary city of a thousand churches, has submitted to Livonian power. Vilnius, seat of the Lithuanian grand dukes, flies our banner. From the Gulf of Finland to the forests of Samogitia, from the shores of Courland to the gates of Muscovy, the crusader state commands an empire. The eastern Baltic is a Livonian lake. But with empire comes the question of its character. Shall we rule as the iron cross demanded — with the uncompromising authority of the Order? Or shall we establish a Livonian peace, governing our diverse subjects through strength tempered by pragmatism?"
 nd_liv.9.a: "Under the iron cross, all submit."
 nd_liv.9.b: "A Livonian peace shall govern the east."
 nd_liv.10.t: "The Hanseatic Gateway"
 nd_liv.10.d: "Danzig is ours. The greatest port on the southern Baltic — where the Vistula pours Poland's grain into the holds of a thousand merchant ships — now operates under Livonian authority. With Riga commanding the Daugava and Danzig commanding the Vistula, we control the two mightiest river-trade arteries of the northern world. The counting houses are full, the warehouses stacked to the rafters. The Baltic Emporium is taking shape."
 nd_liv.10.a: "The wealth of two rivers flows through our hands."
 nd_liv.11.t: "The Livonian Warehouse"
 nd_liv.11.d: "Livonia has become the central warehouse of the Baltic world. Our bankers extend credit from Riga to London, our amber is prized in every court, and our merchants dominate the trade in grain, timber, and furs. But two commercial philosophies compete for dominance. The amber merchants advocate monopoly — controlling the supply of Baltic amber from mine to market, setting prices that the world must pay. The port masters advocate openness — making our harbors the freest in Europe, where any merchant can trade without restriction, trusting that volume will generate more wealth than any monopoly."
 nd_liv.11.a: "Control the amber, control the market."
 nd_liv.11.b: "Open our ports to the commerce of the world."
 nd_liv.12.t: "The Supreme Emporium"
 nd_liv.12.d: "Lubeck itself — the queen of the Hanseatic League, the city whose merchants once dictated the terms of trade across all of northern Europe — now answers to Livonia. The student has surpassed the master. From our harbors, ships carry Baltic goods to every corner of Europe and beyond. Our bankers finance wars and trade ventures from the North Sea to the Mediterranean. Riga has become what Venice is to the south: the indispensable nexus of commerce, the city without which nothing moves. Shall we rule this empire as merchant princes — a commercial aristocracy governing through wealth and influence? Or shall we make Riga the Venice of the North — a republic of traders where commerce itself is the highest law?"
 nd_liv.12.a: "The merchant princes shall rule."
 nd_liv.12.b: "Riga shall be the Venice of the North."
 STATIC_MODIFIER_NAME_nd_liv_dest_crusader_zeal: "Crusader Zeal"
 STATIC_MODIFIER_DESC_nd_liv_dest_crusader_zeal: "The fervor of the northern crusade fuels Livonian expansion. German settlers and missionaries pour into the conquered territories, but the costs of ceaseless warfare strain the treasury."
 STATIC_MODIFIER_NAME_nd_liv_dest_frontier_order: "Frontier Order"
 STATIC_MODIFIER_DESC_nd_liv_dest_frontier_order: "The conquered eastern territories are governed through strict military order — fortified garrisons, disciplined patrols, and systematic administration. The frontier is secure, though building in the new territories is expensive."
 STATIC_MODIFIER_NAME_nd_liv_dest_iron_cross: "Under the Iron Cross"
 STATIC_MODIFIER_DESC_nd_liv_dest_iron_cross: "The iron discipline of the crusading order governs the Livonian empire. Subject peoples submit to an unyielding authority that tolerates no dissent — but the burden of perpetual vigilance weighs on a war-weary nation."
 STATIC_MODIFIER_NAME_nd_liv_dest_pax_livonica: "Pax Livonica"
 STATIC_MODIFIER_DESC_nd_liv_dest_pax_livonica: "The Livonian peace governs the eastern Baltic through pragmatic strength. Conquered territories are brought to order through efficient administration and the promise of stability, rewarding those who submit and enriching the realm through plunder."
 STATIC_MODIFIER_NAME_nd_liv_dest_amber_monopoly: "Amber Monopoly"
 STATIC_MODIFIER_DESC_nd_liv_dest_amber_monopoly: "Livonia controls the amber trade from mine to market — setting prices, regulating exports, and reaping enormous profits from Europe's appetite for Baltic gold. The assimilation of subject peoples proceeds rapidly under merchant-driven cultural integration."
 STATIC_MODIFIER_NAME_nd_liv_dest_free_port: "Free Port Charter"
 STATIC_MODIFIER_DESC_nd_liv_dest_free_port: "Livonian harbors are the freest in Europe — any merchant, any flag, any cargo. The policy attracts traders from across the continent, but a nation built on open trade finds it harder to justify war."
 STATIC_MODIFIER_NAME_nd_liv_dest_merchant_princes: "Merchant Princes"
 STATIC_MODIFIER_DESC_nd_liv_dest_merchant_princes: "A commercial aristocracy governs Livonia — wealthy merchant families whose influence spans the courts and counting houses of northern Europe. Their diplomatic reach extends the Livonian trade network across the continent."
 STATIC_MODIFIER_NAME_nd_liv_dest_baltic_venice: "Baltic Venice"
 STATIC_MODIFIER_DESC_nd_liv_dest_baltic_venice: "Riga has become the Venice of the North — a republic of commerce where the flow of trade is the highest law. The city's wealth sustains a professional mercenary force, and the complacency of easy prosperity is kept at bay by the constant drive for new markets."
 nd_liv_deutschordensschloss: "Deutschordensschloss"
 nd_liv_deutschordensschloss_desc: "A grand castle of the crusading order — part fortress, part palace, part seat of government. Its massive walls and towered keep dominate the landscape, projecting the power and permanence of the Livonian crusader state across the conquered territories."
 nd_liv_borsenhaus: "Borsenhaus"
 nd_liv_borsenhaus_desc: "A grand exchange house where the merchants of the Baltic conduct their business — negotiating prices, settling accounts, and arranging the shipment of goods from Riga to the markets of Europe. The commercial heart of the Livonian trade empire."
 nd_liv_deutschordensschloss_upkeep: "Castle Provisioning"
 nd_liv_deutschordensschloss_upkeep_desc: "The grand castle demands stone for its walls, weaponry for its garrison, and fine cloth for the banners and tapestries that proclaim the authority of the crusading order."
 nd_liv_borsenhaus_upkeep: "Exchange Operations"
 nd_liv_borsenhaus_upkeep_desc: "The daily operation of the exchange — paper for contracts, cloth for the merchants' guild, and tools for maintaining the scales, weights, and measuring instruments that ensure fair trade."
