l_english:
 STATIC_MODIFIER_NAME_nd_sword_of_the_mai: "Sword of the Mai"
 STATIC_MODIFIER_DESC_nd_sword_of_the_mai: "The Mais of Kanem-Bornu ruled through the strength of their armored cavalry and the fear their iron-helmed warriors inspired across the Sahel. This is an empire forged in battle and held by the lance."
 STATIC_MODIFIER_NAME_nd_crossroads_of_the_sahara: "Crossroads of the Sahara"
 STATIC_MODIFIER_DESC_nd_crossroads_of_the_sahara: "Lake Chad sits at the heart of Africa's greatest trade network. Caravans bearing natron, cotton, and ivory pass through Bornu's markets en route to Tripoli and Fezzan. This is a kingdom made wealthy by commerce, not conquest alone."
 nd_kbu.1.t: "The Reunification of Kanem-Bornu"
 nd_kbu.1.d: "The ancient realm of the Sayfawa has been restored. From the shores of Lake Chad to the sands of the Sahara, the lands of Kanem and Bornu are united once more under a single Mai. For centuries the Sayfawa dynasty endured — driven from Kanem by the Bulala, they rebuilt in Bornu, and now they reclaim their heritage.\n\nBut what shall define this restored empire? The Mai's armored horsemen are the terror of the Sahel, and the ribats that guard our borders have never been breached. Yet our caravans carry more wealth than our armies seize — natron, cotton, and slaves flow north to Tripoli while horses, salt, and firearms return south. The character of Kanem-Bornu will be decided now, at the moment of its restoration.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_kbu.1.a: "By the lance and the ribat — we are warriors."
 nd_kbu.1.b: "By the caravan and the market — we are traders."
 STATIC_MODIFIER_NAME_nd_alooma_gunpowder_revolution: "Alooma's Gunpowder Revolution"
 STATIC_MODIFIER_DESC_nd_alooma_gunpowder_revolution: "Turkish military advisors have trained our musketeers in the arts of firearms warfare, transforming the Bornu army into a modern fighting force."
 STATIC_MODIFIER_NAME_nd_alooma_fortification_system: "Alooma's Fortification System"
 STATIC_MODIFIER_DESC_nd_alooma_fortification_system: "A network of ribats and fortified camps now secures every frontier of the empire, each garrison a permanent reminder of Bornu's authority."
 STATIC_MODIFIER_NAME_nd_bilma_toll_masters: "Masters of the Bilma Road"
 STATIC_MODIFIER_DESC_nd_bilma_toll_masters: "Our control over the Bilma oasis and the salt caravans that pass through it gives us unmatched leverage over trans-Saharan commerce."
 STATIC_MODIFIER_NAME_nd_sayfawa_restoration: "Sayfawa Restoration"
 STATIC_MODIFIER_DESC_nd_sayfawa_restoration: "The ancient dynasty reasserts its sacred authority, drawing upon centuries of legitimacy to bind the empire together through troubled times."
 STATIC_MODIFIER_NAME_nd_embrace_the_shehu: "Embrace the Shehu"
 STATIC_MODIFIER_DESC_nd_embrace_the_shehu: "The old dynasty gives way to practical governance. The Shehu's council rules through competence and military merit rather than bloodline."
 nd_kbu.2.t: "The Reforms of Mai Idris Alooma"
 nd_kbu.2.d: "Mai Idris Alooma has transformed the armies of Bornu. Through diplomatic missions to the Ottoman Porte, he has secured Turkish military advisors who now drill our soldiers in the use of firearms. Iron-helmeted musketeers march alongside the traditional armored cavalry, and fixed military camps with defensive walls have replaced temporary encampments.\n\nAlooma's innovations extend beyond the battlefield. He has cleared the roads for commerce, designed improved boats for Lake Chad's waters, and introduced standard units of measure for grain. His ribat fortifications guard every frontier. The question now is which of his reforms we shall pursue most vigorously."
 nd_kbu.2.a: "The musketeers shall be our vanguard."
 nd_kbu.2.b: "The ribats shall secure our borders."
 nd_kbu.3.t: "Masters of the Salt Road"
 nd_kbu.3.d: "The great caravan route from Lake Chad to Tripoli passes through the salt oases of Bilma, where enormous deposits of natron and salt are extracted by the labor of thousands. Every caravan that crosses the Sahara must pass through Bornu's territory and pay our tolls. From Bilma through Fezzan to the Mediterranean, a river of wealth flows through our lands — natron, cotton, kola nuts, ivory, and ostrich feathers heading north, while horses, firearms, silk, and copper come south.\n\nOur merchants have secured dominance over this central Saharan route, making Bornu the indispensable middleman between tropical Africa and the Mediterranean world."
 nd_kbu.3.a: "Let the tolls flow into our treasury."
 nd_kbu.4.t: "The Twilight of the Sayfawa"
 nd_kbu.4.d: "The Sayfawa dynasty, which has ruled for over seven centuries — the longest-reigning dynasty in recorded history — faces an existential crisis. Internal court intrigues have weakened the Mai's authority, provincial governors grow increasingly independent, and the old tribute-based economy falters as trade routes shift.\n\nYet the dynasty's name still carries immense weight. The Sayfawa trace their lineage to the legendary Sayf ibn Dhi Yazan, and their girgam — the royal chronicle — records an unbroken chain of sovereign Mais stretching back to the time of the Prophet. We must decide whether to shore up this ancient institution or embrace new forms of governance."
 nd_kbu.4.a: "The Sayfawa are eternal — restore the Mai's authority."
 nd_kbu.4.b: "The Shehu shall rule where the Mai cannot."
 nd_kbu.5.t: "The Defense of Bornu"
 nd_kbu.5.d: "When the Fulani jihad erupted across Hausaland and the warriors of Usman dan Fodio swept eastward, it seemed that Bornu itself would fall. Ngazargamu, our ancient capital, was sacked in 1808. But Muhammad al-Kanemi, an Islamic scholar and military commander, rallied the Kanembu and Shuwa Arabs to the empire's defense. Leading a mixed force of students, mallams, and mercenaries, al-Kanemi defeated the jihadi forces and drove them from Bornu.\n\nAl-Kanemi established a new capital at Kukawa and formed the Majlis — an executive council that brought together the empire's diverse communities. Though the Sayfawa Mais continued as figureheads, real power now rested with the Shehu and his council. Bornu survived where other Sahelian states did not."
 nd_kbu.5.a: "Bornu endures."
 nd_kbu_kanembu_horsemen: "Kanembu Horsemen"
 nd_kbu_kanembu_horsemen_desc: "The Kanembu cavalry tradition stretches back to the earliest days of the empire, when armored riders dominated the flat grasslands around Lake Chad."
 nd_kbu_sayfawa_lineage: "Sayfawa Lineage"
 nd_kbu_sayfawa_lineage_desc: "The Sayfawa dynasty claims descent from Sayf ibn Dhi Yazan and has ruled Kanem-Bornu for over seven centuries — the longest-reigning dynasty in recorded history."
 nd_kbu_natron_extraction: "Natron Extraction"
 nd_kbu_natron_extraction_desc: "The deposits of natron around Lake Chad are among the richest in Africa, providing an essential commodity for trade, preservation, and medicine."
 nd_kbu_early_islamization: "Early Islamization"
 nd_kbu_early_islamization_desc: "The conversion of Kanem to Islam in the 11th century under the Sayfawa reshaped the empire's identity, connecting it to the wider Islamic world."
 nd_kbu_ribat_tradition: "Ribat Tradition"
 nd_kbu_ribat_tradition_desc: "Fortified frontier posts guard the empire's borders, serving as both military garrisons and centers of Islamic learning."
 nd_kbu_lake_chad_fisheries: "Lake Chad Fisheries"
 nd_kbu_lake_chad_fisheries_desc: "Lake Chad's vast freshwater resources sustain a thriving fishing industry that feeds the empire's growing population."
 nd_kbu_saharan_caravan_routes: "Saharan Caravan Routes"
 nd_kbu_saharan_caravan_routes_desc: "Kanem-Bornu sits astride the central trans-Saharan caravan route connecting Lake Chad to Tripoli via Bilma and Fezzan."
 nd_kbu_ottoman_firearms: "Ottoman Firearms"
 nd_kbu_ottoman_firearms_desc: "Turkish military advisors imported by Mai Idris Alooma trained Bornu's soldiers in the use of muskets, creating Africa's first professional gunpowder infantry."
 nd_kbu_alooma_reforms: "Alooma's Reforms"
 nd_kbu_alooma_reforms_desc: "Mai Idris Alooma transformed Bornu through military, administrative, and economic reforms, establishing the empire at the height of its power."
 nd_kbu_quranic_schools: "Quranic Schools"
 nd_kbu_quranic_schools_desc: "A network of madrasas spreads literacy and Islamic scholarship throughout the empire, training the ulama who administer Bornu's courts."
 nd_kbu_berber_camelry: "Berber Camelry"
 nd_kbu_berber_camelry_desc: "Berber camel riders serve as the empire's long-range desert force, capable of deep raids across the Sahara."
 nd_kbu_sharia_courts: "Sharia Courts"
 nd_kbu_sharia_courts_desc: "Islamic law courts replace customary justice, providing standardized legal procedures across Bornu's diverse territories."
 nd_kbu_ngazargamu_metropolis: "Ngazargamu Metropolis"
 nd_kbu_ngazargamu_metropolis_desc: "The fortified capital of Ngazargamu, enclosed by walls over six kilometers long, serves as the commercial and political heart of the empire."
 nd_kbu_tribute_economy: "Tribute Economy"
 nd_kbu_tribute_economy_desc: "Government revenue flows from tribute, customs duties, and participation in the slave trade that sustains the trans-Saharan caravan network."
 nd_kbu_mailed_cavalry_tradition: "Mailed Cavalry Tradition"
 nd_kbu_mailed_cavalry_tradition_desc: "Heavily armored horsemen in chainmail and iron helmets form the elite shock force of the Bornu army, charging in dense formations across the Sahelian grasslands."
 nd_kbu_cotton_industry: "Cotton Industry"
 nd_kbu_cotton_industry_desc: "Bornu's weavers produce fine cotton cloth that is traded across the Sahara, prized for its quality from Lake Chad to the Mediterranean."
 nd_kbu_bilma_salt_road: "Bilma Salt Road"
 nd_kbu_bilma_salt_road_desc: "Control of the Bilma oasis and its salt deposits gives Bornu a stranglehold on the central trans-Saharan route."
 nd_kbu_diplomatic_network: "Diplomatic Network"
 nd_kbu_diplomatic_network_desc: "Bornu maintains diplomatic correspondence with the Ottoman Empire, the Hausa states, and North African kingdoms, projecting influence far beyond its borders."
 nd_kbu_scorched_earth_tactics: "Scorched Earth Tactics"
 nd_kbu_scorched_earth_tactics_desc: "Mai Alooma's soldiers burn everything in their path during campaigns, denying sustenance to enemies and breaking their will to resist."
 nd_kbu_fortified_cities: "Fortified Cities"
 nd_kbu_fortified_cities_desc: "Massive mudbrick walls encircle Bornu's major cities, with Ngazargamu's fortifications stretching over six kilometers in circumference."
 nd_kbu_standardized_measures: "Standardized Measures"
 nd_kbu_standardized_measures_desc: "Standard units of measure for grain and trade goods, introduced under Alooma, facilitate commerce and tax collection across the empire."
 nd_kbu_kotoko_flotilla: "Kotoko Flotilla"
 nd_kbu_kotoko_flotilla_desc: "The Kotoko boatmen of Lake Chad provide river transport, logistical support, and amphibious capability to the Bornu military."
 nd_kbu_kola_nut_trade: "Kola Nut Trade"
 nd_kbu_kola_nut_trade_desc: "Kola nuts from the southern forests are traded through Bornu's markets to destinations across the Sahara, prized as stimulants and ceremonial gifts."
 nd_kbu_legal_codification: "Legal Codification"
 nd_kbu_legal_codification_desc: "The codification of Islamic law under the Mais provides a uniform legal framework for governing Bornu's multi-ethnic territories."
 nd_kbu_imperial_cavalry: "Imperial Cavalry"
 nd_kbu_imperial_cavalry_desc: "The Bornu cavalry remains the backbone of the empire's military power, with generations of breeding producing the finest warhorses in the Sahel."
 nd_kbu_leather_workshops: "Leather Workshops"
 nd_kbu_leather_workshops_desc: "The vast herds around Lake Chad provide an abundance of hides, processed in Bornu's tanneries into leather goods exported across the trans-Saharan network."
 nd_kbu_scholarly_networks: "Scholarly Networks"
 nd_kbu_scholarly_networks_desc: "Bornu's ulama maintain connections to Islamic learning centers from Timbuktu to Cairo, ensuring the empire keeps pace with intellectual developments across the Muslim world."
 nd_kbu_sayfawa_twilight: "Sayfawa Twilight"
 nd_kbu_sayfawa_twilight_desc: "After seven centuries of rule, the world's longest-reigning dynasty faces mounting challenges from internal division and external threats."
 nd_kbu_reformed_musketeers: "Reformed Musketeers"
 nd_kbu_reformed_musketeers_desc: "A new generation of Bornu musketeers, better trained and equipped than their predecessors, takes the field in defense of the empire."
 nd_kbu_natron_monopoly: "Natron Monopoly"
 nd_kbu_natron_monopoly_desc: "State control over natron extraction and export provides a steady revenue stream independent of the declining slave trade."
 nd_kbu_agricultural_reforms: "Agricultural Reforms"
 nd_kbu_agricultural_reforms_desc: "The resettlement of farmers to new lands and improvement of Lake Chad's irrigation systems expand the empire's agricultural base."
 nd_kbu_fortified_camps: "Fortified Camps"
 nd_kbu_fortified_camps_desc: "Permanent military encampments with defensive walls project Bornu's power across its frontier territories."
 nd_kbu_saharan_diplomacy: "Saharan Diplomacy"
 nd_kbu_saharan_diplomacy_desc: "Bornu's diplomatic reach extends across the Sahara, maintaining alliances and commercial relationships from Tripoli to the forest kingdoms."
 nd_kbu_kanemi_defense: "al-Kanemi Defense"
 nd_kbu_kanemi_defense_desc: "Muhammad al-Kanemi's defense of Bornu against the Fulani jihad preserved the empire when all seemed lost, establishing a new dynasty of warrior-scholars."
 nd_kbu_kukawa_metropolis: "Kukawa Metropolis"
 nd_kbu_kukawa_metropolis_desc: "The new capital of Kukawa grows into one of sub-Saharan Africa's greatest cities, a center of commerce, scholarship, and governance."
 nd_kbu_shehu_administration: "Shehu Administration"
 nd_kbu_shehu_administration_desc: "The al-Kanemi Shehus rule through the Majlis council, bringing efficient administration and collective governance to replace the old Mai system."
 nd_kbu_bornu_chronicles: "Bornu Chronicles"
 nd_kbu_bornu_chronicles_desc: "The tradition of the Diwan — Bornu's royal chronicle — and the girgam oral tradition preserve a millennium of history, fostering literacy and cultural identity."
 nd_kbu_trade_modernization: "Trade Modernization"
 nd_kbu_trade_modernization_desc: "New commercial infrastructure modernizes Bornu's trade networks, adapting centuries-old caravan routes to changing economic conditions."
 nd_kbu_majlis_governance: "Majlis Governance"
 nd_kbu_majlis_governance_desc: "The Majlis executive council, established by al-Kanemi, institutionalizes collective leadership and meritocratic governance in Bornu."
 a_nd_kbu_kanembu_cavalry: "Kanembu Cavalry"
 a_nd_kbu_kanembu_cavalry_desc: "Armored horsemen of the Kanembu people, the traditional mounted elite of the Kanem-Bornu Empire, fighting in chainmail and iron helmets."
 a_nd_kbu_iron_musketeer: "Iron Musketeers"
 a_nd_kbu_iron_musketeer_desc: "Bornu's musketeers, trained by Ottoman military advisors, wear distinctive iron helmets and wield Turkish firearms with deadly precision."
 a_nd_kbu_camel_rider: "Berber Camelry"
 a_nd_kbu_camel_rider_desc: "Desert-hardened camel riders of Berber origin who serve as the empire's long-range raiding and reconnaissance force across the Sahara."
 a_nd_kbu_mailed_cavalry: "Mailed Cavalry"
 a_nd_kbu_mailed_cavalry_desc: "The elite of Bornu's cavalry, clad in full chainmail with iron helmets, mounted on armored horses bred for the charge."
 a_nd_kbu_kotoko_boatmen: "Kotoko Boatmen"
 a_nd_kbu_kotoko_boatmen_desc: "Skilled rivermen of the Kotoko people who navigate Lake Chad and its tributaries, providing amphibious logistics and river transport."
 a_nd_kbu_bornu_musketeer: "Bornu Musketeers"
 a_nd_kbu_bornu_musketeer_desc: "The reformed musketeers of Bornu, disciplined and well-drilled, representing the modernized core of the empire's infantry."
 nd_kbu_natron_works: "Natron Works"
 nd_kbu_natron_works_desc: "Extraction facilities for the valuable natron deposits found around Lake Chad, producing a key commodity for trans-Saharan trade."
 nd_kbu_ribat: "Ribat"
 nd_kbu_ribat_desc: "A fortified frontier post combining military garrison with Islamic learning, guarding the empire's borders while spreading the faith."
 nd_kbu_caravan_depot: "Caravan Depot"
 nd_kbu_caravan_depot_desc: "A waystation and market for the trans-Saharan caravans, providing provisions, water, and trading facilities for merchants crossing the desert."
 nd_kbu_madrasa: "Bornu Madrasa"
 nd_kbu_madrasa_desc: "A Quranic school where the ulama train the next generation of scholars, judges, and administrators in Islamic law and letters."
 nd_kbu_cotton_weaving: "Cotton Weaving House"
 nd_kbu_cotton_weaving_desc: "A workshop where skilled weavers produce the fine cotton cloth for which Bornu is renowned across the trans-Saharan trade network."
 nd_kbu_walled_city: "Walled City"
 nd_kbu_walled_city_desc: "Massive mudbrick fortifications encircle the city, their thick walls and narrow gates channeling attackers into killing grounds."
 nd_kbu_tannery: "Bornu Tannery"
 nd_kbu_tannery_desc: "A workshop for processing the abundant hides from Lake Chad's pastoral herds into leather goods for export."
 nd_kbu_war_camp: "Fortified War Camp"
 nd_kbu_war_camp_desc: "A permanent military encampment surrounded by defensive walls, projecting Bornu's military power across its frontier territories."
 nd_kbu_natron_processing_pm: "Natron Processing"
 nd_kbu_natron_processing_pm_desc: "Extracting natron from the mineral-rich clay deposits around Lake Chad and refining it into salt for trade."
 nd_kbu_ribat_upkeep: "Ribat Garrison"
 nd_kbu_ribat_upkeep_desc: "Maintaining the soldiers and fortifications of a frontier ribat."
 nd_kbu_caravan_supplies_pm: "Caravan Provisioning"
 nd_kbu_caravan_supplies_pm_desc: "Supplying food, water, and trade goods for the desert caravans."
 nd_kbu_quran_instruction_pm: "Quranic Instruction"
 nd_kbu_quran_instruction_pm_desc: "Teaching the Quran and Islamic jurisprudence to students."
 nd_kbu_cotton_dyeing_pm: "Cotton Dyeing"
 nd_kbu_cotton_dyeing_pm_desc: "Spinning raw cotton and dyeing it with indigo and other pigments to weave cloth prized across the trans-Saharan trade network."
 nd_kbu_mudbrick_walls_pm: "Mudbrick Fortification"
 nd_kbu_mudbrick_walls_pm_desc: "Maintaining the massive mudbrick walls that protect the city."
 nd_kbu_hide_tanning_pm: "Hide Tanning"
 nd_kbu_hide_tanning_pm_desc: "Salt-curing and processing raw animal hides into finished leather for export across the Sahara."
 nd_kbu_camp_provisioning_pm: "Camp Provisioning"
 nd_kbu_camp_provisioning_pm_desc: "Keeping a permanent military camp supplied with weapons and provisions."
 nd_kbu_islamic_court_pm: "Islamic Court Administration"
 nd_kbu_islamic_court_pm_desc: "Maintaining the administrative apparatus of the Sharia courts."
 nd_kbu_scorched_earth_pm: "Scorched Earth Operations"
 nd_kbu_scorched_earth_pm_desc: "Systematic destruction of enemy resources during military campaigns."
 nd_kbu_kola_trade_pm: "Kola Nut Trade"
 nd_kbu_kola_trade_pm_desc: "Trading kola nuts from the southern forests through the trans-Saharan network."
 nd_kbu_natron_export_pm: "Natron Export"
 nd_kbu_natron_export_pm_desc: "Large-scale export of refined natron to markets across the Sahara and beyond."
 nd_kbu_kukawa_trade_pm: "Kukawa Commerce"
 nd_kbu_kukawa_trade_pm_desc: "The bustling markets of the new capital attract traders from across Africa."
 nd_kbu_modern_trade_pm: "Modern Trade Infrastructure"
 nd_kbu_modern_trade_pm_desc: "Modernized warehouses, roads, and market facilities serve an evolving commercial landscape."
 levy_nd_kbu_kanembu_cavalry: "Kanembu Cavalry Levy"
 levy_nd_kbu_kanembu_cavalry_desc: "Armored Kanembu horsemen raised from the noble and soldier estates to serve as the empire's mounted vanguard."
 levy_nd_kbu_camel_rider: "Berber Camelry Levy"
 levy_nd_kbu_camel_rider_desc: "Desert camel riders drawn from tribal and soldier populations, capable of long-range raids across the Sahara."
 nd_kbu_formed_tt: "Kanem-Bornu has been formed"
 nd_kbu_path_a_tt: "Chose Sword of the Mai"
 nd_kbu_path_b_tt: "Chose Crossroads of the Sahara"

 # ===== DESTINY LOCALIZATION =====

 # Destiny advance names and descriptions
 nd_kbu_destiny: "The Restoration of Kanem-Bornu"
 nd_kbu_destiny_desc: "The ancient realm of the Sayfawa is reunited. Maintain stability and chart the empire's future course — whether as a military hegemon or a commercial crossroads."

 nd_kbu_dest_hausa_conquest: "The Hausa Campaigns"
 nd_kbu_dest_hausa_conquest_desc: "The wealthy Hausa city-states of Kano and Zaria lie south of our borders, their markets fat with goods and their walls ripe for siege. Conquer them and bring their wealth under Bornu's lance."

 nd_kbu_dest_sahel_hegemony: "Hegemony of the Sahel"
 nd_kbu_dest_sahel_hegemony_desc: "Timbuktu and Gao, the legendary cities of the western Sahel, must acknowledge Bornu's supremacy. March west and claim dominion over the entire savanna belt."

 nd_kbu_dest_mediterranean_reach: "From Chad to the Sea"
 nd_kbu_dest_mediterranean_reach_desc: "The trans-Saharan route ends at Tripoli on the Mediterranean. Seize Murzuk and Tripoli to control the entire caravan highway from Lake Chad to the sea."

 nd_kbu_dest_salt_monopoly: "Masters of the Salt Trade"
 nd_kbu_dest_salt_monopoly_desc: "Bilma's salt and natron flow through our markets to the wider world. Embrace modern banking and secure our monopoly over the salt trade arteries of the central Sahara."

 nd_kbu_dest_trade_crossroads: "Continental Crossroads"
 nd_kbu_dest_trade_crossroads_desc: "Ivory, cotton, kola nuts, and natron — Bornu sits at the center of Africa's greatest trade network. Embrace global trade and develop our lands into a true continental crossroads."

 nd_kbu_dest_saharan_master: "Master of the Trans-Saharan Network"
 nd_kbu_dest_saharan_master_desc: "Every caravan crossing the Sahara passes through our markets. With cotton, ivory, and natron flowing through our hands, Bornu commands the commerce of an entire continent."

 # Destiny event text
 nd_kbu.6.t: "The Path of Kanem-Bornu"
 nd_kbu.6.d: "The reunification is complete. The Mai sits enthroned at Ngazargamu, the girgam records another chapter in the world's longest dynasty, and the empire stretches from the Sahara to the savanna. Now the real work begins — transforming this restored realm into something that will endure for centuries more."
 nd_kbu.6.a: "The empire stands restored."

 nd_kbu.7.t: "The Fall of the Hausa Cities"
 nd_kbu.7.d: "Kano's walls have been breached and Zaria's emirs kneel before the Mai. The great Hausa city-states, long rivals of Bornu, now submit to our authority. Their dye pits, their forges, their teeming markets — all feed the treasury of Kanem-Bornu. The Sahel trembles."
 nd_kbu.7.a: "The Hausa submit to Bornu's might."

 nd_kbu.8.t: "Hegemon of the Sahel"
 nd_kbu.8.d: "From Timbuktu to Lake Chad, the entire Sahel belt acknowledges Bornu's supremacy. The great trading cities of the Niger bend now pay tribute, and our cavalry patrols the caravan routes unchallenged. But how shall we sustain this vast empire? Shall we extract wealth through raiding and tribute, or garrison our conquests with permanent forces?"
 nd_kbu.8.a: "Raid and tribute — let the weak sustain us."
 nd_kbu.8.b: "Garrison and fortify — hold what we have won."

 nd_kbu.9.t: "From Lake Chad to the Mediterranean"
 nd_kbu.9.d: "The impossible has been achieved. Bornu's armies have crossed the Sahara itself, seizing the Fezzan oases and the port of Tripoli. For the first time, a single power controls the entire trans-Saharan highway from the shores of Lake Chad to the Mediterranean Sea. The Mai of Kanem-Bornu now rules an empire that spans the desert."
 nd_kbu.9.a: "We are the empire that bridges two worlds."
 nd_kbu.9.b: "Let our enemies know the terror of Bornu."

 nd_kbu.10.t: "Lords of the Salt Road"
 nd_kbu.10.d: "The salt caravans of Bilma are the lifeblood of trans-Saharan trade, and now they flow entirely through our markets. With modern banking practices adopted from our Mediterranean trading partners, we have transformed Bornu from a mere waystation into the financial center of the central Sahara."
 nd_kbu.10.a: "The salt flows through our hands."

 nd_kbu.11.t: "The Continental Crossroads"
 nd_kbu.11.d: "Ivory from the south, natron from Lake Chad, cotton from our looms, kola nuts from the forest kingdoms — every major commodity of interior Africa passes through Bornu's markets. We have become the indispensable hub of continental commerce, the crossroads where Africa's great trade routes converge. Shall we empower our merchant class to drive this growth, or shall the state collect its dues directly?"
 nd_kbu.11.a: "Empower the merchants — let trade flourish."
 nd_kbu.11.b: "The state shall collect its tolls."

 nd_kbu.12.t: "Master of the Trans-Saharan Network"
 nd_kbu.12.d: "No caravan crosses the Sahara without passing through our markets. No trader reaches the Mediterranean without our consent. Bornu has achieved what no other Sahelian state could — total commercial dominance over the trans-Saharan network. The wealth of two continents flows through Lake Chad. How shall we use this power?"
 nd_kbu.12.a: "Build an emporium on the shores of Chad."
 nd_kbu.12.b: "Let our caravans carry diplomacy with trade."

 # Timed modifier names and descriptions
 STATIC_MODIFIER_NAME_nd_kbu_dest_raider_economy: "Raider Economy"
 STATIC_MODIFIER_DESC_nd_kbu_dest_raider_economy: "The spoils of war flow into Bornu's treasury as raiding parties strip conquered territories of their wealth, sustaining the empire's military machine."
 STATIC_MODIFIER_NAME_nd_kbu_dest_garrison_network: "Garrison Network"
 STATIC_MODIFIER_DESC_nd_kbu_dest_garrison_network: "A network of permanent garrisons across the Sahel secures Bornu's conquests, with mercenary companies supplementing the imperial cavalry."
 STATIC_MODIFIER_NAME_nd_kbu_dest_saharan_empire: "Saharan Empire"
 STATIC_MODIFIER_DESC_nd_kbu_dest_saharan_empire: "An empire spanning the desert, Bornu commands respect from the Mediterranean to the savanna, its nobles leading vast levies across every frontier."
 STATIC_MODIFIER_NAME_nd_kbu_dest_terror_of_the_sahel: "Terror of the Sahel"
 STATIC_MODIFIER_DESC_nd_kbu_dest_terror_of_the_sahel: "Bornu's reputation as an implacable military power reduces the will of enemies to resist, as reinforcements and levies arrive with terrifying speed."
 STATIC_MODIFIER_NAME_nd_kbu_dest_merchant_princes: "Merchant Princes of Bornu"
 STATIC_MODIFIER_DESC_nd_kbu_dest_merchant_princes: "A rising class of wealthy Bornu merchants drives the integration of conquered peoples through shared commerce, their prosperity benefiting all estates."
 STATIC_MODIFIER_NAME_nd_kbu_dest_toll_collectors: "Toll Collectors of the Sahara"
 STATIC_MODIFIER_DESC_nd_kbu_dest_toll_collectors: "State-appointed toll collectors at every oasis and market crossing ensure that Bornu extracts its share from every caravan and trader."
 STATIC_MODIFIER_NAME_nd_kbu_dest_lake_chad_emporium: "Lake Chad Emporium"
 STATIC_MODIFIER_DESC_nd_kbu_dest_lake_chad_emporium: "The shores of Lake Chad host one of Africa's greatest emporiums, where goods from across the continent change hands and free trade flourishes under Bornu's protection."
 STATIC_MODIFIER_NAME_nd_kbu_dest_caravan_diplomacy: "Caravan Diplomacy"
 STATIC_MODIFIER_DESC_nd_kbu_dest_caravan_diplomacy: "Bornu's caravans carry not only goods but diplomatic missions, spreading goodwill and innovation along the trade routes that bind the continent together."

 # Destiny building names and descriptions
 nd_kbu_imperial_barracks: "Imperial Barracks"
 nd_kbu_imperial_barracks_desc: "A grand military complex where Bornu's elite soldiers train in firearms, cavalry tactics, and siege warfare, maintaining the empire's military edge."
 nd_kbu_grand_caravansary: "Grand Caravansary"
 nd_kbu_grand_caravansary_desc: "A vast commercial complex serving the trans-Saharan caravans, with warehouses, stables, lodgings, and market halls all enclosed within fortified walls."

 # Building PM names and descriptions
 nd_kbu_barracks_training_pm: "Military Training"
 nd_kbu_barracks_training_pm_desc: "Training soldiers in combined arms tactics using firearms, cavalry mounts, and siege equipment."
 nd_kbu_caravansary_operations_pm: "Caravansary Operations"
 nd_kbu_caravansary_operations_pm_desc: "Maintaining the facilities and provisioning services for trans-Saharan caravans passing through Bornu."
