l_english:
 STATIC_MODIFIER_NAME_nd_catholic_shield: "The Catholic Shield"
 STATIC_MODIFIER_DESC_nd_catholic_shield: "Bavaria stands as the foremost defender of the Catholic faith in the Empire, its armies tempered by religious conviction and its people united in zealous orthodoxy."
 STATIC_MODIFIER_NAME_nd_wittelsbach_inheritance: "The Wittelsbach Inheritance"
 STATIC_MODIFIER_DESC_nd_wittelsbach_inheritance: "The Wittelsbach dynasty has mastered the art of dynastic politics, weaving a web of marriages, alliances, and cultural patronage that extends Bavaria's influence far beyond its borders."
 STATIC_MODIFIER_NAME_nd_bavarian_catholic_league_arms: "Catholic League Arms"
 STATIC_MODIFIER_DESC_nd_bavarian_catholic_league_arms: "The military apparatus of the Catholic League provides Bavaria with disciplined infantry and ample manpower to defend the faith."
 STATIC_MODIFIER_NAME_nd_bavarian_jesuit_diplomacy: "Jesuit Diplomacy"
 STATIC_MODIFIER_DESC_nd_bavarian_jesuit_diplomacy: "The Society of Jesus serves as Bavaria's diplomatic instrument, its colleges educating loyal administrators and its missions extending Bavarian influence across Catholic Europe."
 STATIC_MODIFIER_NAME_nd_bavarian_primogeniture_law: "Primogeniture Law"
 STATIC_MODIFIER_DESC_nd_bavarian_primogeniture_law: "The law of indivisibility ensures the Bavarian lands pass intact to a single heir, ending centuries of ruinous partition."
 STATIC_MODIFIER_NAME_nd_bavarian_landtag_compact: "Landtag Compact"
 STATIC_MODIFIER_DESC_nd_bavarian_landtag_compact: "The estates of Bavaria have agreed to a compact with the duke, trading obedience for representation and creating a stable system of governance."
 nd_bav.1.t: "The Unification of Bavaria"
 nd_bav.1.d: "The fractured lands of the Bavarian duchies are at last united under one banner. Munich, enriched by the salt trade and blessed by the Church, stands ready to lead a realm that stretches from the Alpine passes to the Danube plains. The question now is what kind of Bavaria we shall build. Shall we forge ourselves into the sword of the Catholic faith, marshalling our armies as the shield of orthodoxy against heresy? Or shall we follow the path of our Wittelsbach ancestors — masters of dynastic intrigue, patrons of art and learning, weaving alliances through marriage and culture rather than conquest?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_bav.1.a: "We are the Shield of the Faith!"
 nd_bav.1.b: "The Wittelsbachs shall endure through statecraft."
 nd_bav.2.t: "The Reunification of Bavaria"
 nd_bav.2.d: "The Landshut War of Succession has ended. After years of conflict between the rival Wittelsbach lines of Bavaria-Munich and Bavaria-Landshut, the dynasty's lands are reunited for the first time in generations. Duke Albrecht IV has triumphed, but the cost has been heavy — Imperial arbitration has stripped away some territories, and the estates demand concessions. The duke now proposes a revolutionary measure: a primogeniture law that would make the duchy forever indivisible. The estates, gathered in assembly, weigh their response. Shall the duchy embrace strict primogeniture, concentrating all power in a single line? Or shall the estates exact a compact, trading their consent for guaranteed rights of representation?"
 nd_bav.2.a: "One duke, one Bavaria — indivisible and eternal."
 nd_bav.2.b: "The Landtag shall have its voice."
 nd_bav.3.t: "The Catholic League"
 nd_bav.3.d: "As Protestant princes form their Union and heresy spreads across the Empire, Duke Maximilian I of Bavaria has answered with the founding of the Catholic League. This alliance of Catholic Imperial princes, bankrolled by Bavarian wealth and led by Bavarian resolve, stands as the mightiest military force in Catholic Germany. Under the brilliant command of Count Tilly, the League's army of 25,000 men — well-drilled, well-supplied, and burning with confessional zeal — has already proven itself on the battlefield. The question is how Bavaria shall wield this formidable instrument: as a hammer of military force to crush Protestant resistance, or as a diplomatic tool backed by Jesuit persuasion to reclaim souls through education and conversion?"
 nd_bav.3.a: "Let Tilly's armies speak for the faith."
 nd_bav.3.b: "The Jesuits shall be our finest weapon."
 nd_bav.4.t: "Baroque Munich"
 nd_bav.4.d: "A transformation is sweeping through Munich. The Theatine Church rises over the skyline, its Italian Baroque facade a testament to the dynasty's ambitions. At Nymphenburg, a summer palace of astonishing grandeur takes shape amid formal gardens that rival Versailles. The Wittelsbach court has become a beacon of artistic patronage — Italian architects, Flemish painters, and German musicians flock to Bavaria's capital. The Residenz grows ever more magnificent with each generation of builders. What was once a modest ducal seat among many in the Empire has become one of Europe's foremost cultural capitals, its buildings proclaiming Bavarian power and Catholic splendor to all who behold them."
 nd_bav.4.a: "Munich shall rival the great courts of Europe."
 nd_bav_salt_road_tradition: "Salt Road Tradition"
 nd_bav_salt_road_tradition_desc: "The ancient salt roads from Reichenhall and Berchtesgaden through Munich to Augsburg have made Bavaria wealthy. Controlling these routes is the foundation of Bavarian commerce."
 nd_bav_alpine_passes: "Alpine Pass Fortification"
 nd_bav_alpine_passes_desc: "Bavaria's southern border follows the Alpine passes, natural chokepoints that have been fortified since time immemorial to control trade and repel invaders."
 nd_bav_hofbrau_tradition: "Hofbrau Tradition"
 nd_bav_hofbrau_tradition_desc: "The court brewery tradition, culminating in the founding of the Hofbrauhaus, reflects both Bavarian economic ingenuity and the social importance of communal gathering places."
 nd_bav_wittelsbach_court: "Wittelsbach Court Culture"
 nd_bav_wittelsbach_court_desc: "The Wittelsbach dynasty cultivates a court of refined taste and cosmopolitan ambition, attracting artists and scholars from across Europe."
 nd_bav_landshut_reunification: "Landshut Reunification"
 nd_bav_landshut_reunification_desc: "The Landshut War of Succession ended the centuries of Bavarian partition. Under Albrecht IV's primogeniture law of 1506, the duchy became forever indivisible."
 nd_bav_munich_staple_rights: "Munich Staple Rights"
 nd_bav_munich_staple_rights_desc: "Munich's staple right requires all salt passing through the city to be offered for sale before continuing its journey, enriching the capital and cementing its role as Bavaria's commercial heart."
 nd_bav_rentmeister_system: "Rentmeister System"
 nd_bav_rentmeister_system_desc: "The division of Bavaria into administrative districts headed by Rentmeisters created an efficient system of tax collection and regional governance."
 nd_bav_catholic_league: "Catholic League"
 nd_bav_catholic_league_desc: "Founded by Maximilian I in 1609, the Catholic League united Catholic Imperial princes under Bavarian leadership, fielding one of the most formidable armies of the Thirty Years' War."
 nd_bav_jesuit_colleges: "Jesuit Colleges"
 nd_bav_jesuit_colleges_desc: "The Society of Jesus established colleges throughout Bavaria that served as instruments of both education and Counter-Reformation, training loyal administrators and reconverting Protestant populations."
 nd_bav_maximilian_reforms: "Maximilian's Fiscal Reforms"
 nd_bav_maximilian_reforms_desc: "Duke Maximilian I reorganized Bavarian finances with unprecedented rigor, creating a war chest that funded the Catholic League and made Bavaria the strongest Catholic principality."
 nd_bav_standing_army: "Bavarian Standing Army"
 nd_bav_standing_army_desc: "Established by Elector Maximilian II Emanuel in 1682, the permanent Bavarian Army replaced temporary levies with professional soldiers, including the distinctive Chevaulegers cavalry."
 nd_bav_baroque_patronage: "Baroque Patronage"
 nd_bav_baroque_patronage_desc: "The Wittelsbach electors transformed Munich into a Baroque masterpiece, commissioning the Theatine Church, Nymphenburg Palace, and the expansion of the Residenz."
 nd_bav_salt_monopoly: "Salt Monopoly"
 nd_bav_salt_monopoly_desc: "The ducal monopoly on Bavarian salt production concentrated enormous wealth in state hands, funding military adventures and cultural patronage alike."
 nd_bav_montgelas_reforms: "Montgelas Reforms"
 nd_bav_montgelas_reforms_desc: "Count Montgelas modernized Bavaria from 1799, abolishing feudal privileges, secularizing church lands, introducing civil equality, and creating a modern bureaucratic state."
 nd_bav_kingdom_sovereignty: "Kingdom Sovereignty"
 nd_bav_kingdom_sovereignty_desc: "Elevated to a kingdom by Napoleon in 1806, Bavaria achieved full sovereignty for the first time, reorganizing its military along modern lines and establishing itself as a European power in its own right."
 nd_bav_reinheitsgebot_industry: "Reinheitsgebot Industry"
 nd_bav_reinheitsgebot_industry_desc: "The industrialization of Bavarian brewing combines centuries of purity-law expertise with modern techniques — coal-fired malt kilns, mechanical processes, and rail distribution to produce beer at unprecedented scale."
 a_nd_bav_ritter: "Bavarian Ritter"
 a_nd_bav_ritter_desc: "Heavy armored cavalry drawn from the Bavarian lesser nobility, the Ritter charge with devastating force in the feudal tradition of the Imperial knights."
 a_nd_bav_kreisinfanterie: "Kreisinfanterie"
 a_nd_bav_kreisinfanterie_desc: "Disciplined infantry of the Imperial Circle, drilled in the Spanish tercio tradition and hardened by the religious wars. They fight with the conviction of men defending their faith."
 a_nd_bav_chevaulegers: "Bavarian Chevaulegers"
 a_nd_bav_chevaulegers_desc: "Light cavalry of the Bavarian standing army, trained for reconnaissance, pursuit, and rapid flanking maneuvers in the tradition of the French-influenced Bavarian military."
 nd_bav_salzkontor: "Salzkontor"
 nd_bav_salzkontor_desc: "A salt trading house that manages the purchase, storage, and distribution of Bavaria's most valuable commodity along the ancient salt roads."
 nd_bav_jesuitenkolleg: "Jesuitenkolleg"
 nd_bav_jesuitenkolleg_desc: "A college of the Society of Jesus, combining rigorous classical education with Counter-Reformation theology to train loyal Catholic administrators and scholars."
 nd_bav_hofbrauhaus: "Hofbrauhaus"
 nd_bav_hofbrauhaus_desc: "The court brewery serves as both an economic enterprise and a social institution, producing fine Bavarian beer while providing a gathering place that promotes civic loyalty."
 nd_bav_barockschloss: "Barockschloss"
 nd_bav_barockschloss_desc: "A magnificent Baroque palace in the Wittelsbach tradition, proclaiming the dynasty's cultural ambitions through Italian architecture, formal gardens, and lavish interior decoration."
 nd_bav_salt_processing: "Salt Processing"
 nd_bav_salt_processing_desc: "The refining and distribution of Alpine salt requires stone-built warehouses, timber for fuel, and cloth for sacking and storage."
 nd_bav_jesuit_curriculum: "Jesuit Curriculum"
 nd_bav_jesuit_curriculum_desc: "The Ratio Studiorum demands a constant supply of printed textbooks and theological treatises, and beeswax candles to illuminate the evening studies."
 nd_bav_court_brewing: "Court Brewing"
 nd_bav_court_brewing_desc: "The ducal brewery malts wheat and coopers lumber barrels to produce fine Bavarian beer."
 nd_bav_baroque_upkeep: "Baroque Upkeep"
 nd_bav_baroque_upkeep_desc: "Maintaining a Baroque palace demands stone for repairs, fine cloth for tapestries, and fine furniture for the state apartments."
 nd_bav_salzwerk: "Salzwerk"
 nd_bav_salzwerk_desc: "A salt refinery processing Alpine rock salt through evaporation and purification, supplying Bavaria's most lucrative trade commodity."
 nd_bav_brauerei: "Brauerei"
 nd_bav_brauerei_desc: "An industrial-scale brewery producing beer under the Reinheitsgebot purity law, consuming vast quantities of wheat and coal."
 nd_bav_salt_refining: "Salt Refining"
 nd_bav_salt_refining_desc: "Alpine rock salt is processed through evaporation and purification in stone-built furnaces fueled by timber, producing refined salt for trade."
 nd_bav_industrial_brewing: "Industrial Brewing"
 nd_bav_industrial_brewing_desc: "Industrial-scale brewing under the Reinheitsgebot uses coal-fired malt kilns and vast quantities of wheat to produce beer at unprecedented volume."
 levy_nd_bav_ritter: "Bavarian Ritter Levy"
 levy_nd_bav_ritter_desc: "Noble cavalry raised from the Bavarian lesser aristocracy to serve as heavy shock troops."
 nd_bav_formed_tt: "Bavaria has been formed"
 nd_bav_path_a_tt: "Chose The Catholic Shield"
 nd_bav_path_b_tt: "Chose The Wittelsbach Inheritance"
 nd_bav_destiny: "Bavarian Destiny"
 nd_bav_destiny_desc: "United Bavaria stands at a crossroads. The destiny of the Wittelsbach realm — whether forged in the fires of Catholic zeal or shaped by dynastic cunning — now lies in our hands."
 nd_bav_dest_salzburg_crusade: "The Salzburg Crusade"
 nd_bav_dest_salzburg_crusade_desc: "Secure the great Catholic bishopric of Salzburg and the Imperial city of Augsburg to anchor Bavaria's position as the foremost defender of the faith in southern Germany."
 nd_bav_dest_palatinate_claim: "The Palatinate Claim"
 nd_bav_dest_palatinate_claim_desc: "Seize Heidelberg and the Palatinate electorate, as Maximilian I did after the Battle of White Mountain, establishing Bavaria as the premier military power among the Catholic princes."
 nd_bav_dest_catholic_supremacy: "Catholic Supremacy"
 nd_bav_dest_catholic_supremacy_desc: "Bring both Prague and Vienna under Bavarian dominion, eclipsing the Habsburgs themselves as the supreme Catholic power in Central Europe."
 nd_bav_dest_golden_treasury: "The Golden Treasury"
 nd_bav_dest_golden_treasury_desc: "Establish Bavaria's financial foundations through embracing modern banking and accumulating a formidable treasury worthy of Wittelsbach ambition."
 nd_bav_dest_cultural_metropolis: "Cultural Metropolis"
 nd_bav_dest_cultural_metropolis_desc: "Transform Munich into a cultural capital by drawing luxury goods like silk into its markets, embracing the printing press, and cultivating an international reputation."
 nd_bav_dest_wittelsbach_zenith: "Wittelsbach Zenith"
 nd_bav_dest_wittelsbach_zenith_desc: "Achieve the pinnacle of Wittelsbach power — a vast treasury, unmatched prestige, a flourishing realm, and mastery of global trade networks."
 nd_bav.5.t: "The Bavarian Destiny"
 nd_bav.5.d: "Bavaria is formed, and our chosen path lies ahead. The traditions of our ancestors guide us, but it is we who must forge the future. Whether through the sword or through statecraft, the Wittelsbach name shall echo through the ages."
 nd_bav.5.a: "Our destiny awaits."
 nd_bav.6.t: "The Salt and the Sword"
 nd_bav.6.d: "Salzburg, the ancient prince-bishopric whose salt mines once rivalled our own, now flies the Bavarian banner. And Augsburg — that great Imperial city where the fateful Confession was read, where Catholic and Protestant first drew their theological battle lines — has been brought into our fold. With the wealth of Salzburg's mines and the commercial might of Augsburg's bankers secured, Bavaria's position as the Catholic champion of the south is beyond question. The salt roads and the sword roads are now one."
 nd_bav.6.a: "The faith has its shield."
 nd_bav.7.t: "The Palatinate Electorate"
 nd_bav.7.d: "Heidelberg has fallen. The seat of the Palatinate — once the stronghold of Calvinist heresy and the spark that ignited the great religious wars — is now ours. As Maximilian I seized the electoral dignity from Frederick V after the Battle of White Mountain, so too have we claimed what was rightfully owed to Catholic valor. The question is how we shall consolidate this triumph. Shall we emulate Tilly's hammer, forging our armies into an unstoppable instrument of conquest? Or shall we raise the League's banner high, inspiring Catholic princes across the Empire to rally to our cause?"
 nd_bav.7.a: "Forge Tilly's hammer anew."
 nd_bav.7.b: "Rally the princes to our banner."
 nd_bav.8.t: "Catholic Imperium"
 nd_bav.8.d: "Prague and Vienna both bow to the Bavarian lion. The Defenestration of Prague once plunged Europe into decades of war — now that city's spires gleam under Wittelsbach authority. And Vienna, seat of the Habsburgs for centuries, has yielded to a greater Catholic power. Bavaria has achieved what even the most ambitious of its dukes never dared dream: supremacy over the entire Catholic heartland of Central Europe. Shall we build an imperium of fortresses and supply lines to hold these vast conquests, or pursue a strategy of swift wars and decisive victories to keep our enemies perpetually off balance?"
 nd_bav.8.a: "Build the fortress of Christendom."
 nd_bav.8.b: "Strike swiftly, like at White Mountain."
 nd_bav.9.t: "The Wittelsbach Treasury"
 nd_bav.9.d: "The vaults of Munich overflow. Through shrewd adoption of modern banking practices and careful stewardship of our realm's resources, Bavaria has accumulated wealth that would make the Fuggers themselves take notice. The salt revenues, the brewing profits, the careful management of ducal estates — all have contributed to a treasury that gives the Wittelsbachs options that raw military power alone could never provide. Gold opens doors that swords cannot."
 nd_bav.9.a: "Wealth is the foundation of all power."
 nd_bav.10.t: "Munich Ascendant"
 nd_bav.10.d: "Silk merchants from Venice and Constantinople now frequent Munich's markets. The printing presses of Bavaria churn out texts that scholars across Europe seek out. The Wittelsbach court has become a magnet for artists, philosophers, and men of learning. Munich is no longer merely the capital of a German duchy — it is becoming a European cultural center in its own right. Shall we focus on building Munich into a true academy city, drawing the finest minds to our court? Or shall we extend the Wittelsbach diplomatic network, weaving alliances and dynastic ties across the continent?"
 nd_bav.10.a: "Munich shall be an academy for all Europe."
 nd_bav.10.b: "Extend the Wittelsbach web of alliances."
 nd_bav.11.t: "The Wittelsbach Zenith"
 nd_bav.11.d: "The Wittelsbach dynasty has reached its apex. A treasury overflowing with gold, a realm of unmatched prestige and development, mastery of global trade networks — Bavaria has transcended its origins as a frontier duchy to become one of Europe's great powers through culture, diplomacy, and economic might rather than conquest alone. King Ludwig's vision of Munich as the 'Athens on the Isar' is no longer a dream but a reality. The Glyptothek and Pinakothek stand as monuments to a civilization that chose to build rather than destroy. Shall we crown this achievement with a golden age of arts and urban splendor, or pursue a grand dynastic vision that reshapes the political map of Europe?"
 nd_bav.11.a: "Let Munich become the Athens on the Isar."
 nd_bav.11.b: "The Wittelsbach vision shall reshape Europe."
 STATIC_MODIFIER_NAME_nd_bav_dest_tilly_hammer: "Tilly's Hammer"
 STATIC_MODIFIER_DESC_nd_bav_dest_tilly_hammer: "The army has been forged into an instrument of devastating efficiency, trained in the methods of the great Count Tilly — rapid recruitment and relentless morale, though the cost of such a war machine strains the treasury."
 STATIC_MODIFIER_NAME_nd_bav_dest_league_banner: "League Banner"
 STATIC_MODIFIER_DESC_nd_bav_dest_league_banner: "Under the banner of the Catholic League, Bavaria's armies reinforce swiftly and fight with the fury of men who believe God is on their side."
 STATIC_MODIFIER_NAME_nd_bav_dest_catholic_imperium: "Catholic Imperium"
 STATIC_MODIFIER_DESC_nd_bav_dest_catholic_imperium: "A vast network of fortresses secures Bavaria's Catholic empire, with supply lines stretching across Central Europe — though diplomatic finesse has been sacrificed for military dominion."
 STATIC_MODIFIER_NAME_nd_bav_dest_white_mountain: "White Mountain Doctrine"
 STATIC_MODIFIER_DESC_nd_bav_dest_white_mountain: "The doctrine of swift, decisive warfare — as practiced at the Battle of White Mountain — allows Bavaria to press claims rapidly and negotiate from strength, though domestic construction suffers from the military focus."
 STATIC_MODIFIER_NAME_nd_bav_dest_munich_academy: "Munich Academy"
 STATIC_MODIFIER_DESC_nd_bav_dest_munich_academy: "Munich's academies and salons draw scholars and artists from across Europe, spreading Bavarian cultural influence and assimilating new populations into the Wittelsbach fold."
 STATIC_MODIFIER_NAME_nd_bav_dest_wittelsbach_network: "Wittelsbach Network"
 STATIC_MODIFIER_DESC_nd_bav_dest_wittelsbach_network: "The Wittelsbach diplomatic network spans the continent, binding allies and subjects to Bavaria through marriage, treaty, and mutual obligation — though maintaining such a web leaves less coin for hired swords."
 STATIC_MODIFIER_NAME_nd_bav_dest_athens_on_isar: "Athens on the Isar"
 STATIC_MODIFIER_DESC_nd_bav_dest_athens_on_isar: "Munich has become the Athens on the Isar — a city of magnificent architecture, efficient administration, and cultural splendor, though the scholarly court has little patience for military logistics."
 STATIC_MODIFIER_NAME_nd_bav_dest_ludwig_vision: "Ludwig's Vision"
 STATIC_MODIFIER_DESC_nd_bav_dest_ludwig_vision: "King Ludwig's grand vision of a prosperous, stable, self-sufficient Bavaria has been realized — a realm where separatism is unknown and the people are well-fed, though the nation's pacifist reputation makes war a costly endeavor."
 nd_bav_mariensaule: "Mariensaule"
 nd_bav_mariensaule_desc: "A towering Marian column erected in the heart of the city, proclaiming Bavaria's devotion to the Virgin Mary and its triumph over heresy, plague, and foreign invasion."
 nd_bav_marian_devotion: "Marian Devotion"
 nd_bav_marian_devotion_desc: "The regular observances and processions around the Mariensaule require beeswax for candles, stone for maintenance, and cloth for vestments and banners."
 nd_bav_glyptothek: "Glyptothek"
 nd_bav_glyptothek_desc: "A neoclassical museum housing a magnificent collection of Greek and Roman sculpture, embodying King Ludwig I's vision of Munich as the cultural capital of Europe."
 nd_bav_sculpture_collection: "Sculpture Collection"
 nd_bav_sculpture_collection_desc: "Maintaining the Glyptothek's collection of classical sculpture requires stone for repairs, paper for catalogues, and glass for display cases."
