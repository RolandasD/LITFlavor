l_english:
 STATIC_MODIFIER_NAME_nd_ryu_bridge_of_nations: "Bankoku Shinryo"
 STATIC_MODIFIER_DESC_nd_ryu_bridge_of_nations: "The Ryukyu Kingdom declares itself the Bridge Between All Nations, a maritime crossroads connecting the great civilizations of East and Southeast Asia through trade, diplomacy, and cultural exchange."
 STATIC_MODIFIER_NAME_nd_ryu_sovereignty_of_isles: "Sovereignty of the Isles"
 STATIC_MODIFIER_DESC_nd_ryu_sovereignty_of_isles: "Under the iron hand of the Sho dynasty, the islands are welded into a unified kingdom with a distinct cultural identity, its warriors trained in the art of Te and its fortresses commanding every approach."
 STATIC_MODIFIER_NAME_nd_ryu_unified_kingdom: "Unified Kingdom of Chuzan"
 STATIC_MODIFIER_DESC_nd_ryu_unified_kingdom: "The three warring kingdoms have been united under a single throne at Shuri, bringing centralized governance and legitimacy to the Ryukyu Islands."
 STATIC_MODIFIER_NAME_nd_ryu_island_confederation: "Island Confederation"
 STATIC_MODIFIER_DESC_nd_ryu_island_confederation: "Though united in name, the kingdom preserves the autonomy of its constituent domains, fostering cooperation and prosperity through consensus rather than coercion."
 STATIC_MODIFIER_NAME_nd_ryu_island_defiance: "Island Defiance"
 STATIC_MODIFIER_DESC_nd_ryu_island_defiance: "The people of the Ryukyu Islands channel their suffering into fierce resistance, developing new martial traditions from the very tools of their daily labor."
 STATIC_MODIFIER_NAME_nd_ryu_pragmatic_survival: "Pragmatic Survival"
 STATIC_MODIFIER_DESC_nd_ryu_pragmatic_survival: "Unable to match foreign military power, the kingdom turns to cunning — maintaining its trade networks, intelligence apparatus, and diplomatic connections to preserve what sovereignty it can."
 nd_ryu.1.t: "The Kingdom of Ryukyu"
 nd_ryu.1.d: "The islands are united under one crown. From the coral harbors of Naha to the stone ramparts of Nakijin, the Ryukyu archipelago speaks with a single voice for the first time. Ships bearing the royal standard already call at ports from Siam to Korea, from Malacca to Ningbo. The question before us now is what kind of kingdom we shall build.\n\nShall Ryukyu embrace its destiny as the Bankoku Shinryo — the Bridge Between All Nations — opening its harbors to every wind and every people, growing wealthy as the indispensable intermediary of the Eastern seas? Or shall we forge the islands into a sovereign fortress-kingdom, cultivating our own martial traditions and cultural identity, beholden to no foreign power?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ryu.1.a: "We are the Bridge Between All Nations."
 nd_ryu.1.b: "These islands bow to no foreign throne."
 nd_ryu.2.t: "The Three Kingdoms United"
 nd_ryu.2.d: "In 1429, Sho Hashi completed what his father Sho Shisho had begun — the unification of the three rival kingdoms of Okinawa. Hokuzan, the northern mountain kingdom centered on Nakijin Castle, fell first in 1416. Nanzan, the southern domain based at Shimajiri-Oozato, submitted thirteen years later. The central kingdom of Chuzan, with its magnificent Shuri Castle remodeled after the Forbidden City itself, now commands the entire island.\n\nSho Hashi has adopted the Chinese hierarchical court system and established Naha as the kingdom's great harbor. The Ming Emperor has recognized his authority with an investiture seal. But how shall this new kingdom be governed?"
 nd_ryu.2.a: "One throne, one law, one kingdom."
 nd_ryu.2.b: "Let each domain keep its customs within the whole."
 nd_ryu.3.t: "The Bankoku Shinryo Bell"
 nd_ryu.3.d: "A great bronze bell has been cast and hung at Shuri Castle, bearing an inscription that will define the kingdom for centuries to come. It reads: 'Ryukyu is a magnificent country in the South Seas, gathering the finest essence of the three kingdoms of Korea, China, and Japan. Ryukyu is the Bridge Between All Nations, and its ships are filled with the precious products of all lands.'\n\nThe Bankoku Shinryo — the Bridge Between All Nations — is more than a boast. It is a declaration of purpose. While great empires build walls and raise armies, this small island kingdom has found its power in the space between civilizations, carrying silk from China, swords from Japan, spices from Siam, and horses from Korea across the great ocean highways."
 nd_ryu.3.a: "Let the bell ring across the seas."
 nd_ryu.4.t: "The Great Days of Chuzan"
 nd_ryu.4.d: "King Sho Shin ascended the throne in 1477 and inaugurated what chroniclers would call the Great Days of Chuzan — the golden age of the Ryukyu Kingdom. His reign transformed the islands from a loose collection of feudal domains into a true centralized state.\n\nThe aji, the feudal lords, were compelled to leave their castles and reside in the capital at Shuri, where the king could watch them. Their weapons were collected and stored in the royal armory — not destroyed, but concentrated under the crown's control. The hiki system was reorganized into a disciplined force with military, police, and administrative duties.\n\nBeyond these political reforms, Sho Shin patronized the arts with extraordinary generosity. The Sonohyan Utaki stone gate was erected as a sacred site of prayer before the king's journeys. Bingata dyeing and Ryukyuan lacquerware reached heights of sophistication that impressed even the refined courts of Beijing and Kyoto."
 nd_ryu.4.a: "A golden age for the ages."
 nd_ryu.5.t: "The Birth of Kobudo"
 nd_ryu.5.d: "In the wake of the Satsuma invasion of 1609, the warriors of Ryukyu found themselves disarmed and subjugated. The Satsuma domain imposed strict bans on the possession of weapons, seeking to prevent any possibility of rebellion. But the spirit of the Ryukyuan warrior could not be so easily suppressed.\n\nFarmers, fishermen, and commoners adapted the tools of their daily labor into instruments of war. The bo staff evolved from walking sticks and carrying poles. The sai emerged from modified animal prods. The tonfa came from millstone handles. The nunchaku from grain flails. The kama from harvesting sickles. The ekku from boat oars.\n\nIn secret, the traditions of Te — the indigenous martial art of the Ryukyuan aristocracy — merged with these improvised weapon techniques to create something entirely new: Kobudo, the ancient martial way. Trained in darkness, passed from master to student in absolute secrecy, this tradition would eventually give birth to karate itself."
 nd_ryu.5.a: "We will never be truly conquered."
 nd_ryu.5.b: "Survival demands more than fighting spirit."
 nd_ryu.6.t: "The Schools of Te"
 nd_ryu.6.d: "Over generations, the martial traditions of the Ryukyu Islands have crystallized into distinct schools, each reflecting the character of its place of origin. Shuri-te, practiced by the aristocracy in the shadow of the royal castle, emphasizes speed, agility, and decisive strikes. Naha-te, born in the commercial port city, favors close-quarters power and breathing techniques drawn from Chinese kung fu. Tomari-te, from the fishing village between them, blends elements of both.\n\nThese styles are no longer merely techniques of self-defense — they have become a philosophical discipline, a way of understanding the body, the mind, and the relationship between them. Masters codify their knowledge into kata — precise forms that encode combat wisdom in movements that can be practiced openly without revealing their martial purpose."
 nd_ryu.6.a: "The hand is mightier than the sword."
 nd_ryu_gusuku_architecture: "Gusuku Architecture"
 nd_ryu_gusuku_architecture_desc: "The distinctive curved-wall stone fortresses of the Ryukyu Islands, blending Chinese, Japanese, and indigenous construction techniques into uniquely resilient defensive works."
 nd_ryu_noro_priestesses: "Noro Priestesses"
 nd_ryu_noro_priestesses_desc: "The female spiritual leaders who preside over the sacred utaki groves and maintain the spiritual health of Ryukyuan communities through prayer and ritual."
 nd_ryu_early_te: "The Art of Te"
 nd_ryu_early_te_desc: "The indigenous fighting system of the Ryukyuan aristocracy, emphasizing unarmed combat techniques that will eventually evolve into karate."
 nd_ryu_island_fisheries: "Island Fisheries"
 nd_ryu_island_fisheries_desc: "Organized coastal fishing communities that sustain the island population and train the seafarers who will crew the kingdom's merchant fleet."
 nd_ryu_seafaring_tradition: "Ryukyuan Seafaring"
 nd_ryu_seafaring_tradition_desc: "Centuries of ocean navigation between the scattered islands of the Ryukyu chain, building the seamanship that underpins the kingdom's maritime trade."
 nd_ryu_sho_hashi_unification: "Sho Hashi's Unification"
 nd_ryu_sho_hashi_unification_desc: "The merger of the three rival Okinawan kingdoms — Hokuzan, Chuzan, and Nanzan — under a single crown at Shuri Castle in 1429."
 nd_ryu_entrepot_network: "Entrepot Trade Network"
 nd_ryu_entrepot_network_desc: "The kingdom's role as maritime intermediary, re-exporting goods between China, Japan, Korea, and Southeast Asia from its central position in the East China Sea."
 nd_ryu_lacquerware_craft: "Ryukyuan Lacquerware"
 nd_ryu_lacquerware_craft_desc: "Luxury lacquerwork so refined that Ming envoys traveled to Ryukyu specifically to purchase it, combining Chinese techniques with distinctive Okinawan aesthetics."
 nd_ryu_naha_harbor: "Naha Harbor"
 nd_ryu_naha_harbor_desc: "The development of Naha as the kingdom's primary port, equipped to service the trading junks that connect Ryukyu to every major port in East Asia."
 nd_ryu_tribute_diplomacy: "Tribute Diplomacy"
 nd_ryu_tribute_diplomacy_desc: "Mastery of the Ming tributary system, securing preferential trade access and imperial recognition through careful diplomatic cultivation."
 nd_ryu_golden_age: "Great Days of Chuzan"
 nd_ryu_golden_age_desc: "The golden age under King Sho Shin, when the aji lords were brought to Shuri, weapons were centralized, and the arts flourished under royal patronage."
 nd_ryu_bingata_tradition: "Bingata Tradition"
 nd_ryu_bingata_tradition_desc: "The royal textile dyeing art unique to Okinawa, synthesizing Indian, Chinese, and Javanese techniques into vivid floral patterns reserved for the aristocracy."
 nd_ryu_tsuboya_pottery: "Tsuboya Pottery"
 nd_ryu_tsuboya_pottery_desc: "Consolidated ceramic production at the Tsuboya district, unifying scattered kilns into an efficient center for both domestic wares and export pottery."
 nd_ryu_awamori_craft: "Awamori Distillation"
 nd_ryu_awamori_craft_desc: "The traditional Ryukyuan spirit distilled from Thai rice using black koji mold, a technique brought from Siam through the kingdom's trade networks."
 nd_ryu_maransen_fleet: "Maransen Fleet"
 nd_ryu_maransen_fleet_desc: "Fast, maneuverable trading junks purpose-built for the East Asian maritime routes, carrying goods between Naha and every major port from Malacca to Ningbo."
 nd_ryu_bankoku_shinryo: "Bankoku Shinryo"
 nd_ryu_bankoku_shinryo_desc: "The Bridge Between All Nations — the declaration inscribed on the great bell of Shuri Castle, proclaiming Ryukyu's role as the maritime crossroads of East Asia."
 nd_ryu_dual_sovereignty: "Dual Sovereignty"
 nd_ryu_dual_sovereignty_desc: "The delicate art of maintaining tributary relations with both China and Satsuma Japan simultaneously, preserving a measure of autonomy through diplomatic ambiguity."
 nd_ryu_kobudo_development: "Kobudo"
 nd_ryu_kobudo_development_desc: "The ancient martial way born from weapons bans, transforming farming tools and household implements into instruments of war — bo, sai, tonfa, nunchaku, kama."
 nd_ryu_satsuma_era_trade: "Satsuma-Era Trade"
 nd_ryu_satsuma_era_trade_desc: "Under Satsuma oversight, the kingdom paradoxically expanded its trade networks, as the domain encouraged Ryukyu-China commerce to conduct indirect Japan-China trade."
 nd_ryu_convoy_protection: "Trade Convoy Protection"
 nd_ryu_convoy_protection_desc: "Patrol vessels defending the kingdom's merchant fleets against pirates in the East China Sea, documented as late as the turn of the 19th century."
 nd_ryu_island_defense: "Island Chain Defense"
 nd_ryu_island_defense_desc: "Distributed fortification across the archipelago, leveraging the natural defensive advantages of island geography against any would-be invader."
 nd_ryu_pechin_administration: "Pechin Bureaucracy"
 nd_ryu_pechin_administration_desc: "The administrative class that governed Ryukyu during the centuries of dual sovereignty, maintaining efficient island governance despite foreign overlordship."
 nd_ryu_performing_arts: "Ryukyuan Performing Arts"
 nd_ryu_performing_arts_desc: "The refined court traditions of Kumiodori dance-drama, sanshin music, and classical poetry that define Okinawan cultural identity."
 nd_ryu_sugar_cultivation: "Sugar Cultivation"
 nd_ryu_sugar_cultivation_desc: "Organized sugar cane production introduced from China, becoming a major export commodity that sustained the kingdom's economy in later centuries."
 nd_ryu_maritime_heritage: "Maritime Heritage"
 nd_ryu_maritime_heritage_desc: "Centuries of unbroken seafaring tradition, from the earliest inter-island voyages to the great trading expeditions of the golden age, passed down through generations."
 nd_ryu_karate_codification: "Karate Codification"
 nd_ryu_karate_codification_desc: "The systematization of the Te fighting styles into formal schools — Shuri-te, Naha-te, and Tomari-te — each encoding generations of combat wisdom into codified kata."
 nd_ryu_okinawan_identity: "Okinawan Identity"
 nd_ryu_okinawan_identity_desc: "The assertion of a distinct Ryukyuan cultural identity, neither Chinese nor Japanese but uniquely Okinawan, rooted in centuries of independent civilization."
 nd_ryu_meiji_resistance: "Meiji Resistance"
 nd_ryu_meiji_resistance_desc: "Defiance against forced annexation and cultural assimilation, as the Ryukyuan people struggle to preserve their language, customs, and sovereignty."
 nd_ryu_modern_crafts: "Modern Crafts Revival"
 nd_ryu_modern_crafts_desc: "The adaptation of traditional Ryukyuan crafts — lacquerware, bingata textiles, Tsuboya pottery — for modern markets while preserving ancestral techniques."
 nd_ryu_maritime_legacy: "Maritime Legacy"
 nd_ryu_maritime_legacy_desc: "The culmination of centuries of Ryukyuan seafaring knowledge, from coral reef navigation to open ocean passage, sustaining the islands' connection to the wider world."
 n_nd_ryu_maransen: "Maransen"
 n_nd_ryu_maransen_desc: "Fast Ryukyuan trading junks optimized for the East Asian maritime routes, combining Chinese shipbuilding techniques with local seamanship."
 a_nd_ryu_kobudo_militia: "Kobudo Militia"
 a_nd_ryu_kobudo_militia_desc: "Fighters armed with improvised weapons — bo, sai, tonfa, nunchaku — born from the weapons bans that forced the Ryukyuan people to transform everyday tools into instruments of war."
 n_nd_ryu_umibune: "Umibune"
 n_nd_ryu_umibune_desc: "Ryukyuan patrol vessels designed to protect the kingdom's trade convoys against pirates in the East China Sea."
 n_nd_ryu_patrol_junk: "Patrol Junk"
 n_nd_ryu_patrol_junk_desc: "Lighter Ryukyuan vessels mobilized through the levy system for coastal defense and anti-piracy operations."
 nd_ryu_trading_house: "Ryukyuan Trading House"
 nd_ryu_trading_house_desc: "A commercial warehouse and brokerage serving the kingdom's entrepot trade, facilitating the exchange of goods between Chinese, Japanese, Korean, and Southeast Asian merchants."
 nd_ryu_utaki: "Utaki Shrine"
 nd_ryu_utaki_desc: "Sacred groves and prayer sites presided over by Noro priestesses, the spiritual heart of Ryukyuan communities where prayers are offered for good harvests and safe voyages."
 nd_ryu_bingata_workshop: "Bingata Workshop"
 nd_ryu_bingata_workshop_desc: "A royal textile workshop producing the vibrant dyed fabrics unique to the Ryukyu Kingdom, with patterns reserved for different ranks of the aristocracy."
 nd_ryu_lacquerware_workshop: "Lacquerware Workshop"
 nd_ryu_lacquerware_workshop_desc: "A workshop producing the exquisite Ryukyuan lacquerware prized throughout East Asia, combining multiple coats of lacquer with intricate decorative techniques."
 nd_ryu_tsuboya_kiln: "Tsuboya Kiln"
 nd_ryu_tsuboya_kiln_desc: "A consolidated pottery production center in the Tsuboya tradition, firing both functional domestic wares and the large storage jars used for aging awamori."
 nd_ryu_awamori_distillery: "Awamori Distillery"
 nd_ryu_awamori_distillery_desc: "A distillery producing the traditional Ryukyuan spirit from Thai rice and black koji mold, aged in clay pots to develop its distinctive flavor."
 nd_ryu_gusuku: "Gusuku Fortress"
 nd_ryu_gusuku_desc: "A distinctive Ryukyuan stone fortress with gracefully curving walls, combining the defensive principles of Chinese and Japanese military architecture with indigenous construction techniques."
 nd_ryu_harbor: "Ryukyuan Harbor"
 nd_ryu_harbor_desc: "Improved port facilities designed to service the trading junks that connect the Ryukyu Kingdom to every major port in East and Southeast Asia."
 nd_ryu_karate_dojo: "Karate Dojo"
 nd_ryu_karate_dojo_desc: "A training hall where the systematized martial arts of Shuri-te, Naha-te, and Tomari-te are taught, producing disciplined fighters from the island population."
 nd_ryu_sugar_mill: "Ryukyuan Sugar Mill"
 nd_ryu_sugar_mill_desc: "A facility for processing sugar cane into refined sugar, a crop introduced from China that became one of the kingdom's most valuable exports."
 nd_ryu_fishing_settlement: "Ryukyuan Fishing Settlement"
 nd_ryu_fishing_settlement_desc: "An organized coastal fishing community providing both sustenance and maritime training for the island population."
 nd_ryu_gusuku_maintenance: "Gusuku Maintenance"
 nd_ryu_gusuku_maintenance_desc: "The upkeep of the fortress's distinctive curved stone walls."
 nd_ryu_entrepot_operations: "Entrepot Operations"
 nd_ryu_entrepot_operations_desc: "Managing the flow of goods through the trading house from multiple trading partners."
 nd_ryu_shrine_offerings: "Shrine Offerings"
 nd_ryu_shrine_offerings_desc: "Rice and other offerings presented at the utaki shrine by the Noro priestesses."
 nd_ryu_bingata_dyeing: "Bingata Dyeing"
 nd_ryu_bingata_dyeing_desc: "Dyeing fine cloth using imported pigments and the distinctive Bingata stencil technique unique to the Ryukyu Kingdom."
 nd_ryu_lacquer_finishing: "Lacquer Finishing"
 nd_ryu_lacquer_finishing_desc: "Producing export-quality lacquerware through painstaking application of multiple lacquer coats and decorative techniques."
 nd_ryu_ceramics_firing: "Ceramics Firing"
 nd_ryu_ceramics_firing_desc: "Firing clay into pottery at consolidated kilns in the Tsuboya tradition."
 nd_ryu_spirit_distillation: "Spirit Distillation"
 nd_ryu_spirit_distillation_desc: "Distilling Thai rice with black koji mold to produce awamori, the traditional Ryukyuan spirit."
 nd_ryu_harbor_maintenance: "Harbor Maintenance"
 nd_ryu_harbor_maintenance_desc: "Upkeep of port facilities, docks, and navigational aids."
 nd_ryu_dojo_upkeep: "Dojo Upkeep"
 nd_ryu_dojo_upkeep_desc: "Maintenance of the training hall and provisions for martial arts students."
 nd_ryu_cane_processing: "Cane Processing"
 nd_ryu_cane_processing_desc: "Crushing, boiling, and refining sugar cane into exportable sugar."
 nd_ryu_fishing_nets: "Fishing Operations"
 nd_ryu_fishing_nets_desc: "Organized coastal fishing using nets, lines, and traditional techniques to supply the island communities."
 levy_nd_ryu_kobudo_militia: "Kobudo Militia Levy"
 levy_nd_ryu_kobudo_militia_desc: "Ryukyuan peasant militia armed with improvised weapons drawn from farming and fishing implements."
 levy_nd_ryu_patrol_junk: "Patrol Junk Levy"
 levy_nd_ryu_patrol_junk_desc: "Coastal defense vessels raised from the merchant communities of the Ryukyu Islands."
 nd_ryu_formed_tt: "Ryukyu has been formed"
 nd_ryu_path_a_tt: "Chose Bankoku Shinryo"
 nd_ryu_path_b_tt: "Chose Sovereignty of the Isles"
 nd_ryu_destiny: "Destiny of the Ryukyu Kingdom"
 nd_ryu_destiny_desc: "The islands are united, the harbors teem with ships, and the world beckons. Whether as the Bridge Between Nations or as a sovereign fortress-kingdom, Ryukyu's destiny is ours to forge."
 nd_ryu_dest_eastern_hub: "Eastern Trade Hub"
 nd_ryu_dest_eastern_hub_desc: "Secure control of the Japanese trade gateway at Hakata and ensure silk flows through the Ryukyuan capital market. Reach 1,000 gold to fund the expansion of the entrepot network."
 nd_ryu_dest_sea_dominance: "Dominion of the Eastern Seas"
 nd_ryu_dest_sea_dominance_desc: "The great ports of Malacca and Guangzhou must fall under Ryukyuan influence. With 2,000 gold in the treasury and the prestige of a maritime power, the kingdom commands the sea lanes of East Asia."
 nd_ryu_dest_bridge_nations: "The True Bankoku Shinryo"
 nd_ryu_dest_bridge_nations_desc: "The ultimate realization of the Bridge Between All Nations. Control Temasek, Tondo, and Quanzhou's great port at Jinjiang. Amass 3,000 gold, earn the highest prestige, and embrace the institution of Banking to become the indispensable crossroads of global trade."
 nd_ryu_dest_satsuma_revenge: "Revenge upon Satsuma"
 nd_ryu_dest_satsuma_revenge_desc: "The humiliation of Satsuma's invasion will be repaid in kind. Seize Kagoshima, the seat of the Shimazu, with an army of at least 30,000 men and the stability to sustain a war of liberation."
 nd_ryu_dest_island_power: "Island Chain Dominion"
 nd_ryu_dest_island_power_desc: "Extend Ryukyuan sovereignty over the entire island chain from Amami Oshima to Tsushima. Field an army of 50,000 and maintain a treasury of 2,000 gold to project power across the straits."
 nd_ryu_dest_shuri_ascendant: "Shuri Ascendant"
 nd_ryu_dest_shuri_ascendant_desc: "The ultimate assertion of Ryukyuan sovereignty. Conquer Osaka and Kyoto -- the commercial and imperial hearts of Japan itself. Field 75,000 men, hold 3,000 gold, and earn the prestige befitting a continental power."
 nd_ryu.7.t: "A Kingdom's Destiny"
 nd_ryu.7.d: "The Kingdom of Ryukyu stands at a crossroads. The islands are united, the harbors are full, and the world watches to see what this small but proud kingdom will become. The path we have chosen will define us for generations -- whether we reach outward to embrace the world's trade, or turn inward to forge an unbreakable island nation, the destiny of Ryukyu begins now."
 nd_ryu.7.a: "Our destiny awaits."
 nd_ryu.8.t: "Gateway to Japan"
 nd_ryu.8.d: "Ryukyuan merchants now control the port of Hakata, the great gateway to Japanese trade. Ships bearing the royal standard dock alongside Chinese junks and Korean vessels, and silk from the continent flows freely through our warehouses. The entrepot network that has sustained Ryukyu for centuries now reaches into the heart of its largest market. The merchants of Naha celebrate -- but the seas beyond beckon with even greater prizes."
 nd_ryu.8.a: "The eastern trade is ours."
 nd_ryu.9.t: "Masters of the Eastern Seas"
 nd_ryu.9.d: "From the Strait of Malacca to the Pearl River Delta, the Ryukyuan trade network spans the breadth of maritime Asia. Guangzhou's silk and porcelain, Malacca's spices and tin -- all pass through Ryukyuan hands. No merchant fleet sails these waters without reckoning with the kingdom that sits at their crossroads.\n\nShall we assert our dominance through naval supremacy, protecting our routes with warships that command respect? Or shall we build a network of tributary partners, binding lesser states to our commercial empire through diplomacy and mutual dependence?"
 nd_ryu.9.a: "Our warships shall rule these waters."
 nd_ryu.9.b: "Bind them to us through trade and tribute."
 nd_ryu.10.t: "The Bridge Between All Nations"
 nd_ryu.10.d: "What the bell of Shuri Castle proclaimed centuries ago has at last become reality. From Temasek at the tip of the Malay Peninsula to Tondo in the Philippine archipelago, from Quanzhou's ancient harbor to the spice islands beyond -- Ryukyuan ships connect every corner of the maritime world. The kingdom that once counted its wealth in coral and shellfish now holds the keys to global commerce.\n\nShall we consolidate this position as the world's indispensable crossroads, drawing all trade through our harbors? Or shall we leverage our connections to become the supreme diplomatic power of the eastern seas, mediating between empires?"
 nd_ryu.10.a: "All roads of the sea lead through Ryukyu."
 nd_ryu.10.b: "We shall be the arbiter of the oceans."
 nd_ryu.11.t: "The Fall of Satsuma"
 nd_ryu.11.d: "Kagoshima burns. The great castle of the Shimazu, from which the invasion of 1609 was launched, now flies the banner of the Sho dynasty. For two centuries, the people of the Ryukyu Islands endured subjugation, their weapons confiscated, their sovereignty a polite fiction maintained for Chinese trade. No more. The martial traditions born in secret -- the kobudo, the karate, the fierce island spirit that no occupier could crush -- have been vindicated on the battlefield. Satsuma has reaped what it sowed."
 nd_ryu.11.a: "The shame of 1609 is avenged."
 nd_ryu.12.t: "Lords of the Island Chain"
 nd_ryu.12.d: "The Ryukyuan kingdom now stretches from the subtropical waters around Sakishima to the cold straits of Tsushima. Every island between Okinawa and the Japanese mainland acknowledges the authority of Shuri. The question now is how to consolidate this far-flung island domain.\n\nShall we fortify every harbor and headland, making the archipelago an impregnable chain of island fortresses? Or shall we mobilize the warrior spirit of the island population, transforming every fisherman and farmer into a soldier ready to defend the realm?"
 nd_ryu.12.a: "Every island shall be a fortress."
 nd_ryu.12.b: "Every islander shall be a warrior."
 nd_ryu.13.t: "The Throne of Shuri Commands the Mainland"
 nd_ryu.13.d: "The impossible has been achieved. Osaka, the great commercial metropolis of Japan, and Kyoto, the seat of the imperial court itself, now answer to the Kingdom of Ryukyu. A tiny island nation, once dismissed as a vassal state fit only for tribute trade, has conquered the heartland of one of the world's great civilizations. The martial arts born from oppression -- the empty-handed fighting styles, the weaponized farming tools, the fierce spirit of an unconquerable people -- have carried the banner of Shuri to heights no one dared imagine.\n\nShall we press onward in conquest, or consolidate our island empire into an unassailable fortress?"
 nd_ryu.13.a: "Let no land be beyond our reach."
 nd_ryu.13.b: "Fortify what we have won."
 STATIC_MODIFIER_NAME_nd_ryu_dest_naval_supremacy: "Naval Supremacy"
 STATIC_MODIFIER_DESC_nd_ryu_dest_naval_supremacy: "Ryukyuan warships patrol the trade routes of East Asia, ensuring safe passage for the kingdom's merchant fleet and deterring any who would challenge its maritime dominance."
 STATIC_MODIFIER_NAME_nd_ryu_dest_tributary_network: "Tributary Network"
 STATIC_MODIFIER_DESC_nd_ryu_dest_tributary_network: "A web of trade dependencies and diplomatic relationships binds lesser states to Ryukyu's commercial empire, though maintaining this network strains the kingdom's military budget."
 STATIC_MODIFIER_NAME_nd_ryu_dest_world_crossroads: "Crossroads of the World"
 STATIC_MODIFIER_DESC_nd_ryu_dest_world_crossroads: "Ryukyu has become the indispensable nexus of global maritime trade, a position that attracts settlers, merchants, and scholars from every corner of the known world."
 STATIC_MODIFIER_NAME_nd_ryu_dest_ocean_diplomacy: "Ocean Diplomacy"
 STATIC_MODIFIER_DESC_nd_ryu_dest_ocean_diplomacy: "The maritime kingdom's unmatched network of diplomatic connections allows it to mediate between empires, secure favorable terms, and project influence far beyond its island shores."
 STATIC_MODIFIER_NAME_nd_ryu_dest_fortress_islands: "Fortress Islands"
 STATIC_MODIFIER_DESC_nd_ryu_dest_fortress_islands: "Every harbor and headland in the island chain has been fortified in the gusuku tradition, creating an impregnable defensive network that deters invasion and crushes rebellion."
 STATIC_MODIFIER_NAME_nd_ryu_dest_warrior_mobilization: "Warrior Mobilization"
 STATIC_MODIFIER_DESC_nd_ryu_dest_warrior_mobilization: "The martial traditions of kobudo and karate have been systematized into a national mobilization doctrine, training every able-bodied islander to reinforce the kingdom's armies at need."
 STATIC_MODIFIER_NAME_nd_ryu_dest_island_conquest: "Island Conquest"
 STATIC_MODIFIER_DESC_nd_ryu_dest_island_conquest: "The kingdom's armies march with the fierce determination of an island people who refused to be conquered, carrying the martial traditions of Ryukyu to the mainland -- though naval readiness suffers as resources flow to land campaigns."
 STATIC_MODIFIER_NAME_nd_ryu_dest_island_fortification: "Island Fortification"
 STATIC_MODIFIER_DESC_nd_ryu_dest_island_fortification: "The hard-won conquests are secured through rapid fortification and mobilization, transforming every new territory into another link in the island kingdom's impregnable chain."
 nd_ryu_grand_entrepot: "Grand Entrepot"
 nd_ryu_grand_entrepot_desc: "The ultimate expression of Ryukyu's role as the Bridge Between All Nations -- a vast trading complex where goods from every corner of maritime Asia are stored, graded, and re-exported across the world."
 nd_ryu_shuri_citadel: "Shuri Citadel"
 nd_ryu_shuri_citadel_desc: "A magnificent fortress-palace in the tradition of the great gusuku, seat of the Sho dynasty's martial sovereignty over an island empire that now commands respect from continental powers."
 nd_ryu_entrepot_administration: "Entrepot Administration"
 nd_ryu_entrepot_administration_desc: "Managing the vast warehousing and brokerage operations of the grand trading complex."
 nd_ryu_citadel_garrison: "Citadel Garrison"
 nd_ryu_citadel_garrison_desc: "Maintaining the fortress-palace garrison and its stores of weapons and provisions."
