l_english:
 STATIC_MODIFIER_NAME_nd_rom_imperium_restitutum: "Imperium Romanum Restitutum"
 STATIC_MODIFIER_DESC_nd_rom_imperium_restitutum: "The Roman Empire has been restored not as an idea, but as a reality of steel and law. From the seven hills of Rome, the eagles fly once more over a dominion that stretches from ocean to ocean. The legions march again — disciplined, relentless, irresistible — and the world remembers what it means to defy Rome. Universal law binds every province to the center, and the authority of the Imperator brooks no dissent."
 STATIC_MODIFIER_NAME_nd_rom_lux_aeterna: "Lux Aeterna"
 STATIC_MODIFIER_DESC_nd_rom_lux_aeterna: "Rome endures not because of her legions, but because of what she represents. To be Roman is to be civilized — to know law, to value learning, to build roads and aqueducts that outlast the ages. This restored empire does not merely conquer; it transforms. Every people it touches is given the gift of Roman civilization, and in return, Rome absorbs what is best in them. The eternal light of the Caput Mundi illuminates the world."
 nd_rom.1.t: "SPQR: Senatus Populusque Romanus"
 nd_rom.1.d: "It is done. What centuries of ambition, blood, and devotion have labored toward is now manifest — the Roman Empire stands reborn. The ancient seat of the Caesars at Rome is ours. The walls of Constantinople bow to our standard. From the forums where Cicero spoke to the harbors where the grain ships once sailed, this dominion spans the known world.\n\nThe Senate and People of Rome — those ancient words, half-forgotten in the long darkness since the fall — ring out again through marble halls. Scholars weep. Soldiers kneel before the eagles. The common folk whisper that the prophecy has been fulfilled: Rome is eternal.\n\nBut a restored empire must choose its soul. The old Romans knew two paths to greatness, and the question that divided Caesar from Augustus, Trajan from Hadrian, now falls to us. Shall Rome rule through the irresistible force of its legions, imposing universal order through strength? Or shall Rome rule through the irresistible force of its civilization, making all peoples wish to call themselves Roman?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_rom.1.a: "The eagles shall darken every horizon."
 nd_rom.1.b: "Let the light of Rome illuminate every land."
 # ===== DESTINY LOCALIZATION =====

 # Variable tooltips
 nd_rom_formed_tt: "Roman Empire has been formed"
 nd_rom_path_a_tt: "Chose the #bold Imperium Romanum Restitutum#! destiny"
 nd_rom_path_b_tt: "Chose the #bold Lux Aeterna#! destiny"

 # Destiny Root
 nd_rom_destiny: "SPQR Restored"
 nd_rom_destiny_desc: "The Roman Empire stands reborn. Stabilize the realm and choose the path that will define this new Rome for the ages."

 # Path A — Imperium Romanum Restitutum
 nd_rom_dest_pax_imposita: "Pax Romana Imposita"
 nd_rom_dest_pax_imposita_desc: "Rome's peace is not given — it is imposed. Extend the eagles beyond the old frontiers. The holy cities of Arabia and the Germanic Rhine must bow to Roman authority."
 nd_rom_dest_limes_ultimus: "Limes Ultimus"
 nd_rom_dest_limes_ultimus_desc: "The old limes were a line of retreat. The new limes are a line of advance. Push the frontier to the heart of Russia and the highlands of Persia. Let the world know there is no land Rome cannot reach."
 nd_rom_dest_orbis_terrarum: "Orbis Terrarum"
 nd_rom_dest_orbis_terrarum_desc: "The inhabited world — the orbis terrarum — is Rome. From the green hills of Ireland to the bazaars of Samarkand, from the forests of Novgorod to the deserts of Arabia, no corner of the earth lies beyond the reach of the legions."

 # Path B — Lux Aeterna
 nd_rom_dest_renovatio_studii: "Renovatio Studii"
 nd_rom_dest_renovatio_studii_desc: "A renewal of learning. Rome's banking institutions and silk trade fund a new golden age of scholarship. The wealth of civilization, not the sword, will bind the world to Rome."
 nd_rom_dest_mare_mercator: "Mare Nostrum Mercator"
 nd_rom_dest_mare_mercator_desc: "The Mediterranean is truly 'our sea' once more — not as a Roman lake of warships, but as the greatest market the world has ever known. Roman printing presses spread knowledge as Roman ships spread goods."
 nd_rom_dest_caput_mundi: "Caput Mundi"
 nd_rom_dest_caput_mundi_desc: "The Head of the World. Rome is not merely a city or even an empire — it is the fountainhead of civilization itself. Scientific revolution flows from Roman academies. Every nation measures itself against the Roman standard."

 # Destiny Events
 nd_rom.2.t: "The Senate Convenes"
 nd_rom.2.d: "For the first time in over a thousand years, the Roman Senate convenes in its ancient chamber. The marble halls echo with deliberation as senators — drawn from every corner of this reborn empire — debate the future of Rome. The eagles have been raised. The question now is not whether Rome endures, but how it shall endure."
 nd_rom.2.a: "Roma Aeterna!"

 nd_rom.3.t: "Pax Romana Imposita"
 nd_rom.3.d: "The legions have crossed frontiers that even Trajan only dreamed of. The holy cities of Arabia have fallen. The Germanic tribes beyond the Rhine — those eternal thorns in Rome's side — have at last been brought to heel. Roman forts now stand where no Roman eagle has flown before. The first phase of the new conquest is complete, and the world takes notice: this is not a ceremonial restoration. This is Rome as it was always meant to be."
 nd_rom.3.a: "The eagles fly where they will."

 nd_rom.4.t: "Beyond the Old Frontiers"
 nd_rom.4.d: "The legions have achieved what no Roman army has done before. Moscow and Isfahan — cities that the ancient Romans never saw, never even imagined — now fly the Roman standard. The frontier stretches from the frozen forests of Russia to the sun-baked plateaus of Persia.\n\nBut such an empire demands a choice about how its soldiers are organized. Shall we maintain the old Roman tradition of a small, supremely disciplined professional army? Or shall we embrace the reality of our vast frontiers and expand the limitanei — the border garrison system — to defend every mile of the limes?"
 nd_rom.4.a: "Quality over quantity. Train the finest."
 nd_rom.4.b: "Expand the frontier garrisons."

 nd_rom.5.t: "The World is Rome"
 nd_rom.5.d: "It is done. From the green hills of Ireland to the ancient crossroads of Samarkand, from the frozen rivers of Novgorod to the burning sands of Arabia — all roads lead to Rome. The orbis terrarum, the circle of the known world, is Roman.\n\nPhilosophers debate whether this unprecedented dominion should be used to enforce a permanent peace, or whether Rome's nature demands eternal expansion. The legions await their orders."
 nd_rom.5.a: "Our strength guarantees eternal peace."
 nd_rom.5.b: "Rome's hunger can never be sated."

 nd_rom.6.t: "Renovatio Studii"
 nd_rom.6.d: "A new golden age of learning dawns. Roman banks fund the construction of great libraries and academies across the empire. Scholars from every province — Greek philosophers, Egyptian mathematicians, Persian astronomers — gather in Rome to share their knowledge. The silk that flows through Roman markets pays for manuscripts that will outlast empires. This is Rome's true gift to the world: not the sword, but the book."
 nd_rom.6.a: "Let knowledge be our greatest conquest."

 nd_rom.7.t: "The Roman Market"
 nd_rom.7.d: "The Mediterranean — Mare Nostrum — hums with commerce as it has not done since the height of the old empire. Roman trade routes stretch from the Atlantic to the Indian Ocean. The printing press, that most revolutionary of inventions, spreads Roman law, Roman knowledge, and Roman prices to every corner of the known world.\n\nThis unprecedented prosperity raises a question: shall Rome invest in its scholars and universities, building the most learned civilization the world has ever seen? Or shall it codify its commercial law, making Roman markets the standard against which all others are measured?"
 nd_rom.7.a: "Invest in scholars and universities."
 nd_rom.7.b: "Codify Roman commercial law."

 nd_rom.8.t: "Caput Mundi"
 nd_rom.8.d: "Rome is the head of the world — not through conquest, but through the irresistible force of civilization. The scientific revolution that reshapes the world flows from Roman academies. Every nation that wishes to be called civilized adopts Roman institutions, Roman law, Roman standards of learning.\n\nThis civilizational supremacy offers Rome a final choice. Shall it embrace universal humanism, making all peoples equal under Roman law regardless of creed? Or shall it extend its diplomatic network to make Rome the indispensable arbiter of all nations — an empire without end, bound not by force but by necessity?"
 nd_rom.8.a: "Universal humanism under Roman law."
 nd_rom.8.b: "An empire without end."

 # Timed modifier names and descriptions
 STATIC_MODIFIER_NAME_nd_rom_dest_praetorian_discipline: "Praetorian Discipline"
 STATIC_MODIFIER_DESC_nd_rom_dest_praetorian_discipline: "Rome's armies are trained to a standard of perfection that the ancient Praetorian Guard would envy. Fewer in number but unmatched in skill, these soldiers hold the frontiers through sheer professional excellence."
 STATIC_MODIFIER_NAME_nd_rom_dest_limitanei_expansion: "Limitanei Expansion"
 STATIC_MODIFIER_DESC_nd_rom_dest_limitanei_expansion: "The frontier garrison system has been massively expanded. Every mile of the limes is defended by settled soldier-farmers who know their territory intimately. Separatism withers where the legions stand watch."
 STATIC_MODIFIER_NAME_nd_rom_dest_pax_imperialis: "Pax Imperialis"
 STATIC_MODIFIER_DESC_nd_rom_dest_pax_imperialis: "The peace of Rome is absolute. No nation dares challenge an empire that stretches across the known world. Roman subjects are loyal because they know no alternative, and Rome's overwhelming strength makes resistance futile."
 STATIC_MODIFIER_NAME_nd_rom_dest_bellum_perpetuum: "Bellum Perpetuum"
 STATIC_MODIFIER_DESC_nd_rom_dest_bellum_perpetuum: "Rome is a machine of conquest that cannot be stopped. War feeds the treasury through plunder, and the treasury funds more war. The cycle is self-sustaining, though the constant campaigns drive prices ever upward."
 STATIC_MODIFIER_NAME_nd_rom_dest_collegium_doctorum: "Collegium Doctorum"
 STATIC_MODIFIER_DESC_nd_rom_dest_collegium_doctorum: "The great colleges of Rome are the envy of the world. Scholars from every nation seek admission, and the knowledge they produce drives unprecedented prosperity. The cost of maintaining these institutions means less coin for the legions."
 STATIC_MODIFIER_NAME_nd_rom_dest_lex_mercatoria: "Lex Mercatoria"
 STATIC_MODIFIER_DESC_nd_rom_dest_lex_mercatoria: "Roman commercial law — the Lex Mercatoria — is the standard by which all trade is conducted. Roman merchants enjoy unmatched advantages in every market, and Roman trade centers dominate the economic landscape."
 STATIC_MODIFIER_NAME_nd_rom_dest_universitas_romana: "Universitas Romana"
 STATIC_MODIFIER_DESC_nd_rom_dest_universitas_romana: "The Roman university system has achieved something unprecedented: a truly universal standard of learning and governance. Roman humanism teaches that all peoples are equal before the law, though this tolerance means less zeal for religious conversion."
 STATIC_MODIFIER_NAME_nd_rom_dest_imperium_sine_fine: "Imperium Sine Fine"
 STATIC_MODIFIER_DESC_nd_rom_dest_imperium_sine_fine: "Empire without end — the ancient prophecy is fulfilled, but through diplomacy rather than conquest. Rome is the indispensable nation, the arbiter of all disputes, the center of all alliances. The price of this diplomatic supremacy is a dilution of direct royal authority."

 # Building names and descriptions
 nd_rom_castra_aeterna: "Castra Aeterna"
 nd_rom_castra_aeterna_desc: "The eternal legionary fortress — a permanent military installation built to Roman engineering standards, garrisoned by professional soldiers who live and die on the frontier. These fortresses project Roman power across vast distances."
 nd_rom_forum_universale: "Forum Universale"
 nd_rom_forum_universale_desc: "A grand civic center combining marketplace, library, and academy in the Roman tradition. Here merchants trade under Roman law while scholars study in Roman universities, creating a hub of civilization that draws the world to Rome."

 # Production method names
 nd_rom_castra_maintenance: "Legionary Supply"
 nd_rom_castra_maintenance_desc: "Weapons, stone for walls, and tools for the engineers who keep the fortress operational."
 nd_rom_forum_maintenance: "Forum Administration"
 nd_rom_forum_maintenance_desc: "Paper for records, cloth for decoration, glass for windows, and marble for the colonnades."
