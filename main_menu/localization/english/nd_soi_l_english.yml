l_english:
 STATIC_MODIFIER_NAME_nd_pearl_of_the_indian_ocean: "Pearl of the Indian Ocean"
 STATIC_MODIFIER_DESC_nd_pearl_of_the_indian_ocean: "The ports of Mogadishu, Merca, and Barawa stand as jewels along the Benadir coast, their harbors thick with dhows carrying cloth, ivory, and spices to Arabia, India, and beyond. Somali merchants ride the monsoon winds with the confidence of generations, and foreign traders know that the wealth of the Indian Ocean flows through Somali hands."
 STATIC_MODIFIER_NAME_nd_lords_of_the_waters: "Lords of the Waters"
 STATIC_MODIFIER_DESC_nd_lords_of_the_waters: "The Ajuran legacy endures in the limestone wells and irrigation canals that make the arid interior bloom. He who controls the water controls the people — and the centralized administration that grew around these hydraulic works has forged a state stronger and more unified than its neighbors, capable of feeding armies and growing cities where others see only dust."
 nd_soi.1.t: "The Unification of Somalia"
 nd_soi.1.d: "From the ancient ports of Zeila and Berbera in the north to the storied harbors of Mogadishu and Merca along the Benadir coast, the Somali lands are united under a single banner. For centuries the Somali people have been traders and warriors, their dhows mastering the monsoon winds of the Indian Ocean, their horsemen ranging across the Horn of Africa. The Ajuran sultans built a hydraulic empire around the waters of the Jubba and Shabelle, while the merchants of Mogadishu minted their own coins and wove cloth prized from Egypt to India.\n\nNow the clans have come together. But what shall define this new nation — the outward reach of its merchants across the seas, or the inward strength of its waters and governance?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_soi.1.a: "We are the merchants of the monsoon."
 nd_soi.1.b: "We are the masters of the wells."
 nd_soi.2.t: "The Conquest of the Highlands"
 nd_soi.2.d: "In 1529, Imam Ahmad ibn Ibrahim al-Ghazi — known as Gurey, the Left-Handed — launched a campaign from the Adal Sultanate that would shake the foundations of Christian Abyssinia. Somali and Afar horsemen, armed with sabers from the markets of Zeila and Arabia, swept through the Ethiopian highlands in a series of devastating victories. Within a decade, three-quarters of the Ethiopian Empire lay under Muslim control.\n\nThe Futuh al-Habasha — the Conquest of Abyssinia — demonstrated the striking power of Somali cavalry and the reach of Somali ambition. Ahmad's horsemen wore face-covering helmets and breastplates, their mounts similarly armored, and they employed hit-and-run tactics perfectly suited to the rugged terrain. Though Ahmad himself fell in 1543, the campaigns proved that the Somali military tradition could challenge even the greatest powers of East Africa.\n\nShall we embrace the spirit of Ahmad Gurey's campaigns, or seek strength through diplomacy?"
 nd_soi.2.a: "Ride forth as Ahmad Gurey rode."
 nd_soi.2.b: "Forge alliances rather than conquests."
 nd_soi.3.t: "The Ottoman-Somali Pact"
 nd_soi.3.d: "When Portuguese warships appeared off the Benadir coast in the early sixteenth century, sacking Barawa in 1507 and destroying Mogadishu in 1542, the Somali city-states recognized that no single power could resist European naval might alone. The Ajuran Sultanate reached out to the Ottoman Empire, and in the 1580s a remarkable cooperation took shape. Somali fleets joined the Turkish corsair Mir Ali Bey in a combined expedition that drove the Portuguese from Pate, Mombasa, and Kilwa.\n\nCoastal watchtowers equipped with long-range telescopes scanned the horizon for hostile sails, while Somali galleys patrolled the waters between Mogadishu and the Swahili coast. The alliance demonstrated that Indian Ocean powers could resist European encroachment through unity and strategic cooperation."
 nd_soi.3.a: "The sea belongs to those who defend it."
 nd_soi.4.t: "The Coins of the Sultans"
 nd_soi.4.d: "The Sultanate of Mogadishu became one of the few African states to mint its own coinage, a testament to the sophistication of its commercial networks. Mogadishu currency bore the names of twenty-three successive sultans, and pieces have been found as far away as the present-day United Arab Emirates. The minting of coins centralized the sultanate's commercial hegemony, allowing Mogadishu to set the terms of trade across the western Indian Ocean.\n\nAlongside this financial innovation, the city's weavers produced the famous toob benadir — cloth so fine that Ibn Battuta declared Mogadishu's textiles unequalled when he visited in 1330. By the nineteenth century, one in five residents of Mogadishu were weavers, and the cloth was exported to Egypt, Syria, and Arabia.\n\nShall we build our wealth on the strength of our currency, or the renown of our cloth?"
 nd_soi.4.a: "Let our coins speak for us in every market."
 nd_soi.4.b: "Let our cloth clothe the world."
 nd_soi.5.t: "Rise of the Gobroon"
 nd_soi.5.d: "In the late seventeenth century, as the Ajuran Sultanate fractured under the weight of tyrannical rule and rebellious clans, a new power emerged along the Shabelle River. The Gobroon family, regarded as saints in the Islamic tradition, united the Geledi clan into a sultanate centered on Afgooye. Under the Gobroon dynasty, the Geledi Sultanate consolidated control over the Jubba and Shabelle valleys and the Benadir coast, developing new systems of agriculture and taxation.\n\nThe dynasty's defining moment came in 1843 when Geledi forces marched against the Bardera Sultanate, a strict religious settlement that imposed Sharia prohibitions threatening Geledi commercial interests. The decisive victory at Bardera reasserted Geledi dominance over the interior trade routes and proved that the successor states could project power as effectively as the old Ajuran.\n\nShall the Gobroon legacy be one of agricultural prosperity, or military strength?"
 nd_soi.5.a: "The rivers shall feed a great nation."
 nd_soi.5.b: "Strength secures what prosperity creates."
 nd_soi.6.t: "The Looms of the Benadir"
 nd_soi.6.d: "The weaving tradition of the Benadir coast is among the oldest and most refined in East Africa. The Tunni coastal artisans and other Somali weavers produce the alindi and toob benadir — cloth known by different names in the hinterland and on the coast, but prized everywhere. When Ibn Battuta visited Mogadishu in 1330, he recorded that the city's textiles were exported to Egypt and beyond, describing them as without equal.\n\nThe weaving houses of Mogadishu and Merca are not merely workshops but centers of cultural identity, where patterns and techniques are passed down through generations. Each bolt of cloth carries the story of a people who turned cotton and dyes into objects of beauty and instruments of trade."
 nd_soi.6.a: "A tradition woven into our very identity."
 nd_soi_xeer_codification: "Xeer Codification"
 nd_soi_xeer_codification_desc: "The Somali xeer, a body of unwritten customary law negotiated by councils of elders, governs everything from blood compensation to water rights. Its codification into a formal legal framework strengthens clan governance."
 nd_soi_pastoral_economy: "Pastoral Economy"
 nd_soi_pastoral_economy_desc: "The herding of camels, cattle, sheep, and goats forms the backbone of Somali economic life. Mastery of pastoral techniques and hide processing creates surplus for trade."
 nd_soi_monsoon_navigation: "Monsoon Navigation"
 nd_soi_monsoon_navigation_desc: "Somali sailors have long understood the seasonal monsoon winds that connect the Horn of Africa to Arabia, India, and beyond. This knowledge enables reliable maritime trade across the Indian Ocean."
 nd_soi_clan_warrior_traditions: "Clan Warrior Traditions"
 nd_soi_clan_warrior_traditions_desc: "Somali clans maintain fierce warrior traditions, particularly in mounted combat. Horsemen armed with spears and sabers form the elite striking force of Somali armies."
 nd_soi_mogadishu_foundations: "Mogadishu Foundations"
 nd_soi_mogadishu_foundations_desc: "The city of Mogadishu, founded by Arab and Somali merchants, grows into a major commercial center of the Indian Ocean world, its markets drawing traders from across three continents."
 nd_soi_islamic_scholarship: "Islamic Scholarship"
 nd_soi_islamic_scholarship_desc: "Somali scholars of the Shafi'i school of jurisprudence gain renown across the Muslim world. Figures like Uthman bin Ali Zayla'i in Egypt and Abd al-Aziz of Mogadishu in the Maldives carry Somali learning abroad."
 nd_soi_ajuran_state_formation: "Ajuran State Formation"
 nd_soi_ajuran_state_formation_desc: "The Ajuran Sultanate creates a centralized administrative apparatus unprecedented in the Horn of Africa, using control of water resources to build a functioning bureaucratic state."
 nd_soi_ajuran_hydraulic_works: "Ajuran Hydraulic Works"
 nd_soi_ajuran_hydraulic_works_desc: "The Ajuran, as a water dynasty, monopolize the Jubba and Shabelle rivers through limestone wells, cisterns, and irrigation canals. Their hydraulic engineering makes arid lands productive and draws nomads to settle."
 nd_soi_monsoon_trade_routes: "Monsoon Trade Routes"
 nd_soi_monsoon_trade_routes_desc: "Somali merchants establish regular trade routes riding the seasonal monsoon winds, connecting Mogadishu, Merca, and Barawa to the ports of Arabia, India, Persia, and even China."
 nd_soi_dhow_building: "Dhow Building"
 nd_soi_dhow_building_desc: "Somali shipwrights build the swift dhows that dominate Indian Ocean commerce — sewn-plank vessels designed to ride the monsoon winds, carrying goods across vast distances with minimal crew."
 nd_soi_benadir_textile_tradition: "Benadir Textile Tradition"
 nd_soi_benadir_textile_tradition_desc: "The toob benadir, woven cloth specialized for the markets of Egypt and Syria, makes Mogadishu a major textile center. Ibn Battuta himself described the city's fabrics as without equal."
 nd_soi_mogadishu_coinage: "Mogadishu Coinage"
 nd_soi_mogadishu_coinage_desc: "The Sultanate of Mogadishu mints its own currency bearing the names of its sultans, centralizing commercial hegemony across the western Indian Ocean."
 nd_soi_adal_cavalry_tactics: "Adal Cavalry Tactics"
 nd_soi_adal_cavalry_tactics_desc: "The Adal Sultanate's cavalry, armored in face-covering helmets and breastplates, employ devastating hit-and-run tactics. Their horsemen carry sabers from the markets of Zeila and Arabia."
 nd_soi_zeila_gateway: "Zeila Gateway"
 nd_soi_zeila_gateway_desc: "The port of Zeila, chief harbor of the Adal Sultanate, serves as the gateway between the Horn of Africa and the Arabian Peninsula, channeling a stream of slaves, ivory, and commodities."
 nd_soi_futuh_al_habasha: "Futuh al-Habasha"
 nd_soi_futuh_al_habasha_desc: "The Conquest of Abyssinia by Imam Ahmad ibn Ibrahim al-Ghazi demonstrates the devastating reach of Somali cavalry, as three-quarters of the Ethiopian Empire falls under Muslim control."
 nd_soi_benadir_coastal_defense: "Benadir Coastal Defense"
 nd_soi_benadir_coastal_defense_desc: "The Ajuran Sultanate organizes a coastal defense system against Portuguese incursions, with watchtowers, garrison troops, and a galley fleet protecting the Benadir ports."
 nd_soi_benadir_naval_defense: "Benadir Naval Defense"
 nd_soi_benadir_naval_defense_desc: "War galleys built in the harbors of Mogadishu and Merca patrol the Benadir coast, engaging Portuguese and hostile vessels to protect Somali commerce."
 nd_soi_ottoman_alliance: "Ottoman-Somali Alliance"
 nd_soi_ottoman_alliance_desc: "In the 1580s, Somali city-states cooperate with Ottoman forces to drive the Portuguese from key East African ports, including Pate, Mombasa, and Kilwa."
 nd_soi_frankincense_trade: "Frankincense Trade"
 nd_soi_frankincense_trade_desc: "The Horn of Africa has exported frankincense and myrrh since antiquity. Somali control of these aromatic resins provides a steady source of wealth from the ancient Land of Punt."
 nd_soi_warsangali_enterprise: "Warsangali Enterprise"
 nd_soi_warsangali_enterprise_desc: "The Warsangali Sultanate controls the Maakhir Coast in northern Somalia, maintaining independent trading networks that supplement the commerce of the southern Benadir ports."
 nd_soi_shafii_jurisprudence: "Shafi'i Jurisprudence"
 nd_soi_shafii_jurisprudence_desc: "Somali Islamic scholars of the Shafi'i school develop a sophisticated jurisprudential tradition that complements the customary xeer, creating a dual legal framework."
 nd_soi_successor_states: "Successor States"
 nd_soi_successor_states_desc: "The decline of the Ajuran Sultanate gives rise to a mosaic of successor states — the Geledi, Hobyo, and Majeerteen sultanates — each inheriting different aspects of Ajuran governance."
 nd_soi_gobroon_dynasty: "Gobroon Dynasty"
 nd_soi_gobroon_dynasty_desc: "The Gobroon family, regarded as saints in Islamic tradition, unite the Geledi clan into a powerful sultanate centered on Afgooye, consolidating control over the Jubba and Shabelle valleys."
 nd_soi_shabelle_agriculture: "Shabelle Agriculture"
 nd_soi_shabelle_agriculture_desc: "Building on the Ajuran hydraulic legacy, the Geledi develop intensive agriculture along the Shabelle valley, producing surplus grain, cotton, and other crops for domestic consumption and export."
 nd_soi_merchant_diaspora: "Merchant Diaspora"
 nd_soi_merchant_diaspora_desc: "Somali merchant communities establish themselves in Cairo, Damascus, Mocha, Mombasa, Aden, and the islands of the Indian Ocean, creating a trading network that spans three continents."
 nd_soi_geledi_mobilization: "Geledi Mobilization"
 nd_soi_geledi_mobilization_desc: "The Geledi Sultanate develops a military mobilization system drawing on the warrior traditions of its constituent clans, fielding fast-moving irregular forces for campaigns along the Jubba valley."
 nd_soi_inland_caravan_trade: "Inland Caravan Trade"
 nd_soi_inland_caravan_trade_desc: "Caravan routes linking the Benadir coast to Harar and the Ethiopian interior carry ivory, livestock, hides, and cloth, enriching the inland Somali clans."
 nd_soi_bardera_campaign: "Bardera Campaign"
 nd_soi_bardera_campaign_desc: "In 1843, Geledi forces march against the Bardera Sultanate, a strict religious community whose prohibitions on slavery and certain commerce threaten Geledi trading interests. The decisive victory reasserts control over interior trade routes."
 nd_soi_benadir_prosperity: "Benadir Prosperity"
 nd_soi_benadir_prosperity_desc: "The Benadir coast reaches the zenith of its commercial prosperity, with Mogadishu, Merca, and Barawa serving as entrepots for the entire western Indian Ocean."
 nd_soi_jubba_development: "Jubba Valley Development"
 nd_soi_jubba_development_desc: "Agricultural development extends along the Jubba River valley, transforming formerly pastoral lands into productive farmland under Geledi administration."
 nd_soi_geledi_warfare: "Geledi Warfare"
 nd_soi_geledi_warfare_desc: "The Geledi Sultanate refines its military tradition, fielding mobile irregular infantry drawn from the clans of the Shabelle valley for rapid campaigns across the Horn of Africa."
 nd_soi_dual_legal_system: "Dual Legal System"
 nd_soi_dual_legal_system_desc: "The integration of xeer customary law with Islamic sharia creates a sophisticated dual legal framework, with clan elders and religious scholars cooperating to adjudicate disputes."
 nd_soi_ivory_trade: "Ivory and Livestock Export"
 nd_soi_ivory_trade_desc: "Somalia's export economy diversifies, with ivory, livestock, hides, frankincense, and myrrh flowing through the Benadir ports to markets across the Indian Ocean and Red Sea."
 nd_soi_national_awakening: "Somali National Awakening"
 nd_soi_national_awakening_desc: "A shared Somali identity, rooted in common language, religion, and pastoral culture, begins to transcend clan divisions, laying the foundations for a unified national consciousness."
 nd_soi_port_modernization: "Port Modernization"
 nd_soi_port_modernization_desc: "The harbors of Mogadishu and the Benadir coast are improved to accommodate the larger vessels of the modern era, securing Somalia's continued role in Indian Ocean commerce."
 nd_soi_clan_unification: "Clan Unification"
 nd_soi_clan_unification_desc: "The process of unifying Somalia's clans into a cohesive national structure, moving beyond the segmentary lineage system toward a more centralized governance model."
 nd_soi_modern_military: "Modern Military Traditions"
 nd_soi_modern_military_desc: "Somalia's warrior heritage adapts to the demands of modern warfare, combining traditional clan military organization with new discipline and tactics."
 nd_soi_trade_revival: "Indian Ocean Trade Revival"
 nd_soi_trade_revival_desc: "Somali merchants reclaim their position in the Indian Ocean trade networks, leveraging centuries of maritime knowledge and the strategic position of the Horn of Africa."
 nd_soi_literary_traditions: "Literary and Oral Traditions"
 nd_soi_literary_traditions_desc: "The Somali oral tradition, one of the richest in Africa, begins to find written expression, preserving centuries of poetry, genealogy, and customary law for future generations."
 a_nd_soi_horsemen: "Somali Horsemen"
 a_nd_soi_horsemen_desc: "Mounted warriors of the Somali clans, armed with spears, sabers, and shields. These horsemen employ devastating hit-and-run tactics learned from centuries of pastoral raiding and the campaigns of the Adal Sultanate."
 a_nd_soi_horsemen_levy: "Somali Horsemen"
 a_nd_soi_horsemen_levy_desc: "Clan cavalry raised through traditional levy systems, these pastoral warriors form the mobile striking arm of Somali armies."
 a_nd_soi_coastal_guards: "Benadir Coastal Guards"
 a_nd_soi_coastal_guards_desc: "Garrison troops stationed at the watchtowers and fortifications of the Benadir coast, trained to defend Mogadishu, Merca, and Barawa against seaborne raids and Portuguese incursions."
 a_nd_soi_geledi_irregulars: "Geledi Irregulars"
 a_nd_soi_geledi_irregulars_desc: "Fast-moving light infantry of the Geledi Sultanate, drawn from the clans of the Shabelle valley. They excel at rapid deployment and guerrilla tactics in the riverine terrain of southern Somalia."
 n_nd_soi_dhow: "Somali Dhow"
 n_nd_soi_dhow_desc: "A swift sewn-plank vessel designed to ride the monsoon winds of the Indian Ocean. Somali dhows carry smaller armament than European vessels but are faster and require less crew, making them ideal for long-distance trade."
 n_nd_soi_benadir_galley: "Benadir War Galley"
 n_nd_soi_benadir_galley_desc: "A stout coastal warship built in the harbors of Mogadishu and Merca, designed to patrol the Benadir coast and engage hostile vessels in the shallow waters along the Horn of Africa."
 nd_soi_limestone_well: "Ajuran Limestone Well"
 nd_soi_limestone_well_desc: "Large wells constructed of limestone, part of the Ajuran Sultanate's hydraulic infrastructure. These wells and cisterns have served the pastoral nomads of the Horn of Africa for centuries, attracting settlement and enabling agriculture in arid lands."
 nd_soi_weaving_house: "Mogadishu Weaving House"
 nd_soi_weaving_house_desc: "A workshop where the renowned toob benadir cloth is woven, dyed, and prepared for export. The weaving tradition of the Benadir coast produces textiles prized from Egypt to India."
 nd_soi_caravanserai: "Somali Caravanserai"
 nd_soi_caravanserai_desc: "A fortified rest stop along the trade routes linking the Benadir coast to the interior, providing shelter, water, and provisions for merchants and their livestock."
 nd_soi_xeer_council: "Xeer Council Hall"
 nd_soi_xeer_council_desc: "A gathering place where Somali clan elders convene to negotiate and adjudicate the customary law of the xeer, settling disputes over water rights, blood compensation, and clan boundaries."
 nd_soi_coastal_watchtower: "Coastal Watchtower"
 nd_soi_coastal_watchtower_desc: "A stone tower built along the Benadir coast, equipped with lookouts who scan the horizon for hostile fleets. Part of the Ajuran defense system against Portuguese naval incursions."
 nd_soi_mogadishu_mint: "Mogadishu Mint"
 nd_soi_mogadishu_mint_desc: "A minting facility that produces the distinctive Mogadishu currency, coins bearing the names of the sultans. The mint centralizes the commercial hegemony of the Somali trading empire."
 nd_soi_well_maintenance: "Well Maintenance"
 nd_soi_well_maintenance_desc: "The upkeep of the Ajuran limestone wells requires stone for lining repairs, tools for excavation work, and lumber for scaffolding and equipment."
 nd_soi_cloth_dyeing: "Cloth Dyeing"
 nd_soi_cloth_dyeing_desc: "Imported dyes and raw cloth are transformed into the exquisite toob benadir, finished textiles prized across the Indian Ocean from Egypt to India."
 nd_soi_caravan_provisioning: "Caravan Provisioning"
 nd_soi_caravan_provisioning_desc: "The caravanserai must be stocked with grain, livestock, and salt to feed and preserve provisions for merchants and their animals along the inland trade routes."
 nd_soi_elder_council_upkeep: "Elder Council Upkeep"
 nd_soi_elder_council_upkeep_desc: "Maintaining the xeer council requires livestock for feasting, incense for ceremonial gatherings, and paper for recording customary law and decisions."
 nd_soi_watchtower_garrison: "Watchtower Garrison"
 nd_soi_watchtower_garrison_desc: "The coastal watchtower requires weapons and stone for fortifications, and lumber for watch platforms and signaling equipment."
 nd_soi_coin_striking: "Coin Striking"
 nd_soi_coin_striking_desc: "Silver and copper are struck into the sultanate's distinctive coinage, recognized across the western Indian Ocean."
 nd_soi_frankincense_processing: "Frankincense Processing"
 nd_soi_frankincense_processing_desc: "The preparation and grading of frankincense resin for export, using fiber wrapping for packaging, a tradition dating to the ancient Land of Punt."
 nd_soi_hide_curing: "Hide Curing"
 nd_soi_hide_curing_desc: "Livestock hides are cured and processed into leather, a staple of the Somali pastoral economy and a valuable export commodity."
 STATIC_MODIFIER_NAME_nd_soi_spirit_of_gurey: "Spirit of Gurey"
 STATIC_MODIFIER_DESC_nd_soi_spirit_of_gurey: "The spirit of Imam Ahmad Gurey's conquest drives our warriors forward with holy fervor and unmatched cavalry skill."
 STATIC_MODIFIER_NAME_nd_soi_diplomatic_pact: "Diplomatic Pact"
 STATIC_MODIFIER_DESC_nd_soi_diplomatic_pact: "Rather than conquest, we seek strength through alliances and trade agreements that project Somali influence across the Indian Ocean."
 STATIC_MODIFIER_NAME_nd_soi_mogadishu_cloth_dominance: "Mogadishu Cloth Dominance"
 STATIC_MODIFIER_DESC_nd_soi_mogadishu_cloth_dominance: "The looms of Mogadishu produce the finest cloth in the Indian Ocean, and our weavers are the envy of Egypt and Syria."
 STATIC_MODIFIER_NAME_nd_soi_mogadishu_gold_standard: "Mogadishu Gold Standard"
 STATIC_MODIFIER_DESC_nd_soi_mogadishu_gold_standard: "Our coinage is recognized and accepted from Arabia to India, giving Somali merchants an advantage in every market they enter."
 STATIC_MODIFIER_NAME_nd_soi_gobroon_agricultural_reform: "Gobroon Agricultural Reform"
 STATIC_MODIFIER_DESC_nd_soi_gobroon_agricultural_reform: "The Gobroon dynasty's investment in Shabelle valley agriculture transforms Somalia's economy, making the riverine interior as productive as the coastal trade."
 STATIC_MODIFIER_NAME_nd_soi_gobroon_military_expansion: "Gobroon Military Expansion"
 STATIC_MODIFIER_DESC_nd_soi_gobroon_military_expansion: "The Geledi Sultanate projects military power across the Horn of Africa, securing trade routes and subjugating rival clans through force of arms."
 levy_nd_soi_horsemen: "Somali Horsemen"
 levy_nd_soi_horsemen_desc: "Clan cavalry raised from the pastoral nomads, carrying the mounted warrior traditions of the Somali people."
 levy_nd_soi_geledi_irregulars: "Geledi Irregulars"
 levy_nd_soi_geledi_irregulars_desc: "Light infantry levied from the clans of the Geledi Sultanate, specializing in rapid movement through the riverine terrain of southern Somalia."
 nd_soi_geledi_granary: "Geledi Granary"
 nd_soi_geledi_granary_desc: "A grain storage facility built along the Shabelle valley, part of the Geledi Sultanate's agricultural infrastructure. These granaries ensure food security and enable surplus production for trade."
 nd_soi_benadir_warehouse: "Benadir Warehouse"
 nd_soi_benadir_warehouse_desc: "A large storage facility in the Benadir ports, holding goods from across the Indian Ocean — spices from India, cloth from Mogadishu, ivory from the interior — awaiting trade or transshipment."
 nd_soi_madrasa: "Somali Madrasa"
 nd_soi_madrasa_desc: "An Islamic school where Shafi'i jurisprudence and Quranic studies are taught, producing scholars who carry Somali learning across the Muslim world."
 nd_soi_bardic_hall: "Bardic Hall"
 nd_soi_bardic_hall_desc: "A gathering place where Somali poets and storytellers preserve and perform the rich oral traditions of their people — genealogies, customary law, heroic poems, and the wisdom of the elders."
 n_nd_soi_merchant_vessel: "Somali Merchant Vessel"
 n_nd_soi_merchant_vessel_desc: "A swift Indian Ocean trading vessel designed for the long monsoon routes between the Benadir coast, Arabia, and India. Faster than European ships of comparable size, though more lightly armed."
 a_nd_soi_modern_cavalry: "Somali Modern Cavalry"
 a_nd_soi_modern_cavalry_desc: "Modernized mounted warriors blending traditional Somali cavalry skills with new weapons and tactics, serving as scouts and fast-moving raiders in the era of modern warfare."
 nd_soi_grain_storage: "Grain Storage"
 nd_soi_grain_storage_desc: "The granary requires a steady supply of grain to replenish reserves, pottery vessels for sealed storage, and tools for maintenance of the facilities."
 nd_soi_goods_handling: "Goods Handling"
 nd_soi_goods_handling_desc: "The warehouse requires lumber for crates and shelving, pottery for sealed storage vessels, and tools for loading and repair work to maintain the diverse goods of the Indian Ocean trade."
 nd_soi_scholarly_endowment: "Scholarly Endowment"
 nd_soi_scholarly_endowment_desc: "The madrasa requires paper for manuscripts and legal texts, cloth for scholars' robes and furnishings, and incense for the mosque's ceremonial functions."
 nd_soi_bardic_patronage: "Bardic Patronage"
 nd_soi_bardic_patronage_desc: "Maintaining the bardic hall requires livestock for feasting, cloth for ceremonial dress and hall decorations, and beer for the communal gatherings that sustain the oral tradition."
 nd_soi_ivory_grading: "Ivory Grading"
 nd_soi_ivory_grading_desc: "Raw ivory tusks are graded and carved into luxury items for export, a specialized craft commanding the highest prices in Indian Ocean markets."
 nd_soi_modern_harbor_management: "Modern Harbor Management"
 nd_soi_modern_harbor_management_desc: "The modernization of Somali ports requires lumber and naval supplies for expanded docking facilities, and tools for ship repair infrastructure and construction work."
 nd_soi_formed_tt: "Somalia has been formed"
 nd_soi_path_a_tt: "Chose Pearl of the Indian Ocean"
 nd_soi_path_b_tt: "Chose Lords of the Waters"
 nd_soi_destiny: "Somali Destiny"
 nd_soi_destiny_desc: "With Somalia unified, the foundation is laid for a greater purpose. Whether the monsoon winds carry our dhows to glory or the wells of the interior sustain an empire, the Somali people stand ready to shape the Horn of Africa and the Indian Ocean beyond."
 nd_soi_dest_aden_gateway: "Gateway of Aden"
 nd_soi_dest_aden_gateway_desc: "The Bab-el-Mandeb strait controls all trade between the Indian Ocean and the Red Sea. By securing Aden and the incense-laden coast, Somalia commands the chokepoint of maritime commerce that has enriched the region since the days of the Land of Punt."
 nd_soi_dest_swahili_reach: "Swahili Reach"
 nd_soi_dest_swahili_reach_desc: "From Mogadishu to Kilwa, the Somali merchant fleet extends its monsoon trade networks along the entire East African coast, establishing commercial dominance over the Swahili city-states that once traded as equals."
 nd_soi_dest_ocean_dominion: "Dominion of the Ocean"
 nd_soi_dest_ocean_dominion_desc: "The Indian Ocean is a Somali sea. From Aden to Zanzibar, from Mombasa to the spice markets of the East, Somali merchants and warships control the trade routes that sustain empires. The pearl of the Indian Ocean has become its master."
 nd_soi_dest_highland_conquest: "Highland Conquest"
 nd_soi_dest_highland_conquest_desc: "Following in the footsteps of Imam Ahmad Gurey, Somali forces push into the Ethiopian highlands. The ancient city of Gondar falls, and with it the myth of Ethiopian invincibility. The hydraulic state expands its reach to the mountain springs that feed the Nile."
 nd_soi_dest_empire_consolidation: "Imperial Consolidation"
 nd_soi_dest_empire_consolidation_desc: "The rock-hewn churches of Lalibela and the fortified court of Ankober now answer to Somali authority. A professional army secures the vast territory, while the Ajuran tradition of centralized governance binds the conquered highlands to the Somali heartland."
 nd_soi_dest_horn_master: "Master of the Horn"
 nd_soi_dest_horn_master_desc: "With Massawa and Suakin under Somali control, the entire Horn of Africa from the Red Sea coast to the Indian Ocean answers to one power. The lords of the waters have become lords of the land as well, commanding an empire from the Nile tributaries to the monsoon seas."
 nd_soi.7.t: "A Destiny Forged"
 nd_soi.7.d: "The unification of the Somali clans was only the beginning. Before us lies a choice already made — whether to look outward across the waves or inward across the arid plains. The path is set. Now we must walk it.\n\nFrom the ancient ports that knew the pharaohs' ships to the caravan routes where frankincense still perfumes the air, the Somali nation has the means to build something that will endure. Our poets will sing of what comes next for generations."
 nd_soi.7.a: "Let the journey begin."
 nd_soi.8.t: "The Gate of Tears"
 nd_soi.8.d: "Bab-el-Mandeb — the Gate of Tears — is ours. The narrow strait where the Red Sea meets the Indian Ocean has been a chokepoint of world trade since the time of Solomon and Sheba. Now Somali customs collectors greet every vessel that passes between Arabia and Africa.\n\nFrom Aden's harbor, our merchants can reach Egypt, India, and the Spice Islands. The incense that once made this land the Punt of legend now flows through markets we control. The first link in a chain that will stretch across the ocean has been forged."
 nd_soi.8.a: "Every ship that passes pays its due."
 nd_soi.9.t: "The Swahili Shore"
 nd_soi.9.d: "Somali dhows now anchor in the harbors of Kilwa and Lamu, ports that once rivaled Mogadishu in the Indian Ocean trade. The Swahili coast, with its coral-stone cities and gold-dust commerce, has been brought into the Somali trading sphere.\n\nOur captains know these waters as well as their own — the monsoon winds that fill their sails were charted by their grandfathers. But extending our reach this far south demands new methods. Shall we rely on intelligence networks and hired swords, or assert our dominance through the power of our fleet?"
 nd_soi.9.a: "Place our agents in every port."
 nd_soi.9.b: "Our warships will keep the peace."
 nd_soi.10.t: "Lords of the Monsoon"
 nd_soi.10.d: "From Aden to Zanzibar, from the Red Sea to the Swahili coast, the Indian Ocean trade flows through Somali hands. What the Portuguese and Ottomans fought over for centuries, we have claimed through the mastery of wind and wave that our people have possessed since before the world's great religions were born.\n\nThe pearl of the Indian Ocean has become its crown. Our trading houses in Mogadishu, Kilwa, and Mombasa set the prices that merchants from Cairo to Calicut must accept. But how shall we govern this vast maritime domain — through the soft power of diplomacy and reputation, or through the hard calculus of commercial monopoly?"
 nd_soi.10.a: "Let our name command respect in every court."
 nd_soi.10.b: "Gold speaks louder than diplomats."
 nd_soi.11.t: "The March on Gondar"
 nd_soi.11.d: "The Ethiopian highlands, unconquered for millennia, have fallen to Somali arms. Gondar, the city of castles built by Emperor Fasilides, now flies our banner. The achievement surpasses even the great Imam Ahmad Gurey's campaigns, for where he swept through and withdrew, we have come to stay.\n\nThe rivers that flow from these mountains — tributaries of the Nile itself — now pass through lands we control. The Ajuran dream of a hydraulic empire, once confined to the wells and canals of the Somali lowlands, has expanded to encompass the very source of the region's waters."
 nd_soi.11.a: "The highlands bend to our will."
 nd_soi.12.t: "The Consolidation"
 nd_soi.12.d: "Lalibela's churches and Ankober's fortress mark the extent of an empire that stretches from the Indian Ocean to the Ethiopian plateau. Holding this vast territory demands more than military force — it requires the administrative discipline the Ajuran perfected and the faith that binds our people.\n\nThe conquered highland peoples are diverse in language and religion. Some may be won through the sword of faith, others through the steady hand of garrison rule. How shall we bind this empire together?"
 nd_soi.12.a: "The faith of the Prophet unites all peoples."
 nd_soi.12.b: "Order comes from strength, not sermons."
 nd_soi.13.t: "Master of the Horn of Africa"
 nd_soi.13.d: "From Suakin on the Red Sea to the monsoon coast of the Indian Ocean, the entire Horn of Africa answers to Somali authority. Massawa, the ancient port that connected Aksum to the world, now serves a new empire. The lords of the waters have become lords of all they survey.\n\nNo power in East Africa can challenge us. The question now is what kind of empire we shall be — one that grows fat on the spoils of conquest, or one that brings order and prosperity to the lands under our rule."
 nd_soi.13.a: "Let the conquered enrich the conqueror."
 nd_soi.13.b: "We bring the peace of a strong hand."
 STATIC_MODIFIER_NAME_nd_soi_dest_merchant_intelligence: "Merchant Intelligence"
 STATIC_MODIFIER_DESC_nd_soi_dest_merchant_intelligence: "Somali trading houses serve as intelligence networks, gathering information from every port in the Indian Ocean. Our merchants are our spies, and our spies are everywhere."
 STATIC_MODIFIER_NAME_nd_soi_dest_naval_hegemony: "Naval Hegemony"
 STATIC_MODIFIER_DESC_nd_soi_dest_naval_hegemony: "Somali warships patrol the Indian Ocean trade lanes, enforcing our commercial dominance with the threat of naval force. A fleet that protects trade need not fear the costs of maintenance."
 STATIC_MODIFIER_NAME_nd_soi_dest_monsoon_diplomacy: "Monsoon Diplomacy"
 STATIC_MODIFIER_DESC_nd_soi_dest_monsoon_diplomacy: "The prestige of commanding the Indian Ocean's trade gives Somali diplomats weight in every negotiation. Our word carries far, and our reach extends further."
 STATIC_MODIFIER_NAME_nd_soi_dest_commercial_supremacy: "Commercial Supremacy"
 STATIC_MODIFIER_DESC_nd_soi_dest_commercial_supremacy: "The wealth of the Indian Ocean flows through Somali markets, and our commercial networks reduce the cost of everything from armies to banking."
 STATIC_MODIFIER_NAME_nd_soi_dest_holy_warriors: "Holy Warriors"
 STATIC_MODIFIER_DESC_nd_soi_dest_holy_warriors: "The spirit of jihad that drove Ahmad Gurey into the Ethiopian highlands lives on. Our soldiers fight with the zeal of faith, and the cost of righteous war is borne gladly."
 STATIC_MODIFIER_NAME_nd_soi_dest_garrison_state: "Garrison State"
 STATIC_MODIFIER_DESC_nd_soi_dest_garrison_state: "The vast conquests of the Horn demand a systematic approach to military administration, with garrisons, rapid recruitment, and centralized command binding the empire together."
 STATIC_MODIFIER_NAME_nd_soi_dest_plunder_of_empires: "Plunder of Empires"
 STATIC_MODIFIER_DESC_nd_soi_dest_plunder_of_empires: "The wealth of conquered empires enriches the Somali state, as the treasuries and temples of the Horn yield their centuries of accumulated riches."
 STATIC_MODIFIER_NAME_nd_soi_dest_pax_somalis: "Pax Somalis"
 STATIC_MODIFIER_DESC_nd_soi_dest_pax_somalis: "Under Somali rule, the diverse peoples of the Horn of Africa find a measure of order and stability. Conversion, quality governance, and military discipline sustain the peace."
 nd_soi_ocean_trading_house: "Indian Ocean Trading House"
 nd_soi_ocean_trading_house_desc: "A grand commercial establishment combining warehouse, counting house, and diplomatic reception hall, from which Somali merchants coordinate trade across the entire Indian Ocean basin."
 nd_soi_imperial_cistern: "Imperial Cistern"
 nd_soi_imperial_cistern_desc: "A monumental water storage complex in the Ajuran tradition, scaled to serve an empire. These vast cisterns collect and distribute water across conquered territories, extending the hydraulic state's control beyond the Somali heartland."
 nd_soi_ocean_trade_coordination: "Ocean Trade Coordination"
 nd_soi_ocean_trade_coordination_desc: "Managing Indian Ocean commerce requires paper for contracts and manifests, fine cloth for diplomatic gifts, and incense for the ceremonial functions that seal trade agreements."
 nd_soi_cistern_engineering: "Cistern Engineering"
 nd_soi_cistern_engineering_desc: "The imperial cistern requires stone for construction and lining, tools for excavation and masonry work, and lumber for scaffolding and aqueduct channels."
