l_english:
 STATIC_MODIFIER_NAME_nd_sultan_of_two_seas: "Sultan of Two Seas"
 STATIC_MODIFIER_DESC_nd_sultan_of_two_seas: "As Alaeddin Keykubat once ruled from the Mediterranean to the Black Sea, so too shall the Sultanate of Rum project its power across both coasts of Anatolia. Our cavalry shall thunder across the plateaus and our galleys command the straits."
 STATIC_MODIFIER_NAME_nd_crossroads_of_civilizations: "Crossroads of Civilizations"
 STATIC_MODIFIER_DESC_nd_crossroads_of_civilizations: "Anatolia has always stood at the meeting point of East and West. The Sultanate of Rum shall embrace this heritage, welcoming merchants from every land and scholars from every tradition, building a realm where commerce and culture flourish together."
 STATIC_MODIFIER_NAME_nd_rum_ahi_revival: "Revival of the Ahi Brotherhood"
 STATIC_MODIFIER_DESC_nd_rum_ahi_revival: "The Ahi guilds have been reinvigorated, their workshops humming with productivity and their principles of honest trade and mutual aid spreading through the cities of Anatolia."
 STATIC_MODIFIER_NAME_nd_rum_mevlana_legacy: "Legacy of Mevlana"
 STATIC_MODIFIER_DESC_nd_rum_mevlana_legacy: "The teachings of Mevlana Rumi echo through the tekkes and medreses of Rum, inspiring a tolerance and spiritual depth that draws seekers from across the Islamic world."
 nd_rum.1.t: "The Sultanate Restored"
 nd_rum.1.d: "The banner of the Seljuks flies once more over the heartland of Anatolia. Where once a dozen beyliks squabbled over the carcass of the old sultanate, a single sovereign now commands the allegiance of all Turkic lords from the Black Sea to the Mediterranean. The caravanserais that line the ancient roads stand ready to channel the wealth of nations, while the ghulam cavalry that once rode at the Sultan's side awaits a new master's call.\n\nThe question now is what manner of realm this restored sultanate shall become. Shall it follow the path of the warrior-sultans who once made the Crusaders tremble and the Byzantines flee — projecting military power across two seas? Or shall it embrace its destiny as the great crossroads of civilization, where Persian poetry, Greek philosophy, and Turkic valor meet in the bazaars and medreses of Konya and Kayseri?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_rum.1.a: "We are the Sultan of Two Seas!"
 nd_rum.1.b: "We are the Crossroads of Civilizations!"
 nd_rum.2.t: "The Ahi Brotherhood Reborn"
 nd_rum.2.d: "The workshops of our cities have come alive with a spirit not seen since the days of Ahi Evran himself. The Ahi brotherhoods — those remarkable guilds that blended Sufi devotion with honest craftsmanship — have reorganized under our patronage. From tanners to coppersmiths, from weavers to blacksmiths, the artisans of Anatolia bind themselves by oaths of brotherhood, fair dealing, and mutual aid. Their zaviyes serve as hostelries for travelers, their councils settle disputes without recourse to courts, and their young apprentices train in arms as well as craft — ready to defend the cities that sustain them."
 nd_rum.2.a: "Let the guilds flourish under our protection."
 nd_rum.2.b: "Let the brotherhoods bind our communities together."
 nd_rum.3.t: "The Whirling Dervishes of Konya"
 nd_rum.3.d: "In the tekke at Konya, the followers of Mevlana Jalaluddin Rumi continue the sublime practice of the sema — the whirling dance that brings the devotee closer to the divine. The Mevlevi Order has become the spiritual heart of our realm, attracting poets, scholars, and mystics from across the Islamic world. Their message of universal love and tolerance has softened the edges of sectarian conflict and inspired a flowering of Persian literature and music that brings prestige to the Sultanate of Rum far beyond what armies alone could achieve."
 nd_rum.3.a: "The dervishes bring wisdom and harmony to our realm."
 nd_rum.3.b: "Their libraries and schools are the true treasure."
 nd_rum.4.t: "The Shipyards of the Two Seas"
 nd_rum.4.d: "The great shipyard at Alanya, carved into the rock face of the Red Tower peninsula, echoes once more with the sound of hammer and saw. Built by Sultan Alaeddin Keykubat to project Seljuk power across the Mediterranean, this remarkable structure — five vaulted galleries open to the sea — now launches vessels bearing our standard. Together with the naval facilities at Sinop on the Black Sea, our realm commands the coastlines that the Seljuk sultans of old named their twin domains. The Sultan of Two Seas is no longer merely a title."
 nd_rum.4.a: "Our galleys shall command both seas."
 nd_rum_ghulam_tradition: "Ghulam Cavalry Tradition"
 nd_rum_ghulam_tradition_desc: "The Seljuk practice of training elite slave soldiers — the ghulams — into a disciplined cavalry force loyal only to the Sultan. Drawn from captured youths and trained in horsemanship and combat, these warriors formed the backbone of the Seljuk royal guard."
 nd_rum_caravanserai_network: "Caravanserai Network"
 nd_rum_caravanserai_network_desc: "The Seljuks built over a hundred caravanserais across Anatolia, spaced one day's journey apart along trade routes. These fortified waypoints offered free lodging, food, and medical care to all travelers for three days — a remarkable system of trade infrastructure."
 nd_rum_turkmen_raiders: "Turkmen Raiders"
 nd_rum_turkmen_raiders_desc: "The semi-nomadic Turkmen tribes who formed the vanguard of Seljuk expansion. Fast, fearless, and adept at hit-and-run tactics, they served as the frontier raiders and scouts of the sultanate."
 nd_rum_iqta_system: "Iqta Land Grant System"
 nd_rum_iqta_system_desc: "The Seljuk system of granting revenue rights over land parcels to military commanders in exchange for cavalry service. This timar-like arrangement ensured a ready supply of mounted warriors without maintaining a permanent standing army."
 nd_rum_medrese_foundations: "Medrese Foundations"
 nd_rum_medrese_foundations_desc: "The great medreses of Konya, Kayseri, and Sivas — institutions of Islamic learning that preserved and transmitted knowledge in theology, law, medicine, and mathematics during the Seljuk golden age."
 nd_rum_seljuk_bureaucracy: "Seljuk Administrative Tradition"
 nd_rum_seljuk_bureaucracy_desc: "The Persian-influenced bureaucratic system inherited from the Great Seljuk Empire, with its divan councils, viziers, and provincial governance structures that maintained order across Anatolia's diverse populations."
 nd_rum_uc_beyleri: "Frontier Beylik Warriors"
 nd_rum_uc_beyleri_desc: "The uc beyleri — frontier lords who maintained garrisons along the Byzantine border. Their warriors, hardened by constant skirmishing, served as the first line of defense and the spearhead of expansion."
 nd_rum_ahi_guilds: "Ahi Brotherhood Guilds"
 nd_rum_ahi_guilds_desc: "The remarkable Ahi brotherhoods that combined Sufi spirituality with artisan craftsmanship. Founded by Ahi Evran in the 13th century, these guilds organized craftsmen, regulated trade, provided social services, and even maintained armed militias for urban defense."
 nd_rum_alanya_shipyard: "Alanya Shipyard"
 nd_rum_alanya_shipyard_desc: "The great naval arsenal at Alanya, built in 1227 by Sultan Alaeddin Keykubat. Carved into the rocky peninsula beneath the Red Tower, its five vaulted galleries allowed ships to be built and launched directly into the Mediterranean."
 nd_rum_mevlevi_order: "Mevlevi Order"
 nd_rum_mevlevi_order_desc: "The Sufi order founded by the followers of Mevlana Jalaluddin Rumi in Konya. Known for their whirling dervish ceremony (sema), the Mevlevi became one of the most influential spiritual movements in the Islamic world."
 nd_rum_darussifa: "Darüşşifa Tradition"
 nd_rum_darussifa_desc: "The Seljuk tradition of building hospitals (darüşşifas) attached to mosque complexes. These institutions provided medical care to all, regardless of faith or wealth, and advanced medical knowledge through practical treatment."
 nd_rum_persian_court: "Turco-Persian Court Culture"
 nd_rum_persian_court_desc: "The refined court culture of the Sultanate of Rum, where Persian was the language of poetry and administration, Arabic the language of religion, and Turkish the language of the military — a trilingual civilization of remarkable sophistication."
 nd_rum_silk_trade: "Anatolian Silk Trade"
 nd_rum_silk_trade_desc: "The silk production and trade that flourished in Anatolia under Seljuk patronage, with Bursa and other cities becoming major centers of silk weaving that supplied markets across the Mediterranean."
 nd_rum_sipahi_tradition: "Sipahi Cavalry"
 nd_rum_sipahi_tradition_desc: "The professional cavalry force supported by the timar land-grant system. Sipahis were required to maintain horses, equipment, and retainers in exchange for revenue from their assigned lands — a feudal military system that produced formidable mounted warriors."
 nd_rum_composite_bowmen: "Composite Bow Tradition"
 nd_rum_composite_bowmen_desc: "The Turkic mastery of the composite bow — a weapon of horn, wood, and sinew that could be used from horseback or on foot. This tradition of archery excellence gave Anatolian armies a decisive advantage at range."
 nd_rum_grand_bazaar: "Grand Bazaar"
 nd_rum_grand_bazaar_desc: "The covered marketplaces of the great Anatolian cities, where hundreds of shops offered goods from across the known world. These bustling commercial centers served as the economic heart of the sultanate."
 nd_rum_dhimmi_tolerance: "Dhimmi Tolerance"
 nd_rum_dhimmi_tolerance_desc: "The Seljuk policy of relative tolerance toward Christian, Jewish, and other non-Muslim communities. Greek artisans, Armenian merchants, and Georgian soldiers all found places within the sultanate's diverse society."
 nd_rum_carpet_production: "Anatolian Carpet Tradition"
 nd_rum_carpet_production_desc: "The distinctive carpet weaving traditions of Anatolia, which blended Central Asian nomadic patterns with settled workshop techniques to create some of the most prized textiles in the world."
 nd_rum_anatolian_fortresses: "Anatolian Fortress Tradition"
 nd_rum_anatolian_fortresses_desc: "The network of castles and fortifications built across Anatolia's mountainous terrain, from the citadels of Ankara and Konya to the coastal fortresses at Alanya and Sinop."
 nd_rum_port_system: "Two Seas Port System"
 nd_rum_port_system_desc: "The development of port facilities on both the Mediterranean and Black Sea coasts, fulfilling the Seljuk ambition to be the Sultan of Two Seas and controlling maritime trade along both coastlines."
 nd_rum_azab_levies: "Azab Light Infantry"
 nd_rum_azab_levies_desc: "Light auxiliary infantry drawn from the peasant population, the azabs served as garrison troops, siege auxiliaries, and expendable screens for the more valuable cavalry. Their large numbers compensated for their lesser equipment."
 nd_rum_gunpowder_adoption: "Gunpowder Arsenal"
 nd_rum_gunpowder_adoption_desc: "The establishment of arsenals for the production and storage of gunpowder weapons — cannons, bombards, and later firearms — marking the transition from purely cavalry-based warfare to combined-arms tactics."
 nd_rum_trade_insurance: "Trade Insurance System"
 nd_rum_trade_insurance_desc: "The Seljuk innovation of state-backed trade insurance, where the treasury compensated merchants for goods lost to banditry or accident on the road. This remarkable system encouraged long-distance trade by reducing risk."
 nd_rum_copper_works: "Anatolian Copper Works"
 nd_rum_copper_works_desc: "The exploitation of Anatolia's rich copper deposits, particularly around Kastamonu and Tokat, which supplied raw material for the distinctive Seljuk metalwork tradition of engraved copper vessels and decorative arts."
 nd_rum_waqf_system: "Waqf Endowment System"
 nd_rum_waqf_system_desc: "The system of charitable endowments (waqf) that funded medreses, hospitals, caravanserais, and soup kitchens. These pious foundations provided a stable source of income for public institutions outside the direct control of the state."
 nd_rum_akinci_raiders: "Akinci Raiders"
 nd_rum_akinci_raiders_desc: "The akinci — irregular light cavalry who served as the advance guard and raiding force of the Sultanate. Operating ahead of the main army, they scouted enemy territory, disrupted supply lines, and spread terror through rapid, devastating raids."
 nd_rum_imperial_administration: "Imperial Administration"
 nd_rum_imperial_administration_desc: "The centralization of provincial governance under appointed officials, replacing the semi-autonomous beylik system with a more unified administrative structure befitting an empire."
 nd_rum_nizam_troops: "Nizam-i Jedid"
 nd_rum_nizam_troops_desc: "The New Order — disciplined infantry trained along Western European lines, equipped with modern firearms and drill. This reform sought to create a professional standing army to replace the increasingly unreliable traditional forces."
 nd_rum_state_manufactories: "State Manufactories"
 nd_rum_state_manufactories_desc: "Centralized production facilities established under state direction, producing textiles, weapons, and other goods for both domestic consumption and export — an early attempt at state-led industrialization."
 nd_rum_tax_reform: "Centralized Tax Reform"
 nd_rum_tax_reform_desc: "The abolition of tax farming and the establishment of direct tax collection by salaried officials, increasing state revenue and reducing the exploitation of peasants by intermediary tax collectors."
 nd_rum_mohair_industry: "Angora Mohair Industry"
 nd_rum_mohair_industry_desc: "The processing of mohair from the Angora goats native to central Anatolia — a luxury fiber prized across Europe for its lustrous sheen and softness, providing a lucrative export commodity."
 nd_rum_naval_modernization: "Naval Modernization"
 nd_rum_naval_modernization_desc: "The modernization of the Sultanate's naval capabilities, building upon the Seljuk tradition of the Alanya and Sinop shipyards to create a fleet capable of projecting power in the Mediterranean."
 nd_rum_xebec_fleet: "Xebec Fleet"
 nd_rum_xebec_fleet_desc: "The adoption of the xebec — a fast, lateen-rigged Mediterranean vessel ideal for both commerce raiding and coastal patrol. Light and maneuverable, xebecs could outrun heavier European warships."
 nd_rum_modern_army: "Modern Anatolian Army"
 nd_rum_modern_army_desc: "The final transformation of the Sultanate's military into a modern force — professional officers, standardized equipment, and modern tactics replacing the last vestiges of the medieval military tradition."
 nd_rum_anatolian_railways: "Anatolian Railway"
 nd_rum_anatolian_railways_desc: "The construction of railway lines connecting the cities of Anatolia, binding the realm together with iron rails and enabling rapid movement of troops and goods across the plateau."
 nd_rum_constitutional_reform: "Constitutional Reform"
 nd_rum_constitutional_reform_desc: "The introduction of constitutional principles limiting royal authority and establishing consultative bodies — a modernizing reform that sought to strengthen the state through shared governance."
 nd_rum_conscription: "Universal Conscription"
 nd_rum_conscription_desc: "The introduction of mandatory military service for all male subjects, creating a mass army that drew upon the entire population rather than relying on professional soldiers and feudal levies alone."
 nd_rum_national_awakening: "Anatolian National Awakening"
 nd_rum_national_awakening_desc: "The emergence of a modern national consciousness among the peoples of Anatolia, driven by the printing press, public education, and a growing sense of shared identity transcending tribal and regional loyalties."
 nd_rum_anatolian_mining: "Anatolian Mining Industry"
 nd_rum_anatolian_mining_desc: "The industrial exploitation of Anatolia's mineral wealth — chromite, iron, and copper deposits that would become strategically vital resources in the age of modern industry."
 a_nd_rum_ghulam: "Ghulam Cavalry"
 a_nd_rum_ghulam_desc: "Elite slave cavalry loyal only to the Sultan. Captured as youths and trained in horsemanship and combat from childhood, the ghulams formed the most disciplined and reliable cavalry force in the Seljuk army."
 a_nd_rum_turkmen_raider: "Turkmen Raider"
 a_nd_rum_turkmen_raider_desc: "Semi-nomadic Turkmen light cavalry, masters of the steppe raiding tradition. Fast, elusive, and expert horsemen, they strike without warning and vanish before the enemy can respond."
 a_nd_rum_uc_warrior: "Uc Warrior"
 a_nd_rum_uc_warrior_desc: "Frontier garrison infantry from the border marches (uc). Hardened by constant skirmishing with Byzantine and Crusader forces, these warriors are tough, resourceful, and accustomed to fighting outnumbered."
 n_nd_rum_seljuk_galley: "Seljuk War Galley"
 n_nd_rum_seljuk_galley_desc: "A heavy war galley built in the Alanya shipyard tradition. Sturdier and faster than standard galleys, these vessels carry the Sultan's banner across the Mediterranean and Black Sea alike."
 a_nd_rum_sipahi: "Sipahi"
 a_nd_rum_sipahi_desc: "Professional heavy cavalry supported by the timar land-grant system. Each sipahi maintains his own warhorses, arms, and retainers — a feudal knight of the Turkic world, formidable in both shock charge and pursuit."
 a_nd_rum_composite_archer: "Composite Bow Archer"
 a_nd_rum_composite_archer_desc: "Infantry armed with the powerful Turkic composite bow, capable of launching devastating volleys at ranges that European crossbowmen struggle to match. Their rapid rate of fire and mobility make them lethal in open terrain."
 a_nd_rum_azab: "Azab"
 a_nd_rum_azab_desc: "Light auxiliary infantry levied from the peasant population. Though lightly equipped, the azabs serve as expendable screens, garrison troops, and siege laborers, freeing the professional cavalry for decisive engagements."
 a_nd_rum_akinci: "Akinci Raider"
 a_nd_rum_akinci_desc: "Irregular light cavalry who ride ahead of the main army, raiding deep into enemy territory. Their speed, ferocity, and skill at living off the land make them the terror of frontier populations and the bane of enemy logistics."
 a_nd_rum_nizam: "Nizam-i Jedid"
 a_nd_rum_nizam_desc: "Soldiers of the New Order — disciplined infantry drilled in European-style tactics, equipped with modern muskets and bayonets. They represent the cutting edge of military reform in the Sultanate."
 n_nd_rum_xebec: "Xebec"
 n_nd_rum_xebec_desc: "A fast, lateen-rigged Mediterranean vessel equally suited to commerce raiding and naval patrol. Light and maneuverable, the xebec can outrun most warships and outfight most merchantmen."
 a_nd_rum_modern_infantry: "Modern Anatolian Infantry"
 a_nd_rum_modern_infantry_desc: "Professional soldiers of the modern Sultanate, equipped with rifled muskets and trained in contemporary European tactics. The culmination of decades of military reform."
 a_nd_rum_conscript: "Anatolian Conscript"
 a_nd_rum_conscript_desc: "Soldiers drawn from across Anatolia through universal conscription. Though less experienced than professional troops, their sheer numbers and fighting spirit make them a formidable force."
 nd_rum_caravanserai: "Caravanserai"
 nd_rum_caravanserai_desc: "A fortified roadside inn offering shelter, food, and medical care to passing merchants and travelers. The Seljuks built over a hundred of these across Anatolia, each spaced one day's journey apart."
 nd_rum_medrese: "Medrese"
 nd_rum_medrese_desc: "An Islamic institution of higher learning, teaching theology, law, medicine, and mathematics. The great medreses of Konya and Kayseri were renowned centers of scholarship in the medieval Islamic world."
 nd_rum_ahi_guild_hall: "Ahi Guild Hall"
 nd_rum_ahi_guild_hall_desc: "The meeting hall and workshop of an Ahi brotherhood — part guild hall, part Sufi lodge, part militia armory. Here artisans learn their craft, settle disputes, and maintain the social fabric of the city."
 nd_rum_bazaar: "Grand Bazaar"
 nd_rum_bazaar_desc: "A covered marketplace where hundreds of shops offer goods from across the known world. The economic heart of the city, where silk, spice, copper, and carpet meet the buyer's purse."
 nd_rum_port_warehouse: "Port Warehouse"
 nd_rum_port_warehouse_desc: "Coastal storage and docking facilities supporting the Sultanate's maritime commerce. Goods are loaded and unloaded under the watchful eye of the harbor master."
 nd_rum_arsenal: "Gunpowder Arsenal"
 nd_rum_arsenal_desc: "A military facility for the production and storage of cannons, muskets, and gunpowder. The arsenal marks the transition to modern warfare in the Sultanate."
 nd_rum_manufactory: "State Manufactory"
 nd_rum_manufactory_desc: "A state-directed production facility producing textiles, metalwork, and other goods for domestic use and export."
 nd_rum_railway_station: "Railway Station"
 nd_rum_railway_station_desc: "A station along the new railway lines binding the cities of Anatolia together. Iron rails carry goods, soldiers, and ideas across the plateau at unprecedented speed."
 nd_caravanserai_upkeep: "Caravanserai Upkeep"
 nd_caravanserai_upkeep_desc: "Providing food, fodder, and shelter for merchants and their animals at a Seljuk roadside inn."
 nd_medrese_upkeep: "Medrese Upkeep"
 nd_medrese_upkeep_desc: "Supplying an Islamic educational institution with paper, books, and scholarly materials."
 nd_ahi_guild_upkeep: "Guild Hall Production"
 nd_ahi_guild_upkeep_desc: "Ahi artisans weave wool with fine dyes into dyed cloth, following the guild traditions of Ahi Evran."
 nd_darussifa_upkeep: "Hospital Upkeep"
 nd_darussifa_upkeep_desc: "Maintaining a Seljuk hospital with medicaments, medical supplies, and pottery for pharmacological preparations."
 nd_bazaar_upkeep: "Bazaar Upkeep"
 nd_bazaar_upkeep_desc: "Maintaining the covered halls and merchant stalls of a grand bazaar."
 nd_port_warehouse_upkeep: "Port Warehouse Upkeep"
 nd_port_warehouse_upkeep_desc: "Maintaining coastal trade infrastructure with timber and naval supplies."
 nd_arsenal_upkeep: "Arsenal Upkeep"
 nd_arsenal_upkeep_desc: "Manufacturing and storing weapons, cannons, and military supplies."
 nd_manufactory_upkeep: "Manufactory Upkeep"
 nd_manufactory_upkeep_desc: "Operating a state-directed manufactory producing textiles and metalwork."
 nd_railway_upkeep: "Railway Upkeep"
 nd_railway_upkeep_desc: "Maintaining iron rails, timber sleepers, and station infrastructure."
 nd_rum_silk_weaving: "Silk Weaving"
 nd_rum_silk_weaving_desc: "The famed Bursa silk tradition — weaving raw silk with fine dyes into luxurious textiles."
 nd_rum_carpet_weaving: "Carpet Weaving"
 nd_rum_carpet_weaving_desc: "The Anatolian tradition of hand-knotting wool carpets with intricate geometric patterns."
 nd_rum_copper_smelting: "Copper Smelting"
 nd_rum_copper_smelting_desc: "Smelting copper ore from Anatolia's rich mineral deposits into refined metal."
 nd_rum_mohair_processing: "Mohair Processing"
 nd_rum_mohair_processing_desc: "Processing Angora goat fleece with silk into lustrous mohair textiles prized across Europe."
 nd_rum_chromite_mining: "Chromite Mining"
 nd_rum_chromite_mining_desc: "Extracting chromite ore from Anatolian highland deposits for industrial use."
 STATIC_MODIFIER_NAME_nd_rum_guild_solidarity: "Guild Solidarity"
 STATIC_MODIFIER_DESC_nd_rum_guild_solidarity: "The Ahi brotherhoods bind communities together through shared craft, mutual aid, and armed civic defense — a network of solidarity that strengthens the social fabric of the realm."
 STATIC_MODIFIER_NAME_nd_rum_mevlevi_scholarship: "Mevlevi Scholarship"
 STATIC_MODIFIER_DESC_nd_rum_mevlevi_scholarship: "The Mevlevi libraries and schools attract scholars and poets from across the Islamic world, making the Sultanate a center of learning and artistic achievement."
 nd_rum_formed_tt: "Rum has been formed"
 nd_rum_path_a_tt: "Chose Sultan of Two Seas"
 nd_rum_path_b_tt: "Chose Crossroads of Civilizations"
 nd_rum_destiny: "Destiny of Rum"
 nd_rum_destiny_desc: "The Sultanate has been restored. Now choose the path that will define its legacy -- will you project power across two seas, or build the greatest crossroads of civilization the world has known?"
 nd_rum_dest_coasts: "Command the Coasts"
 nd_rum_dest_coasts_desc: "Secure the gateway cities that guard Anatolia's frontiers. Aleppo opens the road to Syria and the Levant, while Edirne commands the passage into Europe. With these anchors held, the Sultan of Two Seas begins to earn his title."
 nd_rum_dest_straits: "Master of the Straits"
 nd_rum_dest_straits_desc: "The city of Constantine and the seat of the Abbasid caliphs must both bow to the Sultan's banner. Constantinople commands the straits between Europe and Asia, while Baghdad anchors the eastern reaches of the Islamic world."
 nd_rum_dest_sultan: "Sultan of Sultans"
 nd_rum_dest_sultan_desc: "The ultimate aspiration of Turkic sovereignty -- to hold Cairo, Tabriz, and Mecca under one banner. The ruler who commands the Nile, the Caspian frontier, and the Holy Cities of Islam may rightly claim the title Sultan of Sultans."
 nd_rum_dest_silkroad: "Silk Road Revival"
 nd_rum_dest_silkroad_desc: "Anatolia sits at the western terminus of the ancient Silk Road. By developing banking institutions and ensuring silk flows through the capital market, the Sultanate can restore itself as the great commercial bridge between East and West."
 nd_rum_dest_emporium: "Emporium of the East"
 nd_rum_dest_emporium_desc: "The markets of Rum overflow with the riches of the world. Saffron from the Anatolian highlands joins silk, copper, and wool in bazaars that rival any in the world. A prosperous, developed realm that draws merchants from every land."
 nd_rum_dest_crossroads: "Light of Anatolia"
 nd_rum_dest_crossroads_desc: "The Sultanate stands at the pinnacle of civilization -- a realm where scientific inquiry, artistic achievement, and commercial prosperity have merged into something greater than any of its parts. The Light of Anatolia shines across the world."
 nd_rum.5.t: "The Destiny of Rum"
 nd_rum.5.d: "The Sultanate of Rum stands restored and stable, its lands united under a single sovereign. The ancient roads of Anatolia carry merchants and soldiers alike, and the medreses hum with scholarship. The realm's destiny now unfolds before us."
 nd_rum.5.a: "A new chapter begins."
 nd_rum.6.t: "The Coasts Secured"
 nd_rum.6.d: "The banner of the Sultanate flies over Aleppo and Edirne. From the minarets of Syria to the walls of Thrace, the Sultan's authority extends beyond the Anatolian heartland. The coastlines of the Mediterranean and the Black Sea lie open to our ambitions, and the title Sultan of Two Seas takes on new meaning."
 nd_rum.6.a: "The seas shall know our name."
 nd_rum.7.t: "Master of the Straits"
 nd_rum.7.d: "Constantinople and Baghdad have fallen to our armies. The city of emperors and the city of caliphs now answer to the Sultan of Rum. This dual conquest echoes the ambitions of the greatest Islamic empires -- shall we embrace the ghazi warrior spirit that won these cities, or forge a professional imperial guard worthy of ruling them?"
 nd_rum.7.a: "The ghazi spirit burns in our hearts."
 nd_rum.7.b: "An imperial guard shall defend our conquests."
 nd_rum.8.t: "Sultan of Sultans"
 nd_rum.8.d: "Cairo, Tabriz, and Mecca bow before our throne. The Nile's wealth, the Caspian frontier's strength, and the spiritual authority of the Holy Cities all converge in our realm. No sultan in the Islamic world commands such power or prestige. Shall we claim the universal sovereignty this position demands, or establish a lasting peace across the lands of Islam?"
 nd_rum.8.a: "We are the Universal Sultan."
 nd_rum.8.b: "Let us build a Pax Islamica."
 nd_rum.9.t: "The Silk Road Revived"
 nd_rum.9.d: "The caravanserais that dot the Anatolian landscape once more bustle with merchants bearing silk from the East. Our banking houses extend credit, our bazaars overflow with exotic goods, and the name of Rum is spoken with respect in trading houses from Venice to Samarkand. The old Silk Road lives again -- with our cities at its heart."
 nd_rum.9.a: "The wealth of nations flows through our hands."
 nd_rum.10.t: "The Great Emporium"
 nd_rum.10.d: "The markets of Rum have grown beyond mere way-stations on the Silk Road. Saffron, silk, wool, and copper pass through our bazaars in quantities that astonish foreign visitors. Our merchants have become powers unto themselves. Shall we empower these merchant princes to extend our commercial reach, or nurture the bazaar economy that makes our cities the envy of the world?"
 nd_rum.10.a: "Empower the merchant princes."
 nd_rum.10.b: "The bazaars are the heart of our wealth."
 nd_rum.11.t: "The Light of Anatolia"
 nd_rum.11.d: "The Sultanate of Rum stands as a beacon of civilization. Our scholars advance human knowledge, our artisans create works of enduring beauty, and our merchants connect the peoples of the world. Shall this flowering take the form of a great cultural and spiritual renaissance, or shall we build an empire of caravans that binds the continents together through trade?"
 nd_rum.11.a: "Let Anatolia's wisdom illuminate the world."
 nd_rum.11.b: "The caravans shall bind the world together."
 STATIC_MODIFIER_NAME_nd_rum_dest_ghazi_spirit: "Spirit of the Ghazi"
 STATIC_MODIFIER_DESC_nd_rum_dest_ghazi_spirit: "The holy warrior tradition of the frontier ghazis fuels our armies with righteous fervor, enabling them to recover quickly and fight with tireless determination."
 STATIC_MODIFIER_NAME_nd_rum_dest_imperial_guard: "Imperial Guard"
 STATIC_MODIFIER_DESC_nd_rum_dest_imperial_guard: "A professional imperial guard ensures military efficiency on land and sea, though maintaining such an elite force strains the treasury."
 STATIC_MODIFIER_NAME_nd_rum_dest_universal_sultan: "Universal Sultan"
 STATIC_MODIFIER_DESC_nd_rum_dest_universal_sultan: "The claim of universal sovereignty over the Islamic world commands the loyalty of subjects and the respect of rivals, though imperial ambition drives construction costs ever higher."
 STATIC_MODIFIER_NAME_nd_rum_dest_pax_islamica: "Pax Islamica"
 STATIC_MODIFIER_DESC_nd_rum_dest_pax_islamica: "The Sultan's peace extends across the lands of Islam, enabling devastated regions to recover, diverse peoples to integrate, and intelligence networks to reach every corner of the realm."
 STATIC_MODIFIER_NAME_nd_rum_dest_merchant_princes: "Merchant Princes of Rum"
 STATIC_MODIFIER_DESC_nd_rum_dest_merchant_princes: "The great merchants of the Sultanate wield influence rivaling that of nobles, expanding diplomatic reach and trade revenue -- though their commercial priorities sometimes divert resources from military supply."
 STATIC_MODIFIER_NAME_nd_rum_dest_bazaar_economy: "Bazaar Economy"
 STATIC_MODIFIER_DESC_nd_rum_dest_bazaar_economy: "The vibrant bazaar economy of Anatolia drives raw material production, builds naval tradition through coastal commerce, and gives our fleets the experience to enforce trade at sea."
 STATIC_MODIFIER_NAME_nd_rum_dest_anatolian_renaissance: "Anatolian Renaissance"
 STATIC_MODIFIER_DESC_nd_rum_dest_anatolian_renaissance: "A great cultural and spiritual flowering transforms the Sultanate, strengthening religious devotion, expanding governance capacity, and hardening the realm's defenses."
 STATIC_MODIFIER_NAME_nd_rum_dest_caravan_empire: "Caravan Empire"
 STATIC_MODIFIER_DESC_nd_rum_dest_caravan_empire: "A continental trade network that bridges faiths and civilizations, reducing the cost of wars across religious boundaries while enriching the merchant class and projecting naval power."
 nd_rum_imperial_divan: "Imperial Divan"
 nd_rum_imperial_divan_desc: "The supreme council of the Sultan of Sultans, where the fate of empires is decided. This grand hall of governance projects the authority of universal sovereignty across the Islamic world."
 nd_rum_house_of_wisdom: "House of Wisdom"
 nd_rum_house_of_wisdom_desc: "An academy of learning that gathers scholars, translators, and scientists from across the known world, reviving the spirit of the great Abbasid Bayt al-Hikma in the heart of Anatolia."
 nd_divan_upkeep: "Divan Administration"
 nd_divan_upkeep_desc: "Maintaining the supreme council of the Sultan of Sultans with fine documents, luxurious furnishings, and ceremonial cloth."
 nd_wisdom_upkeep: "Academy Upkeep"
 nd_wisdom_upkeep_desc: "Supplying an academy of learning with paper, scholarly books, and incense for the contemplative atmosphere of study."
