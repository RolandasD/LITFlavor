l_english:
 STATIC_MODIFIER_NAME_nd_sil_crossroads_of_crowns: "Crossroads of Three Crowns"
 STATIC_MODIFIER_DESC_nd_sil_crossroads_of_crowns: "Silesia has long stood at the intersection of Polish, Bohemian, and German worlds. Rather than being torn apart by these competing claims, we have made our multi-ethnic heritage a source of strength — welcoming settlers, mediating disputes, and governing through compromise."
 STATIC_MODIFIER_NAME_nd_sil_linen_and_silver: "The Linen and Silver Land"
 STATIC_MODIFIER_DESC_nd_sil_linen_and_silver: "The wealth of Silesia flows from the looms of its weavers and the depths of its mines. Our linen cloth reaches the markets of Amsterdam and London, while Silesian silver and lead fuel the mints of Central Europe. This is a land built on industry and enterprise."
 nd_sil.1.t: "The Duchy of Silesia"
 nd_sil.1.d: "The disparate Silesian duchies stand united at last under a single banner. For centuries this land has been divided among rival Piast branches, each petty duke guarding his patch of the Oder valley. Now the walled towns of Breslau, Schweidnitz, and Liegnitz answer to one authority.\n\nBut what kind of Silesia shall we build? Our duchy sits at the crossroads where Polish, Bohemian, and German cultures mingle — a place of many tongues and traditions, where Magdeburg law governs towns and Silesian linen reaches distant markets. Shall we embrace this diversity as our defining strength, governing through diplomacy and multi-ethnic tolerance? Or shall we look to the looms and mineshafts that have always been the true source of Silesian wealth, building an industrial heartland that rivals Flanders and Saxony?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_sil.1.a: "We are the bridge between three kingdoms."
 nd_sil.1.b: "Our wealth is woven in cloth and dug from stone."
 STATIC_MODIFIER_NAME_nd_sil_mongol_resilience: "Resilience of Legnica"
 STATIC_MODIFIER_DESC_nd_sil_mongol_resilience: "The memory of Duke Henry the Pious and his sacrifice against the Mongol horde steels our defenders. What was destroyed has been rebuilt stronger."
 STATIC_MODIFIER_NAME_nd_sil_mongol_remembrance: "Martyrdom of Henry the Pious"
 STATIC_MODIFIER_DESC_nd_sil_mongol_remembrance: "Duke Henry's death at Legnica made him a Christian martyr and a symbol of Silesian defiance. His sacrifice brought pilgrims, prestige, and renewed devotion to our land's defense."
 nd_sil.2.t: "The Shadow of Legnica"
 nd_sil.2.d: "In the spring of 1241, the Mongol tumens swept through Silesia like a brushfire. At Legnica, Duke Henry II the Pious gathered what forces he could — Silesian knights, Templar brothers, Bavarian miners turned soldiers — and rode out to meet the horde. The battle was a catastrophe. Henry was killed, his head paraded on a Mongol lance. Yet the Mongols did not stay. Whether turned back by their losses or called east by the death of the Great Khan, they withdrew, leaving Silesia devastated but unconquered.\n\nThe memory of Legnica burns in Silesian consciousness. Shall we honor Henry's sacrifice by hardening our defenses so thoroughly that no invader will ever breach them again? Or shall we make the martyred duke a symbol of our eternal defiance — a rallying cry that draws warriors and pilgrims alike to our banner?"
 nd_sil.2.a: "Never again shall Silesia fall."
 nd_sil.2.b: "Henry's sacrifice shall inspire generations."
 STATIC_MODIFIER_NAME_nd_sil_protestant_zeal: "Silesian Protestant Fervor"
 STATIC_MODIFIER_DESC_nd_sil_protestant_zeal: "The Reformation has swept through Breslau's churches with the passion of true conviction. Johann Hess's sermons echo in every parish, and the faithful look to Silesia as a bastion of the new faith."
 STATIC_MODIFIER_NAME_nd_sil_silesian_tolerance: "Silesian Religious Pluralism"
 STATIC_MODIFIER_DESC_nd_sil_silesian_tolerance: "In a land where Catholic Cathedral Island and Protestant merchant quarters share the same city, Silesia has learned that coexistence breeds prosperity. Our scholars debate freely and our traders welcome all."
 nd_sil.3.t: "The Reformation in Breslau"
 nd_sil.3.d: "In 1523, the Breslau town council unanimously appointed Johann Hess — a student of Wittenberg and close friend of Melanchthon — as pastor of St. Maria Magdalena. Within a few years, nearly every church in Breslau turned Protestant, save the ancient cathedral on its island. The city became a beacon of the Reformation in the east, drawing scholars and preachers from across the Empire.\n\nYet Silesia's religious geography is complex. Catholic orders still hold their monasteries, Schwenckfelder mystics preach in the countryside, and the Habsburg overlords eye this Protestant surge with growing alarm. Shall we embrace the Reformation with evangelical zeal, making Breslau a fortress of the new faith? Or shall we follow the Silesian instinct for accommodation, letting Protestant and Catholic, mystic and rationalist, coexist in a land that has always thrived on diversity?"
 nd_sil.3.a: "Breslau shall be a city of the true faith."
 nd_sil.3.b: "Let all who seek truth find welcome here."
 STATIC_MODIFIER_NAME_nd_sil_weavers_concessions: "Weavers' Compact"
 STATIC_MODIFIER_DESC_nd_sil_weavers_concessions: "The uprising of the Silesian weavers has forced our hand — but concessions to the laboring poor may yet prove the wiser path. A satisfied workforce weaves faster and better."
 STATIC_MODIFIER_NAME_nd_sil_industrial_discipline: "Industrial Order"
 STATIC_MODIFIER_DESC_nd_sil_industrial_discipline: "The weavers' revolt has been crushed. Order must be maintained in the workshops, and the looms must not fall silent. Silesian cloth will continue to reach every market in Europe."
 nd_sil.4.t: "The Silesian Weavers' Uprising"
 nd_sil.4.d: "In the hill country around Peterswaldau and Langenbielau, the linen weavers have risen in desperate fury. For generations these cottage workers were the backbone of Silesian prosperity — their cloth exported to England, the Netherlands, and the distant colonies. But mechanized competition from British factories has driven prices into the ground, while merchants squeeze ever harder. The weavers, reduced to starvation wages, have smashed the merchants' houses and destroyed their account books.\n\nThe uprising has been put down by Prussian troops, but the underlying tension remains. Shall we make concessions to the working poor — better wages, regulated conditions — accepting that a content workforce is a productive one? Or shall we restore order with an iron hand, ensuring that Silesian industry maintains its discipline and its competitive edge in the global marketplace?"
 nd_sil.4.a: "Grant the weavers dignity, and they will weave with pride."
 nd_sil.4.b: "The looms of Silesia shall not be stilled by disorder."
 nd_sil_piast_fortifications: "Piast Fortifications"
 nd_sil_piast_fortifications_desc: "The Silesian Piast dukes raised stone strongholds across their duchies, from Wroclaw's castle to the hill forts of the Sudeten foothills, creating a network of defensive positions against Mongol, Hussite, and rival claimants alike."
 nd_sil_legnica_legacy: "Legacy of Legnica"
 nd_sil_legnica_legacy_desc: "The Battle of Legnica in 1241 defined Silesia's martial identity. Duke Henry the Pious's cavalry charge against the Mongol vanguard, though doomed, demonstrated the Piast tradition of mounted warfare that characterized Silesian military culture."
 nd_sil_oder_commerce: "Oder River Commerce"
 nd_sil_oder_commerce_desc: "The River Oder forms the commercial spine of Silesia, carrying grain, timber, and cloth downstream to the Baltic ports and bringing salt, herring, and foreign luxuries upstream to Breslau's bustling markets."
 nd_sil_magdeburg_law: "Silesian Magdeburg Law"
 nd_sil_magdeburg_law_desc: "The Piast dukes invited German settlers to Silesia under Magdeburg law, granting towns self-governance, market rights, and judicial independence. This legal framework transformed Silesian settlements into prosperous urban centers."
 nd_sil_piast_fragmentation: "Piast Fragmentation"
 nd_sil_piast_fragmentation_desc: "The division of Silesia among rival Piast branches — at one point numbering seventeen separate duchies — bred a peculiar political culture: endless negotiation, flexible allegiances, and a talent for managing diversity that served Silesia well under larger empires."
 nd_sil_linen_weaving: "Silesian Linen Weaving"
 nd_sil_linen_weaving_desc: "From the sixteenth century onward, Silesian linen became a prized commodity across Europe. Village weavers in the Sudeten foothills produced cloth that rivaled Flemish and Irish linen, exported through merchant networks to markets as far as the Americas."
 nd_sil_urban_militia: "Urban Militia Tradition"
 nd_sil_urban_militia_desc: "The walled towns of Silesia maintained citizen militias armed with crossbows and later handguns. These burghers defended their market privileges with the same tenacity they applied to commerce, forming a reliable urban defense force."
 nd_sil_breslau_emporium: "Breslau Emporium"
 nd_sil_breslau_emporium_desc: "Breslau sat astride the junction of the Amber Road and the Via Regia, making it one of Central Europe's great trading cities. Its cloth halls, salt markets, and commodity exchanges connected the Baltic to the Mediterranean."
 nd_sil_hussite_defenses: "Hussite Defenses"
 nd_sil_hussite_defenses_desc: "The devastating Hussite raids of the 1420s and 1430s — which destroyed over thirty Silesian towns — forced a comprehensive rebuilding of urban fortifications. Stone walls, reinforced gates, and permanent garrisons became standard across the duchy."
 nd_sil_crown_land_admin: "Crown Land Administration"
 nd_sil_crown_land_admin_desc: "When Silesia passed to the Bohemian Crown in 1335 and later to the Habsburgs, its governance was reorganized under centralized administrative systems that brought fiscal efficiency and legal uniformity to the formerly fragmented duchy."
 nd_sil_silver_lead_mines: "Silver and Lead Mines"
 nd_sil_silver_lead_mines_desc: "The mountains of Upper Silesia yielded rich deposits of silver and lead, worked by skilled miners using increasingly sophisticated techniques. Tarnowitz and other mining towns became centers of metallurgical expertise."
 nd_sil_oder_trade_tradition: "Oder Trade Network"
 nd_sil_oder_trade_tradition_desc: "Breslau's position on the Oder River, combined with its membership in the Hanseatic League, created a vast trade network linking Silesian cloth and mineral wealth to Baltic commerce, Bohemian markets, and Italian banking houses."
 nd_sil_landsknechte_tradition: "Silesian Landsknechte"
 nd_sil_landsknechte_tradition_desc: "Silesian towns contributed disciplined pike-and-shot infantry to Imperial armies, drawing on the German military tradition of the Landsknechte. These professional soldiers brought the latest tactical innovations to Silesian warfare."
 nd_sil_three_crown_diplomacy: "Three Crown Diplomacy"
 nd_sil_three_crown_diplomacy_desc: "Silesia's position between the Polish, Bohemian, and Imperial crowns demanded exceptional diplomatic skill. Silesian dukes and town councils became adept at playing one overlord against another, extracting privileges through careful negotiation."
 nd_sil_silesian_printing: "Silesian Printing Press"
 nd_sil_silesian_printing_desc: "The introduction of printing to Breslau in the late fifteenth century catalyzed Silesian intellectual life. Protestant tracts, scholarly works, and commercial records flowed from Silesian presses, making the duchy a center of Central European learning."
 nd_sil_breslau_reformation: "Breslau Reformation"
 nd_sil_breslau_reformation_desc: "Johann Hess's appointment in 1523 transformed Breslau into an eastern bastion of Protestantism. The city's churches converted en masse, and Silesia became one of the most religiously contested territories in the Empire."
 nd_sil_mountain_jaegers: "Silesian Mountain Jaegers"
 nd_sil_mountain_jaegers_desc: "The forested mountains of the Sudeten range bred skilled hunters and woodsmen who, trained in skirmish tactics, became effective light infantry. These Silesian Jaegers excelled at ambush and irregular warfare in broken terrain."
 nd_sil_linen_export_boom: "Linen Export Boom"
 nd_sil_linen_export_boom_desc: "By the seventeenth century, Silesian linen dominated European markets. Merchants from Schweidnitz organized purchase networks reaching every cottage loom in the mountain villages, while export agents shipped cloth to Holland, England, Spain, and their colonial empires."
 nd_sil_habsburg_governance: "Habsburg Governance"
 nd_sil_habsburg_governance_desc: "Under Habsburg administration from 1526, Silesia was incorporated into the complex bureaucratic machinery of the Austrian Monarchy. Imperial officials, tax collectors, and legal reforms brought centralized governance to the formerly autonomous principalities."
 nd_sil_religious_coexistence: "Silesian Religious Coexistence"
 nd_sil_religious_coexistence_desc: "The Treaty of Altranstadt in 1707 secured Protestant worship rights in Silesia, codifying a tradition of religious coexistence that had deep roots in the duchy's multi-ethnic character. Catholic, Protestant, and Schwenckfelder communities learned to share the same valleys."
 nd_sil_upper_silesian_coal: "Upper Silesian Coal"
 nd_sil_upper_silesian_coal_desc: "The vast coal deposits of Upper Silesia began to be systematically exploited in the late eighteenth century, powered by the first steam engines in the region. This black wealth would transform Silesia into one of Central Europe's great industrial zones."
 nd_sil_fusilier_tradition: "Silesian Fusilier Tradition"
 nd_sil_fusilier_tradition_desc: "The Silesian Wars between Prussia and Austria made the duchy a crucible of military innovation. Silesian regiments, drilled in the Frederician system, became some of the finest line infantry in Europe."
 nd_sil_breslau_university: "Breslau University"
 nd_sil_breslau_university_desc: "The Jesuit university founded in 1702, and its later merger with the Protestant Viadrina in 1811, created a powerhouse of learning that attracted scholars from across the German-speaking world."
 nd_sil_contested_borderland: "Contested Borderland"
 nd_sil_contested_borderland_desc: "The three Silesian Wars between Frederick the Great and Maria Theresa made the duchy Europe's most fought-over territory. This constant militarization forged a hardened populace accustomed to the demands of war."
 nd_sil_linen_monopoly: "Silesian Linen Monopoly"
 nd_sil_linen_monopoly_desc: "At its peak, Silesian linen was exported to England, the Netherlands, France, Spain, Portugal, Scandinavia, Russia, Turkey, and even the markets of Africa and the Americas — a proto-industrial achievement rivaling any in Europe."
 nd_sil_industrial_silesia: "Industrial Silesia"
 nd_sil_industrial_silesia_desc: "The mechanization of Silesian industry — steam-powered looms replacing cottage weavers, coal-fired furnaces replacing charcoal — transformed the duchy into one of the great industrial regions of nineteenth-century Europe."
 nd_sil_weavers_revolt: "Weavers' Revolt"
 nd_sil_weavers_revolt_desc: "The desperate uprising of Silesian linen weavers in 1844, crushed by Prussian troops, became a symbol of the human cost of industrialization and inspired generations of social reformers and labor organizers."
 nd_sil_iron_and_steel: "Silesian Iron and Steel"
 nd_sil_iron_and_steel_desc: "Upper Silesia's combination of coal, iron ore, and zinc deposits created a heavy industrial complex that rivaled the Ruhr. Steelworks and foundries transformed the landscape and drew workers from across Central Europe."
 nd_sil_enlightened_breslau: "Enlightened Breslau"
 nd_sil_enlightened_breslau_desc: "Breslau's salons, theaters, and publishing houses made it one of the cultural capitals of eastern Germany. The city nurtured poets, philosophers, and scientists who contributed to the broader Enlightenment."
 nd_sil_national_awakening: "Silesian National Awakening"
 nd_sil_national_awakening_desc: "The nineteenth century brought competing Polish and German national movements to Silesia, each claiming the duchy's heritage. This awakening of national consciousness reshaped Silesian identity and its relationship with neighboring states."
 a_nd_sil_piast_lancers: "Silesian Piast Lancers"
 a_nd_sil_piast_lancers_desc: "Light cavalry descended from the Piast ducal retinues, skilled at raiding and reconnaissance across the Oder valley."
 a_nd_sil_crossbowmen: "Silesian Crossbowmen"
 a_nd_sil_crossbowmen_desc: "Burgher militia armed with crossbows, drawn from the fortified towns of Breslau, Schweidnitz, and Liegnitz."
 a_nd_sil_jaegers: "Silesian Jaegers"
 a_nd_sil_jaegers_desc: "Light infantry skirmishers recruited from the hunters and woodsmen of the Sudeten mountain forests."
 a_nd_sil_fusiliers: "Silesian Fusiliers"
 a_nd_sil_fusiliers_desc: "Line infantry drilled in the exacting traditions of Frederick's Silesian campaigns, steady under fire and precise in volley."
 nd_sil_ducal_stronghold: "Silesian Ducal Stronghold"
 nd_sil_ducal_stronghold_desc: "A fortified residence of the Piast dukes, combining administrative center with military garrison. These strongholds anchored Silesian defense against Mongol, Hussite, and rival incursions."
 nd_sil_ducal_stronghold_upkeep: "Garrison Maintenance"
 nd_sil_ducal_stronghold_upkeep_desc: "Stone, weapons, and tools to maintain the ducal stronghold's garrison and defenses."
 nd_sil_linen_workshop: "Silesian Linen Workshop"
 nd_sil_linen_workshop_desc: "A weaving workshop producing fine Silesian linen cloth for export. Village looms and urban finishing houses work together to create textiles prized across European markets."
 nd_sil_linen_workshop_upkeep: "Linen Production"
 nd_sil_linen_workshop_upkeep_desc: "Flax fibers and dyes transformed into Silesian linen cloth on village looms."
 nd_sil_mining_pit: "Silesian Mining Pit"
 nd_sil_mining_pit_desc: "A silver and lead mining operation in the Upper Silesian mountains, employing skilled miners and increasingly sophisticated extraction techniques."
 nd_sil_mining_pit_upkeep: "Mining Operations"
 nd_sil_mining_pit_upkeep_desc: "Timber for pit props and iron for tools sustain the mining operations."
 nd_sil_breslau_kontor: "Breslau Trade Kontor"
 nd_sil_breslau_kontor_desc: "A merchant trading house in the Hanseatic tradition, channeling the east-west commerce that flows through Breslau's position at the crossroads of the Amber Road and Via Regia."
 nd_sil_breslau_kontor_upkeep: "Trade Operations"
 nd_sil_breslau_kontor_upkeep_desc: "Cloth, paper, and salt consumed in maintaining commercial records, sample inventories, and trade operations."
 nd_sil_protestant_academy: "Silesian Protestant Academy"
 nd_sil_protestant_academy_desc: "An educational institution born of the Reformation, training clergy, teachers, and civic leaders in Protestant theology and humanist learning."
 nd_sil_protestant_academy_upkeep: "Academic Expenses"
 nd_sil_protestant_academy_upkeep_desc: "Paper, books, and candles for teaching, scholarly correspondence, and the publication of Protestant tracts."
 nd_sil_coal_works: "Silesian Coal Works"
 nd_sil_coal_works_desc: "An early industrial coal mining operation in Upper Silesia, exploiting the vast deposits that would make the region one of Central Europe's great industrial zones."
 nd_sil_coal_works_upkeep: "Mining Equipment"
 nd_sil_coal_works_upkeep_desc: "Timber and iron for pit props, tools, and the steam engines that pump water from the deep shafts."
 nd_sil_mechanized_mill: "Silesian Mechanized Mill"
 nd_sil_mechanized_mill_desc: "A steam-powered textile factory representing the transformation of Silesian industry from cottage weaving to mechanized production."
 nd_sil_mechanized_mill_upkeep: "Factory Operations"
 nd_sil_mechanized_mill_upkeep_desc: "Coal-fired steam engines drive the mechanized looms that weave flax fibers into cloth at industrial scale."
 levy_nd_sil_piast_lancers: "Silesian Piast Lancers"
 levy_nd_sil_piast_lancers_desc: "Mounted retainers of the Silesian Piast dukes, raised from the nobility and professional soldiers."
 levy_nd_sil_crossbowmen: "Silesian Town Crossbowmen"
 levy_nd_sil_crossbowmen_desc: "Urban militia raised from the burgher class and garrison soldiers of Silesia's fortified trading towns."
 nd_sil_linen_finishing: "Silesian Linen Finishing"
 nd_sil_linen_finishing_desc: "Fine bleaching and finishing techniques that give Silesian linen its distinctive quality and sheen."
 nd_sil_beer_brewing: "Silesian Beer Brewing"
 nd_sil_beer_brewing_desc: "Traditional Silesian brewing using local grain and timber, producing the ales and lagers that sustain workers and fill taverns."
 nd_sil_glassmaking: "Silesian Glass Making"
 nd_sil_glassmaking_desc: "The Sudeten mountain glassmakers craft vessels, windows, and decorative objects using forest timber, sand, and local minerals."
 nd_sil_iron_smelting: "Silesian Iron Smelting"
 nd_sil_iron_smelting_desc: "Coal-fired ironworks transforming Upper Silesian ore into pig iron and steel for construction, armaments, and industry."
 nd_sil_formed_tt: "Silesia has been formed"
 nd_sil_path_a_tt: "Chose Crossroads of Three Crowns"
 nd_sil_path_b_tt: "Chose The Linen and Silver Land"
 nd_sil_destiny: "Silesian Destiny"
 nd_sil_destiny_desc: "United Silesia stands ready to chart its course. The fractured Piast duchies have been forged into a single state, and now the question is what kind of power Silesia will become."
 nd_sil_dest_three_crowns_1: "The Polish Crown"
 nd_sil_dest_three_crowns_1_desc: "Silesia's oldest ties run south and east to Krakow, seat of the Piast kings who once ruled these lands. To prove ourselves as a bridge between kingdoms, we must first reclaim the city where Silesian and Polish history began."
 nd_sil_dest_three_crowns_2: "The Bohemian Crown"
 nd_sil_dest_three_crowns_2_desc: "Prague beckons. The Bohemian Crown has claimed Silesia since 1335, and now we shall reverse that relationship. Control the golden city and its banking houses, and Central European politics shall bend to Silesian diplomacy."
 nd_sil_dest_three_crowns_3: "The Imperial Crown"
 nd_sil_dest_three_crowns_3_desc: "Vienna, seat of the Habsburgs and the Imperial Diet, is the ultimate prize. Only by placing all three crown cities under Silesian authority can we fulfill the destiny of the crossroads state — not a subject of empires, but their arbiter."
 nd_sil_dest_industry_1: "Bohemian Silver"
 nd_sil_dest_industry_1_desc: "The legendary silver mines of Kutna Hora have bankrolled Bohemian kings for centuries. Extending Silesian control over these mines would unite the richest mining districts in Central Europe under one administration."
 nd_sil_dest_industry_2: "Baltic Trade"
 nd_sil_dest_industry_2_desc: "The Oder carries our linen north, but the Baltic trade is dominated by Lubeck and its Hanseatic partners. To become a true commercial power, Silesia must seize the Baltic gateway and control the entire chain from loom to ship."
 nd_sil_dest_industry_3: "Industrial Heartland"
 nd_sil_dest_industry_3_desc: "Leipzig's trade fairs draw merchants from across Europe. Combined with Silesian coal, iron, and linen, control of this commercial hub would make our industrial heartland the workshop of Central Europe."
 nd_sil.5.t: "The Silesian Destiny"
 nd_sil.5.d: "The duchy stands united and our course is set. Whether through diplomacy between crowns or the wealth of looms and mineshafts, Silesia shall rise to its full potential. The traditions of the Piast dukes — their fortitude, their enterprise, their talent for governing diversity — shall carry us forward into a new era."
 nd_sil.5.a: "Silesia shall fulfill its destiny."
 nd_sil.6.t: "Krakow Falls to Silesian Arms"
 nd_sil.6.d: "The ancient capital of the Piast kings now flies the Silesian banner. Krakow, where Boleslaw the Brave was crowned and where generations of Polish monarchs held court, has passed under our authority. It is a potent symbol — the branch of the Piast dynasty that ruled Silesia has now reclaimed the seat of its ancestors.\n\nThe Polish crown, once Silesia's overlord, must now reckon with a Silesian state that controls the headwaters of both the Oder and the Vistula."
 nd_sil.6.a: "The Piast legacy is restored."
 nd_sil.7.t: "Prague Under Silesian Suzerainty"
 nd_sil.7.d: "Two of the three crowns are ours. Prague, the golden city on the Moldau, whose Bohemian kings once summoned Silesian dukes to pay homage, now answers to Breslau. The reversal is extraordinary — from vassal to overlord in the span of generations.\n\nWith Prague comes its chancery, its banking houses, and its centuries of administrative tradition. Shall we absorb the Bohemian bureaucratic apparatus to run our growing realm with precision? Or shall we embrace the martial legacy of the Hussite wars, drawing on Bohemia's proven military traditions to forge an army that can challenge any power in Central Europe?"
 nd_sil.7.a: "Absorb the Bohemian chancery."
 nd_sil.7.b: "Embrace the Hussite military legacy."
 nd_sil.8.t: "Arbiter of Three Crowns"
 nd_sil.8.d: "Vienna is ours. The seat of Habsburg power, the capital of the Holy Roman Empire, the city that has dictated Central European politics for centuries — all under the Silesian banner. From Krakow to Prague to Vienna, the three crowns that once competed for control of Silesia now answer to it.\n\nThis is unprecedented. A duchy once divided among seventeen petty princes has become the paramount power of Central Europe. Shall we use this position to become the Empire's supreme arbitrator, settling disputes from the Baltic to the Adriatic through diplomacy? Or shall we embrace the reality of our new power and forge a Central European hegemony backed by overwhelming military might?"
 nd_sil.8.a: "We shall be the Empire's just arbiter."
 nd_sil.8.b: "Central Europe bows to Silesian might."
 nd_sil.9.t: "The Mines of Kutna Hora"
 nd_sil.9.d: "Silesian miners now work alongside their Bohemian counterparts in the legendary silver mines of Kutna Hora. For centuries, the groschen minted from this silver financed Bohemian kings and paid Imperial armies. Now that wealth flows through Silesian banks and Silesian counting houses.\n\nCombined with our own mines at Tarnowitz and Zlotoryja, Silesia now controls the richest mineral belt in Central Europe. The looms and the mines — the twin pillars of Silesian prosperity — grow stronger together."
 nd_sil.9.a: "Silver from Bohemia, linen from Silesia."
 nd_sil.10.t: "Silesian Ships in Lubeck Harbor"
 nd_sil.10.d: "The great Hanseatic port of Lubeck answers to Silesia. For the first time, the linen and minerals that flow down the Oder need not pass through middlemen to reach the Atlantic markets — our own merchants control the entire chain from workshop to wharf.\n\nShall we claim the old Hanseatic trading privileges for ourselves, opening our markets to the free flow of Baltic commerce? Or shall we exploit our monopoly over the Oder shipping route, taxing every bale of cloth and barrel of goods that passes between Silesia and the sea?"
 nd_sil.10.a: "Claim the Hanseatic privileges."
 nd_sil.10.b: "Monopolize the Oder shipping route."
 nd_sil.11.t: "The Workshop of Central Europe"
 nd_sil.11.d: "Leipzig's great trade fairs — the Michaelmas Fair, the Easter Fair, the New Year Fair — now serve as the showroom for Silesian industry. Coal from Upper Silesia fires the furnaces, iron feeds the forges, and linen drapes the stalls. Our industrial heartland stretches from the Sudeten mountains to the Saxon plain.\n\nThis is the apex of the Silesian economic miracle. Shall we entrust this vast industrial complex to the factory owners and mine operators, letting their capital and ambition drive relentless growth? Or shall we foster a spirit of merchant enterprise, keeping commerce open, credit cheap, and markets competitive?"
 nd_sil.11.a: "Let the factory lords lead our growth."
 nd_sil.11.b: "Commerce and enterprise shall be our way."
 STATIC_MODIFIER_NAME_nd_sil_dest_bohemian_chancellery: "Bohemian Chancellery"
 STATIC_MODIFIER_DESC_nd_sil_dest_bohemian_chancellery: "The administrative apparatus of the Bohemian crown has been integrated into Silesian governance, bringing centuries of bureaucratic expertise to our growing realm."
 STATIC_MODIFIER_NAME_nd_sil_dest_hussite_alliance: "Hussite Military Legacy"
 STATIC_MODIFIER_DESC_nd_sil_dest_hussite_alliance: "The martial traditions of the Hussite wars have been absorbed into Silesian military doctrine. Wagon forts, aggressive siege tactics, and the fighting spirit of Zizka's heirs strengthen our armies."
 STATIC_MODIFIER_NAME_nd_sil_dest_imperial_arbitrator: "Imperial Arbitrator"
 STATIC_MODIFIER_DESC_nd_sil_dest_imperial_arbitrator: "Silesia's control of all three crown cities makes it the natural arbiter of Central European disputes. Our diplomats settle conflicts from the Baltic to the Alps."
 STATIC_MODIFIER_NAME_nd_sil_dest_central_european_hegemon: "Central European Hegemon"
 STATIC_MODIFIER_DESC_nd_sil_dest_central_european_hegemon: "The combined manpower and resources of three kingdoms sustain a military establishment that no Central European power can challenge. Silesian hegemony is maintained by the sword."
 STATIC_MODIFIER_NAME_nd_sil_dest_hanseatic_privileges: "Hanseatic Privileges"
 STATIC_MODIFIER_DESC_nd_sil_dest_hanseatic_privileges: "The old Hanseatic trading rights and market privileges now serve Silesian merchants, opening the ports of the Baltic to our linen, minerals, and manufactured goods."
 STATIC_MODIFIER_NAME_nd_sil_dest_oder_shipping_monopoly: "Oder Shipping Monopoly"
 STATIC_MODIFIER_DESC_nd_sil_dest_oder_shipping_monopoly: "Control of the entire Oder waterway from source to sea gives Silesia a stranglehold on Central European north-south commerce. Every merchant pays the Silesian toll."
 STATIC_MODIFIER_NAME_nd_sil_dest_factory_lords: "Factory Lords"
 STATIC_MODIFIER_DESC_nd_sil_dest_factory_lords: "The great industrialists of Upper Silesia drive relentless expansion, building factories, sinking mines, and drawing workers from across Central Europe. Growth comes at the price of social complacency."
 STATIC_MODIFIER_NAME_nd_sil_dest_merchant_republic_spirit: "Merchant Republic Spirit"
 STATIC_MODIFIER_DESC_nd_sil_dest_merchant_republic_spirit: "The old Breslau tradition of merchant self-governance has been extended across the Silesian industrial heartland. Cheap credit, mercenary protection, and liberal commerce fuel sustained prosperity."
 nd_sil_diplomatic_residence: "Silesian Diplomatic Residence"
 nd_sil_diplomatic_residence_desc: "A palatial residence in the heart of Breslau hosting ambassadors from across Central Europe. This grand building serves as the neutral ground where the affairs of three crowns are settled."
 nd_sil_diplomatic_residence_upkeep: "Diplomatic Expenses"
 nd_sil_diplomatic_residence_upkeep_desc: "Fine cloth, paper, and furnishings consumed in the constant round of diplomatic receptions and negotiations."
 nd_sil_trade_hall: "Silesian Trade Hall"
 nd_sil_trade_hall_desc: "A grand commercial exchange where Silesian cloth, minerals, and manufactured goods are traded alongside Baltic commodities. The beating heart of the Central European economy."
 nd_sil_trade_hall_upkeep: "Commercial Operations"
 nd_sil_trade_hall_upkeep_desc: "Paper records, cloth samples, and tools for weighing and measuring sustain the daily operations of the exchange."
