l_english:
 STATIC_MODIFIER_NAME_nd_sca_lords_of_the_northern_seas: "Lords of the Northern Seas"
 STATIC_MODIFIER_DESC_nd_sca_lords_of_the_northern_seas: "The united North commands the waters from the Arctic to the Baltic. Our keels cut every wave, our merchants fill every harbor, and our warships guard the narrow straits that all must pass."
 STATIC_MODIFIER_NAME_nd_sca_all_thing_of_the_north: "All-Thing of the North"
 STATIC_MODIFIER_DESC_nd_sca_all_thing_of_the_north: "From the ancient Thing assemblies to the council chambers of the union, Scandinavians have governed by consent and law. This realm is bound not by conquest alone but by shared custom and the voice of free men."
 nd_sca.1.t: "The Unification of Scandinavia"
 nd_sca.1.d: "The dream that Margaret I once held — a single crown uniting Denmark, Norway, and Sweden — has been realized anew. Where the Kalmar Union was undone by rivalry and distance, this Scandinavian realm stands on firmer foundations. From the herring-rich waters of the Sound to the iron mountains of Bergslagen, from the fjords of Norway to the forests of Finland, one people now speaks with one voice.\n\nBut what voice shall it be? Shall we look outward, as our Viking ancestors did, commanding the seas and building an empire of trade and sail? Or shall we look inward, binding our diverse peoples through the ancient tradition of the Thing — governance by assembly, law, and consent?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_sca.1.a: "Our destiny lies upon the waves."
 nd_sca.1.b: "Law and assembly shall unite us."
 STATIC_MODIFIER_NAME_nd_sca_reformation_zeal: "Reformation Zeal"
 STATIC_MODIFIER_DESC_nd_sca_reformation_zeal: "The pure word of the Gospel, preached in the tongues of the North, has swept away the old Latin church. Our people worship with renewed conviction."
 STATIC_MODIFIER_NAME_nd_sca_crown_over_church: "Crown Over Church"
 STATIC_MODIFIER_DESC_nd_sca_crown_over_church: "By seizing church lands and placing bishops under royal authority, the Scandinavian crown has gained vast wealth and unchallenged control over the spiritual life of the realm."
 nd_sca.2.t: "The Northern Reformation"
 nd_sca.2.d: "The winds of religious reform sweeping through Europe have found fertile ground in Scandinavia. Following the lead of Martin Luther, reformers like Hans Tausen in Denmark and Olaus Petri in Sweden have translated scripture into the vernacular tongues of the North. The old Catholic hierarchy, already weakened by distance from Rome and the independence of Nordic bishops, has crumbled before the new faith.\n\nChristian III of Denmark and Gustav Vasa of Sweden have both seen the political advantages of reform — vast church lands can be seized for the crown, and national churches under royal control strengthen state authority. But the Reformation is more than a land grab. For common Scandinavians, hearing the Gospel in their own language for the first time is a profound spiritual experience.\n\nHow shall this united North shape its reformed church?"
 nd_sca.2.a: "Let the Gospel be preached in every northern tongue."
 nd_sca.2.b: "The church's wealth belongs to the crown."
 STATIC_MODIFIER_NAME_nd_sca_carolean_fury: "Carolean Fury"
 STATIC_MODIFIER_DESC_nd_sca_carolean_fury: "The Carolean method — cold steel and unflinching advance under fire — has made Scandinavian infantry the terror of European battlefields."
 STATIC_MODIFIER_NAME_nd_sca_allotment_discipline: "Allotment Discipline"
 STATIC_MODIFIER_DESC_nd_sca_allotment_discipline: "Through the allotment system, every farm district maintains a soldier in peacetime and fields him in war. The realm can mobilize with remarkable speed and at minimal cost."
 nd_sca.3.t: "The Carolean Legacy"
 nd_sca.3.d: "Under Charles XI and Charles XII, Sweden forged a military machine unlike any in Europe. The Caroleans — named for their warrior-kings — are not mere conscripts but semi-professional soldiers raised through the indelningsverket, the allotment system. Each regiment draws from a specific province, with farms grouped to support and equip a single soldier who trains year-round on crown land.\n\nOn the battlefield, Carolean tactics reject the European trend toward static volley fire. Instead, Swedish infantry advances in silence under enemy musketry until close range, then delivers a single devastating volley followed by an immediate bayonet and pike charge — the infamous ga-pa doctrine. At Narva, eight thousand Caroleans shattered a Russian army of forty thousand.\n\nHow shall Scandinavia carry this martial legacy forward?"
 nd_sca.3.a: "The ga-pa shall break any line!"
 nd_sca.3.b: "The allotment system is our true strength."
 nd_sca.4.t: "The Great Copper Mountain"
 nd_sca.4.d: "For centuries, the copper mine at Falun has been the treasury of the North. At its peak in the mid-seventeenth century, the Great Copper Mountain produced two-thirds of all the copper in Europe. The Privy Council called it the realm's strongest fortification — not of stone, but of coin. Swedish wars, diplomacy, and state-building were financed by Falun's endless seams of ore.\n\nThe fire-setting method — enormous bonfires lit deep underground to crack the rock — has carved out chambers of cathedral proportions. When the great cave-in of 1687 opened a pit visible for miles, it only revealed how much had already been extracted. The mine endures, a monument to Nordic industry and the patient extraction of wealth from unyielding stone."
 nd_sca.4.a: "The mountain's wealth serves the realm."
 nd_sca_thing_assemblies: "Thing Assemblies"
 nd_sca_thing_assemblies_desc: "The Scandinavian tradition of the Thing — open-air assemblies where free men gathered to settle disputes, declare law, and choose leaders — shaped governance across the Norse world."
 nd_sca_viking_seamanship: "Viking Seamanship"
 nd_sca_viking_seamanship_desc: "Generations of Norse seafaring skill, honed on the open Atlantic and Baltic, live on in the shipbuilding traditions and navigational knowledge of the Scandinavian peoples."
 nd_sca_stave_church_tradition: "Stave Church Tradition"
 nd_sca_stave_church_tradition_desc: "The wooden stave churches of Norway and Sweden, blending Christian devotion with Norse craftsmanship, stand as monuments to Scandinavia's unique cultural synthesis."
 nd_sca_norse_runic_legacy: "Norse Runic Legacy"
 nd_sca_norse_runic_legacy_desc: "The runic tradition of the North — from memorial stones to administrative records — fostered a culture of literacy and record-keeping that predates Latin learning in Scandinavia."
 nd_sca_allodial_rights: "Allodial Rights"
 nd_sca_allodial_rights_desc: "The Scandinavian tradition of odelsrett — the right of families to own and inherit land free from feudal obligation — created a class of independent freeholders unmatched in Europe."
 nd_sca_herring_markets: "Herring Markets"
 nd_sca_herring_markets_desc: "The great herring markets of Scania drew merchants from across Northern Europe, making the salted herring trade one of the foundations of Scandinavian commerce."
 nd_sca_bergslagen_ironworks: "Bergslagen Ironworks"
 nd_sca_bergslagen_ironworks_desc: "The iron and copper mines of the Bergslagen district in central Sweden have supplied raw materials for tools, weapons, and export since the medieval period."
 nd_sca_hanseatic_challenge: "Hanseatic Challenge"
 nd_sca_hanseatic_challenge_desc: "By breaking the commercial stranglehold of the Hanseatic League, Scandinavian merchants established their own trading networks across the Baltic and North Sea."
 nd_sca_nordic_law_codes: "Nordic Law Codes"
 nd_sca_nordic_law_codes_desc: "The codification of Nordic provincial laws — from Magnus Lagabote's Norwegian national code to the Swedish provincial laws — created a unified legal framework for governance."
 nd_sca_scandinavian_court_culture: "Scandinavian Court Culture"
 nd_sca_scandinavian_court_culture_desc: "Renaissance learning and artistic patronage at the courts of Copenhagen and Stockholm fostered a distinctive Scandinavian cultural identity."
 nd_sca_naval_yards: "Nordic Naval Yards"
 nd_sca_naval_yards_desc: "Purpose-built royal shipyards at Copenhagen, Karlskrona, and other ports gave Scandinavia the capacity to build and maintain powerful Baltic fleets."
 nd_sca_northern_reformation: "Northern Reformation"
 nd_sca_northern_reformation_desc: "The adoption of Lutheranism across Scandinavia transformed the church into an instrument of state power while giving common people scripture in their own languages."
 nd_sca_hakkapeliitta_tradition: "Hakkapeliitta Tradition"
 nd_sca_hakkapeliitta_tradition_desc: "The Finnish Hakkapeliitat — light cavalrymen who charged with the battle cry 'Hakkaa paalle!' (Cut them down!) — became the most feared mounted warriors in Northern Europe."
 nd_sca_baltic_dominion: "Baltic Dominion"
 nd_sca_baltic_dominion_desc: "Scandinavian control of both shores of the Baltic Sea established the region as a Nordic lake, with diplomatic and naval power to match."
 nd_sca_falun_copper_mountain: "The Great Copper Mountain"
 nd_sca_falun_copper_mountain_desc: "The copper mine at Falun, producing two-thirds of Europe's copper at its peak, was called the realm's greatest fortification — its wealth financed Swedish wars and statecraft for centuries."
 nd_sca_swedish_navy_expansion: "Swedish Navy Expansion"
 nd_sca_swedish_navy_expansion_desc: "The expansion of the Swedish royal navy from a coastal defense force to a blue-water fleet capable of projecting power across the Baltic and beyond."
 nd_sca_adelsvalde: "Adelsvalde"
 nd_sca_adelsvalde_desc: "The age of noble dominance in Scandinavian politics, when the aristocracy controlled much of the land, the military, and the machinery of government."
 nd_sca_timber_exports: "Timber Exports"
 nd_sca_timber_exports_desc: "Scandinavia's vast forests provided Europe with lumber, tar, and naval stores — essential materials for the age of sail and the building boom of early modern cities."
 nd_sca_crown_reduction: "Crown Reduction"
 nd_sca_crown_reduction_desc: "Charles XI's reduktion — the systematic recovery of crown lands alienated to the nobility — restored royal finances and broke the power of the great magnates."
 nd_sca_carolean_tradition: "Carolean Tradition"
 nd_sca_carolean_tradition_desc: "The Carolean military system combined the allotment system with aggressive shock tactics, creating infantry that could defeat armies many times their size."
 nd_sca_indelningsverket: "Indelningsverket"
 nd_sca_indelningsverket_desc: "The Swedish allotment system assigned every soldier to a specific farm district, ensuring a trained army could be maintained cheaply in peace and mobilized rapidly for war."
 nd_sca_linjeskip_fleet: "Line Ship Fleet"
 nd_sca_linjeskip_fleet_desc: "The construction of dedicated ships of the line gave the Scandinavian navy the firepower to contest the great maritime powers in open battle."
 nd_sca_scandinavian_absolutism: "Scandinavian Absolutism"
 nd_sca_scandinavian_absolutism_desc: "The transition to absolute monarchy in Denmark-Norway and Sweden centralized state power, enabling ambitious building programs and administrative reform."
 nd_sca_scandinavian_east_india: "Scandinavian East India Companies"
 nd_sca_scandinavian_east_india_desc: "The Danish and Swedish East India Companies opened direct trade routes to Asia, importing tea, porcelain, and silk while establishing colonial outposts from Tranquebar to Canton."
 nd_sca_nordic_enlightenment: "Nordic Enlightenment"
 nd_sca_nordic_enlightenment_desc: "The Enlightenment in Scandinavia fostered scientific inquiry, university reform, and the expansion of literacy, building on the region's strong tradition of education."
 nd_sca_freedom_of_the_press: "Freedom of the Press"
 nd_sca_freedom_of_the_press_desc: "Sweden's 1766 Freedom of the Press Act — the world's first — established the principle that citizens have the right to publish and read without government censorship."
 nd_sca_scandinavism: "Scandinavism"
 nd_sca_scandinavism_desc: "The nineteenth-century movement of Scandinavism promoted cultural and political unity among the Nordic peoples, celebrating shared history, language, and identity."
 nd_sca_industrial_modernization: "Industrial Modernization"
 nd_sca_industrial_modernization_desc: "The transformation of Scandinavia from an agrarian society to an industrial one, driven by mining, forestry, and the mechanization of traditional industries."
 nd_sca_scandinavian_neutrality: "Scandinavian Neutrality"
 nd_sca_scandinavian_neutrality_desc: "The Scandinavian tradition of armed neutrality — maintaining strong defenses while avoiding entanglement in great power conflicts — preserved independence through the upheavals of the Napoleonic era."
 n_nd_sca_langskip: "Langskip"
 n_nd_sca_langskip_desc: "Fast, shallow-draft warships descended from Viking longship design, built for raiding and coastal patrol in the narrow waters of the North."
 n_nd_sca_langskip_levy: "Langskip Crew"
 n_nd_sca_langskip_levy_desc: "Levied longship crews drawn from coastal communities with centuries of seafaring tradition."
 a_nd_sca_hakkapeliitta: "Hakkapeliitta"
 a_nd_sca_hakkapeliitta_desc: "Finnish light cavalry renowned for their fearless charges and the terrifying battle cry 'Hakkaa paalle!' — shock troopers who excel in forested terrain."
 n_nd_sca_orlogsskib: "Orlogsskib"
 n_nd_sca_orlogsskib_desc: "A fast Scandinavian warship designed for both Baltic patrol and open-sea combat, balancing firepower with the speed needed to dominate narrow straits."
 a_nd_sca_carolean: "Carolean"
 a_nd_sca_carolean_desc: "Elite Swedish-style infantry trained in the ga-pa doctrine — disciplined advance under fire followed by a devastating bayonet charge at close range."
 a_nd_sca_carolean_levy: "Carolean Levy"
 a_nd_sca_carolean_levy_desc: "Allotment soldiers raised from farm districts across Scandinavia, trained year-round on crown land in the Carolean martial tradition."
 n_nd_sca_linjeskip: "Linjeskip"
 n_nd_sca_linjeskip_desc: "A Scandinavian ship of the line — faster than its European counterparts, designed for the shallow Baltic waters where maneuverability matters as much as broadside weight."
 nd_sca_stave_church: "Stave Church"
 nd_sca_stave_church_desc: "Wooden churches built with the Norse post-and-lintel technique, decorated with intricate carvings that blend Christian imagery with ancient Nordic motifs."
 nd_sca_bergslagen_forge: "Bergslagen Forge"
 nd_sca_bergslagen_forge_desc: "An ironworks in the Bergslagen tradition, smelting high-quality osmund iron from Swedish ore using charcoal-fueled blast furnaces."
 nd_sca_orlogsvarvet: "Orlogsvarvet"
 nd_sca_orlogsvarvet_desc: "A royal naval shipyard built in the Scandinavian tradition, with covered drydocks and slipways for constructing warships year-round."
 nd_sca_tingsted: "Tingsted"
 nd_sca_tingsted_desc: "A formal assembly hall continuing the ancient Thing tradition, where local representatives gather to deliberate on law, taxation, and governance."
 nd_sca_sildesalteri: "Herring Saltery"
 nd_sca_sildesalteri_desc: "A coastal facility for salting and barreling herring in the Scanian tradition, producing preserved fish for export across Northern Europe."
 nd_sca_koppargruva: "Koppargruva"
 nd_sca_koppargruva_desc: "A copper extraction facility using the fire-setting method pioneered at Falun — enormous underground fires crack the ore-bearing rock for extraction."
 nd_sca_ostindisk_kontor: "East India Kontor"
 nd_sca_ostindisk_kontor_desc: "A trading house modeled on the Danish and Swedish East India Companies, handling the import and resale of Asian luxury goods."
 nd_sca_stave_church_upkeep: "Stave Church Maintenance"
 nd_sca_stave_church_upkeep_desc: "Regular tarring, timber replacement, and cloth for altar dressings to preserve and operate the stave church through the harsh northern climate."
 nd_sca_osmund_iron_smelting: "Osmund Iron Smelting"
 nd_sca_osmund_iron_smelting_desc: "The production of high-grade osmund iron and steel using Swedish ore and charcoal in the Bergslagen tradition."
 nd_sca_shipyard_upkeep: "Naval Stores Consumption"
 nd_sca_shipyard_upkeep_desc: "The shipyard's constant demand for timber, tar, and naval supplies to construct and maintain the fleet."
 nd_sca_assembly_maintenance: "Assembly Upkeep"
 nd_sca_assembly_maintenance_desc: "Maintaining the assembly hall, its grounds, and the paper records of law and deliberation for regular sessions of governance."
 nd_sca_herring_salting: "Herring Salting"
 nd_sca_herring_salting_desc: "The traditional Scanian method of salting, barreling, and packing herring with tools and salt for preservation and long-distance trade."
 nd_sca_fire_setting_extraction: "Fire-Setting Extraction"
 nd_sca_fire_setting_extraction_desc: "The ancient mining technique of building great fires underground to crack ore-bearing rock, used at Falun for centuries."
 nd_sca_east_india_trade: "East India Trade"
 nd_sca_east_india_trade_desc: "The import and warehousing of Asian luxury goods — tea, porcelain, and silk — for distribution across Northern European markets."
 nd_sca_formed_tt: "Scandinavia has been formed"
 nd_sca_path_a_tt: "Chose the #bold Lords of the Northern Seas#! destiny"
 nd_sca_path_b_tt: "Chose the #bold All-Thing of the North#! destiny"
 nd_sca_destiny: "Scandinavian Destiny"
 nd_sca_destiny_desc: "The united North stands at a crossroads. With stability secured, the Scandinavian realm can now pursue its chosen destiny — whether mastery of the seas or the perfection of governance by assembly."
 nd_sca_dest_sound_toll: "Mastery of the Sound"
 nd_sca_dest_sound_toll_desc: "Seize control of Lubeck and the Oresund narrows. With banking institutions established, channel the wealth of every vessel that passes between the North Sea and the Baltic through Scandinavian hands."
 nd_sca_dest_north_sea: "Dominion Over the North Sea"
 nd_sca_dest_north_sea_desc: "Reclaim the old Norse territories of Scotland and Orkney. With Edinburgh under the Northern banner and gold flowing through the treasury, the North Sea becomes a Scandinavian highway once more."
 nd_sca_dest_northern_empire: "The Northern Empire"
 nd_sca_dest_northern_empire_desc: "Reach from Novgorod to Greenland — the Varangian route reborn and the abandoned western settlements reclaimed. Build a colonial admiralty to coordinate a realm that straddles oceans."
 nd_sca_dest_law_of_north: "The Law of the North"
 nd_sca_dest_law_of_north_desc: "Establish the foundations of Scandinavian governance. With banking institutions funding courts and schools, develop the realm's prosperity and spread the legal traditions of the Thing across a thriving domain."
 nd_sca_dest_riksdag: "The Riksdag Ascendant"
 nd_sca_dest_riksdag_desc: "The printing press carries Nordic ideas of governance to every corner of the realm. Develop the Scandinavian economy to new heights and fill the treasury to fund a modern legislative assembly."
 nd_sca_dest_beacon: "Beacon of Liberty"
 nd_sca_dest_beacon_desc: "Become the Enlightenment's model state. Achieve the highest development and prestige in Europe, demonstrating that liberty and order are not opposites but complements. Build a Riksdagshus worthy of the world's most advanced legislature."
 nd_sca.5.t: "The Scandinavian Destiny"
 nd_sca.5.d: "The Scandinavian realm has achieved a stability that the Kalmar Union never knew. Where that older union was plagued by succession crises and Swedish revolts, this kingdom rests on firmer ground. Now the question turns from survival to ambition: what shall this united North become?\n\nThe choice made at our founding set the course. Now, with stability secured, the first steps of that destiny can begin."
 nd_sca.5.a: "Our destiny unfolds."
 nd_sca.6.t: "Mastery of the Sound"
 nd_sca.6.d: "The Oresund — that narrow passage between Helsingborg and Helsingor — has been called the Golden Gate of the North. Every vessel passing from the North Sea to the Baltic must thread this needle, and now both shores belong to Scandinavia. With Lubeck itself brought under our control, the Hanseatic merchants who once dictated terms to Nordic kings now trade at our sufferance.\n\nThe Sound Toll, once a modest Danish levy, can now become the foundation of Scandinavian maritime supremacy. Every cask of herring, every bolt of cloth, every ingot of iron that moves between east and west pays tribute to the Northern Crown."
 nd_sca.6.a: "The Sound is ours."
 nd_sca.7.t: "Dominion Over the North Sea"
 nd_sca.7.d: "The North Sea, once the highway of Viking raiders, is again a Scandinavian lake. Edinburgh — seat of Scottish kings — flies the Northern banner, and the Orkney Islands have returned to Norse rule after centuries under the Scottish crown. Gold flows through our markets, funding the warships and merchant vessels that enforce our claim.\n\nBritish and Dutch traders eye our growing fleet with alarm. Two visions emerge among the admiralty: shall we build warships to rule by force, or merchantmen to rule by profit?"
 nd_sca.7.a: "Our warships shall command respect."
 nd_sca.7.b: "Our merchants shall command wealth."
 nd_sca.8.t: "The Northern Empire"
 nd_sca.8.d: "From Edinburgh to Novgorod, from Brattahlid to the Baltic, the Northern Empire stretches across the known world. The Varangian route — that ancient path from Scandinavia to Byzantium — is reborn under a single crown. In the west, the Greenland settlements, abandoned for centuries, have been reclaimed.\n\nThis is a realm that straddles oceans and continents. Shall we embrace our role as a true thalassocracy — a maritime empire governed from the quarterdeck — or shall we honor the Norse settlers who first carved civilization from Greenland's ice, and build an empire of colonists and homesteaders?"
 nd_sca.8.a: "We rule from the waves."
 nd_sca.8.b: "We settle where the sea carries us."
 nd_sca.9.t: "The Law of the North"
 nd_sca.9.d: "The ancient tradition of the Thing — governance by assembly and consent — has been renewed across the Scandinavian realm. Where medieval law codes once served individual provinces, a unified legal tradition now binds the entire North. Banking institutions fund the construction of courts and schools in every corner of the kingdom.\n\nThe allodial rights that protect Nordic freeholders are no longer mere custom but codified law. Prosperity grows as secure property rights and consistent justice attract settlement and trade. The foundations of modern Scandinavian governance are being laid — not by conquest, but by consensus."
 nd_sca.9.a: "The law speaks for all free men."
 nd_sca.10.t: "The Riksdag Ascendant"
 nd_sca.10.d: "The Scandinavian Riksdag — evolved from the ancient Thing assemblies into a modern deliberative body — has become the most powerful legislature in Northern Europe. The printing press carries its debates to every literate household, and the realm's development has reached heights that make European monarchs envious.\n\nDebates rage in the assembly hall. Progressive voices demand that the Riksdag drive innovation and modernization. Conservative members argue that the body's true strength lies in balancing the estates and preserving harmony among the realm's diverse peoples."
 nd_sca.10.a: "The Riksdag shall drive reform."
 nd_sca.10.b: "The Riksdag shall balance the estates."
 nd_sca.11.t: "Beacon of Liberty"
 nd_sca.11.d: "The Nordic model has become the envy of Europe. Philosophers cite Scandinavian governance as proof that liberty and order are not opposites but complements. The Freedom of the Press Act — the world's first — has been extended across the realm, and Enlightenment ideals find their fullest expression in Northern institutions.\n\nTwo visions compete for the soul of this Northern beacon: shall we formalize our governance in a written constitution, establishing rights that no monarch can revoke? Or shall we use our moral authority to mediate the conflicts of Europe, becoming the peaceful arbiter of nations?"
 nd_sca.11.a: "We shall write the rights of all Northmen."
 nd_sca.11.b: "We shall arbitrate the peace of nations."
 STATIC_MODIFIER_NAME_nd_sca_dest_war_fleet: "War Fleet Supremacy"
 STATIC_MODIFIER_DESC_nd_sca_dest_war_fleet: "The Scandinavian admiralty builds warships to dominate the North Sea by force. Naval bases from Bergen to Edinburgh project power across the Atlantic approaches."
 STATIC_MODIFIER_NAME_nd_sca_dest_merchant_marine: "Merchant Marine Dominion"
 STATIC_MODIFIER_DESC_nd_sca_dest_merchant_marine: "Scandinavian merchantmen crowd every harbor from Archangel to Lisbon. Northern traders control the flow of goods through the straits and across the open sea."
 STATIC_MODIFIER_NAME_nd_sca_dest_thalassocracy: "Northern Thalassocracy"
 STATIC_MODIFIER_DESC_nd_sca_dest_thalassocracy: "A maritime empire governed from the quarterdeck. Scandinavian admirals command fleets that patrol from Greenland to Novgorod, enforcing the Northern Crown's dominion over every sea lane."
 STATIC_MODIFIER_NAME_nd_sca_dest_settler_empire: "Settler Empire"
 STATIC_MODIFIER_DESC_nd_sca_dest_settler_empire: "Where the sea carries Scandinavians, they build. From Greenland to distant colonies, Nordic settlers carve new homesteads from the wilderness, carrying their laws and customs to new lands."
 STATIC_MODIFIER_NAME_nd_sca_dest_riksdag_reform: "Riksdag Reforms"
 STATIC_MODIFIER_DESC_nd_sca_dest_riksdag_reform: "The Riksdag drives a program of modernization — reforming administration, promoting innovation, and extending representative governance to every corner of the realm."
 STATIC_MODIFIER_NAME_nd_sca_dest_estate_balance: "Estate Harmony"
 STATIC_MODIFIER_DESC_nd_sca_dest_estate_balance: "The Riksdag's genius lies not in radical change but in balancing the interests of nobles, clergy, burghers, and peasants — maintaining harmony among diverse estates through careful deliberation."
 STATIC_MODIFIER_NAME_nd_sca_dest_constitution: "Constitutional Charter"
 STATIC_MODIFIER_DESC_nd_sca_dest_constitution: "A written constitution enshrines the rights of Scandinavian citizens. No monarch may revoke what the people's representatives have established in law."
 STATIC_MODIFIER_NAME_nd_sca_dest_arbiter: "Arbiter of Nations"
 STATIC_MODIFIER_DESC_nd_sca_dest_arbiter: "Scandinavia's moral authority — built on centuries of representative governance and religious tolerance — makes it the natural mediator of European disputes."
 nd_sca_kolonikontor: "Colonial Admiralty"
 nd_sca_kolonikontor_desc: "A combined naval command and trading headquarters for coordinating Scandinavian colonial ventures, modeled on the great admiralties of the maritime powers."
 nd_sca_admiralty_operations: "Admiralty Operations"
 nd_sca_admiralty_operations_desc: "The constant flow of naval stores, administrative correspondence, and cloth for uniforms and rigging required to coordinate a maritime colonial empire."
 nd_sca_riksdagshus: "Riksdagshus"
 nd_sca_riksdagshus_desc: "A grand assembly hall in the Nordic parliamentary tradition, where representatives of the estates gather to deliberate on law, taxation, and the governance of the realm."
 nd_sca_riksdag_upkeep: "Assembly Administration"
 nd_sca_riksdag_upkeep_desc: "The bureaucratic apparatus required to manage a constitutional legislature — clerks, printed records and law books, and stone for the maintenance of the assembly hall itself."
