l_english:
 STATIC_MODIFIER_NAME_nd_path_of_the_golden_zipa: "Path of the Golden Zipa"
 STATIC_MODIFIER_DESC_nd_path_of_the_golden_zipa: "In the mists of Lake Guatavita, a new Zipa was anointed with gold dust and cast precious offerings into sacred waters. This ceremony, which would inspire the legend of El Dorado, embodied the Muisca belief that wealth existed to honor the gods and bind the people. The confederation now channels this golden legacy into trade, artistry, and cultural splendor."
 STATIC_MODIFIER_NAME_nd_tundama_defiance: "Tundama's Defiance"
 STATIC_MODIFIER_DESC_nd_tundama_defiance: "When the cacique Tundama learned that neighboring lords had submitted to foreign invaders, he cut off the ears and hand of a warrior who suggested surrender. His guecha fighters held the highlands against overwhelming odds, choosing death over submission. The confederation now embodies this spirit of unbreakable resistance, turning the mountains themselves into a fortress."
 nd_mca.1.t: "The Muisca Confederation"
 nd_mca.1.d: "The scattered domains of the Altiplano Cundiboyacense stand united at last. The Zipa of Bacata and the Zaque of Hunza, whose rivalry once divided the highland people, now speak with one voice. From the salt mines of Zipaquira to the emerald veins of Somondoco, from the golden workshops of the lowland artisans to the terraced fields of the high plateau, the Muisca are one.\n\nBut unity demands a vision. Shall we build upon the golden splendor that has made our people the envy of the Americas — the trade networks that stretch across mountains and valleys, the artisans whose tunjos gleam with sacred meaning? Or shall we honor the warrior spirit of Tundama, who chose defiance over submission, and forge the highlands into an impregnable bastion?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mca.1.a: "Let the gold flow — we are the people of El Dorado"
 nd_mca.1.b: "We are the guecha — the mountains shall never be conquered"
 STATIC_MODIFIER_NAME_nd_mca_gilded_sovereign: "The Gilded Sovereign"
 STATIC_MODIFIER_DESC_nd_mca_gilded_sovereign: "Like the Zipa covered in gold dust upon Lake Guatavita, our ruler has embraced the ancient ceremony that elevates mortal authority to divine mandate."
 STATIC_MODIFIER_NAME_nd_mca_sacred_offerings: "Sacred Offerings of Guatavita"
 STATIC_MODIFIER_DESC_nd_mca_sacred_offerings: "The treasures cast into the sacred lake honor Chie, the moon goddess, and Sua, the sun god. Through these offerings, the people find spiritual unity and cosmic harmony."
 nd_mca.2.t: "The Ceremony of El Dorado"
 nd_mca.2.d: "At the heart of Lake Guatavita, three thousand meters above the sea, the ancient ceremony begins. The new ruler is stripped bare and coated in a sticky resin, upon which attendants blow fine gold dust until the figure gleams like a living idol. Accompanied by four lesser chiefs adorned with gold crowns, bracelets, and pendants, the ruler boards a balsa raft laden with golden tunjos, emeralds, and precious offerings.\n\nAs the raft reaches the center of the sacred lake, the drums fall silent. The golden figure dives into the dark waters, washing away the gold as an offering to the goddess who dwells beneath the surface. The chiefs cast their treasures after, and the crowd on shore erupts in song and celebration.\n\nThis ritual, which would one day drive Spanish conquistadors to madness in their search for 'El Dorado,' is for the Muisca something far more profound — it is the moment when earthly power is consecrated by divine acceptance."
 nd_mca.2.a: "We shall shine as the sun itself — let our sovereignty be golden"
 nd_mca.2.b: "The gods are honored — let their blessings sustain our people"
 nd_mca.3.t: "The Defiance of Tundama"
 nd_mca.3.d: "Word reaches the highlands that Tundama, cacique of the northern borderlands, has sworn an oath that no Muisca warrior will ever bend the knee to foreign invaders. When one of his guecha warriors dared suggest that accommodation might be the wiser course, Tundama seized the man and cut off his ears and left hand before the assembled army, declaring that those who would counsel surrender had no need of ears to hear commands nor hands to hold weapons.\n\nAt the Battle of Vargas Swamp, Tundama's four thousand guecha warriors faced armored cavalry, steel weapons, and gunpowder — technologies they had never encountered. They fought with spears, clubs, slings, and the fierce conviction that their homeland was worth more than their lives. Though the battle was lost, Tundama's defiance became the immortal spirit of the Muisca people — a refusal to accept conquest as destiny."
 nd_mca.3.a: "His courage echoes in every mountain — we shall never surrender"
 nd_mca.4.t: "The Temple of Sua at Sugamuxi"
 nd_mca.4.d: "In the sacred city of Sugamuxi — known to us as Sogamoso, the City of the Sun — stands the great temple dedicated to Sua, the sun god. Within its walls, the iraca, the supreme religious authority of the Muisca, presides over ceremonies that mark the passage of seasons and the cycles of the Muisca calendar.\n\nThe temple is filled with gold offerings, emeralds, painted cotton cloths, and the mummified remains of revered ancestors. Pilgrims travel from across the confederation to seek the iraca's blessing, bringing offerings of salt, cloth, and precious stones. The temple's astronomical observations guide the planting seasons and festival days, binding the practical rhythms of agriculture to the cosmic order.\n\nThe Temple of Sua is more than a place of worship — it is the spiritual heart that holds the confederation together, the place where the Muisca understand their position between earth and sky."
 nd_mca.4.a: "The sun watches over the Muisca — we honor its eternal light"
 nd_mca_guecha_border_system: "Guecha Border System"
 nd_mca_guecha_border_system_desc: "The guecha warriors were an elite military class selected from the bravest men regardless of noble lineage. Trained for years in combat, they defended the confederation's borders from their fortified posts in the Tenza and Ubaque valleys."
 nd_mca_salt_trade_mastery: "Salt Trade Mastery"
 nd_mca_salt_trade_mastery_desc: "The Muisca controlled the richest salt deposits in the Colombian highlands at Zipaquira, Nemocon, and Tausa. Salt was their primary currency and most valuable trade good, earning them the name 'The Salt People.'"
 nd_mca_terraced_agriculture: "Terraced Agriculture"
 nd_mca_terraced_agriculture_desc: "On the high plateau of the Altiplano Cundiboyacense, the Muisca built terraced fields for maize, potatoes, and quinoa. According to their mythology, the culture hero Bochica taught them to build terraces and irrigation canals."
 nd_mca_sugamuxi_tradition: "Sugamuxi Tradition"
 nd_mca_sugamuxi_tradition_desc: "The sacred city of Sugamuxi housed the great Temple of the Sun, presided over by the iraca, the supreme religious authority. Pilgrims from across the confederation brought offerings of gold, emeralds, and painted cloth."
 nd_mca_muisca_calendar: "Muisca Calendar"
 nd_mca_muisca_calendar_desc: "The Muisca developed a sophisticated lunisolar calendar based on the sun god Sua and moon goddess Chia, with divisions for synodic and sidereal months, rural years of 12-13 months, common years of 20 months, and holy years of 37 months."
 nd_mca_cotton_manta_weaving: "Cotton Manta Weaving"
 nd_mca_cotton_manta_weaving_desc: "Muisca women were master weavers who produced painted mantas from cotton traded from the warmer lowlands. Using wooden spindles and clay rollers, they created complex textiles dyed with indigo, saffron, and natural pigments."
 nd_mca_tunjo_craft: "Tunjo Craft"
 nd_mca_tunjo_craft_desc: "Muisca goldsmiths created tunjos — small votive figurines cast from tumbaga, a gold-copper alloy — using the lost-wax technique. These offerings were not worn as jewelry but placed at sacred sites to honor the gods."
 nd_mca_el_dorado_ceremony: "El Dorado Ceremony"
 nd_mca_el_dorado_ceremony_desc: "The investiture of a new Zipa involved covering the ruler in gold dust and sailing to the center of Lake Guatavita, where gold and emeralds were cast into the waters as offerings. This ritual inspired the legend of El Dorado."
 nd_mca_tundama_valor: "Tundama's Valor"
 nd_mca_tundama_valor_desc: "The cacique Tundama embodied the martial spirit of the Muisca, refusing submission to foreign invaders and leading his guecha warriors in defiant resistance at the Battle of Vargas Swamp in 1539."
 nd_mca_emerald_trade: "Emerald Trade"
 nd_mca_emerald_trade_desc: "The Muisca controlled access to the richest emerald deposits in the Americas, primarily at Somondoco. Emeralds were traded across vast distances and served as prestige goods offered at sacred sites."
 nd_mca_cacique_councils: "Cacique Councils"
 nd_mca_cacique_councils_desc: "The Muisca confederation was governed through a system of regional caciques who maintained local autonomy while acknowledging the authority of the Zipa and Zaque. Their fortified cercados served as centers of administration."
 nd_mca_guecha_training: "Guecha Training"
 nd_mca_guecha_training_desc: "Recruits for the guecha warrior class underwent years of rigorous training before being assigned to border posts. They cut their hair short for combat efficiency and carried distinctive multi-layered cotton armor mantles."
 nd_mca_highland_skirmishers: "Highland Skirmishers"
 nd_mca_highland_skirmishers_desc: "Muisca warriors supplemented their elite guecha with lighter troops armed with slings and blowpipes, using the mountainous terrain of the Altiplano to their advantage in ambushes and skirmishing."
 nd_mca_confederation_diplomacy: "Confederation Diplomacy"
 nd_mca_confederation_diplomacy_desc: "The Muisca maintained a sophisticated diplomatic system between the domains of the Zipa, Zaque, Iraca, and Tundama, managing alliances and rivalries through ceremonial exchanges and marriage ties."
 nd_mca_bochica_legacy: "Bochica's Legacy"
 nd_mca_bochica_legacy_desc: "Bochica, the bearded messenger god of the Muisca, was believed to have taught the people agriculture, weaving, metallurgy, and proper governance. His teachings formed the moral and practical foundation of Muisca civilization."
 nd_mca_salt_currency_system: "Salt Currency System"
 nd_mca_salt_currency_system_desc: "Salt served as the primary medium of exchange in Muisca trade, its value universally recognized across the Colombian highlands and beyond. The salt mines of Zipaquira functioned as the confederation's treasury."
 nd_mca_plateau_fortifications: "Plateau Fortifications"
 nd_mca_plateau_fortifications_desc: "The natural geography of the Altiplano Cundiboyacense — ringed by mountains and accessible only through narrow passes — was augmented by guecha border posts and fortified cercados to create a formidable defensive network."
 nd_mca_plateau_defense_doctrine: "Plateau Defense Doctrine"
 nd_mca_plateau_defense_doctrine_desc: "Drawing on generations of highland warfare experience, Muisca commanders developed tactics that exploited mountain terrain, altitude advantage, and the defenders' intimate knowledge of every valley and pass."
 nd_mca_highland_resistance: "Highland Resistance"
 nd_mca_highland_resistance_desc: "The spirit of Tundama lived on in the Muisca tradition of highland resistance — using the mountains as natural fortifications, harrying invaders with guerrilla tactics, and making conquest too costly to sustain."
 nd_mca_depletion_gilding: "Depletion Gilding"
 nd_mca_depletion_gilding_desc: "Muisca metallurgists perfected the technique of depletion gilding, treating tumbaga alloys with acid to dissolve surface copper, leaving a thin but brilliant layer of pure gold on the surface of their ceremonial objects."
 nd_mca_zipa_centralization: "Zipa Centralization"
 nd_mca_zipa_centralization_desc: "The Zipa of Bacata gradually expanded central authority over the southern confederation, standardizing tribute collection, judicial authority, and military command across the previously autonomous cacique domains."
 nd_mca_defensive_confederacy: "Defensive Confederacy"
 nd_mca_defensive_confederacy_desc: "When external threats demanded it, the normally autonomous domains of the confederation united their guecha warriors under joint command, pooling the manpower of dozens of cacique territories into a single defensive force."
 nd_mca_muisca_endurance: "Muisca Endurance"
 nd_mca_muisca_endurance_desc: "Through centuries of external pressure and internal change, the Muisca people maintained their identity, their traditions, and their fighting spirit — adapting without surrendering the essence of who they are."
 nd_mca_altiplano_governance: "Altiplano Governance"
 nd_mca_altiplano_governance_desc: "The mature Muisca state balanced central authority with regional autonomy, allowing the Zipa's government to maintain order and collect tribute while caciques retained local judicial and ceremonial authority."
 nd_mca_mineral_wealth: "Mineral Wealth"
 nd_mca_mineral_wealth_desc: "The Colombian highlands yield emeralds, gold, copper, and salt in abundance. Systematic exploitation of these mineral resources transforms the confederation's natural wealth into lasting prosperity."
 nd_mca_manta_export_mastery: "Manta Export Mastery"
 nd_mca_manta_export_mastery_desc: "Muisca painted cotton mantas, renowned for their vivid colors and intricate designs, become a major export commodity. The confederation's textile artisans refine their dyeing techniques to meet growing demand."
 nd_mca_muisca_national_identity: "Muisca National Identity"
 nd_mca_muisca_national_identity_desc: "The Muisca people forge a modern national consciousness rooted in their ancient heritage — the golden ceremonies of Guatavita, the defiance of Tundama, the wisdom of Bochica, and the unity of the confederation."
 nd_mca_modern_confederation: "Modern Confederation"
 nd_mca_modern_confederation_desc: "The ancient cacique council system evolves into a modern confederal government, preserving the balance between central authority and regional autonomy that has sustained the Muisca for centuries."
 nd_mca_andean_solidarity: "Andean Solidarity"
 nd_mca_andean_solidarity_desc: "The Muisca reach out to kindred highland peoples across the Andes, building alliances based on shared heritage, mutual defense, and the common bond of mountain civilizations."
 nd_mca_modern_army: "Modern Army"
 nd_mca_modern_army_desc: "The guecha warrior tradition merges with modern military science, producing disciplined highland troops who combine ancient knowledge of mountain warfare with contemporary tactics and training."
 a_nd_mca_guecha_warriors: "Guecha Warriors"
 a_nd_mca_guecha_warriors_desc: "Elite border defenders of the Muisca, selected for bravery regardless of birth. Armed with spears, clubs, slings, and blowpipes, protected by thick multi-layered cotton mantles."
 a_nd_mca_guecha_levy: "Guecha Levy"
 a_nd_mca_guecha_levy_desc: "Village-raised warriors following the guecha tradition, trained to defend the confederation's highland borders."
 a_nd_mca_tundama_vanguard: "Tundama's Vanguard"
 a_nd_mca_tundama_vanguard_desc: "The fiercest guecha warriors, named for the cacique who refused to submit to foreign invaders. They fight with the fury of men who believe surrender is worse than death."
 a_nd_mca_highland_slingers: "Highland Slingers"
 a_nd_mca_highland_slingers_desc: "Skirmishers armed with slings and blowpipes, using the mountainous terrain of the Altiplano to harass enemies from advantageous positions."
 a_nd_mca_plateau_defenders: "Plateau Defenders"
 a_nd_mca_plateau_defenders_desc: "Disciplined highland troops who combine the guecha warrior tradition with defensive expertise refined through generations of mountain warfare."
 nd_mca_salt_works: "Zipaquira Salt Works"
 nd_mca_salt_works_desc: "The salt extraction and processing facilities that made the Muisca 'The Salt People.' Salt was the confederation's primary trade good and served as currency."
 nd_mca_goldsmith_workshop: "Goldsmith Workshop"
 nd_mca_goldsmith_workshop_desc: "Where Muisca artisans craft tunjos — sacred votive figurines — using the lost-wax technique with tumbaga, a gold-copper alloy that catches the light of the sun god Sua."
 nd_mca_temple_of_sue: "Temple of Sua"
 nd_mca_temple_of_sue_desc: "A sun temple modeled on the great Temple of Sua at Sugamuxi, where the iraca presided over astronomical observations, calendar ceremonies, and the spiritual life of the confederation."
 nd_mca_highland_terrace: "Highland Terrace"
 nd_mca_highland_terrace_desc: "Terraced fields carved into the slopes of the Altiplano Cundiboyacense, growing maize, potatoes, and quinoa at elevations where flat farmland is scarce."
 nd_mca_emerald_depot: "Emerald Depot"
 nd_mca_emerald_depot_desc: "A trading center for the emeralds of Somondoco and Muzo — the richest deposits in the Americas. Here the precious green stones are cut, sorted, and prepared for trade."
 nd_mca_cercado_palace: "Cercado Palace"
 nd_mca_cercado_palace_desc: "The fortified residence of a Muisca ruler, surrounded by a wooden palisade. Within, the cacique holds court, receives tribute, stores ceremonial gold, and administers justice."
 nd_mca_cotton_weaving_house: "Cotton Weaving House"
 nd_mca_cotton_weaving_house_desc: "A workshop where Muisca women produce the painted cotton mantas for which the highland people are renowned. Using wooden spindles and clay rollers, they create textiles dyed with natural pigments."
 nd_mca_guecha_barracks: "Guecha Barracks"
 nd_mca_guecha_barracks_desc: "Training grounds where recruits from all social classes undergo years of combat preparation before earning the title of guecha warrior and being assigned to a border post."
 nd_mca_salt_processing: "Salt Processing"
 nd_mca_salt_processing_desc: "Extracting and refining salt from the highland rock deposits of Zipaquira, using stone tools and wood fuel."
 nd_mca_lost_wax_casting: "Lost-Wax Casting"
 nd_mca_lost_wax_casting_desc: "Casting sacred tunjo figurines from tumbaga alloy using the lost-wax technique, producing ceremonial jewelry of great artistry."
 nd_mca_temple_offerings: "Temple Offerings"
 nd_mca_temple_offerings_desc: "Ceremonial offerings of pottery, dyes, and beeswax — for ritual fires and sacred lamps — to sustain the Temple of Sua."
 nd_mca_terrace_maintenance: "Terrace Maintenance"
 nd_mca_terrace_maintenance_desc: "Ongoing upkeep of the stone-walled terraces that make highland agriculture possible."
 nd_mca_emerald_cutting: "Emerald Cutting"
 nd_mca_emerald_cutting_desc: "The skilled cutting and polishing of raw emeralds from the Somondoco and Muzo deposits, using stone abrasives and metal tools."
 nd_mca_palace_upkeep: "Palace Upkeep"
 nd_mca_palace_upkeep_desc: "Maintenance of the cercado palace, including its wooden palisade, ceremonial halls, administrative records, and tribute stores."
 nd_mca_cotton_processing: "Cotton Dyeing"
 nd_mca_cotton_processing_desc: "Processing highland-traded cotton fiber and dyeing it with natural pigments to produce the vivid textiles that distinguish Muisca weavers."
 nd_mca_barracks_upkeep: "Barracks Upkeep"
 nd_mca_barracks_upkeep_desc: "Maintaining the weapons, leather equipment, training facilities, and cotton armor of the guecha warriors."
 nd_mca_salt_curing: "Muisca Salt Curing"
 nd_mca_salt_curing_desc: "A preservation technique using highland salt and clay pots to cure and store food for trade and long-term supply."
 nd_mca_gold_plating: "Depletion Gilding"
 nd_mca_gold_plating_desc: "Treating tumbaga alloy with acid to dissolve surface copper, producing brilliantly gilded ceremonial objects."
 nd_mca_manta_dyeing: "Manta Dyeing"
 nd_mca_manta_dyeing_desc: "Weaving and dyeing cotton mantas using highland-traded fiber and natural pigments to produce the distinctive Muisca textiles."
 nd_mca_formed_tt: "Muisca Confederation has been formed"
 nd_mca_path_a_tt: "Chose Path of the Golden Zipa"
 nd_mca_path_b_tt: "Chose Tundama's Defiance"
 # ===== DESTINY LOCALIZATION =====
 # Destiny advance names and descriptions
 nd_mca_destiny: "Destiny of the Muisca"
 nd_mca_destiny_desc: "The confederation has been forged. The highland peoples speak with one voice. Now the question is not whether the Muisca will endure, but what they will become."
 nd_mca_dest_emerald_roads: "The Emerald Roads"
 nd_mca_dest_emerald_roads_desc: "Control the great trade arteries of Colombia — the Cauca Valley and the Magdalena River — to channel the wealth of emeralds, gold, and salt through Muisca markets. Own Cali and Mompos while accumulating 1,000 gold."
 nd_mca_dest_markets_of_gold: "Markets of Gold"
 nd_mca_dest_markets_of_gold_desc: "Extend the trade network south to the Andean crossroads at Quito, embrace modern banking institutions, and amass 2,000 gold to prove the Muisca are the wealthiest people in the Americas."
 nd_mca_dest_golden_kingdom: "The Golden Kingdom"
 nd_mca_dest_golden_kingdom_desc: "Seize the Isthmus of Panama to command the gateway between two oceans, develop your realm to 1,500 total development, and achieve 75 prestige. The legend of El Dorado was always true — it was the Muisca all along."
 nd_mca_dest_tairona_war: "The Tairona War"
 nd_mca_dest_tairona_war_desc: "Conquer the Tairona cities of the Sierra Nevada and subjugate the Zenu people of the lowlands. With an army of 30,000, the guecha warriors will prove that the highlands breed the fiercest soldiers in the Americas."
 nd_mca_dest_mountain_dominion: "Mountain Dominion"
 nd_mca_dest_mountain_dominion_desc: "Push beyond the Colombian highlands to seize the Venezuelan cities of Caracas and Coro. With 50,000 soldiers, the Muisca will control every mountain pass from the Caribbean to the llanos."
 nd_mca_dest_andean_hegemony: "Andean Hegemony"
 nd_mca_dest_andean_hegemony_desc: "March south along the Andes to claim Cusco, the navel of the Inca world. With 1,500 total development and 75 prestige, the Muisca will rule the greatest mountain empire since the Inca themselves."
 # Destiny DHE event text
 nd_mca.5.t: "The Confederation United"
 nd_mca.5.d: "The Muisca Confederation stands as one people, united under a single purpose. The Zipa's gold and the Zaque's wisdom are joined. The sacred lakes hold our offerings, the salt mines fill our coffers, and the guecha stand watch at every pass. Whether we build an empire of gold or a fortress of mountains, the world will know the Muisca name."
 nd_mca.5.a: "The highlands are ours — now we forge our destiny"
 nd_mca.6.t: "Caravans on the Emerald Roads"
 nd_mca.6.d: "The great trade routes of the Colombian highlands now flow through Muisca hands. From the emerald mines of Somondoco to the salt flats of Zipaquira, from the gold workshops of the lowlands to the cotton markets of the Cauca Valley, a web of commerce connects the scattered peoples of the Andes. Muisca merchants carry salt cakes, emeralds, and painted mantas along mountain trails that their ancestors walked a thousand years ago — but now the scale of trade dwarfs anything the old confederation could have imagined."
 nd_mca.6.a: "Let the wealth of the mountains flow to all who trade with us"
 nd_mca.7.t: "The Golden Markets"
 nd_mca.7.d: "The Muisca trade network has grown beyond anything the old caciques could have envisioned. Gold from the highland workshops, emeralds from the eastern slopes, salt from the great mines, and cotton mantas from a hundred weaving houses — all flow through markets that stretch from the equatorial coast to the Venezuelan plains.\n\nBut this wealth demands direction. Shall we invest in the infrastructure of commerce itself — building warehouses, improving roads, attracting settlers to our growing cities? Or shall we use our prosperity to absorb the diverse peoples of the conquered lands, turning former enemies into fellow citizens of a golden confederation?"
 nd_mca.7.a: "Build the markets, and the people will come"
 nd_mca.7.b: "Our wealth will unite all the peoples of the highlands"
 nd_mca.8.t: "The Golden Kingdom Revealed"
 nd_mca.8.d: "When the Spanish conquistadors searched desperately for El Dorado, they never understood that the treasure was not a city of gold but a people who understood gold's true purpose — as sacred offering, as art, as the medium through which mortals honor the divine. Now the Muisca have built what the conquistadors could only dream of: a kingdom where wealth flows from every mine, every market, every workshop.\n\nThe Isthmus of Panama opens two oceans to our trade. The markets of Quito, Cali, and Mompos hum with activity. The legend is fulfilled — but how shall we use this golden destiny?"
 nd_mca.8.a: "We shall be the crossroads of the world"
 nd_mca.8.b: "Let the merchant class lead us into a golden age"
 nd_mca.9.t: "The Fall of Teyuna"
 nd_mca.9.d: "The Tairona, builders of the great stone city of Teyuna hidden in the jungle-clad slopes of the Sierra Nevada de Santa Marta, have fallen before the guecha advance. Their terraced city, with its network of stone paths and circular platforms, now acknowledges Muisca sovereignty. To the south, the Zenu goldworkers — whose filigree artistry rivals our own tunjo makers — have likewise submitted.\n\nTundama's spirit lives in every guecha warrior who scaled those jungle slopes. The highlands are no longer merely defended — they are expanding."
 nd_mca.9.a: "The guecha carry Tundama's spirit wherever they march"
 nd_mca.10.t: "Dominion of the Mountains"
 nd_mca.10.d: "From the Caribbean coast to the Venezuelan highlands, the mountain passes now answer to Muisca authority. Caracas and Coro, once beyond the reach of highland power, fly the banner of the confederation. The guecha warriors have proven that the mountains breed soldiers without equal in the Americas.\n\nBut how shall we hold this expanded dominion? The mountains themselves are our greatest fortress — shall we fortify every pass and valley, turning the entire Andes into an impregnable defensive network? Or shall we bind the conquered peoples into a true federation, winning loyalty through fair governance rather than force alone?"
 nd_mca.10.a: "Fortify every pass — the mountains are our walls"
 nd_mca.10.b: "Offer fair terms — a willing subject is worth ten forts"
 nd_mca.11.t: "Hegemony of the Andes"
 nd_mca.11.d: "Cusco has fallen. The navel of the Inca world, the city at the center of Tawantinsuyu, now acknowledges the supremacy of the Muisca Confederation. From the Caribbean Sea to the heart of the Andes, from the Venezuelan coast to the sacred valleys of Peru, the mountains obey one people.\n\nTundama once fought four thousand guecha warriors against armored cavalry and gunpowder. He lost the battle but won immortality. Now his spiritual heirs have built what he could only dream of — a highland empire that no force on earth can conquer. How shall we seal this legacy?"
 nd_mca.11.a: "We are the unconquered — let all know the price of defiance"
 nd_mca.11.b: "The highlands are eternal — and so shall our dominion be"
 # Timed modifier names and descriptions
 STATIC_MODIFIER_NAME_nd_mca_dest_gilded_markets: "The Gilded Markets"
 STATIC_MODIFIER_DESC_nd_mca_dest_gilded_markets: "A network of trade posts and warehouses channels the wealth of mines and workshops into Muisca markets, attracting settlers and craftsmen from across the Americas — though the army suffers from reduced funding."
 STATIC_MODIFIER_NAME_nd_mca_dest_sacred_waters: "Sacred Waters of Guatavita"
 STATIC_MODIFIER_DESC_nd_mca_dest_sacred_waters: "The offerings cast into Lake Guatavita have been repaid a hundredfold. The diverse peoples of the highlands find common purpose in Muisca prosperity, their cultures blending into a richer whole."
 STATIC_MODIFIER_NAME_nd_mca_dest_new_dorado: "The New El Dorado"
 STATIC_MODIFIER_DESC_nd_mca_dest_new_dorado: "The legend is real. The Muisca Golden Kingdom stands at the crossroads of the world, its diplomats welcomed in every court, its markets the envy of nations."
 STATIC_MODIFIER_NAME_nd_mca_dest_golden_age: "The Muisca Golden Age"
 STATIC_MODIFIER_DESC_nd_mca_dest_golden_age: "The merchant class drives an era of unprecedented prosperity, though the confederation's martial spirit wanes as wealth replaces war as the measure of greatness."
 STATIC_MODIFIER_NAME_nd_mca_dest_mountain_bulwark: "The Mountain Bulwark"
 STATIC_MODIFIER_DESC_nd_mca_dest_mountain_bulwark: "Every mountain pass is fortified, every valley a kill zone. The highlands recruit swiftly and recover quickly, presenting an impenetrable wall of stone and steel to any invader."
 STATIC_MODIFIER_NAME_nd_mca_dest_highland_federation: "The Highland Federation"
 STATIC_MODIFIER_DESC_nd_mca_dest_highland_federation: "Conquered peoples are offered a place in the confederation, bound by fair terms and shared governance — though this generosity breeds a certain complacency."
 STATIC_MODIFIER_NAME_nd_mca_dest_unconquered_peaks: "The Unconquered Peaks"
 STATIC_MODIFIER_DESC_nd_mca_dest_unconquered_peaks: "The Muisca project power across the entire Andean chain, recruiting mercenaries from conquered peoples and pressing claims against any who dare challenge highland supremacy."
 STATIC_MODIFIER_NAME_nd_mca_dest_eternal_highlands: "The Eternal Highlands"
 STATIC_MODIFIER_DESC_nd_mca_dest_eternal_highlands: "Highland warfare has been perfected over generations. Muisca cavalry dominates the mountain valleys, their commanders extract favorable terms from every engagement, and conquered territories yield their wealth to the confederation."
 # Destiny building names and descriptions
 nd_mca_guatavita_treasury: "Guatavita Treasury"
 nd_mca_guatavita_treasury_desc: "A grand treasury built on the shores of the sacred lake, where the golden wealth of the confederation is stored, counted, and reinvested. What the gods received as offering, the nation now receives as commerce."
 nd_mca_tundama_citadel: "Tundama's Citadel"
 nd_mca_tundama_citadel_desc: "A mountain fortress named for the cacique who refused to surrender. Built into the living rock of the Andes, it serves as both garrison and symbol of the highland people's unconquerable spirit."
 # Destiny building PM names and descriptions
 nd_mca_treasury_maintenance: "Treasury Maintenance"
 nd_mca_treasury_maintenance_desc: "Maintaining the treasury's records, vaults, and trading operations requires skilled clerks, quality paper, and fine metalwork."
 nd_mca_citadel_upkeep: "Citadel Upkeep"
 nd_mca_citadel_upkeep_desc: "Maintaining the mountain citadel's fortifications, armories, and training grounds requires stone, weapons, and provisions."
