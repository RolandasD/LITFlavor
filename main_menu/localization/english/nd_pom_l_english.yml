l_english:
 STATIC_MODIFIER_NAME_nd_pom_griffins_dominion: "The Griffin's Dominion"
 STATIC_MODIFIER_DESC_nd_pom_griffins_dominion: "Under the iron will of the Griffin dukes, Pomerania's fractious towns and restless barons have been brought to heel. The duchy speaks with one voice — the duke's."
 STATIC_MODIFIER_NAME_nd_pom_wendish_quarter: "The Wendish Quarter"
 STATIC_MODIFIER_DESC_nd_pom_wendish_quarter: "Pomerania has embraced the Hanseatic spirit. Its cities govern themselves, its merchants sail freely, and its wealth flows from the counting houses of Stralsund and Stettin, not the ducal court."
 STATIC_MODIFIER_NAME_nd_pom_hanseatic_zenith: "Hanseatic Zenith"
 STATIC_MODIFIER_DESC_nd_pom_hanseatic_zenith: "Pomerania's merchants stand at the summit of Baltic trade, their ships and counting houses the envy of the northern seas."
 STATIC_MODIFIER_NAME_nd_pom_ducal_assertion: "Ducal Assertion"
 STATIC_MODIFIER_DESC_nd_pom_ducal_assertion: "The Griffin duke has reasserted control over the Hanseatic towns, bringing their revenues under ducal oversight."
 nd_pom.1.t: "The Banner of the Griffin"
 nd_pom.1.d: "The red griffin spreads its wings across Pomerania. For five centuries the House of Griffin has ruled these Baltic shores, navigating between the ambitions of Brandenburg to the south and the autonomy of the great Hanseatic cities within their own borders. Now, with Pomerania united, a choice must be made about the duchy's future.\n\nThe Griffin dukes have long struggled to impose their authority over cities like Stralsund and Stettin, whose Hanseatic privileges grant them near-independence. Shall the duke assert his ancient rights and forge a centralized state? Or shall he embrace the commercial republic within his realm, ruling in partnership with the merchant oligarchs whose wealth built these shores?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_pom.1.a: "The Griffin's word is law in Pomerania"
 nd_pom.1.b: "Let the Hanseatic cities be our strength"
 nd_pom.2.t: "The Emporium of the Oder"
 nd_pom.2.d: "Stettin has secured its position as the gateway of the Oder. Grain from Brandenburg and Greater Poland flows downriver to Pomeranian ports, while salt and herring travel inland on the return. The city's forty guilds and bustling docks testify to its wealth. But this prosperity brings its own tension — shall the duchy's commercial future be guided by the league's collective discipline, or by the duke's direct hand?"
 nd_pom.2.a: "The Hanse secures our prosperity"
 nd_pom.2.b: "The duke shall govern commerce"
 nd_pom.3.t: "The Walls of Stralsund"
 nd_pom.3.d: "Albrecht von Wallenstein, the mightiest general in the Empire, has brought his army before the walls of Stralsund. The city council refused the Capitulation of Franzburg, and now the imperial host camps before eleven gates and thirty watchtowers. Wallenstein reportedly swore he would take the city even if it were chained to heaven itself.\n\nBut Stralsund endures. Danish and Swedish ships break the blockade to supply the garrison. The burghers man the walls alongside professional soldiers. After weeks of fruitless assault, the imperial army withdraws. Stralsund has proven that a well-fortified city, defended by determined citizens, can resist even the most powerful army in Europe."
 nd_pom.3.a: "The Griffin defies even heaven's chains"
 nd_pom.4.t: "The University at Greifswald"
 nd_pom.4.d: "On October 17, 1456, Duke Wartislaw IX of Pomerania-Wolgast inaugurated a new university at Greifswald, established through the initiative and generous patronage of the city's mayor, Heinrich Rubenow. With papal approval already secured, the institution opens its doors as one of the few centers of learning in the entire Baltic region.\n\nThe university draws students from across the Hanseatic world — Scandinavians, Livonians, and Germans gather to study law, theology, and the arts. Within its first decades, hundreds of foreign scholars will pass through its halls, making Greifswald a beacon of learning amid the commerce of the Wendish Hanse."
 nd_pom.4.a: "May knowledge flourish on these Baltic shores"
 nd_pom_wendish_shores: "Wendish Shores"
 nd_pom_wendish_shores_desc: "The Slavic Pomeranians have fished these Baltic waters and harvested amber from its shores since time immemorial."
 nd_pom_griffin_dukedom: "Griffin Dukedom"
 nd_pom_griffin_dukedom_desc: "The House of Griffin, bearing its red heraldic beast since the 12th century, has established ducal authority over the Pomeranian lands."
 nd_pom_christianization: "Christianization of Pomerania"
 nd_pom_christianization_desc: "The conversion of the Pomeranian Slavs brought the duchy into the Latin Christian world, founding bishoprics and monasteries along the coast."
 nd_pom_town_charters: "Town Charters"
 nd_pom_town_charters_desc: "Pomeranian dukes granted municipal rights to coastal settlements, sparking the growth of towns that would become Hanseatic powerhouses."
 nd_pom_hanseatic_membership: "Hanseatic Membership"
 nd_pom_hanseatic_membership_desc: "Pomeranian towns have joined the Wendish quarter of the Hanseatic League, binding their fortunes to the greatest commercial network in northern Europe."
 nd_pom_stralsund_emporium: "Stralsund Emporium"
 nd_pom_stralsund_emporium_desc: "Stralsund has risen to become the second city of the Hanse, with 300 ships flying its banner across the Baltic."
 nd_pom_herring_trade: "Herring Fairs"
 nd_pom_herring_trade_desc: "The great herring fairs of the Baltic coast have made Pomeranian ports the center of the northern fish trade."
 nd_pom_greifswald_university: "Greifswald University"
 nd_pom_greifswald_university_desc: "Founded in 1456 by Duke Wartislaw IX, the University of Greifswald is one of the oldest in northern Europe, drawing scholars from across the Hanseatic world."
 nd_pom_baltic_fleet: "Baltic Fleet"
 nd_pom_baltic_fleet_desc: "Pomeranian shipbuilders have expanded the duchy's fleet, establishing the coast as a center of maritime power."
 nd_pom_stettin_emporium: "Stettin Emporium"
 nd_pom_stettin_emporium_desc: "Stettin dominates Oder River commerce, with grain from the hinterland and salt from the coast passing through its bustling wharves."
 nd_pom_amber_craft: "Baltic Amber Craft"
 nd_pom_amber_craft_desc: "Pomeranian craftsmen have elevated amber-working into a fine art, creating jewelry and devotional objects prized across Europe."
 nd_pom_burgher_autonomy: "Burgher Autonomy"
 nd_pom_burgher_autonomy_desc: "The Hanseatic towns have secured legal privileges that limit ducal interference, creating a unique balance between feudal and mercantile governance."
 nd_pom_kaperfahrt: "Kaperfahrt"
 nd_pom_kaperfahrt_desc: "Pomeranian nobles and even some dukes have engaged in state-sanctioned piracy, seizing rival vessels to assert maritime control over the southern Baltic."
 nd_pom_stralsund_defenses: "Stralsund Defenses"
 nd_pom_stralsund_defenses_desc: "Stralsund's legendary walls — eleven gates, thirty watchtowers — proved impregnable even against Wallenstein's imperial army in 1628."
 nd_pom_evangelical_reform: "Evangelical Reform"
 nd_pom_evangelical_reform_desc: "Pomerania embraced the Protestant Reformation early, transforming its churches and universities into centers of Lutheran scholarship."
 nd_pom_last_griffin: "The Last Griffin"
 nd_pom_last_griffin_desc: "Duke Bogislaw XIV, the last of the five-century Griffin dynasty, navigated the impossible politics of the Thirty Years' War with diplomatic skill."
 nd_pom_wartime_resilience: "Wartime Resilience"
 nd_pom_wartime_resilience_desc: "Though the Thirty Years' War destroyed two-thirds of Pomerania's population, the surviving communities rebuilt with grim determination."
 nd_pom_urban_reconstruction: "Urban Reconstruction"
 nd_pom_urban_reconstruction_desc: "After the devastation of the Thirty Years' War, Pomeranian towns slowly rebuilt their infrastructure and commercial networks."
 nd_pom_junker_estates: "Junker Estates"
 nd_pom_junker_estates_desc: "The Pomeranian landed nobility consolidated large agricultural estates, driving grain production for export through Baltic ports."
 nd_pom_baltic_admiralty: "Baltic Admiralty"
 nd_pom_baltic_admiralty_desc: "Under Swedish and later Prussian administration, Pomerania maintained its naval traditions, training sailors for the Baltic fleet."
 nd_pom_academic_renaissance: "Academic Renaissance"
 nd_pom_academic_renaissance_desc: "Greifswald University, now the oldest university in the Swedish realm, experiences a scholarly renaissance under enlightened patronage."
 nd_pom_enlightenment_scholarship: "Enlightenment Scholarship"
 nd_pom_enlightenment_scholarship_desc: "Greifswald's scholars contribute to the Enlightenment, producing works in natural philosophy, jurisprudence, and Baltic regional history."
 nd_pom_stettin_industrialization: "Stettin Industrialization"
 nd_pom_stettin_industrialization_desc: "Stettin's Oder River port industrializes, with shipyards, foundries, and manufacturing transforming the medieval trading town into a modern city."
 nd_pom_modern_shipyards: "Modern Shipyards"
 nd_pom_modern_shipyards_desc: "Pomeranian shipyards adopt modern construction techniques, building faster and more capable vessels for the Baltic trade."
 nd_pom_economic_integration: "Economic Integration"
 nd_pom_economic_integration_desc: "Pomerania integrates into the broader German economic sphere, its ports connecting the agricultural hinterland to global markets."
 a_nd_pom_coastal_militia: "Pomeranian Coastal Militia"
 a_nd_pom_coastal_militia_desc: "Armed burghers and coastal peasants trained in the defense of their walled towns, these militia are the backbone of Pomeranian self-defense."
 n_nd_pom_kogge: "Pomeranian Kogge"
 n_nd_pom_kogge_desc: "The sturdy Hanseatic cog, workhorse of Baltic trade. These broad-beamed vessels carry vast cargoes through the choppy northern waters and can be armed for war."
 n_nd_pom_stralsund_frigate: "Stralsund Frigate"
 n_nd_pom_stralsund_frigate_desc: "A purpose-built coastal defense vessel from Stralsund's shipyards, designed to patrol the narrow straits and defend Pomeranian harbors."
 nd_pom_hansekontor: "Hansekontor"
 nd_pom_hansekontor_desc: "A Hanseatic League trading post where merchants store goods, negotiate contracts, and coordinate the flow of Baltic commerce."
 nd_pom_greifswalder_kollegium: "Greifswalder Kollegium"
 nd_pom_greifswalder_kollegium_desc: "A collegiate building of the University of Greifswald, one of the oldest centers of learning in northern Europe."
 nd_pom_coastal_bastion: "Coastal Bastion"
 nd_pom_coastal_bastion_desc: "Fortified harbor defenses inspired by Stralsund's legendary walls, designed to protect Pomeranian ports from naval assault."
 nd_pom_amber_workshop: "Amber Workshop"
 nd_pom_amber_workshop_desc: "A craftsmen's workshop where Baltic amber is shaped, polished, and set into fine jewelry for sale across the Hanseatic trading network."
 nd_pom_oder_warehouse: "Oder Warehouse"
 nd_pom_oder_warehouse_desc: "A commercial warehouse along the Oder River docks, storing grain, salt, and other goods flowing through Stettin's bustling trade network."
 nd_pom_hansekontor_maintenance: "Kontor Upkeep"
 nd_pom_hansekontor_maintenance_desc: "The regular costs of maintaining a Hanseatic trading post — timber for repairs, cloth for sails and awnings, paper for accounts."
 nd_pom_herring_processing: "Herring Processing"
 nd_pom_herring_processing_desc: "Baltic herring are cleaned, salted, and packed in barrels, consuming fish and salt to maintain the kontor's herring trade operations."
 nd_pom_grain_export: "Grain Export"
 nd_pom_grain_export_desc: "Oder River grain is stored, graded, and kept ready for export to Hanseatic markets, consuming wheat and lumber for storage and barrels."
 nd_pom_kollegium_maintenance: "Kollegium Upkeep"
 nd_pom_kollegium_maintenance_desc: "The costs of maintaining a university — paper for manuscripts, books for the library, beeswax for candles."
 nd_pom_scholarly_printing: "Scholarly Printing"
 nd_pom_scholarly_printing_desc: "The university printing press runs on paper, ink, and lead type to produce scholarly works circulated across the Hanseatic world."
 nd_pom_bastion_maintenance: "Bastion Upkeep"
 nd_pom_bastion_maintenance_desc: "Maintaining coastal fortifications requires stone for walls, iron for gates, and weaponry for the garrison."
 nd_pom_harbor_watch: "Harbor Watch"
 nd_pom_harbor_watch_desc: "An expanded garrison watches over the harbor approaches, maintaining naval supplies and firearms for the defense of Pomeranian ports."
 nd_pom_amber_workshop_maintenance: "Workshop Upkeep"
 nd_pom_amber_workshop_maintenance_desc: "Maintaining the amber workshop requires tools for carving, beeswax for polishing, and lumber for workbenches."
 nd_pom_amber_jewelry: "Amber Jewelry"
 nd_pom_amber_jewelry_desc: "Master craftsmen transform raw Baltic amber into exquisite jewelry, rosaries, and ornamental objects coveted by the wealthy across Europe."
 nd_pom_warehouse_maintenance: "Warehouse Upkeep"
 nd_pom_warehouse_maintenance_desc: "Maintaining a riverside warehouse requires timber for docks, stone for foundations, and tar for waterproofing."
 nd_pom_formed_tt: "Pomerania has been formed"
 nd_pom_path_a_tt: "Chose the #bold Griffin Crown#! destiny"
 nd_pom_path_b_tt: "Chose the #bold Wendish League#! destiny"
 nd_pom_destiny: "The Griffin's Destiny"
 nd_pom_destiny_desc: "United Pomerania stands at a crossroads. The red griffin must choose its future -- ducal authority forged in iron, or Hanseatic wealth built on amber and salt."
 nd_pom_dest_iron_crown: "The Iron Crown"
 nd_pom_dest_iron_crown_desc: "Secure Schwerin and assert Griffin authority over the neighboring duchies. The Pomeranian duke must prove he is more than a figurehead -- he commands armies, not just counting houses."
 nd_pom_dest_march_south: "The March South"
 nd_pom_dest_march_south_desc: "Push into Brandenburg and seize Berlin and Rostock. The Oder is a Pomeranian river; its entire course should flow through Griffin lands."
 nd_pom_dest_baltic_dominion: "Baltic Dominion"
 nd_pom_dest_baltic_dominion_desc: "Forge a true Baltic kingdom stretching from Magdeburg to Konigsberg. The Griffin dynasty shall rule the greatest principality between the Elbe and the Vistula."
 nd_pom_dest_amber_road: "The Amber Road"
 nd_pom_dest_amber_road_desc: "Seize the Hanseatic capital of Lubeck and establish Pomeranian commercial supremacy. Baltic amber, the gold of the north, shall flow through our ports."
 nd_pom_dest_counting_houses: "The Counting Houses"
 nd_pom_dest_counting_houses_desc: "Master the institutions of modern finance and ensure salt -- the lifeblood of the herring trade -- flows through the capital market."
 nd_pom_dest_mare_balticum: "Mare Balticum"
 nd_pom_dest_mare_balticum_desc: "Dominate Baltic trade from Lubeck to Visby. Embrace global commerce and build a fleet to enforce the Wendish League's monopoly over the northern seas."
 nd_pom.5.t: "The Griffin's Destiny"
 nd_pom.5.d: "Pomerania united -- the red griffin now spreads its wings across the Baltic coast. But what manner of realm shall this be? The destiny of the Griffin House is not yet written. It falls to us to choose the path that will define Pomerania for centuries to come."
 nd_pom.5.a: "Our destiny awaits"
 nd_pom.6.t: "The Iron Crown"
 nd_pom.6.d: "Schwerin has fallen before Pomeranian arms. The Mecklenburg dukes, who once looked down upon the Griffins as mere coastal lordlings, now kneel before our banner. With a professional army at our command and the revenues of the Hanseatic ports funding our ambitions, the Griffin duke is no longer a first among equals -- he is a sovereign in truth."
 nd_pom.6.a: "The Griffin commands, and the north obeys"
 nd_pom.7.t: "The March South"
 nd_pom.7.d: "Berlin and Rostock are ours. The Oder, from its headwaters to the sea, now flows through Griffin territory. Brandenburg's march lords have been humbled, and the Pomeranian duke gazes south across lands that once seemed impossibly distant. How shall we consolidate these conquests -- through a standing army that answers only to the duke, or through border marches that project our power outward?"
 nd_pom.7.a: "Build a professional ducal army"
 nd_pom.7.b: "Establish fortified border marches"
 nd_pom.8.t: "Baltic Dominion"
 nd_pom.8.d: "From the Elbe to the Vistula, the red griffin flies over fortress and city alike. Magdeburg and Konigsberg -- the seats of archbishops and grand masters -- now answer to Pomerania. What began as a modest coastal duchy has become the dominant power of the North German Plain. The Griffin dynasty has achieved what seemed impossible. Shall we rule through military might, or through the institutions of governance?"
 nd_pom.8.a: "Our armies are the foundation of our power"
 nd_pom.8.b: "We shall build institutions to govern"
 nd_pom.9.t: "The Amber Road"
 nd_pom.9.d: "Lubeck, the Queen of the Hanse, flies the Griffin banner. The greatest commercial city in northern Europe is now a Pomeranian possession. Amber, salt, grain, and herring flow through our ports in quantities that would have staggered our ancestors. The Wendish Hanse has found its champion -- not a league of squabbling merchants, but a unified duchy with the power to enforce free trade at sword-point if necessary."
 nd_pom.9.a: "The amber road leads to Pomerania"
 nd_pom.10.t: "The Counting Houses"
 nd_pom.10.d: "The counting houses of Stettin and Stralsund have grown into proper banking institutions, handling letters of credit and exchange across the Baltic. Salt from Luneburg and Kolberg flows through our capital market, preserving the herring that is the staple of northern commerce. Shall we consolidate this wealth through monopolistic control, or through chartered guilds that attract talent from across Europe?"
 nd_pom.10.a: "Establish monopoly control of key trades"
 nd_pom.10.b: "Charter guilds to foster prosperity"
 nd_pom.11.t: "Mare Balticum"
 nd_pom.11.d: "The Baltic Sea is a Pomeranian lake. From Lubeck to Visby, the great entrepots of northern trade answer to the Wendish League under Griffin patronage. Our merchants trade in every port from Bergen to Novgorod. Our fleet enforces the peace of commerce. The wealth of the north flows through Pomeranian hands. Shall we open our ports to the world, or shall the merchant princes rule as sovereign lords of commerce?"
 nd_pom.11.a: "Declare Pomeranian ports free and open"
 nd_pom.11.b: "Let the merchant princes govern"
 STATIC_MODIFIER_NAME_nd_pom_dest_ducal_army: "Ducal Army"
 STATIC_MODIFIER_DESC_nd_pom_dest_ducal_army: "The Griffin duke has established a professional standing army, replacing unreliable feudal levies with troops that answer only to the ducal crown."
 STATIC_MODIFIER_NAME_nd_pom_dest_border_march: "Border March"
 STATIC_MODIFIER_DESC_nd_pom_dest_border_march: "Fortified border marches secure Pomerania's expanded frontiers, projecting Griffin power into neighboring lands."
 STATIC_MODIFIER_NAME_nd_pom_dest_iron_scepter: "Iron Scepter"
 STATIC_MODIFIER_DESC_nd_pom_dest_iron_scepter: "Pomerania's military machine is the terror of northern Europe, its veterans hardened by decades of conquest."
 STATIC_MODIFIER_NAME_nd_pom_dest_griffin_throne: "The Griffin Throne"
 STATIC_MODIFIER_DESC_nd_pom_dest_griffin_throne: "The Griffin dynasty rules through sophisticated governance, binding vassals and subjects through institutional loyalty rather than fear alone."
 STATIC_MODIFIER_NAME_nd_pom_dest_salt_monopoly: "Salt Monopoly"
 STATIC_MODIFIER_DESC_nd_pom_dest_salt_monopoly: "Pomeranian control of the Baltic salt trade has given the duchy unrivaled commercial leverage, drawing peoples and goods to its markets."
 STATIC_MODIFIER_NAME_nd_pom_dest_guild_charter: "Guild Charter"
 STATIC_MODIFIER_DESC_nd_pom_dest_guild_charter: "Chartered guilds attract skilled craftsmen from across Europe to Pomeranian cities, though the cost of maintaining a peacetime military rises."
 STATIC_MODIFIER_NAME_nd_pom_dest_free_port: "Free Port"
 STATIC_MODIFIER_DESC_nd_pom_dest_free_port: "Pomeranian ports are declared open to all nations, attracting merchants, spies, and innovators from every corner of the known world."
 STATIC_MODIFIER_NAME_nd_pom_dest_merchant_prince: "Merchant Prince"
 STATIC_MODIFIER_DESC_nd_pom_dest_merchant_prince: "The great merchant families of Stralsund and Stettin govern as princes of commerce, their wealth and influence holding the realm together."
 nd_pom_griffinburg: "Griffinburg"
 nd_pom_griffinburg_desc: "A mighty ducal fortress-palace crowned with the red griffin, embodying the military authority of the Griffin dynasty over its Baltic dominion."
 nd_pom_griffinburg_maintenance: "Griffinburg Upkeep"
 nd_pom_griffinburg_maintenance_desc: "Maintaining the ducal fortress requires stone for walls, weaponry for the garrison, iron for gates, and tools for repairs."
 nd_pom_stapelhaus: "Stapelhaus"
 nd_pom_stapelhaus_desc: "A grand Hanseatic staple house where goods are stored, weighed, and taxed before re-export -- the commercial heart of the Wendish League."
 nd_pom_stapelhaus_maintenance: "Stapelhaus Upkeep"
 nd_pom_stapelhaus_maintenance_desc: "Operating the staple house requires timber for storage, cloth for packaging, paper for accounts, and salt for preserving goods."
