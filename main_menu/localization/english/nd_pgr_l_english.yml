l_english:
 # === ADVANCE NAMES AND DESCRIPTIONS ===
 nd_pgr_gold_of_suvarnadvipa: "Gold of Suvarnadvipa"
 nd_pgr_gold_of_suvarnadvipa_desc: "Since antiquity, Sumatra has been known as Suvarnadvipa — the Island of Gold. The Minangkabau highlands of Tanah Datar contain some of the richest alluvial gold deposits in Southeast Asia, and Adityawarman founded his kingdom specifically to control this wealth. Highland miners pan the rivers and excavate hillside deposits, sending gold caravans down the Bukit Barisan slopes to coastal ports."
 nd_pgr_matrilineal_adat: "Matrilineal Adat"
 nd_pgr_matrilineal_adat_desc: "The Minangkabau practice the world's largest surviving matrilineal system. Property, land, and the ancestral house pass through the female line. Women own the rumah gadang, and men who marry move to their wife's household. This adat — customary law — governs inheritance, marriage, and dispute resolution through an elaborate system of clan councils and elected chiefs."
 nd_pgr_rumah_gadang_tradition: "Rumah Gadang Tradition"
 nd_pgr_rumah_gadang_tradition_desc: "The rumah gadang — literally 'big house' — is the iconic Minangkabau longhouse with its dramatic upswept roof resembling buffalo horns. These communal dwellings house an extended matrilineal family, serve as ceremonial halls, and symbolize the continuity of the clan. Their carved wooden facades tell the story of each family's heritage."
 nd_pgr_silek_tradition: "Silek Tradition"
 nd_pgr_silek_tradition_desc: "The earliest structured pencak silat traditions originate in the Minangkabau highlands, where young men learn the art in surau alongside Quranic study and adat customs. Silek Minangkabau emphasizes fluid footwork, swift kicks, and defensive parrying. Every nagari considers its silat tradition a village heirloom — pusaka anak nagari — meant to protect those who venture out on the rantau."
 nd_pgr_nagari_governance: "Nagari Governance"
 nd_pgr_nagari_governance_desc: "The nagari is the fundamental unit of Minangkabau political organization — a self-governing village republic with its own council of elected elders, its own adat laws, and its own judicial procedures. Unlike centralized kingdoms, Pagarruyung's authority rests on prestige and arbitration rather than military force, with each nagari maintaining considerable autonomy."
 nd_pgr_highland_terraces: "Highland Terraces"
 nd_pgr_highland_terraces_desc: "The volcanic highlands of West Sumatra are sculpted into elaborate wet-rice terraces that cascade down the slopes of the Bukit Barisan. These sawah irrigated fields were among the earliest rice cultivation sites in the Malay world, feeding a growing highland population and providing the agricultural foundation for Minangkabau prosperity."
 nd_pgr_rajo_tigo_selo: "Rajo Tigo Selo"
 nd_pgr_rajo_tigo_selo_desc: "The Kingdom of Pagarruyung is governed by the Rajo Tigo Selo — the Three Kings Sitting Cross-Legged. Raja Alam in Pagaruyung holds executive power, Raja Adat in Buo arbitrates customary law, and Raja Ibadat in Sumpur Kudus oversees religious affairs. This triumvirate balances worldly authority, traditional custom, and spiritual guidance, each checking the others."
 nd_pgr_merantau_tradition: "Merantau Tradition"
 nd_pgr_merantau_tradition_desc: "The Minangkabau are driven by merantau — the tradition of leaving one's homeland to seek fortune, knowledge, and experience in distant lands. Young men, excluded from property inheritance under the matrilineal system, venture out to establish trading networks across the archipelago. This diaspora creates a web of Minangkabau merchant communities from Malacca to Java."
 nd_pgr_gold_caravan_routes: "Gold Caravan Routes"
 nd_pgr_gold_caravan_routes_desc: "Minangkabau gold entrepreneurs lead caravans of a hundred or more men on foot down the rugged slopes of the Bukit Barisan to the harbors on the western coast. These gold routes connect the highland mines of Tanah Datar to the maritime trade networks of the Indian Ocean, making Pagarruyung a crucial link in the global gold trade."
 nd_pgr_surau_education: "Surau Education"
 nd_pgr_surau_education_desc: "The surau is the heart of Minangkabau education. In this communal building, young boys and men live together, learning to recite the Quran, studying religious knowledge, mastering pencak silat, and absorbing adat traditions through oral instruction. The surau system produces not merely local scholars but international-caliber Islamic thinkers who spread across the Nusantara."
 nd_pgr_highland_islamization: "Highland Islamization"
 nd_pgr_highland_islamization_desc: "Islam arrives gradually in the Minangkabau highlands during the sixteenth century, transforming Adityawarman's Hindu-Buddhist kingdom into an Islamic sultanate. The first Muslim ruler, known in tradition as Sultan Alif, marks the beginning of a remarkable accommodation between Quranic law and matrilineal custom that would define Minangkabau identity for centuries."
 nd_pgr_minang_bladesmithing: "Minangkabau Bladesmithing"
 nd_pgr_minang_bladesmithing_desc: "Minangkabau smiths are expert metalworkers, forging the keris, klewang, and other bladed weapons for both local warriors and export to neighboring states. The hulubalang — military officers and royal bodyguards — carry these finely crafted weapons as symbols of their rank. Arms production supplies not only Pagarruyung's defenders but also the markets of Aceh."
 nd_pgr_pepper_trade: "Pepper Trade"
 nd_pgr_pepper_trade_desc: "The western slopes of the Minangkabau highlands produce large quantities of black pepper, a commodity that draws foreign merchants to Sumatra's ports. Pepper joins gold as a pillar of the kingdom's export economy, with Minangkabau traders controlling the supply chain from highland plantations to coastal warehouses."
 nd_pgr_adat_basandi_syarak: "Adat Basandi Syarak"
 nd_pgr_adat_basandi_syarak_desc: "The Minangkabau achieve a remarkable synthesis: 'Adat basandi syarak, syarak basandi Kitabullah' — Custom is based on Islamic Law, Islamic Law is based on the Quran. This philosophical framework reconciles matrilineal inheritance with Islamic jurisprudence, creating a unique legal system where high inheritance passes through women and low inheritance follows Quranic rules."
 nd_pgr_minang_diaspora: "Minangkabau Diaspora"
 nd_pgr_minang_diaspora_desc: "Minangkabau rantau communities now stretch across the entire Malay world. From Malacca to Negeri Sembilan, from Java to Borneo, migrant networks of traders, scholars, and artisans maintain strong ties to their highland homeland while dominating local commerce wherever they settle. Their reputation for shrewd dealing and mutual support makes them formidable economic competitors."
 nd_pgr_cassia_cultivation: "Cassia Cultivation"
 nd_pgr_cassia_cultivation_desc: "The highland forests of West Sumatra yield cassia bark — a close relative of cinnamon — prized across Asia and Europe as a spice and preservative. Minangkabau farmers cultivate cassia alongside pepper, diversifying the export economy beyond gold and creating a new source of wealth from the volcanic soil."
 nd_pgr_fortified_nagari: "Fortified Nagari"
 nd_pgr_fortified_nagari_desc: "As external threats grow — from Acehnese expansion, Javanese rivalry, and eventually European encroachment — Minangkabau villages fortify themselves. The nagari, already self-governing, now build earthen ramparts, bamboo palisades, and stone walls. The terrain of the Bukit Barisan highlands serves as natural fortification, making each fortified nagari a formidable defensive position."
 nd_pgr_bukit_barisan_mastery: "Bukit Barisan Mastery"
 nd_pgr_bukit_barisan_mastery_desc: "The Bukit Barisan mountain range — Sumatra's volcanic spine — is the Minangkabau homeland. Generations of highland living have produced warriors who know every pass, every ravine, and every ambush point. Invading armies face a nightmare of narrow defiles, tropical downpours, and defenders who melt into terrain they have known since birth."
 nd_pgr_expanding_rantau: "Expanding Rantau Networks"
 nd_pgr_expanding_rantau_desc: "The merantau tradition evolves from individual adventure to organized commercial expansion. Minangkabau trading settlements along the Strait of Malacca and across the archipelago form networks of mutual support, shared intelligence, and collective bargaining. The rantau becomes not just a rite of passage but the foundation of a mercantile empire without borders."
 nd_pgr_basa_ampek_balai: "Basa Ampek Balai"
 nd_pgr_basa_ampek_balai_desc: "The Basa Ampek Balai — Council of Four Powers — represents the highest judicial and deliberative body below the Rajo Tigo Selo. These four great ministers adjudicate disputes that individual nagari cannot resolve, coordinate policy across the highland valleys, and maintain the constitutional fabric of a remarkably decentralized kingdom."
 nd_pgr_matrilineal_succession: "Matrilineal Succession"
 nd_pgr_matrilineal_succession_desc: "While kingdoms across the region tear themselves apart in succession crises, the Minangkabau matrilineal system provides remarkable stability. Titles and property descend through the mother's line, eliminating the fratricidal competition that plagues patrilineal kingdoms. When a ruler dies, the next in line is already determined by lineage and clan consensus."
 nd_pgr_highland_coffee: "Highland Coffee"
 nd_pgr_highland_coffee_desc: "The volcanic soils and cool elevation of the Minangkabau highlands prove ideal for coffee cultivation. As the global appetite for coffee grows, highland farmers add this cash crop to their diversified agricultural economy, joining pepper, cassia, and gambier as a major export commodity."
 nd_pgr_silat_mastery: "Silat Mastery"
 nd_pgr_silat_mastery_desc: "Over centuries, Minangkabau silat evolves from village martial tradition into a sophisticated combat system. Masters develop distinctive styles — the flowing movements of silek harimau mimicking the tiger, the explosive techniques of silek tuo drawing on ancestral wisdom. These masters train the next generation of warriors who carry the art across the rantau."
 nd_pgr_scholarly_tradition: "Minangkabau Scholarly Tradition"
 nd_pgr_scholarly_tradition_desc: "The surau education system produces scholars of international caliber. Minangkabau ulama travel to Mecca, Cairo, and the great madrasas of the Islamic world, returning with knowledge that they disseminate through an expanding network of religious schools. These scholars write influential texts in Arabic and Malay, earning Pagarruyung a reputation as a center of Islamic learning."
 nd_pgr_gambier_production: "Gambier Production"
 nd_pgr_gambier_production_desc: "Gambier — an extract from the leaves of Uncaria gambir used in tanning, dyeing, and as a betel accompaniment — becomes a major Minangkabau export crop alongside tobacco. The highlands' abundant rainfall and rich volcanic soil support intensive cultivation, with the product shipped from coastal ports to markets across Southeast Asia."
 nd_pgr_istano_basa: "Istano Basa Pagaruyung"
 nd_pgr_istano_basa_desc: "The Istano Basa — the Great Palace of Pagaruyung — stands as the supreme symbol of Minangkabau sovereignty. Built in the traditional rumah gadang style but on a magnificent scale, its multiple soaring roof peaks represent the authority of the Rajo Tigo Selo. The palace is not merely a royal residence but the spiritual and political heart of the entire Minangkabau world."
 nd_pgr_rantau_mercantile: "Rantau Mercantile Empire"
 nd_pgr_rantau_mercantile_desc: "The Minangkabau diaspora has evolved into a borderless mercantile empire. Rantau communities in every major port city of the archipelago coordinate trade, share market intelligence, and provide credit networks that rival European colonial companies. Minangkabau merchants dominate regional commerce through collective organization rather than military force."
 nd_pgr_padri_movement: "Padri Reform Movement"
 nd_pgr_padri_movement_desc: "Returning pilgrims from Mecca bring Wahhabi-inspired reform ideology to the Minangkabau highlands. The Padri movement demands strict Islamic law to replace the syncretic accommodation of adat and syarak. Led by charismatic figures like Tuanku Nan Renceh, the reformers challenge the traditional authority of the adat chiefs and the Rajo Tigo Selo itself, plunging the kingdom into an existential crisis."
 nd_pgr_tuanku_fortresses: "Tuanku Fortresses"
 nd_pgr_tuanku_fortresses_desc: "The Padri leaders — each bearing the title Tuanku — build fortified strongholds across the highlands. Tuanku Imam Bonjol and Tuanku Rao construct not merely defensive positions but self-sufficient communities with mosques, markets, and agricultural land behind their walls. These fortresses serve as both military bases and centers of the reformed Islamic order."
 nd_pgr_negeri_sembilan: "Negeri Sembilan"
 nd_pgr_negeri_sembilan_desc: "Across the Strait of Malacca, Minangkabau migrants have established Negeri Sembilan — the Nine States — a confederation governed by matrilineal adat law transplanted from the homeland. This overseas colony maintains direct ties to Pagarruyung, with its Yang di-Pertuan Besar chosen from the Minangkabau royal family. It is the most successful example of Minangkabau cultural export."
 nd_pgr_highland_resistance: "Highland Resistance Tradition"
 nd_pgr_highland_resistance_desc: "The Bukit Barisan highlands have never been easily conquered. Each valley entrance becomes a chokepoint, each nagari a potential fortress. When colonial powers arrive with superior firepower, the Minangkabau turn to guerrilla tactics perfected over generations — ambush, withdrawal, resupply from hidden highland gardens, and the knowledge that the mountains themselves are their greatest ally."
 nd_pgr_imam_bonjol: "Imam Bonjol's Resistance"
 nd_pgr_imam_bonjol_desc: "Tuanku Imam Bonjol — mystic, strategist, and visionary — wages a legendary resistance against Dutch colonial forces from his highland fortress. For years, Bonjol holds the Dutch at bay through guerrilla warfare, diplomatic maneuvering, and the unshakeable loyalty of his followers. His three-year siege becomes a symbol of Minangkabau defiance against foreign domination."
 nd_pgr_adat_vs_padri: "Adat versus Padri"
 nd_pgr_adat_vs_padri_desc: "The Padri Wars reveal the fundamental tension within Minangkabau society: between ancient matrilineal custom and reformist Islamic purity. This is not merely a military conflict but an intellectual one. The resolution — a renewed synthesis of adat and Islam that survives into the modern era — produces some of the most sophisticated legal and philosophical thinking in the Malay world."
 nd_pgr_minang_renaissance: "Minangkabau Renaissance"
 nd_pgr_minang_renaissance_desc: "From the crucible of the Padri Wars emerges a Minangkabau intellectual renaissance. Scholars, writers, and philosophers grapple with the relationship between tradition and modernity, Islam and custom, local identity and global engagement. This ferment produces literature, legal theory, and educational reform that will make the Minangkabau one of the most intellectually productive peoples of the archipelago."
 nd_pgr_modern_rantau: "Modern Rantau Economy"
 nd_pgr_modern_rantau_desc: "The merantau tradition transforms from a cultural practice into an economic strategy. Minangkabau entrepreneurs establish businesses across the Indonesian archipelago and beyond, creating supply chains, franchise-like restaurant networks, and mutual aid organizations. Their commercial acumen, honed by centuries of trading tradition, makes them among the most economically successful groups in Southeast Asia."
 nd_pgr_nusantara_scholars: "Nusantara Scholars"
 nd_pgr_nusantara_scholars_desc: "Minangkabau scholars occupy leading positions in Islamic education, journalism, literature, and political thought across the Nusantara. The surau tradition of rigorous learning, combined with the merantau impulse to engage with the wider world, produces intellectuals who bridge local tradition and global modernity. Their influence shapes the intellectual landscape of the entire region."
 nd_pgr_padang_cultural_export: "Padang Cultural Export"
 nd_pgr_padang_cultural_export_desc: "Padang cuisine — with its elaborate rendang, its fiery sambal, its rich coconut-based curries — becomes the most recognizable culinary tradition in Southeast Asia. Rantau migrants establish Padang restaurants in every city they settle, creating an informal but powerful cultural export network. Nasi Padang becomes a symbol of Minangkabau identity far beyond the highlands."

 # === UNIT NAMES AND DESCRIPTIONS ===
 a_nd_pgr_pesilat: "Pesilat"
 a_nd_pgr_pesilat_desc: "Practitioners of silek Minangkabau — the ancient martial art of the highlands. Pesilat fight with fluid footwork, explosive kicks, and keris daggers, relying on agility and initiative over heavy armor. They are trained from boyhood in the surau, learning combat alongside Quranic recitation and adat customs."
 a_nd_pgr_hulubalang: "Hulubalang"
 a_nd_pgr_hulubalang_desc: "The hulubalang are the military officers and bodyguards of the Minangkabau royalty. Armed with finely crafted keris, klewang swords, and shields, they serve without pay — instead earning their share through military merit and plunder. Skilled horsemen and expert bladesmen, they are the professional fighting force of Pagarruyung."
 a_nd_pgr_nagari_defenders: "Nagari Defenders"
 a_nd_pgr_nagari_defenders_desc: "Fortified village militia drawn from the self-governing nagari. These defenders know every trail, ravine, and ambush point in their highland territory. Behind palisades and earthen ramparts, they fight with tenacious determination, turning each nagari into a fortress that must be reduced individually by any would-be conqueror."
 a_nd_pgr_silat_masters: "Silat Masters"
 a_nd_pgr_silat_masters_desc: "The most accomplished practitioners of Minangkabau silat, these warriors have mastered advanced techniques: the tiger's pounce of silek harimau, the ancestral wisdom of silek tuo. Their devastating combination of speed, precision, and unpredictable movement makes them feared in close combat throughout the archipelago."
 a_nd_pgr_rantau_militia: "Rantau Militia"
 a_nd_pgr_rantau_militia_desc: "Levy militia recruited from Minangkabau diaspora communities. These rantau settlers fight to protect the trading networks that sustain them far from the highlands. Lightly armed but mobile, they patrol trade routes and garrison merchant settlements, their loyalty to the homeland undimmed by distance."
 a_nd_pgr_highland_guerrilla: "Highland Guerrillas"
 a_nd_pgr_highland_guerrilla_desc: "Mountain resistance fighters who wage guerrilla warfare from the Bukit Barisan highlands. Drawing on centuries of highland defensive tradition, they ambush invading columns in narrow defiles, vanish into jungle-covered slopes, and sustain themselves from hidden highland gardens. Their knowledge of the terrain makes conventional military operations against them extraordinarily costly."
 n_nd_pgr_rantau_trader: "Rantau Trader"
 n_nd_pgr_rantau_trader_desc: "A fast, lightly armed trading vessel designed for the Minangkabau diaspora's maritime commerce. These ships carry gold, pepper, cassia, and other highland products to markets across the archipelago, prioritizing speed and cargo capacity over firepower. The rantau trader is the maritime extension of the merantau tradition."

 # === BUILDING NAMES AND DESCRIPTIONS ===
 nd_pgr_gold_smeltery: "Gold Smeltery"
 nd_pgr_gold_smeltery_desc: "A facility for processing alluvial gold from the highland rivers of Tanah Datar. Minangkabau gold workers refine raw placer gold into ingots and ornamental pieces, producing the wealth that first attracted Adityawarman to establish his kingdom in the Sumatran highlands."
 nd_pgr_rumah_gadang: "Rumah Gadang"
 nd_pgr_rumah_gadang_desc: "The iconic Minangkabau longhouse with its soaring buffalo-horn roof. This communal dwelling houses an extended matrilineal family, serves as a ceremonial hall, and stores the accumulated wealth and heritage of the clan. Its carved and painted facade tells the story of each family's ancestry."
 nd_pgr_sawah_terraces: "Sawah Terraces"
 nd_pgr_sawah_terraces_desc: "Elaborate wet-rice terraces carved into the volcanic highlands of West Sumatra. The sawah system channels mountain water through intricate irrigation networks to feed terraced paddies, producing rice harvests that sustain the highland population and underpin Minangkabau prosperity."
 nd_pgr_rantau_trading_post: "Rantau Trading Post"
 nd_pgr_rantau_trading_post_desc: "A trading outpost established by Minangkabau rantau migrants. These posts serve as hubs for the diaspora's commercial network, providing warehousing, credit, and mutual support for migrant traders far from the highlands."
 nd_pgr_surau: "Surau"
 nd_pgr_surau_desc: "The traditional Minangkabau communal learning center where young men live, pray, and study. Boys learn Quranic recitation, Islamic jurisprudence, pencak silat, and adat customs under the guidance of resident scholars. The surau has produced generations of Nusantara intellectuals."
 nd_pgr_pepper_warehouse: "Pepper Warehouse"
 nd_pgr_pepper_warehouse_desc: "A storage and processing facility for the black pepper harvested from the western Minangkabau highlands. Pepper is dried, sorted by grade, and stockpiled here before being transported to coastal ports for export to the wider world."
 nd_pgr_cassia_plantation: "Cassia Plantation"
 nd_pgr_cassia_plantation_desc: "A highland plantation cultivating cassia bark — Sumatra's version of cinnamon. The aromatic bark is stripped from cultivated trees, dried, and packed for export. Cassia joins pepper and gold as a pillar of the Minangkabau export economy."
 nd_pgr_coffee_plantation: "Highland Coffee Plantation"
 nd_pgr_coffee_plantation_desc: "An Arabica coffee plantation taking advantage of the Minangkabau highlands' volcanic soil, cool temperatures, and abundant rainfall. As global demand for coffee surges, these highland plantations become a major new source of wealth for Pagarruyung."
 nd_pgr_gambier_gardens: "Gambier Gardens"
 nd_pgr_gambier_gardens_desc: "Cultivation plots for gambier and tobacco in the highland valleys. Gambier extract is used in tanning, dyeing, and as a companion to betel chewing across Southeast Asia, while tobacco finds ready markets throughout the archipelago."
 nd_pgr_tuanku_fortress: "Tuanku Fortress"
 nd_pgr_tuanku_fortress_desc: "A fortified stronghold built by Padri leaders in the highland valleys. These fortresses combine military defensive works with self-sustaining communities — mosques, markets, wells, and agricultural plots within their walls. The most famous, Bonjol, withstood Dutch siege for three years."
 nd_pgr_literary_academy: "Literary Academy"
 nd_pgr_literary_academy_desc: "An intellectual center where Minangkabau scholars write, debate, and teach. The post-Padri War renaissance produces literature, legal philosophy, and educational reform that shapes thought across the Indonesian archipelago."
 nd_pgr_padang_restaurant: "Padang Restaurant"
 nd_pgr_padang_restaurant_desc: "A Minangkabau culinary establishment serving nasi Padang — elaborate multi-dish meals featuring rendang, sambal, and coconut-based curries. These restaurants, established by rantau migrants wherever they settle, serve as both commercial enterprises and cultural embassies for Minangkabau identity."

 # === PRODUCTION METHOD NAMES AND DESCRIPTIONS ===
 nd_pgr_gold_smelting: "Gold Smelting"
 nd_pgr_gold_smelting_desc: "Refines raw alluvial gold from highland rivers into pure metal for coinage, jewelry, and export."
 nd_pgr_rumah_maintenance: "Rumah Gadang Upkeep"
 nd_pgr_rumah_maintenance_desc: "Maintaining the elaborate carved woodwork and thatched roof of the traditional longhouse. Lumber for structural repairs, cloth for ceremonial hangings, and tools for the artisans who keep the carved facades in good order."
 nd_pgr_terracing_labor: "Terracing Labor"
 nd_pgr_terracing_labor_desc: "Cultivates wet rice on volcanic highland terraces fed by mountain irrigation channels."
 nd_pgr_rantau_trade_goods: "Rantau Trade Goods"
 nd_pgr_rantau_trade_goods_desc: "Imported silk and dyes traded through the Minangkabau diaspora network."
 nd_pgr_surau_upkeep: "Surau Upkeep"
 nd_pgr_surau_upkeep_desc: "Paper for Quranic manuscripts and study texts, cloth for prayer garments and furnishings, and incense for the prayer hall — the materials that sustain the surau as a center of learning and devotion."
 nd_pgr_pepper_processing: "Pepper Processing"
 nd_pgr_pepper_processing_desc: "Black pepper from the highland slopes is brought here to be dried, graded, and packed into crates. Timber crates and facilities are built and maintained with lumber, while tools keep the sorting and pressing equipment in working order."
 nd_pgr_cassia_harvesting: "Cassia Harvesting"
 nd_pgr_cassia_harvesting_desc: "Strips and dries cassia bark from cultivated highland trees, producing a prized spice for export."
 nd_pgr_coffee_processing: "Coffee Processing"
 nd_pgr_coffee_processing_desc: "Harvests, dries, and roasts highland Arabica coffee beans for the global market."
 nd_pgr_gambier_processing: "Gambier Processing"
 nd_pgr_gambier_processing_desc: "Extracts gambier and cultivates tobacco in the highland valleys for regional export."
 nd_pgr_fortress_upkeep: "Fortress Upkeep"
 nd_pgr_fortress_upkeep_desc: "Maintaining the stone and timber defenses of the Padri highland fortress."
 nd_pgr_literary_supplies: "Literary Supplies"
 nd_pgr_literary_supplies_desc: "Paper and ink for the scholars' literary and philosophical output."
 nd_pgr_rendang_cuisine: "Rendang Cuisine"
 nd_pgr_rendang_cuisine_desc: "The kitchen draws on rice as the staple base, beef and buffalo from highland livestock, and the fiery black pepper and chili that define Padang cuisine. Slow-cooked rendang, rich coconut curries, and sambal are prepared fresh for each day's service."

 # === LEVY NAMES AND DESCRIPTIONS ===
 levy_nd_pgr_rantau_militia: "Rantau Militia Levy"
 levy_nd_pgr_rantau_militia_desc: "Levy of lightly armed diaspora militia from Minangkabau trading communities."
 levy_nd_pgr_highland_guerrillas: "Highland Guerrilla Levy"
 levy_nd_pgr_highland_guerrillas_desc: "Levy of mountain resistance fighters from the Bukit Barisan highlands."

 # === STATIC MODIFIER NAMES AND DESCRIPTIONS ===
 STATIC_MODIFIER_NAME_nd_pgr_syarak_harmony: "Harmony of Syarak and Adat"
 STATIC_MODIFIER_DESC_nd_pgr_syarak_harmony: "The formal reconciliation of Islamic jurisprudence with matrilineal customary law creates a stable and tolerant society."
 STATIC_MODIFIER_NAME_nd_pgr_adat_primacy: "Primacy of the Adat"
 STATIC_MODIFIER_DESC_nd_pgr_adat_primacy: "Matrilineal custom is upheld as the supreme source of law, providing stability and legitimacy rooted in ancient tradition."
 STATIC_MODIFIER_NAME_nd_pgr_padri_zeal: "Padri Zeal"
 STATIC_MODIFIER_DESC_nd_pgr_padri_zeal: "The reformist fervor of the Padri movement inspires strict discipline and uncompromising devotion to the cause."
 STATIC_MODIFIER_NAME_nd_pgr_adat_resilience: "Adat Resilience"
 STATIC_MODIFIER_DESC_nd_pgr_adat_resilience: "The traditional adat chiefs rally to defend their ancestral customs, fortifying both their positions and their resolve."
 STATIC_MODIFIER_NAME_nd_pgr_bonjol_defiance: "Bonjol's Defiance"
 STATIC_MODIFIER_DESC_nd_pgr_bonjol_defiance: "The legendary resistance of Imam Bonjol inspires the entire nation to stand against foreign domination, whatever the cost."

 # === EVENT LOCALIZATION ===
 nd_pgr.1.t: "Adat Basandi Syarak"
 nd_pgr.1.d: "The Minangkabau highlands face a question that has simmered for generations: how shall the ancient matrilineal adat coexist with the demands of Islamic law? The formula has been spoken for decades — 'Adat basandi syarak, syarak basandi Kitabullah' — but now our scholars and chiefs must give it practical meaning.\n\nThe Rajo Tigo Selo and the Basa Ampek Balai have debated the matter. Property and lineage shall continue through the mother's line as 'high inheritance,' while a father's personal earnings may pass to his children as 'low inheritance' under Quranic rules. But the balance between these two authorities remains contested.\n\nShall we emphasize the harmonious synthesis, letting syarak and adat strengthen each other? Or shall we declare that the adat — tested by centuries of practice — holds primacy in our governance?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_pgr.1.a: "Syarak and Adat shall be one garment"
 nd_pgr.1.b: "The Adat is the foundation upon which all else rests"
 nd_pgr.2.t: "The Padri Storm"
 nd_pgr.2.d: "Pilgrims returning from Mecca bring more than faith — they bring the fire of reform. Led by men like Tuanku Nan Renceh, the Padri movement demands that Minangkabau society conform to strict Islamic law. Gambling houses are burned. Cockfighting is forbidden. The traditional chiefs who tolerate these customs under the banner of adat are denounced as insufficiently devout.\n\nThe kingdom trembles. In some valleys, the Padri seize power by force. In others, adat chiefs rally their people to resist. The conflict threatens to tear apart the fabric of Minangkabau society — the very synthesis of adat and syarak that has held the highlands together for centuries.\n\nOur response to the Padri movement will shape the character of Pagarruyung for generations. Do we embrace the reformers' discipline and zeal, or defend the ancestral customs that have sustained our people since time immemorial?"
 nd_pgr.2.a: "The purification of our faith shall strengthen us"
 nd_pgr.2.b: "Our ancestors' wisdom cannot be cast aside"
 nd_pgr.3.t: "The Fortress of Bonjol"
 nd_pgr.3.d: "From his highland fortress, Tuanku Imam Bonjol wages a war that will become legend. For three years, Dutch colonial forces — equipped with modern artillery and disciplined European infantry — batter against the defenses of Bonjol. And for three years, the fortress holds.\n\nImam Bonjol is no mere warlord. A mystic, a scholar, and a brilliant strategist, he has built Bonjol into a self-sustaining community — with mosques, markets, gardens, and wells all within its walls. His fighters know every trail through the surrounding mountains. Dutch supply lines are ambushed. Reinforcements are harassed. The terrain itself fights on Bonjol's side.\n\nThough the fortress will eventually fall — through Dutch treachery at a false negotiation rather than military defeat — the resistance of Imam Bonjol becomes an eternal symbol of Minangkabau courage. His defiance echoes through the centuries: the highlands cannot be conquered by force alone."
 nd_pgr.3.a: "Let our mountains remember his name"
 nd_pgr.4.t: "Istano Basa Pagaruyung"
 nd_pgr.4.d: "The great palace of Pagaruyung rises above the highland valley like a vision from the age of Adityawarman himself. Its roof — a magnificent cascade of buffalo-horn peaks — can be seen from across Tanah Datar, a statement of sovereignty visible to all.\n\nThe Istano Basa is built in the rumah gadang tradition but on a scale that dwarfs any clan house. Its three main sections house the courts of the Rajo Tigo Selo. The carved and painted facades depict the history and mythology of the Minangkabau people — the journey from Pariangan Padang Panjang, the legend of the victorious water buffalo that gave the people their name.\n\nWithin these walls, the business of the kingdom is conducted: adat disputes are arbitrated, foreign ambassadors are received, and the elaborate ceremonies of the Minangkabau court unfold. The Istano Basa is not merely a building — it is the heart of a civilization."
 nd_pgr.4.a: "The pride of all Alam Minangkabau"
 nd_pgr_formed_tt: "Pagarruyung has been formed"
 nd_pgr_path_a_tt: "Chose Harmony of Syarak and Adat"
 nd_pgr_path_b_tt: "Chose Primacy of the Adat"
