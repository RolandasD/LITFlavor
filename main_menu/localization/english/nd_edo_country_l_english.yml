l_english:
 EDO: "Kingdom of Benin"
 EDO_ADJ: "Beninese"
 EDO_f: "Kingdom of Benin"
 EDO_f_desc: "The Kingdom of Benin was one of the most powerful and sophisticated states in pre-colonial West Africa, centered on the Edo people and the city of Benin. Ruled by the Oba, the kingdom was renowned for its centralized administration, formidable military, and extraordinary court art — the famed Benin Bronzes. An Edo ruler who consolidates the Benin heartland and the lower Niger can restore the kingdom to its former grandeur."
