l_english:
 STATIC_MODIFIER_NAME_nd_soe_river_conqueror: "Lord of the River"
 STATIC_MODIFIER_DESC_nd_soe_river_conqueror: "In the tradition of Sunni Ali, the Songhai Empire wages war with unmatched speed along the Niger, striking from river and land simultaneously."
 STATIC_MODIFIER_NAME_nd_soe_scholar_emperor: "The Scholar's Throne"
 STATIC_MODIFIER_DESC_nd_soe_scholar_emperor: "Following Askia Muhammad's vision, the Songhai Empire becomes a beacon of Islamic learning and just governance across the Sahel."
 STATIC_MODIFIER_NAME_nd_soe_mecca_pilgrimage: "Pilgrim of the Two Holy Cities"
 STATIC_MODIFIER_DESC_nd_soe_mecca_pilgrimage: "The Emperor's pilgrimage to Mecca has elevated Songhai's standing among the Muslim world, bringing scholars and merchants to our courts."
 STATIC_MODIFIER_NAME_nd_soe_last_stand_defense: "Defenders of the Niger"
 STATIC_MODIFIER_DESC_nd_soe_last_stand_defense: "Against the thunder of foreign cannons, the Songhai stand firm in defense of their homeland and the cities of the Niger."
 STATIC_MODIFIER_NAME_nd_soe_scorched_earth_retreat: "The Sahel Retreats into the Sand"
 STATIC_MODIFIER_DESC_nd_soe_scorched_earth_retreat: "Let the invaders take the empty cities. The Songhai know the desert, the river, and the paths between. We will endure."
 nd_soe.1.t: "The Rise of the Songhai Empire"
 nd_soe.1.d: "The Niger River bends through the heart of our land like a great artery of civilization. From Gao to Timbuktu, from the salt mines of Taghaza to the gold fields of Wangara, a new empire rises to claim dominion over the greatest trade routes in Africa.\n\nBut what shall define this empire? Shall we follow the path of Sunni Ali — the warrior who never lost a battle, who struck from river and land with devastating speed, who bent the Niger to his will through sheer military force? Or shall we walk the road of Askia Muhammad — the pilgrim-emperor who transformed a military conquest into a civilization of law, scholarship, and faith, making Timbuktu the intellectual capital of the Islamic world?\n\nThe river stretches before us. The choice is ours.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_soe.1.a: "We are the riders of the Niger — let our enemies tremble."
 nd_soe.1.b: "We shall build a throne of knowledge and justice."
 nd_soe.2.t: "The Pilgrimage of the Askia"
 nd_soe.2.d: "In 1496, Askia Muhammad departed Gao with a retinue of five hundred cavalry and one thousand foot soldiers, bearing three hundred thousand gold pieces for charitable distribution along the route. His hajj to Mecca was no mere act of personal devotion — it was a diplomatic masterstroke. In the Holy Cities, he was received by the Abbasid Caliph in Cairo, who invested him with the title Caliph of the Lands of Takrur, granting the Songhai throne religious legitimacy that no predecessor had possessed.\n\nHe returned with scholars, architects, and merchants. He brought the jurist al-Maghili from Tlemcen to serve as his chief advisor. He carried the idea that Timbuktu could become not merely a trading post but a seat of learning to rival Cairo and Baghdad. The pilgrimage transformed a military empire into a cultural one."
 nd_soe.2.a: "The world now knows the glory of Songhai."
 nd_soe.3.t: "Thunder from the North"
 nd_soe.3.d: "In 1591, Sultan Ahmad al-Mansur of Morocco sent an army of four thousand men under the Spanish eunuch Judar Pasha across the Sahara — a journey of four months through waterless desert. They brought with them eight English cannons and thousands of arquebus-armed infantry. At the Battle of Tondibi, the Songhai army of forty thousand faced this smaller but devastatingly armed force.\n\nThe Songhai commander Askia Ishaq II ordered a stampede of one thousand cattle to break the Moroccan lines, but the thunderclap of gunfire panicked the herd back into Songhai ranks. The battle lasted barely two hours. Gao, Timbuktu, and Djenne all fell within months.\n\nThe age of the great Saharan empires was ending. But empires die slowly in the desert. The question now is how we face the future."
 nd_soe.3.a: "Fortify the cities — we will not yield a single grain of sand."
 nd_soe.3.b: "Fall back into the hinterland — the desert is our fortress."
 nd_soe.4.t: "The University of Sankore"
 nd_soe.4.d: "In the Sankore quarter of Timbuktu, under the shadow of the great mud-brick mosque, some twenty-five thousand students gather to study under scholars who have mastered theology, law, mathematics, astronomy, medicine, and history. The Sankore is not one institution but a constellation of private scholars, each with their own students and libraries, united by a shared commitment to the Maliki school of Islamic jurisprudence.\n\nStudents must arrive fluent in Arabic and with the entire Qur'an committed to memory. The degrees they earn — comparable to the ijazah of Cairo's al-Azhar — are recognized across the Muslim world. Timbuktu's libraries house hundreds of thousands of manuscripts, the greatest concentration of written knowledge in sub-Saharan Africa."
 nd_soe.4.a: "Knowledge is the true gold of Timbuktu."
 nd_soe.5.t: "The Emperor's Standard"
 nd_soe.5.d: "Askia Muhammad did what no Sahelian ruler before him had attempted: he imposed a system of standardized weights and measures across the empire's markets. Trade inspectors — the muhtasib — were stationed in every major market center from Timbuktu to Gao to Djenne, empowered to verify scales, enforce fair dealing, and punish fraud.\n\nThe result was a commercial revolution. Merchants from Cairo to Fez to Venice could trade with confidence in Songhai markets, knowing that a measure of gold in Timbuktu weighed the same as a measure of gold in Gao. The empire's reputation for fair dealing drew caravans from across the Sahara like water to a well."
 nd_soe.5.a: "Fair trade builds stronger empires than conquest."
 nd_soe_niger_origins: "Children of the River"
 nd_soe_niger_origins_desc: "The Songhai people have lived along the Niger since time immemorial, drawing life from its floods and fish."
 nd_soe_noble_horsemen: "Songhai Noble Cavalry"
 nd_soe_noble_horsemen_desc: "The mounted warriors of Songhai, clad in iron breastplates beneath their battle tunics, are the backbone of imperial power."
 nd_soe_niger_fleet: "The Hi-Koy's Fleet"
 nd_soe_niger_fleet_desc: "The river admiral commands war canoes along the Niger, projecting Songhai power from water to shore."
 nd_soe_early_islam: "Faith of the Sahel"
 nd_soe_early_islam_desc: "Islam arrived along the trade routes, embraced first by merchants and rulers, gradually transforming Songhai spiritual life."
 nd_soe_gao_foundation: "Foundation of Gao"
 nd_soe_gao_foundation_desc: "Gao stands at the great bend of the Niger, the ancestral seat of Songhai power and gateway to the Sahara."
 nd_soe_niger_agriculture: "Floodplain Farming"
 nd_soe_niger_agriculture_desc: "The annual floods of the Niger deposit rich silt across the plains, sustaining the agriculture that feeds the empire."
 nd_soe_caravan_routes: "Trans-Saharan Caravans"
 nd_soe_caravan_routes_desc: "Camel caravans cross the desert bearing gold, salt, ivory, and cloth — the lifeblood of Sahelian commerce."
 nd_soe_sunni_ali_conquests: "The Conquests of Sunni Ali"
 nd_soe_sunni_ali_conquests_desc: "Sunni Ali the Great was never defeated in battle. Through riverine and cavalry warfare, he forged the Songhai Empire."
 nd_soe_hikoy_command: "Command of the Hi-Koy"
 nd_soe_hikoy_command_desc: "The Hi-Koy commands over a thousand vessels from the port of Gao, controlling river traffic and projecting military force along the Niger."
 nd_soe_conquest_of_timbuktu: "The Jewel of the Sahel"
 nd_soe_conquest_of_timbuktu_desc: "The conquest of Timbuktu in 1468 brought the greatest trading city in West Africa under Songhai control."
 nd_soe_saharan_archery: "Saharan Mounted Archers"
 nd_soe_saharan_archery_desc: "Mounted archers drawn from nomadic traditions serve as screens and raiders, harassing enemies before the heavy cavalry strikes."
 nd_soe_askia_revolution: "The Askia Dynasty"
 nd_soe_askia_revolution_desc: "Askia Muhammad's seizure of the throne transformed Songhai from a military state into an Islamic empire of law and administration."
 nd_soe_gold_salt_monopoly: "Gold and Salt Monopoly"
 nd_soe_gold_salt_monopoly_desc: "Gold flows north; salt flows south. The Songhai sit astride both streams, taxing the most valuable exchange in Africa."
 nd_soe_hajj_of_askia: "The Hajj of Askia Muhammad"
 nd_soe_hajj_of_askia_desc: "Askia Muhammad's pilgrimage to Mecca in 1496 established Songhai as a legitimate Islamic power in the eyes of the wider Muslim world."
 nd_soe_five_provinces: "The Five Viceroyalties"
 nd_soe_five_provinces_desc: "The empire is divided into five great provinces, each governed by a viceroy who maintains order while allowing local autonomy."
 nd_soe_sankore_university: "The University of Sankore"
 nd_soe_sankore_university_desc: "Twenty-five thousand students study in Timbuktu's Sankore quarter, making it one of the great centers of learning in the Islamic world."
 nd_soe_sharia_courts: "Courts of the Qadi"
 nd_soe_sharia_courts_desc: "Islamic magistrates administer justice according to Sharia law in every major city, bringing order and predictability to governance."
 nd_soe_standardized_trade: "The Emperor's Standard"
 nd_soe_standardized_trade_desc: "Standardized weights and measures, enforced by trade inspectors in every market, have made Songhai commerce the most trusted in the Sahel."
 nd_soe_djenne_prosperity: "The Prosperity of Djenne"
 nd_soe_djenne_prosperity_desc: "Djenne, city of a thousand scholars and the greatest mosque in the Sudan, flourishes as a center of commerce and culture."
 nd_soe_imperial_army: "The Imperial Guard"
 nd_soe_imperial_army_desc: "A professional standing army forms the iron core of Songhai military power, loyal to the Askia dynasty alone."
 nd_soe_saharan_campaigns: "Lords of the Desert"
 nd_soe_saharan_campaigns_desc: "Camel-mounted warriors patrol the Saharan frontier, protecting caravans and projecting imperial authority into the deep desert."
 nd_soe_timbuktu_manuscripts: "The Manuscripts of Timbuktu"
 nd_soe_timbuktu_manuscripts_desc: "Hundreds of thousands of manuscripts fill the libraries of Timbuktu, preserving knowledge of astronomy, medicine, history, and law."
 nd_soe_koi_commanders: "The Koi System"
 nd_soe_koi_commanders_desc: "Regional military commanders — the Koi — maintain standing forces across the empire, ensuring rapid response to any threat."
 nd_soe_trade_inspectors: "The Muhtasib"
 nd_soe_trade_inspectors_desc: "Trade inspectors enforce fair dealing in every market, verifying weights, punishing fraud, and collecting imperial customs."
 nd_soe_gunpowder_response: "The Thunder Answered"
 nd_soe_gunpowder_response_desc: "The Moroccan invasion demonstrated the devastating power of firearms. The empire must adapt or perish."
 nd_soe_pastoral_wealth: "Wealth of the Herds"
 nd_soe_pastoral_wealth_desc: "Vast herds of cattle, goats, and horses sustain the Sahel's pastoral economy and provide cavalry mounts for the imperial army."
 nd_soe_maliki_jurisprudence: "The Maliki School"
 nd_soe_maliki_jurisprudence_desc: "The Maliki school of Islamic law, brought by scholars from North Africa, provides a unifying legal framework across the empire's diverse peoples."
 nd_soe_imperial_diversity: "Empire of Many Peoples"
 nd_soe_imperial_diversity_desc: "Songhai, Mandinka, Tuareg, Fulani — the empire governs a mosaic of peoples through flexible administration and shared Islamic faith."
 nd_soe_sahel_resilience: "Resilience of the Sahel"
 nd_soe_sahel_resilience_desc: "Empires rise and fall, but the people of the Sahel endure. The Songhai legacy survives in successor states and cultural memory."
 nd_soe_niger_commerce: "Niger Commerce"
 nd_soe_niger_commerce_desc: "The Niger remains the highway of West African trade, carrying goods and ideas between forest and desert."
 nd_soe_sahel_fortifications: "Fortifications of the Sahel"
 nd_soe_sahel_fortifications_desc: "Mud-brick walls and defensive compounds protect Sahelian cities from raiders and invaders alike."
 nd_soe_crown_authority: "Authority of the Askia"
 nd_soe_crown_authority_desc: "The central authority of the Askia tightens its grip over provincial governors, ensuring imperial unity."
 nd_soe_slave_soldiers: "Soldiers of the Empire"
 nd_soe_slave_soldiers_desc: "Slave soldiers, personally loyal to the emperor rather than any clan or family, form a reliable core of professional troops."
 nd_soe_scholarly_preservation: "Keepers of Knowledge"
 nd_soe_scholarly_preservation_desc: "Through oral tradition and carefully preserved manuscripts, Songhai scholars keep alive the learning of centuries."
 nd_soe_songhai_revival: "Songhai Revival"
 nd_soe_songhai_revival_desc: "A new generation reclaims the legacy of the Askia dynasty, kindling the dream of a restored Songhai civilization."
 nd_soe_modern_agriculture: "Modern Sahel Agriculture"
 nd_soe_modern_agriculture_desc: "New techniques transform the floodplains and savanna into more productive farmland, feeding a growing population."
 nd_soe_modern_trade: "Modern Saharan Trade"
 nd_soe_modern_trade_desc: "The ancient trade routes find new life as modern infrastructure connects the Sahel to global markets."
 nd_soe_modern_army: "Modern Songhai Army"
 nd_soe_modern_army_desc: "A reformed and modernized military ensures the Songhai Empire can defend its sovereignty in a changing world."
 nd_soe_education_reform: "Education for All"
 nd_soe_education_reform_desc: "Building on Timbuktu's scholarly tradition, new schools bring literacy and learning to all corners of the empire."
 nd_soe_imperial_restoration: "The Dream of Restoration"
 nd_soe_imperial_restoration_desc: "From Gao to Timbuktu, the vision of a restored Songhai Empire unites the people of the Niger bend."
 a_nd_soe_noble_cavalry: "Songhai Noble Cavalry"
 a_nd_soe_noble_cavalry_desc: "Elite mounted warriors of the Songhai nobility, clad in iron breastplates beneath their battle tunics, who charge the enemy with devastating force."
 a_nd_soe_hikoy_marines: "Hi-Koy Marines"
 a_nd_soe_hikoy_marines_desc: "River warriors who fight from the great war canoes of the Niger fleet, equally deadly in amphibious assault and close combat."
 a_nd_soe_mounted_archers: "Songhai Mounted Archers"
 a_nd_soe_mounted_archers_desc: "Light cavalry archers from the Saharan tradition, used for scouting, screening, and harassing enemy formations before the main assault."
 a_nd_soe_imperial_guard: "Songhai Imperial Guard"
 a_nd_soe_imperial_guard_desc: "The professional soldiers of the Askia dynasty, heavily equipped and fanatically loyal to the emperor."
 a_nd_soe_jihad_infantry: "Songhai Jihad Infantry"
 a_nd_soe_jihad_infantry_desc: "Religiously motivated warriors fighting in defense of the Islamic state, their fervor compensating for the empire's lack of firearms."
 a_nd_soe_sahel_musketeer: "Sahel Musketeer"
 a_nd_soe_sahel_musketeer_desc: "Infantry armed with acquired firearms, adapting the lessons of Tondibi to ensure the empire is never again caught without gunpowder weapons."
 n_nd_soe_war_canoe: "Songhai War Canoe"
 n_nd_soe_war_canoe_desc: "Large dugout war canoes carrying armed marines, the backbone of the Niger River fleet commanded by the Hi-Koy."
 a_nd_soe_camel_corps: "Saharan Camel Corps"
 a_nd_soe_camel_corps_desc: "Camel-mounted warriors who patrol the Saharan frontier, protecting caravans and striking deep into the desert."
 nd_soe_sankore_madrasa: "Sankore Madrasa"
 nd_soe_sankore_madrasa_desc: "A center of Islamic learning modeled on the great Sankore mosque in Timbuktu, where scholars teach theology, law, medicine, and astronomy."
 nd_soe_saharan_caravanserai: "Saharan Caravanserai"
 nd_soe_saharan_caravanserai_desc: "A fortified rest stop along the trans-Saharan trade routes, providing shelter, water, and markets for traveling merchants."
 nd_soe_niger_port: "Niger River Port"
 nd_soe_niger_port_desc: "A dock and shipyard along the Niger River, where goods are loaded onto canoes for transport and war vessels are built and repaired."
 nd_soe_qadi_court: "Qadi Court"
 nd_soe_qadi_court_desc: "An Islamic judicial court where the Qadi administers justice according to Sharia law, bringing order and legitimacy to imperial governance."
 nd_soe_imperial_granary: "Imperial Granary"
 nd_soe_imperial_granary_desc: "A mud-brick storehouse that collects and preserves the bounty of the Niger floodplains, insuring against famine and feeding the empire's cities."
 nd_soe_gold_market: "Gold Market"
 nd_soe_gold_market_desc: "A trading house where the gold of Wangara is weighed, assayed, and exchanged for the salt of Taghaza and the cloth of the Mediterranean."
 nd_soe_djenne_mosque: "Mosque of Djenne"
 nd_soe_djenne_mosque_desc: "A monumental mud-brick mosque in the tradition of Djenne's great architecture, inspiring devotion and cultural pride."
 nd_soe_muhtasib_office: "Muhtasib Office"
 nd_soe_muhtasib_office_desc: "The headquarters of the imperial trade inspector, who enforces standardized weights, fair dealing, and market regulations."
 nd_soe_slave_barracks: "Slave Soldier Barracks"
 nd_soe_slave_barracks_desc: "Quarters for slave soldiers personally loyal to the emperor, forming a reliable professional military force independent of clan loyalties."
 nd_soe_madrasa_upkeep: "Scholarly Maintenance"
 nd_soe_madrasa_upkeep_desc: "Paper for manuscripts, pottery for ink vessels, and incense for devotion — the daily needs of a center of Islamic learning."
 nd_soe_caravanserai_upkeep: "Caravan Provisions"
 nd_soe_caravanserai_upkeep_desc: "Livestock for the caravan animals, pottery for travelers, and salt for preservation — the cost of keeping the trade routes alive."
 nd_soe_port_upkeep: "Port Maintenance"
 nd_soe_port_upkeep_desc: "Lumber and tar for the canoes and docks, tools for the shipwrights keeping the Niger River fleet seaworthy."
 nd_soe_court_upkeep: "Court Records"
 nd_soe_court_upkeep_desc: "Paper for legal documents, fine cloth for judicial robes, and incense for the solemnity of the Qadi's court."
 nd_soe_granary_upkeep: "Granary Maintenance"
 nd_soe_granary_upkeep_desc: "Lumber and clay to maintain the great storehouses, and tools for the workers who manage the empire's grain reserves."
 nd_soe_gold_market_upkeep: "Market Operations"
 nd_soe_gold_market_upkeep_desc: "Pottery for weighing instruments, cloth for trade goods, and paper for the records of every exchange — the cost of operating a major gold market."
 nd_soe_mosque_upkeep: "Mosque Maintenance"
 nd_soe_mosque_upkeep_desc: "Clay and lumber for the annual restoration of the mud-brick mosque, with incense perfuming the prayer halls — a sacred communal duty."
 nd_soe_office_upkeep: "Inspector's Records"
 nd_soe_office_upkeep_desc: "Paper and pottery for the meticulous records, cloth for the uniforms and seals that give the muhtasib their authority."
 nd_soe_barracks_upkeep: "Barracks Provisioning"
 nd_soe_barracks_upkeep_desc: "Weaponry, cloth, and leather to arm, clothe, and equip the slave soldier garrison."
 nd_soe_gold_refining: "Gold Refining"
 nd_soe_gold_refining_desc: "Silver for alloying, pottery crucibles, and tools for the assayers — the careful processing of raw gold dust into tradeable form."
 nd_soe_salt_caravan: "Salt Caravan Operations"
 nd_soe_salt_caravan_desc: "Caravan animals, trade cloth, and the salt itself — the provisioning of camel caravans that carry Saharan salt to the markets of the Sahel."
 nd_soe_manuscript_production: "Manuscript Production"
 nd_soe_manuscript_production_desc: "Paper for pages, dyes for ink, and cloth for binding — the painstaking copying of scholarly manuscripts in the scriptoria of Timbuktu."
 nd_soe_horse_breeding: "Saharan Horse Breeding"
 nd_soe_horse_breeding_desc: "Livestock for breeding stock, grain for feed, and salt for the animals' health — the raising of warhorses and caravan mounts in the Sahelian grasslands."
 levy_nd_soe_camel_corps: "Saharan Camel Levy"
 levy_nd_soe_camel_corps_desc: "Camel-mounted warriors raised from the desert frontiers to patrol and defend the empire's Saharan territories."
 levy_nd_soe_mounted_archers: "Mounted Archer Levy"
 levy_nd_soe_mounted_archers_desc: "Light cavalry archers raised from the Songhai nobility for scouting and screening duties."
 nd_soe_formed_tt: "Songhai Empire has been formed"
 nd_soe_path_a_tt: "Chose Lord of the River"
 nd_soe_path_b_tt: "Chose The Scholar's Throne"
 nd_soe_destiny: "Destiny of the Songhai"
 nd_soe_destiny_desc: "The Songhai Empire has risen. Now it must choose its path -- conquest or enlightenment."
 nd_soe_dest_saharan_salt: "Saharan Salt Roads"
 nd_soe_dest_saharan_salt_desc: "Seize the salt mines of the Sahara and crush the Mossi kingdoms to secure the empire's southern frontier. Control Taghaza and Ouagadougou."
 nd_soe_dest_hausa_conquest: "Conquest of Hausaland"
 nd_soe_dest_hausa_conquest_desc: "March east into Hausaland. Take Kano, Katsina, and the Bornu capital of Ngazargamu to dominate the central Sahel."
 nd_soe_dest_sahel_hegemony: "Hegemony of the Sahel"
 nd_soe_dest_sahel_hegemony_desc: "Push south into the gold fields of Asante and west into Sokoto. No power in West Africa may rival the Songhai Empire."
 nd_soe_dest_gold_routes: "Masters of the Gold Trade"
 nd_soe_dest_gold_routes_desc: "Control the sources of gold at Begho and ensure gold flows through Songhai markets. Wealth is the foundation of civilization."
 nd_soe_dest_islamic_learning: "City of Knowledge"
 nd_soe_dest_islamic_learning_desc: "Embrace the institutions of banking and develop the Niger region to support Timbuktu's role as the intellectual capital of Africa."
 nd_soe_dest_beacon_of_africa: "Beacon of Africa"
 nd_soe_dest_beacon_of_africa_desc: "Achieve the highest development in the Sahel, embrace the printing press, and make the Songhai Empire the most prestigious power in Africa."
 nd_soe.6.t: "The Destiny of Songhai"
 nd_soe.6.d: "The Songhai Empire stands at a crossroads. The Niger bends before us, the desert stretches behind, and the future lies in our hands. Whether we choose the sword or the pen, the empire shall endure."
 nd_soe.6.a: "The empire endures."
 nd_soe.7.t: "The Salt Roads Are Ours"
 nd_soe.7.d: "The great salt caravans that cross the Sahara now move under Songhai protection. From Taghaza to the markets of the Sahel, every bar of salt enriches our treasury. The Mossi kingdoms have been humbled, and the southern frontier is secure."
 nd_soe.7.a: "Salt is the wealth of the desert."
 nd_soe.8.t: "The Fall of Hausaland"
 nd_soe.8.d: "The walled cities of Hausaland have fallen to our armies. Kano, that great center of Saharan commerce, lies under Songhai authority. Katsina's dye pits and Bornu's Lake Chad frontier are ours. But how shall we govern these conquered peoples?\n\nWe may extract tribute and leave local rulers in place, enriching the treasury while preserving stability. Or we may integrate these lands fully into the imperial system, accepting their peoples as our own -- though this strains our administrative capacity."
 nd_soe.8.a: "Extract tribute from the conquered cities."
 nd_soe.8.b: "Integrate Hausaland into the empire."
 nd_soe.9.t: "Lords of the Sahel"
 nd_soe.9.d: "From the gold fields of Asante to the salt mines of Taghaza, from the Niger bend to the borders of Bornu, no power in West Africa can rival the Songhai Empire. Our armies have achieved what Sunni Ali dreamed -- total dominion over the Sahel.\n\nShall we rule as the Iron Askia, projecting unstoppable military power across the region? Or shall we embrace the empire of dust -- mastering the terrain itself, making the desert and savanna our greatest fortress?"
 nd_soe.9.a: "We are the Iron Askia -- none shall stand against us."
 nd_soe.9.b: "The desert is our fortress and our weapon."
 nd_soe.10.t: "Gold Flows Through Songhai"
 nd_soe.10.d: "The gold of the south now passes through Songhai hands. At Begho and in our markets, the precious metal is weighed, taxed, and sent north across the Sahara. Merchants from across the Muslim world come to trade in our cities, drawn by the reliability of our weights and the fairness of our courts."
 nd_soe.10.a: "Let the gold flow."
 nd_soe.11.t: "The Flowering of Timbuktu"
 nd_soe.11.d: "Timbuktu has become what Askia Muhammad always envisioned -- a city where scholarship and commerce are inseparable, where the wealth of the gold trade funds libraries and madrasas, where students come from across the Muslim world to study under Songhai masters.\n\nShall we deepen the scholarly networks, attracting more learned men to our courts even at the cost of military readiness? Or shall we cultivate merchant-scholars who combine trade acumen with intellectual refinement, though some diplomats may find our commercial focus uncouth?"
 nd_soe.11.a: "Scholarship above all -- knowledge is eternal."
 nd_soe.11.b: "Wisdom and wealth walk together."
 nd_soe.12.t: "The Beacon of Africa"
 nd_soe.12.d: "The Songhai Empire has achieved what no sub-Saharan power has done before. Timbuktu rivals Cairo as a center of Islamic learning. Our development exceeds that of any Sahelian state in history. The printing press preserves the manuscripts that once existed only in fragile copies.\n\nShall we embrace a golden age of culture, making Timbuktu the undisputed intellectual capital of the Islamic world? Or shall we build a universal empire, binding diverse peoples together through shared faith and mutual obligation?"
 nd_soe.12.a: "Let Timbuktu shine as the jewel of Islam."
 nd_soe.12.b: "We shall build an empire of many peoples and one faith."
 STATIC_MODIFIER_NAME_nd_soe_dest_hausa_tribute: "Tribute of Hausaland"
 STATIC_MODIFIER_DESC_nd_soe_dest_hausa_tribute: "The conquered cities of Hausaland pay tribute to the Askia, filling the treasury while local rulers maintain order under Songhai oversight."
 STATIC_MODIFIER_NAME_nd_soe_dest_hausa_integration: "Peoples of the Empire"
 STATIC_MODIFIER_DESC_nd_soe_dest_hausa_integration: "The peoples of Hausaland are welcomed into the imperial fold, their cultures accepted as part of the Songhai mosaic."
 STATIC_MODIFIER_NAME_nd_soe_dest_iron_askia: "The Iron Askia"
 STATIC_MODIFIER_DESC_nd_soe_dest_iron_askia: "The Songhai army strikes with the speed and precision of Sunni Ali reborn, overwhelming enemies before they can mount a defense."
 STATIC_MODIFIER_NAME_nd_soe_dest_empire_of_dust: "Empire of Dust"
 STATIC_MODIFIER_DESC_nd_soe_dest_empire_of_dust: "The Sahel itself fights for the Songhai. Invaders founder in the desert while our armies move with ease across familiar terrain."
 STATIC_MODIFIER_NAME_nd_soe_dest_scholars_network: "Network of Scholars"
 STATIC_MODIFIER_DESC_nd_soe_dest_scholars_network: "A web of correspondence connects Songhai scholars to the great minds of the Islamic world, accelerating the spread of knowledge."
 STATIC_MODIFIER_NAME_nd_soe_dest_merchant_scholars: "Merchant-Scholars of the Niger"
 STATIC_MODIFIER_DESC_nd_soe_dest_merchant_scholars: "The learned merchants of Timbuktu combine commercial acumen with intellectual depth, driving prosperity across the Niger basin."
 STATIC_MODIFIER_NAME_nd_soe_dest_timbuktu_golden_age: "Golden Age of Timbuktu"
 STATIC_MODIFIER_DESC_nd_soe_dest_timbuktu_golden_age: "Timbuktu enters its greatest era -- a city of a hundred thousand manuscripts, where scholarship, art, and faith illuminate the Sahel."
 STATIC_MODIFIER_NAME_nd_soe_dest_universal_empire: "The Universal Empire"
 STATIC_MODIFIER_DESC_nd_soe_dest_universal_empire: "The Songhai Empire transcends tribal boundaries, binding Songhai, Mandinka, Tuareg, and Hausa into a single community of faith and obligation."
 nd_soe_imperial_warcamp: "Imperial War Camp"
 nd_soe_imperial_warcamp_desc: "A fortified staging ground where the Askia marshals his armies, stores plunder, and plans the next campaign of conquest."
 nd_soe_warcamp_upkeep: "War Camp Provisioning"
 nd_soe_warcamp_upkeep_desc: "Weaponry for the soldiers, leather for armor repairs, and tools for siege equipment -- the daily cost of maintaining an imperial war camp."
 nd_soe_house_of_wisdom: "House of Wisdom"
 nd_soe_house_of_wisdom_desc: "A grand institution of learning where scholars translate, copy, and compose works of theology, science, and philosophy in the tradition of Baghdad's Bayt al-Hikma."
 nd_soe_wisdom_upkeep: "Scholarly Provisions"
 nd_soe_wisdom_upkeep_desc: "Paper for manuscripts, books for the library, and incense for contemplation -- the costs of sustaining a great center of learning."
