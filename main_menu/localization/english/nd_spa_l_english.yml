l_english:
 STATIC_MODIFIER_NAME_nd_spa_universal_monarchy: "Universal Monarchy"
 STATIC_MODIFIER_DESC_nd_spa_universal_monarchy: "Spain stands as the champion of Christendom, its tercios the finest soldiers in Europe and its faith the unshakeable foundation of a world-spanning empire."
 STATIC_MODIFIER_NAME_nd_spa_empire_of_the_indies: "Empire of the Indies"
 STATIC_MODIFIER_DESC_nd_spa_empire_of_the_indies: "From Seville to Manila, Spain's fleets bind together a global commercial empire, its harbors teeming with the wealth of two hemispheres."
 nd_spa.1.t: "The Birth of Spain"
 nd_spa.1.d: "The crowns are united, the Moors driven from their last stronghold, and the banner of Spain flies over lands our ancestors could scarcely imagine. In Seville and Valladolid, in Barcelona and Toledo, the peoples of Iberia look to a common destiny. Yet the path forward divides before us. Shall Spain be the sword of Catholic Europe — our tercios the terror of heretics and infidels, our Inquisition the guarantor of orthodoxy, our king the champion of a universal Christian order? Or shall we look westward, where our caravels have found a New World of unimaginable riches — building not merely a kingdom but a global empire of commerce, colonies, and treasure fleets that will make Seville the center of the world?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_spa.1.a: "We are the sword of Christendom."
 nd_spa.1.b: "The wealth of the Indies shall be ours."
 STATIC_MODIFIER_NAME_nd_spa_reconquista_triumphant: "Reconquista Triumphant"
 STATIC_MODIFIER_DESC_nd_spa_reconquista_triumphant: "The seven-hundred-year struggle for Iberia is won. Christian arms have prevailed, and the fervor of the crusade burns bright."
 STATIC_MODIFIER_NAME_nd_spa_convivencia_legacy: "Legacy of Convivencia"
 STATIC_MODIFIER_DESC_nd_spa_convivencia_legacy: "Centuries of coexistence between Christian, Muslim, and Jewish communities have left Spain a reservoir of diverse knowledge and cultural sophistication."
 nd_spa.2.t: "The Fall of Granada"
 nd_spa.2.d: "On the second day of January, Boabdil, the last Emir of Granada, surrendered the keys of the Alhambra to the Catholic Monarchs Ferdinand and Isabella. Seven centuries of Reconquista are complete. The Moorish crescent has been struck from every tower in Iberia, replaced by the cross and the banner of Castile and Aragon. In the streets of Granada, the faithful celebrate with processions and Te Deums. Yet amid the jubilation, a question lingers. The conquered Moorish and Jewish populations possess skills, knowledge, and trading networks that have enriched Iberia for generations. Shall we forge ahead with religious purity, expelling or converting all who do not share the true faith — or preserve the intellectual heritage of convivencia, the tradition of coexistence that made Al-Andalus a beacon of learning?"
 nd_spa.2.a: "Purity of faith above all else."
 nd_spa.2.b: "Preserve the wisdom of coexistence."
 STATIC_MODIFIER_NAME_nd_spa_tercio_combined_arms: "Tercio: Combined Arms Doctrine"
 STATIC_MODIFIER_DESC_nd_spa_tercio_combined_arms: "The tercio fights as a single organism — pikemen shielding arquebusiers, swordsmen closing the gaps, each man trusting the formation with his life."
 STATIC_MODIFIER_NAME_nd_spa_tercio_expeditionary: "Tercio: Expeditionary Doctrine"
 STATIC_MODIFIER_DESC_nd_spa_tercio_expeditionary: "Spain's tercios have learned to fight far from home — in the swamps of Flanders, the mountains of Italy, the forests of the New World — adapting their tactics to every terrain."
 nd_spa.3.t: "The Great Captain's Revolution"
 nd_spa.3.d: "In the Italian Wars, Gonzalo Fernandez de Cordoba — El Gran Capitan — has transformed the art of warfare. Where other armies rely on masses of pikemen or expensive mercenary cavalry, Cordoba has forged a new kind of formation: the tercio. Three thousand men — pikemen, swordsmen armed with the fearsome espada ropera, and arquebusiers — drill together as a single combined-arms unit. At Cerignola in 1503, this revolutionary formation shattered the French gendarmerie, proving that disciplined infantry could defeat the finest heavy cavalry in Europe. The tercio will dominate European battlefields for the next century and a half. Shall we perfect the tercio as a combined-arms instrument of shock and discipline, or hone it for the long marches and distant campaigns that Spain's sprawling empire demands?"
 nd_spa.3.a: "Perfect the art of combined arms."
 nd_spa.3.b: "Forge soldiers who can fight anywhere."
 STATIC_MODIFIER_NAME_nd_spa_treasure_fleet_monopoly: "Crown Treasure Monopoly"
 STATIC_MODIFIER_DESC_nd_spa_treasure_fleet_monopoly: "All colonial trade flows through the Casa de Contratacion in Seville. The Crown's monopoly ensures every ounce of silver and every bale of indigo enriches the royal treasury."
 STATIC_MODIFIER_NAME_nd_spa_treasure_fleet_commerce: "Free Commerce of the Indies"
 STATIC_MODIFIER_DESC_nd_spa_treasure_fleet_commerce: "By loosening the monopoly and permitting wider participation in colonial trade, the commerce of the Indies flows more freely, enriching merchants and manufacturers across Spain."
 nd_spa.4.t: "The Treasure Fleet"
 nd_spa.4.d: "Twice each year, the great convoys assemble — the Flota de Indias departing Seville for the ports of Veracruz, Portobelo, and Cartagena, returning laden with the silver of Potosi, the gold of New Granada, the indigo and cochineal of Mexico. The Casa de Contratacion oversees every cargo manifest, every passenger list, every real of silver that passes through Seville's waterfront. This is the greatest organized system of transoceanic trade the world has ever seen. Yet the monopoly that makes it profitable also makes it rigid. Merchants in Cadiz and Barcelona agitate for the right to trade freely with the colonies. Shall we maintain the Crown's iron grip on colonial commerce — maximizing royal revenues but limiting private enterprise — or open the trade to broader participation, accepting lower crown revenues in exchange for a more dynamic economy?"
 nd_spa.4.a: "The Crown's monopoly is absolute."
 nd_spa.4.b: "Let commerce flow freely."
 nd_spa_reconquista_fortress_tradition: "Reconquista Fortress Tradition"
 nd_spa_reconquista_fortress_tradition_desc: "Centuries of frontier warfare forged a network of fortified castles — alcazars, castillos, and towers — that defined the Iberian military landscape."
 nd_spa_mesta_privilege: "Mesta Privilege"
 nd_spa_mesta_privilege_desc: "The Honourable Council of the Mesta holds royal charter to drive its flocks across Castile's ancient transhumance routes, the canadas reales."
 nd_spa_military_orders: "Iberian Military Orders"
 nd_spa_military_orders_desc: "The Orders of Santiago, Calatrava, and Alcantara — warrior-monks who held the frontier and whose Grand Masters commanded vast estates and loyal levies."
 nd_spa_fueros_and_cortes: "Fueros and Cortes"
 nd_spa_fueros_and_cortes_desc: "The fueros grant local liberties and privileges, while the Cortes assemblies of Castile, Aragon, and Catalonia give voice to the estates of the realm."
 nd_spa_jinete_tradition: "Jinete Tradition"
 nd_spa_jinete_tradition_desc: "The jinetes — light cavalrymen riding a la jineta with short stirrups and light lances — are the quintessential Iberian horsemen, heirs to a tradition shared between Christian and Moorish riders."
 nd_spa_burgos_wool_market: "Burgos Wool Market"
 nd_spa_burgos_wool_market_desc: "The great wool fairs of Burgos channel Castilian merino fleece to the looms of Flanders and Italy, making wool Spain's first great export commodity."
 nd_spa_catholic_monarchs: "The Catholic Monarchs"
 nd_spa_catholic_monarchs_desc: "Ferdinand of Aragon and Isabella of Castile united the crowns, subdued the nobility, reformed the administration, and set Spain on the path to empire."
 nd_spa_reconquista_culmination: "Reconquista Culmination"
 nd_spa_reconquista_culmination_desc: "The fall of Granada in 1492 completed the centuries-long Christian reconquest of the Iberian Peninsula from Muslim rule."
 nd_spa_inquisition: "The Spanish Inquisition"
 nd_spa_inquisition_desc: "Established in 1478, the Inquisition served as the Crown's instrument for enforcing religious conformity and rooting out heresy, extending its reach across all Spanish territories."
 nd_spa_iberian_exploration: "Iberian Exploration"
 nd_spa_iberian_exploration_desc: "Spanish navigators pushed beyond the known world — Columbus westward, Magellan around the globe — guided by advances in cartography, astronomy, and shipbuilding."
 nd_spa_medina_del_campo: "Medina del Campo Fairs"
 nd_spa_medina_del_campo_desc: "The great fairs of Medina del Campo drew merchants from across Europe, becoming one of the continent's premier centers for banking, exchange, and international commerce."
 nd_spa_rise_of_the_tercio: "Rise of the Tercio"
 nd_spa_rise_of_the_tercio_desc: "The tercio — Spain's revolutionary combined-arms infantry formation of pikemen, swordsmen, and arquebusiers — dominated European battlefields from Cerignola to Rocroi."
 nd_spa_colonial_trade_infrastructure: "Colonial Trade Infrastructure"
 nd_spa_colonial_trade_infrastructure_desc: "The Casa de Contratacion in Seville regulated all trade with the Indies — licensing ships, inspecting cargoes, training navigators, and channeling the wealth of empire."
 nd_spa_mission_system: "Mission System"
 nd_spa_mission_system_desc: "Franciscan, Dominican, and Jesuit missionaries established a vast network of missions across the Americas, converting indigenous peoples and extending Spanish cultural influence."
 nd_spa_galley_fleet: "Mediterranean Galley Fleet"
 nd_spa_galley_fleet_desc: "Spain's galeras reales patrolled the Mediterranean, protecting trade routes, fighting Ottoman corsairs, and projecting Aragonese-Catalan power from Barcelona to Naples."
 nd_spa_treasure_fleet_system: "Treasure Fleet System"
 nd_spa_treasure_fleet_system_desc: "The Flota de Indias — organized convoys sailing between Seville, the Caribbean, and the Pacific — constituted the greatest system of transoceanic trade in the early modern world."
 nd_spa_spanish_galleon: "Spanish Galleon"
 nd_spa_spanish_galleon_desc: "The galleon — designed in the 1550s by Pedro Menendez de Aviles and Alvaro de Bazan — combined heavy armament with cargo capacity, serving as both warship and treasure carrier."
 nd_spa_potosi_silver: "Potosi Silver Economy"
 nd_spa_potosi_silver_desc: "The silver mines of Potosi and Zacatecas poured a torrent of precious metal into the Spanish treasury, funding armies and fleets while reshaping the global economy."
 nd_spa_manila_galleon: "Manila Galleon Route"
 nd_spa_manila_galleon_desc: "From 1565, the Manila Galleon linked Acapulco to the Philippines, bringing Chinese silk, porcelain, and spices westward and American silver eastward across the Pacific."
 nd_spa_armada_tradition: "Armada Tradition"
 nd_spa_armada_tradition_desc: "Spain maintained the largest navy in the Atlantic, its armadas escorting treasure fleets, projecting power across oceans, and guarding the approaches to the empire."
 nd_spa_bourbon_arsenal_reforms: "Bourbon Arsenal Reforms"
 nd_spa_bourbon_arsenal_reforms_desc: "The Bourbon dynasty established Royal Factories for arms, shipbuilding, glass, and porcelain — state-sponsored manufactories to modernize Spain's industrial base."
 nd_spa_infanteria_de_marina: "Infanteria de Marina"
 nd_spa_infanteria_de_marina_desc: "Founded in 1537 as the Tercio de Galeras, the Spanish Marine Infantry is the oldest marine corps in the world, fighting aboard warships and in amphibious operations across the globe."
 nd_spa_bourbon_centralization: "Bourbon Centralization"
 nd_spa_bourbon_centralization_desc: "The Nueva Planta decrees abolished the separate laws of Aragon, Valencia, and Catalonia, replacing them with Castilian administration and creating a centralized unitary state."
 nd_spa_colonial_plantations: "Colonial Plantation System"
 nd_spa_colonial_plantations_desc: "Spanish colonial haciendas and plantations produced tobacco, sugar, cacao, and indigo for European markets, sustaining the transatlantic economy."
 nd_spa_cadiz_constitution: "Cadiz Constitution"
 nd_spa_cadiz_constitution_desc: "The Constitution of 1812, drafted in besieged Cadiz during the Napoleonic invasion, proclaimed popular sovereignty, separation of powers, and universal male suffrage — a beacon of liberal constitutionalism."
 nd_spa_guerrilla_tradition: "Guerrilla Tradition"
 nd_spa_guerrilla_tradition_desc: "The Peninsular War gave the world the word 'guerrilla' — small war. Spanish irregulars harried Napoleon's armies relentlessly, proving that popular resistance could bleed a superpower."
 nd_spa_economic_societies: "Economic Societies"
 nd_spa_economic_societies_desc: "The Sociedades Economicas de Amigos del Pais — Economic Societies of Friends of the Country — promoted agricultural improvement, industrial innovation, and scientific education across Spain."
 nd_spa_imperial_legacy: "Imperial Legacy"
 nd_spa_imperial_legacy_desc: "Three centuries of governing a global empire left Spain with unmatched experience in colonial administration, diplomatic negotiation, and multicontinental governance."
 a_nd_spa_rodelero: "Rodelero"
 a_nd_spa_rodelero_desc: "Sword-and-buckler infantry — fierce close-combat fighters who charged into pike formations to hack at the enemy at close quarters, a tradition born in the Reconquista."
 a_nd_spa_jinete: "Jinete"
 a_nd_spa_jinete_desc: "Light cavalrymen riding a la jineta — short stirrups, light lances, round shields — the heirs of an Iberian equestrian tradition shared between Christian and Moorish horsemen."
 a_nd_spa_tercio: "Tercio"
 a_nd_spa_tercio_desc: "Spain's legendary combined-arms infantry formation: pikemen, swordsmen, and arquebusiers fighting as a disciplined whole. The terror of Europe's battlefields for over a century."
 n_nd_spa_galera_real: "Galera Real"
 n_nd_spa_galera_real_desc: "A royal war galley of the Spanish Mediterranean fleet — heavier and more heavily armed than standard galleys, carrying soldier complements for boarding actions."
 n_nd_spa_galleon: "Spanish Galleon"
 n_nd_spa_galleon_desc: "A heavily armed sailing warship designed to escort treasure convoys across the Atlantic, combining formidable broadside firepower with substantial cargo capacity."
 a_nd_spa_infanteria_de_marina: "Infanteria de Marina"
 a_nd_spa_infanteria_de_marina_desc: "The oldest marine infantry corps in the world, descended from the Tercio de Galeras. Specialists in shipboard combat and amphibious assault."
 nd_spa_alcazar: "Alcazar"
 nd_spa_alcazar_desc: "A fortified palace combining military defense with royal administration — the architectural legacy of centuries of frontier warfare between Christian and Moorish kingdoms."
 nd_spa_mesta_sheepwalk: "Mesta Sheepwalk"
 nd_spa_mesta_sheepwalk_desc: "A waystation along the canadas reales — the ancient transhumance routes where millions of merino sheep migrate between summer and winter pastures under the Mesta's royal charter."
 nd_spa_colonial_mission: "Colonial Mission"
 nd_spa_colonial_mission_desc: "A Franciscan or Dominican mission compound — church, school, workshop, and dormitory — established to convert and educate indigenous peoples in the Spanish Americas."
 nd_spa_casa_de_contratacion: "Casa de Contratacion"
 nd_spa_casa_de_contratacion_desc: "The House of Trade — Seville's institution for regulating all commerce with the Indies, licensing navigators, inspecting cargoes, and collecting the Crown's share of colonial wealth."
 nd_spa_silver_minting_house: "Silver Minting House"
 nd_spa_silver_minting_house_desc: "A royal mint processing colonial silver into coin — the reales de a ocho, pieces of eight, that became the first truly global currency."
 nd_spa_royal_foundry: "Royal Foundry"
 nd_spa_royal_foundry_desc: "A state-sponsored manufactory established under Bourbon reforms, casting cannon, forging arms, and producing the materiel that sustains Spain's military power."
 nd_spa_camino_real: "Camino Real"
 nd_spa_camino_real_desc: "The Royal Road — part of Charles III's radial road system connecting Madrid to every major city, improving trade, communication, and administration across the kingdom."
 nd_spa_alcazar_garrison: "Alcazar Garrison"
 nd_spa_alcazar_garrison_desc: "The standing garrison of the alcazar, maintained with arms and provisions to defend the fortress and project royal authority."
 nd_spa_merino_wool_processing: "Merino Wool Processing"
 nd_spa_merino_wool_processing_desc: "Castilian merino wool — prized across Europe for its fineness — is sorted, cleaned, and prepared for export to the looms of Flanders and Italy."
 nd_spa_mission_upkeep: "Mission Operations"
 nd_spa_mission_upkeep_desc: "The daily work of the mission: teaching catechism, maintaining the church, cultivating fields, and producing goods for the surrounding community."
 nd_spa_trade_house_operations: "Trade House Operations"
 nd_spa_trade_house_operations_desc: "The daily work of the Casa de Contratacion: registering ships, reviewing manifests, licensing pilots, and ensuring the Crown's regulations are enforced."
 nd_spa_fleet_provisioning: "Fleet Provisioning"
 nd_spa_fleet_provisioning_desc: "Supplying the Armada with rope, sailcloth, tar, and provisions — the logistical backbone of Spain's oceanic naval power."
 nd_spa_silver_minting: "Silver Minting"
 nd_spa_silver_minting_desc: "Colonial silver is assayed, refined, and struck into coins at the royal mint, producing the legendary pieces of eight."
 nd_spa_cannon_founding: "Cannon Founding"
 nd_spa_cannon_founding_desc: "Iron is smelted and cast into artillery pieces at the Royal Foundry, supplying Spain's armies and fortifications with modern ordnance."
 nd_spa_road_maintenance: "Road Maintenance"
 nd_spa_road_maintenance_desc: "Teams of laborers maintain the paved surfaces, bridges, and drainage of the Camino Real, keeping the kingdom's arteries open for commerce and couriers."
 levy_nd_spa_rodelero: "Rodelero Levy"
 levy_nd_spa_rodelero_desc: "Sword-and-buckler fighters raised from Iberian frontier communities, continuing the close-combat traditions of the Reconquista."
 levy_nd_spa_jinete: "Jinete Levy"
 levy_nd_spa_jinete_desc: "Light cavalrymen raised from the Iberian borderlands, riding in the jineta style — fast, agile, and deadly in skirmish and pursuit."
 nd_spa_formed_tt: "Spain has been formed"
 nd_spa_path_a_tt: "Chose Universal Monarchy"
 nd_spa_path_b_tt: "Chose Empire of the Indies"

 # ===== DESTINY TREE LOCALIZATION =====

 # Advance names and descriptions
 nd_spa_destiny: "Spanish Destiny"
 nd_spa_destiny_desc: "Spain stands at a crossroads. The crown is united and the realm secure — now a greater destiny beckons. Achieve stability and chart the course of the Spanish nation."
 nd_spa_dest_italian_wars: "The Italian Wars"
 nd_spa_dest_italian_wars_desc: "The wealth and prestige of Italy draw Spain into the great power struggle for the peninsula. Seize Naples and Milan to establish Spanish supremacy over Italy."
 nd_spa_dest_army_of_flanders: "The Army of Flanders"
 nd_spa_dest_army_of_flanders_desc: "Spain's reach extends northward. Take Antwerp, heart of the richest provinces in Europe, maintain a great army, and embrace professional military organization."
 nd_spa_dest_defender_of_christendom: "Defender of Christendom"
 nd_spa_dest_defender_of_christendom_desc: "Spain aspires to be the universal champion of the Catholic faith. Control Rome, Tunis, and Sicily while maintaining the stability to lead all Christendom."
 nd_spa_dest_caribbean_foothold: "Caribbean Foothold"
 nd_spa_dest_caribbean_foothold_desc: "The New World beckons. Establish a base in Havana and ensure sugar flows through your markets — the first step toward a global colonial empire."
 nd_spa_dest_pacific_link: "The Pacific Link"
 nd_spa_dest_pacific_link_desc: "From Mexico to Manila, forge the greatest trade route the world has ever seen. Control Tenochtitlan and Manila, linking the wealth of Asia to the Americas."
 nd_spa_dest_global_empire: "The Global Empire"
 nd_spa_dest_global_empire_desc: "Complete the conquest of the greatest indigenous empire in the Americas, develop a vast colonial domain, and embrace manufacturing to build an empire that spans the globe."

 # Destiny event localization
 nd_spa.5.t: "A Crown United"
 nd_spa.5.d: "The kingdoms of Iberia stand united under a single crown. The Reconquista is a living memory, the faith is strong, and Spanish arms are respected throughout Christendom. From the courts of Toledo and Valladolid, from the ports of Barcelona and Seville, the ambitions of a great nation take shape. Whether through the sword of the faithful or the wealth of distant lands, Spain shall leave its mark upon the world."
 nd_spa.5.a: "Our destiny awaits."

 nd_spa.6.t: "The Prize of Italy"
 nd_spa.6.d: "The banners of Spain fly over Naples and Milan. What generations of Italian princes, French kings, and German emperors struggled to control now rests in Spanish hands. The tercios march through the streets of cities that once answered only to their own lords, and Spanish viceroys administer the richest lands in Europe. Italy is ours — and with it, the key to Mediterranean mastery and European hegemony."
 nd_spa.6.a: "Italy bows to the Spanish crown."

 nd_spa.7.t: "The Army of Flanders"
 nd_spa.7.d: "The Spanish Road — that legendary corridor stretching from Milan through Savoy and Franche-Comte to the Netherlands — now carries a steady stream of men, money, and munitions northward. In Antwerp, the wealthiest city in Europe, Spanish governors oversee a commercial empire that rivals the colonial one. The Army of Flanders, that fearsome instrument of Habsburg power, holds the Low Countries in an iron grip. Yet maintaining this distant army strains even Spain's vast resources. Shall we perfect the military machine, pouring treasure into discipline and fortifications? Or leverage our dynastic connections, using diplomacy to manage what force alone cannot sustain?"
 nd_spa.7.a: "Discipline and steel will hold Flanders."
 nd_spa.7.b: "Dynastic ties bind more firmly than iron."

 nd_spa.8.t: "Defender of Christendom"
 nd_spa.8.d: "From the shores of Tunis to the hills of Rome, from the harbors of Sicily to the fortresses of Flanders, Spain's power encircles the Mediterranean and dominates Europe. No king in Christendom commands such armies, no prince defends the faith with such zeal, no realm spans such distances. The dream of a universal Christian monarchy — first glimpsed by Charles V as he knelt before the Pope in Bologna — is within reach. Shall Spain be the champion of Catholic orthodoxy, a crusading power whose armies are the sword of the Church? Or shall we build a Habsburg imperium, a dynasty whose web of alliances and possessions makes it the arbiter of European affairs?"
 nd_spa.8.a: "We are the sword of the Holy Church."
 nd_spa.8.b: "The House of Habsburg shall rule all."

 nd_spa.9.t: "The Pearl of the Antilles"
 nd_spa.9.d: "Havana stands as the gateway to the New World — a fortress-port where the treasure fleets assemble, where sugar cane sweetens the air, and where the wealth of two continents passes through Spanish hands. From this Caribbean stronghold, the routes fan outward: south to the riches of Peru, west to the silver of Mexico, east to the waiting markets of Seville. The colony is no longer an experiment — it is the foundation of a global empire."
 nd_spa.9.a: "The Indies are our birthright."

 nd_spa.10.t: "The Manila Galleon"
 nd_spa.10.d: "The impossible has been achieved. Spanish ships now cross the Pacific, linking the silver of Mexico to the silk and spices of Asia. In Manila, Chinese junks crowd the harbor alongside Spanish galleons, trading porcelain and lacquerware for American silver. In Acapulco, the annual arrival of the Manila Galleon triggers a frenzy of commerce that draws merchants from across the Americas. No other nation has forged such a link — a single trading route that girdles the globe. Shall the crown tighten its grip on this oceanic monopoly, building a fleet that dominates the Pacific? Or shall we open the ports, letting private enterprise multiply the wealth that flows along this remarkable route?"
 nd_spa.10.a: "The crown controls the Pacific trade."
 nd_spa.10.b: "Open the ports to all who would trade."

 nd_spa.11.t: "The Empire on Which the Sun Never Sets"
 nd_spa.11.d: "From the Andes to the Philippines, from the Caribbean to the Mediterranean, the Spanish Empire spans every continent and every ocean. The ancient cities of the Incas now fly the banner of Castile, and in every corner of this vast dominion, Spanish law, Spanish faith, and Spanish language take root. No empire in history has governed such diversity of peoples across such distances. Shall we centralize this colossus through a system of viceroyalties and audiencias, binding the empire together with uniform law and administration? Or shall we let the silver that flows from Potosi and Zacatecas become the foundation of Spanish economic power, investing the wealth of empire in fleets, fortifications, and public works?"
 nd_spa.11.a: "One law, one faith, one empire."
 nd_spa.11.b: "Silver shall be our foundation."

 # Timed modifier names and descriptions
 STATIC_MODIFIER_NAME_nd_spa_dest_iron_discipline: "Iron Discipline"
 STATIC_MODIFIER_DESC_nd_spa_dest_iron_discipline: "The Army of Flanders drills ceaselessly, its garrisons fortified and its recruits hardened by the rigors of northern service — though the domestic economy bears the cost of perpetual war."
 STATIC_MODIFIER_NAME_nd_spa_dest_habsburg_diplomacy: "Habsburg Diplomacy"
 STATIC_MODIFIER_DESC_nd_spa_dest_habsburg_diplomacy: "Through marriage, alliance, and the careful management of dynastic claims, the Habsburgs weave a web of influence across Europe — though every new commitment draws Spain deeper into costly wars."
 STATIC_MODIFIER_NAME_nd_spa_dest_catholic_champion: "Catholic Champion"
 STATIC_MODIFIER_DESC_nd_spa_dest_catholic_champion: "Spain stands as the armed defender of the Catholic faith, its armies consecrated to the service of the Church, its wars blessed by the Pope himself."
 STATIC_MODIFIER_NAME_nd_spa_dest_habsburg_imperium: "Habsburg Imperium"
 STATIC_MODIFIER_DESC_nd_spa_dest_habsburg_imperium: "The Habsburg dynasty sits astride Europe, its prestige unmatched and its diplomatic weight decisive in every negotiation — though the sprawling empire's intellectual life suffers from the demands of governance."
 STATIC_MODIFIER_NAME_nd_spa_dest_crown_fleet: "Crown Fleet"
 STATIC_MODIFIER_DESC_nd_spa_dest_crown_fleet: "The royal fleet dominates the Pacific sea lanes, its blockades choking rivals and its traditions of seamanship unmatched — though the crown's obsession with oceanic trade draws resources from the homeland."
 STATIC_MODIFIER_NAME_nd_spa_dest_free_ports: "Free Ports of the Indies"
 STATIC_MODIFIER_DESC_nd_spa_dest_free_ports: "By opening colonial ports to broader commerce, raw materials flow freely and merchants prosper — though the standing army, starved of monopoly revenues, grows costlier to maintain."
 STATIC_MODIFIER_NAME_nd_spa_dest_centralized_viceroyalties: "Centralized Viceroyalties"
 STATIC_MODIFIER_DESC_nd_spa_dest_centralized_viceroyalties: "A system of viceroys, audiencias, and intendants binds the empire under uniform law. Colonial populations are integrated, local officials answer to the crown, and administrative efficiency reaches new heights."
 STATIC_MODIFIER_NAME_nd_spa_dest_silver_standard: "Silver Standard"
 STATIC_MODIFIER_DESC_nd_spa_dest_silver_standard: "The wealth of Potosi and Zacatecas flows into warships, fortifications, and public works. Silver funds a navy that dominates the oceans and an army larger than any rival can match."

 # Building names and descriptions
 nd_spa_escorial: "El Escorial"
 nd_spa_escorial_desc: "The great monastery-palace of San Lorenzo de El Escorial — simultaneously royal residence, monastery, library, and mausoleum — the architectural embodiment of Spain's claim to be the defender of Christendom."
 nd_spa_escorial_administration: "Escorial Administration"
 nd_spa_escorial_administration_desc: "The vast bureaucracy of the monastery-palace processes correspondence from every corner of the empire, its clerks and scribes dressed in fine cloth maintaining records of universal monarchy amid richly furnished halls."
 nd_spa_real_audiencia: "Real Audiencia"
 nd_spa_real_audiencia_desc: "A Royal Court of Appeals — the supreme judicial and administrative institution of colonial governance, enforcing Spanish law and the rights of the crown across the vast territories of the Indies."
 nd_spa_audiencia_operations: "Audiencia Operations"
 nd_spa_audiencia_operations_desc: "The daily work of the Audiencia: hearing cases, recording judgments, issuing decrees, and maintaining the legal correspondence and reference volumes that bind distant provinces to the Spanish crown, its judges robed in fine cloth."
