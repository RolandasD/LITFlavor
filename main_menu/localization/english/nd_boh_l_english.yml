l_english:
 STATIC_MODIFIER_NAME_nd_boh_hussite_heritage: "Hussite Heritage"
 STATIC_MODIFIER_DESC_nd_boh_hussite_heritage: "The chalice of Hus burns in the hearts of the Bohemian people. Religious dissent, military innovation, and the power of the estates define this kingdom."
 STATIC_MODIFIER_NAME_nd_boh_crown_wenceslas: "Crown of Saint Wenceslas"
 STATIC_MODIFIER_DESC_nd_boh_crown_wenceslas: "The sacred crown of Bohemia bestows imperial prestige and cultural patronage upon its wearer. Prague shines as a jewel of Christendom."
 STATIC_MODIFIER_NAME_nd_boh_compactata_spirit: "Spirit of the Compactata"
 STATIC_MODIFIER_DESC_nd_boh_compactata_spirit: "The Basel Compacts secured Bohemia's right to communion in both kinds. Religious coexistence, however uneasy, prevails in the Czech lands."
 STATIC_MODIFIER_NAME_nd_boh_counter_reformation: "Counter-Reformation"
 STATIC_MODIFIER_DESC_nd_boh_counter_reformation: "The Renewed Land Ordinance has imposed Catholic conformity upon Bohemia. The old Hussite liberties are extinguished, but order is restored."
 STATIC_MODIFIER_NAME_nd_boh_exile_legacy: "Legacy of the Exiles"
 STATIC_MODIFIER_DESC_nd_boh_exile_legacy: "The Bohemian Brethren carry their learning into exile, spreading Czech scholarship across Europe. What was lost in faith endures in thought."
 nd_boh.1.t: "The Crown of Bohemia"
 nd_boh.1.d: "The lands of Bohemia and Moravia are united under a single crown. For generations, this kingdom has stood at the crossroads of European civilization — seat of emperors, cradle of religious revolt, and home to one of the oldest universities north of the Alps.\n\nBut Bohemia's identity remains contested. The memory of Jan Hus and the Hussite wars lingers in every parish and estate chamber. The chalice and the crown pull in opposite directions: shall Bohemia be defined by the radical legacy of its religious dissenters, with their democratic assemblies and military innovations? Or by the ancient prestige of Saint Wenceslas's crown, with its imperial connections, cultural patronage, and place among the great Catholic kingdoms of Europe?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_boh.1.a: "The Chalice shall not be silenced."
 nd_boh.1.b: "We wear the Crown of Saint Wenceslas."
 nd_boh.2.t: "The Compactata of Basel"
 nd_boh.2.d: "After decades of devastating religious warfare, an extraordinary agreement has been reached. The Council of Basel has recognized the rights of the Utraquist Church in Bohemia — the first time in Christian history that a dissident religious movement has wrested formal concessions from the Roman Church.\n\nThe Compacts of Basel guarantee communion in both kinds, allow lay preaching, and acknowledge the expropriation of Church lands. Bohemia stands as a unique experiment in religious coexistence, a century before the Reformation will convulse the rest of Europe. The moderate Hussites have secured what the radicals fought and died for at Lipany — not through victory in battle, but through the exhaustion of their enemies and the pragmatism of their diplomats."
 nd_boh.2.a: "Sub utraque specie — under both kinds."
 nd_boh.3.t: "The Renewed Land Ordinance"
 nd_boh.3.d: "The catastrophe at White Mountain has transformed Bohemia. The Protestant estates who dared to elect Frederick of the Palatinate as their king have been crushed, their leaders executed on the Old Town Square, their properties confiscated. Ferdinand II's Renewed Land Ordinance of 1627 has swept away the old Bohemian constitution — the Estates Diet that once elected kings is now a rubber stamp, the Czech language is demoted to equality with German, and only the Catholic faith is permitted.\n\nBut this devastation also presents a choice. The old Bohemia of competing confessions is dead. What rises from these ashes will be shaped by how its rulers wield this absolute power."
 nd_boh.3.a: "Enforce the true faith without compromise."
 nd_boh.3.b: "Let the exiles carry our learning to the world."
 nd_boh.4.t: "The Czech National Awakening"
 nd_boh.4.d: "Something stirs in the libraries and lecture halls of Prague. Scholars like Josef Dobrovsky and Josef Jungmann are reconstructing the Czech language from the fragments left after two centuries of Germanization. They rediscover the Hussite legacy not as heresy but as national heritage — proof that the Czech people once defied all of Europe and won.\n\nThe National Awakening is more than a linguistic movement. It is a reassertion of Bohemian identity, connecting the medieval kingdom of Charles IV through the Hussite revolution to the modern demand for national self-determination. Czech culture, long suppressed, now demands its place in the sun."
 nd_boh.4.a: "The Czech nation lives yet."
 nd_boh_silver_legacy: "Silver Legacy of Kutna Hora"
 nd_boh_silver_legacy_desc: "The rich silver deposits of Kutna Hora made Bohemia one of the wealthiest kingdoms in medieval Europe, producing a third of all European silver."
 nd_boh_premyslid_crown: "Premyslid Crown Governance"
 nd_boh_premyslid_crown_desc: "The Premyslid dynasty established the administrative foundations of the Bohemian crown, centralizing royal authority over the Czech lands."
 nd_boh_hop_brewing: "Bohemian Hop Cultivation"
 nd_boh_hop_brewing_desc: "Bohemia's Saaz hops were so prized that exporting hop sprouts was punishable by death. The brewing tradition dates to the earliest monasteries."
 nd_boh_charles_university: "Charles University"
 nd_boh_charles_university_desc: "Founded in 1348 by Charles IV, the University of Prague was the first university in Central Europe and attracted scholars from across the continent."
 nd_boh_prague_golden_age: "Prague's Golden Age"
 nd_boh_prague_golden_age_desc: "Under Charles IV, Prague became a center of Gothic art and architecture. The Charles Bridge, St. Vitus Cathedral, and the New Town transformed the city."
 nd_boh_houfnice_innovation: "Houfnice Field Guns"
 nd_boh_houfnice_innovation_desc: "The Czech houfnice — mobile field cannon — gave the English language the word 'howitzer.' Hussite gunners pioneered the use of artillery in open battle."
 nd_boh_tabor_warfare: "Tabor Warfare"
 nd_boh_tabor_warfare_desc: "The radical Hussites built the fortified town of Tabor as a model community and military base. Their defensive tactics combined wagenburg, firearms, and faith."
 nd_boh_compactata: "Compactata of Basel"
 nd_boh_compactata_desc: "The 1436 agreement between the Council of Basel and the Hussites was the first negotiated religious settlement in European history."
 nd_boh_hussite_levy: "Hussite Peasant Levies"
 nd_boh_hussite_levy_desc: "The Hussite wars mobilized Bohemian peasants as never before. Armed with war flails, halberds, and righteous fury, they defeated crusading knights."
 nd_boh_bohemian_brethren: "Unity of the Brethren"
 nd_boh_bohemian_brethren_desc: "The Bohemian Brethren, heirs to the Hussite tradition, emphasized education, literacy, and moral discipline. Jan Amos Comenius became the father of modern pedagogy."
 nd_boh_professional_infantry: "Bohemian Professional Infantry"
 nd_boh_professional_infantry_desc: "Building on Hussite military tradition, Bohemia developed disciplined professional infantry skilled in pike and shot warfare."
 nd_boh_estate_diets: "Bohemian Estate Diets"
 nd_boh_estate_diets_desc: "The Bohemian Diet was one of the most powerful representative assemblies in Europe, with the right to elect kings and approve taxation."
 nd_boh_verneuerte_landesordnung: "Verneuerte Landesordnung"
 nd_boh_verneuerte_landesordnung_desc: "Ferdinand II's Renewed Land Ordinance of 1627 swept away the old Bohemian constitution, imposing absolute Habsburg rule after the Battle of White Mountain."
 nd_boh_recatholicization: "Recatholicization"
 nd_boh_recatholicization_desc: "The forced re-Catholicization of Bohemia after 1620 expelled Protestant clergy, confiscated estates, and imposed religious conformity across the kingdom."
 nd_boh_baroque_prague: "Baroque Prague"
 nd_boh_baroque_prague_desc: "The counter-reformation transformed Prague's skyline with spectacular Baroque churches, palaces, and gardens built by Italian and Austrian architects."
 nd_boh_bohemian_glass_trade: "Bohemian Glass Trade"
 nd_boh_bohemian_glass_trade_desc: "Bohemian crystal glass became a luxury export across Europe in the 17th and 18th centuries, rivaling Venetian murano as the continent's finest."
 nd_boh_national_awakening: "Czech National Awakening"
 nd_boh_national_awakening_desc: "Scholars and writers rediscovered the Czech language and Hussite heritage, forging a modern national identity from the fragments of a suppressed culture."
 nd_boh_industrial_bohemia: "Industrial Bohemia"
 nd_boh_industrial_bohemia_desc: "Bohemia became one of the most industrialized regions of Central Europe, with iron foundries, textile mills, and a dense railway network."
 nd_boh_pilsner_revolution: "The Pilsner Revolution"
 nd_boh_pilsner_revolution_desc: "In 1842, the Pilsen Burgher Brewery produced the first golden lager using Saaz hops and soft Pilsen water, creating a beer style that conquered the world."
 nd_boh_constitutional_struggle: "Constitutional Struggle"
 nd_boh_constitutional_struggle_desc: "The demand for Bohemian autonomy within the Habsburg monarchy drove constitutional debates and the emergence of modern Czech political life."
 a_nd_boh_houfnice: "Houfnice"
 a_nd_boh_houfnice_desc: "Mobile Hussite field guns, the precursor to the modern howitzer. Light enough to keep pace with the wagenburg, devastating enough to break cavalry charges."
 a_nd_boh_cepnik: "Cepnik"
 a_nd_boh_cepnik_desc: "Hussite peasant warriors armed with war flails — the cep. Fanatical in defense, they broke the flower of European chivalry at Vitkov and Kutna Hora."
 a_nd_boh_landsknecht: "Bohemian Landsknecht"
 a_nd_boh_landsknecht_desc: "Professional Bohemian pikemen and halberdiers, heirs to the Hussite infantry tradition. Disciplined formations trained to hold against cavalry."
 nd_boh_kutna_hora_mint: "Kutna Hora Mint"
 nd_boh_kutna_hora_mint_desc: "The Italian Court at Kutna Hora minted the Prague Groschen and later the Thaler for over four centuries, making Bohemia's coinage the standard of Central Europe."
 nd_boh_silver_minting: "Silver Minting"
 nd_boh_silver_minting_desc: "Refined Bohemian silver is struck into Prague Groschen and Thalers, producing fine coined jewelry and luxury metalwork for export."
 nd_boh_brewhouse: "Bohemian Brewhouse"
 nd_boh_brewhouse_desc: "A licensed brewery using the prized Saaz hops of Bohemia. Royal brewing privileges ensure quality and restrict competition."
 nd_boh_saaz_hop_brewing: "Saaz Hop Brewing"
 nd_boh_saaz_hop_brewing_desc: "Bohemian brewing with the aromatic Saaz hop variety, producing beer of unmatched clarity and flavor."
 nd_boh_pilsner_method: "Pilsner Lager Method"
 nd_boh_pilsner_method_desc: "The revolutionary bottom-fermentation technique using pale malt and soft water, producing a crystal-clear golden beer."
 nd_boh_hussite_tabor: "Hussite Tabor"
 nd_boh_hussite_tabor_desc: "A fortified settlement in the Hussite tradition — part garrison, part community, designed for sustained defense with firearms and wagons."
 nd_boh_tabor_garrison: "Tabor Garrison Upkeep"
 nd_boh_tabor_garrison_desc: "Maintaining the garrison, fortifications, and arms stores of a Hussite tabor community."
 nd_boh_karolinum: "Karolinum"
 nd_boh_karolinum_desc: "A university in the tradition of Charles IV's foundation at Prague — the first university in Central Europe, center of theology, law, and the liberal arts."
 nd_boh_university_maintenance: "University Maintenance"
 nd_boh_university_maintenance_desc: "Supplying the scholars and students with books, paper, and the materials of learning."
 nd_boh_baroque_church: "Baroque Church"
 nd_boh_baroque_church_desc: "A magnificent counter-reformation church built in the ornate Baroque style, a monument to Catholic resurgence and Habsburg cultural patronage in Bohemia."
 nd_boh_baroque_patronage: "Baroque Patronage"
 nd_boh_baroque_patronage_desc: "Maintaining and embellishing Baroque church architecture — candles burning before gilded altars, books for the clergy, stone for perpetual renovation."
 nd_boh_ironworks: "Bohemian Ironworks"
 nd_boh_ironworks_desc: "A modern iron smelting works using Bohemia's rich deposits of iron and coal to produce high-quality steel for industry and export."
 nd_boh_iron_smelting: "Iron Smelting"
 nd_boh_iron_smelting_desc: "Processing Bohemian iron ore with coal fuel to produce steel of industrial quality."
 levy_nd_boh_cepnik: "Cepnik Levy"
 levy_nd_boh_cepnik_desc: "Hussite peasant warriors wielding war flails, raised from the devout Bohemian countryside."
 nd_boh_formed_tt: "Bohemia has been formed"
 nd_boh_path_a_tt: "Chose Hussite Heritage"
 nd_boh_path_b_tt: "Chose Crown of Saint Wenceslas"
 nd_boh_destiny: "Destiny of Bohemia"
 nd_boh_destiny_desc: "The crown lands are united. Now Bohemia must choose its path — the chalice of Hus or the crown of Wenceslas — and pursue its destiny to completion."
 nd_boh_dest_spanile_jizdy: "The Beautiful Rides"
 nd_boh_dest_spanile_jizdy_desc: "The Hussite war bands launched devastating raids — the spanile jizdy — deep into Saxony, Brandenburg, and Silesia, spreading terror and the word of God. Seize Wroclaw and Gorlitz to secure Bohemia's eastern and northern flanks."
 nd_boh_dest_bohemian_hegemony: "Bohemian Hegemony"
 nd_boh_dest_bohemian_hegemony_desc: "With Silesia and Lusatia secured, the Hussite armies can push into the heart of Saxony. Take Dresden and Meissen, and build the military strength to dominate Central Europe."
 nd_boh_dest_warriors_of_god: "Warriors of God"
 nd_boh_dest_warriors_of_god_desc: "The Hussite revolution reaches its apex. Nuremberg, Berlin, and Krakow must fall to prove that no crusade can break the warriors of God. This is the capstone of Bohemian military supremacy."
 nd_boh_dest_carolinum: "The Carolinum"
 nd_boh_dest_carolinum_desc: "Charles IV founded the first university north of the Alps and made Prague a center of European learning. Embrace the institutions of the age and build the treasury to fund Bohemia's cultural ambitions."
 nd_boh_dest_imperial_capital: "Imperial Capital"
 nd_boh_dest_imperial_capital_desc: "Prague was once the seat of the Holy Roman Emperor. Secure Vienna, develop the realm, and restore Bohemia's position as the premier kingdom of Central Europe."
 nd_boh_dest_praga_caput: "Praga Caput Regni"
 nd_boh_dest_praga_caput_desc: "Prague, Head of the Kingdom — and perhaps of all Europe. Control Augsburg, embrace the printing press, and elevate Bohemia to a cultural and institutional power without equal."
 nd_boh.5.t: "The Destiny of Bohemia"
 nd_boh.5.d: "The Bohemian crown lands are consolidated under a single ruler. The kingdom stands at a crossroads. Shall the legacy of Hus guide its armies outward in holy war, or shall the memory of Charles IV draw scholars and artisans to Prague, making it the jewel of an empire? The path chosen now will shape the destiny of the Czech people for centuries to come."
 nd_boh.5.a: "Our destiny awaits."
 nd_boh.6.t: "The Beautiful Rides Begin"
 nd_boh.6.d: "The Hussite field armies have broken through the mountain passes and seized the great cities beyond. Wroclaw, capital of Silesia, and Gorlitz, gateway to Lusatia, now fly the chalice banner. The spanile jizdy — the Beautiful Rides that once terrorized half of Europe — have become permanent conquests. The crusaders who once marched against Bohemia now cower behind their walls as the warriors of God ride forth."
 nd_boh.6.a: "God wills it — in both kinds."
 nd_boh.7.t: "The Hegemony of the Chalice"
 nd_boh.7.d: "Saxon resistance has crumbled. Dresden and Meissen — the heartland of the Wettin dynasty — are now subject to Bohemian arms. The Hussite military machine, forged in decades of defensive war, has become the dominant force in Central Europe. But hegemony demands choices. Shall Bohemia's strength rest on the iron flail of its warriors, or on the fiery sermons of its field preachers who sustain the army's fanatical morale?"
 nd_boh.7.a: "Let the flail do the preaching."
 nd_boh.7.b: "The word of God sustains our armies."
 nd_boh.8.t: "Warriors of God"
 nd_boh.8.d: "Nuremberg, Berlin, Krakow — the great cities of Central Europe have fallen to Bohemian arms. No crusade, no coalition, no emperor could stop the advance of the warriors of God. What the Hussites began as a desperate defense of their communion chalice has become the most remarkable military expansion in European history. Jan Zizka's blind genius has found its ultimate expression.\n\nBut every empire must decide how to govern its conquests. Shall Bohemia rule through military discipline alone, or attempt the radical experiment of extending its proto-democratic assemblies to the conquered lands?"
 nd_boh.8.a: "Discipline and the sword shall govern."
 nd_boh.8.b: "Let every land have its assembly."
 nd_boh.9.t: "The New Carolinum"
 nd_boh.9.d: "Prague's scholarly tradition, founded by Charles IV himself, has produced a new generation of thinkers and administrators. The embrace of modern banking and institutional reform has filled the royal treasury and attracted merchants from across Europe. The Carolinum — once merely a university — has become the intellectual engine of a kingdom that leads by knowledge rather than conquest."
 nd_boh.9.a: "Prague shall be the Athens of the North."
 nd_boh.10.t: "The Imperial Capital Restored"
 nd_boh.10.d: "Vienna is secured and the realm thrives. Bohemia has reclaimed the imperial stature it held under Charles IV, when Prague was the undisputed capital of the Holy Roman Empire. The kingdom's institutional sophistication and cultural prestige draw ambassadors and scholars from across the continent.\n\nBut imperial ambition comes in different forms. Shall Bohemia invoke the Golden Bull of 1356 — Charles IV's constitutional masterwork — to cement its diplomatic supremacy? Or invest in Prague's workshops and artisans to build an economic foundation that no rival can match?"
 nd_boh.10.a: "Invoke the Golden Bull."
 nd_boh.10.b: "Invest in Prague's artisans."
 nd_boh.11.t: "Praga Caput Regni"
 nd_boh.11.d: "Prague, Head of the Kingdom. The ancient motto has never been more true. With Augsburg secured and the printing press spreading Bohemian learning across Europe, Prague stands as the cultural and institutional capital of Central Europe — a role it has not held since the golden days of Charles IV. The dream of a Bohemian-led empire, built on scholarship rather than conquest, is now reality.\n\nShall Bohemia claim the ultimate prize — the title Rex Romanorum, King of the Romans — and rule Europe through prestige and precedence? Or turn inward, fostering a Bohemian enlightenment that will illuminate the world through knowledge?"
 nd_boh.11.a: "We shall be Rex Romanorum."
 nd_boh.11.b: "Let Prague illuminate the world."
 STATIC_MODIFIER_NAME_nd_boh_dest_iron_flail: "Iron Flail"
 STATIC_MODIFIER_DESC_nd_boh_dest_iron_flail: "The Hussite war flail crushes all resistance. Bohemian siege craft and battlefield morale are unmatched, though the devastation of war stunts the growth of the common folk."
 STATIC_MODIFIER_NAME_nd_boh_dest_field_preachers: "Field Preachers"
 STATIC_MODIFIER_DESC_nd_boh_dest_field_preachers: "Hussite preachers march with the armies, sustaining fanatical devotion and drawing volunteers from every village. The cost of this zealous mobilization weighs on the treasury."
 STATIC_MODIFIER_NAME_nd_boh_dest_gods_warriors: "Warriors of God"
 STATIC_MODIFIER_DESC_nd_boh_dest_gods_warriors: "The disciplined armies of the Hussite state march with divine purpose, their supply lines efficient and their enemies withering in hostile Bohemian territory."
 STATIC_MODIFIER_NAME_nd_boh_dest_hussite_commonwealth: "Hussite Commonwealth"
 STATIC_MODIFIER_DESC_nd_boh_dest_hussite_commonwealth: "The radical Hussite vision of community governance extends across conquered lands, sustaining popular armies though the decentralized treasury increases borrowing costs."
 STATIC_MODIFIER_NAME_nd_boh_dest_golden_bull: "Spirit of the Golden Bull"
 STATIC_MODIFIER_DESC_nd_boh_dest_golden_bull: "The constitutional framework of the Golden Bull elevates Bohemia's diplomatic standing among the princes of Europe, though maintaining this prestige demands a larger household guard."
 STATIC_MODIFIER_NAME_nd_boh_dest_prague_workshop: "Prague Workshops"
 STATIC_MODIFIER_DESC_nd_boh_dest_prague_workshop: "Prague's artisans and builders produce works of exceptional quality at lower cost, though the kingdom's focus on crafts diverts men from military service."
 STATIC_MODIFIER_NAME_nd_boh_dest_rex_romanorum: "Rex Romanorum"
 STATIC_MODIFIER_DESC_nd_boh_dest_rex_romanorum: "Bohemia's king claims the ancient title of King of the Romans. Imperial prestige is unassailable, though the burdens of maintaining this status weary the realm in wartime."
 STATIC_MODIFIER_NAME_nd_boh_dest_bohemian_enlightenment: "Bohemian Enlightenment"
 STATIC_MODIFIER_DESC_nd_boh_dest_bohemian_enlightenment: "Prague leads a scholarly revolution that spreads institutions and development across the kingdom, with efficient construction methods learned from generations of builders."
 nd_boh_hussite_arsenal: "Hussite Arsenal"
 nd_boh_hussite_arsenal_desc: "A great armory and workshop complex in the Hussite tradition, producing war wagons, field guns, and the feared flail weapons of the Bohemian infantry."
 nd_boh_arsenal_maintenance: "Arsenal Maintenance"
 nd_boh_arsenal_maintenance_desc: "Maintaining the forges, timber stores, and weapons workshops of a Hussite arsenal."
 nd_boh_imperial_academy: "Imperial Academy"
 nd_boh_imperial_academy_desc: "A supreme institution of learning in the tradition of Charles IV, rivaling Bologna and Paris as a center of European scholarship and institutional innovation."
 nd_boh_academy_maintenance: "Academy Maintenance"
 nd_boh_academy_maintenance_desc: "Supplying the scholars, maintaining the library, and funding the lectures of an imperial academy."
