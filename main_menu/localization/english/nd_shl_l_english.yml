l_english:
 STATIC_MODIFIER_NAME_nd_shl_ewig_ungedeelt: "Up Ewig Ungedeelt"
 STATIC_MODIFIER_DESC_nd_shl_ewig_ungedeelt: "The duchies of Schleswig and Holstein are forever undivided. Under a single sovereign will, the borderland has become a unified state, its governance firm and its borders secure."
 STATIC_MODIFIER_NAME_nd_shl_eider_frontier: "The Eider Frontier"
 STATIC_MODIFIER_DESC_nd_shl_eider_frontier: "Schleswig-Holstein embraces its nature as a bridge between worlds. Danish and German, North Sea and Baltic, Scandinavia and the Empire -- all meet and mingle in these duchies, and from this mingling comes prosperity."
 STATIC_MODIFIER_NAME_nd_shl_treaty_sovereignty: "Treaty Sovereignty"
 STATIC_MODIFIER_DESC_nd_shl_treaty_sovereignty: "The Treaty of Ribe has been interpreted as a mandate for ducal sovereignty, concentrating power in the duke's hands rather than the estates."
 STATIC_MODIFIER_NAME_nd_shl_treaty_estates: "Estates Partnership"
 STATIC_MODIFIER_DESC_nd_shl_treaty_estates: "The Treaty of Ribe has established a partnership between the duke and the Holstein estates, with merchant towns gaining a voice in governance."
 STATIC_MODIFIER_NAME_nd_shl_canal_strategic: "Strategic Waterway"
 STATIC_MODIFIER_DESC_nd_shl_canal_strategic: "The Eider Canal serves as a strategic corridor, allowing rapid movement of ships between the North Sea and the Baltic without the dangerous journey around Jutland."
 STATIC_MODIFIER_NAME_nd_shl_canal_commercial: "Commercial Corridor"
 STATIC_MODIFIER_DESC_nd_shl_canal_commercial: "The Eider Canal has become a commercial artery, enabling goods to flow between the two seas and enriching the towns along its banks."
 nd_shl.1.t: "Up Ewig Ungedeelt"
 nd_shl.1.d: "The duchies of Schleswig and Holstein are united at last. For centuries these lands have been pulled between Denmark and the Empire, their dukes serving two masters, their people speaking two languages. The Treaty of Ribe declared these lands 'forever undivided' -- but unity of territory is not yet unity of purpose.\n\nThe Holsatian nobles demand a strong duke who can resist Danish encroachment and stand as sovereign in the Empire. But the merchants of Kiel and the farmers of the marshes see a different future -- one where the duchy's position between two seas and two civilizations becomes its greatest asset, not a source of weakness.\n\nShall Schleswig-Holstein forge itself into a single, sovereign state? Or shall it embrace the borderland, becoming the indispensable bridge between Scandinavia and Germany?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_shl.1.a: "We are forever undivided, under one sovereign"
 nd_shl.1.b: "We are the bridge between two worlds"
 nd_shl.2.t: "The Treaty of Ribe"
 nd_shl.2.d: "On 2 March 1460, in the ancient city of Ribe, the Holsatian nobles elected King Christian I of Denmark as their new count, succeeding the extinct Schauenburg dynasty. In return, Christian swore an oath that would echo through centuries: the duchies of Schleswig and Holstein should remain 'up ewig ungedeelt' -- forever undivided.\n\nThis simple phrase in Low German became the constitutional foundation of the duchies. But its meaning was contested from the start. Did it mean the duchies were bound together as one state under ducal authority? Or did it mean the estates -- the knights and towns who extracted this promise -- held a permanent right to share in governance?\n\nThe answer will shape the duchy's character for generations."
 nd_shl.2.a: "The duke rules undivided lands with undivided authority"
 nd_shl.2.b: "The estates share in the governance of these lands"
 nd_shl.3.t: "The Disaster at Hemmingstedt"
 nd_shl.3.d: "On 17 February 1500, King John of Denmark and Duke Frederick marched against the free peasant republic of Dithmarschen with an army of over twelve thousand men, including four thousand Landsknechte and two thousand armored knights. The Dithmarscher peasants, barely six thousand strong, met them on flooded ground near the village of Hemmingstedt.\n\nThe peasants had opened the sluice gates of their dikes, flooding the low-lying marshes and funneling the invading army into narrow causeways where their numbers counted for nothing. One-third of all the knights of Schleswig and Holstein perished in the mud. The ducal banner fell. It was the worst military humiliation in the history of the duchies.\n\nBut from this disaster comes a hard lesson: in these flat, watery lands, fortification and knowledge of the terrain are worth more than cavalry charges. The marsh itself is a weapon for those who know how to wield it."
 nd_shl.3.a: "We shall never again underestimate the marsh"
 nd_shl.4.t: "The Eider Canal"
 nd_shl.4.d: "Since the days of the Vikings, men have dreamed of cutting a channel across the narrow neck of the Jutland peninsula to connect the North Sea to the Baltic. Duke Adolf I of Holstein-Gottorp first proposed the project in 1571, but it took two centuries of engineering advances before construction could begin.\n\nCompleted in 1784, the Eider Canal stretches from Kiel on the Baltic to the Eider estuary at Tonning on the North Sea. Ships that once braved weeks of dangerous sailing around the Skagerrak can now transit in days. The canal transforms Schleswig-Holstein from a peripheral borderland into the pivot point of northern European maritime commerce.\n\nShall the canal serve primarily as a strategic asset for the duchy's naval ambitions, or as a commercial highway enriching its merchant class?"
 nd_shl.4.a: "A strategic waterway for our fleet"
 nd_shl.4.b: "A highway of commerce for our merchants"
 nd_shl.5.t: "Christiana Albertina"
 nd_shl.5.d: "On 5 October 1665, Duke Christian Albert of Holstein-Gottorp founded a university at Kiel, naming it the Christiana Albertina after himself and his father. The duke endowed the institution with lands and privileges, drawing scholars from across the Protestant north.\n\nThe university quickly becomes a center of jurisprudence, theology, and natural philosophy. Its professors train the administrators who will govern the duchies, and its students carry the learning of Kiel to courts and counting houses across northern Europe. In a land torn between Danish and German claims, the university provides a distinctly Holsatian center of intellectual identity."
 nd_shl.5.a: "May Kiel become a beacon of northern learning"
 nd_shl_deichbau: "Deichbau"
 nd_shl_deichbau_desc: "Since the 11th century, the people of the North Sea marshes have built dikes to reclaim land from the sea, creating the rich farmland that sustains Holstein's population."
 nd_shl_borderland_governance: "Borderland Governance"
 nd_shl_borderland_governance_desc: "Holstein's unique position as both a Danish dependency and an Imperial county has bred a tradition of diplomatic flexibility and tolerance of difference."
 nd_shl_holsatian_ritterschaft: "Holsatian Ritterschaft"
 nd_shl_holsatian_ritterschaft_desc: "The Holsatian knightly class, serving both Danish and Imperial lords, forms the backbone of the duchy's military and administrative capacity."
 nd_shl_north_sea_salt: "North Sea Salt"
 nd_shl_north_sea_salt_desc: "The coastal marshes yield salt from evaporated seawater, a vital commodity that preserves fish and meat for trade across northern Europe."
 nd_shl_ochsenweg: "The Ochsenweg"
 nd_shl_ochsenweg_desc: "The great ox road stretches from the pastures of Jutland south to Hamburg and beyond. Vast herds of cattle are driven along this ancient route, enriching every settlement along the way."
 nd_shl_treaty_of_ribe: "Treaty of Ribe"
 nd_shl_treaty_of_ribe_desc: "The 1460 Treaty of Ribe declared Schleswig and Holstein 'forever undivided,' establishing the constitutional foundation that binds the duchies together."
 nd_shl_kiel_harbor: "Kiel Harbor"
 nd_shl_kiel_harbor_desc: "Kiel's natural harbor on the Baltic gives the duchy a maritime presence, with shipbuilding and trade connecting Holstein to the wider Hanseatic world."
 nd_shl_gottorp_court: "Gottorp Court"
 nd_shl_gottorp_court_desc: "The ducal court at Gottorp Castle, near the old city of Schleswig, is a center of culture and administration, where the duke presides over both Danish and German affairs."
 nd_shl_hemmingstedt: "Hemmingstedt"
 nd_shl_hemmingstedt_desc: "The disastrous battle of 1500, where Dithmarscher peasants destroyed a ducal army on flooded marshland, taught Schleswig-Holstein the lethal power of defensive terrain and water management."
 nd_shl_salt_road_trade: "Salt Road Trade"
 nd_shl_salt_road_trade_desc: "Holstein controls sections of the salt road connecting the Luneburg salt mines to the Baltic ports, profiting from the flow of this essential commodity."
 nd_shl_dual_sea_shipyards: "Dual Sea Shipyards"
 nd_shl_dual_sea_shipyards_desc: "Kiel's shipwrights build vessels suited to both the shallow Baltic and the stormy North Sea, a versatility born of the duchy's unique position between two oceans."
 nd_shl_ducal_partition: "Ducal Partition"
 nd_shl_ducal_partition_desc: "The 1544 partition of Schleswig-Holstein into royal and ducal shares created a complex system of shared governance that, paradoxically, strengthened administrative capacity."
 nd_shl_early_reformation: "Early Reformation"
 nd_shl_early_reformation_desc: "Schleswig-Holstein embraced the Lutheran Reformation in 1528, among the earliest territories in Europe to do so, transforming its churches and schools."
 nd_shl_gottorp_library: "Gottorp Library"
 nd_shl_gottorp_library_desc: "The Gottorp dukes assembled a remarkable library and cabinet of curiosities, including the famous Gottorp Globe -- a monument to Baroque scientific ambition."
 nd_shl_diplomatic_balancing: "Diplomatic Balancing"
 nd_shl_diplomatic_balancing_desc: "The Holstein-Gottorp dukes mastered the art of playing Denmark against Sweden and both against the Empire, surviving through diplomatic agility rather than military might."
 nd_shl_wartime_endurance: "Wartime Endurance"
 nd_shl_wartime_endurance_desc: "The Thirty Years' War ravaged the duchies, but the population endured. The survivors rebuilt their farms and towns with a resilience forged in decades of conflict."
 nd_shl_eider_canal: "Eider Canal"
 nd_shl_eider_canal_desc: "The canal connecting the Baltic at Kiel to the North Sea via the Eider River transforms Schleswig-Holstein into the maritime crossroads of northern Europe."
 nd_shl_university_of_kiel: "University of Kiel"
 nd_shl_university_of_kiel_desc: "Founded in 1665, the Christiana Albertina at Kiel is the duchy's premier center of learning, training scholars, jurists, and administrators for service across the north."
 nd_shl_holstein_cattle: "Holstein Cattle"
 nd_shl_holstein_cattle_desc: "The black-and-white Holstein-Friesian breed, developed on the rich marshland pastures, becomes renowned across Europe for its prodigious milk production."
 nd_shl_gutswirtschaft: "Gutswirtschaft"
 nd_shl_gutswirtschaft_desc: "The reorganization of ducal estates into rationalized agricultural operations increases yields and tax revenues, driving rural modernization."
 nd_shl_national_movement: "National Movement"
 nd_shl_national_movement_desc: "The Schleswig-Holstein movement revives the Treaty of Ribe's promise, demanding that the duchies remain united and free from Danish absorption."
 nd_shl_kiel_revolution: "Kiel Revolution"
 nd_shl_kiel_revolution_desc: "Revolutionary fervor sweeps through Kiel's workers and sailors, demanding constitutional rights and political representation."
 nd_shl_industrial_shipyards: "Industrial Shipyards"
 nd_shl_industrial_shipyards_desc: "Kiel's shipyards industrialize, adopting iron and steam construction to produce warships that will anchor a modern navy."
 nd_shl_border_resolution: "Border Resolution"
 nd_shl_border_resolution_desc: "The Schleswig-Holstein wars settle the centuries-old border question through force of arms, establishing a clear frontier between Danish and German sovereignty."
 a_nd_shl_marschbauer: "Holsatian Marschbauer"
 a_nd_shl_marschbauer_desc: "Peasant militia from the North Sea marshes, hardened by lifetimes of fighting the sea itself. They know every dike, every sluice gate, every patch of treacherous ground."
 levy_nd_shl_marschbauer: "Holsatian Marschbauer"
 levy_nd_shl_marschbauer_desc: "A levy of marsh-dwelling peasant infantry, expert in fighting on waterlogged terrain."
 a_nd_shl_ochsentreiber: "Holstein Ochsentreiber"
 a_nd_shl_ochsentreiber_desc: "Mounted cattle drovers who guide vast herds along the Ochsenweg. Excellent scouts and skirmishers, they know every ford and pasture from Jutland to Hamburg."
 levy_nd_shl_ochsentreiber: "Holstein Ochsentreiber"
 levy_nd_shl_ochsentreiber_desc: "A levy of mounted drovers from the ox road, swift scouts at home on the open plains."
 n_nd_shl_pinass: "Kiel Pinass"
 n_nd_shl_pinass_desc: "A fast patrol vessel from the Kiel shipyards, built shallow-drafted for the Baltic but sturdy enough for the North Sea. Ideal for anti-piracy patrols and coastal trade escort."
 nd_shl_deichamt: "Deichamt"
 nd_shl_deichamt_desc: "A dike authority office coordinating the construction and maintenance of sea defenses, the drainage of marshland, and the management of reclaimed farmland."
 nd_shl_saline: "Saline"
 nd_shl_saline_desc: "A coastal salt works where North Sea brine is evaporated in shallow pans, producing the salt that preserves fish and meat for trade across northern Europe."
 nd_shl_hafenkontor: "Hafenkontor"
 nd_shl_hafenkontor_desc: "A merchant counting house at Kiel harbor, managing the flow of goods between the North Sea and Baltic trading networks."
 nd_shl_ochsenweg_station: "Ochsenweg Station"
 nd_shl_ochsenweg_station_desc: "A trading station along the great ox road where cattle are rested, weighed, taxed, and traded. Leather workers process hides alongside the pens."
 nd_shl_warft: "Warft"
 nd_shl_warft_desc: "An artificial dwelling mound raised above the flood line, protecting settlements from North Sea storm surges. The Halligen islanders have built these since the Middle Ages."
 nd_shl_kieler_werft: "Kieler Werft"
 nd_shl_kieler_werft_desc: "A shipyard on the Kiel Fjord, building vessels suited to both the shallow Baltic and the open North Sea -- a versatility unique to this dual-coast duchy."
 nd_shl_lutherkirche: "Lutherkirche"
 nd_shl_lutherkirche_desc: "A reformed parish church established after the 1528 Reformation, serving as a center of Lutheran preaching, education, and community governance."
 nd_shl_gutshof: "Gutshof"
 nd_shl_gutshof_desc: "A rationalized ducal estate applying Enlightenment principles to agriculture, with improved crop rotation, drainage, and estate management."
 nd_shl_christiana_albertina: "Christiana Albertina"
 nd_shl_christiana_albertina_desc: "The university founded by Duke Christian Albert in 1665, a center of Protestant scholarship, jurisprudence, and natural philosophy in the heart of Holstein."
 nd_shl_turnhalle: "Turnhalle"
 nd_shl_turnhalle_desc: "A gymnastic hall that doubles as a meeting place for the national movement, where political rallies and civic education stoke the fire of Schleswig-Holstein unity."
 nd_shl_deichamt_maintenance: "Deichamt Upkeep"
 nd_shl_deichamt_maintenance_desc: "Maintaining the dike network requires timber for pilings, stone for revetments, and iron for sluice mechanisms."
 nd_shl_saline_maintenance: "Salt Works Production"
 nd_shl_saline_maintenance_desc: "Evaporating North Sea brine over coal fires, consuming lumber for fuel and iron tools to tend the salt pans, yielding salt for trade across northern Europe."
 nd_shl_hafenkontor_maintenance: "Hafenkontor Upkeep"
 nd_shl_hafenkontor_maintenance_desc: "Running the counting house requires lumber for the building, paper for ledgers, and beeswax for seals and candles."
 nd_shl_station_maintenance: "Station Upkeep"
 nd_shl_station_maintenance_desc: "Operating the ox road station requires timber for pens, livestock for feed, and grain for the drovers who rest here."
 nd_shl_warft_maintenance: "Warft Upkeep"
 nd_shl_warft_maintenance_desc: "Maintaining the dwelling mound requires stone for revetments, timber for structures, and sand for the earthwork core."
 nd_shl_werft_maintenance: "Werft Upkeep"
 nd_shl_werft_maintenance_desc: "Maintaining the shipyard requires lumber for hulls, iron for fittings, and tar for waterproofing."
 nd_shl_lutherkirche_maintenance: "Lutherkirche Upkeep"
 nd_shl_lutherkirche_maintenance_desc: "Maintaining the parish church requires lumber for the structure, stone for walls, and beeswax for candles and sealing."
 nd_shl_gutshof_maintenance: "Gutshof Upkeep"
 nd_shl_gutshof_maintenance_desc: "Operating the rationalized estate requires lumber for buildings, iron for tools, and livestock for the breeding program."
 nd_shl_university_maintenance: "University Upkeep"
 nd_shl_university_maintenance_desc: "Maintaining the university requires paper for scholarship, books for the library, and beeswax for candles and sealing."
 nd_shl_turnhalle_maintenance: "Turnhalle Upkeep"
 nd_shl_turnhalle_maintenance_desc: "Operating the meeting hall requires lumber for the structure, paper for pamphlets, and iron for gymnastic equipment."
 nd_shl_formed_tt: "Schleswig-Holstein has been formed"
 nd_shl_path_a_tt: "Chose the #bold Up Ewig Ungedeelt#! destiny"
 nd_shl_path_b_tt: "Chose the #bold Eider Frontier#! destiny"
 nd_shl_destiny: "Destiny of the Duchies"
 nd_shl_destiny_desc: "Schleswig-Holstein has been forged into a single state. Now the duchy must decide its future course -- whether to pursue sovereign power or commercial preeminence."
 nd_shl_dest_slesvig: "The Schleswig Question"
 nd_shl_dest_slesvig_desc: "Seize the old duchy of Schleswig from Danish control. Take Flensburg and the city of Schleswig to unite the historic duchies under one sovereign will. Requires an army of at least 30,000 men."
 nd_shl_dest_elbe: "Masters of the Elbe"
 nd_shl_dest_elbe_desc: "Extend the duchy's reach to the great port of Hamburg and secure South Jutland. The Elbe estuary is the gateway to northern Germany and must answer to Holstein. Requires an army of 50,000 and international standing."
 nd_shl_dest_sovereign: "The Sovereign Duchy"
 nd_shl_dest_sovereign_desc: "Take Copenhagen itself and the ancient treaty-city of Ribe, ending Danish pretensions over the duchies forever. Requires a powerful army of 75,000, a full treasury, and a prestigious reputation."
 nd_shl_dest_saltbridge: "The Salt Bridge"
 nd_shl_dest_saltbridge_desc: "Build a commercial bridge between the two seas. Embrace modern banking institutions and ensure salt flows through the duchy's markets. Requires 1,000 gold in the treasury."
 nd_shl_dest_twoseas: "Between Two Seas"
 nd_shl_dest_twoseas_desc: "Seize Bremen to control the Weser trade and develop cloth manufacturing in the capital market. The duchy must become the textile crossroads of the north. Requires 2,000 gold and international prestige."
 nd_shl_dest_nexus: "The Northern Nexus"
 nd_shl_dest_nexus_desc: "Own Bruges and Bergen, the anchors of the North Sea and Atlantic trade, and embrace global trade institutions. Schleswig-Holstein shall become the warehouse of Europe. Requires 3,000 gold and high prestige."
 nd_shl.6.t: "Destiny of the Duchies"
 nd_shl.6.d: "The union of Schleswig and Holstein is complete, but the true work has only begun. These marshlands and harbors, these cattle roads and salt pans -- they are the foundation of something greater. The question is what we shall build upon them.\n\nShall we forge a sovereign state that answers to no Danish king, no Imperial diet? Or shall we embrace our nature as the bridge between worlds, growing rich on the commerce that must pass through our narrow isthmus?"
 nd_shl.6.a: "Our destiny awaits"
 nd_shl.7.t: "The Schleswig Question"
 nd_shl.7.d: "Flensburg and the old city of Schleswig are ours. For centuries, these lands were held by the Danish crown, their German-speaking population subject to a foreign sovereign. No more. The duchy of Schleswig is reunited with Holstein under a single ruler.\n\nThe Danish king will not accept this quietly. But the lesson of the Treaty of Ribe still holds: these lands are forever undivided, and now they are forever ours."
 nd_shl.7.a: "Schleswig and Holstein are one"
 nd_shl.8.t: "Masters of the Elbe"
 nd_shl.8.d: "Hamburg, the great free city of the Elbe, and the towns of South Jutland now fall within our sphere. The duchy commands the lower Elbe -- the artery through which half of northern Germany's trade must flow.\n\nThis expansion demands a choice. Shall we impose iron discipline on our new territories, crushing resistance and forging a unified military state? Or shall we grant charters and privileges, incorporating Hamburg's merchant tradition and Jutland's communities as willing partners?"
 nd_shl.8.a: "Iron discipline shall bind these lands"
 nd_shl.8.b: "Grant charters and earn their loyalty"
 nd_shl.9.t: "The Sovereign Duchy"
 nd_shl.9.d: "Copenhagen has fallen. The ancient seat of Danish power, the city that claimed suzerainty over our duchies for centuries, is now subject to our will. With Ribe -- the very city where the treaty of eternal unity was sworn -- also in our hands, the circle is complete.\n\nSchleswig-Holstein is no longer a borderland caught between greater powers. It is a sovereign state in its own right, master of both shores of the Eider, both banks of the Elbe, and now the Sound itself.\n\nShall we use this power for further conquest, imposing our will across the north? Or shall we build a federation of northern states, leading through diplomacy rather than force?"
 nd_shl.9.a: "We shall impose our sovereign will"
 nd_shl.9.b: "We shall lead a federation of equals"
 nd_shl.10.t: "The Salt Bridge"
 nd_shl.10.d: "The duchy's merchants have embraced the new banking institutions, and salt -- the white gold of the north -- flows through our markets in abundance. The foundations of a great commercial state are laid.\n\nEvery barrel of herring preserved with our salt, every hide cured with our brine, every road and canal that carries these goods -- all enrich the duchy's counting houses. Schleswig-Holstein is becoming what its geography always intended: a bridge of commerce between two worlds."
 nd_shl.10.a: "The bridge is built on salt and silver"
 nd_shl.11.t: "Between Two Seas"
 nd_shl.11.d: "Bremen is ours, and cloth from our looms reaches markets on both seas. The duchy now controls the transit routes between the North Sea and the Baltic, with manufacturing capacity to add value to the raw goods that pass through.\n\nShall we exploit this position through strict monopoly, controlling prices and excluding competitors? Or shall we declare open ports, attracting traders from every nation with the promise of low tariffs and safe harbors?"
 nd_shl.11.a: "Monopoly shall enrich the duchy"
 nd_shl.11.b: "Open ports shall draw all comers"
 nd_shl.12.t: "The Northern Nexus"
 nd_shl.12.d: "From Bergen's cod wharves to the cloth halls of Bruges, from the salt pans of Holstein to the spice warehouses of the Sound -- all roads of northern commerce now pass through Schleswig-Holstein. The duchy has become what the old Hanse once dreamed of: the nexus of northern trade, the warehouse of Europe.\n\nShall we cement this position as a great entrepot, a neutral ground where all nations trade? Or shall we revive the spirit of the Hanseatic League, building a formal coalition of trading cities under our leadership?"
 nd_shl.12.a: "We are the entrepot of the north"
 nd_shl.12.b: "We shall lead a new Hanseatic League"
 STATIC_MODIFIER_NAME_nd_shl_dest_elbe_iron: "Iron Discipline"
 STATIC_MODIFIER_DESC_nd_shl_dest_elbe_iron: "The new territories are held by military force. Garrisons enforce order and separatist sentiment is crushed, but the duchy's prestige suffers from its heavy-handed methods."
 STATIC_MODIFIER_NAME_nd_shl_dest_elbe_charter: "Elbe Charters"
 STATIC_MODIFIER_DESC_nd_shl_dest_elbe_charter: "New subjects receive charters guaranteeing their traditional rights. They serve the duchy willingly, though maintaining such a diverse realm requires a larger military budget."
 STATIC_MODIFIER_NAME_nd_shl_dest_sovereign_conquest: "Sovereign's Will"
 STATIC_MODIFIER_DESC_nd_shl_dest_sovereign_conquest: "The duchy's intelligence network extends across the north, and war comes cheaply to a sovereign who has proven his strength by taking Copenhagen."
 STATIC_MODIFIER_NAME_nd_shl_dest_sovereign_federation: "Northern Federation"
 STATIC_MODIFIER_DESC_nd_shl_dest_sovereign_federation: "The duchy leads a coalition of northern states through diplomatic weight and constitutional authority, integrating new members into a growing federation."
 STATIC_MODIFIER_NAME_nd_shl_dest_twoseas_monopoly: "Transit Monopoly"
 STATIC_MODIFIER_DESC_nd_shl_dest_twoseas_monopoly: "Strict control of the two-seas transit route enriches the duchy's naval forces and banking houses, though protectionism draws suspicion from trading partners."
 STATIC_MODIFIER_NAME_nd_shl_dest_twoseas_openport: "Open Ports"
 STATIC_MODIFIER_DESC_nd_shl_dest_twoseas_openport: "Free ports attract merchants from every nation, reducing naval costs through shared patrolling and keeping the seas safe for all."
 STATIC_MODIFIER_NAME_nd_shl_dest_nexus_entrepot: "Northern Entrepot"
 STATIC_MODIFIER_DESC_nd_shl_dest_nexus_entrepot: "The duchy serves as a neutral warehouse for all of northern Europe, building naval prestige and stabilizing the economy while the army's needs take second priority."
 STATIC_MODIFIER_NAME_nd_shl_dest_nexus_league: "New Hanseatic League"
 STATIC_MODIFIER_DESC_nd_shl_dest_nexus_league: "A revived Hanseatic League under Schleswig-Holstein's leadership projects commercial power across the seas, with member cities contributing to shared naval defense."
 nd_shl_kieler_schloss: "Kieler Schloss"
 nd_shl_kieler_schloss_desc: "The sovereign palace at Kiel, seat of the independent duchy's court and government. A fortress-residence commanding the Baltic shore, symbolizing Holstein's triumph over Danish suzerainty."
 nd_shl_zweiuferkontor: "Zweiuferkontor"
 nd_shl_zweiuferkontor_desc: "The Two-Shore Counting House, a grand mercantile exchange managing the transit trade between the North Sea and the Baltic. Agents of every northern trading nation maintain offices here."
 nd_shl_schloss_maintenance: "Schloss Upkeep"
 nd_shl_schloss_maintenance_desc: "Maintaining the sovereign palace requires stone for walls, iron for gates, cloth for the court, and paper for the chancellery."
 nd_shl_kontor_maintenance: "Kontor Upkeep"
 nd_shl_kontor_maintenance_desc: "Running the counting house requires paper for ledgers, cloth for bales, glass for windows, and tools for the warehouse."
