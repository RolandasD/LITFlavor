l_english:
 STATIC_MODIFIER_NAME_nd_lords_of_the_calendar: "Lords of the Calendar"
 STATIC_MODIFIER_DESC_nd_lords_of_the_calendar: "The Maya are the keepers of time itself. Through generations of astronomical observation and mathematical precision, our daykeepers have mapped the movements of Venus, predicted eclipses, and woven the sacred calendar into every aspect of governance and daily life. This mastery of celestial knowledge guides our people forward."
 STATIC_MODIFIER_NAME_nd_confederation_of_the_halach_uinic: "Confederation of the Halach Uinic"
 STATIC_MODIFIER_DESC_nd_confederation_of_the_halach_uinic: "The true lords of the Maya lands have spoken with one voice. Under the authority of the Halach Uinic — the True Man — the scattered city-states have been bound together into a confederation of shared purpose. Our Holcan warriors stand ready, our Nacom war leaders have been chosen, and the white roads carry the march of unified armies."
 nd_may.1.t: "The Reunification of the Maya"
 nd_may.1.d: "For generations, the Maya world has been a mosaic of rival city-states — the legacy of Mayapan's collapse, the wars between the K'iche' and Kaqchikel, the ambitions of a dozen petty lords. Now, through conquest and diplomacy, the scattered Maya polities have been drawn together under a single authority. The sacbe roads connect our cities, the observatories track the stars, and the codex-keepers record our laws. But what vision shall guide this reunited Maya realm? Shall we be remembered as the inheritors of our ancestors' celestial wisdom — a civilization whose calendar, writing, and astronomical knowledge made them the scholars of the Americas? Or shall we forge a military confederation in the tradition of the great Halach Uinic, binding our warriors into an army that can defend the Maya heartland against any who would challenge us?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_may.1.a: "We are the keepers of time and knowledge."
 nd_may.1.b: "The True Men shall rule as one."
 nd_may.2.t: "The Legacy of the Popol Vuh"
 nd_may.2.d: "The Popol Vuh — the Book of the Community — has been preserved and taught to a new generation. This sacred narrative of the K'iche' Maya tells of the creation of the world, the exploits of the Hero Twins Hunahpu and Xbalanque in the underworld of Xibalba, and the origin of the K'iche' people from white and yellow corn. More than a story, it is the foundation of Maya cosmology, morality, and identity. The daykeepers who guard this wisdom now ask how it should shape our nation. Shall the Popol Vuh serve as a wellspring of learning — its astronomical observations, agricultural wisdom, and philosophical insights driving our scholars forward? Or shall it serve as a unifying creed — its creation myth and heroic tales binding our diverse peoples into one identity?"
 nd_may.2.a: "Let its wisdom illuminate our scholars."
 nd_may.2.b: "Let its stories bind our people as one."
 nd_may.3.t: "The Refounding of the League"
 nd_may.3.d: "The League of Mayapan once united the great families of Yucatan under a shared council — the Cocom, the Xiu, the Chel, and others sitting together to adjudicate disputes, coordinate trade, and plan defense against outsiders. When Mayapan fell to internal treachery around 1448, the League shattered into sixteen rival provinces, and a century of fratricidal warfare followed. Now that the Maya cities are reunited, the question arises: shall we restore the League's centralized authority, with a single ruling house directing the affairs of all provinces? Or shall we embrace a looser federation, where each province retains its autonomy under a shared council of equals?"
 nd_may.3.a: "One house shall lead all others."
 nd_may.3.b: "The council of equals shall endure."
 nd_may.4.t: "The Cacao Lords"
 nd_may.4.d: "Cacao is more than a crop to the Maya — it is currency, ritual offering, diplomatic gift, and the drink of kings. The great cacao plantations of Tabasco and the Soconusco coast have made their lords fabulously wealthy, and cacao beans circulate as money throughout Mesoamerica. The maritime traders of the Yucatan coast carry cacao in their great canoes from Xicalango to Honduras and beyond. Now our reunified realm must decide how to harness this cacao wealth. Shall we prioritize the export trade, sending our cacao to foreign markets and drawing their goods to our shores? Or shall we formalize cacao beans as the official currency of the realm, stabilizing our economy through this universally valued commodity?"
 nd_may.4.a: "Let our canoes carry cacao to the world."
 nd_may.4.b: "Cacao shall be the currency of the realm."
 nd_may.5.t: "The Call of the Holcan"
 nd_may.5.d: "The Holcan — the professional warrior caste of the Maya — trace their traditions back centuries. Unlike the conscripted farmers who fight in most armies, the Holcan are full-time soldiers: trained from youth in the arts of war, organized under the command of elected Nacom war leaders, and honored with status that places them among the elite of Maya society. Their cotton-quilted armor, the ichcahuipilli, has proven effective against both obsidian blades and European musket balls at close range. Their jungle warfare tactics — ambushes in dense forest, coordinated night raids, the devastating use of the atlatl spear-thrower — have frustrated invaders for generations. With the formation of the Maya state, the Holcan tradition has been formally enshrined as the backbone of our military."
 nd_may.5.a: "The Holcan shall defend our people."
 STATIC_MODIFIER_NAME_nd_may_popol_vuh_wisdom: "Wisdom of the Hero Twins"
 STATIC_MODIFIER_DESC_nd_may_popol_vuh_wisdom: "The astronomical and philosophical insights of the Popol Vuh guide our scholars toward deeper understanding."
 STATIC_MODIFIER_NAME_nd_may_popol_vuh_unity: "Children of the Corn"
 STATIC_MODIFIER_DESC_nd_may_popol_vuh_unity: "The creation story of the K'iche' — that humanity was fashioned from white and yellow corn — binds our diverse peoples in shared identity."
 STATIC_MODIFIER_NAME_nd_may_league_centralize: "Restored Authority"
 STATIC_MODIFIER_DESC_nd_may_league_centralize: "The centralized authority of a single ruling house brings order and stability to the Maya provinces."
 STATIC_MODIFIER_NAME_nd_may_league_federate: "Council of Equals"
 STATIC_MODIFIER_DESC_nd_may_league_federate: "A federation of autonomous provinces, united by shared council, preserves the diversity and loyalty of the Maya peoples."
 STATIC_MODIFIER_NAME_nd_may_cacao_export: "Cacao Trade Routes"
 STATIC_MODIFIER_DESC_nd_may_cacao_export: "Our maritime and overland traders carry cacao to markets across Mesoamerica and beyond."
 STATIC_MODIFIER_NAME_nd_may_cacao_currency: "The Bean Standard"
 STATIC_MODIFIER_DESC_nd_may_cacao_currency: "Cacao beans serve as the universal medium of exchange, stabilizing commerce across our realm."
 nd_may_holcan_tradition: "Holcan Warriors"
 nd_may_holcan_tradition_desc: "The Holcan are the professional warrior caste of the Maya — full-time soldiers trained from youth, armed with obsidian weapons and protected by cotton armor."
 nd_may_sacbe_trade_roads: "Sacbe Trade Roads"
 nd_may_sacbe_trade_roads_desc: "The sacbe — raised limestone causeways — connect Maya cities across the jungle, enabling trade caravans to travel even during the rainy season."
 nd_may_milpa_agriculture: "Milpa Agriculture"
 nd_may_milpa_agriculture_desc: "The milpa system of intercropping maize, beans, and squash sustains dense Maya populations in the tropical lowlands."
 nd_may_hieroglyphic_writing: "Hieroglyphic Writing"
 nd_may_hieroglyphic_writing_desc: "Maya hieroglyphic script — the only fully developed writing system of pre-Columbian Americas — records history, astronomy, and law on stone monuments and bark-paper codices."
 nd_may_astronomical_tradition: "Astronomical Tradition"
 nd_may_astronomical_tradition_desc: "Maya astronomers track the cycles of Venus, predict eclipses, and calibrate the sacred calendar with remarkable precision from dedicated stone observatories."
 nd_may_halach_uinic_governance: "Halach Uinic Governance"
 nd_may_halach_uinic_governance_desc: "The Halach Uinic — True Man — governs the Maya polity with the counsel of the Ah Cuch Cab nobility, balancing the authority of the city-state lords."
 nd_may_ichcahuipilli_craft: "Ichcahuipilli Craft"
 nd_may_ichcahuipilli_craft_desc: "Maya armorers produce the ichcahuipilli — quilted cotton body armor soaked in brine — which provides effective protection against obsidian weapons and even early firearms."
 nd_may_obsidian_mastery: "Obsidian Mastery"
 nd_may_obsidian_mastery_desc: "Maya weaponsmiths achieve mastery in knapping obsidian into razor-sharp blades for the macuahuitl — a devastating sword embedded with volcanic glass teeth."
 nd_may_mayapan_league: "Mayapan League"
 nd_may_mayapan_league_desc: "The League of Mayapan unified the great families of Yucatan under a shared council, providing collective governance over trade, defense, and law."
 nd_may_maritime_canoes: "Maritime War Canoes"
 nd_may_maritime_canoes_desc: "The great dugout canoes of the Maya — capable of carrying forty men and vast quantities of trade goods — dominate the coastal waters from Xicalango to Honduras."
 nd_may_popol_vuh: "Popol Vuh"
 nd_may_popol_vuh_desc: "The sacred Book of the Community preserves the K'iche' creation narrative, the exploits of the Hero Twins, and the genealogy of Maya lords."
 nd_may_cacao_economy: "Cacao Economy"
 nd_may_cacao_economy_desc: "Cacao beans serve simultaneously as currency, ritual offering, and luxury commodity — the foundation of Maya commercial life."
 nd_may_pyramid_architecture: "Pyramid Architecture"
 nd_may_pyramid_architecture_desc: "The great stepped pyramids of the Maya serve as temples, astronomical observatories, and symbols of divine authority aligned with celestial events."
 nd_may_nacom_command: "Nacom Command"
 nd_may_nacom_command_desc: "The Nacom — elected war leaders serving three-year terms — direct Maya military campaigns and preside over the annual martial rites in the month of Pax."
 nd_may_kiche_expansion: "K'iche' Expansion"
 nd_may_kiche_expansion_desc: "The aggressive K'iche' state conquered much of the Guatemalan highlands through rapid military campaigns, creating a model of Maya imperial warfare."
 nd_may_atlatl_warfare: "Atlatl Warfare"
 nd_may_atlatl_warfare_desc: "The atlatl spear-thrower allows Maya skirmishers to hurl darts with devastating force and accuracy from concealment in the dense jungle."
 nd_may_codex_tradition: "Codex Tradition"
 nd_may_codex_tradition_desc: "Maya scribes record astronomical tables, religious rituals, and historical chronicles on bark-paper codices folded like accordion screens."
 nd_may_highland_diplomacy: "Highland Diplomacy"
 nd_may_highland_diplomacy_desc: "The complex web of alliances, marriages, and rivalries between Maya highland kingdoms — K'iche', Kaqchikel, Tz'utujil, Mam — has refined the art of Maya statecraft."
 nd_may_coastal_trade_ports: "Coastal Trade Ports"
 nd_may_coastal_trade_ports_desc: "Ports like Tulum, Xicalango, and Naco serve as entrepots where maritime and overland trade routes converge, channeling obsidian, jade, salt, and cacao."
 nd_may_fortified_acropolis: "Fortified Acropolis"
 nd_may_fortified_acropolis_desc: "Maya cities build fortified acropolises — elevated citadels with defensive walls and towers — to protect their ruling families and temple complexes."
 nd_may_holcan_veterans_tradition: "Holcan Veteran Tradition"
 nd_may_holcan_veterans_tradition_desc: "The most experienced Holcan warriors form an elite cadre, their battlefield knowledge passed down through rigorous training in jungle combat and siege defense."
 nd_may_jungle_resistance: "Jungle Resistance"
 nd_may_jungle_resistance_desc: "The dense jungles of the Maya heartland become a weapon against invaders — disease, heat, and ambush consume armies that dare enter without invitation."
 nd_may_batab_administration: "Batab Administration"
 nd_may_batab_administration_desc: "The Batab — local governors appointed by the Halach Uinic — administer justice, collect tribute, and maintain order in each Maya province."
 nd_may_salt_trade_expansion: "Salt Trade Expansion"
 nd_may_salt_trade_expansion_desc: "The salt beds of the northern Yucatan coast produce a commodity essential to every Mesoamerican kitchen, making salt traders among the wealthiest in the Maya world."
 nd_may_defensive_confederacy: "Defensive Confederacy"
 nd_may_defensive_confederacy_desc: "Faced with external threats, the Maya city-states formalize mutual defense pacts, pooling their levies under shared command when any member is attacked."
 nd_may_calendar_keepers: "Calendar Keepers"
 nd_may_calendar_keepers_desc: "The daykeepers maintain the sacred 260-day Tzolk'in and 365-day Haab calendars, synchronizing them into the 52-year Calendar Round that governs ritual and political life."
 nd_may_itza_independence: "Itza Independence"
 nd_may_itza_independence_desc: "The Itza Maya at Tayasal on Lake Peten Itza maintained their independence until 1697, the last unconquered Maya state — a testament to the resilience of Maya civilization."
 nd_may_lacustrine_warfare: "Lacustrine Warfare"
 nd_may_lacustrine_warfare_desc: "The Maya of the Peten lakes master warfare on water, using canoe fleets to control the lakeshores and deny invaders the use of waterways."
 nd_may_tribute_system: "Tribute System"
 nd_may_tribute_system_desc: "Subject communities deliver cacao, cotton, jade, feathers, and labor to the ruling city, sustaining the Maya elite and funding public works."
 nd_may_forest_fortifications: "Forest Fortifications"
 nd_may_forest_fortifications_desc: "Palisades, ditches, and concealed defensive works blend into the forest landscape, creating layered fortifications that exploit the jungle terrain."
 nd_may_ch_orti_military: "Ch'orti' Military"
 nd_may_ch_orti_military_desc: "The Ch'orti' Maya of the southeastern highlands maintain a fierce military tradition, their warriors renowned for disciplined infantry tactics and mountain warfare."
 nd_may_syncretic_adaptation: "Syncretic Adaptation"
 nd_may_syncretic_adaptation_desc: "Pragmatic Maya leaders integrate foreign ideas and practices into their own traditions, preserving core identity while adapting to a changing world."
 nd_may_cultural_endurance: "Cultural Endurance"
 nd_may_cultural_endurance_desc: "Despite centuries of external pressure, Maya language, calendar, weaving traditions, and community governance endure as living practice rather than mere memory."
 nd_may_modern_confederation: "Modern Confederation"
 nd_may_modern_confederation_desc: "The Maya polity embraces modern governance structures while retaining the council-based decision-making that has served the Maya for millennia."
 nd_may_agricultural_renewal: "Agricultural Renewal"
 nd_may_agricultural_renewal_desc: "New agricultural techniques supplement the ancient milpa system, increasing yields while preserving the intercropping wisdom of Maya farmers."
 nd_may_maya_national_identity: "Maya National Identity"
 nd_may_maya_national_identity_desc: "A sense of shared Maya identity transcends the old city-state rivalries, uniting diverse linguistic communities under a common civilizational heritage."
 nd_may_reforged_army: "Reforged Army"
 nd_may_reforged_army_desc: "The Maya military adopts modern tactics and training methods while preserving the jungle warfare traditions that have defined Maya combat for centuries."
 nd_may_trade_revival: "Trade Revival"
 nd_may_trade_revival_desc: "The ancient trade networks of the Maya — once carrying obsidian, jade, and cacao along sacbe roads and coastal canoe routes — are restored and expanded."
 a_nd_may_holcan_warriors: "Holcan Warriors"
 a_nd_may_holcan_warriors_desc: "Professional Maya warriors armed with obsidian-tipped spears and protected by salt-hardened cotton armor. Masters of jungle ambush and close-quarters combat."
 a_nd_may_obsidian_macemen: "Obsidian Macemen"
 a_nd_may_obsidian_macemen_desc: "Shock infantry wielding the macuahuitl — a fearsome wooden sword studded with obsidian blades capable of decapitating a horse. They strike hard but wear light armor."
 a_nd_may_kiche_eagles: "K'iche' Eagles"
 a_nd_may_kiche_eagles_desc: "Elite warriors of the K'iche' military tradition, known for rapid flanking movements through difficult terrain and lightning raids on enemy positions."
 n_nd_may_war_canoe: "Maya War Canoe"
 n_nd_may_war_canoe_desc: "Great dugout canoes capable of carrying forty warriors and their supplies. Fast and maneuverable in coastal waters, they dominate the trade routes of the Caribbean coast."
 a_nd_may_holcan_veterans: "Holcan Veterans"
 a_nd_may_holcan_veterans_desc: "Seasoned Holcan warriors who have survived multiple campaigns. Their experience in jungle warfare, siege defense, and coordinated night raids makes them formidable."
 a_nd_may_atlatl_skirmishers: "Atlatl Skirmishers"
 a_nd_may_atlatl_skirmishers_desc: "Light skirmishers armed with the atlatl spear-thrower, capable of hurling darts with lethal accuracy from concealment in dense jungle undergrowth."
 levy_nd_may_holcan_warriors: "Holcan Warrior Levy"
 levy_nd_may_holcan_warriors_desc: "Professional Holcan warriors raised from the soldier and peasant classes, armed with obsidian weapons and cotton armor."
 levy_nd_may_atlatl_skirmishers: "Atlatl Skirmisher Levy"
 levy_nd_may_atlatl_skirmishers_desc: "Light skirmishers drawn from the peasantry, trained in the use of the atlatl spear-thrower for jungle harassment warfare."
 levy_nd_may_holcan_veterans: "Holcan Veteran Levy"
 levy_nd_may_holcan_veterans_desc: "Elite veteran warriors raised from the soldier caste, their decades of jungle combat experience making them formidable defenders."
 nd_may_sacbe_station: "Sacbe Road Station"
 nd_may_sacbe_station_desc: "A waystation along the raised limestone sacbe causeways that connect Maya cities, facilitating trade and communication even during the rainy season."
 nd_may_observatory: "Maya Observatory"
 nd_may_observatory_desc: "A stone tower with narrow windows aligned to the extreme positions of Venus on the horizon, used by Maya astronomers to calibrate the sacred calendar."
 nd_may_cacao_house: "Cacao Processing House"
 nd_may_cacao_house_desc: "A facility where cacao beans are fermented, dried, roasted, and ground into the bitter chocolate paste prized throughout Mesoamerica as drink, currency, and ritual offering."
 nd_may_temple_pyramid: "Temple-Pyramid"
 nd_may_temple_pyramid_desc: "A massive stepped pyramid crowned by a temple sanctuary, aligned with astronomical events and serving as the religious and political heart of the Maya city."
 nd_may_obsidian_workshop: "Obsidian Workshop"
 nd_may_obsidian_workshop_desc: "A workshop where skilled knappers shape imported volcanic obsidian into razor-edged blades, arrowheads, and the teeth of the macuahuitl war sword."
 nd_may_cenote_shrine: "Cenote Shrine"
 nd_may_cenote_shrine_desc: "A sacred shrine built beside a cenote — a natural sinkhole exposing the underground water table — where offerings are made to the rain god Chaak and ancestors."
 nd_may_ballcourt: "Maya Ballcourt"
 nd_may_ballcourt_desc: "A stone court for the sacred ballgame, where teams compete in a ritual contest symbolizing the Hero Twins' victory over the lords of Xibalba. Political alliances and disputes are settled through sacred sport."
 nd_may_coastal_post: "Coastal Trading Post"
 nd_may_coastal_post_desc: "A port facility where great canoes are loaded with cacao, salt, obsidian, and cotton for trade along the Caribbean and Pacific coasts of Mesoamerica."
 nd_may_defensive_wall: "Maya Defensive Wall"
 nd_may_defensive_wall_desc: "Stone walls and earthworks encircling the acropolis, reinforced with towers and gateways to protect the ruling elite and temple complex from siege."
 nd_may_salt_works: "Salt Works"
 nd_may_salt_works_desc: "Coastal evaporation ponds and processing facilities that extract salt from seawater — a commodity essential to food preservation throughout Mesoamerica."
 nd_may_milpa_terrace: "Milpa Terrace"
 nd_may_milpa_terrace_desc: "Terraced hillside plots using the ancient milpa intercropping system of maize, beans, and squash, supplemented by modern irrigation techniques."
 nd_may_forest_palisade: "Forest Palisade"
 nd_may_forest_palisade_desc: "A concealed defensive perimeter of sharpened stakes and ditches hidden within the jungle, designed to channel and slow invading armies into prepared kill zones."
 nd_may_scribes_archive: "Scribes' Archive"
 nd_may_scribes_archive_desc: "A library and school where Maya scribes are trained in hieroglyphic writing and where bark-paper codices recording astronomy, history, and ritual are preserved."
 nd_may_sacbe_maintenance: "Sacbe Maintenance"
 nd_may_sacbe_maintenance_desc: "Maintaining the raised limestone causeways requires constant resurfacing with sascab and stucco to prevent jungle encroachment."
 nd_may_observatory_upkeep: "Observatory Upkeep"
 nd_may_observatory_upkeep_desc: "The observatory requires stone maintenance, bark-paper for recording astronomical observations and calendar calculations, and glass for the precision sighting instruments."
 nd_may_cacao_processing: "Cacao Processing"
 nd_may_cacao_processing_desc: "Raw cacao pods are fermented, dried, and ground into tradeable paste, stored in pottery vessels and marked with dyes for grading."
 nd_may_temple_offerings: "Temple Offerings"
 nd_may_temple_offerings_desc: "The temple-pyramid demands regular offerings of incense, dyes, and ritual vessels to maintain the favor of the gods."
 nd_may_obsidian_knapping: "Obsidian Knapping"
 nd_may_obsidian_knapping_desc: "Skilled knappers pressure-flake volcanic obsidian into razor-edged blades and macuahuitl teeth, producing fearsome weapons."
 nd_may_cenote_offerings: "Cenote Offerings"
 nd_may_cenote_offerings_desc: "Ritual offerings of pottery vessels and incense are cast into the sacred cenote to propitiate the rain god Chaak and ensure bountiful harvests."
 nd_may_ballcourt_upkeep: "Ballcourt Upkeep"
 nd_may_ballcourt_upkeep_desc: "The stone ballcourt requires regular resurfacing and timber for the carved markers, rubber ball equipment, and ritual fixtures of the sacred game."
 nd_may_canoe_harbor: "Canoe Harbor"
 nd_may_canoe_harbor_desc: "Great dugout canoes require timber for construction and repair, tools for the adzes and chisels that shape the hulls, and tar to waterproof the hulls sustaining the fleet that connects coastal Maya communities."
 nd_may_wall_maintenance: "Wall Maintenance"
 nd_may_wall_maintenance_desc: "The defensive walls require constant repair with stone and timber, and the garrison must be equipped with weapons to resist enemy siege works."
 nd_may_salt_processing: "Salt Processing"
 nd_may_salt_processing_desc: "Seawater is channeled into evaporation ponds and boiled over wood fires to produce salt for trade across Mesoamerica."
 nd_may_milpa_upkeep: "Milpa Upkeep"
 nd_may_milpa_upkeep_desc: "Terraced milpa plots yield maize, beans, and squash through the ancient intercropping system, supplemented by irrigation."
 nd_may_palisade_upkeep: "Palisade Upkeep"
 nd_may_palisade_upkeep_desc: "The wooden palisade requires regular replacement of rotting stakes, tools for the defensive perimeter, and leather for the armor and equipment of its jungle garrison."
 nd_may_codex_production: "Codex Production"
 nd_may_codex_production_desc: "Producing bark-paper codices requires amate bark processed into paper and mineral dyes for the hieroglyphic illustrations."
 nd_may_formed_tt: "Maya has been formed"
 nd_may_path_a_tt: "Chose Lords of the Calendar"
 nd_may_path_b_tt: "Chose Confederation of the Halach Uinic"
 nd_may_destiny: "Destiny of the Maya"
 nd_may_destiny_desc: "The Maya have been reunited under a single banner. Now the question is what direction this reborn civilization will take -- will it pursue the path of celestial knowledge or military confederation?"
 nd_may_dest_calendar_wisdom: "Calendar Wisdom"
 nd_may_dest_calendar_wisdom_desc: "Seize the astronomical centers of Mesoamerica. By controlling Cholula's great temple and the pyramids of Teotihuacan, the Maya calendar-keepers will absorb the knowledge of all civilizations."
 nd_may_dest_venus_tables: "Venus Tables"
 nd_may_dest_venus_tables_desc: "Maya astronomers have refined the Venus Tables to unprecedented accuracy, predicting the movements of the morning star centuries in advance. This knowledge drives agricultural planning, trade cycles, and statecraft."
 nd_may_dest_new_baktun: "The New B'ak'tun"
 nd_may_dest_new_baktun_desc: "A new great cycle of the Long Count has dawned. The Maya stand at the threshold of a civilizational renaissance, absorbing the knowledge of every people they have encountered and forging it into something greater."
 nd_may_dest_holcan_march: "The Holcan March"
 nd_may_dest_holcan_march_desc: "Extend the reach of the Halach Uinic's armies into Honduras and El Salvador, bringing the southern trade routes under Maya military control."
 nd_may_dest_jade_throne: "The Jade Throne"
 nd_may_dest_jade_throne_desc: "March the Holcan into the Valley of Mexico and seize Tenochtitlan itself. The Maya will claim the greatest city in the Americas as their own."
 nd_may_dest_fourth_creation: "The Fourth Creation"
 nd_may_dest_fourth_creation_desc: "The Popol Vuh speaks of three failed creations before the gods fashioned humanity from corn. Now the Maya will forge a Fourth Creation -- an empire spanning from Cuba to the Tarascan highlands."
 nd_may.6.t: "The Destiny of the Reunited Maya"
 nd_may.6.d: "For the first time in centuries, the Maya world speaks with one voice. The fractured city-states, the warring provinces of Yucatan, the highland kingdoms of Guatemala -- all have been drawn together under a single authority. The sacbe roads carry traders and ambassadors between cities that once faced each other across barricades. The question now is not whether the Maya can endure, but what they will become."
 nd_may.6.a: "A new era dawns for the Maya."
 nd_may.7.t: "The Libraries of the Conquered"
 nd_may.7.d: "Our calendar-keepers have entered the great temples of the Valley of Mexico -- Cholula's towering pyramid, the ancient observatories of Teotihuacan. Where other conquerors would have burned these places, our scholars reverently catalogued their astronomical records, their mathematical systems, their histories. The Maya tradition of knowledge has always been syncretic, absorbing and refining the learning of others. Now the accumulated wisdom of all Mesoamerica flows into our scribal schools."
 nd_may.7.a: "Their knowledge enriches our own."
 nd_may.8.t: "The Refinement of the Venus Tables"
 nd_may.8.d: "Our astronomers have achieved something remarkable. By cross-referencing the ancient records of Teotihuacan with our own centuries of Venus observations, they have refined the Dresden Codex tables to predict the rising and setting of the morning star with a margin of error of less than two hours over five centuries. This is not merely an academic achievement -- the Venus cycle governs our agricultural calendar, our trade schedules, and the timing of war and peace. Shall we direct this knowledge toward scholarly advancement and infrastructure, or toward expanding our trade networks?"
 nd_may.8.a: "Let our scholars build upon this foundation."
 nd_may.8.b: "Let our merchants profit from this knowledge."
 nd_may.9.t: "Dawn of the New B'ak'tun"
 nd_may.9.d: "The daykeepers have announced it: the Long Count calendar has turned to a new B'ak'tun -- a great cycle of approximately 394 years. The last time this occurred, the Classic Maya civilization was at its zenith, building Tikal and Palenque. Now the Maya stand once again as a great power, their knowledge encompassing the wisdom of every Mesoamerican civilization. The priests debate the meaning of this new cycle. Some see it as a time of harmony, when the diverse peoples of our realm will become one. Others see it as a time of renewal, when we must rebuild and expand the physical foundations of our civilization."
 nd_may.9.a: "This is the age of harmony among peoples."
 nd_may.9.b: "This is the age of building and renewal."
 nd_may.10.t: "The March of the Holcan"
 nd_may.10.d: "The Holcan warriors have carried the banner of the Halach Uinic beyond the traditional Maya heartland. Honduras and El Salvador -- lands where Maya traders once traveled at the sufferance of local rulers -- now answer to the confederation. The great trade hub of Naco, where cacao, obsidian, and jade changed hands between Maya, Lenca, and Pipil merchants, is now firmly under our control. The southern approaches to the Maya world are secure."
 nd_may.10.a: "The Holcan have proven their worth."
 nd_may.11.t: "The Fall of Tenochtitlan to the Maya"
 nd_may.11.d: "The unthinkable has been achieved. The Holcan have marched into the Valley of Mexico and taken Tenochtitlan -- the greatest city in the Americas, built on an island in a lake, connected by causeways to the mainland, home to markets that dazzle the imagination. The Jade Throne of the Halach Uinic now commands tribute from the former heart of the Aztec world. How shall we govern this vast new domain? We can demand systematic tribute from the conquered peoples, extracting wealth through administration rather than terror. Or we can rule through fear, ensuring that no subject dares contemplate rebellion."
 nd_may.11.a: "Extract tribute through administration."
 nd_may.11.b: "Rule through the fear of the Holcan."
 nd_may.12.t: "The Fourth Creation"
 nd_may.12.d: "The Popol Vuh tells that the gods made three failed attempts at creating humanity before succeeding with maize. Now the Maya have completed their own act of creation -- an empire that stretches from the Caribbean islands to the Tarascan highlands, from the Gulf coast to the Pacific slopes. This is the Fourth Creation, a new world shaped by Maya hands. The Halach Uinic sits upon the Jade Throne of Tenochtitlan, receiving tribute from a hundred peoples. Shall this empire be maintained through tactical superiority and professional arms, ensuring that our forces can crush any rebellion? Or shall we focus on the political machinery of dominion, building the administrative and diplomatic tools to hold what we have won?"
 nd_may.12.a: "Our warriors shall maintain the peace."
 nd_may.12.b: "Our administrators shall bind the empire."
 STATIC_MODIFIER_NAME_nd_may_dest_venus_scholars: "Scholars of the Morning Star"
 STATIC_MODIFIER_DESC_nd_may_dest_venus_scholars: "Maya astronomers apply Venus cycle predictions to long-range planning of trade and intelligence gathering, though the scholarly focus diverts resources from military upkeep."
 STATIC_MODIFIER_NAME_nd_may_dest_venus_merchants: "Merchants of the Morning Star"
 STATIC_MODIFIER_DESC_nd_may_dest_venus_merchants: "Maya traders time their voyages to the Venus cycle, securing favorable credit and faster ship construction while their communities recover swiftly from setbacks."
 STATIC_MODIFIER_NAME_nd_may_dest_baktun_harmony: "B'ak'tun of Harmony"
 STATIC_MODIFIER_DESC_nd_may_dest_baktun_harmony: "The new great cycle brings readiness and unity to the Maya people, sharpening their battlefield initiative and recruitment, though the spirit of harmony makes wars of aggression harder to justify."
 STATIC_MODIFIER_NAME_nd_may_dest_baktun_renewal: "B'ak'tun of Renewal"
 STATIC_MODIFIER_DESC_nd_may_dest_baktun_renewal: "The new great cycle inspires expansion across seas and frontiers, improving logistics and amphibious capability, though the comfort of renewal breeds a measure of complacency."
 STATIC_MODIFIER_NAME_nd_may_dest_jade_tribute: "Jade Throne Tribute"
 STATIC_MODIFIER_DESC_nd_may_dest_jade_tribute: "The conquered peoples of central Mexico render systematic tribute to the Jade Throne, maintained by strong garrisons and a disciplined army that recovers quickly from setbacks."
 STATIC_MODIFIER_NAME_nd_may_dest_jade_terror: "Terror of the Holcan"
 STATIC_MODIFIER_DESC_nd_may_dest_jade_terror: "The fearsome reputation of the Holcan ensures obedience through devastating assaults and cavalry charges, though their land-focused doctrine neglects naval blockade operations."
 STATIC_MODIFIER_NAME_nd_may_dest_fourth_sun: "Warriors of the Fourth Sun"
 STATIC_MODIFIER_DESC_nd_may_dest_fourth_sun: "The professional army of the Fourth Creation dominates land and sea through naval firepower and cheap mercenaries, though the vast military establishment demands a larger government."
 STATIC_MODIFIER_NAME_nd_may_dest_fourth_dominion: "Dominion of the Fourth Creation"
 STATIC_MODIFIER_DESC_nd_may_dest_fourth_dominion: "The Maya fleet projects power across the Caribbean while building a naval tradition, though the empire's religious diversity makes holy wars more difficult to wage."
 nd_may_astronomical_academy: "Astronomical Academy"
 nd_may_astronomical_academy_desc: "A grand institution where Maya astronomers, mathematicians, and calendar-keepers synthesize the astronomical knowledge of all Mesoamerican civilizations into a unified system of celestial prediction."
 nd_may_academy_maintenance: "Academy Maintenance"
 nd_may_academy_maintenance_desc: "The academy requires a constant supply of paper for records, books for reference, and glass for its precision observation instruments."
 nd_may_jaguar_war_lodge: "Jaguar War Lodge"
 nd_may_jaguar_war_lodge_desc: "An elite military academy where the finest Holcan warriors are trained in siege warfare, combined arms tactics, and the command of multi-ethnic armies drawn from across the empire."
 nd_may_lodge_maintenance: "Lodge Maintenance"
 nd_may_lodge_maintenance_desc: "The war lodge requires weapons for training, leather for armor, and stone for the practice fortifications where warriors hone their siege craft."
