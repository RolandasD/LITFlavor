l_english:
 nd_ayu_water_defenses: "Island Moat Defenses"
 nd_ayu_water_defenses_desc: "Ayutthaya sits at the confluence of three rivers — the Chao Phraya, Pa Sak, and Lopburi — on an artificial island created by digging canals to connect these waterways. This network of moats and channels makes the city virtually impregnable to conventional siege."
 nd_ayu_khmer_inheritance: "Khmer Inheritance"
 nd_ayu_khmer_inheritance_desc: "The founders of Ayutthaya absorbed the administrative traditions of the declining Khmer Empire, adopting its court rituals, Sanskrit-derived titles, and hierarchical bureaucracy. The concept of the king as devaraja, a divine incarnation ruling from a cosmic center, gives Ayutthayan sovereignty a transcendent authority."
 nd_ayu_river_patrol: "Chao Phraya Flotilla"
 nd_ayu_river_patrol_desc: "Control of the Chao Phraya River is the lifeline of Ayutthaya. War boats patrol the waterways, intercept raiders, and escort merchant vessels through the kingdom's arterial river system."
 nd_ayu_dharmaraja: "Dharmaraja Tradition"
 nd_ayu_dharmaraja_desc: "King Ramathibodi I declared Theravada Buddhism the official religion of Ayutthaya in 1360 and brought monks from Ceylon to establish new orders. The Dharmaraja tradition blends Buddhist kingship with Brahmanical ritual, making the ruler both protector of the faith and a living embodiment of righteous law."
 nd_ayu_phrai_foundations: "Phrai Conscription"
 nd_ayu_phrai_foundations_desc: "Every freeman in Ayutthaya is registered as phrai — a subject obligated to provide corvee labor to the crown for half the year. This system, administered through local nai overlords, gives the king a vast pool of manpower for public works, military campaigns, and state construction projects."
 nd_ayu_entrepot: "Cosmopolitan Entrepot"
 nd_ayu_entrepot_desc: "Ayutthaya's location at the crossroads of maritime trade routes between China, India, and the spice islands draws merchants from across Asia. Foreign communities — Chinese, Indian, Persian, and later European — establish their own quarters outside the city walls, each governed by their own headman but contributing to the kingdom's treasury."
 nd_ayu_nihonmachi: "Nihonmachi Quarter"
 nd_ayu_nihonmachi_desc: "Japanese Christians and ronin fleeing the Tokugawa persecution establish a thriving quarter on the east bank of the Chao Phraya. At its peak in the 1620s, the Nihonmachi houses over 1,500 Japanese, including some six hundred warriors who serve the Siamese king as elite mercenaries. Their martial skill and discipline make them a formidable addition to the royal guard."
 nd_ayu_deerskin_trade: "Deerskin Export Trade"
 nd_ayu_deerskin_trade_desc: "Ayutthaya's forests teem with deer, and their hides are prized across East Asia. Japanese and Chinese merchants purchase thousands of skins annually for armor, clothing, and bookbinding. The deerskin trade becomes one of Ayutthaya's most profitable exports alongside sappanwood and rice."
 nd_ayu_palace_law: "Palatine Law"
 nd_ayu_palace_law_desc: "The codification of royal law establishes clear hierarchies of precedence, regulates the behavior of officials, and defines the duties owed by subjects to the crown. This legal framework, drawing on both Khmer tradition and Theravada Buddhist principles, will underpin Siamese governance for centuries."
 nd_ayu_royal_barges: "Royal War Barges"
 nd_ayu_royal_barges_desc: "The royal war barges of Ayutthaya are both weapons of war and symbols of majesty. Elaborately carved and gilded, these vessels carry musketeers and cannon on their prows while rowers propel them through the Chao Phraya with synchronized precision. A full procession of two hundred barges is a sight that awes foreign visitors and subjects alike."
 nd_ayu.1.t: "The Island Between Rivers"
 nd_ayu.1.d: "Where the Chao Phraya, Pa Sak, and Lopburi rivers converge, our engineers have carved canals to complete what nature began. Ayutthaya now sits upon an island — surrounded on all sides by deep water, accessible only by boat or by bridges we control. No army can approach our walls without first crossing the rivers under our archers' fire. But this island is more than a fortress. The rivers that protect us also carry the trade of nations. Chinese junks, Indian dhows, and Malay praus crowd our wharves. We must decide: shall Ayutthaya be known as the impregnable citadel that none dare assault, or as the great crossroads where the wealth of Asia changes hands?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ayu.1.a: "Let our moats be our ramparts."
 nd_ayu.1.b: "Let our rivers be our highways."
 nd_ayu.2.t: "The Nihonmachi"
 nd_ayu.2.d: "A remarkable community has taken root on the east bank of the Chao Phraya, opposite the Portuguese quarter. Japanese Christians and masterless samurai — ronin — fleeing the Tokugawa Shogunate's persecution have established their own quarter, the Nihonmachi. Their headman governs by our leave, and their warriors have offered their swords in our service. These ronin are unlike any soldiers we have known: disciplined, fearless in close combat, and utterly loyal to whoever earns their respect. Already, nearly six hundred Japanese warriors drill in formation along the riverbank, their steel blades glinting in the tropical sun. The merchants among them deal in deer hides, sappanwood, and silk, enriching our treasury while their warriors strengthen our guard."
 nd_ayu.2.a: "A worthy addition to our kingdom."
 STATIC_MODIFIER_NAME_nd_ayu_impregnable_island: "Impregnable Island"
 STATIC_MODIFIER_DESC_nd_ayu_impregnable_island: "Ayutthaya's water defenses make the capital a fortress without equal in Southeast Asia."
 STATIC_MODIFIER_NAME_nd_ayu_river_crossroads: "River Crossroads"
 STATIC_MODIFIER_DESC_nd_ayu_river_crossroads: "The rivers of Ayutthaya carry the trade of nations, enriching all who dwell upon their banks."
 n_nd_ayu_rua_rop: "Rua Rop"
 n_nd_ayu_rua_rop_desc: "Shallow-draft war boats that patrol the Chao Phraya and its tributaries, carrying archers and musketeers to intercept raiders and pirates."
 a_nd_ayu_phrai_lek: "Phrai Lek"
 a_nd_ayu_phrai_lek_desc: "Conscript infantry drawn from the corvee labor system, these peasant soldiers serve their mandatory months in the royal armies."
 a_nd_ayu_ronin_guard: "Ronin Guard"
 a_nd_ayu_ronin_guard_desc: "Japanese masterless samurai who fled Tokugawa persecution and now serve the Ayutthayan king as elite foreign mercenaries, feared for their discipline and swordsmanship."
 n_nd_ayu_rua_suwan: "Rua Suwan Ratchakan"
 n_nd_ayu_rua_suwan_desc: "The gilded royal war barges of Ayutthaya, elaborately carved and equipped with bow-mounted cannon, used for both ceremonial processions and river combat."
 nd_ayu_island_fortress: "Island Moat Fortress"
 nd_ayu_island_fortress_desc: "A system of canals, moats, and water barriers exploiting Ayutthaya's island geography to create layered water defenses that make the city nearly impervious to siege."
 nd_ayu_fortress_upkeep: "Canal and Moat Maintenance"
 nd_ayu_fortress_upkeep_desc: "Lumber and stone for maintaining the canal walls, sluice gates, and defensive embankments that protect the island city."
 nd_ayu_foreign_quarter: "Foreign Trading Quarter"
 nd_ayu_foreign_quarter_desc: "A designated district outside the city walls where foreign merchants — Chinese, Indian, Persian, Japanese, and European — establish their own communities under the governance of appointed headmen."
 nd_ayu_deerskin_processing: "Deerskin Processing"
 nd_ayu_deerskin_processing_desc: "The processing and curing of deer hides for export to Japan and China, one of Ayutthaya's most profitable trades."
 nd_ayu_royal_wat: "Royal Wat"
 nd_ayu_royal_wat_desc: "A grand Buddhist temple complex serving as the spiritual heart of the kingdom, housing sacred relics, supporting monastic education, and legitimizing royal authority through religious patronage."
 nd_ayu_temple_patronage: "Temple Patronage"
 nd_ayu_temple_patronage_desc: "The ongoing supply of ceramics for devotional offerings and dyes for temple decoration and monastic robes."
 levy_nd_ayu_phrai_lek: "Phrai Lek Levy"
 levy_nd_ayu_phrai_lek_desc: "Corvee conscripts drawn from the phrai system, mobilized en masse to serve in the royal armies during campaigns."
 levy_nd_ayu_rua_suwan: "Royal War Barge Levy"
 levy_nd_ayu_rua_suwan_desc: "Gilded war barges crewed by riverfolk and commanded by burgher captains, raised from the Chao Phraya waterfront communities."
 nd_ayu_formed_tt: "Ayutthaya has been formed"
 nd_ayu_path_a_tt: "Chose Impregnable Island"
 nd_ayu_path_b_tt: "Chose River Crossroads"
