l_english:
 STATIC_MODIFIER_NAME_nd_scourge_of_the_caliphate: "Scourge of the Caliphate"
 STATIC_MODIFIER_DESC_nd_scourge_of_the_caliphate: "In the tradition of Hulegu, who toppled the Abbasid Caliphate and drowned Baghdad in blood, the Ilkhanate shall be an instrument of conquest. The Mongol war machine, refined through generations of steppe warfare, will sweep all resistance before it."
 STATIC_MODIFIER_NAME_nd_persianate_khanate: "Persianate Khanate"
 STATIC_MODIFIER_DESC_nd_persianate_khanate: "Following the wisdom of Ghazan Khan and his vizier Rashid al-Din, the Ilkhanate embraces the sophisticated Persian administrative tradition. By synthesizing Mongol military prowess with Persian governance, tolerance, and scholarship, we forge a realm greater than either tradition alone."
 STATIC_MODIFIER_NAME_nd_ilk_faith_of_the_ilkhan: "Faith of the Ilkhan"
 STATIC_MODIFIER_DESC_nd_ilk_faith_of_the_ilkhan: "The Ilkhan's public conversion has united the realm's diverse peoples under a shared faith, lending legitimacy to Mongol rule and opening new channels of cultural exchange."
 STATIC_MODIFIER_NAME_nd_ilk_universal_chronicle: "The Universal Chronicle"
 STATIC_MODIFIER_DESC_nd_ilk_universal_chronicle: "The completion of the Jami al-Tawarikh — the most ambitious work of world history ever attempted — has made the Ilkhanate a beacon of learning. Scholars from across the known world are drawn to our libraries."
 nd_ilk.1.t: "The Ilkhanate Restored"
 nd_ilk.1.d: "The fractured remnants of Hulegu's domain are united once more beneath a single banner. From the highlands of Armenia to the Persian Gulf, from the banks of the Tigris to the mountains of Khorasan, the Ilkhanate stands restored — the westernmost arm of the Mongol world empire.\n\nBut what manner of state shall this be? The old ways of the steppe — the thundering cavalry, the relentless advance, the sacking of cities that dare resist — still course through our veins. Yet around us lies Persia, with its ancient bureaucracies, its scholars and merchants, its traditions of tolerance and learning stretching back millennia.\n\nShall we be conquerors, as Hulegu was when he destroyed Baghdad? Or shall we be builders, as Ghazan was when he reformed the realm and embraced its peoples?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ilk.1.a: "We are the whirlwind from the steppe."
 nd_ilk.1.b: "We are the heirs of both worlds."
 nd_ilk.2.t: "The Khan Embraces the Faith"
 nd_ilk.2.d: "For decades, the question of religion has plagued the Ilkhanate. The early Ilkhans flirted with Nestorian Christianity, Buddhism, and shamanism, while ruling over a vast Muslim population that viewed them as heathen invaders. Now, following the example of Mahmud Ghazan, the Ilkhan has publicly embraced Islam — not as an act of spiritual conviction alone, but as a masterstroke of political pragmatism.\n\nThe conversion transforms the very nature of Ilkhanid rule. No longer foreign overlords imposed by the sword, the Khans become legitimate Muslim sovereigns in the eyes of their subjects. Mosques are repaired, Islamic law finds its place alongside the Yasa, and the ulama are drawn into the machinery of government.\n\nYet this is no wholesale abandonment of the Mongol heritage. The Yasa still governs military affairs, the Tengri sky still watches over the steppe-born nobility, and the tradition of religious tolerance — a cornerstone of Mongol governance — endures. The conversion is a bridge, not a barrier."
 nd_ilk.2.a: "Let faith unite what the sword divided."
 nd_ilk.2.b: "The ways of our ancestors served us well enough."
 nd_ilk.3.t: "The Compendium of Chronicles"
 nd_ilk.3.d: "Rashid al-Din Hamadani, the brilliant Jewish convert who serves as Grand Vizier, has completed the most ambitious work of historiography the world has ever seen. The Jami al-Tawarikh — the Compendium of Chronicles — is nothing less than a universal history of mankind, stretching from the creation of Adam through the conquests of Genghis Khan to the present day.\n\nDrawing on Chinese, Mongol, Persian, Arabic, Hebrew, and Frankish sources, employing scholars from across the known world, and illustrated with watercolors blending Chinese and Persian artistic traditions, this masterwork represents the very essence of the Ilkhanate: a place where civilizations meet, mingle, and produce something greater than any one alone.\n\nRashid al-Din has also established the Rab-i Rashidi, a vast scholarly quarter in Tabriz housing libraries, hospitals, workshops for manuscript production, and residences for scholars from every corner of the earth."
 nd_ilk.3.a: "Knowledge is the truest form of conquest."
 nd_ilk.3.b: "Let this great work speak for us to the world."
 nd_ilk.4.t: "The Dome of Soltaniyeh"
 nd_ilk.4.d: "Rising above the Iranian plateau like a jewel set in the earth, the Dome of Soltaniyeh is complete. Commissioned by Oljeitu as the centerpiece of his new capital, this octagonal structure crowned by the largest brick dome ever constructed stands as testimony to the Ilkhanate's architectural ambition.\n\nIts double-shell dome, an engineering marvel, would inspire builders for centuries — the technique would find its way to Brunelleschi's Florence and the great mosques of the Safavid era. The interior is adorned with the finest tilework, calligraphy, and painted murals that Persian artisans can produce, blending Islamic geometric precision with the bold colors favored by the Mongol court.\n\nSoltaniyeh itself, purpose-built as an imperial capital on the road between Tabriz and Isfahan, represents the Ilkhanate's transformation from nomadic conquerors into settled rulers who commission wonders."
 nd_ilk.4.a: "A monument to our enduring legacy."
 nd_ilk_keshig_tradition: "Keshig Tradition"
 nd_ilk_keshig_tradition_desc: "The Keshig, the personal guard of the Khan, represents the pinnacle of Mongol military tradition — warriors selected for loyalty and skill, trained in the arts of war from childhood."
 nd_ilk_tamma_system: "Tamma Garrison System"
 nd_ilk_tamma_system_desc: "The Tamma system stations permanent garrison forces in conquered territories, drawn from selected chiliarchies of the Mongolian levy. These garrisons secure newly conquered lands and project Mongol power into sedentary regions."
 nd_ilk_yam_restoration: "Yam Relay Restoration"
 nd_ilk_yam_restoration_desc: "The Yam postal relay system, the communication backbone of the Mongol Empire, is restored and expanded across the Ilkhanate's vast domains, enabling rapid transmission of orders and intelligence."
 nd_ilk_ordu_tradition: "Ordu Encampment Tradition"
 nd_ilk_ordu_tradition_desc: "The Ordu, the mobile military encampment of the Mongol ruling class, serves as both court and garrison — a legacy of the nomadic origins that continues to anchor Ilkhanid military organization."
 nd_ilk_decimal_organization: "Decimal Military Organization"
 nd_ilk_decimal_organization_desc: "The Mongol decimal system organizes all military forces into units of ten, hundred, thousand, and ten thousand — the arban, jagun, minghan, and tumen — creating an army of unmatched coordination and discipline."
 nd_ilk_religious_pragmatism: "Religious Pragmatism"
 nd_ilk_religious_pragmatism_desc: "The early Ilkhans practiced a remarkable religious tolerance, patronizing Nestorian Christians, Buddhists, Muslims, and shamans alike — a pragmatic policy born of governing an empire of many faiths."
 nd_ilk_chinese_siege_craft: "Chinese Siege Craft"
 nd_ilk_chinese_siege_craft_desc: "Hulegu's army included a thousand households of Chinese catapult men, naphtha throwers, and crossbowmen. Their expertise in siege warfare — unmatched in the medieval world — brought the walls of Baghdad and Alamut crashing down."
 nd_ilk_silk_road_revival: "Silk Road Revival"
 nd_ilk_silk_road_revival_desc: "Under Mongol rule, the Silk Road experiences a renaissance. The Pax Mongolica makes continental trade safer than it has been in centuries, and Ilkhanid caravanserais shelter merchants from Tabriz to Cathay."
 nd_ilk_steppe_horse_husbandry: "Steppe Horse Husbandry"
 nd_ilk_steppe_horse_husbandry_desc: "The Mongol tradition of maintaining vast herds of horses — each warrior keeping three to five mounts — ensures the Ilkhanate's cavalry remains the finest in the region."
 nd_ilk_court_patronage: "Court Patronage of the Arts"
 nd_ilk_court_patronage_desc: "The Ilkhanid court becomes a vibrant center of artistic production, blending Mongol, Persian, Chinese, and Byzantine artistic traditions into a distinctive new aesthetic."
 nd_ilk_multicultural_diwan: "Multicultural Diwan"
 nd_ilk_multicultural_diwan_desc: "The Ilkhanid administration employs talented individuals regardless of origin — Persian bureaucrats, Uyghur scribes, Jewish financiers, and Nestorian physicians all serve in the diwan."
 nd_ilk_maragheh_observatory: "Maragheh Observatory"
 nd_ilk_maragheh_observatory_desc: "The observatory at Maragheh, founded under Hulegu with the astronomer Nasir al-Din al-Tusi, becomes the most advanced astronomical institution in the world, producing the famous Zij-i Ilkhani star tables."
 nd_ilk_qurchi_guard: "Qurchi Guard"
 nd_ilk_qurchi_guard_desc: "The Qurchi, the inner guard of the Ilkhan, evolve from the earlier Keshig tradition into an elite force of Mongol-Persian heavy cavalry — combining the shock tactics of the steppe with the armor and discipline of Persian knightly tradition."
 nd_ilk_tabriz_silk_trade: "Tabriz Silk Trade"
 nd_ilk_tabriz_silk_trade_desc: "The great bazaar of Tabriz — which Marco Polo called one of the richest in the world — processes and trades silk from across Asia, making the Ilkhanate the premier middleman of Eurasian luxury commerce."
 nd_ilk_ghazans_conversion: "Ghazan's Conversion"
 nd_ilk_ghazans_conversion_desc: "Mahmud Ghazan's conversion to Islam in 1295 transforms the Ilkhanate from a foreign occupation into a legitimate Islamic state, resolving decades of tension between Mongol rulers and their Muslim subjects."
 nd_ilk_jami_al_tawarikh: "Jami al-Tawarikh"
 nd_ilk_jami_al_tawarikh_desc: "Rashid al-Din's Compendium of Chronicles is the first true world history — a monumental work drawing on Chinese, Mongol, Persian, Arabic, and Frankish sources, illustrated in a style blending Eastern and Western traditions."
 nd_ilk_rashidi_endowment: "Rashidi Endowment"
 nd_ilk_rashidi_endowment_desc: "The Rab-i Rashidi, Rashid al-Din's great scholarly quarter in Tabriz, houses libraries, hospitals, and workshops for manuscript production — a university before universities existed in most of the world."
 nd_ilk_unified_coinage: "Unified Coinage"
 nd_ilk_unified_coinage_desc: "Ghazan Khan's currency reform establishes a standardized bi-metallic coinage across the Ilkhanate, replacing the chaotic mix of local currencies and facilitating long-distance trade."
 nd_ilk_persian_military_reform: "Persian Military Reform"
 nd_ilk_persian_military_reform_desc: "As the Ilkhanate settles into its Persian heartland, the army evolves from a purely steppe force into a disciplined mixed army combining Mongol cavalry traditions with Persian infantry and fortification."
 nd_ilk_dome_of_soltaniyeh: "Dome of Soltaniyeh"
 nd_ilk_dome_of_soltaniyeh_desc: "Oljeitu's mausoleum at Soltaniyeh, crowned by the largest brick dome ever built, stands as the architectural masterpiece of the Ilkhanate — a monument that would influence builders from Florence to Isfahan."
 nd_ilk_yasa_codification: "Yasa Codification"
 nd_ilk_yasa_codification_desc: "The ancient Yasa of Genghis Khan is codified and harmonized with Islamic law and Persian administrative tradition, creating a legal framework that draws on all three pillars of Ilkhanid identity."
 nd_ilk_frontier_cavalry: "Frontier Cavalry Tradition"
 nd_ilk_frontier_cavalry_desc: "The steppe cavalry tradition endures along the Ilkhanate's borders, where horse archers patrol the frontiers as their ancestors did — a living link to the mounted warriors of Genghis Khan."
 nd_ilk_centralized_taxation: "Centralized Taxation"
 nd_ilk_centralized_taxation_desc: "Building on Ghazan's fiscal reforms, the Ilkhanate develops a centralized taxation system that replaces arbitrary exactions with regular, predictable revenue collection."
 nd_ilk_persianate_bureaucracy: "Persianate Bureaucracy"
 nd_ilk_persianate_bureaucracy_desc: "The administrative apparatus of the Ilkhanate fully matures into a Persianate bureaucracy — the Mongol overlay has been absorbed, and a sophisticated civil service governs the realm."
 nd_ilk_trade_network_maturation: "Trade Network Maturation"
 nd_ilk_trade_network_maturation_desc: "Generations of investment in caravanserais, roads, and market infrastructure bear fruit as the Ilkhanate's trade networks reach full maturity, connecting East and West."
 nd_ilk_gunpowder_adoption: "Gunpowder Adoption"
 nd_ilk_gunpowder_adoption_desc: "The Ilkhanate, which first brought Chinese siege engineers westward, now fully integrates gunpowder weapons into its military — a fitting continuation of its role as a bridge between civilizations."
 nd_ilk_mounted_fusiliers: "Mounted Fusiliers"
 nd_ilk_mounted_fusiliers_desc: "The evolution of Ilkhanid cavalry reaches its apex with mounted fusiliers — horsemen armed with firearms who combine the mobility of the steppe with the firepower of the modern age."
 nd_ilk_industrial_synthesis: "Industrial Synthesis"
 nd_ilk_industrial_synthesis_desc: "The Ilkhanate's long tradition of synthesizing technologies from East and West finds new expression as industrial methods transform production across the realm."
 nd_ilk_constitutional_reform: "Constitutional Reform"
 nd_ilk_constitutional_reform_desc: "The ancient tension between Mongol custom, Islamic law, and Persian administration finds resolution in constitutional reform — a framework of governance drawn from all three traditions."
 nd_ilk_legacy_of_mongol_persia: "Legacy of Mongol Persia"
 nd_ilk_legacy_of_mongol_persia_desc: "The Ilkhanate's unique synthesis of Mongol, Persian, and Islamic civilization is recognized as one of history's great cultural achievements — a legacy of tolerance, scholarship, and artistic brilliance."
 nd_ilk_national_identity: "National Identity"
 nd_ilk_national_identity_desc: "After centuries of evolution, the Ilkhanate has forged a distinct national identity — neither purely Mongol nor purely Persian, but something new and enduring."
 a_nd_ilk_keshig: "Keshig Guard"
 a_nd_ilk_keshig_desc: "The Keshig are the personal guard of the Khan, elite warriors of proven loyalty and unmatched martial skill. Selected from the finest families of the realm, they serve as both bodyguard and officer corps."
 a_nd_ilk_tamma: "Tamma Garrison"
 a_nd_ilk_tamma_desc: "Tamma garrisons are permanent military forces stationed in conquered territories. Drawn from selected chiliarchies, these mounted warriors hold newly won lands and project Mongol authority into settled regions."
 a_nd_ilk_siege_engineers: "Ilkhanid Siege Engineers"
 a_nd_ilk_siege_engineers_desc: "Recruited from the thousand households of Chinese catapult men that Hulegu brought westward, these specialists employ trebuchets, naphtha, and crossbows with devastating precision against fortified positions."
 a_nd_ilk_qurchi: "Qurchi Guard"
 a_nd_ilk_qurchi_desc: "The Qurchi represent the evolution of the Mongol guard tradition — heavy cavalry that combines the shock tactics of the steppe with Persian-style armor and discipline, forming the elite striking force of the Ilkhanate."
 a_nd_ilk_reformed_infantry: "Reformed Ilkhanid Infantry"
 a_nd_ilk_reformed_infantry_desc: "As the Ilkhanate settles into its Persian domain, its infantry evolves beyond tribal levies into a disciplined force trained in both Mongol tactical flexibility and Persian siege craft."
 a_nd_ilk_late_horse_archers: "Ilkhanid Horse Archers"
 a_nd_ilk_late_horse_archers_desc: "Heirs to the mounted archer tradition of the Mongol steppe, these frontier horsemen maintain the ancient skills of composite bow warfare along the Ilkhanate's vast borders."
 a_nd_ilk_gunpowder_cavalry: "Ilkhanid Mounted Fusiliers"
 a_nd_ilk_gunpowder_cavalry_desc: "The final evolution of Ilkhanid cavalry — mounted fusiliers who wield firearms from horseback, combining the legendary mobility of Mongol horsemen with the killing power of gunpowder."
 nd_ilk_yam_station: "Yam Station"
 nd_ilk_yam_station_desc: "A relay station of the Yam postal system, providing fresh horses and supplies for messengers carrying the Khan's orders across the vast expanse of the Ilkhanate."
 nd_ilk_caravanserai: "Ilkhanid Caravanserai"
 nd_ilk_caravanserai_desc: "A fortified roadside inn built along the Silk Road, offering shelter, water, and security to merchants and their caravans. These grand structures — built of stone and adorned with tilework — serve as the backbone of transcontinental trade."
 nd_ilk_rab_i_rashidi: "Rab-i Rashidi"
 nd_ilk_rab_i_rashidi_desc: "Modeled on Rashid al-Din's great scholarly quarter in Tabriz, this complex houses libraries, hospitals, scriptoria, and lodgings for scholars — a center of learning where knowledge from across the known world is gathered, translated, and preserved."
 nd_ilk_observatory: "Ilkhanid Observatory"
 nd_ilk_observatory_desc: "An astronomical observatory in the tradition of Maragheh, equipped with the finest instruments of the age. Here astronomers chart the heavens, compile star tables, and advance the science of celestial mechanics."
 nd_ilk_ordu: "Ordu Encampment"
 nd_ilk_ordu_desc: "A permanent military encampment in the Mongol tradition, serving as both garrison and administrative center. The Ordu maintains the martial readiness of the realm's frontier regions."
 nd_ilk_mint: "Ilkhanid Mint"
 nd_ilk_mint_desc: "A royal mint producing standardized coinage in the tradition of Ghazan Khan's currency reform. The uniform weight and purity of Ilkhanid coins facilitates trade across the entire realm."
 nd_ilk_silk_processing: "Ilkhanid Silk Processing"
 nd_ilk_silk_processing_desc: "Processing raw silk with Persian dyes and techniques to produce fine textiles for domestic use and export along the Silk Road."
 nd_ilk_horse_breeding: "Ilkhanid Horse Breeding"
 nd_ilk_horse_breeding_desc: "Maintaining the vast herds of horses that are the lifeblood of Mongol military power, bred for endurance and speed on the Iranian plateau."
 nd_ilk_gunpowder_manufacture: "Ilkhanid Gunpowder Manufacturing"
 nd_ilk_gunpowder_manufacture_desc: "Combining Chinese expertise in powder mixing with Middle Eastern metallurgy, the Ilkhanate produces firearms and ammunition of exceptional quality."

 nd_ilk_atelier: "Ilkhanid Atelier"
 nd_ilk_atelier_desc: "A court workshop where master artisans produce exquisite Persian miniature paintings and illuminated manuscripts, blending Mongol, Chinese, and Persian artistic traditions into the distinctive Ilkhanid style."
 nd_ilk_bazaar: "Ilkhanid Bazaar"
 nd_ilk_bazaar_desc: "A great covered marketplace in the tradition of the bazaars of Tabriz — which Marco Polo called the richest in the world — where merchants from across Eurasia gather to trade silk, spices, and precious goods."
 nd_ilk_manuscript_production: "Ilkhanid Manuscript Production"
 nd_ilk_manuscript_production_desc: "A tradition of scholarly copying and manuscript illumination, producing works of history, science, and literature in the multilingual spirit of Rashid al-Din's great workshop."
 nd_ilk_yam_maintenance: "Yam Station Upkeep"
 nd_ilk_yam_maintenance_desc: "Maintaining a Mongol postal relay station with fresh horses and fodder."
 nd_ilk_caravanserai_upkeep: "Caravanserai Upkeep"
 nd_ilk_caravanserai_upkeep_desc: "Maintaining a fortified Silk Road trading post with stone walls and storage facilities."
 nd_ilk_scholarly_upkeep: "Scholarly Upkeep"
 nd_ilk_scholarly_upkeep_desc: "Supplying a university-hospital complex with paper, inks, and scholarly materials."
 nd_ilk_observatory_upkeep: "Observatory Upkeep"
 nd_ilk_observatory_upkeep_desc: "Maintaining astronomical instruments and supplying paper for records at an observatory."
 nd_ilk_ordu_upkeep: "Ordu Upkeep"
 nd_ilk_ordu_upkeep_desc: "Supplying a Mongol military encampment with horses, weapons, and equipment."
 nd_ilk_mint_upkeep: "Mint Upkeep"
 nd_ilk_mint_upkeep_desc: "Operating an Ilkhanid mint, processing silver and copper into standardized coinage."
 nd_ilk_atelier_upkeep: "Atelier Upkeep"
 nd_ilk_atelier_upkeep_desc: "Supplying a court workshop with paper and dyes for manuscript illumination and miniature painting."
 nd_ilk_bazaar_upkeep: "Bazaar Upkeep"
 nd_ilk_bazaar_upkeep_desc: "Maintaining the stone halls and covered stalls of a great Ilkhanid marketplace."
 STATIC_MODIFIER_NAME_nd_ilk_mongol_traditions: "Mongol Traditions"
 STATIC_MODIFIER_DESC_nd_ilk_mongol_traditions: "The old ways of the steppe endure — the tolerance of the tent, the mobility of the horseman, the pragmatism of the nomad. These traditions served our ancestors well, and they serve us still."
 STATIC_MODIFIER_NAME_nd_ilk_chronicle_diplomacy: "Chronicle Diplomacy"
 STATIC_MODIFIER_DESC_nd_ilk_chronicle_diplomacy: "The universal scope of the Jami al-Tawarikh demonstrates the Ilkhanate's cultural sophistication to the world, earning the respect and attention of foreign courts and scholars."
 nd_ilk_formed_tt: "Ilkhanate has been formed"
 nd_ilk_path_a_tt: "Chose Scourge of the Caliphate"
 nd_ilk_path_b_tt: "Chose Persianate Khanate"
 nd_ilk_destiny: "Legacy of the Ilkhans"
 nd_ilk_destiny_desc: "The Ilkhanate stands restored. Now the question arises: what legacy shall this realm leave upon the world? Stability must come first before any grand ambitions can take shape."
 nd_ilk_dest_storm: "The Mongol Storm"
 nd_ilk_dest_storm_desc: "In the tradition of Hulegu, who sacked Baghdad and shattered the Abbasid Caliphate, the Ilkhanate turns its gaze toward the Levant. Damascus and Aleppo must fall before the Mongol advance."
 nd_ilk_dest_subjugation: "Subjugation of Empires"
 nd_ilk_dest_subjugation_desc: "With the Levant secured, the Ilkhanate's ambitions grow. Constantinople and Cairo -- the twin jewels of the old world -- must submit to the Khan's authority. A mighty host is needed."
 nd_ilk_dest_world_empire: "World Empire of the Khans"
 nd_ilk_dest_world_empire_desc: "The final chapter of the Mongol dream: an empire stretching from Samarkand to Delhi, from the Persian Gulf to the holy cities of Arabia. No realm has achieved such dominion since Alexander."
 nd_ilk_dest_synthesis: "The Persianate Synthesis"
 nd_ilk_dest_synthesis_desc: "Rather than conquest, the Ilkhanate pursues the path of Ghazan Khan -- developing the realm, embracing new institutions, and growing prosperous. The land must be cultivated before it can flourish."
 nd_ilk_dest_golden_age: "Golden Age of Tabriz"
 nd_ilk_dest_golden_age_desc: "The Ilkhanate's commercial and intellectual traditions mature into a golden age. Silk flows through our markets, institutions take root, and the treasury swells with the wealth of East-West trade."
 nd_ilk_dest_enlightenment: "Cradle of Civilizations"
 nd_ilk_dest_enlightenment_desc: "The Ilkhanate becomes what it was always meant to be -- a place where civilizations meet and create something greater. Hormuz controls the trade of the Gulf, Bukhara anchors the realm's scholarly tradition, and the land itself prospers beyond measure."
 nd_ilk.5.t: "The Ilkhan's Destiny"
 nd_ilk.5.d: "The Ilkhanate stands firm, its foundations secure and its people content. From the highlands of Armenia to the shores of the Persian Gulf, from Mesopotamia to Khorasan, the realm is stable and ready to be shaped by the will of the Ilkhan.\n\nThe path chosen at the moment of restoration now takes on its full significance. Whether through the thunder of cavalry or the steady growth of commerce and learning, the Ilkhanate will leave its mark upon the world."
 nd_ilk.5.a: "Our destiny awaits."
 nd_ilk.6.t: "The Levant Falls"
 nd_ilk.6.d: "Damascus and Aleppo have fallen to the armies of the Ilkhan, completing the conquest that Hulegu himself could not finish. The Levantine lands -- cradle of ancient civilizations, crossroads of three continents -- now lie within the Mongol domain.\n\nHulegu's forces reached these lands in 1260 but were turned back at Ayn Jalut. Now, at last, the Ilkhanate commands the full extent of the Fertile Crescent, from the Tigris to the Mediterranean."
 nd_ilk.6.a: "The unfinished work of Hulegu is done."
 nd_ilk.7.t: "The Twin Thrones"
 nd_ilk.7.d: "Constantinople and Cairo -- the two greatest cities of the old world -- have submitted to the authority of the Ilkhan. The Roman successor in the Bosporus and the Egyptian power on the Nile are broken. No force remains that can contest Mongol supremacy in the western half of the known world.\n\nThis is a feat that would have staggered even Genghis Khan. The question now is how to consolidate these vast conquests -- through the fear that Mongol armies inspire, or through the careful extraction of wealth from subjugated lands."
 nd_ilk.7.a: "Let them tremble at our approach."
 nd_ilk.7.b: "Strip the conquered lands of their riches."
 nd_ilk.8.t: "Dominion Without End"
 nd_ilk.8.d: "From Samarkand's turquoise domes to Delhi's minarets, from the shores of the Persian Gulf to the holy cities of Arabia, the Ilkhanate commands an empire of staggering scope. This is the Mongol dream made manifest -- a universal empire stretching across civilizations, religions, and peoples.\n\nThe Khan must now decide the nature of this dominion. Will it be a Pax Mongolica -- a great peace enforced by Mongol order, where trade flows freely and subjects are bound by loyalty? Or will it remain an engine of eternal conquest, forever expanding, forever hungry?"
 nd_ilk.8.a: "Impose the peace of the Khan."
 nd_ilk.8.b: "The conquest never ends."
 nd_ilk.9.t: "The Synthesis Takes Root"
 nd_ilk.9.d: "The vision of Ghazan Khan bears fruit. The Ilkhanate has grown prosperous not through plunder but through cultivation -- developing its lands, nurturing its institutions, and investing in the infrastructure of a great civilization.\n\nThe synthesis of Mongol vigor and Persian sophistication is no longer an aspiration but a reality. New institutions take root in fertile soil, development spreads across the realm, and the treasury reflects not the spoils of war but the patient accumulation of a well-governed state."
 nd_ilk.9.a: "We build what others can only conquer."
 nd_ilk.10.t: "The Flowering of Tabriz"
 nd_ilk.10.d: "The Ilkhanate enters its golden age. Silk from China flows through our markets, scholars from across the known world gather in our libraries, and the wealth of East-West trade fills our coffers. Tabriz, which Marco Polo called the richest city in the world, lives up to its reputation and then some.\n\nThis flowering can take two forms -- a commercial renaissance focused on the bazaars and caravanserais that make the Ilkhanate the crossroads of Eurasian trade, or a scholarly renaissance that builds upon the intellectual traditions of Maragheh, the Rab-i Rashidi, and the Jami al-Tawarikh."
 nd_ilk.10.a: "Let the bazaars of Tabriz astound the world."
 nd_ilk.10.b: "Let our scholars illuminate the darkness."
 nd_ilk.11.t: "Where Civilizations Meet"
 nd_ilk.11.d: "The Ilkhanate has achieved something no other realm in history can claim -- a true synthesis of civilizations. Mongol, Persian, Turkic, Arab, Armenian, Georgian -- all contribute to a cultural whole that is greater than any of its parts.\n\nHormuz controls the trade routes of the Gulf, Bukhara anchors the eastern scholarly tradition, and the lands between teem with prosperous cities and cultivated provinces. The Ilkhanate is recognized across the world as a beacon of learning, tolerance, and prosperity.\n\nThis legacy can be expressed through universal knowledge -- a commitment to learning that transcends all boundaries -- or through cosmopolitan empire -- a state that embraces all peoples and reaches out to every corner of the world."
 nd_ilk.11.a: "Knowledge knows no boundaries."
 nd_ilk.11.b: "All peoples find a home in our realm."
 STATIC_MODIFIER_NAME_nd_ilk_dest_terror_march: "Terror March"
 STATIC_MODIFIER_DESC_nd_ilk_dest_terror_march: "The Mongol practice of devastating resistance and garrisoning conquests ensures rapid submission, though the economic cost of maintaining such a vast military presence strains the treasury."
 STATIC_MODIFIER_NAME_nd_ilk_dest_plunder_riches: "Spoils of Empire"
 STATIC_MODIFIER_DESC_nd_ilk_dest_plunder_riches: "The systematic extraction of wealth from conquered lands funds the Ilkhanate's military machine, though the lavish spending of the court grows alongside its revenues."
 STATIC_MODIFIER_NAME_nd_ilk_dest_pax_mongolica: "Pax Mongolica"
 STATIC_MODIFIER_DESC_nd_ilk_dest_pax_mongolica: "The great peace of the Khan descends upon the conquered world. Trade flows freely, intelligence networks bind the empire together, and subject peoples accept their place in the Mongol order."
 STATIC_MODIFIER_NAME_nd_ilk_dest_eternal_conquest: "Eternal Conquest"
 STATIC_MODIFIER_DESC_nd_ilk_dest_eternal_conquest: "The Ilkhanate is a sword that never sleeps. Its armies move with terrifying speed, reinforcing losses and seizing the initiative before enemies can react."
 STATIC_MODIFIER_NAME_nd_ilk_dest_tabriz_renaissance: "Tabriz Renaissance"
 STATIC_MODIFIER_DESC_nd_ilk_dest_tabriz_renaissance: "The commercial flowering of Tabriz transforms the Ilkhanate into the premier trading power of the Middle East, though the comfortable prosperity breeds a certain complacency."
 STATIC_MODIFIER_NAME_nd_ilk_dest_scholarly_exchange: "Scholarly Exchange"
 STATIC_MODIFIER_DESC_nd_ilk_dest_scholarly_exchange: "The Ilkhanate's tradition of gathering scholars from across civilizations creates an intellectual network that accelerates the integration of diverse peoples and the art of diplomacy."
 STATIC_MODIFIER_NAME_nd_ilk_dest_universal_knowledge: "Universal Knowledge"
 STATIC_MODIFIER_DESC_nd_ilk_dest_universal_knowledge: "The Ilkhanate commits itself to the pursuit of knowledge without boundaries -- astronomy, medicine, history, theology -- creating institutions that serve all estates and faiths."
 STATIC_MODIFIER_NAME_nd_ilk_dest_cosmopolitan_empire: "Cosmopolitan Empire"
 STATIC_MODIFIER_DESC_nd_ilk_dest_cosmopolitan_empire: "The Ilkhanate opens itself to the world, expanding its diplomatic reach and commercial horizons beyond the traditional Mongol-Persian sphere."
 nd_ilk_war_college: "Ilkhanid War College"
 nd_ilk_war_college_desc: "A military academy that synthesizes the siege craft of Chinese engineers, the cavalry tactics of the Mongol steppe, and the disciplined infantry traditions of Persia -- training commanders in the art of total war."
 nd_ilk_war_college_upkeep: "War College Upkeep"
 nd_ilk_war_college_upkeep_desc: "Maintaining a military academy with weapons, horses, and training materials for officer instruction."
 nd_ilk_academy: "Ilkhanid Academy of Sciences"
 nd_ilk_academy_desc: "A grand institution of learning in the tradition of Maragheh and the Rab-i Rashidi, where astronomers, physicians, historians, and philosophers from across the known world gather to advance human knowledge."
 nd_ilk_academy_upkeep: "Academy Upkeep"
 nd_ilk_academy_upkeep_desc: "Supplying a center of learning with paper, books, glass instruments, and copper apparatus for scholarly research."
