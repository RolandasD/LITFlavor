l_english:
 STATIC_MODIFIER_NAME_nd_ukr_sich_republic: "Sich Republic"
 STATIC_MODIFIER_DESC_nd_ukr_sich_republic: "The Rada has spoken. Ruthenia shall be governed as the Cossack forebears intended — by the free assembly of warriors, where every man carries a saber and a vote. The Sich tradition lives."
 STATIC_MODIFIER_NAME_nd_ukr_breadbasket: "Breadbasket of Europe"
 STATIC_MODIFIER_DESC_nd_ukr_breadbasket: "The black earth yields its bounty. From the Dnieper to the Dniester, Ruthenian grain feeds the continent, and the wealth of the harvest builds a civilization that will endure."
 STATIC_MODIFIER_NAME_nd_ukr_cossack_autonomy: "Cossack Autonomy"
 STATIC_MODIFIER_DESC_nd_ukr_cossack_autonomy: "The Hetmanate stands independent. The Cossack Host answers to no foreign sovereign, and the rada governs as the ancient liberties demand."
 STATIC_MODIFIER_NAME_nd_ukr_pereiaslav_compact: "Pereiaslav Compact"
 STATIC_MODIFIER_DESC_nd_ukr_pereiaslav_compact: "Through alliance with a great power, the Hetmanate secures its borders and gains access to resources that no frontier state could muster alone."
 STATIC_MODIFIER_NAME_nd_ukr_orthodox_scholarship: "Orthodox Scholarship"
 STATIC_MODIFIER_DESC_nd_ukr_orthodox_scholarship: "The Academy becomes a fortress of Orthodox learning, training clergy and scholars who defend the faith through reason and erudition."
 STATIC_MODIFIER_NAME_nd_ukr_western_learning: "Western Learning"
 STATIC_MODIFIER_DESC_nd_ukr_western_learning: "Adopting the Jesuit method and Latin curriculum, the Academy bridges East and West, bringing European knowledge to the Orthodox world."
 nd_ukr.1.t: "The Birth of Ruthenia"
 nd_ukr.1.d: "Kyiv stands once more as the capital of a Ruthenian state. From the rapids of the Dnieper to the forests of Volhynia, the scattered principalities and Cossack hosts have been united under one banner. But what kind of nation shall this be? The Zaporozhian tradition calls for a warrior republic — a land where every Cossack is equal in the rada and where the sabers of the Sich guard the frontier against all comers. Yet the black earth speaks a different promise: the richest soil in Europe, capable of feeding empires. Shall Ruthenia be defined by the saber or by the plow?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ukr.1.a: "Let the Sich Rada rule — we are warriors first!"
 nd_ukr.1.b: "The black earth shall be our wealth and our destiny."
 nd_ukr.2.t: "The Khmelnytsky Uprising"
 nd_ukr.2.d: "The Cossack Host has risen. Under Bohdan Khmelnytsky, the Zaporozhian Cossacks have shattered the armies sent to subjugate them, winning victory after victory at Zhovti Vody, Korsun, and Pyliavtsi. The old order is broken. For the first time, a Cossack Hetmanate governs an independent state in the heart of Europe. But this triumph carries a question that will echo for generations: can the Hetmanate stand alone against the empires that surround it, or must it seek the protection of a greater power? At Pereiaslav, envoys offer an alliance that would secure borders but bind the nation's fate to another throne."
 nd_ukr.2.a: "The Hetmanate shall stand on its own strength!"
 nd_ukr.2.b: "Sign the Treaty — our borders need guarantees."
 nd_ukr.3.t: "The Kyiv-Mohyla Academy"
 nd_ukr.3.d: "In 1632, Metropolitan Petro Mohyla transformed a modest brotherhood school into something unprecedented — the first Orthodox institution of higher learning in all the East Slavic lands. Taking the Jesuit colleges of Poland as his model, Mohyla created a curriculum that married Latin scholarship with Orthodox theology. The Academy's library holds eight thousand volumes, nearly all in Latin, opening a window onto Western philosophy, science, and letters that no Orthodox institution had offered before. Graduates go on to lead churches, advise hetmans, and carry learning across Eastern Europe. The question is what this learning shall serve: the defense of Orthodox tradition, or the embrace of Western innovation?"
 nd_ukr.3.a: "The Academy shall be a bulwark of Orthodox faith."
 nd_ukr.3.b: "Let us learn from the West and surpass them."
 nd_ukr.4.t: "The Chaika Fleet"
 nd_ukr.4.d: "From the Dnieper rapids, a fleet of chaikas sets forth — light, fast boats carved from single tree trunks and fitted with falconets. Each carries fifty warriors trained in the art of naval ambush. These Cossack raiders have become the terror of the Black Sea, striking Ottoman ports from Trabzon to Sinop and even appearing before the walls of Istanbul itself. In 1615, eighty chaikas carrying four thousand Cossacks crossed the Black Sea and burned the suburbs of the Ottoman capital. The Sultan's admirals, commanding galleys three times the size, cannot catch these ghosts who attack at dawn and vanish by nightfall."
 nd_ukr.4.a: "The Black Sea trembles at the sight of our sails!"
 nd_ukr.5.t: "Mazepa's Golden Age"
 nd_ukr.5.d: "Under Hetman Ivan Mazepa, the Hetmanate enters its golden age. A patron of extraordinary vision, Mazepa pours wealth into churches, monasteries, and the Kyiv-Mohyla Academy, where enrollment swells past two thousand students. The distinctive Ukrainian Baroque architecture — exuberant, colorful, defiant — rises across the land. The Hetmanate's courts administer justice, its printing presses publish theological and scholarly works, and its Cossack officers evolve into a cultured elite that rivals the Polish szlachta in sophistication. It is a brief, brilliant flowering of Ruthenian civilization."
 nd_ukr.5.a: "May this golden age endure!"
 nd_ukr_ruthenian_principalities: "Ruthenian Principalities"
 nd_ukr_ruthenian_principalities_desc: "The fragmented Ruthenian principalities — Halych, Volhynia, Kyiv — carry the legacy of Kyivan Rus, preserving Slavic traditions of princely governance and inter-dynastic diplomacy."
 nd_ukr_frontier_warriors: "Frontier Warriors"
 nd_ukr_frontier_warriors_desc: "On the steppe frontier, Ruthenian warriors develop the mounted fighting skills that will define Cossack military tradition for centuries."
 nd_ukr_black_earth: "Black Earth"
 nd_ukr_black_earth_desc: "The chernozem — black earth — of the Ruthenian steppe is the richest agricultural soil in Europe, capable of producing harvests that feed entire empires."
 nd_ukr_kyivan_heritage: "Kyivan Heritage"
 nd_ukr_kyivan_heritage_desc: "The spiritual legacy of the Baptism of Rus and the great churches of Kyiv endures, binding the Ruthenian lands to their Orthodox Christian identity."
 nd_ukr_steppe_horsemanship: "Steppe Horsemanship"
 nd_ukr_steppe_horsemanship_desc: "Ruthenian horsemen adopt the riding techniques of the steppe nomads, breeding hardy mounts and training light cavalry capable of ranging far across the grasslands."
 nd_ukr_sich_democracy: "Sich Democracy"
 nd_ukr_sich_democracy_desc: "The Zaporozhian Sich develops a military democracy unique in Europe — a republic of warriors where the general assembly elects all officers and the hetman himself."
 nd_ukr_chumak_routes: "Chumak Routes"
 nd_ukr_chumak_routes_desc: "The Chumaks — itinerant Cossack traders — drive their ox-drawn wagons across the steppe, carrying salt from the Crimea and grain from the interior along established trade corridors."
 nd_ukr_rada_tradition: "Rada Tradition"
 nd_ukr_rada_tradition_desc: "The Cossack Rada — the general military council — establishes precedents of collective decision-making that constrain even the most powerful hetmans."
 nd_ukr_kuren_system: "Kuren System"
 nd_ukr_kuren_system_desc: "The kurin — the basic Cossack company of fifty to one hundred warriors — serves as both military unit and social institution, each electing its own ataman."
 nd_ukr_dnipro_fisheries: "Dnipro Fisheries"
 nd_ukr_dnipro_fisheries_desc: "The Dnieper and its tributaries teem with fish and waterfowl, sustaining the Cossack way of life and supporting a tradition of mead-brewing from steppe honey."
 nd_ukr_border_militia: "Border Militia"
 nd_ukr_border_militia_desc: "Organized frontier defense forces protect Ruthenian settlements from Tatar raids, manning the sich fortifications along the steppe border."
 nd_ukr_chaika_raiders: "Chaika Raiders"
 nd_ukr_chaika_raiders_desc: "The chaika — a light war boat carved from a single trunk and armed with falconets — enables Cossack raiders to strike Ottoman ports across the Black Sea with devastating speed."
 nd_ukr_black_sea_raids: "Black Sea Raids"
 nd_ukr_black_sea_raids_desc: "Cossack fleets of up to three hundred chaikas terrorize the Ottoman Black Sea coast, raiding from Trabzon to the suburbs of Istanbul itself."
 nd_ukr_tabor_warfare: "Tabor Warfare"
 nd_ukr_tabor_warfare_desc: "The tabor — a mobile fortress of chained wagons — allows Cossack armies to defend against superior cavalry forces by creating instant field fortifications."
 nd_ukr_brotherhood_schools: "Brotherhood Schools"
 nd_ukr_brotherhood_schools_desc: "Orthodox brotherhoods establish schools across Ruthenian cities, teaching literacy, theology, and classical languages to defend the faith against Catholic proselytization."
 nd_ukr_salt_trade: "Salt Trade"
 nd_ukr_salt_trade_desc: "Crimean salt, transported north by Chumak caravans, becomes a staple of Ruthenian commerce, enriching the trading towns along the Dnieper."
 nd_ukr_zaporozhian_fleet: "Zaporozhian Fleet"
 nd_ukr_zaporozhian_fleet_desc: "The organized naval forces of the Zaporozhian Host maintain permanent shipyards along the Dnieper, capable of launching raiding expeditions across the Black Sea."
 nd_ukr_khmelnytsky_uprising: "Khmelnytsky Uprising"
 nd_ukr_khmelnytsky_uprising_desc: "Bohdan Khmelnytsky's rebellion of 1648 shatters the old order and creates an independent Cossack Hetmanate — the first Ruthenian state in centuries."
 nd_ukr_registered_cossack_army: "Registered Cossack Army"
 nd_ukr_registered_cossack_army_desc: "The system of registered Cossacks transforms irregular frontier warriors into a disciplined standing army organized into polk regiments under professional polkovnyks."
 nd_ukr_hetmanate_governance: "Hetmanate Governance"
 nd_ukr_hetmanate_governance_desc: "The Cossack Hetmanate develops a sophisticated administrative system with elected officials, written law codes, and a military bureaucracy."
 nd_ukr_mohyla_learning: "Mohyla Academy Tradition"
 nd_ukr_mohyla_learning_desc: "The Kyiv-Mohyla Academy — the first Orthodox institution of higher learning in the East Slavic world — trains clergy, diplomats, and scholars who shape Ruthenian intellectual life."
 nd_ukr_orthodox_brotherhoods: "Orthodox Brotherhoods"
 nd_ukr_orthodox_brotherhoods_desc: "Lay Orthodox confraternities organize schools, printing presses, and charitable works, defending the faith through education and community solidarity."
 nd_ukr_grain_export: "Grain Export"
 nd_ukr_grain_export_desc: "Ruthenian grain, produced in staggering quantities from the black earth, enters European markets via the Dnieper and overland trade routes."
 nd_ukr_mazepa_golden_age: "Mazepa's Golden Age"
 nd_ukr_mazepa_golden_age_desc: "Under Hetman Ivan Mazepa, the Hetmanate experiences an extraordinary cultural flourishing — churches, academies, and printing presses proliferate across the land."
 nd_ukr_regimental_system: "Regimental System"
 nd_ukr_regimental_system_desc: "The polkova systema — the regimental territorial system — organizes the Hetmanate into military-administrative districts, each providing troops and governance."
 nd_ukr_sloboda_settlement: "Sloboda Settlement"
 nd_ukr_sloboda_settlement_desc: "Sloboda — free settlements exempt from taxation — attract settlers to the frontier, populating empty steppe lands with farming communities."
 nd_ukr_cossack_constitution: "Cossack Constitution"
 nd_ukr_cossack_constitution_desc: "Pylyp Orlyk's Constitution of 1710, among the earliest in Europe, codifies the rights of Cossacks and limits the power of the Hetman through constitutional principles."
 nd_ukr_steppe_cavalry_tactics: "Steppe Cavalry Tactics"
 nd_ukr_steppe_cavalry_tactics_desc: "Evolving Cossack cavalry tactics blend steppe nomadic tradition with European military science, producing light horsemen of exceptional speed and striking power."
 nd_ukr_national_awakening: "National Awakening"
 nd_ukr_national_awakening_desc: "The Ruthenian national awakening sees poets, scholars, and historians rediscover and celebrate the distinct Ruthenian identity, language, and cultural heritage."
 nd_ukr_modern_agriculture: "Modern Agriculture"
 nd_ukr_modern_agriculture_desc: "Scientific farming methods applied to the incomparable chernozem transform Ruthenia into the breadbasket of Europe, with grain exports feeding the continent."
 nd_ukr_kobzar_tradition: "Kobzar Tradition"
 nd_ukr_kobzar_tradition_desc: "The kobzari — blind wandering minstrels who sing the epic dumy — preserve the memory of Cossack glory and fuel the awakening of national consciousness."
 nd_ukr_university_reform: "University Reform"
 nd_ukr_university_reform_desc: "Building on the Mohyla Academy tradition, Ruthenian universities embrace modern scholarship, training a new generation of intellectuals and professionals."
 nd_ukr_haidamaka_rising: "Haidamaka Rising"
 nd_ukr_haidamaka_rising_desc: "The Haidamaka uprisings channel the Cossack martial spirit into popular revolts, demonstrating that the tradition of armed resistance endures in the Ruthenian heartland."
 a_nd_ukr_zaporozhian: "Zaporozhian Cossack"
 a_nd_ukr_zaporozhian_desc: "Light cavalry of the Zaporozhian Sich, expert raiders and horsemen who strike fast and vanish into the steppe."
 a_nd_ukr_registered_cossack: "Registered Cossack"
 a_nd_ukr_registered_cossack_desc: "Professional Cossack soldiers organized into polk regiments, combining frontier toughness with military discipline."
 a_nd_ukr_cossack_light_horse: "Cossack Light Horse"
 a_nd_ukr_cossack_light_horse_desc: "Swift mounted warriors of the Hetmanate, descendants of the steppe tradition of mobile warfare."
 n_nd_ukr_chaika: "Chaika"
 n_nd_ukr_chaika_desc: "A light war boat carved from a single tree trunk, armed with falconets and crewed by fifty Cossack raiders. Fast and shallow-drafted, ideal for river and coastal operations."
 n_nd_ukr_war_chaika: "War Chaika"
 n_nd_ukr_war_chaika_desc: "An improved version of the Cossack chaika, capable of sustained Black Sea operations against Ottoman shipping."
 nd_ukr_sich_fortification: "Sich Fortification"
 nd_ukr_sich_fortification_desc: "A fortified Cossack camp modeled on the legendary Zaporozhian Sich — earthworks, palisades, and barracks defending the frontier."
 nd_ukr_chumak_post: "Chumak Trading Post"
 nd_ukr_chumak_post_desc: "A waystation on the Chumak trade routes where ox-drawn caravans rest and exchange salt, grain, and other goods."
 nd_ukr_mohyla_academy: "Kyiv-Mohyla Academy"
 nd_ukr_mohyla_academy_desc: "The first Orthodox institution of higher learning in the East Slavic world, teaching Latin, philosophy, theology, and the liberal arts."
 nd_ukr_chernozem_estate: "Chernozem Estate"
 nd_ukr_chernozem_estate_desc: "A farming estate on the legendary black earth of the Ruthenian steppe, producing grain in quantities that astonish European visitors."
 nd_ukr_tabor_encampment: "Tabor Encampment"
 nd_ukr_tabor_encampment_desc: "A defensive position of chained wagons filled with earth and armed men — the Cossack answer to enemy cavalry superiority."
 nd_ukr_brotherhood_school: "Brotherhood School"
 nd_ukr_brotherhood_school_desc: "A school founded by an Orthodox brotherhood to teach literacy, theology, and classical languages in defense of the faith."
 nd_ukr_sloboda: "Sloboda Settlement"
 nd_ukr_sloboda_desc: "A free frontier settlement where colonists receive tax exemptions in exchange for settling and defending empty steppe lands."
 nd_ukr_medovarnia: "Medovarnia"
 nd_ukr_medovarnia_desc: "A honey distillery producing mead and liquor from the abundant bee products of the Ruthenian steppe and forests."
 nd_ukr_sich_garrison: "Sich Garrison"
 nd_ukr_sich_garrison_desc: "Armed warriors maintaining the defenses of the Sich fortification, consuming weapons, livestock for provisions, and tools for upkeep."
 nd_ukr_chumak_operations: "Chumak Operations"
 nd_ukr_chumak_operations_desc: "Overland trade in salt, livestock, and leather goods along the Chumak caravan routes, with ox-drawn wagons requiring leather harnesses and fittings."
 nd_ukr_academy_operations: "Academy Operations"
 nd_ukr_academy_operations_desc: "The scholarly activities of the Mohyla Academy, consuming paper, books, and glass for windows and scientific instruments."
 nd_ukr_grain_processing: "Grain Processing"
 nd_ukr_grain_processing_desc: "Processing abundant Ruthenian wheat into beer for local consumption and export."
 nd_ukr_tabor_supply: "Tabor Supply"
 nd_ukr_tabor_supply_desc: "Maintaining the mobile wagon fort defenses with lumber for wagon repairs, weapons for the garrison, and livestock for provisions and transport."
 nd_ukr_school_operations: "School Operations"
 nd_ukr_school_operations_desc: "The teaching and printing activities of the brotherhood school, consuming paper, beeswax for candles, and cloth for robes and furnishings."
 nd_ukr_sloboda_farming: "Sloboda Farming"
 nd_ukr_sloboda_farming_desc: "Frontier farming in the sloboda settlements, growing wheat, raising livestock, and using tools to work the black earth."
 nd_ukr_mead_brewing: "Mead Brewing"
 nd_ukr_mead_brewing_desc: "Brewing traditional Ruthenian mead and liquor from steppe honey and grain."
 levy_nd_ukr_cossack_light_horse: "Cossack Light Horse Levy"
 levy_nd_ukr_cossack_light_horse_desc: "Mobilization of swift Cossack horsemen from the Hetmanate's rural districts."
 levy_nd_ukr_war_chaika: "War Chaika Levy"
 levy_nd_ukr_war_chaika_desc: "Mobilization of Cossack war boats for Black Sea raiding operations."
 nd_ukr_formed_tt: "Ruthenia has been formed"
 nd_ukr_path_a_tt: "Chose Sich Republic"
 nd_ukr_path_b_tt: "Chose Breadbasket of Europe"
 nd_ukr_destiny: "The Ruthenian Destiny"
 nd_ukr_destiny_desc: "Ruthenia has risen from the ashes of fragmentation. With Kyiv secured and stability restored, the nation must now choose its path — the saber or the plow, conquest or cultivation."
 nd_ukr_dest_black_sea_gate: "The Black Sea Gate"
 nd_ukr_dest_black_sea_gate_desc: "Seize the gateway to the Black Sea. Take the Crimean port of Kaffa and secure the Zaporizhzhian rapids at Kichkas to begin the Cossack drive southward."
 nd_ukr_dest_crimean_conquest: "The Crimean Conquest"
 nd_ukr_dest_crimean_conquest_desc: "Break the Crimean Khanate. Capture the Perekop gate and the fortress of Azov to dominate the northern Black Sea coast."
 nd_ukr_dest_black_sea_empire: "Black Sea Empire"
 nd_ukr_dest_black_sea_empire_desc: "Complete the Cossack dream: master both shores of the Black Sea. Take the Ottoman port of Sinop and the Taman peninsula to forge an empire of raiders and warriors."
 nd_ukr_dest_grain_port: "The Grain Port"
 nd_ukr_dest_grain_port_desc: "Secure the site of Khadjibey on the Black Sea coast — future gateway for Ruthenian grain to reach European markets. Build the treasury that befits a rising agrarian power."
 nd_ukr_dest_black_earth_wealth: "Black Earth Wealth"
 nd_ukr_dest_black_earth_wealth_desc: "Embrace modern banking and develop the Ruthenian heartland to unlock the full potential of the legendary chernozem."
 nd_ukr_dest_breadbasket_empire: "Breadbasket Empire"
 nd_ukr_dest_breadbasket_empire_desc: "Dominate global trade as the continent's indispensable granary. The nation that feeds Europe commands Europe."
 nd_ukr.6.t: "The Ruthenian Destiny"
 nd_ukr.6.d: "The land of Ruthenia stands united once more. From the Carpathian foothills to the Dnieper rapids, a nation has been forged from the scattered principalities and Cossack hosts. The rada has convened, the banners have been raised, and Kyiv stands proud. What was broken by the Mongol tide has been restored. Now the question is not whether Ruthenia shall survive, but what it shall become."
 nd_ukr.6.a: "Our destiny awaits!"
 nd_ukr.7.t: "The Gate of the Black Sea"
 nd_ukr.7.d: "Kaffa has fallen to Cossack arms. The great slave market of the Crimea — where for centuries the Khan's raiders sold captured Ruthenians into Ottoman bondage — is ours. At Kichkas, the Zaporizhzhian rapids thunder beneath our boats. The gateway to the Black Sea stands open. The raids that terrorized our people for generations will now flow in the opposite direction."
 nd_ukr.7.a: "The Crimea shall know our wrath!"
 nd_ukr.8.t: "The Port of Khadjibey"
 nd_ukr.8.d: "Where the Dniester empties into the Black Sea, the port of Khadjibey has been secured. This modest anchorage sits upon the richest agricultural hinterland in Europe — the black earth that stretches endlessly north and east. Already grain-laden ox-carts line the roads. Where Chumak wagons once trudged overland, ships will now carry Ruthenian wheat to hungry markets across the Mediterranean. The future is written in grain."
 nd_ukr.8.a: "Our harvest shall feed the world!"
 nd_ukr.9.t: "The Fall of the Crimea"
 nd_ukr.9.d: "The Crimean Khanate is broken. Perekop, the narrow isthmus that shielded the peninsula for centuries, has been stormed. At Azov, the fortress that guarded the Don estuary has capitulated. For the first time in memory, Ruthenian power extends to the shores of the Black Sea without the shadow of Tatar raids. The question now is what to do with this victory. Some advocate razing every fortress and driving the remnant population out — a final reckoning for centuries of slave raids. Others counsel settlement and assimilation, turning the steppe into Ruthenian farmland."
 nd_ukr.9.a: "Raze the khanate — repay centuries of suffering!"
 nd_ukr.9.b: "Settle the steppe — make it ours by plow and deed."
 nd_ukr.10.t: "The Banking Revolution"
 nd_ukr.10.d: "Ruthenian grain now commands premium prices in European markets, and the treasury swells with silver. The question arises: how should this wealth be managed? One faction advocates a state bank under the Hetman's authority — a centralized instrument to fund armies, build roads, and bind subject peoples through financial dependency. Another faction, the merchants of Kyiv and Lviv, argue for open markets — let traders set prices, let capital flow freely, and Ruthenia's natural wealth will attract investment from across the continent."
 nd_ukr.10.a: "The state shall command the purse."
 nd_ukr.10.b: "Free the markets — prosperity follows liberty."
 nd_ukr.11.t: "Masters of the Black Sea"
 nd_ukr.11.d: "Sinop has fallen. The Ottoman port where chaika fleets once raided now flies the Ruthenian banner. On the Taman peninsula, the Kuban gateway is secured. The Black Sea — once an Ottoman lake, then a contested frontier — is now a Ruthenian domain. From the Dnieper to the Anatolian coast, Cossack-built vessels patrol waters that their grandfathers crossed as raiders. An empire of water and steppe stretches before the nation. Some urge that the fleet be unleashed to dominate every shore. Others see in these conquests the foundation of a new Pontic empire — a great power forged from the sea."
 nd_ukr.11.a: "Unleash the raiders — the sea is our hunting ground!"
 nd_ukr.11.b: "We shall build a Pontic empire to rival the ancients."
 nd_ukr.12.t: "The Granary of Europe"
 nd_ukr.12.d: "The transformation is complete. Ruthenian grain feeds half the continent. From the exchange floors of Khadjibey and Kyiv, merchants negotiate contracts that determine whether cities prosper or starve. The black earth has proven mightier than any army — nations that once looked upon Ruthenia as a backward frontier now court its favor. The question remains: shall this agricultural supremacy serve as a bridge to the world, binding nations through the shared table? Or shall the harvest be industrialized, its profits channeled into modernization that will make Ruthenia self-sufficient in every way?"
 nd_ukr.12.a: "Feed the continent — bind nations to our table."
 nd_ukr.12.b: "Industrialize the harvest — forge our own future."
 STATIC_MODIFIER_NAME_nd_ukr_dest_raze_khanate: "Vengeance of the Sich"
 STATIC_MODIFIER_DESC_nd_ukr_dest_raze_khanate: "The Crimean slave markets burn. Centuries of raids repaid in a single campaign of righteous fury."
 STATIC_MODIFIER_NAME_nd_ukr_dest_settle_steppe: "Steppe Settlement"
 STATIC_MODIFIER_DESC_nd_ukr_dest_settle_steppe: "The conquered steppe is colonized by Ruthenian settlers, transforming nomad pastures into ordered farmland."
 STATIC_MODIFIER_NAME_nd_ukr_dest_pontic_raiders: "Pontic Raiders"
 STATIC_MODIFIER_DESC_nd_ukr_dest_pontic_raiders: "The Black Sea belongs to Cossack raiders whose assault craft strike with impunity across both shores."
 STATIC_MODIFIER_NAME_nd_ukr_dest_pontic_empire: "Pontic Empire"
 STATIC_MODIFIER_DESC_nd_ukr_dest_pontic_empire: "A new maritime empire rises on the Black Sea, forged by conquest and sustained by naval tradition."
 STATIC_MODIFIER_NAME_nd_ukr_dest_state_banking: "State Banking"
 STATIC_MODIFIER_DESC_nd_ukr_dest_state_banking: "The Hetman's treasury commands the flow of capital, funding expansion and binding subjects through financial power."
 STATIC_MODIFIER_NAME_nd_ukr_dest_free_markets: "Free Markets"
 STATIC_MODIFIER_DESC_nd_ukr_dest_free_markets: "Open markets and free trade attract investment from across the continent, though the bureaucratic costs of a merchant state weigh on the court."
 STATIC_MODIFIER_NAME_nd_ukr_dest_feed_continent: "Feed the Continent"
 STATIC_MODIFIER_DESC_nd_ukr_dest_feed_continent: "Ruthenian grain diplomacy binds nations to the table, though the plowman's priority leaves the army undersized."
 STATIC_MODIFIER_NAME_nd_ukr_dest_industrial_harvest: "Industrial Harvest"
 STATIC_MODIFIER_DESC_nd_ukr_dest_industrial_harvest: "Modernized agriculture drives self-sufficiency and expansion, though the inland focus neglects the fleet."
 nd_ukr_cossack_arsenal: "Cossack Arsenal"
 nd_ukr_cossack_arsenal_desc: "A major Cossack weapons manufactory producing arms, munitions, and equipment for the armies and fleets of the Black Sea empire."
 nd_ukr_grain_exchange: "Grain Exchange"
 nd_ukr_grain_exchange_desc: "An international grain trading hall where merchants negotiate contracts that determine whether distant cities prosper or starve."
 nd_ukr_arsenal_maintenance: "Arsenal Operations"
 nd_ukr_arsenal_maintenance_desc: "Arms production consuming weaponry for reworking, iron for smelting, tools for manufacture, and saltpeter for munitions."
 nd_ukr_exchange_operations: "Exchange Operations"
 nd_ukr_exchange_operations_desc: "The administrative operations of the grain exchange, consuming paper for contracts, cloth for furnishings, and tools for weighing equipment."
