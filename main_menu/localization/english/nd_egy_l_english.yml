l_english:
 STATIC_MODIFIER_NAME_nd_sword_of_the_sultan: "Sword of the Sultan"
 STATIC_MODIFIER_DESC_nd_sword_of_the_sultan: "The Mamluk military tradition lives on. Our cavalry charges shake the earth and our armies march with the discipline of centuries. Egypt's sword is drawn, and none shall stand before it."
 STATIC_MODIFIER_NAME_nd_garden_of_the_nile: "Garden of the Nile"
 STATIC_MODIFIER_DESC_nd_garden_of_the_nile: "The Nile's bounty is the foundation of our prosperity. Rich harvests feed a growing nation, trade flows through our markets, and the wealth of ages past fuels the ambitions of ages to come."
 STATIC_MODIFIER_NAME_nd_egy_light_of_azhar: "Light of Al-Azhar"
 STATIC_MODIFIER_DESC_nd_egy_light_of_azhar: "Al-Azhar's scholars illuminate the Islamic world with their learning, drawing students from every corner of the faith. Egypt stands as the intellectual heart of civilization."
 STATIC_MODIFIER_NAME_nd_egy_egyptian_renaissance: "Egyptian Renaissance"
 STATIC_MODIFIER_DESC_nd_egy_egyptian_renaissance: "A new army drilled in modern tactics, factories rising along the Nile, and a generation of officers trained in the arts of war. Egypt awakens to its destiny among the great powers."
 nd_egy.1.t: "The Land of the Pharaohs Reborn"
 nd_egy.1.d: "Egypt stands united once more under a single banner. For millennia this land has been the crossroads of empires — the granary that fed Rome, the fortress that turned back the Mongols, the market where East met West. The Nile still flows, the harvests still come, and now a new question confronts us: shall Egypt's destiny be written in the language of the sword, or in the ledgers of the counting house? Our Mamluk cavalry remain the finest horsemen in the world, their furusiyya tradition unbroken across centuries. Yet the riches of the Nile valley — cotton, grain, sugar, spices flowing through our ports — offer a different kind of power. The choice before us will define what Egypt becomes.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_egy.1.a: "We are the heirs of Baybars — let our enemies tremble!"
 nd_egy.1.b: "The Nile provides — let our prosperity be our shield."
 nd_egy.2.t: "The Revival of Al-Azhar"
 nd_egy.2.d: "Since its founding by the Fatimids in 970, Al-Azhar has been a beacon of Islamic learning. Under Mamluk patronage, the mosque-university grew into the foremost center of Sunni scholarship in the world. Waqf endowments fund halls of study where jurists debate questions of law, astronomers chart the heavens, and physicians advance the art of healing. Students arrive from Andalusia, from Persia, from the distant lands of the Sahel, drawn by Al-Azhar's reputation. Now, with Egyptian sovereignty restored, we may elevate this ancient institution to even greater heights. Shall we invest in its scholarly mission, or channel its prestige toward the stability of the state?"
 nd_egy.2.a: "Al-Azhar shall be the lamp of the world."
 nd_egy.2.b: "Let Al-Azhar guide the faithful with renewed authority."
 nd_egy.3.t: "The New Order"
 nd_egy.3.d: "The old Mamluk military system, for all its glorious history, cannot contend with the disciplined armies of Europe. Egyptian students sent abroad have returned with knowledge of drill manuals, modern tactics, and organizational methods that transform raw peasant conscripts into professional soldiers. The Nizam-i Jedid — the New Order — represents nothing less than a revolution in Egyptian military affairs. Factories in Cairo now produce muskets and cannons to European standards. A military academy trains officers in the science of war. The transformation is painful and costly, but the alternative is subjugation. Egypt shall have a modern army, or Egypt shall have no army at all."
 nd_egy.3.a: "Egypt shall stand among the great military powers."
 nd_egy.3.b: "Modernize the economy, not just the army."
 nd_egy.4.t: "Gateway Between the Seas"
 nd_egy.4.d: "Egypt has always been the hinge between two worlds. To our north, the Mediterranean connects us to Europe and the riches of Christendom. To our east, the Red Sea opens the road to India, the Spice Islands, and the wealth of the Orient. Caravans cross the isthmus of Suez carrying pepper and silk, coffee and incense, in quantities that would stagger the imagination of lesser nations. Our warehouses at the ports of Suez and Alexandria bulge with the goods of three continents. The revenue from this transit trade alone could fund a kingdom. We stand at the crossroads of the world, and every merchant who passes through our land enriches Egypt."
 nd_egy.4.a: "All roads lead through Egypt."
 nd_egy_furusiyya: "Furusiyya Tradition"
 nd_egy_furusiyya_desc: "The Mamluk art of horsemanship, archery, and mounted combat, passed down through generations of elite slave-soldiers."
 nd_egy_nile_irrigation: "Nile Irrigation Systems"
 nd_egy_nile_irrigation_desc: "The ancient basin irrigation systems of the Nile, enhanced with saqiya water wheels and shaduf lifting devices."
 nd_egy_wikala_network: "Wikala Trade Network"
 nd_egy_wikala_network_desc: "A network of urban caravanserais providing lodging, storage, and commercial facilities for long-distance merchants."
 nd_egy_mamluk_administration: "Mamluk Administration"
 nd_egy_mamluk_administration_desc: "The sophisticated bureaucratic system developed by the Mamluk sultans to govern Egypt and its provinces."
 nd_egy_ancient_legacy: "Legacy of the Pharaohs"
 nd_egy_ancient_legacy_desc: "The weight of five thousand years of civilization lends Egypt an unmatched cultural authority and prestige."
 nd_egy_slave_soldier_tradition: "Slave Soldier Tradition"
 nd_egy_slave_soldier_tradition_desc: "The practice of training purchased slaves into elite soldiers, creating a military caste of unmatched loyalty and discipline."
 nd_egy_nile_fleet: "Nile River Fleet"
 nd_egy_nile_fleet_desc: "Shallow-draft galleys designed for patrol and transport along the Nile and in the coastal waters of the Mediterranean and Red Sea."
 nd_egy_azhar_revival: "Revival of Al-Azhar"
 nd_egy_azhar_revival_desc: "The restoration and expansion of Al-Azhar as the foremost center of Sunni Islamic scholarship in the world."
 nd_egy_cairo_madrasas: "Cairo Madrasas"
 nd_egy_cairo_madrasas_desc: "A network of religious schools founded and endowed by the Mamluk elite, spreading literacy and Islamic learning."
 nd_egy_cotton_cultivation: "Egyptian Cotton"
 nd_egy_cotton_cultivation_desc: "The cultivation and processing of Egypt's prized long-staple cotton, a crop that would become the foundation of the modern Egyptian economy."
 nd_egy_sultan_diplomacy: "Sultanic Diplomacy"
 nd_egy_sultan_diplomacy_desc: "The sophisticated diplomatic tradition of the Egyptian sultanate, balancing relations between Christendom, the Mongol khanates, and rival Muslim powers."
 nd_egy_granary_of_the_east: "Granary of the East"
 nd_egy_granary_of_the_east_desc: "Egypt's role as the breadbasket of the eastern Mediterranean, exporting grain to feed the cities of the region."
 nd_egy_suez_trade: "Suez Transit Trade"
 nd_egy_suez_trade_desc: "Control of the land bridge between the Mediterranean and the Red Sea, the shortest route between Europe and the riches of Asia."
 nd_egy_egyptian_sipahi: "Egyptian Sipahi"
 nd_egy_egyptian_sipahi_desc: "Heavy cavalry lancers in the tradition of the Ottoman sipahi, adapted to Egyptian conditions and the Mamluk heritage of mounted warfare."
 nd_egy_spice_entrepot: "Spice Entrepot"
 nd_egy_spice_entrepot_desc: "Egypt's position as the central warehouse for the spice trade, where pepper, cinnamon, and cloves change hands between Eastern producers and Western buyers."
 nd_egy_citadel_tradition: "Citadel Tradition"
 nd_egy_citadel_tradition_desc: "The tradition of monumental fortress construction dating back to Saladin's Citadel of Cairo, providing Egypt with formidable defensive capabilities."
 nd_egy_sugar_processing: "Nile Sugar Industry"
 nd_egy_sugar_processing_desc: "The processing of sugar cane grown in the fertile Nile delta, an industry that once made Egypt a major sugar exporter to the Mediterranean world."
 nd_egy_waqf_endowments: "Waqf Endowment System"
 nd_egy_waqf_endowments_desc: "The system of charitable religious endowments that funds mosques, madrasas, hospitals, and public works across Egypt."
 nd_egy_janissary_garrison: "Egyptian Janissary Garrison"
 nd_egy_janissary_garrison_desc: "Disciplined infantry garrison troops modeled on the Ottoman janissary system, maintaining order in Egypt's cities and fortresses."
 nd_egy_grand_bazaar: "Grand Bazaar of Cairo"
 nd_egy_grand_bazaar_desc: "The expansion of Cairo's Khan al-Khalili and surrounding bazaar districts into a sprawling commercial complex rivaling any market in the world."
 nd_egy_iltizam_system: "Iltizam Tax Farming"
 nd_egy_iltizam_system_desc: "The system of auctioning tax collection rights to the highest bidder, providing immediate revenue to the state at the cost of provincial autonomy."
 nd_egy_coffee_culture: "Egyptian Coffee Culture"
 nd_egy_coffee_culture_desc: "The coffeehouses of Cairo become centers of social life, commerce, and intellectual exchange, fueled by beans imported through the Red Sea trade."
 nd_egy_felucca_fleet: "Felucca Patrol Fleet"
 nd_egy_felucca_fleet_desc: "A fleet of fast, lateen-rigged feluccas for coastal patrol, river transport, and light naval operations."
 nd_egy_sufi_orders: "Egyptian Sufi Orders"
 nd_egy_sufi_orders_desc: "The powerful Sufi brotherhoods of Egypt — the Shadhiliyya, Ahmadiyya, and others — whose lodges provide spiritual guidance and social cohesion."
 nd_egy_nizam_jedid: "Nizam-i Jedid"
 nd_egy_nizam_jedid_desc: "The New Order — a modern professional army trained in European tactics, equipped with locally manufactured weapons, and led by academy-trained officers."
 nd_egy_cairo_arsenal: "Cairo Arsenal"
 nd_egy_cairo_arsenal_desc: "A state weapons manufactory producing muskets, cannons, and ammunition to equip the modernized Egyptian army."
 nd_egy_cotton_monopoly: "Cotton Monopoly"
 nd_egy_cotton_monopoly_desc: "State control of the lucrative long-staple cotton trade, with Egyptian cotton commanding premium prices in European textile markets."
 nd_egy_centralized_pashalik: "Centralized Pashalik"
 nd_egy_centralized_pashalik_desc: "The transformation of Egypt from a loosely governed Ottoman province into a centralized state with direct control over its provinces and resources."
 nd_egy_corvee_system: "Corvee Labor System"
 nd_egy_corvee_system_desc: "The mobilization of peasant labor for great public works — canals, dams, roads, and fortifications — the same system that once built the pyramids."
 nd_egy_bulaq_press: "Bulaq Printing Press"
 nd_egy_bulaq_press_desc: "The first printing press in the Arab world, established at Bulaq in Cairo, producing Arabic books on military science, medicine, and engineering."
 nd_egy_modern_army: "Modern Egyptian Army"
 nd_egy_modern_army_desc: "A fully modernized infantry force drilled in European line tactics, equipped with percussion-cap muskets, and organized into brigades and divisions."
 nd_egy_industrial_works: "Egyptian Industrialization"
 nd_egy_industrial_works_desc: "State-owned factories producing textiles, weapons, and processed goods, part of the ambitious program to transform Egypt into an industrial power."
 nd_egy_modern_medicine: "Egyptian School of Medicine"
 nd_egy_modern_medicine_desc: "A modern medical school in Cairo, training physicians in European surgical techniques and public health practices."
 nd_egy_suez_transit: "Suez Transit Revenues"
 nd_egy_suez_transit_desc: "The immense revenue generated by controlling the shortest trade route between Europe and Asia, as the isthmus becomes the busiest commercial corridor in the world."
 nd_egy_peasant_conscription: "Peasant Conscription"
 nd_egy_peasant_conscription_desc: "The mass conscription of Egyptian peasants into the national army, transforming the fellahin into soldiers of the state."
 nd_egy_national_awakening: "Egyptian National Awakening"
 nd_egy_national_awakening_desc: "The emergence of an Egyptian national consciousness distinct from Ottoman imperial identity, driven by shared language, history, and the experience of modernization."
 a_nd_egy_ghulam: "Mamluk Ghulam"
 a_nd_egy_ghulam_desc: "Elite slave-soldier cavalry trained from youth in the furusiyya arts of horsemanship, archery, and mounted combat. Their loyalty is to the sultan alone."
 n_nd_egy_nile_galley: "Nile Galley"
 n_nd_egy_nile_galley_desc: "A shallow-draft galley designed for patrol and transport along the Nile River and in the coastal waters of the eastern Mediterranean."
 a_nd_egy_sipahi: "Egyptian Sipahi"
 a_nd_egy_sipahi_desc: "Heavy cavalry lancers combining the Mamluk furusiyya tradition with Ottoman sipahi equipment, devastating in the charge."
 a_nd_egy_janissary: "Egyptian Janissary"
 a_nd_egy_janissary_desc: "Disciplined garrison infantry drilled in Ottoman methods, forming the backbone of Egypt's standing army."
 n_nd_egy_felucca: "Felucca"
 n_nd_egy_felucca_desc: "A fast, lateen-rigged vessel perfectly suited to the Nile, the Red Sea, and the coastal waters of Egypt. Used for patrol, trade, and light combat."
 a_nd_egy_nizam: "Nizam-i Jedid"
 a_nd_egy_nizam_desc: "Soldiers of the New Order — Egyptian infantry trained in European line tactics, drilled to fire by volley and maneuver in formation."
 a_nd_egy_modern_infantry: "Egyptian Line Infantry"
 a_nd_egy_modern_infantry_desc: "Modern professional infantry equipped with percussion-cap muskets and bayonets, organized into European-style brigades."
 a_nd_egy_fellahin_conscript: "Fellahin Conscript"
 a_nd_egy_fellahin_conscript_desc: "Egyptian peasant conscripts, numerous but less experienced than professional soldiers. What they lack in training they make up in sheer numbers."
 nd_egy_irrigation_works: "Nile Irrigation Works"
 nd_egy_irrigation_works_desc: "Basin irrigation systems, saqiya water wheels, and canal networks that transform the Nile floodplain into the most productive farmland in the region."
 nd_egy_wikala: "Wikala"
 nd_egy_wikala_desc: "An urban caravanserai providing secure lodging, storage, and commercial facilities for merchants traveling the trade routes through Egypt."
 nd_egy_mamluk_barracks: "Mamluk Barracks"
 nd_egy_mamluk_barracks_desc: "A training compound where slave soldiers are schooled in the arts of war, emerging as elite cavalry and loyal garrison troops."
 nd_egy_madrasa: "Cairo Madrasa"
 nd_egy_madrasa_desc: "A school of Islamic law and theology endowed by the ruling elite, part of the network of learning centered on Al-Azhar."
 nd_egy_grain_granary: "Nile Granary"
 nd_egy_grain_granary_desc: "A state granary storing the surplus of the Nile harvest, ensuring food security and enabling grain exports to the Mediterranean."
 nd_egy_red_sea_warehouse: "Red Sea Warehouse"
 nd_egy_red_sea_warehouse_desc: "A coastal storage facility for goods in transit between the Red Sea and the Mediterranean, the backbone of Egypt's role as trade intermediary."
 nd_egy_bazaar: "Grand Bazaar"
 nd_egy_bazaar_desc: "A sprawling market complex in the tradition of Khan al-Khalili, where merchants from three continents buy and sell goods under one roof."
 nd_egy_arsenal: "Cairo Arsenal"
 nd_egy_arsenal_desc: "A state weapons manufactory producing muskets, cannons, and gunpowder for the modernized Egyptian army."
 nd_egy_state_factory: "State Factory"
 nd_egy_state_factory_desc: "A government-owned manufacturing facility producing textiles, processed goods, and military equipment as part of Egypt's industrialization program."
 nd_egy_cotton_processing: "Egyptian Cotton Processing"
 nd_egy_cotton_processing_desc: "The weaving and finishing of Egypt's prized long-staple cotton into fine cloth for export."
 nd_egy_sugar_refining: "Nile Sugar Refining"
 nd_egy_sugar_refining_desc: "Operating sugar-pressing facilities along the Nile delta, using lumber for fuel, pottery containers for the refining process, and tools for the machinery."
 nd_egy_corvee_labor: "Corvee Labor"
 nd_egy_corvee_labor_desc: "The mobilization of peasant labor for public works projects — the same system that built the pyramids now builds canals and factories."
 levy_nd_egy_ghulam: "Mamluk Ghulam Levy"
 levy_nd_egy_ghulam_desc: "Elite slave-soldier cavalry raised through the traditional Mamluk system of military recruitment."
 levy_nd_egy_felucca: "Felucca Patrol Levy"
 levy_nd_egy_felucca_desc: "Light river and coastal patrol vessels crewed by Egyptian sailors and fishermen."
 levy_nd_egy_fellahin: "Fellahin Conscript Levy"
 levy_nd_egy_fellahin_desc: "Mass conscription of Egyptian peasants into infantry service, providing quantity over quality."
 nd_egy_irrigation_maintenance: "Irrigation Maintenance"
 nd_egy_irrigation_maintenance_desc: "Maintaining canals, dikes, and saqiya water wheels that channel the Nile's bounty to the fields."
 nd_egy_wikala_maintenance: "Wikala Upkeep"
 nd_egy_wikala_maintenance_desc: "Operating an urban caravanserai, providing storage and lodging for long-distance merchants."
 nd_egy_barracks_maintenance: "Barracks Upkeep"
 nd_egy_barracks_maintenance_desc: "Provisioning a Mamluk barracks with horses, weapons, and training equipment."
 nd_egy_madrasa_maintenance: "Madrasa Upkeep"
 nd_egy_madrasa_maintenance_desc: "Supplying a center of Islamic learning with manuscripts, paper, and scholarly materials."
 nd_egy_granary_maintenance: "Granary Upkeep"
 nd_egy_granary_maintenance_desc: "Maintaining grain storage facilities that preserve Egypt's agricultural surplus."
 nd_egy_warehouse_maintenance: "Warehouse Upkeep"
 nd_egy_warehouse_maintenance_desc: "Operating a Red Sea trade warehouse, storing goods in transit between the Indian Ocean and the Mediterranean."
 nd_egy_bazaar_maintenance: "Bazaar Upkeep"
 nd_egy_bazaar_maintenance_desc: "Maintaining the stalls, warehouses, and trade infrastructure of a grand bazaar."
 nd_egy_arsenal_maintenance: "Arsenal Upkeep"
 nd_egy_arsenal_maintenance_desc: "Producing and storing weapons, ammunition, and military equipment."
 nd_egy_factory_maintenance: "Cotton Textile Production"
 nd_egy_factory_maintenance_desc: "Processing Egyptian cotton into finished cloth using coal-powered machinery in state-owned factories."
 STATIC_MODIFIER_NAME_nd_egy_azhar_authority: "Al-Azhar's Authority"
 STATIC_MODIFIER_DESC_nd_egy_azhar_authority: "Al-Azhar's renewed prestige draws scholars from across the Islamic world, lending religious legitimacy to the state and fostering a culture of learning and jurisprudence."
 STATIC_MODIFIER_NAME_nd_egy_economic_modernization: "Economic Modernization"
 STATIC_MODIFIER_DESC_nd_egy_economic_modernization: "The New Order extends beyond the barracks. Factories, modern workshops, and reformed trade practices transform Egypt's economy alongside its military."
 nd_egy_formed_tt: "Egypt has been formed"
 nd_egy_path_a_tt: "Chose Sword of the Sultan"
 nd_egy_path_b_tt: "Chose Garden of the Nile"
 nd_egy_destiny: "Egyptian Destiny"
 nd_egy_destiny_desc: "Egypt stands at a crossroads. Shall the pharaohs' heirs pursue the sword or the plough? The destiny of the Nile awaits."
 nd_egy_dest_levant: "Reconquest of the Levant"
 nd_egy_dest_levant_desc: "Secure Jerusalem and Damascus to restore Egypt's dominion over the eastern Mediterranean lands that the Mamluks once held."
 nd_egy_dest_heart_islam: "Heart of Islam"
 nd_egy_dest_heart_islam_desc: "Take custody of the Holy Cities and seize Baghdad, seat of the ancient caliphate, to become the undisputed center of the Islamic world."
 nd_egy_dest_sultan_domain: "The Sultan's Domain"
 nd_egy_dest_sultan_domain_desc: "Extend Egyptian sovereignty from Aleppo to Aden, commanding every route between the Mediterranean and the Indian Ocean under the sultan's banner."
 nd_egy_dest_nile_bounty: "Nile's Bounty"
 nd_egy_dest_nile_bounty_desc: "Embrace modern banking, develop the cotton trade, and transform the Nile valley into an engine of prosperity unmatched in the region."
 nd_egy_dest_crossroads: "Crossroads of Commerce"
 nd_egy_dest_crossroads_desc: "Secure the Red Sea coast at Massawa and develop Egypt into the indispensable trade link between Europe and Asia."
 nd_egy_dest_jewel_orient: "Jewel of the Orient"
 nd_egy_dest_jewel_orient_desc: "Industrialize the Egyptian economy, making the Nile valley the most developed and prosperous land between Europe and India."
 nd_egy.5.t: "Egypt's Destiny Beckons"
 nd_egy.5.d: "The formation of Egypt is complete, but the work has only begun. Before us lie two roads — one paved with the victories of the sword, the other lined with the gold of commerce and the green of the Nile's harvest. Our ancestors built monuments that have endured five thousand years. Whatever path we choose, let our deeds echo just as long."
 nd_egy.5.a: "Our destiny is written in the stars above the Nile."
 nd_egy.6.t: "The Eagle Returns to the Levant"
 nd_egy.6.d: "Egyptian banners fly once more over the holy city of Jerusalem and the ancient walls of Damascus. The Mamluk sultans of old — Baybars, Qalawun, al-Nasir — would recognize the ambition that drives us. The Levantine coast, that contested shore where Crusaders and Mongols once broke against Egyptian resolve, is ours again. Our garrison commanders report the cities secured, the trade routes reopened, and the local population adjusting to Egyptian administration. The sultan's writ runs from the Nile delta to the Syrian steppe."
 nd_egy.6.a: "The Levant bows to the sultan once more."
 nd_egy.7.t: "The Nile's Promise Fulfilled"
 nd_egy.7.d: "Egyptian cotton now commands premium prices in the markets of the world, and our banking houses extend credit across the Mediterranean. The transformation is remarkable — where once we relied on the sword and the levy, now we build with capital and commerce. The Nile's bounty, channeled through modern financial instruments, generates wealth that no army alone could seize. Foreign merchants compete for the privilege of trading in our markets, and Egyptian bills of exchange circulate from Venice to Isfahan."
 nd_egy.7.a: "Prosperity flows as surely as the Nile."
 nd_egy.8.t: "Guardian of the Two Sanctuaries"
 nd_egy.8.d: "The conquest of Mecca and Baghdad places Egypt at the very heart of the Islamic world. The custodianship of the Holy Cities confers a religious authority that transcends mere temporal power, while control of Baghdad — once the seat of the Abbasid caliphate — stakes Egypt's claim to be the successor of that ancient institution. The question now is how to wield this extraordinary position. Shall we emphasize our role as military guardian, projecting force to protect the faithful? Or shall we claim the mantle of caliphal legitimacy, using diplomacy and prestige to build a network of loyal subjects?"
 nd_egy.8.a: "We shall guard the faithful with our armies."
 nd_egy.8.b: "We claim the legacy of the Abbasid caliphs."
 nd_egy.9.t: "The Red Sea Question"
 nd_egy.9.d: "With Egypt's trade infrastructure flourishing and the Red Sea coast under our control, we stand at a historic juncture. The commerce flowing between Europe and Asia must pass through our hands — but how shall we profit from this position? We could dominate the sea lanes directly, building a naval presence that controls every vessel from Suez to the Indian Ocean. Or we could focus on the cotton and commodity exchanges, making Egypt the world's indispensable clearing house where Eastern goods meet Western capital. Each approach promises wealth, but of a different character."
 nd_egy.9.a: "Command the sea lanes from Suez to Aden."
 nd_egy.9.b: "Make Egypt the world's cotton exchange."
 nd_egy.10.t: "The Sultan's Triumph"
 nd_egy.10.d: "From Aleppo to Aden, the sultan's domain stretches across the ancient heartlands of civilization. Egypt commands the trade routes, the holy cities, and the great crossroads of three continents. No power in the region can match our reach. Yet empire brings choices — shall we forge our dominion into an iron instrument of conquest, maintaining vast armies and imposing our will through sheer military supremacy? Or shall we consolidate our gains, establishing a Pax Aegyptia where Egyptian intelligence and garrisons maintain order while our armies rest?"
 nd_egy.10.a: "Forge the iron fist of the sultan."
 nd_egy.10.b: "Establish the peace of Egypt."
 nd_egy.11.t: "The Jewel of the Orient"
 nd_egy.11.d: "Egypt has achieved what few nations dare to dream. An industrialized economy, a vast developed territory, and wealth that would make the pharaohs envious. The Nile valley hums with the machinery of progress — factories, railways, modern irrigation works transforming ancient soil into the most productive farmland on earth. Now we face the ultimate question: shall Egypt use its wealth and sophistication to project influence outward, reaching toward new horizons with the confidence of a revived civilization? Or shall we turn our gaze to the isthmus of Suez, that narrow strip of land that could, if pierced, transform Egypt into the indispensable link between the oceans of the world?"
 nd_egy.11.a: "Egypt shall reach toward new horizons."
 nd_egy.11.b: "The canal shall unite the seas of the world."
 STATIC_MODIFIER_NAME_nd_egy_dest_guardian_holy: "Guardian of the Holy Cities"
 STATIC_MODIFIER_DESC_nd_egy_dest_guardian_holy: "Egypt's armies stand watch over the sacred sites of Islam, projecting military power to defend the faithful and enforce the sultan's authority across the Middle East."
 STATIC_MODIFIER_NAME_nd_egy_dest_abbasid_heir: "Heir of the Abbasids"
 STATIC_MODIFIER_DESC_nd_egy_dest_abbasid_heir: "Egypt claims the diplomatic and spiritual legacy of the Abbasid caliphate, wielding religious prestige and political influence to bind the Islamic world to Cairo's will."
 STATIC_MODIFIER_NAME_nd_egy_dest_iron_sultan: "The Iron Sultan"
 STATIC_MODIFIER_DESC_nd_egy_dest_iron_sultan: "Egypt's military machine is the terror of the region — vast armies, impregnable fortresses, and an iron will that crushes all opposition, though the cost strains the treasury."
 STATIC_MODIFIER_NAME_nd_egy_dest_pax_aegyptia: "Pax Aegyptia"
 STATIC_MODIFIER_DESC_nd_egy_dest_pax_aegyptia: "Egyptian intelligence networks and garrison forces maintain order across the sultan's vast domain, ensuring stability through watchfulness rather than conquest, though imperial complacency may yet take root."
 STATIC_MODIFIER_NAME_nd_egy_dest_red_sea_master: "Master of the Red Sea"
 STATIC_MODIFIER_DESC_nd_egy_dest_red_sea_master: "Egypt's naval dominance of the Red Sea ensures that no vessel passes between the Mediterranean and the Indian Ocean without Egyptian permission and Egyptian profit."
 STATIC_MODIFIER_NAME_nd_egy_dest_cotton_exchange: "Cotton Exchange"
 STATIC_MODIFIER_DESC_nd_egy_dest_cotton_exchange: "Egyptian cotton commands the world market, and Cairo's commodity exchanges set the prices that merchants from Lisbon to Calcutta must accept."
 STATIC_MODIFIER_NAME_nd_egy_dest_pharaoh_reborn: "Pharaoh Reborn"
 STATIC_MODIFIER_DESC_nd_egy_dest_pharaoh_reborn: "Egypt reaches outward with the confidence of a revived civilization, projecting influence far beyond the Nile valley, though maintaining such grandeur demands ever greater court expenditure."
 STATIC_MODIFIER_NAME_nd_egy_dest_suez_vision: "Vision of Suez"
 STATIC_MODIFIER_DESC_nd_egy_dest_suez_vision: "Egypt transforms itself into the world's indispensable maritime corridor, welcoming ships of every nation through its waters and growing rich on the transit of global commerce."
 nd_egy_sultans_citadel: "Sultan's Citadel"
 nd_egy_sultans_citadel_desc: "A monumental fortress-palace in the tradition of Saladin's Citadel, serving as the military and administrative heart of the sultan's domain."
 nd_egy_suez_canal_office: "Suez Canal Office"
 nd_egy_suez_canal_office_desc: "A grand administrative complex managing the flow of international commerce through Egypt's transit corridor, the economic engine of the modern Egyptian state."
 nd_egy_citadel_maintenance: "Citadel Garrison"
