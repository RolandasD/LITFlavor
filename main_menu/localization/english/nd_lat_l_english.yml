l_english:
 STATIC_MODIFIER_NAME_nd_lat_frankish_feudal_order: "Frankish Feudal Order"
 STATIC_MODIFIER_DESC_nd_lat_frankish_feudal_order: "The Latin Empire has been organized along the lines of Western feudalism. Crusader lords hold their fiefs by military service, bound by the customs of France and Flanders. The emperor rules as first among equals, his authority resting on the strength of mounted knights and the loyalty of his vassals."
 STATIC_MODIFIER_NAME_nd_lat_venetian_partnership: "Venetian Partnership"
 STATIC_MODIFIER_DESC_nd_lat_venetian_partnership: "The Serene Republic has been embraced as the empire's indispensable partner. Venetian merchants control the harbors, the fleets, and the flow of goods through Constantinople. The Podesta sits at the emperor's council, and the golden thread of commerce binds the empire together more surely than any feudal oath."
 STATIC_MODIFIER_NAME_nd_lat_romania_divided: "Romania Divided"
 STATIC_MODIFIER_DESC_nd_lat_romania_divided: "The territories of the old Roman Empire have been parceled out among the conquerors, each lord consolidating his hold over the Greek lands."
 STATIC_MODIFIER_NAME_nd_lat_codified_law: "Codified Law of Romania"
 STATIC_MODIFIER_DESC_nd_lat_codified_law: "The Assizes of Romania have established a common legal framework across the Latin lordships, bringing order to the patchwork of Frankish, Venetian, and Byzantine legal traditions."
 nd_lat.1.t: "The Latin Empire"
 nd_lat.1.d: "Constantinople has fallen -- not to the infidel, but to the soldiers of the Cross. The greatest city in Christendom now belongs to the Latin lords who breached its ancient walls. Emperor and Doge, knight and merchant, must now decide what kind of empire will rise from the ashes of Byzantium.\n\nThe feudal lords of France, Flanders, and the Rhineland look to organize these conquered lands as they would any Western kingdom -- fiefs parceled out, vassals bound by oath, the emperor supreme in war. But the Venetians who made this conquest possible demand their share: the harbors, the trade routes, the warehouses that made Constantinople the crossroads of the world.\n\nTwo visions compete for the soul of this new empire. Will it be a kingdom of knights, or an empire of merchants?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_lat.1.a: "Rule as the Franks rule -- by lance, by oath, by feudal law"
 nd_lat.1.b: "Embrace Venice -- trade shall bind this empire together"
 nd_lat.2.t: "The Partitio Romaniae"
 nd_lat.2.d: "The conquered territories of Romania have been formally divided among the victors. By the terms of the partition treaty agreed before the walls were even breached, the emperor receives one quarter of all lands, Venice claims three-eighths -- including the choicest harbors and islands -- and the remaining three-eighths are distributed among the crusader barons as feudal fiefs.\n\nThe Duchy of Athens, the Principality of Achaea, the Kingdom of Thessalonica, and a constellation of island lordships now dot the map of Greece. Each lord rules his portion with the customs of his homeland, creating a mosaic of Western feudalism overlaid on ancient Greek soil."
 nd_lat.2.a: "The lands of Romania are ours to govern"
 nd_lat.3.t: "The Assizes of Romania"
 nd_lat.3.d: "A comprehensive legal code has been compiled to govern the feudal relations of the Latin lords in Greece. Drawing from the customs of Jerusalem, the laws of Champagne, and the practices of the Morea, the Assizes of Romania establish the rights and obligations of every vassal, from the humblest sergeant to the greatest baron.\n\nThe code addresses land tenure, military service, inheritance, and the administration of justice. It creates a common legal language for lords who came from every corner of Western Europe, binding them into a coherent feudal society despite their diverse origins."
 nd_lat.3.a: "Let the law of Romania be known to all"
 nd_lat_formed_tt: "The Latin Empire has been established"
 nd_lat_path_a_tt: "The Frankish feudal path has been chosen"
 nd_lat_path_b_tt: "The Venetian partnership path has been chosen"
 nd_lat_partitio_romaniae: "Partitio Romaniae"
 nd_lat_partitio_romaniae_desc: "The formal partition of the Byzantine Empire's territories among the Latin conquerors, establishing a feudal mosaic of crusader states across Greece and Thrace."
 nd_lat_frankish_chivalry: "Frankish Chivalry"
 nd_lat_frankish_chivalry_desc: "The heavy cavalry tradition of the French and Flemish crusader knights, whose devastating mounted charge decided battles from Adrianople to the Peloponnese."
 nd_lat_latin_patriarchate: "Latin Patriarchate"
 nd_lat_latin_patriarchate_desc: "The establishment of a Catholic patriarch in Constantinople, replacing the Orthodox hierarchy and asserting Roman ecclesiastical authority over the Greek churches."
 nd_lat_feudal_levy_system: "Feudal Levy System"
 nd_lat_feudal_levy_system_desc: "The obligation of every Latin vassal to provide armed men for the emperor's campaigns, binding the feudal lords of Romania to military service."
 nd_lat_assizes_tradition: "Assizes of Romania"
 nd_lat_assizes_tradition_desc: "The comprehensive feudal legal code governing the Latin lordships of Greece, codifying Western customs of land tenure, military service, and justice in an Eastern setting."
 nd_lat_venetian_quarter: "Venetian Quarter"
 nd_lat_venetian_quarter_desc: "The Venetian merchant quarter in Constantinople, a self-governing enclave where the commerce of East and West flows through Venetian warehouses and counting houses."
 nd_lat_greek_silk_revival: "Greek Silk Revival"
 nd_lat_greek_silk_revival_desc: "The Latin lords recognized the value of the Byzantine silk industry and encouraged its continuation, blending Greek artisanship with access to Western markets."
 nd_lat_pronoiar_system: "Pronoiar System"
 nd_lat_pronoiar_system_desc: "The Latins adapted the Byzantine pronoia system, granting revenue-producing lands to mounted soldiers in exchange for military service -- a hybrid of Western feudalism and Eastern administration."
 nd_lat_golden_horn_trade: "Golden Horn Commerce"
 nd_lat_golden_horn_trade_desc: "The Golden Horn harbor remains the crossroads of Mediterranean trade, connecting the Black Sea trade routes with the markets of Italy, Egypt, and the Levant."
 nd_lat_archipelago_lordships: "Archipelago Lordships"
 nd_lat_archipelago_lordships_desc: "The Duchy of the Archipelago and the scattered Latin lordships of the Aegean islands, where Venetian and Frankish lords rule from fortified castles overlooking the sea."
 nd_lat_latin_greek_synthesis: "Latin-Greek Synthesis"
 nd_lat_latin_greek_synthesis_desc: "Over generations, the Latin lords of Greece absorbed elements of Byzantine culture -- the Greek language, Orthodox customs, and Eastern administrative practices blended with Western feudal traditions."
 nd_lat_strait_control: "Strait Control"
 nd_lat_strait_control_desc: "Control of the Bosphorus and Dardanelles straits, the narrow passages between Europe and Asia that command the flow of trade and armies between the Mediterranean and the Black Sea."
 nd_lat_aegean_fleet: "Aegean Fleet"
 nd_lat_aegean_fleet_desc: "A fleet of galleys adapted from the Byzantine dromon tradition, purpose-built for the island-dotted waters of the Aegean where speed and maneuverability matter more than heavy armament."
 nd_lat_confessional_unity: "Confessional Unity"
 nd_lat_confessional_unity_desc: "Efforts to bring the Greek Orthodox population into union with Rome, through persuasion, conversion, and the authority of the Latin Patriarchate."
 nd_lat_bosphorus_arsenal: "Bosphorus Arsenal"
 nd_lat_bosphorus_arsenal_desc: "A naval arsenal on the shores of the Bosphorus, drawing on centuries of Byzantine shipbuilding expertise to maintain the empire's fleet."
 nd_lat_frankish_mercenaries: "Frankish Mercenary Tradition"
 nd_lat_frankish_mercenaries_desc: "The Latin Empire's perpetual manpower shortage created a dependence on mercenary companies -- Catalan, Aragonese, Italian, and French soldiers of fortune willing to fight for pay."
 nd_lat_latin_administration: "Latin Administration"
 nd_lat_latin_administration_desc: "The gradual development of a coherent administrative system blending Byzantine bureaucratic practices with Western feudal governance."
 nd_lat_renewed_imperium: "Renewed Imperium"
 nd_lat_renewed_imperium_desc: "The Latin Empire reasserts its claim as the legitimate successor to Rome, drawing prestige from its possession of Constantinople and the ancient imperial regalia."
 nd_lat_mediterranean_arsenal: "Mediterranean Arsenal"
 nd_lat_mediterranean_arsenal_desc: "The empire's naval capacity reaches new heights with the galleass -- a heavy-gunned galley combining Venetian naval architecture with Byzantine seafaring expertise."
 nd_lat_hellenistic_renaissance: "Hellenistic Renaissance"
 nd_lat_hellenistic_renaissance_desc: "A cultural flowering as Latin scholars rediscover the Greek philosophical and scientific heritage preserved in Constantinople's libraries and monasteries."
 nd_lat_balkan_consolidation: "Balkan Consolidation"
 nd_lat_balkan_consolidation_desc: "The systematic integration of the Balkan territories into the imperial administration, replacing the patchwork of semi-independent lordships with direct governance."
 nd_lat_constitutional_empire: "Constitutional Empire"
 nd_lat_constitutional_empire_desc: "The evolution of the Latin Empire's governance into a constitutional framework, balancing imperial authority with the rights of the feudal lords and merchant communes."
 nd_lat_eastern_modernization: "Eastern Modernization"
 nd_lat_eastern_modernization_desc: "The adoption of modern industrial and manufacturing techniques at the Bosphorus Arsenal, transforming it from a traditional shipyard into a naval supplies manufactory."
 nd_lat_crossroads_hegemony: "Crossroads Hegemony"
 nd_lat_crossroads_hegemony_desc: "The Latin Empire leverages its position at the crossroads of Europe and Asia to dominate Mediterranean commerce, controlling the flow of goods between East and West."
 nd_lat_latin_legacy: "Latin Legacy"
 nd_lat_latin_legacy_desc: "The enduring military traditions of the Latin Empire -- a synthesis of Frankish heavy cavalry tactics, Byzantine defensive doctrine, and modern disciplined warfare."
 a_nd_lat_frankish_knight: "Frankish Knight"
 a_nd_lat_frankish_knight_desc: "Armored crusader knights from the heartlands of France and Flanders, whose devastating mounted charge carried the Fourth Crusade to the walls of Constantinople."
 a_nd_lat_pronoiar: "Pronoiar"
 a_nd_lat_pronoiar_desc: "Mounted soldiers granted pronoia estates in exchange for military service, blending the Byzantine land-grant tradition with Western knightly combat techniques."
 n_nd_lat_dromon: "Latin Dromon"
 n_nd_lat_dromon_desc: "A war galley descended from the Byzantine dromon tradition, adapted by Latin shipwrights for patrol and combat in the narrow waters of the Aegean and Bosphorus."
 n_nd_lat_galleass: "Latin Galleass"
 n_nd_lat_galleass_desc: "A heavy war galley mounting substantial artillery, combining Venetian hull design with Byzantine seafaring traditions to create a formidable vessel for eastern Mediterranean warfare."
 nd_lat_crusader_tower: "Crusader Tower"
 nd_lat_crusader_tower_desc: "A fortified tower house in the Frankish style, built to secure conquered territory and serve as the seat of a Latin lord."
 nd_lat_tower_maintenance: "Tower Garrison"
 nd_lat_tower_maintenance_desc: "The garrison and upkeep of a Frankish tower house, requiring stone for repairs, timber for scaffolding, and weapons for the defenders."
 nd_lat_fondaco: "Fondaco"
 nd_lat_fondaco_desc: "A Venetian-style trading house combining warehouse, residence, and marketplace, where merchants from across the Mediterranean conduct their business."
 nd_lat_fondaco_trade: "Silk Trade"
 nd_lat_fondaco_trade_desc: "The processing and export of silk and dyed textiles through the Venetian trading network."
 nd_lat_fondaco_maintenance: "Trading House Upkeep"
 nd_lat_fondaco_maintenance_desc: "The ongoing costs of maintaining a trading house -- cloth for display, paper for accounts, and lumber for repairs."
 nd_lat_island_lordship: "Island Lordship"
 nd_lat_island_lordship_desc: "A fortified coastal estate on one of the Aegean islands, where a Latin lord commands both soldiers and sailors from his castle above the harbor."
 nd_lat_lordship_maintenance: "Lordship Garrison"
 nd_lat_lordship_maintenance_desc: "The maintenance of an island lordship's garrison and harbor facilities."
 nd_lat_mercenary_hall: "Mercenary Hall"
 nd_lat_mercenary_hall_desc: "A gathering place and barracks for the Western mercenary companies that form a crucial supplement to the Latin Empire's limited feudal manpower."
 nd_lat_mercenary_maintenance: "Mercenary Provisioning"
 nd_lat_mercenary_maintenance_desc: "The weapons, horses, and provisions required to maintain a standing mercenary garrison."
 nd_lat_arsenal: "Bosphorus Arsenal"
 nd_lat_arsenal_desc: "A major naval shipyard on the shores of the Bosphorus, drawing on centuries of Byzantine and Venetian shipbuilding expertise."
 nd_lat_arsenal_maintenance: "Arsenal Operations"
 nd_lat_arsenal_maintenance_desc: "The timber, naval supplies, and tar required to keep the arsenal's shipways active and the fleet in repair."
 nd_lat_arsenal_shipwright: "Naval Supplies Production"
 nd_lat_arsenal_shipwright_desc: "The arsenal's workshops produce ropes, canvas, and fittings for the fleet from raw lumber and iron."
 nd_lat_latin_academy: "Latin Academy"
 nd_lat_latin_academy_desc: "An institution of learning where Latin and Greek scholarship meet, preserving the intellectual heritage of both traditions."
 nd_lat_academy_maintenance: "Academy Upkeep"
 nd_lat_academy_maintenance_desc: "The paper, books, and glass for windows needed to maintain a center of learning."
 nd_lat_destiny: "Destiny of the Latin Empire"
 nd_lat_destiny_desc: "With Constantinople secured and the empire proclaimed, the Latin lords must now decide the shape of their destiny -- whether by the sword or by the ledger."
 nd_lat_dest_greek_conquest: "Conquest of Greece"
 nd_lat_dest_greek_conquest_desc: "The crusader lords must bring all of Greece under the Latin banner. Athens, the jewel of antiquity, and Thessaloniki, gateway to Macedonia, must both submit to Frankish rule."
 nd_lat_dest_anatolian_march: "The Anatolian March"
 nd_lat_dest_anatolian_march_desc: "With Greece secured, the Latin Empire turns its gaze across the straits. The ancient cities of Bursa and Konya -- seats of Turkish power -- must fall to extend the empire into Asia Minor."
 nd_lat_dest_new_jerusalem: "The New Jerusalem"
 nd_lat_dest_new_jerusalem_desc: "The ultimate crusader ambition: reclaim the Holy Land itself. Antioch and Jerusalem, lost prizes of the First Crusade, must be brought under Latin imperial protection. This is the culmination of two centuries of crusading."
 nd_lat_dest_aegean_dominion: "Aegean Dominion"
 nd_lat_dest_aegean_dominion_desc: "The Venetian vision demands control of the sea lanes. The Duchy of Naxos in the Cyclades and the great island of Crete must be secured to create an unbroken chain of trading posts across the Aegean."
 nd_lat_dest_silk_monopoly: "The Silk Monopoly"
 nd_lat_dest_silk_monopoly_desc: "Constantinople's silk trade was once the envy of the world. Restore the capital's market as the great emporium of luxury goods, where silk from the East flows through Latin hands to Western buyers."
 nd_lat_dest_eastern_emporium: "The Eastern Emporium"
 nd_lat_dest_eastern_emporium_desc: "Extend the trading network to its fullest reach. Kaffa on the Black Sea and Smyrna on the Aegean coast will anchor a commercial empire spanning two seas, backed by modern banking institutions."
 nd_lat.4.t: "Destiny of the Latin Empire"
 nd_lat.4.d: "The Latin Empire stands at a crossroads. Constantinople is ours, but the empire's future remains unwritten. Will the sons of the crusaders push ever eastward, as their fathers intended? Or will the merchant princes of Venice chart a course through commerce and control of the seas?\n\nThe choice we made at the empire's founding now bears fruit. Our destiny beckons."
 nd_lat.4.a: "Our destiny awaits"
 nd_lat.5.t: "The Conquest of Greece"
 nd_lat.5.d: "Athens and Thessaloniki fly the banner of the Latin Empire. The Duchy of Athens, once a prize fought over by Burgundian and Catalan adventurers, now answers to Constantinople. The Kingdom of Thessalonica, briefly held and quickly lost in the first years of the conquest, has been recovered and secured.\n\nAll of Greece, from the Peloponnese to Macedonia, acknowledges Latin overlordship. The crusader states are no longer isolated outposts -- they form a coherent feudal realm."
 nd_lat.5.a: "Greece is ours -- now we look to greater conquests"
 nd_lat.6.t: "The March into Anatolia"
 nd_lat.6.d: "The banners of the Latin Empire now fly over the citadels of Bursa and Konya. What the Byzantine emperors struggled for centuries to hold, the Frankish knights have seized in a generation. The rich plains of Anatolia, once the heartland of Roman power, are open to Latin settlement and exploitation.\n\nBut the march has stretched our resources thin. Two approaches present themselves: press on with crusading zeal, or consolidate our gains with careful administration."
 nd_lat.6.a: "Press onward -- God wills it!"
 nd_lat.6.b: "Consolidate -- hold what we have taken"
 nd_lat.7.t: "The New Jerusalem"
 nd_lat.7.d: "The Cross stands triumphant over Antioch and Jerusalem. The dream that launched a thousand ships and sent a hundred thousand men into the wilderness of the East has been realized under the banner of the Latin Empire. The Holy Sepulchre itself is under our protection.\n\nThis is more than a military achievement -- it is a vindication of the entire crusading ideal. The question now is whether this empire will be a holy kingdom consecrated to God, or a secular imperium in the Roman tradition."
 nd_lat.7.a: "A kingdom consecrated to God"
 nd_lat.7.b: "A new Rome, heir to the Caesars"
 nd_lat.8.t: "Dominion of the Aegean"
 nd_lat.8.d: "The Duchy of Naxos and the island of Crete now anchor the Venetian trading network in the Aegean. From Candia's great harbor to the whitewashed towers of Naxos, Latin merchants control the sea lanes that connect Constantinople to the wider Mediterranean.\n\nEvery ship that passes through these waters pays tribute to the empire. The Aegean has become a Latin lake."
 nd_lat.8.a: "The sea is ours to command"
 nd_lat.9.t: "The Silk Monopoly"
 nd_lat.9.d: "Constantinople has reclaimed its ancient role as the world's greatest marketplace for luxury goods. Silk from China and Persia, spices from India, furs from the north -- all flow through our markets, taxed and traded by Latin merchants.\n\nThe question before us is how to best exploit this windfall. We could invest in the production of finished goods, transforming raw silk into fine cloth. Or we could focus on customs revenues, taxing the flow of goods through our harbors."
 nd_lat.9.a: "Invest in our workshops and looms"
 nd_lat.9.b: "Tax the trade that flows through us"
 nd_lat.10.t: "The Eastern Emporium"
 nd_lat.10.d: "From Kaffa on the Black Sea to Smyrna on the Aegean coast, the Latin Empire's trading network spans two seas and a dozen peoples. Our merchants trade in every port, our bankers finance every venture, our ships carry the goods of three continents.\n\nWe stand at the crossroads of the world. Shall we focus on the rich Levantine trade routes to the south, or turn northward to dominate the Black Sea and its hinterland?"
 nd_lat.10.a: "The Levant is our future"
 nd_lat.10.b: "The Black Sea shall be our domain"
 STATIC_MODIFIER_NAME_nd_lat_dest_march_zeal: "Crusading Zeal"
 STATIC_MODIFIER_DESC_nd_lat_dest_march_zeal: "The fervor of the holy war drives the Latin armies deeper into Anatolia, accepting economic disruption as the price of righteous conquest."
 STATIC_MODIFIER_NAME_nd_lat_dest_march_pragmatism: "Anatolian Consolidation"
 STATIC_MODIFIER_DESC_nd_lat_dest_march_pragmatism: "A methodical approach to holding the conquered Anatolian territories, reducing military costs while building a sustainable garrison system."
 STATIC_MODIFIER_NAME_nd_lat_dest_holy_crusade: "Holy Crusade Triumphant"
 STATIC_MODIFIER_DESC_nd_lat_dest_holy_crusade: "The recovery of the Holy Land has galvanized Christendom. Pilgrims and warriors flock to the Latin banner, inspired by the empire's sacred mission."
 STATIC_MODIFIER_NAME_nd_lat_dest_latin_imperium: "Latin Imperium"
 STATIC_MODIFIER_DESC_nd_lat_dest_latin_imperium: "The Latin Empire styles itself as the true heir to Rome -- a secular imperial power commanding respect through prestige, law, and diplomacy."
 STATIC_MODIFIER_NAME_nd_lat_dest_silk_exchange: "Constantinople Silk Exchange"
 STATIC_MODIFIER_DESC_nd_lat_dest_silk_exchange: "The empire's investment in silk production and processing has created a thriving luxury goods industry, though the focus on trade comes at a cost to naval readiness."
 STATIC_MODIFIER_NAME_nd_lat_dest_customs_revenue: "Crossroads Customs"
 STATIC_MODIFIER_DESC_nd_lat_dest_customs_revenue: "A systematic customs regime taxes the immense flow of goods through Constantinople's harbors, funding ambitious construction projects across the empire."
 STATIC_MODIFIER_NAME_nd_lat_dest_levantine_network: "Levantine Trading Network"
 STATIC_MODIFIER_DESC_nd_lat_dest_levantine_network: "A sprawling commercial network connecting the ports of the Levant to the markets of Europe, generating vast wealth but diverting resources from scholarly pursuits."
 STATIC_MODIFIER_NAME_nd_lat_dest_black_sea_hegemony: "Black Sea Hegemony"
 STATIC_MODIFIER_DESC_nd_lat_dest_black_sea_hegemony: "The Latin Empire dominates the Black Sea, controlling the flow of grain, furs, and slaves from the northern shores through its network of trading colonies."
 nd_lat_holy_sepulchre: "Holy Sepulchre Commandery"
 nd_lat_holy_sepulchre_desc: "A fortified religious-military commandery dedicated to the defense of the Holy Land, garrisoned by knights sworn to protect the sacred sites of Christendom."
 nd_lat_commandery_maintenance: "Commandery Garrison"
 nd_lat_commandery_maintenance_desc: "The weapons, stone for fortifications, and beeswax for the chapel that maintain a commandery of crusader knights."
 nd_lat_emporion: "Emporion"
 nd_lat_emporion_desc: "A grand trading entrepot where merchants from across the Mediterranean and beyond gather to buy, sell, and exchange goods under the protection of Latin law."
 nd_lat_emporion_maintenance: "Entrepot Operations"
 nd_lat_emporion_maintenance_desc: "The cloth, paper, lumber, and salt needed to operate a major international trading post."
