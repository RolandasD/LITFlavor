l_english:
 STATIC_MODIFIER_NAME_nd_cel_tir_na_saor: "Tir na Saor"
 STATIC_MODIFIER_DESC_nd_cel_tir_na_saor: "The Celtic Union is built not on conquest but on shared law. From the Brehon courts of Ireland to the cyfraith of Wales and the laws of the Bretons, the Celtic peoples have chosen confederation over subjugation — a land where each nation keeps its tongue and customs within a greater whole."
 STATIC_MODIFIER_NAME_nd_cel_claidheamh_mor: "Claidheamh Mor"
 STATIC_MODIFIER_DESC_nd_cel_claidheamh_mor: "The Great Sword is drawn. From Gallowglass axemen to Highland claymore-wielders, from Breton crossbowmen to Cornish tinners defending their mines, the Celtic peoples have forged a military brotherhood that turns every hillside into a fortress and every moor into a killing ground."
 nd_cel.1.t: "The Celtic Union"
 nd_cel.1.d: "The impossible has been achieved. From the mist-shrouded shores of Brittany to the wind-swept Hebrides, from the green valleys of Wales to the stone walls of Connacht, the Celtic peoples stand united for the first time since the Romans drove them to the western edges of the world.\n\nBut unity is not uniformity. The Gaels and Brythons, the Cornish and Bretons — each bring their own laws, their own songs, their own way of war. The question now is what binds this union together: shared law and cultural kinship, allowing each nation its own character within a confederal embrace? Or the brotherhood of arms, a Celtic military tradition that has terrified empires from Rome to London?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_cel.1.a: "Tir na Saor — We are bound by law, not the sword."
 nd_cel.1.b: "Claidheamh Mor — Let the Great Sword speak for all Celts."
 nd_cel.2.t: "Codification of the Brehon Laws"
 nd_cel.2.d: "The ancient Brehon legal tradition, preserved through centuries of oral transmission and monastic copying, has now been systematically codified for the Celtic Union. Where English common law relied on precedent and royal authority, the Brehon system was built on arbitration, restitution, and communal consensus.\n\nScholars have gathered the scattered texts — the Senchus Mor, the Book of Aicill, the laws of hospitality and kinship — and harmonized them with Welsh cyfraith and Breton coutumes into a unified Celtic legal code. The Brehon courts now sit in every town, their judges trained in a tradition older than any parliament."
 nd_cel.2.a: "Let justice flow from the wisdom of our ancestors."
 nd_cel.3.t: "The Insular Art Revival"
 nd_cel.3.d: "The scriptoria of the Celtic monasteries have entered a new golden age. Master illuminators trained in the intricate knotwork patterns of the Book of Kells and the Lindisfarne Gospels are producing manuscripts of breathtaking beauty. But this is no mere antiquarian exercise — the monks have adapted their ancient techniques to new subjects: histories, legal codes, natural philosophy, and navigational charts.\n\nThe swirling interlace designs that once adorned only gospel pages now grace the halls of learning across the Celtic lands. From Iona to Clonmacnoise, from St. David's to the abbeys of Brittany, the Celtic scriptorium tradition proves that beauty and scholarship are inseparable."
 nd_cel.3.a: "The old art speaks with a new voice."
 nd_cel.4.t: "Return of the Wild Geese"
 nd_cel.4.d: "For generations, the finest Celtic warriors sought service abroad — Irish regiments in the armies of France and Spain, Scottish mercenaries in Scandinavian service, Breton sailors under foreign flags. They called themselves the Wild Geese, exiles who dreamed of returning to a free Celtic homeland.\n\nNow that dream is real. Veterans hardened by battles at Fontenoy, Cremona, and a dozen other continental engagements are streaming home. They bring with them not just martial skill but knowledge of foreign tactics, siege engineering, diplomatic connections, and intelligence networks cultivated across European courts. The question is how to employ them."
 nd_cel.4.a: "Form them into the Celtic Guard — our finest soldiers return to fight."
 nd_cel.4.b: "Their connections abroad are worth more than their swords."
 nd_cel_kern_warfare: "Kern Warfare"
 nd_cel_kern_warfare_desc: "The ceithearnach — light skirmishing infantry armed with javelins, bows, and short swords — formed the backbone of Gaelic armies for centuries."
 nd_cel_dun_tradition: "Dun Fortification"
 nd_cel_dun_tradition_desc: "The Celtic tradition of hillforts and ringforts, from the great duns of Ireland to the brochs of Scotland, provided defensive strongholds across the landscape."
 nd_cel_rundale_system: "Rundale System"
 nd_cel_rundale_system_desc: "The rundale system of cooperative farming, where arable land was periodically redistributed among families, sustained Celtic agricultural communities."
 nd_cel_cattle_economy: "Cattle Economy"
 nd_cel_cattle_economy_desc: "In the Celtic world, wealth was measured in cattle. Great cattle fairs like Ballinasloe drew traders from across the islands."
 nd_cel_brehon_tradition: "Brehon Tradition"
 nd_cel_brehon_tradition_desc: "The Brehon legal system, based on arbitration and restitution rather than punishment, governed Irish society for over a millennium."
 nd_cel_celtic_horsemanship: "Celtic Horsemanship"
 nd_cel_celtic_horsemanship_desc: "The Celts were renowned horsemen since antiquity. The hobelar — a light cavalryman adapted to rough terrain — was a Celtic innovation adopted even by the English."
 nd_cel_island_galleys: "Island Galleys"
 nd_cel_island_galleys_desc: "The birlinn, the West Highland galley, was the warship of the Lords of the Isles and Hebridean chieftains — fast, maneuverable, and deadly in coastal waters."
 nd_cel_monastic_learning: "Monastic Learning"
 nd_cel_monastic_learning_desc: "Celtic monasteries at Iona, Clonmacnoise, and Bangor were centers of learning when much of Europe had forgotten how to read."
 nd_cel_bardic_schools: "Bardic Schools"
 nd_cel_bardic_schools_desc: "The bardic schools trained poets in the complex meters and genealogical knowledge required of a filid. A master bard held status equal to a king."
 nd_cel_wool_trade: "Celtic Wool Trade"
 nd_cel_wool_trade_desc: "Scottish and Irish wool, processed through Cistercian monastic estates, was a prized export to the textile markets of Flanders."
 nd_cel_tanistry: "Tanistry"
 nd_cel_tanistry_desc: "The Celtic system of succession by the most capable kinsman, rather than primogeniture, produced capable leaders but also succession disputes."
 nd_cel_monastic_seafaring: "Monastic Seafaring"
 nd_cel_monastic_seafaring_desc: "Celtic monks were remarkable voyagers. Saint Brendan's legendary navigation of the Atlantic reflects a real tradition of monastic seafaring in currachs."
 nd_cel_atlantic_seamanship: "Atlantic Seamanship"
 nd_cel_atlantic_seamanship_desc: "Celtic mariners mastered the treacherous Atlantic waters long before the Age of Sail, building ports and harbors from Galway to Brest."
 nd_cel_fianna_tradition: "Fianna Tradition"
 nd_cel_fianna_tradition_desc: "The Fianna were mythological warrior bands who lived in the wilderness, trained in arms and poetry alike. Their tradition inspired elite warband formations."
 nd_cel_hedge_schools: "Hedge Schools"
 nd_cel_hedge_schools_desc: "When penal laws banned Catholic and Irish-language education, the hedge school masters taught in secret — in fields, behind hedges, in barns — keeping learning alive."
 nd_cel_mercenary_tradition: "Mercenary Tradition"
 nd_cel_mercenary_tradition_desc: "Celtic warriors served as mercenaries across Europe for centuries — Gallowglass in Irish service, Scots in Swedish armies, Irish in French and Spanish regiments."
 nd_cel_gaelic_lordship: "Gaelic Lordship"
 nd_cel_gaelic_lordship_desc: "The consolidation of Gaelic lordships under the Celtic Union brings together the scattered tuatha into a coherent political structure."
 nd_cel_cornish_mining: "Cornish Mining"
 nd_cel_cornish_mining_desc: "Cornwall's tin and copper mines have been worked since the Bronze Age. Cornish mining expertise was exported across the world."
 nd_cel_guerrilla_warfare: "Guerrilla Warfare"
 nd_cel_guerrilla_warfare_desc: "The woodkern — forest-dwelling guerrilla fighters — perfected ambush tactics in the dense woods and bogs of the Celtic lands."
 nd_cel_brehon_revival: "Brehon Revival"
 nd_cel_brehon_revival_desc: "The systematic revival and codification of Brehon law provides the Celtic Union with a legal tradition distinct from English common law."
 nd_cel_language_revival: "Language Revival"
 nd_cel_language_revival_desc: "Organized efforts to preserve and promote Gaelic, Welsh, Breton, and Cornish — binding the Celtic peoples through their shared linguistic heritage."
 nd_cel_celtic_trade_league: "Celtic Trade League"
 nd_cel_celtic_trade_league_desc: "A pan-Celtic trading network linking the ports of Dublin, Glasgow, Cardiff, Brest, and Falmouth in mutual commercial advantage."
 nd_cel_celtic_christianity: "Celtic Christianity"
 nd_cel_celtic_christianity_desc: "Celtic Christianity, with its emphasis on monastic communities, peregrinatio, and local autonomy, offers a distinctive path between Rome and reform."
 nd_cel_siege_resilience: "Siege Resilience"
 nd_cel_siege_resilience_desc: "Centuries of defending against larger invaders have taught the Celtic peoples to make every hill and river crossing a deadly obstacle."
 nd_cel_wild_geese_tradition: "Wild Geese Tradition"
 nd_cel_wild_geese_tradition_desc: "The Wild Geese — Celtic soldiers who served in continental armies — bring back hard-won military expertise to their homeland."
 nd_cel_smuggling_networks: "Smuggling Networks"
 nd_cel_smuggling_networks_desc: "Celtic coastal communities developed extensive smuggling networks to evade English trade restrictions, moving goods through hidden coves and remote harbors."
 nd_cel_constitutional_tradition: "Constitutional Tradition"
 nd_cel_constitutional_tradition_desc: "Drawing on the Brehon legal tradition, Welsh cyfraith, and Enlightenment thought, the Celtic Union develops its own constitutional framework."
 nd_cel_atlantic_fisheries: "Atlantic Fisheries"
 nd_cel_atlantic_fisheries_desc: "The rich fishing grounds of the Celtic Sea and North Atlantic sustain coastal communities and provide a steady supply of experienced sailors."
 nd_cel_linen_industry: "Linen Industry"
 nd_cel_linen_industry_desc: "Irish and Scottish linen production, from flax cultivation to bleaching and weaving, becomes a major export industry."
 nd_cel_penal_resistance: "Penal Resistance"
 nd_cel_penal_resistance_desc: "The experience of surviving centuries of penal legislation and cultural suppression has forged an unbreakable collective will."
 nd_cel_industrial_heartlands: "Industrial Heartlands"
 nd_cel_industrial_heartlands_desc: "Welsh coal and Scottish iron drive the Celtic industrial revolution, transforming the valleys and lowlands into workshops of the world."
 nd_cel_literary_renaissance: "Literary Renaissance"
 nd_cel_literary_renaissance_desc: "A flowering of Celtic-language literature, from the Ossianic poems to the Welsh eisteddfod tradition, inspires national consciousness."
 nd_cel_cooperative_movement: "Cooperative Movement"
 nd_cel_cooperative_movement_desc: "Building on ancient traditions of communal farming and mutual aid, the Celtic cooperative movement transforms banking and agriculture."
 nd_cel_pan_celtic_congress: "Pan-Celtic Congress"
 nd_cel_pan_celtic_congress_desc: "Delegates from all Celtic nations gather to coordinate policy, celebrate shared heritage, and present a united diplomatic front."
 nd_cel_national_army: "Celtic National Army"
 nd_cel_national_army_desc: "The professionalization of the Celtic military, drawing on generations of martial tradition from Gallowglass to Wild Geese."
 a_nd_cel_ceithearnach: "Ceithearnach"
 a_nd_cel_ceithearnach_desc: "Light skirmishing infantry armed with javelins and short swords. Fast and aggressive, the kern harried enemies with missile fire before closing to melee."
 n_nd_cel_birlinn: "Birlinn"
 n_nd_cel_birlinn_desc: "The West Highland galley, propelled by both sail and oar. Fast and maneuverable in coastal waters, the birlinn was the warship of the Hebridean lords."
 a_nd_cel_fianna: "Fianna"
 a_nd_cel_fianna_desc: "Elite warband infantry inspired by the mythological Fianna. These shock troops combine ferocious charges with iron discipline."
 a_nd_cel_woodkern: "Woodkern"
 a_nd_cel_woodkern_desc: "Forest-dwelling guerrilla fighters who excel at ambush and harassment in wooded and hilly terrain. The nightmare of every occupying army."
 a_nd_cel_wild_geese: "Wild Geese"
 a_nd_cel_wild_geese_desc: "Veterans of continental service, these battle-hardened soldiers combine Celtic martial ferocity with European tactical discipline."
 n_nd_cel_currach: "Currach Raider"
 n_nd_cel_currach_desc: "A fast, light vessel built for Atlantic coastal raiding. The currach tradition stretches back millennia, and these ships excel at blockading and harassing enemy shipping."
 nd_cel_dun_fort: "Dun Fort"
 nd_cel_dun_fort_desc: "A Celtic hillfort built on ancient defensive principles — commanding ground, thick stone walls, and provisions for a long siege."
 nd_cel_scriptorium: "Scriptorium"
 nd_cel_scriptorium_desc: "A monastic writing center in the insular tradition, producing illuminated manuscripts and educating the next generation of scholars."
 nd_cel_rath_market: "Rath Market"
 nd_cel_rath_market_desc: "A traditional Celtic market and assembly ground at an ancient rath site, where cattle fairs, trade, and Brehon legal proceedings sustain the rural community."
 nd_cel_teach_ceoil: "Teach Ceoil"
 nd_cel_teach_ceoil_desc: "A House of Music where bards train in the ancient arts of poetry, genealogy, and musical composition — the cultural heart of Celtic civilization."
 nd_cel_clachan: "Clachan"
 nd_cel_clachan_desc: "A cooperative farming settlement organized under the rundale system, where families work shared lands and pool their livestock."
 nd_cel_port_dunan: "Port Dunan"
 nd_cel_port_dunan_desc: "A Celtic coastal harbor built for both commerce and war, sheltering birlinns and currachs in its protected anchorage."
 nd_cel_brehon_court: "Brehon Court"
 nd_cel_brehon_court_desc: "A court of law operating under the Brehon tradition, where trained jurists arbitrate disputes according to Celtic legal principles."
 nd_cel_dun_garrison: "Dun Garrison"
 nd_cel_dun_garrison_desc: "Arms and provisions to maintain the dun fort's defensive garrison."
 nd_cel_manuscript_production: "Manuscript Production"
 nd_cel_manuscript_production_desc: "The monks produce illuminated manuscripts and scholarly works in the insular tradition."
 nd_cel_cattle_fair: "Cattle Fair"
 nd_cel_cattle_fair_desc: "Regular cattle fairs draw traders from across the Celtic lands."
 nd_cel_bardic_upkeep: "Bardic Patronage"
 nd_cel_bardic_upkeep_desc: "Supporting the bards requires hospitality and fine garments befitting their high status."
 nd_cel_communal_farming: "Communal Farming"
 nd_cel_communal_farming_desc: "Cooperative livestock rearing produces wool for trade through the rundale system."
 nd_cel_harbor_upkeep: "Harbor Maintenance"
 nd_cel_harbor_upkeep_desc: "Timber and supplies for maintaining the harbor and its fleet."
 nd_cel_legal_proceedings: "Legal Proceedings"
 nd_cel_legal_proceedings_desc: "Parchment and wax for recording the legal proceedings held at the market assembly."
 nd_cel_formal_jurisprudence: "Formal Jurisprudence"
 nd_cel_formal_jurisprudence_desc: "Paper and sealing wax for the formal administration of the revived Brehon legal code."
 STATIC_MODIFIER_NAME_nd_cel_brehon_codified: "Codified Brehon Law"
 STATIC_MODIFIER_DESC_nd_cel_brehon_codified: "The systematic codification of Brehon law provides legal consistency across the Celtic Union."
 STATIC_MODIFIER_NAME_nd_cel_insular_art: "Insular Art Revival"
 STATIC_MODIFIER_DESC_nd_cel_insular_art: "A renaissance of Celtic manuscript illumination and artistic tradition enriches the cultural life of the union."
 STATIC_MODIFIER_NAME_nd_cel_wild_geese_return_a: "The Celtic Guard"
 STATIC_MODIFIER_DESC_nd_cel_wild_geese_return_a: "The returning Wild Geese form an elite guard corps, bringing continental military expertise to Celtic armies."
 STATIC_MODIFIER_NAME_nd_cel_wild_geese_return_b: "Eyes Across Europe"
 STATIC_MODIFIER_DESC_nd_cel_wild_geese_return_b: "The returning Wild Geese leverage their continental connections for diplomatic advantage and intelligence gathering."
 levy_nd_cel_fianna: "Fianna Warband"
 levy_nd_cel_fianna_desc: "Elite warrior bands raised in the tradition of the mythological Fianna."
 nd_cel_formed_tt: "Celtic Union has been formed"
 nd_cel_path_a_tt: "Chose Tir na Saor"
 nd_cel_path_b_tt: "Chose Claidheamh Mor"
 nd_cel_destiny: "Celtic Destiny"
 nd_cel_destiny_desc: "The Celtic Union stands united. Now begins the work of building a nation worthy of the name — whether through shared law and culture, or the strength of Celtic arms."
 nd_cel_dest_brehon_accord: "The Brehon Accord"
 nd_cel_dest_brehon_accord_desc: "Establish a unified legal code across all Celtic lands, embracing the ancient Brehon tradition of arbitration and restitution to bind the union's diverse peoples under shared law."
 nd_cel_dest_celtic_academy: "The Celtic Academy"
 nd_cel_dest_celtic_academy_desc: "Found a great center of learning that draws scholars from every Celtic nation, advancing knowledge and nurturing the institutions needed for a modern confederation."
 nd_cel_dest_celtic_renaissance: "The Celtic Renaissance"
 nd_cel_dest_celtic_renaissance_desc: "Achieve a golden age of Celtic culture — a flowering of art, literature, and scholarship that proves the Celtic peoples are the equals of any civilization in Europe."
 nd_cel_dest_celtic_march: "The Celtic March"
 nd_cel_dest_celtic_march_desc: "Reclaim the old Celtic territories of Cornwall and Cumbria from English control, pushing the borders of the union to their historic extent."
 nd_cel_dest_atlantic_dominion: "Atlantic Dominion"
 nd_cel_dest_atlantic_dominion_desc: "Seize control of the northern seas by taking the Orkney Islands and establishing a foothold in Normandy, dominating the approaches to the Celtic heartland."
 nd_cel_dest_western_empire: "The Western Empire"
 nd_cel_dest_western_empire_desc: "Build a pan-Atlantic Celtic empire stretching from Iceland to Bordeaux, with London itself under Celtic rule — the final reversal of centuries of English domination."
 nd_cel.5.t: "The Path Before Us"
 nd_cel.5.d: "The Celtic Union is no longer a dream whispered in smoky halls or sung in half-remembered ballads. It is real — a nation of nations stretching from Brittany to the Hebrides. But the harder work lies ahead. Any fool can raise a banner; it takes wisdom to build something that endures.\n\nThe elders and chieftains, the bards and lawmakers, the merchants and sailors — all look to us now. The choices we make in these first years will echo through centuries."
 nd_cel.5.a: "Let us build something that will outlast us all."
 nd_cel.6.t: "The Brehon Accord"
 nd_cel.6.d: "From the hill of Tara to the courts of Rennes, the judges have spoken. A grand council of Brehon jurists, Welsh cyfreithwyr, and Breton coutumiers has produced something unprecedented: a unified Celtic legal code that honors the distinct traditions of each nation while binding them under common principles.\n\nThe Accord enshrines the old Celtic virtues — arbitration over punishment, restitution over revenge, the rights of the tuath alongside the authority of the ri. It is not an imitation of English common law or Roman civil law. It is something older, and perhaps something wiser."
 nd_cel.6.a: "The law is the sinew that binds our nations."
 nd_cel.7.t: "An Ollscoil Cheilteach"
 nd_cel.7.d: "The Celtic Academy has opened its doors. In a great hall that mingles the interlace patterns of Iona with the mathematical precision of the modern age, scholars from every Celtic nation gather to study, debate, and create.\n\nBut already a dispute has arisen about the Academy's purpose. Some argue it should focus on preserving and reviving the Celtic languages and arts — a bulwark against the cultural tide of larger neighbors. Others believe the Academy must look forward, embracing new sciences and practical knowledge to ensure the union's material prosperity."
 nd_cel.7.a: "Preserve our heritage — the languages come first."
 nd_cel.7.b: "Embrace the new sciences for a stronger union."
 nd_cel.8.t: "Aisling na gCeilteach"
 nd_cel.8.d: "They call it the Celtic Vision — an Aisling made real. From the scriptoria of Clonmacnoise to the eisteddfodau of Wales, from the literary salons of Rennes to the music halls of Edinburgh, a cultural flowering is sweeping the Celtic lands that rivals any renaissance.\n\nPoets compose in Gaelic and Brythonic with a confidence not seen since the age of the bards. Artists blend the ancient knotwork tradition with new techniques. Scholars publish works of philosophy, natural history, and mathematics that command respect across Europe.\n\nThe question now is how to direct this energy. The filid — the master poets who once held status equal to kings — argue for a return to the ancient bardic tradition where culture serves the nation's soul. The new intellectuals counter that culture must also serve commerce and practical innovation."
 nd_cel.8.a: "The filid tradition: culture as the soul of the nation."
 nd_cel.8.b: "The new learning: culture as the engine of progress."
 nd_cel.9.t: "The Celtic March"
 nd_cel.9.d: "Celtic banners fly over Cornwall and Cumbria for the first time in centuries. The tin mines of Kernow and the mountain passes of the north are ours. In village squares across the newly liberated territories, people who had almost forgotten their Celtic heritage are relearning the old tongues, rediscovering the songs their grandmothers sang in secret.\n\nThe English called us savages. Let them look upon what savages can build."
 nd_cel.9.a: "The borders of the Celtic world grow wider."
 nd_cel.10.t: "Masters of the Northern Seas"
 nd_cel.10.d: "The Norse jarl of Orkney has bent the knee. Celtic ships patrol from the Pentland Firth to the Seine estuary. On the Normandy coast, our foothold gives us a voice in continental affairs that no English king can ignore.\n\nThe Celtic peoples have always been mariners. From Saint Brendan's legendary voyages to the birlinn fleets of the Hebridean lords, the Atlantic has been our highway. Now it is becoming our domain. The question is what to do with this mastery."
 nd_cel.10.a: "Build a war fleet to command these waters."
 nd_cel.10.b: "Plant Celtic colonies across the Atlantic."
 nd_cel.11.t: "Ard Ri na nIarthar"
 nd_cel.11.d: "London has fallen to Celtic arms. The city that for centuries was the seat of power that ground the Celtic nations underfoot is now a Celtic possession. From Reykjavik's volcanic shores to the vineyards of Bordeaux, from the Orkneys to the Thames, the Celtic Union commands an empire that stretches across the entire western seaboard of Europe.\n\nThe ancient bards prophesied this day — when the scattered children of the Celts would rise as one and reclaim what was taken from them. The high kingship, the Ard Ri, is no longer a title from legend. It is the reality of a people who refused to disappear."
 nd_cel.11.a: "Rule through strength — none shall challenge us again."
 nd_cel.11.b: "Rule through prestige — let the world acknowledge our greatness."
 STATIC_MODIFIER_NAME_nd_cel_dest_aisling_mor_a: "Guardians of the Tongue"
 STATIC_MODIFIER_DESC_nd_cel_dest_aisling_mor_a: "The Academy's focus on linguistic and cultural preservation strengthens Celtic identity, improving material output and tax revenues across the union."
 STATIC_MODIFIER_NAME_nd_cel_dest_aisling_mor_b: "The New Sciences"
 STATIC_MODIFIER_DESC_nd_cel_dest_aisling_mor_b: "The Academy's embrace of practical knowledge drives development and trade, though the rapid expansion invites minor inflationary pressures."
 STATIC_MODIFIER_NAME_nd_cel_dest_fili_tradition_a: "Voice of the Filid"
 STATIC_MODIFIER_DESC_nd_cel_dest_fili_tradition_a: "The revival of the bardic tradition extends Celtic diplomatic reach and heals the scars of past conflicts, streamlining governance."
 STATIC_MODIFIER_NAME_nd_cel_dest_fili_tradition_b: "Engine of Progress"
 STATIC_MODIFIER_DESC_nd_cel_dest_fili_tradition_b: "The new learning transforms Celtic arts into commercial advantage, empowering merchants while sharpening military tactics."
 STATIC_MODIFIER_NAME_nd_cel_dest_sea_wolves_a: "Lords of the Waves"
 STATIC_MODIFIER_DESC_nd_cel_dest_sea_wolves_a: "A powerful Celtic war fleet dominates the northern seas, though the focus on naval construction slows the recovery of land forces."
 STATIC_MODIFIER_NAME_nd_cel_dest_sea_wolves_b: "Children of Brendan"
 STATIC_MODIFIER_DESC_nd_cel_dest_sea_wolves_b: "Following in the wake of the legendary monk-navigators, Celtic colonists spread across the Atlantic, building new communities in distant lands."
 STATIC_MODIFIER_NAME_nd_cel_dest_ard_ri_a: "The High King's Justice"
 STATIC_MODIFIER_DESC_nd_cel_dest_ard_ri_a: "The Ard Ri rules through military supremacy, swift diplomacy, and the spoils of conquest."
 STATIC_MODIFIER_NAME_nd_cel_dest_ard_ri_b: "The High King's Glory"
 STATIC_MODIFIER_DESC_nd_cel_dest_ard_ri_b: "The Ard Ri commands through prestige and the loyalty of subject peoples, reducing the cost of asserting Celtic dominance."
 nd_cel_ceardlann: "Ceardlann"
 nd_cel_ceardlann_desc: "A Celtic workshop of arts and learning where master craftsmen, scholars, and artists collaborate to produce works that blend ancient tradition with modern knowledge."
 nd_cel_ceardlann_maintenance: "Scholar's Supplies"
 nd_cel_ceardlann_maintenance_desc: "Paper, glass, and fine cloth to sustain the scholars and artists of the Ceardlann."
 nd_cel_ard_dun: "Ard Dun"
 nd_cel_ard_dun_desc: "A great Celtic high fortress commanding strategic approaches, built to withstand any siege and garrison the armies of the Western Empire."
 nd_cel_ard_dun_maintenance: "Fortress Garrison"
 nd_cel_ard_dun_maintenance_desc: "Arms, stone, livestock, and tools to maintain the high fortress and its garrison."
