l_english:
 STATIC_MODIFIER_NAME_nd_great_law_of_peace: "The Great Law of Peace"
 STATIC_MODIFIER_DESC_nd_great_law_of_peace: "The Kaianere'ko:wa binds the Five Nations beneath the Tree of Great Peace, its roots reaching in all directions. Disputes are resolved in council, not by war among ourselves. The strength of the Longhouse is unity."
 STATIC_MODIFIER_NAME_nd_war_road_of_the_longhouse: "War Road of the Longhouse"
 STATIC_MODIFIER_DESC_nd_war_road_of_the_longhouse: "The Haudenosaunee extend their reach along the war roads, their warriors ranging far to bring captives, furs, and tribute back to the Longhouse. What the council decides, the war parties enforce."
 nd_iro.1.t: "The Confederacy United"
 nd_iro.1.d: "The five fires of the Haudenosaunee burn as one. From the eastern door of the Kanienkehaka to the western door of the Onondowaga, the nations have gathered beneath the Tree of Great Peace at Onondaga, where the Great Peacemaker Deganawida planted it generations ago. The fifty sachems of the Grand Council sit in their appointed places, the white roots of peace spreading in every direction.\n\nBut a confederacy must choose its path. Will we extend the roots of peace through diplomacy and council, binding other nations to our law? Or will we follow the war roads, our warriors carrying the name of the Longhouse to the edges of the world?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_iro.1.a: "Let the roots of peace extend to all nations."
 nd_iro.1.b: "The war roads shall carry our name far."
 nd_iro.2.t: "The Beaver Wars"
 nd_iro.2.d: "The fur trade has transformed the world of the Great Lakes. European traders hunger for beaver pelts, and the Haudenosaunee stand at the crossroads between the Dutch at Fort Orange and the vast hunting grounds of the interior. But our rivals — the Wendat, the Neutrals, the Erie — control the western beaver territories.\n\nSince the 1640s, our warriors have carried muskets alongside their war clubs, striking deep into enemy territory with devastating effect. The Wendat Confederacy has been shattered, their survivors scattered. The Great Lakes lie open before us. But with dominance comes a choice: do we seize control of the trade routes by force, or do we establish ourselves as the indispensable middlemen, playing the Europeans against each other while we grow rich on the passage of furs?"
 nd_iro.2.a: "We shall dominate the fur trade by force."
 nd_iro.2.b: "We shall be the brokers between all nations."
 nd_iro.3.t: "The Covenant Chain"
 nd_iro.3.d: "A silver chain has been forged between the Haudenosaunee and the English Crown — three links representing Peace, Friendship, and Respect. This Covenant Chain is no mere treaty but a living relationship, polished and renewed at regular councils where grievances are heard and gifts exchanged. Through the Chain, the Haudenosaunee speak for many nations, carrying the concerns of the western peoples to the English and receiving European trade goods in return.\n\nThe Chain gives us leverage no other native nation possesses. But leverage is a tool that cuts both ways — do we bind ourselves more closely to the English alliance, gaining their weapons and trade, or do we maintain our independence, playing the English against the French as we have always done?"
 nd_iro.3.a: "Polish the silver chain. Our alliance makes us strong."
 nd_iro.3.b: "We answer to no European king. Our independence is our strength."
 nd_iro.4.t: "The Sixth Nation"
 nd_iro.4.d: "The Tuscarora have come from the south, refugees from a devastating war with the English colonists of Carolina. They speak a language akin to our own, and their suffering demands our response. The clan mothers have deliberated, and the Grand Council has agreed: the Tuscarora shall be adopted into the Confederacy under the protection of the Oneida, seated beside the younger brothers of the Longhouse.\n\nFrom five fires, we become six. The Longhouse grows longer, its strength renewed by those who seek shelter beneath its rafters. This is the genius of the Confederacy — not conquest, but adoption. Not destruction, but incorporation. The tree has grown new roots."
 nd_iro.4.a: "The Longhouse grows ever longer."
 nd_iro.5.t: "The Longhouse Religion"
 nd_iro.5.d: "Handsome Lake, a Seneca sachem who fell gravely ill, has received visions from the Creator. In his Code, he preaches against the evils that have crept into Haudenosaunee life since European contact — alcohol, witchcraft, domestic violence. But he also calls for a return to the ancient ceremonies, the Thanksgiving Address, the seasonal festivals that have sustained the People of the Longhouse since time immemorial.\n\nThe Longhouse Religion, as his followers call it, is neither purely traditional nor purely new. It adapts ancient practices to the realities of a changed world, offering the Haudenosaunee a path to cultural survival when the old ways seem under siege from every direction. From the ashes of despair, a spiritual fire has been rekindled."
 nd_iro.5.a: "The Creator's word shall guide us forward."
 STATIC_MODIFIER_NAME_nd_iro_beaver_wars_dominance: "Fur Trade Dominance"
 STATIC_MODIFIER_DESC_nd_iro_beaver_wars_dominance: "Haudenosaunee warriors have shattered rival confederacies and seized control of the Great Lakes fur trade, channeling beaver pelts through their territory to European markets."
 STATIC_MODIFIER_NAME_nd_iro_beaver_wars_diplomacy: "Fur Trade Brokers"
 STATIC_MODIFIER_DESC_nd_iro_beaver_wars_diplomacy: "Rather than monopolizing the trade by force alone, the Haudenosaunee have positioned themselves as indispensable intermediaries between European traders and the peoples of the interior."
 STATIC_MODIFIER_NAME_nd_iro_covenant_chain_alliance: "Silver Covenant Chain"
 STATIC_MODIFIER_DESC_nd_iro_covenant_chain_alliance: "The polished chain of alliance with the English Crown gives the Haudenosaunee privileged access to trade goods, diplomatic recognition, and military cooperation."
 STATIC_MODIFIER_NAME_nd_iro_covenant_chain_independence: "Sovereign Between Empires"
 STATIC_MODIFIER_DESC_nd_iro_covenant_chain_independence: "The Haudenosaunee maintain their independence by refusing permanent allegiance to any European power, using the threat of shifting alliance to extract concessions from both French and English."
 nd_iro_great_law: "The Great Law of Peace"
 nd_iro_great_law_desc: "The Kaianere'ko:wa, the oral constitution of the Haudenosaunee Confederacy, establishes governance by consensus among the fifty sachems of the Grand Council."
 nd_iro_longhouse_governance: "Longhouse Governance"
 nd_iro_longhouse_governance_desc: "The longhouse serves as both communal dwelling and political unit, where clan mothers select sachems and multiple families share resources under one roof."
 nd_iro_mourning_wars: "Mourning War Tradition"
 nd_iro_mourning_wars_desc: "When death diminishes the clan, war parties raid neighboring peoples to capture replacements who are adopted into the family, restoring spiritual balance."
 nd_iro_three_sisters_agriculture: "Three Sisters Agriculture"
 nd_iro_three_sisters_agriculture_desc: "Corn, beans, and squash — the Three Sisters — are planted together in mounds, each plant supporting the others: corn provides stalks for beans to climb, beans fix nitrogen for corn, and squash shades the soil."
 nd_iro_canoe_warfare: "Canoe Warfare"
 nd_iro_canoe_warfare_desc: "Haudenosaunee war parties travel by bark canoe, sinking their vessels beneath rocks by day and paddling through the night to strike far from home before retreating."
 nd_iro_palisade_defense: "Palisade Fortification"
 nd_iro_palisade_defense_desc: "Haudenosaunee villages are surrounded by triple rows of sharpened stakes interlaced with bark, with platforms holding stones and water jars to repel attackers."
 nd_iro_wampum_diplomacy: "Wampum Diplomacy"
 nd_iro_wampum_diplomacy_desc: "Strings and belts of shell beads serve as diplomatic credentials, treaty records, and mnemonic devices, encoding agreements in patterns of purple and white."
 nd_iro_forest_tactics: "Forest Warrior Tactics"
 nd_iro_forest_tactics_desc: "Warriors trained in woodland combat fight from ambush among the trees, using their intimate knowledge of the terrain to outmaneuver larger forces."
 nd_iro_clan_mothers: "Clan Mother Authority"
 nd_iro_clan_mothers_desc: "The clan mothers hold the power to nominate and depose sachems, approve declarations of war, and distribute the harvest — the true political authority of the Longhouse."
 nd_iro_condolence_ceremony: "Condolence Ceremony"
 nd_iro_condolence_ceremony_desc: "When a sachem dies, the Condolence Ceremony clears the minds of the grieving, wipes their tears, and raises a new chief to fill the empty seat on the Grand Council."
 nd_iro_council_fire_tradition: "The Council Fire"
 nd_iro_council_fire_tradition_desc: "The central fire at Onondaga never goes out. Here the fifty sachems gather to debate matters affecting all the nations, their decisions binding the entire Confederacy."
 nd_iro_fur_trade_network: "Fur Trade Network"
 nd_iro_fur_trade_network_desc: "Haudenosaunee hunters and traders operate across a vast network stretching from the Atlantic coast to the Great Lakes, exchanging beaver pelts for European manufactured goods."
 nd_iro_firearms_adoption: "Firearms Adoption"
 nd_iro_firearms_adoption_desc: "Through trade with the Dutch at Fort Orange, Haudenosaunee warriors obtain muskets and learn to integrate them with traditional ambush and raiding tactics."
 nd_iro_war_chief_system: "War Chief System"
 nd_iro_war_chief_system_desc: "Condoled war chiefs, raised through ceremony and proven in battle, lead disciplined retinues of experienced warriors on campaigns far beyond the Confederacy's borders."
 nd_iro_beaver_wars: "The Beaver Wars"
 nd_iro_beaver_wars_desc: "The Haudenosaunee wage a decades-long campaign to control the Great Lakes fur trade, shattering rival confederacies and establishing dominance over a vast territory."
 nd_iro_two_row_wampum: "Two Row Wampum"
 nd_iro_two_row_wampum_desc: "The Guswenta — two parallel rows of purple beads on a white field — represents two vessels traveling side by side, neither interfering with the other. This is the basis of Haudenosaunee sovereignty."
 nd_iro_advanced_fortifications: "Advanced Fortifications"
 nd_iro_advanced_fortifications_desc: "Haudenosaunee engineers incorporate European defensive concepts into traditional palisade designs, creating formidable village defenses with multiple walls and bastions."
 nd_iro_adoption_system: "Adoption System"
 nd_iro_adoption_system_desc: "War captives are offered to grieving families as replacements for the dead. Those adopted become full members of the clan, their former identity dissolved as they take on a new name and role."
 nd_iro_lacrosse_tradition: "Lacrosse Tradition"
 nd_iro_lacrosse_tradition_desc: "The Creator's Game — lacrosse — serves as both ceremonial contest and warrior training, with matches between villages sometimes involving hundreds of players in fierce athletic competition."
 nd_iro_covenant_chain: "The Covenant Chain"
 nd_iro_covenant_chain_desc: "A series of alliance agreements between the Haudenosaunee and the English Crown, symbolized by a silver chain of three links: Peace, Friendship, and Respect."
 nd_iro_musket_mastery: "Musket Mastery"
 nd_iro_musket_mastery_desc: "Haudenosaunee warriors have fully adapted European firearms to their style of warfare, combining the musket's killing power with traditional mobility and forest-fighting skills."
 nd_iro_tuscarora_adoption: "Tuscarora Adoption"
 nd_iro_tuscarora_adoption_desc: "The Tuscarora, a related Iroquoian-speaking people driven from their Carolina homeland by colonial warfare, are adopted into the Confederacy as the Sixth Nation."
 nd_iro_wampum_trade_expansion: "Wampum Trade Expansion"
 nd_iro_wampum_trade_expansion_desc: "Wampum production expands from ceremonial and diplomatic use to serve as a medium of exchange in the growing trade between native and European communities."
 nd_iro_gantowisas: "Gantowisas"
 nd_iro_gantowisas_desc: "The Gantowisas — women's councils — exercise decisive authority over matters of war and peace, food distribution, and the selection of leaders throughout the Confederacy."
 nd_iro_balance_of_power: "Balance of Power"
 nd_iro_balance_of_power_desc: "The Haudenosaunee exploit the rivalry between French and English colonies, shifting allegiance and playing one power against the other to extract maximum advantage."
 nd_iro_land_management: "Controlled Burning"
 nd_iro_land_management_desc: "Deliberate burning of undergrowth creates open parkland forests that improve hunting, facilitate travel, and enrich the soil for the next planting season."
 nd_iro_grand_council_reforms: "Grand Council Reforms"
 nd_iro_grand_council_reforms_desc: "The Grand Council adapts its procedures to address the challenges of a changing world, streamlining decision-making while preserving the consensus principle."
 nd_iro_neutrality_policy: "Neutrality Policy"
 nd_iro_neutrality_policy_desc: "Recognizing the dangers of choosing sides in European conflicts, the Grand Council adopts a policy of armed neutrality, refusing to commit the Confederacy to any permanent alliance."
 nd_iro_military_adaptation: "Military Adaptation"
 nd_iro_military_adaptation_desc: "Haudenosaunee warriors incorporate European military discipline alongside traditional tactics, creating a versatile force capable of both guerrilla warfare and set-piece engagements."
 nd_iro_portage_control: "Portage Control"
 nd_iro_portage_control_desc: "Control of the portage routes between the Great Lakes and the river systems gives the Haudenosaunee a stranglehold on the flow of goods between the interior and the coast."
 nd_iro_orenda: "Orenda"
 nd_iro_orenda_desc: "Orenda — the spiritual power that flows through all living things — sustains the ceremonies and traditions that bind the Haudenosaunee together across the generations."
 nd_iro_brant_diplomacy: "Brant's Diplomacy"
 nd_iro_brant_diplomacy_desc: "Joseph Brant, the Mohawk war chief Thayendanegea, travels to London to negotiate directly with the Crown, demonstrating that the Haudenosaunee are a sovereign nation capable of diplomacy on the world stage."
 nd_iro_constitutional_influence: "Constitutional Influence"
 nd_iro_constitutional_influence_desc: "The principles of the Great Law — federalism, separation of powers, checks and balances — influence Enlightenment thinkers and the architects of new republican constitutions."
 nd_iro_buffalo_creek_council: "Buffalo Creek Council"
 nd_iro_buffalo_creek_council_desc: "The Council at Buffalo Creek serves as the new diplomatic center of the Haudenosaunee, where the nations negotiate with the young American republic for the preservation of their lands and sovereignty."
 nd_iro_handsome_lake: "The Longhouse Religion"
 nd_iro_handsome_lake_desc: "Handsome Lake's Gaiwiio combines ancient Haudenosaunee ceremonies with new moral teachings, offering a path of cultural renewal in a time of crisis and dispossession."
 nd_iro_agricultural_modernization: "Agricultural Modernization"
 nd_iro_agricultural_modernization_desc: "Haudenosaunee farmers adapt traditional polyculture methods to the demands of a market economy, selling surplus corn, beans, and squash to neighboring settlements."
 nd_iro_cultural_preservation: "Cultural Preservation"
 nd_iro_cultural_preservation_desc: "Through the dedicated efforts of keepers of tradition, the ceremonies, languages, and stories of the Haudenosaunee endure, ensuring that the Longhouse stands firm against the winds of change."
 nd_iro_grand_river: "Grand River Settlement"
 nd_iro_grand_river_desc: "The Six Nations settlement along the Grand River becomes a center of Haudenosaunee life, where the peoples rebuild their communities and maintain their confederate traditions."
 a_nd_iro_war_party: "War Party"
 a_nd_iro_war_party_desc: "Small bands of warriors who travel by night, striking from ambush and withdrawing before the enemy can organize resistance. Their speed and ferocity make them devastating raiders."
 a_nd_iro_forest_warriors: "Forest Warriors"
 a_nd_iro_forest_warriors_desc: "Experienced fighters trained in woodland combat, equally skilled with war club and musket. They fight from behind trees and in ravines, using the forest as both shield and weapon."
 a_nd_iro_war_chief_retinue: "War Chief's Retinue"
 a_nd_iro_war_chief_retinue_desc: "The personal following of a condoled war chief — veterans of many campaigns who have proven their courage and loyalty. They form the disciplined core of any Haudenosaunee army."
 a_nd_iro_musket_warriors: "Musket Warriors"
 a_nd_iro_musket_warriors_desc: "Warriors who have fully mastered European firearms while retaining traditional mobility and fieldcraft. They combine devastating firepower with the ability to vanish into the forest."
 a_nd_iro_canoe_raiders: "Canoe Raiders"
 a_nd_iro_canoe_raiders_desc: "River-borne raiding parties who travel vast distances by bark canoe, carrying supplies and weapons along waterways to strike targets far from home."
 nd_iro_longhouse: "Longhouse"
 nd_iro_longhouse_desc: "The iconic communal dwelling of the Haudenosaunee — a bark-covered wooden structure housing an entire clan under one roof, with shared hearths, storage, and sleeping platforms."
 nd_iro_palisade: "Palisade Fortification"
 nd_iro_palisade_desc: "A triple row of sharpened stakes interlaced with bark, surrounding the village with a formidable wall. Platforms along the top hold piles of stones and jars of water for the defenders."
 nd_iro_council_fire: "Council Fire"
 nd_iro_council_fire_desc: "The ceremonial and political heart of the Confederacy, where sachems gather around a sacred fire that is never allowed to go out, debating matters that affect all the nations."
 nd_iro_wampum_workshop: "Wampum Workshop"
 nd_iro_wampum_workshop_desc: "A workshop where artisans drill, shape, and string shell beads into the wampum strings and belts that serve as diplomatic credentials, historical records, and units of exchange."
 nd_iro_three_sisters_garden: "Three Sisters Garden"
 nd_iro_three_sisters_garden_desc: "A polyculture garden where corn, beans, and squash grow together in mounds — each plant supporting the others in a system that produces more food per acre than European monoculture."
 nd_iro_longhouse_maintenance: "Longhouse Upkeep"
 nd_iro_longhouse_maintenance_desc: "Maintaining the longhouse requires regular replacement of elm bark sheathing, structural timbers, tools for repair, and fiber for lashings and cordage."
 nd_iro_palisade_upkeep: "Palisade Upkeep"
 nd_iro_palisade_upkeep_desc: "The triple palisade walls require constant repair and reinforcement with fresh timber, stone, and tools to sharpen and re-set the stakes."
 nd_iro_council_fire_ceremony: "Council Ceremonies"
 nd_iro_council_fire_ceremony_desc: "The rituals and ceremonies of the Grand Council require beeswax for torches, paper for recording decisions, and furs as gifts and tribute at formal councils."
 nd_iro_wampum_crafting: "Wampum Crafting"
 nd_iro_wampum_crafting_desc: "Artisans work shell and stone into the beads that form the foundation of Haudenosaunee diplomacy and record-keeping, using bone and stone tools to drill the beads and fiber cord to string them."
 nd_iro_polyculture_upkeep: "Polyculture Maintenance"
 nd_iro_polyculture_upkeep_desc: "Seed corn must be reserved each harvest to plant the following season's Three Sisters gardens, while lumber is used to build raised mounds and tools maintained for cultivation."
 nd_iro_fur_processing: "Fur Processing"
 nd_iro_fur_processing_desc: "Processing beaver and deer pelts through traditional tanning and preparation methods for the European fur trade."
 nd_iro_improved_palisade: "Improved Palisade Construction"
 nd_iro_improved_palisade_desc: "Enhanced defensive walls incorporating European engineering principles with traditional triple-stake palisade design, requiring timber, stone, and iron tools for construction."
 nd_iro_warrior_training: "Warrior Athletic Training"
 nd_iro_warrior_training_desc: "The Creator's Game and other athletic competitions serve as rigorous physical training for warriors, with lacrosse sticks crafted from timber and practice weapons kept in readiness."
 nd_iro_wampum_trade: "Wampum Trade"
 nd_iro_wampum_trade_desc: "Large-scale production of wampum beads for use as currency in the growing trade between native and European communities, with dyed wampum commanding higher value and paper records tracking transactions."
 nd_iro_controlled_burns: "Forest Management"
 nd_iro_controlled_burns_desc: "Controlled burning of undergrowth creates open parkland that improves hunting grounds and enriches agricultural soil, requiring fuel timber and tools to manage the burns safely."
 nd_iro_portage_trade: "Portage Route Trade"
 nd_iro_portage_trade_desc: "Control and management of the overland carrying routes between navigable waterways, with furs as the primary trade currency and tools maintained for portaging canoes and goods."
 nd_iro_european_diplomacy: "European Diplomatic Mission"
 nd_iro_european_diplomacy_desc: "Haudenosaunee ambassadors engage with European courts and colonial governments as representatives of a sovereign confederacy, presenting credentials in fine cloth and wampum jewelry while maintaining written correspondence."
 nd_iro_treaty_negotiation: "Treaty Council"
 nd_iro_treaty_negotiation_desc: "Formal diplomatic proceedings following Haudenosaunee protocol, with wampum exchanges, beeswax-lit condolence rituals, carefully recorded agreements on paper, and furs given as gifts to seal the covenant."
 nd_iro_modern_agriculture: "Market Agriculture"
 nd_iro_modern_agriculture_desc: "Traditional polyculture adapted for surplus production, with corn sold to neighboring settlements, iron tools improving yields, and pottery vessels storing surplus for market."
 levy_nd_iro_war_party: "Haudenosaunee War Party Levy"
 levy_nd_iro_war_party_desc: "Clan warriors called to raid by the mourning war tradition, traveling light and striking fast before melting back into the forest."
 levy_nd_iro_canoe_raiders: "Canoe Raider Levy"
 levy_nd_iro_canoe_raiders_desc: "River-borne auxiliaries who travel vast distances by bark canoe, carrying supplies and weapons along waterways to support raiding parties."
 nd_iro_formed_tt: "Haudenosaunee has been formed"
 nd_iro_path_a_tt: "Chose The Great Law of Peace"
 nd_iro_path_b_tt: "Chose War Road of the Longhouse"
 nd_iro_destiny: "Destiny of the Confederacy"
 nd_iro_destiny_desc: "The Haudenosaunee Confederacy has been forged anew. The Tree of Great Peace stands tall at Onondaga, and the fifty sachems of the Grand Council await the direction their people will take."
 nd_iro_dest_condolence: "Condolence Diplomacy"
 nd_iro_dest_condolence_desc: "Extend the condolence ceremony beyond the Confederacy. Embrace the principles of meritocratic governance and accumulate the wealth to fund diplomatic missions across the northeast."
 nd_iro_dest_silver_chain: "The Silver Chain"
 nd_iro_dest_silver_chain_desc: "Forge a diplomatic network spanning from Cataraqui on Lake Ontario to Shackamaxon on the Delaware. Control the trade crossroads that make the Haudenosaunee indispensable to every power in the region."
 nd_iro_dest_great_binding: "The Great Binding Law"
 nd_iro_dest_great_binding_desc: "The Kaianere'ko:wa becomes a model for governance across the continent. Achieve such prestige that even distant peoples seek to study the Great Law. Build the Tree of Great Peace as an enduring monument to confederate governance."
 nd_iro_dest_mourning_raids: "Mourning Raids"
 nd_iro_dest_mourning_raids_desc: "Carry the mourning war to the Wendat heartland at Cahiague. Build an army worthy of the war roads and fill the Longhouse's empty seats with captives from the north."
 nd_iro_dest_beaver_conquest: "Beaver Wars Conquest"
 nd_iro_dest_beaver_conquest_desc: "Shatter the remaining rivals. Take Detroit and the Sandusky country to control the western beaver grounds and the southern shore of the Great Lakes."
 nd_iro_dest_longhouse_empire: "Empire of the Longhouse"
 nd_iro_dest_longhouse_empire_desc: "Extend the war roads to Checagou and Mackinac, the farthest straits of the Great Lakes. Build the War Lodge as the seat of a military power that dominates the continent's interior."
 nd_iro.6.t: "The Confederacy's Path"
 nd_iro.6.d: "The Haudenosaunee stand at a crossroads. The fifty sachems have gathered at the Council Fire, the nations united under one roof. The white roots of peace stretch in every direction, but the direction the Confederacy will grow depends on the decisions made in this council. Will the People of the Longhouse be remembered as masters of diplomacy, or as conquerors whose war roads reached the edges of the world?"
 nd_iro.6.a: "The Council Fire burns bright."
 nd_iro.7.t: "The Condolence Reaches Further"
 nd_iro.7.d: "What began as a ceremony to mourn the dead and raise new chiefs has become the foundation of a diplomatic tradition unlike any other. When the Haudenosaunee send condolence delegations to distant peoples, they carry not just words of comfort but an entire system of governance — the notion that grief can be transformed into political renewal, that mourning can build alliances stronger than any military pact. Nations that once feared the Longhouse now send their own delegations to Onondaga, eager to learn the arts of council and consensus."
 nd_iro.7.a: "We clear the minds of all who grieve."
 nd_iro.8.t: "Polishing the Chain"
 nd_iro.8.d: "The diplomatic network has grown into something unprecedented — a web of alliances, trade agreements, and mutual obligations stretching across the northeast. The Silver Chain connecting the Haudenosaunee to the European powers and to other native confederacies must be constantly polished and renewed through councils, gift exchanges, and careful negotiation.\n\nBut there are two ways to tend such a chain. We can bind ourselves more closely to our partners, becoming the indispensable center of a great alliance system. Or we can maintain our independence, using the chain not to bind but to balance — playing each partner against the others while the Haudenosaunee grow wealthy on the tensions between them."
 nd_iro.8.a: "Bind the chain tighter. Alliance is strength."
 nd_iro.8.b: "We stand sovereign between all nations."
 nd_iro.9.t: "The Living Constitution"
 nd_iro.9.d: "Travelers come from distant lands to study the Great Law. They marvel at the balance of powers within the Confederacy — the clan mothers who select the sachems, the Grand Council that debates matters of war and peace, the consensus principle that ensures no nation is overridden by the will of the majority. Philosophers write that the Haudenosaunee have achieved what European thinkers can only theorize about.\n\nThis recognition presents a choice. We can embrace our role as constitutional pioneers, building the institutions that make the Great Law visible and enduring. Or we can turn inward, using the Great Law's strength to renew Haudenosaunee culture from within — feeding our people, training our leaders, and ensuring the Longhouse endures as a living civilization rather than a philosopher's curiosity."
 nd_iro.9.a: "Let the world learn from the Great Law."
 nd_iro.9.b: "The Law exists to sustain our people."
 nd_iro.10.t: "The War Roads Open"
 nd_iro.10.d: "The war chiefs have spoken. The mourning wars will no longer be limited to small raids for captives — they will become campaigns of conquest. The Wendat, the Neutrals, the Petun — all who block the expansion of the Longhouse will be swept aside. Their towns will be burned, their people adopted or scattered, their hunting grounds absorbed into the vast territory of the Haudenosaunee. The war roads stretch north and west from the homeland, and warriors sharpen their weapons in the flickering firelight."
 nd_iro.10.a: "The Longhouse shall have no empty seats."
 nd_iro.11.t: "Masters of the Beaver Grounds"
 nd_iro.11.d: "Detroit has fallen. The Sandusky country is ours. Where once rival peoples controlled the western beaver trade, now Haudenosaunee hunters range freely across the Great Lakes watershed. The furs flow through our hands to the European traders, and every pelt that passes enriches the Confederacy.\n\nBut conquest creates its own dilemmas. We have defeated these peoples, but the empty lands profit no one. Do we wage total war — breaking the survivors so completely that resistance becomes impossible? Or do we follow the ancient way of adoption, bringing the vanquished into the Longhouse as new members of the clans, turning enemies into brothers and filling the empty places around our fires?"
 nd_iro.11.a: "Break them utterly. The war road knows no mercy."
 nd_iro.11.b: "Adopt the vanquished into the Longhouse."
 nd_iro.12.t: "The Longhouse Stretches to the Horizon"
 nd_iro.12.d: "From the straits of Mackinac to the marshes of Checagou, from the Mohawk Valley to the Ohio Country, the Haudenosaunee Confederacy commands the interior of the continent. No fur moves without our permission. No army crosses our territory without our leave. The European coastal colonies look inland and see the Longhouse — vast, powerful, and seemingly eternal.\n\nThis is the apex of military power, but even at the summit there are choices. Do we remain the eternal warriors, perfecting the art of war until no force on this continent can stand against us? Or do we use our military dominance to adopt and incorporate, building an empire not of conquest alone but of assimilation — the Longhouse growing ever longer, welcoming new peoples into its embrace?"
 nd_iro.12.a: "The war roads are eternal. We fight on."
 nd_iro.12.b: "Every conquered people becomes our own."
 STATIC_MODIFIER_NAME_nd_iro_dest_chain_polished: "Polished Chain Alliance"
 STATIC_MODIFIER_DESC_nd_iro_dest_chain_polished: "The Haudenosaunee have bound themselves tightly to their diplomatic partners, creating an alliance network that amplifies their influence at the cost of constant diplomatic maintenance."
 STATIC_MODIFIER_NAME_nd_iro_dest_chain_sovereign: "Sovereign Mediators"
 STATIC_MODIFIER_DESC_nd_iro_dest_chain_sovereign: "The Haudenosaunee maintain their independence between all factions, using their position as honest brokers to extract concessions from every side while answering to none."
 STATIC_MODIFIER_NAME_nd_iro_dest_law_constitution: "Architects of Governance"
 STATIC_MODIFIER_DESC_nd_iro_dest_law_constitution: "The Great Law inspires institutional reform across the continent. The Haudenosaunee become builders and planners, their constitutional genius expressed in the physical structures of governance."
 STATIC_MODIFIER_NAME_nd_iro_dest_law_renewal: "Longhouse Renewal"
 STATIC_MODIFIER_DESC_nd_iro_dest_law_renewal: "The Great Law turns inward, sustaining Haudenosaunee culture through feeding the people, training the next generation, and preserving the wisdom of the elders — even as the outside world grows more threatening."
 STATIC_MODIFIER_NAME_nd_iro_dest_total_war: "War Without Mercy"
 STATIC_MODIFIER_DESC_nd_iro_dest_total_war: "The Haudenosaunee wage total war against their rivals, breaking enemy resistance through relentless siege and assault. Survivors are scattered rather than adopted."
 STATIC_MODIFIER_NAME_nd_iro_dest_adopt_vanquished: "Adopt the Vanquished"
 STATIC_MODIFIER_DESC_nd_iro_dest_adopt_vanquished: "Conquered peoples are brought into the Longhouse through the adoption system, their warriors joining Haudenosaunee war parties and their families replenishing the clans."
 STATIC_MODIFIER_NAME_nd_iro_dest_empire_warpath: "Eternal War Road"
 STATIC_MODIFIER_DESC_nd_iro_dest_empire_warpath: "The Haudenosaunee perfect the art of war across a continental empire, their warriors gaining experience from constant campaigning at the cost of neglecting agricultural development."
 STATIC_MODIFIER_NAME_nd_iro_dest_empire_adoption: "Empire of Adoption"
 STATIC_MODIFIER_DESC_nd_iro_dest_empire_adoption: "The Longhouse grows ever longer as conquered peoples are adopted into the Confederacy. Former enemies become loyal warriors, and the empire's strength lies in incorporation rather than destruction."
 nd_iro_peace_tree: "Tree of Great Peace"
 nd_iro_peace_tree_desc: "The White Pine of Peace, planted by the Great Peacemaker Deganawida, its four white roots extending to the edges of the earth. Beneath its boughs the Grand Council meets to govern through consensus rather than force."
 nd_iro_peace_tree_ceremonies: "Peace Tree Ceremonies"
 nd_iro_peace_tree_ceremonies_desc: "The ceremonies of the Great Peace require beeswax torches for the condolence ritual, paper for recording council decisions, and fine cloth for diplomatic gift exchanges."
 nd_iro_war_lodge: "War Lodge"
 nd_iro_war_lodge_desc: "A fortified council house where war chiefs plan campaigns, warriors prepare for distant raids, and the trophies of conquest are displayed to inspire the next generation of fighters."
 nd_iro_war_lodge_maintenance: "War Lodge Upkeep"
 nd_iro_war_lodge_maintenance_desc: "The War Lodge requires a constant supply of weapons for its warriors, leather for their equipment, timber for its walls, and tools for maintenance and repair."
