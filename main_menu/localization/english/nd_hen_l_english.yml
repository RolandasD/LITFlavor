l_english:
 STATIC_MODIFIER_NAME_nd_hen_yr_awen: "Yr Awen"
 STATIC_MODIFIER_DESC_nd_hen_yr_awen: "The divine poetic inspiration flows through the bards of the Old North once more. Where the Cynfeirdd once sang of heroes, a new generation preserves the Cumbric tongue and the ancient laws of the Brythonic people."
 STATIC_MODIFIER_NAME_nd_hen_cleddyf_y_gogledd: "Cleddyf y Gogledd"
 STATIC_MODIFIER_DESC_nd_hen_cleddyf_y_gogledd: "The Sword of the North is drawn again. As Urien once drove the Angles from the shores of Lindisfarne, the warriors of Hen Ogledd march to reclaim every hill and valley that was once Brythonic."
 STATIC_MODIFIER_NAME_nd_hen_gododdin_recited: "The Heroes of Catraeth"
 STATIC_MODIFIER_DESC_nd_hen_gododdin_recited: "The verses of Y Gododdin echo in every hall. Three hundred went to Catraeth and nearly all fell, but their sacrifice has become the immortal standard by which all warriors of the Old North are measured."
 STATIC_MODIFIER_NAME_nd_hen_rock_of_clyde: "Rock of the Clyde"
 STATIC_MODIFIER_DESC_nd_hen_rock_of_clyde: "Alt Clut stands once more as the impregnable seat of Brythonic power. Where Dumbarton Rock rises above the river, no invader can pass unchallenged."
 nd_hen.1.t: "The Old North Reborn"
 nd_hen.1.d: "The disparate Brythonic kingdoms of the north -- Rheged, Gododdin, Strathclyde, Elmet -- have been reunited under a single crown for the first time since the age of Urien and Taliesin. The Cumbric tongue is spoken from the Firth of Forth to the Humber, and the old genealogies of the Gwyr y Gogledd bind this realm together.\n\nBut what kind of realm shall this be? The bards who preserved the memory of the Old North through centuries of Saxon and Norse domination now look to us for guidance. Shall we be the guardians of an ancient culture reborn, nurturing the poetic and legal traditions that make us distinct? Or shall we be the avengers of Catraeth, wielding the sword to carve out a kingdom worthy of Urien's legacy?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_hen.1.a: "Let the Awen guide us -- we are keepers of the flame"
 nd_hen.1.b: "The Sword of the North shall not rest in its scabbard"
 nd_hen.2.t: "Y Gododdin"
 nd_hen.2.d: "In the great hall, by firelight, a bard rises to recite the oldest and most sacred verses of the Brythonic people. Y Gododdin -- the elegy of Aneirin for the three hundred warriors who rode from Din Eidyn to Catraeth, there to fight against overwhelming Anglian numbers. Nearly all were slain, yet their names live on in immortal verse.\n\nThe poem's opening lines are known to every warrior in the realm: 'Gwyr a aeth Gatraeth oedd ffraeth eu llu' -- 'Men went to Catraeth, keen was their host.' It is not merely a memorial but a sacred bond between past and present, reminding all who hear it that courage in the face of destruction is the highest virtue of the Old North.\n\nTonight, the warriors who listen vow to be worthy of those ancient heroes."
 nd_hen.2.a: "Their sacrifice will never be forgotten"
 nd_hen.3.t: "The Rock of the Clyde"
 nd_hen.3.d: "Dumbarton Rock -- Alt Clut in the old tongue, the Rock of the Clyde -- has been the seat of Brythonic power in the north since before memory. Rising two hundred and forty feet above the river, its basalt summit has never been taken by direct assault. When the Norse kings Amlaib and Imar besieged it in 870, they required four months and the cutting of its water supply to force its submission.\n\nNow the fortress has been expanded and reinforced with the latest defensive works. A new curtain wall encircles the summit, and the garrison has been doubled. From this impregnable perch, the rulers of Hen Ogledd can command the entire course of the Clyde and control all movement between the Scottish Lowlands and the western sea."
 nd_hen.3.a: "Alt Clut shall stand eternal"
 nd_hen_gododdin_legacy: "Y Gododdin"
 nd_hen_gododdin_legacy_desc: "The ancient poem of Aneirin commemorating the Brythonic warriors who fell at the Battle of Catraeth inspires the soldiers of Hen Ogledd with tales of selfless valor."
 nd_hen_teulu_warband: "The Teulu"
 nd_hen_teulu_warband_desc: "The king's personal warband of mounted retainers, bound by oath and kinship, forms the elite core of the Brythonic military tradition."
 nd_hen_cattle_lords: "Lords of the Herds"
 nd_hen_cattle_lords_desc: "The pastoral cattle economy of the Brythonic north, where wealth is measured in livestock and the royal court's power flows from its herds."
 nd_hen_cynfeirdd: "The Cynfeirdd"
 nd_hen_cynfeirdd_desc: "The earliest poets -- Taliesin and Aneirin foremost among them -- who sang the deeds of Brythonic kings and preserved the cultural identity of the Old North through centuries of conflict."
 nd_hen_cumbric_law: "Cumbric Law"
 nd_hen_cumbric_law_desc: "The legal customs of the Brythonic north, blending ancient tribal practice with remnants of Roman administration into a distinctive jurisprudence."
 nd_hen_alt_clut_fortress: "Alt Clut"
 nd_hen_alt_clut_fortress_desc: "The Rock of the Clyde, Dumbarton Rock, where Brythonic kings have held court since the departure of the Roman legions. Its basalt summit has resisted siege for centuries."
 nd_hen_brythonic_smiths: "Brythonic Smithcraft"
 nd_hen_brythonic_smiths_desc: "The metalworkers of the Old North produce fine swords, shields, and torcs in a tradition stretching back to the Iron Age Britons."
 nd_hen_clyde_trade: "Clyde Trade"
 nd_hen_clyde_trade_desc: "The River Clyde serves as the commercial artery of the western Old North, connecting the interior with Irish and continental traders."
 nd_hen_cumbric_church: "The Cumbric Church"
 nd_hen_cumbric_church_desc: "The Christianity of the Old North follows insular traditions distinct from both Rome and Canterbury, with its own monastic practices and calendar."
 nd_hen_frontier_spearmen: "Frontier Spearmen"
 nd_hen_frontier_spearmen_desc: "The borderlands of Hen Ogledd breed disciplined spearmen hardened by constant frontier warfare against Angles, Gaels, and Norse."
 nd_hen_wool_trade: "Northern Wool Trade"
 nd_hen_wool_trade_desc: "The upland pastures of the Pennines and Southern Uplands produce high-quality wool, which Brythonic weavers transform into sought-after cloth."
 nd_hen_northern_alliance: "The Northern Alliance"
 nd_hen_northern_alliance_desc: "Following Urien of Rheged's example of forging coalitions among Brythonic kings against the common enemy, the Old North masters the art of alliance diplomacy."
 nd_hen_border_strongholds: "Border Strongholds"
 nd_hen_border_strongholds_desc: "A network of hilltop fortifications guards the marches of Hen Ogledd, each stronghold mutually supporting its neighbors and controlling the passes."
 nd_hen_manuscript_tradition: "Manuscript Tradition"
 nd_hen_manuscript_tradition_desc: "The bardic halls of the Old North produce illuminated manuscripts preserving the poetry, laws, and histories of the Brythonic people for posterity."
 nd_hen_border_riders: "Border Riders"
 nd_hen_border_riders_desc: "Swift mounted raiders who patrol the frontier marches, expert at hit-and-run tactics in the broken terrain of the border country."
 nd_hen_bardic_preservation: "Bardic Preservation"
 nd_hen_bardic_preservation_desc: "The bardic schools of the Old North systematically preserve and teach the Cumbric language, ensuring the oral traditions and legal codes survive the pressure of surrounding cultures."
 nd_hen_kingdom_reunited: "Kingdom Reunited"
 nd_hen_kingdom_reunited_desc: "The separate Brythonic kingdoms of the north are consolidated under a single crown, ending centuries of fragmentation and bringing the vision of a unified Old North to fruition."
 nd_hen_pennine_mines: "Pennine Mines"
 nd_hen_pennine_mines_desc: "The lead and coal deposits of the Pennine hills have been exploited since Roman times. Under Brythonic governance, organized mining brings new wealth to the Old North."
 nd_hen_standing_army: "Milwyr y Gogledd"
 nd_hen_standing_army_desc: "The old teulu warband system gives way to a permanent standing army -- the Soldiers of the North -- trained and equipped to modern standards while retaining the martial spirit of the Gododdin warriors."
 nd_hen_coastal_trade: "Coastal Commerce"
 nd_hen_coastal_trade_desc: "The ports of the Clyde, Solway, and Northumbrian coast develop into thriving centers of coastal and cross-channel trade with Ireland, Scandinavia, and the continent."
 nd_hen_council_of_the_north: "Council of the North"
 nd_hen_council_of_the_north_desc: "Drawing on Brythonic traditions of counsel and consent, a formal council advises the crown and shapes the governance of the realm."
 nd_hen_northern_industry: "Northern Industry"
 nd_hen_northern_industry_desc: "The coalfields and iron deposits of the Old North support a growing proto-industrial economy, forging weapons, tools, and the material foundations of modern power."
 nd_hen_cumbric_revival: "Cumbric Revival"
 nd_hen_cumbric_revival_desc: "A literary and cultural renaissance reclaims the Cumbric language from centuries of marginalization, producing new poetry, histories, and legal texts inspired by the Cynfeirdd tradition."
 nd_hen_industrial_north: "Industrial North"
 nd_hen_industrial_north_desc: "The northern coalfields and river valleys become the heartland of an industrial revolution, with mills, foundries, and factories transforming the landscape of Hen Ogledd."
 nd_hen_clyde_shipyards: "Clyde Shipyards"
 nd_hen_clyde_shipyards_desc: "The banks of the River Clyde, once home to simple fishing villages, now host great shipyards that launch vessels for trade and war across the world's oceans."
 nd_hen_democratic_tradition: "Democratic Tradition"
 nd_hen_democratic_tradition_desc: "The ancient Brythonic practice of governance by counsel and consent evolves into a modern democratic tradition, giving voice to the common people of the Old North."
 a_nd_hen_teulu: "Teulu"
 a_nd_hen_teulu_desc: "The king's personal warband of mounted retainers, the teulu ride as the elite shock cavalry of the Old North. Bound by oaths of loyalty and inspired by the heroes of Y Gododdin, they charge with reckless valor."
 a_nd_hen_gosgordd: "Gosgordd"
 a_nd_hen_gosgordd_desc: "The frontier spearmen of Hen Ogledd, the gosgordd are hardened infantry trained in the broken terrain of the border marches. They excel at holding ground against superior numbers in hills and mountain passes."
 a_nd_hen_border_rider: "Border Rider"
 a_nd_hen_border_rider_desc: "Swift mounted raiders who know every pass, ford, and hidden valley of the frontier country. They strike fast, loot quickly, and vanish before the enemy can mount a response."
 a_nd_hen_milwyr: "Milwyr y Gogledd"
 a_nd_hen_milwyr_desc: "The Soldiers of the North, a disciplined standing infantry force that replaces the old warband levies with professional troops equipped with modern weapons and tactics."
 levy_nd_hen_teulu: "Teulu Warband"
 levy_nd_hen_teulu_desc: "The king's sworn mounted retainers, bound by oath to ride at his side in battle."
 levy_nd_hen_gosgordd: "Gosgordd Spearmen"
 levy_nd_hen_gosgordd_desc: "Frontier infantry levied from the border communities, hardened by generations of conflict."
 levy_nd_hen_border_rider: "Border Rider Levy"
 levy_nd_hen_border_rider_desc: "Light horsemen recruited from the border marches, expert scouts and raiders."
 nd_hen_llys: "Llys"
 nd_hen_llys_desc: "The royal court-hall of a Brythonic king, where justice is dispensed, cattle tribute is collected, and the bards sing the genealogies of the ruling house."
 nd_hen_neuadd_y_beirdd: "Neuadd y Beirdd"
 nd_hen_neuadd_y_beirdd_desc: "The Bardic Hall, where the poetic traditions of Taliesin and Aneirin are taught to new generations and the Cumbric language is preserved through verse and song."
 nd_hen_dinas: "Dinas"
 nd_hen_dinas_desc: "A hilltop fortress in the Brythonic tradition, commanding the surrounding countryside from an elevated position. Built on natural rock outcrops, these strongholds are nearly impervious to assault."
 nd_hen_court_of_justice: "Court of Justice"
 nd_hen_court_of_justice_desc: "The Llys dispenses justice according to Cumbric legal customs, resolving disputes and collecting tributes from across the realm."
 nd_hen_cattle_tithe: "Cattle Tithe"
 nd_hen_cattle_tithe_desc: "The pastoral wealth of the Old North flows through the Llys as cattle and hides, sustaining the court and producing fine leather for trade."
 nd_hen_wool_weaving: "Wool Weaving"
 nd_hen_wool_weaving_desc: "The upland flocks provide raw wool which is spun and woven into fine cloth by the craftswomen of the Old North."
 nd_hen_bardic_training: "Bardic Training"
 nd_hen_bardic_training_desc: "The Neuadd y Beirdd maintains the rigorous tradition of bardic education, training apprentice poets in the complex meters and genealogies of the Cumbric tradition."
 nd_hen_manuscript_copying: "Manuscript Copying"
 nd_hen_manuscript_copying_desc: "The bards produce illuminated manuscripts preserving the poetry, laws, and histories of the Old North for posterity."
 nd_hen_garrison_upkeep: "Frontier Garrison"
 nd_hen_garrison_upkeep_desc: "The garrison of the Dinas maintains its watch over the border marches, consuming weapons, provisions, and building materials."
 nd_hen_forge_work: "Brythonic Forge"
 nd_hen_forge_work_desc: "The smiths of the Dinas produce fine weapons in the tradition of Brythonic metalwork, forging swords, spearheads, and shields."
 nd_hen_formed_tt: "Formed #bold Hen Ogledd#!"
 nd_hen_path_a_tt: "Chose the #bold Yr Awen#! destiny"
 nd_hen_path_b_tt: "Chose the #bold Cleddyf y Gogledd#! destiny"
 nd_hen_destiny: "The Old North Consolidated"
 nd_hen_destiny_desc: "The Brythonic kingdoms have been reunited under one crown. Stability must be maintained before the realm can pursue its greater destiny."
 nd_hen_dest_cumbric_schools: "Schools of the Cynfeirdd"
 nd_hen_dest_cumbric_schools_desc: "Establish centers of Brythonic learning by embracing meritocratic governance and securing a supply of paper for the scribes and scholars who will carry the Cumbric tradition forward."
 nd_hen_dest_brythonic_union: "The Brythonic Union"
 nd_hen_dest_brythonic_union_desc: "Reunite with the Welsh Brythons by taking Carmarthen, the ancient seat of Deheubarth. With the printing press spreading Cumbric literature and gold to fund the project, all Brythonic peoples can be gathered under one banner."
 nd_hen_dest_prifysgol: "Prifysgol y Gogledd"
 nd_hen_dest_prifysgol_desc: "Found the University of the North, a great center of Brythonic scholarship rivaling any in Europe. This requires a thriving realm, high prestige, and the scientific revolution to have taken root."
 nd_hen_dest_london: "Caer Ludd"
 nd_hen_dest_london_desc: "Take London -- Caer Ludd in the old tongue, the city founded by King Lud according to Brythonic legend. Conquering the greatest city in England requires a formidable army."
 nd_hen_dest_celtic_seas: "Masters of the Celtic Seas"
 nd_hen_dest_celtic_seas_desc: "Control the Irish Sea by taking Dublin and Cornwall, linking the Celtic peoples of Ireland, Wales, and the Old North under Brythonic dominion."
 nd_hen_dest_bretagne: "Sons of Brutus"
 nd_hen_dest_bretagne_desc: "According to Geoffrey of Monmouth, the Britons descend from Brutus of Troy. Reach across the Channel to Normandy, claiming kinship with the Bretons and dominion over both shores. This is the apex of Brythonic military power."
 nd_hen.4.t: "The Old North Consolidated"
 nd_hen.4.d: "Hen Ogledd stands firm. The old kingdoms of Rheged, Gododdin, and Strathclyde answer to a single crown for the first time in centuries. The realm is stable, the borders are secured, and the people look to their king for direction.\n\nThe question that has haunted the Brythonic north since the fall of the Roman order is answered at last: the Old North endures. Now comes the harder question -- what shall it become?"
 nd_hen.4.a: "The Old North endures"
 nd_hen.5.t: "Schools of the Cynfeirdd"
 nd_hen.5.d: "Across the realm, the schools of the Cynfeirdd have been transformed. What were once informal gatherings of bards passing down oral traditions have become organized institutions of learning. Young scholars now study not only the intricate meters of Cumbric poetry but also philosophy, law, mathematics, and the natural sciences.\n\nPaper -- once a rare luxury -- flows through the markets of the Old North. The works of Taliesin and Aneirin are copied, studied, and expanded upon. New treatises in the Cumbric tongue rival anything produced in Latin or French. The intellectual foundations of a Brythonic renaissance have been laid."
 nd_hen.5.a: "The Awen illuminates all who seek knowledge"
 nd_hen.6.t: "The Brythonic Union"
 nd_hen.6.d: "Carmarthen has fallen to us -- or rather, returned to us. The ancient seat of Deheubarth, the heartland of Welsh Brythonic civilization, is united with the Old North for the first time since the post-Roman era. The scholars of the north and the bards of Wales find that they share more than a common linguistic ancestor: they share a vision of Brythonic civilization restored.\n\nThe printing press now carries Cumbric and Welsh texts to every corner of the realm. But how shall we channel this cultural momentum? Through great gatherings of poets and scholars that celebrate our shared heritage? Or through the restoration of the ancient Brythonic legal codes that once governed all Prydain?"
 nd_hen.6.a: "Convene the Eisteddfod -- a festival of arts"
 nd_hen.6.b: "Restore the Cyfraith -- the law of the Britons"
 nd_hen.7.t: "Prifysgol y Gogledd"
 nd_hen.7.d: "The University of the North opens its doors. Built in the Brythonic scholarly tradition but embracing the new scientific methods sweeping Europe, it stands as proof that a language once dismissed as the speech of herdsmen and cattle-raiders can serve as the medium for the highest learning.\n\nScholars from across the Celtic world -- Wales, Ireland, Cornwall, Brittany -- flock to the Prifysgol. The question now is what shall define this institution's character. Shall it look outward, building networks of trade and diplomacy that carry Brythonic ideas across Europe? Or shall it look inward, nurturing the poetic and literary traditions that make the Cumbric world unique?"
 nd_hen.7.a: "Outward -- let our scholars walk among the nations"
 nd_hen.7.b: "Inward -- let the Awen speak through a new age"
 nd_hen.8.t: "The Fall of London"
 nd_hen.8.d: "Caer Ludd has fallen. London -- the greatest city in England, the heart of Anglo-Saxon power -- flies the banner of Hen Ogledd. The city that the Brythonic Britons lost to the Saxons in the dark centuries after Rome has been reclaimed by their descendants.\n\nAccording to Geoffrey of Monmouth, London was founded by King Lud, who named it Caer Ludd. Whether the legend is true matters less than what it represents: the city belongs to the Britons by right of ancient inheritance. The warriors of the Old North march through streets that their ancestors last walked a thousand years ago.\n\nThe Anglo-Saxon chroniclers wrote that the Britons fled westward forever. They were wrong."
 nd_hen.8.a: "Caer Ludd is ours once more"
 nd_hen.9.t: "Masters of the Celtic Seas"
 nd_hen.9.d: "Dublin and Cornwall are ours. The Irish Sea is now a Brythonic lake, and the Celtic peoples of three islands -- Britain, Ireland, and the scattered Atlantic communities -- look to the Old North as their champion.\n\nBut the nature of this hegemony remains to be determined. Shall we forge a confederation of Celtic peoples, binding them through alliance and shared purpose while respecting their distinct identities? Or shall we fortify our island domains into an impregnable bastion, making Britain itself the greatest fortress in the world?"
 nd_hen.9.a: "A confederation of Celtic peoples"
 nd_hen.9.b: "An island fortress, unconquerable"
 nd_hen.10.t: "Sons of Brutus"
 nd_hen.10.d: "Rouen has fallen. The banner of Hen Ogledd flies on the continent. The Brythonic people, who retreated from Brittany to the margins of Britain, have returned to claim their ancient kinship with the Bretons -- and more.\n\nGeoffrey of Monmouth wrote that Brutus of Troy founded Britain and gave it his name. Whether myth or memory, the claim carries weight: the Britons have proven that they are a people of destiny, capable of conquering not merely an island but reaching across the sea. The question now is how to wield this unprecedented power."
 nd_hen.10.a: "In the spirit of Urien -- conquest and glory"
 nd_hen.10.b: "A Celtic empire bound by blood and tongue"
 STATIC_MODIFIER_NAME_nd_hen_dest_eisteddfod: "The Eisteddfod"
 STATIC_MODIFIER_DESC_nd_hen_dest_eisteddfod: "Great festivals of poetry, music, and scholarship draw artists from across the Brythonic world, spreading cultural influence and healing the scars of centuries of conflict."
 STATIC_MODIFIER_NAME_nd_hen_dest_cyfraith: "Cyfraith y Brythoniaid"
 STATIC_MODIFIER_DESC_nd_hen_dest_cyfraith: "The ancient legal codes of the Britons have been restored and codified, providing a just and tolerant framework for governing a diverse people."
 STATIC_MODIFIER_NAME_nd_hen_dest_enlightened_north: "Enlightened North"
 STATIC_MODIFIER_DESC_nd_hen_dest_enlightened_north: "The scholars of Prifysgol y Gogledd build networks across Europe, carrying Brythonic ideas into the wider world and bringing back trade and diplomatic connections."
 STATIC_MODIFIER_NAME_nd_hen_dest_age_of_verse: "The Age of Verse"
 STATIC_MODIFIER_DESC_nd_hen_dest_age_of_verse: "A golden age of Cumbric poetry and song. The bardic tradition reaches heights not seen since Taliesin, and the cultural prestige of the Brythonic world draws converts and admirers."
 STATIC_MODIFIER_NAME_nd_hen_dest_celtic_alliance: "Celtic Alliance"
 STATIC_MODIFIER_DESC_nd_hen_dest_celtic_alliance: "A confederation of Celtic peoples under Brythonic leadership, bound by shared language and purpose. Subject nations are loyal partners, not conquered provinces."
 STATIC_MODIFIER_NAME_nd_hen_dest_island_fortress: "Island Fortress"
 STATIC_MODIFIER_DESC_nd_hen_dest_island_fortress: "Britain has been fortified into an impregnable bastion. The land provides for its own defense, though the fortress mentality constrains outward trade."
 STATIC_MODIFIER_NAME_nd_hen_dest_urien_reborn: "Urien Reborn"
 STATIC_MODIFIER_DESC_nd_hen_dest_urien_reborn: "The spirit of Urien of Rheged lives again in a conquering king. The armies of the Old North are disciplined and vast, though endless campaigning strains the treasury."
 STATIC_MODIFIER_NAME_nd_hen_dest_celtic_empire: "Celtic Empire"
 STATIC_MODIFIER_DESC_nd_hen_dest_celtic_empire: "A pan-Celtic realm stretching from Scotland to Brittany, bound by blood and tongue. The power to dictate peace terms comes at the cost of perpetual readiness for war."
 nd_hen_prifysgol: "Prifysgol y Gogledd"
 nd_hen_prifysgol_desc: "The University of the North, a great center of Brythonic learning where the bardic tradition meets the new science. Scholars from across the Celtic world study poetry, law, natural philosophy, and mathematics in the Cumbric tongue."
 nd_hen_caer_ludd: "Caer Ludd"
 nd_hen_caer_ludd_desc: "The legendary Brythonic fortress of London, rebuilt as the military citadel of a conquering Celtic people. Its massive walls and garrison command the Thames and the surrounding countryside."
 nd_hen_university_upkeep: "University Maintenance"
 nd_hen_university_upkeep_desc: "The scholars, scribes, and lecturers of the Prifysgol require a constant supply of books, paper, beeswax for candlelight, and cloth for their vestments."
 nd_hen_caer_ludd_garrison: "Citadel Garrison"
 nd_hen_caer_ludd_garrison_desc: "The garrison of Caer Ludd requires weapons, stone for repairs, iron for fortifications, and provisions to maintain its readiness."
