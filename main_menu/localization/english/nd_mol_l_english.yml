l_english:
 nd_mol_formed_tt: "Moldavia has been formed"
 nd_mol_path_a_tt: "Moldavia follows the path of the Shield of Christendom"
 nd_mol_path_b_tt: "Moldavia follows the path of the Crossroads Principality"
 STATIC_MODIFIER_NAME_nd_mol_shield_of_christendom: "Shield of Christendom"
 STATIC_MODIFIER_DESC_nd_mol_shield_of_christendom: "The Principality of Moldavia stands as an Orthodox bastion, its fortresses and peasant armies guarding the eastern marches of Christian Europe against all who would threaten them."
 STATIC_MODIFIER_NAME_nd_mol_crossroads_principality: "Crossroads Principality"
 STATIC_MODIFIER_DESC_nd_mol_crossroads_principality: "Moldavia thrives at the intersection of empires, turning its position between East and West into an advantage through shrewd diplomacy, cultural exchange, and lucrative transit trade."
 nd_mol.1.t: "The Principality of Moldavia"
 nd_mol.1.d: "The banner of the aurochs flies over our principality. Moldavia stands at a crossroads -- literally and figuratively. To the west, the Hungarian crown claims suzerainty. To the east, the Ottoman shadow grows longer with each passing year. To the north, Poland watches with interest.\n\nOur voivode must choose how Moldavia will endure. Will we follow the path of Stephen the Great, building fortresses across every mountain pass and rallying the free peasantry into a citizen army? Or will we play the empires against each other, leveraging our position as a vital trade corridor to secure autonomy through diplomacy and prosperity?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mol.1.a: "We shall be the shield that never breaks"
 nd_mol.1.b: "We shall thrive between the great powers"
 nd_mol.2.t: "The Fortress Program"
 nd_mol.2.d: "Under the direction of the voivode, Moldavia has embarked on an unprecedented program of fortification. From the Carpathian passes to the Dniester marshes, a network of stone cetati now guards every approach to the heartland. The great fortress of Suceava, seat of the principality, has been reinforced with new walls and bastions. Cetatea Neamt crowns its mountain peak, commanding the Moldova valley. Soroca watches the eastern frontier, while Hotin guards the northern border.\n\nThis is not merely military construction -- it is a declaration that Moldavia intends to endure. Shall we continue pouring resources into these defenses, or redirect our attention to training mobile field forces that can strike before the enemy reaches our walls?"
 nd_mol.2.a: "Stone walls and deep ditches shall guard our land"
 nd_mol.2.b: "Our cavalry shall be our fortress"
 nd_mol.3.t: "The Painted Monasteries"
 nd_mol.3.d: "Something extraordinary is taking shape in the hills of northern Moldavia. The monasteries commissioned by our princes -- Voronet, Moldovita, Humor, Sucevita -- are being adorned not merely inside, but on their exterior walls with vivid frescoes depicting the Last Judgment, the Siege of Constantinople, and the lives of saints. These paintings, executed in brilliant blues and reds that seem to defy the passage of time, transform each monastery into an open Bible for the faithful.\n\nThe painted monasteries have become centers of learning, their scriptoriums producing chronicles and liturgical texts, their schools educating the sons of boyars and free peasants alike. They stand as proof that Moldavia is not merely a frontier marchland but a civilization in its own right."
 nd_mol.3.a: "Let our faith be painted upon the world"
 nd_mol.4.t: "The Doctrine of the Wilderness"
 nd_mol.4.d: "In January 1475, an Ottoman army of perhaps 120,000 men under Hadim Suleiman Pasha invaded Moldavia. Stephen the Great, commanding fewer than 40,000 troops, retreated before the advancing host, destroying crops and poisoning wells as he went. When the Ottomans reached the narrow valley at Vaslui, exhausted, hungry, and disoriented by fog, the Moldavian army fell upon them from the surrounding forests. The rout was total.\n\nThe Battle of Vaslui demonstrated that a small nation could defeat a vast empire -- not through matching its strength, but through patience, terrain, and the willingness to destroy one's own land rather than surrender it. Pope Sixtus IV called Stephen 'Verus Christianae Fidei Athleta' -- the true champion of the Christian faith. Shall we codify this doctrine of defensive devastation, or perfect the ambush tactics that delivered the killing blow?"
 nd_mol.4.a: "Let the land itself be our weapon"
 nd_mol.4.b: "Perfect the art of the forest ambush"
 STATIC_MODIFIER_NAME_nd_mol_cetatea_program: "Cetatea Program"
 STATIC_MODIFIER_DESC_nd_mol_cetatea_program: "A comprehensive fortress-building program modeled on the twenty-four strongholds constructed under the voivode's direction, each positioned to command a pass, ford, or crossroads."
 STATIC_MODIFIER_NAME_nd_mol_open_field_doctrine: "Open Field Doctrine"
 STATIC_MODIFIER_DESC_nd_mol_open_field_doctrine: "Rather than shelter behind walls, Moldavia's cavalry sweeps the field, striking before the enemy can bring siege equipment to bear against our fortresses."
 STATIC_MODIFIER_NAME_nd_mol_voronet_glory: "Glory of Voronet"
 STATIC_MODIFIER_DESC_nd_mol_voronet_glory: "The painted monasteries of Moldavia have become masterpieces of Orthodox art, their exterior frescoes inspiring pilgrims and scholars from across the Christian world."
 STATIC_MODIFIER_NAME_nd_mol_vaslui_tactics: "Vaslui Doctrine"
 STATIC_MODIFIER_DESC_nd_mol_vaslui_tactics: "The scorched earth strategy that devastated invading armies at Vaslui -- destroying crops, poisoning wells, and turning the land itself into a weapon against the invader."
 STATIC_MODIFIER_NAME_nd_mol_guerrilla_mastery: "Forest Ambush Mastery"
 STATIC_MODIFIER_DESC_nd_mol_guerrilla_mastery: "The art of the Moldavian forest ambush -- luring superior forces into narrow valleys and dense woodland before falling upon them from every direction."
 nd_mol_plaiesi_tradition: "Plaiesi Tradition"
 nd_mol_plaiesi_tradition_desc: "The plaiesi are free mountain peasants who guard the Carpathian passes, ambushing invaders and fighting delaying actions in terrain they know intimately."
 nd_mol_boyar_privileges: "Boyar Privileges"
 nd_mol_boyar_privileges_desc: "The great boyar families control vast landed estates, providing the principality with agricultural wealth and political counsel in the voivodal divan."
 nd_mol_apiculture: "Moldavian Apiculture"
 nd_mol_apiculture_desc: "Moldavia's forests teem with bees, and beeswax has become one of the principality's most valuable exports, traded as far as Constantinople and Venice."
 nd_mol_orthodox_identity: "Orthodox Identity"
 nd_mol_orthodox_identity_desc: "The Orthodox faith is inseparable from Moldavian identity, with the metropolitan see and monastic foundations serving as pillars of national consciousness."
 nd_mol_divan_assembly: "Divan Assembly"
 nd_mol_divan_assembly_desc: "The voivodal divan, composed of great boyars and church leaders, advises the prince on matters of state, balancing princely authority with noble counsel."
 nd_mol_razesi_mobilization: "Razesi Mobilization"
 nd_mol_razesi_mobilization_desc: "The razesi -- free landowning peasants -- form the backbone of Moldavia's militia. Unlike serfs bound to noble estates, they fight for their own land and freedom."
 nd_mol_calarasi_tactics: "Calarasi Tactics"
 nd_mol_calarasi_tactics_desc: "The calarasi light cavalry employ Tatar-style hit-and-run tactics, harassing enemy columns, cutting supply lines, and drawing larger forces into ambushes."
 nd_mol_fortress_builders: "Fortress Builders"
 nd_mol_fortress_builders_desc: "Under the voivode's direction, a network of stone fortresses rises across Moldavia, from Suceava and Neamt in the west to Soroca and Tighina on the eastern frontier."
 nd_mol_painted_churches: "Painted Churches"
 nd_mol_painted_churches_desc: "The monasteries of northern Moldavia are adorned with vivid exterior frescoes -- masterworks of Orthodox art that serve as open-air scriptures for the faithful."
 nd_mol_suceava_court: "Suceava Court"
 nd_mol_suceava_court_desc: "The princely court at Suceava, capital of Moldavia, serves as both a center of governance and a junction for trade routes connecting Central Europe to the Black Sea."
 nd_mol_curteni_guard: "Curteni Guard"
 nd_mol_curteni_guard_desc: "The curteni are the princely court cavalry -- professional warriors maintained by the voivode as a standing force independent of the boyar military obligations."
 nd_mol_voivodeship_arms: "Voivodeship Arms"
 nd_mol_voivodeship_arms_desc: "The principality establishes its own armories, reducing dependence on imported weaponry and equipping the growing professional army with locally forged arms."
 nd_mol_scorched_earth: "Scorched Earth Doctrine"
 nd_mol_scorched_earth_desc: "Moldavia's defensive doctrine turns the principality's own terrain into a weapon -- retreating forces destroy crops, poison wells, and fell trees to slow the invader."
 nd_mol_between_empires: "Between Empires"
 nd_mol_between_empires_desc: "Caught between Ottoman, Hungarian, and Polish ambitions, Moldavia has perfected the art of playing great powers against each other to preserve its autonomy."
 nd_mol_professional_army: "Professional Army"
 nd_mol_professional_army_desc: "The lefegii are salaried professional soldiers who serve the voivode directly, providing a reliable core for the principality's army independent of feudal obligation."
 nd_mol_moldavian_viticulture: "Moldavian Viticulture"
 nd_mol_moldavian_viticulture_desc: "The hill country of Moldavia produces renowned wines, with the boyar estates cultivating vineyards that supply both the domestic market and the export trade."
 nd_mol_chronicle_tradition: "Chronicle Tradition"
 nd_mol_chronicle_tradition_desc: "Moldavian monastic chroniclers record the history of the principality, preserving knowledge and fostering a tradition of literacy within the church."
 nd_mol_tribute_diplomacy: "Tribute Diplomacy"
 nd_mol_tribute_diplomacy_desc: "Moldavia pays tribute to maintain its internal autonomy -- a pragmatic arrangement that preserves the principality's institutions while acknowledging overwhelming power."
 nd_mol_iasi_ascendant: "Iasi Ascendant"
 nd_mol_iasi_ascendant_desc: "As the princely seat shifts from Suceava to Iasi, the new capital becomes a center of learning and culture at the crossroads of east and west."
 nd_mol_boyar_constitutionalism: "Boyar Constitutionalism"
 nd_mol_boyar_constitutionalism_desc: "The great boyars assert constitutional limits on princely authority, establishing precedents for shared governance that restrain arbitrary rule."
 nd_mol_printing_houses: "Printing Houses"
 nd_mol_printing_houses_desc: "Orthodox printing houses in Moldavia produce liturgical texts, legal codes, and chronicles in the vernacular, spreading literacy beyond the monasteries."
 nd_mol_enduring_resistance: "Enduring Resistance"
 nd_mol_enduring_resistance_desc: "Despite centuries of foreign domination, Moldavian military traditions endure -- the free peasantry still takes up arms when called, fighting with the desperation of those defending their own soil."
 nd_mol_phanariot_reforms: "Phanariot Reforms"
 nd_mol_phanariot_reforms_desc: "The Phanariot princes, though appointed by Constantinople, introduce Enlightenment-inspired administrative and legal reforms that modernize Moldavian governance."
 nd_mol_emancipation: "Emancipation"
 nd_mol_emancipation_desc: "The abolition of serfdom transforms Moldavian society, freeing the rural population to pursue opportunities beyond the boyar estates."
 nd_mol_national_awakening: "National Awakening"
 nd_mol_national_awakening_desc: "A growing consciousness of Moldavian and Romanian national identity spreads through the principality, fueled by literary movements and historical scholarship."
 nd_mol_modern_army: "Modern Army"
 nd_mol_modern_army_desc: "Moldavian military forces adopt modern European organization, drill, and equipment, transforming from feudal levies into a professional national army."
 a_nd_mol_plaiesi: "Plaiesi"
 a_nd_mol_plaiesi_desc: "Mountain border guards drawn from the free peasantry of the Carpathian passes. The plaiesi know every trail and defile, fighting as skirmishers who ambush invaders and melt back into the forests."
 a_nd_mol_razesi: "Razesi Militia"
 a_nd_mol_razesi_desc: "Free landowning peasants mobilized for the defense of Moldavia. Unlike serfs, the razesi fight for their own land, making them stubborn and determined defenders."
 a_nd_mol_calarasi: "Calarasi"
 a_nd_mol_calarasi_desc: "Moldavian light cavalry who employ Tatar-style hit-and-run tactics. The calarasi harass enemy columns, raid supply lines, and draw superior forces into ambush positions."
 a_nd_mol_curteni: "Curteni Guard"
 a_nd_mol_curteni_desc: "The court cavalry of the Moldavian voivode -- professional horsemen maintained as a standing force independent of boyar feudal obligations. They form the shock arm of the principality's army."
 a_nd_mol_lefegii: "Lefegii"
 a_nd_mol_lefegii_desc: "Salaried professional infantry in the service of the voivode. The lefegii provide a disciplined core for the Moldavian army, trained in close-order formation fighting."
 levy_nd_mol_plaiesi: "Plaiesi Border Guard"
 levy_nd_mol_plaiesi_desc: "Mountain border guards drawn from the free peasantry, defending the Carpathian passes."
 levy_nd_mol_razesi: "Razesi Militia"
 levy_nd_mol_razesi_desc: "Free landowning peasants mobilized as determined militia defenders of Moldavian soil."
 levy_nd_mol_calarasi: "Calarasi Riders"
 levy_nd_mol_calarasi_desc: "Light cavalry levy drawn from the lesser nobility and soldiers, employing Tatar-style raiding tactics."
 nd_mol_cetate: "Cetate"
 nd_mol_cetate_desc: "A Moldavian mountain fortress built to command a pass, ford, or crossroads. These stone strongholds form a defensive network across the principality."
 nd_mol_painted_monastery: "Painted Monastery"
 nd_mol_painted_monastery_desc: "A Moldavian monastery adorned with vivid exterior frescoes, serving as a center of Orthodox learning, art, and spiritual life."
 nd_mol_boyar_estate: "Boyar Estate"
 nd_mol_boyar_estate_desc: "The landed estate of a Moldavian boyar, producing agricultural wealth from vineyards, livestock, and forestry."
 nd_mol_armory: "Moldavian Armory"
 nd_mol_armory_desc: "A workshop producing weapons and equipment for the principality's growing military forces."
 nd_mol_beeswax_house: "Beeswax Processing House"
 nd_mol_beeswax_house_desc: "A facility for processing Moldavian beeswax into trade goods, drawing on the principality's rich forest apiculture."
 nd_mol_cetate_maintenance: "Fortress Garrison"
 nd_mol_cetate_maintenance_desc: "Stone, iron, and timber for maintaining the walls and garrison of a Moldavian mountain fortress."
 nd_mol_monastery_maintenance: "Monastic Upkeep"
 nd_mol_monastery_maintenance_desc: "Dyes for fresco painting, beeswax for liturgical candles, and stone for maintenance of the monastery buildings."
 nd_mol_estate_vineyard: "Boyar Vineyard"
 nd_mol_estate_vineyard_desc: "The boyar estate cultivates vineyards on Moldavian hillsides, producing wine for domestic consumption and export."
 nd_mol_estate_maintenance: "Estate Upkeep"
 nd_mol_estate_maintenance_desc: "Livestock, wool, and timber for the daily operations of a Moldavian boyar estate."
 nd_mol_arms_production: "Moldavian Arms Production"
 nd_mol_arms_production_desc: "Local smiths forge weapons from Moldavian iron, reducing dependence on imported armaments."
 nd_mol_armory_maintenance: "Armory Upkeep"
 nd_mol_armory_maintenance_desc: "Iron, timber, and stone for maintaining the workshop and its furnaces."
 nd_mol_wax_processing: "Wax and Cloth Processing"
 nd_mol_wax_processing_desc: "Moldavian beeswax is combined with local wool to produce waxed cloth for waterproofing and trade."
 nd_mol_beeswax_maintenance: "Beeswax House Upkeep"
 nd_mol_beeswax_maintenance_desc: "Beeswax, timber, and pottery for maintaining the processing house and its operations."
 nd_mol_printing_house: "Moldavian Printing House"
 nd_mol_printing_house_desc: "An Orthodox printing house producing liturgical texts, chronicles, and legal codes in the Moldavian vernacular."
 nd_mol_print_maintenance: "Printing Supplies"
 nd_mol_print_maintenance_desc: "Paper, dyes for ink, and timber are pressed into liturgical texts, chronicles, and legal codes in the vernacular."
 nd_mol_dest_defender: "Defender of the Passes"
 nd_mol_dest_defender_desc: "Secure the Wallachian heartland by taking Targoviste and Braila, uniting the Romanian lands under Moldavian military leadership. Requires an army of at least 30,000 men."
 nd_mol_dest_bulwark: "Danube Bulwark"
 nd_mol_dest_bulwark_desc: "Extend Moldavian control along the Danube frontier. Take Constanta in Dobruja and Drastar on the Bulgarian bank, building a chain of fortifications that makes the river an impassable barrier."
 nd_mol_dest_champion: "Champion of the Faith"
 nd_mol_dest_champion_desc: "The ultimate expression of the Shield of Christendom: plant the banner of the aurochs over Constantinople and Varna, fulfilling the crusading vision that Stephen the Great only dreamed of."
 nd_mol_dest_gateway: "Gateway Between Worlds"
 nd_mol_dest_gateway_desc: "Establish Moldavia as the essential trade corridor between East and West by securing Lviv, the great western trading hub, and accumulating substantial treasury reserves."
 nd_mol_dest_emporium: "Emporium of the East"
 nd_mol_dest_emporium_desc: "Transform Moldavia into a major economic power. Ensure wine flows through the capital market, embrace modern banking practices, and develop the principality's total wealth far beyond its formation core."
 nd_mol_dest_dacia: "Dacia Reborn"
 nd_mol_dest_dacia_desc: "Unite the Romanian lands through culture and prosperity rather than conquest alone. Take Bucharest, embrace the printing press to spread Romanian national consciousness, and become a beacon of prestige and wealth."
 nd_mol_destiny: "Destiny of Moldavia"
 nd_mol_destiny_desc: "The principality has been formed. Now its true destiny begins -- whether as the shield of Christendom or the crossroads of empires."
 nd_mol.5.t: "The Destiny of Moldavia"
 nd_mol.5.d: "Moldavia stands reborn. The aurochs banner flies over a united principality, and the question that has haunted every voivode since Bogdan the Founder can finally be answered not with hope, but with action. What shall Moldavia become? The principality's fate is no longer in the hands of foreign emperors and sultans -- it rests with us alone."
 nd_mol.5.a: "Our destiny is our own to forge"
 nd_mol.6.t: "Defender of the Passes"
 nd_mol.6.d: "The Carpathian passes are secured, and our armies have crossed into Wallachia. Targoviste, seat of the Wallachian voivodes, flies the Moldavian banner. Braila, commanding the lower Danube, is ours. The Romanian lands begin to unite under the shield of Moldavian arms.\n\nThis is what Stephen the Great envisioned -- not merely defending our borders, but extending them until no invader can threaten our heartland. The road south lies open. The Danube awaits."
 nd_mol.6.a: "The passes are ours. Now for the river."
 nd_mol.7.t: "The Danube Frontier"
 nd_mol.7.d: "Moldavian fortifications now line the Danube from Dobruja to the Bulgarian bank. Constanta gives us a window onto the Black Sea, while Drastar commands the river crossing that has seen armies pass for a thousand years. The ancient Roman limes, abandoned for centuries, lives again under the banner of the aurochs.\n\nOur generals debate the next phase. Some advocate garrisoning these positions permanently, creating an unbreakable defensive line. Others argue for an aggressive frontier march -- using the Danube as a springboard for further expansion rather than a static barrier."
 nd_mol.7.a: "Garrison the river. Let none cross."
 nd_mol.7.b: "The frontier is a springboard, not a wall."
 nd_mol.8.t: "Champion of the Faith"
 nd_mol.8.d: "The unthinkable has been achieved. Constantinople, the Queen of Cities, the seat of emperors and patriarchs, flies the banner of the aurochs. Varna, where a crusade once perished, is redeemed. Pope Sixtus called Stephen 'Verus Christianae Fidei Athleta' -- the true champion of the Christian faith. We have earned that title a hundredfold.\n\nMoldavia's transformation from a frontier principality to a great Christian power is complete. But greatness demands choices. Shall we wield this power as Orthodox crusaders, extending the true faith across the lands we have conquered? Or shall we build an eternal bulwark, an impregnable fortress-state that no power on earth can overthrow?"
 nd_mol.8.a: "We are the sword of the Orthodox faith"
 nd_mol.8.b: "We are the wall that shall never fall"
 nd_mol.9.t: "Gateway Between Worlds"
 nd_mol.9.d: "Lviv has entered Moldavia's commercial orbit, and with it the trade routes that connect the Baltic to the Black Sea, Central Europe to the Orient. Moldavian merchants now handle goods that once passed through foreign hands -- Flemish cloth moving east, Crimean furs moving west, spices from the Levant passing through our warehouses.\n\nThe voivode's treasury swells with customs revenue. What empires could not take by force, Moldavia gains through the shrewdness of its merchants and the advantage of its geography."
 nd_mol.9.a: "Let the wealth of nations flow through our lands"
 nd_mol.10.t: "Emporium of the East"
 nd_mol.10.d: "Moldavian wine is traded in markets from Venice to Constantinople. Banking houses operate in Iasi and Suceava, extending credit to merchants across Eastern Europe. The principality's development has outstripped all expectations -- what was once a frontier marchland is now a prosperous commercial state.\n\nOur advisors present two visions for the next stage. Some advocate deepening our commercial infrastructure -- more markets, more warehouses, more trade agreements. Others argue that our true strength lies in cultural exchange -- becoming a bridge between Latin West and Orthodox East, drawing scholars, artists, and diplomats to our courts."
 nd_mol.10.a: "Commerce is the sinew of the state"
 nd_mol.10.b: "We shall be the bridge between civilizations"
 nd_mol.11.t: "Dacia Reborn"
 nd_mol.11.d: "The dream of a united Romania -- not through blood and iron alone, but through shared language, culture, and prosperity -- is taking shape. Bucharest, jewel of the Wallachian plain, recognizes Moldavian leadership. The printing press spreads Romanian texts from the Carpathians to the Danube. Scholars speak of Dacia reborn -- the ancient kingdom rising from the ashes of a thousand years.\n\nMoldavia stands at a crossroads once more, but this time as a power rather than a pawn. Shall we forge a new Dacian identity, assimilating the diverse peoples of our realm into a unified nation? Or shall we pursue an enlightenment vision -- tolerant, cosmopolitan, drawing strength from diversity rather than uniformity?"
 nd_mol.11.a: "One people, one language, one destiny"
 nd_mol.11.b: "In diversity, strength"
 STATIC_MODIFIER_NAME_nd_mol_dest_danube_garrison: "Danube Garrison"
 STATIC_MODIFIER_DESC_nd_mol_dest_danube_garrison: "Permanent garrisons along the Danube frontier maintain order, recover from devastation rapidly, and build a tradition of professional military service."
 STATIC_MODIFIER_NAME_nd_mol_dest_border_march: "Border March"
 STATIC_MODIFIER_DESC_nd_mol_dest_border_march: "An aggressive frontier doctrine that uses the Danube as a springboard for raids and expansion, though the constant warfare takes its toll on local production."
 STATIC_MODIFIER_NAME_nd_mol_dest_orthodox_champion: "Orthodox Champion"
 STATIC_MODIFIER_DESC_nd_mol_dest_orthodox_champion: "Moldavia wields its newfound power as a sword of the Orthodox faith, commanding respect in peace negotiations while keeping conquered peoples loyal through shared religion."
 STATIC_MODIFIER_NAME_nd_mol_dest_eternal_bulwark: "Eternal Bulwark"
 STATIC_MODIFIER_DESC_nd_mol_dest_eternal_bulwark: "A fortress-state doctrine that reduces military costs and improves tactical doctrine, though the focus on fortification diverts resources from civilian construction."
 STATIC_MODIFIER_NAME_nd_mol_dest_trade_emporium: "Trade Emporium"
 STATIC_MODIFIER_DESC_nd_mol_dest_trade_emporium: "Moldavia's commercial infrastructure expands, attracting more merchants and reducing borrowing costs, though rapid growth brings inflationary pressure."
 STATIC_MODIFIER_NAME_nd_mol_dest_cultural_bridge: "Cultural Bridge"
 STATIC_MODIFIER_DESC_nd_mol_dest_cultural_bridge: "Moldavia becomes a diplomatic hub between civilizations, expanding its influence through relationships and vassal loyalty, though its pacifist reputation makes wars more costly to justify."
 STATIC_MODIFIER_NAME_nd_mol_dest_dacia_nova: "Dacia Nova"
 STATIC_MODIFIER_DESC_nd_mol_dest_dacia_nova: "The new Dacian state unifies its peoples through shared identity, satisfying all estates while assimilating diverse populations and expanding diplomatic reach."
 STATIC_MODIFIER_NAME_nd_mol_dest_moldavian_enlightenment: "Moldavian Enlightenment"
 STATIC_MODIFIER_DESC_nd_mol_dest_moldavian_enlightenment: "An enlightenment vision that integrates diverse peoples through tolerance and reduces complacency, though the nobility's military obligations diminish as cultural pursuits take precedence."
 nd_mol_citadel: "Moldavian Citadel"
 nd_mol_citadel_desc: "A grand fortress representing the apex of Moldavian defensive architecture -- massive stone walls, deep ditches, and permanent garrison quarters that make this location virtually impregnable."
 nd_mol_citadel_maintenance: "Citadel Garrison"
 nd_mol_citadel_maintenance_desc: "Stone, iron, and timber for maintaining the citadel's formidable defenses and housing its permanent garrison."
 nd_mol_academy: "Moldavian Academy"
 nd_mol_academy_desc: "A center of Romanian learning and culture, where scholars, theologians, and artists gather to study, teach, and advance the intellectual life of the nation."
 nd_mol_academy_maintenance: "Academy Upkeep"
 nd_mol_academy_maintenance_desc: "Paper for manuscripts, books for the library, and cloth for the scholars' quarters and ceremonial vestments."
