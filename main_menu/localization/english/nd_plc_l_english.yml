l_english:
 STATIC_MODIFIER_NAME_nd_golden_liberty: "Golden Liberty"
 STATIC_MODIFIER_DESC_nd_golden_liberty: "The Złota Wolność enshrines the rights of every nobleman. No king rules without the consent of the Sejm, no war is declared without the szlachta's approval, and every faith may worship freely under the Commonwealth's protection."
 STATIC_MODIFIER_NAME_nd_jagiellonian_union: "Jagiellonian Union"
 STATIC_MODIFIER_DESC_nd_jagiellonian_union: "The dynasty that united two great nations forged a state that stretches from the Baltic to the Black Sea. Through the strength of the crown and the loyalty of its subjects, the Commonwealth shall endure as a continental power."
 STATIC_MODIFIER_NAME_nd_spirit_of_tolerance: "Spirit of Tolerance"
 STATIC_MODIFIER_DESC_nd_spirit_of_tolerance: "In an age when Europe burns with religious warfare, the Commonwealth stands apart — a refuge where Catholic, Protestant, Orthodox, and Jew may live side by side in peace."
 STATIC_MODIFIER_NAME_nd_confessional_discipline: "Confessional Discipline"
 STATIC_MODIFIER_DESC_nd_confessional_discipline: "The true faith is the bedrock of the state. By strengthening the Church and guiding the faithful, the Commonwealth secures its spiritual unity against the chaos of sectarian division."
 STATIC_MODIFIER_NAME_nd_constitutional_republic: "Constitutional Republic"
 STATIC_MODIFIER_DESC_nd_constitutional_republic: "The Government Act establishes the separation of powers, abolishes the liberum veto, and extends citizenship beyond the nobility. A new dawn for the Republic of Both Nations."
 STATIC_MODIFIER_NAME_nd_royal_prerogative: "Royal Prerogative"
 STATIC_MODIFIER_DESC_nd_royal_prerogative: "The crown has reclaimed its ancient authority. With the liberum veto abolished and the magnates brought to heel, the king may at last govern without the paralysis of noble obstruction."
 nd_plc.1.t: "The Union of Two Nations"
 nd_plc.1.d: "On the first day of July, in the city of Lublin, the seals of two great nations were pressed into wax. The Kingdom of Poland and the Grand Duchy of Lithuania — bound by marriage, by war, and by shared necessity since the days of Jogaila and Jadwiga — are now forged into a single Commonwealth. The Rzeczpospolita Obojga Narodów, the Republic of Both Nations, stretches from the Baltic shores to the steppes of the east, encompassing Poles, Lithuanians, Ruthenians, Germans, Jews, Tatars, and Armenians within its borders.\n\nBut what manner of state shall this be? The szlachta dream of a noble republic where every gentleman is a king on his own estate, where the Sejm governs by consensus and the crown is merely first among equals. Others see the Union as an opportunity to build a centralized power under the Jagiellonian legacy — a dynasty state that can marshal the combined strength of both nations against Muscovy, the Ottomans, and the Teutonic remnants.\n\nThe path we choose now will shape the character of the Commonwealth for generations.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_plc.1.a: "Złota Wolność — the golden liberty of every nobleman"
 nd_plc.1.b: "The Jagiellonian legacy — strength through dynastic union"
 nd_plc.2.t: "The Warsaw Confederation"
 nd_plc.2.d: "On the twenty-eighth of January, 1573, with the throne empty and the future uncertain, the assembled nobility of the Commonwealth made a declaration that would echo through the centuries. The Confederation of Warsaw — signed by Catholics, Lutherans, Calvinists, Orthodox believers, and others — pledged mutual tolerance and peace between all confessions.\n\n'We who differ in matters of religion will keep the peace among ourselves,' the document proclaims, 'and neither shed blood on account of differences of Faith, or kinds of church, nor punish one another by confiscation of goods, deprivation of honor, imprisonment, or exile.'\n\nIn an age when the St. Bartholomew's Day Massacre has just shocked all of Europe, and religious wars tear the continent apart, the Commonwealth has chosen a radical path. But not all are pleased — Cardinal Hosius has called Poland 'a place of shelter for heretics,' and many Catholic voices demand that the state defend the true faith with greater vigor."
 nd_plc.2.a: "Let tolerance be the law of our Republic"
 nd_plc.2.b: "Strengthen the true faith — unity through conviction"
 nd_plc.3.t: "The Government Act of the Third of May"
 nd_plc.3.d: "After decades of political paralysis, foreign interference, and the slow disintegration of state authority, the Great Sejm has achieved what many thought impossible. On the third of May, 1791, the deputies have adopted the Government Act — the first written constitution in Europe and the second in the world, after the American document of 1787.\n\nThe Constitution abolishes the liberum veto that allowed any single deputy to destroy an entire session's legislation. It establishes a hereditary monarchy, extends political rights to the bourgeoisie, and places the peasantry under the state's protection. Hugo Kołłątaj, Ignacy Potocki, and King Stanisław August Poniatowski have together forged a document that could save the Commonwealth from the partitioning powers.\n\nBut Russia and Prussia will not tolerate a strengthened Poland. The Constitution's survival depends on whether we can defend it against those who profit from our weakness — both foreign powers and the magnates of the Targowica Confederation who invite Russian bayonets to protect their privileges."
 nd_plc.3.a: "The Republic reborn — sovereignty through constitution"
 nd_plc.3.b: "The Crown restored — strong monarchy for desperate times"
 nd_plc.4.t: "The Lisowczycy — Painted Riders of the Commonwealth"
 nd_plc.4.d: "They ride without pay, without supply trains, without mercy. The Lisowczycy — named for their founder Aleksander Józef Lisowski — are irregular cavalry who serve the Commonwealth in exchange for the right to loot. Clad in distinctive costumes and mounted on fast horses, they strike deep behind enemy lines, burning supplies, scattering reinforcements, and spreading terror.\n\nTheir reputation precedes them across Europe. During the Thirty Years' War, Holy Roman Emperor Ferdinand II requested their services, and the 'painted riders' became feared from Muscovy to Transylvania. Their speed and ferocity are unmatched — but so is their reputation for plunder and violence against civilians.\n\nFor the Commonwealth, they represent a military paradox: devastating in battle, ungovernable in peace. But in a state that cannot afford a standing army of sufficient size, these self-financing irregulars fill a critical gap in the nation's defenses."
 nd_plc.4.a: "Let the painted riders serve the Republic"
 nd_plc.5.t: "The Grain Road to Gdańsk"
 nd_plc.5.d: "From the great estates of the interior — from the folwarks of Mazovia, Lesser Poland, and Volhynia — the barges drift northward down the Vistula. They carry the rye and wheat that feeds Amsterdam, Antwerp, and the growing cities of the West. At Gdańsk, the river meets the sea, and Polish grain meets Dutch silver.\n\nThe city of Gdańsk controls eighty percent of this inland trade. Its burghers grow rich as middlemen between the szlachta landowners and the merchants of the Low Countries. The grain trade has made the Commonwealth the breadbasket of Europe, but it has also locked the economy into a pattern: the nobles expand their estates, bind the peasantry more tightly to the land, and resist any change that might threaten the flow of grain to market.\n\nStill, as long as the harvests flow and the Vistula runs, the wealth of the Commonwealth endures."
 nd_plc.5.a: "The river carries our prosperity"
 nd_plc.6.t: "Sarmatism — The Noble Ideal"
 nd_plc.6.d: "A new cultural movement has swept through the szlachta. Sarmatism — the belief that the Polish nobility descends from the ancient Sarmatian warriors of the steppes — has become more than mere genealogical myth. It is an entire way of life: the kontusz coat, the szabla saber, the ornate karabela, the lavish hospitality, the fierce independence, and the conviction that the Commonwealth's noble democracy is the finest form of government ever conceived by man.\n\nSarmatist culture celebrates martial valor, personal honor, and the equality of all noblemen regardless of wealth. It produces magnificent art, architecture, and literature — the manor houses and churches of the countryside bear witness to its aesthetic ambitions. But critics warn that Sarmatism also breeds xenophobia, resistance to reform, and a dangerous complacency about the Commonwealth's growing vulnerabilities.\n\nWhether golden age or gilded cage, Sarmatism has become the defining identity of the Polish-Lithuanian nobility."
 nd_plc.6.a: "This is who we are"
 nd_plc_union_heritage: "Union Heritage"
 nd_plc_union_heritage_desc: "The tradition of Polish-Lithuanian cooperation stretches back to the marriage of Jogaila and Jadwiga, binding two peoples against common threats."
 nd_plc_amber_trade: "Amber Road"
 nd_plc_amber_trade_desc: "The ancient trade routes that carried Baltic amber south across Europe have enriched the Commonwealth's merchants for centuries."
 nd_plc_szlachta_traditions: "Szlachta Traditions"
 nd_plc_szlachta_traditions_desc: "The mounted nobility of the Commonwealth fights as cavalry — every nobleman a warrior, every estate a source of riders."
 nd_plc_multi_faith_roots: "Multi-Faith Roots"
 nd_plc_multi_faith_roots_desc: "From the Statute of Kalisz onward, the Polish-Lithuanian lands have offered protection to communities of every faith."
 nd_plc_jagiellonian_learning: "Jagiellonian Learning"
 nd_plc_jagiellonian_learning_desc: "The Jagiellonian University at Krakow, founded in 1364, produced Copernicus and became one of Europe's greatest centers of scholarship."
 nd_plc_folwark_economy: "Folwark Economy"
 nd_plc_folwark_economy_desc: "The folwark system — noble-owned agricultural estates worked by bound peasants — became the engine of Commonwealth grain production."
 nd_plc_sejmik_tradition: "Sejmik Tradition"
 nd_plc_sejmik_tradition_desc: "Provincial parliaments elect deputies to the national Sejm, giving every voivodship a voice in governance."
 nd_plc_pospolite_reforms: "Pospolite Ruszenie Reforms"
 nd_plc_pospolite_reforms_desc: "The general levy of the szlachta — every nobleman obligated to ride to war — is the Commonwealth's ultimate military reserve."
 nd_plc_magnate_courts: "Magnate Court Culture"
 nd_plc_magnate_courts_desc: "Great magnate families maintain courts rivaling those of minor kings, patronizing artists, musicians, and scholars."
 nd_plc_pancerni_tradition: "Pancerni Cavalry"
 nd_plc_pancerni_tradition_desc: "The pancerni — armored cossack cavalry — form the backbone of the Commonwealth's mounted forces, versatile and numerous."
 nd_plc_wybraniecka_infantry: "Piechota Wybraniecka"
 nd_plc_wybraniecka_infantry_desc: "Selected infantry conscripted from crown estates, the wybraniecka represent the Commonwealth's attempt to build a professional peasant infantry."
 nd_plc_lipka_tatars: "Lipka Tatar Service"
 nd_plc_lipka_tatars_desc: "Muslim Tatar settlers, descended from Golden Horde refugees, serve the Commonwealth as light cavalry scouts and raiders."
 nd_plc_vistula_trade: "Vistula Grain Trade"
 nd_plc_vistula_trade_desc: "Grain from the interior flows down the Vistula to Gdansk, where it feeds the cities of Western Europe in exchange for silver and manufactured goods."
 nd_plc_tabor_defense: "Tabor War Wagons"
 nd_plc_tabor_defense_desc: "Mobile wagon fortifications create instant field defenses, turning the open plains into defensive positions against steppe raiders."
 nd_plc_warsaw_confederation: "Warsaw Confederation"
 nd_plc_warsaw_confederation_desc: "The 1573 declaration of mutual religious tolerance — one of the first such acts in European history — defines the Commonwealth as a refuge for the persecuted."
 nd_plc_lisowczycy_tradition: "Lisowczycy Tradition"
 nd_plc_lisowczycy_tradition_desc: "Irregular raider cavalry who fight without pay, sustaining themselves through plunder. Feared across Europe for their speed and ferocity."
 nd_plc_magnate_fortifications: "Magnate Fortifications"
 nd_plc_magnate_fortifications_desc: "The great magnate families build fortified manors and castles across their estates, creating a network of strongpoints across the Commonwealth."
 nd_plc_elective_monarchy: "Elective Monarchy"
 nd_plc_elective_monarchy_desc: "The Free Election allows all nobles to participate in choosing the king, attracting foreign candidates and diplomatic attention from across Europe."
 nd_plc_gdansk_trade: "Gdańsk Trade Dominance"
 nd_plc_gdansk_trade_desc: "The great Baltic port city controls the export of Commonwealth grain to Western Europe, channeling enormous wealth through its warehouses."
 nd_plc_noble_democracy: "Noble Democracy"
 nd_plc_noble_democracy_desc: "The liberum veto gives every noble deputy the power to halt legislation — a principle of sacred unanimity that both protects liberty and invites paralysis."
 nd_plc_sarmatism: "Sarmatism"
 nd_plc_sarmatism_desc: "The belief that Polish nobles descend from ancient Sarmatian warriors has produced a distinctive culture of martial valor, lavish display, and fierce independence."
 nd_plc_refuge_of_nations: "Refuge of Nations"
 nd_plc_refuge_of_nations_desc: "The Commonwealth welcomes the persecuted of all faiths and nations — Jews, Armenians, Scots, Germans, Tatars — enriching its culture through diversity."
 nd_plc_dual_legal_system: "Dual Legal System"
 nd_plc_dual_legal_system_desc: "Poland and Lithuania maintain separate legal codes and tribunals, preserving the Grand Duchy's distinct identity within the Commonwealth."
 nd_plc_may_constitution: "May Third Constitution"
 nd_plc_may_constitution_desc: "Europe's first modern constitution abolishes the liberum veto, establishes separation of powers, and extends citizenship to the bourgeoisie."
 nd_plc_national_uprising: "National Uprising Spirit"
 nd_plc_national_uprising_desc: "The spirit of Kościuszko — a people willing to fight for liberty against overwhelming odds — defines the Commonwealth's final, defiant chapter."
 nd_plc_economic_reform: "Economic Modernization"
 nd_plc_economic_reform_desc: "Late Commonwealth reforms introduce manufactures, improve infrastructure, and begin the transition from a purely agricultural export economy."
 nd_plc_unity_in_diversity: "Unity in Diversity"
 nd_plc_unity_in_diversity_desc: "The Commonwealth's greatest strength has always been its ability to unite Poles, Lithuanians, Ruthenians, Germans, Jews, Tatars, and Armenians under one banner."
 a_nd_plc_pancerni: "Pancerni"
 a_nd_plc_pancerni_desc: "Medium armored cavalry, the backbone of the Commonwealth's mounted forces. More numerous and versatile than the hussars, the pancerni fill every role from reconnaissance to pursuit."
 a_nd_plc_lisowczycy: "Lisowczycy"
 a_nd_plc_lisowczycy_desc: "Irregular raider cavalry who fight without pay, sustaining themselves through plunder. Named for Aleksander Józef Lisowski, these 'painted riders' were feared across Europe."
 a_nd_plc_lisowczycy_levy: "Lisowczycy Levy"
 a_nd_plc_lisowczycy_levy_desc: "Noble-raised irregular cavalry in the Lisowczycy tradition — fast, aggressive, and self-sustaining through plunder."
 a_nd_plc_wybraniecka: "Piechota Wybraniecka"
 a_nd_plc_wybraniecka_desc: "Selected infantry conscripted from every twentieth peasant household on crown estates. One of the earliest attempts to create a professional standing infantry in the Commonwealth."
 a_nd_plc_wybraniecka_levy: "Piechota Wybraniecka Levy"
 a_nd_plc_wybraniecka_levy_desc: "Peasant infantry raised through the selection system of crown estates, equipped with firearms and trained in formation fighting."
 a_nd_plc_pospolite: "Pospolite Ruszenie"
 a_nd_plc_pospolite_desc: "The general levy of the szlachta nobility — every nobleman obligated to ride to war in defense of the Commonwealth. Numerous but poorly coordinated."
 a_nd_plc_lipka_tatar: "Lipka Tatar Cavalry"
 a_nd_plc_lipka_tatar_desc: "Muslim Tatar settlers who have served the Commonwealth for generations as light cavalry scouts. Descended from Golden Horde refugees granted land in Lithuania."
 a_nd_plc_tabor: "Tabor War Wagon"
 a_nd_plc_tabor_desc: "Mobile wagon fortifications that can be chained together to create instant field defenses. Inspired by the Hussite tabors, adapted for the open plains of the Commonwealth."
 nd_plc_folwark: "Folwark"
 nd_plc_folwark_desc: "A noble-owned agricultural estate producing grain for export. The folwark system drives the Commonwealth's grain economy but binds peasants to the land."
 nd_plc_sejmik_hall: "Sejmik Hall"
 nd_plc_sejmik_hall_desc: "The seat of the provincial parliament where local nobility debates, elects deputies to the national Sejm, and exercises real political power."
 nd_plc_zamek: "Zamek Magnacki"
 nd_plc_zamek_desc: "A fortified magnate manor combining residential grandeur with military function. These strongpoints anchor the Commonwealth's defensive network."
 nd_plc_akademia: "Akademia"
 nd_plc_akademia_desc: "A university or academy in the Jagiellonian tradition, advancing learning in the liberal arts, law, medicine, and the natural sciences."
 nd_plc_amber_workshop: "Kontor Bursztynu"
 nd_plc_amber_workshop_desc: "An amber processing workshop where raw Baltic amber is carved, polished, and prepared for sale along the ancient trade routes."
 nd_plc_spichrz: "Spichrz Gdański"
 nd_plc_spichrz_desc: "A Baltic grain warehouse where Commonwealth wheat and rye are stored, graded, and loaded onto ships bound for Western European markets."
 nd_plc_manufaktura: "Manufaktura"
 nd_plc_manufaktura_desc: "An industrial workshop producing manufactured goods, representing the Commonwealth's late transition from agricultural export to diversified economy."
 nd_plc_folwark_maintenance: "Grain Cultivation"
 nd_plc_folwark_maintenance_desc: "Timber for estate buildings and livestock for the labor force yield grain harvests for export along the Vistula."
 nd_plc_sejmik_upkeep: "Sejmik Administration"
 nd_plc_sejmik_upkeep_desc: "Maintaining the records, correspondence, and official documents of provincial governance requires paper, fine cloth for ceremony, and books of law."
 nd_plc_zamek_maintenance: "Zamek Garrison"
 nd_plc_zamek_maintenance_desc: "Stone for walls, lumber for repairs, and weapons for the garrison maintain the magnate stronghold's readiness."
 nd_plc_akademia_upkeep: "Academic Endowment"
 nd_plc_akademia_upkeep_desc: "Paper for manuscripts, books for the library, and glass for lenses and equipment sustain the academy's scholarly activities."
 nd_plc_amber_processing: "Amber Processing"
 nd_plc_amber_processing_desc: "Baltic amber is carved and polished into jewelry and decorative objects for export along the ancient trade routes."
 nd_plc_spichrz_operations: "Grain Storage Operations"
 nd_plc_spichrz_operations_desc: "Wheat and timber flow through the warehouse for grading and storage; salt preserves grain during the long sea voyage to Western markets."
 nd_plc_manufaktura_operations: "Manufacturing Operations"
 nd_plc_manufaktura_operations_desc: "Iron is forged and cloth is worked into tools and implements for the domestic and export markets."
 levy_nd_plc_lipka_tatar: "Lipka Tatar Cavalry"
 levy_nd_plc_lipka_tatar_desc: "Muslim Tatar light cavalry from settler communities in Lithuania."
 levy_nd_plc_lisowczycy: "Lisowczycy"
 levy_nd_plc_lisowczycy_desc: "Irregular noble cavalry in the tradition of the painted riders."
 levy_nd_plc_wybraniecka: "Piechota Wybraniecka"
 levy_nd_plc_wybraniecka_desc: "Selected peasant infantry conscripted from crown estates."
 levy_nd_plc_pospolite: "Pospolite Ruszenie"
 levy_nd_plc_pospolite_desc: "The general levy of the szlachta nobility riding to war."
 nd_plc_formed_tt: "Poland-Lithuania has been formed"
 nd_plc_path_a_tt: "Chose Golden Liberty"
 nd_plc_path_b_tt: "Chose Jagiellonian Union"
 nd_plc_destiny: "Commonwealth Destiny"
 nd_plc_destiny_desc: "The Rzeczpospolita has been proclaimed. Whether through golden liberty or dynastic might, the path forward now lies open."
 nd_plc_dest_sejm_ascendant: "The Sejm Ascendant"
 nd_plc_dest_sejm_ascendant_desc: "Secure the great port of Gdansk to anchor the grain trade, establish financial institutions through banking, and fill the Commonwealth's treasury. The noble republic requires both commerce and coin."
 nd_plc_dest_breadbasket: "Breadbasket of Europe"
 nd_plc_dest_breadbasket_desc: "Develop the Commonwealth into the granary that feeds Western Europe. Expand the folwark economy, grow the nation's wealth, and ensure wheat flows through the capital's markets."
 nd_plc_dest_republic_of_nations: "Republic of Nations"
 nd_plc_dest_republic_of_nations_desc: "Bring the Commonwealth to its fullest expression: an enlightened republic of many peoples, rich in learning, prosperous in trade, and governed by the most advanced constitution in Europe."
 nd_plc_dest_eastern_march: "The Eastern March"
 nd_plc_dest_eastern_march_desc: "Seize the great cities of the Ruthenian and Russian borderlands. Smolensk and Kyiv must fall under Commonwealth control to secure the dynasty's eastern frontier."
 nd_plc_dest_black_sea_reach: "Black Sea Reach"
 nd_plc_dest_black_sea_reach_desc: "Push south through Podolia to the shores of the Black Sea. Take the Crimean port of Kaffa and the fortress of Kamianets-Podilskyi to command the steppe frontier."
 nd_plc_dest_bulwark_of_christendom: "Bulwark of Christendom"
 nd_plc_dest_bulwark_of_christendom_desc: "The Commonwealth stands as Europe's shield against east and south alike. Take Moscow and Constantinople to prove that the Jagiellonian legacy has no equal on the continent."
 nd_plc.7.t: "The Destiny of the Commonwealth"
 nd_plc.7.d: "The Commonwealth stands at the crossroads of Europe. To the west, the markets of Amsterdam and London hunger for our grain. To the east, the endless steppe stretches toward Muscovy and the Ottoman domains. The choices we make now will determine whether the Rzeczpospolita becomes a beacon of liberty or a colossus of conquest.\n\nThe foundations are laid. The Commonwealth is stable and strong. What manner of nation shall we build upon them?"
 nd_plc.7.a: "Our destiny awaits"
 nd_plc.8.t: "The Sejm Rises"
 nd_plc.8.d: "The great port of Gdansk is ours, and with it the key to the Baltic grain trade. The revenues of commerce flow into the Republic's coffers, and the szlachta celebrate the wisdom of their golden liberty. With banking institutions established and the treasury secure, the noble republic proves that freedom and prosperity are not contradictions.\n\nThe deputies of the Sejm speak with newfound confidence: the Commonwealth needs no despot to thrive. The voice of the nobility, raised in deliberation and consensus, shall guide this nation to greatness."
 nd_plc.8.a: "Let the Sejm govern with wisdom"
 nd_plc.9.t: "The Granary of the West"
 nd_plc.9.d: "From the folwarks of the interior to the warehouses of the Baltic ports, the Commonwealth has become indispensable to Europe. Our wheat feeds the cities of the West; our amber adorns their courts; our timber builds their ships. The Vistula is liquid gold, and we control every bend.\n\nBut how shall we wield this wealth? Some argue for maritime dominance — controlling the sea lanes and port facilities that carry our grain to foreign markets. Others advocate for noble entrepreneurship — investing in estates, mills, and workshops to build a diversified economy that does not depend solely on the harvest."
 nd_plc.9.a: "Command the Baltic trade routes"
 nd_plc.9.b: "Invest in the estates and workshops"
 nd_plc.10.t: "A Republic Without Equal"
 nd_plc.10.d: "What the philosophers of Paris and Edinburgh theorize, the Commonwealth has built. A republic of many nations — Poles, Lithuanians, Ruthenians, Germans, Jews, Tatars, Armenians — governed by law, enriched by trade, and illuminated by the light of reason. The Constitution has abolished the liberum veto; the Komisja Edukacji Narodowej has created Europe's first ministry of education; the universities flourish.\n\nThe Republic of Both Nations has become the Republic of All Nations. But what form shall this enlightened governance take? The civic radicals demand universal rights, open borders, and the sovereignty of reason. The constitutional conservatives prefer to anchor reform in the traditions of the szlachta, preserving noble privilege while modernizing the state."
 nd_plc.10.a: "Civic enlightenment for all peoples"
 nd_plc.10.b: "Reform within the noble tradition"
 nd_plc.11.t: "The Eastern March Secured"
 nd_plc.11.d: "The banners of the Commonwealth fly over Smolensk and Kyiv. The eastern march — that vast, contested borderland where Latin and Orthodox Christendom meet — is now firmly in Jagiellonian hands. The fortresses of the Dnieper stand garrisoned with Commonwealth troops, and the trade routes of the Ruthenian lands flow toward Krakow and Warsaw rather than Moscow.\n\nThis is no mere conquest. It is the fulfillment of the Jagiellonian vision: a dynasty state that stretches from the Baltic to the heartland of the Rus, binding together peoples who share a frontier and a faith — or at least a willingness to coexist under one crown."
 nd_plc.11.a: "The dynasty's reach grows ever eastward"
 nd_plc.12.t: "The Black Sea Opens"
 nd_plc.12.d: "The Commonwealth has broken through to the Black Sea. The fortress of Kamianets-Podilskyi — that legendary bastion on the Smotrych River — guards our southern frontier, while the port of Kaffa opens trade routes to the Orient. The Crimean Khanate's dominion over the steppe has been shattered.\n\nBut holding this frontier requires a strategy. Some advocate for a permanent military frontier — fortified lines, professional garrison troops, and scorched-earth tactics to deter raiders. Others argue for alliance with the Cossack hosts who know the steppe, offering them privileges and autonomy in exchange for service as the Commonwealth's shield."
 nd_plc.12.a: "Build the fortified frontier"
 nd_plc.12.b: "Win the Cossacks to our cause"
 nd_plc.13.t: "Antemurale Christianitatis"
 nd_plc.13.d: "Moscow has fallen. Constantinople is ours. The Commonwealth — the Antemurale Christianitatis, the Bulwark of Christendom — has achieved what crusaders, emperors, and tsars could only dream of. From the Baltic to the Bosporus, from the Oder to the Volga, the Jagiellonian eagle casts its shadow over half of Europe.\n\nThis is a moment that will echo through the centuries. The Commonwealth can become the eternal defender of European civilization — a military power so formidable that no eastern horde or southern empire will ever threaten Christendom again. Or it can use this unprecedented position to project the Jagiellonian dynasty as the first family of Europe, claiming a continental hegemony that no state has held since Rome."
 nd_plc.13.a: "We are Christendom's eternal shield"
 nd_plc.13.b: "The Jagiellonian imperium shall endure"
 STATIC_MODIFIER_NAME_nd_plc_dest_vistula_dominance: "Vistula Trade Dominance"
 STATIC_MODIFIER_DESC_nd_plc_dest_vistula_dominance: "The Commonwealth controls the Baltic grain corridor from field to port, commanding the commerce that feeds Western Europe."
 STATIC_MODIFIER_NAME_nd_plc_dest_noble_enterprise: "Noble Enterprise"
 STATIC_MODIFIER_DESC_nd_plc_dest_noble_enterprise: "The szlachta invest their grain profits into estates, mills, and workshops, diversifying the Commonwealth's economy beyond raw exports."
 STATIC_MODIFIER_NAME_nd_plc_dest_civic_enlightenment: "Civic Enlightenment"
 STATIC_MODIFIER_DESC_nd_plc_dest_civic_enlightenment: "The Commonwealth embraces universal civic values — open governance, educated citizenry, and the sovereignty of reason over tradition."
 STATIC_MODIFIER_NAME_nd_plc_dest_noble_constitution: "Noble Constitution"
 STATIC_MODIFIER_DESC_nd_plc_dest_noble_constitution: "Reform anchored in szlachta tradition: the noble republic modernizes its institutions while preserving the privileges that make it unique."
 STATIC_MODIFIER_NAME_nd_plc_dest_steppe_frontier: "Steppe Frontier"
 STATIC_MODIFIER_DESC_nd_plc_dest_steppe_frontier: "A permanent military frontier of forts and garrisons secures the Black Sea coast against raiders and rival empires."
 STATIC_MODIFIER_NAME_nd_plc_dest_cossack_alliance: "Cossack Alliance"
 STATIC_MODIFIER_DESC_nd_plc_dest_cossack_alliance: "The Cossack hosts serve as the Commonwealth's cavalry vanguard on the steppe, trading their martial skill for autonomy and privilege."
 STATIC_MODIFIER_NAME_nd_plc_dest_antemurale: "Antemurale Christianitatis"
 STATIC_MODIFIER_DESC_nd_plc_dest_antemurale: "The Commonwealth stands as Christendom's eternal shield — a military bastion so formidable that no eastern or southern power can threaten Europe."
 STATIC_MODIFIER_NAME_nd_plc_dest_jagiellonian_imperium: "Jagiellonian Imperium"
 STATIC_MODIFIER_DESC_nd_plc_dest_jagiellonian_imperium: "The Jagiellonian dynasty claims continental hegemony, projecting the Commonwealth's power from the Baltic to the Bosporus."
 nd_plc_sejm_walny: "Sejm Walny"
 nd_plc_sejm_walny_desc: "The sovereign parliament of the Republic of Both Nations, where deputies from every voivodship deliberate on the laws that govern the Commonwealth."
 nd_plc_hetman_arsenal: "Hetman Arsenal"
 nd_plc_hetman_arsenal_desc: "The central military depot of the Commonwealth army, where the Grand Hetman's forces are equipped, supplied, and trained for the defense of Christendom."
 nd_plc_sejm_walny_upkeep: "Parliamentary Administration"
 nd_plc_sejm_walny_upkeep_desc: "Paper for legislation, fine cloth for ceremony, books of law for reference, and furniture for the deliberation chambers sustain the work of the Sejm."
 nd_plc_hetman_arsenal_upkeep: "Arsenal Operations"
 nd_plc_hetman_arsenal_upkeep_desc: "Weapons are forged, walls maintained with stone and lumber, and iron wrought into armor and implements for the Commonwealth's armies."
