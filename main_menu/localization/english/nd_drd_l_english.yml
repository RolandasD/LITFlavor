l_english:
 STATIC_MODIFIER_NAME_nd_sea_kings_dominion: "Sea-Kings' Dominion"
 STATIC_MODIFIER_DESC_nd_sea_kings_dominion: "The restored kingdom of Dalriada rules the waves between Ireland and Scotland as its ancestors once did, commanding swift galley fleets through treacherous island waters."
 STATIC_MODIFIER_NAME_nd_light_of_iona: "Light of Iona"
 STATIC_MODIFIER_DESC_nd_light_of_iona: "Drawing upon the legacy of Columba and the great monastic tradition, the restored Dalriada dedicates itself to scholarship, preservation, and the spread of Gaelic learning across the known world."
 STATIC_MODIFIER_NAME_nd_drd_aedan_legacy: "Legacy of Aedan mac Gabrain"
 STATIC_MODIFIER_DESC_nd_drd_aedan_legacy: "In the spirit of Aedan mac Gabrain, whose fleets ranged from Orkney to the Isle of Man, Dalriada reasserts its command over the western seas."
 STATIC_MODIFIER_NAME_nd_drd_book_of_kells_spirit: "Spirit of the Illuminated Page"
 STATIC_MODIFIER_DESC_nd_drd_book_of_kells_spirit: "The tradition that produced the Book of Kells lives again, as monastic scriptoria produce works of breathtaking artistry and deep learning."
 nd_drd.1.t: "The Kingdom Reborn"
 nd_drd.1.d: "The ancient kingdom of Dal Riata, which once bridged the sea between Ireland and Scotland, rises again. From the sacred hilltop of Dunadd where kings once placed their foot upon the inauguration stone, to the holy island of Iona where Columba lit the flame of learning, this land carries memories stretching back to the dawn of the Gaelic world.\n\nThe cenela -- the great kin-groups who once mustered their galley fleets at the overking's call -- look to us now. The Senchus fer nAlban, that ancient census of ships and men, speaks of a people whose power was measured not in fields and castles but in oars and keels. Yet Iona's monks also remind us that Dal Riata's truest legacy was the preservation of civilization itself through the long centuries of darkness.\n\nShall we be sea-kings, commanding the tides as Aedan mac Gabrain once did? Or shall we be keepers of the sacred flame, as Columba was?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_drd.1.a: "Command the seas as our ancestors did"
 nd_drd.1.b: "Rekindle the light of Columba's legacy"
 nd_drd.2.t: "The Galley Muster"
 nd_drd.2.d: "The ancient Senchus fer nAlban -- the Census of the Men of Scotland -- prescribed that every twenty houses owed two seven-benched galleys to the overking's fleet. This system of naval obligation, unique among the kingdoms of Britain, made Dal Riata a maritime power whose reach far exceeded its modest territory.\n\nNow that Dalriada is reborn, the galley muster resumes. From Kintyre to the Outer Hebrides, from the Antrim coast to the islands of Lorne, the cenela prepare their birlinns and long fada for the overking's call. The sea roads that once connected this scattered kingdom are alive with traffic once more."
 nd_drd.2.a: "Let our enemies tremble at the sight of our sails"
 nd_drd.2.b: "Let the monks record what our sailors discover"
 nd_drd.3.t: "The Breitheamh's Court"
 nd_drd.3.d: "The ancient Gaelic legal tradition of the brehon -- the breitheamh -- has been restored under Dalriadic rule. Unlike the feudal courts of England and Scotland, where justice flows downward from the crown, the brehon system is rooted in communal arbitration. The breitheamh sits beneath the open sky, hearing disputes between clansmen, adjudicating cattle claims, and pronouncing judgments according to the Senchus Mor -- the great ancient law.\n\nThis system of customary justice binds the clans together more effectively than any army. When a man knows his grievances will be heard fairly, he has no cause for rebellion."
 nd_drd.3.a: "Justice binds what force cannot"
 nd_drd.4.t: "The Gaelic Renaissance"
 nd_drd.4.d: "A remarkable flowering of Gaelic literature is underway in the restored kingdom. Bardic poets compose elaborate praise-poems in the classical syllabic meters, while monastic scholars copy and annotate ancient texts. The tradition that produced the Book of Kells and the Annals of Ulster is reborn -- not as mere imitation, but as a living continuation.\n\nNew works in Gaelic are being composed alongside translations from Latin, Greek, and even Arabic, brought by traders along the sea routes. The scriptoria of Dalriada are producing illuminated manuscripts that rival those of any European court."
 nd_drd.4.a: "Our words will outlast our swords"
 nd_drd_dunadd_seat: "Seat of Dunadd"
 nd_drd_dunadd_seat_desc: "The restoration of Dunadd as a royal center, where kings place their foot upon the inauguration stone as their ancestors did, symbolizing dominion over the land."
 nd_drd_cattle_wealth: "Cattle Lords of the West"
 nd_drd_cattle_wealth_desc: "Cattle are the true currency of the Gaelic world. The wealth of a clan chief is measured in the lowing of his herds, and the cattle raid remains the ultimate test of a warrior's boldness."
 nd_drd_columban_mission: "The Columban Mission"
 nd_drd_columban_mission_desc: "Following the path of St. Columba, who brought the faith from Ireland to Iona in 563, monastic missionaries spread Christianity and literacy throughout the western Highlands and islands."
 nd_drd_galley_service: "Galley Service of the Cenela"
 nd_drd_galley_service_desc: "The Senchus fer nAlban prescribed naval obligations for each cenela kin-group: two seven-benched galleys for every twenty houses. This galley service made Dalriada a maritime power."
 nd_drd_cross_sea_clans: "Clans Across the Sea"
 nd_drd_cross_sea_clans_desc: "The North Channel is no barrier but a highway connecting the Gaelic kindreds of Ireland and Scotland, allowing the free movement of people, ideas, and allegiance."
 nd_drd_tanistry_tradition: "Tanistry Tradition"
 nd_drd_tanistry_tradition_desc: "The Gaelic practice of tanistry selects the most capable adult male of the royal kindred as successor, ensuring strong leadership through merit rather than birth order."
 nd_drd_island_fortification: "Island Fortification"
 nd_drd_island_fortification_desc: "The scattered islands and sea lochs of western Scotland provide natural defensive positions. With a few men and a fortified promontory, a clan can hold against forces ten times its number."
 nd_drd_monastic_scriptorium: "Monastic Scriptorium"
 nd_drd_monastic_scriptorium_desc: "In the tradition of Iona, monastic scriptoria produce illuminated manuscripts of extraordinary beauty, preserving classical learning while advancing Gaelic literary culture."
 nd_drd_herring_fishery: "Herring Fisheries"
 nd_drd_herring_fishery_desc: "The rich herring runs of the Hebrides and the Minch sustain coastal communities and provide a valuable trade good, salted and exported to markets across northern Europe."
 nd_drd_cenela_muster: "Cenela Muster"
 nd_drd_cenela_muster_desc: "The formalization of the cenela muster system, where each kin-group provides warriors in proportion to its households, creates a reliable levy that can be assembled quickly by sea."
 nd_drd_lordship_customs: "Lordship Customs"
 nd_drd_lordship_customs_desc: "The overking's authority is reinforced through ancient customs of tribute and feasting, where clan chiefs gather to renew their bonds of obligation and settle disputes."
 nd_drd_mainland_expansion: "Mainland Diplomacy"
 nd_drd_mainland_expansion_desc: "Dalriada extends its influence beyond the islands through a careful web of marriage alliances, fostering arrangements, and diplomatic treaties with neighboring kingdoms."
 nd_drd_galley_warfare: "Galley Warfare"
 nd_drd_galley_warfare_desc: "The evolution of Dalriadic naval tactics, combining the speed of the birlinn with coastal raiding expertise, produces a fighting style uniquely suited to the island-studded western seaboard."
 nd_drd_charter_market: "Chartered Markets"
 nd_drd_charter_market_desc: "The establishment of formal market rights at key coastal settlements transforms scattered island trade into a structured commercial network."
 nd_drd_plantation_system: "Highland Grazing Expansion"
 nd_drd_plantation_system_desc: "The systematic expansion of sheep and cattle grazing across the Highlands generates wool and livestock for export, though at the cost of displacing some traditional settlements."
 nd_drd_clan_justice: "Clan Justice"
 nd_drd_clan_justice_desc: "The codification of brehon law traditions into a formal legal framework, administered by hereditary breitheamh judges, brings order to the realm without destroying its Gaelic character."
 nd_drd_statecraft: "Gaelic Statecraft"
 nd_drd_statecraft_desc: "Dalriadic diplomats, fluent in the courts of both the Gaelic and English-speaking worlds, prove adept at playing larger powers against each other to preserve the kingdom's independence."
 nd_drd_bardic_schools: "Bardic Schools"
 nd_drd_bardic_schools_desc: "The formal training of file poets in the classical Gaelic syllabic tradition, requiring up to twelve years of study, produces a scholarly class whose works preserve history and glorify the realm."
 nd_drd_armed_galleys: "Armed War Galleys"
 nd_drd_armed_galleys_desc: "The mounting of cannon aboard the traditional galley hull produces a warship that can navigate the shallow, rocky waters of the Hebrides while delivering devastating broadsides."
 nd_drd_highland_levy_reform: "Highland Levy Reform"
 nd_drd_highland_levy_reform_desc: "The reorganization of the clan levy system introduces uniform equipment standards and regular drill, transforming fierce but undisciplined clansmen into reliable soldiers."
 nd_drd_cattle_drove_roads: "Cattle Drove Roads"
 nd_drd_cattle_drove_roads_desc: "The development of formal drove roads allows Highland cattle to be walked to lowland markets in great herds, connecting the pastoral economy to wider commercial networks."
 nd_drd_maritime_law: "Maritime Law of the Isles"
 nd_drd_maritime_law_desc: "A codified system of maritime law governs trade, fishing rights, and naval obligations across the island territories, bringing order to the western seaboard."
 nd_drd_gaelic_colleges: "Gaelic Colleges"
 nd_drd_gaelic_colleges_desc: "Formal institutions of higher learning, teaching in Gaelic alongside Latin and modern languages, produce a literate administrative class capable of governing a modern state."
 nd_drd_clan_regiment: "Clan Regiments"
 nd_drd_clan_regiment_desc: "The organization of traditional clan warriors into formal regimental structures, retaining their fierce esprit de corps while gaining the discipline of modern warfare."
 nd_drd_kelp_industry: "Kelp Industry"
 nd_drd_kelp_industry_desc: "The harvesting and burning of seaweed along the western coasts produces alkali essential for soap and glass manufacturing, providing a new source of industrial wealth."
 nd_drd_gaelic_literary_revival: "Gaelic Literary Revival"
 nd_drd_gaelic_literary_revival_desc: "A conscious effort to collect, preserve, and publish the oral traditions of the Gaelic world produces a literary renaissance, asserting the cultural vitality of the Highland tradition."
 nd_drd_emigrant_networks: "Emigrant Networks"
 nd_drd_emigrant_networks_desc: "Gaelic emigrants across the Atlantic maintain strong connections to their homeland, creating commercial networks that channel wealth and ideas back to Dalriada."
 nd_drd_modern_fleet: "Modern Fleet"
 nd_drd_modern_fleet_desc: "The transition from oar-powered galleys to modern sailing vessels, built in the shipyards of the western coast, equips Dalriada with a navy fit for the age of steam."
 nd_drd_dun: "Dun"
 nd_drd_dun_desc: "A fortified hilltop stronghold in the ancient Gaelic tradition, commanding the surrounding terrain from its elevated position. The greatest dun of all was Dunadd, seat of the kings of Dalriada."
 nd_drd_scriptorium: "Monastic Scriptorium"
 nd_drd_scriptorium_desc: "A workshop within a monastery or religious house dedicated to the copying and illumination of manuscripts, continuing the tradition that produced the Book of Kells."
 nd_drd_clan_hall: "Clan Hall"
 nd_drd_clan_hall_desc: "The gathering place of the clan chief and his leading men, where disputes are settled by brehon law, alliances are forged over mead, and the affairs of the clan are administered."
 nd_drd_galley_haven: "Galley Haven"
 nd_drd_galley_haven_desc: "A sheltered coastal anchorage equipped with slipways and repair facilities for the birlinn galley fleet, serving as both a naval base and a hub for coastal trade."
 nd_drd_drove_station: "Drove Station"
 nd_drd_drove_station_desc: "A waystation along the cattle drove roads where herds are rested, watered, and traded, connecting the Highland pastoral economy with lowland and overseas markets."
 nd_drd_dun_maintenance: "Dun Upkeep"
 nd_drd_dun_maintenance_desc: "Maintaining the stone walls, palisades, and weapon stores of the hilltop fortress."
 nd_drd_cattle_tribute: "Cattle Tribute Processing"
 nd_drd_cattle_tribute_desc: "Processing cattle tributes into cured leather, salted hides, and tallow for the garrison and trade."
 nd_drd_scriptorium_maintenance: "Scriptorium Upkeep"
 nd_drd_scriptorium_maintenance_desc: "Supplying the scribes with vellum, pigments, and beeswax candles for their painstaking work."
 nd_drd_manuscript_production: "Manuscript Illumination"
 nd_drd_manuscript_production_desc: "The production of illuminated manuscripts in the Celtic tradition, combining intricate knotwork designs with religious and scholarly texts."
 nd_drd_clan_hall_maintenance: "Clan Hall Upkeep"
 nd_drd_clan_hall_maintenance_desc: "Maintaining the timber hall, provisioning feasts for visiting clansmen, and keeping the mead flowing at council gatherings."
 nd_drd_highland_wool: "Highland Wool Weaving"
 nd_drd_highland_wool_desc: "The weaving of distinctive Highland cloth from the abundant wool of mountain sheep, dyed in the tartans and plaids of the Gaelic clans."
 nd_drd_galley_haven_maintenance: "Galley Haven Upkeep"
 nd_drd_galley_haven_maintenance_desc: "Maintaining the slipways, tar stores, and rigging supplies needed to keep the birlinn fleet seaworthy."
 nd_drd_drove_station_maintenance: "Drove Station Upkeep"
 nd_drd_drove_station_maintenance_desc: "Maintaining the enclosures, water troughs, and stores needed to sustain the cattle droving trade."
 nd_drd_hide_tanning: "Highland Hide Tanning"
 nd_drd_hide_tanning_desc: "The salting and tanning of cattle hides from the drove trade, producing leather for export to lowland and continental markets."
 a_nd_drd_kern: "Kern Skirmishers"
 a_nd_drd_kern_desc: "Light-footed raiding infantry armed with javelins and short swords, the kern are the shock troops of Gaelic warfare -- swift, fierce, and utterly fearless."
 a_nd_drd_ceithern: "Ceithern na Coille"
 a_nd_drd_ceithern_desc: "Woodland warriors who exploit the forests and broken terrain of the western Highlands to devastating effect, ambushing enemies in places where heavy armor is a liability."
 n_nd_drd_war_galley: "Dalriadic War Galley"
 n_nd_drd_war_galley_desc: "A purpose-built warship combining the shallow draft and speed of the traditional birlinn with mounted cannon, designed for raiding and coastal warfare in the island-studded western seaboard."
 levy_nd_drd_kern: "Kern Levy"
 levy_nd_drd_kern_desc: "A muster of light-footed kern skirmishers drawn from the clan lands, fighting in the fast raiding tradition of the Gaelic west."
 levy_nd_drd_ceithern: "Ceithern Levy"
 levy_nd_drd_ceithern_desc: "A woodland levy of ceithern ambush warriors, recruited from the forested glens and trained in the hit-and-fade tactics of the western Highlands."
 nd_drd_formed_tt: "Formed #bold Dalriada#!"
 nd_drd_path_a_tt: "Chose the #bold Tides of Dominion#! destiny"
 nd_drd_path_b_tt: "Chose the #bold Flame of Learning#! destiny"
 nd_drd_destiny: "Destiny of Dalriada"
 nd_drd_destiny_desc: "The restored kingdom stands at the crossroads of its fate. The ancient seat of Dunadd beckons, and the cenela await their overking's vision for the realm."
 nd_drd.5.t: "The Overking's Vision"
 nd_drd.5.d: "From the summit of Dunadd, where the inauguration footprint is carved into the living rock, we survey the realm that is and the realm that might be. The sea roads stretch in every direction -- west to the open Atlantic, north to the Norse lands, east to the Scottish mainland, south to Ireland. The question is not whether Dalriada will rise, but how high."
 nd_drd.5.a: "Our destiny awaits"
 nd_drd_dest_northern_isles: "Securing the Northern Isles"
 nd_drd_dest_northern_isles_desc: "To command the western seas, Dalriada must first control the straits and passages that guard the northern approaches. Orkney and the Lothian coast are the keys to this dominion."
 nd_drd.6.t: "The Northern Passage Secured"
 nd_drd.6.d: "The longships of Dalriada now patrol the waters around Orkney, and our banner flies over Edinburgh's rock. The Norse jarls who once raided our coasts with impunity now treat with us as equals. The Pentland Firth -- that treacherous strait between Scotland and Orkney -- is ours to command.\n\nWith the northern approaches secured, the western seaboard lies open before us. No ship passes between the Atlantic and the North Sea without Dalriadic leave."
 nd_drd.6.a: "The sea roads are ours to command"
 nd_drd_dest_western_seas: "Command of the Western Seas"
 nd_drd_dest_western_seas_desc: "With the northern passages secured, Dalriada turns its fleets toward the wider horizon. The Norse ports and the English coast must acknowledge Dalriadic supremacy over the western seas."
 nd_drd.7.t: "Masters of the Western Sea"
 nd_drd.7.d: "Dalriadic longships range from Stavanger to York, from the Faroes to the Irish Sea. What began as a scattered island kingdom has become a maritime power that rivals the Norse and English fleets. Our birlinns are feared in every harbor from Norway to Northumbria.\n\nBut how shall we use this dominion? Some captains urge continued raiding -- the old Gaelic tradition of plunder and glory. Others see richer prizes in controlling the sea lanes themselves, extracting tolls and establishing trade monopolies."
 nd_drd.7.a: "Let our raiders strip the coasts bare"
 nd_drd.7.b: "Control the trade lanes, control the wealth"
 STATIC_MODIFIER_NAME_nd_drd_dest_sea_raider: "Scourge of the Coasts"
 STATIC_MODIFIER_DESC_nd_drd_dest_sea_raider: "Dalriadic raiders terrorize the coastlines of northern Europe, striking swiftly and vanishing before any response can be organized."
 STATIC_MODIFIER_NAME_nd_drd_dest_trade_hegemon: "Lords of the Sea Lanes"
 STATIC_MODIFIER_DESC_nd_drd_dest_trade_hegemon: "Dalriada controls the vital sea lanes of the North Atlantic, extracting tolls from every merchant vessel that passes through its waters."
 nd_drd_dest_atlantic_lord: "Lord of the Atlantic"
 nd_drd_dest_atlantic_lord_desc: "The ultimate ambition of the sea-kings: dominion over the Atlantic from the Faroes to the Norwegian coast, making Dalriada the undisputed master of the northern seas."
 nd_drd.8.t: "Lord of the Atlantic"
 nd_drd.8.d: "From Torshavn to Bergen, from the Hebrides to the Orkneys, the banner of Dalriada flies over every harbor and headland of the North Atlantic. What the Norse achieved through centuries of raiding and settlement, Dalriada has accomplished through the unity of its Gaelic seafaring tradition.\n\nThe question now is what form this Atlantic dominion will take. Shall we build an invincible war fleet to defend our vast maritime realm by force of arms? Or shall we consolidate these far-flung territories into a true Atlantic empire, with settlers and administrators binding the islands to the crown?"
 nd_drd.8.a: "Build a fleet to darken the horizon"
 nd_drd.8.b: "Bind the Atlantic islands into one realm"
 STATIC_MODIFIER_NAME_nd_drd_dest_storm_fleet: "The Storm Fleet"
 STATIC_MODIFIER_DESC_nd_drd_dest_storm_fleet: "Dalriada maintains the most fearsome naval force in the North Atlantic, a fleet hardened by Atlantic storms and crewed by the finest Gaelic sailors."
 STATIC_MODIFIER_NAME_nd_drd_dest_atlantic_empire: "Atlantic Empire"
 STATIC_MODIFIER_DESC_nd_drd_dest_atlantic_empire: "Dalriadic settlers and administrators bind the scattered Atlantic islands into a unified realm, stretching from the Faroes to the Norse coast."
 nd_drd_dest_monastic_revival: "Monastic Revival"
 nd_drd_dest_monastic_revival_desc: "Reviving the scholarly tradition of Iona requires institutional foundations. The embrace of banking provides the wealth to endow monasteries and scriptoria across the realm."
 nd_drd.9.t: "The Scriptoria Reborn"
 nd_drd.9.d: "Across the islands and glens of Dalriada, the sound of quill on vellum echoes once more. In stone-walled scriptoria warmed by peat fires, monks and scholars copy ancient texts, illuminate manuscripts with the intricate knotwork designs of their ancestors, and compose new works in the Gaelic tongue.\n\nThe tradition that gave the world the Book of Kells and the Book of Durrow lives again -- not as antiquarian imitation, but as a living scholarly culture that engages with the wider world of European learning."
 nd_drd.9.a: "Let the light of learning shine anew"
 nd_drd_dest_gaelic_letters: "Gaelic Letters"
 nd_drd_dest_gaelic_letters_desc: "The spread of printing transforms Dalriada's monastic tradition into a broader literary culture, producing works that carry Gaelic thought to a continental audience."
 nd_drd.10.t: "The Gaelic Press"
 nd_drd.10.d: "The arrival of the printing press in Dalriada creates a revolution. Where once a single manuscript took months of painstaking labor, now hundreds of copies can be produced in weeks. The bardic schools and monastic scriptoria adapt swiftly, seeing the press not as a threat to their tradition but as its fulfillment.\n\nGaelic grammars, histories, and poetry pour from the new presses. But debate rages over the direction of this literary flowering. The bardic schools argue for preserving the classical syllabic traditions, while the monastic scholars advocate for broader engagement with the European world."
 nd_drd.10.a: "Preserve the bardic tradition in print"
 nd_drd.10.b: "Spread our learning through monastic networks"
 STATIC_MODIFIER_NAME_nd_drd_dest_bardic_tradition: "Legacy of the File"
 STATIC_MODIFIER_DESC_nd_drd_dest_bardic_tradition: "The bardic schools preserve and propagate the classical Gaelic literary tradition through the new medium of print, maintaining cultural continuity while reaching wider audiences."
 STATIC_MODIFIER_NAME_nd_drd_dest_monastic_network: "Monastic Commonwealth"
 STATIC_MODIFIER_DESC_nd_drd_dest_monastic_network: "Dalriadic monasteries form a network of learning stretching across northern Europe, sharing texts and scholars in the tradition of Columba's peregrinatio."
 nd_drd_dest_light_of_west: "Light of the West"
 nd_drd_dest_light_of_west_desc: "The capstone of the Iona tradition: Dalriada becomes a beacon of learning whose scholars and institutions rival any in Europe, proving that the Gaelic world can lead the way in the age of reason."
 nd_drd.11.t: "Light of the Western World"
 nd_drd.11.d: "What Iona was to the Dark Ages, Dalriada has become to the age of science and reason. Its colleges produce scholars whose works are read from Edinburgh to Constantinople. Its printing presses disseminate knowledge in Gaelic, Latin, and the modern tongues. Its monastic libraries -- descendants of the scriptoria that preserved civilization during Europe's darkest hours -- now house collections that rival the great continental universities.\n\nThis intellectual flowering must now find its fullest expression. Shall we channel our scholarly energies toward a great renaissance of Gaelic culture itself? Or shall we open our doors to the wider world, making Dalriada a crossroads of universal knowledge?"
 nd_drd.11.a: "A Gaelic renaissance for the ages"
 nd_drd.11.b: "Become the crossroads of all knowledge"
 STATIC_MODIFIER_NAME_nd_drd_dest_gaelic_renaissance: "Gaelic Renaissance"
 STATIC_MODIFIER_DESC_nd_drd_dest_gaelic_renaissance: "A conscious flowering of Gaelic culture in all its forms -- literature, music, law, and philosophy -- asserts the enduring vitality of the Celtic tradition."
 STATIC_MODIFIER_NAME_nd_drd_dest_wisdom_tradition: "Tradition of Wisdom"
 STATIC_MODIFIER_DESC_nd_drd_dest_wisdom_tradition: "Dalriada becomes a universal center of learning, where scholars of every tradition gather to share knowledge as they once did in the great monastic age."
 nd_drd_birlinn_arsenal: "Birlinn Arsenal"
 nd_drd_birlinn_arsenal_desc: "A great naval shipyard and armory dedicated to building and outfitting the Dalriadic war fleet, combining the traditional Gaelic galley-building craft with modern naval technology."
 nd_drd_birlinn_arsenal_maintenance: "Arsenal Upkeep"
 nd_drd_birlinn_arsenal_maintenance_desc: "Maintaining the slipways, forges, and timber stores of the royal naval arsenal."
 nd_drd_great_library: "Great Library of Dalriada"
 nd_drd_great_library_desc: "A grand repository of learning in the tradition of Iona, housing manuscripts, printed volumes, and scholarly works from across the known world."
 nd_drd_great_library_maintenance: "Library Upkeep"
 nd_drd_great_library_maintenance_desc: "Maintaining the collections, employing scribes and scholars, and purchasing new works for the library."
