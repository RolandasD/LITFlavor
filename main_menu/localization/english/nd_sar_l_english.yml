l_english:
 STATIC_MODIFIER_NAME_nd_sar_carta_de_logu: "Carta de Logu"
 STATIC_MODIFIER_DESC_nd_sar_carta_de_logu: "The ancient legal code of the Giudicati endures as the foundation of Sardinian governance, granting rights and protections that few in Europe can match."
 STATIC_MODIFIER_NAME_nd_sar_savoy_ambition: "Savoyard Ambition"
 STATIC_MODIFIER_DESC_nd_sar_savoy_ambition: "The House of Savoy transforms Sardinia from an island backwater into the springboard for continental ambition, modernizing the army and bureaucracy."
 STATIC_MODIFIER_NAME_nd_sar_arborean_triumph: "Arborean Triumph"
 STATIC_MODIFIER_DESC_nd_sar_arborean_triumph: "The memory of Arborea's defiance inspires our soldiers with unshakeable fighting spirit."
 STATIC_MODIFIER_NAME_nd_sar_sanluri_remembrance: "Sanluri Remembrance"
 STATIC_MODIFIER_DESC_nd_sar_sanluri_remembrance: "The bitter lessons of Sanluri harden our defenses. Never again shall an invader take our island cheaply."
 STATIC_MODIFIER_NAME_nd_sar_risorgimento_arms: "Risorgimento in Arms"
 STATIC_MODIFIER_DESC_nd_sar_risorgimento_arms: "The armies of Sardinia-Piedmont march forth to forge a unified nation by force of arms."
 STATIC_MODIFIER_NAME_nd_sar_risorgimento_diplomacy: "Risorgimento of Diplomacy"
 STATIC_MODIFIER_DESC_nd_sar_risorgimento_diplomacy: "Count Cavour's statecraft weaves alliances and negotiations that reshape the map of Europe."
 nd_sar.1.t: "The Kingdom of Sardinia"
 nd_sar.1.d: "The crown of Sardinia sits upon our brow. This island, home to one of Europe's oldest civilizations, now rises as a kingdom in its own right. The ancient Giudicati governed themselves with laws more progressive than any on the continent -- the Carta de Logu granted rights to women, enshrined equality before the law, and was written in the people's own tongue. Yet the tides of history have also brought Aragonese ambition, Genoese commerce, and now the calculating vision of the House of Savoy.\n\nTwo paths lie before us. We may draw upon the island's deep traditions of self-governance and legal excellence, building a kingdom rooted in the ancient Sardinian way. Or we may embrace the continental vision of the Savoy dynasty, forging Sardinia into a modern military state capable of reshaping the Italian peninsula.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_sar.1.a: "Honor the Carta de Logu"
 nd_sar.1.b: "Embrace the Savoyard Vision"
 nd_sar.2.t: "The Carta de Logu"
 nd_sar.2.d: "In 1392, Eleonora d'Arborea promulgated the Carta de Logu -- a legal code of 198 chapters written not in Latin but in Sardinian, the language of the people it governed. It established principles that would not appear elsewhere in Europe for centuries: women could inherit property and refuse marriage, equality before the law was enshrined regardless of birth, and environmental protections governed the use of forests and waterways.\n\nThe code proved so effective that when the Crown of Aragon finally conquered the island, they adopted it wholesale. It remained the law of Sardinia until 1827 -- over four centuries of continuous use, a testament to the wisdom of a woman whom Sardinians still call 'sa mama de su populu' -- the mother of the people."
 nd_sar.2.a: "A legacy that transcends conquest."
 nd_sar.3.t: "The Battle of Sanluri"
 nd_sar.3.d: "On June 30, 1409, the armies of the Giudicato of Arborea met the forces of the Crown of Aragon at Sanluri, in what would become the last great battle for Sardinian independence. The Arborean army, reinforced by Genoese allies and Sardinian volunteers from across the island, fought with desperate courage against the professional Catalan-Aragonese forces.\n\nThe battle was a bloodbath. Thousands fell on both sides, and by day's end, Arborea's military power was broken. The Giudicato lingered for another eleven years -- its territories sold to Aragon in 1420 -- but Sanluri marked the end of independent Sardinia. The memory burns differently depending on who tells the tale: some speak of the fierce Sardinian charge that nearly broke the Aragonese line, others of the stubborn defense that made conquest unbearably costly."
 nd_sar.3.a: "Remember the charge at Sanluri!"
 nd_sar.3.b: "Remember the cost of invasion."
 nd_sar.4.t: "The Risorgimento Awakens"
 nd_sar.4.d: "The winds of change sweep across the Italian peninsula. From Milan to Naples, from Venice to Palermo, the idea of a unified Italian nation has captured the imagination of an entire generation. And it is here, in the Kingdom of Sardinia-Piedmont, that the dream finds its strongest champion.\n\nKing Victor Emmanuel II and his brilliant minister Count Cavour have positioned our kingdom as the natural leader of Italian unification. But the path forward is contested. The firebrand Garibaldi argues for revolutionary war -- his red-shirted volunteers have already seized Sicily and march northward. Cavour counsels patience and diplomatic cunning, building alliances with France and engineering crises that isolate Austria.\n\nBoth paths lead to the same destination, but by very different roads."
 nd_sar.4.a: "Let the sword decide Italy's fate."
 nd_sar.4.b: "Let diplomacy redraw the map."
 nd_sar_giudicati_tradition: "Giudicati Legal Tradition"
 nd_sar_giudicati_tradition_desc: "The four Giudicati of Sardinia developed a unique system of self-governance, with elected judges, district curators, and a legal code far ahead of its time."
 nd_sar_nuragic_heritage: "Nuragic Heritage"
 nd_sar_nuragic_heritage_desc: "Over seven thousand stone towers from the Bronze Age dot the Sardinian landscape, a testament to the island's ancient culture of fortification and territorial defense."
 nd_sar_pastoral_heartland: "Pastoral Heartland"
 nd_sar_pastoral_heartland_desc: "For millennia, Sardinia's interior has been the domain of shepherds. The island's wool, cheese, and livestock are the foundation of its economy."
 nd_sar_arborean_resistance: "Arborean Resistance"
 nd_sar_arborean_resistance_desc: "The Giudicato of Arborea stood as the last bastion of independent Sardinian rule, waging a decades-long war against Aragonese conquest with fierce determination."
 nd_sar_coral_riviera: "Coral Riviera"
 nd_sar_coral_riviera_desc: "The waters off Alghero yield some of the finest red coral in the Mediterranean, prized from Genoa to Constantinople for its beauty and rarity."
 nd_sar_spanish_watchtowers: "Spanish Watchtowers"
 nd_sar_spanish_watchtowers_desc: "Nearly a hundred coastal watchtowers ring the Sardinian coast, built by the Spanish crown to guard against Barbary pirates and Ottoman raiders."
 nd_sar_sanluri_legacy: "Sanluri Legacy"
 nd_sar_sanluri_legacy_desc: "The Battle of Sanluri in 1409, where Sardinian independence was lost in a day of terrible bloodshed, remains a defining moment in the island's collective memory."
 nd_sar_silver_mountains: "Silver Mountains"
 nd_sar_silver_mountains_desc: "Sardinia's interior mountains have yielded precious metals since antiquity. The name Gennargentu itself means 'silver gate,' recalling the island's ancient mining heritage."
 nd_sar_catalan_legacy: "Catalan Legacy"
 nd_sar_catalan_legacy_desc: "Centuries of Catalan-Aragonese rule left a lasting cultural imprint on Sardinia, particularly in Alghero where Catalan is still spoken, bringing Mediterranean trade connections and architectural splendor."
 nd_sar_barbagia_refuge: "Barbagia Refuge"
 nd_sar_barbagia_refuge_desc: "The mountainous interior region of Barbagia has resisted every invader from Rome to Aragon. Its rugged terrain and fierce inhabitants make it an unconquerable heartland."
 nd_sar_tuna_mattanza: "Tuna Mattanza"
 nd_sar_tuna_mattanza_desc: "The ancient practice of mattanza -- the great communal tuna harvest -- sustains coastal communities and trains skilled sailors in seamanship and coordinated maritime action."
 nd_sar_sardinian_companies: "Sardinian Companies"
 nd_sar_sardinian_companies_desc: "Sardinian soldiers serve in companies across the Mediterranean, gaining a reputation for toughness and endurance that belies their island's modest size."
 nd_sar_feudal_reform: "Feudal Reform"
 nd_sar_feudal_reform_desc: "Attempts to reform the antiquated feudal system imposed by Aragon meet fierce resistance from entrenched barons but gradually strengthen crown authority."
 nd_sar_island_fortress: "Island Fortress"
 nd_sar_island_fortress_desc: "The watchtower network evolves into a comprehensive island defense system, with garrisoned towers communicating by signal fires along the entire coastline."
 nd_sar_pastoral_export: "Pastoral Export"
 nd_sar_pastoral_export_desc: "Sardinian pecorino cheese, fine wool, and cured meats find eager markets across the Mediterranean, establishing the island as a specialist in pastoral goods."
 nd_sar_stamenti_parliament: "Stamenti Parliament"
 nd_sar_stamenti_parliament_desc: "The Sardinian Stamenti -- the island's parliamentary estates comprising nobles, clergy, and royal towns -- assert growing legislative influence over island affairs."
 nd_sar_savoy_integration: "Savoy Integration"
 nd_sar_savoy_integration_desc: "The Perfect Fusion of 1847 unites the island of Sardinia with the Savoyard mainland possessions into a single constitutional kingdom under one law and one administration."
 nd_sar_carabinieri_reali: "Carabinieri Reali"
 nd_sar_carabinieri_reali_desc: "Founded in 1814 by King Victor Emmanuel I, the Corps of Royal Carabinieri serves as both elite military formation and national gendarmerie, enforcing the king's law across the realm."
 nd_sar_railway_modernization: "Railway Modernization"
 nd_sar_railway_modernization_desc: "Count Cavour's vision of a modern, industrialized state drives railway construction across Piedmont, connecting cities, moving troops, and transforming the kingdom's economy."
 nd_sar_bersaglieri: "Bersaglieri Corps"
 nd_sar_bersaglieri_desc: "General La Marmora's Bersaglieri -- elite sharpshooters trained for speed and initiative -- become the most celebrated soldiers of the Risorgimento."
 nd_sar_risorgimento_spirit: "Risorgimento Spirit"
 nd_sar_risorgimento_spirit_desc: "The idea of a unified Italy, championed by Victor Emmanuel II and Count Cavour, transforms Sardinia-Piedmont from a regional kingdom into the engine of national destiny."
 nd_sar_statuto_albertino: "Statuto Albertino"
 nd_sar_statuto_albertino_desc: "The constitutional charter granted by Charles Albert in 1848 establishes a parliamentary monarchy, becoming the foundational law of the future Kingdom of Italy."
 nd_sar_piedmontese_industry: "Piedmontese Industry"
 nd_sar_piedmontese_industry_desc: "Turin and its hinterland emerge as the industrial heartland of the peninsula, with textiles, armaments, and railway workshops driving Sardinia-Piedmont's modernization."
 nd_sar_cavour_strategy: "Cavour's Grand Strategy"
 nd_sar_cavour_strategy_desc: "Count Cavour's brilliant diplomatic maneuvering -- from the Crimean War alliance with France and Britain to the secret Plombieres agreement -- positions Sardinia-Piedmont as the pivot of European great power politics."
 nd_sar_modern_coastal_defense: "Modern Coastal Defense"
 nd_sar_modern_coastal_defense_desc: "The ancient torre network receives modern artillery batteries and trained gun crews, transforming medieval watchtowers into formidable coastal fortifications for the age of ironclads."
 a_nd_sar_arborean_militia: "Arborean Militia"
 a_nd_sar_arborean_militia_desc: "Hardy peasant soldiers from the Giudicato of Arborea, skilled in defensive fighting across Sardinia's hills and mountains."
 n_nd_sar_coral_galley: "Coral Galley"
 n_nd_sar_coral_galley_desc: "Fast, maneuverable galleys that patrol the Sardinian coast, protecting coral fishers and merchant ships from pirate raids."
 a_nd_sar_carabinieri: "Carabinieri"
 a_nd_sar_carabinieri_desc: "The Royal Carabinieri combine military discipline with law enforcement training, producing elite soldiers capable of both battlefield combat and maintaining order."
 a_nd_sar_bersaglieri: "Bersaglieri"
 a_nd_sar_bersaglieri_desc: "Running marksmen with distinctive plumed hats, famed for their speed, initiative, and devastating accuracy with the rifle."
 levy_nd_sar_bersaglieri: "Bersaglieri Levy"
 levy_nd_sar_bersaglieri_desc: "A levy of La Marmora's running marksmen, recruited from the boldest and most agile soldiers of the realm."
 levy_nd_sar_arborean_militia: "Arborean Militia Levy"
 levy_nd_sar_arborean_militia_desc: "Peasant levies drawn from Sardinia's hills and mountains in the tradition of the Giudicato of Arborea."
 nd_sar_curia_regni: "Curia Regni"
 nd_sar_curia_regni_desc: "The Giudicati court of justice, where the ancient Sardinian legal tradition is administered with a sophistication unmatched in medieval Europe."
 nd_sar_pinnetta: "Pinnetta"
 nd_sar_pinnetta_desc: "Traditional Sardinian stone-and-thatch pastoral shelters, serving as the nucleus of the island's thriving sheep and wool economy."
 nd_sar_torre_costiera: "Torre Costiera"
 nd_sar_torre_costiera_desc: "Stone watchtowers erected along Sardinia's coastline, providing early warning against pirate raids and serving as rallying points for coastal defense."
 nd_sar_curia_maintenance: "Court Administration"
 nd_sar_curia_maintenance_desc: "The daily running of the Giudicati court requires scribes, parchment, and stone for the maintenance of this seat of justice."
 nd_sar_silver_minting: "Silver Minting"
 nd_sar_silver_minting_desc: "The ancient silver mines of the Gennargentu mountains supply precious metal to the curia's workshops, producing fine jewelry and coinage."
 nd_sar_stamenti_governance: "Stamenti Administration"
 nd_sar_stamenti_governance_desc: "The formal proceedings of the Sardinian parliamentary estates demand extensive documentation, legal texts, and record-keeping."
 nd_sar_constitutional_admin: "Constitutional Administration"
 nd_sar_constitutional_admin_desc: "The Statuto Albertino establishes a modern bureaucratic apparatus with printed laws, official gazettes, and systematic record-keeping in ink and paper."
 nd_sar_wool_processing: "Wool Processing"
 nd_sar_wool_processing_desc: "Sardinian shepherds bring their fleeces to the pinnetta workshops, where skilled hands card, spin, and weave the island's famous wool into cloth."
 nd_sar_coral_craft: "Coral Craft"
 nd_sar_coral_craft_desc: "The red coral of the Riviera del Corallo is fashioned into exquisite jewelry by Sardinian craftsmen, fetching premium prices across the Mediterranean."
 nd_sar_torre_maintenance: "Tower Watch"
 nd_sar_torre_maintenance_desc: "Maintaining the coastal watchtowers requires stone for repairs, weapons for the garrison, and timber for signal fires."
 nd_sar_torre_garrison: "Reinforced Garrison"
 nd_sar_torre_garrison_desc: "An expanded garrison with firearms and improved provisions transforms the watchtowers from observation posts into formidable defensive positions."
 nd_sar_modern_battery: "Modern Battery"
 nd_sar_modern_battery_desc: "Heavy cannon emplacements and powder magazines transform the coastal towers into proper artillery batteries, capable of engaging enemy warships."
 nd_sar_formed_tt: "Formed the #bold Kingdom of Sardinia#!"
 nd_sar_path_a_tt: "Chose the #bold Giudicati Sovereignty#! destiny"
 nd_sar_path_b_tt: "Chose the #bold Savoyard Conquest#! destiny"
 nd_sar_destiny: "Sardinian Destiny"
 nd_sar_destiny_desc: "The Kingdom of Sardinia has been proclaimed. Whether we honor the island's ancient traditions of self-governance or embrace continental ambition, our path forward begins with a stable realm."
 nd_sar_dest_giudicati_crown: "Crown of the Giudicati"
 nd_sar_dest_giudicati_crown_desc: "Extend Sardinian sovereignty over Corsica, our sister island across the Strait of Bonifacio, and build a thriving wool trade to fund our island kingdom."
 nd_sar_dest_laws_sea: "Laws of the Sea"
 nd_sar_dest_laws_sea_desc: "Establish Sardinia as a Mediterranean trading power by embracing modern banking, building our treasury, and ensuring salt flows through our capital markets."
 nd_sar_dest_parliament: "Parliament of the Isles"
 nd_sar_dest_parliament_desc: "Create an island commonwealth spanning the western Mediterranean by taking the Balearics, achieving great prestige, and spreading the printed word through our realm."
 nd_sar_dest_piedmont_bridge: "The Piedmontese Bridge"
 nd_sar_dest_piedmont_bridge_desc: "Cross to the mainland by seizing Turin and Nice, the Savoyard heartland that transforms our island kingdom into a continental power."
 nd_sar_dest_two_crowns: "Kingdom of Two Crowns"
 nd_sar_dest_two_crowns_desc: "Unite northern Italy under our banner by conquering Milan and Genoa, the twin jewels of Lombardy and Liguria."
 nd_sar_dest_march_rome: "March on Rome"
 nd_sar_dest_march_rome_desc: "Complete the unification of Italy by taking Rome and Naples, forging a great peninsular kingdom from the Alps to the Mezzogiorno."
 nd_sar.5.t: "A Kingdom Proclaimed"
 nd_sar.5.d: "The crown of Sardinia rests upon our sovereign's brow, and with it comes the weight of centuries. This island has endured Phoenician traders, Roman legions, Vandal raiders, Byzantine governors, and Aragonese overlords -- yet through it all, something distinctly Sardinian has survived. Now, for the first time in generations, we stand as masters of our own fate.\n\nThe realm is stable. The question is what we shall build upon this foundation."
 nd_sar.5.a: "Our destiny awaits."
 nd_sar.6.t: "The Giudicati Restored"
 nd_sar.6.d: "Across the Strait of Bonifacio, the harbors of Corsica now fly our banner. The two great islands of the Tyrrhenian Sea are united under one crown for the first time since antiquity. Corsican and Sardinian, bound by shared language roots and Mediterranean kinship, together form a formidable island realm.\n\nWith Corsican timber supplementing our flocks and the wool trade filling our coffers, the ancient dream of the Giudicati -- a Sardinian kingdom governed by its own laws and sustained by its own wealth -- begins to take tangible shape."
 nd_sar.6.a: "Two islands, one crown."
 nd_sar.7.t: "The Salt Roads Flourish"
 nd_sar.7.d: "Our harbors bustle with commerce. Sardinian salt, drawn from the great pans of Cagliari and Sassari, travels to every corner of the Mediterranean. Banking houses have opened their doors in our ports, and foreign merchants compete for access to our markets.\n\nThis prosperity brings choices. We might invest directly in trade infrastructure -- warehouses, quays, and merchant fleets -- to maximize the flow of goods. Or we might channel our wealth into institutional reform, building the schools and courts that will make our island a model of enlightened governance."
 nd_sar.7.a: "Fill the warehouses and the coffers."
 nd_sar.7.b: "Invest in learning and good governance."
 nd_sar.8.t: "The Parliament of the Isles"
 nd_sar.8.d: "From the mountains of Sardinia to the shores of Mallorca, our island commonwealth stretches across the western Mediterranean. The Stamenti of Sardinia, the assemblies of Corsica, and the councils of the Balearics all look to our crown -- yet each retains the ancient rights and customs of its people.\n\nWe stand at the apex of a new kind of Mediterranean power: not a continental empire built on conquest, but a commonwealth of free peoples bound by law, trade, and mutual respect. How shall we govern this achievement?"
 nd_sar.8.a: "A commonwealth of free peoples."
 nd_sar.8.b: "A beacon of law and learning."
 nd_sar.9.t: "The Bridge to the Mainland"
 nd_sar.9.d: "Turin has fallen. The ancient capital of the House of Savoy, with its grand piazzas and Alpine backdrop, is ours. And with Nice secured on the Riviera, we command both slopes of the Maritime Alps.\n\nNo longer merely an island kingdom, Sardinia-Piedmont now straddles the sea and the continent. The road to Italy lies open before us -- through the Po Valley, past the spires of Milan, to whatever destiny our arms can seize."
 nd_sar.9.a: "From the island to the continent."
 nd_sar.10.t: "The Lombard Crown"
 nd_sar.10.d: "Milan and Genoa have bent the knee. The richest city in Italy and the greatest port of the Ligurian coast now swell our treasury and our armies. The Iron Crown of Lombardy -- that ancient symbol of Italian kingship -- is within our grasp.\n\nWith northern Italy secured, our generals debate the next phase. Some advocate seizing the spoils of Lombardy to rebuild and reequip our armies for the final push south. Others counsel patience -- consolidate our new crown, build cavalry from Lombard stock, and let our supply lines catch up with our ambitions."
 nd_sar.10.a: "Press the advantage while they reel."
 nd_sar.10.b: "Consolidate the Lombard crown."
 nd_sar.11.t: "Roma O Morte"
 nd_sar.11.d: "Rome. The Eternal City. For a thousand years, every power that has claimed Italy has reached for this prize, and now our banners fly above the Tiber. Naples too has fallen, and with it the Mezzogiorno -- the sun-baked south that completes our dominion over the peninsula.\n\nFrom the Alpine passes to the Strait of Messina, from the Adriatic coast to the Tyrrhenian shore, Italy is one. The question now is how history will remember this achievement. Was it forged by the sword of Garibaldi -- by red-shirted volunteers and revolutionary fire? Or by the pen of Cavour -- by diplomatic genius, secret treaties, and the careful management of great power rivalries?"
 nd_sar.11.a: "By the sword of Garibaldi!"
 nd_sar.11.b: "By the pen of Cavour."
 STATIC_MODIFIER_NAME_nd_sar_dest_salt_silver: "Salt and Silver Trade"
 STATIC_MODIFIER_DESC_nd_sar_dest_salt_silver: "Sardinian salt and silver flow through our expanded trade networks, enriching the realm but drawing resources from military upkeep."
 STATIC_MODIFIER_NAME_nd_sar_dest_institutional_reform: "Institutional Reform"
 STATIC_MODIFIER_DESC_nd_sar_dest_institutional_reform: "Progressive institutional reforms modernize our island kingdom, though the bureaucratic burden weighs on wartime efficiency."
 STATIC_MODIFIER_NAME_nd_sar_dest_free_peoples: "Commonwealth of Free Peoples"
 STATIC_MODIFIER_DESC_nd_sar_dest_free_peoples: "Our island commonwealth governs through consent and shared law, reducing separatism and welcoming diverse peoples under one tolerant crown."
 STATIC_MODIFIER_NAME_nd_sar_dest_beacon_learning: "Beacon of Learning"
 STATIC_MODIFIER_DESC_nd_sar_dest_beacon_learning: "Our island realm becomes a center of Mediterranean scholarship, its libraries and courts attracting learned men from every shore."
 STATIC_MODIFIER_NAME_nd_sar_dest_lombardy_spoils: "Spoils of Lombardy"
 STATIC_MODIFIER_DESC_nd_sar_dest_lombardy_spoils: "The wealth of Lombardy fuels our war machine, with fresh recruits and cheaper reinforcements sustaining the march south."
 STATIC_MODIFIER_NAME_nd_sar_dest_lombard_crown: "Weight of the Iron Crown"
 STATIC_MODIFIER_DESC_nd_sar_dest_lombard_crown: "The Iron Crown of Lombardy grants legitimacy but demands consolidation, as new cavalry levies and supply lines strain the treasury."
 STATIC_MODIFIER_NAME_nd_sar_dest_garibaldi_sword: "Garibaldi's Sword"
 STATIC_MODIFIER_DESC_nd_sar_dest_garibaldi_sword: "Revolutionary fervor and the red-shirted volunteers forge national unity through direct action, integrating conquered peoples by the force of shared ideals."
 STATIC_MODIFIER_NAME_nd_sar_dest_cavour_pen: "Cavour's Pen"
 STATIC_MODIFIER_DESC_nd_sar_dest_cavour_pen: "Diplomatic mastery and loyal subjects sustain the new Italian state, as Cavour's legacy of statecraft and naval investment projects power across the Mediterranean."
 nd_sar_palazzo_stamenti: "Palazzo degli Stamenti"
 nd_sar_palazzo_stamenti_desc: "The grand parliamentary palace of the island commonwealth, where elected representatives from Sardinia, Corsica, and the Balearics deliberate the laws that govern a free Mediterranean people."
 nd_sar_palazzo_stamenti_maintenance: "Parliamentary Upkeep"
 nd_sar_palazzo_stamenti_maintenance_desc: "The daily operations of the island parliament require paper for legislation, fine cloth for ceremonial proceedings, and books for the parliamentary library."
 nd_sar_palazzo_madama: "Palazzo Madama"
 nd_sar_palazzo_madama_desc: "The seat of the Italian Senate in Turin, this ancient Roman gateway-turned-baroque palace symbolizes the transformation of a Sardinian island kingdom into the government of a unified Italy."
 nd_sar_palazzo_madama_maintenance: "Senate Administration"
 nd_sar_palazzo_madama_maintenance_desc: "Operating the senate requires paper for legislation, tools for maintaining the grand building, and furniture befitting the dignity of the Italian state."
