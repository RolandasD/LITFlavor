l_english:
 STATIC_MODIFIER_NAME_nd_hab_aeiou_dynasty: "AEIOU — The Habsburg Way"
 STATIC_MODIFIER_DESC_nd_hab_aeiou_dynasty: "Alles Erdreich Ist Oesterreich Untertan. Through strategic marriages, careful alliances, and dynastic accumulation, the House of Habsburg builds its empire not by the sword alone, but through the altar and the treaty table."
 STATIC_MODIFIER_NAME_nd_hab_antemurale: "Antemurale Christianitatis"
 STATIC_MODIFIER_DESC_nd_hab_antemurale: "Austria stands as the bulwark of Christendom, its armies hardened by generations of frontier warfare against Ottoman expansion. The military frontier stretches from the Adriatic to the Carpathians, defended by a professional soldiery forged in the crucible of perpetual border conflict."
 nd_hab.1.t: "The Rise of Austria"
 nd_hab.1.d: "The disparate Alpine duchies have been forged into a single realm under our rule. From Vienna, we survey lands stretching from the Danube to the mountain passes, a domain built as much by marriage contracts as by martial prowess. The question now is what kind of state Austria shall become.\n\nShall we follow the path of the Habsburgs — patient accumulators of crowns through dynastic union, matchmakers who reshape the map of Europe from the bedchamber and the negotiating table? Or shall we embrace our role as Christendom's shield, pouring our strength into the military frontier that guards Europe's eastern flank against all who would threaten it?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_hab.1.a: "Let others wage war — we shall marry."
 nd_hab.1.b: "We are the shield of Christendom."
 nd_hab.2.t: "The Pragmatic Sanction"
 nd_hab.2.d: "Emperor Charles VI, lacking a male heir, has labored for years to secure recognition that the Habsburg domains may pass undivided to a female successor. The Pragmatic Sanction of 1713 establishes the principle of indivisible succession — but its true test will come when the young Maria Theresa inherits the throne and half of Europe moves to dismember her inheritance.\n\nThe crisis ahead will demand a choice. Do we invest in the legal and diplomatic framework that binds our diverse domains together through dynastic right? Or do we take Maria Theresa's path — rebuilding the army from its foundations, establishing military academies, and forging a modern fighting force that no coalition can overcome?"
 nd_hab.2.a: "The succession must be secured by law."
 nd_hab.2.b: "The succession must be secured by force."
 STATIC_MODIFIER_NAME_nd_hab_pragmatic_succession: "Pragmatic Succession"
 STATIC_MODIFIER_DESC_nd_hab_pragmatic_succession: "The Pragmatic Sanction binds the Habsburg domains in law. Through diplomatic recognition and dynastic right, the indivisibility of our realm is guaranteed."
 STATIC_MODIFIER_NAME_nd_hab_theresian_reform: "Theresian Military Reform"
 STATIC_MODIFIER_DESC_nd_hab_theresian_reform: "Following the shock of Silesia's loss, Maria Theresa has overhauled the Habsburg military. Professional training, standardized equipment, and a reformed officer corps transform the imperial army into a modern fighting force."
 nd_hab.3.t: "The Cameralist State"
 nd_hab.3.d: "The science of Cameralism — the systematic study of state administration, fiscal policy, and economic management — has taken root in the universities of the Habsburg lands. Where once revenue collection was haphazard and provincial, a new generation of trained bureaucrats now applies rational principles to governance. The Cameralist chairs established in Vienna and Prague produce administrators who understand mining revenues, trade policy, and population management as interconnected systems.\n\nThis transformation of the Austrian state from feudal patrimony to rationalized administrative machine will define our capacity to compete with the great powers of Europe."
 nd_hab.3.a: "Reason shall guide the state."
 STATIC_MODIFIER_NAME_nd_hab_cameralist_state: "Cameralist Administration"
 STATIC_MODIFIER_DESC_nd_hab_cameralist_state: "A generation of university-trained Cameralist bureaucrats now manages the state's finances, industries, and population with systematic rationality."
 nd_hab.4.t: "The Landsknechte of Maximilian"
 nd_hab.4.d: "Following the devastating Swiss victories at Morat and Nancy, Emperor Maximilian I has commissioned a new type of soldier. Modeled on the fearsome Swiss Reisläufer but loyal to the Habsburg crown, the Landsknechte are professional pike-and-shot infantry organized into Fähnlein of several hundred men. Their front ranks are formed by the Doppelsöldner — experienced soldiers armed with massive Zweihänder swords or arquebuses who earn double pay for standing in the deadliest position.\n\nMaximilian has abolished the crossbow in military use, replacing it entirely with firearms — a bold innovation that puts the Habsburg military at the forefront of the gunpowder revolution. These Landsknechte will become the backbone of Imperial armies across Europe."
 nd_hab.4.a: "The Emperor's own soldiers stand ready."
 nd_hab_privilegium_maius: "Privilegium Maius"
 nd_hab_privilegium_maius_desc: "The forged privileges of Rudolf IV elevate Austria's status among the Imperial territories, granting the Archduchy exceptional legal standing and ceremonial precedence."
 nd_hab_hofkammer_tradition: "Hofkammer Fiscal Administration"
 nd_hab_hofkammer_tradition_desc: "Ferdinand I's establishment of the Hofkammer in 1527 centralized Habsburg financial oversight, controlling coinage, mining revenues, tolls, and direct taxation through a permanent bureaucratic institution."
 nd_hab_schwaz_silver: "Schwaz Silver and Idria Mercury"
 nd_hab_schwaz_silver_desc: "The great mines of Schwaz in Tyrol — once the largest silver mine in Europe — and the mercury deposits at Idria provide the Habsburgs with revenues that underwrite both armies and diplomacy."
 nd_hab_landsknechte: "Landsknechte Tradition"
 nd_hab_landsknechte_desc: "Maximilian I's Landsknechte — professional pike-and-shot infantry modeled on the Swiss — form the backbone of Habsburg military power. Their Doppelsöldner front ranks and emphasis on firearms over crossbows mark a revolutionary approach to warfare."
 nd_hab_festungsbau: "Festungsbaukunst"
 nd_hab_festungsbau_desc: "Habsburg military engineers develop sophisticated fortification systems adapted for the mountainous frontier, incorporating Italian trace italienne principles into Alpine defensive architecture."
 nd_hab_militargrenze_levy: "Militärgrenze"
 nd_hab_militargrenze_levy_desc: "The Military Frontier — the Militärgrenze — settles Croatian and Serbian colonists along the Ottoman border, granting them land in exchange for perpetual military service as Grenzer militia."
 nd_hab_baroque_patronage: "Baroque Court Patronage"
 nd_hab_baroque_patronage_desc: "The Counter-Reformation court at Vienna becomes a center of Baroque splendor. Fischer von Erlach, Hildebrandt, and their successors transform the capital with churches, palaces, and libraries that project Habsburg power and Catholic devotion."
 nd_hab_theresian_academy: "Theresian Military Academy"
 nd_hab_theresian_academy_desc: "Maria Theresa's military academy at Wiener Neustadt — the Theresianum — professionalizes the Habsburg officer corps, training a new generation of commanders in tactics, fortification, and leadership."
 nd_hab_kurassiere: "Imperial Kürassiere"
 nd_hab_kurassiere_desc: "The heavy cuirassier regiments of the Habsburg army — armored horsemen charging with pistol and saber — remain a devastating shock force on European battlefields well into the age of gunpowder."
 nd_hab_cameralism: "Cameralist Institutionalization"
 nd_hab_cameralism_desc: "Cameralism — the systematic science of state management — is institutionalized in Habsburg universities, training bureaucrats in fiscal policy, mining administration, and economic governance."
 nd_hab_pragmatic_sanction: "Pragmatic Sanction"
 nd_hab_pragmatic_sanction_desc: "The Pragmatic Sanction of 1713 establishes the legal foundation for indivisible succession of the Habsburg domains, binding the diverse kingdoms and duchies under a single sovereign regardless of the ruler's sex."
 a_nd_hab_kurassiere: "Imperial Kürassiere"
 a_nd_hab_kurassiere_desc: "Heavy armored cavalry of the Habsburg army, charging into enemy lines with devastating shock force. Equipped with half-armor, pistols, and heavy sabers."
 a_nd_hab_grenzer_militia: "Grenzer Militia"
 a_nd_hab_grenzer_militia_desc: "Croatian and Serbian frontier settlers who serve as light infantry on the Military Frontier, defending the Habsburg border against Ottoman raids in exchange for land grants."
 nd_hab_hofkammer: "Hofkammer"
 nd_hab_hofkammer_desc: "The Court Chamber — central fiscal administration office of the Habsburg state, overseeing mining revenues, coinage, tolls, and tax collection through a permanent bureaucratic staff."
 nd_hab_hofkammer_administration: "Fiscal Administration"
 nd_hab_hofkammer_administration_desc: "The Hofkammer's permanent staff of clerks and auditors maintains the ledgers of state, producing detailed fiscal records and receiving dignitaries in formal dress."
 nd_hab_festung: "Habsburg Festung"
 nd_hab_festung_desc: "A star-fort fortification built according to Habsburg engineering principles, combining Italian trace italienne design with adaptations for the mountainous Alpine frontier."
 nd_hab_festung_upkeep: "Fortification Maintenance"
 nd_hab_festung_upkeep_desc: "The garrison and stonework of the Festung require constant investment — stone for walls and revetments, lumber for palisades and interior works, and armaments for the defenders."
 nd_hab_cameralist_institut: "Cameralist Institut"
 nd_hab_cameralist_institut_desc: "A center of Cameralist education and research, training bureaucrats in the systematic science of state management — fiscal policy, mining administration, trade regulation, and population governance."
 nd_hab_cameralist_research: "Cameralist Studies"
 nd_hab_cameralist_research_desc: "Academic study of fiscal policy, economic governance, and administrative science requires printed texts, scholarly reference works, and optical instruments for the precise observation that Cameralist method demands."
 nd_hab_theresianum: "Theresianum"
 nd_hab_theresianum_desc: "A military academy in the tradition of Maria Theresa's reforms at Wiener Neustadt, training officers in modern tactics, siege engineering, and military leadership."
 nd_hab_academy_operations: "Academy Operations"
 nd_hab_academy_operations_desc: "Training the officer corps demands textbooks and maps for instruction, weapons and drill equipment for field exercises, and leather for uniforms and horse tack."
 nd_hab_mining_operations: "Habsburg Mining Operations"
 nd_hab_mining_operations_desc: "Systematic oversight of Alpine mining — silver from Schwaz, copper and mercury from Idria — with the Hofkammer allocating tools and equipment to sustain the extractions that financed Habsburg power for centuries."
 levy_nd_hab_grenzer_militia: "Grenzer Militia"
 levy_nd_hab_grenzer_militia_desc: "Border militia raised from the Military Frontier communities, hardened by generations of Ottoman raiding and trained in irregular warfare across mountainous terrain."
 nd_hab_formed_tt: "Austria has been formed"
 nd_hab_path_a_tt: "Chose AEIOU — The Habsburg Way"
 nd_hab_path_b_tt: "Chose Antemurale Christianitatis"
 nd_hab_destiny: "Habsburg Destiny"
 nd_hab_destiny_desc: "Austria has risen from a collection of Alpine duchies to a great power. The realm must now be stabilized before the dynasty can pursue its ultimate ambition — whether through the altar or the sword."
 nd_hab_dest_corona: "The Bohemian Crown"
 nd_hab_dest_corona_desc: "Secure the Crown of Bohemia — the richest kingdom of the Empire — through dynastic claim and diplomacy. Control Prague and develop a sophisticated fiscal system through the banking institution."
 nd_hab_dest_burgundia: "The Burgundian Inheritance"
 nd_hab_dest_burgundia_desc: "Claim the Burgundian lands in the Low Countries, bringing the wealthy trading cities of Flanders under Habsburg rule. Antwerp's great markets will finance the dynasty's universal ambitions."
 nd_hab_dest_monarchia: "Universalis Monarchia"
 nd_hab_dest_monarchia_desc: "The Habsburg dream made real — a universal monarchy spanning from the Low Countries to the Italian duchies, bound together by dynastic right, diplomatic mastery, and the world's great trade networks."
 nd_hab_dest_ungarn: "The Hungarian Campaign"
 nd_hab_dest_ungarn_desc: "Buda, the ancient seat of the Hungarian kings, must be brought under Habsburg control to anchor the eastern frontier. Raise a powerful army and secure the realm before striking east."
 nd_hab_dest_feldzug: "The Great Turkish War"
 nd_hab_dest_feldzug_desc: "Push the frontier south into the Ottoman Balkans. Belgrade — the key to the Danube — must fall before Austria can claim mastery of southeastern Europe. Professional armies are required."
 nd_hab_dest_bollwerk: "Bollwerk des Glaubens"
 nd_hab_dest_bollwerk_desc: "Austria stands as the unshakeable bulwark of Christendom, its Military Frontier stretching from the Adriatic to the Carpathians. A mighty realm, tempered in the fires of perpetual border warfare."
 nd_hab.5.t: "The Habsburg Destiny"
 nd_hab.5.d: "The formation of Austria marks not an ending but a beginning. From Vienna, the House of Habsburg surveys a realm that stretches across the Alpine heartland — but the dynasty's true destiny lies beyond these mountains. Whether through careful marriages and diplomatic accumulation or through the sword that guards Christendom's eastern gate, Austria's course is set."
 nd_hab.5.a: "Our destiny awaits."
 nd_hab.6.t: "The Crown of St. Wenceslas"
 nd_hab.6.d: "The ancient Crown of Bohemia has passed into Habsburg hands. Prague — seat of the Holy Roman Emperor, center of learning and commerce, gateway to the silver mines of Kutna Hora — now answers to Vienna. This is no mere territorial addition but a dynastic revolution. The Bohemian Crown brings with it electoral dignity, vast mineral wealth, and a kingdom whose administrative sophistication rivals any in Europe.\n\nWith Bohemia secured, the dynasty's web of marriages and claims can extend further still — westward to the Burgundian inheritance, southward to the Italian crowns."
 nd_hab.6.a: "Prague and Vienna, united under one crown."
 nd_hab.7.t: "The Burgundian Inheritance"
 nd_hab.7.d: "The great gamble of Habsburg marriage diplomacy has borne its richest fruit. Through the union with the House of Burgundy, the wealthy cities of the Low Countries — Antwerp, Bruges, Ghent — have fallen into Habsburg hands. These are the most commercially sophisticated cities in Europe, their markets handling more trade than entire kingdoms.\n\nThis windfall demands a choice. Do we invest in the diplomatic and institutional apparatus needed to govern such far-flung domains, training a generation of Habsburg administrators and negotiators? Or do we exploit the commercial wealth directly, channeling Flemish trade profits into the treasury and building Austria into a mercantile power?"
 nd_hab.7.a: "Train the diplomats who will govern an empire."
 nd_hab.7.b: "Channel the wealth of Flanders into our coffers."
 STATIC_MODIFIER_NAME_nd_hab_dest_diplomatenakademie: "Habsburg Diplomatenakademie"
 STATIC_MODIFIER_DESC_nd_hab_dest_diplomatenakademie: "A generation of Habsburg-trained diplomats and administrators spreads across Europe, skilled in the arts of negotiation, treaty-drafting, and institutional governance that hold the far-flung monarchy together."
 STATIC_MODIFIER_NAME_nd_hab_dest_handelspolitik: "Habsburg Handelspolitik"
 STATIC_MODIFIER_DESC_nd_hab_dest_handelspolitik: "The commercial wealth of the Low Countries flows through Habsburg channels, enriching the treasury and transforming Austria from a landlocked Alpine state into a mercantile power with interests spanning the continent."
 nd_hab.8.t: "Universalis Monarchia"
 nd_hab.8.d: "The Habsburg dream approaches its apex. From Brussels to Prague, from Vienna to Milan, the dynasty's possessions girdle Europe. No single family has ever held such an expanse of territory through such diverse means — marriage, inheritance, election, and treaty. The question now is how to govern this extraordinary assemblage of peoples, languages, and faiths.\n\nShall we embrace the principle of cuius regio, eius religio — imposing confessional order while granting enough autonomy to keep the diverse peoples of the monarchy at peace? Or shall we pursue the path of congress diplomacy, making Vienna the capital of European order through negotiation and integration?"
 nd_hab.8.a: "Order through confessional governance."
 nd_hab.8.b: "Order through congress diplomacy."
 STATIC_MODIFIER_NAME_nd_hab_dest_cuius_regio: "Cuius Regio, Eius Religio"
 STATIC_MODIFIER_DESC_nd_hab_dest_cuius_regio: "The principle of confessional coexistence maintains order across the Habsburg domains. Religious tolerance, combined with firm administrative control, allows the monarchy to govern its diverse peoples without fracture."
 STATIC_MODIFIER_NAME_nd_hab_dest_kongressdiplomatie: "Kongressdiplomatie"
 STATIC_MODIFIER_DESC_nd_hab_dest_kongressdiplomatie: "Vienna has become the diplomatic capital of Europe. Through congresses, treaties, and patient negotiation, the Habsburgs maintain order across their vast dominions and shape the continent's balance of power."
 nd_hab.9.t: "The Fall of Buda"
 nd_hab.9.d: "Habsburg armies have entered Buda, the ancient capital of the Hungarian kingdom. For generations this fortress city on the Danube served as the seat of the Arpad and Angevin kings before falling to Ottoman conquest. Now it flies the Habsburg banner once more.\n\nThe reconquest of Hungary transforms the strategic map. Austria is no longer a frontier state cowering behind the Leitha — it is the dominant power of the middle Danube, with the military capacity to project force deep into the Balkans."
 nd_hab.9.a: "Hungary is liberated. The frontier advances."
 nd_hab.10.t: "The Great Turkish War"
 nd_hab.10.d: "Belgrade has fallen. The 'White Fortress' — key to the Danube, gateway to the Ottoman Balkans — is in Habsburg hands. Prince Eugene's campaigns have shattered Ottoman power in Hungary and pushed the frontier deep into Serbia. This is the greatest victory Christendom has won against the Ottomans since Lepanto.\n\nThe question now is how to consolidate these vast conquests. Do we invest in logistics and supply infrastructure, building the road networks and depots that will sustain future campaigns and allow the devastated borderlands to recover? Or do we perfect the art of siege warfare that won Belgrade, ensuring our engineers and artillerists remain the finest in Europe?"
 nd_hab.10.a: "Build the roads that sustain an empire."
 nd_hab.10.b: "Perfect the science of fortress warfare."
 STATIC_MODIFIER_NAME_nd_hab_dest_versorgungslinie: "Kaiserliche Versorgungslinien"
 STATIC_MODIFIER_DESC_nd_hab_dest_versorgungslinie: "A network of military roads, supply depots, and river transport routes sustains Habsburg armies across the vast Danubian theater, enabling rapid reinforcement and recovery of war-ravaged borderlands."
 STATIC_MODIFIER_NAME_nd_hab_dest_belagerungskunst: "Belagerungskunst"
 STATIC_MODIFIER_DESC_nd_hab_dest_belagerungskunst: "Habsburg military engineers have perfected the art of scientific siege warfare. Their artillery batteries and approach to fortress reduction are the finest in Europe, though maintaining such expertise strains the treasury."
 nd_hab.11.t: "Bollwerk des Glaubens"
 nd_hab.11.d: "Austria stands as the undisputed shield of Christendom. The Military Frontier stretches unbroken from the Adriatic to the Carpathians, manned by generations of Grenzer settlers who know no life but war. Behind this living wall, the Habsburg domains have grown into a great power whose armies have broken every threat from the east.\n\nThis achievement demands a final choice. Do we embrace the crusading spirit that drove us here — sanctifying our wars, cheapening our casus belli against the infidel, and steeling our people for perpetual struggle? Or do we turn inward, imposing imperial order on the conquered lands, building schools and courts that will civilize the frontier and make it truly ours?"
 nd_hab.11.a: "The crusade is eternal."
 nd_hab.11.b: "The frontier must be governed, not merely held."
 STATIC_MODIFIER_NAME_nd_hab_dest_kreuzzugsgeist: "Kreuzzugsgeist"
 STATIC_MODIFIER_DESC_nd_hab_dest_kreuzzugsgeist: "The spirit of crusade burns in the Habsburg state. Wars against those of different faith come cheaply, morale remains high through extended campaigns, and the cause of Christendom provides endless justification for further conquests."
 STATIC_MODIFIER_NAME_nd_hab_dest_kaiserliche_ordnung: "Kaiserliche Ordnung"
 STATIC_MODIFIER_DESC_nd_hab_dest_kaiserliche_ordnung: "Imperial order replaces martial law on the conquered frontier. Schools, courts, and administrative offices transform wild borderlands into productive provinces, though the shift from raiding to governing reduces the spoils of war."
 nd_hab_hofburg: "Hofburg Chancellery"
 nd_hab_hofburg_desc: "The great palace-chancellery of the Habsburg universal monarchy, housing the diplomatic corps, state archives, and administrative apparatus that governs domains spanning half of Europe."
 nd_hab_hofburg_chancellery: "Chancellery Administration"
 nd_hab_hofburg_chancellery_desc: "The Hofburg's vast diplomatic and administrative apparatus requires a constant supply of paper for treaties and correspondence, fine cloth for official dress, furniture for state chambers, and glassware for diplomatic receptions."
 nd_hab_grenzfestung: "Grenzfestung"
 nd_hab_grenzfestung_desc: "A major fortress complex of the Military Frontier, anchoring the Habsburg defensive line with heavy fortifications, permanent garrison, and stockpiled armaments against any eastern incursion."
 nd_hab_grenzfestung_garrison: "Frontier Garrison"
 nd_hab_grenzfestung_garrison_desc: "Maintaining the Grenzfestung demands weaponry for the garrison, stone for constant reinforcement of walls and bastions, lumber for palisades and interior works, and leather for equipment and harness."
