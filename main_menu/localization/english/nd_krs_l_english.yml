l_english:
 STATIC_MODIFIER_NAME_nd_legacy_of_saladin: "Legacy of Saladin"
 STATIC_MODIFIER_DESC_nd_legacy_of_saladin: "The blood of the Ayyubids flows through Kurdish veins. From the mountains of Kurdistan, the warriors who once united the Islamic world under Saladin now ride again, carrying his martial legacy into a new age of conquest."
 STATIC_MODIFIER_NAME_nd_unity_of_the_emirates: "Unity of the Emirates"
 STATIC_MODIFIER_DESC_nd_unity_of_the_emirates: "The Kurdish emirates — Soran, Baban, Bitlis, Bohtan, Ardalan — have long governed their mountain valleys with proud independence. Now united under a single banner, their collective wisdom in governance and diplomacy forges a state greater than any single principality."
 STATIC_MODIFIER_NAME_nd_krs_chaldiran_pact: "Pact of Chaldiran"
 STATIC_MODIFIER_DESC_nd_krs_chaldiran_pact: "The alliance forged between Kurdish emirs and the Ottoman Sultan at the Battle of Chaldiran secured Kurdish autonomy and military prestige. Kurdish cavalry proved decisive, and the pact endures as proof that Kurdish arms command respect."
 nd_krs.1.t: "The Dawn of Kurdistan"
 nd_krs.1.d: "The Kurdish people have long dwelt among the mountain fastnesses of the Zagros and Taurus, their tribal confederacies governing valleys that empires could never fully subdue. From the legacy of Saladin's Ayyubid dynasty to the autonomous emirates that carved their own domains between Ottoman and Safavid power, the Kurds have maintained an identity forged in highland stone and tempered by centuries of warfare.\n\nNow, with the formation of Kurdistan, a new chapter begins. The question facing the nation is fundamental: shall Kurdistan draw upon its martial heritage and project power outward as Saladin once did, or shall it consolidate the fractious emirates into a unified state whose strength lies in governance and cultural identity?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_krs.1.a: "We shall carry the sword of Saladin!"
 nd_krs.1.b: "We shall unite the emirates as one people."
 nd_krs.2.t: "The Sharafnama"
 nd_krs.2.d: "In 1597, Prince Sharaf Khan Bidlisi of the Bitlis Emirate completed his monumental work, the Sharafnama — the first comprehensive history of the Kurdish nation. Written in Persian to reach the widest possible audience, the Sharafnama chronicles the great Kurdish dynasties from antiquity through the Ayyubid golden age to the autonomous emirates of his own time.\n\nThe work documents the Marwanids of Amed, the Hasanwayhids, the Fadluyids, and above all the house of Saladin, weaving them into a single narrative of Kurdish civilization. For the first time, the story of the Kurdish people exists not in fragments of memory and oral tradition, but as a written record that can endure across generations.\n\nThe Sharafnama is both history and declaration — a statement that the Kurdish nation possesses a past worthy of its mountains, and a future deserving of recognition."
 nd_krs.2.a: "Our history shall endure in ink as in stone."
 nd_krs.3.t: "The Alliance at Chaldiran"
 nd_krs.3.d: "In the summer of 1514, the Kurdish scholar and statesman Idris Bitlisi accomplished what no diplomat before him had managed: the unification of over twenty Kurdish emirs under a single military banner. Leveraging the Kurds' Sunni faith against the encroaching Safavid Shia state, Bitlisi persuaded the highland lords that their future lay with the Ottoman Sultan Selim I.\n\nKurdish cavalry proved decisive at the Battle of Chaldiran, where their knowledge of the terrain and fierce fighting turned the Ottoman flank against Shah Ismail's forces. In recognition, Selim sent fifteen banners and five hundred royal robes to the Kurdish princes, formalizing an arrangement of autonomy that would endure for centuries.\n\nThis alliance secured Kurdish self-governance within the Ottoman framework — the emirs retained hereditary rule, their own courts, and control of the mountain passes. It was not submission but partnership, bought with Kurdish blood on the battlefield."
 nd_krs.3.a: "The pact is sealed in blood and honor."
 nd_krs.3.b: "We need no allies — our mountains are our strength."
 nd_krs_mountain_strongholds: "Mountain Strongholds"
 nd_krs_mountain_strongholds_desc: "The Kurdish highlands are dotted with ancient fortresses — Amadiya perched on its precipitous rock outcrop, Hasankeyf overlooking the Tigris from sheer limestone cliffs — positions that have defied invaders for millennia."
 nd_krs_tribal_confederacy: "Tribal Confederacy"
 nd_krs_tribal_confederacy_desc: "Kurdish governance has long operated through confederacies of tribes, each headed by an agha or beg, united under paramount chiefs who balance autonomy with collective defense."
 nd_krs_kurdish_horsemanship: "Kurdish Horsemanship"
 nd_krs_kurdish_horsemanship_desc: "The Kurdish plateau bred both skilled horsemen and hardy mountain horses. Kurdish cavalry served under the Ayyubids, fighting from Damascus to Egypt."
 nd_krs_ayyubid_legacy: "Ayyubid Legacy"
 nd_krs_ayyubid_legacy_desc: "Saladin al-Ayyubi, born of the Kurdish Rawadiya clan, founded a dynasty that united Egypt and Syria and recaptured Jerusalem. His legacy of martial prowess and just governance defines Kurdish identity."
 nd_krs_highland_shepherds: "Highland Shepherds"
 nd_krs_highland_shepherds_desc: "The seasonal migration of Kurdish herders between highland summer pastures and lowland winter grazing grounds sustained an economy of wool, cheese, and livestock that predated the empires."
 nd_krs_frontier_raiders: "Frontier Raiders"
 nd_krs_frontier_raiders_desc: "Kurdish tribesmen on the frontiers between great empires developed raiding into an art form, striking from mountain passes and disappearing into terrain no pursuer could navigate."
 nd_krs_caravan_waystations: "Caravan Waystations"
 nd_krs_caravan_waystations_desc: "The mountain passes of Kurdistan straddle the overland trade routes between Mesopotamia, Persia, and Anatolia. Kurdish waystations provided shelter, fodder, and protection for merchants crossing the highlands."
 nd_krs_sufi_lodges: "Sufi Lodges"
 nd_krs_sufi_lodges_desc: "Sufi tekkes and zawiyas spread throughout Kurdish lands, serving as centers of spiritual life, education, and social welfare. The Naqshbandi and Qadiri orders were particularly influential among Kurdish communities."
 nd_krs_mountain_ambush: "Mountain Ambush Tactics"
 nd_krs_mountain_ambush_desc: "Kurdish warriors perfected the art of mountain ambush — striking from above in narrow defiles where superior numbers count for nothing and knowledge of the terrain is worth more than any fortification."
 nd_krs_emirate_courts: "Emirate Courts"
 nd_krs_emirate_courts_desc: "The courts of the Kurdish emirs — Bitlis, Soran, Ardalan, Baban — were centers of Persian and Kurdish poetry, historical scholarship, and artistic patronage that rivaled many a royal court."
 nd_krs_kurdish_bowmen: "Kurdish Bowmen"
 nd_krs_kurdish_bowmen_desc: "Kurdish archers, trained from youth in the mountain valleys, could loose arrows from positions no cavalry could reach and no infantry could storm."
 nd_krs_chaldiran_alliance: "Chaldiran Alliance"
 nd_krs_chaldiran_alliance_desc: "The alliance between twenty Kurdish emirs and Sultan Selim I at the Battle of Chaldiran secured Kurdish autonomy within the Ottoman framework and proved Kurdish cavalry decisive in a clash of empires."
 nd_krs_diyarbakir_citadel: "Diyarbakir Citadel"
 nd_krs_diyarbakir_citadel_desc: "The basalt walls of Diyarbakir stretch over five kilometers, standing thirty feet high and sixteen feet thick — among the most formidable fortifications in the Middle East, a UNESCO World Heritage site of enduring military significance."
 nd_krs_sharafnama: "The Sharafnama"
 nd_krs_sharafnama_desc: "The Sharafnama of 1597, written by Prince Sharaf Khan Bidlisi, is the first comprehensive history of the Kurdish nation — a chronicle of dynasties, battles, and traditions that gave literary form to Kurdish identity."
 nd_krs_silk_road_tolls: "Silk Road Tolls"
 nd_krs_silk_road_tolls_desc: "Kurdish emirates levied tolls on the caravans crossing their mountain passes between Mesopotamia and Persia, turning geography into revenue and making Kurdish goodwill essential for overland commerce."
 nd_krs_irregular_warfare: "Irregular Warfare"
 nd_krs_irregular_warfare_desc: "Kurdish fighters developed warfare suited to their terrain — mobile, decentralized, striking from positions that regular armies could not reach and retreating into mountains they knew like their own homes."
 nd_krs_baban_governance: "Baban Governance"
 nd_krs_baban_governance_desc: "The Baban emirate, centered on Sulaimani from 1784, developed sophisticated administrative systems that combined tribal tradition with Ottoman bureaucratic practice, governing the Kurdish heartland for two centuries."
 nd_krs_hamidiye_cavalry: "Kurdish Mounted Regiments"
 nd_krs_hamidiye_cavalry_desc: "Kurdish cavalry served in Ottoman campaigns across the Middle East, bringing mountain horsemanship and fierce tribal loyalty to imperial wars from Baghdad to the Caucasus."
 nd_krs_kurdish_madrasas: "Kurdish Madrasas"
 nd_krs_kurdish_madrasas_desc: "Kurdish madrasas produced generations of scholars, poets, and jurists. These centers of Islamic learning in cities like Diyarbakir and Sulaimani preserved knowledge and fostered Kurdish intellectual tradition."
 nd_krs_border_autonomy: "Border Autonomy"
 nd_krs_border_autonomy_desc: "Kurdish emirs maintained self-governance at the Ottoman-Safavid frontier, their autonomy guaranteed by their military value as guardians of the mountain passes between empires."
 nd_krs_peshmerga_tradition: "Peshmerga Tradition"
 nd_krs_peshmerga_tradition_desc: "Peshmerga — 'those who face death' — describes the Kurdish warrior ethos. From tribal border guards to organized fighters, the peshmerga tradition represents disciplined, selfless dedication to the defense of Kurdish lands."
 nd_krs_tribal_modernization: "Tribal Modernization"
 nd_krs_tribal_modernization_desc: "The transformation of Kurdish tribal governance toward more centralized administrative structures, adopting modern methods of taxation, education, and military organization while preserving tribal identity."
 nd_krs_mountain_fortifications: "Mountain Fortifications"
 nd_krs_mountain_fortifications_desc: "Systematic fortification of Kurdish mountain passes and strategic heights, building on millennia of defensive architecture from Urartu through the medieval emirate period to create comprehensive highland defense networks."
 nd_krs_highland_trade_networks: "Highland Trade Networks"
 nd_krs_highland_trade_networks_desc: "Kurdish merchants connected the towns and cities of the highlands through trade networks that moved wool, livestock, metalwork, and agricultural goods across the mountain terrain."
 nd_krs_kurdish_printing: "Kurdish Printing"
 nd_krs_kurdish_printing_desc: "The spread of printing technology enabled the dissemination of Kurdish literature and historical works, strengthening cultural identity and literacy across the scattered mountain communities."
 nd_krs_national_awakening: "National Awakening"
 nd_krs_national_awakening_desc: "The emergence of a self-conscious Kurdish national identity, drawing on the literary heritage of the Sharafnama, the martial traditions of the peshmerga, and the shared experience of mountain autonomy."
 nd_krs_modern_irregulars: "Modern Irregulars"
 nd_krs_modern_irregulars_desc: "Kurdish irregular fighters adapted to modern warfare while retaining their mountain advantages — combining knowledge of terrain with modern arms to create forces that conventional armies could not suppress."
 nd_krs_highland_industry: "Highland Industry"
 nd_krs_highland_industry_desc: "The development of industrial capacity in Kurdish highland cities, processing local raw materials and producing goods for both domestic consumption and regional trade."
 nd_krs_constitutional_movement: "Constitutional Movement"
 nd_krs_constitutional_movement_desc: "Kurdish participation in constitutional and reform movements, seeking formal recognition of Kurdish rights and governance within evolving political frameworks."
 a_nd_krs_tribal_cavalry: "Kurdish Tribal Cavalry"
 a_nd_krs_tribal_cavalry_desc: "Light cavalry drawn from the Kurdish tribal confederacies, skilled in raiding and reconnaissance across mountain and plateau terrain."
 a_nd_krs_highland_raiders: "Highland Raiders"
 a_nd_krs_highland_raiders_desc: "Kurdish mountain fighters who strike from hidden positions in highland passes, using terrain advantage to overcome superior numbers."
 a_nd_krs_bowmen: "Kurdish Bowmen"
 a_nd_krs_bowmen_desc: "Skilled archers trained in the mountain valleys, capable of delivering accurate fire from positions that cavalry cannot reach and infantry cannot storm."
 a_nd_krs_mountain_ambushers: "Mountain Ambushers"
 a_nd_krs_mountain_ambushers_desc: "Guerrilla fighters specializing in mountain ambush tactics, using narrow defiles and rocky terrain to devastating effect against conventional forces."
 a_nd_krs_chaldiran_cavalry: "Chaldiran Cavalry"
 a_nd_krs_chaldiran_cavalry_desc: "Heavy Kurdish cavalry modeled on the riders who fought alongside the Ottomans at Chaldiran, combining tribal ferocity with organized battlefield discipline."
 a_nd_krs_mountain_guns: "Mountain Artillery"
 a_nd_krs_mountain_guns_desc: "Light artillery adapted for mountain warfare, designed to be transported through narrow passes and deployed on heights overlooking enemy positions."
 a_nd_krs_peshmerga: "Peshmerga"
 a_nd_krs_peshmerga_desc: "Disciplined mountain infantry embodying the peshmerga tradition — those who face death. Skilled in defensive fighting and mountain warfare, they are the backbone of Kurdish resistance."
 a_nd_krs_modern_irregulars: "Modern Kurdish Irregulars"
 a_nd_krs_modern_irregulars_desc: "Fast-moving guerrilla infantry combining modern arms with traditional Kurdish knowledge of mountain terrain, striking from positions conventional forces cannot reach."
 nd_krs_mountain_stronghold: "Mountain Stronghold"
 nd_krs_mountain_stronghold_desc: "A fortified mountain position in the Kurdish highland tradition, using natural terrain to create a defensive strongpoint that commands the surrounding valleys."
 nd_krs_caravan_waystation: "Caravan Waystation"
 nd_krs_caravan_waystation_desc: "A waystation on the mountain trade routes, providing shelter, fodder, and security for caravans crossing Kurdish territories between Mesopotamia and Persia."
 nd_krs_sufi_lodge: "Sufi Lodge"
 nd_krs_sufi_lodge_desc: "A Sufi tekke serving as a center of spiritual life, education, and community welfare in the Kurdish highlands. The Naqshbandi and Qadiri orders were deeply influential."
 nd_krs_citadel: "Kurdish Citadel"
 nd_krs_citadel_desc: "A major urban fortification in the tradition of Diyarbakir's legendary basalt walls — thick, tall, and built to withstand siege for generations."
 nd_krs_madrasa: "Kurdish Madrasa"
 nd_krs_madrasa_desc: "A center of Islamic learning and Kurdish scholarship, producing jurists, poets, and administrators who served the emirate courts."
 nd_krs_highland_trade_post: "Highland Trade Post"
 nd_krs_highland_trade_post_desc: "A trading hub in the Kurdish highlands, connecting mountain communities with regional markets and facilitating the exchange of wool, livestock, and metalwork."
 nd_krs_highland_forge: "Highland Forge"
 nd_krs_highland_forge_desc: "An industrial workshop in the Kurdish highlands, processing local iron and copper into tools, weapons, and trade goods for the regional economy."
 nd_krs_highland_pastoral: "Highland Pastoral"
 nd_krs_highland_pastoral_desc: "The traditional Kurdish mountain economy of wool and livestock production, sustained by seasonal migration between highland and lowland pastures."
 nd_krs_border_tolls: "Border Tolls"
 nd_krs_border_tolls_desc: "Revenue collected from caravans transiting Kurdish mountain passes, where geography gives the toll-keeper an unassailable position."
 nd_krs_printing_works: "Kurdish Printing Works"
 nd_krs_printing_works_desc: "A printing workshop producing Kurdish literary and historical works, spreading literacy and cultural identity across the highland communities."
 levy_nd_krs_mountain_ambushers: "Mountain Ambusher Levy"
 levy_nd_krs_mountain_ambushers_desc: "Tribal warriors raised from the mountain communities, skilled in guerrilla ambush tactics and intimate with the terrain of their homeland."
 levy_nd_krs_highland_raiders: "Highland Raider Levy"
 levy_nd_krs_highland_raiders_desc: "Fast-moving raiding infantry drawn from Kurdish frontier tribes, experts at striking from mountain passes and vanishing into the highlands."
 nd_krs_stronghold_maintenance: "Stronghold Upkeep"
 nd_krs_stronghold_maintenance_desc: "Maintaining the stone fortifications, armory, and leather equipment of a mountain stronghold."
 nd_krs_waystation_maintenance: "Waystation Operations"
 nd_krs_waystation_maintenance_desc: "Provisioning a caravan waystation with food, fodder, salt, and shelter for traveling merchants."
 nd_krs_lodge_maintenance: "Lodge Upkeep"
 nd_krs_lodge_maintenance_desc: "Maintaining a Sufi lodge with wool and cloth for carpets and ceremonial garments, and incense for ritual observance."
 nd_krs_citadel_maintenance: "Citadel Upkeep"
 nd_krs_citadel_maintenance_desc: "Maintaining the massive walls, armories, tools, and leather equipment of a great urban citadel and its garrison."
 nd_krs_madrasa_maintenance: "Madrasa Upkeep"
 nd_krs_madrasa_maintenance_desc: "Supplying a Kurdish center of learning with paper, books, and cloth — scholarly materials for students and scholars alike."
 nd_krs_trade_post_maintenance: "Trade Post Operations"
 nd_krs_trade_post_maintenance_desc: "Operating a highland trade hub, managing the exchange of textiles, wool, and salt across mountain routes."
 nd_krs_forge_maintenance: "Forge Operations"
 nd_krs_forge_maintenance_desc: "Smelting iron with charcoal to forge tools and metalwork in a mountain workshop."
 STATIC_MODIFIER_NAME_nd_krs_self_reliance: "Kurdish Self-Reliance"
 STATIC_MODIFIER_DESC_nd_krs_self_reliance: "The mountains of Kurdistan are fortress enough. Without allies to please or obligations to honor, the Kurdish people stand alone — and stand strong."
 nd_krs_formed_tt: "Kurdistan has been formed"
 nd_krs_path_a_tt: "Chose Legacy of Saladin"
 nd_krs_path_b_tt: "Chose Unity of the Emirates"
 nd_krs_destiny: "Destiny of Kurdistan"
 nd_krs_destiny_desc: "Kurdistan has risen from the mountain passes. The question now is whether this nation will follow the martial path of Saladin or build strength through the unity of its emirate traditions."
 nd_krs_dest_mosul: "The Gates of Nineveh"
 nd_krs_dest_mosul_desc: "Mosul and Erbil — the great cities of upper Mesopotamia — must fall under Kurdish dominion. These ancient seats of power command the Tigris valley and open the road to Syria."
 nd_krs_dest_aleppo: "The Syrian March"
 nd_krs_dest_aleppo_desc: "Aleppo, jewel of northern Syria, and Mardin, fortress of the Artukids, must answer to Kurdish authority. Saladin's heirs press southward along the routes their ancestors rode."
 nd_krs_dest_damascus: "The Ayyubid Restoration"
 nd_krs_dest_damascus_desc: "Damascus, Jerusalem, and Cairo — the three pillars of Saladin's empire. To hold them all is to restore the Ayyubid domain in full, a Kurdish dynasty ruling from the Nile to the Zagros."
 nd_krs_dest_baban: "The Baban Consolidation"
 nd_krs_dest_baban_desc: "The Baban emirate centered on Sulaymaniyah pioneered sophisticated Kurdish governance. Secure the heartland, build institutions, and prove that Kurdish unity can be forged through law, not just the sword."
 nd_krs_dest_sharaf: "The Sharaf Khan Legacy"
 nd_krs_dest_sharaf_desc: "As Sharaf Khan Bidlisi chronicled Kurdish greatness in the Sharafnama, so too must Kurdistan now prove its civilizational depth — through prosperity, prestige, and command of the highland economy."
 nd_krs_dest_homeland: "The Kurdish Homeland"
 nd_krs_dest_homeland_desc: "The ultimate achievement of the emirate path: a Kurdistan so prosperous and well-governed that it stands as a permanent homeland, its institutions rivaling any empire, its markets humming with silk and commerce."
 nd_krs.4.t: "The Destiny of Kurdistan"
 nd_krs.4.d: "Kurdistan has taken its first steps on the road to greatness. The mountain passes that sheltered our forebears now mark the boundaries of a nation with ambitions that reach beyond any valley. Whether through conquest or governance, the Kurdish people stand ready to carve their destiny into the stones of history."
 nd_krs.4.a: "Our destiny begins in these mountains."
 nd_krs.5.t: "The Gates of Nineveh"
 nd_krs.5.d: "The ancient cities of upper Mesopotamia — Mosul, with its bridges spanning the Tigris, and Erbil, whose citadel has been continuously inhabited for over six thousand years — now answer to Kurdish authority. From these commanding positions, the road to Syria lies open before us.\n\nThe last time Kurdish arms held such power in Mesopotamia, Saladin himself rode at their head. That legacy now lives again."
 nd_krs.5.a: "Mosul and Erbil are ours. Syria awaits."
 nd_krs.6.t: "The Syrian March"
 nd_krs.6.d: "Aleppo's great citadel and Mardin's clifftop fortress have submitted to Kurdish sovereignty. The Ayyubid heirs have reclaimed the northern reaches of their ancestral domain — the trade routes between Mesopotamia and the Mediterranean now run through Kurdish lands.\n\nOur armies stand at the threshold of the Levant. The question is how we press forward: with the fury of holy war, or with the measured hand of frontier lords building lasting dominion."
 nd_krs.6.a: "With fire and faith, we march south."
 nd_krs.6.b: "Consolidate. Build loyal marches."
 nd_krs.7.t: "The Ayyubid Restoration"
 nd_krs.7.d: "Damascus, Jerusalem, and Cairo — the three pillars upon which Saladin built his empire — all fly the Kurdish banner once more. The restoration of the Ayyubid domain is complete. From the banks of the Nile to the peaks of the Zagros, Kurdish authority is unchallenged.\n\nThis achievement demands a statement of purpose. Shall Kurdistan claim the mantle of leadership over the Islamic world, as Saladin did when he united the faithful against the Crusaders? Or shall we style ourselves guardians of the holy places, protectors rather than conquerors?"
 nd_krs.7.a: "We are the Sultans of Islam reborn."
 nd_krs.7.b: "We shall be guardians of the holy places."
 nd_krs.8.t: "The Baban Consolidation"
 nd_krs.8.d: "The work of the Baban emirs lives on in the governance of Kurdistan. Sulaymaniyah, the city they founded and nurtured, serves as proof that Kurdish administration can build lasting prosperity. Law codes, tax registers, and diplomatic channels now bind the emirates together more firmly than any oath of tribal allegiance.\n\nThe foundations are laid. What rises upon them will determine whether Kurdistan endures for an age or for eternity."
 nd_krs.8.a: "The emirates stand united in law."
 nd_krs.9.t: "The Sharaf Khan Legacy"
 nd_krs.9.d: "Kurdistan has achieved what Sharaf Khan Bidlisi could only chronicle — a prosperous, prestigious Kurdish state whose cultural achievements match its political ambitions. The highland economy thrives, wool flows through mountain markets, and Kurdish scholars debate in courts that command respect.\n\nThis moment calls for a choice of emphasis. Shall we invest in the scholars and madrasas that preserve Kurdish knowledge, or in the mountain merchants whose caravans carry Kurdish goods to distant markets?"
 nd_krs.9.a: "The pen is mightier than the purse."
 nd_krs.9.b: "Commerce builds what armies cannot."
 nd_krs.10.t: "The Kurdish Homeland"
 nd_krs.10.d: "Kurdistan has become everything the scattered emirates once dreamed of — a permanent homeland, prosperous and well-governed, its institutions rooted deep in mountain soil. The great powers may have their empires, but Kurdistan has something more durable: a nation built on the bedrock of shared identity and competent governance.\n\nThe final question is one of political philosophy. Shall Kurdistan embrace the confederal traditions of its emirate past, where autonomous provinces govern themselves within a loose union? Or shall it experiment with constitutional forms that channel popular sovereignty — a mountain republic unlike any the world has seen?"
 nd_krs.10.a: "The confederacy endures, as our mountains do."
 nd_krs.10.b: "A republic of the highlands."
 STATIC_MODIFIER_NAME_nd_krs_dest_northern_jihad: "Northern Jihad"
 STATIC_MODIFIER_DESC_nd_krs_dest_northern_jihad: "Kurdish armies sweep through Syria with the zeal of holy warriors, storming fortifications and pressing the offensive with little regard for cost. The military momentum is unstoppable, but sustained campaigning weighs on the people."
 STATIC_MODIFIER_NAME_nd_krs_dest_frontier_lords: "Frontier Lords"
 STATIC_MODIFIER_DESC_nd_krs_dest_frontier_lords: "Rather than rushing south, Kurdish frontier lords methodically extend their authority through negotiated submissions and rapid garrisoning. Subject populations are pacified quickly, though the focus on military administration diverts resources from civilian needs."
 STATIC_MODIFIER_NAME_nd_krs_dest_sultan_of_islam: "Sultan of Islam"
 STATIC_MODIFIER_DESC_nd_krs_dest_sultan_of_islam: "Kurdistan claims the mantle of Islamic leadership, echoing Saladin's role as unifier of the faithful. Religious prestige and political authority reinforce each other, and even heretical communities find a place under Kurdish tolerance."
 STATIC_MODIFIER_NAME_nd_krs_dest_guardian_of_jerusalem: "Guardian of Jerusalem"
 STATIC_MODIFIER_DESC_nd_krs_dest_guardian_of_jerusalem: "Rather than claiming universal authority, Kurdistan positions itself as guardian of the holy places — rebuilding war-torn lands, maintaining fortress networks, and projecting quiet power through intelligence rather than proclamation."
 STATIC_MODIFIER_NAME_nd_krs_dest_highland_scholars: "Highland Scholars"
 STATIC_MODIFIER_DESC_nd_krs_dest_highland_scholars: "Kurdish madrasas and scholarly circles flourish, producing graduates who serve as administrators, jurists, and poets. The highland economy benefits from educated governance, and the population grows as prosperity spreads."
 STATIC_MODIFIER_NAME_nd_krs_dest_mountain_merchants: "Mountain Merchants"
 STATIC_MODIFIER_DESC_nd_krs_dest_mountain_merchants: "Kurdish merchants extend their reach across the highland trade routes, bringing wealth back to mountain communities. The cost of this commercial expansion is felt in higher borrowing costs as credit flows outward."
 STATIC_MODIFIER_NAME_nd_krs_dest_eternal_confederacy: "Eternal Confederacy"
 STATIC_MODIFIER_DESC_nd_krs_dest_eternal_confederacy: "Kurdistan embraces its confederal heritage, granting each emirate province autonomy within a loose but durable union. Diplomacy and supply networks bind the confederation together without centralizing authority."
 STATIC_MODIFIER_NAME_nd_krs_dest_mountain_republic: "Mountain Republic"
 STATIC_MODIFIER_DESC_nd_krs_dest_mountain_republic: "Kurdistan experiments with constitutional governance — an innovative, liberal polity where free subjects participate in governance. A highland republic unlike any the old empires imagined."
 nd_krs_ayyubid_palace: "Ayyubid Palace"
 nd_krs_ayyubid_palace_desc: "A grand palace in the Ayyubid tradition, combining martial fortification with courtly splendor. Its halls echo with the memory of Saladin's court, where warriors and scholars gathered under Kurdish patronage."
 nd_krs_palace_maintenance: "Palace Upkeep"
 nd_krs_palace_maintenance_desc: "Maintaining the ceremonial courts, armories, and administrative offices of an Ayyubid-style palace complex."
 nd_krs_emirate_chancellery: "Emirate Chancellery"
 nd_krs_emirate_chancellery_desc: "A center of Kurdish governance and administration, where the traditions of the emirate courts are preserved and modernized. Scholars, diplomats, and merchants work under one roof to manage the affairs of the united Kurdistan."
 nd_krs_chancellery_maintenance: "Chancellery Operations"
 nd_krs_chancellery_maintenance_desc: "Supplying a Kurdish center of governance with paper, books, fine cloth, and furnishings for its administrative chambers and scholarly archives."
