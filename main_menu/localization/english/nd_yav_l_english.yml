l_english:
 yavana_culture: "Yavana"
 STATIC_MODIFIER_NAME_nd_yav_phalanx_reborn: "Phalanx Reborn"
 STATIC_MODIFIER_DESC_nd_yav_phalanx_reborn: "The sarissa-armed phalanx has risen again in the lands between the Indus and the Hindu Kush. What Alexander's successors brought east, we have made our own."
 STATIC_MODIFIER_NAME_nd_yav_dharma_of_the_yavana: "Dharma of the Yavana"
 STATIC_MODIFIER_DESC_nd_yav_dharma_of_the_yavana: "Where Greek philosophy meets Buddhist wisdom, a new civilization blossoms. Our coins bear two scripts, our temples two traditions, and our scholars speak to all the world."
 STATIC_MODIFIER_NAME_nd_yav_questions_of_milinda: "Questions of Milinda"
 STATIC_MODIFIER_DESC_nd_yav_questions_of_milinda: "In the tradition of King Menander's dialogues with the monk Nagasena, our court embraces the union of reason and enlightenment."
 STATIC_MODIFIER_NAME_nd_yav_rational_inquiry: "Rational Inquiry"
 STATIC_MODIFIER_DESC_nd_yav_rational_inquiry: "The Greek method of systematic questioning applied to the mysteries of the world yields discoveries that neither tradition alone could achieve."
 STATIC_MODIFIER_NAME_nd_yav_fourfold_array: "Fourfold Array"
 STATIC_MODIFIER_DESC_nd_yav_fourfold_array: "Infantry, cavalry, elephants, and archers operate as a single coordinated force in the Hellenistic tradition of combined arms."
 nd_yav.1.t: "The Yavana Restoration"
 nd_yav.1.d: "For centuries the Yavana name has echoed through Indian chronicles -- the Greeks who came from beyond the mountains, who struck coins in two languages and worshipped the Enlightened One in marble temples. Now a Sindhi Buddhist ruler has dared what no one thought possible: the revival of the Indo-Greek kingdom.\n\nFrom Thatta on the Indus delta to Peshawar in the shadow of the Khyber Pass, the ancient Yavana domains answer to a single throne once more. But what manner of state shall this be? The phalanx drills in the courtyards of Gandharan monasteries, and merchants strike bilingual coins in workshops that smell of incense and olive oil.\n\nTwo paths lie before the restored Yavana Empire -- one looking to the military genius of Alexander's heirs, the other to the philosophical synthesis that made these kingdoms unique among all the world's civilizations.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_yav.1.a: "We shall revive the phalanx that conquered half the world"
 nd_yav.1.b: "Our dharma bridges East and West in wisdom"
 nd_yav.2.t: "The Questions of Milinda"
 nd_yav.2.d: "In the ancient text known as the Milindapanha, the Greek king Menander -- called Milinda in Pali -- engaged the Buddhist monk Nagasena in a series of profound philosophical dialogues. The king asked the deepest questions about the nature of the self, of karma, of existence itself, and the monk answered with parables and razor-sharp logic.\n\nThis tradition of dialogue between Greek rational inquiry and Buddhist contemplative wisdom was the intellectual foundation of the Indo-Greek kingdoms. Now our scholars have revived these methods, hosting public debates between philosophers of every school in the gymnasia and viharas of our cities.\n\nShall we emphasize the spiritual dimension of this tradition, or its contribution to rational knowledge?"
 nd_yav.2.a: "Let the dialogue illuminate the path to nirvana"
 nd_yav.2.b: "Let reason be our guide to understanding the world"
 nd_yav.3.t: "The Gandhara Art School"
 nd_yav.3.d: "In the workshops of Gandhara, something extraordinary has emerged. Our sculptors, trained in the Greek tradition of naturalistic human representation, have turned their skills to Buddhist subjects. For the first time in history, the Buddha is depicted not as an abstract symbol -- a wheel, a tree, a set of footprints -- but as a serene human figure draped in a toga-like robe, his hair arranged in waves reminiscent of Apollo.\n\nThese images carry an emotional power that purely symbolic art cannot match. Pilgrims weep before the compassionate face of the Enlightened One. The art is spreading along trade routes in every direction, and with it the fame of Yavana civilization."
 nd_yav.3.a: "Our art shall carry the dharma to the ends of the earth"
 nd_yav.4.t: "The Fourfold Array"
 nd_yav.4.d: "The Milinda Panha describes Menander's army as a fourfold force: elephants, cavalry, archers, and foot soldiers. Our generals have formalized this ancient doctrine into a comprehensive system of combined arms warfare.\n\nThe phalanx holds the center with their sarissas, an unbreakable wall of iron points. On the flanks, mounted archers harass and screen. Behind the lines, war elephants wait in reserve -- living siege towers that shatter enemy formations when committed at the decisive moment. Skirmishers and light troops fill the gaps, maintaining contact between the four arms.\n\nNo army in India fights like this. It is neither purely Greek nor purely Indian, but something new -- and devastating."
 nd_yav.4.a: "Let the fourfold array carry all before it"
 nd_yav_culture_conversion_tt: "All Sindhi pops in owned provinces adopt Yavana culture"
 nd_yav_formed_tt: "Yavana Empire Formed"
 nd_yav_path_a_tt: "Path of the Phalanx"
 nd_yav_path_b_tt: "Path of Dharma"
 nd_yav_phalanx_revival: "Phalanx Revival"
 nd_yav_phalanx_revival_desc: "The Macedonian phalanx, brought to India by Alexander's successors, is drilled anew in the courtyards of Sindh. Heavy infantry armed with the sarissa pike form the backbone of the Yavana army."
 nd_yav_gandhara_monasteries: "Gandhara Monasteries"
 nd_yav_gandhara_monasteries_desc: "Buddhist monasteries built in the Greek architectural style serve as centers of learning and worship, preserving texts in both Greek and Prakrit."
 nd_yav_bilingual_administration: "Bilingual Administration"
 nd_yav_bilingual_administration_desc: "State documents are issued in both Greek and Prakrit, ensuring that the Hellenistic bureaucracy and Indian subjects can communicate without barriers."
 nd_yav_elephant_corps: "Elephant Corps"
 nd_yav_elephant_corps_desc: "The Indo-Greek kingdoms adopted Indian war elephants with enthusiasm, armoring them and mounting fighting platforms atop these living fortresses."
 nd_yav_indus_trade: "Indus Trade Networks"
 nd_yav_indus_trade_desc: "Control of the Indus River and the mountain passes connecting India to Central Asia gives the Yavana state command over some of the most lucrative trade routes in the ancient world."
 nd_yav_bilingual_coinage: "Bilingual Coinage"
 nd_yav_bilingual_coinage_desc: "Coins struck with Greek on one face and Kharosthi on the other -- a hallmark of Indo-Greek civilization that facilitates trade across linguistic boundaries."
 nd_yav_gajasena_tradition: "Gajasena Tradition"
 nd_yav_gajasena_tradition_desc: "The formalized doctrine of elephant warfare, training beasts and mahouts together in coordinated tactics that maximize the terrifying impact of a charging elephant line."
 nd_yav_milindapanha: "Milindapanha Dialogues"
 nd_yav_milindapanha_desc: "The philosophical dialogues between Greek rationalism and Buddhist contemplation, following the model of King Menander's legendary exchanges with the monk Nagasena."
 nd_yav_gandhara_art: "Gandhara Art School"
 nd_yav_gandhara_art_desc: "Greek sculptural techniques applied to Buddhist religious subjects, creating the first human representations of the Buddha and establishing an artistic tradition that will spread across all of Asia."
 nd_yav_strategoi_governance: "Strategoi Governance"
 nd_yav_strategoi_governance_desc: "The Hellenistic system of provincial governance through military-civil strategoi, adapted to Indian conditions and providing both frontier defense and administrative efficiency."
 nd_yav_hellenistic_gymnasium: "Hellenistic Gymnasium"
 nd_yav_hellenistic_gymnasium_desc: "The Greek gymnasium tradition of physical training combined with philosophical education, creating citizens trained in both body and mind."
 nd_yav_combined_arms: "Combined Arms Doctrine"
 nd_yav_combined_arms_desc: "The systematic coordination of infantry phalanx, war elephants, mounted archers, and light skirmishers into a single flexible fighting force -- neither purely Greek nor purely Indian."
 nd_yav_syncretic_markets: "Syncretic Markets"
 nd_yav_syncretic_markets_desc: "Marketplaces where Greek commercial law meets Indian trading customs, overseen by agoranomoi who enforce fair weights and measures in a bilingual trading environment."
 nd_yav_dharma_statecraft: "Dharma of Statecraft"
 nd_yav_dharma_statecraft_desc: "Buddhist ethical principles applied to Hellenistic governance -- a philosophy of just rule that draws on both Ashoka's edicts and Aristotle's Politics."
 nd_yav_taxila_tradition: "Taxila University Tradition"
 nd_yav_taxila_tradition_desc: "The ancient university at Taxila, where scholars from across Asia gathered to study medicine, mathematics, and philosophy, is revived as the intellectual heart of the Yavana state."
 nd_yav_hippotoxotai_tradition: "Hippotoxotai Tradition"
 nd_yav_hippotoxotai_tradition_desc: "Mounted archers combining Greek horsemanship with the composite bow techniques of the Central Asian steppe, providing the fast-moving cavalry arm of the Yavana military."
 nd_yav_greco_buddhist_patronage: "Greco-Buddhist Patronage"
 nd_yav_greco_buddhist_patronage_desc: "State-sponsored religious syncretism where Greek deities are identified with Buddhist and Hindu figures, and temples serve worshippers of multiple traditions under one roof."
 nd_yav_imperial_administration: "Imperial Administration"
 nd_yav_imperial_administration_desc: "The centralized Hellenistic bureaucracy of eparchs, dioiketai, and hyparchoi adapted to govern a subcontinental empire, collecting taxes and dispensing justice in two languages."
 nd_yav_silk_road_entrepot: "Silk Road Entrepot"
 nd_yav_silk_road_entrepot_desc: "The Yavana Empire sits at the junction of overland routes from China, sea routes from the Mediterranean, and river routes down the Indus -- a position of extraordinary commercial power."
 nd_yav_syntagma_reform: "Syntagma Reform"
 nd_yav_syntagma_reform_desc: "The syntagma -- a tactical unit of the reformed phalanx -- becomes the basis of a professional standing army, drilled to Hellenistic standards and paid from the imperial treasury."
 nd_yav_universal_dharma: "Universal Dharma"
 nd_yav_universal_dharma_desc: "A mature philosophy of religious tolerance rooted in Buddhist compassion and Greek cosmopolitanism, offering citizenship and dignity to all peoples regardless of creed."
 nd_yav_standing_army: "Standing Army Reforms"
 nd_yav_standing_army_desc: "The transition from seasonal levy warfare to a permanent professional force maintained year-round, following the Hellenistic model of paid soldiers owing loyalty to the state."
 nd_yav_gandharan_renaissance: "Gandharan Renaissance"
 nd_yav_gandharan_renaissance_desc: "A flowering of artistic production as Gandharan techniques are applied to sculpture, painting, metalwork, and architecture across the empire."
 nd_yav_grand_vihara_network: "Grand Vihara Network"
 nd_yav_grand_vihara_network_desc: "A network of monastic universities spanning the empire, where monks copy texts, teach mathematics and medicine, and serve as the intellectual backbone of the state."
 nd_yav_enlightened_syncretism: "Enlightened Syncretism"
 nd_yav_enlightened_syncretism_desc: "The philosophical culmination of centuries of Greco-Buddhist dialogue -- a mature intellectual tradition that draws freely on Greek, Indian, and Central Asian thought."
 nd_yav_modern_phalanx: "Modern Phalanx"
 nd_yav_modern_phalanx_desc: "The ancient phalanx tradition evolves into disciplined line infantry capable of volley fire, maintaining the Hellenistic emphasis on formation discipline in the age of gunpowder."
 nd_yav_industrial_crossroads: "Industrial Crossroads"
 nd_yav_industrial_crossroads_desc: "The geographic position that once made the Yavana state a trade crossroads now drives industrial development, as raw materials flow in from every direction."
 nd_yav_yavana_legacy: "Yavana Legacy"
 nd_yav_yavana_legacy_desc: "The enduring legacy of the Indo-Greek synthesis -- a civilization that proved East and West could merge into something greater than either alone."
 a_nd_yav_pezhetairoi: "Pezhetairoi"
 a_nd_yav_pezhetairoi_desc: "Heavy infantry armed with the sarissa pike, reviving the Macedonian phalanx tradition that conquered the known world under Alexander."
 a_nd_yav_gajasena: "Gajasena"
 a_nd_yav_gajasena_desc: "Armored war elephants bearing fighting towers, combining Indian elephant husbandry with Greek military engineering to create the most terrifying weapon on the battlefield."
 a_nd_yav_thureophoroi: "Thureophoroi"
 a_nd_yav_thureophoroi_desc: "Versatile medium infantry carrying the thureos shield and armed with javelins and swords, trained to fight in both Greek formation and Indian skirmish tactics."
 a_nd_yav_hippotoxotai: "Hippotoxotai"
 a_nd_yav_hippotoxotai_desc: "Mounted archers combining Greek cavalry discipline with Central Asian composite bow techniques, swift raiders who harass enemy flanks and screen the army's advance."
 a_nd_yav_syntagma_guard: "Syntagma Guard"
 a_nd_yav_syntagma_guard_desc: "Elite professional heavy infantry of the reformed phalanx, paid soldiers drilled to fight as a single organism in the syntagma formation."
 nd_yav_gandhara_vihara: "Gandhara Vihara"
 nd_yav_gandhara_vihara_desc: "A Buddhist monastery built in the Greco-Buddhist architectural style, with Corinthian columns framing meditation halls and Greek-trained sculptors crafting images of the Buddha."
 nd_yav_bilingual_mint: "Yavana Mint"
 nd_yav_bilingual_mint_desc: "A coinage workshop striking the distinctive bilingual coins of the Yavana state -- Greek legends on one face, Kharosthi on the other."
 nd_yav_hastisala: "Hastisala"
 nd_yav_hastisala_desc: "An elephant training and stabling compound where mahouts and beasts are trained together in the arts of war, maintaining the Yavana elephant corps."
 nd_yav_gymnasium: "Gymnasium"
 nd_yav_gymnasium_desc: "A Hellenistic training ground where citizens exercise the body and the mind, studying philosophy and rhetoric alongside wrestling and javelin-throwing."
 nd_yav_agora_bazaar: "Agora-Bazaar"
 nd_yav_agora_bazaar_desc: "A syncretic marketplace where Greek commercial practices and Indian trading customs merge under the watchful eye of bilingual market officials."
 nd_yav_vihara_scriptorium: "Vihara Scriptorium"
 nd_yav_vihara_scriptorium_desc: "Monastic scribes copying Buddhist texts and Greek philosophical works onto palm leaves and bark paper."
 nd_yav_vihara_endowment: "Vihara Endowment"
 nd_yav_vihara_endowment_desc: "Regular donations of incense, cloth, and rice sustain the monks and their scholarly endeavors."
 nd_yav_coin_striking: "Coin Striking"
 nd_yav_coin_striking_desc: "The minting of bilingual coins in copper and silver, a centuries-old Indo-Greek tradition facilitating cross-cultural trade."
 nd_yav_mint_operations: "Mint Operations"
 nd_yav_mint_operations_desc: "Tools, raw metals, and administrative supplies needed to run the Yavana mint."
 nd_yav_elephant_upkeep: "Elephant Corps Upkeep"
 nd_yav_elephant_upkeep_desc: "War elephants require vast quantities of food, specialized timber for howdah construction, and a steady supply of replacement animals."
 nd_yav_stable_maintenance: "Stable Maintenance"
 nd_yav_stable_maintenance_desc: "Lumber, fodder, and rice to maintain the elephant stabling compound and feed its enormous charges."
 nd_yav_philosophical_academy: "Philosophical Academy"
 nd_yav_philosophical_academy_desc: "An advanced school of Greco-Buddhist philosophy producing scholarly texts that synthesize Eastern and Western intellectual traditions."
 nd_yav_gymnasium_operations: "Gymnasium Operations"
 nd_yav_gymnasium_operations_desc: "Paper for philosophical texts, cloth for athletic garments, and olive oil for the traditional Greek practice of anointing."
 nd_yav_market_operations: "Market Operations"
 nd_yav_market_operations_desc: "Cloth, pottery, and paper supplies for the bustling syncretic marketplace."
 nd_yav_destiny: "Reclaim Bactria"
 nd_yav_destiny_desc: "The Yavana Empire must reclaim the ancient Greco-Bactrian heartland beyond the Hindu Kush -- Kabul, Kandahar, and Ghazni -- to restore the full extent of Alexander's eastern inheritance."
 nd_yav_dest_bactrian_march: "The Bactrian March"
 nd_yav_dest_bactrian_march_desc: "Push the sarissa-armed phalanx northward to Balkh and Herat, the great cities of ancient Bactria, and build an army worthy of Alexander's successors."
 nd_yav_dest_sarissa_empire: "The Sarissa Empire"
 nd_yav_dest_sarissa_empire_desc: "Carry the Hellenistic military tradition to Samarkand in the north and Delhi in the east, forging a continental empire held together by the unbreakable phalanx."
 nd_yav_dest_alexanders_dream: "Alexander's Dream"
 nd_yav_dest_alexanders_dream_desc: "Reach the Ganges at Varanasi and Patna -- the goal Alexander himself was denied. Build the greatest combined arms army the world has ever seen and complete the conquest he began."
 nd_yav_dest_bamiyan_light: "The Light of Bamiyan"
 nd_yav_dest_bamiyan_light_desc: "Secure the great Buddha statues of Bamiyan and invest in the empire's prosperity. Embrace meritocratic governance to build a civilization worthy of both Greek philosophy and Buddhist wisdom."
 nd_yav_dest_silk_dharma: "The Silk Dharma"
 nd_yav_dest_silk_dharma_desc: "Draw silk into the capital's markets and develop the empire's lands until the Yavana realm becomes the intellectual and commercial crossroads of Asia."
 nd_yav_dest_universal_light: "The Universal Light"
 nd_yav_dest_universal_light_desc: "Extend Greco-Buddhist learning to Mathura and Ujjain, the sacred cities of the Gangetic heartland. Develop the empire's prosperity and embrace modern banking to fund the greatest syncretic civilization in history."
 nd_yav.5.t: "The Return to Bactria"
 nd_yav.5.d: "Our armies have crossed the Hindu Kush and planted the Yavana standard in the ancient cities of Bactria. Kabul, where Alexander himself once camped. Kandahar, which bears his name in corrupted form. Ghazni, gateway to the Iranian plateau.\n\nFor the first time since the fall of the Greco-Bactrian kingdom, a single Hellenistic power commands both the Indus valley and the Afghan highlands. The mountain passes that connect India to Central Asia are ours. The trade routes that carried Greek culture eastward and Buddhist wisdom westward now flow through our customs houses.\n\nThis is only the beginning."
 nd_yav.5.a: "The mountains answer to the phalanx once more"
 nd_yav.6.t: "The Bactrian March"
 nd_yav.6.d: "Balkh, the ancient capital of Bactria -- the 'mother of cities' as the Arabs called it -- flies the Yavana banner. Herat, jewel of Khorasan, has fallen to our phalanx. The sarissa-armed infantry that first appeared on these plains two millennia ago under Alexander have returned.\n\nOur strategoi govern provinces that stretch from the Indus delta to the gates of Persia. The combined arms doctrine of elephant, cavalry, and phalanx has proven itself against every foe. In the bazaars of Balkh, merchants strike bilingual coins bearing Greek legends and Kharosthi script.\n\nThe reconquest of Greater Bactria is complete. What remains is to decide how far the phalanx shall march."
 nd_yav.6.a: "Let the sarissa carry our standard further still"
 nd_yav.7.t: "The Sarissa Empire"
 nd_yav.7.d: "From Samarkand's fabled markets to the walls of Delhi, the Yavana phalanx has carved an empire that dwarfs anything the original Indo-Greek kings achieved. Menander would weep with pride.\n\nOur army is the finest in Asia -- disciplined infantry, screening horse archers, thundering elephant charges, all coordinated by strategoi trained in the combined arms tradition. But even the greatest army requires a doctrine for its continued growth.\n\nShall we expand our forces through mass levies and rapid maneuver, overwhelming our enemies with numbers and speed? Or shall we invest in professional training and defensive fortifications, making every soldier worth ten of the enemy?"
 nd_yav.7.a: "Flood the field with sarissas and elephants"
 nd_yav.7.b: "Train each soldier to fight with iron discipline"
 nd_yav.8.t: "Alexander's Dream Fulfilled"
 nd_yav.8.d: "The Ganges. Alexander wept because he had no more worlds to conquer -- or so the legend says. In truth, his army mutinied at the Hyphasis, refusing to march further east. What Alexander could not achieve, the Yavana Empire has accomplished.\n\nOur banners fly over Varanasi, holiest city of the Hindus, and Patna, the ancient Pataliputra where Chandragupta Maurya once received Seleucid ambassadors. The sarissa and the war elephant have carried Greek arms to the heart of India.\n\nThis is the apex of Hellenistic military power. How shall we cement this achievement for eternity?"
 nd_yav.8.a: "Our campaigns shall never cease"
 nd_yav.8.b: "We shall dictate terms to the world"
 nd_yav.9.t: "The Light of Bamiyan"
 nd_yav.9.d: "The great Buddhas of Bamiyan gaze down upon our soldiers with serene compassion as the Yavana standard is raised before them. These colossal statues, carved from the living rock of the Hindu Kush, represent everything our civilization aspires to be -- the marriage of Greek artistic mastery and Buddhist spiritual depth.\n\nOur scholars have established a new vihara in Bamiyan's shadow, where monks debate philosophy in Greek and Prakrit, and sculptors trained in the Gandharan tradition carve images that will inspire pilgrims for centuries to come.\n\nThe path of dharma stretches onward."
 nd_yav.9.a: "May the light of wisdom illuminate all lands"
 nd_yav.10.t: "The Silk Dharma"
 nd_yav.10.d: "Caravans bearing Chinese silk arrive at our capital's markets alongside merchants carrying Roman glass, Central Asian horses, and Indian spices. The Yavana Empire sits at the crossroads of the world's greatest trade routes, and our prosperity reflects it.\n\nOur cities grow. Our scholars multiply. The viharas and gymnasia that line our roads produce monks, philosophers, physicians, and merchants in equal measure. But prosperity creates its own choices.\n\nShall we invest this wealth in the material wellbeing of our subjects, reducing unrest and building a contented populace? Or shall we use it to draw scholars and diplomats from across the world, making our court the most cosmopolitan in Asia?"
 nd_yav.10.a: "Let our people prosper under the dharma"
 nd_yav.10.b: "Let the world's scholars gather at our court"
 nd_yav.11.t: "The Universal Light"
 nd_yav.11.d: "Mathura, sacred to both Buddhists and Hindus, and Ujjain, the ancient astronomical capital of India -- both now shelter Yavana universities where Greek logic meets Buddhist meditation and Hindu mathematics. Our empire has become what no other civilization in history has achieved: a living synthesis of East and West.\n\nScholars travel from the Mediterranean to study at our academies. Our bilingual texts are copied in monasteries from Sri Lanka to Sogdia. The Gandharan art tradition has spread the image of the Buddha across half the world. And in our courts, philosophers of every school debate freely under the protection of a state that values wisdom above dogma.\n\nThis is the culmination of the Yavana vision. How shall we preserve it?"
 nd_yav.11.a: "Through scholarship that outlasts empires"
 nd_yav.11.b: "Through tolerance that embraces all faiths"
 STATIC_MODIFIER_NAME_nd_yav_dest_sarissa_tide: "Tide of Sarissas"
 STATIC_MODIFIER_DESC_nd_yav_dest_sarissa_tide: "Mass levies and rapid maneuver overwhelm our enemies with the sheer weight of the Yavana phalanx."
 STATIC_MODIFIER_NAME_nd_yav_dest_iron_discipline: "Iron Discipline"
 STATIC_MODIFIER_DESC_nd_yav_dest_iron_discipline: "Professional training and fortified positions make every Yavana soldier worth ten of the enemy."
 STATIC_MODIFIER_NAME_nd_yav_dest_phalanx_ascendant: "Phalanx Ascendant"
 STATIC_MODIFIER_DESC_nd_yav_dest_phalanx_ascendant: "The Yavana military machine operates with relentless efficiency, launching campaigns faster and sustaining them longer than any rival."
 STATIC_MODIFIER_NAME_nd_yav_dest_world_conqueror: "World Conqueror"
 STATIC_MODIFIER_DESC_nd_yav_dest_world_conqueror: "The Yavana Empire dictates terms to the world from a position of overwhelming military supremacy."
 STATIC_MODIFIER_NAME_nd_yav_dest_dharma_prosperity: "Dharma of Prosperity"
 STATIC_MODIFIER_DESC_nd_yav_dest_dharma_prosperity: "Buddhist ethics of contentment and good governance reduce unrest and separatism across the empire."
 STATIC_MODIFIER_NAME_nd_yav_dest_cosmopolitan_court: "Cosmopolitan Court"
 STATIC_MODIFIER_DESC_nd_yav_dest_cosmopolitan_court: "The Yavana court draws scholars and diplomats from across the known world, integrating vassal states through cultural magnetism."
 STATIC_MODIFIER_NAME_nd_yav_dest_living_synthesis: "Living Synthesis"
 STATIC_MODIFIER_DESC_nd_yav_dest_living_synthesis: "The fusion of Greek and Buddhist intellectual traditions produces a civilization that attracts the world's finest minds."
 STATIC_MODIFIER_NAME_nd_yav_dest_tolerant_empire: "Tolerant Empire"
 STATIC_MODIFIER_DESC_nd_yav_dest_tolerant_empire: "A state founded on religious tolerance and syncretic wisdom, where all faiths are welcomed and none are persecuted."
 nd_yav_strategos_akademia: "Strategos Akademia"
 nd_yav_strategos_akademia_desc: "An elite military academy where commanders are trained in the combined arms doctrine of phalanx, elephant, and cavalry, producing strategoi worthy of Alexander's legacy."
 nd_yav_mahasanghika_university: "Mahasanghika University"
 nd_yav_mahasanghika_university_desc: "A great center of syncretic learning where Greek philosophy, Buddhist wisdom, and Hindu mathematics are studied together, producing scholars who bridge the intellectual traditions of East and West."
 nd_yav_akademia_training: "Akademia Training"
 nd_yav_akademia_training_desc: "Weapons, stone fortifications, leather armor, and tools for training the next generation of Yavana military commanders."
 nd_yav_university_scholarship: "University Scholarship"
 nd_yav_university_scholarship_desc: "Paper for manuscripts, dyes for illumination, and incense for meditation sustain the scholarly work of the university."
 nd_yav_university_endowment: "University Endowment"
 nd_yav_university_endowment_desc: "Paper, incense, cloth, and beeswax to maintain the university's daily operations and support its resident scholars."
