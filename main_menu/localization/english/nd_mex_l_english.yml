l_english:
 STATIC_MODIFIER_NAME_nd_tres_garantias: "Three Guarantees"
 STATIC_MODIFIER_DESC_nd_tres_garantias: "The Plan de Iguala's three sacred pillars — Religion, Independence, and Union — bind the diverse peoples of Mexico into a single nation under the banner of order and tradition."
 STATIC_MODIFIER_NAME_nd_grito_de_dolores: "Cry of Dolores"
 STATIC_MODIFIER_DESC_nd_grito_de_dolores: "The revolutionary spirit of Hidalgo and Morelos lives on. Mexico is a nation forged in popular uprising, where the people's sovereignty transcends the old colonial order."
 nd_mex.1.t: "The Birth of Mexico"
 nd_mex.1.d: "A new nation rises from the ashes of three centuries of colonial rule. The land that was once New Spain — its silver mines, its haciendas, its cathedrals, its peoples of a hundred origins — must now find its own path. Two visions compete for the soul of the new republic. The conservatives look to the Plan de Iguala and its Three Guarantees: the primacy of the Catholic faith, absolute independence from Spain, and the union of all peoples regardless of origin — an orderly transition led by the army and the church. The liberals invoke the Grito de Dolores, the midnight cry of Father Hidalgo that launched a decade of popular revolution — a Mexico built on the sovereignty of the common people, where colonial privileges are swept away and a new republican order rises from below.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mex.1.a: "Religion, Independence, Union — the Three Guarantees shall be our foundation."
 nd_mex.1.b: "The Cry of Dolores echoes still — the people's revolution continues!"
 STATIC_MODIFIER_NAME_nd_mex_bourbon_reform_centralize: "Intendancy System"
 STATIC_MODIFIER_DESC_nd_mex_bourbon_reform_centralize: "The Bourbon administrative reforms have centralized governance through the intendancy system, replacing the old alcalde mayor network with professional administrators who answer directly to the crown."
 STATIC_MODIFIER_NAME_nd_mex_bourbon_reform_trade: "Free Commerce Decree"
 STATIC_MODIFIER_DESC_nd_mex_bourbon_reform_trade: "The liberalization of colonial trade regulations has opened new ports and commercial routes, breaking the old monopoly system and allowing Mexican merchants to trade more freely."
 STATIC_MODIFIER_NAME_nd_mex_la_reforma_secular: "Laws of the Reform"
 STATIC_MODIFIER_DESC_nd_mex_la_reforma_secular: "The Reform Laws have separated church and state, nationalized ecclesiastical property, and established civil marriage and secular cemeteries — laying the legal foundation for a modern republic."
 STATIC_MODIFIER_NAME_nd_mex_la_reforma_national: "Spirit of Juarez"
 STATIC_MODIFIER_DESC_nd_mex_la_reforma_national: "The determination of Benito Juarez to defend national sovereignty against all foreign intervention has forged a patriotic spirit that transcends class and ethnicity."
 nd_mex.2.t: "The Bourbon Reforms"
 nd_mex.2.d: "The Bourbon dynasty has brought sweeping changes to the administration of New Spain. The old Habsburg system of indirect rule through local elites and church intermediaries is being replaced by a rationalized bureaucracy designed to extract more revenue and tighten metropolitan control. The intendancy system replaces the patchwork of corregidores and alcaldes mayores with professional administrators. Restrictions on colonial trade are being loosened. The military is being professionalized. These reforms will strengthen the state — but they also risk alienating the creole elites who have long enjoyed autonomy under the old system. The question is whether to embrace centralization fully or to focus the reforms on commercial expansion."
 nd_mex.2.a: "Centralize the administration — efficiency demands order."
 nd_mex.2.b: "Open the ports — prosperity flows through free commerce."
 nd_mex.3.t: "La Reforma"
 nd_mex.3.d: "Benito Juarez, a Zapotec lawyer from Oaxaca, has become the symbol of Mexico's liberal revolution. The Reform Laws of the 1850s represent the most radical transformation of Mexican society since independence: the Ley Juarez abolishes the military and clerical fueros — the special legal privileges that placed soldiers and priests above civilian law. The Ley Lerdo orders the sale of church lands not used for worship. The Constitution of 1857 establishes a genuine bill of rights and places the army under civilian control. The church has excommunicated all officials who swore to uphold the constitution, and conservative generals have taken up arms. Mexico stands at a crossroads between secular modernity and traditional order."
 nd_mex.3.a: "The separation of church and state shall be absolute."
 nd_mex.3.b: "National sovereignty above all — no foreign power shall dictate our fate."
 nd_mex.4.t: "The Silver Revolution"
 nd_mex.4.d: "In the mines of Zacatecas, a breakthrough in metallurgy is transforming the colonial economy. Bartolome de Medina has developed the patio process — mercury amalgamation applied on an industrial scale — which allows silver to be extracted from ores that were previously too poor to work. The impact is staggering. Silver production explodes, and Mexican pesos begin circulating across the globe — from the markets of Seville to the silk shops of Manila, from the counting houses of Amsterdam to the tea houses of Canton. New Spain becomes the engine of the world's first truly global economy, and the silver peso becomes the world's first international currency."
 nd_mex.4.a: "Mexican silver shall flow to every corner of the world."
 nd_mex.5.t: "The Cry of Dolores"
 nd_mex.5.d: "In the early hours of September 16, 1810, in the small town of Dolores in the Bajio, Father Miguel Hidalgo y Costilla rings the church bell to summon his parishioners. What he proclaims that morning will echo through the centuries: death to bad government, death to the gachupines, long live the Virgin of Guadalupe. Within days, a ragtag army of tens of thousands — mestizos, indigenous peoples, mine workers, peasants — is marching on Guanajuato, then San Luis Potosi, then Mexico City itself. The insurgency will take eleven years, cost hundreds of thousands of lives, and produce a nation unlike any the world has seen: neither wholly Spanish nor wholly indigenous, but something entirely new."
 nd_mex.5.a: "A new nation is born from the people's courage."
 nd_mex_encomienda_system: "Encomienda System"
 nd_mex_encomienda_system_desc: "The encomienda grants Spanish settlers the right to extract labor and tribute from indigenous communities, establishing the foundations of colonial agriculture and mining."
 nd_mex_silver_mining: "Silver Mining Revolution"
 nd_mex_silver_mining_desc: "The development of mercury amalgamation transforms silver extraction, making Mexico the world's largest silver producer and its currency the first global medium of exchange."
 nd_mex_cochineal_trade: "Cochineal Trade"
 nd_mex_cochineal_trade_desc: "Cochineal dye from the nopal cactus becomes Mexico's second most valuable export, producing vivid crimson that colors the robes of European monarchs and cardinals."
 nd_mex_viceregal_administration: "Viceregal Administration"
 nd_mex_viceregal_administration_desc: "The audiencia, the viceroy, and the Real Hacienda form the institutional backbone of New Spain, governing a territory stretching from Central America to the Philippines."
 nd_mex_colegio_tradition: "Colegio Tradition"
 nd_mex_colegio_tradition_desc: "The founding of colleges and the Royal and Pontifical University of Mexico creates a distinctive intellectual tradition blending European scholasticism with New World experience."
 nd_mex_hacienda_system: "Hacienda System"
 nd_mex_hacienda_system_desc: "Great agricultural estates combine farming, ranching, and sometimes mining to feed the colonial economy, becoming the dominant institution of rural Mexico."
 nd_mex_casta_society: "Casta Society"
 nd_mex_casta_society_desc: "The complex racial taxonomy of colonial Mexico — Spaniard, creole, mestizo, mulatto, and dozens of other categories — paradoxically creates a society of remarkable cultural fluidity and synthesis."
 nd_mex_silver_peso: "Silver Peso"
 nd_mex_silver_peso_desc: "The Mexican peso de ocho — the piece of eight — becomes the world's first global currency, accepted from Canton to Constantinople."
 nd_mex_manila_galleon_trade: "Manila Galleon Trade"
 nd_mex_manila_galleon_trade_desc: "The nao de China connects Acapulco to Manila, carrying Mexican silver to Asia and returning with silk, spices, and porcelain in the world's first transpacific trade route."
 nd_mex_presidio_line: "Presidio Line"
 nd_mex_presidio_line_desc: "A chain of fortified garrisons stretches across the northern frontier, defending settled territory against Comanche, Apache, and other indigenous raiders."
 nd_mex_soldados_de_cuera: "Soldados de Cuera"
 nd_mex_soldados_de_cuera_desc: "The leather-armored dragoons of the frontier presidios are a uniquely Mexican military tradition — cavalry armed with lance, shield, and musket, adapted to the harsh conditions of the northern borderlands."
 nd_mex_baroque_identity: "Mexican Baroque"
 nd_mex_baroque_identity_desc: "The ultra-ornate Churrigueresque style blends Spanish Baroque with indigenous artistic traditions, creating cathedrals and public buildings that embody the mestizo soul of Mexico."
 nd_mex_bourbon_reforms: "Bourbon Reforms"
 nd_mex_bourbon_reforms_desc: "The Bourbon dynasty's sweeping administrative reforms — the intendancy system, trade liberalization, military professionalization — modernize New Spain but sow the seeds of creole discontent."
 nd_mex_mining_boom: "Mining Boom"
 nd_mex_mining_boom_desc: "Industrial-scale silver extraction from the great mines of Guanajuato and Zacatecas generates wealth that flows across the globe, making New Spain the richest colony in the Americas."
 nd_mex_criollo_consciousness: "Criollo Consciousness"
 nd_mex_criollo_consciousness_desc: "Mexican-born Spaniards develop a distinct identity, pride in their American homeland, and resentment of peninsular privilege — the intellectual foundation of the independence movement."
 nd_mex_independence_movement: "Independence Movement"
 nd_mex_independence_movement_desc: "From Hidalgo's Grito to Morelos's Congress of Chilpancingo to Guerrero's guerrilla campaigns, the independence movement forges a new national identity through a decade of revolutionary warfare."
 nd_mex_guerrilla_tradition: "Guerrilla Tradition"
 nd_mex_guerrilla_tradition_desc: "The insurgent guerrilleros — mestizo and indigenous fighters who waged irregular warfare against royalist forces — establish a Mexican military tradition of popular resistance that endures for generations."
 nd_mex_plan_de_iguala: "Plan de Iguala"
 nd_mex_plan_de_iguala_desc: "The Plan of the Three Guarantees unites insurgent republicans and royalist conservatives, creating a broad coalition that achieves independence through negotiation rather than conquest."
 nd_mex_constitution_1824: "Constitution of 1824"
 nd_mex_constitution_1824_desc: "Mexico's first republican constitution establishes a federal system modeled partly on the United States, with elected representatives, separation of powers, and sovereignty residing in the nation."
 nd_mex_pulque_industry: "Pulque Industry"
 nd_mex_pulque_industry_desc: "The commercial cultivation of maguey and industrial production of pulque transforms an ancient sacred beverage into one of Mexico's most important domestic industries."
 nd_mex_la_reforma: "La Reforma"
 nd_mex_la_reforma_desc: "Benito Juarez's Reform Laws abolish clerical and military privileges, nationalize church property, and establish the separation of church and state — the most radical transformation of Mexican society since independence."
 nd_mex_rurales_corps: "Rurales Corps"
 nd_mex_rurales_corps_desc: "The Corps of Rurales — mounted rural police in silver-adorned uniforms — patrol the countryside as a gendarmerie force, maintaining order across Mexico's vast rural territories."
 nd_mex_mestizo_nation: "Mestizo Nation"
 nd_mex_mestizo_nation_desc: "Mexico embraces mestizaje — the blending of indigenous, European, and African heritage — as the defining principle of national identity, creating a society that transcends the racial categories of the colonial era."
 nd_mex_nationalization: "Nationalization"
 nd_mex_nationalization_desc: "The seizure and redistribution of church lands and the assertion of state sovereignty over ecclesiastical property create a more secular, centralized state with expanded tax revenues."
 nd_mex_industrialization: "Mexican Industrialization"
 nd_mex_industrialization_desc: "Railroad construction, textile manufacturing, and mining modernization begin to transform Mexico from an agricultural economy into an industrial one."
 nd_mex_veracruz_trade: "Veracruz Trade"
 nd_mex_veracruz_trade_desc: "The port of Veracruz, Mexico's gateway to the Atlantic and the Caribbean, becomes the hub of an expanding maritime commerce linking Mexican exports to global markets."
 nd_mex_federalist_republic: "Federalist Republic"
 nd_mex_federalist_republic_desc: "The federal system grants autonomy to Mexico's diverse states and regions, balancing central authority with local governance in a vast and heterogeneous nation."
 a_nd_mex_soldados_de_cuera: "Soldados de Cuera"
 a_nd_mex_soldados_de_cuera_desc: "Leather-armored frontier dragoons armed with lance, shield, and musket. Born and raised on the northern frontier, these presidial cavalry are hardened by decades of warfare against Comanche and Apache raiders."
 a_nd_mex_guerrilleros: "Insurgent Guerrilleros"
 a_nd_mex_guerrilleros_desc: "Irregular fighters of the independence movement — mestizo peasants, mine workers, and indigenous warriors who wage guerrilla warfare in the mountains and barrancas of central Mexico."
 a_nd_mex_rurales: "Rurales"
 a_nd_mex_rurales_desc: "The Corps of Rurales — mounted rural gendarmerie in distinctive silver-trimmed uniforms. Fast-moving light cavalry who patrol the countryside, suppress banditry, and enforce the law in Mexico's vast rural territories."
 n_nd_mex_manila_galleon: "Manila Galleon"
 n_nd_mex_manila_galleon_desc: "The nao de China — massive treasure ships that sail the Acapulco-Manila route, carrying Mexican silver westward and returning laden with Asian silk, spices, and porcelain. The largest and richest trade ships in the Pacific."
 nd_mex_casa_de_moneda: "Casa de Moneda"
 nd_mex_casa_de_moneda_desc: "The Royal Mint strikes Mexican silver into pesos de ocho — the piece of eight — which circulate as the world's first global currency from the markets of Canton to the counting houses of Amsterdam."
 nd_mex_hacienda_grande: "Hacienda Grande"
 nd_mex_hacienda_grande_desc: "A great agricultural estate combining farming, ranching, and rural industry. The hacienda dominates the Mexican countryside, providing food and raw materials while employing hundreds of workers bound by debt peonage."
 nd_mex_presidio: "Presidio Fronterizo"
 nd_mex_presidio_desc: "A fortified frontier garrison manned by professional soldiers. The presidio defends settled territory against indigenous raiders and serves as the nucleus of civilization on the northern frontier."
 nd_mex_cochineal_obraje: "Cochineal Obraje"
 nd_mex_cochineal_obraje_desc: "A workshop for processing cochineal dye from the nopal cactus insect into the world's most expensive pigment, prized for coloring the robes of European monarchs and Catholic cardinals."
 nd_mex_colegio_real: "Colegio Real"
 nd_mex_colegio_real_desc: "A royal college where both Spanish and indigenous elites are educated in theology, law, and the liberal arts, creating a distinctively Mexican intellectual tradition."
 nd_mex_baroque_cathedral: "Baroque Cathedral"
 nd_mex_baroque_cathedral_desc: "A magnificent Churrigueresque cathedral in the ultra-ornate Mexican Baroque style, blending Spanish ecclesiastical architecture with indigenous artistic motifs in a dazzling expression of mestizo cultural identity."
 nd_mex_mint_operations: "Mint Operations"
 nd_mex_mint_operations_desc: "Master silversmiths strike refined silver into exquisite coinage and precious metalwork, producing the pesos de ocho that circulate across the globe."
 nd_mex_hacienda_labor: "Hacienda Labor"
 nd_mex_hacienda_labor_desc: "The hacienda sustains its workforce through livestock ranching, grain farming, and the tools needed to work the land."
 nd_mex_presidio_garrison: "Presidio Garrison"
 nd_mex_presidio_garrison_desc: "The frontier garrison requires a steady supply of weapons, horses, firearms, and leather equipment to maintain its defensive capabilities."
 nd_mex_cochineal_processing: "Cochineal Processing"
 nd_mex_cochineal_processing_desc: "Workers harvest cochineal insects from nopal cactus fields, then carefully dry and grind them into carmine — the world's most valuable dye."
 nd_mex_seminary_upkeep: "Seminary Upkeep"
 nd_mex_seminary_upkeep_desc: "The college requires paper and books for instruction, cloth for furnishings and vestments, and beeswax candles for study and ceremony."
 nd_mex_cathedral_upkeep: "Cathedral Upkeep"
 nd_mex_cathedral_upkeep_desc: "Maintaining the elaborate stone facades, stained glass windows, and gilded interiors of a Baroque cathedral demands constant investment in stone, glass, cloth for vestments, and beeswax candles."
 nd_mex_mercury_amalgamation: "Mercury Amalgamation"
 nd_mex_mercury_amalgamation_desc: "The patio process spreads mercury over crushed ore in vast courtyards, extracting silver from rock that was previously too poor to work."
 nd_mex_pulque_fermentation: "Pulque Fermentation"
 nd_mex_pulque_fermentation_desc: "Maguey fields yield aguamiel that is fermented into pulque — the ancient sacred drink of the Aztecs, now produced commercially for Mexico's growing population."
 levy_nd_mex_guerrilleros: "Insurgent Guerrilleros"
 levy_nd_mex_guerrilleros_desc: "Irregular fighters drawn from the common people to wage guerrilla warfare in defense of the nation."
 nd_mex_industrial_refining: "Industrial Silver Refining"
 nd_mex_industrial_refining_desc: "Haciendas de beneficio refine massive quantities of silver ore using mercury amalgamation at industrial scale, supplying the mints that produce the world's currency."
 n_nd_mex_guardacostas: "Corsario Guardacostas"
 n_nd_mex_guardacostas_desc: "Fast coastal patrol frigates that guard Mexico's extensive Gulf and Pacific coastlines against pirates, smugglers, and foreign encroachment."
 nd_mex_formed_tt: "Mexico has been formed"
 nd_mex_path_a_tt: "Chose the #bold Three Guarantees#! destiny"
 nd_mex_path_b_tt: "Chose the #bold Cry of Dolores#! destiny"
 nd_mex_destiny: "Mexican Destiny"
 nd_mex_destiny_desc: "Mexico has been forged from the fires of revolution and the weight of colonial inheritance. Now it must choose its path: empire or republic, conquest or commerce, the sword or the silver peso."
 nd_mex_dest_northern_march: "Northern March"
 nd_mex_dest_northern_march_desc: "Push the frontier into the vast lands of Aridoamerica. Secure Culiacan and the northern silver country, and establish military dominance over the untamed frontier territories."
 nd_mex_dest_empire_of_anahuac: "Empire of Anahuac"
 nd_mex_dest_empire_of_anahuac_desc: "Extend Mexican authority into the Sonoran desert and across the Rio Grande. Professionalize the army and establish garrisons that project imperial power to the edges of the continent."
 nd_mex_dest_continental_destiny: "Continental Destiny"
 nd_mex_dest_continental_destiny_desc: "The Mexican Empire stretches from California to Guatemala, from the Gulf to the Pacific. A continental power rivaling any in the Old World, secured by the greatest army in the Americas."
 nd_mex_dest_silver_republic: "Silver Republic"
 nd_mex_dest_silver_republic_desc: "Build the republic on the bedrock of silver. Develop the mines, expand the markets, and let Mexican pesos become the currency of the Americas."
 nd_mex_dest_liberal_republic: "Liberal Republic"
 nd_mex_dest_liberal_republic_desc: "Channel the wealth of cocoa and silver into banking institutions and trade networks that serve the people. Modernize the economy through financial reform and open markets."
 nd_mex_dest_arsenal_of_democracy: "Arsenal of Democracy"
 nd_mex_dest_arsenal_of_democracy_desc: "Transform Mexico from an exporter of raw materials into an industrial republic. Embrace science, build schools, and prove that a republic can rival any monarchy in prosperity and progress."
 nd_mex.6.t: "A Nation Takes Shape"
 nd_mex.6.d: "The foundations of the new Mexico are laid. From the silver mines of the Bajio to the cocoa groves of the Gulf coast, from the ancient pyramids of Teotihuacan to the bustling markets of Oaxaca, this land holds the potential for greatness. The question is not whether Mexico will rise, but what form that rise will take."
 nd_mex.6.a: "Mexico's destiny awaits."
 nd_mex.7.t: "The Northern March"
 nd_mex.7.d: "Mexican soldiers march north beyond the old presidio line, pushing into the vast silver country that the Chichimeca nations have long defended. Culiacan and the northern frontier are now under the Mexican eagle. With these territories secured, the treasury swells and the army grows stronger."
 nd_mex.7.a: "The frontier advances under the eagle and serpent."
 nd_mex.8.t: "Empire of Anahuac"
 nd_mex.8.d: "The Mexican Empire now stretches from the Sonoran desert to the banks of the Rio Grande. The question is how to govern this expanded domain. Some generals counsel an iron hand -- swift military campaigns to crush any resistance and enforce central authority. Others look to the model of Iturbide's Plan de Iguala: a grand court that binds provincial elites through diplomacy, honors, and shared governance."
 nd_mex.8.a: "Rule with discipline -- the empire needs an iron hand."
 nd_mex.8.b: "Win hearts at court -- loyalty freely given outlasts."
 nd_mex.9.t: "Continental Destiny"
 nd_mex.9.d: "From the deserts of California to the jungles of Guatemala, the Mexican Empire has become the dominant power of the Western Hemisphere. This is the vision fulfilled -- a great American empire that stands as the equal of any European power. The army that secured this territory must now be organized to defend it."
 nd_mex.9.a: "Build the greatest army in the Americas."
 nd_mex.9.b: "Let diplomacy cement what the sword has won."
 nd_mex.10.t: "The Silver Foundation"
 nd_mex.10.d: "The republic has chosen a different path from the empire-builders. Rather than marshaling armies for conquest, Mexico turns inward to the wealth beneath its soil. The silver mines of Guanajuato, Zacatecas, and Taxco are the foundation of a prosperous republic."
 nd_mex.10.a: "The peso shall be the foundation of the republic."
 nd_mex.11.t: "The Liberal Republic"
 nd_mex.11.d: "The financial institutions of the young republic are maturing. Banks handle the flow of silver, cocoa merchants negotiate prices on the global market, and trade networks reach from the Gulf to the Pacific. Two visions emerge for Mexico's economic future."
 nd_mex.11.a: "The silver peso shall become the standard."
 nd_mex.11.b: "Build markets that serve the people, not the few."
 nd_mex.12.t: "Arsenal of Democracy"
 nd_mex.12.d: "Mexico stands at the threshold of a new age. The scientific revolution has reached the Americas, and the republic has the silver, the labor, and the institutions to industrialize. Schools rise across the nation, and a new generation of Mexican scientists and engineers prepares to transform raw materials into finished goods."
 nd_mex.12.a: "Build the schools -- education is the future."
 nd_mex.12.b: "An enlightened republic needs no empire."
 STATIC_MODIFIER_NAME_nd_mex_dest_iron_hand: "Iron Hand"
 STATIC_MODIFIER_DESC_nd_mex_dest_iron_hand: "Military discipline and swift campaigns enforce Mexican authority across the frontier. The army moves fast and strikes hard, though the constant warfare takes its toll on the nation."
 STATIC_MODIFIER_NAME_nd_mex_dest_imperial_court: "Imperial Court"
 STATIC_MODIFIER_DESC_nd_mex_dest_imperial_court: "The Mexican court, modeled on European monarchies, binds provincial elites through diplomacy, titles, and shared governance. A court of many nations, united under the eagle."
 STATIC_MODIFIER_NAME_nd_mex_dest_continental_army: "Continental Army"
 STATIC_MODIFIER_DESC_nd_mex_dest_continental_army: "A massive standing army organized along modern lines, capable of sustaining operations across the entire Western Hemisphere."
 STATIC_MODIFIER_NAME_nd_mex_dest_american_dynasty: "American Dynasty"
 STATIC_MODIFIER_DESC_nd_mex_dest_american_dynasty: "The Mexican Empire commands respect through diplomatic prestige and dynastic connections, extending its influence across the hemisphere."
 STATIC_MODIFIER_NAME_nd_mex_dest_silver_standard: "Silver Standard"
 STATIC_MODIFIER_DESC_nd_mex_dest_silver_standard: "The Mexican silver peso becomes the trusted standard of hemispheric trade, funding a growing merchant marine and naval tradition."
 STATIC_MODIFIER_NAME_nd_mex_dest_peoples_market: "People's Market"
 STATIC_MODIFIER_DESC_nd_mex_dest_peoples_market: "Cooperative banks and open markets channel the silver wealth to the common citizen. The army's maintenance suffers as resources flow to civil institutions."
 STATIC_MODIFIER_NAME_nd_mex_dest_industrial_dawn: "Industrial Dawn"
 STATIC_MODIFIER_DESC_nd_mex_dest_industrial_dawn: "Mexican factories produce goods for export across the Pacific and beyond. A new class of industrialists projects Mexican commercial power to distant shores."
 STATIC_MODIFIER_NAME_nd_mex_dest_enlightened_republic: "Enlightened Republic"
 STATIC_MODIFIER_DESC_nd_mex_dest_enlightened_republic: "Mexico leads by example -- an enlightened republic whose naval strength and diplomatic skill earn respect worldwide."
 nd_mex_palacio_imperial: "Palacio Imperial"
 nd_mex_palacio_imperial_desc: "The seat of the Mexican Emperor, a grand palace befitting a continental power. From here, the empire is administered and the destiny of the Americas is shaped."
 nd_mex_imperial_court: "Imperial Court Maintenance"
 nd_mex_imperial_court_desc: "The imperial palace requires fine cloth for ceremonial furnishings, paper for the imperial bureaucracy, furniture for the grand halls, and tools for constant renovation."
 nd_mex_escuela_nacional: "Escuela Nacional"
 nd_mex_escuela_nacional_desc: "A national preparatory school that transforms Mexican youth into informed citizens, embodying the republic's commitment to universal education and scientific progress."
 nd_mex_school_supplies: "School Supplies"
 nd_mex_school_supplies_desc: "The national school requires paper and books for instruction, and cloth for uniforms and furnishings."
