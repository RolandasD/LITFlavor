l_english:
 STATIC_MODIFIER_NAME_nd_ita_patria_unita: "Patria Unita"
 STATIC_MODIFIER_DESC_nd_ita_patria_unita: "Italy has been forged into a single nation-state under centralized rule. The dream of Mazzini and Garibaldi has become reality — one people, one government, one destiny."
 STATIC_MODIFIER_NAME_nd_ita_repubblica_delle_citta: "Repubblica delle Città"
 STATIC_MODIFIER_DESC_nd_ita_repubblica_delle_citta: "Italy has embraced its heritage as a constellation of great cities — Venice, Florence, Milan, Naples — each contributing its genius to a federated republic that prizes liberty, commerce, and learning above all."
 STATIC_MODIFIER_NAME_nd_ita_arsenale_naval_supremacy: "Arsenale Naval Supremacy"
 STATIC_MODIFIER_DESC_nd_ita_arsenale_naval_supremacy: "The great arsenals of Italy produce war galleys at a pace unmatched in the Mediterranean, and our captains know how to use them."
 STATIC_MODIFIER_NAME_nd_ita_arsenale_merchant_fleet: "Arsenale Merchant Fleet"
 STATIC_MODIFIER_DESC_nd_ita_arsenale_merchant_fleet: "The Italian shipbuilding tradition has been turned toward commerce, producing a merchant fleet that carries goods from the Levant to Flanders."
 STATIC_MODIFIER_NAME_nd_ita_irredenta_march: "Italia Irredenta March"
 STATIC_MODIFIER_DESC_nd_ita_irredenta_march: "The fires of national awakening burn across the peninsula. Volunteers flock to the banner of a united Italy, marching to reclaim every inch of Italian-speaking territory."
 STATIC_MODIFIER_NAME_nd_ita_nation_building: "Nation Building"
 STATIC_MODIFIER_DESC_nd_ita_nation_building: "The dream of Italian nationhood has been won on the battlefield; now it must be cemented through schools, railways, and institutions that bind the peninsula into a true nation."
 nd_ita.1.t: "The Birth of Italy"
 nd_ita.1.d: "At last, the Italian peninsula stands united under a single banner. For centuries, the land of Dante, Machiavelli, and da Vinci was fractured among warring city-states, foreign overlords, and papal territories. Now that fragmentation is ended.\n\nBut unity raises a fundamental question: what kind of Italy shall this be? The peninsula's traditions pull in two directions. One path leads toward a centralized kingdom — a modern nation-state with uniform laws, a national army, and a single capital, modeled on the great powers of Europe. The other path honors the Italian genius for civic self-governance — the commune tradition that created Florence, Venice, and Genoa, each a republic of unprecedented wealth and culture.\n\nThe choice will shape Italy's destiny for generations.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ita.1.a: "One nation, indivisible — forge the Kingdom of Italy."
 nd_ita.1.b: "A republic of great cities — let each contribute its genius."
 nd_ita.2.t: "The Arsenal of the Republic"
 nd_ita.2.d: "The great arsenals of Italy have reached an apex of productivity. In Venice, the Arsenale — stretching across forty-five hectares of the city's eastern shore — can outfit a complete war galley in a single day, an industrial feat unmatched anywhere in Europe. Sixteen thousand arsenalotti labor within its walls, organized into specialized guilds of sawyers, caulkers, oar-makers, and rope-spinners.\n\nThis tradition of industrial shipbuilding has spread to other Italian ports. Genoa, Naples, and Livorno have all established their own arsenals, each learning from the Venetian model. The question now is how to deploy this maritime capability."
 nd_ita.2.a: "Expand the fleet — the Mediterranean is our sea."
 nd_ita.2.b: "Invest in merchant shipping — commerce is our strength."
 nd_ita.3.t: "The Bankers of Florence"
 nd_ita.3.d: "In the counting houses of Florence, a revolution in finance has transformed the way Europe does business. The great banking families — the Medici, the Bardi, the Peruzzi, the Strozzi — have invented instruments of credit that make it possible to move wealth across vast distances without ever touching a gold coin.\n\nBills of exchange, letters of credit, and the sistema di partita doppia — double-entry bookkeeping — allow Italian bankers to track every transaction with mathematical precision. Their branch networks stretch from London to Constantinople, and the florin has become the currency of international trade. Kings and popes alike depend on Italian credit to finance their ambitions."
 nd_ita.3.a: "The wealth of nations flows through our banks."
 nd_ita.4.t: "The Risorgimento"
 nd_ita.4.d: "A great awakening sweeps across the Italian peninsula. In secret lodges and public squares, in pamphlets and poetry, the dream of Italian nationhood has caught fire. Giuseppe Mazzini's 'Young Italy' movement has planted the seed; now it bears fruit in the form of a mass political movement that transcends the old boundaries of kingdom and duchy.\n\nThe Carbonari conspirators, the volunteers of Garibaldi's Red Shirts, the diplomatic cunning of Cavour — all have converged toward a single purpose. The foreign yoke is thrown off, the petty principalities dissolved. Italy, the land that gave the world the Renaissance and Roman law, now reclaims its place among the great nations.\n\nThis is a moment that demands a vision for the future."
 nd_ita.4.a: "March on! Italia irredenta must be reclaimed."
 nd_ita.4.b: "Build the nation — schools, railways, and institutions."
 nd_ita.5.t: "The Galleass at War"
 nd_ita.5.d: "Italian naval engineers have perfected the galleass — a revolutionary warship that combines the maneuverability of the galley with the firepower of a sailing warship. These floating fortresses, mounting heavy guns on a continuous deck above the rowers, can deliver devastating broadsides while maintaining the ability to operate in the shallow, wind-fickle waters of the Mediterranean.\n\nAt the great Battle of Lepanto in 1571, six Venetian galleasses anchored the Christian line, their concentrated artillery fire shattering the Ottoman formation before the fleets even closed to boarding range. The galleass has proven that firepower, not just ramming and boarding, can decide a naval engagement."
 nd_ita.5.a: "Our ships are the walls of Italy."
 nd_ita_communal_governance: "Communal Governance"
 nd_ita_communal_governance_desc: "The Italian commune — a self-governing urban republic — is one of the most distinctive political innovations of the medieval world. Cities like Florence, Siena, and Lucca developed sophisticated systems of elected councils, written constitutions, and civic magistrates."
 nd_ita_maritime_republics: "Maritime Republics"
 nd_ita_maritime_republics_desc: "Venice, Genoa, Pisa, and Amalfi — the four maritime republics whose merchant fleets and war galleys dominated Mediterranean trade for centuries, establishing trading posts and colonies from the Black Sea to the Atlantic."
 nd_ita_guelf_ghibelline: "Guelf and Ghibelline"
 nd_ita_guelf_ghibelline_desc: "The great factional struggle between papal Guelfs and imperial Ghibellines shaped Italian politics for two centuries, forging a tradition of fierce civic loyalty and political sophistication born from constant negotiation between competing powers."
 nd_ita_florentine_banking: "Florentine Banking"
 nd_ita_florentine_banking_desc: "The great banking houses of Florence — the Medici, Bardi, and Peruzzi — invented modern finance: bills of exchange, double-entry bookkeeping, and international branch networks that moved capital across Europe."
 nd_ita_silk_trade: "Italian Silk Trade"
 nd_ita_silk_trade_desc: "The silk workshops of Lucca, Florence, and Venice produced fabrics of legendary quality, combining raw silk imported from the East with Italian dyeing and weaving techniques to create the most sought-after textiles in Europe."
 nd_ita_condottiero_tradition: "Condottiero Tradition"
 nd_ita_condottiero_tradition_desc: "The condottieri — professional mercenary captains and their companies — transformed Italian warfare into a sophisticated art. Leaders like Sforza, Colleoni, and Hawkwood commanded armies of armored lancers and crossbowmen under contract to the highest-bidding city-state."
 nd_ita_venetian_shipcraft: "Venetian Shipcraft"
 nd_ita_venetian_shipcraft_desc: "The Arsenale of Venice was the largest industrial complex in the pre-industrial world, capable of producing a fully equipped warship in a single day. Its assembly-line methods anticipated the Industrial Revolution by four centuries."
 nd_ita_humanist_learning: "Humanist Learning"
 nd_ita_humanist_learning_desc: "The studia humanitatis — the study of classical Latin and Greek texts, rhetoric, history, and moral philosophy — began in Italy with Petrarch and Boccaccio, creating an intellectual movement that reshaped European civilization."
 nd_ita_galleass_warfare: "Galleass Warfare"
 nd_ita_galleass_warfare_desc: "The galleass, developed in the Venetian Arsenal, was a revolutionary warship mounting heavy broadside artillery above banks of oars. At the Battle of Lepanto in 1571, six Venetian galleasses shattered the Ottoman fleet formation before the fleets even closed."
 nd_ita_murano_glasscraft: "Murano Glasscraft"
 nd_ita_murano_glasscraft_desc: "The glassmakers of Murano, sequestered on their island to protect trade secrets, developed techniques of unmatched sophistication — cristallo glass, millefiori, lattimo — that made Venetian glass the most prized luxury good in Europe."
 nd_ita_commedia_dell_arte: "Commedia dell'Arte"
 nd_ita_commedia_dell_arte_desc: "The Italian theatrical tradition of improvised comedy, with its stock characters — Arlecchino, Colombina, Pantalone, the Dottore — swept across Europe, establishing Italian performers as the continent's most celebrated entertainers."
 nd_ita_palazzo_civic_tradition: "Palazzo Civic Tradition"
 nd_ita_palazzo_civic_tradition_desc: "The palazzo pubblico — the civic palace — was the architectural expression of Italian communal government. From the Palazzo Vecchio in Florence to the Doge's Palace in Venice, these buildings housed councils, courts, and archives that administered the most sophisticated urban governments in Europe."
 nd_ita_counter_reformation: "Counter-Reformation"
 nd_ita_counter_reformation_desc: "Italy stood at the heart of the Catholic Counter-Reformation. The Council of Trent (1545-1563), the founding of the Jesuits, and the Roman Inquisition all emanated from Italian soil, reasserting Catholic orthodoxy and launching a campaign of spiritual renewal."
 nd_ita_accademia_tradition: "Accademia Tradition"
 nd_ita_accademia_tradition_desc: "Italy pioneered the modern academy: the Accademia della Crusca standardized the Italian language, the Accademia dei Lincei advanced natural science (counting Galileo among its members), and countless artistic academies trained Europe's finest painters and sculptors."
 nd_ita_grand_tour: "The Grand Tour"
 nd_ita_grand_tour_desc: "By the 18th century, no European gentleman's education was complete without a Grand Tour of Italy. The ruins of Rome, the art of Florence, the music of Naples, and the canals of Venice drew thousands of wealthy travelers, making Italy the cultural capital of the civilized world."
 nd_ita_enlightened_reforms: "Enlightened Reforms"
 nd_ita_enlightened_reforms_desc: "Italian Enlightenment thinkers — Cesare Beccaria's 'On Crimes and Punishments,' Gaetano Filangieri's 'Science of Legislation' — reshaped European thinking about justice, governance, and the rights of the individual. Their ideas influenced reformers from Catherine the Great to Thomas Jefferson."
 nd_ita_risorgimento: "Risorgimento"
 nd_ita_risorgimento_desc: "The great movement for Italian national unification — driven by Mazzini's idealism, Garibaldi's military genius, and Cavour's diplomatic cunning — transformed a 'geographical expression' into a nation-state. The Bersaglieri, elite light infantry with their distinctive plumed hats, became its symbol."
 nd_ita_carbonari_networks: "Carbonari Networks"
 nd_ita_carbonari_networks_desc: "The Carbonari — 'charcoal burners' — were Italy's most influential secret revolutionary society. Operating through coded rituals and clandestine cells across the peninsula, they organized uprisings against foreign rule and planted the seeds of Italian nationalism."
 nd_ita_industrial_awakening: "Industrial Awakening"
 nd_ita_industrial_awakening_desc: "Piedmont and Lombardy led Italy's industrial transformation: Cavour's railway-building program, the Ansaldo steelworks of Genoa, and the textile mills of the Po Valley brought modern industry to a land long defined by agriculture and artisanship."
 nd_ita_national_education: "National Education"
 nd_ita_national_education_desc: "The Casati Law of 1859 and the subsequent educational reforms created a unified Italian school system, combating the peninsula's extreme regional illiteracy and building a shared national identity through the teaching of standard Italian."
 nd_ita_irredentism: "Italia Irredenta"
 nd_ita_irredentism_desc: "The doctrine of Italia Irredenta — 'unredeemed Italy' — demanded the incorporation of all Italian-speaking territories, particularly Trentino, Trieste, Istria, and Dalmatia, into the Italian state, driving diplomatic ambition and military planning."
 a_nd_ita_condottiero_lances: "Condottiero Lances"
 a_nd_ita_condottiero_lances_desc: "Heavy cavalry in the condottiero tradition, these armored lancers serve under contract and are renowned for their devastating charges and tactical flexibility."
 a_nd_ita_condottiero_lances_levy: "Condottiero Lances"
 a_nd_ita_condottiero_lances_levy_desc: "Levy cavalry raised in the Italian condottiero tradition — armored horsemen drawing on centuries of mercenary warfare expertise."
 n_nd_ita_galleass: "Galleass"
 n_nd_ita_galleass_desc: "A massive warship combining oar-power with broadside artillery. Developed in Venice, the galleass mounts heavy cannons on a continuous gun deck above the rowers, delivering devastating firepower while retaining maneuverability in Mediterranean waters."
 a_nd_ita_bersaglieri: "Bersaglieri"
 a_nd_ita_bersaglieri_desc: "Elite light infantry of the Risorgimento era, renowned for their speed, marksmanship, and aggressive tactics. Identified by their distinctive wide-brimmed hats adorned with capercaillie feathers."
 nd_ita_banco: "Banco"
 nd_ita_banco_desc: "An Italian banking house in the Florentine tradition, facilitating international trade through bills of exchange, letters of credit, and branch networks stretching across Europe."
 nd_ita_setificio: "Setificio"
 nd_ita_setificio_desc: "An Italian silk workshop where master weavers transform raw silk and dyes into fine cloth of extraordinary quality, continuing the traditions perfected in Lucca, Florence, and Venice."
 nd_ita_arsenale: "Arsenale"
 nd_ita_arsenale_desc: "A great shipyard complex modeled on the Venetian Arsenal, where thousands of specialized craftsmen produce warships and merchant vessels with an efficiency unmatched in the world."
 nd_ita_palazzo_comunale: "Palazzo Comunale"
 nd_ita_palazzo_comunale_desc: "A civic palace housing the organs of communal government — elected councils, law courts, and administrative archives — embodying the Italian tradition of urban self-governance."
 nd_ita_accademia: "Accademia"
 nd_ita_accademia_desc: "An academy of arts and sciences in the Italian tradition, where scholars, artists, and natural philosophers advance human knowledge and refine the Italian language and culture."
 nd_ita_vetreria: "Vetreria"
 nd_ita_vetreria_desc: "A Murano-style glassworks where master craftsmen produce cristallo, millefiori, and lattimo glass using closely guarded Venetian techniques."
 nd_ita_manifattura: "Manifattura"
 nd_ita_manifattura_desc: "An Italian industrial manufactory producing steel and finished goods, representing the industrial transformation that accompanied national unification."
 nd_ita_carbonari_lodge: "Carbonari Lodge"
 nd_ita_carbonari_lodge_desc: "A clandestine meeting place of the Carbonari revolutionary society, where patriots gather to plot against foreign domination and advance the cause of Italian nationhood."
 nd_ita_silk_weaving: "Italian Silk Weaving"
 nd_ita_silk_weaving_desc: "The renowned Italian technique of weaving raw silk and dyes into fine cloth of extraordinary quality, perfected in the workshops of Florence, Lucca, and Venice."
 nd_ita_banking_operations: "Banking Operations"
 nd_ita_banking_operations_desc: "The administrative apparatus of an Italian banking house: clerks maintaining ledgers in double-entry bookkeeping, handling bills of exchange, and managing international correspondence in fine cloth-bound records."
 nd_ita_arsenale_maintenance: "Arsenal Maintenance"
 nd_ita_arsenale_maintenance_desc: "The constant supply of timber, tar, tools, and naval stores required to keep a great shipyard complex operational and building warships."
 nd_ita_venetian_glassmaking: "Venetian Glassmaking"
 nd_ita_venetian_glassmaking_desc: "The secret art of Murano glassmaking, producing cristallo, millefiori, and other exquisite glass products using techniques closely guarded by Venetian authorities."
 nd_ita_palazzo_upkeep: "Palazzo Upkeep"
 nd_ita_palazzo_upkeep_desc: "The stone, administrative papers, and fine cloth furnishings required to maintain a palazzo comunale and its bureaucratic functions in suitable civic dignity."
 nd_ita_accademia_upkeep: "Academic Upkeep"
 nd_ita_accademia_upkeep_desc: "The books, paper, and glass scientific instruments needed to sustain an academy's research — from Galileo's telescopes to the chemist's apparatus."
 nd_ita_steel_forging: "Italian Steel Forging"
 nd_ita_steel_forging_desc: "Modern steelmaking using Italian methods, combining Lombard ironworking traditions with industrial techniques to produce high-quality steel for construction and armaments."
 nd_ita_carbonari_upkeep: "Carbonari Upkeep"
 nd_ita_carbonari_upkeep_desc: "The pamphlets, manifestos, and wine that sustain a network of revolutionary cells — patriots meet in taverns, debating liberation over books of political philosophy."
 levy_nd_ita_condottiero_lances: "Condottiero Levy Lances"
 levy_nd_ita_condottiero_lances_desc: "Levy cavalry raised in the Italian condottiero tradition."
 nd_ita_formed_tt: "Italy has been formed"
 nd_ita_path_a_tt: "Chose the #bold Patria Unita#! destiny"
 nd_ita_path_b_tt: "Chose the #bold Repubblica delle Citta#! destiny"
 nd_ita_destiny: "The Italian Destiny"
 nd_ita_destiny_desc: "Italy stands united — but unity is merely the beginning. The peninsula that gave the world Rome, the Renaissance, and the foundations of modern civilization must now choose its future among the great powers. Stabilize the new nation and chart your course."
 nd_ita.6.t: "The Italian Destiny"
 nd_ita.6.d: "The dream of Italian unity has been achieved. From the Alps to Sicily, from the Ligurian coast to the Adriatic shore, the peninsula is one. But the great question remains: what shall Italy become?\n\nThe foundations are laid. Now we must build upon them — with purpose, with ambition, and with the knowledge that we are the heirs of Rome and the Renaissance both. The future of the Mediterranean, perhaps of Europe itself, turns upon the choices we make in this decisive hour."
 nd_ita.6.a: "Italy's destiny begins now."
 nd_ita.7.t: "The Unredeemed Lands"
 nd_ita.7.d: "The tricolore flies over Trieste and Trento at last. For decades, Italian patriots spoke of the terre irredente — the unredeemed lands where Italian was spoken but foreign flags flew. Now they are Italian.\n\nThe army that accomplished this feat has been tempered in the crucible of irredentist warfare. Our soldiers know what it means to fight for national honor, and the general staff has proven its capacity for combined-arms operations against a European great power. Italy has announced its arrival on the stage of history."
 nd_ita.7.a: "Every inch of Italian soil is ours."
 nd_ita.8.t: "The Fourth Shore"
 nd_ita.8.d: "Italian boots tread the sands of North Africa. Tunisia and Tripolitania — lands that once formed the breadbasket of the Roman Empire — now fall under the Italian flag. The Mediterranean is no longer a barrier but a bridge, connecting the mother country to its new African provinces.\n\nBut an overseas empire demands choices. Some argue for rapid military buildup — conscripting colonial regiments, establishing garrisons, and preparing for the next war of expansion. Others see the value of naval dominance — controlling the sea lanes that connect Italy to its new possessions, and projecting power through the fleet rather than the barracks."
 nd_ita.8.a: "Raise the legions — Africa needs soldiers."
 nd_ita.8.b: "Command the sea — the fleet is our strength."
 nd_ita.9.t: "Mare Nostrum"
 nd_ita.9.d: "Mare Nostrum — Our Sea. The words of the ancient Romans ring true once more. From Malta to the shores of Egypt, from Thessaloniki to the coasts of Libya, the Italian flag commands respect across the breadth of the Mediterranean.\n\nThis is not merely an empire of territory but an empire of influence, of trade routes and chokepoints, of cultural prestige and military power. Italy has achieved what no Italian state has accomplished since the fall of Rome: dominion over the inner sea.\n\nThe question now is how to wield this power. Some urge a new Roman imperium — centralized authority, mass levies, and the diplomatic weight of a true great power. Others advocate a fortress strategy — making Italy's Mediterranean positions impregnable through the trace italienne fortifications that Italian engineers pioneered."
 nd_ita.9.a: "Restore the Roman imperium."
 nd_ita.9.b: "Fortify every position — Italy is impregnable."
 nd_ita.10.t: "The Stato da Mar"
 nd_ita.10.d: "The Lion of Saint Mark once flew over the trading posts of the Adriatic and the fortresses of the Ionian shore. Now Italy inherits that legacy — not as a single maritime republic but as a confederation of great cities, each contributing its genius to a shared commercial destiny.\n\nVenetian merchants handle the spice trade, Genoese bankers finance the ventures, Florentine workshops transform raw silk into fine cloth, and Neapolitan shipwrights build the galleys that carry it all. The Dominio da Mar lives again — an Italian Mediterranean where commerce is king."
 nd_ita.10.a: "The sea is our marketplace."
 nd_ita.11.t: "The Banca d'Italia"
 nd_ita.11.d: "Italian banking has reclaimed its ancient preeminence. The tradition of the Medici and the Bardi lives on in a modern form — a unified Italian banking system that commands the flow of capital across Europe. Bills of exchange drawn on Italian houses are honored from London to Constantinople, and the gold reserves of the Banca d'Italia rival those of any nation.\n\nWith Crete secured — the central Mediterranean's greatest waypoint — Italian commercial networks now stretch unbroken from the western Mediterranean to the Levant. The question is how to leverage this financial power."
 nd_ita.11.a: "Diplomacy and influence — the Medici way."
 nd_ita.11.b: "Monopolize the routes — control the trade."
 nd_ita.12.t: "The Universal Renaissance"
 nd_ita.12.d: "The numbers do not lie. Italian cities lead the world in population, in wealth, in the production of goods both fine and common. Italian banks command the flow of capital from the Baltic to the Levant. Italian institutions of learning set the standard that all others aspire to reach.\n\nThis is no mere prosperity — it is a second Renaissance. Where the first Rinascimento revived the arts and letters of antiquity, this Rinascimento Universale has created something new: a civilization of commerce, culture, and innovation that radiates outward from the Italian peninsula to transform the world. The question now is how to sustain this golden age."
 nd_ita.12.a: "Invest in knowledge — ideas are eternal."
 nd_ita.12.b: "Build the infrastructure of prosperity."
 nd_ita_fortezza_moderna: "Fortezza Moderna"
 nd_ita_fortezza_moderna_desc: "A state-of-the-art Italian fortress complex incorporating the trace italienne — the angular bastion design that Italian military engineers pioneered and that revolutionized defensive warfare across Europe."
 nd_ita_fortezza_maintenance: "Fortress Maintenance"
 nd_ita_fortezza_maintenance_desc: "The stone, iron, and firearms required to maintain a modern Italian fortress in fighting readiness."
 nd_ita_conservatorio: "Conservatorio"
 nd_ita_conservatorio_desc: "An Italian conservatory of music and arts, where composers, musicians, and performers train in the tradition that produced Vivaldi, Monteverdi, and the operatic form that conquered the stages of Europe."
 nd_ita_conservatorio_upkeep: "Conservatory Upkeep"
 nd_ita_conservatorio_upkeep_desc: "The paper, fine cloth, and glass instruments needed to sustain a conservatory and its artists in the Italian tradition."
 nd_ita_dest_irredenta: "Italia Irredenta"
 nd_ita_dest_irredenta_desc: "The terre irredente — Trieste, Trento, and the Italian-speaking lands still under foreign rule — must be reclaimed. Assemble an army worthy of the cause and march to liberate every inch of Italian soil."
 nd_ita_dest_quarta_sponda: "The Fourth Shore"
 nd_ita_dest_quarta_sponda_desc: "The Mediterranean's southern shore — Tunisia and Tripolitania — once fed the Roman Empire. With a professional army at our backs, Italy can establish its African empire and control the central Mediterranean."
 nd_ita_dest_mare_nostrum: "Mare Nostrum"
 nd_ita_dest_mare_nostrum_desc: "Mare Nostrum — Our Sea. From Thessaloniki to Alexandria, from Smyrna to the Strait of Messina, Italy must command the entire Mediterranean basin. Only then will the heirs of Rome have truly restored the imperium."
 nd_ita_dest_stato_da_mar: "Stato da Mar"
 nd_ita_dest_stato_da_mar_desc: "The Venetian Stato da Mar — the maritime state — was built on Adriatic trade supremacy. Secure Ragusa, ensure Italian silk flows through our markets, and lay the foundation for a commercial empire that rivals the Serenissima."
 nd_ita_dest_banca_italia: "Banca d'Italia"
 nd_ita_dest_banca_italia_desc: "Italian banking must reclaim the preeminence of the Medici era. Secure Crete as the central Mediterranean's key waypoint, fill the treasury, and embrace the banking revolution that Italian financiers pioneered."
 nd_ita_dest_rinascimento: "Rinascimento Universale"
 nd_ita_dest_rinascimento_desc: "A universal renaissance — Italy must become the wealthiest, most developed, and most commercially connected nation in the world. Master global trade, fill the coffers, and develop the peninsula until it stands as the undisputed center of civilization."
 STATIC_MODIFIER_NAME_nd_ita_dest_legioni_africane: "Legioni Africane"
 STATIC_MODIFIER_DESC_nd_ita_dest_legioni_africane: "Italy's African legions — colonial regiments recruited, trained, and garrisoned to hold the Fourth Shore and prepare for further expansion across the Mediterranean littoral."
 STATIC_MODIFIER_NAME_nd_ita_dest_dominio_dei_mari: "Dominio dei Mari"
 STATIC_MODIFIER_DESC_nd_ita_dest_dominio_dei_mari: "The Italian fleet rules the waves between Sicily and the African coast, projecting power through naval dominance rather than garrisons — a maritime strategy worthy of the Venetian and Genoese tradition."
 STATIC_MODIFIER_NAME_nd_ita_dest_imperium_romanum: "Novum Imperium Romanum"
 STATIC_MODIFIER_DESC_nd_ita_dest_imperium_romanum: "A new Roman Empire — Italy wields the aggressive military power of a true Mediterranean hegemon, projecting force rapidly across its dominions, though the strain of perpetual campaigning takes its toll."
 STATIC_MODIFIER_NAME_nd_ita_dest_traccia_italiana: "Traccia Italiana"
 STATIC_MODIFIER_DESC_nd_ita_dest_traccia_italiana: "The trace italienne — angular bastion fortifications pioneered by Italian military engineers — makes every Italian position across the Mediterranean an impregnable stronghold defended by modern artillery."
 STATIC_MODIFIER_NAME_nd_ita_dest_diplomazia_medicea: "Diplomazia Medicea"
 STATIC_MODIFIER_DESC_nd_ita_dest_diplomazia_medicea: "The Medici way — influence through finance, diplomacy through generosity, power through the cultivation of friends. Italian ambassadors are welcomed in every court, and Italian credit opens every door."
 STATIC_MODIFIER_NAME_nd_ita_dest_monopolio_rotte: "Monopolio delle Rotte"
 STATIC_MODIFIER_DESC_nd_ita_dest_monopolio_rotte: "Italian merchants and bankers have cornered the most profitable trade routes in the Mediterranean, extracting wealth from every transaction — though such aggressive commerce drives prices upward."
 STATIC_MODIFIER_NAME_nd_ita_dest_rinascimento_universale: "Rinascimento Universale"
 STATIC_MODIFIER_DESC_nd_ita_dest_rinascimento_universale: "A universal rebirth — Italian institutions, academies, and workshops drive the advancement of human knowledge, attracting talent from across the world and ensuring that ideas born in Italy reshape civilization."
 STATIC_MODIFIER_NAME_nd_ita_dest_crocevia_continenti: "Crocevia dei Continenti"
 STATIC_MODIFIER_DESC_nd_ita_dest_crocevia_continenti: "Italy stands at the crossroads of continents — a cosmopolitan commercial empire where diverse peoples are welcomed, infrastructure is built to last, and the loyalty of subjects is earned through prosperity rather than force."
