l_english:
 STATIC_MODIFIER_NAME_nd_bel_workshop_of_the_world: "Workshop of the World"
 STATIC_MODIFIER_DESC_nd_bel_workshop_of_the_world: "Belgium's coal seams, iron foundries, and machine works have made it the industrial engine of continental Europe. From the Sillon Industriel to the textile mills of Ghent, Belgian manufacturing leads the way into the modern age."
 STATIC_MODIFIER_NAME_nd_bel_scrap_of_paper: "Scrap of Paper, Shield of Nations"
 STATIC_MODIFIER_DESC_nd_bel_scrap_of_paper: "The great powers have guaranteed Belgian neutrality by treaty. This small state at the crossroads of Europe survives not by force of arms but by the force of international law, diplomatic skill, and the quiet prosperity that peace brings."
 STATIC_MODIFIER_NAME_nd_bel_constitutional_spirit: "Spirit of the Constitution"
 STATIC_MODIFIER_DESC_nd_bel_constitutional_spirit: "The Belgian Constitution of 1831 stands as a model of liberal governance, protecting individual freedoms while binding together two linguistic communities under a constitutional monarchy."
 STATIC_MODIFIER_NAME_nd_bel_industrial_momentum: "Industrial Momentum"
 STATIC_MODIFIER_DESC_nd_bel_industrial_momentum: "The coal mines of the Borinage and the blast furnaces of Liege have transformed the Sambre-Meuse valley into a corridor of smoke, steel, and relentless production."
 nd_bel.1.t: "The Birth of Belgium"
 nd_bel.1.d: "The revolution has succeeded. From the opera house in Brussels to the barricades of the September Days, the people of the southern provinces have thrown off the yoke of the United Kingdom of the Netherlands. Now a new nation takes shape — one that must forge its own identity from the Flemish cloth halls of Ghent, the Walloon forges of Liege, and the cosmopolitan salons of Brussels.\n\nThe great powers watch with interest. Belgium sits at the crossroads of Europe, and the path it chooses now will determine whether this small nation becomes a workshop of industry or a haven of diplomacy and peace.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_bel.1.a: "Fire the furnaces — Belgium shall be the forge of Europe!"
 nd_bel.1.b: "Let the treaty be our shield and compromise our strength."
 nd_bel.2.t: "The Belgian Constitution"
 nd_bel.2.d: "On February 7, 1831, the National Congress adopted what would become one of the most progressive constitutions in Europe. It established a constitutional monarchy with broad guarantees of individual liberties — freedom of the press, freedom of association, freedom of worship, and freedom of education. The title 'King of the Belgians' rather than 'King of Belgium' was a deliberate choice, emphasizing that sovereignty rested with the people, not the crown.\n\nThe Belgian model would inspire constitutional reformers across the continent for decades to come, proving that a diverse nation could govern itself through law rather than force."
 nd_bel.2.a: "A constitution worthy of a free people."
 nd_bel.3.t: "The Sillon Industriel"
 nd_bel.3.d: "The Sambre-Meuse river valley has been transformed. From Mons to Liege, the old agricultural landscape has given way to a continuous corridor of coal pits, blast furnaces, machine shops, and railway lines. John Cockerill's integrated ironworks at Seraing has become the largest manufacturing complex on the continent, producing everything from steam engines to iron rails.\n\nBelgium is now the first country on the European mainland to fully industrialize, and the Sillon Industriel — the 'Industrial Furrow' — stands as living proof that the age of coal and steel has arrived."
 nd_bel.3.a: "The furnaces shall never go cold."
 nd_bel.4.t: "The Antwerp Bourse"
 nd_bel.4.d: "In 1531, a magnificent new building opened its doors in Antwerp — the world's first purpose-built commodities exchange. Here, merchants from across Europe gather to trade not just goods but futures, options, and bills of exchange. The Bourse has transformed Antwerp from a mere port into the financial capital of the continent, where the price of pepper from the Indies and silver from the Americas is set daily.\n\nThe inscription above its entrance reads: 'For the use of merchants of all nations and all languages' — a fitting motto for a city that welcomes the world."
 nd_bel.4.a: "Commerce knows no borders."
 nd_bel.5.t: "The Flemish Primitives"
 nd_bel.5.d: "A revolution in painting has emerged from the workshops of Flanders. Jan van Eyck, working at the Burgundian court in Bruges, has perfected the technique of oil painting, achieving a luminosity and detail that astonishes all who see his work. His Ghent Altarpiece, completed in 1432, is hailed as the greatest painting in Europe.\n\nRogier van der Weyden in Brussels, Hans Memling in Bruges, and Hugo van der Goes in Ghent continue the tradition, establishing the Low Countries as the artistic center of northern Europe. Italian masters cross the Alps to study their techniques."
 nd_bel.5.a: "Let the world marvel at Flemish mastery."
 nd_bel_flemish_cloth_halls: "Flemish Cloth Halls"
 nd_bel_flemish_cloth_halls_desc: "The great Lakenhallen of Ypres, Bruges, and Ghent where Flemish cloth was inspected, graded, and sold to merchants from across Europe."
 nd_bel_bruges_banking: "Bruges Banking"
 nd_bel_bruges_banking_desc: "The financial innovations of Bruges, where Italian merchant-bankers established the first bourse and pioneered instruments of international trade finance."
 nd_bel_burgundian_tapestries: "Burgundian Tapestries"
 nd_bel_burgundian_tapestries_desc: "The tapestry workshops of Brussels, Tournai, and Arras that produced the finest woven artworks in Europe, adorning the courts of kings from Paris to Rome."
 nd_bel_flemish_primitives: "Flemish Primitives"
 nd_bel_flemish_primitives_desc: "The revolutionary school of Netherlandish painters — Van Eyck, Van der Weyden, Memling — who perfected oil painting and transformed European art."
 nd_bel_walloon_guards_tradition: "Walloon Guards Tradition"
 nd_bel_walloon_guards_tradition_desc: "The tradition of elite Catholic infantry recruited from Wallonia, serving as professional soldiers in the armies of Spain and later forming the backbone of Belgian military identity."
 nd_bel_antwerp_bourse: "Antwerp Bourse"
 nd_bel_antwerp_bourse_desc: "The world's first purpose-built commodities exchange, established in Antwerp in 1531, where merchants of all nations traded goods, futures, and bills of exchange."
 nd_bel_plantin_press: "Plantin Press"
 nd_bel_plantin_press_desc: "Christophe Plantin's printing house in Antwerp became the largest in Europe, publishing the Polyglot Bible and establishing the Low Countries as a center of book production."
 nd_bel_fortified_cities: "Fortified Cities"
 nd_bel_fortified_cities_desc: "The fortified urban centers of the Southern Netherlands — Antwerp, Brussels, Ghent, Namur — whose walls and bastions made them formidable strongholds."
 nd_bel_liege_arms_industry: "Liege Arms Industry"
 nd_bel_liege_arms_industry_desc: "The weapons manufactories of Liege and its surroundings, producing firearms, edged weapons, and armor of renowned quality for armies across Europe."
 nd_bel_abbey_brewing: "Abbey Brewing Tradition"
 nd_bel_abbey_brewing_desc: "The monastic brewing traditions of Belgium's Trappist and abbey breweries, where monks perfected the art of ale-making over centuries."
 nd_bel_lace_industry: "Brussels Lace Industry"
 nd_bel_lace_industry_desc: "The delicate needle and bobbin lace of Brussels, Bruges, and Mechelen — luxury textiles prized in the courts of Europe."
 nd_bel_collateral_councils: "Collateral Councils"
 nd_bel_collateral_councils_desc: "The Council of State, Privy Council, and Council of Finance that governed the Southern Netherlands under Habsburg rule, providing administrative continuity."
 nd_bel_antwerp_diamond_exchange: "Antwerp Diamond Exchange"
 nd_bel_antwerp_diamond_exchange_desc: "Antwerp's diamond cutting quarter, where skilled craftsmen transformed rough stones into brilliant gems, making the city the world capital of the diamond trade."
 nd_bel_cockerill_ironworks: "Cockerill Ironworks"
 nd_bel_cockerill_ironworks_desc: "John Cockerill's integrated manufacturing complex at Seraing near Liege — the largest ironworks on the European continent, producing steam engines, rails, and machinery."
 nd_bel_sillon_industriel: "Sillon Industriel"
 nd_bel_sillon_industriel_desc: "The industrial corridor along the Sambre-Meuse valley from Mons to Liege, where coal mining, steelmaking, and machine manufacturing transformed Belgium into the first industrialized country on the continent."
 nd_bel_civic_guard_tradition: "Civic Guard Tradition"
 nd_bel_civic_guard_tradition_desc: "The Garde Civique — the citizen militia that defended the Belgian Revolution and maintained order in the new state, drawing on the ancient tradition of urban militias in the Low Countries."
 nd_bel_canal_infrastructure: "Canal Infrastructure"
 nd_bel_canal_infrastructure_desc: "The canal network linking the Scheldt, Meuse, and Rhine river systems, enabling cheap transport of coal, steel, and manufactured goods across the Low Countries."
 nd_bel_verviers_wool: "Verviers Wool Industry"
 nd_bel_verviers_wool_desc: "The mechanized wool processing industry of Verviers, where William Cockerill installed the first spinning machines on the continent, transforming artisan workshops into modern factories."
 nd_bel_constitution_of_1831: "Constitution of 1831"
 nd_bel_constitution_of_1831_desc: "One of the most liberal constitutions in Europe, establishing freedom of the press, freedom of association, and a constitutional monarchy where sovereignty rests with the people."
 nd_bel_chasseurs_ardennais: "Chasseurs Ardennais"
 nd_bel_chasseurs_ardennais_desc: "Elite light infantry specialists of the Ardennes forests and hills, known for their tenacity, fieldcraft, and the green beret with wild boar insignia."
 nd_bel_continental_railways: "Continental Railways"
 nd_bel_continental_railways_desc: "Belgium's pioneering railway network, the first on the European continent, connecting Brussels to Mechelen in 1835 and rapidly expanding to link all major industrial centers."
 nd_bel_national_bank: "National Bank"
 nd_bel_national_bank_desc: "The National Bank of Belgium, established to provide financial stability, manage currency, and support the credit needs of the new industrial economy."
 nd_bel_walloon_steelworks: "Walloon Steelworks"
 nd_bel_walloon_steelworks_desc: "The mature steel industry of Wallonia, where the Bessemer process and open-hearth furnaces produce the structural steel that builds railways, bridges, and factories across Europe."
 nd_bel_linguistic_compromise: "Linguistic Compromise"
 nd_bel_linguistic_compromise_desc: "The pragmatic accommodation between Flemish and Walloon communities, recognizing that Belgium's strength lies in unity through diversity rather than forced assimilation."
 a_nd_bel_walloon_guards: "Walloon Guards"
 a_nd_bel_walloon_guards_desc: "Elite professional infantry recruited from Catholic Wallonia. Originally raised for Spanish service, these disciplined soldiers are renowned for their steadfastness in battle and loyalty to their commanders."
 a_nd_bel_civic_guard: "Garde Civique"
 a_nd_bel_civic_guard_desc: "Armed citizen militia drawn from the urban population. Heirs to the ancient tradition of Low Countries civic militias, the Garde Civique defends the Belgian state with the fervor of those who fought for their own freedom."
 a_nd_bel_chasseurs_ardennais: "Chasseurs Ardennais"
 a_nd_bel_chasseurs_ardennais_desc: "Elite light infantry of the Ardennes, trained in forest warfare, ambush tactics, and rapid movement through difficult terrain. Their green berets mark them as the 'Green Wolves' of the Belgian army."
 nd_bel_lakenhalle: "Lakenhalle"
 nd_bel_lakenhalle_desc: "A grand cloth inspection and trading hall in the Flemish tradition, where textiles are graded for quality and sold to merchants from across Europe."
 nd_bel_tapisserie: "Tapisserie"
 nd_bel_tapisserie_desc: "A tapestry workshop in the Burgundian tradition, where skilled weavers create magnificent textile artworks from wool, silk, and precious dyes."
 nd_bel_abdijbrouwerij: "Abdijbrouwerij"
 nd_bel_abdijbrouwerij_desc: "A monastic brewery where Trappist monks craft distinctive ales using traditional recipes perfected over centuries of contemplative labor."
 nd_bel_drukkerij: "Drukkerij"
 nd_bel_drukkerij_desc: "A printing workshop in the tradition of Christophe Plantin's Officina, producing books, maps, and pamphlets that spread knowledge across Europe."
 nd_bel_diamantwijk: "Diamantwijk"
 nd_bel_diamantwijk_desc: "A diamond cutting and polishing quarter where master craftsmen transform rough stones into brilliant gems, making this the world center of the diamond trade."
 nd_bel_vesting: "Vesting"
 nd_bel_vesting_desc: "A star fortress in the Southern Netherlands tradition, with angled bastions and layered defenses designed to withstand siege artillery."
 nd_bel_liege_armory: "Liege Armory"
 nd_bel_liege_armory_desc: "An arms workshop in the tradition of the Prince-Bishopric of Liege, where skilled gunsmiths produce firearms and weaponry of renowned quality for armies across Europe."
 nd_bel_cockerillsmelterij: "Cockerillsmelterij"
 nd_bel_cockerillsmelterij_desc: "An integrated iron foundry and machine works in the style of Cockerill's Seraing complex, producing steel, steam engines, and industrial machinery."
 nd_bel_lakenhalle_upkeep: "Cloth Hall Maintenance"
 nd_bel_lakenhalle_upkeep_desc: "Raw wool, dyestuffs, finished cloth, and paper ledgers needed to keep the hall's inspection and trading operations running."
 nd_bel_tapestry_weaving: "Tapestry Weaving"
 nd_bel_tapestry_weaving_desc: "The painstaking craft of weaving grand tapestries from wool, silk, and precious dyes — each piece a work of art that can take months to complete."
 nd_bel_abbey_ale_brewing: "Abbey Ale Brewing"
 nd_bel_abbey_ale_brewing_desc: "The monastic art of brewing rich, complex ales using wheat, honey, and secret recipes passed down through generations of Trappist monks."
 nd_bel_book_printing: "Book Printing"
 nd_bel_book_printing_desc: "The craft of typesetting, printing, and binding books — from theological treatises to navigational charts — in the tradition of Plantin's great workshop."
 nd_bel_diamond_cutting: "Diamond Cutting"
 nd_bel_diamond_cutting_desc: "The precise art of cleaving, cutting, and polishing rough diamonds into brilliant gems — a craft that has made Antwerp the diamond capital of the world."
 nd_bel_vesting_upkeep: "Fortress Maintenance"
 nd_bel_vesting_upkeep_desc: "Stone, weaponry, firearms, cannons, and tools required to maintain a star fortress's bastions and garrison in full defensive readiness."
 nd_bel_cockerill_steel_making: "Cockerill Steel Production"
 nd_bel_cockerill_steel_making_desc: "The integrated process of smelting iron ore with coke to produce high-quality steel for railways, bridges, and industrial machinery."
 nd_bel_liege_firearms_production: "Liege Firearms Production"
 nd_bel_liege_firearms_production_desc: "The renowned arms workshops of Liege, producing muskets, pistols, and rifles of exceptional quality for armies across Europe."
 levy_nd_bel_civic_guard: "Garde Civique"
 levy_nd_bel_civic_guard_desc: "Belgian citizen militia, armed volunteers from the towns and cities who defend their communities."
 nd_bel_formed_tt: "Belgium has been formed"
 nd_bel_path_a_tt: "Chose Workshop of the World"
 nd_bel_path_b_tt: "Chose Scrap of Paper, Shield of Nations"
 nd_bel_destiny: "Belgian Destiny"
 nd_bel_destiny_desc: "Belgium has been forged from revolution. The path forward begins with stable governance — only then can the nation pursue its chosen destiny."
 nd_bel_dest_forge_belt: "The Forge Belt"
 nd_bel_dest_forge_belt_desc: "Secure the industrial borderlands. Aachen's coal and Cambrai's forges must fall under Belgian control to fuel the workshop of the world."
 nd_bel_dest_ruhr: "The Ruhr Corridor"
 nd_bel_dest_ruhr_desc: "Extend Belgian industrial dominion into the Westphalian coalfields. Essen's furnaces shall feed Belgian ambition, and national development must match the scale of this enterprise."
 nd_bel_dest_continental_forge: "Continental Forge"
 nd_bel_dest_continental_forge_desc: "From the Meuse to the Rhine, from Flanders to the Seine — Belgium commands the industrial heart of Europe. Cologne and Paris acknowledge Belgian supremacy."
 nd_bel_dest_treaty: "The Treaty Shield"
 nd_bel_dest_treaty_desc: "Behind the shield of guaranteed neutrality, Belgium prospers. Embrace modern banking and accumulate the wealth that makes a small state indispensable."
 nd_bel_dest_model: "Model Constitution"
 nd_bel_dest_model_desc: "The Belgian constitution inspires reformers across Europe. Extend your diplomatic influence to The Hague and develop your nation beyond its modest borders."
 nd_bel_dest_heart_of_europe: "Heart of Europe"
 nd_bel_dest_heart_of_europe_desc: "Brussels has become the diplomatic capital of the continent. Luxury goods flow through Belgian markets, and the world's statesmen gather in Belgian halls."
 STATIC_MODIFIER_NAME_nd_bel_dest_industrial_expansion: "Industrial Expansion"
 STATIC_MODIFIER_DESC_nd_bel_dest_industrial_expansion: "Belgian industry expands along the coal seams and river valleys, protected by tariff walls and sustained by cheap labor."
 STATIC_MODIFIER_NAME_nd_bel_dest_coal_barons: "Coal Barons"
 STATIC_MODIFIER_DESC_nd_bel_dest_coal_barons: "The captains of industry wield enormous influence, channeling profits from the mines into commercial ventures while the workers bear the cost of industrial disruption."
 STATIC_MODIFIER_NAME_nd_bel_dest_beacon_of_liberty: "Beacon of Liberty"
 STATIC_MODIFIER_DESC_nd_bel_dest_beacon_of_liberty: "Belgium's liberal constitution and commitment to education and innovation make it a beacon for progressive thinkers, though the pacifist spirit makes war a costlier proposition."
 STATIC_MODIFIER_NAME_nd_bel_dest_pragmatic_compromise: "Pragmatic Compromise"
 STATIC_MODIFIER_DESC_nd_bel_dest_pragmatic_compromise: "The Belgian genius for compromise and accommodation holds together a diverse nation and earns the loyalty of its partners through conciliation rather than coercion."
 STATIC_MODIFIER_NAME_nd_bel_dest_iron_discipline: "Iron Discipline"
 STATIC_MODIFIER_DESC_nd_bel_dest_iron_discipline: "Belgian arms and Belgian discipline are the envy of Europe. The industrial forge has been turned to military purpose, though the relentless focus on martial strength comes at a cost to softer pursuits."
 STATIC_MODIFIER_NAME_nd_bel_dest_arsenal_of_europe: "Arsenal of Europe"
 STATIC_MODIFIER_DESC_nd_bel_dest_arsenal_of_europe: "From the armories of Liege to the foundries of the Ruhr, Belgian weapons arm half the continent. The homeland is a fortress, though industrial complacency threatens innovation."
 STATIC_MODIFIER_NAME_nd_bel_dest_congress_of_nations: "Congress of Nations"
 STATIC_MODIFIER_DESC_nd_bel_dest_congress_of_nations: "Brussels has become the seat of European diplomacy, where treaties are signed, disputes arbitrated, and the balance of power maintained through Belgian mediation."
 STATIC_MODIFIER_NAME_nd_bel_dest_merchant_republic: "Merchant Republic"
 STATIC_MODIFIER_DESC_nd_bel_dest_merchant_republic: "Belgian merchants command the crossroads of European trade. The Antwerp exchange sets prices, the Brussels banks set terms, and the port of Ostend connects the continent to the world."
 nd_bel.6.t: "A Destiny Forged"
 nd_bel.6.d: "Belgium stands. Born from revolution, bound by constitution, this small nation at the crossroads of Europe has proven that it can endure. The great powers may have guaranteed our borders, but it is we who must decide what kind of nation we shall become.\n\nThe path ahead is ours to choose."
 nd_bel.6.a: "Belgium shall endure."
 nd_bel.7.t: "The Forge Belt Secured"
 nd_bel.7.d: "The borderlands have fallen into Belgian hands. Aachen's workshops and Cambrai's forges now serve Belgian industry. The coal and iron of the frontier feed a growing appetite for steel, and the blast furnaces burn day and night.\n\nThis is just the beginning. Greater prizes lie beyond — the vast coalfields of the Ruhr await."
 nd_bel.7.a: "The furnaces shall never go cold."
 nd_bel.8.t: "Under the Treaty Shield"
 nd_bel.8.d: "The treaty of guarantee holds firm. Behind this shield of paper and ink, Belgium prospers in ways that empires cannot. Our banks lend to kings, our merchants trade with all, and our neutrality is the foundation upon which continental peace rests.\n\nLet others wage war. Belgium shall grow rich in peace."
 nd_bel.8.a: "Peace is our fortress."
 nd_bel.9.t: "The Ruhr Corridor"
 nd_bel.9.d: "Belgian industry now extends deep into the Westphalian coalfields. The integration of Ruhr coal with Belgian steel has created an industrial complex without equal on the continent. Smoke rises from a thousand chimneys, and the railway links grow thicker by the month.\n\nBut power of this scale demands choices. Shall we protect our industries behind tariff walls, or shall we let the coal barons reshape our society as they see fit?"
 nd_bel.9.a: "Raise the tariffs — protect Belgian industry!"
 nd_bel.9.b: "Let the industrialists build their empires."
 nd_bel.10.t: "The Belgian Model"
 nd_bel.10.d: "Reformers from Berlin to Buenos Aires study the Belgian constitution. Our separation of powers, our guarantee of individual liberties, our accommodation of linguistic diversity — these innovations have made Belgium a model for nations seeking to govern themselves through law rather than force.\n\nShall we lean into this role as a beacon of progressive reform, or shall we emphasize the pragmatic compromises that hold our own diverse nation together?"
 nd_bel.10.a: "Let Belgium be a beacon of liberty!"
 nd_bel.10.b: "Compromise is the Belgian genius."
 nd_bel.11.t: "The Continental Forge"
 nd_bel.11.d: "From the spires of Cologne to the boulevards of Paris, Belgium commands the industrial heart of Europe. The great cities of the continent acknowledge what the coal barons and steel magnates always knew — that the nation that controls the forge controls the future.\n\nBelgian arms and Belgian steel have built an empire of industry. Shall we forge iron discipline to defend it, or shall we become the arsenal that arms all of Europe?"
 nd_bel.11.a: "Discipline — the forge demands order."
 nd_bel.11.b: "Let Belgian arms supply the continent."
 nd_bel.12.t: "The Heart of Europe"
 nd_bel.12.d: "Brussels has become what Vienna once was — the diplomatic capital of the continent. In the grand palaces along the Rue de la Loi, ambassadors negotiate, treaties are drafted, and the affairs of nations are settled over Belgian chocolate and Trappist ale.\n\nThe world comes to Brussels. Shall we become the permanent congress of nations, or shall we let our merchants transform this diplomatic capital into a commercial one?"
 nd_bel.12.a: "Brussels shall arbitrate the affairs of nations."
 nd_bel.12.b: "Let commerce be the language of diplomacy."
 nd_bel_wapenfabriek: "Wapenfabriek"
 nd_bel_wapenfabriek_desc: "A Belgian national arms factory, combining Liege's gunsmithing tradition with Ruhr steel and industrial-scale manufacturing to produce weapons for the armies of Europe."
 nd_bel_national_arms_production: "National Arms Production"
 nd_bel_national_arms_production_desc: "The industrial production of weapons and military equipment, combining iron, coal, and precision tooling in a factory complex that dwarfs the traditional armorer's workshop."
 nd_bel_palais_des_nations: "Palais des Nations"
 nd_bel_palais_des_nations_desc: "A grand diplomatic palace where European statesmen gather to negotiate treaties, arbitrate disputes, and conduct the business of nations over Belgian hospitality."
 nd_bel_diplomatic_upkeep: "Diplomatic Hospitality"
 nd_bel_diplomatic_upkeep_desc: "The considerable expense of maintaining a diplomatic palace — fine stationery, luxurious furnishings, imported wines, and the elegant surroundings expected by visiting dignitaries."
