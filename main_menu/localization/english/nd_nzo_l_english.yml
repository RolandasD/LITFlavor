l_english:
 STATIC_MODIFIER_NAME_nd_tiger_banner_of_the_black_mywa: "Tiger Banner of the Black Mywa"
 STATIC_MODIFIER_DESC_nd_tiger_banner_of_the_black_mywa: "The Black Mywa warrior caste, from which Nanzhao's rulers sprang, has reasserted its martial dominion. The Luojuzi — Tiger Sons — march again at the vanguard, their red helmets blazing like fire across the highlands. Every hundred men yields one Tiger Son, and every Tiger Son is worth ten ordinary soldiers."
 STATIC_MODIFIER_NAME_nd_southern_silk_road: "Southern Silk Road"
 STATIC_MODIFIER_DESC_nd_southern_silk_road: "Nanzhao straddles the crossroads of empires. The Tea Horse Road carries Pu'er tea to Tibet and brings back horses; the Southern Silk Road connects Burma, India, and China through Yunnan's mountain passes. Bai merchants and artisans transform this geographic blessing into lasting prosperity."
 STATIC_MODIFIER_NAME_nd_tiger_sons_resurgent: "Tiger Sons Resurgent"
 STATIC_MODIFIER_DESC_nd_tiger_sons_resurgent: "The spirit of the Tianbao War victory burns in Nanzhao's armies. The Tiger Sons lead from the front, and lesser men find courage in their example."
 STATIC_MODIFIER_NAME_nd_diplomatic_equilibrium: "Diplomatic Equilibrium"
 STATIC_MODIFIER_DESC_nd_diplomatic_equilibrium: "Having proven that even the Tang cannot overwhelm the kingdom by force, Nanzhao negotiates from a position of strength. The balance between great powers is Yunnan's shield."
 STATIC_MODIFIER_NAME_nd_blessings_of_chongsheng: "Blessings of Chongsheng"
 STATIC_MODIFIER_DESC_nd_blessings_of_chongsheng: "The Three Pagodas stand as eternal guardians of the faith and the realm. Pilgrims from across Asia journey to Chongsheng, and their devotion enriches both the spiritual and temporal power of the kingdom."
 STATIC_MODIFIER_NAME_nd_lords_of_the_irrawaddy: "Lords of the Irrawaddy"
 STATIC_MODIFIER_DESC_nd_lords_of_the_irrawaddy: "The conquest of the Pyu demonstrated Nanzhao's ability to project power far beyond its highland heartland. The Irrawaddy valley falls under the shadow of the Tiger Banner."
 STATIC_MODIFIER_NAME_nd_pyu_tributary_network: "Pyu Tributary Network"
 STATIC_MODIFIER_DESC_nd_pyu_tributary_network: "Rather than rule by the sword alone, Nanzhao draws the conquered Pyu cities into a web of tributary relationships. Their wealth flows upstream, and their autonomy buys their loyalty."
 STATIC_MODIFIER_NAME_nd_tea_horse_prosperity: "Tea Horse Prosperity"
 STATIC_MODIFIER_DESC_nd_tea_horse_prosperity: "The Tea Horse Road is the lifeline of highland commerce. Yunnan tea for Tibetan horses, Chinese silk for Burmese gems — the caravans never rest, and the toll revenues never cease."
 nd_nzo.1.t: "Restoration of Nanzhao"
 nd_nzo.1.d: "The scattered peoples of Yunnan are united once more under a single banner. From the shores of Lake Erhai to the passes of the Ailao Mountains, the kingdom that once defied the Tang Dynasty and conquered the cities of the Irrawaddy is reborn.\n\nBut the character of this restoration remains to be determined. The Black Mywa warrior aristocracy stands ready to forge the kingdom through conquest, as their ancestors did when the Luojuzi — the Tiger Sons — led Nanzhao's armies to victories that shook the greatest empire on earth. Yet others point to Yunnan's position at the crossroads of civilizations, where the Southern Silk Road and the Tea Horse Road converge, and argue that commerce and culture will build a more enduring legacy than any sword.\n\nWhat spirit shall define the reborn kingdom?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_nzo.1.a: "Raise the Tiger Banner — let the Black Mywa ride to war!"
 nd_nzo.1.b: "Open the mountain passes — let the caravans bring prosperity!"
 nd_nzo.2.t: "Legacy of the Tianbao War"
 nd_nzo.2.d: "In 751, when the Tang governor of Jiannan marched 80,000 soldiers into Yunnan to punish what he saw as a rebellious vassal, King Geluofeng met the invasion at Xiaguan. The battle was decisive — the Tang army was annihilated, their governor slain, and their ambitions to subjugate Nanzhao shattered for a generation.\n\nThe victory echoed across Asia. It proved that a highland kingdom of skilled warriors, fighting on familiar terrain, could humble even the mightiest empire. The Tianbao War became the founding myth of Nanzhao's independence — the moment when a confederation of mountain tribes proved itself a sovereign power.\n\nHow shall we honor this legacy?"
 nd_nzo.2.a: "The Tiger Sons shall always lead from the front."
 nd_nzo.2.b: "Strength earns respect — and respect brings peace."
 nd_nzo.3.t: "The Three Pagodas of Chongsheng"
 nd_nzo.3.d: "King Quan Fengyou commissioned the greatest architectural achievement in Yunnan's history: the Three Pagodas of Chongsheng Temple. The central Qianxun Pagoda rises nearly seventy meters into the sky — one of the tallest structures in all of China. Together with the temple complex of 890 rooms and 11,400 Buddha statues, it stands as the spiritual heart of the kingdom.\n\nAzhali Buddhism, the Tantric school unique to Yunnan, finds its grandest expression here. Worship of Avalokitesvara, the Great Black Deva, and the Guardian King of the North draws pilgrims from across the Buddhist world. The monastery's monks preserve learning, practice medicine, and advise the throne."
 nd_nzo.3.a: "May the Three Pagodas stand for ten thousand years."
 nd_nzo.4.t: "Conquest of the Pyu City-States"
 nd_nzo.4.d: "In the 830s, Nanzhao's armies swept down from the highlands into the Irrawaddy valley, where the ancient Pyu civilization had flourished for centuries. One by one, the great Pyu cities — Sri Ksetra, Halingyi, Binnaka — fell to the Tiger Banner. The Pyu kingdom, weakened by internal divisions, could not withstand the onslaught.\n\nThis was not mere raiding. Nanzhao carried off skilled artisans, musicians, and scholars, enriching its own culture with Pyu achievements. The conquest opened the road to Burma and the Indian Ocean, transforming Nanzhao from a highland power into a regional empire.\n\nHow shall we govern our new domains?"
 nd_nzo.4.a: "Plant the Tiger Banner on the banks of the Irrawaddy."
 nd_nzo.4.b: "Bind the Pyu as tributaries — their wealth serves us better than their ruin."
 nd_nzo.5.t: "Dominion of the Tea Horse Road"
 nd_nzo.5.d: "The ancient caravan routes through Yunnan have grown into one of the great commercial arteries of Asia. The Tea Horse Road carries Pu'er tea northward to Tibet and Sichuan, where it is traded for horses, salt, and silver. The Southern Silk Road connects China to Burma, India, and beyond, with Yunnan as the indispensable waypoint.\n\nCaravanserais dot the mountain passes. Bai merchants handle trade in a dozen languages. The toll revenues and transit taxes fill the royal treasury, and Yunnan's position as the middleman between civilizations makes it wealthier than its modest territory might suggest."
 nd_nzo.5.a: "The caravans shall never rest."
 nd_nzo_luojuzi_tradition: "Luojuzi Tradition"
 nd_nzo_luojuzi_tradition_desc: "The Luojuzi — Tiger Sons — were Nanzhao's elite vanguard. For every hundred soldiers, the strongest was chosen. They wore red helmets, leather armor, and bronze shields, yet fought barefoot for speed and agility."
 nd_nzo_salt_extraction: "Yunnan Salt Extraction"
 nd_nzo_salt_extraction_desc: "Salt wells dotted the Yunnan landscape, providing a crucial revenue source controlled by the crown. Salt and gold were mined in many parts of the kingdom."
 nd_nzo_mywa_caste_system: "Mywa Caste System"
 nd_nzo_mywa_caste_system_desc: "Nanzhao society divided into the administrative White Mywa of western Yunnan and the militaristic Black Mywa of the east. This dual-caste system provided both governance and martial prowess."
 nd_nzo_six_zhaos_legacy: "Legacy of the Six Zhaos"
 nd_nzo_six_zhaos_legacy_desc: "In 738, Piluoge united the Six Zhaos — the six principalities of western Yunnan — into a single kingdom under Tang recognition. This unification created the foundation for Nanzhao's power."
 nd_nzo_azhali_buddhism: "Azhali Buddhism"
 nd_nzo_azhali_buddhism_desc: "The esoteric Tantric school known as Azhali Buddhism was unique to Yunnan, blending Indian Vajrayana traditions with local spiritual practices and devotion to Avalokitesvara."
 nd_nzo_highland_warfare: "Highland Warfare"
 nd_nzo_highland_warfare_desc: "Nanzhao warriors exploited the rugged terrain of Yunnan — mountain passes, jungle valleys, and river gorges — to defeat armies many times their size."
 nd_nzo_bai_weaving: "Bai Weaving Tradition"
 nd_nzo_bai_weaving_desc: "The Bai people developed distinctive tie-dye techniques for cotton and silk fabrics, creating patterns that became famous across the region."
 nd_nzo_elephant_warfare: "Elephant Warfare"
 nd_nzo_elephant_warfare_desc: "Nanzhao chieftains rode war elephants into battle. The kingdom's elephant-hide lacquered armor was prized throughout the region as nearly impervious to arrows."
 nd_nzo_zhunu_crossbows: "Zhunu Crossbow Guards"
 nd_nzo_zhunu_crossbows_desc: "The Red Crossbow — Zhunu — guard units wielded powerful mounted crossbows that could bring down cavalry at extreme range. During sieges, crossbow fire from the walls cut down hundreds of attackers."
 nd_nzo_tianbao_war_legacy: "Tianbao War Legacy"
 nd_nzo_tianbao_war_legacy_desc: "The decisive victory over the Tang invasion of 751 proved that Nanzhao could stand against the mightiest empire on earth. This legacy of defiance defined the kingdom's identity."
 nd_nzo_three_pagodas: "Three Pagodas of Chongsheng"
 nd_nzo_three_pagodas_desc: "The Qianxun Pagoda and the Chongsheng Temple complex, with 890 rooms and 11,400 Buddha statues, represented the pinnacle of Nanzhao's spiritual and architectural achievement."
 nd_nzo_copper_mining: "Yunnan Copper Mining"
 nd_nzo_copper_mining_desc: "Yunnan held the largest copper reserves in China. The extraction and smelting of copper was a major industry, producing raw material for coins, weapons, and ceremonial objects."
 nd_nzo_imperial_court: "Imperial Court Culture"
 nd_nzo_imperial_court_desc: "When King Shilong proclaimed himself emperor and reoriented the kingdom around Buddhism, he established a court culture that blended Tang sophistication with Bai traditions."
 nd_nzo_pyu_conquest: "Conquest of the Pyu"
 nd_nzo_pyu_conquest_desc: "In the 830s, Nanzhao decimated the ancient Pyu city-states of the Irrawaddy valley, capturing artisans, scholars, and musicians who enriched the kingdom's culture."
 nd_nzo_meng_cavalry_tradition: "Meng Cavalry Tradition"
 nd_nzo_meng_cavalry_tradition_desc: "The Mengshe clan, from which Nanzhao's rulers descended, bred highland horses and trained cavalry skilled in mountain warfare and rapid flanking maneuvers."
 nd_nzo_tea_horse_road: "Tea Horse Road"
 nd_nzo_tea_horse_road_desc: "The ancient caravan route carrying Pu'er tea to Tibet and bringing back horses became one of Asia's great commercial arteries, with Yunnan as its indispensable hub."
 nd_nzo_lacquered_armor_tradition: "Lacquered Armor Tradition"
 nd_nzo_lacquered_armor_tradition_desc: "Dali produced some of the finest lacquered leather armor in Asia, made from elephant hide and treated until it was almost as hard as iron. Sets were sent to the Song court as diplomatic gifts."
 nd_nzo_yunnan_silversmithing: "Yunnan Silversmithing"
 nd_nzo_yunnan_silversmithing_desc: "Yunnan's silver mines and its tradition of intricate filigree work produced jewelry and ceremonial objects prized across the region."
 nd_nzo_bai_literary_tradition: "Bai Literary Tradition"
 nd_nzo_bai_literary_tradition_desc: "Bai poetry and prose, influenced by the Chinese literary tradition but written in the Bai language, reached remarkable heights during the Dali period."
 nd_nzo_highland_fortification: "Highland Fortification"
 nd_nzo_highland_fortification_desc: "Nanzhao's mountain fortresses exploited the natural terrain — narrow passes, sheer cliffs, and river gorges — to create defensive positions that multiplied the defenders' advantage."
 nd_nzo_dali_marble_craft: "Dali Marble Craft"
 nd_nzo_dali_marble_craft_desc: "The distinctive marble quarried near Dali, with its unique natural patterns, was prized for construction and artistic purposes across southern China."
 nd_nzo_standing_army_reform: "Standing Army Reform"
 nd_nzo_standing_army_reform_desc: "At its height, Nanzhao maintained a standing army of 100,000 experienced troops under strict military law — a remarkable achievement for a highland kingdom."
 nd_nzo_salt_monopoly: "Salt Monopoly"
 nd_nzo_salt_monopoly_desc: "Crown control over Yunnan's salt wells provided a reliable revenue stream that funded both the court and the army."
 nd_nzo_multi_ethnic_governance: "Multi-Ethnic Governance"
 nd_nzo_multi_ethnic_governance_desc: "Yunnan's diverse population — Bai, Yi, Tai, Tibetan, and others — required flexible governance that accommodated different customs while maintaining central authority."
 nd_nzo_puer_tea_mastery: "Pu'er Tea Mastery"
 nd_nzo_puer_tea_mastery_desc: "Yunnan's Pu'er tea, aged and compressed into bricks for transport on the Tea Horse Road, became one of Asia's most valuable trade commodities."
 nd_nzo_avalokitesvara_devotion: "Avalokitesvara Devotion"
 nd_nzo_avalokitesvara_devotion_desc: "Devotion to Avalokitesvara — Guanyin, the Goddess of Mercy — was central to Azhali Buddhism. The state religion unified the diverse peoples of Yunnan under a shared spiritual identity."
 nd_nzo_mountain_pass_control: "Mountain Pass Control"
 nd_nzo_mountain_pass_control_desc: "Yunnan's mountain passes were natural chokepoints for both armies and trade. Controlling them meant controlling access to the entire southwestern frontier."
 nd_nzo_lacquer_guard_tradition: "Lacquer Guard Tradition"
 nd_nzo_lacquer_guard_tradition_desc: "Elite troops clad in the famous lacquered elephant-hide armor represented the pinnacle of Nanzhao's military craftsmanship — warriors as hardened as the armor they wore."
 nd_nzo_centralized_administration: "Centralized Administration"
 nd_nzo_centralized_administration_desc: "The crown consolidated control over Yunnan's diverse provinces, replacing the loose confederation of the early period with a more centralized bureaucratic apparatus."
 nd_nzo_yunnan_mining_boom: "Yunnan Mining Boom"
 nd_nzo_yunnan_mining_boom_desc: "Yunnan's vast silver and copper deposits fueled an economic boom. The province's silver production would eventually contribute millions of taels to China's national output."
 nd_nzo_tea_trade_expansion: "Tea Trade Expansion"
 nd_nzo_tea_trade_expansion_desc: "As demand for Yunnan's tea spread across Asia, the network of caravan routes expanded, connecting ever more distant markets to the Pu'er tea warehouses."
 nd_nzo_highland_defense_doctrine: "Highland Defense Doctrine"
 nd_nzo_highland_defense_doctrine_desc: "Centuries of highland warfare crystallized into a formal doctrine: use the terrain, harass supply lines, avoid pitched battles on open ground, and let the mountains fight for you."
 nd_nzo_bai_artistic_renaissance: "Bai Artistic Renaissance"
 nd_nzo_bai_artistic_renaissance_desc: "Under centralized patronage, Bai artists achieved new heights in painting, sculpture, metalwork, and architecture, synthesizing influences from China, Tibet, and Southeast Asia."
 nd_nzo_modern_governance: "Modern Governance"
 nd_nzo_modern_governance_desc: "The traditional institutions of Yunnan are reformed to meet the challenges of a changing world, balancing the heritage of the Mywa caste system with modern administrative efficiency."
 nd_nzo_industrial_mining: "Industrial Mining"
 nd_nzo_industrial_mining_desc: "Modern techniques transform Yunnan's ancient mining industry, vastly increasing the output of copper, silver, tin, and lead."
 nd_nzo_bai_scholarship: "Bai Scholarship"
 nd_nzo_bai_scholarship_desc: "A new generation of Bai scholars combines the literary traditions of their ancestors with modern methods of inquiry, producing works of lasting significance."
 nd_nzo_commercial_modernization: "Commercial Modernization"
 nd_nzo_commercial_modernization_desc: "The ancient caravan routes are modernized with better roads, standardized weights and measures, and formal commercial treaties."
 nd_nzo_modern_military: "Modern Military"
 nd_nzo_modern_military_desc: "Highland defense traditions are supplemented with modern drill, organization, and tactics, creating an army that combines mountain expertise with contemporary discipline."
 nd_nzo_national_identity: "Nanzhao National Identity"
 nd_nzo_national_identity_desc: "The diverse peoples of Yunnan forge a shared national consciousness, drawing on the legacy of the six united zhaos, the Three Pagodas, and the Tea Horse Road."
 a_nd_nzo_luojuzi: "Luojuzi"
 a_nd_nzo_luojuzi_desc: "The Tiger Sons — Nanzhao's elite vanguard. One chosen from every hundred soldiers, they wear red helmets, leather armor, and bronze shields, fighting barefoot for speed."
 a_nd_nzo_war_elephant: "Nanzhao War Elephant"
 a_nd_nzo_war_elephant_desc: "Chieftains rode armored elephants into battle, their lacquered elephant-hide barding deflecting arrows and spears. The psychological impact alone was devastating."
 a_nd_nzo_crossbow_guard: "Zhunu Crossbow Guard"
 a_nd_nzo_crossbow_guard_desc: "The Red Crossbow guards, armed with powerful mounted crossbows, excelled in both field battle and siege defense among the mountains of Yunnan."
 a_nd_nzo_meng_cavalry: "Meng Cavalry"
 a_nd_nzo_meng_cavalry_desc: "Highland horsemen of the Mengshe ruling clan, trained in mountain warfare. Swift flankers who exploit the terrain that cripples heavier cavalry."
 a_nd_nzo_yunnan_garrison: "Yunnan Garrison Infantry"
 a_nd_nzo_yunnan_garrison_desc: "Professional soldiers of Nanzhao's standing army, equipped and trained under strict military law. Hardy mountain fighters who hold their ground against any assault."
 a_nd_nzo_lacquer_guard: "Dali Lacquer Guard"
 a_nd_nzo_lacquer_guard_desc: "Elite infantry clad in the famous lacquered elephant-hide armor — almost as hard as iron, yet lighter and more flexible. The finest soldiers in Yunnan."
 nd_nzo_salt_wells: "Salt Wells"
 nd_nzo_salt_wells_desc: "Extraction facilities for Yunnan's abundant salt deposits, a crucial revenue source controlled by the crown since the days of the first Nanzhao kings."
 nd_nzo_chongsheng_monastery: "Chongsheng Monastery"
 nd_nzo_chongsheng_monastery_desc: "A grand Buddhist temple complex modeled on the historical Chongsheng Temple with its Three Pagodas — the spiritual heart of the Nanzhao and Dali kingdoms."
 nd_nzo_copper_smelter: "Copper Smelter"
 nd_nzo_copper_smelter_desc: "Facilities for extracting and smelting the vast copper deposits of Yunnan — the largest reserves in China, feeding an insatiable demand for coinage and weaponry."
 nd_nzo_silver_workshop: "Silver Workshop"
 nd_nzo_silver_workshop_desc: "A Bai artisan workshop specializing in intricate silver filigree jewelry — a craft tradition that has made Dali famous across Yunnan and beyond."
 nd_nzo_workshop_upkeep: "Basic Silverwork"
 nd_nzo_workshop_upkeep_desc: "Simple silver items crafted by Bai artisans using charcoal furnaces and traditional hammering techniques."
 nd_nzo_caravanserai: "Caravanserai"
 nd_nzo_caravanserai_desc: "Rest stops and trading posts along the Tea Horse Road and Southern Silk Road, where merchants from China, Tibet, Burma, and India exchange goods and information."
 nd_nzo_lacquer_armory: "Lacquer Armory"
 nd_nzo_lacquer_armory_desc: "Workshops producing the famous Dali lacquered armor from elephant hide — treated and hardened until almost as resistant as iron, yet lighter and more flexible."
 nd_nzo_puer_warehouse: "Pu'er Tea Warehouse"
 nd_nzo_puer_warehouse_desc: "Storage facilities for aging and compressing Yunnan's prized Pu'er tea into bricks for transport along the Tea Horse Road."
 nd_nzo_azhali_temple: "Azhali Temple"
 nd_nzo_azhali_temple_desc: "A temple of the Tantric Azhali Buddhist school unique to Yunnan, devoted to Avalokitesvara and the Great Black Deva."
 nd_nzo_salt_processing_pm: "Salt Boiling"
 nd_nzo_salt_processing_pm_desc: "Brine from salt wells is boiled over wood fires in clay evaporation pans to produce salt crystals."
 nd_nzo_monastery_maintenance: "Monastic Upkeep"
 nd_nzo_monastery_maintenance_desc: "Maintaining the temple complex requires constant supplies of dressed stone, timber, beeswax candles, and paper for scriptures."
 nd_nzo_smelting_pm: "Copper Smelting"
 nd_nzo_smelting_pm_desc: "Raw copper ore is smelted in stone-lined charcoal furnaces using the traditional Yunnan method."
 nd_nzo_caravan_supply_pm: "Caravan Provisioning"
 nd_nzo_caravan_supply_pm_desc: "Providing pack animals, grain fodder, salt rations, and leather saddlery for merchant caravans traversing the mountain passes."
 nd_nzo_lacquer_workshop_pm: "Lacquer Armoring"
 nd_nzo_lacquer_workshop_pm_desc: "Elephant hide is cut, tanned with dyes and lacquer, then hardened into armor plates fitted to bronze-tipped weapons."
 nd_nzo_tea_aging_pm: "Tea Aging"
 nd_nzo_tea_aging_pm_desc: "Pu'er tea leaves are pressed into bricks using wooden tools, stored in pottery jars, and aged to develop their distinctive flavor."
 nd_nzo_temple_offerings_pm: "Temple Offerings"
 nd_nzo_temple_offerings_pm_desc: "Incense, beeswax candles, and fine cloth altar dressings sustain the daily rituals and ceremonies of Azhali Buddhist worship."
 nd_nzo_bai_tiedye_pm: "Bai Tie-Dye"
 nd_nzo_bai_tiedye_pm_desc: "The distinctive Bai tie-dye technique binds cloth with fiber-crop resist ties, dips them in natural dyes, and produces patterned fabrics passed down through generations."
 nd_nzo_silver_filigree_pm: "Silver Filigree"
 nd_nzo_silver_filigree_pm_desc: "Master silversmiths create intricate filigree jewelry and ceremonial objects, transforming Yunnan's abundant silver into prized works of art."
 nd_nzo_marble_working_pm: "Dali Marble Working"
 nd_nzo_marble_working_pm_desc: "The uniquely patterned marble quarried near Dali is cut with iron tools and timber scaffolding, then polished into construction materials and decorative pieces."
 levy_nd_nzo_luojuzi: "Luojuzi Levy"
 levy_nd_nzo_luojuzi_desc: "Tiger Sons raised from the common soldiery — the strongest one from every hundred."
 levy_nd_nzo_meng_cavalry: "Meng Cavalry Levy"
 levy_nd_nzo_meng_cavalry_desc: "Highland horsemen raised from the noble warrior class of the Mengshe ruling clan."
 nd_nzo_crown_salt_pm: "Crown Salt Administration"
 nd_nzo_crown_salt_pm_desc: "State-controlled salt production using intensive boiling methods and clay evaporation pans, a royal monopoly that funds both court and army."
 nd_nzo_devotional_crafts_pm: "Devotional Crafts"
 nd_nzo_devotional_crafts_pm_desc: "Ritual incense, silver ceremonial objects, beeswax candles, and fine cloth vestments sustain the daily rites of Azhali Buddhist worship."
 nd_nzo_tea_brick_pm: "Tea Brick Processing"
 nd_nzo_tea_brick_pm_desc: "Pu'er tea leaves are steamed, compressed into bricks using wooden presses, wrapped in paper for export, and aged along the Tea Horse Road."
 nd_nzo_bai_painting_pm: "Bai Painting"
 nd_nzo_bai_painting_pm_desc: "The Bai artistic tradition of painting on silk and paper, blending Chinese, Tibetan, and local styles."
 nd_nzo_formed_tt: "Nanzhao has been formed"
 nd_nzo_path_a_tt: "Chose Tiger Banner of the Black Mywa"
 nd_nzo_path_b_tt: "Chose Southern Silk Road"
 nd_nzo_destiny: "Destiny of Nanzhao"
 nd_nzo_destiny_desc: "The kingdom is reborn, but its destiny is yet unwritten. Stabilize the realm and choose the path that will define Nanzhao for generations."
 nd_nzo_dest_shan_conquest: "Conquest of the Shan States"
 nd_nzo_dest_shan_conquest_desc: "The Shan highlands east of Yunnan are fragmented among petty rulers. To extend the Tiger Banner's reach, bring Kengtung and Hsenwi under Nanzhao's dominion and raise an army worthy of the Black Mywa."
 nd_nzo_dest_irrawaddy_empire: "Empire of the Irrawaddy"
 nd_nzo_dest_irrawaddy_empire_desc: "The ancient Pyu cities of the Irrawaddy valley once fell to Nanzhao's armies. Repeat that feat by conquering Pagan and Thaton, building an empire that stretches from Yunnan's highlands to the sea."
 nd_nzo_dest_tiger_empire: "The Tiger Empire"
 nd_nzo_dest_tiger_empire_desc: "The ultimate vision of the Black Mywa: an empire that dominates both the fertile Sichuan basin and the Irrawaddy lowlands. Take Chengdu and Sagaing to command the two great river systems of the mainland."
 nd_nzo_dest_tea_horse_dominion: "Tea Horse Dominion"
 nd_nzo_dest_tea_horse_dominion_desc: "The Tea Horse Road connects Yunnan to Tibet, carrying Pu'er tea north and horses south. Extend Nanzhao's commercial reach to Lhasa itself and amass a treasury worthy of the Southern Silk Road."
 nd_nzo_dest_crossroads_of_asia: "Crossroads of Asia"
 nd_nzo_dest_crossroads_of_asia_desc: "Yunnan sits at the meeting point of Chinese, Indian, Tibetan, and Southeast Asian civilizations. Extend the trade network to Angkor, embrace modern banking, and transform the kingdom into Asia's commercial crossroads."
 nd_nzo_dest_emporium_of_asia: "Emporium of Asia"
 nd_nzo_dest_emporium_of_asia_desc: "From Vientiane to Guangzhou, the Southern Silk Road links the Indian Ocean to the South China Sea. Control both endpoints, develop the realm beyond all rivals, and build the greatest trading empire mainland Asia has ever seen."
 nd_nzo.6.t: "The Destiny of Nanzhao"
 nd_nzo.6.d: "The kingdom stands restored, its people united under the old banner. The foundation is laid — now the question is what we shall build upon it. The Black Mywa warriors sharpen their blades while the Bai merchants count their silver. Both paths lead to glory, but of very different kinds."
 nd_nzo.6.a: "Our destiny begins now."
 nd_nzo.7.t: "The Shan States Submit"
 nd_nzo.7.d: "The fragmented Shan principalities have been brought to heel. From Kengtung's valleys to Hsenwi's highlands, the Tiger Banner now flies where once a dozen petty lords squabbled over scraps. The Shan chiefs kneel before the throne of Nanzhao, and their warriors swell our ranks.\n\nThis is only the beginning. The Irrawaddy valley beckons to the south — the ancient road to empire that our ancestors walked when they destroyed the Pyu and shook the foundations of the world."
 nd_nzo.7.a: "The Shan bow to the Tiger Banner."
 nd_nzo.8.t: "The Tiger Banner Over Burma"
 nd_nzo.8.d: "Pagan has fallen. Thaton has fallen. The great cities of the Irrawaddy valley, which once belonged to the Pyu before our ancestors razed them, are ours again. The ghost of King Quan Fengyou smiles from the heavens as the Tiger Banner is planted on the banks of the river that feeds Burma.\n\nAn empire now stretches from the highlands of Yunnan to the lowlands of the Irrawaddy delta. But empires must be governed as well as conquered. How shall we consolidate these vast new territories?"
 nd_nzo.8.a: "Press forward — the Tiger Sons halt for nothing."
 nd_nzo.8.b: "Fortify what we hold and build strength."
 nd_nzo.9.t: "The Tiger Empire"
 nd_nzo.9.d: "Chengdu and Sagaing stand under the Tiger Banner. The fertile Sichuan basin, breadbasket of China, feeds our coffers, while the Irrawaddy lowlands secure our dominion over mainland Southeast Asia. No highland kingdom in history has achieved what Nanzhao has built — an empire spanning the two great river systems of the Asian mainland.\n\nThe Black Mywa dreamed of this for generations. Now we must decide the character of the empire we have forged. Shall the sword remain our instrument, or shall the institutions of governance temper the blade?"
 nd_nzo.9.a: "The sword built this empire — the sword shall sustain it."
 nd_nzo.9.b: "Empire requires governance, not just conquest."
 nd_nzo.10.t: "The Tea Horse Road Is Ours"
 nd_nzo.10.d: "Lhasa — the rooftop of the world — now trades through our hands. The Tea Horse Road, that ancient artery carrying Pu'er tea to Tibet and returning horses and silver, belongs entirely to Nanzhao. From the tea gardens of Simao to the monasteries of central Tibet, every brick of compressed tea and every Tibetan pony passes through our territory.\n\nThe caravansaries are full, the toll houses overflow, and the Bai merchants smile as they count the profits of geography made manifest."
 nd_nzo.10.a: "The caravans shall bring us the world's wealth."
 nd_nzo.11.t: "Crossroads of Asia"
 nd_nzo.11.d: "What began as a mountain kingdom's control of a few caravan routes has become something extraordinary. Nanzhao's trade network now stretches from the tea gardens of Yunnan to the temples of Angkor. Chinese silk, Tibetan silver, Burmese gems, and Khmer spices all pass through our markets.\n\nBai merchants handle commerce in a dozen languages. The banking houses of the capital hold deposits from traders across the continent. Yunnan has become what geography always intended — the crossroads of Asia."
 nd_nzo.11.a: "Extend the network — more merchants, more routes."
 nd_nzo.11.b: "Invest in our artisans and integrate our peoples."
 nd_nzo.12.t: "Emporium of Asia"
 nd_nzo.12.d: "From Vientiane to Guangzhou, the Southern Silk Road is ours. The greatest commercial artery of mainland Asia — connecting the Indian Ocean trade to the South China Sea — runs through Nanzhao's territory. No merchant crosses our borders without leaving silver behind.\n\nThe Bai trading diaspora spans the continent. Our markets set prices that merchants in Canton and Calcutta must accept. The kingdom that began as six highland chieftains has become the commercial heart of Asia."
 nd_nzo.12.a: "Let all nations come to trade in our markets."
 nd_nzo.12.b: "The merchants shall share power with the throne."
 STATIC_MODIFIER_NAME_nd_nzo_dest_tiger_march: "Tiger March"
 STATIC_MODIFIER_DESC_nd_nzo_dest_tiger_march: "The Tiger Sons lead the army forward without pause. Enemies submit or are swept aside. The pace of conquest strains the treasury and the people, but the Black Mywa know no other way."
 STATIC_MODIFIER_NAME_nd_nzo_dest_highland_consolidation: "Highland Consolidation"
 STATIC_MODIFIER_DESC_nd_nzo_dest_highland_consolidation: "The empire pauses to digest its conquests. Reinforcements flow in, garrisons are established, and mercenaries supplement the army while the highland core recovers."
 STATIC_MODIFIER_NAME_nd_nzo_dest_sword_emperor: "Sword Emperor"
 STATIC_MODIFIER_DESC_nd_nzo_dest_sword_emperor: "The emperor rules by the sword and through the warrior nobility. Noble levies swell the army, and new weapons of war thunder across the battlefield — though the cost of endless expansion strains the treasury."
 STATIC_MODIFIER_NAME_nd_nzo_dest_highland_mandate: "Highland Mandate"
 STATIC_MODIFIER_DESC_nd_nzo_dest_highland_mandate: "The empire adopts the trappings of legitimate governance. The warrior king becomes an emperor with a mandate, recognized and feared by all the world's great powers."
 STATIC_MODIFIER_NAME_nd_nzo_dest_merchant_network: "Merchant Network"
 STATIC_MODIFIER_DESC_nd_nzo_dest_merchant_network: "Bai merchants fan out across the continent, establishing trading posts and diplomatic connections. Every new route brings new partnerships, and Yunnan's influence spreads through silver rather than steel."
 STATIC_MODIFIER_NAME_nd_nzo_dest_artisan_guilds: "Artisan Guilds"
 STATIC_MODIFIER_DESC_nd_nzo_dest_artisan_guilds: "The kingdom invests in its diverse population. Bai silversmiths, Yi weavers, Tai potters — all find a place in prosperous guilds that strengthen the social fabric while enriching the treasury."
 STATIC_MODIFIER_NAME_nd_nzo_dest_world_emporium: "World Emporium"
 STATIC_MODIFIER_DESC_nd_nzo_dest_world_emporium: "The markets of Nanzhao welcome traders from every nation and faith. Buddhist monasteries bless the commerce, mercenary companies protect the roads, and the kingdom's explorers seek ever more distant partners."
 STATIC_MODIFIER_NAME_nd_nzo_dest_merchant_kings: "Merchant Kings"
 STATIC_MODIFIER_DESC_nd_nzo_dest_merchant_kings: "The old warrior nobility yields to a new mercantile aristocracy. Burgher wealth and guild power reshape the kingdom's institutions, with the temple clergy mediating between crown and commerce."
 nd_nzo_imperial_war_camp: "Imperial War Camp"
 nd_nzo_imperial_war_camp_desc: "A fortified command post for coordinating campaigns across the vast Tiger Empire, combining highland fortress design with the logistics needed to project power from Yunnan to Sichuan and the Irrawaddy."
 nd_nzo_war_camp_maintenance: "War Camp Operations"
 nd_nzo_war_camp_maintenance_desc: "Maintaining the imperial war camp requires a steady supply of weapons, warhorses, timber for fortifications, and leather for equipment."
 nd_nzo_crossroads_emporium: "Crossroads Emporium"
 nd_nzo_crossroads_emporium_desc: "A grand trading hall where merchants from China, Tibet, Burma, India, and Southeast Asia converge to exchange goods under Nanzhao's protection and profit."
 nd_nzo_emporium_maintenance: "Emporium Operations"
 nd_nzo_emporium_maintenance_desc: "Operating the emporium requires cloth for market stalls, paper for ledgers and contracts, tea for the merchants, and tools for weighing and measuring."
