l_english:
 STATIC_MODIFIER_NAME_nd_usa_revolutionary_republic: "Spirit of '76"
 STATIC_MODIFIER_DESC_nd_usa_revolutionary_republic: "The revolutionary fervor that gave birth to the Republic courses through the veins of the nation. The spirit of liberty, self-governance, and resistance to tyranny inspires every citizen-soldier to defend the new order."
 STATIC_MODIFIER_NAME_nd_usa_manifest_destiny: "Manifest Destiny"
 STATIC_MODIFIER_DESC_nd_usa_manifest_destiny: "The conviction that Providence has ordained American expansion from sea to shining sea drives settlers westward, transforming wilderness into civilization with each passing year."
 STATIC_MODIFIER_NAME_nd_usa_city_on_a_hill: "City upon a Hill"
 STATIC_MODIFIER_DESC_nd_usa_city_on_a_hill: "The American experiment in republican government shines as a beacon to the world. Strong institutions, democratic governance, and the rule of law make this new nation a model for others to follow."
 STATIC_MODIFIER_NAME_nd_usa_federalist_vision: "Federalist Vision"
 STATIC_MODIFIER_DESC_nd_usa_federalist_vision: "A strong central government with enumerated powers binds the states into a more perfect union. Hamilton's financial system and Washington's precedents give the republic institutional strength."
 STATIC_MODIFIER_NAME_nd_usa_states_rights: "Spirit of the Anti-Federalists"
 STATIC_MODIFIER_DESC_nd_usa_states_rights: "The sovereignty of the individual states and the rights of the people stand as bulwarks against tyranny. Local governance and religious liberty flourish under decentralized authority."
 STATIC_MODIFIER_NAME_nd_usa_second_war_independence: "Second War of Independence"
 STATIC_MODIFIER_DESC_nd_usa_second_war_independence: "Victory over the former mother country has proven that American naval power can challenge the greatest fleet in the world. Old Ironsides and her sister frigates have earned undying glory."
 STATIC_MODIFIER_NAME_nd_usa_era_national_unity: "Era of National Unity"
 STATIC_MODIFIER_DESC_nd_usa_era_national_unity: "The successful defense of the republic against foreign aggression has forged a new sense of national identity. Americans are no longer Virginians or New Yorkers first — they are Americans."
 STATIC_MODIFIER_NAME_nd_usa_hemispheric_shield: "Hemispheric Shield"
 STATIC_MODIFIER_DESC_nd_usa_hemispheric_shield: "The Americas are closed to further European colonization. As guardian of the Western Hemisphere, the United States claims the right to oppose any Old World interference in New World affairs."
 STATIC_MODIFIER_NAME_nd_usa_splendid_isolation: "Splendid Isolation"
 STATIC_MODIFIER_DESC_nd_usa_splendid_isolation: "Free from the entangling alliances of Europe, the republic turns inward to develop its vast resources. Peace abroad and prosperity at home are the twin pillars of American policy."
 nd_usa.1.t: "Birth of the Republic"
 nd_usa.1.d: "The impossible has been achieved. From thirteen quarrelsome colonies clinging to the Atlantic seaboard, a new nation has been forged — the United States of America. The old monarchies of Europe look on with a mixture of contempt and unease, for this republic was born not of dynastic inheritance but of revolutionary principle. The Constitution, drafted in the sweltering heat of a Philadelphia summer, establishes a government unlike any the world has seen: power divided, rights enumerated, and sovereignty vested in the people themselves.\n\nBut the work of nation-building has only begun. The frontier stretches endlessly westward. The treasury is empty and debts from the war remain unpaid. Former allies and enemies alike test the resolve of this infant republic. The question now is not whether America can win its independence — that battle is won — but what kind of nation it will become.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_usa.1.a: "The tree of liberty must be watered."
 nd_usa.1.b: "From sea to shining sea."
 nd_usa.1.c: "A government of laws, not of men."
 nd_usa.2.t: "The Constitutional Convention"
 nd_usa.2.d: "In the summer of 1787, fifty-five delegates gathered in Philadelphia to address the fatal weaknesses of the Articles of Confederation. What emerged after four months of fierce debate was not a revision but a revolution — an entirely new framework of government. The great compromise between large and small states, the separation of powers between three co-equal branches, and the delicate balance between federal authority and state sovereignty produced a document that would prove remarkably enduring.\n\nBut the Constitution was not universally welcomed. The Federalists, led by Hamilton, Madison, and Jay, argued passionately for ratification in a series of brilliant essays. The Anti-Federalists, suspicious of centralized power, demanded a Bill of Rights to protect individual liberties. The fundamental question of how much power should reside in the national government versus the states will define American politics for generations."
 nd_usa.2.a: "A strong union requires a strong government."
 nd_usa.2.b: "The government closest to the people governs best."
 nd_usa.3.t: "The War of 1812"
 nd_usa.3.d: "When the young republic went to war with Britain in 1812, many expected a swift humiliation. The Royal Navy ruled the waves unchallenged, and the British army had just defeated Napoleon's marshals in Spain. Yet the war produced unexpected triumphs. The USS Constitution, her live oak hull shrugging off British cannonballs, earned the immortal nickname 'Old Ironsides' and proved that American frigates could stand toe-to-toe with the finest warships afloat.\n\nAndrew Jackson's decisive victory at New Orleans — fought, ironically, after peace had already been signed at Ghent — transformed national morale. The burning of Washington was avenged, and the republic emerged with a new confidence. Whether this war should inspire a great naval tradition or a renewed spirit of national unity is the question before the nation."
 nd_usa.3.a: "Old Ironsides has shown the way — build a fleet worthy of the republic."
 nd_usa.3.b: "The republic is vindicated — let national pride forge unity."
 nd_usa.4.t: "The Monroe Doctrine"
 nd_usa.4.d: "In his 1823 annual message to Congress, President James Monroe articulated a principle that would reshape the geopolitics of the Western Hemisphere. The Americas, he declared, were no longer open to European colonization. Any attempt by Old World powers to extend their system to any portion of this hemisphere would be viewed as dangerous to American peace and safety.\n\nBacked initially more by British naval power than American strength, the Monroe Doctrine nonetheless established a bold claim: the United States would serve as the guardian of the entire Western Hemisphere. Critics saw overreach; supporters saw the natural extension of republican principles. The doctrine could serve as a shield for hemispheric defense — or as a justification for turning inward and developing the vast American interior in peace."
 nd_usa.4.a: "The Americas shall be free from European interference."
 nd_usa.4.b: "Let the Old World keep to itself, and we to ours."
 nd_usa.5.t: "The Corps of Discovery"
 nd_usa.5.d: "In May 1804, Meriwether Lewis and William Clark departed St. Louis with a party of thirty-three men, ascending the Missouri River into the unknown interior of the continent. Over the next two years, the Corps of Discovery would travel over eight thousand miles, cross the Rocky Mountains, and reach the Pacific Ocean. Along the way they documented hundreds of plant and animal species unknown to Western science, established contact with dozens of Native American nations, and produced the first accurate maps of the American interior.\n\nThe expedition opened the floodgates of westward expansion. The detailed journals of Lewis and Clark made the vast territory between the Mississippi and the Pacific tangible in the American imagination — no longer a blank space on the map, but a land of rivers, mountains, and limitless possibility."
 nd_usa.5.a: "The West is open."
 nd_usa.6.t: "The American System of Manufactures"
 nd_usa.6.d: "At the Springfield Armory in Massachusetts, a quiet revolution transformed the nature of production itself. Rather than relying on skilled craftsmen to hand-fit each component, American manufacturers pioneered the use of interchangeable parts — standardized components machined to such precise tolerances that any part could replace any other of the same type. What began with musket production spread rapidly to clocks, sewing machines, and eventually to every corner of American industry.\n\nEuropean visitors marveled at this 'American System of Manufactures,' which sacrificed the artisan's individual skill for something more powerful: the ability to produce enormous quantities of reliable, repairable goods. Combined with Eli Whitney's cotton gin and the rapid expansion of canal and road networks, American manufacturing was poised to transform the economy of a continent."
 nd_usa.6.a: "The machine age dawns."
 nd_usa_atlantic_commerce: "Atlantic Commerce"
 nd_usa_atlantic_commerce_desc: "The network of colonial trade routes linking American ports to the markets of Europe and the Caribbean, carrying tobacco, lumber, fish, and rum across the ocean."
 nd_usa_town_meeting_tradition: "Town Meeting Tradition"
 nd_usa_town_meeting_tradition_desc: "The New England practice of direct democratic governance at the local level, where free citizens gathered to debate and decide matters of community importance."
 nd_usa_colonial_militia_tradition: "Colonial Militia Tradition"
 nd_usa_colonial_militia_tradition_desc: "The colonial practice of every able-bodied man keeping arms and training with the local militia, establishing the citizen-soldier tradition that would define American military culture."
 nd_usa_triangular_trade: "Triangular Trade"
 nd_usa_triangular_trade_desc: "The three-legged commercial network connecting New England distilleries, African slave markets, and Caribbean sugar plantations — a profitable if morally fraught engine of colonial wealth."
 nd_usa_frontier_defense: "Frontier Defense"
 nd_usa_frontier_defense_desc: "The chain of fortified stockades and settlements along the western frontier, protecting settlers from raids and marking the advancing boundary of American civilization."
 nd_usa_minuteman_tradition: "Minuteman Tradition"
 nd_usa_minuteman_tradition_desc: "The elite militia tradition originating in Massachusetts, where selected men trained regularly and pledged to be ready to fight at a minute's notice in defense of liberty."
 nd_usa_colonial_shipbuilding: "Colonial Shipbuilding"
 nd_usa_colonial_shipbuilding_desc: "The shipyards of New England, blessed with abundant timber and skilled craftsmen, produced vessels that rivaled any in the world and laid the foundation for American naval power."
 nd_usa_no_taxation: "No Taxation Without Representation"
 nd_usa_no_taxation_desc: "The foundational principle of the American Revolution: that no government may levy taxes upon a people who have no voice in its deliberations."
 nd_usa_plantation_economy: "Plantation Economy"
 nd_usa_plantation_economy_desc: "The large-scale agricultural system of the Southern colonies, producing tobacco, rice, indigo, and later cotton for export to European markets."
 nd_usa_continental_congress: "Continental Congress"
 nd_usa_continental_congress_desc: "The first unified governing body of the American colonies, where delegates from thirteen separate colonies sat together to forge a common response to British tyranny."
 nd_usa_constitutional_convention: "Constitutional Convention"
 nd_usa_constitutional_convention_desc: "The gathering of America's finest political minds in Philadelphia, where the Constitution — the supreme law of the land — was debated, drafted, and signed."
 nd_usa_continental_army: "Continental Army"
 nd_usa_continental_army_desc: "The professional military force raised by the Continental Congress, trained by Baron von Steuben at Valley Forge, which fought the British Empire to a standstill and won American independence."
 nd_usa_continental_dragoons: "Continental Dragoons"
 nd_usa_continental_dragoons_desc: "The mounted troops of the Continental Army, led by officers like 'Light-Horse Harry' Lee, who served as scouts, raiders, and shock cavalry during the Revolution."
 nd_usa_six_frigates: "Original Six Frigates"
 nd_usa_six_frigates_desc: "The six heavy frigates authorized by the Naval Act of 1794 — Constitution, United States, Constellation, President, Congress, and Chesapeake — which founded the United States Navy."
 nd_usa_privateer_tradition: "Privateer Tradition"
 nd_usa_privateer_tradition_desc: "The American tradition of commissioning private vessels to wage commerce warfare against enemy shipping, which supplemented the small Continental Navy with hundreds of armed raiders."
 nd_usa_springfield_armory: "Springfield Armory"
 nd_usa_springfield_armory_desc: "The first national armory, established in 1777 at Springfield, Massachusetts, which became the center of American weapons manufacturing and the birthplace of interchangeable parts."
 nd_usa_navy_yard_tradition: "Navy Yard Tradition"
 nd_usa_navy_yard_tradition_desc: "The network of federal shipyards — Boston, Philadelphia, Norfolk, Portsmouth — where American warships were built, repaired, and fitted out for service."
 nd_usa_customs_revenue_system: "Customs Revenue System"
 nd_usa_customs_revenue_system_desc: "The system of tariffs and customs duties that Alexander Hamilton designed to fund the federal government and protect nascent American industries from foreign competition."
 nd_usa_lewis_clark_expedition: "Lewis and Clark Expedition"
 nd_usa_lewis_clark_expedition_desc: "The Corps of Discovery's epic journey from St. Louis to the Pacific Ocean, mapping the interior of the continent and opening the way for westward expansion."
 nd_usa_war_of_1812_tradition: "War of 1812 Tradition"
 nd_usa_war_of_1812_tradition_desc: "The military traditions forged in America's second war against Britain, from the naval duels of the frigates to Andrew Jackson's victory at New Orleans."
 nd_usa_monroe_doctrine: "Monroe Doctrine"
 nd_usa_monroe_doctrine_desc: "President Monroe's declaration that the Western Hemisphere was closed to further European colonization — a bold assertion of American influence over the entire New World."
 nd_usa_frontiersman_tradition: "Frontiersman Tradition"
 nd_usa_frontiersman_tradition_desc: "The tradition of the American frontiersman — Daniel Boone, Davy Crockett, and countless unnamed settlers — expert marksmen and woodsmen who tamed the wilderness with rifle and axe."
 nd_usa_american_shipbuilding: "American Shipbuilding"
 nd_usa_american_shipbuilding_desc: "The maturation of American naval construction, building warships from live oak and white pine that were the match of any European navy's finest vessels."
 nd_usa_revenue_cutter_service: "Revenue Cutter Service"
 nd_usa_revenue_cutter_service_desc: "The fleet of fast cutters established by Alexander Hamilton to enforce customs laws along the American coastline — the forerunner of the United States Coast Guard."
 nd_usa_american_system_manufactures: "American System of Manufactures"
 nd_usa_american_system_manufactures_desc: "The revolutionary production method using interchangeable parts and machine tools, pioneered at the Springfield Armory, which would transform American industry."
 nd_usa_judicial_review: "Judicial Review"
 nd_usa_judicial_review_desc: "The principle established by Chief Justice John Marshall in Marbury v. Madison that the Supreme Court has the power to strike down laws that violate the Constitution."
 nd_usa_internal_improvements: "Internal Improvements"
 nd_usa_internal_improvements_desc: "The vast program of canal construction, road building, and infrastructure investment that knit together the far-flung regions of the expanding republic."
 a_nd_usa_minuteman: "Minuteman"
 a_nd_usa_minuteman_desc: "Selected from the best men of the colonial militia, minutemen train regularly and pledge to assemble at a minute's notice. Their speed of response and knowledge of local terrain make them formidable defenders of American liberty."
 a_nd_usa_continental_line: "Continental Line Infantry"
 a_nd_usa_continental_line_desc: "The disciplined regulars of the Continental Army, trained in European linear tactics by Baron von Steuben at Valley Forge. They are the backbone of America's professional military."
 a_nd_usa_continental_dragoon: "Continental Dragoon"
 a_nd_usa_continental_dragoon_desc: "Versatile mounted troops who can fight from horseback or dismount to serve as infantry. Led by dashing cavalrymen like 'Light-Horse Harry' Lee, they excel at reconnaissance and flanking maneuvers."
 n_nd_usa_frigate: "American Frigate"
 n_nd_usa_frigate_desc: "Built with live oak frames and copper-sheathed hulls, American frigates are faster, sturdier, and more heavily armed than their European counterparts. The USS Constitution — 'Old Ironsides' — is the most famous ship of this class."
 n_nd_usa_privateer_schooner: "Privateer Schooner"
 n_nd_usa_privateer_schooner_desc: "Fast, agile schooners commissioned as privateers to prey on enemy commerce. These vessels rely on speed rather than firepower, darting in to seize prizes before heavier warships can respond."
 a_nd_usa_frontiersman: "Frontiersman Rifleman"
 a_nd_usa_frontiersman_desc: "Expert marksmen of the American frontier, armed with long rifles of remarkable accuracy. These hardy woodsmen know every trail and ford, and their devastating aimed fire can break the morale of any enemy force."
 n_nd_usa_ship_of_the_line: "American Ship of the Line"
 n_nd_usa_ship_of_the_line_desc: "A first-rate warship built in American navy yards from the finest live oak timber, mounting over a hundred guns. These vessels represent the maturation of American naval power."
 n_nd_usa_revenue_cutter: "Revenue Cutter"
 n_nd_usa_revenue_cutter_desc: "Fast, nimble cutters operated by the Revenue Marine to enforce customs laws, suppress piracy, and patrol the American coastline. The forerunner of the United States Coast Guard."
 nd_usa_town_meeting_hall: "Town Meeting Hall"
 nd_usa_town_meeting_hall_desc: "A public hall where free citizens gather to govern their community through direct democracy — debating taxes, electing officials, and passing local ordinances."
 nd_usa_colonial_warehouse: "Colonial Warehouse"
 nd_usa_colonial_warehouse_desc: "A sturdy warehouse on the waterfront, storing goods for the Atlantic trade — barrels of tobacco, bundles of fur, casks of rum — ready for loading onto merchant vessels."
 nd_usa_frontier_stockade: "Frontier Stockade"
 nd_usa_frontier_stockade_desc: "A fortified wooden enclosure on the western frontier, providing shelter for settlers during raids and serving as a base for militia operations."
 nd_usa_federal_armory: "Federal Armory"
 nd_usa_federal_armory_desc: "A national weapons manufactory producing muskets, rifles, and ammunition using standardized parts — the arsenal of the republic."
 nd_usa_navy_yard: "Federal Navy Yard"
 nd_usa_navy_yard_desc: "A government-operated shipyard for constructing, repairing, and fitting out warships of the United States Navy."
 nd_usa_customs_house: "Federal Customs House"
 nd_usa_customs_house_desc: "An imposing federal building where customs officials assess duties on imported goods — the primary source of revenue for the young republic."
 nd_usa_cotton_gin_workshop: "Cotton Gin Workshop"
 nd_usa_cotton_gin_workshop_desc: "A mechanized workshop housing Eli Whitney's cotton gin, which separates cotton fibers from their seeds with revolutionary speed, transforming Southern agriculture."
 nd_usa_federal_courthouse: "Federal Courthouse"
 nd_usa_federal_courthouse_desc: "A seat of the federal judiciary where the Constitution is interpreted and the rule of law upheld — the physical embodiment of judicial review."
 nd_usa_town_hall_upkeep: "Town Meeting Governance"
 nd_usa_town_hall_upkeep_desc: "Paper for minutes and notices, lumber for maintaining the hall, and books for the town's records and legal references."
 nd_usa_warehouse_upkeep: "Warehouse Operations"
 nd_usa_warehouse_upkeep_desc: "Lumber for crates and structural maintenance, paper for manifests and trade ledgers."
 nd_usa_stockade_upkeep: "Stockade Garrison"
 nd_usa_stockade_upkeep_desc: "Timber for palisade repairs, weaponry for the garrison, and tools for the constant maintenance of frontier fortifications."
 nd_usa_armory_production: "Armory Manufacturing"
 nd_usa_armory_production_desc: "Iron, lumber, and tools forged into standardized muskets and rifles at the national armory."
 nd_usa_navy_yard_upkeep: "Shipyard Operations"
 nd_usa_navy_yard_upkeep_desc: "Timber, naval stores, and iron consumed in the construction and repair of warships."
 nd_usa_customs_upkeep: "Customs Administration"
 nd_usa_customs_upkeep_desc: "Paper for ledgers and forms, fine cloth for the uniforms of customs officials, and tools for weighing and measuring imported goods."
 nd_usa_cotton_gin_inputs: "Cotton Processing"
 nd_usa_cotton_gin_inputs_desc: "Raw fiber is fed through iron gin mechanisms, producing cleaned cotton for the textile industry."
 nd_usa_courthouse_upkeep: "Court Administration"
 nd_usa_courthouse_upkeep_desc: "Paper for legal documents and writs, books for the law libraries essential to the federal courts, and furniture for the courtrooms and chambers."
 nd_usa_tobacco_curing: "Tobacco Curing"
 nd_usa_tobacco_curing_desc: "The slow curing of Virginia tobacco leaf in wooden barns, producing the aromatic export that built the colonial economy."
 nd_usa_rum_distilling: "Rum Distilling"
 nd_usa_rum_distilling_desc: "New England distilleries converting Caribbean sugar and molasses into rum — the fuel of the triangular trade."
 nd_usa_interchangeable_parts: "Interchangeable Parts"
 nd_usa_interchangeable_parts_desc: "Iron and coal fuel the revolutionary manufacturing technique of producing standardized firearms with interchangeable components, enabling mass production and easy repair."
 nd_usa_formed_tt: "United States has been formed"
 nd_usa_path_a_tt: "Chose Spirit of '76"
 nd_usa_path_b_tt: "Chose Manifest Destiny"
 nd_usa_path_c_tt: "Chose City upon a Hill"
 nd_usa_destiny: "American Destiny"
 nd_usa_destiny_desc: "The United States has emerged from revolution into nationhood. The question now is what destiny this republic will pursue -- continental empire from sea to shining sea, or a beacon of liberty and institutional strength that transforms the world through example."
 nd_usa_dest_frontier: "The Frontier Beckons"
 nd_usa_dest_frontier_desc: "Push beyond the Appalachians into the vast interior. Claim the Black Hills and the Texas frontier -- the first steps in a continental destiny that will not stop until the American flag flies over every horizon."
 nd_usa_dest_pacific: "Pacific Destiny"
 nd_usa_dest_pacific_desc: "The golden shores of California are within reach. Secure San Francisco Bay, build a war chest to fund the westward push, and raise an army worthy of a continental power."
 nd_usa_dest_hemisphere: "Hemispheric Hegemon"
 nd_usa_dest_hemisphere_desc: "The ultimate expression of Manifest Destiny: American dominion from the Caribbean to the Pacific Northwest. Cuba, Panama, and the Nootka Sound must all acknowledge American supremacy."
 nd_usa_dest_republic: "The Republican Experiment"
 nd_usa_dest_republic_desc: "Build a nation not through conquest but through institutions. Embrace modern banking, fill the treasury, and prove that a republic governed by laws can prosper without the sword."
 nd_usa_dest_industry: "The American Industrial Revolution"
 nd_usa_dest_industry_desc: "From cotton mills to iron foundries, American industry will rival any nation on earth. Develop the national economy, embrace the printing press, and build a civilization of unprecedented productivity."
 nd_usa_dest_beacon: "Beacon of Liberty"
 nd_usa_dest_beacon_desc: "The American experiment reaches its apex: a wealthy, innovative, scientifically advanced republic whose cotton flows through global markets and whose institutions are the envy of the world."
 nd_usa.7.t: "The Republic Endures"
 nd_usa.7.d: "Against all odds, the American experiment has survived its infancy. The Constitution holds, the states remain united, and the machinery of republican government turns with increasing confidence. Foreign powers that once dismissed this upstart nation now reckon with its growing strength.\n\nThe republic endures -- and now it must decide what manner of nation it will become."
 nd_usa.7.a: "E Pluribus Unum."
 nd_usa.8.t: "The Frontier Secured"
 nd_usa.8.d: "American settlers and soldiers have pushed deep into the continental interior. The Black Hills, sacred to the Lakota and rich in silver, now lie within the republic's grasp. In East Texas, the old Caddo settlement of Nacogdoches marks the furthest reach of American authority in the Southwest.\n\nThe frontier that once seemed impossibly distant is now the republic's backyard. But the Pacific remains a continent away, and the road westward passes through hostile territory, trackless deserts, and mountain ranges that would give pause to any army."
 nd_usa.8.a: "Westward the course of empire takes its way."
 nd_usa.9.t: "The Oregon Trail"
 nd_usa.9.d: "The American flag flies over San Francisco Bay -- the golden gate to the Pacific. Wagon trains, gold seekers, and settlers have carved trails across the continent, and what was once a journey of impossible distance is now a well-trodden path.\n\nThe discovery of gold in California has ignited a frenzy that could reshape the nation's economy overnight -- but at the cost of inflation and speculative excess. Alternatively, the Pacific ports could become the foundation of a great maritime trading network, connecting American commerce to the vast markets of Asia."
 nd_usa.9.a: "Gold! There's gold in them hills!"
 nd_usa.9.b: "The Pacific is America's new frontier of commerce."
 nd_usa.10.t: "Colossus of the New World"
 nd_usa.10.d: "From Cuba to Nootka Sound, from the Panama isthmus to the Great Plains, the American republic has established unquestioned dominance over the Western Hemisphere. No European power dares challenge American supremacy in these waters or on this continent.\n\nThis hemispheric hegemony can serve different purposes. The republic can become the arsenal of democracy -- a nation of citizen-soldiers ready to mobilize at a moment's notice, its garrisons and factories the shield of freedom. Or it can project power through gunboat diplomacy, its warships and intelligence networks compelling compliance from any who would defy American interests."
 nd_usa.10.a: "The republic arms itself for any challenge."
 nd_usa.10.b: "American warships will enforce our will."
 nd_usa.11.t: "The Republican Experiment"
 nd_usa.11.d: "The American experiment in self-governance has passed its first great test. Sound financial institutions, a growing treasury, and the embrace of modern banking have given the young republic an economic foundation that commands respect abroad.\n\nLiteracy spreads through the common schools, and the rule of law extends to every corner of the nation. This is no fragile revolutionary state but a functioning republic that proves, year by year, that government of the people need not be government of the mob."
 nd_usa.11.a: "The experiment succeeds."
 nd_usa.12.t: "The American Industrial Revolution"
 nd_usa.12.d: "American factories and workshops have transformed the economic landscape of the republic. From the textile mills of New England to the iron foundries of Pennsylvania, a new industrial civilization is being forged in the heat of the furnace and the rhythm of the machine.\n\nThis industrial revolution can take different forms. The factory system emphasizes innovation, education, and cultural development -- building a civilization of unprecedented sophistication. Or the nation can invest in internal improvements -- canals, turnpikes, and later railroads -- knitting together a vast territory and integrating diverse peoples into a single national market."
 nd_usa.12.a: "American ingenuity will transform the world."
 nd_usa.12.b: "Build the canals and roads that bind the nation."
 nd_usa.13.t: "Beacon of Liberty"
 nd_usa.13.d: "The American republic has achieved something no nation in history has managed: a wealthy, innovative, scientifically advanced democracy that leads the world not through conquest but through the power of its example. Cotton flows through global markets, institutions of learning produce discoveries that reshape human understanding, and the world's oppressed look to America as proof that freedom works.\n\nThis beacon can illuminate the world in different ways. An arsenal of knowledge -- universities, research institutions, and military academies that produce the finest minds and most capable officers in the world. Or a diplomatic paragon -- a nation whose moral authority and tolerance draw the admiration of peoples everywhere, whose diplomats are welcomed in every court."
 nd_usa.13.a: "Knowledge is the truest form of power."
 nd_usa.13.b: "Let America's example inspire the world."
 STATIC_MODIFIER_NAME_nd_usa_dest_gold_rush: "Gold Rush Fever"
 STATIC_MODIFIER_DESC_nd_usa_dest_gold_rush: "The discovery of gold has drawn fortune-seekers from across the world. Boomtowns spring up overnight, and the rush of wealth -- however speculative -- fuels rapid expansion into new territory."
 STATIC_MODIFIER_NAME_nd_usa_dest_pacific_trade: "Pacific Commerce"
 STATIC_MODIFIER_DESC_nd_usa_dest_pacific_trade: "American clipper ships and merchantmen ply the Pacific, opening trade routes to Asia and establishing the republic as a maritime power of the first order."
 STATIC_MODIFIER_NAME_nd_usa_dest_arsenal_democracy: "Arsenal of Democracy"
 STATIC_MODIFIER_DESC_nd_usa_dest_arsenal_democracy: "The republic mobilizes its vast industrial and demographic resources, building garrisons across the hemisphere and maintaining a military establishment that can deploy anywhere at a moment's notice."
 STATIC_MODIFIER_NAME_nd_usa_dest_gunboat_diplomacy: "Gunboat Diplomacy"
 STATIC_MODIFIER_DESC_nd_usa_dest_gunboat_diplomacy: "American warships patrol every sea lane of the Western Hemisphere. The republic's intelligence networks and naval firepower compel compliance from any power that threatens American interests."
 STATIC_MODIFIER_NAME_nd_usa_dest_factory_system: "Factory System"
 STATIC_MODIFIER_DESC_nd_usa_dest_factory_system: "The systematic application of machinery and division of labor has made American manufacturing the marvel of the industrial age. Cultural refinement follows economic progress as the republic builds a civilization worthy of its ideals."
 STATIC_MODIFIER_NAME_nd_usa_dest_internal_canals: "Internal Improvements"
 STATIC_MODIFIER_DESC_nd_usa_dest_internal_canals: "A vast network of canals, turnpikes, and improved roads binds together the far-flung regions of the republic. Integration and diplomacy take precedence over military adventures."
 STATIC_MODIFIER_NAME_nd_usa_dest_arsenal_knowledge: "Arsenal of Knowledge"
 STATIC_MODIFIER_DESC_nd_usa_dest_arsenal_knowledge: "American universities and military academies produce officers, engineers, and scientists of the highest caliber. The republic's institutional legitimacy is unquestioned, and its military tactics reflect the finest professional education."
 STATIC_MODIFIER_NAME_nd_usa_dest_diplomatic_paragon: "Diplomatic Paragon"
 STATIC_MODIFIER_DESC_nd_usa_dest_diplomatic_paragon: "The American republic leads by moral example. Its tolerance, its diplomats, and the efficient maintenance of its fleet demonstrate that a free people can govern themselves with wisdom and strength."
 nd_usa_west_point_academy: "West Point Academy"
 nd_usa_west_point_academy_desc: "The United States Military Academy at West Point, training the officer corps of the republic in the arts of war, fortification, and military engineering."
 nd_usa_land_grant_college: "Land-Grant College"
 nd_usa_land_grant_college_desc: "A public institution of higher learning endowed with federal land grants, teaching agriculture, engineering, and the mechanical arts to the citizens of the expanding republic."
 nd_usa_west_point_upkeep: "Academy Operations"
