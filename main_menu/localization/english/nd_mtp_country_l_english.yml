l_english:
 MTP: "Mutapa"
 MTP_ADJ: "Mutapan"
 MTP_f: "Mutapa Empire"
 MTP_f_desc: "The Kingdom of Mutapa was founded by Nyatsimba Mutota when the Karanga Shona expanded northward from Great Zimbabwe to the Zambezi valley in search of salt and new lands. At its height, Mutapa controlled the gold trade of southeastern Africa, channeling the wealth of the interior through Sofala to merchants on the Swahili Coast. To restore the Mutapa is to reunite the Shona heartland and reclaim mastery over the region's legendary riches."
