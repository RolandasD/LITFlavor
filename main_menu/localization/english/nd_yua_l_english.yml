l_english:
 STATIC_MODIFIER_NAME_nd_yua_six_tumen_order: "Order of the Six Tumen"
 STATIC_MODIFIER_DESC_nd_yua_six_tumen_order: "Dayan Khan's reorganization of the eastern Mongol tribes into six tumen divisions has restored centralized military command across the steppe. Each tumen answers to a Borjigin prince, but all answer to the Great Khan."
 STATIC_MODIFIER_NAME_nd_yua_borjigin_autonomy: "Borjigin Autonomy"
 STATIC_MODIFIER_DESC_nd_yua_borjigin_autonomy: "Rather than impose rigid centralization, the Great Khan has granted his Borjigin kinsmen wide latitude to govern their own domains. This confederation of princes, bound by blood and loyalty rather than bureaucratic hierarchy, preserves the steppe tradition of consensual rule."
 STATIC_MODIFIER_NAME_nd_yua_dharma_raja: "Dharma Raja of the Steppe"
 STATIC_MODIFIER_DESC_nd_yua_dharma_raja: "The adoption of Tibetan Buddhism as the state religion has transformed the spiritual landscape of the Mongol world. Monasteries rise across the steppe, and the bond between lama and khan legitimizes rule through both spiritual and temporal authority."
 STATIC_MODIFIER_NAME_nd_yua_tengrism_endures: "Tengrism Endures"
 STATIC_MODIFIER_DESC_nd_yua_tengrism_endures: "The old ways of the Eternal Blue Sky have not been abandoned. While foreign religions have their place, the Mongol warrior tradition draws its strength from the reverence of Tengri, the open sky, and the spirits of the ancestors."
 nd_yua.1.t: "The Restoration of the Six Tumen"
 nd_yua.1.d: "In the late fifteenth century, a young prince of the Borjigin lineage emerged from obscurity to reunite the fractured Mongol tribes. Taking the name Dayan Khan — 'Khan of the Great Yuan' — Batumongke subdued rival clans and reorganized the eastern Mongol tribes into six tumen, each a division of ten thousand warriors divided between left and right wings. With the warrior queen Mandukhai Khatun fighting at his side, Dayan Khan crushed the Oirat confederacy and restored a measure of unity not seen since the fall of Dadu.\n\nThe question now is how this restored order should be governed. Centralized command under the Great Khan's direct authority would forge a disciplined military machine — but the steppe has always been governed by consensus among equals, and the Borjigin princes expect autonomy over their own tumen.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_yua.1.a: "The Six Tumen shall answer to one Khan alone."
 nd_yua.1.b: "Let each prince govern his own domain in the Borjigin way."
 nd_yua.2.t: "The Meeting at Chabchiyal"
 nd_yua.2.d: "In 1578, Altan Khan of the Tumed Mongols invited the Third Dalai Lama, Sonam Gyatso, to a historic meeting at Chabchiyal. The encounter transformed both parties: Altan Khan bestowed the title 'Dalai Lama' upon Sonam Gyatso, who in turn recognized the Mongol ruler as a reincarnation of Kublai Khan. This exchange of legitimacy — temporal power sanctifying spiritual authority, spiritual authority sanctifying temporal power — set in motion the mass conversion of the Mongols to Tibetan Buddhism.\n\nMonasteries began to appear across the steppe, monks replaced shamans as spiritual advisors to the nobility, and the violent customs of traditional nomadic life softened under Buddhist influence. Yet not all welcomed this transformation. The old Tengrist traditions ran deep in the blood of the steppe warriors, and some saw the new religion as a foreign imposition that would drain the martial spirit of the Mongol nation."
 nd_yua.2.a: "The Dharma shall illuminate the steppe."
 nd_yua.2.b: "The Eternal Blue Sky needs no replacement."
 nd_yua.3.t: "The Defiance of Ligdan Khan"
 nd_yua.3.d: "Ligdan Khan, the last to bear the title of Great Khan of the Mongols, has raised his Chakhar warriors in desperate defiance against the rising Manchu power. With his corps of three hundred baaturs — elite warriors sworn to personal loyalty — Ligdan has attempted to centralize authority over the fractious Mongol tumen, even as one tribe after another defects to the banner of Hong Taiji.\n\nThe contest is unequal: the Manchu combine Mongol cavalry traditions with Chinese administrative efficiency, while Ligdan's harsh centralization drives his own allies into enemy arms. Yet his defiance represents the last assertion of independent Mongol sovereignty — a refusal to accept that the legacy of Genghis Khan has passed to foreign hands."
 nd_yua.3.a: "The blood of Genghis Khan does not bend the knee."
 nd_yua.4.t: "The Horse-Tea Trade"
 nd_yua.4.d: "After decades of raids and reprisals, an accommodation has been reached between the steppe and the settled world. Border markets have opened where Mongol horses, furs, and hides are exchanged for Chinese tea, silk, and grain. The Ming call it 'tribute trade' to preserve face; the Mongols call it what it is — commerce between equals.\n\nThe horse-tea trade transforms the economy of the steppe. Where once the only way to acquire Chinese goods was through plunder, now Mongol herders can trade their surplus livestock for the commodities that make steppe life bearable. Tea in particular has become a staple — without it, the monotonous diet of meat and dairy is nearly unendurable."
 nd_yua.4.a: "Trade enriches both the steppe and the farmland."
 nd_yua_keshig_tradition: "Keshig Tradition"
 nd_yua_keshig_tradition_desc: "The keshig — the imperial bodyguard established by Genghis Khan himself — served as both personal guard and training school for the Mongol elite. Drawn from the sons of loyal vassals, keshig warriors received the finest equipment and training."
 nd_yua_imperial_relay: "Imperial Relay Network"
 nd_yua_imperial_relay_desc: "The yam postal relay system that once connected the vast Mongol Empire continues to function, carrying messages and officials across the steppe with remarkable speed."
 nd_yua_dual_administration: "Dual Administration"
 nd_yua_dual_administration_desc: "The Yuan combined Mongol tribal governance with Chinese bureaucratic administration, creating a hybrid system where the Privy Council managed military affairs while the Central Secretariat handled civil matters."
 nd_yua_great_yuan_mandate: "Great Yuan Mandate"
 nd_yua_great_yuan_mandate_desc: "The claim to the dynastic name of the Great Yuan — Da Yuan — carries the weight of Kublai Khan's legacy and the mandate to rule all under heaven."
 nd_yua_border_provisioning: "Border Provisioning"
 nd_yua_border_provisioning_desc: "Granaries and supply depots along the steppe-agrarian frontier ensure that nomadic populations can weather harsh winters and sustain military campaigns."
 nd_yua_genghisid_legitimacy: "Genghisid Legitimacy"
 nd_yua_genghisid_legitimacy_desc: "Among the Mongols, only descendants of Genghis Khan through his son Jochi, Chagatai, Ogedei, or Tolui may hold the title of khan. This Genghisid principle is the bedrock of Northern Yuan political legitimacy."
 nd_yua_tammachi_garrisons: "Tammachi Garrisons"
 nd_yua_tammachi_garrisons_desc: "The tammachi were garrison forces stationed in conquered territories, a blend of Mongol military discipline and local recruitment that provided permanent defensive capability."
 nd_yua_silk_road_tribute: "Silk Road Tribute"
 nd_yua_silk_road_tribute_desc: "Control over sections of the ancient Silk Road trade routes allows the Northern Yuan to extract tribute from passing caravans, sustaining the treasury even as territorial holdings shrink."
 nd_yua_khubilai_bureaucracy: "Khubilai's Bureaucracy"
 nd_yua_khubilai_bureaucracy_desc: "The administrative machinery established by Kublai Khan, adapted from Chinese models, persists in the Yuan governing tradition — census-taking, tax collection, and provincial administration by appointed officials."
 nd_yua_chao_currency: "Chao Currency System"
 nd_yua_chao_currency_desc: "The Yuan dynasty pioneered the use of paper currency — the chao — backed by imperial decree rather than precious metal. This innovation, radical for its time, facilitated trade across the vast Mongol domains."
 nd_yua_composite_bow_workshops: "Composite Bow Workshops"
 nd_yua_composite_bow_workshops_desc: "The Mongol composite bow, crafted from layers of horn, sinew, and wood, remains the deadliest ranged weapon of the steppe. Specialized workshops ensure a steady supply of these weapons."
 nd_yua_imperial_court_culture: "Imperial Court Culture"
 nd_yua_imperial_court_culture_desc: "The Yuan court blended Mongol, Chinese, Tibetan, and Persian cultural traditions into a cosmopolitan synthesis unmatched in the medieval world."
 nd_yua_yuan_heavy_cavalry: "Yuan Heavy Cavalry"
 nd_yua_yuan_heavy_cavalry_desc: "Building on both Mongol horsemanship and Chinese cataphract traditions, the Yuan heavy cavalry combines the mobility of steppe warfare with the shock power of armored lancers."
 nd_yua_steppe_retreat: "Steppe Retreat Tactics"
 nd_yua_steppe_retreat_desc: "After losing China, the Northern Yuan perfected the art of strategic withdrawal into the vast steppe, using the endless grasslands as both shield and sanctuary."
 nd_yua_dayan_khan_revival: "Dayan Khan's Revival"
 nd_yua_dayan_khan_revival_desc: "Batumongke Dayan Khan's reunification of the Mongol tribes in the late fifteenth century restored centralized authority and military effectiveness to the fragmented steppe confederation."
 nd_yua_six_tumen_reform: "Six Tumen Reform"
 nd_yua_six_tumen_reform_desc: "The reorganization of the eastern Mongol tribes into six tumen — the Three Left Wing (Chakhar, Khalkha, Uriyangkhan) and Three Right Wing (Ordos, Tumed, Yongshebu) — restored the decimal military system of Genghis Khan."
 nd_yua_horse_tea_trade: "Horse-Tea Trade"
 nd_yua_horse_tea_trade_desc: "The formalized exchange of Mongol horses for Chinese tea became the economic lifeline of the Northern Yuan, replacing raiding with regular commerce at designated border markets."
 nd_yua_mongol_script_revival: "Mongol Script Revival"
 nd_yua_mongol_script_revival_desc: "The revival and standardization of the traditional Mongolian vertical script preserves the literary heritage of the steppe peoples, from the Secret History of the Mongols to Buddhist sutras."
 nd_yua_gelugpa_conversion: "Gelugpa Conversion"
 nd_yua_gelugpa_conversion_desc: "The adoption of Tibetan Buddhism's Gelugpa (Yellow Hat) school as the dominant religion of the Mongols, catalyzed by Altan Khan's historic meeting with the Third Dalai Lama in 1578."
 nd_yua_khorchin_alliance: "Khorchin Alliance"
 nd_yua_khorchin_alliance_desc: "The Khorchin Mongols, dwelling on the eastern plains, served as crucial military allies — their light cavalry scouts providing intelligence and screening forces for the main army."
 nd_yua_steppe_law_code: "Steppe Law Code"
 nd_yua_steppe_law_code_desc: "Building on the Yasa of Genghis Khan, later Northern Yuan rulers codified steppe customary law into formal legal codes governing property, marriage, and criminal justice."
 nd_yua_altan_khan_diplomacy: "Altan Khan's Diplomacy"
 nd_yua_altan_khan_diplomacy_desc: "Altan Khan's diplomatic opening with the Ming dynasty in 1571 ended decades of border warfare and established regular trade relations, proving that the pen could achieve what the sword could not."
 nd_yua_dharma_patronage: "Dharma Patronage"
 nd_yua_dharma_patronage_desc: "Royal patronage of Buddhist monasteries and scholars created centers of learning across the steppe, where monks translated scriptures, practiced medicine, and preserved astronomical knowledge."
 nd_yua_tumen_commanders: "Tumen Commanders"
 nd_yua_tumen_commanders_desc: "The tradition of appointing proven warriors as tumen commanders — leaders of ten thousand — ensured that military command remained tied to demonstrated competence on the battlefield."
 nd_yua_chakhar_baaturs: "Chakhar Baaturs"
 nd_yua_chakhar_baaturs_desc: "The baaturs — champion warriors — of the Chakhar formed the personal guard of Ligdan Khan, the last Great Khan of the Mongols. Three hundred strong, they were the finest horsemen and fighters of the steppe."
 nd_yua_ligdan_centralization: "Ligdan's Centralization"
 nd_yua_ligdan_centralization_desc: "Ligdan Khan's attempt to restore direct imperial authority over all Mongol tribes through appointed officials and centralized taxation — a bold but ultimately divisive reform."
 nd_yua_last_khan_defiance: "Last Khan's Defiance"
 nd_yua_last_khan_defiance_desc: "Even as the Manchu threat grows and allies defect, the fighting spirit of the last Mongol khans refuses to yield. Every battle lost only strengthens the resolve to resist."
 nd_yua_nomadic_adaptation: "Nomadic Adaptation"
 nd_yua_nomadic_adaptation_desc: "The centuries of Northern Yuan existence proved that nomadic economies could adapt and thrive, incorporating trade goods and agricultural products into the traditional pastoral cycle."
 nd_yua_great_seal_preservation: "Preservation of the Great Seal"
 nd_yua_great_seal_preservation_desc: "The jade seal of the Great Yuan dynasty — a physical symbol of the imperial mandate — was preserved by successive khans as proof that the legitimate dynasty endured on the steppe."
 nd_yua_steppe_modernization: "Steppe Modernization"
 nd_yua_steppe_modernization_desc: "Contact with neighboring civilizations and internal pressures drive reforms in manufacturing and production, adapting settled technologies to the needs of the steppe economy."
 nd_yua_chinggisid_renaissance: "Chinggisid Renaissance"
 nd_yua_chinggisid_renaissance_desc: "A cultural revival celebrating the heritage of Genghis Khan and the Great Mongol Empire — in literature, law, and the arts — as the foundation of a distinct Mongol national identity."
 nd_yua_eternal_mandate: "Eternal Mandate"
 nd_yua_eternal_mandate_desc: "The Great Yuan mandate, transmitted through the Borjigin bloodline from Genghis Khan to the present day, is not merely a political claim but a cosmic truth — the Eternal Blue Sky chose this lineage to rule."
 nd_yua_cavalry_reformation: "Cavalry Reformation"
 nd_yua_cavalry_reformation_desc: "The ancient cavalry traditions of the steppe are reformed for the modern era, integrating new tactics and training methods while preserving the core Mongol advantages of mobility and archery."
 nd_yua_great_yuan_legacy: "Great Yuan Legacy"
 nd_yua_great_yuan_legacy_desc: "The legacy of the Great Yuan — an empire that once stretched from Korea to Hungary — endures as an inspiration and aspiration for the Mongol nation."
 a_nd_yua_keshig_guard: "Keshig Guard"
 a_nd_yua_keshig_guard_desc: "The elite imperial bodyguard of the Great Khan, the keshig are drawn from the sons of loyal Borjigin nobles and trained in both mounted archery and heavy cavalry combat. Their loyalty is absolute."
 a_nd_yua_yuan_lancer: "Yuan Lancer"
 a_nd_yua_yuan_lancer_desc: "Armored heavy cavalry combining Mongol horsemanship with Chinese cataphract traditions. These lancers carry both lance and composite bow, capable of devastating charges followed by mounted archery."
 a_nd_yua_chakhar_baatur: "Chakhar Baatur"
 a_nd_yua_chakhar_baatur_desc: "The baaturs — champion warriors — of the Chakhar tribe, serving as the personal guard of the last Great Khan. Ferocious in attack and unshakeable in defense, they embody the last flame of Mongol independence."
 a_nd_yua_tammachi: "Tammachi"
 a_nd_yua_tammachi_desc: "Garrison troops drawn from settled Mongol-Chinese border populations. The tammachi combine infantry discipline with knowledge of local terrain, defending the frontier between steppe and farmland."
 a_nd_yua_khorchin_scout: "Khorchin Scout"
 a_nd_yua_khorchin_scout_desc: "Light cavalry from the eastern Khorchin Mongols, masters of scouting, raiding, and the feigned retreat. They ride the fleetest horses and strike where the enemy least expects."
 nd_yua_yam_station: "Imperial Yam Station"
 nd_yua_yam_station_desc: "A relay post in the yam system — the Mongol Empire's network of staging points that enabled messages and officials to cross the steppe at extraordinary speed."
 nd_yua_secretariat: "Yuan Secretariat"
 nd_yua_secretariat_desc: "An administrative bureau adapted from the Chinese Zhongshu Sheng, staffed by literate officials who manage civil affairs, taxation, and census records in the Yuan tradition."
 nd_yua_steppe_granary: "Steppe Granary"
 nd_yua_steppe_granary_desc: "Food storage facilities on the steppe-agrarian frontier, ensuring that nomadic populations and garrison forces can survive harsh winters and sustain military operations."
 nd_yua_tibetan_temple: "Tibetan Buddhist Temple"
 nd_yua_tibetan_temple_desc: "A monastery of the Gelugpa school, where Tibetan monks teach the Dharma to Mongol converts. These temples serve as centers of literacy, medicine, and cultural exchange."
 nd_yua_border_market: "Border Trading Post"
 nd_yua_border_market_desc: "A designated market on the steppe-agrarian frontier where Mongol horses, furs, and hides are exchanged for Chinese tea, silk, and grain."
 nd_yua_yam_upkeep: "Yam Relay Upkeep"
 nd_yua_yam_upkeep_desc: "Fresh horses, livestock, and tools to maintain the imperial relay network — replacing worn mounts, provisioning riders, and keeping the post stations in repair."
 nd_yua_secretariat_staff: "Secretariat Administration"
 nd_yua_secretariat_staff_desc: "Paper, inks, and fine cloth for the robes of office — the supplies and formal dress required for the bureaucratic operations of the Yuan administrative system."
 nd_yua_grain_storage: "Grain Reserve Management"
 nd_yua_grain_storage_desc: "Stockpiling grain, timber, and tools for the steppe granary system — maintaining the structures and managing the reserves that sustain frontier populations through harsh winters."
 nd_yua_temple_offerings: "Temple Offerings"
 nd_yua_temple_offerings_desc: "Silk, dyes, incense, and paper offered to the Buddhist monasteries — silks for altar hangings, pigments for thangka paintings, incense for rituals, and paper for the copying of sutras."
 nd_yua_horse_tea_exchange: "Horse-Tea Exchange"
 nd_yua_horse_tea_exchange_desc: "The regular exchange of steppe horses and livestock for Chinese tea, with paper used for trade records and agreements — the lifeblood of the border economy between nomad and farmer."
 levy_nd_yua_tammachi: "Tammachi Garrison Levy"
 levy_nd_yua_tammachi_desc: "Garrison infantry drawn from border settlements, combining Mongol martial traditions with local defensive knowledge."
 levy_nd_yua_khorchin_scout: "Khorchin Scout Levy"
 levy_nd_yua_khorchin_scout_desc: "Light cavalry scouts from the Khorchin tribes, raised through traditional Mongol levy obligations."
 nd_yua_formed_tt: "Yuan has been formed"
 nd_yua_path_a_tt: "Chose Order of the Six Tumen"
 nd_yua_path_b_tt: "Chose Borjigin Autonomy"
