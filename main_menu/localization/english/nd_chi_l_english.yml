l_english:
 STATIC_MODIFIER_NAME_nd_chi_celestial_authority: "Celestial Authority"
 STATIC_MODIFIER_DESC_nd_chi_celestial_authority: "The Son of Heaven rules All Under Heaven. The Mandate restored, the Imperial bureaucracy reaches into every province, every prefecture, every village. The examination halls fill with scholars, the censors root out corruption, and the authority of the Dragon Throne radiates outward like the sun itself. All peoples within the realm bend toward the center."
 STATIC_MODIFIER_NAME_nd_chi_maritime_ascendancy: "Maritime Ascendancy"
 STATIC_MODIFIER_DESC_nd_chi_maritime_ascendancy: "The treasure fleets of the Middle Kingdom sail forth once more, their sails darkening the horizon from the South China Sea to the coasts of Africa. The shipyards of Nanjing and Longjiang thunder with construction, the merchants of Canton and Quanzhou grow fat on the profits of the maritime silk road, and the Dragon Banner flies over harbors that have never seen its like."
 nd_chi.1.t: "The Mandate Restored"
 nd_chi.1.d: "The fractured lands of China are united once more beneath a single sovereign. The Mandate of Heaven, that ancient compact between ruler and cosmos, has passed to a dynasty that has proven its worthiness through conquest and governance alike. The Middle Kingdom stands restored — but the question of how to wield this immense power remains.\n\nThe bureaucratic traditions of millennia offer one path: perfect the imperial administration, extend the examination system, draw all authority to the Dragon Throne. The tributary states will acknowledge celestial supremacy, and the realm will be governed by scholars trained in the classics.\n\nBut the seas call with a different promise. The shipyards of the coast can launch fleets that dwarf anything the world has seen. The maritime silk road carries porcelain, silk, and tea to every shore. China's wealth need not stop at its borders — it can flow outward on the tide.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_chi.1.a: "The Dragon Throne commands All Under Heaven"
 nd_chi.1.b: "Let the treasure fleets carry our civilization to every shore"
 nd_chi.2.t: "The Divine Machine Battalion"
 nd_chi.2.d: "The Shenjiying — the Divine Machine Battalion — represents a revolution in military organization. Founded to harness the devastating potential of gunpowder weapons that China itself invented, this elite formation combines arquebusiers, rocketers, and cannoneers into a disciplined fighting force unlike anything the world has seen.\n\nThe fire lance, the world's first gunpowder weapon, was a Chinese invention. Now its descendants — the hand cannon, the matchlock, the volley gun — are organized into permanent military divisions with standardized equipment and regular drill. The Huolongjing, the Fire Dragon Manual, codifies these weapons and their tactical employment. The question is whether to commit fully to this firearms revolution or to maintain it as one tool among many."
 nd_chi.2.a: "The Shenjiying shall be the vanguard of our armies"
 nd_chi.2.b: "A worthy addition to our military tradition"
 nd_chi.3.t: "The Single Whip Reform"
 nd_chi.3.d: "The grand minister Zhang Juzheng has proposed a sweeping transformation of the imperial tax system. The current maze of land taxes, labor obligations, and tribute payments — levied in grain, silk, silver, and corvee labor across dozens of separate categories — would be consolidated into a single silver payment. The fish-scale registers will be redrawn, the land resurveyed, and the gentry's tax evasion confronted directly.\n\nThe numbers speak for themselves: silver revenues could nearly triple within a decade. But this reform strikes at the privileges of the landed gentry, the very class that staffs the bureaucracy. And tying all taxation to silver makes the empire dependent on the flow of foreign silver through maritime trade — a vulnerability that could prove dangerous if that flow is ever disrupted."
 nd_chi.3.a: "Implement the Single Whip across all provinces"
 nd_chi.3.b: "The reform is sound in principle"
 nd_chi.4.t: "The Self-Strengthening Movement"
 nd_chi.4.d: "The humiliations of recent decades have made one thing painfully clear: the Middle Kingdom's military technology has fallen behind the Western barbarians. A coalition of reform-minded officials — Li Hongzhang, Zeng Guofan, Zuo Zongtang — advocate a program of selective modernization. 'Chinese learning for the essential principles, Western learning for practical application,' they argue.\n\nThe Jiangnan Arsenal in Shanghai, the Fuzhou Shipyard, the Tianjin Military Academy — these institutions represent a new China, one that masters foreign technology without abandoning its own civilization. But conservatives at court question whether Western methods can be adopted without Western ideas following close behind. Can the empire modernize its arms while preserving the Confucian order?"
 nd_chi.4.a: "Adopt Western methods — the empire must be strong"
 nd_chi.4.b: "Preserve the essential principles of our civilization"
 STATIC_MODIFIER_NAME_nd_chi_shenjiying_legacy: "Legacy of the Shenjiying"
 STATIC_MODIFIER_DESC_nd_chi_shenjiying_legacy: "The Divine Machine Battalion's innovations in gunpowder warfare continue to influence Chinese military doctrine."
 STATIC_MODIFIER_NAME_nd_chi_single_whip_efficiency: "Single Whip Efficiency"
 STATIC_MODIFIER_DESC_nd_chi_single_whip_efficiency: "The consolidation of taxes into a single silver payment has streamlined revenue collection across the empire."
 STATIC_MODIFIER_NAME_nd_chi_self_strengthening_momentum: "Self-Strengthening Momentum"
 STATIC_MODIFIER_DESC_nd_chi_self_strengthening_momentum: "The arsenals and academies of the Self-Strengthening Movement drive rapid modernization of Chinese industry and military."
 STATIC_MODIFIER_NAME_nd_chi_yangwu_traditionalism: "Yangwu Traditionalism"
 STATIC_MODIFIER_DESC_nd_chi_yangwu_traditionalism: "The preservation of Confucian principles alongside selective modernization sustains the cultural authority of the Middle Kingdom."
 nd_chi_junk_tradition: "Junk Tradition"
 nd_chi_junk_tradition_desc: "China's maritime heritage stretches back millennia. The ocean-going junk — with its watertight compartments, balanced rudder, and battened sails — is the most advanced vessel of its age. From the Song dynasty's naval victories to the coastal trade routes, Chinese shipbuilding represents an unbroken tradition of maritime engineering."
 nd_chi_keju_system: "Keju Examination System"
 nd_chi_keju_system_desc: "The imperial examination system selects officials through rigorous testing of classical learning, literary composition, and policy analysis. This meritocratic institution, refined over centuries, produces a governing class of scholar-bureaucrats whose loyalty runs to the throne rather than to regional lords."
 nd_chi_silk_weaving: "Silk Weaving Tradition"
 nd_chi_silk_weaving_desc: "Chinese silk production, perfected over four millennia, remains unmatched anywhere in the world. The state-sponsored weaving workshops of Suzhou, Hangzhou, and Nanjing produce fabrics of extraordinary quality that command premium prices on every trade route from the steppe to the Mediterranean."
 nd_chi_treasure_fleet: "Treasure Fleet"
 nd_chi_treasure_fleet_desc: "The grand shipyards of Longjiang and Nanjing launch the largest vessels the world has ever seen. The treasure fleet — hundreds of ships carrying thousands of sailors and soldiers — projects Chinese power across the Indian Ocean, from Southeast Asia to the coast of Africa."
 nd_chi_naval_levy: "Naval Levy System"
 nd_chi_naval_levy_desc: "The coastal populations of Fujian, Zhejiang, and Guangdong provide experienced sailors and shipwrights for the imperial navy. These maritime communities, with their generations of seafaring tradition, form the backbone of China's naval power."
 nd_chi_imperial_kilns: "Imperial Kilns"
 nd_chi_imperial_kilns_desc: "The imperial porcelain factory at Jingdezhen, established under the Hongwu Emperor, transforms the city into the porcelain capital of the world. Directly administered by the court, the kilns produce wares of unparalleled quality — a single imperial order can demand hundreds of thousands of pieces."
 nd_chi_yongle_grandeur: "Yongle Grandeur"
 nd_chi_yongle_grandeur_desc: "The Yongle Emperor's ambitious construction program — the Forbidden City, the restoration of the Grand Canal, the expansion of Beijing — represents the most concentrated burst of imperial construction since the Qin dynasty. These projects reshape the physical landscape of China itself."
 nd_chi_divine_machine: "Divine Machine Battalion"
 nd_chi_divine_machine_desc: "The Shenjiying, one of the three elite divisions of the capital garrison, is devoted entirely to firearms operations. Armed with hand cannons, multiple rocket launchers, and proto-muskets described in the Huolongjing, these troops represent the cutting edge of gunpowder warfare."
 nd_chi_firearm_levies: "Firearm Levies"
 nd_chi_firearm_levies_desc: "The success of the Shenjiying model inspires the extension of firearms training to the broader levy system. Provincial garrisons increasingly equip their troops with gunpowder weapons, creating a nationwide reserve of trained firearms operators."
 nd_chi_haijin_defense: "Haijin Coastal Defense"
 nd_chi_haijin_defense_desc: "The Haijin maritime prohibition policy, whatever its effects on trade, drives the construction of an extensive coastal defense network. Fortified watchtowers, naval patrol stations, and garrison posts line the coast from Liaodong to Guangdong, forming a defensive chain against wokou pirates and foreign intruders."
 nd_chi_canal_mastery: "Grand Canal Mastery"
 nd_chi_canal_mastery_desc: "The restored Grand Canal, stretching over 1,700 kilometers from Hangzhou to Beijing, is the longest artificial waterway in the world. Millions of laborers maintain its locks, embankments, and feeder channels. This engineering marvel binds north and south China together, carrying grain, silk, and porcelain to the capital and knitting the empire's economy into a single fabric."
 nd_chi_single_whip_reform: "Single Whip Reform"
 nd_chi_single_whip_reform_desc: "Zhang Juzheng's sweeping tax reform consolidates the bewildering array of Ming-era taxes — land tax, labor service, local levies, tribute obligations — into a single payment in silver. Comprehensive land surveys, the redrawn fish-scale registers, and direct silver collection nearly triple state revenues within a decade."
 nd_chi_fuchuan_warship: "Fuchuan Warship"
 nd_chi_fuchuan_warship_desc: "The fuchuan — the 'blessed ship' — is the backbone of the Chinese ocean-going navy. These large, flat-bottomed vessels carry heavy armament, accommodate large crews, and can navigate both coastal shallows and open ocean. Armed with bronze cannons and fire arrows, the fuchuan represents Chinese naval power in the age of sail."
 nd_chi_porcelain_trade: "Porcelain Trade Dominance"
 nd_chi_porcelain_trade_desc: "Chinese porcelain — 'white gold' to the Europeans who covet it — dominates global luxury trade. The kilns of Jingdezhen produce millions of pieces annually, exported through Canton and the maritime silk road to markets in Japan, Southeast Asia, the Middle East, and Europe. No competitor can match the quality, scale, or variety of Chinese ceramic production."
 nd_chi_mandarin_duck: "Mandarin Duck Formation"
 nd_chi_mandarin_duck_desc: "General Qi Jiguang's innovative twelve-man 'mandarin duck' formation combines pikemen, swordsmen, shieldmen, and wolf-brush wielders into a flexible tactical unit designed to counter the fast-moving wokou raiders. This combined-arms approach, codified in Qi's military treatises, represents a new standard of tactical sophistication."
 nd_chi_canton_system: "Canton System"
 nd_chi_canton_system_desc: "The Qing government's restriction of all foreign maritime trade to the single port of Canton creates a controlled commercial environment where the Thirteen Factories — licensed Chinese merchant houses — serve as intermediaries between Western traders and the Chinese interior. The system generates enormous customs revenue while keeping foreign influence contained."
 nd_chi_banner_integration: "Banner Integration"
 nd_chi_banner_integration_desc: "The expansion of the Eight Banners system to incorporate Mongol and Han Chinese units creates a multiethnic imperial military. The twenty-four banners — eight Manchu, eight Mongol, eight Han — provide a permanent garrison force stationed in strategic cities across the empire, integrating diverse warrior traditions into a unified command structure."
 nd_chi_literary_compilations: "Encyclopedic Compilations"
 nd_chi_literary_compilations_desc: "The massive literary projects of the Qing court — the Kangxi Dictionary, the Complete Library of the Four Treasuries, the Collected Statutes — represent the most ambitious program of knowledge compilation in human history. The Siku Quanshu alone encompasses over 36,000 volumes, preserving and systematizing the entirety of Chinese intellectual heritage."
 nd_chi_self_strengthening: "Self-Strengthening Movement"
 nd_chi_self_strengthening_desc: "The Yangwu Movement — 'foreign affairs movement' — represents China's first systematic attempt at military and industrial modernization. The Jiangnan Arsenal in Shanghai, the Fuzhou Shipyard, the Tianjin Military Academy, and dozens of smaller facilities bring Western industrial technology to Chinese soil under the principle of 'Chinese essence, Western methods.'"
 nd_chi_tongzhi_restoration: "Tongzhi Restoration"
 nd_chi_tongzhi_restoration_desc: "The Tongzhi Restoration represents a concerted effort to revitalize the Qing dynasty through a return to Confucian governance principles combined with practical administrative reform. The suppression of the Taiping and Nian rebellions, the reorganization of provincial administration, and the reinvigoration of the examination system demonstrate that the old order retains both vitality and legitimacy."
 nd_chi_maritime_customs: "Maritime Customs Modernization"
 nd_chi_maritime_customs_desc: "The establishment of the Imperial Maritime Customs Service under foreign-supervised but Chinese-owned management introduces modern accounting, standardized tariffs, and efficient revenue collection to China's port system. The customs revenue becomes a reliable source of income for the central government and a model for administrative modernization."
 nd_chi_reform_spirit: "Reform Spirit"
 nd_chi_reform_spirit_desc: "The spirit of reform that animated the Hundred Days of 1898 — however briefly — represents a vision of comprehensive institutional modernization: a modern educational system, a constitutional government, an industrial economy. Though the initial movement was crushed, its ideas cannot be unthought. The genie of reform, once released, reshapes every subsequent political debate."
 a_nd_chi_shenjiying: "Shenjiying"
 a_nd_chi_shenjiying_desc: "The Divine Machine Battalion — elite gunpowder infantry armed with hand cannons, matchlocks, and rocket launchers. Founded as one of three elite capital garrison divisions, the Shenjiying represents China's mastery of the firearms revolution it invented."
 a_nd_chi_shenjiying_levy: "Shenjiying Levy"
 a_nd_chi_shenjiying_levy_desc: "Provincial garrison troops trained in the Shenjiying tradition of gunpowder warfare."
 n_nd_chi_war_junk: "War Junk"
 n_nd_chi_war_junk_desc: "A heavily-armed ocean-going junk built for naval combat. Featuring watertight compartments, large crew quarters, and heavy armament, the war junk is the backbone of Chinese naval power."
 n_nd_chi_war_junk_levy: "War Junk Levy"
 n_nd_chi_war_junk_levy_desc: "A levy-raised war junk crewed by coastal populations with generations of seafaring tradition."
 n_nd_chi_fuchuan: "Fuchuan"
 n_nd_chi_fuchuan_desc: "The 'blessed ship' — a large, flat-bottomed warship armed with bronze cannons and fire arrows. The fuchuan can navigate both coastal shallows and open ocean, carrying larger crews and heavier armament than standard warships."
 nd_chi_examination_hall: "Imperial Examination Hall"
 nd_chi_examination_hall_desc: "A state-administered compound where candidates sit the imperial examinations, competing for positions in the civil service through mastery of the Confucian classics, literary composition, and policy analysis."
 nd_chi_examination_upkeep: "Examination Administration"
 nd_chi_examination_upkeep_desc: "Paper, books, and fine cloth for scholars — the regular conduct of imperial examinations demands a steady supply of writing materials, classical texts, and proper dress for examiners and candidates alike."
 nd_chi_porcelain_kiln: "Imperial Porcelain Kiln"
 nd_chi_porcelain_kiln_desc: "A state-supervised kiln complex producing porcelain of the highest quality for imperial use and export. The division of labor — with separate specialists for shaping, glazing, painting, and firing — enables production at industrial scale."
 nd_chi_porcelain_production: "Kiln Operations"
 nd_chi_porcelain_production_desc: "Fine kaolin clay shaped and fired in dragon kilns to produce imperial-quality porcelain."
 nd_chi_coastal_defense: "Coastal Defense Fort"
 nd_chi_coastal_defense_desc: "A fortified coastal installation combining a watchtower, garrison barracks, and naval patrol station. Part of the empire's chain of maritime defenses against piracy and foreign intrusion."
 nd_chi_coastal_garrison_upkeep: "Coastal Garrison Maintenance"
 nd_chi_coastal_garrison_upkeep_desc: "Weaponry, stone for fortifications, and tools keep the coastal defense garrison armed and its walls in repair."
 nd_chi_grand_shipyard: "Grand Shipyard"
 nd_chi_grand_shipyard_desc: "A massive shipbuilding facility capable of constructing the largest vessels in the world. Multiple dry docks, timber yards, and outfitting berths allow simultaneous construction of war junks and treasure ships."
 nd_chi_shipyard_maintenance: "Shipyard Operations"
 nd_chi_shipyard_maintenance_desc: "Timber, naval stores, and shipwright tools sustain the constant construction and fitting-out of war junks and treasure ships."
 nd_chi_nanjing_arsenal: "Nanjing Arsenal"
 nd_chi_nanjing_arsenal_desc: "A modern armaments factory producing firearms, artillery, and ammunition using Western industrial methods. The arsenal represents the Self-Strengthening Movement's commitment to military modernization."
 nd_chi_arsenal_operations: "Arsenal Manufacturing"
 nd_chi_arsenal_operations_desc: "Firearms, artillery, iron stock, and coal for the furnaces sustain the arsenal's continuous production of modern arms and ammunition."
 levy_nd_chi_shenjiying: "Shenjiying Levy"
 levy_nd_chi_shenjiying_desc: "Gunpowder-armed troops raised from garrison soldiers in the Shenjiying tradition."
 levy_nd_chi_war_junk: "War Junk Levy"
 levy_nd_chi_war_junk_desc: "War junks crewed by coastal communities and maritime laborers."
 nd_chi_canton_export: "Canton Export Operations"
 nd_chi_canton_export_desc: "Export-oriented porcelain decorated with colorful overglaze enamels for Western markets, produced under the Canton System through the Thirteen Factories."
 nd_chi_formed_tt: "China has been formed"
 nd_chi_path_a_tt: "Chose Celestial Authority"
 nd_chi_path_b_tt: "Chose Maritime Ascendancy"
 nd_chi_destiny: "The Mandate Endures"
 nd_chi_destiny_desc: "China is reunified and the Mandate of Heaven secured. The Middle Kingdom now stands at a crossroads: will it turn inward to perfect its celestial administration, or outward to project its civilization across the seas? Stability is paramount — the realm must be at peace before the great work can begin."
 nd_chi_dest_pacify: "Pacify the Frontiers"
 nd_chi_dest_pacify_desc: "The nomadic steppe and the kingdoms of the south have long challenged imperial authority. Bring Karakorum under the Dragon Banner and extend the mandate into Dai Viet. Only when the frontiers are secure can the empire turn its attention to greater ambitions."
 nd_chi_dest_nine_prov: "The Nine Provinces United"
 nd_chi_dest_nine_prov_desc: "The ancient ideal of the Nine Provinces encompassed all civilized lands under heaven. Bring Tibet and Samarkand into the imperial sphere to demonstrate that no corner of the world lies beyond the Dragon Throne's reach. Develop the realm until its wealth matches its territorial ambitions."
 nd_chi_dest_all_under: "All Under Heaven"
 nd_chi_dest_all_under_desc: "Tianxia — All Under Heaven — is not merely a phrase but a destiny. When the Dragon Throne commands from Delhi to Karakorum, when no rival can match the empire's development or military strength, the Mandate of Heaven becomes universal fact. Build the Forbidden Palace as the seat of this eternal administration."
 nd_chi_dest_sea_routes: "Reopen the Sea Routes"
 nd_chi_dest_sea_routes_desc: "The Haijin restrictions choked China's natural maritime advantage. Reverse this isolation: seize the chokepoint at Malacca and ensure silk flows through markets under imperial influence. The sea routes that once carried Zheng He's fleets must be reopened for Chinese commerce."
 nd_chi_dest_treasure: "The Treasure Fleet Ascendant"
 nd_chi_dest_treasure_desc: "Zheng He's voyages proved that China could project power across the Indian Ocean. Now make that projection permanent. Secure Palembang and Calicut — the gateways to the Spice Islands and the Malabar Coast — and embrace modern financial institutions to fund this oceanic enterprise."
 nd_chi_dest_dragon_shore: "Dragon Banner Over Every Shore"
 nd_chi_dest_dragon_shore_desc: "From Hormuz at the mouth of the Persian Gulf to Mogadishu on the African coast to Temasek at the crossroads of all Asian trade — the Dragon Banner must fly over every major port of the maritime world. Build the Treasure Wharf to sustain this unprecedented naval enterprise."
 nd_chi.5.t: "The Mandate Endures"
 nd_chi.5.d: "The Middle Kingdom is whole once more. The fractured warring states have been brought to heel, the mandate secured through conquest and wisdom alike. The Dragon Throne stands supreme over the most populous and productive civilization on earth.\n\nBut supremacy demands direction. The empire's resources are vast but not infinite. The question that has haunted every dynasty since the First Emperor now confronts us: in which direction shall the Middle Kingdom grow?"
 nd_chi.5.a: "The mandate is secure — for now"
 nd_chi.6.t: "The Frontiers Pacified"
 nd_chi.6.d: "The steppe nomads who plagued China for millennia have been brought under imperial authority. The southern kingdoms acknowledge the Dragon Throne. For the first time in centuries, the empire's frontiers are truly secure.\n\nThe generals who achieved these victories now look to the court for their next orders. The bureaucracy is already extending its reach into the newly pacified territories, establishing examination halls and tax registers where once there was only chaos."
 nd_chi.6.a: "The frontier generals have earned their rewards"
 nd_chi.7.t: "The Nine Provinces United"
 nd_chi.7.d: "The ancient dream of the Nine Provinces — all civilized lands under one sovereign — approaches reality. Tibet's monasteries and Samarkand's bazaars now operate under the protection of the Dragon Banner. The empire stretches from the roof of the world to the banks of the Oxus.\n\nThis achievement demands a choice in governance. Some ministers advocate strengthening the mandate through diplomatic prestige and loyal subjects, using the empire's growing spy networks to prevent rebellion before it starts. Others argue for a program of military fortification — garrison the frontiers with permanent forces, invest in siege capabilities, and make the empire literally impregnable."
 nd_chi.7.a: "Rule through the mandate's moral authority"
 nd_chi.7.b: "Fortify every border and garrison every pass"
 nd_chi.8.t: "All Under Heaven"
 nd_chi.8.d: "Tianxia is achieved. The Dragon Throne commands an empire of unprecedented scope — from the subcontinental plains to the Central Asian steppes, from the tropical south to the frozen north. No dynasty in Chinese history has ruled so much, so firmly.\n\nThe scholars at court debate the meaning of this achievement. The hawks argue that universal empire demands universal preparedness — the army traditions, the diplomatic machinery, the mechanisms of war must be perfected to maintain this dominion forever. The Confucian idealists counter that true universal rule requires harmony — the empire should heal its conquered lands, build its prestige through cultural achievement, and let the sheer weight of its civilization make rebellion unthinkable."
 nd_chi.8.a: "Universal empire demands universal vigilance"
 nd_chi.8.b: "Let celestial harmony govern All Under Heaven"
 nd_chi.9.t: "The Sea Routes Reopened"
 nd_chi.9.d: "The Strait of Malacca — that narrow passage through which half the world's trade must flow — now answers to the Dragon Throne. Chinese merchants, freed from the restrictions of the Haijin, are already establishing trading posts and warehouses in every port from Java to Siam.\n\nThe silk that once traveled overland on the backs of camels now moves by sea in the holds of junks, faster and in far greater quantity. The maritime silk road is reborn, and this time it flies the Dragon Banner."
 nd_chi.9.a: "The treasure fleets sail once more"
 nd_chi.10.t: "The Treasure Fleet Ascendant"
 nd_chi.10.d: "Chinese naval power now stretches from the Spice Islands to the Malabar Coast. Palembang and Calicut — the twin gateways of the Indian Ocean — operate under imperial authority. The treasure fleet has achieved what Zheng He could only demonstrate: permanent Chinese dominion over the maritime world.\n\nThe silver that flows into China from this oceanic empire is staggering. The question is how to channel it. Some advocate reinvesting in the trade network itself — better intelligence, more diplomatic connections, a web of commercial relationships that makes Chinese trade indispensable. Others push for naval supremacy pure and simple — faster ships, better-trained crews, a fleet that can project power anywhere."
 nd_chi.10.a: "The silver tide enriches the entire realm"
 nd_chi.10.b: "Naval dominance secures the trade routes"
 nd_chi.11.t: "Dragon Banner Over Every Shore"
 nd_chi.11.d: "From the Persian Gulf to the coast of Africa, from the straits of Southeast Asia to the harbors of India — every major port of the maritime world now acknowledges Chinese supremacy. The treasure fleet dwarfs any rival navy. Chinese merchants dominate every market they enter.\n\nThis is an achievement without historical parallel. The question now is whether to use this maritime supremacy for military purposes — projecting the empire's power into every theater, reducing the cost of overseas warfare — or for economic ones, using the maritime silk road as a highway of trade that enriches the realm through commerce and mercenary recruitment rather than conquest."
 nd_chi.11.a: "The ocean itself is the empire's domain"
 nd_chi.11.b: "Let the maritime silk road bind the world"
 STATIC_MODIFIER_NAME_nd_chi_dest_mandate_vigor: "Mandate's Vigor"
 STATIC_MODIFIER_DESC_nd_chi_dest_mandate_vigor: "The moral authority of the Dragon Throne commands loyalty from subjects and respect from foreign courts. Imperial agents monitor every province for signs of disloyalty."
 STATIC_MODIFIER_NAME_nd_chi_dest_frontier_garrisons: "Frontier Garrisons"
 STATIC_MODIFIER_DESC_nd_chi_dest_frontier_garrisons: "Permanent military garrisons along every frontier make the empire impregnable. Siege engineers stand ready to reduce any fortress that dares resist imperial authority."
 STATIC_MODIFIER_NAME_nd_chi_dest_universal_empire: "Universal Empire"
 STATIC_MODIFIER_DESC_nd_chi_dest_universal_empire: "The mechanisms of universal dominion are perfected — a professional military tradition, efficient diplomatic machinery, and the authority to dictate terms to any adversary."
 STATIC_MODIFIER_NAME_nd_chi_dest_celestial_harmony: "Celestial Harmony"
 STATIC_MODIFIER_DESC_nd_chi_dest_celestial_harmony: "The empire governs through harmony rather than force. Devastated lands recover quickly under benevolent administration, and the dynasty's prestige endures across generations."
 STATIC_MODIFIER_NAME_nd_chi_dest_silver_tide: "Silver Tide"
 STATIC_MODIFIER_DESC_nd_chi_dest_silver_tide: "The flow of silver through Chinese-controlled trade routes enriches every corner of the realm. Raw materials pour from overseas territories while diplomatic connections multiply."
 STATIC_MODIFIER_NAME_nd_chi_dest_fleet_dominance: "Fleet Dominance"
 STATIC_MODIFIER_DESC_nd_chi_dest_fleet_dominance: "The treasure fleet's light squadrons patrol every sea lane. Fast-moving naval forces project power far from home, though land forces receive less attention."
 STATIC_MODIFIER_NAME_nd_chi_dest_ocean_sovereign: "Ocean Sovereign"
 STATIC_MODIFIER_DESC_nd_chi_dest_ocean_sovereign: "The empire projects military power across every ocean. Overseas campaigns are launched with ease, and supply lines stretch to the ends of the earth."
 STATIC_MODIFIER_NAME_nd_chi_dest_silk_road_sea: "Silk Road of the Sea"
 STATIC_MODIFIER_DESC_nd_chi_dest_silk_road_sea: "The maritime silk road generates such wealth that the empire can afford mercenary armies and reduced military costs. The only danger is the complacency that wealth engenders."
 nd_chi_forbidden_palace: "Forbidden Palace"
 nd_chi_forbidden_palace_desc: "The supreme administrative complex of the universal empire — a vast palace compound from which the Son of Heaven governs All Under Heaven. Its halls house the most extensive bureaucracy in human history, its archives contain the records of every province, and its examination chambers produce the scholar-officials who administer an empire without equal."
 nd_chi_palace_upkeep: "Palace Administration"
 nd_chi_palace_upkeep_desc: "Paper for the endless archives, fine cloth for court ceremonies, furniture for the thousand chambers, and tools for constant maintenance — the Forbidden Palace consumes resources befitting the seat of universal empire."
 nd_chi_treasure_wharf: "Treasure Wharf"
 nd_chi_treasure_wharf_desc: "A massive naval complex purpose-built for the treasure fleet — multiple dry docks, timber stores, sail lofts, and outfitting berths capable of constructing and maintaining the largest warships and merchantmen the world has ever seen. From this wharf, the Dragon Banner is carried to every shore."
 nd_chi_wharf_operations: "Wharf Operations"
 nd_chi_wharf_operations_desc: "Timber from the southern forests, naval stores from the coast, tar for waterproofing, and tools for the shipwrights — the Treasure Wharf demands a constant flow of materials to keep the fleet seaworthy."
