l_english:
 STATIC_MODIFIER_NAME_nd_masters_of_the_monsoon: "Masters of the Monsoon"
 STATIC_MODIFIER_DESC_nd_masters_of_the_monsoon: "Kilwa's destiny lies upon the waves. The monsoon winds that carry dhows between Africa, Arabia, and India are the lifeblood of our empire. Let us master these winds, extend our merchant fleets to every port of the Indian Ocean, and make our harbors the indispensable nexus of world trade."
 STATIC_MODIFIER_NAME_nd_jewel_of_the_swahili_coast: "Jewel of the Swahili Coast"
 STATIC_MODIFIER_DESC_nd_jewel_of_the_swahili_coast: "Kilwa shall be the wonder of the eastern seas — not merely a waypoint for merchants, but a beacon of Islamic civilization. Let our coral stone mosques rival the great houses of learning in Cairo and Baghdad, our scholars illuminate the faith, and our Swahili tongue become the language of refinement from Sofala to the Comoros."
 nd_kws.1.t: "The Sultanate Ascendant"
 nd_kws.1.d: "The scattered settlements of the Swahili coast have been gathered under one dominion. From the island fortress of Kilwa Kisiwani, our sultan gazes across waters that shimmer with possibility. To the south, the gold fields of Sofala pour wealth northward along routes we now control. To the east, the monsoon winds promise the riches of Arabia, Persia, India, and distant China. But a sultanate is more than its treasury. Will we pour our energies into extending our maritime reach across the Indian Ocean — building the greatest merchant fleet on the eastern seas — or will we invest in the magnificence of our cities, making Kilwa itself a jewel that draws scholars, artisans, and pilgrims from across the Islamic world?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_kws.1.a: "Our dhows shall command every monsoon wind"
 nd_kws.1.b: "Let Kilwa shine as a beacon of civilization"
 nd_kws.2.t: "The Gold of Sofala"
 nd_kws.2.d: "The merchants of Kilwa have accomplished what no other coastal power could: total control of the Sofala gold trade. Every ounce of gold that leaves the mines near Great Zimbabwe must pass through Kilwan hands. The Buzi River flows through Sofala to the port, where our factors weigh, assay, and re-export the precious metal to eager buyers in Arabia and India. The sultan must decide how to exploit this monopoly. Do we focus on maximizing the flow of gold through our port — keeping our merchants as the essential middlemen, taking duties on every transaction — or do we push deeper into the interior, establishing direct control over the mining regions and cutting out the middlemen who stand between us and the gold fields?"
 nd_kws.2.a: "Let the golden tide flow through our harbors"
 nd_kws.2.b: "Send our agents to the very mines"
 STATIC_MODIFIER_NAME_nd_kws_golden_tide: "Golden Tide"
 STATIC_MODIFIER_DESC_nd_kws_golden_tide: "Kilwa's harbors overflow with Sofala gold, its merchants the essential middlemen of the world's richest trade route."
 STATIC_MODIFIER_NAME_nd_kws_interior_extraction: "Interior Extraction"
 STATIC_MODIFIER_DESC_nd_kws_interior_extraction: "Kilwan agents operate deep in the interior, securing raw materials directly from their source and cutting out intermediaries."
 nd_kws.3.t: "Husuni Kubwa: The Great Palace"
 nd_kws.3.d: "On the headland overlooking the Indian Ocean, a palace of staggering ambition rises from the coral rock. Husuni Kubwa — the Great Fortress — boasts over a hundred rooms, an octagonal bathing pool, a vast commercial court for receiving merchant delegations, and a private mosque where the sultan may pray while gazing upon the sea. Sultan al-Hasan ibn Sulaiman has created a residence that rivals anything built on the African continent. The palace is more than a home — it is a declaration to every foreign captain who enters Kilwa's harbor that this is no backwater trading post, but the seat of a true civilization."
 nd_kws.3.a: "A palace worthy of our greatness"
 STATIC_MODIFIER_NAME_nd_kws_palace_of_wonder: "Palace of Wonder"
 STATIC_MODIFIER_DESC_nd_kws_palace_of_wonder: "Husuni Kubwa stands as testament to Kilwan grandeur, its hundred rooms and ocean vistas awing ambassadors and merchants alike."
 nd_kws.4.t: "The Great Mosque of Kilwa"
 nd_kws.4.d: "The Great Mosque of Kilwa Kisiwani has been expanded into a structure of breathtaking scale. Its sixteen domed and vaulted bays create an interior unlike any other on the African coast, and its great dome — the largest in East Africa — soars above the faithful during Friday prayers. Coral rag walls set in limestone mortar gleam white against the tropical sky. But the mosque is not merely a house of worship. Its courtyard hosts scholars who have traveled from as far as Persia and Egypt, drawn by the reputation of Kilwan learning. The sultan faces a choice: dedicate the mosque primarily to deepening the piety of his subjects, or develop it as a center of intellectual exchange that draws the brightest minds of the Islamic world."
 nd_kws.4.a: "A house of devotion above all"
 nd_kws.4.b: "A house of learning for the ages"
 STATIC_MODIFIER_NAME_nd_kws_dome_of_faith: "Dome of Faith"
 STATIC_MODIFIER_DESC_nd_kws_dome_of_faith: "The Great Mosque of Kilwa radiates religious authority across the Swahili coast, its great dome a symbol of unwavering devotion."
 STATIC_MODIFIER_NAME_nd_kws_seat_of_learning: "Seat of Learning"
 STATIC_MODIFIER_DESC_nd_kws_seat_of_learning: "Scholars from across the Islamic world gather in Kilwa's mosque courtyards, making the sultanate a beacon of knowledge and intellectual exchange."
 nd_kws.5.t: "Ships on the Horizon"
 nd_kws.5.d: "Strange vessels have appeared off the Swahili coast — enormous wooden castles bristling with cannons, crewed by pale-skinned men who speak of a king far to the west. The Portuguese have arrived. Their commander, Francisco de Almeida, demands that Kilwa submit to Portuguese commercial supremacy: their ships alone shall carry goods between the coast and India, and the sultan shall pay annual tribute. Behind the diplomatic language stands a fleet of warships more powerful than anything our dhows can challenge. The sultan's court is in turmoil. Some counselors urge defiance — rally the coastal cities, fortify the harbors, deny these invaders the anchorage they need. Others argue that clever diplomacy and selective cooperation can preserve Kilwan autonomy while the foreigners inevitably overreach themselves."
 nd_kws.5.a: "We shall not bow to foreign tyrants"
 nd_kws.5.b: "Bend like the palm, do not break"
 STATIC_MODIFIER_NAME_nd_kws_defy_the_invaders: "Defiance of Kilwa"
 STATIC_MODIFIER_DESC_nd_kws_defy_the_invaders: "Kilwa has chosen resistance over submission. Its harbors are fortified, its warriors resolute, and the swamps and monsoon seas shall be the invader's grave."
 STATIC_MODIFIER_NAME_nd_kws_diplomacy_of_survival: "Diplomacy of Survival"
 STATIC_MODIFIER_DESC_nd_kws_diplomacy_of_survival: "Kilwa bends but does not break. Through careful diplomacy, intelligence networks, and selective cooperation, the sultanate preserves its true independence while the outsiders exhaust themselves."
 nd_kws_swahili_warrior_tradition: "Swahili Warrior Tradition"
 nd_kws_swahili_warrior_tradition_desc: "The coastal settlements maintain a militia tradition rooted in defending island harbors and trade routes from raiders."
 nd_kws_coral_stone_masonry: "Coral Stone Masonry"
 nd_kws_coral_stone_masonry_desc: "Kilwan builders develop the distinctive technique of cutting coral rag blocks from the reef and setting them in limestone mortar — creating the white stone architecture that defines Swahili civilization."
 nd_kws_ivory_trade: "Ivory Trade"
 nd_kws_ivory_trade_desc: "Swahili merchants establish the supply chains that bring raw elephant ivory from the interior to coastal workshops, where it is carved into luxury goods for export across the Indian Ocean."
 nd_kws_makutano_markets: "Makutano Markets"
 nd_kws_makutano_markets_desc: "The crossroads marketplaces of Swahili towns become organized commercial centers where African, Arab, and Indian traders exchange goods under established rules of commerce."
 nd_kws_monsoon_navigation: "Monsoon Navigation"
 nd_kws_monsoon_navigation_desc: "Swahili sailors master the seasonal monsoon wind patterns that govern Indian Ocean navigation — the kaskazi blowing northeast from December to March, the kusi from the southeast from June to October."
 nd_kws_shirazi_dynasty: "Shirazi Dynasty"
 nd_kws_shirazi_dynasty_desc: "The ruling Shirazi dynasty, tracing its origins to the Persian city of Shiraz, provides Kilwa with legitimate Islamic governance and connection to the wider Muslim world."
 nd_kws_swahili_synthesis: "Swahili Synthesis"
 nd_kws_swahili_synthesis_desc: "The Swahili cultural identity emerges from the fusion of Bantu, Arab, and Persian traditions — a maritime civilization that is distinctly African yet cosmopolitan in its outlook."
 nd_kws_dhow_building_tradition: "Dhow Building Tradition"
 nd_kws_dhow_building_tradition_desc: "Kilwan shipwrights perfect the construction of lateen-rigged dhows — from tiny zambucs for coastal work to ocean-going vessels capable of reaching India on the monsoon winds."
 nd_kws_funduq_network: "Funduq Network"
 nd_kws_funduq_network_desc: "A network of funduqs — merchant warehouses and hostels — allows foreign traders to store goods, negotiate deals, and find lodging in every major Swahili port."
 nd_kws_copper_coinage: "Copper Coinage"
 nd_kws_copper_coinage_desc: "Kilwa begins minting its own copper coins — one of the only sub-Saharan African states to issue coinage. The coins circulate from Great Zimbabwe to Zanzibar, facilitating trade and projecting Kilwan commercial authority."
 nd_kws_merchant_marine: "Merchant Marine"
 nd_kws_merchant_marine_desc: "A formalized merchant fleet system emerges, with Kilwan burgher families equipping and manning seasonal trading convoys that follow the monsoon winds between Africa and Asia."
 nd_kws_husuni_kubwa: "Husuni Kubwa"
 nd_kws_husuni_kubwa_desc: "The construction of Husuni Kubwa — the Great Palace — with its hundred rooms, octagonal pool, and commanding view of the Indian Ocean, marks the zenith of Kilwan architectural ambition."
 nd_kws_indian_ocean_network: "Indian Ocean Network"
 nd_kws_indian_ocean_network_desc: "Kilwa's trading connections now span the entire Indian Ocean world, from the Malabar Coast of India to the ports of the Persian Gulf and the spice islands of Southeast Asia."
 nd_kws_sofala_gold_monopoly: "Sofala Gold Monopoly"
 nd_kws_sofala_gold_monopoly_desc: "Kilwa's control of Sofala — the sole coastal outlet for the gold mines of Great Zimbabwe — gives the sultanate a near-total monopoly on East African gold entering the Indian Ocean trade."
 nd_kws_great_mosque: "The Great Mosque"
 nd_kws_great_mosque_desc: "The Great Mosque of Kilwa Kisiwani, with its sixteen domed bays and the largest dome in East Africa, becomes both the spiritual heart of the sultanate and a center of Islamic scholarship."
 nd_kws_sofala_garrison: "Sofala Garrison"
 nd_kws_sofala_garrison_desc: "Elite guards are stationed along the gold trade route from Sofala to Kilwa, protecting the caravans and factors that sustain the sultanate's wealth."
 nd_kws_mtepe_construction: "Mtepe Construction"
 nd_kws_mtepe_construction_desc: "Swahili shipbuilders develop the mtepe — a large sewn-hull vessel whose planks are bound with coconut coir rather than nailed, giving it remarkable flexibility in ocean swells."
 nd_kws_zanzibar_entrepot: "Zanzibar Entrepot"
 nd_kws_zanzibar_entrepot_desc: "Zanzibar emerges as a major secondary port in the Kilwan trading empire, its deep harbor and strategic position making it an essential node in Indian Ocean commerce."
 nd_kws_island_dominion: "Island Dominion"
 nd_kws_island_dominion_desc: "Kilwa extends its authority over the island chain stretching from Pemba and Zanzibar to Mafia and the Comoros, creating a maritime empire of island strongholds."
 nd_kws_resist_the_portuguese: "Resist the Portuguese"
 nd_kws_resist_the_portuguese_desc: "The arrival of Portuguese warships threatens the entire Swahili trading system. Kilwa prepares to defend its sovereignty against a technologically superior but strategically overextended adversary."
 nd_kws_coastal_defense_fleet: "Coastal Defense Fleet"
 nd_kws_coastal_defense_fleet_desc: "Kilwa develops specialized war galleys designed for the shallow coastal waters of the Swahili coast — faster and more maneuverable in local conditions than the deep-drafted European vessels."
 nd_kws_fortified_harbors: "Fortified Harbors"
 nd_kws_fortified_harbors_desc: "The sultanate's key harbors are reinforced with coral stone walls and watchtowers, creating a network of fortified anchorages that can resist naval bombardment."
 nd_kws_kilwa_chronicle: "The Kilwa Chronicle"
 nd_kws_kilwa_chronicle_desc: "The compilation of the Kilwa Chronicle — a historical record in Arabic detailing the sultanate's dynasties, trade, and relations — marks a milestone in East African historical consciousness."
 nd_kws_stone_town_expansion: "Stone Town Expansion"
 nd_kws_stone_town_expansion_desc: "Kilwa's coral stone urban core expands with new merchant quarters, public works, and residential complexes, creating the distinctive Swahili Stone Town that inspires awe in foreign visitors."
 nd_kws_sovereignty_tradition: "Sovereignty Tradition"
 nd_kws_sovereignty_tradition_desc: "Having weathered Portuguese interference, the Kilwan political tradition emphasizes the preservation of sovereignty through skillful navigation of great power rivalries."
 nd_kws_revived_gold_routes: "Revived Gold Routes"
 nd_kws_revived_gold_routes_desc: "As Portuguese control over the southern coast weakens, Kilwan merchants reassert their dominance over the gold and ivory trade routes connecting the interior to the Indian Ocean."
 nd_kws_customs_administration: "Customs Administration"
 nd_kws_customs_administration_desc: "A systematized customs administration collects duties on goods entering and leaving Kilwan ports, providing the sultanate with a reliable revenue base independent of direct trade."
 nd_kws_swahili_literary_tradition: "Swahili Literary Tradition"
 nd_kws_swahili_literary_tradition_desc: "The Swahili language develops a rich literary tradition — poetry, chronicles, and religious texts written in Arabic script — creating a shared cultural identity across the coast."
 nd_kws_indian_ocean_diplomacy: "Indian Ocean Diplomacy"
 nd_kws_indian_ocean_diplomacy_desc: "Kilwa cultivates diplomatic relationships across the Indian Ocean world, balancing Omani, Portuguese, and local interests through shrewd political maneuvering."
 nd_kws_swahili_awakening: "Swahili Awakening"
 nd_kws_swahili_awakening_desc: "A new consciousness of Swahili identity emerges — not merely as a trading people, but as a civilization with its own literary tradition, architectural heritage, and political destiny."
 nd_kws_modern_indian_ocean_trade: "Modern Indian Ocean Trade"
 nd_kws_modern_indian_ocean_trade_desc: "Kilwa adapts to the industrializing world, modernizing its port facilities and trade practices while maintaining the Indian Ocean commercial networks that have sustained it for centuries."
 nd_kws_constitutional_sultanate: "Constitutional Sultanate"
 nd_kws_constitutional_sultanate_desc: "The sultanate evolves toward a more structured system of governance, with formal consultative bodies tempering absolute rule and providing stability through institutional continuity."
 a_nd_kws_swahili_askari: "Swahili Askari"
 a_nd_kws_swahili_askari_desc: "Coastal militia fighters drawn from the island settlements, skilled at defending harbors and fighting in the marshy terrain of the littoral."
 n_nd_kws_kilwa_dhow: "Kilwa Dhow"
 n_nd_kws_kilwa_dhow_desc: "A fast lateen-rigged dhow optimized for the monsoon trade routes. Lighter than European vessels but far swifter, these ships are the backbone of Kilwan commerce."
 a_nd_kws_sofala_guard: "Sofala Guard"
 a_nd_kws_sofala_guard_desc: "Elite soldiers tasked with protecting the vital gold trade route between Sofala and the coast. Selected for loyalty and endurance, they patrol some of the most valuable caravan trails in Africa."
 n_nd_kws_mtepe: "Mtepe"
 n_nd_kws_mtepe_desc: "A large sewn-hull ocean vessel whose planks are bound with coconut coir. The flexible construction rides ocean swells better than nailed European hulls, making it ideal for Indian Ocean voyages."
 n_nd_kws_zanzibari_galley: "Zanzibari War Galley"
 n_nd_kws_zanzibari_galley_desc: "An oared galley designed for the shallow coastal waters of the Swahili coast. Faster and more maneuverable in confined waters than deep-drafted European warships."
 n_nd_kws_merchant_levy: "Merchant Levy Dhow"
 n_nd_kws_merchant_levy_desc: "Armed trading vessels pressed into naval service during wartime. Crewed by experienced merchant sailors, these dhows know every reef and current of the coast."
 nd_kws_coral_mosque: "Coral Stone Mosque"
 nd_kws_coral_mosque_desc: "A mosque constructed from coral rag blocks cut from the reef and set in limestone mortar — the signature architectural style of Swahili civilization."
 nd_kws_funduq: "Funduq"
 nd_kws_funduq_desc: "A merchant warehouse and hostel where foreign traders can store goods, negotiate deals, and find lodging. The funduq is the essential infrastructure of Swahili international commerce."
 nd_kws_swahili_dockyard: "Swahili Dockyard"
 nd_kws_swahili_dockyard_desc: "A specialized shipbuilding facility where master craftsmen construct dhows, mtepes, and other vessels using traditional techniques refined over centuries of Indian Ocean sailing."
 nd_kws_mint: "Kilwa Mint"
 nd_kws_mint_desc: "One of the only minting facilities in sub-Saharan Africa, producing the copper coins that circulate throughout the Kilwan trading empire and beyond."
 nd_kws_makutano: "Makutano"
 nd_kws_makutano_desc: "A Swahili crossroads marketplace where African, Arab, and Indian traders converge to exchange ivory, gold, cloth, ceramics, and spices under the watchful eye of the sultan's tax collectors."
 nd_kws_mosque_upkeep: "Mosque Upkeep"
 nd_kws_mosque_upkeep_desc: "Maintenance of the coral stone structure and provision of supplies for the mosque's scholars and worshippers."
 nd_kws_funduq_maintenance: "Funduq Maintenance"
 nd_kws_funduq_maintenance_desc: "Operating costs for the merchant warehouse, including storage materials and provisions for visiting traders."
 nd_kws_dockyard_maintenance: "Dockyard Maintenance"
 nd_kws_dockyard_maintenance_desc: "Timber, naval supplies, and the wages of skilled shipwrights who maintain the dockyard's operations."
 nd_kws_mint_operations: "Mint Operations"
 nd_kws_mint_operations_desc: "Copper ingots are struck into the distinctive Kilwan coins and decorative metalwork that circulate across the Indian Ocean trading network."
 nd_kws_makutano_upkeep: "Market Upkeep"
 nd_kws_makutano_upkeep_desc: "Maintenance of the market stalls and provision of trade goods that draw merchants to the crossroads."
 nd_kws_ivory_carving_pm: "Ivory Carving"
 nd_kws_ivory_carving_pm_desc: "Skilled artisans transform raw elephant ivory into intricately carved luxury goods destined for the courts of Arabia, India, and China."
 nd_kws_monsoon_sailing_pm: "Monsoon Sailing"
 nd_kws_monsoon_sailing_pm_desc: "The specialized knowledge and materials needed to exploit the seasonal monsoon winds for trans-oceanic voyages between Africa and Asia."
 nd_kws_gold_refining_pm: "Gold Refining"
 nd_kws_gold_refining_pm_desc: "Raw gold from the Sofala trade route is refined, assayed, and fashioned into jewelry and trade ingots for export across the Indian Ocean."
 levy_nd_kws_swahili_askari: "Swahili Askari Levy"
 levy_nd_kws_swahili_askari_desc: "Island militiamen drawn from coastal settlements to defend the sultanate's harbors and trade routes."
 levy_nd_kws_merchant_fleet: "Merchant Fleet Levy"
 levy_nd_kws_merchant_fleet_desc: "Armed merchant dhows pressed into service during wartime, crewed by the experienced sailors of Kilwa's trading houses."
 nd_kws_coral_fortress: "Coral Fortress"
 nd_kws_coral_fortress_desc: "A fortified harbor defense constructed from coral stone blocks, designed to resist naval bombardment and protect the island approaches."
 nd_kws_customs_house: "Customs House"
 nd_kws_customs_house_desc: "A formal customs administration that collects duties on all goods entering and leaving the port, systematizing the sultanate's trade revenue."
 nd_kws_swahili_academy: "Swahili Academy"
 nd_kws_swahili_academy_desc: "A center of Islamic scholarship and Swahili literary culture where scholars study the Quran, compose poetry, and preserve the coast's intellectual traditions."
 nd_kws_fortress_upkeep: "Fortress Upkeep"
 nd_kws_fortress_upkeep_desc: "Stone and armaments required to maintain the coral fortress and its garrison."
 nd_kws_customs_upkeep: "Customs Operations"
 nd_kws_customs_upkeep_desc: "Administrative materials and supplies needed to operate the customs collection apparatus."
 nd_kws_academy_upkeep: "Academy Upkeep"
 nd_kws_academy_upkeep_desc: "Paper, ink, and supplies for the scholars and students of the academy."
 nd_kws_formed_tt: "Kilwa Sultanate has been formed"
 nd_kws_path_a_tt: "Chose the #bold Masters of the Monsoon#! destiny"
 nd_kws_path_b_tt: "Chose the #bold Jewel of the Swahili Coast#! destiny"
 nd_kws_destiny: "Destiny of Kilwa"
 nd_kws_destiny_desc: "The Kilwa Sultanate has been forged. Now its rulers must decide whether to project power across the Indian Ocean or build a civilization that will endure the ages."
 nd_kws_dest_monsoon_reach: "Monsoon Reach"
 nd_kws_dest_monsoon_reach_desc: "Extend Kilwan commercial influence the length of the Swahili coast. Control the trade corridors from Mogadishu in the north to Sofala's gold in the south, establishing the sultanate as the indispensable middleman of East African commerce."
 nd_kws_dest_monsoon_fleet: "The Monsoon Fleet"
 nd_kws_dest_monsoon_fleet_desc: "Kilwan dhows must carry the sultanate's banner beyond African waters. Seize the great entrepot of Aden at the mouth of the Red Sea and reach the Malabar Coast of India, where the richest spice markets in the world await."
 nd_kws_dest_ocean_hegemony: "Indian Ocean Hegemony"
 nd_kws_dest_ocean_hegemony_desc: "From the Strait of Hormuz to the ports of Gujarat, let no ship cross the Indian Ocean without Kilwan leave. Seize control of the chokepoints that govern world trade and establish Kilwa as the paramount maritime power of the eastern seas."
 nd_kws_dest_coral_cities: "Coral Cities"
 nd_kws_dest_coral_cities_desc: "Expand the sultanate's reach across the western Indian Ocean, extending Swahili civilization to Madagascar while investing in the institutions that transform a trading post into a true state."
 nd_kws_dest_swahili_renaissance: "Swahili Renaissance"
 nd_kws_dest_swahili_renaissance_desc: "Push the boundaries of the Swahili world deep into the interior, reaching the legendary ruins of Great Zimbabwe itself. Develop the sultanate's lands until they rival any kingdom in Africa."
 nd_kws_dest_beacon_of_civilization: "Beacon of Civilization"
 nd_kws_dest_beacon_of_civilization_desc: "Let Kilwa become a center of learning and culture to rival Cairo or Baghdad. Embrace the new institutions of banking and commerce, extend influence to northern Madagascar, and build a civilization so brilliant that travelers speak of it for centuries."
 nd_kws.6.t: "The Destiny of Kilwa"
 nd_kws.6.d: "The coral stone towers of Kilwa Kisiwani gleam white against the tropical sky. From this island fortress, the sultan surveys a dominion stretching from island to mainland, from harbor to hinterland. The Kilwa Sultanate has been proclaimed, but its true destiny remains unwritten. The monsoon winds whisper of possibilities -- vast oceanic empires and glittering courts of learning alike. The choices that follow will determine whether Kilwa's name echoes across the seas or shines as a beacon of civilization for all who seek it."
 nd_kws.6.a: "Our destiny awaits"
 nd_kws.7.t: "Command of the Coast"
 nd_kws.7.d: "From the ancient port of Mogadishu in the north to the gold-rich harbor of Sofala in the south, the entire East African coast now falls under Kilwan dominion. Every merchant vessel that plies these waters pays tribute to the sultan's factors. The dhow captains report that the seasonal monsoon winds carry more than cargo -- they carry word of Kilwa's rising power to every port of the Indian Ocean. What was once a chain of independent trading settlements is now a unified commercial empire, and its ambitions extend far beyond the African shore."
 nd_kws.7.a: "The coast is ours -- now for the ocean"
 nd_kws.8.t: "Across the Monsoon Sea"
 nd_kws.8.d: "Kilwan merchants have achieved what few African rulers dared dream -- a permanent presence on the shores of India and Arabia. The sultan's agents operate in Aden, gateway to the Red Sea, and in the spice markets of the Malabar Coast. Kilwa is no longer merely an African power but a force in the wider Indian Ocean world. The court now debates how to consolidate these gains. Some admirals favor building an overwhelming naval force to guarantee Kilwan supremacy at sea. Others argue that controlling the flow of precious goods -- pepper, cinnamon, silk -- will generate wealth that no fleet can match."
 nd_kws.8.a: "Our warships shall command these waters"
 nd_kws.8.b: "Control the spice, control the world"
 nd_kws.9.t: "Lords of the Indian Ocean"
 nd_kws.9.d: "The Strait of Hormuz, the gates of the Persian Gulf, the ports of Gujarat -- all bow to Kilwan maritime authority. No other power can match the sultanate's reach across the Indian Ocean. From the Red Sea to the Malabar Coast, Kilwan factors, admirals, and diplomats operate a commercial network of staggering scope. The question now is how to govern this oceanic empire. Will Kilwa rule as a thalassocracy, projecting military power from its fleet to enforce order across the seas? Or will the merchant houses of Kilwa govern through trade, creating a network of dependent partners bound by profit rather than force?"
 nd_kws.9.a: "The sea itself is our domain"
 nd_kws.9.b: "Let trade bind what force cannot"
 nd_kws.10.t: "Cities of Coral and Light"
 nd_kws.10.d: "The white coral cities of the Swahili coast grow and multiply. From Kilwa to the distant shores of Madagascar, Swahili architecture, law, and learning spread along the trade routes. The sultanate has invested not merely in commerce but in the institutions that give a state permanence -- legal codes, scholarly traditions, and the administrative systems that turn tribute into governance. Where once traders came and went with the monsoon, now permanent settlements rise, their coral mosques and scholarly courts drawing visitors from across the Islamic world."
 nd_kws.10.a: "Our civilization takes root"
 nd_kws.11.t: "The Flowering of Swahili Culture"
 nd_kws.11.d: "A remarkable transformation has taken place in the Kilwan lands. The sultanate's influence now extends deep into the interior, reaching even the legendary stone ruins of Great Zimbabwe. But it is not conquest alone that marks this age -- it is a cultural flowering without precedent on the African coast. Poets compose in Swahili, scholars debate philosophy in coral-walled academies, and artisans create works that astonish visitors from abroad. The sultan must choose how to channel this creative energy. Will Kilwa nurture a golden age of arts and scholarship, or will it focus on consolidating its expanded territory into a unified and integrated realm?"
 nd_kws.11.a: "Let the poets and scholars lead us"
 nd_kws.11.b: "First we must govern what we hold"
 nd_kws.12.t: "The Beacon Burns Bright"
 nd_kws.12.d: "Kilwa stands as the greatest center of Islamic civilization in the southern hemisphere. Its academies draw scholars from Cairo to Samarkand, its libraries preserve works lost elsewhere, and its Swahili literary tradition has produced a body of poetry and philosophy that enriches the entire Islamic world. Travelers who visit Kilwa speak of it as they once spoke of Cordoba or Baghdad -- a place where knowledge and beauty converge. As the sultanate reaches the apex of its cultural achievement, two visions of its future emerge. Some scholars advocate for Kilwa to become a true house of wisdom, embracing all knowledge regardless of its source. Others believe the sultanate should use its cultural authority to build an eternal governing order."
 nd_kws.12.a: "Knowledge knows no boundaries"
 nd_kws.12.b: "Our legacy shall be eternal governance"
 STATIC_MODIFIER_NAME_nd_kws_dest_monsoon_dominance: "Monsoon Dominance"
 STATIC_MODIFIER_DESC_nd_kws_dest_monsoon_dominance: "Kilwan war fleets control the monsoon sea lanes, their swift disembarkations striking fear into coastal rivals."
 STATIC_MODIFIER_NAME_nd_kws_dest_spice_monopoly: "Spice Monopoly"
 STATIC_MODIFIER_DESC_nd_kws_dest_spice_monopoly: "Kilwa's grip on the spice trade generates fabulous wealth, its merchant houses lending capital across the Indian Ocean."
 STATIC_MODIFIER_NAME_nd_kws_dest_thalassocracy: "Kilwan Thalassocracy"
 STATIC_MODIFIER_DESC_nd_kws_dest_thalassocracy: "Kilwa rules the Indian Ocean as a true thalassocracy, its naval might projecting power from Africa to India and beyond."
 STATIC_MODIFIER_NAME_nd_kws_dest_merchant_princes: "Merchant Princes"
 STATIC_MODIFIER_DESC_nd_kws_dest_merchant_princes: "Kilwa's great merchant families govern a commercial empire through trade and patronage, binding distant ports through shared prosperity."
 STATIC_MODIFIER_NAME_nd_kws_dest_golden_age_arts: "Golden Age of the Arts"
 STATIC_MODIFIER_DESC_nd_kws_dest_golden_age_arts: "A golden age of Swahili poetry, architecture, and scholarship transforms the sultanate into a beacon of cultural achievement."
 STATIC_MODIFIER_NAME_nd_kws_dest_interior_dominion: "Interior Dominion"
 STATIC_MODIFIER_DESC_nd_kws_dest_interior_dominion: "Kilwa's authority extends deep into the interior, integrating diverse peoples into a unified realm under Swahili governance."
 STATIC_MODIFIER_NAME_nd_kws_dest_house_of_wisdom: "House of Wisdom"
 STATIC_MODIFIER_DESC_nd_kws_dest_house_of_wisdom: "Kilwa's academies embrace all knowledge, drawing scholars of every faith and tradition to the greatest center of learning in the southern seas."
 STATIC_MODIFIER_NAME_nd_kws_dest_eternal_sultanate: "The Eternal Sultanate"
 STATIC_MODIFIER_DESC_nd_kws_dest_eternal_sultanate: "Kilwa's governing institutions achieve a permanence that transcends individual rulers, creating an enduring political order."
 nd_kws_bahari_emporium: "Bahari Emporium"
 nd_kws_bahari_emporium_desc: "A grand oceanic trading house where merchants from across the Indian Ocean converge -- the commercial heart of Kilwa's maritime empire."
 nd_kws_emporium_operations: "Emporium Operations"
 nd_kws_emporium_operations_desc: "The vast logistical apparatus of receiving, cataloguing, and redistributing goods from every corner of the Indian Ocean trading world."
 nd_kws_dar_al_ilm: "Dar al-Ilm"
 nd_kws_dar_al_ilm_desc: "The House of Knowledge -- a grand academy where scholars gather to study theology, philosophy, medicine, and the natural sciences, rivaling the great madrasas of the Islamic world."
 nd_kws_dar_al_ilm_upkeep: "Academy Operations"
 nd_kws_dar_al_ilm_upkeep_desc: "Paper, books, ink, and supplies for the scholars, scribes, and students who fill the halls of the Dar al-Ilm."
