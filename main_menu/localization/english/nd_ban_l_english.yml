l_english:
 STATIC_MODIFIER_NAME_nd_pepper_emporium: "Pepper Emporium of the East"
 STATIC_MODIFIER_DESC_nd_pepper_emporium: "Banten's warehouses overflow with the finest pepper in the archipelago. Merchants from China, India, Persia, and Europe jostle for access to our markets, and the Sunda Strait funnels their wealth through our ports."
 STATIC_MODIFIER_NAME_nd_sunda_strait_guardians: "Guardians of the Sunda Strait"
 STATIC_MODIFIER_DESC_nd_sunda_strait_guardians: "The Sunda Strait is the gate between two oceans, and Banten holds the key. Our patrol fleets command these waters, ensuring that no vessel passes without our knowledge and our consent."
 STATIC_MODIFIER_NAME_nd_ban_golden_age_tirtayasa: "Golden Age of Tirtayasa"
 STATIC_MODIFIER_DESC_nd_ban_golden_age_tirtayasa: "Under Sultan Ageng Tirtayasa, Banten reaches the zenith of its power. The Sultan's defiance of foreign monopolies and his vision of an independent maritime state inspire a generation of warriors and statesmen."
 STATIC_MODIFIER_NAME_nd_ban_pepper_diplomacy: "Pepper Diplomacy"
 STATIC_MODIFIER_DESC_nd_ban_pepper_diplomacy: "Banten wields its pepper as a diplomatic weapon, cultivating trade relationships across the known world. Where others rely on armies, the Sultan sends shiploads of black gold."
 nd_ban.1.t: "The Sultanate of Banten"
 nd_ban.1.d: "The banner of Islam flies over the ports of western Java. Where the Hindu Kingdom of Sunda once traded pepper with the Portuguese, the Sultanate of Banten now commands the Sunda Strait — that narrow passage between Java and Sumatra through which all trade between the Indian Ocean and the Java Sea must flow.\n\nOur warehouses groan with pepper from Lampung, our harbor teems with Chinese junks and Indian dhows, and the call to prayer echoes from the minarets of the Masjid Agung. The question before us is how to wield this inheritance. Shall we become the greatest trading emporium of the eastern seas, drawing all merchants to our shores? Or shall we build a fleet to patrol our waters, ensuring that the strait remains our domain and our destiny?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ban.1.a: "Let the pepper flow — make Banten the market of the world."
 nd_ban.1.b: "The strait is ours — none shall pass without our leave."
 nd_ban.2.t: "The Defiance of Sultan Ageng"
 nd_ban.2.d: "Sultan Ageng Tirtayasa ascends to the throne of Banten at a time when the Dutch East India Company tightens its grip on the archipelago. Where other rulers bend to the VOC's demands for exclusive trading rights, Ageng refuses. He builds a fleet on European models, opens Banten's ports to English, Danish, and Chinese merchants, and dispatches traders to Persia, India, Siam, and Japan.\n\nIn 1656, the fragile peace shatters. Bantenese forces raid Batavian districts, ambush Dutch patrols, and kill their commanders. The VOC blockades the port, but Ageng fights on. His reign marks the golden age of Banten — a sultanate that dared to defy a European monopoly and, for a time, prevailed.\n\nBut Ageng's defiance comes at a price. The court divides between those who would resist and those who seek accommodation with the Dutch. How shall we honor his legacy?"
 nd_ban.2.a: "Defy the monopolists — Banten will never bow."
 nd_ban.2.b: "Trade with all nations — let pepper be our shield."
 nd_ban.3.t: "The Masjid Agung of Banten"
 nd_ban.3.d: "The Great Mosque of Banten rises above the port city, its five-tiered roof a fusion of Javanese, Chinese, and Islamic architectural traditions. Built by Sultan Maulana Hasanuddin, the mosque's stepped roofline echoes both the sacred mountains of Hindu Java and the pagodas of Chinese trading partners, while its four saka guru pillars anchor the prayer hall in the geometric precision of Islamic design.\n\nThe Masjid Agung becomes more than a place of worship — it is the spiritual heart of the sultanate, where the ulama advise the sultan, where treaties are blessed, and where the faithful gather on Fridays to pray for the prosperity of the pepper trade. Later, the Dutch convert Hendrik Lucaasz Cardeel will design the tiyamah addition, a two-story Dutch-style building that stands as testament to Banten's cosmopolitan character."
 nd_ban.3.a: "A monument to faith and commerce alike."
 nd_ban.4.t: "The Pepper Gardens of Lampung"
 nd_ban.4.d: "Across the Sunda Strait on the southern tip of Sumatra, the province of Lampung becomes the engine of Banten's wealth. By sultanic decree, every subject over sixteen years of age must plant and maintain five hundred pepper stems. The vine-covered hillsides of Tulang Bawang, Seputih, and Sekampung become the largest pepper-producing region in the archipelago.\n\nChinese intermediaries collect the harvest and funnel it to Banten's warehouses, where it enters the global market. The black peppercorns of Lampung — prized for their pungency and quality — command premium prices from Lisbon to Canton. This systematic cultivation transforms Banten from a trading port into a production powerhouse."
 nd_ban.4.a: "Five hundred stems per subject — the Sultan's will be done."
 nd_ban_sunda_pepper_heritage: "Sunda Pepper Heritage"
 nd_ban_sunda_pepper_heritage_desc: "The ancient Kingdom of Sunda cultivated pepper in western Java for centuries before the coming of Islam. Banten inherits these established trade networks and cultivation techniques."
 nd_ban_islamic_conversion: "Islamization of Banten"
 nd_ban_islamic_conversion_desc: "Under the guidance of Sunan Gunung Jati and the Demak Sultanate, the Hindu port of Sunda transforms into the Islamic Sultanate of Banten, bringing new religious unity and connections to the wider Muslim trading world."
 nd_ban_strait_raiders: "Strait Raiders"
 nd_ban_strait_raiders_desc: "Bantenese sailors in their jong trading vessels patrol the Sunda Strait, controlling the passage between the Indian Ocean and the Java Sea."
 nd_ban_port_foundations: "Port Town Foundations"
 nd_ban_port_foundations_desc: "The establishment of Banten as a major port with permanent warehouse infrastructure for storing and trading pepper."
 nd_ban_debus_tradition: "Debus Martial Tradition"
 nd_ban_debus_tradition_desc: "The Debus practitioners of Banten combine Sufi mysticism with martial arts, performing feats that demonstrate their spiritual invulnerability. These warriors serve as shock troops whose fervor in battle unnerves their enemies."
 nd_ban_coastal_subsistence: "Coastal Subsistence"
 nd_ban_coastal_subsistence_desc: "The coastal villages of western Java sustain themselves through rice cultivation and fishing, providing the food base that supports Banten's urban population."
 nd_ban_surosowan_tradition: "Surosowan Palace Tradition"
 nd_ban_surosowan_tradition_desc: "The construction of the Surosowan Palace complex, covering over thirty thousand square meters with bathing pools, pavilion fountains, and an impressive aqueduct system, establishes the architectural grandeur of the Bantenese court."
 nd_ban_sultanate_founding: "Sultanate Founding"
 nd_ban_sultanate_founding_desc: "Maulana Hasanuddin establishes the Banten Sultanate in 1527, combining military conquest with the spread of Islam to create a new Islamic polity on the ruins of the Hindu Kingdom of Sunda."
 nd_ban_chinese_quarter: "Pecinan Quarter"
 nd_ban_chinese_quarter_desc: "Chinese merchants establish a permanent quarter in Banten, serving as crucial intermediaries who collect pepper from Lampung producers and sell it on overseas markets."
 nd_ban_masjid_agung: "Masjid Agung"
 nd_ban_masjid_agung_desc: "The Grand Mosque of Banten, with its distinctive five-tiered roof blending Javanese, Chinese, and Islamic architectural traditions, becomes the spiritual center of the sultanate."
 nd_ban_pepper_entrepot: "Pepper Entrepot"
 nd_ban_pepper_entrepot_desc: "Banten's markets develop sophisticated systems for processing, sorting, and grading pepper for export, adding value to the raw product from Lampung's gardens."
 nd_ban_european_contacts: "European Contacts"
 nd_ban_european_contacts_desc: "The arrival of Portuguese, Dutch, English, and Danish traders opens new markets for Banten's pepper and introduces the sultanate to European diplomacy and technology."
 nd_ban_patrol_fleet: "Strait Patrol Fleet"
 nd_ban_patrol_fleet_desc: "Purpose-built light ships patrol the Sunda Strait, ensuring Banten's control over this vital chokepoint and intercepting smugglers and rivals."
 nd_ban_lampung_plantations: "Lampung Plantations"
 nd_ban_lampung_plantations_desc: "The systematic organization of pepper cultivation in Lampung, requiring every subject to plant five hundred pepper stems, transforms the province into the largest pepper producer in the archipelago."
 nd_ban_strait_tolls: "Sunda Strait Tolls"
 nd_ban_strait_tolls_desc: "Banten establishes formal toll collection on ships passing through the Sunda Strait, converting its geographic advantage into a steady stream of revenue."
 nd_ban_cosmopolitan_port: "Cosmopolitan Port"
 nd_ban_cosmopolitan_port_desc: "Banten's harbor hosts merchants from across Asia and Europe — Muslims, Hindus, Buddhists, and Christians trade side by side in the sultanate's markets, protected by the Sultan's tolerance."
 nd_ban_naval_expansion: "Naval Expansion"
 nd_ban_naval_expansion_desc: "The construction of war praus — heavier combat galleys designed for naval warfare rather than trade — marks Banten's transition from a trading port to a maritime power."
 nd_ban_manuscript_tradition: "Manuscript Tradition"
 nd_ban_manuscript_tradition_desc: "Bantenese scholars produce manuscripts on Islamic law, Sundanese literature, and maritime navigation, creating a literary tradition that preserves the sultanate's knowledge for future generations."
 nd_ban_pepper_diplomacy_advance: "Pepper Diplomacy"
 nd_ban_pepper_diplomacy_advance_desc: "Banten leverages its position as the world's premier pepper supplier to forge diplomatic relationships across the globe, offering favorable trade terms in exchange for political support."
 nd_ban_port_fortification: "Port Fortification"
 nd_ban_port_fortification_desc: "Stone bastions and coastal batteries defend Banten's harbor from naval attack, protecting the sultanate's commercial lifeline."
 nd_ban_ageng_tirtayasa: "Sultan Ageng Tirtayasa"
 nd_ban_ageng_tirtayasa_desc: "Sultan Ageng Tirtayasa leads Banten through its golden age, building a European-style fleet, expanding trade to Persia and Japan, and defying the Dutch East India Company's bid for monopoly."
 nd_ban_fleet_modernization: "Fleet Modernization"
 nd_ban_fleet_modernization_desc: "Under Sultan Ageng, Banten constructs galleys modeled on European designs, incorporating heavier armament and more durable construction techniques learned from English and Danish allies."
 nd_ban_anti_monopoly: "Anti-Monopoly Resistance"
 nd_ban_anti_monopoly_desc: "Banten's policy of trading with all nations — English, Danish, Chinese, Persian — directly challenges the VOC's ambition to monopolize the spice trade in the archipelago."
 nd_ban_kaibon_court: "Kaibon Court Culture"
 nd_ban_kaibon_court_desc: "The Kaibon Palace, residence of the queen mother, becomes a center of refined court culture where Sundanese artistic traditions blend with Islamic and cosmopolitan influences."
 nd_ban_debus_elite: "Elite Debus Guard"
 nd_ban_debus_elite_desc: "The Sultan's personal guard of Debus masters, whose demonstrations of spiritual invulnerability and martial skill make them feared on the battlefield and revered in the court."
 nd_ban_international_network: "International Trade Network"
 nd_ban_international_network_desc: "Banten's merchants trade with Persia, India, Siam, Vietnam, China, the Philippines, and Japan, creating a commercial network that spans the entire Indian Ocean and Pacific Rim."
 nd_ban_pepper_refinement: "Pepper Refinement"
 nd_ban_pepper_refinement_desc: "Advanced techniques for sorting, grading, and packaging pepper ensure that Banten's exports command the highest prices in world markets."
 nd_ban_centralized_sultanate: "Centralized Sultanate"
 nd_ban_centralized_sultanate_desc: "The consolidation of sultanic authority over the provinces, courts, and markets of Banten, creating an efficient administrative apparatus to manage the pepper trade and naval forces."
 nd_ban_coastal_defense: "Coastal Defense Network"
 nd_ban_coastal_defense_desc: "A comprehensive system of batteries, watchtowers, and naval patrols protects Banten's coastline and the Sunda Strait from foreign aggression."
 nd_ban_maritime_projection: "Maritime Projection"
 nd_ban_maritime_projection_desc: "Banten's fleet extends its reach beyond the Sunda Strait, projecting maritime power across the Java Sea and into the Indian Ocean."
 nd_ban_pepper_monopoly: "Pepper Monopoly"
 nd_ban_pepper_monopoly_desc: "Through control of production in Lampung and distribution through Banten's warehouses, the sultanate consolidates a near-monopoly on the finest pepper in Southeast Asia."
 nd_ban_islamic_scholarship: "Islamic Scholarship"
 nd_ban_islamic_scholarship_desc: "The pesantren schools and mosque libraries of Banten become centers of Islamic learning, attracting scholars from across the Malay world and producing commentaries on law, theology, and mysticism."
 nd_ban_modern_patrol_fleet: "Modern Patrol Fleet"
 nd_ban_modern_patrol_fleet_desc: "Fast frigates replace the aging prau fleet, giving Banten's navy the speed and firepower to patrol the Sunda Strait against modern threats."
 nd_ban_governance_reform: "Governance Reform"
 nd_ban_governance_reform_desc: "Administrative reforms modernize the sultanate's bureaucracy, introducing systematic record-keeping, codified taxation, and professional civil servants."
 nd_ban_industrial_pepper: "Industrial Pepper Processing"
 nd_ban_industrial_pepper_desc: "Mechanized processing facilities transform Banten's pepper industry, increasing output quality and consistency while reducing labor requirements."
 nd_ban_modern_port: "Modern Port Infrastructure"
 nd_ban_modern_port_desc: "Modern docks, cranes, and warehouses replace the traditional waterfront, allowing Banten to handle the larger ships and greater volumes of the industrial age."
 nd_ban_national_awakening: "National Awakening"
 nd_ban_national_awakening_desc: "A renaissance of Sundanese cultural identity finds expression in literature, arts, and political thought, as Banten's people define their place in a changing world."
 nd_ban_modern_navy: "Modern Navy"
 nd_ban_modern_navy_desc: "Steam-powered corvettes and modern naval doctrine give Banten the capability to defend its waters against the great powers of the industrial age."
 nd_ban_sundanese_heritage: "Sundanese Heritage"
 nd_ban_sundanese_heritage_desc: "The preservation and celebration of Sundanese language, customs, and identity, ensuring that the cultural traditions of western Java endure through the upheavals of the modern era."
 n_nd_ban_jong: "Jong"
 n_nd_ban_jong_desc: "The jong is a traditional Sundanese trading vessel adapted for warfare. Fast and maneuverable in the narrow waters of the Sunda Strait, these ships serve as the backbone of Banten's early naval forces."
 a_nd_ban_debus_warriors: "Debus Warriors"
 a_nd_ban_debus_warriors_desc: "Practitioners of the mystical Debus martial art, these warriors demonstrate their spiritual power through feats of apparent invulnerability before charging into battle with fearsome morale."
 a_nd_ban_debus_elite: "Sultan's Debus Guard"
 a_nd_ban_debus_elite_desc: "The elite personal guard of the Sultan, these master Debus practitioners combine spiritual discipline with professional military training to serve as shock infantry."
 n_nd_ban_strait_patrol: "Strait Patrol Ship"
 n_nd_ban_strait_patrol_desc: "Purpose-built light vessels designed for speed and interception in the Sunda Strait. Their shallow draft and lateen sails allow them to chase down smugglers and pirates in the archipelago's narrow waters."
 n_nd_ban_war_prau: "War Prau"
 n_nd_ban_war_prau_desc: "A heavier galley built for naval combat, the war prau carries more guns and a larger crew than trading vessels, designed to enforce Banten's control of the Sunda Strait through force of arms."
 n_nd_ban_modern_galley: "Bantenese Galley"
 n_nd_ban_modern_galley_desc: "Built on European models with the help of English and Danish shipwrights, these modernized galleys combine local seamanship with Western naval architecture, giving Sultan Ageng's fleet the firepower to challenge the VOC."
 n_nd_ban_frigate_patrol: "Strait Frigate"
 n_nd_ban_frigate_patrol_desc: "A fast patrol frigate optimized for interdiction and blockade operations in the Sunda Strait. Faster than standard warships, these vessels can run down merchantmen and outpace heavier ships of the line."
 n_nd_ban_modern_corvette: "Bantenese Corvette"
 n_nd_ban_modern_corvette_desc: "A nimble modern warship built for coastal defense and strait patrol. The corvette sacrifices heavy armament for speed and maneuverability, perfect for the confined waters between Java and Sumatra."
 nd_ban_pepper_gudang: "Pepper Gudang"
 nd_ban_pepper_gudang_desc: "A warehouse complex for storing, sorting, and trading pepper. The gudang is the commercial heart of Banten's port, where black peppercorns from Lampung are prepared for export to the world."
 nd_ban_surosowan_palace: "Surosowan Palace"
 nd_ban_surosowan_palace_desc: "The magnificent palace complex of the Banten sultans, featuring bathing pools, pavilion fountains, an aqueduct system, and audience halls where the Sultan receives foreign ambassadors."
 nd_ban_pecinan_quarter: "Pecinan Quarter"
 nd_ban_pecinan_quarter_desc: "The Chinese merchant quarter of Banten, where traders from Fujian and Guangdong maintain permanent residences and warehouses, serving as crucial intermediaries in the pepper trade."
 nd_ban_grand_mosque: "Masjid Agung"
 nd_ban_grand_mosque_desc: "The Grand Mosque of Banten, its distinctive five-tiered roof symbolizing the five pillars of Islam, stands as the spiritual center of the sultanate and a masterpiece of Javanese-Islamic architecture."
 nd_ban_strait_tollhouse: "Strait Tollhouse"
 nd_ban_strait_tollhouse_desc: "An administrative outpost where Banten's officials collect tolls from vessels transiting the Sunda Strait, converting geographic advantage into revenue."
 nd_ban_coastal_bastion: "Coastal Bastion"
 nd_ban_coastal_bastion_desc: "Stone fortifications protecting Banten's harbor, designed to repel naval attacks and secure the commercial lifeline of the sultanate."
 nd_ban_coastal_battery: "Coastal Battery"
 nd_ban_coastal_battery_desc: "A modern artillery emplacement defending the coastline with heavy guns, capable of engaging enemy warships at range and deterring amphibious landings."
 nd_ban_modern_harbor: "Modern Harbor"
 nd_ban_modern_harbor_desc: "A modernized port facility with deep-water berths, mechanical cranes, and extensive warehouse capacity, capable of handling the trade volumes of the industrial age."
 nd_ban_gudang_upkeep: "Gudang Maintenance"
 nd_ban_gudang_upkeep_desc: "The cost of maintaining Banten's pepper warehouses — timber for repairs, paper for trade records, and pottery for weights and measures."
 nd_ban_palace_upkeep: "Palace Maintenance"
 nd_ban_palace_upkeep_desc: "The upkeep of the Surosowan Palace complex — stone and timber for the aqueduct, pools, and halls, with fine cloth for the court's audiences and furnishings."
 nd_ban_pecinan_upkeep: "Quarter Maintenance"
 nd_ban_pecinan_upkeep_desc: "The cost of maintaining the Chinese merchant quarter's infrastructure and trade facilities."
 nd_ban_mosque_upkeep: "Mosque Maintenance"
 nd_ban_mosque_upkeep_desc: "The operating costs of the Grand Mosque — incense for worship, cloth for prayer rugs, and paper for Quran manuscripts and scholarly texts."
 nd_ban_toll_collection: "Toll Collection"
 nd_ban_toll_collection_desc: "The administrative cost of operating the Sunda Strait toll system — timber for the tollhouse, paper for shipping registers, and pottery tokens used as toll receipts."
 nd_ban_bastion_upkeep: "Bastion Maintenance"
 nd_ban_bastion_upkeep_desc: "The cost of maintaining stone coastal fortifications and their garrison."
 nd_ban_battery_upkeep: "Battery Maintenance"
 nd_ban_battery_upkeep_desc: "The cost of maintaining coastal artillery emplacements and their ammunition supply."
 nd_ban_harbor_upkeep: "Harbor Maintenance"
 nd_ban_harbor_upkeep_desc: "The cost of maintaining modern port infrastructure — docks, cranes, and warehouses."
 nd_ban_pepper_processing: "Pepper Processing"
 nd_ban_pepper_processing_desc: "The sorting, drying, and initial grading of raw peppercorns — dyes for quality marking, fiber sacking for bagging, and tools for the processing equipment."
 nd_ban_lampung_cultivation: "Lampung Cultivation"
 nd_ban_lampung_cultivation_desc: "The organized system of pepper cultivation in Lampung, where timber frames support climbing pepper vines and iron tools turn the soil."
 nd_ban_pepper_grading: "Pepper Grading"
 nd_ban_pepper_grading_desc: "Advanced quality control sorting pepper into export grades, with the finest black peppercorns commanding premium prices."
 nd_ban_industrial_processing: "Industrial Processing"
 nd_ban_industrial_processing_desc: "Mechanized facilities for processing pepper at industrial scale, using modern equipment for cleaning, sorting, and packaging."
 levy_nd_ban_debus_elite: "Sultan's Debus Guard"
 levy_nd_ban_debus: "Debus Warriors"
 levy_nd_ban_jong: "Jong Fleet"
 levy_nd_ban_debus_elite_desc: "The sultan's personal bodyguard of Debus practitioners — invulnerable spiritual warriors who serve as the elite guard of the Banten court."
 levy_nd_ban_debus_desc: "Volunteer Debus martial artists from the villages of Banten — spiritual warriors wielding knives and iron chains."
 levy_nd_ban_jong_desc: "A fleet of traditional jong trading vessels pressed into naval service — crewed by sailors from Banten's coastal communities."
 nd_ban_formed_tt: "Banten has been formed"
 nd_ban_path_a_tt: "Chose Pepper Emporium of the East"
 nd_ban_path_b_tt: "Chose Guardians of the Sunda Strait"
 nd_ban_destiny: "Destiny of Banten"
 nd_ban_destiny_desc: "The Sultanate of Banten has risen from the ashes of the Hindu Kingdom of Sunda. Now the Sultan must choose the path that will define the nation's future — the wealth of pepper or the power of the fleet."
 nd_ban_dest_pepper_empire: "Pepper Empire"
 nd_ban_dest_pepper_empire_desc: "Seize control of Palembang, the rival pepper-producing center of southern Sumatra. Only by dominating both sides of the Sunda Strait can Banten's pepper merchants command the world market."
 nd_ban_dest_spice_crossroads: "Crossroads of the Spice Trade"
 nd_ban_dest_spice_crossroads_desc: "Extend Banten's commercial reach to Malacca and Temasek. Control of the Strait of Malacca alongside the Sunda Strait would make Banten the undisputed master of Southeast Asian maritime commerce."
 nd_ban_dest_world_market: "World Pepper Market"
 nd_ban_dest_world_market_desc: "Absorb the pepper sultanate of Aceh and the trading port of Kedah, ensuring that every pepper-producing region from Lampung to northern Sumatra answers to Banten. With pepper flowing through our capital market, Banten becomes the world's premier spice exchange."
 nd_ban_dest_strait_command: "Command of the Straits"
 nd_ban_dest_strait_command_desc: "Conquer Cirebon and Demak to secure Banten's position on Java. Control of the northern Javanese coast prevents rivals from challenging our domination of the Sunda Strait."
 nd_ban_dest_eastern_seas: "Mastery of the Eastern Seas"
 nd_ban_dest_eastern_seas_desc: "Project Bantenese naval power into the Makassar Strait and across the Java Sea to Bali. The maritime kingdoms of eastern Indonesia must acknowledge Banten's supremacy."
 nd_ban_dest_archipelago_hegemon: "Archipelago Hegemon"
 nd_ban_dest_archipelago_hegemon_desc: "Extend Banten's dominion to the Spice Islands of Ternate and the ports of Brunei. From the Sunda Strait to the Moluccas, no fleet sails these waters without Bantenese consent."
 nd_ban.5.t: "A Sultanate Reborn"
 nd_ban.5.d: "The formation of the Sultanate of Banten marks a turning point in the history of western Java. The old Hindu trading networks have been absorbed into a new Islamic polity that commands the Sunda Strait — the narrow passage through which all commerce between the Indian Ocean and the Java Sea must pass.\n\nThe Sultan gazes from the walls of Surosowan across a harbor crowded with foreign vessels. Chinese junks sit alongside Indian dhows and, increasingly, the strange square-rigged ships of the Europeans. Each brings silver; each leaves laden with pepper. The question is not whether Banten will grow rich, but how best to channel that wealth into lasting power."
 nd_ban.5.a: "The future belongs to those who seize it."
 nd_ban.6.t: "The Palembang Pepper Wars"
 nd_ban.6.d: "Palembang has long been Banten's chief rival for control of the pepper trade in southern Sumatra. Where Banten dominates the western coast and Lampung, Palembang controls the Musi River basin and its access to the pepper gardens of the interior. With Palembang now under our authority, the southern Sumatran pepper trade flows through a single channel — our warehouses in Banten.\n\nMerchants who once played Banten and Palembang against each other now have no alternative. The price of pepper is set in our gudangs, and it is set to our advantage."
 nd_ban.6.a: "All pepper roads lead to Banten."
 nd_ban.7.t: "Banten at the Crossroads"
 nd_ban.7.d: "The conquest of Malacca and Temasek transforms Banten from a regional pepper power into a global commercial hub. Where once merchants could bypass our ports through the Strait of Malacca, now both great passages between the Indian Ocean and the Pacific are under Bantenese control.\n\nForeign merchants present themselves at our harbors with new deference. The English, the Danes, the Persians — all seek favorable terms from the sultanate that holds the keys to two oceans. The question is how to leverage this unprecedented position."
 nd_ban.7.a: "Build trade networks across the known world."
 nd_ban.7.b: "Tighten our grip on the strait passages."
 nd_ban.8.t: "The World Pepper Market"
 nd_ban.8.d: "From Lampung to Aceh, every major pepper-producing region in the archipelago now answers to the Sultan of Banten. The black peppercorns that Europe craves, that China seasons its cuisine with, that Indian merchants trade across the Arabian Sea — all of it passes through our warehouses and our markets.\n\nBanten has achieved what no previous sultanate managed: a near-monopoly on the world's most valuable spice. The question now is whether to wield this monopoly as an instrument of royal enrichment or to declare Banten a free port, drawing all the world's trade to our shores through the promise of fair dealing."
 nd_ban.8.a: "The Sultan shall be King of Pepper."
 nd_ban.8.b: "Declare Banten a free port for all nations."
 nd_ban.9.t: "The Javanese Campaign"
 nd_ban.9.d: "The fall of Cirebon and Demak secures Banten's eastern flank on Java. The northern Javanese coast — its ports, its shipyards, its rice-rich hinterland — now supports the Sultan's ambitions rather than threatening them.\n\nBantenese patrol ships range freely along the coast, and the war praus that once guarded only the Sunda Strait now project power across the Java Sea. The admirals speak of distant conquests — Makassar, Bali, even the fabled Spice Islands."
 nd_ban.9.a: "The Java Sea shall be our domain."
 nd_ban.10.t: "Eastern Conquests"
 nd_ban.10.d: "Bantenese war fleets have achieved what seemed impossible — the conquest of Makassar and the subjugation of the Balinese kingdoms. The eastern seas that were once the domain of Buginese pirates and independent rajas now fall under the Sultan's authority.\n\nThe spice routes from the Moluccas to Java now pass through waters patrolled by Bantenese galleys. Our merchants establish factors in conquered ports, and our administrators impose the Sultan's law on peoples who have never known Sundanese rule. The question is how to consolidate these far-flung conquests."
 nd_ban.10.a: "Rule through naval supremacy."
 nd_ban.10.b: "Unite the Javanese peoples under one banner."
 nd_ban.11.t: "Hegemon of the Archipelago"
 nd_ban.11.d: "From the Sunda Strait to the Moluccas, from Brunei to Bali, the Sultanate of Banten has imposed its will across the archipelago. The fabled Spice Islands of Ternate — source of the cloves that Europeans prize above gold — now fly the Sultan's banner. The ports of Brunei, gateway to the South China Sea, submit to Bantenese authority.\n\nNo European company, no rival sultanate, no coalition of rajas can challenge Banten's dominion over these waters. The Sultan's fleet is the largest in Southeast Asia, and his armies garrison ports from Sumatra to the Moluccas. This is the empire that Sultan Ageng Tirtayasa dreamed of — a maritime state that bows to no foreign power."
 nd_ban.11.a: "Command the seas with an iron fleet."
 nd_ban.11.b: "Rule as Emperor of the Islands."
 STATIC_MODIFIER_NAME_nd_ban_dest_malacca_network: "Malaccan Trade Network"
 STATIC_MODIFIER_DESC_nd_ban_dest_malacca_network: "Banten's merchants have established trade networks radiating from the conquered port of Malacca, connecting the pepper markets of the archipelago to the wider world."
 STATIC_MODIFIER_NAME_nd_ban_dest_strait_monopoly: "Twin Straits Monopoly"
 STATIC_MODIFIER_DESC_nd_ban_dest_strait_monopoly: "Control of both the Sunda Strait and the Strait of Malacca gives Banten an effective monopoly on maritime trade between the Indian Ocean and the Pacific."
 STATIC_MODIFIER_NAME_nd_ban_dest_pepper_king: "King of Pepper"
 STATIC_MODIFIER_DESC_nd_ban_dest_pepper_king: "The Sultan of Banten commands a near-total monopoly on the world's pepper supply, setting prices from Lisbon to Canton and enriching the sultanate beyond measure."
 STATIC_MODIFIER_NAME_nd_ban_dest_free_port: "Free Port of the East"
 STATIC_MODIFIER_DESC_nd_ban_dest_free_port: "Banten has declared itself a free port open to all nations, drawing merchants from every corner of the globe with promises of fair dealing and low tariffs."
 STATIC_MODIFIER_NAME_nd_ban_dest_makassar_conquest: "Conqueror of Makassar"
 STATIC_MODIFIER_DESC_nd_ban_dest_makassar_conquest: "The conquest of Makassar opens the eastern seas to Bantenese naval power, securing the spice routes and projecting the Sultan's authority into the heart of the archipelago."
 STATIC_MODIFIER_NAME_nd_ban_dest_java_unifier: "Unifier of Java"
 STATIC_MODIFIER_DESC_nd_ban_dest_java_unifier: "The Javanese kingdoms have been brought under a single banner. From Banten to Surabaya, the island that was once divided among rival sultanates now serves a single master."
 STATIC_MODIFIER_NAME_nd_ban_dest_spice_admiral: "Spice Admiral"
 STATIC_MODIFIER_DESC_nd_ban_dest_spice_admiral: "Banten's admirals command the mightiest fleet in the archipelago, their galleys and warships patrolling sea lanes from the Sunda Strait to the Moluccas."
 STATIC_MODIFIER_NAME_nd_ban_dest_island_emperor: "Emperor of the Islands"
 STATIC_MODIFIER_DESC_nd_ban_dest_island_emperor: "The Sultan of Banten rules as emperor over a vast maritime dominion, his subjects spanning dozens of islands and his vassals governing from Brunei to Ternate."
 nd_ban_global_pepper_exchange: "Global Pepper Exchange"
 nd_ban_global_pepper_exchange_desc: "A vast commercial complex where pepper from across the archipelago is auctioned to merchants from every trading nation on earth. The Exchange sets the world price for black pepper."
 nd_ban_exchange_upkeep: "Exchange Maintenance"
 nd_ban_exchange_upkeep_desc: "The cost of maintaining the Global Pepper Exchange — paper for trade ledgers, fine cloth for auction halls, and tools for the weighing equipment."
 nd_ban_admiralty_citadel: "Admiralty Citadel"
 nd_ban_admiralty_citadel_desc: "A fortified naval headquarters from which the Sultan's admirals coordinate fleet operations across the archipelago. The citadel houses navigation charts, signal stations, and an arsenal for the fleet."
 nd_ban_citadel_upkeep: "Citadel Maintenance"
 nd_ban_citadel_upkeep_desc: "The cost of maintaining the Admiralty Citadel — stone for fortifications, naval supplies for the arsenal, and weaponry for the garrison."
