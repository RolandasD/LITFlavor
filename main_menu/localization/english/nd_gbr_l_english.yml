l_english:
 STATIC_MODIFIER_NAME_nd_rule_britannia: "Rule Britannia"
 STATIC_MODIFIER_DESC_nd_rule_britannia: "The Act of Union has forged a maritime superpower. With the combined fleets of England and Scotland, and the wealth of the world's oceans beckoning, Britain shall command the seas, protect its trade routes, and project power to every corner of the globe."
 STATIC_MODIFIER_NAME_nd_workshop_of_the_world: "Workshop of the World"
 STATIC_MODIFIER_DESC_nd_workshop_of_the_world: "The union of England and Scotland creates not merely a political entity but an economic engine. With abundant natural resources, growing institutions of learning, and a culture of practical innovation, Britain shall become the workshop that supplies the world."
 nd_gbr.1.t: "The Act of Union"
 nd_gbr.1.d: "The Acts of Union have joined the Kingdoms of England and Scotland into a single sovereign state — Great Britain. The Scottish Parliament and English Parliament are dissolved, replaced by the Parliament of Great Britain at Westminster. This is no mere conquest; it is a negotiated union, born of shared Protestant faith, economic necessity, and the hard lessons of a century of civil wars.\n\nThe question now is what manner of nation this united Britain shall become. The combined Royal Navy already rivals any fleet afloat, and the chartered trading companies reach from the Spice Islands to the Americas. But within these islands lie coal seams, iron deposits, and a population of inventors, artisans, and entrepreneurs whose energies, properly harnessed, could transform the very nature of production itself.\n\nWhat shall define this new Britain?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_gbr.1.a: "Britannia shall rule the waves."
 nd_gbr.1.b: "We shall be the forge of nations."
 nd_gbr.2.t: "The Bank of England"
 nd_gbr.2.d: "In 1694, William Paterson persuaded Parliament to charter a novel institution: a national bank that would lend money to the government at interest, funded by public subscription. The Bank of England has proven revolutionary. By providing the Crown with reliable credit at reasonable rates, it has freed Britain from dependence on foreign bankers and enabled the sustained funding of both war and commerce.\n\nThe Bank's notes circulate alongside coin, and its capacity to manage the national debt gives Britain a financial resilience its rivals can only envy. But how shall this institution best serve the nation? Sound monetary policy would stabilize prices and reward thrift. Alternatively, generous credit could fuel merchant ventures and construction projects across the realm."
 nd_gbr.2.a: "Sound money is the foundation of lasting prosperity."
 nd_gbr.2.b: "Credit is the lifeblood of commerce."
 nd_gbr.3.t: "The Highland Regiments"
 nd_gbr.3.d: "The pacification of the Scottish Highlands after the Jacobite risings presented Britain with both a challenge and an opportunity. The fierce warrior tradition of the Highland clans — the devastating charge with broadsword and targe, the endurance bred by mountain life — could be turned from a source of rebellion into a pillar of imperial strength.\n\nThe formation of Independent Highland Companies, later merged into the Black Watch and other regiments, channels this martial spirit into service of the Crown. Highland soldiers have already proven themselves from Fontenoy to Fort Ticonderoga, their courage and ferocity earning respect even from their enemies.\n\nShall we focus on integrating these proud people fully into British society, or preserve their distinct martial tradition as a weapon of empire?"
 nd_gbr.3.a: "Welcome them as equal subjects of the Crown."
 nd_gbr.3.b: "Let the Highland charge terrify our enemies."
 nd_gbr.4.t: "The East India Company"
 nd_gbr.4.d: "What began as a modest joint-stock venture to trade in Eastern spices has become the most powerful commercial enterprise the world has ever seen. The East India Company now maintains its own armies, governs vast territories, and conducts diplomacy with sovereign rulers from the Mughal Emperor to the Sultan of Sulu.\n\nFrom the warehouses of Surat to the counting houses of Calcutta, Company agents trade in cotton, silk, indigo, tea, and opium. The revenues flowing back to London fuel investment, feed the Treasury through customs duties, and make fortunes for shareholders. The East Indiaman — those great armed merchantmen that ply the route to India — have become the commercial backbone of the British Empire."
 nd_gbr.4.a: "Trade is the sinew of empire."
 nd_gbr.5.t: "First Rates of the Line"
 nd_gbr.5.d: "The first-rate ship of the line represents the pinnacle of wooden warship construction. Mounting a hundred guns or more across three decks, these floating fortresses can deliver devastating broadsides that can reduce any opposition to splinters. The Victory, the Royal Sovereign, the Britannia — their very names speak of naval supremacy.\n\nBuilding and maintaining such vessels requires prodigious resources: thousands of oak trees for the hull, miles of rope and canvas, tons of iron for fittings and guns, and crews numbering eight hundred men or more. Only a nation with Britain's dockyards, its timber reserves, its trained seamen, and its financial institutions can sustain a fleet of such leviathans. They are as much a statement of industrial and organizational capacity as of naval ambition."
 nd_gbr.5.a: "The wooden walls of England."
 STATIC_MODIFIER_NAME_nd_gbr_sound_money: "Sound Money"
 STATIC_MODIFIER_DESC_nd_gbr_sound_money: "The Bank of England pursues a policy of monetary stability, maintaining the value of the pound sterling and providing reliable credit to the Crown at favorable rates."
 STATIC_MODIFIER_NAME_nd_gbr_mercantile_credit: "Mercantile Credit"
 STATIC_MODIFIER_DESC_nd_gbr_mercantile_credit: "The Bank of England extends generous credit to merchants and builders alike, fueling a boom in commercial ventures and construction projects across the realm."
 STATIC_MODIFIER_NAME_nd_gbr_highland_integration: "Highland Integration"
 STATIC_MODIFIER_DESC_nd_gbr_highland_integration: "The Highland clans are welcomed as equal subjects of the Crown, their culture respected and their people integrated into the broader fabric of British society."
 STATIC_MODIFIER_NAME_nd_gbr_martial_tradition: "Highland Martial Tradition"
 STATIC_MODIFIER_DESC_nd_gbr_martial_tradition: "The fierce warrior traditions of the Scottish Highlands are preserved and celebrated, channeled into elite regiments that terrify Britain's enemies on battlefields across the globe."
 nd_gbr_staple_ports: "Staple Ports"
 nd_gbr_staple_ports_desc: "The wool staple system channels English trade through designated ports, establishing regulated markets that concentrate commercial activity and generate reliable customs revenue."
 nd_gbr_admiralty_courts: "Admiralty Courts"
 nd_gbr_admiralty_courts_desc: "Specialized courts of admiralty jurisdiction settle maritime disputes, enforce prize law, and provide the legal framework for an expanding naval establishment."
 nd_gbr_new_model_army: "New Model Army"
 nd_gbr_new_model_army_desc: "Oliver Cromwell's revolutionary innovation: a professional standing army organized by merit rather than social rank, trained to strict discipline, and loyal to the cause rather than to individual commanders."
 nd_gbr_chartered_companies: "Chartered Companies"
 nd_gbr_chartered_companies_desc: "Royal charters grant joint-stock companies monopoly trading rights in distant regions, combining private capital with public purpose to extend British commercial reach across the globe."
 nd_gbr_race_built_galleon: "Race-Built Galleons"
 nd_gbr_race_built_galleon_desc: "Sir John Hawkins' revolutionary ship design: lower in the water, longer in proportion to beam, and faster than the towering Spanish galleons they were built to fight."
 nd_gbr_english_dragoons: "English Dragoons"
 nd_gbr_english_dragoons_desc: "Mounted infantry who ride to battle but fight on foot, combining the strategic mobility of cavalry with the firepower of musketeers."
 nd_gbr_royal_dockyards: "Royal Dockyards"
 nd_gbr_royal_dockyards_desc: "The great naval dockyards at Chatham, Portsmouth, and Deptford form the industrial backbone of the Royal Navy, capable of building, fitting, and repairing warships on an unprecedented scale."
 nd_gbr_sloop_warfare: "Sloop Warfare"
 nd_gbr_sloop_warfare_desc: "Small, fast sloops-of-war patrol the coastlines and trade routes, hunting pirates, escorting convoys, and maintaining British naval presence in waters too shallow or too remote for ships of the line."
 nd_gbr_bank_of_england: "Bank of England"
 nd_gbr_bank_of_england_desc: "The establishment of a national bank in 1694 revolutionizes government finance, providing reliable credit, stabilizing currency, and giving Britain a financial advantage that its rivals cannot match."
 nd_gbr_highland_regiments: "Highland Regiments"
 nd_gbr_highland_regiments_desc: "The fierce warrior traditions of the Scottish Highlands are harnessed for imperial service, as clan warriors are organized into disciplined regiments that combine Highland ferocity with British drill."
 nd_gbr_east_india_trade: "East India Trade"
 nd_gbr_east_india_trade_desc: "The East India Company's armed merchantmen — the East Indiamen — ply the route to India and beyond, combining formidable naval capability with vast cargo capacity."
 nd_gbr_royal_marines: "Royal Marines"
 nd_gbr_royal_marines_desc: "The Duke of York and Albany's Maritime Regiment of Foot, established in 1664, creates a permanent corps of soldiers trained for shipboard combat, boarding actions, and amphibious operations."
 nd_gbr_turnpike_trusts: "Turnpike Trusts"
 nd_gbr_turnpike_trusts_desc: "Private turnpike trusts charge tolls to maintain and improve roads, creating a network of reliable all-weather routes that dramatically reduce journey times and transport costs across Britain."
 nd_gbr_frigate_design: "British Frigate Design"
 nd_gbr_frigate_design_desc: "The fifth-rate frigate becomes the Royal Navy's most versatile warship: fast enough to scout for the battle fleet, powerful enough to take on enemy merchantmen, and seaworthy enough to operate independently across vast oceans."
 nd_gbr_first_rate_ships: "First Rate Ships"
 nd_gbr_first_rate_ships_desc: "The first-rate ship of the line, mounting a hundred guns or more across three decks, represents the ultimate expression of wooden warship construction and naval industrial might."
 nd_gbr_horse_guards: "Horse Guards"
 nd_gbr_horse_guards_desc: "The Household Cavalry — the Life Guards and Royal Horse Guards — serve as the sovereign's personal mounted bodyguard and as elite heavy cavalry on the battlefield."
 nd_gbr_charity_schools: "Charity Schools"
 nd_gbr_charity_schools_desc: "The Society for Promoting Christian Knowledge establishes charity schools across Britain, providing basic education to the children of the poor and laying the foundations of a literate workforce."
 nd_gbr_coal_and_iron: "Coal and Iron"
 nd_gbr_coal_and_iron_desc: "Britain's abundant coal seams and iron deposits, combined with innovations in smelting and metalworking, create the raw material base for an industrial transformation that will reshape the world."
 n_nd_gbr_race_built_ship: "Race-Built Galleon"
 n_nd_gbr_race_built_ship_desc: "A revolutionary English warship design with a lower profile, longer hull, and superior sailing qualities compared to the towering galleons of rival navies."
 n_nd_gbr_sloop: "Sloop-of-War"
 n_nd_gbr_sloop_desc: "A small, fast patrol vessel designed for convoy escort, anti-piracy operations, and coastal patrol duties."
 n_nd_gbr_east_indiaman: "East Indiaman"
 n_nd_gbr_east_indiaman_desc: "A heavily-built armed merchantman of the East India Company, designed for the long and dangerous voyage to India and the Far East."
 n_nd_gbr_frigate: "British Frigate"
 n_nd_gbr_frigate_desc: "The versatile fifth-rate warship of the Royal Navy, fast enough to scout and powerful enough to fight independently across the world's oceans."
 n_nd_gbr_first_rate: "First Rate"
 n_nd_gbr_first_rate_desc: "The ultimate expression of the wooden warship: a three-decked, hundred-gun floating fortress capable of devastating broadsides."
 a_nd_gbr_pikemen_levy: "New Model Pikemen"
 a_nd_gbr_pikemen_levy_desc: "Disciplined professional soldiers of the New Model Army tradition, trained to stand firm under fire and push pike with mechanical precision."
 a_nd_gbr_dragoon_levy: "English Dragoons"
 a_nd_gbr_dragoon_levy_desc: "Mounted infantry who ride to battle but dismount to fight, combining strategic mobility with firepower."
 a_nd_gbr_marines: "Royal Marines"
 a_nd_gbr_marines_desc: "Professional soldiers trained for shipboard combat, boarding actions, and amphibious landings. The sea soldiers of the Crown."
 a_nd_gbr_horse_guards: "Horse Guards"
 a_nd_gbr_horse_guards_desc: "The elite Household Cavalry of the British sovereign, combining ceremonial splendor with devastating battlefield capability."
 nd_gbr_royal_dockyard: "Royal Dockyard"
 nd_gbr_royal_dockyard_desc: "A major naval shipbuilding and repair facility, capable of constructing warships of all rates and maintaining the fleet in fighting condition."
 nd_gbr_trading_factory: "Trading Factory"
 nd_gbr_trading_factory_desc: "A commercial warehouse and trading post operated by chartered merchants, concentrating trade activity and extending British commercial networks."
 nd_gbr_turnpike_road: "Turnpike Road"
 nd_gbr_turnpike_road_desc: "A toll road maintained by a private trust, providing reliable all-weather transport that connects markets and reduces journey times."
 nd_gbr_charity_school: "Charity School"
 nd_gbr_charity_school_desc: "A school funded by charitable subscription to educate the children of the poor, spreading literacy and useful knowledge among the laboring classes."
 nd_gbr_admiralty_office: "Admiralty Office"
 nd_gbr_admiralty_office_desc: "A regional office of naval administration, coordinating fleet operations, managing sailor recruitment, and maintaining maritime records."
 nd_gbr_dockyard_maintenance: "Dockyard Operations"
 nd_gbr_dockyard_maintenance_desc: "The continuous supply of timber, naval stores, and tools required to build and maintain warships in a royal dockyard."
 nd_gbr_factory_maintenance: "Factory Operations"
 nd_gbr_factory_maintenance_desc: "The cloth, dyes, and paper records traded and consumed by the factory, sustaining its commercial activities."
 nd_gbr_turnpike_maintenance: "Turnpike Upkeep"
 nd_gbr_turnpike_maintenance_desc: "The stone, timber, and tools required to maintain the road surface, repair bridges, and keep the toll gates in order."
 nd_gbr_school_maintenance: "School Supplies"
 nd_gbr_school_maintenance_desc: "Paper and books required to operate the charity school, equipping pupils with the tools of literacy."
 nd_gbr_admiralty_maintenance: "Admiralty Operations"
 nd_gbr_admiralty_maintenance_desc: "Paper for correspondence, naval stores for provisioning, and fine cloth for the uniforms of officers and officials sustaining the admiralty's administrative functions."
 nd_gbr_formed_tt: "Great Britain has been formed"
 nd_gbr_path_a_tt: "Chose Rule Britannia"
 nd_gbr_path_b_tt: "Chose Workshop of the World"
 nd_gbr_dest_narrow_seas: "Command the Narrow Seas"
 nd_gbr_dest_narrow_seas_desc: "Britain's maritime destiny begins at home. Secure Ireland to unite the archipelago, seize Calais to dominate the English Channel, and build a force worthy of a naval power. Only then can the Royal Navy project strength beyond these waters."
 nd_gbr_dest_caribbean: "Caribbean Station"
 nd_gbr_dest_caribbean_desc: "The sugar islands of the Caribbean and the strategic bastion of Bermuda will anchor British naval power in the New World. Seize Havana from Spain and fortify the Atlantic, securing the trade routes that enrich the Crown."
 nd_gbr_dest_pax_britannica: "Pax Britannica"
 nd_gbr_dest_pax_britannica_desc: "The ultimate expression of British naval supremacy: control the world's vital chokepoints. Gibraltar commands the Mediterranean, Aden guards the Red Sea, Bombay anchors power in India, and Singapore secures the passage to the East."
 nd_gbr_dest_united_kingdom: "The United Kingdom"
 nd_gbr_dest_united_kingdom_desc: "Before Britain can reshape the world, it must first consolidate the home islands. Bring Ireland into the union, foster internal stability, and ensure coal — the fuel of the coming age — flows through British markets."
 nd_gbr_dest_city_of_london: "The City of London"
 nd_gbr_dest_city_of_london_desc: "The square mile of the City of London shall become the financial capital of the world. Amass the wealth of a great power, embrace modern banking institutions, and develop the kingdom into an economic engine without peer."
 nd_gbr_dest_industrial_revolution: "The Industrial Revolution"
 nd_gbr_dest_industrial_revolution_desc: "From the cotton mills of Manchester to the forges of Birmingham, Britain shall pioneer the age of machines. Embrace industrialization, develop the great manufacturing cities, and build a nation whose productive capacity dwarfs all rivals."
 nd_gbr_destiny: "The British Destiny"
 nd_gbr_destiny_desc: "Great Britain stands united. The question that defines its future — whether it shall command the seas or forge a new world through industry — demands an answer. The destiny of these islands, and of the world they will shape, begins here."
 nd_gbr.6.t: "The British Destiny"
 nd_gbr.6.d: "Great Britain is forged. England and Scotland are no longer rivals but partners in a union of extraordinary potential. The combined resources of these islands — the dockyards of the Thames, the coal seams of the Midlands, the hardy seamen of Cornwall and the Highlands — create a nation of unmatched versatility.\n\nBut potential alone does not make greatness. The path Britain chooses will determine whether it becomes the master of the world's oceans or the workshop that reshapes civilization itself. Both roads lead to supremacy, but they demand different sacrifices and different virtues."
 nd_gbr.6.a: "Our destiny awaits."
 nd_gbr.7.t: "Command of the Narrow Seas"
 nd_gbr.7.d: "The English Channel and the Irish Sea are now British waters in truth, not merely in aspiration. With Dublin secured and Calais in British hands, no fleet can threaten these islands, and no merchant vessel can pass without British leave.\n\nThe Narrow Seas are the gateway to the wider world. From this position of unassailable home defense, Britain can now project its naval power outward — to the Caribbean, to the Mediterranean, to the distant waters of the Indian Ocean."
 nd_gbr.7.a: "The Channel is ours."
 nd_gbr.8.t: "The Caribbean Station"
 nd_gbr.8.d: "British warships now patrol the turquoise waters of the Caribbean, and the Union Jack flies over Havana and Bermuda. The sugar islands produce fabulous wealth, the strategic harbors provide anchorage for squadrons that can strike anywhere in the Americas, and the trade routes home are secured against all comers.\n\nBut what shall this Caribbean dominion ultimately serve? The plantation wealth of sugar, rum, and tobacco can fuel Britain's merchant class to unprecedented prosperity. Alternatively, the Caribbean stations can become the forward operating bases of a fleet designed to control every ocean."
 nd_gbr.8.a: "Let the sugar trade flow to London."
 nd_gbr.8.b: "Our fleet shall command every horizon."
 nd_gbr.9.t: "Pax Britannica"
 nd_gbr.9.d: "Gibraltar. Aden. Bombay. Singapore. Four names that together spell global dominion. Britain now controls every vital chokepoint between Europe and the East, commanding the Mediterranean passage, the Red Sea route, the Indian Ocean, and the Straits of Malacca.\n\nNo fleet can move, no merchant can trade, no empire can project power without British permission. This is the Pax Britannica — peace enforced by the unmatched power of the Royal Navy. But how shall this unprecedented supremacy be wielded? Through the direct application of force, bending rivals to British will? Or through the patient construction of an imperial system, binding subject peoples into a federation that serves London?"
 nd_gbr.9.a: "Let gunboats carry our diplomacy."
 nd_gbr.9.b: "We shall bind the empire together."
 nd_gbr.10.t: "The United Kingdom"
 nd_gbr.10.d: "The Act of Union with Ireland completes the consolidation of the British Isles into a single political entity — the United Kingdom of Great Britain and Ireland. With internal stability secured and the coal that will power a revolution flowing freely through British markets, the foundations of economic supremacy are laid.\n\nThe home islands are no longer a collection of feuding kingdoms but a unified economic space of extraordinary productive potential. What was once a patchwork of regional economies is becoming a single, integrated market — the largest and most sophisticated in Europe."
 nd_gbr.10.a: "One kingdom, one market, one destiny."
 nd_gbr.11.t: "The City of London"
 nd_gbr.11.d: "The City of London — that ancient square mile within the old Roman walls — has become the undisputed financial capital of the world. The Bank of England sets interest rates that ripple across continents, Lloyd's insures every ship afloat, and the Royal Exchange sets commodity prices for goods from every corner of the globe.\n\nThis concentration of financial power gives Britain leverage that armies alone cannot provide. But the City's influence can be directed in different ways. Shall it serve as a stock exchange, directing capital into productive ventures and reducing the cost of construction across the realm? Or shall it develop as an insurance and intelligence market, where the information flowing through Lloyd's and the counting houses gives Britain unmatched diplomatic advantage?"
 nd_gbr.11.a: "Capital shall build this nation."
 nd_gbr.11.b: "Information is the true currency of power."
 nd_gbr.12.t: "The Industrial Revolution"
 nd_gbr.12.d: "The world will never be the same. In the cotton mills of Manchester and the iron foundries of Birmingham, a revolution is underway that will transform human civilization more profoundly than any conquest. Steam engines pump water from mines, drive looms that produce cloth a hundred times faster than hand weavers, and power bellows that smelt iron in quantities previously unimaginable.\n\nBritain stands at the epicenter of this transformation. But what shall the Industrial Revolution ultimately mean for British society? The raw productive power of steam can be channeled into military and logistical supremacy, enabling faster mobilization and movement of armies. Or the social upheaval of industrialization can be harnessed through parliamentary reform — extending the franchise, abolishing old injustices, and building a more stable society."
 nd_gbr.12.a: "Steam shall power our supremacy."
 nd_gbr.12.b: "Reform shall strengthen our society."
 STATIC_MODIFIER_NAME_nd_gbr_dest_sugar_trade: "Sugar Trade"
 STATIC_MODIFIER_DESC_nd_gbr_dest_sugar_trade: "The Caribbean sugar plantations generate enormous wealth, enriching Britain's merchant class and concentrating commercial power in the great trading houses, though the costs of maintaining distant garrisons strain the army's budget."
 STATIC_MODIFIER_NAME_nd_gbr_dest_colonial_fleet: "Colonial Fleet"
 STATIC_MODIFIER_DESC_nd_gbr_dest_colonial_fleet: "Purpose-built squadrons of fast, weatherly ships patrol the Atlantic and Caribbean, projecting British naval power across the ocean and securing every trade route for the Crown."
 STATIC_MODIFIER_NAME_nd_gbr_dest_gunboat_diplomacy: "Gunboat Diplomacy"
 STATIC_MODIFIER_DESC_nd_gbr_dest_gunboat_diplomacy: "A British warship in the harbor speaks louder than any ambassador. The Royal Navy enforces treaties, opens markets, and settles disputes with the implicit threat of devastating firepower."
 STATIC_MODIFIER_NAME_nd_gbr_dest_imperial_federation: "Imperial Federation"
 STATIC_MODIFIER_DESC_nd_gbr_dest_imperial_federation: "The far-flung territories of the British Empire are bound together by shared institutions, common law, and the invisible threads of trade and governance, though such vast dominion breeds a dangerous complacency."
 STATIC_MODIFIER_NAME_nd_gbr_dest_stock_exchange: "Stock Exchange"
 STATIC_MODIFIER_DESC_nd_gbr_dest_stock_exchange: "The London Stock Exchange channels private capital into productive investment, reducing the cost of construction and strengthening the Crown's financial position through a culture of innovation and speculation."
 STATIC_MODIFIER_NAME_nd_gbr_dest_insurance_market: "Insurance Market"
 STATIC_MODIFIER_DESC_nd_gbr_dest_insurance_market: "Lloyd's of London and the City's intelligence networks provide Britain with unmatched knowledge of global affairs, improving diplomatic relations and enabling the free flow of trade across open markets."
 STATIC_MODIFIER_NAME_nd_gbr_dest_steam_power: "Steam Power"
 STATIC_MODIFIER_DESC_nd_gbr_dest_steam_power: "The steam engine transforms not only industry but warfare. Faster recruitment, improved logistics, and the concentration of productive capacity in Britain's great cities give the nation a decisive military-industrial advantage."
 STATIC_MODIFIER_NAME_nd_gbr_dest_reform_acts: "The Reform Acts"
 STATIC_MODIFIER_DESC_nd_gbr_dest_reform_acts: "Parliamentary reform extends the franchise, abolishes rotten boroughs, and addresses the social upheavals of industrialization. A more representative government commands greater loyalty and reduces the appeal of separatism and revolution."
 nd_gbr_royal_arsenal: "Royal Arsenal"
 nd_gbr_royal_arsenal_desc: "A vast military-industrial complex combining shipbuilding, ordnance production, and garrison facilities, capable of equipping and maintaining both naval and land forces on a scale that no rival can match."
 nd_gbr_industrial_works: "Industrial Works"
 nd_gbr_industrial_works_desc: "A mechanized manufacturing facility powered by steam and coal, producing goods at a speed and scale that transforms the local economy and draws workers from across the region."
 nd_gbr_arsenal_maintenance: "Arsenal Operations"
 nd_gbr_arsenal_maintenance_desc: "The iron and naval stores required to keep the arsenal's foundries and slipways operational."
 nd_gbr_works_maintenance: "Industrial Operations"
 nd_gbr_works_maintenance_desc: "Coal and iron feed the furnaces and steam hammers of the industrial works, producing steel for a nation in transformation."
