l_english:
 STATIC_MODIFIER_NAME_nd_sword_of_the_prophet: "Sword of the Prophet"
 STATIC_MODIFIER_DESC_nd_sword_of_the_prophet: "The united Arabian state shall be forged through the sword of faith, its cavalry sweeping across the desert to bring the scattered tribes under one banner. From Mecca to the furthest oases, the call to arms shall echo."
 STATIC_MODIFIER_NAME_nd_cradle_of_civilization: "Cradle of Civilization"
 STATIC_MODIFIER_DESC_nd_cradle_of_civilization: "Arabia stands at the crossroads of three continents, inheritor of the incense routes, the pilgrimage trade, and the scholarly traditions that lit the world from Baghdad to Cordoba. This legacy of commerce and learning shall be the foundation of a greater state."
 STATIC_MODIFIER_NAME_nd_aia_mocha_trade_boom: "Mocha Trade Boom"
 STATIC_MODIFIER_DESC_nd_aia_mocha_trade_boom: "The port of Mocha hums with commerce as merchants from Europe, India, and Africa converge to trade in the dark aromatic beans that have captured the world's palate."
 STATIC_MODIFIER_NAME_nd_aia_wahhabi_zeal: "Wahhabi Zeal"
 STATIC_MODIFIER_DESC_nd_aia_wahhabi_zeal: "The austere reformist message has swept through the peninsula, purging what its adherents see as innovations and returning the faithful to the pristine practices of the earliest generations."
 STATIC_MODIFIER_NAME_nd_aia_wahhabi_pragmatism: "Pragmatic Reform"
 STATIC_MODIFIER_DESC_nd_aia_wahhabi_pragmatism: "The impulse toward religious renewal has been tempered by political realism, creating a state that values doctrinal clarity while maintaining the diplomatic flexibility needed to govern a diverse peninsula."
 nd_aia.1.t: "The Unification of Arabia"
 nd_aia.1.d: "After generations of tribal fragmentation, the Arabian Peninsula is united under a single banner for the first time since the early caliphates. The holy cities of Mecca and Medina, the incense ports of Yemen, the pearl-rich shores of the Gulf, and the vast Najdi interior all answer to one sovereign.\n\nThis is a moment of profound significance. The land that gave birth to Islam and served as the crossroads of ancient trade routes is whole again. But what path shall this reborn Arabia follow? Shall it raise the banner of jihad and ride forth to expand the faith by force of arms, as the first caliphs did? Or shall it look inward, cultivating the trade networks and scholarly traditions that made Arabia the envy of empires?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_aia.1.a: "Ride forth under the banner of faith!"
 nd_aia.1.b: "We shall be the crossroads of the world once more."
 nd_aia.2.t: "The Coffee of Mocha"
 nd_aia.2.d: "The port of Mocha on the Red Sea coast has become the center of a new and extraordinary trade. Coffee, first cultivated in the highlands of Yemen by Sufi mystics seeking to stay awake for night prayers, has captivated the tastes of the wider world. European, Indian, and Ottoman merchants crowd the harbor, their ships laden with silver and goods to exchange for sacks of dark, aromatic beans.\n\nCoffeehouses have sprung up across Arabia and beyond, becoming centers of conversation, commerce, and political debate. The governors of Mocha grow wealthy from export duties, and the highland farmers tend their precious plants with jealous care, prohibiting the export of fertile seeds to prevent rivals from establishing their own plantations."
 nd_aia.2.a: "Mocha shall be the jewel of our trade empire."
 nd_aia.2.b: "Control the plantations, control the wealth."
 nd_aia.3.t: "The Wahhabi Reformation"
 nd_aia.3.d: "A religious scholar from the Najd, Muhammad ibn Abd al-Wahhab, has ignited a movement that is transforming the peninsula. Preaching a return to what he considers the pure, original practices of Islam, he denounces the veneration of saints, the elaborate rituals of Sufi orders, and what he sees as centuries of accumulated superstition and innovation.\n\nHis alliance with a local ruler has created a formidable religio-political movement. Warriors inspired by his teachings sweep through the desert, toppling shrines and demanding submission to their austere vision of the faith. The movement's energy is undeniable, but its rigid interpretation of doctrine risks alienating moderate subjects and neighboring powers alike.\n\nHow shall we respond to this upheaval of the spirit?"
 nd_aia.3.a: "Embrace the purifying fire of reform."
 nd_aia.3.b: "Channel reform with pragmatic governance."
 nd_aia.4.t: "Rise of the Ikhwan"
 nd_aia.4.d: "A new breed of warrior has emerged from the settlements of the Najdi desert. The Ikhwan, the 'Brothers,' are former Bedouin tribesmen who have abandoned their nomadic ways to settle in agricultural communities dedicated to religious study and military training.\n\nDriven by intense religious conviction, they combine the desert endurance and riding skills of their ancestors with a fanatical discipline that makes them fearsome on the battlefield. They fight not for plunder or tribal honor, but for the glory of God and the expansion of the true faith. Their settlements, the hijra, serve as both military garrisons and centers of religious instruction."
 nd_aia.4.a: "These warriors shall be the vanguard of our destiny."
 nd_aia_bedouin_raiders: "Bedouin Raiding Traditions"
 nd_aia_bedouin_raiders_desc: "The Bedouin razzia — the lightning raid across the desert — is both an art of war and a way of life, honed over centuries of tribal conflict in the Arabian wastes."
 nd_aia_incense_route: "The Incense Route"
 nd_aia_incense_route_desc: "For millennia, the wealth of southern Arabia flowed north along caravan routes carrying frankincense and myrrh from the groves of Dhofar and Hadramaut to the markets of the Mediterranean."
 nd_aia_falaj_irrigation: "Falaj Irrigation"
 nd_aia_falaj_irrigation_desc: "The ingenious falaj system channels water from underground aquifers through gravity-fed tunnels to sustain agriculture in the arid Arabian landscape, a technology refined over thousands of years."
 nd_aia_tribal_confederacy: "Tribal Confederacy"
 nd_aia_tribal_confederacy_desc: "Arabian governance rests on the delicate balance of tribal alliances, where a paramount sheikh maintains authority through personal prestige, mutual obligation, and the distribution of raiding spoils."
 nd_aia_pearl_diving: "Pearl Diving"
 nd_aia_pearl_diving_desc: "The shallow waters of the Arabian Gulf yield pearls of extraordinary luster, harvested by divers who descend to the seabed with nothing but a weighted stone and leather finger guards."
 nd_aia_desert_navigation: "Desert Navigation"
 nd_aia_desert_navigation_desc: "Bedouin navigators read the desert like sailors read the sea — by the stars, the wind patterns in the sand, and subtle variations in terrain that mark the paths between distant oases."
 nd_aia_dhow_shipbuilding: "Dhow Shipbuilding"
 nd_aia_dhow_shipbuilding_desc: "The distinctive lateen-rigged dhow, with its sewn-plank hull and shallow draft, is perfectly adapted to the monsoon winds of the Indian Ocean and the shallow waters of the Gulf."
 nd_aia_hajj_economy: "The Hajj Economy"
 nd_aia_hajj_economy_desc: "Millions of pilgrims journeying to Mecca and Medina each year create a vast economic engine of caravanserais, provisioners, guides, and merchants that sustains the Hejaz."
 nd_aia_qadi_courts: "Qadi Courts"
 nd_aia_qadi_courts_desc: "The qadi, learned in Islamic jurisprudence, serves as judge in disputes both civil and criminal, providing a framework of law and order rooted in the Quran and the hadith."
 nd_aia_date_palm_groves: "Date Palm Cultivation"
 nd_aia_date_palm_groves_desc: "The date palm is the tree of life in Arabia — providing food, timber, fiber for rope, and shade for other crops. Its cultivation in irrigated oases is the foundation of settled Arabian life."
 nd_aia_arabian_horse_breeding: "Arabian Horse Breeding"
 nd_aia_arabian_horse_breeding_desc: "The purebred Arabian horse, bred for endurance, loyalty, and speed across millennia of selective care, is the most prized cavalry mount in the world. Bedouin tribes guard their mares' bloodlines as zealously as they guard their honor."
 nd_aia_sufi_mysticism: "Sufi Mysticism"
 nd_aia_sufi_mysticism_desc: "The mystical orders of Islam have deep roots in Arabia, where Sufi shaykhs lead communities in spiritual exercises, poetry, and the pursuit of divine knowledge through direct experience."
 nd_aia_mocha_coffee: "Mocha Coffee Trade"
 nd_aia_mocha_coffee_desc: "The port of Mocha in Yemen has become the sole gateway for the world's supply of coffee, a commodity that has spawned a global network of coffeehouses and a lucrative monopoly."
 nd_aia_indian_ocean_trade: "Indian Ocean Maritime Trade"
 nd_aia_indian_ocean_trade_desc: "Arabian dhows have sailed the monsoon routes for centuries, connecting the Red Sea and Persian Gulf to India, East Africa, and the spice islands of Southeast Asia."
 nd_aia_imamate_governance: "Imamate Governance"
 nd_aia_imamate_governance_desc: "The Ibadi imamate of Oman and the Zaidi imamate of Yemen represent distinctive Arabian traditions of religio-political authority, where the imam combines spiritual leadership with temporal governance."
 nd_aia_desert_fortresses: "Desert Fortresses"
 nd_aia_desert_fortresses_desc: "The qasr — a fortified desert stronghold of mud-brick and stone — guards the trade routes and water sources of the interior, serving as both military garrison and center of tribal authority."
 nd_aia_spice_middlemen: "Spice Middlemen"
 nd_aia_spice_middlemen_desc: "Arabian merchants have long served as intermediaries in the spice trade, purchasing pepper, cinnamon, and cloves from Indian and Southeast Asian producers and selling them at enormous markup to European and Ottoman buyers."
 nd_aia_musket_adoption: "Arabian Firearms Adoption"
 nd_aia_musket_adoption_desc: "The adoption of firearms by Arabian warriors transforms desert warfare, combining the mobility of mounted nomads with the devastating firepower of the matchlock musket."
 nd_aia_sharif_authority: "Sharifian Authority"
 nd_aia_sharif_authority_desc: "The Sharifs of Mecca, claiming descent from the Prophet Muhammad, wield an authority that transcends tribal boundaries, lending legitimacy to any ruler who can secure their endorsement."
 nd_aia_aden_entrepot: "The Aden Entrepot"
 nd_aia_aden_entrepot_desc: "The natural harbor of Aden, commanding the strait between the Red Sea and the Indian Ocean, has been a vital entrepot for maritime trade since antiquity."
 nd_aia_tribal_cavalry_reform: "Tribal Cavalry Reform"
 nd_aia_tribal_cavalry_reform_desc: "The traditional Bedouin raiding style is formalized into disciplined cavalry formations, retaining the desert mobility and horsemanship while adding tactical coordination and strategic purpose."
 nd_aia_camel_corps: "Camel Corps"
 nd_aia_camel_corps_desc: "The dromedary camel, capable of traveling vast distances without water, enables the creation of military units that can traverse terrain impassable to conventional armies."
 nd_aia_wahhabi_reform: "Wahhabi Reform Movement"
 nd_aia_wahhabi_reform_desc: "The alliance between religious reformer Muhammad ibn Abd al-Wahhab and the House of Saud in 1744 creates a powerful religio-political movement that transforms the Arabian Peninsula."
 nd_aia_ikhwan_warriors: "The Ikhwan Warriors"
 nd_aia_ikhwan_warriors_desc: "The Ikhwan — settled Bedouin warriors dedicated to religious study and military service — combine the endurance of desert nomads with the discipline of motivated zealots."
 nd_aia_arabian_modernization: "Arabian Modernization"
 nd_aia_arabian_modernization_desc: "Contact with Ottoman and European powers introduces new ideas of governance, technology, and education to the peninsula, spurring efforts to modernize without abandoning tradition."
 nd_aia_oasis_agriculture: "Oasis Agriculture"
 nd_aia_oasis_agriculture_desc: "Advanced irrigation techniques transform scattered oases into productive agricultural centers, supporting larger populations and providing the economic base for a centralized state."
 nd_aia_pearl_trade_boom: "Pearl Trade Boom"
 nd_aia_pearl_trade_boom_desc: "The insatiable global demand for Gulf pearls has transformed coastal communities into prosperous trading centers, with pearl merchants commanding wealth that rivals that of the great caravan traders."
 nd_aia_gulf_patrol: "Gulf Naval Patrol"
 nd_aia_gulf_patrol_desc: "Armed patrol ships guard the vital sea lanes of the Persian Gulf and Red Sea, protecting Arabian trade from pirates and projecting power across the maritime frontier."
 nd_aia_modern_arab_army: "Modern Arab Army"
 nd_aia_modern_arab_army_desc: "The creation of a standing army trained in European military methods marks the transformation of Arabia from a confederation of tribal warriors into a modern state capable of projecting centralized power."
 nd_aia_arab_nationalism: "Arab National Awakening"
 nd_aia_arab_nationalism_desc: "A new consciousness of shared Arab identity — rooted in common language, history, and culture — inspires a movement for political unity and self-determination across the peninsula."
 nd_aia_port_modernization: "Port Modernization"
 nd_aia_port_modernization_desc: "The modernization of Arabian ports with European-style docks, warehouses, and repair facilities connects the peninsula to the global economy of the industrial age."
 nd_aia_desert_infrastructure: "Desert Infrastructure"
 nd_aia_desert_infrastructure_desc: "The construction of roads and communication lines across the vast Arabian interior binds the scattered oases and tribal territories into a unified state for the first time."
 nd_aia_tribal_conscription: "Tribal Conscription"
 nd_aia_tribal_conscription_desc: "The traditional tribal obligation to provide warriors on demand is formalized into a conscription system, ensuring that every settlement contributes to the defense of the unified state."
 nd_aia_unified_arab_state: "Unified Arab State"
 nd_aia_unified_arab_state_desc: "The culmination of centuries of effort — a centralized Arabian state that has transcended tribal divisions, integrating diverse peoples under a common administration and shared identity."
 a_nd_aia_bedouin_raider: "Bedouin Raider"
 a_nd_aia_bedouin_raider_desc: "Lightning-fast desert cavalry raised from the tribal levies, experts in the razzia — the traditional Bedouin raiding strike that has terrorized caravans and settled peoples since time immemorial."
 a_nd_aia_musketeer: "Arabian Musketeer"
 a_nd_aia_musketeer_desc: "Disciplined infantry armed with matchlock muskets, trained to deliver devastating volleys before drawing their curved swords for close combat in the Arabian tradition."
 a_nd_aia_najdi_cavalry: "Najdi Cavalry"
 a_nd_aia_najdi_cavalry_desc: "Reformed tribal cavalry from the Najd heartland, combining traditional desert horsemanship with disciplined tactical formations. Supreme in arid and desert warfare."
 a_nd_aia_camel_rider: "Camel Rider"
 a_nd_aia_camel_rider_desc: "Mounted on the hardy dromedary, these auxiliary troops can traverse vast stretches of waterless desert, serving as scouts, supply carriers, and light fighters where no horse-mounted force can follow."
 a_nd_aia_ikhwan: "Ikhwan Warrior"
 a_nd_aia_ikhwan_desc: "Fanatically devoted infantry drawn from the settled Bedouin communities, the Ikhwan fight with a fervor born of deep religious conviction, making them fearsome shock troops."
 a_nd_aia_modern_infantry: "Modern Arab Infantry"
 a_nd_aia_modern_infantry_desc: "Regular infantry trained in European military methods, equipped with modern weapons, and organized into disciplined formations capable of sustained campaigns."
 a_nd_aia_tribal_conscript: "Tribal Conscript"
 a_nd_aia_tribal_conscript_desc: "Conscripted warriors drawn from the settled tribal communities, providing the mass infantry needed to defend the expanded Arabian state."
 n_nd_aia_dhow: "Arabian Dhow"
 n_nd_aia_dhow_desc: "The iconic lateen-rigged trading vessel of the Arab world, fast and nimble in the monsoon winds, though lightly armed compared to European warships."
 n_nd_aia_ocean_dhow: "Indian Ocean Dhow"
 n_nd_aia_ocean_dhow_desc: "A larger, ocean-going variant of the traditional dhow, capable of sailing the long monsoon routes between Arabia, India, and East Africa."
 n_nd_aia_patrol_ship: "Gulf Patrol Ship"
 n_nd_aia_patrol_ship_desc: "An armed coastal vessel designed to patrol the shallow waters of the Persian Gulf and Red Sea, protecting trade routes from pirates and foreign interlopers."
 nd_aia_incense_warehouse: "Incense Warehouse"
 nd_aia_incense_warehouse_desc: "A fortified storehouse for the precious resins of frankincense and myrrh, the ancient wealth of southern Arabia that once flowed along caravan routes to the Mediterranean world."
 nd_aia_falaj_system: "Falaj Irrigation"
 nd_aia_falaj_system_desc: "An underground channel that harnesses gravity to bring water from distant aquifers to cultivated fields, enabling agriculture in one of the most arid landscapes on earth."
 nd_aia_hajj_caravanserai: "Hajj Caravanserai"
 nd_aia_hajj_caravanserai_desc: "A way-station on the pilgrimage routes to Mecca, providing food, water, shelter, and trading opportunities to the endless stream of faithful making the hajj."
 nd_aia_coffeehouse: "Mocha Coffeehouse"
 nd_aia_coffeehouse_desc: "A gathering place where merchants, scholars, and travelers exchange news and ideas over cups of dark, aromatic coffee from the Yemeni highlands."
 nd_aia_desert_qasr: "Desert Qasr"
 nd_aia_desert_qasr_desc: "A fortified desert stronghold of mud-brick and stone, guarding the trade routes and water sources of the Arabian interior against raiders and invaders."
 nd_aia_entrepot: "Entrepot Warehouse"
 nd_aia_entrepot_desc: "A major trading warehouse in a port city, where goods from India, Africa, and Europe are stored, sorted, and resold, forming the backbone of Arabian maritime commerce."
 nd_aia_pearl_house: "Pearl Diving House"
 nd_aia_pearl_house_desc: "A merchant house specializing in the Gulf pearl trade, sorting, grading, and selling the lustrous gems that have been the primary wealth of the Arabian coast for millennia."
 nd_aia_modern_port: "Modern Port"
 nd_aia_modern_port_desc: "A port facility equipped with modern docks, cranes, and repair yards, connecting Arabia to the steam-powered maritime trade of the industrial era."
 nd_aia_pearl_harvest: "Pearl Harvest"
 nd_aia_pearl_harvest_desc: "Divers descend to the oyster beds of the Arabian Gulf, harvesting the lustrous pearls that have made the Gulf coast wealthy for millennia."
 nd_aia_date_processing: "Date Processing"
 nd_aia_date_processing_desc: "The harvesting, drying, and packaging of dates from the peninsula's vast palm groves for trade across the Islamic world."
 nd_aia_oasis_farming: "Oasis Agriculture"
 nd_aia_oasis_farming_desc: "Advanced irrigated cultivation in desert oases employing metal tools and animal traction, producing wheat, vegetables, and fodder at a surplus that supports larger settled communities."
 nd_incense_storage: "Incense Storage"
 nd_incense_storage_desc: "Storing and sorting frankincense and myrrh from Arabia's incense trade routes, with cloth wrappings preserving the precious resins for export."
 nd_falaj_maintenance: "Falaj Maintenance"
 nd_falaj_maintenance_desc: "Maintaining underground water channels with stone linings and timber supports."
 nd_hajj_provisions: "Hajj Provisions"
 nd_hajj_provisions_desc: "Provisioning pilgrim caravans with livestock and grain for the journey to Mecca."
 nd_coffee_service: "Coffee Service"
 nd_coffee_service_desc: "Sourcing and roasting coffee beans from Mocha, served in ceramic cups to the merchants and scholars who frequent the coffeehouse."
 nd_qasr_garrison: "Qasr Garrison"
 nd_qasr_garrison_desc: "Arming and provisioning a fortified desert stronghold's garrison, with weapons, stone for wall repairs, and leather for armour and equipment maintenance."
 nd_entrepot_operations: "Entrepot Operations"
 nd_entrepot_operations_desc: "Managing the storage and redistribution of imported textiles, pottery, and preserved goods at a major trade entrepot, where salt preserves cargoes against the long sea voyage."
 nd_pearl_sorting: "Pearl Sorting"
 nd_pearl_sorting_desc: "Sorting, grading, and polishing Gulf pearls with fine cloth, using tools of the diving trade to prepare them for sale to international merchants."
 nd_port_operations: "Port Operations"
 nd_port_operations_desc: "Operating a modern port facility with timber docks and naval stores."
 STATIC_MODIFIER_NAME_nd_aia_coffee_monopoly: "Coffee Monopoly"
 STATIC_MODIFIER_DESC_nd_aia_coffee_monopoly: "Strict control over the coffee plantations of the Yemeni highlands and the export facilities at Mocha creates a monopoly on the world's most fashionable commodity."
 nd_aia_formed_tt: "Arabia has been formed"
 nd_aia_path_a_tt: "Chose Sword of the Prophet"
 nd_aia_path_b_tt: "Chose Cradle of Civilization"
 nd_aia_destiny: "Destiny of Arabia"
 nd_aia_destiny_desc: "With Arabia united, the question of its future burns bright. Shall the peninsula look outward to conquest and faith, or inward to commerce and civilization? The stability of the realm must first be secured before either path can be pursued."
 nd_aia_dest_crescent: "The Fertile Crescent"
 nd_aia_dest_crescent_desc: "The lands of the Fertile Crescent — Damascus, seat of the Umayyads, and Baghdad, city of the Abbasids — were once the heartlands of Arab civilization. To restore the caliphate, Arabia must first reclaim these ancient capitals and forge an army worthy of the task."
 nd_aia_dest_jihad: "Jihad of the Faithful"
 nd_aia_dest_jihad_desc: "The holy city of Jerusalem and the ancient land of Egypt must be brought under the banner of the restored Arab state. With Cairo's wealth and Jerusalem's sanctity, the caliphate's claim to lead the Muslim world becomes unassailable."
 nd_aia_dest_caliphate: "The Caliphate Restored"
 nd_aia_dest_caliphate_desc: "From Aleppo to Basra, from Mosul to the desert's edge, the full extent of the original caliphate must be reunited under Arab rule. This is the ultimate ambition — a new golden age of Islamic civilization, governed from Arabia with the might to enforce it."
 nd_aia_dest_gulf: "Masters of the Gulf"
 nd_aia_dest_gulf_desc: "The Strait of Hormuz and the ports of Oman control the flow of trade between the Indian Ocean and the Persian Gulf. To become the crossroads of the world, Arabia must first command these vital chokepoints and accumulate the wealth they generate."
 nd_aia_dest_monsoon: "The Monsoon Routes"
 nd_aia_dest_monsoon_desc: "Arabian merchants have sailed the monsoon winds for millennia, but modern commerce demands modern institutions. Banking, developed markets, and the incense that once made Arabia rich must all be harnessed to build a trading civilization that rivals any in the world."
 nd_aia_dest_crossroads: "Crossroads of Continents"
 nd_aia_dest_crossroads_desc: "Aden commands the passage between the Red Sea and the Indian Ocean, the hinge between three continents. With global trade institutions embraced and vast wealth accumulated, Arabia can claim its ultimate destiny — not as a conqueror, but as the indispensable hub through which the world's commerce must flow."
 nd_aia.5.t: "Arabia Ascendant"
 nd_aia.5.d: "The peninsula is united, the tribes have sworn allegiance, and the holy cities stand under our protection. For the first time in centuries, an Arab state commands respect among the powers of the world. The question now is not whether Arabia will rise, but how high."
 nd_aia.5.a: "Our destiny awaits."
 nd_aia.6.t: "The Crescent Reclaimed"
 nd_aia.6.d: "Damascus and Baghdad, the twin jewels of Arab civilization, once again answer to an Arab sovereign. The great mosques that echoed with the decrees of caliphs past shall echo again with the authority of a renewed Arab state. The Fertile Crescent, breadbasket of empires, feeds our ambitions as it once fed the Abbasids."
 nd_aia.6.a: "The ancient capitals are ours once more."
 nd_aia.7.t: "The Holy Land Secured"
 nd_aia.7.d: "Jerusalem stands under our protection, and the wealth of Egypt flows into our treasury. The restored Arab state now commands both the spiritual authority of the holy places and the material resources of the Nile valley. Yet the question arises — shall we press forward with militant fervor, storming every fortress in our path? Or shall we consolidate these vast gains with garrisons and patience, letting our strength grow behind fortified walls?"
 nd_aia.7.a: "Press the attack without mercy!"
 nd_aia.7.b: "Fortify what we hold and grow strong."
 nd_aia.8.t: "The Caliphate Reborn"
 nd_aia.8.d: "From the shores of the Mediterranean to the headwaters of the Tigris, from the deserts of Sinai to the mountains of Kurdistan — the caliphate lives again. Not since the age of Harun al-Rashid has an Arab sovereign commanded such vast domains. The world watches as Arabia takes its place among the great empires of history.\n\nBut how shall this restored caliphate define itself? As the sword that expands the faith through force of arms? Or as the just ruler who governs diverse peoples with wisdom and wins their loyalty through fair dealing?"
 nd_aia.8.a: "By the sword of God shall we prevail!"
 nd_aia.8.b: "Justice and wisdom shall be our legacy."
 nd_aia.9.t: "Masters of the Strait"
 nd_aia.9.d: "The great chokepoint of Hormuz is ours, and the ancient port of Muscat stands under the Arabian flag. Every ship passing between the Indian Ocean and the Persian Gulf must now acknowledge Arabian supremacy. The wealth of India, Persia, and East Africa flows through waters we command."
 nd_aia.9.a: "The Gulf is an Arabian sea."
 nd_aia.10.t: "The Monsoon Winds"
 nd_aia.10.d: "Our merchants ride the monsoon winds from the Gulf to India and beyond, while our banks finance the trade that passes through our ports. The ancient incense routes have given way to a modern commercial network, but Arabia remains at its center.\n\nShall we build a navy to protect and enforce our maritime dominion by force? Or shall we focus on the institutions of trade — the banks, the exchanges, the merchant houses — that make our ports indispensable regardless of who commands the seas?"
 nd_aia.10.a: "Command the seas with Arabian warships!"
 nd_aia.10.b: "Build the institutions that make us rich."
 nd_aia.11.t: "Crossroads of the World"
 nd_aia.11.d: "Arabia stands at the intersection of three continents, and the world's trade flows through our ports. From Aden to Hormuz, from Jeddah to Muscat, Arabian merchants connect Europe with Asia and Africa with the East. Our banking houses finance ventures across oceans, and our markets set prices that echo in distant capitals.\n\nThis is the zenith of Arabian commerce. Shall we use this position to foster a new golden age of arts, learning, and diplomacy? Or shall we press our commercial advantage to its fullest, ensuring that Arabia remains the indispensable crossroads through which all trade must pass?"
 nd_aia.11.a: "Usher in a new golden age!"
 nd_aia.11.b: "We are the crossroads. The world pays us."
 STATIC_MODIFIER_NAME_nd_aia_dest_militant_jihad: "Militant Jihad"
 STATIC_MODIFIER_DESC_nd_aia_dest_militant_jihad: "The warriors of the caliphate storm fortifications with fanatical courage, overwhelming defenders through sheer aggression and tactical initiative."
 STATIC_MODIFIER_NAME_nd_aia_dest_caliphal_garrison: "Caliphal Garrison"
 STATIC_MODIFIER_DESC_nd_aia_dest_caliphal_garrison: "A network of fortified garrisons secures the caliphate's vast new territories, with reinforced walls and disciplined troops maintaining order across conquered lands."
 STATIC_MODIFIER_NAME_nd_aia_dest_sword_of_islam: "Sword of Islam"
 STATIC_MODIFIER_DESC_nd_aia_dest_sword_of_islam: "The caliphate's military machine operates with ruthless efficiency, sustaining campaigns across vast distances while the faithful fight with tireless dedication."
 STATIC_MODIFIER_NAME_nd_aia_dest_just_caliph: "The Just Caliph"
 STATIC_MODIFIER_DESC_nd_aia_dest_just_caliph: "The caliph governs with wisdom and fairness, winning the loyalty of diverse peoples through just administration and shrewd intelligence networks."
 STATIC_MODIFIER_NAME_nd_aia_dest_maritime_dominion: "Maritime Dominion"
 STATIC_MODIFIER_DESC_nd_aia_dest_maritime_dominion: "Arabian warships enforce control over the vital sea lanes, blockading rivals and protecting the merchant fleets that carry the wealth of three continents."
 STATIC_MODIFIER_NAME_nd_aia_dest_trading_empire: "Trading Empire"
 STATIC_MODIFIER_DESC_nd_aia_dest_trading_empire: "A vast network of merchant vessels connects Arabian ports to markets across the Indian Ocean, sustained by experienced captains and favorable banking arrangements."
 STATIC_MODIFIER_NAME_nd_aia_dest_golden_age: "Arabian Golden Age"
 STATIC_MODIFIER_DESC_nd_aia_dest_golden_age: "A renaissance of arts, learning, and diplomacy radiates from the Arabian Peninsula, as the wealth of trade funds scholars, artists, and ambassadors across the known world."
 STATIC_MODIFIER_NAME_nd_aia_dest_worlds_crossroads: "World's Crossroads"
 STATIC_MODIFIER_DESC_nd_aia_dest_worlds_crossroads: "Arabia has become the indispensable nexus of global commerce, where every trade route converges and every merchant must pay tribute to the guardians of the strait."
 nd_aia_caliphal_diwan: "Caliphal Diwan"
 nd_aia_caliphal_diwan_desc: "The central administrative bureau of the restored caliphate, where scribes record decrees, tax registers are maintained, and the business of governing a vast empire is conducted with methodical precision."
 nd_aia_trade_exchange: "Arabian Trade Exchange"
 nd_aia_trade_exchange_desc: "A grand marketplace where merchants from three continents conduct business, with permanent trading halls, secure warehouses, and resident factors representing commercial interests from India to Europe."
 nd_aia_diwan_administration: "Diwan Administration"
 nd_aia_diwan_administration_desc: "Operating the caliphal bureaucracy requires reams of paper for records, fine cloth for officials' robes, and beeswax for the seals that authenticate imperial decrees."
 nd_aia_exchange_operations: "Exchange Operations"
 nd_aia_exchange_operations_desc: "Managing a major trade exchange requires paper for contracts and ledgers, cloth for packaging goods, and tools for weighing, measuring, and securing merchandise."
