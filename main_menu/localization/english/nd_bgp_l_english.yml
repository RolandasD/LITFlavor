l_english:
 STATIC_MODIFIER_NAME_nd_bgp_rhone_corridor: "The Rhone Corridor"
 STATIC_MODIFIER_DESC_nd_bgp_rhone_corridor: "From Avignon to Lyon, the Rhone is our great artery — carrying wine, silk, and culture to the wider world. We are heirs to the troubadours and the papal court, a civilization that prizes beauty, learning, and the art of living well."
 STATIC_MODIFIER_NAME_nd_bgp_alpine_gatekeepers: "Alpine Gatekeepers"
 STATIC_MODIFIER_DESC_nd_bgp_alpine_gatekeepers: "We command the high passes where armies and merchants alike must pay our toll. The mountains are our ramparts, the cols our gates. What crosses the Alps crosses at our pleasure, and every mule train that descends to Italy enriches our treasury."
 STATIC_MODIFIER_NAME_nd_bgp_papal_patronage: "Papal Patronage"
 STATIC_MODIFIER_DESC_nd_bgp_papal_patronage: "The legacy of the Avignon papacy endures in our courts — a tradition of ecclesiastical splendor, artistic commissioning, and scholarly inquiry that elevates our realm above its neighbors."
 STATIC_MODIFIER_NAME_nd_bgp_salt_monopoly: "Salt Monopoly"
 STATIC_MODIFIER_DESC_nd_bgp_salt_monopoly: "The white gold of Franche-Comte flows from our salines to feed half of Europe. This monopoly on nature's most essential commodity fills our coffers and binds neighboring cantons to our trade."
 nd_bgp.1.t: "The Kingdom Restored"
 nd_bgp.1.d: "The old Kingdom of Burgundy — the Kingdom of Arles — lives again. For centuries this realm existed only as a memory, its lands fragmented between French kings, Savoyard dukes, and Imperial pretenders. Now a single crown unites the Rhone valley from the Alpine passes to the Mediterranean shore, from the vineyards of Provence to the salt works of the Jura.\n\nBut what kind of kingdom shall this be? The Rhone corridor stretches south toward the sea, a natural highway for commerce and culture. Avignon's papal legacy and the troubadour courts offer a path of refinement, trade, and Mediterranean sophistication. Alternatively, our Alpine heartland gives us command of every pass between France and Italy — a toll-master's paradise and a mountain fortress that no army can easily breach.\n\nThe choice will define our dynasty.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_bgp.1.a: "The Rhone is our highway — let wine and song flow south to the sea."
 nd_bgp.1.b: "We are the gatekeepers of the Alps — none shall pass without our leave."
 nd_bgp.2.t: "The Legacy of the Papal Court"
 nd_bgp.2.d: "For seventy years, the popes made Avignon the center of Christendom. Though the Holy See returned to Rome in 1377, the imprint of papal patronage on Provence is indelible. The Palais des Papes still towers over the Rhone, the largest Gothic palace in Europe — a monument to the artistic ambitions of Popes Clement V, John XXII, and their successors.\n\nUnder papal patronage, Simone Martini brought Sienese painting to Avignon. Matteo Giovannetti covered chapel walls with intricate frescoes. The papal library became one of Europe's finest. Pope John XXII planted the vineyards of Chateauneuf-du-Pape and refined the viticulture of the entire region.\n\nThis legacy of artistic and intellectual patronage remains a wellspring for our court."
 nd_bgp.2.a: "We shall be worthy inheritors of the papal legacy."
 nd_bgp.3.t: "The White Gold of Salins"
 nd_bgp.3.d: "The Grande Saline of Salins-les-Bains has produced salt for over a thousand years. In the medieval period, it became the economic capital of Franche-Comte — eight hundred workers laboring in its vast underground galleries to extract brine from wells plunging deep into the Jurassic bedrock. The salt fed Burgundy, Franche-Comte, and half the Swiss cantons.\n\nThe salines generate half the region's income. Control of this white gold gives us leverage over our neighbors and a reliable source of wealth that neither war nor famine can easily disrupt. We would be wise to expand and modernize our salt works."
 nd_bgp.3.a: "The salines are the treasury of our kingdom."
 nd_bgp.4.t: "The Ordonnance Companies"
 nd_bgp.4.d: "Following the example of the Burgundian dukes, we have published detailed military ordinances standardizing the equipment, training, and organization of our soldiers. The old feudal host, where each lord brought whatever men he could muster in whatever arms they possessed, gives way to companies of ordonnance — permanent formations of men-at-arms, archers, pikemen, and handgunners operating under a unified chain of command.\n\nEach company of nine hundred men is organized into squadrons, with heavy cavalry supported by mounted archers and foot soldiers in disciplined combined-arms formations. Uniforms, standardized weapons, and regular drill transform a feudal rabble into a professional force."
 nd_bgp.4.a: "Discipline and organization shall be our strength."
 nd_bgp_troubadour_courts: "Troubadour Courts"
 nd_bgp_troubadour_courts_desc: "The courts of Provence and the Rhone valley gave birth to the troubadour tradition — the first major body of secular lyric poetry in a vernacular European language, celebrating courtly love, chivalric virtue, and the refinement of the Occitan-speaking nobility."
 nd_bgp_alpine_toll_mastery: "Alpine Toll Mastery"
 nd_bgp_alpine_toll_mastery_desc: "Control of key alpine passes — the Great Saint Bernard, Mont Cenis, and the Simplon — allows the collection of tolls on every merchant caravan, pilgrim column, and military expedition crossing between France and Italy."
 nd_bgp_rhone_viticulture: "Rhone Viticulture"
 nd_bgp_rhone_viticulture_desc: "The Rhone valley's sun-drenched terraces have produced wine since Roman times. Monastic communities refined the art of viticulture across the centuries, creating a tradition that would eventually produce some of Europe's finest vintages."
 nd_bgp_montagnard_tradition: "Montagnard Tradition"
 nd_bgp_montagnard_tradition_desc: "The Savoyard mountain cavalry — hardy riders bred in alpine valleys — are uniquely adapted to rough terrain where lowland horsemen founder. They serve as scouts, raiders, and pass defenders."
 nd_bgp_arpitan_identity: "Arpitan Identity"
 nd_bgp_arpitan_identity_desc: "The Arpitan and Occitan linguistic traditions unite the diverse peoples of the Burgundian-Provencal realm, from the Franco-Provencal speakers of the Alpine valleys to the Provencal troubadours of the Mediterranean coast."
 nd_bgp_comital_courts: "Comital Courts"
 nd_bgp_comital_courts_desc: "The comital courts of Savoy established a tradition of centralized administration that would endure for centuries, with the counts and later dukes maintaining effective jurisdiction across their fragmented Alpine domains."
 nd_bgp_avignon_legacy: "Avignon Legacy"
 nd_bgp_avignon_legacy_desc: "The seventy years of the Avignon papacy (1309-1377) left an indelible mark on Provence — the Palais des Papes, the artistic traditions of Simone Martini and Matteo Giovannetti, and a cosmopolitan scholarly culture that persisted long after the popes returned to Rome."
 nd_bgp_chateauneuf: "Chateauneuf-du-Pape"
 nd_bgp_chateauneuf_desc: "Pope John XXII planted the vineyards that would bear his castle's name — Chateauneuf-du-Pape. By 1344, nearly half the surrounding land was devoted to viticulture, producing wines that rivaled the finest in Europe. The papal imprimatur elevated Rhone winemaking to an art."
 nd_bgp_grande_saline: "Grande Saline"
 nd_bgp_grande_saline_desc: "The salt works of Salins-les-Bains in Franche-Comte — one of Europe's largest industrial complexes, producing 14,000 tons of salt per year and employing over 800 workers. This white gold fed half of eastern France and the Swiss cantons."
 nd_bgp_savoyard_chancery: "Savoyard Chancery"
 nd_bgp_savoyard_chancery_desc: "The administrative apparatus of the Savoyard state — a professional chancery staffed by trained scribes and notaries who maintained the legal and diplomatic machinery of a realm that straddled the Alps."
 nd_bgp_provencal_galleys: "Provencal Galleys"
 nd_bgp_provencal_galleys_desc: "The ports of Marseille and Toulon launched galleys that patrolled the western Mediterranean, defending Provencal trade routes and projecting power along the coast from the Rhone delta to the Ligurian shore."
 nd_bgp_burgundian_drill: "Burgundian Drill"
 nd_bgp_burgundian_drill_desc: "The military reforms of the Burgundian dukes emphasized regular drill, standardized equipment, and disciplined formations — innovations that transformed the medieval host into something approaching a professional army."
 nd_bgp_ordonnance_reform: "Ordonnance Reform"
 nd_bgp_ordonnance_reform_desc: "The companies of ordonnance — permanent military formations of 900 men organized into combined-arms squadrons of men-at-arms, archers, pikemen, and handgunners. First established by Charles the Bold's ordinances of 1471-1473, they represent a revolution in European military organization."
 nd_bgp_rhone_trade_system: "Rhone Trade System"
 nd_bgp_rhone_trade_system_desc: "The Rhone serves as a natural commercial highway linking the Mediterranean to the heart of France. Riverine commerce, fair privileges, and established trade networks make the Rhone valley one of the most prosperous corridors in western Europe."
 nd_bgp_mountain_fortresses: "Mountain Fortresses"
 nd_bgp_mountain_fortresses_desc: "The bastilles of Savoy — stone fortresses commanding alpine passes and valley choke points — make any invasion of the realm a nightmare of siege warfare in hostile terrain."
 nd_bgp_literary_renaissance: "Literary Renaissance"
 nd_bgp_literary_renaissance_desc: "The literary traditions of Provence undergo a renaissance, with courts patronizing scholars, poets, and early printers who disseminate knowledge in both Latin and the Occitan vernacular."
 nd_bgp_order_annunciation: "Order of the Annunciation"
 nd_bgp_order_annunciation_desc: "The Supreme Order of the Most Holy Annunciation, founded by Amadeus VI of Savoy in 1362, ranks among Europe's most prestigious chivalric orders. Membership binds the highest nobility to the Savoyard cause and enhances diplomatic prestige across Christendom."
 nd_bgp_silk_introduction: "Silk Workshops"
 nd_bgp_silk_introduction_desc: "The introduction of silk weaving to the Rhone valley — initially under Italian influence — would eventually make Lyon one of Europe's great silk centers. The craft demands skill, capital, and access to raw silk from the East."
 nd_bgp_confessional_crossroads: "Confessional Crossroads"
 nd_bgp_confessional_crossroads_desc: "Positioned between Catholic France, Reformed Geneva, and the confessionally divided Empire, the Burgundian-Provencal realm must navigate the wars of religion with pragmatic tolerance or decisive alignment."
 nd_bgp_savoyard_infantry: "Savoyard Infantry"
 nd_bgp_savoyard_infantry_desc: "Professional Savoyard infantry, trained in the pike-and-shot tradition and influenced by both Italian condottiere and Burgundian ordonnance methods, form the backbone of the standing army."
 nd_bgp_centralized_administration: "Centralized Administration"
 nd_bgp_centralized_administration_desc: "A centralized administrative apparatus, centered on the capital at Chambery, brings coherent governance to the diverse territories of the realm — from Alpine valleys to Mediterranean ports."
 nd_bgp_toll_modernization: "Toll Modernization"
 nd_bgp_toll_modernization_desc: "Standardization of the toll and customs system across all alpine passes and Rhone river crossings, replacing the patchwork of local tolls with a rational revenue system that maximizes income while reducing friction for established merchants."
 nd_bgp_marseille_port: "Marseille Port"
 nd_bgp_marseille_port_desc: "Expansion of the naval facilities at Marseille transforms the ancient port into a proper arsenal capable of building and maintaining warships for Mediterranean operations."
 nd_bgp_university_tradition: "University Tradition"
 nd_bgp_university_tradition_desc: "The University of Avignon, founded in 1303, and other institutions of learning across the realm cultivate a tradition of legal and theological scholarship that sustains administrative competence and intellectual vitality."
 nd_bgp_absolutist_state: "Absolutist State"
 nd_bgp_absolutist_state_desc: "Centralization of royal authority on the French model, consolidating the patchwork of feudal jurisdictions, autonomous communes, and ecclesiastical liberties into a unified absolutist state."
 nd_bgp_standing_army: "Standing Army"
 nd_bgp_standing_army_desc: "Professionalization of the army into a permanent standing force of line infantry, replacing the seasonal levies and mercenary companies of earlier centuries with year-round soldiers trained in modern drill."
 nd_bgp_fortress_modernization: "Fortress Modernization"
 nd_bgp_fortress_modernization_desc: "Modernization of the Alpine fortress network along Vauban principles — star forts with angled bastions replacing the medieval curtain walls, updated to withstand artillery bombardment."
 nd_bgp_wine_appellations: "Wine Appellations"
 nd_bgp_wine_appellations_desc: "Codification of wine production standards and regional appellations — a precursor to the modern AOC system that would become France's gift to viticulture. Quality control and geographic designation protect the reputation and value of Burgundian and Provencal wines."
 nd_bgp_arsenal_expansion: "Arsenal Expansion"
 nd_bgp_arsenal_expansion_desc: "Expansion of Mediterranean naval capacity with the construction of frigates for trade protection and coastal patrol, establishing a proper naval force to secure Provencal maritime interests."
 nd_bgp_salon_culture: "Salon Culture"
 nd_bgp_salon_culture_desc: "The Enlightenment arrives in the salons of Lyon, Avignon, and Chambery — gatherings of philosophers, scientists, and literary figures who debate natural philosophy, political reform, and the rights of man."
 nd_bgp_modern_viticulture: "Modern Viticulture"
 nd_bgp_modern_viticulture_desc: "Proto-industrial methods transform wine production from an artisanal craft into a systematic industry — large estates employing modern agricultural techniques, controlled fermentation, and organized export networks."
 nd_bgp_constitutional_reform: "Constitutional Reform"
 nd_bgp_constitutional_reform_desc: "Representative governance and constitutional principles replace absolutist rule, establishing legislative assemblies, codified rights, and administrative rationalization across the kingdom."
 nd_bgp_citizen_levy: "Citizen Levy"
 nd_bgp_citizen_levy_desc: "The Chasseurs Alpins — elite mountain infantry recruited from the hardy populations of the Alpine valleys, trained for warfare in the most demanding terrain in Europe."
 nd_bgp_alpine_infrastructure: "Alpine Infrastructure"
 nd_bgp_alpine_infrastructure_desc: "Modern road and tunnel construction through the Alps — engineering feats that reduce the isolation of mountain valleys and accelerate the flow of commerce across the kingdom's most formidable natural barriers."
 nd_bgp_national_consciousness: "National Consciousness"
 nd_bgp_national_consciousness_desc: "A distinct Burgundian-Provencal national identity emerges — neither wholly French nor Italian nor Swiss, but a unique Mediterranean-Alpine civilization rooted in troubadour poetry, wine culture, mountain independence, and the memory of the ancient Kingdom of Arles."
 a_nd_bgp_montagnard_cavalry: "Montagnard Cavalry"
 a_nd_bgp_montagnard_cavalry_desc: "Hardy Savoyard horsemen from the Alpine valleys, bred to mountain paths where lowland cavalry cannot operate. They serve as scouts, pass defenders, and raiders in the high country."
 a_nd_bgp_ordonnance_lance: "Ordonnance Lance"
 a_nd_bgp_ordonnance_lance_desc: "Professional combined-arms cavalry companies organized according to Burgundian military ordinances. Each lance comprises men-at-arms, archers, and supporting infantry operating as a disciplined combined-arms unit."
 a_nd_bgp_savoyard_tercios: "Savoyard Tercios"
 a_nd_bgp_savoyard_tercios_desc: "Professional Savoyard pike-and-shot infantry, combining Italian tactical sophistication with Burgundian organizational discipline. Trained for both open battle and mountain warfare."
 a_nd_bgp_line_infantry: "Line Infantry"
 a_nd_bgp_line_infantry_desc: "Standing army professional soldiers drilled in modern linear tactics, forming the reliable backbone of the kingdom's military."
 a_nd_bgp_chasseurs_alpins: "Chasseurs Alpins"
 a_nd_bgp_chasseurs_alpins_desc: "Elite mountain infantry — light, fast, and ruthlessly effective in Alpine terrain. Recruited from the hardiest mountain populations, they are the finest mountain troops in Europe."
 n_nd_bgp_provencal_galley: "Provencal Galley"
 n_nd_bgp_provencal_galley_desc: "Agile Mediterranean war galleys built in the ports of Provence, faster than standard galleys and optimized for coastal operations in the western Mediterranean."
 n_nd_bgp_frigate: "Provencal Frigate"
 n_nd_bgp_frigate_desc: "Fast patrol frigates designed for Mediterranean trade protection, capable of intercepting pirates and enforcing Provencal maritime interests along the coast."
 nd_bgp_cort_damor: "Cort d'Amor"
 nd_bgp_cort_damor_desc: "A court of love where troubadours perform their cansos and tensons, noble ladies adjudicate questions of courtly devotion, and the refined literary culture of the Occitan world flourishes under aristocratic patronage."
 nd_bgp_cort_damor_patronage: "Troubadour Patronage"
 nd_bgp_cort_damor_patronage_desc: "Maintenance of the court's literary activities — parchment for poetry, candles for evening performances, wine for court festivities, fine cloth for noble attire, and gifts for visiting troubadours."
 nd_bgp_col_toll_house: "Col Toll House"
 nd_bgp_col_toll_house_desc: "A fortified customs post at an alpine pass, where every merchant caravan, pilgrim train, and military column must halt and pay the toll before continuing their journey across the mountains."
 nd_bgp_toll_collection: "Toll Collection"
 nd_bgp_toll_collection_desc: "Administrative costs of operating the customs post — ledgers, seals, cloth and salt samples taken as in-kind duties, and the small bureaucracy that records every passage and collects every ducat."
 nd_bgp_vignoble: "Vignoble"
 nd_bgp_vignoble_desc: "A terraced vineyard estate in the sun-drenched Rhone valley, producing wines from grapes cultivated on slopes that have known the vine since Roman times."
 nd_bgp_rhone_winemaking: "Rhone Winemaking"
 nd_bgp_rhone_winemaking_desc: "Traditional winemaking methods perfected over centuries in the Rhone valley — harvesting, pressing, and aging wines in oak barrels to produce the robust reds and fragrant roses for which the region is renowned."
 nd_bgp_papal_vintages: "Papal Vintages"
 nd_bgp_papal_vintages_desc: "Premium winemaking techniques developed under papal patronage, using carefully selected grape varieties and refined production methods to create wines worthy of the pontiff's table."
 nd_bgp_palais_des_papes: "Palais des Papes"
 nd_bgp_palais_des_papes_desc: "The largest Gothic palace in Europe, built for the Avignon popes. Its soaring chambers, frescoed chapels, and vast library embody the cultural ambitions of the medieval papacy and continue to inspire ecclesiastical and scholarly endeavor."
 nd_bgp_papal_palace_maintenance: "Papal Palace Upkeep"
 nd_bgp_papal_palace_maintenance_desc: "Maintenance of the vast palace complex — stone repairs, illumination of its many chambers, wine for ecclesiastical ceremonies, and support for the scribes and scholars who work within its walls."
 nd_bgp_saline: "Saline"
 nd_bgp_saline_desc: "A salt extraction works — underground galleries channeling natural brine to the surface, where it is evaporated in great cauldrons over wood fires. The white gold of Franche-Comte has fed eastern France for a millennium."
 nd_bgp_salt_extraction: "Salt Extraction"
 nd_bgp_salt_extraction_desc: "The systematic extraction of salt from underground brine — drawing saline water through deep wells, then evaporating it over wood and coal fires to produce crystalline salt for trade."
 nd_bgp_chancery: "Chancery"
 nd_bgp_chancery_desc: "The administrative heart of Savoyard governance — a professional chancery where trained notaries draft laws, maintain records, and manage the diplomatic correspondence of the realm."
 nd_bgp_chancery_upkeep: "Chancery Operations"
 nd_bgp_chancery_upkeep_desc: "Operating costs of the chancery — paper for documents, wax for seals, cloth for official uniforms, books of law and precedent, and candles for the long hours of administrative work."
 nd_bgp_bastille_savoyarde: "Bastille Savoyarde"
 nd_bgp_bastille_savoyarde_desc: "A formidable mountain fortress built to command an alpine valley or pass, its thick stone walls and commanding position making it all but impervious to assault in an age before heavy artillery."
 nd_bgp_fortress_garrison: "Mountain Garrison"
 nd_bgp_fortress_garrison_desc: "The standing garrison of a mountain fortress — armed men maintaining the walls, weapons, firearms, and tools needed to withstand a prolonged siege in hostile alpine terrain."
 nd_bgp_silk_workshop: "Silk Workshop"
 nd_bgp_silk_workshop_desc: "A workshop for the weaving of silk into fine cloth, drawing on techniques introduced from Italy and raw silk imported from the East. The beginning of what would become one of Europe's great textile industries."
 nd_bgp_silk_weaving: "Silk Weaving"
 nd_bgp_silk_weaving_desc: "The art of weaving raw silk thread into fine cloth, using looms of increasing sophistication to produce fabrics that rival the finest Italian workshops."
 nd_bgp_provencal_arsenal: "Provencal Arsenal"
 nd_bgp_provencal_arsenal_desc: "A Mediterranean naval arsenal — shipyard, timber stores, rope walks, and dry docks for the construction and repair of warships that defend Provencal maritime trade."
 nd_bgp_arsenal_maintenance: "Arsenal Operations"
 nd_bgp_arsenal_maintenance_desc: "Maintaining the naval arsenal — timber for hulls, naval stores and tar for rigging and caulking, and tools for the shipwrights and craftsmen who keep the fleet ready for sea."
 nd_bgp_grand_domaine: "Grand Domaine"
 nd_bgp_grand_domaine_desc: "A modern wine estate employing proto-industrial methods — systematic cultivation, controlled fermentation, and organized export networks that transform traditional viticulture into a commercial enterprise."
 nd_bgp_estate_winemaking: "Estate Winemaking"
 nd_bgp_estate_winemaking_desc: "Large-scale commercial winemaking on a modern estate, employing improved agricultural techniques and organized labor to produce wine for national and international markets."
 levy_nd_bgp_chasseurs_alpins: "Chasseurs Alpins Levy"
 levy_nd_bgp_chasseurs_alpins_desc: "Mountain infantry levied from the hardy populations of Alpine valleys."
 levy_nd_bgp_montagnard_cavalry: "Montagnard Cavalry Levy"
 levy_nd_bgp_montagnard_cavalry_desc: "Light cavalry levied from the Savoyard mountain nobility."
 nd_bgp_formed_tt: "Burgundy-Provence has been formed"
 nd_bgp_path_a_tt: "Chose The Rhone Corridor"
 nd_bgp_path_b_tt: "Chose Alpine Gatekeepers"
 nd_bgp_destiny: "The Kingdom of Arles Reborn"
 nd_bgp_destiny_desc: "The ancient Kingdom of Burgundy lives again. With stability secured, the new realm must choose its path forward -- whether to embrace the Mediterranean world or to master the Alpine passes."
 nd_bgp_dest_rhone_commerce: "Rhone Commerce"
 nd_bgp_dest_rhone_commerce_desc: "Extend the Rhone corridor's commercial reach westward to Montpellier, securing the Languedoc coast and establishing silk as a staple of our capital's trade. Requires 1000 gold in the treasury."
 nd_bgp_dest_mare_nostrum: "Mare Nostrum"
 nd_bgp_dest_mare_nostrum_desc: "Seize Genoa, the jewel of Mediterranean trade, and integrate its mercantile networks into our growing commercial empire. Develop our realm to 1500 total development and achieve prestige of 50."
 nd_bgp_dest_rhone_apex: "The Grand Emporium"
 nd_bgp_dest_rhone_apex_desc: "Bring Barcelona under our banner, completing our dominion over the western Mediterranean's richest ports. Amass 3000 gold, achieve prestige of 75, and embrace the Global Trade institution."
 nd_bgp_dest_alpine_mastery: "Alpine Mastery"
 nd_bgp_dest_alpine_mastery_desc: "Extend our control over the Swiss cantons by taking Zurich, the key to central Switzerland. Maintain an army of at least 30 regiments and stability of 75."
 nd_bgp_dest_piedmont_control: "Piedmont Control"
 nd_bgp_dest_piedmont_control_desc: "Cross the Alps and seize Turin, the gateway to the Italian peninsula. Build an army of 50 regiments and develop the realm to 1500 total development."
 nd_bgp_dest_alpine_hegemony: "Alpine Hegemony"
 nd_bgp_dest_alpine_hegemony_desc: "Take Milan, the richest city of northern Italy, completing our domination of both sides of the Alps. Field 75 regiments, achieve prestige of 75, and embrace the Artillery institution."
 nd_bgp.5.t: "The Kingdom Restored"
 nd_bgp.5.d: "The crown of the Kingdom of Arles sits upon our brow once more. What was sundered by centuries of division is now reunited -- from the Alpine peaks to the shores of the Mediterranean, the kingdom lives again. History watches to see what we shall make of this inheritance."
 nd_bgp.5.a: "The kingdom endures."
 nd_bgp.6.t: "The Rhone Flows South"
 nd_bgp.6.d: "Our merchants and galleys now ply a route that stretches from Lyon to Montpellier and beyond. The Rhone corridor is becoming what nature always intended it to be -- a commercial highway linking the heart of Europe to the Mediterranean. Silk from the East arrives in our markets; wine from our vineyards flows outward to every port. The revenue is already transforming our kingdom."
 nd_bgp.6.a: "Let the commerce flow."
 nd_bgp.7.t: "Genoa Under Our Banner"
 nd_bgp.7.d: "The Superb Republic -- La Superba -- is ours. Genoa's banking houses, its fleets, its far-flung trading posts from the Black Sea to the Atlantic now serve our crown. The Genoese merchant princes, pragmatic as ever, are already adapting to our rule. The question is how best to exploit this windfall.\n\nWe could integrate Genoa's trade networks into a unified Levantine commerce system, channeling eastern goods through our ports. Alternatively, we could build upon Genoa's naval traditions to establish our own thalassocracy -- a maritime power that commands respect on every sea."
 nd_bgp.7.a: "Integrate the Genoese trade networks."
 nd_bgp.7.b: "Build a naval power to rival any on the sea."
 nd_bgp.8.t: "The Grand Emporium of the West"
 nd_bgp.8.d: "Barcelona, Genoa, Marseille, Montpellier -- the greatest ports of the western Mediterranean fly our banner. Our kingdom has become what the Romans once dreamed of: a single commercial civilization stretching along the entire northern Mediterranean coast. Goods flow from three continents through our harbors.\n\nThis unprecedented commercial power can be directed toward building -- investing in infrastructure, reducing costs, and creating a prosperous realm. Or it can fuel a cultural renaissance that would make the troubadours weep with joy -- a flowering of arts, diplomacy, and influence that cements our place among the great powers of Europe."
 nd_bgp.8.a: "Build the greatest trading realm in Christendom."
 nd_bgp.8.b: "Let our courts rival Florence and Rome."
 nd_bgp.9.t: "Master of the Passes"
 nd_bgp.9.d: "Zurich has fallen to our forces. The Swiss cantons now look to our crown rather than to their fractious confederacy. With this conquest, we command the full breadth of the Alpine barrier -- every major pass from the Simplon to the Saint Gotthard answers to our toll collectors and our garrisons. No army crosses the mountains without our knowledge; no merchant crosses without paying our due."
 nd_bgp.9.a: "The Alps are our fortress and our treasury."
 nd_bgp.10.t: "The Descent into Italy"
 nd_bgp.10.d: "Turin is ours. The Savoyard dream of ruling both slopes of the Alps has been realized -- we command the passes from above and the Piedmontese plain below. The rich cities of northern Italy lie open before us, their wealth a temptation to any ambitious prince.\n\nOur garrison commanders advocate for a system of iron discipline -- fortified positions, rapid reinforcement, and an army that recovers from setbacks faster than any rival. Others counsel a different approach: using our strategic position to extract concessions through diplomacy backed by the threat of force, making every peace treaty and every casus belli serve our expansion."
 nd_bgp.10.a: "Discipline and swift reinforcement are our strengths."
 nd_bgp.10.b: "Strategic position is our greatest weapon."
 nd_bgp.11.t: "The Alpine Imperium"
 nd_bgp.11.d: "Milan -- the beating heart of Lombardy, the richest city north of Rome -- bows to our crown. We have achieved what no power since Charlemagne has managed: a single realm commanding both the Alpine barrier and the Lombard plain, straddling the great divide between northern and southern Europe.\n\nThis hegemony can take the form of military supremacy -- an aggressive posture that exploits our strategic position to annex territory and project force across the continent. Alternatively, we can consolidate our mountain kingdom into an impregnable and self-sufficient realm, integrating conquered peoples and building logistical networks that make our armies tireless."
 nd_bgp.11.a: "We are conquerors -- let Italy tremble."
 nd_bgp.11.b: "Consolidate our mountain realm into fortress."
 STATIC_MODIFIER_NAME_nd_bgp_dest_levant_routes: "Levantine Routes"
 STATIC_MODIFIER_DESC_nd_bgp_dest_levant_routes: "The integration of Genoese trade networks channels eastern goods through Provencal ports, enriching our realm with raw materials from across the Mediterranean."
 STATIC_MODIFIER_NAME_nd_bgp_dest_provencal_thalassocracy: "Provencal Thalassocracy"
 STATIC_MODIFIER_DESC_nd_bgp_dest_provencal_thalassocracy: "Our naval forces dominate the western Mediterranean, securing trade routes and projecting power from Catalonia to the Ligurian coast."
 STATIC_MODIFIER_NAME_nd_bgp_dest_grand_emporium: "Grand Emporium"
 STATIC_MODIFIER_DESC_nd_bgp_dest_grand_emporium: "The kingdom has become the greatest commercial hub of the western Mediterranean -- a vast trading realm where money flows freely and construction costs are minimal."
 STATIC_MODIFIER_NAME_nd_bgp_dest_troubadour_renaissance: "Troubadour Renaissance"
 STATIC_MODIFIER_DESC_nd_bgp_dest_troubadour_renaissance: "A cultural flowering worthy of the troubadour tradition -- our courts attract artists, diplomats, and scholars, and our cultural influence radiates across Europe."
 STATIC_MODIFIER_NAME_nd_bgp_dest_iron_garrison: "Iron Garrison"
 STATIC_MODIFIER_DESC_nd_bgp_dest_iron_garrison: "Our mountain garrisons are paragons of military discipline -- rapid reinforcement and high morale recovery make our defensive positions all but unbreakable."
 STATIC_MODIFIER_NAME_nd_bgp_dest_toll_imperium: "Toll Imperium"
 STATIC_MODIFIER_DESC_nd_bgp_dest_toll_imperium: "Our strategic position astride the Alpine passes gives us unrivaled diplomatic leverage, turning every negotiation and every casus belli to our advantage."
 STATIC_MODIFIER_NAME_nd_bgp_dest_alpine_imperator: "Alpine Imperator"
 STATIC_MODIFIER_DESC_nd_bgp_dest_alpine_imperator: "An aggressive military posture exploiting our Alpine position -- our armies conquer swiftly, annex cheaply, and extract tribute from the vanquished."
 STATIC_MODIFIER_NAME_nd_bgp_dest_mountain_kingdom: "Mountain Kingdom"
 STATIC_MODIFIER_DESC_nd_bgp_dest_mountain_kingdom: "An impregnable mountain realm where conquered peoples are swiftly integrated, supply lines run efficiently, and the harsh alpine environment strengthens rather than weakens our forces."
 nd_bgp_maison_de_commerce: "Maison de Commerce"
 nd_bgp_maison_de_commerce_desc: "A grand Mediterranean trading house -- a combined warehouse, exchange, and counting house that serves as the nerve center of our commercial empire, channeling goods and gold from across the sea."
 nd_bgp_trading_house_maintenance: "Trading House Operations"
 nd_bgp_trading_house_maintenance_desc: "Operating costs of the grand trading house -- paper for contracts and ledgers, cloth for sample displays, salt as a trade standard, and glass for windows and display cases."
 nd_bgp_alpine_citadel: "Alpine Citadel"
 nd_bgp_alpine_citadel_desc: "An impregnable mountain fortress complex commanding a strategic Alpine valley -- multiple defensive rings, deep magazines, and fortifications designed to withstand the heaviest artillery. The crowning achievement of Burgundian-Provencal military engineering."
 nd_bgp_citadel_garrison: "Citadel Garrison"
 nd_bgp_citadel_garrison_desc: "The elite garrison of an Alpine citadel -- heavily armed defenders maintaining weapons, walls, and supplies for extended sieges in hostile mountain terrain."
