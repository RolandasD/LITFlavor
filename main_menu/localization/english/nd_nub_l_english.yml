l_english:
 STATIC_MODIFIER_NAME_nd_nub_land_of_the_bow: "Land of the Bow"
 STATIC_MODIFIER_DESC_nd_nub_land_of_the_bow: "The ancient Egyptians called this land Ta-Seti — the Land of the Bow. For millennia, Nubian archers were feared across the ancient world, employed as mercenaries from Egypt to Persia. Now, as Nubia rises again, its warrior traditions are reborn. The bow is more than a weapon; it is the symbol of a people who have never been truly conquered."
 STATIC_MODIFIER_NAME_nd_nub_golden_corridor: "The Golden Corridor"
 STATIC_MODIFIER_DESC_nd_nub_golden_corridor: "Nubia sits astride the only secure route between sub-Saharan Africa and the Mediterranean — the Nile corridor. Gold, ivory, ebony, incense, and exotic animals flow north through Nubian hands, while grain, linen, and manufactured goods flow south. The kingdom that controls this corridor controls the wealth of two worlds."
 nd_nub.1.t: "The Restoration of Nubia"
 nd_nub.1.d: "The scattered Nubian lands are united once more. For centuries, the kingdoms of Makuria and Alodia channeled the wealth of Africa northward along the Nile, their archers the terror of any who dared invade, their churches adorned with paintings that rivaled Constantinople. Though those kingdoms fell to internal strife and foreign pressure, the Nubian people endured. Now a new chapter begins. Will Nubia restore itself as a military power whose bowmen make empires tremble, or as the indispensable trade corridor linking Africa's riches to the wider world?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_nub.1.a: "We are the heirs of Ta-Seti — let our arrows darken the sky."
 nd_nub.1.b: "Gold, ivory, and incense — the Nile shall carry our fortune."
 nd_nub.2.t: "The Glory of Faras"
 nd_nub.2.d: "The cathedral at Faras was once the crown jewel of Christian Nubia. Its walls bore magnificent paintings — archangels with dark Nubian features, bishops in resplendent vestments, the Virgin Mary rendered in a style that blended Byzantine iconography with distinctly African sensibility. The Faras masters developed a school of art that was unique in the medieval world, where the sacred figures turned toward the mortal worshippers rather than the other way around. This tradition of artistic excellence defines Nubian cultural identity. Shall we restore Faras as a living center of faith, or honor its legacy as a beacon of learning and artistic achievement?"
 nd_nub.2.a: "Restore the cathedral — let faith be our foundation."
 nd_nub.2.b: "The Faras masters inspire a new age of Nubian learning."
 nd_nub.3.t: "The Legacy of the Baqt"
 nd_nub.3.d: "In 652, the kingdom of Makuria signed the Baqt with the Arab governors of Egypt — one of the longest-standing treaties in history. For over six centuries, this agreement guaranteed peace along the Nile: Nubia sent slaves, giraffes, and exotic goods northward, while Egypt provided grain, wine, and textiles in return. The Baqt was not merely a trade agreement but a diplomatic masterwork that kept the armies of the caliphate at bay when they conquered everything else in their path. This tradition of shrewd diplomacy remains part of Nubia's heritage. Shall we honor the Baqt's legacy as a diplomatic tradition, or as the foundation of our commercial networks?"
 nd_nub.3.a: "The Baqt teaches us that a wise treaty is worth more than a thousand soldiers."
 nd_nub.3.b: "The trade routes of the Baqt shall make us wealthy beyond measure."
 nd_nub.4.t: "The Funj Synthesis"
 nd_nub.4.d: "When the Funj people rose to power in 1504, they built a new sultanate at Sennar upon the ruins of Christian Alodia. Yet the Funj did not simply replace one civilization with another. Despite adopting Islam, they preserved African customs and pre-Islamic rituals alongside their new faith. European travellers described an 'African empire with a Muslim facade' — a realm where Islamic scholars taught in madrasas while traditional ceremonies continued in the countryside. This synthesis of old and new, African and Islamic, created a unique Sudanese identity. Will Nubia embrace orthodox Islamic renewal, or celebrate the syncretic heritage that makes its culture distinctive?"
 nd_nub.4.a: "Let the light of true faith illuminate our land."
 nd_nub.4.b: "Our strength lies in the blending of traditions."
 nd_nub.5.t: "The Saqia Transforms the Nile"
 nd_nub.5.d: "The saqia — the ox-driven waterwheel — revolutionized Nubian agriculture. Unlike in Egypt, where the Nile's annual flood irrigates the land naturally, Nubian agriculture depends entirely on mechanical irrigation. A single saqia, turning through the day, can water two hectares of cropland from the river's edge. As saqias multiply along the Nile, villages expand, populations grow, and the narrow strip of green along the river banks widens. The rhythmic creaking of the waterwheel has become the heartbeat of Nubian life."
 nd_nub.5.a: "The river gives life to all who know how to draw from it."
 STATIC_MODIFIER_NAME_nd_nub_faras_restored: "Faras Restored"
 STATIC_MODIFIER_DESC_nd_nub_faras_restored: "The cathedral at Faras has been restored as a center of Nubian Christian devotion, its walls again bearing the magnificent paintings that once awed pilgrims from across the Christian world."
 STATIC_MODIFIER_NAME_nd_nub_faras_beacon: "Beacon of the Nile"
 STATIC_MODIFIER_DESC_nd_nub_faras_beacon: "The artistic and scholarly traditions of Faras have been revived as a center of learning, where the techniques of the old masters inspire new generations of Nubian scholars and artists."
 STATIC_MODIFIER_NAME_nd_nub_baqt_diplomacy: "The Baqt Tradition"
 STATIC_MODIFIER_DESC_nd_nub_baqt_diplomacy: "Nubia's diplomatic heritage — forged by the centuries-long Baqt treaty with Egypt — gives its envoys an instinctive understanding of how to negotiate from a position of cultural confidence."
 STATIC_MODIFIER_NAME_nd_nub_baqt_commerce: "Commerce of the Baqt"
 STATIC_MODIFIER_DESC_nd_nub_baqt_commerce: "The trade networks established under the historic Baqt agreement continue to channel goods between sub-Saharan Africa and the Mediterranean through Nubian hands."
 STATIC_MODIFIER_NAME_nd_nub_funj_islamic_renewal: "Islamic Renewal"
 STATIC_MODIFIER_DESC_nd_nub_funj_islamic_renewal: "Orthodox Islamic scholarship has taken root in Nubia, with holy men and scholars establishing schools of learning that bind the land to the wider Islamic world."
 STATIC_MODIFIER_NAME_nd_nub_funj_syncretic_heritage: "Syncretic Heritage"
 STATIC_MODIFIER_DESC_nd_nub_funj_syncretic_heritage: "Nubia embraces its layered identity — Christian, Islamic, and African traditions woven together into a culture that transcends the boundaries of any single faith."
 nd_nub_ta_seti_archery: "Ta-Seti Archery"
 nd_nub_ta_seti_archery_desc: "The bowmen of Ta-Seti — the 'Land of the Bow' — were feared across the ancient world. This tradition of archery excellence endures in Nubian warriors who train from childhood with the great longbow."
 nd_nub_gold_mining: "Wadi Allaqi Gold"
 nd_nub_gold_mining_desc: "The gold deposits of Wadi Allaqi and the Eastern Desert have been a source of Nubian wealth since the age of the pharaohs. Systematic mining operations extract the precious metal that funds kingdoms."
 nd_nub_saqia_expansion: "Saqia Irrigation"
 nd_nub_saqia_expansion_desc: "The ox-driven waterwheel — the saqia — transforms the narrow Nile floodplain into productive farmland, turning the desert green one field at a time."
 nd_nub_painted_pottery: "Nubian Painted Pottery"
 nd_nub_painted_pottery_desc: "Nubian potters produce distinctive wares decorated with Christian symbols — fish, doves, crosses, and palm fronds — in styles that blend African and Mediterranean traditions."
 nd_nub_nile_corridor: "Nile Corridor Trade"
 nd_nub_nile_corridor_desc: "Nubia commands the Nile corridor — the only secure route for African exotica to reach the Mediterranean. Ivory, ebony, incense, and exotic animals pass through Nubian hands."
 nd_nub_coptic_roots: "Coptic Roots"
 nd_nub_coptic_roots_desc: "Nubia's conversion to Christianity before 600 AD established deep connections to Coptic Egypt and the wider Christian world, creating a spiritual heritage that persists across centuries."
 nd_nub_fortress_building: "Nile Fortifications"
 nd_nub_fortress_building_desc: "Fortified cities and watchtowers line the Nile, protecting Nubian settlements from desert raiders and foreign invaders. These stone fortresses control the river's chokepoints."
 nd_nub_pitati_tradition: "Pitati Bowmen"
 nd_nub_pitati_tradition_desc: "The Pitati were elite Nubian archer contingents so renowned that Egyptian pharaohs requisitioned them by name. This tradition of professional archery produces warriors of extraordinary skill."
 nd_nub_makurian_cavalry: "Makurian Horsemen"
 nd_nub_makurian_cavalry_desc: "The cavalry of Makuria patrols the Nile corridor on horseback, armed with lance and bow. These riders are the first line of defense against Bedouin incursions and foreign armies."
 nd_nub_monastic_centers: "Monastic Centers"
 nd_nub_monastic_centers_desc: "The great monasteries of Nubia — Banganarti, Ghazali, and others — serve as centers of learning, pilgrimage, and artistic production, preserving literacy in Greek, Coptic, and Old Nubian."
 nd_nub_faras_tradition: "Faras Cathedral Tradition"
 nd_nub_faras_tradition_desc: "The artistic achievements of the Faras Cathedral masters — their unique style of wall painting that blended Byzantine iconography with African humanity — represent the pinnacle of Nubian cultural expression."
 nd_nub_ivory_trade: "Ivory Trade Networks"
 nd_nub_ivory_trade_desc: "Nubian merchants control the ivory trade from the African interior to the Mediterranean markets, operating warehouses and caravans that move this precious commodity along ancient routes."
 nd_nub_desert_leathercraft: "Desert Leathercraft"
 nd_nub_desert_leathercraft_desc: "Nubian leatherworkers transform animal hides into fine goods — saddles, shields, containers, and decorative items — using techniques perfected over generations in the desert climate."
 nd_nub_dongola_court: "Court of Old Dongola"
 nd_nub_dongola_court_desc: "The administrative traditions of Old Dongola — capital of Makuria for over seven centuries — provide a foundation for organized governance along the Nile."
 nd_nub_baqt_legacy: "Legacy of the Baqt"
 nd_nub_baqt_legacy_desc: "The Baqt — the treaty between Makuria and the Arab governors of Egypt that lasted over six centuries — established Nubia's reputation as a diplomatic power that could negotiate peace with the mightiest empires."
 nd_nub_citadel_garrison: "Citadel Garrison"
 nd_nub_citadel_garrison_desc: "The fortified cities of the Nile produce professional garrison troops trained in the defense of stone walls and river crossings — heavy infantry built to hold ground against any assault."
 nd_nub_red_sea_incense: "Red Sea Incense"
 nd_nub_red_sea_incense_desc: "The incense trade routes connecting the Horn of Africa to the Red Sea coast pass through Nubian-controlled territory, bringing fragrant wealth from distant lands."
 nd_nub_four_scripts: "Four Scripts"
 nd_nub_four_scripts_desc: "Nubian scribes command four writing systems — Old Nubian, Greek, Coptic, and Arabic — giving them access to the scholarly traditions of both the Christian and Islamic worlds."
 nd_nub_cataract_defenses: "Cataract Defenses"
 nd_nub_cataract_defenses_desc: "The cataracts of the Nile form natural chokepoints that Nubian defenders fortify and exploit. Any army advancing up the river must pass through these deadly narrows under a rain of arrows."
 nd_nub_funj_synthesis: "Funj Synthesis"
 nd_nub_funj_synthesis_desc: "The Funj Sultanate created a unique cultural blend — Islamic faith layered upon African traditions, creating a Sudanese identity that transcends the boundaries of any single civilization."
 nd_nub_sennar_scholarship: "Sennar Scholarship"
 nd_nub_sennar_scholarship_desc: "The city of Sennar becomes a center of Islamic learning, with madrasas attracting scholars from across the Nile valley and beyond."
 nd_nub_caravan_trade: "Caravan Trade"
 nd_nub_caravan_trade_desc: "Long-distance caravan routes connect Nubia to the markets of Egypt, the Horn of Africa, and the Sahel, carrying slaves, gold, and agricultural products to distant buyers."
 nd_nub_sultanate_authority: "Sultanate Authority"
 nd_nub_sultanate_authority_desc: "The Funj sultans consolidate authority over the diverse peoples of the Nile valley, imposing a centralized administration over formerly independent chieftaincies and tribal territories."
 nd_nub_butana_cavalry: "Butana Horsemen"
 nd_nub_butana_cavalry_desc: "The Butana steppe between the Nile and the Atbara river breeds hardy horses and fiercer riders. These mounted warriors range across the open grasslands, raiding and patrolling vast distances."
 nd_nub_kordofan_expansion: "Kordofan Expansion"
 nd_nub_kordofan_expansion_desc: "Nubian authority extends westward into the highlands of Kordofan and the Nuba Mountains, incorporating new peoples and resources into the kingdom's domain."
 nd_nub_sennar_firearms: "Sennar Musketeers"
 nd_nub_sennar_firearms_desc: "The Funj Sultanate adopts firearms technology, equipping infantry with muskets acquired through Red Sea trade contacts. A new era of Nubian military power begins."
 nd_nub_sennar_golden_age: "Golden Age of Sennar"
 nd_nub_sennar_golden_age_desc: "Under the late Funj sultans, Sennar reaches its peak as a thriving capital — a city of markets, mosques, and mansions where African, Arab, and Ottoman influences mingle."
 nd_nub_blue_nile_agriculture: "Blue Nile Agriculture"
 nd_nub_blue_nile_agriculture_desc: "The fertile lands along the Blue Nile, enriched by seasonal flooding, produce abundant harvests of grain and cotton that sustain the sultanate's growing population."
 nd_nub_hamaj_regency: "Hamaj Regency"
 nd_nub_hamaj_regency_desc: "The Hamaj regents who came to dominate the late Funj court bring administrative reforms that streamline governance, even as they diminish the sultans themselves to figureheads."
 nd_nub_suakin_trade: "Suakin Gateway"
 nd_nub_suakin_trade_desc: "The Red Sea port of Suakin connects Nubia to the Indian Ocean trading world, bringing wealth from the spice routes and providing access to markets across Arabia and beyond."
 nd_nub_military_reform: "Military Reform"
 nd_nub_military_reform_desc: "Late-period military reforms professionalize the Nubian army, introducing drill, standardized equipment, and tactical discipline to supplement traditional warrior courage."
 nd_nub_nubian_identity: "Nubian Identity"
 nd_nub_nubian_identity_desc: "A renewed pride in Nubian cultural identity — its unique art, language, and traditions — emerges as the foundation of a modern Nubian national consciousness."
 nd_nub_modern_irrigation: "Modern Irrigation"
 nd_nub_modern_irrigation_desc: "Advanced irrigation techniques transform the Nile valley, expanding the arable land far beyond what the ancient saqia could reach and supporting a growing population."
 nd_nub_resistance_tradition: "Resistance Tradition"
 nd_nub_resistance_tradition_desc: "Nubia has a millennia-long tradition of resisting foreign domination — from Assyria to Rome to the Arab caliphates. This defiance is not stubbornness but a deep cultural conviction that Nubian sovereignty is non-negotiable."
 nd_nub_sufi_networks: "Sufi Networks"
 nd_nub_sufi_networks_desc: "Sufi orders spread through the Nubian countryside, providing spiritual leadership, social services, and a unifying popular religion that transcends tribal and ethnic boundaries."
 nd_nub_nile_mercantile: "Nile Mercantile"
 nd_nub_nile_mercantile_desc: "Cross-cultural mercantile networks link Nubian traders to markets across Africa and the Middle East, creating a commercial class that spans religious and ethnic boundaries."
 nd_nub_modern_governance: "Modern Governance"
 nd_nub_modern_governance_desc: "Administrative modernization brings centralized record-keeping, standardized taxation, and professional bureaucracy to a kingdom that once governed through personal authority and tribal custom."
 a_nd_nub_nubian_archers: "Nubian Archers"
 a_nd_nub_nubian_archers_desc: "The legendary bowmen of Ta-Seti, armed with great longbows of seasoned palm wood. Trained from childhood, these archers can strike targets with devastating accuracy at distances that astonish foreign observers."
 a_nd_nub_pitati: "Pitati Bowmen"
 a_nd_nub_pitati_desc: "Elite professional archers named for the Egyptian term for Nubian archer contingents. The Pitati combine the traditional Nubian mastery of the bow with organized military discipline."
 a_nd_nub_nile_horsemen: "Nile Horsemen"
 a_nd_nub_nile_horsemen_desc: "Makurian cavalry armed with lance and bow, patrolling the Nile corridor on sturdy horses. These riders are as comfortable in the saddle as on foot, able to fight as mounted archers or shock cavalry."
 a_nd_nub_dongola_guard: "Dongola Guardsmen"
 a_nd_nub_dongola_guard_desc: "Heavy infantry drawn from the garrison traditions of Old Dongola and the fortified Nile cities. These soldiers are trained to hold walls and river crossings against overwhelming odds."
 a_nd_nub_sennar_musketeers: "Sennar Musketeers"
 a_nd_nub_sennar_musketeers_desc: "Gunpowder infantry of the Funj Sultanate, equipped with muskets acquired through Red Sea trade. They represent the evolution of Nubian military tradition into the firearms age."
 nd_nub_saqia: "Saqia Waterwheel"
 nd_nub_saqia_desc: "An ox-driven waterwheel that lifts river water to irrigate fields along the narrow Nile floodplain. The saqia is the backbone of all Nubian agriculture."
 nd_nub_nile_fortress: "Nile Fortress"
 nd_nub_nile_fortress_desc: "A fortified stronghold of stone and mudbrick commanding a strategic position along the Nile. These fortresses control river traffic and provide refuge against desert raiders."
 nd_nub_monastery: "Nubian Monastery"
 nd_nub_monastery_desc: "A center of Christian devotion and learning, where monks preserve manuscripts in Greek, Coptic, and Old Nubian. The monastery's scriptorium and painted chapel attract pilgrims from across the Christian world."
 nd_nub_gold_camp: "Gold Processing Camp"
 nd_nub_gold_camp_desc: "A mining camp in the Eastern Desert where gold-bearing quartz is crushed and washed to extract the precious metal that has made Nubia wealthy since the age of the pharaohs."
 nd_nub_ivory_warehouse: "Ivory Warehouse"
 nd_nub_ivory_warehouse_desc: "A fortified storehouse where ivory tusks from the African interior are collected, graded, and prepared for sale to Mediterranean merchants. Nubia's position on the Nile makes it the natural entrepot for this luxury trade."
 nd_nub_pottery_workshop: "Pottery Workshop"
 nd_nub_pottery_workshop_desc: "A workshop producing the distinctive painted pottery of Nubia — vessels decorated with Christian symbols and geometric patterns in a style unique to the Nile valley."
 nd_nub_madrasa: "Nubian Madrasa"
 nd_nub_madrasa_desc: "An Islamic school of learning established in the Funj period, where scholars teach theology, law, and the sciences, connecting Nubia to the wider intellectual world of Islam."
 nd_nub_saqia_operation: "Saqia Operation"
 nd_nub_saqia_operation_desc: "Maintaining the ox-driven waterwheel requires livestock to power the mechanism and timber to repair the wooden gears and buckets."
 nd_nub_fortress_upkeep: "Fortress Upkeep"
 nd_nub_fortress_upkeep_desc: "Maintaining the stone fortifications of the Nile requires a steady supply of cut stone for repairs and weapons to arm the garrison."
 nd_nub_monastery_maintenance: "Monastery Maintenance"
 nd_nub_monastery_maintenance_desc: "The monastery requires beeswax for candles and liturgical use, and paper for the scriptorium where monks copy manuscripts."
 nd_nub_gold_processing: "Gold Processing"
 nd_nub_gold_processing_desc: "Timber fuels the fires used to heat gold-bearing rock before crushing, extracting the precious metal that has made Nubia wealthy since the age of the pharaohs."
 nd_nub_ivory_storage: "Ivory Storage"
 nd_nub_ivory_storage_desc: "Storing and protecting valuable ivory tusks requires sturdy timber warehouses and careful management."
 nd_nub_pottery_production: "Pottery Production"
 nd_nub_pottery_production_desc: "Nubian potters shape local clay into vessels and decorate them with distinctive painted patterns using dyes, producing the renowned pottery of the Nile valley."
 nd_nub_madrasa_upkeep: "Madrasa Upkeep"
 nd_nub_madrasa_upkeep_desc: "The madrasa requires a steady supply of paper for manuscripts, textbooks, and student exercises."
 nd_nub_nile_trade: "Nile Corridor Trade"
 nd_nub_nile_trade_desc: "Processing exotic African goods — furs, hides, and dyes — for sale to Mediterranean merchants through the Nile trade corridor."
 nd_nub_leatherworking: "Nubian Leatherworking"
 nd_nub_leatherworking_desc: "Transforming livestock hides into fine leather goods using dyes and techniques perfected over generations in the desert climate."
 nd_nub_incense_trade: "Incense Processing"
 nd_nub_incense_trade_desc: "Processing and packaging aromatic resins from the Horn of Africa for sale through Red Sea trade networks."
 levy_nd_nub_archers: "Nubian Archer Levy"
 levy_nd_nub_archers_desc: "Peasants and soldiers trained in the traditional Nubian art of the great longbow, called to arms in time of need."
 levy_nd_nub_horsemen: "Nile Horsemen Levy"
 levy_nd_nub_horsemen_desc: "Nobles and soldiers of the Nile corridor, mounted on sturdy horses and armed with lance and bow, mustered as cavalry levies."
 nd_nub_metalworking: "Nubian Metalworking"
 nd_nub_metalworking_desc: "Processing iron and copper ore from the Eastern Desert using traditional Nubian smelting techniques."
 nd_nub_date_wine: "Date Wine Processing"
 nd_nub_date_wine_desc: "Fermenting dates from Nile valley palms into wine — a beverage tradition stretching back to the pharaonic era."
 nd_nub_cotton_weaving: "Nubian Cotton Weaving"
 nd_nub_cotton_weaving_desc: "Weaving raw cotton into fine cloth dyed with vibrant colors, a textile tradition that connects Nubian craftsmen to markets across Africa and the Middle East."
 nd_nub_sennar_commerce: "Sennar Market Trade"
 nd_nub_sennar_commerce_desc: "The bustling markets of Sennar trade in silver and exotic goods, connecting Nubia to the wider commercial world."
 nd_nub_nile_metalwork: "Nile Metalwork"
 nd_nub_nile_metalwork_desc: "Nubian smiths work iron and copper from the Eastern Desert into tools, weapons, and ornamental objects, supporting both agriculture and warfare along the Nile."
 nd_nub_formed_tt: "Nubia has been formed"
 nd_nub_path_a_tt: "Chose Land of the Bow"
 nd_nub_path_b_tt: "Chose The Golden Corridor"
 nd_nub_destiny: "Destiny of Nubia"
 nd_nub_destiny_desc: "The Nubian lands are united once more. Whether through the bow or the trade route, the kingdom's destiny awaits."
 nd_nub_dest_upper_nile: "The Upper Nile Secured"
 nd_nub_dest_upper_nile_desc: "Conquer Upper Egypt and secure the Nile corridor from the cataracts to the delta approaches. Requires ownership of Aswan and Qus, and an army of 30,000."
 nd_nub_dest_horn_march: "The March Beyond"
 nd_nub_dest_horn_march_desc: "Extend Nubian military power into the Ethiopian highlands and the Kordofan steppe. Requires ownership of Axum and El Obeid, an army of 50,000, and prestige of 50."
 nd_nub_dest_pharaoh: "Pharaoh of Kush"
 nd_nub_dest_pharaoh_desc: "Complete the dream of the 25th Dynasty — rule Egypt from Cairo and command the holy cities of Arabia. Requires ownership of Cairo and Mecca, an army of 75,000, prestige of 75, and 3,000 gold."
 nd_nub_dest_ivory_road: "The Ivory Road"
 nd_nub_dest_ivory_road_desc: "Establish Nubia as the gateway for African ivory reaching world markets. Requires 1,000 gold, the banking institution, and ivory traded in a national market."
 nd_nub_dest_red_sea: "The Red Sea Gateway"
 nd_nub_dest_red_sea_desc: "Seize the port of Massawa and connect the Nile corridor to the Indian Ocean. Requires ownership of Massawa, 2,000 gold, total development of 1,000, and pearls in the capital market."
 nd_nub_dest_crossroads: "Crossroads of the World"
 nd_nub_dest_crossroads_desc: "Control the trade routes linking Africa, Arabia, and the Indian Ocean. Requires ownership of Jeddah and Aden, 3,000 gold, and prestige of 75."
 nd_nub.6.t: "The Destiny of Nubia"
 nd_nub.6.d: "The Nubian kingdom stands reunited, its people proud and its borders secure. The ancient legacy of Kush, Meroe, Makuria, and Alodia lives on in every stone fortress along the Nile and every prayer in every church and mosque. Now the question turns from survival to ambition. What mark will this restored Nubia leave upon the world?"
 nd_nub.6.a: "Our destiny awaits."
 nd_nub.7.t: "The Upper Nile Secured"
 nd_nub.7.d: "Nubian armies have marched north beyond the cataracts and taken Aswan and Qus. For the first time since the great pharaohs of the 25th Dynasty, Kushite soldiers stand guard over Upper Egypt. The ancient temples of Philae and Edfu, built when Nubian kings wore the double crown, are once more under the protection of a Nubian state. The fellahin of the Nile valley look up from their fields to see dark-skinned warriors whose ancestors once ruled from Memphis to Napata."
 nd_nub.7.a: "The cataracts bow before us."
 nd_nub.8.t: "The March Beyond"
 nd_nub.8.d: "The armies of Nubia have achieved what no Nile kingdom has managed in centuries. In the west, the Kordofan steppe and its wealth of cattle and iron submit to Nubian authority. In the south, the ancient rival Axum has fallen, its mountain fortresses now garrisoned by Nubian troops. The kingdom's strategic position is formidable — it commands the Nile, the Red Sea coast, and the approaches to both Egypt and the Horn of Africa.\n\nBut the manner of our expansion defines our character. Shall we ride the fury of our warriors, pressing forward with relentless momentum? Or shall we consolidate our gains through careful logistics, building the infrastructure of lasting empire?"
 nd_nub.8.a: "Fury and momentum — let nothing stand before us."
 nd_nub.8.b: "Fortify, supply, consolidate — then advance."
 nd_nub.9.t: "Pharaoh of Kush"
 nd_nub.9.d: "It is done. A Nubian king sits in Cairo, as Piye and Taharqa once sat in Memphis. The pyramids of Giza and the pyramids of Meroe are united under a single crown for the first time in over two thousand years. The holy city of Mecca acknowledges Nubian suzerainty. From the Mediterranean to the Red Sea, from the cataracts to the Arabian desert, a new empire has risen from the land that Egypt once called the 'wretched Kush.'\n\nHow shall the Pharaoh of Kush rule this vast domain? As a conqueror whose armies keep the peace through overwhelming force? Or as a divine ruler whose legitimacy flows from the ancient traditions of both Nubian and Egyptian kingship?"
 nd_nub.9.a: "We are the conqueror — our armies are our law."
 nd_nub.9.b: "We are the divine ruler of two lands."
 nd_nub.10.t: "The Ivory Road"
 nd_nub.10.d: "The ivory merchants of Nubia have established a commercial network that stretches from the elephant grounds of the African interior to the banking houses of the Mediterranean. Tusks that were once traded by the handful in village markets now flow through Nubian warehouses by the ton, graded, processed, and shipped to buyers across the known world. The banking institution has taken root, and gold flows into Nubian coffers as surely as the Nile flows north."
 nd_nub.10.a: "The ivory roads shall make us wealthy beyond measure."
 nd_nub.11.t: "The Red Sea Gateway"
 nd_nub.11.d: "The port of Massawa is ours, and with it control of the western shore of the Red Sea. Nubia now commands both the Nile corridor and the maritime route to the Indian Ocean. Pearls from the Red Sea, spices from India, and silk from China pass through Nubian-controlled harbors alongside the ivory, gold, and incense that have always been the kingdom's stock in trade.\n\nBut the Red Sea is contested waters. Shall we invest in controlling the sea lanes themselves, building a fleet to secure our maritime commerce? Or shall we focus on making our ports the most efficient and best-connected in the region, drawing trade through institutional excellence?"
 nd_nub.11.a: "Command the sea lanes — our fleet will guard our wealth."
 nd_nub.11.b: "Build the finest ports on the Red Sea."
 nd_nub.12.t: "Crossroads of the World"
 nd_nub.12.d: "Nubian traders operate in Jeddah and Aden. The kingdom that once controlled only a narrow strip of the Nile now commands the junction where African, Arabian, and Indian Ocean trade routes converge. Gold from the Eastern Desert, ivory from the interior, incense from the Horn, pearls from the Red Sea, spices from India — all pass through Nubian hands. The commercial class of Sennar and Suakin has become one of the wealthiest in the region.\n\nShall we extend our reach across the Indian Ocean itself, building a naval presence that projects Nubian power to distant shores? Or shall we turn inward, using our wealth to build infrastructure that makes Nubia the indispensable hub where all roads meet?"
 nd_nub.12.a: "Our ships shall sail to India and beyond."
 nd_nub.12.b: "All roads lead through Nubia."
 STATIC_MODIFIER_NAME_nd_nub_dest_warrior_fury: "Fury of the Bowmen"
 STATIC_MODIFIER_DESC_nd_nub_dest_warrior_fury: "The momentum of Nubian conquest fuels rapid reinforcement and fierce morale recovery, though the warriors' pride breeds complacency at home."
 STATIC_MODIFIER_NAME_nd_nub_dest_logistic_war: "Logistics of Empire"
 STATIC_MODIFIER_DESC_nd_nub_dest_logistic_war: "Efficient supply lines and rapid recruitment build a military machine that sustains expansion, though the cost of constant mobilization strains the treasury."
 STATIC_MODIFIER_NAME_nd_nub_dest_nile_conqueror: "Conqueror of the Nile"
 STATIC_MODIFIER_DESC_nd_nub_dest_nile_conqueror: "The Pharaoh of Kush rules through overwhelming military force, maintaining cheap armies and mercenaries while declaring war at will."
 STATIC_MODIFIER_NAME_nd_nub_dest_divine_pharaoh: "Divine Pharaoh"
 STATIC_MODIFIER_DESC_nd_nub_dest_divine_pharaoh: "The Pharaoh of Kush draws on ancient traditions of divine kingship, commanding the loyalty of subjects and the respect of rivals at the negotiating table."
 STATIC_MODIFIER_NAME_nd_nub_dest_sea_lanes: "Red Sea Dominion"
 STATIC_MODIFIER_DESC_nd_nub_dest_sea_lanes: "Nubian fleets patrol the Red Sea, securing trade routes and blocking rivals, though the maritime focus leaves land forces stretched thin on the march."
 STATIC_MODIFIER_NAME_nd_nub_dest_port_mastery: "Port of the World"
 STATIC_MODIFIER_DESC_nd_nub_dest_port_mastery: "Nubian ports become centers of institutional exchange and intelligence, attracting scholars and spies alike, though the cosmopolitan character erodes traditional prestige."
 STATIC_MODIFIER_NAME_nd_nub_dest_indian_ocean: "Indian Ocean Reach"
 STATIC_MODIFIER_DESC_nd_nub_dest_indian_ocean: "Nubian merchantmen and warships ply the Indian Ocean, projecting power through trade and naval force across an ever-widening diplomatic network."
 STATIC_MODIFIER_NAME_nd_nub_dest_continental_hub: "Continental Nexus"
 STATIC_MODIFIER_DESC_nd_nub_dest_continental_hub: "Nubia invests its trade wealth in infrastructure and integration, building a continental crossroads where goods and peoples converge at minimal cost."
 nd_nub_throne_of_kush: "Throne of Kush"
 nd_nub_throne_of_kush_desc: "A grand military command center and royal seat modeled on the ancient palaces of Napata and Meroe, from which the Pharaoh of Kush directs the armies of a restored empire."
 nd_nub_throne_provisioning: "Royal Armory"
 nd_nub_throne_provisioning_desc: "Weapons, warhorses, cut stone for fortification, and leather harness sustain the garrison and supply the armies of the Kushite crown."
 nd_nub_nile_emporium: "Nile Emporium"
 nd_nub_nile_emporium_desc: "A vast commercial complex where ivory, incense, gold, and exotic goods from three continents are traded under one roof, the jewel of Nubia's mercantile empire."
 nd_nub_emporium_trade: "Emporium Operations"
 nd_nub_emporium_trade_desc: "Ivory, incense, fine cloth, and paper flow through the emporium's storerooms and counting houses."
