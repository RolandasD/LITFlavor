l_english:
 STATIC_MODIFIER_NAME_nd_wittenberg_legacy: "Wittenberg Legacy"
 STATIC_MODIFIER_DESC_nd_wittenberg_legacy: "From the steps of the Castle Church, a revolution of ideas swept across Christendom. Saxony's universities and printing presses shall be the instruments of a new age of learning, tolerance, and reform."
 STATIC_MODIFIER_NAME_nd_augustan_splendor: "Augustan Splendor"
 STATIC_MODIFIER_DESC_nd_augustan_splendor: "The silver of the Erzgebirge, the porcelain of Meissen, the palaces of Dresden -- Saxony's wealth and magnificence shall make it the envy of every court in Europe."
 nd_sax.1.t: "The Electorate Ascendant"
 nd_sax.1.d: "The Electorate of Saxony stands formed -- second in the Empire only to the Emperor himself. The Wettin dynasty commands the richest mines in Christendom, the greatest trade fairs in Germany, and the constitutional power to shape the future of the Holy Roman Empire.\n\nBut what shall define Saxony's legacy? The Electorate gave birth to the Reformation, where Martin Luther's theses set the world ablaze. Wittenberg and Leipzig are centers of learning where new ideas flourish. Yet Saxony is equally renowned for its material splendor -- the silver mountains, the porcelain works, the baroque magnificence of Augustus the Strong's Dresden.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_sax.1.a: "We are the land of ideas and reformation"
 nd_sax.1.b: "We are the Florence on the Elbe"
 STATIC_MODIFIER_NAME_nd_saxon_schmalkaldic_arms: "Schmalkaldic Arms"
 STATIC_MODIFIER_DESC_nd_saxon_schmalkaldic_arms: "Saxon soldiers march alongside their Protestant brethren, committed to defending the reformed faith by force of arms."
 STATIC_MODIFIER_NAME_nd_saxon_schmalkaldic_diplomacy: "Schmalkaldic Diplomacy"
 STATIC_MODIFIER_DESC_nd_saxon_schmalkaldic_diplomacy: "The Elector of Saxony wields constitutional prestige and diplomatic influence to forge a Protestant consensus, securing the reformed faith through negotiation rather than battle."
 STATIC_MODIFIER_NAME_nd_saxon_golden_dresden: "Golden Dresden"
 STATIC_MODIFIER_DESC_nd_saxon_golden_dresden: "Under the patronage of Augustus the Strong, Dresden has become the 'Florence on the Elbe' -- a city of baroque palaces, world-class collections, and cultural magnificence rivaling any court in Europe."
 STATIC_MODIFIER_NAME_nd_saxon_bergakademie_science: "Bergakademie Science"
 STATIC_MODIFIER_DESC_nd_saxon_bergakademie_science: "The world's first mining university has launched a revolution in applied science, training engineers and geologists whose methods transform industry across the continent."
 nd_sax.2.t: "The Schmalkaldic League"
 nd_sax.2.d: "In February 1531, the Protestant princes of Germany gathered at Schmalkalden in Thuringia. Under the leadership of the Elector of Saxony and the Landgrave of Hesse, they forged a defensive alliance against Emperor Charles V -- pledging 10,000 infantry and 2,000 cavalry for mutual protection.\n\nThe Schmalkaldic League represents the first organized Protestant military force in Europe. As the League's senior member, Saxony must decide how to wield this power."
 nd_sax.2.a: "Rally the Protestant armies under our banner"
 nd_sax.2.b: "Use our electoral prestige for diplomatic defense"
 nd_sax.3.t: "Florence on the Elbe"
 nd_sax.3.d: "Augustus the Strong dreams of transforming Dresden into a city to rival Versailles. The Zwinger Palace rises in baroque splendor, designed by Poppelmann and adorned with Permoser's sculptures. The Green Vault houses one of Europe's most dazzling treasure collections. Court painter Bernardo Bellotto captures the city's skyline in luminous detail.\n\nThe Frauenkirche's stone dome crowns the skyline. The Royal Opera cultivates a musical tradition that draws composers from across Europe. Dresden's golden age has begun."
 nd_sax.3.a: "Let the world marvel at Saxon magnificence"
 nd_sax.4.t: "The Bergakademie"
 nd_sax.4.d: "On 21 November 1765, Prince Francis Xavier of Saxony establishes the Bergakademie Freiberg -- the world's first university of mining and metallurgical sciences. Born from the urgent need to revive the Erzgebirge mines after the devastation of the Seven Years' War, the academy quickly becomes a beacon of practical scientific education.\n\nAbraham Gottlob Werner brings order to the world of minerals. Alexander von Humboldt studies here before his legendary expeditions. Scientists at the academy will go on to discover the chemical elements indium and germanium. The Bergakademie's model is copied from St. Petersburg to Mexico City."
 nd_sax.4.a: "Science shall renew what nature provided"
 nd_sax_erzgebirge_silver: "Erzgebirge Silver"
 nd_sax_erzgebirge_silver_desc: "The Ore Mountains yield their treasures -- silver discovered near Freiberg in 1168 launched a mining rush that would fund Saxon power for centuries."
 nd_sax_freiberger_bergrecht: "Freiberger Bergrecht"
 nd_sax_freiberger_bergrecht_desc: "The Freiberg Mining Code of 1296 established the rights of the 'free miner' and created one of Europe's earliest systematic legal frameworks for resource extraction."
 nd_sax_trade_crossroads: "Trade Crossroads"
 nd_sax_trade_crossroads_desc: "At the intersection of the Via Regia and Via Imperii, Leipzig's markets have drawn merchants since 1165, trading cloth, wine, spices, and metalwork."
 nd_sax_wettin_retainers: "Wettin Retainers"
 nd_sax_wettin_retainers_desc: "The mining communities of the Erzgebirge provide the Wettin court with sturdy militia -- men hardened by the mountain tunnels who fight with the endurance of the stone they cut."
 nd_sax_leipzig_messe: "Leipzig Messe"
 nd_sax_leipzig_messe_desc: "Imperial privileges guarantee the Leipzig trade fairs safe conduct for all merchants -- even those whose rulers are at war with Saxony."
 nd_sax_cranach_werkstatt: "Cranach Werkstatt"
 nd_sax_cranach_werkstatt_desc: "Lucas Cranach the Elder's workshop in Wittenberg produced paintings, woodcuts, and printed materials that shaped the visual language of the Reformation."
 nd_sax_guldengroschen: "Guldengroschen"
 nd_sax_guldengroschen_desc: "The first German Guldengroschen, issued from Saxony in 1500, established the precedent for large silver coinage that would evolve into the Thaler -- and eventually the Dollar."
 nd_sax_wittenberg_university: "Wittenberg University"
 nd_sax_wittenberg_university_desc: "Founded in 1502 by Frederick the Wise, the University of Wittenberg attracted Martin Luther, Philipp Melanchthon, and a generation of reformers who would reshape Christendom."
 nd_sax_schmalkaldic_league: "Schmalkaldic League"
 nd_sax_schmalkaldic_league_desc: "The defensive alliance of Protestant princes, led by Saxony and Hesse, stood as the military shield of the Reformation against Emperor Charles V."
 nd_sax_book_fair: "Leipzig Book Fair"
 nd_sax_book_fair_desc: "Leipzig's annual book fair became the center of the German publishing industry, where printers, booksellers, and scholars gathered to trade in knowledge itself."
 nd_sax_electoral_vicariate: "Electoral Vicariate"
 nd_sax_electoral_vicariate_desc: "As Imperial Vicar, the Elector of Saxony governs in the Emperor's absence -- a constitutional privilege that places Saxony at the heart of Imperial politics."
 nd_sax_schneeberg_rush: "Schneeberg Silver Rush"
 nd_sax_schneeberg_rush_desc: "Rich silver deposits discovered at Schneeberg in 1470 sparked a second mining boom across the Erzgebirge, funding new towns and deeper shafts."
 nd_sax_furstenbund: "Furstenbund"
 nd_sax_furstenbund_desc: "The League of Protestant Princes bound the reformed states of the Empire into a diplomatic bloc, with Saxony's electoral voice lending constitutional weight to the Protestant cause."
 nd_sax_festung_konigstein: "Festung Konigstein"
 nd_sax_festung_konigstein_desc: "The fortress of Konigstein, perched atop a sandstone mesa above the Elbe, has served as the Electorate's most impregnable stronghold since the medieval period."
 nd_sax_albertine_administration: "Albertine Administration"
 nd_sax_albertine_administration_desc: "The Albertine Wettins consolidated control over the Electorate through systematic administrative reform, creating a centralized bureaucracy that enhanced both revenue collection and state efficiency."
 nd_sax_gewandhaus_tradition: "Gewandhaus Tradition"
 nd_sax_gewandhaus_tradition_desc: "The Gewandhaus -- originally the cloth merchants' hall of Leipzig -- became a symbol of Saxon commercial culture where trade in textiles built fortunes and civic institutions."
 nd_sax_augustan_golden_age: "Augustan Golden Age"
 nd_sax_augustan_golden_age_desc: "Under Augustus the Strong, Dresden was transformed into the 'Florence on the Elbe' with the Zwinger Palace, the Frauenkirche, and court cultural institutions that rivaled Versailles."
 nd_sax_porcelain_invention: "Porcelain Invention"
 nd_sax_porcelain_invention_desc: "In 1710, Johann Friedrich Bottger perfected the production of European hard-paste porcelain in Meissen, breaking China's centuries-old monopoly on 'white gold.'"
 nd_sax_kursachsische_garde: "Kursachsische Garde"
 nd_sax_kursachsische_garde_desc: "The Electoral Saxon Guard represents the professional standing army that replaced feudal levies -- disciplined infantry in the latest European fashion."
 nd_sax_gruenes_gewoelbe: "Grunes Gewolbe"
 nd_sax_gruenes_gewoelbe_desc: "The Green Vault of Dresden houses one of the most dazzling treasure collections in Europe -- a display of wealth and craftsmanship that enhances Saxon diplomatic prestige."
 nd_sax_bergakademie_advance: "Bergakademie Freiberg"
 nd_sax_bergakademie_advance_desc: "Founded in 1765, the Bergakademie Freiberg was the world's first university of mining sciences, training engineers who carried Saxon mining expertise across the globe."
 nd_sax_constitutional_reforms: "Constitutional Reforms"
 nd_sax_constitutional_reforms_desc: "The Saxon Constitution of 1831 established representative government, transforming the Electorate from absolutist rule toward a modern constitutional state."
 nd_sax_publishing_capital: "Publishing Capital"
 nd_sax_publishing_capital_desc: "Leipzig's Borsenverein der Deutschen Buchhandler, founded in 1825, formalized the city's role as the publishing capital of the German-speaking world."
 nd_sax_industrial_revolution: "Saxon Industrialization"
 nd_sax_industrial_revolution_desc: "Saxon textile mills and machinery workshops led Germany's industrial revolution, building on centuries of mining expertise and commercial tradition."
 a_nd_sax_bergleute: "Erzgebirge Bergleute"
 a_nd_sax_bergleute_desc: "Mining militia from the Ore Mountains, hardened by their work underground and fighting with the endurance of men who dig through stone."
 a_nd_sax_kurgarde: "Kursachsische Garde"
 a_nd_sax_kurgarde_desc: "The Electoral Saxon Guard -- disciplined professional infantry of the standing army, trained in the latest tactical doctrines."
 levy_nd_sax_bergleute: "Erzgebirge Bergleute"
 levy_nd_sax_bergleute_desc: "Mining communities of the Ore Mountains provide sturdy militia for the defense of the Electorate."
 nd_sax_silberbergwerk: "Silberbergwerk"
 nd_sax_silberbergwerk_desc: "A Saxon silver mine in the Erzgebirge, extracting the precious ore that has funded the Wettin dynasty since the 12th century."
 nd_sax_messehaus: "Messehaus"
 nd_sax_messehaus_desc: "A Leipzig trade fair hall where merchants from across Europe gather under imperial safe conduct guarantees to exchange goods and forge commercial ties."
 nd_sax_werkstatt: "Cranach Werkstatt"
 nd_sax_werkstatt_desc: "An artistic workshop in the tradition of Lucas Cranach the Elder, producing fine prints, woodcuts, and illuminated materials that spread Saxon culture."
 nd_sax_druckhaus: "Druckhaus"
 nd_sax_druckhaus_desc: "A Saxon printing house producing books, pamphlets, and scholarly works -- the engines of the Reformation and the German Enlightenment."
 nd_sax_hofkapelle: "Hofkapelle"
 nd_sax_hofkapelle_desc: "The court chapel and music ensemble of Dresden, a cultural institution that drew composers and musicians from across Europe to perform under Saxon patronage."
 nd_sax_porzellanmanufaktur: "Porzellanmanufaktur"
 nd_sax_porzellanmanufaktur_desc: "A porcelain factory producing Meissen-style hard-paste porcelain -- Europe's answer to Chinese 'white gold,' bearing the famous crossed swords mark."
 nd_sax_bergakademie: "Bergakademie"
 nd_sax_bergakademie_desc: "A mining academy following the Freiberg model, training engineers and metallurgists in the scientific methods that transformed the mining industry."
 nd_sax_basic_mining: "Basic Mining"
 nd_sax_basic_mining_desc: "Traditional shaft mining with timber supports and iron tools, following methods established by the Freiberger Bergrecht."
 nd_sax_deep_shaft_mining: "Deep Shaft Mining"
 nd_sax_deep_shaft_mining_desc: "Advanced techniques for exploiting deeper silver veins, using improved pumps, ventilation, and iron-reinforced tunnel supports."
 nd_sax_fair_trade: "Fair Trade Goods"
 nd_sax_fair_trade_desc: "The Leipzig fairs draw merchants trading cloth, livestock, and wine from across the continent."
 nd_sax_saxon_weaving: "Saxon Weaving"
 nd_sax_saxon_weaving_desc: "The Gewandhaus tradition of fine textile production, transforming raw cloth and dyes into luxury fabrics sought across Europe."
 nd_sax_fine_printing: "Fine Printing"
 nd_sax_fine_printing_desc: "Artistic printing in the Cranach tradition -- woodcuts, engravings, and illuminated works bound into scholarly and devotional volumes."
 nd_sax_book_printing: "Book Printing"
 nd_sax_book_printing_desc: "Leipzig's printing houses produce scholarly works, religious texts, and literary volumes for the German-speaking world."
 nd_sax_industrial_printing: "Industrial Printing"
 nd_sax_industrial_printing_desc: "Steam-powered presses and industrial paper mills transform Leipzig into the mass publishing center of the German Enlightenment."
 nd_sax_court_music: "Court Music"
 nd_sax_court_music_desc: "The Hofkapelle maintains a full complement of musicians, instruments, and performance spaces under royal patronage."
 nd_sax_porcelain_production: "Meissen Porcelain"
 nd_sax_porcelain_production_desc: "The secret art of European hard-paste porcelain production, combining kaolin clay with precise kiln techniques perfected at Meissen."
 nd_sax_mining_research: "Mining Research"
 nd_sax_mining_research_desc: "Scholarly investigation into geology, metallurgy, and engineering -- the academic disciplines that emerged from Saxon mining tradition."
 nd_sax_formed_tt: "Saxony has been formed"
 nd_sax_path_a_tt: "Chose Land of Reformation"
 nd_sax_path_b_tt: "Chose Florence on the Elbe"
 nd_sax_destiny: "Saxon Destiny"
 nd_sax_destiny_desc: "Saxony stands formed -- Electorate and great power. The path ahead is ours to choose: the life of the mind or the splendor of the court."
 nd_sax_dest_reformation_cradle: "Cradle of the Reformation"
 nd_sax_dest_reformation_cradle_desc: "Secure Wittenberg, the city where Luther's theses changed the world, and build institutions worthy of a nation of learning."
 nd_sax_dest_printing_revolution: "The Printing Revolution"
 nd_sax_dest_printing_revolution_desc: "Saxon presses have reshaped the intellectual landscape of Europe. Develop the nation's prosperity and embrace the transformative power of the printed word."
 nd_sax_dest_enlightened_saxony: "Enlightened Saxony"
 nd_sax_dest_enlightened_saxony_desc: "From Wittenberg to Strasbourg, Saxon ideas and Saxon institutions illuminate the continent. Embrace the Scientific Revolution and establish Saxony as Europe's intellectual capital."
 nd_sax_dest_bohemian_claim: "The Bohemian Claim"
 nd_sax_dest_bohemian_claim_desc: "The Wettin dynasty eyes the Bohemian crown. Take Prague and demonstrate that Saxon arms are as formidable as Saxon silver."
 nd_sax_dest_northern_hegemony: "Northern Hegemony"
 nd_sax_dest_northern_hegemony_desc: "From the Hanseatic ports of Lubeck to the Hohenzollern seat of Berlin, Saxon dominion must stretch across northern Germany."
 nd_sax_dest_european_splendor: "European Splendor"
 nd_sax_dest_european_splendor_desc: "With Nuremberg secured and the treasury overflowing, Saxony can build a court to rival Versailles -- a true Florence on the Elbe."
 nd_sax.5.t: "The Electoral Destiny"
 nd_sax.5.d: "The Electorate of Saxony is formed, and with it comes a question that will define our nation for centuries. The silver mountains fund our ambitions, the trade fairs draw merchants from across the continent, and the constitutional authority of the electoral vote gives us a voice that resonates throughout the Empire.\n\nNow we must decide what kind of Saxony we shall build."
 nd_sax.5.a: "Our destiny awaits"
 nd_sax.6.t: "Luther's City is Ours"
 nd_sax.6.d: "Wittenberg, where Martin Luther nailed his Ninety-Five Theses to the door of the Castle Church, now flies the Saxon banner. The university that educated Melanchthon and a generation of reformers is ours to nurture. The printing presses that spread Luther's words across Christendom are ours to direct.\n\nThis is more than a city. It is the birthplace of a revolution in human thought, and Saxony shall be its guardian."
 nd_sax.6.a: "The Reformation begins and ends in Saxony"
 nd_sax.7.t: "The Power of the Press"
 nd_sax.7.d: "Saxon printing houses now dominate the German book trade. From Leipzig's fair halls to Wittenberg's university presses, the written word flows outward in an unstoppable current. Pamphlets, treatises, and scholarly works carry Saxon ideas to every corner of Europe.\n\nBut the press is a tool that can be wielded in different ways. Shall we use it to advance our diplomatic position, building networks of information and influence? Or shall we focus on building academic institutions that draw scholars from across the continent?"
 nd_sax.7.a: "Deploy the press as an instrument of state"
 nd_sax.7.b: "Build a network of academies and scholars"
 nd_sax.8.t: "The Saxon Enlightenment"
 nd_sax.8.d: "From the Bergakademie in Freiberg to the university at Wittenberg, from Strasbourg's presses to Leipzig's book fairs -- Saxon institutions have become the beating heart of European intellectual life. The Scientific Revolution has transformed how humanity understands the natural world, and Saxon scholars stand at its forefront.\n\nThis is the culmination of centuries of investment in ideas. How shall Saxony employ its intellectual supremacy?"
 nd_sax.8.a: "Apply science to the art of governance"
 nd_sax.8.b: "Foster a republic of letters across borders"
 nd_sax.9.t: "The Crown of Bohemia"
 nd_sax.9.d: "Prague, the golden city on the Vltava, has fallen to Saxon arms. The Bohemian crown -- coveted by Habsburgs, Luxembourgs, and Jagellions alike -- now adorns a Wettin brow. With Bohemia's wealth and manpower added to Saxon silver, we command resources that few in the Empire can match.\n\nThe road to German hegemony runs through conquered capitals. Prague is only the beginning."
 nd_sax.9.a: "Bohemia bends to the Wettin will"
 nd_sax.10.t: "Dominion Over the North"
 nd_sax.10.d: "The Hanseatic jewel of Lubeck and the Hohenzollern stronghold of Berlin both answer to Saxon authority. From the Baltic coast to the heart of Brandenburg, northern Germany has been brought under our control. Trade routes that once enriched our rivals now fill Saxon coffers.\n\nHow shall we consolidate this vast new dominion?"
 nd_sax.10.a: "March our armies through the conquered cities"
 nd_sax.10.b: "Establish Saxon administrative authority"
 nd_sax.11.t: "The Florence on the Elbe"
 nd_sax.11.d: "The dream of Augustus the Strong is realized. Dresden's baroque palaces rival Versailles, Meissen porcelain graces the tables of every European court, and the Green Vault's treasures dazzle foreign ambassadors. With Nuremberg's wealth secured and Saxon dominion stretching across Germany, we have built something that will endure for centuries.\n\nShall our legacy be remembered for its cultural magnificence or for the military power that made it possible?"
 nd_sax.11.a: "Let the world marvel at our magnificence"
 nd_sax.11.b: "Forge a Saxon empire in iron and silver"
 STATIC_MODIFIER_NAME_nd_sax_dest_reformation_press: "Reformation Press"
 STATIC_MODIFIER_DESC_nd_sax_dest_reformation_press: "Saxon printing houses serve as instruments of state policy, spreading ideas that undermine rivals and build diplomatic leverage through the power of information."
 STATIC_MODIFIER_NAME_nd_sax_dest_academic_network: "Academic Network"
 STATIC_MODIFIER_DESC_nd_sax_dest_academic_network: "A web of Saxon-funded academies and scholarly exchanges draws intellectuals from across Europe, building soft power through the prestige of learning."
 STATIC_MODIFIER_NAME_nd_sax_dest_scientific_statecraft: "Scientific Statecraft"
 STATIC_MODIFIER_DESC_nd_sax_dest_scientific_statecraft: "Enlightenment principles applied to governance produce a rationalized state apparatus -- efficient, systematic, and ruthlessly effective."
 STATIC_MODIFIER_NAME_nd_sax_dest_republic_of_letters: "Republic of Letters"
 STATIC_MODIFIER_DESC_nd_sax_dest_republic_of_letters: "Saxon scholars correspond with intellectuals across every border, building a transnational network of knowledge that transcends the petty squabbles of dynasties."
 STATIC_MODIFIER_NAME_nd_sax_dest_hanseatic_conquest: "Hanseatic Conquest"
 STATIC_MODIFIER_DESC_nd_sax_dest_hanseatic_conquest: "Saxon armies have seized the great Hanseatic trade cities, and mercenary captains flock to serve a patron who pays in Erzgebirge silver."
 STATIC_MODIFIER_NAME_nd_sax_dest_saxon_dominion: "Saxon Dominion"
 STATIC_MODIFIER_DESC_nd_sax_dest_saxon_dominion: "From Prague to Berlin, Saxon authority is enforced by disciplined garrisons and swift-striking assault forces that crush resistance before it can organize."
 STATIC_MODIFIER_NAME_nd_sax_dest_baroque_magnificence: "Baroque Magnificence"
 STATIC_MODIFIER_DESC_nd_sax_dest_baroque_magnificence: "The baroque splendor of Saxon palaces, collections, and court life makes Dresden the cultural capital of the German-speaking world -- though such magnificence does not come cheap."
 STATIC_MODIFIER_NAME_nd_sax_dest_saxon_imperium: "Saxon Imperium"
 STATIC_MODIFIER_DESC_nd_sax_dest_saxon_imperium: "A military-economic empire built on cavalry, mercenaries, and the vast revenues of conquered German territories."
 nd_sax_aufklarungsschule: "Aufklarungsschule"
 nd_sax_aufklarungsschule_desc: "A Saxon Enlightenment academy dedicated to the advancement of natural philosophy, applied science, and rational governance -- the institutional embodiment of the Saxon intellectual tradition."
 nd_sax_enlightenment_curriculum: "Enlightenment Curriculum"
 nd_sax_enlightenment_curriculum_desc: "A comprehensive program of instruction in natural philosophy, mathematics, and the applied sciences, maintained through the constant production of scholarly materials."
 nd_sax_dresdner_schloss: "Dresdner Schloss"
 nd_sax_dresdner_schloss_desc: "The grand palace of the Saxon Electors, rebuilt in baroque magnificence to house the Green Vault, the royal art collections, and the most dazzling court in Germany."
 nd_sax_palace_maintenance: "Palace Maintenance"
 nd_sax_palace_maintenance_desc: "The upkeep of the Dresdner Schloss demands a constant supply of fine textiles, furniture, porcelain, and candles to maintain its legendary splendor."
