l_english:
 STATIC_MODIFIER_NAME_nd_tenka_fubu: "Tenka Fubu"
 STATIC_MODIFIER_DESC_nd_tenka_fubu: "The realm under one sword. From the ashes of the Sengoku Jidai rises a Japan united by military supremacy, where the strongest clan has imposed order through force of arms and the mastery of combined infantry and firearms tactics."
 STATIC_MODIFIER_NAME_nd_pax_tokugawa: "Pax Tokugawa"
 STATIC_MODIFIER_DESC_nd_pax_tokugawa: "The long peace. With the warring states subdued, Japan turns inward to cultivate its domains. Rice paddies expand, castle towns flourish, and the merchant class grows prosperous under the stable order of centralized rule."
 STATIC_MODIFIER_NAME_nd_land_of_rising_sun: "Land of the Rising Sun"
 STATIC_MODIFIER_DESC_nd_land_of_rising_sun: "A civilization apart. United Japan asserts its unique cultural identity — the perfection of the tea ceremony, the refinement of bushido, and the flowering of arts that will define Japanese civilization for centuries."
 nd_jap.1.t: "The Sengoku Ends"
 nd_jap.1.d: "The last embers of the Sengoku Jidai have been extinguished. Across the provinces of Japan, the banners of rival clans no longer fly in defiance — they have been torn down, burned, or pledged anew to the victorious house. The emperor sits in Kyoto as he always has, but real power now flows from one source alone.\n\nThe unifier faces a choice that will shape generations. The methods of conquest — massed ashigaru, castle sieges, the ruthless subjugation of rivals — can be turned outward, building Japan into a military power that dominates East Asia. Or the sword can be sheathed, the energies of the nation redirected toward internal development, peace, and the prosperity that comes from two centuries without war. Or perhaps the moment calls for something higher: the elevation of Japanese civilization itself, a cultural flowering that makes the islands the envy of the known world.\n\nWhich path shall define the new Japan?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_jap.1.a: "Tenka Fubu — the realm under one sword."
 nd_jap.1.b: "Seek the Pax Tokugawa — prosperity through peace."
 nd_jap.1.c: "We are the Land of the Rising Sun — let our culture shine."
 STATIC_MODIFIER_NAME_nd_jap_sword_hunt_decree: "Katanagari Decree"
 STATIC_MODIFIER_DESC_nd_jap_sword_hunt_decree: "The great sword hunt has stripped the peasantry of their weapons, consolidating the instruments of violence in the hands of the samurai class alone. Order is restored, and rebellion grows far less likely."
 nd_jap.2.t: "The Great Sword Hunt"
 nd_jap.2.d: "In the aftermath of unification, an edict is proclaimed across every province: all swords, short swords, bows, and firearms in the hands of the common people are to be confiscated. The official reason given is that the metal will be melted down to forge nails and bolts for a great statue of the Buddha — a pious fiction that few believe but all obey.\n\nThe true purpose is unmistakable. By disarming the peasantry, the new order draws an uncrossable line between the warrior class and everyone else. Never again will farmers take up arms in ikki uprisings or rally behind ambitious local lords. The sword hunt transforms Japan's social order as profoundly as any battle — establishing a monopoly on violence that will endure for centuries."
 nd_jap.2.a: "Let the swords be gathered."
 nd_jap.3.t: "Sankin-Kotai Proclaimed"
 nd_jap.3.d: "A masterful instrument of control has been devised: the system of alternate attendance. Every daimyo in Japan must now maintain residences in both Edo and their home domain, traveling between them on a fixed schedule. Their wives and children remain in Edo permanently — honored guests who happen to be hostages.\n\nThe financial burden is staggering. The processions of each daimyo — hundreds or thousands of retainers, all in full ceremonial dress — must travel the great roads at enormous expense. Lodgings, gifts, and the maintenance of grand Edo mansions drain domain treasuries. What gold might have been spent on armies and fortifications instead flows into roads, inns, and the coffers of Edo merchants.\n\nIt is, perhaps, the most elegant system of political control ever devised. The daimyo are kept loyal not by the threat of force, but by the steady hemorrhage of their wealth."
 nd_jap.3.a: "A system worthy of admiration."
 nd_jap.4.t: "The Genroku Renaissance"
 nd_jap.4.d: "Under the long peace, Japanese culture has reached unprecedented heights. In Edo, Osaka, and Kyoto, the merchant class patronizes arts that would have been unimaginable during the chaos of the Sengoku. Kabuki theater draws packed audiences, the haiku reaches its perfection in the verses of the wandering poets, and woodblock prints capture the floating world of pleasure quarters and natural beauty.\n\nThe tea ceremony has evolved from a simple ritual into an elaborate philosophy of aesthetics. Ceramic arts produce wares sought by collectors across East Asia. The puppet theater of bunraku achieves a dramatic sophistication that rivals any stage in the world. Even the martial arts, freed from the urgency of actual warfare, are refined into formalized schools of swordsmanship and archery.\n\nThis is the paradox of the Tokugawa peace: a warrior society that, forbidden from fighting, channels its energies into creating one of the most refined civilizations in human history."
 nd_jap.4.a: "Let a thousand flowers bloom."
 STATIC_MODIFIER_NAME_nd_jap_sakoku_consolidation: "Sakoku Consolidation"
 STATIC_MODIFIER_DESC_nd_jap_sakoku_consolidation: "With foreign influence carefully controlled, Japan turns inward. The stability of isolation allows domestic institutions to mature without outside disruption."
 STATIC_MODIFIER_NAME_nd_jap_sakoku_rangaku: "Rangaku Window"
 STATIC_MODIFIER_DESC_nd_jap_sakoku_rangaku: "Through the tiny window of Dejima, Dutch learning seeps into Japan. Medical texts, astronomical charts, and natural philosophy filter through the handful of interpreters who speak the language of the red-haired barbarians."
 nd_jap.5.t: "Sakoku — The Closed Country"
 nd_jap.5.d: "The edicts have been proclaimed: Japan shall close its doors to the world. Portuguese missionaries are expelled. Spanish traders are banned. The English factory at Hirado is shuttered. Only the Dutch and Chinese are permitted to trade, and only at the tiny artificial island of Dejima in Nagasaki harbor, under the strictest supervision.\n\nJapanese subjects are forbidden from traveling abroad on pain of death. Those already overseas may never return. The great ocean-going ships are ordered destroyed, replaced by coastal vessels too small to cross open water.\n\nYet the closure is not absolute. Through Dejima, a trickle of Western knowledge continues to flow — books on medicine, astronomy, and military science that a small circle of scholars study as rangaku, Dutch learning. The question is whether Japan will use this isolation to perfect its own civilization, or whether it will fall behind the Western powers that even now are exploring the globe."
 nd_jap.5.a: "Seal the borders — our civilization needs no outside influence."
 nd_jap.5.b: "Maintain the Dutch window — knowledge knows no borders."
 nd_jap.6.t: "Rangaku — Dutch Learning"
 nd_jap.6.d: "For generations, a small cadre of scholars in Nagasaki has pored over Dutch texts, laboriously translating works on anatomy, astronomy, botany, and military science. What began as idle curiosity has grown into a serious intellectual movement.\n\nThe breakthrough came with the translation of a Dutch anatomy text, when Japanese physicians discovered that their traditional Chinese medical charts were riddled with errors, while the Western diagrams matched what they actually observed in dissections. The implications were profound: the barbarians, for all their crude manners, possessed genuine knowledge that Japan lacked.\n\nNow rangaku schools proliferate across the country. Domain lords sponsor scholars to study Western gunnery and fortification. Physicians adopt Western surgical techniques. Astronomers correct centuries of accumulated error. A quiet revolution in knowledge is underway — one that will prepare Japan for the shock of forced opening that lies ahead."
 nd_jap.6.a: "Knowledge is the greatest weapon."
 STATIC_MODIFIER_NAME_nd_jap_restoration_imperial: "Imperial Restoration"
 STATIC_MODIFIER_DESC_nd_jap_restoration_imperial: "The emperor has been restored as the true sovereign of Japan. Legitimacy flows once more from the Chrysanthemum Throne, and the centralized state draws strength from this ancient source of authority."
 STATIC_MODIFIER_NAME_nd_jap_restoration_modernize: "Bunmei Kaika"
 STATIC_MODIFIER_DESC_nd_jap_restoration_modernize: "Civilization and enlightenment! Japan casts aside the old constraints and embraces wholesale modernization — Western science, industry, and institutions are adopted with breathtaking speed."
 nd_jap.7.t: "Fukoku Kyohei"
 nd_jap.7.d: "Enrich the country, strengthen the military — the slogan echoes across Japan as a new era dawns. The old order is crumbling, whether from internal pressure or the threat of foreign gunboats matters less than the response. Japan must transform itself or be consumed.\n\nTwo visions compete. The first looks to the Chrysanthemum Throne — the emperor, sidelined for centuries by the shogunate, can serve as the unifying symbol of a centralized modern state. Imperial restoration would concentrate authority, sweep away the fragmented domain system, and channel national energies under a single sovereign will.\n\nThe second vision looks westward. What Japan needs is not merely new leadership but new knowledge — the sciences, industries, and institutions that have made the Western powers dominant. Send students abroad. Hire foreign advisors. Build railroads and telegraph lines. The nation that modernizes fastest survives.\n\nPerhaps both paths lead to the same destination. But the emphasis chosen now will shape Japan's character for generations."
 nd_jap.7.a: "Restore the Emperor — Sonno Joi!"
 nd_jap.7.b: "Seek civilization and enlightenment — Bunmei Kaika!"
 nd_jap_za_merchant_guilds: "Za Merchant Guilds"
 nd_jap_za_merchant_guilds_desc: "The establishment of za — monopolistic merchant guilds operating under the patronage of temples, shrines, and noble houses during the Muromachi era."
 nd_jap_tachi_forging: "Tachi Forging"
 nd_jap_tachi_forging_desc: "The art of forging the tachi — the long curved sword of the mounted samurai, predecessor to the katana and symbol of the warrior class."
 nd_jap_shoen_estates: "Shoen Estates"
 nd_jap_shoen_estates_desc: "The system of private estates held by aristocrats, temples, and warrior houses that forms the economic foundation of medieval Japan."
 nd_jap_shugo_administration: "Shugo Administration"
 nd_jap_shugo_administration_desc: "The appointment of military governors — shugo — to administer provinces on behalf of the shogunate, establishing a framework for centralized control."
 nd_jap_wokou_traditions: "Wokou Traditions"
 nd_jap_wokou_traditions_desc: "The maritime raiding traditions of the wokou pirates who terrorized the coasts of Korea and China, forging Japan's earliest naval capabilities."
 nd_jap_nanbokucho_legacy: "Nanbokucho Legacy"
 nd_jap_nanbokucho_legacy_desc: "The enduring legacy of the Northern and Southern Courts period — a divided era that nonetheless established the legitimacy of imperial succession and the political structures that would shape Japan."
 nd_jap_muromachi_culture: "Muromachi Culture"
 nd_jap_muromachi_culture_desc: "The flourishing of Zen-influenced arts under the Ashikaga shoguns: ink painting, Noh theater, the tea ceremony, and the dry landscape gardens that define Japanese aesthetics."
 nd_jap_yari_ashigaru: "Yari Ashigaru"
 nd_jap_yari_ashigaru_desc: "The organization of peasant foot soldiers into disciplined formations armed with long yari spears, transforming warfare from individual samurai combat to mass infantry tactics."
 nd_jap_za_expansion: "Za Expansion"
 nd_jap_za_expansion_desc: "The growth of merchant guilds beyond their temple patrons, developing independent monopolistic control over production, transport, and sale of key commodities."
 nd_jap_yamashiro_fortification: "Yamashiro Fortification"
 nd_jap_yamashiro_fortification_desc: "The construction of mountain fortresses — yamashiro — that exploit Japan's rugged terrain to create nearly impregnable defensive positions."
 nd_jap_tally_trade: "Tally Trade"
 nd_jap_tally_trade_desc: "The system of regulated maritime trade with Ming China using official tally certificates, establishing Japan's position in the East Asian trading network."
 nd_jap_sohei_tradition: "Sohei Traditions"
 nd_jap_sohei_tradition_desc: "The warrior monk tradition of the great Buddhist monasteries — fearsome fighters who wield the naginata in defense of their temples and the faith."
 nd_jap_tanegashima_firearms: "Tanegashima Firearms"
 nd_jap_tanegashima_firearms_desc: "The adoption of Portuguese matchlock rifles — tanegashima — and their rapid mass production by Japanese smiths, forever changing the nature of Japanese warfare."
 nd_jap_nanban_trade: "Nanban Trade"
 nd_jap_nanban_trade_desc: "Trade with the 'southern barbarians' — Portuguese and Spanish merchants who bring firearms, Christianity, and exotic goods to Japan's shores."
 nd_jap_castle_revolution: "Castle Revolution"
 nd_jap_castle_revolution_desc: "The transformation from mountain fortresses to lowland castles with massive stone walls, wide moats, and towering keeps — the architectural signature of the Sengoku era."
 nd_jap_sekibune_patrol: "Sekibune Patrol Fleet"
 nd_jap_sekibune_patrol_desc: "Fast coastal patrol vessels that guard Japan's extensive coastline against pirates, smugglers, and foreign intruders."
 nd_jap_ikko_ikki_suppression: "Ikko-Ikki Suppression"
 nd_jap_ikko_ikki_suppression_desc: "The systematic crushing of the militant Ikko-ikki Buddhist uprisings, ending the era of religiously motivated peasant rebellions and consolidating secular authority."
 nd_jap_daiku_tradition: "Daiku Tradition"
 nd_jap_daiku_tradition_desc: "The master carpenter tradition — daiku — whose skills in joinery, castle construction, and temple building represent some of the finest woodworking in the world."
 nd_jap_tamahagane_smithing: "Tamahagane Smithing"
 nd_jap_tamahagane_smithing_desc: "The art of smelting iron sand in the tatara furnace to produce tamahagane — the jewel steel from which Japanese blades are forged."
 nd_jap_sword_hunt: "The Sword Hunt"
 nd_jap_sword_hunt_desc: "The katanagari — the systematic confiscation of weapons from the peasantry to consolidate the samurai monopoly on violence."
 nd_jap_kenchi_land_survey: "Kenchi Land Survey"
 nd_jap_kenchi_land_survey_desc: "Comprehensive cadastral surveys that measure every rice paddy and field, establishing a rational basis for taxation and domain administration."
 nd_jap_atakebune_warship: "Atakebune Warships"
 nd_jap_atakebune_warship_desc: "Massive oar-driven warships with wooden armor plating, the floating fortresses that dominate Japanese coastal waters."
 nd_jap_korea_invasion: "Korean Campaigns"
 nd_jap_korea_invasion_desc: "The large-scale military expeditions to the Korean peninsula — ambitious campaigns that tested Japan's unified military might against continental powers."
 nd_jap_christian_expulsion: "Christian Expulsion"
 nd_jap_christian_expulsion_desc: "The systematic persecution and expulsion of Christian missionaries and converts, asserting Japanese religious sovereignty and eliminating a perceived threat to social order."
 nd_jap_sankin_kotai: "Sankin-Kotai"
 nd_jap_sankin_kotai_desc: "The system of alternate attendance, requiring daimyo to maintain residences in Edo and travel there regularly — draining their treasuries while enriching the capital."
 nd_jap_controlled_trade: "Controlled Trade"
 nd_jap_controlled_trade_desc: "The restriction of foreign trade to designated ports under strict government supervision, maintaining sovereignty while preserving access to essential goods."
 nd_jap_hatamoto_guard: "Hatamoto Guard"
 nd_jap_hatamoto_guard_desc: "The direct retainers of the shogun — elite warriors who form the professional core of the Tokugawa military establishment."
 nd_jap_genroku_culture: "Genroku Culture"
 nd_jap_genroku_culture_desc: "The golden age of Edo-period arts: kabuki theater, haiku poetry, ukiyo-e woodblock prints, and the refined aesthetics of the tea ceremony."
 nd_jap_temple_schools: "Temple Schools"
 nd_jap_temple_schools_desc: "Terakoya — community schools run by Buddhist temples and retired samurai that teach reading, writing, and arithmetic to commoner children."
 nd_jap_machi_bugyou: "Machi Bugyou"
 nd_jap_machi_bugyou_desc: "The town magistrate system — efficient urban administrators who maintain order, settle disputes, and manage the bustling commercial life of Japan's great cities."
 nd_jap_rangaku_studies: "Rangaku Studies"
 nd_jap_rangaku_studies_desc: "The systematic study of Western science and technology through Dutch texts, laying the intellectual groundwork for Japan's future modernization."
 nd_jap_kaibogaku_defense: "Kaibogaku Defense"
 nd_jap_kaibogaku_defense_desc: "Coastal defense studies combining traditional fortification with Western military science, preparing Japan against the threat of foreign naval power."
 nd_jap_han_reforms: "Han Reforms"
 nd_jap_han_reforms_desc: "Administrative modernization of the domain system — rationalized taxation, bureaucratic efficiency, and fiscal reform led by progressive daimyo."
 nd_jap_proto_industry: "Proto-Industrialization"
 nd_jap_proto_industry_desc: "The emergence of cottage industries, sake breweries, and textile workshops that begin to transform Japan's economy from pure agriculture toward manufacturing."
 nd_jap_fukoku_kyohei: "Fukoku Kyohei"
 nd_jap_fukoku_kyohei_desc: "Enrich the country, strengthen the military — the rallying cry of Japan's modernizers who seek to build a nation capable of standing among the great powers."
 nd_jap_meiji_precursors: "Meiji Precursors"
 nd_jap_meiji_precursors_desc: "The intellectual and political movements that foreshadow the Meiji Restoration — calls for imperial rule, Western learning, and the transformation of Japan into a centralized modern state."
 n_nd_jap_kobaya: "Kobaya"
 n_nd_jap_kobaya_desc: "Fast raiding vessels used by the wokou pirates — light, agile craft built for speed in coastal waters and quick strikes against merchant shipping."
 a_nd_jap_yari_ashigaru: "Yari Ashigaru"
 a_nd_jap_yari_ashigaru_desc: "Peasant foot soldiers armed with long yari spears, fighting in disciplined phalanx formations. What they lack in martial training, they compensate with mass and reach."
 a_nd_jap_sohei: "Sohei"
 a_nd_jap_sohei_desc: "Buddhist warrior monks who fight with the fanaticism of the devout. Armed with naginata polearms and hardened by ascetic practice, they are fearsome on the battlefield."
 a_nd_jap_ashigaru_teppo: "Ashigaru Teppo"
 a_nd_jap_ashigaru_teppo_desc: "Massed peasant infantry armed with tanegashima matchlock rifles. What they lack in individual martial skill, they make up in devastating volley fire that can shatter even the finest samurai charge."
 n_nd_jap_sekibune: "Sekibune"
 n_nd_jap_sekibune_desc: "Fast patrol craft built for speed and maneuverability in the coastal waters of Japan. Ideal for hunting pirates and intercepting smugglers."
 n_nd_jap_atakebune: "Atakebune"
 n_nd_jap_atakebune_desc: "Massive floating fortresses powered by banks of oars, clad in wooden armor plating. These ironclad predecessors dominate coastal waters with their heavy armament and near-impervious hulls."
 a_nd_jap_hatamoto: "Hatamoto"
 a_nd_jap_hatamoto_desc: "The banner-men — direct retainers of the shogun, drawn from the most loyal warrior families. These elite soldiers combine the discipline of professional troops with the martial traditions of the samurai class."
 levy_nd_jap_sohei: "Sohei Levy"
 levy_nd_jap_sohei_desc: "Buddhist warrior monks raised from temple communities to fight with the fanaticism of the devout, armed with naginata polearms."
 levy_nd_jap_yari_ashigaru: "Yari Ashigaru Levy"
 levy_nd_jap_yari_ashigaru_desc: "Peasant spearmen mustered from farming communities and garrison soldiers, armed with long yari spears and fighting in massed formations."
 nd_jap_za_guild_hall: "Za Guild Hall"
 nd_jap_za_guild_hall_desc: "The headquarters of a za merchant guild, where trade monopolies are managed, goods are stored, and fees are collected from members operating under the guild's protection."
 nd_jap_zen_garden: "Zen Garden"
 nd_jap_zen_garden_desc: "A contemplative garden of raked gravel, carefully placed stones, and meditative spaces attached to a Zen temple complex. A place of artistic refinement and spiritual calm."
 nd_jap_yamashiro: "Yamashiro"
 nd_jap_yamashiro_desc: "A mountain fortress exploiting Japan's rugged terrain — narrow approaches, steep slopes, and fortified baileys that make assault nearly suicidal for attacking forces."
 nd_jap_jokamachi: "Jokamachi"
 nd_jap_jokamachi_desc: "A castle town — the administrative and commercial heart of a domain. Beneath the walls of the lord's fortress, merchants, artisans, and samurai retainers create a thriving urban center."
 nd_jap_tamahagane_forge: "Tamahagane Forge"
 nd_jap_tamahagane_forge_desc: "A traditional tatara furnace where iron sand is smelted into tamahagane — the high-carbon steel from which Japan's legendary blades and armor are forged."
 nd_jap_dejima: "Dejima Trading Post"
 nd_jap_dejima_desc: "A controlled foreign trading outpost where Dutch and Chinese merchants may conduct business under strict government supervision. A tiny window to the outside world."
 nd_jap_terakoya: "Terakoya"
 nd_jap_terakoya_desc: "A temple school where Buddhist monks and retired scholars teach reading, writing, and arithmetic to the children of commoners. The foundation of Japan's remarkably high literacy rate."
 nd_jap_daiba_battery: "Daiba Battery"
 nd_jap_daiba_battery_desc: "A Western-style coastal artillery emplacement built to defend harbors against foreign warships. Combining imported cannon with traditional fortification expertise."
 nd_jap_tachi_smithing: "Tachi Smithing"
 nd_jap_tachi_smithing_desc: "The production of tachi swords — long curved blades forged by master smiths using traditional techniques passed down through generations."
 nd_jap_sake_brewing: "Sake Brewing"
 nd_jap_sake_brewing_desc: "Traditional rice wine production, a cornerstone of Japanese culture and economy."
 nd_jap_lacquerware: "Urushi Lacquerware"
 nd_jap_lacquerware_desc: "The production of lacquered goods — bowls, boxes, and furnishings coated in refined tree sap that produces a lustrous, durable finish prized across East Asia."
 nd_jap_textile_weaving: "Textile Weaving"
 nd_jap_textile_weaving_desc: "Proto-industrial silk and cotton weaving workshops that represent Japan's transition from agrarian economy toward manufacturing."
 nd_jap_za_guild_hall_maintenance: "Guild Maintenance"
 nd_jap_za_guild_hall_maintenance_desc: "Operating costs of a za merchant guild — silk for trade samples, paper for ledgers and correspondence, and pottery for display and exchange."
 nd_jap_zen_garden_maintenance: "Garden Upkeep"
 nd_jap_zen_garden_maintenance_desc: "Maintaining the stone arrangements and gravel patterns of a Zen contemplative garden, with candles and calligraphic materials for meditation and ceremony."
 nd_jap_yamashiro_maintenance: "Fortress Upkeep"
 nd_jap_yamashiro_maintenance_desc: "Maintaining the wooden palisades, stone walls, and garrison armaments of a mountain fortress."
 nd_jap_jokamachi_maintenance: "Castle Town Upkeep"
 nd_jap_jokamachi_maintenance_desc: "Maintaining the stone walls, administrative offices, and records of a castle town."
 nd_jap_forge_maintenance: "Forge Operations"
 nd_jap_forge_maintenance_desc: "Smelting iron sand in a traditional tatara furnace to produce tamahagane steel."
 nd_jap_dejima_maintenance: "Trading Post Upkeep"
 nd_jap_dejima_maintenance_desc: "Managing the controlled exchange of silk, porcelain, and foreign goods at a trading post, with trade ledgers and documentation for customs oversight."
 nd_jap_terakoya_maintenance: "Temple School Upkeep"
 nd_jap_terakoya_maintenance_desc: "Providing paper, candles, and teaching texts for a parish temple school where monks educate commoner children in reading and writing."
 nd_jap_daiba_maintenance: "Battery Upkeep"
 nd_jap_daiba_maintenance_desc: "Maintaining coastal artillery, powder stores, stone fortifications, and repair tools at a harbor defense battery."
 nd_jap_formed_tt: "Japan has been formed"
 nd_jap_path_a_tt: "Chose Tenka Fubu"
 nd_jap_path_b_tt: "Chose Pax Tokugawa"
 nd_jap_path_c_tt: "Chose Land of the Rising Sun"
 nd_jap_destiny: "The Destiny of Japan"
 nd_jap_destiny_desc: "Japan stands unified for the first time in generations. The garrisons are strengthened, the domains consolidated. Now the question is: what will this new Japan become?"
 nd_jap_dest_northern_pacification: "Northern Pacification"
 nd_jap_dest_northern_pacification_desc: "Secure the wild northern frontier of Ezo and the strategic stepping-stone of Tsushima. Control of these territories establishes the military boundaries of the Japanese empire. Requires owning Ishikari and Tsushima with a substantial army."
 nd_jap_dest_korean_expedition: "Korean Expedition"
 nd_jap_dest_korean_expedition_desc: "Launch a full-scale invasion of the Korean peninsula, seizing the capital at Hanseong and the southern port of Gyeongju. Japan's armies must prove they can fight and win on continental soil. Requires conquest of Korea and professional armies."
 nd_jap_dest_greater_sphere: "Greater Asian Sphere"
 nd_jap_dest_greater_sphere_desc: "Japan's military ambitions reach their apex. From the Philippines to Taiwan, the islands of the Pacific and the coasts of Asia fall under Japanese hegemony. This is the culmination of Tenka Fubu on a continental scale. Requires Tondo, Formosa, a massive army, and high development."
 nd_jap_dest_domain_economy: "Domain Economy"
 nd_jap_dest_domain_economy_desc: "The wealth of a united Japan flows through its silk markets and gold reserves. Consolidate the domain economy into a coherent trading system that enriches the central authority. Requires substantial gold reserves, high stability, and silk in the market."
 nd_jap_dest_floating_world: "The Floating World"
 nd_jap_dest_floating_world_desc: "Under the long peace, Japan's cities swell with merchants, artisans, and artists. The ukiyo — the floating world of pleasure quarters, kabuki theaters, and woodblock prints — becomes the envy of civilizations. Requires high development, banking, and national prestige."
 nd_jap_dest_eastern_workshop: "Eastern Workshop"
 nd_jap_dest_eastern_workshop_desc: "Japan transforms from an agrarian society into an industrial power. Factories, shipyards, and zaibatsu conglomerates drive modernization at breathtaking speed. Requires industrialization, Hokkaido's resources, high development, and coal in the market."
 nd_jap.8.t: "The Destiny of Japan"
 nd_jap.8.d: "The last rival banners have fallen. Japan is one. But unity is not a destination — it is a beginning. The question that now confronts the ruling house is as old as civilization itself: what does a great nation do with its power?\n\nThe answer will define not merely Japan's future, but its very character. Shall the sword that united the islands be turned outward, carving an empire from the coasts of Asia? Or shall it be sheathed, its energies channeled into building a civilization so refined and prosperous that conquest becomes unnecessary?"
 nd_jap.8.a: "Our destiny awaits."
 nd_jap.9.t: "The Northern Frontier Secured"
 nd_jap.9.d: "The wild lands of Ezo have been brought under Japanese authority. The Ainu peoples, who once roamed these northern territories unchallenged, now answer to Japanese administrators. Tsushima, that narrow stepping-stone between Japan and the continent, flies the banner of the unified state.\n\nThese conquests are more than territorial additions. Ezo's forests, fisheries, and potential farmland represent a vast new resource base. Tsushima's position between Japan and Korea makes it an invaluable strategic asset — a forward base for any future continental ambitions.\n\nThe military machine that conquered these territories is now tested, hardened, and hungry for greater challenges. The continent beckons."
 nd_jap.9.a: "The frontier is secure. What lies beyond?"
 nd_jap.10.t: "The Rising Sun Over Korea"
 nd_jap.10.d: "Japanese armies have crossed the strait and planted their banners on continental soil. Hanseong, the Korean capital, is in Japanese hands. Gyeongju, seat of ancient Silla glory, acknowledges Japanese supremacy. The invasion that many thought impossible has succeeded.\n\nBut holding conquered territory differs from taking it. Two approaches present themselves. The first favors raw military power — maintaining a permanent samurai vanguard on the peninsula, ready to crush any resistance and push further into Manchuria. The second takes a subtler approach, establishing a tributary system that preserves local governance while extracting tribute and obedience.\n\nOne demands more blood. The other demands more patience."
 nd_jap.10.a: "Station our samurai as a permanent vanguard."
 nd_jap.10.b: "Establish a tributary system of vassal states."
 nd_jap.11.t: "The Greater Asian Sphere"
 nd_jap.11.d: "From Formosa to the Philippines, from Korea to the southern seas, the Japanese sphere of influence encompasses a vast arc of Asian territory. What began with the unification of the home islands has grown into something no Japanese ruler ever imagined — a maritime empire to rival those of the European powers.\n\nTwo visions for this empire compete. The naval faction argues that Japan's destiny lies on the waves — a Pacific dominion connected by sea lanes, defended by fleets, and enriched by trade. The continental faction counters that true power lies in territory — that Japan must secure its position on the Asian mainland through overwhelming military strength.\n\nThe choice will determine whether Japan becomes a thalassocracy or a land empire."
 nd_jap.11.a: "Our destiny lies on the Pacific waves."
 nd_jap.11.b: "True power is measured in land held."
 nd_jap.12.t: "The Domain Economy Flourishes"
 nd_jap.12.d: "The economic reorganization of Japan is bearing fruit. The domain lords, once petty warlords who funded their ambitions through rice taxes alone, now preside over diversified local economies. Silk flows from Nishijin looms, gold fills the coffers of Edo money-changers, and the great roads connecting castle towns hum with merchant traffic.\n\nThe central authority, drawing revenue from this growing commercial web, finds itself wealthier than any shogunate in history. Trade centers in Osaka, Sakai, and Hakata process goods from across the realm. Banking houses extend credit that lubricates the wheels of commerce.\n\nJapan's economy, once fragmented among hundreds of quarreling domains, has become a coherent national system. The long peace is paying dividends."
 nd_jap.12.a: "Prosperity is the truest measure of good governance."
 nd_jap.13.t: "The Floating World"
 nd_jap.13.d: "The long peace has wrought a transformation that no general could have achieved. Japan's cities — Edo, Osaka, Kyoto — are among the largest and most sophisticated in the world. In the pleasure quarters and theater districts, a vibrant urban culture has emerged that the warriors of the Sengoku would not recognize.\n\nTwo aspects of this cultural flowering compete for patronage. The merchant houses of Osaka and Sakai have grown fabulously wealthy, their trading networks extending across East Asia. They fund kabuki theater, sponsor artists, and quietly accumulate the real power that comes from controlling the flow of money.\n\nMeanwhile, the artists and poets of the ukiyo — the floating world — create works of breathtaking beauty. Woodblock prints, haiku poetry, and kabuki performances define a civilization at its cultural peak.\n\nWhich aspect shall the state encourage?"
 nd_jap.13.a: "Empower the merchant houses of Osaka."
 nd_jap.13.b: "Patronize the arts of the floating world."
 nd_jap.14.t: "The Eastern Workshop"
 nd_jap.14.d: "Japan has achieved what seemed impossible — an industrial revolution on its own terms. The coal mines of Hokkaido feed blast furnaces. Shipyards launch modern vessels. Railways connect cities that were once weeks apart. The zaibatsu — great industrial-financial conglomerates — have become the engines of national transformation.\n\nTwo models of industrial development present themselves. The zaibatsu-led approach concentrates economic power in a handful of great firms — Mitsui, Mitsubishi, Sumitomo — that combine banking, trade, and manufacturing under single corporate umbrellas. They are ruthlessly efficient but create dangerous concentrations of private power.\n\nThe alternative is the kokusan policy — national production directed by the state, building strategic industries under government control to ensure that Japan's modernization serves the national interest rather than private profit."
 nd_jap.14.a: "Let the zaibatsu lead Japan's modernization."
 nd_jap.14.b: "National production for the national interest."
 STATIC_MODIFIER_NAME_nd_jap_dest_samurai_vanguard: "Samurai Vanguard"
 STATIC_MODIFIER_DESC_nd_jap_dest_samurai_vanguard: "A permanent garrison of elite samurai stationed on the Korean peninsula, ready to crush resistance and push deeper into the continent. The cost in war-weariness is real, but so is the military capability."
 STATIC_MODIFIER_NAME_nd_jap_dest_tributary_system: "Tributary System"
 STATIC_MODIFIER_DESC_nd_jap_dest_tributary_system: "A network of vassals and tributaries that acknowledges Japanese supremacy while preserving local governance. Tribute flows to Japan; obedience follows. New wars are easier to justify through this established order."
 STATIC_MODIFIER_NAME_nd_jap_dest_pacific_dominion: "Pacific Dominion"
 STATIC_MODIFIER_DESC_nd_jap_dest_pacific_dominion: "Japan commands the Pacific through naval supremacy. The Imperial fleet dominates the sea lanes from Taiwan to the Philippines, though maintaining such a vast maritime force draws resources from the army."
 STATIC_MODIFIER_NAME_nd_jap_dest_continental_hegemon: "Continental Hegemon"
 STATIC_MODIFIER_DESC_nd_jap_dest_continental_hegemon: "Japan's armies are the dominant land force in East Asia. Fortresses and supply lines support operations deep into the continent, though the navy suffers from the diversion of resources to the army."
 STATIC_MODIFIER_NAME_nd_jap_dest_merchant_houses: "Merchant Houses of Osaka"
 STATIC_MODIFIER_DESC_nd_jap_dest_merchant_houses: "The great merchant houses control the flow of money and goods across Japan. Their wealth funds espionage networks and commercial ventures, though the influx of capital brings inflationary pressure."
 STATIC_MODIFIER_NAME_nd_jap_dest_ukiyo_culture: "Ukiyo Culture"
 STATIC_MODIFIER_DESC_nd_jap_dest_ukiyo_culture: "The floating world of art, theater, and poetry reaches its zenith. Japan's cultural prestige endures, and its refined reputation improves diplomatic relations. The mercenary arts, however, are beneath such a cultured nation."
 STATIC_MODIFIER_NAME_nd_jap_dest_zaibatsu_power: "Zaibatsu Power"
 STATIC_MODIFIER_DESC_nd_jap_dest_zaibatsu_power: "Industrial-financial conglomerates drive Japan's modernization with ruthless efficiency. Their global reach extends Japan's commercial range, and their wealth attracts mercenary talent — though rapid expansion strains supply lines."
 STATIC_MODIFIER_NAME_nd_jap_dest_kokusan_policy: "Kokusan Policy"
 STATIC_MODIFIER_DESC_nd_jap_dest_kokusan_policy: "State-directed national production ensures that Japan's industrial capacity serves the national interest. Diplomatic influence grows, and the nation negotiates from a position of self-sufficient strength."
 nd_jap_gunbatsu_hq: "Gunbatsu Headquarters"
 nd_jap_gunbatsu_hq_desc: "The command center of Japan's military establishment — where continental campaigns are planned, armies organized, and the logistics of empire coordinated."
 nd_jap_zaibatsu: "Zaibatsu"
 nd_jap_zaibatsu_desc: "An industrial-financial conglomerate combining banking, trade, and manufacturing under a single corporate umbrella. The engine of Japan's modernization and the foundation of its economic power."
 nd_jap_gunbatsu_maintenance: "Military Command Upkeep"
 nd_jap_gunbatsu_maintenance_desc: "Maintaining the weapons stores, administrative records, signal equipment, and horse stables of a military command headquarters."
 nd_jap_zaibatsu_maintenance: "Industrial Operations"
 nd_jap_zaibatsu_maintenance_desc: "Operating the coal furnaces, steel mills, administrative offices, and industrial tooling of a zaibatsu conglomerate."
