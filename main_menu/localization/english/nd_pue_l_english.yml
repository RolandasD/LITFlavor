l_english:
 STATIC_MODIFIER_NAME_nd_path_of_pope: "Path of Popé"
 STATIC_MODIFIER_DESC_nd_path_of_pope: "In the spirit of Popé, the Tewa leader who united the pueblos against Spanish tyranny, the United Pueblo embraces the warrior tradition. No foreign power shall subjugate these lands again."
 STATIC_MODIFIER_NAME_nd_path_of_the_kiva: "Path of the Kiva"
 STATIC_MODIFIER_DESC_nd_path_of_the_kiva: "The kiva endures beneath the earth as it always has. Through ceremony, sacred knowledge, and the bonds of clan and moiety, the United Pueblo will preserve its ancient ways and flourish in wisdom."
 nd_pue.1.t: "The United Pueblo Rises"
 nd_pue.1.d: "For generations, the peoples of the desert Southwest have lived in their multistory adobe settlements — Keres at Acoma and Laguna, Tanoan speakers along the Rio Grande, Zuni in their ancient stronghold, Hopi on the distant mesas. Each pueblo governed itself through councils of elders and clan mothers, united by the kachina traditions that bind earth to sky. Now, for the first time, the pueblos have chosen to stand together as one nation. The question before the council is not whether to unite, but what the United Pueblo shall become. Some invoke the memory of Popé, whose knotted cord once rallied every pueblo against a common enemy. Others speak of the kiva — the underground heart where knowledge is preserved and the ceremonies that sustain the world are performed. Both paths lead to strength, but of different kinds.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_pue.1.a: "We shall be as Popé — unyielding in defense of our people."
 nd_pue.1.b: "The kiva endures. Our strength flows from sacred tradition."
 STATIC_MODIFIER_NAME_nd_pue_revolt_spirit_unified: "Spirit of the Revolt — Unity"
 STATIC_MODIFIER_DESC_nd_pue_revolt_spirit_unified: "The coordinated uprising has forged the pueblos into a single fighting force, ready to defend their homeland against any aggressor."
 STATIC_MODIFIER_NAME_nd_pue_revolt_spirit_restored: "Spirit of the Revolt — Restoration"
 STATIC_MODIFIER_DESC_nd_pue_revolt_spirit_restored: "With foreign altars torn down and the kachina masks brought back into the light, the ancient ways have been restored to their rightful place."
 STATIC_MODIFIER_NAME_nd_pue_turquoise_road_wealth: "Turquoise Road — Commerce"
 STATIC_MODIFIER_DESC_nd_pue_turquoise_road_wealth: "The revival of the ancient turquoise trade routes brings wealth flowing through pueblo workshops and marketplaces."
 STATIC_MODIFIER_NAME_nd_pue_turquoise_road_prestige: "Turquoise Road — Prestige"
 STATIC_MODIFIER_DESC_nd_pue_turquoise_road_prestige: "The distinctive blue-green stone of the pueblos has become a mark of status and sophistication across the trade networks, elevating the Pueblo name."
 nd_pue.2.t: "The Knotted Cord"
 nd_pue.2.d: "In the summer of 1680, the leader Popé sent runners to every pueblo carrying knotted cords. Each knot marked a day remaining until the coordinated uprising against Spanish colonial rule. When the cords ran out, the pueblos rose as one. Popé, a Tewa medicine man from Ohkay Owingeh who had been flogged and imprisoned for practicing the old religion, had built a secret alliance spanning hundreds of miles — from Taos in the north to the Hopi mesas far to the west. The revolt killed four hundred Spaniards and drove the remaining two thousand settlers south to El Paso. For twelve years, the pueblos governed themselves, tearing down churches, restoring kivas, and reviving the kachina ceremonies that the Spanish had tried to destroy. It was the most successful indigenous uprising against European colonialism in the Americas.\n\nThe spirit of that day lives on. How shall we honor the legacy of Popé and the warriors who fought beside him?"
 nd_pue.2.a: "The knotted cord binds us still — our unity is our weapon."
 nd_pue.2.b: "We fought to restore our sacred ways. Let them flourish again."
 nd_pue.3.t: "The Turquoise Road"
 nd_pue.3.d: "Long before the pueblos bore their current names, the ancient peoples of Chaco Canyon built a trade network spanning hundreds of miles. Over fifty thousand pieces of turquoise have been found in the walls of Pueblo Bonito alone — more than at every other archaeological site in the Southwest combined. The blue-green stone traveled along roads remarkably straight and wide, connecting outlying communities to the ceremonial center. Macaw feathers came north from Mesoamerica; shells arrived from the Pacific coast; copper bells from distant workshops.\n\nThough Chaco itself fell silent centuries ago, the knowledge of these roads and the art of turquoise working never vanished. The pueblo artisans of Keres, Zuni, and Hopi maintain the tradition, cutting and polishing stone with techniques passed down through generations. The revival of these trade connections offers a choice."
 nd_pue.3.a: "Turquoise is wealth. Let the trade flow and enrich our people."
 nd_pue.3.b: "Turquoise is legacy. Let its beauty speak our name to the world."
 nd_pue.4.t: "The Dance of the Kachinas"
 nd_pue.4.d: "Deep in the subterranean kiva, the masked dancers have emerged. The kachina ceremony — the cycle of dances that brings rain to the fields, health to the people, and harmony between the living and the spirits — has reached its full expression across the United Pueblo. In the western pueblos, Hopi and Zuni dancers wear elaborately carved and painted masks representing hundreds of different kachina spirits, each with a specific role in the cosmic order. In the eastern pueblos along the Rio Grande, the ceremonies take on their own character, blending with the moiety system that divides each community into complementary halves.\n\nThe kachina tradition is more than religion. It is the mechanism by which newcomers are integrated into pueblo life, disputes are settled through ritual rather than violence, and the agricultural calendar is maintained. The emergence of the dancers from the kiva is the emergence of order from chaos — of community from scattered families."
 nd_pue.4.a: "The kachinas dance. The world is renewed."
 nd_pue_defensive_architecture: "Pueblo Defensive Architecture"
 nd_pue_defensive_architecture_desc: "The ancestral Pueblo builders constructed multi-story adobe complexes with no ground-level doors or windows. Entry was via ladders through roof hatches, which could be pulled up during attacks."
 nd_pue_desert_archery: "Desert Archery"
 nd_pue_desert_archery_desc: "Pueblo bow warriors developed techniques suited to the arid landscape, using the terrain of mesas, canyons, and arroyos to maximum defensive advantage."
 nd_pue_acequia_irrigation: "Acequia Irrigation"
 nd_pue_acequia_irrigation_desc: "Communal gravity-fed irrigation canals diverted water from the Rio Grande and its tributaries to fields of maize, beans, squash, cotton, and tobacco."
 nd_pue_kiva_tradition: "Kiva Tradition"
 nd_pue_kiva_tradition_desc: "The kiva — a subterranean ceremonial chamber — served as the religious, political, and social heart of each pueblo, where sacred knowledge was preserved and transmitted."
 nd_pue_turquoise_trade: "Turquoise Trade"
 nd_pue_turquoise_trade_desc: "Pueblo artisans inherited the turquoise-working traditions of Chaco Canyon, producing ornaments, pendants, and inlaid objects for trade across the Southwest and beyond."
 nd_pue_clan_governance: "Clan Governance"
 nd_pue_clan_governance_desc: "Pueblo communities were governed through interlocking clan and moiety systems. Decisions were made by councils of elders representing each clan, ensuring stability through consensus."
 nd_pue_multistory_pueblos: "Multi-Story Pueblos"
 nd_pue_multistory_pueblos_desc: "Pueblo architects refined techniques for constructing four- and five-story adobe and sandstone apartment complexes, housing hundreds of families in integrated communities."
 nd_pue_pottery_mastery: "Pueblo Pottery Mastery"
 nd_pue_pottery_mastery_desc: "The distinctive black-on-white and polychrome pottery traditions of the pueblos reached new heights of artistry, with each village developing recognizable styles."
 nd_pue_communal_militia: "Communal Militia"
 nd_pue_communal_militia_desc: "Pueblo defense was organized through the moiety system, with each half of the community responsible for raising and training warriors to protect the settlement."
 nd_pue_waffle_gardens: "Waffle Gardens"
 nd_pue_waffle_gardens_desc: "The Zuni perfected the waffle garden — sunken grid beds surrounded by low earthen walls that captured and conserved precious moisture in the arid landscape."
 nd_pue_kachina_ceremonies: "Kachina Ceremonies"
 nd_pue_kachina_ceremonies_desc: "The elaborate cycle of masked kachina dances represented hundreds of spirit beings, each tied to specific aspects of rainfall, fertility, healing, and the cosmic order."
 nd_pue_pueblo_trade_fairs: "Pueblo Trade Fairs"
 nd_pue_pueblo_trade_fairs_desc: "Seasonal gatherings at major pueblos served as trade fairs where pottery, turquoise, cotton textiles, foodstuffs, and goods from distant regions changed hands."
 nd_pue_warrior_societies: "Warrior Societies"
 nd_pue_warrior_societies_desc: "Each pueblo maintained warrior societies tied to the kachina tradition. Initiates underwent rigorous training and ceremonial preparation before serving as guardians of the community."
 nd_pue_mesa_scouts_tradition: "Mesa Scout Tradition"
 nd_pue_mesa_scouts_tradition_desc: "Swift runners and scouts trained to navigate the vast desert terrain between pueblos, serving as both messengers and reconnaissance forces against approaching threats."
 nd_pue_pueblo_diplomacy: "Pueblo Diplomacy"
 nd_pue_pueblo_diplomacy_desc: "Despite speaking multiple unrelated languages, the pueblos maintained diplomatic relations through shared ceremonial traditions, trade partnerships, and intermarriage between clans."
 nd_pue_oral_traditions: "Oral Traditions"
 nd_pue_oral_traditions_desc: "Sacred narratives, astronomical knowledge, agricultural calendars, and historical memory were preserved through elaborate oral traditions passed from elders to initiates within the kivas."
 nd_pue_cotton_weaving: "Cotton Weaving"
 nd_pue_cotton_weaving_desc: "Pueblo weavers cultivated cotton in irrigated fields and produced textiles of remarkable quality, using natural dyes and complex patterns for both domestic use and trade."
 nd_pue_inter_pueblo_council: "Inter-Pueblo Council"
 nd_pue_inter_pueblo_council_desc: "As the pueblos drew closer together, representatives from each community began meeting in formal council to coordinate defense, manage shared water resources, and settle disputes."
 nd_pue_mesa_fortification: "Mesa Fortification"
 nd_pue_mesa_fortification_desc: "The Hopi and other western pueblos built their settlements atop sheer mesas, creating natural fortresses accessible only by steep, narrow paths easily defended against any attacker."
 nd_pue_pueblo_revolt: "The Pueblo Revolt"
 nd_pue_pueblo_revolt_desc: "In 1680, Popé of Ohkay Owingeh organized the most successful indigenous uprising in American history, coordinating attacks across dozens of pueblos to drive out Spanish colonial rule."
 nd_pue_spiritual_restoration: "Spiritual Restoration"
 nd_pue_spiritual_restoration_desc: "After the revolt, Popé traveled from pueblo to pueblo ordering the destruction of churches, the restoration of kivas, and the revival of banned kachina ceremonies."
 nd_pue_guerrilla_tactics: "Guerrilla Tactics"
 nd_pue_guerrilla_tactics_desc: "The revolt demonstrated Pueblo mastery of guerrilla warfare — simultaneous attacks, scorched earth, and exploitation of the desert terrain that no foreign army could navigate."
 nd_pue_horse_adoption: "Horse Adoption"
 nd_pue_horse_adoption_desc: "The Spanish retreat left behind horses that transformed Pueblo mobility. Pueblo warriors quickly mastered mounted warfare, combining it with their existing knowledge of desert combat."
 nd_pue_confederacy: "Pueblo Confederacy"
 nd_pue_confederacy_desc: "The multi-pueblo alliance forged by Popé's revolt — spanning Tewa, Tiwa, Towa, Keres, Zuni, and Hopi — proved that the autonomous pueblos could act as a unified nation when survival demanded it."
 nd_pue_trade_restoration: "Trade Restoration"
 nd_pue_trade_restoration_desc: "With colonial restrictions lifted, traditional trade networks between pueblos and with neighboring peoples were rebuilt, restoring the flow of turquoise, pottery, textiles, and foodstuffs."
 nd_pue_unified_council: "Unified Council"
 nd_pue_unified_council_desc: "A permanent council of representatives from all pueblos formalized the ad hoc alliances of the revolt era into a standing institution for collective governance."
 nd_pue_enduring_resistance: "Enduring Resistance"
 nd_pue_enduring_resistance_desc: "The memory of the revolt and the twelve years of self-rule that followed instilled a tradition of disciplined, unyielding resistance to any external threat."
 nd_pue_advanced_irrigation: "Advanced Irrigation"
 nd_pue_advanced_irrigation_desc: "Expanded acequia networks, improved check dams, and refined water management techniques allowed the pueblos to support larger populations in the arid Southwest."
 nd_pue_artistic_renaissance: "Pueblo Artistic Renaissance"
 nd_pue_artistic_renaissance_desc: "New pottery styles, silverwork learned and transformed from Spanish techniques, and innovations in weaving marked a flowering of Pueblo artistic expression."
 nd_pue_mounted_tradition: "Mounted Warrior Tradition"
 nd_pue_mounted_tradition_desc: "The adoption of horses from the Spanish retreat gave rise to a new tradition of mounted desert warfare, combining Pueblo knowledge of the terrain with cavalry mobility."
 nd_pue_territorial_defense: "Territorial Defense"
 nd_pue_territorial_defense_desc: "An integrated system of watchtowers, signal fires, mesa strongholds, and coordinated militia response transformed the scattered pueblos into a cohesive defensive network."
 nd_pue_diplomatic_pragmatism: "Diplomatic Pragmatism"
 nd_pue_diplomatic_pragmatism_desc: "Pueblo leaders learned to play colonial powers against each other, extract favorable terms through negotiation, and maintain autonomy through shrewd diplomacy rather than force alone."
 nd_pue_sovereignty: "Pueblo Sovereignty"
 nd_pue_sovereignty_desc: "The assertion of Pueblo nationhood — the right to self-governance, territorial integrity, and cultural self-determination — as a matter of established principle rather than aspiration."
 nd_pue_cultural_preservation: "Cultural Preservation"
 nd_pue_cultural_preservation_desc: "In the face of modernization and external pressures, the pueblos committed to the deliberate preservation of language, ceremony, craft traditions, and communal land tenure."
 nd_pue_modern_economy: "Modern Pueblo Economy"
 nd_pue_modern_economy_desc: "Traditional crafts — pottery, turquoise jewelry, woven textiles — found new markets and new appreciation, forming the basis of a sustainable economy rooted in cultural identity."
 nd_pue_land_rights: "Land and Water Rights"
 nd_pue_land_rights_desc: "Securing formal recognition of communal land tenure and ancestral water rights along the Rio Grande and its tributaries, ensuring the material foundation of Pueblo life."
 nd_pue_confederal_constitution: "Confederal Constitution"
 nd_pue_confederal_constitution_desc: "A written framework codifying the relationship between autonomous pueblos, establishing shared institutions while preserving each community's right to self-governance."
 nd_pue_standing_army: "Standing Army"
 nd_pue_standing_army_desc: "The evolution of Pueblo warrior societies into a professional defense force, combining traditional knowledge of desert warfare with modern military organization."
 a_nd_pue_bow_warriors: "Pueblo Bow Warriors"
 a_nd_pue_bow_warriors_desc: "Skilled desert archers who exploit the mesas, canyons, and arroyos of the Southwest, these warriors defend pueblo settlements with deadly accuracy."
 a_nd_pue_revolt_warriors: "Revolt Warriors"
 a_nd_pue_revolt_warriors_desc: "Guerrilla fighters inspired by the spirit of Popé's 1680 uprising, specializing in coordinated ambushes and exploitation of desert terrain."
 a_nd_pue_pueblo_levy: "Pueblo Levy Warriors"
 a_nd_pue_pueblo_levy_desc: "Communal militia raised from the pueblo settlements through the moiety system. Stubborn defenders who fight hardest when protecting their homes."
 a_nd_pue_kachina_guardians: "Kachina Guardians"
 a_nd_pue_kachina_guardians_desc: "Elite warriors drawn from the ceremonial warrior societies, sanctified by kachina ritual. Their presence on the battlefield inspires extraordinary courage."
 a_nd_pue_mesa_scouts: "Mesa Scouts"
 a_nd_pue_mesa_scouts_desc: "Swift desert runners who navigate the vast distances between pueblos, serving as scouts and messengers. They know every canyon, arroyo, and hidden water source."
 a_nd_pue_mounted_warriors: "Pueblo Mounted Warriors"
 a_nd_pue_mounted_warriors_desc: "Pueblo cavalry trained in the desert warfare tradition, combining ancestral knowledge of the terrain with the mobility of horses acquired after the Spanish retreat."
 nd_pue_kiva: "Kiva"
 nd_pue_kiva_desc: "A subterranean ceremonial chamber where the sacred dances are performed, political decisions are made, and the oral traditions that bind the community are transmitted to each new generation."
 nd_pue_turquoise_workshop: "Turquoise Workshop"
 nd_pue_turquoise_workshop_desc: "An artisan center where turquoise, shell, and copper are worked into pendants, beads, and inlaid ornaments using techniques inherited from the master craftspeople of Chaco Canyon."
 nd_pue_granary: "Pueblo Granary"
 nd_pue_granary_desc: "Communal food storage rooms within the multi-story adobe complex, sealed against vermin and moisture. The shared granary ensures that no family goes hungry when the harvest is poor."
 nd_pue_fortress: "Pueblo Fortress"
 nd_pue_fortress_desc: "A multi-story adobe defensive complex with no ground-level entrances. Access is by ladder through roof hatches that can be pulled up in moments, turning the entire structure into a fortress."
 nd_pue_pottery_workshop: "Pottery Workshop"
 nd_pue_pottery_workshop_desc: "A center for the production of Pueblo black-on-white and polychrome ceramics, where artisans shape, paint, and fire pottery using techniques refined over centuries."
 nd_pue_cotton_hall: "Cotton Weaving Hall"
 nd_pue_cotton_hall_desc: "A center for Pueblo textile production where cotton cultivated in irrigated fields is spun and woven into cloth using natural dyes and complex geometric patterns."
 nd_pue_watchtower: "Mesa Watchtower"
 nd_pue_watchtower_desc: "A stone observation tower perched atop a mesa, part of a network of signal stations that allows the pueblos to coordinate their defense across vast distances."
 nd_pue_trade_fair: "Trade Fair Ground"
 nd_pue_trade_fair_desc: "A seasonal gathering place where pueblos and neighboring peoples exchange pottery, turquoise, cotton textiles, foodstuffs, and goods from across the trade networks."
 nd_pue_kiva_ceremonies: "Kiva Ceremony Offerings"
 nd_pue_kiva_ceremonies_desc: "The regular cycle of kachina dances and purification rituals requires beeswax candles, incense, and clay vessels used as sacred offerings."
 nd_pue_turquoise_processing: "Turquoise Lapidary"
 nd_pue_turquoise_processing_desc: "The art of cutting, grinding, and polishing turquoise into ornaments requires copper tools and silver settings."
 nd_pue_granary_upkeep: "Granary Maintenance"
 nd_pue_granary_upkeep_desc: "Keeping the communal granaries in good repair requires timber for beams, stone for adobe plaster, and tools for ongoing repairs."
 nd_pue_fortress_maintenance: "Fortress Upkeep"
 nd_pue_fortress_maintenance_desc: "The massive adobe walls must be constantly maintained against erosion, requiring stone for repairs, timber for structural support, and tools for the work."
 nd_pue_pottery_firing: "Pottery Firing"
 nd_pue_pottery_firing_desc: "Local clay is shaped, painted with mineral pigments, and fired in carefully managed outdoor kilns to produce the distinctive Pueblo black-on-white and polychrome ceramics."
 nd_pue_cotton_processing: "Cotton Processing"
 nd_pue_cotton_processing_desc: "Cotton fibers cultivated in irrigated fields are spun, dyed with mineral and plant pigments, and woven into cloth of remarkable quality."
 nd_pue_watchtower_upkeep: "Watchtower Upkeep"
 nd_pue_watchtower_upkeep_desc: "The mesa-top watchtowers require timber for beam replacement, stone for structural repairs, and tools to keep the observation posts serviceable."
 nd_pue_trade_fair_costs: "Trade Fair Provisioning"
 nd_pue_trade_fair_costs_desc: "Hosting the seasonal trade fairs requires livestock for communal feasting, pottery as exchange goods, and salt for food preservation and barter."
 nd_pue_waffle_garden: "Waffle Garden Farming"
 nd_pue_waffle_garden_desc: "The Zuni technique of sunken grid beds bounded by low clay walls, requiring timber framing, clay for the earthen borders, and tools to maintain the irrigation geometry."
 nd_pue_acequia_method: "Acequia Irrigation"
 nd_pue_acequia_method_desc: "Communal gravity-fed canal systems that divert river water to the fields, requiring stone for channel linings, timber for sluices, and tools for ongoing maintenance."
 nd_pue_silverwork: "Pueblo Silverwork"
 nd_pue_silverwork_desc: "The art of silver and turquoise jewelry-making, adapted from Spanish metalworking techniques and transformed into a distinctive Pueblo tradition."
 nd_pue_herbal_medicine: "Pueblo Herbal Medicine"
 nd_pue_herbal_medicine_desc: "Traditional healing draws on livestock, wild game parts, and desert plant fibers to prepare remedies preserved by the medicine societies through ceremonial initiation."
 levy_nd_pue_kachina_guardians: "Kachina Guardian Levy"
 levy_nd_pue_kachina_guardians_desc: "Elite warriors from the ceremonial societies, raised when the pueblo faces existential threat."
 levy_nd_pue_pueblo_levy: "Pueblo Militia Levy"
 levy_nd_pue_pueblo_levy_desc: "Communal militia drawn from the pueblo settlements, organized through the traditional moiety system."
 nd_pue_modern_crafts: "Modern Pueblo Crafts"
 nd_pue_modern_crafts_desc: "The integration of traditional pottery, weaving, and jewelry-making techniques with broader commercial networks, bringing Pueblo artistry to new markets."
 nd_pue_formed_tt: "United Pueblo has been formed"
 nd_pue_path_a_tt: "Chose Path of Popé"
 nd_pue_path_b_tt: "Chose Path of the Kiva"
 nd_pue_destiny: "Destiny of the United Pueblo"
 nd_pue_destiny_desc: "The pueblos stand united. With stability secured, the council must decide the path forward -- whether through the strength of Pope's legacy or the wisdom of the kiva."
 nd_pue_dest_warpath: "The Warpath"
 nd_pue_dest_warpath_desc: "Secure the lands of the Dine and the Nde. No people who threaten the pueblos shall remain unchallenged on the borders of our homeland. Bring Dinetah and the Apache heartland under Pueblo control."
 nd_pue_dest_warchiefs: "Council of War Chiefs"
 nd_pue_dest_warchiefs_desc: "The great canyon of the Colorado and the eastern plains must fall under Pueblo authority. Our war chiefs demand an army worthy of the confederation and the respect of our neighbors."
 nd_pue_dest_turquoise_eagle: "The Turquoise Eagle"
 nd_pue_dest_turquoise_eagle_desc: "The eagle soars over the entire Southwest. Bring the Mojave crossing, the Akimel heartland, and the southern hunting grounds into the confederation. Only a great army can hold such an empire."
 nd_pue_dest_sacred_way: "The Sacred Way"
 nd_pue_dest_sacred_way_desc: "The kachina dancers of Orayvi have preserved the oldest ceremonies. Bring the Hopi mesas into the confederation and build the wealth needed to sustain the sacred traditions."
 nd_pue_dest_artisan_age: "The Artisan Age"
 nd_pue_dest_artisan_age_desc: "Pueblo pottery is prized across the trade networks. Ensure pottery flows through our markets, fill the treasury, and embrace new methods of banking to finance the artisan renaissance."
 nd_pue_dest_eternal_kiva: "The Eternal Kiva"
 nd_pue_dest_eternal_kiva_desc: "Build the Great Kiva -- a ceremonial center worthy of a nation. Secure Halona Idiwana, fill the coffers, earn the world's respect, and embrace the written word to preserve sacred knowledge for all time."
 nd_pue.5.t: "The Destiny of the United Pueblo"
 nd_pue.5.d: "The council fires burn bright in every pueblo from the Rio Grande to the distant mesas. For the first time in living memory, the autonomous communities have chosen to act as one nation. The elders have debated, the clan mothers have spoken, and the decision is made. The United Pueblo will endure -- but its destiny remains to be written. The path chosen at formation now unfolds before us."
 nd_pue.5.a: "Our destiny awaits."
 nd_pue.6.t: "Warpath of the Pueblos"
 nd_pue.6.d: "The warriors of the United Pueblo have secured the borderlands. Dinetah, homeland of the Dine, and the Apache territory to the south now fall under the protection of the confederation. The knotted cord of Pope binds not just pueblo to pueblo, but extends outward to encompass all who would live in peace under the council's authority. Those who raid our fields and threaten our people have been brought to heel."
 nd_pue.6.a: "The borderlands are secure."
 nd_pue.7.t: "The Sacred Way Opens"
 nd_pue.7.d: "The Hopi mesas -- Orayvi, Walpi, Shungopavi -- have joined the confederation, bringing with them the most ancient and elaborate kachina traditions in the Southwest. The treasury is growing as turquoise and pottery flow through the trade networks. The Sacred Way stretches forward: a path of wisdom, ceremony, and patient accumulation of wealth and knowledge."
 nd_pue.7.a: "The kachina dancers welcome us."
 nd_pue.8.t: "Desert War Council"
 nd_pue.8.d: "The war chiefs of every pueblo have gathered in council. The confederation's warriors have pushed beyond the heartland, seizing the great canyon and the eastern plains. The army grows stronger with each campaign. Now the council must decide how to press the advantage. Some advocate raids deep into enemy territory, enriching the pueblos with captured goods. Others urge the construction of a defensive network -- watchtowers and mesa fortresses -- to hold what has been won."
 nd_pue.8.a: "We raid. The spoils will strengthen our people."
 nd_pue.8.b: "We fortify. The desert itself will be our shield."
 nd_pue.9.t: "The Pueblo Artisan Renaissance"
 nd_pue.9.d: "The workshops of the United Pueblo are flourishing. Pottery painted with ancient symbols, turquoise set in silver, cotton woven in intricate patterns -- Pueblo artisanship has become a source of wealth and pride. Banking institutions now finance the artisan guilds. The council must decide how to direct this renaissance. Some advocate expanding trade networks to bring Pueblo goods to distant markets. Others wish to attract foreign scholars and artisans, absorbing new techniques while preserving the core traditions."
 nd_pue.9.a: "Our crafts will be known in every market."
 nd_pue.9.b: "We will learn from all peoples."
 nd_pue.10.t: "The Turquoise Eagle"
 nd_pue.10.d: "The confederation now stretches from the Mojave crossing in the west to the plains in the east, from the great canyon in the north to the Akimel lands in the south. An army of unprecedented size for the pueblos stands ready. The turquoise eagle -- symbol of Pueblo power and the desert sky -- flies over an empire. The council must decide the character of this new power. Shall the United Pueblo be a war eagle, striking fear into all who oppose it? Or shall its strength be the unbreakable endurance that has sustained the pueblos for centuries?"
 nd_pue.10.a: "We are the war eagle. None shall stand against us."
 nd_pue.10.b: "We endure. That is our greatest strength."
 nd_pue.11.t: "The Eternal Kiva"
 nd_pue.11.d: "The Great Kiva stands complete -- a monumental ceremonial center unlike anything built since the days of Chaco Canyon. Below the earth, in the sacred chamber, the kachina dancers perform the ceremonies that renew the world. Above, scribes record the oral traditions in written form for the first time, preserving knowledge that has been passed from mouth to ear for a thousand years. The council gathers to consecrate this achievement. Shall the Eternal Kiva be a beacon of spiritual harmony, welcoming all peoples? Or shall it stand as proof that the Pueblo way of governance and community has produced something truly great?"
 nd_pue.11.a: "The kiva welcomes all who seek harmony."
 nd_pue.11.b: "The Pueblo way has proven its mastery."
 STATIC_MODIFIER_NAME_nd_pue_dest_raiders_mesa: "Raiders of the Mesa"
 STATIC_MODIFIER_DESC_nd_pue_dest_raiders_mesa: "Pueblo war parties strike deep into enemy territory, returning with spoils that enrich the confederation -- though the influx of foreign goods drives prices upward."
 STATIC_MODIFIER_NAME_nd_pue_dest_desert_shield: "Desert Shield"
 STATIC_MODIFIER_DESC_nd_pue_dest_desert_shield: "A network of mesa fortresses and watchtowers makes the Pueblo heartland virtually impregnable, though maintaining these defenses strains the treasury."
 STATIC_MODIFIER_NAME_nd_pue_dest_war_eagle: "War Eagle"
 STATIC_MODIFIER_DESC_nd_pue_dest_war_eagle: "The turquoise eagle strikes terror into the enemies of the pueblos. Foreign powers recognize the confederation's military might and grant favorable terms at the negotiating table."
 STATIC_MODIFIER_NAME_nd_pue_dest_indomitable: "Indomitable Spirit"
 STATIC_MODIFIER_DESC_nd_pue_dest_indomitable: "The spirit of endurance that sustained the pueblos through centuries of hardship now manifests as an unyielding defensive tradition. Allies rally to the banner of the indomitable pueblo."
 STATIC_MODIFIER_NAME_nd_pue_dest_ceramic_masters: "Ceramic Masters"
 STATIC_MODIFIER_DESC_nd_pue_dest_ceramic_masters: "Pueblo pottery commands premium prices in markets across the continent, drawing traders and expanding the confederation's diplomatic reach -- though success breeds a measure of complacency."
 STATIC_MODIFIER_NAME_nd_pue_dest_desert_scholars: "Desert Scholars"
 STATIC_MODIFIER_DESC_nd_pue_dest_desert_scholars: "Foreign artisans and scholars are welcomed into the pueblos, bringing new techniques and ideas that blend with ancient traditions to produce remarkable innovations."
 STATIC_MODIFIER_NAME_nd_pue_dest_eternal_ceremonies: "Eternal Ceremonies"
 STATIC_MODIFIER_DESC_nd_pue_dest_eternal_ceremonies: "The kachina ceremonies of the Great Kiva draw pilgrims from every nation. The spiritual harmony of the pueblos becomes a model for peaceful coexistence among diverse peoples."
 STATIC_MODIFIER_NAME_nd_pue_dest_pueblo_mastery: "Pueblo Mastery"
 STATIC_MODIFIER_DESC_nd_pue_dest_pueblo_mastery: "The Great Kiva stands as proof that the Pueblo way -- communal governance, sacred tradition, patient craft -- has produced a civilization worthy of the world's respect."
 nd_pue_war_council: "War Council Hall"
 nd_pue_war_council_desc: "A fortified council hall where the war chiefs of every pueblo gather to coordinate the confederation's military campaigns, plan defenses, and mobilize warriors across the Southwest."
 nd_pue_great_kiva: "Great Kiva"
 nd_pue_great_kiva_desc: "A monumental subterranean ceremonial chamber rivaling the great kivas of ancient Chaco Canyon, where the most sacred dances are performed and the oral traditions of every pueblo are preserved."
 nd_pue_war_council_upkeep: "War Council Maintenance"
 nd_pue_war_council_upkeep_desc: "Maintaining the War Council Hall requires weaponry for the garrison, leather for equipment, tools for repairs, and stone for the adobe walls."
 nd_pue_great_kiva_ceremonies: "Great Kiva Ceremonies"
 nd_pue_great_kiva_ceremonies_desc: "The elaborate ceremonial cycle of the Great Kiva requires beeswax for candles, clay for sacred vessels, dyes for ritual paint, and incense for purification."
