l_english:
 STATIC_MODIFIER_NAME_nd_tus_palazzo_dei_medici: "Palazzo dei Medici"
 STATIC_MODIFIER_DESC_nd_tus_palazzo_dei_medici: "The Medici built their power not through arms but through the ledger and the chisel. From the counting houses of the Via de' Bardi to the workshops of Brunelleschi, Florence proved that wealth directed toward beauty could reshape the world."
 STATIC_MODIFIER_NAME_nd_tus_porto_franco_spirit: "Spirit of the Porto Franco"
 STATIC_MODIFIER_DESC_nd_tus_porto_franco_spirit: "Livorno's gates stand open to all nations and all faiths. Sephardic Jews, Armenian merchants, English traders, and Greek shipowners mingle in the piazzas of this cosmopolitan port, making Tuscany a crossroads of Mediterranean commerce."
 STATIC_MODIFIER_NAME_nd_tus_santo_stefano_crusaders: "Crusading Zeal of Santo Stefano"
 STATIC_MODIFIER_DESC_nd_tus_santo_stefano_crusaders: "The Knights of Santo Stefano carry the cross into battle against the Barbary corsairs, their galleys sweeping the sea lanes clean of infidel pirates."
 STATIC_MODIFIER_NAME_nd_tus_mediterranean_patrol: "Mediterranean Patrol"
 STATIC_MODIFIER_DESC_nd_tus_mediterranean_patrol: "Rather than pursue holy war, the Knights of Santo Stefano serve as guardians of Tuscan commerce, their patrols ensuring the safe passage of merchant vessels through pirate-infested waters."
 nd_tus.1.t: "The Grand Duchy of Tuscany"
 nd_tus.1.d: "From the towers of San Gimignano to the marble facades of Florence, the lands of Tuscany are united under a single banner. But the question remains: what kind of state shall this be? The legacy of the Medici offers one path — a patronage state where banking wealth fuels artistic genius and political control flows through cultural supremacy. Florence's palazzi, its academies, its banks would be the instruments of power.\n\nYet the thriving port of Livorno suggests another destiny. Its free port charter, welcoming merchants of every faith and nation, has created a cosmopolitan trading hub unlike any other in Italy. Open doors and religious tolerance could make Tuscany the commercial heart of the Mediterranean.\n\nThe grand duke must choose the soul of the new state.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_tus.1.a: "Florence is the world's greatest patron — let our banks and artists rule."
 nd_tus.1.b: "Livorno shows the future — open our ports to all who would trade."
 nd_tus.2.t: "The Knights of Santo Stefano"
 nd_tus.2.d: "In 1561, Grand Duke Cosimo I founded the Order of Saint Stephen, a military-religious order headquartered in Pisa's magnificent Palazzo dei Cavalieri. Commanded by the grand duke himself, the knights operate a dedicated galley fleet from Portoferraio on Elba and the growing port of Livorno. Their galleys have already struck against Barbary pirates at the siege of Malta and the Battle of Lepanto.\n\nThe order's purpose is clear: to combat Ottoman and Barbary threats in the Mediterranean. But the grand duke must decide the order's emphasis. Should the knights pursue aggressive crusading warfare, raiding the coast of North Africa in the name of Christendom? Or should they focus on disciplined patrol and escort duties, protecting Tuscan merchant shipping from corsair attacks?"
 nd_tus.2.a: "The cross demands offense — let the knights raid the Barbary coast!"
 nd_tus.2.b: "Our merchants need safe waters — patrol the trade lanes."
 nd_tus.3.t: "The Leopoldine Code"
 nd_tus.3.d: "On November 30, 1786, Grand Duke Peter Leopold promulgated what the world will come to know as the Leopoldine Code — a revolutionary reform of criminal law inspired by Cesare Beccaria's writings on crimes and punishments. Tuscany has become the first sovereign state in the modern world to abolish the death penalty and the use of torture.\n\nThe code does not stop at abolition. It reorganizes the entire system of criminal justice: standardizing procedures, requiring public trials, establishing proportional sentencing, and ending the practice of confiscation of criminals' property. The new code reflects an Enlightenment conviction that punishment should reform, not destroy.\n\nAcross Europe, philosophers and reformers celebrate Tuscany as a beacon of enlightened governance."
 nd_tus.3.a: "Justice tempered by reason shall be our legacy."
 nd_tus.4.t: "The Medici and the Renaissance"
 nd_tus.4.d: "Under the patronage of Cosimo de' Medici and his grandson Lorenzo il Magnifico, Florence has become the undisputed cultural capital of Europe. Brunelleschi's dome crowns the cathedral, Botticelli's paintings adorn the churches, and Marsilio Ficino translates Plato in the gardens of the Villa Careggi.\n\nThis is no mere love of beauty. The Medici understand that artistic patronage is political power made visible. Every fresco, every sculpture, every commissioned manuscript proclaims Florence's supremacy to visiting ambassadors and rival courts alike. The Platonic Academy, the workshops of Verrocchio, the libraries of San Marco — these are the instruments through which Tuscany reshapes how the world thinks."
 nd_tus.4.a: "Beauty is power, and Florence is its throne."
 nd_tus_commune_tradition: "Commune Tradition"
 nd_tus_commune_tradition_desc: "Tuscan city-states governed themselves through elected councils and communal charters long before the age of princes, establishing a tradition of civic participation and republican governance."
 nd_tus_arte_della_seta: "Arte della Seta"
 nd_tus_arte_della_seta_desc: "The silk guild of Florence, inheriting the craft traditions of Lucca after its sack in 1314, transformed Tuscany into Europe's premier producer of luxury silks."
 nd_tus_tower_defense: "Tuscan Tower Houses"
 nd_tus_tower_defense_desc: "The stone tower houses of San Gimignano, Volterra, and Florence served as both aristocratic residences and fortified strongpoints in the factional wars of medieval Tuscany."
 nd_tus_pisan_maritime: "Pisan Maritime Heritage"
 nd_tus_pisan_maritime_desc: "Before Venice and Genoa eclipsed it, Pisa was among Italy's foremost maritime republics, its galleys dominating the western Mediterranean and its merchants trading from Barcelona to Tunis."
 nd_tus_medici_banking: "Medici Banking"
 nd_tus_medici_banking_desc: "The Medici Bank, founded in 1397 by Giovanni di Bicci de' Medici, pioneered double-entry bookkeeping, the letter of exchange, and the holding company — innovations that made Florence the financial capital of Europe."
 nd_tus_renaissance_patronage: "Renaissance Patronage"
 nd_tus_renaissance_patronage_desc: "The Medici transformed political wealth into cultural supremacy, commissioning Brunelleschi, Donatello, Botticelli, and Michelangelo to create works that defined the Renaissance."
 nd_tus_condottiere_tradition: "Condottiere Tradition"
 nd_tus_condottiere_tradition_desc: "From John Hawkwood's White Company to Giovanni dalle Bande Nere's black-banded infantry, Tuscany stood at the center of Italy's mercenary warfare tradition."
 nd_tus_florentine_diplomacy: "Florentine Diplomacy"
 nd_tus_florentine_diplomacy_desc: "Lorenzo de' Medici's balance-of-power diplomacy maintained peace among the Italian states for decades, earning him the title 'il Magnifico' and establishing Florence as Italy's diplomatic arbiter."
 nd_tus_santo_stefano_order: "Knights of Santo Stefano"
 nd_tus_santo_stefano_order_desc: "Founded by Cosimo I in 1561, this crusading naval order operated from Pisa and Portoferraio, its galleys combating Ottoman and Barbary threats across the Mediterranean."
 nd_tus_livorno_free_port: "Livorno Free Port"
 nd_tus_livorno_free_port_desc: "Ferdinando I declared Livorno a free port in the 1590s, welcoming persecuted Sephardic Jews, Armenian merchants, and traders of all faiths, creating the most cosmopolitan city in Italy."
 nd_tus_trace_italienne: "Trace Italienne"
 nd_tus_trace_italienne_desc: "Tuscan military architects pioneered the star fort, with the Fortezza da Basso in Florence and Portoferraio's bastions on Elba representing the cutting edge of Renaissance fortification."
 nd_tus_tuscan_printing: "Tuscan Printing"
 nd_tus_tuscan_printing_desc: "Florentine printers disseminated humanist and vernacular literature across Europe, making Tuscan Italian the prestige language of scholarship and letters."
 nd_tus_grand_ducal_state: "Grand Ducal State"
 nd_tus_grand_ducal_state_desc: "Cosimo I's consolidation of power — absorbing Siena, centralizing administration, establishing ducal courts — transformed the patchwork of Tuscan communes into a modern territorial state."
 nd_tus_elba_naval_base: "Elba Naval Base"
 nd_tus_elba_naval_base_desc: "Cosimo I purchased Elba from Genoa in 1548 and developed Portoferraio into a fortified naval base, projecting Tuscan power across the Tyrrhenian Sea."
 nd_tus_carrara_marble: "Carrara Marble"
 nd_tus_carrara_marble_desc: "The white marble of Carrara, quarried since Roman times, supplied Michelangelo's David, Bernini's masterworks, and countless Renaissance buildings, making Tuscany the workshop of European architecture."
 nd_tus_crusca_academy: "Accademia della Crusca"
 nd_tus_crusca_academy_desc: "Founded in 1583, the Accademia della Crusca created the first vernacular dictionary, establishing Tuscan as the standard form of the Italian language and a model for linguistic academies across Europe."
 nd_tus_leopoldine_code: "Leopoldine Code"
 nd_tus_leopoldine_code_desc: "Grand Duke Peter Leopold's criminal code of 1786 was the first in the modern world to abolish the death penalty and torture, making Tuscany a beacon of Enlightenment jurisprudence."
 nd_tus_maremma_drainage: "Maremma Drainage"
 nd_tus_maremma_drainage_desc: "The systematic drainage of the malarial Maremma marshlands, begun under the Medici and expanded by the House of Lorraine, transformed vast tracts of swampland into productive farmland."
 nd_tus_tuscan_viticulture: "Tuscan Viticulture"
 nd_tus_tuscan_viticulture_desc: "Tuscan wine estates — the fattorie — perfected the production of Chianti, Vernaccia, and Vino Nobile, making Tuscan wines celebrated across the courts of Europe."
 nd_tus_risorgimento_spirit: "Tuscan Risorgimento"
 nd_tus_risorgimento_spirit_desc: "The Grand Duchy's tradition of enlightened reform and constitutional experimentation made Tuscany fertile ground for the ideas of Italian national awakening."
 nd_tus_straw_hat_industry: "Straw Hat Industry"
 nd_tus_straw_hat_industry_desc: "Florentine straw hats became a major export industry in the 18th and 19th centuries, with Tuscan peasant women weaving braids of wheat straw into fashionable headwear sold across Europe."
 nd_tus_scientific_legacy: "Tuscan Scientific Legacy"
 nd_tus_scientific_legacy_desc: "From Galileo's telescopic observations to Torricelli's barometer and the Accademia del Cimento's experimental method, Tuscany stood at the forefront of the Scientific Revolution."
 a_nd_tus_bande_nere: "Bande Nere"
 a_nd_tus_bande_nere_desc: "Elite shock infantry descended from Giovanni dalle Bande Nere's famous black-banded companies, known for their aggression and fighting speed."
 n_nd_tus_santo_stefano_galley: "Santo Stefano Galley"
 n_nd_tus_santo_stefano_galley_desc: "Fast, well-armed galleys of the Knights of Santo Stefano, designed for raiding Barbary corsairs and patrolling the Tyrrhenian Sea."
 nd_tus_silk_workshop: "Silk Workshop"
 nd_tus_silk_workshop_desc: "A setificio in the Florentine tradition, weaving raw silk and dyestuffs into the finest cloth in Europe."
 nd_tus_silk_weaving: "Tuscan Silk Weaving"
 nd_tus_silk_weaving_desc: "The art of silk weaving, inherited from Luccan masters and perfected by the Florentine Arte della Seta guild."
 nd_tus_casa_torre: "Casa Torre"
 nd_tus_casa_torre_desc: "A fortified stone tower house in the Tuscan style, serving as both noble residence and defensive strongpoint."
 nd_tus_tower_upkeep: "Tower Garrison"
 nd_tus_tower_upkeep_desc: "A small garrison maintains the tower's defenses, armed with swords, crossbows, and firearms."
 nd_tus_banco_medici: "Banco Medici"
 nd_tus_banco_medici_desc: "A branch of the great Florentine banking house, offering deposits, letters of exchange, and loans to merchants and princes alike."
 nd_tus_banking_operations: "Banking Operations"
 nd_tus_banking_operations_desc: "Clerks maintain ledgers, process bills of exchange, and receive clients in fine dress, managing the flow of capital across the bank's network."
 nd_tus_porto_franco: "Porto Franco"
 nd_tus_porto_franco_desc: "A free port facility in the Livornese tradition, where merchants of all nations and faiths trade without customs barriers."
 nd_tus_free_port_operations: "Free Port Operations"
 nd_tus_free_port_operations_desc: "Warehouses and counting houses service the diverse merchant communities, stocking cloth, paper records, and salt for preservation of cargoes."
 nd_tus_fortezza: "Fortezza"
 nd_tus_fortezza_desc: "A modern trace italienne star fort in the Tuscan style, with angled bastions designed to deflect cannonballs."
 nd_tus_fortezza_upkeep: "Fortress Garrison"
 nd_tus_fortezza_upkeep_desc: "The professional garrison mans the bastions, maintaining artillery, edged weapons, and muskets to defend the trace italienne."
 nd_tus_naval_arsenal: "Tuscan Naval Arsenal"
 nd_tus_naval_arsenal_desc: "A fortified shipyard in the tradition of Portoferraio, where the grand ducal fleet is built and maintained."
 nd_tus_arsenal_upkeep: "Arsenal Operations"
 nd_tus_arsenal_upkeep_desc: "Shipwrights keep the arsenal operational with timber, naval stores, and iron tools, building and repairing the galleys of the Tuscan fleet."
 nd_tus_marble_quarry: "Carrara Quarry"
 nd_tus_marble_quarry_desc: "An extraction site for the legendary white marble of Carrara, prized by sculptors and architects since antiquity."
 nd_tus_marble_extraction: "Marble Quarrying"
 nd_tus_marble_extraction_desc: "Teams of quarrymen extract blocks of marble from the Apuan Alps, cutting and shaping them for transport to workshops and construction sites."
 nd_tus_fattoria: "Fattoria"
 nd_tus_fattoria_desc: "A Tuscan agricultural estate centered on viticulture, producing the celebrated wines of Chianti and the surrounding hills."
 nd_tus_wine_production: "Wine Production"
 nd_tus_wine_production_desc: "Grapes are harvested, pressed, and fermented according to generations of Tuscan winemaking tradition."
 nd_tus_cappelleria: "Cappelleria"
 nd_tus_cappelleria_desc: "A workshop producing the celebrated Florentine straw hats, woven from locally grown wheat straw and dyed in fashionable colors."
 nd_tus_hat_making: "Hat Making"
 nd_tus_hat_making_desc: "Artisans braid straw, shape hat bodies, and apply finishing dyes to produce the lightweight hats favored across European markets."
 levy_nd_tus_bande_nere: "Bande Nere Levy"
 levy_nd_tus_bande_nere_desc: "Levied infantry in the tradition of Giovanni dalle Bande Nere's black-banded companies."
 nd_tus_osservatorio: "Osservatorio"
 nd_tus_osservatorio_desc: "An astronomical observatory and scientific academy in the tradition of Galileo, equipped with telescopes and instruments for natural philosophy."
 nd_tus_observatory_upkeep: "Observatory Operations"
 nd_tus_observatory_upkeep_desc: "Lenses, paper, and ink sustain the observatory's program of celestial observation and scientific publication."
 nd_tus_formed_tt: "Tuscany has been formed"
 nd_tus_path_a_tt: "Chose Palazzo dei Medici"
 nd_tus_path_b_tt: "Chose Spirit of the Porto Franco"
 nd_tus_destiny: "Tuscan Destiny"
 nd_tus_destiny_desc: "The Grand Duchy is forged, but what shall it become? Stability and purpose must guide the new state before it can pursue its ambitions."
 nd_tus_dest_dominio_1: "The Conquest of Siena"
 nd_tus_dest_dominio_1_desc: "Cosimo I's absorption of the Republic of Siena in 1559 marked the true unification of Tuscany. Extend Medici dominion over Perugia and Urbino to secure central Italian supremacy."
 nd_tus_dest_dominio_2: "The Keys of Saint Peter"
 nd_tus_dest_dominio_2_desc: "Two Medici sat upon the throne of Saint Peter. Now bring Rome itself under Tuscan rule, fulfilling the dynasty's ultimate ambition to command both temporal and spiritual power in Italy."
 nd_tus_dest_dominio_3: "Rex Italiae"
 nd_tus_dest_dominio_3_desc: "From the Bay of Naples to the harbour of Genoa, from the towers of Bologna to the hills of Florence — unite the Italian peninsula under the Tuscan crown and claim the ancient title of King of Italy."
 nd_tus_dest_commercio_1: "The Livornese Miracle"
 nd_tus_dest_commercio_1_desc: "Ferdinando I's free port charter transformed a fishing village into the most cosmopolitan city in Italy. Embrace modern banking and ensure silk flows through Tuscan markets to replicate this miracle across the realm."
 nd_tus_dest_commercio_2: "Emporium of Nations"
 nd_tus_dest_commercio_2_desc: "Livorno's warehouses groan with cloth from Flanders, spices from the Levant, and coral from Sardinia. Develop Tuscany's infrastructure and ensure cloth reaches every market to establish the grand duchy as a trade crossroads."
 nd_tus_dest_commercio_3: "Entrepot of the Mediterranean"
 nd_tus_dest_commercio_3_desc: "Control the sea lanes from Corsica to the Italian coast, master the institutions of global trade, and fill the treasury to bursting. Tuscany shall be the commercial heart of the entire Mediterranean."
 nd_tus.5.t: "A New Chapter for Tuscany"
 nd_tus.5.d: "The scattered communes and lordships of Tuscany have been welded into a single state. The grand duke's banner flies from every campanile, and the treasuries of Florence, Pisa, and Siena are united at last. But unification is merely the foundation — it is what we build upon it that shall define our legacy. The grand duchy stands at a crossroads of history, and the choices ahead will shape the destiny of our people for centuries to come."
 nd_tus.5.a: "Our destiny awaits."
 nd_tus.6.t: "Central Italy Secured"
 nd_tus.6.d: "The banners of the grand duchy now fly over Perugia and Urbino. Where once the Papal States and petty lords held sway over the green hills of Umbria and the Marche, Tuscan authority now reigns supreme. The road to Rome lies open, and the ancient dream of Italian unification under a single crown moves closer to reality with each passing year."
 nd_tus.6.a: "The heart of Italy beats in Florence."
 nd_tus.7.t: "Rome Falls to the Grand Duke"
 nd_tus.7.d: "The Eternal City — seat of popes and caesars alike — now answers to the Grand Duke of Tuscany. Two Medici popes once ruled Christendom from these halls; now the dynasty claims Rome by right of arms rather than conclave. But ruling Rome demands a choice. Shall the grand duke impose Tuscan authority through military occupation and direct control, crushing any remnant of papal independence? Or shall he govern through subtlety, using the city's ancient prestige to legitimize Tuscan power through diplomatic finesse?"
 nd_tus.7.a: "Rome shall know a Tuscan iron fist."
 nd_tus.7.b: "A velvet glove conceals the true hand of power."
 nd_tus.8.t: "King of Italy"
 nd_tus.8.d: "From the smoking slopes of Vesuvius to the harbours of the Ligurian coast, from the rich plains of Emilia to the marble quarries of home — Italy is united under the Tuscan crown. No Italian state has achieved this since the days of the Roman Republic. The grand duke must now decide the character of this new Italian kingdom. Shall it be forged in iron, a military power that commands respect through the strength of its armies? Or shall it embrace the diverse peoples of the peninsula, ruling through integration and shared prosperity in a true Pax Italica?"
 nd_tus.8.a: "Italy shall be united by the sword — and kept by it."
 nd_tus.8.b: "A lasting peace requires consent, not just conquest."
 nd_tus.9.t: "The Miracle of Livorno"
 nd_tus.9.d: "Tuscany's markets hum with the rustle of silk and the clink of florins. The banking houses of Florence have embraced modern financial instruments, and the looms of Lucca and Prato spin gold from thread. Merchants from across the Mediterranean flock to Tuscan ports, drawn by the promise of fair dealing and open trade. What Ferdinando I began with the Leggi Livornine has blossomed into a commercial revolution."
 nd_tus.9.a: "Our wealth is our power."
 nd_tus.10.t: "Crossroads of Commerce"
 nd_tus.10.d: "The grand duchy has become a true emporium of nations. Tuscan cloth is traded from London to Constantinople, and the warehouses of Livorno overflow with goods from every corner of the known world. The grand duke must now decide the character of this commercial empire. Shall Tuscany invest in warehouses, workshops, and physical infrastructure to handle the flood of trade? Or shall it develop sophisticated financial instruments — banking, insurance, and credit — to manage the growing complexity of Mediterranean commerce?"
 nd_tus.10.a: "Build the warehouses — let the goods flow through Tuscany."
 nd_tus.10.b: "Refine the counting house — let gold work for us."
 nd_tus.11.t: "Heart of the Mediterranean"
 nd_tus.11.d: "From the quays of Livorno to the counting houses of Florence, from the Corsican straits to the marble harbours of home, Tuscany commands the commercial arteries of the Mediterranean. Ships of every nation seek Tuscan ports, and the grand duke's customs officers collect duties on half the trade between East and West. The grand duchy must now decide its commercial philosophy. Shall it champion free trade, opening all markets and reducing barriers to build the greatest possible volume of commerce? Or shall it embrace a cosmopolitan vision, investing in the diverse communities that make Tuscan ports unique and turning cultural openness into competitive advantage?"
 nd_tus.11.a: "Free trade enriches all — lower every barrier."
 nd_tus.11.b: "Our diversity is our strength — nurture every community."
 STATIC_MODIFIER_NAME_nd_tus_dest_iron_fist: "Iron Fist of the Medici"
 STATIC_MODIFIER_DESC_nd_tus_dest_iron_fist: "Tuscan authority is imposed by force of arms. The grand duke's soldiers garrison every town, and resistance to Medici rule is met with swift retribution."
 STATIC_MODIFIER_NAME_nd_tus_dest_velvet_glove: "Velvet Glove"
 STATIC_MODIFIER_DESC_nd_tus_dest_velvet_glove: "The grand duke rules through intelligence and intrigue. Florentine spies monitor every court in Italy, and Tuscan diplomats secure favorable treaties through charm and cunning."
 STATIC_MODIFIER_NAME_nd_tus_dest_imperial_crown: "Imperial Crown of Italy"
 STATIC_MODIFIER_DESC_nd_tus_dest_imperial_crown: "The Tuscan army is the instrument of Italian unity. Hardened by decades of campaigning across the peninsula, its veterans form the backbone of a military power that rivals the great kingdoms of Europe."
 STATIC_MODIFIER_NAME_nd_tus_dest_pax_italica: "Pax Italica"
 STATIC_MODIFIER_DESC_nd_tus_dest_pax_italica: "The grand duke rules a united Italy not through fear but through shared prosperity. Subject peoples find their customs respected and their communities integrated into the fabric of the Tuscan state."
 STATIC_MODIFIER_NAME_nd_tus_dest_warehouse: "Warehouse of Nations"
 STATIC_MODIFIER_DESC_nd_tus_dest_warehouse: "Tuscan ports overflow with the physical goods of half the world. Warehouses, workshops, and manufactories process raw materials from every corner of the Mediterranean into finished goods for European markets."
 STATIC_MODIFIER_NAME_nd_tus_dest_counting_house: "Florentine Counting House"
 STATIC_MODIFIER_DESC_nd_tus_dest_counting_house: "The banking houses of Florence have perfected the art of making money work. Bills of exchange, maritime insurance, and sophisticated credit instruments keep Tuscan commerce flowing smoothly."
 STATIC_MODIFIER_NAME_nd_tus_dest_free_trade: "Champions of Free Trade"
 STATIC_MODIFIER_DESC_nd_tus_dest_free_trade: "Tuscany has thrown open its ports to all nations. The grand duke's commitment to unrestricted commerce draws merchants from every corner of the world, and Tuscan ships sail freely through every sea lane."
 STATIC_MODIFIER_NAME_nd_tus_dest_cosmopolitan: "Cosmopolitan Vision"
 STATIC_MODIFIER_DESC_nd_tus_dest_cosmopolitan: "The grand duchy thrives on the talents of its diverse population. Sephardic financiers, Armenian merchants, Greek sailors, and English factors all contribute to the vibrant tapestry of Tuscan commercial life."
 nd_tus_palazzo_ducale: "Palazzo Ducale"
 nd_tus_palazzo_ducale_desc: "The grand ducal palace, seat of Medici power, where the destiny of Italy is decided in marble halls adorned with the finest art of the Renaissance."
 nd_tus_ducal_court: "Ducal Court"
 nd_tus_ducal_court_desc: "Scribes, courtiers, and ministers attend the grand duke in chambers furnished with the finest silks and carved furniture, maintaining the administration of the realm."
 nd_tus_fondaco: "Fondaco"
 nd_tus_fondaco_desc: "An international trade warehouse and exchange in the Venetian tradition, where merchants of all nations store goods, negotiate contracts, and settle accounts."
 nd_tus_fondaco_operations: "Fondaco Operations"
 nd_tus_fondaco_operations_desc: "Warehousemen manage inventories of cloth and salt, clerks record transactions on paper, and toolsmiths maintain the mechanical equipment of the exchange."
