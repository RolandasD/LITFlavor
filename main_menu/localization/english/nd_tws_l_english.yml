l_english:
 STATIC_MODIFIER_NAME_nd_crown_of_the_mezzogiorno: "Crown of the Mezzogiorno"
 STATIC_MODIFIER_DESC_nd_crown_of_the_mezzogiorno: "The Kingdom of the Two Sicilies stands united under a single strong crown. From Naples to Palermo, the royal authority extends unbroken, suppressing baronial factionalism and imposing a centralized administration that brings order to the fractious south. The Mezzogiorno shall know one law, one king, one destiny."
 STATIC_MODIFIER_NAME_nd_crossroads_of_the_mediterranean: "Crossroads of the Mediterranean"
 STATIC_MODIFIER_DESC_nd_crossroads_of_the_mediterranean: "Heir to Norman, Greek, Arab, and Latin traditions, the Kingdom of the Two Sicilies embraces its identity as the great meeting place of civilizations. Where others see division, we see opportunity — in every foreign merchant who docks at Naples, every craftsman who plies his trade in Palermo, every scholar who studies in our academies."
 nd_tws.1.t: "The Two Sicilies United"
 nd_tws.1.d: "At last, the ancient kingdoms of Naples and Sicily stand united under one crown. For centuries, the Mezzogiorno has been fought over by Normans, Hohenstaufen, Angevins, and Aragonese — each leaving their mark upon the land and its people. Now we must decide what this kingdom shall become.\n\nThe southern lands possess the richest farmland in Italy, the busiest ports in the Mediterranean, and a population shaped by every civilization that has touched these shores. But they also suffer from powerful barons who defy royal authority, from corsair raids that menace our coasts, and from the ancient rivalry between island and mainland.\n\nShall we forge a centralized kingdom under firm royal authority, breaking the power of the barons and building a modern state? Or shall we embrace our heritage as the crossroads of the Mediterranean, where Greek, Arab, Norman, and Latin traditions mingle to create something greater than any single culture could achieve?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_tws.1.a: "One crown, one law, one kingdom."
 nd_tws.1.b: "We are the meeting place of civilizations."
 STATIC_MODIFIER_NAME_nd_tws_vespers_independence: "Spirit of the Vespers"
 STATIC_MODIFIER_DESC_nd_tws_vespers_independence: "The memory of the Sicilian Vespers burns bright — a people who rose against foreign oppression and won their freedom through sheer determination."
 STATIC_MODIFIER_NAME_nd_tws_vespers_diplomacy: "Vespers Diplomacy"
 STATIC_MODIFIER_DESC_nd_tws_vespers_diplomacy: "The Sicilian Vespers demonstrated that clever diplomacy and foreign alliances can achieve what rebellion alone cannot — the island secured its freedom by inviting the Crown of Aragon to its defense."
 nd_tws.2.t: "The Legacy of the Vespers"
 nd_tws.2.d: "On Easter Monday, 1282, the bells of the Church of the Holy Spirit outside Palermo rang for vespers — and the island erupted in revolt. Within six weeks, every Frenchman in Sicily was dead or fled. The Sicilian Vespers was more than a massacre: it was a declaration that the people of this land would not be ruled by foreigners who despised them.\n\nThe revolt's aftermath reshaped the Mediterranean. Charles of Anjou lost his island kingdom. Peter of Aragon gained a crown. And Sicily itself learned a hard lesson about the price of independence — that freedom won by blood must be defended by either strength or cunning.\n\nAs we study this legacy, what lesson shall we draw from it?"
 nd_tws.2.a: "Freedom is won by those who fight for it."
 nd_tws.2.b: "Clever alliances outlast any rebellion."
 STATIC_MODIFIER_NAME_nd_tws_bourbon_enlightenment: "Bourbon Enlightenment"
 STATIC_MODIFIER_DESC_nd_tws_bourbon_enlightenment: "The progressive reforms of the Bourbon monarchs have brought modern administration, public education, and rational governance to the kingdom."
 STATIC_MODIFIER_NAME_nd_tws_bourbon_industry: "Bourbon Industrial Program"
 STATIC_MODIFIER_DESC_nd_tws_bourbon_industry: "The crown's program of royal manufactories and infrastructure development transforms the kingdom's economic capacity."
 nd_tws.3.t: "The Bourbon Reforms"
 nd_tws.3.d: "The Bourbon monarchs have embarked on an ambitious program of reform that would transform the kingdom. Ferdinand has established the Royal Colony of San Leucio, where silk workers enjoy benefits unheard of elsewhere in Europe: mandatory education for boys and girls alike, shorter working hours, running water in every home, and communal provision for the sick and elderly.\n\nBut the reforms extend far beyond a single colony. New legal codes drawn from Enlightenment principles aim to replace the patchwork of feudal, Norman, and Spanish law. Royal manufactories spring up to challenge the dominance of northern Italian and French industry. The question is whether to pursue the intellectual promise of these reforms — modernizing education, law, and governance — or to focus on their industrial potential, building the manufactories and infrastructure that could make the Mezzogiorno an economic power."
 nd_tws.3.a: "Enlighten the minds of our people."
 nd_tws.3.b: "Build the workshops of the future."
 nd_tws_norman_feudalism: "Norman Feudal Cavalry"
 nd_tws_norman_feudalism_desc: "The Norman conquerors of southern Italy brought with them the feudal military traditions of northern France — armored knights who formed the most formidable cavalry in the Mediterranean world."
 nd_tws_masseria_system: "Masseria System"
 nd_tws_masseria_system_desc: "The great fortified farmsteads of the Mezzogiorno, the masserie, are the backbone of southern Italy's agricultural wealth — vast estates producing grain, olives, and livestock that feed the Mediterranean."
 nd_tws_scuola_medica: "Scuola Medica Salernitana"
 nd_tws_scuola_medica_desc: "The School of Salerno is the oldest medical school in the Western world, where Greek, Latin, Arab, and Jewish physicians share their knowledge. Its graduates practice medicine across Europe."
 nd_tws_coastal_torre_network: "Coastal Torre Network"
 nd_tws_coastal_torre_network_desc: "A chain of watchtowers along the coasts of Sicily and southern Italy provides early warning against Barbary corsair raids and serves as a coordinated defense network."
 nd_tws_sicilian_vespers_legacy: "Sicilian Vespers Legacy"
 nd_tws_sicilian_vespers_legacy_desc: "The memory of the 1282 uprising against Angevin tyranny instills fierce resistance to foreign domination among the people of the Two Sicilies."
 nd_tws_mediterranean_granary: "Mediterranean Granary"
 nd_tws_mediterranean_granary_desc: "Southern Italy and Sicily have been the granary of the Mediterranean since Roman times, exporting vast quantities of wheat, olives, and other foodstuffs across the sea."
 nd_tws_tercio_tradition: "Tercio di Napoli"
 nd_tws_tercio_tradition_desc: "Under Spanish influence, the kingdoms of Naples and Sicily adopted the tercio system — disciplined infantry formations combining pike and shot that dominated European battlefields."
 nd_tws_studium_naples: "Studium of Naples"
 nd_tws_studium_naples_desc: "Founded by Emperor Frederick II in 1224, the University of Naples is the oldest state-sponsored university in the world — a deliberate challenge to the papal universities of the north."
 nd_tws_mezzogiorno_commerce: "Mezzogiorno Commerce"
 nd_tws_mezzogiorno_commerce_desc: "The ports of Naples, Palermo, and Messina handle a vast volume of Mediterranean trade, connecting the agricultural wealth of the south with markets across the known world."
 nd_tws_galeazza_tradition: "Galeazza Reale"
 nd_tws_galeazza_tradition_desc: "The Two Sicilies maintains a powerful fleet of war galleys specially designed for Mediterranean combat — heavier and better armed than standard galleys, capable of dominating the contested waters between Italy and North Africa."
 nd_tws_baronial_suppression: "Baronial Suppression"
 nd_tws_baronial_suppression_desc: "The fractious Mezzogiorno barons who have undermined royal authority for centuries are finally brought to heel through systematic legal and political measures."
 nd_tws_san_leucio_silk: "San Leucio Silk Works"
 nd_tws_san_leucio_silk_desc: "The Royal Colony of San Leucio near Caserta represents a revolutionary experiment in industrial production — a silk manufactory where workers enjoy progressive labor conditions, mandatory education, and communal welfare."
 nd_tws_real_marina: "Real Marina"
 nd_tws_real_marina_desc: "The Royal Navy of the Two Sicilies — the Real Marina — is expanded and modernized under the Bourbons, fielding frigates and ships of the line to protect the kingdom's extensive coastline."
 nd_tws_bourbon_legal_reforms: "Bourbon Legal Reforms"
 nd_tws_bourbon_legal_reforms_desc: "The Bourbon monarchs replace the patchwork of Norman, Angevin, and Spanish legal codes with a unified modern legal system inspired by Enlightenment principles."
 nd_tws_mezzogiorno_industry: "Mezzogiorno Industry"
 nd_tws_mezzogiorno_industry_desc: "The industrial development of southern Italy, driven by royal manufactories and infrastructure investment, begins to challenge the traditional dominance of northern Italian economies."
 nd_tws_carbonari_legacy: "Carbonari Legacy"
 nd_tws_carbonari_legacy_desc: "The secret societies of the Carbonari — charcoal burners — spread revolutionary ideals of constitutional government and national identity throughout the kingdom, shaping the political consciousness of a generation."
 a_nd_tws_norman_cavaliere: "Norman Cavaliere"
 a_nd_tws_norman_cavaliere_desc: "Armored knights in the Norman tradition, these heavy cavalrymen descend from the warriors who conquered southern Italy and Sicily in the 11th century. Their charge remains devastating."
 a_nd_tws_tercio_napolitano: "Tercio Napolitano"
 a_nd_tws_tercio_napolitano_desc: "Disciplined infantry of the Neapolitan tercio, combining pikemen and arquebusiers in the formidable Spanish formation that dominated European warfare for over a century."
 n_nd_tws_galeazza_reale: "Galeazza Reale"
 n_nd_tws_galeazza_reale_desc: "A heavy war galley of the Two Sicilies fleet, larger and more heavily armed than standard Mediterranean galleys, designed to project power across the contested waters of the central Mediterranean."
 n_nd_tws_fregata_reale: "Fregata Reale"
 n_nd_tws_fregata_reale_desc: "A fast sailing frigate of the Bourbon Royal Navy, lighter than a ship of the line but swift enough to patrol the kingdom's extensive coastline and protect its merchant fleet."
 nd_tws_torre_costiera: "Torre Costiera"
 nd_tws_torre_costiera_desc: "A coastal watchtower in the tradition of the torri costiere that dot the shorelines of Sicily and southern Italy — part of an integrated defense network that uses fire and smoke signals to warn of approaching corsair raids."
 nd_tws_masseria: "Masseria"
 nd_tws_masseria_desc: "A fortified agricultural estate of the Mezzogiorno, combining farmland, livestock pens, and defensive walls into a self-sufficient economic unit that has fed the Mediterranean for centuries."
 nd_tws_reale_seteria: "Reale Seteria"
 nd_tws_reale_seteria_desc: "A royal silk manufactory in the tradition of San Leucio, where skilled weavers produce fine silk cloth to rival the best workshops of Lyon and Florence."
 nd_tws_torre_garrison: "Torre Garrison"
 nd_tws_torre_garrison_desc: "A small garrison maintains the watchtower, keeping weapons ready and signal fires prepared against corsair incursions."
 nd_tws_grain_export: "Grain Export Trade"
 nd_tws_grain_export_desc: "The masseria's surplus grain and olive oil are processed and packaged for export across the Mediterranean, converting raw agricultural abundance into commercial wealth."
 nd_tws_silk_weaving: "Silk Weaving"
 nd_tws_silk_weaving_desc: "Master weavers transform raw silk and precious dyes into fine cloth of exceptional quality, continuing a tradition that stretches back to the Norman capture of Byzantine silk workers."
 levy_nd_tws_norman_cavaliere: "Norman Cavaliere Levy"
 levy_nd_tws_norman_cavaliere_desc: "Feudal cavalry raised from the Norman noble families of the Mezzogiorno, answering the royal call to arms as their ancestors have done since the days of Roger de Hauteville."
 nd_tws_formed_tt: "Two Sicilies has been formed"
 nd_tws_path_a_tt: "Chose Crown of the Mezzogiorno"
 nd_tws_path_b_tt: "Chose Crossroads of the Mediterranean"
 nd_tws_destiny: "Destiny of the Two Sicilies"
 nd_tws_destiny_desc: "The Kingdom of the Two Sicilies has been forged. Now its rulers must prove worthy of the crown by bringing stability to this fractious but fertile realm."
 nd_tws_dest_crown_south: "Crown of the South"
 nd_tws_dest_crown_south_desc: "Like the Hohenstaufen emperors before us, we shall extend our authority northward. Rome, the Eternal City, must acknowledge the power of the southern crown. Seize Rome and build an army worthy of our ambitions."
 nd_tws_dest_peninsula: "Master of the Peninsula"
 nd_tws_dest_peninsula_desc: "With Rome secured, the road to central Italy lies open. Florence, jewel of Tuscany, must fall under our dominion. Develop our lands and expand our forces to match the great northern powers."
 nd_tws_dest_rex_italiae: "Rex Italiae"
 nd_tws_dest_rex_italiae_desc: "The ultimate prize: dominion over all of Italy. Take Milano, the seat of the Iron Crown, and Genoa, the gateway to the western Mediterranean. Only then can the Two Sicilies claim the title of King of Italy."
 nd_tws_dest_mare_nostrum: "Mare Nostrum"
 nd_tws_dest_mare_nostrum_desc: "The Normans of Sicily once ruled from Palermo to Tunis. We shall reclaim that maritime legacy. Seize Tunis and establish silk as a cornerstone of our Mediterranean trade network."
 nd_tws_dest_ionian_routes: "Ionian Trade Routes"
 nd_tws_dest_ionian_routes_desc: "Control of Corfu commands the passage between the Adriatic and the wider Mediterranean. With modern banking institutions and overflowing coffers, our merchants can dominate the Ionian trade routes."
 nd_tws_dest_emporium: "Emporium of the Mediterranean"
 nd_tws_dest_emporium_desc: "From Sardinia to Crete, from Naples to Tunis, our trading houses span the entire Mediterranean. This is the culmination of our maritime destiny -- a commercial empire rivaling Venice and Genoa at their height."
 nd_tws.4.t: "The Destiny of Two Kingdoms"
 nd_tws.4.d: "The Two Sicilies stand united and stable. The ancient kingdoms of Naples and Sicily, once divided by the narrow Strait of Messina and the wider gulf of rival ambitions, now march together under one banner. The question before us is no longer whether we can survive, but what we shall become.\n\nThe Mezzogiorno is rich in grain, silk, and olive oil. Our ports command the central Mediterranean. Our people carry the blood and traditions of every civilization that has touched these shores. The foundations are laid. Now we must build upon them."
 nd_tws.4.a: "Our destiny awaits."
 nd_tws.5.t: "The Southern Crown Claims Rome"
 nd_tws.5.d: "Rome has fallen under our authority. For the first time since Frederick II wore both the imperial and Sicilian crowns, a southern Italian power holds the Eternal City. The Pope may protest, the northern states may tremble, but the message is clear: the Two Sicilies are no mere regional kingdom.\n\nOur soldiers have proven their worth, and our administrators are already extending royal law into the newly acquired territories. The north watches with growing unease."
 nd_tws.5.a: "Let Rome learn who rules Italy now."
 nd_tws.6.t: "The Iron Crown or the Senate"
 nd_tws.6.d: "Florence has submitted to the southern crown. The fertile lands of Tuscany, the workshops of the Arno valley, and the banking houses of the Medici's city now serve our kingdom. Central Italy is ours.\n\nBut as we push further north, we face a choice. Shall we march with the speed and force that carried the Normans from Hauteville to Palermo -- emphasizing military mobility and the feudal levy that is our kingdom's martial backbone? Or shall we follow the Roman model -- assimilating conquered peoples, developing their lands, and building a lasting empire through prosperity rather than the sword alone?"
 nd_tws.6.a: "March north under the Iron Crown."
 nd_tws.6.b: "Build as the Romans built."
 nd_tws.7.t: "Rex Italiae"
 nd_tws.7.d: "Milano has fallen. Genoa has opened its gates. From the Alps to Sicily, from the Adriatic to the Tyrrhenian, Italy is united under the crown of the Two Sicilies. Not since the days of the Roman Empire has the peninsula known a single master, and we have achieved this from the south -- from the very lands that others dismissed as a backward Mezzogiorno.\n\nFrederick II, the Stupor Mundi who amazed the world from his Sicilian court, would recognize what we have built. But how shall we consolidate this vast domain? Through the martial prestige that won it, standing as a great military power that none dare challenge? Or through investment in the land itself, making Italy the most productive and prosperous kingdom in Europe?"
 nd_tws.7.a: "We are the Stupor Mundi reborn."
 nd_tws.7.b: "Let the Mezzogiorno feed all Italy."
 nd_tws.8.t: "The Normans Return to Africa"
 nd_tws.8.d: "Tunis is ours. Count Roger of Sicily first raided these coasts in the 11th century; now we hold them permanently. The granary of Rome, the gateway to the Saharan trade, and the key to controlling the narrow waist of the Mediterranean -- all belong to the Two Sicilies.\n\nOur galleys patrol the waters between Sicily and Ifriqiya. Corsair raids against our coasts will become a memory. And with silk flowing through our markets, the commercial foundations of our maritime empire are firmly established."
 nd_tws.8.a: "The sea between our shores is ours."
 nd_tws.9.t: "Dominion over the Ionian Sea"
 nd_tws.9.d: "With Corfu in our hands, we command the strait that separates the Adriatic from the Ionian Sea. Every ship passing between Venice and the eastern Mediterranean must sail under the watchful eyes of our fortresses. Our banking institutions are the envy of the south, and our treasury overflows.\n\nShall we use this position to build naval supremacy -- dominating the Adriatic and projecting power across the eastern Mediterranean, even at the cost of neglecting our land forces? Or shall we become the great intermediary, the silk road of the sea, where every trade route converges and every merchant finds profit?"
 nd_tws.9.a: "Command the seas by force."
 nd_tws.9.b: "Let commerce flow through our ports."
 nd_tws.10.t: "Emporium of the Mediterranean"
 nd_tws.10.d: "From Sardinia to Crete, from the Strait of Messina to the shores of Ifriqiya, the Two Sicilies have built a commercial empire that spans the entire central and eastern Mediterranean. Our fondaci -- the great merchant houses established in every major port -- handle a volume of trade that rivals the golden age of Venice.\n\nThe question now is whether we press our advantage at sea, building an unchallengeable navy that secures these routes against all rivals, or consolidate our gains through financial institutions and diplomatic networks that make our merchants welcome in every port from Barcelona to Alexandria."
 nd_tws.10.a: "Our fleet shall rule these waters."
 nd_tws.10.b: "Wealth is the truest power."
 STATIC_MODIFIER_NAME_nd_tws_dest_iron_crown: "March of the Iron Crown"
 STATIC_MODIFIER_DESC_nd_tws_dest_iron_crown: "The southern armies march with the speed and determination that once carried Norman knights from Calabria to the gates of Rome. Our levies swell with men eager to serve the crown of Italy."
 STATIC_MODIFIER_NAME_nd_tws_dest_roman_legacy: "Legacy of the Caesars"
 STATIC_MODIFIER_DESC_nd_tws_dest_roman_legacy: "Like the Romans who first united Italy, we assimilate conquered peoples into our realm, developing their lands and building prosperity that transcends conquest."
 STATIC_MODIFIER_NAME_nd_tws_dest_stupor_mundi: "Stupor Mundi"
 STATIC_MODIFIER_DESC_nd_tws_dest_stupor_mundi: "The Amazement of the World -- a title once given to Frederick II -- now belongs to the kingdom he loved best. Our military prestige commands respect across Europe, though our navy suffers from neglect."
 STATIC_MODIFIER_NAME_nd_tws_dest_mezzogiorno_ascendant: "Mezzogiorno Ascendant"
 STATIC_MODIFIER_DESC_nd_tws_dest_mezzogiorno_ascendant: "The south rises. Investment in raw materials, infrastructure, and population growth transforms the Mezzogiorno from Italy's poorest region into its most productive."
 STATIC_MODIFIER_NAME_nd_tws_dest_adriatic_dominion: "Adriatic Dominion"
 STATIC_MODIFIER_DESC_nd_tws_dest_adriatic_dominion: "Our warships dominate the Adriatic and Ionian seas. Every merchant vessel sailing these waters does so with our permission, though our commitment to naval power strains our ability to maintain land forces."
 STATIC_MODIFIER_NAME_nd_tws_dest_silk_road_sea: "Silk Road of the Sea"
 STATIC_MODIFIER_DESC_nd_tws_dest_silk_road_sea: "Our ports have become the great entrepot of the Mediterranean, where silk, spices, and intelligence flow freely. The wealth brings comfort -- perhaps too much comfort."
 STATIC_MODIFIER_NAME_nd_tws_dest_thalassocracy: "Sicilian Thalassocracy"
 STATIC_MODIFIER_DESC_nd_tws_dest_thalassocracy: "The Two Sicilies have achieved what Venice and Genoa only dreamed of -- true maritime supremacy across the central Mediterranean, with the reach to project power to distant shores."
 STATIC_MODIFIER_NAME_nd_tws_dest_emporium_mundi: "Emporium Mundi"
 STATIC_MODIFIER_DESC_nd_tws_dest_emporium_mundi: "The marketplace of the world. Our banking houses offer the best rates, our diplomatic connections open every door, and our careful management of trade keeps inflation firmly in check."
 nd_tws_reggia: "Reggia Reale"
 nd_tws_reggia_desc: "A magnificent royal palace in the tradition of the Reggia di Caserta -- a seat of centralized power from which the king administers his vast Italian domains, rivaling Versailles in grandeur and ambition."
 nd_tws_reggia_court: "Royal Court Administration"
 nd_tws_reggia_court_desc: "A staff of scribes, courtiers, and administrators maintains the elaborate bureaucracy of the centralized Italian kingdom from the royal palace."
 nd_tws_fondaco: "Fondaco dei Mercanti"
 nd_tws_fondaco_desc: "A grand merchant trading house in the tradition of the Venetian fondaci -- a fortified warehouse, exchange, and customs house combined, serving as the hub of Mediterranean commerce in our ports."
 nd_tws_fondaco_trade: "Mediterranean Exchange"
 nd_tws_fondaco_trade_desc: "Clerks manage bills of exchange, customs officers process goods, and brokers negotiate deals between merchants from across the Mediterranean world."
