l_english:
 STATIC_MODIFIER_NAME_nd_sword_of_the_sultanate: "Sword of the Sultanate"
 STATIC_MODIFIER_DESC_nd_sword_of_the_sultanate: "The Sultan commands the mightiest cavalry in all of Hindustan. Forged in the traditions of the Mamluk guard and the Khalji conquests, the armies of Delhi sweep across the plains with iron discipline and overwhelming force."
 STATIC_MODIFIER_NAME_nd_throne_of_hindustan: "Throne of Hindustan"
 STATIC_MODIFIER_DESC_nd_throne_of_hindustan: "From the seat of Delhi, the Sultan presides over a vast administration that bridges Persian refinement and Indian abundance. The court attracts scholars, poets, and merchants from across the Islamic world, and the diverse peoples of Hindustan find common purpose under enlightened governance."
 STATIC_MODIFIER_NAME_nd_khalji_market_discipline: "Khalji Market Discipline"
 STATIC_MODIFIER_DESC_nd_khalji_market_discipline: "The state enforces strict price controls on grain, cloth, and horses, enabling the maintenance of a massive standing army at manageable cost."
 STATIC_MODIFIER_NAME_nd_iqta_centralization: "Iqta Centralization"
 STATIC_MODIFIER_DESC_nd_iqta_centralization: "The systematic audit and redistribution of iqta land grants strengthens the crown's direct control over provincial revenues and weakens the autonomy of local governors."
 STATIC_MODIFIER_NAME_nd_suri_imperial_highway: "Suri Imperial Highway"
 STATIC_MODIFIER_DESC_nd_suri_imperial_highway: "The expansion of the Grand Trunk Road and construction of sarais along its length has transformed overland commerce, connecting Bengal to the Indus in a continuous ribbon of trade."
 nd_dlh.1.t: "The Sultanate Restored"
 nd_dlh.1.d: "Delhi stands once more as the seat of Muslim sovereignty over Hindustan. From the Red Fort to the Qutb Minar, the city's skyline proclaims the power of the Sultan who has reunited these vast domains. The question now is what kind of sultanate this shall be. The martial traditions of the Khalji and Lodi dynasties beckon — an empire built on cavalry charges and the sharp edge of conquest. But so too does the vision of the Tughlaq administrators — a realm where Persian learning meets Indian wealth, where diverse peoples are governed through sophisticated bureaucracy rather than the sword alone. The Sultan must choose the path that will define this new era.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_dlh.1.a: "Let the cavalry thunder across the Gangetic plains!"
 nd_dlh.1.b: "We shall build an empire of administration and culture."
 nd_dlh.2.t: "The Sultan's Market Reforms"
 nd_dlh.2.d: "In the manner of Sultan Alauddin Khalji, the state has imposed sweeping price controls across the markets of Delhi. Three separate markets have been established — one for grain, one for cloth and manufactured goods, and one for horses, cattle, and slaves. Each is supervised by a shahna-i-mandi who reports directly to the intelligence service. Spies mingle among the merchants to ensure compliance. The purpose is clear: by fixing the price of grain at artificially low levels, soldiers can be paid modest salaries while still affording to feed their families. The result is a standing army of unprecedented size — historical accounts claim over 475,000 horsemen under Khalji's banner. Yet such controls breed resentment among merchants and farmers alike."
 nd_dlh.2.a: "Enforce the controls — the army must be fed."
 nd_dlh.2.b: "Loosen the markets — stability through prosperity."
 nd_dlh.3.t: "The Iqta System"
 nd_dlh.3.d: "The iqta system, inherited from earlier Islamic states, has become the backbone of Sultanate administration. Iqtadars — military commanders granted revenue-collecting authority over designated lands — serve as both provincial governors and local military commanders. Under Sultan Iltutmish, these grants were made temporary and transferable, preventing the emergence of a landed hereditary aristocracy that might challenge the throne. The Sultan now faces a choice: tighten central control by demanding rigorous audits and frequent transfers, strengthening the crown but risking the loyalty of the military elite — or allow iqtas to become more stable, rewarding faithful service with security of tenure."
 nd_dlh.3.a: "Centralize — the Sultan's writ must be absolute."
 nd_dlh.3.b: "Let the iqtadars prosper in their domains."
 nd_dlh.4.t: "The Imperial Sarais"
 nd_dlh.4.d: "In the tradition of Sher Shah Suri, the state has embarked on a massive program of infrastructure development along the great trunk roads of Hindustan. Every four miles, a sarai has been constructed — a walled compound providing shelter, food, and fresh horses to travelers. Each sarai contains a mosque, separate quarters for Hindu and Muslim travelers, a well, and stables. The total network exceeds 1,700 sarais, transforming what were once perilous journeys through bandit-infested countryside into routine commerce. Merchants report that goods can now travel from Sonargaon in Bengal to the Indus frontier in weeks rather than months."
 nd_dlh.4.a: "Expand the highway network further."
 nd_dlh.4.b: "The roads are built — now let trade flow."
 nd_dlh_mamluk_tradition: "Mamluk Guard Tradition"
 nd_dlh_mamluk_tradition_desc: "The institution of training enslaved youths as elite mounted warriors, inherited from the Abbasid and Ghurid traditions, produced the Sultanate's most fearsome cavalry."
 nd_dlh_iqta_system: "Iqta Land Grants"
 nd_dlh_iqta_system_desc: "The assignment of revenue-collecting rights over designated territories to military commanders in lieu of salary — the administrative foundation of the Sultanate."
 nd_dlh_sultanate_madrasas: "Sultanate Madrasas"
 nd_dlh_sultanate_madrasas_desc: "Centres of Islamic learning established across the Sultanate, teaching jurisprudence, theology, grammar, and the sciences. Many were endowed by sultans and nobles as acts of piety."
 nd_dlh_military_secretariat: "Military Secretariat"
 nd_dlh_military_secretariat_desc: "The Diwan-i-Arz maintained detailed rolls of every soldier in the Sultan's service, recording their appearance, their horses' brands, and their assigned equipment to prevent fraud."
 nd_dlh_khalji_market_controls: "Khalji Market Controls"
 nd_dlh_khalji_market_controls_desc: "The system of state-regulated markets and fixed prices instituted by Sultan Alauddin Khalji, enabling the maintenance of the largest standing army in medieval India."
 nd_dlh_tughlaq_fortifications: "Tughlaq Fortifications"
 nd_dlh_tughlaq_fortifications_desc: "The austere but massive rubble-masonry fortresses built during the Tughlaq dynasty, characterized by sloping walls, battered ramparts, and a focus on military function over decoration."
 nd_dlh_hasham_levies: "Hasham Levy System"
 nd_dlh_hasham_levies_desc: "The conscription of common infantry — the hasham — drawn from Hindu and Muslim peasants alike, trained and paid in cash rather than through land grants."
 nd_dlh_royal_karkhanas: "Royal Karkhanas"
 nd_dlh_royal_karkhanas_desc: "State-owned workshops producing arms, textiles, and luxury goods for the court and the army. Master craftsmen from across the Islamic world were recruited to work in these facilities."
 nd_dlh_barqandaz_tradition: "Barqandaz Tradition"
 nd_dlh_barqandaz_tradition_desc: "The mounted archers of the later Sultanate, skilled in rapid maneuver and harassing fire from horseback, drawing on Central Asian steppe warfare traditions."
 nd_dlh_sultanate_currency: "Sultanate Currency"
 nd_dlh_sultanate_currency_desc: "The standardization of coinage under the Delhi Sultans, culminating in Sher Shah Suri's silver rupiya — a coin so well-designed it became the basis of India's monetary system for centuries."
 nd_dlh_delhi_urbanization: "Delhi Urbanization"
 nd_dlh_delhi_urbanization_desc: "The transformation of Delhi into one of the world's great cities, with Ibn Battuta describing it in 1334 as the largest city in the entire Muslim world."
 nd_dlh_dagh_o_chehra: "Dagh-o-Chehra"
 nd_dlh_dagh_o_chehra_desc: "The military registration system of branding horses (dagh) and maintaining descriptive rolls of soldiers (chehra) to prevent payroll fraud and ensure martial readiness."
 nd_dlh_topchi_artillery: "Topchi Artillery Corps"
 nd_dlh_topchi_artillery_desc: "The adoption of gunpowder artillery by the Delhi Sultanate, drawing on Central Asian and Ottoman traditions. Topchi gunners served alongside traditional cavalry in the later Sultanate's armies."
 nd_dlh_suri_sarais: "Suri Sarais"
 nd_dlh_suri_sarais_desc: "The vast network of roadside rest houses built by Sher Shah Suri along the Grand Trunk Road, providing shelter, food, and security for travelers and merchants across the subcontinent."
 nd_dlh_suri_administrative_reform: "Suri Administrative Reform"
 nd_dlh_suri_administrative_reform_desc: "The reorganization of provincial government under Sher Shah Suri, dividing the empire into sarkars and parganas with systematic revenue assessment and professional administration."
 nd_dlh_indo_islamic_architecture: "Indo-Islamic Architecture"
 nd_dlh_indo_islamic_architecture_desc: "The distinctive fusion of Persian and Indian architectural traditions, from the pointed arches and geometric calligraphy of the Khalji era to the double domes and Bangla roofing of the Lodis."
 nd_dlh_suri_military_reform: "Suri Military Reform"
 nd_dlh_suri_military_reform_desc: "Sher Shah Suri's reorganization of the army into a disciplined, centrally-paid force with standardized equipment, replacing the feudal levy system with professional infantry."
 nd_dlh_grand_trunk_expansion: "Grand Trunk Expansion"
 nd_dlh_grand_trunk_expansion_desc: "The continued development of Hindustan's road network, with shade trees, milestones, and bridges connecting the empire's far-flung provinces to the capital."
 nd_dlh_centralized_revenue: "Centralized Revenue"
 nd_dlh_centralized_revenue_desc: "The systematic measurement and assessment of agricultural land across the Sultanate, replacing estimate-based taxation with survey-based revenue extraction."
 nd_dlh_reformed_sultanate_army: "Reformed Sultanate Army"
 nd_dlh_reformed_sultanate_army_desc: "The modernization of Delhi's military forces, integrating European-influenced drill and tactics with the Sultanate's traditional cavalry and artillery traditions."
 nd_dlh_industrial_karkhanas: "Industrial Karkhanas"
 nd_dlh_industrial_karkhanas_desc: "The transformation of the Sultanate's royal workshops from court artisan operations into proto-industrial manufacturing centers, producing textiles, arms, and finished goods at scale."
 nd_dlh_legacy_of_synthesis: "Legacy of Synthesis"
 nd_dlh_legacy_of_synthesis_desc: "The enduring achievement of the Delhi Sultanate — the creation of a composite Indo-Islamic civilization that synthesized Persian, Turkish, Arabic, and Indian traditions into something greater than any single source."
 a_nd_dlh_mamluk_guard: "Mamluk Guard Cavalry"
 a_nd_dlh_mamluk_guard_desc: "Elite mounted warriors trained from youth in the Central Asian tradition, forming the Sultan's personal guard and the shock force of the Sultanate's armies."
 a_nd_dlh_hasham_infantry: "Hasham Infantry"
 a_nd_dlh_hasham_infantry_desc: "Conscripted foot soldiers drawn from the peasant population and paid in cash. Though less prestigious than the cavalry, their numbers gave the Sultanate its manpower advantage."
 a_nd_dlh_barqandaz: "Barqandaz"
 a_nd_dlh_barqandaz_desc: "Swift mounted archers specializing in harassing fire and rapid pursuit, employing Central Asian steppe tactics on the plains of Hindustan."
 a_nd_dlh_topchi: "Topchi"
 a_nd_dlh_topchi_desc: "Gunpowder artillerymen who crewed the Sultan's cannon batteries, drawn from a mix of Central Asian, Ottoman, and native traditions."
 a_nd_dlh_suri_piyada: "Suri Piyada"
 a_nd_dlh_suri_piyada_desc: "Disciplined infantrymen of the Suri era, drilled and equipped to a professional standard, representing a shift from feudal levy to standing army."
 levy_nd_dlh_hasham: "Hasham Levy"
 levy_nd_dlh_hasham_desc: "Conscripted peasant infantry raised through the Sultanate's cash-payment levy system, providing the mass of foot soldiers that supported the elite cavalry."
 nd_dlh_tughlaqabad_fortress: "Tughlaqabad Fortress"
 nd_dlh_tughlaqabad_fortress_desc: "A massive fortification built in the austere Tughlaq style, with sloping rubble-masonry walls and battered ramparts designed to withstand siege warfare."
 nd_dlh_sarai: "Sarai"
 nd_dlh_sarai_desc: "A walled roadside rest house providing food, shelter, and fresh horses for travelers and merchants along the trunk routes of the empire."
 nd_dlh_madrasa: "Madrasa"
 nd_dlh_madrasa_desc: "An Islamic seminary teaching jurisprudence, theology, and the sciences, serving as a center of learning and a training ground for the Sultanate's administrative class."
 nd_dlh_karkhana: "Royal Karkhana"
 nd_dlh_karkhana_desc: "A state-owned workshop where master craftsmen produce arms, fine textiles, and luxury goods for the Sultan's court and armies."
 nd_dlh_diwan_i_arz: "Diwan-i-Arz"
 nd_dlh_diwan_i_arz_desc: "The military secretariat responsible for maintaining muster rolls, branding cavalry horses, and ensuring the readiness and discipline of the Sultan's armed forces."
 nd_dlh_fortress_maintenance: "Fortress Upkeep"
 nd_dlh_fortress_maintenance_desc: "Stone for ongoing repairs, weaponry for the garrison, and tools for the engineers who maintain the rubble-masonry ramparts."
 nd_dlh_sarai_provisions: "Sarai Provisions"
 nd_dlh_sarai_provisions_desc: "Grain and livestock to feed travelers and supply fresh mounts, with salt to preserve provisions along the trunk routes."
 nd_dlh_madrasa_endowment: "Madrasa Endowment"
 nd_dlh_madrasa_endowment_desc: "Paper for manuscripts and scholarly correspondence, and cloth for the robes of teachers and students endowed by the waqf."
 nd_dlh_karkhana_inputs: "Karkhana Materials"
 nd_dlh_karkhana_inputs_desc: "Craftsmen weave imported cloth and dyes into fine textiles for the Sultan's court."
 nd_dlh_diwan_administration: "Diwan Administration"
 nd_dlh_diwan_administration_desc: "Paper for muster rolls and descriptive registers, silver for soldier pay, and cloth for standard-issue equipment supplied through the military secretariat."
 nd_dlh_sultanate_minting: "Sultanate Minting"
 nd_dlh_sultanate_minting_desc: "Skilled mintsmen strike standardized silver and copper coinage, producing precious metalwork for the Sultanate's treasury."
 nd_dlh_formed_tt: "Delhi has been formed"
 nd_dlh_path_a_tt: "Chose Sword of the Sultanate"
 nd_dlh_path_b_tt: "Chose Throne of Hindustan"
 nd_dlh_destiny: "Destiny of Delhi"
 nd_dlh_destiny_desc: "The Sultanate of Delhi stands restored. Now begins the work of shaping its future — whether through the sword or through the pen. Achieve stability to unlock your chosen destiny path."
 nd_dlh_dest_deccan_conquest: "Deccan Conquest"
 nd_dlh_dest_deccan_conquest_desc: "The Bahmani plateau and the rich cities of the Deccan have long resisted Delhi's authority. Bring Gulbarga and Bidar under the Sultan's banner, as Alauddin Khalji once dreamed, and raise an army worthy of the enterprise."
 nd_dlh_dest_subjugate_south: "Subjugate the South"
 nd_dlh_dest_subjugate_south_desc: "With the northern Deccan secured, the Sultan's gaze turns to the great Hindu kingdoms of the south. Warangal and Vijayanagar must fall. Build a realm vast enough to sustain the campaign."
 nd_dlh_dest_sultan_of_all_india: "Sultan of All India"
 nd_dlh_dest_sultan_of_all_india_desc: "From the Himalayas to Cape Comorin, from the Indus to the Bay of Bengal — the Sultan's writ must run unchallenged. Take Madurai, Goa, and Surat. Command the mightiest army and the richest treasury in all the subcontinent."
 nd_dlh_dest_bengal_integration: "Bengal Integration"
 nd_dlh_dest_bengal_integration_desc: "Bengal, the wealthiest province in all of Hindustan, has been governed as a distant frontier for too long. Bring Gaur and Sonargaon under direct imperial administration and harness the region's silk and rice wealth."
 nd_dlh_dest_institutional_zenith: "Institutional Zenith"
 nd_dlh_dest_institutional_zenith_desc: "The Sultan's administration must extend its reach to the great trading cities of western India. Bring Khambat and Ujjain into the imperial fold, fill the treasury, and develop the realm beyond the formation core."
 nd_dlh_dest_beacon_of_hindustan: "Beacon of Hindustan"
 nd_dlh_dest_beacon_of_hindustan_desc: "The Sultanate must become the greatest administrative state the subcontinent has ever known. Secure the port of Chittagong, attain the highest prestige, and develop the realm to its full potential."
 nd_dlh.5.t: "The Destiny of Delhi"
 nd_dlh.5.d: "The Sultanate has been restored, and with it the promise of a future worthy of Delhi's ancient grandeur. The Sultan must now chart the course that will carry this empire through the ages. The path is chosen — now it must be walked."
 nd_dlh.5.a: "Delhi shall endure."
 nd_dlh.6.t: "The March into the Deccan"
 nd_dlh.6.d: "The Sultan's armies have crossed the Vindhya Range and brought the cities of the Deccan to heel. Gulbarga and Bidar, seats of the Bahmani sultans, now fly Delhi's standard. The Deccan campaigns of Alauddin Khalji have been replicated — and this time, the gains shall be permanent. The wealth of the plateau flows north to Delhi, and the Hindu kingdoms of the south watch with growing alarm."
 nd_dlh.6.a: "The Deccan bows to Delhi."
 nd_dlh.7.t: "The Southern Campaigns"
 nd_dlh.7.d: "Warangal has fallen. The rubies of the Kakatiya treasury have been carted north. And most remarkably, the mighty citadel of Vijayanagar — that last great bastion of Hindu resistance — has submitted to the Sultan's authority. The southern campaigns have proven the Sultanate's military supremacy beyond any doubt. Now the Sultan must decide how to consolidate these vast new conquests."
 nd_dlh.7.a: "March with war elephants at the vanguard."
 nd_dlh.7.b: "Crush resistance utterly — leave nothing."
 nd_dlh.8.t: "Sultan of All India"
 nd_dlh.8.d: "From the snowy passes of Kashmir to the temple cities of the Tamil coast, from the wharves of Surat to the mangrove swamps of the Sundarbans — the Sultan's writ runs unchallenged across the entire subcontinent. No ruler since Ashoka has commanded such a domain. The question that now defines the empire is whether this universal sovereignty should be maintained through perpetual holy war, or whether the Sultan should seek a lasting peace among the peoples of India."
 nd_dlh.8.a: "The ghazi sword must never rest."
 nd_dlh.8.b: "Let the peoples of India know peace."
 nd_dlh.9.t: "The Wealth of Bengal"
 nd_dlh.9.d: "The Sultan's administrators have completed the integration of Bengal into the imperial system. Gaur, that ancient capital of the Bengal sultans, and Sonargaon, the great emporium of the eastern delta, are now directly governed provinces of the Sultanate. Bengali silk, muslin, and rice flow west along the Grand Trunk Road, enriching the treasury and feeding the cities of Hindustan. The empire's economic center of gravity has shifted eastward."
 nd_dlh.9.a: "Bengal enriches the whole realm."
 nd_dlh.10.t: "The Institutional Zenith"
 nd_dlh.10.d: "The Sultanate's administration has reached an unprecedented level of sophistication. With the trading cities of Gujarat under imperial control, revenue flows from every corner of the subcontinent to Delhi. The madrasas produce a steady stream of trained administrators, and the sarkar system ensures that the Sultan's edicts are enforced from the Indus to the Brahmaputra. The question now is whether to pursue this administrative excellence through spiritual harmony or through systematic revenue extraction."
 nd_dlh.10.a: "Embrace the Sufi path of tolerance."
 nd_dlh.10.b: "Commission a comprehensive revenue survey."
 nd_dlh.11.t: "Beacon of Hindustan"
 nd_dlh.11.d: "The Sultanate of Delhi has become what the Tughlaq emperors only dreamed of — a state whose administrative reach, cultural sophistication, and economic power are unmatched anywhere in the world. Scholars from Cairo to Samarkand journey to Delhi to study its systems of governance. The Sultan presides over a cosmopolitan court where Persian poetry and Sanskrit philosophy exist side by side, where Hindu temple mathematics informs Islamic astronomical tables, and where the diverse peoples of the subcontinent have found a shared identity under the banner of enlightened sovereignty."
 nd_dlh.11.a: "Foster a cosmopolitan court for all peoples."
 nd_dlh.11.b: "Endow waqf foundations across the realm."
 STATIC_MODIFIER_NAME_nd_dlh_dest_war_elephants: "War Elephants of the Sultan"
 STATIC_MODIFIER_DESC_nd_dlh_dest_war_elephants: "The captured war elephants of the southern kingdoms now form the vanguard of the Sultan's armies, though their rampaging charges leave devastation in their wake."
 STATIC_MODIFIER_NAME_nd_dlh_dest_scorched_earth: "Scorched Earth Policy"
 STATIC_MODIFIER_DESC_nd_dlh_dest_scorched_earth: "Ruthless suppression of resistance across the Deccan ensures compliance, though the methods employed tarnish the Sultan's reputation."
 STATIC_MODIFIER_NAME_nd_dlh_dest_ghazi_tradition: "Ghazi Tradition"
 STATIC_MODIFIER_DESC_nd_dlh_dest_ghazi_tradition: "The Sultan claims the title of ghazi — warrior of the faith — and perpetual expansion becomes the empire's raison d'etre, though constant warfare strains the treasury."
 STATIC_MODIFIER_NAME_nd_dlh_dest_pax_sultanica: "Pax Sultanica"
 STATIC_MODIFIER_DESC_nd_dlh_dest_pax_sultanica: "With all of India under one banner, the Sultan inaugurates an era of internal peace and religious accommodation, though the cessation of conquest breeds complacency among the ruling class."
 STATIC_MODIFIER_NAME_nd_dlh_dest_sufi_tolerance: "Sufi Tolerance"
 STATIC_MODIFIER_DESC_nd_dlh_dest_sufi_tolerance: "The mystical traditions of Sufism bridge the divide between Muslim rulers and Hindu subjects, fostering commercial trust and diplomatic goodwill, though the emphasis on harmony makes the court reluctant to wage war."
 STATIC_MODIFIER_NAME_nd_dlh_dest_revenue_survey: "Imperial Revenue Survey"
 STATIC_MODIFIER_DESC_nd_dlh_dest_revenue_survey: "A comprehensive survey of every field, workshop, and market stall in the empire provides the foundation for systematic taxation, strengthening provincial loyalty but diverting resources from intelligence gathering."
 STATIC_MODIFIER_NAME_nd_dlh_dest_cosmopolitan_court: "Cosmopolitan Court"
 STATIC_MODIFIER_DESC_nd_dlh_dest_cosmopolitan_court: "Delhi's court becomes a beacon for scholars, diplomats, and poets from across the known world, expanding the Sultanate's diplomatic reach and influence."
 STATIC_MODIFIER_NAME_nd_dlh_dest_waqf_endowments: "Waqf Endowments"
 STATIC_MODIFIER_DESC_nd_dlh_dest_waqf_endowments: "Vast charitable endowments fund mosques, hospitals, and caravanserais across the empire, strengthening the bond between ruler and ruled through pious generosity."
 nd_dlh_dar_al_shuja: "Dar al-Shuja'a"
 nd_dlh_dar_al_shuja_desc: "The House of the Brave — an elite military academy where the Sultan's finest warriors are trained in horsemanship, siege craft, and the art of commanding armies across the vast distances of the subcontinent."
 nd_dlh_dar_al_shuja_maintenance: "Academy Upkeep"
 nd_dlh_dar_al_shuja_maintenance_desc: "Weapons for training, horses for the cavalry drills, and leather for armor and saddlery keep the academy operational."
 nd_dlh_firuzabad_complex: "Firuzabad Complex"
 nd_dlh_firuzabad_complex_desc: "A grand administrative and cultural complex modeled on the vision of Firuz Shah Tughlaq, housing libraries, observatories, and the offices of the imperial bureaucracy."
 nd_dlh_firuzabad_maintenance: "Complex Administration"
 nd_dlh_firuzabad_maintenance_desc: "Paper for records and correspondence, fine cloth for court furnishings, furniture for the administrative offices, and glass for the observatory windows."
