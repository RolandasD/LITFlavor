l_english:
 NZO: "Nanzhao"
 NZO_ADJ: "Nanzhao"
 NZO_f: "Nanzhao"
 NZO_f_desc: "Nanzhao was the great Bai and Yi kingdom centered on Lake Erhai in Yunnan, uniting the six zhao under a single throne from 738 to 902 CE. At its height it rivaled the Tang dynasty, conquering southern Sichuan, western Guizhou, and the Pyu city-states of upper Burma. A restored Nanzhao would reclaim this multi-ethnic highland empire spanning the crossroads between China, Tibet, and Southeast Asia."
