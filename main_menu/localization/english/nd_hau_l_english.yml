l_english:
 STATIC_MODIFIER_NAME_nd_hau_walls_of_amina: "Walls of Amina"
 STATIC_MODIFIER_DESC_nd_hau_walls_of_amina: "In the tradition of Queen Amina of Zazzau, we shall expand our domain through force of arms, building walls around every city we conquer and securing the trade routes with cavalry and iron."
 STATIC_MODIFIER_NAME_nd_hau_crossroads_of_the_sahel: "Crossroads of the Sahel"
 STATIC_MODIFIER_DESC_nd_hau_crossroads_of_the_sahel: "The wealth of nations flows through our markets. From the gold fields of the south to the salt mines of the Sahara, every caravan that crosses the Sahel enriches our coffers and spreads our fame."
 STATIC_MODIFIER_NAME_nd_hau_chronicle_of_kings: "Chronicle of Kings"
 STATIC_MODIFIER_DESC_nd_hau_chronicle_of_kings: "The written record of our history lends authority to our dynasty and inspires pride in our people. Our deeds are set down for posterity."
 STATIC_MODIFIER_NAME_nd_hau_rumfa_reforms: "Rumfa's Enlightenment"
 STATIC_MODIFIER_DESC_nd_hau_rumfa_reforms: "Following the model of Muhammad Rumfa, our commitment to Islamic learning and good governance has elevated our civilization and attracted scholars from across the Muslim world."
 nd_hau.1.t: "The Unification of Hausaland"
 nd_hau.1.d: "The ancient Hausa Bakwai — the seven true city-states born of the Bayajidda legend — have at last been brought under one rule. Kano, Katsina, Zazzau, Daura, Gobir, Rano, and Biram: each renowned for its own strengths, each now part of a greater whole. The question that faces us is what kind of nation we shall build from these proud cities. Shall we follow the path of Queen Amina, expanding our borders by the sword and shielding our people behind walls of earth and iron? Or shall we turn our energies to the great markets and trade routes that already make our cities the envy of the Sahel, becoming the commercial heart of West Africa?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_hau.1.a: "Build the walls. Ride the horses. Conquer."
 nd_hau.1.b: "The caravans bring more wealth than any army."
 nd_hau.2.t: "The Kano Chronicle"
 nd_hau.2.d: "Our scholars have compiled a chronicle of the kings of Kano, tracing the lineage of our rulers from the legendary Bagauda to the present day. Written in Arabic script, this remarkable document records the rise and fall of dynasties, the coming of Islam, the great wars and alliances that shaped our nation, and the deeds of kings both wise and foolish. It is one of the great historical works of our continent — a testament that our civilization has a story worth telling and preserving for the ages."
 nd_hau.2.a: "Let our history be remembered."
 nd_hau.3.t: "The Reforms of Muhammad Rumfa"
 nd_hau.3.d: "Muhammad Rumfa, Sarki of Kano, has transformed our greatest city into a center of Islamic learning and governance. He has built mosques and madrasas, invited scholars from Egypt, Tunis, and Morocco, and commissioned the great scholar al-Maghili to write a treatise on the obligations of Muslim rulers. The Taqaddum — Rumfa's code of governance — establishes market regulations, court protocols, and the framework for a just Islamic state. This is not merely a reform of administration; it is the elevation of our entire civilization."
 nd_hau.3.a: "Embrace the path of learning and faith."
 nd_hau.3.b: "Centralize authority in the Sarki's court."
 nd_hau_wall_building_tradition: "Birni Fortification"
 nd_hau_wall_building_tradition_desc: "The construction of massive earthen walls around Hausa cities, creating fortified urban centers that could withstand prolonged sieges."
 nd_hau_bayajidda_legacy: "Bayajidda Legacy"
 nd_hau_bayajidda_legacy_desc: "The founding myth of the Hausa Bakwai — seven city-states descended from the hero Bayajidda — provides the cultural framework for Hausa political identity."
 nd_hau_sahel_agriculture: "Sahel Agriculture"
 nd_hau_sahel_agriculture_desc: "The development of agricultural techniques suited to the Sahel environment, centering on cereals, cotton, vegetables, and livestock, with metalworking to produce the tools needed for cultivation."
 nd_hau_spread_of_islam: "Spread of Islam"
 nd_hau_spread_of_islam_desc: "The arrival of Islam through trans-Saharan merchants transformed urban Hausa society, introducing literacy, legal traditions, and connections to the wider Islamic world."
 nd_hau_equestrian_nobility: "Equestrian Nobility"
 nd_hau_equestrian_nobility_desc: "The Hausa aristocracy developed a horse-riding culture that became the foundation of their military power, with grain processing to feed both riders and mounts."
 nd_hau_kano_chronicle: "The Kano Chronicle"
 nd_hau_kano_chronicle_desc: "One of Africa's most important historical documents, the Kano Chronicle records the city's history from its legendary founding through the reigns of its kings."
 nd_hau_indigo_dyeing: "Indigo Dyeing"
 nd_hau_indigo_dyeing_desc: "The establishment of the famous dye pits of Kano, producing vibrant indigo-dyed cloth that became one of Hausaland's most valued exports."
 nd_hau_yan_lifida_tradition: "Yan Lifida Tradition"
 nd_hau_yan_lifida_tradition_desc: "The development of the Yan Lifida — elite heavy cavalry wearing layered quilted cotton armor with chain mail — as the premier military force of the Hausa states."
 nd_hau_rumfa_reforms_advance: "Rumfa's Reforms"
 nd_hau_rumfa_reforms_advance_desc: "The transformative governance reforms of Muhammad Rumfa of Kano, who built mosques and madrasas, established market regulations, and elevated Kano into a center of Islamic scholarship."
 nd_hau_trans_saharan_links: "Trans-Saharan Links"
 nd_hau_trans_saharan_links_desc: "The establishment of Kano and Katsina as major nodes in the trans-Saharan trade network, connecting gold-producing regions with North Africa."
 nd_hau_queen_amina: "Queen Amina's Campaigns"
 nd_hau_queen_amina_desc: "Queen Amina of Zazzau waged a 34-year campaign of conquest, extending Hausa territory from Bauchi to Nupe and building fortification walls across the land."
 nd_hau_sarauta_governance: "Sarauta Governance"
 nd_hau_sarauta_governance_desc: "The formalization of the sarauta system of governance, organizing administration through the Sarki and a council of nine elders representing royal, clerical, and commercial interests."
 nd_hau_leather_exports: "Leather Exports"
 nd_hau_leather_exports_desc: "The development of Hausa leatherwork into a major export industry, with industrial-scale indigo processing to dye the leather and cloth that made Kano famous."
 nd_hau_artisan_guilds: "Artisan Guilds"
 nd_hau_artisan_guilds_desc: "The organization of Hausa artisans into specialized guilds — blacksmiths, weavers, dyers, leatherworkers, and builders — each with internal governance and market privileges."
 nd_hau_gobir_frontier: "Gobir Frontier"
 nd_hau_gobir_frontier_desc: "The northernmost Hausa state of Gobir maintained a permanent military establishment to defend Hausaland against foreign invaders from the Sahara."
 nd_hau_gunpowder_adoption: "Gunpowder Adoption"
 nd_hau_gunpowder_adoption_desc: "The adoption of firearms through trans-Saharan trade, creating musketeer infantry (Yan Bindiga) to complement the traditional cavalry forces."
 nd_hau_leather_trade: "Majema Leatherwork"
 nd_hau_leather_trade_desc: "The refinement of Hausa leatherworking by the majema artisans, using vegetable-based tanning with bagaruwa pods to produce fine leather goods for export."
 nd_hau_market_competition: "Market Competition"
 nd_hau_market_competition_desc: "The rivalry between Katsina and Kano for dominance of trans-Saharan trade, driving both cities to develop sophisticated market institutions."
 nd_hau_ajami_scholarship: "Ajami Scholarship"
 nd_hau_ajami_scholarship_desc: "The development of Hausa ajami — writing the Hausa language in Arabic script — creating a literate scholarly class that produced legal, historical, and religious works."
 nd_hau_zango_networks: "Zango Networks"
 nd_hau_zango_networks_desc: "The establishment of zango — resident Hausa merchant communities — along major trade routes from the forest belt to the Sahara, extending commercial influence far beyond Hausaland."
 nd_hau_centralized_sarauta: "Centralized Sarauta"
 nd_hau_centralized_sarauta_desc: "The consolidation of royal authority under strong sarki who centralized tax collection and military command, strengthening the state apparatus."
 nd_hau_urban_growth: "Urban Growth"
 nd_hau_urban_growth_desc: "The expansion of Hausa cities into major urban centers, with Kano and Katsina rivaling Timbuktu in population and commercial activity."
 nd_hau_cotton_industry: "Cotton Industry"
 nd_hau_cotton_industry_desc: "The development of cotton agriculture and textile weaving as a major industry, with Hausa cloth traded throughout West Africa."
 nd_hau_standing_army: "Standing Army"
 nd_hau_standing_army_desc: "The evolution of Hausa military organization from ad hoc levies to permanent standing forces in the major city-states."
 nd_hau_sahel_diplomacy: "Sahel Diplomacy"
 nd_hau_sahel_diplomacy_desc: "Hausa diplomatic traditions of negotiation and alliance-building between city-states, managing the complex balance of power across the Sahel."
 nd_hau_defense_of_autonomy: "Defense of Autonomy"
 nd_hau_defense_of_autonomy_desc: "The defense of Hausa city-state independence against external pressures, preserving the traditions of self-governance that defined Hausaland."
 nd_hau_commercial_sophistication: "Commercial Sophistication"
 nd_hau_commercial_sophistication_desc: "The continued refinement of Hausa commercial institutions, with market towns serving as centers of regional and long-distance trade."
 nd_hau_cultural_resilience: "Cultural Resilience"
 nd_hau_cultural_resilience_desc: "The preservation and development of Hausa cultural identity through oral tradition, distinctive architecture, and specialized craft production."
 nd_hau_sahel_stewardship: "Sahel Stewardship"
 nd_hau_sahel_stewardship_desc: "The expansion of agricultural techniques to manage the fragile Sahel environment and sustain growing urban populations."
 nd_hau_maliki_jurisprudence: "Maliki Jurisprudence"
 nd_hau_maliki_jurisprudence_desc: "The development of a legal system combining Islamic jurisprudence of the Maliki school with Hausa customary law, creating a pragmatic governance framework."
 a_nd_hau_yan_lifida: "Yan Lifida"
 a_nd_hau_yan_lifida_desc: "Elite Hausa heavy cavalry wearing layered quilted cotton armor (lifida) and chain mail (sulke), mounted on armored horses. These formidable warriors served as the emir's bodyguard and the shock force of Hausa armies."
 a_nd_hau_yan_lifida_levy: "Yan Lifida (Levy)"
 a_nd_hau_yan_lifida_levy_desc: "Levy-raised heavy cavalry drawn from the Hausa aristocracy, equipped with quilted armor and chain mail in the Yan Lifida tradition."
 a_nd_hau_yan_bindiga: "Yan Bindiga"
 a_nd_hau_yan_bindiga_desc: "Hausa musketeers armed with firearms acquired through trans-Saharan trade. These gunpowder infantry provided devastating firepower to complement the traditional cavalry charge."
 a_nd_hau_yan_bindiga_levy: "Yan Bindiga (Levy)"
 a_nd_hau_yan_bindiga_levy_desc: "Levy-raised musketeers equipped with trade firearms, drawn from the common soldiery of the Hausa city-states."
 nd_hau_birni_walls: "Birni Walls"
 nd_hau_birni_walls_desc: "Massive earthen fortification walls enclosing entire Hausa cities and their agricultural hinterlands. The Kano walls alone stretched over 23 kilometers, reaching heights of 15 meters with a base thickness of 12 meters."
 nd_hau_kofar_mata: "Kofar Mata Dye Pits"
 nd_hau_kofar_mata_desc: "Circular dye pits producing the vibrant indigo-dyed cloth that made Kano famous throughout West Africa and across the Sahara. The purple cotton of Kano once rivaled the fabled riches of Timbuktu."
 nd_hau_tsangaya: "Tsangaya School"
 nd_hau_tsangaya_desc: "An Islamic study center where Quranic learning and Arabic literacy are taught, producing the literate scholarly class that administers the city-states and maintains legal and historical records."
 nd_hau_sarauta_hall: "Sarauta Council Hall"
 nd_hau_sarauta_hall_desc: "The seat of Hausa governance where the Sarki and his council of nine elders deliberate matters of state, balancing the interests of the crown, the clergy, and the merchant guilds."
 nd_hau_zango_post: "Zango Trading Post"
 nd_hau_zango_post_desc: "A Hausa diaspora trading station where resident merchants serve as way-stations for caravans and centers of commercial intelligence, extending Hausa trade networks far beyond the homeland."
 nd_hau_majema_tannery: "Majema Tannery"
 nd_hau_majema_tannery_desc: "A workshop of the majema leatherworkers, using traditional vegetable-based tanning with bagaruwa pods to produce the supple leather goods that made Hausaland famous across the Sahara and beyond."
 nd_hau_birni_maintenance: "Birni Wall Upkeep"
 nd_hau_birni_maintenance_desc: "The ongoing maintenance of the massive earthen fortifications that protect our cities."
 nd_hau_dyepit_operations: "Dye Pit Operations"
 nd_hau_dyepit_operations_desc: "Dyeing raw cloth with indigo in the famous Kano dye pits to produce vibrant fine textiles traded across the Sahara."
 nd_hau_school_upkeep: "School Upkeep"
 nd_hau_school_upkeep_desc: "The costs of maintaining the tsangaya schools, including paper and writing materials for instruction, cloth for scholars' robes, and beeswax for lamps used during evening study."
 nd_hau_council_upkeep: "Council Administration"
 nd_hau_council_upkeep_desc: "The administrative costs of maintaining the Sarauta council, including paper for record-keeping, cloth for official dress, and fine cloth for the ceremonial appointments of the council chamber."
 nd_hau_zango_upkeep: "Zango Upkeep"
 nd_hau_zango_upkeep_desc: "The operating costs of maintaining a Hausa diaspora trading community, including provisions for resident merchants."
 nd_hau_tanning_process: "Tanning Process"
 nd_hau_tanning_process_desc: "Tanning hides into supple leather using traditional bagaruwa-pod methods perfected by the majema artisans."
 nd_hau_blacksmith_tradition: "Hausa Metalworking"
 nd_hau_blacksmith_tradition_desc: "Traditional Hausa blacksmiths forging iron and wood into agricultural tools, weapons, and armor."
 nd_hau_indigo_processing: "Indigo Processing"
 nd_hau_indigo_processing_desc: "Processing indigo dye and raw fibers into fine dyed cloth on a commercial scale for export across the Sahel."
 nd_hau_cotton_weaving: "Hausa Cotton Weaving"
 nd_hau_cotton_weaving_desc: "The production of fine cotton textiles using traditional Hausa weaving and dyeing techniques."
 nd_hau_refined_leatherwork: "Refined Leatherwork"
 nd_hau_refined_leatherwork_desc: "The advanced processing of hides into the fine leather goods that made Hausa artisans renowned across the trade routes of Africa."
 nd_hau_grain_processing: "Sahel Grain Processing"
 nd_hau_grain_processing_desc: "Brewing Sahel cereals into beer, the staple drink that sustains both the cities and the cavalry garrisons of Hausaland."
 nd_hau_lifida_armoring: "Lifida Armoring"
 nd_hau_lifida_armoring_desc: "The production of layered quilted cotton armor and chain mail fittings for the Yan Lifida heavy cavalry, combining local textile craft with imported ironwork."
 nd_hau_military_provisioning: "Military Provisioning"
 nd_hau_military_provisioning_desc: "The organized supply of food and fodder for standing military forces, ensuring that armies and their mounts remain battle-ready."
 levy_nd_hau_yan_lifida: "Yan Lifida Levy"
 levy_nd_hau_yan_lifida_desc: "Noble cavalry levied from the Hausa aristocracy, riding armored horses and wearing the distinctive quilted lifida armor with chain mail."
 levy_nd_hau_yan_bindiga: "Yan Bindiga Levy"
 levy_nd_hau_yan_bindiga_desc: "Musketeer infantry levied from the common soldiery, armed with firearms acquired through trans-Saharan trade networks."
 STATIC_MODIFIER_NAME_nd_hau_political_centralization: "Political Centralization"
 STATIC_MODIFIER_DESC_nd_hau_political_centralization: "The reforms of Muhammad Rumfa concentrate authority in the Sarki's court, creating a more efficient administration that can govern the complex affairs of a growing state."
 nd_hau_formed_tt: "Hausaland has been formed"
 nd_hau_path_a_tt: "Chose Walls of Amina"
 nd_hau_path_b_tt: "Chose Crossroads of the Sahel"
 nd_hau_destiny: "Destiny of Hausaland"
 nd_hau_destiny_desc: "The Hausa Bakwai are united under one banner. Now we must prove that this union was not an accident of history but the beginning of something greater. Stability and order are the first requirements."
 nd_hau_dest_sword_1: "The Sword Rides South and North"
 nd_hau_dest_sword_1_desc: "In the tradition of Queen Amina, we shall extend our dominion beyond the Hausa heartland. The Nupe kingdoms to the south and the Tuareg of Air to the north must both acknowledge our supremacy."
 nd_hau_dest_sword_2: "Conquest of Bornu and Oyo"
 nd_hau_dest_sword_2_desc: "The great rival kingdoms of Bornu and Oyo stand as the only obstacles to Hausa hegemony in the western Sudan. Their capitals must fall to our armies."
 nd_hau_dest_sword_3: "Empire of the Sahel"
 nd_hau_dest_sword_3_desc: "From Timbuktu to Benin, from the Niger bend to the forests of the south, a Hausa empire shall unite the western Sudan under one crown. This is the culmination of Amina's vision."
 nd_hau_dest_caravan_1: "Cotton and Caravans"
 nd_hau_dest_caravan_1_desc: "Our wealth begins with the cotton fields and dye pits that make Kano cloth famous across the continent. We must ensure that cotton flows through our markets and our treasury is full."
 nd_hau_dest_caravan_2: "Crossroads of Empires"
 nd_hau_dest_caravan_2_desc: "Hausaland sits at the crossroads of every major trade route in the western Sudan. By embracing new financial institutions and developing our cities, we can become the commercial heart of Africa."
 nd_hau_dest_caravan_3: "The Great Market"
 nd_hau_dest_caravan_3_desc: "Let Kano and Katsina be spoken of alongside the great markets of the world. With salt from the Sahara flowing through our markets and our treasury overflowing, we shall build a commercial empire that outlasts any conqueror."
 nd_hau.4.t: "The Destiny of Hausaland"
 nd_hau.4.d: "The seven true states are united, and a single Sarki rules from the greatest city in the western Sudan. But unity is only the beginning. The world beyond our walls is vast, and the path we choose now will shape the destiny of our people for generations. The foundations are laid. Now we must build."
 nd_hau.4.a: "Our destiny begins today."
 nd_hau.5.t: "Nupe and Air Submit"
 nd_hau.5.d: "Our cavalry has ridden south to the banks of the Niger and north to the oases of Air. The Nupe princes and the Tuareg chiefs have learned what Queen Amina taught their ancestors centuries ago: that the Hausa ride where they please, and those who resist are broken. The trade routes to the south and the caravan paths to the north now flow through territory under our protection."
 nd_hau.5.a: "The sword opens every road."
 nd_hau.6.t: "The Fall of Bornu and Oyo"
 nd_hau.6.d: "The two great rival kingdoms that hemmed in Hausaland for centuries have been brought to heel. Ngazargamu, the fortress-capital of the Bornu empire, has opened its gates to our forces. In the west, the great city of Oyo-Ile, seat of the Alaafin, acknowledges Hausa supremacy. We stand as the dominant power of the western Sudan. How shall we administer these conquests?"
 nd_hau.6.a: "Rule through tribute and recognition."
 nd_hau.6.b: "Forge the conquered into a single army."
 nd_hau.7.t: "Empire of the Sahel"
 nd_hau.7.d: "From the ancient libraries of Timbuktu to the bronze workshops of Benin, from the scholarly mosques of Djenne to the great markets of Kano, a Hausa empire now stretches across the western Sudan. Not since the days of Songhai and Mali has a single power commanded such territory in West Africa. We have fulfilled the vision of Queen Amina and surpassed it a hundredfold. How shall history remember this achievement?"
 nd_hau.7.a: "We shall administer this empire wisely."
 nd_hau.7.b: "The conquest is never finished."
 nd_hau.8.t: "The Cotton Road"
 nd_hau.8.d: "The markets of Kano overflow with cotton -- raw from the fields, spun into thread, woven into cloth, and dyed the deep indigo that has become our trademark. Caravans carry our textiles north across the Sahara and south to the forest kingdoms. The wealth that flows through our hands proves that a bale of cotton can be worth more than a captured city. Our treasury grows, and with it our influence."
 nd_hau.8.a: "Wealth is the truest power."
 nd_hau.9.t: "The Crossroads Flourish"
 nd_hau.9.d: "Hausaland has become what its geography always promised: the indispensable crossroads of West African commerce. Every caravan from the Sahara, every trade convoy from the forest belt, every merchant seeking gold, salt, leather, or textiles passes through our cities. Our banking institutions have matured, our markets are sophisticated, and our cities grow rich on the flow of goods. What shall we invest in?"
 nd_hau.9.a: "Invest in our merchants and markets."
 nd_hau.9.b: "Invest in scholars and diplomatic ties."
 nd_hau.10.t: "The Great Market of Kano"
 nd_hau.10.d: "They say that everything in the world can be bought in the great market of Kano: salt from the Sahara, kola from the forests, leather worked so fine that Europeans call it Morocco leather without knowing it came from our tanneries, cloth dyed the deepest indigo, iron tools, horses, books, and goods from lands most people have never heard of. Our commercial empire is the envy of Africa. How shall we use this wealth?"
 nd_hau.10.a: "Expand our commercial reach further."
 nd_hau.10.b: "Become patrons of learning and the arts."
 STATIC_MODIFIER_NAME_nd_hau_dest_conqueror_of_nations: "Conqueror of Nations"
 STATIC_MODIFIER_DESC_nd_hau_dest_conqueror_of_nations: "The submission of rival kingdoms to Hausa authority has granted us experience in managing conquered peoples and extracting tribute."
 STATIC_MODIFIER_NAME_nd_hau_dest_iron_discipline: "Iron Discipline"
 STATIC_MODIFIER_DESC_nd_hau_dest_iron_discipline: "Constant campaigning on the frontiers has hardened our troops and taught our commanders the art of maintaining fortifications with minimal expense."
 STATIC_MODIFIER_NAME_nd_hau_dest_sahelian_imperium: "Sahelian Imperium"
 STATIC_MODIFIER_DESC_nd_hau_dest_sahelian_imperium: "The administration of a vast Sahelian empire requires sophisticated intelligence networks and the ability to project power quickly. The price of empire is eternal vigilance."
 STATIC_MODIFIER_NAME_nd_hau_dest_eternal_conquest: "Eternal Conquest"
 STATIC_MODIFIER_DESC_nd_hau_dest_eternal_conquest: "The Hausa war machine has become a self-sustaining engine of expansion, recruiting new soldiers as fast as provinces are conquered. Diplomacy is an afterthought."
 STATIC_MODIFIER_NAME_nd_hau_dest_merchant_princes: "Merchant Princes"
 STATIC_MODIFIER_DESC_nd_hau_dest_merchant_princes: "The great merchant houses of Kano and Katsina have invested heavily in cotton production, using their wealth to shape policy. Military spending is kept lean."
 STATIC_MODIFIER_NAME_nd_hau_dest_scholarly_exchange: "Scholarly Exchange"
 STATIC_MODIFIER_DESC_nd_hau_dest_scholarly_exchange: "The flow of scholars and diplomats through Hausa cities has strengthened our ties to the wider world and brought new knowledge to our courts."
 STATIC_MODIFIER_NAME_nd_hau_dest_emporium_of_africa: "Emporium of Africa"
 STATIC_MODIFIER_DESC_nd_hau_dest_emporium_of_africa: "Hausaland has become the indispensable commercial hub of West Africa, its merchants and diplomats welcome in every court, its markets drawing traders from across the known world."
 STATIC_MODIFIER_NAME_nd_hau_dest_patron_of_learning: "Patron of Learning"
 STATIC_MODIFIER_DESC_nd_hau_dest_patron_of_learning: "The investment in scholarship and Islamic learning has expanded our horizons and deepened our understanding of the world, though our military readiness has suffered somewhat."
 nd_hau_gidan_sarki: "Gidan Sarki"
 nd_hau_gidan_sarki_desc: "The Imperial Palace of the Sarki of all Hausaland, a magnificent complex combining the grandeur of a royal court with the military command infrastructure needed to govern a continental empire. Its walls echo with the authority of Amina's heirs."
 nd_hau_gidan_sarki_upkeep: "Palace Administration"
 nd_hau_gidan_sarki_upkeep_desc: "The costs of maintaining the imperial palace, including weaponry for the royal guard, fine cloth for ceremonial occasions, and paper for the bureaucracy."
 nd_hau_fatauci_house: "Fatauci House"
 nd_hau_fatauci_house_desc: "The grand trading hall of the fatauci, the chief merchant of the Hausa commercial network. From this building, the vast caravan routes stretching from the Sahara to the forests are coordinated, deals negotiated, and the wealth of nations counted."
 nd_hau_fatauci_operations: "Trading House Operations"
 nd_hau_fatauci_operations_desc: "The daily operations of the Fatauci House, requiring cloth for wrapping trade goods, Saharan salt as a medium of exchange, and paper for maintaining commercial records."
