l_english:
 STATIC_MODIFIER_NAME_nd_nse_whale_road: "The Whale Road"
 STATIC_MODIFIER_DESC_nd_nse_whale_road: "The sea is not a barrier but a highway. Our fleets bind three kingdoms into one, and the whale road carries our merchants, our warriors, and our laws to every shore of the northern world."
 STATIC_MODIFIER_NAME_nd_nse_crown_of_three_kingdoms: "Crown of Three Kingdoms"
 STATIC_MODIFIER_DESC_nd_nse_crown_of_three_kingdoms: "England, Denmark, and Norway answer to a single crown. What Cnut forged through conquest, we shall sustain through law and governance, weaving three peoples into one imperium."
 nd_nse.1.t: "The North Sea Empire Reborn"
 nd_nse.1.d: "The dream of Cnut the Great lives again. Where once a single king united the thrones of England, Denmark, and Norway through force of arms and force of personality, we have surpassed even that legendary achievement. The North Sea -- that vast grey expanse that separates lesser nations -- is now our inner lake, our highway, our lifeblood.\n\nBut an empire held together by water faces a fundamental question that Cnut himself never answered: what kind of power shall we be? The sea that unites us also defines us. We can embrace that identity fully, becoming the supreme maritime power of the age, our fleets unchallenged from the Faeroes to the Skagerrak. Or we can use the sea merely as the connective tissue of something greater -- a unified crown that governs three nations as one, blending Anglo-Saxon law with Norse custom into a new imperial tradition.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_nse.1.a: "The whale road is our empire"
 nd_nse.1.b: "One crown, three kingdoms, one law"
 nd_nse.2.t: "The Danegeld Perfected"
 nd_nse.2.d: "What began as tribute extorted from terrified Anglo-Saxon kings has become the most efficient tax system in northern Europe. The Danegeld -- once a shameful payment to buy off Viking raiders -- is now a sophisticated land tax, assessed by hide and collected by royal reeves across every shire. No other kingdom can match the thoroughness of our fiscal administration.\n\nThe question before us is how to direct this extraordinary revenue stream. We can tighten the collection apparatus further, ensuring that every last penny flows to the royal treasury and strengthening crown control over distant provinces. Or we can redirect a portion of this wealth into commercial infrastructure, reinvesting the Danegeld into the trade networks that make our empire prosperous."
 nd_nse.2.a: "Tighten the fiscal apparatus"
 nd_nse.2.b: "Reinvest in trade and prosperity"
 nd_nse.3.t: "The Leidang Reforged"
 nd_nse.3.d: "The ancient leidang system -- the naval levy that once mustered the fleets of Scandinavia -- has been reformed for a new age. Under the old system, each coastal district was obligated to provide one ship and crew for seasonal expeditions. Now we have systematized and expanded this obligation across the entire North Sea Empire, from the fjords of Norway to the estuaries of eastern England.\n\nEvery skipreide and every shire along our vast coastline now contributes to a standing naval reserve. When the empire calls, hundreds of ships can be mustered within weeks. The sea that others fear is our fortress wall."
 nd_nse.3.a: "The North Sea shall know our keels"
 nd_nse.4.t: "The Great Heathen Thing"
 nd_nse.4.d: "In the ancient Norse tradition, the Thing was where free men gathered to settle disputes, proclaim laws, and hold their rulers accountable. Now, representatives from every corner of the North Sea Empire -- English earls and Danish jarls, Norwegian lagmen and Scottish thanes -- have gathered in the greatest assembly our world has ever seen.\n\nThis is more than a legal proceeding. It is the moment when three distinct peoples begin to see themselves as one. The laws proclaimed today will be written in three languages and enforced from Trondheim to Canterbury. What the sword began, the law will complete."
 nd_nse.4.a: "Let the law bind what the sword forged"
 nd_nse.5.t: "Mastery of the North Sea"
 nd_nse.5.d: "The launching of our great ships of the line marks the culmination of centuries of naval tradition. From the dragon-prowed longships that first terrorized the coasts of Europe to these towering floating fortresses bristling with cannon, the evolution of North Sea naval power has been relentless.\n\nNo fleet in the world can challenge our command of the northern waters. The approaches to every major port from Bergen to London lie under our guns. The herring fleets sail unmolested. The trade convoys arrive without interruption. The North Sea Empire is, at last, precisely what its name always promised -- an empire of the sea."
 nd_nse.5.a: "We are masters of the northern deep"
 STATIC_MODIFIER_NAME_nd_nse_danegeld_extraction: "Danegeld Extraction"
 STATIC_MODIFIER_DESC_nd_nse_danegeld_extraction: "A perfected system of land taxation ensures every hide in the realm contributes to the royal treasury."
 STATIC_MODIFIER_NAME_nd_nse_danegeld_reinvestment: "Danegeld Reinvestment"
 STATIC_MODIFIER_DESC_nd_nse_danegeld_reinvestment: "Tax revenues are channeled back into commercial infrastructure, enriching the realm through trade."
 STATIC_MODIFIER_NAME_nd_nse_leidang_reforged: "The Leidang Reforged"
 STATIC_MODIFIER_DESC_nd_nse_leidang_reforged: "A reformed naval levy system provides rapid mobilization of fleets from every coastal district of the empire."
 STATIC_MODIFIER_NAME_nd_nse_heathen_thing_legacy: "Legacy of the Great Thing"
 STATIC_MODIFIER_DESC_nd_nse_heathen_thing_legacy: "The precedent of the Great Assembly has established a tradition of inclusive governance across the empire's diverse peoples."
 STATIC_MODIFIER_NAME_nd_nse_north_sea_mastery: "Mastery of the North Sea"
 STATIC_MODIFIER_DESC_nd_nse_north_sea_mastery: "Unchallenged naval supremacy over the northern waters, sustained by the most powerful battle fleet in the region."
 nd_nse_huscarl_tradition: "Huscarl Tradition"
 nd_nse_huscarl_tradition_desc: "The institution of the huscarls -- professional household warriors modeled on the legendary Jomsvikings -- provides the North Sea Empire with an elite standing infantry force."
 nd_nse_danegeld_system: "The Danegeld System"
 nd_nse_danegeld_system_desc: "Originally tribute paid to Viking raiders, the Danegeld has been transformed into a sophisticated land tax administered through the Anglo-Saxon shire system."
 nd_nse_dreki_warship: "The Dreki Warship"
 nd_nse_dreki_warship_desc: "The dragon ship -- the dreaded dreki -- is the supreme expression of Norse naval engineering: fast, seaworthy, and terrifying to behold."
 nd_nse_norse_trade_routes: "Norse Trade Routes"
 nd_nse_norse_trade_routes_desc: "Viking-era trade networks spanning from Byzantium to Vinland provide the foundation for North Sea commerce."
 nd_nse_thingstead_tradition: "Thingstead Tradition"
 nd_nse_thingstead_tradition_desc: "The Norse Thing -- an assembly of free men for lawmaking and dispute resolution -- is institutionalized as a permanent governing body."
 nd_nse_skaldic_heritage: "Skaldic Heritage"
 nd_nse_skaldic_heritage_desc: "The rich tradition of Norse skaldic poetry, runestone carving, and oral history preserves and celebrates the empire's cultural identity."
 nd_nse_leidang_origins: "Leidang Origins"
 nd_nse_leidang_origins_desc: "The ancient Scandinavian naval levy system, requiring each coastal district to provide a ship and crew, forms the backbone of the empire's military reserves."
 nd_nse_snekkja_fleet: "The Snekkja Fleet"
 nd_nse_snekkja_fleet_desc: "Fast, agile longships known as snekkjas form the backbone of the empire's patrol and raiding fleet, outpacing any vessel on the open sea."
 nd_nse_leidang_reform: "Leidang Reform"
 nd_nse_leidang_reform_desc: "The old leidang system is reformed to produce the Thingmannalid -- a standing retinue of professional soldiers funded by permanent taxation."
 nd_nse_jelling_legacy: "Jelling Legacy"
 nd_nse_jelling_legacy_desc: "The great runestones at Jelling, erected by Harald Bluetooth to mark Denmark's conversion to Christianity, symbolize the empire's capacity to bridge pagan and Christian traditions."
 nd_nse_longship_yards_tradition: "Longship Yards Tradition"
 nd_nse_longship_yards_tradition_desc: "Specialized shipbuilding facilities using the distinctive Norse clinker construction technique produce vessels of unmatched seaworthiness."
 nd_nse_north_sea_trade_league: "North Sea Trade League"
 nd_nse_north_sea_trade_league_desc: "A formalized network of trading partnerships across the North Sea, building on centuries of Viking commercial enterprise."
 nd_nse_runestone_legacy: "Runestone Legacy"
 nd_nse_runestone_legacy_desc: "The tradition of raising carved runestones to commemorate great deeds and preserve knowledge represents a unique form of public literacy and cultural memory."
 nd_nse_witan_council: "The Witan Council"
 nd_nse_witan_council_desc: "The Anglo-Saxon Witenagemot -- the assembly of wise men -- is blended with Norse Thing traditions to create a powerful advisory council for the crown."
 nd_nse_busse_warship: "The Busse Warship"
 nd_nse_busse_warship_desc: "The busse is a large, heavily-built warship evolved from the merchant knarr, capable of carrying both troops and heavy armament across the open North Sea."
 nd_nse_great_thing: "The Great Thing"
 nd_nse_great_thing_desc: "An empire-wide assembly brings together representatives from every corner of the North Sea realm, establishing precedents for cross-cultural governance."
 nd_nse_cod_stockfish_trade: "Cod and Stockfish Trade"
 nd_nse_cod_stockfish_trade_desc: "The processing and export of dried cod and stockfish becomes a cornerstone of North Sea commerce, feeding Europe while enriching the empire."
 nd_nse_stave_church_architecture: "Stave Church Architecture"
 nd_nse_stave_church_architecture_desc: "The distinctive Norse stave churches, with their dragon-headed gables and intricate woodcarvings, represent the unique fusion of Christian faith with Viking artistic tradition."
 nd_nse_hird_discipline: "Hird Discipline"
 nd_nse_hird_discipline_desc: "The royal hird -- the professional military retinue of the Norse kings -- develops rigorous training standards that raise the quality of the empire's standing forces."
 nd_nse_naval_prowess: "Naval Prowess"
 nd_nse_naval_prowess_desc: "Generations of seafaring experience culminate in a naval doctrine that combines Norse seamanship with advanced tactical coordination."
 nd_nse_shire_integration: "Shire Integration"
 nd_nse_shire_integration_desc: "The Anglo-Saxon shire system of local governance is extended across the empire, providing uniform administration from the Scottish highlands to the Norwegian fjords."
 nd_nse_north_sea_frigate: "North Sea Frigate"
 nd_nse_north_sea_frigate_desc: "Purpose-built frigates optimized for the rough waters of the North Sea and Atlantic, combining speed with the firepower needed to patrol vast maritime territories."
 nd_nse_confessional_unity: "Confessional Unity"
 nd_nse_confessional_unity_desc: "The North Sea Empire's tradition of bridging pagan and Christian, Catholic and Protestant, creates an unusual tolerance for religious diversity."
 nd_nse_reformed_leidang: "Reformed Leidang"
 nd_nse_reformed_leidang_desc: "The medieval naval levy system is modernized into a comprehensive military obligation, producing both sailors for the fleet and soldiers for the army."
 nd_nse_wool_cloth_trade: "Wool and Cloth Trade"
 nd_nse_wool_cloth_trade_desc: "English wool and Scandinavian dyeing techniques combine to produce cloth that rivals the finest Flemish textiles."
 nd_nse_crown_law_reform: "Crown Law Reform"
 nd_nse_crown_law_reform_desc: "A unified legal code draws from both Anglo-Saxon common law and Scandinavian legal traditions, strengthening royal authority across the empire."
 nd_nse_hanseatic_rivalry: "Hanseatic Rivalry"
 nd_nse_hanseatic_rivalry_desc: "Competition with the Hanseatic League drives the North Sea Empire to develop its own merchant networks and trade infrastructure."
 nd_nse_fortress_harbors: "Fortress Harbors"
 nd_nse_fortress_harbors_desc: "Key coastal ports are fortified with defensive works that protect both the fleet and the trade routes that sustain the empire."
 nd_nse_rate_of_line: "Rate of the Line"
 nd_nse_rate_of_line_desc: "The construction of massive ships of the line marks the North Sea Empire's emergence as a first-rate naval power, capable of projecting force across the Atlantic."
 nd_nse_absolute_thalassocracy: "Absolute Thalassocracy"
 nd_nse_absolute_thalassocracy_desc: "The North Sea Empire's naval supremacy becomes total: no fleet dares challenge our warships, and every trade route in the northern waters operates under our protection."
 nd_nse_navigation_acts: "Navigation Acts"
 nd_nse_navigation_acts_desc: "Legislation requiring that trade with the empire be carried in empire-flagged vessels, securing the merchant marine's dominance over North Sea commerce."
 nd_nse_cultural_convergence: "Cultural Convergence"
 nd_nse_cultural_convergence_desc: "Centuries of shared governance have begun to forge a new identity from the old divisions -- not quite Norse, not quite English, but something unprecedented."
 nd_nse_imperial_navy_reform: "Imperial Navy Reform"
 nd_nse_imperial_navy_reform_desc: "A comprehensive reorganization of the fleet introduces standardized ship designs, professional officer training, and centralized naval command."
 nd_nse_colonial_mandate: "Colonial Mandate"
 nd_nse_colonial_mandate_desc: "The North Sea Empire's maritime reach extends beyond European waters, establishing colonies and trading posts across the Atlantic."
 nd_nse_constitutional_assembly: "Constitutional Assembly"
 nd_nse_constitutional_assembly_desc: "A permanent legislative body representing all three kingdoms provides constitutional governance while preserving the unity of the crown."
 nd_nse_nordhavskorvet: "Nordhavskorvet"
 nd_nse_nordhavskorvet_desc: "Fast, modern corvettes designed for patrol and enforcement across the vast maritime territories of the North Sea Empire."
 nd_nse_industrial_shipyards: "Industrial Shipyards"
 nd_nse_industrial_shipyards_desc: "Steam-powered machinery and iron construction techniques transform the empire's shipyards, enabling the rapid production of modern warships."
 nd_nse_north_sea_enlightenment: "North Sea Enlightenment"
 nd_nse_north_sea_enlightenment_desc: "A flowering of scholarship and scientific inquiry across the empire, building on the combined intellectual traditions of Scandinavia and Britain."
 nd_nse_maritime_insurance: "Maritime Insurance"
 nd_nse_maritime_insurance_desc: "Formalized systems of maritime insurance reduce the financial risk of North Sea trade, encouraging greater commercial investment and longer voyages."
 nd_nse_modern_navy_doctrine: "Modern Navy Doctrine"
 nd_nse_modern_navy_doctrine_desc: "A comprehensive naval doctrine incorporating the latest in gunnery, signaling, and fleet tactics ensures the empire's continued command of the seas."
 nd_nse_free_trade_dominion: "Free Trade Dominion"
 nd_nse_free_trade_dominion_desc: "The empire's unmatched control of North Sea shipping lanes allows it to dictate the terms of free trade across northern Europe."
 nd_nse_parliamentary_union: "Parliamentary Union"
 nd_nse_parliamentary_union_desc: "A unified parliament representing England, Denmark, Norway, and the islands formalizes the constitutional basis of the North Sea Empire."
 a_nd_nse_huscarl: "Huscarl"
 a_nd_nse_huscarl_desc: "Elite household warriors descended from Cnut's personal guard, the huscarls are fearsome shock troops armed with the great Danish axe. Their devastating charge breaks enemy formations, though their berserker aggression leaves them vulnerable to sustained morale pressure."
 a_nd_nse_thingmannalid: "Thingmannalid"
 a_nd_nse_thingmannalid_desc: "The 'Assembly Men' are the disciplined standing retinue of the North Sea kings. Trained for rapid tactical maneuvers, they strike with initiative and precision, though their lighter armor trades protection for speed."
 levy_nd_nse_huscarl: "Huscarl Levy"
 levy_nd_nse_huscarl_desc: "Elite axe-wielding household warriors drawn from the nobility and professional soldiery of the North Sea Empire."
 levy_nd_nse_thingmannalid: "Thingmannalid Levy"
 levy_nd_nse_thingmannalid_desc: "Disciplined retinue soldiers recruited from the peasant and soldier classes, trained in the martial traditions of the Thing assembly."
 n_nd_nse_dreki: "Dreki"
 n_nd_nse_dreki_desc: "The dragon ship, with its carved serpent prow and shallow draft, is the iconic warship of the Norse -- fast enough to navigate rivers, seaworthy enough to cross oceans."
 n_nd_nse_snekkja: "Snekkja"
 n_nd_nse_snekkja_desc: "The 'snake' -- a nimble, fast-sailing longship ideal for patrol, raiding, and reconnaissance across the empire's vast maritime territory."
 n_nd_nse_busse: "Busse"
 n_nd_nse_busse_desc: "A large, heavily-built warship evolved from the merchant knarr, the busse carries significant armament while retaining the seaworthiness of Norse naval design."
 n_nd_nse_frigate: "North Sea Frigate"
 n_nd_nse_frigate_desc: "A purpose-built warship optimized for the rough conditions of the North Sea, combining speed and armament for effective patrol of the empire's vast coastlines."
 n_nd_nse_rate: "Rate-of-the-Line"
 n_nd_nse_rate_desc: "A massive ship of the line representing the pinnacle of North Sea naval engineering -- bristling with cannon and built to withstand the fiercest Atlantic storms."
 n_nd_nse_corvette: "Nordhavskorvet"
 n_nd_nse_corvette_desc: "A modern corvette designed for the North Atlantic -- fast, well-armed, and capable of extended independent operations in the empire's distant waters."
 nd_nse_thingstead: "Thingstead"
 nd_nse_thingstead_desc: "A permanent assembly hall where representatives gather to proclaim laws, settle disputes, and hold rulers accountable in the Norse tradition."
 nd_nse_longship_yards: "Longship Yards"
 nd_nse_longship_yards_desc: "Specialized shipbuilding facilities using Norse clinker construction, producing the seaworthy vessels that are the sinew of the North Sea Empire."
 nd_nse_herring_hall: "Herring Hall"
 nd_nse_herring_hall_desc: "A processing and trading center for the vast herring and cod fisheries of the North Sea, the backbone of the empire's maritime commerce."
 nd_nse_danelaw_mint: "Danelaw Mint"
 nd_nse_danelaw_mint_desc: "A royal minting facility producing standardized coinage, the fiscal instrument of the Danegeld taxation system that funds the empire."
 nd_nse_hirdstova: "Hirdstova"
 nd_nse_hirdstova_desc: "A military training hall where the royal hird -- the professional warrior retinue of the Norse kings -- hones its skills in arms and tactics."
 nd_nse_stave_church: "Stave Church"
 nd_nse_stave_church_desc: "A distinctively Norse Christian church built from great timber staves, adorned with dragon carvings that blend Christian symbolism with Viking artistry."
 nd_nse_thing_administration: "Thing Administration"
 nd_nse_thing_administration_desc: "The routine business of governance conducted through the traditional Norse assembly system."
 nd_nse_lawspeaker_council: "Lawspeaker Council"
 nd_nse_lawspeaker_council_desc: "An elevated assembly presided over by hereditary lawspeakers who preserve and interpret the empire's complex legal traditions."
 nd_nse_parliamentary_reforms: "Parliamentary Reforms"
 nd_nse_parliamentary_reforms_desc: "Modern constitutional procedures transform the ancient Thing into a full parliamentary institution."
 nd_nse_clinker_shipbuilding: "Clinker Shipbuilding"
 nd_nse_clinker_shipbuilding_desc: "The distinctive Norse technique of overlapping planks caulked with wool and tar, producing ships of exceptional flexibility and seaworthiness."
 nd_nse_norse_weaving: "Norse Sail Weaving"
 nd_nse_norse_weaving_desc: "The production of woolen sails dyed in the distinctive patterns of the North Sea fleet, combining English wool with Scandinavian weaving traditions."
 nd_nse_industrial_shipbuilding: "Industrial Shipbuilding"
 nd_nse_industrial_shipbuilding_desc: "Steam-powered machinery and iron construction techniques applied to naval shipbuilding."
 nd_nse_stockfish_processing: "Stockfish Processing"
 nd_nse_stockfish_processing_desc: "The salting and drying of cod and herring for long-distance trade, a cornerstone of North Sea commerce."
 nd_nse_maritime_insurance_office: "Maritime Insurance Office"
 nd_nse_maritime_insurance_office_desc: "A formalized system for underwriting the risks of maritime commerce, encouraging investment in long-distance trade."
 nd_nse_herring_salting: "Herring Salting"
 nd_nse_herring_salting_desc: "The traditional preservation of herring in brine barrels for export across Europe."
 nd_nse_silver_minting: "Silver Minting"
 nd_nse_silver_minting_desc: "The production of standardized silver pennies, the currency that underlies the Danegeld taxation system."
 nd_nse_hanseatic_trade_tools: "Hanseatic Trade Tools"
 nd_nse_hanseatic_trade_tools_desc: "The production of precision weighing instruments and trade tools to compete with Hanseatic merchant standards."
 nd_nse_mint_administration: "Mint Administration"
 nd_nse_mint_administration_desc: "The bureaucratic apparatus overseeing coin production and preventing debasement of the currency."
 nd_nse_retinue_training: "Retinue Training"
 nd_nse_retinue_training_desc: "The daily martial exercises and equipment maintenance of the professional warrior retinue."
 nd_nse_weaponry_forging: "Weaponry Forging"
 nd_nse_weaponry_forging_desc: "The production of weapons and armor for the empire's professional military forces, combining Norse metalworking with English smithing traditions."
 nd_nse_woodcarving_tradition: "Woodcarving Tradition"
 nd_nse_woodcarving_tradition_desc: "The intricate Norse tradition of decorative woodworking, produced carved furnishings that blend Christian iconography with pagan artistic motifs."
 nd_nse_parish_upkeep: "Parish Upkeep"
 nd_nse_parish_upkeep_desc: "The routine maintenance and liturgical supplies for the stave church's religious services."
 nd_nse_formed_tt: "Formed the #bold North Sea Empire#!"
 nd_nse_path_a_tt: "Chose the #bold Whale Road#! destiny"
 nd_nse_path_b_tt: "Chose the #bold Crown of Three Kingdoms#! destiny"
 nd_nse_destiny: "Destiny of the North Sea"
 nd_nse_destiny_desc: "The empire that spans three kingdoms and commands the greatest sea in the known world stands at a crossroads. What shall be its destiny?"
 nd_nse_dest_channel: "Mastery of the Channel"
 nd_nse_dest_channel_desc: "Seize control of the great trading cities of the Low Countries. Bruges and Amsterdam are the keys to northern European commerce -- in our hands, they will fund an empire built on trade."
 nd_nse_dest_hansa: "Hanseatic Subjugation"
 nd_nse_dest_hansa_desc: "The Hanseatic League has dominated North Sea trade for too long. Lubeck and Hamburg must bend the knee. Their merchant fleets will serve our crown or be swept from the sea."
 nd_nse_dest_atlantic: "Atlantic Thalassocracy"
 nd_nse_dest_atlantic_desc: "The ultimate prize: control of the Atlantic approaches. With Rouen and Lisbon in our grasp, no ship sails between the Mediterranean and the Baltic without our leave. The North Sea Empire becomes the arbiter of global trade."
 nd_nse_dest_crown: "Consolidation of the Realm"
 nd_nse_dest_crown_desc: "Before the empire can expand, it must be unified. Develop the institutions of governance and raise the realm's development until every corner of the three kingdoms prospers under one law."
 nd_nse_dest_eastern: "The Eastern March"
 nd_nse_dest_eastern_desc: "The Varangians once sailed east to build kingdoms among the Slavs. Now the North Sea Empire shall follow in their wake, conquering Novgorod and establishing dominion over the eastern trade routes."
 nd_nse_dest_imperium: "Imperium of the North"
 nd_nse_dest_imperium_desc: "Paris, the jewel of Western Christendom, must acknowledge northern supremacy. With the French capital under our control and the realm at the height of its development, the North Sea Empire becomes the undisputed power of Europe."
 nd_nse.6.t: "A Destiny Takes Shape"
 nd_nse.6.d: "The North Sea Empire has proven its stability and endurance. What began as an ambitious union of crowns has become a true nation, recognized by its neighbors and feared by its rivals. The foundations are laid -- now the question is what to build upon them.\n\nOur advisors point to the great map in the council chamber, where the blue expanse of our inner sea dominates the center. To the south lie the rich trading cities of Flanders and the Hanse. To the east, the vast forests and rivers where the Varangians once carved kingdoms from the wilderness. The empire's future lies in the direction we choose to march."
 nd_nse.6.a: "Our destiny awaits"
 nd_nse.7.t: "The Channel Falls Under Our Shadow"
 nd_nse.7.d: "The great trading cities of the Low Countries -- Bruges with its cloth halls and Amsterdam with its warehouses -- now fly our banner. The narrowest and busiest stretch of water in northern Europe has become our toll gate. Every bolt of Flemish cloth, every barrel of Rhenish wine, every cargo of Baltic timber that passes through the Channel now enriches our treasury.\n\nThe merchants of these cities, once fiercely independent, have discovered that the protection of the North Sea Empire's fleet is worth the price of submission. Our customs officers sit in their counting houses, and our warships patrol the approaches."
 nd_nse.7.a: "The Channel is our market floor"
 nd_nse.8.t: "The Fall of the Hanseatic League"
 nd_nse.8.d: "Lubeck, that proud city that styled itself Queen of the Hanse, has fallen. Hamburg, the gateway to the interior of Germany, flies our colors. The Hanseatic League -- for centuries the dominant commercial power of the North Sea and Baltic -- has been broken as an independent force.\n\nTheir warehouses and counting houses, their ships and their trade routes, their accumulated knowledge of markets from Novgorod to London -- all of this now passes into our hands. The question is what to do with this inheritance.\n\nWe can absorb their networks quietly, inheriting their merchant contacts and trade intelligence to build our own commercial empire even greater than theirs. Or we can crush them utterly, enforcing our monopoly on North Sea trade with an iron fist and eliminating any future competition."
 nd_nse.8.a: "Absorb their trade networks"
 nd_nse.8.b: "Enforce our monopoly by force"
 nd_nse.9.t: "Lords of the Atlantic"
 nd_nse.9.d: "With Rouen in Normandy and Lisbon on the Tagus under our control, the North Sea Empire has achieved something unprecedented: dominion over the entire Atlantic seaboard from the Arctic to the Mediterranean approaches. No ship can enter or leave the great ocean without passing through waters we command.\n\nThe wealth of the New World, the spice trade, the African gold coast -- all the great commercial arteries of the age flow through channels we control. This is the ultimate expression of thalassocratic power.\n\nWe can use this position to open the Atlantic to free commerce under our protection, building infrastructure and inviting trade. Or we can assert total control, making every merchant fleet dependent on our goodwill and every naval power subordinate to our admiralty."
 nd_nse.9.a: "Open the Atlantic to free commerce"
 nd_nse.9.b: "Assert total dominion over all routes"
 nd_nse.10.t: "The Realm Consolidated"
 nd_nse.10.d: "The dream of three kingdoms united under one law has moved from aspiration to reality. The institutions of governance -- the shire courts and Thing assemblies, the royal chancellery and the church hierarchy -- now function as a single system from the Shetlands to Jutland, from Dublin to Uppsala.\n\nDevelopment has spread to every corner of the realm. Roads connect the great cities, markets operate under uniform regulations, and the king's writ runs unchallenged in every province. The foundation has been laid for something greater -- an empire that can project power far beyond its original borders."
 nd_nse.10.a: "The three kingdoms are truly one"
 nd_nse.11.t: "The Eastern March Established"
 nd_nse.11.d: "Novgorod, the great trading city of the East, has fallen to our armies. The Varangian dream has been fulfilled at last -- the route from Scandinavia to the Byzantine frontier is once again under Norse control. Where Rurik and his companions once came as adventurers, we come as conquerors.\n\nThe eastern frontier stretches before us, vast and full of possibility. We can press forward aggressively, using Novgorod as a launching point for further expansion into the Russian heartland. Or we can consolidate this gain, fortifying the eastern frontier and building it into an impregnable bastion that secures our flank while we develop the interior."
 nd_nse.11.a: "Press the advance eastward"
 nd_nse.11.b: "Fortify and consolidate the frontier"
 nd_nse.12.t: "Imperium of the North Proclaimed"
 nd_nse.12.d: "Paris has fallen. The most prestigious city in Western Christendom, the seat of the Capetian kings, the heart of medieval learning and culture -- it is ours. With this conquest, the North Sea Empire has transcended its origins as a maritime union and become the dominant power of the European continent.\n\nThe realm now stretches from the Arctic wastes of Greenland to the banks of the Seine, from the forests of Novgorod to the coasts of Ireland. No empire since Rome has commanded such a vast and diverse territory in Europe.\n\nThe question of how to govern this colossus admits of two answers. We can rule through overwhelming military force, subjugating all resistance and extracting the wealth of conquered provinces. Or we can seek to harmonize the diverse peoples of the empire, integrating them through law and shared governance into a true universal monarchy."
 nd_nse.12.a: "Subjugate all who resist"
 nd_nse.12.b: "Harmonize the peoples of the empire"
 STATIC_MODIFIER_NAME_nd_nse_dest_channel_networks: "Hanseatic Trade Networks"
 STATIC_MODIFIER_DESC_nd_nse_dest_channel_networks: "The absorbed trade intelligence and merchant contacts of the former Hanseatic League fuel our commercial expansion."
 STATIC_MODIFIER_NAME_nd_nse_dest_channel_monopoly: "North Sea Monopoly"
 STATIC_MODIFIER_DESC_nd_nse_dest_channel_monopoly: "Ruthless enforcement of our trade monopoly eliminates competition and bends rival merchants to our will."
 STATIC_MODIFIER_NAME_nd_nse_dest_atlantic_trade: "Atlantic Free Commerce"
 STATIC_MODIFIER_DESC_nd_nse_dest_atlantic_trade: "Open trade policies attract merchants from every corner of the globe, funding massive construction projects across the empire."
 STATIC_MODIFIER_NAME_nd_nse_dest_atlantic_dominion: "Atlantic Dominion"
 STATIC_MODIFIER_DESC_nd_nse_dest_atlantic_dominion: "Total control of the Atlantic trade routes allows the empire to integrate distant territories while maintaining a veteran military establishment."
 STATIC_MODIFIER_NAME_nd_nse_dest_march_east: "Eastern Offensive"
 STATIC_MODIFIER_DESC_nd_nse_dest_march_east: "The momentum of the eastern campaign drives the empire's armies forward at speed, though mercenary costs mount with each new frontier."
 STATIC_MODIFIER_NAME_nd_nse_dest_fortify: "Frontier Bastion"
 STATIC_MODIFIER_DESC_nd_nse_dest_fortify: "The eastern frontier is fortified into an impregnable defensive line, securing the empire's flank against all comers."
 STATIC_MODIFIER_NAME_nd_nse_dest_subjugate: "Imperial Subjugation"
 STATIC_MODIFIER_DESC_nd_nse_dest_subjugate: "Conquered provinces are brought to heel through military force, their wealth extracted for the empire's coffers at the cost of noble discontent."
 STATIC_MODIFIER_NAME_nd_nse_dest_harmonize: "Harmonized Peoples"
 STATIC_MODIFIER_DESC_nd_nse_dest_harmonize: "A policy of cultural integration and shared governance binds the empire's diverse peoples together, though the effort of maintaining internal harmony saps the will for prolonged wars."
 nd_nse_admiralty_house: "Admiralty House"
 nd_nse_admiralty_house_desc: "The supreme headquarters of the North Sea Empire's naval administration, coordinating the mightiest fleet in the Atlantic world."
 nd_nse_imperial_chancery: "Imperial Chancery"
 nd_nse_imperial_chancery_desc: "The administrative heart of the Imperium of the North, where laws are drafted in three languages and dispatched to every corner of the realm."
 nd_nse_admiralty_operations: "Admiralty Operations"
 nd_nse_admiralty_operations_desc: "The daily operations of the North Sea admiralty, coordinating fleet movements and trade convoy schedules."
 nd_nse_chancery_administration: "Chancery Administration"
 nd_nse_chancery_administration_desc: "The vast bureaucratic apparatus of the imperial chancery, processing edicts and correspondence across three kingdoms."
