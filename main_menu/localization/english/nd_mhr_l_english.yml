l_english:
 STATIC_MODIFIER_NAME_nd_ganimi_kava: "Ganimi Kava"
 STATIC_MODIFIER_DESC_nd_ganimi_kava: "The art of guerrilla warfare perfected by Shivaji Maharaj — swift strikes from hill forts, ambushes in mountain passes, and the relentless harrying of vastly superior forces. Speed, terrain, and audacity replace numbers and heavy armor."
 STATIC_MODIFIER_NAME_nd_hindavi_swarajya: "Hindavi Swarajya"
 STATIC_MODIFIER_DESC_nd_hindavi_swarajya: "The dream of Hindu self-rule that Shivaji proclaimed at his coronation in Raigad — an independent state governed by its own people, administered through the Ashtapradhan council, and sustained by the devotion of the Marathi-speaking heartland."
 nd_mhr.1.t: "The Maratha Swarajya"
 nd_mhr.1.d: "The Deccan trembles. What began as the defiance of a single Bhonsle chieftain has become something the Mughal padishahs and Bijapur sultans never imagined — a sovereign Maratha state, forged in the hill forts of the Western Ghats and baptized in the blood of a hundred ambushes. The coronation at Raigad has given this new nation a crown, but the harder question remains: what kind of nation shall this be? Will we remain the swift raiders of the hills, the masters of ganimi kava who can bleed any empire dry? Or will we build the institutions of governance that transform a warrior kingdom into a lasting civilization?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mhr.1.a: "We are the shadow in the mountains."
 nd_mhr.1.b: "We shall build a kingdom for all Marathas."
 nd_mhr.2.t: "The Saints of the Warkari Path"
 nd_mhr.2.d: "From the banks of the Indrayani to the temple of Vithoba at Pandharpur, a river of pilgrims flows each year — barefoot farmers, potters, and weavers who sing the abhangs of Dnyaneshwar and Tukaram as they walk. The Warkari movement has done what no army could: it has given the Marathi people a shared spiritual identity that transcends caste and village. Tukaram's verses declare that devotion knows no birth, and Dnyaneshwar's Dnyaneshwari made the wisdom of the Bhagavad Gita accessible in the language of the common people. This movement can be embraced as the spiritual foundation of our state, or channeled as a force for social reform and literacy."
 nd_mhr.2.a: "Pandharpur shall be our spiritual heart."
 nd_mhr.2.b: "The saints teach us that all castes are equal before God."
 nd_mhr.3.t: "The Art of Ganimi Kava"
 nd_mhr.3.d: "While the great armies of the Mughal Empire march in ponderous columns across the Deccan plains, our fighters vanish into the folds of the Western Ghats like monsoon mist. Shivaji Maharaj has perfected the art of ganimi kava — guerrilla warfare that turns every ravine into an ambush site, every hill fort into an impregnable refuge, and every moonless night into a battlefield. At Pratapgad, a Maratha force annihilated the army of Afzal Khan. At Sinhagad, Tanaji Malusare's men scaled sheer cliffs in darkness to seize a fortress the Mughals thought unassailable. These are not isolated victories — they are a military doctrine that will define Maratha warfare for generations."
 nd_mhr.3.a: "The mountains are our fortress, and the night is our ally."
 nd_mhr.4.t: "The Maratha Confederacy"
 nd_mhr.4.d: "Under the Peshwas, the Maratha state has evolved into something unprecedented — a confederacy of powerful houses, each commanding their own armies and territories, yet bound together by shared loyalty to the Chhatrapati and the dream of Hindavi Swarajya. The Holkars hold Indore, the Scindias command Gwalior, the Gaekwads govern Baroda, and the Bhonsales rule Nagpur. Together they have pushed Maratha power from the Deccan to the gates of Delhi itself. Baji Rao's cavalry raids have humiliated the Mughal emperor in his own capital. But this very success raises a question: should we bind these great houses more tightly under Peshwa authority, or give them the freedom to expand as they will?"
 nd_mhr.4.a: "Unity under the Peshwa shall be our strength."
 nd_mhr.4.b: "Let each sardar carry our banner to new horizons."
 nd_mhr.5.t: "European Methods and Maratha Arms"
 nd_mhr.5.d: "The arrival of European powers on the Indian coast has brought more than trade goods and missionaries — it has brought new methods of warfare. European-drilled infantry, field artillery, and fortification techniques have proven devastatingly effective against traditional armies. The Marathas, ever pragmatic, have begun to adapt. French adventurers like Benoit de Boigne have trained Maratha infantry in European drill, while Maratha smiths have learned to cast European-style cannon in the tophkhanas of Pune and Satara. The question is whether we embrace these foreign methods wholesale or selectively adopt what serves us while maintaining our distinctive cavalry traditions."
 nd_mhr.5.a: "Modernize the army with European weapons and drill."
 nd_mhr.5.b: "Study the Europeans — and use their own methods against them."
 STATIC_MODIFIER_NAME_nd_mhr_bhakti_devotion: "Light of Pandharpur"
 STATIC_MODIFIER_DESC_nd_mhr_bhakti_devotion: "The devotional fervor of the Warkari pilgrimage unites the Marathi people in shared faith and cultural pride."
 STATIC_MODIFIER_NAME_nd_mhr_bhakti_reform: "Caste-Blind Devotion"
 STATIC_MODIFIER_DESC_nd_mhr_bhakti_reform: "The radical egalitarianism of the Bhakti saints breaks down social barriers and spreads literacy through vernacular devotional poetry."
 STATIC_MODIFIER_NAME_nd_mhr_confederacy_unity: "Peshwa Ascendancy"
 STATIC_MODIFIER_DESC_nd_mhr_confederacy_unity: "The great Maratha houses are bound together under the administrative authority of the Peshwa, creating a unified confederacy."
 STATIC_MODIFIER_NAME_nd_mhr_confederacy_expansion: "Maratha Horsemen Unbound"
 STATIC_MODIFIER_DESC_nd_mhr_confederacy_expansion: "The sardars of the confederacy ride forth independently, carrying Maratha power to every corner of the subcontinent."
 STATIC_MODIFIER_NAME_nd_mhr_european_arms: "Tophkhana Modernization"
 STATIC_MODIFIER_DESC_nd_mhr_european_arms: "European artillery and infantry drill have been adopted wholesale, transforming the Maratha army into a modern fighting force."
 STATIC_MODIFIER_NAME_nd_mhr_european_diplomacy: "Playing the Great Game"
 STATIC_MODIFIER_DESC_nd_mhr_european_diplomacy: "Maratha diplomats study European methods of statecraft, intelligence, and alliance-building to turn the colonizers' own tools against them."
 nd_mhr_yadava_heritage: "Yadava Heritage"
 nd_mhr_yadava_heritage_desc: "The Marathas trace their lineage to the Yadava dynasty that ruled the Deccan from Devagiri. This ancient heritage provides legitimacy and a tradition of cavalry warfare across the plateau."
 nd_mhr_warkari_devotion: "Warkari Devotion"
 nd_mhr_warkari_devotion_desc: "The Warkari tradition of pilgrimage to Pandharpur, sustained by the abhangs of saints like Dnyaneshwar and Namdev, forges a common spiritual identity among the Marathi people."
 nd_mhr_deccan_agriculture: "Deccan Agriculture"
 nd_mhr_deccan_agriculture_desc: "The black cotton soils of the Deccan plateau and the seasonal monsoon rains support a distinctive agricultural system centered on millet, pulses, and cotton."
 nd_mhr_marathi_literary_tradition: "Marathi Literary Tradition"
 nd_mhr_marathi_literary_tradition_desc: "The Dnyaneshwari and other works in the Marathi language create a literate culture that transcends the Sanskrit-educated elite, bringing philosophy and governance to the common people."
 nd_mhr_western_ghats_mastery: "Western Ghats Mastery"
 nd_mhr_western_ghats_mastery_desc: "The rugged terrain of the Western Ghats — steep ravines, dense forests, and narrow passes — is the natural fortress of the Marathi people, and they have learned to move through it as no outsider can."
 nd_mhr_gadkot_tradition: "Gadkot Tradition"
 nd_mhr_gadkot_tradition_desc: "The tradition of building fortifications atop the hills and ridges of the Western Ghats creates a network of impregnable strongpoints — the gads — that anchor Maratha military power."
 nd_mhr_mavla_hillmen: "Mavla Hillmen"
 nd_mhr_mavla_hillmen_desc: "The mavlas are hardy infantry from the Maval region of the Western Ghats, expert in hill fighting, ambushes, and night raids. They form the core of Shivaji's guerrilla army."
 nd_mhr_ganimi_kava_tactics: "Ganimi Kava Tactics"
 nd_mhr_ganimi_kava_tactics_desc: "Shivaji's perfection of guerrilla warfare — ganimi kava — transforms the Western Ghats into a deathtrap for conventional armies through ambushes, night raids, and feigned retreats."
 nd_mhr_ashtapradhan_council: "Ashtapradhan Council"
 nd_mhr_ashtapradhan_council_desc: "The council of eight ministers — Peshwa, Amatya, Sachiv, Mantri, Senapati, Sumant, Nyayadhish, and Panditrao — provides the administrative framework for the Maratha state."
 nd_mhr_coronation_traditions: "Coronation Traditions"
 nd_mhr_coronation_traditions_desc: "The coronation ceremony at Raigad, conducted according to Vedic rites, establishes the Chhatrapati as a sovereign Hindu king — a direct challenge to Mughal supremacy over the Deccan."
 nd_mhr_deccan_trade_routes: "Deccan Trade Routes"
 nd_mhr_deccan_trade_routes_desc: "The great trade routes connecting the Konkan coast to the Deccan interior carry cotton, spices, and textiles, making the Maratha heartland a hub of commercial activity."
 nd_mhr_fort_network: "Fort Network"
 nd_mhr_fort_network_desc: "The systematic construction and maintenance of hill forts across the Western Ghats creates an interlocking defensive network where each fort supports its neighbors."
 nd_mhr_konkan_naval_power: "Konkan Naval Power"
 nd_mhr_konkan_naval_power_desc: "Under admirals like Kanhoji Angre, the Maratha navy dominates the Konkan coast from Surat to south of Mumbai, using fast gallivats and grabs to challenge even the European maritime powers."
 nd_mhr_shiledar_system: "Shiledar System"
 nd_mhr_shiledar_system_desc: "The shiledar cavalry system, where horsemen provide their own mounts and weapons in exchange for a monthly salary, creates a self-reliant force of light cavalry raiders."
 nd_mhr_chauth_system: "Chauth System"
 nd_mhr_chauth_system_desc: "The chauth — a levy of one-quarter of total revenue collected from neighboring territories — becomes the financial backbone of the Maratha state and a powerful instrument of political control."
 nd_mhr_abhang_poetry: "Abhang Poetry"
 nd_mhr_abhang_poetry_desc: "The devotional verses of Tukaram and other Bhakti poet-saints, composed in everyday Marathi, create a body of literature that gives the common people access to spiritual and philosophical ideas."
 nd_mhr_coastal_raiding: "Coastal Raiding"
 nd_mhr_coastal_raiding_desc: "Maratha naval tactics emphasize fast, maneuverable vessels that close from astern to avoid cannon broadsides, then board enemy ships in fierce hand-to-hand combat."
 nd_mhr_peshwa_rise: "Peshwa Rise"
 nd_mhr_peshwa_rise_desc: "The office of the Peshwa, originally the chief minister of the Ashtapradhan, gradually becomes the real seat of power in the Maratha state, producing brilliant administrators and generals."
 nd_mhr_bargir_cavalry: "Bargir Cavalry"
 nd_mhr_bargir_cavalry_desc: "Unlike the self-equipped shiledar, bargir cavalrymen are provided horses and weapons by the state, creating a more disciplined and centrally controlled cavalry force."
 nd_mhr_peshwa_bureaucracy: "Peshwa Bureaucracy"
 nd_mhr_peshwa_bureaucracy_desc: "The Peshwa administration in Pune develops a sophisticated bureaucratic system with detailed record-keeping, standardized revenue collection, and professional administrators."
 nd_mhr_confederacy_structure: "Confederacy Structure"
 nd_mhr_confederacy_structure_desc: "The Maratha Confederacy evolves into a federal system where powerful houses — Holkar, Scindia, Gaekwad, and Bhonsale — govern vast territories while acknowledging the nominal supremacy of the Chhatrapati."
 nd_mhr_grab_warships: "Grab Warships"
 nd_mhr_grab_warships_desc: "The grab, a larger and more heavily armed vessel than the gallivat, serves as the backbone of the Maratha fleet — capable of engaging European ships on more equal terms."
 nd_mhr_sardeshmukhi_rights: "Sardeshmukhi Rights"
 nd_mhr_sardeshmukhi_rights_desc: "The sardeshmukhi — an additional ten percent levy beyond the chauth — asserts the Maratha sovereign's claim as hereditary head of all deshmukhs across the Deccan."
 nd_mhr_deccan_cotton_trade: "Deccan Cotton Trade"
 nd_mhr_deccan_cotton_trade_desc: "The Deccan's black cotton soils produce some of India's finest raw cotton, feeding a thriving textile industry that exports cloth across the Indian Ocean trading world."
 nd_mhr_european_military_methods: "European Military Methods"
 nd_mhr_european_military_methods_desc: "The pragmatic adoption of European military techniques — field artillery, infantry drill, and modern fortification — transforms the Maratha army without abandoning its cavalry traditions."
 nd_mhr_gardis_bodyguard: "Gardis Bodyguard"
 nd_mhr_gardis_bodyguard_desc: "The Gardis are an elite bodyguard corps trained in European methods, serving as the personal guard of the Peshwa and as shock troops in pitched battles."
 nd_mhr_territorial_administration: "Territorial Administration"
 nd_mhr_territorial_administration_desc: "As Maratha territory expands across the subcontinent, the Peshwa government develops systems for administering distant provinces, appointing deputies, and maintaining control over far-flung garrisons."
 nd_mhr_maratha_resilience: "Maratha Resilience"
 nd_mhr_maratha_resilience_desc: "Even after the catastrophe of Panipat in 1761, the Marathas regroup and recover within a decade, retaking Delhi and reasserting control over much of India — a testament to the depth of Maratha military and administrative capacity."
 nd_mhr_konkan_trade_network: "Konkan Trade Network"
 nd_mhr_konkan_trade_network_desc: "The Maratha-controlled ports of the Konkan coast develop into a thriving commercial network, linking the agricultural interior to the maritime trade routes of the Indian Ocean."
 nd_mhr_maval_militia_reform: "Maval Militia Reform"
 nd_mhr_maval_militia_reform_desc: "Drawing on the tradition of the mavla hillmen, reforms standardize local militia recruitment, ensuring a steady supply of trained soldiers from the Western Ghats heartland."
 nd_mhr_modern_artillery: "Modern Artillery"
 nd_mhr_modern_artillery_desc: "Maratha foundries in Pune and Satara produce modern field guns, while trained artillerists learn to deploy them in the European manner — a far cry from the crude bombards of earlier centuries."
 nd_mhr_last_peshwa_reforms: "Last Peshwa Reforms"
 nd_mhr_last_peshwa_reforms_desc: "In the twilight of the Maratha Confederacy, final administrative reforms seek to centralize authority and streamline governance, attempting to match the institutional efficiency of the British."
 nd_mhr_maratha_identity: "Maratha Identity"
 nd_mhr_maratha_identity_desc: "The legacy of Shivaji, the poetry of the Bhakti saints, and centuries of self-governance forge a distinctive Marathi cultural identity that endures beyond the political life of the empire."
 nd_mhr_fortress_modernization: "Fortress Modernization"
 nd_mhr_fortress_modernization_desc: "The ancient gad hill forts are upgraded with modern bastions, gun emplacements, and European-style defensive works to resist artillery bombardment."
 nd_mhr_industrial_deccani: "Industrial Deccan"
 nd_mhr_industrial_deccani_desc: "The Deccan's mineral wealth, cotton production, and skilled artisan traditions provide the foundation for early industrial development."
 nd_mhr_deccan_independence: "Deccan Independence"
 nd_mhr_deccan_independence_desc: "The culmination of centuries of Maratha governance — a self-sufficient Deccan state with its own institutions, economy, and cultural identity, independent of outside domination."
 a_nd_mhr_mavla: "Mavla Hillmen"
 a_nd_mhr_mavla_desc: "Hardy infantry from the Maval region of the Western Ghats, experts in hill fighting, night raids, and guerrilla warfare. They are the backbone of Shivaji's ganimi kava doctrine."
 a_nd_mhr_shiledar: "Shiledar Cavalry"
 a_nd_mhr_shiledar_desc: "Self-equipped light cavalry who provide their own horses and weapons. Fast, independent, and skilled at raiding deep behind enemy lines."
 a_nd_mhr_bargir: "Bargir Cavalry"
 a_nd_mhr_bargir_desc: "State-equipped cavalry who receive their mounts and arms from the government. More disciplined than the shiledar, they serve as the heavy striking arm of the Maratha army."
 a_nd_mhr_gardis: "Gardis"
 a_nd_mhr_gardis_desc: "Elite bodyguard infantry trained in European military methods. Professional soldiers who serve as the Peshwa's personal guard and shock troops in pitched battles."
 n_nd_mhr_gallivat: "Gallivat"
 n_nd_mhr_gallivat_desc: "A small, fast coastal warboat with oars and a single mast, crewed by fifty to sixty men. Used for boarding actions, coastal raids, and harrying larger European vessels."
 n_nd_mhr_grab: "Grab"
 n_nd_mhr_grab_desc: "A larger Maratha warship of up to four hundred tons, armed with cannon and carrying over a hundred crew. Capable of engaging European ships in close combat."
 nd_mhr_gad: "Gad"
 nd_mhr_gad_desc: "A hilltop fortification built on the steep ridges of the Western Ghats. Its commanding position, sheer approaches, and thick stone walls make it virtually impregnable to assault."
 nd_mhr_chauth_kacheri: "Chauth Kacheri"
 nd_mhr_chauth_kacheri_desc: "A revenue office that administers the collection of chauth — one quarter of the territory's revenue — on behalf of the Maratha sovereign."
 nd_mhr_warkari_math: "Warkari Math"
 nd_mhr_warkari_math_desc: "A monastery associated with the Warkari tradition of devotional pilgrimage. Centers of Bhakti learning, abhang poetry, and communal worship of Vithoba."
 nd_mhr_tophkhana: "Tophkhana"
 nd_mhr_tophkhana_desc: "An artillery foundry producing European-style cannon and firearms. Staffed by skilled metalworkers and often supervised by foreign advisors."
 nd_mhr_angre_shipyard: "Angre Shipyard"
 nd_mhr_angre_shipyard_desc: "A naval dockyard on the Konkan coast, built in the tradition of Admiral Kanhoji Angre, producing the gallivats and grabs that dominate the western Indian seaboard."
 nd_mhr_peshwa_daftar: "Peshwa Daftar"
 nd_mhr_peshwa_daftar_desc: "The administrative chancery of the Peshwa government, maintaining detailed records of revenue, military deployments, and diplomatic correspondence."
 nd_mhr_gad_upkeep: "Hill Fort Garrison"
 nd_mhr_gad_upkeep_desc: "Stone for the walls, weapons for the defenders, and leather for harness and equipment to maintain the hilltop fortification and its garrison."
 nd_mhr_kacheri_upkeep: "Revenue Administration"
 nd_mhr_kacheri_upkeep_desc: "Paper for revenue records and correspondence, cloth for official seals and attire, and salt as a standard medium of administrative exchange."
 nd_mhr_math_upkeep: "Monastery Maintenance"
 nd_mhr_math_upkeep_desc: "Paper for devotional texts and abhang poetry, cloth for pilgrim robes, and beeswax for the lamps that burn before Vithoba's image."
 nd_mhr_tophkhana_upkeep: "Foundry Operations"
 nd_mhr_tophkhana_upkeep_desc: "Iron, copper, and weaponry are cast into artillery pieces in the foundry."
 nd_mhr_shipyard_upkeep: "Naval Dockyard Operations"
 nd_mhr_shipyard_upkeep_desc: "Lumber and naval supplies for hull construction and rigging, and tools for the craftsmen who build and repair the gallivats and grabs of the Konkan fleet."
 nd_mhr_daftar_upkeep: "Chancery Operations"
 nd_mhr_daftar_upkeep_desc: "Paper for the voluminous records of the Peshwa administration, fine cloth for official furnishings and ceremonial use, and books as reference works for trained administrators."
 nd_mhr_cotton_weaving_pm: "Deccani Cotton Weaving"
 nd_mhr_cotton_weaving_pm_desc: "Deccan cloth is dyed and woven into fine textiles prized across the Indian Ocean trade network."
 nd_mhr_arms_workshop_pm: "Maratha Arms Workshop"
 nd_mhr_arms_workshop_pm_desc: "Maratha smiths forge iron and rework captured arms into firearms for the expanding military."
 a_nd_mhr_silahdar: "Silahdar"
 a_nd_mhr_silahdar_desc: "Reformed militia infantry drawn from the Maval highlands, drilled in improved formations and equipped with standardized weapons by the state."
 a_nd_mhr_field_gun: "Maratha Field Gun"
 a_nd_mhr_field_gun_desc: "Modern field artillery cast in Maratha foundries, crewed by trained artillerists and capable of sustained bombardment in the European fashion."
 nd_mhr_bastion_fort: "Bastion Fort"
 nd_mhr_bastion_fort_desc: "A modernized fortification combining the traditional hilltop position of the Maratha gad with European-style star bastions and angled gun emplacements."
 nd_mhr_koshti_karkhana: "Koshti Karkhana"
 nd_mhr_koshti_karkhana_desc: "A weaver's workshop where the koshti caste produces fine Deccan cotton textiles. The Maratha heartland's cotton was prized across the Indian Ocean trade network."
 nd_mhr_loom_upkeep: "Loom Operations"
 nd_mhr_loom_upkeep_desc: "Timber for loom frames and repair, fiber crops as raw thread stock for spinning, and tools for maintaining the weaving equipment."
 nd_mhr_bastion_upkeep: "Bastion Maintenance"
 nd_mhr_bastion_upkeep_desc: "Stone for the angled bastions, weapons for the gun emplacements, and tools to repair the European-style defensive works."
 nd_mhr_naval_provisioning_pm: "Naval Provisioning"
 nd_mhr_naval_provisioning_pm_desc: "Naval stores and timber for the Maratha raiding fleet, with tar for caulking hulls against the harsh Konkan sea."
 nd_mhr_deccan_manufactory_pm: "Deccan Manufactory"
 nd_mhr_deccan_manufactory_pm_desc: "Deccan workshops process iron and cloth into finished weaponry for domestic use and export."
 levy_nd_mhr_silahdar: "Silahdar Levy"
 levy_nd_mhr_silahdar_desc: "Reformed militia soldiers called up from the Western Ghats heartland, equipped and drilled by the state."
 levy_nd_mhr_bargir: "Bargir Cavalry Levy"
 levy_nd_mhr_bargir_desc: "State-equipped cavalrymen raised from the soldier and noble populations, armed and mounted at government expense."
 levy_nd_mhr_mavla: "Mavla Hillmen Levy"
 levy_nd_mhr_mavla_desc: "Hardy hillmen from the Western Ghats called up as levy infantry, skilled in ambush tactics and rough terrain warfare."
 nd_mhr_formed_tt: "Marathas has been formed"
 nd_mhr_path_a_tt: "Chose Ganimi Kava"
 nd_mhr_path_b_tt: "Chose Hindavi Swarajya"
 nd_mhr_destiny: "Maratha Destiny"
 nd_mhr_destiny_desc: "With the Deccan united under the Maratha banner, the path forward diverges. The Swarajya stands at a crossroads between the sword and the plough, between conquest and civilization."
 nd_mhr_dest_deccan_lord: "Lord of the Deccan"
 nd_mhr_dest_deccan_lord_desc: "Secure the western approaches by seizing Surat and push into Malwa by taking Gwalior. With these strongpoints in hand, no army can threaten the Maratha heartland."
 nd_mhr_dest_northern_march: "The Northern March"
 nd_mhr_dest_northern_march_desc: "Baji Rao rode to the gates of Delhi and back in a single campaign. Now make it permanent -- plant the Maratha flag in Delhi and secure the Malwa plateau through Ujjain."
 nd_mhr_dest_hindu_pad_padshahi: "Hindu Pad Padshahi"
 nd_mhr_dest_hindu_pad_padshahi_desc: "The dream of a Hindu empire stretching from the Deccan to the Punjab. Take Agra and Lahore, command the greatest army on the subcontinent, and claim the title the Mughals once held."
 nd_mhr_dest_swaraj_foundation: "Foundation of Swaraj"
 nd_mhr_dest_swaraj_foundation_desc: "Before the Marathas can build a lasting civilization, they must develop their lands and embrace modern financial institutions. Grow the Deccan's wealth and adopt banking."
 nd_mhr_dest_deccani_prosperity: "Deccani Prosperity"
 nd_mhr_dest_deccani_prosperity_desc: "Extend the chauth system into Gujarat by taking Baroda, fill the treasury, and ensure Deccan cotton flows through the capital's markets. Wealth is the sinew of self-rule."
 nd_mhr_dest_deccani_golden_age: "The Deccani Golden Age"
 nd_mhr_dest_deccani_golden_age_desc: "Build a civilization that rivals any on earth -- a Deccan of literate citizens, thriving markets, and a cultural tradition that endures for centuries. Develop the land, spread the printing press, and fill the coffers."
 nd_mhr.6.t: "The Destiny of the Marathas"
 nd_mhr.6.d: "The Maratha state has proven its permanence. What began as the rebellion of a single chieftain against the sultans of the Deccan has become an established kingdom with institutions, traditions, and ambitions that reach far beyond the Western Ghats. The question that consumed Shivaji's court -- whether the Marathas are raiders or rulers -- now demands an answer written not in the language of debate, but in the language of deeds."
 nd_mhr.6.a: "Our destiny awaits."
 nd_mhr.7.t: "Lord of the Deccan"
 nd_mhr.7.d: "Surat's warehouses and Gwalior's fortress are ours. The old sultanates that once divided this land are broken, and the Maratha standard flies over the western trade routes and the gateway to Hindustan. Every merchant who passes through Surat pays tribute to the Swarajya. Every army that contemplates invasion must reckon with the fortress of Gwalior at its flank. The Deccan is no longer a contested frontier -- it is a Maratha domain."
 nd_mhr.7.a: "The Deccan bows to the Maratha lion."
 nd_mhr.8.t: "The Road to Delhi"
 nd_mhr.8.d: "Delhi has fallen. The city that for centuries was the seat of Muslim sovereignty over Hindustan now acknowledges Maratha supremacy. Ujjain, the ancient capital of Malwa, secures our western flank. But an empire won by the sword must be held by more than the sword. Do we ride as Baji Rao did -- fast, relentless, overwhelming our enemies before they can react? Or do we methodically reduce every fortress and strongpoint, building an unbreakable chain of control from the Deccan to the Yamuna?"
 nd_mhr.8.a: "Ride like Baji Rao -- strike before they know we are coming."
 nd_mhr.8.b: "Every fort taken is a fort that cannot threaten us."
 nd_mhr.9.t: "Hindu Pad Padshahi"
 nd_mhr.9.d: "From the Indus to the Narmada, from the Thar to the Bay of Bengal -- the Maratha empire commands a domain that surpasses even the greatest Mughal ambitions. Agra's marble palaces and Lahore's golden temples are now Maratha possessions. The Hindu Pad Padshahi -- the supremacy of Hindu kings -- is no longer a dream whispered in the courts of Raigad. It is the reality of the subcontinent. But supreme power brings supreme choices. Shall we rule through the strength of a vast military machine, drawing mercenaries and adventurers from across the world? Or shall we build the commercial and naval infrastructure to sustain our empire through trade as much as through arms?"
 nd_mhr.9.a: "Our armies shall be the pillar of empire."
 nd_mhr.9.b: "Empire endures through commerce, not conquest alone."
 nd_mhr.10.t: "The Foundation of Self-Rule"
 nd_mhr.10.d: "The dream of Hindavi Swarajya was never merely about independence from foreign rule. It was about building a state worthy of its people -- one where the revenue systems are fair, the administration is competent, and the wealth of the land serves all who work it. The adoption of modern banking has given the Maratha state financial instruments that rival those of any European power. The Deccan's development speaks louder than any proclamation: this is a civilization that can sustain itself."
 nd_mhr.10.a: "Swarajya is built on the prosperity of its people."
 nd_mhr.11.t: "Deccani Prosperity"
 nd_mhr.11.d: "The chauth offices of Baroda collect revenue from the richest trade routes of Gujarat. Cotton from the Deccan's black soil flows through our markets to the world. The treasury overflows. Pune has become not merely a military capital but a center of intellectual life -- poets, astronomers, and administrators gather in its courts. But prosperity creates its own dilemmas. Do we invest in the life of the mind, supporting scholars and attracting foreign expertise to build our knowledge? Or do we pour our wealth into the cotton trade itself, building the ships and ports that will make the Deccan the textile workshop of the Indian Ocean?"
 nd_mhr.11.a: "Pune shall become the Athens of the Deccan."
 nd_mhr.11.b: "Deccan cotton shall clothe the world."
 nd_mhr.12.t: "The Deccani Golden Age"
 nd_mhr.12.d: "What Shivaji planted has grown into a civilization. The Deccan is no longer defined by the empires that conquered it -- it is defined by what its own people have built. A literate population reads Marathi poetry and debates governance in coffee houses. The printing press spreads ideas from village to village. The treasury is the envy of kings. Foreign ambassadors come not to dictate terms but to seek alliance. This is the Deccani Golden Age -- but how shall it be remembered? As an age of diplomatic mastery and harmonious governance? Or as an age of spiritual and cultural flowering that transcends political boundaries?"
 nd_mhr.12.a: "We shall be the architects of a new order."
 nd_mhr.12.b: "Let the light of the Deccan illuminate all faiths."
 STATIC_MODIFIER_NAME_nd_mhr_dest_baji_rao_charge: "Baji Rao's Charge"
 STATIC_MODIFIER_DESC_nd_mhr_dest_baji_rao_charge: "The lightning campaign doctrine of Baji Rao I -- strike fast, strike hard, and be gone before the enemy can marshal a response. Speed is the weapon of the outnumbered."
 STATIC_MODIFIER_NAME_nd_mhr_dest_strategic_patience: "Strategic Patience"
 STATIC_MODIFIER_DESC_nd_mhr_dest_strategic_patience: "The methodical reduction of enemy strongpoints through prolonged siege, turning every conquest into an unshakable possession. Patience wins what speed cannot hold."
 STATIC_MODIFIER_NAME_nd_mhr_dest_hindu_padshahi: "Hindu Padshahi"
 STATIC_MODIFIER_DESC_nd_mhr_dest_hindu_padshahi: "A vast military machine fueled by mercenary armies and professional soldiers, projecting Maratha power across the subcontinent through sheer force of arms."
 STATIC_MODIFIER_NAME_nd_mhr_dest_maratha_imperator: "Maratha Imperator"
 STATIC_MODIFIER_DESC_nd_mhr_dest_maratha_imperator: "An empire sustained by trade and naval power as much as by armies, with merchants and admirals serving alongside generals in the expansion of Maratha dominion."
 STATIC_MODIFIER_NAME_nd_mhr_dest_pune_intellectuals: "Pune Intellectuals"
 STATIC_MODIFIER_DESC_nd_mhr_dest_pune_intellectuals: "The scholars, astronomers, and administrators of Pune transform the Maratha capital into a center of learning that attracts talent from across the Indian Ocean world."
 STATIC_MODIFIER_NAME_nd_mhr_dest_cotton_empire: "Cotton Empire"
 STATIC_MODIFIER_DESC_nd_mhr_dest_cotton_empire: "Deccan cotton, woven into the finest textiles and shipped on Maratha vessels, becomes the foundation of an economic empire that rivals any military conquest."
 STATIC_MODIFIER_NAME_nd_mhr_dest_deccani_renaissance: "Deccani Renaissance"
 STATIC_MODIFIER_DESC_nd_mhr_dest_deccani_renaissance: "A flowering of statecraft and governance that integrates diverse peoples under a system of shared prosperity and institutional excellence."
 STATIC_MODIFIER_NAME_nd_mhr_dest_marathi_enlightenment: "Marathi Enlightenment"
 STATIC_MODIFIER_DESC_nd_mhr_dest_marathi_enlightenment: "The spiritual and cultural traditions of the Bhakti movement mature into a broader philosophy of religious tolerance and devotional renewal that transcends sectarian boundaries."
 nd_mhr_maratha_darbar: "Maratha Darbar"
 nd_mhr_maratha_darbar_desc: "The imperial court of the Maratha empire, where the Chhatrapati receives tribute from vassal kings and foreign ambassadors. A symbol of Hindu Pad Padshahi made manifest."
 nd_mhr_darbar_upkeep: "Imperial Court Operations"
 nd_mhr_darbar_upkeep_desc: "Fine cloth for court ceremonies and ambassadorial receptions, paper for imperial edicts and correspondence, and furniture for the grandeur of the darbar hall."
 nd_mhr_sharada_peeth: "Sharada Peeth"
 nd_mhr_sharada_peeth_desc: "A great academy of learning in the tradition of the ancient Sharada Peetha, where scholars study philosophy, astronomy, mathematics, and the arts of governance."
 nd_mhr_peeth_upkeep: "Academy Maintenance"
 nd_mhr_peeth_upkeep_desc: "Books for the library, paper for students and scholars, and cloth for academic robes and furnishings."
