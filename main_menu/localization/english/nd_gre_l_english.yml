l_english:
 STATIC_MODIFIER_NAME_nd_gre_megali_idea: "The Megali Idea"
 STATIC_MODIFIER_DESC_nd_gre_megali_idea: "The dream of restoring Greek sovereignty over the lands of the Byzantine Empire burns bright. Constantinople beckons — the city of our ancestors, the seat of Orthodox civilization, awaits its rightful heirs."
 STATIC_MODIFIER_NAME_nd_gre_hellenic_enlightenment: "Hellenic Enlightenment"
 STATIC_MODIFIER_DESC_nd_gre_hellenic_enlightenment: "Greece stands at the forefront of a new age of reason and learning. Drawing upon the wisdom of their classical ancestors and the intellectual currents of modern Europe, Greek scholars forge a nation built on education, maritime enterprise, and the democratic ideals of the ancient polis."
 STATIC_MODIFIER_NAME_nd_gre_fire_ship_legacy: "Legacy of the Fire Ships"
 STATIC_MODIFIER_DESC_nd_gre_fire_ship_legacy: "The daring exploits of Greek fire ship captains have struck terror into enemy fleets across the Aegean. This tradition of audacious naval warfare, where courage and ingenuity overcome superior numbers, defines the Greek approach to sea power."
 STATIC_MODIFIER_NAME_nd_gre_phanariot_diplomacy: "Phanariot Diplomatic Networks"
 STATIC_MODIFIER_DESC_nd_gre_phanariot_diplomacy: "The educated Greek families of the Phanar district have cultivated a web of diplomatic connections spanning from Constantinople to the courts of Europe. Their linguistic talents and political acumen serve the Greek cause from within the halls of power."
 STATIC_MODIFIER_NAME_nd_gre_phanariot_commerce: "Phanariot Commercial Empire"
 STATIC_MODIFIER_DESC_nd_gre_phanariot_commerce: "The merchant princes of the Phanar have leveraged their privileged position to build trading networks that span the Ottoman Empire and beyond. Greek commercial houses dominate the grain trade from the Black Sea to the Mediterranean."
 nd_gre.1.t: "The Birth of Hellas"
 nd_gre.1.d: "After centuries of foreign domination, a Greek state rises once more from the ashes of antiquity. The blue and white banner flies over Athens, and the question that has haunted the Greek nation for generations now demands an answer: what shall this reborn Hellas become?\n\nSome look eastward, toward Constantinople and the lost glory of the Roman Empire of the Greeks. The Megali Idea — the Great Idea — calls for nothing less than the restoration of Greek sovereignty over the lands where Greek civilization once flourished. This is a path of ambition, of Orthodox destiny, of reclaiming what was taken.\n\nOthers look to the future rather than the past. The scholars of the Greek Enlightenment — men like Rigas Feraios and Adamantios Korais — envision a modern republic, a beacon of learning and commerce in the Eastern Mediterranean. This is a path of reason, of maritime enterprise, of proving that the heirs of Pericles can build a new civilization worthy of their ancestors.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_gre.1.a: "Constantinople will be ours again!"
 nd_gre.1.b: "We shall be the light of the new age."
 nd_gre.2.t: "Fire on the Water"
 nd_gre.2.d: "On a moonless night, a small vessel packed with gunpowder and combustible materials creeps toward the enemy flagship. The crew, volunteers who know they may not survive, guide their floating inferno through the darkness. When the fire ship finds its mark, the explosion lights up the sea — the enemy admiral's vessel erupts in a column of flame visible for miles.\n\nThis is the Greek way of naval warfare. Outnumbered and outgunned, the sailors of Hydra, Spetses, and Psara have turned the fire ship into an art form. Where the Ottomans have warships built for battle, the Greeks have merchant vessels, daring captains, and the willingness to turn their own ships into weapons. The tactic has proven devastatingly effective — enemy fleets now hesitate to anchor near Greek waters, knowing that any moonless night could bring fire from the darkness."
 nd_gre.2.a: "Let them fear our flames!"
 nd_gre.3.t: "The Phanariot Ascendancy"
 nd_gre.3.d: "In the shadow of the Ecumenical Patriarchate, the great families of the Phanar district have risen to extraordinary influence. These educated, multilingual Greek nobles — the Phanariots — serve as dragomans, physicians, and administrators at the highest levels of Ottoman governance. They govern the Danubian Principalities, translate diplomatic correspondence, and command respect in every court from Vienna to St. Petersburg.\n\nYet this power comes with a choice. The Phanariots can leverage their position to build diplomatic networks that serve Greek national interests — eyes and ears in every capital, alliances forged in the corridors of power. Or they can turn their attention to commerce, using their privileged access to Ottoman markets to build Greek merchant houses that dominate the trade routes of the Eastern Mediterranean."
 nd_gre.3.a: "The pen is mightier than the sword."
 nd_gre.3.b: "Trade is the true path to power."
 nd_gre.4.t: "The Society of Friends"
 nd_gre.4.d: "In a modest house in Odessa, three Greek merchants — Nikolaos Skoufas, Emmanuil Xanthos, and Athanasios Tsakalov — have founded a secret society dedicated to the liberation of the Greek nation. They call it the Filiki Eteria, the Society of Friends.\n\nOrganized in the manner of Freemasonry and the Carbonari, with four levels of initiation and an elaborate system of codes and signals, the Society spreads rapidly through the Greek diaspora. Merchants in every major port, priests in every parish, captains on every island — the network grows invisible to Ottoman eyes. Members contribute to a war chest, smuggle weapons, and prepare the ground for revolution.\n\nThe day of reckoning approaches. When the signal is given, the entire Greek world will rise as one."
 nd_gre.4.a: "Freedom or death!"
 nd_gre_mountain_strongholds: "Mountain Strongholds"
 nd_gre_mountain_strongholds_desc: "The rugged mountains of Greece have always been the last refuge of the free. Fortified positions in the highlands provide sanctuary from invaders and serve as bases for resistance fighters."
 nd_gre_orthodox_identity: "Orthodox Identity"
 nd_gre_orthodox_identity_desc: "The Greek Orthodox faith serves as the unifying force of Hellenic identity, preserving language, learning, and national consciousness through centuries of foreign rule."
 nd_gre_olive_cultivation: "Olive Cultivation"
 nd_gre_olive_cultivation_desc: "The olive tree is the foundation of Greek agriculture, providing oil, food, and trade goods that have sustained Mediterranean civilizations since antiquity."
 nd_gre_armatoloi_tradition: "Armatoloi Tradition"
 nd_gre_armatoloi_tradition_desc: "The Armatoloi — Christian militia bands charged with guarding mountain passes — form the nucleus of Greek military capability, blending official authority with the fighting skills of highland warriors."
 nd_gre_aegean_seamanship: "Aegean Seamanship"
 nd_gre_aegean_seamanship_desc: "Generations of Greek sailors have mastered the treacherous waters of the Aegean, its sudden storms and rocky channels, building an unmatched tradition of seamanship among the island communities."
 nd_gre_monastic_learning: "Monastic Learning"
 nd_gre_monastic_learning_desc: "The monasteries of Mount Athos and other Greek holy sites preserve not only the Orthodox faith but the entire corpus of Greek learning — manuscripts, philosophy, and the seeds of a future national awakening."
 nd_gre_klepht_warfare: "Klepht Warfare"
 nd_gre_klepht_warfare_desc: "The Klephts — mountain bandits who refuse Ottoman authority — perfect the art of guerrilla warfare: ambush, raid, and vanish into the highlands. Their hit-and-run tactics prove more effective than European linear formations in mountainous terrain."
 nd_gre_diaspora_trade_networks: "Diaspora Trade Networks"
 nd_gre_diaspora_trade_networks_desc: "Greek merchant communities scattered across the Mediterranean and Black Sea create an interconnected commercial network, channeling wealth and information back to the Greek homeland."
 nd_gre_millet_governance: "Millet Governance"
 nd_gre_millet_governance_desc: "Under the Ottoman millet system, the Greek Orthodox community exercises significant self-governance in education, religion, and personal law, maintaining the administrative traditions that will one day serve a restored Greek state."
 nd_gre_phanariot_patronage: "Phanariot Patronage"
 nd_gre_phanariot_patronage_desc: "The wealthy Phanariot families of Constantinople establish academies and schools that ignite the modern Greek Enlightenment, training a generation of scholars who will articulate the case for Greek nationhood."
 nd_gre_island_shipyards: "Island Shipyards"
 nd_gre_island_shipyards_desc: "The shipyards of Hydra, Spetses, and Psara produce nimble vessels crewed by experienced sailors — a merchant fleet that doubles as a formidable naval force when the need arises."
 nd_gre_guerrilla_doctrine: "Guerrilla Doctrine"
 nd_gre_guerrilla_doctrine_desc: "Greek fighters codify the tactics of mountain warfare developed over centuries of resistance: control the high ground, strike at supply lines, never offer battle on the enemy's terms."
 nd_gre_merchant_marine: "Merchant Marine"
 nd_gre_merchant_marine_desc: "By the late eighteenth century, the Greek merchant marine has grown to dominate eastern Mediterranean shipping, with over a thousand vessels flying Greek colors and eighteen thousand experienced seamen ready for service."
 nd_gre_fire_ship_tactics: "Fire Ship Tactics"
 nd_gre_fire_ship_tactics_desc: "Greek naval commanders perfect the devastating tactic of the fire ship — small vessels packed with gunpowder and combustibles, rammed into enemy warships by volunteer crews who escape by rowboat at the last moment."
 nd_gre_patriarchal_schools: "Patriarchal Schools"
 nd_gre_patriarchal_schools_desc: "Under the patronage of the Ecumenical Patriarchate, Greek schools preserve and transmit classical learning, producing a literate population that outstrips their Ottoman rulers in education."
 nd_gre_greek_enlightenment: "Greek Enlightenment"
 nd_gre_greek_enlightenment_desc: "Greek intellectuals like Eugenios Voulgaris and Rigas Feraios synthesize classical Greek philosophy with modern European thought, laying the intellectual foundations for Greek independence and nationhood."
 nd_gre_aegean_trade_ascendancy: "Aegean Trade Ascendancy"
 nd_gre_aegean_trade_ascendancy_desc: "Greek merchants exploit successive European wars to challenge Western dominance of Mediterranean trade. Currants, grain, and olive products flow from Greek ports to markets across Europe."
 nd_gre_filiki_eteria: "Filiki Eteria"
 nd_gre_filiki_eteria_desc: "The Society of Friends — a clandestine revolutionary organization founded in 1814 in Odessa — weaves together Greek merchants, clergy, military leaders, and intellectuals into a conspiracy that will shake the Ottoman Empire to its foundations."
 nd_gre_philhellene_corps: "Philhellene Corps"
 nd_gre_philhellene_corps_desc: "European volunteers inspired by classical Greek civilization — the Philhellenes — bring modern military training and romantic idealism to the Greek cause, forming elite units that fight alongside Greek irregulars."
 nd_gre_aegean_brig_design: "Aegean Brig Design"
 nd_gre_aegean_brig_design_desc: "Greek shipbuilders perfect the fast, well-armed brig as their signature warship — nimble enough to outrun enemy ships of the line, yet carrying enough firepower to dominate the island-studded waters of the Aegean."
 nd_gre_national_awakening: "National Awakening"
 nd_gre_national_awakening_desc: "The Greek national consciousness crystallizes into a powerful political force, uniting diaspora communities, island merchants, mountain warriors, and educated Phanariots behind the dream of an independent Greek state."
 nd_gre_constitution_of_epidaurus: "Constitution of Epidaurus"
 nd_gre_constitution_of_epidaurus_desc: "The Provisional Constitution of 1822, drafted at Epidaurus, establishes the foundations of Greek democratic governance — a revolutionary document that declares the sovereignty of the Greek people and guarantees individual rights."
 nd_gre_hellenic_university: "Hellenic University"
 nd_gre_hellenic_university_desc: "The establishment of Greek institutions of higher learning transforms Athens into a center of scholarship and culture, training the administrators, teachers, and intellectuals who will build the modern Greek state."
 nd_gre_modern_navy: "Modern Navy"
 nd_gre_modern_navy_desc: "The Greek merchant marine tradition evolves into a professional naval force, combining the seamanship of the island communities with modern European naval doctrine and technology."
 nd_gre_irredentist_spirit: "Irredentist Spirit"
 nd_gre_irredentist_spirit_desc: "The belief that millions of Greeks still live under foreign rule fuels an expansionist national spirit — the conviction that the borders of Greece must encompass all lands where Greek civilization has taken root."
 a_nd_gre_armatoloi: "Armatoloi"
 a_nd_gre_armatoloi_desc: "Christian militia fighters recruited from the Greek highlands, expert in mountain warfare and guerrilla tactics. The Armatoloi guard mountain passes and serve as the military backbone of Greek resistance."
 a_nd_gre_klephts: "Klephts"
 a_nd_gre_klephts_desc: "Mountain bandits turned freedom fighters, the Klephts are masters of ambush and raid. Fast-moving and elusive, they strike from the highlands and vanish before the enemy can respond."
 n_nd_gre_fire_ship: "Hydriote Fire Ship"
 n_nd_gre_fire_ship_desc: "A small merchant vessel packed with gunpowder and combustible materials, crewed by daring volunteers who ram it into enemy warships. What it lacks in durability it makes up for in devastating offensive power."
 a_nd_gre_philhellene_guard: "Philhellene Guard"
 a_nd_gre_philhellene_guard_desc: "Elite infantry trained in modern European military methods, incorporating both Greek fighting spirit and Philhellene military discipline. These troops represent the future of Greek arms."
 n_nd_gre_aegean_brig: "Aegean Brig"
 n_nd_gre_aegean_brig_desc: "A fast, well-armed vessel designed in the shipyards of the Greek islands. The Aegean brig combines speed and firepower, excelling at patrol, blockade, and commerce raiding in the island-studded waters of the eastern Mediterranean."
 nd_gre_mountain_refuge: "Klepht Mountain Refuge"
 nd_gre_mountain_refuge_desc: "A fortified hideout in the Greek highlands, providing shelter for resistance fighters and serving as a base for guerrilla operations against invaders."
 nd_gre_athonite_monastery: "Athonite Monastery"
 nd_gre_athonite_monastery_desc: "A center of Orthodox learning modeled on the great monasteries of Mount Athos, preserving manuscripts, training scholars, and serving as a beacon of Greek cultural identity."
 nd_gre_merchant_house: "Greek Merchant House"
 nd_gre_merchant_house_desc: "A trading establishment operated by the Greek diaspora, connecting local markets to the wider Mediterranean commercial network. Greek merchant houses dominate the grain and luxury trade of the eastern Mediterranean."
 nd_gre_hydriote_shipyard: "Hydriote Shipyard"
 nd_gre_hydriote_shipyard_desc: "A specialized shipyard in the tradition of the great island shipbuilding centers — Hydra, Spetses, and Psara — producing fast, well-crafted vessels crewed by experienced Aegean sailors."
 nd_gre_phanariot_academy: "Phanariot Academy"
 nd_gre_phanariot_academy_desc: "An institution of learning founded by wealthy Phanariot patrons, offering education in classical philosophy, modern science, and European languages — the cradle of the Greek Enlightenment."
 nd_gre_olive_press: "Olive Press"
 nd_gre_olive_press_desc: "A traditional Greek olive processing facility, converting the harvest of ancient groves into oil, foodstuffs, and exportable goods that sustain the Mediterranean economy."
 nd_gre_naval_academy: "Hellenic Naval Academy"
 nd_gre_naval_academy_desc: "A modern training institution for the Greek navy, combining centuries of Aegean seamanship tradition with European naval science to produce officers worthy of Greece's maritime heritage."
 nd_gre_refuge_upkeep: "Mountain Garrison Upkeep"
 nd_gre_refuge_upkeep_desc: "Weapons, livestock, cloth, and leather to arm and sustain the highland garrison."
 nd_gre_monastery_maintenance: "Monastic Upkeep"
 nd_gre_monastery_maintenance_desc: "Paper, beeswax, cloth, and glass for manuscript copying, liturgical candles, vestments, and windows."
 nd_gre_merchant_operations: "Merchant Operations"
 nd_gre_merchant_operations_desc: "Cloth, paper, salt, and beeswax consumed in the daily operations and trade of a Greek merchant house."
 nd_gre_shipyard_maintenance: "Shipyard Operations"
 nd_gre_shipyard_maintenance_desc: "Timber, tar, and naval supplies for vessel construction and repair."
 nd_gre_academy_costs: "Academy Operations"
 nd_gre_academy_costs_desc: "Paper, books, glass, and beeswax consumed in scholarly instruction, library maintenance, and evening study."
 nd_gre_olive_pressing: "Olive Oil Production"
 nd_gre_olive_pressing_desc: "Traditional pressing of Greek olives into oil, a staple of Mediterranean trade and cuisine since antiquity."
 nd_gre_currant_export: "Currant Export Trade"
 nd_gre_currant_export_desc: "Processing and export of Greek currants, a luxury dried fruit prized across Europe and one of the most valuable Greek agricultural exports."
 nd_gre_naval_academy_costs: "Naval Academy Operations"
 nd_gre_naval_academy_costs_desc: "Weapons, paper, naval supplies, and tools for training exercises, navigational instruction, and practical seamanship."
 levy_nd_gre_armatoloi: "Armatoloi Levy"
 levy_nd_gre_armatoloi_desc: "Highland militia drawn from Greek peasants and soldiers, trained in the mountain warfare traditions of the Armatoloi."
 nd_gre_formed_tt: "Greece has been formed"
 nd_gre_path_a_tt: "Chose The Megali Idea"
 nd_gre_path_b_tt: "Chose Hellenic Enlightenment"
 # ===== DESTINY LOCALIZATION =====
 # Destiny advance names and descriptions
 nd_gre_destiny: "Destiny of Hellas"
 nd_gre_destiny_desc: "Greece stands at a crossroads. The nation that gave the world democracy, philosophy, and the Olympic Games must now chart its course through an age of empires. Achieve stability to begin the journey."
 nd_gre_dest_straits: "Reclaim the Straits"
 nd_gre_dest_straits_desc: "The Bosphorus and the Dardanelles are the keys to Greek destiny. Constantinople, the City of the World's Desire, must be wrested from foreign hands. Take the ancient capital and the straits that guard it, and build the army that can hold them."
 nd_gre_dest_ionian: "The Ionian Shore"
 nd_gre_dest_ionian_desc: "The western coast of Anatolia was Greek for two thousand years before it was anything else. From Smyrna to Trebizond, Greek communities still endure under foreign rule. Reclaim these lands and develop the empire that sustains them."
 nd_gre_dest_megali: "The Megali Fulfilled"
 nd_gre_dest_megali_desc: "The Great Idea reaches its culmination. From Antioch to Cyprus, the lands of the Eastern Mediterranean are united under the Hellenic banner. This is the restoration that generations of Greeks have dreamed of -- the full flowering of Orthodox civilization reborn."
 nd_gre_dest_republic: "The Learned Republic"
 nd_gre_dest_republic_desc: "Greece shall be a republic of scholars and merchants, not a pale imitation of vanished empires. Embrace the new learning, fill the treasury through trade, and secure Crete to anchor Greek maritime power in the central Mediterranean."
 nd_gre_dest_maritime: "Maritime Dominion"
 nd_gre_dest_maritime_desc: "Greek ships dominate the trade lanes of the Eastern Mediterranean. Silk flows through Greek ports, Greek merchants set prices in every bazaar from Alexandria to Venice. Develop the nation and secure prestige worthy of the heirs of Pericles."
 nd_gre_dest_light: "Light of the New Age"
 nd_gre_dest_light_desc: "Greece becomes what the Enlightenment thinkers always envisioned: a beacon of learning, science, and republican governance that lights the way for the entire world. Embrace the scientific revolution, amass the wealth to sustain a great state, and prove that civilization's torch burns brightest where it was first kindled."
 # Destiny event titles, descriptions, and options
 nd_gre.5.t: "The Destiny of Hellas"
 nd_gre.5.d: "The Greek state has achieved the stability needed to pursue a greater destiny. Whether that destiny lies in the recovery of lost lands or the building of a new civilization, the foundations are now secure. The path ahead stretches far -- but Hellas has never lacked for ambition."
 nd_gre.5.a: "Our destiny awaits."
 nd_gre.6.t: "The Cross Over the Straits"
 nd_gre.6.d: "Greek soldiers stand where the legions of Justinian once marched. The great dome of the Hagia Sophia, defiled for centuries, is cleansed and reconsecrated. The Ecumenical Patriarch returns to his ancient seat, and the bells of Constantinople ring out across the Bosphorus for the first time in an age.\n\nThe Dardanelles, too, are in Greek hands -- the narrow passage that connects the Black Sea to the Mediterranean, the most strategic waterway in the world. No ship passes without Greek permission. The dream of generations is becoming reality."
 nd_gre.6.a: "The City is ours once more!"
 nd_gre.7.t: "The Return to Ionia"
 nd_gre.7.d: "The Greek tricolor flies over Smyrna's waterfront, where Greek merchants have traded since the age of Homer. In the east, Trebizond -- the last outpost of the Roman Empire, which held out for eight years after Constantinople itself had fallen -- is Greek again.\n\nBut governing these reconquered lands demands choices. The military imperative calls for strong garrisons and efficient recruitment to hold a vast frontier. The spiritual imperative calls for the restoration of Orthodoxy in lands where the faith was suppressed for centuries, reuniting the Greek world under one church and one civilization."
 nd_gre.7.a: "Garrison the frontiers."
 nd_gre.7.b: "Restore the faith."
 nd_gre.8.t: "The Great Idea Fulfilled"
 nd_gre.8.d: "From the Adriatic to the Euphrates, from the Black Sea to Cyprus, the lands where Greek was once the language of empire are united once more. This is what Kolettis proclaimed from the podium in Athens -- the Megali Idea, the Great Idea -- and it has been achieved in full.\n\nWhat now? Some see a new Byzantium -- an empire of thrones and armies, a successor state to the Rome that Constantine built. Others see a shield of Orthodoxy -- a sacred commonwealth whose purpose is the defense and propagation of the true faith. The empire is built. Its character remains to be defined."
 nd_gre.8.a: "We are the heirs of Byzantium."
 nd_gre.8.b: "We are the shield of Christendom."
 nd_gre.9.t: "A Republic of Learning"
 nd_gre.9.d: "The banking houses of Athens and Thessaloniki hum with activity. Greek merchants have embraced the new financial instruments sweeping Europe, and the treasury swells with the proceeds of maritime commerce. Crete, the great island that guards the southern Aegean, flies the Greek flag -- its harbors sheltering the merchant fleet that is the true source of Greek power.\n\nThis is the Greece that Korais imagined: prosperous, educated, modern. Not a revival of ancient empires but something new -- a nation that proves the classical virtues of reason and enterprise can flourish in the modern world."
 nd_gre.9.a: "Knowledge is the true wealth."
 nd_gre.10.t: "Masters of the Sea Lanes"
 nd_gre.10.d: "Greek ships carry silk and spices from the markets of the East to the harbors of the West. The merchant marine that once traded in currants and olive oil now dominates the luxury trade of the entire Eastern Mediterranean. Greek commercial houses set prices, Greek captains know every current and shoal, Greek factors operate in every port from Marseille to Alexandria.\n\nHow shall this maritime dominion be wielded? Some favor a commercial fleet strategy -- expanding raw material production and using diplomatic charm to secure favorable trade agreements across the Mediterranean. Others advocate free port policies -- reducing construction costs to build great harbors, attracting vassal trade through generous terms, accepting that military readiness may suffer."
 nd_gre.10.a: "Commerce and diplomacy go hand in hand."
 nd_gre.10.b: "Open our ports to all who trade."
 nd_gre.11.t: "The Light of the New Age"
 nd_gre.11.d: "Greece has achieved what the philosophers of the Enlightenment could only dream of. The scientific revolution flourishes in Greek universities. Athens is once again a center of learning that rivals any capital in Europe. The wealth of the nation sustains great institutions, and the prestige of the Greek state commands respect from every court and counting house in the world.\n\nTwo visions compete for the soul of this enlightened republic. The heirs of Pericles argue for Athenian democracy -- a state that integrates its peoples, governs through popular will, and expands through diplomatic persuasion rather than conquest. The heirs of Themistocles argue for maritime empire -- a naval power that projects strength across the seas, hiring the best soldiers money can buy and building a fleet that commands every strait and harbor."
 nd_gre.11.a: "The ballot box, not the sword."
 nd_gre.11.b: "Command the seas."
 # Destiny timed modifier names and descriptions
 STATIC_MODIFIER_NAME_nd_gre_dest_imperial_garrisons: "Imperial Garrisons"
 STATIC_MODIFIER_DESC_nd_gre_dest_imperial_garrisons: "The reconquered lands of Ionia are secured by a network of Greek garrisons, ensuring rapid recruitment and reliable supply lines across the expanded frontier -- though the cost of maintaining this military infrastructure strains the treasury."
 STATIC_MODIFIER_NAME_nd_gre_dest_orthodox_restoration: "Orthodox Restoration"
 STATIC_MODIFIER_DESC_nd_gre_dest_orthodox_restoration: "The Greek church reclaims its ancient role across Ionia and Pontus. Communities that endured centuries of foreign rule are welcomed back into the Orthodox fold, and assimilation proceeds rapidly -- though the focus on spiritual renewal slows material construction."
 STATIC_MODIFIER_NAME_nd_gre_dest_new_byzantium: "The New Byzantium"
 STATIC_MODIFIER_DESC_nd_gre_dest_new_byzantium: "Greece proclaims itself the successor to the Roman Empire of the East. Imperial legitimacy, a vast army, and the prestige of Constantinople all serve to overawe rivals -- though the focus on land power means the navy must make do with less."
 STATIC_MODIFIER_NAME_nd_gre_dest_shield_orthodoxy: "Shield of Orthodoxy"
 STATIC_MODIFIER_DESC_nd_gre_dest_shield_orthodoxy: "Greece consecrates itself as the defender of the Orthodox faith. Devotion runs high and the nation negotiates from a position of moral authority -- though the costs of maintaining a sacred commonwealth generate some inflationary pressure."
 STATIC_MODIFIER_NAME_nd_gre_dest_commercial_fleet: "Commercial Fleet"
 STATIC_MODIFIER_DESC_nd_gre_dest_commercial_fleet: "Greek merchant ships ply every trade route in the Mediterranean, expanding raw material output and building diplomatic goodwill through profitable commerce -- though the commercial orientation leaves the army as an afterthought."
 STATIC_MODIFIER_NAME_nd_gre_dest_free_port: "Free Port Policy"
 STATIC_MODIFIER_DESC_nd_gre_dest_free_port: "Greek harbors welcome all comers with minimal tariffs and generous construction subsidies. Vassal states benefit from Greek commercial infrastructure and repay it with loyalty -- though the open economy complicates military supply."
 STATIC_MODIFIER_NAME_nd_gre_dest_athenian_democracy: "Athenian Democracy Reborn"
 STATIC_MODIFIER_DESC_nd_gre_dest_athenian_democracy: "The spirit of the Athenian agora lives again in the modern Greek republic. The state integrates its peoples through citizenship, governs through popular consent, and prefers diplomatic absorption to conquest."
 STATIC_MODIFIER_NAME_nd_gre_dest_maritime_empire: "Maritime Empire of the Aegean"
 STATIC_MODIFIER_DESC_nd_gre_dest_maritime_empire: "Greece commands the seas as Themistocles once commanded the fleet at Salamis. Heavy warships project Greek power across the Mediterranean, and foreign mercenaries supplement the citizen levy -- though the burdens of a maritime empire breed war-weariness."
 # Destiny building names and descriptions
 nd_gre_imperial_basilica: "Imperial Basilica"
 nd_gre_imperial_basilica_desc: "A grand Orthodox basilica raised in the tradition of the Hagia Sophia -- a monument to the restored Hellenic empire and the enduring faith that sustained the Greek people through centuries of foreign domination."
 nd_gre_basilica_maintenance: "Basilica Upkeep"
 nd_gre_basilica_maintenance_desc: "Beeswax for the liturgical candles, incense for the censers, cloth for the priestly vestments, and marble for the never-ending restoration of the sacred mosaics."
 nd_gre_hellenic_lyceum: "Hellenic Lyceum"
 nd_gre_hellenic_lyceum_desc: "A center of learning in the tradition of Aristotle's original Lyceum -- combining natural philosophy, mathematics, and modern science in an institution that aspires to advance human knowledge as the ancients once did."
 nd_gre_lyceum_maintenance: "Lyceum Operations"
 nd_gre_lyceum_maintenance_desc: "Paper, books, glass instruments, and tools for scientific experimentation, philosophical inquiry, and the training of the next generation of Greek scholars."
