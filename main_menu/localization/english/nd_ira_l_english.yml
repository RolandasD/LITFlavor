l_english:
 STATIC_MODIFIER_NAME_nd_shahanshah_militant: "Shahanshah: King of Kings"
 STATIC_MODIFIER_DESC_nd_shahanshah_militant: "The throne of Persia demands dominion. As Shahanshah, the King of Kings, our armies shall thunder across the Iranian Plateau and beyond, carrying the banner of empire to every corner of the known world. The cavalry that crushed the Ottomans at Chaldiran and the Uzbeks at Merv rides again."
 STATIC_MODIFIER_NAME_nd_nesf_e_jahan: "Isfahan Nesf-e Jahan"
 STATIC_MODIFIER_DESC_nd_nesf_e_jahan: "Isfahan is half the world — so the proverb declares. Under the Shahs, Persia shall become a beacon of civilization where art, commerce, and learning flourish. The grand bazaars will hum with trade from China to Europe, and the beauty of Persian architecture will inspire awe across the ages."
 STATIC_MODIFIER_NAME_nd_guardian_of_shiism: "Guardian of the Shia Faith"
 STATIC_MODIFIER_DESC_nd_guardian_of_shiism: "Persia stands as the fortress of Twelver Shiism against a world of Sunni empires. Through the authority of the Shah and the wisdom of the ulama, the nation will forge an unbreakable bond between state and faith. Religious unity will be the foundation upon which an enduring empire is built."
 nd_ira.1.t: "The Rise of Persia"
 nd_ira.1.d: "The Iranian Plateau stands united under a single crown. From the Zagros Mountains to the shores of the Caspian, from the deserts of Khorasan to the marshes of Mesopotamia, the diverse peoples of Persia answer to one sovereign. This is the moment that Cyrus and Darius once knew — the birth of an empire that stretches across continents and cultures.\n\nBut the character of this empire remains to be decided. Shall we ride forth as conquerors, as the Achaemenids and Sassanids before us? Shall we build Isfahan into the wonder of the world, a capital that makes the courts of Europe weep with envy? Or shall we forge the religious unity that will define Persia for centuries — becoming the unshakeable bastion of the Shia faith?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ira.1.a: "We shall ride as King of Kings!"
 nd_ira.1.b: "Isfahan shall be half the world."
 nd_ira.1.c: "We are the guardians of the true faith."
 nd_ira.2.t: "Isfahan: Half the World"
 nd_ira.2.d: "Shah Abbas has chosen Isfahan as his capital, and the city has been transformed beyond recognition. The magnificent Naqsh-e Jahan Square — one of the largest public squares in the world — stands as the beating heart of the empire. The Shah Mosque's turquoise dome gleams in the sun, the Ali Qapu Palace overlooks all commerce, and the Bazaar-e Bozorg stretches for kilometers through vaulted corridors.\n\nForeigners who visit declare that Isfahan is indeed 'half the world,' for here one may find everything that exists elsewhere. The Chahar Bagh Avenue, lined with gardens and pavilions, connects the Armenian quarter of New Julfa to the royal palaces. Shall we invest in Isfahan's cultural magnificence, making it a monument to Persian civilization? Or shall we channel its energy into commercial networks that will enrich the entire empire?"
 nd_ira.2.a: "Let Isfahan's beauty inspire the ages."
 nd_ira.2.b: "Let Isfahan's bazaars enrich the empire."
 nd_ira.3.t: "The Conversion of Persia"
 nd_ira.3.d: "The transformation of Persia from a predominantly Sunni land to the heartland of Twelver Shiism is one of the most dramatic religious upheavals in Islamic history. Under Shah Ismail, the process began with the declaration that Shia Islam was the state religion. Sunni ulama were given the choice of conversion, exile, or death. Arab Shia scholars were brought from Jabal Amil in Lebanon, from Bahrain, and from southern Iraq to fill the theological void and establish new institutions of learning.\n\nThe Safavid state now faces a choice in how to consolidate this transformation. Shall we pursue zealous enforcement of doctrinal purity, using the power of the state to ensure complete religious conformity? Or shall we invest in theological scholarship, building the intellectual foundations that will make Twelver Shiism self-sustaining through the strength of its learning?"
 nd_ira.3.a: "Enforce the purity of the faith."
 nd_ira.3.b: "Invest in Shia scholarship and learning."
 nd_ira.4.t: "The Zamburak Corps"
 nd_ira.4.d: "A new innovation has appeared on the battlefield — the zamburak, a small swivel cannon mounted on the back of a camel. These mobile artillery pieces combine the speed of cavalry with the firepower of cannon, allowing Persian forces to bring devastating firepower to bear in the open deserts and plains where conventional artillery would bog down.\n\nThe zamburakchi corps proved decisive at the Battle of Karnal in 1739, where Nader Shah's camel-mounted guns shattered the Mughal army and its war elephants. The corps operates in batteries of dozens or even hundreds of camels, creating a mobile wall of fire that can redeploy faster than any wheeled artillery. This Persian innovation will give our armies a unique tactical advantage across the arid landscapes of our domain."
 nd_ira.4.a: "The camels of war shall thunder across our enemies."
 nd_ira.5.t: "The New Order: Military Reform"
 nd_ira.5.d: "Persian observers returning from Europe bring troubling reports. The armies of France, Prussia, and Russia have undergone transformations that make them far more effective than the traditional forces of the East. Regular drill, standardized equipment, professional officer corps, and systematic logistics have created military machines of unprecedented efficiency.\n\nThe question facing the Persian court is how to respond. Some argue that Persia must adopt European methods wholesale — importing instructors, purchasing modern weapons, and reorganizing the army along European lines. Others insist that Persian military traditions have their own strengths — cavalry mobility, knowledge of terrain, and the warrior spirit of the tribal levies — and that reform should synthesize the best of both worlds rather than abandoning centuries of Persian martial heritage."
 nd_ira.5.a: "Adopt European methods and discipline."
 nd_ira.5.b: "Synthesize the best of East and West."
 nd_ira.6.t: "The Constitutional Awakening"
 nd_ira.6.d: "A remarkable movement has emerged among Persian intellectuals, merchants, and progressive clergy. Inspired by constitutional developments in Europe and the Ottoman Tanzimat reforms, they argue that Persia needs a fundamental transformation of its system of government. The absolute power of the Shah, they contend, has led to corruption, stagnation, and foreign exploitation.\n\nThe Constitutional Revolution represents a watershed moment in Persian history — the first modern attempt to limit royal authority through a written constitution and an elected parliament, the Majlis. Whether it succeeds fully or is partially reversed, it marks the beginning of Persia's engagement with modern political thought and the aspiration for a government accountable to its people."
 nd_ira.6.a: "The voice of the people shall be heard."
 STATIC_MODIFIER_NAME_nd_ira_isfahan_glory: "Glory of Isfahan"
 STATIC_MODIFIER_DESC_nd_ira_isfahan_glory: "Isfahan's architectural splendor and cultural patronage have made it a wonder of the world."
 STATIC_MODIFIER_NAME_nd_ira_isfahan_commerce: "Commerce of Isfahan"
 STATIC_MODIFIER_DESC_nd_ira_isfahan_commerce: "Isfahan's bazaars and trade networks have made it the commercial heart of the Middle East."
 STATIC_MODIFIER_NAME_nd_ira_shia_zealotry: "Shia Zealotry"
 STATIC_MODIFIER_DESC_nd_ira_shia_zealotry: "The enforced purity of Twelver Shiism has created deep religious unity across Persian lands."
 STATIC_MODIFIER_NAME_nd_ira_shia_scholarship: "Shia Scholarship"
 STATIC_MODIFIER_DESC_nd_ira_shia_scholarship: "Investment in theological colleges and scholarly tradition has made Persia the intellectual center of the Shia world."
 STATIC_MODIFIER_NAME_nd_ira_european_drill: "European Military Drill"
 STATIC_MODIFIER_DESC_nd_ira_european_drill: "Persian regiments now train according to European methods, with disciplined formations and modern tactics."
 STATIC_MODIFIER_NAME_nd_ira_persian_synthesis: "Persian Military Synthesis"
 STATIC_MODIFIER_DESC_nd_ira_persian_synthesis: "The best of Persian cavalry tradition has been combined with selective modern innovations."
 nd_ira_ribat_tradition: "Ribat Tradition"
 nd_ira_ribat_tradition_desc: "The ribat network — fortified way-stations along Persia's trade routes — served as both military garrisons and shelters for travelers, projecting Persian power across the vast interior."
 nd_ira_qanat_systems: "Qanat Irrigation"
 nd_ira_qanat_systems_desc: "The qanat — underground aqueducts that carry water from mountain aquifers to arid lowlands — is one of Persia's greatest engineering achievements, enabling agriculture in otherwise uninhabitable regions."
 nd_ira_bazaar_economy: "Bazaar Economy"
 nd_ira_bazaar_economy_desc: "The covered bazaar, or bazar-e bozorg, is the economic heart of every Persian city — a vast labyrinth of vaulted passages where guilds organize production, merchants negotiate prices, and the wazarbed oversees commercial order."
 nd_ira_persian_diplomacy: "Persian Diplomatic Tradition"
 nd_ira_persian_diplomacy_desc: "The Persian court has maintained sophisticated diplomatic traditions since Achaemenid times, employing elaborate protocol, multilingual envoys, and the strategic art of gift-giving to manage relations with neighboring empires."
 nd_ira_keshikchi_guard: "Keshikchi Guard"
 nd_ira_keshikchi_guard_desc: "The Keshikchi — royal bodyguard cavalry inherited from the Timurid and Mongol traditions — form an elite guard of horsemen sworn to protect the person of the sovereign. Selected from the finest warriors of noble families, they serve as both shock cavalry and a symbol of royal authority."
 nd_ira_caspian_silk: "Caspian Silk Industry"
 nd_ira_caspian_silk_desc: "The lush provinces of Gilan and Mazandaran along the Caspian coast produce some of the finest raw silk in the world. Shah Abbas centralized this industry into a royal monopoly, making silk Persia's most valuable export to European markets."
 nd_ira_persian_miniatures: "Persian Miniature Painting"
 nd_ira_persian_miniatures_desc: "The Persian miniature tradition, perfected by masters like Bihzad, combines exquisite detail with vibrant color to illustrate the great works of Persian literature. Court workshops in Tabriz, Qazvin, and Isfahan produce illuminated manuscripts that are treasured from Constantinople to Delhi."
 nd_ira_royal_court_culture: "Royal Court Culture"
 nd_ira_royal_court_culture_desc: "The Persian royal court has long been a center of cosmopolitan culture, where poets, musicians, painters, and scholars from across the Islamic world gather under the Shah's patronage. This tradition of cultural openness allows Persia to absorb and synthesize diverse influences."
 nd_ira_caravanserai_network: "Caravanserai Network"
 nd_ira_caravanserai_network_desc: "Shah Abbas commissioned the construction of caravanserais at regular intervals along all major trade routes — fortified inns offering free lodging, stabling, and security to merchants. This massive infrastructure program transformed Persia into the most welcoming land for overland trade in the entire Middle East."
 nd_ira_chapar_riders: "Chapar Riders"
 nd_ira_chapar_riders_desc: "The chapar system — a network of mounted couriers maintaining relay stations across the empire — traces its origins to the Achaemenid Empire's famous 'Royal Road' postal service. These swift riders carry dispatches, intelligence, and royal commands across vast distances at remarkable speed."
 nd_ira_royal_workshops: "Royal Workshops"
 nd_ira_royal_workshops_desc: "The karkhane — royal workshops attached to the court — produce luxury goods of extraordinary quality. Under Safavid patronage, these workshops in Isfahan employ hundreds of craftsmen working in silk weaving, carpet knotting, metalwork, and ceramics, their products destined for both domestic consumption and export."
 nd_ira_haft_rang_tilework: "Haft Rang Tilework"
 nd_ira_haft_rang_tilework_desc: "The haft rang (seven-color) tile technique allows Persian artisans to create the stunning polychromatic facades that adorn mosques, palaces, and madrasas across Iran. The intricate geometric and floral patterns of Persian tilework represent one of the highest achievements of Islamic decorative art."
 nd_ira_divan_governance: "Divan Governance"
 nd_ira_divan_governance_desc: "The Persian divan — the royal council of ministers — is the administrative backbone of the empire. The grand vizier, provincial governors, and specialized officials manage taxation, justice, and correspondence through an elaborate bureaucratic tradition refined over centuries."
 nd_ira_carpet_tradition: "Persian Carpet Tradition"
 nd_ira_carpet_tradition_desc: "Under the Safavids, carpet weaving was elevated from a cottage industry to a fine art. Court manufactories in Tabriz, Isfahan, and Kashan produce carpets of legendary quality using techniques passed down through generations, with distinctive regional patterns recognized across the world."
 nd_ira_zamburak_corps: "Zamburak Corps"
 nd_ira_zamburak_corps_desc: "The zamburak — a swivel gun mounted on camelback — gives Persian armies mobile artillery suited to the deserts and plains of the Iranian Plateau. First employed at scale by Nader Shah, the zamburakchi corps proved devastatingly effective at the Battle of Karnal."
 nd_ira_theological_colleges: "Theological Colleges"
 nd_ira_theological_colleges_desc: "The Safavid state invested heavily in madrasas dedicated to Twelver Shia theology, importing scholars from Lebanon, Bahrain, and Iraq to establish a new religious intelligentsia. These institutions became the intellectual foundation of Shia Islam in Persia."
 nd_ira_isfahan_nesf_jahan: "Isfahan Nesf-e Jahan"
 nd_ira_isfahan_nesf_jahan_desc: "Isfahan nesf-e jahan — Isfahan is half the world. Under Shah Abbas, the capital was transformed with the magnificent Naqsh-e Jahan Square, the Shah Mosque, the Ali Qapu Palace, and the Chahar Bagh Avenue, creating one of the most beautiful cities on earth."
 nd_ira_tuyul_system: "Tuyul Land Grant System"
 nd_ira_tuyul_system_desc: "The tuyul system assigns crown land revenues to military commanders and officials in lieu of salary. This arrangement ensures the loyalty of the provincial elite while allowing the central government to extract revenue without a large civilian bureaucracy."
 nd_ira_shia_conversion_policy: "Shia Conversion Policy"
 nd_ira_shia_conversion_policy_desc: "The Safavid transformation of Persia from a predominantly Sunni land to the heartland of Twelver Shiism is one of the most dramatic religious changes in Islamic history. State-sponsored conversion, the importation of Shia scholars, and the establishment of religious institutions created an enduring national identity."
 nd_ira_shahsavan_tribes: "Shahsavan Tribal Confederation"
 nd_ira_shahsavan_tribes_desc: "The Shahsavan — literally 'those who love the Shah' — are a tribal confederation organized by Shah Abbas to counterbalance the power of the Qizilbash aristocracy. Loyal directly to the throne, they provide reliable cavalry that serves as a check on overmighty tribal chieftains."
 nd_ira_imperial_post: "Imperial Postal System"
 nd_ira_imperial_post_desc: "The chapar-khaneh postal relay system maintains a network of stations across the empire, each equipped with fresh horses and riders. This system — descended from the Achaemenid angareion — allows royal commands and intelligence to travel from one end of Persia to the other in a matter of days."
 nd_ira_persian_gulf_fleet: "Persian Gulf Fleet"
 nd_ira_persian_gulf_fleet_desc: "The Afsharid naval program, initiated by Nader Shah, established a Persian fleet based at Bushire on the Persian Gulf. Though Persia has traditionally been a land power, the gulf fleet projects power along vital maritime trade routes and challenges the dominance of European naval squadrons."
 nd_ira_nastaliq_calligraphy: "Nastaliq Calligraphy"
 nd_ira_nastaliq_calligraphy_desc: "The nastaliq script — developed in Persia as an elegant cursive style — became the defining calligraphic tradition of the Persian-speaking world. Its flowing curves and graceful proportions adorn manuscripts, inscriptions, and administrative documents, embodying the Persian aesthetic ideal."
 nd_ira_maragheh_observatory: "Maragheh Observatory Tradition"
 nd_ira_maragheh_observatory_desc: "The Maragheh Observatory, founded under the Ilkhanids by Nasir al-Din Tusi, established a scientific tradition in Persia that persisted for centuries. Persian astronomers and mathematicians continued to make contributions to observational astronomy, optics, and algebra long after the observatory itself fell into ruin."
 nd_ira_nizam_jadid_reform: "Nizam-i Jadid Reform"
 nd_ira_nizam_jadid_reform_desc: "Influenced by the military successes of European powers, Persian reformers advocate for a 'New Order' — reorganizing the army along European lines with professional officers, regular drill, standardized equipment, and modern tactics."
 nd_ira_qajar_modernization: "Qajar Modernization"
 nd_ira_qajar_modernization_desc: "The Dar ul-Funun polytechnic, founded in Tehran in 1851, was the first modern institution of higher learning in Persia. It taught European languages, medicine, engineering, and military science, training a new generation of Persian professionals who would drive the country's modernization."
 nd_ira_constitutional_movement: "Constitutional Movement"
 nd_ira_constitutional_movement_desc: "The Persian Constitutional Revolution represents the aspiration for modern governance — a written constitution, an elected parliament (the Majlis), and the rule of law. This movement drew support from intellectuals, merchants, and progressive clergy who sought to limit royal absolutism."
 nd_ira_persian_trade_reform: "Persian Trade Reform"
 nd_ira_persian_trade_reform_desc: "The modernization of Persian commerce — including the establishment of customs houses, standardized weights and measures, and modern banking — opens the economy to international trade while protecting domestic producers from foreign exploitation."
 a_nd_ira_keshikchi: "Keshikchi Guard"
 a_nd_ira_keshikchi_desc: "Elite royal bodyguard cavalry descended from the Timurid keshik tradition, sworn to protect the person of the Shah."
 a_nd_ira_chapar: "Chapar Rider"
 a_nd_ira_chapar_desc: "Swift mounted couriers of the Persian postal system, trained as light cavalry raiders when called to war."
 a_nd_ira_zamburak: "Zamburak"
 a_nd_ira_zamburak_desc: "Camel-mounted swivel guns that bring mobile artillery to the deserts and plains of the Iranian Plateau."
 a_nd_ira_zamburak_levy: "Zamburak Levy"
 a_nd_ira_zamburak_levy_desc: "Tribal levies equipped with camel-mounted swivel guns, raised from the nomadic peoples of Persia's arid interior."
 a_nd_ira_shahsavan: "Shahsavan Cavalry"
 a_nd_ira_shahsavan_desc: "Tribal cavalry from the Shahsavan confederation, organized as a counterweight to Qizilbash power and loyal directly to the Shah."
 a_nd_ira_nizam_jadid: "Nizam-i Jadid Guard"
 a_nd_ira_nizam_jadid_desc: "Reformed Persian infantry trained in European drill and tactics, equipped with modern firearms and bayonets."
 n_nd_ira_gulf_galley: "Persian Gulf Galley"
 n_nd_ira_gulf_galley_desc: "Fast galleys of the Afsharid naval program, designed for the shallow waters and strong currents of the Persian Gulf."
 nd_ira_ribat: "Ribat"
 nd_ira_ribat_desc: "A fortified way-station along Persian trade routes, serving as both military garrison and shelter for caravans."
 nd_ira_ribat_upkeep: "Ribat Garrison"
 nd_ira_ribat_upkeep_desc: "Maintaining the garrison and provisions of the ribat requires stone for repairs, lumber for fortifications, and livestock for the soldiers."
 nd_ira_bazaar: "Bazaar-e Bozorg"
 nd_ira_bazaar_desc: "The grand covered bazaar — a vast labyrinth of vaulted passages where guilds, merchants, and artisans conduct the commercial life of the city."
 nd_ira_bazaar_maintenance: "Bazaar Operations"
 nd_ira_bazaar_maintenance_desc: "The daily operations of the bazaar require textiles for the cloth merchants, pottery for the craftsmen, and paper for the merchants' commercial records."
 nd_ira_caravanserai: "Caravanserai"
 nd_ira_caravanserai_desc: "A fortified roadside inn offering free lodging and security to merchants, commissioned by the Shah to encourage trade across the empire."
 nd_ira_caravanserai_upkeep: "Caravanserai Maintenance"
 nd_ira_caravanserai_upkeep_desc: "Maintaining the caravanserai requires stone for structural repairs, lumber for stalls and roofing, and livestock to feed the constant stream of travelers."
 nd_ira_karkhane: "Karkhane"
 nd_ira_karkhane_desc: "A royal workshop producing luxury goods — silk textiles, fine carpets, and decorative ceramics — under the direct patronage of the Shah."
 nd_ira_karkhane_maintenance: "Royal Workshop Operations"
 nd_ira_karkhane_maintenance_desc: "The karkhane weaves raw Caspian silk with Persian dyes into fine textiles that bring fame and wealth to the court."
 nd_ira_madrasa: "Madrasa-yi Sultani"
 nd_ira_madrasa_desc: "A royal theological college training Shia scholars and jurists, strengthening the religious foundations of the Persian state."
 nd_ira_madrasa_upkeep: "Madrasa Operations"
 nd_ira_madrasa_upkeep_desc: "The madrasa requires paper and books to support its scholarly activities, and incense for the ritual life of its students and clergy."
 nd_ira_chapar_khaneh: "Chapar-Khaneh"
 nd_ira_chapar_khaneh_desc: "An imperial postal relay station equipped with fresh horses and riders, maintaining communications across the vast Persian Empire."
 nd_ira_chapar_khaneh_upkeep: "Relay Station Operations"
 nd_ira_chapar_khaneh_upkeep_desc: "The relay station requires horses and fodder for its couriers, and lumber to maintain the stables and outbuildings of the post."
 nd_ira_dar_ul_funun: "Dar ul-Funun"
 nd_ira_dar_ul_funun_desc: "A modern polytechnic institute teaching European sciences, languages, and military arts — the vanguard of Persian modernization."
 nd_ira_dar_ul_funun_upkeep: "Institute Operations"
 nd_ira_dar_ul_funun_upkeep_desc: "The polytechnic requires paper and books for instruction in modern sciences, and glass instruments for its laboratories in medicine, chemistry, and natural philosophy."
 nd_ira_carpet_weaving: "Persian Carpet Weaving"
 nd_ira_carpet_weaving_desc: "Traditional Persian carpet-knotting techniques using fine wool, natural dyes, and animal-hair fibers, producing carpets renowned across the world."
 nd_ira_silk_processing: "Caspian Silk Processing"
 nd_ira_silk_processing_desc: "The processing and finishing of raw Caspian silk into luxurious textiles using Persian dyeing, weaving, and perfuming techniques."
 nd_ira_tile_glazing: "Persian Tile Glazing"
 nd_ira_tile_glazing_desc: "The haft rang (seven-color) ceramic glazing technique fires raw clay with mineral dyes to create the stunning polychromatic tilework that adorns Persian architecture."
 nd_ira_qanat_maintenance: "Qanat Maintenance"
 nd_ira_qanat_maintenance_desc: "The maintenance of underground qanat channels requires constant repair work with stone, timber supports, and iron tools to clear sediment and shore up tunnel walls."
 levy_nd_ira_shahsavan: "Shahsavan Tribal Levy"
 levy_nd_ira_shahsavan_desc: "Cavalry levied from the Shahsavan tribal confederation, fierce horsemen loyal to the Shah."
 levy_nd_ira_zamburak: "Zamburak Levy"
 levy_nd_ira_zamburak_desc: "Camel artillery levied from the nomadic peoples of Persia's interior, skilled in mobile warfare."
 levy_nd_ira_keshikchi: "Keshikchi Guard Levy"
 levy_nd_ira_keshikchi_desc: "Elite bodyguard cavalry levied from the noble households of the Persian court."
 nd_ira_formed_tt: "Persia has been formed"
 nd_ira_path_a_tt: "Chose Shahanshah: King of Kings"
 nd_ira_path_b_tt: "Chose Isfahan Nesf-e Jahan"
 nd_ira_path_c_tt: "Chose Guardian of the Shia Faith"
 nd_ira_destiny: "Destiny of Persia"
 nd_ira_destiny_desc: "Persia has risen. The throne of the Shahs commands a vast domain from the Zagros to the Hindu Kush. Now the character of this empire must be forged -- through conquest or through civilization."
 nd_ira_dest_shahanshah: "The Shahanshah Rides"
 nd_ira_dest_shahanshah_desc: "Reclaim the lands of the ancient empires. Take Baghdad, seat of the Abbasid Caliphate, and Samarkand, jewel of Transoxiana. The King of Kings demands dominion over all the lands between the Tigris and the Oxus."
 nd_ira_dest_iran_zamin: "Master of Iran-Zamin"
 nd_ira_dest_iran_zamin_desc: "Extend Persian hegemony from Damascus in the west to the Caucasus in the north. The Shahanshah's writ must run through the Fertile Crescent and the lands of the Shirvanshah alike."
 nd_ira_dest_cyrus_reborn: "Empire of Cyrus Reborn"
 nd_ira_dest_cyrus_reborn_desc: "Fulfill the ultimate Persian ambition: an empire stretching from Constantinople to Delhi, surpassing even the Achaemenids. Build the Apadana as a monument to this achievement -- a throne room where envoys from every nation come to pay tribute."
 nd_ira_dest_silk_road: "Silk Road Mastery"
 nd_ira_dest_silk_road_desc: "Establish Persia as the commercial nexus of the Silk Road. Ensure silk flows through the capital markets and fill the treasury with the wealth of east-west trade."
 nd_ira_dest_institutional: "Institutional Vanguard"
 nd_ira_dest_institutional_desc: "Lead the Islamic world in institutional development. Embrace modern banking and build a developed realm that stands as a beacon of Persian civilization."
 nd_ira_dest_nesf_jahan: "Isfahan Nesf-e Jahan"
 nd_ira_dest_nesf_jahan_desc: "Isfahan is half the world. Embrace global trade, attract gems to the capital markets, and build the magnificent Naqsh-e Jahan Square -- a monument proclaiming Persian splendor to every corner of the earth."
 nd_ira.7.t: "The Destiny of Persia"
 nd_ira.7.d: "The crown of Persia has been claimed, and the ancient lands of the Shahs are once more united under a single sovereign. From the snow-capped peaks of the Zagros to the sun-baked shores of the Persian Gulf, the diverse peoples of Iran answer to one throne.\n\nBut unification is merely the beginning. The great empires of Persia -- the Achaemenids, the Sassanids, the Safavids -- were not content merely to rule the plateau. Each sought to leave an indelible mark upon the world, whether through conquest, commerce, or culture.\n\nWhat destiny awaits this new Persian empire?"
 nd_ira.7.a: "Our destiny shall be written in the stars."
 nd_ira.8.t: "The Shahanshah Rides"
 nd_ira.8.d: "Baghdad has fallen to Persian arms, and the ancient cities of Transoxiana acknowledge the Shahanshah's sovereignty. From the banks of the Tigris to the orchards of Samarkand, the lands that once formed the heart of the Islamic world now bow to the Persian crown.\n\nThe conquest of Baghdad carries immense symbolic weight -- the city of the Caliphs, the seat of the House of Wisdom, now flies the banner of Persia. And with Samarkand, the tomb of Timur himself is in Persian hands. The Shahanshah has announced to the world that the age of Persian empire has returned."
 nd_ira.8.a: "The King of Kings has spoken."
 nd_ira.9.t: "Master of Iran-Zamin"
 nd_ira.9.d: "The boundaries of Persian power have expanded far beyond the Iranian Plateau. Damascus, one of the oldest continuously inhabited cities on earth, acknowledges Persian suzerainty. The oil fires of Baku on the Caspian shore illuminate a new frontier of Persian influence in the Caucasus.\n\nThe Shahanshah now commands a realm that recalls the extent of the Sassanid Empire at its greatest. The question before the court is how to press this advantage. Some generals urge an aggressive posture -- the wrath of the Shahanshah must be felt by all who resist. Others counsel the restoration of the ancient satrapy system, binding conquered lands through administration rather than terror."
 nd_ira.9.a: "Let our enemies tremble before us."
 nd_ira.9.b: "Restore the wisdom of the satraps."
 nd_ira.10.t: "Empire of Cyrus Reborn"
 nd_ira.10.d: "It is done. Persian banners fly over Constantinople, that ancient jewel of empires, and over Delhi, gateway to the riches of India. The Shahanshah now rules a domain that surpasses even the dreams of Cyrus the Great -- from the Bosphorus to the Ganges, from the Caucasus to the Persian Gulf.\n\nThis is not merely a military achievement but a civilizational statement. The construction of the Apadana -- a grand audience hall modeled on the ancient Persepolis -- will serve as the throne room of this reborn empire. Here, ambassadors from every nation will present themselves before the King of Kings.\n\nBut how shall this vast empire be governed? Through the iron discipline of an immortal military machine? Or through the art of diplomacy, binding diverse peoples in willing allegiance?"
 nd_ira.10.a: "We are the Immortal Empire, eternal and unbreakable."
 nd_ira.10.b: "We are King of Nations, father to all peoples."
 nd_ira.11.t: "Silk Road Mastery"
 nd_ira.11.d: "The caravans that cross the Iranian Plateau carry the finest silk in the world -- Persian silk, processed and finished by the artisans of Isfahan and Kerman. European merchants compete fiercely for access to Persian markets, while from the east, Chinese porcelain and Indian spices flow through the caravanserais that dot the Silk Road.\n\nPersia sits at the crossroads of the world, and the Shahs have leveraged this position brilliantly. The royal silk monopoly channels vast wealth into the treasury, while the bazaars of the great cities hum with the commerce of nations. This is the foundation upon which a different kind of empire will be built -- not one of conquest, but of commerce."
 nd_ira.11.a: "The wealth of the world flows through Persia."
 nd_ira.12.t: "Institutional Vanguard"
 nd_ira.12.d: "Persia has embraced the institutions of the modern world not as a follower but as a leader. The banking houses of Isfahan rival those of Venice and Amsterdam, while Persian scholars and administrators have adapted new ideas to serve the needs of an ancient civilization.\n\nThis institutional sophistication gives Persia a profound advantage over its neighbors. The question is how to deploy it. Shah Abbas famously maintained royal monopolies over key industries, channeling their profits directly to the crown. But others argue that freeing the bazaars from royal control would unleash even greater commercial energy, turning every merchant into an engine of Persian prosperity."
 nd_ira.12.a: "The crown shall hold the monopolies."
 nd_ira.12.b: "Free the bazaars to trade without limit."
 nd_ira.13.t: "Isfahan Nesf-e Jahan"
 nd_ira.13.d: "Isfahan is half the world. The old Persian proverb has become literal truth. The Naqsh-e Jahan Square -- the Image of the World -- stands complete, one of the largest and most beautiful public spaces ever constructed. The Shah Mosque's turquoise dome catches the light of dawn. The Ali Qapu Palace surveys the commercial bustle below. The Bazaar-e Bozorg stretches for kilometers through vaulted corridors where merchants from fifty nations trade in goods from every corner of the earth.\n\nForeigners who visit are struck speechless. This is not merely a city but a monument to what Persian civilization can achieve through commerce and culture rather than conquest. Shall Isfahan become a wonder that inspires ages to come? Or shall it serve as the hub of a global trading network that makes Persia the indispensable crossroads of the world?"
 nd_ira.13.a: "Let Isfahan's wonder inspire eternity."
 nd_ira.13.b: "Let Isfahan be the crossroads of all trade."
 STATIC_MODIFIER_NAME_nd_ira_dest_wrath_of_shahanshah: "Wrath of the Shahanshah"
 STATIC_MODIFIER_DESC_nd_ira_dest_wrath_of_shahanshah: "The Shahanshah's fury is legendary. Enemies who resist face brutal siege and total subjugation, driving the costs of defiance beyond what any foe can bear."
 STATIC_MODIFIER_NAME_nd_ira_dest_satrapy_system: "Restored Satrapy System"
 STATIC_MODIFIER_DESC_nd_ira_dest_satrapy_system: "The ancient Persian system of provincial governance through satrapies has been restored, allowing efficient annexation and integration of conquered territories."
 STATIC_MODIFIER_NAME_nd_ira_dest_immortal_empire: "The Immortal Empire"
 STATIC_MODIFIER_DESC_nd_ira_dest_immortal_empire: "Like the Ten Thousand Immortals of the Achaemenids, this empire endures through iron discipline and relentless expansion, its armies tireless and its intelligence networks far-reaching."
 STATIC_MODIFIER_NAME_nd_ira_dest_king_of_nations: "King of Nations"
 STATIC_MODIFIER_DESC_nd_ira_dest_king_of_nations: "The Shahanshah rules not through fear alone but through the art of governance, binding diverse peoples in a web of diplomacy, offering peace to the willing and swift recovery to the devastated."
 STATIC_MODIFIER_NAME_nd_ira_dest_royal_monopolies: "Royal Monopolies"
 STATIC_MODIFIER_DESC_nd_ira_dest_royal_monopolies: "The Shah maintains monopolies over key industries, channeling commercial profits directly to the crown and funding a mercantilist state, though military readiness suffers from the focus on commerce."
 STATIC_MODIFIER_NAME_nd_ira_dest_free_bazaars: "Free Bazaars"
 STATIC_MODIFIER_DESC_nd_ira_dest_free_bazaars: "The bazaars of Persia trade freely without royal interference, attracting merchants from across the world and fostering diplomatic connections through open commerce."
 STATIC_MODIFIER_NAME_nd_ira_dest_wonder_of_the_world: "Wonder of the World"
 STATIC_MODIFIER_DESC_nd_ira_dest_wonder_of_the_world: "Isfahan's architectural and cultural achievements have made it a wonder of the world, pushing Persia toward innovation and concentrating the finest talent in the capital."
 STATIC_MODIFIER_NAME_nd_ira_dest_crossroads_of_trade: "Crossroads of Trade"
 STATIC_MODIFIER_DESC_nd_ira_dest_crossroads_of_trade: "Persia's position at the intersection of maritime and overland trade routes has been fully realized, with the Persian Gulf fleet securing commerce and an outward-looking policy engaging the wider world."
 nd_ira_apadana: "Apadana"
 nd_ira_apadana_desc: "A grand imperial audience hall inspired by the ancient Apadana at Persepolis, where ambassadors from every subject nation present tribute before the throne of the Shahanshah."
 nd_ira_apadana_upkeep: "Imperial Court Operations"
 nd_ira_apadana_upkeep_desc: "Maintaining the grandeur of the imperial court requires fine stone for the columned hall, silk textiles for the throne room, furniture for receiving dignitaries, and paper for the empire's vast administrative correspondence."
 nd_ira_naqsh_e_jahan: "Naqsh-e Jahan Square"
 nd_ira_naqsh_e_jahan_desc: "The Image of the World -- a monumental public square and commercial center at the heart of Isfahan, combining the Shah Mosque, Ali Qapu Palace, and the entrance to the Grand Bazaar."
 nd_ira_naqsh_e_jahan_upkeep: "Square Operations"
 nd_ira_naqsh_e_jahan_upkeep_desc: "The daily commerce and ceremonial life of the Naqsh-e Jahan Square requires fine textiles for the merchants, ceramics for the bazaar stalls, paper for commercial records, and gems for the jewelers who attract wealthy patrons from across the world."
