l_english:
 STATIC_MODIFIER_NAME_nd_golden_stool_authority: "Authority of the Golden Stool"
 STATIC_MODIFIER_DESC_nd_golden_stool_authority: "The Sika Dwa Kofi, the Golden Stool born on a Friday, descended from the heavens to sanctify the union of the Ashanti people. Its authority is absolute — no Asantehene sits upon it, but rules in its name. The nation's unity flows from this sacred symbol."
 STATIC_MODIFIER_NAME_nd_gold_coast_merchants: "Lords of the Gold Coast"
 STATIC_MODIFIER_DESC_nd_gold_coast_merchants: "The wealth of the Ashanti Confederacy flows from the forest goldfields to the coastal forts, from the cola nut caravans to the northern markets. Kumasi sits at the heart of trade networks spanning from the Sahel to the Atlantic, turning gold dust into the currency of empire."
 nd_ate.1.t: "Birth of the Ashanti Confederacy"
 nd_ate.1.d: "Under the sacred shade of the kum tree, from which our capital takes its name, the scattered Akan chiefdoms have been forged into one confederacy. The priest Okomfo Anokye called down the Golden Stool from the heavens, and upon it the soul of our nation rests. The Denkyira overlords who once demanded tribute in gold and blood have been broken, and their vassal states now look to Kumasi.\n\nBut what kind of confederacy shall this be? The Golden Stool grants authority that transcends any single chief — a sacred mandate to unite all the Akan peoples under one spiritual authority. Yet the goldfields and trade routes that made this victory possible whisper of a different destiny: a commercial empire whose merchants bring the wealth of the world to Kumasi's broad streets.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ate.1.a: "The Stool commands — and the nation obeys."
 nd_ate.1.b: "Gold speaks louder than any stool."
 STATIC_MODIFIER_NAME_nd_ate_denkyira_conquerors: "Conquerors of Denkyira"
 STATIC_MODIFIER_DESC_nd_ate_denkyira_conquerors: "The army that broke Denkyira's chains carries the momentum of liberation. These veterans know the taste of victory against a superior foe."
 STATIC_MODIFIER_NAME_nd_ate_confederate_unity: "Confederate Unity"
 STATIC_MODIFIER_DESC_nd_ate_confederate_unity: "The genius of the confederacy lies not in conquest alone but in integration — bringing defeated peoples into the fold as members, not subjects."
 nd_ate.2.t: "The Fall of Denkyira"
 nd_ate.2.d: "At the Battle of Feyiase in 1701, the combined forces of the Ashanti confederacy shattered the army of Denkyirahene Ntim Gyakari. The golden regalia of Denkyira — including the note of alliance with the Dutch at Elmina — fell into Ashanti hands. The gold mines, the coastal trade routes, and the subject peoples of Denkyira's empire now belong to the confederacy.\n\nNtim Gyakari himself was slain, and his skull would become a drinking vessel at the court of the Asantehene. The states that once bowed to Denkyira must now choose: will they be absorbed into an Ashanti military machine that rewards battlefield valor, or welcomed into a broader confederation that turns former enemies into loyal members?"
 nd_ate.2.a: "Press the advantage — the conquered serve or they fall."
 nd_ate.2.b: "Extend the stool's protection — former enemies become future allies."
 nd_ate.3.t: "The Conquests of Opoku Ware"
 nd_ate.3.d: "Asantehene Opoku Ware, who succeeded the great Osei Tutu, has carried the confederacy's banners further than any before him. The Bono kingdom fell in 1723, followed by Wassa in 1726. Western Gonja submitted in 1732, and Gyaman followed in 1740. By the end of his reign, the Ashanti Confederacy controls territory stretching across what will become modern Ghana and into the Ivory Coast, with three to five million people under its authority.\n\nOpoku Ware also encouraged the expansion of craft production, establishing factories to innovate in weaving and metalwork. Under his patronage, the kente cloth tradition flourished, and Danish observers at the coast recorded their admiration for Ashanti craftsmanship."
 nd_ate.3.a: "The legacy of Opoku Ware endures."
 STATIC_MODIFIER_NAME_nd_ate_kwadwo_bureaucracy: "Kwadwo's Meritocracy"
 STATIC_MODIFIER_DESC_nd_ate_kwadwo_bureaucracy: "Osei Kwadwo replaced birth with ability as the measure of a man's worth in government. The Asokwafo, once mere royal hornblowers, now serve as a training ground for the empire's finest administrators."
 STATIC_MODIFIER_NAME_nd_ate_hereditary_stability: "Hereditary Stability"
 STATIC_MODIFIER_DESC_nd_ate_hereditary_stability: "The traditional chiefs and their lineages provide the bedrock of Ashanti governance. Their authority, rooted in clan and custom, ensures continuity through the generations."
 nd_ate.4.t: "The Reforms of Osei Kwadwo"
 nd_ate.4.d: "Asantehene Osei Kwadwo, who reigned from 1764 to 1777, has fundamentally transformed how the Ashanti state governs itself. Where once hereditary chiefs filled every position of consequence, Kwadwo instituted a radical principle: appointment by ability rather than birth.\n\nThe Asokwafo — originally a troop of royal hornblowers — has been transformed into an academy for the education and training of future government officials. The most talented young men from across the confederacy are recruited into the Asokwafo community, trained in administration, diplomacy, and statecraft, and then deployed wherever the empire needs them.\n\nBut not everyone welcomes this transformation. The hereditary chiefs see their traditional prerogatives being stripped away, and they warn that meritocracy without lineage produces officials with no loyalty to anything but their own advancement."
 nd_ate.4.a: "Ability alone determines a man's place."
 nd_ate.4.b: "Custom and lineage are the foundation of order."
 STATIC_MODIFIER_NAME_nd_ate_defiant_resistance: "Defiant Resistance"
 STATIC_MODIFIER_DESC_nd_ate_defiant_resistance: "The forest is our fortress. Every tree conceals a musketeer, every path leads to ambush. Let the invaders learn that the Ashanti do not kneel."
 STATIC_MODIFIER_NAME_nd_ate_pragmatic_adaptation: "Pragmatic Adaptation"
 STATIC_MODIFIER_DESC_nd_ate_pragmatic_adaptation: "The world changes, and the wise nation changes with it. Adopt what makes the enemy strong — their discipline, their fortifications, their methods — and turn it against them."
 nd_ate.5.t: "The Anglo-Ashanti Wars"
 nd_ate.5.d: "The British have pushed inland from their coastal forts, claiming dominion over the Gold Coast. Under Asantehene Osei Bonsu, the Ashanti answered with force. In 1824, Sir Charles MacCarthy led a British-allied force against the Ashanti and was utterly defeated — his skull was taken as a gold-rimmed drinking cup by the Asantehene.\n\nBut the British returned with greater numbers and better weapons. The wars of 1863, 1874, and beyond have tested the Ashanti Confederacy as nothing before. In 1874, British forces under Sir Garnet Wolseley sacked Kumasi itself, destroying the royal palace with explosives and burning the Bantama mausoleum.\n\nThe confederacy faces an existential choice: dig deeper into the forest and fight a war of attrition that plays to traditional Ashanti strengths, or adapt to the enemy's methods and build the capacity to meet them on modern terms."
 nd_ate.5.a: "The forest is our weapon — let them bleed for every mile."
 nd_ate.5.b: "Learn from the enemy to surpass the enemy."
 nd_ate.6.t: "Yaa Asantewaa's War"
 nd_ate.6.d: "In 1900, when the British Governor demanded to sit upon the Golden Stool — the very soul of the Ashanti nation — the Queen Mother of Ejisu, Yaa Asantewaa, rose to speak. 'If you, the men of Ashanti, will not go forward,' she declared, 'then we, the women, will.' She rallied the chiefs, and the last great Ashanti rising began.\n\nFor months, Yaa Asantewaa's forces besieged the British garrison at Kumasi Fort. Though the uprising was ultimately suppressed and Yaa Asantewaa was exiled to the Seychelles, the British never obtained the Golden Stool. It was hidden in the forest, and the soul of the Ashanti nation endured. Her defiance became a symbol of resistance that transcends the defeat itself."
 nd_ate.6.a: "The Golden Stool remains free."
 nd_ate_akan_clan_system: "Akan Clan System"
 nd_ate_akan_clan_system_desc: "The matrilineal Akan clan structure, where inheritance and political succession pass through the mother's line, provides a stable foundation for confederate governance."
 nd_ate_gold_dust_currency: "Gold Dust Currency"
 nd_ate_gold_dust_currency_desc: "Akan gold dust serves as both currency and measure of wealth, weighed against standardized brass weights in every marketplace and court across the forest kingdoms."
 nd_ate_forest_warfare: "Forest Warfare Traditions"
 nd_ate_forest_warfare_desc: "The dense tropical forests of the Gold Coast demand a different kind of warrior — one who can move silently through the undergrowth, strike from ambush, and vanish before the enemy can respond."
 nd_ate_cola_nut_trade: "Cola Nut Trade"
 nd_ate_cola_nut_trade_desc: "The stimulant cola nut, grown in the southern forests, is traded northward across the savanna to Muslim communities where alcohol is forbidden, creating lucrative trade routes to the Sahel."
 nd_ate_shrine_houses: "Shrine Houses"
 nd_ate_shrine_houses_desc: "Elaborate shrine houses honor the ancestors and the powerful deities that protect the Akan peoples. These sacred spaces bind communities together through shared spiritual practice."
 nd_ate_akan_metalworking: "Akan Metalworking"
 nd_ate_akan_metalworking_desc: "Akan goldsmiths and brass-casters produce exquisite regalia, goldweights, and ritual objects using the lost-wax casting technique passed down through generations of master craftsmen."
 nd_ate_confederacy_founding: "Confederacy Founding"
 nd_ate_confederacy_founding_desc: "The union of scattered Akan chiefdoms under the Golden Stool, forged through the defeat of the Denkyira overlords, marks the birth of the Ashanti Confederacy."
 nd_ate_golden_stool: "The Golden Stool"
 nd_ate_golden_stool_desc: "The Sika Dwa Kofi — the Golden Stool Born on Friday — descended from the heavens at the command of the priest Okomfo Anokye, embodying the spirit and unity of the Ashanti nation."
 nd_ate_asafo_companies: "Asafo Companies"
 nd_ate_asafo_companies_desc: "The asafo military companies, organized around chiefs and measured by their 'guns,' form the backbone of the Ashanti army — a structured force of musket-armed warriors fighting in coordinated formations."
 nd_ate_kente_weaving: "Kente Weaving"
 nd_ate_kente_weaving_desc: "The intricate strip-woven kente cloth, produced by specialized weavers in villages like Bonwire, is reserved for royalty and serves as both art and political statement."
 nd_ate_opoku_ware_expansion: "Opoku Ware's Expansion"
 nd_ate_opoku_ware_expansion_desc: "Under Asantehene Opoku Ware, the confederacy expanded to its greatest territorial extent, conquering Bono, Wassa, Gonja, and Gyaman between 1723 and 1750."
 nd_ate_royal_gold_mines: "Royal Gold Mines"
 nd_ate_royal_gold_mines_desc: "Osei Tutu declared the gold mines royal possessions, ensuring that the wealth of the forest goldfields flowed directly to the Asantehene and fueled the expansion of the confederacy."
 nd_ate_kumasi_palace: "Kumasi Palace Complex"
 nd_ate_kumasi_palace_desc: "The sprawling royal palace at Kumasi, with its broad streets, courtyards, and more than sixty rooms, serves as the political and cultural heart of the confederacy."
 nd_ate_firearms_trade: "European Firearms Trade"
 nd_ate_firearms_trade_desc: "The Ashanti eagerly adopted European firearms, particularly the Long Dane musket, trading gold and captives for weapons that gave their armies devastating firepower."
 nd_ate_goldweight_standards: "Goldweight Standards"
 nd_ate_goldweight_standards_desc: "The standardized brass goldweight system, combining Islamic, Portuguese, and local measurements, enables precise commercial transactions across the entire Akan trading world."
 nd_ate_northern_trade_routes: "Northern Trade Routes"
 nd_ate_northern_trade_routes_desc: "The great trade routes running north from Kumasi connect the forest zone to the Sahel, exchanging cola nuts, gold, and cloth for salt, livestock, shea butter, and imported goods."
 nd_ate_queen_mother: "The Asantehemaa"
 nd_ate_queen_mother_desc: "The Queen Mother shares responsibility for affairs of state, advising the Asantehene and holding the power to check his authority — a remarkable institution of shared governance."
 nd_ate_craft_specialization: "Craft Village Specialization"
 nd_ate_craft_specialization_desc: "Specialized craft villages surround Kumasi: Bonwire for cloth-weaving, Ntonso for cloth-dyeing, Pankrono for pottery, Ahwiaa for woodworking, and Breman for goldsmithing."
 nd_ate_rolling_fire: "Rolling Fire Tactics"
 nd_ate_rolling_fire_desc: "Ashanti musketeers advance in multiple lines, each discharging volleys and cycling to the rear to reload. This rolling fire technique maintains continuous pressure on the enemy."
 nd_ate_coast_trade: "Coast Trade Relations"
 nd_ate_coast_trade_desc: "Trade with European forts on the coast — first the Portuguese at Elmina, then the Dutch and British — brings firearms, textiles, and manufactured goods into the interior."
 nd_ate_meritocratic_reforms: "Meritocratic Reforms"
 nd_ate_meritocratic_reforms_desc: "Asantehene Osei Kwadwo replaced hereditary appointments with a merit-based system, transforming the Asokwafo hornblowers into a professional civil service academy."
 nd_ate_asokwafo_school: "Asokwafo Civil Service"
 nd_ate_asokwafo_school_desc: "The Asokwafo, transformed from royal musicians into a civil service training school, produces administrators appointed by ability rather than birth."
 nd_ate_military_modernization: "Osei Bonsu's Army"
 nd_ate_military_modernization_desc: "Under Osei Bonsu, the Ashanti army was modernized with improved firearms, better organization, and tactics capable of defeating European-led forces."
 nd_ate_provincial_system: "Provincial Administration"
 nd_ate_provincial_system_desc: "The four-tier system of state, district, village, and lineage governance, administered by the imperial bureaucracy in Kumasi, ensures effective control across the confederacy."
 nd_ate_bantama_tradition: "Bantama Mausoleum"
 nd_ate_bantama_tradition_desc: "The Bantama royal mausoleum at Kumasi houses the remains of past Asantehenes, its thick walls marked with royal symbols — a sacred site connecting the living to the authority of the ancestors."
 nd_ate_odwira_festival: "Odwira Festival"
 nd_ate_odwira_festival_desc: "The annual Odwira purification festival renews the bonds between the Asantehene, the chiefs, and the people, reaffirming the spiritual foundations of the confederacy."
 nd_ate_gold_coast_dominance: "Gold Coast Dominance"
 nd_ate_gold_coast_dominance_desc: "The Ashanti Confederacy's control of the interior goldfields and trade routes to the coast makes it the dominant power on the Gold Coast."
 nd_ate_anglo_ashanti_resistance: "Anglo-Ashanti Resistance"
 nd_ate_anglo_ashanti_resistance_desc: "The five Anglo-Ashanti wars tested the confederacy against the world's foremost imperial power. The Ashanti won the first war, killing a British governor, and held their own across decades of conflict."
 nd_ate_standing_army: "Professional Standing Army"
 nd_ate_standing_army_desc: "The transition from clan-based levies to a professional standing army gives the Ashanti Confederacy a permanent military force capable of rapid deployment."
 nd_ate_kumasi_urban: "Kumasi Urbanization"
 nd_ate_kumasi_urban_desc: "Kumasi's broad streets, planned quarters, and extensive infrastructure make it one of the great cities of West Africa, a center of commerce, governance, and culture."
 nd_ate_gold_refining: "Gold Refining"
 nd_ate_gold_refining_desc: "Advanced techniques for purifying and refining gold dust increase the value of the confederacy's primary export and strengthen its position in international trade."
 nd_ate_judicial_reform: "Judicial Reform"
 nd_ate_judicial_reform_desc: "The centralization of the court system under the Asantehene as supreme judge creates a unified legal framework across the confederacy's diverse communities."
 nd_ate_imperial_roads: "Imperial Road Network"
 nd_ate_imperial_roads_desc: "A network of maintained roads radiating from Kumasi enables rapid military deployment, efficient trade, and effective communication across the confederacy's vast territory."
 nd_ate_war_of_resistance: "War of the Golden Stool"
 nd_ate_war_of_resistance_desc: "Yaa Asantewaa's 1900 uprising against British demands for the Golden Stool represents the last great act of Ashanti military defiance — the Stool was never surrendered."
 nd_ate_cocoa_economy: "Cocoa Economy"
 nd_ate_cocoa_economy_desc: "The transition to cocoa cultivation transforms the Ashanti economy, as the forest environment proves ideal for growing the crop that will make the Gold Coast the world's largest cocoa producer."
 nd_ate_cultural_preservation: "Cultural Preservation"
 nd_ate_cultural_preservation_desc: "Despite colonial pressure, the Ashanti preserve their cultural institutions — the stool system, kente weaving, goldwork, and the Odwira festival endure as living traditions."
 nd_ate_modern_governance: "Modern Governance"
 nd_ate_modern_governance_desc: "The adaptation of traditional confederate governance to modern institutional frameworks, preserving the Asantehene's authority within a contemporary administrative structure."
 nd_ate_modern_army: "Modern Ashanti Army"
 nd_ate_modern_army_desc: "A fully modernized military force that combines traditional Ashanti fighting spirit with contemporary organization, equipment, and tactics."
 nd_ate_prempeh_legacy: "Prempeh's Diplomatic Legacy"
 nd_ate_prempeh_legacy_desc: "Asantehene Prempeh I, exiled by the British in 1896, chose diplomacy over capitulation. His dignified resistance and eventual return preserved the institution of the Asantehene for future generations."
 a_nd_ate_forest_skirmishers: "Akan Forest Skirmishers"
 a_nd_ate_forest_skirmishers_desc: "Light warriors trained in the dense tropical forests of the Gold Coast. They move silently through the undergrowth, striking from ambush before melting back into the trees."
 a_nd_ate_asafo_musketeer: "Asafo Musketeers"
 a_nd_ate_asafo_musketeer_desc: "Musket-armed warriors organized into asafo companies under their chiefs. They carry their guns at the same angle and fire volleys on command, combining traditional clan loyalty with firearms discipline."
 a_nd_ate_dane_gun_infantry: "Dane Gun Infantry"
 a_nd_ate_dane_gun_infantry_desc: "Ashanti soldiers armed with the Long Dane — the preferred European trade musket — trained in the rolling fire technique that earned the respect of European observers."
 a_nd_ate_bonsu_guard: "Bonsu Guard"
 a_nd_ate_bonsu_guard_desc: "The elite guard of Asantehene Osei Bonsu, battle-hardened veterans who defeated a British governor and carried his skull as a trophy. Their morale is unshakeable."
 a_nd_ate_professional_infantry: "Ashanti Professional Infantry"
 a_nd_ate_professional_infantry_desc: "Full-time soldiers of the Ashanti standing army, maintained year-round rather than raised seasonally. They represent the confederacy's military evolution from clan levies to professional force."
 a_nd_ate_modern_infantry: "Modern Ashanti Infantry"
 a_nd_ate_modern_infantry_desc: "The final evolution of Ashanti military tradition — modern soldiers who inherit the fighting spirit of Osei Tutu's warriors and the organizational discipline of Osei Bonsu's reforms."
 nd_ate_gold_treasury: "Gold Treasury"
 nd_ate_gold_treasury_desc: "A royal depository where gold dust is received, weighed against standardized brass goldweights, and stored. It serves as both treasury and commercial center."
 nd_ate_asante_shrine: "Asante Shrine House"
 nd_ate_asante_shrine_desc: "An elaborate shrine house built in the traditional Asante wattle-and-daub style, with intricate wall decorations honoring powerful deities and ancestral spirits."
 nd_ate_stool_house: "Stool House"
 nd_ate_stool_house_desc: "A sacred repository housing the clan stools that embody the soul of each chiefdom. The most important houses the Golden Stool itself — the spiritual center of the confederacy."
 nd_ate_kente_workshop: "Kente Workshop"
 nd_ate_kente_workshop_desc: "A specialized weaving workshop where master weavers produce kente cloth — strip-woven textiles of silk and cotton in patterns and colors reserved for royalty and the elite."
 nd_ate_palace_complex: "Asante Palace Complex"
 nd_ate_palace_complex_desc: "A sprawling royal complex in the Kumasi style, with broad courtyards, thatched-roof chambers, and extensive wall decorations that astonished European visitors."
 nd_ate_trade_lodge: "Trade Lodge"
 nd_ate_trade_lodge_desc: "A waystation on the northern trade routes where Ashanti merchants exchange cola nuts, gold, and cloth for salt, livestock, and goods from across the Sahel."
 nd_ate_asokwafo_academy: "Asokwafo Academy"
 nd_ate_asokwafo_academy_desc: "A training school for the meritocratic civil service, where talented young men from across the confederacy learn administration, diplomacy, and statecraft."
 nd_ate_royal_mausoleum: "Royal Mausoleum"
 nd_ate_royal_mausoleum_desc: "A Bantama-style burial complex with thick walls marked by royal symbols, housing the remains of past Asantehenes in a solemn space meant for reflection and ancestral communion."
 nd_ate_abrafoo_foundry: "Abrafoo Foundry"
 nd_ate_abrafoo_foundry_desc: "A workshop of the abrafoo brass-workers' guild, where skilled artisans cast kuduo vessels, gold weights, and ceremonial objects using the lost-wax technique."
 nd_ate_foundry_maintenance: "Foundry Operations"
 nd_ate_foundry_maintenance_desc: "Copper ingots and charcoal fuel the brass foundry's furnaces, producing ornamental kuduo vessels and goldweights."
 nd_ate_trade_road_station: "Imperial Road Station"
 nd_ate_trade_road_station_desc: "A rest stop and toll collection point on the road network radiating from Kumasi, facilitating both military movement and commercial traffic across the confederacy."
 nd_ate_cocoa_plantation: "Cocoa Plantation"
 nd_ate_cocoa_plantation_desc: "A cultivated grove of cocoa trees in the forest zone, producing the beans that will transform the Gold Coast into the world's leading cocoa exporter."
 nd_ate_gold_dust_weighing: "Gold Dust Weighing"
 nd_ate_gold_dust_weighing_desc: "The careful weighing and assaying of gold dust using standardized brass goldweights, ensuring fair measurement in every commercial transaction."
 nd_ate_brass_casting: "Akan Brass Casting"
 nd_ate_brass_casting_desc: "Master metalworkers use the lost-wax casting technique to produce brass goldweights, ritual objects, and the elaborate regalia of the Asantehene's court."
 nd_ate_kente_production: "Kente Cloth Production"
 nd_ate_kente_production_desc: "Narrow strips of silk and cotton cloth are woven in intricate patterns and sewn together to create the dazzling kente robes worn by Ashanti royalty."
 nd_ate_goldweight_minting: "Goldweight Standardization"
 nd_ate_goldweight_minting_desc: "The production of standardized brass goldweights combining Islamic, Portuguese, and local measurement systems into a unified commercial standard."
 nd_ate_craft_villages: "Craft Village Production"
 nd_ate_craft_villages_desc: "The specialized craft villages around Kumasi, each devoted to a single art — Bonwire for weaving, Ntonso for dyeing, Pankrono for pottery, Ahwiaa for woodworking."
 nd_ate_gold_refining_process: "Gold Refining Process"
 nd_ate_gold_refining_process_desc: "Advanced techniques for purifying gold dust, producing higher-quality gold for trade and increasing the value of the confederacy's primary export."
 nd_ate_cocoa_processing: "Cocoa Processing"
 nd_ate_cocoa_processing_desc: "Cocoa beans are fermented, dried, and processed for export, transforming raw forest produce into a valuable commodity for international markets."
 nd_ate_treasury_maintenance: "Treasury Operations"
 nd_ate_treasury_maintenance_desc: "The ongoing operation of the gold treasury, including the maintenance of scales, weights, and storage facilities."
 nd_ate_shrine_upkeep: "Shrine Upkeep"
 nd_ate_shrine_upkeep_desc: "The maintenance of shrine houses, including repairs to wattle-and-daub walls and the provision of offerings to the spirits."
 nd_ate_stool_house_maintenance: "Stool House Maintenance"
 nd_ate_stool_house_maintenance_desc: "The care and upkeep of the sacred stool repository, including the guardianship and ritual maintenance of the clan stools."
 nd_ate_kente_weaving_pm: "Kente Weaving"
 nd_ate_kente_weaving_pm_desc: "Imported silk and locally sourced dyes are woven into the vibrant strip-woven patterns unique to Ashanti textile art."
 nd_ate_palace_upkeep: "Palace Upkeep"
 nd_ate_palace_upkeep_desc: "The maintenance of the royal palace complex, including timber, pottery, and cloth for repairs and decoration."
 nd_ate_trade_lodge_maintenance: "Lodge Maintenance"
 nd_ate_trade_lodge_maintenance_desc: "The upkeep of trade lodges along the northern routes, providing shelter and facilities for traveling merchants."
 nd_ate_academy_maintenance: "Academy Operations"
 nd_ate_academy_maintenance_desc: "The provision of writing materials and supplies for the Asokwafo civil service academy."
 nd_ate_mausoleum_maintenance: "Mausoleum Upkeep"
 nd_ate_mausoleum_maintenance_desc: "The maintenance of the royal mausoleum, requiring stone for structural repairs and ritual care of the burial chambers."
 nd_ate_road_maintenance: "Road Maintenance"
 nd_ate_road_maintenance_desc: "The upkeep of the imperial road network, requiring lumber for bridges and stone for road surfaces."
 nd_ate_cocoa_cultivation: "Cocoa Cultivation"
 nd_ate_cocoa_cultivation_desc: "Cocoa groves are cleared and tended in the forest zone, producing raw cocoa beans for drying and export."
 nd_ate_formed_tt: "Ashanti Confederacy has been formed"
 nd_ate_path_a_tt: "Chose Authority of the Golden Stool"
 nd_ate_path_b_tt: "Chose Lords of the Gold Coast"
 nd_ate_destiny: "Destiny of the Ashanti"
 nd_ate_destiny_desc: "The Ashanti Confederacy has been forged, but its ultimate shape remains to be decided. The Golden Stool grants authority; the goldfields grant wealth. Both paths lead to greatness."
 nd_ate_dest_stool_wars: "Wars of the Stool"
 nd_ate_dest_stool_wars_desc: "The Golden Stool demands submission. Bring the northern kingdoms under Ashanti authority by conquering Dagbon and its trading center of Salaga. Accumulate 1000 gold to fund the campaign."
 nd_ate_dest_great_ashanti: "Great Ashanti"
 nd_ate_dest_great_ashanti_desc: "The confederacy must project its power beyond the forest belt. Conquer Oyo-Ile, the Yoruba capital, and the Borgu stronghold of Nikki. Maintain an army of 50 regiments and prestige above 50."
 nd_ate_dest_ashanti_imperium: "Ashanti Imperium"
 nd_ate_dest_ashanti_imperium_desc: "Build an empire that stretches from the Sahara to the sea. Conquer Timbuktu, Benin, and Niani. Field an army of 75 regiments with 3000 gold in the treasury and prestige above 75."
 nd_ate_dest_coast_control: "Lords of the Coast"
 nd_ate_dest_coast_control_desc: "Seize control of the western Gold Coast by taking Axim and Apollonia in Nzima territory. These coastal positions give direct access to European trade. Accumulate 1000 gold."
 nd_ate_dest_golden_trade: "The Golden Trade"
 nd_ate_dest_golden_trade_desc: "Transform the confederacy into a banking power. Embrace the Banking institution, accumulate 2000 gold, ensure ivory flows through your markets, and maintain prestige above 50."
 nd_ate_dest_gold_empire: "Empire of Gold"
 nd_ate_dest_gold_empire_desc: "Build the wealthiest state in West Africa. Conquer Djenne to control the trans-Saharan trade terminus, embrace the Global Trade institution, amass 3000 gold, reach prestige 75, and develop your territory to 500 total development."
 nd_ate.7.t: "The Ashanti Destiny"
 nd_ate.7.d: "The confederacy stands at the threshold of greatness. Whether through the authority of the Golden Stool or the power of gold dust, the Ashanti shall leave their mark upon the world. The path we have chosen will define the nation for generations to come."
 nd_ate.7.a: "Our destiny awaits."
 nd_ate.8.t: "Dagbon Submits"
 nd_ate.8.d: "The northern kingdom of Dagbon has fallen to Ashanti arms. Yendi, seat of the Ya-Na, now acknowledges the authority of the Golden Stool. The great trading center of Salaga, where cola nuts and gold are exchanged for salt and livestock, is ours. The confederacy's military reach now extends beyond the forest into the savanna."
 nd_ate.8.a: "The Stool's authority grows."
 nd_ate.9.t: "The Greater Ashanti"
 nd_ate.9.d: "Ashanti armies have marched far beyond the forest homeland. Oyo-Ile, the great Yoruba capital, has fallen, and the Borgu warriors have submitted. The confederacy now controls territory stretching across the entire Guinea coast hinterland.\n\nThis expansion demands a choice. We can build a war machine that mobilizes quickly and overwhelms opponents through speed and numbers, or we can establish a garrison state with fortified positions, intelligence networks, and the diplomatic leverage to strike when the moment is right."
 nd_ate.9.a: "Speed and overwhelming force."
 nd_ate.9.b: "Fortification and intelligence."
 nd_ate.10.t: "The Ashanti Imperium"
 nd_ate.10.d: "From Timbuktu in the Sahel to Benin on the coast, from Niani in the west to the eastern forests, the Ashanti Imperium stretches across a vast swathe of West Africa. No power on the continent can match the armies that march under the Golden Stool's banner.\n\nBut how shall this imperium be governed? Through terror and overwhelming military force that crushes all resistance, or through a more measured approach that rebuilds conquered lands and turns enemies into productive subjects?"
 nd_ate.10.a: "Let them fear the name Ashanti."
 nd_ate.10.b: "Rebuild what war has broken."
 nd_ate.11.t: "The Coast Is Ours"
 nd_ate.11.d: "The western Gold Coast is now firmly under Ashanti control. Axim and Apollonia in Nzima territory give the confederacy direct access to the European trading posts. No longer must Ashanti merchants rely on middlemen to reach the ships at anchor. Gold dust flows directly from the mines to the coastal warehouses."
 nd_ate.11.a: "Gold flows from forest to sea."
 nd_ate.12.t: "Masters of the Golden Trade"
 nd_ate.12.d: "The Ashanti Confederacy has embraced modern banking practices and established itself as the financial heart of West Africa. Ivory, gold, cola nuts, and cloth flow through markets where Ashanti merchants set the prices. The confederacy's wealth is no longer measured only in gold dust but in the sophisticated instruments of international commerce.\n\nShall we open our ports to all comers, welcoming any ship that brings goods to trade and expanding our commercial reach across the seas? Or shall we cultivate a merchant aristocracy, a class of elite traders with the diplomatic connections and financial resources to dominate regional commerce?"
 nd_ate.12.a: "Open the ports to the world."
 nd_ate.12.b: "Cultivate our merchant princes."
 nd_ate.13.t: "The Empire of Gold"
 nd_ate.13.d: "Djenne has fallen. The trans-Saharan trade terminus, where gold from the forest meets salt from the desert and goods from across the Islamic world, is now an Ashanti possession. The confederacy's commercial network spans from the Atlantic coast to the edge of the Sahara, from the forest goldfields to the great markets of the Sahel.\n\nThis is the apex of Ashanti commercial power. Shall the empire embrace its diverse peoples and faiths, building a cosmopolitan trading civilization that welcomes all? Or shall it invest its gold in ships and naval power, projecting Ashanti influence across the seas?"
 nd_ate.13.a: "A thousand peoples under one golden roof."
 nd_ate.13.b: "Build a fleet worthy of our wealth."
 STATIC_MODIFIER_NAME_nd_ate_dest_war_machine: "Ashanti War Machine"
 STATIC_MODIFIER_DESC_nd_ate_dest_war_machine: "The confederacy's military apparatus has been transformed into a rapid-response war machine. Supply lines are extended, garrisons reinforced, and new regiments raised with terrifying speed."
 STATIC_MODIFIER_NAME_nd_ate_dest_garrison_state: "Ashanti Garrison State"
 STATIC_MODIFIER_DESC_nd_ate_dest_garrison_state: "A network of fortified positions and spy networks gives the Ashanti Confederacy the intelligence and strategic patience to choose the perfect moment to strike."
 STATIC_MODIFIER_NAME_nd_ate_dest_terror_of_ashanti: "Terror of the Ashanti"
 STATIC_MODIFIER_DESC_nd_ate_dest_terror_of_ashanti: "The very name Ashanti strikes fear into neighboring peoples. Mercenaries flock to the banner, and fortified cities fall before the assault. But endless conquest strains the treasury."
 STATIC_MODIFIER_NAME_nd_ate_dest_ashanti_pax: "Pax Ashanti"
 STATIC_MODIFIER_DESC_nd_ate_dest_ashanti_pax: "The Ashanti Imperium rebuilds what war has broken. Conquered peoples are resettled, cities reconstructed, and diplomats dispatched to ensure the peace holds."
 STATIC_MODIFIER_NAME_nd_ate_dest_open_ports: "Open Ports Policy"
 STATIC_MODIFIER_DESC_nd_ate_dest_open_ports: "Ashanti ports welcome ships from across the world. Devastated coastal areas recover quickly, and the confederacy's commercial reach extends to distant shores."
 STATIC_MODIFIER_NAME_nd_ate_dest_merchant_princes: "Merchant Princes of Kumasi"
 STATIC_MODIFIER_DESC_nd_ate_dest_merchant_princes: "An elite class of Ashanti merchant-diplomats maintains commercial relationships across the region, though their focus on trade comes at some cost to military readiness."
 STATIC_MODIFIER_NAME_nd_ate_dest_cosmopolitan_empire: "Cosmopolitan Empire"
 STATIC_MODIFIER_DESC_nd_ate_dest_cosmopolitan_empire: "The Ashanti commercial empire embraces traders and settlers of all faiths. This open society, backed by naval power, projects influence far beyond West Africa."
 STATIC_MODIFIER_NAME_nd_ate_dest_golden_fleet: "Golden Fleet"
 STATIC_MODIFIER_DESC_nd_ate_dest_golden_fleet: "Ashanti gold funds a fleet of trading vessels and warships. Shipyards work at a furious pace, though the investment diverts resources from the land army."
 nd_ate_war_council: "Ashanti War Council"
 nd_ate_war_council_desc: "The supreme military council of the Ashanti Imperium, where the greatest generals of the confederacy plan campaigns that span from the Sahara to the sea."
 nd_ate_great_market: "Great Market of Kumasi"
 nd_ate_great_market_desc: "The legendary central market of Kumasi, where gold dust, ivory, cola nuts, kente cloth, and goods from across the world change hands under the watchful eye of royal trade officials."
 nd_ate_war_council_maintenance: "War Council Operations"
 nd_ate_war_council_maintenance_desc: "The maintenance of the war council chambers, including maps, weapons for display, and provisions for the generals who plan the confederacy's campaigns."
 nd_ate_great_market_maintenance: "Market Operations"
 nd_ate_great_market_maintenance_desc: "The upkeep of the great market, including stall construction, sanitation, and the salaries of royal trade inspectors who ensure fair dealing."
