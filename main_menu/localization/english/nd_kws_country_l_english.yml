l_english:
 KWS: "Kilwa Sultanate"
 KWS_ADJ: "Kilwan"
 KWS_f: "Kilwa Sultanate"
 KWS_f_desc: "The Kilwa Sultanate was the wealthiest and most powerful of the Swahili coast city-states, controlling the gold trade from the interior of southeastern Africa to the Indian Ocean from the 12th to 16th century. By uniting the Swahili trading cities under one banner, a ruler can restore Kilwa's maritime commercial empire and dominate the Indian Ocean trade routes once more."
