l_english:
 STATIC_MODIFIER_NAME_nd_golden_throne_of_niani: "Golden Throne of Niani"
 STATIC_MODIFIER_DESC_nd_golden_throne_of_niani: "The wealth of the Manden Empire flows through our markets like the waters of the Niger. Gold dust and salt fill our coffers, and the name of our Mansa is spoken with reverence from Timbuktu to Cairo."
 STATIC_MODIFIER_NAME_nd_mandate_of_the_gbara: "Mandate of the Gbara"
 STATIC_MODIFIER_DESC_nd_mandate_of_the_gbara: "The Great Assembly has spoken. The ton-tigui stand ready, the farari corps ride at our command, and the sixteen quiver-masters pledge their loyalty. The empire shall be held by the strength of Manden arms."
 STATIC_MODIFIER_NAME_nd_keepers_of_timbuktu: "Keepers of Timbuktu"
 STATIC_MODIFIER_DESC_nd_keepers_of_timbuktu: "The libraries of Timbuktu hold the wisdom of ages — manuscripts on jurisprudence, astronomy, medicine, and history fill the shelves of Sankore. We are the guardians of this knowledge."
 STATIC_MODIFIER_NAME_nd_trade_of_timbuktu: "Trade of Timbuktu"
 STATIC_MODIFIER_DESC_nd_trade_of_timbuktu: "Timbuktu stands at the crossroads of the world. Caravans from the Sahara meet river merchants from the Niger, and the goods of three continents change hands in our markets."
 STATIC_MODIFIER_NAME_nd_lords_of_the_caravan: "Lords of the Caravan"
 STATIC_MODIFIER_DESC_nd_lords_of_the_caravan: "The great caravans of a thousand camels cross the burning sands at our command. Salt from Taghaza, gold from Bure, kola from the forest — all pass through Manden territory and fill Manden purses."
 nd_mal.1.t: "The Restoration of the Manden Empire"
 nd_mal.1.d: "The fragments of the great empire founded by Sundiata Keita have been gathered once more under a single banner. From the banks of the Niger to the edges of the Sahara, the Manden people are united again. The Gbara — the great assembly of clan chiefs — convenes at Kangaba to decide the direction of the restored empire.\n\nWill we follow in the footsteps of Mansa Musa, whose golden pilgrimage dazzled the courts of Cairo and Mecca, making Mali the wealthiest realm in the known world? Or shall we heed the legacy of Sundiata the Lion King, whose warriors carved an empire from the savannah, and build our strength upon the might of the ton-tigui and the fearsome farari cavalry?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mal.1.a: "Let gold speak louder than swords."
 nd_mal.1.b: "The empire was won by warriors, and warriors shall keep it."
 nd_mal.2.t: "The Manuscripts of Timbuktu"
 nd_mal.2.d: "In the madrasas of Timbuktu, a remarkable flowering of scholarship has taken root. The scholars of Sankore have assembled a vast collection of manuscripts — texts on Islamic jurisprudence, astronomy, mathematics, medicine, and the histories of the Sahel. Scholars travel from as far as Fez and Cairo to study alongside our ulama, and the Timbuktu Manuscripts are becoming known as one of the great intellectual treasures of the Islamic world.\n\nThese manuscripts represent an immense wealth — both intellectual and material. Shall we invest in preserving and expanding this scholarly tradition, or leverage Timbuktu's fame to attract more traders and commerce to our markets?"
 nd_mal.2.a: "Knowledge is the truest wealth — preserve the manuscripts."
 nd_mal.2.b: "Let Timbuktu's fame fill our markets with merchants."
 nd_mal.3.t: "The Great Caravans of the Sahara"
 nd_mal.3.d: "The trans-Saharan trade routes that have enriched our empire for generations continue to thrive. Vast caravans of a thousand camels and more cross the burning desert, guided by Berber navigators who read the stars as sailors read the sea. At Taghaza, great slabs of salt are cut from the earth and loaded onto camels for the long journey south. At Bure and Bambuk, gold dust is weighed and exchanged for the salt that is worth its weight in the precious metal.\n\nOur empire sits astride these routes like a spider at the center of its web. Every caravan that passes through our territory pays tribute to the Mansa, and the wealth of nations flows through Manden hands."
 nd_mal.3.a: "We are the lords of the caravan roads."
 nd_mal.4.t: "The Great Mosque of Djinguereber"
 nd_mal.4.d: "The Djinguereber Mosque, commissioned by Mansa Musa himself and designed by the Andalusian architect Abu Es Haq es Saheli, stands as the crown jewel of Sudano-Sahelian architecture. Built of banco — sun-dried mud brick reinforced with palm wood — the mosque towers over Timbuktu, its three inner courts, two minarets, and prayer halls serving as both a house of worship and a center of learning.\n\nThe mosque has become a model for Islamic architecture throughout West Africa. Its distinctive style — organic, monumental, and perfectly adapted to the Sahel climate — represents the unique synthesis of Manden creativity and Islamic devotion that defines our civilization."
 nd_mal.4.a: "A monument worthy of the Mansa's glory."
 nd_mal.5.t: "Reforms of the Manden Charter"
 nd_mal.5.d: "The Kouroukan Fouga, the great charter proclaimed at Kurukan Fuga after Sundiata's victory at the Battle of Krina, has served as the constitutional foundation of our empire since its founding. Its forty-four edicts established the federation of Mandinka clans, codified property rights, mandated environmental protections, and guaranteed individual freedoms — including the abolition of slavery among the Manden.\n\nNow a new generation of leaders seeks to adapt these ancient principles to the challenges of a changing world. The charter's emphasis on consensus governance through the Gbara assembly, its recognition of craft guild autonomy, and its provisions for social mobility offer a framework for a more modern administration."
 nd_mal.5.a: "The wisdom of the founders endures."
 nd_mal_griot_tradition: "Griot Oral Tradition"
 nd_mal_griot_tradition_desc: "The griots — jali in Manden — are the keepers of history, genealogy, and law. Through song and recitation, they preserve the Epic of Sundiata and the deeds of the Mansaya."
 nd_mal_niani_trade_tradition: "Niani Trade Tradition"
 nd_mal_niani_trade_tradition_desc: "The capital at Niani sits at the crossroads of the Niger trade routes, where goods from the forest, savannah, and desert converge in bustling markets."
 nd_mal_clan_governance: "Manden Clan Governance"
 nd_mal_clan_governance_desc: "The Manden political system rests on the federation of clans established by the Kouroukan Fouga, with the Gbara assembly providing counsel and consensus."
 nd_mal_islam_of_the_mansa: "Islam of the Mansa"
 nd_mal_islam_of_the_mansa_desc: "The Mansaya embraced Islam early, blending it with Manden traditions to create a distinctive West African Islamic civilization."
 nd_mal_timbuktu_manuscripts: "Timbuktu Manuscripts"
 nd_mal_timbuktu_manuscripts_desc: "The great libraries and madrasas of Timbuktu house hundreds of thousands of manuscripts on jurisprudence, astronomy, and history — an intellectual treasure of the Islamic world."
 nd_mal_trans_saharan_caravans: "Trans-Saharan Caravans"
 nd_mal_trans_saharan_caravans_desc: "Vast caravans of a thousand camels cross the desert, carrying salt south and gold north. Mali sits at the heart of this commerce."
 nd_mal_hajj_of_the_mansa: "Hajj of the Mansa"
 nd_mal_hajj_of_the_mansa_desc: "Mansa Musa's legendary pilgrimage to Mecca in 1324 astounded the courts of Egypt and Arabia with its display of wealth, establishing Mali's reputation across the known world."
 nd_mal_djinguereber_mosque: "Djinguereber Mosque"
 nd_mal_djinguereber_mosque_desc: "Commissioned by Mansa Musa and designed by the Andalusian architect Abu Es Haq es Saheli, this great mosque defines the Sudano-Sahelian architectural tradition."
 nd_mal_wangara_gold_trade: "Wangara Gold Trade"
 nd_mal_wangara_gold_trade_desc: "The Wangara merchant network controls the gold fields of Bure and Bambuk through a system of silent trade, making Mali the source of much of the world's gold."
 nd_mal_saharan_musket_trade: "Saharan Musket Trade"
 nd_mal_saharan_musket_trade_desc: "Firearms acquired through trans-Saharan trade with North African states begin to transform Manden warfare, supplementing traditional bow and spear tactics."
 nd_mal_niger_river_fleet: "Niger River Fleet"
 nd_mal_niger_river_fleet_desc: "War canoes and trading vessels ply the Niger River, the lifeline of the empire, carrying goods and warriors between the great trading cities."
 nd_mal_manden_reforms: "Manden Charter Reforms"
 nd_mal_manden_reforms_desc: "The principles of the Kouroukan Fouga — consensus governance, craft guild autonomy, and social mobility — are adapted to meet the challenges of a new era."
 nd_mal_gold_dust_economy: "Gold Dust Economy"
 nd_mal_gold_dust_economy_desc: "Gold dust serves as currency throughout the empire, weighed in standardized measures. The gold markets of Niani and Timbuktu set prices that ripple across Africa and beyond."
 nd_mal_sankore_scholars: "Sankore Scholars"
 nd_mal_sankore_scholars_desc: "The scholars of the Sankore Madrasa represent the intellectual pinnacle of West African Islam, producing works on Maliki jurisprudence that are studied from the Sahel to the Maghreb."
 nd_mal_tonjon_cavalry: "Ton-Jon Cavalry"
 nd_mal_tonjon_cavalry_desc: "The ton-jon, originally former slaves granted warrior status, evolved into a professional cavalry force serving the Mansa as a loyal military instrument beyond clan politics."
 nd_mal_mande_cloth_weaving: "Mande Cloth Weaving"
 nd_mal_mande_cloth_weaving_desc: "The bogolan — mud cloth — tradition and strip-woven textiles of the Mande people are both artistically distinctive and commercially valuable throughout West Africa."
 nd_mal_maliki_jurisprudence: "Maliki Jurisprudence"
 nd_mal_maliki_jurisprudence_desc: "The Maliki school of Islamic law, dominant in the Sahel, provides a comprehensive legal framework that governs trade, inheritance, and social relations across the empire."
 nd_mal_provincial_farimba: "Provincial Farimba"
 nd_mal_provincial_farimba_desc: "The farima — provincial governors drawn from the warrior aristocracy — administer the far-flung provinces of the empire, collecting tribute and maintaining order on behalf of the Mansa."
 nd_mal_kola_trade_routes: "Kola Trade Routes"
 nd_mal_kola_trade_routes_desc: "Kola nuts from the southern forests are a prized stimulant throughout the Islamic world. Controlling these trade routes adds another dimension to Mali's commercial dominance."
 nd_mal_firearms_adoption: "Firearms Adoption"
 nd_mal_firearms_adoption_desc: "Firearms acquired through trans-Saharan trade and local manufacture begin to transform the composition of Manden armies, creating a new class of musket-armed infantry."
 nd_mal_tata_fortifications: "Tata Fortifications"
 nd_mal_tata_fortifications_desc: "The tata — fortified compounds of sun-dried brick — protect Manden settlements from raids. Their thick walls and defensive towers are adapted to the Sahel environment."
 nd_mal_imperial_centralization: "Imperial Centralization"
 nd_mal_imperial_centralization_desc: "Administrative reforms strengthen the Mansa's authority over the provinces, reducing the autonomy of local chiefs and creating a more unified imperial bureaucracy."
 nd_mal_niger_trade_network: "Niger Trade Network"
 nd_mal_niger_trade_network_desc: "The Niger River serves as a commercial highway linking the empire's major cities. Control of riverine trade complements the overland caravan routes."
 nd_mal_mande_diaspora: "Mande Diaspora"
 nd_mal_mande_diaspora_desc: "Mande-speaking traders, craftsmen, and scholars have established communities throughout West Africa, spreading language, culture, and commerce far beyond the empire's borders."
 nd_mal_sofa_reform: "Sofa Military Reform"
 nd_mal_sofa_reform_desc: "The sofa warrior tradition is modernized with European-influenced drill and organization, creating a disciplined professional infantry force for the new age."
 nd_mal_secular_education: "Maktab Education"
 nd_mal_secular_education_desc: "Building on the madrasa tradition, a network of maktab schools extends literacy and learning beyond the scholarly elite to a broader segment of society."
 nd_mal_groundnut_economy: "Groundnut Economy"
 nd_mal_groundnut_economy_desc: "The cultivation and export of groundnuts transforms the agricultural economy, providing a cash crop that integrates Mali into global commodity markets."
 nd_mal_modern_governance: "Modern Governance"
 nd_mal_modern_governance_desc: "Modern administrative methods are adopted to govern the empire, blending Manden traditions of consensus rule with bureaucratic efficiency."
 nd_mal_epic_tradition: "Epic Tradition"
 nd_mal_epic_tradition_desc: "The oral traditions of the griots — the Epic of Sundiata, the chronicles of the Mansaya — are a living cultural heritage that defines Manden identity across the centuries."
 a_nd_mal_saharan_musketeer: "Saharan Musketeer"
 a_nd_mal_saharan_musketeer_desc: "Infantry armed with muskets acquired through trans-Saharan trade, combining traditional Manden tactical discipline with firearm technology."
 a_nd_mal_tonjon_horseman: "Ton-Jon Horseman"
 a_nd_mal_tonjon_horseman_desc: "Professional cavalry warriors drawn from the ton-jon warrior class, famed for their speed, ferocity in raids, and absolute loyalty to the Mansa."
 a_nd_mal_mande_arquebusier: "Mande Arquebusier"
 a_nd_mal_mande_arquebusier_desc: "Manden infantry trained in the use of arquebuses, representing the maturation of firearms warfare in the Sahel."
 n_nd_mal_niger_canoe: "Niger War Canoe"
 n_nd_mal_niger_canoe_desc: "Sturdy canoes built for river warfare and trade on the Niger, crewed by experienced rivermen who know every bend and sandbar of the great river."
 a_nd_mal_reformed_sofa: "Reformed Sofa"
 a_nd_mal_reformed_sofa_desc: "The sofa warrior tradition reformed with modern drill and discipline, creating a professional infantry force that carries forward the martial legacy of old Mali."
 nd_mal_griot_pavilion: "Griot Pavilion"
 nd_mal_griot_pavilion_desc: "A gathering place where griots — the hereditary keepers of oral history — perform the epics and genealogies that bind Manden society together."
 nd_mal_sahel_caravanserai: "Sahel Caravanserai"
 nd_mal_sahel_caravanserai_desc: "A fortified rest stop along the trans-Saharan trade routes, providing shelter, water, and markets for the great caravans crossing the desert."
 nd_mal_madrasa: "Timbuktu Madrasa"
 nd_mal_madrasa_desc: "An institution of Islamic higher learning modeled on the great madrasas of Sankore, teaching jurisprudence, astronomy, mathematics, and Quranic studies."
 nd_mal_salt_depot: "Salt Depot"
 nd_mal_salt_depot_desc: "A warehouse and market for the salt trade — the great slabs of rock salt from Taghaza are stored, divided, and sold to merchants heading south."
 nd_mal_sudano_sahelian_mosque: "Sudano-Sahelian Mosque"
 nd_mal_sudano_sahelian_mosque_desc: "A monumental mosque built in the distinctive banco mud-brick style of the Sahel, serving as both a center of worship and a seat of learning."
 nd_mal_gold_dust_market: "Gold Dust Market"
 nd_mal_gold_dust_market_desc: "A specialized market where gold dust is weighed, valued, and traded. The gold markets of Mali set prices that influence commerce across Africa and the Mediterranean."
 nd_mal_tata_fortress: "Tata Fortress"
 nd_mal_tata_fortress_desc: "A fortified compound of sun-dried brick with defensive towers, adapted to the Sahel landscape. The tata tradition protects settlements from raids and invasions."
 nd_mal_maktab: "Maktab School"
 nd_mal_maktab_desc: "A school providing basic literacy and Quranic education to the broader population, extending the madrasa tradition beyond the scholarly elite."
 nd_mal_griot_upkeep: "Griot Patronage"
 nd_mal_griot_upkeep_desc: "Supporting the griots with dyes for their ceremonial garments, pottery for their instruments, and cloth for their performance attire."
 nd_mal_caravanserai_upkeep: "Caravanserai Provisioning"
 nd_mal_caravanserai_upkeep_desc: "Supplying the caravanserai with livestock, grain, and salt for the traders and their animals on the desert crossing."
 nd_mal_madrasa_upkeep: "Madrasa Library Costs"
 nd_mal_madrasa_upkeep_desc: "Paper and books for the manuscripts and teaching materials of the madrasa scholars, with incense for the prayer halls."
 nd_mal_salt_depot_upkeep: "Salt Storage"
 nd_mal_salt_depot_upkeep_desc: "Maintaining salt stocks at the depot, with lumber for shelving and pottery containers for distribution to merchants."
 nd_mal_mosque_upkeep: "Mosque Maintenance"
 nd_mal_mosque_upkeep_desc: "Clay and lumber for the annual replastering and repair of the banco mud-brick structure, and incense for worship."
 nd_mal_gold_market_upkeep: "Market Operations"
 nd_mal_gold_market_upkeep_desc: "Tools and pottery for weighing and measuring gold dust, with paper for the ledgers and trade records."
 nd_mal_tata_upkeep: "Fortress Upkeep"
 nd_mal_tata_upkeep_desc: "Clay and lumber for repairing the banco mud-brick walls and wooden palisades, with weaponry to arm the garrison."
 nd_mal_maktab_upkeep: "School Supplies"
 nd_mal_maktab_upkeep_desc: "Paper and books for students and teachers at the maktab, with cloth for the students' writing materials and uniforms."
 nd_mal_salt_trade_pm: "Trans-Saharan Salt Trade"
 nd_mal_salt_trade_pm_desc: "Processing and distributing salt from the great desert mines for commerce throughout the Sahel."
 nd_mal_bogolan_cloth_pm: "Bogolan Cloth Production"
 nd_mal_bogolan_cloth_pm_desc: "Artisans produce bogolan — the distinctive Mande mud cloth — by dyeing locally woven cotton with fermented mud and natural pigments, creating fine textiles prized across West Africa."
 levy_nd_mal_tonjon_horseman: "Ton-Jon Horseman Levy"
 levy_nd_mal_tonjon_horseman_desc: "Professional cavalry raised from the ton-jon warrior class."
 levy_nd_mal_reformed_sofa: "Reformed Sofa Levy"
 levy_nd_mal_reformed_sofa_desc: "Modernized sofa infantry raised from the peasantry and soldier class."
 nd_mal_kola_trade_pm: "Kola Nut Trade"
 nd_mal_kola_trade_pm_desc: "Processing and distributing kola nuts from the southern forests for trade across the Sahel, using cloth bales and pottery vessels for packaging and transport."
 nd_mal_formed_tt: "Mali has been formed"
 nd_mal_path_a_tt: "Chose Golden Throne of Niani"
 nd_mal_path_b_tt: "Chose Mandate of the Gbara"
 nd_mal_destiny: "The Destiny of Manden"
 nd_mal_destiny_desc: "The restored empire stands ready to forge its path. Whether through gold or iron, the Mansa's will shall shape the future of the Sahel."
 nd_mal_dest_crossroads: "Crossroads of the Sahara"
 nd_mal_dest_crossroads_desc: "Secure the great trade cities of Timbuktu and Djenne, the twin jewels of the Niger Bend where caravans from the desert meet river merchants from the south."
 nd_mal_dest_salt_gold: "Salt and Gold"
 nd_mal_dest_salt_gold_desc: "Extend our control to the salt mines of Taghaza and establish banking institutions to manage the immense wealth flowing through our markets."
 nd_mal_dest_empire_gold: "Empire of Gold"
 nd_mal_dest_empire_gold_desc: "Complete the golden chain from Sijilmasa in the north to the gold fields of the south. Let the wealth of Manden be spoken of from Marrakech to Cairo."
 nd_mal_dest_march_gao: "March on Gao"
 nd_mal_dest_march_gao_desc: "The Songhai city of Gao has long rivaled Manden power on the Niger. Bring it under the Mansa's authority and secure the eastern frontier."
 nd_mal_dest_hausa_campaigns: "The Hausa Campaigns"
 nd_mal_dest_hausa_campaigns_desc: "The wealthy city-states of Hausaland — Kano and Katsina — control the trade routes east to Bornu and beyond. Conquer them to extend Manden hegemony across the entire Sahel."
 nd_mal_dest_gold_coast: "Lord of the Gold Coast"
 nd_mal_dest_gold_coast_desc: "The Akan goldfields around Kumasi and Bono Manso are the source of the gold that made Mali legendary. Seize these lands and control the wealth at its very source."
 nd_mal.6.t: "The Destiny of Manden"
 nd_mal.6.d: "The empire is restored, but our work has only begun. The Gbara convenes to declare the Mansa's vision for the future of Manden. The path we choose now will echo through the ages."
 nd_mal.6.a: "Let the Mansa's will be done."
 nd_mal.7.t: "Crossroads of the Sahara"
 nd_mal.7.d: "Timbuktu and Djenne are ours. The Niger Bend — that great crescent where the river turns south through the desert's edge — now lies entirely under Manden control. Caravans arriving from the north find Manden tax collectors waiting at every gate, and the scholars of Sankore bow to a Manden patron."
 nd_mal.7.a: "The river bend answers to the Mansa alone."
 nd_mal.8.t: "Masters of Salt and Gold"
 nd_mal.8.d: "The salt mines of Taghaza are ours, completing our grip on the two commodities that drive the trans-Saharan trade. Salt from the north, gold from the south — both now pass through Manden hands. Our bankers have adopted the methods of the great trading houses, and the Mansa's treasury overflows.\n\nShall we invest this wealth in monopolizing the salt trade itself, or in patronizing the scholars and institutions that make Timbuktu the intellectual capital of Africa?"
 nd_mal.8.a: "Monopolize the salt trade."
 nd_mal.8.b: "Patronize the scholars of Timbuktu."
 nd_mal.9.t: "Empire of Gold"
 nd_mal.9.d: "From Sijilmasa in the Maghreb to the gold fields of the south, the entire golden chain lies under Manden control. No empire in Africa — perhaps none in the world — commands such wealth. The name of the Mansa is spoken with awe in the courts of Europe, the palaces of Cairo, and the bazaars of Baghdad.\n\nWill we leverage this golden empire to dominate through diplomacy and annexation, or invest in building a lasting cultural legacy that will define West Africa for centuries?"
 nd_mal.9.a: "Let gold speak in every court."
 nd_mal.9.b: "Build a legacy that outlasts gold."
 nd_mal.10.t: "March on Gao"
 nd_mal.10.d: "The Songhai capital of Gao has fallen to Manden arms. For generations, the Songhai competed with Mali for dominance of the Niger, raiding our eastern provinces and defying the Mansa's authority. That era is over. The eastern frontier is secured, and the road to further conquest lies open."
 nd_mal.10.a: "Gao bows to the Lion King's heirs."
 nd_mal.11.t: "The Hausa Campaigns"
 nd_mal.11.d: "Our armies have swept through Hausaland, bringing the great city-states of Kano and Katsina under the Mansa's banner. These ancient trading centers, with their connections to Bornu, Egypt, and the distant east, now pay tribute to Manden.\n\nShall we use this momentum to reform our cavalry and press further conquests, or extract systematic tribute to fund a professional standing army?"
 nd_mal.11.a: "Reform the cavalry for further campaigns."
 nd_mal.11.b: "Extract tribute and build a standing army."
 nd_mal.12.t: "Lord of the Gold Coast"
 nd_mal.12.d: "Kumasi and the Akan goldfields are ours. We have achieved what no Mansa before us dared — controlling not merely the trade in gold, but the mines themselves. The empire of Sundiata has been surpassed. From the salt flats of the Sahara to the forests of the Gold Coast, the Mansa's writ runs unchallenged.\n\nShall we use this unrivaled power for further military dominion, or consolidate our vast conquests into a lasting Pax Mandinka?"
 nd_mal.12.a: "The sword of Sundiata knows no rest."
 nd_mal.12.b: "Forge a lasting peace across our domains."
 STATIC_MODIFIER_NAME_nd_mal_dest_salt_monopoly: "Salt Monopoly of the Mansa"
 STATIC_MODIFIER_DESC_nd_mal_dest_salt_monopoly: "The Mansa controls the salt trade from mine to market, setting prices that enrich the treasury and fund the empire's ambitions."
 STATIC_MODIFIER_NAME_nd_mal_dest_timbuktu_patronage: "Patronage of Timbuktu"
 STATIC_MODIFIER_DESC_nd_mal_dest_timbuktu_patronage: "The Mansa's generous patronage of Timbuktu's scholars and madrasas has made the city a beacon of learning that draws the finest minds from across the Islamic world."
 STATIC_MODIFIER_NAME_nd_mal_dest_gold_emperor: "The Gold Emperor"
 STATIC_MODIFIER_DESC_nd_mal_dest_gold_emperor: "The Mansa's wealth and diplomatic reach are without parallel. Gold buys allies, vassals, and influence across the known world."
 STATIC_MODIFIER_NAME_nd_mal_dest_mansa_legacy: "Legacy of the Mansa"
 STATIC_MODIFIER_DESC_nd_mal_dest_mansa_legacy: "The Mansa has chosen to invest in a legacy beyond conquest — a civilization of learning, art, and culture that will define West Africa for centuries."
 STATIC_MODIFIER_NAME_nd_mal_dest_savanna_riders: "Savanna Riders"
 STATIC_MODIFIER_DESC_nd_mal_dest_savanna_riders: "The reformed Manden cavalry sweeps across the open savanna with devastating speed, recruiting and training warriors from conquered lands."
 STATIC_MODIFIER_NAME_nd_mal_dest_hausa_tribute: "Tribute of Hausaland"
 STATIC_MODIFIER_DESC_nd_mal_dest_hausa_tribute: "The systematic extraction of tribute from the wealthy Hausa city-states funds a professional army and provides mercenary allies."
 STATIC_MODIFIER_NAME_nd_mal_dest_sword_of_sundiata: "Sword of Sundiata"
 STATIC_MODIFIER_DESC_nd_mal_dest_sword_of_sundiata: "The military might of the Mansa is absolute. No fortress can withstand the combined arms of Manden infantry, cavalry, and siege warfare."
 STATIC_MODIFIER_NAME_nd_mal_dest_pax_mandinka: "Pax Mandinka"
 STATIC_MODIFIER_DESC_nd_mal_dest_pax_mandinka: "The Mansa's peace stretches across the Sahel and beyond. War-weary lands recover under stable Manden governance, and disease and devastation recede."
 nd_mal_house_of_gold: "House of Gold"
 nd_mal_house_of_gold_desc: "A grand treasury and trade palace where the wealth of the trans-Saharan trade is weighed, stored, and redistributed. The finest merchants and bankers in West Africa conduct their business beneath its golden domes."
 nd_mal_sundiata_hall: "Sundiata's Hall"
 nd_mal_sundiata_hall_desc: "A fortified palace-fortress honoring the empire's founder, where the Mansa holds court with his war chiefs and the greatest warriors of the empire are honored."
 nd_mal_house_of_gold_upkeep: "Treasury Operations"
 nd_mal_house_of_gold_upkeep_desc: "Gold for the treasury reserves, jewels for the diplomatic gifts, paper for the ledgers of trade, and fine cloth for the dignitaries who conduct business within."
 nd_mal_sundiata_hall_upkeep: "Hall Garrison"
 nd_mal_sundiata_hall_upkeep_desc: "Weapons and armor for the elite guard, stone for the fortress walls, leather for military equipment, and horses for the cavalry stationed within."
