l_english:
 STATIC_MODIFIER_NAME_nd_looms_of_sonargaon: "Looms of Sonargaon"
 STATIC_MODIFIER_DESC_nd_looms_of_sonargaon: "The finest cotton cloth in the world flows from Bengal's looms. Muslin so sheer it was called 'woven air' commands the markets of Asia and beyond, making Bengal the richest trading land in the subcontinent."
 STATIC_MODIFIER_NAME_nd_sword_of_the_ganges: "Sword of the Ganges"
 STATIC_MODIFIER_DESC_nd_sword_of_the_ganges: "Bengal's vast population, riverine geography, and war elephant tradition make it a formidable military power. The rivers serve as highways for armies, and the delta's bounty sustains campaigns that lesser realms could never mount."
 nd_bng.1.t: "The Rise of Bengal"
 nd_bng.1.d: "The Bengal Sultanate has united the fertile Ganges delta under a single banner. From the great ports of Chittagong and Satgaon to the legendary weaving centers of Sonargaon and Dhaka, this land commands wealth that draws the envy of empires. Chinese admirals call it 'the richest country to trade with,' and Moroccan travelers marvel at its cloth. Now, at the moment of formation, a choice presents itself: shall Bengal pour its energies into the textile trade that makes it wealthy, or forge its armies and fleets into instruments of territorial expansion?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_bng.1.a: "Let the looms weave our destiny."
 nd_bng.1.b: "Our rivers shall carry armies, not just merchants."
 nd_bng.2.t: "The Golden Age of the Hussain Shahis"
 nd_bng.2.d: "Under the Hussain Shahi dynasty, Bengal enters its golden age. From the magnificent capital at Gaur, the sultanate's territories stretch from Arakan to Orissa, from Assam to Tripura. Hindus and Muslims serve together in the royal administration, poets compose in Bengali alongside Persian, and the architectural masterpieces of Gaur-Lakhnauti rise in distinctive brick and terracotta. This is a moment of extraordinary cultural flourishing — but also of military ambition. The Hussain Shahis have expanded Bengal's borders further than any previous dynasty. How shall this golden age be directed?"
 nd_bng.2.a: "Patronize the arts and scholars of Bengal."
 nd_bng.2.b: "Press our advantage and expand our borders."
 nd_bng.3.t: "The Revenue Reforms of Murshid Quli Khan"
 nd_bng.3.d: "Murshid Quli Khan, the first independent Nawab of Bengal, has transformed the province's administration. Moving the capital from Dhaka to the newly founded city of Murshidabad, he implements sweeping revenue reforms that systematize tax collection across Bengal, Bihar, and Orissa. His mal zamini system assigns fixed revenue assessments to landholders, replacing the chaotic farming of taxes with an orderly bureaucracy. Bengal's treasury overflows — the province now contributes more than half of all Mughal imperial revenue. But this centralization comes at a cost to merchant autonomy. Shall the state tighten its grip on revenue, or allow the trading classes greater freedom?"
 nd_bng.3.a: "Centralize revenue under the Nawab's authority."
 nd_bng.3.b: "Give the merchants freedom to grow our wealth."
 nd_bng.4.t: "The Bengali Renaissance"
 nd_bng.4.d: "A great intellectual awakening stirs in Bengal. Scholars, poets, and reformers are reimagining Bengali identity through literature, philosophy, and social criticism. The Bengali language itself becomes a vehicle for modernizing thought, as writers challenge old orthodoxies and envision a reformed society. Universities and printing presses multiply, literacy spreads beyond the traditional elite, and new ideas about governance and individual rights take root in the fertile soil of Bengal's intellectual tradition. This renaissance can follow two paths: a literary revolution that transforms hearts and minds, or a practical reform movement that reshapes institutions."
 nd_bng.4.a: "Let the written word illuminate Bengal."
 nd_bng.4.b: "Reform our institutions for a new age."
 STATIC_MODIFIER_NAME_nd_bng_golden_age_patronage: "Golden Age Patronage"
 STATIC_MODIFIER_DESC_nd_bng_golden_age_patronage: "The Hussain Shahi court is a beacon of culture and learning, attracting poets, architects, and scholars from across the subcontinent."
 STATIC_MODIFIER_NAME_nd_bng_golden_age_expansion: "Golden Age Expansion"
 STATIC_MODIFIER_DESC_nd_bng_golden_age_expansion: "The Hussain Shahi armies have pushed Bengal's borders to their greatest extent, establishing dominion over Arakan, Orissa, and beyond."
 STATIC_MODIFIER_NAME_nd_bng_revenue_centralization: "Revenue Centralization"
 STATIC_MODIFIER_DESC_nd_bng_revenue_centralization: "Murshid Quli Khan's mal zamini system has transformed Bengal into the most efficiently taxed province in the subcontinent."
 STATIC_MODIFIER_NAME_nd_bng_merchant_freedom: "Merchant Freedom"
 STATIC_MODIFIER_DESC_nd_bng_merchant_freedom: "Bengal's merchants operate with unprecedented autonomy, their trading networks spanning the Bay of Bengal and beyond."
 STATIC_MODIFIER_NAME_nd_bng_literary_awakening: "Literary Awakening"
 STATIC_MODIFIER_DESC_nd_bng_literary_awakening: "The Bengali Renaissance has sparked an explosion of literature, scholarship, and new ideas that is transforming the intellectual landscape."
 STATIC_MODIFIER_NAME_nd_bng_reform_movement: "Reform Movement"
 STATIC_MODIFIER_DESC_nd_bng_reform_movement: "Bengali reformers are modernizing the province's institutions, creating a more efficient and responsive administration."
 nd_bng_delta_agriculture: "Delta Agriculture"
 nd_bng_delta_agriculture_desc: "The art of managing the Ganges delta's annual floods — building earthen bunds, directing water through canals, and timing rice planting to the monsoon cycle — sustains one of the most densely populated regions on earth."
 nd_bng_sultanate_divan: "Sultanate Divan"
 nd_bng_sultanate_divan_desc: "The Bengal Sultanate's administrative council, the Divan, blends Central Asian governance traditions with local Bengali practices, creating a multicultural bureaucracy where Hindus and Muslims serve side by side."
 nd_bng_muslin_tradition: "Muslin Tradition"
 nd_bng_muslin_tradition_desc: "Bengali weavers produce muslin so fine that travelers call it 'woven air.' The cloth of Sonargaon and Dhaka is prized from China to the Mediterranean, and the techniques are passed down through generations of master craftsmen."
 nd_bng_river_flotilla: "River Flotilla"
 nd_bng_river_flotilla_desc: "In riverine Bengal, control of the waterways is control of the country. Shallow-draft galleys patrol the thousands of channels that crisscross the delta, providing both military security and commercial regulation."
 nd_bng_iwaz_naval_legacy: "Iwaz Khalji's Naval Legacy"
 nd_bng_iwaz_naval_legacy_desc: "Iwaz Khalji first organized a naval force in Islamic Bengal, recognizing that the river navy was of prime necessity in a land where waterways outnumber roads. His legacy shapes Bengal's military doctrine for centuries."
 nd_bng_sonargaon_arong: "Sonargaon Arong"
 nd_bng_sonargaon_arong_desc: "The arong — a marketplace where muslin is produced and sold — reaches its peak at Panam Nagar in Sonargaon. Here merchants from across Asia gather to bid on the finest cloth in the world."
 nd_bng_hussain_shahi_court: "Hussain Shahi Court"
 nd_bng_hussain_shahi_court_desc: "The Hussain Shahi dynasty presides over Bengal's golden age from the capital at Gaur. Under their patronage, Bengali literature, architecture, and administration reach unprecedented heights."
 nd_bng_war_boat_tradition: "War Boat Tradition"
 nd_bng_war_boat_tradition_desc: "Bengal's war boatmen — paik-backed infantry who fight from river craft — are the backbone of the monsoon-season military. Where cavalry fails in flooded terrain, these riverine warriors prevail."
 nd_bng_adina_congregation: "Adina Congregation"
 nd_bng_adina_congregation_desc: "The grand congregational mosques of Bengal, built in the distinctive local brick-and-terracotta tradition, serve as centers of both religious devotion and community life. The Adina Mosque at Pandua, modeled after the great mosques of Damascus and Ctesiphon, stands as the largest in the subcontinent."
 nd_bng_bengali_coinage: "Bengali Coinage"
 nd_bng_bengali_coinage_desc: "The Bengal Sultanate mints its own silver tankas, establishing financial independence from Delhi. This independent monetary system facilitates trade and attracts merchants to Bengal's markets."
 nd_bng_chittagong_customs: "Chittagong Customs"
 nd_bng_chittagong_customs_desc: "Chittagong, Bengal's premier seaport, handles the majority of overseas exports — fine muslins, indigo, rice, and spices flow outward while horses, bullion, and luxury goods pour in from across the Indian Ocean."
 nd_bng_muslin_export: "Muslin Export"
 nd_bng_muslin_export_desc: "Bengal's muslin trade reaches global proportions. Annual fleets of five or six ships carry textiles worth eighty to ninety thousand cruzados to Malacca alone, while European trading companies compete fiercely for access to Bengal's cloth."
 nd_bng_river_patrol: "River Patrol"
 nd_bng_river_patrol_desc: "Fast patrol boats protect Bengal's vast river trade network from piracy and smuggling, ensuring that the wealth flowing through the delta's channels reaches the Nawab's treasury."
 nd_bng_nawab_governance: "Nawab Governance"
 nd_bng_nawab_governance_desc: "Bengal's Nawabs evolve a distinctive provincial administration that balances central authority with local autonomy, managing one of the most populous and productive regions in the world."
 nd_bng_bay_of_bengal_trade: "Bay of Bengal Trade"
 nd_bng_bay_of_bengal_trade_desc: "Bengal's maritime trade networks span the Bay of Bengal, connecting Chittagong and Satgaon to Burma, Malacca, the Maldives, Sri Lanka, and the ports of Southwest Asia and East Africa."
 nd_bng_murshidabad_silk: "Murshidabad Silk"
 nd_bng_murshidabad_silk_desc: "Murshidabad's silk weavers produce golden brocades and kincabs that are prized across the Mughal world. The city's looms turn raw silk into fabric fit for emperors, establishing Bengal as a center of luxury textile production."
 nd_bng_revenue_reforms: "Revenue Reforms"
 nd_bng_revenue_reforms_desc: "Systematic revenue assessment and collection transforms Bengal from a province prone to fiscal chaos into the financial backbone of the Mughal Empire, contributing more than half of all imperial revenue."
 nd_bng_arsenal_tradition: "Arsenal Tradition"
 nd_bng_arsenal_tradition_desc: "Bengal's arsenals manufacture gunpowder, saltpetre, and weaponry on an industrial scale. The province is one of the world's largest producers of saltpetre, a critical ingredient in gunpowder."
 nd_bng_matchlock_infantry: "Matchlock Infantry"
 nd_bng_matchlock_infantry_desc: "Bengali banduqchi — matchlock musketeers — combine the firearm traditions introduced from Central Asia with local military organization. They provide disciplined firepower in Bengal's increasingly gunpowder-dominated armies."
 nd_bng_diplomatic_balance: "Diplomatic Balance"
 nd_bng_diplomatic_balance_desc: "Bengal's geographic position and economic importance demand a sophisticated approach to diplomacy, balancing the ambitions of Mughal emperors, Arakanese kings, and European trading companies."
 nd_bng_nawab_treasury: "Nawab Treasury"
 nd_bng_nawab_treasury_desc: "The sarraf kothhi — banking houses — of Bengal manage the flow of revenue from the richest province in the Mughal Empire. Bengali bankers extend credit across the subcontinent, financing trade and government alike."
 nd_bng_cotton_processing: "Cotton Processing"
 nd_bng_cotton_processing_desc: "Advances in cotton ginning and preparation improve the quality and quantity of raw material available to Bengal's legendary weavers, sustaining the textile industry that is the foundation of the province's wealth."
 nd_bng_sepoy_corps: "Sepoy Corps"
 nd_bng_sepoy_corps_desc: "The Nawab's sepoy regiments represent the professionalization of Bengal's military. Trained in European drill and armed with modern muskets, these disciplined infantry are a formidable force — as both the Nawab's rivals and the East India Company discover."
 nd_bng_delta_hydraulics: "Delta Hydraulics"
 nd_bng_delta_hydraulics_desc: "Centuries of experience managing the Ganges delta's complex hydrology culminate in sophisticated water management systems that support dense settlement, intensive rice cultivation, and commercial navigation."
 nd_bng_jute_industry: "Jute Industry"
 nd_bng_jute_industry_desc: "Bengal becomes the world center of jute production and processing. The strong, flexible fiber — used for rope, sacking, and coarse textiles — becomes one of Bengal's most important export commodities in the industrial era."
 nd_bng_bengali_renaissance: "Bengali Renaissance"
 nd_bng_bengali_renaissance_desc: "An intellectual revolution transforms Bengali society. Writers, poets, and reformers create a new Bengali literature, establish modern educational institutions, and challenge social conventions, laying the groundwork for a modern national identity."
 nd_bng_indigo_plantations: "Indigo Plantations"
 nd_bng_indigo_plantations_desc: "Bengal's lowlands prove ideal for growing indigo, and the province becomes a major supplier of the prized blue dye to European textile manufacturers. Indigo vats dot the countryside, processing the plant into concentrated dye cakes for export."
 n_nd_bng_river_galley: "Bengali River Galley"
 n_nd_bng_river_galley_desc: "A shallow-draft oared vessel designed for the narrow, winding channels of the Ganges delta. Fast and maneuverable, these galleys patrol the waterways that serve as Bengal's highways."
 a_nd_bng_war_boatman: "War Boatman"
 a_nd_bng_war_boatman_desc: "Riverine infantry who fight from boats and on muddy shorelines. During the monsoon season when cavalry is useless, these paik-backed warriors are Bengal's primary fighting force."
 n_nd_bng_patrol_boat: "Bengal Patrol Boat"
 n_nd_bng_patrol_boat_desc: "A swift vessel designed to protect Bengal's river and coastal trade routes from pirates and smugglers. Lighter and faster than standard warships, patrol boats are the workhorses of Bengal's commercial security."
 a_nd_bng_banduqchi: "Banduqchi"
 a_nd_bng_banduqchi_desc: "Bengali matchlock musketeers who form the gunpowder infantry of the Sultanate and later the Nawab's armies. Their disciplined volley fire is devastating in the open terrain of the Bengal plains."
 a_nd_bng_banduqchi_levy: "Banduqchi Militia"
 a_nd_bng_banduqchi_levy_desc: "Levy musketeers drawn from Bengal's soldier and peasant communities, armed with matchlocks and trained in basic volley tactics."
 a_nd_bng_sepoy: "Bengali Sepoy"
 a_nd_bng_sepoy_desc: "Professional musket infantry of the Nawab era, trained in European drill and equipped with flintlock muskets. The Bengali sepoy combines subcontinental martial tradition with modern military discipline."
 nd_bng_delta_bund: "Delta Bund"
 nd_bng_delta_bund_desc: "Earthen embankments and flood control systems that protect Bengal's rice paddies from the annual monsoon floods. These bunds channel floodwaters into irrigation canals, turning a destructive force into agricultural abundance."
 nd_bng_muslin_workshop: "Muslin Workshop"
 nd_bng_muslin_workshop_desc: "A specialized weaving shed where Bengali craftsmen produce the world's finest cotton cloth. The muslin of Dhaka and Sonargaon is so sheer that bolts of it can pass through a finger ring."
 nd_bng_arong: "Arong"
 nd_bng_arong_desc: "A Bengali textile marketplace where muslin and other fine cloth is traded. The greatest arong at Panam Nagar in Sonargaon draws merchants from across Asia, making it one of the subcontinent's premier commercial centers."
 nd_bng_jami_mosque: "Jami Mosque"
 nd_bng_jami_mosque_desc: "A grand congregational mosque built in Bengal's distinctive brick-and-terracotta tradition, with curved chala roofs and intricate floral carvings that blend Islamic architecture with indigenous Bengali forms."
 nd_bng_customs_house: "Customs House"
 nd_bng_customs_house_desc: "A port revenue office that regulates Bengal's overseas trade. Customs officers assess duties on incoming and outgoing cargoes, channeling the wealth of the Bay of Bengal trade into the state treasury."
 nd_bng_arsenal: "Arsenal"
 nd_bng_arsenal_desc: "A weapons manufactory and military depot producing firearms, gunpowder, and ammunition. Bengal is one of the world's largest producers of saltpetre, the critical ingredient in gunpowder."
 nd_bng_sarraf_kothhi: "Sarraf Kothhi"
 nd_bng_sarraf_kothhi_desc: "A Nawab-era banking house where Bengali financiers manage credit, exchange currencies, and finance long-distance trade. These institutions make Bengal a financial center rivaling any in the Mughal Empire."
 nd_bng_indigo_vat: "Indigo Vat"
 nd_bng_indigo_vat_desc: "A processing facility where indigo plants are soaked, fermented, and pressed into concentrated dye cakes for export. Bengal's indigo supplies the textile industries of Europe."
 nd_bng_bund_maintenance: "Bund Maintenance"
 nd_bng_bund_maintenance_desc: "Upkeep of earthen embankments and irrigation channels in the flood-prone Ganges delta."
 nd_bng_muslin_workshop_maintenance: "Muslin Production"
 nd_bng_muslin_workshop_maintenance_desc: "Bengali weavers spin raw cotton with dyes into fine muslin cloth."
 nd_bng_arong_maintenance: "Arong Upkeep"
 nd_bng_arong_maintenance_desc: "Goods and materials consumed in maintaining the textile marketplace."
 nd_bng_mosque_maintenance: "Mosque Upkeep"
 nd_bng_mosque_maintenance_desc: "Stone and ceramic materials for maintaining the grand congregational mosque."
 nd_bng_customs_maintenance: "Customs House Upkeep"
 nd_bng_customs_maintenance_desc: "Administrative materials for port revenue collection."
 nd_bng_arsenal_maintenance: "Arsenal Upkeep"
 nd_bng_arsenal_maintenance_desc: "Weapons and firearms consumed in maintaining the military depot."
 nd_bng_sarraf_maintenance: "Banking House Upkeep"
 nd_bng_sarraf_maintenance_desc: "Administrative materials for the banking and credit operations."
 nd_bng_indigo_maintenance: "Indigo Processing"
 nd_bng_indigo_maintenance_desc: "Indigo plants are soaked, fermented, and pressed into concentrated dye cakes for export."
 nd_bng_muslin_weaving: "Muslin Weaving"
 nd_bng_muslin_weaving_desc: "The traditional Bengali technique of weaving cotton into extraordinarily fine muslin cloth, using specialized looms and generations of accumulated skill."
 nd_bng_muslin_export_pm: "Muslin Export Trade"
 nd_bng_muslin_export_pm_desc: "The packaging and overseas marketing of Bengal's celebrated muslin cloth to markets across Asia and Europe."
 nd_bng_silk_weaving: "Murshidabad Silk Weaving"
 nd_bng_silk_weaving_desc: "The production of golden brocades, kincabs, and fine silk textiles in the workshops of Murshidabad."
 nd_bng_cotton_ginning: "Cotton Ginning"
 nd_bng_cotton_ginning_desc: "Mechanical separation of cotton fibers from seeds, improving the quality and quantity of raw material for Bengal's weavers."
 nd_bng_jute_processing: "Jute Processing"
 nd_bng_jute_processing_desc: "Extraction and preparation of raw jute fibers for rope, sacking, and coarse textile production."
 levy_nd_bng_war_boatman: "War Boatman Levy"
 levy_nd_bng_war_boatman_desc: "Riverine infantry militia drawn from Bengal's delta communities, skilled in fighting from boats and on waterlogged terrain."
 levy_nd_bng_banduqchi: "Banduqchi Levy"
 levy_nd_bng_banduqchi_desc: "Matchlock musketeer militia raised from Bengal's soldier and peasant populations."
 nd_bng_formed_tt: "Bengal has been formed"
 nd_bng_path_a_tt: "Chose Looms of Sonargaon"
 nd_bng_path_b_tt: "Chose Sword of the Ganges"
 nd_bng_destiny: "Destiny of Bengal"
 nd_bng_destiny_desc: "Bengal stands at the crossroads of its future. With formation complete, the nation must now decide the shape of its greatness — whether through the wealth of its legendary looms or the strength of its river-borne armies."
 nd_bng_dest_textile_hub: "Textile Hub of the East"
 nd_bng_dest_textile_hub_desc: "Extend Bengal's textile dominance by seizing control of Masulipatnam on the Coromandel Coast and ensuring silk flows through the capital market. This establishes Bengal as the center of cloth production across the Indian Ocean."
 nd_bng_dest_bay_network: "Bay of Bengal Network"
 nd_bng_dest_bay_network_desc: "Project Bengali commercial power across the Bay of Bengal by securing Malacca and Martaban. These distant ports connect Bengal's textile exports to the spice trade of Southeast Asia and the overland routes of mainland Burma."
 nd_bng_dest_woven_air: "Woven Air"
 nd_bng_dest_woven_air_desc: "Bengal's muslin — so fine it was called 'woven air' — becomes the foundation of a global textile monopoly. Secure the Malabar coast, dominate cotton and silk markets, and establish Bengal as the world's premier cloth exporter."
 nd_bng_dest_bihar_conquest: "Conquest of Bihar"
 nd_bng_dest_bihar_conquest_desc: "Secure Bengal's western flank by conquering Bihar, the heartland of the Ganges plain. Patna and Darbhanga command the great river's middle reaches and provide the strategic depth Bengal needs to project power westward."
 nd_bng_dest_ganges_campaign: "Campaign of the Ganges"
 nd_bng_dest_ganges_campaign_desc: "Push the boundaries of Bengali power south into Orissa at Cuttack and west along the Ganges to the sacred city of Varanasi. This establishes Bengal as the dominant power of eastern India."
 nd_bng_dest_ganges_empire: "Empire of the Ganges"
 nd_bng_dest_ganges_empire_desc: "The ultimate expression of Bengali military power: an empire stretching from the delta to the Mughal heartland. Take Agra, Lucknow, and the sacred temple of Puri. Bengal rules the Ganges from source to sea."
 nd_bng.5.t: "The Destiny of Bengal"
 nd_bng.5.d: "Bengal has risen. What was once a collection of river principalities and sultanate provinces is now a unified power commanding the richest delta in the world. The monsoon winds carry trade from a hundred ports; the rivers nourish fields that feed millions. Now the question is not whether Bengal will be great, but how. Will its greatness be measured in bolts of cloth or lengths of steel?"
 nd_bng.5.a: "Our destiny awaits."
 nd_bng.6.t: "The Textile Hub of the East"
 nd_bng.6.d: "Bengal's looms now set the price of cloth from the Coromandel to the Straits. With Masulipatnam secured, the textile trade of the entire eastern coast flows through Bengali hands. Merchants from China, Persia, and the Mediterranean compete for access to our cotton and silk. The arongs of Sonargaon and the workshops of Dhaka hum with activity day and night."
 nd_bng.6.a: "The world clothes itself in our fabric."
 nd_bng.7.t: "Masters of the Bay"
 nd_bng.7.d: "From Martaban to Malacca, Bengali merchantmen and warships now command the sea lanes of the Bay of Bengal. Our textiles are exchanged for Moluccan spices at Malacca, while Burmese teak and rubies flow through Martaban into Bengali markets. This is the greatest maritime commercial network since the days of Srivijaya. But the question remains: shall we enforce our dominance through naval power, projecting force across the ocean — or channel this wealth into building a trading civilization without peer?"
 nd_bng.7.a: "Command the seas with Bengali warships."
 nd_bng.7.b: "Build the greatest emporium the world has seen."
 nd_bng.8.t: "Woven Air"
 nd_bng.8.d: "They call it 'woven air' — muslin so fine a bolt can pass through a ring. Bengal's cloth monopoly is now unassailable. From the Malabar ports to the markets of the Levant, no textile competes with ours. European merchants call Dhaka 'the Manchester of the East,' though we were first by centuries. This is the apex of the weaver's art, and the foundation of an empire built not on conquest but on craft. Shall we press our advantage through exclusive control of the cotton supply, or open our ports to all comers and grow rich on volume?"
 nd_bng.8.a: "Control the supply of cloth to the world."
 nd_bng.8.b: "Let our ports become the crossroads of trade."
 nd_bng.9.t: "The Conquest of Bihar"
 nd_bng.9.d: "Bengali armies have swept across the Ganges plain and planted their banners in Patna and Darbhanga. Bihar — the land of the ancient Magadha kingdom, the cradle of Buddhism — now answers to Bengal. With these conquests, the sultanate secures the strategic middle Ganges and gains access to Bihar's rich agricultural hinterland. The road westward lies open."
 nd_bng.9.a: "Bihar is ours. The Ganges awaits."
 nd_bng.10.t: "Campaign of the Ganges"
 nd_bng.10.d: "The campaign has been a triumph. Cuttack, capital of the Gajapati kings, has fallen — bringing all of Orissa under Bengali suzerainty. To the west, the sacred ghats of Varanasi now fly Bengali colors. From Orissa's Jagannath temple to the burning grounds of Kashi, Bengal's power extends across the breadth of eastern India. But the army is far from home. How shall we consolidate these vast new territories — through military logistics that sustain our campaign forces, or through the administrative order that turns occupation into governance?"
 nd_bng.10.a: "Ensure our supply lines hold for the next push."
 nd_bng.10.b: "Establish order in the conquered provinces."
 nd_bng.11.t: "Empire of the Ganges"
 nd_bng.11.d: "It is done. The Mughal capitals at Agra and Lucknow answer to Bengal. The temple of Lord Jagannath at Puri is under our protection. From the Hooghly to the Yamuna, from Orissa to Awadh, the Ganges and all its tributaries flow through Bengali territory. This is an empire to rival any in Indian history — built from the delta outward, defying every expectation that Bengal would remain a provincial backwater. Shall this empire rest on the might of its levies and the terror of its armies, or on the calculated application of force that secures victory before battle begins?"
 nd_bng.11.a: "Raise the greatest armies the subcontinent has seen."
 nd_bng.11.b: "Victory belongs to those who prepare."
 STATIC_MODIFIER_NAME_nd_bng_dest_maritime_dominion: "Maritime Dominion"
 STATIC_MODIFIER_DESC_nd_bng_dest_maritime_dominion: "Bengali warships enforce commercial supremacy across the Bay of Bengal, building a naval tradition that extends the reach of Bengal's merchantmen to ever more distant shores."
 STATIC_MODIFIER_NAME_nd_bng_dest_entrepot_wealth: "Entrepot Wealth"
 STATIC_MODIFIER_DESC_nd_bng_dest_entrepot_wealth: "Bengal's ports serve as the central hub of Indian Ocean commerce. The prestige of our trading houses endures, and war-torn provinces recover quickly under the umbrella of Bengali trade."
 STATIC_MODIFIER_NAME_nd_bng_dest_cloth_monopoly: "Cloth Monopoly"
 STATIC_MODIFIER_DESC_nd_bng_dest_cloth_monopoly: "Bengal's unassailable dominance of the global textile trade assimilates diverse populations into a unified Bengali identity, lending the dynasty lasting legitimacy and the loyalty of subject peoples."
 STATIC_MODIFIER_NAME_nd_bng_dest_ocean_emporium: "Ocean Emporium"
 STATIC_MODIFIER_DESC_nd_bng_dest_ocean_emporium: "Bengal's open-port policy transforms its cities into the greatest trading centers in Asia, earning diplomatic leverage and intelligence networks, though the focus on commerce comes at some cost to military readiness."
 STATIC_MODIFIER_NAME_nd_bng_dest_river_supremacy: "River Supremacy"
 STATIC_MODIFIER_DESC_nd_bng_dest_river_supremacy: "Bengal's mastery of riverine logistics allows armies to reinforce and campaign far along the Ganges, fielding larger forces than the enemy expects."
 STATIC_MODIFIER_NAME_nd_bng_dest_occupation_order: "Occupation Order"
 STATIC_MODIFIER_DESC_nd_bng_dest_occupation_order: "Efficient administration of conquered territories transforms military occupation into lasting governance, with mercenary garrisons enforcing order while cheaper war declarations push the frontier ever outward."
 STATIC_MODIFIER_NAME_nd_bng_dest_imperial_authority: "Imperial Authority"
 STATIC_MODIFIER_DESC_nd_bng_dest_imperial_authority: "Bengal's imperial cavalry and fortified garrisons project power across the conquered Gangetic plain, though maintaining this vast military apparatus strains the treasury."
 STATIC_MODIFIER_NAME_nd_bng_dest_conquerors_legacy: "Conqueror's Legacy"
 STATIC_MODIFIER_DESC_nd_bng_dest_conquerors_legacy: "Bengal's armies loot the wealth of conquered lands, recruit seasoned regiments at speed, and deploy devastating artillery -- the enduring legacy of a realm forged through conquest."
 nd_bng_golden_muslin_house: "Golden Muslin House"
 nd_bng_golden_muslin_house_desc: "The pinnacle of Bengal's textile industry — a palatial workshop and trading hall where the finest muslin and silk are produced, displayed, and sold to merchants from across the known world."
 nd_bng_golden_muslin_maintenance: "Golden Muslin Production"
 nd_bng_golden_muslin_maintenance_desc: "Premium cotton, silk, and dyes consumed in producing the world's finest textiles."
 nd_bng_victory_pillar: "Victory Pillar"
 nd_bng_victory_pillar_desc: "A monumental stone column commemorating Bengal's conquests along the Ganges, serving as both a garrison strongpoint and a symbol of martial prowess that inspires troops and overawes the conquered."
 nd_bng_victory_pillar_maintenance: "Victory Pillar Upkeep"
 nd_bng_victory_pillar_maintenance_desc: "Stone, weaponry, and cloth for maintaining the military monument and its garrison."
