l_english:
 STATIC_MODIFIER_NAME_nd_swi_armed_neutrality: "Armed Neutrality"
 STATIC_MODIFIER_DESC_nd_swi_armed_neutrality: "The Swiss Confederation has chosen the path of armed neutrality — a nation that fights no foreign wars but makes itself impregnable at home. Behind mountain walls and cantonal militias, the Eidgenossen forge a republic that answers to no emperor, king, or pope."
 STATIC_MODIFIER_NAME_nd_swi_reislaufer_tradition: "Reisläufer Tradition"
 STATIC_MODIFIER_DESC_nd_swi_reislaufer_tradition: "The cantons have embraced their martial reputation, sending their sons to fight in the service of Europe's kings. Swiss mercenaries are the most feared infantry on the continent, and the pension gold flowing back to the alpine valleys enriches a nation of warriors."
 STATIC_MODIFIER_NAME_nd_swi_perpetual_peace: "Perpetual Peace"
 STATIC_MODIFIER_DESC_nd_swi_perpetual_peace: "After decades of bloodshed in Italy's wars, the Swiss have concluded a lasting peace that reshapes their place in Europe — no longer aggressors, but respected neutrals whose word carries weight precisely because they no longer draw their swords."
 STATIC_MODIFIER_NAME_nd_swi_reformation_spirit: "Spirit of the Reformation"
 STATIC_MODIFIER_DESC_nd_swi_reformation_spirit: "The teachings of Zwingli and Calvin have swept through the Swiss cantons, bringing a new emphasis on literacy, education, and the individual's direct relationship with scripture."
 STATIC_MODIFIER_NAME_nd_swi_counter_reformation_zeal: "Counter-Reformation Zeal"
 STATIC_MODIFIER_DESC_nd_swi_counter_reformation_zeal: "The Catholic cantons have rallied in defense of the old faith, strengthening their devotion and missionary efforts against the Protestant tide."
 nd_swi.1.t: "The Birth of the Eidgenossenschaft"
 nd_swi.1.d: "The Swiss cantons have achieved what seemed impossible — from scattered mountain communities bound only by oaths of mutual defense, a new nation has been forged in the heart of Europe. The Confederation stands as proof that free men need not bow to any prince. But what kind of nation shall this be?\n\nThe alpine passes command the trade routes between Italy and northern Europe. The cantonal militias have shattered every army sent against them. The question is not whether Switzerland will endure, but what it will become: a fortress unto itself, or a nation whose warriors march under foreign banners for gold and glory.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_swi.1.a: "We shall be a fortress — none shall cross our mountains unbidden"
 nd_swi.1.b: "Our pikes are for hire — let the kings of Europe bid for our service"
 nd_swi.2.t: "The Perpetual Peace of 1516"
 nd_swi.2.d: "The disasters of the Italian Wars — the bloodbath at Marignano where Swiss pikemen fell in their thousands against French artillery, the futile sieges and broken alliances — have taught the Confederation a bitter lesson. War abroad brings glory to individuals but ruin to the state.\n\nThe Treaty of Perpetual Peace with France, signed in Fribourg in 1516, marks a turning point. Switzerland will no longer fight wars of conquest. In exchange, the French crown gains the right to recruit Swiss mercenaries — but the Confederation itself stands apart from European conflicts, its neutrality purchased not with weakness but with the demonstrated ferocity of its citizens."
 nd_swi.2.a: "Let this peace endure — our strength lies in our restraint"
 nd_swi.3.t: "The Swiss Reformation"
 nd_swi.3.d: "The Confederation faces its gravest internal crisis. Huldrych Zwingli in Zurich and later John Calvin in Geneva have torn apart the religious unity that bound the cantons together. Catholic and Protestant cantons eye each other with suspicion, and the Kappel Wars have already spilled blood between brothers.\n\nYet from this crucible of confessional strife, something unexpected emerges: a grudging tolerance born of necessity. Neither side can crush the other without destroying the Confederation itself. The Swiss must find a way to live with their differences — or perish divided."
 nd_swi.3.a: "Embrace the new learning — let scripture and reason guide us"
 nd_swi.3.b: "Hold fast to the true faith — the old ways have served us well"
 nd_swi.4.t: "The Rise of Geneva Banking"
 nd_swi.4.d: "Since Bishop Adhémar Fabri granted Genevan bankers permission to charge interest in 1387, the city has grown into one of Europe's premier financial centers. The great trade fairs draw merchants and financiers from across the continent, and Calvin's pragmatic reinterpretation of usury laws has further loosened the constraints on commerce.\n\nSwiss banking houses now manage the wealth of princes and merchants alike. The counting houses of Geneva, Basel, and Zurich form a financial network that spans the continent — discreet, efficient, and answerable only to their cantonal councils."
 nd_swi.4.a: "Gold flows to those who keep their promises and their silence"
 nd_swi.5.t: "The Art of Precision"
 nd_swi.5.d: "Huguenot refugees fleeing persecution in France have brought their extraordinary skill in horology to Geneva, where the art of watchmaking has taken root and flourished. Swiss ateliers now produce the finest timepieces in Europe — intricate mechanisms of gears and springs that measure the hours with unprecedented accuracy.\n\nWhat began as a craft for wealthy patrons is becoming an industry. The precision demanded by watchmaking drives innovation in metalwork, optics, and engineering. The Swiss reputation for meticulous craftsmanship, already established in arms and textiles, now finds its ultimate expression in the exquisite mechanisms ticking away in workshops from Geneva to Schaffhausen."
 nd_swi.5.a: "Precision is the Swiss virtue — in war, in finance, and now in craft"
 nd_swi_letzi_fortifications: "Letzi Fortifications"
 nd_swi_letzi_fortifications_desc: "The construction of Letzi barrier walls across alpine valleys and lake approaches, channeling invaders into prepared kill zones."
 nd_swi_alpine_halberdiers: "Alpine Halberdiers"
 nd_swi_alpine_halberdiers_desc: "The mountain warriors who wielded the halberd — a uniquely Swiss weapon combining axe, hook, and spike — to devastating effect against armored knights."
 nd_swi_alpine_crossbowmen: "Alpine Crossbowmen"
 nd_swi_alpine_crossbowmen_desc: "Swiss marksmen trained in the use of the crossbow amid mountain terrain, providing ranged support before the halberdiers close for the kill."
 nd_swi_communal_oath: "Communal Oath"
 nd_swi_communal_oath_desc: "The tradition of Eidgenossenschaft — the sworn oath of mutual defense that binds free communities together without feudal overlordship."
 nd_swi_alpine_passes: "Alpine Pass Trade"
 nd_swi_alpine_passes_desc: "Control of the great alpine passes — the Gotthard, Simplon, and Great St Bernard — that connect northern and southern Europe."
 nd_swi_sempach_legacy: "Legacy of Sempach"
 nd_swi_sempach_legacy_desc: "The victory at Sempach in 1386 that transformed the Swiss from rebellious peasants into a recognized military power feared across Europe."
 nd_swi_tagsatzung_tradition: "Tagsatzung Tradition"
 nd_swi_tagsatzung_tradition_desc: "The institution of the Tagsatzung — the federal diet where cantonal delegates negotiated policy through consensus rather than command."
 nd_swi_gevierthaufen: "Gevierthaufen Tactics"
 nd_swi_gevierthaufen_desc: "The development of the Gevierthaufen — massive pike columns of thousands of disciplined infantrymen advancing in coordinated echelons."
 nd_swi_mercenary_contracts: "Mercenary Capitulations"
 nd_swi_mercenary_contracts_desc: "The institutionalization of mercenary service, with cantonal governments negotiating formal capitulation agreements with foreign powers."
 nd_swi_textile_industry: "Swiss Textile Industry"
 nd_swi_textile_industry_desc: "The flourishing textile production centered on St. Gallen, Zurich, and Basel, specializing in linen, wool, and later silk."
 nd_swi_alpine_hospices: "Alpine Hospices"
 nd_swi_alpine_hospices_desc: "The network of hospices maintained by monastic orders along the great alpine passes, offering shelter and care to travelers and pilgrims."
 nd_swi_swiss_guard_heritage: "Swiss Guard Heritage"
 nd_swi_swiss_guard_heritage_desc: "The prestige of Swiss military service, epitomized by the Papal Swiss Guard — the ultimate testament to Swiss martial reputation."
 nd_swi_pike_warfare: "Swiss Pike Warfare"
 nd_swi_pike_warfare_desc: "The perfection of pike square tactics that made Swiss infantry the terror of European battlefields from Grandson to Novara."
 nd_swi_reislaufer_service: "Reisläufer Service"
 nd_swi_reislaufer_service_desc: "The professional mercenary tradition of the Reisläufer — Swiss soldiers who hired their services to the highest bidder across Europe."
 nd_swi_perpetual_peace_advance: "Perpetual Peace"
 nd_swi_perpetual_peace_advance_desc: "The Treaty of Perpetual Peace with France in 1516, marking Switzerland's decisive turn away from wars of conquest."
 nd_swi_geneva_banking: "Geneva Banking"
 nd_swi_geneva_banking_desc: "The rise of Geneva as a European financial center, building on its medieval trade fairs and Calvin's pragmatic approach to usury."
 nd_swi_printing_and_learning: "Printing and Learning"
 nd_swi_printing_and_learning_desc: "Basel's emergence as a center of printing and humanist scholarship, home to Erasmus and the great publishing houses."
 nd_swi_civic_governance: "Civic Governance"
 nd_swi_civic_governance_desc: "The Swiss tradition of municipal self-governance through elected town councils, establishing the foundations of democratic republicanism."
 nd_swi_reformation_crossroads: "Reformation Crossroads"
 nd_swi_reformation_crossroads_desc: "The Swiss experience of the Reformation — where Zwingli and Calvin reshaped Christianity from Zurich and Geneva, while Catholic cantons held firm."
 nd_swi_cantonal_sovereignty: "Cantonal Sovereignty"
 nd_swi_cantonal_sovereignty_desc: "The principle that each canton retains sovereignty over its internal affairs, creating a uniquely decentralized form of governance."
 nd_swi_watchmaking_tradition: "Watchmaking Tradition"
 nd_swi_watchmaking_tradition_desc: "The establishment of Swiss watchmaking, brought by Huguenot refugees to Geneva and spread through the Jura mountains."
 nd_swi_arsenal_system: "Arsenal System"
 nd_swi_arsenal_system_desc: "The cantonal arsenal system maintaining stockpiles of weapons and equipment so every citizen can be armed within hours of a call to service."
 nd_swi_swiss_musketeer_corps: "Swiss Musketeers"
 nd_swi_swiss_musketeer_corps_desc: "Swiss soldiers adopting gunpowder weapons while maintaining their traditional discipline and mountain-fighting expertise."
 nd_swi_civic_humanism: "Swiss Civic Humanism"
 nd_swi_civic_humanism_desc: "The intellectual tradition combining classical republican ideals with Swiss communal governance, flourishing in Basel and Zurich."
 nd_swi_cantonal_militia_system: "Cantonal Militia System"
 nd_swi_cantonal_militia_system_desc: "The modernized militia system prescribed by the federal treaty, requiring each canton to maintain a standing contingent of trained soldiers."
 nd_swi_helvetic_banking: "Helvetic Banking"
 nd_swi_helvetic_banking_desc: "The maturation of Swiss banking from Geneva's trade fair origins into sophisticated financial institutions serving all of Europe."
 nd_swi_armed_neutrality_doctrine: "Armed Neutrality Doctrine"
 nd_swi_armed_neutrality_doctrine_desc: "The formalization of armed neutrality as Swiss state doctrine — peace through strength, defended by every citizen."
 nd_swi_anti_absolutism: "Anti-Absolutism"
 nd_swi_anti_absolutism_desc: "Switzerland's principled rejection of absolutist monarchy, maintaining republican traditions while Europe's kings concentrate power."
 nd_swi_cheese_dairy_trade: "Cheese and Dairy Trade"
 nd_swi_cheese_dairy_trade_desc: "The development of Swiss alpine dairy farming and cheese production into a major export industry, particularly Emmentaler and Gruyère."
 nd_swi_shooting_tradition: "Shooting Tradition"
 nd_swi_shooting_tradition_desc: "The Swiss tradition of communal shooting festivals and marksmanship competitions, ensuring every citizen maintains military readiness."
 nd_swi_federal_constitution: "Federal Constitution"
 nd_swi_federal_constitution_desc: "The adoption of a modern federal constitution establishing a permanent central government while preserving cantonal autonomy."
 nd_swi_precision_manufacturing: "Precision Manufacturing"
 nd_swi_precision_manufacturing_desc: "The expansion of Swiss precision craftsmanship from watchmaking into broader industrial manufacturing and engineering."
 nd_swi_swiss_sharpshooters: "Swiss Sharpshooters"
 nd_swi_swiss_sharpshooters_desc: "Elite marksmen combining the Swiss shooting tradition with modern rifled firearms, excelling in mountain warfare."
 nd_swi_financial_center: "Financial Center"
 nd_swi_financial_center_desc: "The emergence of Switzerland as Europe's preeminent financial center, built on banking discretion, political stability, and the rule of law."
 nd_swi_popular_education: "Popular Education"
 nd_swi_popular_education_desc: "The Swiss commitment to universal public education, inspired by Pestalozzi's educational philosophy, producing one of Europe's most literate populations."
 nd_swi_professional_diplomacy: "Professional Diplomacy"
 nd_swi_professional_diplomacy_desc: "Swiss expertise as neutral mediators and diplomats, building on centuries of balancing between powerful neighbors."
 a_nd_swi_halberdiers: "Swiss Halberdiers"
 a_nd_swi_halberdiers_desc: "Mountain warriors wielding the halberd — a combination weapon of axe, hook, and spike that could pull knights from horseback and crack open armor. Their skill in rough terrain is unmatched."
 a_nd_swi_crossbowmen: "Swiss Crossbowmen"
 a_nd_swi_crossbowmen_desc: "Alpine marksmen who rain bolts down upon enemies from mountain positions, softening formations before the halberdiers charge."
 a_nd_swi_pike_square: "Swiss Pike Square"
 a_nd_swi_pike_square_desc: "The Gevierthaufen in miniature — a disciplined block of pikemen trained to hold formation under cavalry charge and artillery fire alike. Their wall of steel points is nearly impenetrable."
 a_nd_swi_musketeer: "Swiss Musketeer"
 a_nd_swi_musketeer_desc: "Swiss infantry who have adapted to gunpowder warfare while retaining their legendary discipline and mountain-fighting traditions."
 a_nd_swi_cantonal_militia: "Cantonal Militia"
 a_nd_swi_cantonal_militia_desc: "Citizen-soldiers of the modernized Swiss militia system, combining musket drill with the traditional Swiss fighting spirit. Every man a soldier, every canton a fortress."
 a_nd_swi_sharpshooter: "Swiss Sharpshooter"
 a_nd_swi_sharpshooter_desc: "Elite marksmen from the Swiss shooting tradition, combining precision manufacturing with mountain warfare expertise. Their accuracy at range is devastating."
 nd_swi_letzi_wall: "Letzi Wall"
 nd_swi_letzi_wall_desc: "A barrier wall built across an alpine valley or lake approach, designed to channel invaders into prepared defensive positions. The Letzi of the original Forest Cantons could stretch for miles."
 nd_swi_tagsatzung_hall: "Tagsatzung Hall"
 nd_swi_tagsatzung_hall_desc: "A hall where cantonal delegates convene to debate and decide federal policy through consensus. The Tagsatzung embodies the Swiss principle that authority flows upward from the people."
 nd_swi_counting_house: "Geneva Counting House"
 nd_swi_counting_house_desc: "A financial institution managing deposits, extending credit, and facilitating the complex web of trade that flows through Switzerland's alpine passes."
 nd_swi_textile_manufactory: "Swiss Textile Manufactory"
 nd_swi_textile_manufactory_desc: "A workshop producing the fine linens and woolens that made St. Gallen, Zurich, and Basel centers of the European textile trade."
 nd_swi_horological_workshop: "Horological Workshop"
 nd_swi_horological_workshop_desc: "An atelier where master watchmakers craft intricate timepieces of unparalleled precision — the ultimate expression of Swiss craftsmanship."
 nd_swi_arsenal: "Swiss Arsenal"
 nd_swi_arsenal_desc: "A cantonal weapons stockpile and armory maintaining the arms, ammunition, and equipment needed to mobilize the militia at a moment's notice."
 nd_swi_alpine_hospice: "Alpine Hospice"
 nd_swi_alpine_hospice_desc: "A shelter maintained by religious orders along the great alpine passes, offering care to travelers and pilgrims crossing the mountains."
 nd_swi_rathaus: "Swiss Rathaus"
 nd_swi_rathaus_desc: "A town hall where elected councils govern municipal affairs — the physical embodiment of Swiss republican self-governance."
 nd_swi_schiessstand: "Schiesstand"
 nd_swi_schiessstand_desc: "A communal shooting range where citizens practice marksmanship, maintaining the military readiness that is every Swiss man's duty."
 nd_swi_dairy_cooperative: "Dairy Cooperative"
 nd_swi_dairy_cooperative_desc: "An alpine dairy processing facility where herdsmen pool their milk to produce the cheeses that have made Swiss dairy famous across Europe."
 nd_swi_diplomatic_residence: "Diplomatic Residence"
 nd_swi_diplomatic_residence_desc: "A neutral ground where foreign envoys meet and negotiations unfold, leveraging Switzerland's reputation for impartiality and discretion."
 nd_swi_letzi_garrison: "Letzi Garrison"
 nd_swi_letzi_garrison_desc: "Armed watchmen who patrol the Letzi walls, maintaining the fortifications and standing ready to defend the passes."
 nd_swi_tagsatzung_upkeep: "Assembly Administration"
 nd_swi_tagsatzung_upkeep_desc: "The clerks, scribes, and messengers who maintain the records and correspondence of the cantonal assembly."
 nd_swi_counting_house_operations: "Banking Operations"
 nd_swi_counting_house_operations_desc: "The complex financial operations of the counting house — managing accounts, extending letters of credit, and handling foreign exchange."
 nd_swi_textile_processing: "Textile Processing"
 nd_swi_textile_processing_desc: "Weaving wool and linen fiber into finished cloth through the Swiss guild system, following the tradition of St. Gallen and Basel textile merchants."
 nd_swi_watchmaking_craft: "Watchmaking Craft"
 nd_swi_watchmaking_craft_desc: "Crafting intricate watch mechanisms from silver and copper, producing exquisite timepieces prized across Europe."
 nd_swi_arsenal_maintenance: "Arsenal Maintenance"
 nd_swi_arsenal_maintenance_desc: "The upkeep of the cantonal arsenal — cleaning, repairing, and storing weapons and equipment for the citizen militia."
 nd_swi_hospice_care: "Hospice Care"
 nd_swi_hospice_care_desc: "The provisions needed to maintain an alpine hospice — food, fuel, and supplies for travelers crossing the mountain passes."
 nd_swi_rathaus_administration: "Rathaus Administration"
 nd_swi_rathaus_administration_desc: "The civic administration running the daily business of municipal government from the Rathaus."
 nd_swi_schiessstand_supply: "Shooting Range Supply"
 nd_swi_schiessstand_supply_desc: "Ammunition and equipment for the communal shooting range where citizens maintain their marksmanship."
 nd_swi_cheese_production: "Cheese Production"
 nd_swi_cheese_production_desc: "The processing of alpine milk into the hard cheeses that can survive long journeys to market across Europe."
 nd_swi_diplomatic_expenses: "Diplomatic Expenses"
 nd_swi_diplomatic_expenses_desc: "The costs of maintaining neutral ground for international diplomacy — correspondence, hospitality, and discretion."
 levy_nd_swi_halberdier: "Swiss Halberdier Levy"
 levy_nd_swi_halberdier_desc: "Mountain peasants called to arms with their halberds, continuing the tradition that defeated Habsburg armies at Morgarten and Sempach."
 levy_nd_swi_cantonal_militia: "Cantonal Militia Levy"
 levy_nd_swi_cantonal_militia_desc: "Citizen-soldiers raised under the cantonal militia system, where every able-bodied man is trained and equipped for the defense of the Confederation."
 nd_swi_formed_tt: "Switzerland has been formed"
 nd_swi_path_a_tt: "Chose Armed Neutrality"
 nd_swi_path_b_tt: "Chose Reisläufer Tradition"
 nd_swi_destiny: "Swiss Destiny"
 nd_swi_destiny_desc: "The Confederation stands formed. Now choose the path that will define its legacy -- a fortress of liberty and finance, or an empire built by the world's finest soldiers."
 nd_swi_dest_alpine_bank: "Alpine Banking Foundation"
 nd_swi_dest_alpine_bank_desc: "Consolidate control over the Swiss cantons and establish the financial institutions that will make the Confederation Europe's most trusted banker. Requires banking institutions, 1,000 gold, and strong development across the alpine core."
 nd_swi_dest_banking_capital: "Banking Capital of Europe"
 nd_swi_dest_banking_capital_desc: "Transform Switzerland into the financial heart of Europe. The counting houses of Geneva, Basel, and Zurich must become indispensable to every prince and merchant on the continent. Requires printing press, 2,000 gold, high prestige, and extensive development."
 nd_swi_dest_perpetual_republic: "The Perpetual Republic"
 nd_swi_dest_perpetual_republic_desc: "Achieve the ultimate expression of Swiss governance -- a republic so stable, so prosperous, and so scientifically advanced that it endures when empires fall. Requires scientific revolution, 3,000 gold, and the highest prestige."
 nd_swi_dest_ticino_gateway: "Gateway to Italy"
 nd_swi_dest_ticino_gateway_desc: "Cross the Alps and seize the Italian gateway. Bellinzona and Como command the passes into the Lombard plain -- the first step toward a Swiss empire south of the mountains. Requires both cities, an army of 30,000, and 1,000 gold."
 nd_swi_dest_lombard_conquest: "Lombard Conquest"
 nd_swi_dest_lombard_conquest_desc: "Dominate the richest plain in Europe. Milano and Brescia -- the workshops of Italy -- must bow to Swiss arms. Requires both cities, an army of 50,000, high prestige, and 2,000 gold."
 nd_swi_dest_helvetic_empire: "The Greater Helvetic Empire"
 nd_swi_dest_helvetic_empire_desc: "Forge an empire stretching from the Rhine to the Po. Strasbourg, Verona, and Turin must all fly the white cross. Requires all three cities, an army of 75,000, the highest prestige, and 3,000 gold."
 nd_swi.6.t: "The Destiny of the Eidgenossenschaft"
 nd_swi.6.d: "The Confederation is formed, but its true character remains to be determined. The cantonal delegates have sworn their oaths and the white cross flies over the alpine passes. Now the real work begins -- forging a nation from free communities that must decide whether to look inward or outward, whether to build walls or march beyond them."
 nd_swi.6.a: "The oath binds us -- now let us build upon it"
 nd_swi.7.t: "Foundations of Swiss Finance"
 nd_swi.7.d: "The alpine cantons have embraced modern banking practices, and the counting houses multiply. Where once the Swiss were known only for their arms, they are now gaining a reputation for something equally powerful -- discretion with other people's money. Geneva's trade fairs draw merchants and financiers from across Europe, and the Swiss franc is becoming a currency of trust.\n\nThe foundation is laid. What was once a collection of mountain peasants defending their valleys is becoming a sophisticated financial state."
 nd_swi.7.a: "Trust is our currency, and we shall never debase it"
 nd_swi.8.t: "The Bankers of Europe"
 nd_swi.8.d: "Switzerland has achieved what no mountain nation was expected to achieve -- it has become the banking capital of Europe. The counting houses of Geneva manage the wealth of kings. Basel's financiers underwrite the trade of nations. Zurich's discretion is legendary.\n\nThis prosperity brings a choice: invest in peaceful development and stable governance, or leverage this financial power to project Swiss prestige across the continent."
 nd_swi.8.a: "Invest in our cantons -- prosperity is its own reward"
 nd_swi.8.b: "Let the world know Swiss neutrality has its price"
 nd_swi.9.t: "The Perpetual Republic"
 nd_swi.9.d: "What the ancient Romans could not achieve -- a republic that endures -- the Swiss have accomplished. While empires rise and fall around them, the Confederation stands: prosperous, neutral, and free. The Swiss model of governance, where power flows from the people upward through cantonal assemblies, has become an inspiration to political thinkers across Europe.\n\nThis pinnacle demands a final choice: embrace constitutional liberalism as a beacon to the world, or consolidate financial power as the quiet architects of European prosperity."
 nd_swi.9.a: "Let our constitution be a light to all nations"
 nd_swi.9.b: "Gold speaks louder than constitutions"
 nd_swi.10.t: "The Ticino Falls"
 nd_swi.10.d: "Swiss pike columns have crossed the Alps and seized the gateway to Italy. Bellinzona's three castles -- Castelgrande, Montebello, and Sasso Corbaro -- now fly the white cross. Como, that jewel of the Lombard lakes, has been brought under Confederate control.\n\nThe Italian princes take notice. The Swiss are no longer content to defend their mountains. They are marching south, and their pikes are as sharp as their ambition."
 nd_swi.10.a: "Italy lies open before us -- the pikes shall lead the way"
 nd_swi.11.t: "Masters of Lombardy"
 nd_swi.11.d: "Milano has fallen. The richest city in northern Italy -- its workshops, its armories, its great cathedral -- now answers to Swiss authority. Brescia's renowned arms industry supplies the very weapons that conquered it. The Swiss Confederation has achieved what the Holy Roman Empire spent centuries failing to maintain: firm control over the Lombard plain.\n\nThe question now is how to maintain this empire. Train an elite corps of professional Reislaufer, or mobilize the full manpower of every canton?"
 nd_swi.11.a: "Quality over quantity -- forge the finest soldiers in Europe"
 nd_swi.11.b: "Every Swiss man is a soldier -- mobilize them all"
 nd_swi.12.t: "The Greater Helvetic Empire"
 nd_swi.12.d: "From Strasbourg on the Rhine to Verona on the Adige, from Turin at the foot of the western Alps to the ancient cantons of the Eidgenossen -- the white cross commands an empire that no one believed possible. Swiss pikemen, who once fought only to defend their valleys, now garrison the great cities of Europe.\n\nThis is the Switzerland that Marignano never happened to -- or rather, the Switzerland that won at Marignano and kept marching. The final question: rule through shock and discipline, or through the glory that draws warriors to your banner?"
 nd_swi.12.a: "Discipline and speed decide battles"
 nd_swi.12.b: "Let glory be our recruitment officer"
 STATIC_MODIFIER_NAME_nd_swi_dest_peaceful_prosperity: "Peaceful Prosperity"
 STATIC_MODIFIER_DESC_nd_swi_dest_peaceful_prosperity: "Swiss neutrality yields its greatest dividend: uninterrupted domestic development and contented cantons."
 STATIC_MODIFIER_NAME_nd_swi_dest_prestigious_neutrality: "Prestigious Neutrality"
 STATIC_MODIFIER_DESC_nd_swi_dest_prestigious_neutrality: "Swiss neutrality commands respect across Europe, though the standing army grows expensive to maintain without actual wars to justify its cost."
 STATIC_MODIFIER_NAME_nd_swi_dest_liberal_constitution: "Liberal Constitution"
 STATIC_MODIFIER_DESC_nd_swi_dest_liberal_constitution: "The Swiss constitutional model inspires political thinkers across Europe, granting the Confederation diplomatic influence far beyond its size."
 STATIC_MODIFIER_NAME_nd_swi_dest_financial_hegemony: "Financial Hegemony"
 STATIC_MODIFIER_DESC_nd_swi_dest_financial_hegemony: "Swiss banking houses have become the quiet architects of European prosperity, their financial networks spanning the continent."
 STATIC_MODIFIER_NAME_nd_swi_dest_elite_reislaufer: "Elite Reisläufer"
 STATIC_MODIFIER_DESC_nd_swi_dest_elite_reislaufer: "The Swiss have invested in quality over quantity, producing the finest professional infantry in Europe -- though domestic construction suffers from the martial focus."
 STATIC_MODIFIER_NAME_nd_swi_dest_mass_mobilization: "Mass Mobilization"
 STATIC_MODIFIER_DESC_nd_swi_dest_mass_mobilization: "Every canton musters its full strength, and mercenary companies flock to the Confederate banner for reduced premiums."
 STATIC_MODIFIER_NAME_nd_swi_dest_shock_and_terror: "Shock and Terror"
 STATIC_MODIFIER_DESC_nd_swi_dest_shock_and_terror: "Swiss armies strike with devastating speed and reinforce rapidly, though the expense of constant campaigning drives up prices at home."
 STATIC_MODIFIER_NAME_nd_swi_dest_glory_seekers: "Glory Seekers"
 STATIC_MODIFIER_DESC_nd_swi_dest_glory_seekers: "The legend of Swiss martial prowess draws warriors from across Europe, seeking to fight under the white cross banner."
 nd_swi_exchange_house: "Swiss Exchange House"
 nd_swi_exchange_house_desc: "A premier financial institution where the wealth of Europe is managed with legendary Swiss discretion -- deposits, letters of credit, and currency exchange conducted behind closed doors."
 nd_swi_exchange_operations: "Exchange Operations"
 nd_swi_exchange_operations_desc: "The complex financial operations of the exchange house -- managing accounts, facilitating international trade, and maintaining the meticulous ledgers that Swiss banking demands."
