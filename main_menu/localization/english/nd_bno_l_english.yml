l_english:
 STATIC_MODIFIER_NAME_nd_thalassocracy_of_the_eastern_seas: "Thalassocracy of the Eastern Seas"
 STATIC_MODIFIER_DESC_nd_thalassocracy_of_the_eastern_seas: "Borneo's destiny lies upon the waves. From the camphor-scented ports of Brunei to the pepper wharves of Banjarmasin, our sultanates command the sea lanes that bind the Spice Islands to China and India. Let every strait and river mouth answer to our flag."
 STATIC_MODIFIER_NAME_nd_lords_of_the_rainforest: "Lords of the Rainforest"
 STATIC_MODIFIER_DESC_nd_lords_of_the_rainforest: "The interior of Borneo is an impenetrable fortress of jungle, river, and mountain. The Dayak peoples who master this terrain are unmatched warriors — their mandau swords and poison-tipped blowguns have turned back every invader who dared venture upstream. We shall unite these clans into an army the world has never seen."
 STATIC_MODIFIER_NAME_nd_bno_banjarmasin_pepper_boom: "Banjarmasin Pepper Boom"
 STATIC_MODIFIER_DESC_nd_bno_banjarmasin_pepper_boom: "The pepper trade from Banjarmasin has reached its zenith, with merchants from across the archipelago and beyond competing for access to our harvests."
 STATIC_MODIFIER_NAME_nd_bno_diamond_rush: "Diamond Rush"
 STATIC_MODIFIER_DESC_nd_bno_diamond_rush: "The alluvial diamond fields of Landak and Cempaka have drawn miners and merchants from across the island, fueling a surge of prosperity."
 nd_bno.1.t: "The Unification of Borneo"
 nd_bno.1.d: "The great island of Borneo — third largest in the world — has at last been brought under a single sovereignty. For centuries, coastal sultanates from Brunei in the north to Banjarmasin in the south competed with inland Dayak confederacies for control of the island's immense resources: camphor worth its weight in silver, diamonds from the ancient alluvial fields of Landak, pepper that drew traders from China and India, and ironwood hardened by millennia of tropical growth.\n\nNow, for the first time, the maritime ambitions of the coastal sultans and the jungle prowess of the interior peoples are unified under one banner. But this new state must choose its character. Shall we look outward across the Sulu Sea and the straits of Makassar, building a thalassocracy to rival Brunei's golden age under Sultan Bolkiah? Or shall we turn inward, harnessing the fearsome warriors of the longhouses and the inexhaustible resources of the world's oldest rainforest?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_bno.1.a: "Command the seas — our destiny lies upon the waves"
 nd_bno.1.b: "Master the jungle — no army can match us in our forests"
 nd_bno.2.t: "The Pepper Trade of Banjarmasin"
 nd_bno.2.d: "Under Sultan Mustain Billah, the Sultanate of Banjarmasin reached the peak of its commercial power in the early seventeenth century. Pepper plantations spread across the southern river valleys, and Banjarmasin became the dominant trading hub between the Straits of Malacca and the Spice Islands of Maluku. Merchants from Java, China, India, and even Europe competed for access to Banjarmasin's wharves, where pepper was measured by the ton and contracts were sealed with oaths sworn on the Quran.\n\nThis wealth did not come without cost — control of the pepper trade meant control of the rivers, and the sultan's warboats patrolled every tributary. Yet the choice before us now is how to invest this bounty: shall we deepen our commercial networks, or turn the profits toward developing our diamond and mineral wealth?"
 nd_bno.2.a: "Expand the pepper trade routes across the archipelago"
 nd_bno.2.b: "Invest in the diamond fields and mineral extraction"
 nd_bno.3.t: "The Brunei Thalassocracy"
 nd_bno.3.d: "Under Sultan Bolkiah, the fifth Sultan of Brunei, the sultanate expanded from a coastal trading post into a true thalassocracy — an empire of the seas. Brunei's writ ran from the coasts of Sarawak and Sabah to the southern Philippines, encompassing the Sulu Archipelago and reaching as far as Manila Bay. This was not an empire of territory but of trade routes: Brunei collected tolls on all water traffic passing through its sphere, and its camphor — whose wholesale value equalled its weight in silver — drew merchants from as far as the Mediterranean.\n\nThe sultan's court became a center of Islamic learning and Malay literary culture, attracting scholars and traders who spread the faith along every coast the sultanate touched. Brunei's golden age demonstrated that an island state could project power across vast stretches of ocean through commerce, diplomacy, and the judicious deployment of war prahus."
 nd_bno.3.a: "A golden age worthy of remembrance"
 nd_bno.4.t: "The Iban Sea Dayak Raids"
 nd_bno.4.d: "The Iban people — known to outsiders as the Sea Dayaks — earned their fearsome reputation through generations of seaborne raiding from the rivers of Sarawak. Their bangkong war canoes, some over ninety feet long, could carry dozens of warriors armed with mandau swords and iron-tipped blowpipes. The Iban developed sophisticated naval tactics: small, poorly-manned canoes would be sent forward as bait, drawing enemy vessels into pursuit until they passed concealed positions where the main fleet waited in ambush.\n\nBy the nineteenth century, the Saribas Iban could assemble pirate fleets of two hundred bangkongs, striking terror along the entire northwest coast of Borneo. Their nocturnal attacks, using two-metre blowpipes that brought silent death in the darkness, were legendary. Even the well-armed ships of European colonial powers learned to respect the Dayak raiders who knew every river, reef, and current of these waters."
 nd_bno.4.a: "The rivers and seas of Borneo belong to us"
 nd_bno.5.t: "The Diamond Fields of Landak"
 nd_bno.5.d: "The alluvial diamond deposits of the Landak district, near the west coast of Borneo, are among the oldest known sources in the world — mining here dates back to at least 600 AD, making Borneo one of humanity's first diamond sources alongside India. The great Matan diamond, weighing 367 carats, was discovered by a Dayak laborer in these fields in 1787, the largest gem-quality rough diamond ever found in Kalimantan.\n\nBut diamonds were only one facet of Borneo's mineral wealth. Gold from the rivers of Sambas and Bau, antimony from the hills of Sarawak, iron ore from the interior mountains — all fed into a mining economy that attracted Chinese kongsi companies in the seventeenth century, organized into cooperative mining ventures that transformed the landscape. The wealth drawn from Borneo's earth has shaped the island's politics for centuries."
 nd_bno.5.a: "The earth yields its treasures to those who know where to look"
 nd_bno.6.t: "Resistance Against European Encroachment"
 nd_bno.6.d: "As European colonial powers tightened their grip on the archipelago — the Dutch from the south and east, the British from the northwest — the peoples of Borneo mounted fierce resistance. Pangeran Antasari, the Banjarese prince who led the Banjar War of 1859-1863 against the Dutch, became the symbol of this defiance. He coordinated resistance across ethnic lines, smuggling firearms from the Kutai Sultanate and rallying both Banjar Malays and Dayak warriors to his cause.\n\nThe jungle itself became an ally. Dutch columns advancing upriver found their supply lines stretched to breaking, their soldiers felled by tropical disease, and their flanks harassed by warriors who melted back into the forest after each ambush. Though colonial power eventually prevailed through sheer material advantage, the spirit of resistance shaped Borneo's identity for generations."
 nd_bno.6.a: "Our forests and rivers are our greatest fortifications"
 nd_bno_headhunting_rites: "Headhunting Rites"
 nd_bno_headhunting_rites_desc: "The Dayak tradition of headhunting was not mere savagery but a deeply spiritual practice — the head of a vanquished foe was believed to capture their soul's power, granting strength and protection to the community."
 nd_bno_longhouse_tradition: "Longhouse Tradition"
 nd_bno_longhouse_tradition_desc: "The great longhouses of Borneo, raised on ironwood stilts and stretching up to three hundred metres, serve as communal fortresses where dozens of families live, work, and defend together."
 nd_bno_riverine_navigation: "Riverine Navigation"
 nd_bno_riverine_navigation_desc: "Borneo's rivers are its highways. Mastery of riverine navigation — reading currents, navigating rapids, and building vessels suited to both river and open sea — is the foundation of all island power."
 nd_bno_jungle_ironworking: "Jungle Ironworking"
 nd_bno_jungle_ironworking_desc: "Dayak blacksmiths forge the mandau sword from iron ore gathered in the interior mountains, combining a soft iron body to prevent breakage with a harder iron edge for devastating sharpness."
 nd_bno_animist_spiritualism: "Animist Spiritualism"
 nd_bno_animist_spiritualism_desc: "Before the arrival of Islam, the peoples of Borneo practiced animist traditions centered on the spirits of the forest, rivers, and ancestors — beliefs that still underpin Dayak cultural identity."
 nd_bno_forest_product_trade: "Forest Product Trade"
 nd_bno_forest_product_trade_desc: "Borneo's forests yield treasures beyond timber: rattan, beeswax, hornbill ivory, and bird nests prized across East Asia for their supposed medicinal properties."
 nd_bno_sumpit_mastery: "Sumpit Mastery"
 nd_bno_sumpit_mastery_desc: "The sumpit — the Dayak blowgun — is a weapon of terrifying precision. Darts tipped with ipoh tree poison can bring death from a single scratch, and skilled hunters can strike targets at over thirty metres."
 nd_bno_bangkong_warcraft: "Bangkong Warcraft"
 nd_bno_bangkong_warcraft_desc: "The bangkong war canoe is the weapon of the Sea Dayaks — a fast, maneuverable vessel carved from a single great tree, capable of carrying dozens of warriors along rivers and across open sea."
 nd_bno_camphor_monopoly: "Camphor Monopoly"
 nd_bno_camphor_monopoly_desc: "Borneo camphor, harvested from the Dryobalanops trees of the interior forests, commanded prices equivalent to its weight in silver on international markets."
 nd_bno_brunei_thalassocracy: "Brunei Thalassocracy"
 nd_bno_brunei_thalassocracy_desc: "Under Sultan Bolkiah, the Sultanate of Brunei became a true maritime empire, controlling trade routes from Sarawak to the southern Philippines."
 nd_bno_malay_court_culture: "Malay Court Culture"
 nd_bno_malay_court_culture_desc: "The courts of Borneo's sultanates adopted the refined traditions of Malay aristocratic culture — elaborate ceremonies, courtly literature, and a hierarchical social order."
 nd_bno_kutai_hindu_legacy: "Kutai Hindu Legacy"
 nd_bno_kutai_hindu_legacy_desc: "The Kutai Kingdom, founded in the fourth century, was the earliest Hindu polity in the East Indies. Its stone inscriptions in Pallava script are among the oldest evidence of Indian cultural influence in Southeast Asia."
 nd_bno_island_fortification: "Island Fortification"
 nd_bno_island_fortification_desc: "The river mouths and coastal headlands of Borneo offer natural defensive positions that, when fortified with timber palisades and cannon emplacements, can control access to entire coastlines."
 nd_bno_iban_sea_dayak_raids: "Iban Sea Dayak Raids"
 nd_bno_iban_sea_dayak_raids_desc: "The Iban Sea Dayaks are among the most feared warriors of maritime Southeast Asia — their bangkong fleets, coordinated ambush tactics, and nocturnal blowpipe attacks have broken the will of far larger forces."
 nd_bno_spice_island_routes: "Spice Island Routes"
 nd_bno_spice_island_routes_desc: "Borneo sits at the crossroads between the Spice Islands of Maluku, the markets of China, and the trade routes to India — a position of immense commercial advantage for those who can secure it."
 nd_bno_landak_diamond_fields: "Landak Diamond Fields"
 nd_bno_landak_diamond_fields_desc: "The alluvial diamond deposits of Landak, mined since at least 600 AD, make Borneo one of the world's oldest diamond sources. The great Matan diamond of 367 carats was found here."
 nd_bno_banjarmasin_sultanate_rise: "Banjarmasin Sultanate Rise"
 nd_bno_banjarmasin_sultanate_rise_desc: "The Sultanate of Banjar, founded in 1526 after the fall of Negara Daha, brought Islamic governance and commercial networks to southern Borneo."
 nd_bno_islamization_of_borneo: "Islamization of Borneo"
 nd_bno_islamization_of_borneo_desc: "The spread of Islam across Borneo's coasts transformed the island's political landscape, creating a network of sultanates linked by faith, trade, and dynastic marriage."
 nd_bno_sulu_sea_dominance: "Sulu Sea Dominance"
 nd_bno_sulu_sea_dominance_desc: "Control of the Sulu Sea means control of the trade routes linking Borneo, the Philippines, and the Spice Islands — a maritime dominion enforced by war prahus."
 nd_bno_rattan_ironwood_exports: "Rattan and Ironwood Exports"
 nd_bno_rattan_ironwood_exports_desc: "Bornean ironwood, virtually indestructible and resistant to termites and saltwater, commands premium prices. Combined with rattan exports, these forest products are the backbone of the interior economy."
 nd_bno_sultanate_naval_reform: "Sultanate Naval Reform"
 nd_bno_sultanate_naval_reform_desc: "The sultanates of Borneo modernize their war prahus with cannon mountings and heavier construction, creating a galley fleet capable of defending the island's vast coastline."
 nd_bno_banjarmasin_pepper_trade: "Banjarmasin Pepper Trade"
 nd_bno_banjarmasin_pepper_trade_desc: "Under Sultan Mustain Billah, Banjarmasin became the dominant pepper trading hub between Malacca and Maluku, with merchants from Java, China, and India competing for access."
 nd_bno_anti_piracy_patrols: "Anti-Piracy Patrols"
 nd_bno_anti_piracy_patrols_desc: "Organized naval patrols suppress the endemic piracy of Borneo's coastal waters, protecting trade and projecting the authority of the unified island state."
 nd_bno_chinese_kongsi_mining: "Chinese Kongsi Mining"
 nd_bno_chinese_kongsi_mining_desc: "Chinese mining kongsi — cooperative companies organized by clans from Guangdong and Fujian — bring advanced mining techniques and labor organization to Borneo's gold and diamond fields."
 nd_bno_dayak_confederation: "Dayak Confederation"
 nd_bno_dayak_confederation_desc: "The diverse Dayak peoples of the interior — Iban, Bidayuh, Kayan, Kenyah, and dozens more — are organized into a loose military confederation, drawing on each tribe's specialized warriors."
 nd_bno_court_of_the_sultan: "Court of the Sultan"
 nd_bno_court_of_the_sultan_desc: "The sultanate's court at Brunei or Banjarmasin becomes a center of administration, justice, and diplomacy, drawing on both Islamic jurisprudence and indigenous adat law."
 nd_bno_islamic_scholarship: "Islamic Scholarship"
 nd_bno_islamic_scholarship_desc: "Mosques and madrasas spread Islamic learning across Borneo's coastal regions, creating a literate class of scholars, judges, and administrators."
 nd_bno_banjarmasin_naval_arsenal: "Banjarmasin Naval Arsenal"
 nd_bno_banjarmasin_naval_arsenal_desc: "The rivers of southern Borneo provide the timber and ironwork for a cannon-armed galley fleet, combining local shipbuilding traditions with gunpowder technology."
 nd_bno_european_resistance: "European Resistance"
 nd_bno_european_resistance_desc: "Pangeran Antasari's resistance against Dutch colonial expansion demonstrated that Borneo's jungles and rivers could bleed even industrial-era armies."
 nd_bno_gold_antimony_mines: "Gold and Antimony Mines"
 nd_bno_gold_antimony_mines_desc: "The gold fields of Sambas and Bau, combined with antimony deposits in Sarawak's hills, fuel an expanding mining economy that reshapes the island's interior."
 nd_bno_pangeran_antasari_legacy: "Pangeran Antasari's Legacy"
 nd_bno_pangeran_antasari_legacy_desc: "The Banjarese prince who led the Banjar War became a symbol of resistance — coordinating Malay and Dayak forces, smuggling arms from Kutai, and fighting a guerrilla campaign that lasted years."
 nd_bno_strait_toll_system: "Strait Toll System"
 nd_bno_strait_toll_system_desc: "Control of the straits and river mouths around Borneo allows the levying of tolls on all maritime traffic — a system pioneered by the Brunei sultanate at the height of its power."
 nd_bno_borneo_interior_roads: "Borneo Interior Roads"
 nd_bno_borneo_interior_roads_desc: "Cutting roads through Borneo's dense interior rainforest connects the coast to the mineral-rich hinterland, allowing efficient extraction and administration of previously isolated regions."
 nd_bno_banjar_war_resistance: "Banjar War Resistance"
 nd_bno_banjar_war_resistance_desc: "The lessons of the Banjar War — guerrilla tactics in dense terrain, cross-ethnic military cooperation, and the exploitation of interior supply lines — shape a modern military doctrine."
 nd_bno_modern_pepper_plantations: "Modern Pepper Plantations"
 nd_bno_modern_pepper_plantations_desc: "Industrial-scale pepper cultivation transforms southern Borneo's river valleys into one of the world's major spice-producing regions."
 nd_bno_unified_island_administration: "Unified Island Administration"
 nd_bno_unified_island_administration_desc: "For the first time, a single administrative system connects Borneo's diverse coastal sultanates and inland confederacies under coordinated governance."
 nd_bno_coastal_modernization: "Coastal Modernization"
 nd_bno_coastal_modernization_desc: "Modern shipyards, lighthouses, and port facilities transform Borneo's coastal towns from traditional trading posts into hubs of regional commerce."
 nd_bno_diamond_trade_reform: "Diamond Trade Reform"
 nd_bno_diamond_trade_reform_desc: "Rationalized extraction and trade practices bring Borneo's diamond industry into the modern era, connecting the ancient Landak fields to global gem markets."
 nd_bno_borneo_sovereignty: "Borneo Sovereignty"
 nd_bno_borneo_sovereignty_desc: "A unified Borneo asserts its sovereignty as a great island power — recognized by neighboring states and commanding respect through its wealth, military strength, and cultural heritage."
 a_nd_bno_dayak_headhunters: "Dayak Headhunters"
 a_nd_bno_dayak_headhunters_desc: "Mandau-wielding warriors from the longhouse communities, whose headhunting traditions forge fearless fighters who strike terror into all who face them in the jungle."
 a_nd_bno_blowgunners: "Borneo Blowgunners"
 a_nd_bno_blowgunners_desc: "Skirmishers armed with the sumpit blowgun, firing poison-tipped darts of bamboo and ironwood. A single scratch from their ipoh-poisoned darts can bring death within minutes."
 a_nd_bno_iban_sea_raiders: "Iban Sea Raiders"
 a_nd_bno_iban_sea_raiders_desc: "Amphibious warriors of the Sea Dayak tradition, equally at home raiding from bangkong war canoes or fighting through dense jungle, known for their devastating ambush tactics."
 n_nd_bno_prahu_bangkong: "Prahu Bangkong"
 n_nd_bno_prahu_bangkong_desc: "The fast war canoe of the Dayak peoples — light, maneuverable, and carved from a single great tree. What it lacks in armament it makes up for in speed and the ferocity of its crew."
 n_nd_bno_sultanate_war_prahu: "Sultanate War Prahu"
 n_nd_bno_sultanate_war_prahu_desc: "A heavier armed galley developed by the coastal sultanates, mounting cannon alongside traditional boarding tactics. These vessels patrol the straits and river mouths of Borneo."
 n_nd_bno_pepper_trader: "Borneo Pepper Trader"
 n_nd_bno_pepper_trader_desc: "A fast trading vessel optimized for the spice routes between Borneo, Maluku, and the wider archipelago. Speed is its greatest defense against the endemic piracy of these waters."
 n_nd_bno_banjarmasin_cannon_boat: "Banjarmasin Cannon Boat"
 n_nd_bno_banjarmasin_cannon_boat_desc: "A river galley armed with heavy cannon, developed to patrol the waterways of southern Borneo. Its shallow draft allows it to navigate the tributaries where larger vessels cannot follow."
 nd_bno_longhouse: "Dayak Longhouse"
 nd_bno_longhouse_desc: "A great communal dwelling raised on ironwood stilts, housing dozens of families under one roof. The longhouse serves as fortress, granary, armory, and the center of community life."
 nd_bno_longhouse_upkeep: "Longhouse Upkeep"
 nd_bno_longhouse_upkeep_desc: "Maintaining the massive ironwood and bamboo structure of a traditional longhouse."
 nd_bno_camphor_post: "Camphor Trading Post"
 nd_bno_camphor_post_desc: "A trading depot specializing in Borneo camphor, the aromatic resin harvested from Dryobalanops trees that commands prices equivalent to its weight in silver."
 nd_bno_camphor_processing: "Camphor Processing"
 nd_bno_camphor_processing_desc: "Harvesting and processing camphor resin from the forests of the interior."
 nd_bno_diamond_workshop: "Diamond Mine Workshop"
 nd_bno_diamond_workshop_desc: "An alluvial mining operation extracting diamonds from river gravels using traditional panning and sluicing techniques perfected over centuries in the Landak district."
 nd_bno_alluvial_mining: "Alluvial Mining"
 nd_bno_alluvial_mining_desc: "Extracting diamonds and precious gems from river gravels using traditional panning and sluicing techniques."
 nd_bno_pepper_estate: "Pepper Plantation Estate"
 nd_bno_pepper_estate_desc: "A managed pepper plantation along Borneo's southern river valleys, producing the spice that made Banjarmasin one of the great trading ports of the archipelago."
 nd_bno_pepper_cultivation: "Pepper Cultivation"
 nd_bno_pepper_cultivation_desc: "Growing and harvesting pepper from vine plantations in the humid river valleys of southern Borneo."
 nd_bno_sultanate_mosque: "Sultanate Mosque"
 nd_bno_sultanate_mosque_desc: "A center of Islamic learning and jurisprudence, combining the functions of mosque, madrasa, and court of law. These institutions spread literacy and administrative capacity across the coastal sultanates."
 nd_bno_mosque_maintenance: "Mosque Maintenance"
 nd_bno_mosque_maintenance_desc: "Maintaining the stonework and library of a sultanate mosque and madrasa."
 nd_bno_forest_products_pm: "Forest Product Processing"
 nd_bno_forest_products_pm_desc: "Processing rattan, resin, and other non-timber forest products harvested from Borneo's interior."
 nd_bno_ironwood_processing_pm: "Ironwood Processing"
 nd_bno_ironwood_processing_pm_desc: "Harvesting and preparing Bornean ironwood — virtually indestructible timber prized for construction and shipbuilding."
 nd_bno_sago_processing_pm: "Sago Processing"
 nd_bno_sago_processing_pm_desc: "Extracting starch from sago palms — the staple food of Borneo's interior peoples."
 nd_bno_beeswax_processing_pm: "Beeswax Processing"
 nd_bno_beeswax_processing_pm_desc: "Collecting and refining beeswax from the rainforest canopy for export — a valuable trade commodity."
 nd_bno_birds_nest_pm: "Birds Nest Harvesting"
 nd_bno_birds_nest_pm_desc: "Harvesting edible swiftlet nests from the limestone caves of Borneo — prized in Chinese cuisine for their supposed medicinal properties."
 nd_bno_gold_panning_pm: "Gold Panning Operations"
 nd_bno_gold_panning_pm_desc: "Panning alluvial gold from Borneo's rivers using techniques refined by Chinese kongsi miners."
 nd_bno_antimony_smelting_pm: "Antimony Smelting"
 nd_bno_antimony_smelting_pm_desc: "Smelting antimony ore from the hills of Sarawak into metal tools and alloys."
 nd_bno_prahu_yard_pm: "Prahu Shipbuilding"
 nd_bno_prahu_yard_pm_desc: "Building war prahus and trading vessels from Bornean ironwood and local timber."
 levy_nd_bno_dayak_headhunters: "Dayak Headhunter Warband"
 levy_nd_bno_dayak_headhunters_desc: "Fierce Dayak warriors from the interior longhouses — mandau-wielding headhunters who strike terror into coastal invaders."
 levy_nd_bno_iban_sea_raiders: "Iban Sea Raider Fleet"
 levy_nd_bno_iban_sea_raiders_desc: "Amphibious Iban warriors who raid by river and sea — feared across the coasts of Borneo for their swift longboat attacks."
 nd_bno_formed_tt: "Borneo has been formed"
 nd_bno_path_a_tt: "Chose Thalassocracy of the Eastern Seas"
 nd_bno_path_b_tt: "Chose Lords of the Rainforest"
 nd_bno_destiny: "Destiny of Borneo"
 nd_bno_destiny_desc: "The great island stands unified. Now we must prove that Borneo can endure as more than a collection of river sultanates and longhouse confederacies. Stabilize the realm before choosing our path forward."
 nd_bno_dest_sulu: "Sulu Sea Dominion"
 nd_bno_dest_sulu_desc: "Seize the Sulu Archipelago and establish Borneo as the dominant maritime power in the eastern seas. Control of Sulu opens the trade routes to the Philippines and Spice Islands. Requires control of Maimbung and access to the pepper trade."
 nd_bno_dest_straits: "Master of the Straits"
 nd_bno_dest_straits_desc: "Command the great maritime chokepoints of Southeast Asia. With Malacca and Ternate under our banner, every ship that sails between the Indian Ocean and the Pacific must pay tribute to Borneo."
 nd_bno_dest_archipelago: "Archipelago Empire"
 nd_bno_dest_archipelago_desc: "From Manila Bay to the Makassar Strait, the island world of Southeast Asia answers to Borneo. This is the maritime empire that Sultan Bolkiah of Brunei could only dream of -- a thalassocracy spanning the entire archipelago."
 nd_bno_dest_interior: "Heart of the Jungle"
 nd_bno_dest_interior_desc: "Develop the vast interior of Borneo into a source of unmatched wealth. Gold from the rivers, diamonds from the earth, and ironwood from the ancient forests -- the rainforest is an inexhaustible treasury for those who know its secrets."
 nd_bno_dest_rivers: "Lord of a Thousand Rivers"
 nd_bno_dest_rivers_desc: "Extend Borneo's riverine power beyond the island. Palembang, the great Sumatran river sultanate, shares our model of interior waterway dominance. Conquer it, and prove that the lords of the rainforest can project power across the seas."
 nd_bno_dest_sovereignty: "Sovereignty of the Green Realm"
 nd_bno_dest_sovereignty_desc: "The interior of Borneo -- the oldest rainforest on Earth -- becomes the seat of a great power. From Java's heartland to the jungle-clad mountains of the interior, the Lords of the Rainforest have built an empire that no colonial power can penetrate."
 nd_bno.7.t: "A Unified Borneo"
 nd_bno.7.d: "The longhouse councils and the sultanate courts have at last acknowledged a single sovereign authority over the world's third-largest island. From the mangrove swamps of the south to the mountain forests of the Crocker Range, from the river deltas of Sarawak to the diamond fields of Landak, Borneo speaks with one voice.\n\nThis is no small achievement. The island's immense size, impenetrable interior, and staggering cultural diversity -- Dayak, Malay, Kutai, Banjar, Iban, and dozens more -- have defeated every previous attempt at unification. The question now is not whether we can hold this realm together, but what we shall make of it."
 nd_bno.7.a: "Borneo united stands as one"
 nd_bno.8.t: "The Fall of Sulu"
 nd_bno.8.d: "The Sulu Archipelago, that chain of islands stretching between Borneo and Mindanao, has long been the domain of independent sultans and pirate chiefs who preyed upon the sea lanes with impunity. Our war prahus have broken their resistance. The harbour of Maimbung, seat of the Sulu Sultanate, now flies our banner.\n\nWith Sulu in our hands, we command the sea routes connecting Borneo to the Philippines and the Spice Islands beyond. The pepper merchants who once had to negotiate with a dozen petty rulers now deal with one authority. This is the first step toward a true thalassocracy of the eastern seas."
 nd_bno.8.a: "The sea roads are open to us"
 nd_bno.9.t: "Command of the Straits"
 nd_bno.9.d: "Two of the most strategically vital points in all of Southeast Asia now answer to Borneo. Malacca, the ancient gateway between the Indian Ocean and the South China Sea, channels the riches of India, Arabia, and East Africa through our customs houses. Ternate, the volcanic spice island that once drove European powers to war, adds cloves and nutmeg to our dominion.\n\nThis is a thalassocracy not merely of coasts but of chokepoints. Every merchant vessel, every war fleet, every diplomatic mission that passes through these waters must reckon with Borneo's reach. The question is how to wield this power: shall we grow rich from tolls and trade agreements, or shall we build the naval force to project our authority further still?"
 nd_bno.9.a: "Establish toll houses at every strait"
 nd_bno.9.b: "Build fleets to enforce our spice monopoly"
 nd_bno.10.t: "Empire of the Archipelago"
 nd_bno.10.d: "Manila Bay and the Makassar Strait -- the northern and southern gates of the island world -- now both fly Borneo's flag. What Sultan Bolkiah achieved in Brunei's golden age was merely the prelude. We have built something far greater: a maritime empire encompassing the Philippines, the Spice Islands, the Malay Peninsula, and the vast island of Borneo itself.\n\nOur war prahus patrol waters that span over three thousand miles. Our merchants trade from the Bay of Bengal to the coast of New Guinea. This is a power built not on Continental conquest but on the mastery of wind, wave, and the thousands of islands that dot the seas between Asia and Australia. Shall we consolidate this domain through diplomacy and integration, or maintain it through overwhelming naval supremacy?"
 nd_bno.10.a: "Rule through diplomacy and shared prosperity"
 nd_bno.10.b: "Rule through the fleet -- our prahus are law"
 nd_bno.11.t: "Treasures of the Interior"
 nd_bno.11.d: "While lesser powers quarrel over coastal trading posts, we have turned our attention to the true wealth of Borneo: its interior. The diamond fields of Landak, mined since before the age of the Prophet, yield gems that rival anything from India. Gold dust gathers in every river bend. Ironwood forests, some trees a thousand years old, provide timber that no termite can gnaw and no saltwater can rot.\n\nOur roads and river improvements now connect the coast to the heart of the jungle. Where once only the bravest Dayak traders ventured, now a regular trade in gold, diamonds, camphor, and beeswax flows toward the coast. The rainforest is not an obstacle -- it is our greatest asset."
 nd_bno.11.a: "The jungle yields its riches to those who respect it"
 nd_bno.12.t: "The River Kingdoms"
 nd_bno.12.d: "Palembang has fallen. The great Sumatran river sultanate, which once controlled the interior waterways of southern Sumatra as we control the rivers of Borneo, now acknowledges our sovereignty. This conquest was not merely strategic but symbolic: we have proven that Borneo's model of riverine power -- control the rivers, control the land -- can be projected across the seas.\n\nOur armies, hardened in jungle warfare and river fighting, have shown themselves superior to any force that relies on roads and open ground. The question is how to consolidate this victory: shall we govern through military strength, or use our mineral wealth to buy the loyalty of a vast inland empire?"
 nd_bno.12.a: "Govern through the strength of our river fleets"
 nd_bno.12.b: "Let diamond wealth buy the loyalty of subjects"
 nd_bno.13.t: "Sovereignty of the Green Realm"
 nd_bno.13.d: "The interior heartland of Java -- the most populous island in the archipelago -- has been brought under our dominion. Mataram, seat of the great Javanese kingdoms, now answers to the Lords of the Rainforest. This is an achievement that would have seemed impossible to the Dayak longhouse chiefs of a century ago: an empire stretching from the oldest rainforest on Earth across the richest agricultural lands of the tropics.\n\nWe have built this power not through naval supremacy but through the mastery of interior warfare, the development of our mineral wealth, and the patient absorption of the peoples who share our island and archipelago. Shall we honor the resistance legacy of Pangeran Antasari, building an army that can never be conquered, or forge a new Dayak identity that unites every people of the interior?"
 nd_bno.13.a: "Honor the legacy of Antasari's resistance"
 nd_bno.13.b: "Forge a new Dayak empire from the jungle peoples"
 STATIC_MODIFIER_NAME_nd_bno_dest_strait_tolls: "Strait Toll Revenues"
 STATIC_MODIFIER_DESC_nd_bno_dest_strait_tolls: "The chokepoints of Southeast Asia yield a steady stream of toll income from every vessel that passes through our waters, though maintaining these vast maritime holdings strains the treasury."
 STATIC_MODIFIER_NAME_nd_bno_dest_spice_fleets: "Spice Fleet Supremacy"
 STATIC_MODIFIER_DESC_nd_bno_dest_spice_fleets: "Our war fleets enforce a monopoly on the spice trade, compelling neighboring states to accept our terms. The constant projection of naval power comes at the cost of the realm's prestige on land."
 STATIC_MODIFIER_NAME_nd_bno_dest_island_empire: "Island Empire Administration"
 STATIC_MODIFIER_DESC_nd_bno_dest_island_empire: "A sophisticated administrative system binds the far-flung islands of our maritime empire together, integrating diverse peoples under a common crown."
 STATIC_MODIFIER_NAME_nd_bno_dest_sea_of_prahus: "Sea of Prahus"
 STATIC_MODIFIER_DESC_nd_bno_dest_sea_of_prahus: "Our war prahu fleets patrol every strait and harbor, projecting overwhelming naval force that allows us to strike anywhere in the archipelago with devastating speed."
 STATIC_MODIFIER_NAME_nd_bno_dest_river_lords: "River Lords' Dominion"
 STATIC_MODIFIER_DESC_nd_bno_dest_river_lords: "Our mastery of riverine warfare and interior logistics allows us to assault any fortification along the waterways, though the coastal navy suffers from the inland focus."
 STATIC_MODIFIER_NAME_nd_bno_dest_diamond_throne: "Diamond Throne"
 STATIC_MODIFIER_DESC_nd_bno_dest_diamond_throne: "The immense mineral wealth of Borneo's interior funds a larger army than any neighbor can field, though the inward focus limits our diplomatic reach."
 STATIC_MODIFIER_NAME_nd_bno_dest_pangeran_legacy: "Pangeran Antasari's Legacy"
 STATIC_MODIFIER_DESC_nd_bno_dest_pangeran_legacy: "The guerrilla traditions of Pangeran Antasari's resistance live on in our cavalry and jungle fighters, who can reinforce rapidly and operate on minimal funding."
 STATIC_MODIFIER_NAME_nd_bno_dest_dayak_empire: "Dayak Empire"
 STATIC_MODIFIER_DESC_nd_bno_dest_dayak_empire: "The diverse Dayak peoples have been united into a single imperial identity, with rapid recruitment, minimal supply attrition, and a stable economy."
 nd_bno_strait_citadel: "Strait Citadel"
 nd_bno_strait_citadel_desc: "A fortified harbor complex controlling one of Southeast Asia's maritime chokepoints. Stone bastions and cannon emplacements protect the anchorage while customs houses extract tolls from every vessel that passes through."
 nd_bno_citadel_upkeep: "Citadel Maintenance"
 nd_bno_citadel_upkeep_desc: "Maintaining the stone fortifications, naval stores, and customs infrastructure of a strait citadel."
 nd_bno_ironwood_fortress: "Ironwood Fortress"
 nd_bno_ironwood_fortress_desc: "A massive inland stronghold built from Bornean ironwood -- timber so dense it sinks in water and resists rot for centuries. These fortresses control the river systems of the interior, projecting power deep into the jungle."
 nd_bno_fortress_upkeep: "Fortress Maintenance"
 nd_bno_fortress_upkeep_desc: "Maintaining the ironwood palisades, watchtowers, and river-blocking chains of an interior fortress."
