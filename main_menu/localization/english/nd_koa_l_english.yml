l_english:
 STATIC_MODIFIER_NAME_nd_sword_of_the_cross: "Sword of the Cross"
 STATIC_MODIFIER_DESC_nd_sword_of_the_cross: "The banner of Christ flies over Africa. Our crusader knights are the hardened veterans of a holy war, fighting with the fervor of men who believe God marches at their side. The fortresses we build shall be the bulwarks of Christendom on a hostile shore."
 STATIC_MODIFIER_NAME_nd_african_emporium: "African Emporium"
 STATIC_MODIFIER_DESC_nd_african_emporium: "The ports of Tunis and Tripoli command the narrows of the Mediterranean. Under Christian stewardship, these ancient trading cities flourish once more. Genoese, Venetian, and Catalan merchants fill our fondaci with goods from three continents, and the wealth of Africa flows through our customs houses."
 STATIC_MODIFIER_NAME_nd_koa_bulwark_of_faith: "Bulwark of the Faith"
 STATIC_MODIFIER_DESC_nd_koa_bulwark_of_faith: "A network of fortified presidios guards every approach to our African dominions. Behind their walls, Christian settlers live in security, and no raiding party passes unchallenged."
 nd_koa.1.t: "The Cross Upon the Shore"
 nd_koa.1.d: "The ancient ports of North Africa — Carthage, Tunis, Tripoli — are ours. Where once the armies of Louis the Saint perished in the sands, where the knights of the Barbary Crusade raised their banners before Mahdia, a Christian kingdom now stands on African soil. The Mediterranean is no longer a frontier but a lake, its southern shore secured by the Cross. Yet the question of what this kingdom shall become weighs upon us. Our military orders possess hardened garrisons and mighty fortresses, while the merchant republics of Italy eye our ports with undisguised avarice. Shall we be the sword arm of Christendom in Africa, an unbreakable bulwark against the infidel? Or shall we be the bridge between continents, a trading emporium where the wealth of Africa, Europe, and the Orient mingles in our bazaars?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_koa.1.a: "Deus vult — our fortresses shall never fall!"
 nd_koa.1.b: "Commerce enriches where conquest merely destroys."
 nd_koa.2.t: "The Presidio Network"
 nd_koa.2.d: "The coastal fortifications of Crusader Africa have matured from crude stockades into a formidable system of star forts and walled presidios. From La Goletta guarding the approaches to Tunis, to the bastions of Tripoli overlooking the harbor, each fortress commands its stretch of coastline with interlocking fields of fire. Garrison commanders drill their musketeers daily, and the walls are thick enough to withstand bombardment from the heaviest Ottoman siege guns. Local converts serve alongside European soldiers, bound by shared faith and the knowledge that surrender means death or slavery. This presidio network is the backbone of Christian Africa — as long as these walls stand, the kingdom endures."
 nd_koa.2.a: "Let them break upon our walls like waves upon the shore."
 nd_koa.2.b: "Turn our fortresses into trading posts."
 nd_koa.3.t: "Marines of the Order"
 nd_koa.3.d: "The military orders of Crusader Africa have long recognized that their kingdom's survival depends on command of the sea. A new corps of Order Marines has been raised — elite soldiers trained to fight from ship to shore, scaling fortress walls from longboats, storming beach defenses, and conducting amphibious raids along hostile coastlines. Drawn from the youngest and fittest of the order's postulants, these marines combine the fanatical courage of crusading knights with the practical seamanship of Mediterranean sailors. They are the Order's fist, striking where the enemy least expects."
 nd_koa.3.a: "From sea to shore, the Cross advances."
 nd_koa_order_commanderies: "Order Commanderies"
 nd_koa_order_commanderies_desc: "The military orders of the crusade establish fortified commanderies across the conquered territory, combining castle, barracks, and monastery in a single complex."
 nd_koa_outremer_sergeants: "Outremer Sergeants"
 nd_koa_outremer_sergeants_desc: "The tradition of heavy infantry sergeants-at-arms who form the backbone of crusader field armies and garrison forces."
 nd_koa_crusader_zeal: "Crusader Zeal"
 nd_koa_crusader_zeal_desc: "The religious fervor that drives the crusader state, making wars against heathens both cheaper and more popular among the faithful."
 nd_koa_pilgrim_routes: "Pilgrim Routes"
 nd_koa_pilgrim_routes_desc: "The establishment of pilgrim hospices and way stations along the routes to the holy sites of North Africa, including the ruins of ancient Carthage."
 nd_koa_order_discipline: "Order Discipline"
 nd_koa_order_discipline_desc: "The strict monastic discipline of the military orders, where daily prayer and drill produce soldiers of exceptional steadfastness."
 nd_koa_turcopole_tradition: "Turcopole Tradition"
 nd_koa_turcopole_tradition_desc: "The practice of recruiting local converts and mixed-heritage horsemen as light cavalry, continuing the tradition first established in the Levantine crusader states."
 nd_koa_fondaco_network: "Fondaco Network"
 nd_koa_fondaco_network_desc: "A system of Italian-style merchant quarters and trading houses in the kingdom's port cities, granting commercial privileges to European merchant republics."
 nd_koa_african_diocese: "African Diocese"
 nd_koa_african_diocese_desc: "The establishment of a formal Catholic ecclesiastical hierarchy in North Africa, reviving the ancient bishoprics of Carthage and Hippo that once counted Augustine among their number."
 nd_koa_feudal_settlement: "Feudal Settlement"
 nd_koa_feudal_settlement_desc: "The systematic settlement of European colonists on fiefs granted by the crown, establishing a landed aristocracy loyal to the crusader kingdom."
 nd_koa_coral_trade: "African Coral Trade"
 nd_koa_coral_trade_desc: "The harvesting and export of precious Mediterranean red coral from the waters off the Barbary Coast, a luxury good in demand across Europe and the East."
 nd_koa_presidio_system: "Presidio System"
 nd_koa_presidio_system_desc: "A network of fortified coastal strongpoints garrisoned by professional soldiers, controlling the harbors and approaches to the kingdom's cities."
 nd_koa_corsair_fleet: "Corsair Fleet"
 nd_koa_corsair_fleet_desc: "A fleet of fast, oar-driven galleys operating from the ports of Tunis and Tripoli, patrolling the narrows of the Mediterranean and raiding hostile shipping."
 nd_koa_mediterranean_trade: "Mediterranean Trade Dominance"
 nd_koa_mediterranean_trade_desc: "Control of the central Mediterranean narrows gives Crusader Africa leverage over the trade between the eastern and western basins of the sea."
 nd_koa_olive_export: "Olive Oil Export"
 nd_koa_olive_export_desc: "The fertile lands of Ifriqiya produce abundant olive harvests, and the kingdom's oil presses supply lamp oil and cooking fat to markets across the Mediterranean."
 nd_koa_papal_patronage: "Papal Patronage"
 nd_koa_papal_patronage_desc: "As the last active crusader state, Crusader Africa enjoys a special relationship with the Holy See, receiving financial support and diplomatic backing from Rome."
 nd_koa_local_militia: "Local Militia"
 nd_koa_local_militia_desc: "The organization of local converts and second-generation settlers into militia companies for garrison duty and territorial defense."
 nd_koa_confessional_state: "Confessional State"
 nd_koa_confessional_state_desc: "The kingdom doubles down on its Catholic identity in the age of Reformation, positioning itself as a bastion of orthodoxy amid the religious upheaval of Europe."
 nd_koa_trans_mediterranean: "Trans-Mediterranean Commerce"
 nd_koa_trans_mediterranean_desc: "The kingdom's ports serve as transshipment points for goods moving between the Atlantic economies and the Levantine trade, profiting from every exchange."
 nd_koa_order_reform: "Military Order Reform"
 nd_koa_order_reform_desc: "The military orders undergo internal reforms, professionalizing their administration and separating their military, charitable, and commercial functions."
 nd_koa_star_fortification: "Star Fortification"
 nd_koa_star_fortification_desc: "Italian military engineers redesign the kingdom's defenses along modern principles, replacing medieval walls with angled bastions that deflect cannonballs."
 nd_koa_order_marines: "Order Marines"
 nd_koa_order_marines_desc: "An elite corps of amphibious soldiers trained in naval assault, coastal raids, and fortress storming operations."
 nd_koa_colonial_administration: "Colonial Administration"
 nd_koa_colonial_administration_desc: "The transition from a frontier military government to a mature colonial administration with civil courts, tax collectors, and provincial governors."
 nd_koa_naval_supremacy: "African Naval Supremacy"
 nd_koa_naval_supremacy_desc: "The kingdom's fleet dominates the central Mediterranean, its warships patrolling from Sicily to the Libyan coast."
 nd_koa_latin_culture: "Latin Cultural Mission"
 nd_koa_latin_culture_desc: "The crusader kingdom promotes European learning, founding schools and libraries that serve both the settler population and local converts."
 nd_koa_modern_fortifications: "Modern Fortifications"
 nd_koa_modern_fortifications_desc: "The kingdom's engineers adopt the latest European military science, creating layered defensive works that can withstand sustained bombardment and massed assault."
 nd_koa_african_granary: "African Granary"
 nd_koa_african_granary_desc: "The agricultural hinterland of Tunisia, once the breadbasket of Rome, is restored to full productivity under systematic European farming methods."
 nd_koa_enlightened_order: "Enlightened Order"
 nd_koa_enlightened_order_desc: "The military orders embrace Enlightenment principles of rational governance, scientific inquiry, and institutional reform while maintaining their religious foundations."
 nd_koa_mediterranean_union: "Mediterranean Union"
 nd_koa_mediterranean_union_desc: "The kingdom's unique position as a bridge between Europe and Africa enables it to broker diplomatic agreements and foster cooperation across the Mediterranean."
 a_nd_koa_sergeant: "Crusader Sergeant"
 a_nd_koa_sergeant_desc: "Armored sergeants-at-arms who form the backbone of the crusader garrison. Equipped with mail, shield, and sword, they are disciplined defenders of Christendom's African outpost."
 a_nd_koa_turcopole: "African Turcopole"
 a_nd_koa_turcopole_desc: "Light cavalry scouts recruited from local converts and settlers of mixed heritage. Fast, familiar with the terrain, and deadly with bow and javelin, they serve as the kingdom's eyes and ears."
 a_nd_koa_presidio_musketeer: "Presidio Musketeer"
 a_nd_koa_presidio_musketeer_desc: "Professional garrison infantry armed with matchlock muskets, trained to defend the presidio fortresses against assault and sally forth to break sieges."
 n_nd_koa_corsair_galley: "Corsair Galley"
 n_nd_koa_corsair_galley_desc: "A fast, heavily-armed galley built for raiding and coastal patrol. Faster than standard galleys and mounting extra bow chasers, these vessels are the terror of hostile shipping."
 a_nd_koa_order_marine: "Order Marine"
 a_nd_koa_order_marine_desc: "Elite amphibious infantry of the military orders, trained to fight from ship to shore. They storm beaches, scale fortress walls from boats, and conduct raids deep behind enemy lines."
 n_nd_koa_order_xebec: "Order Xebec"
 n_nd_koa_order_xebec_desc: "A fast, lateen-rigged warship combining galley and sailing vessel. Favored by Mediterranean navies for its speed and agility, it excels at patrol, pursuit, and coastal interdiction."
 a_nd_koa_african_spearman: "African Levy Spearman"
 a_nd_koa_african_spearman_desc: "Local recruits armed with spear and shield, drawn from the convert population and settler communities. They lack the equipment of European regulars but know the land and fight for their homes."
 nd_koa_commandery: "Order Commandery"
 nd_koa_commandery_desc: "A fortified complex serving as castle, barracks, and monastery, administered by the military orders. Knights train within its walls, pilgrims rest in its hospice, and its chapel rings with daily offices."
 nd_koa_fondaco: "Fondaco"
 nd_koa_fondaco_desc: "A merchant quarter and trading house in the Italian style, offering warehousing, lodging, and commercial facilities to European merchants operating in the kingdom's ports."
 nd_koa_crusader_cathedral: "Crusader Cathedral"
 nd_koa_crusader_cathedral_desc: "A great church built in the Romanesque or Gothic style, seat of a bishop and center of the Catholic mission in Africa. Its schools teach Latin, its scriptorium copies manuscripts, and its bells call the faithful to prayer."
 nd_koa_presidio: "Presidio Fortress"
 nd_koa_presidio_desc: "A star-shaped coastal fortress garrisoned by professional soldiers, commanding a harbor or strategic approach. Its angled bastions and interlocking fields of fire make it nearly impregnable to conventional assault."
 nd_koa_pilgrim_hospice: "Pilgrim Hospice"
 nd_koa_pilgrim_hospice_desc: "A rest house maintained by the religious orders for pilgrims, travelers, and the sick. It provides food, shelter, and basic medical care along the roads of Crusader Africa."
 nd_koa_grain_warehouse: "Grain Warehouse"
 nd_koa_grain_warehouse_desc: "A fortified storehouse for the kingdom's wheat harvest, facilitating bulk export across the Mediterranean. The grain trade made Roman Africa wealthy, and the crusaders revive it."
 nd_koa_african_academy: "African Academy"
 nd_koa_african_academy_desc: "An institution of learning founded by the reformed military orders, combining European scholarship with practical instruction in navigation, engineering, and natural philosophy."
 nd_koa_coral_harvesting: "Coral Harvesting"
 nd_koa_coral_harvesting_desc: "Divers and dragnet fishermen harvest precious red coral from the Mediterranean seabed off the Barbary Coast, consuming fish as provisions, pottery for storage vessels, and tools for the diving equipment and nets."
 nd_koa_olive_pressing: "Olive Oil Pressing"
 nd_koa_olive_pressing_desc: "Stone presses crush the abundant olive harvest of Ifriqiya into oil for export, consuming olives from the orchards, pottery amphoras for the oil, and tools to maintain the press machinery."
 levy_nd_koa_turcopole: "African Turcopole Levy"
 levy_nd_koa_turcopole_desc: "Light cavalry raised from local converts and mixed-heritage settlers, serving as scouts and skirmishers for the crusader armies."
 levy_nd_koa_african_spearman: "African Spearman Levy"
 levy_nd_koa_african_spearman_desc: "Militia infantry drawn from the settled convert population, armed with spear and shield for garrison and territorial defense."
 nd_koa_commandery_maintenance: "Commandery Upkeep"
 nd_koa_commandery_maintenance_desc: "Maintaining the fortifications, armory, and garrison of a military-religious commandery, supplying stone for repairs, weaponry for the armory, and leather for soldier equipment."
 nd_koa_fondaco_operations: "Fondaco Operations"
 nd_koa_fondaco_operations_desc: "Operating a merchant trading house, managing imports of cloth and dyes from the Mediterranean and maintaining trading records on paper."
 nd_koa_cathedral_maintenance: "Cathedral Upkeep"
 nd_koa_cathedral_maintenance_desc: "Maintaining the stonework, liturgical needs, and scholarly activities of a crusader cathedral, requiring stone for construction, paper for the scriptorium, and beeswax for the candles that burn at every altar."
 nd_koa_presidio_upkeep: "Presidio Upkeep"
 nd_koa_presidio_upkeep_desc: "Maintaining the heavy fortifications and garrison armory of a coastal defense presidio."
 nd_koa_hospice_operations: "Hospice Operations"
 nd_koa_hospice_operations_desc: "Providing wool blankets, wheat bread, and candlelit shelter for pilgrims and the sick at a roadside hospice along the roads of Crusader Africa."
 nd_koa_warehouse_operations: "Warehouse Operations"
 nd_koa_warehouse_operations_desc: "Storing and distributing grain for Mediterranean trade, consuming wheat as the stored commodity, lumber for crates and barrel staves, and salt to preserve the grain on long sea voyages."
 nd_koa_academy_operations: "Academy Operations"
 nd_koa_academy_operations_desc: "Providing books, paper, and glass instruments for an Enlightenment academy combining European scholarship with instruction in navigation, engineering, and natural philosophy."
 STATIC_MODIFIER_NAME_nd_koa_presidio_trade: "Presidio Trade"
 STATIC_MODIFIER_DESC_nd_koa_presidio_trade: "The coastal presidios serve a dual purpose — their walls protect not only soldiers but merchants, and their harbors become thriving trade centers where African and European goods change hands."
 nd_koa_formed_tt: "Crusader Africa has been formed"
 nd_koa_path_a_tt: "Chose Sword of the Cross"
 nd_koa_path_b_tt: "Chose African Emporium"
 nd_koa_destiny: "Destiny of Crusader Africa"
 nd_koa_destiny_desc: "The crusader kingdom has been forged in blood and faith. Now its destiny beckons — whether through the sword or through the ledger, Crusader Africa shall leave its mark upon the world."
 nd_koa_dest_sicily: "The Sicilian Bridgehead"
 nd_koa_dest_sicily_desc: "Sicily and Malta command the narrows of the Mediterranean. Seize them, and no fleet sails between east and west without our leave. Control Syracuse and Malta with a strong army to secure the central Mediterranean."
 nd_koa_dest_outremer: "Outremer Reborn"
 nd_koa_dest_outremer_desc: "The crusader kingdom reaches beyond Africa. Cyprus, the last outpost of the old Lusignan dynasty, must fly our banner. Take Famagusta and Nicosia to establish a new Outremer stretching from Africa to the Levantine shore."
 nd_koa_dest_jerusalem: "Kingdom of Jerusalem"
 nd_koa_dest_jerusalem_desc: "The ultimate prize of every crusade — the Holy City itself. From Africa to Antioch, plant the Cross upon the walls of Jerusalem, Acre, and Antioch to fulfill the crusading dream that began at Clermont."
 nd_koa_dest_narrows: "Master of the Narrows"
 nd_koa_dest_narrows_desc: "The ports of Tunis and Tripoli sit upon the Mediterranean's waist, where every trade route must pass. Bring silk into your markets, fill your treasury, and prove that commerce is mightier than the sword."
 nd_koa_dest_banking: "The African Bourse"
 nd_koa_dest_banking_desc: "Italian banking houses have established branches in our ports, and the wealth of three continents flows through our customs. Embrace the banking institution and develop your lands to become the Mediterranean's financial center."
 nd_koa_dest_emporium: "Emporium Mundi"
 nd_koa_dest_emporium_desc: "The ancient dream of a universal emporium — where the goods of Africa, Asia, and Europe change hands in a single marketplace. Seize Alexandria, attract the incense trade, amass a great fortune, and develop your dominion into the richest realm on the Mediterranean shore."
 nd_koa.4.t: "A Kingdom Forged"
 nd_koa.4.d: "Crusader Africa stands. Where the Vandals, Byzantines, and Normans all tried and failed, we have carved a lasting Christian kingdom from the shores of Ifriqiya. Our banners fly from the walls of Tunis, our bells ring from the minarets we have consecrated as churches, and the Pope himself has blessed our enterprise. This is no temporary beachhead — this is a state, with laws, lands, and a destiny of its own."
 nd_koa.4.a: "Our destiny is only beginning."
 nd_koa.5.t: "The Fall of Sicily"
 nd_koa.5.d: "The great island fortress of Sicily has fallen to our armies. Syracuse, where Archimedes defied Rome, now opens its gates to the Cross of Africa. Malta, that barren rock in the narrows, is ours as well — and with it, mastery of every sea lane between the eastern and western Mediterranean. Our galley captains report that no hostile fleet can pass the Sicilian narrows without our knowledge and consent. The central sea is ours."
 nd_koa.5.a: "The narrows belong to Christ."
 nd_koa.6.t: "The Silk Roads of the Sea"
 nd_koa.6.d: "Silk from the East, carried by Genoese and Venetian merchantmen, now passes through our ports. The customs houses of Tunis and Tripoli are filled with bales of shimmering fabric destined for the markets of Christendom. Our position at the Mediterranean's waist gives us leverage over every trade route — and our treasury swells with the duties we collect."
 nd_koa.6.a: "Let the wealth of the world flow through our ports."
 nd_koa.7.t: "The New Outremer"
 nd_koa.7.d: "Cyprus is ours. The island where Richard the Lionheart once planted his banner, where the Lusignan kings built their doomed kingdom, where the Venetians grew rich on sugar and wine — all of it now belongs to the African crusade. Our chain of fortresses stretches from Tripoli to Famagusta, an unbroken line of Christian steel across the Mediterranean. The question now is how to use this power. Some counsel that we press on immediately, maintaining the momentum of holy war. Others argue that we should dig in, fortify what we hold, and build the garrisons that will hold these islands for centuries."
 nd_koa.7.a: "Press the crusade forward without pause."
 nd_koa.7.b: "Fortify and garrison every approach."
 nd_koa.8.t: "The Lombard Connection"
 nd_koa.8.d: "Italian banking houses — Florentine, Genoese, Sienese — have opened permanent offices in our ports, drawn by the volume of trade flowing through the African narrows. Their letters of credit and bills of exchange oil the wheels of our commerce, while their capital finances new warehouses, docks, and market halls. We stand at a crossroads in how to manage this wealth. We might embrace the Italian banking model fully, adopting their sophisticated financial instruments and sound monetary policy. Or we might leverage our naval position more aggressively, using our corsair fleet to protect — and tax — the Mediterranean sea lanes."
 nd_koa.8.a: "Embrace Italian banking and sound finance."
 nd_koa.8.b: "Let our fleet make the sea lanes profitable."
 nd_koa.9.t: "The Cross Upon the Holy City"
 nd_koa.9.d: "Jerusalem. The word alone is worth more than a thousand arguments. The city where Christ walked, where Solomon built his temple, where Godfrey of Bouillon wept tears of joy upon its walls — it is ours. The African crusade, which began as an improbable beachhead on the shores of Tunis, has achieved what no Christian power has managed since Saladin's conquest. Acre, Antioch, Jerusalem — the entire Outremer is reborn under the banner of Crusader Africa. Now the question becomes: what shall this achievement mean? A perpetual war to expand the Kingdom of Heaven on Earth? Or a lasting peace, a Pax Christiana where the sword is sheathed and the Cross rules through justice?"
 nd_koa.9.a: "The crusade never ends — Deus vult!"
 nd_koa.9.b: "Let us build a lasting peace in the Holy Land."
 nd_koa.10.t: "Emporium of the World"
 nd_koa.10.d: "The ancient dream is realized. Alexandria's harbor, once the gateway to the riches of the East, now flies our flag. Incense from Arabia, spices from India, silk from China — all of it passes through our customs houses on its way to the hungry markets of Europe. Our ports are the busiest in the Mediterranean, our merchants the wealthiest, our banks the most trusted. The question now is how to use this position. We might declare our ports free — open to all nations, exempt from the petty tariffs and trade wars that cripple commerce elsewhere. Or we might leverage our monopoly position to finance colonial ventures beyond the Mediterranean, reaching toward the wealth of the Atlantic and the Indian Ocean."
 nd_koa.10.a: "Declare our ports open to all the world."
 nd_koa.10.b: "Finance colonial ventures beyond the sea."
 STATIC_MODIFIER_NAME_nd_koa_dest_crusade_momentum: "Crusade Momentum"
 STATIC_MODIFIER_DESC_nd_koa_dest_crusade_momentum: "The holy war gains unstoppable momentum — armies reinforce quickly, the faithful bear the costs of war gladly, and the realm holds steady under the strain of constant campaigning."
 STATIC_MODIFIER_NAME_nd_koa_dest_garrison_doctrine: "Garrison Doctrine"
 STATIC_MODIFIER_DESC_nd_koa_dest_garrison_doctrine: "Every conquered territory is immediately fortified and garrisoned, with supply lines extended to maintain the new positions. The navy is neglected in favor of this land-focused approach."
 STATIC_MODIFIER_NAME_nd_koa_dest_kingdom_of_heaven: "Kingdom of Heaven"
 STATIC_MODIFIER_DESC_nd_koa_dest_kingdom_of_heaven: "The crusader kingdom claims divine mandate to wage holy war wherever the infidel holds sway. Wars are cheaper to declare and causes for war easier to find, though the constant militarism breeds a certain complacency at court."
 STATIC_MODIFIER_NAME_nd_koa_dest_pax_christiana: "Pax Christiana"
 STATIC_MODIFIER_DESC_nd_koa_dest_pax_christiana: "The crusader kingdom imposes a Christian peace across the Levant, backed by diplomatic leverage and an extensive intelligence network that keeps potential rivals off-balance."
 STATIC_MODIFIER_NAME_nd_koa_dest_lombard_banking: "Lombard Banking"
 STATIC_MODIFIER_DESC_nd_koa_dest_lombard_banking: "Italian financial expertise stabilizes the kingdom's economy, offering favorable loan terms and keeping inflation in check while binding subject territories through economic dependence."
 STATIC_MODIFIER_NAME_nd_koa_dest_corsair_commerce: "Corsair Commerce"
 STATIC_MODIFIER_DESC_nd_koa_dest_corsair_commerce: "The kingdom's warships double as merchant escorts and customs enforcers, ensuring that the sea lanes remain profitable and that devastation from piracy is quickly repaired."
 STATIC_MODIFIER_NAME_nd_koa_dest_free_port: "Free Port of Africa"
 STATIC_MODIFIER_DESC_nd_koa_dest_free_port: "The ports of Crusader Africa are declared open to all nations, attracting merchants from every corner of the Mediterranean with promises of low tariffs and diplomatic neutrality."
 STATIC_MODIFIER_NAME_nd_koa_dest_colonial_enterprise: "Colonial Enterprise"
 STATIC_MODIFIER_DESC_nd_koa_dest_colonial_enterprise: "The wealth of Mediterranean trade finances colonial ventures beyond the familiar sea, reducing the costs of distant outposts and extending the kingdom's commercial reach into new markets."
 nd_koa_holy_land_command: "Holy Land Command"
 nd_koa_holy_land_command_desc: "The supreme military headquarters of the crusading orders in the reconquered Holy Land, coordinating garrison defense, levy recruitment, and the fortification of conquered territory across the entire Outremer."
 nd_koa_command_maintenance: "Command Upkeep"
 nd_koa_command_maintenance_desc: "Maintaining the fortifications, armory, and command staff of the supreme crusader headquarters, requiring stone for walls, weaponry and firearms for the arsenal, and leather for equipment."
 nd_koa_mediterranean_exchange: "Mediterranean Exchange"
 nd_koa_mediterranean_exchange_desc: "A grand commercial exchange where merchants from across the Mediterranean conduct business, exchange currencies, and negotiate contracts. Its marble halls and counting rooms are the beating heart of African commerce."
 nd_koa_exchange_operations: "Exchange Operations"
 nd_koa_exchange_operations_desc: "Operating a grand commercial exchange, requiring paper for contracts and ledgers, cloth for merchant displays, glass for the counting rooms, and furniture for the trading halls."
