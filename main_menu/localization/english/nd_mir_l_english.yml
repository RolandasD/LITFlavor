l_english:
 STATIC_MODIFIER_NAME_nd_hasina_of_the_highlands: "Hasina of the Highlands"
 STATIC_MODIFIER_DESC_nd_hasina_of_the_highlands: "The sacred power of the highlands flows through the centralized state. Through irrigation, codified law, and the divine mandate of the andriana, the kingdom transforms its mountain heartland into the breadbasket of an island nation."
 STATIC_MODIFIER_NAME_nd_island_of_a_thousand_ports: "Island of a Thousand Ports"
 STATIC_MODIFIER_DESC_nd_island_of_a_thousand_ports: "Madagascar's coasts are alive with outrigger canoes carrying goods across the Mozambique Channel and beyond. Following the Sakalava tradition, the unified island projects power across the Indian Ocean through naval supremacy and merchant fleets."
 STATIC_MODIFIER_NAME_nd_sorabe_scholarly_tradition: "Sorabe Scholarly Tradition"
 STATIC_MODIFIER_DESC_nd_sorabe_scholarly_tradition: "The Antemoro scholars have brought the art of writing to the court, recording laws, prophecies, and histories in the Arabic-Malagasy Sorabe script."
 STATIC_MODIFIER_NAME_nd_fanompoana_state_labor: "Fanompoana State Labor"
 STATIC_MODIFIER_DESC_nd_fanompoana_state_labor: "The crown commands the labor of its subjects for public works — irrigation canals, roads, fortifications, and military service. The state grows powerful, but the cost falls heavy on the common people."
 STATIC_MODIFIER_NAME_nd_fanompoana_commuted_taxes: "Fanompoana Commuted to Taxes"
 STATIC_MODIFIER_DESC_nd_fanompoana_commuted_taxes: "Rather than demanding labor directly, the crown accepts payment in rice and silver. The people prosper in their freed time, and the treasury swells with the fruits of a more efficient economy."
 nd_mir.1.t: "The Unification of Madagascar"
 nd_mir.1.d: "The great island stands unified at last. For generations, the Merina of the highlands, the Sakalava of the western coasts, the Betsileo of the southern mountains, and the Antemoro scholars of the southeast each built kingdoms of their own. Now, through conquest, diplomacy, and the sacred authority of hasina, one ruler commands them all.\n\nBut unification poses a fundamental question. Madagascar's strength has always been dual — the productive highland rice terraces that feed millions, and the vast coastline whose outrigger fleets connect the island to the trade routes of the Indian Ocean. The new kingdom must choose which of these traditions will define its character.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mir.1.a: "We shall cultivate the highlands and rule from the sacred hills."
 nd_mir.1.b: "We shall command the seas from a thousand ports."
 nd_mir.2.t: "The Sorabe Manuscripts"
 nd_mir.2.d: "The Antemoro scholars of the southeastern coast are the keepers of a remarkable tradition. Descended from Arab and Swahili merchants who settled at the mouth of the Matitanana River, they developed the Sorabe — a system of writing the Malagasy language using Arabic script. Their manuscripts record not only religious texts but also astrological charts, medical remedies, genealogies, and the histories of kings.\n\nRecognizing the power of literacy, the court has invited Antemoro ombiasy to serve as scribes, astrologers, and advisors. For the first time, the laws of the kingdom and the pronouncements of its rulers will be recorded in writing, bringing order and permanence to what was once transmitted only through oral tradition."
 nd_mir.2.a: "Let the wisdom of the Sorabe illuminate our court."
 nd_mir.3.t: "The Question of Fanompoana"
 nd_mir.3.d: "The fanompoana — the system of corvee labor owed by all free subjects to the crown — has been the engine of the kingdom's growth. Through fanompoana, irrigation canals have been dug, fortifications raised, roads cut through the jungle, and armies marched to war. Every great work of the state has been built on the backs of its people.\n\nBut the system strains under its own weight. Farmers pulled from their fields during planting season return to find their families hungry. Artisans conscripted to distant construction sites cannot ply their trades. The question now confronting the crown is whether to intensify fanompoana to fuel greater ambitions, or to commute the obligation into taxes paid in rice and coin — freeing the people to labor for themselves while still filling the royal treasury."
 nd_mir.3.a: "The labor of the people is the foundation of the state."
 nd_mir.3.b: "Let them pay in rice and silver instead."
 nd_mir.4.t: "The Sacred Hill of Ambohimanga"
 nd_mir.4.d: "Rising from the central highlands northeast of Antananarivo, the fortified hill of Ambohimanga has become the spiritual heart of the kingdom. Its rova — a complex of wooden palaces, stone walls, and sacred enclosures — embodies the union of political authority and ancestral power that defines Malagasy kingship.\n\nThe great gates of Ambohimanga, sealed each night by rolling a massive stone disc across the entrance, guard not merely a settlement but a concept: that the land itself is sacred, and that those who rule from its heights do so with the blessing of the razana — the ancestors who watch over their descendants from the world beyond."
 nd_mir.4.a: "Ambohimanga shall stand as our eternal citadel."
 nd_mir.5.t: "The Modernization of the Kingdom"
 nd_mir.5.d: "A new wind blows through the highlands. Inspired by contact with European powers — particularly the British, who have sent military advisors and missionaries — the crown undertakes a sweeping program of modernization. Merina soldiers drill in European formations, learning to fire muskets in disciplined volleys rather than the traditional warrior charges.\n\nBeyond the military, the reforms touch every aspect of the kingdom. A Latin alphabet replaces the Sorabe script for official correspondence. Schools open to teach reading and arithmetic. Artisans are organized into workshops producing goods for the state. The old ways are not abandoned — the fady still govern daily life, and the ancestors still watch from Ambohimanga — but they are joined now by new techniques and new ambitions."
 nd_mir.5.a: "We shall master the tools of the modern world."
 nd_mir_austronesian_seafaring: "Austronesian Seafaring Heritage"
 nd_mir_austronesian_seafaring_desc: "The ancestors crossed the Indian Ocean in outrigger canoes. Their descendants maintain this seafaring tradition along Madagascar's coasts."
 nd_mir_vazimba_legacy: "Legacy of the Vazimba"
 nd_mir_vazimba_legacy_desc: "The highland warriors who displaced the first inhabitants of Madagascar forged a martial tradition of spear and shield that endures in the Mpiambina companies."
 nd_mir_irrigated_rice_paddies: "Irrigated Rice Paddies"
 nd_mir_irrigated_rice_paddies_desc: "The Betsileo technique of terraced, irrigated rice cultivation transforms the highland valleys into the most productive farmland in the Indian Ocean."
 nd_mir_zebu_cattle_tradition: "Zebu Cattle Tradition"
 nd_mir_zebu_cattle_tradition_desc: "Zebu cattle are wealth, status, and sacred obligation in Malagasy society. Their horns crown royal tombs, their meat feeds the living, and their hides bind the Sorabe manuscripts."
 nd_mir_fady_taboo_system: "Fady Taboo System"
 nd_mir_fady_taboo_system_desc: "The elaborate system of fady — ancestral taboos governing behavior, food, places, and time — binds Malagasy society together through shared spiritual obligation."
 nd_mir_andriana_caste_system: "Andriana Caste Order"
 nd_mir_andriana_caste_system_desc: "The codification of the andriana noble caste, the hova freemen, and the andevo servile class creates a stable social hierarchy rooted in ancestral status and royal decree."
 nd_mir_highland_settlement: "Highland Settlement"
 nd_mir_highland_settlement_desc: "The central highlands offer natural defenses, fertile soil, and freedom from the malaria that plagues the coasts — drawing settlement and population growth."
 nd_mir_fokonolona_governance: "Fokon'olona Village Assemblies"
 nd_mir_fokonolona_governance_desc: "The fokon'olona — village councils of elders and notables — govern local affairs through consensus, mediating disputes and organizing communal labor long before any king claimed sovereignty over them."
 nd_mir_highland_ironworking: "Highland Ironworking"
 nd_mir_highland_ironworking_desc: "The smiths of the highlands smelt iron from laterite ores using charcoal furnaces, producing the tools, weapons, and agricultural implements that sustain the kingdom."
 nd_mir_lamba_silk_weaving: "Lamba Silk Weaving"
 nd_mir_lamba_silk_weaving_desc: "The lamba — a woven silk or cotton cloth worn as a shawl by the living and as a shroud for the dead — is the supreme expression of Malagasy textile artistry. The finest lamba akotofahana take months to weave."
 nd_mir_sorabe_writing: "Sorabe Writing Tradition"
 nd_mir_sorabe_writing_desc: "The Antemoro ombiasy developed the Sorabe script — Malagasy written in Arabic characters — to record astrology, medicine, history, and royal genealogies."
 nd_mir_antemoro_astrologers: "Antemoro Court Astrologers"
 nd_mir_antemoro_astrologers_desc: "Antemoro ombiasy serve as astrologers and advisors at the courts of Malagasy kings, reading the vintana — the destiny written in the stars and the phases of the moon."
 nd_mir_sakalava_expansion: "Sakalava Expansion"
 nd_mir_sakalava_expansion_desc: "The Sakalava kingdoms of Menabe and Boina expand aggressively along the western coast, their warriors moving swiftly through a landscape they know intimately."
 nd_mir_indian_ocean_contacts: "Indian Ocean Trade Contacts"
 nd_mir_indian_ocean_contacts_desc: "Arab, Swahili, and later European merchants call at Madagascar's ports, trading cloth, pottery, and metal goods for rice, cattle, beeswax, and enslaved captives."
 nd_mir_outrigger_war_fleets: "Outrigger War Fleets"
 nd_mir_outrigger_war_fleets_desc: "Sakalava war canoes — large outrigger lakana carrying thirty or more warriors — range across the Mozambique Channel in great seasonal raiding fleets, striking the Comoros and the East African coast."
 nd_mir_rova_fortification: "Rova Fortification"
 nd_mir_rova_fortification_desc: "The hilltop rova complexes — fortified palace-citadels of stone, timber, and hardened clay — combine political residence with military strongpoint, their massive stone disc gates sealed each night."
 nd_mir_menabe_boina_kingdoms: "Menabe and Boina Kingdoms"
 nd_mir_menabe_boina_kingdoms_desc: "The two great Sakalava kingdoms — Menabe in the south and Boina in the north — together dominate western Madagascar and extend their influence across the island."
 nd_mir_hasina_sacred_power: "Hasina Sacred Authority"
 nd_mir_hasina_sacred_power_desc: "Hasina — the sacred power flowing from the ancestors through the ruling dynasty — legitimizes royal authority and transforms political obedience into spiritual obligation."
 nd_mir_slave_trade_profits: "Indian Ocean Slave Trade"
 nd_mir_slave_trade_profits_desc: "The Mascarene plantation economies of Reunion and Mauritius create insatiable demand for enslaved laborers, which Malagasy kingdoms fill for substantial profit."
 nd_mir_coastal_raiding: "Coastal Raiding Tradition"
 nd_mir_coastal_raiding_desc: "Malagasy raiders in outrigger fleets descend on coastal settlements across the western Indian Ocean, seizing captives and goods in lightning strikes before withdrawing to sea."
 nd_mir_trano_gasy_architecture: "Trano Gasy Architecture"
 nd_mir_trano_gasy_architecture_desc: "The trano gasy — the traditional Malagasy house of brick, timber, and thatch, oriented north-south according to cosmic principles — evolves into an aristocratic architectural tradition in the highlands."
 nd_mir_fanompoana_system: "Fanompoana Labor System"
 nd_mir_fanompoana_system_desc: "The fanompoana — corvee labor owed by all free subjects to the crown — builds canals, roads, and fortifications, and raises armies. It is the engine of state power and the burden of the common people."
 nd_mir_standing_army_reform: "Standing Army Reform"
 nd_mir_standing_army_reform_desc: "The crown raises permanent regiments — the tafika — armed with a mix of traditional spears and acquired muskets, drilling them into a disciplined standing force."
 nd_mir_antananarivo_capital: "Antananarivo as Capital"
 nd_mir_antananarivo_capital_desc: "The city on the thousand hills becomes the undisputed capital of a unified Madagascar, its markets, palaces, and workshops drawing population from across the island."
 nd_mir_betsileo_integration: "Betsileo Integration"
 nd_mir_betsileo_integration_desc: "The conquered Betsileo kingdoms are integrated into the Merina state, their agricultural expertise — especially terraced rice cultivation — enriching the unified kingdom."
 nd_mir_musket_acquisition: "Musket Acquisition and Manufacture"
 nd_mir_musket_acquisition_desc: "Through trade with Europeans and the forced labor of skilled ironworkers, the kingdom acquires and maintains a growing arsenal of firearms."
 nd_mir_channel_trade_control: "Mozambique Channel Trade"
 nd_mir_channel_trade_control_desc: "Control of the ports along Madagascar's western coast gives the kingdom leverage over the trade routes crossing the Mozambique Channel between Africa and the Indian Ocean."
 nd_mir_andrianampoinimerina_reforms: "Andrianampoinimerina's Reforms"
 nd_mir_andrianampoinimerina_reforms_desc: "The great unifier codifies law, reorganizes the caste system, builds irrigation works, and establishes a centralized administration — transforming a highland chiefdom into a kingdom worthy of the name."
 nd_mir_radama_modernization: "Radama's Modernization"
 nd_mir_radama_modernization_desc: "King Radama embraces European military techniques, inviting British advisors to train his army in musket drill, formation tactics, and disciplined warfare."
 nd_mir_british_alliance: "British Alliance"
 nd_mir_british_alliance_desc: "The Anglo-Merina treaty of 1820 exchanges the abolition of the slave trade for British military assistance, diplomatic recognition, and access to modern technology."
 nd_mir_merina_hegemony: "Merina Hegemony"
 nd_mir_merina_hegemony_desc: "The Merina kingdom extends its authority over two-thirds of Madagascar through military conquest and administrative integration, bringing the coastal peoples under highland control."
 nd_mir_malagasy_literacy: "Malagasy Literacy Campaign"
 nd_mir_malagasy_literacy_desc: "Protestant missionaries and royal schools spread literacy across the highlands, replacing the Sorabe script with a Latin alphabet and opening education beyond the Antemoro scholarly caste."
 nd_mir_rice_surplus_economy: "Rice Surplus Economy"
 nd_mir_rice_surplus_economy_desc: "Expanded irrigation and intensive terraced farming produce rice surpluses that fuel population growth, urban specialization, and export trade."
 nd_mir_coast_conquest: "Coastal Conquest"
 nd_mir_coast_conquest_desc: "The Merina navy projects highland power to the coasts, securing ports and trade routes that connect the unified kingdom to the wider Indian Ocean world."
 nd_mir_ranavalona_isolation: "Ranavalona's Defiant Isolation"
 nd_mir_ranavalona_isolation_desc: "Queen Ranavalona I expels foreign missionaries and traders, seals the kingdom against European encroachment, and maintains independence through military strength and ruthless self-sufficiency."
 nd_mir_malagasy_industrialization: "Malagasy Proto-Industrialization"
 nd_mir_malagasy_industrialization_desc: "State-organized workshops produce textiles, soap, bricks, and metalwork for domestic consumption, reducing dependence on imported goods."
 nd_mir_unified_kingdom: "Unified Kingdom of Madagascar"
 nd_mir_unified_kingdom_desc: "A single administrative apparatus governs the entire island, with local governors appointed by the crown replacing the independent kings of old."
 nd_mir_port_modernization: "Port Modernization"
 nd_mir_port_modernization_desc: "The kingdom modernizes its coastal harbors to handle larger vessels and greater trade volumes, connecting Madagascar to global commerce."
 nd_mir_malagasy_sovereignty: "Malagasy Sovereignty"
 nd_mir_malagasy_sovereignty_desc: "An independent Madagascar, governed by its own laws and traditions, commands respect among the nations of the Indian Ocean."
 nd_mir_cultural_renaissance: "Malagasy Cultural Renaissance"
 nd_mir_cultural_renaissance_desc: "The synthesis of highland and coastal, Austronesian and African, traditional and modern traditions creates a distinctive Malagasy cultural identity that transcends the old ethnic divisions."
 n_nd_mir_lakana: "Lakana"
 n_nd_mir_lakana_desc: "The lakana is the traditional Malagasy outrigger canoe, descended directly from the vessels that carried the first Austronesian settlers across the Indian Ocean. Light, fast, and perfectly adapted to coastal waters."
 a_nd_mir_mpiambina: "Mpiambina Warriors"
 a_nd_mir_mpiambina_desc: "Highland spear warriors who form the backbone of Merina levies. Armed with iron-tipped spears and ox-hide shields, they fight with the ferocity of men defending their ancestral hills."
 n_nd_mir_lakana_raider: "Lakana Raider"
 n_nd_mir_lakana_raider_desc: "A larger war canoe designed for cross-channel raiding expeditions. These outriggers carry thirty or more warriors and can outrun any European vessel in shallow coastal waters."
 a_nd_mir_tafika: "Tafika Regulars"
 a_nd_mir_tafika_desc: "The standing regiments of the Merina army, armed with a mix of traditional spears and traded muskets. Drilled and disciplined, they are the instrument of royal authority."
 a_nd_mir_merina_musketeers: "Merina Musketeers"
 a_nd_mir_merina_musketeers_desc: "Soldiers trained in European musket drill by British military advisors under King Radama's modernization program. They fire in disciplined volleys and hold formation under fire."
 nd_mir_rice_terrace: "Rice Terrace"
 nd_mir_rice_terrace_desc: "Irrigated terraced rice paddies carved into the highland hillsides, fed by carefully maintained canal systems. The Betsileo perfected this technique into the most productive farming in the Indian Ocean."
 nd_mir_rice_terrace_maintenance: "Terrace Irrigation"
 nd_mir_rice_terrace_maintenance_desc: "Maintaining the terrace walls, irrigation channels, and farming tools requires constant upkeep."
 nd_mir_rova: "Rova Citadel"
 nd_mir_rova_desc: "A fortified hilltop palace complex of stone walls, timber halls, and sacred enclosures. The rova combines military strongpoint with royal residence and spiritual center — its massive stone disc gates sealed each night against intruders."
 nd_mir_rova_upkeep: "Rova Maintenance"
 nd_mir_rova_upkeep_desc: "The stone walls and timber structures of the rova require continuous repair and reinforcement."
 nd_mir_lamba_workshop: "Lamba Weaving House"
 nd_mir_lamba_workshop_desc: "A workshop dedicated to weaving the lamba — the distinctive Malagasy silk and cotton cloth. The finest lamba akotofahana, with their intricate geometric patterns, take months to complete on traditional looms."
 nd_mir_lamba_production: "Lamba Production"
 nd_mir_lamba_production_desc: "Weaving fine silk with natural dyes into the lamba akotofahana, the prized cloth of Malagasy nobility."
 nd_mir_fokonolona_hall: "Fokon'olona Assembly Hall"
 nd_mir_fokonolona_hall_desc: "A gathering place for the fokon'olona — the village council of elders that governs local affairs through consensus. Here disputes are mediated, communal labor organized, and the fady observed."
 nd_mir_fokonolona_upkeep: "Assembly Maintenance"
 nd_mir_fokonolona_upkeep_desc: "The village assembly hall requires upkeep and timber for repairs."
 nd_mir_trano_gasy: "Trano Gasy Estate"
 nd_mir_trano_gasy_desc: "The trano gasy — the traditional Malagasy house of fired brick and timber, oriented along the cardinal directions according to cosmic principles — serves as the architectural expression of aristocratic status in the highlands."
 nd_mir_trano_gasy_upkeep: "Estate Maintenance"
 nd_mir_trano_gasy_upkeep_desc: "Maintaining the timber frame and brick walls of the aristocratic estate."
 nd_mir_zebu_ranching_pm: "Zebu Cattle Ranching"
 nd_mir_zebu_ranching_pm_desc: "Zebu cattle — with their distinctive humped backs — are central to Malagasy life. They provide meat, milk, hides, and horn, and serve as the primary measure of wealth and status."
 nd_mir_iron_smelting_pm: "Highland Iron Smelting"
 nd_mir_iron_smelting_pm_desc: "Highland smiths smelt iron in charcoal furnaces, forging the tools and agricultural implements that sustain the kingdom."
 nd_mir_indian_ocean_goods_pm: "Indian Ocean Goods Trade"
 nd_mir_indian_ocean_goods_pm_desc: "Imported silks, dyes, and pottery from Indian Ocean traders are woven and finished into distinctive Malagasy textiles."
 levy_nd_mir_lakana: "Lakana Coastal Levy"
 levy_nd_mir_lakana_desc: "Coastal villagers manning their outrigger canoes in service of the crown."
 levy_nd_mir_mpiambina: "Mpiambina Highland Levy"
 levy_nd_mir_mpiambina_desc: "Highland peasants and soldiers mustered as traditional spear warriors."
 nd_mir_tsena_market: "Tsena Market"
 nd_mir_tsena_market_desc: "A bustling central marketplace where rice, cattle, cloth, and imported goods change hands. The tsena draws merchants from across the island and connects highland producers to coastal traders."
 nd_mir_tsena_upkeep: "Market Stalls"
 nd_mir_tsena_upkeep_desc: "Maintaining the timber stalls and pottery displays of the marketplace."
 nd_mir_musket_workshop: "Musket Workshop"
 nd_mir_musket_workshop_desc: "A specialized iron-working facility where skilled artisans — conscripted through fanompoana — repair imported muskets, manufacture spearheads, and forge the weapons that arm the kingdom's expanding military."
 nd_mir_musket_workshop_input: "Arms Manufacture"
 nd_mir_musket_workshop_input_desc: "Forging iron and reworking imported weapons into serviceable firearms for the kingdom's armies."
 nd_mir_sekoly: "Sekoly School"
 nd_mir_sekoly_desc: "An educational institution where missionaries and royal teachers instruct students in reading, writing, and arithmetic, spreading literacy beyond the traditional Antemoro scholarly caste."
 nd_mir_sekoly_upkeep: "School Supplies"
 nd_mir_sekoly_upkeep_desc: "Paper and timber for the school's instruction and upkeep."
 nd_mir_musket_repair_pm: "Malagasy Arms Manufacture"
 nd_mir_musket_repair_pm_desc: "State-organized workshops manufacturing and repairing firearms and ammunition for the kingdom's expanding military."
 nd_mir_fanompoana_labor_pm: "Fanompoana Labor Organization"
 nd_mir_fanompoana_labor_pm_desc: "The systematic direction of corvee labor toward state construction projects — canals, roads, fortifications, and royal buildings."
 nd_mir_textile_export_pm: "Malagasy Textile Exports"
 nd_mir_textile_export_pm_desc: "Dyeing and finishing the kingdom's distinctive cloth into fine textiles for export through coastal ports."
 nd_mir_rice_surplus_pm: "Rice Surplus Trade"
 nd_mir_rice_surplus_pm_desc: "The terraced paddies yield abundant harvests. Careful irrigation and skilled farming produce rice that flows down to the coastal markets."
 nd_mir_formed_tt: "Madagascar has been formed"
 nd_mir_path_a_tt: "Chose Hasina of the Highlands"
 nd_mir_path_b_tt: "Chose Island of a Thousand Ports"
 nd_mir_destiny: "Destiny of Madagascar"
 nd_mir_destiny_desc: "The great island is unified. Now its people must choose how to wield that unity -- whether to deepen the roots of the highland kingdom or cast their outrigger sails across the Indian Ocean."
 nd_mir_dest_highland_consolidation: "Highland Consolidation"
 nd_mir_dest_highland_consolidation_desc: "The rice terraces of the highlands must become the foundation of a prosperous centralized state. Fill the royal granaries, develop the interior, and ensure rice flows through the capital's markets."
 nd_mir_dest_highland_dominion: "Highland Dominion"
 nd_mir_dest_highland_dominion_desc: "The kingdom reaches beyond the island. Seize the gold-rich port of Sofala on the African mainland, embrace modern banking, and develop the realm until it dwarfs its neighbors."
 nd_mir_dest_highland_empire: "The Highland Empire"
 nd_mir_dest_highland_empire_desc: "A continental power rising from an island. Extend control over the Mozambique coast, spread the written word through the kingdom, and marshal an army that can defend Malagasy sovereignty against any power on earth."
 nd_mir_dest_comoros_conquest: "Comoros Conquest"
 nd_mir_dest_comoros_conquest_desc: "The Comoro Islands -- Anjouan, Grand Comore, and Mayotte -- are the natural stepping stones from Madagascar to the African coast. Seize them and establish Malagasy dominion over the northern Mozambique Channel."
 nd_mir_dest_swahili_reach: "Swahili Reach"
 nd_mir_dest_swahili_reach_desc: "The great Swahili trading cities of Zanzibar and Kilwa have controlled Indian Ocean commerce for centuries. Take them, bring ivory into your markets, and make Madagascar the hub of East African trade."
 nd_mir_dest_ocean_empire: "The Ocean Empire"
 nd_mir_dest_ocean_empire_desc: "From Mombasa to the Seychelles, the Indian Ocean bows to Malagasy power. Command the trade routes, embrace global commerce, and build an empire of a thousand ports that stretches from Africa to the open sea."
 nd_mir.6.t: "The Unified Island"
 nd_mir.6.d: "For the first time in living memory, a single authority governs all of Madagascar. From the highland capital to the remotest fishing village on the southern coast, the word of the sovereign carries the weight of law. The kingdom has stability. Now it must find purpose."
 nd_mir.6.a: "Our destiny awaits."
 nd_mir.7.t: "The Granaries of the Highlands"
 nd_mir.7.d: "The terraced paddies of the central highlands produce rice in abundance that surpasses anything known on this island before. The irrigation canals reach further each year, the hillsides are carved into new fields, and the royal granaries overflow with surplus. Antananarivo grows fat on the labor of its people, and the kingdom's wealth is measured not in gold or silk but in the white grain that feeds millions.\n\nThe highland consolidation is complete. The question now is where this agrarian power will be directed."
 nd_mir.7.a: "The land feeds us. Now we shall shape the world."
 nd_mir.8.t: "Dominion Beyond the Shore"
 nd_mir.8.d: "Malagasy soldiers stand on foreign soil. The conquest of Sofala brings the kingdom something it has never had before -- access to the gold trade that has enriched the Swahili coast for centuries. The royal treasury swells with new revenue, and the kingdom's influence extends across the Mozambique Channel.\n\nBut power abroad demands choices at home. The crown must decide how to invest this new wealth."
 nd_mir.8.a: "Invest in irrigation and the people's welfare."
 nd_mir.8.b: "Fortify our highland strongholds."
 nd_mir.9.t: "Empire of the Highlands"
 nd_mir.9.d: "The kingdom that began as a collection of highland villages now commands territory stretching from the interior of Madagascar to the African coast. Malagasy governors administer foreign ports. Malagasy soldiers garrison foreign fortresses. The printing press spreads literacy from the capital to the provinces, binding the realm together with the written word.\n\nThis is the apex of Malagasy power. The crown must choose how to wield it."
 nd_mir.9.a: "We shall project our power across the continent."
 nd_mir.9.b: "We shall defend our sovereignty against all comers."
 nd_mir.10.t: "The Fall of the Comoros"
 nd_mir.10.d: "The outrigger war fleets of Madagascar have swept across the Mozambique Channel. One by one, the sultanates of the Comoro Islands -- Anjouan, Grand Comore, Mayotte -- have fallen to Malagasy arms. The channel that separates Madagascar from Africa is now a Malagasy lake.\n\nFrom these island outposts, the fleet can range further than ever before. The Swahili coast beckons."
 nd_mir.10.a: "The channel is ours. The coast will follow."
 nd_mir.11.t: "Masters of the Swahili Coast"
 nd_mir.11.d: "Zanzibar and Kilwa -- the ancient jewels of East African commerce -- now fly the Malagasy banner. Ivory, gold, and enslaved captives flow through markets that Madagascar controls. The kingdom has become the dominant power of the western Indian Ocean.\n\nThe question is whether to entrench this trading empire through commercial institutions or to ride the monsoon winds to even greater reach."
 nd_mir.11.a: "Establish permanent trading factories."
 nd_mir.11.b: "Master the monsoon trade routes."
 nd_mir.12.t: "Ny Ranomasina Indianina"
 nd_mir.12.d: "The Indian Ocean -- Ny Ranomasina Indianina in the Malagasy tongue -- has become a Malagasy sea. From Mombasa on the African coast to the Seychelles in the open ocean, Malagasy ships dominate the trade routes. The outrigger canoe that once carried a handful of Austronesian settlers to an uninhabited island has become the instrument of an empire.\n\nThe kingdom must decide how to govern this vast maritime domain."
 nd_mir.12.a: "Rule the seas as sultans of the southern ocean."
 nd_mir.12.b: "Build a thousand-port trading empire."
 STATIC_MODIFIER_NAME_nd_mir_dest_irrigation_works: "Royal Irrigation Works"
 STATIC_MODIFIER_DESC_nd_mir_dest_irrigation_works: "The crown invests its new continental revenues into expanding the highland irrigation network, bringing water to terraces that will feed the growing kingdom for generations."
 STATIC_MODIFIER_NAME_nd_mir_dest_fortress_network: "Highland Fortress Network"
 STATIC_MODIFIER_DESC_nd_mir_dest_fortress_network: "The wealth of Sofala funds a chain of rova fortresses across the highlands, creating an impregnable defensive network that no invader can breach."
 STATIC_MODIFIER_NAME_nd_mir_dest_continental_ambition: "Continental Ambition"
 STATIC_MODIFIER_DESC_nd_mir_dest_continental_ambition: "The highland empire looks outward. A professional army, hardened by campaigns on the African mainland, projects Malagasy power across the region -- though the neglected navy pays the price."
 STATIC_MODIFIER_NAME_nd_mir_dest_defiant_sovereignty: "Defiant Sovereignty"
 STATIC_MODIFIER_DESC_nd_mir_dest_defiant_sovereignty: "Madagascar stands alone and inviolate. The kingdom's diplomatic skill and mercenary reserves ensure that no foreign power can threaten its independence."
 STATIC_MODIFIER_NAME_nd_mir_dest_trading_factories: "Swahili Trading Factories"
 STATIC_MODIFIER_DESC_nd_mir_dest_trading_factories: "Permanent Malagasy trading factories on the Swahili coast serve as both commercial outposts and intelligence-gathering stations."
 STATIC_MODIFIER_NAME_nd_mir_dest_monsoon_routes: "Monsoon Trade Routes"
 STATIC_MODIFIER_DESC_nd_mir_dest_monsoon_routes: "Mastery of the monsoon wind patterns allows Malagasy merchants to trade across the Indian Ocean with minimal overhead, reducing inflation and borrowing costs."
 STATIC_MODIFIER_NAME_nd_mir_dest_sultan_southern_seas: "Sultan of the Southern Seas"
 STATIC_MODIFIER_DESC_nd_mir_dest_sultan_southern_seas: "The Malagasy sovereign commands respect as the preeminent power of the southern Indian Ocean, backed by disciplined cavalry and artillery and a wide diplomatic network."
 STATIC_MODIFIER_NAME_nd_mir_dest_thousand_port_empire: "Thousand-Port Empire"
 STATIC_MODIFIER_DESC_nd_mir_dest_thousand_port_empire: "A vast maritime empire held together not by a single army but by a network of ports, mercenaries, and vassal states that makes war cheap and resistance costly."
 nd_mir_rova_manjakamiadana: "Rova Manjakamiadana"
 nd_mir_rova_manjakamiadana_desc: "The Great Palace of Manjakamiadana -- 'Where It Is Pleasant to Rule' -- crowns the highest hill of Antananarivo. Built of stone and rosewood, it is the supreme symbol of Merina sovereignty: part royal residence, part administrative center, part sacred site where the hasina of the ancestors concentrates."
 nd_mir_rova_manjakamiadana_upkeep: "Palace Maintenance"
 nd_mir_rova_manjakamiadana_upkeep_desc: "The stone foundations, rosewood halls, and sacred enclosures of the great palace require constant care from skilled artisans."
 nd_mir_lakana_arsenal: "Lakana Arsenal"
 nd_mir_lakana_arsenal_desc: "A great shipyard and naval arsenal where the largest war canoes of the Malagasy fleet are built and maintained. Rows of lakana stand in covered slipways, their hulls caulked with coconut fiber and their outriggers fitted with platforms for archers and musketeers."
 nd_mir_lakana_arsenal_upkeep: "Arsenal Maintenance"
 nd_mir_lakana_arsenal_upkeep_desc: "Lumber, tar, and rope for maintaining the war fleet and its slipway infrastructure."
