 nd_mc_reform_bureaucracy: "Reform the Bureaucracy"
 nd_mc_reform_bureaucracy_desc: "Restructure the administrative apparatus, removing corrupt officials and streamlining governance."
 nd_mc_purge_eunuchs: "Purge the Eunuchs"
 nd_mc_purge_eunuchs_desc: "Break the power of the palace eunuch faction and restore authority to appointed officials."
 nd_mc_appease_generals: "Appease the Generals"
 nd_mc_appease_generals_desc: "Dispatch funds and honors to frontier commanders to secure their continued loyalty."
 nd_mc_grant_autonomy: "Grant Provincial Autonomy"
 nd_mc_grant_autonomy_desc: "Ease central control over the provinces, reducing grievances at the cost of direct authority."
 nd_mc_negotiate_surrender: "Negotiate with Warlord"
 nd_mc_negotiate_surrender_desc: "Offer favorable terms to a rebel warlord in exchange for their submission."
 nd_mc_imperial_edict: "Imperial Edict of Legitimacy"
 nd_mc_imperial_edict_desc: "Issue a formal declaration condemning all challengers as illegitimate rebels."
 nd_mc_declare_loyalty: "Declare Loyalty to the Emperor"
 nd_mc_declare_loyalty_desc: "Pledge allegiance to the reigning dynasty, accepting their continued rule."
 nd_mc_seek_mandate: "Seek the Mandate"
 nd_mc_seek_mandate_desc: "Declare ourselves the rightful heirs of the Mandate of Heaven and challenge the Emperor for supremacy."
