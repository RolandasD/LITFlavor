l_english:

 # Game Rule
 rule_nd_mandate_crisis_rule: "Mandate Crisis"
 setting_nd_mandate_crisis_enabled: "Enabled"
 setting_nd_mandate_crisis_enabled_desc: "The [Emperor of China|e] may face a Mandate Crisis when [celestial_authority|e] falls too low, potentially fragmenting the empire into warring states. This crisis can occur multiple times throughout the game."
 setting_nd_mandate_crisis_disabled: "Disabled"
 setting_nd_mandate_crisis_disabled_desc: "The Mandate Crisis situation is disabled. Unified China will not face dynastic cycle fragmentation events."

 # Situation
 nd_mandate_crisis: "Mandate Crisis"
 nd_mandate_crisis_desc: "The Mandate of Heaven wavers. The dynasty's grip on the realm weakens as discontent spreads through the provinces. Without decisive action, the empire may fracture into warring states, each claiming the right to rule."

 # International Organization
 nd_mandate_challengers: "Mandate Challengers"
 nd_mandate_challengers_desc: "Those who challenge the reigning dynasty's right to rule the Middle Kingdom."

 # Static Modifiers
 STATIC_MODIFIER_NAME_nd_mandate_crisis_unrest: "Mandate Crisis: Unrest"
 STATIC_MODIFIER_DESC_nd_mandate_crisis_unrest: "Growing unrest threatens the stability of the dynasty."
 STATIC_MODIFIER_NAME_nd_mandate_crisis_fragmentation: "Mandate Crisis: Fragmentation"
 STATIC_MODIFIER_DESC_nd_mandate_crisis_fragmentation: "The empire is fracturing. Warlords rise in the provinces."
 STATIC_MODIFIER_NAME_nd_mandate_crisis_reformed: "Dynasty Reformed"
 STATIC_MODIFIER_DESC_nd_mandate_crisis_reformed: "The dynasty has overcome internal crisis through decisive reform."
 STATIC_MODIFIER_NAME_nd_mandate_crisis_reconquest: "Mandate Reaffirmed"
 STATIC_MODIFIER_DESC_nd_mandate_crisis_reconquest: "The dynasty has crushed all challengers and reaffirmed its mandate to rule."
 STATIC_MODIFIER_NAME_nd_mandate_crisis_new_dynasty: "New Dynasty"
 STATIC_MODIFIER_DESC_nd_mandate_crisis_new_dynasty: "A new dynasty has claimed the Mandate of Heaven and restored order to the realm."

 # Legend Keys
 nd_mc_legend_emperor: "Emperor"
 nd_mc_legend_challenger: "Strongest Challenger"
 nd_mc_legend_loyalist: "Loyalist"
 nd_mc_legend_rebel: "Rebel"
 nd_mc_legend_neutral: "Neutral"

 # Tooltips
 nd_mc_emperor_tt: "Territory of the Emperor"
 nd_mc_challenger_tt: "Territory of the strongest challenger to the Mandate"
 nd_mc_loyalist_tt: "Territory of a warlord loyal to the Emperor"
 nd_mc_rebel_tt: "Territory of a warlord in rebellion against the Emperor"
 nd_mc_neutral_tt: "Territory of an uncommitted warlord"
 nd_mc_phase_2_starts_tt: "The crisis has escalated. Provinces are breaking away from imperial control."
 nd_mc_release_country_tt: "A new warlord rises in the provinces, seizing territory from the Emperor."
 nd_mc_release_culture_country_tt: "Provincial leaders declare independence, establishing a new state."
 nd_mc_lose_characters_tt: "The most capable officials and generals defect to the new regime."
 nd_mc_has_already_enacted_tt: "We have already enacted this reform during the current crisis."
 nd_mc_emperor_allegiance: "Allegiance"

 # Event: The Heavens Grow Dark (on_start, emperor)
 nd_mandate_crisis.1.title: "The Heavens Grow Dark"
 nd_mandate_crisis.1.desc: "Omens speak of the dynasty's decline. Tax revenues dwindle as provincial governors hoard resources. The frontier garrisons send desperate pleas for reinforcement, while peasant agitators spread whispers of a new age. The Mandate of Heaven, it seems, is no longer certain.\n\nUnless we act decisively, the empire itself may unravel."
 nd_mandate_crisis.1.a: "We must hold the realm together."

 # Event: Whispers of Unrest (on_start, neighbors)
 nd_mandate_crisis.2.title: "Whispers of Unrest"
 nd_mandate_crisis.2.desc: "Reports from the Middle Kingdom speak of growing disorder. The Emperor's authority wanes in the provinces, and ambitious men eye the throne. If the dynasty falls, a period of chaos will follow -- and with chaos comes opportunity."
 nd_mandate_crisis.2.a: "We shall watch developments closely."

 # Event: The Dynasty Endures (resolution, reform)
 nd_mandate_crisis.3.title: "The Dynasty Endures"
 nd_mandate_crisis.3.desc: "Through careful reform and steady governance, the crisis has been averted. The bureaucracy has been purged of corruption, the frontier secured, and the people's grievances addressed. The Mandate of Heaven remains with our house -- for now.\n\nHistory teaches that no dynasty rules forever. But today, we have earned another generation of peace."
 nd_mandate_crisis.3.a: "Let this be remembered as a time of renewal."

 # Event: The Mandate Renewed (resolution, reconquest)
 nd_mandate_crisis.4.title: "The Mandate Renewed"
 nd_mandate_crisis.4.desc: "The rebels have been crushed, the warlords scattered. Through force of arms, we have reunified the realm and proven that the Mandate of Heaven was never truly lost. The provinces bow once more to our authority.\n\nLet the histories record that this dynasty was tested in the fires of rebellion and emerged stronger."
 nd_mandate_crisis.4.a: "The realm is whole again."

 # Event: A New Dynasty Rises (resolution, new dynasty)
 nd_mandate_crisis.5.title: "A New Dynasty Rises"
 nd_mandate_crisis.5.desc: "The old order has fallen. Where once a single dynasty commanded the obedience of all under Heaven, now a new power has risen from the ashes of rebellion. The Mandate of Heaven passes to those who prove worthy of it through strength, virtue, and the will of the people.\n\nA new era begins."
 nd_mandate_crisis.5.a: "The Mandate of Heaven is ours."

 # Phase 1 Flavor Events
 nd_mandate_crisis.10.title: "Eunuch Corruption"
 nd_mandate_crisis.10.desc: "The palace eunuchs have amassed alarming influence over court proceedings. Reports indicate they are siphoning tax revenue meant for frontier defense into their own coffers. Their networks of patronage undermine the authority of appointed officials throughout the bureaucracy."
 nd_mandate_crisis.10.a: "Purge the worst offenders."
 nd_mandate_crisis.10.a_tt: "A purge will restore order but create enemies at court."
 nd_mandate_crisis.10.b: "Their loyalty is more valuable than their honesty."
 nd_mandate_crisis.10.b_tt: "Tolerating corruption erodes the dynasty's moral authority."

 nd_mandate_crisis.11.title: "Land Consolidation"
 nd_mandate_crisis.11.desc: "Wealthy families and court officials are acquiring vast agricultural estates, displacing the peasant smallholders who work the land. Tax rolls shrink as these magnates enjoy exemptions, while the displaced peasants join the growing ranks of the rootless poor."
 nd_mandate_crisis.11.a: "Order the redistribution of illegal land seizures."
 nd_mandate_crisis.11.a_tt: "The nobility will not forget this slight."
 nd_mandate_crisis.11.b: "The great families are pillars of the realm."
 nd_mandate_crisis.11.b_tt: "The peasants grow desperate without land."

 nd_mandate_crisis.12.title: "Frontier Neglect"
 nd_mandate_crisis.12.desc: "Commanders along the frontier report crumbling fortifications and desertions among their garrison troops. Without reinforcement, the border regions will be vulnerable to raids and incursions from neighboring powers."
 nd_mandate_crisis.12.a: "Dispatch funds and troops to the frontier."
 nd_mandate_crisis.12.a_tt: "Expensive, but necessary."
 nd_mandate_crisis.12.b: "The frontier must fend for itself."
 nd_mandate_crisis.12.b_tt: "Border provinces may lose confidence in our protection."

 nd_mandate_crisis.13.title: "Peasant Grievances"
 nd_mandate_crisis.13.desc: "Village elders from across the realm petition the throne, cataloging a litany of grievances: crushing taxes, corrupt magistrates, forced labor without compensation. The tone of the petitions grows bolder, some openly questioning whether Heaven still favors our house."
 nd_mandate_crisis.13.a: "Reduce the tax burden on the common people."
 nd_mandate_crisis.13.a_tt: "Revenue will fall, but unrest may ease."
 nd_mandate_crisis.13.b: "Suppress the agitators and enforce order."
 nd_mandate_crisis.13.b_tt: "Silence does not mean consent."

 nd_mandate_crisis.14.title: "Religious Dissent"
 nd_mandate_crisis.14.desc: "Heterodox religious movements are gaining adherents in the provinces, particularly among the dispossessed peasantry. Their teachings often carry implicit -- and sometimes explicit -- challenges to the legitimacy of the ruling dynasty."
 nd_mandate_crisis.14.a: "Allow them their beliefs, so long as they pay taxes."
 nd_mandate_crisis.14.a_tt: "Tolerance may undermine our spiritual authority."
 nd_mandate_crisis.14.b: "These sects are a threat to the social order."
 nd_mandate_crisis.14.b_tt: "Persecution creates martyrs."

 nd_mandate_crisis.15.title: "Famine in the Provinces"
 nd_mandate_crisis.15.desc: "Crop failures have struck the outlying provinces. Without imperial grain reserves, the population faces starvation. Local officials report that hungry peasants are already forming armed bands, attacking granaries and tax collectors."
 nd_mandate_crisis.15.a: "Open the imperial granaries and send relief."
 nd_mandate_crisis.15.a_tt: "The treasury will suffer, but the people will remember our mercy."
 nd_mandate_crisis.15.b: "Each province must manage its own affairs."
 nd_mandate_crisis.15.b_tt: "Famine breeds rebellion."

 # Phase 2 Events
 nd_mandate_crisis.20.title: "A Warlord Rises"
 nd_mandate_crisis.20.desc: "Provincial commanders have seized control of their territories, declaring independence from the central government. They claim the dynasty has lost the Mandate of Heaven and that a new order must emerge from the chaos."
 nd_mandate_crisis.20.a: "This rebellion will be crushed."
 nd_mandate_crisis.20.play_as_tag: "Become this country"

 nd_mandate_crisis.21.title: "Cultural Rebellion"
 nd_mandate_crisis.21.desc: "The [?target_culture.GetName] peoples of the periphery have risen against imperial rule. Local leaders have declared the formation of a new state, rallying their people with calls for self-determination and an end to the dynasty's oppressive taxation."
 nd_mandate_crisis.21.a: "They will regret this defiance."
 nd_mandate_crisis.21.play_as_tag: "Become this country"

 nd_mandate_crisis.23.title: "The Empire Fractures"
 nd_mandate_crisis.23.desc: "The first provinces have broken away from imperial control. What began as internal unrest has become open rebellion. Warlords declare themselves rulers of their own domains, and the empire's unity exists now only on maps drawn in the capital.\n\nThe dynasty must either reconquer these breakaway states or accept the loss of the Mandate."
 nd_mandate_crisis.23.a: "We will fight to restore the realm."

 # Warlord/Neighbor Events
 nd_mandate_crisis.30.title: "Declare for the Emperor"
 nd_mandate_crisis.30.desc: "The Mandate Crisis presents us with a choice. The reigning Emperor has been weakened, but the dynasty still holds the capital and commands significant forces. Declaring our loyalty could secure us favorable treatment -- or tie our fate to a sinking ship."
 nd_mandate_crisis.30.a: "We stand with the Emperor."
 nd_mandate_crisis.30.a_tt: "Our allegiance to the Emperor strengthens."
 nd_mandate_crisis.30.b: "We will chart our own course."

 nd_mandate_crisis.31.title: "Claim the Mandate"
 nd_mandate_crisis.31.desc: "The dynasty has lost the Mandate of Heaven. The signs are unmistakable: famine, rebellion, the fracturing of the realm. We have the strength to forge a new order. Let our banner be raised above the others -- we shall be the founders of a new dynasty."
 nd_mandate_crisis.31.a: "We claim the Mandate of Heaven!"
 nd_mandate_crisis.31.a_tt: "We declare ourselves the rightful rulers of the Middle Kingdom."
 nd_mandate_crisis.31.b: "The time is not yet right."

 nd_mandate_crisis.32.title: "Foreign Opportunity"
 nd_mandate_crisis.32.desc: "China is in turmoil. The dynasty that once commanded tribute from half the known world is tearing itself apart. Border provinces lie weakly defended, their garrisons recalled to fight in internal wars. If we ever wished to expand at China's expense, there may be no better moment."
 nd_mandate_crisis.32.a: "Prepare for war."
 nd_mandate_crisis.32.b: "We shall not meddle in their affairs."

