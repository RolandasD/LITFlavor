l_english:
 STATIC_MODIFIER_NAME_nd_sharif_commands_the_faithful: "The Sharif Commands the Faithful"
 STATIC_MODIFIER_DESC_nd_sharif_commands_the_faithful: "The Sultan of Morocco draws authority not merely from military power but from his descent from the Prophet. As Commander of the Faithful, his legitimacy unites tribes, scholars, and soldiers under a single banner of righteous purpose."
 STATIC_MODIFIER_NAME_nd_gateway_of_two_seas: "Gateway of Two Seas"
 STATIC_MODIFIER_DESC_nd_gateway_of_two_seas: "Morocco commands the western Mediterranean and the Atlantic approaches to Africa. Its ports channel gold, sugar, and European goods between two oceans, making the Sultanate an indispensable link in global commerce."
 STATIC_MODIFIER_NAME_nd_victory_at_alcacer_quibir: "Victory at Alcacer Quibir"
 STATIC_MODIFIER_DESC_nd_victory_at_alcacer_quibir: "The crushing defeat of the Portuguese invasion has filled the army with fierce confidence. Morocco stands as the bulwark of Islam against Iberian aggression."
 STATIC_MODIFIER_NAME_nd_alcacer_diplomatic_triumph: "Diplomatic Triumph of 1578"
 STATIC_MODIFIER_DESC_nd_alcacer_diplomatic_triumph: "The Battle of Three Kings eliminated not only an invading army but the Portuguese king himself. Morocco's reputation in the courts of Europe has reached extraordinary heights."
 STATIC_MODIFIER_NAME_nd_moulay_ismail_consolidation: "Moulay Ismail's Consolidation"
 STATIC_MODIFIER_DESC_nd_moulay_ismail_consolidation: "The Iron Sultan has imposed his will across the realm. His vast construction projects at Meknes, his reorganization of the army, and his ruthless centralization of power have forged Morocco into a formidable state."
 STATIC_MODIFIER_NAME_nd_moulay_ismail_terror: "Terror of the Iron Sultan"
 STATIC_MODIFIER_DESC_nd_moulay_ismail_terror: "Moulay Ismail's rule rests on fear and military might. His vast standing army, his network of fortifications, and his reputation for pitiless vengeance make Morocco a fortress that no invader dares approach."
 nd_mor.1.t: "The Moroccan Sultanate"
 nd_mor.1.d: "The lands of Morocco are united under a single throne. From the Atlas Mountains to the Atlantic coast, from the fertile plains of the Gharb to the Saharan fringe, the Sultanate commands a realm of immense strategic value.\n\nThe question that faces the new Sultan is one of vision. The path of the #bold Commander of the Faithful#! calls Morocco to assert its Sharifian authority across the Maghreb and beyond — securing the frontier, conquering the Sahara, and forging a western caliphate. The path of the #bold Gateway of Two Seas#! turns Morocco's gaze seaward — seizing the Strait, venturing into the Atlantic, and building a maritime empire to rival the Iberians.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mor.1.a: "The Sharif commands the faithful!"
 nd_mor.1.b: "We are the gateway of two seas."
 nd_mor.2.t: "The Battle of Three Kings"
 nd_mor.2.d: "On August 4, 1578, the Portuguese King Sebastian led an army of twenty thousand across the Strait into Morocco, seeking to place a puppet on the Sultanate's throne. At the river of Oued al-Makhazin, near Alcacer Quibir, the Moroccan forces met them with devastating effect. When the dust settled, three kings lay dead — Sebastian of Portugal, the deposed Moroccan pretender Abu Abdallah, and the reigning Sultan Abd al-Malik who had died of illness during the battle itself. The victory was total. Portugal's army was annihilated, its king's body never recovered, and the ransom of thousands of prisoners filled Morocco's treasury. Ahmad al-Mansur, brother of the fallen Sultan, now ascends to power with the epithet 'al-Mansur' — the Victorious."
 nd_mor.2.a: "Let the victory inspire our armies!"
 nd_mor.2.b: "Let the world know Morocco's strength!"
 nd_mor.3.t: "Moulay Ismail and the Glory of Meknes"
 nd_mor.3.d: "Sultan Moulay Ismail has embarked upon the most ambitious construction program in Moroccan history. Breaking with tradition, he has chosen Meknes as his new capital, and the city is being transformed into a monument to absolute power. The massive walls stretch for kilometers, enclosing palaces, gardens, granaries capable of feeding the realm for years, and stables for twelve thousand horses. His army of Black Guard soldiers — a standing force of slave soldiers loyal only to the Sultan — numbers in the tens of thousands and enforces his will from the Rif to the Sahara. The European powers, humbled by his capture of Tangier and Larache from their garrisons, now send ambassadors bearing gifts. But Moulay Ismail's methods are as terrifying as they are effective."
 nd_mor.3.a: "Build an empire to last a thousand years."
 nd_mor.3.b: "Let our enemies tremble at our walls."
 nd_mor_zenata_cavalry: "Zenata Cavalry Tradition"
 nd_mor_zenata_cavalry_desc: "The Zenata Berbers who founded the Marinid dynasty brought with them the fighting traditions of the Saharan steppe — swift horsemen who struck hard and vanished before the enemy could respond."
 nd_mor_kasbah_defense: "Kasbah Fortifications"
 nd_mor_kasbah_defense_desc: "The kasbahs of Morocco — fortified strongholds of rammed earth and stone — control mountain passes, guard oases, and dominate the approaches to every major settlement."
 nd_mor_fez_scholarship: "Fez, City of Learning"
 nd_mor_fez_scholarship_desc: "Fez has been the intellectual capital of the Maghreb since the founding of the al-Qarawiyyin mosque in 859. Its scholars preserve and transmit knowledge across the Islamic world."
 nd_mor_al_qarawiyyin: "The University of al-Qarawiyyin"
 nd_mor_al_qarawiyyin_desc: "Founded by Fatima al-Fihri in 859, al-Qarawiyyin in Fez is the oldest continuously operating university in the world, training jurists, theologians, and administrators for the Moroccan state."
 nd_mor_madrasa_tradition: "Marinid Madrasa Tradition"
 nd_mor_madrasa_tradition_desc: "The Marinid sultans built the finest madrasas in the Islamic west — masterpieces of carved stucco, cedarwood ceilings, and zellige tilework that served as both theological schools and instruments of political legitimacy."
 nd_mor_zellige_craft: "Zellige Craftsmanship"
 nd_mor_zellige_craft_desc: "Moroccan artisans perfected the art of zellige — intricate geometric mosaic tilework cut by hand from glazed terracotta. This craft adorns every mosque, palace, and fountain in the realm."
 nd_mor_funduq_network: "Funduq Trade Network"
 nd_mor_funduq_network_desc: "The funduqs — merchant inns with warehouses, stables, and lodging — form the backbone of Morocco's internal trade, providing shelter and storage for the caravan routes linking the coast to the Sahara."
 nd_mor_barbary_corsairs: "Barbary Corsairs of Sale"
 nd_mor_barbary_corsairs_desc: "The corsairs of Sale and Rabat terrorize the Atlantic and Mediterranean, capturing ships and raiding coastal towns from Iceland to the Canaries. Their galleys are fast, well-armed, and crewed by fearless raiders."
 nd_mor_sugar_cultivation: "Souss Valley Sugar"
 nd_mor_sugar_cultivation_desc: "The Souss Valley's sugar plantations, irrigated by ancient channels, produce a commodity that Europeans crave. Moroccan sugar competes with the finest from the Levant and later the New World."
 nd_mor_wattasid_diplomacy: "Wattasid Diplomatic Craft"
 nd_mor_wattasid_diplomacy_desc: "Caught between Ottoman expansion from the east and Portuguese aggression from the sea, Morocco's Wattasid rulers developed a sophisticated diplomacy of playing powers against each other to preserve independence."
 nd_mor_metalworking: "Moroccan Arms Production"
 nd_mor_metalworking_desc: "The need to resist Portuguese coastal incursions spurred Morocco's metalworkers to produce firearms, cannons, and edged weapons in growing quantities, reducing dependence on foreign arms."
 nd_mor_saadian_gunpowder: "Saadian Gunpowder Revolution"
 nd_mor_saadian_gunpowder_desc: "The Saadian dynasty adopted Ottoman military methods — disciplined musketeer infantry, field artillery, and fortress warfare — transforming Morocco's army from a cavalry-dependent force into a gunpowder state."
 nd_mor_battle_three_kings: "Battle of Three Kings"
 nd_mor_battle_three_kings_desc: "The destruction of King Sebastian's Portuguese invasion at Alcacer Quibir in 1578 was Morocco's greatest military triumph, establishing the Saadian dynasty's prestige across the Islamic world and Europe alike."
 nd_mor_mansur_golden_age: "Al-Mansur's Golden Age"
 nd_mor_mansur_golden_age_desc: "Ahmad al-Mansur leveraged his victory into an era of unprecedented wealth. Portuguese ransom money, Saharan gold, and sugar exports made Morocco one of the richest states in the world."
 nd_mor_saadian_architecture: "Saadian Architectural Patronage"
 nd_mor_saadian_architecture_desc: "The Saadian dynasty's patronage produced the El Badi Palace in Marrakech — 'the Incomparable' — and the exquisite Saadian Tombs, monuments to dynastic power crafted from the finest materials money could buy."
 nd_mor_meknes_capital: "Imperial Meknes"
 nd_mor_meknes_capital_desc: "Moulay Ismail's transformation of Meknes into an imperial capital — with its massive walls, vast granaries, and monumental Bab Mansour gate — was the largest construction project in Moroccan history."
 nd_mor_alaouite_centralization: "Alaouite State Centralization"
 nd_mor_alaouite_centralization_desc: "The Alaouite dynasty rebuilt the Moroccan state around a centralized Makhzen — a network of tribal alliances, military garrisons, and tax collectors that bound the periphery to the throne."
 nd_mor_corsair_fleet: "Corsair Fleet Expansion"
 nd_mor_corsair_fleet_desc: "Under the Alaouites, Morocco's corsair fleet expanded from a local nuisance to a strategic instrument. European powers were forced to negotiate treaties and pay tribute to protect their shipping."
 nd_mor_makhzen_reforms: "Makhzen Fiscal Reforms"
 nd_mor_makhzen_reforms_desc: "The Makhzen's fiscal apparatus — tax farmers, provincial governors, and customary levies — was reformed to extract revenue more efficiently from the diverse populations of the Sultanate."
 nd_mor_industrial_stirrings: "Early Moroccan Modernization"
 nd_mor_industrial_stirrings_desc: "While full industrialization eluded Morocco, the late Alaouite period saw tentative steps toward modern manufacturing, including European-style workshops and improvements to port infrastructure."
 nd_mor_diplomatic_sovereignty: "Moroccan Diplomatic Sovereignty"
 nd_mor_diplomatic_sovereignty_desc: "Morocco was one of the first states to recognize the United States in 1786 and maintained sovereign diplomatic relations with major powers throughout the era, resisting full European domination longer than any other African state."
 a_nd_mor_zenata_horsemen: "Zenata Horsemen"
 a_nd_mor_zenata_horsemen_desc: "The swift mounted warriors of the Zenata Berbers, trained in the nomadic traditions of hit-and-run warfare across the deserts and plains of the Maghreb."
 n_nd_mor_corsair_galley: "Corsair Galley"
 n_nd_mor_corsair_galley_desc: "A fast, maneuverable galley crewed by the fearsome corsairs of Sale and Rabat, designed for raiding merchant shipping and blockading enemy ports."
 a_nd_mor_saadian_musketeers: "Saadian Musketeers"
 a_nd_mor_saadian_musketeers_desc: "Disciplined musket infantry trained in the Ottoman tradition, forming the backbone of Morocco's reformed gunpowder army after the Saadian military revolution."
 nd_mor_marinid_madrasa: "Marinid Madrasa"
 nd_mor_marinid_madrasa_desc: "A theological school built in the Marinid tradition, with intricate zellige tilework, carved stucco, and cedarwood ceilings. It trains scholars, jurists, and administrators for the Sultanate."
 nd_mor_kasbah: "Kasbah Fortress"
 nd_mor_kasbah_desc: "A fortified stronghold of rammed earth and stone, controlling mountain passes and guarding the approaches to settlements. Its thick walls and strategic position make it nearly impregnable."
 nd_mor_funduq: "Funduq"
 nd_mor_funduq_desc: "A merchant inn and warehouse complex that serves as a hub for caravan trade, providing lodging for merchants, stabling for animals, and secure storage for goods."
 nd_mor_imperial_granary: "Imperial Granary"
 nd_mor_imperial_granary_desc: "One of Moulay Ismail's vast storage facilities, capable of provisioning an army for months. These granaries ensure the Sultanate never faces famine during siege or drought."
 nd_mor_corsair_harbor: "Corsair Harbor"
 nd_mor_corsair_harbor_desc: "A fortified harbor built to service Morocco's corsair fleet, with shipbuilding facilities, repair docks, and secure anchorage for raiding vessels."
 nd_mor_madrasa_upkeep: "Madrasa Maintenance"
 nd_mor_madrasa_upkeep_desc: "The ongoing costs of maintaining the madrasa — paper and books for the library, beeswax candles for night study, and stone for the upkeep of its zellige-adorned walls."
 nd_mor_kasbah_upkeep: "Kasbah Garrison"
 nd_mor_kasbah_upkeep_desc: "The cost of maintaining the kasbah — stone for its rammed-earth walls, weaponry and firearms for the garrison, and tools for ongoing repairs."
 nd_mor_funduq_upkeep: "Funduq Operations"
 nd_mor_funduq_upkeep_desc: "The operating costs of the funduq — livestock and wheat to feed merchants and their animals, salt for preservation, and cloth to provision the caravans sheltering within."
 nd_mor_granary_upkeep: "Granary Maintenance"
 nd_mor_granary_upkeep_desc: "The cost of maintaining the imperial granary — wheat replenishing the stores, tools for the machinery and measuring equipment, and stone to keep the massive walls and vaulted chambers sound."
 nd_mor_corsair_harbor_upkeep: "Harbor Operations"
 nd_mor_corsair_harbor_upkeep_desc: "The operating costs of the corsair harbor — naval supplies for the fleet, lumber and tar for hull repairs, and tools for the shipwrights maintaining the raiding vessels."
 nd_mor_sugar_processing: "Moroccan Sugar Refining"
 nd_mor_sugar_processing_desc: "Crushing sugar cane harvested from the Souss Valley and boiling the juice into refined sugar for export to Europe."
 nd_mor_zellige_workshop: "Zellige Tile Workshop"
 nd_mor_zellige_workshop_desc: "A workshop cutting intricate geometric tiles from glazed terracotta — clay fired and hand-cut, coloured with mineral dyes, shaped with tools into the mosaics that adorn every mosque and palace."
 nd_mor_sugar_press: "Sugar Press"
 nd_mor_sugar_press_desc: "A cane-crushing mill in the Souss valley, where Moroccan sugar is processed for export. Morocco's sugar rivaled Mediterranean sources before the Atlantic plantations took over."
 nd_mor_press_upkeep: "Press Operations"
 nd_mor_press_upkeep_desc: "Timber for the cane-crushing rollers and the boiling house furnace, tools to maintain the machinery, and stone for the mill's foundations and walls."
 nd_mor_arms_workshop: "Moroccan Arms Workshop"
 nd_mor_arms_workshop_desc: "A smithy producing firearms, blades, and fittings for the Sultanate's armies — iron for the metalwork, coal for the forge, lumber for stocks and hafts, and tools for the craftsmen."
 levy_nd_mor_zenata_horsemen: "Zenata Horsemen Levy"
 levy_nd_mor_zenata_horsemen_desc: "Tribal cavalry raised from Zenata Berber soldiers and tribesmen, fighting in the nomadic tradition of swift mounted raids."
 nd_mor_formed_tt: "Formed #bold Morocco#!"
 nd_mor_path_a_tt: "Chose the #bold Commander of the Faithful#! destiny"
 nd_mor_path_b_tt: "Chose the #bold Gateway of Two Seas#! destiny"
 nd_mor_destiny: "Destiny of the Sultanate"
 nd_mor_destiny_desc: "Morocco is formed and its Sultan's authority is recognized. The realm stands at a crossroads — the path chosen at formation now shapes the Sultanate's ambitions. Stabilize the realm to begin pursuing its destiny."
 nd_mor_dest_maghreb: "The Maghreb Secured"
 nd_mor_dest_maghreb_desc: "Conquer Tlemcen to end Zayyanid rivalry and build an army worthy of the Commander of the Faithful. The western Maghreb must answer to a single throne before the Sultan can look further afield."
 nd_mor_dest_golden_road: "Masters of the Golden Road"
 nd_mor_dest_golden_road_desc: "March south across the Sahara to seize Timbuktu and the trans-Saharan gold routes. The wealth of sub-Saharan Africa must flow through Moroccan hands to fund the Sultan's ambitions."
 nd_mor_dest_caliphate: "The Western Caliphate"
 nd_mor_dest_caliphate_desc: "Conquer Tunis and Algiers to unite the entire Maghreb under Sharifian authority. With prestige earned through conquest and piety, proclaim a western caliphate to rival the Ottomans. Unlocks the Dar al-Makhzen."
 nd_mor_dest_strait: "The Strait Secured"
 nd_mor_dest_strait_desc: "Seize the Rock of Gibraltar from the Iberians and stabilize the realm. Control of the Strait gives Morocco command over all traffic between the Mediterranean and the Atlantic."
 nd_mor_dest_atlantic: "Atlantic Ventures"
 nd_mor_dest_atlantic_desc: "Develop Morocco's sugar trade into a major export industry, embrace modern banking institutions, and fill the Sultanate's treasury. The Atlantic beckons with opportunity for those who can finance the voyage."
 nd_mor_dest_two_oceans: "Master of Two Oceans"
 nd_mor_dest_two_oceans_desc: "Seize Madeira to establish an Atlantic foothold, develop the Sultanate's territory to its full potential, and embrace global trade. Morocco shall command both the Mediterranean passage and the open ocean. Unlocks the Dar al-Bahr."
 nd_mor.4.t: "Destiny of the Sultanate"
 nd_mor.4.d: "The Sultanate of Morocco stands unified, its banner raised over the Atlas and the coast alike. The realm is stable, its people look to the Sultan for guidance. The path ahead is long, but the first step has been taken — Morocco's destiny is now in motion."
 nd_mor.4.a: "Our destiny unfolds."
 nd_mor.5.t: "The Maghreb Secured"
 nd_mor.5.d: "Tlemcen has fallen. The ancient seat of the Zayyanid sultans, which for centuries contested Moroccan hegemony over the western Maghreb, now answers to the Sultan in Fez. With a strong army at his command, the frontier is secured and the road south to the Sahara lies open. The Commander of the Faithful has proven that his claim extends beyond Morocco's traditional borders."
 nd_mor.5.a: "The Maghreb bows to the Commander."
 nd_mor.6.t: "Masters of the Golden Road"
 nd_mor.6.d: "Moroccan soldiers and merchants now command the trans-Saharan routes. Timbuktu, the legendary city of gold and learning, flies the Sultan's banner. The salt caravans of Taghaza march under Moroccan escort. The wealth of sub-Saharan Africa flows northward to Marrakesh and Fez. The question is how to consolidate this vast domain — through military garrisons and punitive expeditions, or through commercial networks and settled administration."
 nd_mor.6.a: "Garrison the routes with steel."
 nd_mor.6.b: "Let trade bind what conquest won."
 nd_mor.7.t: "The Western Caliphate Proclaimed"
 nd_mor.7.d: "From Tunis to Timbuktu, from Algiers to the Atlantic, the Moroccan Sultan's writ runs unchallenged. The dream of a western caliphate — a Sharifian realm to rival the Ottomans — has been realized. Scholars, soldiers, and merchants from across the Islamic world look to the Sultan as Commander of the Faithful in truth, not merely in title. The question now is how to define this caliphate's character for the ages."
 nd_mor.7.a: "Through piety and learning."
 nd_mor.7.b: "Through strength of arms."
 nd_mor.8.t: "The Strait Secured"
 nd_mor.8.d: "The Rock of Gibraltar — the great fortress that guards the passage between the Mediterranean and the Atlantic — is now in Moroccan hands. Every ship that passes between the two seas does so under the Sultan's gaze. The corsairs of Sale rejoice, the merchants of Fez see new horizons, and the European powers must reckon with a Morocco that commands the most strategic waterway in the western world."
 nd_mor.8.a: "The passage is ours to command."
 nd_mor.9.t: "Atlantic Ventures"
 nd_mor.9.d: "Moroccan sugar fills the holds of ships bound for European markets. The Sultan's treasury overflows with the profits of commerce, and the realm's bankers fund ventures that would have seemed impossible a generation ago. Morocco has become the western anchor of global trade — the question is whether to press this advantage outward into the Atlantic or consolidate the markets already won."
 nd_mor.9.a: "Press outward into the Atlantic."
 nd_mor.9.b: "Consolidate our merchant empire."
 nd_mor.10.t: "Master of Two Oceans"
 nd_mor.10.d: "Moroccan merchants and sailors now operate from Madeira to Mogador, from the Mediterranean to the open Atlantic. The Sultanate's development rivals any European kingdom, its trade networks span two oceans, and its flag flies on waters once claimed exclusively by the Iberians. Morocco has become not merely a gateway between seas but a power that commands them both."
 nd_mor.10.a: "Our fleets shall command the waves."
 nd_mor.10.b: "Our trade shall bind the world."
 STATIC_MODIFIER_NAME_nd_mor_dest_saharan_garrisons: "Saharan Garrison Network"
 STATIC_MODIFIER_DESC_nd_mor_dest_saharan_garrisons: "Military outposts along the trans-Saharan routes secure the golden road by force of arms, though the constant vigilance wears on the soldiery."
 STATIC_MODIFIER_NAME_nd_mor_dest_saharan_trade: "Saharan Commercial Network"
 STATIC_MODIFIER_DESC_nd_mor_dest_saharan_trade: "Merchant caravans and funduqs bind the conquered Saharan territories to the Sultanate through trade, though the far-flung realm breeds local autonomy."
 STATIC_MODIFIER_NAME_nd_mor_dest_caliphal_piety: "Caliphate of Scholars"
 STATIC_MODIFIER_DESC_nd_mor_dest_caliphal_piety: "The Western Caliphate draws its strength from religious learning and cultural accommodation, welcoming diverse peoples under the banner of the Commander of the Faithful."
 STATIC_MODIFIER_NAME_nd_mor_dest_caliphal_sword: "Caliphate of the Sword"
 STATIC_MODIFIER_DESC_nd_mor_dest_caliphal_sword: "The Western Caliphate is forged through military supremacy, its armies the instrument of Sharifian authority across the Maghreb and beyond."
 STATIC_MODIFIER_NAME_nd_mor_dest_atlantic_reach: "Atlantic Reach"
 STATIC_MODIFIER_DESC_nd_mor_dest_atlantic_reach: "Moroccan explorers and merchants push into the open Atlantic, charting new waters and establishing footholds far from home, though the army's readiness suffers from the maritime focus."
 STATIC_MODIFIER_NAME_nd_mor_dest_market_ports: "Market Ports of the Sultan"
 STATIC_MODIFIER_DESC_nd_mor_dest_market_ports: "Morocco's coastal cities become thriving commercial hubs, attracting merchants from across the known world, though rapid growth brings inflationary pressures."
 STATIC_MODIFIER_NAME_nd_mor_dest_oceanic_fleet: "Oceanic Fleet of Morocco"
 STATIC_MODIFIER_DESC_nd_mor_dest_oceanic_fleet: "A powerful blue-water navy projects Moroccan power across both the Mediterranean and the Atlantic, establishing the Sultanate as a great maritime power."
 STATIC_MODIFIER_NAME_nd_mor_dest_trade_empire: "Empire of the Two Seas"
 STATIC_MODIFIER_DESC_nd_mor_dest_trade_empire: "Morocco's diplomatic and commercial networks span two oceans, earning the Sultanate respect and influence in every court and counting house from Lisbon to Timbuktu."
 nd_mor_dar_al_makhzen: "Dar al-Makhzen"
 nd_mor_dar_al_makhzen_desc: "The Caliphal Palace — seat of the Commander of the Faithful and center of the Western Caliphate's religious, intellectual, and political authority. Its libraries, courts, and audience halls embody Sharifian grandeur."
 nd_mor_dar_al_bahr: "Dar al-Bahr"
 nd_mor_dar_al_bahr_desc: "The House of the Sea — a grand maritime arsenal and trading house where Morocco's oceanic fleet is built, provisioned, and dispatched to command the waters of two oceans."
 nd_mor_makhzen_upkeep: "Caliphal Maintenance"
 nd_mor_makhzen_upkeep_desc: "The cost of maintaining the Caliphal Palace — stone for its halls and courtyards, paper and books for the library, and fine cloth for the court's ceremonial furnishings."
 nd_mor_bahr_upkeep: "Arsenal Operations"
 nd_mor_bahr_upkeep_desc: "The cost of operating the maritime arsenal — naval supplies for the fleet, lumber and tar for hull repairs, and tools for the shipwrights."
