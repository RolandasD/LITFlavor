l_english:
 OYE: "Oyo Empire"
 OYE_ADJ: "Oyo"
 OYE_f: "Oyo Empire"
 OYE_f_desc: "The Oyo Empire was the most powerful Yoruba state and one of the largest empires in West Africa, renowned for its fearsome cavalry corps and sophisticated constitutional government balancing the Alaafin's authority with the Oyo Mesi council. Uniting the Yoruba heartland under the leadership of Oyo-Ile, this empire dominated trade routes between the forest and savanna zones from the fifteenth to early nineteenth centuries."
