l_english:
 STATIC_MODIFIER_NAME_nd_iron_kingdom: "The Iron Kingdom"
 STATIC_MODIFIER_DESC_nd_iron_kingdom: "Prussia is not a state that possesses an army — it is an army that possesses a state. The Hohenzollern kingdom has forged itself into the most militarized society in Europe, where discipline, obedience, and martial virtue form the bedrock of national identity."
 STATIC_MODIFIER_NAME_nd_enlightened_state: "The Enlightened State"
 STATIC_MODIFIER_DESC_nd_enlightened_state: "From the Pietist schools of Halle to the legal reforms of Frederick, Prussia has pursued a vision of rational governance. An efficient bureaucracy, universal education, and codified law transform a poor northern march into an engine of progress."
 nd_pru.1.t: "The Birth of Prussia"
 nd_pru.1.d: "The transformation is complete. From the ashes of the Teutonic Order and the sandy marches of Brandenburg, a new state has emerged — Prussia. We have broken the power of the clergy, bound the Junker nobility to our service, and imposed order upon a fractured land. Now the question stands before us: what kind of kingdom shall we build?\n\nWill we follow the path of iron — drilling our soldiers into the finest army in Europe, making war our industry and discipline our creed? Or shall we seek to become a beacon of enlightened governance — investing in schools, reforming our laws, and building a state that earns the admiration of philosophers as much as the fear of generals?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_pru.1.a: "Discipline above all. Prussia marches."
 nd_pru.1.b: "A kingdom of reason and law."
 nd_pru.2.t: "The Cantonment System"
 nd_pru.2.d: "In 1733, King Frederick William I issued the Kantonreglement, dividing the kingdom into recruitment districts — cantons — each assigned to a regiment. Every able-bodied male is enrolled from birth, serving in peacetime through rotating furloughs and returning to their fields between training periods. The Junker officers command peasants from their own estates, creating bonds of loyalty that run deeper than mere military discipline.\n\nThis system gives Prussia an army far larger than its population should support — 3.6% of the total population under arms, the highest proportion in Europe. The question is how we apply this extraordinary resource."
 nd_pru.2.a: "Drill them relentlessly. Quality over quantity."
 nd_pru.2.b: "Maximize efficiency. Every Kantonist serves twice — as soldier and as farmer."
 nd_pru.3.t: "The Oblique Order of Battle"
 nd_pru.3.d: "At Leuthen in December 1757, Frederick demonstrated the devastating potential of the oblique order — concentrating overwhelming force against the weakest point of the enemy line while refusing the opposite flank. With 36,000 Prussians against 66,000 Austrians, the king executed a perfect march across the enemy front, struck their exposed left flank, and rolled up the entire Austrian army in one of the most decisive victories in military history.\n\nComing just weeks after the equally stunning victory at Rossbach, Leuthen established Prussian tactical doctrine as the standard against which all European armies would measure themselves. Shall we press this advantage offensively, or use these principles to perfect our defensive warfare?"
 nd_pru.3.a: "Strike where they are weakest. The oblique attack is our sword."
 nd_pru.3.b: "Hold where we are strongest. Let the enemy break upon our lines."
 nd_pru.4.t: "The Grosser Generalstab"
 nd_pru.4.d: "Following the catastrophe of Jena-Auerstedt in 1806, reformers led by Gerhard von Scharnhorst and August von Gneisenau rebuilt the Prussian military from its foundations. In 1810, the Kriegsakademie opened its doors, selecting officers by demonstrated intelligence and merit rather than birth alone. The Great General Staff — the Grosser Generalstab — became the first permanent military planning body in history, responsible for the continuous study of war in all its dimensions.\n\nIts officers are trained to think independently, to make decisions in the absence of orders, and to coordinate operations across vast distances. This institution will shape the practice of warfare for the next century and beyond."
 nd_pru.4.a: "An army that thinks as one mind."
 nd_pru.5.t: "The Allgemeines Landrecht"
 nd_pru.5.d: "In 1794, Prussia promulgated the Allgemeines Landrecht fur die Preussischen Staaten — the General State Laws — a comprehensive legal code that sought to unify the diverse provincial legal systems of the kingdom under a single framework. Drafted under the orders of Frederick the Great and completed by Carl Gottlieb Svarez, the code represents a remarkable achievement: an absolute monarchy voluntarily binding itself to the rule of law.\n\nThe Landrecht guaranteed prompt and impartial administration of justice, protected subjects against arbitrary royal will, and established legal protections for property and contract. It was not democratic — it preserved estate-based social distinctions — but it was rational, predictable, and fair within its own terms."
 nd_pru.5.a: "The law above all — even the king."
 STATIC_MODIFIER_NAME_nd_pru_cantonment_discipline: "Cantonment Drill"
 STATIC_MODIFIER_DESC_nd_pru_cantonment_discipline: "Relentless drill and discipline transform raw Kantonist recruits into soldiers of exceptional quality."
 STATIC_MODIFIER_NAME_nd_pru_cantonment_efficiency: "Cantonment Efficiency"
 STATIC_MODIFIER_DESC_nd_pru_cantonment_efficiency: "The cantonment system maximizes every resource — soldiers return to their farms between campaigns, feeding the kingdom while standing ready to march."
 STATIC_MODIFIER_NAME_nd_pru_oblique_order_offense: "The Oblique Attack"
 STATIC_MODIFIER_DESC_nd_pru_oblique_order_offense: "Concentrate force at the decisive point. Strike where the enemy is weakest and shatter their line before they can react."
 STATIC_MODIFIER_NAME_nd_pru_oblique_order_defense: "The Oblique Defense"
 STATIC_MODIFIER_DESC_nd_pru_oblique_order_defense: "Refuse the weaker flank and present an impenetrable front. Let the enemy exhaust themselves against disciplined firepower."
 nd_pru_teutonic_heritage: "Teutonic Heritage"
 nd_pru_teutonic_heritage_desc: "The martial traditions and fortress-building legacy of the Teutonic Order laid the foundations for Prussia's military culture."
 nd_pru_amber_trade: "Baltic Amber Trade"
 nd_pru_amber_trade_desc: "Since the Teutonic Knights seized control of Konigsberg, the amber trade has been a Prussian monopoly. The golden stone of the Baltic fuels commerce and artisanship."
 nd_pru_junker_estates: "Junker Estates"
 nd_pru_junker_estates_desc: "The Junker landed aristocracy forms the backbone of the Prussian state. Their vast Ritterguter estates supply both the tax base and the officer corps that make Prussia formidable."
 nd_pru_ordensburg_tradition: "Ordensburg Tradition"
 nd_pru_ordensburg_tradition_desc: "The massive brick fortresses of the Teutonic Order — Marienburg, Konigsberg, Balga — established a tradition of military architecture that shaped Prussian defensive doctrine for centuries."
 nd_pru_arms_manufacture: "Prussian Arms Manufacture"
 nd_pru_arms_manufacture_desc: "Prussian iron foundries and weapons workshops supply the growing army with standardized, reliable armaments."
 nd_pru_ducal_consolidation: "Ducal Consolidation"
 nd_pru_ducal_consolidation_desc: "The transformation of the Duchy of Prussia from a Polish fief into a sovereign state required steady administrative consolidation and the assertion of ducal authority over fractious local interests."
 nd_pru_hussar_tradition: "Totenkopf Hussar Tradition"
 nd_pru_hussar_tradition_desc: "Frederick the Great transformed the hussars from ornamental cavalry into a decisive arm of war. The Totenkopf Hussars, wearing the death's head on their mirlitons, became the most feared light cavalry in Europe."
 nd_pru_cameralism: "Cameralism"
 nd_pru_cameralism_desc: "The Prussian science of state finance — Cameralism — treated the kingdom as a great estate to be managed with efficiency and foresight, centralizing revenue collection through Domänenkammern."
 nd_pru_officer_corps: "Prussian Officer Corps"
 nd_pru_officer_corps_desc: "The Cadettenhaus system trains Junker sons from childhood in military science, creating a professional officer corps bound by duty, honor, and absolute loyalty to the crown."
 nd_pru_cantonment_system: "Cantonment System"
 nd_pru_cantonment_system_desc: "The Kantonreglement of 1733 divided Prussia into recruitment cantons, making every male subject a potential soldier. This gave Prussia an army vastly disproportionate to its population."
 nd_pru_oblique_order: "Oblique Order Tactics"
 nd_pru_oblique_order_desc: "Frederick the Great's perfection of the oblique order — massing force against the enemy's weakest point while refusing the opposite flank — revolutionized European warfare at Leuthen and Rossbach."
 nd_pru_general_staff: "The General Staff"
 nd_pru_general_staff_desc: "The Grosser Generalstab, born from the ashes of the 1806 defeat, was the world's first permanent military planning body. Officers selected by merit and trained in strategic thinking at the Kriegsakademie."
 nd_pru_feldjaeger_corps: "Feldjaeger Corps"
 nd_pru_feldjaeger_corps_desc: "The Reitende Feldjaeger — mounted scouts and riflemen — served as the eyes and couriers of the Prussian General Staff, combining mobility with marksmanship."
 nd_pru_allgemeines_landrecht: "Allgemeines Landrecht"
 nd_pru_allgemeines_landrecht_desc: "The General State Laws of 1794 unified Prussian jurisprudence under a single rational code — an absolute monarchy binding itself to the rule of law."
 a_nd_pru_totenkopf_hussar: "Totenkopf Hussars"
 a_nd_pru_totenkopf_hussar_desc: "Elite shock cavalry wearing the death's head insignia. Fast, aggressive, and utterly fearless — the terror of enemy flanks and supply lines."
 a_nd_pru_feldjaeger: "Feldjaeger"
 a_nd_pru_feldjaeger_desc: "Light riflemen trained as scouts and skirmishers. Expert marksmen who screen the army's advance and harass enemy formations before the main assault."
 a_nd_pru_kantonist: "Kantonist"
 a_nd_pru_kantonist_desc: "Conscript soldiers raised through the cantonment system. Peasants trained from youth, they serve their regiment in war and their Junker's fields in peace."
 nd_pru_cadettenhaus: "Cadettenhaus"
 nd_pru_cadettenhaus_desc: "A Prussian military academy training the sons of the Junker nobility in tactics, drill, and the science of war from an early age."
 nd_pru_cadettenhaus_upkeep: "Cadet Training"
 nd_pru_cadettenhaus_upkeep_desc: "Weapons, drill manuals, books of tactics, horses for cavalry exercises, and uniforms consumed in the relentless training of future officers."
 nd_pru_domaenenkammer: "Domanenkammer"
 nd_pru_domaenenkammer_desc: "A Cameralist revenue office that administers crown lands and centralizes tax collection with Prussian efficiency."
 nd_pru_domaenenkammer_upkeep: "Administrative Supplies"
 nd_pru_domaenenkammer_upkeep_desc: "Paper for ledgers and correspondence, fine cloth for official seals and drapery, and furniture for the counting rooms consumed by the Cameralist bureaucracy as it tracks every thaler flowing through the kingdom."
 nd_pru_amber_guild: "Amber Guild"
 nd_pru_amber_guild_desc: "A guild hall where master craftsmen process raw Baltic amber into luxury goods, jewelry, and decorative pieces — a tradition dating to the Teutonic Order's monopoly over Konigsberg."
 nd_pru_amber_workshop: "Amber Processing"
 nd_pru_amber_workshop_desc: "Master craftsmen cut, polish, and set Baltic amber into fine jewelry and decorative pieces prized across Europe."
 nd_pru_arms_foundry: "Arms Foundry"
 nd_pru_arms_foundry_desc: "A Prussian weapons workshop producing standardized muskets, bayonets, and ammunition for the growing army."
 nd_pru_iron_foundry: "Iron Smelting"
 nd_pru_iron_foundry_desc: "Prussian iron foundries smelt ore and forge standardized muskets, bayonets, and equipment for the growing army."
 levy_nd_pru_kantonist: "Kantonist Levy"
 levy_nd_pru_kantonist_desc: "Cantonment system conscripts drawn from assigned recruitment districts, serving under the Junker officers of their home estates."
 nd_pru_formed_tt: "Prussia has been formed"
 nd_pru_path_a_tt: "Chose The Iron Kingdom"
 nd_pru_path_b_tt: "Chose The Enlightened State"
 nd_pru_destiny: "The Prussian Destiny"
 nd_pru_destiny_desc: "Prussia has been forged. Now it must find its place among the great powers of Europe. Maintain stability as we chart our course."
 nd_pru_dest_schlesien: "The Silesian Conquest"
 nd_pru_dest_schlesien_desc: "Seize the wealthy province of Silesia from the Habsburgs. Control of Wroclaw and its industries will transform Prussia from a minor kingdom into a true military power. Requires 30,000 men under arms."
 nd_pru_dest_krieg: "The Frederician Wars"
 nd_pru_dest_krieg_desc: "Expand Prussian dominion over Saxony and Pomerania. The conquest of Dresden and Stettin will secure our flanks and demonstrate that Prussia can hold what it seizes against all of Europe. Requires 2,000 gold in the treasury."
 nd_pru_dest_koenig: "The Soldier King's Legacy"
 nd_pru_dest_koenig_desc: "Complete the domination of northern Germany. Berlin, Magdeburg, and Hanover must fall under Prussian control. With 75,000 soldiers and unrivaled prestige, Prussia will stand as the paramount military power of the continent."
 nd_pru_dest_pietismus: "The Pietist Schools"
 nd_pru_dest_pietismus_desc: "August Hermann Francke's educational revolution at Halle showed what rational governance could achieve. Seize Halle and embrace the banking institution to lay the economic foundations of an enlightened state."
 nd_pru_dest_kameralist: "The Cameralist Model"
 nd_pru_dest_kameralist_desc: "Build a state that runs like a well-oiled machine. Develop total infrastructure worth 500, amass 2,000 gold, and ensure books are traded in the capital market to fuel the Prussian bureaucracy."
 nd_pru_dest_aufklaerung: "The Aufklarung"
 nd_pru_dest_aufklaerung_desc: "Make Prussia the intellectual capital of Europe. Seize Leipzig -- the publishing heart of the continent -- reach 1,000 total development, achieve the highest prestige, and embrace the Enlightenment."
 nd_pru.6.t: "The Prussian Destiny"
 nd_pru.6.d: "The Prussian state stands at a crossroads. Behind us lie the marshes of Brandenburg and the ruined castles of the Teutonic Order. Before us stretches the future of a nation that has already defied the odds merely by existing. A kingdom built on sand, surrounded by enemies on every side, with no natural frontiers and few resources beyond the discipline of its people.\n\nYet it is precisely this adversity that has forged the Prussian character. We cannot afford the luxury of complacency. Every generation must earn anew what the last has built. The question is not whether Prussia will act, but in which direction we shall march."
 nd_pru.6.a: "Prussia endures."
 nd_pru.7.t: "The Rape of Silesia"
 nd_pru.7.d: "When the young king mounted the throne and learned that the Habsburg emperor had died leaving only a daughter to inherit, he saw an opportunity that history offers perhaps once in a century. Without declaration of war, without diplomatic pretext, Prussian columns marched into Silesia -- one of the richest provinces in Central Europe, with its linen manufactories, iron mines, and teeming population.\n\nThe seizure was a calculated gamble of the highest order. Every great power in Europe would oppose us. But Silesia doubles our population, triples our industry, and transforms Prussia from a curiosity into a contender. The conquest is complete. Now we must hold it."
 nd_pru.7.a: "Silesia is Prussian."
 nd_pru.8.t: "The Seven Years' War"
 nd_pru.8.d: "Prussia has survived the nightmare. Encircled by France, Austria, Russia, Sweden, and Saxony simultaneously -- outnumbered five to one in every theater -- the kingdom fought for seven years on the edge of annihilation. At Rossbach, at Leuthen, at Zorndorf, Prussian arms prevailed through speed, discipline, and the sheer refusal to accept defeat.\n\nThe war has devastated our lands but proven our mettle. Every court in Europe now treats Prussia as a great power. How shall we capitalize on this survival?"
 nd_pru.8.a: "Press our advantage. Seize the initiative."
 nd_pru.8.b: "Consolidate and fortify what we hold."
 nd_pru.9.t: "Master of Northern Germany"
 nd_pru.9.d: "The work of generations is complete. From Konigsberg to the Rhine, from the Baltic to the Harz Mountains, Prussian authority extends across the breadth of northern Germany. Berlin has grown from a provincial garrison town into one of Europe's great capitals. Magdeburg, the strongest fortress on the Elbe, guards our heartland. Hanover, once the seat of a rival electorate, now answers to our crown.\n\nPrussia commands the largest and finest army on the continent. The question before us now is how we shall wield this unprecedented power."
 nd_pru.9.a: "Total mobilization. Every resource serves the army."
 nd_pru.9.b: "Prussian hegemony speaks for itself."
 nd_pru.10.t: "The Francke Foundations"
 nd_pru.10.d: "In the university town of Halle, the Pietist theologian August Hermann Francke has built something unprecedented: an entire educational complex encompassing an orphanage, schools for the poor, a pharmacy, a printing press, and a teachers' seminary. The Franckesche Stiftungen demonstrate that systematic investment in human capital yields returns no mere treasury can match.\n\nFrancke's methods -- practical education, universal literacy, rational curriculum -- have attracted attention across Europe. They represent the seed of something larger: a state that derives its strength not from soldiers but from the quality of its citizens."
 nd_pru.10.a: "Reason is the foundation of the state."
 nd_pru.11.t: "The Cameralist Revolution"
 nd_pru.11.d: "The Prussian model of governance has matured into a science. The Cameralists -- state economists trained at Halle and Frankfurt an der Oder -- treat the kingdom as a single vast estate to be managed with precision. Every forest, mine, manufactory, and customs house is inventoried, taxed, and optimized.\n\nThe result is a state of remarkable efficiency. Prussia collects more revenue per capita than France, builds more roads per square mile than England, and educates more children per parish than any kingdom in Europe. Two schools of thought compete for influence."
 nd_pru.11.a: "The state must build. Invest in infrastructure."
 nd_pru.11.b: "Knowledge is wealth. Invest in minds."
 nd_pru.12.t: "The Aufklarung Triumphant"
 nd_pru.12.d: "Leipzig, the publishing capital of Europe, now operates under Prussian law. Its book fairs distribute the ideas of Kant, Lessing, and Moses Mendelssohn across the continent. Prussian universities lead the world in philosophy, theology, and the natural sciences. The Allgemeines Landrecht has codified the most comprehensive legal system in Europe.\n\nFrederick's vision of an enlightened state has been realized beyond anything he could have imagined. Prussia is admired not for the size of its army but for the quality of its governance, the tolerance of its society, and the brilliance of its thinkers. Two visions of enlightened governance now compete for the future."
 nd_pru.12.a: "Enlightened absolutism. Reform from above."
 nd_pru.12.b: "Constitutional principles. Reform through law."
 STATIC_MODIFIER_NAME_nd_pru_dest_krieg_rapid: "Rapid Conquest Doctrine"
 STATIC_MODIFIER_DESC_nd_pru_dest_krieg_rapid: "Strike before the enemy can prepare. Swift wars of aggression seize territory faster than coalitions can form against us -- at the cost of diplomatic standing."
 STATIC_MODIFIER_NAME_nd_pru_dest_krieg_iron: "Iron Consolidation"
 STATIC_MODIFIER_DESC_nd_pru_dest_krieg_iron: "Fortify every conquest, suppress every rebellion, and field an army that no alliance dares challenge."
 STATIC_MODIFIER_NAME_nd_pru_dest_koenig_mobil: "Total Mobilization"
 STATIC_MODIFIER_DESC_nd_pru_dest_koenig_mobil: "Every resource in the kingdom serves the war machine. Raw materials flow to foundries and arsenals, and the population accepts the burdens of military supremacy -- even at the cost of court expenditures."
 STATIC_MODIFIER_NAME_nd_pru_dest_koenig_hegemon: "Prussian Hegemony"
 STATIC_MODIFIER_DESC_nd_pru_dest_koenig_hegemon: "The crowned eagle of Prussia commands universal respect. Legitimate authority, cultural influence, and satisfied estates make the kingdom the arbiter of Central European affairs."
 STATIC_MODIFIER_NAME_nd_pru_dest_kamer_mercant: "Mercantilist Efficiency"
 STATIC_MODIFIER_DESC_nd_pru_dest_kamer_mercant: "The Cameralist state directs investment into infrastructure and industry, reducing building costs, boosting production, and empowering Prussian merchants."
 STATIC_MODIFIER_NAME_nd_pru_dest_kamer_wissen: "Wissensgesellschaft"
 STATIC_MODIFIER_DESC_nd_pru_dest_kamer_wissen: "A society organized around knowledge. Prussian universities, spy networks, and diplomatic channels spread influence and gather intelligence with unmatched effectiveness."
 STATIC_MODIFIER_NAME_nd_pru_dest_aufkl_absolut: "Enlightened Absolutism"
 STATIC_MODIFIER_DESC_nd_pru_dest_aufkl_absolut: "The philosopher-king rules for all his subjects equally. Religious tolerance, cultural integration, and acceptance of diversity strengthen the state from within."
 STATIC_MODIFIER_NAME_nd_pru_dest_aufkl_verfass: "Verfassungsstaat"
 STATIC_MODIFIER_DESC_nd_pru_dest_aufkl_verfass: "A constitutional state governed by law, not royal whim. Population growth flourishes under stable institutions, while fiscal reform reduces the cost of both war and debt."
 nd_pru_kriegsakademie: "Kriegsakademie"
 nd_pru_kriegsakademie_desc: "The Prussian War College, successor to Scharnhorst's Kriegsakademie, trains officers in the art of command through rigorous study of strategy, tactics, and military history."
 nd_pru_kriegsakademie_upkeep: "War College Operations"
 nd_pru_kriegsakademie_upkeep_desc: "Weapons for drills, books of strategy, paper for war plans, and horses for cavalry exercises consumed in the training of Prussia's military elite."
 nd_pru_universitat: "Universitat"
 nd_pru_universitat_desc: "A Prussian research university in the Humboldtian tradition, uniting teaching and research. Its faculties advance knowledge in philosophy, natural science, and law."
 nd_pru_universitat_upkeep: "University Operations"
 nd_pru_universitat_upkeep_desc: "Books for the library, paper for scholarly publications, glass for laboratory apparatus, and furniture for lecture halls consumed by the pursuit of knowledge."
