l_english:

 # === FORMATION EVENT ===
 nd_cth.1.t: "The Rebirth of Carthage"
 nd_cth.1.d: "The ancient city rises again. Where once the Phoenician traders built a thalassocracy that rivaled Rome itself, a new Carthage now commands the crossroads of the Mediterranean. The cothon harbors of old may lie in ruins, but the spirit of Baal Hammon and the legacy of Hannibal Barca stir in the hearts of our people.\n\nTwo visions compete for the soul of this reborn nation. Shall we reclaim the seas as our ancestors did -- masters of trade, shipbuilding, and maritime dominion from the Pillars of Hercules to the shores of Sicily? Or shall we forge a continental empire worthy of the Barcid generals, drawing upon the diverse peoples of Africa and Iberia as Carthage always did -- not through citizen armies but through the disciplined strength of recruited nations?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_cth.1.a: "Command the seas as our ancestors did"
 nd_cth.1.b: "Build an empire worthy of the Barcids"

 # === FORMATION CHOICE MODIFIERS ===
 STATIC_MODIFIER_NAME_nd_cth_thalassocracy: "Punic Thalassocracy"
 STATIC_MODIFIER_DESC_nd_cth_thalassocracy: "Carthage commands the Mediterranean through the same instruments that built the original Punic empire: unmatched seamanship, far-reaching trade networks, and the commercial wealth they generate."
 STATIC_MODIFIER_NAME_nd_cth_punic_imperium: "Punic Imperium"
 STATIC_MODIFIER_DESC_nd_cth_punic_imperium: "In the tradition of Hamilcar and Hannibal, the new Carthage builds its power through military excellence -- recruiting the finest warriors from subject peoples and forging them into a disciplined instrument of conquest."

 # === ADVANCE EVENT 2: TOPHET ===
 nd_cth.2.t: "Consecration of the Tophet"
 nd_cth.2.d: "At the ancient precinct of Salambo, where thousands of stelae still stand inscribed to Baal Hammon and Tanit, the sacred flames burn once more. The Tophet -- that most sacred and most debated of Carthaginian institutions -- has been restored as the spiritual heart of the reborn nation.\n\nWhether the urns once held the ashes of sacrificed firstborn or merely stillborn children given to the gods, the Tophet's power as a symbol of Punic devotion is beyond question. The triangular sign of Tanit, carved into fresh stone, declares to all who pass: Carthage remembers its gods."
 nd_cth.2.a: "The gods of Carthage watch over us"

 # === ADVANCE EVENT 3: COTHON DOCKS ===
 nd_cth.3.t: "Revival of Punic Engineering"
 nd_cth.3.d: "The ancient cothon -- that marvel of Carthaginian engineering -- has been rebuilt. The original harbors of Carthage were the wonder of the ancient world: an outer rectangular basin for merchant vessels and an inner circular harbor for the war fleet, capable of housing two hundred and twenty warships in covered berths arranged around a central admiralty island.\n\nOur engineers have studied what remains of these works and applied their principles anew. Though the scale may differ, the genius is the same -- protected inner harbors where ships can be built, repaired, and launched with a speed and efficiency that no open roadstead can match."
 nd_cth.3.a: "The cothon rises again"

 # === ADVANCE EVENT MODIFIERS ===
 STATIC_MODIFIER_NAME_nd_cth_baal_hammon_blessing: "Blessing of Baal Hammon"
 STATIC_MODIFIER_DESC_nd_cth_baal_hammon_blessing: "The ancient gods of Carthage smile upon the restored Tophet. Religious devotion strengthens the bonds of Punic society."
 STATIC_MODIFIER_NAME_nd_cth_punic_engineering: "Punic Engineering Legacy"
 STATIC_MODIFIER_DESC_nd_cth_punic_engineering: "The revival of cothon harbor engineering grants Carthage an advantage in construction and shipbuilding that echoes its ancient maritime supremacy."

 # === DESTINY VARIABLES ===
 nd_cth_formed_tt: "Carthage has been reborn"
 nd_cth_path_a_tt: "The path of the Thalassocracy"
 nd_cth_path_b_tt: "The path of the Punic Imperium"

 # === ADVANCES ===
 nd_cth_tophet_cult: "Cult of Baal Hammon"
 nd_cth_tophet_cult_desc: "The restoration of the Tophet as a center of Punic worship, honoring the ancient gods Baal Hammon and Tanit through ritual and devotion."
 nd_cth_sacred_band_tradition: "Sacred Band Tradition"
 nd_cth_sacred_band_tradition_desc: "Drawing on the legacy of Carthage's elite citizen soldiers -- the Sacred Band -- who fought as heavy infantry in the ancient phalanx formations."
 nd_cth_tyrian_purple: "Tyrian Purple"
 nd_cth_tyrian_purple_desc: "The revival of the ancient Phoenician craft of extracting purple dye from murex sea snails, producing the legendary Tyrian purple cloth that was once worth more than gold."
 nd_cth_triple_wall: "Triple Wall Fortifications"
 nd_cth_triple_wall_desc: "The massive triple-walled defenses that once protected Carthage -- three concentric walls with stabling for war elephants and barracks within -- inspire a new generation of fortification."
 nd_cth_cothon_docks: "Cothon Harbor Engineering"
 nd_cth_cothon_docks_desc: "The reconstruction of the cothon -- the protected inner harbor system that was the crown jewel of Carthaginian naval engineering, with covered berths and repair facilities."
 nd_cth_numidian_cavalry: "Numidian Cavalry Tradition"
 nd_cth_numidian_cavalry_desc: "The recruitment and training of Numidian light horsemen who ride without bridle, hurling javelins with deadly accuracy -- the finest light cavalry in the ancient Mediterranean."
 nd_cth_phoenician_glass: "Phoenician Glassmaking"
 nd_cth_phoenician_glass_desc: "The Phoenicians were legendary glassmakers, and Carthage inherits their techniques -- producing translucent glass vessels, colored beads, and decorative wares prized across the Mediterranean."
 nd_cth_council_of_elders: "Council of Elders"
 nd_cth_council_of_elders_desc: "The Carthaginian senate -- the Council of Elders -- governed through deliberation and consensus, providing stable administration and careful statecraft."
 nd_cth_libyan_infantry_reforms: "Libyan Infantry Reforms"
 nd_cth_libyan_infantry_reforms_desc: "Reorganization of the subject Libyan infantry into disciplined spear formations, equipped with bronze helmets and aspis shields in the manner of the old Punic heavy infantry."
 nd_cth_naval_rams: "Naval Ram Tactics"
 nd_cth_naval_rams_desc: "The development of the quinquereme -- the five-banked warship that was Carthage's signature vessel -- armed with a devastating bronze ram at the prow."
 nd_cth_punic_literacy: "Punic Literary Tradition"
 nd_cth_punic_literacy_desc: "Though most Punic literature was destroyed with Carthage, the revival of the Punic script and scholarly tradition preserves the knowledge of Mago's agricultural treatises and the voyages of Hanno."
 nd_cth_carthaginian_diplomacy: "Carthaginian Diplomacy"
 nd_cth_carthaginian_diplomacy_desc: "Carthage's diplomatic tradition -- a network of treaties, trade agreements, and intelligence networks that once spanned from the Tin Islands to the coast of West Africa."
 nd_cth_royal_purple_monopoly: "Royal Purple Monopoly"
 nd_cth_royal_purple_monopoly_desc: "State control over the lucrative purple dye trade, ensuring Carthage's monopoly on the most prestigious luxury commodity in the Mediterranean world."
 nd_cth_mediterranean_dominance: "Mediterranean Naval Dominance"
 nd_cth_mediterranean_dominance_desc: "Carthaginian mastery of the central Mediterranean, controlling the sea lanes between Africa, Sicily, and Sardinia through superior seamanship and galley tactics."
 nd_cth_punic_urban_planning: "Punic Urban Planning"
 nd_cth_punic_urban_planning_desc: "The systematic layout of Carthaginian cities -- regular street grids, multi-story insulae, sophisticated drainage, and careful zoning of commercial and residential districts."
 nd_cth_mercenary_reforms: "Mercenary Army Reforms"
 nd_cth_mercenary_reforms_desc: "The restructuring of Carthage's polyglot mercenary forces into organized contingents with standardized logistics, drawing upon Iberian, Gallic, Libyan, and Numidian recruits."
 nd_cth_punic_military_reform: "Punic Military Reform"
 nd_cth_punic_military_reform_desc: "A comprehensive restructuring of the Carthaginian army, moving beyond reliance on mercenary bands toward a professional standing force with standardized equipment and training."
 nd_cth_barcid_legacy: "Legacy of the Barcids"
 nd_cth_barcid_legacy_desc: "The memory of the Barcid dynasty -- Hamilcar, Hasdrubal, and above all Hannibal -- inspires a new era of naval ambition and strategic boldness."
 nd_cth_punic_institutions: "Punic Institutional Revival"
 nd_cth_punic_institutions_desc: "The systematic restoration of Carthaginian administrative institutions -- the suffetes, the treasury, the census, and the courts -- providing a framework for modern governance."
 nd_cth_siege_engineering: "Punic Siege Engineering"
 nd_cth_siege_engineering_desc: "Drawing on the engineering traditions that built Carthage's massive fortifications, Punic siege experts develop techniques to both construct and breach the mightiest walls."
 nd_cth_punic_constitution: "Punic Constitutional Reform"
 nd_cth_punic_constitution_desc: "Aristotle praised the Carthaginian constitution as among the finest in the ancient world. Its revival establishes a balanced system of magistrates, councils, and popular assemblies."
 nd_cth_carthaginian_renaissance: "Carthaginian Cultural Renaissance"
 nd_cth_carthaginian_renaissance_desc: "A flowering of Punic arts, scholarship, and literature, drawing on the rich heritage of Phoenician and Carthaginian civilization to create a distinctive cultural identity."
 nd_cth_modern_punic_fleet: "Modern Punic Fleet"
 nd_cth_modern_punic_fleet_desc: "The transformation of the Carthaginian navy from galley-based warfare to modern ship construction, while retaining the seamanship and tactical traditions of the ancient fleet."
 nd_cth_neo_punic_industry: "Neo-Punic Industry"
 nd_cth_neo_punic_industry_desc: "The industrial development of Carthaginian territories, building on centuries of craft expertise in metalworking, glassmaking, textile production, and agricultural processing."

 # === UNITS ===
 a_nd_cth_sacred_band: "Sacred Band"
 a_nd_cth_sacred_band_desc: "Elite citizen heavy infantry drawn from Carthage's wealthiest families, trained from youth in phalanx warfare. The Sacred Band serves as the backbone of the citizen army."
 a_nd_cth_numidian_horse: "Numidian Light Horse"
 a_nd_cth_numidian_horse_desc: "Swift Numidian cavalrymen who ride without bridle or saddle, hurling javelins with lethal accuracy before wheeling away. Masters of pursuit and desert warfare."
 n_nd_cth_war_galley: "Punic War Galley"
 n_nd_cth_war_galley_desc: "A purpose-built warship in the Carthaginian tradition, faster and more maneuverable than standard galleys, designed for ramming and boarding actions."
 a_nd_cth_libyan_spearmen: "Libyan Spearmen"
 a_nd_cth_libyan_spearmen_desc: "Disciplined African infantry armed with long spears, bronze helmets, and round shields. These subject soldiers form the reliable core of Carthaginian land armies."
 n_nd_cth_quinquereme: "Punic Quinquereme"
 n_nd_cth_quinquereme_desc: "The mighty quinquereme -- a five-banked warship armed with a devastating bronze ram. The signature vessel of Carthaginian naval power, capable of dominating any sea battle."

 # === BUILDINGS ===
 nd_cth_tophet: "Tophet Shrine"
 nd_cth_tophet_desc: "A sacred precinct dedicated to Baal Hammon and Tanit, where stelae are erected and offerings made according to ancient Punic religious tradition."
 nd_cth_punic_shipyard: "Punic Shipyard"
 nd_cth_punic_shipyard_desc: "A protected harbor facility built on cothon principles -- covered berths, repair docks, and launching ramps that allow rapid construction and maintenance of warships."
 nd_cth_glassworks: "Punic Glassworks"
 nd_cth_glassworks_desc: "A workshop specializing in the ancient Phoenician art of glassmaking, producing colored vessels, beads, and decorative glass prized throughout the Mediterranean trade networks."
 nd_cth_dye_works: "Punic Dye Works"
 nd_cth_dye_works_desc: "A coastal facility for the extraction and processing of murex purple dye -- the legendary Tyrian purple that was once the monopoly of Phoenician merchants."
 nd_cth_punic_citadel: "Punic Citadel"
 nd_cth_punic_citadel_desc: "A massive fortification inspired by the triple walls of ancient Carthage, with thick stone ramparts, deep ditches, and internal chambers for supply storage."
 nd_cth_emporium: "Punic Emporium"
 nd_cth_emporium_desc: "A fortified coastal trading post in the Carthaginian tradition, where merchants from across the Mediterranean gather to exchange goods under the protection of Punic law."
 nd_cth_fondouk: "Punic Fondouk"
 nd_cth_fondouk_desc: "A fortified trading house in the Carthaginian tradition, providing lodging, warehousing, and commercial space for the diverse merchants of the Mediterranean trade networks."
 nd_cth_suffete_court: "Suffete Court"
 nd_cth_suffete_court_desc: "The seat of the suffetes -- the paired magistrates who governed Carthage -- restored as a center of civic administration, justice, and public record-keeping."

 # === PRODUCTION METHODS ===
 nd_cth_tophet_maintenance: "Tophet Offerings"
 nd_cth_tophet_maintenance_desc: "Incense, sacrificial animals, and stone for stelae -- the traditional offerings to sustain the sacred precinct."
 nd_cth_shipyard_maintenance: "Shipyard Operations"
 nd_cth_shipyard_maintenance_desc: "Timber, naval supplies, and iron fittings required to maintain the cothon shipyard at operational readiness."
 nd_cth_glass_production: "Phoenician Glassmaking"
 nd_cth_glass_production_desc: "The transformation of sand and mineral coloring agents into finished glass vessels, using techniques inherited from Phoenician master craftsmen."
 nd_cth_glassworks_maintenance: "Glassworks Upkeep"
 nd_cth_glassworks_maintenance_desc: "Fuel and furnace materials needed to keep the glass kilns at working temperature."
 nd_cth_purple_cloth_production: "Tyrian Purple Dyeing"
 nd_cth_purple_cloth_production_desc: "The laborious extraction of purple dye from murex snails and its application to woven cloth -- producing legendary Tyrian purple fine cloth prized across the Mediterranean."
 nd_cth_dye_maintenance: "Dye Works Upkeep"
 nd_cth_dye_maintenance_desc: "Pottery vats, salt for preservation, and fuel to maintain the dye extraction process."
 nd_cth_citadel_maintenance: "Citadel Garrison"
 nd_cth_citadel_maintenance_desc: "Stone for repairs, weapons for the garrison, and iron reinforcements to maintain the citadel's defensive strength."
 nd_cth_emporium_maintenance: "Emporium Operations"
 nd_cth_emporium_maintenance_desc: "Cloth for merchant displays, pottery for trade goods, and timber for maintaining the trading post and its warehousing facilities."
 nd_cth_fondouk_maintenance: "Fondouk Operations"
 nd_cth_fondouk_maintenance_desc: "Textiles, pottery for merchant goods display, and timber for maintaining the trading house and its warehousing facilities."
 nd_cth_suffete_maintenance: "Court Administration"
 nd_cth_suffete_maintenance_desc: "Paper for records, cloth for official vestments, and stone for maintaining the civic buildings of the suffete court."

 # ===== DESTINY ADVANCES =====
 nd_cth_destiny: "Destiny of Carthage"
 nd_cth_destiny_desc: "The foundations of reborn Carthage are secure. From this base of stability, a great destiny beckons -- but which destiny shall it be?"

 nd_cth_dest_sardinian_sea: "Command of the Sardinian Sea"
 nd_cth_dest_sardinian_sea_desc: "Secure Sardinia and Corsica to dominate the central Mediterranean. Control these island bastions and fill the treasury to fund further expansion. Requires choosing the Thalassocratic path."
 nd_cth_dest_pillars_of_hercules: "The Pillars of Hercules"
 nd_cth_dest_pillars_of_hercules_desc: "Command the strait where the Mediterranean meets the Atlantic. Seize Cadiz, Gibraltar, and Cartagena to control the western sea lanes and the ancient Punic trade routes."
 nd_cth_dest_mare_nostrum: "Mare Nostrum"
 nd_cth_dest_mare_nostrum_desc: "Make the entire Mediterranean a Punic lake. Command Genoa, Alexandria, and Crete -- the three corners of Mediterranean commerce -- and build an empire of unprecedented wealth."

 nd_cth_dest_african_hegemony: "African Hegemony"
 nd_cth_dest_african_hegemony_desc: "Secure dominion over western North Africa by conquering Fez and Tangier. Build the army that will carry Punic ambitions beyond Africa. Requires choosing the Barcid Imperium path."
 nd_cth_dest_iberian_campaign: "The Iberian Campaign"
 nd_cth_dest_iberian_campaign_desc: "Cross the strait as Hamilcar once did. Conquer Granada, Cordoba, and Sevilla -- the rich cities of southern Iberia that funded the original Barcid campaigns against Rome."
 nd_cth_dest_hannibal_ante_portas: "Hannibal ante Portas"
 nd_cth_dest_hannibal_ante_portas_desc: "Finish what Hannibal could not. Take Rome and Naples -- the heart of the ancient enemy. With the Eternal City in Punic hands, the Mediterranean world bows to Carthage at last."

 # ===== DESTINY EVENTS =====

 # Root event
 nd_cth.4.t: "The Destiny of Carthage"
 nd_cth.4.d: "Carthage stands reborn, its foundations secure and its people united. The ancient city that once commanded half the Mediterranean now faces a choice that will define its future for centuries to come.\n\nThe suffetes and the Council of Elders debate endlessly. Some point to the harbors, the cothons, the merchant fleets -- the instruments that built Carthaginian power in the first place. Others invoke the memory of the Barcid generals, who proved that Carthage could match any land power in open battle.\n\nThe destiny of Carthage awaits."
 nd_cth.4.a: "Our destiny is written in the stars"

 # Path A Stage 1
 nd_cth.5.t: "Command of the Sardinian Sea"
 nd_cth.5.d: "The islands of Sardinia and Corsica -- those ancient prizes over which Carthage and Rome first came to blows -- are ours once more. The Sardinian Sea, that vital corridor between Africa and Europe, is now a Punic lake.\n\nFrom Cagliari and Ajaccio, our merchant fleets can reach any port in the western Mediterranean within days. The island fortresses that once served as stepping stones for Roman conquest now serve as bastions of Punic commerce."
 nd_cth.5.a: "The sea roads are open"

 # Path A Stage 2
 nd_cth.6.t: "The Pillars of Hercules"
 nd_cth.6.d: "The ancient boundary stones of the known world stand under Punic authority. Cadiz -- Gadir, as the Phoenicians called it -- was the oldest colony in the west, founded before Carthage itself. Gibraltar, the rock that guards the passage between seas, is ours.\n\nCartagena -- New Carthage, Hasdrubal's capital in Iberia -- completes the chain. Every ship that passes between the Atlantic and the Mediterranean must now reckon with Punic power. The question is whether to turn outward toward the vast ocean, or inward to master the trade of the inner sea."
 nd_cth.6.a: "Look beyond the Pillars to the Atlantic"
 nd_cth.6.b: "Master the commerce of the inner sea"

 # Path A Stage 3
 nd_cth.7.t: "Mare Nostrum"
 nd_cth.7.d: "From Genoa to Alexandria, from Crete to the Pillars of Hercules, the Mediterranean is a Punic sea. The dream that Rome achieved through legions and roads, Carthage has accomplished through ships and trade -- a commercial empire spanning three continents.\n\nThe harbors of Genoa funnel the wealth of Europe. The granaries and workshops of Alexandria channel the riches of the East. The harbors of Crete command the sea lanes between them all. Carthage sits at the center, the spider in a web of commerce that makes the old Roman mare nostrum seem parochial by comparison.\n\nThis is the Punic thalassocracy fulfilled -- not through the sword, but through the ledger and the sail."
 nd_cth.7.a: "Forge a lasting imperial dominion"
 nd_cth.7.b: "Let commerce be our crown"

 # Path B Stage 1
 nd_cth.8.t: "African Hegemony"
 nd_cth.8.d: "The western reaches of North Africa bow to Punic authority. Fez, the ancient capital of Morocco, and Tangier, the gateway to the strait, are now Carthaginian possessions. The Berber and Arab peoples of the Maghreb serve under the banner of the new Punic empire, just as the Numidians and Libyans once served under the Barcids.\n\nWith Africa secured, the army grows stronger by the day. The diverse peoples of the continent provide cavalry, infantry, and specialists of every kind. The path northward beckons."
 nd_cth.8.a: "Africa is ours -- now look north"

 # Path B Stage 2
 nd_cth.9.t: "The Iberian Campaign"
 nd_cth.9.d: "Hamilcar Barca crossed into Iberia to rebuild Carthaginian power after the First Punic War. His son Hannibal launched the greatest military campaign of antiquity from these same shores. Now a new generation of Punic soldiers stands in Granada, Cordoba, and Sevilla -- the rich cities of Andalusia that once funded Barcid ambitions.\n\nThe veterans of this campaign are hardened by siege and battle. The question is whether to forge them into a professional elite or to open the ranks wider, drawing on the vast manpower of our African territories."
 nd_cth.9.a: "Forge a veteran professional army"
 nd_cth.9.b: "Recruit from our vast African domains"

 # Path B Stage 3
 nd_cth.10.t: "Hannibal ante Portas"
 nd_cth.10.d: "Hannibal ad portas -- 'Hannibal is at the gates!' The cry that once terrorized Roman mothers into silence now echoes through the streets of the Eternal City itself. Rome has fallen. Naples has fallen. The ancient enemy that razed Carthage to the ground and sowed its fields with salt has been brought to its knees.\n\nWhat Hannibal could not achieve with his elephants and genius, what Hasdrubal could not accomplish with reinforcements from Iberia, the new Carthage has done. The Punic eagle perches where the Roman wolf once stood.\n\nThe world holds its breath. What will the new masters of Rome build upon the ruins of the old?"
 nd_cth.10.a: "Let Punic triumph echo through the ages"
 nd_cth.10.b: "Build a new order from this conquest"

 # ===== DESTINY TIMED MODIFIERS =====

 STATIC_MODIFIER_NAME_nd_cth_dest_atlantic_gateway: "Gateway to the Atlantic"
 STATIC_MODIFIER_DESC_nd_cth_dest_atlantic_gateway: "Command of the Pillars of Hercules opens the vast Atlantic to Punic exploration, extending Carthage's diplomatic and naval reach beyond the ancient world."
 STATIC_MODIFIER_NAME_nd_cth_dest_merchant_princes: "Merchant Princes of the Mediterranean"
 STATIC_MODIFIER_DESC_nd_cth_dest_merchant_princes: "The wealthiest merchants of the Mediterranean converge on Punic ports, offering favorable credit and strengthening relations -- though the comfort of prosperity dulls military preparedness."
 STATIC_MODIFIER_NAME_nd_cth_dest_punic_dominion: "Punic Dominion"
 STATIC_MODIFIER_DESC_nd_cth_dest_punic_dominion: "The Mediterranean basin falls under a unified Punic administration, with subject peoples gradually absorbed into Carthaginian civic life."
 STATIC_MODIFIER_NAME_nd_cth_dest_queen_of_the_sea: "Queen of the Sea"
 STATIC_MODIFIER_DESC_nd_cth_dest_queen_of_the_sea: "Carthage presides over the greatest trade network the Mediterranean has ever known, its merchant agents doubling as an unrivaled intelligence network -- though such mastery breeds complacency."
 STATIC_MODIFIER_NAME_nd_cth_dest_iberian_veterans: "Iberian Veterans"
 STATIC_MODIFIER_DESC_nd_cth_dest_iberian_veterans: "The veterans of the Iberian campaign form the professional core of the Punic army -- rapidly reinforced and quickly mustered, though the hard campaigning takes its toll on the troops."
 STATIC_MODIFIER_NAME_nd_cth_dest_african_recruits: "African Recruits"
 STATIC_MODIFIER_DESC_nd_cth_dest_african_recruits: "The vast African territories supply strong garrisons and the confidence to wage aggressive wars, though the strain of maintaining such forces across the continent fuels rising prices."
 STATIC_MODIFIER_NAME_nd_cth_dest_punic_triumph: "Punic Triumph"
 STATIC_MODIFIER_DESC_nd_cth_dest_punic_triumph: "The fall of Rome crowns Carthage as the undisputed master of the Mediterranean, granting unmatched leverage in peace negotiations while plundered wealth sustains the army."
 STATIC_MODIFIER_NAME_nd_cth_dest_new_punic_order: "New Punic Order"
 STATIC_MODIFIER_DESC_nd_cth_dest_new_punic_order: "With Rome fallen, Carthage builds a new political order -- a multiethnic empire that embraces diverse faiths and converts subject peoples to Punic civic life."

 # ===== DESTINY BUILDINGS =====

 nd_cth_dest_cothon_emporium: "Grand Cothon Emporium"
 nd_cth_dest_cothon_emporium_desc: "A monumental harbor-market complex combining the ancient cothon shipbuilding tradition with the commercial infrastructure of a great Mediterranean trading house."
 nd_cth_dest_barcid_academy: "Barcid Military Academy"
 nd_cth_dest_barcid_academy_desc: "An officer training school inspired by the strategic genius of Hamilcar, Hasdrubal, and Hannibal Barca -- educating the next generation of Punic commanders."

 # ===== DESTINY PRODUCTION METHODS =====

 nd_cth_dest_cothon_emporium_maintenance: "Emporium Operations"
 nd_cth_dest_cothon_emporium_maintenance_desc: "Timber for harbor infrastructure, cloth and paper for merchant operations, and tools for maintaining the complex trading machinery."
 nd_cth_dest_barcid_academy_maintenance: "Academy Operations"
 nd_cth_dest_barcid_academy_maintenance_desc: "Weapons and horses for training, leather for equipment, and paper for strategic manuals and officer correspondence."
