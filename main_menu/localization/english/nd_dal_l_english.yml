l_english:
 nd_dal_formed_tt: "Dalmatia has been formed"
 STATIC_MODIFIER_NAME_nd_dal_republic_of_the_adriatic: "Republic of the Adriatic"
 STATIC_MODIFIER_DESC_nd_dal_republic_of_the_adriatic: "Following the model of Ragusa, Dalmatia governs itself as a mercantile republic, preserving its freedom through shrewd diplomacy, trade agreements, and the careful balancing of greater powers -- paying tribute where necessary, but bowing to none."
 STATIC_MODIFIER_NAME_nd_dal_maritime_league: "Dalmatian Maritime League"
 STATIC_MODIFIER_DESC_nd_dal_maritime_league: "The city-states of the Dalmatian coast unite into a naval confederation, pooling their shipyards, sailors, and merchant fleets into a force that commands the Adriatic sea lanes and projects power far beyond their modest coastline."
 nd_dal.1.t: "The Cities of the Coast"
 nd_dal.1.d: "The banner of Dalmatia flies over the ancient cities of the eastern Adriatic. From Zadar in the north to Dubrovnik in the south, a chain of fortified port cities clings to the narrow coastal strip between the Dinaric Mountains and the sea. For centuries these communes have balanced between empires -- Byzantium, Venice, Hungary, and now the Ottoman shadow -- surviving through commerce, seamanship, and an instinct for diplomacy that borders on art.\n\nDubrovnik's Great Council must now decide the character of this new union. Shall Dalmatia follow the Ragusan model -- a republic of merchants and diplomats, paying tribute to preserve autonomy, thriving on trade that flows between East and West? Or shall the coastal cities unite their fleets into a maritime league, building naval power that commands the Adriatic through force of arms rather than force of argument?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_dal.1.a: "Liberty is not given, it is traded for"
 nd_dal.1.b: "The sea shall be our shield and sword"
 nd_dal.2.t: "The Quarantine Decree"
 nd_dal.2.d: "On 27 July 1377, the Great Council of Ragusa issued a decree without precedent in European history. All travelers arriving from plague-infected regions must spend thirty days -- later extended to forty, giving us the word 'quarantine' from quaranta giorni -- on the barren islet of Mrkan before entering the city.\n\nNo other city has attempted anything like this. Venice will not establish its own lazaretto for another forty-six years. The Ragusan decree recognizes what no physician yet fully understands: that disease travels with people, and that isolation is the price of survival.\n\nThe system works. While plague devastates cities across Europe, Dubrovnik endures. But the lazaretto delays trade and irritates foreign merchants. Shall we enforce the quarantine strictly, accepting slower commerce for safer citizens? Or shall we maintain an open port policy, trusting our physicians to manage risk while keeping trade flowing?"
 nd_dal.2.a: "Forty days for the safety of our people"
 nd_dal.2.b: "Commerce must not be chained to an island"
 nd_dal.3.t: "The Abolition Decree"
 nd_dal.3.d: "On 27 January 1416, the Great Council of Ragusa passed a decree that would not be matched by any European state for nearly four centuries. The slave trade is hereby abolished within the Republic. No Ragusan ship may transport slaves. No Ragusan citizen may buy, sell, or own another human being. The penalty is six months imprisonment and a fine of twenty-five pounds per person.\n\nThe motivations are mixed -- genuine moral conviction among some councilors, practical calculation among others who note that slave labor depresses wages for free workers, and diplomatic advantage in presenting Ragusa as a beacon of civilization. Whatever the reasons, the result is the same: Ragusa becomes the first European state to ban the slave trade, a full 391 years before Britain."
 nd_dal.3.a: "Non bene pro toto libertas venditur auro"
 nd_dal.4.t: "The Argosy Fleet"
 nd_dal.4.d: "The word 'argosy' has entered the languages of Europe as a synonym for a great merchant fleet -- and it derives from 'Ragusa.' The reason is plain to see in the harbor of Dubrovnik. One hundred and eighty ships, crewed by five thousand sailors, carry Dalmatian goods to every port in the Mediterranean and beyond. The largest argosies are four-masted vessels carrying one hundred tons, armed with cannon and crewed by one hundred forty men.\n\nShakespeare himself will immortalize these ships. Spanish admirals recruit Ragusan captains for their armadas. The argosies are not merely merchant vessels -- they are floating fortresses that need no naval escort, combining the cargo capacity of a merchantman with the armament of a warship.\n\nShall we organize these ships into a merchant armada, projecting power through their sheer size and armament? Or shall we perfect the convoy system, emphasizing trade protection and efficient commerce over raw naval might?"
 nd_dal.4.a: "Each argosy is a castle on the waves"
 nd_dal.4.b: "Our strength is in the convoy, not the broadside"
 STATIC_MODIFIER_NAME_nd_dal_quarantine_decree: "Quarantine Decree"
 STATIC_MODIFIER_DESC_nd_dal_quarantine_decree: "The rigorous enforcement of quarantine procedures pioneered by Ragusa in 1377 -- thirty days of isolation on offshore islands for all arrivals from plague regions -- protecting the population at the cost of slower trade."
 STATIC_MODIFIER_NAME_nd_dal_open_port_policy: "Open Port Policy"
 STATIC_MODIFIER_DESC_nd_dal_open_port_policy: "A pragmatic approach to quarantine that prioritizes commercial flow, relying on physicians and inspections rather than blanket isolation. Trade prospers, though disease finds easier entry."
 STATIC_MODIFIER_NAME_nd_dal_liberty_of_ragusa: "Liberty of Ragusa"
 STATIC_MODIFIER_DESC_nd_dal_liberty_of_ragusa: "The abolition decree of 1416 -- 'Non bene pro toto libertas venditur auro' (Liberty is not sold for all the gold in the world) -- earns Ragusa international prestige and attracts skilled workers from across the Mediterranean."
 STATIC_MODIFIER_NAME_nd_dal_merchant_armada: "Merchant Armada"
 STATIC_MODIFIER_DESC_nd_dal_merchant_armada: "The Ragusan argosies are organized as a merchant armada -- armed merchantmen so heavily built that they need no escort, projecting both commercial and military power across the Mediterranean."
 STATIC_MODIFIER_NAME_nd_dal_convoy_system: "Convoy System"
 STATIC_MODIFIER_DESC_nd_dal_convoy_system: "Ragusan merchant ships sail in organized convoys, with light escorts and standardized sailing schedules that maximize trade throughput while minimizing losses to pirates and privateers."
 nd_dal_fondaco_tradition: "Fondaco Tradition"
 nd_dal_fondaco_tradition_desc: "The fondaco -- a combined warehouse, exchange, and hostelry -- is the foundation of Dalmatian commerce, where merchants store goods, negotiate contracts, and settle disputes under the watchful eye of the commune."
 nd_dal_statute_of_ragusa: "Statute of Ragusa"
 nd_dal_statute_of_ragusa_desc: "The 1272 Statute of Ragusa codifies Roman legal traditions alongside local customs, establishing rules for commerce, urban planning, hygiene, and public order that make the republic a model of civic governance."
 nd_dal_commune_governance: "Commune Governance"
 nd_dal_commune_governance_desc: "The Dalmatian city-states govern themselves through elected councils, rectors serving brief terms, and traditions of collective decision-making rooted in centuries of maritime republicanism."
 nd_dal_salt_monopoly: "Salt Monopoly"
 nd_dal_salt_monopoly_desc: "The saltworks of Pag, Ston, and Nin produce the white gold of the Adriatic, a commodity so valuable that control of the salt trade underpins Dalmatian wealth and diplomacy."
 nd_dal_uskok_tradition: "Uskok Tradition"
 nd_dal_uskok_tradition_desc: "The Uskoks -- refugees from Ottoman-conquered lands -- settle along the Dalmatian coast as frontier fighters, their guerrilla skills and knowledge of mountain terrain making them invaluable border defenders."
 nd_dal_quarantine_system: "Quarantine System"
 nd_dal_quarantine_system_desc: "In 1377, Ragusa became the first city in the world to institute systematic quarantine, requiring all arrivals from plague regions to isolate on offshore islands before entering the city."
 nd_dal_ragusan_diplomacy: "Ragusan Diplomacy"
 nd_dal_ragusan_diplomacy_desc: "The Republic of Ragusa perfected the art of survival through diplomacy, maintaining agents and informants across the Mediterranean while playing Venice, Hungary, and the Ottomans against each other."
 nd_dal_abolition_decree: "Abolition Decree"
 nd_dal_abolition_decree_desc: "In 1416, the Republic of Ragusa became the first European state to abolish the slave trade, a declaration of principle that enhanced its prestige and attracted skilled freemen to its harbors."
 nd_dal_adriatic_salt_routes: "Adriatic Salt Routes"
 nd_dal_adriatic_salt_routes_desc: "Dalmatian salt from Pag, Ston, and Nin travels the Adriatic trade routes, exchanged for Italian grain, Levantine spices, and Balkan minerals in a web of commerce that enriches every coastal commune."
 nd_dal_argosy_shipwrights: "Argosy Shipwrights"
 nd_dal_argosy_shipwrights_desc: "The shipyards of Dubrovnik produce the famed argosy -- a massive, heavily built merchant vessel that combines the cargo capacity of a transport with the armament of a warship, giving the word 'argosy' to the English language."
 nd_dal_morlach_frontier: "Morlach Frontier"
 nd_dal_morlach_frontier_desc: "The Morlachs -- Vlach-speaking pastoralists of the Dinaric hinterland -- are recruited as frontier guards, their knowledge of mountain warfare making them formidable border defenders."
 nd_dal_sponza_archives: "Sponza Archives"
 nd_dal_sponza_archives_desc: "The Sponza Palace in Dubrovnik houses the state archive and customs office, where meticulous records of trade, diplomacy, and governance preserve centuries of Ragusan knowledge and enable efficient customs collection."
 nd_dal_tribute_autonomy: "Tribute Autonomy"
 nd_dal_tribute_autonomy_desc: "Dalmatia pays tribute to the Ottoman Empire -- 12,500 gold ducats annually -- in exchange for internal autonomy and trading privileges across Ottoman lands, a pragmatic bargain that preserves freedom at a price."
 nd_dal_bracera_fleet: "Bracera Fleet"
 nd_dal_bracera_fleet_desc: "The bracera -- a swift, shallow-draft galley with eight oars and a crew of thirty -- can cover a hundred sea miles in a night, outmaneuvering the heavy Venetian galleys in the narrow bays and inlets of the Adriatic coast."
 nd_dal_maritime_law: "Maritime Law"
 nd_dal_maritime_law_desc: "Ragusan maritime law -- governing contracts, insurance, salvage, and the rights of sailors -- becomes a model for Mediterranean commerce, attracting foreign merchants who trust its even-handed adjudication."
 nd_dal_pharmacy_tradition: "Pharmacy Tradition"
 nd_dal_pharmacy_tradition_desc: "The Franciscan pharmacy of Dubrovnik, operating continuously since 1317, is among the oldest in Europe, pioneering the preparation of remedies from Adriatic herbs and Mediterranean plants."
 nd_dal_silk_and_dye_trade: "Silk and Dye Trade"
 nd_dal_silk_and_dye_trade_desc: "The fondaci process imported silk and dyes into fine cloth for re-export, adding manufacturing value to the raw goods flowing through Dalmatian warehouses."
 nd_dal_fleet_zenith: "Fleet Zenith"
 nd_dal_fleet_zenith_desc: "At its peak, the Ragusan merchant fleet numbers 180 ships crewed by 5,000 sailors, with the fondaci provisioning vessels with tar, rope, and timber for voyages across the Mediterranean."
 nd_dal_learned_republic: "Learned Republic"
 nd_dal_learned_republic_desc: "The intellectual tradition of Ragusa produces scholars, poets, and scientists of European renown, from the playwright Marin Drzic to the physicist Ruder Boskovic."
 nd_dal_walled_cities: "Walled Cities"
 nd_dal_walled_cities_desc: "The massive walls of Dubrovnik, Split, and Zadar -- some dating to Roman times, continuously maintained and expanded -- make the Dalmatian cities virtually impregnable to siege."
 nd_dal_mercantile_banking: "Mercantile Banking"
 nd_dal_mercantile_banking_desc: "Ragusan banking houses extend credit to merchants across the Adriatic, financing trade ventures and insuring cargoes with sophisticated financial instruments."
 nd_dal_illyrian_movement: "Illyrian Movement"
 nd_dal_illyrian_movement_desc: "The Illyrian movement promotes a shared South Slavic identity among Dalmatians, Croats, and Serbs, challenging the cultural dominance of Italian and Habsburg influences along the coast."
 nd_dal_modern_commerce: "Modern Commerce"
 nd_dal_modern_commerce_desc: "Joint-stock companies and modern insurance houses replace the old merchant partnerships, bringing Dalmatian commerce into the industrial age with formalized risk management and capital pooling."
 nd_dal_port_modernization: "Port Modernization"
 nd_dal_port_modernization_desc: "Steam-powered cranes, expanded quays, and modern warehouse facilities transform the ancient harbors of the Dalmatian coast for the demands of industrial-era shipping."
 nd_dal_constitutional_reform: "Constitutional Reform"
 nd_dal_constitutional_reform_desc: "The ancient republican traditions of the Dalmatian communes are formalized into modern constitutional governance, with codified rights, representative assemblies, and professional bureaucracy."
 a_nd_dal_uskok: "Uskok Raiders"
 a_nd_dal_uskok_desc: "Refugee guerrilla fighters from Ottoman-occupied Bosnia and Croatia. The Uskoks -- 'those who jumped in' -- specialize in mountain ambushes and coastal raids, using their intimate knowledge of the rugged terrain to devastating effect."
 a_nd_dal_morlach: "Morlach Pandurs"
 a_nd_dal_morlach_desc: "Vlach-speaking mountain irregulars from the Dinaric hinterland. The Morlachs fight as light infantry, scouting through mountain passes and harassing enemy flanks with the skill of born frontiersmen."
 n_nd_dal_argosy: "Argosy"
 n_nd_dal_argosy_desc: "The legendary Ragusan argosy: a massive, four-masted merchant vessel armed with cannon and crewed by 140 men. Slower than a warship but tougher and more capacious, the argosy needs no escort -- it IS the escort."
 n_nd_dal_bracera: "Uskok Bracera"
 n_nd_dal_bracera_desc: "A swift, shallow-draft galley with eight oars and a crew of thirty. The bracera can navigate the narrow creeks and inlets where heavier vessels dare not follow, covering a hundred sea miles in a single night."
 levy_nd_dal_uskok: "Uskok Raider Levy"
 levy_nd_dal_uskok_desc: "Frontier guerrilla fighters recruited from among the Uskok refugees of the Dalmatian coast."
 levy_nd_dal_morlach: "Morlach Pandur Levy"
 levy_nd_dal_morlach_desc: "Mountain irregulars drawn from the Vlach pastoralist communities of the Dinaric interior."
 nd_dal_fondaco: "Fondaco"
 nd_dal_fondaco_desc: "A Dalmatian trade warehouse and merchant exchange where goods are stored, contracts negotiated, and commercial disputes settled under the authority of the commune."
 nd_dal_lazaretto: "Lazaretto"
 nd_dal_lazaretto_desc: "A quarantine facility built in the Ragusan tradition, where travelers and goods from plague-infected regions are isolated before entering the city -- the world's first systematic public health institution."
 nd_dal_academy: "Ragusan Academy"
 nd_dal_academy_desc: "A center of learning and scholarship in the Ragusan tradition, where scholars, poets, and natural philosophers gather to advance knowledge and preserve the intellectual heritage of the Dalmatian communes."
 nd_dal_insurance_house: "Maritime Insurance House"
 nd_dal_insurance_house_desc: "A financial institution specializing in maritime insurance and trade risk management, underwriting merchant ventures and providing the capital that fuels Dalmatian commerce."
 nd_dal_fondaco_maintenance: "Fondaco Upkeep"
 nd_dal_fondaco_maintenance_desc: "Stone and timber for the warehouse structure, cloth for market stalls and merchant quarters."
 nd_dal_salt_trade: "Adriatic Salt Trade"
 nd_dal_salt_trade_desc: "Dalmatian salt from Pag and Ston and preserved fish from the Adriatic pass through the fondaco warehouses, the foundation of the republic's commercial wealth."
 nd_dal_fine_cloth_trade: "Fine Cloth Trade"
 nd_dal_fine_cloth_trade_desc: "Imported dyes and cloth from the Levant and Italy are traded through the fondaco, enriching Dalmatian merchants who serve as middlemen between East and West."
 nd_dal_customs_registry: "Customs Registry"
 nd_dal_customs_registry_desc: "The meticulous record-keeping of the Sponza Palace customs office, consuming paper and ink to document every cargo, tariff, and commercial transaction passing through the fondaco."
 nd_dal_maritime_provisioning: "Maritime Provisioning"
 nd_dal_maritime_provisioning_desc: "The fondaco stocks tar and timber to provision the great Ragusan merchant fleet, supplying the 180 ships and 5,000 sailors who carry Dalmatian goods across the Mediterranean."
 nd_dal_lazaretto_maintenance: "Lazaretto Upkeep"
 nd_dal_lazaretto_maintenance_desc: "Stone for the isolation wards, timber for maintenance, and medicaments for treating the sick during their quarantine period."
 nd_dal_apothecary_service: "Apothecary Service"
 nd_dal_apothecary_service_desc: "The Franciscan pharmacists tend the quarantine wards with Adriatic olive oil, wine-based tinctures, and linen dressings, caring for both quarantined travelers and the city's sick."
 nd_dal_academy_maintenance: "Academy Upkeep"
 nd_dal_academy_maintenance_desc: "Paper for manuscripts and correspondence, books for the library collection, and beeswax candles to light the scholars' long hours of study."
 nd_dal_insurance_maintenance: "Insurance House Upkeep"
 nd_dal_insurance_maintenance_desc: "Paper for contracts and ledgers, furniture for the counting rooms, and fine cloth for the offices where underwriters assess risk and settle claims."
 nd_dal_path_a_tt: "Chose the #bold Republic of the Adriatic#! destiny"
 nd_dal_path_b_tt: "Chose the #bold Maritime League#! destiny"
 nd_dal_destiny: "Dalmatian Destiny"
 nd_dal_destiny_desc: "The cities of the Dalmatian coast have united under a single banner. Whether through the arts of diplomacy or the strength of the fleet, this new state must now prove itself worthy of enduring among the great powers of the Mediterranean."
 nd_dal_dest_tribute_and_trade: "Tribute and Trade"
 nd_dal_dest_tribute_and_trade_desc: "Secure the Adriatic approaches by bringing the ports of Kotor and Bar under Dalmatian influence, establishing the tribute-diplomacy model that preserved Ragusa's independence for centuries. A treasury of 1,000 gold will fund the necessary embassies and trade agreements."
 nd_dal_dest_mediterranean_emporium: "Mediterranean Emporium"
 nd_dal_dest_mediterranean_emporium_desc: "Extend the Dalmatian commercial network to the Ionian Islands, securing Corfu as a gateway to the wider Mediterranean. Embrace the banking institution to formalize the republic's financial instruments, and accumulate 2,000 gold to underwrite the expansion of trade."
 nd_dal_dest_libertas: "Libertas"
 nd_dal_dest_libertas_desc: "Dalmatia aspires to the highest ideal of the Ragusan republic -- Libertas, liberty that endures through wealth, wisdom, and the respect of nations. Establish commercial presence in Crete and on the Italian shore at Ancona, achieve international prestige of 75, and amass a treasury of 3,000 gold to prove the republic's permanence."
 nd_dal_dest_adriatic_dominion: "Adriatic Dominion"
 nd_dal_dest_adriatic_dominion_desc: "The Maritime League must secure the eastern Adriatic coast by force. Conquer Durres and Shkoder to control the strait that separates the Adriatic from the wider Mediterranean, while building an army of at least 30,000 men to enforce Dalmatian claims."
 nd_dal_dest_thalassocracy: "Thalassocracy"
 nd_dal_dest_thalassocracy_desc: "Project Dalmatian naval power deep into the eastern Mediterranean by seizing Thessaloniki, the great port of the Aegean. Maintain an army of 50,000 and a treasury of 2,000 gold to sustain this far-flung dominion."
 nd_dal_dest_mare_nostrum: "Mare Nostrum"
 nd_dal_dest_mare_nostrum_desc: "The Maritime League aspires to nothing less than mastery of the Adriatic Sea. Conquer Venice itself -- the ancient rival -- and the great port of Bari on the Italian shore. Command an army of 75,000 men and achieve prestige of 75 to complete the transformation from coastal confederation to Mediterranean power."
 nd_dal.5.t: "The Destiny of the Coast"
 nd_dal.5.d: "Dalmatia stands united -- a chain of fortified port cities stretching from Istria to the Bay of Kotor, bound together by the sea that gives them life. The ancient motto of Ragusa -- Non bene pro toto libertas venditur auro, 'Liberty is not sold for all the gold in the world' -- now serves as the watchword of an entire nation.\n\nBut liberty must be earned and defended, not merely proclaimed. The path ahead demands vision, resources, and the will to act. Whether Dalmatia shall endure as a republic of merchants or a league of warriors, only the choices of its rulers will determine."
 nd_dal.5.a: "Our destiny lies before us"
 nd_dal.6.t: "The Art of Tribute"
 nd_dal.6.d: "Dalmatia has secured the ports of the Gulf of Kotor, establishing the system of tributary diplomacy that Ragusa perfected over centuries. By paying measured tribute to greater powers while maintaining internal autonomy, the republic purchases what fortresses alone cannot guarantee -- the freedom to trade, to govern, and to endure.\n\nThe consuls and ambassadors of Dalmatia are now established in every court that matters. They carry gifts calibrated to the penny, intelligence gathered from every harbor, and the quiet confidence of men who know that their small republic's survival depends on being more useful alive than conquered."
 nd_dal.6.a: "Tribute is the price of liberty"
 nd_dal.7.t: "The Mediterranean Emporium"
 nd_dal.7.d: "Dalmatian merchants now trade from the Adriatic to the Ionian Sea and beyond. With banking institutions adopted and Corfu secured as a commercial staging post, Dalmatian argosies carry salt, cloth, and dyes to ports that once dealt only with Venice or Genoa.\n\nThe republic's growing wealth attracts both opportunity and scrutiny. Shall we invest in expanding our network of consulates and trade agents, building permanent diplomatic infrastructure across the Mediterranean? Or shall we perfect the art of tributary diplomacy, using our wealth to buy the autonomy and trading rights that keep the republic free?"
 nd_dal.7.a: "Expand the consular network"
 nd_dal.7.b: "Perfect the art of tribute"
 nd_dal.8.t: "Libertas Aeterna"
 nd_dal.8.d: "The dream of Ragusa has been fulfilled on a scale its founders could never have imagined. Dalmatia's commercial empire stretches from the Adriatic to the shores of Crete, its consulates line the ports of the Mediterranean, and its treasury overflows with the wealth of nations.\n\nThe republic's motto -- Libertas -- is no longer a prayer whispered behind city walls. It is a fact demonstrated by gold, by ships, and by the grudging respect of empires. But how shall this liberty be exercised? Shall Dalmatia become a beacon of civilization, its academies and law courts attracting the finest minds of Europe? Or shall the merchant princes consolidate their power, building an oligarchy of wealth that shapes the commerce of the Mediterranean?"
 nd_dal.8.a: "Let liberty illuminate the world"
 nd_dal.8.b: "The merchants shall guide the republic"
 nd_dal.9.t: "Masters of the Strait"
 nd_dal.9.d: "The Maritime League has seized control of the eastern Adriatic coast from Dalmatia to Albania. Durres and Shkoder now fly Dalmatian colors, giving the fleet control of the narrow strait that connects the Adriatic to the wider Mediterranean.\n\nNo ship enters or leaves the Adriatic without passing within range of Dalmatian galleys. Pirates who once preyed on coastal shipping find themselves hunted by bracera patrols that know every cove and inlet. The strait belongs to Dalmatia, and the commerce that flows through it pays toll to Dalmatian ports."
 nd_dal.9.a: "The strait is ours"
 nd_dal.10.t: "Thalassocracy of the East"
 nd_dal.10.d: "Dalmatian naval power now extends deep into the Aegean. Thessaloniki -- the great port that once served Byzantine and Ottoman emperors -- answers to the Maritime League. The Dalmatian fleet, from its heavy argosies to its swift bracera galleys, patrols waters that Venice and Genoa once considered their private seas.\n\nShall we establish permanent naval patrols across the Adriatic and Aegean, hunting pirates and enforcing Dalmatian maritime law? Or shall we fortify our island holdings, building garrisons that ensure lasting control of strategic chokepoints?"
 nd_dal.10.a: "Patrol the seas without rest"
 nd_dal.10.b: "Fortify every island we hold"
 nd_dal.11.t: "Mare Nostrum"
 nd_dal.11.d: "Venice has fallen. The city of the doges, the ancient mistress of the Adriatic, now submits to the maritime league it once dismissed as a chain of fishing villages. With Bari on the Italian shore also under Dalmatian control, the entire Adriatic Sea is a Dalmatian lake.\n\nThe transformation is complete. From a confederation of coastal communes to the dominant naval power of the eastern Mediterranean, the Maritime League has achieved what centuries of Venetian diplomacy sought to prevent. How shall this new power project itself? As a seaborne empire ruled by the doge's authority, or as a professional military state commanded by fleet admirals?"
 nd_dal.11.a: "The doge commands the waves"
 nd_dal.11.b: "The fleet admirals shall lead"
 STATIC_MODIFIER_NAME_nd_dal_dest_consul_network: "Consular Network"
 STATIC_MODIFIER_DESC_nd_dal_dest_consul_network: "A web of Dalmatian consulates and trade agents established across Mediterranean ports, providing diplomatic access and commercial intelligence that extends the republic's reach far beyond its modest borders."
 STATIC_MODIFIER_NAME_nd_dal_dest_tribute_mastery: "Tribute Mastery"
 STATIC_MODIFIER_DESC_nd_dal_dest_tribute_mastery: "The perfected art of tributary diplomacy -- using carefully measured payments and trade concessions to purchase autonomy from greater powers while quietly expanding Dalmatian commercial influence."
 STATIC_MODIFIER_NAME_nd_dal_dest_beacon_of_liberty: "Beacon of Liberty"
 STATIC_MODIFIER_DESC_nd_dal_dest_beacon_of_liberty: "Dalmatia as a shining example of republican civilization, its academies, law courts, and tolerance attracting the finest minds and most industrious people of the Mediterranean -- though the republic's military preparedness suffers from its pacific orientation."
 STATIC_MODIFIER_NAME_nd_dal_dest_merchant_princes: "Merchant Princes"
 STATIC_MODIFIER_DESC_nd_dal_dest_merchant_princes: "A powerful oligarchy of Dalmatian merchant families who control the republic's commercial empire, investing in infrastructure and financial instruments -- though their focus on profit drives up the cost of maintaining standing armies."
 STATIC_MODIFIER_NAME_nd_dal_dest_adriatic_patrol: "Adriatic Patrol"
 STATIC_MODIFIER_DESC_nd_dal_dest_adriatic_patrol: "Permanent Dalmatian naval patrols sweep the Adriatic and Aegean, hunting pirates, enforcing maritime law, and projecting the league's power across the eastern Mediterranean."
 STATIC_MODIFIER_NAME_nd_dal_dest_island_garrisons: "Island Garrisons"
 STATIC_MODIFIER_DESC_nd_dal_dest_island_garrisons: "Fortified garrisons on strategic islands and coastal positions, ensuring Dalmatian control of key chokepoints and providing secure bases for the league's naval operations."
 STATIC_MODIFIER_NAME_nd_dal_dest_doge_of_the_sea: "Doge of the Sea"
 STATIC_MODIFIER_DESC_nd_dal_dest_doge_of_the_sea: "A seaborne empire ruled by the doge's naval authority, with the wealth of conquered ports funding the fleet and the plunder of rivals enriching the treasury."
 STATIC_MODIFIER_NAME_nd_dal_dest_fleet_admiral: "Fleet Admiral"
 STATIC_MODIFIER_DESC_nd_dal_dest_fleet_admiral: "A professional military command structure with fleet admirals directing both naval and land operations, emphasizing rapid deployment, logistical efficiency, and sustained campaigning."
 nd_dal_consulate: "Ragusan Consulate"
 nd_dal_consulate_desc: "A permanent Dalmatian diplomatic and commercial office in the Ragusan tradition, where consuls manage trade agreements, gather intelligence, and represent the republic's interests with the skill of centuries of diplomatic practice."
 nd_dal_consulate_maintenance: "Consulate Upkeep"
 nd_dal_consulate_maintenance_desc: "Paper for diplomatic correspondence, fine cloth for official occasions, and furniture for the consul's offices."
 nd_dal_arsenal: "Dalmatian Arsenal"
 nd_dal_arsenal_desc: "A fortified naval shipyard and armory where the Maritime League builds and provisions its fleet, combining the shipbuilding expertise of Dalmatian communes with the military discipline of a professional navy."
 nd_dal_arsenal_maintenance: "Arsenal Upkeep"
 nd_dal_arsenal_maintenance_desc: "Lumber and tar for ship construction, iron for weaponry and fittings, and tools for the arsenal workshops."
