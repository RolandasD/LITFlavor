l_english:
 nd_dah_ghezo_reforms: "Ghezo's Reforms"
 nd_dah_ghezo_reforms_desc: "King Ghezo transformed Dahomey from a tributary of the Oyo Empire into a formidable military power. He formalized the Agojie female warriors into a standing regiment of thousands, professionalized the army with European drill techniques, and reorganized provincial governance under rotating military governors who served at the king's pleasure."
 nd_dah_palm_oil_economy: "Palm Oil Transition"
 nd_dah_palm_oil_economy_desc: "As British pressure ended the overseas slave trade, Dahomey pivoted to palm oil exports under Ghezo's direction. Enslaved workers were redirected to palm plantations rather than sold abroad. By the 1850s palm oil had become Dahomey's principal legitimate export, though it never fully replaced the fiscal scale of the slave economy."
 nd_dah_xwetanu_ceremonies: "Annual Customs"
 nd_dah_xwetanu_ceremonies_desc: "The Xwetanu — Dahomey's Annual Customs — was the kingdom's most important ceremonial institution. This weeks-long festival combined ancestor veneration, military reviews, political councils, trade fairs, and the redistribution of wealth. It was the arena where the king displayed his power, resolved disputes between factions, and set policy for the coming year."
 nd_dah_abomey_artisans: "Abomey Artisan Tradition"
 nd_dah_abomey_artisans_desc: "The Royal Palaces of Abomey housed a remarkable artistic tradition. Palace artisans created polychrome clay bas-reliefs commemorating each king's reign, elaborate applique textiles depicting military victories, and carved wooden bocio figures imbued with spiritual power. Each king's palace added to a 200-year architectural chronicle of Fon civilization."
 nd_dah_behanzin_resistance: "Behanzin's Resistance"
 nd_dah_behanzin_resistance_desc: "King Behanzin, Dahomey's last independent ruler, recognized the existential threat of European colonialism and prepared his kingdom for war. He attempted to manufacture firearms locally, drilled his forces in modern tactics, and fought two wars against France in 1890 and 1892. Despite fierce resistance — only 17 of 434 Agojie survived the final battle — Dahomey fell to French colonial forces in 1894."
 a_nd_dah_agojie_veterans: "Agojie Veterans"
 a_nd_dah_agojie_veterans_desc: "The formalized Agojie regiment under Ghezo numbered up to 6,000 women — roughly a third of Dahomey's total military. Rigorously trained in pain endurance, speed, and close combat, they were organized into specialized sub-units: huntresses, riflewomen, reapers, archers, and gunners. European observers consistently judged them superior to their male counterparts in effectiveness and bravery."
 a_nd_dah_fon_riflemen: "Fon Riflemen"
 a_nd_dah_fon_riflemen_desc: "Behanzin's modernized infantry, armed with imported European rifles and trained in countermarch firing techniques. In the Franco-Dahomean Wars, these soldiers fought with desperate courage against a technologically superior enemy, using knowledge of local terrain to mount ambushes and harassing retreats through dense forest and jungle."
 nd_dah_palm_oil_works: "Palm Oil Works"
 nd_dah_palm_oil_works_desc: "Processing facilities for the extraction and preparation of palm oil for export. Under Ghezo's direction, Dahomey's economy shifted from the slave trade to palm oil production, with former captives redirected to work the palm plantations that fed these workshops."
 nd_dah_palm_oil_processing: "Palm Oil Processing"
 nd_dah_palm_oil_processing_desc: "Extracts oil from palm fruit kernels for export to European markets as industrial lubricant and soap ingredient."
 nd_dah_royal_atelier: "Royal Artisan Atelier"
 nd_dah_royal_atelier_desc: "Workshop attached to the royal palace complex where master artisans produce the distinctive bas-relief panels, applique textiles, and carved figures that chronicle Dahomey's history and glorify the reign of each king."
 nd_dah_bas_relief_craft: "Bas-Relief Craft"
 nd_dah_bas_relief_craft_desc: "Artisans work clay from ant-hills into polychrome bas-reliefs, pressing mineral pigment dyes and fired pottery fragments into wet surfaces to create the vivid panels that adorn the walls of Abomey's royal palaces."
 levy_nd_dah_fon_riflemen: "Fon Riflemen Levy"
 levy_nd_dah_fon_riflemen_desc: "Mobilized Fon infantry armed with European-pattern rifles, drawn from the peasant and soldier populations to defend the kingdom."
 STATIC_MODIFIER_NAME_nd_dah_standing_army: "Dahomey Standing Army"
 STATIC_MODIFIER_DESC_nd_dah_standing_army: "Ghezo's professionalization of Dahomey's military created one of West Africa's most formidable fighting forces, with permanent regiments drilled in European techniques and the legendary Agojie at its core."
 STATIC_MODIFIER_NAME_nd_dah_royal_monopoly: "Royal Trade Monopoly"
 STATIC_MODIFIER_DESC_nd_dah_royal_monopoly: "The Dahomean crown exercised near-total control over foreign trade, with the Yovogan (viceroy of Whydah) managing all transactions with European merchants and ensuring the kingdom extracted maximum value from its exports."
 nd_dah.1.t: "The Transformation of Dahomey"
 nd_dah.1.d: "King Ghezo has overthrown his predecessor Adandozan with the help of the Brazilian slave trader Francisco Felix de Sousa, ending Dahomey's humiliating tribute to the Oyo Empire. The new king faces a choice that will define a generation: pour the kingdom's resources into building the most professional army in West Africa, or tighten the crown's grip on trade to build an economic powerhouse that can sustain Dahomey's independence through wealth rather than war alone.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_dah.1.a: "Forge the Agojie into an unbreakable sword"
 nd_dah.1.b: "The Yovogan shall control every cowrie that flows through Whydah"
 nd_dah.2.t: "The Lion of Dahomey"
 nd_dah.2.d: "King Behanzin — 'the shark that troubled the bar' — has taken the throne of Dahomey and immediately recognized the mortal threat posed by French colonial ambitions. Unlike his predecessors who could play European powers against each other, Behanzin faces a France determined to conquer. He has ordered the construction of local arms workshops, the drilling of his forces in modern rifle tactics, and the fortification of approaches to Abomey. The Agojie, now armed with repeating rifles, train with a ferocity born of the knowledge that this may be Dahomey's last war. When the French finally come in force in 1892, Behanzin's soldiers will fight with extraordinary courage — but the kingdom's 200-year independence will end in the smoke of artillery."
 nd_dah.2.a: "Dahomey will not kneel"
 nd_dah_formed_tt: "Dahomey has been formed"
 nd_dah_path_a_tt: "Chose Dahomey Standing Army"
 nd_dah_path_b_tt: "Chose Royal Trade Monopoly"
