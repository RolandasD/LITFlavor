l_english:
 STATIC_MODIFIER_NAME_nd_thalassocracy_of_the_north: "Thalassocracy of the North"
 STATIC_MODIFIER_DESC_nd_thalassocracy_of_the_north: "The Dutch Republic commands the seas. From the herring busses of the North Sea to the great Indiamen of the VOC, our merchant fleets carry the wealth of the world to Amsterdam's quays. Where others see waves, we see highways."
 STATIC_MODIFIER_NAME_nd_cradle_of_liberty: "Cradle of Liberty"
 STATIC_MODIFIER_DESC_nd_cradle_of_liberty: "The United Provinces stand as a beacon of tolerance in a divided Europe. Here, Catholics and Calvinists live side by side, Sephardic scholars print freely, and Huguenot refugees find shelter. Our universities and printing houses make Amsterdam the intellectual capital of the continent."
 STATIC_MODIFIER_NAME_nd_voc_charter_spirit: "Spirit of the VOC"
 STATIC_MODIFIER_DESC_nd_voc_charter_spirit: "The chartered company opens the world to Dutch enterprise. Shareholders, sailors, and factors carry the orange flag to the farthest reaches of the globe."
 STATIC_MODIFIER_NAME_nd_wisselbank_confidence: "Wisselbank Confidence"
 STATIC_MODIFIER_DESC_nd_wisselbank_confidence: "The Bank of Amsterdam's guilder banco has become the most trusted currency in Europe. Bills drawn on the Wisselbank are accepted from Archangel to Cadiz."
 nd_ned.1.t: "The United Provinces"
 nd_ned.1.d: "The seven provinces stand united at last. What began as a desperate revolt against tyranny has forged something the world has never seen — a republic of merchants and mariners, governed not by a crowned head but by the collective will of its States-General. The great question now is what kind of nation we shall become. Shall we turn our faces to the sea, as our shipwrights and admirals urge, building fleets to command every ocean and filling our warehouses with the riches of the Indies? Or shall we look inward to our unique gift — a society where the persecuted find refuge, where scholars debate freely, and where the printing press runs day and night? The world watches to see what this small, stubborn nation will make of its hard-won freedom.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ned.1.a: "We shall rule the waves!"
 nd_ned.1.b: "Let all who seek freedom find it here."
 nd_ned.2.t: "Charter of the VOC"
 nd_ned.2.d: "The States-General has granted a charter to the Vereenigde Oostindische Compagnie — the United East India Company. This is no mere trading firm. The VOC holds the sovereign right to wage war, negotiate treaties, and establish colonies in the name of the Republic. With a starting capital that dwarfs any enterprise in history, the Company will dispatch fleets of armed merchantmen to the Spice Islands, challenging the Portuguese monopoly over the eastern trade. Shareholders from every province have invested their fortunes in this venture, binding the Republic's destiny to the distant seas of Asia."
 nd_ned.2.a: "The spice trade shall be ours."
 nd_ned.3.t: "The Wisselbank Opens"
 nd_ned.3.d: "The city of Amsterdam has established its Exchange Bank — the Wisselbank — to bring order to the chaos of debased foreign currencies flooding our markets. Henceforth, all bills of exchange above six hundred guilders must be settled through the bank. Merchants deposit their coin and receive credit in bank money — guilder banco — whose value the city guarantees. No more clipping, no more debasement. The reliability of Dutch bank money will draw merchants from across Europe to settle their accounts in Amsterdam, making our city the clearing house of the world's trade."
 nd_ned.3.a: "Sound money is the foundation of commerce."
 nd_ned.4.t: "The Union of Utrecht"
 nd_ned.4.d: "In the great hall at Utrecht, representatives of the northern provinces have signed a treaty of perpetual union. Each province shall remain free in matters of religion — no person shall be persecuted on account of their faith. This unprecedented declaration of freedom of conscience binds the provinces together not through shared blood or a shared crown, but through a shared commitment to liberty. The Union of Utrecht shall serve as the foundation of our republic, a constitution born not of kings but of free citizens."
 nd_ned.4.a: "Unity in diversity."
 nd_ned.5.t: "Masters of the Golden Age"
 nd_ned.5.d: "The Dutch Republic has achieved a mastery of arts, sciences, and commerce that the world has rarely seen. Rembrandt paints in Amsterdam while Vermeer captures light in Delft. Huygens discovers Saturn's rings while Leeuwenhoek peers into his microscope at the invisible world teeming in a drop of water. The wealth of the Indies flows through our counting houses, and our merchant fleet exceeds that of all other nations combined. In this small country wrested from the sea, human ingenuity has reached new heights."
 nd_ned.5.a: "A golden age for the ages."
 nd_ned_burgundian_cloth_trade: "Burgundian Cloth Trade"
 nd_ned_burgundian_cloth_trade_desc: "The great cloth halls of Bruges, Ghent, and Ypres anchor a textile trade that stretches from English wool pastures to Italian luxury markets."
 nd_ned_herring_fleets: "Herring Fleets"
 nd_ned_herring_fleets_desc: "Dutch herring busses sail in great convoys to the fishing grounds, and new curing techniques preserve the catch for export across Europe."
 nd_ned_civic_autonomy: "Civic Autonomy"
 nd_ned_civic_autonomy_desc: "Netherlandish towns guard their chartered privileges fiercely, creating a tradition of burgher self-governance that no overlord can easily suppress."
 nd_ned_waterschappen: "Waterschappen"
 nd_ned_waterschappen_desc: "The water boards — democratic cooperatives older than any parliament — coordinate the endless labor of building dikes, draining marshes, and keeping the sea at bay."
 nd_ned_watergeuzen: "Watergeuzen"
 nd_ned_watergeuzen_desc: "The Sea Beggars harass enemy shipping from their raiding bases, striking fast and vanishing into the coastal shallows before heavier warships can respond."
 nd_ned_leiden_textiles: "Leiden Textiles"
 nd_ned_leiden_textiles_desc: "Flemish refugee weavers transform Leiden into Europe's greatest textile center, producing everything from fine lakens to light camlets and says."
 nd_ned_union_of_utrecht: "Union of Utrecht"
 nd_ned_union_of_utrecht_desc: "The founding treaty of the Republic guarantees freedom of conscience — an unprecedented commitment to religious tolerance that will draw persecuted minorities from across Europe."
 nd_ned_stadtholder_tradition: "Stadtholder Tradition"
 nd_ned_stadtholder_tradition_desc: "The House of Orange-Nassau provides military leadership to the Republic, with stadtholders who combine princely authority with republican service."
 nd_ned_schutterij_tradition: "Schutterij Tradition"
 nd_ned_schutterij_tradition_desc: "Every Dutch town maintains its schutterij — civic militia companies of armed burghers who train regularly and defend their city walls with stubborn pride."
 nd_ned_voc_charter: "VOC Charter"
 nd_ned_voc_charter_desc: "The Vereenigde Oostindische Compagnie — history's first publicly traded multinational corporation — holds sovereign powers to wage war and govern territories across Asia."
 nd_ned_fluyt_design: "Fluyt Design"
 nd_ned_fluyt_design_desc: "The fluyt revolutionizes maritime commerce — a cheap, efficient cargo vessel requiring fewer crew than any rival design, giving Dutch shipping an unbeatable cost advantage."
 nd_ned_admiralties: "Admiralties"
 nd_ned_admiralties_desc: "The five admiralty boards of the Republic coordinate shipbuilding, naval operations, and convoy protection, projecting Dutch sea power from the Baltic to the East Indies."
 nd_ned_freedom_of_conscience: "Freedom of Conscience"
 nd_ned_freedom_of_conscience_desc: "The Republic's commitment to religious tolerance attracts persecuted minorities — Sephardic Jews, Huguenots, Mennonites — whose skills and capital enrich Dutch society."
 nd_ned_wisselbank: "Wisselbank"
 nd_ned_wisselbank_desc: "The Bank of Amsterdam introduces sound money and reliable credit, making guilder banco the trusted currency of international commerce."
 nd_ned_beurs_exchange: "Amsterdam Beurs"
 nd_ned_beurs_exchange_desc: "The world's first stock exchange enables the trading of company shares, commodity futures, and government bonds — the birth of modern finance."
 nd_ned_korps_mariniers: "Korps Mariniers"
 nd_ned_korps_mariniers_desc: "The Marine Corps of the Republic, established by Johan de Witt, provides elite amphibious infantry for combined naval-land operations."
 nd_ned_dutch_ship_of_the_line: "Dutch Ship of the Line"
 nd_ned_dutch_ship_of_the_line_desc: "The great warships of the Anglo-Dutch Wars carry rows of heavy cannons on multiple gun decks, designed for the devastating fleet engagements of open ocean warfare."
 nd_ned_golden_age_mastery: "Golden Age Mastery"
 nd_ned_golden_age_mastery_desc: "The Dutch Republic has achieved an unprecedented convergence of artistic brilliance, scientific discovery, and commercial supremacy — a golden age that illuminates all of Europe."
 nd_ned_colonial_network: "Colonial Network"
 nd_ned_colonial_network_desc: "From New Amsterdam to the Cape Colony, from Suriname to Batavia, Dutch colonial possessions form a global trading network knit together by the VOC and WIC."
 nd_ned_batavian_reforms: "Batavian Reforms"
 nd_ned_batavian_reforms_desc: "Revolutionary reforms modernize Dutch governance, replacing the old provincial federalism with centralized administration and rational bureaucracy."
 nd_ned_hydraulic_engineering: "Hydraulic Engineering"
 nd_ned_hydraulic_engineering_desc: "Dutch engineers have mastered the science of water — steam-powered pumping stations now drain entire lakes, creating new polders of fertile land from what was once open water."
 nd_ned_mercantile_legacy: "Mercantile Legacy"
 nd_ned_mercantile_legacy_desc: "Centuries of commercial enterprise have created a nation of traders, financiers, and entrepreneurs whose business networks span the globe."
 n_nd_ned_watergeuzen: "Watergeuzen"
 n_nd_ned_watergeuzen_desc: "Fast raiding vessels crewed by the Sea Beggars — Protestant rebels who strike at enemy shipping from coastal havens."
 n_nd_ned_fluyt: "Fluyt"
 n_nd_ned_fluyt_desc: "The revolutionary Dutch cargo vessel — cheap to build, efficient to operate, and requiring fewer crew than any comparable ship."
 n_nd_ned_ship_of_the_line: "Dutch Ship of the Line"
 n_nd_ned_ship_of_the_line_desc: "A powerful warship bristling with heavy cannons on multiple decks, built for the fleet engagements of the Anglo-Dutch Wars."
 a_nd_ned_marine: "Korps Marinier"
 a_nd_ned_marine_desc: "Elite amphibious soldiers of the Dutch Marine Corps, trained for combined naval-land operations and ship-to-ship boarding."
 a_nd_ned_schutterij: "Schutterij"
 a_nd_ned_schutterij_desc: "Civic militia of armed burghers who defend their towns with the determination of free citizens protecting their own homes."
 nd_ned_beurs: "Beurs"
 nd_ned_beurs_desc: "A commodity and stock exchange where merchants trade shares, settle bills, and speculate on futures — the beating heart of Dutch commercial life."
 nd_ned_admiraliteit: "Admiraliteit"
 nd_ned_admiraliteit_desc: "An admiralty board that coordinates shipbuilding, repairs, and naval operations from its coastal headquarters."
 nd_ned_lakenhal: "Lakenhal"
 nd_ned_lakenhal_desc: "A great cloth hall where textiles are inspected, stamped with quality marks, and sold to merchants from across Europe."
 nd_ned_waterschap: "Waterschap"
 nd_ned_waterschap_desc: "A water board that coordinates dike maintenance, drainage, and flood prevention — keeping the sea at bay through collective action."
 nd_ned_herring_curing: "Herring Curing"
 nd_ned_herring_curing_desc: "The Dutch method of gibbing and salting herring preserves the catch for months, making it a staple export across Europe."
 nd_ned_spice_warehousing: "Spice Warehousing"
 nd_ned_spice_warehousing_desc: "VOC warehouses process and redistribute the spices of the East Indies — pepper, cloves, nutmeg — to European markets."
 levy_nd_ned_schutterij: "Schutterij Militia"
 levy_nd_ned_schutterij_desc: "Civic militia companies of armed burghers defending their towns."
 nd_ned_beurs_upkeep: "Exchange Operations"
 nd_ned_beurs_upkeep_desc: "Operating a commodity exchange — managing ledgers, broker fees, and silver reserves."
 nd_ned_admiraliteit_upkeep: "Admiralty Operations"
 nd_ned_admiraliteit_upkeep_desc: "Supplying a naval admiralty with timber, rope, and shipbuilding materials."
 nd_ned_lakenhal_upkeep: "Cloth Hall Operations"
 nd_ned_lakenhal_upkeep_desc: "Processing raw wool and dyes for the textile inspection and trading halls."
 nd_ned_waterschap_upkeep: "Water Board Operations"
 nd_ned_waterschap_upkeep_desc: "Maintaining dikes, drainage pumps, and flood control infrastructure."
 nd_ned_formed_tt: "Netherlands has been formed"
 nd_ned_path_a_tt: "Chose Thalassocracy of the North"
 nd_ned_path_b_tt: "Chose Cradle of Liberty"
 nd_ned_destiny: "Destiny of the Republic"
 nd_ned_destiny_desc: "The United Provinces have been proclaimed. Now we must decide: shall we command the oceans or illuminate the mind? Our stability must hold firm before we can begin."
 nd_ned_dest_baltic_mastery: "Baltic Mastery"
 nd_ned_dest_baltic_mastery_desc: "Control the great Hanseatic ports of Lubeck and Hamburg to dominate the northern trade routes that feed the Republic's wealth."
 nd_ned_dest_spice_venture: "The Spice Venture"
 nd_ned_dest_spice_venture_desc: "Plant the Dutch flag over the Strait of Malacca and the clove-rich Moluccas, opening the eastern spice trade to our merchant fleets."
 nd_ned_dest_global_thalassocracy: "Global Thalassocracy"
 nd_ned_dest_global_thalassocracy_desc: "Build the complete maritime empire from Batavia to Ceylon. The seas belong to the Republic, and our trading factories dot every shore."
 nd_ned_dest_printing_revolution: "The Printing Revolution"
 nd_ned_dest_printing_revolution_desc: "Embrace the printing press and make the Netherlands Europe's publishing capital. Our presses shall print what others dare not speak."
 nd_ned_dest_financial_supremacy: "Financial Supremacy"
 nd_ned_dest_financial_supremacy_desc: "Establish Amsterdam as the undisputed financial center of the world through global trade institutions and a thriving paper market."
 nd_ned_dest_enlightened_republic: "The Enlightened Republic"
 nd_ned_dest_enlightened_republic_desc: "Embrace the scientific revolution and bring Geneva's Calvinist intellectual tradition under our wing. Achieve the highest development and scholarly renown."
 nd_ned.6.t: "The Republic's Destiny Awaits"
 nd_ned.6.d: "The United Provinces stand at a crossroads. The foundations of our republic are firm, our stability assured. Now we must chart the course that will define our nation for generations. Two great visions compete for the soul of the Republic. One beckons us toward the open sea, toward distant ports and the wealth of the Indies. The other calls us to build something unprecedented in Europe -- a republic of free inquiry, sound money, and enlightened governance."
 nd_ned.6.a: "Our destiny is in our hands."
 nd_ned.7.t: "Masters of the Northern Seas"
 nd_ned.7.d: "The orange flag now flies over the great Hanseatic ports. Lubeck, that ancient queen of the Baltic trade, has passed under our control. Hamburg, gateway to the North Sea and the German interior, answers to our admiralties. The grain ships from Poland, the timber fleets from Scandinavia, the herring convoys of the North Sea -- all now pass through waters we command. Our dominance of northern commerce is complete, and our merchants turn their eyes toward even more distant horizons."
 nd_ned.7.a: "The Baltic is a Dutch lake."
 nd_ned.8.t: "Foothold in the Spice Islands"
 nd_ned.8.d: "Dutch merchants and soldiers have seized control of the legendary Spice Islands. Malacca, the great chokepoint of eastern trade, flies our colors, and the clove groves of Ternate are now ours to harvest. The question is how best to exploit this unprecedented opportunity. Shall we focus on building a commercial network of convoys and factors, squeezing every guilder from the spice trade? Or shall we invest in armed fleets that can sweep all rivals from these waters and establish permanent naval supremacy?"
 nd_ned.8.a: "Organize the trade convoys."
 nd_ned.8.b: "Build the war fleet of the Indies."
 nd_ned.9.t: "Empire of the Seas"
 nd_ned.9.d: "From the counting houses of Amsterdam to the fortified factories of Batavia, from the cinnamon plantations of Ceylon to the pepper warehouses of the Spice Islands, the Dutch maritime empire now spans the globe. No nation has ever wielded such commercial power from so small a homeland. Our captains round the Cape as casually as fishermen row to the Dogger Bank. Now we must decide the character of this unprecedented empire. Shall we build permanent colonies and extract the wealth of the land? Or shall we rule the oceans themselves, making free trade the foundation of our hegemony?"
 nd_ned.9.a: "Build our colonial dominion."
 nd_ned.9.b: "Command the open ocean."
 nd_ned.10.t: "The Presses of Amsterdam"
 nd_ned.10.d: "The printing press has transformed the Netherlands into the publishing capital of Europe. What cannot be printed in Paris or London for fear of censorship rolls freely off our presses in Amsterdam, Leiden, and The Hague. French philosophes, English dissenters, German pietists -- all find willing printers in our republic. Atlases, scientific treatises, theological debates, and seditious pamphlets pour from our workshops in every language of Europe. Knowledge has become our most profitable export."
 nd_ned.10.a: "Let the presses run day and night."
 nd_ned.11.t: "The Financial Capital of the World"
 nd_ned.11.d: "Amsterdam has become what no city has been before -- the financial center of the entire world. Bills drawn on our banks are accepted from Archangel to Cadiz. Our commodity exchange sets prices that merchants in every port must follow. Government bonds, company shares, futures contracts -- financial instruments that exist nowhere else flow through our counting houses daily. Now we must choose how to wield this unprecedented power. Shall we build a tolerant haven that attracts the best minds from every persecuted community? Or shall we forge a network of innovation that binds Europe's economies to our own?"
 nd_ned.11.a: "Welcome all who bring talent and capital."
 nd_ned.11.b: "Forge the bonds of commerce."
 nd_ned.12.t: "The Enlightened Republic"
 nd_ned.12.d: "The Republic has achieved what philosophers only dreamed of -- a state governed by reason, enriched by tolerance, and illuminated by science. Our universities draw scholars from across Europe. Our observatories map the heavens, our microscopes reveal the invisible, our botanists catalogue the world's flora. With Geneva's intellectual tradition now under our protection, the Republic stands as the undisputed center of Enlightenment thought. How shall we shape this golden age of reason? As a republic of letters, where free thought transforms society? Or as a center of scientific mastery, where knowledge becomes power?"
 nd_ned.12.a: "Let freedom of thought be our creed."
 nd_ned.12.b: "Harness the power of science."
 STATIC_MODIFIER_NAME_nd_ned_dest_spice_convoy: "Spice Convoy Network"
 STATIC_MODIFIER_DESC_nd_ned_dest_spice_convoy: "A vast network of armed merchant convoys carries the wealth of the Indies along protected sea lanes, with Dutch agents in every port gathering intelligence on rivals."
 STATIC_MODIFIER_NAME_nd_ned_dest_armed_fleet: "Armed Fleet of the Indies"
 STATIC_MODIFIER_DESC_nd_ned_dest_armed_fleet: "A permanent war fleet patrols the eastern seas, sweeping rival navies from the spice routes while Dutch land forces grow neglected."
 STATIC_MODIFIER_NAME_nd_ned_dest_batavian_dominion: "Batavian Dominion"
 STATIC_MODIFIER_DESC_nd_ned_dest_batavian_dominion: "Dutch colonial settlements extract raw materials from across the tropics, driving population growth in the empire while stretching military manpower thin."
 STATIC_MODIFIER_NAME_nd_ned_dest_ocean_sovereign: "Ocean Sovereign"
 STATIC_MODIFIER_DESC_nd_ned_dest_ocean_sovereign: "The Republic commands the world's sea lanes not through force alone but through free trade agreements and diplomatic prestige that make Dutch commerce welcome everywhere."
 STATIC_MODIFIER_NAME_nd_ned_dest_tolerant_haven: "Tolerant Haven"
 STATIC_MODIFIER_DESC_nd_ned_dest_tolerant_haven: "Persecuted minorities -- Sephardic Jews, Huguenots, Mennonites -- flock to the Republic, enriching its merchant class even as the old crown prerogatives wane."
 STATIC_MODIFIER_NAME_nd_ned_dest_financial_hub: "Financial Hub"
 STATIC_MODIFIER_DESC_nd_ned_dest_financial_hub: "Amsterdam's financial innovations -- stock exchanges, futures markets, central banking -- bind the economies of Europe together under Dutch leadership."
 STATIC_MODIFIER_NAME_nd_ned_dest_republic_of_letters: "Republic of Letters"
 STATIC_MODIFIER_DESC_nd_ned_dest_republic_of_letters: "The Dutch Republic has become the intellectual heart of Europe, where free inquiry, liberal thought, and burgher literacy reach unprecedented heights."
 STATIC_MODIFIER_NAME_nd_ned_dest_golden_age_of_science: "Golden Age of Science"
 STATIC_MODIFIER_DESC_nd_ned_dest_golden_age_of_science: "Dutch scientists lead the world in optics, cartography, and natural philosophy, creating a stable and prosperous society through the practical application of knowledge."
 nd_ned_factorij: "Factorij"
 nd_ned_factorij_desc: "A fortified Dutch trading factory where Company agents buy local goods, store spices for the return voyage, and fly the tricolor over foreign shores."
 nd_ned_universiteit: "Universiteit"
 nd_ned_universiteit_desc: "A great Dutch university where scholars pursue knowledge freely, attracting students from across Europe to study medicine, law, theology, and the natural sciences."
 nd_ned_factorij_upkeep: "Factory Operations"
 nd_ned_factorij_upkeep_desc: "Maintaining a trading factory requires cloth for trade goods, tools for repairs, and naval supplies for the Company ships."
 nd_ned_universiteit_upkeep: "University Operations"
 nd_ned_universiteit_upkeep_desc: "Supporting a university requires paper for books and theses, bound volumes for the library, and glass for laboratory instruments."
