l_english:
 CSO_f: "Sòng"
 CSO_f_desc: "The Song dynasty represented China's commercial and technological golden age. Though the Southern Song lost the northern plains to the Jurchen Jin, they built an unrivaled maritime trading economy centered on the Yangtze delta and the great port of Hangzhou. Restoring the Song means rejecting continental empire in favor of a compact, prosperous realm defined by trade, innovation, and naval power."
