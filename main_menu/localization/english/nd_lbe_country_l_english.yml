l_english:
 LBE: "Luba Empire"
 LBE_ADJ: "Luba"
 LBE_f: "Luba Empire"
 LBE_f_desc: "The Luba Empire was a powerful Central African state centered on the Upemba Depression and the upper Lualaba River. Renowned for its Balopwe system of divine kingship — a model of governance so effective that neighboring peoples across the savanna adopted it — the Luba state united diverse communities through sacred authority, copper trade, and artistic patronage."
