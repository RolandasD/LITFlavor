l_english:
 STATIC_MODIFIER_NAME_nd_riders_of_the_naam: "Riders of the Naam"
 STATIC_MODIFIER_DESC_nd_riders_of_the_naam: "The divine power of naam courses through the veins of our horsemen. The Nakomsé cavalry tradition, passed from father to son since the founders rode north from Mamprusi, defines our strength. No empire of the Sahel can match the thunder of our mounted warriors across the grasslands."
 STATIC_MODIFIER_NAME_nd_mogho_naaba_court: "The Mogho Naba's Court"
 STATIC_MODIFIER_DESC_nd_mogho_naaba_court: "The Mogho Naba sits at the apex of a hierarchy that radiates from Ouagadougou to every village. His ministers — the Ouidi Naba commanding cavalry, the Baloum Naba overseeing stewardship, the Larlé Naba guarding royal customs — form an administration of remarkable sophistication for the Sahel."
 STATIC_MODIFIER_NAME_nd_mossi_earth_awakening: "Earth Shrine Awakening"
 STATIC_MODIFIER_DESC_nd_mossi_earth_awakening: "The tengsoba earth priests have renewed their bond with the land. The ancient shrines of the tengbiise pulse with spiritual power, protecting our people from foreign religions and binding the community to the soil that sustains them."
 nd_msi.1.t: "The Founding of Mossi"
 nd_msi.1.d: "The scattered Mossi kingdoms have been united under a single banner. From the Volta headwaters to the edges of the Sahel, the descendants of Ouédraogo now speak with one voice. But what kind of nation shall we forge from this union? The Nakomsé warrior aristocracy stands ready to ride, their cavalry the terror of Mali and Songhai alike. Yet the Mogho Naba's court in Ouagadougou offers another path — the sacred institution of naam, the elaborate hierarchy of provincial nabas and village chiefs, a system of governance that has endured for centuries through wisdom rather than conquest alone.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_msi.1.a: "Let the hooves of our horses shake the earth!"
 nd_msi.1.b: "The Mogho Naba's wisdom shall guide our people."
 nd_msi.2.t: "The Nakomsé Ride Forth"
 nd_msi.2.d: "The Nakomsé horsemen have formalized their ancient cavalry traditions into a disciplined fighting force. Since the founding ancestors rode north from the Mamprusi lands, mounted warfare has been the birthright of the Mossi ruling class. Now, with proper training grounds and breeding programs, our cavalry strikes fear into the hearts of neighboring kingdoms. The thunder of hooves across the savanna is the sound of Mossi power."
 nd_msi.2.a: "The naam gives us the right to ride and to rule."
 nd_msi.3.t: "The Sacred Institution of Naam"
 nd_msi.3.d: "The Mogho Naba has completed the transformation of Mossi governance into a system of sacred kingship unmatched in the Sahel. The power of naam — the divine authority to rule — flows from the Mogho Naba through the provincial nabas to the village chiefs, creating an unbroken chain of legitimate authority. The daily false departure ceremony, where the Mogho Naba mounts his horse as if to abandon his people before being persuaded to stay, reminds all that the king's commitment to his subjects is renewed each morning."
 nd_msi.3.a: "The naam endures, and so shall our kingdom."
 nd_msi.4.t: "The Earth Shrines Speak"
 nd_msi.4.d: "The tengbiise — the original inhabitants of our lands — have renewed the ancient covenant between people and soil. In every village, the tengsoba earth priest tends the sacred groves where the spirits of the land dwell. These shrines predate even the Nakomsé conquest, and their power remains essential to Mossi life. The earth grants fertility to our fields, protection to our villages, and spiritual authority that complements the political power of the nabas. While Islamic influence creeps in from the north, our earth shrines stand as bastions of ancestral tradition."
 nd_msi.4.a: "The earth spirits guard our way of life."
 nd_msi.5.t: "Crossroads of the Sahel"
 nd_msi.5.d: "Mossi traders have established a network of caravanserais linking our markets to the great trans-Saharan routes. Cotton cloth woven on our strip looms, cattle from our herds, and millet from our fields flow northward, while salt, kola nuts, and luxury goods travel south through our territory. By taxing and protecting these trade routes, the Mossi have become essential middlemen in the commerce of the western Sahel, growing prosperous without the wars of conquest that consumed Mali and Songhai."
 nd_msi.5.a: "Our markets shall be the meeting place of nations."
 nd_msi_nakomse_horsemen: "Nakomsé Horsemanship"
 nd_msi_nakomse_horsemen_desc: "The cavalry traditions of the Nakomsé warrior aristocracy, who trace their lineage to the founding horsemen from Mamprusi."
 nd_msi_earth_shrine_tradition: "Earth Shrine Tradition"
 nd_msi_earth_shrine_tradition_desc: "The ancient practice of maintaining sacred earth shrines tended by tengsoba priests, binding the community to the spiritual power of the land."
 nd_msi_ironworking_lineages: "Ironworking Lineages"
 nd_msi_ironworking_lineages_desc: "The feared blacksmith castes of the Mossi, whose mastery of iron smelting and forging is considered both essential and spiritually dangerous."
 nd_msi_volta_agriculture: "Volta Agriculture"
 nd_msi_volta_agriculture_desc: "Intensive cultivation of millet, sorghum, and other crops in the fertile Volta River headwaters region."
 nd_msi_naba_hierarchy: "Naba Hierarchy"
 nd_msi_naba_hierarchy_desc: "The tiered system of provincial nabas, district chiefs, and village nabas that transmits the Mogho Naba's authority throughout the realm."
 nd_msi_cotton_weaving: "Cotton Weaving"
 nd_msi_cotton_weaving_desc: "The traditional strip-loom weaving of cotton cloth, where women spin and dye the thread while men weave it into the distinctive Mossi textiles."
 nd_msi_lancer_tradition: "Lancer Tradition"
 nd_msi_lancer_tradition_desc: "Professional mounted warriors armed with iron-tipped lances forged by Mossi blacksmiths, the heavy arm of the Nakomsé cavalry."
 nd_msi_sacred_kingship: "Sacred Kingship"
 nd_msi_sacred_kingship_desc: "The institution of naam — the divine authority to rule — and the elaborate court of the Mogho Naba with its six powerful ministers."
 nd_msi_mali_resistance: "Resistance to Mali"
 nd_msi_mali_resistance_desc: "The Mossi kingdoms' defiant resistance against the Mali Empire, raiding its caravans and garrisons rather than submitting to its authority."
 nd_msi_horse_rearing: "Horse Rearing"
 nd_msi_horse_rearing_desc: "Specialized breeding programs that produce the hardy horses essential to Mossi cavalry dominance across the Sahel grasslands."
 nd_msi_sahel_trade_network: "Sahel Trade Network"
 nd_msi_sahel_trade_network_desc: "A network of markets and caravanserais linking Mossi lands to the trans-Saharan trade routes, exchanging cotton, cattle, and grain for salt and luxury goods."
 nd_msi_provincial_courts: "Provincial Courts"
 nd_msi_provincial_courts_desc: "The system of regional governance where provincial nabas hold court, administering justice and collecting tribute with considerable local autonomy."
 nd_msi_iron_guard_tradition: "Iron Guard Tradition"
 nd_msi_iron_guard_tradition_desc: "Elite infantry armed with weapons of superior Mossi iron, trained to hold ground while the cavalry maneuvers."
 nd_msi_songhai_defiance: "Songhai Defiance"
 nd_msi_songhai_defiance_desc: "The stubborn Mossi resistance to Songhai expansion, fortifying villages and using knowledge of the terrain to offset the larger empire's military advantages."
 nd_msi_mask_artistry: "Mask Artistry"
 nd_msi_mask_artistry_desc: "The distinctive tall masks of the Mossi, carved to honor ancestors and nature spirits, used in festivals and ceremonies that bind communities together."
 nd_msi_trade_caravans: "Trade Caravans"
 nd_msi_trade_caravans_desc: "Organized trading expeditions that carry Mossi goods across the Sahel, establishing diplomatic relationships alongside commercial ones."
 nd_msi_ancestor_veneration: "Ancestor Veneration"
 nd_msi_ancestor_veneration_desc: "The deepening of ancestral worship practices, where offerings at patrilineal shrines connect the living to the wisdom and protection of their forebears."
 nd_msi_dolo_tradition: "Dolo Tradition"
 nd_msi_dolo_tradition_desc: "The communal brewing of dolo, millet beer that serves as both a staple beverage and a centerpiece of social and religious gatherings."
 nd_msi_fortified_villages: "Fortified Villages"
 nd_msi_fortified_villages_desc: "The practice of surrounding villages with defensive walls and ditches, creating a network of strongpoints across Mossi territory."
 nd_msi_sahel_riders_advance: "Sahel Riders"
 nd_msi_sahel_riders_advance_desc: "Mounted warriors adapted to the full range of Sahel terrain, equally at home in grassland and scrubland, with tactics refined through centuries of border warfare."
 nd_msi_naam_consolidation: "Naam Consolidation"
 nd_msi_naam_consolidation_desc: "The strengthening of the Mogho Naba's sacred authority, centralizing the institution of naam to create more effective governance across the united kingdoms."
 nd_msi_gold_dust_trade: "Gold Dust Trade"
 nd_msi_gold_dust_trade_desc: "Mossi merchants gain access to the gold dust trade flowing from southern mines through their territory, enriching the kingdom's treasury."
 nd_msi_indigo_dyeing: "Indigo Dyeing"
 nd_msi_indigo_dyeing_desc: "The mastery of indigo dyeing techniques that transform Mossi cotton cloth into prized trade goods sought across West Africa."
 nd_msi_false_departure_ceremony: "False Departure Ceremony"
 nd_msi_false_departure_ceremony_desc: "The daily ritual where the Mogho Naba mounts his horse as if to depart, only to be persuaded to stay — a powerful symbol of the covenant between ruler and people."
 nd_msi_regional_autonomy: "Regional Autonomy"
 nd_msi_regional_autonomy_desc: "The careful balance between central authority and provincial autonomy that has allowed the Mossi kingdoms to govern diverse peoples without provoking rebellion."
 nd_msi_naam_cavalry_advance: "Naam Cavalry"
 nd_msi_naam_cavalry_advance_desc: "The last great evolution of Mossi mounted warfare, combining traditional horsemanship with modern tactical discipline under the naam authority."
 nd_msi_mogho_naba_reforms: "Mogho Naba Reforms"
 nd_msi_mogho_naba_reforms_desc: "Administrative reforms that modernize the Mossi state while preserving the essential institutions of naam and the sacred authority of the Mogho Naba."
 nd_msi_sahel_diplomacy: "Sahel Diplomacy"
 nd_msi_sahel_diplomacy_desc: "A sophisticated diplomatic tradition developed through centuries of navigating between larger empires, maintaining independence through alliance-building and shrewd negotiation."
 nd_msi_cotton_exports: "Cotton Exports"
 nd_msi_cotton_exports_desc: "The expansion of Mossi cotton cloth production from local trade to major export commodity, with strip-woven textiles reaching markets across the Sahel and beyond."
 nd_msi_warrior_aristocracy: "Warrior Aristocracy"
 nd_msi_warrior_aristocracy_desc: "The Nakomsé warrior class has refined its martial traditions into a professional military establishment, combining noble cavalry traditions with disciplined training."
 nd_msi_mossi_jurisprudence: "Mossi Jurisprudence"
 nd_msi_mossi_jurisprudence_desc: "The codification of Mossi legal traditions, drawing on the dual sources of political authority from the nabas and spiritual authority from the tengsoba earth priests."
 nd_msi_modern_horsemen: "Modern Horsemen"
 nd_msi_modern_horsemen_desc: "The adaptation of Mossi cavalry to the modern age, combining traditional grassland mobility with contemporary military organization."
 nd_msi_mossi_renaissance: "Mossi Renaissance"
 nd_msi_mossi_renaissance_desc: "A flowering of Mossi intellectual life, as traditional knowledge systems engage with new ideas flowing along the trade routes of the Sahel."
 nd_msi_sahel_confederation: "Sahel Confederation"
 nd_msi_sahel_confederation_desc: "The vision of a broader Sahel political union, extending the Mossi model of federated governance to neighboring peoples under a shared framework."
 nd_msi_industrial_weaving: "Industrial Weaving"
 nd_msi_industrial_weaving_desc: "The mechanization of the ancient strip-loom tradition, transforming Mossi cotton weaving from a village craft into an industrial enterprise."
 nd_msi_lasting_traditions: "Lasting Traditions"
 nd_msi_lasting_traditions_desc: "The remarkable persistence of Mossi cultural traditions — the masks, the earth shrines, the naam, the daily ceremonies — enduring through centuries of change and external pressure."
 nd_msi_volta_breadbasket: "Volta Breadbasket"
 nd_msi_volta_breadbasket_desc: "The transformation of the Volta headwaters into a major agricultural region, feeding a growing population through intensified farming and improved techniques."
 a_nd_msi_nakomse_horsemen: "Nakomsé Horsemen"
 a_nd_msi_nakomse_horsemen_desc: "The mounted warriors of the Mossi ruling class, whose cavalry tradition stretches back to the founding ancestors who rode north from Mamprusi. Armed with spears and fighting from horseback across the open grasslands, they are the embodiment of naam power."
 a_nd_msi_lancers: "Mossi Lancers"
 a_nd_msi_lancers_desc: "Professional cavalry armed with iron-tipped lances forged by Mossi blacksmiths. These mounted warriors combine the traditional Nakomsé riding skill with heavier armament, forming the striking arm of Mossi armies."
 a_nd_msi_iron_guard: "Mossi Iron Guard"
 a_nd_msi_iron_guard_desc: "Heavy infantry equipped with superior weapons and armor from the feared Mossi blacksmith lineages. These soldiers hold the line while the cavalry maneuvers, their iron shields and blades a testament to the skill of the forge."
 a_nd_msi_sahel_riders: "Sahel Riders"
 a_nd_msi_sahel_riders_desc: "Mounted warriors adapted to the full spectrum of Sahel terrain — from the open grasslands to the scrubland edges of the desert. Fast-moving and tactically flexible, they excel at flanking maneuvers and rapid raids."
 a_nd_msi_naam_cavalry: "Naam Cavalry"
 a_nd_msi_naam_cavalry_desc: "The last evolution of the Nakomsé mounted tradition, combining centuries of grassland horsemanship with modern tactical discipline. Raised through the levy system from noble families who carry the naam, they fight for divine right as much as for territory."
 levy_nd_msi_nakomse_horsemen: "Nakomsé Horsemen Levy"
 levy_nd_msi_nakomse_horsemen_desc: "Noble cavalry raised from the Nakomsé warrior aristocracy, mounted raiders who embody the founding horsemen tradition of the Mossi kingdoms."
 levy_nd_msi_naam_cavalry: "Naam Cavalry Levy"
 levy_nd_msi_naam_cavalry_desc: "The levy of noble and soldier cavalry raised under the sacred authority of naam, combining traditional Mossi horsemanship with disciplined formation riding."
 nd_msi_nabas_court: "Naba's Court"
 nd_msi_nabas_court_desc: "The administrative complex of a Mossi naba, where the chief holds court surrounded by his ministers and servants. Provincial courts mirror the structure of the Mogho Naba's own palace in Ouagadougou, creating a chain of governance from capital to village."
 nd_msi_earth_shrine: "Earth Shrine"
 nd_msi_earth_shrine_desc: "A sacred grove tended by the tengsoba earth priest, where offerings are made to the spirits of the land. These ancient shrines predate Mossi political authority and remain essential to agricultural fertility and community cohesion."
 nd_msi_forge: "Mossi Forge"
 nd_msi_forge_desc: "A workshop operated by the feared blacksmith lineages of the Mossi, who hold the dangerous and powerful knowledge of iron smelting. Their forges produce the weapons, tools, and implements that sustain both the military and agricultural life of the kingdom."
 nd_msi_caravanserai: "Sahel Caravanserai"
 nd_msi_caravanserai_desc: "A fortified rest station along the trade routes, offering shelter, water, and markets for the caravans that carry salt, kola nuts, cotton, and livestock across the Sahel."
 nd_msi_weaving_house: "Weaving House"
 nd_msi_weaving_house_desc: "A workshop where Mossi men work the narrow strip looms, weaving cotton thread spun and dyed by women into the long strips that are sewn together into robes and trade cloths."
 nd_msi_court_maintenance: "Court Maintenance"
 nd_msi_court_maintenance_desc: "The livestock and fine cloth required to maintain the dignity and operations of a naba's administrative court."
 nd_msi_shrine_offerings: "Shrine Offerings"
 nd_msi_shrine_offerings_desc: "Livestock sacrificed, beeswax candles lit, and incense burned at the earth shrines to maintain the covenant between the community and the spirits of the land."
 nd_msi_forge_upkeep: "Forge Production"
 nd_msi_forge_upkeep_desc: "The sacred forges of the blacksmith lineages smelt iron ore with charcoal fuel to produce the tools that sustain Mossi agriculture and warfare."
 nd_msi_caravanserai_upkeep: "Caravanserai Upkeep"
 nd_msi_caravanserai_upkeep_desc: "Livestock and grain provisions for the caravans and their handlers who rest at the station."
 nd_msi_weaving_upkeep: "Cotton Weaving"
 nd_msi_weaving_upkeep_desc: "Cotton thread spun and dyed with indigo is woven on narrow strip looms into the distinctive cloth traded across the Sahel."
 nd_msi_horse_breeding: "Mossi Horse Breeding"
 nd_msi_horse_breeding_desc: "Specialized breeding of hardy cavalry mounts, essential to maintaining the Nakomsé mounted warrior tradition."
 nd_msi_dolo_brewing: "Dolo Brewing"
 nd_msi_dolo_brewing_desc: "The communal brewing of dolo from millet, producing the beer central to Mossi social and religious gatherings."
 nd_msi_millet_processing: "Millet Processing"
 nd_msi_millet_processing_desc: "The systematic processing and storage of millet and sorghum harvests from the Volta headwaters, using clay pottery for grain storage vessels."
 nd_msi_gold_trade: "Gold Dust Trade"
 nd_msi_gold_trade_desc: "The weighing, grading, and distribution of gold dust flowing through Mossi territory from southern mines, with paper records tracking transactions."
 nd_msi_indigo_processing: "Indigo Processing"
 nd_msi_indigo_processing_desc: "The extraction of indigo dye from cultivated plants, producing the prized blue dyes used in Mossi cotton textile production."
 nd_msi_salt_distribution: "Salt Distribution"
 nd_msi_salt_distribution_desc: "The breaking and distribution of salt blocks brought from Saharan mines through Mossi market towns, packed in pottery vessels for transport."
 nd_msi_mask_carving: "Mask Carving"
 nd_msi_mask_carving_desc: "The creation of ceremonial masks honoring ancestors and nature spirits, carved from wood and decorated with natural pigments."
 nd_msi_export_cotton: "Cotton Export Processing"
 nd_msi_export_cotton_desc: "Large-scale processing and packaging of cotton cloth for export to distant markets across the Sahel and beyond."
 nd_msi_village_defense: "Village Defense Works"
 nd_msi_village_defense_desc: "The construction and maintenance of earthen walls, ditches, and palisades that protect Mossi villages from raiders."
 nd_msi_formed_tt: "Mossi has been formed"
 nd_msi_path_a_tt: "Chose Riders of the Naam"
 nd_msi_path_b_tt: "Chose The Mogho Naba's Court"
 nd_msi_destiny: "Mossi Destiny"
 nd_msi_destiny_desc: "The Mossi kingdoms stand united. Whether through the thunder of cavalry or the wisdom of the Mogho Naba's court, a greater destiny awaits the children of Ouédraogo."
 nd_msi_dest_sahel_vanguard: "Sahel Vanguard"
 nd_msi_dest_sahel_vanguard_desc: "Conquer the Dagomba lands to the south, securing the gateway cities of Yendi and Salaga for the Mossi cavalry. Build an army worthy of the Nakomsé tradition."
 nd_msi_dest_niger_campaign: "Niger Campaign"
 nd_msi_dest_niger_campaign_desc: "Push north to seize the wealthy trading city of Djenné and the Niger River crossing at Say. The treasures of the Niger Bend await those bold enough to take them."
 nd_msi_dest_war_camp: "War Camp of the Naam"
 nd_msi_dest_war_camp_desc: "Complete the conquest of the Niger Bend by taking Timbuktu and Gao, the legendary cities that once served as capitals of Mali and Songhai. With these prizes in hand, the Mossi cavalry empire shall surpass all that came before."
 nd_msi_dest_court_foundation: "Court Foundation"
 nd_msi_dest_court_foundation_desc: "Establish the Mogho Naba's court as the center of a prosperous realm. Secure salt for the markets and develop the land until every village thrives under the protection of naam."
 nd_msi_dest_naam_institutions: "Naam Institutions"
 nd_msi_dest_naam_institutions_desc: "Embrace modern financial institutions and extend the court's commercial reach to the gold-trading city of Begho. The Naam system provides stability; now it must also provide prosperity."
 nd_msi_dest_market_hall: "Grand Market of the Sahel"
 nd_msi_dest_market_hall_desc: "Transform the Mossi realm into the premier trading power of the Sahel. Bring gold to the capital markets, develop the land beyond all precedent, and secure the southern trade hub of Kong."
 nd_msi.6.t: "The Path of Mossi Destiny"
 nd_msi.6.d: "The Mossi kingdoms have achieved a unity that our ancestors only dreamed of. From the halls of Ouagadougou to the provincial courts of Yatenga and Tenkodogo, the power of naam binds us together. Now the question is not whether we shall endure — the Mossi have always endured — but how we shall grow. Our destiny lies before us, waiting to be shaped by the choices of this generation."
 nd_msi.6.a: "The naam shall guide us to greatness."
 nd_msi.7.t: "The Dagomba Submit"
 nd_msi.7.d: "The thunder of Mossi cavalry has echoed across the southern grasslands. The Dagomba kingdom, whose warriors once contested our passage, now bows before the power of the Nakomsé. The markets of Yendi and Salaga — rich in kola nuts and trade connections to the forest kingdoms — now feed our war machine. Our horsemen range freely from the Volta headwaters to the edge of the forest belt. The first blow has been struck; the Niger Bend beckons."
 nd_msi.7.a: "Our hooves shall carry us further still."
 nd_msi.8.t: "The Niger Bend Falls"
 nd_msi.8.d: "Djenné, the jewel of the Niger, has fallen to Mossi arms. Our cavalry, descendants of the warriors who raided Mali's caravans for centuries, have at last seized the prize their ancestors could only plunder. The great mud-brick mosque looks down upon Mossi banners, and the river trade that once enriched Songhai now flows through our hands. How shall we consolidate this conquest?"
 nd_msi.8.a: "Strike fast, strike hard — the Sahel fears us!"
 nd_msi.8.b: "Our riders are our legacy — strength in the saddle."
 nd_msi.9.t: "Masters of the Niger"
 nd_msi.9.d: "Timbuktu and Gao — the twin pillars of Sahel civilization — now answer to the Mogho Naba. What the empires of Mali and Songhai built over centuries, the Mossi cavalry has claimed in a generation. The trans-Saharan caravans that once carried salt and gold through foreign kingdoms now pass under our protection. Scholars in Timbuktu's madrasas write of the Mossi with the same awe once reserved for Mansa Musa. How shall we rule this vast domain?"
 nd_msi.9.a: "We are the hegemony — all bow before the naam."
 nd_msi.9.b: "We are the empire — all serve the Mossi banner."
 nd_msi.10.t: "The Court Takes Root"
 nd_msi.10.d: "The Mogho Naba's vision of a prosperous, well-ordered realm is beginning to bear fruit. Salt caravans arrive regularly at our markets, bringing the essential commodity that preserves food and enables long-distance trade. Villages across the Volta region flourish under the protection of provincial nabas, their granaries full, their fields expanding. The dual authority of political naam and spiritual earth-priest power creates a stability that neighboring kingdoms envy. This is governance as the ancestors intended."
 nd_msi.10.a: "Prosperity grows where good governance takes root."
 nd_msi.11.t: "The Naam Embraces Commerce"
 nd_msi.11.d: "The ancient institution of naam has proven remarkably adaptable. What began as a divine mandate to rule has expanded into a framework for economic governance. Mossi merchants, operating under the protection and regulation of the naba hierarchy, have established permanent trading relationships reaching as far south as the gold-rich forests of Begho. The court's adoption of modern financial practices has not diminished its sacred character — rather, it has demonstrated that wisdom and wealth need not be rivals."
 nd_msi.11.a: "Trade shall flow through the channels of naam."
 nd_msi.11.b: "The court's wisdom attracts all who seek order."
 nd_msi.12.t: "The Golden Age of Mossi"
 nd_msi.12.d: "Gold flows through our capital markets. The trade hub of Kong connects our realm to the wealth of the forest kingdoms. Development stretches from the Sahel edge to the southern woodlands. The Mogho Naba presides over a realm that would astonish the founding ancestors — not because it was won by the sword, but because it was built by the steady application of naam's wisdom to the challenges of governance and commerce. The Mossi model — stability through sacred hierarchy, prosperity through controlled trade — stands as a beacon for the Sahel."
 nd_msi.12.a: "Let Mossi prosperity light the way forward."
 nd_msi.12.b: "The naam endures — a legacy for all ages."
 STATIC_MODIFIER_NAME_nd_msi_dest_sahel_thunder: "Sahel Thunder"
 STATIC_MODIFIER_DESC_nd_msi_dest_sahel_thunder: "The mere rumor of Mossi cavalry on the march sends enemies scrambling to fortify their cities. War comes swiftly, though the cost of maintaining such a fearsome reputation strains the treasury."
 STATIC_MODIFIER_NAME_nd_msi_dest_raider_legacy: "Raider Legacy"
 STATIC_MODIFIER_DESC_nd_msi_dest_raider_legacy: "The Mossi horsemen maintain the raiding tradition of their Nakomsé ancestors, reinforcing quickly and sustaining campaigns far from home through efficient foraging."
 STATIC_MODIFIER_NAME_nd_msi_dest_niger_hegemony: "Niger Hegemony"
 STATIC_MODIFIER_DESC_nd_msi_dest_niger_hegemony: "The Mossi cavalry has proven it can take any city in the Sahel. Our ability to storm fortifications and dictate peace terms reflects the overwhelming military superiority of the naam."
 STATIC_MODIFIER_NAME_nd_msi_dest_sahel_empire: "Sahel Empire"
 STATIC_MODIFIER_DESC_nd_msi_dest_sahel_empire: "A vast empire stretching across the Sahel, maintained by a professional army and mercenary auxiliaries. The cost of maintaining so many diplomatic ties pales beside the military strength gained."
 STATIC_MODIFIER_NAME_nd_msi_dest_naam_prosperity: "Naam Prosperity"
 STATIC_MODIFIER_DESC_nd_msi_dest_naam_prosperity: "The Mogho Naba's wise governance has created a flourishing trade network. Merchants prosper under stable policies, and the kingdom's sound financial practices keep inflation in check."
 STATIC_MODIFIER_NAME_nd_msi_dest_court_wisdom: "Court Wisdom"
 STATIC_MODIFIER_DESC_nd_msi_dest_court_wisdom: "The sophistication of the Mossi court system allows for the peaceful absorption of neighboring peoples through diplomacy rather than war. Favorable peace terms reflect the court's reputation, though the focus on governance leaves less energy for military innovation."
 STATIC_MODIFIER_NAME_nd_msi_dest_sahel_golden_age: "Sahel Golden Age"
 STATIC_MODIFIER_DESC_nd_msi_dest_sahel_golden_age: "An era of unprecedented prosperity transforms the Mossi heartland. Cities grow, roads connect markets, and the people feel a profound satisfaction with their ruler's stewardship."
 STATIC_MODIFIER_NAME_nd_msi_dest_naam_legacy: "Naam Legacy"
 STATIC_MODIFIER_DESC_nd_msi_dest_naam_legacy: "The enduring legacy of naam governance ensures stability across generations. Neighboring peoples view the Mossi with respect rather than fear, and the nobility stands as a pillar of the realm."
 nd_msi_war_camp: "Mossi War Camp"
 nd_msi_war_camp_desc: "A permanent military encampment where Nakomsé cavalry are trained, equipped, and mustered for the campaigns of conquest that have carried the Mossi banner from the Volta to the Niger. The camp's forges produce weapons while its corrals hold the finest cavalry mounts in the Sahel."
 nd_msi_grand_market: "Mossi Grand Market"
 nd_msi_grand_market_desc: "A sprawling commercial complex where traders from across the Sahel meet under the regulation and protection of the Mogho Naba's appointed market officials. Salt from the north, gold from the south, cloth from Mossi looms, and livestock from the grasslands change hands in an orderly exchange that enriches all participants."
 nd_msi_war_camp_upkeep: "War Camp Provisioning"
 nd_msi_war_camp_upkeep_desc: "Weapons, leather armor, and cavalry mounts required to maintain the permanent military camp that supports Mossi conquest campaigns."
 nd_msi_grand_market_upkeep: "Market Operations"
