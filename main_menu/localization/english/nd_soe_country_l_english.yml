l_english:
 SOE: "Songhai Empire"
 SOE_ADJ: "Songhai"
 SOE_f: "Songhai Empire"
 SOE_f_desc: "The Songhai Empire was the largest state in African history, dominating the Niger Bend and the trans-Saharan trade routes from its capital at Gao. Under Sonni Ali and Askia Muhammad, the empire absorbed the remnants of Mali, controlled the legendary cities of Timbuktu and Djenné, and became a center of Islamic scholarship. Restoring this empire means uniting the Sahel under Songhai rule once more."
