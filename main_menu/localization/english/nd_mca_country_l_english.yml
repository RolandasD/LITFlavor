l_english:
 MCA: "Muisca Confederation"
 MCA_ADJ: "Muisca"
 MCA_f: "Muisca Confederation"
 MCA_f_desc: "The Muisca Confederation unites the highland chiefdoms of the Altiplano Cundiboyacense under a single political authority. By bringing together the domains of the Zipa at Bacatá and the Zaque at Hunza, alongside the sacred precinct of Suamox, a confederation of master goldsmiths and emerald traders emerges as the dominant power of the Colombian highlands."
