l_english:
 STATIC_MODIFIER_NAME_nd_mtp_golden_trade: "Gold of Sofala"
 STATIC_MODIFIER_DESC_nd_mtp_golden_trade: "The rivers carry gold and the merchants carry cloth. Through the feiras of Sofala, Sena, and Tete, the wealth of the plateau flows outward to the Indian Ocean — and the knowledge of the world flows back."
 STATIC_MODIFIER_NAME_nd_mtp_mwari_sovereignty: "Voice of Mwari"
 STATIC_MODIFIER_DESC_nd_mtp_mwari_sovereignty: "The oracles of the Matobo Hills speak, and the rains come. The Mwenemutapa rules not because foreigners bring trinkets, but because Mwari grants the harvest. The strength of the kingdom lies in its own soil and the spears of its own sons."
 nd_mtp.1.t: "The Restoration of Mutapa"
 nd_mtp.1.d: "The great stone houses of our ancestors stand renewed. From the hilltop enclosures where the Mwenemutapa once held court, the drums sound again across the plateau, calling the provinces to unity. The Shona and Kalanga peoples look to us as the successors of Great Zimbabwe — a kingdom built on gold, iron, and the favor of Mwari.\n\nBut the world beyond the plateau presses close. Swahili merchants and Portuguese traders crowd the river towns, hungry for our gold. Their cloth, glass beads, and firearms are useful — but their ambitions are boundless. Do we harness this trade to build something greater than our ancestors imagined? Or do we look inward, to the strength that made Great Zimbabwe possible — the labor of our farmers, the skill of our smiths, and the spiritual authority of the Mwari cult?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mtp.1.a: "Let the gold flow — and let the world come to us."
 nd_mtp.1.b: "Mwari provides all we need. Our strength is our own."
 nd_mtp.2.t: "The Rozvi Breakaway"
 nd_mtp.2.d: "A prince of the blood, Changamire Dombo, has broken from the Mwenemutapa's court and seized the ancient heartland of Butua by force of arms. His warriors, who call themselves the Rozvi — 'the destroyers' — have swept aside both the weakened garrisons of the old kingdom and the Portuguese prazeiros who had grown fat on Zambezi trade. At the Battle of Maungwe, Dombo's forces annihilated a combined Portuguese-Mutapa army, proving that Shona military power need not depend on foreign firearms.\n\nDombo rules from Khami, near the ruins of Great Zimbabwe itself, and his Rozvi state threatens to eclipse the Mutapa entirely. Yet his success also demonstrates what Shona military discipline can achieve when freed from Portuguese manipulation. The question is whether to channel the Rozvi spirit into permanent military reform or use this crisis to consolidate political authority."
 nd_mtp.2.a: "Embrace the way of the Rozvi warriors."
 nd_mtp.2.b: "Consolidate the kingdom before the storm passes."
 nd_mtp.3.t: "The Portuguese Invasion"
 nd_mtp.3.d: "In 1561, a Portuguese Jesuit named Goncalo da Silveira converted the Mwenemutapa Nogomo to Christianity — only to be strangled by the king's own guards days later, at the urging of the Muslim merchants who feared Portuguese monopoly. Lisbon used the martyrdom as pretext for a full military invasion. In 1569, Francisco Barreto led a thousand soldiers up the Zambezi, aiming to seize the gold mines of the interior.\n\nThey never reached them. Malaria, dysentery, and the sheer hostility of the terrain consumed Barreto's force. The survivors straggled back to the coast, and the Portuguese took their frustrations out on the Swahili traders they could reach, massacring them at Sena and Tete. The Mwenemutapa watched, levied his fifty-percent tariff on the survivors, and extracted a tribute payment from each new Portuguese captain who dared take office in Mozambique.\n\nThe invasion has failed — but the foreigners remain. How do we respond?"
 nd_mtp.3.a: "Fortify the plateau. Let the land itself be our shield."
 nd_mtp.3.b: "Trade with them on our terms. Gold buys more than blood."
 nd_mtp.4.t: "The Great Enclosure"
 nd_mtp.4.d: "The walls of Great Zimbabwe still stand — mortarless granite, fitted so precisely that not even a blade can pass between the stones. The Great Enclosure, largest ancient structure in sub-Saharan Africa, rises eleven meters high and stretches two hundred and fifty meters around, enclosing the conical tower where the granary of the Mwenemutapa proclaimed his generosity to his people.\n\nThese are not mere ruins. They are a statement of what Shona civilization achieved without mortar, without foreign architects, without any technology that was not born of this plateau. The dzimba dzemabwe — the houses of stone — are our declaration that a great civilization rose here, built by our hands, sustained by our labor, and blessed by Mwari."
 nd_mtp.4.a: "The stones speak for themselves."
 STATIC_MODIFIER_NAME_nd_mtp_rozvi_warriors: "Rozvi Warriors"
 STATIC_MODIFIER_DESC_nd_mtp_rozvi_warriors: "Changamire Dombo's warrior tradition — the 'destroyers' who expelled the Portuguese from the interior."
 STATIC_MODIFIER_NAME_nd_mtp_rozvi_consolidation: "Rozvi Consolidation"
 STATIC_MODIFIER_DESC_nd_mtp_rozvi_consolidation: "The political stability that followed Changamire Dombo's reunification of the Shona heartland."
 STATIC_MODIFIER_NAME_nd_mtp_fortress_of_sovereignty: "Fortress of Sovereignty"
 STATIC_MODIFIER_DESC_nd_mtp_fortress_of_sovereignty: "The plateau itself defends the kingdom — its diseases, distances, and hostile terrain defeat invaders that Shona spears do not."
 STATIC_MODIFIER_NAME_nd_mtp_controlled_trade: "Controlled Commerce"
 STATIC_MODIFIER_DESC_nd_mtp_controlled_trade: "The Mwenemutapa dictates the terms of trade, extracting tariffs from every merchant who enters the kingdom."
 nd_mtp_great_enclosure_tradition: "Dzimba Dzemabwe"
 nd_mtp_great_enclosure_tradition_desc: "The mortarless granite architecture of Great Zimbabwe — a building tradition unique in sub-Saharan Africa."
 nd_mtp_njanja_iron_smelting: "Njanja Iron Smelting"
 nd_mtp_njanja_iron_smelting_desc: "The Njanja clan's forced-draught furnace technology, producing high-quality iron tools and weapons."
 nd_mtp_pfumo_tradition: "Pfumo Royal Spearmen"
 nd_mtp_pfumo_tradition_desc: "Elite infantry armed with the pfumo spear and large cowhide shields, forming the backbone of Mutapa armies."
 nd_mtp_mwari_cult: "Cult of Mwari"
 nd_mtp_mwari_cult_desc: "The worship of Mwari, supreme deity of rain and fertility, whose oracles at the Matobo Hills guide political and agricultural decisions."
 nd_mtp_alluvial_gold_tradition: "Alluvial Gold Panning"
 nd_mtp_alluvial_gold_tradition_desc: "Seasonal gold extraction from riverbeds — families pan for gold after the harvest, feeding the Sofala trade route."
 nd_mtp_cattle_wealth: "Cattle of the Plateau"
 nd_mtp_cattle_wealth_desc: "Livestock as the foundation of Shona social hierarchy — cattle are wealth, status, and the currency of bride-price."
 nd_mtp_plateau_trade_routes: "Plateau Trade Routes"
 nd_mtp_plateau_trade_routes_desc: "Ancient trade paths connecting the Zimbabwe Plateau to the Swahili coast, carrying gold, ivory, and iron."
 nd_mtp_provincial_governors: "Provincial Governors"
 nd_mtp_provincial_governors_desc: "The dare court system — provincial judges and governors who administer the law and collect tribute on behalf of the Mwenemutapa."
 nd_mtp_sofala_trade_network: "Sofala Trade Network"
 nd_mtp_sofala_trade_network_desc: "The regulated exchange of gold for cloth, glass beads, and other goods through the Swahili port of Sofala."
 nd_mtp_nhare_scouts_tradition: "Nhare Scouts"
 nd_mtp_nhare_scouts_tradition_desc: "Swift reconnaissance troops named for the eland, masters of ambush and rapid pursuit across the plateau."
 nd_mtp_ivory_cotton_export: "Ivory and Cotton Exports"
 nd_mtp_ivory_cotton_export_desc: "The two great exports of the Mutapa kingdom besides gold — carved ivory and woven cotton cloth."
 nd_mtp_royal_court: "Court of the Mwenemutapa"
 nd_mtp_royal_court_desc: "The elaborate ceremonial protocol of the Mwenemutapa's court, where provincial chiefs pay tribute and foreigners petition for trade rights."
 nd_mtp_masonry_renaissance: "Stone Masonry Tradition"
 nd_mtp_masonry_renaissance_desc: "Continuing refinement of the mortarless granite construction techniques inherited from Great Zimbabwe."
 nd_mtp_portuguese_contact: "Portuguese Contact"
 nd_mtp_portuguese_contact_desc: "Diplomatic engagement with the Portuguese, who arrived at Sofala in 1505 seeking to monopolize the gold trade."
 nd_mtp_muzinda_garrisons: "Muzinda Garrisons"
 nd_mtp_muzinda_garrisons_desc: "Permanent garrison forces stationed at each muzinda provincial seat, trained in defensive warfare."
 nd_mtp_gold_taxation: "Gold Taxation"
 nd_mtp_gold_taxation_desc: "The Mwenemutapa's fifty-percent tariff on all trade goods entering the kingdom — a bold assertion of fiscal sovereignty."
 nd_mtp_feira_markets: "Feira Market System"
 nd_mtp_feira_markets_desc: "Regulated trading posts where gold, ivory, and cloth are exchanged under the Mwenemutapa's oversight."
 nd_mtp_oracular_network: "Oracular Network"
 nd_mtp_oracular_network_desc: "The Mwari cult's network of priests and spirit mediums, serving as both religious authority and political intelligence."
 nd_mtp_shaft_mining: "Shaft Mining"
 nd_mtp_shaft_mining_desc: "Deeper extraction techniques moving beyond surface panning to follow gold-bearing reef deposits underground."
 nd_mtp_changamire_revolt: "Changamire's Revolt"
 nd_mtp_changamire_revolt_desc: "The breakaway of Changamire Dombo and his Rozvi warriors, who expelled the Portuguese and established a new military order."
 nd_mtp_portuguese_resistance: "Portuguese Resistance"
 nd_mtp_portuguese_resistance_desc: "The successful defense against Barreto's 1569 invasion — disease, terrain, and Shona determination defeated European arms."
 nd_mtp_cattle_festival: "Great Cattle Festival"
 nd_mtp_cattle_festival_desc: "Mass ceremonial gatherings where the Mwenemutapa distributes grain and cattle, binding the kingdom through generosity."
 nd_mtp_cloth_currency: "Machira Cloth Currency"
 nd_mtp_cloth_currency_desc: "Standardized cotton cloth used as a medium of exchange throughout the kingdom and its trade networks."
 nd_mtp_zambezi_corridor: "Zambezi Trade Corridor"
 nd_mtp_zambezi_corridor_desc: "The Sena-Tete river route as the commercial artery connecting the interior plateau to the coastal ports."
 nd_mtp_mass_mobilization: "Provincial Mobilization"
 nd_mtp_mass_mobilization_desc: "The Mwenemutapa's ability to raise 300,000 men from the provinces — a mobilization system rivaling any contemporary African power."
 nd_mtp_rozvi_ascendancy: "Rozvi Ascendancy"
 nd_mtp_rozvi_ascendancy_desc: "The military reforms of the Changamire dynasty, which produced disciplined infantry capable of defeating European-armed forces."
 nd_mtp_firearms_adoption: "Firearms Adoption"
 nd_mtp_firearms_adoption_desc: "Shona troops armed with Portuguese-acquired muskets, integrating firearms into traditional battlefield tactics."
 nd_mtp_matopos_center: "Matopos Spiritual Center"
 nd_mtp_matopos_center_desc: "The Matobo Hills as the enduring seat of the Mwari cult — a sacred landscape of caves, rock art, and oracular shrines."
 nd_mtp_ivory_expansion: "Ivory Trade Expansion"
 nd_mtp_ivory_expansion_desc: "Industrial-scale ivory processing and export to European and Indian Ocean markets."
 nd_mtp_khami_tradition: "Khami Architecture"
 nd_mtp_khami_tradition_desc: "The distinctive walling style of Khami, capital of the Rozvi — decorative stone courses built upon natural granite platforms."
 nd_mtp_gold_monopoly: "Gold Export Monopoly"
 nd_mtp_gold_monopoly_desc: "Royal control over all gold leaving the kingdom — no merchant trades without the Mwenemutapa's permission."
 nd_mtp_cultural_resilience: "Shona Cultural Resilience"
 nd_mtp_cultural_resilience_desc: "The survival of Shona identity through Nguni invasions, Portuguese interference, and colonial pressure."
 nd_mtp_modern_governance: "Modern Governance"
 nd_mtp_modern_governance_desc: "Centralized administrative reform for a new era — adapting the dare system to modern state requirements."
 nd_mtp_anti_colonial_resistance: "Anti-Colonial Resistance"
 nd_mtp_anti_colonial_resistance_desc: "Organized military opposition to foreign domination, drawing on centuries of Shona martial tradition."
 nd_mtp_mineral_sovereignty: "Mineral Sovereignty"
 nd_mtp_mineral_sovereignty_desc: "Asserting national control over the Zimbabwe Plateau's gold, copper, and iron wealth."
 nd_mtp_chimurenga_spirit: "Chimurenga Spirit"
 nd_mtp_chimurenga_spirit_desc: "The enduring Shona tradition of armed resistance against oppression — chimurenga means 'revolutionary struggle.'"
 nd_mtp_pan_shona_unity: "Pan-Shona Unity"
 nd_mtp_pan_shona_unity_desc: "Cultural consolidation across Kalanga, Korekore, Zezuru, Manyika, and Ndau peoples under a shared Shona identity."
 a_nd_mtp_pfumo_spearmen: "Pfumo Spearmen"
 a_nd_mtp_pfumo_spearmen_desc: "Elite Shona infantry armed with the pfumo spear and large cowhide shields. These royal troops form the disciplined core of Mutapa armies, trained in close-order defensive formations."
 a_nd_mtp_nhare_scouts: "Nhare Scouts"
 a_nd_mtp_nhare_scouts_desc: "Swift reconnaissance troops named for the eland. Masters of ambush and rapid pursuit, they screen the army's advance and harry retreating foes across the plateau."
 a_nd_mtp_muzinda_garrison: "Muzinda Garrison"
 a_nd_mtp_muzinda_garrison_desc: "Provincial fortress troops drawn from the muzinda administrative seats. Trained in defensive warfare and siege resistance, they hold the stone-walled strongpoints of the kingdom."
 a_nd_mtp_rozvi_warriors: "Rozvi Warriors"
 a_nd_mtp_rozvi_warriors_desc: "Shock infantry of the Changamire dynasty. The Rozvi — 'the destroyers' — are aggressive offensive troops who proved at the Battle of Maungwe that Shona arms could defeat Portuguese muskets."
 a_nd_mtp_musketmen: "Mutapa Musketmen"
 a_nd_mtp_musketmen_desc: "Shona soldiers armed with Portuguese-acquired firearms. These troops combine European weapons technology with Mutapa battlefield discipline."
 nd_mtp_dzimba: "Dzimba Dzemabwe"
 nd_mtp_dzimba_desc: "Great stone enclosures in the Zimbabwe tradition — mortarless granite walls fitted with such precision that a blade cannot pass between the stones. These serve as royal courts, granaries, and symbols of Shona civilization."
 nd_mtp_dzimba_upkeep: "Stone Enclosure Upkeep"
 nd_mtp_dzimba_upkeep_desc: "Maintaining the mortarless granite walls and expanding the enclosure complex."
 nd_mtp_dare: "Dare Court"
 nd_mtp_dare_desc: "The royal judicial court where provincial governors administer justice, collect tribute, and maintain the Mwenemutapa's authority over the kingdom's districts."
 nd_mtp_dare_upkeep: "Court Upkeep"
 nd_mtp_dare_upkeep_desc: "Maintaining the provincial dare court and its administrative functions."
 nd_mtp_njanja_forge: "Njanja Forge"
 nd_mtp_njanja_forge_desc: "Advanced Shona iron smelting works. The Njanja clan builds batteries of forced-draught furnaces, each with paired bellows and rear tuyere holes, producing iron of exceptional quality for tools and weapons."
 nd_mtp_forge_upkeep: "Iron Smelting"
 nd_mtp_forge_upkeep_desc: "The Njanja furnace batteries smelt iron ore with charcoal fuel, producing tools of exceptional quality."
 nd_mtp_mwari_shrine: "Mwari Shrine"
 nd_mtp_mwari_shrine_desc: "A sacred oracular site dedicated to Mwari, supreme deity of rain, fertility, and the harvest. Priests interpret the voice of Mwari from cave echoes and pronounce blessings or curses upon the land."
 nd_mtp_mwari_upkeep: "Shrine Offerings"
 nd_mtp_mwari_upkeep_desc: "Ritual livestock offerings and ceremonial maintenance of the sacred cave shrines."
 nd_mtp_feira: "Feira Trading Post"
 nd_mtp_feira_desc: "A regulated trading market where gold dust from the plateau meets cloth, glass beads, and porcelain from the Indian Ocean trade. The Mwenemutapa's agents oversee every exchange."
 nd_mtp_feira_upkeep: "Trading Post Upkeep"
 nd_mtp_feira_upkeep_desc: "Maintaining the feira market facilities and goods storage."
 nd_mtp_gold_works: "Alluvial Gold Works"
 nd_mtp_gold_works_desc: "Organized gold panning and washing operations along the riverbanks. Families extract gold from alluvial deposits after the harvest season, feeding the kingdom's export economy."
 nd_mtp_gold_works_upkeep: "Gold Panning"
 nd_mtp_gold_works_upkeep_desc: "Families pan for gold in the riverbeds using wooden sluices and cradles, extracting alluvial gold from sediment."
 nd_mtp_ivory_processing: "Ivory Preparation"
 nd_mtp_ivory_processing_desc: "Processing and carving of elephant ivory for export to the Indian Ocean trade network."
 nd_mtp_cotton_weaving: "Cotton Weaving"
 nd_mtp_cotton_weaving_desc: "Shona cotton textile production, creating the distinctive cloth used both as currency and as a trade good."
 levy_nd_mtp_rozvi_warriors: "Rozvi Levy"
 levy_nd_mtp_rozvi_warriors_desc: "Rozvi warrior levies drawn from the martial traditions of the Changamire dynasty."
 levy_nd_mtp_pfumo_spearmen: "Pfumo Levy"
 levy_nd_mtp_pfumo_spearmen_desc: "Spearmen levied from the Shona peasantry, armed with the pfumo and cowhide shield."
 nd_mtp_cattle_herding: "Cattle Herding"
 nd_mtp_cattle_herding_desc: "Managing the vast herds of the Guruuswa grasslands — cattle are the measure of wealth in Shona society."
 nd_mtp_gold_preparation: "Gold Preparation"
 nd_mtp_gold_preparation_desc: "Cleaning, weighing, and packaging gold dust with precision tools for the Sofala export trade."
 nd_mtp_machira_production: "Machira Cloth Production"
 nd_mtp_machira_production_desc: "Standardized cotton cloth production for use as currency throughout the kingdom."
 nd_mtp_zambezi_transport: "Zambezi River Transport"
 nd_mtp_zambezi_transport_desc: "Canoe-based goods movement along the Zambezi, connecting the interior to the coastal ports."
 nd_mtp_shrine_ceremonies: "Shrine Ceremonies"
 nd_mtp_shrine_ceremonies_desc: "Ritual offerings and ceremonies at the Mwari oracular shrines — livestock and incense to honor the supreme deity."
 nd_mtp_granite_quarrying: "Granite Quarrying"
 nd_mtp_granite_quarrying_desc: "Extracting and shaping granite blocks into dressed masonry for the mortarless stone enclosures of the Zimbabwe tradition."
 nd_mtp_kraal_stockade: "Kraal Stockade"
 nd_mtp_kraal_stockade_desc: "A fortified cattle compound serving as a provincial defensive strongpoint. The thick wooden stockade shelters livestock and provides a rallying point for local militia against invaders."
 nd_mtp_kraal_upkeep: "Stockade Upkeep"
 nd_mtp_kraal_upkeep_desc: "Timber maintenance for the kraal stockade defenses."
 nd_mtp_zambezi_wharf: "Zambezi Wharf"
 nd_mtp_zambezi_wharf_desc: "A river trading post along the Zambezi corridor, facilitating the movement of gold, ivory, and imported goods between the plateau and the coast."
 nd_mtp_wharf_upkeep: "Wharf Upkeep"
 nd_mtp_wharf_upkeep_desc: "Maintaining the river wharf facilities and canoe fleet."
 nd_mtp_formed_tt: "Mutapa Empire has been formed"
 nd_mtp_path_a_tt: "Chose Gold of Sofala"
 nd_mtp_path_b_tt: "Chose Voice of Mwari"
 nd_mtp_destiny: "Destiny of the Mutapa"
 nd_mtp_destiny_desc: "The drums of formation have sounded and the Mwenemutapa sits enthroned once more. Now the kingdom must prove itself worthy of its ancestors' legacy. Achieve stability and the path forward will reveal itself."
 nd_mtp_dest_kilwa_trade: "The Kilwa Connection"
 nd_mtp_dest_kilwa_trade_desc: "Kilwa Kisiwani is the jewel of the Swahili coast — the greatest trading city south of Mombasa. To control it is to hold the key to the Indian Ocean gold trade. Seize Kilwa and accumulate the wealth to prove Mutapa's commercial power."
 nd_mtp_dest_zanzibar_reach: "Zanzibar and the Zambezi"
 nd_mtp_dest_zanzibar_reach_desc: "With Kilwa secured, the trade network must extend both northward to Zanzibar and inland through the Zambezi corridor. Control these routes and amass wealth to become the undisputed commercial power of southeastern Africa."
 nd_mtp_dest_indian_ocean: "Emporium of the South"
 nd_mtp_dest_indian_ocean_desc: "The final step: Mombasa, the great northern port, must fall under Mutapa's influence. With porcelain flowing through your markets and gold in your treasury, you will have built a trade empire stretching from the plateau to the Indian Ocean."
 nd_mtp_dest_southern_march: "The Southern March"
 nd_mtp_dest_southern_march_desc: "The lands south of the Limpopo — the Swazi highlands and the Tswana territories — have long been beyond Mutapa's reach. A strong army can change that. March south, seize Mapulana and Bakgatla, and establish the frontier of a greater Shona empire."
 nd_mtp_dest_highveld_conquest: "Conquest of the Highveld"
 nd_mtp_dest_highveld_conquest_desc: "Push deeper into the southern interior. The Kweneng cattle lands and the gold-bearing fields of Lejweleputswa lie waiting. Develop your conquered territory and maintain a powerful army to hold what you have taken."
 nd_mtp_dest_imperium: "Imperium of the Plateau"
 nd_mtp_dest_imperium_desc: "The ultimate ambition: extend Shona dominion to the western desert frontier at Damara. With a massive army, high prestige, and a developed empire, the Mwenemutapa will rule the greatest state southern Africa has ever seen."
 nd_mtp.5.t: "The Mutapa Restored"
 nd_mtp.5.d: "The stone walls of our ancestors stand renewed, and the provinces answer to one Mwenemutapa once more. The kingdom that built Great Zimbabwe has risen again — but rising is only the beginning. The world watches to see what we will become.\n\nWill we reach outward, to the ocean routes that carry gold to distant lands? Or will we turn the strength of our spears upon the peoples beyond our borders, building an empire that dwarfs anything our forebears imagined? The choice has been made. Now comes the work."
 nd_mtp.5.a: "The work begins."
 nd_mtp.6.t: "Gold for the Merchants of Kilwa"
 nd_mtp.6.d: "Kilwa Kisiwani — the island city of coral stone and gold — has long been the gateway through which the wealth of the interior reaches the wider world. For centuries, Swahili merchants carried Mutapa's gold northward through Kilwa's harbors to Arabia, India, and beyond. Now that gateway is ours.\n\nWith Kilwa under Mutapa's control, the middlemen have become our subjects. Gold dust no longer changes hands three times before reaching a ship; it flows directly from the mines of the plateau to the dhows of the Indian Ocean. The profits that once enriched Swahili sultans now fill the Mwenemutapa's treasury."
 nd_mtp.6.a: "The gold flows on our terms now."
 nd_mtp.7.t: "Masters of the Eastern Seaboard"
 nd_mtp.7.d: "From Quelimane on the Zambezi delta to the spice island of Zanzibar, the eastern coast of Africa answers to the Mwenemutapa. The Swahili trading cities, once independent, now operate within a Mutapa-dominated commercial sphere. Ships from Gujarat, Oman, and the Malabar Coast dock at ports where Shona officials collect duties.\n\nThis unprecedented maritime reach raises a question: do we partner with the established Swahili merchant class, leveraging their centuries of Indian Ocean expertise? Or do we impose Mutapa's monopoly directly, ensuring that every cowrie shell of profit flows to the royal treasury?"
 nd_mtp.7.a: "Partner with the Swahili merchants."
 nd_mtp.7.b: "The Mwenemutapa takes his rightful share."
 nd_mtp.8.t: "The Golden Arc"
 nd_mtp.8.d: "From the deep mines of the Zimbabwe Plateau, through the river corridors and coastal ports, to the great harbor of Mombasa — the golden arc is complete. Mutapa has achieved what no African state south of Egypt has accomplished: a commercial empire spanning from the continental interior to the Indian Ocean.\n\nPorcelain from China graces the Mwenemutapa's table. Silk from Gujarat adorns his court. Gold from a hundred mines pays for it all. The question now is how to sustain this wealth across generations. Do we invest in the trade infrastructure that made this possible, creating a permanent commercial machine? Or do we use this wealth to transform the court itself into a center of learning and cosmopolitan culture?"
 nd_mtp.8.a: "Build the golden arc to last forever."
 nd_mtp.8.b: "Let the wealth transform our civilization."
 nd_mtp.9.t: "Spears South of the Limpopo"
 nd_mtp.9.d: "The Mwenemutapa's armies have crossed the Limpopo and marched into the lands beyond — territories that were never part of the old Mutapa kingdom. The Swazi highlands and the Tswana chieftaincies have fallen before Shona spears, and new provincial governors take their seats in conquered muzinda.\n\nThis is something new. The old Mutapa kingdom was a plateau state, defined by the granite kopjes and gold-bearing rivers of Zimbabwe. Now we are becoming something larger — an empire that absorbs peoples who do not speak Shona, who do not worship Mwari, who have their own traditions of governance. The challenge of ruling them has only just begun."
 nd_mtp.9.a: "The frontier advances."
 nd_mtp.10.t: "Lords of the Highveld"
 nd_mtp.10.d: "The great grasslands of the interior — the Highveld — are ours. From the cattle-rich plains of Kweneng to the gold-bearing fields of Lejweleputswa, Mutapa's dominion now stretches far beyond anything the founders of Great Zimbabwe could have imagined. The development of these conquered territories has begun in earnest.\n\nBut governing distant provinces requires choices. Do we plant garrison settlements of Shona soldiers in every conquered territory, creating permanent military colonies that will hold the frontier? Or do we extract tribute from existing local chiefs, governing through subordinates who know the land?"
 nd_mtp.10.a: "Plant garrisons across the conquered lands."
 nd_mtp.10.b: "Rule through tribute and local authority."
 nd_mtp.11.t: "The Imperium Fulfilled"
 nd_mtp.11.d: "From the Indian Ocean coast to the desert frontier, from the Zambezi to the Highveld, the Mwenemutapa rules an empire vaster than any that has risen in southern Africa. The mustering grounds of the capital host armies that would give any European colonial power pause. The prestige of the Shona dynasty echoes across the continent.\n\nThis is the moment of choice that defines all empires at their zenith. Do we commit to the warrior-king tradition — the Changamire legacy of military strength that keeps the empire intact through force of arms? Or do we invest in the eternal stones — the building tradition that outlasted every dynasty, the monuments that will speak for Shona civilization long after armies are dust?"
 nd_mtp.11.a: "We are the warrior-kings."
 nd_mtp.11.b: "The stones will speak for us."
 STATIC_MODIFIER_NAME_nd_mtp_dest_swahili_partnership: "Swahili Partnership"
 STATIC_MODIFIER_DESC_nd_mtp_dest_swahili_partnership: "A partnership with the established Swahili merchant class, leveraging their Indian Ocean expertise to expand Mutapa's commercial reach."
 STATIC_MODIFIER_NAME_nd_mtp_dest_monopoly_trade: "Mutapa Trade Monopoly"
 STATIC_MODIFIER_DESC_nd_mtp_dest_monopoly_trade: "The Mwenemutapa's direct monopoly over coastal trade, enforced by naval patrols and port officials."
 STATIC_MODIFIER_NAME_nd_mtp_dest_golden_arc: "The Golden Arc"
 STATIC_MODIFIER_DESC_nd_mtp_dest_golden_arc: "The complete trade route from plateau mines to Indian Ocean ports, generating wealth that gives Mutapa unmatched negotiating power."
 STATIC_MODIFIER_NAME_nd_mtp_dest_cosmopolitan_court: "Cosmopolitan Court"
 STATIC_MODIFIER_DESC_nd_mtp_dest_cosmopolitan_court: "A court enriched by Indian Ocean trade, drawing foreign artisans, scholars, and soldiers to the Mwenemutapa's service."
 STATIC_MODIFIER_NAME_nd_mtp_dest_settler_garrisons: "Settler Garrisons"
 STATIC_MODIFIER_DESC_nd_mtp_dest_settler_garrisons: "Shona military colonies planted across conquered territories, holding the frontier through permanent armed presence."
 STATIC_MODIFIER_NAME_nd_mtp_dest_tribute_provinces: "Tribute Provinces"
 STATIC_MODIFIER_DESC_nd_mtp_dest_tribute_provinces: "Conquered territories governed through local chiefs who pay tribute to the Mwenemutapa, preserving existing structures under Shona overlordship."
 STATIC_MODIFIER_NAME_nd_mtp_dest_warrior_kings: "Warrior-Kings"
 STATIC_MODIFIER_DESC_nd_mtp_dest_warrior_kings: "The Changamire tradition of military supremacy — the empire held together by the sword and the Mwenemutapa's personal prowess in war."
 STATIC_MODIFIER_NAME_nd_mtp_dest_eternal_stones: "Eternal Stones"
 STATIC_MODIFIER_DESC_nd_mtp_dest_eternal_stones: "The building tradition of Great Zimbabwe endures — monuments in stone that outlast dynasties and proclaim Shona civilization to the ages."
 nd_mtp_indian_ocean_emporium: "Indian Ocean Emporium"
 nd_mtp_indian_ocean_emporium_desc: "The apex of Mutapa's commercial ambitions — a great trading house where goods from China, India, Arabia, and the African interior converge under the Mwenemutapa's authority."
 nd_mtp_emporium_upkeep: "Emporium Maintenance"
 nd_mtp_emporium_upkeep_desc: "Maintaining the trading infrastructure and warehouse facilities of the Indian Ocean emporium."
 nd_mtp_royal_mustering_ground: "Royal Mustering Ground"
 nd_mtp_royal_mustering_ground_desc: "The central parade ground where the Mwenemutapa reviews his armies. Rozvi warriors, Pfumo spearmen, and musketmen drill side by side beneath the royal standard."
 nd_mtp_mustering_upkeep: "Mustering Ground Maintenance"
 nd_mtp_mustering_upkeep_desc: "Maintaining the parade grounds, armories, and training facilities of the royal mustering ground."
