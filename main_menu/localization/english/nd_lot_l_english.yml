l_english:
 STATIC_MODIFIER_NAME_nd_lot_crossroads_of_christendom: "Crossroads of Christendom"
 STATIC_MODIFIER_DESC_nd_lot_crossroads_of_christendom: "Lotharingia reclaims its ancient role as the meeting place of Europe — a land where merchants from the Rhine, the Meuse, and the Scheldt exchange not only goods but ideas, and where toleration of difference is not weakness but statecraft."
 STATIC_MODIFIER_NAME_nd_lot_iron_crown_of_lothar: "Iron Crown of Lothar"
 STATIC_MODIFIER_DESC_nd_lot_iron_crown_of_lothar: "The Middle Kingdom has risen again not as a passive buffer but as a martial state in the Burgundian tradition, its ordonnance companies and fortress-lined frontiers proclaiming that the space between France and Germany belongs to neither — it belongs to Lotharingia."
 nd_lot.1.t: "The Middle Kingdom Reborn"
 nd_lot.1.d: "For centuries, the lands between the Rhine and the Meuse have been the cockpit of Europe — fought over by France and the Empire, carved into duchies and prince-bishoprics, their unity a memory preserved only in the name 'Lotharingia.' Now that memory becomes reality once more. The kingdom that Lothair I carved from the heart of Charlemagne's empire at the Treaty of Verdun in 843 rises again.\n\nBut what manner of kingdom shall this be? The old Lotharingia was destroyed precisely because it tried to be everything — a corridor between rival powers, rich in trade and culture but lacking the military spine to defend its wealth. The new Lotharingia must choose its founding principle. Will it embrace its nature as Europe's crossroads — the land of the Champagne Fairs and the Rhineland fords, where tolerance and commerce create prosperity that makes conquest unnecessary? Or will it forge the iron discipline of the Burgundian ordonnance, building a centralized military state that secures its borders with fortresses and professional armies, demanding that the great powers acknowledge a third force in Western Europe?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_lot.1.a: "We are the bridge between worlds — let commerce and diplomacy be our strength."
 nd_lot.1.b: "The Iron Crown of Lothar shall be defended by iron men."
 nd_lot.2.t: "The Ordonnance Reform"
 nd_lot.2.d: "Following the example of Charles the Bold's revolutionary military ordinances of 1471, Lotharingia establishes its own compagnies d'ordonnance — permanent companies of professional soldiers organized into lances of men-at-arms, archers, and mounted infantry. This is no feudal host dependent on the seasonal availability of noble vassals. These are salaried professionals who drill year-round, maintain their equipment at state expense, and answer to appointed captains rather than hereditary lords.\n\nThe ordinance demands strict discipline: regular mustering, standardized weapons, prohibited gambling and looting without orders. It is the foundation of a modern army — and a statement that Lotharingia will not rely on mercenaries or feudal obligation to defend its frontiers."
 nd_lot.2.a: "The ordonnance shall forge our army anew."
 nd_lot.3.t: "The Bourse of Antwerp"
 nd_lot.3.d: "The great exchange building on the Meir has become something the world has never seen before — a permanent marketplace not for goods, but for money itself. Here, bills of exchange from Venice and Augsburg are traded alongside Portuguese pepper futures and English wool bonds. The Antwerp Bourse has eclipsed the fading fairs of Champagne and Bruges, drawing merchants from across the known world to a single trading floor where fortunes are made and lost in a day.\n\nForeign factors — Portuguese, Spanish, English, German, Italian — have established permanent residences in the city. The population swells. The city's annual fairs, once held twice a year, now function continuously. Antwerp has become the commercial capital of the Western world, and its wealth flows into the coffers of the Lotharingian crown."
 nd_lot.3.a: "Let Antwerp's exchange set the price of the world's goods."
 nd_lot.4.t: "The Order of the Golden Fleece"
 nd_lot.4.d: "In a ceremony of extraordinary splendor, the knights of the Order of the Golden Fleece gather in their chapter — the most prestigious chivalric order in Christendom, founded by Philip the Good of Burgundy in 1430. Its membership is limited to the greatest nobles of the realm, bound by oath to defend the Catholic faith and uphold the honor of their sovereign.\n\nThe Order's golden collar and pendant of a ram's fleece have become the supreme mark of aristocratic distinction in Western Europe. Kings and emperors covet membership. Its chapters, held in the great churches of Bruges, Brussels, and Mechelen, are occasions of matchless pageantry — processions of heralds, tournaments of arms, and solemn masses that proclaim the magnificence of the Lotharingian court to all of Europe."
 nd_lot.4.a: "The Golden Fleece binds the noblest blood of Europe to our cause."
 nd_lot.5.t: "The Printing Revolution"
 nd_lot.5.d: "When Johannes Gutenberg perfected his movable type press in Mainz around 1440, he could scarcely have imagined how quickly the technology would transform the Rhineland. Within decades, printing houses have sprouted in Cologne, Strasbourg, Basel, and Brussels. The great Rhine corridor — already Europe's busiest trade route — becomes the highway of ideas. Books that once took a monk years to copy can now be produced in hundreds of copies in weeks.\n\nThe impact on literacy, religious debate, and the dissemination of knowledge is revolutionary. University cities along the Rhine attract scholars from across Europe. Legal codes are standardized and distributed. Commercial correspondence accelerates. The very concept of information has changed — and Lotharingia sits at the center of this transformation."
 nd_lot.5.a: "Knowledge shall flow as freely as the Rhine."
 STATIC_MODIFIER_NAME_nd_lot_ordonnance_reform: "Ordonnance Reform"
 STATIC_MODIFIER_DESC_nd_lot_ordonnance_reform: "The professional ordonnance companies bring modern military discipline to Lotharingia's armies, with standardized equipment, regular pay, and year-round drilling."
 STATIC_MODIFIER_NAME_nd_lot_global_emporium: "Global Emporium"
 STATIC_MODIFIER_DESC_nd_lot_global_emporium: "The Antwerp Bourse has become the commercial heart of the Western world, where the prices of goods from four continents are set daily."
 nd_lot_carolingian_legacy: "Carolingian Palatine Tradition"
 nd_lot_carolingian_legacy_desc: "The tradition of the Carolingian palatinate — royal chapel complexes that served as centers of administration, justice, and sacred learning across the Middle Kingdom."
 nd_lot_rhine_river_trade: "Rhine River Commerce"
 nd_lot_rhine_river_trade_desc: "The great Rhine artery carries goods from the Alps to the North Sea, and those who control its crossings command the wealth of Western Europe."
 nd_lot_scara_tradition: "Scara Cavalry Tradition"
 nd_lot_scara_tradition_desc: "The elite scara — Charlemagne's mounted guard corps organized into cunei of fifty riders — left a lasting tradition of heavy cavalry excellence in the lands of the Middle Kingdom."
 nd_lot_bishop_princes: "Prince-Bishopric Administration"
 nd_lot_bishop_princes_desc: "The great prince-bishoprics of Cologne, Liege, Trier, and Strasbourg wield both spiritual and temporal authority, their cathedral chapters serving as centers of learning and governance."
 nd_lot_flemish_cloth_trade: "Flemish Cloth Trade"
 nd_lot_flemish_cloth_trade_desc: "The textile towns of Flanders and Brabant — Ghent, Bruges, Ypres, Brussels — produce the finest wool cloth in Europe, their lakenhallen serving as both marketplace and quality control."
 nd_lot_brabant_fairs: "Brabant Fair System"
 nd_lot_brabant_fairs_desc: "The great fairs of Brabant — Antwerp, Bergen op Zoom, and their satellites — have succeeded the Champagne Fairs as the meeting point of Northern and Southern European commerce."
 nd_lot_walloon_ironworking: "Walloon Ironworking"
 nd_lot_walloon_ironworking_desc: "The iron forges of the Meuse valley, from Namur to Liege, have smelted ore since Roman times. Walloon smiths are renowned across Europe for the quality of their metalwork."
 nd_lot_meuse_valley_defense: "Meuse Valley Defense"
 nd_lot_meuse_valley_defense_desc: "The Meuse river valley — Lotharingia's central spine — has been fortified since the Carolingian era, its garrisons trained to hold the crossings against invaders from both east and west."
 nd_lot_urban_communes: "Urban Communes"
 nd_lot_urban_communes_desc: "The burgher communes of the Low Countries and Rhineland have won extraordinary self-governing rights — their councils, militia obligations, and guild regulations creating islands of proto-democratic governance."
 nd_lot_early_netherlandish_art: "Early Netherlandish Art"
 nd_lot_early_netherlandish_art_desc: "The revolution in oil painting pioneered by Jan van Eyck and Rogier van der Weyden has made the Burgundian Netherlands the artistic center of Northern Europe, their luminous altarpieces and portraits prized by courts across Christendom."
 nd_lot_ordonnance_companies: "Ordonnance Companies"
 nd_lot_ordonnance_companies_desc: "The compagnies d'ordonnance — permanent professional military companies first organized by Charles the Bold in 1471 — represent the first standing army in Western Europe since Rome."
 nd_lot_bourse_of_antwerp: "Bourse of Antwerp"
 nd_lot_bourse_of_antwerp_desc: "The Antwerp Bourse, established in the early sixteenth century, is the world's first purpose-built stock exchange — a covered marketplace where merchants trade not goods but financial instruments."
 nd_lot_staple_rights: "Staple Rights"
 nd_lot_staple_rights_desc: "The staple rights of Cologne and Bruges compel all goods passing through their markets to be offered for sale locally, creating immensely profitable bottlenecks that enrich Lotharingian merchants."
 nd_lot_golden_fleece: "Order of the Golden Fleece"
 nd_lot_golden_fleece_desc: "The most prestigious chivalric order in Christendom, founded in 1430 by Philip the Good, whose golden collar and ram's fleece pendant mark the supreme distinction of European nobility."
 nd_lot_printing_heartland: "Printing Press Heartland"
 nd_lot_printing_heartland_desc: "The Rhine corridor from Mainz to Cologne and beyond — the birthplace and fastest adopter of Gutenberg's movable type — has become the information highway of Europe."
 nd_lot_tapestry_workshops: "Tapestry Workshops"
 nd_lot_tapestry_workshops_desc: "The tapestry workshops of Arras, Tournai, and Brussels produce the most sought-after wall hangings in Europe, their monumental narrative scenes gracing the palaces of kings and popes."
 nd_lot_confessional_balance: "Confessional Balance"
 nd_lot_confessional_balance_desc: "In a land where Catholic, Reformed, and Lutheran communities live side by side, Lotharingia develops pragmatic traditions of religious coexistence that other realms will take centuries to discover."
 nd_lot_walloon_guard_tradition: "Walloon Guard Tradition"
 nd_lot_walloon_guard_tradition_desc: "The Walloon Guards — professional infantry recruited from the French-speaking provinces — serve as elite formations in armies across Europe, renowned for their steadiness under fire."
 nd_lot_rhine_fortification: "Rhine Fortification"
 nd_lot_rhine_fortification_desc: "The systematic fortification of the Rhine frontier with bastioned forts and star-shaped citadels, transforming the river from a trade route into an impregnable military barrier."
 nd_lot_toll_system: "Rhine Toll System"
 nd_lot_toll_system_desc: "The refinement of the Rhine toll system — from crude river chains and castle toll points to a rationalized customs service — turns Lotharingia's geography into a steady stream of revenue."
 nd_lot_university_tradition: "University Tradition"
 nd_lot_university_tradition_desc: "The universities of Leuven, Cologne, and Strasbourg form a corridor of learning that attracts scholars from across Europe, their faculties of law, medicine, and theology renowned throughout Christendom."
 nd_lot_crossroads_diplomacy: "Crossroads Diplomacy"
 nd_lot_crossroads_diplomacy_desc: "Lotharingia's position between France, the Empire, and the North Sea states makes it a natural broker of treaties and mediator of disputes — a role its diplomats exploit with skill."
 nd_lot_centralized_customs: "Centralized Customs"
 nd_lot_centralized_customs_desc: "The consolidation of Lotharingia's patchwork of local tolls, staple rights, and transit fees into a unified customs system — the foundation of a true internal market."
 nd_lot_industrial_meuse: "Industrial Meuse"
 nd_lot_industrial_meuse_desc: "The Meuse valley from Liege to Namur — rich in iron ore, water power, and centuries of metalworking tradition — becomes one of Europe's earliest industrial corridors."
 nd_lot_fortress_builders: "Fortress Builders"
 nd_lot_fortress_builders_desc: "Lotharingian military engineers, inheriting both the Burgundian and French fortification traditions, become masters of the bastioned trace italienne and the art of siege warfare."
 nd_lot_commercial_code: "Commercial Code"
 nd_lot_commercial_code_desc: "The codification of commercial law — drawing on centuries of fair regulations, guild statutes, and exchange practices — provides a stable legal framework for Lotharingia's merchants."
 nd_lot_standing_army_reform: "Standing Army Reform"
 nd_lot_standing_army_reform_desc: "The transformation of Lotharingia's military from a mix of provincial levies and mercenary companies into a centralized, uniformed, and professionally trained standing army."
 nd_lot_coal_and_steel: "Coal and Steel"
 nd_lot_coal_and_steel_desc: "The coal and iron deposits of the Meuse-Sambre basin fuel an industrial revolution that transforms Lotharingia from a land of artisan workshops into one of Europe's great manufacturing centers."
 nd_lot_constitutional_assembly: "Constitutional Assembly"
 nd_lot_constitutional_assembly_desc: "A constitutional assembly, drawing on Lotharingia's deep tradition of communal governance and estates assemblies, establishes a framework of codified rights and representative government."
 nd_lot_modern_banking: "Modern Banking"
 nd_lot_modern_banking_desc: "Building on centuries of exchange practice from the Antwerp Bourse to the Cologne merchant houses, Lotharingian banks pioneer modern financial instruments and credit systems."
 nd_lot_national_identity: "Lotharingian National Identity"
 nd_lot_national_identity_desc: "From the patchwork of Walloons, Flemish, Rhinelanders, Alsatians, and Lorrainers emerges a shared Lotharingian consciousness — not erasing local identities but weaving them into a common fabric."
 nd_lot_citizen_army: "Citizen Army"
 nd_lot_citizen_army_desc: "The levee en masse — universal military service drawn from all citizens regardless of estate — transforms Lotharingia's defense from a professional affair into a national obligation."
 a_nd_lot_scara_cavalry: "Scara Cavalry"
 a_nd_lot_scara_cavalry_desc: "Elite heavy cavalry inheriting the tradition of Charlemagne's mounted guard corps, the scara — organized into cunei of fifty riders, trained in both shock charges and dismounted combat."
 a_nd_lot_meuse_garrison: "Meuse Border Garrison"
 a_nd_lot_meuse_garrison_desc: "Sturdy defensive infantry recruited from the Meuse valley fortifications, specialists in holding river crossings and fortified positions against superior numbers."
 a_nd_lot_ordonnance_lance: "Ordonnance Lance"
 a_nd_lot_ordonnance_lance_desc: "Professional heavy cavalry organized into the Burgundian lance formation — a man-at-arms accompanied by coutillier, page, and archers, drilled to fight as a coordinated unit."
 a_nd_lot_walloon_guards: "Walloon Guards"
 a_nd_lot_walloon_guards_desc: "Professional infantry recruited from the French-speaking provinces of Wallonia, serving as elite line troops renowned across Europe for their discipline and steadiness under fire."
 a_nd_lot_line_infantry: "Lotharingian Line Infantry"
 a_nd_lot_line_infantry_desc: "Uniformed professional infantry drilled in the linear tactics of the age, representing the culmination of Lotharingia's centuries-long evolution from feudal levies to a modern army."
 a_nd_lot_citizen_militia: "Citizen Militia"
 a_nd_lot_citizen_militia_desc: "Armed citizens mobilized through universal conscription, fighting with the fervor of free men defending their constitutional rights and national sovereignty."
 nd_lot_pfalzkapelle: "Pfalzkapelle"
 nd_lot_pfalzkapelle_desc: "A Carolingian palatine chapel complex modeled on Charlemagne's great chapel at Aachen — part royal chapel, part administrative center, part treasury, embodying the sacred authority of Lotharingian kingship."
 nd_lot_rheinzoll: "Rheinzoll"
 nd_lot_rheinzoll_desc: "A Rhine toll station positioned at a strategic river crossing, where customs officials inspect passing barges and collect the duties that fund the Lotharingian crown."
 nd_lot_lakenhalle: "Lakenhalle"
 nd_lot_lakenhalle_desc: "A monumental cloth hall where Flemish textiles are inspected, graded, and traded — both a market building and a statement of urban wealth and guild pride."
 nd_lot_walloon_forge: "Walloon Forge"
 nd_lot_walloon_forge_desc: "An iron forge in the Walloon tradition, using charcoal-fired blast techniques refined over centuries in the Meuse valley to produce iron of exceptional quality."
 nd_lot_antwerp_bourse: "Antwerp Bourse"
 nd_lot_antwerp_bourse_desc: "The world's first purpose-built stock exchange — a columned trading floor where bills of exchange, commodity futures, and government bonds change hands in continuous commerce."
 nd_lot_rhine_fortress: "Rhine Fortress"
 nd_lot_rhine_fortress_desc: "A bastioned fortress commanding a Rhine crossing, its star-shaped trace italienne design incorporating the latest in military engineering to withstand artillery bombardment."
 nd_lot_meuse_ironworks: "Meuse Ironworks"
 nd_lot_meuse_ironworks_desc: "A large-scale ironworks in the Meuse corridor, using water-powered bellows and early blast furnace technology to produce iron on an industrial scale."
 nd_lot_steel_works: "Coal and Steel Works"
 nd_lot_steel_works_desc: "A modern industrial plant combining coal-fired coke smelting with advanced steel production techniques, transforming raw ore into the structural material of the modern age."
 nd_lot_chapel_maintenance: "Chapel Maintenance"
 nd_lot_chapel_maintenance_desc: "The upkeep of the palatine chapel complex — its stonework, manuscripts, and sacred vessels — requires a steady supply of building stone and parchment."
 nd_lot_toll_collection: "Toll Collection"
 nd_lot_toll_collection_desc: "The administrative apparatus of the Rhine toll station — clerks, ledgers, and the cloth samples and paper records that document each passing merchant's cargo."
 nd_lot_cloth_finishing: "Cloth Finishing"
 nd_lot_cloth_finishing_desc: "The final stages of Flemish cloth production — fulling, dyeing, and shearing — transform raw woven wool into the finest textiles in Europe."
 nd_lot_charcoal_smelting: "Charcoal Smelting"
 nd_lot_charcoal_smelting_desc: "The traditional charcoal-fired iron smelting process of the Walloon forges, consuming vast quantities of lumber to produce high-quality pig iron."
 nd_lot_bourse_operations: "Bourse Operations"
 nd_lot_bourse_operations_desc: "The daily operations of the exchange — printing trade circulars, maintaining ledgers, and handling the silver coin that underwrites commercial transactions."
 nd_lot_fortress_garrison: "Fortress Garrison"
 nd_lot_fortress_garrison_desc: "The permanent garrison of a Rhine fortress, maintained with weapons, ammunition, and building stone for continuous repair of the fortifications."
 nd_lot_blast_furnace: "Blast Furnace Operations"
 nd_lot_blast_furnace_desc: "Water-powered blast furnaces in the Meuse valley smelt iron ore with charcoal at unprecedented temperatures, producing tools and hardware of exceptional quality."
 nd_lot_coke_smelting: "Coke Smelting"
 nd_lot_coke_smelting_desc: "The revolutionary coke-fired smelting process replaces charcoal with coal, transforming iron ore into steel at an industrial scale previously unimaginable."
 nd_lot_brabant_fair_method: "Brabant Fair Trade"
 nd_lot_brabant_fair_method_desc: "The great Brabant fairs draw wool from England and dyes from the Mediterranean, with Flemish weavers transforming them into finished cloth for sale across Europe."
 nd_lot_tapestry_production: "Tapestry Production"
 nd_lot_tapestry_production_desc: "The production of monumental tapestries in the workshops of Brussels and Arras, weaving wool, silk, and precious dyes into narrative scenes of extraordinary richness."
 levy_nd_lot_scara_cavalry: "Scara Cavalry Levy"
 levy_nd_lot_scara_cavalry_desc: "Noble cavalry raised in the tradition of Charlemagne's elite scara guard corps."
 levy_nd_lot_meuse_garrison: "Meuse Garrison Levy"
 levy_nd_lot_meuse_garrison_desc: "Defensive infantry levy drawn from the fortified settlements of the Meuse valley."
 levy_nd_lot_citizen_militia: "Citizen Militia Levy"
 levy_nd_lot_citizen_militia_desc: "Armed citizens mobilized through universal conscription in defense of the Lotharingian constitution."
 nd_lot_formed_tt: "Lotharingia has been formed"
 nd_lot_path_a_tt: "Chose Crossroads of Christendom"
 nd_lot_path_b_tt: "Chose Iron Crown of Lothar"
 nd_lot_destiny: "Destiny of the Middle Kingdom"
 nd_lot_destiny_desc: "With stability restored across the reconstituted Middle Kingdom, Lotharingia stands at a crossroads: will it become Europe's great commercial bridge, or forge an iron-willed military state?"
 nd_lot_dest_entrepot: "The Rhine Entrepot"
 nd_lot_dest_entrepot_desc: "Secure Amsterdam for Lotharingia and ensure cloth flows through the capital markets. Build a treasury worthy of Europe's crossroads. Requires 1000 gold."
 nd_lot_dest_banker: "Banker to Europe"
 nd_lot_dest_banker_desc: "Embrace the banking institution and accumulate the wealth that makes Lotharingia indispensable to every court in Christendom. Requires 2000 gold and 50 prestige."
 nd_lot_dest_pax: "Pax Lotharingica"
 nd_lot_dest_pax_desc: "Bring the great textile cities of Bruges and Ghent under Lotharingian sovereignty, achieving a total development worthy of Europe's premier commercial state. Requires 2500 total development and 75 prestige. Unlocks the Handelshof building."
 nd_lot_dest_march: "The Burgundian March"
 nd_lot_dest_march_desc: "Claim Dijon, the ancient Burgundian capital, and build an army worthy of Lothar's iron crown. Requires 30 army size and 75 stability."
 nd_lot_dest_frontier: "The Middle Kingdom Restored"
 nd_lot_dest_frontier_desc: "Extend Lotharingian sovereignty to Reims in the west and Hamburg in the north, establishing the frontier of a true middle European power. Requires 50 army size."
 nd_lot_dest_hegemon: "Hegemon of the West"
 nd_lot_dest_hegemon_desc: "Seize Paris, Frankfurt, and Mainz — the capitals of France and the Empire — proving that the Middle Kingdom is the greatest power in Western Europe. Requires 75 army size and 2500 total development. Unlocks the Kaserne building."
 nd_lot.6.t: "The Foundation Holds"
 nd_lot.6.d: "The fragile miracle of reunification endures. Where skeptics predicted swift dissolution — the fate of every previous attempt to revive the Middle Kingdom — Lotharingia instead consolidates. The diverse peoples of the Rhine, the Meuse, and the Scheldt have found, if not unity, then at least a working arrangement. Walloon ironmasters and Flemish weavers, Rhenish vintners and Frisian fishermen — all discover that the Lotharingian crown offers something no neighboring power can: the freedom to trade and worship without the heavy hand of Paris or Vienna.\n\nThe question now is not whether the Middle Kingdom will survive, but what it will become."
 nd_lot.6.a: "The foundation is laid — now we build."
 nd_lot.7.t: "Amsterdam Secured"
 nd_lot.7.d: "The great port of Amsterdam — where the Amstel meets the IJ and a hundred ships crowd the harbor on any given day — now flies the Lotharingian standard. With Amsterdam's matchless commercial infrastructure and the cloth trade flowing through our capital markets, Lotharingia commands the economic crossroads of Northern Europe. The warehouses of the Warmoesstraat overflow with Baltic grain, English wool, and Mediterranean spices. Money-changers and factors from a dozen nations crowd the exchanges.\n\nThis is what the Middle Kingdom was always meant to be: not a fortress, but a marketplace — the place where Europe does business."
 nd_lot.7.a: "Amsterdam is the jewel in our commercial crown."
 nd_lot.8.t: "The Banks of the Middle Kingdom"
 nd_lot.8.d: "Lotharingian banking houses have achieved what no mercantile republic or royal treasury could: they have become indispensable. Kings borrow from Antwerp to wage their wars. Popes rely on Cologne factors to move their revenues. The bills of exchange issued in Brussels are honored from Lisbon to Danzig. The Lotharingian guilder, backed by the immense productive wealth of the Rhine corridor, has become the most trusted currency in European commerce.\n\nBut financial dominance brings its own dilemmas. Shall we use this leverage to reshape trade itself — opening markets and breaking monopolies? Or shall we invest our influence in diplomatic networks, binding the courts of Europe to Lotharingia through debt and obligation?"
 nd_lot.8.a: "Open the markets — free trade enriches all."
 nd_lot.8.b: "Bind the courts of Europe to our exchange."
 nd_lot.9.t: "The Lotharingian Peace"
 nd_lot.9.d: "There is a phrase heard increasingly in the chanceries of Europe: 'Pax Lotharingica.' It refers not to conquest but to the remarkable stability that Lotharingian commercial networks have brought to Western Europe. When wars threaten trade, Lotharingian diplomats broker peace. When famine strikes a province, Lotharingian merchants redirect grain. The great textile cities of Bruges and Ghent, now under the Lotharingian crown, anchor a commercial network that stretches from the Baltic to the Mediterranean.\n\nThe Middle Kingdom has achieved what its founders dreamed: not dominion through arms, but indispensability through commerce. No power in Europe can afford to make war on the nation that holds the purse strings. Shall this peace be expressed through universal free trade — or through the cultivation of a cosmopolitan capital that draws the best minds of every nation?"
 nd_lot.9.a: "Let the markets speak for themselves."
 nd_lot.9.b: "Make our capital the envy of every nation."
 nd_lot.10.t: "The March on Dijon"
 nd_lot.10.d: "The ancient capital of the Burgundian dukes falls to Lotharingian arms. In the great hall of the Ducal Palace, where Philip the Good once held his glittering court and Charles the Bold plotted his doomed ambitions, the Lotharingian standard now hangs beside the iron crown of Lothar. The message is unmistakable: Lotharingia claims not merely the Low Countries and the Rhineland, but the full inheritance of the Burgundian state — its military traditions, its chivalric prestige, and its territorial ambitions.\n\nThe Burgundian March has begun. The Middle Kingdom is no longer content to occupy the space between France and the Empire — it means to dominate it."
 nd_lot.10.a: "Dijon is ours — let the great powers take notice."
 nd_lot.11.t: "The Frontiers Secured"
 nd_lot.11.d: "With Reims — the coronation city of French kings — under Lotharingian control in the west, and Hamburg — the great Hanseatic port — secured in the north, the Middle Kingdom has established frontiers that would have astounded Lothair I himself. This is no longer a narrow corridor between rival powers. It is a true continental state, commanding the Rhine from source to sea, the Meuse from headwaters to delta, and the overland routes from the Channel to the Baltic.\n\nThe question now is how to hold what has been won. Shall we build an impregnable line of modern fortresses along the frontier, making invasion suicidal? Or shall we revive the ordonnance tradition, investing in the tactical excellence of our field armies to meet any threat in open battle?"
 nd_lot.11.a: "Build the fortresses — make our frontiers impregnable."
 nd_lot.11.b: "Drill the armies — tactical excellence wins wars."
 nd_lot.12.t: "Hegemon of the West"
 nd_lot.12.d: "Paris has fallen. Frankfurt has fallen. Mainz has fallen. The three cities that anchor the power of France and the Holy Roman Empire — the political capital of the Capetians, the coronation city of the Emperors, and the seat of the premier Archbishop-Elector — all now answer to the iron crown of Lothar. The Middle Kingdom has not merely survived between the great powers; it has consumed them.\n\nThis is the Lotharingian century. From the Channel to the Alps, from the Atlantic to the Elbe, the territories of Charlemagne's empire are reunited under a single crown for the first time since the Treaty of Verdun. Shall this hegemony be expressed through an elite imperial guard that embodies centralized power? Or through the iron discipline of a professional army that fights for plunder as much as patriotism?"
 nd_lot.12.a: "Forge an imperial guard worthy of our new dominion."
 nd_lot.12.b: "Iron discipline and the spoils of war."
 STATIC_MODIFIER_NAME_nd_lot_dest_exchange_mastery: "Exchange Mastery"
 STATIC_MODIFIER_DESC_nd_lot_dest_exchange_mastery: "Lotharingian exchanges set the terms of European trade, their bills of exchange and commodity futures underpinning the commerce of the continent."
 STATIC_MODIFIER_NAME_nd_lot_dest_diplomatic_network: "Diplomatic Network"
 STATIC_MODIFIER_DESC_nd_lot_dest_diplomatic_network: "A web of financial obligations and diplomatic ties binds the courts of Europe to Lotharingian interests, making our neutrality too valuable to violate."
 STATIC_MODIFIER_NAME_nd_lot_dest_universal_market: "Universal Market"
 STATIC_MODIFIER_DESC_nd_lot_dest_universal_market: "The Lotharingian commercial network has become truly global, its light ships carrying trade to every port while its markets recover swiftly from any disruption."
 STATIC_MODIFIER_NAME_nd_lot_dest_cosmopolitan_capital: "Cosmopolitan Capital"
 STATIC_MODIFIER_DESC_nd_lot_dest_cosmopolitan_capital: "The great cities of the Middle Kingdom — Brussels, Antwerp, Cologne — draw scholars, artists, and merchants from every nation, creating a culture of tolerance and innovation."
 STATIC_MODIFIER_NAME_nd_lot_dest_fortress_line: "Fortress Line"
 STATIC_MODIFIER_DESC_nd_lot_dest_fortress_line: "A continuous chain of modern fortifications along the Lotharingian frontier, supported by advanced logistics, makes invasion a suicidal proposition."
 STATIC_MODIFIER_NAME_nd_lot_dest_ordonnance_revival: "Ordonnance Revival"
 STATIC_MODIFIER_DESC_nd_lot_dest_ordonnance_revival: "The revival of Burgundian ordonnance discipline produces field armies of exceptional tactical flexibility, though the concentration on land warfare leaves the navy neglected."
 STATIC_MODIFIER_NAME_nd_lot_dest_imperial_guard: "Imperial Guard"
 STATIC_MODIFIER_DESC_nd_lot_dest_imperial_guard: "An elite imperial guard corps, equipped with the finest artillery and answering directly to the crown, embodies the centralized military power of the Lotharingian state."
 STATIC_MODIFIER_NAME_nd_lot_dest_iron_discipline: "Iron Discipline"
 STATIC_MODIFIER_DESC_nd_lot_dest_iron_discipline: "A professional army bound by iron discipline and incentivized by the systematic distribution of war spoils, supported by mercenary companies that supplement the standing forces."
 nd_lot_handelshof: "Handelshof"
 nd_lot_handelshof_desc: "A grand commercial court where merchants from across Europe gather to settle disputes, negotiate contracts, and trade under the protection of Lotharingian commercial law — the institutional embodiment of the Pax Lotharingica."
 nd_lot_kaserne: "Kaserne"
 nd_lot_kaserne_desc: "Professional military barracks housing Lotharingia's standing army — permanent quarters with armories, drill yards, and supply depots that keep soldiers combat-ready year-round."
 nd_lot_handelshof_operations: "Commercial Court Operations"
 nd_lot_handelshof_operations_desc: "The daily operations of the Handelshof — printing trade circulars, maintaining elegant furnishings for visiting dignitaries, and the endless paperwork of commercial arbitration."
 nd_lot_kaserne_upkeep: "Barracks Upkeep"
 nd_lot_kaserne_upkeep_desc: "The maintenance of professional barracks — equipping soldiers with weapons, providing uniforms and cloth, and keeping tools for fortification repair."
