l_english:
 STATIC_MODIFIER_NAME_nd_westphalian_sovereignty: "Westphalian Sovereignty"
 STATIC_MODIFIER_DESC_nd_westphalian_sovereignty: "The Westphalian system of sovereign equality among states, where each prince is master of his own realm, free from external interference in matters of religion and governance."
 STATIC_MODIFIER_NAME_nd_red_earth_justice: "The Red Earth"
 STATIC_MODIFIER_DESC_nd_red_earth_justice: "On the Rote Erde, the Emperor's Blutbann still holds. Through the ancient Vehmic tribunals, Westphalia exercises a unique tradition of imperial justice that reaches across the realm, enforcing order where other authorities fail."
 nd_wes.1.t: "The Rise of Westphalia"
 nd_wes.1.d: "The lands between the Rhine and the Weser have been united under Westphalian authority. From the salt springs of the Hellweg to the forges of the Sauerland, from the Hanseatic counting houses of Dortmund to the secretive tribunal halls where hooded judges dispense the Emperor's justice -- this is a land shaped by commerce, law, and the hard lessons of religious war.\n\nWestphalia stands at a crossroads. It can champion the revolutionary principle that every state, great or small, possesses equal sovereignty and the right to determine its own confession -- the very principle that will one day bear its name. Or it can draw upon its ancient and unique judicial authority, the Vehmic courts of the Red Earth, to impose order through the weight of imperial law.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_wes.1.a: "Cuius regio, eius religio -- sovereignty for all"
 nd_wes.1.b: "The Red Earth remembers the Emperor's justice"
 STATIC_MODIFIER_NAME_nd_wes_peace_congress_diplomacy: "Congress Diplomacy"
 STATIC_MODIFIER_DESC_nd_wes_peace_congress_diplomacy: "The precedent of peace by diplomatic congress, where disputes between sovereign states are resolved through negotiation among assembled delegates rather than on the battlefield."
 STATIC_MODIFIER_NAME_nd_wes_peace_congress_tolerance: "Religious Coexistence"
 STATIC_MODIFIER_DESC_nd_wes_peace_congress_tolerance: "The guarantee of confessional rights: Catholic, Lutheran, and Calvinist communities may practice their faith freely, and no prince may impose conversion upon subjects of a recognized confession."
 nd_wes.2.t: "The Peace of Westphalia"
 nd_wes.2.d: "After decades of devastation that has killed millions and left entire regions depopulated, the warring powers of Europe have assembled in our cities of Munster and Osnabruck. The negotiations have lasted years, involving over a hundred delegations, but at last the treaties are sealed.\n\nThe Peace of Westphalia establishes principles that will reshape the world: the sovereign equality of states, the right of each prince to determine his realm's religion, and the settlement of disputes through diplomatic congress rather than crusade. Our cities have given their name to a new order.\n\nHow shall we honor the legacy of this peace?"
 nd_wes.2.a: "Champion the congress system of diplomacy"
 nd_wes.2.b: "Enshrine the rights of all confessions"
 STATIC_MODIFIER_NAME_nd_wes_napoleonic_reform: "Code Napoleon"
 STATIC_MODIFIER_DESC_nd_wes_napoleonic_reform: "The Napoleonic Code has swept away feudal privileges, abolished serfdom, and established equality before the law. Westphalia becomes the first German state with a modern written constitution."
 nd_wes.3.t: "The Code Napoleon in Westphalia"
 nd_wes.3.d: "A new era dawns for Westphalia. The feudal order that has governed these lands for centuries is being dismantled. A written constitution -- the first of its kind in any German state -- has been proclaimed, establishing a centralized administration, an elected legislature, and the revolutionary principle of equality before the law.\n\nSerfdom is abolished. The guilds lose their monopolies. For the first time, Jews receive full legal equality. The Napoleonic Code replaces the patchwork of local customs and privileges with a single, rational legal framework. Whether these reforms survive depends on what follows -- but Westphalia will never be the same."
 nd_wes.3.a: "The old order gives way to reason"
 nd_wes_formed_tt: "Westphalia has been formed"
 nd_wes_path_a_tt: "Westphalia pursues sovereign equality"
 nd_wes_path_b_tt: "Westphalia upholds the Red Earth's justice"
 nd_wes_hellweg_salt_trade: "Hellweg Salt Trade"
 nd_wes_hellweg_salt_trade_desc: "The natural brine springs along the Hellweg, the ancient east-west trade route through Westphalia, have sustained a thriving salt industry since antiquity. Towns like Soest, Unna, Werl, and Salzkotten grew wealthy from evaporating brine into the white gold that preserved fish, cured meat, and fed the Hanseatic trade network."
 nd_wes_vehmic_courts: "Vehmic Courts"
 nd_wes_vehmic_courts_desc: "The Vehmgerichte of Westphalia are a unique judicial institution: secret tribunals of lay judges empowered by the Emperor himself to pronounce capital sentences. Operating from Dortmund and across the Red Earth, these courts enforce order where ordinary justice fails, their verdicts enforced by oath-bound Freischoffen who may pursue the condemned across the Empire."
 nd_wes_soest_municipal_law: "Soest Municipal Law"
 nd_wes_soest_municipal_law_desc: "The Soest municipal code, one of the earliest and most influential in medieval Germany, served as a model for dozens of cities across the Empire. Its provisions for civic self-governance, market regulation, and legal process established Westphalian towns as centers of legal innovation."
 nd_wes_dortmund_market_rights: "Dortmund Market Rights"
 nd_wes_dortmund_market_rights_desc: "Dortmund's imperial free city status and market privileges made it the most important Hanseatic city in Westphalia. Its Rathaus served as the seat of civic governance and commercial arbitration, a model of urban self-government emulated across the region."
 nd_wes_hanseatic_commerce: "Hanseatic Commerce"
 nd_wes_hanseatic_commerce_desc: "Dortmund and Soest rank among the most important Hanseatic cities in Westphalia. Their merchants trade salt, metal goods, and cloth along the Hellweg route and through Hanseatic networks stretching from Novgorod to London, bringing wealth and cosmopolitan connections to the Westphalian heartland."
 nd_wes_freischoffen_tradition: "Freischoffen Tradition"
 nd_wes_freischoffen_tradition_desc: "The free judges of the Vehmic courts are drawn from the free men of Westphalia, bound by sacred oaths to uphold imperial justice. Their martial discipline and unwavering commitment to order makes them formidable urban militia -- soldiers who fight not for pay but for the law."
 nd_wes_hellweg_infrastructure: "Hellweg Infrastructure"
 nd_wes_hellweg_infrastructure_desc: "The Hellweg, crossing Westphalia from Duisburg to Paderborn, is one of Germany's oldest and most important trade routes. Investment in road maintenance, bridge construction, and way stations transforms it from a medieval track into a proper commercial highway."
 nd_wes_circle_assembly: "Circle Assembly"
 nd_wes_circle_assembly_desc: "The Lower Rhenish-Westphalian Circle, one of the Imperial Circles established by Maximilian I's reforms of 1512, provides a forum for collective governance. Its assemblies coordinate taxation, military contributions, and dispute resolution among the Circle's diverse secular and ecclesiastical territories."
 nd_wes_sauerland_ironworks: "Sauerland Ironworks"
 nd_wes_sauerland_ironworks_desc: "The Sauerland mountains of southern Westphalia possess abundant iron ore, forests for charcoal, and fast-flowing streams for water power. Charcoal-fired blast furnaces and water-driven hammers produce weapons, tools, and metal goods that supply markets across the Empire."
 nd_wes_soest_feud_legacy: "Soest Feud Legacy"
 nd_wes_soest_feud_legacy_desc: "The Soest Feud of 1444-1449, in which Westphalia's richest city defied the Archbishop of Cologne and endured a five-year siege, demonstrated that Westphalian towns would fight fiercely for their autonomy. The legacy of that stubborn resistance shapes Westphalian defensive traditions."
 nd_wes_kreistruppen_obligation: "Kreistruppen Obligation"
 nd_wes_kreistruppen_obligation_desc: "The Lower Rhenish-Westphalian Circle bears mandatory obligations to furnish troop contingents to the Reichsarmee. These Kreistruppen, recruited from secular and ecclesiastical estates under the oversight of circle colonels, form disciplined defensive infantry trained for border protection and imperial campaigns."
 nd_wes_westphalian_printing: "Westphalian Printing"
 nd_wes_westphalian_printing_desc: "The printing press spreads rapidly through Westphalia's urban centers, producing theological tracts, legal commentaries, and commercial correspondence. Munster, Cologne, and Dortmund become regional centers of print culture, accelerating the spread of literacy and learning."
 nd_wes_sauerland_arms_trade: "Sauerland Arms Trade"
 nd_wes_sauerland_arms_trade_desc: "The iron forges of the Sauerland supply not only local needs but feed a growing export trade in firearms and weapons. Westphalian metalwork gains a reputation for quality, competing with the armories of Nuremberg and Liege."
 nd_wes_peace_of_westphalia: "Peace of Westphalia"
 nd_wes_peace_of_westphalia_desc: "The Peace of Westphalia, signed in Munster and Osnabruck in 1648, ended the Thirty Years' War and established the principles of sovereign statehood and religious toleration that still define international relations. Westphalia gave its name to the new world order."
 nd_wes_linen_industry: "Westphalian Linen Industry"
 nd_wes_linen_industry_desc: "Eastern Westphalia, centered on Bielefeld and Osnabruck, develops into one of Germany's foremost linen-producing regions. Rural cottage weavers process locally grown flax into cloth that Westphalian merchants export to markets in the Netherlands, England, and beyond."
 nd_wes_confessional_balance: "Confessional Balance"
 nd_wes_confessional_balance_desc: "The religious settlement following the devastation of the Thirty Years' War establishes a delicate balance between Catholic and Protestant communities in Westphalia, where mixed populations require pragmatic coexistence rather than forced conformity."
 nd_wes_imperial_circle_defense: "Imperial Circle Defense"
 nd_wes_imperial_circle_defense_desc: "The Lower Rhenish-Westphalian Circle coordinates collective defense through fortification programs, garrison obligations, and joint military exercises. Circle contributions reinforce frontier defenses and support imperial campaigns against external threats."
 nd_wes_line_infantry_reform: "Westphalian Line Infantry"
 nd_wes_line_infantry_reform_desc: "French military reforms transform Westphalian forces into modern line infantry regiments, trained in the latest tactical doctrines and equipped with standardized weapons. These professional soldiers represent a decisive break from the old militia traditions."
 nd_wes_constitutional_experiments: "Constitutional Experiments"
 nd_wes_constitutional_experiments_desc: "Westphalia becomes a laboratory for constitutional governance, experimenting with written constitutions, representative assemblies, and administrative rationalization that foreshadow the broader German constitutional movement."
 nd_wes_textile_expansion: "Textile Expansion"
 nd_wes_textile_expansion_desc: "Westphalian linen production expands from cottage industry to organized manufacture, with merchants coordinating networks of rural spinners and weavers. Bielefeld's bleaching fields process cloth for export markets across Europe."
 nd_wes_napoleonic_code: "Napoleonic Code"
 nd_wes_napoleonic_code_desc: "The introduction of the Code Napoleon in the Kingdom of Westphalia abolishes feudal privilege, establishes equality before the law, and creates the first modern constitution in German history. These reforms, though imposed from without, leave a permanent mark on Westphalian legal and administrative traditions."
 nd_wes_industrial_awakening: "Industrial Awakening"
 nd_wes_industrial_awakening_desc: "The transition from water-powered forges to steam-driven factories transforms the Westphalian economy. The Sauerland's metalworking tradition and the Ruhr's coal deposits combine to create one of Germany's earliest industrial regions."
 nd_wes_sovereign_equality: "Sovereign Equality"
 nd_wes_sovereign_equality_desc: "The Westphalian principle of sovereign equality -- that every state, regardless of size or power, possesses inherent rights of self-governance -- matures from a diplomatic expedient into a foundational doctrine of international law."
 nd_wes_civic_emancipation: "Civic Emancipation"
 nd_wes_civic_emancipation_desc: "The legacy of Napoleonic reform bears fruit as Westphalia's urban populations gain new freedoms: the abolition of guild monopolies, legal equality regardless of faith, and the emergence of a modern civil society from the remnants of feudal obligation."
 nd_wes_hellweg_saltworks: "Hellweg Salt Works"
 nd_wes_hellweg_saltworks_desc: "Brine evaporation facilities along the Hellweg trade route, where natural salt springs are channeled into graduated evaporation towers and boiling houses to produce salt for trade."
 nd_wes_vehmic_tribunal: "Vehmic Tribunal"
 nd_wes_vehmic_tribunal_desc: "A tribunal hall of the Vehmgericht, where the Emperor's free judges hold court under oath of secrecy, dispensing capital justice in the name of imperial authority on the Red Earth of Westphalia."
 nd_wes_hanseatic_kontor: "Hanseatic Kontor"
 nd_wes_hanseatic_kontor_desc: "A Westphalian merchant house in the Hanseatic tradition, where traders from Dortmund and Soest warehouse goods, negotiate contracts, and maintain the commercial networks that connect the Hellweg to the wider Hanseatic world."
 nd_wes_sauerland_forge: "Sauerland Forge"
 nd_wes_sauerland_forge_desc: "A charcoal-fired iron forge in the Sauerland mountains, using water-powered bellows and trip hammers to smelt ore and produce weapons, tools, and metal goods from Westphalia's rich deposits."
 nd_wes_linen_house: "Linen House"
 nd_wes_linen_house_desc: "A Westphalian textile workshop where locally grown flax is processed into linen cloth through spinning, weaving, and bleaching -- the foundation of the proto-industrial putting-out system centered on Bielefeld."
 nd_wes_rathaus: "Westphalian Rathaus"
 nd_wes_rathaus_desc: "A civic town hall in the grand Westphalian tradition, seat of municipal self-governance where elected councils of burghers administer justice, regulate markets, and manage the affairs of proud, independent trading cities."
 nd_wes_pm_brine_evaporation: "Brine Evaporation"
 nd_wes_pm_brine_evaporation_desc: "Natural brine from Westphalia's salt springs is heated in boiling houses fueled by local timber, with stone-lined evaporation pans producing crystallized salt for the Hanseatic trade network."
 nd_wes_pm_saltworks_maintenance: "Salt Works Upkeep"
 nd_wes_pm_saltworks_maintenance_desc: "Maintaining the graduated evaporation towers, boiling houses, and brine channels of the Hellweg salt works."
 nd_wes_pm_tribunal_maintenance: "Tribunal Upkeep"
 nd_wes_pm_tribunal_maintenance_desc: "Maintaining the records, seals, and enforcement apparatus of the Vehmic court system."
 nd_wes_pm_kontor_maintenance: "Kontor Upkeep"
 nd_wes_pm_kontor_maintenance_desc: "Maintaining the warehouses, account books, and commercial infrastructure of the Hanseatic trading house."
 nd_wes_pm_charcoal_smelting: "Charcoal Smelting"
 nd_wes_pm_charcoal_smelting_desc: "Iron ore from the Sauerland hills is smelted in charcoal-fired blast furnaces and forged into weapons and tools using water-powered hammers."
 nd_wes_pm_industrial_steel: "Industrial Steel"
 nd_wes_pm_industrial_steel_desc: "The transition to coke-fired furnaces and Bessemer converters enables mass production of steel, transforming the Sauerland from a traditional ironworking region into a center of modern heavy industry."
 nd_wes_pm_forge_maintenance: "Forge Upkeep"
 nd_wes_pm_forge_maintenance_desc: "Maintaining the furnaces, water wheels, and hammer works of the Sauerland iron forges."
 nd_wes_pm_linen_weaving: "Linen Weaving"
 nd_wes_pm_linen_weaving_desc: "Locally grown flax is spun into thread and woven into linen cloth on hand looms, then bleached on the famous Bielefeld bleaching fields."
 nd_wes_pm_linen_maintenance: "Linen House Upkeep"
 nd_wes_pm_linen_maintenance_desc: "Maintaining the looms, bleaching fields, and spinning equipment of the Westphalian linen workshops."
 nd_wes_pm_rathaus_maintenance: "Rathaus Upkeep"
 nd_wes_pm_rathaus_maintenance_desc: "Maintaining the civic records, council chambers, and administrative infrastructure of the Westphalian town hall."
 a_nd_wes_kreistruppen: "Kreistruppen"
 a_nd_wes_kreistruppen_desc: "Disciplined infantry of the Lower Rhenish-Westphalian Circle, raised from the secular and ecclesiastical estates to fulfill the Circle's mandatory military obligations to the Reichsarmee. Trained for border defense and fortification duties."
 a_nd_wes_freischoffen: "Freischoffen Guard"
 a_nd_wes_freischoffen_desc: "Urban militia drawn from the free judges of the Vehmic courts, oath-bound men of Westphalia who serve as enforcers of imperial justice. Their discipline and initiative reflect the Vehmic tradition of decisive, unyielding authority."
 a_nd_wes_line_regiment: "Westphalian Line Regiment"
 a_nd_wes_line_regiment_desc: "Professional line infantry trained in modern tactical doctrine, equipped with standardized muskets and bayonets. The Westphalian line represents the transformation from feudal militia to disciplined standing army."
 levy_nd_wes_freischoffen: "Freischoffen Guard"
 levy_nd_wes_freischoffen_desc: "Urban militia of oath-bound free judges, raised from Westphalia's burgher and soldier populations to enforce the Vehmic courts' authority."
 levy_nd_wes_kreistruppen: "Kreistruppen"
 levy_nd_wes_kreistruppen_desc: "Circle militia infantry raised from Westphalian estates to fulfill the Lower Rhenish-Westphalian Circle's military obligations to the Reichsarmee."
 nd_wes_destiny: "Westphalian Destiny"
 nd_wes_destiny_desc: "Westphalia has risen. The lands between Rhine and Weser are united, and the future stretches before us. Whether through the pen of diplomacy or the sword of justice, our destiny awaits."
 nd_wes_dest_congress: "The Congress of Nations"
 nd_wes_dest_congress_desc: "Establish Westphalia as a center of international commerce and diplomacy. Secure control of Amsterdam's trade networks and embrace the financial institutions that will fund our vision of sovereign equality among nations."
 nd_wes_dest_balance: "Balance of Power"
 nd_wes_dest_balance_desc: "The Westphalian system requires not just principles but power to enforce them. Extend our influence to The Hague, grow our treasury, and develop our lands to sustain a diplomatic presence worthy of our ideals."
 nd_wes_dest_eternal_peace: "Perpetual Peace"
 nd_wes_dest_eternal_peace_desc: "The ultimate expression of Westphalian sovereignty: a world order where disputes are resolved through reason, not force. Reach Geneva, embrace the scientific revolution, and build the institutions of lasting peace."
 nd_wes_dest_vehme: "The Vehme Ascendant"
 nd_wes_dest_vehme_desc: "The Vehmic courts of the Red Earth will extend their reach. Bring Cologne and Kassel under our authority, proving that the Emperor's justice knows no boundaries. Maintain stability while we expand our jurisdiction."
 nd_wes_dest_landfriede: "The Eternal Landfriede"
 nd_wes_dest_landfriede_desc: "The Landfrieden, the sworn peace of the realm, requires enforcement. Seize Frankfurt, seat of imperial coronations, and Brunswick in the east. Build an army capable of imposing order across the German lands."
 nd_wes_dest_reichsgericht: "The Imperial Tribunal"
 nd_wes_dest_reichsgericht_desc: "The Red Earth's justice will reach from the North Sea to the Alps. Take Magdeburg and Nuremberg, the great imperial cities, and establish a supreme tribunal to govern the German nation through law backed by force."
 nd_wes.4.t: "The Destiny of Westphalia"
 nd_wes.4.d: "Westphalia stands united, its people prosperous and its borders secure. But unity alone is not destiny. The world watches to see what Westphalia will become -- a beacon of sovereign equality that reshapes the international order, or a fortress of imperial justice that imposes law upon the chaos of competing states.\n\nOur path is chosen. Now we must walk it."
 nd_wes.4.a: "Our destiny awaits"
 nd_wes.5.t: "The Congress Convenes"
 nd_wes.5.d: "Amsterdam's great counting houses now answer to Westphalian authority. The merchant princes of the Rhine delta, the bankers who finance the wars of kings, all acknowledge our sovereignty. With this commercial power at our disposal, Westphalia can convene a congress of nations -- not as a neutral bystander, but as a power whose word carries the weight of gold.\n\nThe first congress of Westphalian diplomacy will set the precedent for a new kind of international order."
 nd_wes.5.a: "Let the nations take their seats"
 nd_wes.6.t: "The Red Earth Expands"
 nd_wes.6.d: "Cologne's great cathedral now stands within our jurisdiction. The Archbishop's ancient claims to supremacy over Westphalia are extinguished -- it is the Vehmic courts, not the episcopal see, that dispense justice in these lands. In Kassel, Hessian lords bend to Westphalian law.\n\nThe hooded judges of the Vehmgericht ride further than ever before. Where they go, order follows."
 nd_wes.6.a: "The Emperor's justice reaches far"
 nd_wes.7.t: "The Balance of Power"
 nd_wes.7.d: "From The Hague, Westphalia's diplomats orchestrate a delicate equilibrium among the powers of Europe. Our treasury is full, our lands developed, our institutions mature. The question now is how to use this position.\n\nShall we establish permanent courts of international arbitration, where disputes between sovereign states are settled by reason and law? Or shall we pursue armed neutrality, building a treasury that makes Westphalia indispensable to every belligerent while keeping our own armies at peace?"
 nd_wes.7.a: "Found courts of international arbitration"
 nd_wes.7.b: "Pursue a policy of profitable neutrality"
 nd_wes.8.t: "The Eternal Landfriede"
 nd_wes.8.d: "Frankfurt and Brunswick have submitted to Westphalian authority. The Landfrieden -- the sworn public peace of the Empire -- is no longer an aspiration but a reality enforced by Westphalian arms. Our army marches where the Vehmic courts decree, and no lord dares break the peace.\n\nBut enforcement requires a system. Shall we centralize authority in the Crown, ruling through iron decree? Or shall we organize the Imperial Circles into a collective defense, a militia of the realm that enforces order through common obligation?"
 nd_wes.8.a: "Rule through iron decree of the Crown"
 nd_wes.8.b: "Organize the Circles into a common militia"
 nd_wes.9.t: "Perpetual Peace"
 nd_wes.9.d: "Geneva lies within our reach. The scientific revolution has opened minds to reason. Westphalia stands at the apex of its diplomatic power, the very embodiment of the principle that bears its name: the sovereign equality of all states, great and small.\n\nThe Hall of Peace awaits its purpose. Will it become a shrine to universal human rights, where the dignity of every subject is recognized regardless of birth or confession? Or will it become the engine of a free trade order, where the commerce of nations flows without hindrance and wealth secures the peace that armies cannot?"
 nd_wes.9.a: "Proclaim the universal rights of all people"
 nd_wes.9.b: "Build a free trade order among sovereign nations"
 nd_wes.10.t: "The Imperial Tribunal"
 nd_wes.10.d: "Magdeburg and Nuremberg bow to Westphalian authority. From the North Sea to the heart of the Empire, the Red Earth's justice holds sway. No prince defies the tribunal, no bandit escapes the hooded judges, no rebellion goes unpunished.\n\nThe supreme court of the realm must now choose its character. Shall it serve as the instrument of imperial order, projecting military power to enforce the peace? Or shall it become a people's court, integrating the conquered territories through law and justice rather than garrison and sword?"
 nd_wes.10.a: "The tribunal serves the imperial order"
 nd_wes.10.b: "Let the court serve the people's justice"
 STATIC_MODIFIER_NAME_nd_wes_dest_arbitration: "Arbitration Court"
 STATIC_MODIFIER_DESC_nd_wes_dest_arbitration: "The Westphalian Court of Arbitration mediates disputes between sovereign states, resolving conflicts through legal reasoning rather than force. Its rulings carry moral authority across Europe."
 STATIC_MODIFIER_NAME_nd_wes_dest_neutrality: "Armed Neutrality"
 STATIC_MODIFIER_DESC_nd_wes_dest_neutrality: "Westphalia maintains a profitable neutrality, financing the wars of others while keeping its own armies at peace. Lower war exhaustion and cheaper loans offset the cost of maintaining readiness."
 STATIC_MODIFIER_NAME_nd_wes_dest_universal_rights: "Universal Rights"
 STATIC_MODIFIER_DESC_nd_wes_dest_universal_rights: "The Westphalian Declaration of Universal Rights recognizes the inherent dignity of every subject regardless of birth, confession, or nationality. Development flourishes under the new order, though the population grows complacent in its prosperity."
 STATIC_MODIFIER_NAME_nd_wes_dest_free_trade_order: "Free Trade Order"
 STATIC_MODIFIER_DESC_nd_wes_dest_free_trade_order: "The Westphalian Free Trade Order opens markets across sovereign borders, enriching all participants through unrestricted commerce. The military establishment shrinks as trade replaces conquest."
 STATIC_MODIFIER_NAME_nd_wes_dest_iron_law: "Iron Law"
 STATIC_MODIFIER_DESC_nd_wes_dest_iron_law: "The iron decree of the Westphalian Crown brooks no dissent. Centralized authority and a vigilant secret police ensure order throughout the realm, though the apparatus of control grows ever larger."
 STATIC_MODIFIER_NAME_nd_wes_dest_circle_militia: "Circle Militia"
 STATIC_MODIFIER_DESC_nd_wes_dest_circle_militia: "The Imperial Circles are organized into a collective defense force, with each territory contributing troops and supplies. Rapid recruitment and reliable logistics come at the cost of martial prestige."
 STATIC_MODIFIER_NAME_nd_wes_dest_imperial_order: "Imperial Order"
 STATIC_MODIFIER_DESC_nd_wes_dest_imperial_order: "The Westphalian Tribunal projects military power to enforce the imperial peace. Superior tactics and the right to wage just war make the realm's armies a fearsome instrument of order."
 STATIC_MODIFIER_NAME_nd_wes_dest_peoples_court: "People's Justice"
 STATIC_MODIFIER_DESC_nd_wes_dest_peoples_court: "The Westphalian People's Court integrates conquered territories through fair application of law rather than military occupation. Devastated lands recover faster under just governance, and foreign subjects embrace Westphalian rule."
 nd_wes_friedenssaal: "Friedenssaal"
 nd_wes_friedenssaal_desc: "The Hall of Peace, inspired by the chamber in Munster's Rathaus where the Peace of Westphalia was signed. A center for diplomatic mediation and international arbitration, where the principle of sovereign equality is given physical form in stone, glass, and parchment."
 nd_wes_pm_friedenssaal_maintenance: "Peace Hall Upkeep"
 nd_wes_pm_friedenssaal_maintenance_desc: "Maintaining the diplomatic archives, conference chambers, and ceremonial furnishings of the Friedenssaal."
 nd_wes_high_court: "Westphalian High Court"
 nd_wes_high_court_desc: "The supreme tribunal of Westphalian justice, heir to the ancient Vehmic tradition but operating on an imperial scale. Robed judges dispense the law of the realm from a fortified courthouse, backed by armed bailiffs and an extensive archive of legal precedents."
 nd_wes_pm_high_court_maintenance: "High Court Upkeep"
 nd_wes_pm_high_court_maintenance_desc: "Maintaining the judicial archives, courtrooms, and enforcement apparatus of the Westphalian High Court."
