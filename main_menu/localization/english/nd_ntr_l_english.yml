l_english:
 STATIC_MODIFIER_NAME_nd_mana_o_te_toa: "Mana o te Toa"
 STATIC_MODIFIER_DESC_nd_mana_o_te_toa: "The mana of warriors courses through the land. From the thundering haka to the flash of taiaha in battle, every iwi knows that strength and courage define who we are."
 STATIC_MODIFIER_NAME_nd_mana_o_te_moana: "Mana o te Moana"
 STATIC_MODIFIER_DESC_nd_mana_o_te_moana: "The ocean is our highway and our heritage. Our ancestors crossed the greatest sea on earth to reach these islands, and now the same navigational mastery guides our trade and exploration."
 STATIC_MODIFIER_NAME_nd_ahi_ka_musket: "Ahi Ka — The Musket's Fire"
 STATIC_MODIFIER_DESC_nd_ahi_ka_musket: "The thunder of the musket has changed warfare forever. Chiefs like Hongi Hika have shown that those who master the new weapons first can reshape the balance of power across all of Aotearoa."
 STATIC_MODIFIER_NAME_nd_ahi_ka_gunfighter_pa: "Ahi Ka — The Gunfighter Pa"
 STATIC_MODIFIER_DESC_nd_ahi_ka_gunfighter_pa: "Our pa have been rebuilt for a new kind of war. Zigzag trenches, double palisades, and underground bunkers turn every fortification into a death trap for attackers wielding muskets and cannon alike."
 STATIC_MODIFIER_NAME_nd_kotahitanga_militant: "Kotahitanga — Armed Resistance"
 STATIC_MODIFIER_DESC_nd_kotahitanga_militant: "Under the Maori King, the iwi have united not merely in council but in arms. The land will be defended by force, and no foreign power will take what is ours without a fight."
 STATIC_MODIFIER_NAME_nd_kotahitanga_diplomatic: "Kotahitanga — United Voice"
 STATIC_MODIFIER_DESC_nd_kotahitanga_diplomatic: "The Kingitanga speaks for all Maori with one voice. Through diplomacy and unity of purpose, we will secure our sovereignty and our lands through negotiation rather than bloodshed."
 nd_ntr.1.t: "Aotearoa United"
 nd_ntr.1.d: "The iwi of Aotearoa have come together under a single sovereignty. For centuries, the tribes of these islands have lived as independent nations — trading pounamu and obsidian, waging war over mana and resources, building great pa on every strategic hilltop. Now, the shared identity of the Maori people has crystallized into something greater than any single iwi could achieve alone.\n\nThe question before us is what kind of nation Aotearoa will become. Shall we draw upon the warrior traditions that have defined our people — the haka, the taiaha, the unbreakable will of the toa? Or shall we look to the ocean that brought our ancestors here, building upon the navigational mastery and cultural traditions that make us unique among the peoples of the world?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_ntr.1.a: "We are the children of Tu — strength through battle!"
 nd_ntr.1.b: "We are the children of Tangaroa — mastery of the sea!"
 nd_ntr.2.t: "The Musket Wars"
 nd_ntr.2.d: "The arrival of European firearms has transformed warfare in Aotearoa utterly. Chiefs who acquire muskets first hold devastating advantage over those who still fight with taiaha and mere. Hongi Hika of Ngapuhi demonstrated this when he returned from England in 1821 with hundreds of muskets, launching raids that reached from the Bay of Islands to the shores of Lake Rotorua.\n\nBut the Maori genius for adaptation runs deep. Within a generation, every major iwi has armed itself, and our engineers have redesigned the traditional pa to withstand the new weapons. The gunfighter pa — with its zigzag trenches, double palisades, and underground bunkers — may be the most sophisticated indigenous fortification system in the world.\n\nWill we embrace the offensive power of the musket, or master the defensive art of the new pa?"
 nd_ntr.2.a: "Arm every warrior — the musket changes everything."
 nd_ntr.2.b: "Fortify and endure — the pa will protect us."
 nd_ntr.3.t: "The Kingitanga"
 nd_ntr.3.d: "In the face of growing pressure on Maori lands and sovereignty, a movement has emerged to unite the iwi under a single monarch. At Pukawa, on the shores of Lake Taupo, the great chief Potatau Te Wherowhero has been nominated as the first Maori King. The Kingitanga — the King Movement — represents the most ambitious attempt at pan-tribal unity in Maori history.\n\nThe movement's supporters argue that only a united Maori nation can resist the loss of lands and the erosion of sovereignty. But the question of how to achieve this unity divides opinion. Some believe armed resistance is the only answer. Others argue that the Kingitanga's greatest power lies in presenting a united diplomatic front — speaking with one voice for all Maori."
 nd_ntr.3.a: "The King shall lead us in war if need be."
 nd_ntr.3.b: "The King shall speak for all Maori with one voice."
 nd_ntr.4.t: "Mastery of Pounamu"
 nd_ntr.4.d: "The greenstone of the South Island — pounamu — has become the most prized material in all of Aotearoa. Found only in the rivers and mountains of Te Wai Pounamu, this nephrite jade is harder than steel and takes a polish that gleams like the sea. Master carvers transform raw stone into mere clubs, hei-tiki pendants, and ceremonial adzes that embody the mana of their owners.\n\nAt least fifteen established trade routes now carry pounamu from the workshops of Ngai Tahu across both islands. A single mere pounamu — a short club of polished greenstone — may be worth more than all the food a hapu can grow in a season. The mastery of pounamu is not merely an art; it is an economy."
 nd_ntr.4.a: "Pounamu is the wealth of our nation."
 nd_ntr.5.t: "The Whare Wananga"
 nd_ntr.5.d: "The whare wananga — houses of higher learning — represent the pinnacle of Maori intellectual tradition. Within these sacred institutions, carefully selected students of chiefly lineage spend years memorizing vast bodies of knowledge: whakapapa genealogies stretching back to the arrival of the great canoes, karakia for every occasion, the movements of stars that guide ocean voyages, and the medicinal properties of every plant in the forest.\n\nThe tohunga who graduate from these schools are the living repositories of their people's accumulated wisdom. At places like Te Rawheoro in Tolaga Bay, knowledge passes from generation to generation through structured oral instruction that rivals the universities of Europe in its rigor and depth."
 nd_ntr.5.a: "Knowledge is the true taonga of our people."
 nd_ntr_pa_engineering: "Pa Engineering"
 nd_ntr_pa_engineering_desc: "The science of building fortified hilltop settlements — pa — with multiple defensive terraces, palisades, and fighting stages."
 nd_ntr_toa_warriors: "Toa Warriors"
 nd_ntr_toa_warriors_desc: "The warrior tradition of the toa, elite fighters trained in mau rakau martial arts and wielding taiaha, mere, and tewhatewha."
 nd_ntr_waka_taua_tradition: "Waka Taua Tradition"
 nd_ntr_waka_taua_tradition_desc: "The great war canoes that carry up to a hundred warriors, their carved prows and sternposts announcing the mana of their iwi."
 nd_ntr_wharenui_tradition: "Wharenui Tradition"
 nd_ntr_wharenui_tradition_desc: "The carved meeting houses that serve as centers of tribal governance, ceremony, and the preservation of whakapapa."
 nd_ntr_horticultural_mastery: "Horticultural Mastery"
 nd_ntr_horticultural_mastery_desc: "Advanced cultivation techniques for kumara and other crops, including the construction of stone-lined storage pits that preserve harvests through the winter."
 nd_ntr_mau_rakau: "Mau Rakau"
 nd_ntr_mau_rakau_desc: "The martial art of wielding traditional weapons — taiaha, tewhatewha, patu — with the balance, timing, and precision that can only come from years of training."
 nd_ntr_iwi_governance: "Iwi Governance"
 nd_ntr_iwi_governance_desc: "The sophisticated system of chiefly authority, where ariki and rangatira lead through a combination of inherited mana and personal achievement."
 nd_ntr_pounamu_mastery: "Pounamu Mastery"
 nd_ntr_pounamu_mastery_desc: "The art and economy of greenstone — carving nephrite jade into weapons, ornaments, and tools that serve as both symbols of mana and instruments of trade."
 nd_ntr_waka_hourua_voyaging: "Waka Hourua Voyaging"
 nd_ntr_waka_hourua_voyaging_desc: "The double-hulled ocean canoe capable of crossing vast stretches of open sea, guided by ancestral star navigation and knowledge of ocean currents."
 nd_ntr_whare_wananga: "Whare Wananga"
 nd_ntr_whare_wananga_desc: "The sacred schools of higher learning where tohunga master whakapapa, astronomy, medicine, and the ritual knowledge that holds Maori society together."
 nd_ntr_rahui_conservation: "Rahui Conservation"
 nd_ntr_rahui_conservation_desc: "The system of temporary resource bans — rahui — that allow depleted fishing grounds, forests, and gardens to recover, ensuring sustainable use of the land."
 nd_ntr_flax_weaving_tradition: "Harakeke Weaving"
 nd_ntr_flax_weaving_tradition_desc: "The art of weaving harakeke flax into cloaks, baskets, ropes, and sails — an industry that produces both everyday necessities and treasured ceremonial garments."
 nd_ntr_star_navigation: "Star Navigation"
 nd_ntr_star_navigation_desc: "The ancient Polynesian science of wayfinding by the stars, ocean swells, and the flight of birds — a navigational tradition that conquered the Pacific."
 nd_ntr_hapuu_alliances: "Hapu Alliances"
 nd_ntr_hapuu_alliances_desc: "The complex web of inter-tribal relationships, marriage alliances, and gift exchanges that bind hapu together in times of peace and war."
 nd_ntr_european_contact: "European Contact Trade"
 nd_ntr_european_contact_desc: "The arrival of European traders and whalers opens new markets for Maori agricultural produce, flax, and timber."
 nd_ntr_whalebone_artistry: "Whalebone Artistry"
 nd_ntr_whalebone_artistry_desc: "The transformation of whale bone into finely carved weapons, ornaments, and ritual objects — a tradition that elevates raw material into expressions of tribal identity."
 nd_ntr_potato_revolution: "Potato Revolution"
 nd_ntr_potato_revolution_desc: "The rapid adoption of the European potato transforms Maori agriculture. Easier to grow than kumara and producing far greater yields, the potato fuels a population boom and commercial surplus."
 nd_ntr_musket_trade: "Musket Trade"
 nd_ntr_musket_trade_desc: "The exchange of agricultural surplus, flax, and timber for European muskets — a trade that will reshape the balance of power between iwi."
 nd_ntr_tribal_mana: "Tribal Mana"
 nd_ntr_tribal_mana_desc: "The accumulated prestige and spiritual authority of the nation — the mana that comes from military victories, successful harvests, and the achievements of great chiefs."
 nd_ntr_inter_island_trade: "Inter-Island Trade"
 nd_ntr_inter_island_trade_desc: "Maori trading networks connecting the North and South Islands, carrying pounamu northward and agricultural surplus southward in waka and later European-style vessels."
 nd_ntr_pa_adaptation: "Pa Adaptation"
 nd_ntr_pa_adaptation_desc: "The first modifications to traditional pa design in response to new threats — deeper ditches, stronger palisades, and new approaches to defensive positioning."
 nd_ntr_musket_adaptation: "Musket Adaptation"
 nd_ntr_musket_adaptation_desc: "The full integration of firearms into Maori warfare, including modified muskets with enlarged touch holes for faster firing and the tactical use of volley fire from fortified positions."
 nd_ntr_gunfighter_pa: "Gunfighter Pa"
 nd_ntr_gunfighter_pa_desc: "The revolutionary redesign of the pa for firearms warfare — zigzag trenches, double palisades with flax padding, underground bunkers, and communication tunnels."
 nd_ntr_commercial_agriculture: "Commercial Agriculture"
 nd_ntr_commercial_agriculture_desc: "The rapid expansion of Maori farming to supply European settlements and visiting ships — within decades, iwi are producing tonnes of potatoes, wheat, and pork for export."
 nd_ntr_whalers_economy: "Whalers' Economy"
 nd_ntr_whalers_economy_desc: "Maori engagement with the shore whaling industry, providing labor, food, and coastal access in exchange for European goods and technology."
 nd_ntr_taua_warfare: "Taua Warfare"
 nd_ntr_taua_warfare_desc: "The organized war parties — taua — that combine traditional warrior discipline with musket firepower, striking with devastating speed across great distances."
 nd_ntr_he_whakaputanga_sovereignty: "He Whakaputanga Sovereignty"
 nd_ntr_he_whakaputanga_sovereignty_desc: "The Declaration of Independence of the United Tribes of New Zealand, signed in 1835, asserting Maori sovereignty and establishing a framework for self-governance."
 nd_ntr_trading_vessels: "Trading Vessels"
 nd_ntr_trading_vessels_desc: "Maori-owned and operated trading ships that carry agricultural produce between settlements and across the Tasman to Sydney — a maritime commercial fleet rivaling colonial efforts."
 nd_ntr_kingitanga: "Kingitanga"
 nd_ntr_kingitanga_desc: "The Maori King Movement — a pan-tribal institution uniting iwi under a single sovereign to resist land alienation and assert collective Maori governance."
 nd_ntr_modern_pa_warfare: "Modern Pa Warfare"
 nd_ntr_modern_pa_warfare_desc: "The sophisticated defensive systems of the New Zealand Wars, where pa like Ruapekapeka combine underground bunkers, enfilading trench lines, and tactical depth to defeat professional armies."
 nd_ntr_maori_commerce: "Maori Commerce"
 nd_ntr_maori_commerce_desc: "The flourishing of Maori commercial enterprise — flour mills, trading vessels, wheat exports — proving that indigenous economy can compete on equal terms with colonial commerce."
 nd_ntr_kotahitanga: "Kotahitanga"
 nd_ntr_kotahitanga_desc: "The unity movement that brings together Maori leaders in parliaments and councils to address shared concerns through collective action and mutual support."
 nd_ntr_cultural_renaissance: "Cultural Renaissance"
 nd_ntr_cultural_renaissance_desc: "A flowering of Maori arts, language, and identity — the determination to preserve and revitalize the traditions that define what it means to be Maori."
 nd_ntr_land_resistance: "Land Resistance"
 nd_ntr_land_resistance_desc: "The fierce defense of Maori lands against alienation — through legal challenge, passive resistance, and when necessary, armed opposition."
 nd_ntr_runanga_councils: "Runanga Councils"
 nd_ntr_runanga_councils_desc: "The tribal council system — runanga — that provides structured governance, dispute resolution, and collective decision-making across Maori society."
 a_nd_ntr_toa: "Toa Warriors"
 a_nd_ntr_toa_desc: "Elite Maori warriors trained in the martial art of mau rakau, wielding the taiaha staff and patu club with devastating skill. Their battle cry — the haka — strikes fear into any foe."
 a_nd_ntr_toa_levy: "Toa Levy"
 a_nd_ntr_toa_levy_desc: "Warriors of the iwi called to service, fighting with traditional weapons and the fierce determination that defines the Maori martial spirit."
 a_nd_ntr_pa_defenders: "Pa Defenders"
 a_nd_ntr_pa_defenders_desc: "Musket-armed warriors specializing in the defense of gunfighter pa — fighting from zigzag trenches and double palisades with deadly accuracy."
 n_nd_ntr_waka_taua: "Waka Taua"
 n_nd_ntr_waka_taua_desc: "Great war canoes carved from single logs, adorned with spiral carvings and feathered sternposts, carrying scores of toa warriors into battle."
 n_nd_ntr_waka_hourua: "Waka Hourua"
 n_nd_ntr_waka_hourua_desc: "Double-hulled ocean voyaging canoes capable of crossing vast stretches of open Pacific, guided by the ancient science of Polynesian star navigation."
 nd_ntr_pa: "Pa"
 nd_ntr_pa_desc: "A fortified hilltop settlement with multiple defensive terraces, wooden palisades, and fighting stages — the backbone of Maori territorial defense."
 nd_ntr_whare_wananga_building: "Whare Wananga"
 nd_ntr_whare_wananga_building_desc: "A sacred school of higher learning where tohunga preserve and transmit the accumulated knowledge of the Maori people across generations."
 nd_ntr_wharenui: "Wharenui"
 nd_ntr_wharenui_desc: "A carved meeting house adorned with intricate carvings that encode tribal genealogy and history, serving as the center of community governance and ceremony."
 nd_ntr_pounamu_workshop: "Pounamu Workshop"
 nd_ntr_pounamu_workshop_desc: "A workshop where master carvers transform raw greenstone into weapons, ornaments, and tools of extraordinary beauty and value."
 nd_ntr_rua_kumara: "Rua Kumara"
 nd_ntr_rua_kumara_desc: "Underground storage pits lined with gravel and bark that preserve kumara through the winter — a critical technology for food security in Aotearoa's climate."
 nd_ntr_pa_maintenance: "Pa Upkeep"
 nd_ntr_pa_maintenance_desc: "Timber for palisades and stone for foundations maintain the pa's defenses against weather and attack."
 nd_ntr_wananga_upkeep: "Wananga Upkeep"
 nd_ntr_wananga_upkeep_desc: "Timber for maintaining the sacred house of learning, and paper for recording the accumulated knowledge of the tohunga."
 nd_ntr_wharenui_maintenance: "Wharenui Upkeep"
 nd_ntr_wharenui_maintenance_desc: "Timber for the carved panels and structural posts, and stone for the foundations and surrounding pavement of the meeting house."
 nd_ntr_pounamu_processing: "Pounamu Processing"
 nd_ntr_pounamu_processing_desc: "Raw stone sourced from the rivers of Te Wai Pounamu, slowly ground and polished into finished greenstone taonga."
 nd_ntr_rua_maintenance: "Rua Kumara Upkeep"
 nd_ntr_rua_maintenance_desc: "Timber and bark linings replaced each season, and stone used to line the pit walls and maintain the drainage channels that keep the kumara harvest dry."
 nd_ntr_flax_weaving: "Harakeke Weaving"
 nd_ntr_flax_weaving_desc: "Traditional weaving of harakeke flax fiber, dyed and worked into cloaks, baskets, and cordage."
 nd_ntr_whalebone_carving: "Whalebone Carving"
 nd_ntr_whalebone_carving_desc: "Whale bone harvested from the shore is worked with specialized tools into weapons, ornaments, and ritual objects of great cultural significance."
 levy_nd_ntr_toa: "Toa Warrior Levy"
 levy_nd_ntr_toa_desc: "Warriors of the iwi answering the call to arms, bringing their taiaha and the fierce haka to the battlefield."
 a_nd_ntr_tupara: "Tupara Musketeers"
 a_nd_ntr_tupara_desc: "Maori warriors armed with tupara — double-barrelled shotguns loaded with musket balls, modified with enlarged touch holes for rapid firing in close combat."
 n_nd_ntr_trading_schooner: "Maori Trading Schooner"
 n_nd_ntr_trading_schooner_desc: "European-style sailing vessels owned and crewed by Maori, carrying agricultural surplus between settlements and across the Tasman Sea to Sydney."
 nd_ntr_musket_pa: "Musket Pa"
 nd_ntr_musket_pa_desc: "A fortification rebuilt for the age of firearms — double palisades with flax padding, zigzag trenches for musket fire, and reinforced gates to withstand assault."
 nd_ntr_musket_pa_maintenance: "Musket Pa Upkeep"
 nd_ntr_musket_pa_maintenance_desc: "Timber for palisades and weaponry for the garrison's musket stocks."
 nd_ntr_flour_mill: "Maori Flour Mill"
 nd_ntr_flour_mill_desc: "Water-powered mills grinding wheat into flour for export — a symbol of Maori commercial enterprise rivaling colonial industry."
 nd_ntr_milling_upkeep: "Milling Operations"
 nd_ntr_milling_upkeep_desc: "Wheat is ground into flour using water-powered millstones, producing a commercial grain surplus for export to European settlements."
 nd_ntr_waka_yard: "Waka Shipyard"
 nd_ntr_waka_yard_desc: "A shipbuilding yard where Maori craftsmen construct both traditional waka and European-style trading vessels."
 nd_ntr_shipyard_upkeep: "Shipyard Operations"
 nd_ntr_shipyard_upkeep_desc: "Timber and naval supplies to maintain the shipyard and outfit vessels."
 nd_ntr_runanga_house: "Runanga House"
 nd_ntr_runanga_house_desc: "A formal council house where tribal leaders gather to deliberate matters of governance, justice, and collective action."
 nd_ntr_runanga_upkeep: "Runanga Upkeep"
 nd_ntr_runanga_upkeep_desc: "Timber for maintaining the council house, and cloth for the ceremonial furnishings and garments required for formal deliberations."
 nd_ntr_kotahitanga_hall: "Kotahitanga Hall"
 nd_ntr_kotahitanga_hall_desc: "A pan-tribal assembly hall where Maori leaders from across the motu gather to discuss matters affecting all iwi — the physical embodiment of unity."
 nd_ntr_kotahitanga_upkeep: "Kotahitanga Hall Upkeep"
 nd_ntr_kotahitanga_upkeep_desc: "Timber for maintaining the assembly hall, and paper for the petitions, declarations, and records of the pan-tribal parliament."
 nd_ntr_tupara_musketeers: "Tupara Musketeers"
 nd_ntr_tupara_musketeers_desc: "The adoption of the double-barrelled shotgun — tupara — by Maori warriors, who modify the weapons for faster firing and adapt their tactics accordingly."
 nd_ntr_provisioning_trade: "Provisioning Trade"
 nd_ntr_provisioning_trade_desc: "The supply of food and livestock to visiting European ships — an early and lucrative form of Maori commercial enterprise."
 nd_ntr_formed_tt: "Aotearoa has been formed"
 nd_ntr_path_a_tt: "Chose Mana o te Toa"
 nd_ntr_path_b_tt: "Chose Mana o te Moana"
 nd_ntr_destiny: "Destiny of Aotearoa"
 nd_ntr_destiny_desc: "With the iwi united under a single sovereignty, Aotearoa stands at a crossroads. The path chosen at formation now opens into a grand national destiny. Stability and purpose will guide the way forward."
 nd_ntr_dest_tu: "Te Ara o Tu"
 nd_ntr_dest_tu_desc: "Claim dominion over Tamaki Makaurau and project power beyond the horizon to the island of Niue. An army worthy of Tu, the god of war, must stand ready to enforce this sovereignty."
 nd_ntr_dest_taua: "Pacific Taua"
 nd_ntr_dest_taua_desc: "The war parties of Aotearoa sail beyond the horizon. Tongatapu of Tonga and the great islands of Fiji must fall under our mana. The wealth of conquest funds the next campaign."
 nd_ntr_dest_whenua: "Mana Whenua"
 nd_ntr_dest_whenua_desc: "The great southern land beckons. Plant the taiaha on the shores of Botany Bay and claim the lands of the Dharug people. Only the mightiest nation, rich in gold and steeped in prestige, can accomplish this."
 nd_ntr_dest_tangaroa: "Te Ara o Tangaroa"
 nd_ntr_dest_tangaroa_desc: "The bounty of Tangaroa flows through our markets. Build a fishing and trading economy worthy of the ocean god, accumulating wealth and maintaining the stability needed for long voyages."
 nd_ntr_dest_hokinga: "Te Hokinga Wairua"
 nd_ntr_dest_hokinga_desc: "The spirit of the great voyaging ancestors returns. Embrace modern banking and develop the land until Aotearoa's wealth matches its ambition. A nation of traders, scholars, and mariners."
 nd_ntr_dest_moana: "Te Mana o te Moana"
 nd_ntr_dest_moana_desc: "Become the undisputed masters of the Pacific. Embrace the scientific revolution, accumulate vast wealth, and develop the islands until Aotearoa stands among the great maritime powers of the world."
 nd_ntr.6.t: "The Destiny of Aotearoa"
 nd_ntr.6.d: "The islands are united, the iwi speak as one. Now a greater question presents itself: what shall Aotearoa become? The ancestors who crossed the Pacific in nothing but waka hourua could not have imagined the nation that has risen from their landing places. But they would recognize the ambition, the drive to push beyond every horizon, that burns in the hearts of their descendants.\n\nOur destiny awaits."
 nd_ntr.6.a: "Ka tu tatou — we shall rise!"
 nd_ntr.7.t: "Consolidation of the Islands"
 nd_ntr.7.d: "Tamaki Makaurau — the city of a hundred lovers, the isthmus between two harbors — serves as our base of power. And beyond the horizon, the island of Niue has fallen under the mana of our warriors, the first conquest beyond Aotearoa's home waters.\n\nWith this foothold in the wider Pacific, our toa look further outward. The ocean stretches before us, studded with island kingdoms that could fall under the sovereignty of a truly ambitious nation."
 nd_ntr.7.a: "The islands are ours — now we look beyond."
 nd_ntr.8.t: "The Pacific Taua"
 nd_ntr.8.d: "Our war canoes have crossed open ocean to bring the mana of Aotearoa to distant shores. The kingdoms of Tonga and the chiefdoms of Fiji have been brought under our sovereignty — the first time a Polynesian power has projected force so far beyond its home waters.\n\nThe veterans of these campaigns return with new knowledge and confidence. Some argue for honing our offensive capabilities to press even further. Others believe the priority should be consolidating control over these vast new territories, binding the conquered peoples to our cause through integration and shared purpose."
 nd_ntr.8.a: "Sharpen the taiaha for the next campaign."
 nd_ntr.8.b: "Bind these peoples to our mana."
 nd_ntr.9.t: "Mana Whenua — The Great Southern Land"
 nd_ntr.9.d: "The impossible has been achieved. The warriors of Aotearoa have crossed the Tasman and planted their standard on the shores of the great southern continent. The lands around Botany Bay — vast, fertile, and rich in resources — now answer to a Maori sovereign.\n\nThis is the apex of Aotearoa's martial destiny, a conquest that dwarfs anything the ancestors could have imagined. But holding such territory demands a choice: do we pursue total military dominance, reinforcing our armies at the expense of all else? Or do we settle these new lands, assimilating the local peoples and building a civilization that can endure?"
 nd_ntr.9.a: "Total dominance — reinforce and conquer."
 nd_ntr.9.b: "Settle and build — this land is ours now."
 nd_ntr.10.t: "The Ocean Road"
 nd_ntr.10.d: "The markets of Aotearoa overflow with the bounty of Tangaroa. Fish from every coast, pounamu from the rivers of Te Wai Pounamu, and the products of a thriving maritime economy fill our trading vessels. The ancestors who navigated by the stars to reach these islands would approve — we have turned the ocean from a barrier into a highway.\n\nOur merchants range further with each passing year, establishing trade connections that bring wealth and knowledge flooding into our harbors."
 nd_ntr.10.a: "The ocean provides — we shall follow its currents."
 nd_ntr.11.t: "Te Hokinga Wairua — The Great Voyaging"
 nd_ntr.11.d: "The spirit of the great voyaging ancestors has returned in a new form. Where they crossed the Pacific with stars and courage, we now build trade networks and institutions that span the ocean. Banking houses in our ports finance ventures to distant markets. Our development rivals that of far larger nations.\n\nSome see this as the foundation for a true trade empire — our merchants should dominate every market in the Pacific, building grand cities that attract the wealth of the world. Others argue for a different kind of wealth: the exchange of knowledge and culture that comes from welcoming the world to our shores."
 nd_ntr.11.a: "Build the greatest trade empire in the Pacific."
 nd_ntr.11.b: "Welcome the world to our wharenui."
 nd_ntr.12.t: "Te Mana o te Moana — Lords of the Pacific"
 nd_ntr.12.d: "Aotearoa has achieved what no Polynesian nation has ever accomplished: a scientific and economic transformation that places it among the great powers of the world. Our fleets patrol waters from New Zealand to the equator. Our scholars and tohunga have embraced the scientific revolution without abandoning the wisdom of the ancestors.\n\nThis is the pinnacle of the maritime destiny. But even now, there are those who debate how best to wield this power. Shall we build an invincible navy to enforce our will across the Pacific? Or shall we become a nation of knowledge and diplomacy — respected and courted by all, feared by none, but underestimated at the world's peril?"
 nd_ntr.12.a: "Our warships shall rule these waters."
 nd_ntr.12.b: "Knowledge is the truest form of mana."
 STATIC_MODIFIER_NAME_nd_ntr_dest_toa_strike: "Te Patu — The Strike"
 STATIC_MODIFIER_DESC_nd_ntr_dest_toa_strike: "The warriors of Aotearoa have perfected the art of the decisive strike — swift, overwhelming, and unstoppable. Our campaigns begin before the enemy even knows we are coming."
 STATIC_MODIFIER_NAME_nd_ntr_dest_toa_mana: "Te Mana Motuhake — Sovereign Authority"
 STATIC_MODIFIER_DESC_nd_ntr_dest_toa_mana: "The conquered peoples recognize the mana of Aotearoa. Through integration and shared purpose, the new territories are bound to the crown — though the rapid expansion strains the treasury."
 STATIC_MODIFIER_NAME_nd_ntr_dest_whenua_war: "Te Pakanga Nui — The Great War"
 STATIC_MODIFIER_DESC_nd_ntr_dest_whenua_war: "Total war mobilization sustains the conquest of the southern continent. Every resource is directed to reinforcing armies and maintaining the campaign — at the cost of diplomatic relationships."
 STATIC_MODIFIER_NAME_nd_ntr_dest_whenua_settle: "Te Nohoanga — The Settlement"
 STATIC_MODIFIER_DESC_nd_ntr_dest_whenua_settle: "The settlers follow the warriors, planting kumara and building pa on the shores of a new land. Control is established through occupation and assimilation, though the cost of construction in these distant lands runs high."
 STATIC_MODIFIER_NAME_nd_ntr_dest_hokinga_trade: "Te Hokohoko Nui — The Great Trade"
 STATIC_MODIFIER_DESC_nd_ntr_dest_hokinga_trade: "Aotearoa's merchants dominate the Pacific trade routes. Our cities grow into grand entrepots that attract traders from across the ocean, their wealth sustaining the prestige of the nation."
 STATIC_MODIFIER_NAME_nd_ntr_dest_hokinga_whanau: "Te Whanaungatanga — The Kinship"
 STATIC_MODIFIER_DESC_nd_ntr_dest_hokinga_whanau: "The principle of whanaungatanga — kinship and connection — extends beyond the iwi to embrace the wider world. Visitors and traders are welcomed, knowledge is exchanged, and Aotearoa prospers through openness."
 STATIC_MODIFIER_NAME_nd_ntr_dest_moana_thalasso: "Te Tino Rangatiratanga o te Moana"
 STATIC_MODIFIER_DESC_nd_ntr_dest_moana_thalasso: "Absolute sovereignty over the ocean. Aotearoa's warships patrol the Pacific from horizon to horizon, enforcing trade routes and projecting power that demands the world's recognition."
 STATIC_MODIFIER_NAME_nd_ntr_dest_moana_matau: "Te Matauranga — The Knowledge"
 STATIC_MODIFIER_DESC_nd_ntr_dest_moana_matau: "The greatest treasure is knowledge. Aotearoa's scholars, diplomats, and spies weave a web of influence that extends far beyond what any fleet could achieve, securing the nation's interests through wisdom."
 nd_ntr_whare_toa: "Te Whare Toa"
 nd_ntr_whare_toa_desc: "A great warrior training hall where the martial traditions of Aotearoa — from the ancient art of mau rakau to modern combined arms warfare — are passed from generation to generation."
 nd_ntr_whare_toa_upkeep: "Warrior Hall Upkeep"
 nd_ntr_whare_toa_upkeep_desc: "Weapons, timber for the training grounds, and stone for the fortified walls of the warrior hall."
 nd_ntr_whare_taonga: "Te Whare Taonga"
 nd_ntr_whare_taonga_desc: "A great treasure house and trading emporium on the coast, where the wealth of the Pacific flows through Maori hands — pounamu, silk, spices, and the products of a dozen island nations."
 nd_ntr_whare_taonga_upkeep: "Treasure House Upkeep"
 nd_ntr_whare_taonga_upkeep_desc: "Timber for the warehouse structure, cloth for packaging and display, and tools for the weighing and measuring of trade goods."
