l_english:
 STATIC_MODIFIER_NAME_nd_fkn_princes_faith: "The Princes' Faith"
 STATIC_MODIFIER_DESC_nd_fkn_princes_faith: "The prince-bishops of Franconia wield both crosier and sword, governing their domains as temporal lords no less than spiritual shepherds. Under their guidance, the faith binds the scattered territories into a single purpose."
 STATIC_MODIFIER_NAME_nd_fkn_craftsmens_spirit: "The Craftsmen's Spirit"
 STATIC_MODIFIER_DESC_nd_fkn_craftsmens_spirit: "Nuremberg's master craftsmen answer not to guild halls but to the city council itself. This system of regulated innovation, where skill is rewarded and competition is fierce, has made the city's workshops the envy of Europe."
 nd_fkn.1.t: "The Franconian Circle"
 nd_fkn.1.d: "The disparate territories of Franconia -- prince-bishoprics, margraviates, free cities, and knightly domains -- have at last been drawn together under a single banner. But which tradition shall define this union?\n\nThe prince-bishops of Wurzburg and Bamberg offer the model of ecclesiastical authority, where spiritual conviction provides the foundation for temporal governance. Their cathedrals and residences anchor the region in faith and learning.\n\nAlternatively, Nuremberg's master craftsmen represent a different path. Unburdened by guild restrictions, the city's workshops produce metalwork, clocks, and printed works that are the finest in the Empire. Their inventive spirit could transform Franconia into a center of innovation.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_fkn.1.a: "The bishops shall lead our people in faith and governance"
 nd_fkn.1.b: "Let Nuremberg's workshops light the way forward"
 nd_fkn.2.t: "The Founding of the Franconian Circle"
 nd_fkn.2.d: "On 2 July 1500, the Imperial Diet at Augsburg established the Franconian Circle as one of the six original administrative districts of the Empire. This institution gives the patchwork of Franconian territories a collective voice -- a Kreistag where prince-bishops, margraves, free cities, and imperial knights may coordinate defense, regulate coinage, and preserve the Landfrieden.\n\nThe Circle's strength lies in cooperation among its diverse members. But some see an opportunity to assert Franconian independence within the Empire's framework, building military capacity that serves our interests first."
 nd_fkn.2.a: "Cooperation strengthens us all"
 nd_fkn.2.b: "We must look to our own strength"
 nd_fkn.3.t: "The Peasants' War in Franconia"
 nd_fkn.3.d: "The spring of 1525 has brought revolution to Franconia. Peasant bands under leaders like Florian Geyer and his fearsome Black Troop have swept through the Tauber valley, storming castles and demanding rights long denied. The greatest peasant army in all Germany has assembled before Wurzburg, threatening the very seat of episcopal power.\n\nThe rebellion will be crushed -- of that there is little doubt. But the memory of Geyer's Black Troop and the Twelve Articles will linger. We must decide how to rebuild: with concessions that address legitimate grievances, or with the iron hand of noble authority reasserted."
 nd_fkn.3.a: "Address the root causes of discontent"
 nd_fkn.3.b: "Restore order with an iron hand"
 nd_fkn.4.t: "The Cathedrals of Franconia"
 nd_fkn.4.d: "The great cathedrals of Bamberg and Wurzburg stand as monuments to centuries of Franconian devotion. The Bamberg Cathedral, founded by the sainted Emperor Henry II in 1007, houses the enigmatic Bamberger Reiter -- the first monumental equestrian sculpture since antiquity, a crowned horseman whose true identity remains a mystery.\n\nIn Wurzburg, the Romanesque cathedral dedicated to St. Kilian anchors the spiritual life of Lower Franconia. Together, these houses of God are not merely places of worship but seats of learning, repositories of art, and symbols of the intertwined spiritual and temporal authority that defines Franconian governance."
 nd_fkn.4.a: "Their spires shall endure as long as Franconia itself"
 STATIC_MODIFIER_NAME_nd_fkn_circle_cooperation: "Circle Cooperation"
 STATIC_MODIFIER_DESC_nd_fkn_circle_cooperation: "The Franconian Circle functions as a model of imperial cooperation, its Kreistag bringing together diverse estates to maintain peace and coordinate defense."
 STATIC_MODIFIER_NAME_nd_fkn_circle_independence: "Circle Self-Reliance"
 STATIC_MODIFIER_DESC_nd_fkn_circle_independence: "Rather than depend on imperial structures, Franconia builds its own military capacity, ensuring that the Circle can defend itself on its own terms."
 STATIC_MODIFIER_NAME_nd_fkn_peasant_concessions: "Peasant Concessions"
 STATIC_MODIFIER_DESC_nd_fkn_peasant_concessions: "In the aftermath of the Peasants' War, measured reforms address some of the grievances that drove men like Florian Geyer to rebellion."
 STATIC_MODIFIER_NAME_nd_fkn_peasant_suppression: "Restored Authority"
 STATIC_MODIFIER_DESC_nd_fkn_peasant_suppression: "The nobility reasserts its prerogatives with force, ensuring that the disorder of 1525 shall never be repeated."
 nd_fkn_stem_duchy_heritage: "Stem Duchy Heritage"
 nd_fkn_stem_duchy_heritage_desc: "Franconia was the homeland of the Salian dynasty, whose kings and emperors ruled the Empire from this heartland of East Francia."
 nd_fkn_ritterschaft: "The Ritterschaft"
 nd_fkn_ritterschaft_desc: "The Imperial Knights of Franconia form a distinct martial class, owing allegiance directly to the Emperor rather than to any territorial prince."
 nd_fkn_main_river_viticulture: "Main River Viticulture"
 nd_fkn_main_river_viticulture_desc: "The slopes along the Main River support Europe's largest medieval wine region, with over 40,000 hectares under cultivation by the 14th century."
 nd_fkn_cathedral_foundations: "Cathedral Foundations"
 nd_fkn_cathedral_foundations_desc: "The cathedrals of Bamberg and Wurzburg anchor Franconia's spiritual identity, serving as centers of learning, art, and ecclesiastical authority."
 nd_fkn_nuremberg_metalcraft: "Nuremberg Metalcraft"
 nd_fkn_nuremberg_metalcraft_desc: "Nuremberg's master craftsmen produce metalwork of unrivaled precision -- from church bells and armor to scissors, jewelry, and nails -- all under the city council's watchful eye."
 nd_fkn_episcopal_governance: "Episcopal Governance"
 nd_fkn_episcopal_governance_desc: "The prince-bishops of Franconia wield both spiritual and temporal authority, governing their territories as ecclesiastical princes of the Empire."
 nd_fkn_bamberg_flowering: "Bamberg Cultural Flowering"
 nd_fkn_bamberg_flowering_desc: "Bamberg's cultural renaissance, from the enigmatic Horseman sculpture to the patronage of arts and learning, elevates Franconia's reputation across Christendom."
 nd_fkn_imperial_city_charters: "Imperial City Charters"
 nd_fkn_imperial_city_charters_desc: "Nuremberg, Rothenburg, and Schweinfurt hold charters as free imperial cities, answering only to the Emperor and governing their own trade and justice."
 nd_fkn_nuremberg_printing: "Nuremberg Printing"
 nd_fkn_nuremberg_printing_desc: "The Koberger workshop in Nuremberg produces the Nuremberg Chronicle and other masterworks, making the city a center of the European printing revolution."
 nd_fkn_circle_administration: "Circle Administration"
 nd_fkn_circle_administration_desc: "The Franconian Kreistag coordinates defense, coinage, and peacekeeping across the Circle's diverse territories of bishops, margraves, and free cities."
 nd_fkn_peasant_war_legacy: "Peasant War Legacy"
 nd_fkn_peasant_war_legacy_desc: "The devastating Peasants' War of 1525 and Florian Geyer's Black Troop left lasting lessons about the strength and fury of Franconia's common people."
 nd_fkn_cannon_foundries: "Cannon Foundries"
 nd_fkn_cannon_foundries_desc: "Nuremberg's metalworking expertise extends naturally to arms production, with foundries casting cannons and forging weaponry for the Empire's armies."
 nd_fkn_confessional_frontier: "Confessional Frontier"
 nd_fkn_confessional_frontier_desc: "Franconia sits on the fault line between Catholic and Protestant territories, forcing its rulers to navigate confessional tensions with pragmatism."
 nd_fkn_kreisarmee_reforms: "Kreisarmee Reforms"
 nd_fkn_kreisarmee_reforms_desc: "The Circle's military forces are professionalized into a proper Kreisarmee, drawing disciplined soldiers from the cities and trained levies from the countryside."
 nd_fkn_nuremberg_clockworks: "Nuremberg Clockworks"
 nd_fkn_nuremberg_clockworks_desc: "Peter Henlein's portable spring-driven clocks, the 'Nuremberg Eggs,' represent the pinnacle of precision engineering and make the city famous across Europe."
 nd_fkn_landfrieden_enforcement: "Landfrieden Enforcement"
 nd_fkn_landfrieden_enforcement_desc: "The Circle takes responsibility for maintaining the Imperial Peace within its borders, suppressing feuds and highway robbery to secure trade routes."
 nd_fkn_franconian_baroque: "Franconian Baroque"
 nd_fkn_franconian_baroque_desc: "Balthasar Neumann's masterful Wurzburg Residenz and the region's baroque churches represent a flowering of Franconian artistic achievement."
 nd_fkn_standing_kreiskompanie: "Standing Kreiskompanie"
 nd_fkn_standing_kreiskompanie_desc: "Permanent garrison forces maintain order and defend the Circle's borders, equipped with artillery from Franconia's renowned foundries."
 nd_fkn_commercial_code: "Commercial Code"
 nd_fkn_commercial_code_desc: "A unified code of commercial law regulates trade across Franconia's fragmented patchwork of territories, reducing friction and encouraging mercantile activity."
 nd_fkn_episcopal_scholarship: "Episcopal Scholarship"
 nd_fkn_episcopal_scholarship_desc: "The University of Wurzburg and Bamberg's learned traditions produce scholars and administrators who serve both church and state."
 nd_fkn_civic_enlightenment: "Civic Enlightenment"
 nd_fkn_civic_enlightenment_desc: "Franconia's urban tradition of civic self-governance provides fertile ground for Enlightenment ideals of reason, education, and constitutional reform."
 nd_fkn_industrial_modernization: "Industrial Modernization"
 nd_fkn_industrial_modernization_desc: "The centuries-old crafts tradition transforms into modern manufacturing as Franconian workshops adopt industrial methods and new materials."
 nd_fkn_national_integration: "National Integration"
 nd_fkn_national_integration_desc: "The bewildering patchwork of Franconian territories -- bishoprics, margraviates, free cities, and knightly domains -- begins to coalesce into a unified whole."
 nd_fkn_constitutional_reforms: "Constitutional Reforms"
 nd_fkn_constitutional_reforms_desc: "Liberal governance replaces the old regime of princely absolutism and clerical authority, bringing representative institutions to Franconia."
 a_nd_fkn_ritter: "Franconian Ritter"
 a_nd_fkn_ritter_desc: "Heavy cavalry of the Imperial Knights, drawn from the Franconian Ritterschaft and owing allegiance directly to the Emperor."
 a_nd_fkn_stadtsoldat: "Nuremberg Stadtsoldat"
 a_nd_fkn_stadtsoldat_desc: "Disciplined city soldiers raised from the burghers and garrison of Nuremberg, trained under the city council's military system."
 a_nd_fkn_feldbatterie: "Franconian Feldbatterie"
 a_nd_fkn_feldbatterie_desc: "Field artillery batteries cast in Nuremberg's renowned foundries, combining superior Franconian metalwork with the latest gunnery techniques."
 levy_nd_fkn_ritter: "Franconian Ritter Levy"
 levy_nd_fkn_ritter_desc: "Noble cavalry raised from the Franconian Ritterschaft, the imperial knights who owe direct allegiance to the Emperor."
 levy_nd_fkn_stadtsoldat: "Nuremberg Stadtsoldat Levy"
 levy_nd_fkn_stadtsoldat_desc: "City militia drawn from the burghers and professional soldiers of Nuremberg and other free imperial cities."
 nd_fkn_meisterhaus: "Meisterhaus"
 nd_fkn_meisterhaus_desc: "A Nuremberg master craftsman's workshop where skilled artisans produce metalwork, tools, and precision instruments under the city council's regulated system."
 nd_fkn_residenz: "Prince-Bishop's Residenz"
 nd_fkn_residenz_desc: "The seat of episcopal governance, where the prince-bishop exercises both spiritual authority and temporal lordship over his territories."
 nd_fkn_weinberghaus: "Weinberghaus"
 nd_fkn_weinberghaus_desc: "A Franconian wine estate on the sun-facing slopes of the Main valley, producing the distinctive wines that once made this Europe's largest viticultural region."
 nd_fkn_druckerei: "Druckerei"
 nd_fkn_druckerei_desc: "A Nuremberg printing house where master printers produce books, pamphlets, and broadsheets that spread knowledge and reform across the Empire."
 nd_fkn_pm_metalworking: "Nuremberg Metalworking"
 nd_fkn_pm_metalworking_desc: "Master craftsmen forge tools, instruments, and hardware using Franconian iron and copper."
 nd_fkn_pm_arms_production: "Arms Production"
 nd_fkn_pm_arms_production_desc: "The workshop shifts to military production, forging swords, armor, and cannon barrels for the Circle's armies."
 nd_fkn_pm_clockworks: "Precision Clockworks"
 nd_fkn_pm_clockworks_desc: "Following Peter Henlein's innovations, the workshop produces spring-driven timepieces and precision instruments."
 nd_fkn_pm_industrial_tooling: "Industrial Tooling"
 nd_fkn_pm_industrial_tooling_desc: "Modern methods transform traditional metalworking into industrial steel production."
 nd_fkn_pm_meisterhaus_maintenance: "Workshop Upkeep"
 nd_fkn_pm_meisterhaus_maintenance_desc: "Ongoing costs of maintaining forge equipment, tools, and workshop facilities."
 nd_fkn_pm_landfrieden_patrol: "Landfrieden Patrol"
 nd_fkn_pm_landfrieden_patrol_desc: "Armed patrols enforce the Imperial Peace throughout the Circle, suppressing banditry and feuding along the trade routes."
 nd_fkn_pm_baroque_patronage: "Baroque Patronage"
 nd_fkn_pm_baroque_patronage_desc: "Lavish investment in baroque art and architecture transforms the Residenz into a monument of Franconian cultural achievement."
 nd_fkn_pm_residenz_maintenance: "Residenz Upkeep"
 nd_fkn_pm_residenz_maintenance_desc: "Maintaining the prince-bishop's seat of governance requires stone, glass, and administrative supplies."
 nd_fkn_pm_wine_production: "Franconian Wine"
 nd_fkn_pm_wine_production_desc: "The Main valley's distinctive wines are bottled and sold, continuing a viticultural tradition dating to Charlemagne's era."
 nd_fkn_pm_weinberghaus_maintenance: "Vineyard Upkeep"
 nd_fkn_pm_weinberghaus_maintenance_desc: "Tending the vineyards and maintaining wine cellars and pressing equipment."
 nd_fkn_pm_printing: "Nuremberg Printing"
 nd_fkn_pm_printing_desc: "Master printers produce books and pamphlets, continuing the tradition of the Koberger workshop."
 nd_fkn_pm_druckerei_maintenance: "Press Upkeep"
 nd_fkn_pm_druckerei_maintenance_desc: "Maintaining the printing presses, type sets, and workshop facilities."
 potential: "Potential"
 potential_desc: "Conditions required for this production method."
 nd_fkn_formed_tt: "Franconia has been formed"
 nd_fkn_path_a_tt: "The Princes' Faith path has been chosen"
 nd_fkn_path_b_tt: "The Craftsmen's Spirit path has been chosen"
 nd_fkn.5.t: "Franconia's Destiny"
 nd_fkn.5.d: "The Franconian Circle stands united at last, its disparate territories joined under a single vision. Whether guided by the crosier or the craftsman's hammer, the choices we make now will shape our path through the ages to come."
 nd_fkn.5.a: "Our destiny awaits"
 nd_fkn.6.t: "Archiepiscopal Authority"
 nd_fkn.6.d: "Mainz has fallen under our control -- the seat of the Primate of Germany, the premier archbishopric of the Holy Roman Empire. Together with the ancient monastery of Fulda, these ecclesiastical foundations place Franconia at the spiritual heart of Christendom north of the Alps. The prince-bishops now speak with a voice that commands respect across the Empire."
 nd_fkn.6.a: "The Church guides our realm"
 nd_fkn.7.t: "See of the Primate"
 nd_fkn.7.d: "The three Rhenish archbishoprics -- Mainz, Cologne, and Trier -- the prince-electors who crown emperors and shape the fate of the Empire -- all now acknowledge Franconian authority. This concentration of ecclesiastical power is unprecedented since the days of Charlemagne himself.\n\nWe may use this authority to bind the Rhineland's diverse peoples into a centralized whole, or we may invest in the episcopal courts themselves, making them centers of learning and conversion that transform culture from within."
 nd_fkn.7.a: "Unite the Rhineland under one authority"
 nd_fkn.7.b: "Invest in our episcopal courts and schools"
 nd_fkn.8.t: "Defender of the Faith"
 nd_fkn.8.d: "From Aachen, where Charlemagne was crowned, to Salzburg, where Boniface planted the cross among the pagans, the great archbishoprics of the German lands all stand under Franconian stewardship. No realm in Christendom commands such a concentration of spiritual authority.\n\nThis power invites a choice: shall Franconia serve as the sword of the faith, a Catholic champion ready to defend the Church against all threats? Or shall we follow the path of the Landfrieden -- using our authority to impose peace and stability across the fractured landscape of the Empire?"
 nd_fkn.8.a: "We shall be the sword of the faith"
 nd_fkn.8.b: "We shall be the guarantors of peace"
 nd_fkn.9.t: "Imperial Free Commerce"
 nd_fkn.9.d: "Frankfurt's great trade fairs now operate under the Franconian banner. The city where emperors are crowned and merchants from across Europe gather to exchange goods stands as proof that Franconian craftsmanship and commercial acumen can match any rival. With banking institutions taking root in our cities, the future belongs to those who master the flow of capital."
 nd_fkn.9.a: "Let commerce flourish under our watch"
 nd_fkn.10.t: "Workshop of the Empire"
 nd_fkn.10.d: "Franconia's workshops have become the engine of the Empire's economy. From Nuremberg's precision instruments to the trade goods flowing through our markets, our craftsmen set the standard that others strive to match. The tools made in our cities build the buildings, forge the weapons, and drive the machinery of progress across Central Europe.\n\nWe may deepen our mastery of craftsmanship itself, investing in the Meister tradition that ensures quality above all else, or we may leverage our position to secure trade fair privileges that draw commerce from across the continent."
 nd_fkn.10.a: "Invest in our masters and their craft"
 nd_fkn.10.b: "Secure trade fair privileges for our cities"
 nd_fkn.11.t: "The Industrious Revolution"
 nd_fkn.11.d: "The transformation is complete. From medieval workshop to modern manufactory, Franconia has led the way in the industrious revolution that remakes the old order. Augsburg's banking houses and Leipzig's trade fairs now orbit around Franconian enterprise, and the hum of machinery has replaced the ring of the blacksmith's hammer.\n\nThis new power demands a new order. Shall we embrace the factory and the furnace, driving forward with industrial ambition regardless of the old ways it displaces? Or shall we channel our commercial strength into building a new kind of civic society, where merchants and craftsmen govern themselves in the spirit of the free imperial cities?"
 nd_fkn.11.a: "The factory is the future"
 nd_fkn.11.b: "Let the merchant spirit govern our republic"
 nd_fkn_destiny: "Franconia's Destiny"
 nd_fkn_destiny_desc: "The Franconian Circle has been forged. Now its destiny must be fulfilled -- whether through the authority of the crosier or the ingenuity of the workshop."
 nd_fkn_dest_archbishopric: "Archiepiscopal Authority"
 nd_fkn_dest_archbishopric_desc: "Secure the great archbishopric of Mainz and the monastery of Fulda, placing Franconia at the spiritual heart of the Empire."
 nd_fkn_dest_primate: "See of the Primate"
 nd_fkn_dest_primate_desc: "Bring the three Rhenish archbishoprics -- Mainz, Cologne, and Trier -- under Franconian authority, commanding the prince-electors who crown emperors."
 nd_fkn_dest_defender: "Defender of the Faith"
 nd_fkn_dest_defender_desc: "Control the four great German archbishoprics from Aachen to Salzburg, establishing Franconia as the paramount spiritual authority in Christendom."
 nd_fkn_dest_free_commerce: "Imperial Free Commerce"
 nd_fkn_dest_free_commerce_desc: "Secure Frankfurt's great trade fairs and embrace modern banking, transforming Franconia into the commercial heart of the Empire."
 nd_fkn_dest_workshop: "Workshop of the Empire"
 nd_fkn_dest_workshop_desc: "Build Franconia into the Empire's foremost manufacturing center, with tools flowing from our workshops to markets across Central Europe."
 nd_fkn_dest_industrial: "The Industrious Revolution"
 nd_fkn_dest_industrial_desc: "Dominate the great commercial hubs of Augsburg and Leipzig, embrace industrialization, and lead the transformation from craft to modern manufacture."
 STATIC_MODIFIER_NAME_nd_fkn_dest_rhenish_unity: "Rhenish Unity"
 STATIC_MODIFIER_DESC_nd_fkn_dest_rhenish_unity: "The lands along the Rhine are drawn together under Franconian episcopal authority, creating a centralized power bloc at the heart of the Empire."
 STATIC_MODIFIER_NAME_nd_fkn_dest_episcopal_courts: "Episcopal Courts"
 STATIC_MODIFIER_DESC_nd_fkn_dest_episcopal_courts: "The prince-bishops' courts become centers of learning and ecclesiastical administration, shaping the culture and faith of their subjects."
 STATIC_MODIFIER_NAME_nd_fkn_dest_catholic_champion: "Catholic Champion"
 STATIC_MODIFIER_DESC_nd_fkn_dest_catholic_champion: "Franconia stands as the sword of the Catholic faith, its armies ready to defend the Church and impose its will on heretics and unbelievers."
 STATIC_MODIFIER_NAME_nd_fkn_dest_prince_of_peace: "Prince of Peace"
 STATIC_MODIFIER_DESC_nd_fkn_dest_prince_of_peace: "Following the tradition of the Landfrieden, Franconia uses its spiritual authority to mediate disputes and maintain stability across the fractured Empire."
 STATIC_MODIFIER_NAME_nd_fkn_dest_meister_tradition: "Meister Tradition"
 STATIC_MODIFIER_DESC_nd_fkn_dest_meister_tradition: "The Franconian master craftsman system produces goods of such quality that armies and workshops across the Empire rely on them -- though the finest work demands its price in materials."
 STATIC_MODIFIER_NAME_nd_fkn_dest_trade_fair_privilege: "Trade Fair Privilege"
 STATIC_MODIFIER_DESC_nd_fkn_dest_trade_fair_privilege: "Imperial privileges grant Franconian cities the right to hold great trade fairs, drawing merchants and capital from across Europe."
 STATIC_MODIFIER_NAME_nd_fkn_dest_manufactory_revolution: "Manufactory Revolution"
 STATIC_MODIFIER_DESC_nd_fkn_dest_manufactory_revolution: "The transformation from workshop to factory proceeds at pace, though the disruption of old economic patterns makes the realm less eager for costly wars."
 STATIC_MODIFIER_NAME_nd_fkn_dest_merchant_republic_spirit: "Merchant Republic Spirit"
 STATIC_MODIFIER_DESC_nd_fkn_dest_merchant_republic_spirit: "The civic traditions of the free imperial cities inspire a new model of governance where commercial interests and liberal ideals shape the state."
 nd_fkn_hochstift: "Hochstift"
 nd_fkn_hochstift_desc: "An episcopal cathedral-palace complex where the prince-bishop exercises both spiritual and temporal authority, combining a great church with a school of theology and a seat of governance."
 nd_fkn_handelshaus: "Handelshaus"
 nd_fkn_handelshaus_desc: "A Franconian merchant trading house that coordinates commerce, warehousing, and manufacturing under one roof, embodying the industrious spirit of the free imperial cities."
 nd_fkn_pm_hochstift_scriptorium: "Episcopal Scriptorium"
 nd_fkn_pm_hochstift_scriptorium_desc: "Scholars and scribes in the cathedral chapter produce theological works, histories, and administrative texts that spread the diocese's influence."
 nd_fkn_pm_hochstift_maintenance: "Cathedral Upkeep"
 nd_fkn_pm_hochstift_maintenance_desc: "Maintaining the cathedral, its liturgical furnishings, and the administrative offices of the prince-bishop's court."
 nd_fkn_pm_handelshaus_trade: "Merchant Trading"
 nd_fkn_pm_handelshaus_trade_desc: "The trading house processes raw materials into finished goods, coordinating supply chains across the Empire's commercial network."
 nd_fkn_pm_handelshaus_maintenance: "Trading House Upkeep"
 nd_fkn_pm_handelshaus_maintenance_desc: "Maintaining the warehouse, offices, and commercial facilities of the Handelshaus."
