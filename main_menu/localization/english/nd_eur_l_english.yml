l_english:
 STATIC_MODIFIER_NAME_nd_eur_universal_empire: "Universal Empire"
 STATIC_MODIFIER_DESC_nd_eur_universal_empire: "From Charlemagne to Napoleon, the dream of a single European imperium — one law, one army, one purpose — has shaped the continent. Under this vision, Europe speaks with a single voice, its diverse peoples forged into a unified civilization by centralized authority and irresistible will."
 STATIC_MODIFIER_NAME_nd_eur_concert_of_sovereigns: "Concert of Sovereigns"
 STATIC_MODIFIER_DESC_nd_eur_concert_of_sovereigns: "The Enlightenment ideal of a voluntary federation — sovereign nations bound not by conquest but by shared law, mutual benefit, and rational cooperation. Each member retains its identity; together they constitute an order greater than any empire. This is Europe as Kant imagined it: perpetual peace through voluntary association."
 nd_eur.1.t: "The Unification of Europe"
 nd_eur.1.d: "What no emperor, no pope, no conqueror has achieved, we have accomplished. The continent of Europe — from the Atlantic shores to the Ural frontier, from the frozen north to the Mediterranean sun — stands unified under a single banner. This is the culmination of a thousand years of shared civilization: the cathedrals that pierce every skyline, the universities that light every city, the trade routes that bind every market.\n\nBut the manner of this union remains to be decided. Shall Europe be forged into a single imperium, its peoples united under one throne and one law, as Charlemagne and Napoleon dreamed? Or shall it become a concert of sovereign nations, voluntarily bound by shared principles and mutual respect, as the philosophers of the Enlightenment envisioned?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_eur.1.a: "One throne, one law, one Europe"
 nd_eur.1.b: "A concert of free nations, bound by reason"
 nd_eur.2.t: "The Republic of Letters"
 nd_eur.2.d: "Across the breadth of our unified continent, a revolution of the mind has taken hold. Scholars, philosophers, and natural scientists correspond freely across what were once hostile borders. From the salons of Paris to the coffeehouses of Vienna, from the laboratories of London to the observatories of Padua, knowledge flows unimpeded.\n\nThis 'Republic of Letters' — a community of intellect transcending language and creed — represents something unprecedented in human history. The accumulated wisdom of all European peoples, freely shared and built upon, has produced an explosion of discovery that no single nation could have achieved alone."
 nd_eur.2.a: "Let knowledge flow freely across all borders"
 nd_eur.3.t: "The Congress of Nations"
 nd_eur.3.d: "The great powers of our European state have assembled in congress to deliberate on matters of common concern. The age of bilateral diplomacy gives way to a new system — collective deliberation by the nations of the continent.\n\nThe precedent set at Westphalia, refined at Utrecht and Vienna, has evolved into something grander: a permanent framework for resolving disputes, managing trade, and coordinating policy across the entire continent. But the nature of this congress remains contested."
 nd_eur.3.a: "Diplomacy and shared governance shall prevail"
 nd_eur.3.b: "Order must be imposed by the strong"
 nd_eur.4.t: "The Industrial Convergence"
 nd_eur.4.d: "The transformation that began in individual workshops and mines has become a continental phenomenon. Railways now connect every major city. Factories operate on shared standards. Raw materials flow from the periphery to industrial centers and manufactured goods flow back, creating an integrated economic system of unprecedented scale.\n\nThis industrial convergence offers two paths forward: we may direct this energy toward expanding our productive capacity, building the infrastructure that binds the continent ever more tightly together, or we may focus on extending our commercial reach, establishing European trade networks that span the globe."
 nd_eur.4.a: "Build the continent's industrial foundation"
 nd_eur.4.b: "Extend our commercial networks across the world"
 STATIC_MODIFIER_NAME_nd_eur_republic_of_letters_flourishing: "Flourishing Republic of Letters"
 STATIC_MODIFIER_DESC_nd_eur_republic_of_letters_flourishing: "The free exchange of knowledge across European borders has produced an unprecedented acceleration of discovery and learning."
 STATIC_MODIFIER_NAME_nd_eur_congress_diplomacy: "Congress Diplomacy"
 STATIC_MODIFIER_DESC_nd_eur_congress_diplomacy: "The congress system has established a framework of collective deliberation and diplomatic resolution that binds the nations of Europe together."
 STATIC_MODIFIER_NAME_nd_eur_imposed_order: "Imposed Continental Order"
 STATIC_MODIFIER_DESC_nd_eur_imposed_order: "The strong impose order upon the continent, ensuring stability through disciplined authority rather than negotiated consensus."
 nd_eur_industrial_convergence_modifier: "Industrial Convergence"
 nd_eur_industrial_convergence_modifier_desc: "The continent's industrial capacity grows as shared standards and connected infrastructure create an integrated economic system."
 STATIC_MODIFIER_NAME_nd_eur_commercial_expansion: "Continental Commercial Expansion"
 STATIC_MODIFIER_DESC_nd_eur_commercial_expansion: "European trade networks extend across the globe, carrying the products of continental industry to every corner of the world."
 nd_eur_latin_christendom: "Latin Christendom"
 nd_eur_latin_christendom_desc: "The shared religious heritage of medieval Europe — expressed through cathedral schools, monastic learning, and the universal language of Latin — laid the foundations for a common European identity."
 nd_eur_champagne_fairs: "Champagne Fairs"
 nd_eur_champagne_fairs_desc: "The great trading fairs of Champagne, Flanders, and the Rhineland created the first pan-European commercial networks, connecting Italian merchants with Flemish weavers and Hanseatic traders."
 nd_eur_gothic_cathedrals: "Gothic Cathedrals"
 nd_eur_gothic_cathedrals_desc: "The great Gothic cathedrals — Chartres, Cologne, Reims, Burgos — represent Europe's first truly continental architectural movement. Built over generations by wandering master builders, they expressed a shared faith in stone and light."
 nd_eur_feudal_host: "Feudal Host"
 nd_eur_feudal_host_desc: "The feudal system of military obligation, where vassals owed armed service to their lords, created the armored cavalry that dominated European battlefields for centuries."
 nd_eur_studia_generalia: "Studia Generalia"
 nd_eur_studia_generalia_desc: "The medieval universities of Bologna, Paris, and Oxford — studia generalia recognized by pope and emperor — created a pan-European intellectual elite that transcended borders, taught in Latin, and laid the foundations of modern scholarship."
 nd_eur_urban_communes: "Urban Communes"
 nd_eur_urban_communes_desc: "The self-governing urban communes that flourished from the Hansa cities to the Italian city-states created a distinctly European tradition of civic autonomy, trade regulation, and bourgeois prosperity."
 nd_eur_renaissance_humanism: "Renaissance Humanism"
 nd_eur_renaissance_humanism_desc: "The rediscovery of classical learning, beginning in Italy and spreading across the continent, transformed European art, philosophy, and governance. Humanist scholars recovered the texts of Cicero and Aristotle, igniting a cultural revolution."
 nd_eur_banking_revolution: "Banking Revolution"
 nd_eur_banking_revolution_desc: "The great banking houses — the Medici of Florence, the Fugger of Augsburg, the Welser of Nuremberg — invented modern finance. Bills of exchange, double-entry bookkeeping, and international credit networks made continental trade possible."
 nd_eur_pike_and_shot: "Pike and Shot"
 nd_eur_pike_and_shot_desc: "The combination of massed pike formations with gunpowder weapons transformed European warfare. From the Swiss pikemen to the Spanish tercios, this tactical revolution ended the age of the armored knight."
 nd_eur_age_of_exploration: "Age of Exploration"
 nd_eur_age_of_exploration_desc: "European mariners — Portuguese, Spanish, English, Dutch — pushed beyond the known world, rounding Africa, crossing the Atlantic, and circumnavigating the globe. Their vessels opened the sea lanes that connected continents."
 nd_eur_printing_press_revolution: "Printing Press Revolution"
 nd_eur_printing_press_revolution_desc: "Gutenberg's moveable type printing press, invented in Mainz around 1440, spread across Europe within decades. By 1500, over twenty million volumes had been printed, democratizing knowledge and fueling the Reformation, the Scientific Revolution, and the Enlightenment."
 nd_eur_court_magnificence: "Court Magnificence"
 nd_eur_court_magnificence_desc: "The cultivation of court splendor, from the Burgundian court's elaborate ceremony to the Medici patronage of artists, established a distinctly European tradition of state prestige expressed through architecture, art, and ritual."
 nd_eur_trace_italienne: "Trace Italienne"
 nd_eur_trace_italienne_desc: "The angular, low-profile star fortresses developed by Italian military engineers in response to gunpowder artillery transformed European warfare. These fortifications, later perfected by Vauban, reshaped borders and prolonged sieges across the continent."
 nd_eur_professional_diplomacy: "Professional Diplomacy"
 nd_eur_professional_diplomacy_desc: "The development of permanent embassies, professional ambassadors, and diplomatic protocol — pioneered by Italian city-states and refined by France — created the European system of international relations that endures to this day."
 nd_eur_joint_stock_companies: "Joint-Stock Companies"
 nd_eur_joint_stock_companies_desc: "The joint-stock company, from the Casa di San Giorgio to the great East India Companies, allowed the pooling of capital from thousands of investors. This innovation funded European exploration, colonization, and global trade."
 nd_eur_military_revolution: "Military Revolution"
 nd_eur_military_revolution_desc: "The transformation of European armies — from feudal levies to disciplined formations of pike and musket — reshaped warfare. The Spanish tercio, the Dutch countermarch, and regimental organization created the professional armies that dominated the world."
 nd_eur_cuius_regio: "Cuius Regio"
 nd_eur_cuius_regio_desc: "The principle of 'whose realm, their religion,' established at the Peace of Augsburg in 1555 and confirmed at Westphalia, was Europe's hard-won compromise after generations of religious warfare. It acknowledged diversity as a fact of European life."
 nd_eur_scientific_method: "Scientific Method"
 nd_eur_scientific_method_desc: "The systematic approach to understanding the natural world — through observation, hypothesis, and experiment — arose from the intellectual ferment of Europe's universities and academies. Galileo, Kepler, and Harvey laid the foundations of modern science."
 nd_eur_broadside_warfare: "Broadside Warfare"
 nd_eur_broadside_warfare_desc: "The development of the broadside-armed sailing warship, from the carrack to the galleon, gave European navies dominance over the world's oceans. Line-of-battle tactics concentrated devastating firepower in coordinated volleys."
 nd_eur_westphalian_order: "Westphalian Order"
 nd_eur_westphalian_order_desc: "The Peace of Westphalia in 1648 established the foundational principles of European international relations: state sovereignty, non-interference in domestic affairs, and the resolution of disputes through diplomatic congress."
 nd_eur_standing_armies: "Standing Armies"
 nd_eur_standing_armies_desc: "The transition from feudal levies and mercenary companies to permanent, professional standing armies transformed the European state. Uniform drill, regular pay, and professional officers created the disciplined forces that shaped the modern world."
 nd_eur_republic_of_letters: "Republic of Letters"
 nd_eur_republic_of_letters_desc: "The pan-European network of scholarly correspondence that flourished from the seventeenth century onward, connecting thinkers from London to Constantinople. Through letters, journals, and academic societies, the Republic of Letters created a supranational community of knowledge."
 nd_eur_mercantilist_manufactures: "Mercantilist Manufactures"
 nd_eur_mercantilist_manufactures_desc: "State-directed industrialization under mercantilist policy created the royal manufactories, arsenals, and state enterprises that transformed European economies — from Colbert's tapestry works to Frederick's porcelain factories."
 nd_eur_vauban_fortifications: "Vauban Fortifications"
 nd_eur_vauban_fortifications_desc: "Marshal Vauban's perfection of the star fortress — with its geometric bastions, covered ways, and interlocking fields of fire — represented the pinnacle of European military engineering. His methods were copied across the continent."
 nd_eur_baroque_splendor: "Baroque Splendor"
 nd_eur_baroque_splendor_desc: "The Baroque movement swept across Europe, from Bernini's Rome to the palaces of Vienna and Versailles. This continental cultural phenomenon expressed the power and confidence of the European state through monumental architecture, music, and art."
 nd_eur_global_maritime_reach: "Global Maritime Reach"
 nd_eur_global_maritime_reach_desc: "European navies, armed with broadside ships of the line, established command of the world's oceans. From the Caribbean to the South China Sea, European maritime power projected continental influence across the globe."
 nd_eur_enlightenment_philosophy: "Enlightenment Philosophy"
 nd_eur_enlightenment_philosophy_desc: "The Enlightenment — from Locke and Voltaire to Kant and Montesquieu — produced a revolution in European thought. The ideas of natural rights, separation of powers, and social contract transformed governance across the continent."
 nd_eur_congress_of_nations: "Congress of Nations"
 nd_eur_congress_of_nations_desc: "The evolution of European diplomacy from bilateral treaty-making to the congress system — where the great powers deliberated collectively on matters of continental concern — from Westphalia through Utrecht to Vienna."
 nd_eur_grande_armee: "Grande Armee"
 nd_eur_grande_armee_desc: "The Napoleonic model of the grande armee — massive citizen armies organized into self-sufficient corps, combining infantry, cavalry, and artillery into a single devastating instrument — redefined European warfare."
 nd_eur_academy_of_sciences_tradition: "Academy of Sciences"
 nd_eur_academy_of_sciences_tradition_desc: "The great European academies — the Royal Society of London, the Academie des Sciences in Paris, the academies of Berlin, St. Petersburg, and Stockholm — institutionalized scientific inquiry and created the infrastructure for the advancement of knowledge."
 nd_eur_imperial_arsenal_tradition: "Imperial Arsenal"
 nd_eur_imperial_arsenal_tradition_desc: "Standardized armament production, pioneered by the arsenals of Venice, the armories of Liege, and the cannon foundries of Sweden, gave European armies a technological edge that reshaped the balance of global power."
 nd_eur_first_rate_supremacy: "First-Rate Supremacy"
 nd_eur_first_rate_supremacy_desc: "The first-rate ship of the line — carrying 100 or more guns across three gun decks — was the most powerful mobile weapon platform in human history. European shipyards produced these floating fortresses at a scale unmatched anywhere in the world."
 nd_eur_perpetual_peace: "Perpetual Peace"
 nd_eur_perpetual_peace_desc: "Kant's vision of perpetual peace through a federation of free republics — voluntary, cosmopolitan, bound by universal law rather than imperial force — represents the Enlightenment's highest aspiration for European civilization."
 nd_eur_industrial_convergence: "Industrial Convergence"
 nd_eur_industrial_convergence_desc: "The spread of industrial technology across the continent — from British innovations to Belgian, French, German, and beyond — created an integrated European industrial economy connected by railways, telegraphs, and shared standards."
 STATIC_MODIFIER_NAME_nd_eur_industrial_convergence: "Industrial Convergence"
 STATIC_MODIFIER_DESC_nd_eur_industrial_convergence: "The spread of industrial technology across the continent — from British innovations to Belgian, French, German, and beyond — created an integrated European industrial economy connected by railways, telegraphs, and shared standards."
 nd_eur_citizen_army: "Citizen Army"
 nd_eur_citizen_army_desc: "The French Revolution's levee en masse transformed warfare: the entire nation mobilized for defense, producing mass armies of citizen-soldiers animated by patriotic fervor. Every European power was forced to adopt some form of this revolutionary innovation."
 nd_eur_ius_gentium: "Ius Gentium"
 nd_eur_ius_gentium_desc: "Hugo Grotius's law of nations — the ius gentium — established the foundations of modern international law. Rules governing warfare, diplomacy, trade, and the rights of peoples created a legal framework for European and global order."
 nd_eur_continental_telegraph: "Continental Telegraph"
 nd_eur_continental_telegraph_desc: "The electric telegraph connected European capitals in minutes rather than days. This revolution in communication enabled rapid coordination of policy, trade, and military operations across the entire continent."
 nd_eur_universal_education: "Universal Education"
 nd_eur_universal_education_desc: "The Enlightenment ideal of universal education, implemented through public school systems and public libraries, created the most literate societies in human history and laid the foundation for industrial modernity."
 nd_eur_ironclad_fleet: "Ironclad Fleet"
 nd_eur_ironclad_fleet_desc: "The transition from wooden sailing vessels to steam-powered ironclad warships rendered centuries of naval tradition obsolete overnight. European shipyards led this transformation, producing the armored battlefleets that dominated the world's seas."
 nd_eur_grand_exhibition: "Grand Exhibition"
 nd_eur_grand_exhibition_desc: "The great exhibitions — London's Crystal Palace in 1851, Paris in 1855, and their successors — showcased the achievements of European industry, science, and art to the world. They represented the pinnacle of European confidence in progress and civilization."
 a_nd_eur_man_at_arms: "European Man-at-Arms"
 a_nd_eur_man_at_arms_desc: "Heavily armored mounted warriors drawn from the feudal nobility, representing the finest of medieval European chivalric tradition."
 a_nd_eur_pikeman: "European Pikeman"
 a_nd_eur_pikeman_desc: "Disciplined infantry armed with long pikes, trained to hold formation against cavalry charges. The backbone of the pike-and-shot revolution."
 n_nd_eur_exploration_carrack: "Exploration Carrack"
 n_nd_eur_exploration_carrack_desc: "A sturdy ocean-going vessel designed for long-distance exploration. Faster and more maneuverable than standard carracks, these ships opened the sea routes to the New World and the East Indies."
 a_nd_eur_tercio: "European Tercio"
 a_nd_eur_tercio_desc: "Combined formations of pike and musket, the tercio was the dominant infantry formation of the sixteenth century. These disciplined squares combined defensive staying power with offensive firepower."
 n_nd_eur_galleon: "European Galleon"
 n_nd_eur_galleon_desc: "An advanced ocean-going warship combining heavy armament with improved seaworthiness. The galleon dominated both Atlantic trade routes and naval warfare during the Age of Discovery."
 a_nd_eur_line_infantry: "European Line Infantry"
 a_nd_eur_line_infantry_desc: "Professional soldiers trained in linear tactics, firing volleys in disciplined ranks. The standing armies of Europe's great powers were built on these reliable, well-drilled formations."
 n_nd_eur_ship_of_the_line: "Ship of the Line"
 n_nd_eur_ship_of_the_line_desc: "A powerful broadside warship designed to fight in line of battle, delivering devastating coordinated volleys. These vessels formed the backbone of every European great power's navy."
 a_nd_eur_grenadier: "European Grenadier"
 a_nd_eur_grenadier_desc: "Elite shock infantry selected for size and courage, originally trained to throw grenades into fortifications. The grenadier companies became the premier assault troops of European armies."
 n_nd_eur_first_rate: "First-Rate Ship"
 n_nd_eur_first_rate_desc: "The largest and most heavily armed warship afloat — a three-decker carrying over a hundred guns. These floating fortresses were prohibitively expensive, and only the greatest naval powers could afford to build and maintain them."
 a_nd_eur_fusilier: "European Fusilier"
 a_nd_eur_fusilier_desc: "The citizen-soldiers of revolutionary Europe, armed with modern muskets and animated by patriotic fervor. Conscripted in vast numbers, they fought with the determination of free men defending their homeland."
 n_nd_eur_ironclad: "European Ironclad"
 n_nd_eur_ironclad_desc: "A steam-powered warship clad in iron armor, rendering wooden sailing navies obsolete. The ironclad represented the cutting edge of European industrial and naval engineering."
 nd_eur_trade_fair: "Trade Fair"
 nd_eur_trade_fair_desc: "A permanent market hall at the intersection of major trade routes, hosting seasonal fairs where merchants from across the continent exchange goods, settle accounts, and negotiate contracts."
 nd_eur_great_cathedral: "Great Cathedral"
 nd_eur_great_cathedral_desc: "A monumental Gothic cathedral whose soaring vaults, flying buttresses, and stained glass windows express the shared religious and artistic heritage of European civilization."
 nd_eur_universitas: "Universitas"
 nd_eur_universitas_desc: "A self-governing community of scholars and students, modeled on the great medieval universities of Bologna, Paris, and Oxford, where learning transcends national boundaries."
 nd_eur_banking_house: "Banking House"
 nd_eur_banking_house_desc: "A financial institution operating international credit networks, issuing bills of exchange, and funding trade and state enterprises across the continent."
 nd_eur_grand_palace: "Grand Palace"
 nd_eur_grand_palace_desc: "A magnificent royal residence in the Baroque tradition, serving as both the seat of government and a display of state power through architecture, gardens, and artistic patronage."
 nd_eur_star_fortress: "Star Fortress"
 nd_eur_star_fortress_desc: "An angular fortification designed to withstand artillery bombardment, featuring low-profile bastions, wide moats, and interlocking fields of fire. The trace italienne, perfected by Vauban."
 nd_eur_colonial_exchange: "Colonial Exchange"
 nd_eur_colonial_exchange_desc: "A coastal trading house where the goods of overseas empires are received, sorted, and distributed to continental markets — spices from the East, silver from the Americas, furs from the North."
 nd_eur_state_manufactory: "State Manufactory"
 nd_eur_state_manufactory_desc: "A state-directed production facility where skilled artisans produce standardized goods under mercantilist principles — tapestries, porcelain, clocks, and fine metalwork."
 nd_eur_academy_of_sciences: "Academy of Sciences"
 nd_eur_academy_of_sciences_desc: "A learned society dedicated to the advancement of natural philosophy, mathematics, and the mechanical arts, modeled on the Royal Society and the Academie des Sciences."
 nd_eur_imperial_arsenal: "Imperial Arsenal"
 nd_eur_imperial_arsenal_desc: "A vast armaments factory producing standardized cannons, muskets, and ammunition for the armies and navies of a united Europe."
 nd_eur_continental_railway: "Continental Railway"
 nd_eur_continental_railway_desc: "A railway connecting the cities of Europe, enabling rapid movement of goods, people, and armies across the continent."
 nd_eur_exhibition_hall: "Exhibition Hall"
 nd_eur_exhibition_hall_desc: "A grand pavilion showcasing the industrial, scientific, and artistic achievements of European civilization, drawing visitors and prestige from across the world."
 nd_eur_fair_goods_processing: "Fair Goods Processing"
 nd_eur_fair_goods_processing_desc: "Artisans at the trade fair process raw textiles into finished cloth, adding value through dyeing and finishing techniques."
 nd_eur_fair_maintenance: "Fair Upkeep"
 nd_eur_fair_maintenance_desc: "Maintaining the trade fair's stalls, warehouses, and common facilities."
 nd_eur_cathedral_maintenance: "Cathedral Maintenance"
 nd_eur_cathedral_maintenance_desc: "The endless work of maintaining a great cathedral — repairing stonework, replacing glass, and preserving the fabric of the building."
 nd_eur_printed_works: "Printed Works"
 nd_eur_printed_works_desc: "University scholars and printers produce bound volumes of classical texts, scientific treatises, and theological works for distribution across Europe."
 nd_eur_universitas_maintenance: "University Upkeep"
 nd_eur_universitas_maintenance_desc: "Supplying the university with paper, books, and candles for its halls and libraries."
 nd_eur_banking_maintenance: "Banking Operations"
 nd_eur_banking_maintenance_desc: "Maintaining the ledgers, correspondence, and physical infrastructure of an international banking house."
 nd_eur_palace_maintenance: "Palace Upkeep"
 nd_eur_palace_maintenance_desc: "Maintaining the grandeur of a Baroque palace demands constant investment in materials and skilled labor."
 nd_eur_bastion_maintenance: "Bastion Maintenance"
 nd_eur_bastion_maintenance_desc: "Maintaining the walls, bastions, armaments, and garrison supplies of a star fortress."
 nd_eur_scientific_instruments: "Scientific Instruments"
 nd_eur_scientific_instruments_desc: "Skilled artisans craft precision instruments — telescopes, microscopes, navigational tools — for Europe's scientists and explorers."
 nd_eur_exchange_maintenance: "Exchange Upkeep"
 nd_eur_exchange_maintenance_desc: "Operating the warehouses, offices, and wharves of a colonial exchange."
 nd_eur_manufactory_production: "Manufactory Production"
 nd_eur_manufactory_production_desc: "State-directed manufacture of standardized tools and implements using iron, coal, and timber."
 nd_eur_manufactory_maintenance: "Manufactory Upkeep"
 nd_eur_manufactory_maintenance_desc: "Maintaining the equipment, fuel supplies, and raw material stocks of a state manufactory."
 nd_eur_academy_maintenance: "Academy Upkeep"
 nd_eur_academy_maintenance_desc: "Supplying an academy of sciences with books, paper, and laboratory equipment."
 nd_eur_arsenal_production: "Arsenal Production"
 nd_eur_arsenal_production_desc: "Casting bronze and iron cannons at the imperial arsenal, supplying standardized armaments to European forces."
 nd_eur_arsenal_maintenance: "Arsenal Upkeep"
 nd_eur_arsenal_maintenance_desc: "Maintaining the forges, workshops, and stockpiles of an imperial arsenal."
 nd_eur_telegraph_relay: "Telegraph Relay"
 nd_eur_telegraph_relay_desc: "Operating telegraph stations along the railway network, enabling rapid communication across the continent."
 nd_eur_railway_maintenance: "Railway Maintenance"
 nd_eur_railway_maintenance_desc: "Maintaining the tracks, bridges, stations, and rolling stock of the continental railway."
 nd_eur_exhibition_maintenance: "Exhibition Upkeep"
 nd_eur_exhibition_maintenance_desc: "Maintaining the pavilions, displays, and grounds of a grand exhibition hall."
 nd_eur_formed_tt: "Europe has been unified"
 nd_eur_path_a_tt: "Chose the #bold Universal Empire#! destiny"
 nd_eur_path_b_tt: "Chose the #bold Concert of Sovereigns#! destiny"
 nd_eur_destiny: "Destiny of Europe"
 nd_eur_destiny_desc: "The continent stands unified. Now comes the true test: what manner of civilization shall this Europe become? Maintain stability while choosing the path that will define a new era of human history."
 nd_eur_dest_imperium: "Imperium Mundi"
 nd_eur_dest_imperium_desc: "The heirs of Rome and Charlemagne look east and south. Constantinople and Jerusalem — the ancient seats of empire and faith — must fall under the European aegis. Only when these storied cities bow to our banner can the Universal Empire claim its inheritance."
 nd_eur_dest_global_reach: "Global Imperium"
 nd_eur_dest_global_reach_desc: "Europe's dominion must extend beyond the continent. Plant our standard in the ancient capitals of the Aztec and Chinese worlds. From Tenochtitlan to Guangzhou, European power must span every ocean and every continent."
 nd_eur_dest_pax_europaea: "Pax Europaea"
 nd_eur_dest_pax_europaea_desc: "The final expression of the Universal Empire: an uncontested European peace enforced across the globe. From the Ganges to the Caribbean, from the Straits of Malacca to the Great Plains, European arms must guarantee order everywhere. Only a supreme military force can sustain such a peace."
 nd_eur_dest_common_market: "Common Market"
 nd_eur_dest_common_market_desc: "The Concert of Sovereigns begins with commerce. Build a continental market where the luxury goods of the world flow freely — silk from the East, fine cloth from our own workshops. A Europe bound by trade will need no chains."
 nd_eur_dest_enlightened_continent: "Continental Enlightenment"
 nd_eur_dest_enlightened_continent_desc: "The light of reason must illuminate every corner of the continent. Embrace the scientific revolution, accumulate wealth through peaceful industry, and earn the prestige that comes from being the world's most advanced civilization."
 nd_eur_dest_eternal_peace: "Perpetual Peace"
 nd_eur_dest_eternal_peace_desc: "Kant's dream made real: a federation of free peoples, industrialized and enlightened, bound by law rather than force. Embrace both the industrial revolution and the citizen's army — not for conquest, but as the twin foundations of a civilization that will endure forever."
 nd_eur.5.t: "The Destiny of Europe"
 nd_eur.5.d: "The unification of Europe is complete, but the true work has only begun. A continent of diverse peoples, languages, and traditions stands under one banner for the first time since the fall of Rome. The manner in which we govern this unprecedented achievement will determine whether European civilization reaches its fullest potential or fragments once more into squabbling kingdoms.\n\nThe foundations have been laid. Now we must build upon them."
 nd_eur.5.a: "Europe's destiny is ours to forge"
 nd_eur.6.t: "The Inheritance of Rome"
 nd_eur.6.d: "Our armies have entered Constantinople and Jerusalem — cities that once defined the boundaries of the civilized world. The Hagia Sophia and the Church of the Holy Sepulchre now stand within our borders. What Rome began, what Charlemagne attempted, what the Crusaders dreamed of — we have accomplished.\n\nThe ancient imperial capitals are ours. The Universal Empire inherits the mantle of every imperium that came before it."
 nd_eur.6.a: "We are the heirs of all civilization"
 nd_eur.7.t: "The Continental Market"
 nd_eur.7.d: "The first great achievement of the Concert of Sovereigns is not a military victory but an economic one. Silk and fine cloth flow through our capital markets — the luxury goods of the world are available to our citizens not through conquest but through commerce. Merchants from every European nation trade freely under shared laws and common standards.\n\nThis is the foundation upon which a lasting peace is built: mutual prosperity."
 nd_eur.7.a: "Prosperity shall bind what force cannot"
 nd_eur.8.t: "The Global Imperium"
 nd_eur.8.d: "European banners fly over Tenochtitlan and Guangzhou. The great civilizations of the Americas and Asia have been brought within our sphere. The question now is how to govern these vast new possessions.\n\nShall we project our naval power across the oceans, building a maritime empire that controls the world's sea lanes? Or shall we concentrate our military might on the continental heartland, forging an invincible army that no power on earth can challenge?"
 nd_eur.8.a: "Command the seas and the world follows"
 nd_eur.8.b: "Our legions shall be invincible on land"
 nd_eur.9.t: "The Continental Enlightenment"
 nd_eur.9.d: "The scientific revolution has taken root across Europe. Our academies, universities, and learned societies have produced an explosion of knowledge unmatched in human history. The wealth accumulated through peaceful commerce funds further discovery, and the prestige of our civilization draws scholars from every corner of the world.\n\nHow shall we channel this intellectual energy?"
 nd_eur.9.a: "Open our markets and build freely"
 nd_eur.9.b: "Train a new generation of diplomats"
 nd_eur.10.t: "The Pax Europaea"
 nd_eur.10.d: "From Delhi to Temasek, from Havana to the far corners of every continent, European power is unchallenged. The greatest military force ever assembled stands ready to enforce peace across the globe. This is the apex of the Universal Empire — the Pax Europaea.\n\nBut how shall this peace be maintained? Through overwhelming offensive power that crushes all resistance? Or through the patient work of integration, absorbing conquered peoples into the European fold?"
 nd_eur.10.a: "Offensive supremacy ensures lasting peace"
 nd_eur.10.b: "Integrate and civilize the world"
 nd_eur.11.t: "Perpetual Peace"
 nd_eur.11.d: "Kant wrote of a perpetual peace achieved through a federation of free republics. We have surpassed even his vision. The Concert of Sovereigns — industrialized, enlightened, bound by shared law and mutual respect — stands as the most advanced civilization in human history.\n\nTwo final visions compete for the soul of this achievement. Shall we build an industrial paradise, governed by enlightened republican principles? Or shall we create a world congress, exporting our model of cooperative civilization to every nation on earth?"
 nd_eur.11.a: "Build the republic of progress"
 nd_eur.11.b: "Convene the congress of all nations"
 STATIC_MODIFIER_NAME_nd_eur_dest_colonial_supremacy: "Colonial Supremacy"
 STATIC_MODIFIER_DESC_nd_eur_dest_colonial_supremacy: "European navies command every ocean. Our blockades are unbreakable, our sailors inexhaustible — though maintaining such a fleet strains even our vast resources."
 STATIC_MODIFIER_NAME_nd_eur_dest_continental_domination: "Continental Domination"
 STATIC_MODIFIER_DESC_nd_eur_dest_continental_domination: "The European army is the mightiest force on earth. Vast levies and elite cavalry enforce the imperial will across every frontier — though the cost of such armies feeds inflation."
 STATIC_MODIFIER_NAME_nd_eur_dest_universal_monarchy: "Universal Monarchy"
 STATIC_MODIFIER_DESC_nd_eur_dest_universal_monarchy: "A single throne commands the world's greatest military machine. European commanders seize the initiative in every engagement, their troops recovering from setback with astonishing speed."
 STATIC_MODIFIER_NAME_nd_eur_dest_roman_peace: "Roman Peace"
 STATIC_MODIFIER_DESC_nd_eur_dest_roman_peace: "Like Rome before it, the European Empire absorbs conquered peoples into its civilization. Integration and conversion proceed at unprecedented speed under a spirit of innovation."
 STATIC_MODIFIER_NAME_nd_eur_dest_free_exchange: "Free Exchange"
 STATIC_MODIFIER_DESC_nd_eur_dest_free_exchange: "The Concert of Sovereigns has reduced barriers to trade and construction across the continent. Ships are built faster, buildings cost less, and the spirit of free commerce prevails."
 STATIC_MODIFIER_NAME_nd_eur_dest_diplomatic_academy: "Diplomatic Academy"
 STATIC_MODIFIER_DESC_nd_eur_dest_diplomatic_academy: "A continental tradition of professional diplomacy has taken root. Annexation is managed through skilled negotiation and the prestige of the crown — though the diplomatic establishment does not come cheap."
 STATIC_MODIFIER_NAME_nd_eur_dest_industrial_harmony: "Industrial Harmony"
 STATIC_MODIFIER_DESC_nd_eur_dest_industrial_harmony: "The Concert of Sovereigns has achieved what the philosophers dreamed of: a harmonious industrial republic where progress and liberty advance together."
 STATIC_MODIFIER_NAME_nd_eur_dest_world_congress: "World Congress"
 STATIC_MODIFIER_DESC_nd_eur_dest_world_congress: "The model of European cooperation has been exported to the world. Cultural influence radiates outward while a spirit of conciliation and inter-faith harmony governs international relations."
 nd_eur_imperial_command: "Imperial Command"
 nd_eur_imperial_command_desc: "The supreme military headquarters of the Universal Empire, coordinating armies and garrisons across the globe from a single fortified complex of war rooms, stables, and signal towers."
 nd_eur_congress_hall: "Congress Hall"
 nd_eur_congress_hall_desc: "A grand civic building where representatives of the Concert of Sovereigns deliberate on matters of continental governance, trade regulation, and the advancement of knowledge."
 nd_eur_command_maintenance: "Command Maintenance"
 nd_eur_command_maintenance_desc: "Maintaining the signal systems, stables, map rooms, and administrative offices of the supreme military headquarters."
 nd_eur_congress_maintenance: "Congress Maintenance"
 nd_eur_congress_maintenance_desc: "Maintaining the chambers, archives, and diplomatic facilities of the continental congress hall."
