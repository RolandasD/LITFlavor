l_english:
 STATIC_MODIFIER_NAME_nd_kon_christian_diplomacy: "Christian Diplomacy of Kongo"
 STATIC_MODIFIER_DESC_nd_kon_christian_diplomacy: "The Manikongo has embraced the faith of Rome, opening channels of diplomacy with the courts of Europe. Kongolese envoys travel to Lisbon and the Vatican, while missionaries and scholars bring knowledge and techniques to Mbanza Kongo."
 STATIC_MODIFIER_NAME_nd_kon_strength_of_ancestors: "Strength of the Ancestors"
 STATIC_MODIFIER_DESC_nd_kon_strength_of_ancestors: "The Manikongo draws authority from the traditions of the founders — the master blacksmiths who forged the kingdom. The drums of war echo across the provinces, and the shield warriors stand ready to defend every border."
 STATIC_MODIFIER_NAME_nd_kon_antonine_fervor: "Antonine Fervor"
 STATIC_MODIFIER_DESC_nd_kon_antonine_fervor: "The teachings of the prophetess have spread through the land, proclaiming that the kingdom's sacred roots run deeper than any foreign creed. The people rally around this vision of a distinctly Kongolese faith."
 STATIC_MODIFIER_NAME_nd_kon_national_renaissance: "Kongolese Renaissance"
 STATIC_MODIFIER_DESC_nd_kon_national_renaissance: "A renewed sense of Kongolese identity surges through the kingdom, as the people rediscover and celebrate the traditions, arts, and governance systems that make their civilization unique."
 nd_kon.1.t: "The Kingdom of Kongo Reborn"
 nd_kon.1.d: "The great work is complete. From the banks of the mighty Nzadi — the river the foreigners call Congo — to the shores of the western ocean, the scattered provinces once more answer to a single throne. Mbanza Kongo stands as the heart of a reunited realm, its stone churches and ancient spirit houses alike testament to a kingdom that bridges worlds.\n\nThe Manikongo must now choose the path forward. Shall we embrace the connections forged with the kingdoms across the sea, using their faith and learning to strengthen our own? Or shall we look inward, to the iron traditions and ancestral wisdom that built this kingdom long before any foreign ship appeared on our horizon?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_kon.1.a: "We shall walk with Rome and Lisbon."
 nd_kon.1.b: "Our strength is in the forge and the ancestors."
 nd_kon.2.t: "The Prophetess of Kongo"
 nd_kon.2.d: "A young woman of noble birth has risen from the ashes of decades of civil war, claiming to be possessed by the spirit of Saint Anthony. But her teachings are no simple repetition of European doctrine — Dona Beatriz Kimpa Vita proclaims that Jesus Christ was born in Mbanza Kongo, that the Mother of God was a Kongolese woman, and that the saints were the ancestors of the Kongolese people.\n\nHer Antonine movement sweeps through the countryside, offering hope to a people exhausted by war. She calls for the reunification of the kingdom and the restoration of the abandoned capital. Thousands flock to her banner, and the old powers — both Kongolese and European — watch with unease."
 nd_kon.2.a: "Let her message unite our people."
 nd_kon.2.b: "Channel her followers' zeal into service of the kingdom."
 nd_kon.3.t: "The Kongolese Identity"
 nd_kon.3.d: "As the age of revolutions reshapes the world, the people of Kongo look to their own heritage with renewed pride. The raffia cloth patterns that once served as currency, the iron-forging traditions that gave birth to kings, the drum signals that coordinated armies across vast distances — these are not relics of a vanished past but living traditions that define who the Kongolese are.\n\nScholars and elders work to preserve and celebrate the kingdom's unique cultural legacy, ensuring that the identity of Kongo endures regardless of what changes the future may bring."
 nd_kon.3.a: "Our traditions are our strength."
 nd_kon.3.b: "Our people's pride shall become our strength in arms."
 nd_kon_iron_tradition: "Iron Mastery"
 nd_kon_iron_tradition_desc: "The founders of Kongo were masters of the forge, and the blacksmith remains a figure of spiritual and political authority. Iron tools, weapons, and symbols of kingship flow from Kongolese smithies."
 nd_kon_shield_warriors: "Shield Warriors"
 nd_kon_shield_warriors_desc: "The heavy infantry of Kongo carry large shields and swords into battle, forming a disciplined core that absorbs enemy charges before counterattacking at close quarters."
 nd_kon_nzo_a_nkisi_tradition: "Nzo a Nkisi Tradition"
 nd_kon_nzo_a_nkisi_tradition_desc: "The spirit houses of Kongo are repositories of nkisi — sacred objects charged with spiritual power. These shrines anchor communities and reinforce the authority of local leaders."
 nd_kon_raffia_weaving: "Raffia Weaving"
 nd_kon_raffia_weaving_desc: "Kongolese weavers transform raffia palm fibers into luxurious cloth with tight weaves and intricate patterns, dyed and embroidered to a standard that makes the cloth a reliable medium of exchange."
 nd_kon_nzimbu_currency: "Nzimbu Shell Currency"
 nd_kon_nzimbu_currency_desc: "The spiral nzimbu shells from Luanda serve as the kingdom's standardized currency. One hundred buy a hen, two thousand a goat — a sophisticated monetary system that facilitates trade across the realm."
 nd_kon_pombo_scouts: "Pombo Scouts"
 nd_kon_pombo_scouts_desc: "Elite scouting troops of the Kongo army, the pombos are trained to keep pace with mounted riders on foot. They serve as the kingdom's eyes and ears, pursuing fleeing enemies and reconnoitering enemy positions."
 nd_kon_stone_masonry: "Stone Masonry"
 nd_kon_stone_masonry_desc: "Under Afonso I, Kongolese workers learned European stone construction techniques, raising churches and palaces that blended imported methods with local sensibilities — a physical testament to the kingdom's cultural synthesis."
 nd_kon_royal_school: "Royal School of Mbanza Kongo"
 nd_kon_royal_school_desc: "By 1516, over a thousand students attended the royal school at Mbanza Kongo, with additional schools established in the provinces. The result was a fully literate noble class unprecedented in sub-Saharan Africa."
 nd_kon_mbanza_capital: "Mbanza Kongo"
 nd_kon_mbanza_capital_desc: "The capital of the kingdom grows into a true city, its streets named, its stone cathedrals and chapels rising alongside traditional structures. Mbanza Kongo is the political, spiritual, and economic heart of the realm."
 nd_kon_provincial_dukes: "Provincial Dukes"
 nd_kon_provincial_dukes_desc: "The six great provinces — Nsundi, Mpangu, Mbata, Soyo, Mbamba, and Mpemba — are organized under appointed governors who bear European-style ducal titles, creating a structured hierarchy of administration."
 nd_kon_copper_trade: "Copper Trade"
 nd_kon_copper_trade_desc: "The copper deposits of the region fuel a trade in worked metal that stretches across Central Africa and beyond, providing the kingdom with a valuable commodity alongside its textile and ivory exports."
 nd_kon_musket_regiment: "Musket Regiment"
 nd_kon_musket_regiment_desc: "Kongolese troops trained in the use of European firearms form organized musket regiments, combining imported military technology with indigenous tactical traditions."
 nd_kon_atlantic_diplomacy: "Atlantic Diplomacy"
 nd_kon_atlantic_diplomacy_desc: "The kingdom's envoys navigate the complex politics of the Atlantic world, engaging with Portuguese, Dutch, and papal courts. Kongolese ambassadors are received in Lisbon and Rome, establishing the kingdom as a recognized sovereign power."
 nd_kon_cloth_market_tradition: "Cloth Market Tradition"
 nd_kon_cloth_market_tradition_desc: "Dedicated markets for the trade of raffia cloth emerge in the kingdom's towns, where the libongo — standardized cloth currency — changes hands alongside imported European goods and regional commodities."
 nd_kon_missionary_education: "Missionary Education"
 nd_kon_missionary_education_desc: "Jesuit and Capuchin missionaries establish colleges in the kingdom, teaching reading, writing, theology, and European sciences. The resulting literate class bridges the gap between Kongolese and European knowledge traditions."
 nd_kon_battle_drums: "Battle Drums and Signals"
 nd_kon_battle_drums_desc: "A complex system of drums, horns, and pennants allows Kongolese commanders to coordinate their forces across the battlefield, directing the center and two wings of their battle formations with precision."
 nd_kon_battle_formations: "Three-Division Tactics"
 nd_kon_battle_formations_desc: "Kongolese armies deploy in a sophisticated three-division formation — a strong center flanked by two mobile wings — coordinated through an elaborate system of drum signals and battle flags."
 nd_kon_fortress_walls: "Mbanza Fortifications"
 nd_kon_fortress_walls_desc: "Key towns and strategic positions receive defensive fortifications, combining indigenous stockade construction with techniques learned from European military engineering."
 nd_kon_syncretic_faith: "Syncretic Faith"
 nd_kon_syncretic_faith_desc: "The Kongolese practice of Christianity incorporates elements of traditional belief, creating a distinctive religious culture that acknowledges both the cross and the nkisi. This synthesis strengthens social cohesion across diverse communities."
 nd_kon_lucanzos_tradition: "Lucanzos"
 nd_kon_lucanzos_tradition_desc: "Special detachments called lucanzos are trained for raiding, ambush, and unconventional warfare. These elite troops operate independently, striking where the enemy is weakest and withdrawing before a decisive engagement."
 nd_kon_long_distance_trade: "Long-Distance Trade"
 nd_kon_long_distance_trade_desc: "Kongolese merchants extend their networks deep into the interior, trading cloth, copper, salt, and ivory along routes that connect the Atlantic coast to the heart of Central Africa."
 nd_kon_antonine_movement: "The Antonine Movement"
 nd_kon_antonine_movement_desc: "Dona Beatriz Kimpa Vita's Antonine movement proclaims a distinctly Kongolese Christianity, teaching that the sacred figures of the faith were Kongolese. Though its prophetess is martyred, the movement's message of cultural pride endures."
 nd_kon_civil_war_resilience: "Civil War Resilience"
 nd_kon_civil_war_resilience_desc: "The kingdom endures fifty years of devastating civil war following the Battle of Mbwila. Though battered, the idea of Kongo as a unified realm never dies, and the people's resilience sees them through the darkest years."
 nd_kon_restored_kingdom: "Restored Kingdom"
 nd_kon_restored_kingdom_desc: "After decades of fragmentation, the kingdom is gradually reunified under renewed royal authority. The provinces once again acknowledge a central Manikongo, and the machinery of governance is rebuilt."
 nd_kon_coastal_defense: "Coastal Defense"
 nd_kon_coastal_defense_desc: "As European powers grow more aggressive along the coast, Kongo fortifies its borders and strategic positions, making any invasion a costly proposition for would-be conquerors."
 nd_kon_ivory_export: "Ivory Export"
 nd_kon_ivory_export_desc: "Ivory becomes one of the kingdom's most lucrative exports, processed and traded to European merchants who prize the material for luxury goods. The trade enriches the kingdom's coffers and sustains its economy."
 nd_kon_national_identity: "Kongolese Identity"
 nd_kon_national_identity_desc: "In an age of revolutionary change, the people of Kongo reassert their unique cultural heritage — the textile arts, iron traditions, drum languages, and governance systems that define their civilization."
 nd_kon_modern_army: "Modern Army"
 nd_kon_modern_army_desc: "The Kongolese military embraces modern training methods, tactics, and organization, creating a professional force capable of defending the kingdom's sovereignty in a changing world."
 nd_kon_independence_spirit: "Spirit of Independence"
 nd_kon_independence_spirit_desc: "As colonial pressures mount across Africa, the Kongolese draw on centuries of proud sovereignty to resist foreign domination, maintaining the kingdom's independence and territorial integrity."
 nd_kon_palm_oil_economy: "Palm Oil Economy"
 nd_kon_palm_oil_economy_desc: "The transition to palm oil as a major export commodity diversifies the kingdom's economy, providing a sustainable revenue source as traditional trade patterns shift in the industrial age."
 a_nd_kon_shield_warriors: "Shield Warriors"
 a_nd_kon_shield_warriors_desc: "Heavy Kongolese infantry armed with large shields and swords. These disciplined troops form the defensive backbone of the army, absorbing enemy volleys before closing for decisive hand-to-hand combat."
 a_nd_kon_pombo_scouts: "Pombo Scouts"
 a_nd_kon_pombo_scouts_desc: "Elite pursuit troops trained to keep pace with mounted riders on foot. The pombos serve as scouts, skirmishers, and pursuers, using their exceptional speed and knowledge of terrain to outmaneuver the enemy."
 a_nd_kon_musket_regiment: "Kongolese Musket Regiment"
 a_nd_kon_musket_regiment_desc: "Organized musket troops combining European firearms with Kongolese tactical discipline. By the seventeenth century, Kongo fielded hundreds of trained musketeers alongside traditional forces."
 a_nd_kon_lucanzos: "Lucanzos"
 a_nd_kon_lucanzos_desc: "Special detachment troops trained for raiding, ambush, and unconventional warfare. The lucanzos strike fast and disappear, disrupting enemy supply lines and sowing confusion in hostile territory."
 a_nd_kon_modern_infantry: "Modern Kongolese Infantry"
 a_nd_kon_modern_infantry_desc: "Professionally trained Kongolese infantry equipped with modern weapons and tactics, representing the kingdom's adaptation to the military realities of the industrial age."
 nd_kon_iron_forge: "Iron Forge"
 nd_kon_iron_forge_desc: "A traditional Kongolese smithy where master blacksmiths produce weapons, tools, and the iron symbols of royal authority. The forge is both workshop and sacred space."
 nd_kon_nzo_a_nkisi: "Nzo a Nkisi"
 nd_kon_nzo_a_nkisi_desc: "A traditional Kongolese spirit house containing nkisi — sacred objects believed to channel spiritual power. These shrines serve as centers of community life and reinforcements of local authority."
 nd_kon_stone_church: "Stone Church"
 nd_kon_stone_church_desc: "A church constructed in the style pioneered by Afonso I, blending European stone masonry with Kongolese architectural sensibilities. These buildings are both houses of worship and symbols of the kingdom's engagement with the wider world."
 nd_kon_cloth_market: "Cloth Market"
 nd_kon_cloth_market_desc: "A dedicated market for the trade of raffia cloth, where the libongo currency changes hands and merchants from across the kingdom gather to exchange goods."
 nd_kon_jesuit_college: "Jesuit College"
 nd_kon_jesuit_college_desc: "An educational institution established by Jesuit missionaries, teaching literacy, theology, and European sciences to the sons of the Kongolese nobility."
 nd_kon_mbanza_fortress: "Mbanza Fortress"
 nd_kon_mbanza_fortress_desc: "A defensive fortification combining indigenous stockade construction with European military engineering, protecting the kingdom's key towns and strategic positions."
 nd_kon_antonine_shrine: "Antonine Shrine"
 nd_kon_antonine_shrine_desc: "A place of worship dedicated to the Antonine tradition, where the teachings of Kimpa Vita — that the sacred figures of Christianity were Kongolese — are preserved and celebrated."
 nd_kon_palm_oil_press: "Palm Oil Press"
 nd_kon_palm_oil_press_desc: "A facility for processing palm fruit into oil for export, representing the kingdom's economic adaptation to new global trade patterns."
 nd_kon_raffia_cloth_production: "Raffia Cloth Production"
 nd_kon_raffia_cloth_production_desc: "The systematic weaving of raffia palm fibers into patterned cloth, a craft that produces both trade goods and the libongo cloth currency."
 nd_kon_copper_working: "Copper Working"
 nd_kon_copper_working_desc: "Regional copper is worked into ornamental jewelry, bracelets, and trade goods valued across Central Africa."
 nd_kon_ivory_processing: "Ivory Trade"
 nd_kon_ivory_processing_desc: "Ivory from the interior passes through the market, worked with tools into finished pieces prized in the Atlantic trade."
 nd_kon_forge_maintenance: "Forge Production"
 nd_kon_forge_maintenance_desc: "Kongolese blacksmiths work iron and charcoal into tools, weapons, and the iron symbols of royal authority."
 nd_kon_shrine_offerings: "Shrine Offerings"
 nd_kon_shrine_offerings_desc: "Ritual offerings of pottery, cloth, and beeswax to maintain the spiritual power of the nkisi and sustain the community gathered around the shrine."
 nd_kon_church_maintenance: "Church Maintenance"
 nd_kon_church_maintenance_desc: "The upkeep of stone church buildings requires stone for repairs, lumber for scaffolding and furnishings, and tools for the masons working in the Kongolese-European style."
 nd_kon_cloth_market_operation: "Market Operations"
 nd_kon_cloth_market_operation_desc: "The daily operations of the cloth market, including the stocking of dyed raffia cloth for trade."
 nd_kon_college_upkeep: "College Upkeep"
 nd_kon_college_upkeep_desc: "Paper, books, and other materials needed to maintain the educational programs of the Jesuit college."
 nd_kon_fortress_garrison: "Fortress Garrison"
 nd_kon_fortress_garrison_desc: "The weapons, building materials, and leather equipment required to arm and maintain the fortress garrison."
 nd_kon_antonine_offerings: "Antonine Devotions"
 nd_kon_antonine_offerings_desc: "Incense and cloth used in the distinctive worship practices of the Antonine movement, filling the shrine with the scent of devotion and the colors of Kongolese faith."
 nd_kon_oil_processing: "Oil Processing"
 nd_kon_oil_processing_desc: "Palm fruit is pressed over wood fires and rendered into oil used for cooking, soap, and medicine — a versatile commodity prized in regional and Atlantic trade."
 levy_nd_kon_shield_warriors: "Shield Warrior Levy"
 levy_nd_kon_shield_warriors_desc: "Heavy infantry raised from the provinces, armed with large shields and swords in the Kongolese tradition."
 levy_nd_kon_lucanzos: "Lucanzos Levy"
 levy_nd_kon_lucanzos_desc: "Special detachment troops raised for raiding and unconventional warfare, drawn from the most experienced fighters of the realm."
 STATIC_MODIFIER_NAME_nd_kon_antonine_mobilization: "Antonine Mobilization"
 STATIC_MODIFIER_DESC_nd_kon_antonine_mobilization: "The fervor of the Antonine movement channels into service of the kingdom, as Kimpa Vita's followers rally to the Manikongo's banner with the devotion of the faithful."
 STATIC_MODIFIER_NAME_nd_kon_national_mobilization: "National Mobilization"
 STATIC_MODIFIER_DESC_nd_kon_national_mobilization: "The renewed pride of the Kongolese people translates into military readiness, as warriors who fight for their cultural heritage fight with a determination born of deep identity."
 nd_kon_formed_tt: "Kongo has been formed"
 nd_kon_path_a_tt: "Chose Christian Diplomacy of Kongo"
 nd_kon_path_b_tt: "Chose Strength of the Ancestors"
 nd_kon_destiny: "The Reunited Kingdom"
 nd_kon_destiny_desc: "The scattered provinces answer to a single Manikongo once more. Now the kingdom must choose its path — outward to the wider world, or inward to the forge and the ancestors."
 nd_kon_dest_embassy: "The Embassy to Rome"
 nd_kon_dest_embassy_desc: "Establish Kongo as a recognized Christian kingdom by building diplomatic and institutional ties with Europe. Embrace banking and develop the ivory trade to finance this ambition."
 nd_kon_dest_atlantic: "The Atlantic Trade Network"
 nd_kon_dest_atlantic_desc: "Extend Kongolese control over the Atlantic coast by securing the island of Sao Tome and the port of Gabun, building a trade network that connects the interior to the world."
 nd_kon_dest_christendom: "Kongo and Christendom"
 nd_kon_dest_christendom_desc: "Achieve the ultimate expression of Kongo's diplomatic vision: take Lisbon itself, master global trade, and prove that the Manikongo stands as an equal among the monarchs of Christendom."
 nd_kon_dest_interior: "Master of the Interior"
 nd_kon_dest_interior_desc: "Push Kongolese authority beyond the traditional six provinces into the Congo basin interior, subduing the Teke and establishing control over the Pool region at Boma."
 nd_kon_dest_lunda: "The Lunda March"
 nd_kon_dest_lunda_desc: "March into the copper-rich heartland of the Lunda, capturing Mussumba and the Katanga region. The wealth of the interior will fuel the empire's ambitions."
 nd_kon_dest_heart: "Heart of Africa"
 nd_kon_dest_heart_desc: "Command the entire Congo basin from the cataracts of Nyangwe to the northern reaches at Bangui. Forge the greatest empire Central Africa has ever seen."
 nd_kon.4.t: "The Kingdom Restored"
 nd_kon.4.d: "The drums sound from Mbanza Kongo to the farthest provinces. The Manikongo sits upon a throne that was never truly lost, only contested. Now the kingdom stands united once more, ready to write the next chapter of its long history."
 nd_kon.4.a: "Let the drums carry our triumph."
 nd_kon.5.t: "Envoys Across the Sea"
 nd_kon.5.d: "Kongolese ambassadors have been received in the courts of Europe, presenting gifts of ivory and fine raffia cloth. The scholars of Mbanza Kongo now study the banking systems and institutions of the West, adapting what serves the kingdom and discarding what does not. The Manikongo is recognized as a sovereign among sovereigns."
 nd_kon.5.a: "Our voice is heard in the halls of power."
 nd_kon.6.t: "Masters of the Atlantic Coast"
 nd_kon.6.d: "Kongolese ships and merchants now dominate the trade routes from Sao Tome to the Gabun coast. Ivory, copper, and fine cloth flow outward while European goods, knowledge, and currency flow in. The question now is how to use this wealth — to build a merchant fleet that rivals any in the Atlantic, or to invest in the schools and institutions that will secure the kingdom's future for generations."
 nd_kon.6.a: "Build the fleet and fill it with ivory."
 nd_kon.6.b: "Invest in schools and institutions."
 nd_kon.7.t: "The Manikongo in Lisbon"
 nd_kon.7.d: "What was once unthinkable is now reality — the banner of Kongo flies over Lisbon itself, and the Manikongo's ambassador walks the halls of the Vatican as an equal. The kingdom that the Portuguese once thought to patronize has surpassed its would-be tutors. The question now is whether to formalize this new standing through papal recognition and diplomatic prestige, or to use it as a foundation for a commercial empire that spans the Atlantic."
 nd_kon.7.a: "Seek the Pope's formal recognition."
 nd_kon.7.b: "Our merchants shall become princes."
 nd_kon.8.t: "Beyond the Six Provinces"
 nd_kon.8.d: "The armies of the Manikongo have crossed the boundaries of the traditional six provinces and planted the kingdom's banner in the lands of the Teke and the peoples of the great river's Pool region. The interior is opening before us, and the riches of the Congo basin lie within reach."
 nd_kon.8.a: "The forge demands more iron."
 nd_kon.9.t: "The Wealth of the Lunda"
 nd_kon.9.d: "The great march into the interior has reached the copper lands of the Lunda. Mussumba, seat of the Mwata Yamvo, has fallen to Kongolese arms, and the mines of Katanga now feed the royal treasury. This wealth can be extracted as tribute to fuel further expansion, or the veterans who conquered it can be honored and retained as an elite corps hardened by years of jungle campaigning."
 nd_kon.9.a: "Extract the copper tribute."
 nd_kon.9.b: "Honor our jungle veterans."
 nd_kon.10.t: "Empire of the Congo"
 nd_kon.10.d: "From the cataracts of Nyangwe to the northern reaches of Bangui, from the Atlantic coast to the copper mines of the far interior — the Manikongo commands an empire that spans the heart of Africa. No kingdom south of the Sahara has ever united so vast a territory under one throne. The iron crown of the founder-smiths now sits upon the brow of a true emperor. How shall this empire be governed — through the absolute authority of the iron throne, or through the network of rivers that binds this vast realm together?"
 nd_kon.10.a: "Rule from the iron throne."
 nd_kon.10.b: "Command the rivers, command the realm."
 STATIC_MODIFIER_NAME_nd_kon_dest_ivory_fleet: "Ivory Fleet"
 STATIC_MODIFIER_DESC_nd_kon_dest_ivory_fleet: "Kongolese merchant vessels laden with ivory, copper, and raffia cloth ply the Atlantic trade routes, enriching the kingdom's coffers and extending its commercial reach."
 STATIC_MODIFIER_NAME_nd_kon_dest_mission_schools: "Mission Schools"
 STATIC_MODIFIER_DESC_nd_kon_dest_mission_schools: "Schools established through partnerships with European missionaries spread literacy and institutional knowledge through the provinces of Kongo."
 STATIC_MODIFIER_NAME_nd_kon_dest_papal_recognition: "Papal Recognition"
 STATIC_MODIFIER_DESC_nd_kon_dest_papal_recognition: "The Pope has formally recognized the Manikongo as a sovereign Christian monarch, granting Kongo a diplomatic standing that commands respect across Christendom."
 STATIC_MODIFIER_NAME_nd_kon_dest_merchant_princes: "Merchant Princes of Kongo"
 STATIC_MODIFIER_DESC_nd_kon_dest_merchant_princes: "The merchant elite of Kongo have risen to positions of enormous influence, their trading networks spanning the Atlantic and generating wealth that reshapes the kingdom's economy."
 STATIC_MODIFIER_NAME_nd_kon_dest_copper_tribute: "Copper Tribute"
 STATIC_MODIFIER_DESC_nd_kon_dest_copper_tribute: "The conquered Lunda territories pay tribute in copper and other metals, enriching the royal treasury at the cost of diplomatic goodwill with neighbors."
 STATIC_MODIFIER_NAME_nd_kon_dest_jungle_veterans: "Jungle Veterans"
 STATIC_MODIFIER_DESC_nd_kon_dest_jungle_veterans: "Veterans of the grueling campaigns through the Congo basin's forests have become an elite fighting force, hardened by years of jungle warfare and utterly loyal to the Manikongo."
 STATIC_MODIFIER_NAME_nd_kon_dest_iron_throne: "The Iron Throne"
 STATIC_MODIFIER_DESC_nd_kon_dest_iron_throne: "The Manikongo rules as absolute emperor from the iron throne, the ancient symbol of the master smiths who founded the kingdom transformed into the seat of continental power."
 STATIC_MODIFIER_NAME_nd_kon_dest_river_kings: "River Kings"
 STATIC_MODIFIER_DESC_nd_kon_dest_river_kings: "The empire is governed through the network of rivers that connects its vast territories, with regional governors commanding the waterways that serve as highways binding the realm together."
 nd_kon_embassy_house: "Embassy House"
 nd_kon_embassy_house_desc: "A grand diplomatic residence where Kongolese and foreign envoys meet, combining European architectural elements with Kongolese design. It serves as both embassy and cultural showcase."
 nd_kon_embassy_maintenance: "Embassy Operations"
 nd_kon_embassy_maintenance_desc: "The upkeep of the embassy house requires paper for correspondence, fine cloth for diplomatic gifts, and furniture for receiving distinguished guests."
 nd_kon_royal_forge: "Royal Forge"
 nd_kon_royal_forge_desc: "The supreme forge of the Manikongo, where the finest iron and copper are worked into weapons, regalia, and tools of empire. Master smiths perform sacred rituals as they shape the metals that symbolize royal authority."
 nd_kon_royal_forge_maintenance: "Royal Forge Operations"
 nd_kon_royal_forge_maintenance_desc: "Master smiths work iron and copper with charcoal from the lumber stores, forging weapons and the iron regalia of royal authority that symbolize Kongolese power."
