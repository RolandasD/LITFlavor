l_english:
 nd_mlc_jong_tradition: "The Malay Jong"
 nd_mlc_jong_tradition_desc: "The jong was the largest vessel in Southeast Asian waters — a multi-masted trading ship capable of carrying hundreds of tons of cargo and armed with dozens of swivel guns. Malay jong shipwrights built vessels that rivaled Chinese junks in size, connecting Malacca to every port from Gujarat to Guangzhou."
 nd_mlc_gajah_perang: "Gajah Perang"
 nd_mlc_gajah_perang_desc: "The war elephant corps of the Malaccan sultans formed the backbone of the kingdom's land defense. In the 1511 siege, Sultan Mahmud Shah personally led twenty war elephants against the Portuguese invaders. The gajah perang were armored with iron plates and carried howdahs for archers, their thundering charges breaking enemy formations."
 nd_mlc_undang_undang: "Undang-Undang Melaka"
 nd_mlc_undang_undang_desc: "The comprehensive legal code of the Malacca Sultanate, blending Islamic jurisprudence with Malay adat customary law. Composed under Sultan Muhammad Shah and refined by the Bendahara, it governed civil disputes, criminal justice, trade regulations, and the rights of the ruler — one of the earliest written constitutions in Southeast Asia."
 nd_mlc_gateway_of_islam: "Gateway of Islam"
 nd_mlc_gateway_of_islam_desc: "Malacca served as the primary conduit for Islam's spread throughout Maritime Southeast Asia. Sufi teachers, Arab and Indian merchants, and Malay missionaries carried the faith from Malacca's surau prayer halls to Sumatra, Java, Borneo, and the Philippines. Conversion often followed trade — to become Muslim was to join the most powerful commercial network in the Indian Ocean."
 nd_mlc_emporium: "Emporium of the East"
 nd_mlc_emporium_desc: "At its zenith, Malacca was the greatest entrepot between India and China. The Portuguese apothecary Tome Pires wrote that 'whoever is lord of Malacca has his hand on the throat of Venice.' Eighty-four languages were spoken in its markets, where Chinese silks met Indian textiles, Moluccan spices, and Arabian perfumes."
 nd_mlc_kris_forging: "Kris Forging Tradition"
 nd_mlc_kris_forging_desc: "The kris — the wavy-bladed dagger of the Malay world — was far more than a weapon. Each blade was believed to possess a spirit, forged through rituals by the pandai besi master smiths using meteoritic iron and layered steel. The number of curves in the blade carried spiritual significance, and a sultan's kris was the symbol of his sovereignty."
 nd_mlc_laksamana_command: "Laksamana Naval Command"
 nd_mlc_laksamana_command_desc: "The Laksamana was the supreme naval commander of Malacca, guardian of the Strait and chief emissary of the Sultan. The most famous holder of this title was Hang Tuah — a polyglot warrior who spoke Arabic, Persian, Mandarin, Tamil, and Siamese, and who kept the Strait free of pirates through relentless patrol and swift justice."
 nd_mlc_tun_perak_expansion: "Tun Perak's Expansion"
 nd_mlc_tun_perak_expansion_desc: "Bendahara Tun Perak served four sultans and transformed Malacca from a trading port into a tributary empire. Under his leadership, Malacca's influence extended across the entire Malay Peninsula and eastern Sumatra, with Pahang, Terengganu, Johor, Siak, and Kampar all brought under Malaccan suzerainty."
 nd_mlc_tin_networks: "Tin Extraction Networks"
 nd_mlc_tin_networks_desc: "The tin deposits of Perak and Kedah were among the richest in the world. Malacca controlled the export of this vital metal — essential for bronze-making, pewter, and trade goods — routing it through the Strait to Chinese, Indian, and later European buyers."
 nd_mlc_multi_faith_quarters: "Multi-Faith Quarters"
 nd_mlc_multi_faith_quarters_desc: "Malacca's port was divided into four distinct quarters, each administered by a shahbandar who supervised its merchants and collected taxes. The Gujarati quarter, the Keling (South Indian) quarter, the Javanese quarter, and the Chinese quarter coexisted under the Sultan's protection — a model of cosmopolitan governance rarely matched in the medieval world."
 nd_mlc_successor_resilience: "Successor State Resilience"
 nd_mlc_successor_resilience_desc: "When Malacca fell to the Portuguese in 1511, the Malay political tradition did not die. Sultan Mahmud Shah retreated south to found Johor, while his son Muzaffar Shah was invited to rule Perak. These successor sultanates preserved Malaccan law, court protocol, and the ideal of Malay sovereignty through centuries of European encroachment."
 nd_mlc_ghali_besar: "Ghali Besar"
 nd_mlc_ghali_besar_desc: "The ghali besar — 'great galley' — was a large oared warship mounting swivel guns and carrying hundreds of fighting men. These vessels were the backbone of Malay naval power in the narrow waters of the Strait, where their shallow draft and maneuverability gave them advantages over deep-keeled European ships."
 nd_mlc_literary_golden_age: "Literary Golden Age"
 nd_mlc_literary_golden_age_desc: "The Sejarah Melayu — the Malay Annals — is one of the finest literary works of Southeast Asia, a court chronicle that traces the Malaccan dynasty from its mythical origins through the fall of the city. Alongside the hikayat epic traditions and kitab religious texts, it established Malay as the literary and diplomatic language of the archipelago."
 nd_mlc_perak_tin_boom: "Perak Tin Boom"
 nd_mlc_perak_tin_boom_desc: "By the late 16th century, European demand for tin drove unprecedented expansion of Perak's mines. The discovery of alluvial tin deposits along the Kinta Valley drew Chinese miners, Malay laborers, and European merchants, making Perak one of the wealthiest states in the peninsula."
 nd_mlc_silat_codification: "Silat Codification"
 nd_mlc_silat_codification_desc: "Silat — the martial art of the Malay world — was formalized from diverse village fighting traditions into standardized schools. The pendekar masters trained with kris, kerambit, and bare hands, developing a system that emphasized fluid motion, joint locks, and sudden explosive strikes. A pendekar's skill was measured not in brute force but in economy of movement."
 nd_mlc_bugis_alliance: "Bugis Warrior Alliance"
 nd_mlc_bugis_alliance_desc: "The Bugis of Sulawesi were renowned throughout the archipelago as warriors, traders, and seafarers. From the 17th century onward, Bugis adventurers served as mercenaries and kingmakers in Malay courts, eventually establishing their own ruling houses in Selangor and Riau. Their military prowess complemented Malay commercial networks."
 nd_mlc_strait_sovereignty: "Strait Sovereignty"
 nd_mlc_strait_sovereignty_desc: "The Strait of Malacca remains the world's most important maritime chokepoint, carrying a quarter of all global trade. Control of this narrow passage — barely 65 kilometers wide at its narrowest — has been the defining strategic asset of every power that has held it, from the Malaccan sultans to the modern era."
 nd_mlc_national_consciousness: "Malay National Consciousness"
 nd_mlc_national_consciousness_desc: "The memory of Malaccan glory became the foundation of Malay national identity. The concept of 'Melayu' — a shared identity rooted in language, Islam, and the customs of the Malaccan court — united the peninsula's diverse peoples against colonial domination and inspired movements for independence across the Malay world."
 nd_mlc_modern_tin_industry: "Modern Tin Industry"
 nd_mlc_modern_tin_industry_desc: "By the 19th century, the Malay peninsula produced over half the world's tin. Modern smelting techniques, rail transport from mines to ports, and industrial-scale dredging transformed the landscape of Perak, Selangor, and Pahang, creating vast wealth and drawing waves of immigration from China and India."
 nd_mlc_constitutional_sultanate: "Constitutional Sultanate"
 nd_mlc_constitutional_sultanate_desc: "The traditional Malay sultanate adapted to the pressures of modernity by adopting constitutional frameworks that preserved royal authority while introducing representative governance. The sultan remained the embodiment of Malay sovereignty and the protector of Islam, even as state councils and advisory bodies shared the burden of administration."
 nd_mlc.1.t: "The Undang-Undang Melaka"
 nd_mlc.1.d: "Under the wise counsel of the Bendahara, our Sultan has promulgated a comprehensive body of law — the Undang-Undang Melaka. Blending the precepts of Islamic jurisprudence with the ancient adat customs of our people, this code governs all matters from criminal justice to commercial disputes, from the rights of the ruler to the duties of the shahbandar.\n\nYet the code has two distinct dimensions. The Hukum Kanun Melaka addresses governance, morality, and social order on land, while the companion Undang-Undang Laut Melaka — composed by our shipowners — regulates all matters of maritime commerce, navigation, and the duties of captains at sea. Which body of law shall receive our greater attention and resources?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mlc.1.a: "The law of the land shall be our foundation."
 nd_mlc.1.b: "The law of the sea shall guide our ships."
 nd_mlc.2.t: "Tun Perak's Imperial Vision"
 nd_mlc.2.d: "Bendahara Tun Perak has served our sultanate with unsurpassed brilliance. Under his direction, Malacca has grown from a prosperous trading port into the center of a tributary empire stretching from Terengganu to Kampar. Pahang, Johor, and the Sumatran river states all acknowledge our suzerainty.\n\nBut Tun Perak's legacy offers two paths forward. His military campaigns secured these territories through force of arms — the threat of the Malaccan fleet and the march of the war elephants. Yet his diplomatic genius was equally formidable: arranging royal marriages, negotiating tribute agreements, and playing rival states against one another. Which aspect of his statecraft shall define our realm?"
 nd_mlc.2.a: "The sword that conquered shall continue to rule."
 nd_mlc.2.b: "The pen that bound treaties shall hold our empire together."
 nd_mlc.3.t: "The Sejarah Melayu"
 nd_mlc.3.d: "A masterwork of Malay literature has been completed at our court — the Sejarah Melayu, the Malay Annals. This extraordinary chronicle traces our dynasty's lineage from Iskandar Zulkarnain — Alexander the Great himself — through the founding of Singapore by Sang Nila Utama, the conversion to Islam at Malacca, and the glories of our sultanate.\n\nMore than mere history, the Sejarah Melayu establishes the principles of Malay kingship: that the ruler must be just, that loyalty between king and subject is a sacred covenant, and that our language and customs form a civilization worthy of remembrance. It will be read and copied in courts across the archipelago for centuries to come."
 nd_mlc.3.a: "Our story shall inspire generations."
 nd_mlc.4.t: "Gateway of Islam"
 nd_mlc.4.d: "Malacca has become the beating heart of Islam in Maritime Southeast Asia. From our surau prayer halls and madrasas, learned teachers — many of them Sufis from India and Arabia — carry the faith to the far corners of the archipelago. The conversion of Malacca's rulers gave Islam prestige; the conversion of its merchants gave Islam reach.\n\nTraders who embrace the faith gain entry to the vast commercial network stretching from the Red Sea to the South China Sea. Kings who accept Islam gain legitimacy and access to the wealth of the Indian Ocean trade. And so the faith spreads — not by the sword, but by the ledger and the prayer mat, from Aceh to Manila, from Brunei to the Moluccas."
 nd_mlc.4.a: "The light of faith illuminates the seas."
 n_nd_mlc_jong: "Malay Jong"
 n_nd_mlc_jong_desc: "The jong was the largest vessel in Southeast Asian waters — a multi-masted trading ship armed with dozens of swivel guns and capable of carrying hundreds of tons of cargo across the Indian Ocean."
 a_nd_mlc_gajah_perang: "Gajah Perang"
 a_nd_mlc_gajah_perang_desc: "War elephants of the Malaccan sultanate, armored with iron plates and carrying howdahs of archers. Their thundering charges could break any infantry formation."
 n_nd_mlc_penjajap: "Penjajap"
 n_nd_mlc_penjajap_desc: "A fast shallow-draft Malay war galley designed for patrol and interception in the narrow waters of the Strait. Swift and maneuverable, ideal for chasing pirates and enforcing the Sultan's authority."
 n_nd_mlc_ghali_besar: "Ghali Besar"
 n_nd_mlc_ghali_besar_desc: "A large oared war galley mounting swivel guns and carrying hundreds of fighting men. The ghali besar's shallow draft gave it advantage over deep-keeled European vessels in the confined waters of the Strait."
 a_nd_mlc_pendekar: "Pendekar"
 a_nd_mlc_pendekar_desc: "Masters of Silat, the Malay martial art. These elite warriors fight with kris, kerambit, and bare hands, using fluid motion and explosive strikes to overwhelm their opponents."
 a_nd_mlc_bugis_warrior: "Bugis Warriors"
 a_nd_mlc_bugis_warrior_desc: "Fierce warriors from Sulawesi, the Bugis served as mercenaries and kingmakers across the Malay world. Renowned for their discipline and aggression in battle."
 nd_mlc_surau: "Surau"
 nd_mlc_surau_desc: "An Islamic prayer hall and learning center, where Sufi teachers instruct the faithful and prepare missionaries to carry the faith across the archipelago."
 nd_mlc_gudang_rempah: "Gudang Rempah"
 nd_mlc_gudang_rempah_desc: "A great spice warehouse at the port, storing Moluccan cloves, nutmeg, and pepper for redistribution to merchants from India, Arabia, and China."
 nd_mlc_pandai_besi: "Pandai Besi"
 nd_mlc_pandai_besi_desc: "A master weapon forge where the pandai besi smiths produce the legendary Malay kris through rituals of fire and folded steel."
 nd_mlc_tin_mine_office: "Tin Mine Office"
 nd_mlc_tin_mine_office_desc: "An administrative center overseeing the extraction and taxation of tin from the peninsula's rich alluvial deposits."
 nd_mlc_modern_smeltery: "Modern Smeltery"
 nd_mlc_modern_smeltery_desc: "An industrial tin smelting facility using modern techniques to process ore at unprecedented scale."
 nd_mlc_pm_surau_upkeep: "Religious Instruction"
 nd_mlc_pm_surau_upkeep_desc: "The ongoing provision of texts and materials for Islamic education."
 nd_mlc_pm_spice_storage: "Spice Storage"
 nd_mlc_pm_spice_storage_desc: "Maintenance of warehouse facilities for storing bulk spices in controlled conditions."
 nd_mlc_pm_kris_forging: "Kris Forging"
 nd_mlc_pm_kris_forging_desc: "Master smiths forge legendary kris blades from layered iron, producing weaponry of both martial and spiritual significance."
 nd_mlc_pm_tin_administration: "Tin Administration"
 nd_mlc_pm_tin_administration_desc: "Record-keeping and administrative oversight of tin mining operations."
 nd_mlc_pm_tin_smelting: "Tin Smelting"
 nd_mlc_pm_tin_smelting_desc: "Industrial-scale smelting produces refined tin using coal-fired furnaces and iron equipment."
 STATIC_MODIFIER_NAME_nd_mlc_law_of_the_sultanate: "Law of the Sultanate"
 STATIC_MODIFIER_DESC_nd_mlc_law_of_the_sultanate: "The Hukum Kanun Melaka provides a comprehensive framework for governance, justice, and social order throughout the realm."
 STATIC_MODIFIER_NAME_nd_mlc_maritime_law: "Maritime Law of Malacca"
 STATIC_MODIFIER_DESC_nd_mlc_maritime_law: "The Undang-Undang Laut Melaka codifies the rights and duties of shipowners, captains, and merchants, bringing order to the busiest sea lanes in the world."
 STATIC_MODIFIER_NAME_nd_mlc_tun_perak_sword: "Tun Perak's Sword"
 STATIC_MODIFIER_DESC_nd_mlc_tun_perak_sword: "The military legacy of Bendahara Tun Perak — expansion through force of arms, the threat of the fleet and the charge of war elephants."
 STATIC_MODIFIER_NAME_nd_mlc_tun_perak_statecraft: "Tun Perak's Statecraft"
 STATIC_MODIFIER_DESC_nd_mlc_tun_perak_statecraft: "The diplomatic genius of Bendahara Tun Perak — binding vassals through marriage, tribute, and the subtle art of playing rivals against one another."
 levy_nd_mlc_gajah_perang: "War Elephant Levy"
 levy_nd_mlc_gajah_perang_desc: "Armored war elephants raised from the sultan's household and the nobility."
 levy_nd_mlc_pendekar: "Pendekar Levy"
 levy_nd_mlc_pendekar_desc: "Silat masters drawn from the common people and the soldier class."
 nd_mlc_formed_tt: "Malacca has been formed"
 nd_mlc_path_a_tt: "Chose Law of the Sultanate"
 nd_mlc_path_b_tt: "Chose Maritime Law of Malacca"
