l_english:
 STATIC_MODIFIER_NAME_nd_maz_piast_legacy: "Legacy of the Last Piasts"
 STATIC_MODIFIER_DESC_nd_maz_piast_legacy: "The ducal house of Mazovia, last of the Piast line, draws upon centuries of dynastic memory to forge a realm defined by noble service and frontier defense."
 STATIC_MODIFIER_NAME_nd_maz_gate_of_the_vistula: "Gate of the Vistula"
 STATIC_MODIFIER_DESC_nd_maz_gate_of_the_vistula: "Warsaw commands the great river crossing where grain, timber, and amber flow from the interior to the Baltic, and the duchy means to profit from every barge that passes."
 nd_maz.1.t: "The Duchy Ascendant"
 nd_maz.1.d: "The Mazovian lands are united under our banner, and Warsaw stands as the jewel of the Vistula. For generations, the Piast dukes of Mazovia have balanced between independence and vassalage, between the martial traditions of the petty nobility and the mercantile promise of the river trade. Now the duchy must choose its path. Shall we look inward to the legacy of the Piast bloodline — rallying our dense nobility to arms and asserting our ancient dynastic rights? Or shall we look outward along the Vistula, embracing Warsaw's potential as a great crossroads of commerce and learning?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_maz.1.a: "We are heirs of the Piasts — our blood is our strength."
 nd_maz.1.b: "The Vistula flows with gold — Warsaw shall be our gateway."
 nd_maz.2.t: "Under Mazovian Banners at Grunwald"
 nd_maz.2.d: "In the summer of 1410, the Mazovian contingent marched alongside the forces of King Wladyslaw Jagiello against the Teutonic Order at Grunwald. Duke Siemowit of Mazovia led his knights into the greatest battle the region had ever seen, and the Teutonic state was broken. The Mazovian banners flew with honor that day, and the memory of this shared triumph has bound the duchy's nobility in martial pride ever since. Our knights proved that Mazovian valor stands equal to any in Christendom."
 nd_maz.2.a: "The honor of Grunwald lives in our banners."
 nd_maz.3.t: "Warsaw — The New Capital"
 nd_maz.3.d: "Duke Janusz I has moved the ducal seat from Czersk to Warsaw, recognizing what the river crossing has become. Once a modest fishing village granted Magdeburg rights, Warsaw has grown into a thriving town of craftsmen, merchants, and petty nobles. The completion of St. John's Cathedral gave it spiritual gravity; the relocation of the ducal court gives it political authority. Granaries and wharves line the Vistula bank, and the new town spreads beyond the old walls. What was once peripheral has become central."
 nd_maz.3.a: "From this city, Mazovia shall prosper."
 nd_maz.4.t: "The Granaries of the Vistula"
 nd_maz.4.d: "Mazovian rye pours into the river warehouses at Warsaw and Plock, loaded onto flat-bottomed barges that ride the Vistula northward to the Baltic ports. The grain trade has transformed the duchy's economy, enriching the petty nobility who grow the crops and the burghers who handle the commerce. Every harvest now connects Mazovia to the wider world — the rye that grows in our fields feeds cities from Gdansk to Amsterdam."
 nd_maz.4.a: "Our harvest sustains nations."
 STATIC_MODIFIER_NAME_nd_maz_grunwald_valor: "Grunwald Valor"
 STATIC_MODIFIER_DESC_nd_maz_grunwald_valor: "The memory of Mazovian banners flying at Grunwald inspires martial courage throughout the duchy."
 STATIC_MODIFIER_NAME_nd_maz_warsaw_ascendant: "Warsaw Ascendant"
 STATIC_MODIFIER_DESC_nd_maz_warsaw_ascendant: "The transfer of the ducal seat to Warsaw has accelerated the city's growth as a center of administration and learning."
 nd_maz_piast_strongholds: "Piast Strongholds"
 nd_maz_piast_strongholds_desc: "The wooden fortified settlements along Mazovia's rivers, maintained since the earliest Piast dukes, form the backbone of frontier defense."
 nd_maz_szlachta_horsemen: "Szlachta Horsemen"
 nd_maz_szlachta_horsemen_desc: "Mazovia's petty nobility ride as light cavalry — not wealthy enough for heavy armor, but skilled horsemen who answer the ducal call in extraordinary numbers."
 nd_maz_rye_fields: "Mazovian Rye Fields"
 nd_maz_rye_fields_desc: "The lowland soils of Mazovia yield abundant harvests of rye, the staple grain that feeds the duchy and fuels its growing export trade."
 nd_maz_ducal_court_plock: "Ducal Court at Plock"
 nd_maz_ducal_court_plock_desc: "The Piast court at Plock administers the duchy with a blend of Polish custom and local Mazovian tradition."
 nd_maz_parish_churches: "Parish Churches of Mazovia"
 nd_maz_parish_churches_desc: "A network of stone and timber churches binds the Mazovian countryside together under the Catholic faith."
 nd_maz_grunwald_banners: "Grunwald Banners"
 nd_maz_grunwald_banners_desc: "The Mazovian knight contingent that fought at the Battle of Grunwald in 1410 cemented the duchy's martial reputation."
 nd_maz_czersk_castle: "Czersk Castle"
 nd_maz_czersk_castle_desc: "The brick Gothic fortress at Czersk, raised by Duke Janusz I, is the architectural symbol of Mazovian ducal power."
 nd_maz_warsaw_capital: "Warsaw — The New Capital"
 nd_maz_warsaw_capital_desc: "Duke Janusz I's transfer of the ducal seat to Warsaw in 1413 marked the city's transformation from river crossing to political center."
 nd_maz_vistula_granaries: "Vistula Granaries"
 nd_maz_vistula_granaries_desc: "River-port warehouses at Warsaw and Plock store the duchy's grain for transport down the Vistula to Baltic markets."
 nd_maz_dense_nobility: "Dense Nobility"
 nd_maz_dense_nobility_desc: "Over twenty percent of Mazovia's population claims noble status — a uniquely dense gentry class that provides manpower beyond what the duchy's size would suggest."
 nd_maz_magdeburg_charters: "Magdeburg Charters"
 nd_maz_magdeburg_charters_desc: "The adoption of Magdeburg law grants Mazovian towns self-governance, codified legal rights, and structured market regulations."
 nd_maz_pospolite_ruszenie: "Pospolite Ruszenie"
 nd_maz_pospolite_ruszenie_desc: "The general levy of Mazovia's petty nobility — the pospolite ruszenie — musters a disproportionately large militia from the duchy's dense gentry class."
 nd_maz_timber_rafting_advance: "Timber Rafting"
 nd_maz_timber_rafting_advance_desc: "Mazovian timber is assembled into great rafts and floated down the Vistula to Gdansk, connecting the duchy's forests to the Baltic shipbuilding trade."
 nd_maz_dozynki_tradition: "Dozynki Tradition"
 nd_maz_dozynki_tradition_desc: "The harvest festivals of Mazovia bind lord and peasant in shared celebration, reinforcing social bonds and cultural continuity."
 nd_maz_warsaw_new_town: "Warsaw New Town"
 nd_maz_warsaw_new_town_desc: "The expansion of Warsaw beyond its medieval walls, with new suburbs for brewers, weavers, and artisans, signals the city's growing vitality."
 nd_maz_crown_integration: "Crown Integration"
 nd_maz_crown_integration_desc: "The incorporation of Mazovia into the Polish Crown following the extinction of the Piast male line in 1526 brings new administrative connections."
 nd_maz_grain_fleet: "Vistula Grain Fleet"
 nd_maz_grain_fleet_desc: "Organized convoys of river barges carry Mazovian grain to the Baltic, making the duchy a key link in Poland's grain export trade."
 nd_maz_szlachta_privileges: "Szlachta Privileges"
 nd_maz_szlachta_privileges_desc: "The golden liberties of the Polish-Lithuanian szlachta take particular root in Mazovia, where the petty nobility's numbers give them outsized political weight."
 nd_maz_sejm_sessions: "Warsaw Sejm Sessions"
 nd_maz_sejm_sessions_desc: "The holding of Sejm sessions in Warsaw cements the city's role as the de facto political capital of the Commonwealth."
 nd_maz_agricultural_reforms: "Agricultural Reforms"
 nd_maz_agricultural_reforms_desc: "Modernized farming techniques and estate management improve yields across the Mazovian lowlands."
 nd_maz_river_customs: "River Customs Houses"
 nd_maz_river_customs_desc: "Toll stations along the Vistula extract revenue from the endless stream of barges carrying grain, timber, and goods to the sea."
 nd_maz_mazovian_resilience: "Mazovian Resilience"
 nd_maz_mazovian_resilience_desc: "Through the upheavals of partitions and foreign domination, the Mazovian identity endures — stubborn, practical, and rooted in the land."
 nd_maz_warsaw_enlightenment: "Warsaw Enlightenment"
 nd_maz_warsaw_enlightenment_desc: "The intellectual ferment of the Enlightenment reaches Warsaw, inspiring new schools, printing houses, and reform movements."
 nd_maz_industrial_vistula: "Industrial Vistula"
 nd_maz_industrial_vistula_desc: "Early manufactories spring up along the Vistula, harnessing river power and trade connections for the first stirrings of industrial production."
 nd_maz_national_identity: "Mazovian National Identity"
 nd_maz_national_identity_desc: "In an era of empires and revolutions, the distinctive Mazovian character — its dialect, customs, and noble traditions — crystallizes into a conscious regional identity."
 nd_maz_warsaw_urban_growth: "Warsaw Urban Growth"
 nd_maz_warsaw_urban_growth_desc: "Warsaw's population swells as the city expands into a true metropolis, drawing migrants from across the region with its institutions and opportunities."
 a_nd_maz_szlachta_cavalry: "Mazovian Szlachta Cavalry"
 a_nd_maz_szlachta_cavalry_desc: "Light horsemen drawn from Mazovia's dense petty nobility — not heavily armored, but numerous and skilled riders who answer the ducal call in extraordinary numbers."
 a_nd_maz_rycerz: "Mazovian Rycerz"
 a_nd_maz_rycerz_desc: "Armored Piast knights who proved their valor at Grunwald, these heavy cavalrymen are the martial elite of the Mazovian duchy."
 a_nd_maz_pospolite: "Pospolite Militia"
 a_nd_maz_pospolite_desc: "The general levy of Mazovia's petty nobility — tough defenders who fight for their own farms and families, requiring little supply from the ducal treasury."
 nd_maz_grod: "Ducal Grod"
 nd_maz_grod_desc: "A fortified timber settlement of the Piast tradition, combining garrison, granary, and administrative center along Mazovia's rivers."
 nd_maz_vistula_wharf: "Vistula Wharf"
 nd_maz_vistula_wharf_desc: "A riverside warehouse and landing where grain, timber, and goods are loaded onto barges for transport down the Vistula."
 nd_maz_kancelaria: "Mazovian Kancelaria"
 nd_maz_kancelaria_desc: "The ducal chancellery, where Magdeburg law is administered and the affairs of the duchy are recorded in increasingly systematic fashion."
 nd_maz_rye_cultivation: "Rye Cultivation"
 nd_maz_rye_cultivation_desc: "The systematic cultivation of rye on the Mazovian lowlands, suited to the sandy soils and cold winters of the region."
 nd_maz_timber_rafting: "Timber Rafting"
 nd_maz_timber_rafting_desc: "Mazovian logs are bound into great rafts and floated down the Vistula to Baltic shipyards."
 nd_maz_grod_upkeep: "Grod Maintenance"
 nd_maz_grod_upkeep_desc: "Timber palisades and weapon stores require constant upkeep."
 nd_maz_wharf_operations: "Wharf Operations"
 nd_maz_wharf_operations_desc: "The daily work of loading barges, maintaining wharves, and managing the flow of river commerce."
 nd_maz_chancellery_costs: "Chancellery Operations"
 nd_maz_chancellery_costs_desc: "Paper, ink, and scribes to maintain the administrative records of the duchy."
 levy_nd_maz_szlachta_cavalry: "Szlachta Cavalry Levy"
 levy_nd_maz_szlachta_cavalry_desc: "The petty nobles of Mazovia ride to war at the duke's call, forming a light cavalry force of remarkable density."
 a_nd_maz_pancerni: "Mazovian Pancerni"
 a_nd_maz_pancerni_desc: "Medium-armored cavalry drawn from the Mazovian szlachta, versatile horsemen who bridge the gap between light raiders and heavy lancers."
 nd_maz_pancerni_tradition: "Pancerni Cavalry Tradition"
 nd_maz_pancerni_tradition_desc: "The Mazovian pancerni — armored but agile cavalrymen — represent the evolution of the petty nobility's mounted traditions."
 nd_maz_toll_station: "Vistula Toll Station"
 nd_maz_toll_station_desc: "A customs post on the riverbank where toll collectors extract duties from every barge passing through Mazovian waters."
 nd_maz_toll_operations: "Toll Collection"
 nd_maz_toll_operations_desc: "The bureaucratic apparatus of river customs — ledgers, seals, and officials who ensure the Crown receives its share."
 nd_maz_szlachta_manor: "Szlachta Manor"
 nd_maz_szlachta_manor_desc: "The modest country estate of a Mazovian petty noble — more farm than palace, but the backbone of the duchy's manpower."
 nd_maz_manor_upkeep: "Manor Operations"
 nd_maz_manor_upkeep_desc: "Grain and livestock sustain the noble household and its retainers."
 nd_maz_printing_house: "Warsaw Printing House"
 nd_maz_printing_house_desc: "A center of Enlightenment publishing, producing books, pamphlets, and newspapers that spread new ideas across Mazovia."
 nd_maz_printing_costs: "Printing Operations"
 nd_maz_printing_costs_desc: "Paper and dyes are consumed as ink and stock by the presses, producing books and pamphlets for Warsaw's growing readership."
 nd_maz_mead_brewing: "Mead Brewing"
 nd_maz_mead_brewing_desc: "Traditional Mazovian mead, brewed from local beeswax and grain, sustains both peasant gatherings and noble feasts."
 nd_maz_sejm_records: "Parliamentary Records"
 nd_maz_sejm_records_desc: "The systematic documentation of Sejm proceedings, laws, and debates conducted in Warsaw."
 nd_maz_market_trade: "Warsaw Market Trade"
 nd_maz_market_trade_desc: "The bustling commerce of Warsaw's expanded market quarter — cloth merchants, potters, and craftsmen serving the growing city."
 nd_maz_formed_tt: "Mazovia has been formed"
 nd_maz_path_a_tt: "Chose Legacy of the Last Piasts"
 nd_maz_path_b_tt: "Chose Gate of the Vistula"
 nd_maz_destiny: "Mazovian Destiny"
 nd_maz_destiny_desc: "The duchy is formed and its future stretches before us. Mazovian destiny awaits those with the stability and vision to pursue it."
 nd_maz_dest_border_march: "Piast Border March"
 nd_maz_dest_border_march_desc: "The Teutonic frontier has long threatened Mazovia. Seize the Chelmno Land and Torun to establish a fortified border march under Piast authority."
 nd_maz_dest_crusade: "Mazovian Crusade"
 nd_maz_dest_crusade_desc: "With the border secured, the time has come to break the Teutonic state entirely. Take Marienburg and Konigsberg to dismantle the Order's power."
 nd_maz_dest_piast_shield: "Shield of the Piasts"
 nd_maz_dest_piast_shield_desc: "The Piast dynasty stands as the shield of Christendom's northern frontier. Reach Riga to command the entire eastern Baltic coast and cement Mazovian military supremacy."
 nd_maz_dest_baltic_outlet: "Baltic Outlet"
 nd_maz_dest_baltic_outlet_desc: "Mazovian grain flows down the Vistula but others profit at the river's mouth. Take Gdansk to control the Baltic outlet and keep the wealth in Mazovian hands."
 nd_maz_dest_vistula_commerce: "Vistula Commerce"
 nd_maz_dest_vistula_commerce_desc: "With the Baltic outlet secured, develop Warsaw into a major commercial center. Embrace banking, draw amber into the capital market, and build a trade empire along the river."
 nd_maz_dest_vistula_crown: "Crown of the Vistula"
 nd_maz_dest_vistula_crown_desc: "Command the entire length of the Vistula from Krakow to Gdansk. Embrace global trade and amass the wealth to make Warsaw the undisputed center of Central European commerce."
 nd_maz.5.t: "The Mazovian Destiny"
 nd_maz.5.d: "Mazovia stands united and stable. The Piast banner flies over Warsaw and the duchy's future is ours to shape. Whether through the sword or through gold, Mazovia shall leave its mark on the world."
 nd_maz.5.a: "Our destiny begins now."
 nd_maz.6.t: "The Border March Secured"
 nd_maz.6.d: "Mazovian banners now fly over Torun and the Chelmno Land. For generations the Teutonic Order harassed our northern frontier, demanding tribute and raiding our villages. No more. The border is secured, and the petty szlachta who rode to war return home as heroes. The duchy's martial reputation grows, and greater ambitions stir in the hearts of the Mazovian nobility."
 nd_maz.6.a: "The frontier is ours."
 nd_maz.7.t: "The Teutonic State Broken"
 nd_maz.7.d: "Marienburg has fallen. Konigsberg submits. The once-fearsome Teutonic Order, which terrorized our ancestors for centuries, lies broken beneath Mazovian arms. The grand castles of the Order now serve Mazovian purposes, and the wealth of Prussia's amber coast flows into our treasury. How shall we consolidate this hard-won conquest?"
 nd_maz.7.a: "Strip the Order's castles for our defense."
 nd_maz.7.b: "Rally every noble who can ride to our cause."
 nd_maz.8.t: "Shield of the Piasts"
 nd_maz.8.d: "From Warsaw to Riga, the eastern Baltic bows to Mazovian power. What began as a modest duchy on the Vistula has become a military state stretching across the northern plains. The Piast dynasty, last of its ancient line, has forged an empire through discipline and the courage of its dense szlachta cavalry. How shall history remember this achievement?"
 nd_maz.8.a: "As conquerors who dictated terms to kings."
 nd_maz.8.b: "As the bulwark that held the northern frontier."
 nd_maz.9.t: "The Baltic Outlet Secured"
 nd_maz.9.d: "Gdansk is ours. The great port at the mouth of the Vistula, where Mazovian grain and timber have always been destined, now flies the Piast banner. No longer do foreign merchants set the terms of trade for our harvest. The barges that depart Warsaw arrive at our own docks, and the wealth that once enriched Hanseatic strangers now fills Mazovian coffers."
 nd_maz.9.a: "The river's wealth flows to us at last."
 nd_maz.10.t: "Masters of the Vistula Trade"
 nd_maz.10.d: "Warsaw's markets hum with commerce. Amber and grain flow through our capital, bankers extend credit to merchants across the region, and the Vistula has become the most profitable trade artery in Central Europe. Our commercial influence extends far beyond what the duchy's modest size would suggest. How shall we leverage this position?"
 nd_maz.10.a: "Our grain feeds nations — let diplomacy follow."
 nd_maz.10.b: "Draw all roads to Warsaw through trade and treaty."
 nd_maz.11.t: "Crown of the Vistula"
 nd_maz.11.d: "From Krakow's salt mines to Gdansk's harbor, the entire Vistula corridor answers to Mazovian commerce. What other nations achieved through conquest, we built through counting houses and granaries. Warsaw stands as a great emporium of Central Europe, where merchants from the Baltic to the Black Sea come to do business. The Piast banner has become a symbol not of war, but of prosperity."
 nd_maz.11.a: "Warsaw shall be the emporium of the North."
 nd_maz.11.b: "We shall lead a league of Vistula cities."
 STATIC_MODIFIER_NAME_nd_maz_dest_teutonic_spoils: "Teutonic Spoils"
 STATIC_MODIFIER_DESC_nd_maz_dest_teutonic_spoils: "The captured fortifications and armories of the Teutonic Order have been repurposed for Mazovian defense."
 STATIC_MODIFIER_NAME_nd_maz_dest_szlachta_banners: "Szlachta Banners Unfurled"
 STATIC_MODIFIER_DESC_nd_maz_dest_szlachta_banners: "Every petty noble in Mazovia answers the call to arms, swelling our ranks but straining the treasury."
 STATIC_MODIFIER_NAME_nd_maz_dest_piast_hegemony: "Piast Hegemony"
 STATIC_MODIFIER_DESC_nd_maz_dest_piast_hegemony: "The Piast dynasty dictates terms to its neighbors from a position of unassailable military strength."
 STATIC_MODIFIER_NAME_nd_maz_dest_frontier_bulwark: "Frontier Bulwark"
 STATIC_MODIFIER_DESC_nd_maz_dest_frontier_bulwark: "Mazovia stands as an immovable bulwark on the northern frontier, drawing mercenaries and supplies from across the realm."
 STATIC_MODIFIER_NAME_nd_maz_dest_grain_fortune: "Grain Fortune"
 STATIC_MODIFIER_DESC_nd_maz_dest_grain_fortune: "The wealth generated by the Vistula grain trade opens diplomatic doors and funds intelligence networks across Europe."
 STATIC_MODIFIER_NAME_nd_maz_dest_amber_road: "Amber Road"
 STATIC_MODIFIER_DESC_nd_maz_dest_amber_road: "Control of the amber trade routes draws foreign merchants and vassals into Warsaw's commercial orbit."
 STATIC_MODIFIER_NAME_nd_maz_dest_warsaw_emporium: "Warsaw Emporium"
 STATIC_MODIFIER_DESC_nd_maz_dest_warsaw_emporium: "Warsaw's status as a great trade center projects diplomatic influence, though maintaining the commercial infrastructure diverts resources from the military."
 STATIC_MODIFIER_NAME_nd_maz_dest_vistula_league: "Vistula League"
 STATIC_MODIFIER_DESC_nd_maz_dest_vistula_league: "A confederation of Vistula trading cities under Mazovian leadership expands our diplomatic reach, though managing such a league breeds complacency."
 nd_maz_arsenal: "Mazovian Arsenal"
 nd_maz_arsenal_desc: "A centralized weapons depot and armory supplying the Piast military machine with arms, armor, and siege equipment."
 nd_maz_arsenal_upkeep: "Arsenal Operations"
 nd_maz_arsenal_upkeep_desc: "Weaponsmiths and armorers labor to keep the duchy's forces equipped with the finest arms."
 nd_maz_kontora: "Vistula Kontora"
 nd_maz_kontora_desc: "A grand counting house and trade exchange where merchants negotiate the terms of Vistula commerce under Mazovian law."
 nd_maz_kontora_operations: "Kontora Administration"
 nd_maz_kontora_operations_desc: "Clerks, factors, and scribes manage the ledgers and contracts of the Vistula's busiest trade exchange."
