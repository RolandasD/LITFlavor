l_english:
 # Formation Event — The Birth of the Baltic Nation
 nd_lva.1.t: "The Birth of the Baltic Nation"
 nd_lva.1.d: "The scattered Baltic tribes -- Curonians, Samogitians, Semigallians, Latgalians, Old Prussians -- have at last been united under a single banner. For centuries, these peoples have shared a language, a faith in the sacred groves, and a stubborn refusal to bow before foreign invaders. The Northern Crusaders broke themselves against our forest fortresses; the Amber Road carried our wealth to the courts of Europe. Now the question is: what kind of nation shall we become?\n\nThe sacred groves of Romuva still burn with the eternal flame, calling us to preserve our ancient ways and defend our forest homeland. But the amber-rich coast beckons too, promising wealth and influence for those bold enough to take to the sea.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_lva.1.a: "Guard the sacred groves and the old ways"
 nd_lva.1.b: "Claim dominion over the Amber Coast"

 # Formation Choice Modifiers
 STATIC_MODIFIER_NAME_nd_guardians_of_the_sacred_groves: "Guardians of the Sacred Groves"
 STATIC_MODIFIER_DESC_nd_guardians_of_the_sacred_groves: "The Baltic peoples draw strength from their ancient forests and sacred groves. No crusader army has conquered what the trees protect."
 STATIC_MODIFIER_NAME_nd_lords_of_the_amber_coast: "Lords of the Amber Coast"
 STATIC_MODIFIER_DESC_nd_lords_of_the_amber_coast: "The Curonians were once called the Baltic Vikings for their mastery of the sea. Now a united Baltic people turns that seafaring heritage into a commercial empire."

 # DHE Event 2 — The Battle of Saule
 nd_lva.2.t: "The Battle of Saule"
 nd_lva.2.d: "In 1236, at the marshy crossing near Saule, the Samogitians and their Curonian allies met the Livonian Brothers of the Sword in battle. The crusaders, weighed down by heavy armor in the boggy terrain, were destroyed almost to a man. Their Grand Master Volkwin fell alongside fifty knights -- the worst defeat the Baltic crusading orders ever suffered. The remnants of the Sword Brothers were absorbed into the Teutonic Order, but the lesson endured: the Baltic peoples would not submit easily. Our warriors carry the memory of Saule in their blood."
 nd_lva.2.a: "The forests remember Saule"

 # DHE Event 3 — The Sacred Flame of Romuva
 nd_lva.3.t: "The Sacred Flame of Romuva"
 nd_lva.3.d: "In the heart of the Baltic lands, deep within a sacred oak grove, burns a fire that has never been extinguished. The Kriwe-Kriwajto, highest priest of all the Baltic peoples, tends this flame as a bridge between the living and the dead. While every other pagan tradition in Europe has fallen to the Cross, the Romuva faith endures. Our people still leave offerings at the sacred stones, still whisper to the spirits of the forest, still mark the turning of seasons with ancient rites that predate Christianity by millennia. This is not mere superstition -- it is the spiritual core of Baltic identity."
 nd_lva.3.a: "The flame burns eternal"

 # DHE Event 4 — The Amber Road Ascendancy
 nd_lva.4.t: "The Amber Road Ascendancy"
 nd_lva.4.d: "Baltic amber -- the golden tears of the sun, as the ancients called it -- has been traded since the Bronze Age. From the shores of Curonia and Sambia, amber traveled south along river routes to the Mediterranean, east to the courts of Byzantium, and west to the workshops of Bruges. Now, with the Baltic tribes united, we control the source of this precious commodity entirely. We can dictate terms to every merchant who seeks our amber -- but do we tighten our grip on the trade itself, or use our position to draw merchants to our shores and profit from the flow?"
 nd_lva.4.a: "Control the amber trade routes"
 nd_lva.4.b: "Make our ports the amber gateway"

 # DHE Event 5 — The Baltic Confederation
 nd_lva.5.t: "The Baltic Confederation"
 nd_lva.5.d: "The unification of the Baltic peoples was forged in the crucible of shared struggle against the crusading orders. But now that the external threat has receded, the question of governance grows urgent. The Samogitians, Curonians, Latgalians, and Prussians each have their own traditions, their own chieftains, their own sense of identity. Should we forge a strong central authority that can direct the resources of all Baltic lands toward common purpose? Or should we honor the autonomy of each tribe, creating a confederation where local customs and freedoms are preserved?"
 nd_lva.5.a: "One ruler for all the Baltic peoples"
 nd_lva.5.b: "A confederation of free tribes"

 # DHE Timed Modifiers
 STATIC_MODIFIER_NAME_nd_saule_victory: "Victory at Saule"
 STATIC_MODIFIER_DESC_nd_saule_victory: "The crushing defeat of the Livonian Brothers of the Sword at Saule in 1236 echoes through Baltic martial tradition."
 STATIC_MODIFIER_NAME_nd_sacred_flame_of_romuva: "The Sacred Flame of Romuva"
 STATIC_MODIFIER_DESC_nd_sacred_flame_of_romuva: "The eternal flame in the sacred grove of Romuva binds the Baltic peoples to their ancestors and their ancient faith."
 STATIC_MODIFIER_NAME_nd_amber_road_dominance: "Amber Road Dominance"
 STATIC_MODIFIER_DESC_nd_amber_road_dominance: "By controlling the amber trade routes, we dictate the flow of northern gold across Europe."
 STATIC_MODIFIER_NAME_nd_amber_road_monopoly: "Amber Gateway"
 STATIC_MODIFIER_DESC_nd_amber_road_monopoly: "Our ports have become the premier destination for merchants seeking Baltic amber, drawing wealth and commerce to our shores."
 STATIC_MODIFIER_NAME_nd_confederation_centralize: "Centralized Baltic Authority"
 STATIC_MODIFIER_DESC_nd_confederation_centralize: "A strong central government directs the resources of all Baltic lands toward a common purpose."
 STATIC_MODIFIER_NAME_nd_confederation_federalize: "Baltic Tribal Federation"
 STATIC_MODIFIER_DESC_nd_confederation_federalize: "The confederation preserves the autonomy and customs of each Baltic tribe while binding them together against external threats."

 # Variable Tooltips (for destiny system)
 nd_lva_formed_tt: "The Baltic Nation has been formed."
 nd_lva_path_a_tt: "We have chosen to guard the sacred groves."
 nd_lva_path_b_tt: "We have chosen to claim the Amber Coast."

 # Advances
 nd_lva_romuva_worship: "Romuva Worship"
 nd_lva_romuva_worship_desc: "The sacred groves of the Baltic peoples, where the eternal flame burns and the Kriwe-Kriwajto communes with the spirits of the dead."
 nd_lva_curonian_warriors: "Curonian Warriors"
 nd_lva_curonian_warriors_desc: "The Curonians, feared as the Baltic Vikings, bring their fierce warrior tradition to the unified Baltic army."
 nd_lva_amber_crafting: "Amber Crafting"
 nd_lva_amber_crafting_desc: "Baltic artisans transform raw amber into jewelry, amulets, and decorative objects prized across Europe."
 nd_lva_forest_warfare: "Forest Warfare"
 nd_lva_forest_warfare_desc: "The dense forests of the Baltic lands are both home and fortress to their peoples, who know every path and clearing."
 nd_lva_hill_fort_tradition: "Hill Fort Tradition"
 nd_lva_hill_fort_tradition_desc: "The pilskalns -- Baltic hilltop fortifications of earthworks and timber -- have defended these lands for centuries."
 nd_lva_honey_wax_economy: "Honey and Wax Economy"
 nd_lva_honey_wax_economy_desc: "The vast bee forests of the Baltic region produce honey and beeswax in quantities that supply churches across Western Europe."
 nd_lva_tribal_assembly: "Tribal Assembly"
 nd_lva_tribal_assembly_desc: "The gathering of Baltic chieftains to settle disputes, allocate resources, and coordinate defense against common enemies."
 nd_lva_amber_road: "The Amber Road"
 nd_lva_amber_road_desc: "The ancient trade route carrying Baltic amber south to the Mediterranean and east to Byzantium reaches new heights of prosperity."
 nd_lva_curonian_seafaring: "Curonian Seafaring"
 nd_lva_curonian_seafaring_desc: "The Curonians mastered shipbuilding and navigation in the Viking tradition, raiding as far as Denmark and Sweden."
 nd_lva_sacred_fire: "The Sacred Fire"
 nd_lva_sacred_fire_desc: "The last pagan tradition in Europe endures in the Baltic lands, where the sacred flame of Romuva still burns."
 nd_lva_crusader_resistance: "Crusader Resistance"
 nd_lva_crusader_resistance_desc: "Decades of warfare against the Teutonic and Livonian Orders have forged the Baltic peoples into hardened defenders."
 nd_lva_forest_products: "Forest Products Trade"
 nd_lva_forest_products_desc: "Baltic furs, honey, wax, tar, and timber flow westward along established trade networks to Hanseatic markets."
 nd_lva_samogitian_cavalry: "Samogitian Cavalry"
 nd_lva_samogitian_cavalry_desc: "The horsemen of Samogitia, masters of guerrilla warfare in forested terrain, form the mobile striking force of the Baltic army."
 nd_lva_baltic_confederation: "Baltic Confederation"
 nd_lva_baltic_confederation_desc: "The political unification of the diverse Baltic tribes into a single governing structure."
 nd_lva_coastal_vigilance: "Coastal Vigilance"
 nd_lva_coastal_vigilance_desc: "Baltic tar distilleries support coastal defense, producing vital stores for shipbuilding and fortification while watchtowers guard the shoreline."
 nd_lva_pagan_resurgence: "Pagan Resurgence"
 nd_lva_pagan_resurgence_desc: "A revival of traditional Baltic religious practices reasserts the cultural identity of the Baltic peoples."
 nd_lva_baltic_trade_network: "Baltic Trade Network"
 nd_lva_baltic_trade_network_desc: "Fortified trading posts along the Baltic coast create a unified commercial network rivaling the Hansa."
 nd_lva_amber_monopoly: "Amber Monopoly"
 nd_lva_amber_monopoly_desc: "Complete control over the world's primary amber deposits gives the Baltic nation enormous economic leverage."
 nd_lva_forest_doctrine: "Forest Military Doctrine"
 nd_lva_forest_doctrine_desc: "Centuries of forest warfare are codified into formal military doctrine, with specialized garrisons in the hill forts."
 nd_lva_cultural_preservation: "Cultural Preservation"
 nd_lva_cultural_preservation_desc: "Deliberate efforts to protect Baltic languages, traditions, and customs from assimilation by neighboring powers."
 nd_lva_modern_baltic_army: "Modern Baltic Army"
 nd_lva_modern_baltic_army_desc: "A professional army combining modern tactics with the Baltic tradition of forest warfare."
 nd_lva_national_awakening: "National Awakening"
 nd_lva_national_awakening_desc: "The emergence of Baltic national consciousness, inspired by Enlightenment ideals and the rediscovery of ancient heritage."
 nd_lva_industrial_forestry: "Industrial Forestry"
 nd_lva_industrial_forestry_desc: "Modernized methods of timber harvesting and naval stores production supply the Baltic trading posts."
 nd_lva_modern_commerce: "Modern Baltic Commerce"
 nd_lva_modern_commerce_desc: "Integration of Baltic ports into modern European trade networks transforms the coastal economy."

 # Units
 a_nd_lva_curonian_raider: "Curonian Raiders"
 a_nd_lva_curonian_raider_desc: "Fierce foot warriors from the Curonian coast, feared throughout the Baltic as the Baltic Vikings for their raiding prowess."
 n_nd_lva_curonian_longship: "Curonian Longship"
 n_nd_lva_curonian_longship_desc: "A fast, shallow-draft vessel built in the Viking tradition by Curonian shipwrights. Excellent for coastal raiding and blockade."
 a_nd_lva_samogitian_horse: "Samogitian Light Horse"
 a_nd_lva_samogitian_horse_desc: "Swift cavalry from the forested highlands of Samogitia, masters of hit-and-run tactics against armored knights."
 a_nd_lva_baltic_riflemen: "Baltic Riflemen"
 a_nd_lva_baltic_riflemen_desc: "Professional infantry combining modern musketry with centuries of expertise in forest combat."

 # Buildings
 nd_lva_sacred_grove: "Sacred Grove"
 nd_lva_sacred_grove_desc: "A consecrated grove of ancient oaks where the eternal flame of Romuva burns and the Kriwe-Kriwajto performs ancestral rites."
 nd_lva_amber_workshop: "Amber Workshop"
 nd_lva_amber_workshop_desc: "A workshop where Baltic artisans process raw amber into jewelry, religious objects, and decorative pieces for export."
 nd_lva_pilskalns: "Pilskalns"
 nd_lva_pilskalns_desc: "A Baltic hilltop fortification of earthworks and timber palisades, designed to exploit the natural terrain against invaders."
 nd_lva_ostseehandel: "Baltic Trading Post"
 nd_lva_ostseehandel_desc: "A fortified coastal trading station where amber, furs, honey, and wax are exchanged with foreign merchants."

 # Production Methods
 nd_lva_sacred_grove_maintenance: "Sacred Grove Upkeep"
 nd_lva_sacred_grove_maintenance_desc: "Maintaining the sacred grove requires offerings of beeswax, timber for the eternal flame, and livestock for ritual sacrifice."
 nd_lva_amber_jewelry: "Amber Jewelry Production"
 nd_lva_amber_jewelry_desc: "Baltic amber is carved and polished into jewelry, amulets, and ornamental pieces prized across Europe."
 nd_lva_wax_leather_trade: "Wax and Leather Trade"
 nd_lva_wax_leather_trade_desc: "Processing beeswax and furs into finished leather goods and candle wax for export to western markets."
 nd_lva_tar_distillation: "Tar Distillation"
 nd_lva_tar_distillation_desc: "Producing tar from Baltic pine forests for use in shipbuilding, waterproofing, and export."
 nd_lva_amber_workshop_maintenance: "Workshop Maintenance"
 nd_lva_amber_workshop_maintenance_desc: "Tools and raw materials needed to keep the amber workshop operational."
 nd_lva_forest_garrison: "Forest Garrison"
 nd_lva_forest_garrison_desc: "A specialized garrison trained in forest warfare, equipped with horses for rapid response and weaponry for ambush tactics."
 nd_lva_pilskalns_maintenance: "Fort Garrison"
 nd_lva_pilskalns_maintenance_desc: "Timber, stone, and weapons to maintain the hill fort and equip its garrison."
 nd_lva_baltic_naval_stores: "Baltic Naval Stores"
 nd_lva_baltic_naval_stores_desc: "Processing Baltic pine lumber and tar into naval supplies for export to shipbuilding nations across Europe."
 nd_lva_ostseehandel_maintenance: "Trading Post Upkeep"
 nd_lva_ostseehandel_maintenance_desc: "Lumber, furs, and beeswax to stock and maintain the Baltic trading post."

 # Levies
 levy_nd_lva_curonian_raider: "Curonian Raider Levy"
 levy_nd_lva_curonian_raider_desc: "Fierce foot warriors from the Curonian coast raised through the tribal levy system."
 levy_nd_lva_samogitian_horse: "Samogitian Light Horse Levy"
 levy_nd_lva_samogitian_horse_desc: "Swift horsemen from the forested highlands of Samogitia, serving as the cavalry arm of the Baltic levy."

 # ===== DESTINY LOCALIZATION =====

 # Destiny Advance Names and Descriptions
 nd_lva_destiny: "Destiny of the Baltic Nation"
 nd_lva_destiny_desc: "The Baltic peoples have united. Now begins the true test: will this nation endure and grow, or crumble under the weight of its neighbors' ambitions?"

 nd_lva_dest_sacred_frontier: "The Sacred Frontier"
 nd_lva_dest_sacred_frontier_desc: "The lands east of our homeland are contested ground between Romuva and Christendom. Secure Polotsk and Vitebsk to anchor the sacred frontier."

 nd_lva_dest_pagan_kingdom: "The Pagan Kingdom"
 nd_lva_dest_pagan_kingdom_desc: "Bring the great city of Kyiv under Baltic rule and embrace meritocratic governance. Let the Orthodox see what pagan wisdom can build."

 nd_lva_dest_eternal_flame: "The Eternal Flame"
 nd_lva_dest_eternal_flame_desc: "The last pagan kingdom in Europe must become its mightiest. Conquer Moscow and Smolensk to break Christian hegemony once and for all."

 nd_lva_dest_amber_coast: "The Amber Coast"
 nd_lva_dest_amber_coast_desc: "The Hanseatic League has grown fat on Baltic trade. Seize Lubeck, the heart of their network, and redirect that wealth to our coast."

 nd_lva_dest_baltic_command: "Command the Baltic"
 nd_lva_dest_baltic_command_desc: "Control the crossroads of Baltic Sea trade by taking Visby on Gotland and the Swedish capital at Stockholm."

 nd_lva_dest_mare_balticum: "Mare Balticum"
 nd_lva_dest_mare_balticum_desc: "Make the Baltic Sea a Baltic lake. Take Copenhagen to control the Sound, and ensure amber flows through our markets to all of Europe."

 # Destiny DHE Event — Root
 nd_lva.6.t: "Destiny of the Baltic Nation"
 nd_lva.6.d: "The Baltic nation stands at the threshold of greatness. We have united the Curonians, Samogitians, Prussians, and Latgalians under a single banner -- a feat that seemed impossible when the crusading orders first marched into our forests. But unification was only the beginning. The great powers of Europe still look upon us as a barbarian curiosity, a pagan anachronism that will soon fall to the march of civilization. We shall prove them wrong."
 nd_lva.6.a: "Our destiny is our own to forge"

 # Destiny DHE Event — Path A Stage 1
 nd_lva.7.t: "The Sacred Frontier"
 nd_lva.7.d: "Our warriors have pushed eastward into the Ruthenian borderlands, planting the sacred oak where once only the cross stood. Polotsk and Vitebsk, ancient cities of the Dvina trade route, now answer to Baltic authority. The priests of Romuva follow our soldiers, rekindling the old ways in lands that had forgotten them. The frontier between the pagan Baltic world and Orthodox Christendom has shifted decisively in our favor."
 nd_lva.7.a: "The sacred oaks grow where the cross once stood"

 # Destiny DHE Event — Path A Stage 2
 nd_lva.8.t: "The Pagan Kingdom"
 nd_lva.8.d: "The capture of Kyiv sends shockwaves through Christendom. The mother of all Rus' cities, the cradle of Orthodox civilization in the east, now flies the banner of a pagan king. Chroniclers across Europe write of this event with horror and fascination in equal measure. For the Baltic peoples, it is vindication: proof that the old gods have not abandoned those who kept faith. But how shall we govern this vast realm? With the iron hand of a conqueror, or with the wisdom of a people who have survived by adaptation?"
 nd_lva.8.a: "Let the old gods march eastward"
 nd_lva.8.b: "We endure by bending without breaking"

 # Destiny DHE Event — Path A Stage 3
 nd_lva.9.t: "The Eternal Flame"
 nd_lva.9.d: "Moscow has fallen. Smolensk has fallen. The two pillars of Orthodox military power in the north have been brought under the rule of the last pagan kingdom in Europe. The eternal flame of Romuva, which the crusaders swore they would extinguish, now burns brighter than ever -- its light visible, metaphorically, from the walls of every Christian capital. This is the apex of Baltic power, the moment when the impossible became real. The question now is what kind of empire this shall be: one of unconquered warriors, or one of enlightened wisdom?"
 nd_lva.9.a: "We are the flame that never dies"
 nd_lva.9.b: "Wisdom burns brighter than any sword"

 # Destiny DHE Event — Path B Stage 1
 nd_lva.10.t: "The Amber Coast"
 nd_lva.10.d: "Lubeck, the Queen of the Hanse, has been humbled. For centuries, German merchants grew wealthy by controlling the flow of Baltic goods -- our amber, our furs, our beeswax -- to Western markets, paying a fraction of their true value. No longer. With Lubeck under our control, the entire Hanseatic trading network must reckon with Baltic power. The amber that washes up on our shores will enrich our treasuries, not those of foreign merchants."
 nd_lva.10.a: "The amber trade belongs to the Baltic"

 # Destiny DHE Event — Path B Stage 2
 nd_lva.11.t: "Command the Baltic"
 nd_lva.11.d: "Gotland and Stockholm are ours. The island of Gotland, the ancient crossroads of Baltic commerce where Viking traders once gathered, now serves as a Baltic naval base commanding the sea lanes. Stockholm, the key to Scandinavian waters, opens the northern routes to our merchants. The Curonian seafaring tradition, once dismissed as mere piracy, has evolved into the foundation of a maritime empire. The Baltic Sea is becoming our sea."
 nd_lva.11.a: "Rule the waves with iron and oak"
 nd_lva.11.b: "Build a league of amber and silver"

 # Destiny DHE Event — Path B Stage 3
 nd_lva.12.t: "Mare Balticum"
 nd_lva.12.d: "Copenhagen has fallen, and with it, control of the Danish Sound -- the narrow passage between the Baltic and the North Sea. Every ship that passes through these straits now sails under our sufferance. From Lubeck to Stockholm, from Gotland to Copenhagen, the Baltic Sea is a Baltic lake. The amber trade, once a modest stream of golden tears carried south by patient merchants, has become a torrent of wealth flowing through our kontors. The descendants of the Curonian Vikings have built an empire not of conquest alone, but of commerce, seamanship, and the golden bounty of the sea."
 nd_lva.12.a: "The Baltic Sea is our empire"
 nd_lva.12.b: "Amber kings need no crown but commerce"

 # Destiny Timed Modifiers
 STATIC_MODIFIER_NAME_nd_lva_dest_romuva_ascendant: "Romuva Ascendant"
 STATIC_MODIFIER_DESC_nd_lva_dest_romuva_ascendant: "The old faith advances where the cross retreats. Our siege engineers batter down the walls of Christian strongholds with righteous fury."
 STATIC_MODIFIER_NAME_nd_lva_dest_pagan_resilience: "Pagan Resilience"
 STATIC_MODIFIER_DESC_nd_lva_dest_pagan_resilience: "The Baltic peoples have survived crusades, famines, and plagues. This resilience now sustains our growing realm."
 STATIC_MODIFIER_NAME_nd_lva_dest_flame_unconquered: "The Flame Unconquered"
 STATIC_MODIFIER_DESC_nd_lva_dest_flame_unconquered: "No army has extinguished the sacred flame. Our warriors carry its spirit into battle -- swift, relentless, and unconquerable."
 STATIC_MODIFIER_NAME_nd_lva_dest_flame_enlightened: "The Flame Enlightened"
 STATIC_MODIFIER_DESC_nd_lva_dest_flame_enlightened: "The wisdom of the sacred flame illuminates all peoples under our rule. Integration and learning flourish in the pagan kingdom."
 STATIC_MODIFIER_NAME_nd_lva_dest_sea_dominion: "Sea Dominion"
 STATIC_MODIFIER_DESC_nd_lva_dest_sea_dominion: "Our warships command the Baltic waves. The cost of maintaining both army and fleet strains the treasury, but the sea is ours."
 STATIC_MODIFIER_NAME_nd_lva_dest_trade_league: "Baltic Trade League"
 STATIC_MODIFIER_DESC_nd_lva_dest_trade_league: "A network of Baltic trading posts replaces the Hanseatic system, channeling commerce through our ports and warehouses."
 STATIC_MODIFIER_NAME_nd_lva_dest_amber_empire: "Amber Empire"
 STATIC_MODIFIER_DESC_nd_lva_dest_amber_empire: "From Lubeck to Copenhagen, the amber trade flows through a Baltic maritime empire of unrivaled naval power."
 STATIC_MODIFIER_NAME_nd_lva_dest_merchant_princes: "Merchant Princes of the Baltic"
 STATIC_MODIFIER_DESC_nd_lva_dest_merchant_princes: "The merchant elite of the Baltic coast have become princes in all but name, their amber wealth buying peace and influence across Europe."

 # Destiny Buildings
 nd_lva_romuva_temple: "Romuva Temple"
 nd_lva_romuva_temple_desc: "A grand stone temple complex housing the eternal flame of Romuva, where the Kriwe-Kriwajto presides as the supreme spiritual authority of all Baltic peoples."
 nd_lva_amber_kontor: "Amber Kontor"
 nd_lva_amber_kontor_desc: "A grand Baltic trading house controlling the amber trade, modeled on the Hanseatic kontors but serving Baltic rather than German interests."

 # Destiny Production Methods
 nd_lva_temple_maintenance: "Temple Upkeep"
 nd_lva_temple_maintenance_desc: "Beeswax for the eternal flame, timber for the sacred structures, stone for the temple walls, and livestock for ritual offerings."
 nd_lva_kontor_maintenance: "Kontor Maintenance"
 nd_lva_kontor_maintenance_desc: "Amber, cloth, paper, and tools to maintain the trading house and its commercial operations."
