l_english:
 STATIC_MODIFIER_NAME_nd_gorkhali_conquest: "Gorkhali Conquest"
 STATIC_MODIFIER_DESC_nd_gorkhali_conquest: "The warriors of Gorkha have proven that mountains breed the fiercest soldiers. With khukuri in hand and the Himalayan winds at their back, the Gorkhali armies sweep through the valleys, conquering all who stand before them."
 STATIC_MODIFIER_NAME_nd_valley_of_temples: "Valley of Temples"
 STATIC_MODIFIER_DESC_nd_valley_of_temples: "The Kathmandu Valley stands as a living museum of divine architecture. Newari craftsmen have raised pagodas toward heaven, and the trade routes that thread through these sacred precincts carry wealth from Tibet to India."
 STATIC_MODIFIER_NAME_nd_unification_of_nepal: "Unification of Nepal"
 STATIC_MODIFIER_DESC_nd_unification_of_nepal: "The scattered kingdoms of the hills have been forged into one nation by the iron will of the Shah dynasty. The twelve districts answer to a single throne, and the administration of Nepal flows from a unified center."
 STATIC_MODIFIER_NAME_nd_himalayan_bastion: "Himalayan Bastion"
 STATIC_MODIFIER_DESC_nd_himalayan_bastion: "The mountains themselves are our fortress. Every pass is a deathtrap, every ridge a rampart. Foreign armies that march into these hills find that the terrain fights for Nepal before a single Gorkhali blade is drawn."
 STATIC_MODIFIER_NAME_nd_gurkha_renown: "Gurkha Renown"
 STATIC_MODIFIER_DESC_nd_gurkha_renown: "The bravery of the Gurkha soldier has become legend. Their discipline under fire, their fearless charges with drawn khukuri, and their tireless endurance in the most punishing terrain have earned respect across the world."
 nd_npl.1.t: "The Kingdom of Nepal"
 nd_npl.1.d: "From the snow-crowned peaks of the Himalaya to the steaming jungles of the Terai, a new kingdom takes shape. For centuries, the hills of Nepal harbored dozens of warring principalities — the Baisi and Chaubisi kingdoms, the three Malla city-states of the Kathmandu Valley, and countless petty lordships scattered across the ridges. Now they answer to a single crown.\n\nThe question before us is not whether Nepal shall endure — the mountains themselves guarantee that — but what kind of kingdom it shall become. The warriors of Gorkha who united these hills by force of arms see a martial destiny: Nepal as an unconquerable mountain fortress, its soldiers the terror of every invader who dares the passes. But the Newari craftsmen and merchants of the Valley see another path: Nepal as a bridge between civilizations, its temples drawing pilgrims, its workshops producing art that rivals any in Asia, its traders carrying salt and wool and silk across the roof of the world.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_npl.1.a: "We are the Gorkhali — the mountains are our sword and shield."
 nd_npl.1.b: "The Valley of Temples shall be the jewel of the Himalaya."
 nd_npl.2.t: "The Unification of Nepal"
 nd_npl.2.d: "On the 25th of September, 1768, as the people of Kathmandu celebrated the festival of Indra Jatra, the armies of Gorkha entered the city. The Malla king Jaya Prakash Malla fled into the night, and Prithvi Narayan Shah ascended the throne of the Kathmandu Valley. Within a year, Lalitpur and Bhaktapur had also fallen.\n\nThe young king who had inherited a tiny hill principality in 1743 had spent twenty-five years in relentless preparation. He sealed alliances, trained his soldiers in mountain warfare, cut off the Valley's trade routes to starve it into submission, and finally struck at the moment of religious celebration when the defenders were distracted. His Dibya Upadesh — the 'Divine Counsel' — laid out a political philosophy for governing the diverse peoples of his new kingdom: Nepal as a garden of many flowers, united under the Shah crown.\n\nThe fifty-four kingdoms of the hills are now one. The pajani system reviews every official annually. Birta land grants reward the loyal. Twelve districts, four in each region, carry the king's authority to every corner of the realm."
 nd_npl.2.a: "Nepal is now one kingdom, from Mechi to Mahakali."
 nd_npl.3.t: "The Anglo-Nepalese War"
 nd_npl.3.d: "The expanding borders of Nepal have collided with the interests of the British East India Company. In 1814, after years of frontier skirmishes and disputed territories in the Terai, war has broken out. The Company fields armies numbering thirty thousand men with modern artillery; Nepal's defenders number barely eight thousand.\n\nBut the Gurkhas fight on their own ground. General Amar Singh Thapa holds the western passes with stubborn determination. The British columns find their cannons useless in the mountains, their supply lines harassed by Gurkha raiders, their soldiers dropping from disease and exhaustion. It takes the most experienced British commander, David Ochterlony, two years and an innovative mountain campaign to finally force a decisive battle at Makwanpur.\n\nThe Treaty of Sugauli costs Nepal a third of its territory — but it gains something perhaps more valuable. The British, who have fought across India and the world, declare the Gurkha the most formidable infantry they have ever faced. They will never attempt to conquer Nepal again."
 nd_npl.3.a: "Our mountains are our greatest fortress — let us fortify every pass."
 nd_npl.3.b: "The world has seen what a Gurkha can do — let that reputation be our shield."
 nd_npl.4.t: "Arniko and the Pagoda Legacy"
 nd_npl.4.d: "In 1260, the young Newar architect Arniko led a delegation of eighty artisans from the Kathmandu Valley to the court of Kublai Khan in China. The Emperor, having heard of the extraordinary skill of Newari craftsmen in metalwork and temple construction, had requested their services to build a golden stupa in Tibet.\n\nArniko's genius transcended the original commission. He designed pagodas, cast bronze statues of astonishing beauty, and introduced architectural techniques that would transform building practices across the Yuan Empire. The multi-tiered pagoda style that originated in Nepal's temple squares now rises above Buddhist monasteries from Lhasa to Beijing. Arniko himself became Controller of Imperial Manufactories — a remarkable honor for a foreign artisan.\n\nThe legacy endures in every pagoda that graces the skylines of East Asia, a testament to the artistic traditions nurtured in the workshops of Patan and the temple squares of Bhaktapur."
 nd_npl.4.a: "Our craftsmen carry Nepal's glory to the far corners of the world."
 nd_npl_khas_warriors: "Khas Warriors"
 nd_npl_khas_warriors_desc: "The Khas Malla empire of western Nepal produced fierce warriors who raided as far as Tibet and the Kathmandu Valley between the 12th and 14th centuries."
 nd_npl_newari_architecture: "Newari Architecture"
 nd_npl_newari_architecture_desc: "The Newar people of the Kathmandu Valley developed a distinctive architectural tradition of multi-tiered pagoda temples, intricately carved wooden struts, and brick-and-timber construction."
 nd_npl_mountain_dwellers: "Mountain Dwellers"
 nd_npl_mountain_dwellers_desc: "Life in the Himalayan hills breeds hardiness. Armies that invade these heights face exhaustion, altitude sickness, and impassable terrain before ever meeting a Nepali soldier."
 nd_npl_himalayan_herbs: "Himalayan Herbs"
 nd_npl_himalayan_herbs_desc: "The foothills of the Himalaya produce an extraordinary variety of medicinal herbs and plants, traded throughout South Asia for centuries."
 nd_npl_malla_governance: "Malla Governance"
 nd_npl_malla_governance_desc: "The Malla kings developed sophisticated administrative systems for governing the three city-states of the Kathmandu Valley, with codified laws and court traditions."
 nd_npl_trans_himalayan_trade: "Trans-Himalayan Trade"
 nd_npl_trans_himalayan_trade_desc: "For millennia, trade routes have threaded through the Himalayan passes, carrying salt and wool from Tibet southward and grain and manufactured goods northward."
 nd_npl_patan_metalwork: "Patan Metalwork"
 nd_npl_patan_metalwork_desc: "The city of Patan, the ancient capital of Lalitpur, is renowned for its metalworking tradition. Newar artisans produce bronze sculptures and religious objects of extraordinary quality."
 nd_npl_arniko_legacy: "Arniko's Legacy"
 nd_npl_arniko_legacy_desc: "The 13th-century Newar architect Arniko carried Nepal's pagoda architectural tradition to the Yuan court, where it transformed building practices across East Asia."
 nd_npl_guthi_system: "Guthi System"
 nd_npl_guthi_system_desc: "The guthi are communal trust endowments that fund temples, festivals, and social welfare. This institution strengthens community bonds and ensures continuity of religious and cultural life."
 nd_npl_pashmina_trade: "Pashmina Trade"
 nd_npl_pashmina_trade_desc: "The fine wool of Himalayan mountain goats is woven into pashmina — prized across South Asia and beyond for its warmth and delicacy."
 nd_npl_newar_guilds: "Newar Guilds"
 nd_npl_newar_guilds_desc: "Newar society is organized around occupational guilds and caste groups, with metalworkers, carpenters, painters, and traders each specializing in crafts crucial to valley life."
 nd_npl_durbar_squares: "Durbar Squares"
 nd_npl_durbar_squares_desc: "The royal palace squares of Kathmandu, Bhaktapur, and Patan are centers of political power and artistic achievement, filled with temples, courtyards, and carved monuments."
 nd_npl_mountain_fortifications: "Mountain Fortifications"
 nd_npl_mountain_fortifications_desc: "Nepal's mountain passes and ridgelines are natural defensive positions. Fortifying them transforms already difficult terrain into impregnable strongholds."
 nd_npl_gorkhali_tradition: "Gorkhali Tradition"
 nd_npl_gorkhali_tradition_desc: "The soldiers of the Gorkha kingdom combine mountain endurance with fierce discipline. They fight with the khukuri at close quarters and know every ridge and valley of their homeland."
 nd_npl_salt_trade: "Salt Trade"
 nd_npl_salt_trade_desc: "The ancient trade in Tibetan salt passes through Nepal's mountain corridors, with Himalayan communities acting as intermediaries between Tibet's pastoral economy and India's agricultural plains."
 nd_npl_malla_renaissance: "Malla Renaissance"
 nd_npl_malla_renaissance_desc: "The later Malla period saw an explosion of artistic achievement in the Kathmandu Valley, with paubha scroll painting, bronze sculpture, and wood carving reaching extraordinary heights under royal patronage."
 nd_npl_baisi_chaubisi: "Baisi-Chaubisi Kingdoms"
 nd_npl_baisi_chaubisi_desc: "Before unification, Nepal was fragmented into the Baisi (twenty-two) and Chaubisi (twenty-four) kingdoms — a patchwork of hill principalities constantly competing through alliance, intrigue, and warfare."
 nd_npl_religious_syncretism: "Religious Syncretism"
 nd_npl_religious_syncretism_desc: "In the Kathmandu Valley, Hinduism and Buddhism have coexisted and intertwined for centuries. The same deities are worshipped under different names, and temples serve both traditions."
 nd_npl_khukuri_warriors: "Khukuri Warriors"
 nd_npl_khukuri_warriors_desc: "The forward-curved khukuri is both tool and weapon, carried by every Gorkhali soldier. In close combat, its heavy chopping blade is devastating, and its fearsome reputation precedes its wielder."
 nd_npl_mountain_warfare: "Mountain Warfare"
 nd_npl_mountain_warfare_desc: "Centuries of warfare in the hills have produced a distinctive Nepali military doctrine: hold the high ground, control the passes, harry the enemy's supply lines, and fight only when the terrain favors you."
 nd_npl_gorkha_consolidation: "Gorkha Consolidation"
 nd_npl_gorkha_consolidation_desc: "The Shah dynasty of Gorkha transforms a petty hill kingdom into a centralized state, building the military and administrative infrastructure needed for unification."
 nd_npl_pajani_system: "Pajani System"
 nd_npl_pajani_system_desc: "The annual pajani review system ensures no official grows complacent. Every year, appointments are reconsidered and land grants reconfirmed — or revoked."
 nd_npl_birta_grants: "Birta Grants"
 nd_npl_birta_grants_desc: "Tax-free birta land grants reward military service and administrative loyalty, incentivizing the expansion of the Gorkha army without overtaxing the populace."
 nd_npl_valley_commerce: "Valley Commerce"
 nd_npl_valley_commerce_desc: "The three former Malla city-states of the Kathmandu Valley — Kathmandu, Patan, and Bhaktapur — remain thriving commercial centers under the unified kingdom."
 nd_npl_gorkha_rifles: "Gorkha Rifles"
 nd_npl_gorkha_rifles_desc: "The introduction of modern firearms transforms the Gorkhali infantry into a formidable force combining European weapons technology with unmatched mountain fighting skill."
 nd_npl_shah_unification: "Shah Unification"
 nd_npl_shah_unification_desc: "Prithvi Narayan Shah conquers the Kathmandu Valley in 1768, uniting the scattered hill kingdoms into the Kingdom of Nepal and establishing the Shah dynasty as rulers of a unified state."
 nd_npl_divya_upadesh_admin: "Divya Upadesh Administration"
 nd_npl_divya_upadesh_admin_desc: "Prithvi Narayan Shah's Dibya Upadesh — the 'Divine Counsel' — lays down principles for governing Nepal's diverse peoples, describing the kingdom as a garden of many flowers."
 nd_npl_yam_between_boulders: "Yam Between Two Boulders"
 nd_npl_yam_between_boulders_desc: "Prithvi Narayan Shah warned that Nepal is a yam caught between two boulders — China to the north and India to the south. Survival demands shrewd diplomacy and unbreachable mountain defenses."
 nd_npl_anglo_nepalese_war: "Anglo-Nepalese War"
 nd_npl_anglo_nepalese_war_desc: "The 1814-1816 war with the British East India Company costs Nepal a third of its territory but earns the Gurkha a reputation as the fiercest infantry in Asia."
 nd_npl_rana_modernization: "Rana Modernization"
 nd_npl_rana_modernization_desc: "The Rana prime ministers who dominate Nepal's government from 1846 onward introduce military reforms modeled on European armies while maintaining Nepal's fierce independence."
 nd_npl_himalayan_sovereignty: "Himalayan Sovereignty"
 nd_npl_himalayan_sovereignty_desc: "Nepal stands as one of the few Asian states never colonized by a European power. Its mountain geography, martial reputation, and diplomatic skill preserve its independence."
 nd_npl_mountain_kingdom: "Mountain Kingdom Identity"
 nd_npl_mountain_kingdom_desc: "The diverse peoples of Nepal — Newar, Magar, Gurung, Limbu, Rai, Chhetri, and others — forge a shared identity as citizens of the mountain kingdom."
 a_nd_npl_khas_warrior: "Khas Warrior"
 a_nd_npl_khas_warrior_desc: "Fierce mountain infantry of the ancient Khas Malla empire, hardened by constant warfare across the western Himalayan ridges."
 a_nd_npl_gorkhali_sipahi: "Gorkhali Sipahi"
 a_nd_npl_gorkhali_sipahi_desc: "Disciplined soldiers of the Gorkha kingdom, trained in mountain warfare and armed with the distinctive khukuri alongside conventional weapons."
 a_nd_npl_khukuri_skirmisher: "Khukuri Skirmisher"
 a_nd_npl_khukuri_skirmisher_desc: "Close-combat raiders who exploit the confusion of mountain warfare, closing rapidly with their heavy khukuri blades to devastating effect."
 a_nd_npl_gorkha_rifleman: "Gorkha Rifleman"
 a_nd_npl_gorkha_rifleman_desc: "The modernized mountain infantry of Nepal, combining European firearms with the endurance, discipline, and terrain mastery that make Gurkha soldiers legendary."
 levy_nd_npl_khas_warrior: "Khas Warrior Levy"
 levy_nd_npl_khas_warrior_desc: "Mountain infantry levied from the highland Khas communities, fierce warriors hardened by life in the western Himalayan ridges."
 levy_nd_npl_khukuri_skirmisher: "Khukuri Skirmisher Levy"
 levy_nd_npl_khukuri_skirmisher_desc: "Close-combat raiders levied from Gorkhali frontier settlements, wielding the heavy forward-curved khukuri blade to devastating effect in mountain ambushes."
 nd_npl_pagoda_temple: "Pagoda Temple"
 nd_npl_pagoda_temple_desc: "A multi-tiered temple in the distinctive Newari architectural style, with intricately carved wooden struts, brick walls, and gilded rooftops rising toward the heavens."
 nd_npl_himalayan_fortress: "Himalayan Fortress"
 nd_npl_himalayan_fortress_desc: "A mountain stronghold built to control a strategic pass or ridge, exploiting the natural defensive advantages of Nepal's rugged terrain."
 nd_npl_himalayan_sarai: "Himalayan Sarai"
 nd_npl_himalayan_sarai_desc: "A rest house and trading post along the trans-Himalayan trade routes, providing shelter and storage for the caravans that carry salt, wool, and grain between Tibet and India."
 nd_npl_newari_workshop: "Newari Workshop"
 nd_npl_newari_workshop_desc: "A metalworking and woodcarving workshop staffed by Newar artisans, producing bronze sculptures, religious objects, and architectural elements of extraordinary craftsmanship."
 nd_npl_guthi_endowment: "Guthi Endowment"
 nd_npl_guthi_endowment_desc: "A communal trust institution that manages land endowments to fund temples, festivals, and social welfare. The guthi system is the bedrock of Newar community life."
 nd_npl_durbar_palace: "Durbar Palace"
 nd_npl_durbar_palace_desc: "A royal palace complex in the Malla tradition, with courtyards, audience halls, and surrounding temples that serve as the political and cultural heart of a Nepali city."
 nd_npl_gorkhali_barracks: "Gorkhali Barracks"
 nd_npl_gorkhali_barracks_desc: "A military training facility where mountain infantry learn the combat techniques that make Gorkhali soldiers feared throughout the subcontinent."
 nd_npl_temple_offerings: "Temple Offerings"
 nd_npl_temple_offerings_desc: "The sacred offerings of dyes, incense, and beeswax candles that sustain the ritual life of Nepal's pagoda temples."
 nd_npl_garrison_supply: "Garrison Supply"
 nd_npl_garrison_supply_desc: "The stone, timber, and weapons needed to maintain a Himalayan mountain fortress against all comers."
 nd_npl_salt_wool_trade: "Salt and Wool Trade"
 nd_npl_salt_wool_trade_desc: "The ancient trade in Tibetan salt and wool, carried by yak caravans across the high Himalayan passes."
 nd_npl_bronze_casting: "Bronze Casting"
 nd_npl_bronze_casting_desc: "Patan's Newar metalworkers use copper and the lost-wax technique to cast bronze sculptures and religious jewelry exported across the Buddhist world."
 nd_npl_endowment_upkeep: "Endowment Upkeep"
 nd_npl_endowment_upkeep_desc: "The grain, cloth, and incense managed by guthi trustees to sustain communal institutions, festivals, and religious observances."
 nd_npl_court_maintenance: "Court Maintenance"
 nd_npl_court_maintenance_desc: "The silks, dyes, and luxury goods required to maintain the splendor of a Nepali royal court."
 nd_npl_barracks_upkeep: "Barracks Upkeep"
 nd_npl_barracks_upkeep_desc: "The weapons, leather equipment, and tools required to arm and maintain a Gorkhali military training facility."
 nd_npl_herbal_trade: "Himalayan Herbal Trade"
 nd_npl_herbal_trade_desc: "The gathering, drying, and trade of medicinal herbs and pigment plants from the Himalayan foothills, supplying remedies and dyes across South Asia."
 nd_npl_pashmina_weaving: "Pashmina Weaving"
 nd_npl_pashmina_weaving_desc: "The weaving of fine pashmina wool from Himalayan mountain goats into shawls and textiles prized for their warmth and delicacy."
 nd_npl_salt_processing: "Himalayan Salt Processing"
 nd_npl_salt_processing_desc: "Tibetan rock salt is processed and repackaged for trade into the Indian plains, a cornerstone of Nepal's intermediary economy."
 nd_npl_paubha_painting: "Paubha Painting"
 nd_npl_paubha_painting_desc: "Traditional Newar religious scroll painting, depicting deities and mandalas with intricate detail on cloth using mineral pigments and gold leaf."
 nd_npl_arms_manufacturing: "Nepali Arms Manufacturing"
 nd_npl_arms_manufacturing_desc: "Local forges produce the weapons of the Gorkhali army, from the iconic khukuri to muskets and cannons adapted from European designs."
 nd_npl_formed_tt: "Nepal has been formed"
 nd_npl_path_a_tt: "Chose Gorkhali Conquest"
 nd_npl_path_b_tt: "Chose Valley of Temples"
 nd_npl_destiny: "Destiny of Nepal"
 nd_npl_destiny_desc: "The Kingdom of Nepal has been proclaimed. Now begins the true test: can this mountain kingdom forge a lasting destiny among the great powers of Asia? Achieve stability to set the foundations."
 nd_npl_dest_hills: "Conquest of the Hills"
 nd_npl_dest_hills_desc: "The Gorkhali sword must first unite the foothills. Seize the sacred ground of Lumbini and push into the Mithila plains at Darbhanga. Build an army worthy of mountain warriors."
 nd_npl_dest_plains: "Descent to the Plains"
 nd_npl_dest_plains_desc: "With the hills secure, the Gorkhali gaze turns south to the rich Gangetic plain. Patna and Lucknow — seats of ancient empires — must fall to Nepali arms."
 nd_npl_dest_empire: "The Gorkhali Empire"
 nd_npl_dest_empire_desc: "The ultimate vision: a Himalayan empire stretching from the rooftop of the world to the holy waters of the Ganges. Take Lhasa, the sacred city of Tibet, and Varanasi, holiest city of Hinduism."
 nd_npl_dest_trade: "Trans-Himalayan Trade"
 nd_npl_dest_trade_desc: "Control the trade routes that thread through the mountain passes. Seize Shigatse in Tibet to dominate the northern approach, and ensure silk flows through Nepali markets."
 nd_npl_dest_artisans: "The Artisan Flowering"
 nd_npl_dest_artisans_desc: "The workshops of the Valley must become legendary. Spread to Paro in Bhutan, embrace the printing press, and develop the kingdom's lands to support a renaissance of craft and learning."
 nd_npl_dest_jewel: "Jewel of the Himalaya"
 nd_npl_dest_jewel_desc: "The Kathmandu Valley shall become the cultural jewel of Asia. Extend Nepal's civilizing influence to Thimpu, embrace global trade, and ensure Newari jewelry graces the markets of the world."
 nd_npl.5.t: "The Mountain Kingdom Rises"
 nd_npl.5.d: "Nepal stands united — a single crown above the land of snow and temple. The scattered principalities that once warred among themselves have been forged into a kingdom. From the Terai jungles to the high Himalayan passes, the flag of Nepal flies.\n\nBut a kingdom newly born must prove its worth. The court debates the path forward: shall Nepal be a sword or a jewel? A mountain fortress whose warriors terrify empires, or a garden of temples whose artisans and merchants earn the admiration of the world?\n\nThe foundations are laid. What rises upon them depends on the choices yet to come."
 nd_npl.5.a: "Nepal shall endure — this we swear upon the mountains."
 nd_npl.6.t: "The Hills Submit"
 nd_npl.6.d: "The birth-soil of the Buddha at Lumbini now falls under Nepali sovereignty, and our armies have pushed across the Terai into the Mithila plains. The sacred sites and fertile lowlands that once fed rival kingdoms now sustain the Gorkhali war machine.\n\nLocal zamindars and petty rajas bend the knee or flee. The mountain warriors who once fought only among ridges and valleys have proven they can descend into the flatlands and conquer there too. Every hill fort and river crossing reinforces the lesson: the Gorkhali do not stop."
 nd_npl.6.a: "The foothills are ours. Now — the plains."
 nd_npl.7.t: "The Conquest of the Plains"
 nd_npl.7.d: "Patna, the ancient capital of Magadha, has fallen to Gorkhali arms. Lucknow, seat of the Nawabs of Awadh, follows. The mountain warriors who once seemed content with their highland kingdom have burst forth into the Gangetic heartland like a Himalayan river breaking its banks.\n\nThe conquests present a choice. We can push rapidly, sweeping through the Terai and the plains with aggressive campaigns that seize territory before our enemies can organize — speed and violence carrying the day. Or we can advance methodically, securing supply lines through the mountain passes and binding conquered peoples to Nepali rule through loyal vassals and garrison settlements."
 nd_npl.7.a: "Strike fast — speed is our weapon now."
 nd_npl.7.b: "Secure each valley before advancing to the next."
 nd_npl.8.t: "The Gorkhali Empire"
 nd_npl.8.d: "From the golden rooftops of Lhasa to the burning ghats of Varanasi, the flag of Nepal flies over lands that have humbled every conqueror in history. The Potala Palace and the Vishwanath Temple — the holiest sites of Buddhism and Hinduism alike — acknowledge Nepali sovereignty.\n\nThis is no mere hill kingdom. This is an empire that bestrides the Himalaya, controlling the trade routes between India and Central Asia, commanding the sacred geography of two great faiths, and fielding armies hardened by the most demanding terrain on earth.\n\nThe question now is how to rule. Shall Nepal extract the tribute of the conqueror, or absorb these diverse peoples into a mountain civilization that transcends any single culture?"
 nd_npl.8.a: "The conquered shall know the price of Gorkhali might."
 nd_npl.8.b: "Let every people find their place within the mountain empire."
 nd_npl.9.t: "The Trade Routes Open"
 nd_npl.9.d: "Nepali merchants now control Shigatse, the great trading town of Tsang province in Tibet. Silk caravans from China and India pass through markets where Newari traders weigh goods and set prices. The ancient dream of Nepal as a bridge between civilizations begins to take form.\n\nSalt flows south, grain flows north, and silk from both directions meets in Kathmandu's market squares. The sarais along the mountain passes bustle with traders speaking a dozen languages. Nepal's geographic position — once seen as a curse, trapped between empires — reveals itself as the kingdom's greatest asset."
 nd_npl.9.a: "The mountains do not divide — they connect."
 nd_npl.10.t: "The Artisan Flowering"
 nd_npl.10.d: "The workshops of Patan and Bhaktapur have entered a golden age. Bronze sculptures of extraordinary delicacy, paubha paintings alive with mineral pigments, and wood carvings of impossible intricacy flow from Newari workshops to courts and temples across Asia. The printing press has arrived in the Valley, and with it an explosion of religious texts and artistic manuals.\n\nNepal's cultural reach now extends to Bhutan, where Nepali-trained artisans build temples in the Newari style. The kingdom must decide how to sustain this flowering: through the discipline of guild regulation, ensuring quality through tradition, or through open markets that attract foreign artisans and ideas."
 nd_npl.10.a: "The guilds shall guard the standard of Newari craft."
 nd_npl.10.b: "Open the passes — let trade carry our art to the world."
 nd_npl.11.t: "Jewel of the Himalaya"
 nd_npl.11.d: "The Kathmandu Valley has become what Arniko's journey to the Yuan court only hinted at — the cultural and spiritual center of the Himalayan world. Newari jewelry, cast in workshops that have refined their techniques over centuries, is traded as far as Persia and Siam. Temples rise in the pagoda style from Bhutan to Bengal, all tracing their lineage to the master builders of Patan.\n\nScholars come to study at institutions where Hindu philosophy and Buddhist meditation are taught side by side. The Valley's syncretism, once a local curiosity, has become a model for religious harmony that draws admiration from far beyond the mountains.\n\nNepal must choose how to project this cultural power: through diplomatic engagement that opens doors across the world, or through deepening the Valley's role as a sacred center of pilgrimage and learning."
 nd_npl.11.a: "Let Nepal's voice be heard in every court of Asia."
 nd_npl.11.b: "The Valley itself shall be the destination — let the world come to us."
 STATIC_MODIFIER_NAME_nd_npl_dest_terai_sweep: "Sweep of the Terai"
 STATIC_MODIFIER_DESC_nd_npl_dest_terai_sweep: "The Gorkhali armies have swept through the Terai lowlands with devastating speed, but the rapid expansion strains the kingdom's treasury."
 STATIC_MODIFIER_NAME_nd_npl_dest_mountain_descent: "Mountain Descent"
 STATIC_MODIFIER_DESC_nd_npl_dest_mountain_descent: "Nepal's advance into the plains proceeds methodically, with supply lines secured through the mountain passes and conquered territories bound through loyal vassals."
 STATIC_MODIFIER_NAME_nd_npl_dest_nepal_ascendant: "Nepal Ascendant"
 STATIC_MODIFIER_DESC_nd_npl_dest_nepal_ascendant: "The Gorkhali empire is a reality. Nepal dictates terms from a position of absolute strength, its armies enriched by the spoils of conquest."
 STATIC_MODIFIER_NAME_nd_npl_dest_mountain_empire: "The Mountain Empire"
 STATIC_MODIFIER_DESC_nd_npl_dest_mountain_empire: "The diverse peoples of the Gorkhali empire are being drawn into a shared mountain civilization, though Nepal's fearsome reputation makes diplomacy difficult."
 STATIC_MODIFIER_NAME_nd_npl_dest_artisan_guild: "Guild of the Valley"
 STATIC_MODIFIER_DESC_nd_npl_dest_artisan_guild: "The Newar guilds enforce exacting standards that make Valley craftsmanship legendary. Cheap credit flows to workshops, but the focus on craft has weakened the kingdom's cavalry arm."
 STATIC_MODIFIER_NAME_nd_npl_dest_silk_road: "Himalayan Silk Road"
 STATIC_MODIFIER_DESC_nd_npl_dest_silk_road: "Nepal sits at the crossroads of civilizations, its markets open to traders of every faith and nation. The mountain passes carry wealth in both directions."
 STATIC_MODIFIER_NAME_nd_npl_dest_himalayan_jewel: "Himalayan Jewel"
 STATIC_MODIFIER_DESC_nd_npl_dest_himalayan_jewel: "Nepal's cultural diplomacy opens doors across Asia. Ambassadors and scholars carry the Valley's renown to every court, and new ideas flow back along the same channels."
 STATIC_MODIFIER_NAME_nd_npl_dest_sacred_valley: "The Sacred Valley"
 STATIC_MODIFIER_DESC_nd_npl_dest_sacred_valley: "The Kathmandu Valley has become a center of religious harmony and learning, where Hindu and Buddhist traditions enrich each other under a streamlined administration."
 nd_npl_gorkhali_citadel: "Gorkhali Citadel"
 nd_npl_gorkhali_citadel_desc: "A massive mountain citadel built to project Gorkhali power across conquered territory, with barracks, armories, and command posts for the empire's ever-expanding armies."
 nd_npl_citadel_garrison: "Citadel Garrison"
 nd_npl_citadel_garrison_desc: "The weapons, stone fortifications, and leather equipment required to maintain a Gorkhali citadel as a center of military power."
 nd_npl_valley_academy: "Valley Academy"
 nd_npl_valley_academy_desc: "A center of learning where Hindu philosophy, Buddhist meditation, and Newari artistic traditions are studied and preserved, attracting scholars from across the Himalayan world."
 nd_npl_academy_upkeep: "Academy Upkeep"
 nd_npl_academy_upkeep_desc: "The paper, books, and beeswax candles that sustain a Valley academy's scholarly activities and illuminate its reading halls."
