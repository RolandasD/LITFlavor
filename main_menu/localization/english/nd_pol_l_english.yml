l_english:
 STATIC_MODIFIER_NAME_nd_pol_golden_liberty: "Golden Liberty"
 STATIC_MODIFIER_DESC_nd_pol_golden_liberty: "The szlachta's golden liberty grants every nobleman an equal voice in the Sejm. Religious dissenters find shelter under this broad canopy of tolerance, and the legislature hums with vigorous debate — though the Crown's own authority bends before the will of the assembled gentry."
 STATIC_MODIFIER_NAME_nd_pol_piast_legacy: "Legacy of the Piasts"
 STATIC_MODIFIER_DESC_nd_pol_piast_legacy: "Invoking the memory of the Piast kings who unified the Polish lands, the Crown reasserts its authority over fractious nobles. Royal officials enforce the king's writ from Kraków to the marches, forging a disciplined state — though the szlachta grumble at their diminished prerogatives."
 nd_pol.1.t: "The Crown of Poland"
 nd_pol.1.d: "The white eagle rises once more over a united Polish kingdom. From the spires of Kraków to the plains of Mazovia, the Polish lands answer to one crown. But what kind of kingdom shall this be?\n\nThe szlachta — Poland's vast and proud nobility — have long claimed equal voice in the governance of the realm. Their tradition of golden liberty promises religious tolerance, parliamentary vigour, and a kingdom where even the humblest gentleman may shape the nation's destiny. Yet this same freedom can paralyse the state when decisive action is needed.\n\nAlternatively, the Crown may look to the Piast kings of old, who ruled with firm hands and built Poland from scattered tribes into a great Christian kingdom. Centralized authority, professional administration, and royal discipline could forge an instrument of power — though at the cost of noble goodwill.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_pol.1.a: "Let every nobleman speak freely in the Sejm!"
 nd_pol.1.b: "The king's word shall be law from Kraków to the marches."
 nd_pol_piast_reunification: "Piast Reunification"
 nd_pol_piast_reunification_desc: "The Piast dynasty's centuries-long struggle to reunify the fragmented Polish duchies forged a tradition of diplomatic marriage, negotiation, and patient consolidation that defines the Polish approach to statecraft."
 nd_pol_wieliczka_salt: "Wieliczka Salt Mines"
 nd_pol_wieliczka_salt_desc: "The royal salt mines at Wieliczka and Bochnia are among Europe's greatest treasures. Producing a third of the Crown's revenue, these vast underground galleries are managed by royal monopoly, their 'white gold' funding Poland's ambitions."
 nd_pol_nihil_novi: "Nihil Novi"
 nd_pol_nihil_novi_desc: "The 1505 act Nihil Novi nisi commune consensu — 'nothing new without the common consent' — enshrines the principle that no law may be passed without the agreement of the Sejm, making Poland's parliament a co-equal branch of governance alongside the Crown."
 nd_pol_sukiennice_trade: "Sukiennice Trade Halls"
 nd_pol_sukiennice_trade_desc: "Kraków's great Cloth Hall dominates the Main Market Square, its Renaissance arcades sheltering a bustling trade in cloth, spices, silk, salt, and lead. The Sukiennice is the commercial heart of Polish urban life."
 nd_pol_obrona_potoczna: "Obrona Potoczna"
 nd_pol_obrona_potoczna_desc: "Poland's first permanent military force, the Obrona Potoczna — 'current defense' — was established around 1500 to guard the southeastern frontier against Tatar raids. These Crown-paid cavalry patrols were the seed of a standing army."
 nd_pol_crown_arsenal: "Crown Arsenal"
 nd_pol_crown_arsenal_desc: "The royal zbrojownie — Crown arsenals — store and produce the weapons, armour, and munitions that equip Poland's professional armies. These fortified armouries enable the rapid mustering of well-equipped forces."
 nd_pol_vistula_flotilla: "Vistula River Flotilla"
 nd_pol_vistula_flotilla_desc: "Poland's river and coastal flotilla patrols the Vistula and the Baltic approaches, protecting the vital grain trade and providing a modest but growing naval capability for a traditionally land-focused power."
 nd_pol_sukiennice: "Sukiennice"
 nd_pol_sukiennice_desc: "A grand cloth hall and trading exchange in the Polish tradition, where merchants gather to trade textiles, spices, and luxury goods under Renaissance arcades."
 nd_pol_kopalnia_soli: "Kopalnia Soli"
 nd_pol_kopalnia_soli_desc: "A royal salt mine operated under Crown monopoly, extracting the 'white gold' that funds Poland's treasury and feeds the insatiable European demand for salt."
 nd_pol_zbrojownia: "Zbrojownia"
 nd_pol_zbrojownia_desc: "A fortified royal arsenal storing weapons, armour, and munitions. These Crown armouries enable the rapid equipping of professional soldiers and levied troops alike."
 a_nd_pol_obrona_potoczna: "Obrona Potoczna"
 a_nd_pol_obrona_potoczna_desc: "Crown-paid border defense cavalry patrolling Poland's southeastern frontier. Fast, disciplined scouts trained to intercept Tatar raiders before they can penetrate deep into the kingdom."
 nd_pol_cloth_exchange_pm: "Cloth Exchange"
 nd_pol_cloth_exchange_pm_desc: "The bustling trade in textiles, dyed goods, paper records, and salt that sustains the Sukiennice's commercial operations."
 nd_pol_salt_extraction_pm: "Salt Extraction"
 nd_pol_salt_extraction_pm_desc: "Mining rock salt from deep underground galleries, extracting Poland's 'white gold' for domestic use and export."
 nd_pol_arsenal_upkeep_pm: "Arsenal Operations"
 nd_pol_arsenal_upkeep_pm_desc: "The maintenance and production of weapons, firearms, leather equipment, and ironwork in the royal arsenal."
 nd_pol_formed_tt: "Poland has been formed"
 nd_pol_path_a_tt: "Chose Golden Liberty"
 nd_pol_path_b_tt: "Chose Legacy of the Piasts"
 nd_pol_destiny: "Destiny of Poland"
 nd_pol_destiny_desc: "The white eagle has risen over a united kingdom. Now the question is not whether Poland endures, but what shape its greatness will take. Stabilize the realm and chart a course for the future."
 nd_pol.2.t: "The White Eagle's Destiny"
 nd_pol.2.d: "Poland stands united and stable, its foundations secure. The choices we make now will determine whether the white eagle soars over a commonwealth of free peoples or a kingdom forged by iron and discipline. Our destiny is ours to write."
 nd_pol.2.a: "Poland endures — now let her flourish."
 nd_pol_dest_sejm: "Triumph of the Sejm"
 nd_pol_dest_sejm_desc: "Establish the Sejm as the supreme legislative body of the realm. Develop Poland's salt trade through the capital market and embrace modern banking institutions to fund the parliamentary state."
 nd_pol.3.t: "The Sejm Ascendant"
 nd_pol.3.d: "The Sejm has become the beating heart of Polish governance. Salt wealth flows through our capital markets, banking houses open their ledgers, and every nobleman — from the greatest magnate to the poorest szlachcic — may speak his mind in the chamber. The Golden Liberty is no mere slogan; it is the law of the land."
 nd_pol.3.a: "Nothing new without the common consent!"
 nd_pol_dest_confederation: "Warsaw Confederation"
 nd_pol_dest_confederation_desc: "Secure Gdansk and its Baltic trade routes for the Crown. Embrace the printing press to spread knowledge and tolerance across the realm, building the foundations of a multi-ethnic confederation."
 nd_pol.4.t: "The Confederation of Warsaw"
 nd_pol.4.d: "With Gdansk under the Crown and the printing press spreading ideas faster than ever, Poland has become a beacon of tolerance in a Europe torn by religious wars. The Confederation of Warsaw proclaims that no man shall be persecuted for his faith — a radical promise that draws merchants, scholars, and refugees to our shores. How shall we build upon this legacy?"
 nd_pol.4.a: "Let Baltic commerce enrich our confederation."
 nd_pol.4.b: "Let the persecuted find sanctuary here."
 STATIC_MODIFIER_NAME_nd_pol_dest_baltic_merchants: "Baltic Commerce"
 STATIC_MODIFIER_DESC_nd_pol_dest_baltic_merchants: "Gdansk's merchants funnel Baltic grain, amber, and timber profits through the Commonwealth's trade networks, though maintaining this commercial empire strains military budgets."
 STATIC_MODIFIER_NAME_nd_pol_dest_religious_haven: "Sanctuary of Faiths"
 STATIC_MODIFIER_DESC_nd_pol_dest_religious_haven: "Jews, Protestants, Unitarians, and Orthodox believers flock to the Commonwealth's tolerant shores, bringing knowledge and craftsmanship — though the old military traditions grow rusty in peacetime."
 nd_pol_dest_republic: "Crown of the Commonwealth"
 nd_pol_dest_republic_desc: "Unite the Lithuanian and Polish crowns in a true commonwealth of peoples. Achieve supremacy in global trade, develop the realm beyond all expectations, and prove that a republic of nobles can rival any kingdom."
 nd_pol.5.t: "Res Publica"
 nd_pol.5.d: "What began as a union of crowns has become something no one could have foreseen — a true republic of nations. Poles, Lithuanians, Ruthenians, and countless others share in the governance of the greatest parliamentary state Europe has ever known. The global trade routes carry Polish grain and Lithuanian timber to every port. Scholars debate freely in Krakow's halls. This is the Rzeczpospolita — the Commonwealth — and history has never seen its like."
 nd_pol.5.a: "A golden age of learning and prosperity!"
 nd_pol.5.b: "We are the heirs of Sarmatia reborn!"
 STATIC_MODIFIER_NAME_nd_pol_dest_golden_age: "Polish Golden Age"
 STATIC_MODIFIER_DESC_nd_pol_dest_golden_age: "The Commonwealth enters an era of unmatched cultural and economic flourishing. Development accelerates, production grows, and buildings rise across the realm at reduced cost."
 STATIC_MODIFIER_NAME_nd_pol_dest_sarmatian_ideal: "Sarmatian Ideal"
 STATIC_MODIFIER_DESC_nd_pol_dest_sarmatian_ideal: "The szlachta embrace their mythical Sarmatian heritage, forging a unique noble culture of valor, liberty, and fierce independence that shapes Polish identity for centuries."
 nd_pol_dest_silesia: "Reclamation of Silesia"
 nd_pol_dest_silesia_desc: "Reclaim the ancient Piast lands of Silesia. Seize Wroclaw and Opole, historic seats of Polish duchies lost to Bohemian suzerainty, and rebuild the Crown's military strength."
 nd_pol.6.t: "The Silesian Duchies Restored"
 nd_pol.6.d: "Wroclaw and Opole — cities founded by Piast princes, ruled by Polish dukes for centuries before falling under Bohemian dominion — fly the white eagle once more. The reconquest of Silesia demonstrates that the centralized Crown has the military power to enforce its ancient claims. The Piast legacy lives."
 nd_pol.6.a: "Silesia returns to the Polish Crown!"
 nd_pol_dest_eastern_march: "Eastern Marches"
 nd_pol_dest_eastern_march_desc: "Project royal power deep into the east. Seize Lviv and Smolensk — the keys to Ruthenia and the Russian frontier — while maintaining the treasury and army needed to hold these vast conquests."
 nd_pol.7.t: "The Eastern Frontier"
 nd_pol.7.d: "Polish banners fly over Lviv's high castle and Smolensk's ancient walls. The eastern marches — a vast frontier of forests, rivers, and contested borderlands — now answer to the Crown. But holding these conquests demands a choice: shall we fortify the frontier against all comers, or integrate these Ruthenian lands into the fabric of the kingdom?"
 nd_pol.7.a: "Fortify every crossing and mountain pass."
 nd_pol.7.b: "These are Polish lands now — integrate them."
 STATIC_MODIFIER_NAME_nd_pol_dest_frontier_fortifications: "Kresy Fortifications"
 STATIC_MODIFIER_DESC_nd_pol_dest_frontier_fortifications: "A network of frontier fortifications along the eastern marches deters invasion and bleeds attackers, though the military focus diverts resources from raw material production."
 STATIC_MODIFIER_NAME_nd_pol_dest_ruthenia_integration: "Ruthenian Integration"
 STATIC_MODIFIER_DESC_nd_pol_dest_ruthenia_integration: "Polish administrators, settlers, and institutions extend royal control over the conquered Ruthenian territories, converting and assimilating — though prestige erodes with such rapid expansion."
 nd_pol_dest_piast_crown: "Crown of the Piasts"
 nd_pol_dest_piast_crown_desc: "Complete the Piast dream. Crush the Teutonic Order by taking Konigsberg, seize Kyiv as the gateway to the southern steppes, and build a military monarchy that dominates Eastern Europe from the Baltic to the Black Sea."
 nd_pol.8.t: "Iron Crown of the Piasts"
 nd_pol.8.d: "Konigsberg has fallen. Kyiv kneels before the white eagle. From the Baltic shores to the Black Sea steppes, the lands that Piast princes once dreamed of ruling now answer to a single Polish crown. This is not the gentle republic of szlachta debate — this is a kingdom forged in iron, held by discipline, and expanded by force. The Piast dynasty's ancient vision of a great Polish monarchy, stretching from sea to sea, is finally realized."
 nd_pol.8.a: "Iron and discipline shall hold what we have won."
 nd_pol.8.b: "Govern this empire with a firm but able hand."
 STATIC_MODIFIER_NAME_nd_pol_dest_iron_crown: "Iron Discipline"
 STATIC_MODIFIER_DESC_nd_pol_dest_iron_crown: "The Crown's vast armies are forged in the tradition of the Piast warrior-kings. Rapid recovery, cheap reinforcements, and overwhelming force projection crush all opposition."
 STATIC_MODIFIER_NAME_nd_pol_dest_imperial_administration: "Royal Administration"
 STATIC_MODIFIER_DESC_nd_pol_dest_imperial_administration: "A professional royal bureaucracy governs the sprawling Polish domains, suppressing separatism and promoting prosperity through efficient centralized rule."
 nd_pol_trybunaly: "Trybunaly Koronne"
 nd_pol_trybunaly_desc: "The Crown Tribunal — the supreme appellate court of the Commonwealth, where elected noble judges settle disputes and uphold the laws of the Sejm. A symbol of governance by consent."
 nd_pol_hetmanat: "Hetmanat"
 nd_pol_hetmanat_desc: "The Hetman's military headquarters, where the Crown's senior military commander coordinates campaigns, musters levies, and maintains the arsenal of a centralized Polish war machine."
 nd_pol_tribunal_operations_pm: "Tribunal Administration"
 nd_pol_tribunal_operations_pm_desc: "The clerks, judges, and officials who maintain the Commonwealth's supreme court, consuming paper, legal books, fine cloth, and furnishings."
 nd_pol_hetman_supply_pm: "Hetman's Quartermaster"
 nd_pol_hetman_supply_pm_desc: "The quartermaster corps supplying the Hetman's army with weapons, leather goods, warhorses, and uniforms."
