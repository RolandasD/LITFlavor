l_english:
 STATIC_MODIFIER_NAME_nd_kry_mountain_wall: "Mountain Wall of the Daylamites"
 STATIC_MODIFIER_DESC_nd_kry_mountain_wall: "For centuries, the warriors of Daylam held the Alborz passes against every empire that sought to conquer them. Gilan carries this legacy forward, its armies trained in the shield wall tactics and javelin warfare that made the Daylamites feared from Baghdad to Bukhara."
 STATIC_MODIFIER_NAME_nd_kry_caspian_silk_roads: "The Silk Roads of the Caspian"
 STATIC_MODIFIER_DESC_nd_kry_caspian_silk_roads: "The mulberry groves and silk workshops of Gilan produce the finest thread in all of Asia. From Rasht's bustling bazaars to the port of Anzali, the wealth of the Caspian flows outward, carried by Armenian and Greek merchants to every corner of the known world."
 STATIC_MODIFIER_NAME_nd_kry_mountain_independence: "Mountain Independence"
 STATIC_MODIFIER_DESC_nd_kry_mountain_independence: "Beneath the canopy of the Alborz forests, the Gilani people remember what the great empires learned: that some lands are simply not worth the cost of conquest. Let the lowlanders come — the mountains will devour them as they always have."
 STATIC_MODIFIER_NAME_nd_kry_silk_integration: "Silk Integration"
 STATIC_MODIFIER_DESC_nd_kry_silk_integration: "By embracing the wider world's institutions and markets, Gilan transforms its silk wealth into lasting modernization. What the empire demands in obedience, Gilan repays tenfold in revenue — and in doing so, purchases its own indispensability."
 nd_kry.1.t: "The Founding of Gilan"
 nd_kry.1.d: "The green province of Gilan rises from the mist-shrouded forests of the Alborz, where the Caspian Sea crashes against shores lined with mulberry groves and rice paddies. For centuries, this land sheltered the Daylamite warriors who toppled caliphates and founded dynasties from their mountain strongholds. Now, united under a single banner, Gilan must choose its path: shall it embrace the fierce independence of its mountain heritage, raising armies from the highland villages that no conqueror could ever subdue? Or shall it harness the wealth of its legendary silk trade, turning the Caspian into a highway of commerce that binds distant markets to the loom-houses of Rasht and Lahijan?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_kry.1.a: "We are the heirs of Daylam — let our mountains speak"
 nd_kry.1.b: "Silk shall be our sword, and the Caspian our dominion"
 nd_kry.2.t: "Legacy of the Daylamite Warriors"
 nd_kry.2.d: "In the centuries before the rise of the Turkic dynasties, it was the men of Daylam who held the balance of power across the Islamic world. Armed with painted shields and the two-pronged zupin javelin, they formed impenetrable shield walls in the narrow mountain passes of the Alborz. The Buyid amirs who conquered Baghdad in 945 were themselves Daylamites, and their infantry remained the elite core of every Persian army for generations. Now, as Gilan rediscovers this martial heritage, the old training grounds echo once more with the clash of shield against shield and the whistle of javelins through mountain air."
 nd_kry.2.a: "The shield wall holds."
 nd_kry.3.t: "The Karkiya Dynasty"
 nd_kry.3.d: "From their capital at Lahijan, nestled between the forests of the coastal plain and the peaks of the Alborz, the Karkiya dynasty has established a Zaydi Shi'a state unlike any other. While great empires rise and fall across Persia, the Karkiya have maintained their independence through shrewd diplomacy, impassable terrain, and the loyalty of their mountain subjects. Under their patronage, Lahijan has become a center of Islamic scholarship and jurisprudence, its madrasas attracting students from across the Shi'a world even as its bazaars overflow with silk thread bound for distant markets."
 nd_kry.3.a: "Long may the Karkiya reign."
 nd_kry.4.t: "The Safavid Shadow"
 nd_kry.4.d: "The Safavid Shah has turned his gaze toward Gilan. What the Mongols, Timurids, and countless others could not accomplish by force, Shah Abbas I achieved through patient encirclement and overwhelming power. In 1592, the last Karkiya ruler was deposed, and Gilan was absorbed into the Safavid Empire. Yet this is not simply a tale of conquest — the Shah covets Gilan's silk above all else, and has made the province the cornerstone of his commercial empire. The question facing Gilan now is whether to resist this transformation or to embrace the opportunities it brings. The mountains still offer refuge to those who would fight, but the silk workshops offer a different kind of power."
 nd_kry.4.a: "The mountains have sheltered us before — they will again"
 nd_kry.4.b: "We shall weave ourselves into the fabric of empire"
 nd_kry_daylami_heritage: "Dailamite Heritage"
 nd_kry_daylami_heritage_desc: "The martial traditions of the Daylamite warriors who conquered Baghdad and founded the Buyid dynasty."
 nd_kry_shield_wall_tradition: "Shield Wall Tradition"
 nd_kry_shield_wall_tradition_desc: "The distinctive Daylamite battle formation, using tall painted shields and two-pronged zupin javelins to create an impenetrable defensive line."
 nd_kry_alborz_fortifications: "Alborz Fortifications"
 nd_kry_alborz_fortifications_desc: "The mountain fortresses of the Alborz range, ancient strongholds that have sheltered Gilan's independence for centuries."
 nd_kry_caspian_rice_paddies: "Caspian Rice Paddies"
 nd_kry_caspian_rice_paddies_desc: "The terraced rice paddies of Gilan's coastal lowlands, fed by abundant rainfall from the Caspian."
 nd_kry_caspian_sericulture: "Caspian Sericulture"
 nd_kry_caspian_sericulture_desc: "The ancient art of silk cultivation in Gilan, where mulberry groves and silkworm houses dot the lush Caspian landscape."
 nd_kry_zaydi_refuge: "Zaydi Refuge"
 nd_kry_zaydi_refuge_desc: "Gilan's mountains have sheltered Zaydi Shi'a communities since the 9th century, offering refuge from Abbasid persecution and nurturing a distinctive religious identity."
 nd_kry_karkiya_dynasty: "Karkiya Dynasty"
 nd_kry_karkiya_dynasty_desc: "The Zaydi Shi'a Karkiya dynasty that ruled eastern Gilan from Lahijan for over two centuries, maintaining independence through terrain and diplomacy."
 nd_kry_rasht_bazaar_tradition: "Rasht Bazaar Tradition"
 nd_kry_rasht_bazaar_tradition_desc: "The great bazaar of Rasht, where silk, rice, and Caspian goods have been traded since the city's founding in the Sassanian era."
 nd_kry_caspian_navigation: "Caspian Navigation"
 nd_kry_caspian_navigation_desc: "The seafaring traditions of Gilan's coastal communities, whose dhows and trading vessels ply the Caspian from Anzali to Baku and beyond."
 nd_kry_lahijan_madrasa: "Lahijan Madrasa"
 nd_kry_lahijan_madrasa_desc: "The madrasas and libraries of Lahijan, center of Zaydi learning and jurisprudence under Karkiya patronage."
 nd_kry_dual_dynasty_tolerance: "Dual Dynasty Tolerance"
 nd_kry_dual_dynasty_tolerance_desc: "The coexistence of the Sunni Amira Dobbaj dynasty in western Gilan and the Shi'a Karkiya in the east, a rare example of sectarian accommodation."
 nd_kry_highland_raiders: "Highland Raiders"
 nd_kry_highland_raiders_desc: "Light cavalry drawn from the forested mountain valleys of Gilan, skilled in rapid flanking attacks through terrain that would halt heavier horsemen."
 nd_kry_silk_monopoly: "Silk Monopoly"
 nd_kry_silk_monopoly_desc: "At its peak, Gilan produced nearly half of all Persian silk, making it the largest silk exporter in Asia and the envy of European merchants."
 nd_kry_bandar_anzali: "Bandar-e Anzali"
 nd_kry_bandar_anzali_desc: "The port of Anzali, Gilan's gateway to the Caspian Sea and the primary channel for silk exports to Russia, the Caucasus, and Central Asia."
 nd_kry_caspian_war_fleet: "Caspian War Fleet"
 nd_kry_caspian_war_fleet_desc: "Armed war galleys built in the ports of Gilan for the defense of Caspian Sea trade routes and coastal waters."
 nd_kry_caspian_fisheries: "Caspian Fisheries"
 nd_kry_caspian_fisheries_desc: "The rich fisheries of the Caspian coast, harvesting sturgeon, whitefish, and other species to feed Gilan's growing population."
 nd_kry_gilaki_literature: "Gilaki Literature"
 nd_kry_gilaki_literature_desc: "The rich literary tradition of the Gilaki language, a distinct Iranian tongue preserving poetry and chronicles dating back centuries."
 nd_kry_merchant_networks: "Merchant Networks"
 nd_kry_merchant_networks_desc: "The Armenian and Greek merchant communities who managed Gilan's silk trade, connecting the Caspian to European and Ottoman markets."
 nd_kry_safavid_integration: "Safavid Integration"
 nd_kry_safavid_integration_desc: "The transformation of Gilan under Safavid rule, as Shah Abbas I reorganized the province to maximize silk revenue for the imperial treasury."
 nd_kry_state_silk_monopoly: "State Silk Monopoly"
 nd_kry_state_silk_monopoly_desc: "The Safavid crown's direct control over Gilan's silk trade, farming out exports through Armenian merchants to maximize royal income."
 nd_kry_tofangchi_tradition: "Tofangchi Tradition"
 nd_kry_tofangchi_tradition_desc: "The Gilani tofangchi musketeers, recruited from the same mountain communities that once produced Daylamite javelin warriors."
 nd_kry_chaykhaneh_culture: "Chaykhaneh Culture"
 nd_kry_chaykhaneh_culture_desc: "The introduction of tea cultivation in Gilan's humid climate and the spread of tea houses as centers of social and intellectual life."
 nd_kry_fortress_modernization: "Fortress Modernization"
 nd_kry_fortress_modernization_desc: "The upgrade of Gilan's ancient mountain fortresses with modern firearms and improved garrison facilities."
 nd_kry_rasht_expansion: "Rasht Expansion"
 nd_kry_rasht_expansion_desc: "The growth of Rasht into Gilan's dominant urban center, its population swelling with silk workers, merchants, and administrators."
 nd_kry_modern_sericulture: "Modern Sericulture"
 nd_kry_modern_sericulture_desc: "The modernization of Gilan's silk industry with improved breeding techniques and mechanized looms."
 nd_kry_caspian_fleet: "Caspian Fleet"
 nd_kry_caspian_fleet_desc: "A modernized naval force capable of projecting Gilani power across the Caspian Sea."
 nd_kry_provincial_governance: "Provincial Governance"
 nd_kry_provincial_governance_desc: "Centralized administration of Gilan's diverse economic activities, from silk production to rice cultivation to Caspian fisheries."
 nd_kry_rice_fish_economy: "Rice and Fish Economy"
 nd_kry_rice_fish_economy_desc: "The diversified food economy of Gilan, combining irrigated rice paddies with the rich fisheries of the Caspian Sea."
 nd_kry_mountain_warfare: "Mountain Warfare"
 nd_kry_mountain_warfare_desc: "Perfected tactics for fighting in the forested mountains of the Alborz, combining traditional Daylamite methods with modern discipline."
 nd_kry_zaydi_scholarship: "Zaydi Scholarship"
 nd_kry_zaydi_scholarship_desc: "The enduring scholarly traditions of Gilan's Zaydi community, contributing to Islamic jurisprudence and philosophy."
 nd_kry_industrial_silk: "Industrial Silk Production"
 nd_kry_industrial_silk_desc: "Factory-scale silk processing using modern techniques to meet growing global demand for Persian silk textiles."
 nd_kry_anzali_modern_port: "Modern Port of Anzali"
 nd_kry_anzali_modern_port_desc: "The transformation of Bandar-e Anzali into a modern port facility, handling the bulk of Caspian Sea commerce."
 nd_kry_gilani_constitutionalism: "Gilani Constitutionalism"
 nd_kry_gilani_constitutionalism_desc: "Gilan's tradition of independent governance finds new expression in the constitutional movement, as merchants and scholars advocate for representative institutions."
 nd_kry_enlightened_province: "Enlightened Province"
 nd_kry_enlightened_province_desc: "The flowering of Enlightenment thought in Gilan, nourished by the province's longstanding tradition of intellectual tolerance and Zaydi rationalism."
 nd_kry_gilani_identity: "Gilani Identity"
 nd_kry_gilani_identity_desc: "A mature national consciousness forged from Daylamite martial heritage, Zaydi religious identity, Gilaki linguistic distinctiveness, and centuries of silk-funded prosperity."
 nd_kry_economic_diversification: "Economic Diversification"
 nd_kry_economic_diversification_desc: "The expansion of Gilan's economy beyond silk into tea, rice, fisheries, and manufacturing, building resilience against the decline of any single commodity."
 a_nd_kry_zupin_thrower: "Zupin Throwers"
 a_nd_kry_zupin_thrower_desc: "Elite javelin skirmishers armed with the two-pronged zupin, the signature weapon of the Daylamite warriors. Fast and deadly at range, they harass enemy formations before the shield wall closes."
 a_nd_kry_daylami_shieldwall: "Dailamite Shield Wall"
 a_nd_kry_daylami_shieldwall_desc: "Heavy infantry trained in the ancient Daylamite art of the shield wall. Armed with tall painted shields, battle axes, and zupin javelins, they form an impenetrable defensive line in mountain terrain."
 n_nd_kry_caspian_dhow: "Caspian Dhow"
 n_nd_kry_caspian_dhow_desc: "A sturdy trading vessel designed for the Caspian Sea, carrying bales of Gilan silk from Anzali to the ports of Russia, the Caucasus, and Transoxiana."
 a_nd_kry_mountain_raider: "Gilani Mountain Raider"
 a_nd_kry_mountain_raider_desc: "Light cavalry from the forested mountain valleys of Gilan, skilled in rapid flanking attacks through terrain that would halt heavier horsemen. They sacrifice armored durability for speed and maneuverability."
 a_nd_kry_tofangchi_gilani: "Tofangchi-ye Gilani"
 a_nd_kry_tofangchi_gilani_desc: "Gilani musketeers recruited from the mountain communities of the Alborz. Inheriting the Daylamite tradition of disciplined infantry, they wield firearms with the same tenacity their ancestors brought to the zupin."
 n_nd_kry_caspian_war_galley: "Caspian War Galley"
 n_nd_kry_caspian_war_galley_desc: "An armed galley designed for operations in the enclosed waters of the Caspian Sea, with reinforced hull and heavier armament than standard merchant galleys."
 nd_kry_abrisham_khaneh: "Abrisham Khaneh"
 nd_kry_abrisham_khaneh_desc: "A silk workshop where skilled artisans raise silkworms on mulberry leaves and weave the thread into fine fabrics. Gilan's silk workshops are the foundation of its legendary export trade."
 nd_kry_qaleh_rudkhan: "Qaleh Rudkhan"
 nd_kry_qaleh_rudkhan_desc: "A mountain fortress perched among the dense forests of the Alborz range, controlling the passes that lead into Gilan's heartland. These strongholds have sheltered the province's independence since ancient times."
 nd_kry_bazaar_rasht: "Bazaar-e Rasht"
 nd_kry_bazaar_rasht_desc: "The great covered market of Rasht, where silk merchants, rice traders, and Caspian fishermen converge. Armenian and Greek traders maintain permanent quarters here, connecting Gilan to world markets."
 nd_kry_madrasa_lahijan: "Madrasa-ye Lahijan"
 nd_kry_madrasa_lahijan_desc: "A center of Zaydi Shi'a scholarship in the Karkiya capital of Lahijan, teaching jurisprudence, theology, and the sciences under clerical patronage."
 nd_kry_chaykhaneh: "Chaykhaneh"
 nd_kry_chaykhaneh_desc: "A traditional Gilani tea house serving as a gathering place for merchants, scholars, and common folk alike. These social institutions foster cultural unity and local prosperity."
 nd_kry_shilat_khaneh: "Shilat-khaneh"
 nd_kry_shilat_khaneh_desc: "A Caspian fishery facility managing the harvest of sturgeon, whitefish, and other species from the rich waters off Gilan's coast."
 nd_kry_silk_weaving: "Silk Weaving"
 nd_kry_silk_weaving_desc: "Weaves raw silk thread into fine cloth using dyes and techniques refined over generations of Gilani craftsmanship."
 nd_kry_advanced_silk_processing: "Advanced Silk Processing"
 nd_kry_advanced_silk_processing_desc: "Advanced dyeing and weaving techniques transform greater quantities of raw silk into luxurious fine cloth prized across the Persian world."
 nd_kry_fortress_upkeep: "Fortress Garrison"
 nd_kry_fortress_upkeep_desc: "The standing garrison and maintenance of the mountain fortress, requiring stone for repairs and weapons for the defenders."
 nd_kry_modernized_garrison: "Modernized Garrison"
 nd_kry_modernized_garrison_desc: "An upgraded fortress garrison equipped with firearms alongside traditional weaponry, reflecting the transformation of mountain warfare."
 nd_kry_caspian_trade_goods: "Caspian Trade Goods"
 nd_kry_caspian_trade_goods_desc: "The flow of rice and silk through Rasht's bazaar, connecting Gilan's agricultural bounty with the merchant networks of the wider world."
 nd_kry_expanded_caravanserai: "Expanded Caravanserai"
 nd_kry_expanded_caravanserai_desc: "An expanded trading operation handling rice, silk, and the newly introduced tea, reflecting Gilan's growing commercial importance under state patronage."
 nd_kry_zaydi_teaching: "Zaydi Teaching"
 nd_kry_zaydi_teaching_desc: "The scholarly curriculum of the Lahijan madrasa, producing jurists, theologians, and administrators trained in the Zaydi tradition."
 nd_kry_sturgeon_fishing: "Sturgeon Fishing"
 nd_kry_sturgeon_fishing_desc: "Specialized fishing operations harvesting the Caspian's prized sturgeon. Salt is essential for preserving the catch for transport to distant markets."
 nd_kry_tea_service: "Tea Service"
 nd_kry_tea_service_desc: "The tea service of the chaykhaneh, consuming imported tea and locally produced pottery to create a gathering place that binds communities together."
 levy_nd_kry_daylami_shieldwall: "Dailamite Shield Wall Levy"
 levy_nd_kry_daylami_shieldwall_desc: "Mountain villagers trained in the ancient shield wall formation, called up to defend Gilan's passes in times of war."
 nd_kry_formed_tt: "Gilan has been formed"
 nd_kry_path_a_tt: "Chose Mountain Wall of the Daylamites"
 nd_kry_path_b_tt: "Chose The Silk Roads of the Caspian"
 nd_kry_destiny: "Destiny of Gilan"
 nd_kry_destiny_desc: "With the formation of Gilan complete, a greater destiny awaits. Stabilize the new state and choose the path that will define its future."
 nd_kry_dest_alborz_dominion: "Alborz Dominion"
 nd_kry_dest_alborz_dominion_desc: "Secure the Caspian littoral from Tabaristan to Gorgan. The Daylamite warriors who once marched from these mountains to conquer Baghdad shall rise again under Gilani banners."
 nd_kry_dest_persian_bulwark: "Persian Bulwark"
 nd_kry_dest_persian_bulwark_desc: "Seize Tabriz and Ardabil, the great cities of Azerbaijan. With these strongholds, Gilan commands the mountain passes between the Caspian and the Persian heartland."
 nd_kry_dest_daylami_imperium: "Daylami Imperium"
 nd_kry_dest_daylami_imperium_desc: "From Isfahan to Derbent, the new Buyid dynasty shall rule. Take the throne of Persia and hold the Caucasus gate, completing what the Daylamite amirs began a thousand years ago."
 nd_kry_dest_silk_crossroads: "Silk Crossroads"
 nd_kry_dest_silk_crossroads_desc: "Seize Qazvin and Soltaniyeh, the great crossroads where the silk caravans from Gilan meet the merchants of Persia. Control the inland routes and the wealth will follow."
 nd_kry_dest_caspian_emporium: "Caspian Emporium"
 nd_kry_dest_caspian_emporium_desc: "Make Gilan the undisputed center of Caspian commerce. Ensure silk flows through the capital market and embrace the banking institutions that will finance a trading empire."
 nd_kry_dest_golden_thread: "The Golden Thread"
 nd_kry_dest_golden_thread_desc: "Extend the silk roads from the Caspian to the Persian Gulf. With Hormuz in hand and global trade embraced, Gilani merchants shall bind two seas together in a web of golden thread."
 nd_kry.5.t: "The Destiny of Gilan"
 nd_kry.5.d: "The green banner of Gilan flies above a united realm. The misty forests of the Alborz, the mulberry groves of the lowlands, the busy wharves of Anzali -- all answer to a single authority for the first time in generations. But formation is only the beginning. The world beyond these mountains is vast, and Gilan must find its purpose within it. Will we look inward, fortifying the mountain passes that have sheltered our independence, or outward, following the silk threads that connect our looms to every corner of the earth?"
 nd_kry.5.a: "Gilan's destiny begins today."
 nd_kry.6.t: "Dominion of the Alborz"
 nd_kry.6.d: "Gilani soldiers stand watch over Tabaristan and Gorgan. The entire southern shore of the Caspian Sea, from the marshes of the Sefid Rud to the steppe frontier at Astarabad, falls under our protection. The old Dailamite heartland is reunited at last. Our commanders report that the mountain passes are secured and the coastal plain lies open before us. The question now is how far the sons of Daylam dare to march."
 nd_kry.6.a: "The mountains are ours. The plains will follow."
 nd_kry.7.t: "The Bulwark of Persia"
 nd_kry.7.d: "Tabriz has fallen. The jewel of Azerbaijan, seat of Il-Khanid emperors and Qara Qoyunlu kings, now answers to the mountain lords of Gilan. With Ardabil secured as well -- the very birthplace of the Safavid order -- our realm straddles the boundary between the Caucasus and the Iranian plateau. We stand at a crossroads: do we press forward with the aggressive momentum that brought us here, or consolidate these hard-won gains into an unbreakable defensive position?"
 nd_kry.7.a: "Push forward -- the momentum is ours."
 nd_kry.7.b: "Fortify what we hold -- let them break upon us."
 nd_kry.8.t: "The Daylami Imperium"
 nd_kry.8.d: "Isfahan, the half of the world, kneels before the mountain dynasty. From the Caucasus gate at Derbent to the ancient seat of the Median kings at Hamadan, the realm of the new Buyid amirs surpasses even the domains of their illustrious predecessors. The scholars of the court debate whether this achievement calls for aggressive expansion in the Buyid tradition -- marching on Baghdad as Ahmad ibn Buya once did -- or for the patient consolidation of a highland empire that can outlast any challenger."
 nd_kry.8.a: "March outward -- we are the new Buyids."
 nd_kry.8.b: "Rule from the mountains -- our realm is fortress enough."
 nd_kry.9.t: "The Silk Crossroads"
 nd_kry.9.d: "The caravansaries of Qazvin and Soltaniyeh now fly Gilani colors. Every bale of silk leaving the loom-houses of Rasht and Lahijan passes through our territory on its way to the markets of the wider world. The Armenian merchants who once negotiated with foreign governors now deal directly with us. The inland trade routes are ours, and with them, the leverage to reshape commerce across Persia."
 nd_kry.9.a: "The crossroads belong to Gilan now."
 nd_kry.10.t: "The Caspian Emporium"
 nd_kry.10.d: "Silk flows through every market in our domain. The banking institutions that once enriched the merchants of Italy now serve Gilani traders, financing ventures that would have been impossible a generation ago. Our port at Anzali hums with activity as ships from every Caspian shore compete to buy what our looms produce. The question is how best to leverage this wealth: shall we invest in vertical integration, controlling every stage from silkworm to finished cloth? Or shall we focus on monopolizing the markets themselves, squeezing out competitors through sheer financial power?"
 nd_kry.10.a: "Control the production -- from worm to cloth."
 nd_kry.10.b: "Control the markets -- profit follows monopoly."
 nd_kry.11.t: "The Golden Thread"
 nd_kry.11.d: "The Strait of Hormuz, gateway between the Persian Gulf and the Indian Ocean, falls under Gilani authority. What began in the misty mulberry groves of the Caspian shore now reaches to the warm waters of the Arabian Sea. Two great bodies of water, connected by a thread of silk and gold that runs through the heart of our domain. The court debates the implications: some argue for extending our diplomatic reach to every corner of the trading world, while others see an opportunity to transform Gilan itself into a center of refined culture and commercial power."
 nd_kry.11.a: "Let the golden thread stretch across the world."
 nd_kry.11.b: "Let the wealth transform Gilan itself."
 STATIC_MODIFIER_NAME_nd_kry_dest_mountain_vanguard: "Mountain Vanguard"
 STATIC_MODIFIER_DESC_nd_kry_dest_mountain_vanguard: "The aggressive tactics that took Tabriz now define our military doctrine. Gilani commanders seek battle eagerly, gaining experience at the cost of neglecting fortification upkeep."
 STATIC_MODIFIER_NAME_nd_kry_dest_highland_discipline: "Highland Discipline"
 STATIC_MODIFIER_DESC_nd_kry_dest_highland_discipline: "The disciplined garrisons of the Alborz passes have become a model for the entire army. Reduced costs and improved intelligence come at the price of a more insular outlook."
 STATIC_MODIFIER_NAME_nd_kry_dest_buyid_restoration: "Buyid Restoration"
 STATIC_MODIFIER_DESC_nd_kry_dest_buyid_restoration: "The conquering spirit of the original Buyid amirs lives again. Our armies march faster, annex more efficiently, and find justification for war with practiced ease."
 STATIC_MODIFIER_NAME_nd_kry_dest_mountain_emperor: "Mountain Emperor"
 STATIC_MODIFIER_DESC_nd_kry_dest_mountain_emperor: "The mountain realm is consolidated into an impregnable fortress-state. New fortifications and loyal garrisons secure every pass, though the inward focus strains diplomatic relations."
 STATIC_MODIFIER_NAME_nd_kry_dest_silk_factor: "Silk Factor"
 STATIC_MODIFIER_DESC_nd_kry_dest_silk_factor: "Gilani merchants control every stage of silk production and trade. Merchant influence grows, subjects integrate faster, and the burgher class prospers under the new commercial order."
 STATIC_MODIFIER_NAME_nd_kry_dest_caspian_monopolist: "Caspian Monopolist"
 STATIC_MODIFIER_DESC_nd_kry_dest_caspian_monopolist: "Financial institutions serve Gilani commercial interests, reducing borrowing costs, expanding the burgher tax base, and keeping all estates content through shared prosperity."
 STATIC_MODIFIER_NAME_nd_kry_dest_thread_of_empires: "Thread of Empires"
 STATIC_MODIFIER_DESC_nd_kry_dest_thread_of_empires: "Gilani trade networks span from the Caspian to the Indian Ocean. Diplomatic reach and export revenues soar, though the sprawling commercial empire strains the military."
 STATIC_MODIFIER_NAME_nd_kry_dest_merchant_princes: "Merchant Princes"
 STATIC_MODIFIER_DESC_nd_kry_dest_merchant_princes: "The silk wealth of Gilan transforms the province into a center of urban development and refined governance. Court spending decreases and construction costs fall as merchant capital flows into every project."
 nd_kry_daylami_citadel: "Daylami Citadel"
 nd_kry_daylami_citadel_desc: "A grand mountain fortress in the Daylamite tradition, combining ancient defensive architecture with modern military engineering. Its garrison commands the surrounding passes and serves as a symbol of the resurgent Daylami military tradition."
 nd_kry_silk_bourse: "Silk Bourse"
 nd_kry_silk_bourse_desc: "A grand commercial exchange where Gilani silk merchants, Armenian factors, and foreign buyers converge to negotiate contracts and set prices. The bourse concentrates market information and financial instruments, making Gilan the center of the international silk trade."
 nd_kry_citadel_garrison: "Citadel Garrison"
 nd_kry_citadel_garrison_desc: "The standing garrison of the Daylami Citadel, maintained with stone for fortification and weapons for its defenders."
 nd_kry_bourse_operations: "Bourse Operations"
 nd_kry_bourse_operations_desc: "The daily operations of the silk bourse, consuming paper for contracts and records, cloth for samples and displays, and fine cloth as the commodity being traded."
