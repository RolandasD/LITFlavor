l_english:
 STATIC_MODIFIER_NAME_nd_defender_of_the_faith: "Defender of the Faith"
 STATIC_MODIFIER_DESC_nd_defender_of_the_faith: "The Kingdom of Jerusalem stands as the shield of Christendom in the East, a bulwark against the infidel sustained by the faith and swords of its knights."
 STATIC_MODIFIER_NAME_nd_crossroads_of_commerce: "Crossroads of Commerce"
 STATIC_MODIFIER_DESC_nd_crossroads_of_commerce: "The ports and markets of the Holy Land channel the riches of East and West, making Jerusalem the pivot upon which Mediterranean commerce turns."
 STATIC_MODIFIER_NAME_nd_koj_assizes_legacy: "Legacy of the Assizes"
 STATIC_MODIFIER_DESC_nd_koj_assizes_legacy: "The codification of the Assizes of Jerusalem provides a comprehensive legal framework that governs the affairs of Outremer with wisdom and precedent."
 STATIC_MODIFIER_NAME_nd_koj_walls_of_outremer: "Walls of Outremer"
 STATIC_MODIFIER_DESC_nd_koj_walls_of_outremer: "The great concentric fortresses of the Holy Land represent the pinnacle of defensive architecture, their layered walls and killing grounds a lesson in stone."
 nd_koj.1.t: "The Kingdom Restored"
 nd_koj.1.d: "Jerusalem is ours. The Holy City, over which so many have fought and died, has been taken under the banner of the Cross. Pilgrims weep at the sight of the Holy Sepulchre, knights kneel in prayer upon the Temple Mount, and merchants eye the bustling ports of Acre and Tyre with barely concealed avarice. The Kingdom of Jerusalem is proclaimed anew — but what manner of kingdom shall it be? Shall we be a fortress of the faith, a militant state dedicated to the defense of Christendom's holiest sites? Or shall we embrace our position at the crossroads of three continents, growing rich on the trade that flows through our ports and caravansaries?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_koj.1.a: "We are the Sword and Shield of Christ!"
 nd_koj.1.b: "Let the riches of East and West flow through our hands."
 nd_koj.2.t: "The Assizes of Jerusalem"
 nd_koj.2.d: "The jurists of the realm have completed the great work of codification. Drawing upon the customs of the Frankish settlers, the traditions of the Italian communes, and the practical necessities of ruling a diverse kingdom in hostile lands, they have compiled the Assizes of Jerusalem — the most comprehensive legal code in Christendom east of Constantinople. The Haute Cour and the Cour des Bourgeois now have clear written precedent to guide their deliberations, from matters of feudal obligation and land tenure to the regulation of commerce and the rights of the burgesses. Shall we strengthen the crown's hand through this new legal instrument, or use it to stabilize the realm?"
 nd_koj.2.a: "The law is the foundation of good government."
 nd_koj.2.b: "Good laws attract good settlers."
 nd_koj.3.t: "The Concentric Fortress"
 nd_koj.3.d: "Our engineers have perfected a revolutionary approach to fortification. Drawing on the bitter lessons of siege warfare against Saracen sappers and siege engines, they have developed the concentric castle — multiple rings of curtain walls, each commanding the one before it, with towers positioned for interlocking fields of fire. The inner walls rise above the outer, so that defenders can shoot over their comrades below. Bent entrances, murder holes, and machicolations turn every approach into a killing ground. Krak des Chevaliers, Belvoir, and Margat stand as monuments to this new art of defense. Shall we continue to invest in these mighty fortresses?"
 nd_koj.3.a: "Build walls that will stand until Judgment Day."
 nd_koj.3.b: "These walls shall break any siege."
 nd_koj_feudal_outremer: "Feudal Outremer"
 nd_koj_feudal_outremer_desc: "The Frankish settlers established a feudal administration adapted to the realities of governing a narrow coastal kingdom surrounded by hostile powers, blending Western custom with local practice."
 nd_koj_arriere_ban: "Arriere-Ban of Outremer"
 nd_koj_arriere_ban_desc: "Unlike in Europe where feudal service was limited to forty days, the Kings of Jerusalem demanded a full year of military service from their vassals — a necessity born of constant existential threat."
 nd_koj_turcopole_tradition: "Turcopole Tradition"
 nd_koj_turcopole_tradition_desc: "The Turcopoles were locally recruited light cavalry who served as scouts, mounted archers, and skirmishers. Often drawn from Christianized Seljuks or Syrian Christians, they comprised up to half of the kingdom's mounted forces."
 nd_koj_pilgrim_roads: "Pilgrim Roads"
 nd_koj_pilgrim_roads_desc: "The protection and taxation of pilgrims traveling to the holy sites formed a major source of income for the kingdom, with Jerusalem's population doubling during the summer pilgrimage season."
 nd_koj_sugar_estates: "Sugar Estates of the Levant"
 nd_koj_sugar_estates_desc: "The Crusaders found sugarcane already under cultivation in the Levant and expanded its production dramatically. Most sugar consumed in thirteenth-century Europe originated from the Crusader states."
 nd_koj_concentric_fortification: "Concentric Fortification"
 nd_koj_concentric_fortification_desc: "The concentric castle, with its multiple rings of curtain walls and interlocking fields of fire, was perfected in the Crusader states as a response to the advanced siege techniques of their Muslim adversaries."
 nd_koj_acre_entrepot: "Acre Entrepot"
 nd_koj_acre_entrepot_desc: "Acre replaced Alexandria as the most important trading port in the eastern Mediterranean, welcoming traders from Byzantium, North Africa, Arabia, and the Italian maritime republics."
 nd_koj_italian_quarter: "Italian Quarter"
 nd_koj_italian_quarter_desc: "The Italian maritime republics — Venice, Genoa, and Pisa — maintained autonomous trading quarters in the ports of Outremer, their financial resources and naval strength essential to the kingdom's survival."
 nd_koj_templar_banking: "Templar Banking"
 nd_koj_templar_banking_desc: "The Knights Templar developed an early system of banking and credit, allowing pilgrims to deposit funds in Europe and withdraw them in the Holy Land, a financial innovation born of practical necessity."
 nd_koj_assizes_of_jerusalem: "Assizes of Jerusalem"
 nd_koj_assizes_of_jerusalem_desc: "The Assizes of Jerusalem constituted the most comprehensive feudal legal code of the medieval period, governing everything from land tenure and feudal obligation to commercial regulation and burgess rights."
 nd_koj_outremer_navy: "Navy of Outremer"
 nd_koj_outremer_navy_desc: "Though dependent on Italian naval power, the Kingdom of Jerusalem maintained its own fleet of war galleys to patrol the Levantine coast, protect merchant shipping, and support amphibious operations."
 nd_koj_holy_land_relics: "Holy Land Relics"
 nd_koj_holy_land_relics_desc: "The trade in holy relics, souvenirs, and religious artifacts was a lucrative industry in the Crusader states, feeding the insatiable appetite of European Christendom for tangible connections to sacred sites."
 nd_koj_desert_warfare: "Desert Warfare"
 nd_koj_desert_warfare_desc: "Generations of warfare against the Ayyubids and Mamluks taught the Crusaders to adapt their tactics to the arid terrain of the Levant, learning to manage water supplies, avoid ambushes, and fight in the scorching heat."
 nd_koj_hospitaller_medicine: "Hospitaller Medicine"
 nd_koj_hospitaller_medicine_desc: "The Knights Hospitaller maintained the great Hospital of St. John in Jerusalem, where physicians drawing on both European and Arabic medical traditions treated the sick and wounded regardless of religion or rank."
 nd_koj_crossroads_diplomacy: "Crossroads Diplomacy"
 nd_koj_crossroads_diplomacy_desc: "Positioned at the junction of three continents, the Kingdom of Jerusalem maintained complex diplomatic relationships with Byzantium, the Italian republics, the Papacy, and at times even their Muslim neighbors."
 nd_koj_frankish_chivalry: "Frankish Chivalry"
 nd_koj_frankish_chivalry_desc: "The Frankish heavy cavalry charge was the most feared weapon in the Crusader arsenal — armored knights on destriers smashing into enemy formations with the momentum of an avalanche of iron."
 nd_koj_levantine_commerce: "Levantine Commerce"
 nd_koj_levantine_commerce_desc: "By the later period of the kingdom, commercial income had eclipsed feudal rents as the primary source of royal revenue, with the ports of Acre and Tyre serving as vital conduits for East-West trade."
 nd_koj_holy_land_garrison: "Holy Land Garrison"
 nd_koj_holy_land_garrison_desc: "The permanent garrison system of the Crusader states, maintained through the military orders and feudal obligations, allowed a small Christian population to hold vast territories against numerically superior foes."
 nd_koj_crusader_legacy: "Crusader Legacy"
 nd_koj_crusader_legacy_desc: "The legacy of the Crusader Kingdom endures — in the great castles that still stand, in the legal traditions that influenced European jurisprudence, and in the cultural exchange between East and West that it facilitated."
 nd_koj_kingdom_restored: "Kingdom Restored"
 nd_koj_kingdom_restored_desc: "The Kingdom of Jerusalem rises again in a new age, its ancient claim to the Holy City given new life and new purpose."
 nd_koj_eastern_diplomacy: "Eastern Diplomacy"
 nd_koj_eastern_diplomacy_desc: "Navigating the complex web of alliances and rivalries in the modern Middle East requires the same diplomatic skill that once sustained a narrow strip of Christian territory amid a sea of Muslim powers."
 nd_koj_holy_city_renown: "Holy City Renown"
 nd_koj_holy_city_renown_desc: "Jerusalem is a city sacred to three faiths, and its ruler holds a position of unmatched cultural and religious significance, commanding the attention and respect of the entire world."
 a_nd_koj_turcopoles: "Turcopoles"
 a_nd_koj_turcopoles_desc: "Locally recruited light cavalry serving as scouts, mounted archers, and skirmishers. Often drawn from Christianized Seljuks or Syrian Christians, they were indispensable to Crusader field armies."
 a_nd_koj_crusader_sergeants: "Crusader Sergeants"
 a_nd_koj_crusader_sergeants_desc: "Mounted men-at-arms who formed the backbone of Crusader field armies. Better equipped than common levies but not of knightly rank, they provided the steady infantry core of every engagement."
 n_nd_koj_outremer_galley: "Outremer Galley"
 n_nd_koj_outremer_galley_desc: "A war galley built and crewed in the ports of the Holy Land, adapted for the particular demands of Levantine coastal warfare and trade route protection."
 a_nd_koj_frankish_knights: "Frankish Knights"
 a_nd_koj_frankish_knights_desc: "The elite heavy cavalry of Outremer — armored knights mounted on powerful destriers, trained from youth in the arts of war and dedicated to the defense of the Holy Land."
 nd_koj_hall_of_justice: "Crusader Hall of Justice"
 nd_koj_hall_of_justice_desc: "A court of law administering the Assizes of Jerusalem, where the customs of the Frankish settlers are codified and applied to the governance of Outremer."
 nd_koj_concentric_fortress: "Concentric Fortress"
 nd_koj_concentric_fortress_desc: "A revolutionary multi-ring fortress with overlapping fields of fire, perfected by Crusader engineers in response to the advanced siege techniques of their Muslim adversaries."
 nd_koj_levantine_fondaco: "Levantine Fondaco"
 nd_koj_levantine_fondaco_desc: "An Italian-style merchant warehouse and trading post where goods from East and West change hands, staffed by factors from the great maritime republics."
 nd_koj_sugar_press: "Sugar Press"
 nd_koj_sugar_press_desc: "A water-powered mill for crushing sugar cane grown on Crusader estates. The Levantine sugar industry was among the most profitable enterprises of the Latin kingdoms."
 nd_koj_mill_upkeep: "Mill Operations"
 nd_koj_mill_upkeep_desc: "Timber, tools, and millstones for the water wheel, rollers, and boiling vats of the sugar press."
 nd_koj_hospitaller_infirmary: "Hospitaller Infirmary"
 nd_koj_hospitaller_infirmary_desc: "A hospital built in the tradition of the Knights Hospitaller, where physicians trained in both European and Arabic medicine treat the sick and wounded."
 nd_koj_royal_palace: "Royal Palace of Jerusalem"
 nd_koj_royal_palace_desc: "The seat of the restored Crusader monarchy, a palace worthy of the ruler who holds the holiest city in Christendom."
 nd_koj_sugar_processing: "Sugar Processing"
 nd_koj_sugar_processing_desc: "Crushing Levantine sugarcane with fiber-crop press material and boiling the juice into exportable sugar, a lucrative industry inherited from the Arabs and expanded by the Crusaders."
 nd_koj_relic_trade: "Relic Trade"
 nd_koj_relic_trade_desc: "The production and sale of holy relics, pilgrimage souvenirs, and religious artifacts to the insatiable market of European Christendom."
 nd_koj_justice_maintenance: "Court Administration"
 nd_koj_justice_maintenance_desc: "Maintaining the legal records, administrative correspondence, and formal vestments of a Crusader court of law."
 nd_koj_fortress_maintenance: "Fortress Upkeep"
 nd_koj_fortress_maintenance_desc: "Maintaining the massive stone walls, towers, armories, and carpentry of a concentric fortress."
 nd_koj_fondaco_maintenance: "Fondaco Operations"
 nd_koj_fondaco_maintenance_desc: "Operating an Italian-style merchant warehouse, managing goods trade and contractual paperwork with Mediterranean partners."
 nd_koj_infirmary_maintenance: "Infirmary Upkeep"
 nd_koj_infirmary_maintenance_desc: "Provisioning a Hospitaller infirmary with medicines, medical supplies, and clean linens."
 nd_koj_palace_maintenance: "Palace Upkeep"
 nd_koj_palace_maintenance_desc: "Maintaining the stone walls, fine furnishings, and treasury of a royal palace."
 STATIC_MODIFIER_NAME_nd_koj_outremer_settlement: "Outremer Settlement"
 STATIC_MODIFIER_DESC_nd_koj_outremer_settlement: "Good laws and just governance attract settlers to the Holy Land, building a stable population base that sustains the kingdom through colonization rather than conquest alone."
 STATIC_MODIFIER_NAME_nd_koj_castle_doctrine: "Castle Doctrine"
 STATIC_MODIFIER_DESC_nd_koj_castle_doctrine: "The concentric fortresses of Outremer are more than mere walls — they are a doctrine of defense, a system of strongpoints that makes the kingdom nearly impregnable."
 nd_koj_formed_tt: "Kingdom of Jerusalem has been formed"
 nd_koj_path_a_tt: "Chose Defender of the Faith"
 nd_koj_path_b_tt: "Chose Crossroads of Commerce"
 nd_koj_destiny: "Destiny of Jerusalem"
 nd_koj_destiny_desc: "The Kingdom of Jerusalem has been restored. Now it must choose its destiny — to crusade for the faith or to build an empire of trade."
 nd_koj_dest_crusader_states: "The Crusader States"
 nd_koj_dest_crusader_states_desc: "Reunite the historic Crusader States under one crown. Secure Antioch and the County of Tripoli to forge a unified Christian front in the Levant."
 nd_koj_dest_march_east: "March to the East"
 nd_koj_dest_march_east_desc: "Carry the Cross into the heartlands of Islam. The great cities of Damascus and Aleppo must fall to complete the Crusader dominion over Syria."
 nd_koj_dest_new_crusade: "The New Crusade"
 nd_koj_dest_new_crusade_desc: "Launch the ultimate crusade — southward to Egypt and onward to the holy cities of Arabia. No Christian king has ever achieved what you now attempt."
 nd_koj_dest_levantine_ports: "Levantine Ports"
 nd_koj_dest_levantine_ports_desc: "Secure the great trading ports of the eastern Mediterranean. Cyprus and Beirut are the keys to controlling the Levantine sea lanes."
 nd_koj_dest_silk_road: "The Western Silk Road"
 nd_koj_dest_silk_road_desc: "Draw the riches of the East through your markets. Silk and incense must flow through Crusader hands, making Jerusalem the western terminus of the great trade routes."
 nd_koj_dest_emporium: "Emporium of Three Continents"
 nd_koj_dest_emporium_desc: "Build a commercial empire spanning from Alexandria to Constantinople. Control the crossroads where Europe, Asia, and Africa meet."
 nd_koj.4.t: "The Destiny of Jerusalem"
 nd_koj.4.d: "The Crown of Jerusalem sits upon a brow that bears the weight of prophecy. We have restored the Kingdom — but which kingdom shall we build? The choices made at our founding echo forward into history, and now the path unfolds before us. Whether as defenders of the faith or masters of commerce, we shall carve our destiny into the stone of ages."
 nd_koj.4.a: "Our destiny awaits."
 nd_koj.5.t: "The Crusader States Reunited"
 nd_koj.5.d: "The banners of Antioch and Tripoli fly beside the Cross of Jerusalem once more. For the first time since the days of the early Crusades, the Christian states of the Levant stand united under a single crown. The Principality of Antioch, founded by Bohemond, and the County of Tripoli, carved out by Raymond of Toulouse, have been brought back into the fold. What was shattered by Muslim reconquest and Frankish division has been made whole again."
 nd_koj.5.a: "The Franks of Outremer are one people once more."
 nd_koj.6.t: "The March to the East"
 nd_koj.6.d: "Damascus has fallen. Aleppo has fallen. The great Muslim cities of Syria, which resisted a century of Crusader ambition, now bow to the Cross of Jerusalem. Saladin himself failed to hold what we have taken, and the Atabeg's domain lies shattered. The question now is how we wield this unprecedented power. Do we press forward as the hammer of God, driving ever deeper into the lands of the infidel? Or do we consolidate, building a lasting peace in the lands we have already won?"
 nd_koj.6.a: "We are the hammer of God — let none stand."
 nd_koj.6.b: "Build the peace of Jerusalem over all Syria."
 nd_koj.7.t: "The New Crusade Triumphant"
 nd_koj.7.d: "Cairo has fallen to the Cross. The holy cities of Arabia lie under our protection. What no Crusade has ever achieved — what Richard the Lionheart only dreamed of — has been accomplished. The Ayyubid heartland, the Mamluk stronghold, the sacred cities of Islam itself — all answer to the Crown of Jerusalem. The world watches in astonishment. Shall we be remembered as the Sword of Christ, the invincible warriors who conquered the East? Or as the architects of a new Kingdom of Heaven, a realm where the sacred legacy of the Holy Land transforms all it touches?"
 nd_koj.7.a: "We are the Sword of Christ, and none may resist."
 nd_koj.7.b: "We shall build a Kingdom of Heaven on earth."
 nd_koj.8.t: "The Levantine Ports Secured"
 nd_koj.8.d: "Famagusta and Beirut — the twin jewels of the eastern Mediterranean — now fly the banner of Jerusalem. With Cyprus under our control, no ship crosses the Levantine Sea without our leave. Beirut's ancient harbor, once the pride of Phoenicia, now channels the wealth of three continents through Crusader hands. The Italian merchants who once held us hostage with their fleets now come as supplicants, begging for berths in our overflowing harbors."
 nd_koj.8.a: "The sea lanes of the Levant are ours."
 nd_koj.9.t: "The Western Silk Road"
 nd_koj.9.d: "Silk from Cathay, incense from Arabia, spices from India — all flow through the markets of the Holy Land. We have become what Venice and Genoa only aspired to be: the true middlemen between East and West. Our caravansaries overflow with goods, our counting houses ring with the clink of gold, and our factors sit in every port from Cyprus to Constantinople. Shall we press further into the caravan routes, becoming the lords of overland trade? Or shall we build a network of agents and factors, controlling commerce through knowledge and connections rather than territory?"
 nd_koj.9.a: "Control the caravans and we control the East."
 nd_koj.9.b: "Our agents shall know every market secret."
 nd_koj.10.t: "Emporium of Three Continents"
 nd_koj.10.d: "Alexandria and Constantinople — the two greatest commercial cities of the ancient world — now answer to the Crown of Jerusalem. We sit at the crossroads where Europe, Asia, and Africa meet, and every trade route of consequence passes through our domain. The dream of a universal Mediterranean commerce, governed from the Holy Land, has been realized. What legacy shall this achievement bear? Shall we become the pearl of the Orient, a naval power that commands the seas? Or the golden bridge between civilizations, a realm where learning and prosperity flow freely between all peoples?"
 nd_koj.10.a: "Command the seas and all the world is ours."
 nd_koj.10.b: "Bridge the civilizations — let learning flourish."
 STATIC_MODIFIER_NAME_nd_koj_dest_hammer_of_god: "Hammer of God"
 STATIC_MODIFIER_DESC_nd_koj_dest_hammer_of_god: "The armies of Jerusalem march without rest, an unstoppable instrument of divine wrath. Yet ceaseless campaigning wears upon the spirit of the realm."
 STATIC_MODIFIER_NAME_nd_koj_dest_pax_hierosol: "Pax Hierosolymitana"
 STATIC_MODIFIER_DESC_nd_koj_dest_pax_hierosol: "The Peace of Jerusalem extends over all Syria. Conquered peoples are brought into the fold through fair governance and patient integration."
 STATIC_MODIFIER_NAME_nd_koj_dest_sword_of_christ: "Sword of Christ"
 STATIC_MODIFIER_DESC_nd_koj_dest_sword_of_christ: "The Kingdom of Jerusalem wields the mightiest army in Christendom, though the upkeep of its far-flung fortresses strains the treasury."
 STATIC_MODIFIER_NAME_nd_koj_dest_kingdom_of_heaven: "Kingdom of Heaven"
 STATIC_MODIFIER_DESC_nd_koj_dest_kingdom_of_heaven: "A realm of harmony and splendor where the sacred legacy of the Holy Land inspires artistic achievement and social stability."
 STATIC_MODIFIER_NAME_nd_koj_dest_caravan_lords: "Lords of the Caravans"
 STATIC_MODIFIER_DESC_nd_koj_dest_caravan_lords: "The overland trade routes of the East pass through Crusader hands, bringing silks and luxuries to the markets of the Holy Land."
 STATIC_MODIFIER_NAME_nd_koj_dest_factor_kings: "Kings of the Counting House"
 STATIC_MODIFIER_DESC_nd_koj_dest_factor_kings: "A vast network of agents and factors gives the kingdom unmatched commercial intelligence, though agricultural development suffers from neglect."
 STATIC_MODIFIER_NAME_nd_koj_dest_pearl_of_orient: "Pearl of the Orient"
 STATIC_MODIFIER_DESC_nd_koj_dest_pearl_of_orient: "The naval power of Jerusalem commands the eastern Mediterranean, its warships and merchantmen the masters of every sea lane."
 STATIC_MODIFIER_NAME_nd_koj_dest_golden_bridge: "Golden Bridge"
 STATIC_MODIFIER_DESC_nd_koj_dest_golden_bridge: "A cosmopolitan realm where the learning of East and West mingles freely, though the flood of wealth brings its own inflationary pressures."
 nd_koj_church_militant: "Church Militant"
 nd_koj_church_militant_desc: "A fortified commandery of the military orders — half-church, half-fortress — where monks train as warriors and administer the conversion of conquered lands."
 nd_koj_church_militant_maintenance: "Commandery Operations"
 nd_koj_church_militant_maintenance_desc: "Maintaining the armory, chapel, and garrison of a military order commandery in the Holy Land."
 nd_koj_eastern_exchange: "Eastern Exchange"
 nd_koj_eastern_exchange_desc: "A grand commercial exchange where merchants from three continents trade under one roof, a monument to the Kingdom of Jerusalem's position at the crossroads of the world."
 nd_koj_exchange_maintenance: "Exchange Operations"
 nd_koj_exchange_maintenance_desc: "Operating a grand commercial exchange with record-keeping, currency changing, and warehouse management across multiple trading halls."
