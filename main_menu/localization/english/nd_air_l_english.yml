l_english:
 STATIC_MODIFIER_NAME_nd_air_desert_sovereignty: "Desert Sovereignty"
 STATIC_MODIFIER_DESC_nd_air_desert_sovereignty: "The Tuareg ride as they have always ridden — unconquered lords of the Sahara. The Ihaggaren nobility commands from camelback, and no foreign army can pursue them across the endless sands. The desert itself is fortress, weapon, and throne."
 STATIC_MODIFIER_NAME_nd_air_gateway_of_the_sahara: "Gateway of the Sahara"
 STATIC_MODIFIER_DESC_nd_air_gateway_of_the_sahara: "Agadez stands at the crossroads of the world. From the salt pans of Bilma to the gold markets of Hausaland, from the Maghreb to the Niger bend, every caravan passes through our gates. The Tuareg have transformed their desert into the greatest trade corridor in Africa."
 STATIC_MODIFIER_NAME_nd_air_amenokal_authority: "Authority of the Amenokal"
 STATIC_MODIFIER_DESC_nd_air_amenokal_authority: "The Amenokal, supreme chief of the confederation, rules with the authority of tradition and the consent of the drum groups. His word is law across the desert."
 STATIC_MODIFIER_NAME_nd_air_council_of_drum_groups: "Council of Drum Groups"
 STATIC_MODIFIER_DESC_nd_air_council_of_drum_groups: "The drum groups of the confederation meet in council, each represented by their amghar. Consensus governs, and the Sultanate endures through negotiation rather than compulsion."
 STATIC_MODIFIER_NAME_nd_air_salt_caravan_wealth: "Salt Caravan Wealth"
 STATIC_MODIFIER_DESC_nd_air_salt_caravan_wealth: "The azalai caravans return laden with salt bricks from Bilma, traded at fabulous profit in the markets of the south. The wealth of the desert flows through Tuareg hands."
 STATIC_MODIFIER_NAME_nd_air_caravan_protection: "Caravan Protection"
 STATIC_MODIFIER_DESC_nd_air_caravan_protection: "Tuareg riders escort the great caravans across the Tenere, their presence guaranteeing safe passage through the most dangerous stretch of the trans-Saharan route."
 STATIC_MODIFIER_NAME_nd_air_agadez_minaret: "Minaret of Agadez"
 STATIC_MODIFIER_DESC_nd_air_agadez_minaret: "The soaring mud-brick minaret of Agadez, the tallest such structure in the world, stands as testimony to the piety and ambition of the Sultanate."
 nd_air.1.t: "Rise of Air"
 nd_air.1.d: "The scattered Kel Ayr clans have united under a single banner. From the volcanic peaks of the Air Mountains to the burning sands of the Tenere, from the oasis gardens of Timia to the bustling markets of Agadez, the Tuareg people stand together.\n\nBut unity poses a question that the Tuareg have debated for generations. The Ihaggaren — the sword-bearing noble caste who ride their magnificent meharis across the open desert — see the confederation as a vehicle for Tuareg dominion over the Sahara. They would preserve the ancient ways: raiding, tribute-taking, the warrior's code that has made the Tuareg feared from the Maghreb to the Niger.\n\nYet Agadez itself tells a different story. This cosmopolitan city, where Tuareg nobles, Hausa merchants, and scholars from Timbuktu rub shoulders in the shadow of the great mosque, has grown wealthy not from the sword but from the caravan. The trans-Saharan trade in salt, gold, and slaves passes through our gates, and those who control the routes control the wealth of nations.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_air.1.a: "We are the lords of the desert — let the sands be our dominion!"
 nd_air.1.b: "Agadez shall be the gateway of the Sahara!"
 nd_air.2.t: "The Sultanate Takes Shape"
 nd_air.2.d: "Around 1405, the fractious Tuareg clans of the Air region reached a remarkable agreement. Recognizing that constant inter-clan feuding weakened them against their neighbors — the expansionist Bornu Empire to the east, the Hausa city-states to the south — they resolved to create a neutral arbiter. The first Sultan, Yunus, was deliberately chosen for his neutrality: the son of a distant Tuareg father from Targa in Libya and a local servant woman, he belonged to no powerful local clan and thus could mediate impartially.\n\nThe institution proved its worth. His successor, Alhasan, moved the seat of the Sultanate to the newly-founded city of Agadez, where Tuareg, Hausa, and trans-Saharan merchants already mingled. The Sultan's drum — the ettebel — became the symbol of confederal unity, and the beat of that drum summoned the clans to council.\n\nNow the question is how this new Sultanate should govern. Shall the Amenokal rule with the authority of a centralized monarch, or shall the drum groups retain their ancient autonomy in a council of equals?"
 nd_air.2.a: "The Amenokal speaks, and the desert obeys."
 nd_air.2.b: "The drum groups shall govern by council and consensus."
 nd_air.3.t: "The Salt Road"
 nd_air.3.d: "Twice each year, at the beginning of November and again in March, the great salt caravans depart from Agadez. These azalai — processions of hundreds, sometimes thousands, of camels — cross the vast emptiness of the Tenere desert on a three-week journey to the natron salt pans of Bilma and Kaouar. There they trade grain, dates, and cloth for great slabs of mineral salt, each weighing as much as a man can lift.\n\nThe return journey is more dangerous still, for the camels are now laden and slow. But the reward is immense: salt, a commodity more precious than silver in the kingdoms to the south, where it is traded weight-for-weight against gold at the markets of Kano and Katsina. The Tuareg clans who organize and protect these caravans stand to control one of the most lucrative trade routes in the world.\n\nShall we maximize the profits from this commerce, or shall we use the caravans to project military power across the desert?"
 nd_air.3.a: "The salt trade shall make us wealthy beyond measure."
 nd_air.3.b: "Our riders shall guard every grain of salt with spear and sword."
 nd_air.4.t: "The Great Mosque of Agadez"
 nd_air.4.d: "In the heart of Agadez, a remarkable structure rises above the mud-brick city. Attributed to the architect Sheikh Zakaria and constructed around 1515, the Grand Mosque features a pyramidal minaret standing twenty-seven meters high — the tallest mud-brick minaret in the world. Its stepped, tapering form narrows progressively upward, with protruding palm trunk beams embedded at intervals serving as both reinforcement and scaffolding for the annual replastering that keeps the structure standing against wind and rain.\n\nThe mosque was built during the period of Songhai influence, reflecting the synthesis of Sahelian, North African, and local Tuareg architectural traditions that makes Agadez unique. It serves not only as a place of worship but as a symbol of the city's importance — a beacon visible across the desert, telling approaching caravans that they have reached the gateway of the Sahara.\n\nThe faithful gather beneath its arches. The city takes pride in this monument to faith and ingenuity."
 nd_air.4.a: "A beacon of faith in the heart of the desert."
 nd_air_mehari_tradition: "Mehari Tradition"
 nd_air_mehari_tradition_desc: "The ancient art of desert warfare on camelback, perfected by generations of Tuareg Ihaggaren riding swift meharis across the Sahara."
 nd_air_caravan_guardians: "Caravan Guardians"
 nd_air_caravan_guardians_desc: "Fortified watchtowers and armed escorts protecting the vital trans-Saharan trade routes through Air territory."
 nd_air_trans_saharan_routes: "Trans-Saharan Routes"
 nd_air_trans_saharan_routes_desc: "The network of desert caravanserais and waystations that sustain the great trade caravans crossing the Sahara."
 nd_air_camel_mastery: "Camel Mastery"
 nd_air_camel_mastery_desc: "Selective breeding of meharis for speed and endurance — the foundation of Tuareg economic and military power."
 nd_air_ihaggaren_code: "Ihaggaren Code"
 nd_air_ihaggaren_code_desc: "The unwritten code of the Tuareg noble caste, governing honor, warfare, and the obligations of the sword-bearing aristocracy."
 nd_air_kel_ayr_bonds: "Kel Ayr Bonds"
 nd_air_kel_ayr_bonds_desc: "The kinship ties and matrilineal alliances binding the Kel Ayr confederation together, enabling cooperation between fiercely independent clans."
 nd_air_takouba_tradition: "Takouba Tradition"
 nd_air_takouba_tradition_desc: "Mastery of the takouba, the distinctive straight double-edged sword of the Tuareg nobility, given to young men at their coming of age."
 nd_air_inadan_smiths: "Inadan Smiths"
 nd_air_inadan_smiths_desc: "The inadan caste of smiths and artisans who forge takouba blades, craft silver jewelry, and produce the leatherwork for which the Tuareg are renowned."
 nd_air_agadez_cross: "Cross of Agadez"
 nd_air_agadez_cross_desc: "The distinctive silver cross of Agadez, symbol of protection and identity, crafted by inadan silversmiths and worn by every Tuareg traveler."
 nd_air_sahelian_islam: "Sahelian Islam"
 nd_air_sahelian_islam_desc: "The distinctive blend of Islam practiced in the Sahel, combining orthodox Sunni observance with local Tuareg cultural traditions."
 nd_air_sultanate_founding: "Sultanate Founding"
 nd_air_sultanate_founding_desc: "The creation of the Sultanate of Agadez around 1405, when the Tuareg clans chose a neutral outsider as Sultan to mediate between rival factions."
 nd_air_matrilineal_alliances: "Matrilineal Alliances"
 nd_air_matrilineal_alliances_desc: "The Tuareg practice of matrilineal inheritance and cross-cousin marriage, creating a web of alliances that binds the confederation together."
 nd_air_camel_lancers: "Camel Lancers"
 nd_air_camel_lancers_desc: "The fearsome Kel Ayr battle tactic of hurling spears from camelback before charging home with takouba swords drawn."
 nd_air_azalai_tradition: "Azalai Tradition"
 nd_air_azalai_tradition_desc: "The twice-yearly salt caravans from Agadez to the Bilma and Kaouar salt pans — one of the most arduous and profitable trade routes in the world."
 nd_air_bilma_salt_pans: "Bilma Salt Pans"
 nd_air_bilma_salt_pans_desc: "Extraction and processing of natron salt from the pans of Bilma, traded across West Africa at enormous profit."
 nd_air_indigo_cloth_trade: "Indigo Cloth Trade"
 nd_air_indigo_cloth_trade_desc: "The deep indigo dyeing that gives the Tuareg their reputation as the 'blue people' — their cloth is prized across the Sahel."
 nd_air_desert_navigation: "Desert Navigation"
 nd_air_desert_navigation_desc: "Unmatched Tuareg expertise in reading the stars, the winds, and the terrain to navigate the featureless expanses of the Tenere."
 nd_air_sovereignty_restored: "Sovereignty Restored"
 nd_air_sovereignty_restored_desc: "After the collapse of Songhai overlordship following the Moroccan invasion of 1591, the Sultanate of Agadez reasserted its independence."
 nd_air_agadez_garrison: "Agadez Garrison"
 nd_air_agadez_garrison_desc: "The urban militia of Agadez, drawn from the settled population of the city to defend its walls and markets."
 nd_air_desert_scholarship: "Desert Scholarship"
 nd_air_desert_scholarship_desc: "Islamic scholarship flourishing in Agadez, where scholars from across the Sahel gather to study theology, law, and astronomy."
 nd_air_ghazw_raids: "Ghazw Raids"
 nd_air_ghazw_raids_desc: "The Tuareg tradition of desert raiding — swift cavalry strikes that strip an enemy bare before vanishing into the sands."
 nd_air_agadez_market_tolls: "Agadez Market Tolls"
 nd_air_agadez_market_tolls_desc: "Systematic taxation of goods passing through Agadez, the greatest market between the Maghreb and Hausaland."
 nd_air_air_mountains_refuge: "Air Mountains Refuge"
 nd_air_air_mountains_refuge_desc: "The volcanic peaks and hidden valleys of the Air Mountains provide an impregnable refuge against any invader."
 nd_air_drum_group_council: "Drum Group Council"
 nd_air_drum_group_council_desc: "The council of drum groups, each led by its amghar, meeting to resolve disputes, allocate grazing rights, and coordinate the confederation's affairs."
 nd_air_saharan_ghazis: "Saharan Ghazis"
 nd_air_saharan_ghazis_desc: "Elite Tuareg holy warriors combining the ancient desert cavalry tradition with Islamic martial zeal."
 nd_air_sultanate_reform: "Sultanate Reform"
 nd_air_sultanate_reform_desc: "Centralization of the Sultanate's authority, extending the Sultan's direct governance beyond Agadez to the wider confederation."
 nd_air_desert_logistics: "Desert Logistics"
 nd_air_desert_logistics_desc: "Mastery of desert supply and movement, enabling Tuareg armies to operate across vast distances where others would perish."
 nd_air_warrior_code: "Warrior Code"
 nd_air_warrior_code_desc: "The codification of Tuareg martial traditions into a formal warrior code governing combat, honor, and the treatment of defeated foes."
 nd_air_tuareg_identity: "Tuareg Identity"
 nd_air_tuareg_identity_desc: "The enduring Tuareg cultural identity — the Tamasheq language, the veil, the silver jewelry, the poetry — persisting through centuries of external pressure."
 nd_air_unconquerable_sahara: "Unconquerable Sahara"
 nd_air_unconquerable_sahara_desc: "The Sahara remains unconquerable. No European column, no Ottoman army, no foreign power can hold the desert against warriors who know every dune and wadi."
 nd_air_confederal_resilience: "Confederal Resilience"
 nd_air_confederal_resilience_desc: "The remarkable durability of the Tuareg confederal system, surviving conquest, drought, and colonial pressure through collective solidarity."
 nd_air_pastoral_adaptation: "Pastoral Adaptation"
 nd_air_pastoral_adaptation_desc: "The continuing adaptation of Tuareg pastoral practices to changing environmental and economic conditions in the Sahara."
 a_nd_air_mehari_raiders: "Mehari Raiders"
 a_nd_air_mehari_raiders_desc: "Swift desert raiders mounted on racing camels, the mehari. These Tuareg warriors strike without warning and vanish into the sands before any organized response can form."
 a_nd_air_takouba_swordsmen: "Takouba Swordsmen"
 a_nd_air_takouba_swordsmen_desc: "Elite Tuareg warriors of the Ihaggaren noble caste, wielding the distinctive takouba — a straight, double-edged sword averaging eighty centimeters in length, paired with a leather shield large enough to cover a man's body."
 a_nd_air_kel_ayr_lancers: "Kel Ayr Lancers"
 a_nd_air_kel_ayr_lancers_desc: "Camel-mounted lancers of the Kel Ayr confederation who hurl spears from camelback before closing with takouba swords. Their flanking charges scatter enemy formations across the desert."
 a_nd_air_agadez_spearmen: "Agadez Spearmen"
 a_nd_air_agadez_spearmen_desc: "Disciplined urban levies drawn from the settled population of Agadez — a mixture of Tuareg townsmen, Hausa merchants, and artisans who defend the city and its markets."
 a_nd_air_saharan_ghazis: "Saharan Ghazis"
 a_nd_air_saharan_ghazis_desc: "Holy warriors of the desert who combine the ancient Tuareg cavalry tradition with Islamic martial zeal, riding to war under the green banner of the faith."
 nd_air_caravanserai: "Desert Caravanserai"
 nd_air_caravanserai_desc: "A fortified waystation on the trans-Saharan route, providing water, shelter, and fodder for caravan animals crossing the desert."
 nd_air_inadan_forge: "Inadan Forge"
 nd_air_inadan_forge_desc: "A workshop of the inadan smithing caste, where takouba blades are forged, silver jewelry crafted, and the finest Tuareg leatherwork produced."
 nd_air_banco_mosque: "Banco Mosque"
 nd_air_banco_mosque_desc: "A mud-brick mosque in the distinctive Sahelian style, its minaret protruding with palm-trunk beams that serve as permanent scaffolding for annual maintenance."
 nd_air_indigo_dyeworks: "Indigo Dyeworks"
 nd_air_indigo_dyeworks_desc: "A dyeing facility where cloth is steeped in deep indigo, producing the fabric that gives the Tuareg their reputation as the blue people of the desert."
 nd_air_salt_depot: "Salt Depot"
 nd_air_salt_depot_desc: "A warehouse and distribution center for the natron salt bricks brought from Bilma by the azalai caravans, one of the most valuable commodities in West Africa."
 nd_air_desert_watchtower: "Desert Watchtower"
 nd_air_desert_watchtower_desc: "A fortified observation post on the caravan routes, manned by Tuareg warriors who guard the trade lanes against bandits and rival raiders."
 nd_air_caravanserai_upkeep: "Caravanserai Provisions"
 nd_air_caravanserai_upkeep_desc: "Livestock, grain, and salt needed to provision the caravans and their animals passing through the waystation."
 nd_air_forge_upkeep: "Takouba Forging"
 nd_air_forge_upkeep_desc: "The inadan smiths forge iron and copper into takouba swords and other weapons prized across the Sahara."
 nd_air_mosque_upkeep: "Mosque Maintenance"
 nd_air_mosque_upkeep_desc: "Stone and timber for the annual replastering and structural maintenance of the mud-brick mosque, and incense for worship."
 nd_air_dyeworks_upkeep: "Indigo Dyeing"
 nd_air_dyeworks_upkeep_desc: "Cloth steeped in deep indigo dye, producing the fine blue fabric that gives the Tuareg their renown."
 nd_air_salt_depot_upkeep: "Salt Depot Operations"
 nd_air_salt_depot_upkeep_desc: "Salt inventory, pack animals, and tools needed to operate the depot and distribute salt to markets."
 nd_air_watchtower_upkeep: "Watchtower Garrison"
 nd_air_watchtower_upkeep_desc: "Stone fortifications, weapons, and provisions for the garrison manning the desert watchtower."
 nd_air_salt_processing: "Saharan Salt Processing"
 nd_air_salt_processing_desc: "Processing and packaging of natron salt from the Bilma pans into pottery vessels for distribution across West Africa."
 nd_air_silver_crafting: "Silver Jewelry Crafting"
 nd_air_silver_crafting_desc: "The inadan craft of working silver and copper into the distinctive crosses, amulets, and ornaments that mark Tuareg identity."
 nd_air_camel_breeding: "Camel Breeding Program"
 nd_air_camel_breeding_desc: "Selective breeding of camels fed on grain and salt supplement, producing the finest riding and pack animals in the Sahara."
 levy_nd_air_mehari_raiders: "Mehari Raider Levy"
 levy_nd_air_mehari_raiders_desc: "Tuareg nobles and warriors raised as camel-mounted desert raiders in the traditional Ihaggaren style."
 levy_nd_air_agadez_spearmen: "Agadez Spearmen Levy"
 levy_nd_air_agadez_spearmen_desc: "Urban levies drawn from the settled population of Agadez to defend the city and its markets."
 nd_air_desert_madrasa: "Desert Madrasa"
 nd_air_desert_madrasa_desc: "An Islamic school in the Sahelian tradition, where scholars study theology, law, and astronomy under the patronage of the Sultanate."
 nd_air_madrasa_upkeep: "Madrasa Operations"
 nd_air_madrasa_upkeep_desc: "Paper and cloth for the school's library and scholars, and stone for structural maintenance."
 nd_air_leather_trade: "Saharan Leather Trade"
 nd_air_leather_trade_desc: "The preparation and export of fine Tuareg leatherwork — livestock hides dyed with vivid colors and worked with tools into embroidered geometric patterns, prized across West Africa and beyond."
 nd_air_saharan_commerce: "Saharan Commerce"
 nd_air_saharan_commerce_desc: "The maturation of trans-Saharan trade networks into a sophisticated commercial system linking the Mediterranean to the Niger."
 nd_air_trade_exchange: "Saharan Trade Exchange"
 nd_air_trade_exchange_desc: "A modernized marketplace where caravan merchants, local craftsmen, and foreign traders gather to exchange goods under regulated terms."
 nd_air_exchange_upkeep: "Exchange Operations"
 nd_air_exchange_upkeep_desc: "Stone, paper, and tools needed for maintaining the trade exchange facilities and record-keeping."
 nd_air_modern_trade: "Modern Trade"
 nd_air_modern_trade_desc: "Adaptation of the ancient caravan trade to the changing economic realities of the modern era, with regulated marketplaces and systematic record-keeping."
 nd_air_formed_tt: "Air has been formed"
 nd_air_path_a_tt: "Chose Desert Sovereignty"
 nd_air_path_b_tt: "Chose Gateway of the Sahara"
 nd_air_destiny: "Destiny of Air"
 nd_air_destiny_desc: "The Sultanate of Air has been forged. Now the Tuareg must decide their path — will they conquer the fertile south or master the trade routes that cross the desert?"
 nd_air_dest_hausaland: "The Hausaland Campaign"
 nd_air_dest_hausaland_desc: "The wealthy Hausa city-states to the south have long been targets of Tuareg raids. Now is the time to transform raids into conquest. Seize Katsina and crush Gobir to establish Tuareg dominion over the central Sahel."
 nd_air_dest_kano: "The Fall of Kano"
 nd_air_dest_kano_desc: "Kano, the richest city in Hausaland, is the prize that will make the Tuareg the masters of the central Sahel. Its vast markets, its dye pits, its walls — all must submit to our rule."
 nd_air_dest_saharan_empire: "Saharan Empire"
 nd_air_dest_saharan_empire_desc: "From the Bornu Empire's capital at Ngazargamu to the Kebbi stronghold of Sokoto, the entire central Sahel must bow to Tuareg authority. This is the capstone of a desert empire stretching from the Air Mountains to the shores of Lake Chad."
 nd_air_dest_salt_road: "The Salt Road"
 nd_air_dest_salt_road_desc: "The salt pans of Bilma are the lifeblood of the trans-Saharan trade. By securing direct control over this source, the Tuareg can dictate the price of the most valuable commodity in West Africa."
 nd_air_dest_fezzan_link: "The Fezzan Link"
 nd_air_dest_fezzan_link_desc: "The oasis of Ghat in the Fezzan is the northern gateway of the trans-Saharan route. By controlling both Bilma and Ghat, the Tuareg hold the entire central corridor of the Saharan trade in their hands."
 nd_air_dest_master_of_routes: "Master of the Routes"
 nd_air_dest_master_of_routes_desc: "Timbuktu, the legendary city of gold and learning, is the western terminus of the great Saharan trade network. By extending Tuareg control to the Niger bend, Air becomes the undisputed master of trans-Saharan commerce."
 nd_air.5.t: "The Path of Air"
 nd_air.5.d: "The Sultanate of Air stands united. The Tuareg confederation has proven its strength, and the drum groups beat with a single rhythm. But the question that has always divided our people remains: what shall we build with this unity?\n\nThe desert is our dominion. The choice we make now will shape the destiny of the Tuareg for generations to come."
 nd_air.5.a: "The destiny of Air begins now."
 nd_air.6.t: "The Gates of Hausaland"
 nd_air.6.d: "The Hausa city-states have grown fat behind their walls, trading the produce of their fertile lands while paying tribute to whichever power can muster enough riders to threaten their gates. For too long, the Tuareg have been content to raid and withdraw. No more.\n\nKatsina, with its famous textile markets and strategic position on the trade routes, and Alkalawa, the seat of the Gobir kings who have contested Tuareg supremacy for generations — both have fallen to our cavalry. The Hausa learn what the Saharan peoples have always known: there is no wall high enough to stop a Tuareg charge."
 nd_air.6.a: "The desert's wrath knows no walls."
 nd_air.7.t: "Kano Submits"
 nd_air.7.d: "The great walls of Kano, which have stood for centuries, have opened to our forces. This is no mere border town — Kano is the greatest commercial center in all of Hausaland, home to the famous indigo dye pits that produce cloth traded as far as Egypt and Morocco. Its sprawling markets deal in leather, grain, kola nuts, and slaves.\n\nNow we must decide how to govern this prize. Shall we extract tribute in the traditional Tuareg manner — seasonal demands backed by the threat of the mehari — or shall we establish a permanent garrison and integrate Kano into our confederal system?"
 nd_air.7.a: "Tribute is the Tuareg way — take what we need and ride on."
 nd_air.7.b: "Plant our banner in Kano and hold it forever."
 nd_air.8.t: "Empire of the Sands"
 nd_air.8.d: "From the Air Mountains to the shores of Lake Chad, from the dunes of the Tenere to the banks of the Niger, the Tuareg have built what no one believed possible: a true Saharan empire. Ngazargamu, the ancient Bornu capital, has fallen. Sokoto bends the knee. The Hausa city-states are tributaries or provinces.\n\nThis achievement defies the conventional wisdom that desert nomads cannot build lasting states. The question now is what kind of empire this shall be. Shall we remain what we have always been — raiders supreme, extracting wealth from the settled peoples while preserving our nomadic freedom? Or shall we become something new — true emperors who govern as well as conquer?"
 nd_air.8.a: "We ride, we raid, we rule — the Tuareg way."
 nd_air.8.b: "An emperor's crown weighs more than a rider's veil."
 nd_air.9.t: "Salt Lords of Bilma"
 nd_air.9.d: "The natron salt pans of Bilma now lie under direct Tuareg control. For centuries, the azalai caravans have crossed the Tenere to purchase salt here, but the Tuareg have been middlemen and escorts rather than owners. No longer.\n\nWith Bilma in our hands, we control the source. Every brick of salt that leaves these pans — traded weight-for-weight against gold in the markets of the south — enriches the Sultanate directly. The wealth of the desert flows through Tuareg hands at last."
 nd_air.9.a: "The salt is ours, and with it, the wealth of nations."
 nd_air.10.t: "Gateway to the North"
 nd_air.10.d: "The oasis town of Ghat, nestled in the Fezzan at the foot of the Acacus Mountains, has long been the northern terminus of the central trans-Saharan route. Tuareg caravans have always passed through Ghat, but now we hold it ourselves.\n\nWith Bilma in the south and Ghat in the north, the entire central corridor of the Saharan trade is a Tuareg road. Mediterranean goods flow south through our territory; Sahelian gold, salt, and slaves flow north. We are the indispensable middlemen.\n\nShall we maximize our position as intermediaries, taxing every bale and slave that crosses our territory? Or shall we invest in the oasis infrastructure itself, turning every waypoint into a prosperous market town?"
 nd_air.10.a: "Every grain of sand the caravans cross, we tax."
 nd_air.10.b: "Build wells, build markets — make the desert bloom."
 nd_air.11.t: "The Golden Road"
 nd_air.11.d: "Timbuktu, the city of three hundred and thirty-three saints, the seat of the Sankore Madrasa, the legendary destination of Mansa Musa's pilgrimage — Timbuktu is ours. With it, the Tuareg control the entire breadth of the trans-Saharan trade, from the salt pans of Bilma in the east to the gold markets of the Niger bend in the west, from the Mediterranean shores of the Fezzan to the banks of the great river.\n\nNo merchant, no caravan, no trade good crosses the Sahara without Tuareg permission and Tuareg profit. This is the culmination of centuries of desert mastery — the Tuareg have transformed the most inhospitable landscape on earth into the most profitable."
 nd_air.11.a: "Gold flows north, salt flows south — and we profit from both."
 nd_air.11.b: "Let Agadez rival Timbuktu as a city of learning and trade."
 STATIC_MODIFIER_NAME_nd_air_dest_kano_tribute: "Kano Tribute"
 STATIC_MODIFIER_DESC_nd_air_dest_kano_tribute: "Seasonal tribute exacted from Kano in the traditional Tuareg manner -- camel-loads of indigo cloth, leather, and grain carried north to Agadez, fueling recruitment but neglecting permanent construction."
 STATIC_MODIFIER_NAME_nd_air_dest_kano_garrison: "Kano Garrison"
 STATIC_MODIFIER_DESC_nd_air_dest_kano_garrison: "A permanent Tuareg garrison holds Kano, establishing intelligence networks across Hausaland and accelerating the pace of desert warfare, though the costs of occupation drive prices upward."
 STATIC_MODIFIER_NAME_nd_air_dest_eternal_raiders: "Eternal Raiders"
 STATIC_MODIFIER_DESC_nd_air_dest_eternal_raiders: "The Tuareg empire operates on the ancient principle: ride, raid, extract, and move on. Wars are prosecuted with tireless initiative, though scholarship suffers in a society that prizes the sword above the pen."
 STATIC_MODIFIER_NAME_nd_air_dest_desert_emperor: "Desert Emperor"
 STATIC_MODIFIER_DESC_nd_air_dest_desert_emperor: "The Amenokal has become a true emperor, governing conquered peoples with tactical brilliance and a blend of Tuareg confederal tradition and centralized authority."
 STATIC_MODIFIER_NAME_nd_air_dest_saharan_middlemen: "Saharan Middlemen"
 STATIC_MODIFIER_DESC_nd_air_dest_saharan_middlemen: "The Tuareg profit from every transaction on the trans-Saharan route, reducing military expenditure and enhancing prestige, though the merchant class shows little interest in siege warfare."
 STATIC_MODIFIER_NAME_nd_air_dest_oasis_network: "Oasis Network"
 STATIC_MODIFIER_DESC_nd_air_dest_oasis_network: "Investment in wells, waypoints, and market infrastructure transforms the harsh desert corridor into a chain of prosperous oasis towns blessed by the faithful, though reliance on hired soldiers grows."
 STATIC_MODIFIER_NAME_nd_air_dest_gold_and_salt: "Gold and Salt"
 STATIC_MODIFIER_DESC_nd_air_dest_gold_and_salt: "The Tuareg monopoly on the trans-Saharan trade reaches its zenith -- cultural influence radiates across the Sahel and diplomatic reach expands, though success breeds a dangerous complacency."
 STATIC_MODIFIER_NAME_nd_air_dest_cosmopolitan_hub: "Cosmopolitan Hub"
 STATIC_MODIFIER_DESC_nd_air_dest_cosmopolitan_hub: "Agadez becomes a city of scholars, merchants, and craftsmen from across the Sahara and Sahel, where tolerance of diverse faiths attracts diplomats and traders from distant lands."
 nd_air_war_camp: "Saharan War Camp"
 nd_air_war_camp_desc: "A fortified staging ground for desert campaigns, where warriors gather, camels are watered, and weapons are sharpened before the great raids south."
 nd_air_war_camp_upkeep: "War Camp Provisions"
 nd_air_war_camp_upkeep_desc: "Weaponry, livestock, and leather needed to maintain the war camp and equip warriors for desert campaigns."
 nd_air_grand_caravanserai: "Grand Caravanserai"
 nd_air_grand_caravanserai_desc: "The greatest waystation on the trans-Saharan route, a fortified complex of warehouses, stables, wells, and merchant quarters where caravans from every direction converge."
 nd_air_grand_caravanserai_upkeep: "Grand Caravanserai Operations"
 nd_air_grand_caravanserai_upkeep_desc: "Stone, livestock, salt, and cloth needed to maintain the grand caravanserai and provision the great caravans."
