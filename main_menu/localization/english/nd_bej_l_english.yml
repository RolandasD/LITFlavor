l_english:
 STATIC_MODIFIER_NAME_nd_bej_lords_of_the_red_sea: "Lords of the Red Sea"
 STATIC_MODIFIER_DESC_nd_bej_lords_of_the_red_sea: "The Beja have claimed dominion over the Red Sea coast, channeling the wealth of centuries of maritime trade through Suakin and the coral-built entrepots that dot the shoreline. Merchants from Arabia, India, and beyond flow through our ports."
 STATIC_MODIFIER_NAME_nd_bej_sons_of_the_desert: "Sons of the Desert"
 STATIC_MODIFIER_DESC_nd_bej_sons_of_the_desert: "The children of the Eastern Desert ride as their ancestors did — swift, relentless, and unconquerable. On camelback and afoot, Beja warriors strike without warning and vanish into the Red Sea Hills before any foe can muster a response."
 STATIC_MODIFIER_NAME_nd_bej_suakin_ascendant: "Suakin Ascendant"
 STATIC_MODIFIER_DESC_nd_bej_suakin_ascendant: "The coral-built port of Suakin has risen to become the premier trading hub of the western Red Sea, drawing merchants from the Hijaz and beyond."
 STATIC_MODIFIER_NAME_nd_bej_law_of_the_silif: "Law of the Silif"
 STATIC_MODIFIER_DESC_nd_bej_law_of_the_silif: "The ancient unwritten code of the Beja, the silif, has been codified and universally accepted across the clans, bringing order and stability to the confederation."
 nd_bej.1.t: "Rise of the Beja"
 nd_bej.1.d: "The scattered clans of the Beja have at last united under a single banner. From the gold mines of Wadi Allaqi to the coral quays of Suakin, from the Red Sea Hills to the Eritrean lowlands, the Bedawiye-speaking peoples stand together as one nation.\n\nThe question now is what path this united Beja state shall pursue. The Red Sea coast offers fabulous wealth through trade with Arabia and the Indian Ocean world — Suakin already rivals Jeddah as a port of passage. But the desert itself is the Beja heartland, and camel-mounted warriors have raided and defended these lands since time immemorial.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_bej.1.a: "Command the Red Sea trade lanes!"
 nd_bej.1.b: "The desert is our fortress and our sword!"
 nd_bej.2.t: "Pearl of the Red Sea"
 nd_bej.2.d: "Suakin has blossomed into the greatest port on the western Red Sea coast. Its distinctive coral-block houses, rising four stories above narrow winding streets, testify to the wealth flowing through its harbor. Ships from Jeddah, Aden, and the Swahili coast crowd the anchorage, and Beja caravaneers link the port to the gold fields of the interior.\n\nThe port's customs revenues now rival those of any city in the Horn of Africa. Pilgrims bound for Mecca, merchants trading in pearls and mother-of-pearl, and slave caravans heading north all pass through our toll gates."
 nd_bej.2.a: "Suakin shall be the jewel of our realm!"
 nd_bej.2.b: "Suakin shall become the anchor of our fleet."
 nd_bej.3.t: "The Silif Endures"
 nd_bej.3.d: "For generations, the Beja have governed themselves through the silif — the body of unwritten customary law that regulates every aspect of life from grazing rights to blood feuds, from marriage contracts to trade disputes. Elders of each clan meet in assembly to mediate conflicts, and their judgments carry the weight of ancestral tradition.\n\nNow, as our confederation grows and encounters new challenges, the silif has been formalized and extended. Where once only oral memory preserved the law, now recognized assemblies of clan elders render consistent judgments across the entire Beja territory."
 nd_bej.3.a: "The wisdom of our ancestors shall guide us."
 nd_bej.3.b: "The law shall be enforced with a firm hand."
 nd_bej.4.t: "The Hadendowa Rise"
 nd_bej.4.d: "The Hadendowa, the most powerful of the Beja sub-confederations, have consolidated their dominance over the eastern lowlands. Their warriors, distinctive with their elaborate tiffa hairstyles and armed with straight-bladed swords and hide shields, are feared throughout the region.\n\nThe Hadendowa have demonstrated a capacity for organized military action that surpasses anything the Beja have achieved before, coordinating raids and defensive campaigns across hundreds of kilometers of desert."
 nd_bej.4.a: "The Hadendowa shall be our sword arm."
 nd_bej_desert_riders: "Desert Riders"
 nd_bej_desert_riders_desc: "The ancient Beja tradition of camel-mounted warfare, perfected across millennia of desert raiding and caravan escort."
 nd_bej_wadi_allaqi_mines: "Wadi Allaqi Mines"
 nd_bej_wadi_allaqi_mines_desc: "The gold deposits of Wadi Allaqi and the Eastern Desert, worked by Beja clans since ancient Egyptian times."
 nd_bej_camel_breeding: "Camel Breeding"
 nd_bej_camel_breeding_desc: "Selective breeding of camels for endurance and speed, the cornerstone of Beja pastoral wealth."
 nd_bej_caravan_guardians: "Caravan Guardians"
 nd_bej_caravan_guardians_desc: "Beja watchtowers and armed escorts protecting the vital trade routes through the Red Sea Hills."
 nd_bej_tribal_custom: "Tribal Custom"
 nd_bej_tribal_custom_desc: "The earliest form of the silif — oral traditions governing clan behavior, grazing rights, and dispute resolution."
 nd_bej_salt_routes: "Salt Routes"
 nd_bej_salt_routes_desc: "Control of salt deposits and the caravan routes that distribute this vital commodity across the Eastern Desert."
 nd_bej_sword_and_shield: "Sword and Shield"
 nd_bej_sword_and_shield_desc: "The fearsome Beja fighting style combining straight-bladed swords with small round hide-and-wood shields in devastating close combat."
 nd_bej_suakin_entrepot: "Suakin Entrepot"
 nd_bej_suakin_entrepot_desc: "Development of Suakin as the premier Red Sea trading port, with its distinctive coral-block architecture and thriving merchant community."
 nd_bej_red_sea_dhows: "Red Sea Dhows"
 nd_bej_red_sea_dhows_desc: "Beja-crewed dhows plying the Red Sea trade routes between Africa, Arabia, and the Indian Ocean world."
 nd_bej_islamic_integration: "Islamic Integration"
 nd_bej_islamic_integration_desc: "The gradual adoption of Islam through intermarriage with Arab traders and participation in Red Sea commerce."
 nd_bej_emerald_trade: "Emerald Trade"
 nd_bej_emerald_trade_desc: "Exploitation of the Eastern Desert emerald deposits, known since Ptolemaic times as the fabled mines of Cleopatra."
 nd_bej_clan_alliances: "Clan Alliances"
 nd_bej_clan_alliances_desc: "The Beja system of cross-cousin marriage alliances that bind clans together and prevent fragmentation in the harsh desert environment."
 nd_bej_desert_scouts: "Desert Scouts"
 nd_bej_desert_scouts_desc: "Elite mounted scouts who know every wadi, khor, and water source in the Red Sea Hills — the eyes and ears of the Beja confederation."
 nd_bej_silif_codification: "Silif Codification"
 nd_bej_silif_codification_desc: "Formalization of the silif, the ancient Beja customary law governing disputes, alliances, and resource sharing across all sub-confederations."
 nd_bej_sambuk_trade: "Sambuk Trade Vessels"
 nd_bej_sambuk_trade_desc: "Larger lateen-rigged sambuks built for long-range Red Sea commerce, carrying goods between African ports and the Arabian Peninsula."
 nd_bej_hajj_facilitators: "Hajj Facilitators"
 nd_bej_hajj_facilitators_desc: "Beja control of the overland route from the Nile Valley to the Red Sea ports, facilitating the pilgrimage to Mecca and profiting from the traffic."
 nd_bej_desert_warfare: "Desert Warfare"
 nd_bej_desert_warfare_desc: "Mastery of desert combat tactics — speed, surprise, and shock — perfected through generations of raiding and tribal warfare."
 nd_bej_port_customs: "Port Customs"
 nd_bej_port_customs_desc: "Systematic taxation of goods passing through Beja-controlled Red Sea ports, especially Suakin."
 nd_bej_hadendowa_confederation: "Hadendowa Confederation"
 nd_bej_hadendowa_confederation_desc: "The rise of the Hadendowa as the dominant Beja sub-confederation, organizing the most formidable warrior force in eastern Sudan."
 nd_bej_mountain_refuge: "Mountain Refuge"
 nd_bej_mountain_refuge_desc: "The Red Sea Hills and their inaccessible khors serve as an impregnable refuge, frustrating Ottoman and Funj attempts at subjugation."
 nd_bej_tribal_commerce: "Tribal Commerce"
 nd_bej_tribal_commerce_desc: "Formalized inter-tribal trade networks connecting the desert interior to the Red Sea coast."
 nd_bej_khor_strongholds: "Khor Strongholds"
 nd_bej_khor_strongholds_desc: "Fortified positions in the narrow ravines and dried riverbeds of the Red Sea Hills, where small forces can hold off much larger armies."
 nd_bej_desert_smiths: "Desert Smiths"
 nd_bej_desert_smiths_desc: "Beja metalworking tradition producing the characteristic straight-bladed swords and spearheads used by their warriors."
 nd_bej_pastoral_wealth: "Pastoral Wealth"
 nd_bej_pastoral_wealth_desc: "Diversification of Beja herding to include cattle alongside camels, sheep, and goats, expanding the pastoral economy."
 nd_bej_elite_desert_cavalry: "Elite Desert Cavalry"
 nd_bej_elite_desert_cavalry_desc: "The finest Beja camel cavalry, trained for sustained desert campaigns and capable of covering vast distances at speed."
 nd_bej_hijaz_gateway: "Hijaz Gateway"
 nd_bej_hijaz_gateway_desc: "Suakin as the primary crossing point between Africa and the Hijaz, linking the Nile Valley to Mecca and Medina."
 nd_bej_desert_logistics: "Desert Logistics"
 nd_bej_desert_logistics_desc: "Unmatched expertise in desert navigation, water source management, and long-range movement across the Eastern Desert."
 nd_bej_confederal_diplomacy: "Confederal Diplomacy"
 nd_bej_confederal_diplomacy_desc: "Diplomatic skill born of managing a confederation of fiercely independent clans — the Hadendowa, Bisharin, Amarar, and Ababda."
 nd_bej_eastern_desert_resources: "Eastern Desert Resources"
 nd_bej_eastern_desert_resources_desc: "Expanded exploitation of copper, nickel, and other mineral resources found throughout the Eastern Desert, with charcoal smelting."
 nd_bej_unbroken_warriors: "Unbroken Warriors"
 nd_bej_unbroken_warriors_desc: "The martial legacy of the Beja endures into the modern era — these are the warriors who would one day break a British infantry square at Tamai."
 nd_bej_red_sea_modernization: "Red Sea Modernization"
 nd_bej_red_sea_modernization_desc: "Adaptation of Beja trade practices to the changing patterns of Red Sea commerce in the modern age."
 nd_bej_bedawiye_identity: "Bedawiye Identity"
 nd_bej_bedawiye_identity_desc: "The enduring cultural identity of the Bedawiye-speaking peoples, maintained through millennia of external pressure and change."
 nd_bej_eastern_sudan: "Eastern Sudan"
 nd_bej_eastern_sudan_desc: "Consolidation of Beja control over the eastern Sudan, from the Egyptian border to the Eritrean lowlands."
 nd_bej_pastoral_endurance: "Pastoral Endurance"
 nd_bej_pastoral_endurance_desc: "The remarkable resilience of the Beja pastoral economy, adapting to drought, war, and changing trade patterns across centuries."
 a_nd_bej_camel_raiders: "Beja Camel Raiders"
 a_nd_bej_camel_raiders_desc: "Swift desert raiders on camelback, these warriors strike without warning and vanish into the trackless wastes before any organized response can be mounted."
 a_nd_bej_swordsmen: "Beja Swordsmen"
 a_nd_bej_swordsmen_desc: "Fierce warriors wielding straight-bladed swords and small round shields of hide and wood, the Beja swordsmen are devastating in close combat."
 a_nd_bej_mounted_scouts: "Beja Mounted Scouts"
 a_nd_bej_mounted_scouts_desc: "Elite riders who know every wadi and water source in the Eastern Desert, serving as scouts, raiders, and the first line of defense for the Beja confederation."
 a_nd_bej_hadendowa_warriors: "Hadendowa Warriors"
 a_nd_bej_hadendowa_warriors_desc: "The Hadendowa are the most feared of the Beja sub-confederations — warriors with elaborate tiffa hairstyles whose massed charges can overwhelm even disciplined formations."
 n_nd_bej_dhow: "Beja Dhow"
 n_nd_bej_dhow_desc: "A lateen-rigged vessel crewed by Beja sailors, built for speed on the Red Sea trade routes. Light and fast, but fragile in naval combat."
 n_nd_bej_sambuk: "Red Sea Sambuk"
 n_nd_bej_sambuk_desc: "A larger lateen-rigged vessel designed for long-range Red Sea trade, carrying goods between the African coast and Arabia."
 a_nd_bej_desert_cavalry: "Beja Desert Cavalry"
 a_nd_bej_desert_cavalry_desc: "Elite camel-mounted warriors of the absolutism era, combining Beja desert expertise with improved arms and tactics."
 nd_bej_gold_camp: "Gold Mine Camp"
 nd_bej_gold_camp_desc: "An Eastern Desert gold extraction site managed by Beja clans, continuing a mining tradition stretching back to pharaonic times."
 nd_bej_camel_market: "Camel Market"
 nd_bej_camel_market_desc: "A thriving center for Beja camel breeding and trading, where the finest riding and pack camels of northeast Africa change hands."
 nd_bej_coral_house: "Coral Stone House"
 nd_bej_coral_house_desc: "A distinctive multi-story trading house built from coral blocks quarried from the Red Sea bed, in the style of Suakin's merchant quarter."
 nd_bej_desert_watchtower: "Desert Watchtower"
 nd_bej_desert_watchtower_desc: "A fortified observation post guarding the caravan routes through the Red Sea Hills, manned by Beja warriors."
 nd_bej_tribal_assembly: "Tribal Assembly"
 nd_bej_tribal_assembly_desc: "A gathering place where Beja clan elders convene to settle disputes, allocate grazing rights, and render judgment according to the silif."
 nd_bej_hajj_hostel: "Hajj Hostel"
 nd_bej_hajj_hostel_desc: "A way station on the pilgrimage route to Mecca, providing lodging and provisions for travelers crossing from the Nile Valley to the Red Sea coast."
 nd_bej_khor_fortress: "Khor Fortress"
 nd_bej_khor_fortress_desc: "A fortified position built into a narrow ravine of the Red Sea Hills, where the terrain itself becomes the strongest wall."
 nd_bej_smithy: "Beja Smithy"
 nd_bej_smithy_desc: "A desert metalworking workshop producing the distinctive straight-bladed swords and spearheads that arm Beja warriors."
 nd_bej_salt_trade: "Red Sea Salt Trade"
 nd_bej_salt_trade_desc: "The processing and distribution of salt from the Red Sea coast, a vital commodity for pastoral communities across the Eastern Desert."
 nd_bej_emerald_polishing: "Emerald Polishing"
 nd_bej_emerald_polishing_desc: "Cutting and polishing of emeralds from the Eastern Desert mines, prized across the Mediterranean and Islamic world."
 nd_bej_charcoal_production: "Charcoal Production"
 nd_bej_charcoal_production_desc: "Production of charcoal from desert scrub and acacia wood, used for smelting copper and other metals in the Eastern Desert."
 nd_bej_gold_camp_upkeep: "Gold Camp Operations"
 nd_bej_gold_camp_upkeep_desc: "Timber supports and stone tools required to maintain the gold extraction operations."
 nd_bej_camel_market_upkeep: "Camel Market Operations"
 nd_bej_camel_market_upkeep_desc: "Livestock feed and facilities needed to operate the camel trading center."
 nd_bej_coral_house_upkeep: "Coral House Maintenance"
 nd_bej_coral_house_upkeep_desc: "Stone and timber required to maintain the coral-block trading houses."
 nd_bej_watchtower_upkeep: "Watchtower Garrison"
 nd_bej_watchtower_upkeep_desc: "Stone fortifications and weapons for the garrison manning the desert watchtower."
 nd_bej_assembly_upkeep: "Assembly Provisions"
 nd_bej_assembly_upkeep_desc: "Livestock for the traditional hospitality required when hosting clan elder assemblies."
 nd_bej_hajj_hostel_upkeep: "Hostel Provisions"
 nd_bej_hajj_hostel_upkeep_desc: "Food and livestock to provide hospitality for pilgrims passing through on the way to Mecca."
 nd_bej_khor_fortress_upkeep: "Fortress Garrison"
 nd_bej_khor_fortress_upkeep_desc: "Stone and weapons for maintaining the khor fortress garrison."
 nd_bej_smithy_upkeep: "Desert Weapon Forging"
 nd_bej_smithy_upkeep_desc: "Beja smiths forge iron with charcoal fuel into the straight-bladed swords and spearheads that arm desert warriors."
 levy_nd_bej_camel_raiders: "Beja Camel Raider Levy"
 levy_nd_bej_camel_raiders_desc: "Beja tribesmen raised as camel-mounted raiders in the traditional desert warfare style."
 levy_nd_bej_hadendowa_warriors: "Hadendowa Warrior Levy"
 levy_nd_bej_hadendowa_warriors_desc: "Fearsome Hadendowa foot warriors raised from the eastern lowlands, armed with sword and shield."
 STATIC_MODIFIER_NAME_nd_bej_naval_power: "Beja Naval Power"
 STATIC_MODIFIER_DESC_nd_bej_naval_power: "Suakin's wealth funds a fleet of armed dhows and sambuks that project Beja power across the Red Sea, protecting trade routes and establishing maritime authority."
 STATIC_MODIFIER_NAME_nd_bej_silif_enforcement: "Silif Enforcement"
 STATIC_MODIFIER_DESC_nd_bej_silif_enforcement: "The codified silif is enforced with firm authority across all clans, bringing order and predictability to governance throughout the Beja confederation."
 nd_bej_formed_tt: "Beja has been formed"
 nd_bej_path_a_tt: "Chose Lords of the Red Sea"
 nd_bej_path_b_tt: "Chose Sons of the Desert"
 nd_bej_destiny: "Beja Destiny"
 nd_bej_destiny_desc: "The Beja stand united — a nation forged from the desert clans. Now the question is whether to look outward across the Red Sea or inward across the sands."
 nd_bej_dest_red_sea_ports: "Red Sea Ports"
 nd_bej_dest_red_sea_ports_desc: "Secure the great Red Sea harbors of Suakin and Aydhab, establishing Beja control over the western coast's maritime trade."
 nd_bej_dest_arabian_trade: "Arabian Trade"
 nd_bej_dest_arabian_trade_desc: "Extend Beja commercial influence across the Red Sea to Jeddah, tapping into the pilgrim and pearl trades that connect Africa to Arabia."
 nd_bej_dest_red_sea_hegemony: "Red Sea Hegemony"
 nd_bej_dest_red_sea_hegemony_desc: "Command the entire Red Sea from Aden to Dahlak, becoming the undisputed masters of the world's most strategic waterway."
 nd_bej_dest_nubian_conquest: "Nubian Conquest"
 nd_bej_dest_nubian_conquest_desc: "March into the Nubian heartland and seize Dongola and Kassala, extending Beja power over the upper Nile corridor."
 nd_bej_dest_nile_march: "Nile March"
 nd_bej_dest_nile_march_desc: "Push south along the Nile to Sennar and west to the Ethiopian highlands, forging a desert empire from the Red Sea Hills to the Blue Nile."
 nd_bej_dest_desert_empire: "Desert Empire"
 nd_bej_dest_desert_empire_desc: "Conquer the entire eastern Sudan from Berber to Soba, uniting the Nile corridor under Beja rule in an empire stretching from the cataracts to the confluence."
 nd_bej.5.t: "A Nation Forged in Sand"
 nd_bej.5.d: "The Beja confederation has proven its strength. From the Red Sea Hills to the coastal lowlands, the Bedawiye-speaking clans have found common purpose. Our elders have spoken, and the silif binds us as one people.\n\nThe path ahead is ours to choose, and the destiny we forge shall echo through the ages."
 nd_bej.5.a: "Our destiny awaits."
 nd_bej.6.t: "The Coral Ports"
 nd_bej.6.d: "The great ports of the western Red Sea now fly the Beja banner. Suakin, with its coral-block houses rising from the turquoise waters, and ancient Aydhab, the old pilgrim port, are ours. Merchant dhows from Arabia and India crowd our harbors, and the customs revenues swell our treasury.\n\nThe Beja have transformed from desert raiders into masters of maritime commerce. The wealth of the Red Sea flows through our hands."
 nd_bej.6.a: "The sea is our road to greatness."
 nd_bej.7.t: "Across the Red Sea"
 nd_bej.7.d: "Beja merchants have crossed the Red Sea to establish themselves in Jeddah, the great port of the Hijaz. Our sambuks carry pearls, gold, and incense to Arabia and return laden with dates, textiles, and the wealth of the Islamic world.\n\nThis trade transforms us. We are no longer a coastal power but a node in a vast commercial network spanning two continents. The question is how to shape this new wealth — shall we invest in institutions and learning, or build a fleet to protect and expand our trade routes?"
 nd_bej.7.a: "Invest in learning and trade houses."
 nd_bej.7.b: "Build a fleet worthy of our ambitions."
 nd_bej.8.t: "Masters of the Red Sea"
 nd_bej.8.d: "From Aden at the mouth of the Red Sea to the Dahlak Archipelago, Beja power is unchallenged on these waters. No ship crosses from Africa to Arabia without our consent, and no caravan reaches the coast without paying our tolls.\n\nThe Red Sea, which the ancients called Mare Erythraeum, has become a Beja lake. Our coral ports gleam in the tropical sun, our sambuks rule the waves, and our merchants are welcomed from Cairo to Calicut. How shall we wield this unprecedented power?"
 nd_bej.8.a: "Foster scholars and institutions of learning."
 nd_bej.8.b: "Project our power across the sea."
 nd_bej.9.t: "Into the Nubian Heartland"
 nd_bej.9.d: "Beja warriors have swept out of the Red Sea Hills and into the Nile corridor. Dongola, the ancient capital of Makuria, and Kassala, guardian of the eastern approach, have fallen to our cavalry. The people of the Nile Valley, long accustomed to Nubian and Funj rule, now look upon Beja banners with a mixture of awe and apprehension.\n\nThe desert warriors have proven they can take cities as well as raid caravans."
 nd_bej.9.a: "The desert breeds conquerors."
 nd_bej.10.t: "The March Along the Nile"
 nd_bej.10.d: "Our armies have pushed deep into the Sudan. Sennar, seat of the Funj sultanate, has been taken, and our scouts have reached the Ethiopian highlands at Axum. The Beja realm now stretches from the Red Sea coast to the Blue Nile, encompassing peoples and lands our ancestors knew only as distant trading partners.\n\nGoverning this sprawling domain requires new approaches. Shall we rule through fear and force of arms, or build the institutions of centralized command?"
 nd_bej.10.a: "Strike fast, negotiate from strength."
 nd_bej.10.b: "Centralize command of our domains."
 nd_bej.11.t: "Empire of Sand and Stone"
 nd_bej.11.d: "From the cataracts of the Nile to the confluence of the Blue and White Niles at Soba, the Beja flag flies over a vast desert empire. The ancient trading town of Berber, the fortress of Atbara, the ruins of Meroe — all are ours. No power in eastern Africa can challenge the warriors of the Eastern Desert.\n\nThis empire is unprecedented in Beja history. Our ancestors raided and traded; we have conquered and ruled. How shall we consolidate this achievement?"
 nd_bej.11.a: "Maintain our war machine at all costs."
 nd_bej.11.b: "Absorb the conquered into our nation."
 STATIC_MODIFIER_NAME_nd_bej_dest_suakin_gateway_a: "Suakin Gateway"
 STATIC_MODIFIER_DESC_nd_bej_dest_suakin_gateway_a: "The wealth of the Arabian trade fuels institutional growth and commercial expansion across the Beja realm, though maintaining our armies strains the treasury."
 STATIC_MODIFIER_NAME_nd_bej_dest_suakin_gateway_b: "Fleet of the Red Sea"
 STATIC_MODIFIER_DESC_nd_bej_dest_suakin_gateway_b: "A powerful fleet of dhows and sambuks projects Beja influence across the Red Sea, backed by the piety of Islamic scholarship."
 STATIC_MODIFIER_NAME_nd_bej_dest_red_sea_masters_a: "Scholars of the Sea"
 STATIC_MODIFIER_DESC_nd_bej_dest_red_sea_masters_a: "The wealth of Red Sea trade is invested in literacy and learning, though our scholars view war with distaste."
 STATIC_MODIFIER_NAME_nd_bej_dest_red_sea_masters_b: "Maritime Dominion"
 STATIC_MODIFIER_DESC_nd_bej_dest_red_sea_masters_b: "Beja maritime dominion attracts loyal subjects and settlers to the Red Sea coast, elevating the confederation among the great powers."
 STATIC_MODIFIER_NAME_nd_bej_dest_nile_conquerors_a: "Desert Raiders"
 STATIC_MODIFIER_DESC_nd_bej_dest_nile_conquerors_a: "Swift raids and intelligence networks give the Beja leverage in negotiations, though rapid expansion strains our finances."
 STATIC_MODIFIER_NAME_nd_bej_dest_nile_conquerors_b: "Central Command"
 STATIC_MODIFIER_DESC_nd_bej_dest_nile_conquerors_b: "A centralized military command structure coordinates desert campaigns and reduces the cost of declaring war."
 STATIC_MODIFIER_NAME_nd_bej_dest_desert_empire_a: "Unbroken Legions"
 STATIC_MODIFIER_DESC_nd_bej_dest_desert_empire_a: "The Beja war machine is sustained by cheap reinforcements, mercenary auxiliaries, and a wide diplomatic network."
 STATIC_MODIFIER_NAME_nd_bej_dest_desert_empire_b: "Lords of the Conquered"
 STATIC_MODIFIER_DESC_nd_bej_dest_desert_empire_b: "The Beja absorb conquered peoples through tolerance and assimilation, though the empire grows complacent with success."
 nd_bej_red_sea_trading_house: "Red Sea Trading House"
 nd_bej_red_sea_trading_house_desc: "A grand coral-and-stone trading house commanding the Red Sea commerce, the jewel of Beja mercantile power."
 nd_bej_trading_house_upkeep: "Trading House Operations"
 nd_bej_trading_house_upkeep_desc: "Stone, timber, cloth, and paper required to maintain the grand trading house and its commercial records."
 nd_bej_desert_war_camp: "Desert War Camp"
 nd_bej_desert_war_camp_desc: "A fortified forward base for desert campaigns, where Beja warriors muster, resupply, and prepare for the next assault."
 nd_bej_war_camp_upkeep: "War Camp Garrison"
 nd_bej_war_camp_upkeep_desc: "Weapons, leather, livestock, and stone required to maintain the desert war camp and its garrison."
