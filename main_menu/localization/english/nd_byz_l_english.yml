l_english:
 STATIC_MODIFIER_NAME_nd_byz_renovatio_imperii: "Renovatio Imperii"
 STATIC_MODIFIER_DESC_nd_byz_renovatio_imperii: "The Roman Empire has been restored. As heirs to Augustus and Justinian, the Basileus claims dominion over the civilized world through law, administration, and military might."
 STATIC_MODIFIER_NAME_nd_byz_orthodox_ecumene: "The Orthodox Ecumene"
 STATIC_MODIFIER_DESC_nd_byz_orthodox_ecumene: "Constantinople stands once more as the spiritual center of Christendom. The Ecumenical Patriarch's authority radiates from the Hagia Sophia, drawing the faithful into the embrace of Orthodoxy."
 nd_byz.1.t: "The Restoration of Byzantium"
 nd_byz.1.d: "The eagles of Rome fly once more over Constantinople. The ancient capital, seat of emperors for a thousand years, has been reclaimed for Greek civilization and the Orthodox faith. The Hagia Sophia's dome catches the light of a new dawn.\n\nBut what shall this restored empire be? The legacy of Rome offers two visions. One looks to Justinian and the Caesars — a universal empire of law, discipline, and conquest, where the Basileus rules as God's chosen administrator of earthly affairs. The other looks to the Ecumenical Patriarch and the Desert Fathers — a sacred commonwealth where Orthodoxy unites the peoples, where monasteries preserve civilization, and where spiritual authority outshines any temporal crown.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_byz.1.a: "We are Rome reborn — by law and sword we shall rule"
 nd_byz.1.b: "We are the light of Orthodoxy — faith shall be our empire"
 STATIC_MODIFIER_NAME_nd_byz_greek_fire_mastery: "Greek Fire Mastery"
 STATIC_MODIFIER_DESC_nd_byz_greek_fire_mastery: "The secret of liquid fire has been perfected. Our galleys carry siphons that project inextinguishable flame across the waves, turning every naval engagement into a conflagration."
 nd_byz.2.t: "The Weapon of Emperors"
 nd_byz.2.d: "The secret of Greek fire — the liquid flame that burns upon water — was perhaps the most closely guarded state secret in all of history. Invented by Kallinikos of Heliopolis in the 7th century, it was projected from bronze siphons mounted on the prows of dromons, turning Byzantine warships into floating flamethrowers.\n\nThe composition was known only to a handful of craftsmen whose families passed the formula down through generations. No enemy ever replicated it. The mere rumor that a Byzantine fleet carried siphons was often enough to prevent battle entirely. Arab, Russian, and Bulgar fleets all learned to fear the terrible cry of 'Loose the fire!' that preceded sheets of liquid flame racing across the sea."
 nd_byz.2.a: "The flame of empire burns eternal"
 STATIC_MODIFIER_NAME_nd_byz_city_reclaimed: "The Queen of Cities Restored"
 STATIC_MODIFIER_DESC_nd_byz_city_reclaimed: "Constantinople's walls stand firm once more. The great cisterns fill with fresh water, the aqueducts carry life through every quarter, and the city resumes its ancient role as the most fortified metropolis in the world."
 STATIC_MODIFIER_NAME_nd_byz_new_golden_age: "A New Golden Age"
 STATIC_MODIFIER_DESC_nd_byz_new_golden_age: "Constantinople's markets bustle once more with the trade of three continents. Merchants from Venice, Genoa, Egypt, and the Rus converge on the Golden Horn, and the empire's coffers swell with the wealth of the crossroads."
 nd_byz.3.t: "Constantinople Restored"
 nd_byz.3.d: "For a thousand years, Constantinople was the greatest city in Christendom — perhaps in the world. Its triple walls defied every siege. Its underground cisterns, like the great Basilica Cistern with its 336 marble columns, held enough fresh water to sustain the population through months of blockade. Its position on the Bosphorus controlled the passage between Europe and Asia, between the Mediterranean and the Black Sea.\n\nNow the city is being rebuilt. Engineers restore the aqueducts of Valens, workers clear the debris from the great forums, and the markets of the Mese begin to fill once more with goods from distant lands. The question is whether to make Constantinople an impregnable fortress or an irresistible market."
 nd_byz.3.a: "Make the walls invincible — no enemy shall pass"
 nd_byz.3.b: "Open the gates to commerce — let gold flow like water"
 STATIC_MODIFIER_NAME_nd_byz_justinianic_legacy: "Justinianic Legacy"
 STATIC_MODIFIER_DESC_nd_byz_justinianic_legacy: "The revival of Justinian's legal codex has brought order to the empire's administration. Courts follow written law, tax collectors answer to magistrates, and the machinery of Roman governance turns once more."
 nd_byz.4.t: "The Revival of Justinian's Law"
 nd_byz.4.d: "The Corpus Juris Civilis — the Body of Civil Law — was Justinian's greatest monument, more enduring than the Hagia Sophia itself. Compiled between 529 and 534 by the jurist Tribonian and his team, it codified a thousand years of Roman legal thought into a coherent system that addressed marriage, property, inheritance, criminal law, and the rights of citizens.\n\nThough the original empire that produced this masterwork fell, its legal principles survived. They were studied in the universities of Bologna and Paris, and they shaped the civil law tradition of half of Europe. Now, a restored Byzantine state draws upon this heritage to build an administration that combines ancient Roman efficiency with the needs of a modern empire."
 nd_byz.4.a: "Justice is the foundation of empire"
 nd_byz_greek_fire: "Greek Fire"
 nd_byz_greek_fire_desc: "The secret of liquid fire that burns upon water, projected from bronze siphons on war galleys."
 nd_byz_thematic_administration: "Thematic Administration"
 nd_byz_thematic_administration_desc: "The theme system divided the empire into military-administrative districts where soldier-farmers defended the land they tilled."
 nd_byz_pronoia_system: "Pronoia System"
 nd_byz_pronoia_system_desc: "Land grants to military officers in exchange for cavalry service, the Byzantine answer to Western feudalism."
 nd_byz_silk_monopoly: "Imperial Silk Monopoly"
 nd_byz_silk_monopoly_desc: "State-controlled silk workshops producing the finest textiles in the world, with Tyrian purple reserved for the emperor alone."
 nd_byz_stradioti_tradition: "Stradioti Tradition"
 nd_byz_stradioti_tradition_desc: "The tradition of Greek and Albanian light cavalry raiders, famed across Europe for their speed and ferocity."
 nd_byz_imperial_neoria: "Imperial Neoria"
 nd_byz_imperial_neoria_desc: "The great dockyards of the Golden Horn, where the dromon fleet was built and maintained."
 nd_byz_cistern_engineering: "Cistern Engineering"
 nd_byz_cistern_engineering_desc: "The art of building vast underground reservoirs that sustained Constantinople through siege and drought."
 nd_byz_book_of_the_eparch: "Book of the Eparch"
 nd_byz_book_of_the_eparch_desc: "The Byzantine trade regulation manual governing Constantinople's guilds, from silk weavers to perfumers."
 nd_byz_hippodrome_tradition: "Hippodrome Tradition"
 nd_byz_hippodrome_tradition_desc: "The hippodrome was the political heart of the empire, where chariot factions served as proto-parties and emperors secured popular legitimacy."
 nd_byz_justinianic_revival: "Justinianic Legal Revival"
 nd_byz_justinianic_revival_desc: "Drawing on the Corpus Juris Civilis to build an efficient centralized administration rooted in Roman legal tradition."
 nd_byz_phanariote_diplomacy: "Phanariote Diplomacy"
 nd_byz_phanariote_diplomacy_desc: "The Phanariote Greeks served as administrators, interpreters, and diplomats across the eastern Mediterranean, masters of intrigue and negotiation."
 nd_byz_neo_byzantine_enlightenment: "Neo-Byzantine Enlightenment"
 nd_byz_neo_byzantine_enlightenment_desc: "A renaissance of learning drawing on classical and Byzantine scholarship, transforming education and governance."
 nd_byz_imperial_naval_modernization: "Imperial Naval Modernization"
 nd_byz_imperial_naval_modernization_desc: "The transition from galley-based warfare to a modern fleet, combining ancient maritime tradition with contemporary ship design."
 n_nd_byz_dromon: "Dromon"
 n_nd_byz_dromon_desc: "The dromon was the backbone of the Byzantine navy — a fast, oar-driven war galley equipped with a bronze siphon for projecting Greek fire. Its crew of rowers and marines made it a versatile instrument of naval power in the confined waters of the Aegean and the Straits."
 a_nd_byz_stradioti: "Stradioti"
 a_nd_byz_stradioti_desc: "Light cavalry recruited from the Albanian and Greek borderlands, the Stradioti were swift raiders and scouts whose javelin-armed charges could shatter an exposed flank. They served as mercenaries across Europe, hired by Venice, France, and Spain."
 n_nd_byz_fire_dromon: "Imperial Fire Dromon"
 n_nd_byz_fire_dromon_desc: "The apex of Byzantine naval design — a heavy dromon with reinforced hull and an advanced Greek fire siphon system. These warships controlled the narrow waters of the Bosphorus and the Dardanelles, their liquid fire making them nearly unstoppable in close combat."
 nd_byz_imperial_cistern: "Imperial Cistern"
 nd_byz_imperial_cistern_desc: "A vast underground reservoir modeled on Constantinople's legendary Basilica Cistern, with hundreds of marble columns supporting a vaulted ceiling above millions of gallons of fresh water."
 nd_byz_silk_ergasterion: "Silk Ergasterion"
 nd_byz_silk_ergasterion_desc: "An imperial silk workshop where raw silk is spun, dyed with precious pigments, and woven into the finest textiles in the world. The purple silk of the Basileus is produced here."
 nd_byz_hippodrome: "Imperial Hippodrome"
 nd_byz_hippodrome_desc: "A monumental arena for chariot racing and public ceremonies. The hippodrome served as the political heart of the empire, where factions clashed and emperors were acclaimed."
 nd_byz_neorion: "Byzantine Neorion"
 nd_byz_neorion_desc: "An imperial naval dockyard on the model of Constantinople's Golden Horn arsenals, where dromons are built, repaired, and fitted with their deadly siphons of liquid fire."
 nd_byz_cistern_maintenance: "Cistern Maintenance"
 nd_byz_cistern_maintenance_desc: "Maintaining the stonework, aqueduct connections, and filtration systems of the underground water reservoirs."
 nd_byz_silk_weaving: "Imperial Silk Weaving"
 nd_byz_silk_weaving_desc: "Processing raw silk and exotic dyes into the finest textiles in Christendom."
 nd_byz_hippodrome_upkeep: "Hippodrome Operations"
 nd_byz_hippodrome_upkeep_desc: "Maintaining the chariot teams, track surfaces, and monumental stonework of the imperial arena."
 nd_byz_neorion_operations: "Dockyard Operations"
 nd_byz_neorion_operations_desc: "Supplying timber, pitch, nails, and naval stores for the construction and repair of the dromon fleet."
 levy_nd_byz_stradioti: "Stradioti Levy"
 levy_nd_byz_stradioti_desc: "Light cavalry levied from the Greek and Albanian borderlands, serving as swift raiders and scouts in the tradition of the Stradioti mercenaries."
 levy_nd_byz_dromon: "Dromon Levy"
 levy_nd_byz_dromon_desc: "Oar-driven war galleys levied from coastal provinces, crewed by experienced seamen in the ancient maritime tradition of the Byzantine navy."
 nd_byz_formed_tt: "Byzantium has been formed"
 nd_byz_path_a_tt: "Chose Heir of Rome"
 nd_byz_path_b_tt: "Chose Light of Orthodoxy"
 nd_byz_destiny: "Destiny of Byzantium"
 nd_byz_destiny_desc: "The empire has been restored. Now it must prove itself worthy of the name of Rome."
 nd_byz_dest_exarchate: "Reclaim the Exarchate"
 nd_byz_dest_exarchate_desc: "The Exarchate of Ravenna was Byzantium's western anchor for centuries. Take Ravenna and Bari to re-establish imperial authority in Italy."
 nd_byz_dest_africa: "Reconquista Africana"
 nd_byz_dest_africa_desc: "Justinian's reconquest of North Africa from the Vandals was one of his greatest triumphs. Follow in his footsteps by taking Tunis and Tripoli."
 nd_byz_dest_renovatio: "Renovatio Imperii"
 nd_byz_dest_renovatio_desc: "The full restoration of the Roman Empire: Rome, Antioch, Alexandria. Three of the five ancient pentarchies united under one eagle. This is the ultimate capstone of the Heir of Rome."
 nd_byz_dest_ecumene: "The Ecumenical See"
 nd_byz_dest_ecumene_desc: "Thessaloniki, the co-capital, and Jerusalem, the holiest city in Christendom. Secure these sacred seats to establish the spiritual authority of the Orthodox Ecumene."
 nd_byz_dest_commonwealth: "The Orthodox Commonwealth"
 nd_byz_dest_commonwealth_desc: "Build a thriving economic and cultural commonwealth. Embrace banking, dominate the silk trade in your capital market, and develop your lands to match the prosperity of the ancient empire."
 nd_byz_dest_new_rome: "The New Rome"
 nd_byz_dest_new_rome_desc: "Constantinople becomes the New Rome in truth — the cultural, spiritual, and intellectual capital of the world. Embrace the printing press, develop your vast domains, and prove that Byzantium's light outshines all rivals."
 nd_byz.5.t: "The Destiny of Byzantium"
 nd_byz.5.d: "The restored empire stands at a crossroads of history. Constantinople's walls have been rebuilt, the Hagia Sophia rings once more with Orthodox liturgy, and the eagle standard flies over the Bosphorus. But restoration is only the beginning. The empire that once stretched from Spain to Mesopotamia cannot rest content with what it holds. What direction shall Byzantium's destiny take?"
 nd_byz.5.a: "Our destiny awaits"
 nd_byz.6.t: "The Exarchate Reclaimed"
 nd_byz.6.d: "The Exarchate of Ravenna was established in 584 as Byzantium's administrative center in Italy, governing the remnants of Justinian's reconquest. For nearly two centuries it held the line against Lombards and Franks, preserving Roman civilization in the West. Its loss in 751 to the Lombards marked the end of Byzantine authority in central Italy.\n\nNow Ravenna and Bari fly the imperial standard once more. The mosaics of San Vitale, depicting Justinian and Theodora in all their imperial glory, look down upon Byzantine soldiers for the first time in centuries."
 nd_byz.6.a: "Italy remembers its Roman masters"
 nd_byz.7.t: "Africa Reconquered"
 nd_byz.7.d: "In 533, Belisarius landed in Africa with just 15,000 men and, in a campaign of astonishing brilliance, destroyed the Vandal kingdom in a matter of months. The African provinces became Rome's breadbasket once more, their grain feeding Constantinople for another century.\n\nNow history repeats itself. Byzantine banners fly over Carthage's ruins and Tripoli's harbor. The question is how to use this reconquest — as a military springboard for further expansion, or as an agricultural heartland to feed the empire's growing population."
 nd_byz.7.a: "Raise African legions for the campaigns ahead"
 nd_byz.7.b: "Let Africa feed the empire as it once fed Rome"
 nd_byz.8.t: "Renovatio Imperii"
 nd_byz.8.d: "Rome. Antioch. Alexandria. Three of the five great patriarchates of ancient Christendom now answer to Constantinople. The Mediterranean is once more a Roman lake. This is the achievement that Justinian dreamed of, that Heraclius fought for, that the Palaiologoi mourned as forever lost.\n\nThe Renovatio Imperii — the Renewal of the Empire — is complete. But every great empire must choose how to sustain its greatness. Will the restored Rome bring peace and order to its subjects through law and administration? Or will it maintain its dominion through the invincible legions that won this empire?"
 nd_byz.8.a: "Let Roman law bring order to the world"
 nd_byz.8.b: "The legions are eternal — they are the empire"
 nd_byz.9.t: "The Ecumenical See"
 nd_byz.9.d: "Thessaloniki, the empire's second city, and Jerusalem, the holiest site in Christendom, both acknowledge the authority of the Ecumenical Patriarch. The spiritual geography of Orthodoxy now radiates from Constantinople in all directions — west to the Balkans, south to the Holy Land, north to the Slavic world.\n\nMonasteries flourish, pilgrim routes multiply, and the Orthodox faithful look to the New Rome as their spiritual center. The foundation of a sacred commonwealth has been laid."
 nd_byz.9.a: "The faithful gather under the Patriarch's wing"
 nd_byz.10.t: "The Orthodox Commonwealth"
 nd_byz.10.d: "The empire's markets overflow with silk, spice, and the products of three continents. The banking institutions that once enriched Venice and Genoa now serve Byzantine commerce. The old Silk Road routes that made Constantinople the wealthiest city in the medieval world have been restored, and the capital's market dominates the eastern Mediterranean.\n\nThis prosperity can be directed in different ways. The wealth of trade can spread Byzantine culture across the known world, or the monasteries can use this golden age to advance Orthodox learning and scholarship."
 nd_byz.10.a: "Let our culture flow with our trade"
 nd_byz.10.b: "The monasteries shall be beacons of learning"
 nd_byz.11.t: "The New Rome"
 nd_byz.11.d: "Constantinople is no longer merely the capital of a restored empire — it is the intellectual and spiritual center of the world. The Patriarchal Academy produces scholars and theologians who rival the best of any university in Europe. The printing press spreads Orthodox texts and Greek philosophy across the continent. Byzantine art, architecture, and thought set the standard for civilization itself.\n\nThis is the New Rome that the founders of Constantinople dreamed of — not merely a political capital, but a beacon of civilization. The question is whether to emphasize its role as the sacred center of Orthodoxy, or as the commercial crossroads of the known world."
 nd_byz.11.a: "Orthodoxy shall illuminate the world"
 nd_byz.11.b: "Constantinople is the crossroads of worlds"
 STATIC_MODIFIER_NAME_nd_byz_dest_african_legions: "African Legions"
 STATIC_MODIFIER_DESC_nd_byz_dest_african_legions: "The reconquered African provinces supply fresh recruits for the imperial army, raising new legions in the tradition of Belisarius's African campaign."
 STATIC_MODIFIER_NAME_nd_byz_dest_african_granary: "African Granary"
 STATIC_MODIFIER_DESC_nd_byz_dest_african_granary: "Africa's fertile plains resume their ancient role as the empire's breadbasket, their harvests feeding Constantinople and fueling growth."
 STATIC_MODIFIER_NAME_nd_byz_dest_pax_romana: "Pax Romana"
 STATIC_MODIFIER_DESC_nd_byz_dest_pax_romana: "Roman law and administration bring peace and order to the vast domains of the restored empire, reducing unrest and binding subjects through justice rather than force."
 STATIC_MODIFIER_NAME_nd_byz_dest_eternal_legions: "Eternal Legions"
 STATIC_MODIFIER_DESC_nd_byz_dest_eternal_legions: "The legions that conquered three continents remain the backbone of imperial power, their discipline and speed unmatched by any rival army."
 STATIC_MODIFIER_NAME_nd_byz_dest_silk_road_restored: "Silk Road Restored"
 STATIC_MODIFIER_DESC_nd_byz_dest_silk_road_restored: "The ancient trade routes that made Constantinople wealthy beyond measure flow once more, spreading Byzantine culture and wealth across the known world."
 STATIC_MODIFIER_NAME_nd_byz_dest_monastic_learning: "Monastic Learning"
 STATIC_MODIFIER_DESC_nd_byz_dest_monastic_learning: "The great monasteries of Athos, Sinai, and the Studion become centers of scholarship, preserving and advancing knowledge in the Orthodox tradition."
 STATIC_MODIFIER_NAME_nd_byz_dest_beacon_of_faith: "Beacon of Faith"
 STATIC_MODIFIER_DESC_nd_byz_dest_beacon_of_faith: "Orthodoxy radiates from Constantinople as a spiritual beacon, its moral authority drawing the faithful and overawing the heathen."
 STATIC_MODIFIER_NAME_nd_byz_dest_crossroads_of_worlds: "Crossroads of Worlds"
 STATIC_MODIFIER_DESC_nd_byz_dest_crossroads_of_worlds: "Constantinople commands the junction of Europe and Asia, its harbors and markets linking the trade of the entire world."
 nd_byz_imperial_triumph: "Imperial Triumph"
 nd_byz_imperial_triumph_desc: "A monumental triumphal complex celebrating the restoration of Rome, combining the grandeur of ancient imperial forums with Byzantine administrative efficiency."
 nd_byz_patriarchal_academy: "Patriarchal Academy"
 nd_byz_patriarchal_academy_desc: "A center of Orthodox theological and philosophical learning, heir to the ancient Pandidakterion, producing scholars, scribes, and diplomats."
 nd_byz_triumph_maintenance: "Triumph Maintenance"
 nd_byz_triumph_maintenance_desc: "Maintaining the marble facades, inscriptions, mosaics, and administrative offices of the imperial triumphal complex."
 nd_byz_academy_maintenance: "Academy Maintenance"
 nd_byz_academy_maintenance_desc: "Supplying the scribes, teachers, and liturgical services of the Patriarchal Academy with paper, books, candles, and vestments."
