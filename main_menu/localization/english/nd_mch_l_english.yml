l_english:
 STATIC_MODIFIER_NAME_nd_mch_way_of_the_ancestors: "Way of the Ancestors"
 STATIC_MODIFIER_DESC_nd_mch_way_of_the_ancestors: "The Manchu nation preserves its martial heritage and steppe traditions. The Way of the Ancestors demands mastery of riding, archery, and the hunt — the skills that forged an empire from scattered tribes."
 STATIC_MODIFIER_NAME_nd_mch_dragon_throne: "The Dragon Throne"
 STATIC_MODIFIER_DESC_nd_mch_dragon_throne: "The Manchu rulers embrace the mandate of Heaven and the apparatus of Chinese civilization. Adopting bureaucratic governance and scholarly traditions, the empire is administered through the institutions of Confucian statecraft."
 nd_mch.1.t: "The Manchu Destiny"
 nd_mch.1.d: "The scattered Jurchen tribes have been forged into a single nation — the Manchu. From the forests of the Changbai Mountains to the banks of the Songhua, the banners now fly united. But unity raises a question that will define our future: shall we preserve the traditions of our ancestors — the hunt, the horse, the discipline of the niru — or shall we look southward, toward the vast civilization whose wealth and learning beckon from beyond the Willow Palisade? The path we choose now will shape the Manchu for generations.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mch.1.a: "We are riders and warriors — the ancestors guide us."
 nd_mch.1.b: "We shall rule from the Dragon Throne itself."
 nd_mch.2.t: "The Niru System"
 nd_mch.2.d: "Our military and civil organization has been transformed through the niru system. Each company of three hundred men serves not merely as a fighting unit but as an administrative district — responsible for taxation, census registration, and labor service. Through the niru, every man in the nation has a role: hunter, farmer, soldier, artisan. The question before us is whether to emphasize the military potential of this organization or its capacity for civil governance."
 nd_mch.2.a: "The niru exist to put warriors in the field."
 nd_mch.2.b: "The niru shall govern as well as fight."
 nd_mch.3.t: "The Willow Palisade"
 nd_mch.3.d: "A great earthwork of ditches, embankments, and willow trees now marks the boundary of the Manchu homeland. The Willow Palisade stretches from Shanhaiguan to the frontier, separating Manchuria from Mongolia and the Chinese settled lands of Liaodong. Karun watchposts monitor the border crossings, controlling the movement of merchants, settlers, and potential enemies. The Palisade preserves the character of our ancestral lands while defending our strategic depth."
 nd_mch.3.a: "The homeland is secured."
 nd_mch.4.t: "The High Qing"
 nd_mch.4.d: "Under vigorous imperial leadership, the Manchu state has reached its zenith. The realm extends from the Amur River to the jungles of Burma, from the deserts of Turkestan to the island of Taiwan. Population has swelled, granaries overflow, and the treasury is full. Yet this moment of supreme power presents a choice: shall we press outward in the Ten Great Campaigns to pacify every frontier, or consolidate this prosperity and let the empire's wealth become the foundation of lasting stability?"
 nd_mch.4.a: "Launch the Ten Great Campaigns."
 nd_mch.4.b: "Let the Qianlong prosperity flourish."
 STATIC_MODIFIER_NAME_nd_mch_niru_mobilization: "Niru Mobilization"
 STATIC_MODIFIER_DESC_nd_mch_niru_mobilization: "The niru system places the entire Manchu nation on a war footing, with every company ready to field its three hundred men at a moment's notice."
 STATIC_MODIFIER_NAME_nd_mch_niru_administration: "Niru Administration"
 STATIC_MODIFIER_DESC_nd_mch_niru_administration: "The niru companies serve as the administrative backbone of the Manchu state, collecting taxes, registering populations, and maintaining order."
 STATIC_MODIFIER_NAME_nd_mch_ten_great_campaigns: "Ten Great Campaigns"
 STATIC_MODIFIER_DESC_nd_mch_ten_great_campaigns: "A series of decisive military campaigns has extended Manchu authority to every corner of the realm, demonstrating the continued martial prowess of the Banner armies."
 STATIC_MODIFIER_NAME_nd_mch_qianlong_prosperity: "Qianlong Prosperity"
 STATIC_MODIFIER_DESC_nd_mch_qianlong_prosperity: "The empire enjoys an era of unprecedented prosperity. Population growth, agricultural expansion, and careful fiscal management have created a golden age of abundance."
 nd_mch_shamanic_traditions: "Manchu Shamanic Traditions"
 nd_mch_shamanic_traditions_desc: "The worship of Abka Enduri, the Sky God, and the veneration of ancestral spirits through hereditary shamans binds the Manchu clans together in shared spiritual practice."
 nd_mch_aha_retainers: "Aha Retainer System"
 nd_mch_aha_retainers_desc: "Bonded retainers serve the Manchu noble households, providing a reserve of military labor that can be mobilized in times of war."
 nd_mch_sable_fur_trade: "Sable Fur Trade"
 nd_mch_sable_fur_trade_desc: "The forests of Manchuria yield the finest sable pelts in the world, prized by merchants from Beijing to Bukhara."
 nd_mch_jurchen_horsemanship: "Jurchen Horsemanship"
 nd_mch_jurchen_horsemanship_desc: "From childhood, every Jurchen warrior learns to ride the hardy Manchurian horse across the frozen rivers and dense forests of the homeland."
 nd_mch_ginseng_monopoly: "Ginseng Monopoly"
 nd_mch_ginseng_monopoly_desc: "Wild ginseng from the Changbai Mountains commands extraordinary prices in Chinese markets. The Manchu state controls this trade absolutely."
 nd_mch_niru_organization: "Niru Military Organization"
 nd_mch_niru_organization_desc: "The niru system organizes the Manchu people into military-administrative companies of three hundred, forming the foundation of the Banner armies."
 nd_mch_border_market_diplomacy: "Border Market Diplomacy"
 nd_mch_border_market_diplomacy_desc: "Trade markets at Fushun, Kaiyuan, and other border towns serve as both commercial exchanges and diplomatic meeting points between Jurchen, Mongol, and Chinese merchants."
 nd_mch_bayara_guard: "Bayara Imperial Guard"
 nd_mch_bayara_guard_desc: "The Bayara are the elite of the Banner armies — picked warriors who serve as the personal guard of the Khan, renowned for their ferocity in battle."
 nd_mch_manchu_script: "Manchu Script"
 nd_mch_manchu_script_desc: "The creation of a distinct Manchu writing system adapted from the Mongolian script establishes a literary tradition independent of Chinese characters."
 nd_mch_karun_system: "Karun Border Watch"
 nd_mch_karun_system_desc: "A network of karun border posts staffed by Banner soldiers monitors the frontier, controlling movement and gathering intelligence."
 nd_mch_jianzhou_unification: "Jianzhou Unification"
 nd_mch_jianzhou_unification_desc: "The consolidation of the Jianzhou Jurchen tribes under a single ruling house creates the political foundation from which the Manchu nation emerges."
 nd_mch_eight_banners: "Eight Banners"
 nd_mch_eight_banners_desc: "The Eight Banners — four plain, four bordered, in yellow, white, red, and blue — organize the entire Manchu nation into a disciplined military and administrative system without parallel."
 nd_mch_banner_garrisons: "Banner Garrisons"
 nd_mch_banner_garrisons_desc: "Permanent Banner garrisons in strategic cities maintain Manchu military readiness while training the next generation of warriors."
 nd_mch_willow_palisade: "Willow Palisade"
 nd_mch_willow_palisade_desc: "The great earthwork barrier of ditches, embankments, and willow trees marks the boundary of the Manchu homeland, controlling migration and defending strategic depth."
 nd_mch_hanjun_integration: "Hanjun Banner Integration"
 nd_mch_hanjun_integration_desc: "Chinese martial families who defected to the Manchu cause are organized into their own Banner companies — the Hanjun — combining Manchu discipline with Chinese military knowledge."
 nd_mch_tribute_system: "Tribute System"
 nd_mch_tribute_system_desc: "The Manchu state inherits and perfects the tribute system, binding vassal states through diplomatic ritual and the exchange of prestige goods."
 nd_mch_seven_grievances: "The Seven Grievances"
 nd_mch_seven_grievances_desc: "Nurhaci's proclamation of the Seven Grievances against the Ming provides a formal casus belli and rallies the Manchu nation to the cause of conquest."
 nd_mch_ujen_cooha_tradition: "Ujen Cooha Heavy Infantry"
 nd_mch_ujen_cooha_tradition_desc: "The Ujen Cooha — heavy armored infantry of the Banner armies — combine Manchu martial discipline with the latest military equipment."
 nd_mch_kangxi_reforms: "Kangxi Reforms"
 nd_mch_kangxi_reforms_desc: "The long reign of the Kangxi Emperor establishes a model of enlightened absolutism, combining Confucian governance with Manchu military vigor."
 nd_mch_high_qing: "High Qing"
 nd_mch_high_qing_desc: "The Manchu empire reaches its territorial and demographic zenith — the largest population and one of the greatest land empires the world has ever seen."
 nd_mch_siku_quanshu: "Siku Quanshu"
 nd_mch_siku_quanshu_desc: "The Complete Library of the Four Treasuries, the largest literary compilation in Chinese history, preserves and systematizes the accumulated knowledge of civilization."
 nd_mch_canton_system: "Canton System"
 nd_mch_canton_system_desc: "Foreign trade is channeled through a controlled system of designated ports and licensed merchants, maximizing state revenue while managing contact with the outside world."
 nd_mch_green_standard_legacy: "Green Standard Legacy"
 nd_mch_green_standard_legacy_desc: "The Green Standard Army supplements the Banner forces with Chinese troops organized along Manchu military lines, vastly expanding the empire's military capacity."
 nd_mch_tongzhi_restoration: "Tongzhi Restoration"
 nd_mch_tongzhi_restoration_desc: "A determined effort to restore the vitality of Manchu governance through institutional reform and the suppression of rebellion."
 nd_mch_self_strengthening: "Self-Strengthening Movement"
 nd_mch_self_strengthening_desc: "Adopting Western industrial technology while preserving Chinese values and Manchu governance — 'Chinese learning for the essence, Western learning for practical application.'"
 nd_mch_beiyang_army: "Beiyang Army"
 nd_mch_beiyang_army_desc: "A modern army trained along Western lines with German instructors and equipment, representing the military dimension of the self-strengthening effort."
 nd_mch_manchurian_homeland: "Manchurian Homeland Defense"
 nd_mch_manchurian_homeland_desc: "The defense of the ancestral Manchurian homeland against encroachment by Russian, Japanese, and Chinese settler interests."
 nd_mch_new_policies: "New Policies"
 nd_mch_new_policies_desc: "The ambitious late-Qing reform program establishes modern schools, reorganizes the military, and creates new governmental institutions modeled on constitutional monarchies."
 a_nd_mch_bayara: "Bayara Guard"
 a_nd_mch_bayara_desc: "The Bayara — 'Valiant Warriors' — are the elite guard cavalry of the Manchu Khan, selected from the finest horsemen of the Banner armies."
 a_nd_mch_meiren_cavalry: "Meiren Banner Cavalry"
 a_nd_mch_meiren_cavalry_desc: "Heavy cavalry led by meiren-i janggin — Banner regimental commanders — who serve as the shock arm of the Manchu host."
 a_nd_mch_ujen_cooha: "Ujen Cooha"
 a_nd_mch_ujen_cooha_desc: "The Heavy Infantry of the Banner armies, armored warriors trained in both traditional Manchu combat and modern firearms."
 a_nd_mch_aha: "Aha Retainers"
 a_nd_mch_aha_desc: "Bonded servants and retainers of Manchu noble households who serve as light infantry in wartime, valued for their endurance on campaign."
 nd_mch_ginseng_post: "Ginseng Trading Post"
 nd_mch_ginseng_post_desc: "A licensed trading station for the processing and sale of wild Manchurian ginseng, one of the most valuable medicinal commodities in East Asia."
 nd_mch_palisade_fort: "Willow Palisade Fort"
 nd_mch_palisade_fort_desc: "A fortified section of the Willow Palisade — earthen embankments topped with interlocked willow trees, backed by a deep ditch — defending the Manchu homeland."
 nd_mch_banner_garrison: "Banner Garrison"
 nd_mch_banner_garrison_desc: "A permanent military installation housing Banner soldiers and their families, serving as both barracks and administrative center for the surrounding district."
 nd_mch_fur_workshop: "Sable Fur Workshop"
 nd_mch_fur_workshop_desc: "A workshop specializing in the curing and processing of sable, marten, and fox pelts from the Manchurian forests for the luxury trade."
 nd_mch_karun_post: "Karun Border Post"
 nd_mch_karun_post_desc: "A frontier watch station manned by Banner cavalry patrols, monitoring border crossings and gathering intelligence on movements beyond the Palisade."
 nd_mch_ginseng_processing: "Ginseng Processing"
 nd_mch_ginseng_processing_desc: "The careful drying, sorting, and grading of wild ginseng roots for sale to Chinese apothecaries."
 nd_mch_palisade_maintenance: "Palisade Maintenance"
 nd_mch_palisade_maintenance_desc: "The regular upkeep of the Willow Palisade — replanting willows, clearing ditches, and repairing embankments."
 nd_mch_banner_training: "Banner Training"
 nd_mch_banner_training_desc: "The rigorous martial training regimen of the Banner garrisons, emphasizing mounted archery, lance combat, and unit coordination."
 nd_mch_fur_curing: "Fur Curing"
 nd_mch_fur_curing_desc: "Raw sable, marten, and fox pelts are salted, stretched, and smoked into fine cured leather for the luxury trade."
 nd_mch_karun_patrol: "Karun Patrol"
 nd_mch_karun_patrol_desc: "Mounted patrols that range along the frontier between karun border posts, maintaining surveillance and intercepting unauthorized crossings."
 levy_nd_mch_meiren_cavalry: "Meiren Banner Cavalry Levy"
 levy_nd_mch_meiren_cavalry_desc: "Banner cavalry raised from the noble and soldier estates, led by their regimental meiren commanders."
 levy_nd_mch_aha: "Aha Retainer Levy"
 levy_nd_mch_aha_desc: "Light infantry levied from bonded servants attached to Manchu noble households."
 nd_mch_formed_tt: "Manchu has been formed"
 nd_mch_path_a_tt: "Chose Way of the Ancestors"
 nd_mch_path_b_tt: "Chose The Dragon Throne"
 nd_mch_destiny: "The Manchu Destiny"
 nd_mch_destiny_desc: "The Manchu nation stands united under the banners. Now the great question must be answered: will we ride outward as conquerors of the steppe, or southward to claim the Dragon Throne of China?"
 nd_mch_dest_banner_supremacy: "Banner Supremacy"
 nd_mch_dest_banner_supremacy_desc: "Extend Manchu military dominance beyond the homeland. Defeat the Mongol tribes at Buir Nuur and demonstrate that the Banner armies are the supreme force on the northern steppe."
 nd_mch_dest_northern_khanate: "The Northern Khanate"
 nd_mch_dest_northern_khanate_desc: "Seize Urga, the sacred heart of Mongolia, and establish Manchu suzerainty over the northern steppe. Build the treasury that sustains a continental empire."
 nd_mch_dest_steppe_apex: "Empire of the Steppe"
 nd_mch_dest_steppe_apex_desc: "Extend the Manchu banner from Kashgar to Lhasa, conquering the Silk Road oases and the Tibetan plateau. Forge the greatest Inner Asian empire since the Mongols."
 nd_mch_dest_dragon_capital: "The Dragon's Capital"
 nd_mch_dest_dragon_capital_desc: "Cross the Willow Palisade and seize Dadu, the ancient capital of northern China. Establish Manchu rule from the seat of the Dragon Throne."
 nd_mch_dest_mandate_of_heaven: "The Mandate of Heaven"
 nd_mch_dest_mandate_of_heaven_desc: "Claim the Mandate of Heaven through institutional mastery and economic growth. Develop the empire beyond its martial origins through banking, commerce, and bureaucratic governance."
 nd_mch_dest_celestial_empire: "The Celestial Empire"
 nd_mch_dest_celestial_empire_desc: "Complete the conquest of China by securing Guangzhou and the southern trade networks. Build the wealthiest and most developed empire in the world."
 nd_mch.5.t: "The Manchu Destiny Unfolds"
 nd_mch.5.d: "With stability restored and the banners flying proudly, the Manchu nation stands ready to write its chapter in history. The foundations have been laid. What remains is the will to build upon them."
 nd_mch.5.a: "Our destiny awaits."
 nd_mch.6.t: "Banner Supremacy"
 nd_mch.6.d: "The Banner armies have proven themselves against the Mongol horsemen at Buir Nuur. The steppe trembles before the discipline of the Eight Banners, and the tribes that once raided our borders now send envoys bearing tribute. The Way of the Ancestors has been vindicated through conquest."
 nd_mch.6.a: "The steppe bows to the Banner."
 nd_mch.7.t: "The Northern Khanate"
 nd_mch.7.d: "With Urga in our hands, the Manchu state has become the paramount power of the northern steppe. The question now is how to consolidate this vast domain. Shall we establish horse markets along the frontier to profit from the nomad trade, or garrison the mountain passes to create an impregnable northern defense?"
 nd_mch.7.a: "Open the horse markets to all comers."
 nd_mch.7.b: "Fortify the passes against all threats."
 nd_mch.8.t: "Empire of the Steppe"
 nd_mch.8.d: "From the Changbai Mountains to the Pamir, from the frozen Amur to the roof of the world, the Manchu banner flies over the greatest Inner Asian empire since Chinggis Khan. We have conquered peoples the Mongols themselves could not hold. Now we must decide how to wield this power: as restless conquerors forever seeking new horizons, or as eternal guardians of the steppe order we have created."
 nd_mch.8.a: "We march ever onward."
 nd_mch.8.b: "The Eternal Banner guards what it has won."
 nd_mch.9.t: "The Dragon's Capital"
 nd_mch.9.d: "Dadu has fallen to the Banner armies. The ancient capital of northern China, seat of the Yuan and the Ming before us, now serves the Manchu dynasty. From the Forbidden City, we look out upon a civilization of hundreds of millions. The Dragon Throne is ours."
 nd_mch.9.a: "We rule from the Dragon Throne."
 nd_mch.10.t: "The Mandate of Heaven"
 nd_mch.10.d: "The empire has grown beyond anything our ancestors could have imagined. Institutions flourish, commerce flows through a thousand markets, and the treasury swells with silver. The Mandate of Heaven is not merely claimed but demonstrated through good governance. Yet two philosophies of administration compete for our attention: shall we build a deeper Confucian bureaucracy to bind the empire together, or reform the currency to unleash the power of silver-based trade?"
 nd_mch.10.a: "Deepen the Confucian bureaucracy."
 nd_mch.10.b: "Establish the silver standard."
 nd_mch.11.t: "The Celestial Empire"
 nd_mch.11.d: "Guangzhou has been secured, and with it the final jewel of the Chinese trade networks. The Celestial Empire stretches from the forests of Manchuria to the Pearl River Delta, encompassing the wealthiest and most populous civilization on earth. Two visions now present themselves for how this colossus shall engage the wider world: shall we build a navy to project our power across the seas, or turn inward to consolidate this vast dominion into an unshakeable whole?"
 nd_mch.11.a: "Build the fleets of the Celestial Empire."
 nd_mch.11.b: "Consolidate the empire from within."
 STATIC_MODIFIER_NAME_nd_mch_dest_horse_markets: "Nomad Horse Markets"
 STATIC_MODIFIER_DESC_nd_mch_dest_horse_markets: "Frontier horse markets channel the wealth of the steppe trade through Manchu-controlled exchanges, enriching the Banner lords while reducing the cost of their cavalry."
 STATIC_MODIFIER_NAME_nd_mch_dest_garrison_passes: "Garrison of the Passes"
 STATIC_MODIFIER_DESC_nd_mch_dest_garrison_passes: "The mountain passes and river crossings of the northern steppe are fortified and garrisoned, creating an impregnable defensive network monitored by intelligence officers."
 STATIC_MODIFIER_NAME_nd_mch_dest_conquerors_march: "The Conqueror's March"
 STATIC_MODIFIER_DESC_nd_mch_dest_conquerors_march: "The Banner armies march with the relentless momentum of an avalanche, their supply lines stretching across continents. The price of this endless expansion is the neglect of maritime concerns."
 STATIC_MODIFIER_NAME_nd_mch_dest_eternal_banner: "The Eternal Banner"
 STATIC_MODIFIER_DESC_nd_mch_dest_eternal_banner: "The Eight Banners stand as the eternal guardians of the steppe order, projecting Manchu authority through swift decisive action and the prestige of invincibility."
 STATIC_MODIFIER_NAME_nd_mch_dest_confucian_bureau: "Confucian Bureaucracy"
 STATIC_MODIFIER_DESC_nd_mch_dest_confucian_bureau: "A vast apparatus of scholar-officials administers the empire through Confucian principles, binding diverse peoples together under a shared administrative culture."
 STATIC_MODIFIER_NAME_nd_mch_dest_silver_standard: "Silver Standard"
 STATIC_MODIFIER_DESC_nd_mch_dest_silver_standard: "The empire's economy is reformed around silver currency, stabilizing prices and strengthening trade networks at the cost of reliance on expensive professional soldiers."
 STATIC_MODIFIER_NAME_nd_mch_dest_maritime_projection: "Maritime Projection"
 STATIC_MODIFIER_DESC_nd_mch_dest_maritime_projection: "The Celestial Empire builds a navy worthy of the world's greatest civilization, projecting power across the seas to protect trade routes and assert sovereignty over coastal waters."
 STATIC_MODIFIER_NAME_nd_mch_dest_imperial_consolidation: "Imperial Consolidation"
 STATIC_MODIFIER_DESC_nd_mch_dest_imperial_consolidation: "The empire turns inward to perfect its administration. Religious tolerance and military modernization bind the realm together while steady governance reduces the complacency of prosperity."
 nd_mch_horse_stud: "Banner Horse Stud"
 nd_mch_horse_stud_desc: "A state-managed breeding facility producing the hardy steppe horses that carry the Banner cavalry across the vast territories of the Manchu empire."
 nd_mch_horse_breeding: "Horse Breeding"
 nd_mch_horse_breeding_desc: "The systematic breeding of Manchurian warhorses, combining the hardiness of steppe stock with careful selection for strength and endurance."
 nd_mch_exam_hall: "Imperial Examination Hall"
 nd_mch_exam_hall_desc: "A grand hall where candidates sit the imperial civil service examinations, the gateway to official appointment in the vast Qing bureaucracy."
 nd_mch_examination_admin: "Examination Administration"
 nd_mch_examination_admin_desc: "The preparation, printing, and secure administration of civil service examinations, requiring vast quantities of paper, reference texts, and official robes."
