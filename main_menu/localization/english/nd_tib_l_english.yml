l_english:
 STATIC_MODIFIER_NAME_nd_tib_ganden_phodrang: "Ganden Phodrang"
 STATIC_MODIFIER_DESC_nd_tib_ganden_phodrang: "The unified theocratic government established under the Dalai Lama, merging spiritual authority with temporal power through the Kashag council. Monasteries serve as centers of learning, governance, and military coordination."
 STATIC_MODIFIER_NAME_nd_tib_dharma_kings: "Way of the Dharma Kings"
 STATIC_MODIFIER_DESC_nd_tib_dharma_kings: "In the tradition of the great Tibetan kings — Songtsen Gampo, Trisong Detsen, and Ralpacan — a warrior-sovereign rules the plateau with firm authority, patronizing the dharma while commanding the armies that defend it."
 nd_tib.1.t: "Unification of the Roof of the World"
 nd_tib.1.d: "Tibet is united. From the windswept passes of the Changtang to the forested valleys of Kham, the plateau stands as one realm. But the question of how this realm shall be governed echoes through every monastery and fortress.\n\nThe Gelugpa monks offer a vision of sacred governance — the Ganden Phodrang, where the incarnate Dalai Lama guides both faith and statecraft through a council of learned ministers. In their monasteries, ten thousand monks study, pray, and prepare to administer an empire of the spirit.\n\nYet others look to the tradition of the Dharma Kings, those warrior-sovereigns who forged Tibet through conquest and patronage alike. A strong hand on the reins of power, they say, is what kept the plateau safe from the empires that ring its borders — China, Mongolia, the Mughals.\n\nWhich path shall Tibet follow?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_tib.1.a: "Let the Dalai Lama's wisdom guide our nation"
 nd_tib.1.b: "Tibet needs a warrior-king, not a monk"
 STATIC_MODIFIER_NAME_nd_tib_potala_glory: "Glory of the Potala"
 STATIC_MODIFIER_DESC_nd_tib_potala_glory: "The magnificent Potala Palace crowns Marpo Ri hill above Lhasa, its white and red towers visible for miles across the valley. A monument to the unity of spiritual and temporal power, it inspires awe in all who behold it."
 nd_tib.2.t: "The Palace Above the Clouds"
 nd_tib.2.d: "The Potala Palace rises from the summit of Marpo Ri, the Red Hill of Lhasa. Thirteen stories of stone and timber, its White Palace houses the chambers of governance while the Red Palace contains chapels, tombs, and libraries of sacred texts. Tens of thousands of laborers and artisans have worked for decades to realize this vision.\n\nStarted in 1645 by the Fifth Dalai Lama, the palace took nearly fifty years to complete — its construction continuing in secret after his death under the stewardship of the regent Desi Sangye Gyatso. With over a thousand rooms, ten thousand shrines, and two hundred thousand statues, it stands as the greatest architectural achievement of the Tibetan plateau.\n\nThe Potala is more than a palace. It is a statement: that Tibet's civilization, nestled among the highest mountains on Earth, can produce works to rival any empire below."
 nd_tib.2.a: "A monument worthy of the Roof of the World"
 STATIC_MODIFIER_NAME_nd_tib_khampa_rising: "Khampa Rising"
 STATIC_MODIFIER_DESC_nd_tib_khampa_rising: "The fierce Khampa horsemen of eastern Tibet have rallied to the banner, bringing their legendary martial prowess and intimate knowledge of mountain warfare to the national army."
 STATIC_MODIFIER_NAME_nd_tib_plateau_command: "Command of the Plateau"
 STATIC_MODIFIER_DESC_nd_tib_plateau_command: "The integration of the Khampa territories under centralized command has strengthened the state's grip on its vast eastern frontier, channeling the warriors' energy into disciplined service."
 nd_tib.3.t: "The Warriors of Kham"
 nd_tib.3.d: "The people of Kham — the Khampas — are unlike any other Tibetans. Towering in stature, fierce in temperament, they are born to the saddle and the sword. Their reputation as warriors is unmatched on the plateau, and the mountain passes of eastern Tibet ring with the thunder of their horses.\n\nFor centuries, the Khampas have maintained a semi-autonomous existence, their tribal chiefs answering only loosely to Lhasa. Now, as Tibet's unified state matures, the question arises: how shall these formidable warriors be incorporated into the nation?\n\nOne path embraces their independence — granting the Khampa chieftains autonomy in exchange for their ferocious cavalry when called to war. The other demands integration — placing Khampa warriors under Lhasa's direct command, disciplining their fury into organized military power."
 nd_tib.3.a: "Let the Khampas ride free — their fury is our shield"
 nd_tib.3.b: "Bring them under the Kashag's command"
 nd_tib.4.t: "The Four Tantras of Healing"
 nd_tib.4.d: "The tradition of Sowa Rigpa — the Science of Healing — reaches its full flowering. Building on the Gyushi, the Four Medical Tantras compiled in the twelfth century by Yuthok Yonten Gonpo, Tibetan physicians have developed one of the most sophisticated medical systems in Asia.\n\nDrawing from Indian Ayurveda, Chinese medicine, Persian healing arts, and native Bon practices, the Four Tantras describe the human body as a landscape of elements in balance. Illness comes from their disturbance; healing comes from their restoration through herbs gathered at high altitude, mineral compounds, dietary regulation, and spiritual practice.\n\nThe establishment of medical colleges — Mentsekhang — in major monasteries ensures that this knowledge is preserved and transmitted. Physicians trained in these institutions serve communities across the plateau, their skills in demand from Nepal to Mongolia."
 nd_tib.4.a: "The Science of Healing illuminates our land"
 nd_tib.5.t: "Dharma in Ink and Wood"
 nd_tib.5.d: "The great printing houses of Tibet — at Narthang, Derge, and Lhasa — have transformed the preservation of Buddhist knowledge. Thousands of woodblocks, each painstakingly carved in reverse by master craftsmen, produce pages of scripture with a speed and accuracy that hand-copying could never match.\n\nUnlike the movable type of China, Tibetan printers favored permanent woodblocks. A single block, once carved, could produce faithful copies for centuries — an appealing permanence for monasteries that saw themselves as guardians of an unbroken lineage of authentic Buddhist teaching. The Derge Parkhang alone houses over two hundred thousand blocks.\n\nThis revolution in textual production has spread literacy through the monastic system, standardized religious practice across the plateau, and created a body of printed literature rivaling any civilization on Earth."
 nd_tib.5.a: "The dharma spreads on printed wings"
 nd_tib_warrior_monks: "Warrior Monk Tradition"
 nd_tib_warrior_monks_desc: "The great monasteries of Tibet maintain their own armed contingents — the dob-dob, warrior monks who combine physical prowess with religious devotion, serving as enforcers and defenders of the monastic order."
 nd_tib_yak_butter_economy: "Yak Butter Economy"
 nd_tib_yak_butter_economy_desc: "The processing of yak butter for trade, ritual lamp offerings, and the iconic butter tea sustains both the monastic and pastoral economies of the plateau."
 nd_tib_dzong_system: "Dzong Fortress System"
 nd_tib_dzong_system_desc: "The dzong — a fortified monastery combining military garrison, administrative center, and religious complex — forms the backbone of Tibetan territorial control across the plateau."
 nd_tib_tea_horse_road: "Tea-Horse Road"
 nd_tib_tea_horse_road_desc: "The ancient caravan routes linking the tea-growing regions of China with the horse-breeding highlands of Tibet, facilitating the exchange of Tibetan horses, salt, and wool for Chinese tea, silk, and manufactured goods."
 nd_tib_phagmodrupa_legacy: "Phagmodrupa Legacy"
 nd_tib_phagmodrupa_legacy_desc: "The administrative traditions established during the Phagmodrupa dynasty — a balance of feudal authority and monastic oversight — continue to shape Tibetan governance."
 nd_tib_sowa_rigpa: "Sowa Rigpa"
 nd_tib_sowa_rigpa_desc: "The Science of Healing — Tibet's sophisticated medical system based on the Four Tantras, drawing from Indian, Chinese, Persian, and Bon traditions to treat ailments of body and mind."
 nd_tib_woodblock_printing: "Woodblock Printing Houses"
 nd_tib_woodblock_printing_desc: "The great printing houses of Narthang, Derge, and Lhasa produce Buddhist scriptures from permanent woodblocks, spreading literacy and standardizing religious practice across the plateau."
 nd_tib_salt_monopoly: "Salt Lake Monopoly"
 nd_tib_salt_monopoly_desc: "Tibet's vast salt lakes provide a monopoly on this essential commodity, traded south to Nepal and India in exchange for grain and manufactured goods."
 nd_tib_sectarian_wars: "Sectarian Conflict"
 nd_tib_sectarian_wars_desc: "The prolonged struggles between the Kagyu, Gelug, and Bon factions for supremacy have hardened Tibetan soldiers through generations of civil warfare."
 nd_tib_mountain_warfare: "Mountain Pass Doctrine"
 nd_tib_mountain_warfare_desc: "Centuries of defending the highest passes on Earth have produced a uniquely Tibetan approach to mountain warfare — using altitude, terrain, and the thin air itself as weapons against lowland invaders."
 nd_tib_highland_textiles: "Highland Textiles"
 nd_tib_highland_textiles_desc: "Tibetan wool and fur, gathered from yak herds and wild game at extreme altitudes, are prized commodities in the markets of India, China, and Central Asia."
 nd_tib_khampa_cavalry: "Khampa Cavalry Tradition"
 nd_tib_khampa_cavalry_desc: "The fierce horsemen of Kham — eastern Tibet's warrior culture — bring unmatched skill in mountain cavalry warfare, their horses bred for endurance at altitude."
 nd_tib_gelugpa_ascendancy: "Gelugpa Ascendancy"
 nd_tib_gelugpa_ascendancy_desc: "The Yellow Hat school's rise to dominance transforms Tibetan religious life, establishing the Dalai Lama's spiritual authority across the plateau and into Mongolia."
 nd_tib_dzong_garrisons: "Dzong Garrison System"
 nd_tib_dzong_garrisons_desc: "Formalized military training for monks stationed at dzong fortresses, creating a professional garrison force that combines religious discipline with martial skill."
 nd_tib_choyon_alliance: "Choyon Alliance"
 nd_tib_choyon_alliance_desc: "The patron-priest relationship between Tibetan lamas and Mongol khans — a diplomatic masterwork where spiritual authority is exchanged for military protection and political legitimacy."
 nd_tib_tibetan_coinage: "Tibetan Coinage"
 nd_tib_tibetan_coinage_desc: "The development of a standardized Tibetan currency facilitates trade across the plateau and with neighboring powers, replacing the cumbersome barter of tea bricks and salt."
 nd_tib_kashag_council: "Kashag Council"
 nd_tib_kashag_council_desc: "The formal establishment of the Kashag — a council of ministers blending lay and clerical authority — as the primary administrative body of the Tibetan state."
 nd_tib_potala_palace: "Potala Palace"
 nd_tib_potala_palace_desc: "The construction of the Potala Palace on Marpo Ri — thirteen stories of stone, the greatest architectural achievement of the Tibetan plateau and the seat of both spiritual and temporal authority."
 nd_tib_desi_regency: "Regency Tradition"
 nd_tib_desi_regency_desc: "The pragmatic administrative tradition established by Desi Sangye Gyatso, who governed Tibet during the interregnum after the Fifth Dalai Lama's death, concealing it for fifteen years while consolidating state power."
 nd_tib_narthang_press: "Narthang Printing Expansion"
 nd_tib_narthang_press_desc: "The expansion of woodblock printing from Narthang and Derge to dozens of monasteries across the plateau, creating a network of scholarly production unmatched in Central Asia."
 nd_tib_plateau_horsemen: "Plateau Cavalry Tactics"
 nd_tib_plateau_horsemen_desc: "The refinement of cavalry tactics for the unique demands of high-altitude warfare — lighter equipment, horses bred for thin air, and an emphasis on rapid movement across vast distances."
 nd_tib_luxury_exports: "Silk and Musk Trade"
 nd_tib_luxury_exports_desc: "Tibet's position astride the routes between China and South Asia enables a lucrative trade in luxury goods — musk, silk, medicinal herbs, and precious metals flow through highland passes."
 nd_tib_monastic_taxation: "Monastic Taxation"
 nd_tib_monastic_taxation_desc: "The systematization of monastic estates and their taxation provides the Ganden Phodrang government with a reliable revenue base, as monasteries serve simultaneously as landlords, educational institutions, and tax collectors."
 nd_tib_modern_reforms: "Plateau Modernization"
 nd_tib_modern_reforms_desc: "Attempts to modernize Tibetan institutions — introducing new administrative methods, expanded education, and engagement with the wider world while preserving the plateau's unique cultural identity."
 nd_tib_standing_army: "Tibetan Standing Army"
 nd_tib_standing_army_desc: "The creation of Tibet's first professional standing army, replacing the reliance on monastic levies and tribal cavalry with trained, disciplined soldiers equipped with modern arms."
 nd_tib_communal_traditions: "Communal Land Traditions"
 nd_tib_communal_traditions_desc: "Tibet's communal land management practices and polyandrous family structures, which stabilize population and ensure sustainable use of the plateau's limited agricultural resources."
 nd_tib_dharma_preservation: "Dharma Preservation"
 nd_tib_dharma_preservation_desc: "The systematic effort to preserve and expand Tibetan Buddhist scholarship — copying texts, training scholars, and maintaining the monastic universities that have served as repositories of knowledge for centuries."
 nd_tib_plateau_trade_network: "Plateau Trade Network"
 nd_tib_plateau_trade_network_desc: "The maturation of Tibet's highland trade system — connecting Lhasa to Calcutta, Kathmandu, Beijing, and the Silk Road through a network of caravans, trading posts, and established commercial relationships."
 a_nd_tib_dob_dob: "Dob-dob"
 a_nd_tib_dob_dob_desc: "Warrior monks from Tibet's great monasteries, the dob-dob are fearsome combatants who combine religious fervor with physical prowess. Armed with staves and slings, they patrol monastic grounds and form shock infantry in times of war."
 a_nd_tib_khampa_horsemen: "Khampa Horsemen"
 a_nd_tib_khampa_horsemen_desc: "The mounted warriors of Kham are born to the saddle. Armed with swords, bows, and matchlocks, these fierce cavalrymen are expert raiders who know every mountain pass and valley of eastern Tibet."
 a_nd_tib_garrison_monks: "Garrison Monks"
 a_nd_tib_garrison_monks_desc: "Disciplined monk-soldiers trained to defend the dzong fortress-monasteries. Combining religious conviction with military drill, they form the permanent garrison force of the Tibetan state."
 a_nd_tib_plateau_riders: "Plateau Riders"
 a_nd_tib_plateau_riders_desc: "Elite high-altitude cavalry equipped with lighter arms and riding horses bred for the thin air of the plateau. Fast and agile, they excel at flanking maneuvers across the vast Tibetan steppe."
 a_nd_tib_regulars: "Tibetan Regulars"
 a_nd_tib_regulars_desc: "Professional soldiers of Tibet's first standing army, trained in modern military discipline while retaining the mountain warfare expertise that has always been the plateau's greatest defense."
 nd_tib_dzong: "Dzong"
 nd_tib_dzong_desc: "A massive fortress-monastery that serves as military stronghold, administrative center, and religious complex. Built on commanding heights with thick stone walls, the dzong is the backbone of Tibetan territorial control."
 nd_tib_tea_horse_post: "Tea-Horse Trading Post"
 nd_tib_tea_horse_post_desc: "A caravan station on the ancient Tea-Horse Road, where Tibetan horses, salt, and wool are exchanged for Chinese tea, silk, and manufactured goods. These posts sustain the commercial lifeline of the plateau."
 nd_tib_mentsekhang: "Mentsekhang"
 nd_tib_mentsekhang_desc: "A medical college teaching Sowa Rigpa — the Tibetan Science of Healing. Physicians trained here master the Four Tantras, treating ailments through herbal remedies, mineral compounds, and spiritual practice."
 nd_tib_printing_house: "Printing House"
 nd_tib_printing_house_desc: "A monastic woodblock printing workshop where master craftsmen carve scripture into permanent blocks. A single printing house may hold tens of thousands of blocks, producing Buddhist texts for distribution across the plateau."
 nd_tib_butter_workshop: "Butter Lamp Workshop"
 nd_tib_butter_workshop_desc: "A facility for processing yak butter into the ritual lamps that illuminate every monastery on the plateau, as well as the butter tea that sustains both monks and nomads in the thin, cold air."
 nd_tib_salt_warehouse: "Salt Warehouse"
 nd_tib_salt_warehouse_desc: "A storage and processing facility for the salt harvested from Tibet's high-altitude salt lakes, one of the plateau's most valuable trade commodities."
 nd_tib_choyon_temple: "Choyon Temple"
 nd_tib_choyon_temple_desc: "A grand temple complex dedicated to the patron-priest relationship that binds Tibet to its Mongol allies, serving as a center of diplomatic ceremony and cultural exchange."
 nd_tib_wool_workshop: "Highland Wool Workshop"
 nd_tib_wool_workshop_desc: "A textile workshop processing the fine wool of Tibetan yaks and sheep into cloth prized across Asia for its warmth and durability."
 nd_tib_potala_shrine: "Potala Shrine"
 nd_tib_potala_shrine_desc: "A sacred devotional complex inspired by the architectural grandeur of the Potala Palace, serving as a center of Buddhist worship, artistic patronage, and cultural prestige."
 nd_tib_communal_granary: "Communal Granary"
 nd_tib_communal_granary_desc: "A community food storage facility following Tibet's ancient tradition of communal resource management, ensuring survival through the harsh winters of the highest plateau on Earth."
 nd_tib_dzong_upkeep: "Dzong Maintenance"
 nd_tib_dzong_upkeep_desc: "The ongoing repair and provisioning of the fortress-monastery's massive stone walls and wooden structures."
 nd_tib_caravan_trade: "Caravan Trade"
 nd_tib_caravan_trade_desc: "The exchange of tea and horses through the highland trading post."
 nd_tib_medical_herbs: "Medical Herb Gathering"
 nd_tib_medical_herbs_desc: "Collection and preparation of high-altitude medicinal herbs according to the Four Tantras tradition, supported by scholarly texts, linen bandages, and butter lamps for the college's work."
 nd_tib_printing_materials: "Woodblock Printing"
 nd_tib_printing_materials_desc: "Paper and wood are carved into permanent woodblocks, producing Buddhist scriptures and scholarly texts for distribution across the plateau."
 nd_tib_butter_processing: "Butter Processing"
 nd_tib_butter_processing_desc: "Yak milk is churned into butter, rendered into clarified form, and processed into lamp fuel — yielding beeswax-equivalent output used in monasteries and traded across the plateau."
 nd_tib_salt_processing: "Salt Processing"
 nd_tib_salt_processing_desc: "Harvesting and refining salt from the high-altitude lakes of the Tibetan plateau."
 nd_tib_ritual_offerings: "Ritual Offerings"
 nd_tib_ritual_offerings_desc: "Incense and silk consumed in the elaborate ceremonies of the patron-priest diplomatic tradition."
 nd_tib_wool_weaving: "Wool Weaving"
 nd_tib_wool_weaving_desc: "Highland wool and natural dyes are woven into durable Tibetan cloth prized across Asia."
 nd_tib_shrine_offerings: "Shrine Offerings"
 nd_tib_shrine_offerings_desc: "Incense and silver offerings that sustain the devotional activities of the sacred complex."
 nd_tib_highland_storage: "Highland Storage"
 nd_tib_highland_storage_desc: "Grain and livestock products preserved for the community through Tibet's harsh winters."
 levy_nd_tib_garrison_monks: "Garrison Monk Levy"
 levy_nd_tib_garrison_monks_desc: "Disciplined monk-soldiers called from the dzong fortresses to defend the plateau."
 levy_nd_tib_dob_dob: "Dob-dob Levy"
 levy_nd_tib_dob_dob_desc: "Warrior monks mustered from the great monasteries to serve as shock infantry."
 nd_tib_formed_tt: "Tibet has been formed"
 nd_tib_path_a_tt: "Chose Ganden Phodrang"
 nd_tib_path_b_tt: "Chose Way of the Dharma Kings"
