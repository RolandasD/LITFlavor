l_english:
 ATE: "Ashanti"
 ATE_ADJ: "Ashanti"
 ATE_f: "Ashanti Confederacy"
 ATE_f_desc: "The Ashanti Confederacy united the Akan peoples under the Golden Stool, forging a powerful kingdom centered on Kumasi. Through control of the gold trade and a sophisticated military organization, the Asantehene could project power across the Gold Coast and deep into the West African interior."
