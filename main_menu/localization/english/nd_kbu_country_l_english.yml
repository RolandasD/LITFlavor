l_english:
 KBU: "Kanem-Bornu"
 KBU_ADJ: "Kanemi"
 KBU_f: "Kanem-Bornu"
 KBU_f_desc: "The Kanem-Bornu Empire, ruled by the Sayfawa dynasty for over seven centuries, dominated the Lake Chad basin and controlled vital trans-Saharan trade routes. By reuniting the original Kanem heartland with the Bornu territories, the empire stands poised to reassert its supremacy over the central Sahel."
