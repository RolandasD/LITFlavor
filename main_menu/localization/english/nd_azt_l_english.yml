l_english:
 STATIC_MODIFIER_NAME_nd_way_of_flower_wars: "Way of the Flower Wars"
 STATIC_MODIFIER_DESC_nd_way_of_flower_wars: "The Aztec Empire has perfected the art of ritual warfare. Armies march not merely to conquer, but to prove the supremacy of Huitzilopochtli over all rivals. Every battlefield becomes a sacred ground where warriors earn glory through the capture of worthy opponents."
 STATIC_MODIFIER_NAME_nd_pochteca_road: "The Pochteca's Road"
 STATIC_MODIFIER_DESC_nd_pochteca_road: "The empire's long-distance merchants — the pochteca — have been elevated to the status of a pillar of state. Their caravans carry cacao, quetzal feathers, and obsidian to the farthest reaches of Mesoamerica, and their intelligence networks serve as the eyes and ears of the Huey Tlatoani."
 STATIC_MODIFIER_NAME_nd_cuachicqueh_ascendancy: "Ascendancy of the Shorn Ones"
 STATIC_MODIFIER_DESC_nd_cuachicqueh_ascendancy: "The Cuachicqueh, warriors who have sworn to never take a step backward in battle, have become the living embodiment of Aztec martial virtue. Their painted faces and shaven heads strike terror into every foe."
 STATIC_MODIFIER_NAME_nd_codex_wisdom: "Wisdom of the Codices"
 STATIC_MODIFIER_DESC_nd_codex_wisdom: "The scribes of the empire have begun a systematic effort to record and preserve knowledge in painted codices — from astronomical observations to tribute rolls, from medicinal plants to genealogies of the ruling houses."
 STATIC_MODIFIER_NAME_nd_tribute_reform_centralist: "Centralized Tribute Collection"
 STATIC_MODIFIER_DESC_nd_tribute_reform_centralist: "Imperial tribute collectors now answer directly to the Huey Tlatoani. Provincial governors are replaced by agents of the central administration, ensuring every bale of cotton, every load of cacao, and every consignment of obsidian reaches Tenochtitlan's coffers."
 STATIC_MODIFIER_NAME_nd_tribute_reform_federalist: "Federated Altepetl Compact"
 STATIC_MODIFIER_DESC_nd_tribute_reform_federalist: "Rather than imposing ever-heavier central control, the empire has formalized the autonomy of its constituent altepetl. Local tlatoque retain their authority in exchange for reliable tribute and military service — a system that breeds loyalty rather than resentment."
 nd_azt.1.t: "The Aztec Empire Rises"
 nd_azt.1.d: "From the marshes of Lake Texcoco, the Mexica have built the greatest empire the Americas have ever seen. Tenochtitlan stands as the jewel of a realm stretching from sea to sea, its canals and causeways a testament to the genius of its people. Now, as the Huey Tlatoani proclaims dominion over all Mesoamerica, the empire must decide its path. Will the flower wars continue to forge an unbreakable warrior elite, expanding the empire's reach through martial glory? Or will the pochteca merchant-spies become the instruments of a new kind of power — one built on trade routes, tribute networks, and the flow of cacao rather than blood?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_azt.1.a: "Let the Flower Wars rage eternal!"
 nd_azt.1.b: "The pochteca shall be the sinews of empire."
 nd_azt.2.t: "The Oath of the Shorn Ones"
 nd_azt.2.d: "A new generation of the Cuachicqueh — the Shorn Ones — has completed their initiation rites. These elite warriors shave their heads, leaving only a single lock over the left ear, and paint one half of their face blue and the other half red or yellow. They swear before the gods that they will never retreat from battle, never take a step backward. In war, they are always the first to engage the enemy and the last to leave the field. Their oath is absolute: victory or death, with no middle ground. The other warrior orders — the Jaguar Knights and Eagle Warriors — look to the Cuachicqueh as the ultimate expression of martial devotion. Their presence on the battlefield stiffens the resolve of every warrior in the army."
 nd_azt.2.a: "Their oath binds them — and inspires us all."
 nd_azt.3.t: "The Great Codex Project"
 nd_azt.3.d: "The scribes of the calmecac have undertaken an ambitious project: the systematic compilation of all Aztec knowledge into a comprehensive series of codices. Using amate bark paper and vibrant mineral pigments, the tlacuiloque — professional scribe-painters — record the empire's accumulated wisdom. Tonalamatl almanacs chart the sacred calendar and its rituals. Tribute rolls catalogue the exact obligations of every subject altepetl. Herbal codices document hundreds of medicinal plants, their preparation, and their uses — knowledge that rivals anything in the Old World. Astronomical records track the movements of Venus, the Sun, and the Moon with extraordinary precision. This is not merely record-keeping. It is the creation of an intellectual infrastructure that will allow the empire's knowledge to be transmitted, debated, and expanded for generations."
 nd_azt.3.a: "Knowledge is the foundation of empire."
 nd_azt.4.t: "Reform of the Tribute System"
 nd_azt.4.d: "The Aztec tribute system has grown vast — over four hundred subject altepetl pay regular tribute to Tenochtitlan in goods ranging from cotton mantles and warrior costumes to cacao beans, gold dust, quetzal feathers, and jade. But the system is showing strain. Some provinces resist their assessments, others conceal their true wealth, and the logistics of collecting and storing tribute across such distances have become unwieldy. The Huey Tlatoani's advisors present two paths forward: tighten central control by replacing local tlatoque with imperial appointees who answer directly to Tenochtitlan, or formalize a compact that respects local autonomy in exchange for reliable tribute delivery and military commitment."
 nd_azt.4.a: "All tribute flows to Tenochtitlan."
 nd_azt.4.b: "Let the altepetl govern themselves — so long as they pay."
 nd_azt.5.t: "A Mesoamerican Renaissance"
 nd_azt.5.d: "Something remarkable is stirring in the Aztec Empire. The calmecac schools, once focused primarily on training priests and warriors, have become centres of broader intellectual inquiry. Nahuatl scholars debate philosophy, compose lyric poetry in the tradition of Nezahualcoyotl, and push the boundaries of astronomical knowledge. Artisans in Tenochtitlan produce goldwork, featherwork, and stone carving of breathtaking sophistication. Engineers continue to expand and refine the chinampa system and the city's hydraulic infrastructure. This flowering of culture and knowledge rivals anything the Old World has produced — a renaissance uniquely Mesoamerican in character, drawing on thousands of years of accumulated civilisation from the Olmec, Maya, Toltec, and now Aztec traditions."
 nd_azt.5.a: "The Fifth Sun illuminates a new age of learning."
 nd_azt_chinampa_system: "Chinampa Agriculture"
 nd_azt_chinampa_system_desc: "The floating gardens of the Valley of Mexico produce multiple harvests per year, feeding a population that rivals any in the world."
 nd_azt_atlatl_tradition: "Atlatl Tradition"
 nd_azt_atlatl_tradition_desc: "The spear-thrower has been a defining weapon of Mesoamerican warfare for millennia. Aztec atlatl-wielding skirmishers rain deadly projectiles on their enemies from beyond melee range."
 nd_azt_tlachtli_courts: "Tlachtli Ball Courts"
 nd_azt_tlachtli_courts_desc: "The ritual ball game serves both religious and political functions, resolving disputes between cities and honouring the gods through athletic contest."
 nd_azt_pochteca_network: "Pochteca Trade Network"
 nd_azt_pochteca_network_desc: "The pochteca long-distance merchants maintain trade routes spanning all of Mesoamerica, dealing in luxury goods and serving as the empire's intelligence gatherers."
 nd_azt_aqueduct_engineering: "Aqueduct Engineering"
 nd_azt_aqueduct_engineering_desc: "Twin aqueducts carry fresh water from Chapultepec springs to the island city of Tenochtitlan — an engineering marvel that sustains a population of over 200,000."
 nd_azt_obsidian_mastery: "Obsidian Mastery"
 nd_azt_obsidian_mastery_desc: "Aztec craftsmen produce weapons, tools, and mirrors from volcanic obsidian with extraordinary skill. The macuahuitl — an obsidian-edged wooden sword — can decapitate a horse."
 nd_azt_calpulli_organisation: "Calpulli Organisation"
 nd_azt_calpulli_organisation_desc: "The calpulli — clan-based wards that form the administrative backbone of Aztec cities — coordinate taxation, land use, education, and military conscription at the local level."
 nd_azt_cuachicqueh_order: "Order of the Cuachicqueh"
 nd_azt_cuachicqueh_order_desc: "The Shorn Ones are the supreme warrior elite of the Aztec Empire. They swear never to retreat and always lead the vanguard in battle."
 nd_azt_flower_wars_doctrine: "Flower Wars Doctrine"
 nd_azt_flower_wars_doctrine_desc: "The xochiyaoyotl — Flower Wars — are ritual conflicts that keep warriors sharp, provide captives for sacrifice, and demonstrate the empire's martial superiority without requiring total conquest."
 nd_azt_tribute_administration: "Tribute Administration"
 nd_azt_tribute_administration_desc: "A bureaucracy of calpixque (tribute collectors) ensures the steady flow of goods from over four hundred subject altepetl to the imperial treasury."
 nd_azt_codex_tradition: "Codex Tradition"
 nd_azt_codex_tradition_desc: "Aztec scribes — the tlacuiloque — create elaborate painted codices recording everything from astronomical observations to tribute assessments and herbal medicine."
 nd_azt_cacao_trade: "Cacao Trade"
 nd_azt_cacao_trade_desc: "Cacao beans serve as both currency and luxury good throughout Mesoamerica. Control of the cacao trade gives the empire economic leverage over the entire region."
 nd_azt_reformed_defenses: "Reformed Defenses"
 nd_azt_reformed_defenses_desc: "The empire strengthens its border fortifications and garrison system, building teocalli-fortresses that combine defensive strength with religious significance."
 nd_azt_nahuatl_imperialism: "Nahuatl Imperialism"
 nd_azt_nahuatl_imperialism_desc: "Nahuatl language and culture are actively promoted throughout the empire's domains, binding subject peoples to the Aztec identity through shared language, religion, and custom."
 nd_azt_coyote_runners: "Coyote Runners"
 nd_azt_coyote_runners_desc: "Elite runners serve as the empire's rapid communication network and fast-moving raiding force, covering vast distances through the mountains and jungles of Mesoamerica."
 nd_azt_military_reformation: "Military Reformation"
 nd_azt_military_reformation_desc: "The traditional warrior order system is reformed to incorporate new tactical doctrines — discipline and formation replace individual heroics as the foundation of Aztec military power."
 nd_azt_centralised_tribute: "Centralised Tribute Reform"
 nd_azt_centralised_tribute_desc: "The tribute system is fundamentally reorganised under direct imperial administration, replacing the patchwork of local arrangements with a centralised bureaucracy."
 nd_azt_hydraulic_mastery: "Hydraulic Mastery"
 nd_azt_hydraulic_mastery_desc: "Generations of experience with chinampas, aqueducts, and flood control have produced a class of hydraulic engineers without parallel in the Americas."
 nd_azt_imperial_law_code: "Imperial Law Code"
 nd_azt_imperial_law_code_desc: "A comprehensive legal code replaces the ad hoc rulings of individual tlatoque, providing consistent justice across the empire and strengthening central authority."
 nd_azt_tlacochcalcatl_tradition: "Tlacochcalcatl Tradition"
 nd_azt_tlacochcalcatl_tradition_desc: "Named after the Master of the House of Darts, these reformed imperial guards represent the pinnacle of Aztec military evolution — disciplined, well-equipped, and utterly loyal."
 nd_azt_mesoamerican_renaissance: "Mesoamerican Renaissance"
 nd_azt_mesoamerican_renaissance_desc: "A flowering of arts, sciences, and philosophy transforms the Aztec Empire into a centre of learning that draws on thousands of years of accumulated Mesoamerican civilisation."
 nd_azt_modern_armies: "Modern Armies"
 nd_azt_modern_armies_desc: "The Aztec military completes its transformation from a warrior-order system to a modern army with standardised equipment, tactical drilling, and professional officer corps."
 nd_azt_trade_modernisation: "Trade Modernisation"
 nd_azt_trade_modernisation_desc: "The ancient pochteca trade networks are modernised with new methods of accounting, credit, and warehousing, allowing Aztec commerce to compete with any nation."
 nd_azt_national_identity: "National Identity"
 nd_azt_national_identity_desc: "The diverse peoples of the empire — Nahua, Mixtec, Zapotec, Totonac, and dozens more — begin to forge a shared identity as citizens of the Aztec state."
 nd_azt_industrial_dawn: "Industrial Dawn"
 nd_azt_industrial_dawn_desc: "Aztec engineers and craftsmen apply their traditional ingenuity to new manufacturing techniques, beginning the transformation of the empire's economy from agrarian tribute to industrial production."
 a_nd_azt_cuachicqueh: "Cuachicqueh"
 a_nd_azt_cuachicqueh_desc: "The Shorn Ones — elite shock infantry who shave their heads and paint their faces, swearing before the gods never to retreat. They lead every charge and hold every line."
 a_nd_azt_atlatl_skirmisher: "Atlatl Skirmisher"
 a_nd_azt_atlatl_skirmisher_desc: "Levy warriors armed with the atlatl — an ancient spear-thrower that gives devastating range and striking power to even conscript troops."
 a_nd_azt_tlacochcalcatl_guard: "Tlacochcalcatl Guard"
 a_nd_azt_tlacochcalcatl_guard_desc: "Reformed imperial infantry named for the supreme military commander. These disciplined soldiers combine traditional Aztec ferocity with modern tactical formations."
 a_nd_azt_coyote_runner: "Coyote Runner"
 a_nd_azt_coyote_runner_desc: "Swift auxiliary scouts and raiders who serve as the empire's rapid response force, crossing mountains and jungles with extraordinary speed."
 nd_azt_tlachtli: "Tlachtli Ball Court"
 nd_azt_tlachtli_desc: "A stone court for the ritual ball game that serves both religious devotion and political diplomacy, settling disputes between altepetl through sacred athletic contest."
 nd_azt_chinampa_terrace: "Chinampa Terrace"
 nd_azt_chinampa_terrace_desc: "Floating gardens built on shallow lake beds, producing multiple harvests of maize, beans, squash, and flowers each year."
 nd_azt_pochteca_warehouse: "Pochteca Warehouse"
 nd_azt_pochteca_warehouse_desc: "A secure storehouse where the pochteca long-distance merchants inventory and redistribute goods — from cacao and quetzal feathers to obsidian and fine cloth."
 nd_azt_aqueduct: "Aztec Aqueduct"
 nd_azt_aqueduct_desc: "A stone channel bringing fresh water from highland springs, sustaining the population and health of Aztec cities built on lake islands."
 nd_azt_obsidian_workshop: "Obsidian Workshop"
 nd_azt_obsidian_workshop_desc: "A workshop where master craftsmen produce macuahuitl swords, arrowheads, surgical tools, and mirrors from volcanic obsidian — Mesoamerica's equivalent of steel."
 nd_azt_tianquiztli: "Tianquiztli Market"
 nd_azt_tianquiztli_desc: "A grand marketplace where merchants trade everything from cacao beans and cotton mantles to jade ornaments and quetzal feathers. The tianquiztli of Tlatelolco drew tens of thousands of traders daily."
 nd_azt_nahuatl_academy: "Nahuatl Academy"
 nd_azt_nahuatl_academy_desc: "A centre of learning that extends the calmecac tradition into broader scholarship — training administrators, scribes, and scholars in law, history, philosophy, and the natural sciences."
 nd_azt_teocalli_fortress: "Teocalli Fortress"
 nd_azt_teocalli_fortress_desc: "A fortified temple-complex that combines the sacred authority of the gods with the practical strength of stone walls and garrison quarters. These strongpoints anchor the empire's defenses."
 nd_azt_mesoamerican_manufactory: "Mesoamerican Manufactory"
 nd_azt_mesoamerican_manufactory_desc: "A workshop complex where traditional Aztec craftsmanship meets new production methods — producing textiles, obsidian tools, ceramics, and metalwork at industrial scale."
 nd_azt_ritual_maintenance: "Ritual Offerings"
 nd_azt_ritual_maintenance_desc: "Maintaining the ball court requires incense for sacred smoke, ceremonial dyes for the players, and beeswax for torch lighting during night ceremonies."
 nd_azt_chinampa_farming: "Chinampa Cultivation"
 nd_azt_chinampa_farming_desc: "Farmers working the floating garden beds use tools to cultivate the rich lake-bed soil, producing abundant harvests of maize from multiple growing seasons each year."
 nd_azt_cacao_processing: "Cacao Processing"
 nd_azt_cacao_processing_desc: "Processing and storing cacao beans requires ceramic vessels for grinding and fermentation, cacao beans as stock, and cloth for wrapping and transporting the finished goods."
 nd_azt_water_maintenance: "Water Channel Maintenance"
 nd_azt_water_maintenance_desc: "The aqueduct requires stone for channel repairs, lumber for sluice gates and scaffolding, and tools for the maintenance crews who keep the water flowing year-round."
 nd_azt_obsidian_working: "Obsidian Working"
 nd_azt_obsidian_working_desc: "Master craftsmen knap volcanic obsidian into macuahuitl blades, arrowheads, and surgical tools — weaponry sharper than any bronze."
 nd_azt_market_maintenance: "Market Administration"
 nd_azt_market_maintenance_desc: "Operating the tianquiztli requires ceramic containers, cloth for stalls and awnings, and salt — a key trading commodity that serves as a de facto unit of exchange throughout Mesoamerica."
 nd_azt_academy_maintenance: "Academy Supplies"
 nd_azt_academy_maintenance_desc: "The academy requires paper and mineral pigments for codex production, and beeswax candles to illuminate late-night scholarly work."
 nd_azt_fortress_maintenance: "Fortress Garrison"
 nd_azt_fortress_maintenance_desc: "The teocalli fortress requires stone for structural upkeep, weaponry to arm its garrison, and lumber for palisades, platforms, and siege equipment maintenance."
 nd_azt_manufactory_maintenance: "Workshop Materials"
 nd_azt_manufactory_maintenance_desc: "Craftsmen shape stone and lumber into tools, applying traditional Mesoamerican techniques at industrial scale."
 levy_nd_azt_atlatl_skirmisher: "Atlatl Skirmisher Levy"
 levy_nd_azt_atlatl_skirmisher_desc: "Peasant levies armed with the traditional spear-thrower."
 levy_nd_azt_coyote_runner: "Coyote Runner Levy"
 levy_nd_azt_coyote_runner_desc: "Swift auxiliary scouts drawn from the soldier class."
 nd_azt_formed_tt: "Aztec Empire has been formed"
 nd_azt_path_a_tt: "Chose Way of the Flower Wars"
 nd_azt_path_b_tt: "Chose The Pochteca's Road"
 nd_azt_destiny: "Destiny of the Aztec Empire"
 nd_azt_destiny_desc: "The Aztec Empire has been forged. Now the Huey Tlatoani must demonstrate that this realm can endure -- that it is more than a passing shadow on the face of the Fifth Sun. Prove the empire's stability and the path forward shall reveal itself."
 nd_azt_dest_chichimecah: "Conquest of the Chichimecah"
 nd_azt_dest_chichimecah_desc: "The wild northern frontier has long defied Aztec authority. The Chichimec peoples -- nomadic hunters and raiders -- must be brought to heel. Seize the silver-rich lands of the Guachichil and the coastal settlements of Aridoamerica to secure the empire's northern flank."
 nd_azt_dest_fifth_sun: "Empire of the Fifth Sun"
 nd_azt_dest_fifth_sun_desc: "With the north secured, the armies of the Fifth Sun march south into the highland kingdoms of Central America. Cuauhtemallan and the trading port of Naco must fall under Aztec dominion, proving that no power in the Americas can resist the flower warriors."
 nd_azt_dest_lords_americas: "Lords of the Americas"
 nd_azt_dest_lords_americas_desc: "The ultimate ambition: an empire spanning the entire American continent. The great chiefdom of Cofitachequi in the southeast and the ancient mound city of Cahokia in the heartland must both acknowledge Aztec supremacy. Only then can the Huey Tlatoani truly claim the title Lord of the Americas."
 nd_azt_dest_cacao_monopoly: "The Cacao Monopoly"
 nd_azt_dest_cacao_monopoly_desc: "Cacao beans are the currency and lifeblood of Mesoamerican trade. The pochteca must ensure that the empire's capital market controls the flow of this precious commodity. Build the treasury and develop the realm to fund the empire's commercial ambitions."
 nd_azt_dest_great_tianquiztli: "The Great Tianquiztli"
 nd_azt_dest_great_tianquiztli_desc: "The marketplace of Tlatelolco once amazed even the Spanish conquistadors. Now the empire must build something greater still -- a continental trade network linking silver mines, cacao plantations, and luxury goods from every corner of the Americas. Embrace modern financial institutions to fund this vision."
 nd_azt_dest_merchants_world: "Merchants of the World"
 nd_azt_dest_merchants_world_desc: "The pochteca have outgrown Mesoamerica. By establishing control over Caribbean trade routes through Habana and securing the cacao heartlands of Chalchuapa, the Aztec merchant class can project economic power across the entire known world."
 nd_azt.6.t: "The Destiny of an Empire"
 nd_azt.6.d: "The Aztec Empire stands at the threshold of a new age. Tenochtitlan, the island city of canals and causeways, is the beating heart of a realm that stretches from the Pacific shores to the Gulf coast. But the Huey Tlatoani's ambitions extend far beyond the boundaries of Mesoamerica. The gods demand more -- more tribute, more glory, more proof that the Mexica are the chosen people of the Fifth Sun. The path chosen at the empire's founding now begins to bear fruit, and the destiny of the Aztec people awaits fulfilment."
 nd_azt.6.a: "The Fifth Sun shall never set."
 nd_azt.7.t: "The Northern Frontier Falls"
 nd_azt.7.d: "The Chichimec frontier -- that vast, arid wilderness beyond the Valley of Mexico -- has been the empire's great unfinished business for generations. Now it is finished. The Guachichil warriors, who once raided Aztec caravans with impunity, kneel before the Huey Tlatoani. The silver-bearing mountains of the north are ours, and the empire's flank is secure at last. The flower warriors who conquered these lands have proven that Aztec martial doctrine adapts to any terrain -- desert, mountain, or jungle."
 nd_azt.7.a: "The north bows to Tenochtitlan."
 nd_azt.8.t: "The March South"
 nd_azt.8.d: "The armies of the Fifth Sun have swept through Central America. The highland fortress of Cuauhtemallan and the coastal trading hub of Naco both fly the Aztec standard. No power south of the Valley of Mexico can stand before the flower warriors. But how shall the empire consolidate these conquests? The war captains argue for constant readiness -- the drums of war must never fall silent. But the temple priests counsel that these conquests should be consecrated to the gods, building sacred garrisons that bind conquered peoples through religious awe as much as military force."
 nd_azt.8.a: "Let the war drums thunder without cease."
 nd_azt.8.b: "Consecrate these lands to Huitzilopochtli."
 nd_azt.9.t: "Lords of the Americas"
 nd_azt.9.d: "It is done. The great chiefdom of Cofitachequi, famed for its pearls and copper, has submitted to Aztec authority. The ancient mound city of Cahokia -- a place sacred to peoples the Mexica had never heard of a generation ago -- now hosts an Aztec governor. The empire stretches from the frozen northern plains to the steaming jungles of the south. No realm in the Americas, and perhaps few in the entire world, can match the Aztec dominion in extent or power. The Huey Tlatoani must now decide how to project this unprecedented hegemony across such vast distances."
 nd_azt.9.a: "Our obsidian blades shall enforce our will."
 nd_azt.9.b: "We shall rule as the Sun rules -- by radiance."
 nd_azt.10.t: "The Cacao Kings"
 nd_azt.10.d: "The pochteca have achieved something remarkable. Through a web of trade agreements, strategic purchases, and the occasional quietly eliminated rival, the Aztec Empire now controls the flow of cacao through its capital market. Every cup of xocolatl drunk from the Gulf coast to the Pacific shore enriches Tenochtitlan's coffers. The cacao bean, once merely a luxury beverage, has become the instrument of Aztec economic hegemony. The merchant princes of the pochteca guilds have earned their place alongside the warrior orders in the councils of the Huey Tlatoani."
 nd_azt.10.a: "Cacao flows like blood through our empire."
 nd_azt.11.t: "The Continental Market"
 nd_azt.11.d: "The tianquiztli of Tenochtitlan has become something the world has never seen before -- a marketplace where goods from across an entire continent change hands. Silver from the northern mines, cacao from the tropical lowlands, obsidian from the volcanic highlands, cotton from the coastal plains -- all flow through Aztec-controlled trade networks. The pochteca have even adopted banking innovations from across the sea, adapting them to serve a uniquely Mesoamerican commercial vision. But how should this economic empire be governed?"
 nd_azt.11.a: "The cacao lords shall guide our prosperity."
 nd_azt.11.b: "Build ships and seek new markets beyond the sea."
 nd_azt.12.t: "Merchants of the World"
 nd_azt.12.d: "The pochteca have done what no Aztec ever dreamed possible. From their island in Lake Texcoco, they have built a commercial network that spans oceans and continents. Aztec trading posts dot the Caribbean. Cacao, obsidian, and featherwork flow outward; silver, fine cloth, and exotic luxuries flow back. The Huey Tlatoani must now decide how to channel this unprecedented wealth -- shall the empire's roads carry settlers and administrators to found new provinces, or shall the merchant guilds hire foreign soldiers and sailors to protect and expand their ever-growing network?"
 nd_azt.12.a: "Our people shall settle every road they walk."
 nd_azt.12.b: "Let gold buy what obsidian cannot take."
 STATIC_MODIFIER_NAME_nd_azt_dest_war_drums: "Thunder of the War Drums"
 STATIC_MODIFIER_DESC_nd_azt_dest_war_drums: "The war drums of the Aztec Empire sound without ceasing. The levies are swollen with eager warriors, and the cost of waging war has been reduced through constant practice. Every frontier province maintains its readiness for the next campaign."
 STATIC_MODIFIER_NAME_nd_azt_dest_sacred_conquest: "Sacred Conquest"
 STATIC_MODIFIER_DESC_nd_azt_dest_sacred_conquest: "The conquered lands have been consecrated to Huitzilopochtli. Temple-fortresses garrison every major settlement, inspiring religious devotion among the conquered peoples even as they discourage rebellion. But sustaining armies across such vast territories takes its toll."
 STATIC_MODIFIER_NAME_nd_azt_dest_obsidian_hegemony: "Obsidian Hegemony"
 STATIC_MODIFIER_DESC_nd_azt_dest_obsidian_hegemony: "The reach of Aztec military power now extends across seas and continents. A fleet patrols the coastlines, cavalry -- once unknown in the Americas -- scouts the frontiers, and the empire's colonial ambitions know no bounds."
 STATIC_MODIFIER_NAME_nd_azt_dest_sun_lords: "Radiance of the Sun Lords"
 STATIC_MODIFIER_DESC_nd_azt_dest_sun_lords: "The Aztec Empire governs through prestige and awe as much as through force. Mercenary companies from distant peoples serve the Huey Tlatoani, and foreign rulers seek alliance with the Sun Lords. But maintaining such a vast network of patronage is not without cost."
 STATIC_MODIFIER_NAME_nd_azt_dest_cacao_lords: "Dominion of the Cacao Lords"
 STATIC_MODIFIER_DESC_nd_azt_dest_cacao_lords: "The pochteca merchant princes wield economic power that rivals any warrior order. Their networks rebuild war-torn provinces, and their diplomatic connections expand the empire's reach. But wealth breeds complacency."
 STATIC_MODIFIER_NAME_nd_azt_dest_market_kings: "Ambition of the Market Kings"
 STATIC_MODIFIER_DESC_nd_azt_dest_market_kings: "The empire's commercial ambitions have turned seaward. Shipyards produce vessels to carry trade beyond the coastlines, and explorers chart new routes to distant markets. But the focus on trade comes at a cost to military readiness."
 STATIC_MODIFIER_NAME_nd_azt_dest_golden_roads: "The Golden Roads"
 STATIC_MODIFIER_DESC_nd_azt_dest_golden_roads: "Aztec settlers and administrators travel the empire's vast road network, establishing new provinces and integrating conquered peoples. Religious differences are no barrier to expansion -- the empire's roads welcome all who submit to the Huey Tlatoani."
 STATIC_MODIFIER_NAME_nd_azt_dest_world_merchants: "Empire of World Merchants"
 STATIC_MODIFIER_DESC_nd_azt_dest_world_merchants: "The pochteca have become true world merchants, their commercial networks protected by hired soldiers and supported by a growing fleet. The empire's economic reach extends to every shore that Aztec ships can reach."
 nd_azt_sun_temple: "Sun Temple Complex"
 nd_azt_sun_temple_desc: "A grand temple-fortress complex dedicated to Huitzilopochtli, combining the sacred authority of the war god with the practical strength of an imperial garrison. The greatest such complex outside Tenochtitlan itself."
 nd_azt_pochteca_palace: "Pochteca Palace"
 nd_azt_pochteca_palace_desc: "A magnificent trading headquarters where the pochteca merchant princes coordinate the empire's vast commercial network. Warehouses, counting houses, and diplomatic reception halls surround a central market courtyard."
 nd_azt_sun_temple_maintenance: "Temple Garrison"
 nd_azt_sun_temple_maintenance_desc: "The Sun Temple complex requires stone for repairs, weaponry to arm its garrison, and sacred incense for the perpetual fires that honour Huitzilopochtli."
 nd_azt_palace_maintenance: "Palace Administration"
 nd_azt_palace_maintenance_desc: "Operating the Pochteca Palace requires cacao for ceremonial gifts and trade samples, cloth for diplomatic displays, and paper for the vast ledgers tracking continental commerce."
