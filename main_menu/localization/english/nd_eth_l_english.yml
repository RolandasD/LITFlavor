l_english:
 STATIC_MODIFIER_NAME_nd_sword_of_zion: "Sword of Zion"
 STATIC_MODIFIER_DESC_nd_sword_of_zion: "The Ethiopian throne is the seat of God's chosen dynasty, descended from Solomon and the Queen of Sheba. Our armies march under the banner of the Lion of Judah, defenders of the Christian faith in Africa. Let the world tremble before the Sword of Zion."
 STATIC_MODIFIER_NAME_nd_light_of_aksum: "Light of Aksum"
 STATIC_MODIFIER_DESC_nd_light_of_aksum: "From the ancient obelisks of Aksum to the rock-hewn churches of Lalibela, Ethiopia has been a beacon of civilization since antiquity. Our Ge'ez script, our manuscripts, our diplomatic connections to distant kingdoms — these are the treasures that set us apart. Let the Light of Aksum illuminate the world."
 STATIC_MODIFIER_NAME_nd_portuguese_arms: "Portuguese Arms"
 STATIC_MODIFIER_DESC_nd_portuguese_arms: "The Portuguese expedition has introduced matchlock muskets and cannon to our armies. Ethiopian soldiers now drill with firearms alongside their traditional weapons, creating a formidable hybrid fighting force."
 STATIC_MODIFIER_NAME_nd_highland_defense: "Highland Defense"
 STATIC_MODIFIER_DESC_nd_highland_defense: "The mountains are our fortress. The bitter lessons of the Adal War have taught us to use the highland terrain as our greatest weapon, turning every mountain pass into a killing ground for invaders."
 STATIC_MODIFIER_NAME_nd_imperial_restoration: "Imperial Restoration"
 STATIC_MODIFIER_DESC_nd_imperial_restoration: "The chaos of the Era of Princes is over. The emperor once again commands the loyalty of the provinces, and the machinery of centralized government grinds into motion. Ethiopia shall not be divided again."
 STATIC_MODIFIER_NAME_nd_princely_compromise: "Princely Compromise"
 STATIC_MODIFIER_DESC_nd_princely_compromise: "Rather than crush the regional lords, the emperor has negotiated a careful balance of power. Provincial autonomy is preserved in exchange for loyalty to the throne, creating a diverse but stable realm."
 STATIC_MODIFIER_NAME_nd_tewodros_vision: "Vision of Tewodros"
 STATIC_MODIFIER_DESC_nd_tewodros_vision: "The bandit-king who became emperor has a vision of a modern Ethiopia — a nation with a professional standing army, modern roads, and centralized administration. The old feudal order must bend or break."
 nd_eth.1.t: "The Restoration of the Solomonic Throne"
 nd_eth.1.d: "The highlands of the Horn are united once more under the banner of the Lion of Judah. The Solomonic dynasty, claiming unbroken descent from King Solomon and the Queen of Sheba through the Kebra Nagast, now rules over a reunified Ethiopia. From the ancient stelae of Aksum to the rock-hewn churches of Lalibela, from the Red Sea coast to the highlands of Shewa, our domain encompasses one of the oldest Christian civilizations on Earth.\n\nBut what manner of empire shall this be? The Negusa Nagast — King of Kings — must choose the path that will define Ethiopia for generations. Will we be the militant defenders of our faith, a sword raised against all who threaten Christendom in Africa? Or will we draw upon the ancient wisdom of Aksum, becoming a beacon of learning, diplomacy, and trade that commands respect through cultural grandeur rather than the spear alone?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_eth.1.a: "We are the Sword of Zion — let none challenge the faith!"
 nd_eth.1.b: "We are the Light of Aksum — let our civilization shine forth!"
 nd_eth.2.t: "The Glory of Kings"
 nd_eth.2.d: "Scribes at the imperial court have completed a momentous work: the Kebra Nagast, the Glory of Kings. This grand compilation traces the lineage of our dynasty from King Solomon himself, through his son Menelik I who brought the Ark of the Covenant from Jerusalem to Aksum. The text weaves together biblical narrative, Ethiopian legend, and political theology into a masterwork that legitimizes the Solomonic dynasty's claim to rule.\n\nMore than mere propaganda, the Kebra Nagast establishes Ethiopia as a chosen nation with a divine mandate. Foreign ambassadors who hear its claims regard our kingdom with new reverence, while our own people find in it a profound source of national identity and purpose."
 nd_eth.2.a: "The Glory of Kings shall be our nation's scripture."
 nd_eth.3.t: "The Adal War"
 nd_eth.3.d: "The Horn of Africa trembles. Imam Ahmad ibn Ibrahim al-Ghazi — known as Gragn, 'the Left-Handed' — has unleashed the armies of the Adal Sultanate upon the Ethiopian highlands. His forces, armed with Ottoman firearms and burning with religious fervor, have overrun province after province, sacking churches, burning manuscripts centuries old, and putting Christian communities to the sword.\n\nThis is an existential struggle for Ethiopia's survival. The empress has desperately sought aid from abroad, and a Portuguese expedition under Cristovao da Gama has arrived at Massawa with four hundred soldiers bearing matchlock muskets and cannon — weapons Ethiopia has never seen. The question now is how to rebuild from this devastation."
 nd_eth.3.a: "Adopt the Portuguese firearms — let us master the weapons of the future."
 nd_eth.3.b: "Trust in our mountains — the highlands themselves are our greatest fortress."
 nd_eth.4.t: "The Splendor of Gondar"
 nd_eth.4.d: "Emperor Fasilides has done what no Ethiopian ruler before him accomplished: he has established a permanent capital. At Gondar, north of Lake Tana, rises the Fasil Ghebbi — a royal enclosure of stone castles that would not look out of place in Europe. Influenced by Portuguese, Indian, and local architectural traditions, these structures of brown basalt and wine-colored tuff represent a new chapter in Ethiopian civilization.\n\nFor centuries, Ethiopian emperors ruled from moving camps, exhausting each locale before moving on. Gondar changes everything. A permanent capital means permanent institutions — a fixed court, established markets, resident diplomats, and a growing urban population that will transform Ethiopian society for the next century."
 nd_eth.4.a: "Gondar shall be the jewel of Africa."
 nd_eth.5.t: "The Era of the Princes"
 nd_eth.5.d: "The assassination of Emperor Iyoas I by Ras Mikael Sehul in 1769 has plunged Ethiopia into the Zemene Mesafint — the Era of the Princes. The Solomonic emperors still sit upon their throne in Gondar, but they are puppets, their power reduced to ceremonial gestures while regional lords — the Ras and Dejazmach — wage their own wars, levy their own taxes, and rule their territories as independent fiefdoms.\n\nIn eighty-six years, twenty-three emperors will occupy the throne, most mere figureheads installed and removed at the whim of whichever warlord controls Gondar. Ethiopia faces a choice: will a strong emperor reassert central authority and crush the regional lords, or will the realm find stability through a negotiated balance of power?"
 nd_eth.5.a: "Restore the authority of the throne — end this chaos!"
 nd_eth.5.b: "Negotiate with the princes — stability through compromise."
 nd_eth.6.t: "The Rise of Tewodros"
 nd_eth.6.d: "From the chaos of the Zemene Mesafint emerges an unlikely savior. Kassa Hailu, a bandit chieftain from the borderlands of Qwara, has defeated every rival warlord and proclaimed himself Emperor Tewodros II — taking a name from prophecy that foretold a righteous king who would restore Ethiopia's glory.\n\nTewodros envisions nothing less than a complete transformation of Ethiopia. He disbands the feudal levies and creates a permanent standing army loyal only to the crown. He builds roads to connect the provinces. He commissions the casting of cannon at his mountain fortress of Magdala. He attempts to abolish the slave trade and reduce the power of the Church. Not since Amda Seyon has an Ethiopian emperor displayed such fierce ambition — or such willingness to break with the old order."
 nd_eth.6.a: "Ethiopia shall be reborn in Tewodros's image."
 nd_eth_geez_literary_tradition: "Ge'ez Literary Tradition"
 nd_eth_geez_literary_tradition_desc: "The development of Ethiopia's unique Ge'ez script and its monastic tradition of manuscript copying, creating one of the oldest continuous literary cultures in Africa."
 nd_eth_shotelai_tradition: "Shotelai Cavalry"
 nd_eth_shotelai_tradition_desc: "The tradition of mounted highland warriors armed with the curved shotel sword, skilled at flanking maneuvers across the Ethiopian plateau."
 nd_eth_aksumite_heritage: "Aksumite Heritage"
 nd_eth_aksumite_heritage_desc: "The enduring legacy of the ancient Kingdom of Aksum — its stelae, its coinage, its trade connections to Rome and India — which grants Ethiopian civilization a prestige unmatched in sub-Saharan Africa."
 nd_eth_tej_production: "Tej Production"
 nd_eth_tej_production_desc: "The ancient Ethiopian tradition of brewing tej, a honey wine central to social rituals, religious ceremonies, and daily life across the highlands."
 nd_eth_amba_fortification: "Amba Fortification"
 nd_eth_amba_fortification_desc: "The Ethiopian practice of fortifying flat-topped mountain mesas (ambas) as near-impregnable natural fortresses, used to imprison rivals, store treasuries, and defend strategic passes."
 nd_eth_amole_trade_network: "Amole Trade Network"
 nd_eth_amole_trade_network_desc: "The sophisticated trade system built around amole salt bars, extracted from the Danakil Depression and used as currency throughout the Ethiopian highlands and beyond."
 nd_eth_kebra_nagast: "Kebra Nagast"
 nd_eth_kebra_nagast_desc: "The compilation of the Kebra Nagast — the Glory of Kings — a foundational text tracing the Solomonic dynasty's descent from King Solomon and establishing Ethiopia's divine right to the Ark of the Covenant."
 nd_eth_shotelai_renaissance: "Shotelai Renaissance"
 nd_eth_shotelai_renaissance_desc: "The evolution of Ethiopian cavalry tactics in the Renaissance era, combining the traditional shotel with improved armor and coordinated charge techniques."
 nd_eth_solomonic_admin: "Solomonic Administration"
 nd_eth_solomonic_admin_desc: "The imperial administrative system of the Solomonic dynasty, centered on the Negusa Nagast and his appointed governors, maintaining control over the vast highland realm."
 nd_eth_shamma_tradition: "Shamma Weaving"
 nd_eth_shamma_tradition_desc: "The distinctive Ethiopian tradition of weaving shamma cloth — white cotton garments with decorative borders — worn by all classes of Ethiopian society from peasants to emperors."
 nd_eth_red_sea_trade: "Red Sea Commerce"
 nd_eth_red_sea_trade_desc: "Ethiopian access to the lucrative Indian Ocean trade network through the Red Sea ports of Massawa and Zeila, exchanging gold, ivory, and slaves for horses, textiles, and weapons."
 nd_eth_zagwe_architecture: "Zagwe Architectural Legacy"
 nd_eth_zagwe_architecture_desc: "The extraordinary rock-hewn architectural tradition inherited from the Zagwe dynasty, exemplified by the eleven monolithic churches of Lalibela carved directly from living rock."
 nd_eth_portuguese_alliance: "Portuguese Alliance"
 nd_eth_portuguese_alliance_desc: "The diplomatic connection with Portugal, born of mutual Christian solidarity against Islam, which brought European military technology and diplomatic recognition to Ethiopia."
 nd_eth_adal_war_veterans: "Adal War Veterans"
 nd_eth_adal_war_veterans_desc: "The generation of battle-hardened soldiers forged in the existential war against Imam Ahmad Gragn's Adal Sultanate — warriors who learned to fight with both sword and matchlock."
 nd_eth_danakil_route: "Danakil Salt Route"
 nd_eth_danakil_route_desc: "Control of the salt extraction routes from the Danakil Depression, where the brutal heat of the lowest point in Africa yields the amole bars that serve as Ethiopia's primary currency."
 nd_eth_gondarine_splendor: "Gondarine Splendor"
 nd_eth_gondarine_splendor_desc: "The establishment of Gondar as Ethiopia's first permanent capital, crowned by the magnificent Fasil Ghebbi royal enclosure with its stone castles blending Ethiopian, Portuguese, and Indian architectural influences."
 nd_eth_chewa_tradition: "Chewa Imperial Guard"
 nd_eth_chewa_tradition_desc: "The Chewa system of elite military colonies, where professional soldiers settled in strategic provinces serve as the emperor's standing army and personal guard."
 nd_eth_gult_system: "Gult System"
 nd_eth_gult_system_desc: "The Ethiopian land-grant system where the emperor awards gult rights to nobles and military commanders, granting them tax collection authority in exchange for military service obligations."
 nd_eth_gondarine_artillery: "Gondarine Artillery"
 nd_eth_gondarine_artillery_desc: "The adoption of gunpowder artillery by the Ethiopian military, building on technology introduced during the Portuguese alliance and refined during the Gondarine period."
 nd_eth_beta_israel: "Beta Israel Tolerance"
 nd_eth_beta_israel_desc: "Recognition of the Beta Israel — Ethiopian Jews who trace their faith to Menelik I's companions — as a protected community, integrating their skills in metalworking, weaving, and pottery into Ethiopian society."
 nd_eth_oromo_integration: "Oromo Integration"
 nd_eth_oromo_integration_desc: "The gradual absorption of Oromo peoples into the Ethiopian state, bringing their superior cavalry traditions and pastoral economy to enrich the empire's military and cultural diversity."
 nd_eth_zemene_mesafint: "Zemene Mesafint"
 nd_eth_zemene_mesafint_desc: "The hard lessons of the Zemene Mesafint — the Era of the Princes — where regional warlords reduced emperors to puppets, teaching Ethiopia the fragility of centralized power."
 nd_eth_coffee_ceremony: "Ethiopian Coffee Ceremony"
 nd_eth_coffee_ceremony_desc: "The ritualization of coffee drinking — buna in Amharic — into the elaborate Ethiopian coffee ceremony, transforming a stimulant beverage into a cornerstone of social life and commerce."
 nd_eth_manuscript_school: "Gondarine Manuscript School"
 nd_eth_manuscript_school_desc: "The flowering of Ethiopian illuminated manuscripts during the Gondarine period, producing vivid painted bibles and hagiographies that represent the pinnacle of Ethiopian visual art."
 nd_eth_tewodros_reunification: "Tewodros Reunification"
 nd_eth_tewodros_reunification_desc: "The military and administrative revolution of Emperor Tewodros II, who ended the Zemene Mesafint, created a national standing army, and envisioned a modern, centralized Ethiopian state."
 nd_eth_modernization: "Ethiopian Modernization"
 nd_eth_modernization_desc: "The broader program of modernization that Tewodros II initiated — road building, weapons manufacturing, administrative reform — continued by his successors Yohannes IV and Menelik II."
 nd_eth_sovereignty: "Abyssinian Sovereignty"
 nd_eth_sovereignty_desc: "Ethiopia's assertion of independence in an age of European colonialism, standing as the only African state to successfully resist the Scramble for Africa and maintain its sovereignty."
 a_nd_eth_shotelai: "Shotelai"
 a_nd_eth_shotelai_desc: "Highland cavalry armed with the shotel — a curved, sickle-shaped sword designed to reach around an opponent's shield. Skilled at flanking maneuvers across the Ethiopian plateau."
 a_nd_eth_shotelai_ren: "Renaissance Shotelai"
 a_nd_eth_shotelai_ren_desc: "Improved Shotelai horsemen with better armor and coordinated tactics, maintaining their traditional flanking prowess while adapting to the changing face of warfare."
 a_nd_eth_adal_veterans: "Adal War Veterans"
 a_nd_eth_adal_veterans_desc: "Battle-hardened infantry forged in the devastating war against Imam Ahmad Gragn's Adal forces. They fight with the desperate determination of soldiers who have faced national annihilation."
 a_nd_eth_chewa_guard: "Chewa Imperial Guard"
 a_nd_eth_chewa_guard_desc: "Elite household cavalry of the Negusa Nagast, drawn from military colonies settled across the empire. Sworn to the emperor alone, they are the most disciplined soldiers in Ethiopia."
 a_nd_eth_oromo_horsemen: "Oromo Horsemen"
 a_nd_eth_oromo_horsemen_desc: "Integrated Oromo cavalry who bring the speed and aggression of pastoral raiding traditions to the Ethiopian imperial army. Fast, fearless, and devastating on open ground."
 a_nd_eth_tewodros_fusiliers: "Tewodros Fusiliers"
 a_nd_eth_tewodros_fusiliers_desc: "Modern Ethiopian infantry reformed under Emperor Tewodros II, equipped with muskets and trained in European-style drill, representing the first truly professional Ethiopian standing army."
 a_nd_eth_gondarine_cannon: "Gondarine Cannon"
 a_nd_eth_gondarine_cannon_desc: "Ethiopian artillery crews operating cannon adopted from Portuguese technology, refined during the Gondarine period for siege warfare in the highland terrain."
 nd_eth_debra: "Debra"
 nd_eth_debra_desc: "An Ethiopian monastic church and scriptorium where monks copy manuscripts in the Ge'ez script, preserving religious texts, chronicles, and the literary heritage of one of Africa's oldest civilizations."
 nd_eth_amole_market: "Amole Market"
 nd_eth_amole_market_desc: "A trading center built around the exchange of amole salt bars — blocks of rock salt extracted from the Danakil Depression that serve as currency throughout the Ethiopian highlands."
 nd_eth_fasil_ghebbi: "Fasil Ghebbi"
 nd_eth_fasil_ghebbi_desc: "A royal enclosure in the style of Gondar's castle compound, blending Ethiopian, Portuguese, and Indian architectural traditions into a fortress-palace complex of brown basalt."
 nd_eth_buna_bet: "Buna Bet"
 nd_eth_buna_bet_desc: "An Ethiopian coffee house where the elaborate buna ceremony — roasting, grinding, and brewing coffee beans — serves as the center of social life, trade negotiation, and community gathering."
 nd_eth_amba: "Amba Fortress"
 nd_eth_amba_desc: "A fortified flat-topped mountain mesa, exploiting Ethiopia's dramatic highland terrain to create a natural fortress accessible only by narrow, easily defended paths."
 nd_eth_tej_bet: "Tej Bet"
 nd_eth_tej_bet_desc: "An establishment for the production and sale of tej — Ethiopian honey wine — a beverage central to Ethiopian culture, consumed at feasts, religious ceremonies, and daily meals alike."
 nd_eth_gult_estate: "Gult Estate"
 nd_eth_gult_estate_desc: "A land-grant estate awarded by the emperor to loyal nobility, where the gult-holder collects taxes and raises military levies in exchange for sworn service to the Solomonic throne."
 nd_eth_manuscript_copying: "Manuscript Copying"
 nd_eth_manuscript_copying_desc: "Monks labor to copy religious texts and chronicles in the ancient Ge'ez script, maintaining Ethiopia's literary tradition."
 nd_eth_salt_exchange: "Salt Exchange"
 nd_eth_salt_exchange_desc: "The bustling trade in amole salt bars, weighed, graded, and exchanged as currency for goods from across the region."
 nd_eth_palace_upkeep: "Palace Upkeep"
 nd_eth_palace_upkeep_desc: "The maintenance of the royal enclosure's stone castles, gardens, and ceremonial spaces."
 nd_eth_coffee_roasting: "Coffee Roasting"
 nd_eth_coffee_roasting_desc: "The roasting and grinding of Ethiopian coffee beans in the traditional ceremony, filling the air with the distinctive aroma of buna."
 nd_eth_amba_garrison: "Amba Garrison"
 nd_eth_amba_garrison_desc: "Armed soldiers maintaining the defenses of the mountain-top fortress, guarding the narrow approaches."
 nd_eth_tej_brewing: "Tej Brewing"
 nd_eth_tej_brewing_desc: "The fermentation of honey and gesho leaves to produce tej, Ethiopia's beloved honey wine."
 nd_eth_gult_obligations: "Gult Obligations"
 nd_eth_gult_obligations_desc: "The flow of tribute from tenant farmers to the gult-holder: livestock, grain, and labor in exchange for military protection."
 nd_eth_rock_hewn_masonry: "Rock-Hewn Masonry"
 nd_eth_rock_hewn_masonry_desc: "The extraordinary Ethiopian technique of carving churches and chambers directly from living rock, inherited from the Zagwe dynasty's Lalibela masterworks."
 nd_eth_shamma_weaving: "Shamma Weaving"
 nd_eth_shamma_weaving_desc: "The production of shamma cloth — distinctive white cotton garments with colorful borders — worn by all levels of Ethiopian society."
 nd_eth_danakil_extraction: "Danakil Salt Extraction"
 nd_eth_danakil_extraction_desc: "The brutal labor of extracting salt blocks from the Danakil Depression, one of the hottest places on Earth, for use as currency across the highlands."
 levy_nd_eth_shotelai: "Shotelai Levy"
 levy_nd_eth_shotelai_desc: "Highland horsemen mustered from the noble estates, armed with the traditional curved shotel sword."
 levy_nd_eth_shotelai_ren: "Renaissance Shotelai Levy"
 levy_nd_eth_shotelai_ren_desc: "Improved Shotelai cavalry levied from the provincial nobility, combining traditional weapons with better armor."
 levy_nd_eth_chewa_guard: "Chewa Guard Levy"
 levy_nd_eth_chewa_guard_desc: "Elite cavalry drawn from the Chewa military colonies, sworn to the emperor and maintained as a permanent fighting force."
 nd_eth_formed_tt: "Ethiopia has been formed"
 nd_eth_path_a_tt: "Chose the #bold Sword of Zion#! destiny"
 nd_eth_path_b_tt: "Chose the #bold Light of Aksum#! destiny"
 nd_eth_destiny: "The Solomonic Mandate"
 nd_eth_destiny_desc: "With the highlands united under the Lion of Judah, the Negusa Nagast must consolidate imperial authority. Stabilize the realm to prepare for the great destiny that awaits the Solomonic throne."
 nd_eth_dest_horn: "Conquest of the Horn"
 nd_eth_dest_horn_desc: "The Muslim strongholds of Harar and Berbera dominate the eastern approaches to the Ethiopian highlands. Seize them to break Islamic power on the Horn and open the path to the sea."
 nd_eth_dest_red_sea: "Masters of the Red Sea"
 nd_eth_dest_red_sea_desc: "Control of Aden and Suakin places the entire Red Sea under Solomonic dominion. Build a mighty army and seize these gateways to command the strait between Africa and Arabia."
 nd_eth_dest_new_jerusalem: "The New Jerusalem"
 nd_eth_dest_new_jerusalem_desc: "Fulfill the Solomonic prophecy. Take Jerusalem and Mecca, proving that the descendants of Solomon have returned to claim their divine inheritance. Earn the prestige worthy of Prester John."
 nd_eth_dest_crossroads: "Indian Ocean Crossroads"
 nd_eth_dest_crossroads_desc: "Ethiopia sits at the crossroads of Africa and Arabia. Draw the riches of the Indian Ocean trade into the highland markets — coffee from our own plateaus, ivory from the interior — and fill the treasury with gold."
 nd_eth_dest_gold_routes: "The Gold Routes"
 nd_eth_dest_gold_routes_desc: "Extend Aksumite commercial ambitions down the Swahili coast. Take Mogadishu, embrace modern banking, and develop the realm until Ethiopian merchants rival those of any nation."
 nd_eth_dest_crown_nile: "Crown of the Nile"
 nd_eth_dest_crown_nile_desc: "Claim Cairo, the greatest city of the Nile, and build a commercial empire that spans from the highland sources of the Blue Nile to the Mediterranean. Embrace global trade and develop the realm to its fullest potential."
 nd_eth.7.t: "The Solomonic Mandate"
 nd_eth.7.d: "The court astrologers and the Abun himself agree: the signs are auspicious. The highlands are at peace, the treasury is sound, and the authority of the Negusa Nagast is unchallenged from Tigray to Shewa. Ethiopia stands ready to fulfill whatever destiny God has ordained for the heirs of Solomon.\n\nThe scribes record this moment in the royal chronicle: on this day, the Solomonic mandate was renewed, and the empire set its face toward greatness."
 nd_eth.7.a: "The mandate of Solomon is renewed."
 nd_eth.8.t: "The Sword Descends Upon the Horn"
 nd_eth.8.d: "Harar, that fortress of Islam on our eastern frontier, has fallen to Ethiopian arms. The crescent has been torn down from its minarets and the cross raised in its place. Berbera too submits, its merchants now paying tribute to the Lion of Judah rather than to Somali sultans.\n\nThe conquest of the Horn sends a message to every Muslim state from Aden to Cairo: Ethiopia is no longer content to merely defend its mountains. The Sword of Zion reaches outward now, and it will not be sheathed until the Negusa Nagast's ambitions are fulfilled."
 nd_eth.8.a: "The Horn is ours. What lies beyond it?"
 nd_eth.9.t: "Masters of the Red Sea"
 nd_eth.9.d: "Ethiopian banners fly over Aden and Suakin. The great strait that connects the Mediterranean world to the Indian Ocean is now firmly in Solomonic hands. No ship passes through the Bab el-Mandeb without Ethiopia's leave.\n\nThis is a transformation for a highland empire that once had no coastline at all. Ethiopian governors now administer tropical ports, collect customs on Indian spices, and oversee the provisioning of fleets. The question is whether to build naval power to dominate these waters, or to press the holy war ever deeper into the lands of Islam."
 nd_eth.9.a: "Build a fleet worthy of a maritime empire."
 nd_eth.9.b: "Press the holy war — God wills it!"
 nd_eth.10.t: "The New Jerusalem"
 nd_eth.10.d: "The impossible has been achieved. Ethiopian soldiers stand in Jerusalem and Mecca alike. The Solomonic prophecy is fulfilled: the descendants of Menelik I have returned to the lands of their ancestor. The Ark of the Covenant, long kept in Aksum, now rests in a land that stretches from its origin to its promised destination.\n\nChristian Europe is astonished. The legend of Prester John — the mighty Christian king beyond the lands of Islam — has become reality. Ambassadors arrive from Rome, from Constantinople, from every court in Europe, eager to treat with this African emperor who has accomplished what the Crusaders could not. How shall Ethiopia wield this extraordinary power?"
 nd_eth.10.a: "Welcome the ambassadors — we are Prester John."
 nd_eth.10.b: "We need no foreign approval. The Lion conquers."
 nd_eth.11.t: "Crossroads of the Indian Ocean"
 nd_eth.11.d: "Ethiopian coffee and ivory now flow through the markets of the capital, drawing merchants from Arabia, India, and beyond. The highland plateaus that once seemed isolated from the world's commerce have become a crossroads. Dhows carry our coffee to Aden and Hormuz. Ivory caravans from the interior terminate in our markets. Gold accumulates in the royal treasury at a pace that would have astonished the Aksumite kings.\n\nThe ancient dream of Aksum — to be a trading civilization that bridges Africa and the Indian Ocean world — lives again. And unlike Aksum, we command the coffee that the world is learning to crave."
 nd_eth.11.a: "Let the wealth of the ocean flow through our hands."
 nd_eth.12.t: "The Gold Routes"
 nd_eth.12.d: "Mogadishu, jewel of the Swahili coast, now answers to the Negusa Nagast. Its ancient trading houses, accustomed to dealing in gold, ivory, and spices, have opened their ledgers to Ethiopian merchants. With the embrace of banking institutions and the steady development of our highland provinces, Ethiopia has transformed itself from a mountain fortress into a commercial power.\n\nThe question now is how to wield this wealth. Should Ethiopia monopolize the spice routes to maximize revenue, or invest the riches into learning and reform that will endure long after the trade winds shift?"
 nd_eth.12.a: "Monopolize the spice and gold routes."
 nd_eth.12.b: "Invest the wealth in learning and reform."
 nd_eth.13.t: "Crown of the Nile"
 nd_eth.13.d: "Cairo has fallen to the armies of Ethiopia. The greatest city of the Nile, seat of pharaohs and caliphs, answers now to the Negusa Nagast. Ethiopia controls the entire course of the sacred river from its highland sources to the Mediterranean delta, with a realm developed and prosperous beyond all precedent.\n\nThis is an empire without equal in African history. Neither the Aksumites nor the pharaohs nor the caliphs held dominion over such wealth and such breadth of commerce. Ethiopian scholars debate whether this realm more closely resembles the Queen of Sheba's legendary domain or something entirely new — a civilization that bridges Africa, Arabia, and the Mediterranean world."
 nd_eth.13.a: "Rule with the wisdom of Makeda, Queen of Sheba."
 nd_eth.13.b: "The Solomonic throne is eternal and undivided."
 STATIC_MODIFIER_NAME_nd_eth_dest_bab_el_mandeb: "Guardians of the Strait"
 STATIC_MODIFIER_DESC_nd_eth_dest_bab_el_mandeb: "Ethiopian naval forces patrol the Bab el-Mandeb, controlling passage between the Red Sea and the Indian Ocean. A highland empire has become a maritime power."
 STATIC_MODIFIER_NAME_nd_eth_dest_crusade_onward: "Crusade Without End"
 STATIC_MODIFIER_DESC_nd_eth_dest_crusade_onward: "The holy war presses onward into the lands of Islam. Ethiopian missionaries follow in the wake of the armies, converting the conquered, though the cost of endless campaigning strains the treasury."
 STATIC_MODIFIER_NAME_nd_eth_dest_prester_john: "Prester John Revealed"
 STATIC_MODIFIER_DESC_nd_eth_dest_prester_john: "The legend of Prester John — the mighty Christian king beyond the lands of Islam — has become reality. European ambassadors flock to the Ethiopian court, and Ethiopian agents move freely among the courts of Christendom."
 STATIC_MODIFIER_NAME_nd_eth_dest_lion_conquers: "The Lion Conquers"
 STATIC_MODIFIER_DESC_nd_eth_dest_lion_conquers: "The Lion of Judah has proven mightier than any force arrayed against it. Ethiopian armies move with fearsome speed and tactical brilliance, dictating terms to the vanquished."
 STATIC_MODIFIER_NAME_nd_eth_dest_spice_monopoly: "Spice Monopoly"
 STATIC_MODIFIER_DESC_nd_eth_dest_spice_monopoly: "Ethiopian merchants have cornered the trade in coffee, ivory, and spices along the Indian Ocean coast. The focus on commerce means maintaining armies grows costlier, but the wealth more than compensates."
 STATIC_MODIFIER_NAME_nd_eth_dest_invest_learning: "Aksumite Renaissance"
 STATIC_MODIFIER_DESC_nd_eth_dest_invest_learning: "The wealth of the Indian Ocean trade flows into schools, libraries, and legal reform. Ethiopian scholars produce works that rival anything from Cairo or Constantinople."
 STATIC_MODIFIER_NAME_nd_eth_dest_queen_sheba: "Wisdom of Makeda"
 STATIC_MODIFIER_DESC_nd_eth_dest_queen_sheba: "Like the Queen of Sheba who journeyed to Jerusalem seeking wisdom, Ethiopia now draws the wisest minds of three continents to its court. The Negusa Nagast rules through diplomacy and knowledge."
 STATIC_MODIFIER_NAME_nd_eth_dest_eternal_throne: "The Eternal Throne"
 STATIC_MODIFIER_DESC_nd_eth_dest_eternal_throne: "The Solomonic dynasty sits upon a throne that spans from the Nile to the Indian Ocean. The legitimacy of the crown is absolute, and its navy patrols the seas of a vast commercial empire."
 nd_eth_tabernacle: "Tabernacle of Zion"
 nd_eth_tabernacle_desc: "A monumental sanctuary built to house the Ark of the Covenant, modeled on Solomon's Temple and reflecting Ethiopia's claim as guardian of the holiest relic in Christendom. Its clergy maintain an eternal vigil."
 nd_eth_ark_guardians: "Ark Guardians"
 nd_eth_ark_guardians_desc: "The priestly order devoted to guarding the Tabernacle, burning incense and tending the sacred relics of the Solomonic covenant."
 nd_eth_house_of_aksumite_learning: "House of Aksumite Learning"
 nd_eth_house_of_aksumite_learning_desc: "A grand academy where Ethiopian, Egyptian, Indian, and Swahili scholarly traditions converge. Merchants and scholars alike gather to exchange knowledge, creating a center of learning and commerce unrivaled in Africa."
 nd_eth_scholarly_exchange: "Scholarly Exchange"
 nd_eth_scholarly_exchange_desc: "Scholars from across the Ethiopian empire and beyond study, translate, and produce manuscripts at this great center of learning."
