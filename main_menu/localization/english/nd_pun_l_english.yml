l_english:
 STATIC_MODIFIER_NAME_nd_khalsa_raj: "Khalsa Raj"
 STATIC_MODIFIER_DESC_nd_khalsa_raj: "The Khalsa Raj proclaims sovereignty through the strength of the Panth. Every Sikh is a soldier, every soldier a saint, and the Punjab stands united under the double-edged sword of the Khanda."
 STATIC_MODIFIER_NAME_nd_five_rivers_prosperity: "Five Rivers Prosperity"
 STATIC_MODIFIER_DESC_nd_five_rivers_prosperity: "The land between the five rivers has always sustained great civilizations. With tolerance toward all faiths and mastery of irrigation and trade, Punjab flourishes as a crossroads of commerce and culture."
 STATIC_MODIFIER_NAME_nd_pun_baptism_of_steel: "Baptism of Steel"
 STATIC_MODIFIER_DESC_nd_pun_baptism_of_steel: "The Khande ki Pahul has forged the Khalsa into warriors without peer. Every initiated Sikh carries steel and stands ready to defend the faith unto death."
 STATIC_MODIFIER_NAME_nd_pun_brotherhood_of_the_pure: "Brotherhood of the Pure"
 STATIC_MODIFIER_DESC_nd_pun_brotherhood_of_the_pure: "The Khalsa is more than an army — it is a brotherhood of equals bound by devotion, where caste holds no meaning and every member serves the community through selfless service."
 STATIC_MODIFIER_NAME_nd_pun_lion_of_lahore: "Lion of Lahore"
 STATIC_MODIFIER_DESC_nd_pun_lion_of_lahore: "The Maharaja has brought European discipline to the Khalsa army. With French-trained infantry, reformed artillery, and a united command, the Sikh Empire fields the finest native army on the subcontinent."
 STATIC_MODIFIER_NAME_nd_pun_sarkar_i_khalsa: "Sarkar-i-Khalsa"
 STATIC_MODIFIER_DESC_nd_pun_sarkar_i_khalsa: "The government of the Khalsa brings stability and prosperity to Punjab. Under enlightened rule, the five rivers nourish a land of commerce, culture, and religious harmony."
 nd_pun.1.t: "The Formation of Punjab"
 nd_pun.1.d: "The land of the five rivers stands united under a single banner. From the fertile Doabs watered by the Jhelum, Chenab, Ravi, Beas, and Sutlej to the ancient walls of Lahore, Punjab has always been a crossroads — of invaders and traders, of faiths and cultures, of East and West. Now, for the first time, a Punjabi state commands the loyalty of all these lands.\n\nBut what kind of Punjab shall this be? The martial traditions of the Khalsa call for a warrior state, where the sword and the scripture are wielded as one, and the Panth defends its sovereignty through strength of arms. Or shall Punjab embrace the legacy of its five rivers — a land of abundance and tolerance, where commerce flows as freely as the waters, and people of all faiths find shelter?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_pun.1.a: "Khalsa Raj — the sovereignty of the Pure"
 nd_pun.1.b: "The Five Rivers shall nourish all who dwell here"
 nd_pun.2.t: "The Baptism of the Double-Edged Sword"
 nd_pun.2.d: "On the day of Vaisakhi, before a gathering of thousands at Anandpur, the Guru called for volunteers willing to offer their heads for the faith. Five men stepped forward — a water-carrier, a farmer, a washerman, a barber, and a cook. No Kshatriya warriors, no Brahmin priests. The Guru baptized them with sweetened water stirred by a double-edged sword, and they became the Panj Pyare, the Five Beloved. Then, in an act that shattered every convention of caste and hierarchy, the Guru knelt and asked the Five to baptize him in turn.\n\nThe Khalsa was born — a fraternity where the lowest became the highest, where every member was both saint and soldier, where the surname Singh proclaimed that caste was abolished and every Sikh stood equal before the Almighty. This was not merely a military reform but a social revolution. How shall the Khalsa define itself?"
 nd_pun.2.a: "We are forged in steel — the sword is our scripture"
 nd_pun.2.b: "We are the pure — our brotherhood is our strength"
 nd_pun.3.t: "The Lion of the Punjab"
 nd_pun.3.d: "From a one-eyed boy who lost his father at age twelve, to the unquestioned master of the Punjab — the Maharaja's rise is the stuff of legend. He united the fractious Misls not through bloodshed alone, but through cunning diplomacy, strategic marriages, and the force of his personality. He captured Lahore at nineteen, without firing a shot.\n\nNow the Maharaja turns his gaze to the army. He has recruited European officers — veterans of Napoleon's campaigns — to drill his infantry in the French manner and organize his artillery on modern principles. The Fauj-i-Khas, his model brigade, already rivals any force on the subcontinent. The ancient Zamzama cannon, captured from the Afghans, stands before the gates of Lahore as a symbol of Sikh power.\n\nThe question is whether this military revolution shall serve conquest or consolidation."
 nd_pun.3.a: "The Lion roars — let our enemies tremble"
 nd_pun.3.b: "The Sarkar-i-Khalsa shall govern with wisdom"
 nd_pun.4.t: "The Eternal Guru"
 nd_pun.4.d: "The Adi Granth has been compiled — a sacred scripture unlike any other. It contains not only the hymns of the Sikh Gurus but the words of Hindu Bhakti saints and Muslim Sufi mystics, composed in multiple languages and musical modes. Guru Arjan has declared that the Granth shall reside in the Harmandir Sahib at Amritsar, open to all who seek wisdom regardless of caste or creed.\n\nIn time, the tenth Guru will declare this scripture the eternal, living Guru of the Sikhs — a perpetual teacher that transcends any mortal authority. The Guru Granth Sahib embodies the revolutionary Sikh principle that divine truth belongs to no single people, language, or tradition, but speaks through all of them."
 nd_pun.4.a: "The Word is our Guru, now and forever"
 nd_pun_five_rivers_irrigation: "Five Rivers Irrigation"
 nd_pun_five_rivers_irrigation_desc: "The Doab lands between the five rivers of Punjab yield extraordinary harvests when properly irrigated through canal systems and Persian wheels."
 nd_pun_lahore_learning: "Lahore's Schools of Learning"
 nd_pun_lahore_learning_desc: "Under the Ghaznavids and Delhi Sultanate, Lahore became a renowned center of Persian poetry, Islamic jurisprudence, and scholarly exchange."
 nd_pun_doab_horsemen_tradition: "Doab Horsemen"
 nd_pun_doab_horsemen_tradition_desc: "The flat plains between Punjab's rivers breed excellent cavalry — fast-moving horsemen accustomed to raiding and frontier warfare."
 nd_pun_persian_wheel_tradition: "Persian Wheel Technology"
 nd_pun_persian_wheel_tradition_desc: "The introduction of the Persian wheel transforms Punjab's agriculture, lifting water from the rivers to irrigate fields far from their banks."
 nd_pun_khyber_crossroads: "Crossroads of the Khyber"
 nd_pun_khyber_crossroads_desc: "Punjab guards the eastern terminus of the Khyber Pass, through which flow both conquerors and caravans. Control of this gateway means control of trade between Central Asia and India."
 nd_pun_sultanate_garrison: "Sultanate Garrison Tradition"
 nd_pun_sultanate_garrison_desc: "The cities of Punjab — Lahore, Multan, Sialkot — have served as fortress-cities on the Sultanate's northwestern frontier for centuries."
 nd_pun_guru_nanaks_message: "Guru Nanak's Message"
 nd_pun_guru_nanaks_message_desc: "In 1469, Guru Nanak was born in the Punjab village of Talwandi. His message — 'There is no Hindu, there is no Muslim' — proclaimed the unity of all humanity under one God, laying the foundation for Sikhism."
 nd_pun_guru_ka_langar: "Guru Ka Langar"
 nd_pun_guru_ka_langar_desc: "The community kitchen tradition established by the Sikh Gurus serves free meals to all visitors regardless of caste, creed, or station — a radical declaration of equality."
 nd_pun_mughal_lahore: "Mughal Lahore"
 nd_pun_mughal_lahore_desc: "Under the Mughals, Lahore becomes one of the great cities of the world. The Shalimar Gardens, the Badshahi Mosque, and the Lahore Fort transform the city into a jewel of Indo-Islamic civilization."
 nd_pun_multan_indigo: "Multan Indigo"
 nd_pun_multan_indigo_desc: "The southern Punjab around Multan develops extensive indigo plantations, producing the valuable blue dye for export across the subcontinent and beyond."
 nd_pun_gurmukhi_script: "Gurmukhi Script"
 nd_pun_gurmukhi_script_desc: "Guru Angad, the second Sikh Guru, standardizes the Gurmukhi script for recording Punjabi. This literary innovation ensures that the Sikh scriptures are accessible to common people, not locked in the Sanskrit of the elite."
 nd_pun_gatka_tradition: "Gatka Tradition"
 nd_pun_gatka_tradition_desc: "The Sikh martial art of gatka trains warriors in the use of the sword, shield, staff, and spear. It becomes central to the martial identity of the Khalsa."
 nd_pun_guru_granth_sahib: "Guru Granth Sahib"
 nd_pun_guru_granth_sahib_desc: "The compilation of the Adi Granth — later elevated to Guru Granth Sahib — brings together the hymns of Sikh Gurus, Hindu Bhakti saints, and Muslim Sufis in a scripture of unprecedented inclusivity."
 nd_pun_harmandir_sahib: "Harmandir Sahib"
 nd_pun_harmandir_sahib_desc: "The foundation of the Golden Temple at Amritsar creates the spiritual heart of Sikhism — a temple built lower than its surroundings to teach humility, with doors open on all four sides to welcome all."
 nd_pun_miri_piri: "Miri-Piri Doctrine"
 nd_pun_miri_piri_desc: "Guru Hargobind wears two swords — Miri for temporal authority, Piri for spiritual authority. The doctrine establishes that Sikhs must be prepared to defend their faith by force of arms."
 nd_pun_sikh_dharamsalas: "Sikh Dharamsalas"
 nd_pun_sikh_dharamsalas_desc: "Networks of dharamsalas — rest houses and community centers — spread across Punjab, offering shelter and sustenance to travelers and pilgrims of all faiths."
 nd_pun_akal_takht: "Akal Takht"
 nd_pun_akal_takht_desc: "The Throne of the Timeless One, established at Amritsar by Guru Hargobind, becomes the supreme seat of Sikh temporal authority — the institution from which the Panth issues political and spiritual decrees."
 nd_pun_five_rivers_trade: "Five Rivers Trade"
 nd_pun_five_rivers_trade_desc: "The rivers of Punjab are arteries of commerce. Trade flows along their banks and through the Doab towns, connecting the markets of Central Asia with the wealth of the Gangetic plain."
 nd_pun_khalsa_formation: "Khalsa Formation"
 nd_pun_khalsa_formation_desc: "In 1699, Guru Gobind Singh institutes the Khalsa — the Order of the Pure. Through the ceremony of Khande ki Pahul, Sikhs are baptized as saint-soldiers, bound by a common identity that transcends caste."
 nd_pun_misl_cavalry_tradition: "Misl Cavalry"
 nd_pun_misl_cavalry_tradition_desc: "The twelve Misls of the Sikh Confederacy field fast-moving cavalry that excels at guerrilla warfare, raiding Mughal and Afghan supply lines across the Punjab plains."
 nd_pun_dal_khalsa: "Dal Khalsa"
 nd_pun_dal_khalsa_desc: "The Dal Khalsa unifies the Sikh military assembly. Though the Misls remain independent, they gather under the banner of the combined Khalsa for major campaigns."
 nd_pun_khalsa_coinage: "Khalsa Coinage"
 nd_pun_khalsa_coinage_desc: "The Sikh confederacy mints its own coins — the Nanakshahi rupee — bearing the names of the Gurus rather than any temporal sovereign, asserting Sikh monetary sovereignty."
 nd_pun_rakhi_system: "Rakhi System"
 nd_pun_rakhi_system_desc: "Sikh Misls levy the Rakhi — a protection tax on villages in exchange for defense against raiders and invaders. It becomes the fiscal foundation of Sikh territorial control."
 nd_pun_akali_warriors: "Akali Warriors"
 nd_pun_akali_warriors_desc: "The Akalis — 'Followers of the Timeless One' — are the fearless vanguard of the Khalsa. Heavily armed with traditional weapons, they refuse European training and fight with the ferocity of religious devotion."
 nd_pun_ranjit_singhs_empire: "Ranjit Singh's Empire"
 nd_pun_ranjit_singhs_empire_desc: "Maharaja Ranjit Singh unites the twelve Misls under his personal rule, establishing the Sikh Empire with its capital at Lahore. His reign brings unprecedented stability, religious tolerance, and military power to Punjab."
 nd_pun_fauj_i_khas_advance: "Fauj-i-Khas"
 nd_pun_fauj_i_khas_advance_desc: "The Fauj-i-Khas is the elite model brigade of the Khalsa army — French-trained infantry, British-modeled cavalry, and a troop of artillery under European officers. It is the finest native force on the subcontinent."
 nd_pun_lahore_foundry: "Lahore Foundry"
 nd_pun_lahore_foundry_desc: "Under European supervision, Punjab develops modern artillery foundries at Lahore. The Khalsa cannon crews achieve extraordinary precision, rivaling any artillery in the world."
 nd_pun_shawl_trade: "Amritsar Shawl Trade"
 nd_pun_shawl_trade_desc: "Amritsar becomes the hub of the Kashmiri shawl trade. Over a hundred thousand artisans weave, dye, and embroider fine shawls for export to Europe and the courts of Asia."
 nd_pun_khalsa_modernization: "Khalsa Modernization"
 nd_pun_khalsa_modernization_desc: "The Sikh Empire recruits European officers — veterans of the Napoleonic Wars — to modernize training, logistics, and tactics. Ranjit Singh transforms a feudal cavalry force into a modern combined-arms army."
 nd_pun_golden_temple: "The Golden Temple"
 nd_pun_golden_temple_desc: "Maharaja Ranjit Singh covers the upper floors of the Harmandir Sahib with 750 kilograms of pure gold, transforming the spiritual heart of Sikhism into one of the most magnificent religious structures in the world."
 nd_pun_khalsa_regular_army: "Khalsa Regular Army"
 nd_pun_khalsa_regular_army_desc: "The modern Khalsa army fields well-drilled regulars equipped with European muskets and bayonets, organized into battalions with professional non-commissioned officers."
 nd_pun_punjabi_industry: "Punjabi Industry"
 nd_pun_punjabi_industry_desc: "The workshops and forges of Lahore and Amritsar expand into proto-industrial production, manufacturing arms, textiles, and metalwork."
 nd_pun_sikh_governance: "Sikh Constitutional Governance"
 nd_pun_sikh_governance_desc: "The tradition of the Gurmata — collective decision-making by the Khalsa Panth at the Akal Takht — evolves into a sophisticated system of governance balancing military, religious, and civil authority."
 nd_pun_breadbasket: "Punjab Breadbasket"
 nd_pun_breadbasket_desc: "Punjab's fertile Doab lands and expanded canal irrigation make it the breadbasket of the subcontinent, feeding millions and generating agricultural surplus for export."
 nd_pun_martial_legacy: "Sikh Martial Legacy"
 nd_pun_martial_legacy_desc: "The martial traditions of the Khalsa endure across generations. The Sikh warrior ethos — courage, discipline, and readiness to sacrifice — becomes legendary across the world."
 nd_pun_punjabi_renaissance: "Punjabi Renaissance"
 nd_pun_punjabi_renaissance_desc: "A flowering of Punjabi literature, music, and artistic expression builds on the foundation of the Gurmukhi script and the cultural synthesis fostered by centuries of Sikh, Hindu, and Muslim coexistence."
 a_nd_pun_doab_horsemen: "Doab Horsemen"
 a_nd_pun_doab_horsemen_desc: "Fast-riding cavalrymen from the plains between Punjab's rivers, skilled in raiding and frontier skirmishing."
 a_nd_pun_lahori_garrison: "Lahori Garrison"
 a_nd_pun_lahori_garrison_desc: "Disciplined garrison infantry drawn from the fortified cities of Punjab, trained in the defense of walls and citadels."
 a_nd_pun_nihang: "Nihang Warriors"
 a_nd_pun_nihang_desc: "Fearless Akali shock troops of the Khalsa, heavily armed with traditional weapons and driven by unwavering religious devotion."
 a_nd_pun_misl_cavalry: "Misl Cavalry"
 a_nd_pun_misl_cavalry_desc: "Fast guerrilla horsemen of the Sikh Confederacy, expert at flanking maneuvers and lightning raids."
 a_nd_pun_fauj_i_khas: "Fauj-i-Khas"
 a_nd_pun_fauj_i_khas_desc: "Elite infantry of the Khalsa army, trained by European officers in modern tactics and drilled to the highest standards."
 a_nd_pun_khalsa_artillery: "Khalsa Artillery"
 a_nd_pun_khalsa_artillery_desc: "Modernized cannon crews of the Sikh Empire, trained by French and Italian officers to achieve extraordinary precision."
 a_nd_pun_khalsa_regulars: "Khalsa Regulars"
 a_nd_pun_khalsa_regulars_desc: "Well-drilled modern infantry of the reformed Khalsa army, equipped with European muskets and organized into professional battalions."
 nd_pun_doab_canal: "Doab Canal"
 nd_pun_doab_canal_desc: "An irrigation canal drawing water from Punjab's rivers to nourish the fertile Doab lands between them."
 nd_pun_gurdwara: "Gurdwara"
 nd_pun_gurdwara_desc: "A Sikh temple with a community kitchen that serves free meals to all visitors, embodying the Sikh principles of equality and selfless service."
 nd_pun_lahore_arsenal: "Lahore Arsenal"
 nd_pun_lahore_arsenal_desc: "A military foundry and arsenal producing modern firearms and artillery for the Khalsa army."
 nd_pun_shawl_karkhana: "Shawl Karkhana"
 nd_pun_shawl_karkhana_desc: "A textile workshop where artisans weave, dye, and embroider fine shawls for the luxury export trade."
 nd_pun_dharamsala: "Dharamsala"
 nd_pun_dharamsala_desc: "A Sikh rest house and community center offering shelter and sustenance to travelers and pilgrims of all backgrounds."
 nd_pun_khalsa_training_ground: "Khalsa Training Ground"
 nd_pun_khalsa_training_ground_desc: "A modern military academy where European-trained officers drill the Khalsa army in combined-arms tactics."
 nd_pun_canal_maintenance: "Canal Maintenance"
 nd_pun_canal_maintenance_desc: "The upkeep of irrigation canals requires regular dredging, bank repair, and sluice gate maintenance."
 nd_pun_langar_provisions: "Langar Provisions"
 nd_pun_langar_provisions_desc: "The community kitchen requires a steady supply of grain, rice, and fuel to feed all who come seeking a meal."
 nd_pun_arsenal_production: "Arsenal Production"
 nd_pun_arsenal_production_desc: "The foundry consumes iron, tools, and existing weaponry to forge modern arms and ammunition for the Khalsa army."
 nd_pun_shawl_weaving: "Shawl Weaving"
 nd_pun_shawl_weaving_desc: "Artisans weave quality wool with imported dyes to produce the distinctive fine shawls prized across the world."
 nd_pun_dharamsala_upkeep: "Dharamsala Upkeep"
 nd_pun_dharamsala_upkeep_desc: "Maintaining rest houses requires grain for guests, lumber for repairs, and incense for prayer and ritual."
 nd_pun_training_provisions: "Training Provisions"
 nd_pun_training_provisions_desc: "Military training facilities require firearms for drill, horses for cavalry instruction, and leather for saddlery and equipment."
 nd_pun_persian_wheel: "Persian Wheel Irrigation"
 nd_pun_persian_wheel_desc: "The Persian wheel lifts water from Punjab's rivers to irrigate fields across the Doab, transforming marginal land into productive farmland."
 nd_pun_indigo_cultivation: "Indigo Cultivation"
 nd_pun_indigo_cultivation_desc: "Indigo plants cultivated in southern Punjab are processed into valuable blue dye for the textile trade."
 nd_pun_khalsa_mint: "Khalsa Mint"
 nd_pun_khalsa_mint_desc: "Sikh mints consume silver, copper, and minting tools to produce the Nanakshahi rupee, asserting monetary sovereignty and stabilizing trade across Punjab."
 nd_pun_nihang_training: "Nihang Martial Training"
 nd_pun_nihang_training_desc: "The training of Nihang warriors requires weapons for drill, grain to sustain the warrior-ascetics, and leather for their distinctive armor and shields."
 levy_nd_pun_nihang: "Nihang Levy"
 levy_nd_pun_nihang_desc: "Akali religious warriors raised from the Sikh faithful, fighting with traditional weapons and unwavering devotion."
 levy_nd_pun_doab_horsemen: "Doab Horsemen Levy"
 levy_nd_pun_doab_horsemen_desc: "Light cavalry levied from the peasant and soldier populations of Punjab's river plains."
 nd_pun_rakhi_post: "Rakhi Post"
 nd_pun_rakhi_post_desc: "A Sikh protection station where the Rakhi levy is collected from villages in exchange for defense against raiders and bandits."
 nd_pun_rakhi_collection: "Rakhi Collection"
 nd_pun_rakhi_collection_desc: "Armed Sikh patrols collect protection taxes from surrounding villages, requiring weapons, horses for mounted coverage, and leather for patrol equipment."
 nd_pun_canal_agriculture: "Canal Colony Agriculture"
 nd_pun_canal_agriculture_desc: "Modern canal-fed agriculture transforms Punjab's Doab lands into intensive wheat-producing estates."
 nd_pun_formed_tt: "Punjab has been formed"
 nd_pun_path_a_tt: "Chose Khalsa Raj"
 nd_pun_path_b_tt: "Chose Five Rivers Prosperity"
 nd_pun_destiny: "Punjab's Destiny"
 nd_pun_destiny_desc: "Punjab stands united. The land of the five rivers has chosen its path — now it must be forged through action, conquest, and industry."
 nd_pun_dest_sword_of_the_panth: "Sword of the Panth"
 nd_pun_dest_sword_of_the_panth_desc: "Secure the northern frontier by conquering Kashmir and building an army worthy of the Khalsa. Own Srinagar with at least 30,000 soldiers under arms."
 nd_pun_dest_march_to_kabul: "March to Kabul"
 nd_pun_dest_march_to_kabul_desc: "Carry the Khalsa banner into Afghanistan, conquering the ancient seat of Ghaznavid power. Own Kabul with high development and prestige."
 nd_pun_dest_empire_of_the_khalsa: "Empire of the Khalsa"
 nd_pun_dest_empire_of_the_khalsa_desc: "Build the greatest Sikh Empire the world has ever seen, stretching from Kandahar to Delhi. Own both cities with a massive treasury and army."
 nd_pun_dest_rivers_of_gold: "Rivers of Gold"
 nd_pun_dest_rivers_of_gold_desc: "Transform Punjab's cotton wealth into commercial dominance. Accumulate gold and ensure cotton flows through the capital market."
 nd_pun_dest_crossroads_of_faith: "Crossroads of Faith"
 nd_pun_dest_crossroads_of_faith_desc: "Make Punjab a beacon of learning and tolerance by embracing modern banking institutions and developing the land between the five rivers."
 nd_pun_dest_breadbasket_of_nations: "Breadbasket of Nations"
 nd_pun_dest_breadbasket_of_nations_desc: "Become the commercial heart of the subcontinent. Embrace the printing press, secure the Sindh trade port of Thatta, and amass great wealth."
 nd_pun.5.t: "The Destiny of Punjab"
 nd_pun.5.d: "The five rivers flow eternal, but the state that commands them must prove itself worthy of permanence. Punjab stands at a crossroads — not merely of geography, where the passes of Central Asia meet the plains of Hindustan, but of destiny itself. The choices made now will determine whether this nation becomes a footnote in the chronicles of greater empires, or whether it carves its own name into the stone of history.\n\nThe path has been chosen. Now it must be walked."
 nd_pun.5.a: "Punjab shall endure"
 nd_pun.6.t: "The Sword Unsheathed"
 nd_pun.6.d: "The Vale of Kashmir has fallen to the armies of Punjab. Where once the Mughal governors and Afghan warlords contested this paradise of mountains and lakes, the banner of the Khalsa now flies over Srinagar. The northern frontier is secured — but this is only the beginning.\n\nThe mountains that once sheltered Punjab's enemies are now its rampart. From these heights, the warriors of the Panth look westward toward Kabul and southward toward Delhi. The sword of the Khalsa, once drawn, does not rest until its destiny is fulfilled."
 nd_pun.6.a: "The frontier is ours — now we look beyond it"
 nd_pun.7.t: "The Fall of Kabul"
 nd_pun.7.d: "The ancient city of Kabul — seat of the Ghaznavids who once plundered Punjab, stronghold of the Durrani who terrorized Lahore — has fallen to the Khalsa. The irony is not lost on the veterans of the campaign: the descendants of those who suffered the depredations of Afghan invaders have carried their standard to the very heart of Afghanistan.\n\nThe capture of Kabul transforms Punjab from a regional power into a subcontinental one. But with conquest comes the question of how to govern these new territories. Shall the army press forward with the momentum of victory, or shall discipline and order be imposed on the expanding frontier?"
 nd_pun.7.a: "Press the advantage — the vanguard leads"
 nd_pun.7.b: "Discipline above all — consolidate the frontier"
 nd_pun.8.t: "Empire Without Peer"
 nd_pun.8.d: "From the passes of Kandahar to the walls of Delhi, from the snows of Kashmir to the deserts of Sindh, the Khalsa Empire now stretches across the breadth of the subcontinent's northwest. No power on earth has matched this achievement — an empire forged not from dynastic inheritance but from the collective will of the Panth.\n\nThe Zamzama cannon — 'the Fire-Breathing Dragon' — stands before the gates of Lahore as a symbol of what the Khalsa has wrought. But every empire faces the choice between the sword that conquers and the hand that governs. Shall Punjab project its military power outward, demanding submission from its neighbors? Or shall the empire's intelligence and diplomacy bind its conquests into a lasting dominion?"
 nd_pun.8.a: "The Lion roars — let them tremble"
 nd_pun.8.b: "The thunder of Zamzama compels obedience"
 nd_pun.9.t: "The Rivers Yield Their Wealth"
 nd_pun.9.d: "The great cotton caravans of Punjab have begun to flow — from the fields of the Doab to the markets of the capital, from the spinning wheels of Multan to the trading houses of Lahore. Cotton is white gold, and Punjab sits atop an ocean of it.\n\nThe five rivers that give this land its name are more than waterways for irrigation and navigation. They are arteries of commerce, carrying the raw wealth of the interior to the markets of the world. The merchant who controls the confluence controls the trade of half a continent."
 nd_pun.9.a: "The rivers shall make us rich"
 nd_pun.10.t: "Where All Faiths Meet"
 nd_pun.10.d: "Punjab has become what Guru Nanak envisioned — a land where Hindu and Muslim, Sikh and Christian, merchant and mystic find common ground. The embrace of modern banking has transformed the bazaars of Lahore and Amritsar into centers of international finance. Money, like water, flows where the channels are deepest, and Punjab's channels run deep indeed.\n\nThe question now is how to leverage this prosperity. Shall the wealth of the Doab feed the growth of the land itself, turning Punjab into a garden of abundance? Or shall the community kitchen of the langar feed not just bodies but the integration of all peoples into a single Punjabi identity?"
 nd_pun.10.a: "The Doab shall overflow with abundance"
 nd_pun.10.b: "The langar feeds all who come"
 nd_pun.11.t: "Heart of the Subcontinent"
 nd_pun.11.d: "The merchants of Thatta bow before the trading houses of Punjab. The printing presses of Lahore spread knowledge in a dozen languages. From the salt mines of Khewra to the cotton fields of Multan, from the shawl workshops of Amritsar to the river ports of the five Doabs, Punjab has become the indispensable crossroads of South Asian commerce.\n\nThis is not an empire of the sword but an empire of the ledger book and the grain measure — and it is no less powerful for that. The question that remains is whether Punjab shall project this commercial power outward through diplomacy and trade, or whether it shall perfect its internal economy to become a self-sustaining civilization."
 nd_pun.11.a: "Our merchants shall reach every court"
 nd_pun.11.b: "Our looms and fields feed the world"
 STATIC_MODIFIER_NAME_nd_pun_dest_khalsa_vanguard: "Khalsa Vanguard"
 STATIC_MODIFIER_DESC_nd_pun_dest_khalsa_vanguard: "The Khalsa vanguard drives the advance, reinforcing quickly and plundering the wealth of conquered lands to fuel further campaigns."
 STATIC_MODIFIER_NAME_nd_pun_dest_frontier_discipline: "Frontier Discipline"
 STATIC_MODIFIER_DESC_nd_pun_dest_frontier_discipline: "Iron discipline sustains the Khalsa on the Afghan frontier, reducing war weariness and attracting mercenaries to the banner — though success breeds a measure of complacency."
 STATIC_MODIFIER_NAME_nd_pun_dest_lion_of_punjab: "Lion of Punjab"
 STATIC_MODIFIER_DESC_nd_pun_dest_lion_of_punjab: "The Lion of Punjab dictates terms to defeated foes, annexing territory at reduced cost and declaring wars with the confidence of the unconquered."
 STATIC_MODIFIER_NAME_nd_pun_dest_zamzama_thunder: "Zamzama Thunder"
 STATIC_MODIFIER_DESC_nd_pun_dest_zamzama_thunder: "The thunder of Zamzama echoes across the empire, binding subjects through loyalty and intelligence networks — though the cost of empire strains the treasury."
 STATIC_MODIFIER_NAME_nd_pun_dest_doab_abundance: "Doab Abundance"
 STATIC_MODIFIER_DESC_nd_pun_dest_doab_abundance: "The fertile Doab lands yield such abundance that separatism fades and new diplomatic channels open, drawing neighbors into Punjab's orbit."
 STATIC_MODIFIER_NAME_nd_pun_dest_langar_of_nations: "Langar of Nations"
 STATIC_MODIFIER_DESC_nd_pun_dest_langar_of_nations: "Punjab's legendary hospitality integrates diverse peoples and attracts mercenaries at low cost, though the comfort of prosperity dulls the army's edge on campaign."
 STATIC_MODIFIER_NAME_nd_pun_dest_five_rivers_emporium: "Five Rivers Emporium"
 STATIC_MODIFIER_DESC_nd_pun_dest_five_rivers_emporium: "Punjab's diplomats and livestock merchants reach every court on the subcontinent, though the nation's commitment to tolerance makes religious wars politically costly."
 STATIC_MODIFIER_NAME_nd_pun_dest_cultural_synthesis: "Cultural Synthesis"
 STATIC_MODIFIER_DESC_nd_pun_dest_cultural_synthesis: "The confluence of Sikh, Hindu, and Muslim traditions transforms Punjab's workshops into engines of production, with wool and salt exports sustaining far-reaching supply networks."
 nd_pun_dest_khalsa_durbar: "Khalsa Durbar"
 nd_pun_dest_khalsa_durbar_desc: "The sovereign court of the Khalsa Empire, where military commanders and civil administrators meet under the authority of the Panth to govern the vast Sikh dominion."
 nd_pun_dest_durbar_administration: "Durbar Administration"
 nd_pun_dest_durbar_administration_desc: "The imperial court consumes weaponry for the guard, paper for administrative records, and cloth for the ceremonial trappings of sovereignty."
 nd_pun_dest_doab_mandi: "Doab Mandi"
 nd_pun_dest_doab_mandi_desc: "A grand marketplace at the river crossings where the goods of Central Asia, the Gangetic plain, and the Deccan converge in Punjab's commercial embrace."
 nd_pun_dest_mandi_operations: "Mandi Operations"
 nd_pun_dest_mandi_operations_desc: "The marketplace requires cloth for trade samples, paper for contracts, salt for preservation, and tools for weighing and measuring goods."
