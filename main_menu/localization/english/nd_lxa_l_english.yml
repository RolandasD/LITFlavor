l_english:
 STATIC_MODIFIER_NAME_nd_lxa_million_elephants: "The Million Elephants"
 STATIC_MODIFIER_DESC_nd_lxa_million_elephants: "The war elephants of Lan Xang are more than beasts of burden — they are the living embodiment of royal power, each one a fortress of flesh and ivory that turns the tide of battle. The kingdom that commands a million elephants commands the fear of all who oppose it."
 STATIC_MODIFIER_NAME_nd_lxa_white_parasol: "The White Parasol"
 STATIC_MODIFIER_DESC_nd_lxa_white_parasol: "Under the white parasol of dharma, the kingdom finds its truest strength — not in the clash of arms, but in the wisdom of the sangha, the beauty of the wat, and the harmony of a people united by faith. The parasol shelters all who seek its shade."
 STATIC_MODIFIER_NAME_nd_lxa_defender_of_the_realm: "Defender of the Realm"
 STATIC_MODIFIER_DESC_nd_lxa_defender_of_the_realm: "Like Setthathirath before the Burmese host, the kingdom stands resolute. Every mountain pass becomes a deathtrap, every jungle trail a snare for the invader."
 STATIC_MODIFIER_NAME_nd_lxa_temple_builder: "The Temple Builder"
 STATIC_MODIFIER_DESC_nd_lxa_temple_builder: "In the tradition of Setthathirath, who raised Wat Xieng Thong and Pha That Luang, the kingdom channels its energy into monuments that will outlast any conqueror."
 STATIC_MODIFIER_NAME_nd_lxa_strict_law: "The Strict Law"
 STATIC_MODIFIER_DESC_nd_lxa_strict_law: "Following Sourigna Vongsa's example, the kingdom enforces its laws with unwavering precision. Even the king's own family is not above justice — order flows from consistent authority."
 STATIC_MODIFIER_NAME_nd_lxa_open_borders: "The Open Borders"
 STATIC_MODIFIER_DESC_nd_lxa_open_borders: "The golden age of Sourigna Vongsa proves that prosperity comes from welcoming the world. Dutch merchants, Chinese traders, and artisans from across the region bring their skills and their gold to the court at Vientiane."
 nd_lxa.1.t: "The Land of a Million Elephants"
 nd_lxa.1.d: "The Lao lands are reunited under a single crown. From the misty highlands of Muang Sua to the broad plains of the Khorat Plateau, the ancient principalities have recognized a common sovereign. The Mekong River, which has always been the lifeline of the Lao people, now flows through a single kingdom.\n\nFa Ngum founded this realm with the blessing of Khmer arms and Buddhist dharma, naming it Lan Xang Hom Khao — the Land of a Million Elephants and the White Parasol. The elephants represent the military might that forged the kingdom; the parasol represents the Buddhist faith that gives it meaning.\n\nWhich legacy shall define our restored kingdom?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_lxa.1.a: "Let the earth tremble beneath our elephants!"
 nd_lxa.1.b: "Let the dharma illuminate our path."
 nd_lxa.2.t: "The Resistance of Setthathirath"
 nd_lxa.2.d: "King Bayinnaung of Burma has hurled his vast armies against Lan Xang, but our king has proven equal to the challenge. Setthathirath moved the capital from venerable Luang Prabang to strategic Vientiane, where the broad Mekong provides a natural moat. When the Burmese came, he refused open battle with their superior numbers and instead waged a war of jungle ambush and scorched earth.\n\nIn 1570, after Bayinnaung's retreat, Setthathirath counterattacked — capturing more than 30,000 prisoners and 100 war elephants from the fleeing Burmese columns. But the king is also a builder: Wat Xieng Thong in Luang Prabang and the great Pha That Luang stupa in Vientiane stand as testaments to his dual nature.\n\nShall we honor Setthathirath as warrior or as builder?"
 nd_lxa.2.a: "The jungle is our fortress — let none pass!"
 nd_lxa.2.b: "Our temples shall outlast any army."
 nd_lxa.3.t: "The Golden Age of Sourigna Vongsa"
 nd_lxa.3.d: "For fifty-seven years, King Sourigna Vongsa has ruled Lan Xang with a steady hand. Where his predecessors faced invasion and civil war, Vongsa has achieved something remarkable — lasting peace with both Siam and Vietnam through patient diplomacy and firm borders.\n\nIn 1641, a Dutch trading expedition under Gerrit van Wuysthoff navigated the Mekong from Cambodia to Vientiane, marveling at the wealth they found. Lan Xang exports silk, gold, ivory, deer skins, cardamom, and benzoin resin to markets as distant as China and Japan.\n\nBut Vongsa is also known as a stern lawgiver. When his own son was found guilty of adultery, the king had him executed rather than grant exception. His laws are harsh but they are applied to all equally — noble and peasant alike.\n\nHow shall we build upon this golden age?"
 nd_lxa.3.a: "The law must be iron — no exceptions."
 nd_lxa.3.b: "Open our doors wider to the world."
 nd_lxa.4.t: "The Arrival of the Phra Bang"
 nd_lxa.4.d: "A sacred Buddha image has come to our kingdom — the Phra Bang, said to have been cast in Sri Lanka and carried through the courts of the Khmer before finding its home among the Lao people. Fashioned from an alloy of gold, silver, and bronze, the Phra Bang stands in the gesture of dispelling fear, its palms turned outward in blessing.\n\nKing Visounarath has declared it the palladium of the realm. Where the Phra Bang resides, there is the spiritual heart of Lan Xang. The city of Luang Prabang itself takes its name from this sacred image — Luang meaning 'great' and Prabang for the Buddha it shelters.\n\nMonks and pilgrims have already begun to journey from across the kingdom to pay homage. The Phra Bang is more than a religious artifact — it is a symbol that the dharma has chosen Lan Xang as its home."
 nd_lxa.4.a: "May the Phra Bang bless our kingdom forever."
 nd_lxa_elephant_warfare: "Elephant Warfare"
 nd_lxa_elephant_warfare_desc: "The war elephant tradition that gives Lan Xang its very name — the Land of a Million Elephants."
 nd_lxa_theravada_sangha: "Theravada Sangha"
 nd_lxa_theravada_sangha_desc: "The Buddhist monastic order that forms the spiritual and educational foundation of Lao society."
 nd_lxa_sticky_rice_tradition: "Sticky Rice Tradition"
 nd_lxa_sticky_rice_tradition_desc: "The cultivation of glutinous rice, the staple food that defines Lao cuisine and communal life."
 nd_lxa_fa_ngum_legacy: "Fa Ngum's Legacy"
 nd_lxa_fa_ngum_legacy_desc: "The military traditions established by Fa Ngum during his conquest and unification of the Lao principalities in 1353."
 nd_lxa_khmer_heritage: "Khmer Heritage"
 nd_lxa_khmer_heritage_desc: "The cultural and diplomatic ties to the Khmer court, where Fa Ngum grew up in exile and from which he drew the Buddhist traditions that shaped Lan Xang."
 nd_lxa_silk_weaving: "Silk Weaving Tradition"
 nd_lxa_silk_weaving_desc: "The art of Lao silk weaving, passed down through generations and producing textiles prized across Southeast Asia."
 nd_lxa_mekong_trade: "Mekong River Trade"
 nd_lxa_mekong_trade_desc: "The development of trade networks along the Mekong River, the economic artery of Lan Xang."
 nd_lxa_river_fleet: "River Fleet"
 nd_lxa_river_fleet_desc: "Patrol craft designed for the Mekong and its tributaries, securing trade routes and projecting power along the waterways."
 nd_lxa_forest_trade: "Forest Product Trade"
 nd_lxa_forest_trade_desc: "The export of valuable forest products — benzoin resin, lac, and hardwoods — from the dense forests of the Lao highlands."
 nd_lxa_samsenthai_reforms: "Samsenthai's Reforms"
 nd_lxa_samsenthai_reforms_desc: "The trade and administrative reforms of King Samsenthai, Fa Ngum's son, who transformed Lan Xang from a conquest state into a prosperous trading kingdom."
 nd_lxa_phra_bang: "The Phra Bang Palladium"
 nd_lxa_phra_bang_desc: "The sacred Buddha image that serves as the palladium of the Lao kingdom, a symbol of divine favor and royal legitimacy."
 nd_lxa_elephant_corps_tradition: "Elephant Corps"
 nd_lxa_elephant_corps_tradition_desc: "The formalized elephant warfare corps that made Lan Xang's armies feared throughout mainland Southeast Asia."
 nd_lxa_pha_that_luang: "Pha That Luang"
 nd_lxa_pha_that_luang_desc: "The great golden stupa of Vientiane, the most sacred monument in the Lao kingdom and a beacon of Theravada Buddhism."
 nd_lxa_ivory_craft: "Ivory Craft"
 nd_lxa_ivory_craft_desc: "The tradition of ivory carving, drawing on Lan Xang's vast elephant herds to produce luxury goods for export."
 nd_lxa_vientiane_capital: "Vientiane as Capital"
 nd_lxa_vientiane_capital_desc: "The establishment of Vientiane as the permanent capital of Lan Xang by King Setthathirath, chosen for its strategic position on the Mekong."
 nd_lxa_burmese_resistance: "Resistance Against Burma"
 nd_lxa_burmese_resistance_desc: "The guerrilla tactics and strategic retreats that allowed Lan Xang to survive against the vastly larger Burmese Empire."
 nd_lxa_river_warfare: "River Warfare"
 nd_lxa_river_warfare_desc: "Specialized infantry trained in jungle and river combat, protecting the Mekong trade routes from raiders and invaders."
 nd_lxa_lacquerware: "Lacquerware Industry"
 nd_lxa_lacquerware_desc: "The production of fine lacquerware from forest-harvested lac resin, a valued luxury craft of the Lao artisan tradition."
 nd_lxa_haw_kham: "Haw Kham Palace"
 nd_lxa_haw_kham_desc: "The royal palace tradition of Lan Xang, where the Lao monarchy exercises its authority and receives foreign embassies."
 nd_lxa_photisarath_reforms: "Photisarath's Reforms"
 nd_lxa_photisarath_reforms_desc: "King Photisarath's declaration of Theravada Buddhism as the state religion in 1527, unifying the spiritual life of the kingdom."
 nd_lxa_deer_skin_trade: "Deer Skin Trade"
 nd_lxa_deer_skin_trade_desc: "The export of deer skins, which were in high demand in China and Japan, funneled through Ayutthayan trade posts to reach distant markets."
 nd_lxa_firearms_adoption: "Firearms Adoption"
 nd_lxa_firearms_adoption_desc: "The adoption of matchlock firearms through contact with European and Asian traders during the golden age of Sourigna Vongsa."
 nd_lxa_golden_age: "Golden Age of Lan Xang"
 nd_lxa_golden_age_desc: "The fifty-seven-year reign of Sourigna Vongsa, a period of unprecedented peace, prosperity, and cultural flowering."
 nd_lxa_european_contact: "European Contact"
 nd_lxa_european_contact_desc: "The arrival of Dutch VOC traders in 1641 opened Lan Xang to European commerce and knowledge for the first time."
 nd_lxa_law_code: "Law Code of Sourigna Vongsa"
 nd_lxa_law_code_desc: "The strict but egalitarian legal system established by Sourigna Vongsa, applied without exception to noble and commoner alike."
 nd_lxa_manuscript_tradition: "Manuscript Tradition"
 nd_lxa_manuscript_tradition_desc: "The Buddhist tradition of copying sacred texts onto palm-leaf manuscripts, preserving and spreading Pali learning throughout the kingdom."
 nd_lxa_cultural_resilience: "Lao Cultural Resilience"
 nd_lxa_cultural_resilience_desc: "The persistence of Lao cultural identity through centuries of division and foreign pressure, bound together by shared language, faith, and tradition."
 nd_lxa_mekong_mastery: "Mekong Mastery"
 nd_lxa_mekong_mastery_desc: "The full exploitation of the Mekong River system for transportation, trade, and resource extraction."
 nd_lxa_sangha_unity: "Sangha Unity"
 nd_lxa_sangha_unity_desc: "The Buddhist monastic network that binds the Lao people together across political boundaries, providing education, social cohesion, and spiritual continuity."
 nd_lxa_reunification: "Reunification Aspiration"
 nd_lxa_reunification_desc: "The enduring dream of restoring the borders of Fa Ngum's kingdom, uniting all Lao-speaking peoples under a single crown once more."
 a_nd_lxa_war_elephant: "War Elephant"
 a_nd_lxa_war_elephant_desc: "The war elephants that gave Lan Xang its name. These armored behemoths serve as mobile fortresses on the battlefield, crushing enemy formations with sheer mass while their mahouts hurl javelins from above."
 a_nd_lxa_elephant_corps: "Elephant Corps"
 a_nd_lxa_elephant_corps_desc: "A formalized corps of war elephants trained under the reforms of Setthathirath. Each elephant carries a howdah with trained warriors, functioning as a combined-arms platform of devastating power."
 a_nd_lxa_mekong_guard: "Mekong River Guard"
 a_nd_lxa_mekong_guard_desc: "Infantry trained in the treacherous jungles and river crossings of the Mekong basin. They excel at ambush warfare and can move through terrain that would stop a conventional army."
 a_nd_lxa_matchlock_infantry: "Lao Matchlock Infantry"
 a_nd_lxa_matchlock_infantry_desc: "Infantry equipped with matchlock firearms acquired through European and Asian trade contacts during the golden age of Sourigna Vongsa."
 n_nd_lxa_river_galley: "Lao River Galley"
 n_nd_lxa_river_galley_desc: "Shallow-draft galleys designed for the Mekong River and its tributaries. Fast and maneuverable, they patrol the kingdom's waterways and protect merchant traffic."
 nd_lxa_wat: "Wat"
 nd_lxa_wat_desc: "A Buddhist temple complex that serves as the spiritual and educational center of the community. Monks teach reading and writing, preserve manuscripts, and provide counsel to all who seek it."
 nd_lxa_silk_house: "Silk Weaving House"
 nd_lxa_silk_house_desc: "A workshop dedicated to the ancient Lao art of silk weaving, producing textiles of extraordinary beauty and value using techniques passed down through generations."
 nd_lxa_elephant_kraal: "Elephant Kraal"
 nd_lxa_elephant_kraal_desc: "A royal compound for the capture, training, and holding of war elephants. The kraal is both a military facility and a symbol of royal power."
 nd_lxa_mekong_trading_post: "Mekong Trading Post"
 nd_lxa_mekong_trading_post_desc: "A riverside warehouse and dock where goods from the Lao highlands — silk, ivory, benzoin, and deer skins — are loaded onto boats for transport along the Mekong to distant markets."
 nd_lxa_pha_that: "Pha That Stupa"
 nd_lxa_pha_that_desc: "A grand Buddhist reliquary stupa, built in the tradition of Pha That Luang in Vientiane. Its golden surface draws pilgrims and artisans from across the Buddhist world."
 nd_lxa_royal_palace: "Haw Kham"
 nd_lxa_royal_palace_desc: "The royal palace of the Lao monarchy, from which the king administers justice and receives foreign embassies. Its ornate architecture reflects the wealth and sophistication of the court."
 nd_lxa_rice_paddy: "Rice Paddy"
 nd_lxa_rice_paddy_desc: "Irrigated paddy fields cultivating the glutinous rice that is the foundation of Lao diet and communal life, fed by the monsoon rains and river waters of the Mekong basin."
 nd_lxa_forest_camp: "Forest Gathering Camp"
 nd_lxa_forest_camp_desc: "A highland camp for harvesting benzoin resin, lac, and other valuable forest products from the dense woodlands of the Lao interior."
 nd_lxa_wat_maintenance: "Wat Maintenance"
 nd_lxa_wat_maintenance_desc: "The upkeep of the temple complex, sustained by beeswax candles and incense offerings burning at the altar."
 nd_lxa_silk_maintenance: "Silk Weaving"
 nd_lxa_silk_maintenance_desc: "Raw silk is dyed and woven into fine textiles prized across Southeast Asia."
 nd_lxa_kraal_maintenance: "Kraal Upkeep"
 nd_lxa_kraal_maintenance_desc: "Feed, timber, leather harnesses, and bronze fittings required to maintain the elephant training compound and equip its war beasts."
 nd_lxa_trading_post_maintenance: "Trading Post Upkeep"
 nd_lxa_trading_post_maintenance_desc: "Timber for dock repair and pottery for storage vessels."
 nd_lxa_stupa_maintenance: "Stupa Maintenance"
 nd_lxa_stupa_maintenance_desc: "Silver leaf for gilding and beeswax for ceremonial offerings."
 nd_lxa_palace_maintenance: "Palace Upkeep"
 nd_lxa_palace_maintenance_desc: "Timber, silver, and fine textiles sustain the royal palace, furnishing its halls and maintaining the splendor expected of the Lao monarchy."
 nd_lxa_benzoin_processing: "Benzoin Processing"
 nd_lxa_benzoin_processing_desc: "Workers harvest benzoin resin from highland styrax trees and process it with beeswax into finished incense, prized across Asian trade networks from India to China."
 nd_lxa_ivory_carving: "Ivory Carving"
 nd_lxa_ivory_carving_desc: "Skilled carvers work elephant tusks into luxury goods, religious objects, and diplomatic gifts using fine hand tools."
 nd_lxa_lac_production: "Lac Production"
 nd_lxa_lac_production_desc: "Forest-harvested lac resin is processed with wood substrates into fine lacquerware for the kingdom's artisan trade."
 nd_lxa_sticky_rice: "Sticky Rice Cultivation"
 nd_lxa_sticky_rice_desc: "Irrigated paddy fields cultivate glutinous rice using animal labor and traditional Lao farming techniques, yielding the staple grain that defines Lao communal life."
 nd_lxa_manuscript_copying: "Manuscript Copying"
 nd_lxa_manuscript_copying_desc: "The monastic tradition of copying Pali scriptures onto palm-leaf manuscripts, spreading Buddhist learning across the kingdom."
 nd_lxa_formed_tt: "Lan Xang has been formed"
 nd_lxa_path_a_tt: "Chose The Million Elephants"
 nd_lxa_path_b_tt: "Chose The White Parasol"
 nd_lxa_destiny: "Destiny of Lan Xang"
 nd_lxa_destiny_desc: "The kingdom stands restored. Now its destiny must be forged — through the thunder of elephants or the light of dharma."
 nd_lxa_dest_khorat: "Khorat Subjugation"
 nd_lxa_dest_khorat_desc: "Extend the kingdom's dominion over the Shan highlands. The muang of Kengtung must acknowledge Lan Xang's supremacy — by diplomacy or by force."
 nd_lxa_dest_mekong_hegemony: "Mekong Hegemony"
 nd_lxa_dest_mekong_hegemony_desc: "The great Khmer temples of Angkor and the Mekong crossroads at Stung Treng must fall under our control. The river belongs to Lan Xang from source to sea."
 nd_lxa_dest_white_elephants: "Lord of the White Elephants"
 nd_lxa_dest_white_elephants_desc: "Only a king who commands both Pegu and Ayutthaya can claim dominion over all of mainland Southeast Asia. Let the white elephants bow to our throne."
 nd_lxa_dest_sangha_heart: "Heart of the Sangha"
 nd_lxa_dest_sangha_heart_desc: "Let our kingdom become the beating heart of Theravada learning. With sound finances and the ivory trade flowing through our markets, we can build monasteries that will draw scholars from across the Buddhist world."
 nd_lxa_dest_silk_road: "The Mekong Silk Road"
 nd_lxa_dest_silk_road_desc: "Silk, ivory, benzoin, deer skins — the products of our forests and looms must reach every market in Asia. Let Vientiane become the crossroads of the Mekong trade."
 nd_lxa_dest_light_theravada: "Light of Theravada"
 nd_lxa_dest_light_theravada_desc: "The dharma shall radiate from our kingdom as light from a golden stupa. With learning, prosperity, and faith, Lan Xang becomes the spiritual center of all Buddhist peoples."
 nd_lxa.5.t: "The Restored Kingdom"
 nd_lxa.5.d: "The ancient borders of Lan Xang are once more united under a single crown. From the highlands where the Mekong springs to the broad Khorat Plateau, the Land of a Million Elephants stands whole again.\n\nBut restoration is only the beginning. The great powers of Southeast Asia — Burma, Siam, Vietnam, and the Khmer — encircle our realm. Lan Xang has always lived in the shadow of greater neighbors, surviving through cunning, terrain, and the fearsome reputation of our war elephants.\n\nThe question now is whether we shall remain in that shadow, or step beyond it."
 nd_lxa.5.a: "Our destiny awaits."
 nd_lxa.6.t: "The Shan Highlands Subdued"
 nd_lxa.6.d: "The mountain fortress of Kengtung has submitted to the authority of Lan Xang. The Shan muang, long accustomed to playing the great powers against one another, have recognized that the Land of a Million Elephants is no longer content to remain within its traditional borders.\n\nOur elephant corps moved through the highland passes with practiced ease — terrain that would have broken a lowland army was merely another day's march for our mahouts. The Shan saw the column approaching and knew that resistance meant destruction."
 nd_lxa.6.a: "The highlands are ours."
 nd_lxa.7.t: "Masters of the Mekong"
 nd_lxa.7.d: "The ancient temple complex of Angkor Wat — that wonder of the Khmer world — now flies the banner of Lan Xang. Our armies have swept down the Mekong, taking Stung Treng and establishing control over the great river's entire navigable length.\n\nThe Khmer, who once sheltered the exiled Fa Ngum and gave him armies to conquer these very lands, now find their positions reversed. The student has surpassed the teacher.\n\nThis hegemony can be consolidated through military dominance of the river, or through a tributary system that binds conquered peoples to our court."
 nd_lxa.7.a: "Our river galleys shall patrol every reach."
 nd_lxa.7.b: "Let the vanquished pay tribute and keep their customs."
 nd_lxa.8.t: "Lord of the White Elephants"
 nd_lxa.8.d: "Pegu and Ayutthaya — the capitals of Burma and Siam — kneel before the throne of Lan Xang. No Lao king has ever achieved what we have accomplished: dominion over the entire mainland of Southeast Asia, from the Irrawaddy to the Mekong delta.\n\nThe white elephants, rarest of all, have been gathered from every corner of the realm as symbols of universal sovereignty. In the court traditions of Southeast Asia, possession of white elephants is the ultimate mark of a righteous king whose merit shines across the world.\n\nHow shall we rule this vast domain?"
 nd_lxa.8.a: "As elephant lords — our war beasts enforce our will."
 nd_lxa.8.b: "As universal monarchs — our empire endures."
 nd_lxa.9.t: "The Sangha Flourishes"
 nd_lxa.9.d: "The monasteries of Lan Xang have become renowned throughout the Theravada world. Monks travel from as far as Ceylon and Burma to study at our wats, drawn by the quality of our Pali scholarship and the generous patronage of the crown.\n\nThe elephant trade — that most iconic commerce of our kingdom — fills the royal treasury, funding the construction of new temples and the copying of sacred manuscripts. Banking institutions have taken root, allowing us to finance grand works of merit."
 nd_lxa.9.a: "The dharma grows stronger every day."
 nd_lxa.10.t: "The Mekong Silk Road"
 nd_lxa.10.d: "Vientiane has become the great crossroads of the Mekong basin. Silk from our looms, ivory from our forests, and benzoin incense from our highlands flow downriver to meet Chinese porcelain, Indian cloth, and European curiosities flowing upriver.\n\nThe Dutch merchant van Wuysthoff, upon visiting our capital, reported to his superiors that the wealth of Lan Xang rivaled any kingdom in the East. Our markets teem with goods from every corner of Asia.\n\nShall we press our advantage through mercantile expansion or through developing our domestic craft traditions?"
 nd_lxa.10.a: "Let our merchants range far along the Mekong."
 nd_lxa.10.b: "Let our artisans perfect their crafts at home."
 nd_lxa.11.t: "Light of Theravada"
 nd_lxa.11.d: "The great monasteries of Lan Xang have become the foremost centers of Theravada learning in all of Asia. Our palm-leaf manuscripts, copied with meticulous care by generations of monks, preserve the Pali canon in its purest form. Scholars from every Buddhist kingdom send their brightest pupils to study at our viharas.\n\nThe printing press has arrived in our kingdom, and its first products are not secular texts but the sacred scriptures themselves — now multiplied a thousandfold and sent as gifts to monasteries across the Buddhist world.\n\nLan Xang has become what Fa Ngum dreamed: not merely a kingdom, but a beacon of the dharma. The white parasol shelters all."
 nd_lxa.11.a: "The dharma protects those who protect it."
 nd_lxa.11.b: "Our stupas shall inspire the faithful forever."
 STATIC_MODIFIER_NAME_nd_lxa_dest_mekong_dominance: "Mekong Dominance"
 STATIC_MODIFIER_DESC_nd_lxa_dest_mekong_dominance: "The Mekong is ours from source to sea, and our river galleys enforce our will upon every vessel that plies its waters."
 STATIC_MODIFIER_NAME_nd_lxa_dest_vassal_tribute: "Vassal Tribute"
 STATIC_MODIFIER_DESC_nd_lxa_dest_vassal_tribute: "The conquered peoples pay tribute and serve in our levies, bound to Lan Xang by oath and obligation rather than direct occupation."
 STATIC_MODIFIER_NAME_nd_lxa_dest_elephant_emperor: "Elephant Emperor"
 STATIC_MODIFIER_DESC_nd_lxa_dest_elephant_emperor: "The war elephants of Lan Xang are the finest in all of Asia — bred in royal compounds, armored in bronze, and commanded by the most skilled mahouts in the world."
 STATIC_MODIFIER_NAME_nd_lxa_dest_mekong_imperium: "Mekong Imperium"
 STATIC_MODIFIER_DESC_nd_lxa_dest_mekong_imperium: "A vast empire stretching across mainland Southeast Asia, held together by the Mekong River and the prestige of the Lao crown."
 STATIC_MODIFIER_NAME_nd_lxa_dest_river_merchants: "River Merchants"
 STATIC_MODIFIER_DESC_nd_lxa_dest_river_merchants: "The merchants of Vientiane range up and down the Mekong, their boats laden with silk and ivory, connecting the highland forests to the sea."
 STATIC_MODIFIER_NAME_nd_lxa_dest_craft_guilds: "Craft Guilds"
 STATIC_MODIFIER_DESC_nd_lxa_dest_craft_guilds: "The artisan guilds of Lan Xang have organized into powerful bodies, their silk weavers, lacquer workers, and ivory carvers producing goods that rival any in Asia."
 STATIC_MODIFIER_NAME_nd_lxa_dest_dharma_shield: "Shield of Dharma"
 STATIC_MODIFIER_DESC_nd_lxa_dest_dharma_shield: "The sangha protects the kingdom as surely as any army. Our monks carry the dharma to every corner of the realm, binding the people together in faith."
 STATIC_MODIFIER_NAME_nd_lxa_dest_golden_stupa: "The Golden Stupa"
 STATIC_MODIFIER_DESC_nd_lxa_dest_golden_stupa: "Our stupas, clad in gold leaf and rising above the jungle canopy, draw pilgrims and merchants from across the Buddhist world, filling our kingdom with devotion and prosperity."
 nd_lxa_royal_elephant_compound: "Royal Elephant Compound"
 nd_lxa_royal_elephant_compound_desc: "A grand royal complex for the breeding, training, and armoring of war elephants on an industrial scale, producing the finest battle elephants in all of Southeast Asia."
 nd_lxa_great_vihara: "Great Vihara"
 nd_lxa_great_vihara_desc: "A magnificent Buddhist learning hall and monastery complex, the foremost center of Pali scholarship in the Theravada world, drawing monks and pilgrims from across Asia."
 nd_lxa_elephant_compound_maintenance: "Elephant Compound Upkeep"
 nd_lxa_elephant_compound_maintenance_desc: "Livestock feed, timber enclosures, and bronze armor fittings sustain the royal elephant breeding program."
 nd_lxa_vihara_maintenance: "Vihara Upkeep"
 nd_lxa_vihara_maintenance_desc: "Beeswax candles, paper for manuscripts, and incense for meditation sustain the great monastery's scholarly and spiritual activities."
