l_english:
 STATIC_MODIFIER_NAME_nd_rmn_antemurale_christianitatis: "Antemurale Christianitatis"
 STATIC_MODIFIER_DESC_nd_rmn_antemurale_christianitatis: "Romania stands as the bulwark of Christendom against the Ottoman tide, a fortress-nation whose mountains and rivers form a natural shield for all of Europe."
 STATIC_MODIFIER_NAME_nd_rmn_danubian_prosperity: "Danubian Prosperity"
 STATIC_MODIFIER_DESC_nd_rmn_danubian_prosperity: "Seated at the crossroads of three empires, Romania harnesses the wealth of the Danube — its grain, its livestock, its salt — to build a prosperous and cultured kingdom."
 STATIC_MODIFIER_NAME_nd_rmn_painted_monasteries_legacy: "Legacy of the Painted Monasteries"
 STATIC_MODIFIER_DESC_nd_rmn_painted_monasteries_legacy: "The painted monasteries of Moldavia stand as monuments to Orthodox devotion and artistic genius, inspiring cultural pride across the united principalities."
 STATIC_MODIFIER_NAME_nd_rmn_press_the_advantage: "Press the Advantage"
 STATIC_MODIFIER_DESC_nd_rmn_press_the_advantage: "In the spirit of Michael the Brave, Romania's armies push forward to claim what belongs to the Romanian people by right of blood and sword."
 STATIC_MODIFIER_NAME_nd_rmn_consolidate_the_realm: "Consolidate the Realm"
 STATIC_MODIFIER_DESC_nd_rmn_consolidate_the_realm: "Rather than overextend as Michael once did, Romania secures its hold over the three principalities, binding them through law and common purpose."
 nd_rmn.1.t: "The Romanian Kingdom"
 nd_rmn.1.d: "The three lands of the Romanians — Wallachia, Moldavia, and Transylvania — are united under a single crown at last. For centuries, the Romanian people endured as subjects divided between Ottoman vassalage, Habsburg domination, and precarious independence. Now, from Bucharest, the new kingdom looks upon its Carpathian heartland and the fertile Danubian plain with the question that has defined every Romanian ruler since Basarab: shall we be the shield that holds the line, or the crossroads that grows rich from all who pass?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_rmn.1.a: "We are the bulwark — Christendom's last fortress."
 nd_rmn.1.b: "We are the crossroads — the Danube's richest realm."
 nd_rmn.2.t: "The Painted Monasteries"
 nd_rmn.2.d: "In the hills of Moldavia, the monasteries built by Stephen the Great and his successors have been transformed into something unprecedented. Their exterior walls blaze with frescoes depicting saints, biblical scenes, and the siege of Constantinople — entire theological libraries painted for an illiterate congregation to read. At Voronet, the particular shade of blue used by the painters has become famous across the Orthodox world, a color that defies reproduction. At Humor, Moldovita, and Sucevita, the same tradition continues. These are not merely churches but declarations of faith in pigment and plaster, built to endure against weather and conquest alike. Pope Sixtus IV once named Stephen 'Athleta Christi' — and these monasteries are his enduring testament."
 nd_rmn.2.a: "A legacy in paint and stone."
 nd_rmn.3.t: "The First Unification"
 nd_rmn.3.d: "In 1600, Michael the Brave accomplished what no Romanian ruler had done before — he united Wallachia, Transylvania, and Moldavia under a single crown. After routing the Ottomans at Calugareni with barely 16,000 men against Sinan Pasha's force, he turned north. At Selimbar, he defeated the Transylvanian prince Andreas Bathory. By May 1600, his armies had taken Moldavia as well. For one brief, shining moment, the three Romanian lands were one. But the Habsburgs and Poles would not tolerate such unity — within a year, Michael was betrayed and assassinated at Campia Turzii. The union dissolved as quickly as it had been forged. Now, centuries later, the dream lives again. The question is what to do with it."
 nd_rmn.3.a: "Press forward — finish what Michael began."
 nd_rmn.3.b: "Consolidate — make this union endure."
 nd_rmn.4.t: "The War of Independence"
 nd_rmn.4.d: "At Plevna, Grivitsa, and Rahova, Romanian soldiers have proven that this nation can stand among the powers of Europe. The Dorobanti — peasant soldiers drawn from every village of the kingdom — held the line against Ottoman regulars and earned Romania's independence with blood and courage. The great powers that once treated the Danubian Principalities as pawns must now reckon with a sovereign kingdom. On May 9, 1877, the Romanian parliament declared full independence, and the army crossed the Danube to make that declaration real. The Kingdom of Romania stands recognized by the Treaty of Berlin — no longer a vassal, no longer a pawn, but a nation in its own right."
 nd_rmn.4.a: "Romania is free."
 nd_rmn_voivodal_tradition: "Voivodal Tradition"
 nd_rmn_voivodal_tradition_desc: "The system of the voivode — war-chief and prince — anchors Romanian governance in both martial authority and landholding custom."
 nd_rmn_battle_of_posada: "Legacy of Posada"
 nd_rmn_battle_of_posada_desc: "At the Battle of Posada in 1330, Basarab I ambushed and destroyed a vastly superior Hungarian army in a mountain pass, establishing Wallachian independence through cavalry skill and knowledge of the terrain."
 nd_rmn_salt_wealth: "Carpathian Salt Wealth"
 nd_rmn_salt_wealth_desc: "The vast salt deposits of the Carpathians have been worked since antiquity, providing the Romanian principalities with a reliable source of wealth and a crucial trade commodity."
 nd_rmn_mountain_fortresses: "Mountain Fortresses"
 nd_rmn_mountain_fortresses_desc: "From Poenari to Bran, fortresses guarding the Carpathian passes form the backbone of Romanian defense against invaders from every direction."
 nd_rmn_orthodox_foundation: "Orthodox Foundation"
 nd_rmn_orthodox_foundation_desc: "The establishment of Orthodox metropolitan sees in Wallachia and Moldavia gave the principalities spiritual independence to match their political autonomy."
 nd_rmn_boyar_estates: "Boyar Estates"
 nd_rmn_boyar_estates_desc: "The boyar landowning class formed the backbone of Romanian governance, administering justice and collecting revenues across the principalities."
 nd_rmn_fortified_churches: "Fortified Churches"
 nd_rmn_fortified_churches_desc: "Over 150 fortified churches in Transylvania served as both places of worship and community refuges against Tatar, Ottoman, and other raiders."
 nd_rmn_danubian_trade: "Danubian Trade"
 nd_rmn_danubian_trade_desc: "The Danube and its tributaries carried Romanian grain, salt, livestock, and hides to markets across central Europe and the Black Sea."
 nd_rmn_order_of_the_dragon: "Order of the Dragon"
 nd_rmn_order_of_the_dragon_desc: "Vlad Tepes employed terror as a weapon of state — impalement, scorched earth, and the night attack at Targoviste demonstrated that an outnumbered defender could break the will of a larger invader."
 nd_rmn_athleta_christi: "Athleta Christi"
 nd_rmn_athleta_christi_desc: "Stephen the Great of Moldavia won 46 of his 48 battles, earning the title 'Champion of Christ' from Pope Sixtus IV for his defense of Christendom at the Battle of Vaslui."
 nd_rmn_painted_monasteries: "Painted Monasteries"
 nd_rmn_painted_monasteries_desc: "After each victory, Stephen the Great founded a monastery. His successors covered their walls with breathtaking frescoes, creating the Painted Monasteries of Bukovina."
 nd_rmn_princely_authority: "Princely Authority"
 nd_rmn_princely_authority_desc: "The consolidation of voivodal power over the boyar council strengthened central governance across the Romanian principalities."
 nd_rmn_pastoral_wealth: "Pastoral Wealth"
 nd_rmn_pastoral_wealth_desc: "Romanian wool, hides, and livestock were exported in vast quantities to Transylvania, Poland, and the Ottoman Empire, forming the economic backbone of the principalities."
 nd_rmn_lefegii_tradition: "Lefegii Tradition"
 nd_rmn_lefegii_tradition_desc: "Professional mercenary infantry — the Lefegii — supplemented the feudal levies of the principalities, providing experienced border troops skilled in mountain warfare."
 nd_rmn_calarasi_tradition: "Calarasi Tradition"
 nd_rmn_calarasi_tradition_desc: "The Calarasi were Wallachian frontier cavalry, mounted scouts and patrol riders who guarded the borders and carried dispatches across the vast Danubian plain."
 nd_rmn_scorched_earth: "Scorched Earth Doctrine"
 nd_rmn_scorched_earth_desc: "Romanian defenders systematically denied resources to invaders — poisoning wells, diverting rivers, and retreating into the mountains to wear down superior forces through attrition."
 nd_rmn_curtea_de_arges: "Curtea de Arges"
 nd_rmn_curtea_de_arges_desc: "The monastery at Curtea de Arges, built by Neagoe Basarab in 1517, represents the pinnacle of Romanian ecclesiastical architecture and scholarly patronage."
 nd_rmn_grain_trade: "Danubian Grain Trade"
 nd_rmn_grain_trade_desc: "The fertile Danubian plain and Wallachian lowlands produced wheat surpluses and livestock hides that fed and clothed markets from Constantinople to central Europe."
 nd_rmn_chancellery_reform: "Chancellery Reform"
 nd_rmn_chancellery_reform_desc: "The modernization of princely chancelleries introduced systematic record-keeping and administrative procedures modeled on Byzantine and Polish practices."
 nd_rmn_first_unification: "First Unification"
 nd_rmn_first_unification_desc: "In 1600, Michael the Brave briefly united Wallachia, Transylvania, and Moldavia — the first time all three Romanian lands were ruled by one prince."
 nd_rmn_confessional_resilience: "Confessional Resilience"
 nd_rmn_confessional_resilience_desc: "While Transylvania became a battleground of Reformation and Counter-Reformation, Romanian Orthodoxy persisted as a unifying cultural force across all three principalities."
 nd_rmn_host_reform: "Reform of the Host"
 nd_rmn_host_reform_desc: "The transformation of the Oastea from a feudal levy into a more professional force, with paid soldiers and standardized equipment replacing the old boyar retinues."
 nd_rmn_seimeni_guards: "Seimeni Guards"
 nd_rmn_seimeni_guards_desc: "The Seimeni were professional guards recruited by Moldavian and Wallachian princes — standing infantry paid in cash and land, forming a reliable core around which the feudal host was organized."
 nd_rmn_transylvanian_mines: "Transylvanian Mines"
 nd_rmn_transylvanian_mines_desc: "The silver and copper mines of Transylvania, particularly around Baia Mare and Rosia Montana, provided mineral wealth that attracted Saxon settlers and fueled regional trade."
 nd_rmn_pravila: "The Pravila"
 nd_rmn_pravila_desc: "The codification of customary law in written legal codes — the Pravilele — brought consistency to governance across the principalities, replacing oral tradition with written statute."
 nd_rmn_cultural_awakening: "Cultural Awakening"
 nd_rmn_cultural_awakening_desc: "The emergence of Romanian-language literature, chronicles, and religious texts fostered a shared identity among Romanians across the three principalities."
 nd_rmn_phanariote_reform: "Phanariote Reform"
 nd_rmn_phanariote_reform_desc: "Though the Phanariote era brought Greek-speaking governors from Constantinople, it also introduced administrative reforms, legal codification, and connections to Enlightenment ideas."
 nd_rmn_rosiori_tradition: "Rosiori Tradition"
 nd_rmn_rosiori_tradition_desc: "The Rosiori — 'Red Ones' — were Romania's light cavalry elite, distinguished by their red uniforms and skill in reconnaissance, raiding, and pursuit."
 nd_rmn_vanatori_tradition: "Vanatori de Munte"
 nd_rmn_vanatori_tradition_desc: "The Vanatori — Romanian mountain hunters — were light infantry specialists trained in the Carpathian highlands, expert at ambush, alpine warfare, and independent operations in rough terrain."
 nd_rmn_organic_statute: "Organic Statute"
 nd_rmn_organic_statute_desc: "The Regulamentul Organic of 1831-32 established a modern constitutional framework for the Danubian Principalities, reforming taxation, justice, and public administration."
 nd_rmn_breadbasket: "Breadbasket of the East"
 nd_rmn_breadbasket_desc: "Romania's vast wheat production made it the granary of southeastern Europe, with grain exports flowing through Braila and Galati to markets across the Mediterranean."
 nd_rmn_border_modernization: "Border Modernization"
 nd_rmn_border_modernization_desc: "The modernization of Romania's border defenses replaced medieval fortresses with modern fortifications adapted to artillery warfare."
 nd_rmn_war_of_independence: "War of Independence"
 nd_rmn_war_of_independence_desc: "At Plevna, Grivitsa, and Rahova in 1877-78, Romanian soldiers fought alongside Russian forces to win full independence from Ottoman suzerainty."
 nd_rmn_national_awakening: "National Awakening"
 nd_rmn_national_awakening_desc: "The Transylvanian School and subsequent intellectual movements standardized the Romanian language, revived Latin-alphabet writing, and forged a modern national consciousness."
 nd_rmn_cuza_reforms: "Cuza's Reforms"
 nd_rmn_cuza_reforms_desc: "Alexandru Ioan Cuza's sweeping reforms — land redistribution, secularization of monasteries, universal education — transformed Romania from a feudal society into a modern state."
 nd_rmn_oil_industry: "Oil Industry"
 nd_rmn_oil_industry_desc: "Romania was among the world's first oil producers, with refineries at Ploiesti operational from the 1850s. By 1900, Romania was Europe's largest petroleum exporter."
 nd_rmn_paris_of_east: "Paris of the East"
 nd_rmn_paris_of_east_desc: "Bucharest's transformation into a cosmopolitan capital — with French-inspired boulevards, neo-classical architecture, and thriving intellectual salons — earned it the epithet 'Micul Paris.'"
 nd_rmn_modern_army: "Modern Romanian Army"
 nd_rmn_modern_army_desc: "The reorganization of the Romanian army along Prussian lines, with modern equipment, officer academies, and conscription, created a capable national force."
 a_nd_rmn_viteji: "Viteji"
 a_nd_rmn_viteji_desc: "Elite courtier-cavalry of the Romanian principalities. The Viteji were minor nobles with permanent military obligations — fast, skilled horsemen who excelled at raiding and ambush in the Carpathian passes."
 a_nd_rmn_viteji_levy: "Viteji"
 a_nd_rmn_viteji_levy_desc: "Noble cavalry levied from the boyar estates of the principalities."
 a_nd_rmn_lefegii: "Lefegii"
 a_nd_rmn_lefegii_desc: "Professional mercenary infantry of the Romanian principalities. Experienced border troops skilled in mountain warfare, fortification defense, and skirmishing in difficult terrain."
 a_nd_rmn_calarasi: "Calarasi"
 a_nd_rmn_calarasi_desc: "Wallachian frontier cavalry — mounted scouts and patrol riders who guarded the borders of the principalities, carrying dispatches and raiding enemy supply lines."
 a_nd_rmn_seimeni: "Seimeni"
 a_nd_rmn_seimeni_desc: "Professional standing infantry of the Romanian principalities. Paid in cash and land grants, the Seimeni formed a disciplined core of guards loyal to the voivode rather than to the boyar council."
 a_nd_rmn_rosiori: "Rosiori"
 a_nd_rmn_rosiori_desc: "Romania's elite light cavalry, the Rosiori — 'Red Ones' — served as reconnaissance, raiders, and pursuit troops. Distinguished by their red uniforms and superb horsemanship."
 a_nd_rmn_vanatori: "Vanatori de Munte"
 a_nd_rmn_vanatori_desc: "Romanian mountain hunters — light infantry specialists trained in alpine warfare, expert at ambush and independent operations in the Carpathian highlands."
 a_nd_rmn_dorobanti: "Dorobanti"
 a_nd_rmn_dorobanti_desc: "The backbone of the modern Romanian army. Dorobanti were territorial infantry drawn from peasant communities across the kingdom, who proved their worth at Plevna and Grivitsa during the War of Independence."
 a_nd_rmn_dorobanti_levy: "Dorobanti"
 a_nd_rmn_dorobanti_levy_desc: "Territorial infantry levied from Romanian peasant communities."
 a_nd_rmn_panduri: "Panduri"
 a_nd_rmn_panduri_desc: "Balkan irregular guerrilla fighters from the mountains of Oltenia. The Panduri specialized in ambush, raids, and scorched-earth tactics against Ottoman invaders."
 nd_rmn_curtea_domneasca: "Curtea Domneasca"
 nd_rmn_curtea_domneasca_desc: "The Princely Court — seat of voivodal authority where boyars gather to advise the prince, administer justice, and coordinate the governance of the realm."
 nd_rmn_fortificatie: "Mountain Fortress"
 nd_rmn_fortificatie_desc: "A Carpathian mountain fortress guarding the passes between the principalities, forming the backbone of Romanian defense against Ottoman, Hungarian, and Tatar invaders."
 nd_rmn_biserica_fortificata: "Fortified Church"
 nd_rmn_biserica_fortificata_desc: "A uniquely Transylvanian institution — churches built with defensive walls, towers, and granaries to shelter entire communities during raids."
 nd_rmn_ocna_de_sare: "Salt Works"
 nd_rmn_ocna_de_sare_desc: "Romanian salt mines at Praid, Turda, and Slanic have been worked since antiquity. Salt was so valuable that it served as currency and funded princely treasuries for centuries."
 nd_rmn_han_comercial: "Han Comercial"
 nd_rmn_han_comercial_desc: "A Danubian trading inn where merchants, drovers, and river traders rest and exchange goods — the commercial nodes of Romanian trade networks."
 nd_rmn_vie_domneasca: "Vie Domneasca"
 nd_rmn_vie_domneasca_desc: "A princely vineyard and winery. Romanian viticulture stretches back to Dacian times, with the Dealu Mare and Cotnari regions producing wines prized across southeastern Europe."
 nd_rmn_scoala: "Romanian School"
 nd_rmn_scoala_desc: "An institution of Romanian-language education, established during the national awakening to teach in the mother tongue and forge a literate, nationally conscious citizenry."
 nd_rmn_stana: "Stana"
 nd_rmn_stana_desc: "A highland sheepfold and pastoral station. Romanian shepherds have driven their flocks across the Carpathian passes since time immemorial, producing wool, cheese, and hides for trade."
 nd_rmn_tabara_militara: "Military Camp"
 nd_rmn_tabara_militara_desc: "A professional garrison and training facility for the reformed Romanian army, replacing the ad hoc feudal musters of the medieval Host."
 nd_rmn_rafinarie: "Oil Refinery"
 nd_rmn_rafinarie_desc: "An early petroleum refinery processing Romania's abundant crude oil. The Ploiesti refineries were among the first in the world, making Romania a pioneer of the petroleum age."
 nd_rmn_tabacarie: "Leather Tannery"
 nd_rmn_tabacarie_desc: "A tanning workshop processing the hides of the vast Romanian livestock herds into leather goods for domestic use and Danubian export."
 nd_rmn_court_maintenance: "Court Maintenance"
 nd_rmn_court_maintenance_desc: "Upkeep of the princely court — cloth and fine cloth for liveries, beeswax for lighting, and paper for chancellery correspondence."
 nd_rmn_fortress_upkeep: "Fortress Garrison"
 nd_rmn_fortress_upkeep_desc: "Maintenance of the garrison and defenses — stone for repairs, weaponry for the soldiers, tools for upkeep, and timber for palisades and structures."
 nd_rmn_church_upkeep: "Church Upkeep"
 nd_rmn_church_upkeep_desc: "Maintenance of the fortified church — beeswax candles for worship, stone for repairs, cloth for vestments, and timber for the community granary."
 nd_rmn_salt_extraction: "Salt Extraction"
 nd_rmn_salt_extraction_desc: "Mining and processing of rock salt from the Carpathian deposits."
 nd_rmn_han_operations: "Han Operations"
 nd_rmn_han_operations_desc: "Provisioning the trading inn — wheat and livestock for the kitchens, salt for preservation, and paper for trade records and merchant correspondence."
 nd_rmn_wine_production: "Wine Production"
 nd_rmn_wine_production_desc: "Cultivation and pressing of grapes in the princely vineyards."
 nd_rmn_school_operations: "School Operations"
 nd_rmn_school_operations_desc: "Supplies for the school — paper and books for instruction, beeswax candles for evening study, and cloth for desks and classroom furnishings."
 nd_rmn_pastoral_operations: "Pastoral Operations"
 nd_rmn_pastoral_operations_desc: "Highland shepherding and wool processing."
 nd_rmn_camp_maintenance: "Camp Maintenance"
 nd_rmn_camp_maintenance_desc: "Provisioning the military camp — weaponry and leather for soldiers' arms and equipment, wheat for rations, and cloth for uniforms and tents."
 nd_rmn_oil_refining: "Oil Refining"
 nd_rmn_oil_refining_desc: "Processing of crude petroleum into refined products."
 nd_rmn_tanning: "Leather Tanning"
 nd_rmn_tanning_desc: "Processing hides into leather goods for trade."
 levy_nd_rmn_viteji: "Viteji Cavalry"
 levy_nd_rmn_viteji_desc: "Noble cavalry levied from the boyar estates."
 levy_nd_rmn_panduri: "Panduri Irregulars"
 levy_nd_rmn_panduri_desc: "Mountain guerrilla fighters levied from Oltenian peasants."
 levy_nd_rmn_dorobanti: "Dorobanti Infantry"
 levy_nd_rmn_dorobanti_desc: "Territorial infantry levied from peasant communities."
 nd_rmn_formed_tt: "Romania has been formed"
 nd_rmn_path_a_tt: "Chose Antemurale Christianitatis"
 nd_rmn_path_b_tt: "Chose Danubian Prosperity"
 nd_rmn_destiny: "Destiny of Romania"
 nd_rmn_destiny_desc: "United at last, the Romanian kingdom must now choose its path. Will it be the shield that guards Christendom or the crossroads that grows rich from all who pass?"
 nd_rmn_dest_fortress: "Fortress of the Danube"
 nd_rmn_dest_fortress_desc: "The Danubian fortresses of Vidin and Nikopol must be wrested from Ottoman hands to secure Romania's southern frontier and establish its claim as defender of the Christian world."
 nd_rmn_dest_crescent: "Crushing the Crescent"
 nd_rmn_dest_crescent_desc: "With the Danubian line secured, the campaign must press deeper into Ottoman territory. Take Edirne, the old Ottoman capital in Europe, and prove that the tide has turned."
 nd_rmn_dest_restorer: "Restorer of Christendom"
 nd_rmn_dest_restorer_desc: "The ultimate prize: Constantinople itself. Take the city that fell in 1453 and restore it to Christian hands. Romania's destiny as Antemurale Christianitatis will be fulfilled."
 nd_rmn_dest_gateway: "Black Sea Gateway"
 nd_rmn_dest_gateway_desc: "The port of Constanta and the Dobruja coast are the key to Romania's commercial future. Control the Black Sea gateway and the grain wealth of the Danubian plain will flow to every market in the Mediterranean."
 nd_rmn_dest_breadbasket: "Breadbasket of Three Empires"
 nd_rmn_dest_breadbasket_desc: "Romania must expand its Danubian trade network by securing Ruse, the great crossing-point on the lower Danube, and developing the agricultural heartland into the granary of southeastern Europe."
 nd_rmn_dest_paris: "Paris of the Balkans"
 nd_rmn_dest_paris_desc: "With Varna and the Black Sea coast under Romanian control, Bucharest can be transformed into a cosmopolitan capital to rival any in Europe — the Micul Paris of the East."
 nd_rmn.5.t: "The Destiny of Romania"
 nd_rmn.5.d: "The three lands are united, the crown secured, and the realm at peace — for the moment. But Romania sits at the crossroads of empires, and peace is never more than a generation away from the next storm. The Carpathians shelter us, the Danube feeds us, and the Orthodox faith sustains us. Now the question is not whether Romania will endure, but what it will become. The destiny of the Romanian people is ours to forge."
 nd_rmn.5.a: "Romania endures."
 nd_rmn.6.t: "Fortress of the Danube"
 nd_rmn.6.d: "The fortresses of Vidin and Nikopol — once the staging grounds for Ottoman campaigns into the heart of Europe — now fly the Romanian standard. These ancient strongholds on the Danube's south bank have been the gateway through which invasion after invasion poured into the Balkans. No longer. Romanian garrisons now man the walls that generations of Christian kingdoms failed to hold. The Danubian line is ours, and with it, the first proof that Romania can be more than a buffer state — it can be a bulwark."
 nd_rmn.6.a: "The Danube is our shield."
 nd_rmn.7.t: "Crushing the Crescent"
 nd_rmn.7.d: "Edirne has fallen. The city that served as the Ottoman capital before Constantinople, where Murad I built his first European palace and from which the sultans launched their conquests of the Balkans, is now in Romanian hands. The symbolism is unmistakable — the tide of Ottoman power in Europe has been broken not by a coalition of great powers but by the nation that suffered most under it. Our armies stand deep in Thrace, and the question before us is how to press this advantage."
 nd_rmn.7.a: "Storm every wall — give them no rest."
 nd_rmn.7.b: "Hold our ground — let time do its work."
 nd_rmn.8.t: "Restorer of Christendom"
 nd_rmn.8.d: "The cross flies over the Hagia Sophia. Constantinople — the city of Constantine, the Second Rome, the prize that eluded every Crusade — has been restored to Christian hands by Romanian arms. What the Fourth Crusade destroyed and the Ottomans claimed, Romania has reclaimed. The significance reverberates across Christendom and the Islamic world alike. A Romanian garrison holds the Theodosian Walls. Romanian ships control the Bosphorus. The question now is what Romania will do with this awesome inheritance."
 nd_rmn.8.a: "Proclaim a new Rome under Romanian protection."
 nd_rmn.8.b: "The crusade does not end — it never will."
 nd_rmn.9.t: "Black Sea Gateway"
 nd_rmn.9.d: "The port of Constanta and the windswept coast of Dobruja are now Romanian. Where once the Genoese and Venetians competed for Black Sea trading privileges and the Ottomans controlled all maritime access, Romanian merchants now load grain, salt, and wool onto ships bound for every corner of the Mediterranean. The ancient Greek colony of Tomis — where Ovid spent his exile — has been reborn as Romania's window to the sea. The wealth of the Danubian plain no longer flows only to Ottoman or Habsburg markets. It flows where Romania directs it."
 nd_rmn.9.a: "The sea is our marketplace."
 nd_rmn.10.t: "Breadbasket of Three Empires"
 nd_rmn.10.d: "With Ruse secured and the lower Danube firmly under Romanian control, the agricultural heartland of the principalities has become the granary that feeds three empires. Romanian wheat flows downriver to the Black Sea and across the Mediterranean. Salt from the Carpathian mines travels to markets that once relied on distant suppliers. The boyar estates and peasant farms of Wallachia produce surpluses that fuel a growing commercial class in Bucharest and the Danubian river towns. Romania is prosperous — but prosperity attracts attention."
 nd_rmn.10.a: "Sell to everyone — let surplus be our weapon."
 nd_rmn.10.b: "Build roads, bridges, and warehouses first."
 nd_rmn.11.t: "Paris of the Balkans"
 nd_rmn.11.d: "Varna has joined Romania's Black Sea coastline, and Bucharest has been transformed. The city that was once a muddy Wallachian market town is now a capital of boulevards, academies, and diplomatic salons. French architects have designed its public buildings. Romanian intellectuals debate in coffeehouses that would not be out of place on the Left Bank. Foreign ambassadors jostle for influence at the royal court. 'Micul Paris' — Little Paris — the Europeans call it, and for once the flattery is not entirely empty. The question is how to use this new stature."
 nd_rmn.11.a: "Open our doors to the world."
 nd_rmn.11.b: "Command the Black Sea trade routes."
 STATIC_MODIFIER_NAME_nd_rmn_dest_storm_walls: "Storm the Walls"
 STATIC_MODIFIER_DESC_nd_rmn_dest_storm_walls: "Romania's armies press every siege with furious aggression, storming fortifications rather than waiting for starvation to do its work."
 STATIC_MODIFIER_NAME_nd_rmn_dest_hold_line: "Hold the Line"
 STATIC_MODIFIER_DESC_nd_rmn_dest_hold_line: "Romania fights the long war — maintaining its armies cheaply, replacing losses steadily, and wearing down the enemy through patience and endurance."
 STATIC_MODIFIER_NAME_nd_rmn_dest_new_rome: "A New Rome"
 STATIC_MODIFIER_DESC_nd_rmn_dest_new_rome: "Romania proclaims itself protector of the Christian East, building a new imperial order with Constantinople as its spiritual center and Bucharest as its political heart."
 STATIC_MODIFIER_NAME_nd_rmn_dest_eternal_crusade: "Eternal Crusade"
 STATIC_MODIFIER_DESC_nd_rmn_dest_eternal_crusade: "Romania commits to perpetual holy war, maintaining networks of spies and mercenaries to sustain an endless campaign against the enemies of Christendom."
 STATIC_MODIFIER_NAME_nd_rmn_dest_export_surplus: "Export Surplus"
 STATIC_MODIFIER_DESC_nd_rmn_dest_export_surplus: "Romanian grain, salt, and livestock flood the markets of southeastern Europe, enriching the kingdom's merchants even as prosperity breeds a certain complacency."
 STATIC_MODIFIER_NAME_nd_rmn_dest_invest_infra: "Invest in Infrastructure"
 STATIC_MODIFIER_DESC_nd_rmn_dest_invest_infra: "Rather than exporting raw commodities, Romania invests in roads, bridges, and administrative reform to integrate its diverse territories into a cohesive economic whole."
 STATIC_MODIFIER_NAME_nd_rmn_dest_cosmopolitan: "Cosmopolitan Capital"
 STATIC_MODIFIER_DESC_nd_rmn_dest_cosmopolitan: "Bucharest becomes a center of diplomacy and culture, attracting foreign envoys, merchants, and intellectuals to the court of the Romanian kingdom."
 STATIC_MODIFIER_NAME_nd_rmn_dest_black_sea_trade: "Master of the Black Sea"
 STATIC_MODIFIER_DESC_nd_rmn_dest_black_sea_trade: "Romania builds a commercial fleet to dominate the Black Sea trade lanes, protecting its grain convoys and establishing itself as the maritime power of the western Black Sea."
 nd_rmn_citadela_crestina: "Citadela Crestina"
 nd_rmn_citadela_crestina_desc: "A grand Christian citadel — the fortress-cathedral that embodies Romania's role as the shield of Christendom, garrisoned by the kingdom's finest soldiers and blessed by the Orthodox Patriarch."
 nd_rmn_bursa_comerciala: "Bursa Comerciala"
 nd_rmn_bursa_comerciala_desc: "A grand commercial exchange where Danubian grain merchants, Black Sea traders, and Transylvanian mining agents converge to buy, sell, and finance the commerce of southeastern Europe."
 nd_rmn_citadel_upkeep: "Citadel Garrison"
 nd_rmn_citadel_upkeep_desc: "Maintaining the Christian citadel — stone for walls and towers, weaponry for the garrison, tools for repairs, and timber for structures and palisades."
 nd_rmn_exchange_operations: "Exchange Operations"
 nd_rmn_exchange_operations_desc: "Operating the commercial exchange — paper for contracts and ledgers, cloth for merchant booths and furnishings, salt for commodity trading, and tools for warehouse maintenance."
