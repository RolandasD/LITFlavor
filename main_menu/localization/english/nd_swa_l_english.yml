l_english:
 STATIC_MODIFIER_NAME_nd_swa_league_of_equals: "League of Equals"
 STATIC_MODIFIER_DESC_nd_swa_league_of_equals: "The cities of Swabia have bound themselves in common cause, pooling their wealth and arms in defense of shared liberties against both princely ambition and imperial overreach."
 STATIC_MODIFIER_NAME_nd_swa_ducal_restoration: "Ducal Restoration"
 STATIC_MODIFIER_DESC_nd_swa_ducal_restoration: "A strong hand now grasps the fractured duchy, welding its quarrelsome cities and petty lords into a cohesive state under princely authority, reviving the martial traditions of the Hohenstaufen."
 nd_swa.1.t: "The Swabian Question"
 nd_swa.1.d: "The old Duchy of Swabia perished with the last Hohenstaufen, leaving behind a mosaic of free cities, knight-cantons, and princely territories held together only by shared language and common interest. Now that mosaic has been gathered under a single banner -- but what kind of Swabia shall this be?\n\nThe cities of Augsburg, Ulm, and Memmingen have long governed themselves through councils and guilds, defending their liberties through the Swabian League. Their wealth and collective spirit made this unification possible. Yet there are those who remember that Swabia was once a stem duchy ruled by emperors, and argue that only a strong prince can hold these lands together.\n\nThe character of Swabia hangs in the balance: a confederation of free cities and cooperative estates, or a restored duchy with centralized authority.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_swa.1.a: "We are a league of free cities, bound by commerce"
 nd_swa.1.b: "Swabia needs a strong duke to lead"
 nd_swa.2.t: "The House of Fugger"
 nd_swa.2.d: "What began as a modest weaving workshop in Augsburg has grown into the most powerful banking house in Christendom. The Fuggers -- first Hans, then his sons and grandsons -- leveraged the textile trade into a financial empire spanning from the silver mines of Tyrol to the copper fields of Hungary. Their counting houses extend credit to popes and emperors alike.\n\nJakob Fugger, called 'the Rich,' has secured mining monopolies across central Europe by offering Habsburg princes loans they cannot refuse, accepting mineral rights as collateral. His innovations in double-entry bookkeeping and international credit networks have made Augsburg the banking capital of the Empire.\n\nThe Fugger wealth is now inseparable from Swabian prosperity."
 nd_swa.2.a: "Augsburg shall be the counting house of Europe"
 STATIC_MODIFIER_NAME_nd_swa_fugger_patronage: "Fugger Patronage"
 STATIC_MODIFIER_DESC_nd_swa_fugger_patronage: "The vast wealth of the Fugger banking dynasty flows through Augsburg, financing mines, churches, and public works across Swabia."
 nd_swa.3.t: "The Peace of Augsburg"
 nd_swa.3.d: "After decades of religious strife that divided neighbor against neighbor and shattered the old Swabian League, the princes and cities of the Empire have gathered in Augsburg to settle the confessional question. The resulting peace establishes a new principle: the ruler's faith determines the faith of his land.\n\nFor Swabia, this moment carries special weight. Augsburg itself has long been home to both confessions, with Lutheran and Catholic communities sharing the same city walls in uneasy coexistence. Some Swabian cities embraced the Reformation early; others remained staunchly Catholic. The peace offers two paths: enforce confessional uniformity to strengthen state authority, or embrace the practical tolerance that Augsburg's own experience has demonstrated."
 nd_swa.3.a: "Cuius regio, eius religio -- one faith, one realm"
 nd_swa.3.b: "Let Augsburg's example guide us toward coexistence"
 STATIC_MODIFIER_NAME_nd_swa_cuius_regio: "Cuius Regio, Eius Religio"
 STATIC_MODIFIER_DESC_nd_swa_cuius_regio: "The principle of the Augsburg settlement grants the ruler authority over the faith of his subjects, strengthening central control and religious uniformity."
 STATIC_MODIFIER_NAME_nd_swa_augsburg_coexistence: "Augsburg Coexistence"
 STATIC_MODIFIER_DESC_nd_swa_augsburg_coexistence: "Augsburg's long tradition of biconfessional governance becomes a model for the realm, fostering tolerance and attracting merchants of all faiths."
 nd_swa.4.t: "The League Takes the Field"
 nd_swa.4.d: "The Swabian League, that great alliance of cities, princes, and knights, has proven itself not merely a diplomatic instrument but a formidable military force. When peasant armies rose across the southwest in revolt against tithes and serfdom, and when robber barons terrorized the trade roads, the League mustered its contingents and marched.\n\nUnder the command of Georg Truchsess von Waldburg, the League's army -- drawn from dozens of member states, each contributing their quota of pike, horse, and cannon -- crushed the rebel forces with methodical efficiency. The collective military capacity of the League has been proven beyond doubt."
 nd_swa.4.a: "The strength of the League lies in its unity"
 nd_swa_formed_tt: "Swabia has been formed"
 nd_swa_path_a_tt: "Swabia follows the path of the League of Equals"
 nd_swa_path_b_tt: "Swabia follows the path of Ducal Restoration"
 nd_swa_hohenstaufen_legacy: "Hohenstaufen Legacy"
 nd_swa_hohenstaufen_legacy_desc: "The memory of the great Staufer dynasty -- Frederick Barbarossa, Henry VI, Frederick II -- lends prestige and cultural weight to any who claim Swabia as their own."
 nd_swa_urban_league_tradition: "Urban League Tradition"
 nd_swa_urban_league_tradition_desc: "The Swabian cities' long practice of binding together in leagues for mutual defense and commercial advantage, from the first league of 1376 to the great alliance of 1488."
 nd_swa_fortified_towns: "Fortified Towns"
 nd_swa_fortified_towns_desc: "Swabian free cities invested heavily in walls, towers, and militia training to protect their liberties against princely aggression."
 nd_swa_fustian_industry: "Fustian Industry"
 nd_swa_fustian_industry_desc: "The weaving of fustian -- a blend of cotton and linen -- made Augsburg and Ulm the textile capitals of the Empire, with production reaching ten thousand pieces annually."
 nd_swa_imperial_knights: "Imperial Knights of Swabia"
 nd_swa_imperial_knights_desc: "The Swabian knight-cantons maintained a military tradition independent of any prince, owing allegiance directly to the Emperor."
 nd_swa_fugger_banking: "Fugger Banking"
 nd_swa_fugger_banking_desc: "The Fugger family of Augsburg built the most powerful banking house in Europe, financing Habsburgs and popes through innovative credit secured against mining concessions."
 nd_swa_augsburg_metalworking: "Augsburg Metalworking"
 nd_swa_augsburg_metalworking_desc: "Augsburg's guild of armorers and weaponsmiths gained renown across Europe for the quality of their plate armor and edged weapons."
 nd_swa_league_collective_defense: "League Collective Defense"
 nd_swa_league_collective_defense_desc: "The 1488 Swabian League formalized mutual defense among cities, knights, and princes, creating a federal army of 13,000 men governed by a council of three colleges."
 nd_swa_cannon_foundries: "Augsburg Cannon Foundries"
 nd_swa_cannon_foundries_desc: "Augsburg's mastery of bronze and iron casting extended naturally to the production of artillery pieces, supplying siege trains to the League and the Emperor alike."
 nd_swa_circle_administration: "Circle Administration"
 nd_swa_circle_administration_desc: "The Imperial Circle system, formalized under Maximilian I, gave Swabia an administrative framework for tax collection, military levies, and keeping the peace."
 nd_swa_social_welfare: "Social Welfare Traditions"
 nd_swa_social_welfare_desc: "Jakob Fugger's founding of the Fuggerei in 1521 -- the world's first social housing complex -- exemplified Swabia's tradition of civic charity and urban welfare."
 nd_swa_league_warcraft: "League Warcraft"
 nd_swa_league_warcraft_desc: "The Swabian League proved its military worth by crushing the Great Peasants' War of 1524-26 and defeating an alliance of robber barons in the Franconian War."
 nd_swa_confessional_coexistence: "Confessional Coexistence"
 nd_swa_confessional_coexistence_desc: "Augsburg's biconfessional governance -- Lutherans and Catholics sharing civic offices and church buildings -- became a model of practical tolerance in a divided Empire."
 nd_swa_fine_cloth_manufactory: "Fine Cloth Manufactory"
 nd_swa_fine_cloth_manufactory_desc: "The evolution of Swabian textiles from basic fustian to luxury fine cloth, as Augsburg's six thousand weavers refined their craft to compete with Italian and Flemish masters."
 nd_swa_military_reforms: "Swabian Military Reforms"
 nd_swa_military_reforms_desc: "The modernization of the Swabian Circle's military contingents into professional standing forces, trained in the pike-and-shot tactics that the Landsknechte had pioneered."
 nd_swa_augsburg_printing: "Augsburg Printing Presses"
 nd_swa_augsburg_printing_desc: "Augsburg became one of the leading centers of printing in the Empire, producing religious tracts, commercial manuals, and illustrated books that spread across Europe."
 nd_swa_princely_splendor: "Princely Splendor"
 nd_swa_princely_splendor_desc: "The wealth of Swabia's merchant dynasties and princely houses found expression in magnificent palaces, churches, and art collections that rivaled any in the Empire."
 nd_swa_standing_kreis_army: "Standing Kreis Army"
 nd_swa_standing_kreis_army_desc: "The Swabian Circle maintained permanent military forces for defense against French and Ottoman threats, evolving from League contingents into professional standing armies."
 nd_swa_commercial_code: "Commercial Code"
 nd_swa_commercial_code_desc: "Swabian cities codified commercial law governing contracts, partnerships, and debt, providing legal certainty that attracted merchants from across Europe."
 nd_swa_enlightenment_scholarship: "Enlightenment Scholarship"
 nd_swa_enlightenment_scholarship_desc: "The University of Tuebingen and other Swabian institutions became centers of Enlightenment thought, producing philosophers, scientists, and legal scholars of note."
 nd_swa_industrial_textiles: "Industrial Textiles"
 nd_swa_industrial_textiles_desc: "The mechanization of Swabian textile production, as water-powered mills and early factories transformed the ancient weaving tradition into modern industry."
 nd_swa_civic_nationalism: "Civic Nationalism"
 nd_swa_civic_nationalism_desc: "Swabia's urban democratic traditions shaped a distinctive form of civic nationalism rooted in self-governance, guild solidarity, and popular sovereignty."
 nd_swa_autonomy_heritage: "Autonomy Heritage"
 nd_swa_autonomy_heritage_desc: "Even as Napoleonic mediatization absorbed Swabia's free cities and petty states, the tradition of local autonomy and self-governance persisted in civic institutions."
 nd_swa_industrial_modernization: "Industrial Modernization"
 nd_swa_industrial_modernization_desc: "Wuerttemberg led Swabia into the industrial age, its metalworking and engineering traditions evolving into modern manufacturing and armaments production."
 a_nd_swa_bundschuh_militia: "Bundschuh Militia"
 a_nd_swa_bundschuh_militia_desc: "Urban militia drawn from the guilds and citizenry of Swabian free cities, trained to defend their walls and liberties against noble aggression."
 a_nd_swa_kreisinfanterie: "Kreisinfanterie"
 a_nd_swa_kreisinfanterie_desc: "Professional infantry of the Swabian Imperial Circle, organized through the collective military obligations of the Circle's member states."
 a_nd_swa_reiter: "Swabian Reiter"
 a_nd_swa_reiter_desc: "Heavy cavalry drawn from the imperial knights of the Swabian cantons, fighting in the traditional mounted shock role."
 a_nd_swa_augsburg_bombard: "Augsburg Bombard"
 a_nd_swa_augsburg_bombard_desc: "Heavy siege artillery cast in Augsburg's renowned foundries, built with the same metalworking expertise that produced the finest armor in Europe."
 levy_nd_swa_bundschuh_militia: "Bundschuh Militia Levy"
 levy_nd_swa_bundschuh_militia_desc: "Militia levied from the guilds and citizenry of Swabian free cities."
 levy_nd_swa_kreisinfanterie: "Kreisinfanterie Levy"
 levy_nd_swa_kreisinfanterie_desc: "Circle infantry levied from the member states of the Swabian Imperial Circle."
 levy_nd_swa_reiter: "Swabian Reiter Levy"
 levy_nd_swa_reiter_desc: "Heavy cavalry levied from the imperial knights of the Swabian cantons."
 nd_swa_webhaus: "Webhaus"
 nd_swa_webhaus_desc: "A Swabian weaving hall where guild masters oversee the production of fustian and fine cloth, carrying on the textile traditions of Augsburg and Ulm."
 nd_swa_handelskontor: "Handelskontor"
 nd_swa_handelskontor_desc: "A trading office of the Swabian League network, coordinating commercial activity and representing the collective interests of allied merchants."
 nd_swa_fuggerhaus: "Fuggerhaus"
 nd_swa_fuggerhaus_desc: "A banking and counting house in the Fugger tradition, managing credit, exchange, and investment for Augsburg's merchant dynasties."
 nd_swa_zeughaus: "Zeughaus"
 nd_swa_zeughaus_desc: "A Swabian arsenal where Augsburg's metalworkers forge weapons and armor for the League's military forces."
 nd_swa_fuggerei: "Fuggerei"
 nd_swa_fuggerei_desc: "A social housing settlement modeled on Jakob Fugger's pioneering foundation in Augsburg, providing affordable homes to workers and artisans."
 nd_swa_fustian_weaving: "Fustian Weaving"
 nd_swa_fustian_weaving_desc: "The production of fustian cloth from imported cotton and local wool, the foundation of Swabian textile wealth."
 nd_swa_fine_cloth_production: "Fine Cloth Production"
 nd_swa_fine_cloth_production_desc: "Refined textile manufacturing producing luxury fine cloth from Swabian base cloth and imported dyes."
 nd_swa_webhaus_maintenance: "Weaving Hall Upkeep"
 nd_swa_webhaus_maintenance_desc: "Maintaining looms, dye vats, and the skilled workforce of a Swabian weaving hall."
 nd_swa_league_commerce: "League Commerce"
 nd_swa_league_commerce_desc: "The commercial operations of a Swabian League trading office, coordinating trade across the network of allied cities."
 nd_swa_league_warehouse: "League Warehouse"
 nd_swa_league_warehouse_desc: "Warehousing operations storing cloth, wool, and salt for the Swabian League's collective trade network."
 nd_swa_banking_operations: "Banking Operations"
 nd_swa_banking_operations_desc: "The financial operations of an Augsburg-style counting house, managing credit, exchange, and investment."
 nd_swa_advanced_banking: "Advanced Banking"
 nd_swa_advanced_banking_desc: "Sophisticated financial services including international credit letters, mining investment, and currency exchange."
 nd_swa_arms_production: "Arms Production"
 nd_swa_arms_production_desc: "The forging of weapons and armor in Augsburg's renowned metalworking workshops."
 nd_swa_fuggerei_upkeep: "Fuggerei Upkeep"
 nd_swa_fuggerei_upkeep_desc: "Maintaining the housing, streets, and community facilities of a Fuggerei-style social settlement."
 nd_swa_destiny: "The Swabian Destiny"
 nd_swa_destiny_desc: "Swabia stands united for the first time since the Hohenstaufen. Now it must chart its course: will the league of cities forge a commercial empire, or will a new duke restore the glory of the old stem duchy?"
 nd_swa_dest_handelsverein: "The Handelsverein"
 nd_swa_dest_handelsverein_desc: "Extend Swabian commercial influence along the Rhine by securing Strasbourg and bringing silk into our markets. Requires stability and the League path."
 nd_swa_dest_rhine_trade: "Continental Exchange"
 nd_swa_dest_rhine_trade_desc: "Build a trading network spanning from the Rhine to Flanders by controlling Bruges, embracing modern banking, and amassing substantial wealth."
 nd_swa_dest_handelshegemonie: "Handelshegemonie"
 nd_swa_dest_handelshegemonie_desc: "Achieve commercial supremacy over Europe by controlling Venice, reaching the highest prestige, and accumulating vast capital and developed territories."
 nd_swa_dest_stauferreich: "The Stauferreich"
 nd_swa_dest_stauferreich_desc: "Reclaim the heartland of the old Hohenstaufen domains by conquering Nuremberg and Freiburg. Requires stability and the Ducal Restoration path."
 nd_swa_dest_alpine_dominion: "Alpine Dominion"
 nd_swa_dest_alpine_dominion_desc: "Secure control over the Alpine passes by taking Innsbruck from the Habsburgs, while building a formidable army and earning the respect of your peers."
 nd_swa_dest_imperial_crown: "The Imperial Crown"
 nd_swa_dest_imperial_crown_desc: "Restore the full extent of Hohenstaufen power by conquering Milan and Prague, fielding a massive army, and developing a vast territorial domain."
 nd_swa.5.t: "The Swabian Destiny"
 nd_swa.5.d: "The scattered fragments of the old duchy have been gathered into a single hand. Swabia lives again -- but the question of what it shall become remains unanswered. The path ahead is long, and the choices we make now will echo through the centuries."
 nd_swa.5.a: "Our destiny awaits"
 nd_swa.6.t: "The Rhenish Connection"
 nd_swa.6.d: "The merchants of Augsburg and Ulm have long traded along the Rhine, sending their cloth and metalwork northward to the Low Countries and the Baltic. Now, with Strasbourg in our grasp, the entire upper Rhine corridor lies open to Swabian commerce.\n\nSilk flows through our markets, dyes enrich our workshops, and Fugger silver greases the wheels of trade. The old Swabian League was a defensive alliance -- but the Handelsverein we are building is something far more ambitious: a commercial confederation that will bind the cities of central Europe together through shared interest and mutual profit."
 nd_swa.6.a: "The Rhine shall be our highway"
 nd_swa.7.t: "The Continental Exchange"
 nd_swa.7.d: "Swabian merchants now trade in the great markets of Flanders, their warehouses in Bruges bulging with cloth, copper, and silver. The banking institutions we have embraced have transformed Augsburg from a provincial weaving town into the financial crossroads of Europe.\n\nThe question now is how to consolidate this commercial supremacy. Some argue that Augsburg's spy networks and financial intelligence should be weaponized to outmaneuver rivals. Others believe that an alliance with the Hanseatic cities of the north would create an unassailable trading bloc stretching from the Mediterranean to the Baltic."
 nd_swa.7.a: "Deploy our agents across every market"
 nd_swa.7.b: "Forge a partnership with the Hansa"
 nd_swa.8.t: "The Handelshegemonie"
 nd_swa.8.d: "Venice has fallen under Swabian influence, and with it the last great independent trading power of Europe. From the textile halls of Augsburg to the lagoons of the Adriatic, from the counting houses of Bruges to the silk markets of the East, Swabian capital flows through the veins of European commerce.\n\nThis unprecedented commercial dominion raises a fundamental question about the nature of the Swabian state. Shall the great merchant families -- the Fuggers, the Welsers, the Hochstetters -- formally take the reins of government as merchant princes? Or shall the markets remain truly free, open to all comers, with no single dynasty able to corner trade?"
 nd_swa.8.a: "Let the great houses govern as they trade"
 nd_swa.8.b: "Free markets serve all, not merely the few"
 nd_swa.9.t: "The Stauferreich Reborn"
 nd_swa.9.d: "The banner of the Hohenstaufen flies once more over Nuremberg's castle and the towers of Freiburg. What the last Staufer emperors lost through the chaos of the Interregnum, a new Swabian duke has reclaimed through steel and statecraft.\n\nFranconia's imperial cities and the Breisgau's fertile lands now answer to Stuttgart. The heartland is secured -- but the true domains of Frederick Barbarossa and Frederick II stretched far beyond these borders, over the Alpine passes and into the rich plains of Lombardy."
 nd_swa.9.a: "The eagles return to their aeries"
 nd_swa.10.t: "Lords of the Alps"
 nd_swa.10.d: "Innsbruck has fallen. The Habsburg seat in Tyrol -- gateway to Italy, guardian of the Brenner Pass -- now flies the Swabian eagle. Control of the Alpine passes gives Swabia strategic command over the trade and military routes connecting Germany to Italy.\n\nThe question is how to exploit this mountain dominion. Some counsel fortifying every pass and valley, making the Alps an impregnable bastion. Others argue that the wealth of the conquered territories should be mobilized to raise massive armies for the campaigns ahead -- Milan and Prague still beckon."
 nd_swa.10.a: "Fortify every pass and stronghold"
 nd_swa.10.b: "Levy the mountain peoples for our wars"
 nd_swa.11.t: "The Imperial Crown"
 nd_swa.11.d: "Milan kneels before the Swabian duke. Prague's ancient castle acknowledges a new master. From the Rhine to the Vltava, from the Alps to the plains of Lombardy, the domains of the Hohenstaufen have been restored -- and surpassed.\n\nThis is a power not seen in Central Europe since Frederick II held court in Palermo and ruled from the Baltic to Sicily. The question now is what manner of empire this shall be. Some urge the duke to claim universal monarchy -- to impose Swabian will on all of Christendom through force of arms. Others counsel a more measured approach: an imperial federation that binds diverse peoples through shared institutions and mutual obligation."
 nd_swa.11.a: "One crown, one will, one empire"
 nd_swa.11.b: "An empire of many peoples, one law"
 STATIC_MODIFIER_NAME_nd_swa_dest_continental_exchange: "Continental Exchange"
 STATIC_MODIFIER_DESC_nd_swa_dest_continental_exchange: "Augsburg's financial intelligence networks span the continent, monitoring markets and manipulating prices to Swabian advantage."
 STATIC_MODIFIER_NAME_nd_swa_dest_hanseatic_partnership: "Hanseatic Partnership"
 STATIC_MODIFIER_DESC_nd_swa_dest_hanseatic_partnership: "A formal alliance with the Hanseatic cities creates a trading bloc stretching from the Alps to the Baltic, stabilizing commerce across the region."
 STATIC_MODIFIER_NAME_nd_swa_dest_merchant_princes: "Merchant Princes"
 STATIC_MODIFIER_DESC_nd_swa_dest_merchant_princes: "The great Swabian merchant dynasties govern as they trade -- with calculation, ambition, and an eye toward innovation."
 STATIC_MODIFIER_NAME_nd_swa_dest_free_market: "Free Market Republic"
 STATIC_MODIFIER_DESC_nd_swa_dest_free_market: "Swabia's markets remain open to all comers, fostering competition, tolerance, and peaceful prosperity."
 STATIC_MODIFIER_NAME_nd_swa_dest_alpine_fortifications: "Alpine Fortifications"
 STATIC_MODIFIER_DESC_nd_swa_dest_alpine_fortifications: "Every pass, valley, and mountain stronghold has been fortified, making the Swabian heartland virtually impregnable."
 STATIC_MODIFIER_NAME_nd_swa_dest_imperial_levies: "Imperial Levies"
 STATIC_MODIFIER_DESC_nd_swa_dest_imperial_levies: "The conquered territories are organized to provide maximum military manpower, with every subject people contributing their quota to the Swabian army."
 STATIC_MODIFIER_NAME_nd_swa_dest_universal_monarchy: "Universal Monarchy"
 STATIC_MODIFIER_DESC_nd_swa_dest_universal_monarchy: "The Swabian duke claims dominion over all of Christendom, wielding military force as the primary instrument of statecraft."
 STATIC_MODIFIER_NAME_nd_swa_dest_imperial_federation: "Imperial Federation"
 STATIC_MODIFIER_DESC_nd_swa_dest_imperial_federation: "Diverse peoples are bound together under Swabian authority through shared institutions, mutual obligation, and the promise of order."
 nd_swa_borsenhaus: "Borsenhaus"
 nd_swa_borsenhaus_desc: "A Swabian commodity exchange where merchants from across Europe trade goods, credit, and futures, anchoring Augsburg's position as the commercial capital of the continent."
 nd_swa_borsenhaus_maintenance: "Exchange Operations"
 nd_swa_borsenhaus_maintenance_desc: "The administration of a commodity exchange, maintaining trading floors, ledgers, and courier networks."
 nd_swa_kaiserpfalz: "Kaiserpfalz"
 nd_swa_kaiserpfalz_desc: "An imperial palace complex in the Hohenstaufen tradition, serving as both the seat of government and a symbol of restored ducal authority over the old stem duchy."
 nd_swa_kaiserpfalz_maintenance: "Palace Upkeep"
 nd_swa_kaiserpfalz_maintenance_desc: "Maintaining the grand halls, fortifications, and administrative offices of an imperial palace."
