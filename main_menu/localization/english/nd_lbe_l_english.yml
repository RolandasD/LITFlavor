l_english:
 STATIC_MODIFIER_NAME_nd_divine_authority_of_the_mulopwe: "Divine Authority of the Mulopwe"
 STATIC_MODIFIER_DESC_nd_divine_authority_of_the_mulopwe: "The sacred king rules as a living deity whose word is law. Through divine mandate and iron will, the Mulopwe commands absolute loyalty from his Balopwe clan kings, extracting tribute and enforcing obedience across the savanna."
 STATIC_MODIFIER_NAME_nd_wisdom_of_the_bambudye: "Wisdom of the Bambudye"
 STATIC_MODIFIER_DESC_nd_wisdom_of_the_bambudye: "The Bambudye council guides the state with accumulated knowledge encoded in the lukasa memory boards. No ruler may act without their counsel, and no chief may hold office without first mastering the society's teachings. This institutional resilience has allowed the Luba to absorb foreign peoples and survive succession crises that would shatter lesser kingdoms."
 STATIC_MODIFIER_NAME_nd_lbe_copper_cross_economy: "Copper Cross Economy"
 STATIC_MODIFIER_DESC_nd_lbe_copper_cross_economy: "The distinctive cross-shaped copper ingots of the Luba have become the currency of central African trade, accepted from the forests of the Congo to the shores of the Indian Ocean."
 STATIC_MODIFIER_NAME_nd_lbe_tributary_hegemony: "Tributary Hegemony"
 STATIC_MODIFIER_DESC_nd_lbe_tributary_hegemony: "Rather than minting currency, the Luba state has channeled its copper wealth into building a vast tributary network. Subject peoples render manpower and resources in exchange for the protection and prestige of the Mulopwe's authority."
 nd_lbe.1.t: "The Founding of the Luba Empire"
 nd_lbe.1.d: "The marshy grasslands of the Upemba Depression have given rise to something extraordinary. From the lakeshores where our ancestors fished and smelted iron, from the copper-rich hills where our smiths forge the distinctive cross-shaped ingots that serve as currency across central Africa, a great kingdom has emerged. The descendants of Kalala Ilunga, the mythical hunter who overthrew the tyrant Kongolo Mwamba, now rule from Mwibele over a realm of diverse peoples bound by shared institutions.\n\nBut two visions compete for the soul of this new empire. The Mulopwe sits enthroned as a living deity, his authority absolute and sacred — yet beside him stands the Bambudye council, guardians of the lukasa memory boards, with the power to check, counsel, and even depose a king who abuses his mandate. Will the Luba Empire be forged through the divine fire of royal authority, or built upon the enduring wisdom of its institutions?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_lbe.1.a: "The Mulopwe's word is law — our divine king shall rule unchallenged."
 nd_lbe.1.b: "The Bambudye shall guide us — no king rules without the council's wisdom."
 nd_lbe.2.t: "The Copper Cross Standard"
 nd_lbe.2.d: "Our smiths have perfected the art of casting the distinctive cross-shaped copper ingots known as handa. Weighing from a few grams to over a kilogram, these crosses have become the standard currency not just of our markets but of trade networks stretching from the equatorial forests to the Zambezi. Songye merchants barter raffia cloth for our copper; traders from the east bring shells and beads. The question before us is how to leverage this monetary supremacy — shall we expand our copper production to dominate regional commerce, or use our economic power to bind more peoples into our tributary network?"
 nd_lbe.2.a: "Expand the copper trade — let the handa flow to every market."
 nd_lbe.2.b: "Bind more tributaries — copper buys loyalty, not just goods."
 nd_lbe.3.t: "The Keepers of the Lukasa"
 nd_lbe.3.d: "The Bambudye society has reached a new level of sophistication. Their memory boards — the lukasa — are masterworks of encoded knowledge. Court historians known as bana balute run their fingertips across surfaces studded with beads and shells, each cluster representing a king, a migration, a law, or a sacred site. Three types of lukasa now exist: the lukasa lwa nkunda recording mythical heroes and migration routes, the lukasa lwa kabemba organizing the Mbudye society itself, and secret boards created for individual rulers containing knowledge too dangerous for common ears.\n\nNo candidate for political office may receive their title without first becoming a member of the Bambudye. The society serves as living constitution, historical archive, and check on royal power — all encoded in boards small enough to hold in one hand."
 nd_lbe.3.a: "The memory of the Luba shall endure through all ages."
 nd_lbe.4.t: "The Spread of the Balopwe Model"
 nd_lbe.4.d: "The Luba system of sacred kingship has proven so effective that neighboring peoples have adopted it wholesale. The Lunda kingdom, our most powerful offshoot, has carried the balopwe model of governance across a vast swathe of central Africa — from northern Angola to northwestern Zambia. Foreign leaders and governments are incorporated through the flexible system of clan kingship, where loyalty to the Mulopwe and membership in the Bambudye creates bonds stronger than ethnicity or language.\n\nThis is the true genius of Luba statecraft: a government durable enough to withstand succession disputes, yet flexible enough to absorb entire foreign polities. The balopwe model is not merely a form of rule — it is an idea, spreading like fire across the savanna."
 nd_lbe.4.a: "Our model of governance shall be the standard of central Africa."
 nd_lbe.5.t: "Defenders of the Heartland"
 nd_lbe.5.d: "Foreign powers have cast their eyes upon the riches of our copper belt and the labor of our people. But the warriors of the Luba heartland know every path through the Upemba wetlands, every ford across the Lualaba, every defensive position in the savanna hills. What outsiders see as impenetrable bush, our soldiers call home. The Mulopwe has called upon the warrior societies to organize a defense that turns the landscape itself into a weapon — hostile terrain, stretched supply lines, and the implacable resistance of a people fighting for their sacred homeland."
 nd_lbe.5.a: "The heartland shall not fall."
 nd_lbe_upemba_ironworking: "Upemba Ironworking"
 nd_lbe_upemba_ironworking_desc: "The iron-working traditions of the Upemba Depression, refined over centuries of continuous habitation, produce weapons and tools of exceptional quality."
 nd_lbe_kilolo_administration: "Kilolo Administration"
 nd_lbe_kilolo_administration_desc: "Village chiefs known as Kilolo manage local affairs, collect tribute, and maintain granaries that sustain the population through lean seasons."
 nd_lbe_kisalian_lake_fishing: "Kisalian Lake Fishing"
 nd_lbe_kisalian_lake_fishing_desc: "The organized fishing communities of the Upemba lakes, inheritors of the ancient Kisalian tradition, provide a reliable food surplus that sustains urban growth."
 nd_lbe_palm_oil_trade: "Palm Oil Trade"
 nd_lbe_palm_oil_trade_desc: "Extraction and trade of palm oil, a versatile product used for cooking, lighting, and as a trade commodity across central African networks."
 nd_lbe_ancestral_spirit_tradition: "Ancestral Spirit Tradition"
 nd_lbe_ancestral_spirit_tradition_desc: "The veneration of ancestral spirits provides a common religious framework that binds diverse Luba communities together across the savanna."
 nd_lbe_lineage_chiefs: "Lineage Chiefs"
 nd_lbe_lineage_chiefs_desc: "The system of governance through lineage heads creates a durable hierarchy that can incorporate new peoples while maintaining order."
 nd_lbe_savanna_oral_tradition: "Savanna Oral Tradition"
 nd_lbe_savanna_oral_tradition_desc: "The rich oral traditions of the Luba savanna preserve genealogies, legal precedents, and cultural knowledge across generations."
 nd_lbe_balopwe_royal_institution: "Balopwe Royal Institution"
 nd_lbe_balopwe_royal_institution_desc: "The sacred institution of the Balopwe — clan kings who serve as intermediaries between the divine Mulopwe and the people — forms the backbone of Luba military and political power."
 nd_lbe_bambudye_knowledge_tradition: "Bambudye Knowledge Tradition"
 nd_lbe_bambudye_knowledge_tradition_desc: "The Bambudye secret society, guardians of the lukasa memory boards, preserves and transmits the accumulated knowledge of the Luba state."
 nd_lbe_copper_cross_currency: "Copper Cross Currency"
 nd_lbe_copper_cross_currency_desc: "The distinctive cross-shaped copper ingots cast by Luba smiths serve as currency across central African trade networks."
 nd_lbe_divine_kingship_shrines: "Divine Kingship Shrines"
 nd_lbe_divine_kingship_shrines_desc: "Deceased Mulopwe become deities, and their former capitals transform into living shrines that sanctify the landscape and legitimate royal authority."
 nd_lbe_kalala_ilunga_legacy: "Kalala Ilunga's Legacy"
 nd_lbe_kalala_ilunga_legacy_desc: "All rulers of the Luba trace their ancestry to Kalala Ilunga, the mythical hunter who overthrew Kongolo Mwamba and introduced advanced iron forging and royal political practices."
 nd_lbe_court_of_the_mulopwe: "Court of the Mulopwe"
 nd_lbe_court_of_the_mulopwe_desc: "The Mulopwe's court at Mwibele serves as the political and cultural heart of the empire, where diverse peoples find common cause under sacred kingship."
 nd_lbe_tributary_expansion: "Tributary Expansion"
 nd_lbe_tributary_expansion_desc: "Luba armies target population-dense regions to extract tribute, expanding the empire's reach and military reserves."
 nd_lbe_twite_military_reform: "Twite Military Reform"
 nd_lbe_twite_military_reform_desc: "The twite, the Mulopwe's military chief, reorganizes the provincial armies into a more professional force capable of sustained campaigns."
 nd_lbe_copper_salt_routes: "Copper and Salt Routes"
 nd_lbe_copper_salt_routes_desc: "Control of the vital trade routes linking copper mines, salt sources, and agricultural regions consolidates Luba economic power."
 nd_lbe_katanga_salt_control: "Katanga Salt Control"
 nd_lbe_katanga_salt_control_desc: "The salt mines of the southern territories become a critical state monopoly, driving both economic growth and political competition."
 nd_lbe_raffia_textile_industry: "Raffia Textile Industry"
 nd_lbe_raffia_textile_industry_desc: "The weaving of raffia palm fibers into cloth creates a major export commodity, traded to the Songye and other neighboring peoples."
 nd_lbe_inabanza_regalia: "Inabanza Regalia"
 nd_lbe_inabanza_regalia_desc: "The inabanza, guardian of royal emblems, maintains the sacred regalia — including the double iron bells that symbolize the Mulopwe's mastery of metallurgy and statecraft."
 nd_lbe_mbudye_council_expansion: "Mbudye Council Expansion"
 nd_lbe_mbudye_council_expansion_desc: "The Mbudye council extends its oversight across more aspects of governance, providing institutional stability that transcends individual rulers."
 nd_lbe_lualaba_river_network: "Lualaba River Network"
 nd_lbe_lualaba_river_network_desc: "The Lualaba River and its tributaries serve as the empire's highways, carrying trade goods, tribute, and information between the heartland and distant provinces."
 nd_lbe_tribute_army_reform: "Tribute Army Reform"
 nd_lbe_tribute_army_reform_desc: "The tribute collection system is militarized, with dedicated forces that can rapidly deploy to enforce obligations across the empire's extensive domains."
 nd_lbe_lunda_model_spread: "Lunda Model Spread"
 nd_lbe_lunda_model_spread_desc: "The Luba model of sacred kingship and institutional governance spreads to neighboring peoples, most notably the Lunda, creating a vast zone of Luba-influenced statecraft."
 nd_lbe_copper_belt_consolidation: "Copper Belt Consolidation"
 nd_lbe_copper_belt_consolidation_desc: "The rich copper deposits connecting Luba territory to the Zambian copperbelt are brought under tighter state control, fueling imperial expansion."
 nd_lbe_bamfumu_nobility: "Bamfumu Nobility"
 nd_lbe_bamfumu_nobility_desc: "The Bamfumu court nobles gain formalized powers and responsibilities, creating a stable aristocratic class that supports the Mulopwe's rule."
 nd_lbe_regional_tribute_system: "Regional Tribute System"
 nd_lbe_regional_tribute_system_desc: "A sophisticated system of tribute collection and redistribution ensures that resources flow from peripheral regions to the center and back, binding the empire together."
 nd_lbe_sacred_geography: "Sacred Geography"
 nd_lbe_sacred_geography_desc: "The landscape itself becomes a map of Luba spirituality, with shrines, sacred groves, and ancestral sites marking the geography of divine kingship."
 nd_lbe_advanced_smelting_techniques: "Advanced Smelting Techniques"
 nd_lbe_advanced_smelting_techniques_desc: "Luba metalworkers develop techniques for producing sheet iron and soldering metals, enabling the creation of the double iron bells that symbolize royal power."
 nd_lbe_mulopwe_centralization: "Mulopwe Centralization"
 nd_lbe_mulopwe_centralization_desc: "The Mulopwe consolidates direct authority over formerly autonomous provinces, reducing the independence of local Kilolo chiefs."
 nd_lbe_katanga_copper_hegemony: "Katanga Copper Hegemony"
 nd_lbe_katanga_copper_hegemony_desc: "Complete control of the Katanga copper sources makes the Luba Empire the undisputed master of central African metallurgy and trade."
 nd_lbe_savanna_road_networks: "Savanna Road Networks"
 nd_lbe_savanna_road_networks_desc: "Organized paths connecting major settlements improve the movement of goods, tribute, and armies across the vast savanna territories."
 nd_lbe_mbudye_judicial_reform: "Mbudye Judicial Reform"
 nd_lbe_mbudye_judicial_reform_desc: "The Bambudye society formalizes its role as the supreme judicial authority, with the power to interpret law and even depose kings who abuse their mandate."
 nd_lbe_cross_continental_trade: "Cross-Continental Trade"
 nd_lbe_cross_continental_trade_desc: "Luba trade networks extend from the equatorial forests to the Indian Ocean coast, connecting central Africa to global commerce."
 nd_lbe_warrior_societies: "Warrior Societies"
 nd_lbe_warrior_societies_desc: "Organized warrior societies provide the Luba with a disciplined military elite trained in the tactics of savanna warfare."
 nd_lbe_anti_colonial_resistance: "Anti-Colonial Resistance"
 nd_lbe_anti_colonial_resistance_desc: "The warriors of the Luba heartland leverage their knowledge of local terrain and guerrilla tactics to resist foreign encroachment."
 nd_lbe_copper_industrial_revolution: "Copper Industrial Revolution"
 nd_lbe_copper_industrial_revolution_desc: "The application of new techniques to Luba copper extraction and smelting transforms the ancient industry into a modern economic engine."
 nd_lbe_unified_luba_governance: "Unified Luba Governance"
 nd_lbe_unified_luba_governance_desc: "The Mulopwe's authority and the Bambudye's wisdom merge into a unified system of governance capable of administering a modern state."
 nd_lbe_modern_trade_networks: "Modern Trade Networks"
 nd_lbe_modern_trade_networks_desc: "Traditional Luba trade routes are expanded and modernized, integrating the empire into global commercial systems."
 nd_lbe_luba_cultural_renaissance: "Luba Cultural Renaissance"
 nd_lbe_luba_cultural_renaissance_desc: "A flowering of Luba art, sculpture, and oral literature celebrates the empire's heritage and projects its cultural influence across central Africa."
 nd_lbe_sovereignty_of_the_heartland: "Sovereignty of the Heartland"
 nd_lbe_sovereignty_of_the_heartland_desc: "The Luba Empire asserts its sovereignty as an independent power, demanding recognition from the great powers of the world."
 a_nd_lbe_ironworker_warriors: "Ironworker Warriors"
 a_nd_lbe_ironworker_warriors_desc: "Village militia armed with weapons forged from Upemba iron — spears, axes, and short swords of exceptional quality. These farmer-soldiers carry the iron-working tradition of their ancestors into battle."
 a_nd_lbe_balopwe_guard: "Balopwe Royal Guard"
 a_nd_lbe_balopwe_guard_desc: "The personal retinue of the sacred king, drawn from the most loyal Balopwe clan warriors. Their devotion to the Mulopwe transcends ordinary military loyalty — they fight as if defending a living god."
 a_nd_lbe_twite_spearmen: "Twite's Spearmen"
 a_nd_lbe_twite_spearmen_desc: "Provincial soldiers organized under the twite, the Mulopwe's military chief. Equipped with long spears and wooden shields, they form the disciplined backbone of Luba field armies."
 a_nd_lbe_tribute_collectors: "Tribute Collectors"
 a_nd_lbe_tribute_collectors_desc: "Fast-moving armed detachments tasked with enforcing tributary obligations across the empire. Lightly equipped for rapid marches, they can project Luba authority deep into subject territories."
 nd_lbe_lukasa_archive: "Lukasa Archive"
 nd_lbe_lukasa_archive_desc: "A center of Bambudye learning where master historians guard and interpret the lukasa memory boards, preserving the genealogies, laws, and migration stories of the Luba people."
 nd_lbe_copper_smithy: "Royal Copper Smithy"
 nd_lbe_copper_smithy_desc: "An advanced metalworking workshop where Luba smiths cast the distinctive cross-shaped copper ingots that serve as currency across central African trade networks."
 nd_lbe_mulopwe_shrine: "Mulopwe's Shrine"
 nd_lbe_mulopwe_shrine_desc: "A living shrine built at the former capital of a deceased Mulopwe, who upon death became a deity. These sacred sites sanctify the landscape and reinforce the divine legitimacy of royal authority."
 nd_lbe_kilolo_granary: "Kilolo's Granary"
 nd_lbe_kilolo_granary_desc: "An administrative storehouse managed by the local Kilolo chief, collecting and redistributing agricultural tribute to sustain the population and fund the state."
 nd_lbe_trade_post: "Luba Trade Post"
 nd_lbe_trade_post_desc: "A regional trading station positioned on the copper and salt routes, facilitating exchange between the Luba heartland and distant trading partners."
 nd_lbe_copper_cross_casting_pm: "Copper Cross Casting"
 nd_lbe_copper_cross_casting_pm_desc: "Casting copper into the distinctive cross-shaped handa ingots prized as currency and prestige goods across central Africa."
 nd_lbe_palm_oil_processing_pm: "Palm Oil Processing"
 nd_lbe_palm_oil_processing_pm_desc: "Extraction and refining of palm oil for use as food, lamp fuel, and a valuable trade commodity."
 nd_lbe_raffia_weaving_pm: "Raffia Cloth Weaving"
 nd_lbe_raffia_weaving_pm_desc: "The weaving of raffia palm fibers into cloth — a major Luba export traded to the Songye and other neighboring peoples."
 nd_lbe_lake_fishery_pm: "Lake Fishery Operations"
 nd_lbe_lake_fishery_pm_desc: "Organized fishing on the Upemba Depression lakes, hauling in catches that sustain the surrounding settlements."
 nd_lbe_salt_mining_pm: "Salt Mining"
 nd_lbe_salt_mining_pm_desc: "Extracting salt from the southern mines, producing a commodity so valuable it serves as currency alongside copper."
 nd_lbe_lukasa_maintenance: "Lukasa Preservation"
 nd_lbe_lukasa_maintenance_desc: "The ongoing creation and maintenance of lukasa memory boards requires skilled artisans working with beads, shells, and fine materials."
 nd_lbe_smithy_maintenance: "Smithy Operations"
 nd_lbe_smithy_maintenance_desc: "Smelting copper ore and forging it into tools and implements at the royal smithy."
 nd_lbe_shrine_maintenance: "Shrine Upkeep"
 nd_lbe_shrine_maintenance_desc: "Maintaining the sacred shrine with offerings and ritual goods to honor the departed Mulopwe."
 nd_lbe_granary_maintenance: "Granary Upkeep"
 nd_lbe_granary_maintenance_desc: "Maintaining the storehouse structures that protect grain reserves from weather and pests."
 nd_lbe_trade_post_maintenance: "Trade Post Operations"
 nd_lbe_trade_post_maintenance_desc: "Operating costs for the trading station, including stockpiling trade goods for exchange."
 nd_lbe_lake_fishing_tradition: "Lake Fishing Tradition"
 nd_lbe_lake_fishing_tradition_desc: "The organized fishing communities of the Upemba lakes, continuing the ancient Kisalian tradition, form the economic backbone of early Luba settlement."
 nd_lbe_savanna_fortification: "Savanna Fortification"
 nd_lbe_savanna_fortification_desc: "Fortified village palisades protect Luba settlements from raiders, using the natural advantages of the savanna landscape."
 nd_lbe_upemba_fishery: "Upemba Fishery"
 nd_lbe_upemba_fishery_desc: "An organized lakeside fishing operation on the Upemba Depression lakes, providing a reliable food surplus that sustains the surrounding population."
 nd_lbe_palisade_fort: "Luba Palisade"
 nd_lbe_palisade_fort_desc: "A fortified village defense constructed from hardwood logs, designed to protect settlements from raiders and serve as a rally point for local militia."
 nd_lbe_ivory_carving_pm: "Ivory Carving"
 nd_lbe_ivory_carving_pm_desc: "The skilled carving of ivory into prestige goods, traded across central African networks and prized by foreign merchants."
 nd_lbe_palm_beer_brewing_pm: "Palm Beer Brewing"
 nd_lbe_palm_beer_brewing_pm_desc: "The brewing of beer from palm sap, a central element of Luba social life and religious ceremonies."
 nd_lbe_copper_belt_extraction_pm: "Copper Belt Extraction"
 nd_lbe_copper_belt_extraction_pm_desc: "Intensive mining of the rich copper deposits connecting Luba territory to the Zambian copperbelt, producing raw copper for trade and metalworking."
 nd_lbe_caravan_trade_pm: "Caravan Trade Operations"
 nd_lbe_caravan_trade_pm_desc: "Long-distance caravan routes carrying copper, salt, and ivory across central Africa to distant coastal markets."
 nd_lbe_fishery_maintenance: "Fishery Upkeep"
 nd_lbe_fishery_maintenance_desc: "Maintaining canoes, nets, and drying racks for the lakeside fishing operation."
 nd_lbe_palisade_maintenance: "Palisade Upkeep"
 nd_lbe_palisade_maintenance_desc: "Maintaining the defensive palisade with fresh timber and repairs."
 nd_lbe_formed_tt: "Luba Empire has been formed"
 nd_lbe_path_a_tt: "Chose Divine Authority of the Mulopwe"
 nd_lbe_path_b_tt: "Chose Wisdom of the Bambudye"
 nd_lbe_destiny: "Destiny of the Luba Empire"
 nd_lbe_destiny_desc: "The Luba Empire stands at a crossroads. The path chosen at its founding now beckons the nation toward its ultimate destiny. Stability and purpose are required before the great work can begin."
 nd_lbe_dest_tanganyika: "The March to Tanganyika"
 nd_lbe_dest_tanganyika_desc: "The Mulopwe demands expansion eastward to the shores of Lake Tanganyika and northward into the Lomami basin. These conquests will establish the military foundations of a continental empire."
 nd_lbe_dest_kongo: "The Fall of Kongo"
 nd_lbe_dest_kongo_desc: "With the east secured, the Mulopwe turns his gaze westward. The great kingdom of Kongo, with its capital at Mbanza Kongo, must be brought under Luba suzerainty to prove the empire's dominance over central Africa."
 nd_lbe_dest_mulopwe_supreme: "Mulopwe Supreme"
 nd_lbe_dest_mulopwe_supreme_desc: "The final ambition of the divine king: to push beyond the interior and seize the coastal trade cities of Kilwa and Sofala, connecting the Luba heartland to the wealth of the Indian Ocean. This is the apex of sacred conquest."
 nd_lbe_dest_knowledge: "The Knowledge Keepers"
 nd_lbe_dest_knowledge_desc: "The Bambudye council directs the nation toward institutional development and economic mastery. Embrace modern financial practices and ensure that Luba copper dominates the markets."
 nd_lbe_dest_trade_routes: "Lords of the Trade Routes"
 nd_lbe_dest_trade_routes_desc: "Extend the Bambudye's commercial vision to the Atlantic coast. The port of Loango will serve as the western terminus of a Luba trade network stretching from copper mines to ocean harbors."
 nd_lbe_dest_bambudye_supreme: "Bambudye Supreme"
 nd_lbe_dest_bambudye_supreme_desc: "The ultimate expression of the Bambudye's institutional wisdom: a trade empire spanning the continent, where ivory flows through Luba markets and global commerce enriches the heartland. This is governance triumphant."
 nd_lbe.6.t: "The Destiny Beckons"
 nd_lbe.6.d: "Our empire has achieved the stability needed to pursue its greater purpose. The path we chose at our founding — whether the divine authority of the Mulopwe or the institutional wisdom of the Bambudye — now calls us forward. The ancestors watch, and the lukasa boards record our deeds for posterity. Let the great work begin."
 nd_lbe.6.a: "The destiny of the Luba unfolds before us."
 nd_lbe.7.t: "The Eastern Frontier"
 nd_lbe.7.d: "Our armies have reached the shores of Lake Tanganyika, and the Lomami basin bows to the Mulopwe's authority. The peoples of the east, long accustomed to their independence, now acknowledge the divine king whose iron weapons and copper crosses have followed the trade routes into their lands. The warriors return laden with tribute — ivory, copper, and the loyalty of new subjects."
 nd_lbe.7.a: "The Mulopwe's writ runs to the great lake."
 nd_lbe.8.t: "The Kongo Has Fallen"
 nd_lbe.8.d: "Mbanza Kongo, the ancient seat of power in the west, has been taken. The Mulopwe's banner flies over a city that once rivaled our own in prestige and influence. This is no mere conquest — it is the subjugation of a civilization. How shall we consolidate this immense prize? We may strip its wealth to fuel further campaigns, or we may honor its warriors by integrating them into the Luba military tradition."
 nd_lbe.8.a: "Strip the conquered lands of their tribute."
 nd_lbe.8.b: "Honor the fallen — integrate their warriors."
 nd_lbe.9.t: "The Mulopwe Ascendant"
 nd_lbe.9.d: "The sacred king has achieved what the ancestors could only dream. From the Upemba Depression to the Indian Ocean, from the Lomami to the Zambezi, the Luba Empire now controls the trade routes that connect the African interior to the wider world. Kilwa's dhows carry Luba copper to Arabia, and Sofala's gold flows through the Mulopwe's hands. This is the apex of divine kingship — an empire built on iron, copper, and the sacred mandate of the ancestors.\n\nShall the Mulopwe rule from an iron throne of military supremacy, or shall he forge an empire of copper — wealthy, stable, and enduring?"
 nd_lbe.9.a: "The Iron Throne shall command all nations."
 nd_lbe.9.b: "The Empire of Copper endures through wealth."
 nd_lbe.10.t: "The Knowledge Economy"
 nd_lbe.10.d: "The Bambudye council has guided the nation toward a new model of power — one built not on conquest alone, but on institutional knowledge and economic sophistication. Our adoption of banking practices has transformed the copper cross from a simple trade good into a tool of financial power. The lukasa boards now record not just genealogies and migration stories, but trade agreements, market prices, and diplomatic protocols. Knowledge is the truest form of wealth."
 nd_lbe.10.a: "The wisdom of the Bambudye enriches us all."
 nd_lbe.11.t: "The Atlantic Connection"
 nd_lbe.11.d: "Our merchants have reached Loango on the Atlantic coast, completing a trade route that stretches from the copper mines of Katanga to the harbors of the western ocean. Luba copper crosses, raffia cloth, and ivory now flow westward through a network of intermediaries, while foreign goods — salt, shells, and cloth from distant lands — flow back to enrich the heartland.\n\nShall we focus on building merchant houses along the copper routes, or shall we use salt and diplomacy to bind our trading partners into a durable alliance network?"
 nd_lbe.11.a: "Build the merchant houses — copper is king."
 nd_lbe.11.b: "Salt and diplomacy forge stronger bonds."
 nd_lbe.12.t: "The Bambudye Triumphant"
 nd_lbe.12.d: "The Bambudye society has achieved something unprecedented: a governance system so effective, so flexible, and so deeply rooted in institutional knowledge that it has become a model for peoples across the continent. Foreign leaders seek membership in the council, and the lukasa boards are studied as masterworks of encoded wisdom. The Luba Empire has proven that a state built on knowledge and trade can rival any built on conquest.\n\nShall we formalize the Bambudye as a constitutional body, or shall we project Luba culture outward, absorbing neighboring peoples into our institutional framework?"
 nd_lbe.12.a: "The Bambudye is our living constitution."
 nd_lbe.12.b: "Let all peoples learn the Luba way."
 STATIC_MODIFIER_NAME_nd_lbe_dest_conquerors_tribute: "Conqueror's Tribute"
 STATIC_MODIFIER_DESC_nd_lbe_dest_conquerors_tribute: "The spoils of the Kongo conquest fuel further expansion, though the costs of administering such vast territories strain the treasury."
 STATIC_MODIFIER_NAME_nd_lbe_dest_warrior_prestige: "Warrior's Prestige"
 STATIC_MODIFIER_DESC_nd_lbe_dest_warrior_prestige: "The integration of Kongo warriors into Luba military tradition has produced a battle-hardened force with superior morale and tactical flexibility."
 STATIC_MODIFIER_NAME_nd_lbe_dest_iron_throne: "The Iron Throne"
 STATIC_MODIFIER_DESC_nd_lbe_dest_iron_throne: "The Mulopwe rules from an iron throne, his divine authority unchallenged across a vast empire. Military supremacy is total, though the costs of perpetual war drive inflation upward."
 STATIC_MODIFIER_NAME_nd_lbe_dest_empire_of_copper: "Empire of Copper"
 STATIC_MODIFIER_DESC_nd_lbe_dest_empire_of_copper: "The wealth of the copper belt and the coastal trade cities sustains a vast professional army, and the Mulopwe's empire commands respect among the great powers of the world."
 STATIC_MODIFIER_NAME_nd_lbe_dest_copper_merchants: "Copper Merchants"
 STATIC_MODIFIER_DESC_nd_lbe_dest_copper_merchants: "Luba merchant houses dominate the copper trade from Katanga to the Atlantic, converting local peoples to Luba commercial practices. Success, however, breeds a certain complacency."
 STATIC_MODIFIER_NAME_nd_lbe_dest_salt_diplomacy: "Salt Diplomacy"
 STATIC_MODIFIER_DESC_nd_lbe_dest_salt_diplomacy: "The exchange of salt and copper has forged a web of diplomatic relationships that extends Luba influence without the costs of conquest, though maintaining these relationships demands expensive courtly displays."
 STATIC_MODIFIER_NAME_nd_lbe_dest_living_constitution: "Living Constitution"
 STATIC_MODIFIER_DESC_nd_lbe_dest_living_constitution: "The Bambudye council functions as a living constitution, providing institutional continuity, diplomatic expertise, and the capacity to recover from any crisis."
 STATIC_MODIFIER_NAME_nd_lbe_dest_cultural_hegemony: "Cultural Hegemony"
 STATIC_MODIFIER_DESC_nd_lbe_dest_cultural_hegemony: "The Luba model of governance spreads to every corner of central Africa, absorbing foreign peoples into a shared institutional framework that reduces tensions and enables flexible policy-making."
 nd_lbe_war_camp: "Mulopwe's War Camp"
 nd_lbe_war_camp_desc: "A permanent military encampment established by the divine king's twite, from which armies are mustered, supplied, and dispatched to enforce the Mulopwe's will across distant frontiers."
 nd_lbe_war_camp_maintenance: "War Camp Operations"
 nd_lbe_war_camp_maintenance_desc: "Provisioning the permanent military camp with weapons, food, and materiel for the Mulopwe's armies."
 nd_lbe_grand_lukasa_council: "Grand Lukasa Council"
 nd_lbe_grand_lukasa_council_desc: "The supreme hall of the Bambudye society, where the most sacred lukasa boards are studied and the wisest councillors guide the governance of a continental trade empire."
 nd_lbe_grand_council_maintenance: "Council Operations"
 nd_lbe_grand_council_maintenance_desc: "Maintaining the grand council hall and providing the materials needed for lukasa creation and scholarly work."
