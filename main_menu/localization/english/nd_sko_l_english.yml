l_english:
 STATIC_MODIFIER_NAME_nd_light_of_knowledge: "The Light of Knowledge"
 STATIC_MODIFIER_DESC_nd_light_of_knowledge: "Following the vision of Usman dan Fodio, the Caliphate dedicates itself to the pursuit of learning, jurisprudence, and righteous governance. Schools multiply across the emirates, scholars are honored above warriors, and the administration of justice follows the letter of sacred law."
 STATIC_MODIFIER_NAME_nd_banner_of_jihad: "The Banner of Jihad"
 STATIC_MODIFIER_DESC_nd_banner_of_jihad: "The Caliphate raises the green banner of holy war. Fulani horsemen ride forth from every emirate to bring the light of the true faith to the unconverted, and the thunder of hooves across the Sahel announces the expansion of the realm of God."
 STATIC_MODIFIER_NAME_nd_bello_reforms: "Bello's Administrative Reforms"
 STATIC_MODIFIER_DESC_nd_bello_reforms: "Sultan Muhammad Bello has codified the governance of the Caliphate, establishing systematic administration, standardized taxation, and a courier network linking Sokoto to every provincial capital."
 STATIC_MODIFIER_NAME_nd_dan_fodio_legacy: "Legacy of the Shehu"
 STATIC_MODIFIER_DESC_nd_dan_fodio_legacy: "The intellectual and spiritual legacy of Usman dan Fodio endures across generations, inspiring scholars, jurists, and reformers throughout the Muslim world."
 nd_sko.1.t: "The Founding of the Sokoto Caliphate"
 nd_sko.1.d: "The jihad has triumphed. Where once the Hausa kings ruled through custom and caprice, a new order rises — one grounded in the revealed word of God and the scholarly tradition of Usman dan Fodio. The city of Sokoto stands as the seat of the Commander of the Faithful, and from its mosques and courts flows the authority that binds thirty emirates into a single Caliphate.\n\nBut the question remains: what shall define this new state? Shall it be the sword that carved it from the wreckage of old kingdoms, or the pen that gave it purpose? The path we choose now will echo through the centuries.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_sko.1.a: "Let knowledge illuminate the Sahel"
 nd_sko.1.b: "Let the horsemen carry the faith forward"
 nd_sko.2.t: "The Teachings of the Shehu"
 nd_sko.2.d: "The writings of Usman dan Fodio — in Arabic, Hausa, and Fulfulde — have become the intellectual foundation of our state. His treatises on governance, jurisprudence, and the obligations of the faithful circulate from Sokoto to the furthest ribats. Students travel from across the Sahel to study under scholars who learned at the Shehu's feet. This is more than religious instruction — it is the creation of a literate, educated ruling class capable of administering an empire through law rather than the arbitrary whims of petty kings."
 nd_sko.2.a: "His legacy shall endure"
 nd_sko.3.t: "The Administration of Muhammad Bello"
 nd_sko.3.d: "Sultan Muhammad Bello, son of the Shehu, has proven himself not merely a warrior but a brilliant administrator. Where his father provided the vision, Bello has built the machinery of state. He has codified Sharia governance across the emirates, established the kofa communication system linking Sokoto with provincial capitals through mounted couriers, expanded schools and libraries, and founded new cities along the frontier ribat system. Under his hand, the Caliphate has grown from a collection of conquered territories into a functioning empire — the most populous state in West Africa."
 nd_sko.3.a: "The Caliphate is well governed"
 nd_sko.4.t: "The Authority of the Caliph"
 nd_sko.4.d: "The title of Amir al-Mu'minin — Commander of the Faithful — carries more than ceremonial weight in our Caliphate. The emirs, though they govern their provinces with considerable autonomy, acknowledge Sokoto as the source of legitimate authority. Disputes between emirates are settled by the Sultan's court, and the appointment of new emirs requires caliphal approval. This balance between central authority and provincial autonomy has proven remarkably effective — allowing local adaptation while maintaining the unity of purpose that holds thirty diverse emirates together under one banner of faith."
 nd_sko.4.a: "Unity through faith and law"
 nd_sko.5.t: "The Enduring Legacy of Dan Fodio"
 nd_sko.5.d: "Generations after the death of Usman dan Fodio, his intellectual and spiritual legacy remains the animating force of the Caliphate. His writings are studied in every mosque and school across the Sahel. His model of an Islamic state — grounded in scholarship, governed by law, and committed to the moral reformation of society — continues to inspire reformers and thinkers far beyond the borders of the Caliphate. The Shehu may be gone, but the movement he sparked burns as brightly as ever."
 nd_sko.5.a: "His light shall never fade"
 nd_sko_hausa_urbanism: "Hausa Urbanism"
 nd_sko_hausa_urbanism_desc: "The great walled cities of Hausaland — Kano, Katsina, Zazzau — are centers of craft, commerce, and culture, renowned for their indigo-dyed textiles and bustling markets."
 nd_sko_trans_saharan_networks: "Trans-Saharan Networks"
 nd_sko_trans_saharan_networks_desc: "Ancient trade routes stretching across the desert connect Hausaland to North Africa, carrying gold, slaves, leather, and kola nuts northward and salt, horses, and manufactured goods southward."
 nd_sko_fulani_pastoral: "Fulani Pastoral Tradition"
 nd_sko_fulani_pastoral_desc: "The Fulani people's deep expertise in cattle husbandry sustains communities across the Sahel, providing milk, meat, leather, and the wealth that underpins both commerce and military power."
 nd_sko_sahel_horsemanship: "Sahel Horsemanship"
 nd_sko_sahel_horsemanship_desc: "The mounted warriors of the Sahel grasslands are among the finest horsemen in Africa, their lancers and mounted archers dominating open-field warfare across the savanna."
 nd_sko_islamic_learning: "Islamic Learning"
 nd_sko_islamic_learning_desc: "Networks of scholars, teachers, and traveling preachers disseminate Islamic knowledge throughout Hausaland, establishing the intellectual foundations that will one day spark a revolution."
 nd_sko_walled_cities: "Walled Cities"
 nd_sko_walled_cities_desc: "The birni — massive earthwork and stone walls encircling Hausa cities — protect urban populations and their wealth from raiders, creating defensible centers of civilization across the Sahel."
 nd_sko_kano_textile_trade: "Kano Textile Trade"
 nd_sko_kano_textile_trade_desc: "Kano's legendary dye pits and weaving workshops produce millions of rolls of cloth annually, making the city one of the great manufacturing centers of the pre-industrial world."
 nd_sko_quranic_schools: "Quranic Schools"
 nd_sko_quranic_schools_desc: "A network of Quranic schools provides education in Arabic literacy, Islamic jurisprudence, and the sciences, creating a scholarly class that transcends ethnic and political boundaries."
 nd_sko_emirate_traditions: "Emirate Traditions"
 nd_sko_emirate_traditions_desc: "The military traditions of the Hausa emirates produce disciplined garrison forces, trained to defend the city walls and maintain order within their domains."
 nd_sko_leather_guilds: "Leather Guilds"
 nd_sko_leather_guilds_desc: "The tanners of Hausaland produce leather goods of such quality that they are traded across the Sahara. Kano alone exports millions of tanned hides and sandals each year."
 nd_sko_dan_fodio_teachings: "Teachings of Dan Fodio"
 nd_sko_dan_fodio_teachings_desc: "The reformist preaching of Usman dan Fodio calls for a return to Quranic fundamentals and the purification of Islamic practice from syncretism, laying the ideological groundwork for revolution."
 nd_sko_ribat_frontier: "Ribat Frontier"
 nd_sko_ribat_frontier_desc: "Fortified frontier settlements combining military garrison with Islamic school, the ribats serve as both defensive strongholds and centers for the propagation of the faith."
 nd_sko_kano_emporium: "Kano Emporium"
 nd_sko_kano_emporium_desc: "Under the Caliphate, Kano flourishes as the commercial heart of the Sahel — a crossroads where trans-Saharan caravans meet local markets in a hub of extraordinary economic activity."
 nd_sko_jihad_cavalry: "Jihad Cavalry"
 nd_sko_jihad_cavalry_desc: "The mounted warriors of the Fulani jihad form the elite striking force of the Caliphate, riding into battle with lance and sword under the green banner of the faith."
 nd_sko_sharia_courts: "Sharia Courts"
 nd_sko_sharia_courts_desc: "The implementation of Sharia law as the foundation of governance replaces the arbitrary justice of the old Hausa kings with a codified legal system administered by trained qadis."
 nd_sko_caliphal_authority: "Caliphal Authority"
 nd_sko_caliphal_authority_desc: "The Sultan of Sokoto, as Commander of the Faithful, exercises supreme religious and political authority over the emirate system, mediating disputes and confirming the appointment of emirs."
 nd_sko_bello_administration: "Bello's Administration"
 nd_sko_bello_administration_desc: "Sultan Muhammad Bello transforms the Caliphate from a revolutionary movement into a functioning bureaucratic state, codifying governance, establishing communication networks, and founding new cities."
 nd_sko_textile_manufactory: "Textile Manufactory"
 nd_sko_textile_manufactory_desc: "Large-scale cloth production facilities in Caliphate cities employ thousands of weavers, dyers, and tailors, producing textiles for domestic use and export across West Africa."
 nd_sko_kofa_system: "Kofa Communication System"
 nd_sko_kofa_system_desc: "The kofa system of mounted couriers links Sokoto with provincial emirates, enabling rapid communication and administrative coordination across the vast Caliphate."
 nd_sko_emirate_cavalry: "Emirate Armored Cavalry"
 nd_sko_emirate_cavalry_desc: "The heavy cavalry of the emirates ride into battle clad in chain mail, their horses armored and their lances leveled — the aristocratic shock troops of the Caliphate's military machine."
 nd_sko_reformed_levies: "Reformed Levies"
 nd_sko_reformed_levies_desc: "Reorganized military levies drawn from across the Caliphate's diverse population provide sustained infantry forces for extended campaigns of consolidation and defense."
 nd_sko_scholarly_tradition: "Scholarly Tradition"
 nd_sko_scholarly_tradition_desc: "The Caliphate's tradition of Islamic scholarship — inherited from dan Fodio and expanded by generations of jurists, theologians, and scientists — makes Sokoto a beacon of learning in West Africa."
 nd_sko_sahel_grain_trade: "Sahel Grain Trade"
 nd_sko_sahel_grain_trade_desc: "Agricultural surplus from the fertile river valleys of the Caliphate fuels both population growth and an active grain trade with neighboring states."
 nd_sko_fortified_emirates: "Fortified Emirates"
 nd_sko_fortified_emirates_desc: "Strengthened defensive works across the emirate system — from upgraded birni walls to new ribat strongholds — create a resilient network of fortified positions."
 nd_sko_caliphate_resurgent: "Caliphate Resurgent"
 nd_sko_caliphate_resurgent_desc: "Faced with new threats and changing warfare, the Caliphate modernizes its military forces, adopting firearms and reformed tactics to defend the realm of the faithful."
 nd_sko_kano_industrial_center: "Kano Industrial Center"
 nd_sko_kano_industrial_center_desc: "Proto-industrial production in Kano scales up textile weaving, leather working, and metalcraft to meet growing demand, presaging a transformation of the Caliphate's economy."
 nd_sko_pan_islamic_diplomacy: "Pan-Islamic Diplomacy"
 nd_sko_pan_islamic_diplomacy_desc: "The Caliphate reaches beyond the Sahel to forge connections with the wider Muslim world — from Morocco to the Ottoman Empire — seeking solidarity, trade, and recognition."
 nd_sko_legacy_of_dan_fodio: "Legacy of Dan Fodio"
 nd_sko_legacy_of_dan_fodio_desc: "The intellectual and spiritual legacy of Usman dan Fodio transcends the Caliphate itself, inspiring Islamic reform movements across West Africa and beyond for generations."
 a_nd_sko_fulani_lancer: "Fulani Lancer"
 a_nd_sko_fulani_lancer_desc: "Light cavalry of the Sahel grasslands, the Fulani lancers are swift raiders and scouts whose horsemanship is unmatched on the open savanna."
 a_nd_sko_emirate_guard: "Emirate Guard"
 a_nd_sko_emirate_guard_desc: "Disciplined infantry drawn from the garrison forces of the Hausa emirates, trained to hold city walls and maintain order within their domains."
 a_nd_sko_jihad_horseman: "Jihad Horseman"
 a_nd_sko_jihad_horseman_desc: "Mounted warriors of the Fulani jihad, riding with lance and sword under the green banner of the faith. Their charges shatter enemy formations on the open field."
 a_nd_sko_armored_horseman: "Armored Horseman"
 a_nd_sko_armored_horseman_desc: "Heavy Fulani cavalry clad in chain mail and plate, mounted on armored horses. These aristocratic warriors deliver devastating shock charges that few opponents can withstand."
 a_nd_sko_jihad_levy_unit: "Jihad Levy"
 a_nd_sko_jihad_levy_unit_desc: "Mass infantry raised from the faithful across the Caliphate during times of holy war, fired by religious zeal and fighting to defend or expand the realm of Islam."
 a_nd_sko_reformed_infantry: "Reformed Infantry"
 a_nd_sko_reformed_infantry_desc: "Modernized Caliphate soldiers equipped with firearms and trained in reformed tactics, representing the Sokoto state's adaptation to the changing nature of warfare."
 nd_sko_kano_dye_pit: "Kano Dye Pit"
 nd_sko_kano_dye_pit_desc: "The ancient indigo dye pits of Kano have operated for centuries, producing the deep blue cloth that is the hallmark of Hausa textile artistry and a major export commodity."
 nd_sko_cattle_camp: "Fulani Cattle Camp"
 nd_sko_cattle_camp_desc: "A managed pastoral settlement where Fulani herders tend their cattle, producing milk, meat, leather, and the surplus wealth that sustains both nomadic and urban communities."
 nd_sko_birni_walls: "Birni Walls"
 nd_sko_birni_walls_desc: "The massive earthwork and stone fortifications surrounding Hausa city-states, these walls have protected urban populations and their wealth from raiders for centuries."
 nd_sko_ribat: "Ribat"
 nd_sko_ribat_desc: "A fortified frontier settlement combining military garrison with Islamic school, the ribat serves as both a defensive stronghold and a center for the propagation of the faith among frontier populations."
 nd_sko_cloth_manufactory: "Cloth Manufactory"
 nd_sko_cloth_manufactory_desc: "A large-scale textile production facility employing weavers, dyers, and tailors to produce cloth at industrial volumes for domestic consumption and trans-Saharan export."
 nd_sko_dye_pit_maintenance: "Dye Pit Operations"
 nd_sko_dye_pit_maintenance_desc: "Kano's ancient dye pits process raw indigo into the famous deep blue cloth of Hausaland, a staple of trans-Saharan trade."
 nd_sko_cattle_camp_maintenance: "Cattle Camp Operations"
 nd_sko_cattle_camp_maintenance_desc: "Fulani herders feed millet to their cattle, producing livestock for meat, milk, leather, and the surplus wealth that sustains Sahel communities."
 nd_sko_birni_maintenance: "Wall Maintenance"
 nd_sko_birni_maintenance_desc: "The upkeep of birni walls requires regular resupply of stone and construction materials to maintain defensive integrity."
 nd_sko_ribat_maintenance: "Ribat Upkeep"
 nd_sko_ribat_maintenance_desc: "Maintaining a frontier ribat requires stone for fortification, weaponry for its garrison, and paper for the scholars who teach within its walls."
 nd_sko_cloth_manufactory_maintenance: "Manufactory Operations"
 nd_sko_cloth_manufactory_maintenance_desc: "The manufactory dyes and finishes bulk cloth into fine textiles for domestic use and trans-Saharan export."
 nd_sko_saharan_caravan: "Saharan Caravan Trade"
 nd_sko_saharan_caravan_desc: "The trans-Saharan caravan trade carries livestock products and furs northward across the desert, while salt from the great Saharan deposits flows southward to Hausaland's markets."
 nd_sko_indigo_dyeing: "Indigo Dyeing Process"
 nd_sko_indigo_dyeing_desc: "The specialized indigo dyeing process transforms raw dyes into the deep blue cloth that is the hallmark of Hausa craftsmanship and a prized export."
 nd_sko_courier_network: "Courier Network"
 nd_sko_courier_network_desc: "A mounted courier system requiring a steady supply of horses to maintain rapid communication between the capital and provincial emirates."
 levy_nd_sko_fulani_lancer: "Fulani Lancers"
 levy_nd_sko_fulani_lancer_desc: "Light cavalry levied from the Fulani pastoral communities, these lancers are swift raiders and scouts whose horsemanship dominates the Sahel grasslands."
 levy_nd_sko_emirate_guard: "Emirate Guards"
 levy_nd_sko_emirate_guard_desc: "Disciplined infantry levied from the garrison forces of the Hausa emirates, trained to hold city walls and maintain order."
 levy_nd_sko_jihad_levy: "Jihad Levies"
 levy_nd_sko_jihad_levy_desc: "Mass infantry raised from the faithful across the Caliphate during times of holy war, motivated by religious zeal to defend or expand the realm of Islam."
 nd_sko_formed_tt: "Sokoto has been formed"
 nd_sko_path_a_tt: "Chose The Light of Knowledge"
 nd_sko_path_b_tt: "Chose The Banner of Jihad"
 nd_sko_destiny: "Destiny of the Caliphate"
 nd_sko_destiny_desc: "The Sokoto Caliphate has been proclaimed. With stability secured, the Commander of the Faithful must now choose the path that will define this new state for generations."
 nd_sko_dest_scholars_path: "Scholars of Timbuktu"
 nd_sko_dest_scholars_path_desc: "Extend the Caliphate's intellectual reach to Timbuktu, the greatest center of Islamic learning in West Africa. Bring its scholars, libraries, and universities under Sokoto's patronage."
 nd_sko_dest_house_of_wisdom: "The House of Wisdom"
 nd_sko_dest_house_of_wisdom_desc: "Build a network of scholarly institutions rivaling any in the Muslim world. Secure Djenne's ancient center of learning and develop the Caliphate's institutional foundations through banking and commerce."
 nd_sko_dest_beacon_of_learning: "Beacon of Learning"
 nd_sko_dest_beacon_of_learning_desc: "Make the Sokoto Caliphate the intellectual capital of West Africa. Embrace the printing press to spread knowledge, achieve the highest prestige, and develop the Caliphate beyond its rivals."
 nd_sko_dest_jihad_path: "The Fall of Bornu"
 nd_sko_dest_jihad_path_desc: "Conquer Ngazargamu, the ancient capital of Bornu, and bring this rival Islamic state under the banner of the Caliphate. Build a powerful army worthy of the jihad."
 nd_sko_dest_sword_of_the_sahel: "Sword of the Sahel"
 nd_sko_dest_sword_of_the_sahel_desc: "Push the frontiers of the faith southward into Yorubaland. Seize Oyo-Ile, the great Yoruba capital, and the gateway city of Ilorin. Maintain a powerful standing army to enforce the Caliphate's authority."
 nd_sko_dest_master_of_sudan: "Master of the Sudan"
 nd_sko_dest_master_of_sudan_desc: "Dominate the entire Central Sudan from the Adamawa highlands to the forests of Benin. With an army of unmatched size and the highest prestige, the Caliphate stands supreme over all of West Africa."
 nd_sko.6.t: "The Destiny of the Caliphate"
 nd_sko.6.d: "The Sokoto Caliphate stands at a crossroads of history. The foundations have been laid — the emirs appointed, the courts established, the faith proclaimed. But what shall this caliphate become? The road ahead stretches into an uncertain future, and the choices we make now will echo for generations. The Commander of the Faithful must decide: shall we build an empire of the mind or of the sword?"
 nd_sko.6.a: "Our path is set"
 nd_sko.7.t: "The Scholars of Timbuktu"
 nd_sko.7.d: "Timbuktu, the storied city of Sankore and its great mosque-university, has come under our influence. For centuries this city has been the intellectual heart of West Africa — home to thousands of manuscripts, hundreds of scholars, and a tradition of learning that predates our Caliphate by generations. Now its libraries and classrooms serve the vision of dan Fodio, and the scholars of Timbuktu correspond with those of Sokoto in a grand exchange of knowledge."
 nd_sko.7.a: "Let knowledge flow between our cities"
 nd_sko.8.t: "The House of Wisdom"
 nd_sko.8.d: "The Caliphate's scholarly network has grown into something remarkable. From Timbuktu to Djenne, from Kano to Sokoto, a web of madrasas, libraries, and courts of jurisprudence spans the Sahel. Students travel from distant lands to study under our scholars, and the Caliphate's reputation for learning draws merchants and diplomats alike.\n\nHow shall we direct this intellectual wealth?"
 nd_sko.8.a: "Endow the scholars generously"
 nd_sko.8.b: "Extend tolerance to all People of the Book"
 nd_sko.9.t: "Beacon of Learning"
 nd_sko.9.d: "The Sokoto Caliphate has become what dan Fodio always dreamed — a state where knowledge reigns supreme, where the printing press multiplies the word of God and the insights of scholars, where the highest development in West Africa supports a civilization of extraordinary depth. The grand madrasas of Sokoto are spoken of from Fez to Cairo.\n\nHow shall we wield this intellectual authority?"
 nd_sko.9.a: "Centralize the administration of knowledge"
 nd_sko.9.b: "Let reform and innovation flourish freely"
 nd_sko.10.t: "The Fall of Ngazargamu"
 nd_sko.10.d: "Ngazargamu, the ancient capital of the Bornu Empire, has fallen to the horsemen of the Caliphate. For centuries Bornu stood as a rival center of Islamic authority in the Central Sudan — its mais claiming descent from the great Sayfawa dynasty, its scholars disputing our reformist claims. Now its walls are breached, its army scattered, and its territories open to the faith as we preach it. The jihad advances eastward."
 nd_sko.10.a: "Bornu shall submit to the true faith"
 nd_sko.11.t: "Sword of the Sahel"
 nd_sko.11.d: "The green banner of the Caliphate flies over Oyo-Ile, the once-mighty capital of the Yoruba empire, and over Ilorin, the gateway between the savanna and the forest. The jihad has carried the faith further than dan Fodio himself might have imagined. The Caliphate's armies are feared from the Niger to the Benue.\n\nHow shall we organize our military forces for the campaigns ahead?"
 nd_sko.11.a: "Emphasize rapid mobilization and offense"
 nd_sko.11.b: "Raise mass levies from the faithful"
 nd_sko.12.t: "Master of the Sudan"
 nd_sko.12.d: "From the Adamawa highlands to the forests of Benin, the Sokoto Caliphate holds dominion over the entire Central Sudan. No power in West Africa can challenge the authority of the Commander of the Faithful. The horsemen of the jihad patrol frontiers that stretch a thousand miles, and the emirs govern a mosaic of peoples united under the banner of Islam.\n\nHow shall the Caliphate maintain this vast domain?"
 nd_sko.12.a: "Through the peace of Sokoto"
 nd_sko.12.b: "Through unending holy war"
 STATIC_MODIFIER_NAME_nd_sko_dest_scholarly_endowment: "Scholarly Endowment"
 STATIC_MODIFIER_DESC_nd_sko_dest_scholarly_endowment: "The Caliphate's generous endowment of madrasas and libraries has attracted scholars from across the Muslim world, expanding diplomatic connections — though the cost of maintaining these institutions weighs on the court."
 STATIC_MODIFIER_NAME_nd_sko_dest_people_of_the_book: "People of the Book"
 STATIC_MODIFIER_DESC_nd_sko_dest_people_of_the_book: "The Caliphate extends measured tolerance to Christians and Jews as People of the Book, recognizing their protected status under Islamic law and promoting social harmony across the diverse emirates."
 STATIC_MODIFIER_NAME_nd_sko_dest_caliphal_administration: "Caliphal Administration"
 STATIC_MODIFIER_DESC_nd_sko_dest_caliphal_administration: "A centralized bureaucratic system emanating from Sokoto binds the emirates more tightly to the capital, easing the integration of conquered territories — though maintaining the administrative apparatus requires substantial borrowing."
 STATIC_MODIFIER_NAME_nd_sko_dest_reform_of_minds: "Reform of Minds"
 STATIC_MODIFIER_DESC_nd_sko_dest_reform_of_minds: "The spirit of intellectual reform championed by dan Fodio flourishes, encouraging innovation and the adoption of new ideas — though the growing urban population's demand for food strains agricultural production."
 STATIC_MODIFIER_NAME_nd_sko_dest_rapid_mobilization: "Rapid Mobilization"
 STATIC_MODIFIER_DESC_nd_sko_dest_rapid_mobilization: "The Caliphate's military machine is optimized for swift offensive campaigns, with troops mustered and deployed at remarkable speed — though maintaining captured fortifications strains the treasury."
 STATIC_MODIFIER_NAME_nd_sko_dest_mass_levies: "Mass Levies"
 STATIC_MODIFIER_DESC_nd_sko_dest_mass_levies: "The faithful answer the call to arms in vast numbers, providing cheap reinforcements and an expected army size that intimidates neighboring states."
 STATIC_MODIFIER_NAME_nd_sko_dest_pax_sokotana: "Pax Sokotana"
 STATIC_MODIFIER_DESC_nd_sko_dest_pax_sokotana: "The Caliphate's overwhelming military supremacy allows it to dictate terms from a position of strength, reducing the cost of maintaining its armies and commanding respect at the negotiating table."
 STATIC_MODIFIER_NAME_nd_sko_dest_unending_jihad: "Unending Jihad"
 STATIC_MODIFIER_DESC_nd_sko_dest_unending_jihad: "The Caliphate wages perpetual holy war, its armies hardened by constant campaigning. War exhaustion fades quickly and battles are decided swiftly — though the religious obligation of jihad makes the formal declaration of war a matter of theological justification."
 nd_sko_grand_madrasa: "Grand Madrasa"
 nd_sko_grand_madrasa_desc: "A magnificent center of Islamic scholarship where students study the Quran, jurisprudence, astronomy, and medicine under the patronage of the Caliphate — the intellectual crown jewel of the Sahel."
 nd_sko_madrasa_maintenance: "Madrasa Operations"
 nd_sko_madrasa_maintenance_desc: "The grand madrasa requires a steady supply of paper for manuscripts, books for its library, and beeswax for the candles that illuminate its halls of study."
 nd_sko_ribat_al_nasr: "Ribat al-Nasr"
 nd_sko_ribat_al_nasr_desc: "The Fortress of Victory — a grand military stronghold combining the defensive traditions of the birni with the offensive capability of a forward staging base, equipped to garrison and project power across vast distances."
 nd_sko_ribat_nasr_maintenance: "Fortress Operations"
 nd_sko_ribat_nasr_maintenance_desc: "The Ribat al-Nasr requires weaponry for its garrison, stone for its walls, horses for its cavalry, and leather for equipment and harnesses."
