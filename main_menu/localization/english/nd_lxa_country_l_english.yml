l_english:
 LXA: "Lan Xang"
 LXA_ADJ: "Lan Xang"
 LXA_f: "Lan Xang"
 LXA_f_desc: "The Kingdom of Lan Xang, the Land of a Million Elephants, was the great unified Lao kingdom founded by Fa Ngum in 1354. Stretching from the Khorat Plateau to the northern highlands of the upper Mekong, it was one of the largest kingdoms in Southeast Asia until internal strife split it into the rival kingdoms of Luang Prabang, Vientiane, and Champasak in 1707. A Lao ruler who controls both ancient capitals may restore this once-mighty realm."
