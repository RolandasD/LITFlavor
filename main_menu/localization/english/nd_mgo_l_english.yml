l_english:
 STATIC_MODIFIER_NAME_nd_mgo_chinggisid_restoration: "Chinggisid Restoration"
 STATIC_MODIFIER_DESC_nd_mgo_chinggisid_restoration: "The great Khan has reunited the tumens under Chinggisid authority. Mongol riders sweep across the steppe once more, their iron discipline and nomadic resilience restored to the glory of old."
 STATIC_MODIFIER_NAME_nd_mgo_yellow_hat_patronage: "Yellow Hat Patronage"
 STATIC_MODIFIER_DESC_nd_mgo_yellow_hat_patronage: "Mongolia has embraced the Gelug path, transforming from a confederation of warriors into a civilization of monasteries and learning. The bond between Khan and Lama brings stability, wisdom, and a new Mongolian identity."
 STATIC_MODIFIER_NAME_nd_mgo_tumen_reorganization: "Tumen Reorganization"
 STATIC_MODIFIER_DESC_nd_mgo_tumen_reorganization: "Dayan Khan's redistribution of the six eastern tumens among his sons restored order to a fragmented steppe, creating a military-administrative system that channels nomadic energy into organized strength."
 STATIC_MODIFIER_NAME_nd_mgo_gelug_conversion_path: "Gelug Conversion"
 STATIC_MODIFIER_DESC_nd_mgo_gelug_conversion_path: "The Yellow Hat teachings spread across the steppe. Monasteries rise where ovoos once stood alone, and the Mongolian script captures sutras alongside chronicles. A new era of learning and devotion transforms the face of the steppe."
 STATIC_MODIFIER_NAME_nd_mgo_tengri_preservation: "Eternal Blue Sky"
 STATIC_MODIFIER_DESC_nd_mgo_tengri_preservation: "The ancient ways of Tengri endure. Shamans commune with the sky and earth, warriors draw strength from ancestral spirits, and the hostile steppe itself becomes Mongolia's greatest fortress."
 nd_mgo.1.t: "The Reunification of Mongolia"
 nd_mgo.1.d: "The scattered tribes of the Mongolian steppe have been brought together once more. For generations since the collapse of the great empire, the heirs of Chinggis Khan have warred among themselves — Khalkha against Oirat, tumen against tumen, brother against brother. Now, at last, a single authority commands the loyalty of the steppe.\n\nBut what shall this new Mongolia become? The legacy of Chinggis Khan pulls in two directions. One path calls for the restoration of Chinggisid military authority — the iron discipline of the tumen, the decimal organization that once conquered half the known world. The other path, opened by contact with Tibetan lamas, promises a different transformation entirely — a Mongolia of monasteries and learning, where the khan's legitimacy flows not from the sword but from the dharma.\n\nThe choice will shape Mongolia's identity for generations to come.\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_mgo.1.a: "Restore the tumens — we are the heirs of Chinggis Khan"
 nd_mgo.1.b: "Embrace the Yellow Hat — the dharma shall guide our people"
 nd_mgo.2.t: "Dayan Khan and the Six Tumens"
 nd_mgo.2.d: "In the late fifteenth century, a child named Batumongke was proclaimed khan by the warrior-queen Mandukhai. Together they would reunite the fractured Mongol nation. Taking the reign name Dayan — 'the Great Yuan' — he crushed the Oirat taishis and southwestern rebels, then reorganized the entire eastern Mongol confederation into six great tumens: the Chakhar, Khalkha, Uriankhai, Ordos, Tumed, and Yonshiyebu.\n\nEach tumen was assigned to one of his eleven sons, creating a new aristocracy bound by blood to the Great Khan. This was no mere administrative reform — it was the rebirth of the decimal system that had once made Mongol armies invincible. For a generation, the steppe was united as it had not been since the time of Kublai Khan himself."
 nd_mgo.2.a: "The six tumens ride as one"
 nd_mgo.3.t: "The Meeting at Thegchen Chonkhor"
 nd_mgo.3.d: "In 1578, Altan Khan of the Tumed invited Sonam Gyatso, head of the Gelug lineage of Tibetan Buddhism, to a great meeting on the steppe. The encounter would transform Mongolia forever. Altan Khan bestowed upon Sonam Gyatso the title 'Dalai Lama' — Ocean of Wisdom — while the lama in turn recognized the khan as a reincarnation of Kublai Khan, the great patron of Buddhism.\n\nAltan Khan decreed that shamanic blood sacrifices would cease, that the images of the ongon spirits would be destroyed, and that the Gelug dharma would become the faith of the Mongols. Within fifty years, tens of thousands of young Mongolian men had taken monastic vows. Erdene Zuu, the first great monastery, rose upon the ruins of ancient Karakorum.\n\nBut not all Mongols welcomed this transformation. Many clung to the old ways of Tengri worship, seeing the Yellow Hats as foreign interlopers who would sap Mongolian martial spirit. The tension between dharma and the eternal blue sky would define Mongolian identity for centuries."
 nd_mgo.3.a: "Let the dharma illuminate the steppe"
 nd_mgo.3.b: "The sky gods of our ancestors shall endure"
 nd_mgo.4.t: "Unity of the Khalka"
 nd_mgo.4.d: "The Khalka Mongols — the largest and most central of the Mongol confederations — have at last achieved genuine unity. Where once the four Khalka khanates competed against each other and against the western Oirats, a common identity has emerged. Shared ancestry under the Chinggisid line, common pastures across the Mongolian heartland, and increasingly, a shared Buddhist faith have welded these disparate groups into a single nation.\n\nThis is no empire of conquest but something perhaps more durable: a people who recognize themselves as one. From the Altai Mountains to the Khingan Range, from the Gobi Desert to the Siberian forests, the Khalka identity becomes synonymous with Mongolia itself."
 nd_mgo.4.a: "We are one people, one steppe"
 nd_mgo.5.t: "The Jebtsundamba Khutuktu"
 nd_mgo.5.d: "A remarkable figure has emerged to unite spiritual and temporal authority in Mongolia: the Jebtsundamba Khutuktu, recognized as the highest Buddhist incarnation on Mongolian soil. First established when Zanabazar — son of the Tushegtii Khan and a prodigy of art and theology — was identified as a reincarnation of the great scholar Taranatha, the institution of the Jebtsundamba would become the spiritual heart of Mongolia.\n\nZanabazar created the Soyombo script, designed magnificent Buddhist sculptures, and built monasteries that became centers of learning across the steppe. In his person, the ancient Chinggisid bloodline merged with Buddhist sanctity, creating a uniquely Mongolian form of Buddhist authority that commanded loyalty from warrior and monk alike."
 nd_mgo.5.a: "The Living Buddha guides our people"
 nd_mgo_steppe_horsemanship: "Steppe Horsemanship"
 nd_mgo_steppe_horsemanship_desc: "The Mongolian horse is small, hardy, and tireless. Mongol children learn to ride before they can walk, and every warrior maintains a string of remounts for campaign."
 nd_mgo_felt_ger_camps: "Felt Ger Encampments"
 nd_mgo_felt_ger_camps_desc: "The portable felt ger allows entire armies to carry their homes with them, maintaining supply lines across the vast steppe without fixed logistics."
 nd_mgo_horse_breeding: "Horse Breeding Tradition"
 nd_mgo_horse_breeding_desc: "Selective breeding of Mongolian horses produces mounts legendary for endurance, able to subsist on sparse steppe grass and cover enormous distances."
 nd_mgo_ovoo_veneration: "Ovoo Veneration"
 nd_mgo_ovoo_veneration_desc: "Sacred stone cairns mark the spiritual landscape of the steppe. Travelers pause to circle an ovoo three times and add a stone, honoring the spirits of sky, earth, and water."
 nd_mgo_wolf_hunt_drills: "Wolf Hunt Drills"
 nd_mgo_wolf_hunt_drills_desc: "The great winter wolf hunt serves as both training exercise and population control. Hunters form enormous circles that tighten over days — the same encirclement tactics used in war."
 nd_mgo_pastoral_wealth: "Pastoral Wealth"
 nd_mgo_pastoral_wealth_desc: "The five types of livestock — horses, cattle, sheep, goats, and camels — form the foundation of Mongolian wealth. Herds numbering in the thousands sustain the nation."
 nd_mgo_chinggisid_lineage: "Chinggisid Lineage"
 nd_mgo_chinggisid_lineage_desc: "Only a descendant of Chinggis Khan may rightfully rule the Mongols. This principle of blood legitimacy unites the steppe under recognized authority."
 nd_mgo_noyan_retinues: "Noyan Retinues"
 nd_mgo_noyan_retinues_desc: "Each noyan — a hereditary Mongol lord — maintains a personal retinue of heavily armored cavalrymen, the elite core around which the tumen's fighting strength is organized."
 nd_mgo_tumen_system: "Tumen Organization"
 nd_mgo_tumen_system_desc: "The decimal system organizes warriors into units of ten, hundred, thousand, and ten thousand. Each tumen operates as a self-contained army with its own command structure."
 nd_mgo_trans_steppe_trade: "Trans-Steppe Trade"
 nd_mgo_trans_steppe_trade_desc: "Merchants traverse the vast Mongolian steppe carrying furs, horses, and hides southward, returning with grain, silk, and iron goods from settled neighbors."
 nd_mgo_kurultai_tradition: "Kurultai Tradition"
 nd_mgo_kurultai_tradition_desc: "The great assembly of Mongol nobles convenes to elect khans, resolve disputes, and plan campaigns. This tradition of deliberative governance balances the khan's authority."
 nd_mgo_composite_bow_mastery: "Composite Bow Mastery"
 nd_mgo_composite_bow_mastery_desc: "Mongolian bowyers perfect the art of layering horn, wood, and sinew into compact recurve bows of extraordinary power, accurate from horseback at full gallop."
 nd_mgo_steppe_diplomacy: "Steppe Diplomacy"
 nd_mgo_steppe_diplomacy_desc: "Mongol diplomatic traditions blend threat and accommodation — the exchange of envoys, marriage alliances between noble houses, and the careful management of tribute relationships."
 nd_mgo_hide_processing: "Hide and Wool Processing"
 nd_mgo_hide_processing_desc: "Mongolian craftsmen transform raw animal products into valued trade goods: felt from wool, leather from hides, and furs that command premium prices in Chinese and Central Asian markets."
 nd_mgo_dayan_khan_restoration: "Dayan Khan's Restoration"
 nd_mgo_dayan_khan_restoration_desc: "Batumongke Dayan Khan reasserted Chinggisid central authority over the fractured Mongol confederation, distributing the six eastern tumens among his sons to create a new governing order."
 nd_mgo_yam_relay_posts: "Yam Relay Posts"
 nd_mgo_yam_relay_posts_desc: "The ortoo relay stations, spaced a day's ride apart across the steppe, allow messages and supplies to traverse Mongolia's vast distances with remarkable speed."
 nd_mgo_six_tumens: "The Six Tumens"
 nd_mgo_six_tumens_desc: "Dayan Khan's reorganization of the eastern Mongols into six great tumens — Chakhar, Khalkha, Uriankhai, Ordos, Tumed, and Yonshiyebu — restored the military-administrative framework of the empire."
 nd_mgo_mongolian_script: "Mongolian Script"
 nd_mgo_mongolian_script_desc: "The traditional Mongolian script, written in vertical columns, preserves chronicles, legal codes, and correspondence. Literacy spreads through scribal traditions maintained by noble households."
 nd_mgo_caravan_routes: "Caravan Routes"
 nd_mgo_caravan_routes_desc: "Trade routes crossing the Mongolian steppe connect China to Central Asia, carrying tea, silk, and porcelain eastward and furs, horses, and livestock westward."
 nd_mgo_steppe_fortification: "Steppe Fortification"
 nd_mgo_steppe_fortification_desc: "Watchtowers and defensive positions exploit the steppe's vastness. Scorched earth tactics and the hostile climate create attrition that breaks invading armies."
 nd_mgo_sky_worship_rites: "Sky Worship Rites"
 nd_mgo_sky_worship_rites_desc: "Tengri worship, veneration of the Eternal Blue Sky, binds the Mongolian identity to the limitless heavens above the steppe. Royal ceremonies invoke the sky's blessing on the khan's rule."
 nd_mgo_altan_khan_reforms: "Altan Khan's Reforms"
 nd_mgo_altan_khan_reforms_desc: "Altan Khan's 1578 alliance with the Dalai Lama initiated Mongolia's transformation from a shamanistic warrior culture to a Buddhist civilization, banning blood sacrifice and promoting monastic education."
 nd_mgo_keshig_tradition: "Keshig Tradition"
 nd_mgo_keshig_tradition_desc: "The keshig — the khan's personal guard — represents the finest warriors of Mongolia. Membership is a supreme honor, and keshig soldiers outrank ordinary commanders."
 nd_mgo_gelug_monasteries: "Gelug Monasteries"
 nd_mgo_gelug_monasteries_desc: "Great monasteries in the Gelug tradition rise across Mongolia. Erdene Zuu, built on the site of ancient Karakorum, houses a thousand monks and becomes the center of Mongolian Buddhist learning."
 nd_mgo_ming_border_markets: "Ming Border Markets"
 nd_mgo_ming_border_markets_desc: "The horse markets along the Ming-Mongol border exchange Mongolian warhorses and livestock for Chinese grain, tea, silk, and iron. This trade sustains the steppe economy."
 nd_mgo_imperial_guard_reform: "Imperial Guard Reform"
 nd_mgo_imperial_guard_reform_desc: "The keshig is reorganized along professional lines, with systematic training in both mounted and dismounted combat, creating an elite force loyal to the khan alone."
 nd_mgo_chinggisid_law_code: "Chinggisid Law Code"
 nd_mgo_chinggisid_law_code_desc: "Building on the legacy of the Great Yasa, Mongolian lawmakers codify steppe law into a comprehensive system governing inheritance, criminal justice, and the obligations of lords to their khan."
 nd_mgo_horse_relay_expansion: "Horse Relay Expansion"
 nd_mgo_horse_relay_expansion_desc: "The ortoo system is extended and strengthened. Fresh horses at every station allow riders to cover vast distances in days, binding the far-flung Mongolian territories together."
 nd_mgo_zanbuurch_corps: "Zanbuurch Corps"
 nd_mgo_zanbuurch_corps_desc: "Mongolian warriors adopt firearms from their Chinese and Central Asian neighbors. The zanbuurch — matchlock musketeers — bring gunpowder warfare to the steppe without abandoning mounted traditions."
 nd_mgo_khalka_unification: "Khalka Unification"
 nd_mgo_khalka_unification_desc: "The four Khalka khanates — Tushegtii, Setsen, Zasagt, and Jasaktu — acknowledge a common Mongolian identity, ending centuries of inter-Khalka rivalry."
 nd_mgo_steppe_artillery: "Steppe Artillery"
 nd_mgo_steppe_artillery_desc: "Siege warfare comes to the steppe. Mongolian forces acquire and employ artillery pieces, adding a new dimension to a military tradition built on cavalry mobility."
 nd_mgo_jebtsundamba_line: "Jebtsundamba Lineage"
 nd_mgo_jebtsundamba_line_desc: "The Jebtsundamba Khutuktu becomes Mongolia's highest spiritual authority. Beginning with the brilliant Zanabazar, this line of incarnate lamas unites Buddhist piety with Chinggisid heritage."
 nd_mgo_nomadic_resilience: "Nomadic Resilience"
 nd_mgo_nomadic_resilience_desc: "Generations of steppe life have bred extraordinary endurance into the Mongolian soldier. They fight on minimal supplies, endure extremes of cold and heat, and recover from setbacks that would destroy settled armies."
 nd_mgo_border_defense_system: "Border Defense System"
 nd_mgo_border_defense_system_desc: "Mongolia establishes a coordinated defense network across its frontiers, combining mobile cavalry patrols, garrisoned watch posts, and the rapid communication of the ortoo relay system."
 nd_mgo_steppe_modernization: "Steppe Modernization"
 nd_mgo_steppe_modernization_desc: "New technologies and methods reach the steppe. Fixed settlements grow alongside the nomadic camps, and Mongolia begins to develop the infrastructure of a modern state."
 nd_mgo_mongolian_renaissance: "Mongolian Cultural Renaissance"
 nd_mgo_mongolian_renaissance_desc: "A flowering of Mongolian arts and letters — new chronicles record national history, Buddhist art achieves new heights of refinement, and the Soyombo script symbolizes a confident Mongolian identity."
 nd_mgo_national_cavalry_reform: "National Cavalry Reform"
 nd_mgo_national_cavalry_reform_desc: "Mongolia's legendary cavalry tradition is adapted to modern warfare. Mounted units integrate firearms and artillery support while preserving the mobility and horsemanship that defined Mongol armies for centuries."
 nd_mgo_eternal_blue_sky: "Legacy of the Eternal Blue Sky"
 nd_mgo_eternal_blue_sky_desc: "The ancient Tengri heritage — the reverence for sky, earth, and the spirits of nature — blends with Buddhist philosophy to create a uniquely Mongolian spiritual tradition that endures across the ages."
 nd_mgo_modern_administration: "Modern Administration"
 nd_mgo_modern_administration_desc: "Mongolia develops a centralized administrative system, replacing the informal authority of nomadic khans with systematic governance, record-keeping, and bureaucratic institutions."
 nd_mgo_great_steppe_legacy: "Great Steppe Legacy"
 nd_mgo_great_steppe_legacy_desc: "The martial traditions of the steppe live on. Mongolia's armies maintain the cavalry excellence and nomadic endurance that once conquered the largest contiguous empire in human history."
 a_nd_mgo_mangudai: "Mangudai"
 a_nd_mgo_mangudai_desc: "Elite mounted archers who specialize in feigned retreat tactics, drawing enemies into pursuit before wheeling to deliver devastating volleys. Their name means 'brave ones of fortune.'"
 a_nd_mgo_tumen_rider: "Tumen Cavalry"
 a_nd_mgo_tumen_rider_desc: "The disciplined core of the Mongolian army, organized in the ancient decimal system. Tumen cavalry combine the mobility of steppe horsemen with the coordinated discipline of professional soldiers."
 a_nd_mgo_keshig: "Keshig Guard"
 a_nd_mgo_keshig_desc: "The khan's personal guard, chosen from the finest warriors of every tumen. Keshig soldiers are the most trusted and skilled fighters in Mongolia, sworn to defend the khan with their lives."
 a_nd_mgo_zanbuurch: "Zanbuurch Musketeers"
 a_nd_mgo_zanbuurch_desc: "Mongolian warriors armed with matchlock firearms adopted from Chinese and Central Asian neighbors. They combine the accuracy of settled musketeers with the toughness of steppe fighters."
 a_nd_mgo_modern_cavalry: "Khalkha Hussars"
 a_nd_mgo_modern_cavalry_desc: "Reformed Mongolian cavalry equipped with carbines and sabers, blending centuries of steppe horsemanship with modern military discipline and firearm tactics."
 a_nd_mgo_khorchin_rider: "Khorchin Raider"
 a_nd_mgo_khorchin_rider_desc: "Light cavalry from the eastern Khorchin tribes, famed for their speed and raiding prowess. They strike like the steppe wind — swift, sudden, and gone before the enemy can respond."
 a_nd_mgo_noyan_cavalry: "Noyan Heavy Cavalry"
 a_nd_mgo_noyan_cavalry_desc: "The armored retinue of a Mongol lord, clad in lamellar armor and wielding lance and saber. They form the shock force that breaks enemy formations."
 nd_mgo_ger_encampment: "Ger Encampment"
 nd_mgo_ger_encampment_desc: "A semi-permanent camp of portable felt tents that serves as a military staging ground. The ger encampment provides shelter, storage, and a rallying point for levy forces."
 nd_mgo_ger_maintenance: "Ger Upkeep"
 nd_mgo_ger_maintenance_desc: "Wool felt, timber, and animal furs for maintaining the portable ger shelters and keeping the encampment's warriors warm."
 nd_mgo_bow_craft_method: "Composite Bow Workshop"
 nd_mgo_bow_craft_method_desc: "Skilled bowyers craft the legendary Mongolian composite bow from layers of wood, horn, and sinew using specialized tools, producing weapons of extraordinary range and power."
 nd_mgo_ortoo_station: "Ortoo Relay Station"
 nd_mgo_ortoo_station_desc: "A station in the yam postal relay system, maintaining fresh horses and riders to carry messages and supplies across the vast Mongolian steppe with extraordinary speed."
 nd_mgo_relay_upkeep: "Relay Horse Upkeep"
 nd_mgo_relay_upkeep_desc: "Fresh horses, fodder, and millet grain for the relay station's remount string and riders, ensuring that dispatches never wait for a rested mount."
 nd_mgo_ovoo_cairn: "Ovoo Cairn"
 nd_mgo_ovoo_cairn_desc: "A sacred stone cairn where travelers pause to honor the spirits of sky, earth, and water. Ovoos mark holy places across the steppe and serve as gathering points for seasonal ceremonies."
 nd_mgo_ovoo_offerings: "Ovoo Offerings"
 nd_mgo_ovoo_offerings_desc: "Livestock sacrificed, beeswax candles burned, and dairy offerings left at the sacred ovoo to honor the spirits of sky, earth, and water."
 nd_mgo_horse_grounds: "Horse Breeding Grounds"
 nd_mgo_horse_grounds_desc: "Dedicated pastures where Mongolian horses are selectively bred for the endurance, hardiness, and speed that make them the finest warhorses of the steppe."
 nd_mgo_horse_care: "Horse Herd Management"
 nd_mgo_horse_care_desc: "Selective breeding of hardy Mongolian horses from carefully managed herds, producing mounts prized across the steppe for their endurance."
 nd_mgo_kurultai_grounds: "Kurultai Grounds"
 nd_mgo_kurultai_grounds_desc: "The great assembly ground where Mongol nobles gather to elect khans, declare wars, and resolve disputes. The kurultai tradition embodies the deliberative governance of the steppe."
 nd_mgo_assembly_costs: "Assembly Provisions"
 nd_mgo_assembly_costs_desc: "Livestock for feasting, wool for the great pavilion tents, and millet grain to sustain the hundreds of noble retinues gathered at the kurultai."
 nd_mgo_buddhist_monastery: "Gelug Monastery"
 nd_mgo_buddhist_monastery_desc: "A grand Buddhist monastery in the Tibetan Gelug tradition. Hundreds of monks study sutras, produce art, and maintain libraries that make these institutions the intellectual heart of Mongolia."
 nd_mgo_monastery_upkeep: "Monastic Upkeep"
 nd_mgo_monastery_upkeep_desc: "Livestock to feed the monastic community, paper for copying sacred texts, and beeswax for the ritual lamps that illuminate the monastery's temples."
 nd_mgo_steppe_trading_post: "Steppe Trading Post"
 nd_mgo_steppe_trading_post_desc: "A market settlement along the trans-steppe trade routes where Mongolian herders exchange livestock, furs, and hides for manufactured goods, grain, and luxury items from settled neighbors."
 nd_mgo_steppe_trade_goods: "Trade Post Goods"
 nd_mgo_steppe_trade_goods_desc: "Furs, livestock, and leather goods brought to market by herders and hunters from across the steppe."
 nd_mgo_caravan_tolls: "Caravan Toll Collection"
 nd_mgo_caravan_tolls_desc: "Horses, livestock, and furs demanded from passing caravans in exchange for safe passage and access to the trading post's facilities."
 nd_mgo_scribal_workshop: "Scribal Workshop"
 nd_mgo_scribal_workshop_desc: "A center for Mongolian calligraphy and record-keeping, where scribes copy chronicles, legal codes, and diplomatic correspondence in the elegant vertical Mongolian script."
 nd_mgo_scribal_materials: "Scribal Materials"
 nd_mgo_scribal_materials_desc: "Paper, dyes for ink, and beeswax for candles and seals — the essential supplies of the scribes who maintain Mongolia's written records and chronicles."
 nd_mgo_steppe_watchtower: "Steppe Watchtower"
 nd_mgo_steppe_watchtower_desc: "A defensive lookout position on the open steppe, manned by garrison troops who can spot approaching enemies across vast distances and relay warnings through the ortoo system."
 nd_mgo_watchtower_upkeep: "Watchtower Garrison"
 nd_mgo_watchtower_upkeep_desc: "Timber for repairs, weapons for the garrison, and horses for patrol riders who man this frontier outpost."
 nd_mgo_border_market: "Border Market"
 nd_mgo_border_market_desc: "A bustling market at the frontier where Mongolian horses, livestock, and furs are exchanged for Chinese grain, tea, silk, and manufactured goods. These markets sustain the steppe economy."
 nd_mgo_border_trade_goods: "Border Trade Goods"
 nd_mgo_border_trade_goods_desc: "Horses, furs, and livestock brought to the border for exchange with Chinese and Central Asian merchants."
 nd_mgo_incarnation_palace: "Incarnation Palace"
 nd_mgo_incarnation_palace_desc: "The grand residence of the Jebtsundamba Khutuktu, Mongolia's highest incarnate lama. Part monastery, part royal court, it serves as the spiritual and cultural center of Mongolian Buddhism."
 nd_mgo_palace_upkeep: "Palace Upkeep"
 nd_mgo_palace_upkeep_desc: "Silk for ceremonial robes, paper for sacred texts, and livestock to feed the palace's monastic community."
 nd_mgo_felt_manufactory: "Felt Manufactory"
 nd_mgo_felt_manufactory_desc: "An industrial-scale facility for processing Mongolian wool into high-quality felt, the essential material of steppe life used in everything from ger walls to saddle padding."
 nd_mgo_felt_production: "Felt Production"
 nd_mgo_felt_production_desc: "Mongolian wool processed into high-quality felt cloth through traditional rolling and pressing techniques, now applied at industrial scale."
 levy_nd_mgo_noyan_cavalry: "Noyan Heavy Cavalry Levy"
 levy_nd_mgo_noyan_cavalry_desc: "Noble retainers called to service in their lord's heavy cavalry."
 levy_nd_mgo_khorchin_rider: "Khorchin Raider Levy"
 levy_nd_mgo_khorchin_rider_desc: "Light horsemen raised from the pastoral communities of the steppe."
 nd_mgo_formed_tt: "Mongolia has been formed"
 nd_mgo_path_a_tt: "Chose Chinggisid Restoration"
 nd_mgo_path_b_tt: "Chose Yellow Hat Patronage"
 nd_mgo_destiny: "Destiny of Mongolia"
 nd_mgo_destiny_desc: "Mongolia has been reformed. The steppe awaits a new purpose -- will the heirs of Chinggis Khan reclaim their empire, or forge a new path entirely?"
 nd_mgo_dest_yuan_return: "Return to Dadu"
 nd_mgo_dest_yuan_return_desc: "The old Yuan capital beckons. Seize Dadu and the northern gateway at Datong to announce that the Great Khan has returned."
 nd_mgo_dest_mandate_reclaimed: "The Mandate Reclaimed"
 nd_mgo_dest_mandate_reclaimed_desc: "Secure Manchuria and the Gansu corridor. With Shenyang and Lanzhou under Mongol control, the path to the heartland lies open."
 nd_mgo_dest_great_yuan: "The Great Yuan Restored"
 nd_mgo_dest_great_yuan_desc: "Complete the restoration of Mongol supremacy. Hold the Central Plains, the southern capital, and command the Silk Road from Kashgar to Kaifeng."
 nd_mgo_dest_dharma_steppe: "The Dharma Comes to the Steppe"
 nd_mgo_dest_dharma_steppe_desc: "Forge the spiritual bond between Mongolia and Tibet. Control Lhasa and accumulate the wealth to sustain a Buddhist civilization on the steppe."
 nd_mgo_dest_sangha_realm: "The Sangha Realm"
 nd_mgo_dest_sangha_realm_desc: "Build a prosperous Buddhist kingdom through trade and learning. Embrace modern banking, secure tea in your markets, and let wisdom replace the sword."
 nd_mgo_dest_eternal_dharma: "The Eternal Dharma"
 nd_mgo_dest_eternal_dharma_desc: "Transform Mongolia into an enduring center of Buddhist civilization. Spread literacy through the printing press and develop the steppe beyond what any khan dreamed possible."
 nd_mgo.6.t: "The Destiny of Mongolia"
 nd_mgo.6.d: "Mongolia stands reformed, a power of the steppe once more. The great sky stretches endlessly overhead, and beneath it the Mongolian nation draws breath for the first time in generations. But what shall this nation become?\n\nThe path chosen at our formation now opens before us. Whether we march toward the restoration of the Great Yuan or toward a new era of dharma and learning, the destiny of the Mongolian people is ours to shape."
 nd_mgo.6.a: "The Eternal Blue Sky watches over us"
 nd_mgo.7.t: "Mongol Banners Over Dadu"
 nd_mgo.7.d: "The great city of Dadu -- Khanbaliq, the City of the Khan -- has fallen to Mongolian arms once more. Not since Toghon Temur fled northward in 1368 has a Mongol ruler sat in the old Yuan capital. The Forbidden City that Kublai Khan built stands as it always has, waiting for its rightful masters.\n\nWith Datong secured as the gateway between steppe and settled lands, the first step of the Great Yuan restoration is complete. The peoples of the north look to the Mongol banner with a mixture of awe and fear -- for they remember what it meant the last time it flew over these walls."
 nd_mgo.7.a: "Dadu is ours again -- as it was always meant to be"
 nd_mgo.8.t: "The Northern Mandate"
 nd_mgo.8.d: "With Manchuria under our heel and the Gansu corridor secured, the strategic position of the old Yuan dynasty has been restored in all but name. From Shenyang to Lanzhou, Mongol authority extends across the breadth of northern China.\n\nBut how shall we govern these vast conquests? Some counselors urge the path of terror -- let the reputation of Mongol riders freeze our enemies in their tracks before battle is even joined. Others argue for disciplined occupation -- the iron yoke of systematic Mongol administration that extracts tribute and soldiers from every conquered province."
 nd_mgo.8.a: "Let the terror of our name go before us"
 nd_mgo.8.b: "Discipline and order shall bind our conquests"
 nd_mgo.9.t: "The Great Yuan Lives Again"
 nd_mgo.9.d: "From the Silk Road cities of Kashgar to the canals of Hangzhou, from the Central Plains of Kaifeng to the steppe heartland of Karakorum, the Mongol empire has been reborn. What Chinggis Khan began and Kublai Khan perfected, we have now restored.\n\nThe question that faces every great conqueror now confronts us: shall we rule this empire from the Khanbaliq throne as emperors of a settled civilization, managing subjects and building institutions? Or shall we remain what we have always been -- world conquerors, for whom the horizon is never the boundary but merely the next objective?"
 nd_mgo.9.a: "We shall rule from the Khanbaliq throne"
 nd_mgo.9.b: "The world itself is our birthright"
 nd_mgo.10.t: "The Light of the Dharma"
 nd_mgo.10.d: "The sacred bond between Mongolia and Tibet has been sealed. With Lhasa under Mongolian protection, the Yellow Hat teachings flow freely northward across the mountains. Monks from Drepung and Sera travel to the steppe, founding monasteries and teaching the dharma to eager Mongolian students.\n\nThis is not merely a matter of faith. The monasteries bring literacy, record-keeping, medicine, and a cosmopolitan network of learning that connects Mongolia to the wider Buddhist world. The wealth accumulated through careful stewardship sustains this transformation -- proving that Mongolia can be great without conquest alone."
 nd_mgo.10.a: "The dharma illuminates the steppe"
 nd_mgo.11.t: "A Kingdom of Monks and Merchants"
 nd_mgo.11.d: "Mongolia has become something its warrior ancestors would scarcely recognize: a prosperous realm of monasteries, markets, and learning. The banking institutions adopted from distant lands allow the monasteries to manage their growing wealth, while the tea trade with China enriches every settlement along the caravan routes.\n\nBut which aspect of this transformation shall we emphasize? Some advocate deepening the monastic tradition -- building more monasteries, training more scholars, letting the wisdom of the sangha guide our nation's growth. Others point to the tea road and argue that Mongolia's future lies in trade -- that the wealth flowing through our markets will accomplish what armies never could."
 nd_mgo.11.a: "Deepen the wisdom of the sangha"
 nd_mgo.11.b: "The tea road is our path to greatness"
 nd_mgo.12.t: "The Eternal Dharma of the Steppe"
 nd_mgo.12.d: "Mongolia has achieved what no one thought possible: a nomadic civilization that rivals any settled kingdom in learning, prosperity, and culture. The great monastery complex at Erdene Zuu stands on the ruins of ancient Karakorum, where once the world's conquerors held court -- now it is monks and scholars who gather here, not warriors.\n\nThe Soyombo script created by Zanabazar has become a symbol of Mongolian identity itself, adorning everything from monastery gates to official documents. Shall we carry Zanabazar's vision forward -- using culture and art as the tools of soft power? Or shall we build a universal sangha, a Buddhist community that transcends borders and binds all peoples of the steppe under the dharma's gentle authority?"
 nd_mgo.12.a: "Zanabazar's vision shall be our guide"
 nd_mgo.12.b: "Let the sangha unite all peoples"
 STATIC_MODIFIER_NAME_nd_mgo_dest_steppe_terror: "Terror of the Steppe"
 STATIC_MODIFIER_DESC_nd_mgo_dest_steppe_terror: "The reputation of Mongol riders precedes them. Cities submit rather than face the consequences of resistance, and enemies hesitate to challenge the heirs of Chinggis Khan."
 STATIC_MODIFIER_NAME_nd_mgo_dest_iron_yoke: "The Iron Yoke"
 STATIC_MODIFIER_DESC_nd_mgo_dest_iron_yoke: "Systematic Mongol administration extracts soldiers and tribute from conquered provinces with ruthless efficiency, though the constant demand for troops wears on the people."
 STATIC_MODIFIER_NAME_nd_mgo_dest_khanbaliq_throne: "Throne of Khanbaliq"
 STATIC_MODIFIER_DESC_nd_mgo_dest_khanbaliq_throne: "The Great Khan rules from the Khanbaliq throne as emperor of a vast domain, commanding loyalty from diverse subjects and building the institutions of a settled empire."
 STATIC_MODIFIER_NAME_nd_mgo_dest_world_conqueror: "World Conqueror"
 STATIC_MODIFIER_DESC_nd_mgo_dest_world_conqueror: "The Mongol drive for universal empire continues. Intelligence networks and legal pretexts for war are developed at pace, though maintaining such vast armies strains the treasury."
 STATIC_MODIFIER_NAME_nd_mgo_dest_monastic_wisdom: "Monastic Wisdom"
 STATIC_MODIFIER_DESC_nd_mgo_dest_monastic_wisdom: "The monasteries have become the engines of Mongolian growth, attracting settlers and merchants. But prosperity can breed complacency in a nation that once lived by the sword."
 STATIC_MODIFIER_NAME_nd_mgo_dest_tea_road_riches: "Tea Road Riches"
 STATIC_MODIFIER_DESC_nd_mgo_dest_tea_road_riches: "The great tea caravans crossing the steppe pour wealth into Mongolian coffers and open diplomatic channels, though the influx of silver drives prices upward."
 STATIC_MODIFIER_NAME_nd_mgo_dest_soyombo_legacy: "Soyombo Legacy"
 STATIC_MODIFIER_DESC_nd_mgo_dest_soyombo_legacy: "Zanabazar's cultural achievements -- the Soyombo script, Buddhist sculpture, and monastic architecture -- become tools of Mongolian soft power, winning influence where armies cannot."
 STATIC_MODIFIER_NAME_nd_mgo_dest_universal_sangha: "Universal Sangha"
 STATIC_MODIFIER_DESC_nd_mgo_dest_universal_sangha: "The Buddhist sangha transcends borders, creating a spiritual community that eases relations with fellow Buddhist nations and gives the clergy unprecedented influence."
 nd_mgo_yuan_imperial_palace: "Yuan Imperial Palace"
 nd_mgo_yuan_imperial_palace_desc: "The restored palace of the Great Khan in Khanbaliq, rebuilt in the grandeur of the Yuan dynasty. From its halls, the Mongol emperor commands the wealth of China and the loyalty of a hundred peoples."
 nd_mgo_imperial_court_upkeep: "Imperial Court"
 nd_mgo_imperial_court_upkeep_desc: "The restored Yuan court demands silk robes, fine porcelain, elegant furnishings, and quality cloth to maintain the splendor befitting the Great Khan's dignity."
 nd_mgo_erdene_zuu_complex: "Erdene Zuu Complex"
 nd_mgo_erdene_zuu_complex_desc: "The great monastery complex at the site of ancient Karakorum, housing hundreds of monks, libraries of sacred texts, and workshops for Buddhist art. The spiritual heart of Mongolian civilization."
 nd_mgo_erdene_zuu_upkeep: "Monastery Complex Upkeep"
 nd_mgo_erdene_zuu_upkeep_desc: "Paper for copying sacred texts, beeswax for ritual lamps, livestock to feed the monastic community, and incense for daily worship sustain this great center of learning."
