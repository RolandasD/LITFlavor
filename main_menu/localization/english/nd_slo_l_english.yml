l_english:

 # Formation Event
 nd_slo.1.t: "The Birth of Slovakia"
 nd_slo.1.d: "From the mist-shrouded peaks of the Carpathians to the gold-rich valleys of the Ore Mountains, a new nation stirs. For centuries, the Slovak people have been the miners, shepherds, and soldiers of Upper Hungary -- their silver funded empires, their fortresses held the mountain passes, their towns grew wealthy on copper and coin. Now, as Slovakia stands on its own, a choice presents itself: shall we build upon the wealth beneath our mountains, or upon the strength of the passes that guard them?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_slo.1.a: "We are the Mining Crown of the Carpathians"
 nd_slo.1.b: "We are the Frontier Bastion of Christendom"

 # Formation Timed Modifiers
 STATIC_MODIFIER_NAME_nd_slo_mining_crown: "Mining Crown of the Carpathians"
 STATIC_MODIFIER_DESC_nd_slo_mining_crown: "Slovakia's mineral wealth -- silver from Banska Stiavnica, gold from Kremnica, copper from Banska Bystrica -- forms the bedrock of a new national prosperity. Technical innovation in the mines drives institutional advancement."
 STATIC_MODIFIER_NAME_nd_slo_frontier_bastion: "Frontier Bastion of Christendom"
 STATIC_MODIFIER_DESC_nd_slo_frontier_bastion: "Guarding the Carpathian passes against Ottoman and steppe raiders, Slovakia's fortress tradition and mountain militias form the shield of Central Europe. Every valley is a deathtrap for invaders."

 # Advance DHE Event: Thurzo-Fugger Partnership
 nd_slo.2.t: "The Thurzo-Fugger Partnership"
 nd_slo.2.d: "The partnership between the Slovak noble Jan Thurzo and the Augsburg merchant Jakob Fugger has created the mightiest copper enterprise in Europe. Their mines in Banska Bystrica produce nearly half the world's copper, their smelters blaze day and night, and their trading networks stretch from Venice to the Levant. How shall we profit from this extraordinary wealth?"
 nd_slo.2.a: "Grant them exclusive mining rights"
 nd_slo.2.b: "Charter the mining guilds independently"

 # Thurzo-Fugger Event Modifiers
 STATIC_MODIFIER_NAME_nd_slo_thurzo_fugger_monopoly: "Thurzo-Fugger Monopoly"
 STATIC_MODIFIER_DESC_nd_slo_thurzo_fugger_monopoly: "The Thurzo-Fugger enterprise holds exclusive rights to Slovak copper and silver. Their capital and expertise drive production to unprecedented levels."
 STATIC_MODIFIER_NAME_nd_slo_mining_guilds_charter: "Mining Guilds Charter"
 STATIC_MODIFIER_DESC_nd_slo_mining_guilds_charter: "Independent mining guilds compete freely in the Slovak Ore Mountains, building infrastructure and recruiting skilled miners from across Central Europe."

 # Advance DHE Event: Pressburg Coronation City
 nd_slo.3.t: "Coronation City of Pressburg"
 nd_slo.3.d: "With the fall of Buda to the Ottomans, Pressburg -- known to the Slovaks as Bratislava -- has become the coronation city of the Hungarian kings. St. Martin's Cathedral now witnesses the crowning of monarchs, the Diet convenes within our walls, and the archbishop makes his seat here. Pressburg has become the de facto capital of a kingdom. How shall we leverage this extraordinary elevation?"
 nd_slo.3.a: "Let the coronations enhance our prestige"
 nd_slo.3.b: "Develop Pressburg as a commercial hub"

 # Pressburg Event Modifiers
 STATIC_MODIFIER_NAME_nd_slo_coronation_prestige: "Coronation City Prestige"
 STATIC_MODIFIER_DESC_nd_slo_coronation_prestige: "As the seat of royal coronations and the Hungarian Diet, Pressburg commands the respect of European courts and enhances Slovakia's diplomatic standing."
 STATIC_MODIFIER_NAME_nd_slo_pressburg_commerce: "Pressburg Commerce"
 STATIC_MODIFIER_DESC_nd_slo_pressburg_commerce: "Pressburg's position on the Danube, combined with its new status as a political capital, makes it a natural center for trade between Vienna, Buda, and the East."

 # Advance DHE Event: Kuruc Uprising
 nd_slo.4.t: "The Kuruc Uprising"
 nd_slo.4.d: "The dispossessed nobles and Protestant fighters of Upper Hungary have taken up arms as Kuruci -- rebels against Habsburg domination. Led by charismatic commanders, they wage guerrilla warfare through the Carpathian valleys, burning and raiding. The Slovak lands are torn between those who join the rebellion and those who seek accommodation with Vienna. Which path serves our interests?"
 nd_slo.4.a: "Join the Kuruc rebellion!"
 nd_slo.4.b: "Seek accommodation with the Habsburgs"

 # Kuruc Event Modifiers
 STATIC_MODIFIER_NAME_nd_slo_kuruc_rebellion: "Spirit of the Kuruci"
 STATIC_MODIFIER_DESC_nd_slo_kuruc_rebellion: "The fighting spirit of the Kuruc rebels inspires Slovak soldiers. Their guerrilla tactics in the Carpathian valleys prove devastatingly effective against conventional armies."
 STATIC_MODIFIER_NAME_nd_slo_habsburg_accommodation: "Habsburg Accommodation"
 STATIC_MODIFIER_DESC_nd_slo_habsburg_accommodation: "By seeking pragmatic terms with Vienna, Slovakia secures religious tolerance and administrative privileges that ensure stability and diplomatic standing."

 # Advance DHE Event: National Awakening
 nd_slo.5.t: "The Voice of a Nation"
 nd_slo.5.d: "Ludovit Stur has accomplished what centuries of shared suffering could not -- he has given the Slovak people a common language. Meeting at Hlboke in 1843, Stur and his companions Hodza and Hurban have codified standard Slovak based on the Central Slovak dialect. For the first time, Slovaks from Bratislava to Kosice can read the same newspapers, sing the same songs, and dream the same dreams. The Matica Slovenska stands ready to carry this new language to every village in the Carpathians."
 nd_slo.5.a: "Let our language unite us"

 # National Awakening Modifier
 STATIC_MODIFIER_NAME_nd_slo_national_language: "The Slovak National Language"
 STATIC_MODIFIER_DESC_nd_slo_national_language: "The codification of standard Slovak by Ludovit Stur creates a common cultural identity, spurring literacy, cultural production, and national pride across the Slovak lands."

 # Destiny Variable Tooltips
 nd_slo_formed_tt: "Slovakia has been formed"
 nd_slo_path_a_tt: "Chose the Mining Crown path"
 nd_slo_path_b_tt: "Chose the Frontier Bastion path"

 # === ADVANCES ===

 # Age 1 — Traditions
 nd_slo_carpathian_defense: "Carpathian Mountain Defense"
 nd_slo_carpathian_defense_desc: "The mountain passes of the Carpathians are Slovakia's natural fortress. Local militias -- the Horali -- patrol the ridgelines, and watchtowers dot the high ground, providing early warning against raids from any direction."
 nd_slo_mining_privilege: "Royal Mining Privileges"
 nd_slo_mining_privilege_desc: "Hungarian kings grant extensive mining privileges to the towns of the Slovak Ore Mountains, attracting German settlers and establishing the legal framework for Europe's most productive silver and copper mines."
 nd_slo_valasi_herding: "Valasi Pastoral Tradition"
 nd_slo_valasi_herding_desc: "Vlach shepherds migrate into the Carpathian highlands, bringing with them a distinctive pastoral economy centered on sheep herding, bryndza cheese-making, and seasonal transhumance across the mountain meadows."
 nd_slo_royal_charter_towns: "Royal Charter Towns"
 nd_slo_royal_charter_towns_desc: "Mining settlements like Kremnica, Banska Stiavnica, and Banska Bystrica receive royal charters granting them German town law, self-governance, and trading privileges that drive urban development."
 nd_slo_carpathian_faiths: "Carpathian Religious Mosaic"
 nd_slo_carpathian_faiths_desc: "Catholic, Orthodox, and later Protestant communities coexist in the Carpathian borderlands, where the practical demands of mountain life foster a tradition of religious pragmatism."
 nd_slo_castle_building: "Castle Building Tradition"
 nd_slo_castle_building_desc: "The great castles of Spis, Orava, and Trencin dominate the Slovak landscape -- massive stone fortifications built to control mountain passes and river crossings, forming an integrated defensive network."

 # Age 2 — Renaissance
 nd_slo_valasi_riders: "Valasi Shepherd Cavalry"
 nd_slo_valasi_riders_desc: "The mounted shepherds of the Carpathian highlands serve as light cavalry, their intimate knowledge of mountain terrain making them invaluable as scouts and raiders in the rugged country along the frontier."
 nd_slo_kremnica_tradition: "Kremnica Minting Tradition"
 nd_slo_kremnica_tradition_desc: "The Kremnica mint, founded in 1328, produces the famous golden ducats that circulate across Europe. Its precise coinage standards and technical expertise make it one of the most respected mints in Christendom."
 nd_slo_thurzo_fugger: "Thurzo-Fugger Enterprise"
 nd_slo_thurzo_fugger_desc: "The partnership between Jan Thurzo and Jakob Fugger creates the largest copper-producing enterprise in the world, processing nearly forty percent of global output from the mines around Banska Bystrica."
 nd_slo_highland_textiles: "Highland Textile Tradition"
 nd_slo_highland_textiles_desc: "Vlach pastoral communities in the Carpathian highlands develop a tradition of wool processing, producing coarse cloth and felt from their mountain sheep flocks for trade in lowland markets."
 nd_slo_mining_technology: "Mining Technology"
 nd_slo_mining_technology_desc: "Slovak miners pioneer water drainage systems, ventilation shafts, and ore-processing techniques that push mines deeper than ever before, maintaining productivity even as surface deposits are exhausted."
 nd_slo_hungarian_levies: "Hungarian Military Service"
 nd_slo_hungarian_levies_desc: "Slovak soldiers serve in Hungarian royal armies, gaining experience in the frontier wars and developing a reputation as reliable infantry in the campaigns against Ottoman expansion."

 # Age 3 — Discovery
 nd_slo_banska_guard_tradition: "Banska Town Guard"
 nd_slo_banska_guard_tradition_desc: "The wealthy mining towns of the Slovak Ore Mountains maintain professional guards trained in pike and shot tactics, defending their silver and copper from bandits, raiders, and Ottoman incursions."
 nd_slo_pressburg_coronation: "Coronation City of Pressburg"
 nd_slo_pressburg_coronation_desc: "After the fall of Buda to the Ottomans in 1541, Bratislava becomes the coronation city of Hungarian kings. For over two centuries, eleven monarchs are crowned in St. Martin's Cathedral."
 nd_slo_ottoman_frontier: "Ottoman Frontier Defense"
 nd_slo_ottoman_frontier_desc: "Southern Slovakia becomes a battleground as Ottoman forces push northward after Mohacs. Fortified towns and castle garrisons form a defensive line protecting the mining regions from Turkish raids."
 nd_slo_upper_hungary_refuge: "Upper Hungary as Refuge"
 nd_slo_upper_hungary_refuge_desc: "As central Hungary falls under Ottoman occupation, refugees flood northward into Slovakia -- nobles, burghers, scholars, and craftsmen who enrich the cultural and economic life of Upper Hungary."
 nd_slo_advanced_smelting: "Advanced Ore Smelting"
 nd_slo_advanced_smelting_desc: "New smelting techniques developed in the Slovak mining towns extract higher yields from copper and iron ore, producing tools and implements that are traded across Central Europe."
 nd_slo_trnava_university: "University of Trnava"
 nd_slo_trnava_university_desc: "Founded by Jesuits in 1635, the University of Trnava becomes the premier institution of higher learning in Upper Hungary, educating a generation of clergy, lawyers, and administrators."

 # Age 4 — Reformation
 nd_slo_kuruc_revolt: "Kuruc Revolt"
 nd_slo_kuruc_revolt_desc: "The dispossessed Protestant nobles of Upper Hungary rise as Kuruci, waging guerrilla warfare through the Carpathian valleys. Slovak soldiers on both sides gain hard-won experience in mountain combat."
 nd_slo_reformation_towns: "Reformation in the Mining Towns"
 nd_slo_reformation_towns_desc: "Lutheran and Calvinist preachers find fertile ground in Slovakia's mining towns, where literate German and Slovak burghers embrace the new faith, founding schools and printing presses."
 nd_slo_carpathian_economy: "Carpathian Commerce"
 nd_slo_carpathian_economy_desc: "Slovakia's dual economy matures: highland shepherds produce bryndza and wool for market, while the mining towns mint ducats and trade copper ingots across Europe."
 nd_slo_counter_reformation: "Counter-Reformation"
 nd_slo_counter_reformation_desc: "Habsburg-sponsored Catholic revival brings Jesuit missions, new churches, and renewed religious authority to Slovakia. The restored faith commissions sacred jewelry and liturgical art from Kremnica's goldsmiths."
 nd_slo_thokoly_kingdom: "Thokoly's Kingdom"
 nd_slo_thokoly_kingdom_desc: "Imre Thokoly's brief Kingdom of Upper Hungary demonstrates that Slovak territory can serve as a power base independent of both Vienna and Constantinople, inspiring future generations."
 nd_slo_arms_manufacture: "Arms Manufacture"
 nd_slo_arms_manufacture_desc: "The iron forges and copper smelters of the Slovak mining districts begin producing weapons and armor, supplying the frontier garrisons fighting on the Ottoman border."

 # Age 5 — Absolutism
 nd_slo_stiavnica_academy: "Banska Stiavnica Mining Academy"
 nd_slo_stiavnica_academy_desc: "Founded in 1735 and elevated to a royal academy under Maria Theresa, the Mining Academy of Banska Stiavnica becomes the world's first institution of technical higher education, training engineers and mineralogists."
 nd_slo_professional_regiments: "Professional Regiments"
 nd_slo_professional_regiments_desc: "Under Habsburg military reforms, Slovak districts raise professional infantry regiments -- the Toborsek -- trained in linear tactics and equipped with modern firearms."
 nd_slo_theresian_reforms: "Theresian Reforms"
 nd_slo_theresian_reforms_desc: "Maria Theresa's administrative reforms bring centralized governance, standardized taxation, and systematic mineral surveys to Upper Hungary, modernizing the Slovak counties and mapping their geological wealth."
 nd_slo_iron_industry: "Iron Industry"
 nd_slo_iron_industry_desc: "The ironworks of the Slovak mining districts expand from raw smelting to steel production, supplying the growing Habsburg military and industrial demand."
 nd_slo_technical_education: "Technical Education"
 nd_slo_technical_education_desc: "The Mining Academy's curriculum expands to encompass chemistry, metallurgy, cartography, and engineering, producing graduates who advance mining technology across the Habsburg lands."
 nd_slo_industrial_foundations: "Industrial Foundations"
 nd_slo_industrial_foundations_desc: "Timber processing, ironworks, and glass manufacturing expand across the Slovak valleys, laying the foundations for industrial development beyond traditional mining."

 # Age 6 — Revolutions
 nd_slo_national_awakening: "Slovak National Awakening"
 nd_slo_national_awakening_desc: "Ludovit Stur's codification of standard Slovak in 1843 ignites a national cultural movement. Newspapers, literature, and education in the Slovak language forge a common identity from Bratislava to Kosice."
 nd_slo_matica_slovenska: "Matica Slovenska"
 nd_slo_matica_slovenska_desc: "The Matica Slovenska, founded in 1863, becomes the institutional heart of Slovak cultural life -- promoting literature, education, and the standard language across the Carpathian region."
 nd_slo_volunteer_corps: "Slovak Volunteer Corps"
 nd_slo_volunteer_corps_desc: "In the revolutionary year of 1848, Slovak volunteers led by Stur, Hodza, and Hurban take up arms for national rights, fighting for recognition against Hungarian revolutionary forces."
 nd_slo_emancipation: "Peasant Emancipation"
 nd_slo_emancipation_desc: "The abolition of serfdom frees the Slovak peasantry, unlocking population growth and economic mobility as former serfs enter the urban workforce and expand agricultural production."
 nd_slo_mining_industrialization: "Mining Industrialization"
 nd_slo_mining_industrialization_desc: "Steam engines, rail transport, and modern mining techniques transform Slovakia's ancient mining industry, increasing production and connecting the Ore Mountains to European markets."
 nd_slo_pan_slavic_congress: "Pan-Slavic Congress"
 nd_slo_pan_slavic_congress_desc: "Slovak delegates at the Pan-Slavic Congress of 1848 forge connections with Czech, Polish, Serbian, and other Slavic movements, building diplomatic networks that strengthen Slovakia's position."

 # === UNITS ===
 a_nd_slo_horali: "Horali"
 a_nd_slo_horali_desc: "Carpathian mountain militia drawn from highland villages. Expert ambushers who know every pass, ravine, and ridgeline in the Slovak mountains."
 a_nd_slo_valasi: "Valasi Riders"
 a_nd_slo_valasi_desc: "Mounted Vlach shepherds from the Carpathian highlands. Tough, mobile, and accustomed to operating independently in the most forbidding mountain terrain."
 a_nd_slo_banska_guard: "Banska Guard"
 a_nd_slo_banska_guard_desc: "Professional town guards from the wealthy mining towns of the Slovak Ore Mountains. Well-equipped and disciplined, they defend the silver and copper that funds the kingdom."
 a_nd_slo_toborsek: "Toborsek"
 a_nd_slo_toborsek_desc: "Professional infantry regiments raised from the Slovak mining districts under Habsburg military reforms. Trained in linear warfare and equipped with modern arms."

 # === BUILDINGS ===
 nd_slo_banska_mines: "Banska Mining Works"
 nd_slo_banska_mines_desc: "Industrial mining infrastructure in the Slovak Ore Mountains, exploiting rich deposits of silver, copper, and other metals using advanced drainage and smelting techniques."
 nd_slo_kremnica_mint: "Kremnica Mint"
 nd_slo_kremnica_mint_desc: "One of Europe's most respected mints, producing the famous Kremnica ducats and other coinage from Slovak gold and silver since 1328."
 nd_slo_salas: "Salas"
 nd_slo_salas_desc: "A Vlach shepherd settlement in the Carpathian highlands, centered on seasonal sheep herding, bryndza cheese-making, and wool production."
 nd_slo_carpathian_watchtower: "Carpathian Watchtower"
 nd_slo_carpathian_watchtower_desc: "A fortified observation post commanding a Carpathian mountain pass, providing early warning against raiders and channeling invaders into prepared kill zones."
 nd_slo_mining_academy: "Mining Academy"
 nd_slo_mining_academy_desc: "A technical institution modeled on the Banska Stiavnica academy, training engineers, mineralogists, and metallurgists in the latest mining sciences."

 # === PRODUCTION METHODS ===
 nd_slo_ore_smelting: "Ore Smelting"
 nd_slo_ore_smelting_desc: "Copper and iron ore are smelted into tools and implements using advanced Slovak furnace techniques."
 nd_slo_arms_forging: "Arms Forging"
 nd_slo_arms_forging_desc: "The copper smelters and iron forges of the mining districts produce weapons and armor for frontier garrisons."
 nd_slo_steel_forging: "Steel Forging"
 nd_slo_steel_forging_desc: "Advanced metallurgy in the Slovak mining districts produces high-quality steel from iron and copper alloys for industrial and military use."
 nd_slo_mine_maintenance: "Mine Operations"
 nd_slo_mine_maintenance_desc: "Timber for pit props, iron for tools, and stone for drainage channels sustain the deep mining shafts."
 nd_slo_ducat_minting: "Ducat Minting"
 nd_slo_ducat_minting_desc: "Silver and copper are alloyed and struck into the famous Kremnica ducats, prized across Europe for their consistent weight and purity."
 nd_slo_jewelry_craft: "Goldsmith's Craft"
 nd_slo_jewelry_craft_desc: "Kremnica's master goldsmiths fashion copper and silver into jewelry, sacred vessels, and liturgical ornaments for churches and noble courts."
 nd_slo_mint_maintenance: "Mint Operations"
 nd_slo_mint_maintenance_desc: "Gold reserves, silver stock, and iron dies sustain the continuous operation of the minting process."
 nd_slo_bryndza_making: "Bryndza Making"
 nd_slo_bryndza_making_desc: "Sheep milk and salt are processed into bryndza, a distinctive Carpathian cheese that sustains highland communities and finds markets in lowland towns."
 nd_slo_wool_processing: "Wool Processing"
 nd_slo_wool_processing_desc: "Highland sheep wool is cleaned, carded, and woven into coarse cloth by Vlach pastoral communities in the Carpathian settlements."
 nd_slo_fur_tanning: "Fur Tanning"
 nd_slo_fur_tanning_desc: "Sheepskin and wool are tanned and prepared into warm furs by highland communities, meeting the demand of refugees and settlers in Upper Hungary."
 nd_slo_salas_maintenance: "Pastoral Upkeep"
 nd_slo_salas_maintenance_desc: "Livestock, salt for preservation, and wool for warmth sustain the seasonal cycle of Carpathian pastoral life."
 nd_slo_frontier_provisions: "Frontier Provisions"
 nd_slo_frontier_provisions_desc: "Livestock and salt supply the frontier garrisons, equipping the soldiers manning the Carpathian watchtowers against Ottoman raids."
 nd_slo_watchtower_maintenance: "Watchtower Garrison"
 nd_slo_watchtower_maintenance_desc: "Timber, stone, and weapons equip the small garrison manning this mountain observation post."
 nd_slo_academy_instruction: "Academy Instruction"
 nd_slo_academy_instruction_desc: "Paper for technical drawings and books for lectures support the academy's teaching mission in mineralogy and engineering."
 nd_slo_mineral_surveys: "Mineral Surveys"
 nd_slo_mineral_surveys_desc: "Glass instruments and iron tools enable systematic geological surveys of the Ore Mountains, mapping mineral deposits for the academy's mining research."
 nd_slo_academy_maintenance: "Academy Upkeep"
 nd_slo_academy_maintenance_desc: "Books, paper, and building materials sustain the academy's library, laboratories, and lecture halls."

 # ===== DESTINY ADVANCES =====

 nd_slo_destiny: "The Carpathian Crossroads"
 nd_slo_destiny_desc: "Slovakia stands at the crossroads of Central Europe. Rich in minerals and guarded by mountain passes, this young nation must choose its path -- will it be known for the wealth beneath its peaks, or the strength of the walls that guard them?"

 # Path A: Mining Crown
 nd_slo_dest_ore_mountains: "Masters of the Ore Mountains"
 nd_slo_dest_ore_mountains_desc: "Extend Slovak mining control beyond the homeland into the mineral-rich Silesian borderlands. Control of Krnov and Fryvaldov brings new silver and gold deposits under our administration."
 nd_slo_dest_silver_road: "The Silver Road"
 nd_slo_dest_silver_road_desc: "The Thurzo-Fugger partnership showed how Slovak metals could reach European markets. Secure the trade route to Augsburg and build the financial institutions to manage a mineral empire."
 nd_slo_dest_montanistica: "Academia Montanistica"
 nd_slo_dest_montanistica_desc: "Transform Slovakia into Europe's center of mining science. Control the great trade cities of Nuremberg and Wroclaw, develop the homeland to its full potential, and let the Bergamt administer a mineral empire."

 # Path B: Frontier Bastion
 nd_slo_dest_pass_guard: "Guardians of the Passes"
 nd_slo_dest_pass_guard_desc: "Secure the southern approaches by taking Eger and Miskolc. These fortress towns guard the gateway between the Hungarian plain and the Carpathian highlands -- in Slovak hands, they seal the mountain wall."
 nd_slo_dest_antemurale: "Antemurale Christianitatis"
 nd_slo_dest_antemurale_desc: "Slovakia claims the ancient title of Bulwark of Christendom. Take Buda itself and build a professional army worthy of this sacred duty."
 nd_slo_dest_carpathian_wall: "The Carpathian Wall"
 nd_slo_dest_carpathian_wall_desc: "From Vienna to Belgrade, the Carpathian defensive line is complete. Slovakia commands the mountain fortress system that shields all of Central Europe."

 # ===== DESTINY EVENTS =====

 # Root Event
 nd_slo.6.t: "The Carpathian Crossroads"
 nd_slo.6.d: "The formation of Slovakia has placed a new power at the heart of Central Europe. The Carpathian Mountains define our nation -- rich with silver and copper beneath their peaks, and impassable to any army that does not know their passes. Our path forward is marked by the choices we made at the founding. Now we must walk that path to its conclusion."
 nd_slo.6.a: "Our destiny awaits in the mountains"

 # Path A Stage 1
 nd_slo.7.t: "Masters of the Ore Mountains"
 nd_slo.7.d: "Our miners have pushed beyond the homeland, bringing the mineral-rich borderlands of Silesia under Slovak administration. The ancient mining traditions of the Ore Mountains -- water pumps, ventilation shafts, advanced smelting -- now serve a greater enterprise. From Kremnica to Krnov, Slovak mining expertise sets the standard for Central Europe."
 nd_slo.7.a: "The mountains yield their treasures to us"

 # Path A Stage 2
 nd_slo.8.t: "The Silver Road"
 nd_slo.8.d: "Slovak silver and copper flow along the trade routes to Augsburg, the financial heart of Europe. The old Thurzo-Fugger partnership has been succeeded by a network of commercial relationships that span the continent. Our metals fund armies and build cathedrals from Lisbon to Constantinople. How shall we organize this extraordinary commerce?"
 nd_slo.8.a: "Cultivate the merchant networks"
 nd_slo.8.b: "Establish a royal mint monopoly"

 # Path A Stage 3
 nd_slo.9.t: "Academia Montanistica"
 nd_slo.9.d: "The Mining Academy of Banska Stiavnica has grown into the foremost institution of technical education in Europe. Its graduates -- engineers, mineralogists, metallurgists -- carry Slovak mining science to every corner of the continent. The Bergamt, our royal mining administration, coordinates a mineral empire stretching from Nuremberg to Wroclaw. This is the apex of Slovak technical civilization."
 nd_slo.9.a: "Let innovation transform our industries"
 nd_slo.9.b: "Let our treasury overflow with gold"

 # Path B Stage 1
 nd_slo.10.t: "Guardians of the Passes"
 nd_slo.10.d: "The fortress towns of Eger and Miskolc now fly the Slovak banner. These ancient strongholds guard the gateway between the Hungarian plain and the Carpathian highlands. With their walls under our command, the southern approaches to Slovakia are sealed. No army can march north through these passes without facing our garrisons."
 nd_slo.10.a: "The mountain wall stands firm"

 # Path B Stage 2
 nd_slo.11.t: "Antemurale Christianitatis"
 nd_slo.11.d: "With the capture of Buda, Slovakia has proven itself the shield of Central Europe. Our professional army, trained in the mountain warfare traditions of the Carpathians, has reclaimed the ancient seat of the Hungarian kings. The title of Antemurale Christianitatis -- Bulwark of Christendom -- belongs to us by right of arms. How shall we consolidate this sacred duty?"
 nd_slo.11.a: "Train our soldiers in mountain warfare"
 nd_slo.11.b: "Fortify every strategic position"

 # Path B Stage 3
 nd_slo.12.t: "The Carpathian Wall"
 nd_slo.12.d: "From Vienna to Belgrade, the Carpathian defensive line is complete. Slovak fortresses command every mountain pass, river crossing, and strategic valley. Our garrison network is the most formidable defensive system in Europe -- armies that enter the Carpathians do not leave. Slovakia has become the immovable shield at the heart of the continent."
 nd_slo.12.a: "None shall pass our walls"
 nd_slo.12.b: "We fight in God's name"

 # ===== DESTINY TIMED MODIFIERS =====

 STATIC_MODIFIER_NAME_nd_slo_dest_fugger_network: "Fugger Trade Network"
 STATIC_MODIFIER_DESC_nd_slo_dest_fugger_network: "Slovak metals flow through the Fugger trade network to markets across Europe. The commercial connections forged by this partnership enhance both wealth and diplomatic standing."
 STATIC_MODIFIER_NAME_nd_slo_dest_mint_monopoly: "Royal Mint Monopoly"
 STATIC_MODIFIER_DESC_nd_slo_dest_mint_monopoly: "The crown exercises exclusive control over Slovak minting and precious metal production. Royal coinage circulates at fixed standards, stabilizing the currency and strengthening crown authority."
 STATIC_MODIFIER_NAME_nd_slo_dest_mining_revolution: "Mining Revolution"
 STATIC_MODIFIER_DESC_nd_slo_dest_mining_revolution: "Slovak mining science has transformed the extraction industry. Steam-powered pumps, precision surveying, and advanced metallurgy make our mines the most productive and innovative in Europe."
 STATIC_MODIFIER_NAME_nd_slo_dest_golden_treasury: "Golden Treasury"
 STATIC_MODIFIER_DESC_nd_slo_dest_golden_treasury: "The accumulated mineral wealth of the Carpathians fills Slovak coffers. This golden treasury funds reconstruction, diplomacy, and territorial consolidation."
 STATIC_MODIFIER_NAME_nd_slo_dest_mountain_warfare: "Mountain Warfare Doctrine"
 STATIC_MODIFIER_DESC_nd_slo_dest_mountain_warfare: "Slovak soldiers are trained in the art of mountain combat -- ambush, guerrilla raids, and the use of terrain to negate numerical superiority. Our raiding parties strip enemy supply lines bare, though maintaining these scattered mountain garrisons strains the treasury."
 STATIC_MODIFIER_NAME_nd_slo_dest_garrison_network: "Integrated Garrison Network"
 STATIC_MODIFIER_DESC_nd_slo_dest_garrison_network: "A coordinated system of fortified towns, watchtower chains, and garrison forces maintains control across the Carpathian frontier. Every pass is watched, every valley patrolled, though the inward military focus slows integration of new territories."
 STATIC_MODIFIER_NAME_nd_slo_dest_unconquerable: "The Unconquerable"
 STATIC_MODIFIER_DESC_nd_slo_dest_unconquerable: "Slovakia's mountain fortress network is legendary. No invading army has successfully conquered the Carpathian wall, and the reputation of Slovak military strength commands respect at the negotiating table, though this martial confidence breeds complacency at court."
 STATIC_MODIFIER_NAME_nd_slo_dest_crusader_spirit: "Crusader Spirit"
 STATIC_MODIFIER_DESC_nd_slo_dest_crusader_spirit: "Slovakia fights with the fervor of a holy cause. As the Bulwark of Christendom, every war is a crusade, every soldier a defender of the faith."

 # ===== DESTINY BUILDINGS =====

 nd_slo_dest_bergamt: "Bergamt"
 nd_slo_dest_bergamt_desc: "The Royal Mining Administration -- a centralized bureau overseeing mineral surveys, mining concessions, assay standards, and technical education across the Slovak mineral empire."
 nd_slo_dest_krajina_fortress: "Krajina Fortress"
 nd_slo_dest_krajina_fortress_desc: "A major frontier fortification commanding a strategic Carpathian approach. Built to withstand prolonged siege and house a permanent garrison of professional soldiers."

 # ===== DESTINY PRODUCTION METHODS =====

 nd_slo_dest_assay_office: "Assay Office"
 nd_slo_dest_assay_office_desc: "Silver and copper are tested, weighed, and certified by crown-appointed assayers before being struck into coinage of guaranteed purity."
 nd_slo_dest_bergamt_maintenance: "Bureau Upkeep"
 nd_slo_dest_bergamt_maintenance_desc: "Paper for records and surveys, tools for geological testing, and iron for mining equipment sustain the Bergamt's administrative operations."
 nd_slo_dest_arms_depot: "Arms Depot"
 nd_slo_dest_arms_depot_desc: "Iron and copper from the Ore Mountains are forged into weapons and armor at the fortress depot, equipping the garrison with locally-produced arms."
 nd_slo_dest_krajina_maintenance: "Fortress Upkeep"
 nd_slo_dest_krajina_maintenance_desc: "Stone for walls, timber for structures, and weapons for the garrison sustain the frontier fortress complex."
