l_english:
 STATIC_MODIFIER_NAME_nd_adu_ornament_of_the_world: "Ornament of the World"
 STATIC_MODIFIER_DESC_nd_adu_ornament_of_the_world: "Al-Andalus shines as a beacon of learning where Muslim, Christian, and Jewish scholars exchange knowledge freely, and the libraries of Cordoba rival any in the world."
 STATIC_MODIFIER_NAME_nd_adu_sword_of_the_maghreb: "Sword of the Maghreb"
 STATIC_MODIFIER_DESC_nd_adu_sword_of_the_maghreb: "Forged in the fires of jihad, the warriors of Al-Andalus march beneath the banner of a purified faith, their Berber cavalry and frontier ghazis striking fear across the peninsula."
 nd_adu.1.t: "The Restoration of Al-Andalus"
 nd_adu.1.d: "The crescent banner flies once more over all of Iberia. Where Christian kingdoms once carved up the peninsula, a united Islamic state has risen from the ashes of the taifas. The memory of the Caliphate of Cordoba — when this land was the most learned and prosperous in all of Europe — burns bright in every scholar and soldier.\n\nBut Al-Andalus faces a choice that has defined it since the days of the Umayyads. Will we revive the tradition of the convivencia, where mosques stood beside synagogues and churches, where Ibn Rushd debated Aristotle and Maimonides found refuge under Muslim rule? Or will we follow the path of the Almohads and Almoravids, who crossed the strait with armies of disciplined Berber cavalry and built an empire through military piety and religious orthodoxy?\n\n#bold This choice unlocks a destiny path in the Traditions tab.#!"
 nd_adu.1.a: "Let Cordoba shine again as the ornament of the world."
 nd_adu.1.b: "The sword of the Maghreb shall unite the faithful."
 STATIC_MODIFIER_NAME_nd_adu_house_of_wisdom_west: "House of Wisdom of the West"
 STATIC_MODIFIER_DESC_nd_adu_house_of_wisdom_west: "Inspired by Baghdad's legendary Bayt al-Hikma, the scholars of Al-Andalus have established their own center of universal learning where texts are translated, debated, and preserved."
 nd_adu.2.t: "The Flowering of the Convivencia"
 nd_adu.2.d: "In the great cities of Al-Andalus, something remarkable is taking root. Muslim scholars debate with Jewish philosophers in the libraries of Cordoba. Christian scribes copy Arabic texts on mathematics and astronomy. The Madrasa of Yusuf I in Granada teaches not only the Quran and hadith, but medicine, geometry, and natural philosophy.\n\nThis is not mere tolerance — it is the deliberate cultivation of a civilization that draws strength from its diversity. The works of Aristotle, preserved in Arabic when Europe had forgotten them, now flow back into the wider world through Andalusi translators. Scholars from across Christendom journey here to study, drawn by the reputation of a land where knowledge transcends the boundaries of faith."
 nd_adu.2.a: "Let all who seek knowledge find it in our halls."
 STATIC_MODIFIER_NAME_nd_adu_arabic_scholarship: "Arabic Scholarly Tradition"
 STATIC_MODIFIER_DESC_nd_adu_arabic_scholarship: "Al-Andalus preserves and extends the Arabic intellectual tradition, producing original works that stand alongside the greatest achievements of Baghdad and Cairo."
 STATIC_MODIFIER_NAME_nd_adu_universal_knowledge: "Universal Knowledge Exchange"
 STATIC_MODIFIER_DESC_nd_adu_universal_knowledge: "The translation houses of Al-Andalus serve as a bridge between civilizations, transmitting the wisdom of the ancients to all who would learn."
 nd_adu.3.t: "The Translation Movement"
 nd_adu.3.d: "The translation houses of Al-Andalus have become the intellectual crossroads of the world. In Toledo, Cordoba, and Seville, Arabic texts on medicine, astronomy, mathematics, and philosophy are being rendered into Latin, Hebrew, and Romance languages. The works of al-Zahrawi on surgery, al-Zarqali on astronomical instruments, and Ibn Rushd on Aristotelian philosophy are reshaping the intellectual landscape far beyond the borders of the Islamic world.\n\nBut a question divides our scholars. Should we preserve our intellectual tradition in its Arabic purity, continuing to produce original works that advance human knowledge? Or should we embrace the role of universal translator, making all knowledge accessible across linguistic and religious boundaries — even at the cost of diluting our distinctive scholarly identity?"
 nd_adu.3.a: "Our tradition speaks for itself — let us build upon it."
 nd_adu.3.b: "Knowledge belongs to all humanity."
 STATIC_MODIFIER_NAME_nd_adu_alhambra_splendor: "Splendor of the Alhambra"
 STATIC_MODIFIER_DESC_nd_adu_alhambra_splendor: "The palace complex of the Alhambra stands as a testament to the artistic genius of Islamic civilization, its delicate muqarnas and geometric arabesques inspiring wonder across the world."
 nd_adu.4.t: "The Splendor of the Alhambra"
 nd_adu.4.d: "High above the city of Granada, against the backdrop of the Sierra Nevada, the Alhambra rises like a vision from paradise. Its walls of rammed earth conceal gardens of impossible beauty — the Court of the Lions with its twelve marble beasts guarding a fountain of crystal water, the Hall of the Ambassadors where muqarnas ceilings represent the seven heavens, and the Generalife where terraced gardens cascade down the hillside in a symphony of water and stone.\n\nThis is not merely a palace. It is the physical embodiment of the Andalusi ideal — that art, architecture, and engineering can transform raw earth into something that makes the heart ache with beauty. Every surface is covered in geometric arabesques, every fountain is an exercise in hydraulic engineering, every garden a masterwork of irrigation science. The Alhambra proves that Al-Andalus can create wonders to rival any civilization on earth."
 nd_adu.4.a: "Let this splendor inspire our people for generations."
 nd_adu_jinete_tradition: "Jinete Tradition"
 nd_adu_jinete_tradition_desc: "The mounted warriors of Al-Andalus ride in the Berber style — light, fast, deadly with javelins hurled from the saddle at full gallop."
 nd_adu_ribat_frontier: "Ribat Frontier Defense"
 nd_adu_ribat_frontier_desc: "The ribats guard the borders of the faithful, combining fortress walls with monastic discipline."
 nd_adu_acequia_irrigation: "Acequia Irrigation"
 nd_adu_acequia_irrigation_desc: "The acequia canal systems of Al-Andalus transform arid land into gardens, applying centuries of Islamic hydraulic knowledge."
 nd_adu_islamic_jurisprudence: "Islamic Jurisprudence"
 nd_adu_islamic_jurisprudence_desc: "The legal scholars of Al-Andalus develop a sophisticated tradition of fiqh, drawing on the Maliki school to create orderly governance."
 nd_adu_urban_civilization: "Urban Civilization"
 nd_adu_urban_civilization_desc: "The cities of Al-Andalus set the standard for urban life, with public baths, paved streets, and running water."
 nd_adu_mosque_network: "Mosque Network"
 nd_adu_mosque_network_desc: "A network of congregational mosques anchors religious life across Al-Andalus, from the Great Mosque of Cordoba to humble village houses of prayer."
 nd_adu_zenata_warriors: "Zenata Horse Guard"
 nd_adu_zenata_warriors_desc: "Elite Berber cavalry from the Zenata tribes form the core of the Andalusi heavy horse, disciplined and fearsome in the charge."
 nd_adu_madrasa_tradition: "Madrasa Tradition"
 nd_adu_madrasa_tradition_desc: "The establishment of madrasas — formal institutions of Islamic learning — brings structured education to the cities of Al-Andalus."
 nd_adu_mediterranean_trade: "Mediterranean Trade Networks"
 nd_adu_mediterranean_trade_desc: "Andalusi merchants trade silk, sugar, and dried fruits through the ports of Almeria, Malaga, and Algeciras, connecting Islamic Iberia to the wider Mediterranean world."
 nd_adu_convivencia: "Convivencia"
 nd_adu_convivencia_desc: "The tradition of coexistence among Muslims, Christians, and Jews that made Al-Andalus a beacon of intellectual exchange and cultural richness."
 nd_adu_naval_arsenal: "Naval Arsenal"
 nd_adu_naval_arsenal_desc: "The dar al-sina'a of Almeria and Algeciras produce war galleys that command the western Mediterranean."
 nd_adu_caliphal_administration: "Caliphal Administration"
 nd_adu_caliphal_administration_desc: "The centralized administrative apparatus of the caliphate, with its viziers, qadis, and provincial governors, ensures efficient rule."
 nd_adu_ghazi_warriors: "Ghazi Warriors"
 nd_adu_ghazi_warriors_desc: "The ghazis of Al-Andalus are frontier warriors who combine religious zeal with battlefield prowess, defending the Dar al-Islam."
 nd_adu_alcazar_fortification: "Alcazar Fortification"
 nd_adu_alcazar_fortification_desc: "The alcazars of Al-Andalus are fortified palace complexes that serve as seats of power and bastions of defense."
 nd_adu_translation_movement: "Translation Movement"
 nd_adu_translation_movement_desc: "The systematic translation of Arabic scholarly works into Latin and Hebrew transforms Al-Andalus into the intellectual bridge between Islamic and Christian civilizations, while lusterware ceramics showcase the material culture born from this exchange."
 nd_adu_silk_industry: "Silk Industry"
 nd_adu_silk_industry_desc: "The silk workshops of Granada and Almeria produce the finest textiles in Europe, their damasks and taffetas prized across the Mediterranean."
 nd_adu_diplomatic_survival: "Diplomatic Mastery"
 nd_adu_diplomatic_survival_desc: "Centuries of navigating between powerful neighbors have made Andalusi diplomats masters of the art of survival through negotiation."
 nd_adu_port_cities: "Port Cities of Al-Andalus"
 nd_adu_port_cities_desc: "The great ports of Almeria, Malaga, and Seville anchor a maritime trade network stretching from Morocco to the Levant."
 nd_adu_alhambra_legacy: "Alhambra Legacy"
 nd_adu_alhambra_legacy_desc: "The architectural tradition of the Alhambra inspires a flowering of Islamic art and architecture across Al-Andalus."
 nd_adu_corsair_tradition: "Corsair Tradition"
 nd_adu_corsair_tradition_desc: "Swift Nasrid corsairs patrol the Strait of Gibraltar and the western Mediterranean, protecting trade routes and raiding enemy shipping."
 nd_adu_fiscal_innovation: "Fiscal Innovation"
 nd_adu_fiscal_innovation_desc: "Al-Andalus develops sophisticated fiscal instruments and regulated marketplaces, with the suq at the heart of every city's commercial life."
 nd_adu_waqf_system: "Waqf Endowments"
 nd_adu_waqf_system_desc: "The Islamic institution of waqf — charitable endowments for public works — funds the construction of hospitals, schools, and infrastructure."
 nd_adu_military_reform: "Berber-Andalusi Military Fusion"
 nd_adu_military_reform_desc: "The military traditions of North African Berber dynasties merge with Iberian techniques to create a distinctive Andalusi art of war, producing celebrated swordsmiths and armorers."
 nd_adu_taifa_governance: "Taifa Governance"
 nd_adu_taifa_governance_desc: "Drawing lessons from the fragmentation of the taifa kingdoms, Al-Andalus develops institutions to prevent provincial separatism."
 nd_adu_centralized_sultanate: "Centralized Sultanate"
 nd_adu_centralized_sultanate_desc: "The sultan consolidates direct control over the provinces, replacing semi-autonomous governors with royal administrators."
 nd_adu_infrastructure_renewal: "Infrastructure Renewal"
 nd_adu_infrastructure_renewal_desc: "A program of public works renews the administrative apparatus of Al-Andalus, establishing provincial chancelleries to coordinate governance across the realm."
 nd_adu_maritime_expansion: "Maritime Expansion"
 nd_adu_maritime_expansion_desc: "Al-Andalus expands its naval capacity, building new arsenals and recruiting experienced sailors to project power across the Mediterranean."
 nd_adu_standing_army: "Standing Army"
 nd_adu_standing_army_desc: "Al-Andalus replaces reliance on tribal levies and ghazi volunteers with a professional standing army of disciplined infantry under direct royal command."
 nd_adu_majlis_council: "Majlis Council"
 nd_adu_majlis_council_desc: "A consultative council of notables advises the ruler on matters of law and governance, balancing royal authority with communal consensus."
 nd_adu_islamic_enlightenment: "Islamic Enlightenment"
 nd_adu_islamic_enlightenment_desc: "A new generation of Andalusi scholars embraces empirical inquiry and rational discourse, continuing the tradition of Ibn Rushd."
 nd_adu_industrial_modernization: "Industrial Modernization"
 nd_adu_industrial_modernization_desc: "Al-Andalus adapts modern manufacturing techniques while building on its centuries-old tradition of skilled artisanship."
 nd_adu_modern_army: "Modern Army"
 nd_adu_modern_army_desc: "The Andalusi military adopts modern drill, formations, and firearms technology to match the armies of the age."
 nd_adu_andalusi_renaissance: "Andalusi Renaissance"
 nd_adu_andalusi_renaissance_desc: "A cultural flowering recalls the golden age of the Caliphate, as Al-Andalus once more becomes a center of art, literature, and philosophy."
 nd_adu_urban_renewal: "Urban Renewal"
 nd_adu_urban_renewal_desc: "The great cities of Al-Andalus undergo expansion and modernization, attracting migrants and merchants from across the Muslim world."
 nd_adu_global_trade_mastery: "Global Trade Mastery"
 nd_adu_global_trade_mastery_desc: "Al-Andalus leverages its position at the junction of the Atlantic and Mediterranean to dominate global trade networks."
 a_nd_adu_jinete: "Jinete"
 a_nd_adu_jinete_desc: "Light Berber-style cavalry armed with javelins and bucklers, masters of the hit-and-run skirmish who ride small, agile jennets."
 a_nd_adu_zenata_guard: "Zenata Horse Guard"
 a_nd_adu_zenata_guard_desc: "Elite heavy cavalry drawn from the Zenata Berber tribes, armored and disciplined shock troops who form the core of the Andalusi mounted arm."
 a_nd_adu_ghazi: "Ghazi"
 a_nd_adu_ghazi_desc: "Frontier holy warriors of Al-Andalus who fight for the faith, combining religious zeal with deadly skill at arms in rough terrain."
 a_nd_adu_nizam_infantry: "Nizam al-Jadid"
 a_nd_adu_nizam_infantry_desc: "Modernized professional infantry drilled in European techniques, forming the backbone of the reformed Andalusi standing army."
 n_nd_adu_war_galley: "Andalusi War Galley"
 n_nd_adu_war_galley_desc: "Mediterranean war galley built in the dar al-sina'a of Almeria, larger and faster than standard galleys, designed for control of the western Mediterranean."
 n_nd_adu_nasrid_corsair: "Nasrid Corsair"
 n_nd_adu_nasrid_corsair_desc: "Swift light raiding vessel of the Nasrid naval tradition, designed to hunt merchant shipping and protect the Strait of Gibraltar."
 nd_adu_madrasa: "Madrasa"
 nd_adu_madrasa_desc: "An Islamic institution of higher learning teaching theology, jurisprudence, medicine, mathematics, and philosophy."
 nd_adu_acequia: "Acequia"
 nd_adu_acequia_desc: "A sophisticated irrigation canal system bringing water from mountain streams to fields and gardens, enabling intensive agriculture."
 nd_adu_alcazar: "Alcazar"
 nd_adu_alcazar_desc: "A fortified palace complex serving as both administrative center and defensive stronghold, built in the distinctive Andalusi style."
 nd_adu_dar_al_tiraz: "Dar al-Tiraz"
 nd_adu_dar_al_tiraz_desc: "A royal textile workshop producing the finest silk fabrics in Europe — taffetas, damasks, and brocades prized across the Mediterranean."
 nd_adu_funduq: "Funduq"
 nd_adu_funduq_desc: "A merchants' trading house and warehouse where Genoese, Catalan, and Moroccan traders exchange goods from across the Mediterranean."
 nd_adu_ribat: "Ribat"
 nd_adu_ribat_desc: "A frontier fortress-monastery combining military defense with religious devotion, housing warriors pledged to defend the borders of Islam."
 nd_adu_hammam: "Hammam"
 nd_adu_hammam_desc: "A public bathhouse providing hygiene, socializing, and ritual purification — a cornerstone of Andalusi urban culture."
 nd_adu_dar_al_sinaa: "Dar al-Sina'a"
 nd_adu_dar_al_sinaa_desc: "A state naval arsenal producing war galleys and merchant vessels, the backbone of Andalusi maritime power."
 nd_adu_waqf: "Waqf Foundation"
 nd_adu_waqf_desc: "An Islamic charitable endowment funding hospitals, schools, and public works in perpetuity for the benefit of the community."
 nd_adu_lusterware_kiln: "Lusterware Kiln"
 nd_adu_lusterware_kiln_desc: "A ceramics workshop producing the famous Andalusi lusterware — glazed pottery shimmering with gold and copper iridescence, prized from Seville to Cairo."
 nd_adu_forge: "Andalusi Forge"
 nd_adu_forge_desc: "A weapons forge in the tradition of Toledo steel, where master swordsmiths produce blades renowned across the Mediterranean for their strength and flexibility."
 nd_adu_suq: "Suq"
 nd_adu_suq_desc: "A central marketplace and covered bazaar where merchants, artisans, and tax collectors converge in the commercial heart of every Andalusi city."
 nd_adu_diwan: "Diwan"
 nd_adu_diwan_desc: "An administrative chancellery where scribes and bureaucrats manage the records, correspondence, and fiscal accounts of the realm."
 nd_adu_madrasa_upkeep: "Scholarly Endowment"
 nd_adu_madrasa_upkeep_desc: "Paper, books, and candles sustain the madrasa's educational mission."
 nd_adu_acequia_maintenance: "Canal Maintenance"
 nd_adu_acequia_maintenance_desc: "Stone, timber, and tools keep the acequia channels flowing cleanly."
 nd_adu_alcazar_garrison: "Palace Guard"
 nd_adu_alcazar_garrison_desc: "Arms, stone, and leather armor maintain the alcazar's defensive readiness."
 nd_adu_silk_weaving: "Silk Weaving"
 nd_adu_silk_weaving_desc: "Raw silk and dyes are transformed into the finest cloth in Europe."
 nd_adu_mechanized_weaving: "Mechanized Weaving"
 nd_adu_mechanized_weaving_desc: "Modern machinery increases silk production while incorporating cotton blends for wider markets."
 nd_adu_funduq_operations: "Trading Operations"
 nd_adu_funduq_operations_desc: "Cloth, paper, and salt facilitate the business of international merchants."
 nd_adu_ribat_upkeep: "Frontier Garrison"
 nd_adu_ribat_upkeep_desc: "Arms, provisions, leather harness, and tools sustain the ribat's warrior-monks."
 nd_adu_hammam_operations: "Bathhouse Operations"
 nd_adu_hammam_operations_desc: "Timber, clay tiles, and coal fuel keep the hammam heated and maintained."
 nd_adu_shipyard_maintenance: "Naval Maintenance"
 nd_adu_shipyard_maintenance_desc: "Timber, iron, and tar sustain the arsenal's ship-building operations."
 nd_adu_waqf_endowment: "Charitable Works"
 nd_adu_waqf_endowment_desc: "Grain, cloth, and paper sustain the waqf's charitable and educational mission."
 nd_adu_lusterware_production: "Lusterware Production"
 nd_adu_lusterware_production_desc: "Clay and metallic dyes are fired into iridescent glazed ceramics prized throughout the Mediterranean."
 nd_adu_sword_forging: "Sword Forging"
 nd_adu_sword_forging_desc: "Iron and coal feed the forges that produce Andalusi blades in the celebrated Toledo tradition."
 nd_adu_suq_operations: "Market Operations"
 nd_adu_suq_operations_desc: "Cloth, salt, and paper sustain the commercial operations of the central marketplace."
 nd_adu_diwan_administration: "Chancellery Operations"
 nd_adu_diwan_administration_desc: "Paper, books, fine cloth for officials, and furnishings support the chancellery's records and correspondence."
 levy_nd_adu_jinete: "Jinete Cavalry"
 levy_nd_adu_jinete_desc: "Light Berber-style cavalry raised from the military households and noble estates of Al-Andalus."
 levy_nd_adu_ghazi: "Ghazi Volunteers"
 levy_nd_adu_ghazi_desc: "Frontier holy warriors called to defend the borders of the faith."
 nd_adu_formed_tt: "Al-Andalus has been formed"
 nd_adu_path_a_tt: "Chose Ornament of the World"
 nd_adu_path_b_tt: "Chose Sword of the Maghreb"
 nd_adu_destiny: "Destiny of Al-Andalus"
 nd_adu_destiny_desc: "With Iberia united under the crescent, Al-Andalus stands at a crossroads between scholarship and conquest."
 nd_adu_dest_knowledge: "The Knowledge Restored"
 nd_adu_dest_knowledge_desc: "Rebuild Cordoba's legendary libraries and attract scholars from across the world. Requires the banking institution, silk in the capital market, and 1,000 gold."
 nd_adu_dest_translators: "Bridge of Civilizations"
 nd_adu_dest_translators_desc: "Extend Andalusi intellectual influence into Occitania. Requires ownership of Toulouse, the printing press institution, total development of 7,500, and 2,000 gold."
 nd_adu_dest_golden_age: "The Second Golden Age"
 nd_adu_dest_golden_age_desc: "Surpass even the Caliphate of Cordoba by building a universal civilization spanning the Mediterranean. Requires ownership of Palermo, the scientific revolution, prestige of 75, 3,000 gold, and total development of 10,000."
 nd_adu_dest_reconquest: "The Maghreb Reclaimed"
 nd_adu_dest_reconquest_desc: "Cross the strait and reclaim the Maghreb for Al-Andalus. Requires ownership of Fez and Tlemcen, and an army of 30,000."
 nd_adu_dest_caliphate: "The Caliphate Restored"
 nd_adu_dest_caliphate_desc: "Unite the western Islamic world under the banner of Al-Andalus. Requires ownership of Tunis and Marrakesh, an army of 50,000, and prestige of 50."
 nd_adu_dest_empire: "Empire of the Crescent"
 nd_adu_dest_empire_desc: "Build an empire stretching from the Atlantic to the Nile. Requires ownership of Tripoli and Cairo, an army of 75,000, prestige of 75, and 3,000 gold."
 nd_adu.5.t: "The Destiny of Al-Andalus"
 nd_adu.5.d: "With the peninsula secured and our realm consolidated, the scholars of Cordoba and the warriors of the frontier both look to us for direction. The path we chose at our founding now begins to bear fruit. Whether through the spread of knowledge or the march of armies, Al-Andalus will make its mark upon the world."
 nd_adu.5.a: "Our destiny awaits."
 nd_adu.6.t: "The Knowledge Restored"
 nd_adu.6.d: "The great libraries of Cordoba are being rebuilt. Scholars from Baghdad to Byzantium journey to our courts, drawn by the promise of patronage and the freedom to pursue truth wherever it leads. The banking houses of Al-Andalus fund expeditions to recover lost manuscripts, while silk merchants carry not only cloth but ideas along the trade routes. The intellectual tradition that once made this land the wonder of the world is being reborn."
 nd_adu.6.a: "Let the lamps of learning burn bright once more."
 nd_adu.7.t: "The Bridge of Civilizations"
 nd_adu.7.d: "Our scholars have established a presence in Toulouse and the cities of Occitania, creating a corridor of intellectual exchange between the Islamic and Christian worlds. Arabic texts on astronomy, medicine, and philosophy flow northward, while European innovations in engineering and navigation flow south. Al-Andalus stands as the indispensable bridge between civilizations.\n\nBut this bridge can be used in different ways. Some argue we should leverage our position as translators and mediators to extend our diplomatic influence, absorbing the peoples we encounter into our cosmopolitan civilization. Others say we should use this moment to invest in the arts and beautification of our realm, making Al-Andalus a paradise that the world envies."
 nd_adu.7.a: "We shall be the bridge that connects all peoples."
 nd_adu.7.b: "Let us build a paradise worthy of our learning."
 nd_adu.8.t: "The Second Golden Age"
 nd_adu.8.d: "It is done. From the pillars of Cordoba to the mosaics of Palermo, from the vineyards of Toulouse to the libraries of Valencia, Al-Andalus has built a civilization that rivals the greatest the world has ever known. Our scholars have not merely preserved ancient knowledge — they have surpassed it, making discoveries in optics, chemistry, and medicine that the ancients never dreamed of.\n\nThe question now is how to crown this achievement. Shall we formalize our academies into a universal institution of learning, open to all faiths and nations, that will shape the intellectual future of humanity? Or shall we turn inward, perfecting the gardens and palaces of our realm until Al-Andalus itself becomes a work of art — a paradise on earth that inspires wonder for a thousand years?"
 nd_adu.8.a: "Found the Universal Academy of Sciences."
 nd_adu.8.b: "Build the Garden of Earthly Paradise."
 nd_adu.9.t: "The Maghreb Reclaimed"
 nd_adu.9.d: "The armies of Al-Andalus have crossed the strait and planted the banner in Fez and Tlemcen. The same route the Almoravids and Almohads once took northward to rescue Muslim Iberia has now been reversed — the Andalusis have come south to unite the Maghreb under their rule. The Berber tribes who once provided the shock cavalry of Iberian Islam now swear allegiance to the Sultan in Cordoba. The western Mediterranean begins to take on the character of an Andalusi lake."
 nd_adu.9.a: "The strait is ours. Let us press onward."
 nd_adu.10.t: "The Caliphate Restored"
 nd_adu.10.d: "From Marrakesh to Tunis, from the Atlas Mountains to the shores of Iberia, the western Islamic world is united under the banner of Al-Andalus. What the Umayyads began in Cordoba, what the Almohads attempted from Marrakesh, has finally been achieved — a single caliphate ruling over all the lands of the Muslim West.\n\nBut the character of this caliphate remains to be determined. Some urge us to channel the fervor of our ghazi warriors, maintaining the martial spirit that won us this empire and preparing for further conquests. Others counsel consolidation — extracting tribute from our vast domains and building the administrative apparatus needed to govern an empire of this size."
 nd_adu.10.a: "The sword of the faith is never sheathed."
 nd_adu.10.b: "Let the wealth of empire flow to our treasury."
 nd_adu.11.t: "Empire of the Crescent"
 nd_adu.11.d: "The banner of Al-Andalus flies over Cairo. The pyramids and the Alhambra, the libraries of Cordoba and the mosques of Kairouan, the straits of Gibraltar and the mouth of the Nile — all are united under a single sultan. Not since the early Umayyads has any Muslim ruler commanded such a vast and diverse empire in the west.\n\nHow shall we rule this empire? As the Sultan of Sultans, a military hegemon whose armies can march from the Atlantic to the Red Sea? Or as the Western Caliph, a maritime power whose fleets command the Mediterranean and whose diplomatic reach extends to every port from Lisbon to Alexandria?"
 nd_adu.11.a: "We are the Sultan of Sultans."
 nd_adu.11.b: "We are the Western Caliphate."
 STATIC_MODIFIER_NAME_nd_adu_dest_intellectual_bridge: "Intellectual Bridge"
 STATIC_MODIFIER_DESC_nd_adu_dest_intellectual_bridge: "Al-Andalus serves as the intellectual bridge between civilizations, its scholars translating and transmitting knowledge that reshapes the world."
 STATIC_MODIFIER_NAME_nd_adu_dest_patron_of_arts: "Patron of the Arts"
 STATIC_MODIFIER_DESC_nd_adu_dest_patron_of_arts: "Royal patronage transforms Al-Andalus into a paradise of architecture, poetry, and music, though such refinement comes at the cost of martial vigor."
 STATIC_MODIFIER_NAME_nd_adu_dest_universal_academy: "Universal Academy"
 STATIC_MODIFIER_DESC_nd_adu_dest_universal_academy: "The Universal Academy of Al-Andalus draws scholars and diplomats from across the known world, extending the realm's influence through knowledge."
 STATIC_MODIFIER_NAME_nd_adu_dest_garden_of_paradise: "Garden of Paradise"
 STATIC_MODIFIER_DESC_nd_adu_dest_garden_of_paradise: "The gardens, palaces, and libraries of Al-Andalus have become a paradise on earth, attracting wealth and talent while breeding complacency in the ranks."
 STATIC_MODIFIER_NAME_nd_adu_dest_ghazi_fervor: "Ghazi Fervor"
 STATIC_MODIFIER_DESC_nd_adu_dest_ghazi_fervor: "The martial spirit of the ghazi warriors burns bright across the caliphate, inspiring soldiers and sailors alike to deeds of valor."
 STATIC_MODIFIER_NAME_nd_adu_dest_imperial_tribute: "Imperial Tribute"
 STATIC_MODIFIER_DESC_nd_adu_dest_imperial_tribute: "The vast domains of the caliphate yield tribute in gold and soldiers, funding further expansion and securing the frontiers."
 STATIC_MODIFIER_NAME_nd_adu_dest_sultan_of_sultans: "Sultan of Sultans"
 STATIC_MODIFIER_DESC_nd_adu_dest_sultan_of_sultans: "The Sultan of Al-Andalus commands the mightiest army in the western world, projecting power across vast distances with disciplined initiative."
